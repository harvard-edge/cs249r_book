# =============================================================================
# SHARED HTML FOOTER CONFIGURATION
# =============================================================================
# Common page-footer elements shared across all HTML builds (vol1, vol2, landing).
# Volume-specific `center:` content (inter-volume navigation links) is defined
# in each volume's own config and deep-merged on top of these defaults.
# =============================================================================

website:
  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a><br>
      <!-- MLSB_BUILD_STAMP -->
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
      - icon: star
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "Star this repository"
    background: light
    border: true
