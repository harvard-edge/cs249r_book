# =============================================================================
# ANNOUNCEMENT BAR — Legacy /book/ landing
# =============================================================================
# Audience: readers who land on the legacy single-volume site at
#           https://mlsysbook.ai/book/ via old links, bookmarks, or stale
#           browser caches. Points them to the new two-volume edition.
#
# Color:    inherits Harvard Crimson via $accent (set in theme-harvard.scss
#           and consumed by .announcement / .alert-primary in _base-styles.scss).
#           Do NOT hard-code colors here — let the theme drive it so a brand
#           change in shared/styles/_brand.scss propagates automatically.
#
# Unifying template (shared across all nine Quarto sites, 2026-04):
#   Line 1  — identity + primary CTA (what is THIS site)
#   Line 2  — the volumes (since the "book" here IS the legacy single
#             volume, surface BOTH new volumes here instead)
#   Line 3  — "Alongside the book:" sibling row (3 most-relevant verbs)
#   Line 4  — newsletter
#
# Related (in this directory):
#   announcement-vol1.yml  — Volume I  (Crimson tint, foundations copy)
#   announcement-vol2.yml  — Volume II (ETH Blue tint, scale copy)
#
# IMPORTANT: /book/ has no live Quarto build at the moment. It is a frozen
# gh-pages artifact preserved by every deploy (see site-publish-live.yml).
# This YAML is the source of truth for the banner content; the equivalent
# rendered HTML is applied directly to book/index.html on the gh-pages
# branch. If you edit this file, also patch the announcement-content div
# in gh-pages' book/index.html with the equivalent HTML rendering, and
# bump the data-announcement-id so the new banner is shown to readers who
# previously dismissed an older version.
# =============================================================================

website:
  announcement:
    icon: megaphone
    dismissable: true
    type: primary
    position: below-navbar
    content: |
      📌 **Legacy single-volume edition.** The textbook has been refactored into two volumes. [Read the new edition →](https://mlsysbook.ai/)<br>
      📘 **Volume I: Foundations** ([read →](https://mlsysbook.ai/vol1/)) · 🚀 **Volume II: At Scale** ([read →](https://mlsysbook.ai/vol2/))<br>
      🛠️ **Alongside the book:** [TinyTorch](https://mlsysbook.ai/tinytorch/) (build) · [Hardware Kits](https://mlsysbook.ai/kits/) (deploy) · [MLSys·im](https://mlsysbook.ai/mlsysim/) (model) · [Labs](https://mlsysbook.ai/labs/) (explore) · [StaffML](https://mlsysbook.ai/staffml/) (practice)<br>
      📬 **Newsletter:** ML Systems insights & updates. [Subscribe →](https://mlsysbook.ai/newsletter/)
