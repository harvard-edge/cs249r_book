# inject_quizzes.lua is HTML-ONLY. PDF and EPUB do not list it. The filter
# is also self-guarded via quarto.doc.is_format("html") so even accidental
# cross-format inclusion is a no-op. The quiz JSON files it reads live at
# book/quarto/contents/{vol}/{chapter}/{chapter}_quizzes.json and are
# regenerated by book/tools/scripts/quizzes/generate_quizzes.py
# against the canonical spec in .claude/docs/shared/quiz-generation.md.
filters:
  - filters/sidenote.lua
  - filters/inject_parts.lua
  - filters/dropcap.lua
  - filters/inject_quizzes.lua
  - pandoc-ext/diagram
  - mlsysbook-ext/custom-numbered-blocks
