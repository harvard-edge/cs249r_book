<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <rect width="800" height="480" fill="#fff"/>

  <!-- Column 1: Full Retraining -->
  <g transform="translate(80, 30)">
    <rect x="0" y="0" width="200" height="260" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <line x1="0" y1="36" x2="200" y2="36" stroke="#bbb" stroke-width="1.2"/>
    <text x="100" y="24" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Full Retraining</text>

    <!-- Diagram -->
    <rect x="20" y="50" width="70" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="55" y="65" font-size="9" fill="#555" text-anchor="middle">Dataset</text>
    
    <rect x="30" y="70" width="50" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
    <text x="55" y="83" font-size="8" fill="#a31f34" text-anchor="middle">remove</text>

    <line x1="90" y1="80" x2="108" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="110" y="60" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="145" y="75" font-size="9" fill="#555" text-anchor="middle">Train from</text>
    <text x="145" y="87" font-size="9" fill="#555" text-anchor="middle">scratch</text>

    <!-- Properties -->
    <text x="100" y="130" font-size="9.5" font-weight="600" fill="#333" text-anchor="middle">Properties</text>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#bbb" stroke-width="0.8"/>

    <text x="20" y="160" font-size="9" fill="#555">Exact unlearning</text>
    <text x="20" y="175" font-size="9" fill="#555">Highest fidelity</text>
    <text x="20" y="190" font-size="9" fill="#a31f34">Extremely expensive</text>
    <text x="20" y="205" font-size="9" fill="#a31f34">Requires full dataset</text>

    <!-- Quality / Cost indicators -->
    <text x="100" y="230" font-size="9.5" font-weight="600" fill="#333" text-anchor="middle">Quality: Exact</text>
    <text x="100" y="250" font-size="9.5" font-weight="600" fill="#a31f34" text-anchor="middle">Cost: $4.6M (175B)</text>
  </g>

  <!-- Column 2: Gradient Ascent -->
  <g transform="translate(320, 30)">
    <rect x="0" y="0" width="200" height="260" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <line x1="0" y1="36" x2="200" y2="36" stroke="#bbb" stroke-width="1.2"/>
    <text x="100" y="24" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Gradient Ascent</text>

    <!-- Diagram -->
    <rect x="20" y="50" width="70" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
    <text x="55" y="65" font-size="9" fill="#555" text-anchor="middle">Forget</text>
    <text x="55" y="77" font-size="9" fill="#555" text-anchor="middle">set</text>
    <text x="55" y="95" font-size="8" fill="#a31f34" text-anchor="middle">max loss</text>

    <line x1="90" y1="80" x2="108" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="110" y="60" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="145" y="75" font-size="9" fill="#555" text-anchor="middle">Update</text>
    <text x="145" y="87" font-size="9" fill="#555" text-anchor="middle">weights</text>

    <!-- Properties -->
    <text x="100" y="130" font-size="9.5" font-weight="600" fill="#333" text-anchor="middle">Properties</text>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#bbb" stroke-width="0.8"/>

    <text x="20" y="160" font-size="9" fill="#3d9e5a">Approximate unlearning</text>
    <text x="20" y="175" font-size="9" fill="#3d9e5a">Very fast (minutes)</text>
    <text x="20" y="190" font-size="9" fill="#555">No dataset needed</text>
    <text x="20" y="205" font-size="9" fill="#a31f34">May degrade accuracy</text>

    <!-- Quality / Cost indicators -->
    <text x="100" y="230" font-size="9.5" font-weight="600" fill="#333" text-anchor="middle">Quality: Approximate</text>
    <text x="100" y="250" font-size="9.5" font-weight="600" fill="#3d9e5a" text-anchor="middle">Cost: Minutes</text>
  </g>

  <!-- Column 3: SISA Training -->
  <g transform="translate(560, 30)">
    <rect x="0" y="0" width="200" height="260" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <line x1="0" y1="36" x2="200" y2="36" stroke="#bbb" stroke-width="1.2"/>
    <text x="100" y="24" font-size="11" font-weight="700" fill="#333" text-anchor="middle">SISA Training</text>

    <!-- Diagram -->
    <rect x="10" y="60" width="20" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="20" y="83" font-size="7.5" fill="#555" text-anchor="middle">S1</text>
    
    <rect x="40" y="60" width="20" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="50" y="83" font-size="7.5" fill="#555" text-anchor="middle">S2</text>
    
    <rect x="70" y="60" width="20" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
    <text x="80" y="83" font-size="7.5" fill="#a31f34" text-anchor="middle">S3</text>
    <text x="80" y="110" font-size="7.5" fill="#a31f34" text-anchor="middle">retrain</text>

    <line x1="90" y1="80" x2="108" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="110" y="60" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="145" y="75" font-size="9" fill="#555" text-anchor="middle">Retrain</text>
    <text x="145" y="87" font-size="9" fill="#555" text-anchor="middle">shard 3</text>

    <!-- Properties -->
    <text x="100" y="130" font-size="9.5" font-weight="600" fill="#333" text-anchor="middle">Properties</text>
    <line x1="20" y1="140" x2="180" y2="140" stroke="#bbb" stroke-width="0.8"/>

    <text x="20" y="160" font-size="9" fill="#3d9e5a">Exact (per shard)</text>
    <text x="20" y="175" font-size="9" fill="#3d9e5a">Cost = 1/N of full</text>
    <text x="20" y="190" font-size="9" fill="#555">Requires shard design</text>
    <text x="20" y="205" font-size="9" fill="#555">Ensemble overhead</text>

    <!-- Quality / Cost indicators -->
    <text x="100" y="230" font-size="9.5" font-weight="600" fill="#333" text-anchor="middle">Quality: Exact (shard)</text>
    <text x="100" y="250" font-size="9.5" font-weight="600" fill="#3d9e5a" text-anchor="middle">Cost: ~$90K (20 shards)</text>
  </g>

  <!-- Comparison bars at bottom -->
  <!-- Time cost bars -->
  <g transform="translate(0, 320)">
    <text x="20" y="14" font-size="10" font-weight="700" fill="#333">Time Cost</text>

    <!-- Full Retraining -->
    <rect x="100" y="0" width="160" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="180" y="14" font-size="9" font-weight="600" fill="#333" text-anchor="middle">34 days (1024 GPUs)</text>

    <!-- Gradient Ascent -->
    <rect x="380" y="0" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="430" y="14" font-size="9" font-weight="600" fill="#333" text-anchor="start">~minutes</text>

    <!-- SISA -->
    <rect x="610" y="0" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="660" y="14" font-size="9" font-weight="600" fill="#333" text-anchor="start">~1.7 days</text>
  </g>

  <!-- Quality bars -->
  <g transform="translate(0, 360)">
    <text x="20" y="14" font-size="10" font-weight="700" fill="#333">Quality</text>

    <!-- Full Retraining -->
    <rect x="100" y="0" width="160" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="180" y="14" font-size="9" font-weight="600" fill="#333" text-anchor="middle">100% (exact)</text>

    <!-- Gradient Ascent -->
    <rect x="360" y="0" width="120" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="420" y="14" font-size="9" font-weight="600" fill="#333" text-anchor="middle">~80% (approx.)</text>

    <!-- SISA -->
    <rect x="580" y="0" width="160" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="660" y="14" font-size="9" font-weight="600" fill="#333" text-anchor="middle">~95% (shard-exact)</text>
  </g>

  <!-- Tradeoff annotation -->
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="680" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="340" y="16" font-size="9.5" font-weight="600" fill="#a31f34" text-anchor="middle">Tradeoff space: exact unlearning is prohibitively expensive at scale; approximate methods trade</text>
    <text x="340" y="30" font-size="9.5" font-weight="600" fill="#a31f34" text-anchor="middle">mathematical guarantees for practical feasibility under right-to-be-forgotten compliance.</text>
  </g>

  <!-- Bottom annotation -->
  <text x="420" y="460" font-size="9" fill="#999" text-anchor="middle" font-style="italic">SISA partitions training data into shards; only the affected shard requires retraining upon deletion.</text>
</svg>