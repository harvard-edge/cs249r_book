<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 560">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="750" height="560" fill="#fff"/>

  <!-- Loop Paths -->
  <!-- Top -> Right -->
  <path d="M 460,90 L 580,90 L 580,220" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Right -> Bottom -->
  <path d="M 580,280 L 580,410 L 460,410" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Bottom -> Left -->
  <path d="M 260,410 L 140,410 L 140,280" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Left -> Top -->
  <path d="M 140,220 L 140,90 L 260,90" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Path labels -->
  <text x="520" y="80" font-size="9" fill="#555" text-anchor="middle">trains on</text>
  <text x="570" y="345" font-size="9" fill="#555" text-anchor="end">produces</text>
  <text x="200" y="400" font-size="9" fill="#555" text-anchor="middle">creates</text>
  <text x="130" y="155" font-size="9" fill="#555" text-anchor="end">feeds into</text>

  <!-- Node 1: Biased Training Data (Top) -->
  <g transform="translate(260, 60)">
    <rect x="0" y="0" width="200" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="100" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Biased Training Data</text>
    <text x="100" y="36" font-size="9" fill="#555" text-anchor="middle">Historical loan records with</text>
    <text x="100" y="48" font-size="9" fill="#555" text-anchor="middle">underrepresented minorities</text>
  </g>

  <!-- Node 2: Biased Model (Right) -->
  <g transform="translate(480, 220)">
    <rect x="0" y="0" width="200" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="100" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Biased Model</text>
    <text x="100" y="36" font-size="9" fill="#555" text-anchor="middle">Learns correlation:</text>
    <text x="100" y="48" font-size="9" fill="#555" text-anchor="middle">minority zip codes = high risk</text>
  </g>

  <!-- Node 3: Discriminatory Outcomes (Bottom) -->
  <g transform="translate(260, 380)">
    <rect x="0" y="0" width="200" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
    <text x="100" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Discriminatory Outcomes</text>
    <text x="100" y="36" font-size="9" fill="#555" text-anchor="middle">Disproportionate loan denial</text>
    <text x="100" y="48" font-size="9" fill="#555" text-anchor="middle">for minority applicants</text>
  </g>

  <!-- Node 4: Reinforced Bias (Left) -->
  <g transform="translate(40, 220)">
    <rect x="0" y="0" width="200" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="100" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Reinforced Data Bias</text>
    <text x="100" y="36" font-size="9" fill="#555" text-anchor="middle">Fewer minority approvals</text>
    <text x="100" y="48" font-size="9" fill="#555" text-anchor="middle">= less positive credit history</text>
  </g>

  <!-- Loop direction indicator -->
  <text x="360" y="244" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">FEEDBACK</text>
  <text x="360" y="260" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">LOOP</text>

  <!-- Intervention 1: Data audit -->
  <g transform="translate(150, 30)">
    <line x1="50" y1="36" x2="50" y2="60" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="0" y="0" width="100" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="50" y="16" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Data Audit</text>
    <text x="50" y="28" font-size="8" fill="#555" text-anchor="middle">Detect imbalance</text>
  </g>

  <!-- Intervention 2: Fairness constraint -->
  <g transform="translate(610, 327)">
    <line x1="0" y1="18" x2="-30" y2="18" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="0" y="0" width="100" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="50" y="16" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fairness Metrics</text>
    <text x="50" y="28" font-size="8" fill="#555" text-anchor="middle">Constrain outputs</text>
  </g>

  <!-- Intervention 3: Impact assessment -->
  <g transform="translate(150, 440)">
    <line x1="50" y1="0" x2="50" y2="-30" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <rect x="0" y="0" width="100" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="50" y="16" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Impact Audit</text>
    <text x="50" y="28" font-size="8" fill="#555" text-anchor="middle">Measure disparities</text>
  </g>

  <!-- Legend -->
  <g transform="translate(235, 490)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="28" y="4" font-size="9" fill="#555">Bias amplification path</text>
    <line x1="160" y1="0" x2="180" y2="0" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="188" y="4" font-size="9" fill="#555">Intervention point</text>
  </g>

  <!-- Annotation -->
  <text x="375" y="530" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each cycle amplifies bias; interventions at any stage can break the feedback loop.</text>
</svg>