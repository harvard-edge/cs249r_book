<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Reinforcement Learning from Human Feedback (RLHF) Pipeline</text>

  <!-- ===== Stage row: six boxes at y=60, box height=100 ===== -->
  <!-- Box widths and x positions for 6 evenly spaced boxes in 680px -->
  <!-- 6 boxes × 86px wide, 5 gaps × 18px = 516+90=606, margin=37 each side -->

  <!-- ── Stage 1: Base Model ── -->
  <rect x="20" y="55" width="86" height="104" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="63" y="76" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Base</text>
  <text x="63" y="89" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model</text>
  <line x1="30" y1="96" x2="96" y2="96" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="63" y="110" font-size="8.5" fill="#555" text-anchor="middle">Pre-trained</text>
  <text x="63" y="122" font-size="8.5" fill="#555" text-anchor="middle">LLM / NN</text>
  <text x="63" y="134" font-size="8.5" fill="#555" text-anchor="middle">175B params</text>
  <text x="63" y="146" font-size="8.5" fill="#555" text-anchor="middle">(example)</text>
  <!-- Stage label -->
  <text x="63" y="172" font-size="8.5" fill="#999" text-anchor="middle" font-style="italic">Stage 1</text>

  <!-- Arrow 1→2 -->
  <line x1="107" y1="107" x2="122" y2="107" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Stage 2: SFT ── -->
  <rect x="124" y="55" width="86" height="104" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="167" y="76" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Supervised</text>
  <text x="167" y="89" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fine-Tuning</text>
  <line x1="134" y1="96" x2="200" y2="96" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="167" y="110" font-size="8.5" fill="#555" text-anchor="middle">SFT on curated</text>
  <text x="167" y="122" font-size="8.5" fill="#555" text-anchor="middle">demonstrations</text>
  <text x="167" y="134" font-size="8.5" fill="#555" text-anchor="middle">~10k–100k</text>
  <text x="167" y="146" font-size="8.5" fill="#555" text-anchor="middle">examples</text>
  <text x="167" y="172" font-size="8.5" fill="#999" text-anchor="middle" font-style="italic">Stage 2</text>

  <!-- Arrow 2→3 -->
  <line x1="211" y1="107" x2="226" y2="107" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Stage 3: Human Preferences ── -->
  <rect x="228" y="55" width="86" height="104" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="271" y="76" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Human</text>
  <text x="271" y="89" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Preferences</text>
  <line x1="238" y1="96" x2="304" y2="96" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="271" y="110" font-size="8.5" fill="#555" text-anchor="middle">Pairwise</text>
  <text x="271" y="122" font-size="8.5" fill="#555" text-anchor="middle">comparisons</text>
  <text x="271" y="134" font-size="8.5" fill="#555" text-anchor="middle">50k–500k</text>
  <text x="271" y="146" font-size="8.5" fill="#555" text-anchor="middle">labels</text>
  <text x="271" y="172" font-size="8.5" fill="#999" text-anchor="middle" font-style="italic">Stage 3</text>

  <!-- Person icon annotation below stage 3 -->
  <g transform="translate(245, 185)">
    <circle cx="26" cy="8" r="6" fill="none" stroke="#c87b2a" stroke-width="1.2"/>
    <line x1="26" y1="14" x2="26" y2="26" stroke="#c87b2a" stroke-width="1.2"/>
    <line x1="26" y1="18" x2="18" y2="24" stroke="#c87b2a" stroke-width="1.2"/>
    <line x1="26" y1="18" x2="34" y2="24" stroke="#c87b2a" stroke-width="1.2"/>
    <line x1="26" y1="26" x2="20" y2="34" stroke="#c87b2a" stroke-width="1.2"/>
    <line x1="26" y1="26" x2="32" y2="34" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="26" y="47" font-size="8" fill="#c87b2a" text-anchor="middle">Human</text>
    <text x="26" y="57" font-size="8" fill="#c87b2a" text-anchor="middle">raters</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="315" y1="107" x2="330" y2="107" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Stage 4: Reward Model ── -->
  <rect x="332" y="55" width="86" height="104" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="375" y="76" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Reward</text>
  <text x="375" y="89" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model</text>
  <line x1="342" y1="96" x2="408" y2="96" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="375" y="110" font-size="8.5" fill="#555" text-anchor="middle">Trained on</text>
  <text x="375" y="122" font-size="8.5" fill="#555" text-anchor="middle">preference pairs</text>
  <text x="375" y="134" font-size="8.5" fill="#555" text-anchor="middle">r(x, y) ∈ ℝ</text>
  <text x="375" y="146" font-size="8.5" fill="#555" text-anchor="middle">scalar score</text>
  <text x="375" y="172" font-size="8.5" fill="#999" text-anchor="middle" font-style="italic">Stage 4</text>

  <!-- Arrow 4→5 -->
  <line x1="419" y1="107" x2="434" y2="107" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Stage 5: PPO Training ── -->
  <rect x="436" y="55" width="86" height="104" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="479" y="76" font-size="10" font-weight="700" fill="#333" text-anchor="middle">PPO</text>
  <text x="479" y="89" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <line x1="446" y1="96" x2="512" y2="96" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="479" y="110" font-size="8.5" fill="#555" text-anchor="middle">Policy gradient</text>
  <text x="479" y="122" font-size="8.5" fill="#555" text-anchor="middle">RL optimization</text>
  <text x="479" y="134" font-size="8.5" fill="#555" text-anchor="middle">max E[r(x,y)]</text>
  <text x="479" y="146" font-size="8.5" fill="#555" text-anchor="middle">+ KL penalty</text>
  <text x="479" y="172" font-size="8.5" fill="#999" text-anchor="middle" font-style="italic">Stage 5</text>

  <!-- Arrow 5→6 -->
  <line x1="523" y1="107" x2="538" y2="107" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Stage 6: Aligned Model ── -->
  <rect x="540" y="55" width="120" height="104" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <!-- Badge on aligned model -->
  <rect x="556" y="60" width="88" height="18" rx="12" fill="#a31f34"/>
  <text x="600" y="73" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">ALIGNED</text>
  <text x="600" y="96" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Aligned</text>
  <text x="600" y="109" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model</text>
  <line x1="550" y1="116" x2="650" y2="116" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="600" y="130" font-size="8.5" fill="#555" text-anchor="middle">Helpful, harmless</text>
  <text x="600" y="142" font-size="8.5" fill="#555" text-anchor="middle">and honest</text>
  <text x="600" y="154" font-size="8.5" fill="#555" text-anchor="middle">2–8% bench. tax</text>
  <text x="600" y="172" font-size="8.5" fill="#999" text-anchor="middle" font-style="italic">Stage 6</text>

  <!-- ===== Reward signal feedback arrow: Reward Model → PPO ===== -->
  <!-- Curved arc from Reward Model (375, 159) curving down to PPO (479, 159) -->
  <path d="M 375,160 Q 375,200 427,200 Q 479,200 479,160" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="none" marker-end="url(#arrow-green)"/>
  <text x="427" y="218" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">reward signal r(x,y)</text>

  <!-- ===== Cost / Trade-off panel ===== -->
  <rect x="20" y="248" width="640" height="90" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="268" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Engineering Trade-offs</text>
  <line x1="30" y1="274" x2="650" y2="274" stroke="#bbb" stroke-width="0.8"/>

  <!-- Three trade-off columns -->
  <text x="130" y="293" font-size="9.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Label Cost</text>
  <text x="130" y="307" font-size="9" fill="#555" text-anchor="middle">$0.50–$5.00 / label</text>
  <text x="130" y="321" font-size="9" fill="#555" text-anchor="middle">50k–500k comparisons</text>
  <text x="130" y="330" font-size="9" fill="#555" text-anchor="middle">needed</text>

  <text x="340" y="293" font-size="9.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Compute Overhead</text>
  <text x="340" y="307" font-size="9" fill="#555" text-anchor="middle">+50–100% vs SFT alone</text>
  <text x="340" y="321" font-size="9" fill="#555" text-anchor="middle">PPO requires 3 forward</text>
  <text x="340" y="330" font-size="9" fill="#555" text-anchor="middle">passes per update</text>

  <text x="550" y="293" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">Alignment Tax</text>
  <text x="550" y="307" font-size="9" fill="#555" text-anchor="middle">2–8% benchmark drop</text>
  <text x="550" y="321" font-size="9" fill="#555" text-anchor="middle">Rater demographics</text>
  <text x="550" y="330" font-size="9" fill="#555" text-anchor="middle">bias internalized</text>

  <!-- Column dividers -->
  <line x1="236" y1="278" x2="236" y2="332" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="448" y1="278" x2="448" y2="332" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Failure modes panel ===== -->
  <rect x="20" y="350" width="640" height="80" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="340" y="370" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">RLHF Failure Modes (Ngo et al.)</text>
  <line x1="30" y1="376" x2="650" y2="376" stroke="#c44" stroke-width="0.8"/>
  <text x="70" y="393" font-size="9" fill="#555" text-anchor="middle" font-weight="700">1. Reward hacking</text>
  <text x="70" y="406" font-size="8.5" fill="#555" text-anchor="middle">Exploiting rater</text>
  <text x="70" y="417" font-size="8.5" fill="#555" text-anchor="middle">fallibility</text>
  <text x="260" y="393" font-size="9" fill="#555" text-anchor="middle" font-weight="700">2. Misaligned internal goals</text>
  <text x="260" y="406" font-size="8.5" fill="#555" text-anchor="middle">Generalizing out-of-distribution</text>
  <text x="260" y="417" font-size="8.5" fill="#555" text-anchor="middle">beyond training contexts</text>
  <text x="520" y="393" font-size="9" fill="#555" text-anchor="middle" font-weight="700">3. Power-seeking behavior</text>
  <text x="520" y="406" font-size="8.5" fill="#555" text-anchor="middle">Preserving reward capacity</text>
  <text x="520" y="417" font-size="8.5" fill="#555" text-anchor="middle">at expense of oversight</text>
  <!-- Column dividers -->
  <line x1="165" y1="380" x2="165" y2="424" stroke="#c44" stroke-dasharray="4,3" stroke-width="0.6"/>
  <line x1="388" y1="380" x2="388" y2="424" stroke="#c44" stroke-dasharray="4,3" stroke-width="0.6"/>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="450" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The reward signal from Stage 4 drives PPO optimization in Stage 5; the alignment tax reflects the capability-safety trade-off.</text>
</svg>