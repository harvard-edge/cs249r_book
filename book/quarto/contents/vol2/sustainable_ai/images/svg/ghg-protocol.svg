<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs><rect x="10" y="10" width="660" height="440" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ── Three concentric circles ── -->
  <!-- Scope 3 (outermost, blue) -->
  <circle cx="340" cy="215" r="190" fill="#cfe2f3" opacity="0.55" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Scope 2 (middle, orange) -->
  <circle cx="340" cy="215" r="135" fill="#fdebd0" opacity="0.70" stroke="#c87b2a" stroke-width="2.5"/>

  <!-- Scope 1 (innermost, red) -->
  <circle cx="340" cy="215" r="78" fill="#f9d6d5" opacity="0.85" stroke="#c44" stroke-width="2.5"/>

  <!-- Center: Data Center icon -->
  <rect x="314" y="192" width="52" height="40" fill="#555" stroke="#333" stroke-width="1.5"/>
  <!-- Server racks inside -->
  <rect x="318" y="197" width="20" height="6" fill="#cfe2f3"/>
  <rect x="318" y="206" width="20" height="6" fill="#cfe2f3"/>
  <rect x="318" y="215" width="20" height="6" fill="#d4edda"/>
  <rect x="341" y="197" width="20" height="6" fill="#cfe2f3"/>
  <rect x="341" y="206" width="20" height="6" fill="#d4edda"/>
  <rect x="341" y="215" width="20" height="6" fill="#fdebd0"/>
  <!-- Antenna on top -->
  <line x1="340" y1="192" x2="340" y2="182" stroke="#555" stroke-width="1.5"/>
  <circle cx="340" cy="180" r="3" fill="#555"/>

  <!-- Center label -->
  <text x="340" y="248" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">Data Center</text>
  <text x="340" y="260" text-anchor="middle" font-size="9" fill="#555">/ AI System</text>

  <!-- ── Scope 1 Label ── -->
  <text x="340" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31f34">Scope 1</text>
  <text x="352.0" y="191" text-anchor="middle" font-size="10" fill="#c44">Direct Emissions</text>

  <!-- ── Scope 1 Examples (callout right) ── -->
  <line x1="408" y1="215" x2="455" y2="215" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="457" y="192" width="155" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="534.5" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#a31f34">Scope 1 — Direct</text>
  <text x="534.5" y="224" text-anchor="middle" font-size="10" fill="#c44">On-site diesel generators</text>
  <text x="534.5" y="236" text-anchor="middle" font-size="10" fill="#c44">Backup power, company vehicles</text>

  <!-- ── Scope 2 Label ── -->
  <text x="215" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Scope 2</text>
  <text x="215" y="188" text-anchor="middle" font-size="10" fill="#c87b2a">Indirect Energy</text>

  <!-- ── Scope 2 Examples (callout left) ── -->
  <line x1="255" y1="215" x2="205" y2="240" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="20" y="228" width="180" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="110" y="246" text-anchor="middle" font-size="10" font-weight="bold" fill="#c87b2a">Scope 2 — Indirect</text>
  <text x="110" y="260" text-anchor="middle" font-size="10" fill="#c87b2a">Grid electricity purchased</text>
  <text x="110" y="272" text-anchor="middle" font-size="10" fill="#c87b2a">Cooling system power</text>

  <!-- ── Scope 3 Label ── -->
  <text x="340" y="56" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Scope 3 — Value Chain Emissions</text>

  <!-- ── Scope 3 Examples — distributed around outer ring ── -->
  <!-- Top-left: Supply chain -->
  <line x1="232" y1="98" x2="195" y2="72" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="24" y="55" width="168" height="32" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="108" y="70" text-anchor="middle" font-size="10" fill="#4a90c4">Supply chain manufacturing</text>
  <text x="108" y="82" text-anchor="middle" font-size="10" fill="#4a90c4">chips, servers, cooling units</text>

  <!-- Top-right: Embodied carbon -->
  <line x1="448" y1="98" x2="485" y2="72" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="488" y="55" width="165" height="32" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="570.5" y="70" text-anchor="middle" font-size="10" fill="#4a90c4">Embodied carbon in hardware</text>
  <text x="570.5" y="82" text-anchor="middle" font-size="10" fill="#4a90c4">GPU, memory, PCBs</text>

  <!-- Bottom: Employee travel + data disposal -->
  <line x1="340" y1="405" x2="340" y2="385" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="175" y="380" width="330" height="36" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="352.0" y="396" text-anchor="middle" font-size="10" fill="#4a90c4">Employee travel · data disposal</text>
  <text x="352.0" y="410" text-anchor="middle" font-size="10" fill="#4a90c4">end-of-life recycling</text>

  <!-- Bottom annotation -->
  <rect x="30" y="430" width="620" height="22" fill="#e0e0e0"/>
  <text x="340" y="445" text-anchor="middle" font-size="11" fill="#555">Most AI emissions: Scope 2 (grid electricity for training/inference) and Scope 3 (hardware manufacturing)</text>
</svg>