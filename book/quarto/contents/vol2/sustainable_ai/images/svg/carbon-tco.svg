<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow-tco" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Gridlines -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="90" y1="301.3" x2="580" y2="301.3"/>  <!-- $1M -->
    <line x1="90" y1="262.5" x2="580" y2="262.5"/>  <!-- $2M -->
    <line x1="90" y1="223.8" x2="580" y2="223.8"/>  <!-- $3M -->
    <line x1="90" y1="185.0" x2="580" y2="185.0"/>  <!-- $4M -->
    <line x1="90" y1="146.3" x2="580" y2="146.3"/>  <!-- $5M -->
    <line x1="90" y1="107.5" x2="580" y2="107.5"/>  <!-- $6M -->
    <line x1="90" y1="68.8" x2="580" y2="68.8"/>    <!-- $7M -->
  </g>

  <!-- Axes -->
  <line x1="90" y1="340" x2="580" y2="340" stroke="#333" stroke-width="1.2"/>
  <line x1="90" y1="30" x2="90" y2="340" stroke="#333" stroke-width="1.2"/>

  <!-- Y-axis labels -->
  <g font-size="9" fill="#555" text-anchor="end">
    <text x="84" y="344">$0</text>
    <text x="84" y="305">$1M</text>
    <text x="84" y="266">$2M</text>
    <text x="84" y="227">$3M</text>
    <text x="84" y="189">$4M</text>
    <text x="84" y="150">$5M</text>
    <text x="84" y="111">$6M</text>
    <text x="84" y="72">$7M</text>
  </g>
  <text x="22" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#333" transform="rotate(-90,22,185)">Cumulative TCO (USD)</text>

  <!-- X-axis labels -->
  <text x="335" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Year of Operation</text>

  <!-- Stacked bar data -->
  <!-- Year 1 -->
  <rect x="115" y="216" width="70" height="124" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="4"/>
  <rect x="115" y="192.75" width="70" height="23.25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <rect x="115" y="185" width="70" height="7.75" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <rect x="115" y="183.1" width="70" height="1.9" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="150" y="285" text-anchor="middle" font-size="9" font-weight="700" fill="#333">HW $3.2M</text>
  <text x="150" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Year 1</text>

  <!-- Year 2 -->
  <rect x="205" y="316.75" width="70" height="23.25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <rect x="205" y="309" width="70" height="7.75" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <rect x="205" y="305.9" width="70" height="3.1" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="240" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Year 2</text>

  <!-- Year 3 -->
  <rect x="295" y="316.75" width="70" height="23.25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <rect x="295" y="309" width="70" height="7.75" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <rect x="295" y="304.4" width="70" height="4.6" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="330" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Year 3</text>

  <!-- Year 4 -->
  <rect x="385" y="316.75" width="70" height="23.25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <rect x="385" y="309" width="70" height="7.75" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <rect x="385" y="302.0" width="70" height="7.0" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="420" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Year 4</text>

  <!-- Year 5 -->
  <rect x="475" y="316.75" width="70" height="23.25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <rect x="475" y="307.1" width="70" height="9.65" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <rect x="475" y="297.4" width="70" height="9.7" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="510" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Year 5</text>

  <!-- Carbon cost growth annotation -->
  <line x1="148" y1="183" x2="510" y2="297" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="395" y="250.0" font-size="9" font-weight="700" fill="#3d9e5a" transform="rotate(16,395,260)">Carbon cost rising 5x</text>

  <!-- Legend -->
  <rect x="90" y="38" width="215" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="100" y="54" font-size="10" font-weight="700" fill="#333">256-GPU H100 Cluster TCO</text>
  <rect x="100" y="62" width="12" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6" rx="4"/>
  <text x="118" y="71.0" font-size="9" fill="#555">Hardware (CapEx)</text>
  <rect x="100" y="76" width="12" height="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.6" rx="4"/>
  <text x="118" y="85" font-size="9" fill="#555">Electricity (OpEx)</text>
  <rect x="205" y="62" width="12" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="0.6" rx="4"/>
  <text x="223" y="71.0" font-size="9" fill="#555">Cooling (OpEx)</text>
  <rect x="205" y="76" width="12" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.6" rx="4"/>
  <text x="223" y="85" font-size="9" fill="#555">Carbon Tax (OpEx)</text>

  <!-- Cumulative total line -->
  <polyline points="150,183 240,149.1 330,113.5 420,75.4 510,32.8" fill="none" stroke="#333" stroke-width="1.8" stroke-dasharray="6,3"/>
  <g font-size="8.5" fill="#333">
    <text x="150" y="177" text-anchor="middle" font-weight="700">$4.1M</text>
    <text x="240" y="143" text-anchor="middle" font-weight="700">$4.9M</text>
    <text x="330" y="98.0" text-anchor="middle" font-weight="700">$5.9M</text>
    <text x="420" y="60.0" text-anchor="middle" font-weight="700">$6.8M</text>
    <text x="510" y="28" text-anchor="middle" font-weight="700">$7.9M</text>
  </g>

  <!-- Insight -->
  <rect x="340" y="160" width="226" height="28" fill="#fff" stroke="#a31f34" stroke-width="1" rx="4"/>
  <text x="453" y="172" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Hardware: front-loaded</text>
  <text x="453" y="183" text-anchor="middle" font-size="8.5" fill="#555">Energy + carbon: recurring and growing</text>

  <!-- Source -->
  <text x="580" y="412" text-anchor="end" font-size="9" fill="#999" font-style="italic">Illustrative 256xH100 cluster, US avg grid</text>
</svg>