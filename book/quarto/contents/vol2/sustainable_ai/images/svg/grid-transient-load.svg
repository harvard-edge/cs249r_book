<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 560">
  <rect width="840" height="560" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- Background grid -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="190" y1="450" x2="770" y2="450"/>
    <line x1="190" y1="400" x2="770" y2="400"/>
    <line x1="190" y1="350" x2="770" y2="350"/>
    <line x1="190" y1="300" x2="770" y2="300"/>
    <line x1="190" y1="250" x2="770" y2="250"/>
    <line x1="190" y1="200" x2="770" y2="200"/>
    <line x1="190" y1="150" x2="770" y2="150"/>
  </g>

  <!-- Phase separator dashed verticals -->
  <line x1="310" y1="150" x2="310" y2="450" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="1.2"/>
  <line x1="610" y1="150" x2="610" y2="450" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="1.2"/>

  <!-- Y-axis labels -->
  <g font-size="10" fill="#555" text-anchor="end">
    <text x="180" y="454">0%</text>
    <text x="180" y="404">20%</text>
    <text x="180" y="354">40%</text>
    <text x="180" y="304">60%</text>
    <text x="180" y="254">80%</text>
    <text x="180" y="204">100%</text>
    <text x="180" y="154">120%</text>
  </g>
  <text x="40" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90,40,300)">Power Draw (% TDP)</text>

  <!-- GPU Compute Power (blue filled area) -->
  <polygon points="190,450 310,200 610,200 690,400 710,450 750,450" fill="#cfe2f3" opacity="0.7" stroke="none"/>
  <polyline points="190,450 310,200 610,200 690,400 710,450 750,450" fill="none" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- Cooling Overhead (orange filled area) -->
  <polygon points="190,450 310,130 610,130 610,200 310,200 190,450" fill="#fdebd0" opacity="0.75" stroke="none"/>
  <polyline points="190,450 310,130 610,130" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2"/>

  <!-- Cooling overhead label -->
  <text x="460" y="169" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">+ Cooling Overhead (~30%)</text>

  <!-- Axes -->
  <line x1="190" y1="450" x2="770" y2="450" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="450" x2="190" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="510" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Time (Training Cluster Startup Sequence)</text>

  <!-- Phase labels -->
  <text x="250" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Ramp-Up</text>
  <text x="460" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Steady State</text>
  <text x="680" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Ramp-Down</text>

  <!-- Annotations -->
  
  <!-- Thousands of GPUs -->
  <rect x="20" y="295" width="150" height="80" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.2"/>
  <text x="95" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Thousands of GPUs</text>
  <text x="95" y="335" text-anchor="middle" font-size="10" fill="#555">starting simultaneously</text>
  <text x="95" y="355" text-anchor="middle" font-size="10" fill="#c44">dI/dt exceeds grid limit</text>
  <path d="M 170 335 H 245" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Voltage Spike Risk Zone -->
  <rect x="190" y="70" width="120" height="60" fill="#f9d6d5" opacity="0.7" stroke="#c44" stroke-width="1.2"/>
  <text x="250" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Voltage Spike</text>
  <text x="250" y="116" text-anchor="middle" font-size="10" fill="#c44">Risk Zone</text>
  <path d="M 250 130 V 325" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Steady Training Load -->
  <rect x="330" y="20" width="160" height="80" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="410" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Steady Training Load</text>
  <text x="410" y="60" text-anchor="middle" font-size="10" fill="#4a90c4">~100% TDP × GPU count</text>
  <text x="410" y="76" text-anchor="middle" font-size="10" fill="#555">24/7 inflexible draw</text>
  <path d="M 410 100 V 200" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Legend -->
  <rect x="630" y="30" width="190" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="640" y="50" font-size="10" font-weight="700" fill="#333">Legend</text>
  <rect x="640" y="60" width="20" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="670" y="70" font-size="10" fill="#555">GPU Compute Power</text>
  <rect x="640" y="80" width="20" height="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="90" font-size="10" fill="#555">Cooling Overhead</text>
  <rect x="640" y="100" width="20" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="670" y="110" font-size="10" fill="#555">Voltage Spike Risk Zone</text>

  <!-- Bottom footnote -->
  <text x="460" y="540" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Simultaneous GPU startup creates rapid dI/dt transients that can exceed grid protection limits; clusters must stagger startup sequences to prevent voltage collapse.</text>
</svg>