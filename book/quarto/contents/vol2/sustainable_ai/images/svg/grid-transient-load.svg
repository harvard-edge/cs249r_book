<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Chart area: left=80, right=640, top=55, bottom=330 ===== -->
  <!-- X: time 0..100 (arbitrary units), xMap(t)=80+t*5.6=80+560*t/100 -->
  <!-- Y: power 0..120% TDP, yMap(p)=330-(p/120)*275 -->

  <!-- ── Background grid ── -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="80" y1="330" x2="640" y2="330"/>
    <line x1="80" y1="284" x2="640" y2="284"/>
    <line x1="80" y1="238" x2="640" y2="238"/>
    <line x1="80" y1="192" x2="640" y2="192"/>
    <line x1="80" y1="146" x2="640" y2="146"/>
    <line x1="80" y1="100" x2="640" y2="100"/>
    <line x1="80" y1="55" x2="640" y2="55"/>
  </g>

  <!-- ── Phase separator dashed verticals ── -->
  <!-- Ramp-up ends at t=20 → x=80+112=192 -->
  <!-- Steady-state ends at t=75 → x=80+420=500 -->
  <line x1="192" y1="55" x2="192" y2="330" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="500" y1="55" x2="500" y2="330" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ── Y-axis labels ── -->
  <g font-size="9" fill="#555" text-anchor="end">
    <text x="74" y="334">0%</text>
    <text x="74" y="288">20%</text>
    <text x="74" y="242">40%</text>
    <text x="74" y="196">60%</text>
    <text x="74" y="150">80%</text>
    <text x="74" y="104">100%</text>
    <text x="74" y="59">120%</text>
  </g>
  <text x="18" y="192" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90,18,192)">Power Draw (% TDP)</text>

  <!-- ── Axes ── -->
  <line x1="80" y1="330" x2="648" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="330" x2="80" y2="47" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="418" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Time (Training Cluster Startup Sequence)</text>

  <!-- ── Phase labels ── -->
  <text x="136" y="345" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Ramp-Up</text>
  <text x="346" y="345" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Steady State</text>
  <text x="570" y="345" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Ramp-Down</text>

  <!-- == GPU Compute Power (blue filled area) == -->
  <!-- Ramp-up: t=0 (x=80,y=330,power=0%) to t=20 (x=192,y=100,power=100%) -->
  <!-- Steady: t=20 (x=192,y=100) to t=75 (x=500,y=100) -->
  <!-- Ramp-down: t=75 (x=500,y=100) to t=90 (x=584,y=284,power=20%) to t=100 (x=640,y=330,power=0%) -->
  <polygon points="80,330 192,100 500,100 584,284 640,330" fill="#cfe2f3" opacity="0.7" stroke="none"/>
  <polyline points="80,330 192,100 500,100 584,284 640,330" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- == Cooling Overhead (orange filled area, stacked above GPU compute) == -->
  <!-- Cooling = ~30% of compute power, stacked on top -->
  <!-- Ramp-up: adds 30%*power above the compute curve -->
  <!-- At t=0: cooling=0, at t=20: cooling=30% → y(100%+30%)=y(130%)=55-... clamp at 55 -->
  <!-- Cooling peak: 100%*0.3=30% extra → y(130%) would be off chart, show as stacked 30% at steady state -->
  <!-- Steady-state cooling top: y(130% of 100% TDP) → use 80% of chart → y=100-22=78... -->
  <!-- Simpler: cooling occupies from compute top to compute+30% -->
  <!-- At steady: compute=100%→y=100; cooling top=130%→y=55 (but capped). Show orange band from y=100 to y=78 (30% band) -->
  <polygon points="80,330 192,78 500,78 500,100 192,100 80,330" fill="#fdebd0" opacity="0.75" stroke="none"/>
  <polyline points="80,330 192,78 500,78" fill="none" stroke="#c87b2a" stroke-width="1.8" stroke-dasharray="5,2"/>

  <!-- == Voltage spike risk zone annotation == -->
  <!-- Red danger zone over ramp-up region -->
  <rect x="80" y="55" width="112" height="40" fill="#f9d6d5" opacity="0.7" stroke="#c44" stroke-width="1.2"/>
  <text x="136" y="72" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Voltage Spike</text>
  <text x="136" y="84" text-anchor="middle" font-size="8.5" fill="#c44">Risk Zone</text>

  <!-- Arrow pointing to steep ramp -->
  <line x1="136" y1="95" x2="155" y2="140" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- == Annotations == -->

  <!-- Ramp-up annotation box -->
  <rect x="85" y="165" width="100" height="46" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="135" y="180" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Thousands of GPUs</text>
  <text x="135" y="182.0" text-anchor="middle" font-size="8.5" fill="#555">starting simultaneously</text>
  <text x="135" y="204" text-anchor="middle" font-size="8.5" fill="#c44">dI/dt exceeds grid limit</text>

  <!-- Steady-state annotation box -->
  <rect x="210" y="112" width="158" height="44" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="289" y="127" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Steady Training Load</text>
  <text x="289" y="140" text-anchor="middle" font-size="8.5" fill="#4a90c4">~100% TDP × GPU count</text>
  <text x="289" y="142.0" text-anchor="middle" font-size="8.5" fill="#555">24/7 inflexible draw</text>

  <!-- Cooling overhead label -->
  <text x="346" y="91" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">+ Cooling Overhead (~30%)</text>

  <!-- Legend -->
  <rect x="430" y="158" width="200" height="72" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="440" y="174" font-size="9" font-weight="700" fill="#333">Legend</text>
  <rect x="440" y="180" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="460" y="190" font-size="8.5" fill="#555">GPU Compute Power</text>
  <rect x="440" y="196" width="14" height="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="460" y="206" font-size="8.5" fill="#555">Cooling Overhead</text>
  <rect x="440" y="212" width="14" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="460" y="222" font-size="8.5" fill="#555">Voltage Spike Risk Zone</text>

  <!-- Bottom footnote -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Simultaneous GPU startup creates rapid dI/dt transients that can exceed grid protection limits; clusters must stagger startup sequences to prevent voltage collapse.</text>
</svg>