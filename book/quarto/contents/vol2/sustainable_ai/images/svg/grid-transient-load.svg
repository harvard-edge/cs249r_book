<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ── Background grid ── -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="80" y1="350" x2="640" y2="350"/>
    <line x1="80" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="250" x2="640" y2="250"/>
    <line x1="80" y1="200" x2="640" y2="200"/>
    <line x1="80" y1="150" x2="640" y2="150"/>
    <line x1="80" y1="100" x2="640" y2="100"/>
    <line x1="80" y1="50" x2="640" y2="50"/>
  </g>

  <!-- ── Phase separator dashed verticals ── -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="1.2"/>
  <line x1="500" y1="50" x2="500" y2="350" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="1.2"/>

  <!-- ── Y-axis labels ── -->
  <g font-size="10" fill="#555" text-anchor="end">
    <text x="70" y="354">0%</text>
    <text x="70" y="304">20%</text>
    <text x="70" y="254">40%</text>
    <text x="70" y="204">60%</text>
    <text x="70" y="154">80%</text>
    <text x="70" y="104">100%</text>
    <text x="70" y="54">120%</text>
  </g>
  <text x="20" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90,20,200)">Power Draw (% TDP)</text>

  <!-- == GPU Compute Power (blue filled area) == -->
  <polygon points="80,350 200,100 500,100 580,300 600,350 640,350" fill="#cfe2f3" opacity="0.7" stroke="none"/>
  <polyline points="80,350 200,100 500,100 580,300 600,350 640,350" fill="none" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- == Cooling Overhead (orange filled area) == -->
  <polygon points="80,350 200,30 500,30 500,100 200,100 80,350" fill="#fdebd0" opacity="0.75" stroke="none"/>
  <polyline points="80,350 200,30 500,30" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2"/>

  <!-- ── Axes ── -->
  <line x1="80" y1="350" x2="660" y2="350" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="80" y1="350" x2="80" y2="30" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Time (Training Cluster Startup Sequence)</text>

  <!-- ── Phase labels ── -->
  <text x="140" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Ramp-Up</text>
  <text x="350" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Steady State</text>
  <text x="570" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Ramp-Down</text>

  <!-- == Voltage spike risk zone annotation == -->
  <rect x="80" y="40" width="120" height="60" rx="4" fill="#f9d6d5" opacity="0.7" stroke="#c44" stroke-width="1.2"/>
  <text x="140" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Voltage Spike</text>
  <text x="140" y="80" text-anchor="middle" font-size="10" fill="#c44">Risk Zone</text>
  <path d="M 140 100 V 225" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- == Annotations == -->
  <rect x="90" y="130" width="150" height="80" rx="4" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.2"/>
  <text x="165" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Thousands of GPUs</text>
  <text x="165" y="170" text-anchor="middle" font-size="10" fill="#555">starting simultaneously</text>
  <text x="165" y="190" text-anchor="middle" font-size="10" fill="#c44">dI/dt exceeds grid limit</text>

  <rect x="250" y="140" width="160" height="80" rx="4" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="330" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Steady Training Load</text>
  <text x="330" y="180" text-anchor="middle" font-size="10" fill="#4a90c4">~100% TDP × GPU count</text>
  <text x="330" y="200" text-anchor="middle" font-size="10" fill="#555">24/7 inflexible draw</text>

  <!-- Cooling overhead label -->
  <text x="350" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">+ Cooling Overhead (~30%)</text>

  <!-- Legend -->
  <rect x="430" y="140" width="190" height="100" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="440" y="160" font-size="10" font-weight="700" fill="#333">Legend</text>
  <rect x="440" y="170" width="20" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="470" y="180" font-size="10" fill="#555">GPU Compute Power</text>
  <rect x="440" y="190" width="20" height="10" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="470" y="200" font-size="10" fill="#555">Cooling Overhead</text>
  <rect x="440" y="210" width="20" height="10" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="470" y="220" font-size="10" fill="#555">Voltage Spike Risk Zone</text>

  <!-- Bottom footnote -->
  <text x="340" y="440" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Simultaneous GPU startup creates rapid dI/dt transients that can exceed grid protection limits; clusters must stagger startup sequences to prevent voltage collapse.</text>
</svg>