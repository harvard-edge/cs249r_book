<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <linearGradient id="green-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d9e5a"/>
      <stop offset="100%" stop-color="#2d7a44"/>
    </linearGradient>
    <linearGradient id="yellow-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="red-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c44"/>
      <stop offset="100%" stop-color="#a31f34"/>
    </linearGradient>
  </defs>

  <!-- ===== Chart area: left=110, right=650, top=50, bottom=360 ===== -->
  <!-- Y: 0..900 gCO2/kWh, yMap(v) = 360 - v/900*310 -->
  <!-- 7 bars, width=62, gap=15, start x=125, center spacing=77 -->

  <!-- ── Gridlines ── -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="110" y1="325.6" x2="650" y2="325.6"/>
    <line x1="110" y1="291.1" x2="650" y2="291.1"/>
    <line x1="110" y1="256.7" x2="650" y2="256.7"/>
    <line x1="110" y1="222.2" x2="650" y2="222.2"/>
    <line x1="110" y1="187.8" x2="650" y2="187.8"/>
    <line x1="110" y1="153.3" x2="650" y2="153.3"/>
    <line x1="110" y1="118.9" x2="650" y2="118.9"/>
    <line x1="110" y1="84.4" x2="650" y2="84.4"/>
  </g>

  <!-- ── Axes ── -->
  <line x1="110" y1="360" x2="650" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="110" y1="50" x2="110" y2="360" stroke="#333" stroke-width="1.2"/>

  <!-- ── Y-axis labels ── -->
  <g font-size="9" fill="#555" text-anchor="end">
    <text x="104" y="364">0</text>
    <text x="104" y="330">100</text>
    <text x="104" y="295">200</text>
    <text x="104" y="261">300</text>
    <text x="104" y="226">400</text>
    <text x="104" y="192">500</text>
    <text x="104" y="157">600</text>
    <text x="104" y="123">700</text>
    <text x="104" y="88">800</text>
  </g>
  <text x="28" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#333"
        transform="rotate(-90,28,205)">Carbon Intensity (gCO&#x2082;/kWh)</text>

  <!-- ── Green threshold reference line ── -->
  <line x1="110" y1="325.6" x2="650" y2="325.6" stroke="#3d9e5a" stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="646" y="323" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="end">"Green"</text>
  <text x="646" y="333" font-size="8" fill="#3d9e5a" text-anchor="end">threshold</text>

  <!-- ── Bars (7 regions) ── -->
  <!-- Centers: 156, 233, 310, 387, 464, 541, 618 -->

  <!-- Norway: 23 gCO2/kWh, h=23/900*310=7.9, y=360-7.9=352.1 -->
  <rect x="125" y="352.1" width="62" height="7.9" rx="2" fill="url(#green-bar)" stroke="#2d7a44" stroke-width="0.8"/>
  <text x="156" y="348" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">23</text>
  <text x="156" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Norway</text>
  <text x="156" y="388" text-anchor="middle" font-size="8" fill="#555">Hydro</text>

  <!-- France: 85 gCO2/kWh, h=85/900*310=29.3, y=330.7 -->
  <rect x="202" y="330.7" width="62" height="29.3" rx="2" fill="url(#green-bar)" stroke="#2d7a44" stroke-width="0.8"/>
  <text x="233" y="327" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">85</text>
  <text x="233" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">France</text>
  <text x="233" y="388" text-anchor="middle" font-size="8" fill="#555">Nuclear</text>

  <!-- California: 210 gCO2/kWh, h=72.3, y=287.7 -->
  <rect x="279" y="287.7" width="62" height="72.3" rx="2" fill="url(#yellow-bar)" stroke="#b8860b" stroke-width="0.8"/>
  <text x="310" y="284" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b8860b">210</text>
  <text x="310" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">California</text>
  <text x="310" y="388" text-anchor="middle" font-size="8" fill="#555">Mixed</text>

  <!-- EU avg: 270 gCO2/kWh, h=93.0, y=267.0 -->
  <rect x="356" y="267.0" width="62" height="93.0" rx="2" fill="url(#yellow-bar)" stroke="#b8860b" stroke-width="0.8"/>
  <text x="387" y="263" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b8860b">270</text>
  <text x="387" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">EU Avg</text>
  <text x="387" y="388" text-anchor="middle" font-size="8" fill="#555">Mixed</text>

  <!-- US avg: 386 gCO2/kWh, h=132.9, y=227.1 -->
  <rect x="433" y="227.1" width="62" height="132.9" rx="2" fill="url(#yellow-bar)" stroke="#b8860b" stroke-width="0.8"/>
  <text x="464" y="223" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b8860b">386</text>
  <text x="464" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">US Avg</text>
  <text x="464" y="388" text-anchor="middle" font-size="8" fill="#555">Gas/Coal</text>

  <!-- China: 581 gCO2/kWh, h=200.1, y=159.9 -->
  <rect x="510" y="159.9" width="62" height="200.1" rx="2" fill="url(#red-bar)" stroke="#a31f34" stroke-width="0.8"/>
  <text x="541" y="156" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">581</text>
  <text x="541" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">China</text>
  <text x="541" y="388" text-anchor="middle" font-size="8" fill="#555">Coal-heavy</text>

  <!-- Poland: 773 gCO2/kWh, h=266.3, y=93.7 -->
  <rect x="587" y="93.7" width="62" height="266.3" rx="2" fill="url(#red-bar)" stroke="#a31f34" stroke-width="0.8"/>
  <text x="618" y="89" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">773</text>
  <text x="618" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Poland</text>
  <text x="618" y="388" text-anchor="middle" font-size="8" fill="#555">Coal</text>

  <!-- ── 33× annotation bracket ── -->
  <line x1="156" y1="352" x2="156" y2="60" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="618" y1="93" x2="618" y2="60" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="156" y1="60" x2="618" y2="60" stroke="#333" stroke-width="1"/>
  <text x="387" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">33× difference: same compute, 33× more carbon</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Sources: EIA 2023, IEA Ember 2024</text>
</svg>
