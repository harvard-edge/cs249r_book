<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- Background and Outer Boundary -->
  <rect width="720" height="520" fill="#fff"/>
  <rect x="10" y="10" width="700" height="500" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Title Annotation -->
  <text x="360" y="46" text-anchor="middle" font-size="12" fill="#999" font-style="italic">Semiconductor Fab Water Cycle — from Intake to Reclaim</text>

  <!-- PROCESS FLOW: ROW 1 -->
  <!-- Box 1: Raw Water Intake (Blue) -->
  <rect x="50" y="90" width="150" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="125" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Raw Water</text>
  <text x="125" y="131" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Intake</text>
  <text x="125" y="155" text-anchor="middle" font-size="10" fill="#4a90c4">River / municipal</text>
  <text x="125" y="169" text-anchor="middle" font-size="10" fill="#4a90c4">supply source</text>

  <!-- Box 2: UPW Treatment (Blue) -->
  <rect x="240" y="90" width="150" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="315" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Ultra-Pure Water</text>
  <text x="315" y="131" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">(UPW) Treatment</text>
  <text x="315" y="152" text-anchor="middle" font-size="10" fill="#4a90c4">Deionization</text>
  <text x="315" y="165" text-anchor="middle" font-size="10" fill="#4a90c4">Filtration · UV sterilization</text>
  <text x="315" y="178" text-anchor="middle" font-size="10" fill="#4a90c4">ppb purity required</text>

  <!-- Box 3: Fab Processing (Orange) -->
  <rect x="430" y="90" width="150" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="505" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Fab Processing</text>
  <text x="505" y="133" text-anchor="middle" font-size="10" fill="#c87b2a">Wafer cleaning</text>
  <text x="505" y="146" text-anchor="middle" font-size="10" fill="#c87b2a">Chemical-mechanical</text>
  <text x="505" y="159" text-anchor="middle" font-size="10" fill="#c87b2a">planarization (CMP)</text>
  <text x="505" y="172" text-anchor="middle" font-size="10" fill="#c87b2a">Chemical bath rinses</text>

  <!-- Evaporation Box (Red Accent) -->
  <rect x="620" y="90" width="70" height="70" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="655" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#a31f34">Lost</text>
  <text x="655" y="132" text-anchor="middle" font-size="10" fill="#c44">20–40%</text>
  <text x="655" y="145" text-anchor="middle" font-size="10" fill="#c44">evaporation</text>

  <!-- PROCESS FLOW: ROW 2 -->
  <!-- Box 4: Wastewater Treatment (Green) -->
  <rect x="360" y="250" width="220" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="470" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">Wastewater Treatment</text>
  <text x="470" y="292" text-anchor="middle" font-size="10" fill="#3d9e5a">Chemical neutralization</text>
  <text x="470" y="305" text-anchor="middle" font-size="10" fill="#3d9e5a">Filtration + settling</text>
  <text x="470" y="318" text-anchor="middle" font-size="10" fill="#3d9e5a">Quality testing before reuse</text>
  <text x="470" y="331" text-anchor="middle" font-size="10" fill="#3d9e5a">Contaminant removal</text>

  <!-- PRIMARY FLOW ARROWS (Orthogonal and Border-Touching) -->
  <line x1="200" y1="140" x2="240" y2="140" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="390" y1="140" x2="430" y2="140" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="505" y1="190" x2="505" y2="250" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="580" y1="140" x2="620" y2="140" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- RECYCLE FLOW PATH (Orthogonal Routing) -->
  <path d="M 360 300 H 270" fill="none" stroke="#3d9e5a" stroke-width="1.5"/>
  <path d="M 120 300 H 30 V 220 H 125 V 190" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  
  <!-- Recycle Label Overlay -->
  <rect x="120" y="282" width="150" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="195" y="298" text-anchor="middle" font-size="10" font-weight="bold" fill="#3d9e5a">60–80% recycled /</text>
  <text x="195" y="311" text-anchor="middle" font-size="10" fill="#3d9e5a">reclaimed on-site</text>

  <!-- INFORMATION PANELS (Bottom) -->
  <!-- Industry Stats (Neutral) -->
  <rect x="50" y="380" width="300" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="200" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Industry benchmark:</text>
  <text x="200" y="416" text-anchor="middle" font-size="11" fill="#555">1–3 gallons per cm² of silicon processed</text>
  <text x="200" y="432" text-anchor="middle" font-size="10" fill="#999">Modern fabs: significant water recovery programs</text>

  <!-- Purity Info (Routing Orange) -->
  <rect x="370" y="380" width="300" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="520" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#c87b2a">Why ultra-pure water matters:</text>
  <text x="520" y="416" text-anchor="middle" font-size="11" fill="#c87b2a">Trace ions destroy sub-nm transistors</text>
  <text x="520" y="432" text-anchor="middle" font-size="10" fill="#c87b2a">Resistivity target: 18.2 MΩ·cm</text>

  <!-- Footer Annotation (Neutral) -->
  <rect x="50" y="465" width="620" height="25" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="360" y="481" text-anchor="middle" font-size="10" fill="#555">Chip manufacturing is water-intensive — water stewardship is a key sustainability metric for AI hardware supply chains</text>
</svg>