<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- Background and Outer Boundary -->
  <rect width="700" height="500" fill="#fff"/>
  <rect x="10" y="10" width="680" height="480" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Title Annotation -->
  <text x="350" y="36" text-anchor="middle" font-size="12" fill="#999" font-style="italic">Semiconductor Fab Water Cycle — from Intake to Reclaim</text>

  <!-- PROCESS FLOW: ROW 1 -->
  <!-- Box 1: Raw Water Intake (Blue) -->
  <rect x="40" y="80" width="150" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Raw Water</text>
  <text x="115" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Intake</text>
  <text x="115" y="145" text-anchor="middle" font-size="10" fill="#4a90c4">River / municipal</text>
  <text x="115" y="159" text-anchor="middle" font-size="10" fill="#4a90c4">supply source</text>

  <!-- Box 2: UPW Treatment (Blue) -->
  <rect x="230" y="80" width="150" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="305" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Ultra-Pure Water</text>
  <text x="305" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">(UPW) Treatment</text>
  <text x="305" y="142" text-anchor="middle" font-size="10" fill="#4a90c4">Deionization</text>
  <text x="305" y="155" text-anchor="middle" font-size="10" fill="#4a90c4">Filtration · UV sterilization</text>
  <text x="305" y="168" text-anchor="middle" font-size="10" fill="#4a90c4">ppb purity required</text>

  <!-- Box 3: Fab Processing (Orange) -->
  <rect x="420" y="80" width="150" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="495" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Fab Processing</text>
  <text x="495" y="123" text-anchor="middle" font-size="10" fill="#c87b2a">Wafer cleaning</text>
  <text x="495" y="136" text-anchor="middle" font-size="10" fill="#c87b2a">Chemical-mechanical</text>
  <text x="495" y="149" text-anchor="middle" font-size="10" fill="#c87b2a">planarization (CMP)</text>
  <text x="495" y="162" text-anchor="middle" font-size="10" fill="#c87b2a">Chemical bath rinses</text>

  <!-- Evaporation Box (Red Accent) -->
  <rect x="610" y="80" width="70" height="70" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="645" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#a31f34">Lost</text>
  <text x="645" y="122" text-anchor="middle" font-size="10" fill="#c44">20–40%</text>
  <text x="645" y="135" text-anchor="middle" font-size="10" fill="#c44">evaporation</text>

  <!-- PROCESS FLOW: ROW 2 -->
  <!-- Box 4: Wastewater Treatment (Green) -->
  <rect x="350" y="240" width="220" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="460" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">Wastewater Treatment</text>
  <text x="460" y="282" text-anchor="middle" font-size="10" fill="#3d9e5a">Chemical neutralization</text>
  <text x="460" y="295" text-anchor="middle" font-size="10" fill="#3d9e5a">Filtration + settling</text>
  <text x="460" y="308" text-anchor="middle" font-size="10" fill="#3d9e5a">Quality testing before reuse</text>
  <text x="460" y="321" text-anchor="middle" font-size="10" fill="#3d9e5a">Contaminant removal</text>

  <!-- PRIMARY FLOW ARROWS (Orthogonal and Border-Touching) -->
  <line x1="190" y1="130" x2="230" y2="130" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="380" y1="130" x2="420" y2="130" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="495" y1="180" x2="495" y2="240" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="570" y1="130" x2="610" y2="130" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- RECYCLE FLOW PATH (Orthogonal Routing) -->
  <path d="M 350 290 H 20 V 210 H 115 V 180" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  
  <!-- Recycle Label Overlay -->
  <rect x="110" y="275" width="150" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="185" y="288" text-anchor="middle" font-size="10" font-weight="bold" fill="#3d9e5a">60–80% recycled /</text>
  <text x="185" y="301" text-anchor="middle" font-size="10" fill="#3d9e5a">reclaimed on-site</text>

  <!-- INFORMATION PANELS (Bottom) -->
  <!-- Industry Stats (Neutral) -->
  <rect x="40" y="370" width="300" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="190" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Industry benchmark:</text>
  <text x="190" y="406" text-anchor="middle" font-size="11" fill="#555">1–3 gallons per cm² of silicon processed</text>
  <text x="190" y="422" text-anchor="middle" font-size="10" fill="#999">Modern fabs: significant water recovery programs</text>

  <!-- Purity Info (Routing Orange) -->
  <rect x="360" y="370" width="300" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="510" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#c87b2a">Why ultra-pure water matters:</text>
  <text x="510" y="406" text-anchor="middle" font-size="11" fill="#c87b2a">Trace ions destroy sub-nm transistors</text>
  <text x="510" y="422" text-anchor="middle" font-size="10" fill="#c87b2a">Resistivity target: 18.2 MΩ·cm</text>

  <!-- Footer Annotation (Neutral) -->
  <rect x="40" y="455" width="620" height="25" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="350" y="471" text-anchor="middle" font-size="10" fill="#555">Chip manufacturing is water-intensive — water stewardship is a key sustainability metric for AI hardware supply chains</text>
</svg>