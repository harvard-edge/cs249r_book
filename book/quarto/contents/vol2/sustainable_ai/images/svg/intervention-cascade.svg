<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,2 L10,5 L0,8 Z" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Canvas Background -->
  <rect width="760" height="540" fill="#ffffff"/>

  <!-- Step 1 -->
  <rect x="40" y="30" width="180" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="55" y="54" font-size="12" font-weight="bold" fill="#333">1. Algorithm Efficiency</text>
  <text x="55" y="74" font-size="10" fill="#555">Highest-leverage intervention</text>

  <rect x="250" y="30" width="460" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="480" y="54" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">x100</text>
  <text x="480" y="74" text-anchor="middle" font-size="11" fill="#333">Pruning, quantization, MoE, distillation, sparse attention</text>

  <!-- Arrow 1 to 2 -->
  <line x1="450" y1="90" x2="450" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="40" y="110" width="180" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="55" y="134" font-size="12" font-weight="bold" fill="#333">2. Hardware Efficiency</text>
  <text x="55" y="154" font-size="10" fill="#555">GPU/TPU/ASIC specialization</text>

  <rect x="250" y="110" width="400" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="134" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">x10</text>
  <text x="450" y="154" text-anchor="middle" font-size="11" fill="#333">Specialized accelerators, process nodes, lower voltage</text>

  <!-- Arrow 2 to 3 -->
  <line x1="420" y1="170" x2="420" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="40" y="190" width="180" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="55" y="214" font-size="12" font-weight="bold" fill="#333">3. System Efficiency</text>
  <text x="55" y="234" font-size="10" fill="#555">Scheduling and batching</text>

  <rect x="250" y="190" width="340" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="420" y="214" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">x5</text>
  <text x="420" y="234" text-anchor="middle" font-size="11" fill="#333">Batching, pipelining, mixed precision, overlap</text>

  <!-- Arrow 3 to 4 -->
  <line x1="390" y1="250" x2="390" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="40" y="270" width="180" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="55" y="294" font-size="12" font-weight="bold" fill="#333">4. Datacenter PUE</text>
  <text x="55" y="314" font-size="10" fill="#555">Cooling and facility design</text>

  <rect x="250" y="270" width="280" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="390" y="294" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">x1.5</text>
  <text x="390" y="314" text-anchor="middle" font-size="11" fill="#333">PUE optimization, liquid cooling, heat reuse</text>

  <!-- Arrow 4 to 5 -->
  <line x1="360" y1="330" x2="360" y2="350" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="40" y="350" width="180" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="55" y="374" font-size="12" font-weight="bold" fill="#333">5. Carbon-Aware Sched.</text>
  <text x="55" y="394" font-size="10" fill="#555">Temporal and geographic shift</text>

  <rect x="250" y="350" width="220" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">x1.3</text>
  <text x="360" y="394" text-anchor="middle" font-size="11" fill="#333">Time-shift to low-carbon hours</text>

  <!-- Arrow 5 to 6 -->
  <line x1="330" y1="410" x2="330" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <rect x="40" y="430" width="180" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="55" y="454" font-size="12" font-weight="bold" fill="#333">6. Renewable Procurement</text>
  <text x="55" y="474" font-size="10" fill="#555">Energy source selection</text>

  <rect x="250" y="430" width="160" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="454" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">x1.1</text>
  <text x="330" y="474" text-anchor="middle" font-size="11" fill="#333">PPA / RECs</text>

  <!-- Combined Impact Annotation -->
  <rect x="550" y="330" width="160" height="80" rx="4" fill="#ffffff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="630" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31f34">Combined Impact</text>
  <text x="630" y="384" text-anchor="middle" font-size="18" font-weight="bold" fill="#a31f34">~10,000x</text>
  <text x="630" y="402" text-anchor="middle" font-size="10" fill="#555">potential reduction</text>

  <!-- Source -->
  <text x="710" y="520" text-anchor="end" font-size="10" fill="#777" font-style="italic">Intervention hierarchy based on Patterson et al. 2022</text>
</svg>