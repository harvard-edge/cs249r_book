<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow-cb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Gridlines -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <!-- Horizontal: 0.1, 1, 10, 100, 1000 -->
    <line x1="85" y1="355" x2="600" y2="355"/>
    <line x1="85" y1="273.75" x2="600" y2="273.75"/>
    <line x1="85" y1="192.5" x2="600" y2="192.5"/>
    <line x1="85" y1="111.25" x2="600" y2="111.25"/>
    <line x1="85" y1="30" x2="600" y2="30"/>
    <!-- Vertical: 70, 75, 80, 85, 90, 95, 100 -->
    <line x1="85" y1="30" x2="85" y2="355"/>
    <line x1="170.8" y1="30" x2="170.8" y2="355"/>
    <line x1="256.7" y1="30" x2="256.7" y2="355"/>
    <line x1="342.5" y1="30" x2="342.5" y2="355"/>
    <line x1="428.3" y1="30" x2="428.3" y2="355"/>
    <line x1="514.2" y1="30" x2="514.2" y2="355"/>
    <line x1="600" y1="30" x2="600" y2="355"/>
  </g>

  <!-- Axes -->
  <line x1="85" y1="355" x2="600" y2="355" stroke="#333" stroke-width="1.2"/>
  <line x1="85" y1="30" x2="85" y2="355" stroke="#333" stroke-width="1.2"/>

  <!-- Efficiency zone shading -->
  <rect x="280" y="250" width="170" height="105" fill="#d4edda" fill-opacity="0.2" stroke="#3d9e5a" stroke-width="0.8" stroke-dasharray="4,2" rx="4"/>
  <text x="365" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Efficiency Zone</text>

  <!-- Pareto frontier -->
  <path d="M308,313 Q340,305 377,282 Q410,250 445,217 Q460,200 462,87" fill="none" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Y-axis labels -->
  <g font-size="9" fill="#555" text-anchor="end">
    <text x="79" y="359">0.1</text>
    <text x="79" y="277">1</text>
    <text x="79" y="196">10</text>
    <text x="79" y="115">100</text>
    <text x="79" y="34">1,000</text>
  </g>
  <text x="35" y="192.5" text-anchor="middle" font-size="11" font-weight="600" fill="#333" transform="rotate(-90,35,192.5)">CO₂ per Inference (mg, log)</text>

  <!-- X-axis labels -->
  <g font-size="9" fill="#555" text-anchor="middle">
    <text x="85" y="372">70</text>
    <text x="170.8" y="372">75</text>
    <text x="256.7" y="372">80</text>
    <text x="342.5" y="372">85</text>
    <text x="428.3" y="372">90</text>
    <text x="514.2" y="372">95</text>
    <text x="600" y="372">100</text>
  </g>
  <text x="342" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Task Accuracy (%)</text>

  <!-- Model data points -->
  <!-- Small efficient models (low CO2, high accuracy) - green -->
  <circle cx="377" cy="282" r="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="387" y="285" font-size="9" font-weight="700" fill="#3d9e5a">DistilBERT</text>

  <circle cx="325" cy="306" r="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="335" y="309" font-size="9" font-weight="700" fill="#3d9e5a">TinyBERT</text>

  <circle cx="308" cy="313" r="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="298" y="316" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="end">MobileBERT</text>

  <!-- Medium models - blue -->
  <circle cx="411" cy="235" r="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="421" y="238" font-size="9" font-weight="700" fill="#4a90c4">BERT-base</text>

  <circle cx="445" cy="217" r="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="455" y="220" font-size="9" font-weight="700" fill="#4a90c4">RoBERTa</text>

  <circle cx="437" cy="200" r="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="427" y="203" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="end">BERT-large</text>

  <!-- Large wasteful models - red/pink -->
  <circle cx="462" cy="87" r="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="472" y="90" font-size="9.5" font-weight="700" fill="#c44">GPT-3 175B</text>

  <circle cx="480" cy="55" r="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="490" y="58" font-size="9.5" font-weight="700" fill="#c44">PaLM 540B</text>

  <circle cx="497" cy="38" r="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="507" y="41" font-size="9.5" font-weight="700" fill="#c44">GPT-4 (est.)</text>

  <!-- Pareto frontier labels -->
  <text x="490" y="152" font-size="10" font-weight="700" fill="#a31f34">Pareto</text>
  <text x="490" y="163" font-size="10" font-weight="700" fill="#a31f34">Frontier</text>

  <!-- Not Pareto-optimal annotation -->
  <path d="M 480 60 L 480 70 L 375 70 L 375 120" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="310" y="120" width="130" height="22" fill="#fff" stroke="#999" stroke-width="0.8" rx="4"/>
  <text x="375" y="134" text-anchor="middle" font-size="8.5" fill="#555">10x CO₂ for +1% accuracy</text>

  <!-- Legend -->
  <rect x="92" y="38" width="195" height="65" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <circle cx="105" cy="52" r="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="116" y="55" font-size="9" fill="#333">Small efficient models</text>
  <circle cx="105" cy="68" r="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="116" y="71" font-size="9" fill="#333">Medium models</text>
  <circle cx="105" cy="84" r="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="116" y="87" font-size="9" fill="#333">Large frontier models</text>

  <!-- Source -->
  <text x="600" y="412" text-anchor="end" font-size="9" fill="#999" font-style="italic">Illustrative data; relative magnitudes from Strubell et al. 2019, Patterson et al. 2021</text>
</svg>