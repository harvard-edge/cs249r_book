<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 690 530" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="690" height="530" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>
  </defs>

  <rect x="10" y="10" width="670" height="500" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>

  <!-- Lifecycle header arrow spanning all stages -->
  <text x="345" y="40" text-anchor="middle" font-size="12" fill="#555" font-weight="bold">Total Lifecycle Impact = Design + Manufacture + Use + Disposal</text>
  <path d="M 105 70 L 105 50 L 585 50 L 585 70" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STAGE BOXES (horizontal flow) ── -->
  <!-- Stage 1: Design (green) -->
  <rect x="30" y="70" width="150" height="170" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="105" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">Design</text>
  <line x1="40" y1="100" x2="170" y2="100" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="105" y="120" text-anchor="middle" font-size="10" fill="#3d9e5a">Architecture choices</text>
  <text x="105" y="134" text-anchor="middle" font-size="10" fill="#3d9e5a">Model size decisions</text>
  <text x="105" y="148" text-anchor="middle" font-size="10" fill="#3d9e5a">Hardware selection</text>
  <text x="105" y="162" text-anchor="middle" font-size="10" fill="#3d9e5a">Efficiency targets</text>
  <text x="105" y="176" text-anchor="middle" font-size="10" fill="#3d9e5a">PUE planning</text>
  <text x="105" y="190" text-anchor="middle" font-size="10" fill="#3d9e5a">Location / grid mix</text>
  <text x="105" y="204" text-anchor="middle" font-size="10" fill="#3d9e5a">Cooling strategy</text>
  <text x="105" y="220" text-anchor="middle" font-size="10" fill="#3d9e5a">Workload profiling</text>

  <!-- Stage 2: Manufacture (blue) -->
  <rect x="190" y="70" width="150" height="170" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="265" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Manufacture</text>
  <line x1="200" y1="100" x2="330" y2="100" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="265" y="120" text-anchor="middle" font-size="10" fill="#4a90c4">Chip fabrication</text>
  <text x="265" y="134" text-anchor="middle" font-size="10" fill="#4a90c4">Water &amp; energy intensive</text>
  <text x="265" y="148" text-anchor="middle" font-size="10" fill="#4a90c4">Chemical processes</text>
  <text x="265" y="162" text-anchor="middle" font-size="10" fill="#4a90c4">Server assembly</text>
  <text x="265" y="176" text-anchor="middle" font-size="10" fill="#4a90c4">Supply chain transport</text>
  <text x="265" y="190" text-anchor="middle" font-size="10" fill="#4a90c4">Packaging materials</text>
  <text x="265" y="204" text-anchor="middle" font-size="10" fill="#4a90c4">Quality testing</text>
  <text x="265" y="220" text-anchor="middle" font-size="10" fill="#4a90c4">Logistics &amp; delivery</text>

  <!-- Stage 3: Use (orange) -->
  <rect x="350" y="70" width="150" height="170" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="425" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Use</text>
  <line x1="360" y1="100" x2="490" y2="100" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="425" y="120" text-anchor="middle" font-size="10" fill="#c87b2a">Training energy (GPU-h)</text>
  <text x="425" y="134" text-anchor="middle" font-size="10" fill="#c87b2a">Inference power draw</text>
  <text x="425" y="148" text-anchor="middle" font-size="10" fill="#c87b2a">Cooling overhead (PUE)</text>
  <text x="425" y="162" text-anchor="middle" font-size="10" fill="#c87b2a">Storage I/O energy</text>
  <text x="425" y="176" text-anchor="middle" font-size="10" fill="#c87b2a">Network transmission</text>
  <text x="425" y="190" text-anchor="middle" font-size="10" fill="#c87b2a">Retraining cycles</text>
  <text x="425" y="204" text-anchor="middle" font-size="10" fill="#c87b2a">Monitoring overhead</text>
  <text x="425" y="220" text-anchor="middle" font-size="10" fill="#c87b2a">Idle power baseline</text>

  <!-- Stage 4: Disposal (red) -->
  <rect x="510" y="70" width="150" height="170" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="585" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31f34">Disposal</text>
  <line x1="520" y1="100" x2="650" y2="100" stroke="#c44" stroke-width="1.2"/>
  <text x="585" y="120" text-anchor="middle" font-size="10" fill="#a31f34">E-waste generation</text>
  <text x="585" y="134" text-anchor="middle" font-size="10" fill="#c44">Rare earth recovery</text>
  <text x="585" y="148" text-anchor="middle" font-size="10" fill="#c44">Toxic material disposal</text>
  <text x="585" y="162" text-anchor="middle" font-size="10" fill="#c44">Recycling rates (&lt;20%)</text>
  <text x="585" y="176" text-anchor="middle" font-size="10" fill="#c44">Refurbishment / reuse</text>
  <text x="585" y="190" text-anchor="middle" font-size="10" fill="#c44">Export to dev. nations</text>
  <text x="585" y="204" text-anchor="middle" font-size="10" fill="#c44">Landfill impact</text>
  <text x="585" y="220" text-anchor="middle" font-size="10" fill="#c44">Data destruction</text>

  <!-- Flow arrows between stages -->
  <line x1="180" y1="155" x2="190" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="155" x2="350" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="155" x2="510" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Impact Category Icons (below each stage box) ── -->
  <rect x="60" y="260" width="90" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="105" y="278" text-anchor="middle" font-size="12" fill="#3d9e5a">⚙</text>
  <text x="105" y="292" text-anchor="middle" font-size="9" fill="#3d9e5a">System</text>
  <text x="105" y="302" text-anchor="middle" font-size="9" fill="#3d9e5a">Choices</text>

  <rect x="220" y="260" width="90" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="265" y="276" text-anchor="middle" font-size="10" fill="#4a90c4" font-weight="bold">Carbon</text>
  <text x="265" y="288" text-anchor="middle" font-size="10" fill="#4a90c4">Water</text>
  <text x="265" y="300" text-anchor="middle" font-size="10" fill="#4a90c4">Chemicals</text>

  <rect x="380" y="260" width="90" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="425" y="276" text-anchor="middle" font-size="10" fill="#c87b2a" font-weight="bold">Energy (kWh)</text>
  <text x="425" y="288" text-anchor="middle" font-size="10" fill="#c87b2a">CO₂ emissions</text>
  <text x="425" y="300" text-anchor="middle" font-size="10" fill="#c87b2a">Grid carbon intensity</text>

  <rect x="540" y="260" width="90" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="585" y="276" text-anchor="middle" font-size="10" fill="#a31f34" font-weight="bold">E-Waste (kg)</text>
  <text x="585" y="288" text-anchor="middle" font-size="10" fill="#c44">Toxics (Pb, Cd)</text>
  <text x="585" y="300" text-anchor="middle" font-size="10" fill="#c44">Recyclability</text>

  <!-- Key insight box -->
  <rect x="30" y="340" width="630" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="345" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Key Insight: Embodied Carbon</text>
  <text x="345" y="374" text-anchor="middle" font-size="11" fill="#c87b2a">Manufacturing a GPU server emits carbon equivalent to 1–2 years of its operational energy use.</text>
  <text x="345" y="386" text-anchor="middle" font-size="10" fill="#c87b2a">Extending hardware lifetime and maximizing utilization are the highest-leverage sustainability interventions.</text>

  <!-- Quantitative breakdown bar -->
  <text x="345" y="420" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">Typical AI System Lifecycle Carbon Split</text>
  
  <rect x="30" y="430" width="32" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="46" y="444" text-anchor="middle" font-size="9" fill="#3d9e5a">5%</text>
  
  <rect x="62" y="430" width="283" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="203.5" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a90c4">45% — Manufacture</text>
  
  <rect x="345" y="430" width="252" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="471" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="#c87b2a">40% — Use</text>
  
  <rect x="597" y="430" width="63" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="628.5" y="444" text-anchor="middle" font-size="9" fill="#a31f34">10%</text>

  <!-- Bottom annotation -->
  <rect x="30" y="470" width="630" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>
  <text x="345" y="484" text-anchor="middle" font-size="11" fill="#555">Lifecycle Assessment (LCA) quantifies total environmental cost — manufacturing often dominates total carbon footprint</text>
</svg>