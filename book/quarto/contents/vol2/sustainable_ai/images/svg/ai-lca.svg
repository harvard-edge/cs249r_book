<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>
  </defs>

  <rect x="10" y="10" width="660" height="440" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>

  <!-- Lifecycle header arrow spanning all stages -->
  <text x="340" y="36" text-anchor="middle" font-size="12" fill="#555" font-weight="bold">Total Lifecycle Impact = Design + Manufacture + Use + Disposal</text>
  <path d="M 102 58 L 102 44 L 576 44 L 576 58" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STAGE BOXES (horizontal flow) ── -->
  <!-- Stage 1: Design (green) -->
  <rect x="28" y="58" width="148" height="170" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="102" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">Design</text>
  <line x1="40" y1="90" x2="164" y2="90" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="102" y="108" text-anchor="middle" font-size="10" fill="#3d9e5a">Architecture choices</text>
  <text x="102" y="122" text-anchor="middle" font-size="10" fill="#3d9e5a">Model size decisions</text>
  <text x="102" y="136" text-anchor="middle" font-size="10" fill="#3d9e5a">Hardware selection</text>
  <text x="102" y="150" text-anchor="middle" font-size="10" fill="#3d9e5a">Efficiency targets</text>
  <text x="102" y="164" text-anchor="middle" font-size="10" fill="#3d9e5a">PUE planning</text>
  <text x="102" y="178" text-anchor="middle" font-size="10" fill="#3d9e5a">Location / grid mix</text>
  <text x="102" y="192" text-anchor="middle" font-size="10" fill="#3d9e5a">Cooling strategy</text>
  <text x="102" y="208" text-anchor="middle" font-size="10" fill="#3d9e5a">Workload profiling</text>

  <!-- Stage 2: Manufacture (blue) -->
  <rect x="186" y="58" width="148" height="170" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="260" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Manufacture</text>
  <line x1="198" y1="90" x2="322" y2="90" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="260" y="108" text-anchor="middle" font-size="10" fill="#4a90c4">Chip fabrication</text>
  <text x="260" y="122" text-anchor="middle" font-size="10" fill="#4a90c4">Water &amp; energy intensive</text>
  <text x="260" y="136" text-anchor="middle" font-size="10" fill="#4a90c4">Chemical processes</text>
  <text x="260" y="150" text-anchor="middle" font-size="10" fill="#4a90c4">Server assembly</text>
  <text x="260" y="164" text-anchor="middle" font-size="10" fill="#4a90c4">Supply chain transport</text>
  <text x="260" y="178" text-anchor="middle" font-size="10" fill="#4a90c4">Packaging materials</text>
  <text x="260" y="192" text-anchor="middle" font-size="10" fill="#4a90c4">Quality testing</text>
  <text x="260" y="208" text-anchor="middle" font-size="10" fill="#4a90c4">Logistics &amp; delivery</text>

  <!-- Stage 3: Use (orange) -->
  <rect x="344" y="58" width="148" height="170" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="418" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Use</text>
  <line x1="356" y1="90" x2="480" y2="90" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="418" y="108" text-anchor="middle" font-size="10" fill="#c87b2a">Training energy (GPU-h)</text>
  <text x="418" y="122" text-anchor="middle" font-size="10" fill="#c87b2a">Inference power draw</text>
  <text x="418" y="136" text-anchor="middle" font-size="10" fill="#c87b2a">Cooling overhead (PUE)</text>
  <text x="418" y="150" text-anchor="middle" font-size="10" fill="#c87b2a">Storage I/O energy</text>
  <text x="418" y="164" text-anchor="middle" font-size="10" fill="#c87b2a">Network transmission</text>
  <text x="418" y="178" text-anchor="middle" font-size="10" fill="#c87b2a">Retraining cycles</text>
  <text x="418" y="192" text-anchor="middle" font-size="10" fill="#c87b2a">Monitoring overhead</text>
  <text x="418" y="208" text-anchor="middle" font-size="10" fill="#c87b2a">Idle power baseline</text>

  <!-- Stage 4: Disposal (red) -->
  <rect x="502" y="58" width="148" height="170" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="576" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31f34">Disposal</text>
  <line x1="514" y1="90" x2="638" y2="90" stroke="#c44" stroke-width="1.2"/>
  <text x="576" y="108" text-anchor="middle" font-size="10" fill="#a31f34">E-waste generation</text>
  <text x="576" y="122" text-anchor="middle" font-size="10" fill="#c44">Rare earth recovery</text>
  <text x="576" y="136" text-anchor="middle" font-size="10" fill="#c44">Toxic material disposal</text>
  <text x="576" y="150" text-anchor="middle" font-size="10" fill="#c44">Recycling rates (&lt;20%)</text>
  <text x="576" y="164" text-anchor="middle" font-size="10" fill="#c44">Refurbishment / reuse</text>
  <text x="576" y="178" text-anchor="middle" font-size="10" fill="#c44">Export to dev. nations</text>
  <text x="576" y="192" text-anchor="middle" font-size="10" fill="#c44">Landfill impact</text>
  <text x="576" y="208" text-anchor="middle" font-size="10" fill="#c44">Data destruction</text>

  <!-- Flow arrows between stages -->
  <line x1="176" y1="143" x2="186" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="334" y1="143" x2="344" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="492" y1="143" x2="502" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Impact Category Icons (below each stage box) ── -->
  <rect x="70" y="242" width="64" height="52" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="102" y="260" text-anchor="middle" font-size="12" fill="#3d9e5a">⚙</text>
  <text x="102" y="278" text-anchor="middle" font-size="9" fill="#3d9e5a">System</text>
  <text x="102" y="290" text-anchor="middle" font-size="9" fill="#3d9e5a">Choices</text>

  <rect x="218" y="242" width="84" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="260" y="260" text-anchor="middle" font-size="10" fill="#4a90c4" font-weight="bold">Carbon</text>
  <text x="260" y="272" text-anchor="middle" font-size="10" fill="#4a90c4">Water</text>
  <text x="260" y="284" text-anchor="middle" font-size="10" fill="#4a90c4">Chemicals</text>

  <rect x="375" y="242" width="84" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="417" y="260" text-anchor="middle" font-size="10" fill="#c87b2a" font-weight="bold">Energy (kWh)</text>
  <text x="417" y="272" text-anchor="middle" font-size="10" fill="#c87b2a">CO₂ emissions</text>
  <text x="417" y="284" text-anchor="middle" font-size="10" fill="#c87b2a">Grid carbon intensity</text>

  <rect x="535" y="242" width="82" height="52" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="576" y="260" text-anchor="middle" font-size="10" fill="#a31f34" font-weight="bold">E-Waste (kg)</text>
  <text x="576" y="272" text-anchor="middle" font-size="10" fill="#c44">Toxics (Pb, Cd)</text>
  <text x="576" y="284" text-anchor="middle" font-size="10" fill="#c44">Recyclability</text>

  <!-- Key insight box -->
  <rect x="28" y="312" width="622" height="48" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="340" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Key Insight: Embodied Carbon</text>
  <text x="340" y="347" text-anchor="middle" font-size="11" fill="#c87b2a">Manufacturing a GPU server emits carbon equivalent to 1–2 years of its operational energy use.</text>
  <text x="340" y="359" text-anchor="middle" font-size="10" fill="#c87b2a">Extending hardware lifetime and maximizing utilization are the highest-leverage sustainability interventions.</text>

  <!-- Quantitative breakdown bar -->
  <text x="340" y="386" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">Typical AI System Lifecycle Carbon Split</text>
  
  <rect x="28" y="392" width="31" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="43.5" y="407" text-anchor="middle" font-size="9" fill="#3d9e5a">5%</text>
  
  <rect x="60" y="392" width="280" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="200" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a90c4">45% — Manufacture</text>
  
  <rect x="341" y="392" width="247" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="464.5" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="#c87b2a">40% — Use</text>
  
  <rect x="589" y="392" width="62" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="620" y="407" text-anchor="middle" font-size="9" fill="#a31f34">10%</text>

  <!-- Bottom annotation -->
  <rect x="30" y="430" width="620" height="22" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>
  <text x="340" y="445" text-anchor="middle" font-size="11" fill="#555">Lifecycle Assessment (LCA) quantifies total environmental cost — manufacturing often dominates total carbon footprint</text>
</svg>