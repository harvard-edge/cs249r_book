<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 0 700 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect x="-20" y="0" width="700" height="460" fill="#ffffff"/>
  
  <!-- Gridlines: Y-axis log scale MWh 0.01 to 100,000 -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="80" y1="345" x2="600" y2="345"/> <!-- 0.01 -->
    <line x1="80" y1="300" x2="600" y2="300"/> <!-- 0.1 -->
    <line x1="80" y1="255" x2="600" y2="255"/> <!-- 1 -->
    <line x1="80" y1="210" x2="600" y2="210"/> <!-- 10 -->
    <line x1="80" y1="165" x2="600" y2="165"/> <!-- 100 -->
    <line x1="80" y1="120" x2="600" y2="120"/> <!-- 1,000 -->
    <line x1="80" y1="75" x2="600" y2="75"/>   <!-- 10,000 -->
    <line x1="80" y1="30" x2="600" y2="30"/>   <!-- 100,000 -->
  </g>

  <!-- Trend Shaded Area: Solid fill (Error Red fill) -->
  <path d="M80,300 L130,269 L230,206 L280,115 L380,96 L430,44 L480,53 L480,345 L80,345 Z" fill="#f9d6d5" fill-opacity="0.5"/>

  <!-- Power Plant Reference Line: Solid green (Data green stroke) -->
  <line x1="80" y1="75" x2="600" y2="75" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="8,4"/>
  <rect x="440" y="63" width="160" height="24" rx="4" fill="#ffffff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="520" y="79" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Power Plant (~10 GWh/yr)</text>

  <!-- Axes -->
  <line x1="80" y1="30" x2="80" y2="345" stroke="#333333" stroke-width="1.2"/>
  <line x1="80" y1="345" x2="600" y2="345" stroke="#333333" stroke-width="1.2"/>

  <!-- Y-axis labels -->
  <g font-size="9" fill="#555555" text-anchor="end">
    <text x="72" y="348">0.01</text>
    <text x="72" y="303">0.1</text>
    <text x="72" y="258">1</text>
    <text x="72" y="213">10</text>
    <text x="72" y="168">100</text>
    <text x="72" y="123">1,000</text>
    <text x="72" y="78">10,000</text>
    <text x="72" y="33">100,000</text>
  </g>
  <text x="24" y="187" text-anchor="middle" font-size="11" font-weight="600" fill="#333333" transform="rotate(-90,24,187)">Energy per Training Run (MWh)</text>

  <!-- X-axis labels and ticks -->
  <g font-size="9" fill="#555555" text-anchor="middle">
    <text x="80" y="362">2016</text>
    <text x="130" y="362">2017</text>
    <text x="180" y="362">2018</text>
    <text x="230" y="362">2019</text>
    <text x="280" y="362">2020</text>
    <text x="330" y="362">2021</text>
    <text x="380" y="362">2022</text>
    <text x="430" y="362">2023</text>
    <text x="480" y="362">2024</text>
    <text x="530" y="362">2025</text>
    <text x="580" y="362">2026</text>
  </g>
  <g stroke="#333333" stroke-width="1">
    <line x1="80" y1="345" x2="80" y2="350"/>
    <line x1="130" y1="345" x2="130" y2="350"/>
    <line x1="180" y1="345" x2="180" y2="350"/>
    <line x1="230" y1="345" x2="230" y2="350"/>
    <line x1="280" y1="345" x2="280" y2="350"/>
    <line x1="330" y1="345" x2="330" y2="350"/>
    <line x1="380" y1="345" x2="380" y2="350"/>
    <line x1="430" y1="345" x2="430" y2="350"/>
    <line x1="480" y1="345" x2="480" y2="350"/>
    <line x1="530" y1="345" x2="530" y2="350"/>
    <line x1="580" y1="345" x2="580" y2="350"/>
  </g>
  <text x="330" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#333333">Year</text>

  <!-- Exponential Trend Line: Stroke width 1.5 (Primary) -->
  <path d="M80,300 L130,269 L230,206 L280,115 L380,96 L430,44" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="210" y="240" font-size="10" font-weight="700" fill="#a31f34" transform="rotate(-30,210,240)">~10x per year</text>

  <!-- Infrastructure Limit Annotation -->
  <rect x="90" y="28" width="160" height="32" rx="4" fill="#ffffff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="170" y="41" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Infrastructure Limit</text>
  <text x="170" y="52" text-anchor="middle" font-size="8" fill="#555555">Grid capacity binding constraint</text>

  <!-- Data Points -->
  <!-- AlphaGo 2016 -->
  <circle cx="80" cy="300" r="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="92" y="312" font-size="9" font-weight="700" fill="#333333">AlphaGo</text>
  <text x="92" y="323" font-size="8.5" fill="#555555">0.1 MWh</text>

  <!-- Transformer 2017 -->
  <circle cx="130" cy="269" r="4.5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="142" y="280" font-size="9" font-weight="700" fill="#333333">Transformer</text>
  <text x="142" y="291" font-size="8.5" fill="#555555">~0.5 MWh</text>

  <!-- BERT 2019 -->
  <circle cx="230" cy="206" r="4.5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="218" y="190" font-size="9" font-weight="700" fill="#333333" text-anchor="end">BERT</text>
  <text x="218" y="201" font-size="8.5" fill="#555555" text-anchor="end">~12 MWh</text>

  <!-- GPT-3 2020 -->
  <circle cx="280" cy="115" r="6" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="268" y="100" font-size="10" font-weight="700" fill="#a31f34" text-anchor="end">GPT-3</text>
  <text x="268" y="111" font-size="9" fill="#555555" text-anchor="end">1,287 MWh</text>

  <!-- PaLM 2022 -->
  <circle cx="380" cy="96" r="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="368" y="80" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="end">PaLM</text>
  <text x="368" y="91" font-size="8.5" fill="#555555" text-anchor="end">~3,400 MWh</text>

  <!-- GPT-4 (est.) 2023 -->
  <circle cx="430" cy="44" r="6.5" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="418" y="30" font-size="10" font-weight="700" fill="#a31f34" text-anchor="end">GPT-4 (est.)</text>
  <text x="418" y="41" font-size="9" fill="#555555" text-anchor="end">~50,000 MWh</text>

  <!-- Llama 3.1 2024 -->
  <circle cx="480" cy="53" r="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="492" y="48" font-size="9" font-weight="700" fill="#c87b2a">Llama 3.1</text>
  <text x="492" y="59" font-size="8.5" fill="#555555">~30,000 MWh</text>

  <!-- Source -->
  <text x="600" y="420" text-anchor="end" font-size="9" fill="#777777" font-style="italic">Sources: Patterson et al. 2021, Strubell et al. 2019, Epoch AI 2024</text>
</svg>