<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="480" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Root node -->
  <rect x="230" y="20" width="220" height="40" rx="4" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="340" y="45" text-anchor="middle" font-size="12" font-weight="700" fill="#a31f34">Robustness Failure</text>

  <!-- Branch lines from root to three categories -->
  <path d="M 340 60 V 75 H 120 V 90" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M 340 60 V 90" stroke="#555" stroke-width="1.2" fill="none"/>
  <path d="M 340 60 V 75 H 560 V 90" stroke="#555" stroke-width="1.2" fill="none"/>

  <!-- Category 1: Distribution Shift (Blue) -->
  <rect x="30" y="90" width="180" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="120" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Distribution Shift</text>

  <!-- Sub-branches for Distribution Shift -->
  <path d="M 120 130 V 256 M 120 168 H 110 M 120 168 H 130 M 120 238 H 110 M 120 238 H 130" stroke="#4a90c4" stroke-width="1.2" fill="none"/>

  <!-- Distribution Shift leaves -->
  <rect x="20" y="150" width="90" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="65" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Covariate Shift</text>

  <rect x="130" y="150" width="90" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="175" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Concept Drift</text>

  <rect x="20" y="220" width="90" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="65" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Label Shift</text>

  <rect x="130" y="220" width="90" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="175" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Dataset Shift</text>

  <!-- Sub-item descriptions (small annotations) -->
  <text x="65" y="200" text-anchor="middle" font-size="8" fill="#999" font-style="italic">P(X) changes</text>
  <text x="65" y="210" text-anchor="middle" font-size="8" fill="#999" font-style="italic">P(Y|X) same</text>

  <text x="175" y="200" text-anchor="middle" font-size="8" fill="#999" font-style="italic">P(Y|X) changes</text>
  <text x="175" y="210" text-anchor="middle" font-size="8" fill="#999" font-style="italic">over time</text>

  <!-- Category 2: Adversarial Attack (Pink/Red) -->
  <rect x="250" y="90" width="180" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="340" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Adversarial Attack</text>

  <!-- Sub-branches for Adversarial Attack -->
  <path d="M 340 130 V 256 M 340 168 H 330 M 340 168 H 350 M 340 238 H 330 M 340 238 H 350" stroke="#c44" stroke-width="1.2" fill="none"/>

  <!-- Adversarial Attack leaves -->
  <rect x="240" y="150" width="90" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="285" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#333">FGSM</text>

  <rect x="350" y="150" width="90" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="395" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#333">C&amp;W</text>

  <rect x="240" y="220" width="90" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="285" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#333">PGD</text>

  <rect x="350" y="220" width="90" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="395" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Physical Attacks</text>

  <!-- Adversarial annotations -->
  <text x="285" y="200" text-anchor="middle" font-size="8" fill="#999" font-style="italic">Single-step</text>
  <text x="285" y="210" text-anchor="middle" font-size="8" fill="#999" font-style="italic">gradient</text>

  <text x="395" y="200" text-anchor="middle" font-size="8" fill="#999" font-style="italic">Optimization</text>
  <text x="395" y="210" text-anchor="middle" font-size="8" fill="#999" font-style="italic">based</text>

  <!-- Category 3: System Failures (Green) -->
  <rect x="470" y="90" width="180" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#333">System Failures</text>

  <!-- Sub-branches for System Failures -->
  <path d="M 560 130 V 256 M 560 168 H 550 M 560 168 H 570 M 560 238 H 550" stroke="#3d9e5a" stroke-width="1.2" fill="none"/>

  <!-- System Failures leaves -->
  <rect x="460" y="150" width="90" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="505" y="164" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Hardware Faults</text>
  <text x="505" y="176" text-anchor="middle" font-size="7.5" fill="#999">(SDC)</text>

  <rect x="570" y="150" width="90" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="615" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Data Poisoning</text>

  <rect x="460" y="220" width="90" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="505" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Software Bugs</text>

  <!-- System Failures annotations -->
  <text x="505" y="200" text-anchor="middle" font-size="8" fill="#999" font-style="italic">Bit-flips, memory</text>
  <text x="505" y="210" text-anchor="middle" font-size="8" fill="#999" font-style="italic">corruption</text>

  <text x="615" y="200" text-anchor="middle" font-size="8" fill="#999" font-style="italic">Malicious training</text>
  <text x="615" y="210" text-anchor="middle" font-size="8" fill="#999" font-style="italic">data injection</text>

  <!-- Horizontal grouping bar at bottom -->
  <line x1="20" y1="290" x2="660" y2="290" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Connecting arrows from categories to summary -->
  <line x1="120" y1="266" x2="120" y2="320" stroke="#4a90c4" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="340" y1="266" x2="340" y2="320" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="560" y1="266" x2="560" y2="320" stroke="#3d9e5a" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Bottom summary labels -->
  <rect x="25" y="320" width="190" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="120" y="340" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4a90c4">Environmental Change</text>
  <text x="120" y="356" text-anchor="middle" font-size="8" fill="#555">Gradual or sudden changes in</text>
  <text x="120" y="368" text-anchor="middle" font-size="8" fill="#555">data generating process</text>

  <rect x="245" y="320" width="190" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="340" y="340" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Malicious Manipulation</text>
  <text x="340" y="356" text-anchor="middle" font-size="8" fill="#555">Deliberate perturbation of</text>
  <text x="340" y="368" text-anchor="middle" font-size="8" fill="#555">inputs or training data</text>

  <rect x="465" y="320" width="190" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="560" y="340" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Infrastructure Faults</text>
  <text x="560" y="356" text-anchor="middle" font-size="8" fill="#555">Hardware/software defects</text>
  <text x="560" y="368" text-anchor="middle" font-size="8" fill="#555">that corrupt computation</text>

  <!-- Footer note -->
  <text x="340" y="400" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each category demands distinct detection and mitigation strategies</text>

  <!-- Cross-cutting label -->
  <rect x="210" y="420" width="260" height="24" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="436" text-anchor="middle" font-size="9" font-weight="600" fill="#c87b2a">Software faults cut across all three categories</text>
</svg>