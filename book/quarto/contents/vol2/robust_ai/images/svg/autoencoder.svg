<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- Background and Panel -->
  <rect width="720" height="520" fill="#fff"/>
  <rect x="20" y="20" width="680" height="480" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <g transform="translate(20, 20)">
    <!-- Top Annotations -->
    <text x="150" y="30" text-anchor="middle" font-size="12" fill="#4a90c4" font-weight="bold">Encoder</text>
    <text x="330" y="30" text-anchor="middle" font-size="12" fill="#c44" font-weight="bold">Bottleneck</text>
    <text x="510" y="30" text-anchor="middle" font-size="12" fill="#4a90c4" font-weight="bold">Decoder</text>

    <!-- Flow Indicators -->
    <line x1="60" y1="40" x2="290" y2="40" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <line x1="370" y1="40" x2="600" y2="40" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>

    <!-- Connections: Layer 0 to 1 -->
    <g stroke="#4a90c4" stroke-width="1" opacity="0.3">
      <line x1="70" y1="110" x2="140" y2="150"/><line x1="70" y1="110" x2="140" y2="190"/>
      <line x1="70" y1="150" x2="140" y2="150"/><line x1="70" y1="150" x2="140" y2="190"/><line x1="70" y1="150" x2="140" y2="230"/>
      <line x1="70" y1="190" x2="140" y2="150"/><line x1="70" y1="190" x2="140" y2="190"/><line x1="70" y1="190" x2="140" y2="230"/><line x1="70" y1="190" x2="140" y2="270"/>
      <line x1="70" y1="230" x2="140" y2="190"/><line x1="70" y1="230" x2="140" y2="230"/><line x1="70" y1="230" x2="140" y2="270"/>
      <line x1="70" y1="270" x2="140" y2="190"/><line x1="70" y1="270" x2="140" y2="230"/><line x1="70" y1="270" x2="140" y2="270"/><line x1="70" y1="270" x2="140" y2="310"/>
      <line x1="70" y1="310" x2="140" y2="230"/><line x1="70" y1="310" x2="140" y2="270"/><line x1="70" y1="310" x2="140" y2="310"/>
      <line x1="70" y1="350" x2="140" y2="270"/><line x1="70" y1="350" x2="140" y2="310"/>
    </g>

    <!-- Connections: Layer 1 to 2 -->
    <g stroke="#4a90c4" stroke-width="1" opacity="0.4">
      <line x1="160" y1="150" x2="230" y2="190"/><line x1="160" y1="150" x2="230" y2="230"/>
      <line x1="160" y1="190" x2="230" y2="190"/><line x1="160" y1="190" x2="230" y2="230"/><line x1="160" y1="190" x2="230" y2="270"/>
      <line x1="160" y1="230" x2="230" y2="190"/><line x1="160" y1="230" x2="230" y2="230"/><line x1="160" y1="230" x2="230" y2="270"/>
      <line x1="160" y1="270" x2="230" y2="190"/><line x1="160" y1="270" x2="230" y2="230"/><line x1="160" y1="270" x2="230" y2="270"/>
      <line x1="160" y1="310" x2="230" y2="230"/><line x1="160" y1="310" x2="230" y2="270"/>
    </g>

    <!-- Connections: Layer 2 to 3 -->
    <g stroke="#4a90c4" stroke-width="1.2" opacity="0.5">
      <line x1="250" y1="190" x2="320" y2="210"/><line x1="250" y1="190" x2="320" y2="250"/>
      <line x1="250" y1="230" x2="320" y2="210"/><line x1="250" y1="230" x2="320" y2="250"/>
      <line x1="250" y1="270" x2="320" y2="210"/><line x1="250" y1="270" x2="320" y2="250"/>
    </g>

    <!-- Connections: Layer 3 to 4 -->
    <g stroke="#4a90c4" stroke-width="1.2" opacity="0.5">
      <line x1="340" y1="210" x2="410" y2="190"/><line x1="340" y1="210" x2="410" y2="230"/><line x1="340" y1="210" x2="410" y2="270"/>
      <line x1="340" y1="250" x2="410" y2="190"/><line x1="340" y1="250" x2="410" y2="230"/><line x1="340" y1="250" x2="410" y2="270"/>
    </g>

    <!-- Connections: Layer 4 to 5 -->
    <g stroke="#4a90c4" stroke-width="1" opacity="0.4">
      <line x1="430" y1="190" x2="500" y2="150"/><line x1="430" y1="190" x2="500" y2="190"/><line x1="430" y1="190" x2="500" y2="230"/>
      <line x1="430" y1="230" x2="500" y2="150"/><line x1="430" y1="230" x2="500" y2="190"/><line x1="430" y1="230" x2="500" y2="230"/><line x1="430" y1="230" x2="500" y2="270"/><line x1="430" y1="230" x2="500" y2="310"/>
      <line x1="430" y1="270" x2="500" y2="230"/><line x1="430" y1="270" x2="500" y2="270"/><line x1="430" y1="270" x2="500" y2="310"/>
    </g>

    <!-- Connections: Layer 5 to 6 -->
    <g stroke="#4a90c4" stroke-width="1" opacity="0.3">
      <line x1="520" y1="150" x2="590" y2="110"/><line x1="520" y1="150" x2="590" y2="150"/>
      <line x1="520" y1="190" x2="590" y2="150"/><line x1="520" y1="190" x2="590" y2="190"/><line x1="520" y1="190" x2="590" y2="230"/>
      <line x1="520" y1="230" x2="590" y2="190"/><line x1="520" y1="230" x2="590" y2="230"/><line x1="520" y1="230" x2="590" y2="270"/>
      <line x1="520" y1="270" x2="590" y2="230"/><line x1="520" y1="270" x2="590" y2="270"/><line x1="520" y1="270" x2="590" y2="310"/>
      <line x1="520" y1="310" x2="590" y2="310"/><line x1="520" y1="310" x2="590" y2="350"/>
    </g>

    <!-- Node Layers -->
    <!-- Encoder Side -->
    <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5">
      <!-- Input Nodes -->
      <rect x="50" y="100" width="20" height="20"/><rect x="50" y="140" width="20" height="20"/>
      <rect x="50" y="180" width="20" height="20"/><rect x="50" y="220" width="20" height="20"/>
      <rect x="50" y="260" width="20" height="20"/><rect x="50" y="300" width="20" height="20"/>
      <rect x="50" y="340" width="20" height="20"/>
      <!-- Layer 1 (h1) -->
      <rect x="140" y="140" width="20" height="20"/><rect x="140" y="180" width="20" height="20"/>
      <rect x="140" y="220" width="20" height="20"/><rect x="140" y="260" width="20" height="20"/>
      <rect x="140" y="300" width="20" height="20"/>
      <!-- Layer 2 (h2) -->
      <rect x="230" y="180" width="20" height="20"/><rect x="230" y="220" width="20" height="20"/>
      <rect x="230" y="260" width="20" height="20"/>
    </g>

    <!-- Bottleneck Layer -->
    <g fill="#f9d6d5" stroke="#c44" stroke-width="1.5">
      <rect x="320" y="200" width="20" height="20"/>
      <rect x="320" y="240" width="20" height="20"/>
    </g>

    <!-- Decoder Side -->
    <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5">
      <!-- Layer 4 -->
      <rect x="410" y="180" width="20" height="20"/><rect x="410" y="220" width="20" height="20"/>
      <rect x="410" y="260" width="20" height="20"/>
      <!-- Layer 5 -->
      <rect x="500" y="140" width="20" height="20"/><rect x="500" y="180" width="20" height="20"/>
      <rect x="500" y="220" width="20" height="20"/><rect x="500" y="260" width="20" height="20"/>
      <rect x="500" y="300" width="20" height="20"/>
      <!-- Output Nodes -->
      <rect x="590" y="100" width="20" height="20"/><rect x="590" y="140" width="20" height="20"/>
      <rect x="590" y="180" width="20" height="20"/><rect x="590" y="220" width="20" height="20"/>
      <rect x="590" y="260" width="20" height="20"/><rect x="590" y="300" width="20" height="20"/>
      <rect x="590" y="340" width="20" height="20"/>
    </g>

    <!-- Lower Layer Labels -->
    <text x="60" y="380" text-anchor="middle" font-size="10" fill="#333">Input x</text>
    <text x="150" y="330" text-anchor="middle" font-size="10" fill="#4a90c4">h₁</text>
    <text x="240" y="290" text-anchor="middle" font-size="10" fill="#4a90c4">h₂</text>

    <!-- Bottleneck Latent Space Details -->
    <rect x="285" y="280" width="90" height="34" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
    <text x="330" y="294" text-anchor="middle" font-size="10" fill="#a31f34" font-weight="bold">Latent Space z</text>
    <text x="330" y="306" text-anchor="middle" font-size="9" fill="#a31f34">Compressed repr.</text>
    <line x1="330" y1="260" x2="330" y2="280" stroke="#c44" stroke-width="1"/>

    <text x="600" y="380" text-anchor="middle" font-size="10" fill="#4a90c4">Output x̂</text>
    <text x="600" y="392" text-anchor="middle" font-size="10" fill="#4a90c4">Reconstruction</text>

    <!-- Loss Equation Section -->
    <rect x="220" y="370" width="220" height="36" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
    <text x="330" y="386" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Reconstruction Loss:</text>
    <text x="330" y="400" text-anchor="middle" font-size="12" fill="#333">L = ‖x − x̂‖²</text>

    <!-- Footer Annotation -->
    <rect x="20" y="426" width="640" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
    <text x="340" y="443" text-anchor="middle" font-size="11" fill="#333">High reconstruction error at inference → anomaly detected. Autoencoders learn the manifold of normal data.</text>
  </g>
</svg>