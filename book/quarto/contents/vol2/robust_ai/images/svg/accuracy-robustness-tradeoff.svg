<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Robustness Tax: Clean Accuracy vs. Adversarial Accuracy</text>

  <!-- ===== Chart axes ===== -->
  <!-- X axis: Perturbation Budget (ε) -->
  <line x1="90" y1="360" x2="620" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Y axis: Accuracy (%) -->
  <line x1="90" y1="360" x2="90" y2="55" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- X axis label -->
  <text x="355" y="395" text-anchor="middle" font-size="11" fill="#555">Perturbation Budget (ε) — adversarial training strength</text>

  <!-- Y axis label (rotated) -->
  <text x="22" y="210" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90, 22, 210)">Accuracy (%)</text>

  <!-- Y axis tick marks and labels -->
  <!-- 100% at y=70, 80% at y=122, 60% at y=174, 40% at y=226, 20% at y=278, 0% at y=330 -->
  <line x1="86" y1="70" x2="94" y2="70" stroke="#555" stroke-width="1"/>
  <text x="80" y="74" text-anchor="end" font-size="9" fill="#555">100</text>

  <line x1="86" y1="122" x2="94" y2="122" stroke="#555" stroke-width="1"/>
  <text x="80" y="126" text-anchor="end" font-size="9" fill="#555">80</text>

  <line x1="86" y1="174" x2="94" y2="174" stroke="#555" stroke-width="1"/>
  <text x="80" y="178" text-anchor="end" font-size="9" fill="#555">60</text>

  <line x1="86" y1="226" x2="94" y2="226" stroke="#555" stroke-width="1"/>
  <text x="80" y="230" text-anchor="end" font-size="9" fill="#555">40</text>

  <line x1="86" y1="278" x2="94" y2="278" stroke="#555" stroke-width="1"/>
  <text x="80" y="282" text-anchor="end" font-size="9" fill="#555">20</text>

  <line x1="86" y1="330" x2="94" y2="330" stroke="#555" stroke-width="1"/>
  <text x="80" y="334" text-anchor="end" font-size="9" fill="#555">0</text>

  <!-- X axis ticks and labels -->
  <!-- ε = 0 at x=90, ε = 2/255 at x=190, ε = 4/255 at x=290, ε = 8/255 at x=390, ε = 16/255 at x=490, ε = 32/255 at x=590 -->
  <line x1="90" y1="356" x2="90" y2="364" stroke="#555" stroke-width="1"/>
  <text x="90" y="374" text-anchor="middle" font-size="8.5" fill="#555">0</text>

  <line x1="190" y1="356" x2="190" y2="364" stroke="#555" stroke-width="1"/>
  <text x="190" y="374" text-anchor="middle" font-size="8.5" fill="#555">2/255</text>

  <line x1="290" y1="356" x2="290" y2="364" stroke="#555" stroke-width="1"/>
  <text x="290" y="374" text-anchor="middle" font-size="8.5" fill="#555">4/255</text>

  <line x1="390" y1="356" x2="390" y2="364" stroke="#555" stroke-width="1"/>
  <text x="390" y="374" text-anchor="middle" font-size="8.5" fill="#555">8/255</text>

  <line x1="490" y1="356" x2="490" y2="364" stroke="#555" stroke-width="1"/>
  <text x="490" y="374" text-anchor="middle" font-size="8.5" fill="#555">16/255</text>

  <line x1="590" y1="356" x2="590" y2="364" stroke="#555" stroke-width="1"/>
  <text x="590" y="374" text-anchor="middle" font-size="8.5" fill="#555">32/255</text>

  <!-- Grid lines (light) -->
  <line x1="90" y1="70" x2="615" y2="70" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="122" x2="615" y2="122" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="174" x2="615" y2="174" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="226" x2="615" y2="226" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="278" x2="615" y2="278" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="190" y1="55" x2="190" y2="355" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="290" y1="55" x2="290" y2="355" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="390" y1="55" x2="390" y2="355" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="490" y1="55" x2="490" y2="355" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="590" y1="55" x2="590" y2="355" stroke="#f7f7f7" stroke-width="0.8"/>

  <!-- ===== Robustness Tax shaded region ===== -->
  <!-- Shaded region between the two curves, filled with light orange -->
  <!-- Clean accuracy curve points (approx): (90,83) (190,96) (290,109) (390,122) (490,140) (590,163) -->
  <!-- Adversarial accuracy curve points:    (90,200) (190,174) (290,161) (390,148) (490,140) (590,140) -->
  <!-- The gap is the "tax" -->
  <polygon points="90,83 190,96 290,109 390,122 490,140 590,163 590,140 490,140 390,148 290,161 190,174 90,200" fill="#fdebd0" opacity="0.5"/>

  <!-- ===== Clean Accuracy curve (blue — starts high, drops slowly) ===== -->
  <!-- Points: ε=0→95%, ε=2/255→92%, ε=4/255→88%, ε=8/255→80%, ε=16/255→68%, ε=32/255→52% -->
  <!-- Y: 95%→ y=330-(95/100)*260=83, 92%→91, 88%→101, 80%→122, 68%→153, 52%→195 -->
  <!-- Recalculate: 0%=330, 100%=70. Range=260. y = 330 - (pct/100)*260 -->
  <!-- 95% → 330-247=83, 92%→330-239.2=91, 88%→330-228.8=101, 80%→330-208=122, 68%→330-176.8=153, 52%→330-135.2=195 -->
  <polyline points="90,83 190,91 290,101 390,122 490,153 590,195" fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Dots at data points -->
  <circle cx="90" cy="83" r="4" fill="#4a90c4"/>
  <circle cx="190" cy="91" r="4" fill="#4a90c4"/>
  <circle cx="290" cy="101" r="4" fill="#4a90c4"/>
  <circle cx="390" cy="122" r="4" fill="#4a90c4"/>
  <circle cx="490" cy="153" r="4" fill="#4a90c4"/>
  <circle cx="590" cy="195" r="4" fill="#4a90c4"/>

  <!-- ===== Adversarial Accuracy curve (green — starts low ~60%, rises then plateaus) ===== -->
  <!-- Points: ε=0→23% (no adv training, model is fragile), ε=2/255→45%, ε=4/255→56%, ε=8/255→62%, ε=16/255→65%, ε=32/255→65% -->
  <!-- 23%→330-59.8=270, 45%→330-117=213, 56%→330-145.6=184, 62%→330-161.2=169, 65%→330-169=161, 65%→161 -->
  <polyline points="90,270 190,213 290,184 390,169 490,161 590,161" fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="8,4"/>
  <circle cx="90" cy="270" r="4" fill="#3d9e5a"/>
  <circle cx="190" cy="213" r="4" fill="#3d9e5a"/>
  <circle cx="290" cy="184" r="4" fill="#3d9e5a"/>
  <circle cx="390" cy="169" r="4" fill="#3d9e5a"/>
  <circle cx="490" cy="161" r="4" fill="#3d9e5a"/>
  <circle cx="590" cy="161" r="4" fill="#3d9e5a"/>

  <!-- ===== Robustness Tax annotation arrow ===== -->
  <!-- At ε = 8/255 (x=390): clean=80% (y=122), adversarial=62% (y=169). Gap = 18pp -->
  <line x1="415" y1="122" x2="415" y2="169" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="415" y1="169" x2="415" y2="122" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="420" y="135" width="108" height="32" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="474" y="149" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Robustness Tax</text>
  <text x="474" y="162" text-anchor="middle" font-size="8.5" fill="#c44">≈18 pp at ε = 8/255</text>

  <!-- ===== Annotation: No adversarial training ===== -->
  <line x1="90" y1="270" x2="70" y2="290" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="24" y="295" width="80" height="28" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="64" y="308" text-anchor="middle" font-size="8" fill="#3d9e5a">No adv.</text>
  <text x="64" y="320" text-anchor="middle" font-size="8" fill="#3d9e5a">training: 23%</text>

  <!-- ===== Annotation: Convergence / plateau ===== -->
  <line x1="540" y1="161" x2="540" y2="135" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="498" y="110" width="88" height="24" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="542" y="124" text-anchor="middle" font-size="8" fill="#3d9e5a">Plateau: ~65%</text>

  <!-- ===== Clean accuracy start annotation ===== -->
  <line x1="90" y1="83" x2="62" y2="65" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="24" y="70" font-size="8.5" fill="#4a90c4">95% clean</text>

  <!-- ===== Vertical reference line at standard ε=8/255 ===== -->
  <line x1="390" y1="55" x2="390" y2="355" stroke="#a31f34" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="390" y="53" text-anchor="middle" font-size="8" fill="#a31f34">Standard benchmark</text>

  <!-- ===== Legend ===== -->
  <rect x="92" y="404" width="200" height="42" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <line x1="108" y1="420" x2="140" y2="420" stroke="#4a90c4" stroke-width="2.5"/>
  <circle cx="124" cy="420" r="4" fill="#4a90c4"/>
  <text x="148" y="424" font-size="9" fill="#333">Clean accuracy (no attack)</text>
  <line x1="108" y1="437" x2="140" y2="437" stroke="#3d9e5a" stroke-width="2.5" stroke-dasharray="7,3"/>
  <circle cx="124" cy="437" r="4" fill="#3d9e5a"/>
  <text x="148" y="441" font-size="9" fill="#333">Adversarial accuracy (PGD)</text>

  <!-- ===== Key insight box ===== -->
  <rect x="320" y="404" width="348" height="42" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="494" y="420" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">No Free Lunch: Certified robustness requires accepting</text>
  <text x="494" y="433" text-anchor="middle" font-size="9" fill="#c44">lower clean accuracy. Every point gained in robust acc. costs</text>
  <text x="494" y="444" text-anchor="middle" font-size="9" fill="#c44">~0.5–1.5 pp of clean acc. and 8× training compute (PGD-7).</text>

  <!-- Bottom footnote -->
  <text x="340" y="458" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Schematic based on empirical trends from Madry et al. (2018) on CIFAR-10; exact values vary by architecture and dataset.</text>
</svg>