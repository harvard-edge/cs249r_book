<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Robustness Tax: Clean Accuracy vs. Adversarial Accuracy</text>

  <!-- ===== Chart axes ===== -->
  <!-- X axis -->
  <line x1="90" y1="360" x2="620" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Y axis -->
  <line x1="90" y1="360" x2="90" y2="50" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- X axis label -->
  <text x="350" y="400" text-anchor="middle" font-size="11" fill="#555">Perturbation Budget (ε) — adversarial training strength</text>

  <!-- Y axis label (rotated) -->
  <text x="40" y="210" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90, 40, 210)">Accuracy (%)</text>

  <!-- Y axis tick marks and labels -->
  <line x1="85" y1="70" x2="90" y2="70" stroke="#555" stroke-width="1"/>
  <text x="75" y="73" text-anchor="end" font-size="9" fill="#555">100</text>

  <line x1="85" y1="122" x2="90" y2="122" stroke="#555" stroke-width="1"/>
  <text x="75" y="125" text-anchor="end" font-size="9" fill="#555">80</text>

  <line x1="85" y1="174" x2="90" y2="174" stroke="#555" stroke-width="1"/>
  <text x="75" y="177" text-anchor="end" font-size="9" fill="#555">60</text>

  <line x1="85" y1="226" x2="90" y2="226" stroke="#555" stroke-width="1"/>
  <text x="75" y="229" text-anchor="end" font-size="9" fill="#555">40</text>

  <line x1="85" y1="278" x2="90" y2="278" stroke="#555" stroke-width="1"/>
  <text x="75" y="281" text-anchor="end" font-size="9" fill="#555">20</text>

  <line x1="85" y1="330" x2="90" y2="330" stroke="#555" stroke-width="1"/>
  <text x="75" y="333" text-anchor="end" font-size="9" fill="#555">0</text>

  <!-- X axis ticks and labels -->
  <line x1="90" y1="360" x2="90" y2="365" stroke="#555" stroke-width="1"/>
  <text x="90" y="380" text-anchor="middle" font-size="8.5" fill="#555">0</text>

  <line x1="190" y1="360" x2="190" y2="365" stroke="#555" stroke-width="1"/>
  <text x="190" y="380" text-anchor="middle" font-size="8.5" fill="#555">2/255</text>

  <line x1="290" y1="360" x2="290" y2="365" stroke="#555" stroke-width="1"/>
  <text x="290" y="380" text-anchor="middle" font-size="8.5" fill="#555">4/255</text>

  <line x1="390" y1="360" x2="390" y2="365" stroke="#555" stroke-width="1"/>
  <text x="390" y="380" text-anchor="middle" font-size="8.5" fill="#555">8/255</text>

  <line x1="490" y1="360" x2="490" y2="365" stroke="#555" stroke-width="1"/>
  <text x="490" y="380" text-anchor="middle" font-size="8.5" fill="#555">16/255</text>

  <line x1="590" y1="360" x2="590" y2="365" stroke="#555" stroke-width="1"/>
  <text x="590" y="380" text-anchor="middle" font-size="8.5" fill="#555">32/255</text>

  <!-- Grid lines (light) -->
  <line x1="90" y1="70" x2="620" y2="70" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="122" x2="620" y2="122" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="174" x2="620" y2="174" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="226" x2="620" y2="226" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="278" x2="620" y2="278" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="190" y1="50" x2="190" y2="360" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="290" y1="50" x2="290" y2="360" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="390" y1="50" x2="390" y2="360" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="490" y1="50" x2="490" y2="360" stroke="#f7f7f7" stroke-width="0.8"/>
  <line x1="590" y1="50" x2="590" y2="360" stroke="#f7f7f7" stroke-width="0.8"/>

  <!-- ===== Robustness Tax shaded region ===== -->
  <polygon points="90,83 190,91 290,101 390,122 490,153 590,195 590,161 490,161 390,169 290,184 190,213 90,270" fill="#f9d6d5" opacity="0.5"/>

  <!-- ===== Clean Accuracy curve ===== -->
  <polyline points="90,83 190,91 290,101 390,122 490,153 590,195" fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="90" cy="83" r="4" fill="#4a90c4"/>
  <circle cx="190" cy="91" r="4" fill="#4a90c4"/>
  <circle cx="290" cy="101" r="4" fill="#4a90c4"/>
  <circle cx="390" cy="122" r="4" fill="#4a90c4"/>
  <circle cx="490" cy="153" r="4" fill="#4a90c4"/>
  <circle cx="590" cy="195" r="4" fill="#4a90c4"/>

  <!-- ===== Adversarial Accuracy curve ===== -->
  <polyline points="90,270 190,213 290,184 390,169 490,161 590,161" fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="8,4"/>
  <circle cx="90" cy="270" r="4" fill="#3d9e5a"/>
  <circle cx="190" cy="213" r="4" fill="#3d9e5a"/>
  <circle cx="290" cy="184" r="4" fill="#3d9e5a"/>
  <circle cx="390" cy="169" r="4" fill="#3d9e5a"/>
  <circle cx="490" cy="161" r="4" fill="#3d9e5a"/>
  <circle cx="590" cy="161" r="4" fill="#3d9e5a"/>

  <!-- ===== Robustness Tax annotation arrow ===== -->
  <line x1="390" y1="126" x2="390" y2="165" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="390" y1="165" x2="390" y2="126" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="260" y="130" width="120" height="30" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="320" y="144" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Robustness Tax</text>
  <text x="320" y="154" text-anchor="middle" font-size="8.5" fill="#c44">≈18 pp at ε = 8/255</text>

  <!-- ===== Annotation: No adversarial training ===== -->
  <line x1="90" y1="270" x2="90" y2="290" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="50" y="290" width="80" height="30" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="90" y="304" text-anchor="middle" font-size="8" fill="#3d9e5a">No adv.</text>
  <text x="90" y="314" text-anchor="middle" font-size="8" fill="#3d9e5a">training: 23%</text>

  <!-- ===== Annotation: Convergence / plateau ===== -->
  <line x1="540" y1="161" x2="540" y2="130" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="500" y="110" width="80" height="20" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="540" y="124" text-anchor="middle" font-size="8" fill="#3d9e5a">Plateau: ~65%</text>

  <!-- ===== Clean accuracy start annotation ===== -->
  <line x1="90" y1="83" x2="130" y2="83" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="135" y="86" text-anchor="start" font-size="8.5" fill="#4a90c4">95% clean</text>

  <!-- ===== Vertical reference line at standard ε=8/255 ===== -->
  <line x1="390" y1="50" x2="390" y2="360" stroke="#a31f34" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="390" y="45" text-anchor="middle" font-size="8" fill="#a31f34">Standard benchmark</text>

  <!-- ===== Legend ===== -->
  <rect x="90" y="410" width="210" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <line x1="110" y1="425" x2="140" y2="425" stroke="#4a90c4" stroke-width="2.5"/>
  <circle cx="125" cy="425" r="4" fill="#4a90c4"/>
  <text x="150" y="428" font-size="9" fill="#333">Clean accuracy (no attack)</text>
  <line x1="110" y1="445" x2="140" y2="445" stroke="#3d9e5a" stroke-width="2.5" stroke-dasharray="7,3"/>
  <circle cx="125" cy="445" r="4" fill="#3d9e5a"/>
  <text x="150" y="448" font-size="9" fill="#333">Adversarial accuracy (PGD)</text>

  <!-- ===== Key insight box ===== -->
  <rect x="320" y="410" width="340" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="490" y="424" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">No Free Lunch: Certified robustness requires accepting</text>
  <text x="490" y="436" text-anchor="middle" font-size="9" fill="#c44">lower clean accuracy. Every point gained in robust acc. costs</text>
  <text x="490" y="448" text-anchor="middle" font-size="9" fill="#c44">~0.5–1.5 pp of clean acc. and 8× training compute (PGD-7).</text>

  <!-- Bottom footnote -->
  <text x="340" y="476" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Schematic based on empirical trends from Madry et al. (2018) on CIFAR-10; exact values vary by architecture and dataset.</text>
</svg>