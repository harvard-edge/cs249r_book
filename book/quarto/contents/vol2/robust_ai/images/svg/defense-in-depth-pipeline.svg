<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Defense in Depth: ML Lifecycle Security Layers</text>

  <!-- ===== Stage boxes (top row) — pipeline stages ===== -->
  <!-- Stage 1: Data Ingestion -->
  <rect x="18" y="100" width="93" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="64.5" y="121" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Data</text>
  <text x="64.5" y="135" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Ingestion</text>
  <text x="64.5" y="149" text-anchor="middle" font-size="8" fill="#555">Raw pipeline</text>

  <!-- Arrow 1→2 -->
  <line x1="111" y1="126" x2="125" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Preprocessing -->
  <rect x="126" y="100" width="93" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="172.5" y="121" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Preprocessing</text>
  <text x="172.5" y="135" text-anchor="middle" font-size="9" fill="#555">Feature eng.</text>
  <text x="172.5" y="149" text-anchor="middle" font-size="8" fill="#555">Normalization</text>

  <!-- Arrow 2→3 -->
  <line x1="219" y1="126" x2="233" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Training -->
  <rect x="234" y="100" width="93" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280.5" y="121" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Training</text>
  <text x="280.5" y="135" text-anchor="middle" font-size="9" fill="#555">Optimization</text>
  <text x="280.5" y="149" text-anchor="middle" font-size="8" fill="#555">Loss landscape</text>

  <!-- Arrow 3→4 -->
  <line x1="327" y1="126" x2="341" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Validation -->
  <rect x="342" y="100" width="93" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="388.5" y="121" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Validation</text>
  <text x="388.5" y="135" text-anchor="middle" font-size="9" fill="#555">OOD testing</text>
  <text x="388.5" y="149" text-anchor="middle" font-size="8" fill="#555">Stress tests</text>

  <!-- Arrow 4→5 -->
  <line x1="435" y1="126" x2="449" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: Deployment -->
  <rect x="450" y="100" width="93" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="496.5" y="121" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Deployment</text>
  <text x="496.5" y="135" text-anchor="middle" font-size="9" fill="#555">Serving infra</text>
  <text x="496.5" y="149" text-anchor="middle" font-size="8" fill="#555">Input filtering</text>

  <!-- Arrow 5→6 -->
  <line x1="543" y1="126" x2="557" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6: Monitoring -->
  <rect x="558" y="100" width="104" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="610" y="121" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Monitoring</text>
  <text x="610" y="135" text-anchor="middle" font-size="9" fill="#555">Drift detection</text>
  <text x="610" y="149" text-anchor="middle" font-size="8" fill="#555">Alerting</text>

  <!-- ===== Defense shields (green boxes above each stage) ===== -->

  <!-- Defense 1: Data Sanitization -->
  <rect x="20" y="46" width="89" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="64.5" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Data Sanitization</text>
  <text x="64.5" y="75" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Outlier removal</text>
  <text x="64.5" y="86" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Deduplication</text>
  <!-- connector line down to stage -->
  <line x1="64" y1="88" x2="64" y2="100" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Defense 2: Input Validation -->
  <rect x="128" y="46" width="89" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="172.5" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Input Validation</text>
  <text x="172.5" y="75" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Schema checks</text>
  <text x="172.5" y="86" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Range constraints</text>
  <line x1="172" y1="88" x2="172" y2="100" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Defense 3: Adversarial Training -->
  <rect x="236" y="46" width="89" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="280.5" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Adv. Training</text>
  <text x="280.5" y="75" text-anchor="middle" font-size="7.5" fill="#3d9e5a">PGD-7 examples</text>
  <text x="280.5" y="86" text-anchor="middle" font-size="7.5" fill="#3d9e5a">8× compute cost</text>
  <line x1="280" y1="88" x2="280" y2="100" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Defense 4: Robustness Benchmarks -->
  <rect x="344" y="46" width="89" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="388.5" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Robustness Tests</text>
  <text x="388.5" y="75" text-anchor="middle" font-size="7.5" fill="#3d9e5a">OOD eval sets</text>
  <text x="388.5" y="86" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Certified radius</text>
  <line x1="388" y1="88" x2="388" y2="100" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Defense 5: Runtime Filtering -->
  <rect x="452" y="46" width="89" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="496.5" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Runtime Filter</text>
  <text x="496.5" y="75" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Adversarial detect</text>
  <text x="496.5" y="86" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Confidence thresh</text>
  <line x1="496" y1="88" x2="496" y2="100" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Defense 6: Drift Monitoring -->
  <rect x="560" y="46" width="100" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="610" y="62" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Drift Monitoring</text>
  <text x="610" y="75" text-anchor="middle" font-size="7.5" fill="#3d9e5a">PSI / MMD tests</text>
  <text x="610" y="86" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Retrain trigger</text>
  <line x1="610" y1="88" x2="610" y2="100" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== Attack arrows from below (red upward arrows) ===== -->

  <!-- Attack 1: Data Poisoning at Ingestion -->
  <line x1="48" y1="214" x2="48" y2="155" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="8" y="218" width="78" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="47" y="231" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Data Poisoning</text>
  <text x="47" y="242" text-anchor="middle" font-size="7.5" fill="#c44">Corrupt labels</text>

  <!-- Attack 2: Feature Injection at Preprocessing -->
  <line x1="160" y1="214" x2="160" y2="155" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="116" y="218" width="88" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="160" y="231" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Feature Injection</text>
  <text x="160" y="242" text-anchor="middle" font-size="7.5" fill="#c44">Malformed inputs</text>

  <!-- Attack 3: Backdoor at Training -->
  <line x1="268" y1="214" x2="268" y2="155" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="224" y="218" width="88" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="268" y="231" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Backdoor Attack</text>
  <text x="268" y="242" text-anchor="middle" font-size="7.5" fill="#c44">Hidden triggers</text>

  <!-- Attack 4: Evasion at Validation gap -->
  <line x1="376" y1="214" x2="376" y2="155" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="332" y="218" width="88" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="376" y="231" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Evasion Attack</text>
  <text x="376" y="242" text-anchor="middle" font-size="7.5" fill="#c44">Adv. examples</text>

  <!-- Attack 5: Model Extraction at Deployment -->
  <line x1="484" y1="214" x2="484" y2="155" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="440" y="218" width="88" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="484" y="231" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Model Extraction</text>
  <text x="484" y="242" text-anchor="middle" font-size="7.5" fill="#c44">API probing</text>

  <!-- Attack 6: Distribution Shift at Monitoring -->
  <line x1="600" y1="214" x2="600" y2="155" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="556" y="218" width="96" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="604" y="231" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Distribution Shift</text>
  <text x="604" y="242" text-anchor="middle" font-size="7.5" fill="#c44">Concept drift</text>

  <!-- ===== Compound defense effectiveness row ===== -->
  <rect x="18" y="270" width="644" height="54" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="340" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compound Defense Effectiveness (Fraud Detection Example)</text>

  <!-- Effectiveness bars -->
  <!-- Data validation: catches 2-5% of crude poisoning -->
  <rect x="28" y="298" width="72" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="64" y="311" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">2–5% catch</text>

  <rect x="118" y="298" width="90" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="163" y="311" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">Schema: 100% valid</text>

  <rect x="228" y="298" width="92" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="274" y="311" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">+30% robustness</text>

  <rect x="338" y="298" width="90" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="383" y="311" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">Cert. ε-ball</text>

  <rect x="447" y="298" width="92" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="493" y="311" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">85–95% block</text>

  <rect x="556" y="298" width="98" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="605" y="311" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">1–2 wk detect</text>

  <!-- ===== Key insight box ===== -->
  <rect x="18" y="342" width="644" height="52" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">No single layer provides full protection. Defense in Depth compounds independent defenses.</text>
  <text x="340" y="376" text-anchor="middle" font-size="9" fill="#c87b2a">Each stage adds independent probability of catching threats that bypass upstream defenses.</text>
  <text x="340" y="390" text-anchor="middle" font-size="9" fill="#c87b2a">A bypass rate of 10% per layer × 6 layers yields a &lt;0.0001% combined bypass probability.</text>

  <!-- ===== Legend ===== -->
  <g transform="translate(18, 408)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="18" y="9" font-size="8.5" fill="#555">ML pipeline stage</text>
    <rect x="120" y="0" width="14" height="10" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
    <text x="138" y="9" font-size="8.5" fill="#555">Defense layer</text>
    <rect x="236" y="0" width="14" height="10" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
    <text x="254" y="9" font-size="8.5" fill="#555">Threat vector</text>
  </g>

  <!-- Bottom footnote -->
  <text x="340" y="447" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Defense effectiveness figures: production fraud detection system (illustrative)</text>
</svg>