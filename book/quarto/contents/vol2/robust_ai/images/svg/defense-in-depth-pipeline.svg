<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340.5" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Defense in Depth: ML Lifecycle Security Layers</text>

  <!-- ===== Defense shields (green boxes above each stage) ===== -->

  <!-- Defense 1: Data Sanitization -->
  <rect x="26" y="42" width="89" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="70.5" y="56" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Data Sanitization</text>
  <text x="70.5" y="69" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Outlier removal</text>
  <text x="70.5" y="82" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Deduplication</text>
  <!-- connector line down to stage -->
  <line x1="70.5" y1="90" x2="70.5" y2="100" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Defense 2: Input Validation -->
  <rect x="134" y="42" width="89" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="178.5" y="56" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Input Validation</text>
  <text x="178.5" y="69" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Schema checks</text>
  <text x="178.5" y="82" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Range constraints</text>
  <line x1="178.5" y1="90" x2="178.5" y2="100" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Defense 3: Adversarial Training -->
  <rect x="242" y="42" width="89" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="286.5" y="56" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Adv. Training</text>
  <text x="286.5" y="69" text-anchor="middle" font-size="7.5" fill="#3d9e5a">PGD-7 examples</text>
  <text x="286.5" y="82" text-anchor="middle" font-size="7.5" fill="#3d9e5a">8× compute cost</text>
  <line x1="286.5" y1="90" x2="286.5" y2="100" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Defense 4: Robustness Benchmarks -->
  <rect x="350" y="42" width="89" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="394.5" y="56" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Robustness Tests</text>
  <text x="394.5" y="69" text-anchor="middle" font-size="7.5" fill="#3d9e5a">OOD eval sets</text>
  <text x="394.5" y="82" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Certified radius</text>
  <line x1="394.5" y1="90" x2="394.5" y2="100" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Defense 5: Runtime Filtering -->
  <rect x="458" y="42" width="89" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="502.5" y="56" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Runtime Filter</text>
  <text x="502.5" y="69" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Adversarial detect</text>
  <text x="502.5" y="82" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Confidence thresh</text>
  <line x1="502.5" y1="90" x2="502.5" y2="100" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Defense 6: Drift Monitoring -->
  <rect x="566" y="42" width="89" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="610.5" y="56" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Drift Monitoring</text>
  <text x="610.5" y="69" text-anchor="middle" font-size="7.5" fill="#3d9e5a">PSI / MMD tests</text>
  <text x="610.5" y="82" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Retrain trigger</text>
  <line x1="610.5" y1="90" x2="610.5" y2="100" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Stage boxes (middle row) — pipeline stages ===== -->

  <!-- Stage 1: Data Ingestion -->
  <rect x="24" y="100" width="93" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="70.5" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Data</text>
  <text x="70.5" y="131" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Ingestion</text>
  <text x="70.5" y="145" text-anchor="middle" font-size="8" fill="#555">Raw pipeline</text>

  <!-- Arrow 1→2 -->
  <line x1="117" y1="126" x2="132" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Preprocessing -->
  <rect x="132" y="100" width="93" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="178.5" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Preprocessing</text>
  <text x="178.5" y="131" text-anchor="middle" font-size="9" fill="#555">Feature eng.</text>
  <text x="178.5" y="145" text-anchor="middle" font-size="8" fill="#555">Normalization</text>

  <!-- Arrow 2→3 -->
  <line x1="225" y1="126" x2="240" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Training -->
  <rect x="240" y="100" width="93" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="286.5" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Training</text>
  <text x="286.5" y="131" text-anchor="middle" font-size="9" fill="#555">Optimization</text>
  <text x="286.5" y="145" text-anchor="middle" font-size="8" fill="#555">Loss landscape</text>

  <!-- Arrow 3→4 -->
  <line x1="333" y1="126" x2="348" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Validation -->
  <rect x="348" y="100" width="93" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="394.5" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Validation</text>
  <text x="394.5" y="131" text-anchor="middle" font-size="9" fill="#555">OOD testing</text>
  <text x="394.5" y="145" text-anchor="middle" font-size="8" fill="#555">Stress tests</text>

  <!-- Arrow 4→5 -->
  <line x1="441" y1="126" x2="456" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: Deployment -->
  <rect x="456" y="100" width="93" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="502.5" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Deployment</text>
  <text x="502.5" y="131" text-anchor="middle" font-size="9" fill="#555">Serving infra</text>
  <text x="502.5" y="145" text-anchor="middle" font-size="8" fill="#555">Input filtering</text>

  <!-- Arrow 5→6 -->
  <line x1="549" y1="126" x2="564" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6: Monitoring -->
  <rect x="564" y="100" width="93" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="610.5" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Monitoring</text>
  <text x="610.5" y="131" text-anchor="middle" font-size="9" fill="#555">Drift detection</text>
  <text x="610.5" y="145" text-anchor="middle" font-size="8" fill="#555">Alerting</text>

  <!-- ===== Attack arrows from below (red upward arrows) ===== -->

  <!-- Attack 1: Data Poisoning at Ingestion -->
  <line x1="70.5" y1="218" x2="70.5" y2="152" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="25.5" y="218" width="90" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="70.5" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Data Poisoning</text>
  <text x="70.5" y="244" text-anchor="middle" font-size="7.5" fill="#c44">Corrupt labels</text>

  <!-- Attack 2: Feature Injection at Preprocessing -->
  <line x1="178.5" y1="218" x2="178.5" y2="152" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="133.5" y="218" width="90" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="178.5" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Feature Injection</text>
  <text x="178.5" y="244" text-anchor="middle" font-size="7.5" fill="#c44">Malformed inputs</text>

  <!-- Attack 3: Backdoor at Training -->
  <line x1="286.5" y1="218" x2="286.5" y2="152" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="241.5" y="218" width="90" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="286.5" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Backdoor Attack</text>
  <text x="286.5" y="244" text-anchor="middle" font-size="7.5" fill="#c44">Hidden triggers</text>

  <!-- Attack 4: Evasion at Validation gap -->
  <line x1="394.5" y1="218" x2="394.5" y2="152" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="349.5" y="218" width="90" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="394.5" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Evasion Attack</text>
  <text x="394.5" y="244" text-anchor="middle" font-size="7.5" fill="#c44">Adv. examples</text>

  <!-- Attack 5: Model Extraction at Deployment -->
  <line x1="502.5" y1="218" x2="502.5" y2="152" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="457.5" y="218" width="90" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="502.5" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Model Extraction</text>
  <text x="502.5" y="244" text-anchor="middle" font-size="7.5" fill="#c44">API probing</text>

  <!-- Attack 6: Distribution Shift at Monitoring -->
  <line x1="610.5" y1="218" x2="610.5" y2="152" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="565.5" y="218" width="90" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="610.5" y="232" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Distribution Shift</text>
  <text x="610.5" y="244" text-anchor="middle" font-size="7.5" fill="#c44">Concept drift</text>

  <!-- ===== Compound defense effectiveness row ===== -->
  <rect x="24" y="280" width="633" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="340.5" y="298" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compound Defense Effectiveness (Fraud Detection Example)</text>

  <!-- Effectiveness bars -->
  <!-- Data validation: catches 2-5% of crude poisoning -->
  <rect x="34.5" y="310" width="72" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="70.5" y="325" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">2–5% catch</text>

  <rect x="133.5" y="310" width="90" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="178.5" y="325" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">Schema: 100% valid</text>

  <rect x="240.5" y="310" width="92" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="286.5" y="325" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">+30% robustness</text>

  <rect x="349.5" y="310" width="90" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="394.5" y="325" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">Cert. ε-ball</text>

  <rect x="456.5" y="310" width="92" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="502.5" y="325" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">85–95% block</text>

  <rect x="561.5" y="310" width="98" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="610.5" y="325" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">1–2 wk detect</text>

  <!-- ===== Key insight box ===== -->
  <rect x="24" y="360" width="633" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="340.5" y="378" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">No single layer provides full protection. Defense in Depth compounds independent defenses.</text>
  <text x="340.5" y="394" text-anchor="middle" font-size="9" fill="#c87b2a">Each stage adds independent probability of catching threats that bypass upstream defenses.</text>
  <text x="340.5" y="410" text-anchor="middle" font-size="9" fill="#c87b2a">A bypass rate of 10% per layer × 6 layers yields a &lt;0.0001% combined bypass probability.</text>

  <!-- ===== Legend ===== -->
  <g transform="translate(24, 440)">
    <rect x="0" y="0" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4"/>
    <text x="18" y="9" font-size="8.5" fill="#555">ML pipeline stage</text>
    <rect x="120" y="0" width="14" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
    <text x="138" y="9" font-size="8.5" fill="#555">Defense layer</text>
    <rect x="236" y="0" width="14" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
    <text x="254" y="9" font-size="8.5" fill="#555">Threat vector</text>
  </g>

  <!-- Bottom footnote -->
  <text x="340.5" y="480" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Defense effectiveness figures: production fraud detection system (illustrative)</text>
</svg>