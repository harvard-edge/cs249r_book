<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">KV Cache Memory Fragmentation</text>

  <!-- ===== Vertical center divider ===== -->
  <line x1="340" y1="35" x2="340" y2="325" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Internal Fragmentation ===== -->
  <text x="170" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Internal Fragmentation</text>
  <text x="170" y="59" text-anchor="middle" font-size="8.5" fill="#555">Max sequence length pre-allocated per request</text>

  <!-- Memory layout label -->
  <text x="30" y="82" font-size="9" font-weight="700" fill="#555">GPU Memory (pre-allocated blocks)</text>

  <!-- Sequence A: allocated for max=8 blocks, used=3 -->
  <text x="28" y="102" font-size="8.5" fill="#333">Seq A</text>
  <!-- Used (blue) blocks -->
  <rect x="60" y="88" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="75" y="104" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T1</text>
  <rect x="91" y="88" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="106" y="104" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T2</text>
  <rect x="122" y="88" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="137" y="104" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T3</text>
  <!-- Unused (gray) blocks -->
  <rect x="153" y="88" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="168" y="104" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="184" y="88" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="199" y="104" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="215" y="88" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="104" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="246" y="88" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="261" y="104" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="277" y="88" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="292" y="104" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <!-- Waste brace annotation -->
  <line x1="153" y1="117" x2="307" y2="117" stroke="#c44" stroke-width="1"/>
  <line x1="153" y1="113" x2="153" y2="121" stroke="#c44" stroke-width="1"/>
  <line x1="307" y1="113" x2="307" y2="121" stroke="#c44" stroke-width="1"/>
  <text x="230" y="130" text-anchor="middle" font-size="8.5" fill="#c44">62.5% wasted</text>

  <!-- Sequence B: allocated for max=8, used=5 -->
  <text x="28" y="158" font-size="8.5" fill="#333">Seq B</text>
  <rect x="60" y="144" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="75" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T1</text>
  <rect x="91" y="144" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="106" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T2</text>
  <rect x="122" y="144" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="137" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T3</text>
  <rect x="153" y="144" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="168" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T4</text>
  <rect x="184" y="144" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="199" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T5</text>
  <!-- Unused -->
  <rect x="215" y="144" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="160" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="246" y="144" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="261" y="160" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="277" y="144" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="292" y="160" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <!-- Waste brace -->
  <line x1="215" y1="173" x2="307" y2="173" stroke="#c44" stroke-width="1"/>
  <line x1="215" y1="169" x2="215" y2="177" stroke="#c44" stroke-width="1"/>
  <line x1="307" y1="169" x2="307" y2="177" stroke="#c44" stroke-width="1"/>
  <text x="261" y="186" text-anchor="middle" font-size="8.5" fill="#c44">37.5% wasted</text>

  <!-- Sequence C: allocated for max=8, used=1 -->
  <text x="28" y="214" font-size="8.5" fill="#333">Seq C</text>
  <rect x="60" y="200" width="30" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="75" y="216" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">T1</text>
  <rect x="91" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="106" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="122" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="137" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="153" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="168" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="184" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="199" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="215" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="246" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="261" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <rect x="277" y="200" width="30" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="292" y="216" text-anchor="middle" font-size="7.5" fill="#999">—</text>
  <line x1="91" y1="229" x2="307" y2="229" stroke="#c44" stroke-width="1"/>
  <line x1="91" y1="225" x2="91" y2="233" stroke="#c44" stroke-width="1"/>
  <line x1="307" y1="225" x2="307" y2="233" stroke="#c44" stroke-width="1"/>
  <text x="199" y="242" text-anchor="middle" font-size="8.5" fill="#c44">87.5% wasted</text>

  <!-- Left panel total waste label -->
  <rect x="38" y="256" width="275" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="175.5" y="268" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Total: up to 60–80% memory wasted</text>
  <text x="175.5" y="279" text-anchor="middle" font-size="8" fill="#c44">Severely limits concurrent batch size</text>

  <!-- ===== RIGHT PANEL: External Fragmentation ===== -->
  <text x="510" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">External Fragmentation</text>
  <text x="510" y="59" text-anchor="middle" font-size="8.5" fill="#555">Variable-length sequences leave unusable gaps</text>

  <!-- Memory layout label -->
  <text x="360" y="82" font-size="9" font-weight="700" fill="#555">Linear GPU Memory Address Space</text>

  <!-- Contiguous memory layout with gaps -->
  <!-- Block row 1: Seq X (used 3), Gap, Seq Y (used 5), Gap, can't fit Z -->
  <text x="360" y="108" font-size="8.5" fill="#333">After completions and new allocations:</text>

  <!-- Seq X: 3 used blocks -->
  <rect x="360" y="115" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="377.5" y="131" text-anchor="middle" font-size="7.5" fill="#333">Seq X</text>
  <rect x="396" y="115" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="413.5" y="131" text-anchor="middle" font-size="7.5" fill="#333">Seq X</text>
  <rect x="432" y="115" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="449.5" y="131" text-anchor="middle" font-size="7.5" fill="#333">Seq X</text>

  <!-- Gap between X and Y -->
  <rect x="468" y="115" width="35" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="485.5" y="131" text-anchor="middle" font-size="7.5" fill="#999">gap</text>
  <rect x="504" y="115" width="35" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="521.5" y="131" text-anchor="middle" font-size="7.5" fill="#999">gap</text>

  <!-- Seq Y: 5 used blocks -->
  <rect x="540" y="115" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="557.5" y="131" text-anchor="middle" font-size="7.5" fill="#333">Seq Y</text>
  <rect x="576" y="115" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="593.5" y="131" text-anchor="middle" font-size="7.5" fill="#333">Seq Y</text>
  <rect x="612" y="115" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="629.5" y="131" text-anchor="middle" font-size="7.5" fill="#333">Seq Y</text>
  <rect x="648" y="115" width="12" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- Row 2: gap + can't fit new sequence -->
  <text x="360" y="158" font-size="8.5" fill="#333">New Seq Z needs 4 contiguous blocks:</text>
  <!-- Total free = 2 blocks, but non-contiguous -->
  <rect x="360" y="165" width="35" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="377.5" y="181" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <rect x="396" y="165" width="35" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="413.5" y="181" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <!-- Used blocks in middle -->
  <rect x="432" y="165" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="449.5" y="181" text-anchor="middle" font-size="7.5" fill="#333">Seq W</text>
  <rect x="468" y="165" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="485.5" y="181" text-anchor="middle" font-size="7.5" fill="#333">Seq W</text>
  <!-- Two more free blocks non-contiguous -->
  <rect x="504" y="165" width="35" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="521.5" y="181" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <rect x="540" y="165" width="35" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="557.5" y="181" text-anchor="middle" font-size="7.5" fill="#999">free</text>
  <!-- Used -->
  <rect x="576" y="165" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="593.5" y="181" text-anchor="middle" font-size="7.5" fill="#333">Seq V</text>
  <rect x="612" y="165" width="35" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="629.5" y="181" text-anchor="middle" font-size="7.5" fill="#333">Seq V</text>

  <!-- Rejection annotation -->
  <rect x="360" y="197" width="300" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="510" y="211" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">4 free blocks exist, but no contiguous region — Seq Z rejected</text>

  <!-- Right panel total waste label -->
  <rect x="360" y="226" width="300" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="510" y="238" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Admission denied despite available memory</text>
  <text x="510" y="249" text-anchor="middle" font-size="8" fill="#c44">Throughput collapses under realistic workloads</text>

  <!-- ===== Divider between problem and solution ===== -->
  <line x1="20" y1="298" x2="660" y2="298" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="352.0" y="313" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">PagedAttention Solution: Virtual → Physical Page Mapping</text>

  <!-- ===== PagedAttention Solution Row ===== -->
  <!-- Logical pages (virtual) -->
  <text x="100" y="335" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Logical (Virtual)</text>
  <rect x="30" y="340" width="36" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="48" y="354" text-anchor="middle" font-size="8" fill="#333">Page 0</text>
  <rect x="70" y="340" width="36" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="88" y="354" text-anchor="middle" font-size="8" fill="#333">Page 1</text>
  <rect x="110" y="340" width="36" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="128" y="354" text-anchor="middle" font-size="8" fill="#333">Page 2</text>
  <rect x="150" y="340" width="36" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="168" y="354" text-anchor="middle" font-size="8" fill="#333">Page 3</text>

  <!-- Block table box -->
  <rect x="210" y="330" width="70" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="245" y="346" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Block</text>
  <text x="245" y="359" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Table</text>

  <!-- Arrows from logical to block table -->
  <line x1="188" y1="351" x2="208" y2="351" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrows from block table to physical blocks (scattered) -->
  <line x1="280" y1="351" x2="360" y2="345" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="280" y1="351" x2="420" y2="360" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="280" y1="351" x2="500" y2="338" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="280" y1="351" x2="580" y2="358" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Physical blocks (non-contiguous in HBM) -->
  <text x="493" y="325" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Physical (HBM) — non-contiguous</text>

  <!-- Scattered physical blocks of different sequences -->
  <rect x="355" y="333" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="373" y="337.0" text-anchor="middle" font-size="7.5" fill="#333">Blk 7</text>

  <rect x="395" y="349" width="36" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="413" y="353.0" text-anchor="middle" font-size="7.5" fill="#999">other</text>

  <rect x="435" y="338" width="36" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="453" y="352" text-anchor="middle" font-size="7.5" fill="#999">other</text>

  <rect x="475" y="325" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="493" y="329.0" text-anchor="middle" font-size="7.5" fill="#333">Blk 2</text>

  <rect x="515" y="348" width="36" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="533" y="352.0" text-anchor="middle" font-size="7.5" fill="#999">other</text>

  <rect x="555" y="335" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="573" y="349" text-anchor="middle" font-size="7.5" fill="#333">Blk 14</text>

  <rect x="595" y="350" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="613" y="364" text-anchor="middle" font-size="7.5" fill="#333">Blk 31</text>

  <!-- PagedAttention benefit label -->
  <rect x="200" y="382" width="280" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="394" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">No fragmentation: any free block serves any sequence</text>
  <text x="340" y="405" text-anchor="middle" font-size="8" fill="#3d9e5a">2–4x throughput improvement on same hardware</text>

  <!-- ===== Legend ===== -->
  <rect x="30" y="420" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="48" y="429" font-size="8.5" fill="#333">Used KV blocks</text>

  <rect x="140" y="420" width="14" height="10" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="158" y="429" font-size="8.5" fill="#333">Unused / wasted blocks</text>

  <rect x="295" y="420" width="14" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="313" y="429" font-size="8.5" fill="#333">PagedAttention physical blocks (mapped)</text>

  <!-- ===== Footer ===== -->
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">PagedAttention eliminates both internal and external fragmentation by decoupling logical sequence positions from physical memory locations.</text>
</svg>