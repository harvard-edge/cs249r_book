<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="720" height="560" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-error" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Background regions -->
  <!-- CPU region -->
  <rect x="50" y="140" width="180" height="260" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="140" y="165" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">CPU PRE/POST</text>

  <!-- GPU region -->
  <rect x="280" y="140" width="400" height="260" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="480" y="165" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">GPU INFERENCE</text>

  <!-- === Top: Multiple client requests funneling to Load Balancer === -->
  <!-- Client requests -->
  <rect x="20" y="20" width="60" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="50" y="39" text-anchor="middle" font-size="8.5" fill="#333">Req 1</text>
  
  <rect x="20" y="60" width="60" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="50" y="79" text-anchor="middle" font-size="8.5" fill="#333">Req 2</text>
  
  <text x="50" y="105" text-anchor="middle" font-size="10" fill="#999">...</text>
  
  <rect x="20" y="110" width="60" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="50" y="129" text-anchor="middle" font-size="8.5" fill="#333">Req N</text>

  <!-- Arrows from requests to LB (orthogonal routing, evenly spaced) -->
  <path d="M80,35 L90,35 L90,75 L100,75" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M80,75 L90,75 L90,85 L100,85" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M80,125 L90,125 L90,95 L100,95" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Load Balancer -->
  <rect x="100" y="60" width="80" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="140" y="81" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Load</text>
  <text x="140" y="94" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Balancer</text>

  <!-- Arrow LB to Preprocessing -->
  <line x1="140" y1="110" x2="140" y2="190" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- === Stage 1: Preprocessing (Tokenization) === -->
  <rect x="80" y="190" width="120" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="211" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Preprocessing</text>
  <text x="140" y="226" text-anchor="middle" font-size="9" fill="#555">Tokenization</text>

  <!-- Arrow Preprocessing to Prefill -->
  <line x1="200" y1="215" x2="310" y2="215" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- === Stage 2: Prefill (Compute-bound) === -->
  <rect x="310" y="185" width="140" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="380" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Prefill Stage</text>
  <text x="380" y="220" text-anchor="middle" font-size="9" fill="#555">Prompt KV</text>
  <text x="380" y="232" text-anchor="middle" font-size="9" fill="#555">computation</text>

  <!-- Annotation: Compute-bound -->
  <text x="380" y="270" text-anchor="middle" font-size="9" font-weight="600" fill="#a31f34">Compute-bound (parallel)</text>

  <!-- === KV Cache === -->
  <rect x="500" y="185" width="80" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="540" y="211" text-anchor="middle" font-size="9" font-weight="700" fill="#333">KV</text>
  <text x="540" y="226" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Cache</text>

  <!-- Arrow Prefill to KV Cache -->
  <line x1="450" y1="215" x2="500" y2="215" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Arrow KV Cache to Decode -->
  <line x1="540" y1="245" x2="540" y2="295" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- === Stage 3: Decode (Memory-bound) === -->
  <rect x="470" y="295" width="140" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="540" y="316" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Decode Stage</text>
  <text x="540" y="330" text-anchor="middle" font-size="9" fill="#555">Autoregressive</text>
  <text x="540" y="342" text-anchor="middle" font-size="9" fill="#555">generation</text>

  <!-- Annotation: Memory-bound -->
  <text x="540" y="375" text-anchor="middle" font-size="9" font-weight="600" fill="#a31f34">Memory-bound (sequential)</text>

  <!-- Decode self-loop arrow (autoregressive) -->
  <path d="M610,310 L630,310 L630,340 L610,340" fill="none" stroke="#c44" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-error)"/>
  <text x="648" y="322" text-anchor="middle" font-size="8" fill="#c44">token</text>
  <text x="648" y="332" text-anchor="middle" font-size="8" fill="#c44">loop</text>

  <!-- Arrow Decode to Postprocessing -->
  <line x1="470" y1="325" x2="200" y2="325" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- === Stage 4: Postprocessing (Detokenization) === -->
  <rect x="80" y="300" width="120" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="321" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Postprocessing</text>
  <text x="140" y="336" text-anchor="middle" font-size="9" fill="#555">Detokenization</text>

  <!-- Arrow Postprocessing to Response -->
  <line x1="140" y1="350" x2="140" y2="430" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- === Response === -->
  <rect x="90" y="430" width="100" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="140" y="453" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Response</text>

  <!-- === Latency budget breakdown at bottom === -->
  <g transform="translate(40, 490)">
    <!-- Segmented bar -->
    <rect x="0" y="0" width="70" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <text x="35" y="14" text-anchor="middle" font-size="7.5" fill="#333">Routing</text>

    <rect x="70" y="0" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
    <text x="100" y="14" text-anchor="middle" font-size="7.5" fill="#333">Pre</text>

    <rect x="130" y="0" width="160" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
    <text x="210" y="14" text-anchor="middle" font-size="7.5" fill="#333">Prefill (TTFT)</text>

    <rect x="290" y="0" width="280" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <text x="430" y="14" text-anchor="middle" font-size="7.5" fill="#333">Decode (TPOT x N tokens)</text>

    <rect x="570" y="0" width="52" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
    <text x="596" y="14" text-anchor="middle" font-size="7.5" fill="#333">Post</text>

    <text x="311" y="38" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Latency budget breakdown</text>
  </g>
</svg>