<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 630" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="630" fill="#fff"/>
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-up" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- === Tier 1: CDN / Edge Cache === -->
  <g transform="translate(40, 30)">
    <!-- Main box -->
    <rect x="0" y="0" width="600" height="130" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="20" y="35" font-size="12" font-weight="700" fill="#333">Tier 1: CDN / Edge Cache</text>
    <text x="20" y="55" font-size="10" fill="#555">Geographic distribution, cached static responses, prompt templates</text>

    <!-- SLA label -->
    <rect x="460" y="20" width="120" height="30" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
    <text x="520" y="39" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">SLA: &lt;10 ms</text>

    <!-- Horizontal scaling: 3 edge nodes -->
    <rect x="20" y="80" width="120" height="30" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
    <text x="80" y="100" text-anchor="middle" font-size="10" fill="#333">Edge PoP 1</text>
    
    <rect x="160" y="80" width="120" height="30" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
    <text x="220" y="100" text-anchor="middle" font-size="10" fill="#333">Edge PoP 2</text>
    
    <rect x="300" y="80" width="120" height="30" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
    <text x="360" y="100" text-anchor="middle" font-size="10" fill="#333">Edge PoP 3</text>
    
    <text x="450" y="100" text-anchor="middle" font-size="14" fill="#999">...</text>
  </g>

  <!-- Arrow down: Tier 1 to Tier 2 (request flow) -->
  <line x1="280" y1="160" x2="280" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <text x="270" y="184" text-anchor="end" font-size="9" fill="#555">request</text>

  <!-- Arrow up: Tier 2 to Tier 1 (response flow) -->
  <line x1="400" y1="200" x2="400" y2="160" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-up)"/>
  <text x="410" y="184" text-anchor="start" font-size="9" fill="#3d9e5a">response</text>

  <!-- === Tier 2: Gateway / Router === -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="600" height="140" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="20" y="35" font-size="12" font-weight="700" fill="#333">Tier 2: Gateway / Router</text>
    <text x="20" y="55" font-size="10" fill="#555">Request routing, rate limiting, authentication, SLO classification</text>

    <!-- SLA label -->
    <rect x="460" y="20" width="120" height="30" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
    <text x="520" y="39" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">SLA: &lt;50 ms</text>

    <!-- Horizontal scaling: gateway instances -->
    <rect x="20" y="80" width="120" height="40" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
    <text x="80" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Rate Limiter</text>
    <text x="80" y="112" text-anchor="middle" font-size="9" fill="#555">token bucket</text>

    <rect x="160" y="80" width="120" height="40" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
    <text x="220" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Auth / API Key</text>
    <text x="220" y="112" text-anchor="middle" font-size="9" fill="#555">validation</text>

    <rect x="300" y="80" width="120" height="40" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
    <text x="360" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Router</text>
    <text x="360" y="112" text-anchor="middle" font-size="9" fill="#555">model selection</text>
  </g>

  <!-- Arrow down: Tier 2 to Tier 3 -->
  <line x1="280" y1="340" x2="280" y2="380" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <text x="270" y="364" text-anchor="end" font-size="9" fill="#555">request</text>

  <!-- Arrow up: Tier 3 to Tier 2 -->
  <line x1="400" y1="380" x2="400" y2="340" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-up)"/>
  <text x="410" y="364" text-anchor="start" font-size="9" fill="#3d9e5a">response</text>

  <!-- === Tier 3: Model Serving Cluster === -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="600" height="190" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="20" y="35" font-size="12" font-weight="700" fill="#333">Tier 3: Model Serving Cluster</text>
    <text x="20" y="55" font-size="10" fill="#555">GPU workers, autoscaling, load balancing, continuous batching</text>

    <!-- SLA label -->
    <rect x="460" y="20" width="120" height="30" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
    <text x="520" y="39" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">SLA: &lt;2 s</text>

    <!-- GPU Worker boxes -->
    <rect x="20" y="80" width="120" height="90" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
    <text x="80" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#333">GPU Worker 1</text>
    <rect x="30" y="110" width="100" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
    <text x="80" y="124" text-anchor="middle" font-size="9" fill="#333">Prefill</text>
    <rect x="30" y="138" width="100" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <text x="80" y="152" text-anchor="middle" font-size="9" fill="#333">Decode</text>

    <rect x="150" y="80" width="120" height="90" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
    <text x="210" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#333">GPU Worker 2</text>
    <rect x="160" y="110" width="100" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
    <text x="210" y="124" text-anchor="middle" font-size="9" fill="#333">Prefill</text>
    <rect x="160" y="138" width="100" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <text x="210" y="152" text-anchor="middle" font-size="9" fill="#333">Decode</text>

    <rect x="280" y="80" width="120" height="90" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
    <text x="340" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#333">GPU Worker 3</text>
    <rect x="290" y="110" width="100" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
    <text x="340" y="124" text-anchor="middle" font-size="9" fill="#333">Prefill</text>
    <rect x="290" y="138" width="100" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <text x="340" y="152" text-anchor="middle" font-size="9" fill="#333">Decode</text>

    <text x="420" y="130" text-anchor="middle" font-size="14" fill="#999">...</text>

    <!-- Autoscaler box -->
    <rect x="440" y="80" width="140" height="90" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="510" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Autoscaler</text>
    <text x="510" y="120" text-anchor="middle" font-size="9" fill="#555">queue depth monitor</text>
    <text x="510" y="136" text-anchor="middle" font-size="9" fill="#555">scale-up / scale-down</text>
    <text x="510" y="152" text-anchor="middle" font-size="9" fill="#555">GPU cold start: ~60 s</text>
  </g>

  <!-- Bottom annotation -->
  <text x="340" y="600" text-anchor="middle" font-size="10" font-style="italic" fill="#999">Each tier scales horizontally; latency budget consumed cumulatively top to bottom</text>
</svg>