<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="480" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Pipeline Parallelism: Request Flow</text>

  <!-- ── (a) Single Request: sequential latency ── -->
  <text x="30" y="60" font-size="11" font-weight="700" fill="#333">(a) Single request — pipeline adds no latency benefit</text>

  <!-- Request origin -->
  <rect x="30" y="70" width="60" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="60" y="90" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Request</text>

  <!-- Stage boxes -->
  <!-- Stage 0 -->
  <line x1="90" y1="85" x2="120" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="120" y="65" width="110" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="175" y="80" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 0</text>
  <text x="175" y="95" text-anchor="middle" font-size="8.5" fill="#555">Layers 1–20</text>

  <!-- Stage 1 -->
  <line x1="230" y1="85" x2="260" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="245" y="80" text-anchor="middle" font-size="7.5" fill="#555">acts.</text>
  <rect x="260" y="65" width="110" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="315" y="80" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 1</text>
  <text x="315" y="95" text-anchor="middle" font-size="8.5" fill="#555">Layers 21–40</text>

  <!-- Stage 2 -->
  <line x1="370" y1="85" x2="400" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="385" y="80" text-anchor="middle" font-size="7.5" fill="#555">acts.</text>
  <rect x="400" y="65" width="110" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="455" y="80" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 2</text>
  <text x="455" y="95" text-anchor="middle" font-size="8.5" fill="#555">Layers 41–60</text>

  <!-- Stage 3 -->
  <line x1="510" y1="85" x2="540" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="525" y="80" text-anchor="middle" font-size="7.5" fill="#555">acts.</text>
  <rect x="540" y="65" width="110" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="595" y="80" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 3</text>
  <text x="595" y="95" text-anchor="middle" font-size="8.5" fill="#555">L 61–80</text>

  <!-- Response -->
  <line x1="650" y1="85" x2="670" y2="85" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- GPU labels below stages -->
  <text x="175" y="120" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 0</text>
  <text x="315" y="120" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 1</text>
  <text x="455" y="120" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 2</text>
  <text x="595" y="120" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 3</text>

  <!-- ── Divider ── -->
  <line x1="20" y1="140" x2="660" y2="140" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ── (b) Multiple requests: throughput scaling via pipelining ── -->
  <text x="30" y="160" font-size="11" font-weight="700" fill="#333">(b) Multiple requests — pipeline fills for throughput scaling</text>

  <!-- Time axis -->
  <text x="30" y="180" font-size="9" font-weight="700" fill="#555">Time →</text>
  <line x1="80" y1="175" x2="660" y2="175" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- GPU row labels -->
  <text x="70" y="205" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 0</text>
  <text x="70" y="235" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 1</text>
  <text x="70" y="265" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 2</text>
  <text x="70" y="295" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 3</text>

  <!-- Grid: 4 GPUs × up to 5 time slots
       Each slot: width=110, height=20, starting x=80 -->

  <!-- GPU 0 row -->
  <rect x="80" y="190" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="135" y="205" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="190" y="190" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="245" y="205" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>
  <rect x="300" y="190" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="355" y="205" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 3</text>
  <rect x="410" y="190" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="465" y="205" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 4</text>
  <text x="575" y="205" text-anchor="middle" font-size="11" fill="#bbb">···</text>

  <!-- GPU 1 row -->
  <rect x="80" y="220" width="110" height="20" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="135" y="235" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="190" y="220" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="245" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="300" y="220" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="355" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>
  <rect x="410" y="220" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="465" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 3</text>
  <rect x="520" y="220" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="575" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 4</text>

  <!-- GPU 2 row -->
  <rect x="80" y="250" width="110" height="20" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="135" y="265" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="190" y="250" width="110" height="20" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="245" y="265" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="300" y="250" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="355" y="265" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="410" y="250" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="465" y="265" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>
  <rect x="520" y="250" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="575" y="265" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 3</text>

  <!-- GPU 3 row -->
  <rect x="80" y="280" width="110" height="20" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="135" y="295" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="190" y="280" width="110" height="20" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="245" y="295" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="300" y="280" width="110" height="20" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="355" y="295" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="410" y="280" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="465" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="520" y="280" width="110" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="575" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>

  <!-- Pipeline fill annotation -->
  <line x1="410" y1="185" x2="410" y2="320" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="420" y="340" font-size="8.5" fill="#a31f34" font-weight="700">pipeline full</text>
  <text x="420" y="355" font-size="8.5" fill="#a31f34">→ steady-state</text>

  <!-- Throughput annotation -->
  <rect x="20" y="370" width="640" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d7a2d">Steady-state throughput = P × single-stage throughput  (P = 4 pipeline stages)</text>
  <text x="340" y="410" text-anchor="middle" font-size="9" fill="#555">Latency per request ≈ sum of all stage times; throughput scales with parallelism</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="440" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Point-to-point activation transfer between stages; no AllReduce required.</text>
  <text x="340" y="455" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Idle fill period limits single-request latency benefit.</text>

</svg>