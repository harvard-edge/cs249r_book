<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Pipeline Parallelism: Request Flow</text>

  <!-- ── (a) Single Request: sequential latency ── -->
  <text x="28" y="58" font-size="11" font-weight="700" fill="#333">(a) Single request — pipeline adds no latency benefit</text>

  <!-- Request origin -->
  <rect x="28" y="68" width="72" height="34" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="64" y="89" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Request</text>

  <!-- Stage boxes -->
  <!-- Stage 0 -->
  <line x1="100" y1="85" x2="128" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="130" y="66" width="118" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="189" y="82" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 0</text>
  <text x="189" y="96" text-anchor="middle" font-size="8.5" fill="#555">Layers 1–20</text>

  <!-- Stage 1 -->
  <line x1="248" y1="85" x2="276" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="278" y="66" width="118" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="337" y="82" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 1</text>
  <text x="337" y="96" text-anchor="middle" font-size="8.5" fill="#555">Layers 21–40</text>

  <!-- Stage 2 -->
  <line x1="396" y1="85" x2="424" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="426" y="66" width="118" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="485" y="82" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 2</text>
  <text x="485" y="96" text-anchor="middle" font-size="8.5" fill="#555">Layers 41–60</text>

  <!-- Stage 3 -->
  <line x1="544" y1="85" x2="572" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="574" y="66" width="78" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="613" y="82" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Stage 3</text>
  <text x="613" y="96" text-anchor="middle" font-size="8.5" fill="#555">L 61–80</text>

  <!-- Response -->
  <line x1="652" y1="85" x2="670" y2="85" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- GPU labels below stages -->
  <text x="189" y="114" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 0</text>
  <text x="337" y="114" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 1</text>
  <text x="485" y="114" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 2</text>
  <text x="613" y="114" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">GPU 3</text>

  <!-- Activation transfer labels -->
  <text x="262" y="78" text-anchor="middle" font-size="7.5" fill="#555">acts.</text>
  <text x="410" y="78" text-anchor="middle" font-size="7.5" fill="#555">acts.</text>
  <text x="558" y="78" text-anchor="middle" font-size="7.5" fill="#555">acts.</text>

  <!-- ── Divider ── -->
  <line x1="20" y1="132" x2="660" y2="132" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ── (b) Multiple requests: throughput scaling via pipelining ── -->
  <text x="28" y="152" font-size="11" font-weight="700" fill="#333">(b) Multiple requests — pipeline fills for throughput scaling</text>

  <!-- Time axis -->
  <text x="28" y="176" font-size="9" font-weight="700" fill="#555">Time →</text>
  <line x1="80" y1="172" x2="660" y2="172" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- GPU row labels -->
  <text x="72" y="204" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 0</text>
  <text x="72" y="240" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 1</text>
  <text x="72" y="276" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 2</text>
  <text x="72" y="312" text-anchor="end" font-size="9" font-weight="700" fill="#a31f34">GPU 3</text>

  <!-- Grid: 4 GPUs × up to 5 time slots
       Each slot: width=108, height=26, starting x=80 -->

  <!-- GPU 0 row: Req1 then Req2 then Req3 then Req4 ... -->
  <rect x="80" y="186" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="134" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="188" y="186" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="242" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>
  <rect x="296" y="186" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="350" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 3</text>
  <rect x="404" y="186" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="458" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 4</text>
  <text x="540" y="203" font-size="11" fill="#bbb">···</text>

  <!-- GPU 1 row: offset by 1 slot -->
  <rect x="80" y="222" width="108" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="134" y="239" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="188" y="222" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="242" y="239" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="296" y="222" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="350" y="239" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>
  <rect x="404" y="222" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="458" y="239" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 3</text>
  <rect x="512" y="222" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="566" y="239" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 4</text>

  <!-- GPU 2 row: offset by 2 slots -->
  <rect x="80" y="258" width="108" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="134" y="275" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="188" y="258" width="108" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="242" y="275" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="296" y="258" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="350" y="275" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="404" y="258" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="458" y="275" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>
  <rect x="512" y="258" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="566" y="275" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 3</text>

  <!-- GPU 3 row: offset by 3 slots -->
  <rect x="80" y="294" width="108" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="134" y="311" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="188" y="294" width="108" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="242" y="311" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="296" y="294" width="108" height="26" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="350" y="311" text-anchor="middle" font-size="8" fill="#bbb">idle (fill)</text>
  <rect x="404" y="294" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="458" y="311" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 1</text>
  <rect x="512" y="294" width="108" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="566" y="311" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Req 2</text>

  <!-- Pipeline fill annotation -->
  <line x1="404" y1="183" x2="404" y2="324" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="408" y="340" font-size="8.5" fill="#a31f34" font-weight="700">pipeline full</text>
  <text x="408" y="352" font-size="8.5" fill="#a31f34">→ steady-state</text>

  <!-- Throughput annotation -->
  <rect x="20" y="370" width="640" height="48" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d7a2d">Steady-state throughput = P × single-stage throughput  (P = 4 pipeline stages)</text>
  <text x="340" y="408" text-anchor="middle" font-size="9" fill="#555">Latency per request ≈ sum of all stage times; throughput scales with parallelism</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Point-to-point activation transfer between stages; no AllReduce required.</text>
  <text x="340" y="458" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Idle fill period limits single-request latency benefit.</text>

</svg>