<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <rect width="680" height="540" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Spot-Aware Traffic Distribution</text>

  <!-- ── Incoming request ── -->
  <rect x="275" y="44" width="130" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="340" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Incoming Request</text>
  <text x="340" y="78" text-anchor="middle" font-size="8.5" fill="#555">classified by SLO tier</text>

  <!-- Arrow to load balancer -->
  <line x1="340" y1="84" x2="340" y2="126" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Load Balancer ── -->
  <rect x="214" y="126" width="252" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="2" rx="4"/>
  <text x="340" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Load Balancer</text>
  <text x="340" y="164" text-anchor="middle" font-size="9" fill="#555">routes by SLO class: on-demand vs. best-effort</text>

  <!-- Split arrows: 70% left, 30% right -->
  <path d="M 286 178 L 286 210 L 170 210 L 170 240" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 394 178 L 394 210 L 510 210 L 510 240" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-orange)"/>

  <!-- 70% / 30% labels -->
  <text x="228" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">70%</text>
  <text x="452" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">30%</text>

  <!-- ══════════════════════════════════════
       ON-DEMAND COLUMN (left)
       ══════════════════════════════════════ -->
  <rect x="20" y="240" width="300" height="200" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="170" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">On-Demand Replicas</text>
  <text x="170" y="286" text-anchor="middle" font-size="8.5" fill="#555">guaranteed capacity · always available</text>

  <!-- Replica boxes -->
  <rect x="40" y="308" width="80" height="56" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="80" y="324" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Worker 0</text>
  <text x="80" y="338" text-anchor="middle" font-size="8" fill="#555">reserved GPU</text>
  <text x="80" y="352" text-anchor="middle" font-size="7.5" fill="#3d9e5a">always up</text>

  <rect x="130" y="308" width="80" height="56" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="170" y="324" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Worker 1</text>
  <text x="170" y="338" text-anchor="middle" font-size="8" fill="#555">reserved GPU</text>
  <text x="170" y="352" text-anchor="middle" font-size="7.5" fill="#3d9e5a">always up</text>

  <rect x="220" y="308" width="80" height="56" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="260" y="324" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Worker 2</text>
  <text x="260" y="338" text-anchor="middle" font-size="8" fill="#555">reserved GPU</text>
  <text x="260" y="352" text-anchor="middle" font-size="7.5" fill="#3d9e5a">always up</text>

  <!-- SLO label -->
  <rect x="60" y="386" width="220" height="34" fill="#fff" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="170" y="401" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d7a2d">SLO-critical requests</text>
  <text x="170" y="414" text-anchor="middle" font-size="8.5" fill="#555">latency guaranteed · no preemption risk</text>

  <!-- ══════════════════════════════════════
       SPOT COLUMN (right)
       ══════════════════════════════════════ -->
  <rect x="360" y="240" width="300" height="200" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" rx="4"/>
  <text x="510" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Spot Replicas</text>
  <text x="510" y="286" text-anchor="middle" font-size="8.5" fill="#555">cost savings · may be preempted</text>

  <rect x="380" y="308" width="80" height="56" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2" rx="4"/>
  <text x="420" y="324" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Worker 3</text>
  <text x="420" y="338" text-anchor="middle" font-size="8" fill="#555">spot GPU</text>
  <text x="420" y="352" text-anchor="middle" font-size="7.5" fill="#c87b2a">may evict</text>

  <rect x="470" y="308" width="80" height="56" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2" rx="4"/>
  <text x="510" y="324" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Worker 4</text>
  <text x="510" y="338" text-anchor="middle" font-size="8" fill="#555">spot GPU</text>
  <text x="510" y="352" text-anchor="middle" font-size="7.5" fill="#c87b2a">may evict</text>

  <rect x="560" y="308" width="80" height="56" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="600" y="331" text-anchor="middle" font-size="8.5" fill="#999">preempted</text>
  <text x="600" y="345" text-anchor="middle" font-size="7.5" fill="#999">draining</text>

  <!-- SLO label -->
  <rect x="396" y="386" width="228" height="34" fill="#fff" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="510" y="401" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">Best-effort requests</text>
  <text x="510" y="414" text-anchor="middle" font-size="8.5" fill="#555">retry on eviction · ~60–70% cost saving</text>

  <!-- ── Cost comparison bar ── -->
  <rect x="20" y="460" width="640" height="42" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="340" y="476" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Cost structure: 70% on-demand + 30% spot ≈ 50% reduction vs. 100% on-demand</text>
  <text x="340" y="492" text-anchor="middle" font-size="9" fill="#555">Spot pricing: ~70% discount · eviction rate: 5–15% depending on instance type and region</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="515" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Spot workers drain in-flight requests before eviction when given advance notice (typically 2 min).</text>

</svg>