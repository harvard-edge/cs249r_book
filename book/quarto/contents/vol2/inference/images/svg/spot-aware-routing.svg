<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ── Title ── -->
  <text x="340" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Spot-Aware Traffic Distribution</text>

  <!-- ── Incoming request ── -->
  <rect x="275" y="44" width="130" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Incoming Request</text>
  <text x="340" y="78" text-anchor="middle" font-size="8.5" fill="#555">classified by SLO tier</text>

  <!-- Arrow to load balancer -->
  <line x1="340" y1="84" x2="340" y2="124" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Load Balancer ── -->
  <rect x="214" y="126" width="252" height="52" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Load Balancer</text>
  <text x="340" y="164" text-anchor="middle" font-size="9" fill="#555">routes by SLO class: on-demand vs. best-effort</text>

  <!-- Split arrows: 70% left, 30% right -->
  <line x1="286" y1="178" x2="190" y2="228" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="394" y1="178" x2="490" y2="228" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-orange)"/>

  <!-- 70% / 30% labels -->
  <text x="224" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">70%</text>
  <text x="454" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">30%</text>

  <!-- ══════════════════════════════════════
       ON-DEMAND COLUMN (left)
       ══════════════════════════════════════ -->
  <rect x="20" y="230" width="300" height="150" rx="6" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">On-Demand Replicas</text>
  <text x="170" y="268" text-anchor="middle" font-size="8.5" fill="#555">guaranteed capacity · always available</text>

  <!-- Replica boxes -->
  <rect x="36"  y="278" width="80" height="46" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="76" y="298" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Worker 0</text>
  <text x="76" y="312" text-anchor="middle" font-size="8" fill="#555">reserved GPU</text>
  <text x="76" y="324" text-anchor="middle" font-size="7.5" fill="#3d9e5a">always up</text>

  <rect x="124" y="278" width="80" height="46" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="164" y="298" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Worker 1</text>
  <text x="164" y="312" text-anchor="middle" font-size="8" fill="#555">reserved GPU</text>
  <text x="164" y="324" text-anchor="middle" font-size="7.5" fill="#3d9e5a">always up</text>

  <rect x="212" y="278" width="80" height="46" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="252" y="298" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Worker 2</text>
  <text x="252" y="312" text-anchor="middle" font-size="8" fill="#555">reserved GPU</text>
  <text x="252" y="324" text-anchor="middle" font-size="7.5" fill="#3d9e5a">always up</text>

  <!-- SLO label -->
  <rect x="60" y="336" width="220" height="34" rx="12" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="170" y="351" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d7a2d">SLO-critical requests</text>
  <text x="170" y="364" text-anchor="middle" font-size="8.5" fill="#555">latency guaranteed · no preemption risk</text>

  <!-- ══════════════════════════════════════
       SPOT COLUMN (right)
       ══════════════════════════════════════ -->
  <rect x="360" y="230" width="300" height="150" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="510" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Spot Replicas</text>
  <text x="510" y="268" text-anchor="middle" font-size="8.5" fill="#555">cost savings · may be preempted</text>

  <rect x="376" y="278" width="80" height="46" rx="4" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="416" y="298" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Worker 3</text>
  <text x="416" y="312" text-anchor="middle" font-size="8" fill="#555">spot GPU</text>
  <text x="416" y="324" text-anchor="middle" font-size="7.5" fill="#c87b2a">may evict</text>

  <rect x="464" y="278" width="80" height="46" rx="4" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="504" y="298" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Worker 4</text>
  <text x="504" y="312" text-anchor="middle" font-size="8" fill="#555">spot GPU</text>
  <text x="504" y="324" text-anchor="middle" font-size="7.5" fill="#c87b2a">may evict</text>

  <rect x="552" y="278" width="80" height="46" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="592" y="301" text-anchor="middle" font-size="8.5" fill="#999">preempted</text>
  <text x="592" y="314" text-anchor="middle" font-size="7.5" fill="#999">draining</text>

  <!-- SLO label -->
  <rect x="396" y="336" width="228" height="34" rx="12" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="510" y="351" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">Best-effort requests</text>
  <text x="510" y="364" text-anchor="middle" font-size="8.5" fill="#555">retry on eviction · ~60–70% cost saving</text>

  <!-- ── Cost comparison bar ── -->
  <rect x="20" y="398" width="640" height="42" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="340" y="414" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Cost structure: 70% on-demand + 30% spot ≈ 50% reduction vs. 100% on-demand</text>
  <text x="340" y="430" text-anchor="middle" font-size="9" fill="#555">Spot pricing: ~70% discount · eviction rate: 5–15% depending on instance type and region</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="453" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Spot workers drain in-flight requests before eviction when given advance notice (typically 2 min).</text>

</svg>
