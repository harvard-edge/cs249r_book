<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ── Title ── -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Edge Caching: Cache Hit vs. Cache Miss Paths</text>

  <!-- ══════════════════════════════════════════════════════
       LEFT COLUMN: Architecture nodes (vertical)
       ══════════════════════════════════════════════════════ -->

  <!-- User / Client -->
  <rect x="20" y="56" width="110" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="75" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#333">User Request</text>
  <text x="75" y="88" text-anchor="middle" font-size="8.5" fill="#555">global client</text>

  <!-- Arrow down to Edge Cache -->
  <line x1="75" y1="96" x2="75" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Edge Cache / CDN -->
  <rect x="20" y="140" width="110" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="75" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Edge Cache</text>
  <text x="75" y="174" text-anchor="middle" font-size="8.5" fill="#555">CDN · PoP node</text>
  <text x="75" y="186" text-anchor="middle" font-size="8" fill="#4a90c4">nearest to user</text>

  <!-- Arrow down to Regional Proxy -->
  <line x1="75" y1="192" x2="75" y2="234" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="88" y="220" font-size="8" fill="#999">miss only</text>

  <!-- Regional Proxy -->
  <rect x="20" y="236" width="110" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="75" y="253" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Regional</text>
  <text x="75" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Proxy</text>

  <!-- Arrow down to Central Inference -->
  <line x1="75" y1="276" x2="75" y2="318" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="88" y="304" font-size="8" fill="#999">miss only</text>

  <!-- Central Inference -->
  <rect x="20" y="320" width="110" height="52" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="75" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Central</text>
  <text x="75" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Inference</text>
  <text x="75" y="368" text-anchor="middle" font-size="8" fill="#3d9e5a">GPU cluster</text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT SIDE: two annotated paths
       ══════════════════════════════════════════════════════ -->

  <!-- ── PATH A: Cache Hit ── -->
  <rect x="200" y="140" width="212" height="52" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="306" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#2d7a2d">Cache Hit</text>
  <text x="306" y="176" text-anchor="middle" font-size="9" fill="#555">response returned from edge node</text>
  <text x="306" y="190" text-anchor="middle" font-size="9" fill="#555">no backend compute required</text>

  <!-- Hit path: Edge Cache → back to User, bypassing proxy+inference -->
  <path d="M 130,166 C 170,166 190,76 160,76" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- Latency badge -->
  <rect x="200" y="205" width="212" height="30" rx="12" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="306" y="224" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">Latency: &lt; 10 ms</text>

  <!-- ── PATH B: Cache Miss ── -->
  <rect x="200" y="256" width="212" height="52" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="306" y="276" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Cache Miss</text>
  <text x="306" y="292" text-anchor="middle" font-size="9" fill="#555">request traverses full backend</text>
  <text x="306" y="306" text-anchor="middle" font-size="9" fill="#555">response populates edge cache</text>

  <!-- Horizontal connector from architecture column to miss box -->
  <line x1="130" y1="256" x2="198" y2="282" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Latency badge -->
  <rect x="200" y="320" width="212" height="30" rx="12" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="306" y="339" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Latency: full inference RTT</text>

  <!-- ── Cache hit rate table ── -->
  <rect x="440" y="140" width="220" height="210" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="550" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Cache Hit Rates</text>

  <line x1="456" y1="168" x2="644" y2="168" stroke="#e0e0e0" stroke-width="0.8"/>

  <text x="524" y="184" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Workload</text>
  <text x="614" y="184" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Hit Rate</text>

  <line x1="456" y1="190" x2="644" y2="190" stroke="#e0e0e0" stroke-width="0.6"/>

  <text x="524" y="208" text-anchor="middle" font-size="8.5" fill="#333">Autocomplete</text>
  <text x="614" y="208" text-anchor="middle" font-size="8.5" font-weight="700" fill="#2d7a2d">60–80%</text>

  <text x="524" y="226" text-anchor="middle" font-size="8.5" fill="#333">FAQ chatbot</text>
  <text x="614" y="226" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">40–60%</text>

  <text x="524" y="244" text-anchor="middle" font-size="8.5" fill="#333">Code generation</text>
  <text x="614" y="244" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">20–40%</text>

  <text x="524" y="262" text-anchor="middle" font-size="8.5" fill="#333">Open-ended chat</text>
  <text x="614" y="262" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">5–15%</text>

  <line x1="456" y1="270" x2="644" y2="270" stroke="#e0e0e0" stroke-width="0.6"/>

  <text x="550" y="286" text-anchor="middle" font-size="8" fill="#555">Semantic caching can improve</text>
  <text x="550" y="299" text-anchor="middle" font-size="8" fill="#555">open-ended rates 2–3×</text>
  <text x="550" y="312" text-anchor="middle" font-size="8" fill="#999">(+1–5 ms lookup overhead)</text>
  <text x="550" y="328" text-anchor="middle" font-size="8" fill="#999">via embedding similarity</text>

  <!-- ── Cache population annotation ── -->
  <rect x="200" y="368" width="452" height="48" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="426" y="386" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Cache Population on Miss</text>
  <text x="426" y="404" text-anchor="middle" font-size="9" fill="#555">Central inference response propagates back through proxy → stored at edge for subsequent identical queries.</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Effective for repeated or templated queries; poor fit for open-ended generative workloads.</text>

</svg>