<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Tensor Parallelism: Request Routing</text>

  <!-- ── Request box ── -->
  <rect x="20" y="52" width="90" height="36" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="65" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>

  <!-- ── Arrow: Request → Load Balancer ── -->
  <line x1="110" y1="70" x2="149" y2="70" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Load Balancer box ── -->
  <rect x="150" y="50" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="210" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Load Balancer</text>
  <text x="210" y="82" text-anchor="middle" font-size="8.5" fill="#555">selects shard group</text>

  <!-- ── Shard Group container ── -->
  <rect x="310" y="36" width="332" height="224" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="475" y="57" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Shard Group</text>

  <!-- ── Arrow: LB → broadcast ── -->
  <line x1="270" y1="70" x2="347" y2="70" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="309" y="63" text-anchor="middle" font-size="8" fill="#555">broadcast</text>

  <!-- ── Broadcast split lines to 3 GPUs ── -->
  <line x1="348" y1="70" x2="348" y2="210" stroke="#555" stroke-width="1.2"/>
  <line x1="348" y1="90" x2="359" y2="90" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="348" y1="150" x2="359" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="348" y1="210" x2="359" y2="210" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── GPU 0 ── -->
  <rect x="360" y="68" width="130" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="360" y="68" width="36" height="16" fill="#a31f34"/>
  <text x="378" y="80" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 0</text>
  <text x="452" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Attention heads 0–7</text>
  <text x="452" y="103" text-anchor="middle" font-size="8.5" fill="#555">partial computation</text>

  <!-- ── GPU 1 ── -->
  <rect x="360" y="130" width="130" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="360" y="130" width="36" height="16" fill="#a31f34"/>
  <text x="378" y="142" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 1</text>
  <text x="452" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Attention heads 8–15</text>
  <text x="452" y="165" text-anchor="middle" font-size="8.5" fill="#555">partial computation</text>

  <!-- ── GPU 2 ── -->
  <rect x="360" y="192" width="130" height="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="360" y="192" width="36" height="16" fill="#a31f34"/>
  <text x="378" y="204" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 2</text>
  <text x="452" y="212" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Attention heads 16–23</text>
  <text x="452" y="227" text-anchor="middle" font-size="8.5" fill="#555">partial computation</text>

  <!-- ── Arrows from GPUs to AllReduce ── -->
  <path d="M 490,94 L 504,94 L 504,138 L 517,138" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 490,156 L 517,156" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 490,218 L 504,218 L 504,174 L 517,174" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ── AllReduce box ── -->
  <rect x="518" y="126" width="104" height="60" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="570" y="146" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">AllReduce</text>
  <text x="570" y="162" text-anchor="middle" font-size="8.5" fill="#555">combine partial</text>
  <text x="570" y="174" text-anchor="middle" font-size="8.5" fill="#555">attention outputs</text>

  <!-- ── Arrows from AllReduce ── -->
  <!-- Down to next layer / annotation -->
  <line x1="570" y1="186" x2="570" y2="289" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- Branch left to Response -->
  <path d="M 570,274 L 313,274 L 313,293" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ── Response box ── -->
  <rect x="258" y="294" width="110" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="313" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Response</text>

  <!-- ── Annotation: NVLink required ── -->
  <rect x="20" y="290" width="210" height="56" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="125" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Requires high-BW interconnect</text>
  <text x="125" y="326" text-anchor="middle" font-size="8.5" fill="#555">AllReduce cost ∝ activation size</text>
  <text x="125" y="340" text-anchor="middle" font-size="8.5" fill="#555">NVLink: 900 GB/s · PCIe: 64 GB/s</text>

  <!-- ── Annotation: latency ── -->
  <rect x="410" y="290" width="230" height="56" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="525" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Per-layer communication</text>
  <text x="525" y="326" text-anchor="middle" font-size="8.5" fill="#555">1 AllReduce per transformer block</text>
  <text x="525" y="340" text-anchor="middle" font-size="8.5" fill="#555">column → row partition scheme</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="418" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Each request is broadcast to all devices in the shard group; results synchronized via AllReduce.</text>
  <text x="340" y="433" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Latency scales with interconnect bandwidth, not model size.</text>

</svg>