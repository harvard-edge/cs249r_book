<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 870">
  <rect width="680" height="870" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- ====== (a) No Batching ====== -->
  <text x="20" y="30" font-size="12" font-weight="700" fill="#333">(a) No Batching</text>
  <text x="20" y="50" font-size="9" fill="#555">Requests processed sequentially; GPU idle between requests</text>

  <g transform="translate(100, 90)">
    <!-- R1 -->
    <text x="-10" y="14" text-anchor="end" font-size="9" fill="#555">R1</text>
    <rect x="0" y="0" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="30" y="14" text-anchor="middle" font-size="8" fill="#333">R1</text>
    <rect x="60" y="0" width="20" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.6" stroke-dasharray="2,2"/>

    <!-- R2 -->
    <text x="-10" y="44" text-anchor="end" font-size="9" fill="#555">R2</text>
    <rect x="80" y="30" width="90" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="125" y="44" text-anchor="middle" font-size="8" fill="#333">R2</text>
    <rect x="170" y="30" width="20" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.6" stroke-dasharray="2,2"/>

    <!-- R3 -->
    <text x="-10" y="74" text-anchor="end" font-size="9" fill="#555">R3</text>
    <rect x="190" y="60" width="50" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="215" y="74" text-anchor="middle" font-size="8" fill="#333">R3</text>
    <rect x="240" y="60" width="20" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.6" stroke-dasharray="2,2"/>

    <!-- R4 -->
    <text x="-10" y="104" text-anchor="end" font-size="9" fill="#555">R4</text>
    <rect x="260" y="90" width="70" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="295" y="104" text-anchor="middle" font-size="8" fill="#333">R4</text>

    <!-- GPU utilization bar -->
    <text x="-10" y="154" text-anchor="end" font-size="8.5" font-weight="600" fill="#555">GPU</text>
    <rect x="0" y="140" width="340" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
    <rect x="0" y="140" width="60" height="20" fill="#cfe2f3" stroke="none"/>
    <rect x="80" y="140" width="90" height="20" fill="#cfe2f3" stroke="none"/>
    <rect x="190" y="140" width="50" height="20" fill="#cfe2f3" stroke="none"/>
    <rect x="260" y="140" width="70" height="20" fill="#cfe2f3" stroke="none"/>
    <text x="380" y="154" font-size="9" font-weight="600" fill="#a31f34">~40% util.</text>

    <!-- Time axis -->
    <line x1="0" y1="180" x2="340" y2="180" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="170" y="200" text-anchor="middle" font-size="8.5" fill="#555">Time</text>
  </g>

  <!-- ====== (b) Static Batching ====== -->
  <text x="20" y="330" font-size="12" font-weight="700" fill="#333">(b) Static Batching</text>
  <text x="20" y="350" font-size="9" fill="#555">Wait for batch to fill, then process together; early arrivals wait</text>

  <g transform="translate(100, 390)">
    <!-- Wait zone (shaded) -->
    <rect x="0" y="0" width="80" height="110" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="40" y="126" text-anchor="middle" font-size="8" font-style="italic" fill="#c87b2a">wait</text>

    <!-- R1 -->
    <text x="-10" y="14" text-anchor="end" font-size="9" fill="#555">R1</text>
    <rect x="0" y="0" width="80" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="80" y="0" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="110" y="14" text-anchor="middle" font-size="8" fill="#333">R1</text>
    <rect x="140" y="0" width="30" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="155" y="14" text-anchor="middle" font-size="8" fill="#c44">pad</text>

    <!-- R2 -->
    <text x="-10" y="44" text-anchor="end" font-size="9" fill="#555">R2</text>
    <rect x="20" y="30" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="80" y="30" width="90" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="125" y="44" text-anchor="middle" font-size="8" fill="#333">R2</text>

    <!-- R3 -->
    <text x="-10" y="74" text-anchor="end" font-size="9" fill="#555">R3</text>
    <rect x="50" y="60" width="30" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="80" y="60" width="50" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="105" y="74" text-anchor="middle" font-size="8" fill="#333">R3</text>
    <rect x="130" y="60" width="40" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="150" y="74" text-anchor="middle" font-size="8" fill="#c44">pad</text>

    <!-- R4 -->
    <text x="-10" y="104" text-anchor="end" font-size="9" fill="#555">R4</text>
    <rect x="70" y="90" width="10" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="80" y="90" width="70" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="115" y="104" text-anchor="middle" font-size="8" fill="#333">R4</text>

    <!-- Batch boundaries -->
    <line x1="80" y1="0" x2="80" y2="110" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="80" y="-10" text-anchor="middle" font-size="8" font-weight="600" fill="#a31f34">batch dispatch</text>
    <line x1="170" y1="0" x2="170" y2="110" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>

    <!-- GPU utilization bar -->
    <text x="-10" y="154" text-anchor="end" font-size="8.5" font-weight="600" fill="#555">GPU</text>
    <rect x="0" y="140" width="340" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
    <rect x="80" y="140" width="90" height="20" fill="#cfe2f3" stroke="none"/>
    <text x="380" y="154" font-size="9" font-weight="600" fill="#a31f34">~70% util.</text>

    <!-- Time axis -->
    <line x1="0" y1="180" x2="340" y2="180" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="170" y="200" text-anchor="middle" font-size="8.5" fill="#555">Time</text>
  </g>

  <!-- ====== (c) Dynamic Batching ====== -->
  <text x="20" y="630" font-size="12" font-weight="700" fill="#333">(c) Dynamic Batching</text>
  <text x="20" y="650" font-size="9" fill="#555">Assemble batch within a time window; shorter wait, adaptive batch size</text>

  <g transform="translate(100, 690)">
    <!-- Time windows -->
    <rect x="0" y="0" width="40" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="20" y="66" text-anchor="middle" font-size="8" font-style="italic" fill="#c87b2a">window</text>
    <rect x="130" y="0" width="40" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- R1 -->
    <text x="-10" y="14" text-anchor="end" font-size="9" fill="#555">R1</text>
    <rect x="0" y="0" width="40" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="40" y="0" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="70" y="14" text-anchor="middle" font-size="8" fill="#333">R1</text>

    <!-- R2 -->
    <text x="-10" y="44" text-anchor="end" font-size="9" fill="#555">R2</text>
    <rect x="15" y="30" width="25" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="40" y="30" width="90" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="85" y="44" text-anchor="middle" font-size="8" fill="#333">R2</text>

    <!-- R3 -->
    <rect x="130" y="0" width="40" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="170" y="0" width="50" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="195" y="14" text-anchor="middle" font-size="8" fill="#333">R3</text>

    <!-- R4 -->
    <rect x="140" y="30" width="30" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="170" y="30" width="70" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="205" y="44" text-anchor="middle" font-size="8" fill="#333">R4</text>

    <!-- Batch boundaries -->
    <line x1="40" y1="0" x2="40" y2="50" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="170" y1="0" x2="170" y2="50" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- GPU utilization bar -->
    <text x="-10" y="94" text-anchor="end" font-size="8.5" font-weight="600" fill="#555">GPU</text>
    <rect x="0" y="80" width="340" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
    <rect x="40" y="80" width="90" height="20" fill="#cfe2f3" stroke="none"/>
    <rect x="170" y="80" width="70" height="20" fill="#cfe2f3" stroke="none"/>
    <text x="380" y="94" font-size="9" font-weight="600" fill="#3d9e5a">~85% util.</text>

    <!-- Time axis -->
    <line x1="0" y1="120" x2="340" y2="120" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="170" y="140" text-anchor="middle" font-size="8.5" fill="#555">Time</text>
  </g>
</svg>