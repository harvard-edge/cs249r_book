<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ── Title ── -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Expert Parallelism (MoE): Request Flow</text>

  <!-- ══════════════════════════════════════════════════════
       TOP LANE: the 5-stage pipeline left → right
       ══════════════════════════════════════════════════════ -->

  <!-- Stage 1: Request -->
  <rect x="20" y="56" width="80" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="60" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>
  <text x="60" y="88" text-anchor="middle" font-size="8.5" fill="#555">token stream</text>

  <!-- Arrow → Gating -->
  <line x1="100" y1="76" x2="128" y2="76" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Gating -->
  <rect x="130" y="56" width="100" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="180" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Gating</text>
  <text x="180" y="88" text-anchor="middle" font-size="8.5" fill="#555">Top-k selection</text>

  <!-- Arrow → AllToAll dispatch -->
  <line x1="230" y1="76" x2="258" y2="76" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-orange)"/>
  <text x="244" y="68" text-anchor="middle" font-size="7.5" fill="#c87b2a">cross-device</text>

  <!-- Stage 3: AllToAll dispatch -->
  <rect x="260" y="56" width="120" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="320" y="72" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">AllToAll</text>
  <text x="320" y="86" text-anchor="middle" font-size="8" fill="#555">dispatch to experts</text>

  <!-- Arrow → Expert compute -->
  <line x1="380" y1="76" x2="408" y2="76" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Expert Compute (parallel boxes) -->
  <rect x="410" y="36" width="120" height="120" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="470" y="54" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Expert Compute</text>
  <text x="470" y="66" text-anchor="middle" font-size="8" fill="#999">(parallel, on selected GPUs)</text>

  <rect x="422" y="72" width="96" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="470" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Expert A — GPU 0</text>

  <rect x="422" y="104" width="96" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="470" y="120" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Expert B — GPU 2</text>

  <!-- GPU idle label -->
  <rect x="422" y="136" width="96" height="16" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="470" y="148" text-anchor="middle" font-size="8" fill="#999">GPU 1 — idle</text>

  <!-- Arrow from expert compute to AllToAll gather -->
  <line x1="530" y1="76" x2="558" y2="76" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-orange)"/>
  <text x="544" y="68" text-anchor="middle" font-size="7.5" fill="#c87b2a">cross-device</text>

  <!-- Stage 5: AllToAll gather -->
  <rect x="560" y="56" width="100" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="610" y="72" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">AllToAll</text>
  <text x="610" y="86" text-anchor="middle" font-size="8" fill="#555">gather results</text>

  <!-- Response arrow down from gather -->
  <line x1="610" y1="96" x2="610" y2="196" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Response box -->
  <rect x="556" y="198" width="108" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="610" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Response</text>

  <!-- ══════════════════════════════════════════════════════
       LATENCY BREAKDOWN BAR
       ══════════════════════════════════════════════════════ -->
  <text x="28" y="200" font-size="10" font-weight="700" fill="#333">Latency breakdown per MoE layer:</text>

  <!-- Bar segments -->
  <rect x="28" y="210" width="60"  height="18" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="58" y="223" text-anchor="middle" font-size="7.5" fill="#555">Gating ~0.1 ms</text>

  <rect x="88" y="210" width="100" height="18" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="138" y="223" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">AllToAll ~0.2 ms</text>

  <rect x="188" y="210" width="140" height="18" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="258" y="223" text-anchor="middle" font-size="7.5" fill="#333">Expert FFN compute</text>

  <rect x="328" y="210" width="100" height="18" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="378" y="223" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">AllToAll ~0.2 ms</text>

  <text x="438" y="223" font-size="9" fill="#999" font-style="italic">← repeated every MoE layer</text>

  <!-- ══════════════════════════════════════════════════════
       LOAD IMBALANCE CALLOUT
       ══════════════════════════════════════════════════════ -->
  <rect x="20" y="248" width="640" height="130" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="340" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Load Imbalance: The Critical MoE Challenge</text>
  <text x="340" y="286" text-anchor="middle" font-size="9" fill="#555">If the gating function routes disproportionately to some experts, those GPUs become bottlenecks</text>
  <text x="340" y="302" text-anchor="middle" font-size="9" fill="#555">while others sit idle — wasting capacity and inflating latency.</text>

  <!-- Unbalanced vs balanced tokens -->
  <text x="120" y="328" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Unbalanced</text>
  <rect x="36"  y="334" width="56" height="24" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="64"  y="350" text-anchor="middle" font-size="8.5" fill="#c44">40 tokens</text>
  <rect x="96"  y="334" width="56" height="24" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="124" y="350" text-anchor="middle" font-size="8.5" fill="#c44">3 tokens</text>
  <rect x="156" y="334" width="56" height="24" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="184" y="350" text-anchor="middle" font-size="8" fill="#999">idle</text>

  <text x="420" y="328" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Balanced (auxiliary loss)</text>
  <rect x="336" y="334" width="56" height="24" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="364" y="350" text-anchor="middle" font-size="8.5" fill="#2d7a2d">15 tokens</text>
  <rect x="396" y="334" width="56" height="24" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="424" y="350" text-anchor="middle" font-size="8.5" fill="#2d7a2d">14 tokens</text>
  <rect x="456" y="334" width="56" height="24" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="484" y="350" text-anchor="middle" font-size="8.5" fill="#2d7a2d">14 tokens</text>

  <text x="120" y="374" text-anchor="middle" font-size="8" fill="#c44">Expert A = bottleneck</text>
  <text x="420" y="374" text-anchor="middle" font-size="8" fill="#3d9e5a">Uniform utilization</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="408" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Two AllToAll operations per MoE layer add ~0.4 ms communication overhead.</text>
  <text x="340" y="421" text-anchor="middle" font-size="9" font-style="italic" fill="#999">All expert weights must reside in memory despite most being idle on any given token.</text>

</svg>
