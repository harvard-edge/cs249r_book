<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="520" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Expert Parallelism (MoE): Request Flow</text>

  <!-- ══════════════════════════════════════════════════════
       TOP LANE: the 5-stage pipeline left → right
       ══════════════════════════════════════════════════════ -->

  <!-- Stage 1: Request -->
  <rect x="20" y="60" width="80" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="60" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>
  <text x="60" y="90" text-anchor="middle" font-size="8.5" fill="#555">token stream</text>

  <!-- Arrow → Gating -->
  <line x1="100" y1="80" x2="130" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Gating -->
  <rect x="130" y="60" width="100" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="180" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Gating</text>
  <text x="180" y="90" text-anchor="middle" font-size="8.5" fill="#555">Top-k selection</text>

  <!-- Arrow → AllToAll dispatch -->
  <line x1="230" y1="80" x2="260" y2="80" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-orange)"/>
  <text x="245" y="72" text-anchor="middle" font-size="7.5" fill="#c87b2a">cross-device</text>

  <!-- Stage 3: AllToAll dispatch -->
  <rect x="260" y="60" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="320" y="76" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">AllToAll</text>
  <text x="320" y="90" text-anchor="middle" font-size="8" fill="#555">dispatch to experts</text>

  <!-- Arrow → Expert compute -->
  <line x1="380" y1="80" x2="410" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Expert Compute (parallel boxes) -->
  <rect x="410" y="30" width="120" height="140" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="470" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Expert Compute</text>
  <text x="470" y="60" text-anchor="middle" font-size="8" fill="#999">(parallel, on selected GPUs)</text>

  <rect x="420" y="70" width="100" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="470" y="84" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Expert A — GPU 0</text>

  <rect x="420" y="100" width="100" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="470" y="114" text-anchor="middle" font-size="9" font-weight="600" fill="#333">Expert B — GPU 2</text>

  <!-- GPU idle label -->
  <rect x="420" y="130" width="100" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="470" y="144" text-anchor="middle" font-size="8" fill="#999">GPU 1 — idle</text>

  <!-- Arrow from expert compute to AllToAll gather -->
  <line x1="530" y1="80" x2="560" y2="80" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-orange)"/>
  <text x="545" y="72" text-anchor="middle" font-size="7.5" fill="#c87b2a">cross-device</text>

  <!-- Stage 5: AllToAll gather -->
  <rect x="560" y="60" width="100" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="610" y="76" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">AllToAll</text>
  <text x="610" y="90" text-anchor="middle" font-size="8" fill="#555">gather results</text>

  <!-- Response arrow down from gather -->
  <line x1="610" y1="100" x2="610" y2="210" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Response box -->
  <rect x="560" y="210" width="100" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="610" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Response</text>

  <!-- ══════════════════════════════════════════════════════
       LATENCY BREAKDOWN BAR
       ══════════════════════════════════════════════════════ -->
  <text x="30" y="200" font-size="10" font-weight="700" fill="#333">Latency breakdown per MoE layer:</text>

  <!-- Bar segments -->
  <rect x="30" y="210" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="60" y="224" text-anchor="middle" font-size="7.5" fill="#555">Gating ~0.1 ms</text>

  <rect x="90" y="210" width="80" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="130" y="224" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">AllToAll ~0.2 ms</text>

  <rect x="170" y="210" width="120" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="230" y="224" text-anchor="middle" font-size="7.5" fill="#333">Expert FFN compute</text>

  <rect x="290" y="210" width="80" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="330" y="224" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">AllToAll ~0.2 ms</text>

  <text x="380" y="224" font-size="9" fill="#999" font-style="italic">← repeated every MoE layer</text>

  <!-- ══════════════════════════════════════════════════════
       LOAD IMBALANCE CALLOUT
       ══════════════════════════════════════════════════════ -->
  <rect x="20" y="270" width="640" height="180" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="340" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Load Imbalance: The Critical MoE Challenge</text>
  <text x="340" y="315" text-anchor="middle" font-size="9" fill="#555">If the gating function routes disproportionately to some experts, those GPUs become bottlenecks</text>
  <text x="340" y="330" text-anchor="middle" font-size="9" fill="#555">while others sit idle — wasting capacity and inflating latency.</text>

  <!-- Unbalanced vs balanced tokens -->
  <text x="170" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Unbalanced</text>
  
  <rect x="70" y="370" width="60" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="100" y="389" text-anchor="middle" font-size="8.5" fill="#c44">40 tokens</text>
  
  <rect x="140" y="370" width="60" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="170" y="389" text-anchor="middle" font-size="8.5" fill="#c44">3 tokens</text>
  
  <rect x="210" y="370" width="60" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="240" y="389" text-anchor="middle" font-size="8" fill="#999">idle</text>

  <text x="170" y="420" text-anchor="middle" font-size="8" fill="#c44">Expert A = bottleneck</text>

  <text x="510" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Balanced (auxiliary loss)</text>
  
  <rect x="410" y="370" width="60" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="440" y="389" text-anchor="middle" font-size="8.5" fill="#2d7a2d">15 tokens</text>
  
  <rect x="480" y="370" width="60" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="510" y="389" text-anchor="middle" font-size="8.5" fill="#2d7a2d">14 tokens</text>
  
  <rect x="550" y="370" width="60" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="389" text-anchor="middle" font-size="8.5" fill="#2d7a2d">14 tokens</text>

  <text x="510" y="420" text-anchor="middle" font-size="8" fill="#3d9e5a">Uniform utilization</text>

  <!-- ── Bottom footnotes ── -->
  <text x="340" y="480" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Two AllToAll operations per MoE layer add ~0.4 ms communication overhead.</text>
  <text x="340" y="496" text-anchor="middle" font-size="9" font-style="italic" fill="#999">All expert weights must reside in memory despite most being idle on any given token.</text>

</svg>