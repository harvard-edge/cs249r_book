<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Feature-Parallel Recommendation Pipeline</text>

  <!-- ===== Request (orange) ===== -->
  <rect x="20" y="195" width="80" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="60" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>
  <text x="60" y="229" text-anchor="middle" font-size="8.5" fill="#555">User + Items</text>
  <text x="60" y="241" text-anchor="middle" font-size="8.5" fill="#555">+ Context</text>

  <!-- Arrow: Request → Feature Extraction -->
  <line x1="100" y1="220" x2="130" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Feature Extraction box ===== -->
  <rect x="130" y="185" width="90" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>
  <text x="175" y="206" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Feature</text>
  <text x="175" y="219" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Extraction</text>
  <text x="175" y="234" text-anchor="middle" font-size="8.5" fill="#555">Parse features</text>
  <text x="175" y="246" text-anchor="middle" font-size="8.5" fill="#555">by type</text>

  <!-- Fan-out arrows from Feature Extraction to three embedding tables -->
  <!-- To User Embeddings (top) -->
  <line x1="220" y1="205" x2="270" y2="135" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- To Item Embeddings (middle) -->
  <line x1="220" y1="220" x2="270" y2="220" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- To Context Embeddings (bottom) -->
  <line x1="220" y1="235" x2="270" y2="305" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Embedding Tables Section Header ===== -->
  <text x="340" y="48" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Parallel Embedding Lookup (memory-bound)</text>
  <line x1="265" y1="52" x2="495" y2="52" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== GPU-labeled Embedding Table boxes (blue) ===== -->

  <!-- User Embedding GPU -->
  <rect x="270" y="100" width="110" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="325" y="118" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">User Embeddings</text>
  <text x="325" y="131" text-anchor="middle" font-size="8.5" fill="#555">user_id, age,</text>
  <text x="325" y="143" text-anchor="middle" font-size="8.5" fill="#555">history features</text>
  <!-- GPU badge -->
  <rect x="355" y="103" width="22" height="13" fill="#a31f34" rx="2"/>
  <text x="366" y="113" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 0</text>

  <!-- Item Embedding GPU -->
  <rect x="270" y="185" width="110" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="325" y="203" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Item Embeddings</text>
  <text x="325" y="216" text-anchor="middle" font-size="8.5" fill="#555">item_id, category,</text>
  <text x="325" y="228" text-anchor="middle" font-size="8.5" fill="#555">price features</text>
  <!-- GPU badge -->
  <rect x="355" y="188" width="22" height="13" fill="#a31f34" rx="2"/>
  <text x="366" y="198" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 1</text>

  <!-- Context Embedding GPU -->
  <rect x="270" y="270" width="110" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="325" y="288" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Context Embeddings</text>
  <text x="325" y="301" text-anchor="middle" font-size="8.5" fill="#555">time, location,</text>
  <text x="325" y="313" text-anchor="middle" font-size="8.5" fill="#555">device features</text>
  <!-- GPU badge -->
  <rect x="355" y="273" width="22" height="13" fill="#a31f34" rx="2"/>
  <text x="366" y="283" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 2</text>

  <!-- ===== Memory annotation ===== -->
  <rect x="270" y="345" width="110" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="325" y="357" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">Embedding tables</text>
  <text x="325" y="368" text-anchor="middle" font-size="8" fill="#c44">dominate memory</text>

  <!-- ===== Gather arrows to Gather Embeddings ===== -->
  <!-- From User Embedding -->
  <line x1="380" y1="130" x2="430" y2="185" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- From Item Embedding -->
  <line x1="380" y1="215" x2="430" y2="215" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- From Context Embedding -->
  <line x1="380" y1="300" x2="430" y2="245" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Gather Embeddings box ===== -->
  <rect x="430" y="175" width="90" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="475" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Gather</text>
  <text x="475" y="209" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Embeddings</text>
  <text x="475" y="224" text-anchor="middle" font-size="8.5" fill="#555">Concat + pool</text>
  <text x="475" y="237" text-anchor="middle" font-size="8.5" fill="#555">feature vectors</text>
  <text x="475" y="250" text-anchor="middle" font-size="8.5" fill="#555">AllGather op</text>

  <!-- Arrow: Gather → Dense Ranking -->
  <line x1="520" y1="215" x2="550" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Dense Ranking Network (green) ===== -->
  <rect x="550" y="180" width="100" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="600" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Dense Ranking</text>
  <text x="600" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Network</text>
  <text x="600" y="227" text-anchor="middle" font-size="8.5" fill="#555">MLP interaction</text>
  <text x="600" y="239" text-anchor="middle" font-size="8.5" fill="#555">layers (compute)</text>
  <!-- GPU badge -->
  <rect x="621" y="183" width="26" height="13" fill="#a31f34" rx="2"/>
  <text x="634" y="193" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 3</text>

  <!-- Arrow: Dense Ranking → Response -->
  <line x1="600" y1="250" x2="600" y2="275" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Response (green) ===== -->
  <rect x="550" y="275" width="100" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="600" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Response</text>
  <text x="600" y="309" text-anchor="middle" font-size="8.5" fill="#555">Ranked items</text>

  <!-- ===== Phase labels ===== -->
  <!-- Vertical dashed section dividers -->
  <line x1="260" y1="60" x2="260" y2="410" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="425" y1="60" x2="425" y2="410" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="545" y1="60" x2="545" y2="410" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Phase header labels -->
  <text x="175" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="#555">INGRESS</text>
  <text x="345" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">EMBEDDING LOOKUP</text>
  <text x="483" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">GATHER</text>
  <text x="600" y="70" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">RANKING</text>

  <!-- ===== Parallel execution brace annotation ===== -->
  <line x1="270" y1="390" x2="380" y2="390" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="270" y1="386" x2="270" y2="394" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="380" y1="386" x2="380" y2="394" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="325" y="408" text-anchor="middle" font-size="8.5" fill="#4a90c4">Executed in parallel</text>

  <!-- ===== Footer ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Embedding tables are sharded across GPUs; dense ranking runs after all embeddings are gathered, exploiting feature-level parallelism.</text>
</svg>
