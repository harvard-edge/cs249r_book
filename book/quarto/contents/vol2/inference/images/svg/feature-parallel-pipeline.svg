<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="100%" height="100%" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Feature-Parallel Recommendation Pipeline</text>

  <!-- ===== Request (orange) ===== -->
  <rect x="20" y="190" width="80" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="60" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>
  <text x="60" y="226" text-anchor="middle" font-size="8.5" fill="#555">User + Items</text>
  <text x="60" y="238" text-anchor="middle" font-size="8.5" fill="#555">+ Context</text>

  <!-- Arrow: Request → Feature Extraction -->
  <line x1="100" y1="220" x2="130" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Feature Extraction box ===== -->
  <rect x="130" y="180" width="100" height="80" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>
  <text x="180" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Feature</text>
  <text x="180" y="221" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Extraction</text>
  <text x="180" y="236" text-anchor="middle" font-size="8.5" fill="#555">Parse features</text>
  <text x="180" y="248" text-anchor="middle" font-size="8.5" fill="#555">by type</text>

  <!-- Fan-out arrows from Feature Extraction to three embedding tables -->
  <!-- To User Embeddings (top) -->
  <path d="M 230,210 H 250 V 140 H 280" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- To Item Embeddings (middle) -->
  <path d="M 230,220 H 280" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- To Context Embeddings (bottom) -->
  <path d="M 230,230 H 250 V 300 H 280" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Embedding Tables Section Header ===== -->
  <text x="340" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Parallel Embedding Lookup (memory-bound)</text>
  <line x1="260" y1="60" x2="420" y2="60" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== GPU-labeled Embedding Table boxes (blue) ===== -->

  <!-- User Embedding GPU -->
  <rect x="280" y="110" width="120" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="340" y="132" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">User Embeddings</text>
  <text x="340" y="145" text-anchor="middle" font-size="8.5" fill="#555">user_id, age,</text>
  <text x="340" y="157" text-anchor="middle" font-size="8.5" fill="#555">history features</text>
  <!-- GPU badge -->
  <rect x="368" y="114" width="28" height="16" fill="#a31f34" rx="4"/>
  <text x="382" y="125" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 0</text>

  <!-- Item Embedding GPU -->
  <rect x="280" y="190" width="120" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="340" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Item Embeddings</text>
  <text x="340" y="225" text-anchor="middle" font-size="8.5" fill="#555">item_id, category,</text>
  <text x="340" y="237" text-anchor="middle" font-size="8.5" fill="#555">price features</text>
  <!-- GPU badge -->
  <rect x="368" y="194" width="28" height="16" fill="#a31f34" rx="4"/>
  <text x="382" y="205" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 1</text>

  <!-- Context Embedding GPU -->
  <rect x="280" y="270" width="120" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="340" y="292" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Context Embeddings</text>
  <text x="340" y="305" text-anchor="middle" font-size="8.5" fill="#555">time, location,</text>
  <text x="340" y="317" text-anchor="middle" font-size="8.5" fill="#555">device features</text>
  <!-- GPU badge -->
  <rect x="368" y="274" width="28" height="16" fill="#a31f34" rx="4"/>
  <text x="382" y="285" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 2</text>

  <!-- ===== Memory annotation ===== -->
  <rect x="280" y="350" width="120" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="340" y="364" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">Embedding tables</text>
  <text x="340" y="376" text-anchor="middle" font-size="8" fill="#c44">dominate memory</text>

  <!-- ===== Gather arrows to Gather Embeddings ===== -->
  <!-- From User Embedding -->
  <path d="M 400,140 H 410 V 210 H 430" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- From Item Embedding -->
  <path d="M 400,220 H 430" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- From Context Embedding -->
  <path d="M 400,300 H 410 V 230 H 430" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Gather Embeddings box ===== -->
  <rect x="430" y="180" width="100" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="480" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Gather</text>
  <text x="480" y="213" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Embeddings</text>
  <text x="480" y="227" text-anchor="middle" font-size="8.5" fill="#555">Concat + pool</text>
  <text x="480" y="239" text-anchor="middle" font-size="8.5" fill="#555">feature vectors</text>
  <text x="480" y="251" text-anchor="middle" font-size="8.5" fill="#555">AllGather op</text>

  <!-- Arrow: Gather → Dense Ranking -->
  <line x1="530" y1="220" x2="560" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Dense Ranking Network (green) ===== -->
  <rect x="560" y="180" width="100" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="610" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Dense Ranking</text>
  <text x="610" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Network</text>
  <text x="610" y="238" text-anchor="middle" font-size="8.5" fill="#555">MLP interaction</text>
  <text x="610" y="250" text-anchor="middle" font-size="8.5" fill="#555">layers (compute)</text>
  <!-- GPU badge -->
  <rect x="628" y="184" width="28" height="16" fill="#a31f34" rx="4"/>
  <text x="642" y="195" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 3</text>

  <!-- Arrow: Dense Ranking → Response -->
  <line x1="610" y1="260" x2="610" y2="290" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Response (green) ===== -->
  <rect x="560" y="290" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="610" y="314" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Response</text>
  <text x="610" y="328" text-anchor="middle" font-size="8.5" fill="#555">Ranked items</text>

  <!-- ===== Phase labels ===== -->
  <!-- Vertical dashed section dividers -->
  <line x1="260" y1="70" x2="260" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="420" y1="70" x2="420" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="540" y1="70" x2="540" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Phase header labels -->
  <text x="180" y="80" text-anchor="middle" font-size="9" font-weight="700" fill="#555">INGRESS</text>
  <text x="340" y="80" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">EMBEDDING LOOKUP</text>
  <text x="480" y="80" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">GATHER</text>
  <text x="610" y="80" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">RANKING</text>

  <!-- ===== Parallel execution brace annotation ===== -->
  <path d="M 280,400 V 410 H 400 V 400" fill="none" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="425" text-anchor="middle" font-size="8.5" fill="#4a90c4">Executed in parallel</text>

  <!-- ===== Footer ===== -->
  <text x="340" y="460" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Embedding tables are sharded across GPUs; dense ranking runs after all embeddings are gathered, exploiting feature-level parallelism.</text>
</svg>