  <rect x="442" y="320" width="196" height="36" rx="3" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="540" y="335" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">8 GPUs · tensor parallel</text>
  <text x="540" y="350" text-anchor="middle" font-size="8" fill="#555">one logical inference server</text>

  <!-- ── Key insight box ── -->
  <rect x="20" y="378" width="640" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="398" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d7a2d">LB treats each shard group as a single logical server.</text>
  <text x="340" y="416" text-anchor="middle" font-size="9" fill="#555">Throughput scales linearly with shard groups; each group's internal AllReduce stays local.</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Horizontal scaling (more shard groups) increases throughput; vertical scaling (more GPUs per group) reduces per-request latency.</text>

</svg>
