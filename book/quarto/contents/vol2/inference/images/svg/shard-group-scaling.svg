  <rect x="286" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="309" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 1</text>
  <rect x="336" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="359" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 2</text>
  <rect x="386" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
