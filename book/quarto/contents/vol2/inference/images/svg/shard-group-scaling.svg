  <rect x="180" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="203" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 3</text>
  <rect x="30"  y="284" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
