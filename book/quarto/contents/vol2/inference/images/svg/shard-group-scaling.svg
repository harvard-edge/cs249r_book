  <rect x="336" y="284" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="359" y="301" text-anchor="middle" font-size="8" fill="#333">GPU 6</text>
  <rect x="386" y="284" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="409" y="301" text-anchor="middle" font-size="8" fill="#333">GPU 7</text>

  <rect x="236" y="320" width="196" height="36" rx="3" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="334" y="335" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">8 GPUs · tensor parallel</text>
  <text x="334" y="350" text-anchor="middle" font-size="8" fill="#555">one logical inference server</text>

  <!-- ── Shard Group 2 ── -->
  <rect x="432" y="224" width="228" height="140" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="546" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Shard Group 2</text>

  <rect x="442" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="465" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 0</text>
  <rect x="492" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="515" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 1</text>
  <rect x="542" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="565" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 2</text>
  <rect x="592" y="252" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="615" y="269" text-anchor="middle" font-size="8" fill="#333">GPU 3</text>
  <rect x="442" y="284" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="465" y="301" text-anchor="middle" font-size="8" fill="#333">GPU 4</text>
