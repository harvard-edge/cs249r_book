<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ── Title ── -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Horizontal Scaling: Load Balancer → Shard Groups</text>

  <!-- ── Incoming Requests ── -->
  <text x="340" y="60" text-anchor="middle" font-size="10" fill="#555">Concurrent client requests</text>

  <rect x="136" y="68" width="60" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="166" y="86" text-anchor="middle" font-size="8.5" fill="#333">Req A</text>
  <rect x="204" y="68" width="60" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="234" y="86" text-anchor="middle" font-size="8.5" fill="#333">Req B</text>
  <rect x="272" y="68" width="60" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="302" y="86" text-anchor="middle" font-size="8.5" fill="#333">Req C</text>
  <text x="356" y="86" font-size="12" fill="#bbb">···</text>
  <rect x="376" y="68" width="60" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="406" y="86" text-anchor="middle" font-size="8.5" fill="#333">Req N</text>

  <!-- Arrows converging to LB -->
  <line x1="166" y1="96" x2="290" y2="128" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="234" y1="96" x2="310" y2="128" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="302" y1="96" x2="330" y2="128" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="406" y1="96" x2="360" y2="128" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Load Balancer ── -->
  <rect x="230" y="130" width="220" height="52" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Load Balancer</text>
  <text x="340" y="170" text-anchor="middle" font-size="9" fill="#555">round-robin · two-choices · consistent hash</text>

  <!-- Fan-out arrows to shard groups -->
  <line x1="260" y1="182" x2="134" y2="222" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="182" x2="340" y2="222" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="182" x2="546" y2="222" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

