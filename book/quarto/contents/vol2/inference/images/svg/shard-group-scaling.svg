  <text x="153" y="301" text-anchor="middle" font-size="8" fill="#333">GPU 6</text>
  <rect x="180" y="284" width="46" height="26" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="203" y="301" text-anchor="middle" font-size="8" fill="#333">GPU 7</text>

  <rect x="30" y="320" width="196" height="36" rx="3" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="128" y="335" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">8 GPUs · tensor parallel</text>
  <text x="128" y="350" text-anchor="middle" font-size="8" fill="#555">one logical inference server</text>

