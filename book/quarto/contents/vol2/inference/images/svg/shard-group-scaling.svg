  <rect x="20" y="224" width="228" height="140" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="134" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Shard Group 0</text>

