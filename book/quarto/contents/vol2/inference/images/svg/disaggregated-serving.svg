<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="820" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="410" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Disaggregated Inference Architecture</text>

  <!-- ===== Request (arriving) ===== -->
  <rect x="30" y="195" width="80" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="70" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>
  <text x="70" y="229" text-anchor="middle" font-size="8.5" fill="#555">Input prompt</text>
  <text x="70" y="241" text-anchor="middle" font-size="8.5" fill="#555">(variable len)</text>

  <!-- Arrow: Request → Prefill Pool -->
  <line x1="110" y1="220" x2="150" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Prefill Pool (blue, compute-optimized) ===== -->
  <rect x="150" y="80" width="200" height="280" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="250" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Prefill Pool</text>
  <text x="250" y="117" text-anchor="middle" font-size="9" fill="#555">Compute-optimized</text>
  <text x="250" y="130" text-anchor="middle" font-size="8.5" fill="#555">High TFLOPS, smaller HBM</text>

  <!-- GPU nodes in prefill pool -->
  <!-- GPU P0 -->
  <rect x="165" y="142" width="80" height="56" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="205" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="205" y="173" text-anchor="middle" font-size="8" fill="#555">8× GPU</text>
  <text x="205" y="184" text-anchor="middle" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="220" y="144" width="22" height="13" fill="#a31f34"/>
  <text x="231" y="154" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-0</text>

  <!-- GPU P1 -->
  <rect x="255" y="142" width="80" height="56" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="295" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="295" y="173" text-anchor="middle" font-size="8" fill="#555">8× GPU</text>
  <text x="295" y="184" text-anchor="middle" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="310" y="144" width="22" height="13" fill="#a31f34"/>
  <text x="321" y="154" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-1</text>

  <!-- GPU P2 -->
  <rect x="165" y="210" width="80" height="56" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="205" y="228" text-anchor="middle" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="205" y="241" text-anchor="middle" font-size="8" fill="#555">8× GPU</text>
  <text x="205" y="252" text-anchor="middle" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="220" y="212" width="22" height="13" fill="#a31f34"/>
  <text x="231" y="222" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-2</text>

  <!-- GPU P3 -->
  <rect x="255" y="210" width="80" height="56" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="295" y="228" text-anchor="middle" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="295" y="241" text-anchor="middle" font-size="8" fill="#555">8× GPU</text>
  <text x="295" y="252" text-anchor="middle" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="310" y="212" width="22" height="13" fill="#a31f34"/>
  <text x="321" y="222" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-3</text>

  <!-- Prefill pool annotation -->
  <rect x="165" y="278" width="170" height="36" fill="#fff" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="250" y="292" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Compute-bound phase</text>
  <text x="250" y="305" text-anchor="middle" font-size="8" fill="#555">Processes full prompt in parallel</text>

  <!-- Prefill scale annotation -->
  <text x="250" y="340" text-anchor="middle" font-size="8.5" fill="#555">Scale with input volume</text>
  <text x="250" y="353" text-anchor="middle" font-size="8.5" fill="#555">(smaller pool)</text>

  <!-- ===== KV Cache Transfer Arrow ===== -->
  <!-- Dashed orange arrow between pools -->
  <line x1="350" y1="220" x2="430" y2="220" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <!-- KV transfer label box -->
  <rect x="362" y="202" width="56" height="36" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="390" y="216" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">KV cache</text>
  <text x="390" y="228" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">migration</text>

  <!-- Transfer speed annotation -->
  <text x="390" y="250" text-anchor="middle" font-size="7.5" fill="#555">InfiniBand</text>
  <text x="390" y="261" text-anchor="middle" font-size="7.5" fill="#555">&lt;10 ms SLO</text>

  <!-- ===== Decode Pool (green, memory-optimized) ===== -->
  <rect x="430" y="80" width="300" height="280" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="580" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Decode Pool</text>
  <text x="580" y="117" text-anchor="middle" font-size="9" fill="#555">Memory-bandwidth-optimized</text>
  <text x="580" y="130" text-anchor="middle" font-size="8.5" fill="#555">Large HBM capacity, max bandwidth</text>

  <!-- GPU nodes in decode pool — more of them (6 nodes to signal larger pool) -->
  <!-- Row 1 -->
  <rect x="450" y="142" width="80" height="52" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="490" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">H100 Node</text>
  <text x="490" y="171" text-anchor="middle" font-size="7.5" fill="#555">8× GPU, 640 GB</text>
  <text x="490" y="182" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s BW</text>
  <rect x="505" y="144" width="22" height="12" fill="#a31f34"/>
  <text x="516" y="153" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-0</text>

  <rect x="540" y="142" width="80" height="52" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">H100 Node</text>
  <text x="580" y="171" text-anchor="middle" font-size="7.5" fill="#555">8× GPU, 640 GB</text>
  <text x="580" y="182" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s BW</text>
  <rect x="595" y="144" width="22" height="12" fill="#a31f34"/>
  <text x="606" y="153" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-1</text>

  <rect x="630" y="142" width="80" height="52" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="670" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">H100 Node</text>
  <text x="670" y="171" text-anchor="middle" font-size="7.5" fill="#555">8× GPU, 640 GB</text>
  <text x="670" y="182" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s BW</text>
  <rect x="685" y="144" width="22" height="12" fill="#a31f34"/>
  <text x="696" y="153" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-2</text>

  <!-- Row 2 -->
  <rect x="450" y="206" width="80" height="52" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="490" y="223" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">H100 Node</text>
  <text x="490" y="235" text-anchor="middle" font-size="7.5" fill="#555">8× GPU, 640 GB</text>
  <text x="490" y="246" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s BW</text>
  <rect x="505" y="208" width="22" height="12" fill="#a31f34"/>
  <text x="516" y="217" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-3</text>

  <rect x="540" y="206" width="80" height="52" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="223" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">H100 Node</text>
  <text x="580" y="235" text-anchor="middle" font-size="7.5" fill="#555">8× GPU, 640 GB</text>
  <text x="580" y="246" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s BW</text>
  <rect x="595" y="208" width="22" height="12" fill="#a31f34"/>
  <text x="606" y="217" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-4</text>

  <rect x="630" y="206" width="80" height="52" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="670" y="223" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">H100 Node</text>
  <text x="670" y="235" text-anchor="middle" font-size="7.5" fill="#555">8× GPU, 640 GB</text>
  <text x="670" y="246" text-anchor="middle" font-size="7.5" fill="#555">3.35 TB/s BW</text>
  <rect x="685" y="208" width="22" height="12" fill="#a31f34"/>
  <text x="696" y="217" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-5</text>

  <!-- Decode pool annotation -->
  <rect x="450" y="270" width="260" height="36" fill="#fff" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="580" y="284" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Memory-bandwidth-bound phase</text>
  <text x="580" y="297" text-anchor="middle" font-size="8" fill="#555">Autoregressive token generation</text>

  <!-- Decode scale annotation -->
  <text x="580" y="340" text-anchor="middle" font-size="8.5" fill="#555">Scale with output volume</text>
  <text x="580" y="353" text-anchor="middle" font-size="8.5" fill="#555">(larger pool, more HBM)</text>

  <!-- ===== Response arrow ===== -->
  <line x1="730" y1="220" x2="756" y2="220" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="760" y="205" width="30" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="775" y="224" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">→</text>
  <text x="775" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Response</text>

  <!-- ===== Bottleneck annotations ===== -->
  <!-- Prefill: compute-bound label -->
  <rect x="150" y="38" width="200" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="250" y="52" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Bottleneck: Compute (TFLOPS)</text>

  <!-- Decode: bandwidth-bound label -->
  <rect x="430" y="38" width="300" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="580" y="52" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Bottleneck: Memory Bandwidth (TB/s)</text>

  <!-- ===== Independent scaling annotation ===== -->
  <rect x="110" y="380" width="600" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="410" y="394" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Independent Scaling:</text>
  <text x="410" y="406" text-anchor="middle" font-size="8.5" fill="#555">Prefill capacity scales with prompt volume — Decode capacity scales with concurrent generation streams</text>

  <!-- ===== Footer ===== -->
  <text x="410" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Separating compute-bound prefill from memory-bound decode allows each pool to operate at its hardware optimal point, eliminating resource contention.</text>
</svg>