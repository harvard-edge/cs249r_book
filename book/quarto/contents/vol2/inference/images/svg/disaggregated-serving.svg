<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 530" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="860" height="530" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="430" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Disaggregated Inference Architecture</text>

  <!-- ===== Bottleneck annotations ===== -->
  <!-- Prefill: compute-bound label -->
  <rect x="140" y="40" width="220" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4"/>
  <text x="250" y="54" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Bottleneck: Compute (TFLOPS)</text>

  <!-- Decode: bandwidth-bound label -->
  <rect x="440" y="40" width="320" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
  <text x="600" y="54" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Bottleneck: Memory Bandwidth (TB/s)</text>

  <!-- ===== Request (arriving) ===== -->
  <rect x="20" y="185" width="80" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="60" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Request</text>
  <text x="60" y="216" text-anchor="middle" font-size="8.5" fill="#555">Input prompt</text>
  <text x="60" y="228" text-anchor="middle" font-size="8.5" fill="#555">(variable len)</text>

  <!-- Arrow: Request → Prefill Pool -->
  <line x1="100" y1="210" x2="140" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Prefill Pool (blue, compute-optimized) ===== -->
  <rect x="140" y="80" width="220" height="320" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2" rx="4"/>
  <text x="250" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Prefill Pool</text>
  <text x="250" y="115" text-anchor="middle" font-size="9" fill="#555">Compute-optimized</text>
  <text x="250" y="128" text-anchor="middle" font-size="8.5" fill="#555">High TFLOPS, smaller HBM</text>

  <!-- GPU nodes in prefill pool -->
  <!-- GPU P0 -->
  <rect x="160" y="140" width="80" height="60" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="168" y="155" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="168" y="170" font-size="8" fill="#555">8× GPU</text>
  <text x="168" y="184" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="212" y="144" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="224" y="155" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-0</text>

  <!-- GPU P1 -->
  <rect x="260" y="140" width="80" height="60" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="268" y="155" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="268" y="170" font-size="8" fill="#555">8× GPU</text>
  <text x="268" y="184" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="312" y="144" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="324" y="155" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-1</text>

  <!-- GPU P2 -->
  <rect x="160" y="220" width="80" height="60" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="168" y="235" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="168" y="250" font-size="8" fill="#555">8× GPU</text>
  <text x="168" y="264" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="212" y="224" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="224" y="235" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-2</text>

  <!-- GPU P3 -->
  <rect x="260" y="220" width="80" height="60" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="268" y="235" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="268" y="250" font-size="8" fill="#555">8× GPU</text>
  <text x="268" y="264" font-size="8" fill="#555">800 TFLOPS FP8</text>
  <!-- GPU badge -->
  <rect x="312" y="224" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="324" y="235" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">P-3</text>

  <!-- Prefill pool annotation -->
  <rect x="160" y="300" width="180" height="40" fill="#fff" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2" rx="4"/>
  <text x="250" y="316" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Compute-bound phase</text>
  <text x="250" y="330" text-anchor="middle" font-size="8" fill="#555">Processes full prompt in parallel</text>

  <!-- Prefill scale annotation -->
  <text x="250" y="360" text-anchor="middle" font-size="8.5" fill="#555">Scale with input volume</text>
  <text x="250" y="374" text-anchor="middle" font-size="8.5" fill="#555">(smaller pool)</text>

  <!-- ===== KV Cache Transfer Arrow ===== -->
  <!-- Dashed orange arrow between pools -->
  <line x1="360" y1="210" x2="440" y2="210" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <!-- KV transfer label box -->
  <rect x="370" y="192" width="60" height="36" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="400" y="206" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">KV cache</text>
  <text x="400" y="220" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">migration</text>

  <!-- Transfer speed annotation -->
  <text x="400" y="242" text-anchor="middle" font-size="8" fill="#555">InfiniBand</text>
  <text x="400" y="256" text-anchor="middle" font-size="8" fill="#555">&lt;10 ms SLO</text>

  <!-- ===== Decode Pool (green, memory-optimized) ===== -->
  <rect x="440" y="80" width="320" height="320" fill="#d4edda" stroke="#3d9e5a" stroke-width="2" rx="4"/>
  <text x="600" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Decode Pool</text>
  <text x="600" y="115" text-anchor="middle" font-size="9" fill="#555">Memory-bandwidth-optimized</text>
  <text x="600" y="128" text-anchor="middle" font-size="8.5" fill="#555">Large HBM capacity, max bandwidth</text>

  <!-- GPU nodes in decode pool — more of them (6 nodes to signal larger pool) -->
  <!-- Row 1 -->
  <!-- GPU D0 -->
  <rect x="460" y="140" width="80" height="60" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="468" y="155" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="468" y="170" font-size="8" fill="#555">8× GPU, 640 GB</text>
  <text x="468" y="184" font-size="8" fill="#555">3.35 TB/s BW</text>
  <!-- GPU badge -->
  <rect x="512" y="144" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="524" y="155" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-0</text>

  <!-- GPU D1 -->
  <rect x="560" y="140" width="80" height="60" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="568" y="155" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="568" y="170" font-size="8" fill="#555">8× GPU, 640 GB</text>
  <text x="568" y="184" font-size="8" fill="#555">3.35 TB/s BW</text>
  <!-- GPU badge -->
  <rect x="612" y="144" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="624" y="155" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-1</text>

  <!-- GPU D2 -->
  <rect x="660" y="140" width="80" height="60" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="668" y="155" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="668" y="170" font-size="8" fill="#555">8× GPU, 640 GB</text>
  <text x="668" y="184" font-size="8" fill="#555">3.35 TB/s BW</text>
  <!-- GPU badge -->
  <rect x="712" y="144" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="724" y="155" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-2</text>

  <!-- Row 2 -->
  <!-- GPU D3 -->
  <rect x="460" y="220" width="80" height="60" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="468" y="235" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="468" y="250" font-size="8" fill="#555">8× GPU, 640 GB</text>
  <text x="468" y="264" font-size="8" fill="#555">3.35 TB/s BW</text>
  <!-- GPU badge -->
  <rect x="512" y="224" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="524" y="235" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-3</text>

  <!-- GPU D4 -->
  <rect x="560" y="220" width="80" height="60" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="568" y="235" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="568" y="250" font-size="8" fill="#555">8× GPU, 640 GB</text>
  <text x="568" y="264" font-size="8" fill="#555">3.35 TB/s BW</text>
  <!-- GPU badge -->
  <rect x="612" y="224" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="624" y="235" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-4</text>

  <!-- GPU D5 -->
  <rect x="660" y="220" width="80" height="60" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="668" y="235" font-size="9" font-weight="700" fill="#333">H100 Node</text>
  <text x="668" y="250" font-size="8" fill="#555">8× GPU, 640 GB</text>
  <text x="668" y="264" font-size="8" fill="#555">3.35 TB/s BW</text>
  <!-- GPU badge -->
  <rect x="712" y="224" width="24" height="16" fill="#a31f34" rx="4"/>
  <text x="724" y="235" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">D-5</text>

  <!-- Decode pool annotation -->
  <rect x="460" y="300" width="280" height="40" fill="#fff" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2" rx="4"/>
  <text x="600" y="316" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Memory-bandwidth-bound phase</text>
  <text x="600" y="330" text-anchor="middle" font-size="8" fill="#555">Autoregressive token generation</text>

  <!-- Decode scale annotation -->
  <text x="600" y="360" text-anchor="middle" font-size="8.5" fill="#555">Scale with output volume</text>
  <text x="600" y="374" text-anchor="middle" font-size="8.5" fill="#555">(larger pool, more HBM)</text>

  <!-- ===== Response arrow ===== -->
  <line x1="760" y1="210" x2="800" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="800" y="195" width="30" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="815" y="214" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">→</text>
  <text x="815" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Response</text>

  <!-- ===== Independent scaling annotation ===== -->
  <rect x="120" y="420" width="620" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="430" y="435" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Independent Scaling:</text>
  <text x="430" y="450" text-anchor="middle" font-size="8.5" fill="#555">Prefill capacity scales with prompt volume — Decode capacity scales with concurrent generation streams</text>

  <!-- ===== Footer ===== -->
  <text x="430" y="490" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Separating compute-bound prefill from memory-bound decode allows each pool to operate at its hardware optimal point, eliminating resource contention.</text>
</svg>