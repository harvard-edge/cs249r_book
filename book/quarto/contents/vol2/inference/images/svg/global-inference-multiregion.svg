<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Multi-Region Inference: Global Load Balancing</text>

  <!-- ── Global Load Balancer ── -->
  <rect x="214" y="38" width="252" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Global Load Balancer</text>
  <text x="340" y="76" text-anchor="middle" font-size="9" fill="#555">latency-based routing · anycast DNS</text>

  <!-- ── Fan-out lines to 3 regions ── -->
  <line x1="260" y1="90" x2="118" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="90" x2="340" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="90" x2="562" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RTT annotations on fan-out lines -->
  <text x="175" y="108.0" text-anchor="middle" font-size="8" fill="#555">~10 ms</text>
  <text x="355" y="120" font-size="8" fill="#555">~10 ms</text>
  <text x="500" y="108.0" text-anchor="middle" font-size="8" fill="#555">~10 ms</text>

  <!-- ══════════════════════════════════════
       REGION 0: US-East
       ══════════════════════════════════════ -->
  <rect x="20" y="140" width="196" height="180" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="118" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">US-East</text>
  <text x="118" y="174" text-anchor="middle" font-size="8.5" fill="#999">Virginia / Ohio</text>

  <!-- Inference replicas in US-East -->
  <rect x="34" y="182" width="76" height="48" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="72" y="200" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 0</text>
  <text x="72" y="214" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="72" y="226" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="120" y="182" width="76" height="48" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="158" y="200" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 1</text>
  <text x="158" y="214" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="158" y="226" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <!-- User location label -->
  <rect x="34" y="244" width="162" height="34" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="118" y="258" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">New York: 10 ms RTT</text>
  <text x="118" y="271" text-anchor="middle" font-size="8" fill="#555">London: 75 ms if routed here</text>

  <!-- ══════════════════════════════════════
       REGION 1: EU-West
       ══════════════════════════════════════ -->
  <rect x="242" y="140" width="196" height="180" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">EU-West</text>
  <text x="340" y="174" text-anchor="middle" font-size="8.5" fill="#999">Ireland / Frankfurt</text>

  <rect x="256" y="182" width="76" height="48" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="294" y="200" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 0</text>
  <text x="294" y="214" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="294" y="226" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="342" y="182" width="76" height="48" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="200" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 1</text>
  <text x="380" y="214" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="380" y="226" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="256" y="244" width="162" height="34" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="258" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">London: 10 ms RTT</text>
  <text x="340" y="271" text-anchor="middle" font-size="8" fill="#555">GDPR compliance boundary</text>

  <!-- ══════════════════════════════════════
       REGION 2: Asia-Pacific
       ══════════════════════════════════════ -->
  <rect x="464" y="140" width="196" height="180" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="562" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Asia-Pacific</text>
  <text x="562" y="174" text-anchor="middle" font-size="8.5" fill="#999">Tokyo / Singapore</text>

  <rect x="478" y="182" width="76" height="48" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="516" y="200" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 0</text>
  <text x="516" y="214" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="516" y="226" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="564" y="182" width="76" height="48" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="602" y="200" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 1</text>
  <text x="602" y="214" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="602" y="226" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="478" y="244" width="162" height="34" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="562" y="258" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">Tokyo: 10 ms RTT</text>
  <text x="562" y="271" text-anchor="middle" font-size="8" fill="#555">150 ms if US-East only</text>

  <!-- ── Model Registry (shared bottom) ── -->
  <rect x="154" y="342" width="372" height="52" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="362" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">Model Registry</text>
  <text x="340" y="378" text-anchor="middle" font-size="9" fill="#555">synchronized model weights · version-pinned rollouts</text>

  <!-- Lines from regions to model registry -->
  <line x1="118" y1="320" x2="200" y2="342" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <line x1="340" y1="320" x2="340" y2="342" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <line x1="562" y1="320" x2="480" y2="342" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>

  <!-- ── Failover annotation ── -->
  <rect x="20" y="408" width="640" height="34" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="340" y="422" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Regional failover: on timeout, LB routes to next-nearest healthy region.</text>
  <text x="340" y="436" text-anchor="middle" font-size="8.5" fill="#555">Model sync window creates brief version inconsistency during rolling updates.</text>

  <!-- ── Bottom footnote ── -->
  <text x="340" y="458" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Each region operates independently; LB routes by measured RTT, not geography.</text>

</svg>