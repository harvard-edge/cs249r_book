<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#fff"/>

  <!-- ── Title ── -->
  <text x="400" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Multi-Region Inference: Global Load Balancing</text>

  <!-- ── Global Load Balancer ── -->
  <rect x="270" y="40" width="260" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="400" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Global Load Balancer</text>
  <text x="400" y="84" text-anchor="middle" font-size="9" fill="#555">latency-based routing · anycast DNS</text>

  <!-- ── Fan-out lines to 3 regions ── -->
  <line x1="310" y1="100" x2="140" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="400" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="490" y1="100" x2="660" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RTT annotations on fan-out lines -->
  <text x="215" y="120" text-anchor="middle" font-size="8" fill="#555">~10 ms</text>
  <text x="414" y="120" text-anchor="start" font-size="8" fill="#555">~10 ms</text>
  <text x="585" y="120" text-anchor="middle" font-size="8" fill="#555">~10 ms</text>

  <!-- ══════════════════════════════════════
       REGION 0: US-East
       ══════════════════════════════════════ -->
  <rect x="30" y="150" width="220" height="180" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="140" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#333">US-East</text>
  <text x="140" y="184" text-anchor="middle" font-size="8.5" fill="#999">Virginia / Ohio</text>

  <!-- Inference replicas in US-East -->
  <rect x="50" y="190" width="80" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="90" y="206" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 0</text>
  <text x="90" y="218" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="90" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="150" y="190" width="80" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="190" y="206" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 1</text>
  <text x="190" y="218" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="190" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <!-- User location label -->
  <rect x="50" y="260" width="180" height="40" rx="4" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="140" y="276" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">New York: 10 ms RTT</text>
  <text x="140" y="290" text-anchor="middle" font-size="8" fill="#555">London: 75 ms if routed here</text>

  <!-- ══════════════════════════════════════
       REGION 1: EU-West
       ══════════════════════════════════════ -->
  <rect x="290" y="150" width="220" height="180" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="400" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#333">EU-West</text>
  <text x="400" y="184" text-anchor="middle" font-size="8.5" fill="#999">Ireland / Frankfurt</text>

  <rect x="310" y="190" width="80" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="350" y="206" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 0</text>
  <text x="350" y="218" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="350" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="410" y="190" width="80" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="450" y="206" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 1</text>
  <text x="450" y="218" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="450" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="310" y="260" width="180" height="40" rx="4" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="400" y="276" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">London: 10 ms RTT</text>
  <text x="400" y="290" text-anchor="middle" font-size="8" fill="#555">GDPR compliance boundary</text>

  <!-- ══════════════════════════════════════
       REGION 2: Asia-Pacific
       ══════════════════════════════════════ -->
  <rect x="550" y="150" width="220" height="180" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="660" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Asia-Pacific</text>
  <text x="660" y="184" text-anchor="middle" font-size="8.5" fill="#999">Tokyo / Singapore</text>

  <rect x="570" y="190" width="80" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="610" y="206" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 0</text>
  <text x="610" y="218" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="610" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="670" y="190" width="80" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="710" y="206" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Replica 1</text>
  <text x="710" y="218" text-anchor="middle" font-size="7.5" fill="#555">vLLM · 4×H100</text>
  <text x="710" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">active</text>

  <rect x="570" y="260" width="180" height="40" rx="4" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1"/>
  <text x="660" y="276" text-anchor="middle" font-size="8.5" font-weight="600" fill="#2d7a2d">Tokyo: 10 ms RTT</text>
  <text x="660" y="290" text-anchor="middle" font-size="8" fill="#555">150 ms if US-East only</text>

  <!-- ── Model Registry (shared bottom) ── -->
  <rect x="200" y="350" width="400" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="400" y="376" text-anchor="middle" font-size="10" font-weight="700" fill="#2d7a2d">Model Registry</text>
  <text x="400" y="394" text-anchor="middle" font-size="9" fill="#555">synchronized model weights · version-pinned rollouts</text>

  <!-- Lines from regions to model registry -->
  <line x1="140" y1="330" x2="220" y2="350" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <line x1="400" y1="330" x2="400" y2="350" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <line x1="660" y1="330" x2="580" y2="350" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>

  <!-- ── Failover annotation ── -->
  <rect x="30" y="430" width="740" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="400" y="446" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Regional failover: on timeout, LB routes to next-nearest healthy region.</text>
  <text x="400" y="460" text-anchor="middle" font-size="8.5" fill="#555">Model sync window creates brief version inconsistency during rolling updates.</text>

  <!-- ── Bottom footnote ── -->
  <text x="400" y="484" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Each region operates independently; LB routes by measured RTT, not geography.</text>

</svg>