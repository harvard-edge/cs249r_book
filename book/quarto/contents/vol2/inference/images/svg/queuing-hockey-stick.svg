<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <clipPath id="plot-clip">
      <rect x="90" y="40" width="510" height="340"/>
    </clipPath>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Queuing Theory Hockey Stick</text>

  <!-- ===== Axes ===== -->
  <!-- Y-axis -->
  <line x1="90" y1="40" x2="90" y2="385" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- X-axis -->
  <line x1="90" y1="380" x2="605" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Y-axis label -->
  <text x="22" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#333" transform="rotate(-90, 22, 215)">Queue Length (requests)</text>

  <!-- X-axis label -->
  <text x="347" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Utilization (ρ)</text>

  <!-- ===== X-axis tick marks and labels ===== -->
  <!-- ρ = 0 -->
  <line x1="90" y1="380" x2="90" y2="388" stroke="#555" stroke-width="1"/>
  <text x="90" y="400" text-anchor="middle" font-size="9" fill="#555">0</text>

  <!-- ρ = 0.2 -->
  <line x1="192" y1="380" x2="192" y2="388" stroke="#555" stroke-width="1"/>
  <text x="192" y="400" text-anchor="middle" font-size="9" fill="#555">0.2</text>

  <!-- ρ = 0.4 -->
  <line x1="294" y1="380" x2="294" y2="388" stroke="#555" stroke-width="1"/>
  <text x="294" y="400" text-anchor="middle" font-size="9" fill="#555">0.4</text>

  <!-- ρ = 0.6 -->
  <line x1="396" y1="380" x2="396" y2="388" stroke="#555" stroke-width="1"/>
  <text x="396" y="400" text-anchor="middle" font-size="9" fill="#555">0.6</text>

  <!-- ρ = 0.7 boundary -->
  <line x1="447" y1="380" x2="447" y2="388" stroke="#555" stroke-width="1"/>
  <text x="447" y="400" text-anchor="middle" font-size="9" fill="#555">0.7</text>

  <!-- ρ = 0.8 -->
  <line x1="498" y1="380" x2="498" y2="388" stroke="#555" stroke-width="1"/>
  <text x="498" y="400" text-anchor="middle" font-size="9" fill="#555">0.8</text>

  <!-- ρ = 0.85 boundary -->
  <line x1="524" y1="380" x2="524" y2="388" stroke="#555" stroke-width="1"/>
  <text x="524" y="400" text-anchor="middle" font-size="9" fill="#555">0.85</text>

  <!-- ρ = 1.0 -->
  <line x1="600" y1="380" x2="600" y2="388" stroke="#555" stroke-width="1"/>
  <text x="600" y="400" text-anchor="middle" font-size="9" fill="#555">1.0</text>

  <!-- ===== Y-axis tick marks ===== -->
  <line x1="82" y1="380" x2="90" y2="380" stroke="#555" stroke-width="1"/>
  <text x="78" y="374.0" text-anchor="end" font-size="9" fill="#555">0</text>

  <line x1="82" y1="312" x2="90" y2="312" stroke="#555" stroke-width="1"/>
  <text x="78" y="306.0" text-anchor="end" font-size="9" fill="#555">5</text>

  <line x1="82" y1="244" x2="90" y2="244" stroke="#555" stroke-width="1"/>
  <text x="78" y="238.0" text-anchor="end" font-size="9" fill="#555">10</text>

  <line x1="82" y1="176" x2="90" y2="176" stroke="#555" stroke-width="1"/>
  <text x="78" y="170.0" text-anchor="end" font-size="9" fill="#555">15</text>

  <line x1="82" y1="108" x2="90" y2="108" stroke="#555" stroke-width="1"/>
  <text x="78" y="102.0" text-anchor="end" font-size="9" fill="#555">20</text>

  <line x1="82" y1="58" x2="90" y2="58" stroke="#555" stroke-width="1"/>
  <text x="78" y="52.0" text-anchor="end" font-size="9" fill="#555">25</text>

  <!-- ===== Safe Zone Region (ρ < 0.7) ===== -->
  <rect x="90" y="40" width="357" height="340" fill="#d4edda" opacity="0.5" rx="4"/>
  <text x="240" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Safe Zone</text>
  <text x="240" y="373" text-anchor="middle" font-size="8.5" fill="#3d9e5a">ρ &lt; 0.7</text>

  <!-- ===== Danger Zone Region (ρ > 0.85) ===== -->
  <rect x="524" y="40" width="76" height="340" fill="#f9d6d5" opacity="0.6" rx="4"/>
  <text x="562" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Danger</text>
  <text x="562" y="373" text-anchor="middle" font-size="8.5" fill="#c44">Zone</text>

  <!-- ===== Caution region (0.7 to 0.85) ===== -->
  <rect x="447" y="40" width="77" height="340" fill="#fdebd0" opacity="0.6" rx="4"/>

  <!-- ===== Vertical dotted boundary lines ===== -->
  <!-- ρ = 0.7 -->
  <line x1="447" y1="40" x2="447" y2="380" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="2,2"/>

  <!-- ρ = 0.85 -->
  <line x1="524" y1="40" x2="524" y2="380" stroke="#c44" stroke-width="1.2" stroke-dasharray="2,2"/>

  <!-- ===== M/M/1 Curve: L = ρ/(1-ρ) ===== -->
  <!-- Points computed for ρ = 0 to 0.96, scaled:
       x = 90 + ρ*510, y = 380 - L*13.6 (capped at y=50)
       ρ=0: L=0 → (90, 380)
       ρ=0.1: L=0.111 → (141, 378.5)
       ρ=0.2: L=0.25 → (192, 376.6)
       ρ=0.3: L=0.43 → (243, 374.1)
       ρ=0.4: L=0.667 → (294, 370.9)
       ρ=0.5: L=1.0 → (345, 366.4)
       ρ=0.6: L=1.5 → (396, 359.6)
       ρ=0.65: L=1.857 → (421.5, 354.7)
       ρ=0.7: L=2.333 → (447, 348.3)
       ρ=0.75: L=3.0 → (472.5, 339.2)
       ρ=0.8: L=4.0 → (498, 325.6)
       ρ=0.85: L=5.667 → (523.5, 303.0)
       ρ=0.88: L=7.333 → (538.8, 280.3)
       ρ=0.90: L=9.0 → (549, 257.6)
       ρ=0.92: L=11.5 → (559.2, 223.6)
       ρ=0.94: L=15.67 → (569.4, 167.1)
       ρ=0.96: L=24.0 → (579.6, 54.4)
  -->
  <polyline points="90,380 141,378.5 192,376.6 243,374.1 294,370.9 345,366.4 396,359.6 421.5,354.7 447,348.3 472.5,339.2 498,325.6 523.5,303.0 538.8,280.3 549,257.6 559.2,223.6 569.4,167.1 579.6,54.4" fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linejoin="round" clip-path="url(#plot-clip)"/>

  <!-- ===== Saturation label (ρ → 1) ===== -->
  <line x1="590" y1="40" x2="590" y2="378" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="598" y="125" text-anchor="start" font-size="9" font-weight="700" fill="#a31f34" transform="rotate(-90, 598, 125)">Saturation (ρ→1)</text>

  <!-- ===== Annotation: Safe Zone annotation ===== -->
  <text x="230" y="100" text-anchor="middle" font-size="9" fill="#3d9e5a">Low queue depth</text>
  <text x="230" y="113" text-anchor="middle" font-size="9" fill="#3d9e5a">Predictable latency</text>

  <!-- ===== Annotation: Danger Zone annotation ===== -->
  <text x="543" y="183" text-anchor="middle" font-size="9" fill="#c44">Queue</text>
  <text x="543" y="196" text-anchor="middle" font-size="9" fill="#c44">explodes</text>

  <!-- ===== "Hockey Stick" callout arrow ===== -->
  <path d="M485.5,210 V240 H540" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="485.5" y="193" text-anchor="middle" font-size="9" fill="#555">Hockey</text>
  <text x="485.5" y="205" text-anchor="middle" font-size="9" fill="#555">stick bend</text>

  <!-- ===== Curve label ===== -->
  <text x="345" y="342" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">M/M/1: L = ρ/(1−ρ)</text>

  <!-- ===== Legend ===== -->
  <rect x="100" y="55" width="12" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
  <text x="116" y="64" font-size="8.5" fill="#333">Safe Zone (ρ &lt; 0.7): queue depth stable</text>

  <rect x="100" y="71" width="12" height="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="4"/>
  <text x="116" y="80" font-size="8.5" fill="#333">Caution (0.7 – 0.85): latency rising</text>

  <rect x="100" y="87" width="12" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="116" y="96" font-size="8.5" fill="#333">Danger Zone (ρ &gt; 0.85): exponential growth</text>

  <!-- ===== Footer ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Production systems target ρ ≤ 0.7 to maintain latency headroom; beyond ρ = 0.85, queue depth grows unboundedly.</text>
</svg>