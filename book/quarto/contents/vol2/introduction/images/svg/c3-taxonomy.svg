<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="none" stroke="#a31f34" stroke-width="1.2"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="none" stroke="#a31f34" stroke-width="1.2"/>
    </marker>
  </defs>

  <rect width="720" height="460" fill="#fff"/>

  <!-- Column 1: Compute -->
  <g transform="translate(28, 42)">
    <rect x="0" y="0" width="188" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.4"/>
    <text x="94" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Compute (C1)</text>
  </g>
  <g transform="translate(28, 92)">
    <rect x="0" y="0" width="188" height="320" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
    <text x="16" y="28" font-size="10" font-weight="700" fill="#333">GPU / TPU Kernels</text>
    <text x="16" y="46" font-size="9" fill="#555">GEMM, attention, activation ops</text>

    <line x1="12" y1="80" x2="176" y2="80" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="108" font-size="10" font-weight="700" fill="#333">FLOP Throughput</text>
    <text x="16" y="126" font-size="9" fill="#555">Peak vs. sustained TFLOPS</text>
    <text x="16" y="140" font-size="9" fill="#555">utilization (MFU)</text>

    <line x1="12" y1="160" x2="176" y2="160" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="188" font-size="10" font-weight="700" fill="#333">Accelerator Efficiency</text>
    <text x="16" y="206" font-size="9" fill="#555">Arithmetic intensity,</text>
    <text x="16" y="220" font-size="9" fill="#555">roofline position</text>

    <line x1="12" y1="240" x2="176" y2="240" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="268" font-size="10" font-weight="700" fill="#333">Memory Hierarchy</text>
    <text x="16" y="286" font-size="9" fill="#555">HBM bandwidth, SRAM</text>
    <text x="16" y="300" font-size="9" fill="#555">capacity, memory wall</text>
  </g>

  <!-- Column 2: Communication -->
  <g transform="translate(266, 42)">
    <rect x="0" y="0" width="188" height="38" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.4"/>
    <text x="94" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Communication (C2)</text>
  </g>
  <g transform="translate(266, 92)">
    <rect x="0" y="0" width="188" height="320" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
    <text x="16" y="28" font-size="10" font-weight="700" fill="#333">Point-to-Point</text>
    <text x="16" y="46" font-size="9" fill="#555">Send/Recv, NVLink, PCIe,</text>
    <text x="16" y="60" font-size="9" fill="#555">InfiniBand RDMA</text>

    <line x1="12" y1="80" x2="176" y2="80" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="108" font-size="10" font-weight="700" fill="#333">Collective Operations</text>
    <text x="16" y="126" font-size="9" fill="#555">AllReduce, AllGather,</text>
    <text x="16" y="140" font-size="9" fill="#555">ReduceScatter, AlltoAll</text>

    <line x1="12" y1="160" x2="176" y2="160" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="188" font-size="10" font-weight="700" fill="#333">Bandwidth / Latency</text>
    <text x="16" y="206" font-size="9" fill="#555">Bisection BW, network</text>
    <text x="16" y="220" font-size="9" fill="#555">diameter, congestion</text>

    <line x1="12" y1="240" x2="176" y2="240" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="268" font-size="10" font-weight="700" fill="#333">Topology</text>
    <text x="16" y="286" font-size="9" fill="#555">Fat-tree, Dragonfly,</text>
    <text x="16" y="300" font-size="9" fill="#555">rail-optimized networks</text>
  </g>

  <!-- Column 3: Coordination -->
  <g transform="translate(504, 42)">
    <rect x="0" y="0" width="188" height="38" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.4"/>
    <text x="94" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#c87b2a">Coordination (C3)</text>
  </g>
  <g transform="translate(504, 92)">
    <rect x="0" y="0" width="188" height="320" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
    <text x="16" y="28" font-size="10" font-weight="700" fill="#333">Scheduling</text>
    <text x="16" y="46" font-size="9" fill="#555">Job placement, preemption,</text>
    <text x="16" y="60" font-size="9" fill="#555">gang scheduling</text>

    <line x1="12" y1="80" x2="176" y2="80" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="108" font-size="10" font-weight="700" fill="#333">Checkpointing</text>
    <text x="16" y="126" font-size="9" fill="#555">State preservation,</text>
    <text x="16" y="140" font-size="9" fill="#555">async checkpoint, recovery</text>

    <line x1="12" y1="160" x2="176" y2="160" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="188" font-size="10" font-weight="700" fill="#333">Job Management</text>
    <text x="16" y="206" font-size="9" fill="#555">Slurm, Kubernetes,</text>
    <text x="16" y="220" font-size="9" fill="#555">resource orchestration</text>

    <line x1="12" y1="240" x2="176" y2="240" stroke="#e0e0e0" stroke-width="0.6"/>
    <text x="16" y="268" font-size="10" font-weight="700" fill="#333">Consistency</text>
    <text x="16" y="286" font-size="9" fill="#555">Synchronous vs. async</text>
    <text x="16" y="300" font-size="9" fill="#555">training, CAP trade-offs</text>
  </g>

  <!--
    Bottleneck indicators between columns.
    Gap between C1 (ends x=216) and C2 (starts x=266): center = 241.
    Gap between C2 (ends x=454) and C3 (starts x=504): center = 479.
    Arrow runs horizontally across the 50px gap.
    Label pill sits ABOVE the arrow with clear clearance.
  -->

  <!-- Bottleneck pill: C1 <-> C2 — centered at x=241, above arrow -->
  <rect x="218" y="224" width="46" height="16" fill="#f9d6d5" stroke="#c44" stroke-width="0.9"/>
  <text x="241" y="235" text-anchor="middle" font-size="7.5" fill="#c44" font-weight="700" letter-spacing="0.3">bottleneck</text>
  <!-- Arrow below the pill -->
  <line x1="216" y1="252" x2="266" y2="252" stroke="#a31f34" stroke-width="1.4" marker-start="url(#arr-rev)" marker-end="url(#arr)"/>
  <!-- Connector from pill to arrow -->
  <line x1="241" y1="240" x2="241" y2="249" stroke="#a31f34" stroke-width="0.7" stroke-dasharray="2,1"/>

  <!-- Bottleneck pill: C2 <-> C3 — centered at x=479, above arrow -->
  <rect x="456" y="224" width="46" height="16" fill="#f9d6d5" stroke="#c44" stroke-width="0.9"/>
  <text x="479" y="235" text-anchor="middle" font-size="7.5" fill="#c44" font-weight="700" letter-spacing="0.3">bottleneck</text>
  <!-- Arrow below the pill -->
  <line x1="454" y1="252" x2="504" y2="252" stroke="#a31f34" stroke-width="1.4" marker-start="url(#arr-rev)" marker-end="url(#arr)"/>
  <!-- Connector from pill to arrow -->
  <line x1="479" y1="240" x2="479" y2="249" stroke="#a31f34" stroke-width="0.7" stroke-dasharray="2,1"/>

  <!-- Bottom summary line -->
  <rect x="28" y="424" width="664" height="24" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
  <text x="360" y="440" text-anchor="middle" font-size="9" fill="#555" font-weight="600">Every distributed ML bottleneck maps to one of these three dimensions</text>
</svg>