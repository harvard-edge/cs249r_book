<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1200" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="600" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Reliability Collapse</text>
  <text x="600" y="40" text-anchor="middle" font-size="9.5" fill="#555">Fleet Availability = (Node Reliability)^N — as fleet grows, availability collapses to near zero</text>

  <!-- ===== Chart Area ===== -->
  <!-- Chart background -->
  <rect x="90" y="60" width="960" height="300" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ── Y-axis gridlines and labels ── -->
  <!-- 100% -->
  <line x1="90" y1="60" x2="1050" y2="60" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="80" y="60" text-anchor="end" font-size="8.5" fill="#555" dominant-baseline="central">100%</text>

  <!-- 80% -->
  <line x1="90" y1="120" x2="1050" y2="120" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="80" y="120" text-anchor="end" font-size="8.5" fill="#555" dominant-baseline="central">80%</text>

  <!-- 60% -->
  <line x1="90" y1="180" x2="1050" y2="180" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="80" y="180" text-anchor="end" font-size="8.5" fill="#555" dominant-baseline="central">60%</text>

  <!-- 40% -->
  <line x1="90" y1="240" x2="1050" y2="240" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="80" y="240" text-anchor="end" font-size="8.5" fill="#555" dominant-baseline="central">40%</text>

  <!-- 20% -->
  <line x1="90" y1="300" x2="1050" y2="300" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="80" y="300" text-anchor="end" font-size="8.5" fill="#555" dominant-baseline="central">20%</text>

  <!-- 0% / baseline -->
  <line x1="90" y1="360" x2="1050" y2="360" stroke="#bbb" stroke-width="1.0"/>
  <text x="80" y="360" text-anchor="end" font-size="8.5" fill="#555" dominant-baseline="central">0%</text>

  <!-- X-axis tick labels -->
  <text x="90" y="380" text-anchor="middle" font-size="8.5" fill="#555">1</text>
  <text x="330" y="380" text-anchor="middle" font-size="8.5" fill="#555">10</text>
  <text x="570" y="380" text-anchor="middle" font-size="8.5" fill="#555">100</text>
  <text x="810" y="380" text-anchor="middle" font-size="8.5" fill="#555">1,000</text>
  <text x="1050" y="380" text-anchor="middle" font-size="8.5" fill="#555">10,000</text>

  <!-- X-axis tick marks -->
  <line x1="90" y1="360" x2="90" y2="370" stroke="#555" stroke-width="1.0"/>
  <line x1="330" y1="360" x2="330" y2="370" stroke="#555" stroke-width="1.0"/>
  <line x1="570" y1="360" x2="570" y2="370" stroke="#555" stroke-width="1.0"/>
  <line x1="810" y1="360" x2="810" y2="370" stroke="#555" stroke-width="1.0"/>
  <line x1="1050" y1="360" x2="1050" y2="370" stroke="#555" stroke-width="1.0"/>

  <!-- X axis label -->
  <text x="570" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Fleet Size (GPUs) — log scale</text>

  <!-- Y axis label -->
  <text x="30" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90, 30, 210)">Fleet Availability (%)</text>

  <!-- ── Axes ── -->
  <line x1="90" y1="360" x2="90" y2="50" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="90" y1="360" x2="1060" y2="360" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Area Fills (drawn before curves so strokes are not washed out) ===== -->
  <!-- Blue area fill (baseline up to blue curve) -->
  <polygon points="90,360 90,60 330,63 570,88.6 810,249.7 1050,360" fill="#cfe2f3" fill-opacity="0.25"/>

  <!-- Green area fill (blue curve up to green curve, preventing overlap) -->
  <polygon points="90,60 330,60.3 570,63 810,88.6 1050,249.7 1050,360 810,249.7 570,88.6 330,63" fill="#d4edda" fill-opacity="0.20"/>

  <!-- ===== Curve 1: 99.9% per node (blue — drops steeply) ===== -->
  <polyline points="90,60 330,63 570,88.6 810,249.7 1050,360" fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== Curve 2: 99.99% per node (green — drops slower) ===== -->
  <polyline points="90,60 330,60.3 570,63 810,88.6 1050,249.7" fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== Annotation: 99.9% at N=1000 ===== -->
  <circle cx="810" cy="249.7" r="5" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <rect x="690" y="230" width="100" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="740" y="240" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333" dominant-baseline="central">99.9% / node</text>
  <text x="740" y="260" text-anchor="middle" font-size="8" fill="#555" dominant-baseline="central">N=1,000 → 36.8%</text>
  <line x1="790" y1="249.7" x2="805" y2="249.7" stroke="#4a90c4" stroke-width="1.0"/>

  <!-- ===== Annotation: 99.9% at N=10000 (collapses to ~0%) ===== -->
  <circle cx="1050" cy="360" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <rect x="1070" y="340" width="120" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="1130" y="350" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34" dominant-baseline="central">N=10,000</text>
  <text x="1130" y="370" text-anchor="middle" font-size="8" fill="#a31f34" dominant-baseline="central">99.9%/node → ~0%</text>
  <line x1="1055" y1="360" x2="1070" y2="360" stroke="#a31f34" stroke-width="1.0"/>

  <!-- ===== Annotation: 99.99% at N=10000 (36.8%) ===== -->
  <circle cx="1050" cy="249.7" r="5" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <rect x="1070" y="230" width="120" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="1130" y="240" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333" dominant-baseline="central">99.99% / node</text>
  <text x="1130" y="260" text-anchor="middle" font-size="8" fill="#555" dominant-baseline="central">N=10,000 → 36.8%</text>
  <line x1="1055" y1="249.7" x2="1070" y2="249.7" stroke="#3d9e5a" stroke-width="1.0"/>

  <!-- ===== Legend ===== -->
  <rect x="860" y="60" width="190" height="60" rx="4" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
  <line x1="870" y1="80" x2="890" y2="80" stroke="#4a90c4" stroke-width="2.5"/>
  <circle cx="880" cy="80" r="3.5" fill="#4a90c4"/>
  <text x="900" y="80" font-size="9" fill="#333" dominant-baseline="central">99.9% per-node reliability</text>
  <line x1="870" y1="100" x2="890" y2="100" stroke="#3d9e5a" stroke-width="2.5"/>
  <circle cx="880" cy="100" r="3.5" fill="#3d9e5a"/>
  <text x="900" y="100" font-size="9" fill="#333" dominant-baseline="central">99.99% per-node reliability</text>

  <!-- ===== Crossover annotation line at N~1000 ===== -->
  <!-- Vertical dashed at x=810 (N=1000) -->
  <line x1="810" y1="60" x2="810" y2="360" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="800" y="70" text-anchor="end" font-size="7.5" fill="#999" font-style="italic" dominant-baseline="central">N = 1,000</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="600" y="440" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Fleet availability = (node reliability)^N  — four-nines per node still collapses at 10,000-GPU scale.</text>
</svg>