<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Reliability Collapse</text>
  <text x="340" y="42" text-anchor="middle" font-size="9.5" fill="#555">Fleet Availability = (Node Reliability)^N — as fleet grows, availability collapses to near zero</text>

  <!-- ===== Chart Area ===== -->
  <!-- Chart background -->
  <rect x="86" y="56" width="546" height="310" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <!-- ── Y-axis gridlines and labels ── -->
  <!-- 100% -->
  <line x1="86" y1="56" x2="632" y2="56" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="60" text-anchor="end" font-size="8.5" fill="#555">100%</text>

  <!-- 80% -->
  <line x1="86" y1="118" x2="632" y2="118" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="122" text-anchor="end" font-size="8.5" fill="#555">80%</text>

  <!-- 60% -->
  <line x1="86" y1="180" x2="632" y2="180" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="184" text-anchor="end" font-size="8.5" fill="#555">60%</text>

  <!-- 40% -->
  <line x1="86" y1="242" x2="632" y2="242" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="246" text-anchor="end" font-size="8.5" fill="#555">40%</text>

  <!-- 20% -->
  <line x1="86" y1="304" x2="632" y2="304" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="308" text-anchor="end" font-size="8.5" fill="#555">20%</text>

  <!-- 0% / baseline -->
  <line x1="86" y1="366" x2="632" y2="366" stroke="#bbb" stroke-width="1.0"/>
  <text x="78" y="370" text-anchor="end" font-size="8.5" fill="#555">0%</text>

  <!-- ── X-axis (log scale): 1, 10, 100, 1000, 10000 ── -->
  <!-- x positions mapped logarithmically: log10(1)=0, log10(10)=1, ..., log10(10000)=4 -->
  <!-- Chart left=86, right=632, width=546, so each log decade = 546/4 = 136.5 px -->
  <!-- x(N) = 86 + 136.5 * log10(N) -->

  <!-- x(1)    = 86 -->
  <!-- x(10)   = 222.5 -->
  <!-- x(100)  = 359 -->
  <!-- x(1000) = 495.5 -->
  <!-- x(10000)= 632 -->

  <!-- X-axis tick labels -->
  <text x="86" y="382" text-anchor="middle" font-size="8.5" fill="#555">1</text>
  <text x="222" y="382" text-anchor="middle" font-size="8.5" fill="#555">10</text>
  <text x="359" y="382" text-anchor="middle" font-size="8.5" fill="#555">100</text>
  <text x="496" y="382" text-anchor="middle" font-size="8.5" fill="#555">1,000</text>
  <text x="632" y="382" text-anchor="middle" font-size="8.5" fill="#555">10,000</text>

  <!-- X-axis tick marks -->
  <line x1="86" y1="366" x2="86" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="222" y1="366" x2="222" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="359" y1="366" x2="359" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="496" y1="366" x2="496" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="632" y1="366" x2="632" y2="372" stroke="#555" stroke-width="1.0"/>

  <!-- X axis label -->
  <text x="359" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Fleet Size (GPUs) — log scale</text>

  <!-- Y axis label -->
  <text x="22" y="211" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90, 22, 211)">Fleet Availability (%)</text>

  <!-- ── Axes ── -->
  <line x1="86" y1="56" x2="86" y2="366" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="86" y1="366" x2="640" y2="366" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Curve 1: 99.9% per node (blue — drops steeply) ===== -->
  <!--
    P(N) = (0.999)^N * 100
    At N=1:     99.9%   → y = 56 + 310*(1 - 0.999) = 56.31    ≈ 56
    At N=10:    99.0%   → y = 56 + 310*(1 - 0.99)  = 59.1     ≈ 59
    At N=100:   90.5%   → y = 56 + 310*(1 - 0.905) = 85.5     ≈ 86   [actually: 56 + 310*0.095=85.45]
    At N=1000:  36.8%   → y = 56 + 310*(1 - 0.368) = 251.8    ≈ 252  [56 + 310*0.632=251.9]
    At N=10000: ~0.005% → y ≈ 365.98                           ≈ 366

    y(P) = 56 + 310 * ((100-P)/100)   [56 at top = 100%, 366 at bottom = 0%]
    y = 56 + 310*(1 - P/100)
    = 56 + 310 - 310*P/100
    = 366 - 3.1*P
  -->
  <!-- Blue curve: (0.999)^N path -->
  <!-- Points: (86,56.3), (222,59.1), (359,85.5), (496,251.9), (632,365.98) -->
  <polyline points="86,56 222,59 359,86 496,252 632,366" fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Blue area fill (subtle) -->
  <polygon points="86,366 86,56 222,59 359,86 496,252 632,366" fill="#cfe2f3" fill-opacity="0.25"/>

  <!-- ===== Curve 2: 99.99% per node (green — drops slower) ===== -->
  <!--
    P(N) = (0.9999)^N * 100
    At N=1:     99.99%   → y ≈ 56
    At N=10:    99.90%   → y ≈ 56 + 310*0.001 = 56.31 ≈ 56
    At N=100:   99.0%    → y ≈ 56 + 310*0.010 = 59.1  ≈ 59
    At N=1000:  90.5%    → y ≈ 56 + 310*0.095 = 85.45 ≈ 85
    At N=10000: 36.8%    → y ≈ 56 + 310*0.632 = 251.9 ≈ 252
  -->
  <!-- Green curve: (0.9999)^N path -->
  <!-- Points: (86,56), (222,56), (359,59), (496,85), (632,252) -->
  <polyline points="86,56 222,56 359,59 496,85 632,252" fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Green area fill -->
  <polygon points="86,366 86,56 222,56 359,59 496,85 632,252 632,366" fill="#d4edda" fill-opacity="0.20"/>

  <!-- ===== Annotation: 99.9% at N=1000 ===== -->
  <!-- Dot at (496, 252) -->
  <circle cx="496" cy="252" r="5" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <!-- Label box -->
  <rect x="388" y="218" width="100" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0" rx="4"/>
  <text x="438" y="231" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">99.9% / node</text>
  <text x="438" y="241" text-anchor="middle" font-size="8" fill="#555">N=1,000 → 36.8%</text>
  <line x1="488" y1="246" x2="494" y2="250" stroke="#4a90c4" stroke-width="1.0"/>

  <!-- ===== Annotation: 99.9% at N=10000 (collapses to ~0%) ===== -->
  <circle cx="632" cy="366" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <rect x="510" y="330" width="116" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0" rx="4"/>
  <text x="568" y="343" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">N=10,000</text>
  <text x="568" y="355" text-anchor="middle" font-size="8" fill="#a31f34">99.9%/node → ~0%</text>
  <line x1="626" y1="358" x2="630" y2="364" stroke="#a31f34" stroke-width="1.0"/>

  <!-- ===== Annotation: 99.99% at N=10000 (36.8%) ===== -->
  <circle cx="632" cy="252" r="5" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <rect x="510" y="218" width="116" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <text x="568" y="231" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">99.99% / node</text>
  <text x="568" y="241" text-anchor="middle" font-size="8" fill="#555">N=10,000 → 36.8%</text>
  <line x1="626" y1="246" x2="630" y2="250" stroke="#3d9e5a" stroke-width="1.0"/>

  <!-- ===== Legend ===== -->
  <rect x="94" y="62" width="185" height="52" fill="#fff" stroke="#ddd" stroke-width="0.8" rx="4"/>
  <line x1="102" y1="78" x2="128" y2="78" stroke="#4a90c4" stroke-width="2.5"/>
  <circle cx="115" cy="78" r="3.5" fill="#4a90c4"/>
  <text x="133" y="81" font-size="9" fill="#333">99.9% per-node reliability</text>
  <line x1="102" y1="102" x2="128" y2="102" stroke="#3d9e5a" stroke-width="2.5"/>
  <circle cx="115" cy="102" r="3.5" fill="#3d9e5a"/>
  <text x="133" y="105" font-size="9" fill="#333">99.99% per-node reliability</text>

  <!-- ===== Crossover annotation line at N~1000 ===== -->
  <!-- Vertical dashed at x=496 (N=1000) -->
  <line x1="496" y1="56" x2="496" y2="366" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="509.0" y="70" font-size="7.5" fill="#999" font-style="italic">N = 1,000</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Fleet availability = (node reliability)^N  — four-nines per node still collapses at 10,000-GPU scale.</text>
</svg>