<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="800" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="400" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Reliability Collapse</text>
  <text x="400" y="42" text-anchor="middle" font-size="9.5" fill="#555">Fleet Availability = (Node Reliability)^N — as fleet grows, availability collapses to near zero</text>

  <!-- ===== Chart Area ===== -->
  <!-- Chart background -->
  <rect x="86" y="56" width="546" height="310" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ── Y-axis gridlines and labels ── -->
  <!-- 100% -->
  <line x1="86" y1="56" x2="632" y2="56" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="60" text-anchor="end" font-size="8.5" fill="#555">100%</text>

  <!-- 80% -->
  <line x1="86" y1="118" x2="632" y2="118" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="122" text-anchor="end" font-size="8.5" fill="#555">80%</text>

  <!-- 60% -->
  <line x1="86" y1="180" x2="632" y2="180" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="184" text-anchor="end" font-size="8.5" fill="#555">60%</text>

  <!-- 40% -->
  <line x1="86" y1="242" x2="632" y2="242" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="246" text-anchor="end" font-size="8.5" fill="#555">40%</text>

  <!-- 20% -->
  <line x1="86" y1="304" x2="632" y2="304" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="78" y="308" text-anchor="end" font-size="8.5" fill="#555">20%</text>

  <!-- 0% / baseline -->
  <line x1="86" y1="366" x2="632" y2="366" stroke="#bbb" stroke-width="1.0"/>
  <text x="78" y="370" text-anchor="end" font-size="8.5" fill="#555">0%</text>

  <!-- X-axis tick labels -->
  <text x="86" y="382" text-anchor="middle" font-size="8.5" fill="#555">1</text>
  <text x="222" y="382" text-anchor="middle" font-size="8.5" fill="#555">10</text>
  <text x="359" y="382" text-anchor="middle" font-size="8.5" fill="#555">100</text>
  <text x="496" y="382" text-anchor="middle" font-size="8.5" fill="#555">1,000</text>
  <text x="632" y="382" text-anchor="middle" font-size="8.5" fill="#555">10,000</text>

  <!-- X-axis tick marks -->
  <line x1="86" y1="366" x2="86" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="222" y1="366" x2="222" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="359" y1="366" x2="359" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="496" y1="366" x2="496" y2="372" stroke="#555" stroke-width="1.0"/>
  <line x1="632" y1="366" x2="632" y2="372" stroke="#555" stroke-width="1.0"/>

  <!-- X axis label -->
  <text x="359" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Fleet Size (GPUs) — log scale</text>

  <!-- Y axis label -->
  <text x="22" y="211" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90, 22, 211)">Fleet Availability (%)</text>

  <!-- ── Axes ── -->
  <line x1="86" y1="366" x2="86" y2="56" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="86" y1="366" x2="640" y2="366" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Curve 1: 99.9% per node (blue — drops steeply) ===== -->
  <polyline points="86,56 222,59 359,86 496,252 632,366" fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Blue area fill (subtle) -->
  <polygon points="86,366 86,56 222,59 359,86 496,252 632,366" fill="#cfe2f3" fill-opacity="0.25"/>

  <!-- ===== Curve 2: 99.99% per node (green — drops slower) ===== -->
  <polyline points="86,56 222,56 359,59 496,85 632,252" fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Green area fill -->
  <polygon points="86,366 86,56 222,56 359,59 496,85 632,252 632,366" fill="#d4edda" fill-opacity="0.20"/>

  <!-- ===== Annotation: 99.9% at N=1000 ===== -->
  <!-- Dot at (496, 252) -->
  <circle cx="496" cy="252" r="5" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <!-- Label box -->
  <rect x="376" y="238" width="100" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="426" y="251" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">99.9% / node</text>
  <text x="426" y="261" text-anchor="middle" font-size="8" fill="#555">N=1,000 → 36.8%</text>
  <line x1="476" y1="252" x2="491" y2="252" stroke="#4a90c4" stroke-width="1.0"/>

  <!-- ===== Annotation: 99.9% at N=10000 (collapses to ~0%) ===== -->
  <circle cx="632" cy="366" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <rect x="652" y="336" width="116" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="710" y="349" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">N=10,000</text>
  <text x="710" y="359" text-anchor="middle" font-size="8" fill="#a31f34">99.9%/node → ~0%</text>
  <polyline points="632,361 632,350 652,350" fill="none" stroke="#a31f34" stroke-width="1.0"/>

  <!-- ===== Annotation: 99.99% at N=10000 (36.8%) ===== -->
  <circle cx="632" cy="252" r="5" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <rect x="652" y="238" width="116" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="710" y="251" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">99.99% / node</text>
  <text x="710" y="261" text-anchor="middle" font-size="8" fill="#555">N=10,000 → 36.8%</text>
  <line x1="637" y1="252" x2="652" y2="252" stroke="#3d9e5a" stroke-width="1.0"/>

  <!-- ===== Legend ===== -->
  <rect x="100" y="309" width="185" height="52" fill="#fff" stroke="#ddd" stroke-width="0.8"/>
  <line x1="108" y1="325" x2="134" y2="325" stroke="#4a90c4" stroke-width="2.5"/>
  <circle cx="121" cy="325" r="3.5" fill="#4a90c4"/>
  <text x="139" y="328" font-size="9" fill="#333">99.9% per-node reliability</text>
  <line x1="108" y1="349" x2="134" y2="349" stroke="#3d9e5a" stroke-width="2.5"/>
  <circle cx="121" cy="349" r="3.5" fill="#3d9e5a"/>
  <text x="139" y="352" font-size="9" fill="#333">99.99% per-node reliability</text>

  <!-- ===== Crossover annotation line at N~1000 ===== -->
  <!-- Vertical dashed at x=496 (N=1000) -->
  <line x1="496" y1="56" x2="496" y2="366" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="509.0" y="70" font-size="7.5" fill="#999" font-style="italic">N = 1,000</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="400" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Fleet availability = (node reliability)^N  — four-nines per node still collapses at 10,000-GPU scale.</text>
</svg>