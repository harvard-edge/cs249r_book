<?xml version='1.0' encoding='utf-8'?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <ns0:rect width="680" height="460" fill="#fff" rx="4"/>

  <ns0:defs>
    <ns0:marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <ns0:path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </ns0:marker>
    <ns0:marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <ns0:path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </ns0:marker>
    <ns0:marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <ns0:path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </ns0:marker>
  </ns0:defs>

  
  <ns0:text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Barrier Synchronization vs. Independent Tasks</ns0:text>

  
  <ns0:rect x="18" y="38" width="302" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>

  
  <ns0:text x="169" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MapReduce</ns0:text>
  <ns0:text x="169" y="75" text-anchor="middle" font-size="9.5" fill="#555">Independent Tasks · No Barrier</ns0:text>

  
  
  <ns0:rect x="52" y="92" width="106" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <ns0:text x="105" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Worker A</ns0:text>
  <ns0:text x="105" y="125" text-anchor="middle" font-size="8.5" fill="#555">Task partition 1</ns0:text>

  
  <ns0:rect x="52" y="152" width="106" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <ns0:text x="105" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Worker B</ns0:text>
  <ns0:text x="105" y="185" text-anchor="middle" font-size="8.5" fill="#555">Task partition 2</ns0:text>

  
  <ns0:rect x="52" y="212" width="106" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <ns0:text x="105" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Worker C</ns0:text>
  <ns0:text x="105" y="245" text-anchor="middle" font-size="8.5" fill="#555">Task partition 3</ns0:text>

  
  <ns0:line x1="158" y1="113" x2="218" y2="270" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <ns0:line x1="158" y1="173" x2="220" y2="272" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <ns0:line x1="158" y1="233" x2="222" y2="274" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  
  <ns0:rect x="152" y="270" width="120" height="44" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <ns0:text x="212" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Shared Storage</ns0:text>
  <ns0:text x="212" y="306" text-anchor="middle" font-size="8.5" fill="#555">HDFS · S3 · GCS</ns0:text>

  
  <ns0:rect x="30" y="335" width="260" height="30" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <ns0:text x="160" y="355" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Workers are fully independent — no barrier needed</ns0:text>

  
  <ns0:text x="30" y="386" font-size="8.5" fill="#555">• Worker C finishes late: A and B already wrote outputs</ns0:text>
  <ns0:text x="30" y="402" font-size="8.5" fill="#555">• Fault in Worker C: job continues without it</ns0:text>
  <ns0:text x="30" y="418" font-size="8.5" fill="#555">• Scale by adding workers: no synchronization overhead</ns0:text>

  
  <ns0:line x1="340" y1="38" x2="340" y2="438" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  
  <ns0:rect x="360" y="38" width="302" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>

  
  <ns0:text x="511" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ML Fleet</ns0:text>
  <ns0:text x="511" y="75" text-anchor="middle" font-size="9.5" fill="#555">Barrier Synchronization · AllReduce</ns0:text>

  
  
  <ns0:rect x="374" y="92" width="106" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <ns0:text x="427" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Worker 0</ns0:text>
  <ns0:text x="427" y="125" text-anchor="middle" font-size="8.5" fill="#555">Gradient: ready ✓</ns0:text>

  
  <ns0:rect x="374" y="152" width="106" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <ns0:text x="427" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Worker 1</ns0:text>
  <ns0:text x="427" y="185" text-anchor="middle" font-size="8.5" fill="#555">Gradient: ready ✓</ns0:text>

  
  <ns0:rect x="374" y="212" width="106" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1.8" rx="4"/>
  <ns0:text x="427" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">GPU Worker 2</ns0:text>
  <ns0:text x="427" y="245" text-anchor="middle" font-size="8.5" fill="#a31f34">Straggler — 10% slow</ns0:text>

  
  
  <ns0:line x1="480" y1="113" x2="530" y2="180" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <ns0:line x1="480" y1="173" x2="532" y2="184" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <ns0:line x1="480" y1="233" x2="530" y2="208" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-red)"/>

  
  <ns0:rect x="530" y="168" width="110" height="56" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <ns0:text x="585" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">AllReduce</ns0:text>
  <ns0:text x="585" y="203" text-anchor="middle" font-size="8.5" fill="#555">Barrier: ALL must</ns0:text>
  <ns0:text x="585" y="216" text-anchor="middle" font-size="8.5" fill="#555">arrive before sync</ns0:text>

  
  <ns0:text x="510" y="142" text-anchor="middle" font-size="8" fill="#a31f34" font-style="italic">WAIT</ns0:text>
  <ns0:text x="510" y="168" text-anchor="middle" font-size="8" fill="#a31f34" font-style="italic">WAIT</ns0:text>

  
  <ns0:rect x="368" y="280" width="286" height="36" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <ns0:text x="511" y="296" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">One 10% straggler slows the entire cluster 10%</ns0:text>
  <ns0:text x="511" y="310" text-anchor="middle" font-size="8.5" fill="#555">All 10,000 GPUs idle waiting for one slow node</ns0:text>

  
  <ns0:text x="370" y="336" font-size="8.5" fill="#555">• Straggler in Worker 2: Workers 0 and 1 idle at barrier</ns0:text>
  <ns0:text x="370" y="352" font-size="8.5" fill="#555">• Fault in any worker: entire training step must restart</ns0:text>
  <ns0:text x="370" y="368" font-size="8.5" fill="#555">• Adding workers: amplifies barrier cost (N×N gradient traffic)</ns0:text>
  <ns0:text x="370" y="384" font-size="8.5" fill="#555">• 700 GB of gradients transferred per step for GPT-3</ns0:text>

  
  <ns0:text x="352.0" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">ML training couples all workers at every step; MapReduce workers are statistically independent.</ns0:text>
</ns0:svg>