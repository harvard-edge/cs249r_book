<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="760" height="540" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <text x="380" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Barrier Synchronization vs. Independent Tasks</text>

  <!-- MapReduce Panel -->
  <rect x="20" y="40" width="340" height="460" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <text x="190" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MapReduce</text>
  <text x="190" y="90" text-anchor="middle" font-size="9.5" fill="#555">Independent Tasks · No Barrier</text>

  <rect x="60" y="120" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Worker A</text>
  <text x="120" y="150" text-anchor="middle" font-size="8.5" fill="#555">Task partition 1</text>

  <rect x="60" y="180" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Worker B</text>
  <text x="120" y="210" text-anchor="middle" font-size="8.5" fill="#555">Task partition 2</text>

  <rect x="60" y="240" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Worker C</text>
  <text x="120" y="270" text-anchor="middle" font-size="8.5" fill="#555">Task partition 3</text>

  <!-- MR Arrows -->
  <path d="M 180 140 L 290 140 L 290 290" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 180 200 L 260 200 L 260 290" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 180 260 L 230 260 L 230 290" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- MR Shared Storage -->
  <rect x="210" y="290" width="120" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="270" y="310" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Shared Storage</text>
  <text x="270" y="326" text-anchor="middle" font-size="8.5" fill="#555">HDFS · S3 · GCS</text>

  <!-- MR Summary Box -->
  <rect x="40" y="360" width="300" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="190" y="384" text-anchor="middle" font-size="9" font-weight="700" fill="#1c492a">Workers are fully independent — no barrier needed</text>

  <!-- MR Bullets -->
  <text x="40" y="420" font-size="8.5" fill="#555">• Worker C finishes late: A and B already wrote outputs</text>
  <text x="40" y="436" font-size="8.5" fill="#555">• Fault in Worker C: job continues without it</text>
  <text x="40" y="452" font-size="8.5" fill="#555">• Scale by adding workers: no synchronization overhead</text>

  <!-- Center divider -->
  <line x1="380" y1="40" x2="380" y2="500" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ML Fleet Panel -->
  <rect x="400" y="40" width="340" height="460" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <text x="570" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ML Fleet</text>
  <text x="570" y="90" text-anchor="middle" font-size="9.5" fill="#555">Barrier Synchronization · AllReduce</text>

  <rect x="430" y="120" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="490" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Worker 0</text>
  <text x="490" y="150" text-anchor="middle" font-size="8.5" fill="#555">Gradient: ready ✓</text>

  <rect x="430" y="180" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="490" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Worker 1</text>
  <text x="490" y="210" text-anchor="middle" font-size="8.5" fill="#555">Gradient: ready ✓</text>

  <rect x="430" y="240" width="120" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="490" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">GPU Worker 2</text>
  <text x="490" y="270" text-anchor="middle" font-size="8.5" fill="#a31f34">Straggler — 10% slow</text>

  <!-- ML Arrows -->
  <path d="M 550 140 L 590 140 L 590 190 L 600 190" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <path d="M 550 200 L 600 200" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <path d="M 550 260 L 590 260 L 590 210 L 600 210" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-red)"/>

  <!-- Wait text -->
  <text x="570" y="134" text-anchor="middle" font-size="8" fill="#a31f34" font-style="italic">WAIT</text>
  <text x="570" y="194" text-anchor="middle" font-size="8" fill="#a31f34" font-style="italic">WAIT</text>

  <!-- AllReduce -->
  <rect x="600" y="180" width="120" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="660" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#693e16">AllReduce</text>
  <text x="660" y="216" text-anchor="middle" font-size="8.5" fill="#555">Barrier: ALL must</text>
  <text x="660" y="230" text-anchor="middle" font-size="8.5" fill="#555">arrive before sync</text>

  <!-- ML Summary Box -->
  <rect x="420" y="360" width="300" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="570" y="376" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">One 10% straggler slows the entire cluster 10%</text>
  <text x="570" y="392" text-anchor="middle" font-size="8.5" fill="#555">All 10,000 GPUs idle waiting for one slow node</text>

  <!-- ML Bullets -->
  <text x="420" y="420" font-size="8.5" fill="#555">• Straggler in Worker 2: Workers 0 and 1 idle at barrier</text>
  <text x="420" y="436" font-size="8.5" fill="#555">• Fault in any worker: entire training step must restart</text>
  <text x="420" y="452" font-size="8.5" fill="#555">• Adding workers: amplifies barrier cost (N×N gradient traffic)</text>
  <text x="420" y="468" font-size="8.5" fill="#555">• 700 GB of gradients transferred per step for GPT-3</text>

  <!-- Footer text -->
  <text x="380" y="520" text-anchor="middle" font-size="9" font-style="italic" fill="#999">ML training couples all workers at every step; MapReduce workers are statistically independent.</text>
</svg>