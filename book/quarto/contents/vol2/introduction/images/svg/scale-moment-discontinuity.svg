<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Scale Discontinuity</text>

  <!-- ===== Left Panel: Single Machine ===== -->
  <!-- Panel background -->
  <rect x="18" y="38" width="302" height="390" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>

  <!-- Panel title -->
  <text x="169" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Single Machine</text>
  <text x="169" y="75" text-anchor="middle" font-size="9" fill="#555">1–8 Accelerators · Shared Memory</text>

  <!-- ── Single GPU box ── -->
  <rect x="109" y="94" width="120" height="56" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="169" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#333">GPU / Accelerator</text>
  <text x="169" y="134" text-anchor="middle" font-size="9" fill="#555">Shared HBM · NVLink</text>

  <!-- ── Training data arrow in ── -->
  <line x1="169" y1="78" x2="169" y2="91" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="169" y="89" text-anchor="middle" font-size="8" fill="#555">data</text>

  <!-- ── Model weights / output arrow ── -->
  <line x1="169" y1="150" x2="169" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Local memory/storage box ── -->
  <rect x="109" y="168" width="120" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="169" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Local Memory</text>
  <text x="169" y="199" text-anchor="middle" font-size="8.5" fill="#555">HBM · DRAM · NVMe</text>

  <!-- ── Constraint label ── -->
  <rect x="90" y="228" width="158" height="28" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0" rx="4"/>
  <text x="169" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Binding Constraint:</text>
  <text x="169" y="254" text-anchor="middle" font-size="9" fill="#555">Memory Wall (HBM bandwidth)</text>

  <!-- ── "Simple" label characteristics ── -->
  <text x="38" y="305" font-size="9" fill="#555">✓  No inter-node coordination</text>
  <text x="38" y="320" font-size="9" fill="#555">✓  Failures are exceptional events</text>
  <text x="38" y="335" font-size="9" fill="#555">✓  Single point of governance</text>
  <text x="38" y="350" font-size="9" fill="#555">✓  Arithmetic intensity determines throughput</text>

  <!-- ── Volume I badge ── -->
  <rect x="90" y="366" width="158" height="24" fill="#a31f34" rx="4"/>
  <text x="169" y="383" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Volume I Scope</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="38" x2="340" y2="428" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Right Panel: Fleet Scale ===== -->
  <!-- Panel background -->
  <rect x="360" y="38" width="302" height="390" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>

  <!-- Panel title -->
  <text x="511" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Fleet Scale</text>
  <text x="511" y="75" text-anchor="middle" font-size="9" fill="#555">Thousands of Nodes · Network Fabric</text>

  <!-- ── GPU grid (4×3 grid of GPU boxes) ── -->
  <!-- Row 1 -->
  <rect x="374" y="88" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="401" y="105" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="401" y="118" text-anchor="middle" font-size="7.5" fill="#555">Node 0</text>

  <rect x="438" y="88" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="465" y="105" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="465" y="118" text-anchor="middle" font-size="7.5" fill="#555">Node 1</text>

  <rect x="502" y="88" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="529" y="105" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="529" y="118" text-anchor="middle" font-size="7.5" fill="#555">Node 2</text>

  <rect x="566" y="88" width="54" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="3"/>
  <text x="593" y="105" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">GPU</text>
  <text x="593" y="118" text-anchor="middle" font-size="7.5" fill="#a31f34">FAIL</text>

  <!-- Row 2 -->
  <rect x="374" y="136" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="401" y="153" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="401" y="166" text-anchor="middle" font-size="7.5" fill="#555">Node 4</text>

  <rect x="438" y="136" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="465" y="153" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="465" y="166" text-anchor="middle" font-size="7.5" fill="#555">Node 5</text>

  <rect x="502" y="136" width="54" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="3"/>
  <text x="529" y="153" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">GPU</text>
  <text x="529" y="166" text-anchor="middle" font-size="7.5" fill="#a31f34">FAIL</text>

  <rect x="566" y="136" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="593" y="153" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="593" y="166" text-anchor="middle" font-size="7.5" fill="#555">Node 7</text>

  <!-- Row 3 -->
  <rect x="374" y="184" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="401" y="201" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="401" y="214" text-anchor="middle" font-size="7.5" fill="#555">Node 8</text>

  <rect x="438" y="184" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="465" y="201" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="465" y="214" text-anchor="middle" font-size="7.5" fill="#555">Node 9</text>

  <rect x="502" y="184" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="529" y="201" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="529" y="214" text-anchor="middle" font-size="7.5" fill="#555">Node 10</text>

  <rect x="566" y="184" width="54" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="593" y="201" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="593" y="214" text-anchor="middle" font-size="7.5" fill="#555">Node 11</text>

  <!-- ── Communication dominance: orange inter-node arrows ── -->
  <!-- Row 1 horizontal connections -->
  <line x1="428" y1="107" x2="436" y2="107" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="492" y1="107" x2="500" y2="107" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="556" y1="107" x2="564" y2="107" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Row 2 horizontal connections -->
  <line x1="428" y1="155" x2="436" y2="155" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="492" y1="155" x2="500" y2="155" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="556" y1="155" x2="564" y2="155" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Row 3 horizontal connections -->
  <line x1="428" y1="203" x2="436" y2="203" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="492" y1="203" x2="500" y2="203" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="556" y1="203" x2="564" y2="203" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Vertical connections col 1 -->
  <line x1="401" y1="126" x2="401" y2="134" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="401" y1="174" x2="401" y2="182" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Vertical connections col 2 -->
  <line x1="465" y1="126" x2="465" y2="134" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="465" y1="174" x2="465" y2="182" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ── Three challenge labels ── -->
  <!-- Challenge 1: Communication Dominance -->
  <rect x="368" y="238" width="190" height="38" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="463" y="254" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">Communication Dominance</text>
  <text x="463" y="268" text-anchor="middle" font-size="8.5" fill="#555">Gradient sync: 700 GB per step (GPT-3)</text>

  <!-- Connecting arrow from challenge 1 to grid -->
  <line x1="463" y1="230" x2="463" y2="236" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Challenge 2: Routine Failure -->
  <rect x="368" y="286" width="190" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="463" y="302" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">Routine Failure</text>
  <text x="463" y="316" text-anchor="middle" font-size="8.5" fill="#555">10 k GPUs: failure every ~4 hours</text>

  <!-- Challenge 3: Governance Complexity -->
  <rect x="368" y="334" width="190" height="38" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="463" y="350" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">Governance Complexity</text>
  <text x="463" y="364" text-anchor="middle" font-size="8.5" fill="#555">Security, fairness, multi-tenant access</text>

  <!-- ── Volume II badge ── -->
  <rect x="430" y="380" width="162" height="24" fill="#a31f34" rx="4"/>
  <text x="511" y="397" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Volume II Scope</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Scale changes the nature of the problem, not just its magnitude.</text>
</svg>
