<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="760" height="480" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="380" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Scale Discontinuity</text>

  <!-- ===== Left Panel: Single Machine ===== -->
  <!-- Panel background -->
  <rect x="20" y="40" width="340" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>

  <!-- Panel title -->
  <text x="190" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Single Machine</text>
  <text x="190" y="75" text-anchor="middle" font-size="9" fill="#555">1–8 Accelerators · Shared Memory</text>

  <!-- ── Single GPU box ── -->
  <rect x="130" y="100" width="120" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="190" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#333">GPU / Accelerator</text>
  <text x="190" y="142" text-anchor="middle" font-size="9" fill="#555">Shared HBM · NVLink</text>

  <!-- ── Training data arrow in ── -->
  <line x1="190" y1="80" x2="190" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="202" y="93" text-anchor="middle" font-size="8" fill="#555">data</text>

  <!-- ── Model weights / output arrow ── -->
  <line x1="190" y1="160" x2="190" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Local memory/storage box ── -->
  <rect x="130" y="180" width="120" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="190" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Local Memory</text>
  <text x="190" y="210" text-anchor="middle" font-size="8.5" fill="#555">HBM · DRAM · NVMe</text>

  <!-- ── Constraint label ── -->
  <rect x="110" y="240" width="160" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0" rx="4"/>
  <text x="190" y="254" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Binding Constraint:</text>
  <text x="190" y="266" text-anchor="middle" font-size="9" fill="#555">Memory Wall (HBM bandwidth)</text>

  <!-- ── "Simple" label characteristics ── -->
  <text x="50" y="320" font-size="9" fill="#555">✓  No inter-node coordination</text>
  <text x="50" y="335" font-size="9" fill="#555">✓  Failures are exceptional events</text>
  <text x="50" y="350" font-size="9" fill="#555">✓  Single point of governance</text>
  <text x="50" y="365" font-size="9" fill="#555">✓  Arithmetic intensity determines throughput</text>

  <!-- ── Volume I badge ── -->
  <rect x="110" y="390" width="160" height="30" fill="#a31f34" rx="4"/>
  <text x="190" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Volume I Scope</text>

  <!-- ===== Divider ===== -->
  <line x1="380" y1="40" x2="380" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Right Panel: Fleet Scale ===== -->
  <!-- Panel background -->
  <rect x="400" y="40" width="340" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>

  <!-- Panel title -->
  <text x="570" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Fleet Scale</text>
  <text x="570" y="75" text-anchor="middle" font-size="9" fill="#555">Thousands of Nodes · Network Fabric</text>

  <!-- ── GPU grid (4×3 grid of GPU boxes, centered in panel) ── -->
  <!-- Row 1 -->
  <rect x="420" y="90" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="450" y="107" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="450" y="120" text-anchor="middle" font-size="7.5" fill="#555">Node 0</text>

  <rect x="500" y="90" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="530" y="107" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="530" y="120" text-anchor="middle" font-size="7.5" fill="#555">Node 1</text>

  <rect x="580" y="90" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="610" y="107" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="610" y="120" text-anchor="middle" font-size="7.5" fill="#555">Node 2</text>

  <rect x="660" y="90" width="60" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="690" y="107" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">GPU</text>
  <text x="690" y="120" text-anchor="middle" font-size="7.5" fill="#a31f34">FAIL</text>

  <!-- Row 2 -->
  <rect x="420" y="140" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="450" y="157" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="450" y="170" text-anchor="middle" font-size="7.5" fill="#555">Node 4</text>

  <rect x="500" y="140" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="530" y="157" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="530" y="170" text-anchor="middle" font-size="7.5" fill="#555">Node 5</text>

  <rect x="580" y="140" width="60" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="610" y="157" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">GPU</text>
  <text x="610" y="170" text-anchor="middle" font-size="7.5" fill="#a31f34">FAIL</text>

  <rect x="660" y="140" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="690" y="157" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="690" y="170" text-anchor="middle" font-size="7.5" fill="#555">Node 7</text>

  <!-- Row 3 -->
  <rect x="420" y="190" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="450" y="207" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="450" y="220" text-anchor="middle" font-size="7.5" fill="#555">Node 8</text>

  <rect x="500" y="190" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="530" y="207" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="530" y="220" text-anchor="middle" font-size="7.5" fill="#555">Node 9</text>

  <rect x="580" y="190" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="610" y="207" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="610" y="220" text-anchor="middle" font-size="7.5" fill="#555">Node 10</text>

  <rect x="660" y="190" width="60" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="690" y="207" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <text x="690" y="220" text-anchor="middle" font-size="7.5" fill="#555">Node 11</text>

  <!-- ── Communication dominance: orange inter-node arrows ── -->
  <!-- Row 1 horizontal connections -->
  <line x1="480" y1="110" x2="500" y2="110" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="560" y1="110" x2="580" y2="110" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="640" y1="110" x2="660" y2="110" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Row 2 horizontal connections -->
  <line x1="480" y1="160" x2="500" y2="160" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="560" y1="160" x2="580" y2="160" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="640" y1="160" x2="660" y2="160" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Row 3 horizontal connections -->
  <line x1="480" y1="210" x2="500" y2="210" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="560" y1="210" x2="580" y2="210" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="640" y1="210" x2="660" y2="210" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Vertical connections col 1 -->
  <line x1="450" y1="130" x2="450" y2="140" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="450" y1="180" x2="450" y2="190" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Vertical connections col 2 -->
  <line x1="530" y1="130" x2="530" y2="140" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="530" y1="180" x2="530" y2="190" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Vertical connections col 3 -->
  <line x1="610" y1="130" x2="610" y2="140" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="610" y1="180" x2="610" y2="190" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Vertical connections col 4 -->
  <line x1="690" y1="130" x2="690" y2="140" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="690" y1="180" x2="690" y2="190" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ── Three challenge labels ── -->
  <!-- Challenge 1: Communication Dominance -->
  <rect x="460" y="240" width="220" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="570" y="256" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Communication Dominance</text>
  <text x="570" y="270" text-anchor="middle" font-size="8.5" fill="#555">Gradient sync: 700 GB per step (GPT-3)</text>

  <!-- Connecting arrows from challenge 1 to grid -->
  <line x1="530" y1="230" x2="530" y2="240" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="610" y1="230" x2="610" y2="240" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Challenge 2: Routine Failure -->
  <rect x="460" y="290" width="220" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="570" y="306" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">Routine Failure</text>
  <text x="570" y="320" text-anchor="middle" font-size="8.5" fill="#555">10 k GPUs: failure every ~4 hours</text>

  <!-- Challenge 3: Governance Complexity -->
  <rect x="460" y="340" width="220" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="570" y="356" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Governance Complexity</text>
  <text x="570" y="370" text-anchor="middle" font-size="8.5" fill="#555">Security, fairness, multi-tenant access</text>

  <!-- ── Volume II badge ── -->
  <rect x="490" y="390" width="160" height="30" fill="#a31f34" rx="4"/>
  <text x="570" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Volume II Scope</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="380" y="470" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Scale changes the nature of the problem, not just its magnitude.</text>
</svg>