  <rect x="195" y="148" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="231" y="163" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(1,1)</text>
  <text x="231" y="176" text-anchor="middle" font-size="7.5" fill="#555">rank 5</text>

  <rect x="295" y="148" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="331" y="163" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(2,1)</text>
