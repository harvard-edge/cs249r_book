  <!-- (0,0) -->
  <rect x="95" y="68" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="131" y="83" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(0,0)</text>
  <text x="131" y="96" text-anchor="middle" font-size="7.5" fill="#555">rank 0</text>

  <!-- (1,0) -->
  <rect x="195" y="68" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="231" y="83" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(1,0)</text>
  <text x="231" y="96" text-anchor="middle" font-size="7.5" fill="#555">rank 1</text>

  <!-- (2,0) -->
  <rect x="295" y="68" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="331" y="83" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(2,0)</text>
  <text x="331" y="96" text-anchor="middle" font-size="7.5" fill="#555">rank 2</text>

  <!-- (3,0) -->
  <rect x="395" y="68" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="431" y="83" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(3,0)</text>
  <text x="431" y="96" text-anchor="middle" font-size="7.5" fill="#555">rank 3</text>

  <!-- ===== Row 1: y=148..184 ===== -->
  <rect x="95" y="148" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="131" y="163" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(0,1)</text>
