  <!-- Column centers: 125, 215, 305, 395 -->
  <!-- Row centers: 100, 170, 240, 310 -->

  <!-- Grid layout constants:
       col x: 95, 185, 275, 365 (left edge)
       row y: 65, 145, 225, 305 (top edge)
       node w=72, h=36
  -->

