  <text x="431" y="163" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(3,1)</text>
  <text x="431" y="176" text-anchor="middle" font-size="7.5" fill="#555">rank 7</text>

  <!-- ===== Row 2: y=228..264 ===== -->
  <rect x="95" y="228" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="131" y="243" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(0,2)</text>
  <text x="131" y="256" text-anchor="middle" font-size="7.5" fill="#555">rank 8</text>

  <rect x="195" y="228" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="231" y="243" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(1,2)</text>
  <text x="231" y="256" text-anchor="middle" font-size="7.5" fill="#555">rank 9</text>

  <rect x="295" y="228" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="331" y="243" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(2,2)</text>
  <text x="331" y="256" text-anchor="middle" font-size="7.5" fill="#555">rank 10</text>

  <rect x="395" y="228" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="431" y="243" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(3,2)</text>
  <text x="431" y="256" text-anchor="middle" font-size="7.5" fill="#555">rank 11</text>

  <!-- ===== Row 3: y=308..344 ===== -->
  <rect x="95" y="308" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="131" y="323" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(0,3)</text>
  <text x="131" y="336" text-anchor="middle" font-size="7.5" fill="#555">rank 12</text>

  <rect x="195" y="308" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="231" y="323" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(1,3)</text>
  <text x="231" y="336" text-anchor="middle" font-size="7.5" fill="#555">rank 13</text>

  <rect x="295" y="308" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="331" y="323" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(2,3)</text>
  <text x="331" y="336" text-anchor="middle" font-size="7.5" fill="#555">rank 14</text>

  <rect x="395" y="308" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="431" y="323" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Node(3,3)</text>
  <text x="431" y="336" text-anchor="middle" font-size="7.5" fill="#555">rank 15</text>

  <!-- ===== X-dimension (horizontal ring) arrows — Phase 1 (blue) ===== -->
  <!-- Row 0 horizontal ring -->
  <line x1="167" y1="86" x2="193" y2="86" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="267" y1="86" x2="293" y2="86" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="367" y1="86" x2="393" y2="86" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Wrap-around for row 0 (torus link, top arc) -->
  <path d="M 467 82 Q 510 48 95 82" stroke="#4a90c4" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>

  <!-- Row 1 horizontal ring -->
  <line x1="167" y1="166" x2="193" y2="166" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="267" y1="166" x2="293" y2="166" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="367" y1="166" x2="393" y2="166" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 467 162 Q 510 130 95 162" stroke="#4a90c4" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>

  <!-- Row 2 horizontal ring -->
  <line x1="167" y1="246" x2="193" y2="246" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="267" y1="246" x2="293" y2="246" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="367" y1="246" x2="393" y2="246" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 467 242 Q 510 210 95 242" stroke="#4a90c4" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>

  <!-- Row 3 horizontal ring -->
  <line x1="167" y1="326" x2="193" y2="326" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="267" y1="326" x2="293" y2="326" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="367" y1="326" x2="393" y2="326" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 467 322 Q 510 290 95 322" stroke="#4a90c4" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="6,3"/>

  <!-- ===== Y-dimension (vertical ring) arrows — Phase 2 (green) ===== -->
  <!-- Col 0 vertical -->
  <line x1="131" y1="104" x2="131" y2="146" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="131" y1="184" x2="131" y2="226" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="131" y1="264" x2="131" y2="306" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Wrap-around col 0 -->
  <path d="M 127 344 Q 54 390 127 68" stroke="#3d9e5a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>

  <!-- Col 1 vertical -->
  <line x1="231" y1="104" x2="231" y2="146" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="231" y1="184" x2="231" y2="226" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="231" y1="264" x2="231" y2="306" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 227 344 Q 157 390 227 68" stroke="#3d9e5a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>

  <!-- Col 2 vertical -->
  <line x1="331" y1="104" x2="331" y2="146" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="331" y1="184" x2="331" y2="226" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="331" y1="264" x2="331" y2="306" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 327 344 Q 257 390 327 68" stroke="#3d9e5a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>

  <!-- Col 3 vertical -->
  <line x1="431" y1="104" x2="431" y2="146" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="431" y1="184" x2="431" y2="226" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="431" y1="264" x2="431" y2="306" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 427 344 Q 360 390 427 68" stroke="#3d9e5a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="6,3"/>

  <!-- ===== Phase annotation boxes (right side) ===== -->
  <rect x="498" y="68" width="170" height="60" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="583" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Phase 1: X-Dimension</text>
  <text x="583" y="103" text-anchor="middle" font-size="8.5" fill="#333">Ring AllReduce along</text>
  <text x="583" y="116" text-anchor="middle" font-size="8.5" fill="#333">each horizontal row</text>
  <text x="583" y="122" text-anchor="middle" font-size="7.5" fill="#555">(4 independent rings)</text>

  <rect x="498" y="148" width="170" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="583" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Phase 2: Y-Dimension</text>
  <text x="583" y="183" text-anchor="middle" font-size="8.5" fill="#333">Ring AllReduce along</text>
  <text x="583" y="196" text-anchor="middle" font-size="8.5" fill="#333">each vertical column</text>
  <text x="583" y="202" text-anchor="middle" font-size="7.5" fill="#555">(4 independent rings)</text>

  <!-- Complexity box -->
  <rect x="498" y="228" width="170" height="100" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="583" y="248" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Latency Advantage</text>
  <line x1="508" y1="254" x2="658" y2="254" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="583" y="270" text-anchor="middle" font-size="8.5" fill="#555">Global ring: 2(N-1) steps</text>
  <text x="583" y="284" text-anchor="middle" font-size="8.5" fill="#555">N=16 → 30 steps</text>
  <line x1="508" y1="290" x2="658" y2="290" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="583" y="306" text-anchor="middle" font-size="8.5" fill="#2d7a2d">Torus: 2(X-1)+2(Y-1) steps</text>
  <text x="583" y="320" text-anchor="middle" font-size="8.5" fill="#2d7a2d">X=Y=4 → 12 steps (2.5× faster)</text>

  <!-- Bandwidth note -->
  <rect x="498" y="348" width="170" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="583" y="367" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Bandwidth Cost</text>
  <text x="583" y="381" text-anchor="middle" font-size="8.5" fill="#555">Same as single Ring:</text>
  <text x="583" y="393" text-anchor="middle" font-size="8.5" fill="#555">2M/β per node</text>

  <!-- Legend -->
  <line x1="498" y1="418" x2="520" y2="418" stroke="#4a90c4" stroke-width="2"/>
  <text x="525" y="412.0" font-size="9" fill="#333">Phase 1: X-dimension (horizontal)</text>
  <line x1="498" y1="434" x2="520" y2="434" stroke="#3d9e5a" stroke-width="2"/>
  <text x="525" y="428.0" font-size="9" fill="#333">Phase 2: Y-dimension (vertical)</text>

  <!-- Footer -->
  <text x="280" y="448" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Dashed arcs show wrap-around torus links. Used by Google TPU pods for gradient synchronization.</text>
</svg>