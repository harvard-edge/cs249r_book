<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Collective Communication Primitives</text>

  <!-- Divider lines -->
  <line x1="340" y1="32" x2="340" y2="448" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="10" y1="240" x2="670" y2="240" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Panel 1: AllReduce (top-left) ===== -->
  <text x="170" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AllReduce</text>
  <text x="170" y="62" text-anchor="middle" font-size="8.5" fill="#555">Each node aggregates all data; all receive sum</text>

  <!-- Nodes before (left column) -->
  <!-- GPU 0 before -->
  <rect x="28" y="78" width="60" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="58" y="94" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G0: [1]</text>
  <!-- GPU 1 before -->
  <rect x="28" y="114" width="60" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="58" y="130" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G1: [2]</text>
  <!-- GPU 2 before -->
  <rect x="28" y="150" width="60" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="58" y="166" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G2: [3]</text>
  <!-- GPU 3 before -->
  <rect x="28" y="186" width="60" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="58" y="202" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G3: [4]</text>

  <!-- AllReduce label in center -->
  <rect x="118" y="128" width="64" height="24" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="150" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="#2d7a2d">AllReduce</text>

  <!-- Arrows from nodes to center -->
  <line x1="88" y1="91" x2="116" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="88" y1="127" x2="116" y2="137" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="88" y1="163" x2="116" y2="145" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="88" y1="199" x2="116" y2="151" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Arrows from center to result nodes -->
  <line x1="182" y1="135" x2="212" y2="91" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="182" y1="137" x2="212" y2="127" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="182" y1="145" x2="212" y2="163" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="182" y1="151" x2="212" y2="199" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Nodes after (right column) -->
  <rect x="214" y="78" width="70" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="249" y="94" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G0: [10]</text>
  <rect x="214" y="114" width="70" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="249" y="130" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G1: [10]</text>
  <rect x="214" y="150" width="70" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="249" y="166" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G2: [10]</text>
  <rect x="214" y="186" width="70" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="249" y="202" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G3: [10]</text>

  <text x="170" y="225" text-anchor="middle" font-size="7.5" fill="#555">All hold the sum (1+2+3+4=10)</text>

  <!-- ===== Panel 2: AllGather (top-right) ===== -->
  <text x="510" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AllGather</text>
  <text x="510" y="62" text-anchor="middle" font-size="8.5" fill="#555">Each node gathers all partial data</text>

  <!-- Nodes before -->
  <rect x="358" y="78" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="391" y="94" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G0: [A]</text>
  <rect x="358" y="114" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="391" y="130" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G1: [B]</text>
  <rect x="358" y="150" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="391" y="166" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G2: [C]</text>
  <rect x="358" y="186" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="391" y="202" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G3: [D]</text>

  <!-- AllGather label -->
  <rect x="448" y="128" width="64" height="24" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="480" y="144" text-anchor="middle" font-size="8" font-weight="700" fill="#2d7a2d">AllGather</text>

  <!-- Arrows -->
  <line x1="424" y1="91" x2="446" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="424" y1="127" x2="446" y2="137" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="424" y1="163" x2="446" y2="145" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="424" y1="199" x2="446" y2="151" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <line x1="512" y1="135" x2="546" y2="91" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="512" y1="137" x2="546" y2="127" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="512" y1="145" x2="546" y2="163" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="512" y1="151" x2="546" y2="199" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Nodes after -->
  <rect x="548" y="78" width="90" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="593" y="94" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0: [A,B,C,D]</text>
  <rect x="548" y="114" width="90" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="593" y="130" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1: [A,B,C,D]</text>
  <rect x="548" y="150" width="90" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="593" y="166" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2: [A,B,C,D]</text>
  <rect x="548" y="186" width="90" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="593" y="202" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3: [A,B,C,D]</text>

  <text x="510" y="225" text-anchor="middle" font-size="7.5" fill="#555">All hold full concatenated data</text>

  <!-- ===== Panel 3: ReduceScatter (bottom-left) ===== -->
  <text x="170" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ReduceScatter</text>
  <text x="170" y="272" text-anchor="middle" font-size="8.5" fill="#555">Reduce then scatter; each node gets one shard</text>

  <!-- Nodes before -->
  <rect x="28" y="288" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="61" y="304" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G0:[A,B,C,D]</text>
  <rect x="28" y="322" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="61" y="338" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G1:[A,B,C,D]</text>
  <rect x="28" y="356" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="61" y="372" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G2:[A,B,C,D]</text>
  <rect x="28" y="390" width="66" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="61" y="406" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G3:[A,B,C,D]</text>

  <!-- ReduceScatter label -->
  <rect x="110" y="335" width="74" height="24" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="147" y="351" text-anchor="middle" font-size="7.5" font-weight="700" fill="#2d7a2d">ReduceScatter</text>

  <!-- Arrows -->
  <line x1="94" y1="301" x2="108" y2="340" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="94" y1="335" x2="108" y2="343" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="94" y1="369" x2="108" y2="353" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="94" y1="403" x2="108" y2="358" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <line x1="184" y1="340" x2="214" y2="301" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="184" y1="343" x2="214" y2="335" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="184" y1="353" x2="214" y2="369" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="184" y1="358" x2="214" y2="403" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Nodes after -->
  <rect x="216" y="288" width="86" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="259" y="304" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G0: sum(A)</text>
  <rect x="216" y="322" width="86" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="259" y="338" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G1: sum(B)</text>
  <rect x="216" y="356" width="86" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="259" y="372" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G2: sum(C)</text>
  <rect x="216" y="390" width="86" height="26" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="259" y="406" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">G3: sum(D)</text>

  <text x="170" y="432" text-anchor="middle" font-size="7.5" fill="#555">Each node holds a unique reduced shard</text>

  <!-- ===== Panel 4: AlltoAll (bottom-right) ===== -->
  <text x="510" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AlltoAll</text>
  <text x="510" y="272" text-anchor="middle" font-size="8.5" fill="#555">Each node sends distinct data to every other node</text>

  <!-- Nodes before -->
  <rect x="358" y="288" width="80" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="398" y="304" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0:[A0,A1,A2,A3]</text>
  <rect x="358" y="322" width="80" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="398" y="338" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1:[B0,B1,B2,B3]</text>
  <rect x="358" y="356" width="80" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="398" y="372" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2:[C0,C1,C2,C3]</text>
  <rect x="358" y="390" width="80" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="398" y="406" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3:[D0,D1,D2,D3]</text>

  <!-- AlltoAll crossing arrows (permutation) -->
  <!-- G0 sends row 0 of its data to all GPUs -->
  <line x1="438" y1="301" x2="550" y2="301" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="438" y1="301" x2="550" y2="335" stroke="#3d9e5a" stroke-width="1.0" marker-end="url(#arrow-green)" opacity="0.7"/>
  <line x1="438" y1="335" x2="550" y2="301" stroke="#3d9e5a" stroke-width="1.0" marker-end="url(#arrow-green)" opacity="0.7"/>
  <line x1="438" y1="335" x2="550" y2="335" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="438" y1="369" x2="550" y2="369" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="438" y1="403" x2="550" y2="403" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- Cross links for permutation illustration -->
  <line x1="438" y1="301" x2="550" y2="369" stroke="#c87b2a" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="438" y1="335" x2="550" y2="403" stroke="#c87b2a" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="438" y1="369" x2="550" y2="301" stroke="#c87b2a" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="3,2"/>
  <line x1="438" y1="403" x2="550" y2="335" stroke="#c87b2a" stroke-width="0.8" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="3,2"/>

  <!-- Nodes after -->
  <rect x="552" y="288" width="86" height="26" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="595" y="304" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0:[A0,B0,C0,D0]</text>
  <rect x="552" y="322" width="86" height="26" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="595" y="338" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1:[A1,B1,C1,D1]</text>
  <rect x="552" y="356" width="86" height="26" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="595" y="372" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2:[A2,B2,C2,D2]</text>
  <rect x="552" y="390" width="86" height="26" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="595" y="406" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3:[A3,B3,C3,D3]</text>

  <text x="510" y="432" text-anchor="middle" font-size="7.5" fill="#555">Transpose: each node holds i-th chunk from all nodes</text>

  <!-- Footer -->
  <text x="352.0" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Blue: input (compute); Green: result (data flow); Orange: AlltoAll routing pattern</text>
</svg>