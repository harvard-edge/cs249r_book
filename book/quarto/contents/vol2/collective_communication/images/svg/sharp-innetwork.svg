<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Standard vs. In-Network Reduction (SHARP)</text>

  <!-- Vertical divider -->
  <line x1="340" y1="32" x2="340" y2="450" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Standard Tree AllReduce ===== -->
  <text x="170" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">Standard Tree AllReduce</text>
  <text x="170" y="62" text-anchor="middle" font-size="8.5" fill="#555">All gradients travel up to root GPU for reduction</text>

  <!-- GPU nodes at bottom (4 nodes) -->
  <rect x="18" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="45" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 0</text>
  <text x="45" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g0</text>

  <rect x="88" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 1</text>
  <text x="115" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g1</text>

  <rect x="158" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="185" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 2</text>
  <text x="185" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g2</text>

  <rect x="228" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 3</text>
  <text x="255" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g3</text>

  <!-- Layer 1 switches (two intermediate) -->
  <rect x="53" y="270" width="60" height="38" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="83" y="285" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Switch L1</text>
  <text x="83" y="298" text-anchor="middle" font-size="7.5" fill="#999">forward only</text>

  <rect x="193" y="270" width="60" height="38" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="223" y="285" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Switch L1</text>
  <text x="223" y="298" text-anchor="middle" font-size="7.5" fill="#999">forward only</text>

  <!-- Root GPU (top) -->
  <rect x="108" y="160" width="68" height="46" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.8"/>
  <text x="142" y="178" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Root GPU</text>
  <text x="142" y="191" text-anchor="middle" font-size="7.5" fill="#555">sum=g0+g1</text>
  <text x="142" y="202" text-anchor="middle" font-size="7.5" fill="#555">+g2+g3</text>

  <!-- Arrows: GPU→Switch layer (red = all data travels) -->
  <line x1="45" y1="370" x2="75" y2="308" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="115" y1="370" x2="93" y2="308" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="185" y1="370" x2="213" y2="308" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="255" y1="370" x2="233" y2="308" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Arrows: Switch→Root (all data, full size) -->
  <line x1="83" y1="270" x2="132" y2="206" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="223" y1="270" x2="155" y2="206" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Broadcast back (dashed red) -->
  <line x1="132" y1="206" x2="83" y2="270" stroke="#a31f34" stroke-width="1.0" marker-end="url(#arrow-red)" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="155" y1="206" x2="223" y2="270" stroke="#a31f34" stroke-width="1.0" marker-end="url(#arrow-red)" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Data volume labels -->
  <text x="52" y="343" font-size="7.5" fill="#a31f34">g0 (full)</text>
  <text x="100" y="333.0" font-size="7.5" fill="#a31f34">g1 (full)</text>
  <text x="190" y="343" font-size="7.5" fill="#a31f34">g2 (full)</text>
  <text x="240" y="333.0" font-size="7.5" fill="#a31f34">g3 (full)</text>

  <!-- Cost annotation -->
  <rect x="20" y="88" width="290" height="42" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" opacity="0.85"/>
  <text x="165" y="107" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">All gradient data traverses every switch level</text>
  <text x="165" y="122" text-anchor="middle" font-size="8.5" fill="#a31f34">Root GPU bandwidth = sum of all worker bandwidth</text>

  <!-- ===== RIGHT PANEL: SHARP In-Network Reduction ===== -->
  <text x="510" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#2d7a2d">SHARP In-Network Reduction</text>
  <text x="510" y="62" text-anchor="middle" font-size="8.5" fill="#555">Switch ASICs reduce inline; only aggregate travels up</text>

  <!-- GPU nodes at bottom -->
  <rect x="356" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="383" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 0</text>
  <text x="383" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g0</text>

  <rect x="426" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="453" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 1</text>
  <text x="453" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g1</text>

  <rect x="496" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="523" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 2</text>
  <text x="523" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g2</text>

  <rect x="566" y="370" width="54" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="593" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU 3</text>
  <text x="593" y="398" text-anchor="middle" font-size="7.5" fill="#555">grad=g3</text>

  <!-- SHARP-enabled switches with ASIC reduction -->
  <rect x="390" y="270" width="78" height="46" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="429" y="285" text-anchor="middle" font-size="8.5" font-weight="700" fill="#2d7a2d">SHARP Switch</text>
  <text x="429" y="298" text-anchor="middle" font-size="7.5" fill="#2d7a2d">Reduction in</text>
  <text x="429" y="309" text-anchor="middle" font-size="7.5" fill="#2d7a2d">switch ASIC</text>

  <rect x="484" y="270" width="78" height="46" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="523" y="285" text-anchor="middle" font-size="8.5" font-weight="700" fill="#2d7a2d">SHARP Switch</text>
  <text x="523" y="298" text-anchor="middle" font-size="7.5" fill="#2d7a2d">Reduction in</text>
  <text x="523" y="309" text-anchor="middle" font-size="7.5" fill="#2d7a2d">switch ASIC</text>

  <!-- Root switch / aggregator -->
  <rect x="436" y="160" width="78" height="46" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="475" y="178" text-anchor="middle" font-size="8.5" font-weight="700" fill="#2d7a2d">Root Switch</text>
  <text x="475" y="191" text-anchor="middle" font-size="7.5" fill="#2d7a2d">final aggregate</text>
  <text x="475" y="202" text-anchor="middle" font-size="7.5" fill="#2d7a2d">sum(g0..g3)</text>

  <!-- Arrows from GPUs to SHARP switches (green = data contributes locally) -->
  <line x1="383" y1="370" x2="408" y2="316" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="453" y1="370" x2="433" y2="316" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="523" y1="370" x2="503" y2="316" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="593" y1="370" x2="548" y2="316" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Arrows from SHARP switches to root: only aggregate (smaller, thinner) -->
  <line x1="429" y1="270" x2="460" y2="206" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="523" y1="270" x2="494" y2="206" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Broadcast back (dashed green, thin) -->
  <line x1="460" y1="206" x2="429" y2="270" stroke="#3d9e5a" stroke-width="1.0" marker-end="url(#arrow-green)" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="494" y1="206" x2="523" y2="270" stroke="#3d9e5a" stroke-width="1.0" marker-end="url(#arrow-green)" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- ASIC reduction annotation -->
  <text x="390" y="250" font-size="7.5" fill="#2d7a2d" font-style="italic">g0+g1</text>
  <text x="484" y="250" font-size="7.5" fill="#2d7a2d" font-style="italic">g2+g3</text>
  <text x="447" y="158" font-size="7.5" fill="#2d7a2d" font-style="italic">g0+g1+g2+g3</text>

  <!-- "Reduction in switch ASIC" callout box -->
  <rect x="354" y="140" width="160" height="22" rx="4" fill="#a31f34" opacity="0.9"/>
  <text x="434" y="155" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">Reduction in switch ASIC</text>

  <!-- Arrow from callout to SHARP switch -->
  <line x1="434" y1="162" x2="434" y2="269" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)" stroke-dasharray="4,2" opacity="0.8"/>

  <!-- Benefit annotation -->
  <rect x="354" y="88" width="298" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.85"/>
  <text x="503" y="107" text-anchor="middle" font-size="9" font-weight="700" fill="#2d7a2d">Only aggregates traverse inter-switch links</text>
  <text x="503" y="122" text-anchor="middle" font-size="8.5" fill="#2d7a2d">Reported 2–3× AllReduce speedup (1–64 MB gradients)</text>

  <!-- Footer -->
  <text x="352.0" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">SHARP requires InfiniBand Quantum switches; number of concurrent trees limited by switch resources.</text>
</svg>