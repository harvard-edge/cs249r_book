<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460">
  <rect width="720" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Communication-Computation Overlap</text>
  <text x="360" y="38" text-anchor="middle" font-size="9" fill="#555">Backward pass layers and AllReduce are pipelined to hide latency</text>

  <!-- ===== Timeline axis ===== -->
  <!-- X axis: time -->
  <line x1="90" y1="400" x2="690" y2="400" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="698" y="404" font-size="9" fill="#555">time</text>

  <!-- Y axis labels -->
  <text x="82" y="134" text-anchor="end" font-size="10" font-weight="700" fill="#333">Backward</text>
  <text x="82" y="147" text-anchor="end" font-size="10" font-weight="700" fill="#333">Pass</text>
  <text x="82" y="284" text-anchor="end" font-size="10" font-weight="700" fill="#333">AllReduce</text>
  <text x="82" y="297" text-anchor="end" font-size="10" font-weight="700" fill="#333">Comms</text>

  <!-- ===== Overlap Window Background ===== -->
  <!-- Moved to back and stroke removed so it doesn't obscure the vertical dashed lines -->
  <rect x="215" y="165" width="355" height="50" fill="#e8f5e9" opacity="0.4"/>

  <!-- Row separator lines -->
  <line x1="90" y1="80" x2="90" y2="400" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="200" x2="690" y2="200" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Dashed vertical lines showing start-of-overlap -->
  <line x1="215" y1="95" x2="215" y2="280" stroke="#3d9e5a" stroke-dasharray="4,3" stroke-width="1.0"/>
  <line x1="570" y1="95" x2="570" y2="280" stroke="#a31f34" stroke-dasharray="4,3" stroke-width="1.0"/>

  <!-- Overlap Window Text -->
  <text x="392.5" y="185" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d7a2d">Overlap Window</text>
  <text x="392.5" y="196" text-anchor="middle" font-size="8.5" fill="#2d7a2d">AllReduce hidden behind backward computation</text>

  <!-- ===== Row 1: Backward Pass ===== -->
  <!-- Layer L4 (first to finish backward) -->
  <rect x="95" y="100" width="115" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="152.5" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Backward L4</text>
  <text x="152.5" y="138" text-anchor="middle" font-size="8.5" fill="#555">Compute grads</text>

  <!-- Layer L3 -->
  <rect x="215" y="100" width="115" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="272.5" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Backward L3</text>
  <text x="272.5" y="138" text-anchor="middle" font-size="8.5" fill="#555">Compute grads</text>

  <!-- Layer L2 -->
  <rect x="335" y="100" width="115" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="392.5" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Backward L2</text>
  <text x="392.5" y="138" text-anchor="middle" font-size="8.5" fill="#555">Compute grads</text>

  <!-- Layer L1 -->
  <rect x="455" y="100" width="115" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="512.5" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Backward L1</text>
  <text x="512.5" y="138" text-anchor="middle" font-size="8.5" fill="#555">Compute grads</text>

  <!-- Exposed communication: wait after L1 (no more overlap) -->
  <rect x="590" y="100" width="75" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="627.5" y="122" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Exposed</text>
  <text x="627.5" y="138" text-anchor="middle" font-size="8.5" fill="#a31f34">Comm Wait</text>

  <!-- ===== Row 2: AllReduce ===== -->
  <!-- AllReduce for L4 -->
  <rect x="215" y="220" width="115" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="272.5" y="242" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">AllReduce L4</text>
  <text x="272.5" y="258" text-anchor="middle" font-size="8.5" fill="#555">grads synced</text>

  <!-- AllReduce for L3 -->
  <rect x="335" y="220" width="115" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="392.5" y="242" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">AllReduce L3</text>
  <text x="392.5" y="258" text-anchor="middle" font-size="8.5" fill="#555">grads synced</text>

  <!-- AllReduce for L2 -->
  <rect x="455" y="220" width="115" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="512.5" y="242" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">AllReduce L2</text>
  <text x="512.5" y="258" text-anchor="middle" font-size="8.5" fill="#555">grads synced</text>

  <!-- AllReduce for L1 -->
  <rect x="590" y="220" width="75" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="627.5" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">AllReduce L1</text>
  <text x="627.5" y="258" text-anchor="middle" font-size="8.5" fill="#a31f34">exposed</text>

  <!-- Exposed comm annotation -->
  <text x="627.5" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Exposed</text>
  <text x="627.5" y="85" text-anchor="middle" font-size="8" fill="#a31f34">Communication</text>
  <line x1="627.5" y1="90" x2="627.5" y2="98" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Trigger arrow: L4 backward finishes → L4 AllReduce starts -->
  <path d="M 200 150 L 200 185 L 225 185 L 225 220" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="196" y="175" text-anchor="end" font-size="8" fill="#3d9e5a">trigger</text>

  <!-- Time labels on x axis -->
  <text x="95" y="415" text-anchor="middle" font-size="8" fill="#999">t=0</text>
  <text x="210" y="415" text-anchor="middle" font-size="8" fill="#999">L4 done</text>
  <text x="330" y="415" text-anchor="middle" font-size="8" fill="#999">L3 done</text>
  <text x="450" y="415" text-anchor="middle" font-size="8" fill="#999">L2 done</text>
  <text x="570" y="415" text-anchor="middle" font-size="8" fill="#999">L1 done</text>
  <text x="665" y="415" text-anchor="middle" font-size="8" fill="#999">step end</text>

  <!-- Legend -->
  <rect x="95" y="325" width="14" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="114" y="336" font-size="9" fill="#555">Backward computation (compute-bound)</text>
  <rect x="95" y="345" width="14" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="114" y="356" font-size="9" fill="#555">AllReduce communication (overlapped — hidden)</text>
  <rect x="95" y="365" width="14" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="114" y="376" font-size="9" fill="#555">Exposed communication (critical path — unavoidable)</text>

  <!-- Footer -->
  <text x="360" y="448" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each layer's AllReduce launches as soon as its backward pass completes, overlapping with subsequent layers.</text>
</svg>