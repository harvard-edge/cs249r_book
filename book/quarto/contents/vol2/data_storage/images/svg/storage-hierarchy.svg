<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="700" height="480" fill="#ffffff"/>

  <!-- Left axis labels -->
  <text x="20" y="30" text-anchor="middle" font-size="9" fill="#555" font-weight="600" font-style="italic">Fastest</text>
  <text x="20" y="400" text-anchor="middle" font-size="9" fill="#555" font-weight="600" font-style="italic">Slowest</text>
  <line x1="20" y1="40" x2="20" y2="380" stroke="#bbb" stroke-width="1.5"/>

  <!-- Right column header -->
  <text x="430" y="20" font-size="8" fill="#555" text-anchor="middle">BW (relative)</text>
  <text x="520" y="20" font-size="9" fill="#111" font-weight="700" text-anchor="middle">Bandwidth</text>
  <text x="590" y="20" font-size="9" fill="#111" font-weight="700" text-anchor="middle">Capacity</text>
  <text x="660" y="20" font-size="9" fill="#111" font-weight="700" text-anchor="middle">$/GB</text>

  <!-- Temperature labels (Brackets) -->
  <rect x="30" y="40" width="40" height="160" fill="none" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,4" rx="4"/>
  <text x="54" y="120" text-anchor="middle" font-size="9" fill="#111" font-weight="600" transform="rotate(-90, 54, 120)">Hot Tier</text>

  <rect x="30" y="220" width="40" height="100" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,4" rx="4"/>
  <text x="54" y="270" text-anchor="middle" font-size="9" fill="#111" font-weight="600" transform="rotate(-90, 54, 270)">Warm</text>

  <rect x="30" y="340" width="40" height="40" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,4" rx="4"/>
  <text x="54" y="360" text-anchor="middle" font-size="9" fill="#111" font-weight="600" transform="rotate(-90, 54, 360)">Cold</text>

  <!-- Tier 1: GPU HBM -->
  <g transform="translate(80, 40)">
    <rect x="0" y="0" width="400" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
    <text x="10" y="16" font-size="10" font-weight="700" fill="#111">GPU HBM</text>
    <text x="10" y="30" font-size="8.5" fill="#555">On-chip accelerator memory (HBM3)</text>
    <!-- BW bar -->
    <rect x="320" y="14" width="70" height="12" fill="#4a90c4"/>
  </g>
  <text x="520" y="60" text-anchor="middle" font-size="9" fill="#111" font-weight="600">3.35 TB/s</text>
  <text x="590" y="60" text-anchor="middle" font-size="9" fill="#333">80 GB</text>
  <text x="660" y="60" text-anchor="middle" font-size="9" fill="#555">~$15</text>

  <!-- Tier 2: CPU DRAM -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="400" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
    <text x="10" y="16" font-size="10" font-weight="700" fill="#111">CPU DRAM</text>
    <text x="10" y="30" font-size="8.5" fill="#555">Host DDR5 system memory</text>
    <!-- BW bar -->
    <rect x="320" y="14" width="28" height="12" fill="#3d9e5a"/>
  </g>
  <text x="520" y="120" text-anchor="middle" font-size="9" fill="#111" font-weight="600">300 GB/s</text>
  <text x="590" y="120" text-anchor="middle" font-size="9" fill="#333">512 GB--2 TB</text>
  <text x="660" y="120" text-anchor="middle" font-size="9" fill="#555">~$4</text>

  <!-- Tier 3: NVMe SSD -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="400" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
    <text x="10" y="16" font-size="10" font-weight="700" fill="#111">NVMe SSD</text>
    <text x="10" y="30" font-size="8.5" fill="#555">Local PCIe Gen5 flash storage</text>
    <!-- BW bar -->
    <rect x="320" y="14" width="6" height="12" fill="#3d9e5a"/>
  </g>
  <text x="520" y="180" text-anchor="middle" font-size="9" fill="#111" font-weight="600">7 GB/s</text>
  <text x="590" y="180" text-anchor="middle" font-size="9" fill="#333">8 TB</text>
  <text x="660" y="180" text-anchor="middle" font-size="9" fill="#555">~$0.10</text>

  <!-- Tier 4: SATA SSD -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="400" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
    <text x="10" y="16" font-size="10" font-weight="700" fill="#111">SATA SSD</text>
    <text x="10" y="30" font-size="8.5" fill="#555">Legacy SATA-attached flash</text>
    <!-- BW bar -->
    <rect x="320" y="14" width="3" height="12" fill="#4a90c4"/>
  </g>
  <text x="520" y="240" text-anchor="middle" font-size="9" fill="#111" font-weight="600">0.5 GB/s</text>
  <text x="590" y="240" text-anchor="middle" font-size="9" fill="#333">32 TB</text>
  <text x="660" y="240" text-anchor="middle" font-size="9" fill="#555">~$0.06</text>

  <!-- Tier 5: Object Storage -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="400" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
    <text x="10" y="16" font-size="10" font-weight="700" fill="#111">Object Storage / Lustre</text>
    <text x="10" y="30" font-size="8.5" fill="#555">Parallel file system or S3-compatible store</text>
    <!-- BW bar -->
    <rect x="320" y="14" width="14" height="12" fill="#c44"/>
  </g>
  <text x="520" y="300" text-anchor="middle" font-size="9" fill="#111" font-weight="600">50 GB/s agg.</text>
  <text x="590" y="300" text-anchor="middle" font-size="9" fill="#333">PB</text>
  <text x="660" y="300" text-anchor="middle" font-size="9" fill="#555">$0.023</text>

  <!-- Tier 6: Tape Archive -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="400" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>
    <text x="10" y="16" font-size="10" font-weight="700" fill="#111">Tape Archive</text>
    <text x="10" y="30" font-size="8.5" fill="#555">Glacier Deep Archive, offline media</text>
    <!-- BW bar -->
    <rect x="320" y="14" width="2" height="12" fill="#bbb"/>
  </g>
  <text x="520" y="360" text-anchor="middle" font-size="9" fill="#111" font-weight="600">0.3 GB/s</text>
  <text x="590" y="360" text-anchor="middle" font-size="9" fill="#333">EB</text>
  <text x="660" y="360" text-anchor="middle" font-size="9" fill="#555">$0.001</text>

  <!-- Bottom legend -->
  <rect x="80" y="420" width="580" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>
  <text x="370" y="436" text-anchor="middle" font-size="9" fill="#111" font-weight="600">Bandwidth bars show relative throughput (log scale). Cost is per GB/month.</text>
  <text x="370" y="450" text-anchor="middle" font-size="9" fill="#555">Hot tier = active training data; Warm = validation/checkpoints; Cold = long-term archive</text>
</svg>