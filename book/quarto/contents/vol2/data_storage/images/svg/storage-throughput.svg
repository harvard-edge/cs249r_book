<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Panel Background -->
  <rect x="20" y="20" width="640" height="420" rx="4" fill="#f7f7f7"/>

  <!-- Grid -->
  <g stroke="#e8e8e8" stroke-width="0.8">
    <line x1="80" y1="50" x2="590" y2="50"/>
    <line x1="80" y1="100" x2="590" y2="100"/>
    <line x1="80" y1="150" x2="590" y2="150"/>
    <line x1="80" y1="200" x2="590" y2="200"/>
    <line x1="80" y1="250" x2="590" y2="250"/>
    <line x1="80" y1="300" x2="590" y2="300"/>
    <line x1="80" y1="350" x2="590" y2="350"/>
  </g>

  <!-- Storage bottleneck zone (shaded) -->
  <path d="M340,240 L440,170 L540,100 L540,200 L440,200 L340,200 Z" fill="#a31f34" opacity="0.08"/>
  
  <!-- Compute bound zone (shaded) -->
  <path d="M140,330 L240,300 L340,240 L340,200 L240,200 L140,200 Z" fill="#3d9e5a" opacity="0.05"/>

  <!-- Axes -->
  <line x1="80" y1="350" x2="590" y2="350" stroke="#333" stroke-width="1.2"/>
  <line x1="80" y1="50" x2="80" y2="350" stroke="#333" stroke-width="1.2"/>

  <!-- Y-axis labels -->
  <text x="70" y="350" dy="3" text-anchor="end" font-size="9" fill="#555">0</text>
  <text x="70" y="300" dy="3" text-anchor="end" font-size="9" fill="#555">25</text>
  <text x="70" y="250" dy="3" text-anchor="end" font-size="9" fill="#555">50</text>
  <text x="70" y="200" dy="3" text-anchor="end" font-size="9" fill="#555">100</text>
  <text x="70" y="150" dy="3" text-anchor="end" font-size="9" fill="#555">200</text>
  <text x="70" y="100" dy="3" text-anchor="end" font-size="9" fill="#555">500</text>
  <text x="70" y="50" dy="3" text-anchor="end" font-size="9" fill="#555">1000</text>

  <!-- Y-axis title -->
  <text x="20" y="200" text-anchor="middle" font-size="11" fill="#333" font-weight="600" transform="rotate(-90, 20, 200)">Data Throughput (GB/s)</text>

  <!-- X-axis labels -->
  <text x="140" y="380" text-anchor="middle" font-size="9" fill="#555">100M</text>
  <text x="240" y="380" text-anchor="middle" font-size="9" fill="#555">1B</text>
  <text x="340" y="380" text-anchor="middle" font-size="9" fill="#555">10B</text>
  <text x="440" y="380" text-anchor="middle" font-size="9" fill="#555">70B</text>
  <text x="540" y="380" text-anchor="middle" font-size="9" fill="#555">175B</text>

  <!-- X-axis title -->
  <text x="340" y="410" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Model Size (parameters)</text>

  <!-- Required I/O line (rising curve) -->
  <polyline points="140,330 240,300 340,240 440,170 540,100" fill="none" stroke="#a31f34" stroke-width="1.5"/>
  <circle cx="140" cy="330" r="3" fill="#a31f34"/>
  <circle cx="240" cy="300" r="3" fill="#a31f34"/>
  <circle cx="340" cy="240" r="3" fill="#a31f34"/>
  <circle cx="440" cy="170" r="3" fill="#a31f34"/>
  <circle cx="540" cy="100" r="3" fill="#a31f34"/>
  <text x="540" y="70" text-anchor="middle" font-size="8.5" fill="#a31f34" font-weight="600">Required I/O for</text>
  <text x="540" y="80" text-anchor="middle" font-size="8.5" fill="#a31f34" font-weight="600">full GPU utilization</text>

  <!-- Lustre line (flat ~100 GB/s) -->
  <line x1="100" y1="200" x2="590" y2="200" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="600" y="190" font-size="8.5" fill="#4a90c4" font-weight="600">Lustre</text>
  <text x="600" y="210" font-size="8" fill="#4a90c4">(100 GB/s)</text>

  <!-- Object Store line (flat ~50 GB/s) -->
  <line x1="100" y1="250" x2="590" y2="250" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="600" y="240" font-size="8.5" fill="#3d9e5a" font-weight="600">Object</text>
  <text x="600" y="260" font-size="8" fill="#3d9e5a">(50 GB/s)</text>

  <!-- NVMe line (flat ~7 GB/s) -->
  <line x1="100" y1="340" x2="590" y2="340" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="600" y="330" font-size="8.5" fill="#c87b2a" font-weight="600">NVMe</text>
  <text x="600" y="350" font-size="8" fill="#c87b2a">(7 GB/s)</text>

  <!-- Annotation: bottleneck zone -->
  <rect x="340" y="110" width="120" height="40" rx="4" fill="#fff" stroke="#a31f34" stroke-width="0.8"/>
  <text x="400" y="130" text-anchor="middle" font-size="8.5" fill="#a31f34" font-weight="600">Storage Bottleneck</text>
  <text x="400" y="140" text-anchor="middle" font-size="8" fill="#a31f34">Zone (I/O bound)</text>

  <!-- Annotation: compute bound zone -->
  <rect x="110" y="270" width="120" height="30" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="170" y="290" text-anchor="middle" font-size="8.5" fill="#3d9e5a" font-weight="600">Compute bound</text>
</svg>