<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Checkpoint Staging Pipeline</text>
  <text x="340" y="41" text-anchor="middle" font-size="9" fill="#555">Local NVMe write (fast, sync) overlaps with async PFS upload â€” training resumes immediately after local write</text>

  <!-- ===== Timeline axis ===== -->
  <line x1="60" y1="380" x2="640" y2="380" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="398" text-anchor="middle" font-size="9" fill="#777">Time â†’</text>

  <!-- Tick marks: t=0, t=2s, t=10min, t=12min -->
  <!-- Map t=0â†’x=60, t=2sâ†’x=110, t=600sâ†’x=590, t=612sâ†’x=640 -->
  <!-- Scale: 0-2s over 50px, 2s-600s over 480px, but we compress -->
  <!-- Use artistic spacing: t=0â†’60, checkpoint event markâ†’120, training resumesâ†’170, PFS doneâ†’480 -->

  <line x1="60" y1="376" x2="60" y2="384" stroke="#999" stroke-width="1"/>
  <text x="60" y="394" text-anchor="middle" font-size="8" fill="#777">t = 0</text>
  <text x="60" y="404" text-anchor="middle" font-size="7.5" fill="#999">Ckpt trigger</text>

  <line x1="170" y1="376" x2="170" y2="384" stroke="#999" stroke-width="1"/>
  <text x="170" y="394" text-anchor="middle" font-size="8" fill="#777">t â‰ˆ 0.3 s</text>
  <text x="170" y="404" text-anchor="middle" font-size="7.5" fill="#999">Local write done</text>

  <line x1="480" y1="376" x2="480" y2="384" stroke="#999" stroke-width="1"/>
  <text x="480" y="394" text-anchor="middle" font-size="8" fill="#777">t â‰ˆ minutes</text>
  <text x="480" y="404" text-anchor="middle" font-size="7.5" fill="#999">PFS copy done</text>

  <line x1="620" y1="376" x2="620" y2="384" stroke="#999" stroke-width="1"/>
  <text x="620" y="394" text-anchor="middle" font-size="8" fill="#777">t = 10 min</text>
  <text x="620" y="404" text-anchor="middle" font-size="7.5" fill="#999">Next checkpoint</text>

  <!-- ===== ROW 1: GPU HBM (training state) ===== -->
  <text x="48" y="95" text-anchor="end" font-size="9" font-weight="700" fill="#333">GPU HBM</text>
  <text x="48" y="108" text-anchor="end" font-size="7.5" fill="#555">Training</text>

  <!-- HBM: training block before t=0 -->
  <rect x="60" y="80" width="60" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="90" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Training</text>

  <!-- HBM: snapshot at t=0 (brief pause) -->
  <rect x="120" y="80" width="50" height="38" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="145" y="97" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">snapshot</text>
  <text x="145" y="109" text-anchor="middle" font-size="7.5" fill="#555">to DRAM</text>

  <!-- HBM: resumes training -->
  <rect x="170" y="80" width="450" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="395" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Training resumes immediately â†—</text>

  <!-- ===== ROW 2: Local NVMe ===== -->
  <text x="48" y="157" text-anchor="end" font-size="9" font-weight="700" fill="#333">Local NVMe</text>
  <text x="48" y="170" text-anchor="end" font-size="7.5" fill="#555">Fast write</text>

  <!-- NVMe: empty before checkpoint -->
  <rect x="60" y="142" width="60" height="38" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="90" y="166" text-anchor="middle" font-size="8" fill="#bbb">idle</text>

  <!-- NVMe write (t=0 to t=0.3s) -->
  <rect x="120" y="142" width="50" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="145" y="157" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">WRITE</text>
  <text x="145" y="168" text-anchor="middle" font-size="7.5" fill="#555">14 GB/s</text>
  <text x="145" y="179" text-anchor="middle" font-size="7.5" fill="#4a90c4">~0.3 s</text>

  <!-- NVMe: holds checkpoint data -->
  <rect x="170" y="142" width="310" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="325" y="162" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">checkpoint shard held locally (durable)</text>

  <!-- NVMe: data cleared after PFS confirms -->
  <rect x="480" y="142" width="140" height="38" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="550" y="162" text-anchor="middle" font-size="8" fill="#bbb">can be cleared</text>

  <!-- ===== ROW 3: Parallel FS ===== -->
  <text x="48" y="222" text-anchor="end" font-size="9" font-weight="700" fill="#333">Parallel FS</text>
  <text x="48" y="235" text-anchor="end" font-size="7.5" fill="#555">Async copy</text>

  <!-- PFS: idle before local write done -->
  <rect x="60" y="207" width="110" height="38" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="115" y="231" text-anchor="middle" font-size="8" fill="#bbb">idle</text>

  <!-- PFS: async background copy -->
  <rect x="170" y="207" width="310" height="38" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="325" y="222" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">async background upload (minutes)</text>
  <text x="325" y="235" text-anchor="middle" font-size="8" fill="#555">3.9 GB/s per node Â· 4 GB shard â‰ˆ ~1 s upload</text>

  <!-- PFS: done -->
  <rect x="480" y="207" width="140" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="550" y="222" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">durable</text>
  <text x="550" y="235" text-anchor="middle" font-size="8" fill="#555">checkpoint safe</text>

  <!-- ===== Vertical marker: training pause zone ===== -->
  <rect x="120" y="68" width="50" height="188" rx="0" fill="#f9d6d5" opacity="0.25"/>
  <line x1="120" y1="68" x2="120" y2="256" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="170" y1="68" x2="170" y2="256" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="145" y="68" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">pause</text>

  <!-- ===== Key annotation box ===== -->
  <rect x="60" y="270" width="560" height="58" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="340" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Key insight: T_save = T_local â‰ˆ 0.3 s (not T_PFS â‰ˆ minutes)</text>
  <text x="340" y="303" text-anchor="middle" font-size="9" fill="#555">Training resumes after local NVMe write. Durability (PFS copy) happens asynchronously.</text>
  <text x="340" y="317" text-anchor="middle" font-size="9" fill="#555">At 10-min interval: 0.3 s pause / 600 s step = 0.05% overhead vs. 10+ s for direct PFS write.</text>

  <!-- ===== Arrows showing data flow ===== -->
  <!-- HBM â†’ NVMe arrow (fast, vertical) -->
  <line x1="145" y1="118" x2="145" y2="142" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- NVMe â†’ PFS arrow (async, diagonal) -->
  <line x1="325" y1="180" x2="325" y2="207" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Per-node values for 175B model with ZeRO-3 across 256 nodes (~4 GB shard per node). Timeline is illustrative, not to scale.</text>
</svg>
