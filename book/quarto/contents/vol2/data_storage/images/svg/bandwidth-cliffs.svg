<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <rect width="680" height="520" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Bandwidth Cliffs Between Storage Tiers</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Each tier drop is 10–100× — the "cliff" the pipeline must bridge with prefetching</text>

  <!-- ===== Y-axis label ===== -->
  <text x="20" y="230" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90, 20, 230)">Bandwidth (log scale)</text>

  <!-- ===== Tier bands: stacked waterfall from top (HBM) to bottom (Object) ===== -->
  <!-- HBM: y=60, height=60 -->
  <rect x="60" y="60" width="560" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="80" y="82" font-size="11" font-weight="700" fill="#333">GPU HBM</text>
  <text x="80" y="98" font-size="9" fill="#555">3,350 GB/s · On-chip · 80 GB capacity</text>
  <text x="600" y="94" text-anchor="end" font-size="9" font-weight="700" fill="#4a90c4">3,350 GB/s</text>

  <!-- Cliff annotation 1: HBM → DRAM (17×) -->
  <rect x="60" y="120" width="560" height="30" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="135" x2="620" y2="135" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="230" y="125" width="220" height="20" fill="#a31f34"/>
  <text x="340" y="139" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 17× drop → refill window ~400 ms</text>

  <!-- Host DRAM: y=150, height=50 -->
  <rect x="60" y="150" width="500" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="80" y="168" font-size="11" font-weight="700" fill="#333">Host DRAM</text>
  <text x="80" y="184" font-size="9" fill="#555">200 GB/s · PCIe-attached · 512 GB–2 TB</text>
  <text x="540" y="179" text-anchor="end" font-size="9" font-weight="700" fill="#3d9e5a">200 GB/s</text>

  <!-- Cliff annotation 2: DRAM → NVMe (15–30×) -->
  <rect x="60" y="200" width="500" height="30" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="215" x2="560" y2="215" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="200" y="205" width="220" height="20" fill="#a31f34"/>
  <text x="310" y="219" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 15–30× drop → refill window ~3 s</text>

  <!-- Local NVMe: y=230, height=40 -->
  <rect x="60" y="230" width="400" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="80" y="244" font-size="11" font-weight="700" fill="#333">Local NVMe</text>
  <text x="80" y="258" font-size="9" fill="#555">7–25 GB/s · PCIe Gen5 · 4–30 TB</text>
  <text x="440" y="254" text-anchor="end" font-size="9" font-weight="700" fill="#c87b2a">7–25 GB/s</text>

  <!-- Cliff annotation 3: NVMe → PFS (3–10×) -->
  <rect x="60" y="270" width="400" height="30" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="285" x2="460" y2="285" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="150" y="275" width="220" height="20" fill="#a31f34"/>
  <text x="260" y="289" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 3–10× drop → refill window ~10 s</text>

  <!-- Parallel File System: y=300, height=40 -->
  <rect x="60" y="300" width="280" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="80" y="314" font-size="11" font-weight="700" fill="#333">Parallel File System</text>
  <text x="80" y="328" font-size="9" fill="#555">1+ GB/s per node · 100+ PB</text>
  <text x="320" y="324" text-anchor="end" font-size="9" font-weight="700" fill="#c87b2a">1–4 GB/s/node</text>

  <!-- Cliff annotation 4: PFS → Object (10–100×) -->
  <rect x="60" y="340" width="280" height="30" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="355" x2="340" y2="355" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="90" y="345" width="220" height="20" fill="#a31f34"/>
  <text x="200" y="359" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 10–100× drop → requires staging</text>

  <!-- Object Storage: y=370, height=30 -->
  <rect x="60" y="370" width="160" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="80" y="383" font-size="11" font-weight="700" fill="#333">Object Storage</text>
  <text x="80" y="395" font-size="9" fill="#555">~0.1 GB/s · S3/GCS</text>

  <!-- ===== Right-side annotation box ===== -->
  <rect x="480" y="270" width="160" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="560" y="286" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Refill Window</text>
  <text x="560" y="300" text-anchor="middle" font-size="8.5" fill="#555">HBM drains in ~50 ms</text>
  <text x="560" y="314" text-anchor="middle" font-size="8.5" fill="#555">DRAM refills in ~400 ms</text>
  <text x="560" y="328" text-anchor="middle" font-size="8.5" fill="#555">NVMe refills in ~3 s</text>
  <text x="560" y="342" text-anchor="middle" font-size="8.5" fill="#555">PFS refills in ~10 s</text>
  <text x="560" y="358" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">Each tier buffers tier above</text>

  <!-- ===== Bottom label: "requires deep prefetch" ===== -->
  <rect x="60" y="420" width="560" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="340" y="435" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Design principle:</text>
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#555">each lower tier must prefetch deep enough to absorb the upper tier's draining rate</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="500" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Bandwidth figures are per-node for NVMe and PFS; aggregate for PFS cluster. Refill windows assume H100 HBM consumption rate.</text>
</svg>