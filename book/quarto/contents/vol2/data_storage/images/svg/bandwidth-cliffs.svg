<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Bandwidth Cliffs Between Storage Tiers</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Each tier drop is 10–100× — the "cliff" the pipeline must bridge with prefetching</text>

  <!-- ===== Y-axis label ===== -->
  <text x="20" y="240" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90, 20, 240)">Bandwidth (log scale)</text>

  <!-- ===== Tier bands: stacked waterfall from top (HBM) to bottom (Object) ===== -->
  <!-- HBM: y=60, height=60 (widest) -->
  <rect x="60" y="60" width="560" height="58" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="76" y="82" font-size="11" font-weight="700" fill="#333">GPU HBM</text>
  <text x="76" y="96" font-size="9" fill="#555">3,350 GB/s · On-chip · 80 GB capacity</text>
  <text x="606" y="94" text-anchor="end" font-size="9" font-weight="700" fill="#4a90c4">3,350 GB/s</text>

  <!-- Cliff annotation 1: HBM → DRAM (17×) -->
  <rect x="60" y="120" width="560" height="12" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="118" x2="620" y2="118" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="256" y="113" width="168" height="14" fill="#a31f34"/>
  <text x="340" y="123" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 17× drop → refill window ~400 ms</text>

  <!-- Host DRAM: y=134, height=48 -->
  <rect x="60" y="134" width="490" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="76" y="153" font-size="11" font-weight="700" fill="#333">Host DRAM</text>
  <text x="76" y="167" font-size="9" fill="#555">200 GB/s · PCIe-attached · 512 GB–2 TB</text>
  <text x="536" y="162" text-anchor="end" font-size="9" font-weight="700" fill="#3d9e5a">200 GB/s</text>

  <!-- Cliff annotation 2: DRAM → NVMe (15–30×) -->
  <rect x="60" y="182" width="490" height="12" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="180" x2="550" y2="180" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="204" y="175" width="192" height="14" fill="#a31f34"/>
  <text x="305" y="185" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 15–30× drop → refill window ~3 s</text>

  <!-- Local NVMe: y=196, height=40 -->
  <rect x="60" y="196" width="390" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="76" y="213" font-size="11" font-weight="700" fill="#333">Local NVMe</text>
  <text x="76" y="227" font-size="9" fill="#555">7–25 GB/s · PCIe Gen5 · 4–30 TB</text>
  <text x="436" y="220" text-anchor="end" font-size="9" font-weight="700" fill="#c87b2a">7–25 GB/s</text>

  <!-- Cliff annotation 3: NVMe → PFS (3–10×) -->
  <rect x="60" y="238" width="390" height="12" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="236" x2="450" y2="236" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="153" y="231" width="204" height="14" fill="#a31f34"/>
  <text x="255" y="241" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 3–10× drop → refill window ~10 s</text>

  <!-- Parallel File System: y=252, height=38 -->
  <rect x="60" y="252" width="280" height="38" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="76" y="268" font-size="11" font-weight="700" fill="#333">Parallel File System</text>
  <text x="76" y="281" font-size="9" fill="#555">1+ GB/s per node · 100+ PB</text>
  <text x="326" y="274" text-anchor="end" font-size="9" font-weight="700" fill="#c87b2a">1–4 GB/s/node</text>

  <!-- Cliff annotation 4: PFS → Object (10–100×) -->
  <rect x="60" y="292" width="280" height="12" fill="#a31f34" opacity="0.15"/>
  <line x1="60" y1="290" x2="340" y2="290" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="80" y="285" width="220" height="14" fill="#a31f34"/>
  <text x="200" y="295" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">cliff: 10–100× drop → requires staging</text>

  <!-- Object Storage: y=306, height=32 (thinnest) -->
  <rect x="60" y="306" width="160" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="76" y="321" font-size="11" font-weight="700" fill="#333">Object Storage</text>
  <text x="76" y="332" font-size="9" fill="#555">~0.1 GB/s · S3/GCS</text>

  <!-- ===== Right-side annotation box ===== -->
  <rect x="456" y="250" width="164" height="92" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="538" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Refill Window</text>
  <text x="538" y="278" text-anchor="middle" font-size="8.5" fill="#555">HBM drains in ~50 ms</text>
  <text x="538" y="290" text-anchor="middle" font-size="8.5" fill="#555">DRAM refills in ~400 ms</text>
  <text x="538" y="302" text-anchor="middle" font-size="8.5" fill="#555">NVMe refills in ~3 s</text>
  <text x="538" y="314" text-anchor="middle" font-size="8.5" fill="#555">PFS refills in ~10 s</text>
  <text x="538" y="330" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">Each tier buffers tier above</text>

  <!-- ===== Bottom label: "requires deep prefetch" ===== -->
  <rect x="60" y="358" width="560" height="28" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="340" y="369" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Design principle:</text>
  <text x="340" y="381" text-anchor="middle" font-size="9" fill="#555">each lower tier must prefetch deep enough to absorb the upper tier's draining rate</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Bandwidth figures are per-node for NVMe and PFS; aggregate for PFS cluster. Refill windows assume H100 HBM consumption rate.</text>
</svg>