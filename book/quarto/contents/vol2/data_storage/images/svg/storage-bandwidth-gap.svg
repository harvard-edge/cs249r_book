<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Storage Bandwidth Gap</text>
  <text x="340" y="46" text-anchor="middle" font-size="10" fill="#555">Bandwidth by storage tier (log scale) — each tick is 10× difference</text>

  <!-- ===== Log-scale axis ===== -->
  <!-- Axis line -->
  <line x1="220" y1="70" x2="620" y2="70" stroke="#bbb" stroke-width="1"/>
  
  <line x1="220" y1="66" x2="220" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="220" y="86" text-anchor="middle" font-size="8" fill="#555">0.001</text>

  <line x1="277" y1="66" x2="277" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="277" y="86" text-anchor="middle" font-size="8" fill="#555">0.01</text>

  <line x1="334" y1="66" x2="334" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="334" y="86" text-anchor="middle" font-size="8" fill="#555">0.1</text>

  <line x1="391" y1="66" x2="391" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="391" y="86" text-anchor="middle" font-size="8" fill="#555">1</text>

  <line x1="449" y1="66" x2="449" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="449" y="86" text-anchor="middle" font-size="8" fill="#555">10</text>

  <line x1="506" y1="66" x2="506" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="506" y="86" text-anchor="middle" font-size="8" fill="#555">100</text>

  <line x1="563" y1="66" x2="563" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="563" y="86" text-anchor="middle" font-size="8" fill="#555">1,000</text>

  <line x1="620" y1="66" x2="620" y2="74" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="86" text-anchor="middle" font-size="8" fill="#555">10,000</text>

  <text x="420" y="96" text-anchor="middle" font-size="9" fill="#555" font-style="italic">Bandwidth (GB/s)</text>

  <!-- ===== Horizontal bar chart rows ===== -->
  <!-- ── Row 1: GPU HBM ── -->
  <rect x="80" y="110" width="120" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="123" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU HBM</text>
  <text x="140" y="135" text-anchor="middle" font-size="8" fill="#555">On-chip DRAM</text>

  <rect x="220" y="110" width="373" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="603" y="130" text-anchor="start" font-size="10" font-weight="700" fill="#333">3,350 GB/s</text>

  <!-- ── Row 2: NVLink ── -->
  <rect x="80" y="150" width="120" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="140" y="163" text-anchor="middle" font-size="10" font-weight="700" fill="#333">NVLink Fabric</text>
  <text x="140" y="175" text-anchor="middle" font-size="8" fill="#555">GPU-to-GPU</text>

  <rect x="220" y="150" width="340" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="570" y="170" text-anchor="start" font-size="10" font-weight="700" fill="#333">900 GB/s</text>

  <!-- ── Row 3: Local NVMe ── -->
  <rect x="80" y="190" width="120" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="140" y="203" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Local NVMe</text>
  <text x="140" y="215" text-anchor="middle" font-size="8" fill="#555">PCIe Gen5 flash</text>

  <rect x="220" y="190" width="219" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="449" y="210" text-anchor="start" font-size="10" font-weight="700" fill="#333">7 GB/s</text>

  <!-- ── Row 4: Parallel File System ── -->
  <rect x="80" y="230" width="120" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="140" y="243" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Parallel FS</text>
  <text x="140" y="255" text-anchor="middle" font-size="8" fill="#555">Lustre / GPFS</text>

  <rect x="220" y="230" width="171" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="401" y="250" text-anchor="start" font-size="10" font-weight="700" fill="#333">1 GB/s</text>

  <!-- ── Row 5: Object Storage ── -->
  <rect x="80" y="270" width="120" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="140" y="283" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Object Storage</text>
  <text x="140" y="295" text-anchor="middle" font-size="8" fill="#555">S3 / GCS</text>

  <rect x="220" y="270" width="114" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="344" y="290" text-anchor="start" font-size="10" font-weight="700" fill="#333">0.1 GB/s</text>

  <!-- ===== 250,000x gap annotation ===== -->
  <line x1="334" y1="330" x2="593" y2="330" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)" marker-start="url(#arrow-red)"/>
  <rect x="400" y="320" width="130" height="20" fill="#a31f34"/>
  <text x="465" y="334" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">250,000× gap</text>
  <line x1="334" y1="310" x2="334" y2="330" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="593" y1="310" x2="593" y2="330" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Legend: color key ===== -->
  <rect x="80" y="370" width="540" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  
  <rect x="90" y="380" width="20" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="116" y="394" font-size="9" fill="#333">On-chip / Interconnect</text>
  
  <rect x="240" y="380" width="20" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="266" y="394" font-size="9" fill="#333">GPU fabric</text>
  
  <rect x="340" y="380" width="20" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="366" y="394" font-size="9" fill="#333">Node-level storage</text>
  
  <rect x="470" y="380" width="20" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="496" y="394" font-size="9" fill="#333">Cloud object storage</text>

  <!-- ===== Footnote ===== -->
  <text x="350" y="440" text-anchor="middle" font-size="9" fill="#555" font-style="italic">Bandwidth values are per-device or per-node aggregate. Log scale: each major tick is 10× difference.</text>
</svg>