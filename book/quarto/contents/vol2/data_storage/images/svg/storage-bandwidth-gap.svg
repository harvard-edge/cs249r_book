<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Storage Bandwidth Gap</text>
  <text x="340" y="46" text-anchor="middle" font-size="9" fill="#555">Bandwidth by storage tier (log scale) — each tick is 10× difference</text>

  <!-- ===== Log-scale axis ===== -->
  <!-- Axis line -->
  <line x1="220" y1="65" x2="620" y2="65" stroke="#bbb" stroke-width="1"/>
  <!-- Axis ticks: log scale from 0.001 GB/s to 10000 GB/s -->
  <!-- Map: log10(0.001)=-3 ... log10(10000)=4 → 7 decades across 400px → 57.14px per decade -->
  <!-- x = 220 + (log10(val) + 3) * 400/7 -->
  <!-- 0.001 GB/s → x=220, 0.01→277, 0.1→334, 1→391, 10→449, 100→506, 1000→563, 10000→620 -->

  <line x1="220" y1="62" x2="220" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="220" y="78" text-anchor="middle" font-size="7.5" fill="#999">0.001</text>

  <line x1="277" y1="62" x2="277" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="277" y="78" text-anchor="middle" font-size="7.5" fill="#999">0.01</text>

  <line x1="334" y1="62" x2="334" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="334" y="78" text-anchor="middle" font-size="7.5" fill="#999">0.1</text>

  <line x1="391" y1="62" x2="391" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="391" y="78" text-anchor="middle" font-size="7.5" fill="#999">1</text>

  <line x1="449" y1="62" x2="449" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="449" y="78" text-anchor="middle" font-size="7.5" fill="#999">10</text>

  <line x1="506" y1="62" x2="506" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="506" y="78" text-anchor="middle" font-size="7.5" fill="#999">100</text>

  <line x1="563" y1="62" x2="563" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="563" y="78" text-anchor="middle" font-size="7.5" fill="#999">1,000</text>

  <line x1="620" y1="62" x2="620" y2="68" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="78" text-anchor="middle" font-size="7.5" fill="#999">10,000</text>

  <text x="420" y="92" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">Bandwidth (GB/s)</text>

  <!-- ===== Horizontal bar chart rows ===== -->
  <!-- Row vertical positions -->
  <!-- Row 1: GPU HBM  →  3,350 GB/s → log10(3350)=3.525 → x_end = 220+(3.525+3)*400/7 = 220+373 = 593 -->
  <!-- Row 2: NVLink   →  900 GB/s   → log10(900)=2.954  → x_end = 220+(2.954+3)*400/7 = 220+340 = 560 -->
  <!-- Row 3: Local NVMe→ 7 GB/s     → log10(7)=0.845   → x_end = 220+(0.845+3)*400/7 = 220+219 = 439 -->
  <!-- Row 4: PFS      →  1 GB/s     → log10(1)=0       → x_end = 220+(0+3)*400/7 = 220+171 = 391 -->
  <!-- Row 5: Object   →  0.1 GB/s   → log10(0.1)=-1    → x_end = 220+(-1+3)*400/7 = 220+114 = 334 -->

  <!-- ── Row 1: GPU HBM ── -->
  <rect x="80" y="105" width="130" height="34" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="145" y="119" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU HBM</text>
  <text x="145" y="131" text-anchor="middle" font-size="8" fill="#555">On-chip DRAM</text>

  <rect x="220" y="108" width="373" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="587" y="126" text-anchor="end" font-size="9" font-weight="700" fill="#4a90c4" dx="-4">3,350 GB/s</text>

  <!-- ── Row 2: NVLink ── -->
  <rect x="80" y="155" width="130" height="34" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="145" y="169" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NVLink Fabric</text>
  <text x="145" y="181" text-anchor="middle" font-size="8" fill="#555">GPU-to-GPU</text>

  <rect x="220" y="158" width="340" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="554" y="176" text-anchor="end" font-size="9" font-weight="700" fill="#3d9e5a" dx="-4">900 GB/s</text>

  <!-- ── Row 3: Local NVMe ── -->
  <rect x="80" y="205" width="130" height="34" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="145" y="219" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Local NVMe</text>
  <text x="145" y="231" text-anchor="middle" font-size="8" fill="#555">PCIe Gen5 flash</text>

  <rect x="220" y="208" width="219" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="433" y="226" text-anchor="end" font-size="9" font-weight="700" fill="#c87b2a" dx="-4">7 GB/s</text>

  <!-- ── Row 4: Parallel File System ── -->
  <rect x="80" y="255" width="130" height="34" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="145" y="269" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Parallel FS</text>
  <text x="145" y="281" text-anchor="middle" font-size="8" fill="#555">Lustre / GPFS</text>

  <rect x="220" y="258" width="171" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="385" y="276" text-anchor="end" font-size="9" font-weight="700" fill="#c87b2a" dx="-4">1 GB/s</text>

  <!-- ── Row 5: Object Storage ── -->
  <rect x="80" y="305" width="130" height="34" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="145" y="319" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Object Storage</text>
  <text x="145" y="331" text-anchor="middle" font-size="8" fill="#555">S3 / GCS</text>

  <rect x="220" y="308" width="114" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="328" y="326" text-anchor="end" font-size="9" font-weight="700" fill="#c44" dx="-4">0.1 GB/s</text>

  <!-- ===== 250,000x gap annotation ===== -->
  <!-- Bracket from Object Storage bar end to HBM bar end -->
  <line x1="334" y1="355" x2="593" y2="355" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)" marker-start="url(#arrow-red)"/>
  <rect x="400" y="344" width="133" height="18" rx="4" fill="#a31f34"/>
  <text x="466.5" y="356" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">250,000× gap</text>
  <line x1="334" y1="337" x2="334" y2="355" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="593" y1="337" x2="593" y2="355" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== Legend: color key ===== -->
  <rect x="80" y="388" width="520" height="34" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <rect x="95" y="398" width="12" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="112" y="407" font-size="8" fill="#555">On-chip / Interconnect</text>
  <rect x="225" y="398" width="12" height="10" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="242" y="407" font-size="8" fill="#555">GPU fabric</text>
  <rect x="320" y="398" width="12" height="10" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="337" y="407" font-size="8" fill="#555">Node-level storage</text>
  <rect x="450" y="398" width="12" height="10" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="467" y="407" font-size="8" fill="#555">Cloud object storage</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Bandwidth values are per-device or per-node aggregate. Log scale: each major tick is 10× difference.</text>
</svg>