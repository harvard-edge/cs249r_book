<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Parallel File System Architecture</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Metadata path (MDS → MDT) is separate from data path (Client → OSS → OST)</text>

  <!-- ===== Section divider lines ===== -->
  <line x1="215" y1="58" x2="215" y2="450" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="464" y1="58" x2="464" y2="450" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Column headers -->
  <text x="95" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compute Clients</text>
  <text x="335" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Storage Servers</text>
  <text x="560" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Storage Targets</text>

  <!-- ===== MDS + MDT (top center, metadata path) ===== -->
  <!-- MDS box -->
  <rect x="270" y="70" width="130" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="335" y="85" text-anchor="middle" font-size="10" font-weight="700" fill="#333">MDS</text>
  <text x="335" y="98" text-anchor="middle" font-size="8.5" fill="#555">Metadata Server</text>

  <!-- MDT disk cylinder -->
  <ellipse cx="560" cy="77" rx="32" ry="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <rect x="528" y="77" width="64" height="26" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <ellipse cx="560" cy="103" rx="32" ry="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="560" y="94" text-anchor="middle" font-size="9" font-weight="700" fill="#333">MDT</text>

  <!-- MDS → MDT arrow -->
  <line x1="400" y1="90" x2="528" y2="90" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="464" y="86" text-anchor="middle" font-size="8" fill="#c87b2a">namespace ops</text>

  <!-- ===== Client boxes (left column) ===== -->
  <!-- Client 1 -->
  <rect x="30" y="140" width="130" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="95" y="156" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client 1</text>
  <text x="95" y="169" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- Client 2 -->
  <rect x="30" y="200" width="130" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="95" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client 2</text>
  <text x="95" y="229" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- Client 3 -->
  <rect x="30" y="260" width="130" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="95" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client 3</text>
  <text x="95" y="289" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- Client ellipsis -->
  <text x="95" y="325" text-anchor="middle" font-size="12" fill="#bbb">⋮</text>

  <!-- Client N -->
  <rect x="30" y="340" width="130" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="95" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client N</text>
  <text x="95" y="369" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- ===== MDS metadata arrows from clients (dashed orange) ===== -->
  <!-- Client 1 → MDS (step 1: open file, get stripe map) -->
  <path d="M 120 140 L 120 100 L 270 100" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <text x="195" y="95" text-anchor="middle" font-size="7.5" fill="#c87b2a">1. open() → stripe map</text>

  <!-- ===== OSS boxes (middle column) ===== -->
  <!-- OSS-1 -->
  <rect x="270" y="140" width="130" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="335" y="156" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-1</text>
  <text x="335" y="169" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- OSS-2 -->
  <rect x="270" y="200" width="130" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="335" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-2</text>
  <text x="335" y="229" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- OSS-3 -->
  <rect x="270" y="260" width="130" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="335" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-3</text>
  <text x="335" y="289" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- OSS ellipsis -->
  <text x="335" y="325" text-anchor="middle" font-size="12" fill="#bbb">⋮</text>

  <!-- OSS-N -->
  <rect x="270" y="340" width="130" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="335" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-N</text>
  <text x="335" y="369" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- ===== Client → OSS data arrows (parallel reads) ===== -->
  <line x1="160" y1="160" x2="270" y2="160" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="220" x2="270" y2="220" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="280" x2="270" y2="280" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="360" x2="270" y2="360" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Label the data arrows -->
  <text x="215" y="156" text-anchor="middle" font-size="7.5" fill="#3d9e5a">2. parallel reads</text>

  <!-- ===== OST cylinders (right column) ===== -->
  <!-- OST-1 -->
  <ellipse cx="560" cy="147" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="528" y="147" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="560" cy="173" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="164" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-1</text>

  <!-- OST-2 -->
  <ellipse cx="560" cy="207" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="528" y="207" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="560" cy="233" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="224" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-2</text>

  <!-- OST-3 -->
  <ellipse cx="560" cy="267" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="528" y="267" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="560" cy="293" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="284" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-3</text>

  <!-- OST ellipsis -->
  <text x="560" y="325" text-anchor="middle" font-size="12" fill="#bbb">⋮</text>

  <!-- OST-N -->
  <ellipse cx="560" cy="347" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="528" y="347" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="560" cy="373" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="364" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-N</text>

  <!-- OSS → OST arrows -->
  <line x1="400" y1="160" x2="528" y2="160" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="400" y1="220" x2="528" y2="220" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="400" y1="280" x2="528" y2="280" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="400" y1="360" x2="528" y2="360" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Striping annotation ===== -->
  <rect x="445" y="410" width="230" height="34" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="560" y="424" text-anchor="middle" font-size="9" font-weight="700" fill="#333">File striping:</text>
  <text x="560" y="437" text-anchor="middle" font-size="8.5" fill="#555">4 GB shard → 100 OSTs × 40 MB stripes</text>

  <!-- ===== Key annotation: metadata vs data paths ===== -->
  <rect x="30" y="410" width="230" height="34" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <line x1="40" y1="423" x2="60" y2="423" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="66" y="426" font-size="8.5" fill="#555">metadata path (MDS)</text>
  <line x1="40" y1="437" x2="60" y2="437" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="66" y="440" font-size="8.5" fill="#555">data path (OSS)</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="475" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Lustre architecture. MDS handles namespace; OSS nodes serve stripes in parallel. Bandwidth scales with OSS count.</text>
</svg>