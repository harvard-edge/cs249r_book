<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Parallel File System Architecture</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Metadata path (MDS → MDT) is separate from data path (Client → OSS → OST)</text>

  <!-- ===== Section divider lines ===== -->
  <line x1="240" y1="58" x2="240" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="430" y1="58" x2="430" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Column headers -->
  <text x="120" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compute Clients</text>
  <text x="335" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Storage Servers</text>
  <text x="555" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Storage Targets</text>

  <!-- ===== MDS + MDT (top center, metadata path) ===== -->
  <!-- MDS box -->
  <rect x="262" y="72" width="136" height="38" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="330" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#333">MDS</text>
  <text x="330" y="100" text-anchor="middle" font-size="8.5" fill="#555">Metadata Server</text>

  <!-- MDT disk cylinder -->
  <ellipse cx="550" cy="82" rx="28" ry="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <rect x="522" y="82" width="56" height="24" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <ellipse cx="550" cy="106" rx="28" ry="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="550" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#333">MDT</text>

  <!-- MDS → MDT arrow -->
  <line x1="398" y1="91" x2="521" y2="91" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="460" y="86" text-anchor="middle" font-size="8" fill="#c87b2a">namespace ops</text>

  <!-- ===== Client boxes (left column) ===== -->
  <!-- Client 1 -->
  <rect x="20" y="130" width="110" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="75" y="147" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client 1</text>
  <text x="75" y="160" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- Client 2 -->
  <rect x="20" y="185" width="110" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="75" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client 2</text>
  <text x="75" y="215" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- Client 3 -->
  <rect x="20" y="240" width="110" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="75" y="257" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client 3</text>
  <text x="75" y="270" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- Client ellipsis -->
  <text x="75" y="300" text-anchor="middle" font-size="12" fill="#bbb">⋮</text>

  <!-- Client N -->
  <rect x="20" y="310" width="110" height="38" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="75" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Client N</text>
  <text x="75" y="340" text-anchor="middle" font-size="8.5" fill="#555">GPU node</text>

  <!-- ===== MDS metadata arrows from clients (dashed orange) ===== -->
  <!-- Client 1 → MDS (step 1: open file, get stripe map) -->
  <line x1="130" y1="149" x2="262" y2="97" stroke="#c87b2a" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <text x="195" y="115" text-anchor="middle" font-size="7.5" fill="#c87b2a" transform="rotate(-18,195,115)">1. open() → stripe map</text>

  <!-- ===== OSS boxes (middle column) ===== -->
  <!-- OSS-1 -->
  <rect x="262" y="148" width="136" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="163" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-1</text>
  <text x="330" y="176" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- OSS-2 -->
  <rect x="262" y="200" width="136" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-2</text>
  <text x="330" y="228" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- OSS-3 -->
  <rect x="262" y="252" width="136" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="267" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-3</text>
  <text x="330" y="280" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- OSS ellipsis -->
  <text x="330" y="308" text-anchor="middle" font-size="12" fill="#bbb">⋮</text>

  <!-- OSS-N -->
  <rect x="262" y="318" width="136" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="333" text-anchor="middle" font-size="10" font-weight="700" fill="#333">OSS-N</text>
  <text x="330" y="346" text-anchor="middle" font-size="8.5" fill="#555">Object Storage Server</text>

  <!-- ===== Client → OSS data arrows (parallel reads) ===== -->
  <line x1="130" y1="164" x2="262" y2="164" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="130" y1="200" x2="262" y2="218" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="130" y1="255" x2="262" y2="269" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="130" y1="327" x2="262" y2="335" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Label the data arrows -->
  <text x="196" y="157" text-anchor="middle" font-size="7.5" fill="#3d9e5a">2. parallel reads</text>

  <!-- ===== OST cylinders (right column) ===== -->
  <!-- OST-1 -->
  <ellipse cx="545" cy="160" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="513" y="160" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="545" cy="186" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="545" y="177" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-1</text>

  <!-- OST-2 -->
  <ellipse cx="545" cy="212" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="513" y="212" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="545" cy="238" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="545" y="229" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-2</text>

  <!-- OST-3 -->
  <ellipse cx="545" cy="264" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="513" y="264" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="545" cy="290" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="545" y="281" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-3</text>

  <!-- OST ellipsis -->
  <text x="545" y="315" text-anchor="middle" font-size="12" fill="#bbb">⋮</text>

  <!-- OST-N -->
  <ellipse cx="545" cy="330" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="513" y="330" width="64" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <ellipse cx="545" cy="356" rx="32" ry="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="545" y="347" text-anchor="middle" font-size="9" font-weight="700" fill="#333">OST-N</text>

  <!-- OSS → OST arrows -->
  <line x1="398" y1="167" x2="513" y2="173" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="398" y1="219" x2="513" y2="225" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="398" y1="271" x2="513" y2="277" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="398" y1="335" x2="513" y2="343" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Striping annotation ===== -->
  <rect x="430" y="380" width="230" height="34" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="545" y="394" text-anchor="middle" font-size="9" font-weight="700" fill="#333">File striping:</text>
  <text x="545" y="407" text-anchor="middle" font-size="8.5" fill="#555">4 GB shard → 100 OSTs × 40 MB stripes</text>

  <!-- ===== Key annotation: metadata vs data paths ===== -->
  <rect x="20" y="380" width="230" height="34" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <line x1="30" y1="393" x2="50" y2="393" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="56" y="396" font-size="8.5" fill="#555">metadata path (MDS)</text>
  <line x1="30" y1="407" x2="50" y2="407" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="56" y="410" font-size="8.5" fill="#555">data path (OSS)</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Lustre architecture. MDS handles namespace; OSS nodes serve stripes in parallel. Bandwidth scales with OSS count.</text>
</svg>