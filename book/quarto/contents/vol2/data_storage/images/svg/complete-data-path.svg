<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Complete Data Path</text>
  <text x="340" y="41" text-anchor="middle" font-size="9" fill="#555">Training forward path (top) and checkpoint return path (bottom)</text>

  <!-- ===== Section separator ===== -->
  <line x1="20" y1="54" x2="660" y2="54" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ===== FORWARD PATH (top half: y ~75–200) ===== -->
  <text x="20" y="72" font-size="9" font-weight="700" fill="#555">TRAINING DATA FORWARD PATH</text>

  <!-- Box 1: Object Storage -->
  <rect x="20" y="82" width="96" height="52" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="68" y="101" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Object</text>
  <text x="68" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Storage</text>
  <text x="68" y="127" text-anchor="middle" font-size="8" fill="#555">S3 / GCS</text>

  <!-- Arrow 1 → 2 -->
  <line x1="116" y1="108" x2="151" y2="108" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="133" y="100" text-anchor="middle" font-size="8" fill="#c44">0.1 GB/s</text>
  <text x="133" y="120" text-anchor="middle" font-size="7.5" fill="#999">stage</text>

  <!-- Box 2: Parallel FS -->
  <rect x="151" y="82" width="96" height="52" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="199" y="101" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Parallel</text>
  <text x="199" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#333">File System</text>
  <text x="199" y="127" text-anchor="middle" font-size="8" fill="#555">Lustre / GPFS</text>

  <!-- Arrow 2 → 3 -->
  <line x1="247" y1="108" x2="282" y2="108" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="264" y="100" text-anchor="middle" font-size="8" fill="#c87b2a">4 GB/s</text>
  <text x="264" y="120" text-anchor="middle" font-size="7.5" fill="#999">per node</text>

  <!-- Box 3: Local NVMe -->
  <rect x="282" y="82" width="96" height="52" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="330" y="101" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Local</text>
  <text x="330" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NVMe</text>
  <text x="330" y="127" text-anchor="middle" font-size="8" fill="#555">PCIe Gen5</text>

  <!-- Arrow 3 → 4 -->
  <line x1="378" y1="108" x2="413" y2="108" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="395" y="100" text-anchor="middle" font-size="8" fill="#3d9e5a">14 GB/s</text>
  <text x="395" y="120" text-anchor="middle" font-size="7.5" fill="#999">read + decode</text>

  <!-- Box 4: Host DRAM -->
  <rect x="413" y="82" width="96" height="52" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="461" y="101" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Host</text>
  <text x="461" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#333">DRAM</text>
  <text x="461" y="127" text-anchor="middle" font-size="8" fill="#555">pinned memory</text>

  <!-- Arrow 4 → 5 -->
  <line x1="509" y1="108" x2="544" y2="108" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="526" y="100" text-anchor="middle" font-size="8" fill="#3d9e5a">64 GB/s</text>
  <text x="526" y="120" text-anchor="middle" font-size="7.5" fill="#999">PCIe DMA</text>

  <!-- Box 5: GPU HBM -->
  <rect x="544" y="82" width="96" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="592" y="101" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU HBM</text>
  <text x="592" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#333">80 GB</text>
  <text x="592" y="127" text-anchor="middle" font-size="8" fill="#555">prefetch buffer</text>

  <!-- Arrow 5 → Compute -->
  <line x1="640" y1="108" x2="655" y2="108" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Compute block -->
  <rect x="656" y="82" width="18" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="665" y="108" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333" transform="rotate(-90,665,108)">COMPUTE</text>

  <!-- ===== Bandwidth labels below each box ===== -->
  <!-- Object Storage -->
  <rect x="34" y="142" width="68" height="14" rx="12" fill="#a31f34"/>
  <text x="68" y="152" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">0.1 GB/s</text>

  <!-- PFS -->
  <rect x="165" y="142" width="68" height="14" rx="12" fill="#c87b2a"/>
  <text x="199" y="152" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">1–4 GB/s</text>

  <!-- NVMe -->
  <rect x="296" y="142" width="68" height="14" rx="12" fill="#c87b2a"/>
  <text x="330" y="152" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">7–14 GB/s</text>

  <!-- Host DRAM -->
  <rect x="427" y="142" width="68" height="14" rx="12" fill="#3d9e5a"/>
  <text x="461" y="152" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">200 GB/s</text>

  <!-- GPU HBM -->
  <rect x="554" y="142" width="76" height="14" rx="12" fill="#4a90c4"/>
  <text x="592" y="152" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">3,350 GB/s</text>

  <!-- ===== Vertical divider ===== -->
  <line x1="20" y1="170" x2="660" y2="170" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ===== CHECKPOINT RETURN PATH (bottom half: y ~185–340) ===== -->
  <text x="20" y="188" font-size="9" font-weight="700" fill="#555">CHECKPOINT RETURN PATH</text>

  <!-- GPU HBM source -->
  <rect x="544" y="198" width="96" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="592" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU HBM</text>
  <text x="592" y="229" text-anchor="middle" font-size="8.5" fill="#555">weights +</text>
  <text x="592" y="241" text-anchor="middle" font-size="8.5" fill="#555">opt. state</text>

  <!-- Arrow HBM → NVMe (fast, sync) -->
  <line x1="544" y1="224" x2="391" y2="224" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="467" y="218" text-anchor="middle" font-size="8" fill="#4a90c4">14 GB/s · ~0.3 s</text>
  <text x="467" y="220.0" text-anchor="middle" font-size="8" fill="#555">sync write</text>

  <!-- Local NVMe (checkpoint copy 1) -->
  <rect x="282" y="198" width="108" height="52" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="336" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Local NVMe</text>
  <text x="336" y="229" text-anchor="middle" font-size="8.5" fill="#555">T_save = T_local</text>
  <text x="336" y="241" text-anchor="middle" font-size="8.5" fill="#555">~0.3 s pause</text>

  <!-- Arrow NVMe → PFS (slow, async, dashed) -->
  <line x1="282" y1="224" x2="172" y2="224" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="227" y="216" text-anchor="middle" font-size="8" fill="#c87b2a">async · minutes</text>
  <text x="227" y="219.0" text-anchor="middle" font-size="7.5" fill="#999">(background)</text>

  <!-- PFS (checkpoint copy 2) -->
  <rect x="75" y="198" width="96" height="52" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="123" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Parallel FS</text>
  <text x="123" y="229" text-anchor="middle" font-size="8.5" fill="#555">durable copy</text>
  <text x="123" y="241" text-anchor="middle" font-size="8.5" fill="#555">3 recent kept</text>

  <!-- Arrow PFS → Object (archive, dashed) -->
  <line x1="75" y1="224" x2="20" y2="224" stroke="#c44" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- Object (archive) -->
  <rect x="20" y="198" width="54" height="52" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="47" y="217" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Object</text>
  <text x="47" y="219.0" text-anchor="middle" font-size="8" fill="#555">archive</text>
  <text x="47" y="241" text-anchor="middle" font-size="7.5" fill="#555">long-term</text>

  <!-- ===== T_save annotation ===== -->
  <rect x="282" y="262" width="358" height="34" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="461" y="277" text-anchor="middle" font-size="9" font-weight="700" fill="#333">T_save = T_local (not T_PFS)</text>
  <text x="461" y="290" text-anchor="middle" font-size="8.5" fill="#555">Training resumes after local NVMe write; PFS copy is asynchronous</text>

  <!-- ===== Legend ===== -->
  <rect x="20" y="320" width="640" height="44" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="340" y="336" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Path types</text>
  <!-- Sync line -->
  <line x1="40" y1="352" x2="70" y2="352" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="75" y="345.0" font-size="8.5" fill="#555">Sync write (training paused)</text>
  <!-- Async dashed line -->
  <line x1="220" y1="352" x2="250" y2="352" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="255" y="345.0" font-size="8.5" fill="#555">Async copy (training continues)</text>
  <!-- Archive line -->
  <line x1="430" y1="352" x2="460" y2="352" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="465" y="345.0" font-size="8.5" fill="#555">Long-term archive</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Running example: 175B parameter model. Forward path stages training data; return path writes checkpoints. Bandwidth per node.</text>
</svg>