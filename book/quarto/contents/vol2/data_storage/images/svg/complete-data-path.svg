<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="1000" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="500" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">The Complete Data Path</text>
  <text x="500" y="45" text-anchor="middle" font-size="9" fill="#555">Training forward path (top) and checkpoint return path (bottom)</text>

  <!-- ===== Section separator ===== -->
  <line x1="20" y1="60" x2="980" y2="60" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ===== FORWARD PATH ===== -->
  <text x="30" y="80" font-size="9" font-weight="700" fill="#555">TRAINING DATA FORWARD PATH</text>

  <!-- Box 1: Object Storage -->
  <rect x="30" y="90" width="100" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="80" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Object</text>
  <text x="80" y="125" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Storage</text>
  <text x="80" y="140" text-anchor="middle" font-size="8" fill="#555">S3 / GCS</text>

  <!-- Arrow 1 → 2 -->
  <line x1="130" y1="120" x2="210" y2="120" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="170" y="110" text-anchor="middle" font-size="8" fill="#c44">0.1 GB/s</text>
  <text x="170" y="135" text-anchor="middle" font-size="7.5" fill="#999">stage</text>

  <!-- Box 2: Parallel FS -->
  <rect x="210" y="90" width="100" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="260" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Parallel</text>
  <text x="260" y="125" text-anchor="middle" font-size="9" font-weight="700" fill="#333">File System</text>
  <text x="260" y="140" text-anchor="middle" font-size="8" fill="#555">Lustre / GPFS</text>

  <!-- Arrow 2 → 3 -->
  <line x1="310" y1="120" x2="390" y2="120" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="350" y="110" text-anchor="middle" font-size="8" fill="#c87b2a">4 GB/s</text>
  <text x="350" y="135" text-anchor="middle" font-size="7.5" fill="#999">per node</text>

  <!-- Box 3: Local NVMe -->
  <rect x="390" y="90" width="100" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Local</text>
  <text x="440" y="125" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NVMe</text>
  <text x="440" y="140" text-anchor="middle" font-size="8" fill="#555">PCIe Gen5</text>

  <!-- Arrow 3 → 4 -->
  <line x1="490" y1="120" x2="630" y2="120" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="560" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">14 GB/s</text>
  <text x="560" y="135" text-anchor="middle" font-size="7.5" fill="#999">read + decode</text>

  <!-- Box 4: Host DRAM -->
  <rect x="630" y="90" width="100" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Host</text>
  <text x="680" y="125" text-anchor="middle" font-size="9" font-weight="700" fill="#333">DRAM</text>
  <text x="680" y="140" text-anchor="middle" font-size="8" fill="#555">pinned memory</text>

  <!-- Arrow 4 → 5 -->
  <line x1="730" y1="120" x2="830" y2="120" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="780" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">64 GB/s</text>
  <text x="780" y="135" text-anchor="middle" font-size="7.5" fill="#999">PCIe DMA</text>

  <!-- Box 5: GPU HBM -->
  <rect x="830" y="90" width="100" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="880" y="110" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU HBM</text>
  <text x="880" y="125" text-anchor="middle" font-size="9" font-weight="700" fill="#333">80 GB</text>
  <text x="880" y="140" text-anchor="middle" font-size="8" fill="#555">prefetch buffer</text>

  <!-- Arrow 5 → Compute -->
  <line x1="930" y1="120" x2="960" y2="120" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Compute block -->
  <rect x="960" y="90" width="20" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="970" y="120" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333" transform="rotate(-90,970,120)">COMPUTE</text>

  <!-- ===== Bandwidth labels below each box ===== -->
  <!-- Object Storage -->
  <rect x="40" y="160" width="80" height="20" rx="4" fill="#a31f34"/>
  <text x="80" y="174" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">0.1 GB/s</text>

  <!-- PFS -->
  <rect x="220" y="160" width="80" height="20" rx="4" fill="#c87b2a"/>
  <text x="260" y="174" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">1–4 GB/s</text>

  <!-- NVMe -->
  <rect x="400" y="160" width="80" height="20" rx="4" fill="#c87b2a"/>
  <text x="440" y="174" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">7–14 GB/s</text>

  <!-- Host DRAM -->
  <rect x="640" y="160" width="80" height="20" rx="4" fill="#3d9e5a"/>
  <text x="680" y="174" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">200 GB/s</text>

  <!-- GPU HBM -->
  <rect x="840" y="160" width="80" height="20" rx="4" fill="#4a90c4"/>
  <text x="880" y="174" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">3,350 GB/s</text>

  <!-- ===== Vertical divider ===== -->
  <line x1="20" y1="200" x2="980" y2="200" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ===== CHECKPOINT RETURN PATH ===== -->
  <text x="30" y="220" font-size="9" font-weight="700" fill="#555">CHECKPOINT RETURN PATH</text>

  <!-- GPU HBM source -->
  <rect x="830" y="240" width="100" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="880" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#333">GPU HBM</text>
  <text x="880" y="275" text-anchor="middle" font-size="8.5" fill="#555">weights +</text>
  <text x="880" y="290" text-anchor="middle" font-size="8.5" fill="#555">opt. state</text>

  <!-- Arrow HBM → NVMe -->
  <line x1="830" y1="270" x2="490" y2="270" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="260" text-anchor="middle" font-size="8" fill="#4a90c4">14 GB/s · ~0.3 s</text>
  <text x="660" y="285" text-anchor="middle" font-size="8" fill="#555">sync write</text>

  <!-- Local NVMe (checkpoint copy 1) -->
  <rect x="390" y="240" width="100" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="440" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Local NVMe</text>
  <text x="440" y="275" text-anchor="middle" font-size="8.5" fill="#555">T_save = T_local</text>
  <text x="440" y="290" text-anchor="middle" font-size="8.5" fill="#555">~0.3 s pause</text>

  <!-- Arrow NVMe → PFS -->
  <line x1="390" y1="270" x2="310" y2="270" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="350" y="260" text-anchor="middle" font-size="8" fill="#c87b2a">async · minutes</text>
  <text x="350" y="285" text-anchor="middle" font-size="7.5" fill="#999">(background)</text>

  <!-- PFS (checkpoint copy 2) -->
  <rect x="210" y="240" width="100" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="260" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Parallel FS</text>
  <text x="260" y="275" text-anchor="middle" font-size="8.5" fill="#555">durable copy</text>
  <text x="260" y="290" text-anchor="middle" font-size="8.5" fill="#555">3 recent kept</text>

  <!-- Arrow PFS → Object -->
  <line x1="210" y1="270" x2="130" y2="270" stroke="#c44" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- Object (archive) -->
  <rect x="30" y="240" width="100" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="80" y="260" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Object</text>
  <text x="80" y="275" text-anchor="middle" font-size="8" fill="#555">archive</text>
  <text x="80" y="290" text-anchor="middle" font-size="7.5" fill="#555">long-term</text>

  <!-- ===== T_save annotation ===== -->
  <rect x="210" y="320" width="460" height="40" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="440" y="335" text-anchor="middle" font-size="9" font-weight="700" fill="#333">T_save = T_local (not T_PFS)</text>
  <text x="440" y="350" text-anchor="middle" font-size="8.5" fill="#555">Training resumes after local NVMe write; PFS copy is asynchronous</text>

  <!-- ===== Legend ===== -->
  <rect x="180" y="380" width="640" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="500" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Path types</text>
  <!-- Sync line -->
  <line x1="200" y1="420" x2="230" y2="420" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="424" font-size="8.5" fill="#555">Sync write (training paused)</text>
  <!-- Async dashed line -->
  <line x1="420" y1="420" x2="450" y2="420" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="460" y="424" font-size="8.5" fill="#555">Async copy (training continues)</text>
  <!-- Archive line -->
  <line x1="640" y1="420" x2="670" y2="420" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="680" y="424" font-size="8.5" fill="#555">Long-term archive</text>

  <!-- ===== Footnote ===== -->
  <text x="500" y="480" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Running example: 175B parameter model. Forward path stages training data; return path writes checkpoints. Bandwidth per node.</text>
</svg>