<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="740" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="370" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Feature Store Architecture: Dual-Store Pattern</text>

  <!-- ===== Feature Definitions (single source of truth at top) ===== -->
  <rect x="250" y="40" width="240" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="370" y="55" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Feature Definitions</text>
  <text x="370" y="68" text-anchor="middle" font-size="8" fill="#c87b2a">Single source of truth</text>
  <text x="370" y="80" text-anchor="middle" font-size="7.5" fill="#999">schema · transformation logic · freshness SLOs</text>

  <!-- ===== Offline Store (left, blue, large) ===== -->
  <rect x="50" y="130" width="220" height="170" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="160" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Offline Store</text>
  <text x="160" y="165" text-anchor="middle" font-size="8.5" fill="#4a90c4">Batch · High-throughput · Historical</text>

  <!-- Offline storage icon (simplified cylinder suggestion via rect) -->
  <rect x="80" y="180" width="160" height="86" rx="4" fill="#f0f7fd" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="160" y="198" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Storage:</text>
  <text x="160" y="210" text-anchor="middle" font-size="8" fill="#555">BigQuery / Snowflake</text>
  <text x="160" y="222" text-anchor="middle" font-size="8" fill="#555">Apache Iceberg / S3</text>
  <text x="160" y="234" text-anchor="middle" font-size="8" fill="#555">Petabyte-scale</text>
  <text x="160" y="246" text-anchor="middle" font-size="7.5" fill="#999">Throughput: GB/s reads</text>
  <text x="160" y="258" text-anchor="middle" font-size="7.5" fill="#999">Latency: seconds–minutes</text>

  <!-- ===== Materialization Pipeline (center, orange) ===== -->
  <rect x="310" y="150" width="120" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="370" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Materialization</text>
  <text x="370" y="182" text-anchor="middle" font-size="8.5" fill="#c87b2a">Pipeline</text>

  <!-- Pipeline sub-items -->
  <text x="370" y="200" text-anchor="middle" font-size="7.5" fill="#555">Batch: Spark daily/hourly</text>
  <text x="370" y="212" text-anchor="middle" font-size="7.5" fill="#555">Stream: Flink / Kafka</text>
  <text x="370" y="224" text-anchor="middle" font-size="7.5" fill="#555">On-demand: request-time</text>
  <text x="370" y="236" text-anchor="middle" font-size="7.5" fill="#999">enforces f_train ≡ f_serve</text>

  <!-- ===== Online Store (right, green, small) ===== -->
  <rect x="470" y="130" width="220" height="170" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="580" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Online Store</text>
  <text x="580" y="165" text-anchor="middle" font-size="8.5" fill="#3d9e5a">Real-time · Low-latency · Point-lookup</text>

  <!-- Online storage detail -->
  <rect x="500" y="180" width="160" height="86" rx="4" fill="#d0f0c0" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="580" y="198" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Storage:</text>
  <text x="580" y="210" text-anchor="middle" font-size="8" fill="#555">Redis / DynamoDB</text>
  <text x="580" y="222" text-anchor="middle" font-size="8" fill="#555">Bigtable / Cassandra</text>
  <text x="580" y="234" text-anchor="middle" font-size="8" fill="#555">Key-value paradigm</text>
  <text x="580" y="246" text-anchor="middle" font-size="7.5" fill="#999">Throughput: M queries/s</text>
  <text x="580" y="258" text-anchor="middle" font-size="7.5" fill="#999">Latency: &lt; 10 ms p99</text>

  <!-- ===== Arrows from Feature Definitions to both stores ===== -->
  <!-- Feature Defs → Offline Store (left-down) -->
  <path d="M 300,90 L 300,110 L 160,110 L 160,130" stroke="#c87b2a" stroke-width="1.3" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-orange)"/>
  <!-- Feature Defs → Online Store (right-down) -->
  <path d="M 440,90 L 440,110 L 580,110 L 580,130" stroke="#c87b2a" stroke-width="1.3" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- Feature Defs → Materialization Pipeline (center-down) -->
  <line x1="370" y1="90" x2="370" y2="150" stroke="#c87b2a" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>

  <!-- ===== Materialization arrows: Offline → Pipeline and Pipeline → Online ===== -->
  <line x1="270" y1="200" x2="310" y2="200" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="430" y1="200" x2="470" y2="200" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Labels on materialization arrows -->
  <text x="290" y="186" text-anchor="middle" font-size="7.5" fill="#4a90c4" font-weight="600">batch</text>
  <text x="290" y="195" text-anchor="middle" font-size="7.5" fill="#4a90c4">read</text>
  <text x="450" y="186" text-anchor="middle" font-size="7.5" fill="#3d9e5a" font-weight="600">materialize</text>
  <text x="450" y="195" text-anchor="middle" font-size="7.5" fill="#3d9e5a">write</text>

  <!-- ===== Training pipeline reads from Offline ===== -->
  <rect x="50" y="330" width="220" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="160" y="348" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Training Pipeline</text>
  <text x="160" y="360" text-anchor="middle" font-size="8" fill="#555">High-throughput scan · hours</text>
  <text x="160" y="372" text-anchor="middle" font-size="7.5" fill="#999">point-in-time joins for label generation</text>

  <!-- Offline Store → Training Pipeline -->
  <line x1="160" y1="300" x2="160" y2="330" stroke="#4a90c4" stroke-width="1.4" marker-end="url(#arrow-blue)"/>
  <text x="150" y="313" text-anchor="end" font-size="7.5" fill="#4a90c4" font-weight="600">training</text>
  <text x="150" y="323" text-anchor="end" font-size="7.5" fill="#4a90c4">features</text>

  <!-- ===== Serving pipeline reads from Online ===== -->
  <rect x="470" y="330" width="220" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="580" y="348" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Serving Pipeline</text>
  <text x="580" y="360" text-anchor="middle" font-size="8" fill="#555">Point-lookup · &lt; 10 ms</text>
  <text x="580" y="372" text-anchor="middle" font-size="7.5" fill="#999">inference request → feature fetch → prediction</text>

  <!-- Online Store → Serving Pipeline -->
  <line x1="580" y1="300" x2="580" y2="330" stroke="#3d9e5a" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="590" y="313" text-anchor="start" font-size="7.5" fill="#3d9e5a" font-weight="600">serving</text>
  <text x="590" y="323" text-anchor="start" font-size="7.5" fill="#3d9e5a">features</text>

  <!-- ===== Invariant label in center ===== -->
  <rect x="290" y="340" width="160" height="30" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="370" y="354" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Architectural invariant:</text>
  <text x="370" y="366" text-anchor="middle" font-size="9" fill="#333" font-style="italic">f_train(x) ≡ f_serve(x)</text>

  <!-- ===== Bottom summary bar ===== -->
  <rect x="50" y="400" width="640" height="40" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.0"/>
  <text x="370" y="418" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">No single database satisfies both training (GB/s throughput) and serving (&lt; 10 ms p99) access patterns</text>
  <text x="370" y="430" text-anchor="middle" font-size="8.5" fill="#555">Dual-store architecture makes training-serving skew an impossibility by construction, not a validation burden</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="370" y="455" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Materialization pipeline enforces point-in-time correctness: training features cannot embed future information.</text>
</svg>