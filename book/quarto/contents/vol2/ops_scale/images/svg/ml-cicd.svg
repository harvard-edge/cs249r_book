<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470">
  <defs>
    <marker id="flow-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="pass-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="fail-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="feedback-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <rect width="720" height="470" fill="#fff"/>

  <!-- Phase labels -->
  <rect x="30" y="30" width="180" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="120" y="44" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="600">Continuous Integration (CI)</text>

  <rect x="250" y="30" width="200" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="350" y="44" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">Continuous Training (CT)</text>

  <rect x="490" y="30" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="590" y="44" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="600">Continuous Deployment (CD)</text>

  <!-- Stage 1: Code Commit -->
  <rect x="30" y="72" width="80" height="46" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="70" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Code</text>
  <text x="70" y="104" text-anchor="middle" font-size="8" fill="#555">Commit</text>

  <!-- Arrow 1 -->
  <line x1="110" y1="95" x2="128.8" y2="95" stroke="#555" stroke-width="1.2" marker-end="url(#flow-arr)"/>

  <!-- Stage 2: Lint + Test -->
  <rect x="130" y="72" width="80" height="46" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Lint /</text>
  <text x="170" y="104" text-anchor="middle" font-size="8" fill="#555">Unit Test</text>

  <!-- Arrow 2 -->
  <line x1="210" y1="95" x2="248.8" y2="95" stroke="#555" stroke-width="1.2" marker-end="url(#flow-arr)"/>

  <!-- Stage 3: Data Validation -->
  <rect x="250" y="72" width="90" height="46" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="295" y="88" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Data</text>
  <text x="295" y="100" text-anchor="middle" font-size="8" fill="#555">Validation</text>
  <text x="295" y="112" text-anchor="middle" font-size="7.5" fill="#999">schema + drift</text>

  <!-- Arrow 3 -->
  <line x1="340" y1="95" x2="358.8" y2="95" stroke="#555" stroke-width="1.2" marker-end="url(#flow-arr)"/>

  <!-- Stage 4: Model Training -->
  <rect x="360" y="72" width="90" height="46" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="405" y="88" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Model</text>
  <text x="405" y="100" text-anchor="middle" font-size="8" fill="#555">Training</text>
  <text x="405" y="112" text-anchor="middle" font-size="7.5" fill="#999">hyperparam search</text>

  <!-- Arrow 4 -->
  <line x1="450" y1="95" x2="488.8" y2="95" stroke="#555" stroke-width="1.2" marker-end="url(#flow-arr)"/>

  <!-- Stage 5: Evaluation -->
  <rect x="490" y="72" width="80" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="530" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Evaluate</text>
  <text x="530" y="104" text-anchor="middle" font-size="8" fill="#555">metrics gate</text>

  <!-- Arrow 5 (pass) -->
  <line x1="570" y1="95" x2="588.8" y2="95" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#pass-arr)"/>
  <text x="580" y="88" text-anchor="middle" font-size="7.5" fill="#3d9e5a" font-weight="600">pass</text>

  <!-- Stage 6: Registry -->
  <rect x="590" y="72" width="80" height="46" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="630" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Registry</text>
  <text x="630" y="104" text-anchor="middle" font-size="8" fill="#555">v1.x tag</text>

  <!-- Fail branch from Evaluate -->
  <line x1="530" y1="118" x2="530" y2="156.8" stroke="#c44" stroke-width="1.2" marker-end="url(#fail-arr)"/>
  <text x="542" y="140" font-size="7.5" fill="#c44" font-weight="600">fail</text>

  <!-- Fail box -->
  <rect x="490" y="158" width="80" height="32" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="530" y="178" text-anchor="middle" font-size="8" fill="#c44" font-weight="600">Block + Alert</text>

  <!-- Second row: Deployment stages -->

  <!-- Arrow from Registry down -->
  <line x1="630" y1="118" x2="630" y2="218.8" stroke="#555" stroke-width="1.2" marker-end="url(#flow-arr)"/>

  <!-- Stage 7: Staging -->
  <rect x="490" y="220" width="80" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="530" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Staging</text>
  <text x="530" y="252" text-anchor="middle" font-size="8" fill="#555">integration test</text>

  <!-- Arrow staging -->
  <line x1="570" y1="243" x2="588.8" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#flow-arr)"/>

  <!-- Stage 8: Canary -->
  <rect x="590" y="220" width="80" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="630" y="236" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Canary</text>
  <text x="630" y="248" text-anchor="middle" font-size="8" fill="#555">5% traffic</text>
  <text x="630" y="260" text-anchor="middle" font-size="7.5" fill="#999">monitor metrics</text>

  <!-- Arrow to staging from registry bend -->
  <polyline points="630,200 530,200 530,218.8" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#flow-arr)"/>

  <!-- Arrow canary to production -->
  <line x1="630" y1="266" x2="630" y2="300.8" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#pass-arr)"/>

  <!-- Stage 9: Production -->
  <rect x="580" y="302" width="100" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="630" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Production</text>
  <text x="630" y="336" text-anchor="middle" font-size="8" fill="#555">100% traffic</text>

  <!-- Monitoring feedback loop -->
  <rect x="30" y="302" width="100" height="46" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="80" y="318" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Monitoring</text>
  <text x="80" y="332" text-anchor="middle" font-size="8" fill="#555">drift + latency</text>
  <text x="80" y="344" text-anchor="middle" font-size="7.5" fill="#999">data quality</text>

  <!-- Feedback arrow: Production -> Monitoring -->
  <line x1="580" y1="325" x2="131.2" y2="325" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#feedback-arr)"/>

  <!-- Feedback arrow: Monitoring -> Data Validation -->
  <polyline points="80,302 80,160 295,160 295,119.2" fill="none" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#feedback-arr)"/>
  <text x="187.5" y="154" text-anchor="middle" font-size="7.5" fill="#4a90c4" font-weight="600">drift triggers retrain</text>

  <!-- Bottom summary -->
  <rect x="100" y="408" width="520" height="36" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="360" y="424" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="600">ML pipelines differ from software CI/CD: data validation + model evaluation gates are mandatory</text>
  <text x="360" y="436" text-anchor="middle" font-size="8.5" fill="#555">Monitoring closes the loop: production drift triggers the next training cycle automatically</text>
</svg>