<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="880" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="440" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Ensemble Staged Deployment Pipeline</text>

  <!-- ===== Stage lane backgrounds ===== -->
  <!-- Stage 1: Shadow -->
  <rect x="40" y="48" width="140" height="280" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <!-- Stage 2: Canary -->
  <rect x="240" y="48" width="140" height="280" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <!-- Stage 3: Staged Rollout -->
  <rect x="440" y="48" width="140" height="280" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <!-- Stage 4: Full Production -->
  <rect x="640" y="48" width="160" height="280" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>

  <!-- ===== Stage header boxes ===== -->
  <!-- Stage 1 header: Shadow (orange — routing/scheduling) -->
  <rect x="40" y="48" width="140" height="36" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="110" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">1. Shadow</text>
  <text x="110" y="79" text-anchor="middle" font-size="8" fill="#c87b2a">0% users · 24–48 h</text>

  <!-- Stage 2 header: Canary (orange→green transition) -->
  <rect x="240" y="48" width="140" height="36" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="310" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">2. Canary</text>
  <text x="310" y="79" text-anchor="middle" font-size="8" fill="#c87b2a">1–5% traffic · 4–8 h</text>

  <!-- Stage 3 header: Staged Rollout (green leaning) -->
  <rect x="440" y="48" width="140" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="510" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">3. Staged Rollout</text>
  <text x="510" y="79" text-anchor="middle" font-size="8" fill="#3d9e5a">5%→100% · 24–72 h</text>

  <!-- Stage 4 header: Full Production (green) -->
  <rect x="640" y="48" width="160" height="36" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="720" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">4. Full Production</text>
  <text x="720" y="79" text-anchor="middle" font-size="8" fill="#3d9e5a">100% · 7–14 d soak</text>

  <!-- ===== Traffic bars (visual) ===== -->
  <!-- Stage 1: 0% bar (neutral) -->
  <rect x="50" y="100" width="120" height="16" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="110" y="112" text-anchor="middle" font-size="8" fill="#999">0% live traffic</text>

  <!-- Stage 2: 5% bar -->
  <rect x="250" y="100" width="120" height="16" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="250" y="100" width="6" height="16" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.6"/>
  <text x="310" y="112" text-anchor="middle" font-size="8" fill="#c87b2a">5% live traffic</text>

  <!-- Stage 3: stepped traffic bar -->
  <rect x="450" y="100" width="120" height="16" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="450" y="100" width="60" height="16" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.6"/>
  <text x="510" y="112" text-anchor="middle" font-size="8" fill="#3d9e5a">5% → 50% → 100%</text>

  <!-- Stage 4: full bar -->
  <rect x="650" y="100" width="140" height="16" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="720" y="112" text-anchor="middle" font-size="8" fill="#3d9e5a">100% live traffic</text>

  <!-- ===== Validation checkpoints ===== -->
  <!-- Stage 1 checks -->
  <text x="50" y="138" font-size="8" font-weight="700" fill="#333">Validates:</text>
  <text x="50" y="151" font-size="8" fill="#555">• Operational load</text>
  <text x="50" y="163" font-size="8" fill="#555">• Output correctness</text>
  <text x="50" y="175" font-size="8" fill="#555">• Memory stability</text>
  <text x="50" y="187" font-size="8" fill="#555">• Latency at scale</text>

  <!-- Stage 2 checks -->
  <text x="250" y="138" font-size="8" font-weight="700" fill="#333">Validates:</text>
  <text x="250" y="151" font-size="8" fill="#555">• Real-user behavior</text>
  <text x="250" y="163" font-size="8" fill="#555">• Error rate (p99)</text>
  <text x="250" y="175" font-size="8" fill="#555">• A/B significance</text>
  <text x="250" y="187" font-size="8" fill="#555">• Business metrics</text>

  <!-- Stage 3 checks -->
  <text x="450" y="138" font-size="8" font-weight="700" fill="#333">Validates:</text>
  <text x="450" y="151" font-size="8" fill="#555">• Progressive exposure</text>
  <text x="450" y="163" font-size="8" fill="#555">• Ensemble interactions</text>
  <text x="450" y="175" font-size="8" fill="#555">• Infrastructure scale</text>
  <text x="450" y="187" font-size="8" fill="#555">• Capacity headroom</text>

  <!-- Stage 4 checks -->
  <text x="650" y="138" font-size="8" font-weight="700" fill="#333">Validates:</text>
  <text x="650" y="151" font-size="8" fill="#555">• Delayed interactions</text>
  <text x="650" y="163" font-size="8" fill="#555">• Feedback loops</text>
  <text x="650" y="175" font-size="8" fill="#555">• Drift over time</text>
  <text x="650" y="187" font-size="8" fill="#555">• Soak stability</text>

  <!-- ===== Rollback triggers ===== -->
  <rect x="50" y="208" width="120" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="110" y="222" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">Rollback trigger:</text>
  <text x="110" y="234" text-anchor="middle" font-size="7.5" fill="#c44">Quality metric</text>
  <text x="110" y="244" text-anchor="middle" font-size="7.5" fill="#c44">below threshold</text>

  <rect x="250" y="208" width="120" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="310" y="222" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">Rollback trigger:</text>
  <text x="310" y="234" text-anchor="middle" font-size="7.5" fill="#c44">Stat. significant</text>
  <text x="310" y="244" text-anchor="middle" font-size="7.5" fill="#c44">regression</text>

  <rect x="450" y="208" width="120" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="510" y="222" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">Rollback trigger:</text>
  <text x="510" y="234" text-anchor="middle" font-size="7.5" fill="#c44">Business metric</text>
  <text x="510" y="244" text-anchor="middle" font-size="7.5" fill="#c44">degradation</text>

  <rect x="650" y="208" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="720" y="222" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">Promotion gate:</text>
  <text x="720" y="234" text-anchor="middle" font-size="7.5" fill="#3d9e5a">7–14 day soak</text>
  <text x="720" y="244" text-anchor="middle" font-size="7.5" fill="#3d9e5a">passes → stable</text>

  <!-- ===== Validation checkpoint rectangles (Gates) ===== -->
  <!-- Between Stage 1 → 2 -->
  <rect x="190" y="254" width="40" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="210" y="267" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">Gate</text>

  <!-- Between Stage 2 → 3 -->
  <rect x="390" y="254" width="40" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="410" y="267" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">Gate</text>

  <!-- Between Stage 3 → 4 -->
  <rect x="590" y="254" width="40" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="610" y="267" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">Gate</text>

  <!-- ===== Stage connector arrows ===== -->
  <line x1="180" y1="184" x2="240" y2="184" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="380" y1="184" x2="440" y2="184" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="580" y1="184" x2="640" y2="184" stroke="#3d9e5a" stroke-width="1.4" marker-end="url(#arrow-green)"/>

  <!-- ===== Auto-rollback orthogonally routed arrows ===== -->
  <!-- Rollback arrows (red lines routed H/V) -->
  <path d="M 210,254 L 210,228 L 170,228" stroke="#a31f34" stroke-width="1.0" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M 410,254 L 410,228 L 370,228" stroke="#a31f34" stroke-width="1.0" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M 610,254 L 610,228 L 570,228" stroke="#a31f34" stroke-width="1.0" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-red)"/>

  <!-- Rollback labels -->
  <text x="190" y="224" text-anchor="middle" font-size="7.5" fill="#a31f34" font-style="italic">rollback</text>
  <text x="390" y="224" text-anchor="middle" font-size="7.5" fill="#a31f34" font-style="italic">rollback</text>
  <text x="590" y="224" text-anchor="middle" font-size="7.5" fill="#a31f34" font-style="italic">rollback</text>

  <!-- ===== Bottom summary bar ===== -->
  <rect x="40" y="345" width="800" height="38" fill="#fff" stroke="#a31f34" stroke-width="1.0"/>
  <text x="440" y="361" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">Ensemble deployments require longer timelines than single-model deployments: interaction effects emerge over days</text>
  <text x="440" y="374" text-anchor="middle" font-size="8.5" fill="#555">Each gate is automated: error rate, latency p99, and business metrics trigger rollback without human intervention</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="440" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Traffic percentages are illustrative; actual thresholds depend on model risk profile and organization policy.</text>
</svg>