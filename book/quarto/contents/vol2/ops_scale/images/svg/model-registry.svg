<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500">
  <defs>
    <marker id="reg-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="out-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <rect width="920" height="500" fill="#fff"/>

  <!-- Left Boxes -->
  <!-- Training Jobs -->
  <rect x="40" y="40" width="130" height="56" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="105" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Training Jobs</text>
  <text x="105" y="78" text-anchor="middle" font-size="8" fill="#555">publish artifacts</text>

  <!-- Audit Log -->
  <rect x="40" y="370" width="130" height="56" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="105" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Audit Log</text>
  <text x="105" y="408" text-anchor="middle" font-size="8" fill="#555">lineage + approvals</text>
  <text x="105" y="420" text-anchor="middle" font-size="8" fill="#555">compliance records</text>

  <!-- Right Boxes -->
  <!-- Experiment Tracker -->
  <rect x="750" y="40" width="130" height="56" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="815" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Experiment</text>
  <text x="815" y="72" text-anchor="middle" font-size="9" fill="#c87b2a" font-weight="600">Tracker</text>
  <text x="815" y="86" text-anchor="middle" font-size="8" fill="#555">metrics + params</text>

  <!-- Serving Systems -->
  <rect x="750" y="370" width="130" height="56" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="815" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Serving</text>
  <text x="815" y="406" text-anchor="middle" font-size="9" fill="#3d9e5a" font-weight="600">Systems</text>
  <text x="815" y="420" text-anchor="middle" font-size="8" fill="#555">pull promoted model</text>

  <!-- Central Registry Hub -->
  <rect x="350" y="160" width="220" height="160" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="460" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Model Registry</text>
  <line x1="370" y1="194" x2="550" y2="194" stroke="#4a90c4" stroke-width="0.6" opacity="0.5"/>

  <!-- Version list inside registry -->
  <rect x="370" y="204" width="180" height="22" fill="#fff" stroke="#4a90c4" stroke-width="0.6"/>
  <text x="380" y="219" font-size="8.5" fill="#4a90c4" font-weight="600">v1.3</text>
  <text x="460" y="219" font-size="8" fill="#555">production</text>
  <circle cx="538" cy="215" r="5" fill="#3d9e5a"/>

  <rect x="370" y="230" width="180" height="22" fill="#fff" stroke="#bbb" stroke-width="0.6"/>
  <text x="380" y="245" font-size="8.5" fill="#4a90c4" font-weight="600">v1.2</text>
  <text x="460" y="245" font-size="8" fill="#555">staging</text>
  <circle cx="538" cy="241" r="5" fill="#c87b2a"/>

  <rect x="370" y="256" width="180" height="22" fill="#fff" stroke="#bbb" stroke-width="0.6"/>
  <text x="380" y="271" font-size="8.5" fill="#999">v1.1</text>
  <text x="460" y="271" font-size="8" fill="#999">archived</text>
  <circle cx="538" cy="267" r="5" fill="#bbb"/>

  <rect x="370" y="282" width="180" height="22" fill="#fff" stroke="#bbb" stroke-width="0.6"/>
  <text x="380" y="297" font-size="8.5" fill="#999">v1.0</text>
  <text x="460" y="297" font-size="8" fill="#999">archived</text>
  <circle cx="538" cy="293" r="5" fill="#bbb"/>

  <!-- Orthogonal Connection Paths -->
  <!-- Path 1: Training -> Registry -->
  <path d="M 170,68 L 310,68 L 310,178 L 350,178" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#reg-arr)"/>
  <text x="240" y="62" text-anchor="middle" font-size="9" fill="#555" font-weight="600">weights + config</text>

  <!-- Path 2: Experiment -> Registry -->
  <path d="M 750,68 L 610,68 L 610,178 L 570,178" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#reg-arr)"/>
  <text x="680" y="62" text-anchor="middle" font-size="9" fill="#555" font-weight="600">run metadata</text>

  <!-- Path 3: Registry (v1.3) -> Serving -->
  <path d="M 570,215 L 610,215 L 610,398 L 750,398" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#out-arr)"/>
  <text x="680" y="392" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="600">deploy v1.3</text>

  <!-- Path 4: Registry (v1.0) -> Audit -->
  <path d="M 350,293 L 310,293 L 310,398 L 170,398" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#out-arr)"/>
  <text x="240" y="392" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="600">immutable log</text>

  <!-- Stage legend -->
  <g transform="translate(352, 345)">
    <text x="0" y="0" font-size="8.5" fill="#555" font-weight="600">Stage:</text>
    <circle cx="44" cy="-3" r="4" fill="#3d9e5a"/>
    <text x="52" y="0" font-size="8" fill="#555">production</text>
    <circle cx="112" cy="-3" r="4" fill="#c87b2a"/>
    <text x="120" y="0" font-size="8" fill="#555">staging</text>
    <circle cx="164" cy="-3" r="4" fill="#bbb"/>
    <text x="172" y="0" font-size="8" fill="#555">archived</text>
  </g>

  <!-- Bottom callout -->
  <rect x="100" y="450" width="720" height="28" fill="#fff" stroke="#a31f34" stroke-width="1.0"/>
  <text x="460" y="468" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="600">Single source of truth: every model artifact, version, and deployment decision is traceable</text>
</svg>