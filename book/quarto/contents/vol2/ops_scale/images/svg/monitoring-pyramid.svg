<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Hierarchical Monitoring Pyramid</text>

  <!-- ===== Pyramid construction: trapezoids from top to bottom ===== -->
  <!-- Layer 4 (top): SLA / Alerts — red accent -->
  <!-- trapezoid: narrow at top, wider at bottom; each layer adds 60px width on each side -->
  <polygon points="275,46 405,46 435,106 245,106" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>

  <!-- Layer 3: Business Metrics — orange -->
  <polygon points="245,110 435,110 475,180 205,180" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- Layer 2: Model Metrics — green -->
  <polygon points="205,184 475,184 525,264 155,264" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>

  <!-- Layer 1 (base): Infrastructure Metrics — blue -->
  <polygon points="155,268 525,268 580,358 100,358" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- ===== Layer labels (centered in each band) ===== -->
  <!-- Layer 4 label -->
  <text x="340" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">SLA / Alerts</text>
  <text x="340" y="88" text-anchor="middle" font-size="8" fill="#c44">P99 latency · error budget burn</text>

  <!-- Layer 3 label -->
  <text x="340" y="138" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Business Metrics</text>
  <text x="340" y="152" text-anchor="middle" font-size="8" fill="#c87b2a">Revenue impact · engagement lift · conversion rate</text>
  <text x="340" y="166" text-anchor="middle" font-size="8" fill="#c87b2a">Alert: Executives / Product Owners</text>

  <!-- Layer 2 label -->
  <text x="340" y="214" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Model Metrics</text>
  <text x="340" y="228" text-anchor="middle" font-size="8" fill="#3d9e5a">Accuracy · AUC · PSI drift · prediction latency p99</text>
  <text x="340" y="242" text-anchor="middle" font-size="8" fill="#3d9e5a">Alert: Model Owners</text>

  <!-- Layer 1 label -->
  <text x="340" y="298" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Infrastructure Metrics</text>
  <text x="340" y="313" text-anchor="middle" font-size="8" fill="#4a90c4">GPU utilization · memory pressure · network throughput</text>
  <text x="340" y="327" text-anchor="middle" font-size="8" fill="#4a90c4">CPU load · disk I/O · request queue depth</text>
  <text x="340" y="341" text-anchor="middle" font-size="8" fill="#4a90c4">Alert: Platform Team</text>

  <!-- ===== Vertical axis arrow ===== -->
  <line x1="68" y1="358" x2="68" y2="46" stroke="#999" stroke-width="1.0" marker-end="url(#arrow)"/>
  <text x="54" y="205" text-anchor="middle" font-size="9" fill="#999" font-weight="600" transform="rotate(-90, 54, 205)">Alert Scope (broad → narrow)</text>

  <!-- ===== Right side: audience annotations ===== -->
  <!-- Brace-style lines pointing at each layer -->
  <!-- Layer 4 annotation -->
  <line x1="436" y1="76" x2="480" y2="76" stroke="#a31f34" stroke-width="1.0" stroke-dasharray="3,2"/>
  <!-- Red pill badge -->
  <rect x="482" y="65" width="90" height="22" fill="#a31f34"/>
  <text x="527" y="80" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Exec / SRE</text>

  <!-- Layer 3 annotation -->
  <line x1="476" y1="144" x2="510" y2="144" stroke="#c87b2a" stroke-width="1.0" stroke-dasharray="3,2"/>
  <rect x="512" y="133" width="110" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="567" y="148" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="700">Product Owners</text>

  <!-- Layer 2 annotation -->
  <line x1="526" y1="224" x2="550" y2="224" stroke="#3d9e5a" stroke-width="1.0" stroke-dasharray="3,2"/>
  <rect x="552" y="213" width="96" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="600" y="228" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">Model Owners</text>

  <!-- Layer 1 annotation -->
  <line x1="581" y1="312" x2="598" y2="312" stroke="#4a90c4" stroke-width="1.0" stroke-dasharray="3,2"/>
  <rect x="600" y="301" width="60" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="630" y="316" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">Infra Team</text>

  <!-- ===== Alert volume axis (right, pointing down = more alerts) ===== -->
  <!-- Removed to keep clean; audience annotations suffice -->

  <!-- ===== Signal aggregation arrow ===== -->
  <!-- Bottom-up aggregation label -->
  <text x="340" y="382" text-anchor="middle" font-size="8.5" fill="#555" font-weight="600">Signal aggregation: Infrastructure alerts roll up into Model, then Portfolio, then Business metrics</text>

  <!-- ===== Bottom summary bar ===== -->
  <rect x="30" y="394" width="620" height="38" fill="#fff" stroke="#a31f34" stroke-width="1.0"/>
  <text x="340" y="410" text-anchor="middle" font-size="9" fill="#a31f34" font-weight="700">100 models × 10 metrics × 3σ threshold = ~3 spurious alerts/day without hierarchical aggregation</text>
  <text x="340" y="423" text-anchor="middle" font-size="8.5" fill="#555">Alert fatigue eliminated by routing low-level signals through portfolio aggregation before escalation</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Pyramid layers correspond to the four-level hierarchy described in @sec-ml-operations-scale-hierarchical-monitoring-architecture-407d.</text>
</svg>