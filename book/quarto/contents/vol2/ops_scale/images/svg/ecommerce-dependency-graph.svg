<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>
  </defs>

  <rect x="10" y="10" width="660" height="440" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Layer labels on left side -->
  <text x="28" y="72" font-size="10" fill="#999" font-weight="bold">LAYER 0</text>
  <text x="28" y="84" font-size="10" fill="#999">Data Sources</text>

  <text x="28" y="162" font-size="10" fill="#999" font-weight="bold">LAYER 1</text>
  <text x="28" y="174" font-size="10" fill="#999">Embeddings</text>

  <text x="28" y="252" font-size="10" fill="#999" font-weight="bold">LAYER 2</text>
  <text x="28" y="264" font-size="10" fill="#999">Retrieval</text>

  <text x="28" y="342" font-size="10" fill="#999" font-weight="bold">LAYER 3</text>
  <text x="28" y="354" font-size="10" fill="#999">Ranking</text>

  <text x="28" y="420" font-size="10" fill="#999" font-weight="bold">LAYER 4</text>
  <text x="28" y="432" font-size="10" fill="#999">Rules</text>

  <!-- ── LAYER 0: Data sources (gray) ── -->
  <rect x="130" y="50" width="175" height="46" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="217.5" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">User Behavior Logs</text>
  <text x="217.5" y="87" text-anchor="middle" font-size="10" fill="#999">clicks, sessions, dwell time</text>

  <rect x="375" y="50" width="175" height="46" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <text x="462.5" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Product Catalog</text>
  <text x="462.5" y="87" text-anchor="middle" font-size="10" fill="#999">titles, categories, attributes</text>

  <!-- ── LAYER 1: Embeddings (blue) ── -->
  <!-- User Embedding — CRITICAL NODE (bold border, double stroke) -->
  <rect x="120" y="140" width="195" height="46" fill="#cfe2f3" stroke="#4a90c4" stroke-width="3.5"/>
  <rect x="122" y="142" width="191" height="42" fill="none" stroke="#4a90c4" stroke-width="1"/>
  <text x="217.5" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">User Embedding</text>
  <text x="217.5" y="177" text-anchor="middle" font-size="10" fill="#4a90c4">★ Critical Node — feeds 2 paths</text>

  <rect x="365" y="140" width="195" height="46" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="462.5" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a90c4">Product Embedding</text>
  <text x="462.5" y="177" text-anchor="middle" font-size="10" fill="#4a90c4">item vectors, semantic similarity</text>

  <!-- ── LAYER 2: Retrieval & Sensitivity (green) ── -->
  <rect x="120" y="230" width="195" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="217.5" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">Candidate Retrieval</text>
  <text x="217.5" y="267" text-anchor="middle" font-size="10" fill="#3d9e5a">ANN search, top-k items</text>

  <rect x="365" y="230" width="195" height="46" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="462.5" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="#3d9e5a">Price Sensitivity Model</text>
  <text x="462.5" y="267" text-anchor="middle" font-size="10" fill="#3d9e5a">willingness-to-pay estimates</text>

  <!-- ── LAYER 3: Ranking (orange) ── -->
  <rect x="242" y="320" width="195" height="46" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="339.5" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#c87b2a">Ranking Model</text>
  <text x="339.5" y="357" text-anchor="middle" font-size="10" fill="#c87b2a">joint optimization, pCTR × pBuy</text>

  <!-- ── LAYER 4: Business Rules (red) ── -->
  <rect x="242" y="400" width="195" height="44" fill="#f9d6d5" stroke="#c44" stroke-width="1.8"/>
  <text x="339.5" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31f34">Business Rules Engine</text>
  <text x="339.5" y="437" text-anchor="middle" font-size="10" fill="#c44">inventory, promotions, compliance</text>

  <!-- ── ARROWS ── -->
  <!-- L0 → L1 -->
  <line x1="217.5" y1="96" x2="217.5" y2="140" stroke="#999" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <line x1="462.5" y1="96" x2="462.5" y2="140" stroke="#999" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- L1 User Embedding → L2 Candidate Retrieval -->
  <line x1="217.5" y1="186" x2="217.5" y2="230" stroke="#4a90c4" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- L1 User Embedding → L2 Price Sensitivity (cross) -->
  <path d="M315,168 L335,168 L335,248 L365,248" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- L1 Product Embedding → L2 Candidate Retrieval (cross) -->
  <path d="M365,158 L345,158 L345,258 L315,258" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>

  <!-- L1 Product Embedding → L2 Price Sensitivity -->
  <line x1="462.5" y1="186" x2="462.5" y2="230" stroke="#4a90c4" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- L2 → L3 -->
  <path d="M249.5,276 L249.5,298 L309.5,298 L309.5,320" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <path d="M429.5,276 L429.5,298 L369.5,298 L369.5,320" fill="none" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- L3 → L4 -->
  <line x1="339.5" y1="366" x2="339.5" y2="400" stroke="#c87b2a" stroke-width="1.8" marker-end="url(#arrow-orange)"/>
</svg>