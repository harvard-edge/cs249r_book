<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Datacenter Cooling: Air vs. Liquid</text>

  <!-- Panel divider -->
  <line x1="340" y1="38" x2="340" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Air Cooling ===== -->
  <text x="170" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Air Cooling (Legacy)</text>
  <text x="170" y="63" text-anchor="middle" font-size="8.5" fill="#c44">Problem: High PUE, limited power density</text>

  <!-- Rack outline -->
  <rect x="70" y="78" width="120" height="250" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="130" y="95" text-anchor="middle" font-size="9" font-weight="700" fill="#555">GPU Rack</text>

  <!-- GPU servers in rack -->
  <rect x="80" y="100" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="112" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 1</text>
  <rect x="80" y="120" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="132" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 2</text>
  <rect x="80" y="140" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="152" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 3</text>
  <rect x="80" y="160" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="172" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 4</text>
  <rect x="80" y="180" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="192" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 5</text>
  <rect x="80" y="200" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="212" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 6</text>
  <rect x="80" y="220" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="232" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 7</text>
  <rect x="80" y="240" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="252" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 8</text>

  <!-- Fans at bottom of rack -->
  <rect x="80" y="265" width="100" height="22" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="280" text-anchor="middle" font-size="8" fill="#555">Fans (30–40% power)</text>

  <!-- Fan symbols -->
  <circle cx="100" cy="280" r="6" fill="none" stroke="#777" stroke-width="1"/>
  <line x1="100" y1="274" x2="100" y2="286" stroke="#777" stroke-width="1"/>
  <line x1="94" y1="280" x2="106" y2="280" stroke="#777" stroke-width="1"/>
  <circle cx="130" cy="280" r="6" fill="none" stroke="#777" stroke-width="1"/>
  <line x1="130" y1="274" x2="130" y2="286" stroke="#777" stroke-width="1"/>
  <line x1="124" y1="280" x2="136" y2="280" stroke="#777" stroke-width="1"/>
  <circle cx="160" cy="280" r="6" fill="none" stroke="#777" stroke-width="1"/>
  <line x1="160" y1="274" x2="160" y2="286" stroke="#777" stroke-width="1"/>
  <line x1="154" y1="280" x2="166" y2="280" stroke="#777" stroke-width="1"/>

  <!-- Cold air in from front (left) -->
  <path d="M30,195 L70,195" fill="none" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M30,210 L70,210" fill="none" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M30,225 L70,225" fill="none" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="50" y="175" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Cold Air</text>
  <text x="50" y="186" text-anchor="middle" font-size="8" fill="#4a90c4">inlet</text>
  <text x="50" y="243" text-anchor="middle" font-size="7.5" fill="#4a90c4">20°C</text>

  <!-- Hot air out from rear (right) -->
  <path d="M190,185 L225,185" fill="none" stroke="#c44" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M190,200 L225,200" fill="none" stroke="#c44" stroke-width="2" marker-end="url(#arrow-red)"/>
  <path d="M190,215 L225,215" fill="none" stroke="#c44" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="237" y="185" font-size="8.5" font-weight="700" fill="#c44">Hot Air</text>
  <text x="237" y="196" font-size="8" fill="#c44">exhaust</text>
  <text x="237" y="220" font-size="7.5" fill="#c44">35–40°C</text>

  <!-- Air cooling metrics -->
  <rect x="50" y="310" width="250" height="85" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="175" y="327" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Air Cooling Metrics</text>
  <text x="175" y="342" text-anchor="middle" font-size="9" fill="#555">Power density: 20–30 kW / rack</text>
  <text x="175" y="356" text-anchor="middle" font-size="9" fill="#555">PUE: 1.4–2.0</text>
  <text x="175" y="370" text-anchor="middle" font-size="9" fill="#555">Fan power: 30–40% of IT load</text>
  <text x="175" y="384" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Fails above 40 kW/rack</text>

  <!-- PUE badge air -->
  <rect x="88" y="294" width="84" height="20" rx="10" fill="#c44"/>
  <text x="130" y="308" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">PUE = 1.4–2.0</text>

  <!-- ===== RIGHT: Liquid Cooling ===== -->
  <text x="510" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Liquid Cooling (Modern)</text>
  <text x="510" y="63" text-anchor="middle" font-size="8.5" fill="#3d9e5a">Solution: Low PUE, high power density</text>

  <!-- Rack outline -->
  <rect x="415" y="78" width="120" height="250" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="475" y="95" text-anchor="middle" font-size="9" font-weight="700" fill="#555">GPU Rack</text>

  <!-- GPU servers in rack with cold plates -->
  <rect x="425" y="100" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <rect x="522" y="103" width="5" height="10" rx="1" fill="#4a90c4"/>
  <text x="472" y="112" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 1  ■</text>
  <rect x="425" y="120" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="132" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 2  ■</text>
  <rect x="425" y="140" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="152" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 3  ■</text>
  <rect x="425" y="160" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="172" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 4  ■</text>
  <rect x="425" y="180" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="192" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 5  ■</text>
  <rect x="425" y="200" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="212" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 6  ■</text>
  <rect x="425" y="220" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="232" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 7  ■</text>
  <rect x="425" y="240" width="100" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="472" y="252" text-anchor="middle" font-size="7.5" fill="#555">GPU Node 8  ■</text>

  <!-- Cold plate legend -->
  <text x="540" y="132" font-size="7" fill="#4a90c4">■ cold</text>
  <text x="540" y="142" font-size="7" fill="#4a90c4">   plate</text>

  <!-- CDU at bottom of rack -->
  <rect x="425" y="262" width="100" height="24" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="475" y="278" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">CDU (manifold)</text>

  <!-- Coolant supply pipe (blue, cool) -->
  <line x1="380" y1="140" x2="415" y2="140" stroke="#4a90c4" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="365" y="130" text-anchor="end" font-size="8" fill="#4a90c4">Cool</text>
  <text x="365" y="141" text-anchor="end" font-size="8" fill="#4a90c4">water</text>
  <text x="365" y="152" text-anchor="end" font-size="7.5" fill="#4a90c4">18°C</text>

  <!-- Coolant return pipe (orange/red, warm) -->
  <line x1="415" y1="220" x2="380" y2="220" stroke="#c44" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="365" y="210" text-anchor="end" font-size="8" fill="#c44">Warm</text>
  <text x="365" y="221" text-anchor="end" font-size="8" fill="#c44">return</text>
  <text x="365" y="232" text-anchor="end" font-size="7.5" fill="#c44">45°C</text>

  <!-- Pipe routing to CDU on right side -->
  <line x1="535" y1="108" x2="555" y2="108" stroke="#4a90c4" stroke-width="2"/>
  <line x1="555" y1="108" x2="555" y2="274" stroke="#4a90c4" stroke-width="2"/>
  <line x1="555" y1="274" x2="535" y2="274" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- External heat exchanger -->
  <rect x="600" y="155" width="55" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="627" y="176" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">Heat</text>
  <text x="627" y="188" text-anchor="middle" font-size="8" fill="#3d9e5a">Exchanger</text>
  <text x="627" y="200" text-anchor="middle" font-size="7.5" fill="#555">→ building</text>

  <line x1="535" y1="186" x2="600" y2="186" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="563" y="181" text-anchor="middle" font-size="7.5" fill="#3d9e5a">to HX</text>

  <!-- Liquid cooling metrics -->
  <rect x="350" y="310" width="295" height="85" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="497" y="327" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Liquid Cooling Metrics</text>
  <text x="497" y="342" text-anchor="middle" font-size="9" fill="#555">Power density: 100–200 kW / rack</text>
  <text x="497" y="356" text-anchor="middle" font-size="9" fill="#555">PUE: 1.05–1.10</text>
  <text x="497" y="370" text-anchor="middle" font-size="9" fill="#555">Cooling power: &lt;5% of IT load</text>
  <text x="497" y="384" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Required above 40 kW/rack (ML clusters)</text>

  <!-- PUE badge liquid -->
  <rect x="431" y="294" width="84" height="20" rx="10" fill="#3d9e5a"/>
  <text x="473" y="308" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">PUE = 1.05–1.10</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">At 40+ kW per rack, air cooling fan power approaches compute power — liquid cooling is a thermodynamic requirement, not a premium option.</text>
</svg>
