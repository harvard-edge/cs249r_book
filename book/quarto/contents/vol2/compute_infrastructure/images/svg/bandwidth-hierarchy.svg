<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Accelerator Bandwidth Hierarchy: Concentric Zones</text>
  <text x="340" y="42" text-anchor="middle" font-size="9" fill="#555">Each boundary crossing drops bandwidth by ~10× and raises latency by ~10×</text>

  <!-- ===== Concentric zones (center at 340, 255, working outward) ===== -->

  <!-- Zone 4: Storage (outermost) — red -->
  <ellipse cx="340" cy="250" rx="300" ry="185" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>

  <!-- Zone 3: InfiniBand — orange -->
  <ellipse cx="340" cy="250" rx="238" ry="150" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- Zone 2: NVLink — green -->
  <ellipse cx="340" cy="250" rx="170" ry="112" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>

  <!-- Zone 1: HBM (innermost) — blue -->
  <ellipse cx="340" cy="250" rx="95" ry="65" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- ===== Zone Labels ===== -->

  <!-- HBM label (center) -->
  <text x="340" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#333">HBM</text>
  <text x="340" y="254" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4a90c4">3.35 TB/s</text>
  <text x="340" y="267" text-anchor="middle" font-size="8.5" fill="#555">~100 ns latency</text>
  <text x="340" y="279" text-anchor="middle" font-size="8" fill="#555">on-package</text>

  <!-- NVLink label -->
  <text x="340" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#333">NVLink / NVSwitch</text>
  <text x="340" y="175" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">900 GB/s</text>
  <text x="340" y="188" text-anchor="middle" font-size="8.5" fill="#555">1–5 μs latency</text>
  <text x="340" y="200" text-anchor="middle" font-size="8" fill="#555">intra-node (8 GPUs)</text>

  <!-- InfiniBand label -->
  <text x="340" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#333">InfiniBand NDR</text>
  <text x="340" y="125" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">50 GB/s</text>
  <text x="340" y="138" text-anchor="middle" font-size="8.5" fill="#555">2–10 μs latency</text>
  <text x="340" y="150" text-anchor="middle" font-size="8" fill="#555">inter-node (100s of nodes)</text>

  <!-- Storage label -->
  <text x="340" y="75" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Storage / Network File System</text>
  <text x="340" y="88" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">7 GB/s</text>
  <text x="340" y="101" text-anchor="middle" font-size="8.5" fill="#555">ms latency</text>

  <!-- ===== Right-side bandwidth scale (log scale bar) ===== -->
  <text x="618" y="55" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bandwidth</text>
  <text x="618" y="67" text-anchor="middle" font-size="8.5" fill="#555">(log scale)</text>

  <!-- Log scale bar -->
  <rect x="595" y="75" width="22" height="330" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- HBM marker -->
  <rect x="595" y="78" width="22" height="60" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0"/>
  <text x="590" y="100.0" text-anchor="end" font-size="8.5" font-weight="700" fill="#4a90c4">3.35 TB/s</text>
  <line x1="591" y1="108" x2="595" y2="108" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- NVLink marker -->
  <rect x="595" y="138" width="22" height="80" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0"/>
  <text x="590" y="165.0" text-anchor="end" font-size="8.5" font-weight="700" fill="#3d9e5a">900 GB/s</text>
  <line x1="591" y1="173" x2="595" y2="173" stroke="#3d9e5a" stroke-width="1.2"/>

  <!-- InfiniBand marker -->
  <rect x="595" y="218" width="22" height="100" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0"/>
  <text x="590" y="255.0" text-anchor="end" font-size="8.5" font-weight="700" fill="#c87b2a">50 GB/s</text>
  <line x1="591" y1="263" x2="595" y2="263" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Storage marker -->
  <rect x="595" y="318" width="22" height="87" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0"/>
  <text x="590" y="350.0" text-anchor="end" font-size="8.5" font-weight="700" fill="#c44">7 GB/s</text>
  <line x1="591" y1="358" x2="595" y2="358" stroke="#c44" stroke-width="1.2"/>

  <!-- Scale bar border -->
  <rect x="595" y="75" width="22" height="330" rx="2" fill="none" stroke="#bbb" stroke-width="1"/>
  <text x="606" y="420" text-anchor="middle" font-size="7.5" fill="#999">0</text>

  <!-- ===== Bandwidth drop annotations ===== -->
  <!-- HBM to NVLink gap -->
  <line x1="435" y1="200" x2="490" y2="173" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>
  <rect x="437" y="200" width="50" height="18" rx="12" fill="#a31f34"/>
  <text x="462" y="213" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">~3.7× drop</text>

  <!-- NVLink to IB gap -->
  <line x1="440" y1="135" x2="490" y2="125" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>
  <rect x="437" y="127" width="50" height="18" rx="12" fill="#a31f34"/>
  <text x="462" y="140" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">~18× drop</text>

  <!-- IB to Storage gap -->
  <line x1="460" y1="90" x2="490" y2="85" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>
  <rect x="437" y="77" width="50" height="18" rx="12" fill="#a31f34"/>
  <text x="462" y="90" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">~7× drop</text>

  <!-- Zone scope indicators (left side) -->
  <text x="55" y="258" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">On-Package</text>
  <text x="55" y="270" text-anchor="middle" font-size="7.5" fill="#555">HBM + GPU die</text>

  <text x="55" y="200" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">Intra-Node</text>
  <text x="55" y="212" text-anchor="middle" font-size="7.5" fill="#555">8 GPUs / chassis</text>

  <text x="55" y="145" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="700">Inter-Node</text>
  <text x="55" y="157" text-anchor="middle" font-size="7.5" fill="#555">cluster network</text>

  <text x="55" y="100" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">Persistent</text>
  <text x="55" y="112" text-anchor="middle" font-size="7.5" fill="#555">storage / NFS</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Parallelism strategy must respect zone boundaries: tensor parallelism stays intra-node (NVLink), pipeline parallelism spans nodes (InfiniBand).</text>
</svg>