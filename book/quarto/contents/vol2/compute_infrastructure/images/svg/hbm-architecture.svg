<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">HBM Architecture: 3D-Stacked Memory on Silicon Interposer</text>

  <!-- ===== Section divider: HBM vs DDR ===== -->
  <line x1="340" y1="40" x2="340" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="175" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#333">HBM Assembly (On-Package)</text>
  <text x="510" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#555">DDR Reference (Off-Package)</text>

  <!-- ===== Silicon Interposer ===== -->
  <rect x="30" y="345" width="285" height="30" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="172.5" y="364" text-anchor="middle" font-size="9.5" font-weight="700" fill="#555">Silicon Interposer (passive routing layer)</text>

  <!-- ===== GPU Die on Interposer ===== -->
  <rect x="30" y="290" width="115" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="87.5" y="312" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Die</text>
  <text x="87.5" y="326" text-anchor="middle" font-size="8.5" fill="#555">Tensor Cores</text>
  <text x="87.5" y="337" text-anchor="middle" font-size="8.5" fill="#555">528 × SM</text>

  <!-- GPU Badge -->
  <rect x="35" y="265" width="56" height="16" rx="2" fill="#a31f34"/>
  <text x="63" y="277" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">H100 SXM</text>

  <!-- ===== HBM Stacks ===== -->
  <!-- HBM Stack 1 -->
  <rect x="175" y="60" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="90" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="120" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="150" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="180" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="210" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="240" width="60" height="25" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="270" width="60" height="20" rx="2" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>

  <!-- HBM Stack 1 labels -->
  <text x="205" y="76" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">DRAM Die 8</text>
  <text x="205" y="106" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 7</text>
  <text x="205" y="136" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 6</text>
  <text x="205" y="166" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 5</text>
  <text x="205" y="196" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 4</text>
  <text x="205" y="226" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 3</text>
  <text x="205" y="256" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 2</text>
  <text x="205" y="283" text-anchor="middle" font-size="7.5" fill="#555">Base Die + TSV</text>

  <!-- HBM Stack 1 label -->
  <text x="205" y="57" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">HBM Stack 1</text>

  <!-- HBM Stack 2 (abbreviated) -->
  <rect x="248" y="135" width="60" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="160" width="60" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="185" width="60" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="210" width="60" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="235" width="60" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="260" width="60" height="15" rx="2" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="278" y="129" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">HBM Stack 2</text>
  <text x="278" y="150" text-anchor="middle" font-size="8" fill="#555">···</text>

  <!-- TSV arrows between dies -->
  <!-- Vertical arrows showing TSV connections -->
  <line x1="205" y1="86" x2="205" y2="90" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="116" x2="205" y2="120" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="146" x2="205" y2="150" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="176" x2="205" y2="180" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="206" x2="205" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="236" x2="205" y2="240" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="266" x2="205" y2="270" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- TSV label -->
  <text x="163" y="183" text-anchor="middle" font-size="8" fill="#3d9e5a" transform="rotate(-90 163 183)">TSVs (1024-bit)</text>

  <!-- Microbump connection HBM to interposer -->
  <line x1="205" y1="291" x2="205" y2="345" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="218" y="320" font-size="8" fill="#555">microbumps</text>

  <!-- Connection GPU to Interposer to HBM -->
  <line x1="135" y1="305" x2="175" y2="305" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bandwidth annotation -->
  <rect x="38" y="240" width="118" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="97" y="255" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">3.35 TB/s</text>
  <text x="97" y="268" text-anchor="middle" font-size="8.5" fill="#555">HBM3 bandwidth</text>
  <text x="97" y="278" text-anchor="middle" font-size="8" fill="#555">80 GB capacity</text>

  <!-- ===== DDR Comparison (right side) ===== -->
  <!-- PCB board -->
  <rect x="360" y="340" width="280" height="35" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="500" y="362" text-anchor="middle" font-size="9" font-weight="700" fill="#555">PCB Motherboard (centimeter traces)</text>

  <!-- CPU on PCB -->
  <rect x="370" y="285" width="90" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="415" y="310" text-anchor="middle" font-size="10" font-weight="700" fill="#333">CPU Die</text>
  <text x="415" y="325" text-anchor="middle" font-size="8.5" fill="#555">Memory Ctrl</text>

  <!-- DDR DIMM slots -->
  <rect x="505" y="80" width="80" height="240" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="545" y="73" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">DDR5 DIMM</text>
  <!-- DIMM detail -->
  <rect x="515" y="90" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="118" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="146" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="174" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="202" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="230" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="258" width="60" height="20" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="515" y="286" width="60" height="25" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="545" y="100" text-anchor="middle" font-size="7.5" fill="#555">DRAM chip</text>
  <text x="545" y="298" text-anchor="middle" font-size="7.5" fill="#555">Connector</text>

  <!-- Long PCB trace connection -->
  <line x1="460" y1="305" x2="505" y2="305" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="483" y="295" text-anchor="middle" font-size="8" fill="#c44">64-bit bus</text>
  <text x="483" y="320" text-anchor="middle" font-size="8" fill="#c44">~15 cm trace</text>

  <!-- DDR bandwidth annotation -->
  <rect x="360" y="240" width="118" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="419" y="255" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">~200 GB/s</text>
  <text x="419" y="268" text-anchor="middle" font-size="8.5" fill="#555">DDR5 bandwidth</text>
  <text x="419" y="278" text-anchor="middle" font-size="8" fill="#555">16× slower than HBM</text>

  <!-- Energy comparison badges -->
  <rect x="38" y="395" width="130" height="18" rx="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="103" y="408" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">HBM: ~2 pJ/bit</text>

  <rect x="490" y="395" width="135" height="18" rx="12" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="557.5" y="408" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">DDR5: ~20 pJ/bit</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">HBM's 1024-bit TSV bus replaces centimeter PCB traces with micrometer vertical paths — 10× lower energy per bit.</text>
</svg>