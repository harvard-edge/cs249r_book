<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">HBM Architecture: 3D-Stacked Memory on Silicon Interposer</text>

  <!-- ===== Section divider: HBM vs DDR ===== -->
  <line x1="340" y1="40" x2="340" y2="430" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="175" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#333">HBM Assembly (On-Package)</text>
  <text x="510" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#555">DDR Reference (Off-Package)</text>

  <!-- ===== Silicon Interposer ===== -->
  <rect x="30" y="355" width="285" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="172.5" y="374" text-anchor="middle" font-size="9.5" font-weight="700" fill="#555">Silicon Interposer (passive routing layer)</text>

  <!-- ===== GPU Die on Interposer ===== -->
  <rect x="30" y="305" width="115" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="87.5" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Die</text>
  <text x="87.5" y="341" text-anchor="middle" font-size="8.5" fill="#555">Tensor Cores</text>
  <text x="87.5" y="352" text-anchor="middle" font-size="8.5" fill="#555">528 × SM</text>

  <!-- GPU Badge -->
  <rect x="35" y="275" width="56" height="16" fill="#a31f34"/>
  <text x="63" y="287" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">H100 SXM</text>

  <!-- ===== HBM Stacks ===== -->
  <!-- HBM Stack 1 -->
  <rect x="175" y="60" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="95" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="130" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="165" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="200" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="235" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="270" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="175" y="305" width="60" height="20" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>

  <!-- HBM Stack 1 labels -->
  <text x="205" y="74" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">DRAM Die 8</text>
  <text x="205" y="109" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 7</text>
  <text x="205" y="144" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 6</text>
  <text x="205" y="179" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 5</text>
  <text x="205" y="214" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 4</text>
  <text x="205" y="249" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 3</text>
  <text x="205" y="284" text-anchor="middle" font-size="8.5" fill="#555">DRAM Die 2</text>
  <text x="205" y="319" text-anchor="middle" font-size="7.5" fill="#555">Base Die + TSV</text>

  <!-- HBM Stack 1 label -->
  <text x="205" y="56" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">HBM Stack 1</text>

  <!-- HBM Stack 2 (abbreviated) -->
  <rect x="248" y="130" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="165" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="200" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="235" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="270" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <rect x="248" y="305" width="60" height="20" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="278" y="122" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">HBM Stack 2</text>
  <text x="278" y="115" text-anchor="middle" font-size="8" fill="#555" transform="rotate(90 278 115)">···</text>

  <!-- TSV arrows between dies -->
  <!-- Vertical arrows showing TSV connections -->
  <line x1="205" y1="80" x2="205" y2="95" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="115" x2="205" y2="130" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="150" x2="205" y2="165" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="185" x2="205" y2="200" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="220" x2="205" y2="235" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="255" x2="205" y2="270" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="205" y1="290" x2="205" y2="305" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- TSV label -->
  <text x="160" y="192" text-anchor="middle" font-size="8" fill="#3d9e5a" transform="rotate(-90 160 192)">TSVs (1024-bit)</text>

  <!-- Microbump connection HBM to interposer -->
  <line x1="205" y1="325" x2="205" y2="355" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="218" y="343" font-size="8" fill="#555">microbumps</text>

  <!-- Connection GPU to Interposer to HBM -->
  <line x1="145" y1="315" x2="175" y2="315" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bandwidth annotation -->
  <rect x="38" y="220" width="118" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="97" y="235" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">3.35 TB/s</text>
  <text x="97" y="248" text-anchor="middle" font-size="8.5" fill="#555">HBM3 bandwidth</text>
  <text x="97" y="258" text-anchor="middle" font-size="8" fill="#555">80 GB capacity</text>

  <!-- ===== DDR Comparison (right side) ===== -->
  <!-- PCB board -->
  <rect x="360" y="355" width="280" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="500" y="374" text-anchor="middle" font-size="9" font-weight="700" fill="#555">PCB Motherboard (centimeter traces)</text>

  <!-- CPU on PCB -->
  <rect x="370" y="305" width="90" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="415" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#333">CPU Die</text>
  <text x="415" y="345" text-anchor="middle" font-size="8.5" fill="#555">Memory Ctrl</text>

  <!-- DDR DIMM slots -->
  <rect x="505" y="60" width="80" height="295" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="545" y="56" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">DDR5 DIMM</text>
  <!-- DIMM detail -->
  <rect x="515" y="70" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="105" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="140" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="175" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="210" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="245" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="280" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="515" y="320" width="60" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="545" y="84" text-anchor="middle" font-size="8.5" fill="#555">DRAM chip</text>
  <text x="545" y="337" text-anchor="middle" font-size="7.5" fill="#555">Connector</text>

  <!-- Long PCB trace connection -->
  <line x1="460" y1="330" x2="505" y2="330" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="483" y="320" text-anchor="middle" font-size="8" fill="#c44">64-bit bus</text>
  <text x="483" y="345" text-anchor="middle" font-size="8" fill="#c44">~15 cm trace</text>

  <!-- DDR bandwidth annotation -->
  <rect x="360" y="220" width="118" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="419" y="235" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">~200 GB/s</text>
  <text x="419" y="248" text-anchor="middle" font-size="8.5" fill="#555">DDR5 bandwidth</text>
  <text x="419" y="258" text-anchor="middle" font-size="8" fill="#555">16× slower than HBM</text>

  <!-- Energy comparison badges -->
  <rect x="38" y="405" width="130" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="103" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">HBM: ~2 pJ/bit</text>

  <rect x="490" y="405" width="135" height="18" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="557.5" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">DDR5: ~20 pJ/bit</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">HBM's 1024-bit TSV bus replaces centimeter PCB traces with micrometer vertical paths — 10× lower energy per bit.</text>
</svg>