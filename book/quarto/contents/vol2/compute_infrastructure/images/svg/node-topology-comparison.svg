<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Intra-Node GPU Topology Comparison</text>

  <!-- ===== Panel dividers ===== -->
  <line x1="227" y1="40" x2="227" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="454" y1="40" x2="454" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Panel 1: Ring Topology ===== -->
  <text x="113" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Ring</text>
  <text x="113" y="65" text-anchor="middle" font-size="8.5" fill="#555">Sequential pass-through</text>

  <!-- Ring: 8 GPUs in octagon, center at (113, 195) -->
  <!-- GPU positions around ring (r=85) -->
  <!-- GPU 0: top (113, 110) -->
  <!-- GPU 1: top-right (173, 130) -->
  <!-- GPU 2: right (198, 190) -->
  <!-- GPU 3: bottom-right (173, 255) -->
  <!-- GPU 4: bottom (113, 278) -->
  <!-- GPU 5: bottom-left (53, 255) -->
  <!-- GPU 6: left (28, 190) -->
  <!-- GPU 7: top-left (53, 130) -->

  <!-- Ring arrows (sequential) -->
  <line x1="133" y1="118" x2="163" y2="135" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="187" y1="148" x2="192" y2="178" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="186" y1="208" x2="172" y2="240" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="153" y1="262" x2="133" y2="272" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="93" y1="272" x2="73" y2="262" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="54" y1="240" x2="40" y2="208" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="34" y1="178" x2="40" y2="148" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="63" y1="135" x2="93" y2="118" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GPU nodes -->
  <rect x="96" y="100" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="113" y="115" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0</text>

  <rect x="160" y="120" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="177" y="135" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1</text>

  <rect x="185" y="180" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="202" y="195" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2</text>

  <rect x="160" y="248" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="177" y="263" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3</text>

  <rect x="96" y="268" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="113" y="283" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G4</text>

  <rect x="32" y="248" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="49" y="263" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G5</text>

  <rect x="8" y="180" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="25" y="195" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G6</text>

  <rect x="32" y="120" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="49" y="135" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G7</text>

  <!-- Ring stats -->
  <rect x="20" y="305" width="185" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="112.5" y="320" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Ring Properties</text>
  <text x="112.5" y="333" text-anchor="middle" font-size="8" fill="#555">Bandwidth per link: ~50 GB/s</text>
  <text x="112.5" y="346" text-anchor="middle" font-size="8" fill="#555">Hops for G0→G4: 4 hops</text>
  <text x="112.5" y="359" text-anchor="middle" font-size="8" fill="#c44">Latency scales with distance</text>

  <!-- ===== Panel 2: Full Mesh ===== -->
  <text x="340" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Full Mesh</text>
  <text x="340" y="65" text-anchor="middle" font-size="8.5" fill="#555">All-to-all direct links</text>

  <!-- Full mesh: 4 GPUs in square for clarity (representing 8-GPU all-to-all) -->
  <!-- G0: 280,115  G1: 395,115  G2: 280,275  G3: 395,275 -->

  <!-- Mesh cross-links -->
  <line x1="297" y1="122" x2="393" y2="122" stroke="#4a90c4" stroke-width="1"/>
  <line x1="297" y1="279" x2="393" y2="279" stroke="#4a90c4" stroke-width="1"/>
  <line x1="285" y1="135" x2="285" y2="261" stroke="#4a90c4" stroke-width="1"/>
  <line x1="404" y1="135" x2="404" y2="261" stroke="#4a90c4" stroke-width="1"/>
  <!-- Diagonal links -->
  <line x1="297" y1="134" x2="393" y2="261" stroke="#4a90c4" stroke-width="1"/>
  <line x1="393" y1="134" x2="297" y2="261" stroke="#4a90c4" stroke-width="1"/>

  <!-- Additional mesh GPUs for 8-GPU representation -->
  <!-- G4: 250,195  G5: 430,195  G6: 335,95  G7: 335,300 -->
  <line x1="267" y1="195" x2="278" y2="115" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="267" y1="195" x2="278" y2="275" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="267" y1="195" x2="398" y2="115" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="267" y1="195" x2="398" y2="275" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="267" y1="195" x2="415" y2="195" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>

  <line x1="350" y1="95" x2="280" y2="115" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="350" y1="95" x2="400" y2="115" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>

  <!-- GPU nodes for mesh -->
  <rect x="263" y="103" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="280" y="108.0" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0</text>

  <rect x="380" y="103" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="397" y="108.0" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1</text>

  <rect x="263" y="262" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="280" y="267.0" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2</text>

  <rect x="380" y="262" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="397" y="267.0" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3</text>

  <!-- Peripheral GPUs -->
  <rect x="231" y="181" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="248" y="196" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G4</text>

  <rect x="415" y="181" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="432" y="196" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G5</text>

  <rect x="323" y="82" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="96" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G6</text>

  <rect x="323" y="298" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="313" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G7</text>

  <!-- Mesh stats -->
  <rect x="245" y="328" width="185" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="337.5" y="343" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Mesh Properties</text>
  <text x="337.5" y="356" text-anchor="middle" font-size="8" fill="#555">Links per GPU: N-1 = 7</text>
  <text x="337.5" y="369" text-anchor="middle" font-size="8" fill="#555">Cable count grows O(N²)</text>
  <text x="337.5" y="382" text-anchor="middle" font-size="8" fill="#c44">Impractical beyond ~8 GPUs</text>

  <!-- ===== Panel 3: NVSwitch Crossbar ===== -->
  <text x="567" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">NVSwitch Crossbar</text>
  <text x="567" y="65" text-anchor="middle" font-size="8.5" fill="#3d9e5a">Non-blocking fabric</text>

  <!-- Central NVSwitch chip -->
  <rect x="514" y="160" width="106" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="567" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">NVSwitch</text>
  <text x="567" y="210" text-anchor="middle" font-size="8.5" fill="#555">Crossbar Fabric</text>
  <text x="567" y="223" text-anchor="middle" font-size="8" fill="#555">Non-blocking</text>

  <!-- 8 GPUs connected to NVSwitch -->
  <!-- Left column: G0,G2,G4,G6 -->
  <rect x="463" y="83" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="480" y="98" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0</text>
  <line x1="497" y1="94" x2="514" y2="175" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="463" y="143" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="480" y="158" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2</text>
  <line x1="497" y1="154" x2="514" y2="185" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="463" y="213" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="480" y="228" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G4</text>
  <line x1="497" y1="224" x2="514" y2="215" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="463" y="273" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="480" y="288" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G6</text>
  <line x1="497" y1="284" x2="514" y2="230" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Right column: G1,G3,G5,G7 -->
  <rect x="637" y="83" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="654" y="98" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1</text>
  <line x1="637" y1="94" x2="620" y2="175" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="637" y="143" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="654" y="158" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3</text>
  <line x1="637" y1="154" x2="620" y2="185" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="637" y="213" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="654" y="228" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G5</text>
  <line x1="637" y1="224" x2="620" y2="215" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="637" y="273" width="34" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="654" y="288" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G7</text>
  <line x1="637" y1="284" x2="620" y2="230" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- NVSwitch bandwidth label badge -->
  <rect x="514" y="253" width="106" height="20" fill="#a31f34"/>
  <text x="567" y="267" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">900 GB/s aggregate</text>

  <!-- NVSwitch stats -->
  <rect x="465" y="310" width="185" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="557.5" y="325" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">NVSwitch Properties</text>
  <text x="557.5" y="338" text-anchor="middle" font-size="8" fill="#555">Any GPU → any GPU: 1 hop</text>
  <text x="557.5" y="351" text-anchor="middle" font-size="8" fill="#555">NVLink bandwidth: 112 GB/s/link</text>
  <text x="557.5" y="364" text-anchor="middle" font-size="8" fill="#3d9e5a">Non-blocking: all-to-all simultaneous</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">NVSwitch eliminates hop-count latency: every GPU reaches every other GPU at full NVLink bandwidth, enabling tensor-parallel AllReduce within a single node.</text>
</svg>