<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460">
  <rect width="780" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="390" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Intra-Node GPU Topology Comparison</text>

  <!-- ===== Panel dividers ===== -->
  <line x1="260" y1="40" x2="260" y2="420" stroke="#e8e8e8" stroke-dasharray="4,4" stroke-width="1"/>
  <line x1="520" y1="40" x2="520" y2="420" stroke="#e8e8e8" stroke-dasharray="4,4" stroke-width="1"/>

  <!-- ===== Panel 1: Ring Topology ===== -->
  <text x="130" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Ring</text>
  <text x="130" y="65" text-anchor="middle" font-size="8.5" fill="#555">Sequential pass-through</text>

  <!-- Ring arrows (sequential) -->
  <line x1="150" y1="110" x2="170" y2="120" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="195" y1="140" x2="200" y2="150" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="215" y1="200" x2="210" y2="210" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="170" y1="260" x2="150" y2="270" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="110" y1="270" x2="90" y2="260" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="65" y1="240" x2="60" y2="230" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="45" y1="180" x2="50" y2="170" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="90" y1="120" x2="110" y2="110" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- GPU nodes -->
  <rect x="110" y="90" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="104" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0</text>

  <rect x="170" y="120" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="190" y="134" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1</text>

  <rect x="200" y="180" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="220" y="194" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2</text>

  <rect x="170" y="240" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="190" y="254" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3</text>

  <rect x="110" y="270" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="284" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G4</text>

  <rect x="50" y="240" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="70" y="254" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G5</text>

  <rect x="20" y="180" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="40" y="194" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G6</text>

  <rect x="50" y="120" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="70" y="134" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G7</text>

  <!-- Ring stats -->
  <rect x="40" y="320" width="180" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="335" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Ring Properties</text>
  <text x="130" y="350" text-anchor="middle" font-size="8" fill="#555">Bandwidth per link: ~50 GB/s</text>
  <text x="130" y="365" text-anchor="middle" font-size="8" fill="#555">Hops for G0→G4: 4 hops</text>
  <text x="130" y="380" text-anchor="middle" font-size="8" fill="#c44">Latency scales with distance</text>

  <!-- ===== Panel 2: Full Mesh ===== -->
  <text x="390" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Full Mesh</text>
  <text x="390" y="65" text-anchor="middle" font-size="8.5" fill="#555">All-to-all direct links</text>

  <!-- Mesh cross-links (background links) -->
  <line x1="370" y1="100" x2="350" y2="110" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="410" y1="100" x2="430" y2="110" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="370" y1="280" x2="350" y2="270" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="410" y1="280" x2="430" y2="270" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  
  <line x1="310" y1="180" x2="310" y2="130" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="310" y1="200" x2="310" y2="250" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="470" y1="180" x2="470" y2="130" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="470" y1="200" x2="470" y2="250" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  
  <line x1="310" y1="190" x2="470" y2="190" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  
  <line x1="310" y1="181.3" x2="430" y2="128.8" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>
  <line x1="310" y1="198.8" x2="430" y2="251.3" stroke="#4a90c4" stroke-width="0.8" opacity="0.6"/>

  <!-- Mesh main structural links -->
  <line x1="350" y1="120" x2="430" y2="120" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="350" y1="260" x2="430" y2="260" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="330" y1="130" x2="330" y2="250" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="450" y1="130" x2="450" y2="250" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="338.6" y1="130" x2="441.4" y2="250" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="441.4" y1="130" x2="338.6" y2="250" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- GPU nodes for mesh -->
  <rect x="310" y="110" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="330" y="124" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0</text>

  <rect x="430" y="110" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="450" y="124" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1</text>

  <rect x="310" y="250" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="330" y="264" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2</text>

  <rect x="430" y="250" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="450" y="264" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3</text>

  <!-- Peripheral GPUs -->
  <rect x="270" y="180" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="290" y="194" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G4</text>

  <rect x="470" y="180" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="490" y="194" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G5</text>

  <rect x="370" y="80" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="390" y="94" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G6</text>

  <rect x="370" y="280" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="390" y="294" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G7</text>

  <!-- Mesh stats -->
  <rect x="300" y="320" width="180" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="390" y="335" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Mesh Properties</text>
  <text x="390" y="350" text-anchor="middle" font-size="8" fill="#555">Links per GPU: N-1 = 7</text>
  <text x="390" y="365" text-anchor="middle" font-size="8" fill="#555">Cable count grows O(N²)</text>
  <text x="390" y="380" text-anchor="middle" font-size="8" fill="#c44">Impractical beyond ~8 GPUs</text>

  <!-- ===== Panel 3: NVSwitch Crossbar ===== -->
  <text x="650" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">NVSwitch Crossbar</text>
  <text x="650" y="65" text-anchor="middle" font-size="8.5" fill="#3d9e5a">Non-blocking fabric</text>

  <!-- Central NVSwitch chip -->
  <rect x="600" y="70" width="100" height="220" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="650" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">NVSwitch</text>
  <text x="650" y="165" text-anchor="middle" font-size="8.5" fill="#555">Crossbar Fabric</text>
  <text x="650" y="180" text-anchor="middle" font-size="8" fill="#555">Non-blocking</text>

  <!-- NVSwitch bandwidth label badge -->
  <rect x="590" y="250" width="120" height="20" fill="#a31f34"/>
  <text x="650" y="264" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">900 GB/s aggregate</text>

  <!-- 8 GPUs connected to NVSwitch -->
  <!-- Left column: G0,G2,G4,G6 -->
  <rect x="540" y="80" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="94" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G0</text>
  <line x1="580" y1="90" x2="600" y2="90" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="540" y="140" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="154" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G2</text>
  <line x1="580" y1="150" x2="600" y2="150" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="540" y="200" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="214" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G4</text>
  <line x1="580" y1="210" x2="600" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="540" y="260" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="274" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G6</text>
  <line x1="580" y1="270" x2="600" y2="270" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Right column: G1,G3,G5,G7 -->
  <rect x="720" y="80" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="740" y="94" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G1</text>
  <line x1="720" y1="90" x2="700" y2="90" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="720" y="140" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="740" y="154" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G3</text>
  <line x1="720" y1="150" x2="700" y2="150" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="720" y="200" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="740" y="214" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G5</text>
  <line x1="720" y1="210" x2="700" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="720" y="260" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="740" y="274" text-anchor="middle" font-size="8" font-weight="700" fill="#333">G7</text>
  <line x1="720" y1="270" x2="700" y2="270" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- NVSwitch stats -->
  <rect x="560" y="320" width="180" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="650" y="335" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">NVSwitch Properties</text>
  <text x="650" y="350" text-anchor="middle" font-size="8" fill="#555">Any GPU → any GPU: 1 hop</text>
  <text x="650" y="365" text-anchor="middle" font-size="8" fill="#555">NVLink bandwidth: 112 GB/s/link</text>
  <text x="650" y="380" text-anchor="middle" font-size="8" fill="#3d9e5a">Non-blocking: all-to-all simultaneous</text>

  <!-- ===== Bottom Note ===== -->
  <text x="390" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">NVSwitch eliminates hop-count latency: every GPU reaches every other GPU at full NVLink bandwidth, enabling tensor-parallel AllReduce within a single node.</text>
</svg>