<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Pod-Scale Network Topologies</text>

  <!-- Panel divider -->
  <line x1="340" y1="38" x2="340" y2="425" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Fat-Tree ===== -->
  <text x="170" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Fat-Tree (3-Tier)</text>
  <text x="170" y="63" text-anchor="middle" font-size="8.5" fill="#555">Used by InfiniBand clusters (DGX SuperPOD)</text>

  <!-- Tier labels -->
  <text x="22" y="100" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Core</text>
  <text x="22" y="175" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Spine</text>
  <text x="22" y="265" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Leaf</text>
  <text x="22" y="355" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">GPU</text>
  <text x="22" y="367" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Racks</text>

  <!-- Core switches (2) -->
  <rect x="95" y="83" width="48" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="119" y="98" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Core 1</text>
  <rect x="185" y="83" width="48" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="209" y="98" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Core 2</text>

  <!-- Spine switches (4) -->
  <rect x="65" y="158" width="40" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="85" y="173" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 1</text>
  <rect x="120" y="158" width="40" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="140" y="173" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 2</text>
  <rect x="175" y="158" width="40" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="195" y="173" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 3</text>
  <rect x="230" y="158" width="40" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="250" y="173" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 4</text>

  <!-- Core to Spine connections -->
  <line x1="119" y1="105" x2="85" y2="158" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="119" y1="105" x2="140" y2="158" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="209" y1="105" x2="195" y2="158" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="209" y1="105" x2="250" y2="158" stroke="#c87b2a" stroke-width="1.2"/>
  <!-- Cross connections -->
  <line x1="119" y1="105" x2="195" y2="158" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="209" y1="105" x2="85" y2="158" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="119" y1="105" x2="250" y2="158" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="209" y1="105" x2="140" y2="158" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Leaf switches (4) -->
  <rect x="55" y="248" width="40" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="75" y="263" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 1</text>
  <rect x="110" y="248" width="40" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="130" y="263" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 2</text>
  <rect x="170" y="248" width="40" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="190" y="263" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 3</text>
  <rect x="230" y="248" width="40" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="250" y="263" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 4</text>

  <!-- Spine to Leaf connections -->
  <line x1="85" y1="180" x2="75" y2="248" stroke="#555" stroke-width="1"/>
  <line x1="85" y1="180" x2="130" y2="248" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="180" x2="75" y2="248" stroke="#555" stroke-width="1"/>
  <line x1="140" y1="180" x2="190" y2="248" stroke="#555" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="195" y1="180" x2="190" y2="248" stroke="#555" stroke-width="1"/>
  <line x1="195" y1="180" x2="250" y2="248" stroke="#555" stroke-width="1"/>
  <line x1="250" y1="180" x2="130" y2="248" stroke="#555" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="250" y1="180" x2="250" y2="248" stroke="#555" stroke-width="1"/>

  <!-- GPU Racks (8 racks, 2 per leaf) -->
  <g>
    <!-- Leaf 1 racks -->
    <rect x="40" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="55" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="55" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="78" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="93" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="93" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="75" y1="270" x2="55" y2="333" stroke="#4a90c4" stroke-width="1"/>
    <line x1="75" y1="270" x2="93" y2="333" stroke="#4a90c4" stroke-width="1"/>

    <!-- Leaf 2 racks -->
    <rect x="110" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="125" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="125" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="148" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="163" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="163" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="130" y1="270" x2="125" y2="333" stroke="#4a90c4" stroke-width="1"/>
    <line x1="130" y1="270" x2="163" y2="333" stroke="#4a90c4" stroke-width="1"/>

    <!-- Leaf 3 racks -->
    <rect x="168" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="183" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="183" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="205" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="220" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="220" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="190" y1="270" x2="183" y2="333" stroke="#4a90c4" stroke-width="1"/>
    <line x1="190" y1="270" x2="220" y2="333" stroke="#4a90c4" stroke-width="1"/>

    <!-- Leaf 4 racks -->
    <rect x="234" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="249" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="249" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="272" y="333" width="30" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="287" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="287" y="360" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="249.5" y1="270" x2="249.5" y2="333" stroke="#4a90c4" stroke-width="1"/>
    <line x1="250" y1="270" x2="287" y2="333" stroke="#4a90c4" stroke-width="1"/>
  </g>

  <!-- Fat-tree bisection bandwidth annotation -->
  <rect x="40" y="390" width="280" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="180" y="403" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Bisection bandwidth: full (non-blocking)</text>
  <text x="180" y="413" text-anchor="middle" font-size="8" fill="#555">Each path has dedicated capacity — no contention</text>

  <!-- ===== RIGHT: Torus ===== -->
  <text x="510" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">2D Torus</text>
  <text x="510" y="63" text-anchor="middle" font-size="8.5" fill="#555">Used by Google TPU pods (mesh wrap-around)</text>

  <!-- 4×4 torus grid (nodes) -->
  <!-- Grid start at (360, 90) spacing 60 -->
  <!-- Row 0 -->
  <rect x="363" y="90" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N00</text>
  <rect x="423" y="90" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="440" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N01</text>
  <rect x="483" y="90" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="500" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N02</text>
  <rect x="543" y="90" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N03</text>

  <!-- Row 1 -->
  <rect x="363" y="155" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="172" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N10</text>
  <rect x="423" y="155" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="440" y="172" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N11</text>
  <rect x="483" y="155" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="500" y="172" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N12</text>
  <rect x="543" y="155" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="172" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N13</text>

  <!-- Row 2 -->
  <rect x="363" y="220" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="237" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N20</text>
  <rect x="423" y="220" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="440" y="237" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N21</text>
  <rect x="483" y="220" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="500" y="237" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N22</text>
  <rect x="543" y="220" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="237" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N23</text>

  <!-- Row 3 -->
  <rect x="363" y="285" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="302" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N30</text>
  <rect x="423" y="285" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="440" y="302" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N31</text>
  <rect x="483" y="285" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="500" y="302" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N32</text>
  <rect x="543" y="285" width="34" height="26" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="302" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N33</text>

  <!-- Horizontal links -->
  <line x1="397" y1="103" x2="423" y2="103" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="457" y1="103" x2="483" y2="103" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="517" y1="103" x2="543" y2="103" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="397" y1="168" x2="423" y2="168" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="457" y1="168" x2="483" y2="168" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="517" y1="168" x2="543" y2="168" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="397" y1="233" x2="423" y2="233" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="457" y1="233" x2="483" y2="233" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="517" y1="233" x2="543" y2="233" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="397" y1="298" x2="423" y2="298" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="457" y1="298" x2="483" y2="298" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="517" y1="298" x2="543" y2="298" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- Vertical links -->
  <line x1="380" y1="116" x2="380" y2="155" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="440" y1="116" x2="440" y2="155" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="500" y1="116" x2="500" y2="155" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="560" y1="116" x2="560" y2="155" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="380" y1="181" x2="380" y2="220" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="440" y1="181" x2="440" y2="220" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="500" y1="181" x2="500" y2="220" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="560" y1="181" x2="560" y2="220" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="380" y1="246" x2="380" y2="285" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="440" y1="246" x2="440" y2="285" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="500" y1="246" x2="500" y2="285" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="560" y1="246" x2="560" y2="285" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- Wrap-around connections (torus) — red dashed for visibility -->
  <!-- Horizontal wrap: col 3 → col 0 -->
  <path d="M577,103 Q640,103 640,75 Q640,47 380,75 Q370,75 380,90" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M577,168 Q648,168 648,75 Q648,42 380,75" fill="none" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Vertical wrap: row 3 → row 0 -->
  <path d="M380,311 Q380,360 350,360 Q320,360 350,90 Q355,90 363,103" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Wrap-around label -->
  <rect x="618" y="62" width="24" height="10" fill="#fff"/>
    <text x="630" y="70" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">wrap</text>

  <!-- Torus bisection bandwidth annotation -->
  <rect x="352" y="335" width="285" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="494.5" y="352" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">Bisection bandwidth: O(√N) — scales with grid edge</text>
  <text x="494.5" y="365" text-anchor="middle" font-size="8" fill="#555">All N→N traffic must cross the bisection cut</text>
  <text x="494.5" y="377" text-anchor="middle" font-size="8" fill="#555">Locality of workload placement is critical</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Fat-tree provides full bisection bandwidth for any traffic pattern; torus is cheaper but rewards workloads with strong locality.</text>
</svg>