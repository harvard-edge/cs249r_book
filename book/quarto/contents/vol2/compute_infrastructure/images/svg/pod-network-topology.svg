<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Pod-Scale Network Topologies</text>

  <!-- Panel divider -->
  <line x1="340" y1="38" x2="340" y2="425" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Fat-Tree ===== -->
  <text x="175" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Fat-Tree (3-Tier)</text>
  <text x="175" y="63" text-anchor="middle" font-size="8.5" fill="#555">Used by InfiniBand clusters (DGX SuperPOD)</text>

  <!-- Tier labels -->
  <text x="20" y="100" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Core</text>
  <text x="20" y="175" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Spine</text>
  <text x="20" y="265" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Leaf</text>
  <text x="20" y="339.5" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">GPU</text>
  <text x="20" y="354.5" text-anchor="start" font-size="8.5" font-weight="700" fill="#555">Racks</text>

  <!-- Core switches (2) -->
  <rect x="70" y="80" width="50" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="95" y="94" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Core 1</text>
  <rect x="230" y="80" width="50" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="255" y="94" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Core 2</text>

  <!-- Spine switches (4) -->
  <rect x="40" y="160" width="30" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="55" y="174" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 1</text>
  <rect x="120" y="160" width="30" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="135" y="174" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 2</text>
  <rect x="200" y="160" width="30" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="215" y="174" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 3</text>
  <rect x="280" y="160" width="30" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="295" y="174" text-anchor="middle" font-size="8" fill="#c87b2a">Sp 4</text>

  <!-- Core to Spine connections -->
  <line x1="95" y1="100" x2="55" y2="160" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="95" y1="100" x2="135" y2="160" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="255" y1="100" x2="215" y2="160" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="255" y1="100" x2="295" y2="160" stroke="#c87b2a" stroke-width="1.2"/>
  <!-- Cross connections -->
  <line x1="95" y1="100" x2="215" y2="160" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="255" y1="100" x2="55" y2="160" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="95" y1="100" x2="295" y2="160" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="255" y1="100" x2="135" y2="160" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Leaf switches (4) -->
  <rect x="40" y="250" width="30" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="55" y="264" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 1</text>
  <rect x="120" y="250" width="30" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="135" y="264" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 2</text>
  <rect x="200" y="250" width="30" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="215" y="264" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 3</text>
  <rect x="280" y="250" width="30" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="295" y="264" text-anchor="middle" font-size="8" fill="#3d9e5a">Lf 4</text>

  <!-- Spine to Leaf connections -->
  <line x1="55" y1="180" x2="55" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="55" y1="180" x2="135" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="135" y1="180" x2="55" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="135" y1="180" x2="215" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="215" y1="180" x2="215" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="215" y1="180" x2="295" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="295" y1="180" x2="135" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="295" y1="180" x2="295" y2="250" stroke="#555" stroke-width="1"/>

  <!-- GPU Racks (8 racks, 2 per leaf) -->
  <g>
    <!-- Leaf 1 racks -->
    <rect x="20" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="35" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="35" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="60" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="75" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="75" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="55" y1="270" x2="35" y2="330" stroke="#4a90c4" stroke-width="1"/>
    <line x1="55" y1="270" x2="75" y2="330" stroke="#4a90c4" stroke-width="1"/>

    <!-- Leaf 2 racks -->
    <rect x="100" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="115" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="115" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="140" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="155" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="155" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="135" y1="270" x2="115" y2="330" stroke="#4a90c4" stroke-width="1"/>
    <line x1="135" y1="270" x2="155" y2="330" stroke="#4a90c4" stroke-width="1"/>

    <!-- Leaf 3 racks -->
    <rect x="180" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="195" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="195" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="220" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="235" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="235" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="215" y1="270" x2="195" y2="330" stroke="#4a90c4" stroke-width="1"/>
    <line x1="215" y1="270" x2="235" y2="330" stroke="#4a90c4" stroke-width="1"/>

    <!-- Leaf 4 racks -->
    <rect x="260" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="275" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="275" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <rect x="300" y="330" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="315" y="347.5" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Rack</text>
    <text x="315" y="360.5" text-anchor="middle" font-size="7" fill="#555">8× GPU</text>
    <line x1="295" y1="270" x2="275" y2="330" stroke="#4a90c4" stroke-width="1"/>
    <line x1="295" y1="270" x2="315" y2="330" stroke="#4a90c4" stroke-width="1"/>
  </g>

  <!-- Fat-tree bisection bandwidth annotation -->
  <rect x="30" y="385" width="290" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="175" y="400" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Bisection bandwidth: full (non-blocking)</text>
  <text x="175" y="413" text-anchor="middle" font-size="8" fill="#555">Each path has dedicated capacity — no contention</text>

  <!-- ===== RIGHT: Torus ===== -->
  <text x="510" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#333">2D Torus</text>
  <text x="510" y="63" text-anchor="middle" font-size="8.5" fill="#555">Used by Google TPU pods (mesh wrap-around)</text>

  <!-- 4×4 torus grid (nodes) -->
  <!-- Row 0 -->
  <rect x="370" y="110" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="390" y="129" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N00</text>
  <rect x="440" y="110" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="460" y="129" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N01</text>
  <rect x="510" y="110" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="530" y="129" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N02</text>
  <rect x="580" y="110" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="600" y="129" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N03</text>

  <!-- Row 1 -->
  <rect x="370" y="180" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="390" y="199" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N10</text>
  <rect x="440" y="180" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="460" y="199" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N11</text>
  <rect x="510" y="180" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="530" y="199" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N12</text>
  <rect x="580" y="180" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="600" y="199" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N13</text>

  <!-- Row 2 -->
  <rect x="370" y="250" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="390" y="269" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N20</text>
  <rect x="440" y="250" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="460" y="269" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N21</text>
  <rect x="510" y="250" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="530" y="269" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N22</text>
  <rect x="580" y="250" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="600" y="269" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N23</text>

  <!-- Row 3 -->
  <rect x="370" y="320" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="390" y="339" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N30</text>
  <rect x="440" y="320" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="460" y="339" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N31</text>
  <rect x="510" y="320" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="530" y="339" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N32</text>
  <rect x="580" y="320" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="600" y="339" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">N33</text>

  <!-- Horizontal links -->
  <line x1="410" y1="125" x2="440" y2="125" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="480" y1="125" x2="510" y2="125" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="550" y1="125" x2="580" y2="125" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="410" y1="195" x2="440" y2="195" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="480" y1="195" x2="510" y2="195" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="550" y1="195" x2="580" y2="195" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="410" y1="265" x2="440" y2="265" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="480" y1="265" x2="510" y2="265" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="550" y1="265" x2="580" y2="265" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="410" y1="335" x2="440" y2="335" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="480" y1="335" x2="510" y2="335" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="550" y1="335" x2="580" y2="335" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- Vertical links -->
  <line x1="390" y1="140" x2="390" y2="180" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="460" y1="140" x2="460" y2="180" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="530" y1="140" x2="530" y2="180" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="600" y1="140" x2="600" y2="180" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="390" y1="210" x2="390" y2="250" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="460" y1="210" x2="460" y2="250" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="530" y1="210" x2="530" y2="250" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="600" y1="210" x2="600" y2="250" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="390" y1="280" x2="390" y2="320" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="460" y1="280" x2="460" y2="320" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="530" y1="280" x2="530" y2="320" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="600" y1="280" x2="600" y2="320" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- Wrap-around connections (torus) -->
  <!-- Horizontal wrap: col 3 → col 0 -->
  <path d="M 620,125 H 640 V 90 H 350 V 125 H 370" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 620,195 H 650 V 80 H 345 V 195 H 370" fill="none" stroke="#4a90c4" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Vertical wrap: row 3 → row 0 -->
  <path d="M 390,350 V 360 H 360 V 100 H 390 V 110" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Wrap-around label -->
  <rect x="626" y="93" width="28" height="14" fill="#fff"/>
  <text x="640" y="103" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">wrap</text>

  <!-- Torus bisection bandwidth annotation -->
  <rect x="355" y="380" width="300" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="505" y="396" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">Bisection bandwidth: O(√N) — scales with grid edge</text>
  <text x="505" y="410" text-anchor="middle" font-size="8" fill="#555">All N→N traffic must cross the bisection cut</text>
  <text x="505" y="423" text-anchor="middle" font-size="8" fill="#555">Locality of workload placement is critical</text>

  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Fat-tree provides full bisection bandwidth for any traffic pattern; torus is cheaper but rewards workloads with strong locality.</text>
</svg>