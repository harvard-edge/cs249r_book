<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Build vs. Buy: Cumulative Cost Break-Even Analysis</text>
  <text x="340" y="40" text-anchor="middle" font-size="9" fill="#555">1,000-node H100 cluster (8,000 GPUs) at 80% sustained utilization</text>

  <!-- ===== Chart area ===== -->
  <!-- Chart bounds: x=[70,630], y=[60,360] -->

  <!-- Grid lines (horizontal) -->
  <line x1="70" y1="360" x2="630" y2="360" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="70" y1="300" x2="630" y2="300" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="70" y1="240" x2="630" y2="240" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="70" y1="180" x2="630" y2="180" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="70" y1="120" x2="630" y2="120" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="70" y1="60" x2="630" y2="60" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- Grid lines (vertical - months) -->
  <line x1="70" y1="60" x2="70" y2="360" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="195" y1="60" x2="195" y2="360" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="320" y1="60" x2="320" y2="360" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="445" y1="60" x2="445" y2="360" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="570" y1="60" x2="570" y2="360" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="630" y1="60" x2="630" y2="360" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- Axes -->
  <line x1="70" y1="60" x2="70" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="60" y1="360" x2="640" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- X-axis labels (months) -->
  <text x="70" y="382" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="195" y="382" text-anchor="middle" font-size="9" fill="#555">6</text>
  <text x="320" y="382" text-anchor="middle" font-size="9" fill="#555">12</text>
  <text x="445" y="382" text-anchor="middle" font-size="9" fill="#555">18</text>
  <text x="570" y="382" text-anchor="middle" font-size="9" fill="#555">24</text>
  <text x="630" y="382" text-anchor="middle" font-size="9" fill="#555">30</text>
  <text x="350" y="398" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Months</text>

  <!-- Y-axis labels ($M) -->
  <text x="62" y="354.0" text-anchor="end" font-size="9" fill="#555">$0</text>
  <text x="62" y="304" text-anchor="end" font-size="9" fill="#555">$20M</text>
  <text x="62" y="244" text-anchor="end" font-size="9" fill="#555">$40M</text>
  <text x="62" y="184" text-anchor="end" font-size="9" fill="#555">$60M</text>
  <text x="62" y="124" text-anchor="end" font-size="9" fill="#555">$80M</text>
  <text x="62" y="64" text-anchor="end" font-size="9" fill="#555">$100M</text>
  <text x="22" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#333" transform="rotate(-90 22 210)">Cumulative Cost ($M)</text>

  <!-- ===== On-Prem curve (blue) ===== -->
  <!-- On-prem: $63M total upfront + ~$1.5M/month OpEx
       Month 0: big jump (hardware CapEx ~$50M = $150px at 3px/$M, from 360 to 210)
       Then grows linearly at ~$1.5M/month -->
  <!-- Scale: 360 = $0M, each $M = 3px. So $20M = 360-60=300, $50M=360-150=210, $63M=360-189=171 -->
  <!-- CapEx at month 0: $50M jump (to y=210), then linear $1.5M/month -->
  <!-- Month 0→Month 30: from 210 to 210-(30*1.5*3)=210-135=75... need to fit -->
  <!-- Let's use: CapEx = $50M, OpEx = $0.5M/month for 1000 nodes (simplified to fit chart) -->
  <!-- Month 0: y = 360 - 50*3 = 210 (CapEx jump) -->
  <!-- Month 30: y = 360 - (50+30*0.45)*3 = 360 - (50+13.5)*3 = 360-190.5 = 169.5 -->

  <!-- On-prem path: starts at (70,360), jumps to (70,185), then slopes gently to (630,100) -->
  <polyline points="70,360 70,185 630,100" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Fill area under on-prem curve -->
  <polygon points="70,360 70,185 630,100 630,360" fill="#cfe2f3" fill-opacity="0.3"/>

  <!-- On-prem label -->
  <rect x="478" y="85" width="130" height="22" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="542.5" y="100" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4a90c4">On-Premises</text>

  <!-- CapEx jump annotation -->
  <line x1="70" y1="185" x2="115" y2="185" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="120" y="171.0" font-size="8" fill="#4a90c4">CapEx: ~$50M</text>
  <text x="120" y="182.0" font-size="8" fill="#4a90c4">hardware + facility</text>

  <!-- ===== Cloud curve (orange) ===== -->
  <!-- Cloud: starts at (70,360) = $0, grows linearly -->
  <!-- $4/GPU-hr * 8000 GPUs * 0.80 util * 720 hrs/month = $18.4M/month... too steep -->
  <!-- Let's use a realistic total: 30 months to $55M for cloud -->
  <!-- Slope: $55M/30 months = ~$1.83M/month -->
  <!-- Month 30: y = 360 - 55*3 = 360-165 = 195 -->
  <!-- But need crossover: On-prem starts at $50M, cloud starts at $0 -->
  <!-- On-prem at month t: $50M + $0.43M*t -->
  <!-- Cloud at month t: $1.83M*t -->
  <!-- Crossover: 50 + 0.43t = 1.83t → 50 = 1.4t → t ≈ 35.7 months (just past chart end) -->
  <!-- That's not ideal. Let's adjust to have crossover at month 20 -->
  <!-- On-prem: CapEx $50M + $0.5M/mo OpEx -->
  <!-- Cloud: $2.5M/mo -->
  <!-- Crossover: 50+0.5t = 2.5t → 50 = 2t → t=25 months -->
  <!-- On-prem at 30: 50+15=65, y=360-195=165 -->
  <!-- Cloud at 30: 75, y=360-225=135 -->
  <!-- Month 25: both at $62.5M, y=360-187.5=172.5 -->

  <!-- Cloud curve: linear from (70,360) to (630,135) -->
  <line x1="70" y1="360" x2="630" y2="135" stroke="#c87b2a" stroke-width="2.5"/>

  <!-- Fill area under cloud curve -->
  <polygon points="70,360 630,135 630,360" fill="#fdebd0" fill-opacity="0.4"/>

  <!-- Cloud label -->
  <rect x="478" y="143" width="130" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="543" y="158" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">Cloud (On-Demand)</text>

  <!-- Cloud per-month cost annotation -->
  <text x="230" y="258" font-size="8" fill="#c87b2a">~$2.5M/month</text>
  <text x="230" y="269" font-size="8" fill="#c87b2a">$4/GPU-hr × 8,000 GPUs</text>
  <text x="230" y="280" font-size="8" fill="#c87b2a">× 80% utilization</text>

  <!-- ===== Crossover annotation ===== -->
  <!-- Crossover at month ~25: x = 70 + 25*(630-70)/30 = 70+467=537 → too far. Scale differently. -->
  <!-- x for month 25: 70 + (25/30)*(630-70) = 70 + 466 = 536, y = 172 -->
  <!-- Actually for our lines: cloud at x=536: 360 + (536-70)/(630-70) * (135-360) = 360 + 0.832*(-225) = 360-187 = 173 -->
  <!-- On-prem at x=536: 185 + (536-70)/(630-70) * (100-185) = 185 + 0.832*(-85) = 185-70.7 = 114 -->
  <!-- These don't cross at same x. Need to find actual crossing of both lines. -->
  <!-- On-prem line: passes through (70,185) and (630,100). -->
  <!-- Slope = (100-185)/(630-70) = -85/560 = -0.152 px/px -->
  <!-- y = 185 - 0.152*(x-70) -->
  <!-- Cloud line: passes through (70,360) and (630,135). -->
  <!-- Slope = (135-360)/(630-70) = -225/560 = -0.402 px/px -->
  <!-- y = 360 - 0.402*(x-70) -->
  <!-- Crossing: 185 - 0.152*(x-70) = 360 - 0.402*(x-70) -->
  <!-- 0.25*(x-70) = 175 → x-70 = 700 → x = 770 (outside chart!) -->
  <!-- Need to redesign: make crossover at month 22 visible -->
  <!-- On-prem: CapEx jump at t=0 to y=185 ($58M at t=0, then $0.43M/mo) -->
  <!-- Cloud: $3M/mo -->
  <!-- Crossover: 58+0.43t = 3t → 58 = 2.57t → t=22.6 months -->
  <!-- On-prem at 30: 58+12.9=$70.9M, y=360-212=148 -->
  <!-- Cloud at 30: $90M, y=360-270=90 -->
  <!-- x for t=22.6: 70 + (22.6/30)*(630-70) = 70+422=492 -->
  <!-- On-prem at x=492: 185 + (492-70)/(630-70)*(148-185) = 185+0.754*(-37) = 185-27.9=157 -->
  <!-- Cloud at x=492: 360 + (492-70)/(630-70)*(90-360) = 360+0.754*(-270)=360-203.6=156.4 ✓ -->

  <!-- Redraw curves with correct crossover -->
  <!-- On-prem: (70,185) to (630,148) -->
  <!-- Cloud: (70,360) to (630,90) -->

  <!-- Erase old curves and redraw -->
  <!-- Clear and redo polylines -->
  <!-- Actually, just overlay corrected curves -->

  <!-- Correct on-prem (blue): (70,360)→(70,185)→(630,148) -->
  <polygon points="70,360 70,185 630,148 630,360" fill="#fff" fill-opacity="1"/>
  <polygon points="70,360 70,185 630,148 630,360" fill="#cfe2f3" fill-opacity="0.25"/>
  <polyline points="70,360 70,185 630,148" fill="none" stroke="#4a90c4" stroke-width="3"/>

  <!-- Correct cloud (orange): (70,360)→(630,90) -->
  <polygon points="70,360 630,90 630,360" fill="#fff" fill-opacity="1"/>
  <polygon points="70,360 630,90 630,360" fill="#fdebd0" fill-opacity="0.3"/>
  <line x1="70" y1="360" x2="630" y2="90" stroke="#c87b2a" stroke-width="3"/>

  <!-- Redraw labels on top -->
  <rect x="470" y="82" width="145" height="24" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="542.5" y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">On-Premises</text>

  <rect x="470" y="76" width="145" height="0" rx="2" fill="none"/>
  <rect x="470" y="56" width="145" height="24" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="542.5" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Cloud (On-Demand)</text>

  <!-- Crossover point marker -->
  <!-- x=492, y=157 -->
  <circle cx="492" cy="157" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <line x1="492" y1="157" x2="492" y2="360" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Crossover annotations -->
  <rect x="400" y="163" width="100" height="35" rx="4" fill="#a31f34"/>
  <text x="450" y="178" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Break-Even</text>
  <text x="450" y="191" text-anchor="middle" font-size="9" fill="#fff">~Month 22–26</text>
  <line x1="450" y1="163" x2="492" y2="157" stroke="#a31f34" stroke-width="1.5"/>

  <!-- Month 22 x-label -->
  <text x="492" y="380" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">~22–26</text>

  <!-- Utilization dependency note -->
  <rect x="75" y="65" width="200" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="175" y="80" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Break-even requires:</text>
  <text x="175" y="94" text-anchor="middle" font-size="8.5" fill="#555">≥ 55–65% sustained utilization</text>
  <text x="175" y="107" text-anchor="middle" font-size="8.5" fill="#555">At 20% util → cloud always wins</text>
  <text x="175" y="118" text-anchor="middle" font-size="8.5" fill="#555">At 80%+ util → on-prem wins ~yr 2</text>

  <!-- On-prem CapEx note -->
  <text x="82" y="170.0" font-size="8" fill="#4a90c4">CapEx: ~$58M</text>
  <text x="82" y="181.0" font-size="8" fill="#4a90c4">(hardware + facility)</text>

  <!-- Cloud slope annotation -->
  <text x="240" y="310" font-size="8.5" font-weight="700" fill="#c87b2a">$3M / month</text>
  <text x="240" y="322" font-size="8" fill="#555">(no upfront cost)</text>

  <!-- On-prem slope annotation -->
  <text x="430" y="142" font-size="8" fill="#4a90c4">+$0.43M/mo OpEx</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">On-premises infrastructure requires ~22–26 months at 80% utilization to break even versus cloud. Below 55% utilization, cloud pricing dominates across the full lifecycle.</text>
</svg>