<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="480" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Accelerator Spectrum: Generality vs. Efficiency</text>

  <!-- ===== Spectrum bar ===== -->
  <rect x="50" y="55" width="580" height="14" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <line x1="70" y1="62" x2="610" y2="62" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="50" y="85" text-anchor="middle" font-size="9" fill="#555">General-Purpose</text>
  <text x="630" y="85" text-anchor="middle" font-size="9" fill="#a31f34">Maximum Efficiency</text>

  <!-- ===== Generality Tax annotation ===== -->
  <line x1="340" y1="93" x2="530" y2="93" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="340" y="85" text-anchor="start" font-size="9" font-weight="700" fill="#a31f34">Generality Tax eliminated →</text>

  <!-- ===== CPU Box ===== -->
  <rect x="20" y="105" width="130" height="275" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>
  <text x="85" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#333">CPU</text>
  <text x="85" y="138" text-anchor="middle" font-size="8.5" fill="#555">General-Purpose</text>

  <!-- CPU pie chart (mostly control/cache) -->
  <g transform="translate(85,200)">
    <!-- Control/cache slice: 90% = 324 degrees -->
    <path d="M0,0 L0,-55 A55,55 0 1,1 -53.9,7.7 Z" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <!-- Arithmetic slice: 10% = 36 degrees -->
    <path d="M0,0 L-53.9,7.7 A55,55 0 0,1 0,-55 Z" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <!-- Center label -->
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#555">Die Area</text>
  </g>

  <!-- CPU legend -->
  <rect x="30" y="285" width="10" height="10" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" rx="2"/>
  <text x="45" y="294" font-size="8" fill="#555">Control/Cache</text>
  <text x="140" y="294" text-anchor="end" font-size="8.5" font-weight="700" fill="#555">~90%</text>

  <rect x="30" y="300" width="10" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="2"/>
  <text x="45" y="309" font-size="8" fill="#555">Arithmetic</text>
  <text x="140" y="309" text-anchor="end" font-size="8.5" font-weight="700" fill="#4a90c4">~10%</text>

  <text x="85" y="345" text-anchor="middle" font-size="8" fill="#555">Branch predictors</text>
  <text x="85" y="357" text-anchor="middle" font-size="8" fill="#555">Out-of-order exec</text>
  <text x="85" y="369" text-anchor="middle" font-size="8" fill="#555">Large caches</text>

  <!-- ===== GPU Box ===== -->
  <rect x="190" y="105" width="130" height="275" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>
  <text x="255" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#333">GPU</text>
  <text x="255" y="138" text-anchor="middle" font-size="8.5" fill="#555">SIMT Parallel</text>

  <!-- GPU pie chart: ~50% arithmetic, ~50% control/cache -->
  <g transform="translate(255,200)">
    <!-- Control slice: 45% -->
    <path d="M0,0 L0,-55 A55,55 0 0,1 38.9,-38.9 Z" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <!-- warp/scheduler slice: ~10% -->
    <path d="M0,0 L38.9,-38.9 A55,55 0 0,1 55,0 Z" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
    <!-- Arithmetic slice: ~50% = 180 degrees -->
    <path d="M0,0 L55,0 A55,55 0 1,1 0,-55 Z" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#555">Die Area</text>
  </g>

  <!-- GPU legend -->
  <rect x="200" y="285" width="10" height="10" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" rx="2"/>
  <text x="215" y="294" font-size="8" fill="#555">Control</text>
  <text x="310" y="294" text-anchor="end" font-size="8.5" font-weight="700" fill="#555">~30%</text>

  <rect x="200" y="300" width="10" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="2"/>
  <text x="215" y="309" font-size="8" fill="#555">Arithmetic</text>
  <text x="310" y="309" text-anchor="end" font-size="8.5" font-weight="700" fill="#4a90c4">~55%</text>

  <text x="255" y="345" text-anchor="middle" font-size="8" fill="#555">SIMT execution</text>
  <text x="255" y="357" text-anchor="middle" font-size="8" fill="#555">Warp schedulers</text>
  <text x="255" y="369" text-anchor="middle" font-size="8" fill="#555">HBM interface</text>

  <!-- ===== TPU Box ===== -->
  <rect x="360" y="105" width="130" height="275" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>
  <text x="425" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#333">TPU</text>
  <text x="425" y="138" text-anchor="middle" font-size="8.5" fill="#555">Systolic Array</text>

  <!-- TPU pie chart: ~75% arithmetic -->
  <g transform="translate(425,200)">
    <!-- Control: 22% -->
    <path d="M0,0 L0,-55 A55,55 0 0,1 34.2,-41.3 Z" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <!-- Routing: 5% -->
    <path d="M0,0 L34.2,-41.3 A55,55 0 0,1 54.3,-10.6 Z" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
    <!-- Arithmetic: ~75% = 270 degrees -->
    <path d="M0,0 L54.3,-10.6 A55,55 0 1,1 0,-55 Z" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#555">Die Area</text>
  </g>

  <!-- TPU legend -->
  <rect x="370" y="285" width="10" height="10" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" rx="2"/>
  <text x="385" y="294" font-size="8" fill="#555">Control</text>
  <text x="480" y="294" text-anchor="end" font-size="8.5" font-weight="700" fill="#555">~20%</text>

  <rect x="370" y="300" width="10" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="2"/>
  <text x="385" y="309" font-size="8" fill="#555">Arithmetic</text>
  <text x="480" y="309" text-anchor="end" font-size="8.5" font-weight="700" fill="#4a90c4">~75%</text>

  <text x="425" y="345" text-anchor="middle" font-size="8" fill="#555">Systolic dataflow</text>
  <text x="425" y="357" text-anchor="middle" font-size="8" fill="#555">Fixed MXU tiles</text>
  <text x="425" y="369" text-anchor="middle" font-size="8" fill="#555">XLA compiled</text>

  <!-- ===== Custom ASIC Box ===== -->
  <rect x="530" y="105" width="130" height="275" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="4"/>
  <text x="595" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">Custom ASIC</text>
  <text x="595" y="138" text-anchor="middle" font-size="8.5" fill="#555">Fixed Dataflow</text>

  <!-- ASIC pie chart: ~92% arithmetic -->
  <g transform="translate(595,200)">
    <!-- Control: 8% -->
    <path d="M0,0 L0,-55 A55,55 0 0,1 27.2,-47.0 Z" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <!-- Arithmetic: ~92% = 331 degrees -->
    <path d="M0,0 L27.2,-47.0 A55,55 0 1,1 0,-55 Z" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-size="8" fill="#555">Die Area</text>
  </g>

  <!-- ASIC legend -->
  <rect x="540" y="285" width="10" height="10" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" rx="2"/>
  <text x="555" y="294" font-size="8" fill="#555">Control</text>
  <text x="650" y="294" text-anchor="end" font-size="8.5" font-weight="700" fill="#555">~8%</text>

  <rect x="540" y="300" width="10" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="2"/>
  <text x="555" y="309" font-size="8" fill="#555">Arithmetic</text>
  <text x="650" y="309" text-anchor="end" font-size="8.5" font-weight="700" fill="#4a90c4">&gt;90%</text>

  <text x="595" y="345" text-anchor="middle" font-size="8" fill="#555">Hardwired ops</text>
  <text x="595" y="357" text-anchor="middle" font-size="8" fill="#555">No general ISA</text>
  <text x="595" y="369" text-anchor="middle" font-size="8" fill="#555">5–10× efficiency</text>

  <!-- ===== Tradeoff axis labels ===== -->
  <!-- Axis arrow -->
  <line x1="85" y1="419" x2="595" y2="419" stroke="#555" stroke-width="0.8"/>

  <rect x="110" y="408" width="120" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
  <text x="170" y="423" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">← Higher Programmability</text>

  <rect x="450" y="408" width="120" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="510" y="423" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Higher Efficiency →</text>

  <text x="340" y="465" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each step sacrifices programmability to reclaim die area for arithmetic — eliminating the Generality Tax.</text>
</svg>