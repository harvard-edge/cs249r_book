<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="880" height="580" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="440" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Tensor Core Tiling: Why Data Locality Drives Throughput</text>

  <!-- ===== Left: Large Matrix in HBM ===== -->
  <text x="210" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Large Weight Matrix (HBM)</text>
  <text x="210" y="80" text-anchor="middle" font-size="10" fill="#555">Cannot fit in on-chip SRAM</text>

  <!-- Large matrix grid -->
  <g transform="translate(30,100)">
    <!-- All tiles in neutral color first -->
    <rect x="0" y="0" width="360" height="300" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>

    <!-- Draw grid lines -->
    <line x1="0" y1="50" x2="360" y2="50" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="360" y2="100" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="360" y2="150" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="360" y2="200" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="360" y2="250" stroke="#ddd" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="300" stroke="#ddd" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="300" stroke="#ddd" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="300" stroke="#ddd" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#ddd" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#ddd" stroke-width="0.5"/>

    <!-- Highlighted active tile -->
    <rect x="120" y="100" width="60" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="2" rx="4"/>
    <text x="150" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Active</text>
    <text x="150" y="136" text-anchor="middle" font-size="9" fill="#3d9e5a">Tile</text>

    <!-- Processed tiles (greyed out) -->
    <rect x="0" y="0" width="60" height="50" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6" rx="4"/>
    <rect x="60" y="0" width="60" height="50" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6" rx="4"/>
    <rect x="120" y="0" width="60" height="50" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6" rx="4"/>
    <rect x="0" y="50" width="60" height="50" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6" rx="4"/>
    <rect x="60" y="50" width="60" height="50" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6" rx="4"/>
    <text x="150" y="78" text-anchor="middle" font-size="10" fill="#3d9e5a">✓</text>

    <!-- Labels: row/col annotations -->
    <text x="180" y="-12" text-anchor="middle" font-size="9" fill="#999">N = 4096 columns</text>
    <text x="-12" y="150" text-anchor="middle" font-size="9" fill="#999" transform="rotate(-90,-12,150)">M = 4096 rows</text>
  </g>

  <!-- Matrix label -->
  <text x="210" y="425" text-anchor="middle" font-size="10" fill="#555">One tile = 16×16 matrix</text>
  <text x="210" y="440" text-anchor="middle" font-size="10" fill="#555">loaded from HBM per step</text>

  <!-- Separator arrow -->
  <line x1="400" y1="225" x2="440" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="215" text-anchor="middle" font-size="9" fill="#555">Load</text>
  <text x="420" y="240" text-anchor="middle" font-size="9" fill="#555">tile</text>

  <!-- ===== Center: Tile detail zoom ===== -->
  <text x="550" y="65" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tile Operation (On-Chip SRAM)</text>

  <!-- SRAM container -->
  <rect x="450" y="90" width="200" height="280" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="550" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">SRAM (Shared Memory)</text>
  <text x="550" y="130" text-anchor="middle" font-size="9" fill="#555">~33 MB total on H100</text>

  <!-- Tile A and B in SRAM -->
  <rect x="460" y="145" width="80" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="500" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Tile A</text>
  <text x="500" y="190" text-anchor="middle" font-size="9" fill="#555">16×16 input</text>
  <text x="500" y="205" text-anchor="middle" font-size="9" fill="#555">activations</text>

  <rect x="560" y="145" width="80" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="600" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Tile B</text>
  <text x="600" y="190" text-anchor="middle" font-size="9" fill="#555">16×16 weight</text>
  <text x="600" y="205" text-anchor="middle" font-size="9" fill="#555">matrix</text>

  <!-- MAC unit -->
  <rect x="480" y="240" width="140" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="550" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Tensor Core</text>
  <text x="550" y="278" text-anchor="middle" font-size="9" fill="#555">D = A × B + C</text>
  <text x="550" y="292" text-anchor="middle" font-size="8.5" fill="#555">4096 MACs/cycle</text>

  <!-- Output accumulator -->
  <rect x="490" y="320" width="120" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="550" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Accumulator</text>
  <text x="550" y="352" text-anchor="middle" font-size="9" fill="#555">FP32 partial sum</text>

  <!-- Arrows within tile -->
  <path d="M 500 215 V 225 H 530 V 240" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 600 215 V 225 H 570 V 240" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="550" y1="300" x2="550" y2="320" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Energy cost annotations ===== -->
  <!-- HBM load cost -->
  <line x1="390" y1="140" x2="450" y2="140" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="700" y="110" width="150" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="775" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">HBM Load Cost</text>
  <text x="775" y="146" text-anchor="middle" font-size="10" fill="#555">~20 pJ / element</text>
  <text x="775" y="160" text-anchor="middle" font-size="9" fill="#555">(off-chip DRAM access)</text>

  <rect x="700" y="180" width="150" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="775" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">SRAM Access Cost</text>
  <text x="775" y="216" text-anchor="middle" font-size="10" fill="#555">~0.5 pJ / element</text>
  <text x="775" y="230" text-anchor="middle" font-size="9" fill="#555">(on-chip shared memory)</text>

  <rect x="700" y="250" width="150" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="775" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">MAC Cost</text>
  <text x="775" y="286" text-anchor="middle" font-size="10" fill="#555">~1 pJ / operation</text>
  <text x="775" y="300" text-anchor="middle" font-size="9" fill="#555">(register-level compute)</text>

  <!-- Key insight box -->
  <rect x="700" y="320" width="150" height="80" fill="#a31f34" stroke="#a31f34" stroke-width="0" rx="4"/>
  <text x="775" y="343" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">20× Energy Gap</text>
  <text x="775" y="359" text-anchor="middle" font-size="9.5" fill="#fff">HBM vs. SRAM access</text>
  <text x="775" y="374" text-anchor="middle" font-size="9" fill="#fff">drives tiling imperative</text>
  <text x="775" y="388" text-anchor="middle" font-size="9" fill="#fff">→ reuse each loaded tile</text>

  <!-- Write-back arrow -->
  <line x1="550" y1="360" x2="550" y2="430" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="565" y="395" font-size="9" fill="#555">write result</text>
  <text x="565" y="410" font-size="9" fill="#555">to HBM</text>
  <rect x="470" y="430" width="160" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="550" y="450" text-anchor="middle" font-size="10" fill="#555">Output tile → HBM</text>

  <!-- Tiling insight -->
  <rect x="30" y="470" width="360" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="210" y="492" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Tiling Strategy</text>
  <text x="210" y="507" text-anchor="middle" font-size="10" fill="#555">Load once from HBM → reuse in SRAM</text>
  <text x="210" y="522" text-anchor="middle" font-size="10" fill="#555">High arithmetic intensity → compute-bound</text>

  <text x="440" y="560" text-anchor="middle" font-size="10" fill="#999" font-style="italic">Each tile is loaded from HBM once (20 pJ) then reused for many MAC operations (1 pJ each), amortizing the memory access cost.</text>
</svg>