<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Tensor Core Tiling: Why Data Locality Drives Throughput</text>

  <!-- ===== Left: Large Matrix in HBM ===== -->
  <text x="160" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Large Weight Matrix (HBM)</text>
  <text x="160" y="69" text-anchor="middle" font-size="8.5" fill="#555">Cannot fit in on-chip SRAM</text>

  <!-- Large matrix grid (8×6 tiles) -->
  <g transform="translate(30,80)">
    <!-- All tiles in neutral color first -->
    <rect x="0" y="0" width="260" height="230" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="2"/>

    <!-- Draw grid lines -->
    <line x1="0" y1="38" x2="260" y2="38" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="77" x2="260" y2="77" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="115" x2="260" y2="115" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="153" x2="260" y2="153" stroke="#ddd" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="260" y2="192" stroke="#ddd" stroke-width="0.5"/>
    <line x1="43" y1="0" x2="43" y2="230" stroke="#ddd" stroke-width="0.5"/>
    <line x1="87" y1="0" x2="87" y2="230" stroke="#ddd" stroke-width="0.5"/>
    <line x1="130" y1="0" x2="130" y2="230" stroke="#ddd" stroke-width="0.5"/>
    <line x1="173" y1="0" x2="173" y2="230" stroke="#ddd" stroke-width="0.5"/>
    <line x1="217" y1="0" x2="217" y2="230" stroke="#ddd" stroke-width="0.5"/>

    <!-- Highlighted active tile (col=1, row=1) -->
    <rect x="87" y="77" width="43" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
    <text x="108.5" y="99" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Active</text>
    <text x="108.5" y="110" text-anchor="middle" font-size="7.5" fill="#4a90c4">Tile</text>

    <!-- Processed tiles (greyed out) -->
    <rect x="0" y="0" width="43" height="38" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6"/>
    <rect x="43" y="0" width="43" height="38" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6"/>
    <rect x="87" y="0" width="43" height="38" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6"/>
    <rect x="0" y="38" width="43" height="38" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6"/>
    <rect x="43" y="38" width="43" height="38" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1" opacity="0.6"/>
    <text x="108" y="57" text-anchor="middle" font-size="7.5" fill="#3d9e5a">✓</text>

    <!-- Labels: row/col annotations -->
    <text x="130" y="-8" text-anchor="middle" font-size="8" fill="#999">N = 4096 columns</text>
    <text x="-8" y="115" text-anchor="middle" font-size="8" fill="#999" transform="rotate(-90,-8,115)">M = 4096 rows</text>
  </g>

  <!-- Matrix label -->
  <text x="160" y="327" text-anchor="middle" font-size="8.5" fill="#555">One tile = 16×16 matrix</text>
  <text x="160" y="340" text-anchor="middle" font-size="8.5" fill="#555">loaded from HBM per step</text>

  <!-- Separator arrow -->
  <line x1="300" y1="180" x2="340" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="172" text-anchor="middle" font-size="8" fill="#555">Load</text>
  <text x="320" y="193" text-anchor="middle" font-size="8" fill="#555">tile</text>

  <!-- ===== Center: Tile detail zoom ===== -->
  <text x="430" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tile Operation (On-Chip SRAM)</text>

  <!-- SRAM container -->
  <rect x="355" y="68" width="175" height="205" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="442.5" y="85" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">SRAM (Shared Memory)</text>
  <text x="442.5" y="97" text-anchor="middle" font-size="8" fill="#555">~33 MB total on H100</text>

  <!-- Tile A and B in SRAM -->
  <rect x="365" y="107" width="70" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="400" y="133" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Tile A</text>
  <text x="400" y="146" text-anchor="middle" font-size="7.5" fill="#555">16×16 input</text>
  <text x="400" y="158" text-anchor="middle" font-size="7.5" fill="#555">activations</text>

  <rect x="450" y="107" width="70" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="485" y="133" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Tile B</text>
  <text x="485" y="146" text-anchor="middle" font-size="7.5" fill="#555">16×16 weight</text>
  <text x="485" y="158" text-anchor="middle" font-size="7.5" fill="#555">matrix</text>

  <!-- MAC unit -->
  <rect x="390" y="190" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="442.5" y="209" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Tensor Core</text>
  <text x="442.5" y="222" text-anchor="middle" font-size="8" fill="#555">D = A × B + C</text>
  <text x="442.5" y="234" text-anchor="middle" font-size="7.5" fill="#555">4096 MACs/cycle</text>

  <!-- Output accumulator -->
  <rect x="390" y="258" width="100" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="442.5" y="274" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Accumulator</text>
  <text x="440" y="287" text-anchor="middle" font-size="7.5" fill="#555">FP32 partial sum</text>

  <!-- Arrows within tile -->
  <line x1="400" y1="168" x2="413" y2="190" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="485" y1="168" x2="467" y2="190" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="241" x2="440" y2="258" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Energy cost annotations ===== -->
  <!-- HBM load cost -->
  <line x1="300" y1="135" x2="357" y2="135" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="530" y="95" width="140" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="600" y="113" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">HBM Load Cost</text>
  <text x="600" y="127" text-anchor="middle" font-size="9" fill="#555">~20 pJ / element</text>
  <text x="600" y="139" text-anchor="middle" font-size="8" fill="#555">(off-chip DRAM access)</text>

  <rect x="530" y="160" width="140" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="600" y="178" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">SRAM Access Cost</text>
  <text x="600" y="192" text-anchor="middle" font-size="9" fill="#555">~0.5 pJ / element</text>
  <text x="600" y="204" text-anchor="middle" font-size="8" fill="#555">(on-chip shared memory)</text>

  <rect x="530" y="225" width="140" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="600" y="243" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">MAC Cost</text>
  <text x="600" y="257" text-anchor="middle" font-size="9" fill="#555">~1 pJ / operation</text>
  <text x="600" y="269" text-anchor="middle" font-size="8" fill="#555">(register-level compute)</text>

  <!-- Key insight box -->
  <rect x="530" y="285" width="140" height="60" rx="4" fill="#a31f34" stroke="#a31f34" stroke-width="0"/>
  <text x="600" y="303" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">20× Energy Gap</text>
  <text x="600" y="317" text-anchor="middle" font-size="8.5" fill="#fff">HBM vs. SRAM access</text>
  <text x="600" y="331" text-anchor="middle" font-size="8" fill="#fff">drives tiling imperative</text>
  <text x="600" y="343" text-anchor="middle" font-size="8" fill="#fff">→ reuse each loaded tile</text>

  <!-- Write-back arrow -->
  <line x1="440" y1="299" x2="440" y2="355" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="455" y="330" font-size="8" fill="#555">write result</text>
  <text x="455" y="342" font-size="8" fill="#555">to HBM</text>
  <rect x="365" y="355" width="150" height="25" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="440" y="371" text-anchor="middle" font-size="8.5" fill="#555">Output tile → HBM</text>

  <!-- Tiling insight -->
  <rect x="30" y="353" width="260" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="160" y="370" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Tiling Strategy</text>
  <text x="160" y="383" text-anchor="middle" font-size="8.5" fill="#555">Load once from HBM → reuse in SRAM</text>
  <text x="160" y="396" text-anchor="middle" font-size="8.5" fill="#555">High arithmetic intensity → compute-bound</text>

  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each tile is loaded from HBM once (20 pJ) then reused for many MAC operations (1 pJ each), amortizing the memory access cost.</text>
</svg>