<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="680" height="520" fill="#fff"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ── (A) Single-Machine Stack (left) ── -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="170" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#333">A. Single-Machine Stack</text>
  <text x="170" y="50" text-anchor="middle" font-size="8.5" fill="#999">1–8 GPUs, shared memory</text>

  <!-- Layer 4 top: Application -->
  <rect x="50" y="70" width="240" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="170" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Application</text>
  <text x="170" y="110" text-anchor="middle" font-size="8.5" fill="#555">Training loop / inference</text>

  <!-- Layer 3: ML Framework -->
  <rect x="50" y="130" width="240" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="170" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">ML Framework</text>
  <text x="170" y="170" text-anchor="middle" font-size="8.5" fill="#555">PyTorch / JAX / CUDA kernels</text>

  <!-- Layer 2: Operating System -->
  <rect x="50" y="190" width="240" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="170" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Operating System</text>
  <text x="170" y="230" text-anchor="middle" font-size="8.5" fill="#555">CUDA runtime, PCIe DMA</text>

  <!-- Layer 1 bottom: Hardware -->
  <rect x="50" y="250" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Hardware (PCIe / HBM)</text>
  <text x="170" y="290" text-anchor="middle" font-size="8.5" fill="#555">GPU ↔ GPU: NVLink 900 GB/s</text>

  <!-- Bottleneck annotation A -->
  <rect x="50" y="310" width="240" height="30" fill="rgba(163,31,52,0.06)" stroke="#a31f34" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="170" y="330" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Bottleneck: Memory Wall (HBM bandwidth)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ── Scaling arrow (center) ── -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <line x1="290" y1="280" x2="390" y2="280" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="340" y="270" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Scaling</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ── (B) Fleet Stack (right) ── -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="510" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#333">B. Fleet Stack</text>
  <text x="510" y="50" text-anchor="middle" font-size="8.5" fill="#999">1,000–100,000+ GPUs, message passing</text>

  <!-- Layer 4 top: Governance -->
  <rect x="390" y="70" width="240" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="510" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Governance</text>
  <text x="510" y="110" text-anchor="middle" font-size="8.5" fill="#555">Responsible AI, Privacy, Robustness</text>

  <!-- Layer 3: Serving / Ops -->
  <rect x="390" y="130" width="240" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="510" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Serving / Ops</text>
  <text x="510" y="170" text-anchor="middle" font-size="8.5" fill="#555">Fleet orchestration, CI/CD, inference</text>

  <!-- Layer 2: Distribution -->
  <rect x="390" y="190" width="240" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="510" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Distribution</text>
  <text x="510" y="230" text-anchor="middle" font-size="8.5" fill="#555">NCCL, RDMA, collective comms</text>

  <!-- Layer 1 bottom: Infrastructure -->
  <rect x="390" y="250" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="510" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Infrastructure (Fabric / RDMA)</text>
  <text x="510" y="290" text-anchor="middle" font-size="8.5" fill="#555">InfiniBand NDR 400 Gb/s · Ethernet</text>

  <!-- Bottleneck annotation B -->
  <rect x="390" y="310" width="240" height="30" fill="rgba(163,31,52,0.06)" stroke="#a31f34" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="510" y="330" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Bottleneck: Bisection Bandwidth Wall</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ── Chapter map (bottom) ── -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="340" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Chapter Map</text>
  <line x1="40" y1="380" x2="640" y2="380" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Infrastructure tier label -->
  <text x="40" y="400" font-size="8.5" font-weight="700" fill="#4a90c4">Infrastructure:</text>
  <text x="130" y="400" font-size="8.5" fill="#555">Compute · Storage · Network Fabrics · Collective Comms</text>

  <!-- Distribution tier label -->
  <text x="40" y="420" font-size="8.5" font-weight="700" fill="#3d9e5a">Distribution:</text>
  <text x="130" y="420" font-size="8.5" fill="#555">Distributed Training · Fleet Orchestration · Fault Tolerance</text>

  <!-- Serving tier label -->
  <text x="40" y="440" font-size="8.5" font-weight="700" fill="#c87b2a">Serving / Ops:</text>
  <text x="130" y="440" font-size="8.5" fill="#555">Inference · Performance Engineering · Ops at Scale</text>

  <!-- Governance tier label -->
  <text x="40" y="460" font-size="8.5" font-weight="700" fill="#333">Governance:</text>
  <text x="130" y="460" font-size="8.5" fill="#555">Responsible AI · Robust AI · Security · Sustainable AI · Edge</text>

  <!-- Bottom footnote -->
  <text x="340" y="490" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">The single-machine stack scales to fleet infrastructure through distribution.</text>

</svg>