<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#333">MoE Expert Routing via All-to-All</text>
  <text x="340" y="43" text-anchor="middle" font-size="9" fill="#555">Four-phase dispatch cycle: Gate → Dispatch (All-to-All) → Expert Compute → Combine (All-to-All)</text>

  <!-- ===== Phase labels at top ===== -->
  <!-- Phase 1: Gate x=55..175 -->
  <!-- Phase 2: Dispatch x=195..315 -->
  <!-- Phase 3: Expert x=335..455 -->
  <!-- Phase 4: Combine x=475..635 -->

  <text x="115" y="63" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">① Gate</text>
  <text x="255" y="63" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">② Dispatch</text>
  <text x="395" y="63" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">③ Expert Compute</text>
  <text x="555" y="63" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">④ Combine</text>

  <!-- Phase dividers -->
  <line x1="180" y1="56" x2="180" y2="430" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="320" y1="56" x2="320" y2="430" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="460" y1="56" x2="460" y2="430" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== GPU Source nodes (left side) — 4 GPUs with tokens ===== -->
  <!-- GPU rows: y = 105, 185, 265, 345 -->

  <!-- GPU 1 -->
  <rect x="55" y="88" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="110" y="105" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">GPU 0</text>
  <text x="110" y="120" text-anchor="middle" font-size="8.5" fill="#555">Tokens: T1 T2 T3 T4</text>
  <!-- GPU badge -->
  <rect x="55" y="88" width="24" height="12" fill="#a31f34" rx="2"/>
  <text x="67" y="97" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>

  <!-- GPU 2 -->
  <rect x="55" y="170" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="110" y="187" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">GPU 1</text>
  <text x="110" y="202" text-anchor="middle" font-size="8.5" fill="#555">Tokens: T5 T6 T7 T8</text>
  <rect x="55" y="170" width="24" height="12" fill="#a31f34" rx="2"/>
  <text x="67" y="179" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>

  <!-- GPU 3 -->
  <rect x="55" y="252" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="110" y="269" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">GPU 2</text>
  <text x="110" y="284" text-anchor="middle" font-size="8.5" fill="#555">Tokens: T9 T10 T11 T12</text>
  <rect x="55" y="252" width="24" height="12" fill="#a31f34" rx="2"/>
  <text x="67" y="261" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>

  <!-- GPU 4 -->
  <rect x="55" y="334" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="110" y="351" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">GPU 3</text>
  <text x="110" y="366" text-anchor="middle" font-size="8.5" fill="#555">Tokens: T13..T16</text>
  <rect x="55" y="334" width="24" height="12" fill="#a31f34" rx="2"/>
  <text x="67" y="343" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>

  <!-- ===== Gating network boxes ===== -->
  <rect x="195" y="88" width="110" height="42" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="250" y="105" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="250" y="119" text-anchor="middle" font-size="8" fill="#555">Top-2 expert select</text>

  <rect x="195" y="170" width="110" height="42" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="250" y="187" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="250" y="201" text-anchor="middle" font-size="8" fill="#555">Top-2 expert select</text>

  <rect x="195" y="252" width="110" height="42" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="250" y="269" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="250" y="283" text-anchor="middle" font-size="8" fill="#555">Top-2 expert select</text>

  <rect x="195" y="334" width="110" height="42" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="250" y="351" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="250" y="365" text-anchor="middle" font-size="8" fill="#555">Top-2 expert select</text>

  <!-- Gate arrows (source GPUs → gating) -->
  <line x1="165" y1="109" x2="194" y2="109" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="165" y1="191" x2="194" y2="191" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="165" y1="273" x2="194" y2="273" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="165" y1="355" x2="194" y2="355" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== All-to-All Dispatch zone ===== -->
  <!-- All-to-All label box -->
  <rect x="328" y="200" width="115" height="30" fill="#fdebd0" stroke="#a31f34" stroke-width="1.5" rx="4"/>
  <text x="386" y="214" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">All-to-All</text>
  <text x="386" y="225" text-anchor="middle" font-size="7.5" fill="#c87b2a">Dispatch tokens to experts</text>

  <!-- Cross arrows from gating → all-to-all zone → expert GPUs (6 crossing lines) -->
  <!-- Dispatch: tokens scatter from row 1 gate to all 4 expert rows -->
  <!-- Simplified: from each gate row to each expert row with crossing lines -->
  <line x1="305" y1="100" x2="328" y2="102" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="305" y1="182" x2="328" y2="180" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="305" y1="264" x2="328" y2="250" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="305" y1="346" x2="328" y2="230" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- ===== Expert GPU boxes (right compute side) ===== -->
  <rect x="460" y="88" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="515" y="105" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Expert 0</text>
  <text x="515" y="119" text-anchor="middle" font-size="8" fill="#555">FFN — specializes</text>

  <rect x="460" y="170" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="515" y="187" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Expert 1</text>
  <text x="515" y="201" text-anchor="middle" font-size="8" fill="#555">FFN — specializes</text>

  <rect x="460" y="252" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="515" y="269" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Expert 2</text>
  <text x="515" y="283" text-anchor="middle" font-size="8" fill="#555">FFN — specializes</text>

  <rect x="460" y="334" width="110" height="42" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="515" y="351" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Expert 3</text>
  <text x="515" y="365" text-anchor="middle" font-size="8" fill="#555">FFN — specializes</text>

  <!-- All-to-all → experts arrows -->
  <line x1="443" y1="208" x2="461" y2="109" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="443" y1="210" x2="461" y2="191" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="443" y1="215" x2="461" y2="273" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="443" y1="218" x2="461" y2="355" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- ===== Combine All-to-All return ===== -->
  <rect x="328" y="368" width="115" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="386" y="382" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">All-to-All</text>
  <text x="386" y="393" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Return outputs</text>

  <!-- Expert → combine arrows -->
  <line x1="515" y1="294" x2="443" y2="373" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="515" y1="212" x2="443" y2="375" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Capacity factor annotation ===== -->
  <rect x="180" y="398" width="320" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="340" y="411" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Capacity Factor C = 1.25–1.5</text>
  <text x="340" y="423" text-anchor="middle" font-size="8" fill="#555">Excess tokens dropped; auxiliary load-balancing loss prevents hot-expert collapse</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">All-to-All cost: 2 × B×S×H×2 bytes per MoE layer (dispatch + combine). Capacity factor bounds per-expert token count.</text>
</svg>
