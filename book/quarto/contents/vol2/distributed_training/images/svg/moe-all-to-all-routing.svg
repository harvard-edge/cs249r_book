<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520">
  <rect width="820" height="520" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#333">MoE Expert Routing via All-to-All</text>
  <text x="410" y="44" text-anchor="middle" font-size="10" fill="#555">Four-phase dispatch cycle: Gate → Dispatch (All-to-All) → Expert Compute → Combine (All-to-All)</text>

  <!-- ===== Phase dividers ===== -->
  <line x1="320" y1="60" x2="320" y2="400" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="480" y1="60" x2="480" y2="400" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="640" y1="60" x2="640" y2="400" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Phase labels ===== -->
  <text x="170" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">① Gate</text>
  <text x="400" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">② Dispatch</text>
  <text x="560" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">③ Expert Compute</text>
  <text x="720" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">④ Combine</text>

  <!-- ===== All-to-All Vertical Blocks (drawn first for clean arrow overlaps) ===== -->
  <!-- Dispatch -->
  <rect x="340" y="100" width="120" height="280" fill="#fdebd0" stroke="#a31f34" stroke-width="1.5"/>
  <text x="400" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">All-to-All</text>
  <text x="400" y="252" text-anchor="middle" font-size="9" fill="#c87b2a">Dispatch tokens to experts</text>

  <!-- Combine -->
  <rect x="660" y="100" width="120" height="280" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="720" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">All-to-All</text>
  <text x="720" y="252" text-anchor="middle" font-size="9" fill="#3d9e5a">Return outputs</text>


  <!-- ===== Core Flow: Row 0 ===== -->
  <rect x="40" y="100" width="100" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="40" y="100" width="28" height="14" fill="#a31f34"/>
  <text x="54" y="110" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <text x="90" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU 0</text>
  <text x="90" y="130" text-anchor="middle" font-size="9" fill="#555">Tokens: T1 T2 T3 T4</text>

  <line x1="140" y1="120" x2="180" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="100" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="240" y="130" text-anchor="middle" font-size="9" fill="#555">Top-2 expert select</text>

  <line x1="300" y1="120" x2="340" y2="120" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="460" y1="120" x2="500" y2="120" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <rect x="500" y="100" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="560" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Expert 0</text>
  <text x="560" y="130" text-anchor="middle" font-size="9" fill="#555">FFN — specializes</text>

  <line x1="620" y1="120" x2="660" y2="120" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>


  <!-- ===== Core Flow: Row 1 ===== -->
  <rect x="40" y="180" width="100" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="40" y="180" width="28" height="14" fill="#a31f34"/>
  <text x="54" y="190" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <text x="90" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU 1</text>
  <text x="90" y="210" text-anchor="middle" font-size="9" fill="#555">Tokens: T5 T6 T7 T8</text>

  <line x1="140" y1="200" x2="180" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="180" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="240" y="210" text-anchor="middle" font-size="9" fill="#555">Top-2 expert select</text>

  <line x1="300" y1="200" x2="340" y2="200" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="460" y1="200" x2="500" y2="200" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <rect x="500" y="180" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="560" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Expert 1</text>
  <text x="560" y="210" text-anchor="middle" font-size="9" fill="#555">FFN — specializes</text>

  <line x1="620" y1="200" x2="660" y2="200" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>


  <!-- ===== Core Flow: Row 2 ===== -->
  <rect x="40" y="260" width="100" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="40" y="260" width="28" height="14" fill="#a31f34"/>
  <text x="54" y="270" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <text x="90" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU 2</text>
  <text x="90" y="290" text-anchor="middle" font-size="9" fill="#555">Tokens: T9 T10 T11 T12</text>

  <line x1="140" y1="280" x2="180" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="260" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="240" y="290" text-anchor="middle" font-size="9" fill="#555">Top-2 expert select</text>

  <line x1="300" y1="280" x2="340" y2="280" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="460" y1="280" x2="500" y2="280" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <rect x="500" y="260" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="560" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Expert 2</text>
  <text x="560" y="290" text-anchor="middle" font-size="9" fill="#555">FFN — specializes</text>

  <line x1="620" y1="280" x2="660" y2="280" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>


  <!-- ===== Core Flow: Row 3 ===== -->
  <rect x="40" y="340" width="100" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="40" y="340" width="28" height="14" fill="#a31f34"/>
  <text x="54" y="350" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <text x="90" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU 3</text>
  <text x="90" y="370" text-anchor="middle" font-size="9" fill="#555">Tokens: T13..T16</text>

  <line x1="140" y1="360" x2="180" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="340" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Gating Network</text>
  <text x="240" y="370" text-anchor="middle" font-size="9" fill="#555">Top-2 expert select</text>

  <line x1="300" y1="360" x2="340" y2="360" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="460" y1="360" x2="500" y2="360" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <rect x="500" y="340" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="560" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Expert 3</text>
  <text x="560" y="370" text-anchor="middle" font-size="9" fill="#555">FFN — specializes</text>

  <line x1="620" y1="360" x2="660" y2="360" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>


  <!-- ===== Capacity Factor Annotation ===== -->
  <rect x="180" y="420" width="460" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="410" y="436" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Capacity Factor C = 1.25–1.5</text>
  <text x="410" y="450" text-anchor="middle" font-size="9" fill="#555">Excess tokens dropped; auxiliary load-balancing loss prevents hot-expert collapse</text>

  <!-- ===== Footnote ===== -->
  <text x="410" y="490" text-anchor="middle" font-size="9" fill="#999" font-style="italic">All-to-All cost: 2 × B×S×H×2 bytes per MoE layer (dispatch + combine). Capacity factor bounds per-expert token count.</text>
</svg>