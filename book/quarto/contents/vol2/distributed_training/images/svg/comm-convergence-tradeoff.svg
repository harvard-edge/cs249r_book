<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- Background -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>
  <rect width="680" height="460" fill="#fff"/>

  <!-- ── Plot area ── -->
  <!-- X: 80 to 580, Y: 40 to 380 -->
  <rect x="80" y="40" width="500" height="340" fill="#fff" stroke="#bbb" stroke-width="1.2"/>

  <!-- ── Ideal region shading (top-right corner) ── -->
  <rect x="390" y="50" width="180" height="150" fill="#d4edda" opacity="0.4"/>
  <text x="480" y="86" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Ideal Region</text>
  <text x="480" y="100" font-size="9" fill="#3d9e5a" text-anchor="middle">(high efficiency +</text>
  <text x="480" y="114" font-size="9" fill="#3d9e5a" text-anchor="middle">good convergence)</text>

  <!-- ── Grid lines ── -->
  <line x1="80" y1="210" x2="580" y2="210" stroke="#f7f7f7" stroke-width="1.2"/>
  <line x1="330" y1="40" x2="330" y2="380" stroke="#f7f7f7" stroke-width="1.2"/>

  <!-- ── Pareto frontier curve ── -->
  <!-- Points: BSP=(130,100), SSP=(270,190), GradComp=(420,160), ASP=(520,300) -->
  <path d="M 130,100 C 180,130 220,170 270,190 C 340,220 390,170 420,160" fill="none" stroke="#4a90c4" stroke-width="2.2" stroke-dasharray="2,4"/>
  <text x="280" y="150" font-size="9" fill="#4a90c4" font-style="italic">Pareto frontier</text>

  <!-- ── Data points ── -->
  <!-- BSP -->
  <circle cx="130" cy="100" r="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="130" y="104" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">BSP</text>

  <!-- SSP -->
  <circle cx="270" cy="190" r="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="270" y="194" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">SSP</text>

  <!-- Gradient Compression -->
  <circle cx="420" cy="160" r="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="420" y="164" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">GC</text>

  <!-- ASP -->
  <circle cx="520" cy="300" r="10" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="520" y="304" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">ASP</text>

  <!-- ── Annotations for each point ── -->
  <!-- BSP -->
  <rect x="20" y="70" width="90" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="65" y="86" font-size="9.5" font-weight="700" fill="#4a90c4" text-anchor="middle">BSP</text>
  <text x="65" y="100" font-size="8.5" fill="#555" text-anchor="middle">Bulk Sync</text>
  <text x="65" y="114" font-size="8.5" fill="#555" text-anchor="middle">Best convergence</text>
  <line x1="110" y1="100" x2="120" y2="100" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- SSP -->
  <rect x="220" y="220" width="100" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="270" y="236" font-size="9.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">SSP</text>
  <text x="270" y="250" font-size="8.5" fill="#555" text-anchor="middle">Stale Sync</text>
  <text x="270" y="264" font-size="8.5" fill="#555" text-anchor="middle">Balanced</text>
  <line x1="270" y1="220" x2="270" y2="200" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- GC -->
  <rect x="350" y="70" width="140" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="420" y="86" font-size="9.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Grad. Compression</text>
  <text x="420" y="100" font-size="8.5" fill="#555" text-anchor="middle">Efficient + acceptable</text>
  <text x="420" y="114" font-size="8.5" fill="#555" text-anchor="middle">quality (Top-K sparsity)</text>
  <line x1="420" y1="130" x2="420" y2="150" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ASP -->
  <rect x="540" y="270" width="120" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="600" y="286" font-size="9.5" font-weight="700" fill="#c44" text-anchor="middle">ASP</text>
  <text x="600" y="300" font-size="8.5" fill="#555" text-anchor="middle">Async — fastest but</text>
  <text x="600" y="314" font-size="8.5" fill="#555" text-anchor="middle">stale / noisy updates</text>
  <line x1="540" y1="300" x2="530" y2="300" stroke="#c44" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ── No dominance annotation ── -->
  <rect x="150" y="330" width="300" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="300" y="354" font-size="9.5" font-weight="700" fill="#555" text-anchor="middle">
    No algorithm dominates all dimensions.
  </text>

  <!-- ── Axis labels ── -->
  <text x="330" y="430" font-size="11" font-weight="700" fill="#333" text-anchor="middle">
    Communication Efficiency →  (0 = all-sync, 1 = async)
  </text>
  <text x="20" y="210" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90, 20, 210)">Convergence Quality →</text>

  <!-- X axis -->
  <line x1="80" y1="380" x2="580" y2="380" stroke="#bbb" stroke-width="1.2"/>
  <line x1="80" y1="380" x2="80" y2="390" stroke="#bbb" stroke-width="1.2"/>
  <text x="80" y="404" font-size="9" fill="#555" text-anchor="middle">0</text>
  <line x1="330" y1="380" x2="330" y2="390" stroke="#bbb" stroke-width="1.2"/>
  <text x="330" y="404" font-size="9" fill="#555" text-anchor="middle">0.5</text>
  <line x1="580" y1="380" x2="580" y2="390" stroke="#bbb" stroke-width="1.2"/>
  <text x="580" y="404" font-size="9" fill="#555" text-anchor="middle">1.0</text>

  <!-- Y axis -->
  <line x1="80" y1="40" x2="80" y2="380" stroke="#bbb" stroke-width="1.2"/>
  <line x1="70" y1="380" x2="80" y2="380" stroke="#bbb" stroke-width="1.2"/>
  <text x="60" y="384" font-size="9" fill="#555" text-anchor="end">0</text>
  <line x1="70" y1="210" x2="80" y2="210" stroke="#bbb" stroke-width="1.2"/>
  <text x="60" y="214" font-size="9" fill="#555" text-anchor="end">0.5</text>
  <line x1="70" y1="40" x2="80" y2="40" stroke="#bbb" stroke-width="1.2"/>
  <text x="60" y="44" font-size="9" fill="#555" text-anchor="end">1.0</text>

  <!-- Bottom annotation -->
  <text x="330" y="450" font-size="9" fill="#999" font-style="italic" text-anchor="middle">
    BSP=Bulk Synchronous Parallel; SSP=Stale Synchronous Parallel; ASP=Asynchronous; GC=Gradient Compression
  </text>

</svg>