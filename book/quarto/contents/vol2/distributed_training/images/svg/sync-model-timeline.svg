<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs><!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Synchronization Models Compared</text>
  <text x="340" y="43" text-anchor="middle" font-size="9" fill="#555">Four workers over five time steps — BSP enforces barriers, SSP allows bounded staleness, ASP runs fully asynchronous</text>

  <!-- ===== Time axis ===== -->
  <!-- Timeline spans x=110 to x=650 -->
  <line x1="110" y1="60" x2="660" y2="60" stroke="#bbb" stroke-width="1"/>
  <!-- Time step ticks -->
  <text x="110" y="56" text-anchor="middle" font-size="8.5" fill="#999">t=0</text>
  <text x="218" y="56" text-anchor="middle" font-size="8.5" fill="#999">t=1</text>
  <text x="326" y="56" text-anchor="middle" font-size="8.5" fill="#999">t=2</text>
  <text x="434" y="56" text-anchor="middle" font-size="8.5" fill="#999">t=3</text>
  <text x="542" y="56" text-anchor="middle" font-size="8.5" fill="#999">t=4</text>
  <text x="650" y="56" text-anchor="middle" font-size="8.5" fill="#999">t=5</text>

  <!-- ===== Section backgrounds ===== -->
  <!-- BSP zone: y=68..195 -->
  <rect x="60" y="65" width="608" height="130" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>
  <!-- SSP zone: y=205..330 -->
  <rect x="60" y="202" width="608" height="130" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>
  <!-- ASP zone: y=340..435 -->
  <rect x="60" y="339" width="608" height="105" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <!-- ===== Section labels ===== -->
  <!-- BSP -->
  <text x="75" y="84" font-size="11" font-weight="700" fill="#333">BSP</text>
  <text x="75" y="96" font-size="8.5" fill="#555">Bulk Synchronous</text>
  <text x="75" y="107" font-size="8.5" fill="#555">Parallel</text>
  <!-- SSP -->
  <text x="75" y="221" font-size="11" font-weight="700" fill="#333">SSP</text>
  <text x="75" y="233" font-size="8.5" fill="#555">Stale Synchronous</text>
  <text x="75" y="244" font-size="8.5" fill="#555">Parallel (s=1)</text>
  <!-- ASP -->
  <text x="75" y="358" font-size="11" font-weight="700" fill="#333">ASP</text>
  <text x="75" y="370" font-size="8.5" fill="#555">Asynchronous</text>
  <text x="75" y="381" font-size="8.5" fill="#555">SGD</text>

  <!-- ===== Worker labels column ===== -->
  <!-- shared across sections, placed per row -->
  <!-- BSP workers: rows at y = 90, 110, 130, 150 (centers of 18px-high rows) -->
  <!-- SSP workers: rows at y = 227, 247, 267, 287 -->
  <!-- ASP workers: rows at y = 362, 382, 402, 422 -->

  <!-- === BSP Section === -->
  <!-- Worker rows (4 workers) centered at y=93,115,137,159 -->
  <!-- Step width = 108px per step -->
  <!-- Each compute block: 85px wide, then straggler wait fills remainder -->

  <!-- Worker 1 -->
  <text x="108" y="98" text-anchor="end" font-size="8.5" fill="#555">W1</text>
  <rect x="110" y="82" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="218" y="82" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="326" y="82" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="434" y="82" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="542" y="82" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- Worker 2 -->
  <text x="108" y="120" text-anchor="end" font-size="8.5" fill="#555">W2</text>
  <rect x="110" y="104" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="218" y="104" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="326" y="104" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="434" y="104" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="542" y="104" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- Worker 3 (straggler — shorter compute block, then forced wait) -->
  <text x="108" y="142" text-anchor="end" font-size="8.5" fill="#555">W3</text>
  <rect x="110" y="126" width="62" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <!-- straggler wait -->
  <rect x="172" y="126" width="46" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="2"/>
  <text x="195" y="141" text-anchor="middle" font-size="7.5" fill="#c44">wait</text>
  <rect x="218" y="126" width="62" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="280" y="126" width="46" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="2"/>
  <text x="303" y="141" text-anchor="middle" font-size="7.5" fill="#c44">wait</text>
  <rect x="326" y="126" width="62" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="388" y="126" width="46" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="2"/>
  <text x="411" y="141" text-anchor="middle" font-size="7.5" fill="#c44">wait</text>
  <rect x="434" y="126" width="62" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="496" y="126" width="46" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="2"/>
  <text x="519" y="141" text-anchor="middle" font-size="7.5" fill="#c44">wait</text>
  <rect x="542" y="126" width="62" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="604" y="126" width="46" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="2"/>
  <text x="627" y="141" text-anchor="middle" font-size="7.5" fill="#c44">wait</text>

  <!-- Worker 4 -->
  <text x="108" y="164" text-anchor="end" font-size="8.5" fill="#555">W4</text>
  <rect x="110" y="148" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="218" y="148" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="326" y="148" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="434" y="148" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="542" y="148" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- BSP barriers (red vertical lines at each step boundary) -->
  <line x1="218" y1="72" x2="218" y2="187" stroke="#c44" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="230.0" y="186" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">BARRIER</text>
  <line x1="326" y1="72" x2="326" y2="187" stroke="#c44" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="338.0" y="186" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">BARRIER</text>
  <line x1="434" y1="72" x2="434" y2="187" stroke="#c44" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="446.0" y="186" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">BARRIER</text>
  <line x1="542" y1="72" x2="542" y2="187" stroke="#c44" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="554.0" y="186" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">BARRIER</text>

  <!-- === SSP Section === -->
  <!-- Staleness bound s=1: workers can be at most 1 step ahead of slowest -->
  <!-- Worker 1: fast worker, runs ahead -->
  <text x="108" y="233" text-anchor="end" font-size="8.5" fill="#555">W1</text>
  <rect x="110" y="219" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <!-- W1 runs ahead to t=2 before waiting -->
  <rect x="218" y="219" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="326" y="219" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="434" y="219" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="542" y="219" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- Worker 2 -->
  <text x="108" y="256" text-anchor="end" font-size="8.5" fill="#555">W2</text>
  <rect x="110" y="242" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="218" y="242" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="326" y="242" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="434" y="242" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="542" y="242" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- Worker 3: slower, SSP allows brief hold but not full barrier -->
  <text x="108" y="279" text-anchor="end" font-size="8.5" fill="#555">W3</text>
  <rect x="110" y="265" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <!-- bounded staleness zone (orange, not red) -->
  <rect x="180" y="265" width="38" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="2"/>
  <text x="199" y="280" text-anchor="middle" font-size="7.5" fill="#c87b2a">s≤1</text>
  <rect x="218" y="265" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="288" y="265" width="38" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="2"/>
  <text x="307" y="280" text-anchor="middle" font-size="7.5" fill="#c87b2a">s≤1</text>
  <rect x="326" y="265" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="396" y="265" width="38" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="2"/>
  <text x="415" y="280" text-anchor="middle" font-size="7.5" fill="#c87b2a">s≤1</text>
  <rect x="434" y="265" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="504" y="265" width="38" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="2"/>
  <text x="523" y="280" text-anchor="middle" font-size="7.5" fill="#c87b2a">s≤1</text>
  <rect x="542" y="265" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- Worker 4 -->
  <text x="108" y="302" text-anchor="end" font-size="8.5" fill="#555">W4</text>
  <rect x="110" y="288" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="218" y="288" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="326" y="288" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="434" y="288" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="542" y="288" width="85" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- SSP annotation: bounded staleness zone label -->
  <text x="340" y="322" text-anchor="middle" font-size="8.5" fill="#c87b2a" font-style="italic">Bounded staleness window — workers within s=1 step of slowest; no hard barrier</text>

  <!-- === ASP Section === -->
  <!-- All workers run fully independently, different speeds -->
  <text x="108" y="369" text-anchor="end" font-size="8.5" fill="#555">W1</text>
  <rect x="110" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="186" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="262" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="338" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="414" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="490" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="566" y="352" width="70" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <text x="108" y="392" text-anchor="end" font-size="8.5" fill="#555">W2</text>
  <rect x="110" y="376" width="90" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="206" y="376" width="90" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="302" y="376" width="90" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="398" y="376" width="90" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="494" y="376" width="90" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="590" y="376" width="60" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <text x="108" y="415" text-anchor="end" font-size="8.5" fill="#555">W3</text>
  <rect x="110" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="171" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="232" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="293" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="354" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="415" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="476" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="537" y="400" width="55" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="598" y="400" width="52" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <text x="108" y="437" text-anchor="end" font-size="8.5" fill="#555">W4</text>
  <rect x="110" y="422" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="216" y="422" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="322" y="422" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="428" y="422" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>
  <rect x="534" y="422" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="2"/>

  <!-- ASP annotation -->
  <text x="340" y="453" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">No synchronization barriers — workers apply gradients immediately; staleness grows unbounded</text>
</svg>