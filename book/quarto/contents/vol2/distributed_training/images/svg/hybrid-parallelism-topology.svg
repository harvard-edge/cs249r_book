<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Bandwidth-Matched Hybrid Parallelism</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Each parallelism strategy maps to the hardware bandwidth tier that can support its communication frequency</text>

  <!-- ===== Outer ring: Data Parallelism (cross-rack, orange) ===== -->
  <ellipse cx="340" cy="245" rx="295" ry="195" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Data Parallelism</text>
  <text x="340" y="86" text-anchor="middle" font-size="9" fill="#c87b2a">Cross-rack fabric — 25 GB/s — gradient sync once per step</text>

  <!-- Outer ring bandwidth annotation -->
  <rect x="480" y="415" width="170" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="565" y="428" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">DP: 25 GB/s fabric</text>
  <text x="565" y="440" text-anchor="middle" font-size="8.5" fill="#c87b2a">AllReduce once/step</text>

  <!-- ===== Middle ring: Pipeline Parallelism (green) ===== -->
  <ellipse cx="340" cy="245" rx="210" ry="138" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="340" y="123" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Pipeline Parallelism</text>
  <text x="340" y="137" text-anchor="middle" font-size="9" fill="#3d9e5a">InfiniBand within rack — 50 GB/s — activation passing between stages</text>

  <!-- Middle ring bandwidth annotation -->
  <rect x="480" y="378" width="170" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="565" y="391" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">PP: 50 GB/s IB</text>
  <text x="565" y="403" text-anchor="middle" font-size="8.5" fill="#3d9e5a">Activations at boundaries</text>

  <!-- ===== Inner ring: Tensor Parallelism (blue, NVLink) ===== -->
  <ellipse cx="340" cy="245" rx="120" ry="82" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="340" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Tensor Parallelism</text>
  <text x="340" y="193" text-anchor="middle" font-size="9" fill="#4a90c4">NVLink — 900 GB/s — AllReduce per layer</text>

  <!-- Inner ring bandwidth annotation -->
  <rect x="480" y="341" width="170" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="565" y="354" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">TP: 900 GB/s NVLink</text>
  <text x="565" y="366" text-anchor="middle" font-size="8.5" fill="#4a90c4">AllReduce per-layer</text>

  <!-- ===== GPU icons in the innermost zone ===== -->
  <!-- 8 GPUs arranged in a ring inside the inner ellipse -->
  <!-- Positions around circle of radius ~55 centered at (340,245) -->
  <!-- GPU 0: top center (340,190) -->
  <rect x="327" y="213" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="340" y="224" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 0</text>

  <!-- GPU 1: top right (385,205) -->
  <rect x="372" y="213" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="385" y="214.0" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 1</text>

  <!-- GPU 2: right (410,245) -->
  <rect x="395" y="237" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="408" y="238.0" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 2</text>

  <!-- GPU 3: bottom right (385,268) -->
  <rect x="372" y="261" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="385" y="272" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 3</text>

  <!-- GPU 4: bottom center (340,275) -->
  <rect x="327" y="261" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="340" y="272" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 4</text>

  <!-- GPU 5: bottom left (295,268) -->
  <rect x="282" y="261" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="295" y="272" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 5</text>

  <!-- GPU 6: left (270,245) -->
  <rect x="257" y="237" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="270" y="238.0" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 6</text>

  <!-- GPU 7: top left (295,205) -->
  <rect x="282" y="213" width="26" height="16" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="295" y="214.0" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 7</text>

  <!-- NVLink connections between GPUs (all-reduce ring, thin blue lines) -->
  <line x1="340" y1="213" x2="385" y2="213" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="385" y1="213" x2="408" y2="237" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="408" y1="237" x2="385" y2="261" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="385" y1="261" x2="340" y2="261" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="340" y1="261" x2="295" y2="261" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="295" y1="261" x2="270" y2="237" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="270" y1="237" x2="295" y2="213" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="295" y1="213" x2="340" y2="213" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- ===== Legend annotations ===== -->
  <text x="30" y="330" font-size="9" font-weight="700" fill="#333">Bandwidth hierarchy:</text>
  <text x="30" y="345" font-size="9" fill="#4a90c4">TP (inner) → highest frequency, highest bandwidth required</text>
  <text x="30" y="358" font-size="9" fill="#3d9e5a">PP (middle) → moderate frequency, intermediate bandwidth</text>
  <text x="30" y="371" font-size="9" fill="#c87b2a">DP (outer) → lowest frequency, lowest bandwidth needed</text>

  <!-- ===== Annotation box: Jeff Dean Test ===== -->
  <rect x="30" y="390" width="280" height="42" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bandwidth-Matching Principle</text>
  <text x="170" y="417" text-anchor="middle" font-size="8.5" fill="#555">Communication volume ∝ 1/link bandwidth.</text>
  <text x="170" y="429" text-anchor="middle" font-size="8.5" fill="#555">Violating hierarchy stalls thousands of GPUs.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Production config: t=8 (NVLink), p=16 (InfiniBand), d=128 (cross-rack) → 16,384 total GPUs.</text>
</svg>