<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <defs>
    <pattern id="bubble-hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#bbb" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- ── Background ── -->
  <rect width="700" height="500" fill="#fff"/>

  <!-- ── Axes ── -->
  <line x1="90" y1="40" x2="90" y2="390" stroke="#333" stroke-width="1.2"/>
  <line x1="90" y1="390" x2="660" y2="390" stroke="#333" stroke-width="1.2"/>

  <!-- ── Axis titles ── -->
  <text x="20" y="210" font-size="11" font-weight="600" fill="#333" text-anchor="middle" transform="rotate(-90,20,210)">Pipeline Stage (GPU)</text>
  <text x="370" y="440" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Time Step</text>

  <!-- ── Y-axis labels ── -->
  <text x="80" y="90" font-size="9.5" fill="#555" text-anchor="end" font-weight="600">Stage 0</text>
  <text x="80" y="100" font-size="8" fill="#999" text-anchor="end">Layers 1-6</text>

  <text x="80" y="170" font-size="9.5" fill="#555" text-anchor="end" font-weight="600">Stage 1</text>
  <text x="80" y="180" font-size="8" fill="#999" text-anchor="end">Layers 7-12</text>

  <text x="80" y="250" font-size="9.5" fill="#555" text-anchor="end" font-weight="600">Stage 2</text>
  <text x="80" y="260" font-size="8" fill="#999" text-anchor="end">Layers 13-18</text>

  <text x="80" y="330" font-size="9.5" fill="#555" text-anchor="end" font-weight="600">Stage 3</text>
  <text x="80" y="340" font-size="8" fill="#999" text-anchor="end">Layers 19-24</text>

  <!-- ── X-axis tick labels ── -->
  <text x="120" y="410" font-size="9" fill="#555" text-anchor="middle">1</text>
  <text x="170" y="410" font-size="9" fill="#555" text-anchor="middle">2</text>
  <text x="220" y="410" font-size="9" fill="#555" text-anchor="middle">3</text>
  <text x="270" y="410" font-size="9" fill="#555" text-anchor="middle">4</text>
  <text x="320" y="410" font-size="9" fill="#555" text-anchor="middle">5</text>
  <text x="370" y="410" font-size="9" fill="#555" text-anchor="middle">6</text>
  <text x="420" y="410" font-size="9" fill="#555" text-anchor="middle">7</text>
  <text x="470" y="410" font-size="9" fill="#555" text-anchor="middle">8</text>
  <text x="520" y="410" font-size="9" fill="#555" text-anchor="middle">9</text>
  <text x="570" y="410" font-size="9" fill="#555" text-anchor="middle">10</text>
  <text x="620" y="410" font-size="9" fill="#555" text-anchor="middle">11</text>

  <!-- ── Grid lines ── -->
  <line x1="90" y1="130" x2="660" y2="130" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="210" x2="660" y2="210" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="290" x2="660" y2="290" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="90" y1="370" x2="660" y2="370" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Forward passes (F) — Blue ── -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- ── Stage 0: F0-F3 at t=1..4 ── -->
  <rect x="100" y="70" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="120" y="94" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F0</text>
  <rect x="150" y="70" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="94" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F1</text>
  <rect x="200" y="70" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="220" y="94" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F2</text>
  <rect x="250" y="70" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="94" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F3</text>

  <!-- ── Stage 1: F0-F3 at t=2..5 ── -->
  <rect x="150" y="150" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="174" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F0</text>
  <rect x="200" y="150" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="220" y="174" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F1</text>
  <rect x="250" y="150" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="174" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F2</text>
  <rect x="300" y="150" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="320" y="174" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F3</text>

  <!-- ── Stage 2: F0-F3 at t=3..6 ── -->
  <rect x="200" y="230" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="220" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F0</text>
  <rect x="250" y="230" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F1</text>
  <rect x="300" y="230" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="320" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F2</text>
  <rect x="350" y="230" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="370" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F3</text>

  <!-- ── Stage 3: F0-F3 at t=4..7 ── -->
  <rect x="250" y="310" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F0</text>
  <rect x="300" y="310" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="320" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F1</text>
  <rect x="350" y="310" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="370" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F2</text>
  <rect x="400" y="310" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="420" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">F3</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Backward passes (B) — Orange ── -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- ── Stage 3: B3-B0 at t=8..11 ── -->
  <rect x="450" y="310" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="470" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B3</text>
  <rect x="500" y="310" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="520" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B2</text>
  <rect x="550" y="310" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="570" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B1</text>
  <rect x="600" y="310" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="620" y="334" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B0</text>

  <!-- ── Stage 2: B3-B1 at t=9..11 ── -->
  <rect x="500" y="230" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="520" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B3</text>
  <rect x="550" y="230" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="570" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B2</text>
  <rect x="600" y="230" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="620" y="254" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B1</text>

  <!-- ── Stage 1: B3-B2 at t=10..11 ── -->
  <rect x="550" y="150" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="570" y="174" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B3</text>
  <rect x="600" y="150" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="620" y="174" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B2</text>

  <!-- ── Stage 0: B3 at t=11 ── -->
  <rect x="600" y="70" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="620" y="94" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B3</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Bubble (idle) cells ── -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Fill-phase bubbles -->
  <rect x="100" y="150" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  
  <rect x="100" y="230" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="150" y="230" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  
  <rect x="100" y="310" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="150" y="310" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="200" y="310" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>

  <!-- Mid/drain bubbles -->
  <!-- Stage 0: t=5..10 (6 slots) -->
  <rect x="300" y="70" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="350" y="70" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="400" y="70" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="450" y="70" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="500" y="70" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="550" y="70" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>

  <!-- Stage 1: t=6..9 (4 slots) -->
  <rect x="350" y="150" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="400" y="150" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="450" y="150" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="500" y="150" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>

  <!-- Stage 2: t=7..8 (2 slots) -->
  <rect x="400" y="230" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <rect x="450" y="230" width="40" height="40" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>

  <!-- ── Legend ── -->
  <rect x="100" y="460" width="20" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="474" font-size="9" fill="#555">Forward (F)</text>

  <rect x="220" y="460" width="20" height="20" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="250" y="474" font-size="9" fill="#555">Backward (B)</text>

  <rect x="340" y="460" width="20" height="20" rx="4" fill="url(#bubble-hatch)" stroke="#bbb" stroke-width="1"/>
  <text x="370" y="474" font-size="9" fill="#555">Bubble (idle)</text>

  <!-- ── Bubble overhead formula ── -->
  <text x="540" y="468" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Bubble fraction = (p-1)/m</text>
  <text x="540" y="482" font-size="9" fill="#999" font-style="italic" text-anchor="middle">p = 4 stages, m = 4 micro-batches</text>

</svg>