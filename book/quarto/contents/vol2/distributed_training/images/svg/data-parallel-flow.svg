<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="880" height="520" fill="#fff"/>

  <!-- ── Phase column headers ── -->
  <text x="60" y="20" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Input</text>
  <text x="180" y="20" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Split</text>
  <text x="380" y="20" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Forward + Backward</text>
  <text x="600" y="20" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Gradient Sync</text>
  <text x="800" y="20" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Update</text>

  <!-- ── Phase separator lines ── -->
  <line x1="130" y1="30" x2="130" y2="470" stroke="#e8e8e8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="250" y1="30" x2="250" y2="470" stroke="#e8e8e8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="525" y1="30" x2="525" y2="470" stroke="#e8e8e8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="720" y1="30" x2="720" y2="470" stroke="#e8e8e8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ── Input Batch ── -->
  <rect x="20" y="165" width="80" height="160" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="60" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Global</text>
  <text x="60" y="235" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Batch</text>
  <text x="60" y="255" font-size="9" fill="#555" text-anchor="middle">B = 128</text>
  <text x="60" y="270" font-size="9" fill="#555" text-anchor="middle">samples</text>

  <!-- ── Split arrows from batch to mini-batches (Orthogonal) ── -->
  <path d="M 100 230 L 110 230 L 110 80 L 140 80" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 100 240 L 120 240 L 120 190 L 140 190" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 100 250 L 120 250 L 120 300 L 140 300" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 100 260 L 110 260 L 110 410 L 140 410" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 0 Swimlane ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="140" y="60" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="76" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Mini-batch 0</text>
  <text x="180" y="90" font-size="8.5" fill="#555" text-anchor="middle">32 samples</text>

  <rect x="230" y="46" width="40" height="14" fill="#a31f34"/>
  <text x="250" y="56" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">GPU 0</text>

  <!-- Forward -->
  <rect x="280" y="70" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="310" y="84" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Forward</text>
  <!-- Loss -->
  <rect x="360" y="70" width="40" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="380" y="84" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Loss</text>
  <!-- Backward -->
  <rect x="420" y="70" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="84" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">Backward</text>

  <line x1="220" y1="80" x2="280" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="80" x2="360" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="80" x2="420" y2="80" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Gradient -->
  <rect x="280" y="110" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="380" y="124" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Gradient g₀</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 1 Swimlane ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="140" y="170" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="186" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Mini-batch 1</text>
  <text x="180" y="200" font-size="8.5" fill="#555" text-anchor="middle">32 samples</text>

  <rect x="230" y="156" width="40" height="14" fill="#a31f34"/>
  <text x="250" y="166" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">GPU 1</text>

  <rect x="280" y="180" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="310" y="194" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Forward</text>
  <rect x="360" y="180" width="40" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="380" y="194" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Loss</text>
  <rect x="420" y="180" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="194" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">Backward</text>

  <line x1="220" y1="190" x2="280" y2="190" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="190" x2="360" y2="190" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="190" x2="420" y2="190" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="280" y="220" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="380" y="234" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Gradient g₁</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 2 Swimlane ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="140" y="280" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="296" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Mini-batch 2</text>
  <text x="180" y="310" font-size="8.5" fill="#555" text-anchor="middle">32 samples</text>

  <rect x="230" y="266" width="40" height="14" fill="#a31f34"/>
  <text x="250" y="276" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">GPU 2</text>

  <rect x="280" y="290" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="310" y="304" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Forward</text>
  <rect x="360" y="290" width="40" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="380" y="304" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Loss</text>
  <rect x="420" y="290" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="304" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">Backward</text>

  <line x1="220" y1="300" x2="280" y2="300" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="300" x2="360" y2="300" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="300" x2="420" y2="300" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="280" y="330" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="380" y="344" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Gradient g₂</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 3 Swimlane ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="140" y="390" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="406" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Mini-batch 3</text>
  <text x="180" y="420" font-size="8.5" fill="#555" text-anchor="middle">32 samples</text>

  <rect x="230" y="376" width="40" height="14" fill="#a31f34"/>
  <text x="250" y="386" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">GPU 3</text>

  <rect x="280" y="400" width="60" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="310" y="414" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Forward</text>
  <rect x="360" y="400" width="40" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="380" y="414" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Loss</text>
  <rect x="420" y="400" width="60" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="414" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">Backward</text>

  <line x1="220" y1="410" x2="280" y2="410" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="410" x2="360" y2="410" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="410" x2="420" y2="410" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="280" y="440" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="380" y="454" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Gradient g₃</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── AllReduce Sync Block ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <!-- Arrows from Gradients to AllReduce -->
  <path d="M 480 120 L 510 120 L 510 270 L 540 270" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 480 230 L 500 230 L 500 280 L 540 280" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 480 340 L 500 340 L 500 290 L 540 290" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 480 450 L 510 450 L 510 300 L 540 300" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <rect x="540" y="225" width="120" height="120" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="600" y="245" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">AllReduce</text>
  <text x="600" y="265" font-size="9" fill="#555" text-anchor="middle">g = (1/N) Σ gₖ</text>
  <text x="600" y="285" font-size="8.5" fill="#555" text-anchor="middle">Ring topology</text>
  <text x="600" y="305" font-size="8.5" fill="#555" text-anchor="middle">2(N-1)/N volume</text>

  <!-- Ring icon -->
  <circle cx="600" cy="325" r="9" fill="none" stroke="#2d7a2d" stroke-width="1.5"/>
  <circle cx="591" cy="325" r="2.5" fill="#2d7a2d"/>
  <circle cx="609" cy="325" r="2.5" fill="#2d7a2d"/>
  <circle cx="600" cy="316" r="2.5" fill="#2d7a2d"/>
  <circle cx="600" cy="334" r="2.5" fill="#2d7a2d"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Update Phase ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <!-- Arrows from AllReduce to Update Blocks -->
  <path d="M 660 270 L 680 270 L 680 80 L 740 80" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <path d="M 660 280 L 700 280 L 700 190 L 740 190" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <path d="M 660 290 L 700 290 L 700 300 L 740 300" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <path d="M 660 300 L 680 300 L 680 410 L 740 410" fill="none" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="740" y="60" width="120" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="800" y="76" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 0: Update</text>
  <text x="800" y="90" font-size="8" fill="#555" text-anchor="middle">θ ← θ - η·g</text>

  <rect x="740" y="170" width="120" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="800" y="186" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 1: Update</text>
  <text x="800" y="200" font-size="8" fill="#555" text-anchor="middle">θ ← θ - η·g</text>

  <rect x="740" y="280" width="120" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="800" y="296" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 2: Update</text>
  <text x="800" y="310" font-size="8" fill="#555" text-anchor="middle">θ ← θ - η·g</text>

  <rect x="740" y="390" width="120" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="800" y="406" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 3: Update</text>
  <text x="800" y="420" font-size="8" fill="#555" text-anchor="middle">θ ← θ - η·g</text>

  <!-- ── Identical weights annotation ── -->
  <rect x="740" y="440" width="120" height="20" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="800" y="454" font-size="8.5" font-weight="600" fill="#2d7a2d" text-anchor="middle">All θ identical</text>

  <!-- ── Bottom annotations ── -->
  <text x="440" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Embarrassingly parallel compute; communication only at gradient sync (10-40% of step time)</text>
  <text x="440" y="506" font-size="9" fill="#999" font-style="italic" text-anchor="middle">N = 4 GPUs, global batch B = 128, per-GPU micro-batch = 32</text>

</svg>