<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="720" height="460" fill="#fff"/>

  <!-- ── Column dividers ── -->
  <line x1="240" y1="10" x2="240" y2="450" stroke="#e0e0e0" stroke-width="0.8"/>
  <line x1="480" y1="10" x2="480" y2="450" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── (a) Ring AllReduce ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="120" y="30" font-size="12" font-weight="700" fill="#333" text-anchor="middle">(a) Ring AllReduce</text>

  <!-- 4 GPU nodes in a ring -->
  <rect x="40" y="100" width="60" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="70" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>

  <rect x="140" y="100" width="60" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>

  <rect x="140" y="200" width="60" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="224" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <rect x="40" y="200" width="60" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="70" y="224" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>

  <!-- Orthogonal clockwise ring paths -->
  <line x1="100" y1="120" x2="140" y2="120" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="170" y1="140" x2="170" y2="200" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="140" y1="220" x2="100" y2="220" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="70" y1="200" x2="70" y2="140" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Data chunk labels -->
  <!-- Adjusted for >= 4px clearance -->
  <text x="120" y="108" font-size="8" fill="#4a90c4" font-weight="600" text-anchor="middle">chunk 0</text>
  <text x="180" y="174" font-size="8" fill="#4a90c4" font-weight="600" text-anchor="start">chunk 1</text>
  <text x="120" y="236" font-size="8" fill="#4a90c4" font-weight="600" text-anchor="middle">chunk 2</text>
  <text x="60" y="174" font-size="8" fill="#4a90c4" font-weight="600" text-anchor="end">chunk 3</text>

  <!-- Characteristics box -->
  <rect x="20" y="310" width="200" height="120" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="120" y="330" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Bandwidth Optimal</text>
  <line x1="30" y1="340" x2="210" y2="340" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="30" y="360" font-size="9" fill="#555">Volume: 2(N-1)/N per GPU</text>
  <text x="30" y="380" font-size="9" fill="#555">Latency: O(N) steps</text>
  <text x="30" y="400" font-size="9" fill="#555">BW utilization: ~100%</text>
  <text x="30" y="420" font-size="9" fill="#999" font-style="italic">Default in NCCL / PyTorch DDP</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── (b) Parameter Server ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="360" y="30" font-size="12" font-weight="700" fill="#333" text-anchor="middle">(b) Parameter Server</text>

  <!-- Bottleneck label -->
  <rect x="320" y="60" width="80" height="16" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="360" y="71" font-size="8" font-weight="600" fill="#a31f34" text-anchor="middle">Bottleneck</text>

  <!-- PS central node -->
  <rect x="320" y="80" width="80" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="360" y="98" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Param</text>
  <text x="360" y="112" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Server</text>

  <!-- Worker nodes -->
  <rect x="265" y="200" width="40" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="285" y="224" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W 0</text>

  <rect x="315" y="200" width="40" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="335" y="224" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W 1</text>

  <rect x="365" y="200" width="40" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="385" y="224" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W 2</text>

  <rect x="415" y="200" width="40" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="435" y="224" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W 3</text>

  <!-- Flow paths (Zero-crossing layered routing) -->
  <!-- W0 -->
  <path d="M 280,200 L 280,130 L 325,130 L 325,120" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 335,120 L 335,150 L 290,150 L 290,200" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  
  <!-- W1 -->
  <path d="M 330,200 L 330,165 L 345,165 L 345,120" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 355,120 L 355,180 L 340,180 L 340,200" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- W2 -->
  <path d="M 390,200 L 390,165 L 375,165 L 375,120" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 365,120 L 365,180 L 380,180 L 380,200" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- W3 -->
  <path d="M 440,200 L 440,130 L 395,130 L 395,120" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 385,120 L 385,150 L 430,150 L 430,200" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Flow labels -->
  <!-- Placed over the top-level horizontal segments for unambiguous association -->
  <text x="302.5" y="124" font-size="7.5" fill="#555" text-anchor="middle">push grads</text>
  <text x="407.5" y="144" font-size="7.5" fill="#555" text-anchor="middle">pull params</text>

  <!-- Characteristics box -->
  <rect x="260" y="310" width="200" height="120" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="360" y="330" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Centralized (Legacy)</text>
  <line x1="270" y1="340" x2="450" y2="340" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="270" y="360" font-size="9" fill="#555">Volume: 2M per worker</text>
  <text x="270" y="380" font-size="9" fill="#555">Latency: O(1) rounds</text>
  <text x="270" y="400" font-size="9" fill="#555">BW utilization: limited by PS</text>
  <text x="270" y="420" font-size="9" fill="#999" font-style="italic">Used in DistBelief (2012)</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── (c) All-to-All (Mesh) ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="600" y="30" font-size="12" font-weight="700" fill="#333" text-anchor="middle">(c) All-to-All Mesh</text>

  <!-- 4 GPU nodes in a grid -->
  <rect x="520" y="100" width="60" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="550" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>

  <rect x="620" y="100" width="60" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="650" y="124" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>

  <rect x="520" y="200" width="60" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="550" y="224" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>

  <rect x="620" y="200" width="60" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="650" y="224" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <!-- All-to-all connections -->
  <line x1="580" y1="120" x2="620" y2="120" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="580" y1="220" x2="620" y2="220" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="550" y1="140" x2="550" y2="200" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="650" y1="140" x2="650" y2="200" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="580" y1="140" x2="620" y2="200" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="620" y1="140" x2="580" y2="200" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Link count -->
  <rect x="580" y="162" width="40" height="14" fill="#fff" />
  <text x="600" y="173" font-size="9" fill="#c87b2a" font-weight="600" text-anchor="middle">6 links</text>

  <!-- Characteristics box -->
  <rect x="500" y="310" width="200" height="120" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="600" y="330" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fully Connected</text>
  <line x1="510" y1="340" x2="690" y2="340" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="510" y="360" font-size="9" fill="#555">Volume: M(N-1) total</text>
  <text x="510" y="380" font-size="9" fill="#555">Latency: O(1) rounds</text>
  <text x="510" y="400" font-size="9" fill="#555">BW utilization: high if N small</text>
  <text x="510" y="420" font-size="9" fill="#999" font-style="italic">Impractical beyond 8 nodes</text>

  <!-- ── Bottom annotation ── -->
  <text x="360" y="450" font-size="9" fill="#999" font-style="italic" text-anchor="middle">N = 4 GPUs, M = model size in bytes. Ring AllReduce is the modern default for dense GPU clusters.</text>

</svg>