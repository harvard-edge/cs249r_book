<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="720" height="480" fill="#fff"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Math equation at top ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="100" y="10" width="520" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="360" y="26" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Tensor Parallelism: Column-wise split of linear layer Y = XW</text>
  <text x="360" y="42" font-size="9" fill="#555" text-anchor="middle">Y = X[W₀ | W₁ | W₂ | W₃] = [XW₀ | XW₁ | XW₂ | XW₃] = [Y₀ | Y₁ | Y₂ | Y₃]</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Input tensor (left) ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="20" y="150" width="70" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="55" y="188" font-size="11" font-weight="700" fill="#333" text-anchor="middle">X</text>
  <text x="55" y="204" font-size="8" fill="#555" text-anchor="middle">Input</text>
  <text x="55" y="216" font-size="8" fill="#555" text-anchor="middle">[B, d]</text>

  <!-- ── Broadcast arrows from X to each GPU ── -->
  <text x="140" y="85" font-size="9" font-weight="600" fill="#555" text-anchor="middle">Broadcast X</text>
  
  <path d="M 90 170 L 120 170 L 120 95 L 160 95" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 90 190 L 110 190 L 110 165 L 160 165" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 90 210 L 110 210 L 110 235 L 160 235" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 90 230 L 120 230 L 120 305 L 160 305" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 0: Weight shard W0, partial output Y0 ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="160" y="56" width="40" height="18" fill="#a31f34"/>
  <text x="180" y="66" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">GPU 0</text>
  <rect x="160" y="70" width="130" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="90" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W₀: [d, d/4]</text>
  <text x="225" y="105" font-size="8.5" fill="#555" text-anchor="middle">Y₀ = X × W₀</text>

  <path d="M 290 95 L 320 95" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="75" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="350" y="92" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Y₀</text>
  <text x="350" y="105" font-size="7.5" fill="#555" text-anchor="middle">[B, d/4]</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 1 ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="160" y="126" width="40" height="18" fill="#a31f34"/>
  <text x="180" y="136" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">GPU 1</text>
  <rect x="160" y="140" width="130" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="160" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W₁: [d, d/4]</text>
  <text x="225" y="175" font-size="8.5" fill="#555" text-anchor="middle">Y₁ = X × W₁</text>

  <path d="M 290 165 L 320 165" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="145" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="350" y="162" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Y₁</text>
  <text x="350" y="175" font-size="7.5" fill="#555" text-anchor="middle">[B, d/4]</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 2 ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="160" y="196" width="40" height="18" fill="#a31f34"/>
  <text x="180" y="206" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">GPU 2</text>
  <rect x="160" y="210" width="130" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="230" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W₂: [d, d/4]</text>
  <text x="225" y="245" font-size="8.5" fill="#555" text-anchor="middle">Y₂ = X × W₂</text>

  <path d="M 290 235 L 320 235" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="215" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="350" y="232" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Y₂</text>
  <text x="350" y="245" font-size="7.5" fill="#555" text-anchor="middle">[B, d/4]</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── GPU 3 ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="160" y="266" width="40" height="18" fill="#a31f34"/>
  <text x="180" y="276" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">GPU 3</text>
  <rect x="160" y="280" width="130" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="300" font-size="9" font-weight="700" fill="#333" text-anchor="middle">W₃: [d, d/4]</text>
  <text x="225" y="315" font-size="8.5" fill="#555" text-anchor="middle">Y₃ = X × W₃</text>

  <path d="M 290 305 L 320 305" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <rect x="320" y="285" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="350" y="302" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Y₃</text>
  <text x="350" y="315" font-size="7.5" fill="#555" text-anchor="middle">[B, d/4]</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── AllGather / Concatenation ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <path d="M 380 95 L 420 95 L 420 170 L 440 170" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 380 165 L 400 165 L 400 190 L 440 190" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 380 235 L 400 235 L 400 210 L 440 210" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 380 305 L 420 305 L 420 230 L 440 230" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>

  <rect x="440" y="150" width="120" height="100" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="500" y="176" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">AllGather</text>
  <text x="500" y="194" font-size="9" fill="#555" text-anchor="middle">Concatenate</text>
  <text x="500" y="210" font-size="9" fill="#555" text-anchor="middle">[Y₀|Y₁|Y₂|Y₃]</text>
  <text x="500" y="226" font-size="8.5" fill="#555" text-anchor="middle">via NVLink</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Output tensor ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <path d="M 560 200 L 600 200" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="600" y="150" width="100" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="650" y="188" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Y</text>
  <text x="650" y="204" font-size="9" fill="#555" text-anchor="middle">Output</text>
  <text x="650" y="218" font-size="8" fill="#555" text-anchor="middle">[B, d]</text>
  <text x="650" y="234" font-size="8" fill="#555" text-anchor="middle">= XW</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ── Backward pass annotation ── -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="100" y="360" width="520" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="360" y="376" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Backward Pass: AllReduce on gradients (not AllGather)</text>
  <text x="360" y="390" font-size="9" fill="#555" text-anchor="middle">Each GPU computes local dL/dWᵢ. Input gradient dL/dX requires AllReduce across GPUs.</text>

  <!-- ── Hardware constraint annotation ── -->
  <rect x="100" y="410" width="520" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="360" y="426" font-size="9" font-weight="600" fill="#a31f34" text-anchor="middle">Requires NVLink (600 GB/s): communication happens every layer, not just at step boundary</text>
  <text x="360" y="440" font-size="8" fill="#555" text-anchor="middle">Confined to intra-node (8 GPUs). Inter-node TP is infeasible on Ethernet/InfiniBand.</text>

</svg>