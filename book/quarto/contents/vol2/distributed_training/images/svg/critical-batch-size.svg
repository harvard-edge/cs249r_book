<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <defs>
    <clipPath id="plot-clip">
      <rect x="80" y="60" width="540" height="320" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" fill="#fff"/>

  <!-- ── Plot area ── -->
  <rect x="80" y="60" width="540" height="320" fill="#fff" stroke="#bbb" stroke-width="1.2" rx="4"/>

  <!-- ── Region shading and Curve ── -->
  <g clip-path="url(#plot-clip)">
    <!-- Linear scaling regime -->
    <rect x="80" y="60" width="260" height="320" fill="#d4edda" opacity="0.45"/>
    <!-- Diminishing returns regime -->
    <rect x="340" y="60" width="280" height="320" fill="#fdebd0" opacity="0.45"/>

    <!-- The curve: rises linearly, then flattens and slightly drops -->
    <path d="M 80,360 C 130,330 170,280 220,240 C 260,200 300,170 340,160 C 390,150 430,140 470,140 C 520,140 570,140 620,140" fill="none" stroke="#4a90c4" stroke-width="2.8"/>
  </g>

  <!-- ── Region labels ── -->
  <text x="210" y="90" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Linear Scaling</text>
  <text x="210" y="105" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Regime</text>
  <text x="480" y="90" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Diminishing Returns</text>
  <text x="480" y="105" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Regime</text>

  <!-- ── Critical batch size vertical dashed line ── -->
  <line x1="340" y1="60" x2="340" y2="385" stroke="#c44" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="340" y="415" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">B* (Critical Batch Size)</text>

  <!-- Dot at knee point -->
  <circle cx="340" cy="160" r="5" fill="#c44" stroke="#fff" stroke-width="1.5"/>

  <!-- ── Axis labels ── -->
  <text x="350" y="440" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Batch Size  (log scale)</text>
  <text x="30" y="220" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90, 30, 220)">Training Efficiency (samples/sec per GPU)</text>

  <!-- ── X axis ticks and labels ── -->
  <line x1="80" y1="380" x2="620" y2="380" stroke="#bbb" stroke-width="1.2"/>
  
  <line x1="80" y1="380" x2="80" y2="385" stroke="#bbb" stroke-width="1.2"/>
  <text x="80" y="395" font-size="9" fill="#555" text-anchor="middle">64</text>
  
  <line x1="170" y1="380" x2="170" y2="385" stroke="#bbb" stroke-width="1.2"/>
  <text x="170" y="395" font-size="9" fill="#555" text-anchor="middle">512</text>
  
  <line x1="260" y1="380" x2="260" y2="385" stroke="#bbb" stroke-width="1.2"/>
  <text x="260" y="395" font-size="9" fill="#555" text-anchor="middle">4K</text>
  
  <line x1="350" y1="380" x2="350" y2="385" stroke="#bbb" stroke-width="1.2"/>
  <text x="350" y="395" font-size="9" fill="#555" text-anchor="middle">32K</text>
  
  <line x1="470" y1="380" x2="470" y2="385" stroke="#bbb" stroke-width="1.2"/>
  <text x="470" y="395" font-size="9" fill="#555" text-anchor="middle">512K</text>
  
  <line x1="620" y1="380" x2="620" y2="385" stroke="#bbb" stroke-width="1.2"/>

  <!-- ── Y axis ticks ── -->
  <line x1="80" y1="380" x2="80" y2="60" stroke="#bbb" stroke-width="1.2"/>
  
  <line x1="75" y1="380" x2="80" y2="380" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="383" font-size="9" fill="#555" text-anchor="end">0</text>
  
  <line x1="75" y1="300" x2="80" y2="300" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="303" font-size="9" fill="#555" text-anchor="end">0.25</text>
  
  <line x1="75" y1="220" x2="80" y2="220" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="223" font-size="9" fill="#555" text-anchor="end">0.50</text>
  
  <line x1="75" y1="140" x2="80" y2="140" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="143" font-size="9" fill="#555" text-anchor="end">0.75</text>
  
  <line x1="75" y1="60" x2="80" y2="60" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="63" font-size="9" fill="#555" text-anchor="end">1.00</text>

  <!-- ── Annotation: linear regime ── -->
  <text x="210" y="210" font-size="9.5" fill="#3d9e5a" text-anchor="middle">comm. hides</text>
  <text x="210" y="225" font-size="9.5" fill="#3d9e5a" text-anchor="middle">behind compute</text>

  <!-- ── Annotation: diminishing returns regime ── -->
  <text x="480" y="200" font-size="9.5" fill="#c87b2a" text-anchor="middle">gradient noise</text>
  <text x="480" y="215" font-size="9.5" fill="#c87b2a" text-anchor="middle">limits learning</text>

  <!-- ── Example points ── -->
  <!-- ResNet-50 -->
  <path d="M 260,120 L 290,120 L 290,175" fill="none" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="290" cy="180" r="5" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <rect x="140" y="100" width="120" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="200" y="115" font-size="9.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">ResNet-50</text>
  <text x="200" y="130" font-size="9" fill="#3d9e5a" text-anchor="middle">B* ≈ 8K samples</text>

  <!-- GPT-3 -->
  <path d="M 560,110 L 560,135" fill="none" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="560" cy="140" r="5" fill="#c87b2a" stroke="#fff" stroke-width="1.5"/>
  <rect x="480" y="70" width="140" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="550" y="85" font-size="9.5" font-weight="700" fill="#c87b2a" text-anchor="middle">GPT-3</text>
  <text x="550" y="100" font-size="9" fill="#c87b2a" text-anchor="middle">B* ≈ 4M tokens</text>

  <!-- ── Bottom annotation ── -->
  <text x="350" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Above B*, adding replicas yields sub-linear throughput gains; statistical noise degrades convergence.</text>

</svg>