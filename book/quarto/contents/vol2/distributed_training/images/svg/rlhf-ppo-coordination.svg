<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">PPO Multi-Model Coordination</text>
  <text x="340" y="43" text-anchor="middle" font-size="9" fill="#555">RLHF requires four models interacting per training step — training mode (gradients) and inference mode (forward-only)</text>

  <!-- ===== Policy Model (center-left, large blue — training mode) ===== -->
  <rect x="55" y="150" width="175" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2" rx="6"/>
  <text x="142.5" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Policy Model</text>
  <text x="142.5" y="195" text-anchor="middle" font-size="9" fill="#555">70B params — training mode</text>
  <text x="142.5" y="209" text-anchor="middle" font-size="8.5" fill="#555">Weights + Gradients + Adam</text>
  <text x="142.5" y="223" text-anchor="middle" font-size="8.5" fill="#4a90c4">~1,120 GB memory</text>
  <!-- Training badge -->
  <rect x="55" y="150" width="52" height="14" fill="#4a90c4" rx="4"/>
  <text x="81" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">TRAINING</text>

  <!-- ===== Reference Model (center-right, neutral — inference mode) ===== -->
  <rect x="450" y="150" width="175" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="2" rx="6"/>
  <text x="537.5" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Reference Model</text>
  <text x="537.5" y="195" text-anchor="middle" font-size="9" fill="#555">70B params — frozen copy</text>
  <text x="537.5" y="209" text-anchor="middle" font-size="8.5" fill="#555">FP16 weights only (no grad)</text>
  <text x="537.5" y="223" text-anchor="middle" font-size="8.5" fill="#999">~140 GB memory</text>
  <!-- Inference badge -->
  <rect x="450" y="150" width="52" height="14" fill="#999" rx="4"/>
  <text x="476" y="160" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">INFERENCE</text>

  <!-- ===== Reward Model (bottom-center, green — inference mode) ===== -->
  <rect x="250" y="330" width="175" height="90" fill="#d4edda" stroke="#3d9e5a" stroke-width="2" rx="6"/>
  <text x="337.5" y="358" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Reward Model</text>
  <text x="337.5" y="374" text-anchor="middle" font-size="9" fill="#555">13B params — inference mode</text>
  <text x="337.5" y="388" text-anchor="middle" font-size="8.5" fill="#555">Scores completions → scalar r</text>
  <text x="337.5" y="402" text-anchor="middle" font-size="8.5" fill="#3d9e5a">~26 GB memory</text>
  <!-- Inference badge -->
  <rect x="250" y="330" width="52" height="14" fill="#3d9e5a" rx="4"/>
  <text x="276" y="340" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">INFERENCE</text>

  <!-- ===== Value Model (top-center, orange — training mode) ===== -->
  <rect x="250" y="55" width="175" height="90" fill="#fdebd0" stroke="#c87b2a" stroke-width="2" rx="6"/>
  <text x="337.5" y="83" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Value Model</text>
  <text x="337.5" y="99" text-anchor="middle" font-size="9" fill="#555">13B params — training mode</text>
  <text x="337.5" y="113" text-anchor="middle" font-size="8.5" fill="#555">PPO critic: estimates V(s)</text>
  <text x="337.5" y="127" text-anchor="middle" font-size="8.5" fill="#c87b2a">~200–400 GB memory</text>
  <!-- Training badge -->
  <rect x="250" y="55" width="52" height="14" fill="#c87b2a" rx="4"/>
  <text x="276" y="65" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">TRAINING</text>

  <!-- ===== Data flow arrows ===== -->

  <!-- Prompts → Policy (left edge of policy) -->
  <text x="30" y="205" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Prompts</text>
  <line x1="30" y1="195" x2="55" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Policy → responses (right edge, downward to reward) -->
  <!-- Policy right edge center: (230, 200) -->
  <!-- Reward model top-center: (337, 330) -->
  <path d="M 230 200 Q 300 265 250 330" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="268" y="268" text-anchor="start" font-size="8.5" fill="#555">responses</text>

  <!-- Reward → reward signal → Policy (bottom of policy) -->
  <path d="M 250 375 Q 180 375 142 250" stroke="#3d9e5a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="158" y="380" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">reward r</text>

  <!-- Policy → KL check → Reference (across top) -->
  <line x1="230" y1="165" x2="450" y2="165" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="340" y="158" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">KL divergence penalty</text>
  <text x="340" y="170" text-anchor="middle" font-size="8" fill="#a31f34">π_θ(a|s) vs π_ref(a|s)</text>

  <!-- Value model ↔ Policy (vertical between value and policy) -->
  <line x1="337" y1="145" x2="200" y2="150" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <text x="255" y="142" text-anchor="middle" font-size="8.5" fill="#c87b2a">advantage A(s,a)</text>

  <!-- PPO update arrow (policy self-loop) -->
  <path d="M 55 220 Q 20 260 55 240" stroke="#4a90c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="12" y="245" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">PPO</text>
  <text x="12" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">update</text>

  <!-- ===== Memory total annotation ===== -->
  <rect x="455" y="300" width="200" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
  <text x="555" y="318" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">PPO Total: ~2,406 GB</text>
  <text x="555" y="332" text-anchor="middle" font-size="8.5" fill="#555">= 1,120 + 140 + 26 + 1,120</text>
  <text x="555" y="346" text-anchor="middle" font-size="8.5" fill="#555">Min. 31 H100s (params only)</text>
  <text x="555" y="360" text-anchor="middle" font-size="8.5" fill="#c44">64–128 GPUs in practice</text>

  <!-- DPO comparison -->
  <rect x="455" y="370" width="200" height="42" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="555" y="386" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">DPO: ~1,260 GB (48% less)</text>
  <text x="555" y="399" text-anchor="middle" font-size="8.5" fill="#555">Only Policy + Reference models</text>
  <text x="555" y="411" text-anchor="middle" font-size="8.5" fill="#3d9e5a">No generation phase</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">KL-divergence penalty prevents policy from drifting beyond pre-trained distribution. Value model often shares policy backbone.</text>
</svg>