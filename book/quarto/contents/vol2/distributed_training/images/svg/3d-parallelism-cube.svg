<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="460" fill="#fff"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- Isometric cube: origin at (300, 310)                      -->
  <!-- Isometric unit vectors snapped to 10px grid:              -->
  <!--   X (right):       dx = (80, 0)                          -->
  <!--   Y (up):          dy = (0, -90)                         -->
  <!--   Z (left-back):   dz = (-60, 40)                        -->
  <!-- Cube corners: O=(300,310), A=O+X, B=O+Y, C=O+Z           -->
  <!--   D=O+X+Y, E=O+X+Z, F=O+Y+Z, G=O+X+Y+Z                  -->
  <!--                                                            -->
  <!-- O   = (300, 310)                                          -->
  <!-- A   = (380, 310)                                          -->
  <!-- B   = (300, 220)                                          -->
  <!-- C   = (240, 350)                                          -->
  <!-- D   = (380, 220)                                          -->
  <!-- E   = (320, 350)                                          -->
  <!-- F   = (240, 260)                                          -->
  <!-- G   = (320, 260)                                          -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- Right face (X+Y plane, at Z=0): orange — Tensor Parallel -->
  <polygon points="300,310 380,310 380,220 300,220" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8" opacity="0.85"/>

  <!-- Top face (X+Z plane, at Y=1): blue — Data Parallel -->
  <polygon points="300,220 380,220 320,260 240,260" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8" opacity="0.85"/>

  <!-- Left face (Y+Z plane, at X=0): green — Pipeline Parallel -->
  <polygon points="300,310 240,350 240,260 300,220" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8" opacity="0.85"/>

  <!-- Dashed hidden edges of the cube -->
  <!-- Back bottom edge (A to E) -->
  <line x1="380" y1="310" x2="320" y2="350" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Back right edge (E to G) -->
  <line x1="320" y1="350" x2="320" y2="260" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Back bottom to G (C to E) -->
  <line x1="240" y1="350" x2="320" y2="350" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Visible outer edges -->
  <!-- Bottom: O to A -->
  <line x1="300" y1="310" x2="380" y2="310" stroke="#555" stroke-width="1.6"/>
  <!-- Left bottom: O to C -->
  <line x1="300" y1="310" x2="240" y2="350" stroke="#555" stroke-width="1.6"/>
  <!-- Vertical: O to B -->
  <line x1="300" y1="310" x2="300" y2="220" stroke="#555" stroke-width="1.6"/>
  <!-- A to D -->
  <line x1="380" y1="310" x2="380" y2="220" stroke="#555" stroke-width="1.6"/>
  <!-- B to D -->
  <line x1="300" y1="220" x2="380" y2="220" stroke="#555" stroke-width="1.6"/>
  <!-- B to F -->
  <line x1="300" y1="220" x2="240" y2="260" stroke="#555" stroke-width="1.6"/>
  <!-- D to G -->
  <line x1="380" y1="220" x2="320" y2="260" stroke="#555" stroke-width="1.6"/>
  <!-- F to G -->
  <line x1="240" y1="260" x2="320" y2="260" stroke="#555" stroke-width="1.6"/>
  <!-- C to F -->
  <line x1="240" y1="350" x2="240" y2="260" stroke="#555" stroke-width="1.6"/>

  <!-- Face labels -->
  <!-- Right face center (340, 265) -->
  <text x="340" y="260" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Tensor</text>
  <text x="340" y="270" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Parallel</text>

  <!-- Top face center (310, 240) -->
  <text x="310" y="235" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Data</text>
  <text x="310" y="245" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Parallel</text>

  <!-- Left face center (270, 285) -->
  <text x="270" y="280" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Pipeline</text>
  <text x="270" y="290" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Parallel</text>

  <!-- ════════════════ Axis arrows ════════════════ -->
  <!-- X axis: Tensor Parallel (right), from A=(380,310) -->
  <line x1="390" y1="310" x2="460" y2="310" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="425" y="300" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Tensor Parallel (t)</text>

  <!-- Y axis: Pipeline Parallel (up), from B=(300,220) -->
  <line x1="300" y1="210" x2="300" y2="140" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="300" y="130" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Pipeline Parallel (p)</text>

  <!-- Z axis: Data Parallel (left-down). Orthogonal routing starting near C=(240,350) -->
  <path d="M 230 350 L 180 350 L 180 390" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="180" y="410" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Data Parallel (d)</text>

  <!-- ════════════════ Annotation point on cube corner G=(320,260) ════════════════ -->
  <circle cx="320" cy="260" r="4" fill="#c44" stroke="#fff" stroke-width="1.5"/>

  <!-- ════════════════ Right panel: formula box ════════════════ -->
  <rect x="500" y="90" width="180" height="60" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.4" rx="4"/>
  <text x="590" y="112" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Total GPUs = d × p × t</text>
  <text x="590" y="132" font-size="10.5" fill="#555" text-anchor="middle">e.g., 64 × 16 × 8 = 8,192</text>

  <!-- Right panel: dimension descriptions -->
  <rect x="500" y="170" width="180" height="160" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>

  <!-- Tensor Parallel row -->
  <rect x="510" y="180" width="12" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="4"/>
  <text x="530" y="190" font-size="9.5" font-weight="700" fill="#c87b2a">Tensor Parallel (t)</text>
  <text x="530" y="202" font-size="8.5" fill="#555">Split matrices within a layer</text>
  <text x="530" y="214" font-size="8.5" fill="#555">Requires NVLink (intra-node)</text>

  <!-- Pipeline Parallel row -->
  <rect x="510" y="230" width="12" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
  <text x="530" y="240" font-size="9.5" font-weight="700" fill="#3d9e5a">Pipeline Parallel (p)</text>
  <text x="530" y="252" font-size="8.5" fill="#555">Partition layers into stages</text>
  <text x="530" y="264" font-size="8.5" fill="#555">Suitable for inter-node links</text>

  <!-- Data Parallel row -->
  <rect x="510" y="280" width="12" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4"/>
  <text x="530" y="290" font-size="9.5" font-weight="700" fill="#4a90c4">Data Parallel (d)</text>
  <text x="530" y="302" font-size="8.5" fill="#555">Replicate model; split batch</text>
  <text x="530" y="314" font-size="8.5" fill="#555">AllReduce over replicas</text>

  <!-- Placement rule box -->
  <rect x="500" y="340" width="180" height="80" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="590" y="360" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Hardware Placement Rule</text>
  <text x="510" y="376" font-size="8.5" fill="#555">t: within node  (NVLink ~600 GB/s)</text>
  <text x="510" y="390" font-size="8.5" fill="#555">p: across nodes (IB ~25 GB/s/port)</text>
  <text x="510" y="404" font-size="8.5" fill="#555">d: across racks  (Eth ~12.5 GB/s)</text>

  <!-- Bottom annotation -->
  <text x="350" y="440" font-size="9" fill="#999" font-style="italic" text-anchor="middle">
    Each dimension is orthogonal: changing t does not affect p or d.
  </text>

</svg>