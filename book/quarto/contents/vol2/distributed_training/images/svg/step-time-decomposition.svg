<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Step Time Decomposition at Scale</text>
  <text x="340" y="43" text-anchor="middle" font-size="9" fill="#555">As N grows, gradient synchronization dominates step time — shifting from compute-bound to communication-bound</text>

  <!-- ===== Y-axis labels ===== -->
  <text x="55" y="115" text-anchor="end" font-size="9.5" font-weight="700" fill="#333">N=1</text>
  <text x="55" y="116" text-anchor="end" font-size="8.5" fill="#555">(single GPU)</text>

  <text x="55" y="225" text-anchor="end" font-size="9.5" font-weight="700" fill="#333">N=8</text>
  <text x="55" y="236" text-anchor="end" font-size="8.5" fill="#555">(1 node)</text>

  <text x="55" y="335" text-anchor="end" font-size="9.5" font-weight="700" fill="#333">N=64</text>
  <text x="55" y="346" text-anchor="end" font-size="8.5" fill="#555">(8 nodes)</text>

  <!-- ===== Row 1: N=1 ===== -->
  <!-- Total bar spans x=65..575 (for proportional representation) -->
  <!-- N=1: Forward 160px, Backward 240px, Grad Sync 0px, Opt Step 60px = 460px total -->
  <!-- No comm at N=1 -->

  <!-- Forward Pass -->
  <rect x="65" y="90" width="160" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="145" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Forward Pass</text>
  <text x="145" y="125" text-anchor="middle" font-size="8" fill="#555">~35%</text>

  <!-- Backward Pass -->
  <rect x="225" y="90" width="245" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="347.5" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Backward Pass</text>
  <text x="347.5" y="125" text-anchor="middle" font-size="8" fill="#555">~53%</text>

  <!-- Gradient Sync (none at N=1) -->
  <rect x="470" y="90" width="0" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="0"/>

  <!-- Optimizer Step -->
  <rect x="470" y="90" width="55" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="497.5" y="113" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Opt.</text>
  <text x="497.5" y="125" text-anchor="middle" font-size="8" fill="#555">~12%</text>

  <!-- N=1 total label -->
  <text x="540" y="106" font-size="9" fill="#555">~250 ms</text>
  <text x="540" y="119" font-size="8" fill="#999">baseline</text>

  <!-- ===== Row 2: N=8 ===== -->
  <!-- Faster compute (parallelized), non-trivial sync: Forward 120, Backward 190, Sync 90, Opt 50 = 450 -->
  <!-- Forward Pass -->
  <rect x="65" y="200" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="125" y="223" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Forward Pass</text>

  <!-- Backward Pass -->
  <rect x="185" y="200" width="190" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="223" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Backward Pass</text>

  <!-- Gradient Sync (now visible) -->
  <rect x="375" y="200" width="70" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="410" y="218" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">Grad</text>
  <text x="410" y="230" text-anchor="middle" font-size="8.5" fill="#c44">Sync</text>
  <text x="410" y="241" text-anchor="middle" font-size="8" fill="#c44">~16%</text>

  <!-- Optimizer Step -->
  <rect x="445" y="200" width="50" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="470" y="223" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Opt.</text>

  <text x="508" y="215" font-size="9" fill="#555">~210 ms</text>
  <text x="508" y="228" font-size="8" fill="#3d9e5a">1.2× speedup</text>

  <!-- ===== Row 3: N=64 ===== -->
  <!-- Compute further reduced, sync now dominates: Forward 75, Backward 120, Sync 240, Opt 40 = 475 -->
  <!-- Forward Pass -->
  <rect x="65" y="310" width="75" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="102.5" y="328" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Fwd</text>

  <!-- Backward Pass -->
  <rect x="140" y="310" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="200" y="333" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Backward Pass</text>

  <!-- Gradient Sync (dominant at N=64) -->
  <rect x="260" y="310" width="240" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="380" y="328" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Gradient Synchronization</text>
  <text x="380" y="342" text-anchor="middle" font-size="8.5" fill="#c44">~52% — communication dominates at scale</text>

  <!-- Optimizer Step -->
  <rect x="500" y="310" width="40" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="520" y="333" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">Opt</text>

  <text x="552" y="320" font-size="9" fill="#555">~380 ms</text>
  <text x="552" y="333" font-size="8" fill="#c44">only 0.66×</text>
  <text x="552" y="346" font-size="8" fill="#c44">vs. 8× ideal</text>

  <!-- ===== "Communication Wall" annotation ===== -->
  <!-- Vertical line from Grad Sync start at N=64 -->
  <line x1="260" y1="295" x2="260" y2="358" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="260" y="290" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Communication Wall</text>

  <!-- ===== Legend ===== -->
  <rect x="65" y="378" width="14" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="84" y="389" font-size="9" fill="#555">Compute (Forward + Backward)</text>
  <rect x="240" y="378" width="14" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="259" y="389" font-size="9" fill="#555">Gradient Synchronization (AllReduce)</text>
  <rect x="460" y="378" width="14" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="479" y="389" font-size="9" fill="#555">Optimizer Step</text>

  <!-- ===== Scaling efficiency annotations ===== -->
  <text x="65" y="410" font-size="8.5" fill="#555">Ideal speedup at N=64: 64×  |  Actual: ~0.66× baseline per step (6.5× slower than ideal due to communication)</text>
  <text x="65" y="424" font-size="8.5" fill="#555">Rule of thumb: communication overhead &gt;30% collapses efficiency below 70% — gradient compression or ZeRO required</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="448" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Illustrative decomposition for a 7B transformer. Actual ratios depend on model arithmetic intensity, interconnect bandwidth, and overlap implementation.</text>
</svg>