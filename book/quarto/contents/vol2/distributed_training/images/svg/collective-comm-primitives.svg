<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Collective Communication Primitives</text>
  <text x="340" y="43" text-anchor="middle" font-size="9" fill="#555">Quick reference for distributed training — each primitive serves a distinct role in gradient synchronization and model assembly</text>

  <!-- ===== Vertical and horizontal dividers for 2×2 grid ===== -->
  <line x1="340" y1="56" x2="340" y2="448" stroke="#e0e0e0" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="30" y1="252" x2="650" y2="252" stroke="#e0e0e0" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ===== CELL 1: AllReduce (top-left) ===== -->
  <!-- Background -->
  <rect x="30" y="56" width="305" height="192" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="182.5" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AllReduce</text>
  <text x="182.5" y="90" text-anchor="middle" font-size="8.5" fill="#555">Sum (or avg) across all nodes; every node gets result</text>
  <text x="182.5" y="103" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Used for: gradient synchronization in DDP</text>

  <!-- 4 nodes, before state, then arrows converging to sum, then all get result -->
  <!-- Before: nodes at x=50,90,130,170, y=125 -->
  <!-- Each node box -->
  <rect x="48" y="115" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="66" y="131" text-anchor="middle" font-size="8" fill="#333">g₀</text>
  <rect x="96" y="115" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="114" y="131" text-anchor="middle" font-size="8" fill="#333">g₁</text>
  <rect x="144" y="115" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="162" y="131" text-anchor="middle" font-size="8" fill="#333">g₂</text>
  <rect x="192" y="115" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="210" y="131" text-anchor="middle" font-size="8" fill="#333">g₃</text>

  <!-- Arrows down to sum node -->
  <line x1="66" y1="141" x2="141" y2="168" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="114" y1="141" x2="141" y2="168" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="162" y1="141" x2="141" y2="168" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="210" y1="141" x2="141" y2="168" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Sum node -->
  <rect x="116" y="168" width="50" height="24" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="141" y="183" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Σ g_i</text>

  <!-- Arrows back to all nodes -->
  <line x1="141" y1="192" x2="66" y2="215" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="141" y1="192" x2="114" y2="215" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="141" y1="192" x2="162" y2="215" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="141" y1="192" x2="210" y2="215" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- After nodes -->
  <rect x="48" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="66" y="230" text-anchor="middle" font-size="8" fill="#333">Σg</text>
  <rect x="96" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="114" y="230" text-anchor="middle" font-size="8" fill="#333">Σg</text>
  <rect x="144" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="162" y="230" text-anchor="middle" font-size="8" fill="#333">Σg</text>
  <rect x="192" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="210" y="230" text-anchor="middle" font-size="8" fill="#333">Σg</text>

  <text x="255" y="175" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="255" y="188" text-anchor="start" font-size="8" fill="#555">2(N-1)/N × M</text>
  <text x="255" y="201" text-anchor="start" font-size="8" fill="#555">Ring optimal</text>

  <!-- ===== CELL 2: AllGather (top-right) ===== -->
  <rect x="345" y="56" width="305" height="192" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="497.5" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AllGather</text>
  <text x="497.5" y="90" text-anchor="middle" font-size="8.5" fill="#555">Each node contributes a shard; all nodes collect the full tensor</text>
  <text x="497.5" y="103" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Used for: FSDP parameter reconstruction before each layer</text>

  <!-- 4 nodes each with shard -->
  <rect x="363" y="115" width="36" height="26" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="381" y="131" text-anchor="middle" font-size="8" fill="#333">P₀</text>
  <rect x="411" y="115" width="36" height="26" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="429" y="131" text-anchor="middle" font-size="8" fill="#333">P₁</text>
  <rect x="459" y="115" width="36" height="26" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="477" y="131" text-anchor="middle" font-size="8" fill="#333">P₂</text>
  <rect x="507" y="115" width="36" height="26" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="525" y="131" text-anchor="middle" font-size="8" fill="#333">P₃</text>

  <!-- Arrows indicating gather (all shards → all nodes) -->
  <line x1="381" y1="141" x2="381" y2="215" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="429" y1="141" x2="429" y2="215" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="477" y1="141" x2="477" y2="215" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="525" y1="141" x2="525" y2="215" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- After: all nodes have full tensor [P₀P₁P₂P₃] -->
  <rect x="363" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="381" y="229" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>
  <rect x="411" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="429" y="229" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>
  <rect x="459" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="477" y="229" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>
  <rect x="507" y="215" width="36" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="525" y="229" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>

  <text x="568" y="155" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="568" y="168" text-anchor="start" font-size="8" fill="#555">(N-1)/N × M</text>
  <text x="568" y="181" text-anchor="start" font-size="8" fill="#555">per-node</text>

  <!-- ===== CELL 3: ReduceScatter (bottom-left) ===== -->
  <rect x="30" y="257" width="305" height="188" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="182.5" y="277" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ReduceScatter</text>
  <text x="182.5" y="291" text-anchor="middle" font-size="8.5" fill="#555">Reduce then scatter — each node gets its reduced shard</text>
  <text x="182.5" y="304" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Used for: ZeRO-2/3 gradient sharding (replaces AllReduce)</text>

  <!-- Before: 4 nodes each with full gradients -->
  <rect x="48" y="315" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="66" y="331" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>
  <rect x="96" y="315" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="114" y="331" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>
  <rect x="144" y="315" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="162" y="331" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>
  <rect x="192" y="315" width="36" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="210" y="331" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>

  <!-- Converge lines -->
  <line x1="66" y1="341" x2="141" y2="368" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="114" y1="341" x2="141" y2="368" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="162" y1="341" x2="141" y2="368" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="210" y1="341" x2="141" y2="368" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- After: each node gets its own shard (scattered) -->
  <rect x="48" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="66" y="398" text-anchor="middle" font-size="8" fill="#333">Σg₀</text>
  <rect x="96" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="114" y="398" text-anchor="middle" font-size="8" fill="#333">Σg₁</text>
  <rect x="144" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="162" y="398" text-anchor="middle" font-size="8" fill="#333">Σg₂</text>
  <rect x="192" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="210" y="398" text-anchor="middle" font-size="8" fill="#333">Σg₃</text>

  <text x="250" y="360" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="250" y="373" text-anchor="start" font-size="8" fill="#555">(N-1)/N × M</text>
  <text x="250" y="386" text-anchor="start" font-size="8" fill="#555">same as AllGather</text>
  <text x="250" y="399" text-anchor="start" font-size="8" fill="#555">+ AllReduce = ZeRO-3</text>

  <!-- ===== CELL 4: Broadcast (bottom-right) ===== -->
  <rect x="345" y="257" width="305" height="188" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="497.5" y="277" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Broadcast</text>
  <text x="497.5" y="291" text-anchor="middle" font-size="8.5" fill="#555">One root node sends data; all other nodes receive identical copy</text>
  <text x="497.5" y="304" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Used for: initial weight distribution, checkpoint restore</text>

  <!-- Root node with data -->
  <rect x="459" y="315" width="76" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2" rx="4"/>
  <text x="497.5" y="331" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Root: W</text>

  <!-- Broadcast arrows out -->
  <line x1="459" y1="328" x2="381" y2="382" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="479" y1="341" x2="429" y2="382" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="516" y1="341" x2="477" y2="382" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="535" y1="328" x2="525" y2="382" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Receiving nodes -->
  <rect x="363" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="381" y="398" text-anchor="middle" font-size="8.5" fill="#333">W</text>
  <rect x="411" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="429" y="398" text-anchor="middle" font-size="8.5" fill="#333">W</text>
  <rect x="459" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="477" y="398" text-anchor="middle" font-size="8.5" fill="#333">W</text>
  <rect x="507" y="382" width="36" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="525" y="398" text-anchor="middle" font-size="8.5" fill="#333">W</text>

  <text x="568" y="355" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="568" y="368" text-anchor="start" font-size="8" fill="#555">M × (N-1)/N</text>
  <text x="568" y="381" text-anchor="start" font-size="8" fill="#555">tree optimal</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">AllReduce = ReduceScatter + AllGather. ZeRO-3 uses these two primitives separately to shard gradients and weights independently.</text>
</svg>