<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="640" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Collective Communication Primitives</text>
  <text x="340" y="35" text-anchor="middle" font-size="9" fill="#555">Quick reference for distributed training — each primitive serves a distinct role in gradient synchronization and model assembly</text>

  <!-- ===== Vertical and horizontal dividers for 2×2 grid ===== -->
  <line x1="340" y1="60" x2="340" y2="580" stroke="#e0e0e0" stroke-width="1.2" stroke-dasharray="2,4"/>
  <line x1="20" y1="320" x2="660" y2="320" stroke="#e0e0e0" stroke-width="1.2" stroke-dasharray="2,4"/>

  <!-- ========================================== -->
  <!-- ===== CELL 1: AllReduce (top-left) ======= -->
  <!-- ========================================== -->
  <rect x="20" y="60" width="300" height="240" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="170" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AllReduce</text>
  <text x="170" y="100" text-anchor="middle" font-size="8.5" fill="#555">Sum (or avg) across all nodes; every node gets result</text>
  <text x="170" y="115" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Used for: gradient synchronization in DDP</text>

  <!-- Before nodes -->
  <rect x="40" y="130" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="60" y="148" text-anchor="middle" font-size="8" fill="#333">g₀</text>
  <rect x="90" y="130" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="110" y="148" text-anchor="middle" font-size="8" fill="#333">g₁</text>
  <rect x="140" y="130" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="160" y="148" text-anchor="middle" font-size="8" fill="#333">g₂</text>
  <rect x="190" y="130" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="210" y="148" text-anchor="middle" font-size="8" fill="#333">g₃</text>

  <!-- Orthogonal routing down to sum node -->
  <path d="M 60,160 L 60,170 L 100,170 L 100,190" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 110,160 L 110,180 L 120,180 L 120,190" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 160,160 L 160,180 L 150,180 L 150,190" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 210,160 L 210,170 L 170,170 L 170,190" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Sum node -->
  <rect x="95" y="190" width="80" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="135" y="208" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Σ g_i</text>

  <!-- Orthogonal routing back to all nodes -->
  <path d="M 100,220 L 100,240 L 60,240 L 60,250" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 120,220 L 120,230 L 110,230 L 110,250" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 150,220 L 150,230 L 160,230 L 160,250" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 170,220 L 170,240 L 210,240 L 210,250" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- After nodes -->
  <rect x="40" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="60" y="268" text-anchor="middle" font-size="8" fill="#333">Σg</text>
  <rect x="90" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="110" y="268" text-anchor="middle" font-size="8" fill="#333">Σg</text>
  <rect x="140" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="160" y="268" text-anchor="middle" font-size="8" fill="#333">Σg</text>
  <rect x="190" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="210" y="268" text-anchor="middle" font-size="8" fill="#333">Σg</text>

  <text x="240" y="200" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="240" y="215" text-anchor="start" font-size="8" fill="#555">2(N-1)/N × M</text>
  <text x="240" y="230" text-anchor="start" font-size="8" fill="#555">Ring optimal</text>

  <!-- ========================================== -->
  <!-- ===== CELL 2: AllGather (top-right) ====== -->
  <!-- ========================================== -->
  <rect x="360" y="60" width="300" height="240" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="510" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#333">AllGather</text>
  <text x="510" y="100" text-anchor="middle" font-size="8.5" fill="#555">Each node contributes a shard; all nodes collect the full tensor</text>
  <text x="510" y="115" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Used for: FSDP parameter reconstruction before each layer</text>

  <!-- 4 nodes each with shard -->
  <rect x="380" y="130" width="40" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="400" y="148" text-anchor="middle" font-size="8" fill="#333">P₀</text>
  <rect x="430" y="130" width="40" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="450" y="148" text-anchor="middle" font-size="8" fill="#333">P₁</text>
  <rect x="480" y="130" width="40" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="500" y="148" text-anchor="middle" font-size="8" fill="#333">P₂</text>
  <rect x="530" y="130" width="40" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="550" y="148" text-anchor="middle" font-size="8" fill="#333">P₃</text>

  <!-- Arrows indicating gather -->
  <path d="M 400,160 L 400,250" fill="none" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <path d="M 450,160 L 450,250" fill="none" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <path d="M 500,160 L 500,250" fill="none" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <path d="M 550,160 L 550,250" fill="none" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- After nodes -->
  <rect x="380" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="400" y="268" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>
  <rect x="430" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="450" y="268" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>
  <rect x="480" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="500" y="268" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>
  <rect x="530" y="250" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="550" y="268" text-anchor="middle" font-size="7.5" fill="#333">P0-3</text>

  <text x="580" y="190" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="580" y="205" text-anchor="start" font-size="8" fill="#555">(N-1)/N × M</text>
  <text x="580" y="220" text-anchor="start" font-size="8" fill="#555">per-node</text>

  <!-- ========================================== -->
  <!-- ===== CELL 3: ReduceScatter (bottom-left)= -->
  <!-- ========================================== -->
  <rect x="20" y="340" width="300" height="240" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="170" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ReduceScatter</text>
  <text x="170" y="380" text-anchor="middle" font-size="8.5" fill="#555">Reduce then scatter — each node gets its reduced shard</text>
  <text x="170" y="395" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Used for: ZeRO-2/3 gradient sharding (replaces AllReduce)</text>

  <!-- Before nodes -->
  <rect x="40" y="410" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="60" y="428" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>
  <rect x="90" y="410" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="110" y="428" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>
  <rect x="140" y="410" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="160" y="428" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>
  <rect x="190" y="410" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="210" y="428" text-anchor="middle" font-size="7.5" fill="#333">g₀₁₂₃</text>

  <!-- Virtual reduction bus -->
  <line x1="100" y1="485" x2="170" y2="485" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- Orthogonal routing down to bus -->
  <path d="M 60,440 L 60,460 L 100,460 L 100,485" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 110,440 L 110,470 L 120,470 L 120,485" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 160,440 L 160,470 L 150,470 L 150,485" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 210,440 L 210,460 L 170,460 L 170,485" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Orthogonal routing from bus to scattered nodes -->
  <path d="M 100,485 L 100,510 L 60,510 L 60,530" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 120,485 L 120,500 L 110,500 L 110,530" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 150,485 L 150,500 L 160,500 L 160,530" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <path d="M 170,485 L 170,510 L 210,510 L 210,530" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- After nodes -->
  <rect x="40" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="60" y="548" text-anchor="middle" font-size="8" fill="#333">Σg₀</text>
  <rect x="90" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="110" y="548" text-anchor="middle" font-size="8" fill="#333">Σg₁</text>
  <rect x="140" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="160" y="548" text-anchor="middle" font-size="8" fill="#333">Σg₂</text>
  <rect x="190" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="210" y="548" text-anchor="middle" font-size="8" fill="#333">Σg₃</text>

  <text x="240" y="470" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="240" y="485" text-anchor="start" font-size="8" fill="#555">(N-1)/N × M</text>
  <text x="240" y="500" text-anchor="start" font-size="8" fill="#555">same as AllGather</text>
  <text x="240" y="515" text-anchor="start" font-size="8" fill="#555">+ AllReduce = ZeRO-3</text>

  <!-- ========================================== -->
  <!-- ===== CELL 4: Broadcast (bottom-right) === -->
  <!-- ========================================== -->
  <rect x="360" y="340" width="300" height="240" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="0.8" rx="4"/>

  <text x="510" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Broadcast</text>
  <text x="510" y="380" text-anchor="middle" font-size="8.5" fill="#555">One root node sends data; all other nodes receive identical copy</text>
  <text x="510" y="395" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Used for: initial weight distribution, checkpoint restore</text>

  <!-- Root node -->
  <rect x="435" y="410" width="80" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2" rx="4"/>
  <text x="475" y="428" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">Root: W</text>

  <!-- Orthogonal broadcast routing out -->
  <path d="M 445,440 L 445,510 L 400,510 L 400,530" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 465,440 L 465,490 L 450,490 L 450,530" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 485,440 L 485,490 L 500,490 L 500,530" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <path d="M 505,440 L 505,510 L 550,510 L 550,530" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Receiving nodes -->
  <rect x="380" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="400" y="548" text-anchor="middle" font-size="8.5" fill="#333">W</text>
  <rect x="430" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="450" y="548" text-anchor="middle" font-size="8.5" fill="#333">W</text>
  <rect x="480" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="500" y="548" text-anchor="middle" font-size="8.5" fill="#333">W</text>
  <rect x="530" y="530" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="550" y="548" text-anchor="middle" font-size="8.5" fill="#333">W</text>

  <text x="580" y="470" text-anchor="start" font-size="8" fill="#555">Volume:</text>
  <text x="580" y="485" text-anchor="start" font-size="8" fill="#555">M × (N-1)/N</text>
  <text x="580" y="500" text-anchor="start" font-size="8" fill="#555">tree optimal</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="610" text-anchor="middle" font-size="9" fill="#999" font-style="italic">AllReduce = ReduceScatter + AllGather. ZeRO-3 uses these two primitives separately to shard gradients and weights independently.</text>
</svg>