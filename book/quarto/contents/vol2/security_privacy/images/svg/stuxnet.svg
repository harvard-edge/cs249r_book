<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-chain" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#fff"/>

  <!-- Node 1: USB Drive -->
  <rect x="50" y="200" width="100" height="100" rx="4" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <rect x="80" y="210" width="40" height="20" fill="#a31f34" opacity="0.25"/>
  <line x1="90" y1="220" x2="90" y2="230" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="100" y1="215" x2="100" y2="230" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="110" y1="220" x2="110" y2="230" stroke="#a31f34" stroke-width="1.5"/>
  <text x="100" y="260" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">USB Drive</text>
  <text x="100" y="278" font-size="10" fill="#555" text-anchor="middle">(infected)</text>

  <!-- Arrow 1→2 -->
  <line x1="150" y1="250" x2="250" y2="250" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arr-chain)"/>
  <text x="200" y="235" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">AutoRun</text>
  <text x="200" y="248" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">exploit</text>

  <!-- Node 2: Windows PC -->
  <rect x="250" y="200" width="100" height="100" rx="4" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <rect x="275" y="210" width="50" height="36" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <rect x="292" y="246" width="16" height="4" fill="#a31f34" opacity="0.4"/>
  <text x="300" y="232" font-size="10" fill="#a31f34" text-anchor="middle">WIN</text>
  <text x="300" y="265" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Windows PC</text>
  <text x="300" y="280" font-size="10" fill="#555" text-anchor="middle">(engineer wkstn)</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="250" x2="450" y2="250" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arr-chain)"/>
  <text x="400" y="235" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">SCADA sw</text>
  <text x="400" y="248" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">injection</text>

  <!-- Node 3: Siemens Step7 -->
  <rect x="450" y="200" width="100" height="100" rx="4" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="500" y="225" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Siemens</text>
  <text x="500" y="240" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Step7 SCADA</text>
  <text x="500" y="265" font-size="10" fill="#555" text-anchor="middle">PLC programming</text>
  <text x="500" y="280" font-size="10" fill="#555" text-anchor="middle">environment</text>

  <!-- Arrow 3→4 -->
  <line x1="550" y1="250" x2="650" y2="250" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arr-chain)"/>
  <text x="600" y="235" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">PLC firmware</text>
  <text x="600" y="248" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">rootkit</text>

  <!-- Node 4: Siemens PLC -->
  <rect x="650" y="200" width="100" height="100" rx="4" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="700" y="225" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Siemens</text>
  <text x="700" y="240" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">S7-315 PLC</text>
  <text x="700" y="265" font-size="10" fill="#555" text-anchor="middle">Programmable</text>
  <text x="700" y="280" font-size="10" fill="#555" text-anchor="middle">logic controller</text>

  <!-- Arrow 4→5 -->
  <line x1="750" y1="250" x2="850" y2="250" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arr-chain)"/>
  <text x="800" y="235" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">Frequency</text>
  <text x="800" y="248" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">manipulation</text>

  <!-- Node 5: Centrifuge Motor -->
  <rect x="850" y="200" width="100" height="100" rx="4" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="900" y="225" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Centrifuge</text>
  <text x="900" y="240" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Motor Control</text>
  <text x="900" y="265" font-size="10" fill="#555" text-anchor="middle">IR-1 uranium</text>
  <text x="900" y="280" font-size="10" fill="#555" text-anchor="middle">enrichment</text>

  <!-- Arrow 5→6 -->
  <line x1="950" y1="250" x2="1050" y2="250" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arr-chain)"/>
  <text x="1000" y="235" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">Mechanical</text>
  <text x="1000" y="248" font-size="10" fill="#c87b2a" text-anchor="middle" font-style="italic">failure</text>

  <!-- Node 6: Physical Damage (Replaced decorative shape with standard rectangle) -->
  <rect x="1050" y="200" width="100" height="100" rx="4" fill="#a31f34" stroke="#c44" stroke-width="1.5"/>
  <text x="1100" y="240" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">!</text>
  <text x="1100" y="265" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Physical</text>
  <text x="1100" y="280" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Damage</text>

  <!-- Sensor spoofing annotation -->
  <rect x="570" y="90" width="260" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="700" y="110" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Key evasion: sensor spoofing</text>
  <text x="700" y="126" font-size="10" fill="#555" text-anchor="middle">Stuxnet reported normal RPMs to operators</text>
  <text x="700" y="140" font-size="10" fill="#555" text-anchor="middle">while sabotaging centrifuges covertly</text>
  
  <line x1="700" y1="150" x2="700" y2="200" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Timeline label -->
  <text x="600" y="350" font-size="12" font-weight="700" fill="#555" text-anchor="middle">2010 discovery — est. 1,000 centrifuges destroyed at Natanz, Iran</text>

  <!-- Zero-day count -->
  <rect x="420" y="375" width="360" height="34" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
  <text x="600" y="396" font-size="11" fill="#333" text-anchor="middle">Exploited 4 Windows zero-day vulnerabilities simultaneously</text>

  <!-- Lesson box -->
  <rect x="130" y="430" width="940" height="70" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="600" y="452" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Systems Lesson</text>
  <text x="600" y="470" font-size="11" fill="#555" text-anchor="middle">Air-gap isolation is not sufficient when removable media bridges the gap. Firmware on safety-critical hardware</text>
  <text x="600" y="486" font-size="11" fill="#555" text-anchor="middle">must be cryptographically signed and verified — the same principle underlying secure boot in ML accelerators.</text>

  <!-- Bottom annotation -->
  <text x="600" y="530" font-size="11" fill="#999" text-anchor="middle" font-style="italic">Attack chain progresses from a physical vector (USB) through software layers to achieve irreversible physical destruction.</text>
</svg>