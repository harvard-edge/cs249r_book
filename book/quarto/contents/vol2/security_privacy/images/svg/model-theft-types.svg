<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <defs>
    <marker id="arr-mt" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-red-mt" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- Column headers -->
  <rect x="20" y="20" width="290" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="165" y="45" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">High-Fidelity Extraction</text>

  <rect x="370" y="20" width="290" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="515" y="45" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Approximate Theft</text>

  <!-- Center label: API access only needed -->
  <rect x="250" y="220" width="180" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="239" font-size="9" font-weight="700" fill="#333" text-anchor="middle">API access only needed</text>
  <text x="340" y="252" font-size="8.5" fill="#555" text-anchor="middle">(no model weights required)</text>

  <!-- === LEFT WORKFLOW: High-Fidelity Extraction === -->

  <!-- Step 1L: Attacker sends many queries -->
  <rect x="30" y="80" width="270" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <!-- Attacker icon -->
  <circle cx="58" cy="105" r="10" fill="#c44" opacity="0.25"/>
  <text x="57" y="109" font-size="10" fill="#c44" text-anchor="middle">👤</text>
  <text x="165" y="101" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Attacker sends many queries</text>
  <text x="165" y="117" font-size="8.5" fill="#555" text-anchor="middle">Systematic inputs covering input space</text>

  <line x1="165" y1="130" x2="165" y2="150" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 2L: Collects (input, output) pairs -->
  <rect x="30" y="150" width="270" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="165" y="171" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Collects (input, output) pairs</text>
  <!-- Dataset icon: small table representation -->
  <rect x="38" y="163" width="32" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="38" y1="170" x2="70" y2="170" stroke="#4a90c4" stroke-width="0.5"/>
  <line x1="50" y1="163" x2="50" y2="183" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="165" y="187" font-size="8.5" fill="#555" text-anchor="middle">N queries → N labeled (x, f(x)) records</text>

  <line x1="165" y1="200" x2="165" y2="280" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 3L: Trains clone model -->
  <rect x="30" y="280" width="270" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="165" y="298" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Trains clone model</text>
  <!-- Model icon: layered rectangles -->
  <rect x="38" y="305" width="34" height="4" fill="#4a90c4" opacity="0.8"/>
  <rect x="40" y="313" width="30" height="4" fill="#4a90c4" opacity="0.6"/>
  <rect x="42" y="321" width="26" height="4" fill="#4a90c4" opacity="0.4"/>
  <text x="165" y="317" font-size="8.5" fill="#555" text-anchor="middle">Supervised learning on stolen dataset</text>
  <text x="165" y="331" font-size="8.5" fill="#555" text-anchor="middle">Objective: min loss on (x, f(x)) pairs</text>

  <line x1="165" y1="340" x2="165" y2="360" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 4L: Behavior matches original -->
  <rect x="30" y="360" width="270" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="165" y="383" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Clone behavior ≈ original</text>
  <text x="165" y="399" font-size="8.5" fill="#555" text-anchor="middle">High-fidelity functional copy; can match</text>
  <text x="165" y="412" font-size="8.5" fill="#555" text-anchor="middle">decision boundaries and confidence scores</text>

  <!-- === RIGHT WORKFLOW: Approximate Theft === -->

  <!-- Step 1R: Queries API -->
  <rect x="380" y="80" width="270" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <circle cx="408" cy="105" r="10" fill="#c44" opacity="0.25"/>
  <text x="407" y="109" font-size="10" fill="#c44" text-anchor="middle">👤</text>
  <text x="515" y="101" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Attacker queries API</text>
  <text x="515" y="117" font-size="8.5" fill="#555" text-anchor="middle">Targeted or random inputs; fewer queries</text>

  <line x1="515" y1="130" x2="515" y2="150" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 2R: Observes confidence scores -->
  <rect x="380" y="150" width="270" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="515" y="171" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Observes confidence scores</text>
  <text x="515" y="187" font-size="8.5" fill="#555" text-anchor="middle">Soft labels: [0.82, 0.12, 0.04, 0.02, ...]</text>

  <line x1="515" y1="200" x2="515" y2="280" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 3R: Distills knowledge -->
  <rect x="380" y="280" width="270" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="515" y="298" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Distills knowledge</text>
  <!-- Smaller model icon -->
  <rect x="388" y="309" width="28" height="4" fill="#4a90c4" opacity="0.8"/>
  <rect x="390" y="317" width="24" height="4" fill="#4a90c4" opacity="0.5"/>
  <text x="515" y="317" font-size="8.5" fill="#555" text-anchor="middle">Knowledge distillation: train student</text>
  <text x="515" y="331" font-size="8.5" fill="#555" text-anchor="middle">model on soft-label outputs</text>

  <line x1="515" y1="340" x2="515" y2="360" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-mt)"/>

  <!-- Step 4R: Functional clone (lower fidelity) -->
  <rect x="380" y="360" width="270" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="515" y="383" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Functional clone (lower fidelity)</text>
  <text x="515" y="399" font-size="8.5" fill="#555" text-anchor="middle">Captures task knowledge; accuracy may</text>
  <text x="515" y="412" font-size="8.5" fill="#555" text-anchor="middle">be 90–98% of original depending on queries</text>

  <!-- Bottom annotation -->
  <text x="340" y="440" font-size="9" fill="#555" text-anchor="middle" font-style="italic">Both attack types require only black-box API access; defenses include watermarking, rate limiting, and output perturbation.</text>
</svg>
