<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="340" y="26" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Threat Prioritization Matrix</text>
  <text x="340" y="42" font-size="9" fill="#555" text-anchor="middle">Risk classification by likelihood and potential impact — guides defensive investment priorities</text>

  <!-- ===== Matrix area ===== -->
  <!-- Quadrant boundaries: x 80–580, y 56–400 -->
  <!-- Midpoint: x=330, y=228 -->

  <!-- Q3: Low Likelihood / High Impact (top-left) — PREPARE (orange) -->
  <rect x="80" y="56" width="250" height="172" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <!-- Q4: High Likelihood / High Impact (top-right) — CRITICAL (red) -->
  <rect x="330" y="56" width="250" height="172" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <!-- Q1: Low Likelihood / Low Impact (bottom-left) — MONITOR (green) -->
  <rect x="80" y="228" width="250" height="172" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <!-- Q2: High Likelihood / Low Impact (bottom-right) — MITIGATE (yellow-neutral) -->
  <rect x="330" y="228" width="250" height="172" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- Quadrant divider lines -->
  <line x1="80" y1="228" x2="580" y2="228" stroke="#bbb" stroke-width="1.5"/>
  <line x1="330" y1="56" x2="330" y2="400" stroke="#bbb" stroke-width="1.5"/>

  <!-- ===== Quadrant Labels ===== -->
  <!-- PREPARE (top-left) -->
  <text x="205" y="80" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">PREPARE</text>
  <text x="205" y="95" font-size="8.5" fill="#555" text-anchor="middle">Low likelihood, high impact</text>
  <text x="205" y="108" font-size="8.5" fill="#555" text-anchor="middle">Requires deep engineering</text>

  <!-- CRITICAL (top-right) -->
  <text x="455" y="80" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">CRITICAL</text>
  <text x="455" y="95" font-size="8.5" fill="#555" text-anchor="middle">High likelihood, high impact</text>
  <text x="455" y="108" font-size="8.5" fill="#555" text-anchor="middle">Immediate automated defense required</text>

  <!-- MONITOR (bottom-left) -->
  <text x="205" y="252" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">MONITOR</text>
  <text x="205" y="267" font-size="8.5" fill="#555" text-anchor="middle">Low likelihood, low impact</text>
  <text x="205" y="280" font-size="8.5" fill="#555" text-anchor="middle">Track; defer investment</text>

  <!-- MITIGATE (bottom-right) -->
  <text x="455" y="252" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">MITIGATE</text>
  <text x="455" y="267" font-size="8.5" fill="#555" text-anchor="middle">High likelihood, low impact</text>
  <text x="455" y="280" font-size="8.5" fill="#555" text-anchor="middle">Rate-limit, API controls, monitoring</text>

  <!-- ===== Threat data points ===== -->

  <!-- CRITICAL quadrant threats -->
  <!-- Data Poisoning (Fed. Learning) — top-right, high/high -->
  <circle cx="490" cy="115" r="7" fill="#a31f34" stroke="#c44" stroke-width="1.2"/>
  <text x="502" y="113" font-size="8.5" font-weight="700" fill="#333">Data Poisoning</text>
  <text x="502" y="124" font-size="7.5" fill="#555">(Federated Learning)</text>

  <!-- Prompt Injection — critical -->
  <circle cx="440" cy="155" r="7" fill="#a31f34" stroke="#c44" stroke-width="1.2"/>
  <text x="452" y="153" font-size="8.5" font-weight="700" fill="#333">Prompt Injection</text>
  <text x="452" y="164" font-size="7.5" fill="#555">(LLM systems)</text>

  <!-- Adversarial Examples — critical -->
  <circle cx="380" cy="185" r="7" fill="#a31f34" stroke="#c44" stroke-width="1.2"/>
  <text x="392" y="183" font-size="8.5" font-weight="700" fill="#333">Adversarial Examples</text>
  <text x="392" y="194" font-size="7.5" fill="#555">(inference APIs)</text>

  <!-- PREPARE quadrant threats -->
  <!-- Hardware Side-channel — low likelihood, high impact -->
  <circle cx="175" cy="120" r="7" fill="#c87b2a" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="187" y="118" font-size="8.5" font-weight="700" fill="#333">Hardware Side-channel</text>
  <text x="187" y="129" font-size="7.5" fill="#555">(requires physical access)</text>

  <!-- Supply Chain Compromise -->
  <circle cx="215" cy="175" r="7" fill="#c87b2a" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="227" y="173" font-size="8.5" font-weight="700" fill="#333">Supply Chain Compromise</text>
  <text x="90" y="185" font-size="7.5" fill="#555"/>
  <!-- label shifted left to avoid overflow -->
  <text x="90" y="185" font-size="7.5" fill="#555">(backdoored weights / firmware)</text>

  <!-- MITIGATE quadrant threats -->
  <!-- Model Extraction -->
  <circle cx="420" cy="315" r="7" fill="#c87b2a" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="432" y="313" font-size="8.5" font-weight="700" fill="#333">Model Extraction</text>
  <text x="432" y="324" font-size="7.5" fill="#555">(black-box API queries)</text>

  <!-- MONITOR quadrant threats -->
  <!-- Membership Inference -->
  <circle cx="190" cy="340" r="7" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="202" y="338" font-size="8.5" font-weight="700" fill="#333">Membership Inference</text>
  <text x="202" y="349" font-size="7.5" fill="#555">(requires specialized skill)</text>

  <!-- ===== Axes ===== -->
  <!-- X-axis: Likelihood (bottom label) -->
  <line x1="80" y1="400" x2="580" y2="400" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="80" y="418" font-size="9" fill="#555">Low</text>
  <text x="330" y="418" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Likelihood</text>
  <text x="574" y="418" font-size="9" fill="#555">High</text>

  <!-- Y-axis: Impact (left label) -->
  <line x1="80" y1="400" x2="80" y2="56" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="68" y="400" font-size="9" fill="#555" text-anchor="middle">Low</text>
  <text x="22" y="228" font-size="9" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90 22 228)">Impact</text>
  <text x="68" y="62" font-size="9" fill="#555" text-anchor="middle">High</text>

  <!-- ===== Legend ===== -->
  <circle cx="60" cy="428" r="5" fill="#a31f34"/>
  <text x="70" y="432" font-size="8.5" fill="#333">Critical</text>
  <circle cx="130" cy="428" r="5" fill="#c87b2a"/>
  <text x="140" y="432" font-size="8.5" fill="#333">Prepare / Mitigate</text>
  <circle cx="240" cy="428" r="5" fill="#3d9e5a"/>
  <text x="250" y="432" font-size="8.5" fill="#333">Monitor</text>

  <!-- Bottom footnote -->
  <text x="340" y="450" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Defensive investment should prioritize Critical quadrant threats first; Prepare threats require depth-oriented engineering despite lower probability.</text>
</svg>