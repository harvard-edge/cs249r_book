<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="#fff"/>

  <!-- Layer 1: Hardware (bottom) -->
  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="500" height="80" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
    <text x="20" y="20" font-size="11" font-weight="700" fill="#333">Hardware Layer</text>
    <text x="480" y="20" font-size="10" fill="#333" text-anchor="end" font-style="italic">Hardware</text>
    <line x1="10" y1="30" x2="490" y2="30" stroke="#999" stroke-width="0.8"/>
    <rect x="10" y="40" width="150" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="85" y="59" font-size="10" fill="#555" text-anchor="middle">Trusted Execution Env. (TEE)</text>
    <rect x="170" y="40" width="100" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="220" y="59" font-size="10" fill="#555" text-anchor="middle">Secure Boot</text>
    <rect x="280" y="40" width="110" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="335" y="59" font-size="10" fill="#555" text-anchor="middle">HSM Key Storage</text>
    <rect x="400" y="40" width="90" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="445" y="59" font-size="10" fill="#555" text-anchor="middle">PUF / TRNG</text>
  </g>

  <!-- Layer 2: System -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="500" height="80" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="20" y="20" font-size="11" font-weight="700" fill="#4a90c4">System Layer</text>
    <text x="480" y="20" font-size="10" fill="#4a90c4" text-anchor="end" font-style="italic">System</text>
    <line x1="10" y1="30" x2="490" y2="30" stroke="#4a90c4" stroke-width="0.8"/>
    <rect x="10" y="40" width="120" height="30" rx="4" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="70" y="59" font-size="10" fill="#333" text-anchor="middle">OS-Level Isolation</text>
    <rect x="140" y="40" width="140" height="30" rx="4" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="210" y="59" font-size="10" fill="#333" text-anchor="middle">Network Segmentation</text>
    <rect x="290" y="40" width="140" height="30" rx="4" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="360" y="59" font-size="10" fill="#333" text-anchor="middle">Access Control (RBAC)</text>
    <rect x="440" y="40" width="50" height="30" rx="4" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="465" y="59" font-size="10" fill="#333" text-anchor="middle">VPN</text>
  </g>

  <!-- Layer 3: Model -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="500" height="80" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="20" y="20" font-size="11" font-weight="700" fill="#c87b2a">Model Layer</text>
    <text x="480" y="20" font-size="10" fill="#c87b2a" text-anchor="end" font-style="italic">Model</text>
    <line x1="10" y1="30" x2="490" y2="30" stroke="#c87b2a" stroke-width="0.8"/>
    <rect x="10" y="40" width="130" height="30" rx="4" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="75" y="59" font-size="10" fill="#333" text-anchor="middle">Adversarial Training</text>
    <rect x="150" y="40" width="110" height="30" rx="4" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="205" y="59" font-size="10" fill="#333" text-anchor="middle">Input Validation</text>
    <rect x="270" y="40" width="130" height="30" rx="4" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="335" y="59" font-size="10" fill="#333" text-anchor="middle">Model Watermarking</text>
    <rect x="410" y="40" width="80" height="30" rx="4" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="450" y="59" font-size="10" fill="#333" text-anchor="middle">Rate Limits</text>
  </g>

  <!-- Layer 4: Data (top) -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="500" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="20" y="20" font-size="11" font-weight="700" fill="#3d9e5a">Data Layer</text>
    <text x="480" y="20" font-size="10" fill="#3d9e5a" text-anchor="end" font-style="italic">Data</text>
    <line x1="10" y1="30" x2="490" y2="30" stroke="#3d9e5a" stroke-width="0.8"/>
    <rect x="10" y="40" width="120" height="30" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="70" y="59" font-size="10" fill="#333" text-anchor="middle">Encryption at Rest</text>
    <rect x="140" y="40" width="130" height="30" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="205" y="59" font-size="10" fill="#333" text-anchor="middle">Differential Privacy</text>
    <rect x="280" y="40" width="130" height="30" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="345" y="59" font-size="10" fill="#333" text-anchor="middle">Provenance Tracking</text>
    <rect x="420" y="40" width="70" height="30" rx="4" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="455" y="59" font-size="10" fill="#333" text-anchor="middle">Audit Logs</text>
  </g>

  <!-- Side bracket: Defense in Depth -->
  <line x1="580" y1="50" x2="580" y2="430" stroke="#555" stroke-width="1.5"/>
  <line x1="580" y1="50" x2="570" y2="50" stroke="#555" stroke-width="1.5"/>
  <line x1="580" y1="430" x2="570" y2="430" stroke="#555" stroke-width="1.5"/>
  <text x="600" y="244" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90, 600, 240)">Defense in Depth</text>

  <!-- Upward arrows between layers -->
  <line x1="310" y1="350" x2="310" y2="330" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="310" y1="250" x2="310" y2="230" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="310" y1="150" x2="310" y2="130" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Bottom annotation -->
  <text x="340" y="470" font-size="10" fill="#555" text-anchor="middle" font-style="italic">Each layer provides independent protection; an attacker who penetrates one layer still faces all layers above.</text>
</svg>