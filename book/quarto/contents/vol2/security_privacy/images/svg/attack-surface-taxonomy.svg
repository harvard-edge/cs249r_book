<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="340" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">ML System Attack Surface Taxonomy</text>
  <text x="340" y="44" font-size="9" fill="#555" text-anchor="middle">Four interconnected layers, each with distinct assets and threat vectors</text>

  <!-- ===== Depth axis label ===== -->
  <!-- Left sidebar: Increasing Access Depth -->
  <line x1="28" y1="68" x2="28" y2="418" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="18" y="244" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle" transform="rotate(-90 18 244)">Increasing Access Depth</text>

  <!-- ===== Layer 1: Supply Chain Layer (bottom — deepest) ===== -->
  <!-- Row spans y 390–425 -->
  <rect x="46" y="390" width="616" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <!-- Layer label pill -->
  <rect x="52" y="397" width="130" height="38" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="117" y="413" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Supply Chain Layer</text>
  <text x="117" y="427" font-size="8.5" fill="#555" text-anchor="middle">Frameworks, hardware, weights</text>

  <!-- Assets -->
  <rect x="194" y="397" width="140" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="264" y="411" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Assets</text>
  <text x="264" y="424" font-size="8.5" fill="#555" text-anchor="middle">Framework pkgs · Firmware · Weights</text>

  <!-- Separator -->
  <line x1="342" y1="400" x2="342" y2="433" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Threats -->
  <rect x="350" y="397" width="300" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="500" y="411" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Threats</text>
  <text x="500" y="424" font-size="8.5" fill="#555" text-anchor="middle">Backdoored weights · Poisoned pkgs · Tampered firmware</text>

  <!-- ===== Layer 2: Infrastructure Layer ===== -->
  <rect x="46" y="330" width="616" height="52" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <rect x="52" y="337" width="130" height="38" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="117" y="353" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Infrastructure Layer</text>
  <text x="117" y="367" font-size="8.5" fill="#555" text-anchor="middle">Compute, network, orchestration</text>

  <rect x="194" y="337" width="140" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="264" y="351" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Assets</text>
  <text x="264" y="364" font-size="8.5" fill="#555" text-anchor="middle">Accelerators · Containers · Keys</text>

  <line x1="342" y1="340" x2="342" y2="373" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <rect x="350" y="337" width="300" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="500" y="351" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Threats</text>
  <text x="500" y="364" font-size="8.5" fill="#555" text-anchor="middle">Side-channel · Fault injection · Tenant escape</text>

  <!-- Connector arrow -->
  <line x1="340" y1="380" x2="340" y2="390" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Layer 3: Model Layer ===== -->
  <rect x="46" y="197" width="616" height="125" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <rect x="52" y="207" width="130" height="38" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="117" y="223" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model Layer</text>
  <text x="117" y="237" font-size="8.5" fill="#555" text-anchor="middle">Weights, architecture, training</text>

  <!-- Assets box -->
  <rect x="194" y="207" width="140" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="264" y="221" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Assets</text>
  <text x="264" y="234" font-size="8.5" fill="#555" text-anchor="middle">Weights · Gradients · Checkpoints</text>

  <line x1="342" y1="210" x2="342" y2="243" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Threats box -->
  <rect x="350" y="207" width="300" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="500" y="221" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Threats</text>
  <text x="500" y="234" font-size="8.5" fill="#555" text-anchor="middle">Backdoor injection · Weight theft · Trojan models</text>

  <!-- Defenses row within Model Layer -->
  <rect x="194" y="255" width="455" height="58" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="421.5" y="270" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Defenses</text>
  <text x="421.5" y="285" font-size="8.5" fill="#555" text-anchor="middle">Secure training environments · Encrypted model storage · Access controls</text>
  <text x="421.5" y="300" font-size="8.5" fill="#555" text-anchor="middle">Model behavior analysis · Weight distribution monitoring</text>

  <line x1="340" y1="320" x2="340" y2="330" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Layer 4: Data Layer (top) ===== -->
  <rect x="46" y="64" width="616" height="125" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <rect x="52" y="74" width="130" height="38" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="117" y="90" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Layer</text>
  <text x="117" y="104" font-size="8.5" fill="#555" text-anchor="middle">Training corpora, pipelines, labels</text>

  <!-- Assets -->
  <rect x="194" y="74" width="140" height="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="264" y="88" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Assets</text>
  <text x="264" y="101" font-size="8.5" fill="#555" text-anchor="middle">Corpora · Labels · Embeddings</text>

  <line x1="342" y1="77" x2="342" y2="110" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Threats -->
  <rect x="350" y="74" width="300" height="38" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="500" y="88" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Threats</text>
  <text x="500" y="101" font-size="8.5" fill="#555" text-anchor="middle">Poisoning · Label manipulation · Membership inference</text>

  <!-- Defenses row within Data Layer -->
  <rect x="194" y="122" width="455" height="58" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="421.5" y="137" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Defenses</text>
  <text x="421.5" y="152" font-size="8.5" fill="#555" text-anchor="middle">Differential privacy · Input validation · Provenance tracking</text>
  <text x="421.5" y="167" font-size="8.5" fill="#555" text-anchor="middle">Statistical anomaly detection · Data quality monitoring</text>

  <line x1="340" y1="188" x2="340" y2="197" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Legend ===== -->
  <rect x="46" y="449" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="65" y="458" font-size="8.5" fill="#555">Assets (blue)</text>
  <rect x="140" y="449" width="14" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="159" y="458" font-size="8.5" fill="#555">Threats (red)</text>
  <rect x="234" y="449" width="14" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="253" y="458" font-size="8.5" fill="#555">Defenses (green)</text>

  <!-- Bottom footnote -->
  <text x="340" y="458" font-size="9" fill="#999" text-anchor="middle" font-style="italic"/>
</svg>