<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
    <marker id="arr-right-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#bbb"/>
    </marker>
  </defs>

  <rect width="680" height="490" fill="#fff"/>

  <!-- Column headers -->
  <rect x="30" y="30" width="180" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="120" y="55" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Threat</text>

  <rect x="250" y="30" width="180" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="55" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Detection Method</text>

  <rect x="470" y="30" width="180" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="560" y="55" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Mitigation</text>

  <!-- Connector arrows in header -->
  <line x1="210" y1="50" x2="250" y2="50" stroke="#999" stroke-width="1.2" marker-end="url(#arr-right)"/>
  <line x1="430" y1="50" x2="470" y2="50" stroke="#999" stroke-width="1.2" marker-end="url(#arr-right)"/>

  <!-- Divider line -->
  <line x1="30" y1="80" x2="650" y2="80" stroke="#ddd" stroke-width="1.2"/>

  <!-- ROW 1: Model Theft -->
  <rect x="30" y="90" width="180" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="120" y="118" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Model Theft</text>
  <text x="120" y="134" font-size="9" fill="#555" text-anchor="middle">Adversary reconstructs</text>
  <text x="120" y="147" font-size="9" fill="#555" text-anchor="middle">proprietary model via</text>
  <text x="120" y="160" font-size="9" fill="#555" text-anchor="middle">systematic API queries</text>

  <line x1="210" y1="130" x2="250" y2="130" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="250" y="90" width="180" height="80" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="118" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">API Rate Monitoring</text>
  <text x="340" y="134" font-size="9" fill="#555" text-anchor="middle">Detect anomalous query</text>
  <text x="340" y="147" font-size="9" fill="#555" text-anchor="middle">volume; fingerprint</text>
  <text x="340" y="160" font-size="9" fill="#555" text-anchor="middle">systematic probing patterns</text>

  <line x1="430" y1="130" x2="470" y2="130" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="470" y="90" width="180" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="118" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Watermarking</text>
  <text x="560" y="134" font-size="9" fill="#555" text-anchor="middle">Embed covert signatures;</text>
  <text x="560" y="147" font-size="9" fill="#555" text-anchor="middle">throttle suspicious clients;</text>
  <text x="560" y="160" font-size="9" fill="#555" text-anchor="middle">output perturbation</text>

  <!-- ROW 2: Data Poisoning -->
  <rect x="30" y="180" width="180" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="120" y="208" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Data Poisoning</text>
  <text x="120" y="224" font-size="9" fill="#555" text-anchor="middle">Attacker injects corrupt</text>
  <text x="120" y="237" font-size="9" fill="#555" text-anchor="middle">samples to shift model</text>
  <text x="120" y="250" font-size="9" fill="#555" text-anchor="middle">behavior at inference</text>

  <line x1="210" y1="220" x2="250" y2="220" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="250" y="180" width="180" height="80" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="208" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Statistical Validation</text>
  <text x="340" y="224" font-size="9" fill="#555" text-anchor="middle">Label distribution checks,</text>
  <text x="340" y="237" font-size="9" fill="#555" text-anchor="middle">outlier detection, data</text>
  <text x="340" y="250" font-size="9" fill="#555" text-anchor="middle">quality scoring pipelines</text>

  <line x1="430" y1="220" x2="470" y2="220" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="470" y="180" width="180" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="208" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Provenance Tracking</text>
  <text x="560" y="224" font-size="9" fill="#555" text-anchor="middle">Cryptographic data lineage;</text>
  <text x="560" y="237" font-size="9" fill="#555" text-anchor="middle">trusted sources only;</text>
  <text x="560" y="250" font-size="9" fill="#555" text-anchor="middle">sanitization filters</text>

  <!-- ROW 3: Adversarial Examples -->
  <rect x="30" y="270" width="180" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="120" y="298" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Adversarial Examples</text>
  <text x="120" y="314" font-size="9" fill="#555" text-anchor="middle">Imperceptible perturbations</text>
  <text x="120" y="327" font-size="9" fill="#555" text-anchor="middle">causing misclassification</text>
  <text x="120" y="340" font-size="9" fill="#555" text-anchor="middle">at inference time</text>

  <line x1="210" y1="310" x2="250" y2="310" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="250" y="270" width="180" height="80" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="298" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Input Preprocessing</text>
  <text x="340" y="314" font-size="9" fill="#555" text-anchor="middle">Feature squeezing, input</text>
  <text x="340" y="327" font-size="9" fill="#555" text-anchor="middle">smoothing, anomaly scoring</text>
  <text x="340" y="340" font-size="9" fill="#555" text-anchor="middle">before forward pass</text>

  <line x1="430" y1="310" x2="470" y2="310" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="470" y="270" width="180" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="298" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Certified Defenses</text>
  <text x="560" y="314" font-size="9" fill="#555" text-anchor="middle">Randomized smoothing;</text>
  <text x="560" y="327" font-size="9" fill="#555" text-anchor="middle">adversarial training on</text>
  <text x="560" y="340" font-size="9" fill="#555" text-anchor="middle">augmented attack samples</text>

  <!-- ROW 4: Membership Inference -->
  <rect x="30" y="360" width="180" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="120" y="388" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Membership Inference</text>
  <text x="120" y="404" font-size="9" fill="#555" text-anchor="middle">Determine whether a record</text>
  <text x="120" y="417" font-size="9" fill="#555" text-anchor="middle">was in training set by</text>
  <text x="120" y="430" font-size="9" fill="#555" text-anchor="middle">probing confidence scores</text>

  <line x1="210" y1="400" x2="250" y2="400" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="250" y="360" width="180" height="80" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="388" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Output Perturbation</text>
  <text x="340" y="404" font-size="9" fill="#555" text-anchor="middle">Add calibrated noise to</text>
  <text x="340" y="417" font-size="9" fill="#555" text-anchor="middle">confidence scores; limit</text>
  <text x="340" y="430" font-size="9" fill="#555" text-anchor="middle">top-k output precision</text>

  <line x1="430" y1="400" x2="470" y2="400" stroke="#bbb" stroke-width="1.2" marker-end="url(#arr-right-light)"/>

  <rect x="470" y="360" width="180" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="388" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Differential Privacy</text>
  <text x="560" y="404" font-size="9" fill="#555" text-anchor="middle">DP-SGD bounds per-record</text>
  <text x="560" y="417" font-size="9" fill="#555" text-anchor="middle">information leakage;</text>
  <text x="560" y="430" font-size="9" fill="#555" text-anchor="middle">privacy budget (&#x03B5;, &#x03B4;) set</text>

  <!-- Bottom annotation -->
  <text x="340" y="470" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each threat requires detection at the API layer and mitigation baked into training or serving architecture; neither alone is sufficient.</text>
</svg>