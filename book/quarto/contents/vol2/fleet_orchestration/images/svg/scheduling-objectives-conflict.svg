<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Four-Way Scheduling Conflict</text>
  <text x="340" y="50" text-anchor="middle" font-size="9" font-weight="400" fill="#555">No single scheduler optimizes all four simultaneously</text>

  <!-- ===== Tension lines between opposing vertices ===== -->
  <!-- Throughput (top) ↔ Cost (left): diagonal tension -->
  <line x1="230" y1="175" x2="330" y2="120" stroke="#c44" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Fairness (right) ↔ Latency (bottom): diagonal tension -->
  <line x1="450" y1="175" x2="350" y2="340" stroke="#c44" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Throughput (top) ↔ Latency (bottom): vertical axis tension -->
  <line x1="340" y1="120" x2="340" y2="340" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#arrow-red)"/>
  <line x1="340" y1="340" x2="340" y2="120" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#arrow-red)"/>
  <!-- Cost (left) ↔ Fairness (right): horizontal axis tension -->
  <line x1="170" y1="228" x2="510" y2="228" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#arrow-red)"/>
  <line x1="510" y1="228" x2="170" y2="228" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6" marker-end="url(#arrow-red)"/>

  <!-- ===== Throughput vertex (top, compute blue) ===== -->
  <ellipse cx="340" cy="108" rx="72" ry="34" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Throughput</text>
  <text x="352.0" y="119" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">max GPU-hours used</text>

  <!-- ===== Fairness vertex (right, data green) ===== -->
  <ellipse cx="510" cy="228" rx="72" ry="34" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="510" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Fairness</text>
  <text x="510" y="239" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">equitable share per team</text>

  <!-- ===== Latency vertex (bottom, routing orange) ===== -->
  <ellipse cx="340" cy="352" rx="72" ry="34" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="352.0" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Latency</text>
  <text x="340" y="363" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">fast queue clearing</text>

  <!-- ===== Cost vertex (left, error red) ===== -->
  <ellipse cx="170" cy="228" rx="72" ry="34" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="170" y="224" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Cost</text>
  <text x="170" y="239" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">minimize $/GPU-hour</text>

  <!-- ===== Center conflict annotation ===== -->
  <rect x="278" y="205" width="124" height="46" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="352.0" y="216.5" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">No Pareto-Optimal</text>
  <text x="352.0" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Scheduler Exists</text>
  <text x="352.0" y="248.5" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">policy encodes trade-offs</text>

  <!-- ===== Trade-off annotations on tension axes ===== -->
  <!-- Top-bottom axis label -->
  <rect x="352" y="210" width="84" height="16" fill="#f9d6d5" stroke="none"/>
  <text x="394" y="226" text-anchor="middle" font-size="7.5" font-weight="400" fill="#c44">starves small jobs</text>

  <!-- Left-right axis label -->
  <rect x="270" y="170" width="96" height="16" fill="#f9d6d5" stroke="none"/>
  <text x="318" y="181" text-anchor="middle" font-size="7.5" font-weight="400" fill="#c44">fragments resources</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Every scheduling policy is a weighted combination of these four objectives; no policy achieves all four simultaneously.</text>
</svg>