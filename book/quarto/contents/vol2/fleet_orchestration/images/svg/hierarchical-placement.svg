<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Bandwidth-Matched Placement</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Parallelism strategy must be matched to the topology domain that provides required bandwidth</text>

  <!-- ===== Column headers ===== -->
  <text x="170" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Parallelism Strategy</text>
  <text x="340" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#555"/>
  <text x="510" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Topology Domain</text>

  <!-- ===== Row 1: Tensor Parallel → NVLink (blue) ===== -->
  <!-- Left box -->
  <rect x="40" y="90" width="220" height="82" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tensor Parallel</text>
  <text x="150" y="128" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Split matrix ops across GPUs</text>
  <text x="150" y="141" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Exchanges activations at every</text>
  <text x="150" y="154" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">transformer layer — highest BW</text>

  <!-- Arrow -->
  <line x1="260" y1="131" x2="418" y2="131" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="339" y="124" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">requires</text>
  <rect x="280" y="134" width="118" height="16" rx="4" fill="#cfe2f3" stroke="none"/>
  <text x="339" y="146" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">900 GB/s NVLink</text>

  <!-- Right box: NVLink domain -->
  <rect x="420" y="90" width="220" height="82" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="530" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">NVLink Domain</text>
  <text x="530" y="127" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Within single node (8 GPUs)</text>
  <text x="530" y="141" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">900 GB/s bidirectional</text>
  <!-- GPU badge pills -->
  <rect x="447" y="152" width="28" height="14" rx="2" fill="#a31f34"/>
  <text x="461" y="162" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <rect x="481" y="152" width="28" height="14" rx="2" fill="#a31f34"/>
  <text x="495" y="162" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <rect x="515" y="152" width="28" height="14" rx="2" fill="#a31f34"/>
  <text x="530" y="162" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>
  <rect x="549" y="152" width="28" height="14" rx="2" fill="#a31f34"/>
  <text x="563" y="162" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU</text>

  <!-- ===== Row 2: Pipeline Parallel → InfiniBand within rack (green) ===== -->
  <!-- Left box -->
  <rect x="40" y="200" width="220" height="82" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Pipeline Parallel</text>
  <text x="150" y="238" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Split layers across stages</text>
  <text x="150" y="251" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Sends activations per microbatch</text>
  <text x="150" y="264" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">boundary — moderate BW</text>

  <!-- Arrow -->
  <line x1="260" y1="241" x2="418" y2="241" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="339" y="234" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">maps to</text>
  <rect x="274" y="244" width="130" height="16" rx="4" fill="#d4edda" stroke="none"/>
  <text x="339" y="256" text-anchor="middle" font-size="8" font-weight="400" fill="#3d9e5a">50 GB/s InfiniBand</text>

  <!-- Right box: InfiniBand within rack -->
  <rect x="420" y="200" width="220" height="82" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="530" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">InfiniBand (Rack)</text>
  <text x="530" y="237" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Within rack, leaf switch</text>
  <text x="530" y="251" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">NDR 400 Gbps per port</text>
  <!-- Node badges -->
  <rect x="447" y="262" width="38" height="14" rx="2" fill="#3d9e5a"/>
  <text x="466" y="272" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Node A</text>
  <rect x="499" y="262" width="38" height="14" rx="2" fill="#3d9e5a"/>
  <text x="530" y="272" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Node B</text>
  <rect x="551" y="262" width="38" height="14" rx="2" fill="#3d9e5a"/>
  <text x="570" y="272" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Node C</text>

  <!-- ===== Row 3: Data Parallel → Cross-rack fabric (orange) ===== -->
  <!-- Left box -->
  <rect x="40" y="310" width="220" height="82" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="150" y="332" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Data Parallel</text>
  <text x="150" y="348" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Replicate model, split data</text>
  <text x="150" y="361" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">AllReduce gradients per step</text>
  <text x="150" y="374" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">overlaps with compute — low BW</text>

  <!-- Arrow -->
  <line x1="260" y1="351" x2="418" y2="351" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="339" y="344" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">scales across</text>
  <rect x="268" y="354" width="142" height="16" rx="4" fill="#fdebd0" stroke="none"/>
  <text x="339" y="366" text-anchor="middle" font-size="8" font-weight="400" fill="#c87b2a">25 GB/s cross-rack fabric</text>

  <!-- Right box: Cross-rack fabric -->
  <rect x="420" y="310" width="220" height="82" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="530" y="332" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Cross-Rack Fabric</text>
  <text x="530" y="347" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Spine switches, multiple racks</text>
  <text x="530" y="361" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">2:1 oversubscription typical</text>
  <!-- Rack badges -->
  <rect x="447" y="370" width="38" height="14" rx="2" fill="#c87b2a"/>
  <text x="466" y="380" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Rack 1</text>
  <rect x="499" y="370" width="38" height="14" rx="2" fill="#c87b2a"/>
  <text x="530" y="380" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Rack 2</text>
  <rect x="551" y="370" width="38" height="14" rx="2" fill="#c87b2a"/>
  <text x="570" y="380" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Rack N</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Mismatched placement — tensor parallel across racks — degrades throughput by 18× due to InfiniBand vs. NVLink bandwidth difference.</text>
</svg>