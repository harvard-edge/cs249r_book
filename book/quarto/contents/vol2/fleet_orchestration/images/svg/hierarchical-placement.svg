<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Bandwidth-Matched Placement</text>
  <text x="340" y="50" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Parallelism strategy must be matched to the topology domain that provides required bandwidth</text>

  <!-- ===== Column headers ===== -->
  <text x="150" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Parallelism Strategy</text>
  <text x="340" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#555"></text>
  <text x="530" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Topology Domain</text>

  <!-- ===== Row 1: Tensor Parallel → NVLink (blue) ===== -->
  <!-- Left box -->
  <rect x="40" y="90" width="220" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Tensor Parallel</text>
  <text x="150" y="135" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Split matrix ops across GPUs</text>
  <text x="150" y="155" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Exchanges activations at every</text>
  <text x="150" y="175" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">transformer layer — highest BW</text>

  <!-- Arrow -->
  <line x1="260" y1="140" x2="420" y2="140" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="340" y="134" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4a90c4">requires</text>
  <rect x="280" y="145" width="120" height="20" rx="4" fill="#cfe2f3" stroke="none"/>
  <text x="340" y="159" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">900 GB/s NVLink</text>

  <!-- Right box: NVLink domain -->
  <rect x="420" y="90" width="220" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="530" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">NVLink Domain</text>
  <text x="530" y="135" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Within single node (8 GPUs)</text>
  <text x="530" y="155" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">900 GB/s bidirectional</text>
  <!-- GPU badge pills -->
  <rect x="440" y="160" width="30" height="20" rx="4" fill="#a31f34"/>
  <text x="455" y="174" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <rect x="490" y="160" width="30" height="20" rx="4" fill="#a31f34"/>
  <text x="505" y="174" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <rect x="540" y="160" width="30" height="20" rx="4" fill="#a31f34"/>
  <text x="555" y="174" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <rect x="590" y="160" width="30" height="20" rx="4" fill="#a31f34"/>
  <text x="605" y="174" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>

  <!-- ===== Row 2: Pipeline Parallel → InfiniBand within rack (green) ===== -->
  <!-- Left box -->
  <rect x="40" y="210" width="220" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Pipeline Parallel</text>
  <text x="150" y="255" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Split layers across stages</text>
  <text x="150" y="275" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Sends activations per microbatch</text>
  <text x="150" y="295" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">boundary — moderate BW</text>

  <!-- Arrow -->
  <line x1="260" y1="260" x2="420" y2="260" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="340" y="254" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">maps to</text>
  <rect x="270" y="265" width="140" height="20" rx="4" fill="#d4edda" stroke="none"/>
  <text x="340" y="279" text-anchor="middle" font-size="8" font-weight="400" fill="#3d9e5a">50 GB/s InfiniBand</text>

  <!-- Right box: InfiniBand within rack -->
  <rect x="420" y="210" width="220" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="530" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">InfiniBand (Rack)</text>
  <text x="530" y="255" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Within rack, leaf switch</text>
  <text x="530" y="275" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">NDR 400 Gbps per port</text>
  <!-- Node badges -->
  <rect x="450" y="280" width="40" height="20" rx="4" fill="#3d9e5a"/>
  <text x="470" y="294" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Node A</text>
  <rect x="510" y="280" width="40" height="20" rx="4" fill="#3d9e5a"/>
  <text x="530" y="294" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Node B</text>
  <rect x="570" y="280" width="40" height="20" rx="4" fill="#3d9e5a"/>
  <text x="590" y="294" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Node C</text>

  <!-- ===== Row 3: Data Parallel → Cross-rack fabric (orange) ===== -->
  <!-- Left box -->
  <rect x="40" y="330" width="220" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="150" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Data Parallel</text>
  <text x="150" y="375" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Replicate model, split data</text>
  <text x="150" y="395" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">AllReduce gradients per step</text>
  <text x="150" y="415" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">overlaps with compute — low BW</text>

  <!-- Arrow -->
  <line x1="260" y1="380" x2="420" y2="380" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="340" y="374" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">scales across</text>
  <rect x="260" y="385" width="160" height="20" rx="4" fill="#fdebd0" stroke="none"/>
  <text x="340" y="399" text-anchor="middle" font-size="8" font-weight="400" fill="#c87b2a">25 GB/s cross-rack fabric</text>

  <!-- Right box: Cross-rack fabric -->
  <rect x="420" y="330" width="220" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="530" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Cross-Rack Fabric</text>
  <text x="530" y="375" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Spine switches, multiple racks</text>
  <text x="530" y="395" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">2:1 oversubscription typical</text>
  <!-- Rack badges -->
  <rect x="450" y="400" width="40" height="20" rx="4" fill="#c87b2a"/>
  <text x="470" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Rack 1</text>
  <rect x="510" y="400" width="40" height="20" rx="4" fill="#c87b2a"/>
  <text x="530" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Rack 2</text>
  <rect x="570" y="400" width="40" height="20" rx="4" fill="#c87b2a"/>
  <text x="590" y="414" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Rack N</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="450" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Mismatched placement — tensor parallel across racks — degrades throughput by 18× due to InfiniBand vs. NVLink bandwidth difference.</text>
</svg>