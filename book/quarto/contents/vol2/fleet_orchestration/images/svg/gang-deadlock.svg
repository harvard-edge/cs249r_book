<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 550" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="550" fill="#fff" rx="4"/>

  <!-- ===== LEFT SIDE: DEADLOCK SCENARIO ===== -->
  <text x="205" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#a31f34">Deadlock: Non-Gang Scheduler</text>
  <text x="205" y="46" text-anchor="middle" font-size="9.5" fill="#555">8 GPUs available, 2 jobs each need 8 GPUs</text>

  <!-- GPU row -->
  <g>
    <!-- J1 holds 4 GPUs (blue) -->
    <rect x="30" y="60" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
    <text x="45" y="79" text-anchor="middle" font-size="9" font-weight="700">G0</text>
    <rect x="70" y="60" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
    <text x="85" y="79" text-anchor="middle" font-size="9" font-weight="700">G1</text>
    <rect x="110" y="60" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
    <text x="125" y="79" text-anchor="middle" font-size="9" font-weight="700">G2</text>
    <rect x="150" y="60" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
    <text x="165" y="79" text-anchor="middle" font-size="9" font-weight="700">G3</text>

    <!-- J2 holds 4 GPUs (pink) -->
    <rect x="230" y="60" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
    <text x="245" y="79" text-anchor="middle" font-size="9" font-weight="700">G4</text>
    <rect x="270" y="60" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
    <text x="285" y="79" text-anchor="middle" font-size="9" font-weight="700">G5</text>
    <rect x="310" y="60" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
    <text x="325" y="79" text-anchor="middle" font-size="9" font-weight="700">G6</text>
    <rect x="350" y="60" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
    <text x="365" y="79" text-anchor="middle" font-size="9" font-weight="700">G7</text>
  </g>

  <!-- Labels -->
  <text x="105" y="105" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="700">J1 holds G0-G3</text>
  <text x="305" y="105" text-anchor="middle" font-size="9" fill="#c44" font-weight="700">J2 holds G4-G7</text>

  <!-- Job boxes showing what each job wants -->
  <rect x="40" y="120" width="130" height="60" fill="none" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="5,3" rx="4"/>
  <text x="105" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Job J1</text>
  <text x="105" y="156" text-anchor="middle" font-size="9" fill="#555">Has 4, needs 4 more</text>
  <text x="105" y="172" text-anchor="middle" font-size="9" fill="#c44">Progress: 0%</text>

  <rect x="240" y="120" width="130" height="60" fill="none" stroke="#c44" stroke-width="1.2" stroke-dasharray="5,3" rx="4"/>
  <text x="305" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Job J2</text>
  <text x="305" y="156" text-anchor="middle" font-size="9" fill="#555">Has 4, needs 4 more</text>
  <text x="305" y="172" text-anchor="middle" font-size="9" fill="#c44">Progress: 0%</text>

  <!-- Circular dependency arrows -->
  <path d="M 170,140 L 240,140" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="205" y="134" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">wants J2's GPUs</text>

  <path d="M 240,160 L 170,160" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="205" y="174" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">wants J1's GPUs</text>

  <!-- J3 waiting -->
  <rect x="130" y="200" width="150" height="30" fill="none" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="5,3" rx="4"/>
  <text x="205" y="219" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Job J3: waiting (needs 4 GPUs, 0 available)</text>

  <!-- DEADLOCK label -->
  <rect x="150" y="250" width="110" height="30" fill="#a31f34" stroke="none" rx="4"/>
  <text x="205" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">DEADLOCK</text>

  <!-- Waste annotation -->
  <rect x="40" y="300" width="330" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <text x="205" y="314" text-anchor="middle" font-size="9" fill="#c44" font-weight="700">8 GPUs allocated, 0 useful work. Waste: $16/hr at $2/GPU-hr.</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="400" y1="20" x2="400" y2="330" stroke="#e0e0e0" stroke-width="0.8"/>

  <!-- ===== RIGHT SIDE: GANG SCHEDULING SOLUTION ===== -->
  <text x="535" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Solution: Gang Scheduler</text>
  <text x="535" y="46" text-anchor="middle" font-size="9.5" fill="#555">All-or-nothing allocation; atomic resource grants</text>

  <!-- Step 1: J1 gets all 4 -->
  <text x="535" y="70" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Step 1: Allocate J1 atomically</text>
  <rect x="420" y="80" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <rect x="460" y="80" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <rect x="500" y="80" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <rect x="540" y="80" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <!-- remaining free -->
  <rect x="580" y="80" width="30" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <rect x="620" y="80" width="30" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="435" y="99" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">J1</text>
  <text x="475" y="99" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">J1</text>
  <text x="515" y="99" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">J1</text>
  <text x="555" y="99" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">J1</text>
  <text x="595" y="99" text-anchor="middle" font-size="8" fill="#bbb">free</text>
  <text x="635" y="99" text-anchor="middle" font-size="8" fill="#bbb">free</text>
  
  <!-- check mark -->
  <text x="660" y="70" font-size="12" fill="#3d9e5a">✓</text>

  <!-- Step 2: J2 queued (not enough free) -->
  <text x="535" y="130" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Step 2: J2 queued (only 4 free, needs 4)</text>
  <text x="535" y="145" text-anchor="middle" font-size="9" fill="#555">J2 waits -- does not hold partial resources</text>

  <!-- Step 3: J1 finishes, J2 runs -->
  <text x="535" y="170" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Step 3: J1 completes, J2 allocated atomically</text>
  <rect x="420" y="180" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <rect x="460" y="180" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <rect x="500" y="180" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <rect x="540" y="180" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <rect x="580" y="180" width="30" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <rect x="620" y="180" width="30" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="435" y="199" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">J2</text>
  <text x="475" y="199" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">J2</text>
  <text x="515" y="199" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">J2</text>
  <text x="555" y="199" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">J2</text>
  <text x="595" y="199" text-anchor="middle" font-size="8" fill="#bbb">free</text>
  <text x="635" y="199" text-anchor="middle" font-size="8" fill="#bbb">free</text>
  <text x="660" y="170" font-size="12" fill="#3d9e5a">✓</text>

  <!-- Result annotation -->
  <rect x="430" y="230" width="210" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="535" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">No deadlock. All jobs complete sequentially.</text>

  <!-- ===== RESOURCE DEPENDENCY GRAPH (bottom) ===== -->
  <rect x="30" y="350" width="620" height="140" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="340" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Resource Dependency Graph (Deadlock Conditions)</text>

  <!-- Four conditions -->
  <!-- Mutual exclusion -->
  <rect x="40" y="380" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="100" y="396" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Mutual Exclusion</text>
  <text x="100" y="410" text-anchor="middle" font-size="8" fill="#555">GPU not shareable</text>

  <!-- Hold and wait -->
  <rect x="190" y="380" width="120" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="250" y="396" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Hold and Wait</text>
  <text x="250" y="410" text-anchor="middle" font-size="8" fill="#555">Jobs hold partial alloc</text>

  <!-- No preemption -->
  <rect x="340" y="380" width="120" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="400" y="396" text-anchor="middle" font-size="9" font-weight="700" fill="#333">No Preemption</text>
  <text x="400" y="410" text-anchor="middle" font-size="8" fill="#555">Cannot reclaim GPUs</text>

  <!-- Circular wait -->
  <rect x="490" y="380" width="150" height="40" fill="#a31f34" stroke="#a31f34" stroke-width="1.2" rx="4"/>
  <text x="565" y="396" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Circular Wait</text>
  <text x="565" y="410" text-anchor="middle" font-size="8" fill="#fff">J1 waits J2 waits J1</text>

  <!-- Arrow chain -->
  <line x1="160" y1="400" x2="190" y2="400" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="310" y1="400" x2="340" y2="400" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="460" y1="400" x2="490" y2="400" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Gang scheduling breaks "Hold and Wait" -->
  <text x="250" y="464" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">Gang scheduling</text>
  <text x="250" y="478" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">breaks this condition</text>
  <line x1="250" y1="450" x2="250" y2="420" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Footnote -->
  <text x="340" y="520" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Gang scheduling enforces atomicity: if a job cannot run in full, it does not run at all.</text>

</svg>