<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="350" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Scaling Efficiency Curve</text>
  <text x="350" y="50" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Throughput scales sub-linearly with GPU count; communication overhead determines the efficiency cliff</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis label -->
  <text x="30" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#555" transform="rotate(-90,30,220)">Scaling Efficiency E(k) = Throughput / (k × Single-GPU Throughput)</text>

  <!-- X-axis -->
  <line x1="80" y1="370" x2="620" y2="370" stroke="#bbb" stroke-width="1.2"/>
  <!-- Y-axis -->
  <line x1="80" y1="70" x2="80" y2="370" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis ticks (0 to 1.0) -->
  <line x1="76" y1="370" x2="80" y2="370" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="373" text-anchor="end" font-size="8" fill="#555">0</text>
  <line x1="76" y1="310" x2="80" y2="310" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="313" text-anchor="end" font-size="8" fill="#555">0.2</text>
  <line x1="76" y1="250" x2="80" y2="250" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="253" text-anchor="end" font-size="8" fill="#555">0.4</text>
  <line x1="76" y1="190" x2="80" y2="190" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="193" text-anchor="end" font-size="8" fill="#555">0.6</text>
  <line x1="76" y1="130" x2="80" y2="130" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="133" text-anchor="end" font-size="8" fill="#555">0.8</text>
  <line x1="76" y1="70" x2="80" y2="70" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="73" text-anchor="end" font-size="8" fill="#555">1.0</text>

  <!-- X-axis ticks: 64, 128, 256, 512, 1024, 2048, 4096 GPUs -->
  <line x1="80" y1="368" x2="80" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="384" text-anchor="middle" font-size="7.5" fill="#555">64</text>
  <line x1="170" y1="368" x2="170" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="384" text-anchor="middle" font-size="7.5" fill="#555">128</text>
  <line x1="260" y1="368" x2="260" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="260" y="384" text-anchor="middle" font-size="7.5" fill="#555">256</text>
  <line x1="350" y1="368" x2="350" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="350" y="384" text-anchor="middle" font-size="7.5" fill="#555">512</text>
  <line x1="440" y1="368" x2="440" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="440" y="384" text-anchor="middle" font-size="7.5" fill="#555">1,024</text>
  <line x1="530" y1="368" x2="530" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="530" y="384" text-anchor="middle" font-size="7.5" fill="#555">2,048</text>
  <line x1="620" y1="368" x2="620" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="620" y="384" text-anchor="middle" font-size="7.5" fill="#555">4,096</text>
  <text x="350" y="410" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Number of GPUs (log scale)</text>

  <!-- ===== Phase background fills ===== -->
  <!-- Phase 1: Linear (green) -->
  <rect x="80" y="70" width="180" height="300" fill="#d4edda" opacity="0.3"/>
  <!-- Phase 2: Sublinear (orange) -->
  <rect x="260" y="70" width="180" height="300" fill="#fdebd0" opacity="0.3"/>
  <!-- Phase 3: Saturation (red-pink) -->
  <rect x="440" y="70" width="180" height="300" fill="#f9d6d5" opacity="0.3"/>

  <!-- Phase boundary lines -->
  <line x1="260" y1="70" x2="260" y2="370" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="440" y1="70" x2="440" y2="370" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ===== Ideal linear reference line (dashed gray) ===== -->
  <line x1="80" y1="70" x2="620" y2="70" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="580" y="64" text-anchor="middle" font-size="8" font-weight="400" fill="#bbb">ideal E=1.0</text>

  <!-- ===== Efficiency curve ===== -->
  <polyline points="80,85 170,100 260,118 350,160 440,214 530,232 620,238" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Colored overlay on the curve by phase -->
  <!-- Phase 1: green segment -->
  <polyline points="80,85 170,100 260,118" fill="none" stroke="#3d9e5a" stroke-width="3"/>
  <!-- Phase 2: orange segment -->
  <polyline points="260,118 350,160 440,214" fill="none" stroke="#c87b2a" stroke-width="3"/>
  <!-- Phase 3: red segment -->
  <polyline points="440,214 530,232 620,238" fill="none" stroke="#c44" stroke-width="3"/>

  <!-- ===== Phase labels ===== -->
  <!-- Phase 1: Linear -->
  <text x="170" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Linear</text>
  <text x="170" y="284" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">E ≈ 0.90–0.95</text>
  <text x="170" y="298" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">compute dominates</text>

  <!-- Phase 2: Sublinear -->
  <text x="350" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Sublinear</text>
  <text x="350" y="284" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">E declining</text>
  <text x="350" y="298" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">AllReduce latency grows</text>

  <!-- Phase 3: Saturation -->
  <text x="530" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Saturation</text>
  <text x="530" y="284" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c44">E ≈ 0.44–0.48</text>
  <text x="530" y="298" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c44">comm. bottleneck</text>

  <!-- ===== Phase boundary annotations ===== -->
  <!-- Boundary 1 at 256 GPUs -->
  <rect x="220" y="320" width="80" height="30" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="260" y="334" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">256 GPU cliff</text>
  <text x="260" y="344" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">ring comm. overhead</text>

  <!-- Boundary 2 at 1024 GPUs -->
  <rect x="400" y="320" width="80" height="30" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="440" y="334" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">1,024 GPU cliff</text>
  <text x="440" y="344" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">cross-rack latency</text>

  <!-- Data point annotation: our 175B model example -->
  <circle cx="440" cy="214" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <rect x="450" y="200" width="90" height="30" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="495" y="214" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">175B model</text>
  <text x="495" y="224" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">E ≈ 0.52 at 1,024</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="350" y="440" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Schedulers cap elastic allocation at the efficiency cliff; marginal throughput gain below ~10% does not justify resharding cost.</text>
</svg>