<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Scaling Efficiency Curve</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Throughput scales sub-linearly with GPU count; communication overhead determines the efficiency cliff</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis label -->
  <text x="28" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#555" transform="rotate(-90,28,240)">Scaling Efficiency E(k) = Throughput / (k × Single-GPU Throughput)</text>

  <!-- X-axis -->
  <line x1="75" y1="370" x2="625" y2="370" stroke="#bbb" stroke-width="1.2"/>
  <!-- Y-axis -->
  <line x1="75" y1="70" x2="75" y2="370" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis ticks (0 to 1.0) -->
  <line x1="71" y1="370" x2="75" y2="370" stroke="#bbb" stroke-width="1"/>
  <text x="63" y="373" text-anchor="end" font-size="8" fill="#555">0</text>
  <line x1="71" y1="310" x2="75" y2="310" stroke="#bbb" stroke-width="1"/>
  <text x="63" y="313" text-anchor="end" font-size="8" fill="#555">0.2</text>
  <line x1="71" y1="250" x2="75" y2="250" stroke="#bbb" stroke-width="1"/>
  <text x="63" y="253" text-anchor="end" font-size="8" fill="#555">0.4</text>
  <line x1="71" y1="190" x2="75" y2="190" stroke="#bbb" stroke-width="1"/>
  <text x="63" y="193" text-anchor="end" font-size="8" fill="#555">0.6</text>
  <line x1="71" y1="130" x2="75" y2="130" stroke="#bbb" stroke-width="1"/>
  <text x="63" y="133" text-anchor="end" font-size="8" fill="#555">0.8</text>
  <line x1="71" y1="70" x2="75" y2="70" stroke="#bbb" stroke-width="1"/>
  <text x="63" y="73" text-anchor="end" font-size="8" fill="#555">1.0</text>

  <!-- X-axis ticks: 64, 128, 256, 512, 1024, 2048, 4096 GPUs -->
  <!-- x: 75 to 625, width=550 -->
  <!-- log scale: log2(64)=6, log2(4096)=12, range=6 steps, 550/6≈91.7 px/step -->
  <!-- x=75+91.7*(log2(k)-6) -->
  <!-- 64: x=75, 128: x=166.7, 256: x=258.3, 512: x=350, 1024: x=441.7, 2048: x=533.3, 4096: x=625 -->
  <line x1="75" y1="368" x2="75" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="75" y="382" text-anchor="middle" font-size="7.5" fill="#555">64</text>
  <line x1="167" y1="368" x2="167" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="167" y="382" text-anchor="middle" font-size="7.5" fill="#555">128</text>
  <line x1="258" y1="368" x2="258" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="258" y="382" text-anchor="middle" font-size="7.5" fill="#555">256</text>
  <line x1="350" y1="368" x2="350" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="350" y="382" text-anchor="middle" font-size="7.5" fill="#555">512</text>
  <line x1="442" y1="368" x2="442" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="442" y="382" text-anchor="middle" font-size="7.5" fill="#555">1,024</text>
  <line x1="533" y1="368" x2="533" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="533" y="382" text-anchor="middle" font-size="7.5" fill="#555">2,048</text>
  <line x1="625" y1="368" x2="625" y2="372" stroke="#bbb" stroke-width="1"/>
  <text x="625" y="382" text-anchor="middle" font-size="7.5" fill="#555">4,096</text>
  <text x="350" y="400" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Number of GPUs (log scale)</text>

  <!-- ===== Phase background fills ===== -->
  <!-- Phase 1: Linear (green), x=75 to x=258 -->
  <rect x="75" y="70" width="183" height="300" fill="#d4edda" opacity="0.3" rx="2"/>
  <!-- Phase 2: Sublinear (orange), x=258 to x=442 -->
  <rect x="258" y="70" width="184" height="300" fill="#fdebd0" opacity="0.3" rx="2"/>
  <!-- Phase 3: Saturation (red-pink), x=442 to x=625 -->
  <rect x="442" y="70" width="183" height="300" fill="#f9d6d5" opacity="0.3" rx="2"/>

  <!-- Phase boundary lines -->
  <line x1="258" y1="70" x2="258" y2="370" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="442" y1="70" x2="442" y2="370" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ===== Ideal linear reference line (dashed gray) ===== -->
  <line x1="75" y1="70" x2="625" y2="70" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="600" y="65" text-anchor="middle" font-size="8" font-weight="400" fill="#bbb">ideal E=1.0</text>

  <!-- ===== Efficiency curve ===== -->
  <!-- Phase 1: nearly flat at ~0.95, 64→256 GPUs -->
  <!-- E values: 64→0.95(y=88), 128→0.92(y=106), 256→0.88(y=130) -->
  <!-- Phase 2: declining, 256→1024, E: 0.88→0.65→0.52 -->
  <!-- 512: E=0.72→y=190-0.72*300=370-216=154... use: y=370-E*300 -->
  <!-- E=0.95→y=85, E=0.90→y=100, E=0.85→y=115, E=0.80→y=130, E=0.72→y=154, E=0.65→y=175, E=0.55→y=205, E=0.50→y=220, E=0.46→y=232, E=0.44→y=238 -->
  <polyline points="75,85 167,100 258,118 350,160 442,210 533,232 625,238" fill="none" stroke="#333" stroke-width="2.5"/>

  <!-- Colored overlay on the curve by phase -->
  <!-- Phase 1: green segment -->
  <polyline points="75,85 167,100 258,118" fill="none" stroke="#3d9e5a" stroke-width="3"/>
  <!-- Phase 2: orange segment -->
  <polyline points="258,118 350,160 442,210" fill="none" stroke="#c87b2a" stroke-width="3"/>
  <!-- Phase 3: red segment -->
  <polyline points="442,210 533,232 625,238" fill="none" stroke="#c44" stroke-width="3"/>

  <!-- ===== Phase labels ===== -->
  <!-- Phase 1: Linear -->
  <text x="166.5" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Linear</text>
  <text x="166.5" y="101" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">E ≈ 0.90–0.95</text>
  <text x="166.5" y="114" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">compute dominates</text>

  <!-- Phase 2: Sublinear -->
  <text x="350" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Sublinear</text>
  <text x="350" y="101" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">E declining</text>
  <text x="350" y="114" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">AllReduce latency grows</text>

  <!-- Phase 3: Saturation -->
  <text x="533.5" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Saturation</text>
  <text x="533.5" y="101" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c44">E ≈ 0.44–0.48</text>
  <text x="533.5" y="114" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c44">comm. bottleneck</text>

  <!-- ===== Phase boundary annotations ===== -->
  <!-- Boundary 1 at 256 GPUs -->
  <rect x="217" y="325" width="82" height="30" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="258" y="339" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">256 GPU cliff</text>
  <text x="258" y="350" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">ring comm. overhead</text>
  <line x1="258" y1="325" x2="258" y2="120" stroke="#c87b2a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Boundary 2 at 1024 GPUs -->
  <rect x="401" y="325" width="82" height="30" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="442" y="339" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">1,024 GPU cliff</text>
  <text x="442" y="350" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">cross-rack latency</text>
  <line x1="442" y1="325" x2="442" y2="212" stroke="#c44" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Data point annotation: our 175B model example -->
  <circle cx="442" cy="210" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <rect x="447" y="200" width="92" height="28" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="493" y="213" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">175B model</text>
  <text x="493" y="224" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">E ≈ 0.52 at 1,024</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Schedulers cap elastic allocation at the efficiency cliff; marginal throughput gain below ~10% does not justify resharding cost.</text>
</svg>