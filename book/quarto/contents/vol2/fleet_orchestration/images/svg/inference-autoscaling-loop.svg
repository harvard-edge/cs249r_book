<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">LLM Autoscaling Control Loop</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">KV cache occupancy — not GPU utilization — is the correct scaling signal for LLM inference</text>

  <!-- ===== Step 1: Monitor KV Cache Occupancy (green, top-left) ===== -->
  <rect x="50" y="100" width="160" height="78" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="130" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Monitor</text>
  <text x="130" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">KV Cache Occupancy</text>
  <text x="130" y="155" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">+ queue depth</text>
  <text x="130" y="168" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">+ pending tokens</text>

  <!-- Arrow: Monitor → Compare -->
  <line x1="210" y1="139" x2="270" y2="139" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="240" y="130" text-anchor="middle" font-size="8" font-weight="400" fill="#555">metrics</text>

  <!-- ===== Step 2: Compare to Threshold (orange diamond) ===== -->
  <!-- Diamond shape -->
  <polygon points="340,90 395,139 340,188 285,139" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="340" y="130" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Compare to</text>
  <text x="340" y="143" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Threshold</text>
  <text x="340" y="158" text-anchor="middle" font-size="8" font-weight="400" fill="#555">&gt;75%? &lt;40%?</text>

  <!-- Label: YES above threshold -->
  <text x="415" y="102" text-anchor="start" font-size="8.5" font-weight="700" fill="#c87b2a">above</text>
  <text x="415" y="110" text-anchor="start" font-size="8.5" font-weight="700" fill="#c87b2a">threshold</text>
  <!-- Arrow: Compare → Scale Up -->
  <line x1="395" y1="120" x2="462" y2="100" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Label: below threshold -->
  <text x="415" y="160.0" text-anchor="start" font-size="8.5" font-weight="700" fill="#c87b2a">below</text>
  <text x="415" y="182" text-anchor="start" font-size="8.5" font-weight="700" fill="#c87b2a">threshold</text>
  <!-- Arrow: Compare → Scale Down -->
  <line x1="395" y1="158" x2="462" y2="188" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ===== Step 3a: Scale Up (add GPUs, blue) ===== -->
  <rect x="462" y="62" width="160" height="72" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="542" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Scale Up</text>
  <text x="542" y="103" text-anchor="middle" font-size="9" font-weight="400" fill="#555">add GPU replicas</text>
  <text x="542" y="117" text-anchor="middle" font-size="9" font-weight="400" fill="#555">cooldown: 0 min (aggressive)</text>
  <text x="542" y="130" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">protect P99 SLO</text>

  <!-- ===== Step 3b: Scale Down (remove GPUs, red) ===== -->
  <rect x="462" y="168" width="160" height="72" fill="#f9d6d5" stroke="#c44" stroke-width="1.8"/>
  <text x="542" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Scale Down</text>
  <text x="542" y="209" text-anchor="middle" font-size="9" font-weight="400" fill="#555">remove GPU replicas</text>
  <text x="542" y="223" text-anchor="middle" font-size="9" font-weight="400" fill="#555">cooldown: 15 min (conservative)</text>
  <text x="542" y="237" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">prevent thrashing</text>

  <!-- Loop back arrows to Monitor -->
  <path d="M542,134 Q542,270 340,300 Q138,300 130,178" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ===== "NOT GPU Utilization" annotation with red X ===== -->
  <rect x="50" y="235" width="200" height="90" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="150" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">NOT GPU Utilization</text>
  <line x1="72" y1="270" x2="228" y2="310" stroke="#c44" stroke-width="2.5"/>
  <line x1="72" y1="310" x2="228" y2="270" stroke="#c44" stroke-width="2.5"/>
  <text x="150" y="320" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">GPU can be &lt;60% utilized</text>
  <text x="150" y="332" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">yet KV cache at 90% full</text>
  <text x="150" y="344" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">→ memory exhaustion imminent</text>

  <!-- Arrow from NOT box to Monitor (explain why) -->
  <line x1="210" y1="280" x2="250" y2="280" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="285" y="271.5" text-anchor="middle" font-size="8" font-weight="400" fill="#c44">use instead:</text>
  <text x="285" y="285.5" text-anchor="middle" font-size="8" font-weight="400" fill="#c44">KV cache %</text>

  <!-- ===== Key insight box ===== -->
  <rect x="350" y="285" width="280" height="95" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="490" y="305" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Why KV Cache, Not GPU Utilization?</text>
  <text x="490" y="321" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Long-context requests exhaust GPU memory</text>
  <text x="490" y="334" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">at low compute utilization. A 70B model</text>
  <text x="490" y="347" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">serving 128K-context requests may exceed</text>
  <text x="490" y="360" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">80 GB KV cache at &lt;50% GPU compute load.</text>
  <text x="490" y="374" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Utilization-based scaling fails this workload.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="446" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Asymmetric hysteresis — scale up aggressively, scale down conservatively — prevents SLO violations and replica thrashing.</text>
</svg>