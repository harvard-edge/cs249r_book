<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <rect width="680" height="480" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Imperative vs. Declarative Orchestration</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="40" x2="340" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Slurm ===== -->
  <text x="170" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Slurm (Imperative)</text>
  <text x="170" y="66" text-anchor="middle" font-size="9" font-weight="400" fill="#555">User specifies exact resources</text>

  <!-- User box -->
  <rect x="110" y="80" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#333">User</text>
  <text x="170" y="111" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">submits sbatch script</text>

  <!-- Arrow down -->
  <line x1="170" y1="120" x2="170" y2="150" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- sbatch script box -->
  <rect x="100" y="150" width="140" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="170" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#333">sbatch Script</text>
  <text x="170" y="181" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">--gres=gpu:8 --nodes=4</text>

  <!-- Arrow down -->
  <line x1="170" y1="190" x2="170" y2="220" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Central scheduler box -->
  <rect x="90" y="220" width="160" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="237" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Central Scheduler</text>
  <text x="170" y="251" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">slurmctld: authoritative state</text>

  <!-- Arrow down -->
  <line x1="170" y1="260" x2="170" y2="290" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Node allocation box -->
  <rect x="100" y="290" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="307" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Node Allocation</text>
  <text x="170" y="321" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">slurmd: local execution</text>

  <!-- Arrow down -->
  <line x1="170" y1="330" x2="170" y2="360" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- GPU nodes (3 small boxes) -->
  <rect x="100" y="360" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="120" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <rect x="150" y="360" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>
  <rect x="200" y="360" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="220" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU</text>

  <!-- Guarantee annotation -->
  <rect x="90" y="410" width="160" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="170" y="422" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Guaranteed allocation or</text>
  <text x="170" y="433" text-anchor="middle" font-size="8" font-weight="400" fill="#555">job stays in queue</text>

  <!-- ===== RIGHT: Kubernetes ===== -->
  <text x="510" y="50" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Kubernetes (Declarative)</text>
  <text x="510" y="66" text-anchor="middle" font-size="9" font-weight="400" fill="#555">User declares desired state</text>

  <!-- User box -->
  <rect x="450" y="80" width="120" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="510" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#333">User</text>
  <text x="510" y="111" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">submits YAML spec</text>

  <!-- Arrow down -->
  <line x1="510" y1="120" x2="510" y2="150" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- API Server box -->
  <rect x="440" y="150" width="140" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="510" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#333">API Server</text>
  <text x="510" y="181" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">stores desired state in etcd</text>

  <!-- Arrow down -->
  <line x1="510" y1="190" x2="510" y2="220" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Controller box -->
  <rect x="430" y="220" width="160" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="510" y="237" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Controller</text>
  <text x="510" y="251" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">reconciles actual → desired</text>

  <!-- Arrow down -->
  <line x1="510" y1="260" x2="510" y2="290" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Pod scheduling box -->
  <rect x="440" y="290" width="140" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="510" y="307" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Pod Scheduling</text>
  <text x="510" y="321" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">kube-scheduler: placement</text>

  <!-- Reconciliation loop (orthogonal back up) -->
  <path d="M 580,375 L 610,375 L 610,170 L 580,170" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="620" y="275" text-anchor="start" font-size="8" font-weight="400" fill="#3d9e5a">reconcile</text>

  <!-- Arrow down to pods -->
  <line x1="510" y1="330" x2="510" y2="360" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Pod boxes (3) -->
  <rect x="440" y="360" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="460" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Pod</text>
  <rect x="490" y="360" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="510" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Pod</text>
  <rect x="540" y="360" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="560" y="378" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Pod</text>

  <!-- Eventually consistent annotation -->
  <rect x="430" y="410" width="160" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="510" y="422" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Eventually consistent;</text>
  <text x="510" y="433" text-anchor="middle" font-size="8" font-weight="400" fill="#555">continuous reconciliation loop</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="460" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Slurm provides strong consistency guarantees; Kubernetes provides availability through eventual consistency and self-healing.</text>
</svg>