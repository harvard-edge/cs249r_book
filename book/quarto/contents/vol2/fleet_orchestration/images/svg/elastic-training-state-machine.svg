<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Elastic Training State Machine</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Job transitions between states in response to resource availability and failures without full restart</text>

  <!-- ===== Central state: Training (blue) ===== -->
  <ellipse cx="340" cy="230" rx="80" ry="52" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="340" y="221" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Training</text>
  <text x="340" y="237" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">N workers active</text>
  <text x="340" y="251" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">forward + backward pass</text>

  <!-- Self-loop on Training (steady state) -->
  <path d="M380,180 Q440,130 400,178" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="425" y="146.5" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">steady state</text>
  <text x="425" y="164.5" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">AllReduce each step</text>

  <!-- ===== Scale Up state (top-left, green) ===== -->
  <ellipse cx="145" cy="120" rx="80" ry="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="145" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Scale Up</text>
  <text x="145" y="128" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">add workers</text>
  <text x="145" y="141" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">redistribute data shards</text>

  <!-- Training → Scale Up -->
  <path d="M278,198 Q220,165 220,140" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="228" y="183" text-anchor="middle" font-size="7.5" font-weight="400" fill="#3d9e5a" transform="rotate(-30,228,183)">idle GPUs available</text>

  <!-- Scale Up → Training -->
  <path d="M220,125 Q270,150 265,190" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>
  <text x="212" y="158.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#4a90c4" transform="rotate(-20,212,160)">workers joined</text>
  <text x="215" y="173.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#4a90c4" transform="rotate(-20,215,172)">params broadcast</text>

  <!-- ===== Scale Down state (top-right, orange) ===== -->
  <ellipse cx="535" cy="120" rx="80" ry="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="535" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Scale Down</text>
  <text x="535" y="128" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">release workers</text>
  <text x="535" y="141" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">rebalance shards</text>

  <!-- Training → Scale Down -->
  <path d="M404,196 Q455,162 458,140" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="445" y="183.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#c87b2a" transform="rotate(25,445,185)">higher priority</text>
  <text x="447" y="198.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#c87b2a" transform="rotate(25,447,197)">job arrives</text>

  <!-- Scale Down → Training -->
  <path d="M458,130 Q415,150 415,188" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>
  <text x="462" y="153.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#4a90c4" transform="rotate(20,462,158)">shards rebalanced</text>
  <text x="464" y="171.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#4a90c4" transform="rotate(20,464,170)">LR recalibrated</text>

  <!-- ===== Worker Replace state (bottom, red-pink) ===== -->
  <ellipse cx="340" cy="375" rx="80" ry="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.8"/>
  <text x="340" y="366" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Worker Replace</text>
  <text x="340" y="381" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">substitute failed node</text>
  <text x="340" y="394" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">atomic: remove + add</text>

  <!-- Training → Worker Replace -->
  <path d="M320,282 Q310,335 318,332" fill="none" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="278" y="313.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#c44">node heartbeat</text>
  <text x="278" y="328.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#c44">missed / timeout</text>

  <!-- Worker Replace → Training -->
  <path d="M362,332 Q370,285 363,282" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>
  <text x="405" y="313.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#4a90c4">replacement ready</text>
  <text x="405" y="328.5" text-anchor="middle" font-size="7.5" font-weight="400" fill="#4a90c4">comm. group rebuilt</text>

  <!-- Scale Down → Worker Replace (edge case: preempted mid-transition) -->
  <path d="M535,165 Q480,280 420,340" fill="none" stroke="#c44" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.6" marker-end="url(#arrow-red)"/>
  <text x="500" y="280" text-anchor="middle" font-size="7.5" font-weight="400" fill="#999">spot preemption</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="446" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">All transitions preserve continuous training progress; the optimization loop never stops, only the parallel width changes.</text>
</svg>
