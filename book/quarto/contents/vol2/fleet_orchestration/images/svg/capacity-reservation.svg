<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Three-Tier Capacity Architecture</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Optimal mix balances cost, availability, and interruption tolerance across workload types</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis: GPU capacity label -->
  <text x="42" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#555" transform="rotate(-90,42,250)">GPU Capacity (allocation units)</text>

  <!-- X-axis baseline -->
  <line x1="70" y1="390" x2="620" y2="390" stroke="#bbb" stroke-width="1.2"/>
  <!-- Y-axis -->
  <line x1="70" y1="80" x2="70" y2="390" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis ticks -->
  <line x1="66" y1="390" x2="70" y2="390" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="393" text-anchor="end" font-size="8" fill="#555">0</text>
  <line x1="66" y1="312" x2="70" y2="312" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="315" text-anchor="end" font-size="8" fill="#555">25%</text>
  <line x1="66" y1="234" x2="70" y2="234" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="237" text-anchor="end" font-size="8" fill="#555">50%</text>
  <line x1="66" y1="156" x2="70" y2="156" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="159" text-anchor="end" font-size="8" fill="#555">75%</text>
  <line x1="66" y1="80" x2="70" y2="80" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="83" text-anchor="end" font-size="8" fill="#555">100%</text>

  <!-- ===== Tier 1: Reserved (blue, bottom, fills 0–60%) ===== -->
  <!-- 60% = top at y=390-(0.6*310)=204 -->
  <rect x="70" y="204" width="550" height="186" rx="2" fill="#cfe2f3" stroke="none"/>
  <!-- Label inside -->
  <text x="345" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Reserved Instances</text>
  <text x="345" y="301" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">1–3 year commitment · baseline load</text>
  <text x="345" y="315" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">30–60% discount vs. on-demand</text>

  <!-- ===== Tier 2: On-Demand (orange, middle, fills 60%–80%) ===== -->
  <!-- 80% = top at y=390-(0.8*310)=142 -->
  <!-- 60% = bottom at y=204 -->
  <rect x="70" y="142" width="550" height="62" rx="2" fill="#fdebd0" stroke="none"/>
  <text x="345" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">On-Demand</text>
  <text x="345" y="178" text-anchor="middle" font-size="9" font-weight="400" fill="#c87b2a">burst capacity · immediate availability · moderate $/hr</text>

  <!-- ===== Tier 3: Spot/Preemptible (red-pink, top, fills 80%–100%) ===== -->
  <!-- 100% = top at y=80 -->
  <!-- 80% = bottom at y=142 -->
  <rect x="70" y="80" width="550" height="62" rx="2" fill="#f9d6d5" stroke="none"/>
  <text x="345" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Spot / Preemptible</text>
  <text x="345" y="116" text-anchor="middle" font-size="9" font-weight="400" fill="#c44">opportunistic · lowest $/hr · interruptible</text>
  <text x="345" y="130" text-anchor="middle" font-size="9" font-weight="400" fill="#c44">60–90% savings · requires robust checkpointing</text>

  <!-- Border lines between tiers -->
  <line x1="70" y1="204" x2="620" y2="204" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="70" y1="142" x2="620" y2="142" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- ===== Demand curve (actual workload demand overlay) ===== -->
  <!-- Curve: starts low, peaks at ~88% (demand spike), stays moderate -->
  <path d="M70,320 C120,315 160,295 200,260 C240,225 270,200 300,195 C330,190 360,190 390,205 C420,220 450,235 480,225 C510,215 540,220 570,230 C595,238 610,240 620,240" fill="none" stroke="#a31f34" stroke-width="2.5" stroke-dasharray="none"/>

  <!-- Peak annotation -->
  <line x1="300" y1="195" x2="300" y2="80" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <rect x="248" y="81" width="104" height="28" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="300" y="93" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Peak Demand</text>
  <text x="300" y="105" text-anchor="middle" font-size="8" font-weight="400" fill="#555">dips into spot tier</text>

  <!-- Curve label -->
  <text x="140" y="306" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Workload</text>
  <text x="140" y="318" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Demand Curve</text>

  <!-- ===== Cost annotation pills on right side ===== -->
  <rect x="628" y="100" width="40" height="20" rx="12" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="648" y="114" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">$0.70</text>
  <rect x="628" y="158" width="40" height="20" rx="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="648" y="172" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">$2.00</text>
  <rect x="628" y="285" width="40" height="20" rx="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="648" y="299" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">$0.80</text>
  <text x="648" y="88" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">/GPU-hr</text>
  <text x="648" y="148" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">/GPU-hr</text>
  <text x="648" y="278" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">/GPU-hr</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Optimal mix: reserve 60% baseline, on-demand for SLA-critical bursts, spot for elastic training workers and batch workloads.</text>
</svg>