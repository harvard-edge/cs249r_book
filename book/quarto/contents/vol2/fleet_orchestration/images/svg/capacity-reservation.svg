<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540">
  <rect width="700" height="540" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="350" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Three-Tier Capacity Architecture</text>
  <text x="350" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Optimal mix balances cost, availability, and interruption tolerance across workload types</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis: GPU capacity label -->
  <text x="40" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#555" transform="rotate(-90,40,280)">GPU Capacity (allocation units)</text>

  <!-- X-axis baseline -->
  <line x1="80" y1="480" x2="630" y2="480" stroke="#bbb" stroke-width="1.2"/>
  <!-- Y-axis -->
  <line x1="80" y1="80" x2="80" y2="480" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis ticks -->
  <line x1="76" y1="480" x2="80" y2="480" stroke="#bbb" stroke-width="1"/>
  <text x="68" y="483" text-anchor="end" font-size="8" fill="#555">0</text>
  <line x1="76" y1="380" x2="80" y2="380" stroke="#bbb" stroke-width="1"/>
  <text x="68" y="383" text-anchor="end" font-size="8" fill="#555">25%</text>
  <line x1="76" y1="280" x2="80" y2="280" stroke="#bbb" stroke-width="1"/>
  <text x="68" y="283" text-anchor="end" font-size="8" fill="#555">50%</text>
  <line x1="76" y1="180" x2="80" y2="180" stroke="#bbb" stroke-width="1"/>
  <text x="68" y="183" text-anchor="end" font-size="8" fill="#555">75%</text>
  <line x1="76" y1="80" x2="80" y2="80" stroke="#bbb" stroke-width="1"/>
  <text x="68" y="83" text-anchor="end" font-size="8" fill="#555">100%</text>

  <!-- ===== Tier 1: Reserved (blue, bottom, fills 0–60%) ===== -->
  <!-- 60% = y=240 -->
  <rect x="80" y="240" width="550" height="240" fill="#cfe2f3" stroke="none"/>
  <text x="470" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Reserved Instances</text>
  <text x="470" y="360" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">1–3 year commitment · baseline load</text>
  <text x="470" y="374" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">30–60% discount vs. on-demand</text>

  <!-- ===== Tier 2: On-Demand (orange, middle, fills 60%–80%) ===== -->
  <!-- 80% = y=160 -->
  <rect x="80" y="160" width="550" height="80" fill="#fdebd0" stroke="none"/>
  <text x="470" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">On-Demand</text>
  <text x="470" y="208" text-anchor="middle" font-size="9" font-weight="400" fill="#c87b2a">burst capacity · immediate availability · moderate $/hr</text>

  <!-- ===== Tier 3: Spot/Preemptible (red-pink, top, fills 80%–100%) ===== -->
  <!-- 100% = y=80 -->
  <rect x="80" y="80" width="550" height="80" fill="#f9d6d5" stroke="none"/>
  <text x="470" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Spot / Preemptible</text>
  <text x="470" y="120" text-anchor="middle" font-size="9" font-weight="400" fill="#c44">opportunistic · lowest $/hr · interruptible</text>
  <text x="470" y="134" text-anchor="middle" font-size="9" font-weight="400" fill="#c44">60–90% savings · requires robust checkpointing</text>

  <!-- Border lines between tiers -->
  <line x1="80" y1="240" x2="630" y2="240" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="80" y1="160" x2="630" y2="160" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- ===== Demand curve (actual workload demand overlay) ===== -->
  <path d="M 80,380 C 140,380 180,140 230,140 C 280,140 330,300 410,300 C 490,300 560,320 630,320" fill="none" stroke="#a31f34" stroke-width="2.5" stroke-dasharray="none"/>

  <!-- Peak annotation -->
  <line x1="230" y1="140" x2="230" y2="120" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <rect x="180" y="90" width="100" height="30" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="230" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Peak Demand</text>
  <text x="230" y="115" text-anchor="middle" font-size="8" font-weight="400" fill="#555">dips into spot tier</text>

  <!-- Curve label -->
  <text x="140" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Workload</text>
  <text x="140" y="422" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Demand Curve</text>

  <!-- ===== Cost annotation pills on right side ===== -->
  <text x="660" y="104" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">/GPU-hr</text>
  <rect x="640" y="110" width="40" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="660" y="124" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">$0.70</text>
  
  <text x="660" y="184" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">/GPU-hr</text>
  <rect x="640" y="190" width="40" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="660" y="204" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">$2.00</text>
  
  <text x="660" y="344" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">/GPU-hr</text>
  <rect x="640" y="350" width="40" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="660" y="364" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">$0.80</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="350" y="515" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Optimal mix: reserve 60% baseline, on-demand for SLA-critical bursts, spot for elastic training workers and batch workloads.</text>
</svg>