<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Bandwidth Hierarchy</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Each boundary crossing incurs an order-of-magnitude bandwidth reduction</text>

  <!-- ===== Outermost: Pod/Fabric (orange) ===== -->
  <rect x="40" y="62" width="600" height="356" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Pod / Fabric</text>
  <!-- Bandwidth badge -->
  <rect x="220" y="89" width="240" height="20" fill="#c87b2a"/>
  <text x="340" y="103" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Cross-rack: ~25 GB/s effective (2:1 oversubscription)</text>

  <!-- ===== Middle: Rack (green) ===== -->
  <rect x="70" y="115" width="540" height="270" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="340" y="133" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Rack / Leaf Switch Domain</text>
  <!-- Bandwidth badge -->
  <rect x="210" y="139" width="260" height="20" fill="#3d9e5a"/>
  <text x="340" y="153" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">InfiniBand NDR: 50 GB/s per link (400 Gbps)</text>

  <!-- ===== Inner: Node (blue) ===== -->
  <rect x="100" y="168" width="480" height="190" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="340" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Node (Single Server)</text>
  <!-- Bandwidth badge -->
  <rect x="210" y="191" width="260" height="20" fill="#4a90c4"/>
  <text x="340" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">NVLink: 900 GB/s bidirectional (H100 NVSwitch)</text>

  <!-- ===== GPU boxes (8 GPUs inside node) ===== -->
  <!-- Row of 8 GPUs -->
  <rect x="118" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="145" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="145" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="182" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="209" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="209" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="246" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="273" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="273" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="310" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="340" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="340" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="374" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="401" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="401" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="438" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="465" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="465" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="502" y="224" width="54" height="44" fill="#a31f34"/>
  <text x="529" y="243" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="529" y="256" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <!-- NVSwitch in center below GPUs -->
  <rect x="252" y="283" width="176" height="32" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="296" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NVSwitch</text>
  <text x="340" y="309" text-anchor="middle" font-size="8" font-weight="400" fill="#555">all-to-all 900 GB/s fabric</text>

  <!-- NVLink connections from GPUs to NVSwitch (simplified) -->
  <line x1="145" y1="268" x2="252" y2="295" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="209" y1="268" x2="280" y2="283" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="273" y1="268" x2="310" y2="283" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="337" y1="268" x2="340" y2="283" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="401" y1="268" x2="370" y2="283" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="465" y1="268" x2="400" y2="283" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>
  <line x1="529" y1="268" x2="428" y2="295" stroke="#4a90c4" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== Bandwidth reduction annotation (right side) ===== -->
  <text x="624" y="115" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Pod</text>
  <text x="624" y="127" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">25 GB/s</text>
  <text x="624" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Rack</text>
  <text x="624" y="157" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">50 GB/s</text>
  <text x="624" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Node</text>
  <text x="624" y="187" text-anchor="middle" font-size="8.5" font-weight="400" fill="#4a90c4">900 GB/s</text>

  <!-- Reduction arrows -->
  <line x1="624" y1="193" x2="624" y2="380" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="660" y="260" text-anchor="middle" font-size="8" font-weight="400" fill="#a31f34" transform="rotate(90,660,260)">18× reduction</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Topology-aware scheduling minimizes boundary crossings to preserve bandwidth for communication-intensive workloads.</text>
</svg>