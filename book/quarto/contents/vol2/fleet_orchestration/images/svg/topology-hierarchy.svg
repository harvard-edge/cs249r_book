<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="760" height="480" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="380" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Bandwidth Hierarchy</text>
  <text x="380" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Each boundary crossing incurs an order-of-magnitude bandwidth reduction</text>

  <!-- ===== Outermost: Pod/Fabric (orange) ===== -->
  <rect x="40" y="60" width="680" height="380" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="380" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Pod / Fabric</text>
  <!-- Bandwidth badge -->
  <rect x="260" y="90" width="240" height="20" rx="4" fill="#c87b2a"/>
  <text x="380" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Cross-rack: ~25 GB/s effective (2:1 oversubscription)</text>

  <!-- ===== Middle: Rack (green) ===== -->
  <rect x="100" y="130" width="560" height="290" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="380" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Rack / Leaf Switch Domain</text>
  <!-- Bandwidth badge -->
  <rect x="250" y="160" width="260" height="20" rx="4" fill="#3d9e5a"/>
  <text x="380" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">InfiniBand NDR: 50 GB/s per link (400 Gbps)</text>

  <!-- ===== Inner: Node (blue) ===== -->
  <rect x="160" y="200" width="440" height="200" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="380" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Node (Single Server)</text>
  <!-- Bandwidth badge -->
  <rect x="250" y="230" width="260" height="20" rx="4" fill="#4a90c4"/>
  <text x="380" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">NVLink: 900 GB/s bidirectional (H100 NVSwitch)</text>

  <!-- ===== GPU boxes (7 GPUs inside node, representing 8 logically) ===== -->
  <rect x="180" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="200" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="200" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="240" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="260" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="260" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="300" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="320" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="320" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="360" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="380" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="380" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="420" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="440" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="440" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="480" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="500" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="500" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="540" y="270" width="40" height="50" rx="4" fill="#a31f34"/>
  <text x="560" y="290" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="560" y="305" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <!-- NVSwitch in center below GPUs -->
  <rect x="180" y="340" width="400" height="40" rx="4" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="356" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NVSwitch</text>
  <text x="380" y="368" text-anchor="middle" font-size="8" font-weight="400" fill="#555">all-to-all 900 GB/s fabric</text>

  <!-- NVLink connections from GPUs to NVSwitch -->
  <line x1="200" y1="320" x2="200" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="260" y1="320" x2="260" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="320" y1="320" x2="320" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="380" y1="320" x2="380" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="440" y1="320" x2="440" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="500" y1="320" x2="500" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="560" y1="320" x2="560" y2="340" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>

  <!-- ===== Bandwidth reduction annotation (right side) ===== -->
  <text x="690" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Pod</text>
  <text x="690" y="105" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">25 GB/s</text>
  
  <text x="690" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Rack</text>
  <text x="690" y="175" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">50 GB/s</text>
  
  <text x="690" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Node</text>
  <text x="690" y="245" text-anchor="middle" font-size="8.5" font-weight="400" fill="#4a90c4">900 GB/s</text>

  <!-- Reduction arrows -->
  <line x1="690" y1="260" x2="690" y2="400" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="705" y="330" text-anchor="middle" font-size="8" font-weight="400" fill="#a31f34" transform="rotate(90,705,330)">18× reduction</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="380" y="465" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Topology-aware scheduling minimizes boundary crossings to preserve bandwidth for communication-intensive workloads.</text>
</svg>