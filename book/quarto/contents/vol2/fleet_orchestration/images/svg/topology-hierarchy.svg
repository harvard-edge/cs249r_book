<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640">
  <rect width="760" height="640" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="380" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Bandwidth Hierarchy</text>
  <text x="380" y="50" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Each boundary crossing incurs an order-of-magnitude bandwidth reduction</text>

  <!-- ===== Outermost: Pod/Fabric (orange) ===== -->
  <rect x="40" y="70" width="680" height="500" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="380" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Pod / Fabric</text>
  <!-- Bandwidth badge -->
  <rect x="220" y="120" width="320" height="30" fill="#c87b2a"/>
  <text x="380" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Cross-rack: ~25 GB/s effective (2:1 oversubscription)</text>

  <!-- ===== Middle: Rack (green) ===== -->
  <rect x="100" y="180" width="560" height="370" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="380" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Rack / Leaf Switch Domain</text>
  <!-- Bandwidth badge -->
  <rect x="220" y="230" width="320" height="30" fill="#3d9e5a"/>
  <text x="380" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">InfiniBand NDR: 50 GB/s per link (400 Gbps)</text>

  <!-- ===== Inner: Node (blue) ===== -->
  <rect x="130" y="290" width="500" height="240" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="380" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Node (Single Server)</text>
  <!-- Bandwidth badge -->
  <rect x="220" y="340" width="320" height="30" fill="#4a90c4"/>
  <text x="380" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">NVLink: 900 GB/s bidirectional (H100 NVSwitch)</text>

  <!-- ===== GPU boxes (8 GPUs inside node) ===== -->
  <rect x="150" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="170" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="170" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="210" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="230" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="230" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="270" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="290" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="290" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="330" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="350" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="350" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="390" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="410" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="410" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="450" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="470" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="470" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="510" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="530" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="530" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <rect x="570" y="400" width="40" height="50" fill="#a31f34"/>
  <text x="590" y="420" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">GPU</text>
  <text x="590" y="440" text-anchor="middle" font-size="7.5" font-weight="400" fill="#fff">80 GB</text>

  <!-- NVSwitch in center below GPUs -->
  <rect x="150" y="470" width="460" height="40" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="380" y="490" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NVSwitch</text>
  <text x="380" y="500" text-anchor="middle" font-size="8" font-weight="400" fill="#555">all-to-all 900 GB/s fabric</text>

  <!-- NVLink connections from GPUs to NVSwitch -->
  <line x1="170" y1="450" x2="170" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="450" x2="230" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="290" y1="450" x2="290" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="350" y1="450" x2="350" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="410" y1="450" x2="410" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="470" y1="450" x2="470" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="530" y1="450" x2="530" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <line x1="590" y1="450" x2="590" y2="470" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>

  <!-- ===== Bandwidth reduction annotation (right side) ===== -->
  <text x="690" y="120" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Pod</text>
  <text x="690" y="140" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">25 GB/s</text>
  
  <text x="690" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Rack</text>
  <text x="690" y="250" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">50 GB/s</text>
  
  <text x="690" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Node</text>
  <text x="690" y="360" text-anchor="middle" font-size="8.5" font-weight="400" fill="#4a90c4">900 GB/s</text>

  <!-- Reduction arrows -->
  <line x1="690" y1="380" x2="690" y2="520" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="710" y="450" text-anchor="middle" font-size="8" font-weight="400" fill="#a31f34" transform="rotate(90,710,450)">18× reduction</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="380" y="610" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Topology-aware scheduling minimizes boundary crossings to preserve bandwidth for communication-intensive workloads.</text>
</svg>