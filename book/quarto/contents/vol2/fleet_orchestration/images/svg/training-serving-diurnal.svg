<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Diurnal Resource Migration</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Training and serving workloads naturally anti-correlate over a 24-hour cycle, enabling GPU sharing</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis label -->
  <text x="28" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#555" transform="rotate(-90,28,250)">GPU Allocation (% of fleet)</text>

  <!-- X-axis -->
  <line x1="70" y1="390" x2="625" y2="390" stroke="#bbb" stroke-width="1.2"/>
  <!-- Y-axis -->
  <line x1="70" y1="70" x2="70" y2="390" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis ticks -->
  <line x1="66" y1="390" x2="70" y2="390" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="393" text-anchor="end" font-size="8" fill="#555">0%</text>
  <line x1="66" y1="310" x2="70" y2="310" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="313" text-anchor="end" font-size="8" fill="#555">25%</text>
  <line x1="66" y1="230" x2="70" y2="230" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="233" text-anchor="end" font-size="8" fill="#555">50%</text>
  <line x1="66" y1="150" x2="70" y2="150" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="153" text-anchor="end" font-size="8" fill="#555">75%</text>
  <line x1="66" y1="70" x2="70" y2="70" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="73" text-anchor="end" font-size="8" fill="#555">100%</text>

  <!-- X-axis ticks -->
  <line x1="116" y1="388" x2="116" y2="392" stroke="#bbb" stroke-width="1"/><text x="116" y="402" text-anchor="middle" font-size="7.5" fill="#555">2</text>
  <line x1="162" y1="388" x2="162" y2="392" stroke="#bbb" stroke-width="1"/><text x="162" y="402" text-anchor="middle" font-size="7.5" fill="#555">4</text>
  <line x1="209" y1="388" x2="209" y2="392" stroke="#bbb" stroke-width="1"/><text x="209" y="402" text-anchor="middle" font-size="7.5" fill="#555">6</text>
  <line x1="255" y1="388" x2="255" y2="392" stroke="#bbb" stroke-width="1"/><text x="255" y="402" text-anchor="middle" font-size="7.5" fill="#555">8</text>
  <line x1="301" y1="388" x2="301" y2="392" stroke="#bbb" stroke-width="1"/><text x="301" y="402" text-anchor="middle" font-size="7.5" fill="#555">10</text>
  <line x1="347" y1="388" x2="347" y2="392" stroke="#bbb" stroke-width="1"/><text x="347" y="402" text-anchor="middle" font-size="7.5" fill="#555">12</text>
  <line x1="393" y1="388" x2="393" y2="392" stroke="#bbb" stroke-width="1"/><text x="393" y="402" text-anchor="middle" font-size="7.5" fill="#555">14</text>
  <line x1="440" y1="388" x2="440" y2="392" stroke="#bbb" stroke-width="1"/><text x="440" y="402" text-anchor="middle" font-size="7.5" fill="#555">16</text>
  <line x1="486" y1="388" x2="486" y2="392" stroke="#bbb" stroke-width="1"/><text x="486" y="402" text-anchor="middle" font-size="7.5" fill="#555">18</text>
  <line x1="532" y1="388" x2="532" y2="392" stroke="#bbb" stroke-width="1"/><text x="532" y="402" text-anchor="middle" font-size="7.5" fill="#555">20</text>
  <line x1="578" y1="388" x2="578" y2="392" stroke="#bbb" stroke-width="1"/><text x="578" y="402" text-anchor="middle" font-size="7.5" fill="#555">22</text>
  <line x1="625" y1="388" x2="625" y2="392" stroke="#bbb" stroke-width="1"/><text x="625" y="402" text-anchor="middle" font-size="7.5" fill="#555">24</text>
  <text x="70" y="402" text-anchor="middle" font-size="7.5" fill="#555">0</text>
  <text x="347" y="415" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Hour of Day</text>

  <!-- ===== Training and Serving filled areas ===== -->
  <!-- Serving area (green, 15% at night, 85% at day) -->
  <polygon points="70,342 255,342 301,118 532,118 578,342 625,342 625,390 70,390" fill="#d4edda" stroke="none" opacity="0.85"/>

  <!-- Training area (blue, 85% at night, 15% at day) -->
  <polygon points="70,118 255,118 301,342 532,342 578,118 625,118 625,390 70,390" fill="#cfe2f3" stroke="none" opacity="0.85"/>

  <!-- Area outlines -->
  <polyline points="70,342 255,342 301,118 532,118 578,342 625,342" fill="none" stroke="#3d9e5a" stroke-width="2"/>
  <polyline points="70,118 255,118 301,342 532,342 578,118 625,118" fill="none" stroke="#4a90c4" stroke-width="2"/>

  <!-- ===== Crossover vertical markers (8am and 8pm) ===== -->
  <!-- 8am = 8h = x=255 -->
  <line x1="255" y1="70" x2="255" y2="390" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="213" y="72" width="84" height="20" fill="#fff" stroke="#a31f34" stroke-width="1" rx="4"/>
  <text x="255" y="86" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Crossover ~8am</text>

  <!-- 8pm = 20h = x=532 -->
  <line x1="532" y1="70" x2="532" y2="390" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="490" y="72" width="84" height="20" fill="#fff" stroke="#a31f34" stroke-width="1" rx="4"/>
  <text x="532" y="86" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Crossover ~8pm</text>

  <!-- ===== "GPU migration window" annotation ===== -->
  <rect x="310" y="207" width="84" height="46" fill="#fff" stroke="#a31f34" stroke-width="1.2" rx="4"/>
  <text x="352" y="221" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">GPU migration</text>
  <text x="352" y="233" text-anchor="middle" font-size="7.5" font-weight="700" fill="#a31f34">window</text>
  <text x="352" y="245" text-anchor="middle" font-size="7.5" font-weight="400" fill="#555">5–20 min switch</text>

  <!-- Arrow line to crossover slope midpoint -->
  <line x1="310" y1="230" x2="278" y2="230" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Area labels ===== -->
  <!-- Training label (night time) -->
  <text x="163" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Training</text>
  <text x="163" y="210" text-anchor="middle" font-size="8.5" font-weight="400" fill="#4a90c4">dominant at night</text>
  <text x="163" y="223" text-anchor="middle" font-size="8.5" font-weight="400" fill="#4a90c4">~85% of fleet</text>

  <!-- Serving label (daytime) -->
  <text x="440" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Serving</text>
  <text x="440" y="195" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">dominant during day</text>
  <text x="440" y="208" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">~85% of fleet</text>

  <!-- Night serving label (small at night) -->
  <text x="163" y="368" text-anchor="middle" font-size="8.5" font-weight="400" fill="#3d9e5a">Serving ~15%</text>

  <!-- Day training label (small at day) -->
  <text x="440" y="368" text-anchor="middle" font-size="8.5" font-weight="400" fill="#4a90c4">Training ~15%</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Dynamic sharing recovers ~13% additional fleet utilization annually vs. static training/serving partitioning.</text>
</svg>