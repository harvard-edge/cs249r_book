<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="920" height="480" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="460" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Diurnal Resource Migration</text>
  <text x="460" y="50" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Training and serving workloads naturally anti-correlate over a 24-hour cycle, enabling GPU sharing</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis label -->
  <text x="40" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#555" transform="rotate(-90,40,250)">GPU Allocation (% of fleet)</text>

  <!-- X-axis -->
  <line x1="100" y1="390" x2="820" y2="390" stroke="#bbb" stroke-width="1.2"/>
  <!-- Y-axis -->
  <line x1="100" y1="110" x2="100" y2="390" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis ticks -->
  <line x1="90" y1="390" x2="100" y2="390" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="394" text-anchor="end" font-size="8" fill="#555">0%</text>
  
  <line x1="90" y1="320" x2="100" y2="320" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="324" text-anchor="end" font-size="8" fill="#555">25%</text>
  
  <line x1="90" y1="250" x2="100" y2="250" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="254" text-anchor="end" font-size="8" fill="#555">50%</text>
  
  <line x1="90" y1="180" x2="100" y2="180" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="184" text-anchor="end" font-size="8" fill="#555">75%</text>
  
  <line x1="90" y1="110" x2="100" y2="110" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="114" text-anchor="end" font-size="8" fill="#555">100%</text>

  <!-- X-axis ticks -->
  <line x1="100" y1="390" x2="100" y2="400" stroke="#bbb" stroke-width="1"/><text x="100" y="414" text-anchor="middle" font-size="8" fill="#555">0</text>
  <line x1="160" y1="390" x2="160" y2="400" stroke="#bbb" stroke-width="1"/><text x="160" y="414" text-anchor="middle" font-size="8" fill="#555">2</text>
  <line x1="220" y1="390" x2="220" y2="400" stroke="#bbb" stroke-width="1"/><text x="220" y="414" text-anchor="middle" font-size="8" fill="#555">4</text>
  <line x1="280" y1="390" x2="280" y2="400" stroke="#bbb" stroke-width="1"/><text x="280" y="414" text-anchor="middle" font-size="8" fill="#555">6</text>
  <line x1="340" y1="390" x2="340" y2="400" stroke="#bbb" stroke-width="1"/><text x="340" y="414" text-anchor="middle" font-size="8" fill="#555">8</text>
  <line x1="400" y1="390" x2="400" y2="400" stroke="#bbb" stroke-width="1"/><text x="400" y="414" text-anchor="middle" font-size="8" fill="#555">10</text>
  <line x1="460" y1="390" x2="460" y2="400" stroke="#bbb" stroke-width="1"/><text x="460" y="414" text-anchor="middle" font-size="8" fill="#555">12</text>
  <line x1="520" y1="390" x2="520" y2="400" stroke="#bbb" stroke-width="1"/><text x="520" y="414" text-anchor="middle" font-size="8" fill="#555">14</text>
  <line x1="580" y1="390" x2="580" y2="400" stroke="#bbb" stroke-width="1"/><text x="580" y="414" text-anchor="middle" font-size="8" fill="#555">16</text>
  <line x1="640" y1="390" x2="640" y2="400" stroke="#bbb" stroke-width="1"/><text x="640" y="414" text-anchor="middle" font-size="8" fill="#555">18</text>
  <line x1="700" y1="390" x2="700" y2="400" stroke="#bbb" stroke-width="1"/><text x="700" y="414" text-anchor="middle" font-size="8" fill="#555">20</text>
  <line x1="760" y1="390" x2="760" y2="400" stroke="#bbb" stroke-width="1"/><text x="760" y="414" text-anchor="middle" font-size="8" fill="#555">22</text>
  <line x1="820" y1="390" x2="820" y2="400" stroke="#bbb" stroke-width="1"/><text x="820" y="414" text-anchor="middle" font-size="8" fill="#555">24</text>
  
  <text x="460" y="434" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Hour of Day</text>

  <!-- ===== Training and Serving filled areas ===== -->
  <!-- Serving area (green, 15% at night, 85% at day) -->
  <polygon points="100,350 340,350 400,150 700,150 760,350 820,350 820,390 100,390" fill="#d4edda" stroke="none" opacity="0.85"/>

  <!-- Training area (blue, 85% at night, 15% at day) -->
  <polygon points="100,150 340,150 400,350 700,350 760,150 820,150 820,390 100,390" fill="#cfe2f3" stroke="none" opacity="0.85"/>

  <!-- Area outlines -->
  <polyline points="100,350 340,350 400,150 700,150 760,350 820,350" fill="none" stroke="#3d9e5a" stroke-width="2"/>
  <polyline points="100,150 340,150 400,350 700,350 760,150 820,150" fill="none" stroke="#4a90c4" stroke-width="2"/>

  <!-- ===== Crossover vertical markers (8am and 8pm) ===== -->
  <!-- 8am = 8h = x=340 -->
  <line x1="340" y1="90" x2="340" y2="390" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="290" y="70" width="100" height="20" fill="#fff" stroke="#a31f34" stroke-width="1" rx="4"/>
  <text x="340" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Crossover ~8am</text>

  <!-- 8pm = 20h = x=700 -->
  <line x1="700" y1="90" x2="700" y2="390" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="650" y="70" width="100" height="20" fill="#fff" stroke="#a31f34" stroke-width="1" rx="4"/>
  <text x="700" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Crossover ~8pm</text>

  <!-- ===== "GPU migration window" annotation ===== -->
  <rect x="410" y="220" width="100" height="50" fill="#fff" stroke="#a31f34" stroke-width="1.2" rx="4"/>
  <text x="460" y="236" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">GPU migration</text>
  <text x="460" y="248" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">window</text>
  <text x="460" y="260" text-anchor="middle" font-size="9" font-weight="400" fill="#555">5–20 min switch</text>

  <!-- Arrow line to crossover slope midpoint (x=370, y=250) -->
  <line x1="410" y1="250" x2="370" y2="250" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ===== Area labels ===== -->
  <!-- Training label (night time) -->
  <text x="220" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Training</text>
  <text x="220" y="274" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">dominant at night</text>
  <text x="220" y="288" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">~85% of fleet</text>

  <!-- Serving label (daytime) -->
  <text x="580" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Serving</text>
  <text x="580" y="274" text-anchor="middle" font-size="9" font-weight="400" fill="#3d9e5a">dominant during day</text>
  <text x="580" y="288" text-anchor="middle" font-size="9" font-weight="400" fill="#3d9e5a">~85% of fleet</text>

  <!-- Night serving label (small at night) -->
  <text x="220" y="374" text-anchor="middle" font-size="9" font-weight="400" fill="#3d9e5a">Serving ~15%</text>

  <!-- Day training label (small at day) -->
  <text x="580" y="374" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">Training ~15%</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="460" y="460" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Dynamic sharing recovers ~13% additional fleet utilization annually vs. static training/serving partitioning.</text>
</svg>