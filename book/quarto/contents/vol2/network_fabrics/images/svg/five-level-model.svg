<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Five-Level Network Model for ML Training</text>

  <!-- ===== Level 5: Application/Collective Layer (orange) ===== -->
  <rect x="60" y="54" width="560" height="68" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="80" y="76" font-size="11" font-weight="700" fill="#c87b2a">Level 5 — Application / Collective Layer</text>
  <text x="80" y="94" font-size="9.5" font-weight="700" fill="#333">NCCL · Gloo · MPI</text>
  <text x="80" y="110" font-size="9" fill="#555">Ring-AllReduce · AllGather · AllToAll · collective algorithm selection</text>
  <!-- Badge -->
  <rect x="558" y="66" width="44" height="18" rx="9" fill="#a31f34"/>
  <text x="580" y="79" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">L5</text>

  <!-- ===== Level 4: Transport Layer (green) ===== -->
  <rect x="60" y="134" width="560" height="68" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="80" y="156" font-size="11" font-weight="700" fill="#3d9e5a">Level 4 — Transport Layer</text>
  <text x="80" y="174" font-size="9.5" font-weight="700" fill="#333">RDMA · GPUDirect · α-β Model</text>
  <text x="80" y="190" font-size="9" fill="#555">InfiniBand Verbs · RoCEv2 · zero-copy DMA · Go-Back-N retransmission</text>
  <!-- Badge -->
  <rect x="558" y="146" width="44" height="18" rx="9" fill="#a31f34"/>
  <text x="580" y="159" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">L4</text>

  <!-- ===== Level 3: Network Layer (blue) ===== -->
  <rect x="60" y="214" width="560" height="68" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="80" y="236" font-size="11" font-weight="700" fill="#4a90c4">Level 3 — Network Layer</text>
  <text x="80" y="254" font-size="9.5" font-weight="700" fill="#333">IP Routing · Fat-Tree · Rail-Optimized · Dragonfly</text>
  <text x="80" y="270" font-size="9" fill="#555">Bisection bandwidth · hop count · ECMP · adaptive routing · topology selection</text>
  <!-- Badge -->
  <rect x="558" y="226" width="44" height="18" rx="9" fill="#a31f34"/>
  <text x="580" y="239" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">L3</text>

  <!-- ===== Level 2: Link Layer (neutral) ===== -->
  <rect x="60" y="294" width="560" height="68" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="80" y="316" font-size="11" font-weight="700" fill="#555">Level 2 — Link Layer</text>
  <text x="80" y="334" font-size="9.5" font-weight="700" fill="#333">Ethernet · InfiniBand Link · Priority Flow Control (PFC)</text>
  <text x="80" y="350" font-size="9" fill="#555">Credit-based flow control · DCQCN · HPCC · lossless delivery guarantee</text>
  <!-- Badge -->
  <rect x="558" y="306" width="44" height="18" rx="9" fill="#a31f34"/>
  <text x="580" y="319" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">L2</text>

  <!-- ===== Level 1: Physical Layer (neutral) ===== -->
  <rect x="60" y="374" width="560" height="68" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="80" y="396" font-size="11" font-weight="700" fill="#555">Level 1 — Physical Layer</text>
  <text x="80" y="414" font-size="9.5" font-weight="700" fill="#333">PAM4 / NRZ Signaling · SerDes · DAC · AOC · Pluggable Optics</text>
  <text x="80" y="430" font-size="9" fill="#555">FEC (100–200 ns / hop) · link budget · cable reach · signal-to-noise</text>
  <!-- Badge -->
  <rect x="558" y="386" width="44" height="18" rx="9" fill="#a31f34"/>
  <text x="580" y="399" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">L1</text>

  <!-- Vertical direction arrow -->
  <line x1="30" y1="420" x2="30" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="22" y="260" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90, 22, 260)">Abstraction increases →</text>

  <!-- Bottom footnote -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Levels 1–2 address physical constraints; Levels 3–5 address logical organization of collective communication.</text>
</svg>
