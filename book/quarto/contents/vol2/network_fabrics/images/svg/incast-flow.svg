<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Incast Problem in Distributed Training</text>
  <text x="340" y="48" text-anchor="middle" font-size="9.5" fill="#555">AllReduce synchronization creates a many-to-one traffic burst at switch ports</text>

  <!-- ===== CENTER SWITCH (orange, bottleneck) ===== -->
  <rect x="290" y="190" width="100" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="214" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Switch Port</text>
  <text x="340" y="229" text-anchor="middle" font-size="8.5" fill="#c87b2a">400 Gb/s capacity</text>
  <text x="340" y="242" text-anchor="middle" font-size="8" fill="#c87b2a">32 MB buffer</text>

  <!-- Buffer overflow indicator -->
  <rect x="440" y="200" width="80" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="480" y="218" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">OVERFLOW!</text>
  <text x="480" y="230" text-anchor="middle" font-size="8" fill="#a31f34">Buffer full</text>
  <line x1="390" y1="220" x2="440" y2="220" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ===== DATA FLOW ARROWS (Orthogonal Routing) ===== -->
  <g fill="none" stroke="#a31f34" stroke-width="1.5" stroke-linejoin="round" marker-end="url(#arrow-red)">
    <!-- Top row GPUs -->
    <path d="M 100 110 L 100 160 L 300 160 L 300 190"/>
    <path d="M 220 110 L 220 140 L 320 140 L 320 190"/>
    <path d="M 340 110 L 340 190"/>
    <path d="M 460 110 L 460 140 L 360 140 L 360 190"/>
    <path d="M 580 110 L 580 160 L 380 160 L 380 190"/>
    <!-- Left GPU -->
    <path d="M 140 220 L 290 220"/>
    <!-- Bottom row GPUs -->
    <path d="M 100 320 L 100 270 L 300 270 L 300 250"/>
    <path d="M 580 320 L 580 270 L 380 270 L 380 250"/>
  </g>

  <!-- ===== GPU SENDER NODES (blue, evenly distributed) ===== -->
  <!-- GPU 1 -->
  <rect x="60" y="70" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="88" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 1</text>
  <text x="100" y="100" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 2 -->
  <rect x="180" y="70" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="220" y="88" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 2</text>
  <text x="220" y="100" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 3 -->
  <rect x="300" y="70" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="88" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 3</text>
  <text x="340" y="100" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 4 -->
  <rect x="420" y="70" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="460" y="88" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 4</text>
  <text x="460" y="100" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 5 -->
  <rect x="540" y="70" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="580" y="88" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 5</text>
  <text x="580" y="100" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 6 (left) -->
  <rect x="60" y="200" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="218" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 6</text>
  <text x="100" y="230" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 7 (bottom-left) -->
  <rect x="60" y="320" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="338" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 7</text>
  <text x="100" y="350" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- GPU 8 (bottom-right) -->
  <rect x="540" y="320" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="580" y="338" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 8</text>
  <text x="580" y="350" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>

  <!-- "..." label for more GPUs -->
  <text x="340" y="340" text-anchor="middle" font-size="20" fill="#4a90c4" font-weight="700">· · ·</text>
  <text x="340" y="355" text-anchor="middle" font-size="8.5" fill="#555">248 more GPU nodes</text>

  <!-- ===== MATH ANNOTATION ===== -->
  <rect x="150" y="390" width="310" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="305" y="406" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">256 × 50 GB/s = 12.8 TB/s arriving</text>
  <text x="305" y="420" text-anchor="middle" font-size="9.5" fill="#a31f34">→ 400 Gb/s (50 GB/s) port capacity</text>

  <!-- Congestion ratio badge -->
  <rect x="470" y="390" width="60" height="40" fill="#a31f34"/>
  <text x="500" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">256×</text>
  <text x="500" y="422" text-anchor="middle" font-size="8" fill="#fff">overload</text>

  <!-- Bottom footnote -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Incast is deterministic in BSP training: every AllReduce step concentrates line-rate traffic from all senders onto aggregation switch ports.</text>
</svg>