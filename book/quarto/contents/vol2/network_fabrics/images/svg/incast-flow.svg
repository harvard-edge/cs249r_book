<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Incast Problem in Distributed Training</text>
  <text x="340" y="48" text-anchor="middle" font-size="9.5" fill="#555">AllReduce synchronization creates a many-to-one traffic burst at switch ports</text>

  <!-- ===== CENTER SWITCH (orange, bottleneck) ===== -->
  <rect x="290" y="190" width="100" height="64" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="340" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Switch Port</text>
  <text x="340" y="233" text-anchor="middle" font-size="8.5" fill="#c87b2a">400 Gb/s capacity</text>
  <text x="340" y="246" text-anchor="middle" font-size="8" fill="#c87b2a">32 MB buffer</text>

  <!-- Buffer overflow indicator -->
  <rect x="390" y="185" width="80" height="28" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="430" y="198" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">OVERFLOW!</text>
  <text x="430" y="210" text-anchor="middle" font-size="8" fill="#a31f34">Buffer full</text>
  <line x1="390" y1="199" x2="390" y2="218" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== GPU SENDER NODES (blue, fanned around the switch) ===== -->
  <!-- Position: fan of 8 GPU nodes pointing to the center switch -->

  <!-- GPU 1 (top-left) -->
  <rect x="60" y="68" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="84" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 1</text>
  <text x="100" y="96" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="140" y1="86" x2="290" y2="205" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 2 (top-center-left) -->
  <rect x="175" y="68" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="215" y="84" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 2</text>
  <text x="215" y="96" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="245" y1="104" x2="316" y2="190" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 3 (top-center) -->
  <rect x="300" y="68" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="84" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 3</text>
  <text x="340" y="96" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="340" y1="104" x2="340" y2="190" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 4 (top-center-right) -->
  <rect x="425" y="68" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="465" y="84" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 4</text>
  <text x="465" y="96" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="445" y1="104" x2="365" y2="190" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 5 (top-right) -->
  <rect x="540" y="68" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="580" y="84" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 5</text>
  <text x="580" y="96" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="540" y1="86" x2="390" y2="205" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 6 (left) -->
  <rect x="60" y="200" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="216" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 6</text>
  <text x="100" y="228" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="140" y1="218" x2="290" y2="222" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 7 (bottom-left) -->
  <rect x="60" y="320" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="336" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 7</text>
  <text x="100" y="348" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="140" y1="338" x2="290" y2="250" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- GPU 8 (bottom-right) -->
  <rect x="540" y="320" width="80" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="580" y="336" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">GPU Node 8</text>
  <text x="580" y="348" text-anchor="middle" font-size="7.5" fill="#4a90c4">50 GB/s</text>
  <line x1="540" y1="338" x2="390" y2="250" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- "..." label for more GPUs -->
  <text x="340" y="335" text-anchor="middle" font-size="20" fill="#4a90c4" font-weight="700">· · ·</text>
  <text x="340" y="358" text-anchor="middle" font-size="8.5" fill="#555">248 more GPU nodes</text>

  <!-- ===== MATH ANNOTATION ===== -->
  <rect x="182" y="388" width="318" height="42" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="341" y="406" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">256 × 50 GB/s = 12.8 TB/s arriving</text>
  <text x="341" y="422" text-anchor="middle" font-size="9.5" fill="#a31f34">→ 400 Gb/s (50 GB/s) port capacity</text>

  <!-- Congestion ratio badge -->
  <rect x="500" y="388" width="62" height="42" rx="4" fill="#a31f34"/>
  <text x="531" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">256×</text>
  <text x="531" y="424" text-anchor="middle" font-size="8" fill="#fff">overload</text>

  <!-- Bottom footnote -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Incast is deterministic in BSP training: every AllReduce step concentrates line-rate traffic from all senders onto aggregation switch ports.</text>
</svg>
