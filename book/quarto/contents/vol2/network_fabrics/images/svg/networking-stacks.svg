<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>

    <marker id="arrow-down" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-down-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
  </defs>

  <rect width="740" height="520" fill="#fff"/>

  <!-- ===== LEFT COLUMN: Traditional TCP/IP Stack ===== -->
  <text x="200" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Traditional TCP/IP</text>

  <!-- MPI Layer -->
  <rect x="70" y="50" width="260" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="200" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#333">MPI / NCCL</text>
  <text x="200" y="82" text-anchor="middle" font-size="10" fill="#555">Collective library</text>

  <!-- Arrow down -->
  <line x1="200" y1="90" x2="200" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Application -->
  <rect x="70" y="110" width="260" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Application</text>

  <!-- Arrow down -->
  <line x1="200" y1="150" x2="200" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Kernel boundary label -->
  <rect x="70" y="170" width="260" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="200" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">OS Kernel (context switch)</text>

  <!-- Arrow down -->
  <line x1="200" y1="190" x2="200" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Socket API -->
  <rect x="70" y="210" width="260" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Socket API</text>

  <!-- Arrow down -->
  <line x1="200" y1="250" x2="200" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- TCP/UDP Transport -->
  <rect x="70" y="270" width="260" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#333">TCP / UDP</text>

  <!-- Arrow down -->
  <line x1="200" y1="310" x2="200" y2="330" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- IP / Ethernet Network -->
  <rect x="70" y="330" width="260" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#333">IP / Ethernet</text>

  <!-- Arrow down -->
  <line x1="200" y1="370" x2="200" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- NIC / Physical -->
  <rect x="70" y="390" width="260" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="200" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#333">NIC / Physical</text>

  <!-- Latency label (Left) -->
  <rect x="90" y="450" width="220" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="200" y="464" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Latency: 10-20 us | CPU copies: 2-3x</text>

  <!-- Data path annotation (left side) -->
  <text x="40" y="270" font-size="10" fill="#c44" font-weight="700" text-anchor="middle" transform="rotate(-90, 40, 270)">Data: App -&gt; CPU DRAM -&gt; Kernel -&gt; NIC</text>

  <!-- ===== RIGHT COLUMN: RDMA / RoCE v2 Stack ===== -->
  <text x="540" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#3d9e5a">RDMA / RoCE v2</text>

  <!-- MPI Layer -->
  <rect x="410" y="50" width="260" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="540" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#333">MPI / NCCL</text>
  <text x="540" y="82" text-anchor="middle" font-size="10" fill="#555">Collective library</text>

  <!-- Arrow down -->
  <line x1="540" y1="90" x2="540" y2="110" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-down-green)"/>

  <!-- Application + Verbs API -->
  <rect x="410" y="110" width="260" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="540" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Application (Verbs API)</text>
  <text x="540" y="142" text-anchor="middle" font-size="10" fill="#3d9e5a">User-space, no syscall</text>

  <!-- KERNEL BYPASS: Dashed box showing bypassed kernel -->
  <rect x="410" y="170" width="260" height="200" rx="4" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="540" y="220" text-anchor="middle" font-size="11" fill="#666" font-weight="700">Kernel Bypassed</text>
  <text x="540" y="244" text-anchor="middle" font-size="10" fill="#666">(no socket, no TCP,</text>
  <text x="540" y="258" text-anchor="middle" font-size="10" fill="#666">no IP stack traversal)</text>

  <!-- Bypass arrow from app directly to NIC area (Orthogonal) -->
  <path d="M 670 130 L 700 130 L 700 410 L 670 410" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="710" y="270" font-size="10" fill="#3d9e5a" font-weight="700" text-anchor="middle" transform="rotate(90, 710, 270)">Kernel bypass</text>

  <!-- RDMA Transport (thin, inside bypass region) -->
  <rect x="430" y="310" width="220" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.5"/>
  <text x="540" y="335" text-anchor="middle" font-size="10" fill="#3d9e5a" font-weight="700">RDMA Transport (HW offload)</text>

  <!-- NIC / Physical (RDMA) -->
  <rect x="410" y="390" width="260" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="540" y="408" text-anchor="middle" font-size="12" font-weight="700" fill="#333">RDMA NIC (ConnectX)</text>
  <text x="540" y="422" text-anchor="middle" font-size="10" fill="#3d9e5a">GPUDirect: NIC reads GPU HBM directly</text>

  <!-- Latency label (Right) -->
  <rect x="430" y="450" width="220" height="20" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="540" y="464" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Latency: 1-3 us | Zero-copy: 0 CPU</text>

  <!-- Data path annotation (right side) -->
  <text x="390" y="270" font-size="10" fill="#3d9e5a" font-weight="700" text-anchor="middle" transform="rotate(-90, 390, 270)">Data: GPU HBM -&gt; NIC (direct)</text>

  <!-- ===== STRUCTURAL ANNOTATIONS ===== -->
  <!-- Center divider -->
  <line x1="370" y1="50" x2="370" y2="430" stroke="#e0e0e0" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Kernel boundary annotation -->
  <text x="370" y="166" text-anchor="middle" font-size="10" fill="#a31f34" font-weight="700">Kernel boundary</text>

  <!-- Comparison arrows / footer text -->
  <text x="370" y="490" text-anchor="middle" font-size="10" fill="#666" font-style="italic">RDMA eliminates kernel traversal, reducing latency by 5-10x and freeing CPU for computation.</text>

</svg>