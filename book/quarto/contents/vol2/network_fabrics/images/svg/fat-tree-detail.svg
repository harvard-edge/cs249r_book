<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Fat-Tree (Clos) Network: Three-Tier Topology</text>

  <!-- ===== TIER LABELS (left) ===== -->
  <text x="32" y="90" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Core</text>
  <text x="32" y="100" font-size="9" fill="#c87b2a" text-anchor="middle">Tier</text>
  <text x="32" y="210" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Leaf</text>
  <text x="32" y="220" font-size="9" fill="#3d9e5a" text-anchor="middle">Tier</text>
  <text x="32" y="345" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU</text>
  <text x="32" y="355" font-size="9" fill="#4a90c4" text-anchor="middle">Racks</text>

  <!-- ===== CORE SWITCHES (orange) ===== -->
  <rect x="168" y="55" width="64" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="73" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-1</text>

  <rect x="276" y="55" width="64" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="308" y="73" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-2</text>

  <rect x="384" y="55" width="64" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="416" y="73" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-3</text>

  <rect x="492" y="55" width="64" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="524" y="73" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-4</text>

  <!-- Core tier label annotation -->
  <text x="638" y="67" font-size="8.5" fill="#c87b2a" font-weight="700">Full</text>
  <text x="638" y="78" font-size="8.5" fill="#c87b2a" font-weight="700">bisection</text>
  <rect x="632" y="83" width="42" height="14" rx="2" fill="#a31f34"/>
  <text x="653" y="93" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">BW ✓</text>

  <!-- ===== LEAF SWITCHES (green) ===== -->
  <rect x="105" y="184" width="64" height="32" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="137" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-1</text>

  <rect x="219" y="184" width="64" height="32" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="251" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-2</text>

  <rect x="333" y="184" width="64" height="32" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="365" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-3</text>

  <rect x="447" y="184" width="64" height="32" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="479" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-4</text>

  <rect x="561" y="184" width="64" height="32" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="593" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-5</text>

  <!-- ===== CORE → LEAF LINKS ===== -->
  <!-- Core-1 to all leaves -->
  <line x1="200" y1="87" x2="137" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="200" y1="87" x2="251" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="200" y1="87" x2="365" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="200" y1="87" x2="479" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="200" y1="87" x2="593" y2="184" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Core-2 to all leaves -->
  <line x1="308" y1="87" x2="137" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="308" y1="87" x2="251" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="308" y1="87" x2="365" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="308" y1="87" x2="479" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="308" y1="87" x2="593" y2="184" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Core-3 to all leaves -->
  <line x1="416" y1="87" x2="137" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="416" y1="87" x2="251" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="416" y1="87" x2="365" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="416" y1="87" x2="479" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="416" y1="87" x2="593" y2="184" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Core-4 to all leaves -->
  <line x1="524" y1="87" x2="137" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="524" y1="87" x2="251" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="524" y1="87" x2="365" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="524" y1="87" x2="479" y2="184" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="524" y1="87" x2="593" y2="184" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- ===== GPU RACKS (blue) ===== -->
  <!-- Rack under Leaf-1 -->
  <rect x="80" y="310" width="116" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="138" y="328" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 1</text>
  <text x="138" y="342" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="138" y="356" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-2 -->
  <rect x="196" y="310" width="110" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="251" y="328" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 2</text>
  <text x="251" y="342" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="251" y="356" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-3 -->
  <rect x="313" y="310" width="104" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="365" y="328" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 3</text>
  <text x="365" y="342" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="365" y="356" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-4 -->
  <rect x="424" y="310" width="110" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="479" y="328" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 4</text>
  <text x="479" y="342" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="479" y="356" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-5 -->
  <rect x="540" y="310" width="110" height="56" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="595" y="328" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 5</text>
  <text x="595" y="342" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="595" y="356" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- ===== LEAF → RACK LINKS ===== -->
  <line x1="137.5" y1="216" x2="137.5" y2="310" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="251" y1="216" x2="251" y2="310" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="365" y1="216" x2="365" y2="310" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="479" y1="216" x2="479" y2="310" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="594" y1="216" x2="594" y2="310" stroke="#3d9e5a" stroke-width="1.5"/>

  <!-- ===== BISECTION CUT (red dashed) ===== -->
  <line x1="56" y1="150" x2="634" y2="150" stroke="#a31f34" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="640" y="146" font-size="8.5" font-weight="700" fill="#a31f34">Bisection</text>
  <text x="640" y="158" font-size="8.5" font-weight="700" fill="#a31f34">cut</text>

  <!-- ===== SUBSCRIPTION RATIO ANNOTATION ===== -->
  <rect x="56" y="248" width="200" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="156" y="264" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Subscription Ratio</text>
  <text x="156" y="278" text-anchor="middle" font-size="8.5" fill="#555">1:1 (non-blocking) = full bisection BW</text>

  <!-- ===== FULL BISECTION LABEL ===== -->
  <rect x="454" y="248" width="178" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="543" y="264" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Full Bisection BW</text>
  <text x="543" y="278" text-anchor="middle" font-size="8.5" fill="#555">5 × 50 GB/s = 250 GB/s</text>

  <!-- ===== SCALE ANNOTATION ===== -->
  <text x="340" y="394" text-anchor="middle" font-size="8.5" fill="#555">k=64 radix → k³/4 = 65,536 hosts (three-tier)</text>
  <text x="340" y="408" text-anchor="middle" font-size="8.5" fill="#555">Cost: ~2,048 switches · ~40,000 optical cables (at 4,096-GPU scale)</text>

  <!-- Bottom footnote -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">The bisection cut divides the cluster in half; its bandwidth sets the ceiling for all-to-all AllReduce performance.</text>
</svg>