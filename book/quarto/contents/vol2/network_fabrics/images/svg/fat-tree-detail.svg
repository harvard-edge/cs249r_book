<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Fat-Tree (Clos) Network: Three-Tier Topology</text>

  <!-- ===== TIER LABELS (left) ===== -->
  <text x="40" y="75" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Core</text>
  <text x="40" y="85" font-size="9" fill="#c87b2a" text-anchor="middle">Tier</text>
  <text x="40" y="195" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Leaf</text>
  <text x="40" y="205" font-size="9" fill="#3d9e5a" text-anchor="middle">Tier</text>
  <text x="40" y="345" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU</text>
  <text x="40" y="355" font-size="9" fill="#4a90c4" text-anchor="middle">Racks</text>

  <!-- ===== CORE SWITCHES (orange) ===== -->
  <rect x="160" y="60" width="60" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="190" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-1</text>

  <rect x="260" y="60" width="60" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="290" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-2</text>

  <rect x="360" y="60" width="60" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="390" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-3</text>

  <rect x="460" y="60" width="60" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="490" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Core-4</text>

  <!-- Core tier label annotation -->
  <text x="590" y="65" font-size="8.5" fill="#c87b2a" font-weight="700">Full</text>
  <text x="590" y="75" font-size="8.5" fill="#c87b2a" font-weight="700">bisection</text>
  <rect x="590" y="80" width="40" height="16" fill="#a31f34" rx="4"/>
  <text x="610" y="91" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">BW ✓</text>

  <!-- ===== LEAF SWITCHES (green) ===== -->
  <rect x="110" y="180" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="140" y="203" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-1</text>

  <rect x="210" y="180" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="240" y="203" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-2</text>

  <rect x="310" y="180" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="340" y="203" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-3</text>

  <rect x="410" y="180" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="440" y="203" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-4</text>

  <rect x="510" y="180" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="540" y="203" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Leaf-5</text>

  <!-- ===== CORE → LEAF LINKS ===== -->
  <!-- Core-1 to all leaves -->
  <line x1="170" y1="100" x2="125" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="180" y1="100" x2="225" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="190" y1="100" x2="325" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="200" y1="100" x2="425" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="210" y1="100" x2="525" y2="180" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Core-2 to all leaves -->
  <line x1="270" y1="100" x2="135" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="280" y1="100" x2="235" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="290" y1="100" x2="335" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="300" y1="100" x2="435" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="310" y1="100" x2="535" y2="180" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Core-3 to all leaves -->
  <line x1="370" y1="100" x2="145" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="380" y1="100" x2="245" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="390" y1="100" x2="345" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="400" y1="100" x2="445" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="410" y1="100" x2="545" y2="180" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- Core-4 to all leaves -->
  <line x1="470" y1="100" x2="155" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="480" y1="100" x2="255" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="490" y1="100" x2="355" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="500" y1="100" x2="455" y2="180" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="510" y1="100" x2="555" y2="180" stroke="#c87b2a" stroke-width="1.2"/>

  <!-- ===== GPU RACKS (blue) ===== -->
  <!-- Rack under Leaf-1 -->
  <rect x="100" y="320" width="80" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="140" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 1</text>
  <text x="140" y="355" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="140" y="370" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-2 -->
  <rect x="200" y="320" width="80" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="240" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 2</text>
  <text x="240" y="355" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="240" y="370" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-3 -->
  <rect x="300" y="320" width="80" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="340" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 3</text>
  <text x="340" y="355" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="340" y="370" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-4 -->
  <rect x="400" y="320" width="80" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="440" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 4</text>
  <text x="440" y="355" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="440" y="370" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- Rack under Leaf-5 -->
  <rect x="500" y="320" width="80" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="540" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Rack 5</text>
  <text x="540" y="355" text-anchor="middle" font-size="8" fill="#555">8 GPUs</text>
  <text x="540" y="370" text-anchor="middle" font-size="7.5" fill="#4a90c4">400 Gb/s uplink</text>

  <!-- ===== LEAF → RACK LINKS ===== -->
  <line x1="140" y1="220" x2="140" y2="320" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="240" y1="220" x2="240" y2="320" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="340" y1="220" x2="340" y2="320" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="440" y1="220" x2="440" y2="320" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="540" y1="220" x2="540" y2="320" stroke="#3d9e5a" stroke-width="1.5"/>

  <!-- ===== BISECTION CUT (red dashed) ===== -->
  <line x1="80" y1="140" x2="590" y2="140" stroke="#a31f34" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="600" y="136" font-size="8.5" font-weight="700" fill="#a31f34">Bisection</text>
  <text x="600" y="148" font-size="8.5" font-weight="700" fill="#a31f34">cut</text>

  <!-- ===== SUBSCRIPTION RATIO ANNOTATION ===== -->
  <rect x="100" y="250" width="180" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="190" y="268" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Subscription Ratio</text>
  <text x="190" y="282" text-anchor="middle" font-size="8.5" fill="#555">1:1 (non-blocking) = full bisection BW</text>

  <!-- ===== FULL BISECTION LABEL ===== -->
  <rect x="400" y="250" width="180" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
  <text x="490" y="268" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Full Bisection BW</text>
  <text x="490" y="282" text-anchor="middle" font-size="8.5" fill="#555">5 × 50 GB/s = 250 GB/s</text>

  <!-- ===== SCALE ANNOTATION ===== -->
  <text x="340" y="410" text-anchor="middle" font-size="8.5" fill="#555">k=64 radix → k³/4 = 65,536 hosts (three-tier)</text>
  <text x="340" y="425" text-anchor="middle" font-size="8.5" fill="#555">Cost: ~2,048 switches · ~40,000 optical cables (at 4,096-GPU scale)</text>

  <!-- Bottom footnote -->
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">The bisection cut divides the cluster in half; its bandwidth sets the ceiling for all-to-all AllReduce performance.</text>
</svg>