<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="540" fill="#fff"/>

  <!-- ===== RAIL SWITCHES (top) ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Rail Switches (Leaf Layer)</text>

  <!-- Spine switch (top-of-rack) -->
  <rect x="130" y="40" width="420" height="10" rx="4" fill="#bbb" stroke="none"/>
  <text x="560" y="50" font-size="11" fill="#555" font-style="italic">Spine (dashed)</text>

  <!-- Spine dashed connections -->
  <line x1="130" y1="70" x2="130" y2="50" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="270" y1="70" x2="270" y2="50" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="410" y1="70" x2="410" y2="50" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="550" y1="70" x2="550" y2="50" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Switch 0 -->
  <rect x="80" y="70" width="100" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Switch-0</text>

  <!-- Switch 1 -->
  <rect x="220" y="70" width="100" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="270" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Switch-1</text>

  <!-- Switch 2 -->
  <rect x="360" y="70" width="100" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="410" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Switch-2</text>

  <!-- Switch 3 -->
  <rect x="500" y="70" width="100" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="550" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Switch-3</text>

  <!-- ===== NODE TITLES ===== -->
  <text x="40" y="160" text-anchor="start" font-size="12" font-weight="700" fill="#333">Node 0</text>
  <text x="640" y="160" text-anchor="end" font-size="12" font-weight="700" fill="#333">Node 1</text>

  <!-- ===== NODE 0 ===== -->
  <rect x="40" y="170" width="280" height="140" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <!-- NVLink bus inside node 0 -->
  <rect x="70" y="260" width="220" height="10" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="180" y="295" text-anchor="middle" font-size="11" fill="#555" font-weight="700">NVLink 4.0 (900 GB/s)</text>

  <!-- NVLink connectors Node 0 -->
  <line x1="90" y1="230" x2="90" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="150" y1="230" x2="150" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="210" y1="230" x2="210" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="270" y1="230" x2="270" y2="260" stroke="#999" stroke-width="1.5"/>

  <!-- GPU G0 Node 0 -->
  <rect x="70" y="190" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="90" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G0</text>

  <!-- GPU G1 Node 0 -->
  <rect x="130" y="190" width="40" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="150" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G1</text>

  <!-- GPU G2 Node 0 -->
  <rect x="190" y="190" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="210" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G2</text>

  <!-- GPU G3 Node 0 -->
  <rect x="250" y="190" width="40" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="270" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G3</text>


  <!-- ===== NODE 1 ===== -->
  <rect x="360" y="170" width="280" height="140" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <!-- NVLink bus inside node 1 -->
  <rect x="390" y="260" width="220" height="10" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="500" y="295" text-anchor="middle" font-size="11" fill="#555" font-weight="700">NVLink 4.0 (900 GB/s)</text>

  <!-- NVLink connectors Node 1 -->
  <line x1="410" y1="230" x2="410" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="470" y1="230" x2="470" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="530" y1="230" x2="530" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="590" y1="230" x2="590" y2="260" stroke="#999" stroke-width="1.5"/>

  <!-- GPU G0 Node 1 -->
  <rect x="390" y="190" width="40" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="410" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G0</text>

  <!-- GPU G1 Node 1 -->
  <rect x="450" y="190" width="40" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="470" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G1</text>

  <!-- GPU G2 Node 1 -->
  <rect x="510" y="190" width="40" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="530" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G2</text>

  <!-- GPU G3 Node 1 -->
  <rect x="570" y="190" width="40" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="590" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#333">G3</text>


  <!-- ===== RAIL CONNECTIONS (GPU to switch) ===== -->
  <!-- Rail 0: All G0s -> Switch-0 (blue) -->
  <line x1="90" y1="190" x2="120" y2="100" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="410" y1="190" x2="140" y2="100" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- Rail 1: All G1s -> Switch-1 (green) -->
  <line x1="150" y1="190" x2="260" y2="100" stroke="#3d9e5a" stroke-width="1.5"/>
  <line x1="470" y1="190" x2="280" y2="100" stroke="#3d9e5a" stroke-width="1.5"/>

  <!-- Rail 2: All G2s -> Switch-2 (orange) -->
  <line x1="210" y1="190" x2="400" y2="100" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="530" y1="190" x2="420" y2="100" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- Rail 3: All G3s -> Switch-3 (red) -->
  <line x1="270" y1="190" x2="540" y2="100" stroke="#c44" stroke-width="1.5"/>
  <line x1="590" y1="190" x2="560" y2="100" stroke="#c44" stroke-width="1.5"/>


  <!-- ===== ANNOTATION BOX ===== -->
  <rect x="40" y="350" width="600" height="100" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="375" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Rail-Optimized Design Principle</text>
  <text x="340" y="395" text-anchor="middle" font-size="11" fill="#555">All GPUs of the same rank (e.g., all G0s across all nodes) share one leaf switch.</text>
  <text x="340" y="415" text-anchor="middle" font-size="11" fill="#555">Data-parallel AllReduce traffic stays on a single switch -- zero contention, 1 hop.</text>
  <text x="340" y="435" text-anchor="middle" font-size="11" fill="#555">Tensor-parallel traffic uses NVLink within each node (no switch traversal).</text>


  <!-- ===== LEGEND ===== -->
  <line x1="40" y1="480" x2="60" y2="480" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="70" y="485" font-size="11" fill="#333">Rail 0</text>

  <line x1="130" y1="480" x2="150" y2="480" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="160" y="485" font-size="11" fill="#333">Rail 1</text>

  <line x1="220" y1="480" x2="240" y2="480" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="250" y="485" font-size="11" fill="#333">Rail 2</text>

  <line x1="310" y1="480" x2="330" y2="480" stroke="#c44" stroke-width="1.5"/>
  <text x="340" y="485" font-size="11" fill="#333">Rail 3</text>

  <line x1="400" y1="480" x2="420" y2="480" stroke="#999" stroke-width="1.5"/>
  <text x="430" y="485" font-size="11" fill="#333">NVLink (intra-node)</text>

  <line x1="570" y1="480" x2="590" y2="480" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="600" y="485" font-size="11" fill="#333">Spine</text>


  <!-- ===== FOOTNOTE ===== -->
  <text x="340" y="520" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Used in NVIDIA DGX SuperPOD and Meta Grand Teton cluster designs.</text>

</svg>