<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460">
  <rect width="720" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">PAM4 vs. NRZ Signaling</text>

  <!-- ===== Divider ===== -->
  <line x1="360" y1="50" x2="360" y2="430" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== LEFT PANEL: NRZ ===== -->
  <text x="180" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#333">NRZ (2-Level)</text>
  <text x="180" y="70" text-anchor="middle" font-size="9.5" fill="#555">Non-Return-to-Zero · Binary signaling</text>

  <!-- NRZ axis -->
  <line x1="50" y1="280" x2="310" y2="280" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="60" y1="350" x2="60" y2="110" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="315" y="280" font-size="8" fill="#999" text-anchor="start">time</text>
  <text x="60" y="100" font-size="8" fill="#999" text-anchor="middle">V</text>

  <!-- NRZ voltage level labels -->
  <line x1="55" y1="145" x2="60" y2="145" stroke="#999" stroke-width="0.8"/>
  <text x="50" y="148" text-anchor="end" font-size="8" fill="#4a90c4" font-weight="700">+V (1)</text>
  <line x1="55" y1="280" x2="60" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="50" y="283" text-anchor="end" font-size="8" fill="#4a90c4">−V (0)</text>

  <!-- NRZ waveform — clean square wave (1 bit/symbol) -->
  <polyline points="80,145 105,145 105,280 130,280 130,145 180,145 180,280 205,280 205,145 230,145 230,280 280,280" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Bit labels below waveform -->
  <text x="92.5" y="310" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="117.5" y="310" text-anchor="middle" font-size="8" fill="#555">0</text>
  <text x="155" y="310" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="192.5" y="310" text-anchor="middle" font-size="8" fill="#555">0</text>
  <text x="217.5" y="310" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="255" y="310" text-anchor="middle" font-size="8" fill="#555">0</text>

  <!-- Symbol period brace -->
  <polyline points="80,318 80,322 105,322 105,318" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="92.5" y="340" text-anchor="middle" font-size="8" fill="#555">1 bit/symbol</text>

  <!-- NRZ eye diagram region label -->
  <rect x="80" y="110" width="200" height="125" fill="none" stroke="#4a90c4" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="180" y="130" text-anchor="middle" font-size="8" fill="#4a90c4">Large eye opening</text>
  <text x="180" y="140" text-anchor="middle" font-size="8" fill="#4a90c4">Good noise margin</text>

  <!-- NRZ noise margin annotation -->
  <line x1="70" y1="145" x2="70" y2="208" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="70" y1="218" x2="70" y2="280" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="68" y1="145" x2="72" y2="145" stroke="#4a90c4" stroke-width="1"/>
  <line x1="68" y1="280" x2="72" y2="280" stroke="#4a90c4" stroke-width="1"/>
  <text x="70" y="216" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">2V</text>

  <!-- NRZ summary box -->
  <rect x="60" y="350" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="180" y="370" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NRZ Summary</text>
  <text x="180" y="380" text-anchor="middle" font-size="8.5" fill="#555">1 bit / symbol · Simple detection</text>
  <text x="180" y="390" text-anchor="middle" font-size="8.5" fill="#555">FEC not required · Lower latency</text>

  <!-- ===== RIGHT PANEL: PAM4 ===== -->
  <text x="540" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#333">PAM4 (4-Level)</text>
  <text x="540" y="70" text-anchor="middle" font-size="9.5" fill="#555">Pulse Amplitude Modulation · 4 symbols</text>

  <!-- PAM4 axis -->
  <line x1="410" y1="280" x2="670" y2="280" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="420" y1="350" x2="420" y2="110" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="675" y="280" font-size="8" fill="#999" text-anchor="start">time</text>
  <text x="420" y="100" font-size="8" fill="#999" text-anchor="middle">V</text>

  <!-- PAM4 voltage level labels (4 levels) -->
  <line x1="415" y1="140" x2="420" y2="140" stroke="#999" stroke-width="0.8"/>
  <text x="410" y="143" text-anchor="end" font-size="7.5" fill="#4a90c4" font-weight="700">+3V (11)</text>
  <line x1="415" y1="186.7" x2="420" y2="186.7" stroke="#999" stroke-width="0.8"/>
  <text x="410" y="189.7" text-anchor="end" font-size="7.5" fill="#4a90c4">+1V (10)</text>
  <line x1="415" y1="233.3" x2="420" y2="233.3" stroke="#999" stroke-width="0.8"/>
  <text x="410" y="236.3" text-anchor="end" font-size="7.5" fill="#4a90c4">−1V (01)</text>
  <line x1="415" y1="280" x2="420" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="410" y="283" text-anchor="end" font-size="7.5" fill="#4a90c4">−3V (00)</text>

  <!-- PAM4 waveform — 4 level signal (2 bits/symbol) -->
  <polyline points="430,140 455,140 455,233.3 480,233.3 480,186.7 530,186.7 530,280 555,280 555,140 580,140 580,233.3 630,233.3 630,186.7 655,186.7" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Bit pair labels below -->
  <text x="442.5" y="310" text-anchor="middle" font-size="8" fill="#555">11</text>
  <text x="467.5" y="310" text-anchor="middle" font-size="8" fill="#555">01</text>
  <text x="505" y="310" text-anchor="middle" font-size="8" fill="#555">10</text>
  <text x="542.5" y="310" text-anchor="middle" font-size="8" fill="#555">00</text>
  <text x="567.5" y="310" text-anchor="middle" font-size="8" fill="#555">11</text>
  <text x="605" y="310" text-anchor="middle" font-size="8" fill="#555">01</text>
  <text x="642.5" y="310" text-anchor="middle" font-size="8" fill="#555">10</text>

  <!-- Symbol period brace -->
  <polyline points="430,318 430,322 455,322 455,318" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="442.5" y="340" text-anchor="middle" font-size="8" fill="#555">2 bits/symbol</text>

  <!-- Narrow eye levels annotation (noise/eye closure) -->
  <line x1="420" y1="163.3" x2="670" y2="163.3" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>
  <line x1="420" y1="210" x2="670" y2="210" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>
  <line x1="420" y1="256.7" x2="670" y2="256.7" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>

  <!-- Eye opening annotations — small per level -->
  <text x="675" y="166" text-anchor="start" font-size="7.5" fill="#a31f34">↕ V/3</text>
  <text x="675" y="213" text-anchor="start" font-size="7.5" fill="#a31f34">↕ V/3</text>
  <text x="675" y="260" text-anchor="start" font-size="7.5" fill="#a31f34">↕ V/3</text>

  <!-- FEC requirement annotation -->
  <rect x="445" y="110" width="190" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="540" y="124" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Requires FEC → adds latency floor</text>

  <!-- PAM4 summary box -->
  <rect x="420" y="350" width="240" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="540" y="370" text-anchor="middle" font-size="9" font-weight="700" fill="#333">PAM4 Summary</text>
  <text x="540" y="380" text-anchor="middle" font-size="8.5" fill="#555">2 bits / symbol · 2× data rate</text>
  <text x="540" y="390" text-anchor="middle" font-size="8.5" fill="#a31f34">FEC required · 100–200 ns / hop</text>

  <!-- Bottom footnote -->
  <text x="360" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">PAM4 doubles bandwidth density but requires FEC at every port, imposing an irreducible latency floor on all ML collectives.</text>
</svg>