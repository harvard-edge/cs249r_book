<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">PAM4 vs. NRZ Signaling</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="44" x2="340" y2="420" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== LEFT PANEL: NRZ ===== -->
  <text x="170" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#333">NRZ (2-Level)</text>
  <text x="170" y="72" text-anchor="middle" font-size="9.5" fill="#555">Non-Return-to-Zero · Binary signaling</text>

  <!-- NRZ axis -->
  <line x1="50" y1="280" x2="318" y2="280" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="65" y1="350" x2="65" y2="110" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="322" y="273.0" font-size="8" fill="#999">time</text>
  <text x="68" y="108" font-size="8" fill="#999">V</text>

  <!-- NRZ voltage level labels -->
  <line x1="60" y1="145" x2="68" y2="145" stroke="#999" stroke-width="0.8"/>
  <text x="58" y="138.0" text-anchor="end" font-size="8" fill="#4a90c4" font-weight="700">+V (1)</text>
  <line x1="60" y1="280" x2="68" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="58" y="273.0" text-anchor="end" font-size="8" fill="#4a90c4">−V (0)</text>

  <!-- NRZ waveform — clean square wave (1 bit/symbol) -->
  <!-- Bit sequence: 1,0,1,1,0,1,0,0 -->
  <polyline points="70,145 95,145 95,280 120,280 120,145 170,145 170,280 195,280 195,145 220,145 220,280 270,280 270,280" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Bit labels below waveform -->
  <text x="82" y="305" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="107" y="305" text-anchor="middle" font-size="8" fill="#555">0</text>
  <text x="145" y="305" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="182" y="305" text-anchor="middle" font-size="8" fill="#555">0</text>
  <text x="207" y="305" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="245" y="305" text-anchor="middle" font-size="8" fill="#555">0</text>

  <!-- Symbol period brace -->
  <line x1="70" y1="322" x2="95" y2="322" stroke="#555" stroke-width="0.8"/>
  <line x1="70" y1="318" x2="70" y2="326" stroke="#555" stroke-width="0.8"/>
  <line x1="95" y1="318" x2="95" y2="326" stroke="#555" stroke-width="0.8"/>
  <text x="82" y="337" text-anchor="middle" font-size="8" fill="#555">1 bit/symbol</text>

  <!-- NRZ eye diagram region label -->
  <rect x="90" y="110" width="180" height="125" rx="4" fill="none" stroke="#4a90c4" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="180" y="128" text-anchor="middle" font-size="8" fill="#4a90c4">Large eye opening</text>
  <text x="180" y="140" text-anchor="middle" font-size="8" fill="#4a90c4">Good noise margin</text>

  <!-- NRZ noise margin annotation -->
  <line x1="68" y1="145" x2="68" y2="280" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="62" y1="145" x2="74" y2="145" stroke="#4a90c4" stroke-width="1"/>
  <line x1="62" y1="280" x2="74" y2="280" stroke="#4a90c4" stroke-width="1"/>
  <text x="45" y="218" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">2V</text>

  <!-- NRZ summary box -->
  <rect x="68" y="352" width="242" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="189" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NRZ Summary</text>
  <text x="189" y="382" text-anchor="middle" font-size="8.5" fill="#555">1 bit / symbol · Simple detection</text>
  <text x="189" y="395" text-anchor="middle" font-size="8.5" fill="#555">FEC not required · Lower latency</text>

  <!-- ===== RIGHT PANEL: PAM4 ===== -->
  <text x="510" y="56" text-anchor="middle" font-size="12" font-weight="700" fill="#333">PAM4 (4-Level)</text>
  <text x="510" y="72" text-anchor="middle" font-size="9.5" fill="#555">Pulse Amplitude Modulation · 4 symbols</text>

  <!-- PAM4 axis -->
  <line x1="356" y1="280" x2="624" y2="280" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="371" y1="350" x2="371" y2="110" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="628" y="273.0" font-size="8" fill="#999">time</text>
  <text x="374" y="108" font-size="8" fill="#999">V</text>

  <!-- PAM4 voltage level labels (4 levels) -->
  <line x1="366" y1="140" x2="374" y2="140" stroke="#999" stroke-width="0.8"/>
  <text x="364" y="133.0" text-anchor="end" font-size="7.5" fill="#a31f34" font-weight="700">+3V (11)</text>
  <line x1="366" y1="186" x2="374" y2="186" stroke="#999" stroke-width="0.8"/>
  <text x="364" y="179.0" text-anchor="end" font-size="7.5" fill="#a31f34">+1V (10)</text>
  <line x1="366" y1="234" x2="374" y2="234" stroke="#999" stroke-width="0.8"/>
  <text x="364" y="227.0" text-anchor="end" font-size="7.5" fill="#a31f34">−1V (01)</text>
  <line x1="366" y1="280" x2="374" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="364" y="273.0" text-anchor="end" font-size="7.5" fill="#a31f34">−3V (00)</text>

  <!-- PAM4 waveform — 4 level signal (2 bits/symbol) -->
  <!-- Dibit sequence: 11, 01, 10, 00, 11, 01, 10 -->
  <polyline points="376,140 401,140 401,234 426,234 426,186 476,186 476,280 501,280 501,140 526,140 526,234 576,234 576,186 601,186" fill="none" stroke="#a31f34" stroke-width="2.5"/>

  <!-- Bit pair labels below -->
  <text x="388" y="305" text-anchor="middle" font-size="8" fill="#555">11</text>
  <text x="413" y="305" text-anchor="middle" font-size="8" fill="#555">01</text>
  <text x="451" y="305" text-anchor="middle" font-size="8" fill="#555">10</text>
  <text x="488" y="305" text-anchor="middle" font-size="8" fill="#555">00</text>
  <text x="513" y="305" text-anchor="middle" font-size="8" fill="#555">11</text>
  <text x="551" y="305" text-anchor="middle" font-size="8" fill="#555">01</text>
  <text x="589" y="305" text-anchor="middle" font-size="8" fill="#555">10</text>

  <!-- Symbol period brace -->
  <line x1="376" y1="322" x2="401" y2="322" stroke="#555" stroke-width="0.8"/>
  <line x1="376" y1="318" x2="376" y2="326" stroke="#555" stroke-width="0.8"/>
  <line x1="401" y1="318" x2="401" y2="326" stroke="#555" stroke-width="0.8"/>
  <text x="388" y="337" text-anchor="middle" font-size="8" fill="#a31f34" font-weight="700">2 bits/symbol</text>

  <!-- Narrow eye levels annotation (noise/eye closure) -->
  <!-- Horizontal dashed noise bands between levels -->
  <line x1="374" y1="163" x2="620" y2="163" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>
  <line x1="374" y1="210" x2="620" y2="210" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>
  <line x1="374" y1="257" x2="620" y2="257" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>

  <!-- Eye opening annotations — small per level -->
  <text x="610" y="155" text-anchor="end" font-size="7.5" fill="#a31f34">↕ V/3</text>
  <text x="610" y="200" text-anchor="end" font-size="7.5" fill="#a31f34">↕ V/3</text>
  <text x="610" y="248" text-anchor="end" font-size="7.5" fill="#a31f34">↕ V/3</text>

  <!-- FEC requirement annotation -->
  <rect x="374" y="110" width="186" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="467" y="124" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Requires FEC → adds latency floor</text>

  <!-- PAM4 summary box -->
  <rect x="374" y="352" width="242" height="52" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="495" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#333">PAM4 Summary</text>
  <text x="495" y="382" text-anchor="middle" font-size="8.5" fill="#555">2 bits / symbol · 2× data rate</text>
  <text x="495" y="395" text-anchor="middle" font-size="8.5" fill="#a31f34">FEC required · 100–200 ns / hop</text>

  <!-- Bottom footnote -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">PAM4 doubles bandwidth density but requires FEC at every port, imposing an irreducible latency floor on all ML collectives.</text>
</svg>