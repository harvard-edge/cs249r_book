<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">PAM4 vs. NRZ Signaling</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="50" x2="340" y2="430" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== LEFT PANEL: NRZ ===== -->
  <text x="170" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#333">NRZ (2-Level)</text>
  <text x="170" y="70" text-anchor="middle" font-size="9.5" fill="#555">Non-Return-to-Zero · Binary signaling</text>

  <!-- NRZ axis -->
  <line x1="40" y1="280" x2="320" y2="280" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="60" y1="350" x2="60" y2="110" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="330" y="280" font-size="8" fill="#999">time</text>
  <text x="60" y="100" font-size="8" fill="#999">V</text>

  <!-- NRZ voltage level labels -->
  <line x1="55" y1="145" x2="60" y2="145" stroke="#999" stroke-width="0.8"/>
  <text x="50" y="148" text-anchor="end" font-size="8" fill="#4a90c4" font-weight="700">+V (1)</text>
  <line x1="55" y1="280" x2="60" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="50" y="283" text-anchor="end" font-size="8" fill="#4a90c4">−V (0)</text>

  <!-- NRZ waveform — clean square wave (1 bit/symbol) -->
  <!-- Bit sequence: 1,0,1,1,0,1,0,0 -->
  <polyline points="70,145 95,145 95,280 120,280 120,145 170,145 170,280 195,280 195,145 220,145 220,280 270,280" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Bit labels below waveform -->
  <text x="82.5" y="310" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="107.5" y="310" text-anchor="middle" font-size="8" fill="#555">0</text>
  <text x="145" y="310" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="182.5" y="310" text-anchor="middle" font-size="8" fill="#555">0</text>
  <text x="207.5" y="310" text-anchor="middle" font-size="8" fill="#555">1</text>
  <text x="245" y="310" text-anchor="middle" font-size="8" fill="#555">0</text>

  <!-- Symbol period brace -->
  <polyline points="70,318 70,322 95,322 95,318" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="82.5" y="340" text-anchor="middle" font-size="8" fill="#555">1 bit/symbol</text>

  <!-- NRZ eye diagram region label -->
  <rect x="90" y="110" width="180" height="125" fill="none" stroke="#4a90c4" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="180" y="130" text-anchor="middle" font-size="8" fill="#4a90c4">Large eye opening</text>
  <text x="180" y="140" text-anchor="middle" font-size="8" fill="#4a90c4">Good noise margin</text>

  <!-- NRZ noise margin annotation -->
  <line x1="65" y1="145" x2="65" y2="280" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="62" y1="145" x2="68" y2="145" stroke="#4a90c4" stroke-width="1"/>
  <line x1="62" y1="280" x2="68" y2="280" stroke="#4a90c4" stroke-width="1"/>
  <text x="55" y="215" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">2V</text>

  <!-- NRZ summary box -->
  <rect x="70" y="350" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="190" y="370" text-anchor="middle" font-size="9" font-weight="700" fill="#333">NRZ Summary</text>
  <text x="190" y="380" text-anchor="middle" font-size="8.5" fill="#555">1 bit / symbol · Simple detection</text>
  <text x="190" y="390" text-anchor="middle" font-size="8.5" fill="#555">FEC not required · Lower latency</text>

  <!-- ===== RIGHT PANEL: PAM4 ===== -->
  <text x="510" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#333">PAM4 (4-Level)</text>
  <text x="510" y="70" text-anchor="middle" font-size="9.5" fill="#555">Pulse Amplitude Modulation · 4 symbols</text>

  <!-- PAM4 axis -->
  <line x1="340" y1="280" x2="620" y2="280" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="360" y1="350" x2="360" y2="110" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="630" y="280" font-size="8" fill="#999">time</text>
  <text x="360" y="100" font-size="8" fill="#999">V</text>

  <!-- PAM4 voltage level labels (4 levels) -->
  <line x1="355" y1="140" x2="360" y2="140" stroke="#999" stroke-width="0.8"/>
  <text x="350" y="143" text-anchor="end" font-size="7.5" fill="#4a90c4" font-weight="700">+3V (11)</text>
  <line x1="355" y1="186.7" x2="360" y2="186.7" stroke="#999" stroke-width="0.8"/>
  <text x="350" y="189.7" text-anchor="end" font-size="7.5" fill="#4a90c4">+1V (10)</text>
  <line x1="355" y1="233.3" x2="360" y2="233.3" stroke="#999" stroke-width="0.8"/>
  <text x="350" y="236.3" text-anchor="end" font-size="7.5" fill="#4a90c4">−1V (01)</text>
  <line x1="355" y1="280" x2="360" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="350" y="283" text-anchor="end" font-size="7.5" fill="#4a90c4">−3V (00)</text>

  <!-- PAM4 waveform — 4 level signal (2 bits/symbol) -->
  <!-- Dibit sequence: 11, 01, 10, 00, 11, 01, 10 -->
  <polyline points="370,140 395,140 395,233.3 420,233.3 420,186.7 470,186.7 470,280 495,280 495,140 520,140 520,233.3 570,233.3 570,186.7 595,186.7" fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Bit pair labels below -->
  <text x="382.5" y="310" text-anchor="middle" font-size="8" fill="#555">11</text>
  <text x="407.5" y="310" text-anchor="middle" font-size="8" fill="#555">01</text>
  <text x="445" y="310" text-anchor="middle" font-size="8" fill="#555">10</text>
  <text x="482.5" y="310" text-anchor="middle" font-size="8" fill="#555">00</text>
  <text x="507.5" y="310" text-anchor="middle" font-size="8" fill="#555">11</text>
  <text x="545" y="310" text-anchor="middle" font-size="8" fill="#555">01</text>
  <text x="582.5" y="310" text-anchor="middle" font-size="8" fill="#555">10</text>

  <!-- Symbol period brace -->
  <polyline points="370,318 370,322 395,322 395,318" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="382.5" y="340" text-anchor="middle" font-size="8" fill="#555">2 bits/symbol</text>

  <!-- Narrow eye levels annotation (noise/eye closure) -->
  <!-- Horizontal dashed noise bands between levels -->
  <line x1="360" y1="163.3" x2="620" y2="163.3" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>
  <line x1="360" y1="210" x2="620" y2="210" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>
  <line x1="360" y1="256.7" x2="620" y2="256.7" stroke="#f9d6d5" stroke-width="4" stroke-dasharray="4,2"/>

  <!-- Eye opening annotations — small per level -->
  <text x="610" y="166" text-anchor="end" font-size="7.5" fill="#a31f34">↕ V/3</text>
  <text x="610" y="213" text-anchor="end" font-size="7.5" fill="#a31f34">↕ V/3</text>
  <text x="610" y="260" text-anchor="end" font-size="7.5" fill="#a31f34">↕ V/3</text>

  <!-- FEC requirement annotation -->
  <rect x="370" y="110" width="190" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="465" y="125" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Requires FEC → adds latency floor</text>

  <!-- PAM4 summary box -->
  <rect x="370" y="350" width="240" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="490" y="370" text-anchor="middle" font-size="9" font-weight="700" fill="#333">PAM4 Summary</text>
  <text x="490" y="380" text-anchor="middle" font-size="8.5" fill="#555">2 bits / symbol · 2× data rate</text>
  <text x="490" y="390" text-anchor="middle" font-size="8.5" fill="#a31f34">FEC required · 100–200 ns / hop</text>

  <!-- Bottom footnote -->
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">PAM4 doubles bandwidth density but requires FEC at every port, imposing an irreducible latency floor on all ML collectives.</text>
</svg>