<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">GPUDirect RDMA: Eliminating the CPU Bounce Path</text>

  <!-- ===== SECTION LABELS ===== -->
  <text x="120" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Sender Node</text>
  <text x="560" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Receiver Node</text>

  <!-- Sender node boundary -->
  <rect x="30" y="64" width="180" height="310" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <!-- Receiver node boundary -->
  <rect x="470" y="64" width="180" height="310" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <!-- Network (center) -->
  <rect x="270" y="64" width="140" height="310" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Network</text>
  <text x="340" y="114" text-anchor="middle" font-size="8.5" fill="#c87b2a">InfiniBand / RoCE</text>

  <!-- ===== SENDER NODE COMPONENTS ===== -->
  <!-- GPU -->
  <rect x="52" y="84" width="136" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="103" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Memory</text>
  <text x="120" y="117" text-anchor="middle" font-size="8.5" fill="#555">Gradient tensor (350 GB)</text>

  <!-- CPU / System RAM -->
  <rect x="52" y="174" width="136" height="42" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="120" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#555">CPU</text>
  <text x="120" y="207" text-anchor="middle" font-size="8.5" fill="#777">Kernel / System RAM</text>

  <!-- NIC -->
  <rect x="52" y="264" width="136" height="42" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="120" y="283" text-anchor="middle" font-size="10" font-weight="700" fill="#333">NIC (RDMA)</text>
  <text x="120" y="297" text-anchor="middle" font-size="8.5" fill="#555">400 Gb/s port</text>

  <!-- PCIe label -->
  <text x="35" y="155" font-size="8" fill="#bbb">PCIe</text>
  <text x="35" y="245" font-size="8" fill="#bbb">PCIe</text>

  <!-- ===== RECEIVER NODE COMPONENTS ===== -->
  <!-- NIC -->
  <rect x="492" y="264" width="136" height="42" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="560" y="283" text-anchor="middle" font-size="10" font-weight="700" fill="#333">NIC (RDMA)</text>
  <text x="560" y="297" text-anchor="middle" font-size="8.5" fill="#555">400 Gb/s port</text>

  <!-- CPU / System RAM receiver -->
  <rect x="492" y="174" width="136" height="42" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="560" y="193" text-anchor="middle" font-size="10" font-weight="700" fill="#555">CPU</text>
  <text x="560" y="207" text-anchor="middle" font-size="8.5" fill="#777">Kernel / System RAM</text>

  <!-- GPU receiver -->
  <rect x="492" y="84" width="136" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="560" y="103" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Memory</text>
  <text x="560" y="117" text-anchor="middle" font-size="8.5" fill="#555">AllReduce destination</text>

  <!-- ===== PATH A: TRADITIONAL (RED / TOP) ===== -->
  <!-- Label -->
  <rect x="30" y="380" width="280" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="170" y="395" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Traditional Path — 5 copies, CPU-bottlenecked</text>

  <!-- Traditional arrows: GPU → CPU → NIC → Network → NIC → CPU → GPU -->
  <!-- Sender side: GPU → CPU (down) -->
  <line x1="120" y1="126" x2="120" y2="172" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- CPU → NIC (down) -->
  <line x1="120" y1="216" x2="120" y2="262" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- NIC → Network (right) -->
  <line x1="188" y1="285" x2="268" y2="285" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- Network → Recv NIC (right) -->
  <line x1="412" y1="285" x2="490" y2="285" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- Recv NIC → CPU (up) -->
  <line x1="560" y1="262" x2="560" y2="216" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- Recv CPU → GPU (up) -->
  <line x1="560" y1="172" x2="560" y2="126" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- Step labels for traditional -->
  <text x="135" y="153" font-size="7.5" fill="#a31f34">① copy</text>
  <text x="135" y="243" font-size="7.5" fill="#a31f34">② copy</text>
  <text x="300" y="278" font-size="7.5" fill="#a31f34" text-anchor="middle">③ wire</text>
  <text x="575" y="243" font-size="7.5" fill="#a31f34">④ copy</text>
  <text x="575" y="153" font-size="7.5" fill="#a31f34">⑤ copy</text>

  <!-- ===== PATH B: GPUDirect (GREEN / BOTTOM) ===== -->
  <!-- Label -->
  <rect x="370" y="380" width="280" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="510" y="395" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">GPUDirect RDMA — Direct, zero CPU copies</text>

  <!-- GPUDirect: GPU → NIC → Network → NIC → GPU (bypass CPU) -->
  <!-- Sender GPU → NIC direct -->
  <path d="M 185 105 C 240 105 240 285 188 285" fill="none" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <!-- Network straight (already drawn for traditional) -->
  <line x1="188" y1="335" x2="490" y2="335" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <!-- Recv NIC → GPU direct -->
  <path d="M 490 305 C 450 305 450 105 490 105" fill="none" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- NIC to wire (sender) -->
  <line x1="188" y1="310" x2="268" y2="335" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Wire to recv NIC -->
  <line x1="412" y1="335" x2="492" y2="310" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- "700 GB eliminated" annotation badge -->
  <rect x="270" y="140" width="140" height="36" rx="4" fill="#a31f34"/>
  <text x="340" y="157" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">700 GB eliminated</text>
  <text x="340" y="170" text-anchor="middle" font-size="8" fill="#fff">per training step</text>

  <!-- Legend -->
  <line x1="50" y1="418" x2="80" y2="418" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="86" y="422" font-size="9" fill="#a31f34">Traditional path (CPU copies)</text>
  <line x1="260" y1="418" x2="290" y2="418" stroke="#3d9e5a" stroke-width="2.5"/>
  <text x="296" y="422" font-size="9" fill="#3d9e5a">GPUDirect RDMA (direct)</text>

  <!-- Bottom footnote -->
  <text x="340" y="449" text-anchor="middle" font-size="9" fill="#999" font-style="italic">GPUDirect bypasses the CPU and system RAM, reducing per-step data movement by 700 GB for a 175B-parameter model.</text>
</svg>
