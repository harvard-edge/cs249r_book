<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">GPUDirect RDMA: Eliminating the CPU Bounce Path</text>

  <!-- ===== SECTION LABELS ===== -->
  <text x="130" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Sender Node</text>
  <text x="550" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Receiver Node</text>

  <!-- Sender node boundary -->
  <rect x="30" y="60" width="200" height="260" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <!-- Receiver node boundary -->
  <rect x="450" y="60" width="200" height="260" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <!-- Network (center) -->
  <rect x="270" y="60" width="140" height="260" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Network</text>
  <text x="340" y="115" text-anchor="middle" font-size="8.5" fill="#c87b2a">InfiniBand / RoCE</text>

  <!-- "700 GB eliminated" annotation badge -->
  <rect x="270" y="140" width="140" height="40" rx="4" fill="#a31f34"/>
  <text x="340" y="156" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">700 GB eliminated</text>
  <text x="340" y="170" text-anchor="middle" font-size="8" fill="#fff">per training step</text>

  <!-- ===== SENDER NODE COMPONENTS ===== -->
  <!-- GPU -->
  <rect x="50" y="80" width="140" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Memory</text>
  <text x="120" y="110" text-anchor="middle" font-size="8.5" fill="#555">Gradient tensor (350 GB)</text>

  <!-- CPU / System RAM -->
  <rect x="50" y="170" width="140" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="120" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#555">CPU</text>
  <text x="120" y="200" text-anchor="middle" font-size="8.5" fill="#999">Kernel / System RAM</text>

  <!-- NIC -->
  <rect x="50" y="260" width="140" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="120" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#333">NIC (RDMA)</text>
  <text x="120" y="290" text-anchor="middle" font-size="8.5" fill="#555">400 Gb/s port</text>

  <!-- PCIe label -->
  <text x="70" y="150" font-size="8" fill="#bbb" text-anchor="middle">PCIe</text>
  <text x="70" y="240" font-size="8" fill="#bbb" text-anchor="middle">PCIe</text>

  <!-- ===== RECEIVER NODE COMPONENTS ===== -->
  <!-- GPU receiver -->
  <rect x="490" y="80" width="140" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="560" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU Memory</text>
  <text x="560" y="110" text-anchor="middle" font-size="8.5" fill="#555">AllReduce destination</text>

  <!-- CPU / System RAM receiver -->
  <rect x="490" y="170" width="140" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="560" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#555">CPU</text>
  <text x="560" y="200" text-anchor="middle" font-size="8.5" fill="#999">Kernel / System RAM</text>

  <!-- NIC receiver -->
  <rect x="490" y="260" width="140" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="560" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#333">NIC (RDMA)</text>
  <text x="560" y="290" text-anchor="middle" font-size="8.5" fill="#555">400 Gb/s port</text>

  <!-- ===== PATH A: TRADITIONAL (RED / TOP) ===== -->
  <!-- Label -->
  <rect x="30" y="360" width="300" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="180" y="379" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Traditional Path — 5 copies, CPU-bottlenecked</text>

  <!-- Sender side: GPU → CPU (down) -->
  <line x1="120" y1="120" x2="120" y2="170" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- CPU → NIC (down) -->
  <line x1="120" y1="210" x2="120" y2="260" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- NIC → Network (right) -->
  <line x1="190" y1="275" x2="270" y2="275" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- Network → Recv NIC (right) -->
  <line x1="410" y1="275" x2="490" y2="275" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- Recv NIC → CPU (up) -->
  <line x1="560" y1="260" x2="560" y2="210" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- Recv CPU → GPU (up) -->
  <line x1="560" y1="170" x2="560" y2="120" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- Step labels for traditional -->
  <text x="135" y="148" font-size="7.5" fill="#a31f34">① copy</text>
  <text x="135" y="238" font-size="7.5" fill="#a31f34">② copy</text>
  <text x="340" y="265" font-size="7.5" fill="#a31f34" text-anchor="middle">③ wire</text>
  <text x="575" y="238" font-size="7.5" fill="#a31f34">④ copy</text>
  <text x="575" y="148" font-size="7.5" fill="#a31f34">⑤ copy</text>

  <!-- ===== PATH B: GPUDirect (GREEN / BOTTOM) ===== -->
  <!-- Label -->
  <rect x="350" y="360" width="300" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="500" y="379" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">GPUDirect RDMA — Direct, zero CPU copies</text>

  <!-- Sender GPU → NIC direct (bypassing CPU on the left) -->
  <path d="M 50 100 L 40 100 L 40 285 L 50 285" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Sender NIC to Network -->
  <line x1="190" y1="285" x2="270" y2="285" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Network to Recv NIC -->
  <line x1="410" y1="285" x2="490" y2="285" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Recv NIC → GPU direct (bypassing CPU on the right) -->
  <path d="M 630 285 L 640 285 L 640 100 L 630 100" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Legend -->
  <line x1="150" y1="410" x2="180" y2="410" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="190" y="414" font-size="9" fill="#a31f34">Traditional path (CPU copies)</text>
  <line x1="360" y1="410" x2="390" y2="410" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="400" y="414" font-size="9" fill="#3d9e5a">GPUDirect RDMA (direct)</text>

  <!-- Bottom footnote -->
  <text x="340" y="440" text-anchor="middle" font-size="9" fill="#999" font-style="italic">GPUDirect bypasses the CPU and system RAM, reducing per-step data movement by 700 GB for a 175B-parameter model.</text>
</svg>