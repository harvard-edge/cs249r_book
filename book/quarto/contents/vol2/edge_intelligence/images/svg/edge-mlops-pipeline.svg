<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="780" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="390" y="26" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Edge MLOps Lifecycle Pipeline</text>

  <!-- ===== Cloud-Edge Boundary Line ===== -->
  <!-- Dashed vertical divider at x=390 -->
  <line x1="390" y1="42" x2="390" y2="410" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="1.2"/>
  <text x="195" y="52" font-size="10" font-weight="700" fill="#bbb" text-anchor="middle">CLOUD SIDE</text>
  <text x="585" y="52" font-size="10" font-weight="700" fill="#bbb" text-anchor="middle">EDGE SIDE</text>
  <!-- Cloud icon label -->
  <rect x="128" y="56" width="134" height="16" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="195" y="67" font-size="8" fill="#999" text-anchor="middle">Centralized infrastructure</text>
  <!-- Edge icon label -->
  <rect x="518" y="56" width="134" height="16" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="585" y="67" font-size="8" fill="#999" text-anchor="middle">Distributed devices</text>

  <!-- ===== Stage 1: Cloud Training ===== -->
  <rect x="40" y="88" width="150" height="88" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="115" y="110" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">1. Cloud Training</text>
  <text x="115" y="126" font-size="8.5" fill="#333" text-anchor="middle">Large-scale pretraining</text>
  <text x="115" y="140" font-size="8" fill="#555" text-anchor="middle">Full dataset access</text>
  <text x="115" y="154" font-size="8" fill="#555" text-anchor="middle">GPU/TPU clusters</text>
  <text x="115" y="166" font-size="7.5" fill="#4a90c4" text-anchor="middle">Output: base model w*</text>

  <!-- Arrow from Cloud Training to Model Compression -->
  <line x1="190" y1="132" x2="239" y2="132" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ===== Stage 2: Model Compression ===== -->
  <rect x="240" y="88" width="120" height="88" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.8"/>
  <text x="300" y="110" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">2. Compression</text>
  <text x="300" y="126" font-size="8.5" fill="#333" text-anchor="middle">Quantization (INT8)</text>
  <text x="300" y="140" font-size="8" fill="#555" text-anchor="middle">Pruning / distillation</text>
  <text x="300" y="154" font-size="8" fill="#555" text-anchor="middle">LoRA adapter init</text>
  <text x="300" y="166" font-size="7.5" fill="#c87b2a" text-anchor="middle">Size: 14 GB → 350 MB</text>

  <!-- Stage 2 to OTA -->
  <line x1="360" y1="132" x2="419" y2="132" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ===== Stage 3: OTA Deployment ===== -->
  <rect x="420" y="88" width="130" height="88" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="485" y="110" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">3. OTA Deployment</text>
  <text x="485" y="126" font-size="8.5" fill="#333" text-anchor="middle">Delta update packages</text>
  <text x="485" y="140" font-size="8" fill="#555" text-anchor="middle">Tiered rollout</text>
  <text x="485" y="154" font-size="8" fill="#555" text-anchor="middle">Version control</text>
  <text x="485" y="166" font-size="7.5" fill="#3d9e5a" text-anchor="middle">Staged: 1% → 10% → 100%</text>

  <!-- Arrow from OTA to On-Device Inference -->
  <line x1="550" y1="132" x2="599" y2="132" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Stage 4: On-Device Inference ===== -->
  <rect x="600" y="88" width="140" height="88" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8"/>
  <text x="670" y="110" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">4. On-Device</text>
  <text x="670" y="124" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Inference</text>
  <text x="670" y="140" font-size="8.5" fill="#333" text-anchor="middle">Local prediction</text>
  <text x="670" y="154" font-size="8" fill="#555" text-anchor="middle">Adapter fine-tuning</text>
  <text x="670" y="166" font-size="7.5" fill="#4a90c4" text-anchor="middle">&lt;10 ms latency</text>

  <!-- ===== Telemetry feedback arrow (right to left, bottom orthogonal path) ===== -->
  <!-- Arrow from bottom of On-Device back to Cloud Training -->
  <path d="M 670,176 L 670,262 L 115,262 L 115,177" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- Telemetry upload label on the feedback path -->
  <rect x="318" y="250" width="144" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="390" y="264" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">5. Telemetry Upload</text>

  <!-- Small annotation labels on the feedback path -->
  <text x="660" y="222" font-size="7.5" fill="#3d9e5a" text-anchor="end">privacy-preserved</text>
  <text x="660" y="232" font-size="7.5" fill="#3d9e5a" text-anchor="end">aggregated metrics</text>
  <text x="125" y="222" font-size="7.5" fill="#3d9e5a" text-anchor="start">model improvement</text>
  <text x="125" y="232" font-size="7.5" fill="#3d9e5a" text-anchor="start">trigger retraining</text>

  <!-- ===== Detail panels (lower section) ===== -->

  <!-- Cloud Training detail -->
  <rect x="40" y="295" width="145" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="112.5" y="313" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Training Infrastructure</text>
  <text x="112.5" y="328" font-size="8" fill="#555" text-anchor="middle">• GPU clusters (multi-node)</text>
  <text x="112.5" y="342" font-size="8" fill="#555" text-anchor="middle">• Full corpus: TB-scale data</text>
  <text x="112.5" y="356" font-size="8" fill="#555" text-anchor="middle">• Weeks of compute time</text>
  <text x="112.5" y="370" font-size="8" fill="#555" text-anchor="middle">• Periodic: monthly/quarterly</text>
  <text x="112.5" y="384" font-size="8" fill="#555" text-anchor="middle">• Output: v1, v2, … base model</text>

  <!-- Compression detail -->
  <rect x="225" y="295" width="145" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="297.5" y="313" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Compression Techniques</text>
  <text x="297.5" y="328" font-size="8" fill="#555" text-anchor="middle">• INT8/INT4 quantization</text>
  <text x="297.5" y="342" font-size="8" fill="#555" text-anchor="middle">• Magnitude pruning (&gt;90%)</text>
  <text x="297.5" y="356" font-size="8" fill="#555" text-anchor="middle">• Knowledge distillation</text>
  <text x="297.5" y="370" font-size="8" fill="#555" text-anchor="middle">• LoRA adapter init (r=8–64)</text>
  <text x="297.5" y="384" font-size="8" fill="#555" text-anchor="middle">• Device-tier packaging</text>

  <!-- On-Device detail -->
  <rect x="410" y="295" width="145" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="482.5" y="313" font-size="9" font-weight="700" fill="#333" text-anchor="middle">On-Device Constraints</text>
  <text x="482.5" y="328" font-size="8" fill="#555" text-anchor="middle">• 2–8 GB RAM budget</text>
  <text x="482.5" y="342" font-size="8" fill="#555" text-anchor="middle">• Battery: &lt;5% per day</text>
  <text x="482.5" y="356" font-size="8" fill="#555" text-anchor="middle">• Train when idle + charging</text>
  <text x="482.5" y="370" font-size="8" fill="#555" text-anchor="middle">• WiFi-only uploads</text>
  <text x="482.5" y="384" font-size="8" fill="#555" text-anchor="middle">• Rollback on degradation</text>

  <!-- Telemetry detail -->
  <rect x="595" y="295" width="145" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="667.5" y="313" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Privacy-Safe Telemetry</text>
  <text x="667.5" y="328" font-size="8" fill="#555" text-anchor="middle">• Differential privacy (ε&lt;8)</text>
  <text x="667.5" y="342" font-size="8" fill="#555" text-anchor="middle">• Aggregate stats only</text>
  <text x="667.5" y="356" font-size="8" fill="#555" text-anchor="middle">• No raw data upload</text>
  <text x="667.5" y="370" font-size="8" fill="#555" text-anchor="middle">• Drift detection signals</text>
  <text x="667.5" y="384" font-size="8" fill="#555" text-anchor="middle">• Trigger retraining threshold</text>

  <!-- ===== Stage badges ===== -->
  <rect x="42" y="92" width="16" height="16" fill="#a31f34"/>
  <text x="50" y="103" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <rect x="242" y="92" width="16" height="16" fill="#a31f34"/>
  <text x="250" y="103" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <rect x="422" y="92" width="16" height="16" fill="#a31f34"/>
  <text x="430" y="103" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <rect x="602" y="92" width="16" height="16" fill="#a31f34"/>
  <text x="610" y="103" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">4</text>

  <!-- ===== Cloud-Edge boundary label ===== -->
  <rect x="376" y="188" width="28" height="46" fill="#fff" stroke="#e8e8e8" stroke-width="1"/>
  <text x="390" y="205" font-size="7.5" fill="#bbb" text-anchor="middle" font-style="italic">cloud</text>
  <text x="390" y="217" font-size="7.5" fill="#bbb" text-anchor="middle">–––</text>
  <text x="390" y="229" font-size="7.5" fill="#bbb" text-anchor="middle" font-style="italic">edge</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="390" y="446" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Telemetry loop enables continuous improvement without exposing raw user data to the cloud.</text>
</svg>