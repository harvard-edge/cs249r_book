<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 460">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <rect width="810" height="460" fill="#fff"/>

  <!-- Panel A: Local Only -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="230" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <rect x="0" y="0" width="230" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
    <rect x="0" y="18" width="230" height="12" fill="#fdebd0"/>
    <text x="115" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">A — Local Only</text>

    <!-- Device icon -->
    <rect x="85" y="55" width="60" height="90" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <rect x="93" y="64" width="44" height="64" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
    <circle cx="115" cy="136" r="4" fill="#c87b2a"/>
    <rect x="99" y="58" width="32" height="3" fill="#c87b2a"/>
    <text x="115" y="155" font-size="9" fill="#c87b2a" text-anchor="middle" font-weight="600">Device</text>

    <!-- Local training orthogonal loop -->
    <path d="M 115,74 L 160,74 L 160,114 L 115,114" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
    <text x="165" y="86" font-size="7.5" fill="#c87b2a" text-anchor="start">train</text>
    <text x="165" y="107" font-size="7.5" fill="#c87b2a" text-anchor="start">locally</text>

    <!-- Data stays on device annotation -->
    <rect x="20" y="195" width="190" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <text x="115" y="208" font-size="8.5" fill="#c87b2a" text-anchor="middle" font-weight="600">Raw data stays on device</text>
    <text x="115" y="220" font-size="8" fill="#c87b2a" text-anchor="middle">No external communication</text>

    <line x1="20" y1="235" x2="210" y2="235" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="115" y="250" font-size="8.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">+ Maximum privacy</text>
    <text x="115" y="265" font-size="8.5" fill="#3d9e5a" text-anchor="middle">+ Works fully offline</text>
    <text x="115" y="280" font-size="8.5" fill="#c44" text-anchor="middle">– No shared improvement</text>
    <text x="115" y="295" font-size="8.5" fill="#c44" text-anchor="middle">– Isolated learning only</text>

    <line x1="20" y1="310" x2="210" y2="310" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="115" y="325" font-size="8" fill="#999" text-anchor="middle">Latency: &lt;10 ms</text>
    <text x="115" y="340" font-size="8" fill="#999" text-anchor="middle">Privacy: maximum</text>
    <text x="115" y="355" font-size="8" fill="#999" text-anchor="middle">Comm. cost: zero</text>

    <rect x="20" y="365" width="190" height="26" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
    <text x="115" y="382" font-size="8.5" font-weight="600" fill="#c87b2a" text-anchor="middle">Isolated personalization</text>
  </g>

  <!-- Panel B: Centralized Cloud -->
  <g transform="translate(290, 20)">
    <rect x="0" y="0" width="230" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <rect x="0" y="0" width="230" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <rect x="0" y="18" width="230" height="12" fill="#cfe2f3"/>
    <text x="115" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">B — Centralized Cloud</text>

    <!-- 4 device icons at bottom -->
    <g transform="translate(0,130)">
      <!-- Device 1 -->
      <rect x="23" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="27" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="40" cy="47" r="2.5" fill="#c87b2a"/>
      <!-- Device 2 -->
      <rect x="73" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="77" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="90" cy="47" r="2.5" fill="#c87b2a"/>
      <!-- Device 3 -->
      <rect x="123" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="127" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="140" cy="47" r="2.5" fill="#c87b2a"/>
      <!-- Device 4 -->
      <rect x="173" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="177" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="190" cy="47" r="2.5" fill="#c87b2a"/>
    </g>

    <!-- Solid orthogonal arrows UP (raw data) -->
    <path d="M 40,130 L 40,115 L 54,115 L 54,68" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <path d="M 90,130 L 90,110 L 64,110 L 64,68" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <path d="M 140,130 L 140,110 L 166,110 L 166,68" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    <path d="M 190,130 L 190,115 L 176,115 L 176,68" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
    
    <text x="115" y="95" font-size="7.5" fill="#4a90c4" text-anchor="middle" font-weight="600">raw data</text>

    <!-- Cloud server -->
    <rect x="50" y="40" width="130" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="115" y="53" font-size="9" fill="#4a90c4" text-anchor="middle" font-weight="600">Cloud Server</text>
    <text x="115" y="64" font-size="8" fill="#4a90c4" text-anchor="middle">aggregates all data</text>

    <!-- Data stays annotation -->
    <rect x="20" y="195" width="190" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <text x="115" y="208" font-size="8.5" fill="#a31f34" text-anchor="middle" font-weight="600">Raw data leaves devices</text>
    <text x="115" y="220" font-size="8" fill="#a31f34" text-anchor="middle">Privacy risk — all data centralized</text>

    <line x1="20" y1="235" x2="210" y2="235" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="115" y="250" font-size="8.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">+ Best model quality</text>
    <text x="115" y="265" font-size="8.5" fill="#3d9e5a" text-anchor="middle">+ Simple coordination</text>
    <text x="115" y="280" font-size="8.5" fill="#c44" text-anchor="middle">– Low privacy</text>
    <text x="115" y="295" font-size="8.5" fill="#c44" text-anchor="middle">– Requires connectivity</text>

    <line x1="20" y1="310" x2="210" y2="310" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="115" y="325" font-size="8" fill="#999" text-anchor="middle">Latency: 100–500 ms</text>
    <text x="115" y="340" font-size="8" fill="#999" text-anchor="middle">Privacy: low</text>
    <text x="115" y="355" font-size="8" fill="#999" text-anchor="middle">Comm. cost: high</text>

    <rect x="20" y="365" width="190" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <text x="115" y="382" font-size="8.5" font-weight="600" fill="#a31f34" text-anchor="middle">Not viable for PII data</text>
  </g>

  <!-- Panel C: Federated -->
  <g transform="translate(560, 20)">
    <rect x="0" y="0" width="230" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <rect x="0" y="0" width="230" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <rect x="0" y="18" width="230" height="12" fill="#d4edda"/>
    <text x="115" y="20" font-size="11" font-weight="700" fill="#333" text-anchor="middle">C — Federated Learning</text>

    <!-- 4 device icons at bottom -->
    <g transform="translate(0,130)">
      <!-- Device 1 -->
      <rect x="23" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="27" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="40" cy="47" r="2.5" fill="#c87b2a"/>
      <!-- Device 2 -->
      <rect x="73" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="77" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="90" cy="47" r="2.5" fill="#c87b2a"/>
      <!-- Device 3 -->
      <rect x="123" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="127" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="140" cy="47" r="2.5" fill="#c87b2a"/>
      <!-- Device 4 -->
      <rect x="173" y="0" width="34" height="52" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <rect x="177" y="5" width="26" height="38" fill="#fff" stroke="#c87b2a" stroke-width="0.6"/>
      <circle cx="190" cy="47" r="2.5" fill="#c87b2a"/>
    </g>

    <!-- Dashed orthogonal arrows UP (model updates only) -->
    <path d="M 40,130 L 40,115 L 54,115 L 54,68" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
    <path d="M 90,130 L 90,110 L 64,110 L 64,68" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
    <path d="M 140,130 L 140,110 L 166,110 L 166,68" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
    <path d="M 190,130 L 190,115 L 176,115 L 176,68" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
    
    <text x="115" y="95" font-size="7.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">model updates Δw only</text>

    <!-- Aggregation server -->
    <rect x="50" y="40" width="130" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="115" y="53" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="600">Aggregation Server</text>
    <text x="115" y="64" font-size="8" fill="#3d9e5a" text-anchor="middle">FedAvg — no raw data</text>

    <!-- Raw data stays annotation -->
    <rect x="20" y="195" width="190" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
    <text x="115" y="208" font-size="8.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">Raw data stays on device</text>
    <text x="115" y="220" font-size="8" fill="#3d9e5a" text-anchor="middle">Only gradient updates shared</text>

    <line x1="20" y1="235" x2="210" y2="235" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="115" y="250" font-size="8.5" fill="#3d9e5a" text-anchor="middle" font-weight="600">+ Strong privacy</text>
    <text x="115" y="265" font-size="8.5" fill="#3d9e5a" text-anchor="middle">+ Collaborative improvement</text>
    <text x="115" y="280" font-size="8.5" fill="#c44" text-anchor="middle">– Non-IID data challenge</text>
    <text x="115" y="295" font-size="8.5" fill="#c44" text-anchor="middle">– Communication overhead</text>

    <line x1="20" y1="310" x2="210" y2="310" stroke="#e8e8e8" stroke-width="0.8"/>
    <text x="115" y="325" font-size="8" fill="#999" text-anchor="middle">Latency: 10–100 ms</text>
    <text x="115" y="340" font-size="8" fill="#999" text-anchor="middle">Privacy: high</text>
    <text x="115" y="355" font-size="8" fill="#999" text-anchor="middle">Comm. cost: low (Δw only)</text>

    <rect x="20" y="365" width="190" height="26" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
    <text x="115" y="382" font-size="8.5" font-weight="600" fill="#3d9e5a" text-anchor="middle">Privacy-preserving at scale</text>
  </g>

  <!-- Bottom annotation -->
  <text x="405" y="448" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Architectural evolution: from centralized data aggregation to privacy-preserving federated coordination.</text>
</svg>