<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">LoRA: Low-Rank Adaptation Architecture</text>

  <!-- ===== Input node ===== -->
  <rect x="30" y="185" width="80" height="90" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="70" y="226" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Input</text>
  <text x="70" y="241" font-size="8.5" fill="#555" text-anchor="middle">x ∈ ℝᵈ</text>
  <text x="70" y="256" font-size="8" fill="#999" text-anchor="middle">d = 768</text>

  <!-- Arrow from input split (horizontal line from right of input) -->
  <!-- Main path arrow (going to frozen weight) -->
  <line x1="110" y1="210" x2="175" y2="210" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Adapter path arrow (going down then right) -->
  <line x1="110" y1="250" x2="175" y2="330" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Main path: Frozen Weight matrix W ===== -->
  <!-- Large frozen weight block -->
  <rect x="178" y="148" width="160" height="122" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <!-- Internal weight grid (visual) -->
  <line x1="218" y1="148" x2="218" y2="270" stroke="#4a90c4" stroke-width="0.5" opacity="0.4"/>
  <line x1="258" y1="148" x2="258" y2="270" stroke="#4a90c4" stroke-width="0.5" opacity="0.4"/>
  <line x1="298" y1="148" x2="298" y2="270" stroke="#4a90c4" stroke-width="0.5" opacity="0.4"/>
  <line x1="178" y1="188" x2="338" y2="188" stroke="#4a90c4" stroke-width="0.5" opacity="0.4"/>
  <line x1="178" y1="228" x2="338" y2="228" stroke="#4a90c4" stroke-width="0.5" opacity="0.4"/>
  <text x="258" y="198" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">W</text>
  <text x="258" y="214" font-size="9" fill="#4a90c4" text-anchor="middle">Frozen Weights</text>
  <text x="258" y="230" font-size="8.5" fill="#4a90c4" text-anchor="middle">d × d = 768 × 768</text>
  <text x="258" y="245" font-size="8" fill="#555" text-anchor="middle">589,824 params</text>
  <text x="258" y="260" font-size="8" fill="#555" text-anchor="middle">FIXED — grad = 0</text>

  <!-- Frozen label badge -->
  <rect x="186" y="152" width="78" height="16" rx="6" fill="#a31f34"/>
  <text x="225" y="163" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">FROZEN</text>

  <!-- Arrow from W to output adder -->
  <line x1="338" y1="210" x2="450" y2="210" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ===== Adapter path: A and B matrices ===== -->

  <!-- Matrix A: d → r (down-projection) -->
  <rect x="178" y="310" width="90" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="223" y="342" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">A</text>
  <text x="223" y="357" font-size="8.5" fill="#3d9e5a" text-anchor="middle">d × r</text>
  <text x="223" y="371" font-size="8" fill="#555" text-anchor="middle">768 × 16</text>
  <text x="223" y="382" font-size="7.5" fill="#555" text-anchor="middle">12,288 params</text>

  <!-- Trainable label on A -->
  <rect x="184" y="314" width="64" height="14" rx="6" fill="#3d9e5a"/>
  <text x="223" y="324" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">TRAINABLE</text>

  <!-- Arrow A to B -->
  <line x1="268" y1="350" x2="306" y2="350" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- rank r label between A and B -->
  <rect x="274" y="337" width="28" height="16" rx="4" fill="#a31f34"/>
  <text x="288" y="348" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">r=16</text>

  <!-- Matrix B: r → d (up-projection) -->
  <rect x="308" y="310" width="90" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8"/>
  <text x="353" y="342" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">B</text>
  <text x="353" y="357" font-size="8.5" fill="#3d9e5a" text-anchor="middle">r × d</text>
  <text x="353" y="371" font-size="8" fill="#555" text-anchor="middle">16 × 768</text>
  <text x="353" y="382" font-size="7.5" fill="#555" text-anchor="middle">12,288 params</text>

  <!-- Trainable label on B -->
  <rect x="314" y="314" width="64" height="14" rx="6" fill="#3d9e5a"/>
  <text x="353" y="324" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">TRAINABLE</text>

  <!-- Arrow from B to adder -->
  <line x1="398" y1="350" x2="453" y2="240" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Scaling annotation on adapter path -->
  <text x="418" y="306" font-size="8" fill="#3d9e5a" text-anchor="middle">α/r</text>

  <!-- ===== Adder / Sum node ===== -->
  <circle cx="463" cy="210" r="20" fill="#fff" stroke="#555" stroke-width="2"/>
  <text x="463" y="207" font-size="12" fill="#333" text-anchor="middle" font-weight="700">+</text>
  <text x="463" y="220" font-size="7.5" fill="#555" text-anchor="middle">merge</text>

  <!-- Arrow from adder to output -->
  <line x1="483" y1="210" x2="555" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Output node ===== -->
  <rect x="558" y="185" width="90" height="90" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="603" y="222" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Output</text>
  <text x="603" y="237" font-size="8.5" fill="#555" text-anchor="middle">h' ∈ ℝᵈ</text>
  <text x="603" y="252" font-size="8" fill="#555" text-anchor="middle">W·x + BA·x</text>

  <!-- ===== Equation labels ===== -->
  <!-- Main path label -->
  <text x="258" y="138" font-size="9" fill="#4a90c4" text-anchor="middle" font-weight="700">Main Path: h = W·x</text>

  <!-- Adapter path label -->
  <text x="258" y="300" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="700">Adapter Path: ΔW·x = B·A·x</text>

  <!-- Combined equation -->
  <text x="463" y="172" font-size="9" fill="#333" text-anchor="middle" font-weight="700">h' = W·x + B·A·x</text>
  <text x="463" y="185" font-size="8" fill="#555" text-anchor="middle">(frozen + trainable)</text>

  <!-- ===== Parameter count comparison panel ===== -->
  <rect x="30" y="52" width="610" height="92" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="335" y="72" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Parameter Count Comparison (768×768 layer, rank r = 16)</text>

  <!-- Full fine-tuning bar -->
  <rect x="50" y="83" width="240" height="18" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="50" y="96" font-size="8.5" fill="#c44" text-anchor="start">Full fine-tuning</text>
  <text x="292" y="96" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">589,824 params</text>

  <!-- LoRA bar -->
  <rect x="50" y="107" width="14" height="18" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="50" y="120" font-size="8.5" fill="#3d9e5a" text-anchor="start">LoRA r=16</text>
  <text x="292" y="120" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="end">24,576 params</text>

  <!-- Reduction annotation -->
  <rect x="320" y="83" width="180" height="42" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="410" y="101" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">96% parameter reduction</text>
  <text x="410" y="116" font-size="8.5" fill="#333" text-anchor="middle">r(m+n) vs mn: 24,576 vs 589,824</text>

  <!-- Savings annotation -->
  <text x="518" y="101" font-size="9" fill="#555" text-anchor="middle">~24$\times$ fewer</text>
  <text x="518" y="116" font-size="8" fill="#999" text-anchor="middle">trainable params</text>
  <rect x="495" y="83" width="130" height="42" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="560" y="100" font-size="9" font-weight="700" fill="#2d7a2d" text-anchor="middle">24,576 params</text>
  <text x="560" y="114" font-size="8.5" fill="#333" text-anchor="middle">fits on-device</text>
  <text x="560" y="125" font-size="7.5" fill="#555" text-anchor="middle">~96 KB in FP32</text>

  <!-- ===== Path labels on arrows ===== -->
  <text x="143" y="202" font-size="8" fill="#4a90c4" font-weight="700">frozen</text>
  <text x="133" y="280" font-size="8" fill="#3d9e5a" font-weight="700">adapter</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="447" font-size="9" fill="#999" text-anchor="middle" font-style="italic">LoRA merges adapters at inference (W_final = W + BA), adding zero latency overhead.</text>
</svg>