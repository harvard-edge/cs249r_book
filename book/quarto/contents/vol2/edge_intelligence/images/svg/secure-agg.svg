<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="#fff"/>

  <!-- Shared mask label -->
  <text x="340" y="72" font-size="8.5" fill="#3d9e5a" text-anchor="middle" font-style="italic">Clients agree on shared random mask r via key agreement protocol</text>

  <!-- Client A box -->
  <rect x="30" y="30" width="170" height="380" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="30" y="30" width="170" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="30" y="46" width="170" height="14" fill="#cfe2f3"/>
  <text x="115" y="50" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Client A</text>

  <!-- Client A weights -->
  <rect x="50" y="80" width="130" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="115" y="96" font-size="9" fill="#4a90c4" text-anchor="middle" font-weight="600">Model weights</text>
  <text x="115" y="112" font-size="10" fill="#4a90c4" text-anchor="middle" font-family="monospace">w_A</text>

  <!-- Random mask r -->
  <rect x="50" y="140" width="130" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="115" y="156" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="600">Random mask</text>
  <text x="115" y="172" font-size="10" fill="#3d9e5a" text-anchor="middle" font-family="monospace">r (shared secret)</text>

  <!-- Plus operation -->
  <text x="115" y="200" font-size="12" fill="#4a90c4" text-anchor="middle">+</text>

  <!-- Result: w_A + r -->
  <rect x="50" y="220" width="130" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="236" font-size="9" fill="#4a90c4" text-anchor="middle" font-weight="600">Masked update</text>
  <text x="115" y="252" font-size="10" fill="#4a90c4" text-anchor="middle" font-family="monospace">w_A + r</text>

  <!-- Arrow from client A to server -->
  <line x1="200" y1="240" x2="282" y2="240" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="241" y="232" font-size="8.5" fill="#4a90c4" text-anchor="middle" font-weight="600">sends</text>
  <text x="241" y="254" font-size="8.5" fill="#4a90c4" text-anchor="middle" font-family="monospace">w_A + r</text>

  <!-- Privacy annotation for A -->
  <rect x="50" y="284" width="130" height="52" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="115" y="302" font-size="8" fill="#a31f34" text-anchor="middle" font-weight="600">Server sees only</text>
  <text x="115" y="316" font-size="8" fill="#a31f34" text-anchor="middle" font-family="monospace">w_A + r</text>
  <text x="115" y="328" font-size="7.5" fill="#a31f34" text-anchor="middle">Not w_A alone</text>

  <!-- Client B box -->
  <rect x="480" y="30" width="170" height="380" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="480" y="30" width="170" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="480" y="46" width="170" height="14" fill="#fdebd0"/>
  <text x="565" y="50" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Client B</text>

  <!-- Client B weights -->
  <rect x="500" y="80" width="130" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="565" y="96" font-size="9" fill="#c87b2a" text-anchor="middle" font-weight="600">Model weights</text>
  <text x="565" y="112" font-size="10" fill="#c87b2a" text-anchor="middle" font-family="monospace">w_B</text>

  <!-- Same mask r -->
  <rect x="500" y="140" width="130" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="565" y="156" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="600">Same random mask</text>
  <text x="565" y="172" font-size="10" fill="#3d9e5a" text-anchor="middle" font-family="monospace">r (shared secret)</text>

  <!-- Minus operation -->
  <text x="565" y="200" font-size="12" fill="#c87b2a" text-anchor="middle">–</text>

  <!-- Result: w_B - r -->
  <rect x="500" y="220" width="130" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="565" y="236" font-size="9" fill="#c87b2a" text-anchor="middle" font-weight="600">Masked update</text>
  <text x="565" y="252" font-size="10" fill="#c87b2a" text-anchor="middle" font-family="monospace">w_B – r</text>

  <!-- Arrow from client B to server -->
  <line x1="480" y1="240" x2="398" y2="240" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="439" y="232" font-size="8.5" fill="#c87b2a" text-anchor="middle" font-weight="600">sends</text>
  <text x="439" y="254" font-size="8.5" fill="#c87b2a" text-anchor="middle" font-family="monospace">w_B – r</text>

  <!-- Privacy annotation for B -->
  <rect x="500" y="284" width="130" height="52" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="565" y="302" font-size="8" fill="#a31f34" text-anchor="middle" font-weight="600">Server sees only</text>
  <text x="565" y="316" font-size="8" fill="#a31f34" text-anchor="middle" font-family="monospace">w_B – r</text>
  <text x="565" y="328" font-size="7.5" fill="#a31f34" text-anchor="middle">Not w_B alone</text>

  <!-- Server box (center) -->
  <rect x="282" y="90" width="116" height="210" fill="#f7f7f7" stroke="#999" stroke-width="1.5"/>
  <rect x="282" y="90" width="116" height="28" fill="#e0e0e0" stroke="#999" stroke-width="1.5"/>
  <rect x="282" y="106" width="116" height="12" fill="#e0e0e0"/>
  <text x="340" y="108" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Server</text>

  <!-- Server receives both -->
  <rect x="302" y="130" width="76" height="32" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="340" y="150" font-size="8" fill="#4a90c4" text-anchor="middle" font-family="monospace">w_A + r</text>

  <rect x="302" y="172" width="76" height="32" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="340" y="192" font-size="8" fill="#c87b2a" text-anchor="middle" font-family="monospace">w_B – r</text>

  <!-- Sum symbol -->
  <text x="340" y="220" font-size="12" fill="#333" text-anchor="middle">Σ</text>

  <!-- Aggregated result -->
  <rect x="302" y="238" width="76" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="340" y="254" font-size="7.5" fill="#3d9e5a" text-anchor="middle" font-weight="600" font-family="monospace">w_A + w_B</text>
  <text x="340" y="268" font-size="7.5" fill="#3d9e5a" text-anchor="middle">(masks cancel)</text>

  <!-- Arrow server to result -->
  <line x1="340" y1="300" x2="340" y2="320" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Algebraic proof panel -->
  <rect x="220" y="320" width="240" height="100" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="220" y="320" width="240" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="220" y="336" width="240" height="12" fill="#d4edda"/>
  <text x="340" y="338" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Mask Cancellation</text>

  <rect x="240" y="358" width="200" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="372" font-size="9" fill="#333" text-anchor="middle" font-family="monospace">(w_A + r) + (w_B – r)</text>
  <text x="340" y="386" font-size="9" fill="#333" text-anchor="middle" font-family="monospace">= w_A + w_B + (r – r)</text>
  <text x="340" y="400" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="700" font-family="monospace">= w_A + w_B ✓</text>

  <!-- Privacy guarantee box -->
  <rect x="180" y="440" width="320" height="44" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="340" y="458" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Individual contributions hidden from server</text>
  <text x="340" y="474" font-size="8.5" fill="#c44" text-anchor="middle">Server learns only the aggregate w_A + w_B, not individual w_A or w_B</text>
</svg>