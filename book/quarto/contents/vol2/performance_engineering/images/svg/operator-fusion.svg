<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-up" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-right" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-right-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-down-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-up-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="680" height="490" fill="#fff"/>

  <!-- ===== SECTION A: UNFUSED (top half) ===== -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#a31f34">(a) Unfused: 6 HBM round-trips</text>

  <!-- HBM bar top -->
  <rect x="40" y="40" width="600" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="340" y="54" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">HBM (Off-chip Memory)</text>

  <!-- Kernel 1: LayerNorm -->
  <rect x="100" y="100" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="160" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">LayerNorm</text>
  <text x="160" y="128" text-anchor="middle" font-size="9" fill="#555">Kernel 1</text>

  <!-- HBM read arrow into K1 -->
  <line x1="130" y1="60" x2="130" y2="100" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <text x="120" y="84" font-size="8" fill="#c44" text-anchor="end">Read</text>
  <!-- HBM write arrow out of K1 -->
  <line x1="190" y1="100" x2="190" y2="60" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-up)"/>
  <text x="200" y="84" font-size="8" fill="#c44">Write</text>

  <!-- Kernel 2: GeLU -->
  <rect x="280" y="100" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="340" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GeLU</text>
  <text x="340" y="128" text-anchor="middle" font-size="9" fill="#555">Kernel 2</text>

  <!-- HBM read arrow into K2 -->
  <line x1="310" y1="60" x2="310" y2="100" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <text x="300" y="84" font-size="8" fill="#c44" text-anchor="end">Read</text>
  <!-- HBM write arrow out of K2 -->
  <line x1="370" y1="100" x2="370" y2="60" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-up)"/>
  <text x="380" y="84" font-size="8" fill="#c44">Write</text>

  <!-- Kernel 3: Linear -->
  <rect x="460" y="100" width="120" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="520" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Linear</text>
  <text x="520" y="128" text-anchor="middle" font-size="9" fill="#555">Kernel 3</text>

  <!-- HBM read arrow into K3 -->
  <line x1="490" y1="60" x2="490" y2="100" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <text x="480" y="84" font-size="8" fill="#c44" text-anchor="end">Read</text>
  <!-- HBM write arrow out of K3 -->
  <line x1="550" y1="100" x2="550" y2="60" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-up)"/>
  <text x="560" y="84" font-size="8" fill="#c44">Write</text>

  <!-- Flow arrows between kernels -->
  <line x1="220" y1="120" x2="280" y2="120" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-right)"/>
  <line x1="400" y1="120" x2="460" y2="120" stroke="#555" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-right)"/>

  <!-- Cost annotation unfused -->
  <rect x="100" y="160" width="480" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <text x="340" y="174" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Total: 3 Reads + 3 Writes = 6 HBM transfers (each ~3.35 TB/s limited)</text>

  <!-- Separator -->
  <line x1="30" y1="200" x2="650" y2="200" stroke="#bbb" stroke-width="1"/>

  <!-- ===== SECTION B: FUSED (bottom half) ===== -->
  <text x="340" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">(b) Fused: 2 HBM round-trips</text>

  <!-- HBM bar top -->
  <rect x="40" y="240" width="600" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="340" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">HBM (Off-chip Memory)</text>

  <!-- Single fused kernel -->
  <rect x="140" y="300" width="400" height="90" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="340" y="319" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Fused Kernel: LayerNorm + GeLU + Linear</text>
  <text x="340" y="334" text-anchor="middle" font-size="9.5" fill="#555">Intermediates stay in SRAM / registers (20 ns access, 0.5 pJ)</text>

  <!-- Single HBM read arrow -->
  <line x1="240" y1="260" x2="240" y2="300" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-down-green)"/>
  <text x="230" y="284" font-size="9" fill="#3d9e5a" text-anchor="end" font-weight="700">1 Read</text>

  <!-- Single HBM write arrow -->
  <line x1="440" y1="300" x2="440" y2="260" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-up-green)"/>
  <text x="450" y="284" font-size="9" fill="#3d9e5a" font-weight="700">1 Write</text>

  <!-- Internal data flow arrows inside fused kernel -->
  <text x="200" y="353" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">LN</text>
  <line x1="230" y1="350" x2="310" y2="350" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-right-green)"/>
  <text x="340" y="353" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">GeLU</text>
  <line x1="370" y1="350" x2="450" y2="350" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-right-green)"/>
  <text x="480" y="353" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">Linear</text>

  <!-- SRAM label inside -->
  <rect x="240" y="360" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="270" y="374" text-anchor="middle" font-size="7.5" fill="#3d9e5a" font-weight="700">SRAM</text>
  <rect x="380" y="360" width="60" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="410" y="374" text-anchor="middle" font-size="7.5" fill="#3d9e5a" font-weight="700">SRAM</text>

  <!-- Cost annotation fused -->
  <rect x="140" y="410" width="400" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="340" y="424" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Total: 1 Read + 1 Write = 2 HBM transfers (3x reduction)</text>

  <!-- Comparison annotation at bottom -->
  <rect x="140" y="450" width="400" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>
  <text x="340" y="464" text-anchor="middle" font-size="9" fill="#555" font-style="italic">HBM access: ~640 pJ/access, ~300 ns latency | SRAM access: ~0.5 pJ, ~20 ns</text>

</svg>