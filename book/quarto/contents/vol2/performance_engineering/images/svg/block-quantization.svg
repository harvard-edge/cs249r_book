<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Block-Wise vs. Per-Tensor Quantization</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Outlier features in LLMs require per-group scale factors to prevent accuracy loss</text>

  <!-- ===== Vertical divider ===== -->
  <line x1="340" y1="52" x2="340" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ====================================================================== -->
  <!-- LEFT PANEL: Per-Tensor Quantization                                    -->
  <!-- ====================================================================== -->
  <text x="170" y="64" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Per-Tensor Quantization</text>
  <text x="170" y="78" text-anchor="middle" font-size="9" fill="#c44">One scale for entire tensor</text>

  <!-- Original tensor values (FP16) -->
  <text x="50" y="100" font-size="9" font-weight="700" fill="#555">Weight tensor (FP16):</text>

  <!-- Weight cells — all cells except one outlier (normal values ~0.1) -->
  <!-- Row 1 -->
  <rect x="30" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="48" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.12</text>
  <rect x="68" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="86" y="124" text-anchor="middle" font-size="7.5" fill="#333">-0.08</text>
  <rect x="106" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="124" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.21</text>
  <!-- Outlier -->
  <rect x="144" y="106" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="162" y="124" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">58.7</text>
  <rect x="182" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="200" y="124" text-anchor="middle" font-size="7.5" fill="#333">-0.15</text>
  <rect x="220" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="238" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.09</text>
  <rect x="258" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="276" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.33</text>
  <rect x="296" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="314" y="124" text-anchor="middle" font-size="7.5" fill="#333">-0.07</text>

  <!-- Single scale bracket -->
  <rect x="30" y="144" width="302" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="181" y="159" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">Single scale S = max / 127 = 58.7 / 127 ≈ 0.462</text>

  <!-- Arrow down -->
  <line x1="181" y1="168" x2="181" y2="186" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Quantized values INT8 — all normal values crushed near zero -->
  <text x="50" y="202" font-size="9" font-weight="700" fill="#555">Quantized (INT8):</text>
  <rect x="30" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="48" y="226" text-anchor="middle" font-size="7.5" fill="#c44">0</text>
  <rect x="68" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="86" y="226" text-anchor="middle" font-size="7.5" fill="#c44">0</text>
  <rect x="106" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="124" y="226" text-anchor="middle" font-size="7.5" fill="#c44">0</text>
  <rect x="144" y="208" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="162" y="226" text-anchor="middle" font-size="7.5" fill="#333">127</text>
  <rect x="182" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="200" y="226" text-anchor="middle" font-size="7.5" fill="#c44">0</text>
  <rect x="220" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="238" y="226" text-anchor="middle" font-size="7.5" fill="#c44">0</text>
  <rect x="258" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="276" y="226" text-anchor="middle" font-size="7.5" fill="#c44">1</text>
  <rect x="296" y="208" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="314" y="226" text-anchor="middle" font-size="7.5" fill="#c44">0</text>

  <!-- Error annotation -->
  <rect x="30" y="248" width="302" height="44" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="181" y="264" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Outlier crushes precision for all others</text>
  <text x="181" y="279" text-anchor="middle" font-size="8" fill="#555">Normal weights quantize to 0. Accuracy collapses.</text>
  <text x="181" y="292" text-anchor="middle" font-size="8" fill="#555">MMLU can drop from 69% → below 64% on 70B models.</text>

  <!-- Red X badge -->
  <circle cx="181" cy="316" r="14" fill="#c44"/>
  <text x="181" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">✗</text>
  <text x="181" y="338" text-anchor="middle" font-size="9" fill="#c44" font-weight="700">Poor accuracy</text>

  <!-- ====================================================================== -->
  <!-- RIGHT PANEL: Block-Wise Quantization                                   -->
  <!-- ====================================================================== -->
  <text x="510" y="64" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Block-Wise Quantization</text>
  <text x="510" y="78" text-anchor="middle" font-size="9" fill="#3d9e5a">Per-group scale, size B=4 (illustrative)</text>

  <!-- Original tensor values (same as left) -->
  <text x="390" y="100" font-size="9" font-weight="700" fill="#555">Weight tensor (FP16):</text>

  <!-- Block 1: cells 1-4 (normal weights) -->
  <rect x="370" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="388" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.12</text>
  <rect x="408" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="426" y="124" text-anchor="middle" font-size="7.5" fill="#333">-0.08</text>
  <rect x="446" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="464" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.21</text>
  <!-- Outlier in block 2 -->
  <rect x="484" y="106" width="36" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="502" y="124" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c44">58.7</text>
  <!-- Block 2 continues -->
  <rect x="522" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="540" y="124" text-anchor="middle" font-size="7.5" fill="#333">-0.15</text>
  <rect x="560" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="578" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.09</text>
  <rect x="598" y="106" width="36" height="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="616" y="124" text-anchor="middle" font-size="7.5" fill="#333">0.33</text>
  <rect x="636" y="106" width="24" height="28" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="648" y="124" text-anchor="middle" font-size="7.5" fill="#999">…</text>

  <!-- Block 1 bracket -->
  <rect x="370" y="144" width="148" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="444" y="156" text-anchor="middle" font-size="7.5" font-weight="700" fill="#3d9e5a">S₁ = 0.21/127 ≈ 0.002</text>
  <!-- Block 2 bracket -->
  <rect x="522" y="144" width="138" height="18" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="591" y="156" text-anchor="middle" font-size="7.5" font-weight="700" fill="#c87b2a">S₂ = 58.7/127 ≈ 0.462</text>

  <!-- Block boundary marker -->
  <line x1="521" y1="104" x2="521" y2="164" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="521" y="102" text-anchor="middle" font-size="7.5" fill="#555">block split</text>

  <!-- Arrow down -->
  <line x1="510" y1="164" x2="510" y2="186" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Quantized values INT8 — block 1 normal, block 2 with outlier preserved -->
  <text x="390" y="202" font-size="9" font-weight="700" fill="#555">Quantized (INT8):</text>
  <!-- Block 1 quantized — good precision -->
  <rect x="370" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="388" y="226" text-anchor="middle" font-size="7.5" fill="#333">61</text>
  <rect x="408" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="426" y="226" text-anchor="middle" font-size="7.5" fill="#333">-41</text>
  <rect x="446" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="464" y="226" text-anchor="middle" font-size="7.5" fill="#333">107</text>
  <!-- Block 2 — outlier preserved, others still reasonable -->
  <rect x="484" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="502" y="226" text-anchor="middle" font-size="7.5" fill="#333">127</text>
  <rect x="522" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="540" y="226" text-anchor="middle" font-size="7.5" fill="#333">-32</text>
  <rect x="560" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="578" y="226" text-anchor="middle" font-size="7.5" fill="#333">19</text>
  <rect x="598" y="208" width="36" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="616" y="226" text-anchor="middle" font-size="7.5" fill="#333">71</text>
  <rect x="636" y="208" width="24" height="28" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="648" y="226" text-anchor="middle" font-size="7.5" fill="#999">…</text>

  <!-- Success annotation -->
  <rect x="370" y="248" width="290" height="44" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="515" y="264" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Outlier damage contained within its block</text>
  <text x="515" y="279" text-anchor="middle" font-size="8" fill="#555">Block 1 has full INT8 precision. Block 2 handles outlier.</text>
  <text x="515" y="292" text-anchor="middle" font-size="8" fill="#555">Overhead: 1 FP16 scale per B=64 weights ≈ 1.6% extra.</text>

  <!-- Green check badge -->
  <circle cx="515" cy="316" r="14" fill="#3d9e5a"/>
  <text x="515" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">✓</text>
  <text x="515" y="338" text-anchor="middle" font-size="9" fill="#3d9e5a" font-weight="700">Accuracy preserved</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="352.0" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Block-wise quantization (LLM.int8(), GPTQ, AWQ) isolates outlier damage. Block size B=64 is standard; smaller B reduces error but increases metadata.</text>

  <!-- ===== Comparison labels at bottom of panels ===== -->
  <text x="170" y="362" text-anchor="middle" font-size="9" fill="#555">4-bit effective precision wasted</text>
  <text x="510" y="362" text-anchor="middle" font-size="9" fill="#555">4.25-bit effective (4 + 16/64 overhead)</text>
</svg>