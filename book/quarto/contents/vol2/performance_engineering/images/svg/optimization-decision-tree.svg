<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500">
  <rect width="720" height="500" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Optimization Playbook Decision Tree</text>
  <text x="360" y="44" text-anchor="middle" font-size="9" fill="#555">Profile first, then apply the right technique for the identified bottleneck</text>

  <!-- ===== ROOT: Identify Bottleneck ===== -->
  <rect x="260" y="60" width="200" height="40" fill="#f7f7f7" stroke="#555" stroke-width="1.5"/>
  <text x="360" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Profile Workload</text>
  <text x="360" y="90" text-anchor="middle" font-size="8.5" fill="#555">Nsight Systems · PyTorch Profiler</text>

  <!-- Down arrow from root -->
  <path d="M 360 100 V 119" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision Box -->
  <rect x="280" y="120" width="160" height="40" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="136" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bottleneck?</text>
  <text x="360" y="150" text-anchor="middle" font-size="8" fill="#555">Identify dominant term</text>

  <!-- ===== THREE BRANCHES ===== -->

  <!-- Branch left: Memory Bound (Data Green) -->
  <path d="M 360 160 v 10 H 110 V 189" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="230" y="154" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">Memory Bound</text>
  <text x="230" y="164" text-anchor="middle" font-size="7.5" fill="#3d9e5a">MBU high, MFU low</text>

  <!-- Branch center: Compute Bound (Compute Blue) -->
  <path d="M 360 160 V 189" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="370" y="174" text-anchor="start" font-size="8" fill="#4a90c4" font-weight="700">Compute</text>
  <text x="370" y="184" text-anchor="start" font-size="7.5" fill="#4a90c4">Bound</text>

  <!-- Branch right: Communication Bound (Routing Orange) -->
  <path d="M 360 160 v 10 H 610 V 189" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="490" y="154" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="700">Communication</text>
  <text x="490" y="164" text-anchor="middle" font-size="7.5" fill="#c87b2a">Bound</text>

  <!-- ===== LEFT BRANCH: Memory Bound box (Data Green) ===== -->
  <rect x="20" y="190" width="180" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="110" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Memory Bound</text>
  <text x="110" y="214" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Reduce bytes moved</text>

  <path d="M 110 220 V 239" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="20" y="240" width="180" height="180" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="110" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Techniques:</text>

  <rect x="30" y="270" width="160" height="20" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="110" y="284" text-anchor="middle" font-size="7.5" fill="#333">Operator fusion (FlashAttention)</text>

  <rect x="30" y="300" width="160" height="20" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="110" y="314" text-anchor="middle" font-size="7.5" fill="#333">FP8 / INT4 quantization</text>

  <rect x="30" y="330" width="160" height="20" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="110" y="344" text-anchor="middle" font-size="7.5" fill="#333">KV cache compression</text>

  <rect x="30" y="360" width="160" height="20" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="110" y="374" text-anchor="middle" font-size="7.5" fill="#333">Increase batch size</text>

  <rect x="30" y="390" width="160" height="20" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="110" y="404" text-anchor="middle" font-size="7.5" fill="#333">Paged KV cache (vLLM)</text>

  <rect x="20" y="430" width="180" height="30" fill="#a31f34"/>
  <text x="110" y="448" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Expected: 2–65× speedup</text>

  <!-- ===== CENTER BRANCH: Compute Bound box (Compute Blue) ===== -->
  <rect x="270" y="190" width="180" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="360" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compute Bound</text>
  <text x="360" y="214" text-anchor="middle" font-size="7.5" fill="#4a90c4">Reduce FLOP count</text>

  <path d="M 360 220 V 239" fill="none" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <rect x="270" y="240" width="180" height="180" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="360" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Techniques:</text>

  <rect x="280" y="270" width="160" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="360" y="284" text-anchor="middle" font-size="7.5" fill="#333">Mixed-precision (FP8 Tensor Cores)</text>

  <rect x="280" y="300" width="160" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="360" y="314" text-anchor="middle" font-size="7.5" fill="#333">Speculative decoding</text>

  <rect x="280" y="330" width="160" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="360" y="344" text-anchor="middle" font-size="7.5" fill="#333">Mixture of Experts (sparse)</text>

  <rect x="280" y="360" width="160" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="360" y="374" text-anchor="middle" font-size="7.5" fill="#333">Pruning / distillation</text>

  <rect x="280" y="390" width="160" height="20" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="360" y="404" text-anchor="middle" font-size="7.5" fill="#333">torch.compile (max-autotune)</text>

  <rect x="270" y="430" width="180" height="30" fill="#a31f34"/>
  <text x="360" y="448" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Expected: 1.4–2× speedup</text>

  <!-- ===== RIGHT BRANCH: Communication Bound box (Routing Orange) ===== -->
  <rect x="520" y="190" width="180" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="610" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Comm. Bound</text>
  <text x="610" y="214" text-anchor="middle" font-size="7.5" fill="#c87b2a">Reduce or overlap comm.</text>

  <path d="M 610 220 V 239" fill="none" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <rect x="520" y="240" width="180" height="180" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="610" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Techniques:</text>

  <rect x="530" y="270" width="160" height="20" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="610" y="284" text-anchor="middle" font-size="7.5" fill="#333">Gradient compression (TopK)</text>

  <rect x="530" y="300" width="160" height="20" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="610" y="314" text-anchor="middle" font-size="7.5" fill="#333">Comm-compute overlap (DDP)</text>

  <rect x="530" y="330" width="160" height="20" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="610" y="344" text-anchor="middle" font-size="7.5" fill="#333">FSDP ZeRO-3 reduce comm.</text>

  <rect x="530" y="360" width="160" height="20" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="610" y="374" text-anchor="middle" font-size="7.5" fill="#333">NVLink vs InfiniBand topology</text>

  <rect x="530" y="390" width="160" height="20" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="610" y="404" text-anchor="middle" font-size="7.5" fill="#333">Pipeline parallelism schedule</text>

  <rect x="520" y="430" width="180" height="30" fill="#a31f34"/>
  <text x="610" y="448" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Expected: 1.2–1.5× speedup</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="360" y="480" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Always verify improvement via end-to-end reprofile. Fixing one bottleneck exposes the next. The playbook is iterative.</text>
</svg>