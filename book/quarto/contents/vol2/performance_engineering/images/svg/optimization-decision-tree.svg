<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Optimization Playbook Decision Tree</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Profile first, then apply the right technique for the identified bottleneck</text>

  <!-- ===== ROOT: Identify Bottleneck ===== -->
  <rect x="245" y="56" width="190" height="42" fill="#f7f7f7" stroke="#555" stroke-width="2.0" rx="4"/>
  <text x="340" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Profile Workload</text>
  <text x="340" y="88" text-anchor="middle" font-size="8.5" fill="#555">Nsight Systems · PyTorch Profiler</text>

  <!-- Down arrow from root -->
  <line x1="340" y1="98" x2="340" y2="116" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond decision -->
  <polygon points="340,118 430,140 340,162 250,140" fill="#f7f7f7" stroke="#333" stroke-width="1.5"/>
  <text x="340" y="136" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bottleneck?</text>
  <text x="340" y="150" text-anchor="middle" font-size="8" fill="#555">Identify dominant term</text>

  <!-- ===== THREE BRANCHES ===== -->

  <!-- Branch left: Memory Bound -->
  <line x1="250" y1="140" x2="100" y2="140" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="100" y1="140" x2="100" y2="186" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="175" y="124" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">Memory Bound</text>
  <text x="175" y="134" text-anchor="middle" font-size="7.5" fill="#4a90c4">MBU high, MFU low</text>

  <!-- Branch center: Compute Bound -->
  <line x1="340" y1="162" x2="340" y2="186" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="360" y="178" font-size="8" fill="#3d9e5a" font-weight="700">Compute</text>
  <text x="360" y="188" font-size="7.5" fill="#3d9e5a">Bound</text>

  <!-- Branch right: Communication Bound -->
  <line x1="430" y1="140" x2="580" y2="140" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="580" y1="140" x2="580" y2="186" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="505" y="124" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="700">Communication</text>
  <text x="505" y="134" text-anchor="middle" font-size="7.5" fill="#c87b2a">Bound</text>

  <!-- ===== LEFT BRANCH: Memory Bound box ===== -->
  <rect x="26" y="188" width="148" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="100" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Memory Bound</text>
  <text x="100" y="216" text-anchor="middle" font-size="7.5" fill="#4a90c4">Reduce bytes moved</text>

  <!-- Memory bound actions -->
  <line x1="100" y1="218" x2="100" y2="236" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arr-blue)"/>
  <rect x="26" y="238" width="148" height="150" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0" rx="4"/>
  <!-- Techniques list -->
  <text x="100" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Techniques:</text>
  <!-- Item 1 -->
  <rect x="32" y="260" width="136" height="18" fill="#fff" stroke="#4a90c4" stroke-width="0.8" rx="4"/>
  <text x="100" y="272" text-anchor="middle" font-size="7.5" fill="#333">Operator fusion (FlashAttention)</text>
  <!-- Item 2 -->
  <rect x="32" y="281" width="136" height="18" fill="#fff" stroke="#4a90c4" stroke-width="0.8" rx="4"/>
  <text x="100" y="293" text-anchor="middle" font-size="7.5" fill="#333">FP8 / INT4 quantization</text>
  <!-- Item 3 -->
  <rect x="32" y="302" width="136" height="18" fill="#fff" stroke="#4a90c4" stroke-width="0.8" rx="4"/>
  <text x="100" y="314" text-anchor="middle" font-size="7.5" fill="#333">KV cache compression</text>
  <!-- Item 4 -->
  <rect x="32" y="323" width="136" height="18" fill="#fff" stroke="#4a90c4" stroke-width="0.8" rx="4"/>
  <text x="100" y="335" text-anchor="middle" font-size="7.5" fill="#333">Increase batch size</text>
  <!-- Item 5 -->
  <rect x="32" y="344" width="136" height="18" fill="#fff" stroke="#4a90c4" stroke-width="0.8" rx="4"/>
  <text x="100" y="356" text-anchor="middle" font-size="7.5" fill="#333">Paged KV cache (vLLM)</text>
  <!-- Expected gain -->
  <rect x="26" y="397" width="148" height="24" fill="#a31f34" rx="4"/>
  <text x="100" y="412" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Expected: 2–65× speedup</text>

  <!-- ===== CENTER BRANCH: Compute Bound box ===== -->
  <rect x="265" y="188" width="150" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="340" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compute Bound</text>
  <text x="340" y="216" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Reduce FLOP count</text>

  <line x1="340" y1="218" x2="340" y2="236" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <rect x="265" y="238" width="150" height="150" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <text x="340" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Techniques:</text>
  <rect x="271" y="260" width="138" height="18" fill="#fff" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="340" y="272" text-anchor="middle" font-size="7.5" fill="#333">Mixed-precision (FP8 Tensor Cores)</text>
  <rect x="271" y="281" width="138" height="18" fill="#fff" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="340" y="293" text-anchor="middle" font-size="7.5" fill="#333">Speculative decoding</text>
  <rect x="271" y="302" width="138" height="18" fill="#fff" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="340" y="314" text-anchor="middle" font-size="7.5" fill="#333">Mixture of Experts (sparse)</text>
  <rect x="271" y="323" width="138" height="18" fill="#fff" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="340" y="335" text-anchor="middle" font-size="7.5" fill="#333">Pruning / distillation</text>
  <rect x="271" y="344" width="138" height="18" fill="#fff" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="340" y="356" text-anchor="middle" font-size="7.5" fill="#333">torch.compile (max-autotune)</text>
  <rect x="265" y="397" width="150" height="24" fill="#a31f34" rx="4"/>
  <text x="340" y="412" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Expected: 1.4–2× speedup</text>

  <!-- ===== RIGHT BRANCH: Communication Bound box ===== -->
  <rect x="506" y="188" width="148" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
  <text x="580" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Comm. Bound</text>
  <text x="580" y="216" text-anchor="middle" font-size="7.5" fill="#c87b2a">Reduce or overlap comm.</text>

  <line x1="580" y1="218" x2="580" y2="236" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arr-orange)"/>
  <rect x="506" y="238" width="148" height="150" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.0" rx="4"/>
  <text x="580" y="256" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Techniques:</text>
  <rect x="512" y="260" width="136" height="18" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="580" y="272" text-anchor="middle" font-size="7.5" fill="#333">Gradient compression (TopK)</text>
  <rect x="512" y="281" width="136" height="18" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="580" y="293" text-anchor="middle" font-size="7.5" fill="#333">Comm-compute overlap (DDP)</text>
  <rect x="512" y="302" width="136" height="18" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="580" y="314" text-anchor="middle" font-size="7.5" fill="#333">FSDP ZeRO-3 reduce comm.</text>
  <rect x="512" y="323" width="136" height="18" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="580" y="335" text-anchor="middle" font-size="7.5" fill="#333">NVLink vs InfiniBand topology</text>
  <rect x="512" y="344" width="136" height="18" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="580" y="356" text-anchor="middle" font-size="7.5" fill="#333">Pipeline parallelism schedule</text>
  <rect x="506" y="397" width="148" height="24" fill="#a31f34" rx="4"/>
  <text x="580" y="412" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">Expected: 1.2–1.5× speedup</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Always verify improvement via end-to-end reprofile. Fixing one bottleneck exposes the next. The playbook is iterative.</text>
</svg>