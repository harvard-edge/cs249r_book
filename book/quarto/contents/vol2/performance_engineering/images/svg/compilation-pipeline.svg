<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 510" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="720" height="510" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="360" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ML Compilation Pipeline</text>
  <text x="360" y="45" text-anchor="middle" font-size="9" fill="#555">From high-level Python to hardware-optimized kernels — each stage reduces overhead</text>

  <!-- ===== Input: Python model ===== -->
  <rect x="20" y="60" width="140" height="100" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="90" y="95" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Python Model</text>
  <text x="90" y="115" text-anchor="middle" font-size="8" fill="#555">LayerNorm(</text>
  <text x="90" y="125" text-anchor="middle" font-size="8" fill="#555">  GELU(Linear(x)))</text>
  <text x="90" y="140" text-anchor="middle" font-size="8" fill="#999">eager execution</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="110" x2="200" y2="110" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ===== Stage 1: Graph Capture ===== -->
  <rect x="200" y="60" width="140" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="245" y="70" width="50" height="16" rx="4" fill="#a31f34"/>
  <text x="270" y="81" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 1</text>
  <text x="270" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Graph Capture</text>
  <text x="270" y="120" text-anchor="middle" font-size="8" fill="#555">TorchDynamo /</text>
  <text x="270" y="130" text-anchor="middle" font-size="8" fill="#555">torch.compile / XLA</text>
  <text x="270" y="140" text-anchor="middle" font-size="8" fill="#555">trace → DAG</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="110" x2="380" y2="110" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ===== Stage 2: Graph Optimization ===== -->
  <rect x="380" y="60" width="140" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="425" y="70" width="50" height="16" rx="4" fill="#a31f34"/>
  <text x="450" y="81" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 2</text>
  <text x="450" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Graph Optimization</text>
  <text x="450" y="120" text-anchor="middle" font-size="8" fill="#555">CSE · DCE</text>
  <text x="450" y="130" text-anchor="middle" font-size="8" fill="#555">constant folding</text>
  <text x="450" y="140" text-anchor="middle" font-size="8" fill="#555">bias fold · 10–30% fewer ops</text>

  <!-- Arrow 3 -->
  <line x1="520" y1="110" x2="560" y2="110" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ===== Stage 3: Operator Fusion ===== -->
  <rect x="560" y="60" width="140" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="605" y="70" width="50" height="16" rx="4" fill="#a31f34"/>
  <text x="630" y="81" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 3</text>
  <text x="630" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Operator Fusion</text>
  <text x="630" y="120" text-anchor="middle" font-size="8" fill="#555">fuse GEMM+bias+GELU</text>
  <text x="630" y="130" text-anchor="middle" font-size="8" fill="#555">eliminate intermediates</text>
  <text x="630" y="140" text-anchor="middle" font-size="8" fill="#555">30–50% fewer HBM trips</text>

  <!-- ===== Stage 4: Kernel Selection ===== -->
  <path d="M 630 160 L 630 190 L 360 190 L 360 210" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="210" y="210" width="300" height="90" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="335" y="220" width="50" height="16" rx="4" fill="#a31f34"/>
  <text x="360" y="231" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 4</text>
  <text x="360" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Kernel Selection &amp; Autotuning</text>
  <text x="360" y="265" text-anchor="middle" font-size="8" fill="#555">cuBLAS / CUTLASS for GEMMs · Triton for fused element-wise</text>
  <text x="360" y="275" text-anchor="middle" font-size="8" fill="#555">benchmark tile sizes, thread configs, unrolling factors</text>
  <text x="360" y="285" text-anchor="middle" font-size="8" fill="#555">select fastest implementation per op per hardware target</text>

  <!-- ===== Output ===== -->
  <line x1="360" y1="300" x2="360" y2="330" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  
  <rect x="220" y="330" width="280" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Optimized Kernels</text>
  <text x="360" y="365" text-anchor="middle" font-size="8" fill="#555">PTX / SASS / Triton · hardware-tuned machine code</text>
  <text x="360" y="375" text-anchor="middle" font-size="8" fill="#555">4 kernels → 2 kernels · 1.4–1.8× throughput gain</text>

  <!-- ===== Benefits detail boxes ===== -->
  <!-- Capture -->
  <rect x="20" y="210" width="140" height="70" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="90" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Graph Capture</text>
  <text x="90" y="245" text-anchor="middle" font-size="7.5" fill="#555">Handles dynamic Python:</text>
  <text x="90" y="255" text-anchor="middle" font-size="7.5" fill="#555">graph breaks for unsupported</text>
  <text x="90" y="265" text-anchor="middle" font-size="7.5" fill="#555">control flow</text>

  <!-- Fusion benefit -->
  <rect x="560" y="210" width="140" height="70" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="630" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Fusion Impact</text>
  <text x="630" y="245" text-anchor="middle" font-size="7.5" fill="#555">50 kernel launches → 5–10</text>
  <text x="630" y="255" text-anchor="middle" font-size="7.5" fill="#555">Eliminates 500 µs of</text>
  <text x="630" y="265" text-anchor="middle" font-size="7.5" fill="#555">dispatch latency per layer</text>

  <!-- ===== Timeline strip ===== -->
  <rect x="20" y="410" width="680" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="360" y="430" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Compilation Time vs. Runtime Benefit Trade-off</text>

  <!-- torch.compile -->
  <rect x="30" y="440" width="140" height="20" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="100" y="453" text-anchor="middle" font-size="7.5" fill="#333">torch.compile: seconds</text>
  
  <!-- XLA -->
  <rect x="190" y="440" width="140" height="20" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="260" y="453" text-anchor="middle" font-size="7.5" fill="#333">XLA: minutes</text>
  
  <!-- TensorRT -->
  <rect x="350" y="440" width="160" height="20" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="430" y="453" text-anchor="middle" font-size="7.5" fill="#333">TensorRT: 30–60 min</text>
  
  <!-- Benefits -->
  <rect x="530" y="440" width="160" height="20" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="610" y="453" text-anchor="middle" font-size="7.5" fill="#333">1.3–1.8× throughput gain</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="360" y="490" text-anchor="middle" font-size="9" fill="#999" font-style="italic">torch.compile (TorchDynamo → TorchInductor) applies all four stages automatically. TensorRT adds exhaustive autotuning for production deployment.</text>
</svg>