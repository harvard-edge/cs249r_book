<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ML Compilation Pipeline</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">From high-level Python to hardware-optimized kernels — each stage reduces overhead</text>

  <!-- ===== Input: Python model ===== -->
  <rect x="26" y="58" width="120" height="72" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="86" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Python Model</text>
  <text x="86" y="96" text-anchor="middle" font-size="8" fill="#555">LayerNorm(</text>
  <text x="86" y="108" text-anchor="middle" font-size="8" fill="#555">  GELU(Linear(x)))</text>
  <text x="86" y="122" text-anchor="middle" font-size="8" fill="#999">eager execution</text>

  <!-- Arrow 1 -->
  <line x1="148" y1="94" x2="166" y2="94" stroke="#4a90c4" stroke-width="2.0" marker-end="url(#arr-blue)"/>

  <!-- ===== Stage 1: Graph Capture ===== -->
  <rect x="168" y="58" width="130" height="72" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="233" y="79" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Graph Capture</text>
  <text x="233" y="94" text-anchor="middle" font-size="8" fill="#555">TorchDynamo /</text>
  <text x="233" y="106" text-anchor="middle" font-size="8" fill="#555">torch.compile / XLA</text>
  <text x="233" y="118" text-anchor="middle" font-size="8" fill="#555">trace → DAG</text>
  <!-- Badge -->
  <rect x="174" y="64" width="50" height="14" rx="6" fill="#a31f34"/>
  <text x="199" y="74" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 1</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="94" x2="318" y2="94" stroke="#4a90c4" stroke-width="2.0" marker-end="url(#arr-blue)"/>

  <!-- ===== Stage 2: Graph Optimization ===== -->
  <rect x="320" y="58" width="130" height="72" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="385" y="79" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Graph Optimization</text>
  <text x="385" y="94" text-anchor="middle" font-size="8" fill="#555">CSE · DCE</text>
  <text x="385" y="106" text-anchor="middle" font-size="8" fill="#555">constant folding</text>
  <text x="385" y="118" text-anchor="middle" font-size="8" fill="#555">bias fold · 10–30% fewer ops</text>
  <rect x="326" y="64" width="50" height="14" rx="6" fill="#a31f34"/>
  <text x="351" y="74" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 2</text>

  <!-- Arrow 3 -->
  <line x1="452" y1="94" x2="470" y2="94" stroke="#4a90c4" stroke-width="2.0" marker-end="url(#arr-blue)"/>

  <!-- ===== Stage 3: Operator Fusion ===== -->
  <rect x="472" y="58" width="130" height="72" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="537" y="79" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Operator Fusion</text>
  <text x="537" y="94" text-anchor="middle" font-size="8" fill="#555">fuse GEMM+bias+GELU</text>
  <text x="537" y="106" text-anchor="middle" font-size="8" fill="#555">eliminate intermediates</text>
  <text x="537" y="118" text-anchor="middle" font-size="8" fill="#555">30–50% fewer HBM trips</text>
  <rect x="478" y="64" width="50" height="14" rx="6" fill="#a31f34"/>
  <text x="503" y="74" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 3</text>

  <!-- ===== Stage 4: Kernel Selection — below, full width ===== -->
  <!-- Arrow down from stage 3 -->
  <line x1="537" y1="132" x2="537" y2="158" stroke="#4a90c4" stroke-width="2.0"/>
  <line x1="537" y1="158" x2="340" y2="158" stroke="#4a90c4" stroke-width="2.0"/>
  <line x1="340" y1="158" x2="340" y2="174" stroke="#4a90c4" stroke-width="2.0" marker-end="url(#arr-blue)"/>

  <rect x="175" y="176" width="330" height="72" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="197" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Kernel Selection &amp; Autotuning</text>
  <text x="340" y="212" text-anchor="middle" font-size="8" fill="#555">cuBLAS / CUTLASS for GEMMs · Triton for fused element-wise</text>
  <text x="340" y="224" text-anchor="middle" font-size="8" fill="#555">benchmark tile sizes, thread configs, unrolling factors</text>
  <text x="340" y="236" text-anchor="middle" font-size="8" fill="#555">select fastest implementation per op per hardware target</text>
  <rect x="181" y="182" width="50" height="14" rx="6" fill="#a31f34"/>
  <text x="206" y="192" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Stage 4</text>

  <!-- ===== Output ===== -->
  <line x1="340" y1="250" x2="340" y2="272" stroke="#4a90c4" stroke-width="2.0" marker-end="url(#arr-blue)"/>
  <rect x="215" y="274" width="250" height="52" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Optimized Kernels</text>
  <text x="340" y="310" text-anchor="middle" font-size="8" fill="#555">PTX / SASS / Triton · hardware-tuned machine code</text>
  <text x="340" y="322" text-anchor="middle" font-size="8" fill="#555">4 kernels → 2 kernels · 1.4–1.8× throughput gain</text>

  <!-- ===== Benefits detail boxes ===== -->
  <!-- Capture -->
  <rect x="32" y="180" width="126" height="62" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="95" y="198" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Graph Capture</text>
  <text x="95" y="211" text-anchor="middle" font-size="7.5" fill="#555">Handles dynamic Python:</text>
  <text x="95" y="223" text-anchor="middle" font-size="7.5" fill="#555">graph breaks for unsupported</text>
  <text x="95" y="235" text-anchor="middle" font-size="7.5" fill="#555">control flow</text>

  <!-- Fusion benefit -->
  <rect x="524" y="180" width="130" height="62" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="589" y="198" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Fusion Impact</text>
  <text x="589" y="211" text-anchor="middle" font-size="7.5" fill="#555">50 kernel launches → 5–10</text>
  <text x="589" y="223" text-anchor="middle" font-size="7.5" fill="#555">Eliminates 500 µs of</text>
  <text x="589" y="235" text-anchor="middle" font-size="7.5" fill="#555">dispatch latency per layer</text>

  <!-- ===== Timeline strip ===== -->
  <rect x="26" y="350" width="628" height="56" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="340" y="367" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Compilation Time vs. Runtime Benefit Trade-off</text>

  <!-- torch.compile -->
  <rect x="36" y="374" width="130" height="22" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="101" y="388" text-anchor="middle" font-size="7.5" fill="#333">torch.compile: seconds</text>
  <!-- XLA -->
  <rect x="178" y="374" width="120" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="238" y="388" text-anchor="middle" font-size="7.5" fill="#333">XLA: minutes</text>
  <!-- TensorRT -->
  <rect x="310" y="374" width="148" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.0"/>
  <text x="384" y="388" text-anchor="middle" font-size="7.5" fill="#333">TensorRT: 30–60 min</text>
  <!-- Benefits -->
  <rect x="470" y="374" width="178" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="559" y="388" text-anchor="middle" font-size="7.5" fill="#333">1.3–1.8× throughput gain</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">torch.compile (TorchDynamo → TorchInductor) applies all four stages automatically. TensorRT adds exhaustive autotuning for production deployment.</text>
</svg>