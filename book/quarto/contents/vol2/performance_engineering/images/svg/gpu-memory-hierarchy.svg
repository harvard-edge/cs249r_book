<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="340" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#333">GPU Memory Hierarchy</text>
  <text x="340" y="48" text-anchor="middle" font-size="9" fill="#555">Capacity vs. Bandwidth vs. Energy — the central trade-off of performance engineering</text>

  <!-- ===== Defs: Arrow markers ===== -->
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Layer 1: Registers ===== -->
  <!-- Narrowest bar at top = fastest/smallest -->
  <rect x="170" y="68" width="340" height="68" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Registers</text>
  <text x="340" y="109" text-anchor="middle" font-size="9" fill="#555">~33 MB total · ~1 cycle latency · ~0.01 pJ/access</text>
  <text x="340" y="124" text-anchor="middle" font-size="9" fill="#555">Private per thread · Unlimited bandwidth (in-register)</text>
  <!-- Badge -->
  <rect x="550" y="75" width="64" height="18" rx="12" fill="#a31f34"/>
  <text x="582" y="87" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">FASTEST</text>

  <!-- ===== Layer 2: L1 / Shared SRAM ===== -->
  <rect x="120" y="154" width="440" height="68" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="179" text-anchor="middle" font-size="11" font-weight="700" fill="#333">L1 Cache / Shared Memory (SRAM)</text>
  <text x="340" y="195" text-anchor="middle" font-size="9" fill="#555">~228 KB/SM · 20–30 cycles latency · ~0.5 pJ/access</text>
  <text x="340" y="210" text-anchor="middle" font-size="9" fill="#555">Shared per thread-block · Key resource for operator fusion</text>
  <!-- Energy pill -->
  <rect x="550" y="161" width="64" height="18" rx="12" fill="#a31f34"/>
  <text x="582" y="173" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">~0.5 pJ</text>

  <!-- ===== Layer 3: L2 Cache ===== -->
  <rect x="70" y="240" width="540" height="68" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#333">L2 Cache</text>
  <text x="340" y="281" text-anchor="middle" font-size="9" fill="#555">~50 MB on H100 · ~200 cycles latency · ~130 ns</text>
  <text x="340" y="296" text-anchor="middle" font-size="9" fill="#555">Chip-wide shared · Automatic reuse; not explicitly managed</text>
  <rect x="550" y="247" width="64" height="18" rx="12" fill="#a31f34"/>
  <text x="582" y="259" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">~20 pJ</text>

  <!-- ===== Layer 4: HBM ===== -->
  <rect x="20" y="326" width="640" height="72" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="340" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#333">High Bandwidth Memory (HBM)</text>
  <text x="340" y="368" text-anchor="middle" font-size="9" fill="#555">80 GB capacity · 3.35 TB/s bandwidth · ~300 ns latency</text>
  <text x="340" y="384" text-anchor="middle" font-size="9" fill="#555">Off-chip · 640 pJ/access · Main model weight store</text>
  <rect x="550" y="334" width="64" height="18" rx="12" fill="#a31f34"/>
  <text x="582" y="346" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">640 pJ</text>

  <!-- ===== Down arrows between layers ===== -->
  <line x1="340" y1="136" x2="340" y2="152" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <line x1="340" y1="222" x2="340" y2="238" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <line x1="340" y1="308" x2="340" y2="324" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>

  <!-- ===== Right-side energy cost axis label ===== -->
  <text x="622" y="68" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Energy</text>
  <text x="622" y="78" text-anchor="middle" font-size="8" fill="#a31f34">Cost</text>
  <!-- Cost axis arrow -->
  <line x1="622" y1="82" x2="622" y2="332" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>
  <text x="622" y="348" text-anchor="middle" font-size="7.5" fill="#a31f34">1,280×</text>
  <text x="622" y="358" text-anchor="middle" font-size="7.5" fill="#a31f34">more</text>

  <!-- ===== Left-side capacity axis ===== -->
  <text x="45" y="68" text-anchor="middle" font-size="8" font-weight="700" fill="#555">Capacity</text>
  <text x="45" y="78" text-anchor="middle" font-size="8" fill="#555">grows</text>
  <!-- arrow down -->
  <line x1="45" y1="82" x2="45" y2="330" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-down)"/>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="418" text-anchor="middle" font-size="9" fill="#999" font-style="italic">H100 specifications. Energy ratio: HBM (~640 pJ) vs. registers (~0.01 pJ) = 1,280× per access.</text>

  <!-- ===== Width annotations showing relative size ===== -->
  <text x="340" y="410" text-anchor="middle" font-size="8" fill="#555">← Wider bar = larger memory capacity →</text>
</svg>