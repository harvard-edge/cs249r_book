<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">GPU Memory Hierarchy</text>
  <text x="340" y="50" text-anchor="middle" font-size="9" fill="#555">Capacity vs. Bandwidth vs. Energy — the central trade-off of performance engineering</text>

  <!-- ===== Defs: Arrow markers ===== -->
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Layer 1: Registers ===== -->
  <rect x="170" y="70" width="340" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Registers</text>
  <text x="340" y="110" text-anchor="middle" font-size="9" fill="#555">~33 MB total · ~1 cycle latency · ~0.01 pJ/access</text>
  <text x="340" y="130" text-anchor="middle" font-size="9" fill="#555">Private per thread · Unlimited bandwidth (in-register)</text>
  <!-- Badge -->
  <rect x="550" y="80" width="60" height="20" rx="4" fill="#a31f34"/>
  <text x="580" y="94" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">FASTEST</text>

  <!-- ===== Layer 2: L1 / Shared SRAM ===== -->
  <rect x="120" y="160" width="440" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="340" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#333">L1 Cache / Shared Memory (SRAM)</text>
  <text x="340" y="200" text-anchor="middle" font-size="9" fill="#555">~228 KB/SM · 20–30 cycles latency · ~0.5 pJ/access</text>
  <text x="340" y="220" text-anchor="middle" font-size="9" fill="#555">Shared per thread-block · Key resource for operator fusion</text>
  <!-- Energy pill -->
  <rect x="550" y="170" width="60" height="20" rx="4" fill="#a31f34"/>
  <text x="580" y="184" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">~0.5 pJ</text>

  <!-- ===== Layer 3: L2 Cache ===== -->
  <rect x="70" y="250" width="540" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#333">L2 Cache</text>
  <text x="340" y="290" text-anchor="middle" font-size="9" fill="#555">~50 MB on H100 · ~200 cycles latency · ~130 ns</text>
  <text x="340" y="310" text-anchor="middle" font-size="9" fill="#555">Chip-wide shared · Automatic reuse; not explicitly managed</text>
  <rect x="550" y="260" width="60" height="20" rx="4" fill="#a31f34"/>
  <text x="580" y="274" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">~20 pJ</text>

  <!-- ===== Layer 4: HBM ===== -->
  <rect x="20" y="340" width="640" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#333">High Bandwidth Memory (HBM)</text>
  <text x="340" y="380" text-anchor="middle" font-size="9" fill="#555">80 GB capacity · 3.35 TB/s bandwidth · ~300 ns latency</text>
  <text x="340" y="400" text-anchor="middle" font-size="9" fill="#555">Off-chip · 640 pJ/access · Main model weight store</text>
  <rect x="550" y="350" width="60" height="20" rx="4" fill="#a31f34"/>
  <text x="580" y="364" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">640 pJ</text>

  <!-- ===== Down arrows between layers ===== -->
  <line x1="340" y1="140" x2="340" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <line x1="340" y1="230" x2="340" y2="250" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>
  <line x1="340" y1="320" x2="340" y2="340" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>

  <!-- ===== Right-side energy cost axis label ===== -->
  <text x="630" y="50" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Energy</text>
  <text x="630" y="60" text-anchor="middle" font-size="8" fill="#a31f34">Cost</text>
  <!-- Cost axis arrow -->
  <line x1="630" y1="70" x2="630" y2="340" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>
  <text x="630" y="360" text-anchor="middle" font-size="7.5" fill="#a31f34">1,280×</text>
  <text x="630" y="370" text-anchor="middle" font-size="7.5" fill="#a31f34">more</text>

  <!-- ===== Left-side capacity axis ===== -->
  <text x="40" y="50" text-anchor="middle" font-size="8" font-weight="700" fill="#555">Capacity</text>
  <text x="40" y="60" text-anchor="middle" font-size="8" fill="#555">grows</text>
  <!-- arrow down -->
  <line x1="40" y1="70" x2="40" y2="340" stroke="#555" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-down)"/>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">H100 specifications. Energy ratio: HBM (~640 pJ) vs. registers (~0.01 pJ) = 1,280× per access.</text>

  <!-- ===== Width annotations showing relative size ===== -->
  <text x="340" y="430" text-anchor="middle" font-size="8" fill="#555">← Wider bar = larger memory capacity →</text>
</svg>