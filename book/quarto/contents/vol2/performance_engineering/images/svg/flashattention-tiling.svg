<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">FlashAttention Tiling Strategy</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Tiles from HBM load into SRAM — the N×N attention matrix never materializes</text>

  <!-- ===== HBM region (background) ===== -->
  <rect x="16" y="56" width="648" height="270" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="30" y="74" font-size="9" font-weight="700" fill="#555">HBM (off-chip, 3.35 TB/s, 640 pJ/access)</text>

  <!-- ===== Q matrix ===== -->
  <rect x="32" y="84" width="100" height="150" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="94.0" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Q</text>
  <text x="94.0" y="170" text-anchor="middle" font-size="8" fill="#555">N × d</text>
  <text x="94.0" y="183" text-anchor="middle" font-size="8" fill="#555">(queries)</text>
  <!-- Tile highlight on Q -->
  <rect x="32" y="84" width="100" height="38" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.85"/>
  <text x="82" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Q tile (Br×d)</text>

  <!-- ===== K matrix ===== -->
  <rect x="160" y="84" width="150" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="235" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#333">K</text>
  <text x="235" y="137" text-anchor="middle" font-size="8" fill="#555">d × N  (keys)</text>
  <!-- K tile highlight -->
  <rect x="160" y="84" width="46" height="80" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.85"/>
  <text x="183" y="128" text-anchor="middle" font-size="7" font-weight="700" fill="#fff" transform="rotate(-90 183 128)">K tile (d×Bc)</text>

  <!-- ===== V matrix ===== -->
  <rect x="160" y="178" width="150" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="235" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#333">V</text>
  <text x="235" y="231" text-anchor="middle" font-size="8" fill="#555">N × d  (values)</text>
  <!-- V tile highlight -->
  <rect x="160" y="178" width="46" height="80" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.85"/>
  <text x="195.0" y="222" text-anchor="middle" font-size="7" font-weight="700" fill="#fff" transform="rotate(-90 183 222)">V tile (Bc×d)</text>

  <!-- ===== Cross through naive N×N matrix ===== -->
  <rect x="350" y="84" width="150" height="150" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="425" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">S = QKᵀ</text>
  <text x="425" y="157.0" text-anchor="middle" font-size="9" fill="#c44">N × N</text>
  <text x="425" y="181" text-anchor="middle" font-size="8" fill="#c44">(never stored!)</text>
  <!-- X cross -->
  <line x1="356" y1="90" x2="494" y2="228" stroke="#c44" stroke-width="2.5"/>
  <line x1="494" y1="90" x2="356" y2="228" stroke="#c44" stroke-width="2.5"/>
  <text x="425" y="110" text-anchor="middle" font-size="8" fill="#a31f34">Standard attn:</text>
  <text x="425" y="122" text-anchor="middle" font-size="8" fill="#a31f34">128 MB/head at N=8192</text>

  <!-- ===== Output O matrix ===== -->
  <rect x="530" y="84" width="100" height="150" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="580" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#333">O</text>
  <text x="580" y="170" text-anchor="middle" font-size="8" fill="#555">N × d</text>
  <text x="580" y="183" text-anchor="middle" font-size="8" fill="#555">(output)</text>
  <!-- Partial result highlight -->
  <rect x="530" y="84" width="100" height="38" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.7"/>
  <text x="580" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Accumulated</text>

  <!-- ===== SRAM region ===== -->
  <rect x="16" y="336" width="648" height="84" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="30" y="354" font-size="9" font-weight="700" fill="#333">SRAM / Shared Memory (on-chip, ~228 KB/SM, 0.5 pJ/access)</text>

  <!-- SRAM content boxes -->
  <rect x="32" y="360" width="100" height="44" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="82" y="380" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">Q tile loaded</text>
  <text x="82" y="394" text-anchor="middle" font-size="7.5" fill="#d4edda">Br × d block</text>

  <rect x="155" y="360" width="100" height="44" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="205" y="380" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">K tile loaded</text>
  <text x="205" y="394" text-anchor="middle" font-size="7.5" fill="#d4edda">d × Bc block</text>

  <rect x="278" y="360" width="100" height="44" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="328" y="380" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">V tile loaded</text>
  <text x="328" y="394" text-anchor="middle" font-size="7.5" fill="#d4edda">Bc × d block</text>

  <!-- Score tile computed in SRAM -->
  <rect x="402" y="360" width="120" height="44" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="462" y="376" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Tile score Stile</text>
  <text x="462" y="388" text-anchor="middle" font-size="7.5" fill="#555">Computed in SRAM</text>
  <text x="462" y="399" text-anchor="middle" font-size="7.5" fill="#555">(never written to HBM)</text>

  <!-- Running stats -->
  <rect x="540" y="360" width="108" height="44" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="594" y="376" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Online softmax</text>
  <text x="594" y="388" text-anchor="middle" font-size="7.5" fill="#555">running m, l stats</text>
  <text x="594" y="399" text-anchor="middle" font-size="7.5" fill="#555">updated each tile</text>

  <!-- ===== Load arrows from HBM to SRAM ===== -->
  <line x1="82" y1="122" x2="82" y2="358" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="92" y="255" font-size="8" fill="#4a90c4" font-weight="700">Load</text>

  <line x1="183" y1="164" x2="183" y2="358" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <line x1="183" y1="258" x2="183" y2="358" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ===== Write back arrow (O tile partial) ===== -->
  <line x1="580" y1="334" x2="580" y2="280" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="592" y="310" font-size="8" fill="#3d9e5a" font-weight="700">Write</text>
  <text x="592" y="320" font-size="8" fill="#3d9e5a">partial O</text>

  <!-- ===== Key insight box ===== -->
  <rect x="350" y="242" width="170" height="88" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="435" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Key Insight</text>
  <text x="435" y="275" text-anchor="middle" font-size="8" fill="#333">Never materialize the full</text>
  <text x="435" y="287" text-anchor="middle" font-size="8" fill="#333">N×N attention matrix.</text>
  <text x="435" y="302" text-anchor="middle" font-size="8" fill="#555">HBM traffic: O(N²) → O(N)</text>
  <text x="435" y="315" text-anchor="middle" font-size="8" fill="#555">Speedup: 2–4× for attention</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">FlashAttention processes Q, K, V in Br × Bc tiles. Online softmax rescaling makes this exact, not approximate.</text>
</svg>