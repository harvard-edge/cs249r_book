<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="720" height="490" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="360" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">FlashAttention Tiling Strategy</text>
  <text x="360" y="44" text-anchor="middle" font-size="9" fill="#555">Tiles from HBM load into SRAM — the N×N attention matrix never materializes</text>

  <!-- ===== HBM region (background) ===== -->
  <rect x="36" y="56" width="648" height="270" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="50" y="74" font-size="9" font-weight="700" fill="#555">HBM (off-chip, 3.35 TB/s, 640 pJ/access)</text>

  <!-- ===== Q matrix ===== -->
  <rect x="52" y="84" width="100" height="150" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="102" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Q</text>
  <text x="102" y="170" text-anchor="middle" font-size="8" fill="#555">N × d</text>
  <text x="102" y="183" text-anchor="middle" font-size="8" fill="#555">(queries)</text>
  <!-- Tile highlight on Q -->
  <rect x="52" y="84" width="100" height="38" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.85"/>
  <text x="102" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Q tile (Br×d)</text>

  <!-- ===== K matrix ===== -->
  <rect x="180" y="84" width="150" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#333">K</text>
  <text x="255" y="137" text-anchor="middle" font-size="8" fill="#555">d × N  (keys)</text>
  <!-- K tile highlight -->
  <rect x="180" y="84" width="46" height="80" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.85"/>
  <text x="203" y="128" text-anchor="middle" font-size="7" font-weight="700" fill="#fff" transform="rotate(-90 203 128)">K tile (d×Bc)</text>

  <!-- ===== V matrix ===== -->
  <rect x="180" y="178" width="150" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#333">V</text>
  <text x="255" y="231" text-anchor="middle" font-size="8" fill="#555">N × d  (values)</text>
  <!-- V tile highlight -->
  <rect x="180" y="178" width="46" height="80" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.85"/>
  <text x="203" y="222" text-anchor="middle" font-size="7" font-weight="700" fill="#fff" transform="rotate(-90 203 222)">V tile (Bc×d)</text>

  <!-- ===== Cross through naive N×N matrix ===== -->
  <rect x="370" y="84" width="150" height="150" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- X cross strokes placed cleanly in the background -->
  <line x1="376" y1="90" x2="514" y2="228" stroke="#c44" stroke-width="2.5"/>
  <line x1="514" y1="90" x2="376" y2="228" stroke="#c44" stroke-width="2.5"/>
  
  <!-- Text safely positioned in the top and bottom triangular zones of the cross to avoid overlap -->
  <text x="445" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">S = QKᵀ</text>
  <text x="445" y="120" text-anchor="middle" font-size="9" fill="#c44">N × N</text>
  <text x="445" y="135" text-anchor="middle" font-size="8" fill="#c44">(never stored!)</text>
  
  <text x="445" y="200" text-anchor="middle" font-size="8" fill="#a31f34">Standard attn:</text>
  <text x="445" y="215" text-anchor="middle" font-size="8" fill="#a31f34">128 MB/head at N=8192</text>

  <!-- ===== Output O matrix ===== -->
  <rect x="550" y="84" width="100" height="150" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="600" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#333">O</text>
  <text x="600" y="170" text-anchor="middle" font-size="8" fill="#555">N × d</text>
  <text x="600" y="183" text-anchor="middle" font-size="8" fill="#555">(output)</text>
  <!-- Partial result highlight -->
  <rect x="550" y="84" width="100" height="38" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2" opacity="0.7"/>
  <text x="600" y="107" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Accumulated</text>

  <!-- ===== Key insight box ===== -->
  <rect x="370" y="242" width="170" height="88" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="455" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Key Insight</text>
  <text x="455" y="275" text-anchor="middle" font-size="8" fill="#333">Never materialize the full</text>
  <text x="455" y="287" text-anchor="middle" font-size="8" fill="#333">N×N attention matrix.</text>
  <text x="455" y="302" text-anchor="middle" font-size="8" fill="#555">HBM traffic: O(N²) → O(N)</text>
  <text x="455" y="315" text-anchor="middle" font-size="8" fill="#555">Speedup: 2–4× for attention</text>

  <!-- ===== SRAM region ===== -->
  <rect x="36" y="356" width="648" height="84" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="50" y="435" font-size="9" font-weight="700" fill="#333">SRAM / Shared Memory (on-chip, ~228 KB/SM, 0.5 pJ/access)</text>

  <!-- SRAM content boxes -->
  <rect x="52" y="380" width="100" height="44" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="102" y="400" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">Q tile loaded</text>
  <text x="102" y="414" text-anchor="middle" font-size="7.5" fill="#d4edda">Br × d block</text>

  <rect x="175" y="380" width="100" height="44" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="225" y="400" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">K tile loaded</text>
  <text x="225" y="414" text-anchor="middle" font-size="7.5" fill="#d4edda">d × Bc block</text>

  <rect x="298" y="380" width="100" height="44" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="348" y="400" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff">V tile loaded</text>
  <text x="348" y="414" text-anchor="middle" font-size="7.5" fill="#d4edda">Bc × d block</text>

  <!-- Score tile computed in SRAM -->
  <rect x="422" y="380" width="120" height="44" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="482" y="396" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Tile score Stile</text>
  <text x="482" y="408" text-anchor="middle" font-size="7.5" fill="#555">Computed in SRAM</text>
  <text x="482" y="419" text-anchor="middle" font-size="7.5" fill="#555">(never written to HBM)</text>

  <!-- Running stats -->
  <rect x="560" y="380" width="108" height="44" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="614" y="396" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Online softmax</text>
  <text x="614" y="408" text-anchor="middle" font-size="7.5" fill="#555">running m, l stats</text>
  <text x="614" y="419" text-anchor="middle" font-size="7.5" fill="#555">updated each tile</text>

  <!-- ===== Load arrows from HBM to SRAM (clean orthogonally routed buses) ===== -->
  <path d="M 102,122 L 102,127 L 158,127 L 158,332 L 102,332 L 102,380" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="110" y="365" font-size="8" fill="#4a90c4" font-weight="700">Load</text>

  <path d="M 203,164 L 203,171 L 174,171 L 174,340 L 225,340 L 225,380" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <path d="M 203,258 L 203,348 L 348,348 L 348,380" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ===== Write back arrow (bridging SRAM to HBM partial O matrix) ===== -->
  <line x1="600" y1="380" x2="600" y2="234" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="612" y="300" font-size="8" fill="#3d9e5a" font-weight="700">Write</text>
  <text x="612" y="310" font-size="8" fill="#3d9e5a">partial O</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="360" y="465" text-anchor="middle" font-size="9" fill="#999" font-style="italic">FlashAttention processes Q, K, V in Br × Bc tiles. Online softmax rescaling makes this exact, not approximate.</text>
</svg>