<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>

    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#999"/></marker>

    <marker id="arr-up" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-down" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Profiling Hierarchy</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Four levels of granularity — diagnose at global level, then drill down to root cause</text>

  <!-- ===== PYRAMID structure (bottom to top = coarse to fine) ===== -->

  <!-- Level 1 (bottom/widest): Hardware Counters -->
  <rect x="30" y="360" width="620" height="62" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <!-- Level label -->
  <rect x="36" y="366" width="56" height="16" fill="#a31f34"/>
  <text x="64" y="377" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Level 1</text>
  <text x="340" y="386" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Hardware Counters</text>
  <text x="340" y="401" text-anchor="middle" font-size="9" fill="#555">Individual kernel metrics: achieved BW, occupancy, instruction mix, cache hit rate</text>
  <text x="340" y="413" text-anchor="middle" font-size="8.5" fill="#4a90c4" font-weight="700">Tools: NVIDIA Nsight Compute · Linux perf · PAPI</text>

  <!-- Level 2: Kernel Profiling -->
  <rect x="68" y="280" width="544" height="62" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="74" y="286" width="56" height="16" fill="#a31f34"/>
  <text x="102" y="297" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Level 2</text>
  <text x="340" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Kernel Profiling</text>
  <text x="340" y="321" text-anchor="middle" font-size="9" fill="#555">Timeline of kernel launches, GPU idle gaps, CPU–GPU synchronization, NCCL events</text>
  <text x="340" y="333" text-anchor="middle" font-size="8.5" fill="#3d9e5a" font-weight="700">Tools: NVIDIA Nsight Systems · PyTorch Profiler · Chrome Trace Viewer</text>

  <!-- Level 3: Framework Profiling -->
  <rect x="120" y="200" width="440" height="62" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="126" y="206" width="56" height="16" fill="#a31f34"/>
  <text x="154" y="217" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Level 3</text>
  <text x="340" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Framework Profiling</text>
  <text x="340" y="241" text-anchor="middle" font-size="9" fill="#555">Distributed traces: AllReduce vs. compute overlap, straggler detection, load imbalance</text>
  <text x="340" y="253" text-anchor="middle" font-size="8.5" fill="#c87b2a" font-weight="700">Tools: PyTorch Profiler + NVTX · TensorBoard · W&amp;B Traces</text>

  <!-- Level 4 (top/narrowest): Application Profiling -->
  <rect x="188" y="120" width="304" height="62" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="194" y="126" width="56" height="16" fill="#a31f34"/>
  <text x="222" y="137" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">Level 4</text>
  <text x="340" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Application Profiling</text>
  <text x="340" y="165" text-anchor="middle" font-size="9" fill="#555">End-to-end: tokens/sec, TTFT, P99 latency, MFU, GPU utilization over time</text>
  <text x="340" y="177" text-anchor="middle" font-size="8.5" fill="#c44" font-weight="700">Tools: Custom dashboards · Prometheus · Grafana · Weights &amp; Biases</text>

  <!-- ===== Pyramid side slopes ===== -->
  <!-- Left slope lines -->
  <line x1="30" y1="360" x2="68" y2="280" stroke="#bbb" stroke-width="0.8"/>
  <line x1="68" y1="280" x2="120" y2="200" stroke="#bbb" stroke-width="0.8"/>
  <line x1="120" y1="200" x2="188" y2="120" stroke="#bbb" stroke-width="0.8"/>
  <!-- Right slope lines -->
  <line x1="650" y1="360" x2="612" y2="280" stroke="#bbb" stroke-width="0.8"/>
  <line x1="612" y1="280" x2="560" y2="200" stroke="#bbb" stroke-width="0.8"/>
  <line x1="560" y1="200" x2="492" y2="120" stroke="#bbb" stroke-width="0.8"/>

  <!-- ===== Left annotation: Direction arrows ===== -->
  <text x="22" y="248" text-anchor="middle" font-size="8.5" fill="#555" transform="rotate(-90 22 248)">← Start here (global)</text>
  <text x="658" y="248" text-anchor="middle" font-size="8.5" fill="#555" transform="rotate(90 658 248)">Drill down to root →</text>

  <!-- ===== Drill-down arrow left ===== -->
  <line x1="340" y1="118" x2="340" y2="68" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="340" y="64" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a31f34">Global Symptom</text>
  <text x="352.0" y="76" text-anchor="middle" font-size="8" fill="#555">"latency 3× above SLO"</text>
  <line x1="340" y1="92" x2="340" y2="118" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Skipping levels leads to optimizing the wrong bottleneck. Start at Level 4, then drill down to find the root cause at Level 1.</text>
</svg>