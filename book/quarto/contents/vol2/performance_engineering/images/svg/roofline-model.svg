<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!--
    Chart area: x=80..590, y=55..340
    X axis (log scale): FLOP/Byte  1/8 → 1024
      log10(0.125)=-0.903  → x=80
      log10(1024) =3.01    → x=590
      span = 510px for 3.913 decades → 130.3 px/decade
      x(v) = 80 + (log10(v) - (-0.903)) * 130.3

    Y axis (log scale): TFLOPS  0.1 → 4000
      log10(0.1)=-1  → y=340
      log10(4000)=3.602 → y=55
      span = 285px for 4.602 decades → 61.93 px/decade
      y(v) = 340 - (log10(v) - (-1)) * 61.93

    Ridge point: 597 FLOP/Byte, 2000 TFLOPS
      xR = 80 + (2.776+0.903)*130.3 = 80 + 479.5 = 559 ... clamp to 558
      yR = 340 - (3.301+1)*61.93 = 340 - 266.5 = 73.5

    Memory slope line: from (0.125, 0.418) to (597, 2000)
      (0.125 FLOP/Byte × 3.35 TB/s = 0.418 TFLOPS)
      x0 = 80, y0 = 340 - (-0.622+1)*61.93 = 340 - 23.4 = 316.6
      x1 = 558, y1 = 74

    Flat compute roof: from (597, 2000) to (1024, 2000)
      x = 558 to 590, y = 74
  -->

  <!-- ── Regions ─────────────────────────────────── -->
  <!-- Memory-bound region (left of ridge) -->
  <polygon points="80,316 558,74 558,340 80,340" fill="#d4edda" fill-opacity="0.5"/>
  <!-- Compute-bound region (right of ridge) -->
  <polygon points="558,74 590,74 590,340 558,340" fill="#cfe2f3" fill-opacity="0.5"/>

  <!-- ── Grid lines (Y: 0.1, 1, 10, 100, 1000, 4000) ── -->
  <!-- y(0.1)=340, y(1)=278.1, y(10)=216.1, y(100)=154.1, y(1000)=92.1, clamp 4000=74 -->
  <line x1="80" y1="278" x2="590" y2="278" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="216" x2="590" y2="216" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="154" x2="590" y2="154" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="80" y1="92" x2="590" y2="92" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- Grid lines (X: 0.125, 1, 8, 64, 512) -->
  <!-- x(0.125)=80, x(1)=198, x(8)=315, x(64)=433, x(512)=558 -->
  <line x1="198" y1="55" x2="198" y2="340" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="315" y1="55" x2="315" y2="340" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="433" y1="55" x2="433" y2="340" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="558" y1="55" x2="558" y2="340" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- ── Roofline (memory slope + compute flat) ── -->
  <polyline points="80,317 558,74 590,74" fill="none" stroke="#a31f34" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- ── Ridge point ── -->
  <circle cx="558" cy="74" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <!-- vertical dashed drop -->
  <line x1="558" y1="74" x2="558" y2="340" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="570" y="352" font-size="9.5" fill="#999" text-anchor="middle">~600</text>

  <!-- ── Axes ── -->
  <line x1="80" y1="340" x2="595" y2="340" stroke="#333" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
  <line x1="80" y1="340" x2="80" y2="50" stroke="#333" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>

  <!-- ── X ticks & labels (FLOP/Byte) ── -->
  <!-- 1/8, 1, 8, 64, 512 -->
  <line x1="80" y1="340" x2="80" y2="345" stroke="#333" stroke-width="1"/>
  <line x1="198" y1="340" x2="198" y2="345" stroke="#333" stroke-width="1"/>
  <line x1="315" y1="340" x2="315" y2="345" stroke="#333" stroke-width="1"/>
  <line x1="433" y1="340" x2="433" y2="345" stroke="#333" stroke-width="1"/>
  <line x1="558" y1="340" x2="558" y2="345" stroke="#333" stroke-width="1"/>

  <text x="80" y="356" font-size="9.5" fill="#555" text-anchor="middle">⅛</text>
  <text x="198" y="356" font-size="9.5" fill="#555" text-anchor="middle">1</text>
  <text x="315" y="356" font-size="9.5" fill="#555" text-anchor="middle">8</text>
  <text x="433" y="356" font-size="9.5" fill="#555" text-anchor="middle">64</text>
  <text x="558" y="356" font-size="9.5" fill="#555" text-anchor="middle">512</text>

  <!-- ── Y ticks & labels (TFLOPS) ── -->
  <line x1="80" y1="340" x2="75" y2="340" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="278" x2="75" y2="278" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="216" x2="75" y2="216" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="154" x2="75" y2="154" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="92" x2="75" y2="92" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="74" x2="75" y2="74" stroke="#333" stroke-width="1"/>

  <text x="72" y="334" font-size="9.5" fill="#555" text-anchor="end">0.1</text>
  <text x="72" y="272" font-size="9.5" fill="#555" text-anchor="end">1</text>
  <text x="72" y="210" font-size="9.5" fill="#555" text-anchor="end">10</text>
  <text x="72" y="148" font-size="9.5" fill="#555" text-anchor="end">100</text>
  <text x="72" y="86" font-size="9.5" fill="#555" text-anchor="end">1,000</text>
  <text x="72" y="68" font-size="9.5" fill="#555" text-anchor="end">2,000</text>

  <!-- ── Axis titles ── -->
  <text x="338" y="378" font-size="11" fill="#333" font-weight="600" text-anchor="middle">Arithmetic Intensity  (FLOP / Byte)  →  log scale</text>
  <text x="22" y="198" font-size="11" fill="#333" font-weight="600" text-anchor="middle" transform="rotate(-90,22,198)">Attainable Performance (TFLOPS) — log</text>

  <!-- ── Region labels ── -->
  <text x="212" y="72" font-size="9" font-weight="600" letter-spacing="0.5" fill="#3d9e5a" text-anchor="middle">MEMORY-BOUND</text>
  <text x="574" y="170" font-size="9" font-weight="600" letter-spacing="0.5" fill="#4a90c4" text-anchor="middle" transform="rotate(90,574,170)">COMPUTE-BOUND</text>

  <!-- Slope label (bandwidth) -->
  <text x="224" y="196" font-size="8.5" fill="#3d9e5a" font-style="italic" transform="rotate(-29,224,196)">slope = 3.35 TB/s (HBM3)</text>

  <!-- Roof label -->
  <text x="520" y="68" font-size="9" fill="#a31f34" text-anchor="middle" font-weight="700">2,000 TFLOPS (FP16)</text>

  <!-- ── Workload points ── -->
  <!--
    Realistic arithmetic intensities (log-scale x positions):
    Decode (B=1):      ~1 F/B   → x=198, y~=278+
    Prefill (B=32):    ~10 F/B  → x=315, y~=200
    Conv train:        ~100 F/B → x=433, y~=138
    Dense transformer: ~300 F/B → x=510, y~=90
  -->

  <!-- Workload: Autoregressive Decode (batch=1) — memory-bound -->
  <!-- ~0.7 TFLOPS actual → y=340-(log10(0.7)+1)*61.93=340-8.8=331... let's say ~5 TFLOPS on modern HW → y=281 -->
  <circle cx="178" cy="290" r="5" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <line x1="178" y1="290" x2="178" y2="316" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="145" y="268" font-size="9" fill="#4a90c4" font-weight="700">Decode</text>
  <text x="145" y="289" font-size="9" fill="#4a90c4">(batch=1)</text>

  <!-- Workload: LLM Prefill (long prompt) — moderate AI ~8 F/B -->
  <circle cx="308" cy="210" r="5" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <line x1="308" y1="210" x2="308" y2="227" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="208" font-size="9" fill="#333" font-weight="700">Prefill</text>
  <text x="318" y="209" font-size="9" fill="#555">(long prompt)</text>

  <!-- Workload: Transformer Training (batch=512) — ~30–80 F/B → x≈400, y≈158 -->
  <circle cx="395" cy="158" r="5" fill="#555" stroke="#fff" stroke-width="1.5"/>
  <text x="405" y="146" font-size="9" fill="#333" font-weight="700">Transformer</text>
  <text x="405" y="167" font-size="9" fill="#555">training (B=512)</text>

  <!-- Workload: Convolution (ResNet, high AI) — ~200 F/B → x≈488, y≈95 -->
  <circle cx="510" cy="96" r="5" fill="#c87b2a" stroke="#fff" stroke-width="1.5"/>
  <text x="515" y="90" font-size="9" fill="#c87b2a" font-weight="700">Conv. training</text>
  <text x="515" y="91" font-size="9" fill="#c87b2a">(ResNet)</text>

  <!-- ── Ridge point label ── -->
  <text x="575" y="70" font-size="8.5" fill="#333">Ridge ≈ 600 F/B</text>

  <!-- ── Efficiency gap annotations ── -->
  <!-- Arrow showing gap for Decode workload -->
  <line x1="178" y1="292" x2="178" y2="315" stroke="#bbb" stroke-width="1"/>
  <text x="135" y="310" font-size="8" fill="#999" font-style="italic">peak ≫ actual</text>

  <!-- ── Bottom note ── -->
  <text x="338" y="400" font-size="9" fill="#999" text-anchor="middle" font-style="italic">
    H100 SXM5 reference: 3.35 TB/s HBM3 bandwidth · 2,000 TFLOPS FP16 Tensor Core
  </text>
</svg>