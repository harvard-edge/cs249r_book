<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Prefill vs. Decode: Opposite Bottlenecks</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Same hardware, same roofline — opposite sides of the ridge point</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="52" x2="340" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Prefill (Compute-Bound) ===== -->
  <text x="180" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Prefill Phase</text>
  <text x="180" y="79" text-anchor="middle" font-size="9" fill="#3d9e5a">Compute-Bound ✓</text>

  <!-- Left axes -->
  <line x1="50" y1="380" x2="50" y2="90" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="50" y1="380" x2="310" y2="380" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="180" y="400" text-anchor="middle" font-size="8.5" fill="#555">Arithmetic Intensity (FLOP/byte)</text>
  <text x="30" y="240" text-anchor="middle" font-size="8.5" fill="#555" transform="rotate(-90 30 240)">Achievable TFLOPS</text>

  <!-- Left axis tick labels -->
  <text x="45" y="383" text-anchor="end" font-size="7.5" fill="#555">0</text>
  <text x="45" y="353" text-anchor="end" font-size="7.5" fill="#555">low</text>
  <text x="45" y="183" text-anchor="end" font-size="7.5" fill="#555">peak</text>

  <!-- Left roofline: memory-bound slope -->
  <line x1="50" y1="380" x2="180" y2="180" stroke="#3d9e5a" stroke-width="2.0"/>
  <!-- Left roofline: compute ceiling -->
  <line x1="180" y1="180" x2="310" y2="180" stroke="#c44" stroke-width="2.0"/>
  <!-- Ridge point left -->
  <circle cx="180" cy="180" r="4" fill="#555"/>
  <text x="180" y="170" text-anchor="middle" font-size="8" fill="#555">Ridge ~295</text>

  <!-- Memory BW label left -->
  <text x="95" y="290" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">Memory BW</text>
  <text x="95" y="300" text-anchor="middle" font-size="8" fill="#3d9e5a">ceiling</text>
  <!-- Compute ceiling label left -->
  <text x="245" y="173" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">Compute ceiling</text>

  <!-- Prefill workload dot — compute-bound region (right of ridge) -->
  <circle cx="260" cy="180" r="8" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <!-- Label -->
  <text x="260" y="166" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Prefill</text>
  <text x="260" y="156" text-anchor="middle" font-size="8" fill="#555">~1024 tokens</text>
  <!-- Vertical drop from dot to axis showing position -->
  <line x1="260" y1="188" x2="260" y2="380" stroke="#3d9e5a" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Left annotation box -->
  <rect x="60" y="230" width="120" height="54" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0" rx="4"/>
  <text x="120" y="245" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Prefill is</text>
  <text x="120" y="257" text-anchor="middle" font-size="8" fill="#333">compute-bound.</text>
  <text x="120" y="269" text-anchor="middle" font-size="8" fill="#555">Tensor Cores are</text>
  <text x="120" y="281" text-anchor="middle" font-size="8" fill="#555">the bottleneck.</text>

  <!-- ===== RIGHT PANEL: Decode (Memory-Bound) ===== -->
  <text x="500" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Decode Phase</text>
  <text x="500" y="79" text-anchor="middle" font-size="9" fill="#c44">Memory-Bound ✗</text>

  <!-- Right axes -->
  <line x1="370" y1="380" x2="370" y2="90" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="380" x2="630" y2="380" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="500" y="400" text-anchor="middle" font-size="8.5" fill="#555">Arithmetic Intensity (FLOP/byte)</text>

  <!-- Right roofline: memory-bound slope -->
  <line x1="370" y1="380" x2="500" y2="180" stroke="#3d9e5a" stroke-width="2.0"/>
  <!-- Right roofline: compute ceiling -->
  <line x1="500" y1="180" x2="630" y2="180" stroke="#c44" stroke-width="2.0"/>
  <!-- Ridge point right -->
  <circle cx="500" cy="180" r="4" fill="#555"/>
  <text x="500" y="170" text-anchor="middle" font-size="8" fill="#555">Ridge ~295</text>

  <!-- Memory BW label right -->
  <text x="415" y="290" text-anchor="middle" font-size="8" fill="#3d9e5a" font-weight="700">Memory BW</text>
  <text x="415" y="300" text-anchor="middle" font-size="8" fill="#3d9e5a">ceiling</text>
  <!-- Compute ceiling label right -->
  <text x="565" y="173" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">Compute ceiling</text>

  <!-- Decode workload dot — memory-bound region (left of ridge) -->
  <circle cx="390" cy="350" r="8" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="400" y="346" text-anchor="start" font-size="8.5" font-weight="700" fill="#c44">Decode</text>
  <text x="400" y="356" text-anchor="start" font-size="8" fill="#555">batch=1, ~1 FLOP/byte</text>
  <!-- Vertical drop from dot to x-axis -->
  <line x1="390" y1="358" x2="390" y2="380" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Horizontal line from dot to y-axis showing how far below ceiling -->
  <line x1="370" y1="350" x2="382" y2="350" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Gap arrow showing how far below compute ceiling -->
  <line x1="390" y1="180" x2="390" y2="342" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr-red)"/>
  <text x="400" y="260" font-size="8" fill="#a31f34">GPU idle,</text>
  <text x="400" y="270" font-size="8" fill="#a31f34">waiting for</text>
  <text x="400" y="280" font-size="8" fill="#a31f34">HBM data</text>

  <!-- Right annotation box -->
  <rect x="490" y="230" width="130" height="54" fill="#f9d6d5" stroke="#c44" stroke-width="1.0" rx="4"/>
  <text x="555" y="245" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Decode is</text>
  <text x="555" y="257" text-anchor="middle" font-size="8" fill="#333">memory-bound.</text>
  <text x="555" y="269" text-anchor="middle" font-size="8" fill="#555">HBM bandwidth is</text>
  <text x="555" y="281" text-anchor="middle" font-size="8" fill="#555">the bottleneck.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Both phases share the same roofline envelope. Their workload positions differ by ~3 orders of magnitude in arithmetic intensity.</text>
</svg>