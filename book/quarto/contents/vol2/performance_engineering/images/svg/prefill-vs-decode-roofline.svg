<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Prefill vs. Decode: Opposite Bottlenecks</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">Same hardware, same roofline — opposite sides of the ridge point</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="52" x2="340" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Prefill (Compute-Bound) ===== -->
  <text x="170" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Prefill Phase</text>
  <text x="170" y="79" text-anchor="middle" font-size="9" fill="#3d9e5a">Compute-Bound ✓</text>

  <!-- Left axes -->
  <line x1="48" y1="380" x2="48" y2="95" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="48" y1="380" x2="325" y2="380" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="186" y="400" text-anchor="middle" font-size="8.5" fill="#555">Arithmetic Intensity (FLOP/byte)</text>
  <text x="32" y="240" text-anchor="middle" font-size="8.5" fill="#555" transform="rotate(-90 32 240)">Achievable TFLOPS</text>

  <!-- Left axis tick labels -->
  <text x="55.0" y="383" text-anchor="end" font-size="7.5" fill="#555">0</text>
  <text x="55.0" y="345" text-anchor="end" font-size="7.5" fill="#555">low</text>
  <text x="55.0" y="185" text-anchor="end" font-size="7.5" fill="#555">peak</text>

  <!-- Left roofline: memory-bound slope -->
  <line x1="55" y1="373" x2="175" y2="185" stroke="#4a90c4" stroke-width="2.0"/>
  <!-- Left roofline: compute ceiling -->
  <line x1="175" y1="185" x2="320" y2="185" stroke="#c44" stroke-width="2.0"/>
  <!-- Ridge point left -->
  <circle cx="175" cy="185" r="4" fill="#555"/>
  <text x="180" y="180" font-size="8" fill="#555">Ridge ~295</text>

  <!-- Memory BW label left -->
  <text x="90" y="295" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">Memory BW</text>
  <text x="90" y="306" text-anchor="middle" font-size="8" fill="#4a90c4">ceiling</text>
  <!-- Compute ceiling label left -->
  <text x="258" y="178" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">Compute ceiling</text>

  <!-- Prefill workload dot — compute-bound region (right of ridge) -->
  <circle cx="263" cy="185" r="8" fill="#3d9e5a" stroke="#fff" stroke-width="1.5"/>
  <!-- Label -->
  <text x="263" y="172" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Prefill</text>
  <text x="263" y="162" text-anchor="middle" font-size="8" fill="#555">~1024 tokens</text>
  <!-- Vertical drop from dot to axis showing position -->
  <line x1="263" y1="193" x2="263" y2="380" stroke="#3d9e5a" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Left annotation box -->
  <rect x="54" y="230" width="120" height="54" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="114" y="247" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Prefill is</text>
  <text x="114" y="259" text-anchor="middle" font-size="8" fill="#333">compute-bound.</text>
  <text x="114" y="271" text-anchor="middle" font-size="8" fill="#555">Tensor Cores are</text>
  <text x="114" y="273.0" text-anchor="middle" font-size="8" fill="#555">the bottleneck.</text>

  <!-- ===== RIGHT PANEL: Decode (Memory-Bound) ===== -->
  <text x="510" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Decode Phase</text>
  <text x="510" y="79" text-anchor="middle" font-size="9" fill="#c44">Memory-Bound ✗</text>

  <!-- Right axes -->
  <line x1="355" y1="380" x2="355" y2="95" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="355" y1="380" x2="632" y2="380" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="493" y="400" text-anchor="middle" font-size="8.5" fill="#555">Arithmetic Intensity (FLOP/byte)</text>

  <!-- Right roofline: memory-bound slope -->
  <line x1="362" y1="373" x2="482" y2="185" stroke="#4a90c4" stroke-width="2.0"/>
  <!-- Right roofline: compute ceiling -->
  <line x1="482" y1="185" x2="627" y2="185" stroke="#c44" stroke-width="2.0"/>
  <!-- Ridge point right -->
  <circle cx="482" cy="185" r="4" fill="#555"/>
  <text x="487" y="180" font-size="8" fill="#555">Ridge ~295</text>

  <!-- Memory BW label right -->
  <text x="400" y="295" text-anchor="middle" font-size="8" fill="#4a90c4" font-weight="700">Memory BW</text>
  <text x="400" y="306" text-anchor="middle" font-size="8" fill="#4a90c4">ceiling</text>
  <!-- Compute ceiling label right -->
  <text x="565" y="178" text-anchor="middle" font-size="8" fill="#c44" font-weight="700">Compute ceiling</text>

  <!-- Decode workload dot — memory-bound region (left of ridge) -->
  <circle cx="380" cy="350" r="8" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="380" y="328.0" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">Decode</text>
  <text x="392.0" y="328" text-anchor="middle" font-size="8" fill="#555">batch=1, ~1 FLOP/byte</text>
  <!-- Vertical drop from dot to x-axis -->
  <line x1="380" y1="342" x2="380" y2="380" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Horizontal line from dot to y-axis showing how far below ceiling -->
  <line x1="356" y1="350" x2="372" y2="350" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Gap arrow showing how far below compute ceiling -->
  <line x1="380" y1="193" x2="380" y2="342" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr-red)"/>
  <text x="402" y="270" font-size="8" fill="#a31f34">GPU idle,</text>
  <text x="402" y="281" font-size="8" fill="#a31f34">waiting for</text>
  <text x="402" y="292" font-size="8" fill="#a31f34">HBM data</text>

  <!-- Right annotation box -->
  <rect x="460" y="230" width="126" height="54" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="523" y="247" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Decode is</text>
  <text x="523" y="259" text-anchor="middle" font-size="8" fill="#333">memory-bound.</text>
  <text x="523" y="271" text-anchor="middle" font-size="8" fill="#555">HBM bandwidth is</text>
  <text x="523" y="283" text-anchor="middle" font-size="8" fill="#555">the bottleneck.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="352.0" y="445" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Both phases share the same roofline envelope. Their workload positions differ by ~3 orders of magnitude in arithmetic intensity.</text>
</svg>