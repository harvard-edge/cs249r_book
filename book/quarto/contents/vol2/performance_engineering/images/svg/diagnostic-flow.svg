<?xml version="1.0" encoding="utf-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="940" height="540" fill="#fff"/>

  <!-- START NODE -->
  <rect x="360" y="20" width="180" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Training is slow</text>

  <!-- Arrow Start -> D1 -->
  <line x1="450" y1="60" x2="450" y2="100" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DECISION 1: GPU utilization < 70%? -->
  <rect x="380" y="100" width="140" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPU util &lt; 70%?</text>
  <text x="450" y="130" text-anchor="middle" font-size="9" fill="#555">(Nsight / nvidia-smi)</text>

  <!-- D1 -> D2 (Yes) -->
  <line x1="520" y1="120" x2="560" y2="120" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="540" y="114" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Yes</text>

  <!-- D1 -> D4 (No) -->
  <line x1="450" y1="140" x2="450" y2="200" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="460" y="170" text-anchor="start" font-size="9.5" font-weight="700" fill="#a31f34">No</text>

  <!-- DECISION 2: I/O bound? -->
  <rect x="560" y="100" width="140" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="630" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#333">I/O bound?</text>
  <text x="630" y="130" text-anchor="middle" font-size="9" fill="#555">(DataLoader stall)</text>

  <!-- D2 -> Action DL (Yes) -->
  <path d="M 700,120 L 810,120 L 810,150" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="755" y="114" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Yes</text>

  <!-- D2 -> D3 (No) -->
  <line x1="630" y1="140" x2="630" y2="200" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="640" y="170" text-anchor="start" font-size="9.5" font-weight="700" fill="#a31f34">No</text>

  <!-- ACTION: Increase DataLoader workers -->
  <rect x="740" y="150" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="810" y="166" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">More DL workers</text>
  <text x="810" y="180" text-anchor="middle" font-size="9" fill="#555">Use GDS / NVMe</text>

  <!-- DECISION 3: CPU bound? -->
  <rect x="560" y="200" width="140" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="630" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#333">CPU bound?</text>
  <text x="630" y="230" text-anchor="middle" font-size="9" fill="#555">(preprocessing)</text>

  <!-- D3 -> Action Offload (Yes) -->
  <path d="M 700,220 L 810,220 L 810,250" fill="none" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="755" y="214" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Yes</text>

  <!-- D3 -> Action Comm (No) -->
  <line x1="630" y1="240" x2="630" y2="300" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="640" y="270" text-anchor="start" font-size="9.5" font-weight="700" fill="#a31f34">No</text>

  <!-- ACTION: Offload preprocessing -->
  <rect x="740" y="250" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="810" y="266" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Offload to GPU</text>
  <text x="810" y="280" text-anchor="middle" font-size="9" fill="#555">DALI / async preproc</text>

  <!-- ACTION: Communication overhead -->
  <rect x="560" y="300" width="140" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="630" y="316" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Comm overhead</text>
  <text x="630" y="330" text-anchor="middle" font-size="9" fill="#555">Overlap / compress</text>

  <!-- DECISION 4: Arithmetic Intensity > Ridge? -->
  <rect x="380" y="200" width="140" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#333">AI &gt; ridge point?</text>
  <text x="450" y="230" text-anchor="middle" font-size="9" fill="#555">(Roofline analysis)</text>

  <!-- D4 -> Compute Label (Yes) -->
  <line x1="380" y1="220" x2="280" y2="220" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="330" y="214" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Yes</text>

  <!-- LABEL: COMPUTE BOUND -->
  <rect x="120" y="200" width="160" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">COMPUTE BOUND</text>

  <!-- Compute Label -> Actions -->
  <path d="M 180,240 L 180,260 L 130,260 L 130,280" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 220,240 L 220,260 L 270,260 L 270,280" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ACTION: Precision engineering -->
  <rect x="60" y="280" width="140" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="296" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">FP8 / INT4</text>
  <text x="130" y="310" text-anchor="middle" font-size="9" fill="#555">Precision eng.</text>

  <!-- ACTION: Algorithmic -->
  <rect x="200" y="280" width="140" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="296" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">MoE / Specul.</text>
  <text x="270" y="310" text-anchor="middle" font-size="9" fill="#555">Algorithmic opt.</text>

  <!-- D4 -> Memory Label (No) -->
  <line x1="450" y1="240" x2="450" y2="300" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="460" y="270" text-anchor="start" font-size="9.5" font-weight="700" fill="#a31f34">No</text>

  <!-- LABEL: MEMORY BOUND -->
  <rect x="370" y="300" width="160" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">MEMORY BOUND</text>

  <!-- Memory Label -> Actions -->
  <path d="M 430,340 L 430,360 L 370,360 L 370,380" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 470,340 L 470,360 L 530,360 L 530,380" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ACTION: Operator fusion -->
  <rect x="300" y="380" width="140" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="370" y="396" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Operator fusion</text>
  <text x="370" y="410" text-anchor="middle" font-size="9" fill="#555">FlashAttention</text>

  <!-- ACTION: torch.compile -->
  <rect x="460" y="380" width="140" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="530" y="396" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">torch.compile</text>
  <text x="530" y="410" text-anchor="middle" font-size="9" fill="#555">Graph compilation</text>

  <!-- Re-profile Loop Base -->
  <rect x="360" y="470" width="180" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="494" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Re-profile</text>

  <!-- Routing Actions down to Re-profile Buses -->
  <!-- Left Bus (FP8, MoE) -->
  <line x1="270" y1="320" x2="270" y2="440" stroke="#555" stroke-width="1.2"/>
  <path d="M 130,320 L 130,440 L 430,440 L 430,470" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  
  <!-- Right Bus (DL workers, Offload, Comm) -->
  <line x1="810" y1="290" x2="810" y2="440" stroke="#555" stroke-width="1.2"/>
  <line x1="630" y1="340" x2="630" y2="440" stroke="#555" stroke-width="1.2"/>
  <path d="M 880,170 L 900,170 L 900,440 L 470,440 L 470,470" fill="none" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Center Bus (Fusion, Compile) -->
  <path d="M 370,420 L 370,440 L 530,440 L 530,420" fill="none" stroke="#555" stroke-width="1.2"/>
  <line x1="450" y1="440" x2="450" y2="470" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Iteration Return Loop -->
  <path d="M 360,490 L 50,490 L 50,40 L 360,40" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="40" y="260" text-anchor="middle" font-size="9" fill="#999" font-style="italic" transform="rotate(-90, 40, 260)">iterate until target met</text>

</svg>