<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Left panel: Centralized checkpointing ===== -->
  <rect x="12" y="30" width="312" height="400" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="168" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#a31f34">Centralized Checkpointing</text>
  <text x="168" y="52" text-anchor="middle" font-size="9" fill="#555">All workers write through single coordinator</text>

  <!-- Left: Compute nodes (workers) -->
  <rect x="24" y="68" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="60" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 0</text>
  <text x="60" y="96" text-anchor="middle" font-size="8" fill="#555">shard 0</text>

  <rect x="24" y="116" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="60" y="131" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 1</text>
  <text x="60" y="144" text-anchor="middle" font-size="8" fill="#555">shard 1</text>

  <rect x="24" y="164" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="60" y="179" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 2</text>
  <text x="60" y="192" text-anchor="middle" font-size="8" fill="#555">shard 2</text>

  <rect x="24" y="212" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="60" y="227" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 3</text>
  <text x="60" y="240" text-anchor="middle" font-size="8" fill="#555">shard 3</text>

  <!-- Left: Arrows to coordinator (all converging = bottleneck) -->
  <line x1="96" y1="86" x2="148" y2="156" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <line x1="96" y1="134" x2="148" y2="162" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <line x1="96" y1="182" x2="148" y2="172" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <line x1="96" y1="230" x2="148" y2="178" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- Left: Coordinator / bottleneck box -->
  <rect x="150" y="148" width="96" height="44" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="198" y="167" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Coordinator</text>
  <text x="198" y="180" text-anchor="middle" font-size="8" fill="#c44">BOTTLENECK</text>

  <!-- Left: Arrow coordinator to PFS -->
  <line x1="246" y1="170" x2="270" y2="170" stroke="#a31f34" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- Left: PFS -->
  <rect x="272" y="148" width="44" height="44" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="294" y="166" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">PFS</text>
  <text x="294" y="178" text-anchor="middle" font-size="7.5" fill="#555">shared</text>
  <text x="294" y="188" text-anchor="middle" font-size="7.5" fill="#555">storage</text>

  <!-- Left: Problem annotations -->
  <rect x="24" y="270" width="296" height="148" rx="4" fill="white" stroke="#c44" stroke-width="1"/>
  <text x="172" y="288" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Bottleneck Analysis</text>
  <text x="40" y="308" font-size="8.5" fill="#555">• All state flows through one process</text>
  <text x="40" y="325" font-size="8.5" fill="#555">• Coordinator memory = full checkpoint</text>
  <text x="40" y="342" font-size="8.5" fill="#555">• Network: N workers &#x2192; 1 coordinator</text>
  <text x="40" y="359" font-size="8.5" fill="#555">• Single point of failure at coordinator</text>
  <text x="40" y="380" font-size="8.5" font-weight="700" fill="#a31f34">Write time scales as O(N)</text>
  <text x="40" y="397" font-size="8.5" fill="#555">1,000 workers at 1 GB/s each =</text>
  <text x="40" y="411" font-size="8.5" font-weight="700" fill="#a31f34">1 TB/s coordinator ingress required</text>

  <!-- ===== Vertical divider ===== -->
  <line x1="340" y1="20" x2="340" y2="450" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Right panel: Distributed/sharded checkpointing ===== -->
  <rect x="356" y="30" width="312" height="400" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="512" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Distributed Checkpointing</text>
  <text x="512" y="52" text-anchor="middle" font-size="9" fill="#555">Each worker writes shard to local NVMe, async upload</text>

  <!-- Right: Compute nodes with local NVMe -->
  <rect x="368" y="68" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="404" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 0</text>
  <text x="404" y="96" text-anchor="middle" font-size="8" fill="#555">shard 0</text>

  <rect x="368" y="116" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="404" y="131" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 1</text>
  <text x="404" y="144" text-anchor="middle" font-size="8" fill="#555">shard 1</text>

  <rect x="368" y="164" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="404" y="179" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 2</text>
  <text x="404" y="192" text-anchor="middle" font-size="8" fill="#555">shard 2</text>

  <rect x="368" y="212" width="72" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="404" y="227" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Worker 3</text>
  <text x="404" y="240" text-anchor="middle" font-size="8" fill="#555">shard 3</text>

  <!-- Right: Local NVMe boxes -->
  <rect x="456" y="68" width="56" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="484" y="83" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">NVMe 0</text>
  <text x="484" y="96" text-anchor="middle" font-size="7.5" fill="#555">local fast</text>

  <rect x="456" y="116" width="56" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="484" y="131" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">NVMe 1</text>
  <text x="484" y="144" text-anchor="middle" font-size="7.5" fill="#555">local fast</text>

  <rect x="456" y="164" width="56" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="484" y="179" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">NVMe 2</text>
  <text x="484" y="192" text-anchor="middle" font-size="7.5" fill="#555">local fast</text>

  <rect x="456" y="212" width="56" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="484" y="227" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">NVMe 3</text>
  <text x="484" y="240" text-anchor="middle" font-size="7.5" fill="#555">local fast</text>

  <!-- Right: Direct worker to local NVMe arrows -->
  <line x1="440" y1="86" x2="454" y2="86" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <line x1="440" y1="134" x2="454" y2="134" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <line x1="440" y1="182" x2="454" y2="182" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <line x1="440" y1="230" x2="454" y2="230" stroke="#3d9e5a" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Right: Async upload arrows (NVMe to object store) -->
  <line x1="512" y1="86" x2="545" y2="130" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="512" y1="134" x2="548" y2="148" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="512" y1="182" x2="548" y2="168" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="512" y1="230" x2="545" y2="185" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Right: Object store / PFS -->
  <rect x="548" y="128" width="60" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="578" y="151" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">Object</text>
  <text x="578" y="163" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">Store</text>
  <text x="578" y="177" text-anchor="middle" font-size="7.5" fill="#555">async</text>

  <!-- Async label -->
  <text x="530" y="120" text-anchor="middle" font-size="8" fill="#555" font-style="italic">async upload</text>
  <text x="530" y="130" text-anchor="middle" font-size="8" fill="#555" font-style="italic">(background)</text>

  <!-- Right: Benefit annotations -->
  <rect x="368" y="270" width="296" height="148" rx="4" fill="white" stroke="#3d9e5a" stroke-width="1"/>
  <text x="516" y="288" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">Throughput Analysis</text>
  <text x="384" y="308" font-size="8.5" fill="#555">• Each worker writes only its own shard</text>
  <text x="384" y="325" font-size="8.5" fill="#555">• Local NVMe: no network contention</text>
  <text x="384" y="342" font-size="8.5" fill="#555">• Async upload overlaps with compute</text>
  <text x="384" y="359" font-size="8.5" fill="#555">• Coordinator only writes metadata</text>
  <text x="384" y="380" font-size="8.5" font-weight="700" fill="#3d9e5a">Write time scales as O(1)</text>
  <text x="384" y="397" font-size="8.5" fill="#555">1,000 workers at 1 GB/s each =</text>
  <text x="384" y="411" font-size="8.5" font-weight="700" fill="#3d9e5a">1 GB/s per worker in parallel</text>

  <!-- ── Footnote ── -->
  <text x="340" y="446" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Centralized checkpointing (left) creates a coordinator bottleneck; distributed checkpointing (right) parallelizes I/O across all workers</text>
</svg>
