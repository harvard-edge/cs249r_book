<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowD" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#fff"/>

  <!-- Panel grid lines -->
  <line x1="440" y1="20" x2="440" y2="480" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="20" y1="260" x2="860" y2="260" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Phase labels -->
  <text x="20" y="25" text-anchor="start" font-size="10" fill="#999" font-weight="600">PHASE 1</text>
  <text x="460" y="25" text-anchor="start" font-size="10" fill="#999" font-weight="600">PHASE 2</text>
  <text x="20" y="265" text-anchor="start" font-size="10" fill="#999" font-weight="600">PHASE 3</text>
  <text x="460" y="265" text-anchor="start" font-size="10" fill="#999" font-weight="600">PHASE 4</text>

  <!-- ═══════ PANEL 1: Normal Training ═══════ -->
  <rect x="20" y="40" width="400" height="200" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="220" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Normal Training</text>

  <!-- 4-GPU cluster, all green -->
  <g>
    <rect x="70" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="100" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 0</text>
    <text x="100" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <rect x="150" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="180" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 1</text>
    <text x="180" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <rect x="230" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="260" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 2</text>
    <text x="260" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <rect x="310" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="340" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 3</text>
    <text x="340" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>
  </g>

  <!-- Health monitor -->
  <rect x="140" y="140" width="160" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="220" y="153" text-anchor="middle" font-size="9" font-weight="600" fill="#4a90c4">Health Monitor</text>
  <text x="220" y="165" text-anchor="middle" font-size="8" fill="#4a90c4">gradient statistics: nominal</text>

  <!-- Training metrics -->
  <text x="220" y="195" text-anchor="middle" font-size="9" fill="#3d9e5a">Loss: decreasing normally</text>
  <text x="220" y="210" text-anchor="middle" font-size="9" fill="#3d9e5a">Gradient norm: stable</text>
  <text x="220" y="225" text-anchor="middle" font-size="9" fill="#3d9e5a">All checksums pass</text>

  <!-- ═══════ PANEL 2: SDC Detected ═══════ -->
  <rect x="460" y="40" width="400" height="200" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="660" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">SDC Detected</text>

  <!-- 4-GPU cluster, GPU 2 red/anomaly -->
  <g>
    <rect x="510" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="540" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 0</text>
    <text x="540" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <rect x="590" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="620" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 1</text>
    <text x="620" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <!-- GPU 2: ANOMALY -->
    <rect x="670" y="80" width="60" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="2.5"/>
    <text x="700" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">GPU 2</text>
    <text x="700" y="103" text-anchor="middle" font-size="8" fill="#c44">SDC!</text>
    <text x="700" y="113" text-anchor="middle" font-size="7.5" fill="#c44">bit-flip</text>
    <!-- Warning indicator -->
    <text x="715" y="92" font-size="12" fill="#c44" font-weight="700">⚠</text>

    <rect x="750" y="80" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="780" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 3</text>
    <text x="780" y="110" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>
  </g>

  <!-- Health monitor flagging -->
  <rect x="550" y="140" width="220" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="660" y="153" text-anchor="middle" font-size="9" font-weight="600" fill="#c44">Health Monitor: ALERT</text>
  <text x="660" y="165" text-anchor="middle" font-size="8" fill="#c44">gradient checksum mismatch on GPU 2</text>

  <text x="660" y="195" text-anchor="middle" font-size="9" fill="#c44">Loss: unexpected spike detected</text>
  <text x="660" y="210" text-anchor="middle" font-size="9" fill="#c44">Isolation: quarantine GPU 2</text>

  <!-- ═══════ PANEL 3: Hot Spare Activated ═══════ -->
  <rect x="20" y="280" width="400" height="180" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="220" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Hot Spare Activated</text>

  <!-- 3 healthy GPUs + hot spare joining -->
  <g>
    <rect x="40" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="70" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 0</text>
    <text x="70" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <rect x="110" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="140" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 1</text>
    <text x="140" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <!-- Defective GPU: gray/isolated -->
    <rect x="180" y="320" width="60" height="40" fill="#e0e0e0" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="210" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#999">GPU 2</text>
    <text x="210" y="350" text-anchor="middle" font-size="8" fill="#999">isolated</text>

    <rect x="250" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="280" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 3</text>
    <text x="280" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <!-- Hot spare joining (orange → green) -->
    <rect x="340" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
    <text x="370" y="338" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Spare</text>
    <text x="370" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">→ active</text>
    <!-- Arrow indicating spare is joining -->
    <line x1="340" y1="340" x2="310" y2="340" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrowD)"/>
  </g>

  <text x="220" y="395" text-anchor="middle" font-size="9" fill="#c87b2a">Hot spare transitions from standby → active</text>
  <text x="220" y="410" text-anchor="middle" font-size="9" fill="#c87b2a">Training resumes with 4-GPU ring</text>
  <text x="220" y="425" text-anchor="middle" font-size="9" fill="#3d9e5a">Checkpoint reloaded — minimal lost work</text>

  <!-- ═══════ PANEL 4: Repair / Replace ═══════ -->
  <rect x="460" y="280" width="400" height="180" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="660" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Repair / Replace</text>

  <!-- Cluster: 4 healthy GPUs, spare is now permanent -->
  <g>
    <rect x="480" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="510" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 0</text>
    <text x="510" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <rect x="550" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="580" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 1</text>
    <text x="580" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>

    <!-- Spare is now permanent (formerly spare) -->
    <rect x="620" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="650" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 2'</text>
    <text x="650" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">spare→perm</text>

    <rect x="690" y="320" width="60" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="720" y="338" text-anchor="middle" font-size="9" font-weight="600" fill="#3d9e5a">GPU 3</text>
    <text x="720" y="350" text-anchor="middle" font-size="8" fill="#3d9e5a">OK</text>
  </g>

  <!-- Defective unit removed -->
  <rect x="780" y="320" width="60" height="40" fill="#e0e0e0" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="810" y="338" text-anchor="middle" font-size="8" fill="#999">defect</text>
  <text x="810" y="350" text-anchor="middle" font-size="8" fill="#999">→ RMA</text>
  <!-- Removal arrow -->
  <line x1="810" y1="320" x2="810" y2="290" stroke="#999" stroke-width="1.2" marker-end="url(#arrowD)"/>

  <text x="660" y="395" text-anchor="middle" font-size="9" fill="#4a90c4">Defective unit removed; new spare ordered</text>
  <text x="660" y="410" text-anchor="middle" font-size="9" fill="#4a90c4">Training runs at full 4-GPU capacity</text>
  <text x="660" y="425" text-anchor="middle" font-size="9" fill="#3d9e5a">Cluster returns to N+1 redundancy state</text>

  <!-- Flow arrows between panels -->
  <line x1="220" y1="240" x2="220" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <line x1="660" y1="240" x2="660" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <line x1="420" y1="140" x2="460" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <line x1="420" y1="370" x2="460" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrowD)"/>

  <!-- Bottom note -->
  <text x="440" y="485" text-anchor="middle" font-size="9" fill="#555" font-style="italic">SDC controllers implement proactive hot-spare rotation before defective units cause training divergence</text>
  <text x="440" y="500" text-anchor="middle" font-size="9" fill="#555" font-style="italic">N+1 redundancy: always one spare available for immediate substitution</text>
</svg>