<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowOr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="520" fill="#fff"/>

  <!-- ══════════ CROSS-SECTION OF IC PACKAGE ══════════ -->
  <!-- Layer 1: Metal / Interconnect (top layer) -->
  <rect x="60" y="60" width="560" height="40" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <text x="340" y="75" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Metal Interconnect Layer (Cu)</text>
  <text x="340" y="90" text-anchor="middle" font-size="8.5" fill="#999">wiring, vias, power distribution</text>

  <!-- Layer 2: Gate Oxide / Transistor Channel -->
  <rect x="60" y="100" width="560" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="140" y="125" text-anchor="middle" font-size="10" font-weight="600" fill="#4a90c4">Gate Oxide</text>
  <text x="140" y="140" text-anchor="middle" font-size="8.5" fill="#4a90c4">~1 nm thick</text>

  <!-- SRAM cell schematic inside oxide layer -->
  <rect x="270" y="110" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="330" y="125" text-anchor="middle" font-size="9" font-weight="600" fill="#4a90c4">Storage Node</text>
  <text x="330" y="140" text-anchor="middle" font-size="9" fill="#4a90c4">(bit state: 0)</text>

  <!-- Layer 3: N-well / P-well (silicon active region) -->
  <rect x="60" y="160" width="560" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="140" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#4a90c4">Silicon N-well</text>
  <text x="140" y="205" text-anchor="middle" font-size="8.5" fill="#4a90c4">transistor body</text>

  <!-- Individual transistors in N-well -->
  <rect x="280" y="170" width="40" height="40" rx="4" fill="#4a90c4" fill-opacity="0.3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="300" y="190" text-anchor="middle" font-size="8" fill="#4a90c4">M1</text>
  <text x="300" y="200" text-anchor="middle" font-size="7.5" fill="#4a90c4">NMOS</text>

  <rect x="340" y="170" width="40" height="40" rx="4" fill="#4a90c4" fill-opacity="0.3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="360" y="190" text-anchor="middle" font-size="8" fill="#4a90c4">M2</text>
  <text x="360" y="200" text-anchor="middle" font-size="7.5" fill="#4a90c4">PMOS</text>

  <!-- Layer 4: P-substrate (bulk silicon) -->
  <rect x="60" y="230" width="560" height="100" rx="4" fill="#4a90c4" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="140" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">P-Substrate</text>
  <text x="140" y="290" text-anchor="middle" font-size="8.5" fill="#cfe2f3">(bulk silicon)</text>

  <!-- Layer 5: Packaging / Die attach -->
  <rect x="60" y="330" width="560" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="340" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#4a90c4">Die Attach / Underfill</text>
  <text x="340" y="370" text-anchor="middle" font-size="8.5" fill="#4a90c4">epoxy bonding layer</text>

  <!-- Layer 6: Substrate/PCB -->
  <rect x="60" y="380" width="560" height="30" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <text x="340" y="398" text-anchor="middle" font-size="10" fill="#555">Substrate (organic / ceramic)</text>

  <!-- ══════════ COSMIC RAY PARTICLE ══════════ -->
  <line x1="160" y1="40" x2="310" y2="170" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.85" marker-end="url(#arrowRed)"/>

  <text x="120" y="30" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Alpha particle /</text>
  <text x="120" y="45" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">cosmic ray</text>

  <text x="170" y="90" text-anchor="middle" font-size="8.5" fill="#c44" font-style="italic">ionizing track</text>

  <!-- ══════════ CHARGE DEPOSITION CLOUD ══════════ -->
  <ellipse cx="310" cy="190" rx="40" ry="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" opacity="0.9"/>
  <text x="310" y="186" text-anchor="middle" font-size="8" fill="#c87b2a" font-weight="600">charge</text>
  <text x="310" y="198" text-anchor="middle" font-size="8" fill="#c87b2a">deposit</text>

  <!-- Charge annotation arrow -->
  <line x1="420" y1="190" x2="350" y2="190" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrowOr)"/>
  <text x="430" y="185" text-anchor="start" font-size="9" fill="#c87b2a" font-weight="600">Charge deposition</text>
  <text x="430" y="200" text-anchor="start" font-size="8.5" fill="#c87b2a">~10 fC flips node voltage</text>

  <!-- ══════════ BIT STATE DISRUPTION ══════════ -->
  <!-- Arrow from charge cloud to storage node -->
  <line x1="310" y1="170" x2="310" y2="150" stroke="#c44" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowRed)"/>

  <!-- Storage node after flip -->
  <rect x="440" y="110" width="140" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="510" y="125" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">Bit state disrupted!</text>
  <text x="510" y="140" text-anchor="middle" font-size="9" fill="#c44">0 → 1 (SEU event)</text>

  <!-- Connection from storage node box to disrupted box -->
  <line x1="390" y1="130" x2="440" y2="130" stroke="#c44" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- ══════════ LAYER LABELS (right margin) ══════════ -->
  <g font-size="10" fill="#999">
    <text x="640" y="85">Metal</text>
    <text x="640" y="135">Oxide</text>
    <text x="640" y="200">N-well</text>
    <text x="640" y="285">Substrate</text>
    <text x="640" y="360">Die attach</text>
    <text x="640" y="400">Package</text>
  </g>

  <!-- Bracket for layer -->
  <line x1="630" y1="60" x2="630" y2="100" stroke="#bbb" stroke-width="0.8"/>
  <line x1="630" y1="100" x2="630" y2="160" stroke="#bbb" stroke-width="0.8"/>
  <line x1="630" y1="160" x2="630" y2="230" stroke="#bbb" stroke-width="0.8"/>
  <line x1="630" y1="230" x2="630" y2="330" stroke="#bbb" stroke-width="0.8"/>
  <line x1="630" y1="330" x2="630" y2="380" stroke="#bbb" stroke-width="0.8"/>
  <line x1="630" y1="380" x2="630" y2="410" stroke="#bbb" stroke-width="0.8"/>

  <!-- ══════════ TEMPORAL SEQUENCE (below) ══════════ -->
  <rect x="60" y="440" width="560" height="50" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1.2"/>
  
  <text x="140" y="460" text-anchor="middle" font-size="9" fill="#3d9e5a" font-weight="600">Before SEU: bit = 0</text>
  <text x="140" y="475" text-anchor="middle" font-size="8.5" fill="#555">storage node at logic-low voltage</text>

  <line x1="210" y1="465" x2="260" y2="465" stroke="#c44" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="235" y="450" text-anchor="middle" font-size="8" fill="#c44">particle</text>
  <text x="235" y="460" text-anchor="middle" font-size="8" fill="#c44">strike</text>

  <text x="340" y="460" text-anchor="middle" font-size="9" fill="#c44" font-weight="600">During SEU: transient pulse</text>
  <text x="340" y="475" text-anchor="middle" font-size="8.5" fill="#c44">charge injection flips node voltage</text>

  <line x1="420" y1="465" x2="470" y2="465" stroke="#999" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <text x="540" y="460" text-anchor="middle" font-size="9" fill="#999" font-weight="600">After SEU: bit = 1</text>
  <text x="540" y="475" text-anchor="middle" font-size="8.5" fill="#999">ECC corrects (if enabled) or silent corruption</text>
</svg>