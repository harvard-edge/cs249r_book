<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="760" height="540" fill="#fff"/>

  <!-- ── Timeline axis ── -->
  <line x1="40" y1="430" x2="720" y2="430" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="730" y="430" text-anchor="start" font-size="9" fill="#555">time</text>
  <text x="380" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Time</text>

  <!-- ── Time markers ── -->
  <line x1="100" y1="420" x2="100" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="240" y1="420" x2="240" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="380" y1="420" x2="380" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="520" y1="420" x2="520" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="660" y1="420" x2="660" y2="440" stroke="#333" stroke-width="1"/>

  <text x="100" y="460" text-anchor="middle" font-size="8" fill="#555">t = 0</text>
  <text x="240" y="460" text-anchor="middle" font-size="8" fill="#555">microseconds</text>
  <text x="380" y="460" text-anchor="middle" font-size="8" fill="#555">seconds</text>
  <text x="520" y="460" text-anchor="middle" font-size="8" fill="#555">hours</text>
  <text x="660" y="460" text-anchor="middle" font-size="8" fill="#555">days / weeks</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── STAGE 1: Hardware Bit-Flip ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="30" width="120" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="100" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">1</text>
  <text x="100" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Hardware</text>
  <text x="100" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Bit-Flip</text>
  <text x="100" y="100" text-anchor="middle" font-size="9" fill="#555">Cosmic ray SEU</text>
  <text x="100" y="110" text-anchor="middle" font-size="9" fill="#555">in GPU register</text>

  <!-- ── Corruption indicator (red) ── -->
  <rect x="60" y="140" width="80" height="20" fill="#c44" rx="4"/>
  <text x="100" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">UNDETECTED</text>

  <!-- ── Arrow 1->2 ── -->
  <line x1="160" y1="80" x2="180" y2="80" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── STAGE 2: Corrupted Tensor ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="180" y="30" width="120" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="240" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">2</text>
  <text x="240" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Corrupted</text>
  <text x="240" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Tensor Value</text>
  <text x="240" y="100" text-anchor="middle" font-size="9" fill="#555">Exponent bit: value</text>
  <text x="240" y="110" text-anchor="middle" font-size="9" fill="#555">jumps from 10⁻⁵ to 10²⁰</text>

  <!-- ── Arrow 2->3 ── -->
  <line x1="300" y1="80" x2="320" y2="80" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── STAGE 3: Gradient Corruption ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="320" y="30" width="120" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="380" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">3</text>
  <text x="380" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Gradient</text>
  <text x="380" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Corruption</text>
  <text x="380" y="100" text-anchor="middle" font-size="9" fill="#555">Backprop spreads</text>
  <text x="380" y="110" text-anchor="middle" font-size="9" fill="#555">error to all layers</text>

  <!-- ── Arrow 3->4 ── -->
  <line x1="440" y1="80" x2="460" y2="80" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── STAGE 4: Silent Weight Corruption ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="460" y="30" width="120" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="520" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">4</text>
  <text x="520" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Weights</text>
  <text x="520" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Silently Wrong</text>
  <text x="520" y="100" text-anchor="middle" font-size="9" fill="#555">Model parameters</text>
  <text x="520" y="110" text-anchor="middle" font-size="9" fill="#555">permanently corrupted</text>

  <!-- ── Arrow 4->5 ── -->
  <line x1="580" y1="80" x2="600" y2="80" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── STAGE 5: Wrong Predictions ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="600" y="30" width="120" height="100" fill="#c44" stroke="#a31f34" stroke-width="1.2" rx="4"/>
  <text x="660" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
  <text x="660" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Wrong</text>
  <text x="660" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Output</text>
  <text x="660" y="100" text-anchor="middle" font-size="9" fill="#f9d6d5">Detected</text>
  <text x="660" y="110" text-anchor="middle" font-size="9" fill="#f9d6d5">much later</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── DETECTION GAP (large bracket) ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="170" width="680" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" opacity="0.5" rx="4"/>
  <rect x="40" y="170" width="680" height="50" fill="none" stroke="#c87b2a" stroke-width="1.2" rx="4"/>

  <text x="380" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Detection Gap</text>
  <text x="380" y="210" text-anchor="middle" font-size="9.5" fill="#555">Corruption occurs in microseconds; detection may take hours, days, or weeks</text>

  <!-- ── Corruption start marker ── -->
  <line x1="100" y1="160" x2="100" y2="230" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="100" y="240" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">Corruption</text>
  <text x="100" y="250" text-anchor="middle" font-size="8" fill="#c44">occurs</text>

  <!-- ── Detection marker ── -->
  <line x1="660" y1="160" x2="660" y2="230" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="660" y="240" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">Anomaly</text>
  <text x="660" y="250" text-anchor="middle" font-size="8" fill="#3d9e5a">detected</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── COMPARISON: SDC vs Detected Error ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <text x="380" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#333">SDC vs Detected Errors</text>

  <!-- ── Detected Error row ── -->
  <rect x="40" y="290" width="320" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="200" y="310" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Detected Error (Crash/Exception)</text>
  <text x="200" y="330" text-anchor="middle" font-size="9" fill="#555">Immediate detection; checkpoint-restart recovery</text>

  <!-- ── Timeline for detected error ── -->
  <line x1="60" y1="370" x2="340" y2="370" stroke="#3d9e5a" stroke-width="1.5"/>
  <circle cx="100" cy="370" r="4" fill="#c44"/>
  <text x="100" y="390" text-anchor="middle" font-size="8" fill="#c44">Error</text>
  <circle cx="140" cy="370" r="4" fill="#3d9e5a"/>
  <text x="140" y="390" text-anchor="middle" font-size="8" fill="#3d9e5a">Detect</text>
  <circle cx="200" cy="370" r="4" fill="#4a90c4"/>
  <text x="200" y="390" text-anchor="middle" font-size="8" fill="#4a90c4">Recover</text>
  <rect x="220" y="360" width="120" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="280" y="350" text-anchor="middle" font-size="7.5" fill="#3d9e5a">Resume training</text>

  <!-- ── SDC row ── -->
  <rect x="400" y="290" width="320" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="560" y="310" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Silent Data Corruption (SDC)</text>
  <text x="560" y="330" text-anchor="middle" font-size="9" fill="#555">No immediate signal; gradual model degradation</text>

  <!-- ── Timeline for SDC ── -->
  <line x1="420" y1="370" x2="700" y2="370" stroke="#c44" stroke-width="1.5"/>
  <circle cx="460" cy="370" r="4" fill="#c44"/>
  <text x="460" y="390" text-anchor="middle" font-size="8" fill="#c44">Error</text>

  <!-- ── Long undetected period ── -->
  <rect x="480" y="360" width="160" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="4"/>
  <text x="560" y="350" text-anchor="middle" font-size="7.5" fill="#c44">Corruption spreads silently</text>

  <circle cx="660" cy="370" r="4" fill="#c87b2a"/>
  <text x="660" y="390" text-anchor="middle" font-size="8" fill="#c87b2a">Detect</text>
  <text x="660" y="400" text-anchor="middle" font-size="7.5" fill="#c87b2a">(too late?)</text>

  <!-- ── Footnote ── -->
  <text x="380" y="510" text-anchor="middle" font-size="9" fill="#999" font-style="italic">SDC propagation chain: hardware fault to model-level corruption with extended detection latency</text>
</svg>