<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 530" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="530" fill="#fff"/>

  <!-- Titles -->
  <text x="170" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Normal State (ambient temperature)</text>
  <text x="590" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">Stressed State (thermal expansion)</text>

  <!-- Divider -->
  <line x1="380" y1="20" x2="380" y2="410" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ════════════ LEFT PANEL — NORMAL ════════════ -->
  <!-- IC Die block -->
  <rect x="70" y="60" width="200" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="170" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">IC Die</text>
  <text x="170" y="106" text-anchor="middle" font-size="9" fill="#4a90c4">SoC / GPU processor</text>
  <text x="170" y="120" text-anchor="middle" font-size="9" fill="#4a90c4">28°C ambient</text>

  <!-- Underfill -->
  <rect x="70" y="140" width="200" height="30" fill="#fdebd0" fill-opacity="0.5" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="170" y="134" font-size="9" fill="#c87b2a" text-anchor="middle">underfill epoxy</text>

  <!-- Bumps -->
  <!-- Bump 1 -->
  <ellipse cx="110" cy="170" rx="16" ry="6" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <rect x="94" y="140" width="32" height="30" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="110" cy="140" rx="16" ry="6" fill="#bbb" stroke="#999" stroke-width="1.2"/>
  <text x="110" y="184" text-anchor="middle" font-size="9" fill="#999">bump</text>

  <!-- Bump 2 -->
  <ellipse cx="170" cy="170" rx="16" ry="6" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <rect x="154" y="140" width="32" height="30" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="170" cy="140" rx="16" ry="6" fill="#bbb" stroke="#999" stroke-width="1.2"/>
  <text x="170" y="184" text-anchor="middle" font-size="9" fill="#999">bump</text>

  <!-- Bump 3 -->
  <ellipse cx="230" cy="170" rx="16" ry="6" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <rect x="214" y="140" width="32" height="30" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="230" cy="140" rx="16" ry="6" fill="#bbb" stroke="#999" stroke-width="1.2"/>
  <text x="230" y="184" text-anchor="middle" font-size="9" fill="#999">bump</text>

  <!-- Substrate -->
  <rect x="70" y="170" width="200" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="170" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#3d9e5a">Substrate (PCB)</text>
  <text x="170" y="214" text-anchor="middle" font-size="9" fill="#3d9e5a">organic laminate</text>

  <!-- Status -->
  <rect x="90" y="240" width="160" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Connection: INTACT</text>
  <text x="170" y="272" text-anchor="middle" font-size="9" fill="#3d9e5a">Electrical continuity: 100%</text>

  <!-- Detail Box -->
  <rect x="70" y="300" width="200" height="90" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Copper Bump (normal)</text>
  <rect x="120" y="330" width="100" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="170" y="354" text-anchor="middle" font-size="9" fill="#4a90c4">Cu bump — full contact</text>
  <rect x="120" y="370" width="100" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="170" y="378" text-anchor="middle" font-size="9" fill="#3d9e5a">substrate pad</text>

  <!-- ════════════ RIGHT PANEL — STRESSED ════════════ -->
  <!-- IC Die block -->
  <rect x="490" y="60" width="200" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="590" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">IC Die</text>
  <text x="590" y="106" text-anchor="middle" font-size="9" fill="#c44">thermal stress</text>
  <text x="590" y="120" text-anchor="middle" font-size="9" fill="#c44">95°C (GPU backward pass)</text>

  <!-- Bumps -->
  <!-- Bump 4 (intact) -->
  <ellipse cx="530" cy="170" rx="16" ry="6" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <rect x="514" y="140" width="32" height="30" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="530" cy="140" rx="16" ry="6" fill="#bbb" stroke="#999" stroke-width="1.2"/>

  <!-- Bump 5 (cracked) -->
  <ellipse cx="590" cy="170" rx="16" ry="6" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <rect x="574" y="158" width="32" height="12" fill="#bbb" stroke="#999" stroke-width="1"/>
  <line x1="570" y1="156" x2="610" y2="156" stroke="#c44" stroke-width="3"/>
  <rect x="574" y="140" width="32" height="14" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="590" cy="140" rx="16" ry="6" fill="#bbb" stroke="#c44" stroke-width="2"/>
  
  <!-- Crack annotation routed cleanly -->
  <path d="M 670 130 L 610 130 L 610 154" fill="none" stroke="#c44" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="675" y="129" font-size="9" fill="#c44" font-weight="700">← crack</text>
  <text x="675" y="141" font-size="9" fill="#c44">(intermittent open)</text>

  <!-- Bump 6 (intact) -->
  <ellipse cx="650" cy="170" rx="16" ry="6" fill="#e0e0e0" stroke="#999" stroke-width="1.2"/>
  <rect x="634" y="140" width="32" height="30" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="650" cy="140" rx="16" ry="6" fill="#bbb" stroke="#999" stroke-width="1.2"/>

  <!-- Substrate -->
  <rect x="490" y="170" width="200" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="590" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#3d9e5a">Substrate (PCB)</text>
  <text x="590" y="214" text-anchor="middle" font-size="9" fill="#3d9e5a">organic laminate</text>

  <!-- Status -->
  <rect x="510" y="240" width="160" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="590" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Connection: OPEN</text>
  <text x="590" y="272" text-anchor="middle" font-size="9" fill="#c44">Electrical continuity: intermittent</text>

  <!-- Detail Box -->
  <rect x="490" y="300" width="200" height="90" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="590" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#c44">Solder Crack (fatigued)</text>
  <rect x="540" y="330" width="100" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="590" y="338" text-anchor="middle" font-size="9" fill="#c44">Cu bump (separated)</text>
  <text x="590" y="354" text-anchor="middle" font-size="9" fill="#c44">← hairline crack →</text>
  <line x1="520" y1="360" x2="660" y2="360" stroke="#c44" stroke-width="2"/>
  <rect x="540" y="370" width="100" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="590" y="378" text-anchor="middle" font-size="9" fill="#3d9e5a">substrate pad</text>

  <!-- ════════════ BOTTOM PANEL ════════════ -->
  <rect x="80" y="420" width="600" height="90" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="380" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Intermittent Fault: Thermal Cycling Mechanism</text>

  <!-- Waveform -->
  <polyline points="120,475 150,455 180,475 210,455 240,475 270,455 300,475" fill="none" stroke="#c87b2a" stroke-width="2"/>
  <text x="120" y="485" font-size="9" fill="#999" text-anchor="middle">cold</text>
  <text x="150" y="450" font-size="9" fill="#c44" text-anchor="middle">hot</text>

  <!-- Left Descriptions -->
  <text x="210" y="490" text-anchor="middle" font-size="9" fill="#999">repeated heating/cooling cycles</text>
  <text x="210" y="502" text-anchor="middle" font-size="9" fill="#999">(GPU backward pass generates heat)</text>

  <!-- Right Annotations -->
  <text x="450" y="455" font-size="9.5" fill="#555">Die (Si): CTE = 2.8 ppm/°C</text>
  <text x="450" y="467" font-size="9.5" fill="#555">Substrate: CTE = 17 ppm/°C</text>
  <text x="450" y="479" font-size="9.5" fill="#c44" font-weight="700">CTE mismatch → fatigue crack</text>
  <text x="450" y="491" font-size="9" fill="#999">crack closes when cool → passes tests</text>
  <text x="450" y="503" font-size="9" fill="#999">crack opens when hot → intermittent open</text>
</svg>