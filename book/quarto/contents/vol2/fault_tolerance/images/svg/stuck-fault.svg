<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 510" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrowGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="510" fill="#fff"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT: Circuit diagram with stuck-at-0   -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Section header -->
  <text x="260" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Stuck-at-0 Fault on AND Gate</text>

  <!-- Input A -->
  <text x="50" y="135" text-anchor="end" font-size="12" fill="#333">A</text>
  <line x1="60" y1="130" x2="158" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlk)"/>
  <text x="110" y="120" text-anchor="middle" font-size="9" fill="#999">A = {0 or 1}</text>

  <!-- Input B (stuck-at-0) -->
  <text x="50" y="195" text-anchor="end" font-size="12" fill="#333">B</text>
  <line x1="60" y1="190" x2="158" y2="190" stroke="#c44" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="110" y="180" text-anchor="middle" font-size="9.5" fill="#c44" font-weight="700">Stuck-at-0</text>

  <!-- Ground symbol -->
  <line x1="60" y1="190" x2="60" y2="220" stroke="#c44" stroke-width="1.5"/>
  <line x1="45" y1="220" x2="75" y2="220" stroke="#c44" stroke-width="1.5"/>
  <line x1="50" y1="226" x2="70" y2="226" stroke="#c44" stroke-width="1.2"/>
  <line x1="55" y1="232" x2="65" y2="232" stroke="#c44" stroke-width="1"/>
  <text x="60" y="245" text-anchor="middle" font-size="8.5" fill="#c44">GND</text>

  <!-- AND Gate -->
  <rect x="160" y="110" width="80" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#c87b2a">AND</text>
  <text x="200" y="170" text-anchor="middle" font-size="9" fill="#c87b2a">&amp;</text>

  <!-- Output wire -->
  <line x1="240" y1="160" x2="348" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlk)"/>
  <text x="295" y="150" text-anchor="middle" font-size="10" fill="#555">Output Z</text>

  <!-- Output label -->
  <rect x="350" y="130" width="120" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="410" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">Z = 0</text>
  <text x="410" y="175" text-anchor="middle" font-size="9" fill="#c44">always, regardless of A</text>

  <!-- Fault label box -->
  <rect x="90" y="260" width="260" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="220" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Stuck-at-0 (SA0) fault:</text>
  <text x="220" y="290" text-anchor="middle" font-size="9" fill="#c44">Wire B permanently driven to logic 0</text>
  <text x="220" y="305" text-anchor="middle" font-size="9" fill="#c44">Caused by: short to ground, oxide breakdown</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT: Truth table showing fault effect -->
  <!-- ═══════════════════════════════════════ -->

  <text x="630" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Truth Table: SA0 Effect</text>

  <!-- Header -->
  <rect x="510" y="40" width="240" height="30" rx="4" fill="#555" stroke="#555" stroke-width="1.5"/>
  <text x="550" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">A</text>
  <text x="630" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">B (stuck)</text>
  <text x="710" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Z (out)</text>

  <!-- Row 1 -->
  <rect x="510" y="80" width="240" height="30" rx="4" fill="#fff" stroke="#bbb" stroke-width="1.2"/>
  <text x="550" y="100" text-anchor="middle" font-size="11" fill="#333">0</text>
  <text x="630" y="100" text-anchor="middle" font-size="11" fill="#c44" font-weight="700">0</text>
  <text x="710" y="100" text-anchor="middle" font-size="11" fill="#999">0</text>
  <text x="760" y="100" font-size="8" fill="#999" text-anchor="start">↔ OK</text>

  <!-- Row 2 -->
  <rect x="510" y="120" width="240" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="550" y="140" text-anchor="middle" font-size="11" fill="#333">0</text>
  <text x="630" y="140" text-anchor="middle" font-size="11" fill="#c44" font-weight="700">0</text>
  <text x="710" y="140" text-anchor="middle" font-size="11" fill="#999">0</text>
  <text x="760" y="140" font-size="8" fill="#999" text-anchor="start">↔ hidden</text>

  <!-- Row 3 -->
  <rect x="510" y="160" width="240" height="30" rx="4" fill="#fff" stroke="#bbb" stroke-width="1.2"/>
  <text x="550" y="180" text-anchor="middle" font-size="11" fill="#333">1</text>
  <text x="630" y="180" text-anchor="middle" font-size="11" fill="#c44" font-weight="700">0</text>
  <text x="710" y="180" text-anchor="middle" font-size="11" fill="#999">0</text>
  <text x="760" y="180" font-size="8" fill="#999" text-anchor="start">↔ OK</text>

  <!-- Row 4 -->
  <rect x="510" y="200" width="240" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="550" y="220" text-anchor="middle" font-size="11" fill="#333">1</text>
  <text x="630" y="220" text-anchor="middle" font-size="11" fill="#c44" font-weight="700">0</text>
  <text x="710" y="220" text-anchor="middle" font-size="11" fill="#c44" font-weight="700">0</text>
  <text x="760" y="220" font-size="8" fill="#c44" font-weight="700" text-anchor="start">← wrong!</text>

  <!-- Footnotes -->
  <text x="630" y="245" text-anchor="middle" font-size="7.5" fill="#c44" font-style="italic">always 0 due to fault</text>
  <text x="630" y="265" text-anchor="middle" font-size="8.5" fill="#999">Row 4: B should be 1 (from circuit),</text>
  <text x="630" y="280" text-anchor="middle" font-size="8.5" fill="#999">but SA0 forces B=0 → Z=0 instead of 1</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- BOTTOM: Stuck Fault Types Taxonomy      -->
  <!-- ═══════════════════════════════════════ -->

  <rect x="50" y="340" width="740" height="140" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="420" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#555">Stuck-at Fault Taxonomy</text>
  <line x1="420" y1="370" x2="420" y2="440" stroke="#ccc" stroke-width="1"/>

  <!-- SA0 -->
  <text x="240" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Stuck-at-0 (SA0)</text>
  <text x="240" y="400" text-anchor="middle" font-size="9" fill="#555">Wire always reads logic 0</text>
  <text x="240" y="415" text-anchor="middle" font-size="9" fill="#555">Cause: short to power supply ground</text>
  <text x="240" y="430" text-anchor="middle" font-size="9" fill="#555">Effect: AND outputs 0, OR unchanged when SA0 input is always 0</text>

  <!-- SA1 -->
  <text x="600" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Stuck-at-1 (SA1)</text>
  <text x="600" y="400" text-anchor="middle" font-size="9" fill="#555">Wire always reads logic 1</text>
  <text x="600" y="415" text-anchor="middle" font-size="9" fill="#555">Cause: short to VDD (power rail)</text>
  <text x="600" y="430" text-anchor="middle" font-size="9" fill="#555">Effect: OR outputs 1, AND unchanged when SA1 input is always 1</text>

  <text x="420" y="455" text-anchor="middle" font-size="9" fill="#999" font-style="italic">In ML accelerators, stuck-at faults in multiply-accumulate (MAC) units</text>
  <text x="420" y="470" text-anchor="middle" font-size="9" fill="#999" font-style="italic">produce incorrect gradient values — detectable via gradient norm monitoring</text>

</svg>