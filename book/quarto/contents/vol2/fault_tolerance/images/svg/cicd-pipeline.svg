<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="760" height="490" fill="#fff"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── CI Section ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="30" width="300" height="100" fill="none" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="170" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Continuous Integration (CI)</text>

  <!-- ── CD Section ── -->
  <rect x="340" y="30" width="360" height="100" fill="none" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="520" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Continuous Delivery (CD)</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── Pipeline Stages (main flow) ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->

  <!-- ── Stage 1: Code Commit ── -->
  <rect x="30" y="50" width="80" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="70" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Code</text>
  <text x="70" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Commit</text>

  <!-- Arrow -->
  <line x1="110" y1="80" x2="129" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 2: Unit Tests ── -->
  <rect x="130" y="50" width="80" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Unit</text>
  <text x="170" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Tests</text>

  <!-- Arrow -->
  <line x1="210" y1="80" x2="229" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 3: Integration Tests ── -->
  <rect x="230" y="50" width="80" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Integration</text>
  <text x="270" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Tests</text>

  <!-- Arrow (crossing into CD) -->
  <line x1="310" y1="80" x2="349" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 4: Chaos Tests (fault injection) ── -->
  <rect x="350" y="50" width="80" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="390" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Chaos</text>
  <text x="390" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Tests</text>

  <!-- Arrow -->
  <line x1="430" y1="80" x2="449" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 5: Staging ── -->
  <rect x="450" y="50" width="80" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="490" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Staging</text>
  <text x="490" y="90" text-anchor="middle" font-size="9" fill="#555">Shadow</text>

  <!-- Arrow -->
  <line x1="530" y1="80" x2="549" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 6: Canary ── -->
  <rect x="550" y="50" width="60" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Canary</text>
  <text x="580" y="90" text-anchor="middle" font-size="8" fill="#555">1%</text>

  <!-- Arrow -->
  <line x1="610" y1="80" x2="629" y2="80" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 7: Production ── -->
  <rect x="630" y="50" width="60" height="60" rx="4" fill="#3d9e5a" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="76" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Prod</text>
  <text x="660" y="90" text-anchor="middle" font-size="8" fill="#d4edda">100%</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── Fault Injection Detail (expanded Chaos Tests stage) ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="160" width="400" height="290" rx="4" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="220" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">Chaos / Fault Injection Stage (Detail)</text>

  <!-- ── Connection line from Chaos Tests stage ── -->
  <line x1="390" y1="110" x2="390" y2="160" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ── Fault type 1: Kill GPU ── -->
  <rect x="40" y="210" width="160" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="120" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Kill Random GPU</text>
  <text x="120" y="246" text-anchor="middle" font-size="8.5" fill="#555">Simulate hardware death;</text>
  <text x="120" y="260" text-anchor="middle" font-size="8.5" fill="#555">verify checkpoint recovery</text>

  <!-- ── Fault type 2: Network Partition ── -->
  <rect x="240" y="210" width="160" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="320" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Network Partition</text>
  <text x="320" y="246" text-anchor="middle" font-size="8.5" fill="#555">Split cluster into partitions;</text>
  <text x="320" y="260" text-anchor="middle" font-size="8.5" fill="#555">test collective comm failure</text>

  <!-- ── Fault type 3: Disk Full ── -->
  <rect x="40" y="290" width="160" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="120" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Disk Full</text>
  <text x="120" y="326" text-anchor="middle" font-size="8.5" fill="#555">Fill checkpoint storage;</text>
  <text x="120" y="340" text-anchor="middle" font-size="8.5" fill="#555">test graceful degradation</text>

  <!-- ── Fault type 4: Bit Corruption ── -->
  <rect x="240" y="290" width="160" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="320" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Inject Bit Corruption</text>
  <text x="320" y="326" text-anchor="middle" font-size="8.5" fill="#555">Flip bits in weights/grads;</text>
  <text x="320" y="340" text-anchor="middle" font-size="8.5" fill="#555">test SDC detection pipeline</text>

  <!-- ── Gate checks ── -->
  <rect x="40" y="370" width="360" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="220" y="386" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Gate Checks (must all pass to proceed)</text>
  <text x="220" y="402" text-anchor="middle" font-size="8.5" fill="#555">Recovery &lt; SLA timeout</text>
  <text x="220" y="414" text-anchor="middle" font-size="8.5" fill="#555">No data loss beyond last ckpt</text>
  <text x="220" y="426" text-anchor="middle" font-size="8.5" fill="#555">Accuracy within tolerance</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── Staging Detail ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="450" y="160" width="270" height="120" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="585" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Staging (Shadow Traffic)</text>

  <text x="470" y="210" font-size="9" fill="#555">• Mirror production requests to new model</text>
  <text x="470" y="226" font-size="9" fill="#555">• Compare responses (no user-visible impact)</text>
  <text x="470" y="242" font-size="9" fill="#555">• Measure latency, throughput, accuracy drift</text>
  <text x="470" y="258" font-size="9" fill="#555">• Validate checkpoint load and failover paths</text>

  <!-- ── Connection line from Staging stage ── -->
  <line x1="490" y1="110" x2="490" y2="160" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── Canary / Production Detail ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="450" y="310" width="270" height="120" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="585" y="334" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Canary → Production</text>

  <text x="470" y="360" font-size="9" fill="#555">• Route 1% traffic to new model (canary)</text>
  <text x="470" y="376" font-size="9" fill="#555">• Monitor error rate, p99 latency, loss</text>
  <text x="470" y="392" font-size="9" fill="#555">• Auto-rollback if metrics degrade</text>
  <text x="470" y="408" font-size="9" fill="#555">• Gradual ramp: 1% → 5% → 25% → 100%</text>

  <!-- ── Connection line from Canary stage ── -->
  <path d="M 580 110 L 580 145 L 740 145 L 740 370 L 720 370" fill="none" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Footnote ── -->
  <text x="380" y="475" text-anchor="middle" font-size="9" fill="#999" font-style="italic">
    ML systems CI/CD pipeline with dedicated fault injection and progressive rollout stages
  </text>
</svg>