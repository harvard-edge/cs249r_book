<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="1000" height="540" fill="#fff"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── DATACENTER (outermost) ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="960" height="440" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="500" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Datacenter</text>
  <text x="960" y="40" text-anchor="end" font-size="9" fill="#999">MTBF: ~5 yrs</text>
  <text x="960" y="50" text-anchor="end" font-size="9" fill="#a31f34">Blast: all GPUs</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── POWER DOMAIN / NETWORK SWITCH ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="70" width="920" height="370" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" opacity="0.5"/>
  <rect x="40" y="70" width="920" height="370" rx="4" fill="none" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="500" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">PDU / Network Switch Domain</text>
  <text x="940" y="90" text-anchor="end" font-size="9" fill="#999">MTBF: ~2 yrs</text>
  <text x="940" y="100" text-anchor="end" font-size="9" fill="#a31f34">Blast: 100-500 GPUs</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── RACK 1 ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="120" width="420" height="300" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <rect x="60" y="120" width="420" height="300" rx="4" fill="none" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Rack (ToR Switch)</text>
  <text x="460" y="140" text-anchor="end" font-size="9" fill="#999">MTBF: ~1 yr</text>
  <text x="460" y="150" text-anchor="end" font-size="9" fill="#a31f34">Blast: 32-64 GPUs</text>

  <!-- ── Node 1 (in Rack 1) ── -->
  <rect x="80" y="170" width="180" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="170" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="170" y="200" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="170" y="210" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 1 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="100" y="240" width="20" height="20" rx="2"/>
    <rect x="140" y="240" width="20" height="20" rx="2"/>
    <rect x="180" y="240" width="20" height="20" rx="2"/>
    <rect x="220" y="240" width="20" height="20" rx="2"/>
    <rect x="100" y="270" width="20" height="20" rx="2"/>
    <rect x="140" y="270" width="20" height="20" rx="2"/>
    <rect x="180" y="270" width="20" height="20" rx="2"/>
    <rect x="220" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="170" y="310" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs (MTBF: ~50K hrs)</text>

  <!-- ── Node 2 (in Rack 1) ── -->
  <rect x="280" y="170" width="180" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="370" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="370" y="200" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="370" y="210" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 2 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="300" y="240" width="20" height="20" rx="2"/>
    <rect x="340" y="240" width="20" height="20" rx="2"/>
    <rect x="380" y="240" width="20" height="20" rx="2"/>
    <rect x="420" y="240" width="20" height="20" rx="2"/>
    <rect x="300" y="270" width="20" height="20" rx="2"/>
    <rect x="340" y="270" width="20" height="20" rx="2"/>
    <rect x="380" y="270" width="20" height="20" rx="2"/>
    <rect x="420" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="370" y="310" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs (MTBF: ~50K hrs)</text>

  <!-- ── Ellipsis in Rack 1 ── -->
  <text x="270" y="350" text-anchor="middle" font-size="12" fill="#999">. . .</text>
  <text x="270" y="370" text-anchor="middle" font-size="9" fill="#999">4-8 nodes per rack</text>

  <!-- ── Rack 1 total ── -->
  <text x="270" y="400" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="700">32-64 GPUs total</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── RACK 2 ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="520" y="120" width="420" height="300" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <rect x="520" y="120" width="420" height="300" rx="4" fill="none" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="730" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Rack (ToR Switch)</text>

  <!-- ── Node 3 (in Rack 2) ── -->
  <rect x="540" y="170" width="180" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="630" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="630" y="200" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="630" y="210" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 3 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="560" y="240" width="20" height="20" rx="2"/>
    <rect x="600" y="240" width="20" height="20" rx="2"/>
    <rect x="640" y="240" width="20" height="20" rx="2"/>
    <rect x="680" y="240" width="20" height="20" rx="2"/>
    <rect x="560" y="270" width="20" height="20" rx="2"/>
    <rect x="600" y="270" width="20" height="20" rx="2"/>
    <rect x="640" y="270" width="20" height="20" rx="2"/>
    <rect x="680" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="630" y="310" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs (MTBF: ~50K hrs)</text>

  <!-- ── Node 4 (in Rack 2) ── -->
  <rect x="740" y="170" width="180" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="830" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="830" y="200" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="830" y="210" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 4 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="760" y="240" width="20" height="20" rx="2"/>
    <rect x="800" y="240" width="20" height="20" rx="2"/>
    <rect x="840" y="240" width="20" height="20" rx="2"/>
    <rect x="880" y="240" width="20" height="20" rx="2"/>
    <rect x="760" y="270" width="20" height="20" rx="2"/>
    <rect x="800" y="270" width="20" height="20" rx="2"/>
    <rect x="840" y="270" width="20" height="20" rx="2"/>
    <rect x="880" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="830" y="310" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs</text>

  <!-- ── Ellipsis in Rack 2 ── -->
  <text x="730" y="350" text-anchor="middle" font-size="12" fill="#999">. . .</text>
  <text x="730" y="370" text-anchor="middle" font-size="9" fill="#999">4-8 nodes per rack</text>

  <!-- ── Rack 2 total ── -->
  <text x="730" y="400" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="700">32-64 GPUs total</text>

  <!-- ── Legend ── -->
  <g transform="translate(60, 490)">
    <rect x="0" y="0" width="20" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="30" y="10" font-size="9" fill="#555">GPU</text>

    <rect x="100" y="0" width="20" height="10" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="130" y="10" font-size="9" fill="#555">Node</text>

    <rect x="200" y="0" width="20" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="230" y="10" font-size="9" fill="#555">Rack</text>

    <rect x="300" y="0" width="20" height="10" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="330" y="10" font-size="9" fill="#555">PDU / Switch</text>

    <rect x="440" y="0" width="20" height="10" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="470" y="10" font-size="9" fill="#555">Datacenter</text>
  </g>

  <!-- ── Footnote ── -->
  <text x="500" y="520" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Nested failure domains; inner failures propagate outward through containment hierarchy</text>

</svg>