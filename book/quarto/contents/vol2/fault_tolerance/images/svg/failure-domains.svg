<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="920" height="540" fill="#fff"/>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── DATACENTER (outermost) ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="880" height="440" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="460" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Datacenter</text>
  <text x="880" y="44" text-anchor="end" font-size="9" fill="#999">MTBF: ~5 yrs</text>
  <text x="880" y="56" text-anchor="end" font-size="9" fill="#a31f34">Blast: all GPUs</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── POWER DOMAIN / NETWORK SWITCH ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="40" y="70" width="840" height="370" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" opacity="0.6"/>
  <rect x="40" y="70" width="840" height="370" rx="4" fill="none" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="460" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">PDU / Network Switch Domain</text>
  <text x="860" y="94" text-anchor="end" font-size="9" fill="#999">MTBF: ~2 yrs</text>
  <text x="860" y="106" text-anchor="end" font-size="9" fill="#a31f34">Blast: 100-500 GPUs</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── RACK 1 ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="120" width="380" height="300" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <rect x="60" y="120" width="380" height="300" rx="4" fill="none" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="250" y="144" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Rack (ToR Switch)</text>
  <text x="420" y="144" text-anchor="end" font-size="9" fill="#999">MTBF: ~1 yr</text>
  <text x="420" y="156" text-anchor="end" font-size="9" fill="#a31f34">Blast: 32-64 GPUs</text>

  <!-- ── Node 1 (in Rack 1) ── -->
  <rect x="80" y="170" width="150" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="155" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="155" y="202" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="155" y="214" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 1 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="100" y="240" width="20" height="20" rx="2"/>
    <rect x="130" y="240" width="20" height="20" rx="2"/>
    <rect x="160" y="240" width="20" height="20" rx="2"/>
    <rect x="190" y="240" width="20" height="20" rx="2"/>
    <rect x="100" y="270" width="20" height="20" rx="2"/>
    <rect x="130" y="270" width="20" height="20" rx="2"/>
    <rect x="160" y="270" width="20" height="20" rx="2"/>
    <rect x="190" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="155" y="306" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs (MTBF: ~50K hrs)</text>

  <!-- ── Node 2 (in Rack 1) ── -->
  <rect x="270" y="170" width="150" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="345" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="345" y="202" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="345" y="214" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 2 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="290" y="240" width="20" height="20" rx="2"/>
    <rect x="320" y="240" width="20" height="20" rx="2"/>
    <rect x="350" y="240" width="20" height="20" rx="2"/>
    <rect x="380" y="240" width="20" height="20" rx="2"/>
    <rect x="290" y="270" width="20" height="20" rx="2"/>
    <rect x="320" y="270" width="20" height="20" rx="2"/>
    <rect x="350" y="270" width="20" height="20" rx="2"/>
    <rect x="380" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="345" y="306" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs (MTBF: ~50K hrs)</text>

  <!-- ── Ellipsis in Rack 1 ── -->
  <text x="250" y="354" text-anchor="middle" font-size="12" fill="#999">. . .</text>
  <text x="250" y="374" text-anchor="middle" font-size="9" fill="#999">4-8 nodes per rack</text>

  <!-- ── Rack 1 total ── -->
  <text x="250" y="404" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="700">32-64 GPUs total</text>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- ── RACK 2 ── -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <rect x="480" y="120" width="380" height="300" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <rect x="480" y="120" width="380" height="300" rx="4" fill="none" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="670" y="144" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Rack (ToR Switch)</text>

  <!-- ── Node 3 (in Rack 2) ── -->
  <rect x="500" y="170" width="150" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="575" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="575" y="202" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="575" y="214" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 3 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="520" y="240" width="20" height="20" rx="2"/>
    <rect x="550" y="240" width="20" height="20" rx="2"/>
    <rect x="580" y="240" width="20" height="20" rx="2"/>
    <rect x="610" y="240" width="20" height="20" rx="2"/>
    <rect x="520" y="270" width="20" height="20" rx="2"/>
    <rect x="550" y="270" width="20" height="20" rx="2"/>
    <rect x="580" y="270" width="20" height="20" rx="2"/>
    <rect x="610" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="575" y="306" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs (MTBF: ~50K hrs)</text>

  <!-- ── Node 4 (in Rack 2) ── -->
  <rect x="690" y="170" width="150" height="150" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="765" y="188" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Node</text>
  <text x="765" y="202" text-anchor="middle" font-size="9" fill="#999">MTBF: ~6 mo</text>
  <text x="765" y="214" text-anchor="middle" font-size="9" fill="#a31f34">Blast: 8 GPUs</text>

  <!-- ── GPU grid in Node 4 ── -->
  <g fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2">
    <rect x="710" y="240" width="20" height="20" rx="2"/>
    <rect x="740" y="240" width="20" height="20" rx="2"/>
    <rect x="770" y="240" width="20" height="20" rx="2"/>
    <rect x="800" y="240" width="20" height="20" rx="2"/>
    <rect x="710" y="270" width="20" height="20" rx="2"/>
    <rect x="740" y="270" width="20" height="20" rx="2"/>
    <rect x="770" y="270" width="20" height="20" rx="2"/>
    <rect x="800" y="270" width="20" height="20" rx="2"/>
  </g>
  <text x="765" y="306" text-anchor="middle" font-size="8" fill="#4a90c4">8 GPUs</text>

  <!-- ── Ellipsis in Rack 2 ── -->
  <text x="670" y="354" text-anchor="middle" font-size="12" fill="#999">. . .</text>
  <text x="670" y="374" text-anchor="middle" font-size="9" fill="#999">4-8 nodes per rack</text>

  <!-- ── Rack 2 total ── -->
  <text x="670" y="404" text-anchor="middle" font-size="9" fill="#4a90c4" font-weight="700">32-64 GPUs total</text>

  <!-- ── Legend ── -->
  <g transform="translate(60, 490)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="20" y="9" font-size="9" fill="#555">GPU</text>

    <rect x="100" y="0" width="14" height="10" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="120" y="9" font-size="9" fill="#555">Node</text>

    <rect x="200" y="0" width="14" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="220" y="9" font-size="9" fill="#555">Rack</text>

    <rect x="300" y="0" width="14" height="10" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="320" y="9" font-size="9" fill="#555">PDU / Switch</text>

    <rect x="440" y="0" width="14" height="10" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
    <text x="460" y="9" font-size="9" fill="#555">Datacenter</text>
  </g>

  <!-- ── Footnote ── -->
  <text x="460" y="524" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Nested failure domains; inner failures propagate outward through containment hierarchy</text>

</svg>