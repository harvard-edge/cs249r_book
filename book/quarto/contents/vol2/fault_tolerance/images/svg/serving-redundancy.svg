<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrowOr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="460" fill="#fff"/>

  <!-- Divider -->
  <line x1="340" y1="28" x2="340" y2="440" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT PANEL: Active-Active -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="182.0" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Active-Active</text>

  <!-- Load Balancer -->
  <rect x="96" y="68" width="148" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8" rx="4"/>
  <text x="170" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Load Balancer</text>
  <text x="170" y="100" text-anchor="middle" font-size="8.5" fill="#4a90c4">round-robin / weighted</text>

  <!-- Traffic in arrow -->
  <line x1="170" y1="44" x2="170" y2="68" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlk)"/>
  <text x="145" y="60" font-size="8.5" fill="#555">traffic</text>

  <!-- Replicas 1, 2, 3 (green) -->
  <rect x="16" y="155" width="96" height="52" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8" rx="4"/>
  <text x="64" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Replica 1</text>
  <text x="64" y="192" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active</text>

  <rect x="122" y="155" width="96" height="52" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8" rx="4"/>
  <text x="170" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Replica 2</text>
  <text x="170" y="192" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active</text>

  <rect x="228" y="155" width="96" height="52" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8" rx="4"/>
  <text x="276" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Replica 3</text>
  <text x="276" y="192" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active</text>

  <!-- LB → replicas (Orthogonal routing) -->
  <path d="M140,108 L140,125 L64,125 L64,155" fill="none" stroke="#3d9e5a" stroke-width="1.3" marker-end="url(#arrowGrn)"/>
  <path d="M170,108 L170,155" fill="none" stroke="#3d9e5a" stroke-width="1.3" marker-end="url(#arrowGrn)"/>
  <path d="M200,108 L200,125 L276,125 L276,155" fill="none" stroke="#3d9e5a" stroke-width="1.3" marker-end="url(#arrowGrn)"/>

  <!-- Load distribution labels -->
  <text x="69" y="145" font-size="8" fill="#3d9e5a">~33%</text>
  <text x="175" y="145" font-size="8" fill="#3d9e5a">~33%</text>
  <text x="281" y="145" font-size="8" fill="#3d9e5a">~33%</text>

  <!-- Response arrows back up (Straight down to utilization box) -->
  <path d="M64,207 L64,250" fill="none" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGrn)"/>
  <path d="M170,207 L170,250" fill="none" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGrn)"/>
  <path d="M276,207 L276,250" fill="none" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGrn)"/>

  <!-- Utilization annotation -->
  <rect x="40" y="250" width="260" height="44" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4"/>
  <text x="170" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Higher utilization</text>
  <text x="170" y="282" text-anchor="middle" font-size="9" fill="#3d9e5a">All replicas serve traffic simultaneously</text>
  <text x="170" y="292" text-anchor="middle" font-size="8.5" fill="#3d9e5a">No idle capacity — cost efficient</text>

  <!-- Trade-off note -->
  <rect x="40" y="306" width="260" height="44" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="4"/>
  <text x="170" y="324" text-anchor="middle" font-size="9" font-weight="600" fill="#c87b2a">Trade-off:</text>
  <text x="170" y="337" text-anchor="middle" font-size="8.5" fill="#c87b2a">Failover adds rebalancing latency.</text>
  <text x="170" y="349" text-anchor="middle" font-size="8.5" fill="#c87b2a">Load spikes if 1 replica fails.</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Active-Passive -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="522.0" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Active-Passive</text>

  <!-- Load Balancer -->
  <rect x="436" y="68" width="148" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.8" rx="4"/>
  <text x="510" y="87" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Load Balancer</text>
  <text x="510" y="100" text-anchor="middle" font-size="8.5" fill="#4a90c4">monitors primary health</text>

  <!-- Traffic in arrow -->
  <line x1="510" y1="44" x2="510" y2="68" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlk)"/>
  <text x="485" y="60" font-size="8.5" fill="#555">traffic</text>

  <!-- Primary (green, active) -->
  <rect x="462" y="155" width="96" height="52" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.8" rx="4"/>
  <text x="510" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Primary</text>
  <text x="510" y="192" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active — all traffic</text>

  <!-- LB → Primary arrow -->
  <line x1="510" y1="108" x2="510" y2="155" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGrn)"/>
  <text x="516" y="136" font-size="8" fill="#3d9e5a">100%</text>

  <!-- Standby 1 (gray) -->
  <rect x="392" y="245" width="96" height="52" fill="#e0e0e0" stroke="#999" stroke-width="1.5" rx="4"/>
  <text x="440" y="265" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Standby 1</text>
  <text x="440" y="279" text-anchor="middle" font-size="8" fill="#999">idle — warm</text>

  <!-- Standby 2 (gray) -->
  <rect x="532" y="245" width="96" height="52" fill="#e0e0e0" stroke="#999" stroke-width="1.5" rx="4"/>
  <text x="580" y="265" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Standby 2</text>
  <text x="580" y="279" text-anchor="middle" font-size="8" fill="#999">idle — warm</text>

  <!-- Heartbeat from LB to standbys (monitoring) -->
  <path d="M455,108 L455,245" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,3"/>
  <path d="M565,108 L565,245" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="450" y="180" text-anchor="end" font-size="7.5" fill="#999" font-style="italic">health</text>
  <text x="450" y="190" text-anchor="end" font-size="7.5" fill="#999" font-style="italic">check</text>

  <!-- Primary FAILS: X badge positioned strictly in corner avoiding text -->
  <circle cx="558" cy="155" r="14" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="558" y="159.5" text-anchor="middle" font-size="12" fill="#c44" font-weight="700">✕</text>

  <!-- Failover arrow (Orthogonal route) from LB to Standby 1 -->
  <path d="M440,108 L440,135 L410,135 L410,245" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOr)"/>
  <text x="415" y="172" font-size="8" fill="#c87b2a" font-weight="700">failover</text>

  <!-- Failover label annotation -->
  <rect x="385" y="310" width="110" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="4"/>
  <text x="440" y="326" text-anchor="middle" font-size="9" fill="#c87b2a" font-weight="700">Instant failover</text>
  <text x="440" y="336" text-anchor="middle" font-size="8" fill="#c87b2a">standby promoted</text>

  <!-- Trade-off boxes -->
  <rect x="379" y="350" width="262" height="44" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="4"/>
  <text x="510" y="368" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Instant failover</text>
  <text x="510" y="382" text-anchor="middle" font-size="9" fill="#c87b2a">Standby replicas immediately take over</text>

  <rect x="379" y="404" width="262" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="4"/>
  <text x="510" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#c87b2a">Trade-off: lower utilization</text>
  <text x="510" y="428" text-anchor="middle" font-size="8.5" fill="#c87b2a">Standby capacity is reserved but idle</text>

  <!-- Bottom note -->
  <text x="340" y="450" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Active-active preferred for inference throughput; active-passive preferred for deterministic failover SLOs</text>
</svg>