<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrowOr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fff"/>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="470" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LEFT PANEL: Active-Active -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="200" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Active-Active</text>

  <!-- Traffic in arrow -->
  <line x1="200" y1="40" x2="200" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlk)"/>
  <text x="160" y="55" font-size="8.5" fill="#555">traffic</text>

  <!-- Load Balancer -->
  <rect x="130" y="70" width="140" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="200" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Load Balancer</text>
  <text x="200" y="100" text-anchor="middle" font-size="8.5" fill="#4a90c4">round-robin / weighted</text>

  <!-- LB → replicas (Orthogonal routing) -->
  <path d="M160,110 L160,130 L80,130 L80,150" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGrn)"/>
  <path d="M200,110 L200,150" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGrn)"/>
  <path d="M240,110 L240,130 L320,130 L320,150" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGrn)"/>

  <!-- Load distribution labels -->
  <text x="90" y="145" font-size="8" fill="#3d9e5a">~33%</text>
  <text x="210" y="145" font-size="8" fill="#3d9e5a">~33%</text>
  <text x="330" y="145" font-size="8" fill="#3d9e5a">~33%</text>

  <!-- Replicas 1, 2, 3 (green) -->
  <rect x="30" y="150" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="80" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Replica 1</text>
  <text x="80" y="185" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active</text>

  <rect x="150" y="150" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="200" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Replica 2</text>
  <text x="200" y="185" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active</text>

  <rect x="270" y="150" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="320" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Replica 3</text>
  <text x="320" y="185" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active</text>

  <!-- Response arrows back up (Straight down to utilization box) -->
  <path d="M80,200 L80,240" fill="none" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGrn)"/>
  <path d="M200,200 L200,240" fill="none" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGrn)"/>
  <path d="M320,200 L320,240" fill="none" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGrn)"/>

  <!-- Utilization annotation -->
  <rect x="30" y="240" width="340" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="200" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Higher utilization</text>
  <text x="200" y="275" text-anchor="middle" font-size="9" fill="#3d9e5a">All replicas serve traffic simultaneously</text>
  <text x="200" y="290" text-anchor="middle" font-size="8.5" fill="#3d9e5a">No idle capacity — cost efficient</text>

  <!-- Trade-off note -->
  <rect x="30" y="320" width="340" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="200" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#c87b2a">Trade-off:</text>
  <text x="200" y="355" text-anchor="middle" font-size="8.5" fill="#c87b2a">Failover adds rebalancing latency.</text>
  <text x="200" y="370" text-anchor="middle" font-size="8.5" fill="#c87b2a">Load spikes if 1 replica fails.</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Active-Passive -->
  <!-- ═══════════════════════════════════════════ -->
  <text x="600" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Active-Passive</text>

  <!-- Traffic in arrow -->
  <line x1="600" y1="40" x2="600" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#arrowBlk)"/>
  <text x="560" y="55" font-size="8.5" fill="#555">traffic</text>

  <!-- Load Balancer -->
  <rect x="530" y="70" width="140" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="600" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Load Balancer</text>
  <text x="600" y="100" text-anchor="middle" font-size="8.5" fill="#4a90c4">monitors primary health</text>

  <!-- LB → Primary arrow -->
  <line x1="600" y1="110" x2="600" y2="150" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGrn)"/>
  <text x="615" y="135" font-size="8" fill="#3d9e5a">100%</text>

  <!-- Heartbeat from LB to standbys (monitoring) -->
  <path d="M540,110 L540,120 L490,120 L490,240" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,3"/>
  <path d="M660,110 L660,120 L710,120 L710,240" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="485" y="180" text-anchor="end" font-size="7.5" fill="#999" font-style="italic">health</text>
  <text x="485" y="195" text-anchor="end" font-size="7.5" fill="#999" font-style="italic">check</text>

  <!-- Failover arrow (Orthogonal route) from LB to Standby 1 -->
  <path d="M560,110 L560,130 L520,130 L520,240" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOr)"/>
  <text x="525" y="215" font-size="8" fill="#c87b2a" font-weight="700">failover</text>

  <!-- Primary (green, active) -->
  <rect x="550" y="150" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="600" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Primary</text>
  <text x="600" y="185" text-anchor="middle" font-size="8.5" fill="#3d9e5a">active — all traffic</text>

  <!-- Primary FAILS: X badge positioned strictly in corner avoiding text -->
  <circle cx="650" cy="150" r="14" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="650" y="154.5" text-anchor="middle" font-size="12" fill="#c44" font-weight="700">✕</text>

  <!-- Standby 1 (gray) -->
  <rect x="470" y="240" width="100" height="50" fill="#e0e0e0" stroke="#999" stroke-width="1.5" rx="4"/>
  <text x="520" y="260" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Standby 1</text>
  <text x="520" y="275" text-anchor="middle" font-size="8" fill="#999">idle — warm</text>

  <!-- Standby 2 (gray) -->
  <rect x="630" y="240" width="100" height="50" fill="#e0e0e0" stroke="#999" stroke-width="1.5" rx="4"/>
  <text x="680" y="260" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Standby 2</text>
  <text x="680" y="275" text-anchor="middle" font-size="8" fill="#999">idle — warm</text>

  <!-- Failover label annotation -->
  <rect x="465" y="300" width="110" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="520" y="314" text-anchor="middle" font-size="9" fill="#c87b2a" font-weight="700">Instant failover</text>
  <text x="520" y="324" text-anchor="middle" font-size="8" fill="#c87b2a">standby promoted</text>

  <!-- Trade-off boxes -->
  <rect x="430" y="340" width="340" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="600" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Instant failover</text>
  <text x="600" y="375" text-anchor="middle" font-size="9" fill="#c87b2a">Standby replicas immediately take over</text>

  <rect x="430" y="400" width="340" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="600" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#c87b2a">Trade-off: lower utilization</text>
  <text x="600" y="430" text-anchor="middle" font-size="8.5" fill="#c87b2a">Standby capacity is reserved but idle</text>

  <!-- Bottom note -->
  <text x="400" y="470" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Active-active preferred for inference throughput; active-passive preferred for deterministic failover SLOs</text>
</svg>