<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Recovery Time Decomposition: T_recovery</text>
  <text x="340" y="44" text-anchor="middle" font-size="9" fill="#555">T_recovery = T_detect + T_restart + T_load + T_warmup</text>

  <!-- ===== Timeline bar ===== -->
  <!-- Failure marker -->
  <line x1="52" y1="100" x2="52" y2="300" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="52" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Failure</text>

  <!-- T_detect segment (orange) -->
  <rect x="52" y="130" width="120" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="112" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">T_detect</text>
  <text x="112" y="168" text-anchor="middle" font-size="8.5" fill="#555">30–180 s</text>

  <!-- T_restart segment (red/pink) -->
  <rect x="172" y="130" width="140" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="242" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">T_restart</text>
  <text x="242" y="168" text-anchor="middle" font-size="8.5" fill="#555">3–15 min</text>

  <!-- T_load segment (blue) -->
  <rect x="312" y="130" width="180" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="402" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">T_load</text>
  <text x="402" y="168" text-anchor="middle" font-size="8.5" fill="#555">5–30 min</text>

  <!-- T_warmup segment (green) -->
  <rect x="492" y="130" width="136" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="560" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">T_warmup</text>
  <text x="560" y="168" text-anchor="middle" font-size="8.5" fill="#555">1–5 min</text>

  <!-- Resume marker -->
  <line x1="628" y1="100" x2="628" y2="300" stroke="#3d9e5a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="628" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Resume</text>

  <!-- Total span annotation -->
  <line x1="52" y1="205" x2="628" y2="205" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <rect x="232" y="192" width="216" height="20" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="340" y="206" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Total T_recovery (typical: 15–50 min)</text>

  <!-- ===== Detail boxes below ===== -->

  <!-- T_detect detail -->
  <rect x="28" y="225" width="144" height="110" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="100" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">T_detect</text>
  <text x="44" y="262" font-size="8" fill="#555">• Heartbeat timeout fires</text>
  <text x="44" y="277" font-size="8" fill="#555">• NCCL collective hangs</text>
  <text x="44" y="292" font-size="8" fill="#555">• Loss spike / NaN detected</text>
  <text x="44" y="307" font-size="8" fill="#555">• Health probe fails k times</text>
  <text x="44" y="325" font-size="8" font-weight="700" fill="#c87b2a">Optimize: reduce timeout</text>

  <!-- T_restart detail -->
  <rect x="178" y="225" width="128" height="110" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="242" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">T_restart</text>
  <text x="186" y="262" font-size="8" fill="#555">• Kill all surviving workers</text>
  <text x="186" y="277" font-size="8" fill="#555">• Scheduler finds new node</text>
  <text x="186" y="292" font-size="8" fill="#555">• Launch containers</text>
  <text x="186" y="307" font-size="8" fill="#555">• Init communicator</text>
  <text x="186" y="325" font-size="8" font-weight="700" fill="#c44">Optimize: hot spares</text>

  <!-- T_load detail -->
  <rect x="312" y="225" width="174" height="110" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="399" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">T_load</text>
  <text x="320" y="262" font-size="8" fill="#555">• Read checkpoint from storage</text>
  <text x="320" y="277" font-size="8" fill="#555">• Transfer to GPU HBM</text>
  <text x="320" y="292" font-size="8" fill="#555">• Verify shard integrity</text>
  <text x="320" y="307" font-size="8" fill="#555">• Sync parameters across ranks</text>
  <text x="320" y="325" font-size="8" font-weight="700" fill="#4a90c4">Optimize: local NVMe cache</text>

  <!-- T_warmup detail -->
  <rect x="492" y="225" width="160" height="110" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="572" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">T_warmup</text>
  <text x="500" y="262" font-size="8" fill="#555">• Refill data pipeline buffers</text>
  <text x="500" y="277" font-size="8" fill="#555">• JIT kernel recompilation</text>
  <text x="500" y="292" font-size="8" fill="#555">• NCCL ring discovery</text>
  <text x="500" y="307" font-size="8" fill="#555">• Throughput stabilizes</text>
  <text x="500" y="325" font-size="8" font-weight="700" fill="#3d9e5a">Optimize: persistent workers</text>

  <!-- ===== Optimization target bar ===== -->
  <rect x="28" y="352" width="624" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="340" y="371" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Dominant Term by Configuration</text>
  <text x="100" y="392" text-anchor="middle" font-size="8.5" fill="#c87b2a">T_detect dominates</text>
  <text x="100" y="405" text-anchor="middle" font-size="8" fill="#555">→ large clusters,</text>
  <text x="100" y="416" text-anchor="middle" font-size="8" fill="#555">slow heartbeat</text>
  <text x="270" y="392" text-anchor="middle" font-size="8.5" fill="#c44">T_restart dominates</text>
  <text x="270" y="405" text-anchor="middle" font-size="8" fill="#555">→ no hot spares,</text>
  <text x="270" y="416" text-anchor="middle" font-size="8" fill="#555">cold container start</text>
  <text x="450" y="392" text-anchor="middle" font-size="8.5" fill="#4a90c4">T_load dominates</text>
  <text x="450" y="405" text-anchor="middle" font-size="8" fill="#555">→ remote PFS,</text>
  <text x="450" y="416" text-anchor="middle" font-size="8" fill="#555">large model shards</text>
  <text x="600" y="392" text-anchor="middle" font-size="8.5" fill="#3d9e5a">T_warmup dominates</text>
  <text x="600" y="405" text-anchor="middle" font-size="8" fill="#555">→ large KV caches,</text>
  <text x="600" y="416" text-anchor="middle" font-size="8" fill="#555">JIT compilation</text>

  <!-- ── Footnote ── -->
  <text x="340" y="446" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each component of T_recovery has a distinct dominant cause and optimization strategy; the bottleneck shifts with cluster configuration</text>
</svg>