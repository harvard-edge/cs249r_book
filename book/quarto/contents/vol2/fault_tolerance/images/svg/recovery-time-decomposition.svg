<?xml version='1.0' encoding='utf-8'?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="430" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Recovery Time Decomposition: T_recovery</text>
  <text x="430" y="54" text-anchor="middle" font-size="9" fill="#555">T_recovery = T_detect + T_restart + T_load + T_warmup</text>

  <!-- ===== Timeline bar ===== -->
  <!-- Failure marker -->
  <line x1="40" y1="110" x2="40" y2="360" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="40" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Failure</text>

  <!-- T_detect segment (orange) -->
  <rect x="40" y="140" width="160" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="120" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">T_detect</text>
  <text x="120" y="178" text-anchor="middle" font-size="8.5" fill="#555">30–180 s</text>

  <!-- T_restart segment (red/pink) -->
  <rect x="200" y="140" width="200" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="300" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">T_restart</text>
  <text x="300" y="178" text-anchor="middle" font-size="8.5" fill="#555">3–15 min</text>

  <!-- T_load segment (blue) -->
  <rect x="400" y="140" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="520" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">T_load</text>
  <text x="520" y="178" text-anchor="middle" font-size="8.5" fill="#555">5–30 min</text>

  <!-- T_warmup segment (green) -->
  <rect x="640" y="140" width="180" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="730" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">T_warmup</text>
  <text x="730" y="178" text-anchor="middle" font-size="8.5" fill="#555">1–5 min</text>

  <!-- Resume marker -->
  <line x1="820" y1="110" x2="820" y2="360" stroke="#3d9e5a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="820" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Resume</text>

  <!-- Total span annotation -->
  <line x1="40" y1="220" x2="820" y2="220" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <rect x="320" y="210" width="220" height="20" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="430" y="224" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Total T_recovery (typical: 15–50 min)</text>

  <!-- ===== Detail boxes below ===== -->

  <!-- T_detect detail -->
  <rect x="50" y="240" width="140" height="110" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="120" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">T_detect</text>
  <text x="60" y="280" font-size="8" fill="#555">• Heartbeat timeout fires</text>
  <text x="60" y="295" font-size="8" fill="#555">• NCCL collective hangs</text>
  <text x="60" y="310" font-size="8" fill="#555">• Loss spike / NaN detected</text>
  <text x="60" y="325" font-size="8" fill="#555">• Health probe fails k times</text>
  <text x="60" y="340" font-size="8" font-weight="700" fill="#c87b2a">Optimize: reduce timeout</text>

  <!-- T_restart detail -->
  <rect x="230" y="240" width="140" height="110" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="300" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">T_restart</text>
  <text x="240" y="280" font-size="8" fill="#555">• Kill all surviving workers</text>
  <text x="240" y="295" font-size="8" fill="#555">• Scheduler finds new node</text>
  <text x="240" y="310" font-size="8" fill="#555">• Launch containers</text>
  <text x="240" y="325" font-size="8" fill="#555">• Init communicator</text>
  <text x="240" y="340" font-size="8" font-weight="700" fill="#c44">Optimize: hot spares</text>

  <!-- T_load detail -->
  <rect x="430" y="240" width="180" height="110" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="520" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">T_load</text>
  <text x="440" y="280" font-size="8" fill="#555">• Read checkpoint from storage</text>
  <text x="440" y="295" font-size="8" fill="#555">• Transfer to GPU HBM</text>
  <text x="440" y="310" font-size="8" fill="#555">• Verify shard integrity</text>
  <text x="440" y="325" font-size="8" fill="#555">• Sync parameters across ranks</text>
  <text x="440" y="340" font-size="8" font-weight="700" fill="#4a90c4">Optimize: local NVMe cache</text>

  <!-- T_warmup detail -->
  <rect x="650" y="240" width="160" height="110" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="730" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">T_warmup</text>
  <text x="660" y="280" font-size="8" fill="#555">• Refill data pipeline buffers</text>
  <text x="660" y="295" font-size="8" fill="#555">• JIT kernel recompilation</text>
  <text x="660" y="310" font-size="8" fill="#555">• NCCL ring discovery</text>
  <text x="660" y="325" font-size="8" fill="#555">• Throughput stabilizes</text>
  <text x="660" y="340" font-size="8" font-weight="700" fill="#3d9e5a">Optimize: persistent workers</text>

  <!-- ===== Optimization target bar ===== -->
  <rect x="40" y="370" width="780" height="80" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="430" y="390" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">Dominant Term by Configuration</text>
  
  <text x="120" y="410" text-anchor="middle" font-size="8.5" fill="#c87b2a">T_detect dominates</text>
  <text x="120" y="425" text-anchor="middle" font-size="8" fill="#555">→ large clusters,</text>
  <text x="120" y="435" text-anchor="middle" font-size="8" fill="#555">slow heartbeat</text>
  
  <text x="300" y="410" text-anchor="middle" font-size="8.5" fill="#c44">T_restart dominates</text>
  <text x="300" y="425" text-anchor="middle" font-size="8" fill="#555">→ no hot spares,</text>
  <text x="300" y="435" text-anchor="middle" font-size="8" fill="#555">cold container start</text>
  
  <text x="520" y="410" text-anchor="middle" font-size="8.5" fill="#4a90c4">T_load dominates</text>
  <text x="520" y="425" text-anchor="middle" font-size="8" fill="#555">→ remote PFS,</text>
  <text x="520" y="435" text-anchor="middle" font-size="8" fill="#555">large model shards</text>
  
  <text x="730" y="410" text-anchor="middle" font-size="8.5" fill="#3d9e5a">T_warmup dominates</text>
  <text x="730" y="425" text-anchor="middle" font-size="8" fill="#555">→ large KV caches,</text>
  <text x="730" y="435" text-anchor="middle" font-size="8" fill="#555">JIT compilation</text>

  <!-- ── Footnote ── -->
  <text x="430" y="470" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each component of T_recovery has a distinct dominant cause and optimization strategy; the bottleneck shifts with cluster configuration</text>
</svg>