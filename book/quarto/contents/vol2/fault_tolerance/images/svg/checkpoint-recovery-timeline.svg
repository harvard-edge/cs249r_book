<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 490" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrowO" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
    <pattern id="hatchRed" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M-2,-2 L10,10" stroke="#c44" stroke-width="1.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="720" height="490" fill="#fff"/>

  <!-- ─── TIMELINE AXIS ─── -->
  <!-- axis line at y=200 -->
  <line x1="50" y1="200" x2="685" y2="200" stroke="#bbb" stroke-width="1.5"/>
  <!-- Time arrow -->
  <line x1="680" y1="200" x2="695" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="698" y="194.0" font-size="10" fill="#999">t</text>

  <!-- ─── SEGMENT 1: Compute (productive work) x=52..210 ─── -->
  <rect x="52" y="160" width="158" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="131" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#4a90c4">Compute</text>
  <text x="131" y="195" text-anchor="middle" font-size="8.5" fill="#4a90c4">productive training steps</text>

  <!-- ─── SEGMENT 2: Checkpoint Save x=210..275 ─── -->
  <rect x="210" y="160" width="65" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="242.5" y="181" text-anchor="middle" font-size="9" font-weight="600" fill="#c87b2a">Save</text>
  <text x="242.5" y="192" text-anchor="middle" font-size="7.5" fill="#c87b2a">Checkpoint</text>

  <!-- ─── SEGMENT 3: More Compute x=275..400 ─── -->
  <rect x="275" y="160" width="125" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="337.5" y="172.0" text-anchor="middle" font-size="11" font-weight="600" fill="#4a90c4">Compute</text>
  <text x="337.5" y="185.0" text-anchor="middle" font-size="8.5" fill="#4a90c4">productive training steps</text>

  <!-- Wasted compute overlay -->
  <rect x="275" y="160" width="125" height="40" rx="4" fill="#f9d6d5" fill-opacity="0.55" stroke="none"/>
  <rect x="275" y="160" width="125" height="40" rx="4" fill="url(#hatchRed)"/>

  <!-- ─── FAILURE LIGHTNING BOLT at x=415 ─── -->
  <polygon points="412,145 405,178 414,178 407,215 425,175 415,175 424,145" fill="#c44" stroke="#c44" stroke-width="1"/>
  <text x="415" y="138" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c44">FAILURE</text>

  <!-- ─── SEGMENT 4: Recovery/Restart x=430..548 ─── -->
  <rect x="430" y="160" width="118" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="489" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#c44">Recovery</text>
  <text x="489" y="192" text-anchor="middle" font-size="8" fill="#c44">load checkpoint + restart</text>

  <!-- ─── SEGMENT 5: Resume x=548..668 ─── -->
  <rect x="548" y="160" width="120" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="608" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#3d9e5a">Resume</text>
  <text x="608" y="194" text-anchor="middle" font-size="8.5" fill="#3d9e5a">training continues</text>

  <!-- ─────────────────────────────── -->
  <!-- ANNOTATIONS -->
  <!-- ─────────────────────────────── -->

  <!-- Brace: Checkpoint Interval τ (below timeline, from x=52 to x=208) -->
  <path d="M52,215 L52,224 L130,224 L130,230 L130,224 L208,224 L208,215" fill="none" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="131" y="242" text-anchor="middle" font-size="9.5" fill="#4a90c4" font-weight="700">Checkpoint Interval τ</text>
  <text x="131" y="254" text-anchor="middle" font-size="8.5" fill="#4a90c4">(Young-Daly: τ = √(2·T_write·MTBF))</text>

  <!-- Brace: Checkpoint overhead (below, from x=210 to x=273) -->
  <path d="M210,215 L210,224 L241,224 L241,230 L241,224 L273,224 L273,215" fill="none" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="241" y="242" text-anchor="middle" font-size="8.5" fill="#c87b2a" font-weight="700">T_write</text>
  <text x="241" y="254" text-anchor="middle" font-size="8" fill="#c87b2a">I/O overhead</text>

  <!-- Brace / label: Wasted Compute (rework) from x=275 to x=399 -->
  <path d="M275,215 L275,256 L337,256 L337,262 L337,256 L399,256 L399,215" fill="none" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="337" y="274" text-anchor="middle" font-size="9.5" fill="#c44" font-weight="700">Wasted Compute</text>
  <text x="337" y="286" text-anchor="middle" font-size="8.5" fill="#c44">(rework since last checkpoint)</text>

  <!-- Brace: Recovery Cost (below, from x=430 to x=547) -->
  <path d="M430,215 L430,270 L489,270 L489,276 L489,270 L547,270 L547,215" fill="none" stroke="#c44" stroke-width="1.2"/>
  <text x="489" y="289" text-anchor="middle" font-size="9.5" fill="#c44" font-weight="700">Recovery Cost</text>
  <text x="489" y="301" text-anchor="middle" font-size="8.5" fill="#c44">T_recover = T_read + T_restart</text>

  <!-- ─── VERTICAL markers ─── -->
  <!-- Checkpoint save marker -->
  <line x1="210" y1="148" x2="210" y2="205" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="210" y="145" text-anchor="middle" font-size="8" fill="#c87b2a" font-style="italic">ckpt saved</text>

  <!-- Second checkpoint marker (x=275) -->
  <line x1="275" y1="148" x2="275" y2="205" stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="275" y="145" text-anchor="middle" font-size="8" fill="#c87b2a" font-style="italic">ckpt saved</text>

  <!-- Failure marker -->
  <line x1="415" y1="140" x2="415" y2="205" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Resume marker -->
  <line x1="548" y1="148" x2="548" y2="205" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="548" y="145" text-anchor="middle" font-size="8" fill="#3d9e5a" font-style="italic">training resumes</text>

  <!-- ─── TOP-LEVEL KEY ─── -->
  <rect x="52" y="318" width="616" height="76" rx="4" fill="#f7f7f7" stroke="#ddd" stroke-width="1"/>
  <text x="360" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Fault Tolerance Cost Components</text>

  <!-- Legend items -->
  <rect x="70" y="348" width="18" height="12" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="94" y="359" font-size="9" fill="#333">Productive compute</text>

  <rect x="220" y="348" width="18" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="244" y="359" font-size="9" fill="#333">Checkpoint I/O overhead</text>

  <rect x="385" y="348" width="18" height="12" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="409" y="359" font-size="9" fill="#333">Wasted / rework compute</text>

  <rect x="560" y="348" width="18" height="12" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="584" y="359" font-size="9" fill="#333">Resume</text>

  <text x="360" y="382" text-anchor="middle" font-size="8.5" fill="#555" font-style="italic">Total overhead = T_write/τ + τ/(2·MTBF) — minimized at τ_opt by the Young-Daly formula</text>

  <text x="360" y="445" text-anchor="middle" font-size="9" fill="#bbb" font-style="italic">Checkpoint must capture all distributed state: model weights, optimizer moments, RNG seeds, dataloader position</text>
</svg>