<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 550" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="550" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Training Failure Signatures: Loss Curve Patterns</text>

  <!-- ===== Grid layout: 2x2 ===== -->
  <!-- Vertical divider -->
  <line x1="340" y1="40" x2="340" y2="510" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <!-- Horizontal divider -->
  <line x1="20" y1="270" x2="660" y2="270" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== (A) Normal Training — top left ===== -->
  <rect x="20" y="40" width="300" height="220" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="4"/>
  <text x="170" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">(A) Normal Training</text>
  <text x="170" y="75" text-anchor="middle" font-size="8.5" fill="#555">Smooth monotonic descent with minor fluctuations</text>

  <!-- Axes -->
  <line x1="50" y1="200" x2="50" y2="110" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="50" y1="200" x2="300" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="35" y="105" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="290" y="215" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- Normal loss curve: smooth decreasing with tiny bumps -->
  <polyline points="50,120 70,125 90,135 110,145 130,155 150,165 170,175 190,180 210,185 230,185 250,185 270,185 290,185 300,185" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Annotations -->
  <text x="60" y="115" font-size="8" fill="#3d9e5a" font-weight="700">Start</text>
  <text x="260" y="175" font-size="8" fill="#3d9e5a" font-weight="700">Converges</text>
  <rect x="40" y="220" width="260" height="20" fill="#fff" stroke="#3d9e5a" stroke-width="0.8" rx="4"/>
  <text x="170" y="234" text-anchor="middle" font-size="8" fill="#3d9e5a">Signature: smooth descent, stable gradient norms</text>

  <!-- ===== (B) Gradient Explosion — top right ===== -->
  <rect x="360" y="40" width="300" height="220" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="510" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">(B) Gradient Explosion</text>
  <text x="510" y="75" text-anchor="middle" font-size="8.5" fill="#555">Sudden catastrophic spike in loss value</text>

  <!-- Axes -->
  <line x1="390" y1="200" x2="390" y2="110" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="200" x2="640" y2="200" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="375" y="105" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="630" y="215" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- Explosion loss curve: normal then sudden spike -->
  <polyline points="390,120 410,125 430,135 450,145 470,155 490,165 510,170 520,95 530,105 550,170 570,165 590,165 610,165" fill="none" stroke="#c44" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Spike annotation -->
  <line x1="520" y1="95" x2="520" y2="85" stroke="#a31f34" stroke-width="1.2"/>
  <text x="520" y="80" text-anchor="middle" font-size="7.5" fill="#a31f34" font-weight="700">Spike</text>
  <rect x="380" y="220" width="260" height="20" fill="#fff" stroke="#c44" stroke-width="0.8" rx="4"/>
  <text x="510" y="234" text-anchor="middle" font-size="8" fill="#c44">Signature: sudden spike, gradient norm ≥ 100× baseline</text>

  <!-- ===== (C) Loss Plateau — bottom left ===== -->
  <rect x="20" y="280" width="300" height="220" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="170" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">(C) Loss Plateau</text>
  <text x="170" y="315" text-anchor="middle" font-size="8.5" fill="#555">Learning stalls; no meaningful descent</text>

  <!-- Axes -->
  <line x1="50" y1="440" x2="50" y2="350" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="50" y1="440" x2="300" y2="440" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="35" y="345" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="290" y="455" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- Plateau curve: decreasing then flat with slight wobble -->
  <polyline points="50,360 70,365 90,375 110,385 130,395 150,400 170,400 190,400 210,400 230,400 250,400 270,400 290,400 300,400" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Plateau annotation -->
  <rect x="160" y="380" width="120" height="14" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="220" y="391" text-anchor="middle" font-size="7.5" fill="#c87b2a">Plateau region</text>
  <rect x="40" y="460" width="260" height="20" fill="#fff" stroke="#c87b2a" stroke-width="0.8" rx="4"/>
  <text x="170" y="474" text-anchor="middle" font-size="8" fill="#c87b2a">Signature: near-zero gradient variance, stuck optimizer</text>

  <!-- ===== (D) NaN Divergence — bottom right ===== -->
  <rect x="360" y="280" width="300" height="220" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="510" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">(D) NaN Divergence</text>
  <text x="510" y="315" text-anchor="middle" font-size="8.5" fill="#555">Erratic oscillation collapsing to NaN</text>

  <!-- Axes -->
  <line x1="390" y1="440" x2="390" y2="350" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="440" x2="640" y2="440" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="375" y="345" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="630" y="455" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- NaN curve: erratic then terminates -->
  <polyline points="390,360 410,350 430,370 450,340 470,390 490,340 510,410 520,350 530,420" fill="none" stroke="#c44" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- NaN termination marker -->
  <line x1="530" y1="340" x2="530" y2="430" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="530" y1="360" x2="545" y2="360" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="550" y="364" font-size="9" fill="#a31f34" font-weight="700">NaN</text>

  <!-- Training stopped annotation -->
  <rect x="550" y="370" width="80" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="590" y="382" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Training</text>
  <text x="590" y="394" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">halts</text>

  <rect x="380" y="460" width="260" height="20" fill="#fff" stroke="#c44" stroke-width="0.8" rx="4"/>
  <text x="510" y="474" text-anchor="middle" font-size="8" fill="#a31f34">Signature: oscillating loss, inf/NaN in activations or gradients</text>

  <!-- ── Footnote ── -->
  <text x="340" y="525" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each signature maps to a distinct root cause: data corruption (B), learning rate or dead optimizer (C), numerical overflow (D)</text>
</svg>