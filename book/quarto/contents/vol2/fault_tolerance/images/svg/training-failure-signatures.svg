<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="340" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Training Failure Signatures: Loss Curve Patterns</text>

  <!-- ===== Grid layout: 2x2 ===== -->
  <!-- Vertical divider -->
  <line x1="340" y1="36" x2="340" y2="435" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <!-- Horizontal divider -->
  <line x1="20" y1="238" x2="660" y2="238" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== (A) Normal Training — top left ===== -->
  <rect x="20" y="36" width="300" height="196" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="170" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">(A) Normal Training</text>
  <text x="170" y="71" text-anchor="middle" font-size="8.5" fill="#555">Smooth monotonic descent with minor fluctuations</text>

  <!-- Axes -->
  <line x1="48" y1="78" x2="48" y2="196" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="48" y1="196" x2="308" y2="196" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="38" y="78" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="300" y="208" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- Normal loss curve: smooth decreasing with tiny bumps -->
  <polyline points="52,96 72,100 92,106 112,112 132,118 152,122 172,126 192,130 212,133 232,135 252,136 272,137 292,137 306,137" fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Annotations -->
  <text x="58" y="94" font-size="8" fill="#3d9e5a" font-weight="700">Start</text>
  <text x="260" y="135" font-size="8" fill="#3d9e5a" font-weight="700">Converges</text>
  <rect x="48" y="210" width="264" height="18" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="170" y="222" text-anchor="middle" font-size="8" fill="#3d9e5a">Signature: smooth descent, stable gradient norms</text>

  <!-- ===== (B) Gradient Explosion — top right ===== -->
  <rect x="360" y="36" width="300" height="196" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="510" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">(B) Gradient Explosion</text>
  <text x="510" y="71" text-anchor="middle" font-size="8.5" fill="#555">Sudden catastrophic spike in loss value</text>

  <!-- Axes -->
  <line x1="388" y1="78" x2="388" y2="196" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="388" y1="196" x2="648" y2="196" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="378" y="78" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="640" y="208" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- Explosion loss curve: normal then sudden spike -->
  <polyline points="392,100 412,105 432,111 452,118 472,124 492,130 512,134 522,84 532,88 552,132 572,130 592,128 608,128" fill="none" stroke="#c44" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Spike annotation -->
  <line x1="522" y1="84" x2="522" y2="72" stroke="#a31f34" stroke-width="1.2"/>
  <text x="510" y="68" text-anchor="middle" font-size="7.5" fill="#a31f34" font-weight="700">Spike</text>
  <rect x="388" y="210" width="264" height="18" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="510" y="222" text-anchor="middle" font-size="8" fill="#c44">Signature: sudden spike, gradient norm ≥ 100× baseline</text>

  <!-- ===== (C) Loss Plateau — bottom left ===== -->
  <rect x="20" y="248" width="300" height="182" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="170" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">(C) Loss Plateau</text>
  <text x="170" y="283" text-anchor="middle" font-size="8.5" fill="#555">Learning stalls; no meaningful descent</text>

  <!-- Axes -->
  <line x1="48" y1="292" x2="48" y2="400" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="48" y1="400" x2="308" y2="400" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="38" y="292" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="300" y="412" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- Plateau curve: decreasing then flat with slight wobble -->
  <polyline points="52,304 72,310 92,316 112,325 132,336 152,340 172,341 192,341 212,342 232,341 252,342 272,342 292,341 306,341" fill="none" stroke="#c87b2a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Plateau annotation -->
  <rect x="168" y="330" width="130" height="14" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="233" y="340" text-anchor="middle" font-size="7.5" fill="#c87b2a">Plateau region</text>
  <rect x="48" y="414" width="264" height="18" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="170" y="426" text-anchor="middle" font-size="8" fill="#c87b2a">Signature: near-zero gradient variance, stuck optimizer</text>

  <!-- ===== (D) NaN Divergence — bottom right ===== -->
  <rect x="360" y="248" width="300" height="182" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="510" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">(D) NaN Divergence</text>
  <text x="510" y="283" text-anchor="middle" font-size="8.5" fill="#555">Erratic oscillation collapsing to NaN</text>

  <!-- Axes -->
  <line x1="388" y1="292" x2="388" y2="400" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="388" y1="400" x2="648" y2="400" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="378" y="292" text-anchor="middle" font-size="7.5" fill="#555">Loss</text>
  <text x="640" y="412" text-anchor="middle" font-size="7.5" fill="#555">Steps</text>

  <!-- NaN curve: erratic then terminates -->
  <polyline points="392,318 410,308 428,330 446,296 464,340 482,292 500,350 512,296 524,360" fill="none" stroke="#c44" stroke-width="2" stroke-linejoin="round" stroke-dasharray="2,0"/>
  <!-- NaN termination marker -->
  <line x1="524" y1="295" x2="560" y2="295" stroke="#c44" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="590" y="299" font-size="9" fill="#a31f34" font-weight="700">NaN</text>
  <line x1="524" y1="290" x2="524" y2="310" stroke="#a31f34" stroke-width="2"/>

  <!-- Training stopped annotation -->
  <rect x="530" y="310" width="100" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="580" y="322" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Training</text>
  <text x="580" y="334" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">halts</text>

  <rect x="388" y="414" width="264" height="18" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="510" y="426" text-anchor="middle" font-size="8" fill="#a31f34">Signature: oscillating loss, inf/NaN in activations or gradients</text>

  <!-- ── Footnote ── -->
  <text x="340" y="447" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Each signature maps to a distinct root cause: data corruption (B), learning rate or dead optimizer (C), numerical overflow (D)</text>
</svg>