<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="880" height="520" fill="#fff"/>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#bbb"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="440" y1="20" x2="440" y2="390" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT PANEL: Fail-Stop Failure -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="220" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Fail-Stop Failure</text>

  <!-- Coordinator -->
  <rect x="160" y="60" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="220" y="79" text-anchor="middle" font-size="11" font-weight="600" fill="#4a90c4">Coordinator</text>
  <text x="220" y="93" text-anchor="middle" font-size="9" fill="#4a90c4">timeout detector</text>

  <!-- Worker 1 -->
  <rect x="30" y="180" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="70" y="211" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Worker 1</text>
  <text x="70" y="225" text-anchor="middle" font-size="8" fill="#3d9e5a">running</text>

  <!-- Worker 2 (FAILED) -->
  <rect x="130" y="180" width="80" height="70" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <line x1="158" y1="185" x2="182" y2="209" stroke="#c44" stroke-width="2.5"/>
  <line x1="182" y1="185" x2="158" y2="209" stroke="#c44" stroke-width="2.5"/>
  <text x="170" y="223" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Worker 2</text>
  <text x="170" y="237" text-anchor="middle" font-size="8" fill="#777">silent / dead</text>

  <!-- Worker 3 -->
  <rect x="230" y="180" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="270" y="211" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Worker 3</text>
  <text x="270" y="225" text-anchor="middle" font-size="8" fill="#3d9e5a">running</text>

  <!-- Worker 4 -->
  <rect x="330" y="180" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="370" y="211" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Worker 4</text>
  <text x="370" y="225" text-anchor="middle" font-size="8" fill="#3d9e5a">running</text>

  <!-- Routing Arrows -->
  <path d="M70,180 L70,120 L190,120 L190,100" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="130" y="115" text-anchor="middle" font-size="8" fill="#4a90c4">heartbeat</text>

  <path d="M170,180 L170,150 L210,150 L210,100" fill="none" stroke="#c44" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="165" y="165" text-anchor="end" font-size="8" fill="#c44" font-style="italic">timeout!</text>

  <path d="M270,180 L270,150 L230,150 L230,100" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <path d="M370,180 L370,120 L250,120 L250,100" fill="none" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- Detection Annotation -->
  <rect x="130" y="280" width="180" height="34" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="220" y="296" text-anchor="middle" font-size="9" fill="#c87b2a">Coordinator detects missing</text>
  <text x="220" y="308" text-anchor="middle" font-size="9" fill="#c87b2a">heartbeat → failure declared</text>

  <!-- Left Panel Key -->
  <rect x="30" y="335" width="380" height="52" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="220" y="353" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4a90c4">Key property:</text>
  <text x="220" y="367" text-anchor="middle" font-size="9" fill="#333">Component stops responding entirely.</text>
  <text x="220" y="379" text-anchor="middle" font-size="9" fill="#333">Detection: timeout. Recovery: replace + checkpoint.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RIGHT PANEL: Byzantine Failure -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="660" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Byzantine Failure</text>

  <!-- Coordinator -->
  <rect x="600" y="60" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="660" y="79" text-anchor="middle" font-size="11" font-weight="600" fill="#4a90c4">Coordinator</text>
  <text x="660" y="93" text-anchor="middle" font-size="9" fill="#4a90c4">receives all gradients</text>

  <!-- Worker 5 -->
  <rect x="470" y="180" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="510" y="211" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Worker 5</text>
  <text x="510" y="225" text-anchor="middle" font-size="8" fill="#3d9e5a">correct ∇</text>

  <!-- Worker 6 (BYZANTINE) -->
  <rect x="570" y="180" width="80" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="610" y="201" text-anchor="middle" font-size="10" font-weight="600" fill="#c87b2a">Worker 6</text>
  <text x="610" y="215" text-anchor="middle" font-size="8" fill="#c87b2a">appears healthy!</text>
  <text x="610" y="229" text-anchor="middle" font-size="8" fill="#c44">corrupt output</text>

  <!-- Worker 7 -->
  <rect x="670" y="180" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="710" y="211" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Worker 7</text>
  <text x="710" y="225" text-anchor="middle" font-size="8" fill="#3d9e5a">correct ∇</text>

  <!-- Worker 8 -->
  <rect x="770" y="180" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="810" y="211" text-anchor="middle" font-size="10" font-weight="600" fill="#3d9e5a">Worker 8</text>
  <text x="810" y="225" text-anchor="middle" font-size="8" fill="#3d9e5a">correct ∇</text>

  <!-- Routing Arrows -->
  <path d="M510,180 L510,120 L630,120 L630,100" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  
  <path d="M610,180 L610,150 L650,150 L650,100" fill="none" stroke="#c44" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="605" y="160" text-anchor="end" font-size="8" fill="#c44" font-weight="700">poison ∇</text>
  <text x="605" y="172" text-anchor="end" font-size="7.5" fill="#c87b2a" font-style="italic">(passes sanity check)</text>

  <path d="M710,180 L710,150 L670,150 L670,100" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <path d="M810,180 L810,120 L690,120 L690,100" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Detection Annotation -->
  <rect x="570" y="280" width="180" height="34" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="660" y="296" text-anchor="middle" font-size="9" fill="#c44">No timeout triggered —</text>
  <text x="660" y="308" text-anchor="middle" font-size="9" fill="#c44">failure is invisible to coordinator</text>

  <!-- Right Panel Key -->
  <rect x="470" y="335" width="380" height="52" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="660" y="353" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">Key property:</text>
  <text x="660" y="367" text-anchor="middle" font-size="9" fill="#333">Component sends wrong results but stays alive.</text>
  <text x="660" y="379" text-anchor="middle" font-size="9" fill="#333">Detection requires checksum / cross-validation.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- BOTTOM COMPARISON BAR -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="410" width="820" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="440" y="429" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Critical Distinction</text>
  
  <text x="220" y="446" text-anchor="middle" font-size="9" fill="#4a90c4">Fail-stop: absence of signal = failure</text>
  <text x="220" y="460" text-anchor="middle" font-size="9" fill="#4a90c4">Simple timeout detection is sufficient</text>
  
  <line x1="440" y1="415" x2="440" y2="465" stroke="#bbb" stroke-width="1.5"/>
  
  <text x="660" y="446" text-anchor="middle" font-size="9" fill="#c87b2a">Byzantine: presence of signal ≠ correctness</text>
  <text x="660" y="460" text-anchor="middle" font-size="9" fill="#c87b2a">Requires gradient checksums or redundant compute</text>

  <!-- Footnote -->
  <text x="440" y="495" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Byzantine term from Lamport et al. (1982): generals who may defect and send contradictory messages to confuse consensus</text>

</svg>