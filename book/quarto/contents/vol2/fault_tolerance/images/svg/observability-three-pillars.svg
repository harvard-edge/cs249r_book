<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="460" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="340" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Observability: Three Pillars for Distributed ML Systems</text>

  <!-- ===== Pillar 1: Metrics (blue) ===== -->
  <rect x="20" y="40" width="180" height="230" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="110" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Metrics</text>
  <text x="110" y="80" text-anchor="middle" font-size="8.5" fill="#555">Numerical measurements over time</text>

  <line x1="30" y1="90" x2="190" y2="90" stroke="#4a90c4" stroke-width="0.6" opacity="0.5"/>

  <text x="30" y="110" font-size="8.5" font-weight="700" fill="#333">Infrastructure</text>
  <text x="30" y="124" font-size="8" fill="#555">• GPU / CPU utilization</text>
  <text x="30" y="138" font-size="8" fill="#555">• Memory allocation (HBM)</text>
  <text x="30" y="152" font-size="8" fill="#555">• Network bandwidth, latency</text>

  <text x="30" y="172" font-size="8.5" font-weight="700" fill="#333">Application</text>
  <text x="30" y="186" font-size="8" fill="#555">• p50 / p99 request latency</text>
  <text x="30" y="200" font-size="8" fill="#555">• Error rate by type</text>
  <text x="30" y="214" font-size="8" fill="#555">• Queue depth, cache hit rate</text>

  <text x="30" y="234" font-size="8.5" font-weight="700" fill="#333">ML-Specific</text>
  <text x="30" y="248" font-size="8" fill="#555">• Gradient norm per rank</text>
  <text x="30" y="262" font-size="8" fill="#555">• Loss curve, MFU</text>

  <!-- ===== Pillar 2: Logs (green) ===== -->
  <rect x="250" y="40" width="180" height="230" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Logs</text>
  <text x="340" y="80" text-anchor="middle" font-size="8.5" fill="#555">Discrete events with structured context</text>

  <line x1="260" y1="90" x2="420" y2="90" stroke="#3d9e5a" stroke-width="0.6" opacity="0.5"/>

  <text x="260" y="110" font-size="8.5" font-weight="700" fill="#333">Severity Levels</text>
  <text x="260" y="124" font-size="8" fill="#555">• DEBUG: diagnostic detail</text>
  <text x="260" y="138" font-size="8" fill="#555">• INFO: operational events</text>
  <text x="260" y="152" font-size="8" fill="#555">• WARN: potential problems</text>
  <text x="260" y="166" font-size="8" fill="#555">• ERROR: operation failures</text>
  <text x="260" y="180" font-size="8" fill="#555">• FATAL: system-wide failures</text>

  <text x="260" y="200" font-size="8.5" font-weight="700" fill="#333">Structured Format (JSON)</text>
  <rect x="260" y="206" width="160" height="56" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="270" y="218" font-size="7.5" fill="#555" font-family="Courier New, monospace">{timestamp, level,</text>
  <text x="270" y="231" font-size="7.5" fill="#555" font-family="Courier New, monospace"> trace_id, span_id,</text>
  <text x="270" y="244" font-size="7.5" fill="#555" font-family="Courier New, monospace"> message, gpu_id,</text>
  <text x="270" y="257" font-size="7.5" fill="#555" font-family="Courier New, monospace"> requested_bytes}</text>

  <!-- ===== Pillar 3: Traces (orange) ===== -->
  <rect x="480" y="40" width="180" height="230" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="570" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#c87b2a">Traces</text>
  <text x="570" y="80" text-anchor="middle" font-size="8.5" fill="#555">Request journeys across components</text>

  <line x1="490" y1="90" x2="650" y2="90" stroke="#c87b2a" stroke-width="0.6" opacity="0.5"/>

  <text x="490" y="110" font-size="8.5" font-weight="700" fill="#333">Core Concepts</text>
  <text x="490" y="124" font-size="8" fill="#555">• Trace: end-to-end request</text>
  <text x="490" y="138" font-size="8" fill="#555">• Span: single service op</text>
  <text x="490" y="152" font-size="8" fill="#555">• Context: propagated IDs</text>

  <text x="490" y="172" font-size="8.5" font-weight="700" fill="#333">ML Inference Example</text>
  <rect x="490" y="178" width="160" height="84" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="500" y="192" font-size="7.5" fill="#555" font-family="Courier New, monospace">api-gateway    5ms</text>
  <text x="500" y="205" font-size="7.5" fill="#555" font-family="Courier New, monospace">  feature-svc  15ms</text>
  <text x="500" y="218" font-size="7.5" fill="#555" font-family="Courier New, monospace">  inference    45ms</text>
  <text x="500" y="231" font-size="7.5" fill="#555" font-family="Courier New, monospace">    preproc    3ms</text>
  <text x="500" y="244" font-size="7.5" fill="#555" font-family="Courier New, monospace">    model      40ms</text>
  <text x="500" y="257" font-size="7.5" fill="#c87b2a" font-family="Courier New, monospace" font-weight="700">Total:         68ms</text>

  <!-- ===== Arrows to central correlation engine ===== -->
  <path d="M110,270 L110,300 L170,300 L170,330" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340,270 L340,330" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M570,270 L570,300 L510,300 L510,330" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Central Correlation and Alerting Engine ===== -->
  <rect x="100" y="330" width="480" height="90" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="340" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Correlation Engine and Alerting</text>
  <text x="340" y="368" text-anchor="middle" font-size="8.5" fill="#555">Cross-signal analysis: link metric spike → log event → slow trace span</text>

  <!-- Sub-boxes inside correlation engine -->
  <rect x="110" y="374" width="120" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="170" y="388" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">Threshold Alerts</text>
  <text x="170" y="400" text-anchor="middle" font-size="7.5" fill="#555">PagerDuty / OpsGenie</text>

  <rect x="280" y="374" width="120" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="388" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">Anomaly Detection</text>
  <text x="340" y="400" text-anchor="middle" font-size="7.5" fill="#555">Loss spike, grad norm outlier</text>

  <rect x="450" y="374" width="120" height="36" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="510" y="388" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">Root Cause</text>
  <text x="510" y="400" text-anchor="middle" font-size="7.5" fill="#555">Bottleneck isolation</text>

  <!-- ── Footnote ── -->
  <text x="340" y="446" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Metrics, Logs, and Traces each capture a different dimension; the correlation engine links them to isolate root causes in distributed ML failures</text>
</svg>