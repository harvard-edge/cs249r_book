<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="460" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="340" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Observability: Three Pillars for Distributed ML Systems</text>

  <!-- ===== Pillar 1: Metrics (blue) ===== -->
  <rect x="20" y="40" width="186" height="230" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="113" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">Metrics</text>
  <text x="113" y="79" text-anchor="middle" font-size="8.5" fill="#555">Numerical measurements over time</text>

  <line x1="35" y1="88" x2="192" y2="88" stroke="#4a90c4" stroke-width="0.6" opacity="0.5"/>

  <text x="36" y="106" font-size="8.5" font-weight="700" fill="#333">Infrastructure</text>
  <text x="36" y="120" font-size="8" fill="#555">• GPU / CPU utilization</text>
  <text x="36" y="134" font-size="8" fill="#555">• Memory allocation (HBM)</text>
  <text x="36" y="148" font-size="8" fill="#555">• Network bandwidth, latency</text>

  <text x="36" y="168" font-size="8.5" font-weight="700" fill="#333">Application</text>
  <text x="36" y="182" font-size="8" fill="#555">• p50 / p99 request latency</text>
  <text x="36" y="196" font-size="8" fill="#555">• Error rate by type</text>
  <text x="36" y="210" font-size="8" fill="#555">• Queue depth, cache hit rate</text>

  <text x="36" y="230" font-size="8.5" font-weight="700" fill="#333">ML-Specific</text>
  <text x="36" y="244" font-size="8" fill="#555">• Gradient norm per rank</text>
  <text x="36" y="258" font-size="8" fill="#555">• Loss curve, MFU</text>

  <!-- ===== Pillar 2: Logs (green) ===== -->
  <rect x="247" y="40" width="186" height="230" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Logs</text>
  <text x="340" y="79" text-anchor="middle" font-size="8.5" fill="#555">Discrete events with structured context</text>

  <line x1="262" y1="88" x2="419" y2="88" stroke="#3d9e5a" stroke-width="0.6" opacity="0.5"/>

  <text x="263" y="106" font-size="8.5" font-weight="700" fill="#333">Severity Levels</text>
  <text x="263" y="120" font-size="8" fill="#555">• DEBUG: diagnostic detail</text>
  <text x="263" y="134" font-size="8" fill="#555">• INFO: operational events</text>
  <text x="263" y="148" font-size="8" fill="#555">• WARN: potential problems</text>
  <text x="263" y="162" font-size="8" fill="#555">• ERROR: operation failures</text>
  <text x="263" y="176" font-size="8" fill="#555">• FATAL: system-wide failures</text>

  <text x="263" y="196" font-size="8.5" font-weight="700" fill="#333">Structured Format (JSON)</text>
  <rect x="263" y="200" width="160" height="58" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="271" y="215" font-size="7.5" fill="#555" font-family="Courier New, monospace">{timestamp, level,</text>
  <text x="271" y="228" font-size="7.5" fill="#555" font-family="Courier New, monospace"> trace_id, span_id,</text>
  <text x="271" y="241" font-size="7.5" fill="#555" font-family="Courier New, monospace"> message, gpu_id,</text>
  <text x="271" y="254" font-size="7.5" fill="#555" font-family="Courier New, monospace"> requested_bytes}</text>

  <!-- ===== Pillar 3: Traces (orange) ===== -->
  <rect x="474" y="40" width="186" height="230" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="567" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#c87b2a">Traces</text>
  <text x="567" y="79" text-anchor="middle" font-size="8.5" fill="#555">Request journeys across components</text>

  <line x1="489" y1="88" x2="646" y2="88" stroke="#c87b2a" stroke-width="0.6" opacity="0.5"/>

  <text x="490" y="106" font-size="8.5" font-weight="700" fill="#333">Core Concepts</text>
  <text x="490" y="120" font-size="8" fill="#555">• Trace: end-to-end request</text>
  <text x="490" y="134" font-size="8" fill="#555">• Span: single service op</text>
  <text x="490" y="148" font-size="8" fill="#555">• Context: propagated IDs</text>

  <text x="490" y="168" font-size="8.5" font-weight="700" fill="#333">ML Inference Example</text>
  <rect x="490" y="172" width="160" height="80" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="498" y="188" font-size="7.5" fill="#555" font-family="Courier New, monospace">api-gateway    5ms</text>
  <text x="498" y="201" font-size="7.5" fill="#555" font-family="Courier New, monospace">  feature-svc  15ms</text>
  <text x="498" y="214" font-size="7.5" fill="#555" font-family="Courier New, monospace">  inference    45ms</text>
  <text x="498" y="227" font-size="7.5" fill="#555" font-family="Courier New, monospace">    preproc    3ms</text>
  <text x="498" y="240" font-size="7.5" fill="#555" font-family="Courier New, monospace">    model      40ms</text>
  <text x="498" y="253" font-size="7.5" fill="#c87b2a" font-family="Courier New, monospace" font-weight="700">Total:         68ms</text>

  <!-- ===== Arrows to central correlation engine ===== -->
  <line x1="113" y1="270" x2="200" y2="330" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="270" x2="340" y2="328" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="567" y1="270" x2="480" y2="330" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Central Correlation and Alerting Engine ===== -->
  <rect x="148" y="330" width="384" height="88" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="340" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Correlation Engine and Alerting</text>
  <text x="340" y="368" text-anchor="middle" font-size="8.5" fill="#555">Cross-signal analysis: link metric spike → log event → slow trace span</text>

  <!-- Sub-boxes inside correlation engine -->
  <rect x="162" y="374" width="96" height="32" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="210" y="387" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">Threshold Alerts</text>
  <text x="210" y="399" text-anchor="middle" font-size="7.5" fill="#555">PagerDuty / OpsGenie</text>

  <rect x="282" y="374" width="116" height="32" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="340" y="387" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">Anomaly Detection</text>
  <text x="340" y="399" text-anchor="middle" font-size="7.5" fill="#555">Loss spike, grad norm outlier</text>

  <rect x="422" y="374" width="96" height="32" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="470" y="387" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">Root Cause</text>
  <text x="470" y="399" text-anchor="middle" font-size="7.5" fill="#555">Bottleneck isolation</text>

  <!-- ── Footnote ── -->
  <text x="340" y="446" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Metrics, Logs, and Traces each capture a different dimension; the correlation engine links them to isolate root causes in distributed ML failures</text>
</svg>