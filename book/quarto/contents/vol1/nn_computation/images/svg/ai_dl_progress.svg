<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#bbb"/></marker>

    <style>
      .era-ai    { fill: rgba(163, 31, 52, 0.10); stroke: #a31f34; stroke-width: 1.5; }
      .era-ml    { fill: #cfe2f3; stroke: #4a90c4; stroke-width: 1.5; }
      .era-dl    { fill: #d4edda; stroke: #3d9e5a; stroke-width: 1.5; }

      .era-title   { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; fill: #333; }
      .era-subtitle { font-size: 11px; font-style: italic; fill: #555; }
      .era-detail  { font-size: 10.5px; fill: #333; }
      .era-year    { font-size: 11px; font-weight: 600; fill: #555; }

      .timeline    { stroke: #333; stroke-width: 1.5; }
      .tick        { stroke: #555; stroke-width: 1.2; }
      .tick-label  { font-size: 11px; fill: #555; text-anchor: middle; }

      .annotation  { font-size: 9.5px; fill: #555; text-anchor: middle; }
      .icon        { fill: none; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- ================================================================== -->
  <!-- TIMELINE AXIS                                                      -->
  <!-- ================================================================== -->
  <line x1="60" y1="360" x2="1060" y2="360" class="timeline" />

  <!-- Decade ticks and labels -->
  <g>
    <line x1="100" y1="355" x2="100" y2="365" class="tick" />
    <text x="100" y="382" class="tick-label">1950s</text>
    <line x1="230" y1="355" x2="230" y2="365" class="tick" />
    <text x="230" y="382" class="tick-label">1960s</text>
    <line x1="360" y1="355" x2="360" y2="365" class="tick" />
    <text x="360" y="382" class="tick-label">1970s</text>
    <line x1="490" y1="355" x2="490" y2="365" class="tick" />
    <text x="490" y="382" class="tick-label">1980s</text>
    <line x1="620" y1="355" x2="620" y2="365" class="tick" />
    <text x="620" y="382" class="tick-label">1990s</text>
    <line x1="750" y1="355" x2="750" y2="365" class="tick" />
    <text x="750" y="382" class="tick-label">2000s</text>
    <line x1="880" y1="355" x2="880" y2="365" class="tick" />
    <text x="880" y="382" class="tick-label">2010s</text>
    <polygon points="1060,360 1048,354 1048,366" fill="#333" />
  </g>

  <!-- ================================================================== -->
  <!-- ERA BANDS                                                          -->
  <!-- ================================================================== -->

  <rect x="60" y="40" width="1000" height="310" rx="4" class="era-ai" />
  <rect x="460" y="75" width="600" height="275" rx="4" class="era-ml" />
  <rect x="810" y="115" width="250" height="235" rx="4" class="era-dl" />

  <!-- ================================================================== -->
  <!-- ERA LABELS                                                         -->
  <!-- ================================================================== -->

  <!-- AI: top-left of its band -->
  <text x="82" y="72" class="era-title">Artificial Intelligence</text>
  <text x="82" y="89" class="era-subtitle">Symbolic reasoning &amp; expert systems</text>

  <!-- ML: top-left of its band -->
  <text x="482" y="104" class="era-title">Machine Learning</text>
  <text x="482" y="121" class="era-subtitle">Statistical learning from data</text>

  <!-- DL: single line title, left-aligned in its band -->
  <text x="832" y="140" class="era-title">Deep Learning</text>
  <text x="832" y="157" class="era-subtitle">Neural networks at scale</text>

  <!-- ================================================================== -->
  <!-- ICONIC REPRESENTATIONS                                             -->
  <!-- ================================================================== -->

  <!-- AI era icon: checkerboard / game (y=125..170) -->
  <g transform="translate(155, 125)" stroke="#a31f34" class="icon" stroke-width="1.5">
    <polygon points="40,0 80,20 40,40 0,20" fill="rgba(163,31,52,0.05)" />
    <line x1="20" y1="10" x2="60" y2="30" />
    <line x1="10" y1="20" x2="50" y2="20" />
    <line x1="20" y1="30" x2="60" y2="10" />
    <ellipse cx="18" cy="16" rx="7" ry="4" fill="rgba(163,31,52,0.3)" stroke="#a31f34" />
    <ellipse cx="18" cy="13" rx="7" ry="4" fill="rgba(163,31,52,0.2)" stroke="#a31f34" />
    <ellipse cx="60" cy="24" rx="7" ry="4" fill="rgba(163,31,52,0.3)" stroke="#a31f34" />
    <ellipse cx="38" cy="28" rx="7" ry="4" fill="rgba(163,31,52,0.15)" stroke="#a31f34" />
  </g>
  <text x="195" y="185" text-anchor="middle" class="era-detail">Game playing</text>
  <text x="195" y="198" text-anchor="middle" class="era-detail">&amp; expert systems</text>

  <!-- ML era icon: email spam filter (y=140..175) -->
  <g transform="translate(570, 140)" stroke="#4a90c4" class="icon" stroke-width="1.5">
    <rect x="-40" y="-15" width="28" height="20" rx="4" fill="#cfe2f3" />
    <polyline points="-40,-15 -26,-3 -12,-15" fill="none" />
    <line x1="-8" y1="-5" x2="5" y2="-5" marker-end="url(#arrow-blue)"/>
    <rect x="8" y="-12" width="16" height="20" rx="4" fill="#cfe2f3" />
    <line x1="6" y1="-12" x2="26" y2="-12" />
    <line x1="12" y1="-15" x2="20" y2="-15" />
    <line x1="13" y1="-8" x2="13" y2="5" />
    <line x1="19" y1="-8" x2="19" y2="5" />
    <rect x="-40" y="15" width="28" height="20" rx="4" fill="#cfe2f3" />
    <polyline points="-40,15 -26,27 -12,15" fill="none" />
    <line x1="-8" y1="25" x2="25" y2="25" marker-end="url(#arrow-blue)"/>
  </g>
  <text x="575" y="210" text-anchor="middle" class="era-detail">Spam filtering</text>
  <text x="575" y="223" text-anchor="middle" class="era-detail">&amp; classification</text>

  <!-- DL era icon: image recognition (y=180..230, below the title at y=157) -->
  <g transform="translate(935, 185)" stroke="#3d9e5a" class="icon" stroke-width="1.5">
    <!-- Binary data grid -->
    <text x="-25" y="-8" font-size="6.5" fill="#333" stroke="none" font-family="monospace">001011</text>
    <text x="-25" y="0" font-size="6.5" fill="#333" stroke="none" font-family="monospace">110100</text>
    <text x="-25" y="8" font-size="6.5" fill="#333" stroke="none" font-family="monospace">010011</text>
    <text x="-25" y="16" font-size="6.5" fill="#333" stroke="none" font-family="monospace">101010</text>
    <!-- Magnifying glass -->
    <circle cx="14" cy="8" r="10" fill="#d4edda" stroke-width="1.5" />
    <line x1="21" y1="15" x2="29" y2="23" stroke-width="1.5" />
    <!-- Eye in lens -->
    <path d="M 8,8 Q 14,3 20,8 Q 14,13 8,8" fill="none" stroke-width="1.2" />
    <circle cx="14" cy="8" r="2" fill="#3d9e5a" stroke-width="0.8" />
  </g>
  <text x="935" y="228" text-anchor="middle" class="era-detail">Image recognition</text>
  <text x="935" y="241" text-anchor="middle" class="era-detail">&amp; generation</text>

  <!-- ================================================================== -->
  <!-- MILESTONE MARKERS                                                  -->
  <!-- ================================================================== -->

  <!-- 1956: Dartmouth Workshop -->
  <circle cx="140" cy="360" r="4" fill="#a31f34" />
  <line x1="140" y1="356" x2="140" y2="275" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="140" y="268" text-anchor="middle" class="era-detail">Dartmouth</text>
  <text x="140" y="281" text-anchor="middle" class="era-detail">Workshop</text>
  <text x="140" y="255" text-anchor="middle" class="era-year">1956</text>

  <!-- 1969: Perceptron critique -->
  <circle cx="310" cy="360" r="4" fill="#a31f34" />
  <line x1="310" y1="356" x2="310" y2="295" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="310" y="288" text-anchor="middle" class="era-detail">Perceptron</text>
  <text x="310" y="301" text-anchor="middle" class="era-detail">Limitations</text>
  <text x="310" y="275" text-anchor="middle" class="era-year">1969</text>

  <!-- 1986: Backpropagation -->
  <circle cx="520" cy="360" r="4" fill="#4a90c4" />
  <line x1="520" y1="356" x2="520" y2="245" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="520" y="238" text-anchor="middle" class="era-detail">Backprop</text>
  <text x="520" y="251" text-anchor="middle" class="era-detail">(Rumelhart)</text>
  <text x="520" y="225" text-anchor="middle" class="era-year">1986</text>

  <!-- 1997: LSTM -->
  <circle cx="650" cy="360" r="4" fill="#4a90c4" />
  <line x1="650" y1="356" x2="650" y2="275" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="650" y="268" text-anchor="middle" class="era-detail">LSTM</text>
  <text x="650" y="255" text-anchor="middle" class="era-year">1997</text>

  <!-- 2001: SVMs & Ensembles -->
  <circle cx="740" cy="360" r="4" fill="#4a90c4" />
  <line x1="740" y1="356" x2="740" y2="295" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="740" y="288" text-anchor="middle" class="era-detail">SVMs &amp;</text>
  <text x="740" y="301" text-anchor="middle" class="era-detail">Ensembles</text>
  <text x="740" y="275" text-anchor="middle" class="era-year">2001</text>

  <!-- 2012: AlexNet / ImageNet -->
  <circle cx="880" cy="360" r="4" fill="#3d9e5a" />
  <line x1="880" y1="355" x2="880" y2="270" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="880" y="263" text-anchor="middle" class="era-detail">AlexNet</text>
  <text x="880" y="276" text-anchor="middle" class="era-detail">ImageNet</text>
  <text x="880" y="250" text-anchor="middle" class="era-year">2012</text>

  <!-- 2017: Transformer -->
  <circle cx="1010" cy="360" r="4" fill="#3d9e5a" />
  <line x1="1010" y1="355" x2="1010" y2="290" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,3" />
  <text x="1010" y="283" text-anchor="middle" class="era-detail">Transformer</text>
  <text x="1010" y="270" text-anchor="middle" class="era-year">2017</text>

  <!-- ================================================================== -->
  <!-- AI WINTER ANNOTATIONS                                              -->
  <!-- ================================================================== -->

  <rect x="350" y="320" width="80" height="22" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" />
  <text x="390" y="335" text-anchor="middle" class="annotation" font-style="italic">AI Winter I</text>

  <rect x="540" y="320" width="80" height="22" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" />
  <text x="580" y="335" text-anchor="middle" class="annotation" font-style="italic">AI Winter II</text>

  <!-- ================================================================== -->
  <!-- BOTTOM ANNOTATION                                                  -->
  <!-- ================================================================== -->
  <line x1="140" y1="430" x2="960" y2="430" stroke="#bbb" stroke-width="1.2" />
  <text x="550" y="455" text-anchor="middle" font-size="10" fill="#555">
    Each successive wave -- from symbolic AI to statistical ML to deep learning --
  </text>
  <text x="550" y="468" text-anchor="middle" font-size="10" fill="#555">
    narrowed its focus while dramatically expanding practical capability.
  </text>

</svg>