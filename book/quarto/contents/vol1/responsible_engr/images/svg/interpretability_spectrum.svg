<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 280" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .axis-line    { stroke: #333; stroke-width: 1.5; }
      .arrow-head   { fill: #333; }
      .model-dot    { stroke-width: 1.5; }
      .model-label  { font-size: 11.5px; fill: #333; text-anchor: middle; font-weight: 500; }
      .endpoint     { font-size: 11px; font-weight: 700; text-anchor: middle; }
      .bracket-text { font-size: 11px; fill: #555; font-weight: 600; text-anchor: middle; }
      .gradient-bar { rx: 4; }
      .explanation  { font-size: 10px; fill: #777; font-style: italic; text-anchor: middle; }
      .icon         { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>

    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4edda" />
      <stop offset="50%" stop-color="#cfe2f3" />
      <stop offset="100%" stop-color="#f9d6d5" />
    </linearGradient>
  </defs>

  <!-- GRADIENT BAR -->
  <rect x="130" y="100" width="680" height="10" fill="url(#spectrumGrad)" class="gradient-bar" />

  <!-- MAIN AXIS LINE -->
  <line x1="130" y1="130" x2="810" y2="130" class="axis-line" />

  <!-- LEFT ENDPOINT -->
  <polygon points="130,130 140,124 140,136" class="arrow-head" />
  <rect x="20" y="110" width="100" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" />
  <text x="70" y="126" class="endpoint" fill="#2d7a2d">More</text>
  <text x="70" y="140" class="endpoint" fill="#2d7a2d">Interpretable</text>

  <!-- RIGHT ENDPOINT -->
  <polygon points="810,130 800,124 800,136" class="arrow-head" />
  <rect x="820" y="110" width="100" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" />
  <text x="870" y="126" class="endpoint" fill="#a31f34">Less</text>
  <text x="870" y="140" class="endpoint" fill="#a31f34">Interpretable</text>

  <!-- 1. Decision Trees -->
  <circle cx="190" cy="130" r="7" fill="#d4edda" class="model-dot" stroke="#3d9e5a" />
  <text x="190" y="160" class="model-label">Decision</text>
  <text x="190" y="175" class="model-label">Trees</text>
  <g transform="translate(190, 200)" class="icon" stroke="#3d9e5a" stroke-width="1.5">
    <circle cx="0" cy="-10" r="4" />
    <line x1="-3" y1="-7" x2="-10" y2="10" />
    <line x1="3" y1="-7" x2="10" y2="10" />
    <circle cx="-10" cy="10" r="3" />
    <circle cx="10" cy="10" r="3" />
  </g>

  <!-- 2. Linear Regression -->
  <circle cx="300" cy="130" r="7" fill="#d4edda" class="model-dot" stroke="#3d9e5a" />
  <text x="300" y="160" class="model-label">Linear</text>
  <text x="300" y="175" class="model-label">Regression</text>
  <g transform="translate(300, 200)" class="icon" stroke="#3d9e5a" stroke-width="1.5">
    <line x1="-12" y1="8" x2="12" y2="-8" />
    <circle cx="-8" cy="5" r="2" fill="#d4edda" />
    <circle cx="-2" cy="2" r="2" fill="#d4edda" />
    <circle cx="5" cy="-3" r="2" fill="#d4edda" />
    <circle cx="10" cy="-6" r="2" fill="#d4edda" />
  </g>

  <!-- 3. Logistic Regression -->
  <circle cx="410" cy="130" r="7" fill="#cfe2f3" class="model-dot" stroke="#4a90c4" />
  <text x="410" y="160" class="model-label">Logistic</text>
  <text x="410" y="175" class="model-label">Regression</text>
  <g transform="translate(410, 200)" class="icon" stroke="#4a90c4" stroke-width="1.5">
    <path d="M -12,8 Q -6,8 -3,2 Q 0,-4 3,-6 Q 6,-8 12,-8" />
  </g>

  <!-- 4. Random Forest -->
  <circle cx="530" cy="130" r="7" fill="#cfe2f3" class="model-dot" stroke="#4a90c4" />
  <text x="530" y="160" class="model-label">Random</text>
  <text x="530" y="175" class="model-label">Forest</text>
  <g transform="translate(530, 200)" class="icon" stroke="#4a90c4" stroke-width="1.5">
    <circle cx="-8" cy="-5" r="3" />
    <line x1="-8" y1="-2" x2="-8" y2="5" />
    <circle cx="0" cy="-7" r="3" />
    <line x1="0" y1="-4" x2="0" y2="5" />
    <circle cx="8" cy="-4" r="3" />
    <line x1="8" y1="-1" x2="8" y2="5" />
  </g>

  <!-- 5. Neural Network -->
  <circle cx="640" cy="130" r="7" fill="#f9d6d5" class="model-dot" stroke="#c44" />
  <text x="640" y="160" class="model-label">Neural</text>
  <text x="640" y="175" class="model-label">Network</text>
  <g transform="translate(640, 200)" class="icon" stroke="#c44" stroke-width="1.2">
    <circle cx="-10" cy="-6" r="3" fill="#f9d6d5" />
    <circle cx="-10" cy="6" r="3" fill="#f9d6d5" />
    <circle cx="0" cy="-4" r="3" fill="#f9d6d5" />
    <circle cx="0" cy="4" r="3" fill="#f9d6d5" />
    <circle cx="10" cy="0" r="3" fill="#f9d6d5" />
    <line x1="-7" y1="-6" x2="-3" y2="-4" />
    <line x1="-7" y1="-6" x2="-3" y2="4" />
    <line x1="-7" y1="6" x2="-3" y2="-4" />
    <line x1="-7" y1="6" x2="-3" y2="4" />
    <line x1="3" y1="-4" x2="7" y2="0" />
    <line x1="3" y1="4" x2="7" y2="0" />
  </g>

  <!-- 6. CNN / Transformer -->
  <circle cx="750" cy="130" r="7" fill="#f9d6d5" class="model-dot" stroke="#c44" />
  <text x="750" y="160" class="model-label">CNN /</text>
  <text x="750" y="175" class="model-label">Transformer</text>
  <g transform="translate(750, 200)" class="icon" stroke="#c44" stroke-width="0.8">
    <circle cx="-14" cy="-6" r="2" fill="#f9d6d5" />
    <circle cx="-14" cy="0" r="2" fill="#f9d6d5" />
    <circle cx="-14" cy="6" r="2" fill="#f9d6d5" />
    <circle cx="-5" cy="-5" r="2" fill="#f9d6d5" />
    <circle cx="-5" cy="0" r="2" fill="#f9d6d5" />
    <circle cx="-5" cy="5" r="2" fill="#f9d6d5" />
    <circle cx="5" cy="-4" r="2" fill="#f9d6d5" />
    <circle cx="5" cy="4" r="2" fill="#f9d6d5" />
    <circle cx="14" cy="0" r="2" fill="#f9d6d5" />
    <line x1="-12" y1="-6" x2="-7" y2="-5" />
    <line x1="-12" y1="-6" x2="-7" y2="0" />
    <line x1="-12" y1="0" x2="-7" y2="-5" />
    <line x1="-12" y1="0" x2="-7" y2="5" />
    <line x1="-12" y1="6" x2="-7" y2="0" />
    <line x1="-12" y1="6" x2="-7" y2="5" />
    <line x1="-3" y1="-5" x2="3" y2="-4" />
    <line x1="-3" y1="-5" x2="3" y2="4" />
    <line x1="-3" y1="5" x2="3" y2="-4" />
    <line x1="-3" y1="5" x2="3" y2="4" />
    <line x1="7" y1="-4" x2="12" y2="0" />
    <line x1="7" y1="4" x2="12" y2="0" />
  </g>

  <!-- BRACKET: "Intrinsically Interpretable" -->
  <path d="M 170,90 Q 170,70 230,70 L 370,70 Q 430,70 430,90" fill="none" stroke="#555" stroke-width="1.5" />
  <line x1="300" y1="70" x2="300" y2="50" stroke="#555" stroke-width="1.5" />
  <text x="300" y="40" class="bracket-text">Intrinsically Interpretable</text>

  <!-- BRACKET: "Requires Post-Hoc Explanation" -->
  <path d="M 510,90 Q 510,70 570,70 L 710,70 Q 770,70 770,90" fill="none" stroke="#555" stroke-width="1.5" />
  <line x1="640" y1="70" x2="640" y2="50" stroke="#555" stroke-width="1.5" />
  <text x="640" y="40" class="bracket-text">Requires Post-Hoc Explanation</text>

  <!-- BOTTOM ANNOTATIONS -->
  <text x="300" y="240" class="explanation">Inspect decision logic directly</text>
  <text x="640" y="240" class="explanation">Use LIME, SHAP, or attention maps</text>

</svg>