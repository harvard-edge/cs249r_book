<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 580" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title    { font-size: 13px; font-weight: 700; fill: #333; text-anchor: middle; }
      .subtitle { font-size: 10px; fill: #777; text-anchor: middle; font-style: italic; }
      .layer-label { font-size: 9px; fill: #333; text-anchor: end; font-weight: 600; }
      .col-label   { font-size: 8px; fill: #555; text-anchor: middle; }
      .legend-label { font-size: 9px; fill: #555; }
      .callout  { font-size: 9px; fill: #a31f34; font-weight: 600; }
      .ann      { font-size: 8.5px; fill: #888; font-style: italic; }
      .cell     { stroke: white; stroke-width: 1; }
    </style>
  </defs>

  <!-- Title -->
  <text x="360" y="30" class="title">Weight Sparsity Distribution Across Layers</text>
  <text x="360" y="50" class="subtitle">Darker shades indicate higher sparsity (more weights pruned)</text>

  <!-- Column headers (weight matrix blocks) -->
  <text x="140" y="70" class="col-label">Block 1</text>
  <text x="190" y="70" class="col-label">Block 2</text>
  <text x="240" y="70" class="col-label">Block 3</text>
  <text x="290" y="70" class="col-label">Block 4</text>
  <text x="340" y="70" class="col-label">Block 5</text>
  <text x="390" y="70" class="col-label">Block 6</text>
  <text x="440" y="70" class="col-label">Block 7</text>
  <text x="490" y="70" class="col-label">Block 8</text>

  <!-- Layer 1: Conv1 -->
  <text x="100" y="90" class="layer-label">Conv1</text>
  <rect x="120" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(220,230,240)" />
  <rect x="170" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(200,215,230)" />
  <rect x="220" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(215,225,235)" />
  <rect x="270" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(225,232,240)" />
  <rect x="320" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(210,222,234)" />
  <rect x="370" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(220,228,238)" />
  <rect x="420" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(205,218,232)" />
  <rect x="470" y="80" width="40" height="20" rx="4" class="cell" fill="rgb(218,226,236)" />

  <!-- Layer 2: Conv2 -->
  <text x="100" y="120" class="layer-label">Conv2</text>
  <rect x="120" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(180,200,220)" />
  <rect x="170" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(170,192,215)" />
  <rect x="220" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(190,205,222)" />
  <rect x="270" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(175,198,218)" />
  <rect x="320" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(185,202,220)" />
  <rect x="370" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(165,190,212)" />
  <rect x="420" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(178,196,216)" />
  <rect x="470" y="110" width="40" height="20" rx="4" class="cell" fill="rgb(172,194,214)" />

  <!-- Layer 3: Conv3 -->
  <text x="100" y="150" class="layer-label">Conv3</text>
  <rect x="120" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(140,170,200)" />
  <rect x="170" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(120,155,185)" />
  <rect x="220" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(150,178,205)" />
  <rect x="270" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(130,162,192)" />
  <rect x="320" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(145,175,202)" />
  <rect x="370" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(125,158,190)" />
  <rect x="420" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(135,165,195)" />
  <rect x="470" y="140" width="40" height="20" rx="4" class="cell" fill="rgb(142,172,200)" />

  <!-- Layer 4: Conv4 -->
  <text x="100" y="180" class="layer-label">Conv4</text>
  <rect x="120" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(100,140,175)" />
  <rect x="170" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(110,148,182)" />
  <rect x="220" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(90,132,168)" />
  <rect x="270" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(105,142,178)" />
  <rect x="320" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(95,135,170)" />
  <rect x="370" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(85,128,165)" />
  <rect x="420" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(108,145,180)" />
  <rect x="470" y="170" width="40" height="20" rx="4" class="cell" fill="rgb(98,138,172)" />

  <!-- Layer 5: Conv5 -->
  <text x="100" y="210" class="layer-label">Conv5</text>
  <rect x="120" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(70,115,155)" />
  <rect x="170" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(60,105,145)" />
  <rect x="220" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(80,122,160)" />
  <rect x="270" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(55,100,140)" />
  <rect x="320" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(65,110,150)" />
  <rect x="370" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(50,95,135)" />
  <rect x="420" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(75,118,158)" />
  <rect x="470" y="200" width="40" height="20" rx="4" class="cell" fill="rgb(58,102,142)" />

  <!-- Layer 6: FC1 -->
  <text x="100" y="240" class="layer-label">FC1</text>
  <rect x="120" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(40,80,120)" />
  <rect x="170" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(30,70,108)" />
  <rect x="220" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(35,75,115)" />
  <rect x="270" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(25,65,105)" />
  <rect x="320" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(38,78,118)" />
  <rect x="370" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(22,62,100)" />
  <rect x="420" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(32,72,110)" />
  <rect x="470" y="230" width="40" height="20" rx="4" class="cell" fill="rgb(28,68,106)" />

  <!-- Layer 7: FC2 -->
  <text x="100" y="270" class="layer-label">FC2</text>
  <rect x="120" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(20,55,90)" />
  <rect x="170" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(15,48,82)" />
  <rect x="220" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(22,58,92)" />
  <rect x="270" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(12,45,78)" />
  <rect x="320" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(18,52,86)" />
  <rect x="370" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(10,42,75)" />
  <rect x="420" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(16,50,84)" />
  <rect x="470" y="260" width="40" height="20" rx="4" class="cell" fill="rgb(14,46,80)" />

  <!-- Layer 8: FC3 -->
  <text x="100" y="300" class="layer-label">FC3</text>
  <rect x="120" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(8,38,70)" />
  <rect x="170" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(12,42,75)" />
  <rect x="220" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(6,35,66)" />
  <rect x="270" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(10,40,72)" />
  <rect x="320" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(5,33,64)" />
  <rect x="370" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(8,36,68)" />
  <rect x="420" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(14,44,76)" />
  <rect x="470" y="290" width="40" height="20" rx="4" class="cell" fill="rgb(7,34,65)" />

  <!-- Layer 9: Attention QKV -->
  <text x="100" y="330" class="layer-label">Attn Q/K</text>
  <rect x="120" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(60,105,145)" />
  <rect x="170" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(80,122,160)" />
  <rect x="220" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(40,85,125)" />
  <rect x="270" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(70,115,155)" />
  <rect x="320" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(50,95,135)" />
  <rect x="370" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(65,110,150)" />
  <rect x="420" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(55,100,140)" />
  <rect x="470" y="320" width="40" height="20" rx="4" class="cell" fill="rgb(75,118,158)" />

  <!-- Layer 10: Attn V/O -->
  <text x="100" y="360" class="layer-label">Attn V/O</text>
  <rect x="120" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(130,165,195)" />
  <rect x="170" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(140,172,200)" />
  <rect x="220" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(120,158,188)" />
  <rect x="270" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(135,168,198)" />
  <rect x="320" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(125,162,192)" />
  <rect x="370" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(118,155,185)" />
  <rect x="420" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(132,166,196)" />
  <rect x="470" y="350" width="40" height="20" rx="4" class="cell" fill="rgb(128,163,193)" />

  <!-- Layer 11: MLP Up -->
  <text x="100" y="390" class="layer-label">MLP Up</text>
  <rect x="120" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(55,100,140)" />
  <rect x="170" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(45,90,130)" />
  <rect x="220" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(65,108,148)" />
  <rect x="270" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(40,85,125)" />
  <rect x="320" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(50,95,135)" />
  <rect x="370" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(35,80,120)" />
  <rect x="420" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(60,105,145)" />
  <rect x="470" y="380" width="40" height="20" rx="4" class="cell" fill="rgb(42,88,128)" />

  <!-- Layer 12: MLP Down -->
  <text x="100" y="420" class="layer-label">MLP Down</text>
  <rect x="120" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(50,95,135)" />
  <rect x="170" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(40,85,125)" />
  <rect x="220" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(60,105,145)" />
  <rect x="270" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(35,80,120)" />
  <rect x="320" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(45,90,130)" />
  <rect x="370" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(30,75,115)" />
  <rect x="420" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(55,100,140)" />
  <rect x="470" y="410" width="40" height="20" rx="4" class="cell" fill="rgb(38,82,122)" />

  <!-- Right-side annotations -->
  <line x1="520" y1="90" x2="540" y2="90" stroke="#999" stroke-width="0.8" />
  <text x="550" y="90" class="ann">Low sparsity</text>
  <text x="550" y="100" class="ann">(early layers preserved)</text>

  <line x1="520" y1="240" x2="540" y2="240" stroke="#999" stroke-width="0.8" />
  <text x="550" y="230" class="callout">High sparsity</text>
  <text x="550" y="240" class="ann">FC layers: most</text>
  <text x="550" y="250" class="ann">parameters pruned</text>

  <line x1="520" y1="390" x2="540" y2="390" stroke="#999" stroke-width="0.8" />
  <text x="550" y="390" class="ann">Transformer layers:</text>
  <text x="550" y="400" class="ann">variable sparsity</text>

  <!-- Color legend -->
  <text x="120" y="480" class="legend-label" font-weight="600">Sparsity:</text>
  <rect x="180" y="470" width="40" height="20" rx="4" fill="rgb(220,230,240)" stroke="#ccc" stroke-width="0.5" />
  <text x="200" y="510" class="col-label">0%</text>
  <rect x="250" y="470" width="40" height="20" rx="4" fill="rgb(160,190,215)" stroke="#ccc" stroke-width="0.5" />
  <text x="270" y="510" class="col-label">25%</text>
  <rect x="320" y="470" width="40" height="20" rx="4" fill="rgb(90,135,170)" stroke="#ccc" stroke-width="0.5" />
  <text x="340" y="510" class="col-label">50%</text>
  <rect x="390" y="470" width="40" height="20" rx="4" fill="rgb(40,80,120)" stroke="#ccc" stroke-width="0.5" />
  <text x="410" y="510" class="col-label">75%</text>
  <rect x="460" y="470" width="40" height="20" rx="4" fill="rgb(8,38,70)" stroke="#ccc" stroke-width="0.5" />
  <text x="480" y="510" class="col-label">90%+</text>

  <!-- Bottom note -->
  <text x="360" y="550" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Sparsity varies by layer type: early conv layers retain features; FC layers tolerate aggressive pruning</text>

</svg>