<?xml version="1.0" encoding="UTF-8"?>
<!-- StaffML Favicon — Roofline concept, optimized for 32x32 rendering -->
<!-- The roofline model: diagonal slope meets horizontal ceiling at the ridge point.
     Simplified geometry for maximum clarity at small sizes. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#000"/>
  <!-- Bandwidth-bound slope + compute-bound ceiling -->
  <path d="M5,25 L16,9 L27,9" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Ridge point -->
  <circle cx="16" cy="9" r="2.5" fill="#3b82f6"/>
  <circle cx="16" cy="9" r="1" fill="#000"/>
</svg>
