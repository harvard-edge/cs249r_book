findings:
  - id: vol2_14_robust_ai_001
    severity: minor
    line: 292
    correction_type: case_study_summary_consistency
    current_text: |-
      Each failure reveals common patterns that demand systematic approaches to robustness evaluation and mitigation: the AWS outage disabled millions of voice interactions, autonomous vehicle perception errors led to fatal crashes, and spacecraft software bugs caused mission loss.
    issue: |-
      The AWS case study above describes a regional S3 outage cascading into S3-dependent AWS services, but it does not establish that the outage disabled millions of voice interactions. The summary introduces a new and more specific impact than the example supports.
    suggested_correction: |-
      Summarize the AWS example using the impact already described: "the AWS outage disrupted S3-dependent cloud services, autonomous vehicle perception errors led to fatal crashes, and spacecraft software bugs caused mission loss."
    why: |-
      This sentence is the bridge from concrete incidents to the unified framework. An unsupported impact claim makes the case-study synthesis feel less grounded.
    confidence: medium
  - id: vol2_14_robust_ai_002
    severity: major
    line: 632
    correction_type: metric_consistency
    current_text: |-
      **Systems insight**: Robustness is an **Efficiency-Utility Trade-off**. Guaranteeing that a deployed model will not misclassify a stop sign with a few stickers on it requires paying **8$\times$ the training cost** and accepting a **25 percentage-point drop in general performance**.
    issue: |-
      The preceding bullet compares 70 percent accuracy against worst-case attacks with 95 percent clean-data accuracy for the standard model. Calling the 25-point gap a drop in "general performance" conflates worst-case robust accuracy with clean accuracy, and the stop-sign sticker example is a physical patch attack rather than the PGD-7 digital perturbation scenario used for the 8x slowdown.
    suggested_correction: |-
      Either provide the robust model's clean accuracy and describe the resulting clean-accuracy drop, or rephrase: "This example pays about 8x training cost and exposes a 25-point gap between standard clean accuracy and robust accuracy under the specified worst-case attack." Use a digital perturbation example unless the numbers are specifically for physical patches.
    why: |-
      The callout teaches the central robustness tax. Mixing clean accuracy, worst-case accuracy, and patch attacks makes the trade-off harder for learners to interpret correctly.
    confidence: high
  - id: vol2_14_robust_ai_003
    severity: major
    line: 721
    correction_type: drift_response_consistency
    current_text: |-
      **Systems insight**: Statistical significance is the signal-to-noise ratio of the monitoring system. A shift of 0.05 might seem "small," but with 1,000 samples, the probability of it being random noise is less than **0.1 percent**. In the machine learning fleet, this is a confirmed regression. The system must trigger an automated response: either falling back to a more robust model or initiating an emergency retraining run on the new data distribution.
    issue: |-
      This overstates what the example proves. The calculation shows a statistically significant feature-distribution shift, not a confirmed model-performance regression. Later, the worked fraud example says a statistically significant KS result with modest PSI/KL should lead to monitoring rather than immediate retraining, so the response guidance is inconsistent within the same drift section.
    suggested_correction: |-
      Rephrase the result as a confirmed drift alert and align the response with the later decision framework: trigger investigation, increased monitoring, and performance correlation; fall back or retrain only if the shifted feature is high importance, thresholds are severe, or precision/recall/SLO metrics degrade.
    why: |-
      Learners need to distinguish statistical significance from operational significance. Treating any significant feature shift as an emergency regression undermines the later retraining framework.
    confidence: high
  - id: vol2_14_robust_ai_004
    severity: major
    line: 855
    correction_type: figure_caption_consistency
    current_text: |-
      ::: {#fig-distribution-shift-detector fig-env="figure" fig-pos="htb" fig-cap="**The Distribution Shift Detector**: Monitoring Population Stability Index (PSI) over a year. The model remains stable through week 25, enters the orange warning zone at week 26 as user behavior shifts, and breaches the red critical threshold at week 35. Automated retraining restores model stability at week 41." fig-alt="Line plot of weekly PSI over 52 weeks with green, orange, and red zones. Drift crosses the critical threshold at week 35, and retraining restores stability at week 41."}
    issue: |-
      The generated PSI values do not match the caption. With the seeded data, the series first reaches the warning zone at week 25 (PSI approximately 0.108), first exceeds the critical threshold at week 32 (PSI approximately 0.258), and returns below 0.1 at week 41. The caption and alt text say warning begins at week 26 and critical breach occurs at week 35.
    suggested_correction: |-
      Update the caption and alt text to match the generated data: stable through week 24, warning at week 25, critical threshold crossed at week 32, and stability restored at week 41. Alternatively, adjust the synthetic data so the plotted events occur at weeks 26, 35, and 41.
    why: |-
      The PSI figure is a teaching example for drift escalation. Week mismatches make the visual evidence contradict the narrative immediately after the math audit.
    confidence: high
  - id: vol2_14_robust_ai_005
    severity: minor
    line: 904
    correction_type: figure_table_consistency
    current_text: |-
      ax.axhspan(thresh_warning, thresh_critical, color='orange', alpha=0.1, label='Minor Drift (0.1 < PSI < 0.25)')
    issue: |-
      The table immediately above splits 0.1 <= PSI < 0.2 as "Minor shift" and 0.2 <= PSI < 0.25 as "Moderate shift." The generated figure legend labels the entire 0.1 to 0.25 orange band as "Minor Drift," contradicting the threshold table.
    suggested_correction: |-
      Rename the orange legend to a broader label such as "Warning Zone (0.1 <= PSI < 0.25)" or split the orange region into separate minor and moderate bands.
