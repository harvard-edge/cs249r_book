    confidence: high
  - id: vol2_14_robust_ai_006
    severity: major
    line: 1629
    correction_type: attack_type_distinction
    current_text: |-
      In physically deployed systems, attackers can manipulate data at the source by altering the environment captured by a sensor. A self-driving car encounters poisoned data when visual markers on a road sign are subtly altered, causing the model to misclassify the sign during training. Environmental poisoning blurs the line between adversarial attacks and data poisoning, but the mechanism remains the same: the training data is compromised.
    issue: |-
      The example blurs the chapter's core distinction between inference-time adversarial examples and training-time data poisoning. A road-sign sticker encountered by a deployed self-driving car is normally a physical adversarial attack at inference time. It becomes poisoning only if those altered sensor captures are fed into training or fleet retraining data.
    suggested_correction: |-
      Clarify the condition: "If fleet-learning systems harvest those altered road-sign images and include them in future training, the sensor manipulation becomes data poisoning; otherwise, it is an inference-time physical adversarial attack."
    why: |-
      This section is teaching attack mechanisms. The current wording can leave learners unsure whether the defining feature is physical deployment or whether compromised data actually enters training.
    confidence: high
  - id: vol2_14_robust_ai_007
    severity: major
    line: 1941
    correction_type: threat_model_consistency
    current_text: |-
      **Problem**: The goal is to make a ResNet-50 "unhackable" by adversarial patches. What does this cost in normal performance?
    issue: |-
      The data in the callout uses epsilon = 8/255 adversarially trained ResNet-50 accuracy, which corresponds to small digital norm-bounded perturbations, not physical adversarial patches. "Unhackable" also overstates what adversarial training provides, since the surrounding prose emphasizes threat-model-bound robustness.
    suggested_correction: |-
      Align the prompt with the numbers: "The goal is to make a ResNet-50 more robust to small norm-bounded image perturbations (epsilon = 8/255). What does this cost in clean ImageNet performance?"
    why: |-
      Robustness guarantees are threat-model specific. Mixing patch attacks with epsilon-bounded perturbations weakens the chapter's repeated lesson that defenses do not transfer automatically across attack classes.
    confidence: high
  - id: vol2_14_robust_ai_008
    severity: major
    line: 2007
    correction_type: numeric_consistency
    current_text: |-
      Robust models typically sacrifice 2--8 percent clean accuracy for improved adversarial robustness, a fundamental trade-off in the robust optimization objective.
    issue: |-
      This clean-accuracy trade-off range conflicts with nearby examples and the chapter summary. The robustness-tax callout just above uses 76 percent to 50 percent clean ImageNet accuracy, a 26 percentage-point drop; the certified-defense paragraph also repeats the 76 to 50 adversarial-training example, while the summary says 10--15 percent. Without threat-model or method qualifiers, the reader sees three different robustness-tax magnitudes.
    suggested_correction: |-
      Qualify the ranges by method and threat model. For example: "For strong ImageNet-scale adversarial training at epsilon = 8/255, clean accuracy can drop by roughly 25 percentage points; lighter defenses or smaller perturbation budgets may cost single-digit points, while randomized smoothing in the example below costs about 14 points."
    why: |-
      The chapter repeatedly emphasizes engineering trade-offs. Inconsistent accuracy-tax numbers make it hard to reason about when robustness is affordable and what each defense actually costs.
    confidence: high
