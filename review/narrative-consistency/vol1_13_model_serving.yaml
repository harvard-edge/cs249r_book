findings:
- id: NC-MSERV-001
  severity: major
  line: 1706
  correction_type: bottleneck_consistency
  current_text: '**The contrast**: While ResNet-50 serving is limited by convolutional neural network (CNN) math, DLRM serving is strictly limited by I/O and memory capacity.'
  issue: This contrast conflicts with the section's own ResNet-50 latency lesson. The immediately preceding breakdown shows preprocessing plus transfer consuming about as much latency as inference, and the TensorRT note says preprocessing would dominate after optimization. The paragraph after the DLRM example then says the hidden bottleneck for ResNet-50 is image decoding on CPU. Saying ResNet-50 serving is "limited by CNN math" undercuts the chapter's core point that serving bottlenecks often sit outside the model.
  suggested_correction: 'Narrow the contrast to the model stage rather than the whole serving path, for example: "While ResNet-50''s model stage is dominated by convolutional compute, DLRM''s dominant model-stage cost is embedding-table memory access." Then preserve the broader lesson that end-to-end serving bottlenecks must be measured across preprocessing, inference, and postprocessing.'
  why: The section teaches learners to profile before optimizing. Aligning the DLRM contrast with the ResNet latency breakdown keeps the bottleneck lesson coherent.
  confidence: high
- id: NC-MSERV-002
  severity: major
  line: 3291
  correction_type: traffic_capacity_alignment
  current_text: 'For ResNet-50 with 50 ms SLO and 500 QPS traffic:


    - Latency budget for batching: `{python} PracticalConfigCalc.pc_batch_budget_ms_str` ms

    - Maximum window: `{python} PracticalConfigCalc.pc_max_window_ms_str` ms

    - Expected batch size: `{python} PracticalConfigCalc.pc_expected_batch_str`

    - Maximum batch size: `{python} PracticalConfigCalc.pc_mem_limit_batch_str` (memory limit)

    - Configuration: $T$ = `{python} PracticalConfigCalc.pc_config_window_ms_str` ms, $b_{\text{max}}$ = `{python} PracticalConfigCalc.pc_config_batch_str`

    - Predicted p99 latency: `{python} PracticalConfigCalc.pc_predicted_p99_ms_str` ms (within SLO)

    - Predicted throughput: `{python} PracticalConfigCalc.pc_predicted_throughput_str` img/s'
  issue: The stated traffic is 500 QPS and the computed expected batch size is 6.0 for a 12 ms window, but the example reports predicted throughput of 1,180 img/s. That throughput appears to be a peak capacity or saturated-batch number, not the expected served throughput under 500 QPS arrivals. As written, the example implies the system will achieve more throughput than the offered load while also forming max-size batches despite an expected batch of six.
  suggested_correction: Label the 1,180 img/s number as "predicted peak capacity" or "saturated throughput" and add that the actual served rate at 500 QPS is arrival-limited, with typical batches around six and the batch-32 cap reserved for bursts. If the intent is expected throughput at the stated traffic level, change the value to match the 500 QPS offered load.
  why: This example is meant to show how to derive a production batching configuration. Distinguishing offered load from peak serving capacity prevents learners from conflating traffic, expected batch size, and hardware throughput.
  confidence: high
- id: NC-MSERV-003
  severity: minor
  line: 3416
  correction_type: numeric_consistency
  current_text: The variance equals the mean (a property of Poisson distributions), so batch sizes fluctuate significantly at moderate traffic. With $\lambda = 200$ requests/second and $T = 10$ ms, expected batch size is two, but 16 percent of windows will have zero requests (wasted compute cycles) while others may have four or more.
  issue: For a Poisson distribution with mean 2, the probability of zero arrivals is e^-2, about 13.5 percent. The nearby footnote and @tbl-batch-variability round this same value to 14 percent, so the 16 percent claim appears stale.
  suggested_correction: Change "16 percent" to "14 percent" or "about 13.5 percent" to match the table and the Poisson calculation.
  why: This paragraph reinforces the batch-size variability table. Keeping the numeric example aligned with the table avoids distracting learners from the traffic-variance point.
  confidence: high
- id: NC-MSERV-004
  severity: major
  line: 3558
  correction_type: numeric_consistency
  current_text: '- **Thermal budget**: At 3.0 mJ/45 ms = 67 mW sustained, indefinite operation without throttling

    - **NPU vs. CPU trade-off**: CPU fallback uses 4.2 mJ (1.4$\times$ energy) at 85 ms (1.9$\times$ latency)


    1. **Energy Budget**\index{Energy!budget, mobile inference}: Each inference depletes battery. A photo app running continuous inference at 22 FPS drains 240 mW, acceptable for active use but problematic for background processing.'
  issue: 'The mobile energy story mixes baselines. The table totals 3.0 mJ and 45 ms, which supports the 67 mW statement and 22 FPS sustained rate; 3.0 mJ at 22 FPS is also about 66 mW, not 240 mW. The CPU fallback bullet is also hard to interpret: 4.2 mJ is the CPU inference-stage energy, not 1.4x the NPU inference energy of 0.8 mJ; if replacing the NPU stage in the full pipeline, total energy would be about 6.4 mJ.'
  suggested_correction: Use one baseline consistently. For example, change the continuous-inference drain to about 67 mW if it refers to the table's modeled pipeline, or explicitly state that 240 mW includes additional camera/display/system overhead not counted in the table. For CPU fallback, either compare stage-to-stage ("4.2 mJ vs. 0.8 mJ for inference") or full pipeline-to-full pipeline ("about 6.4 mJ vs. 3.0 mJ").
  why: The mobile section is teaching why energy, thermal, and latency constraints differ from cloud serving. Inconsistent power and fallback comparisons make the deployment trade-off harder to reason about.
  confidence: high
