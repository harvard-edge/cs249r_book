  - id: vol2_09_performance_engineering_001
    severity: minor
    line: 145
    correction_type: latency_throughput_consistency
    current_text: |-
      Configuration A is latency-optimized: FP16 weights, batch size 1, speculative decoding enabled. Each H100 GPU serves approximately 80 tokens/second with 20 ms inter-token latency. Cost: 8 GPUs dedicated to a single user stream, approximately \$0.12 per 1,000 output tokens.
    issue: |-
      The stated per-GPU throughput and inter-token latency point to different token rates for a single stream: 20 ms/token corresponds to 50 tokens/second, not 80 tokens/second. Because the same sentence says 8 GPUs are dedicated to a single user stream, it is unclear whether 80 tokens/second is per GPU, per model replica, or an aggregate speculative-decoding rate.
    suggested_correction: |-
      Align the units in the example. For a single user stream, either use 50 tokens/second with 20 ms ITL, or keep 80 tokens/second and change ITL to roughly 12.5 ms. If speculative decoding makes the two metrics intentionally differ, label 80 tokens/second as an effective accepted-token rate and explain the distinction.
    why: |-
      This is the first concrete latency-vs-throughput frontier example. Mixed units make the trade-off harder to trust before the roofline examples establish the chapter's quantitative frame.
    confidence: high
  - id: vol2_09_performance_engineering_002
    severity: major
    line: 705
    correction_type: figure_prose_consistency
    current_text: |-
      Intermediate tensors $Z_1$ and $Z_2$ each occupy the same memory as the output $Y$. For a hidden dimension of 4096 and batch size of 2048 in FP16, each intermediate tensor is $4096 \times 2048 \times 2 = 16$ MB. The unfused execution reads and writes 32 MB of intermediate data that a fused kernel avoids entirely by holding $Z_1$ and $Z_2$ in registers or shared memory (SRAM) within the SM.
    issue: |-
      The sentence says the avoided intermediate read/write traffic is 32 MB, but two 16 MB intermediates are each written and then read, for 64 MB of HBM traffic. The adjacent figure caption and the following paragraph both say fusion eliminates 64 MB, so the prose currently contradicts its own visual explanation.
    suggested_correction: |-
      Separate storage from traffic: "The unfused execution materializes 32 MB of intermediate tensors and performs 64 MB of intermediate HBM traffic (write and read for each tensor) that a fused kernel avoids..."
    why: |-
      The fusion section teaches the difference between materialized tensors and HBM transfers. Collapsing those quantities weakens the central memory-traffic lesson.
    confidence: high
  - id: vol2_09_performance_engineering_003
    severity: minor
    line: 989
    correction_type: numeric_denominator_clarity
    current_text: |-
      1.  **Significance (quantitative)**: With block size $B_{\text{block}} = 64$ and $b = 4$ bits, weights compress from 16 bits to 4 bits—a 4$\times$ memory reduction—while per-group scale tensors add $1/B_{\text{block}}$ overhead in FP16, totaling $\approx 1.6\%$ metadata overhead. This yields an effective bit-width of $4 + 16/64 = 4.25$ bits per weight, compared to a pure 4-bit scheme at exactly 4 bits.
    issue: |-
      The 1.6 percent overhead is relative to the original FP16 weight size, but the effective bit-width calculation shows the metadata adds 0.25 bits to a 4-bit payload, which is 6.25 percent overhead relative to the quantized representation. The callout later says block size 16 reaches 6.25 percent overhead, using the FP16-baseline denominator again. The math is defensible, but the denominator switch is not explained.
    suggested_correction: |-
      State both denominators once and use them consistently: "For B=64, the scale adds 0.25 bits per weight, or 6.25 percent over the INT4 payload and 1.6 percent of the original FP16 size. For B=16, the scale adds 1 bit per weight, or 25 percent over the INT4 payload and 6.25 percent of the original FP16 size."
    why: |-
      Learners use this callout to reason about quantization trade-offs. Ambiguous percentages make block-size metadata costs look smaller or larger depending on which baseline the reader assumes.
    confidence: high
  - id: vol2_09_performance_engineering_004
    severity: major
    line: 1629
    correction_type: code_prose_consistency
    current_text: |-
      In practice, achieving effective overlap requires attention to several details. The communication operation must be launched *before* the compute kernel it should overlap with, not after, because NCCL operations have their own launch overhead. Synchronization points (where one stream waits for another) must be minimized, as each synchronization serializes execution.
    issue: |-
      The code example immediately above launches the compute stream first and the communication stream second, then the prose says communication must be launched before the compute it overlaps with. The DDP explanation that follows is also more nuanced: each gradient AllReduce is launched as soon as a bucket is ready so it can overlap with later backward compute.
    suggested_correction: |-
      Rephrase around early launch rather than a fixed ordering: "The communication operation must be launched early enough to overlap with subsequent compute; in backward passes, DDP starts each bucket's AllReduce as soon as that bucket is ready so NCCL launch latency is hidden behind later gradient kernels."
    why: |-
      This subsection is teaching the mechanics of overlap. A direct code/prose mismatch can leave readers unsure whether stream ordering or timing is the actual requirement.
    confidence: high
  - id: vol2_09_performance_engineering_005
    severity: major
    line: 1784
    correction_type: roofline_example_consistency
    current_text: |-
      **Problem**: A 7B parameter LLM runs on a single H100 and shows 45 tokens/second during autoregressive generation at batch size 1. The theoretical bandwidth-limited rate is approximately 96 tokens/second. Where is the remaining 53 percent of performance hiding?
    issue: |-
      A 7B FP16 model has about 14 GB of weights, so the earlier bandwidth-only roofline logic would put the ideal weight-read-only rate on a 3.35 TB/s H100 near 239 tokens/second, not 96 tokens/second. The 96 tokens/second figure implies roughly 35 GB of traffic per token or additional decode traffic, but that extra traffic is not stated.
    suggested_correction: |-
      Either revise the theoretical rate to match the weight-read-only roofline for a 7B FP16 model and update the "remaining percent" arithmetic, or explicitly define the 96 tokens/second as a fuller decode-step ceiling that includes KV-cache reads, sampling, synchronization, or another stated traffic budget.
    why: |-
      This profiling callout is supposed to apply the roofline model. An unsupported theoretical rate makes the later diagnosis feel disconnected from the chapter's own bandwidth examples.
    confidence: high
  - id: vol2_09_performance_engineering_006
    severity: major
    line: 2037
    correction_type: case_study_consistency
    current_text: |-
      Simultaneously, applying INT8 quantization to the KV cache reduces per-request cache size by 2$\times$. The combined effect on memory budget is dramatic: each GPU now has approximately 75.6 GB available for KV cache, up from 62.5 GB. At the reduced per-request KV cache size, the maximum batch size increases from 4 to approximately 32.
    issue: |-
      The memory-budget numbers follow from the 8-GPU 70B setup, but the batch-size jump is not supported by the chapter's earlier KV-cache sizing. Earlier, a 70B GQA cache at 4K context is about 1.34 GB total per request; sharded over 8 GPUs and then quantized to INT8, that would allow far more than 32 requests with 75.6 GB/GPU available. If the case study assumes a much longer context, fragmentation reserve, or serving-policy cap, that assumption is not stated.
    suggested_correction: |-
      Add the missing constraint behind batch size 4 to 32, such as a long context length, reserved memory budget, or scheduler cap. Otherwise, revise the batch-size values to align with the earlier KV-cache calculation for the stated model, GPU count, and sequence length.
    why: |-
      The case study is the chapter's synthesis example. Unsupported batch-size arithmetic makes the precision-engineering payoff look arbitrary after the chapter has carefully derived KV-cache memory mechanics.
    confidence: high
  - id: vol2_09_performance_engineering_007
    severity: major
    line: 2062
    correction_type: speculative_decoding_narrative
    current_text: |-
      With the throughput target met, the team focuses on further reducing ITL for the best user experience. Speculative decoding with a 1.5B draft model (AWQ INT4 quantized to 0.75 GB) is deployed on the same GPUs. The draft model generates 5 candidate tokens in 4 ms (benefiting from the INT4 quantization applied in Round 1). Verification takes approximately 8 ms.

      At an average acceptance rate of 0.78, the expected tokens per round is approximately 3.5. The effective ITL becomes:

      $$
      \text{ITL}_{\text{effective}} = \frac{4 + 8}{3.5} \approx 3.4 \text{ ms per token}
      $$

      The result is a 9.4$\times$ improvement over the Round 2 ITL of 32 ms.
    issue: |-
      The target-model verification step is only 8 ms even though the immediately preceding optimized autoregressive decode ITL is 32 ms. The chapter's roofline explanation says speculative decoding helps because one target pass verifies multiple candidate tokens for roughly the same weight-streaming cost as one normal decode pass; the example instead makes verification four times faster than one target decode step, which creates an unusually large 9.4x speedup and conflicts with the later summary that typical speculative-decoding speedups are 1.5--3x.
    suggested_correction: |-
      Make verification cost comparable to the optimized target decode step unless a different assumption is explicitly introduced. For example, with a 32 ms verification pass, the same draft and acceptance numbers give (4 + 32) / 3.5 ≈ 10.3 ms/token, about a 3.1x improvement, which better supports the intended roofline point and the later typical-speedup range.
    why: |-
      This is the main latency/throughput case-study example. The current numbers teach a stronger and different mechanism than the prose describes.
    confidence: high
  - id: vol2_09_performance_engineering_008
    severity: minor
    line: 2168
    correction_type: summary_consistency
    current_text: |-
      * **Speculative Decoding** is the only technique that reduces *latency* for memory-bound decode without changing precision or batch size, by trading abundant compute for scarce bandwidth through parallel verification of draft tokens.
    issue: |-
      Earlier sections show other techniques reducing decode latency without changing precision or batch size, including fusion, CUDA Graphs, and graph compilation. The distinctive point of speculative decoding is that it changes the sequential token-generation algorithm and raises effective arithmetic intensity, not that it is the only latency-reducing technique.
    suggested_correction: |-
      Remove the exclusive claim: "Speculative Decoding reduces latency for memory-bound decode without changing precision or batch size by trading abundant compute for scarce bandwidth through parallel verification of draft tokens."
    why: |-
      The takeaway should reinforce the chapter's taxonomy. As written, it contradicts the case study and the earlier kernel-overhead sections.
    confidence: high
