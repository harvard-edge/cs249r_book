findings:
  - id: "vol2_17_conclusion_001"
    severity: "minor"
    line: 73
    correction_type: "figure_principle_alignment"
    current_text: >-
      \node[layer, fill=TopColor] (Top) at (0, 4.5) {\textbf{IV. The Responsible Fleet}\\Security | Robustness | Sustainability};
    issue: >-
      The figure is introduced as the synthesis of the six principles, and the
      preceding prose says the governance layer contains both responsible
      engineering and sustainability. The top layer of the diagram lists
      Security, Robustness, and Sustainability, but omits Responsible AI or
      responsible engineering, making one of the six principles visually
      disappear from the summary.
    suggested_correction: >-
      Revise the top-layer label to include the responsible-engineering thread,
      for example "Security | Robustness | Responsibility | Sustainability" or
      "Security | Robustness | Responsible AI | Sustainability." If space is a
      concern, use "Governance | Safety | Sustainability" and align the caption
      with that broader label.
    why: >-
      This diagram is the learner's first visual map of the conclusion. If one
      of the six principles is absent from the governance layer, the visual
      weakens the chapter's claim that all principles integrate into one fleet
      stack.
    confidence: "high"

  - id: "vol2_17_conclusion_002"
    severity: "minor"
    line: 151
    correction_type: "tradeoff_budget_alignment"
    current_text: >-
      Responsible AI requirements may add latency that strains communication budgets.
    issue: >-
      The surrounding paragraph is explaining trade-offs among the six
      principles, but "communication budgets" is an awkward target for
      Responsible AI latency. Fairness checks, safety filters, audit logging, or
      explanations usually strain serving latency, compute capacity, or SLO
      budgets unless the text specifically means added network communication.
    suggested_correction: >-
      Change the sentence to something like "Responsible AI requirements may
      add latency or compute overhead that strains serving SLOs and capacity
      budgets." If the intended trade-off is specifically network traffic,
      explain that audit trails or policy checks add communication overhead.
    why: >-
      This paragraph teaches how principles interact in production. Clear budget
      terminology helps learners distinguish communication bottlenecks from
      end-to-end serving latency and capacity trade-offs.
    confidence: "medium"

  - id: "vol2_17_conclusion_003"
    severity: "minor"
    line: 239
    correction_type: "temporal_narrative_alignment"
    current_text: >-
      The era of the **compound AI system**\index{Compound AI Systems} is now standard.
    issue: >-
      The preceding section frames the era of composition as beginning now and
      says the future belongs to compound AI systems. Saying the era "is now
      standard" makes the same transition sound already complete, which weakens
      the forward-looking argument.
    suggested_correction: >-
      Rephrase to keep the transition coherent, for example: "The era of
      **compound AI systems** is emerging as the next standard" or "The
      **compound AI system** is becoming the standard pattern."
    why: >-
      The conclusion is trying to move from mastered principles to the next
      frontier. Consistent tense helps learners understand whether composition
      is an established baseline, an emerging direction, or a future prediction.
    confidence: "high"

  - id: "vol2_17_conclusion_004"
    severity: "minor"
    line: 241
    correction_type: "example_notebook_alignment"
    current_text: >-
      Technologies such as high-bandwidth flash (HBF), 3D logic-stacking, and
      novel computing substrates will redefine the physics of the fleet.
    issue: >-
      This sentence introduces post-silicon frontiers with high-bandwidth flash,
      3D logic stacking, and novel substrates, but the notebook that follows is
      specifically about optical I/O and interconnect energy per bit. The prose
      does not prepare the learner for the example that immediately follows.
    suggested_correction: >-
      Align the examples with the notebook by mentioning optical I/O,
      co-packaged optics, or photonic interconnects in this transition. For
      example: "Technologies such as optical I/O, co-packaged optics, 3D
      integration, and novel computing substrates will redefine the physics of
      the fleet."
    why: >-
      The callout is meant to quantify the post-silicon argument. When the setup
      names different technology families than the worked example, the example
      feels disconnected from the narrative.
    confidence: "high"

  - id: "vol2_17_conclusion_005"
    severity: "minor"
    line: 280
    correction_type: "example_claim_scope"
    current_text: >-
      The next leap in scale requires moving from electrical to optical signaling.
    issue: >-
      The systems insight later in the same callout correctly says optical I/O
      is a meaningful lever but currently supports single-digit improvements
      rather than a 1,000x fabric-wide reduction. The absolute "requires moving"
      phrasing overstates the illustrative calculation and makes optical
      signaling sound like the sole required path to scale.
    suggested_correction: >-
      Scope the claim to the example, for example: "One possible communication
      efficiency leap is moving part of the fabric from electrical to optical
      signaling" or "Optical signaling illustrates how changing communication
      physics can improve fleet efficiency."
    why: >-
      The notebook teaches a modest 2x energy-per-bit scenario. The prose should
      reinforce that lesson without turning the scenario into a stronger
      conclusion than the numbers support.
    confidence: "high"
notes: >-
  Read the assigned conclusion chapter from start through conclusion in order.
  The chapter's main synthesis is coherent, but several summary anchors need
  alignment: the fleet-stack figure omits responsible engineering, one trade-off
  sentence blurs communication and serving budgets, the compound-AI transition
  shifts tense, and the post-silicon worked example needs tighter setup and
  scoped claims.
