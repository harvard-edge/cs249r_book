- id: NC-FW-005
  severity: major
  line: 3088
  correction_type: conceptual_consistency
  current_text: '**Systems conclusion**: A `{python} AdminTax.admin_weights_gb_str` GB model has an **"Administrative Tax"** of ~`{python} AdminTax.admin_tax_gb_str` GB (`{python} AdminTax.admin_grads_gb_str` GB gradients + `{python} AdminTax.admin_opt_gb_str` GB optimizer + `{python} AdminTax.admin_act_gb_str` GB activations) before the first batch is even processed.'
  issue: The tax calculation includes activations, but activations are produced by processing a batch and become part of peak training-step memory, not memory that exists before the first batch is processed.
  suggested_correction: 'Rephrase as peak training memory, for example: "During a training step, this 2 GB model can require an administrative tax of..." or separate persistent state from batch-dependent activation memory.'
  why: The chapter repeatedly teaches that activation storage comes from the forward pass. Saying it exists before the first batch muddies that lifecycle.
  confidence: high
