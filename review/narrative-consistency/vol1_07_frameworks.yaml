- id: NC-FW-012
  severity: major
  line: 4691
  correction_type: roofline_consistency
  current_text: ': **Per-Operation Roofline Analysis**: FLOPs, memory traffic, and arithmetic intensity for each operation in a two-layer MLP training step. MatMul operations achieve arithmetic intensity above 1.0 (compute bound on most hardware), while ReLU and cross-entropy are far below 1.0 (memory bound), quantifying why kernel fusion targets element-wise operations. {#tbl-training-step-roofline tbl-colwidths="[29,29,20,22]"}'
  issue: Earlier the chapter teaches that an A100's ridge point is roughly 156 FLOPs/byte, so "above 1.0" is not enough to imply compute-bound on modern accelerators. The table's small MLP MatMuls have much higher arithmetic intensity than ReLU, but they can still be below the A100 compute-bound threshold.
  suggested_correction: 'Rephrase to: "MatMul operations have much higher arithmetic intensity than element-wise operations, while ReLU and cross-entropy are clearly memory-bound; on high-end GPUs, small MatMuls may still fall below the ridge point, which is why this training step remains overhead/memory sensitive."'
  why: This is the chapter's capstone roofline example. It should reinforce, not override, the earlier memory-wall threshold.
  confidence: high
