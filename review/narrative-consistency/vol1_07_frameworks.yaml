  current_text: 'This rank hierarchy maps directly onto ML data. A color image is a rank-3 tensor: height by width by three channels (red, green, blue). @fig-tensor-data-structure-b breaks this apart, stacking the three color channels illustrating how a single photograph becomes a three-layer numerical grid. Stacking a batch of $N$ images adds a fourth dimension, producing a rank-4 tensor of shape $[N, 3, H, W]$.'
  issue: The prose first describes an image in height-width-channel order, then immediately gives the batched tensor in channel-first order without naming the layout convention. This is confusing just before the chapter teaches NCHW vs. NHWC memory layouts.
  suggested_correction: 'Qualify the convention: "In PyTorch''s channel-first convention, stacking a batch produces $[N, 3, H, W]$; in channel-last layouts this would be $[N, H, W, 3]$."'
  why: Learners need to distinguish tensor rank from memory/layout convention; the current sentence blends those ideas.
  confidence: high
