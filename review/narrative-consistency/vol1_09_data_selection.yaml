status: completed
findings:
- id: NC-DS-001
  severity: major
  line: 739
  correction_type: narrative_consistency
  current_text: ICR focuses specifically on the compute component of the broader selection efficiency metric defined earlier, which also accounts for acquisition, labeling, and storage costs.
  issue: No broader "selection efficiency metric" has been defined earlier in the chapter. The reader has only been introduced to ICR and the iron-law framing, while acquisition, labeling, and storage costs are introduced later in the cost-modeling section.
  suggested_correction: 'Recast this as a forward reference, for example: "ICR focuses specifically on compute; later cost models extend the same reasoning to acquisition, labeling, and storage costs." Alternatively, define the broader metric before this sentence.'
  why: The sentence currently points learners backward to a concept they have not seen, interrupting the ICR narrative just as the chapter is establishing its core metric.
  confidence: high
- id: NC-DS-002
  severity: major
  line: 2095
  correction_type: numeric_consistency
  current_text: 'On CIFAR-10, training FixMatch requires ~`{python} FixmatchLabelEfficiency.fixmatch_compute_multiplier_str`$\times$ more compute than supervised training (processing 50K unlabeled samples per epoch). When labels cost \$1 each and GPU hours cost \$0.50, the math favors semi-supervised:'
  issue: The surrounding table emphasizes 250 FixMatch labels versus 50,000 full labels, a 200x label-efficiency claim. The cost calculation that follows instead compares 250 FixMatch labels against a 4,000-label supervised baseline, which is a 16x label reduction. The prose does not explain the baseline switch, so the 200x label-efficiency lesson and the 8x cost-savings math appear to be using different denominators.
  suggested_correction: 'Clarify the comparison before the bullets: either compare FixMatch against the full 50,000-label supervised baseline, or state that the cost example uses a separate 4,000-label supervised baseline and therefore demonstrates 16x fewer purchased labels and about 8x total cost savings.'
  why: This is a key example for label-compute trade-offs. Mixed baselines make it hard for learners to connect the table's label-efficiency claim to the ROI calculation.
  confidence: high
- id: NC-DS-003
  severity: minor
  line: 2216
  correction_type: numeric_consistency
  current_text: "The return on investment is substantial across every dimension: labeling costs drop by **`{python} FoundationCostAmortization.label_cost_drop_str`\xD7** (from `{python} FoundationCostAmortization.label_cost_scratch_total_str` to `{python} FoundationCostAmortization.label_cost_finetune_total_str`), per-task marginal compute decreases by **`{python} FoundationCostAmortization.marginal_compute_reduction_str`\xD7**, and time to deployment accelerates by **20--50\xD7** per task."
  issue: In the ten-task example, total foundation-model compute is 10,500 GPU-hours versus 10,000 GPU-hours for training from scratch, and the later figure caption says the totals are comparable with crossover around 11 tasks. Saying ROI is substantial "across every dimension" before that caveat can imply that total compute is already lower at ten tasks.
  suggested_correction: 'Qualify the sentence: "The return is substantial for labeling, marginal per-task compute, and time-to-deployment; total compute becomes favorable after the pretraining cost is amortized across enough tasks." This preserves the intended amortization lesson.'
  why: The example is meant to teach fixed-cost amortization. The prose should distinguish marginal compute savings from total compute savings at the chosen ten-task point.
  confidence: medium
- id: NC-DS-004
  severity: major
  line: 2535
  correction_type: framework_consistency
  current_text: "| **Dynamic selection**    | During training  | Curriculum Learning, Active Learning, Semi-Supervised |       10\u201330 percent faster convergence |"
  issue: The row groups curriculum learning, active learning, and semi-supervised learning, but the stated typical gain only matches the curriculum-learning story. Earlier active-learning and semi-supervised sections emphasize label-budget reductions and label efficiency, not 10--30 percent faster convergence.
  suggested_correction: 'Broaden the gain column for this row, for example: "10--30 percent faster convergence for curricula; 2--100x fewer labels for active/semi-supervised workflows." Another option is to split dynamic selection into separate rows for training-order methods and label-efficiency methods.'
  why: The decision framework is the chapter's synthesis table. A stage-level summary that assigns the wrong benefit type can mislead learners choosing between techniques.
  confidence: high
- id: NC-DS-005
  severity: major
  line: 2782
  correction_type: heuristic_consistency
  current_text: '**System implication**: Selection time should be <10 percent of subset training time for good ROI.'
  issue: 'Later guidance changes the denominator to full training time: the fallacies section says selection must remain under 10 percent of full training time, and the takeaways say "training time" without specifying which one. This matters because the later "good" proxy example is 30 minutes for a 2-hour subset run and an 8-hour full run: it is about 25 percent of subset training time but about 6 percent of full training time.'
  suggested_correction: Standardize the rule throughout the chapter. If the intended heuristic is full-run overhead, say "below 10 percent of full-training time" here. If the intended heuristic is subset-run overhead, revise the later examples or explain both thresholds separately.
  why: The selection inequality is one of the chapter's main production rules. Changing the denominator makes the same system look acceptable or unacceptable depending on where the reader is in the chapter.
  confidence: high
- id: NC-DS-006
  severity: major
  line: 3490
  correction_type: numeric_consistency
  current_text: '**Scenario**: Select a 10 percent coreset from ImageNet (1.2M images) using eight workers with four GPUs each.'
  issue: This scenario describes 8 workers with 4 GPUs each, or 32 GPUs total. The calculation docstring and performance text describe an 8x A100 cluster. The cluster size changes within the same worked example.
  suggested_correction: 'Align the scenario and performance description: either make the scenario "eight A100 GPUs" or change the later wording to "32 A100s across eight workers." Adjust any surrounding throughput claims if the intended hardware is 8 GPUs rather than 32.'
  why: The example teaches distributed overhead budgeting. A mismatched cluster size weakens the overhead and ROI interpretation.
  confidence: high
- id: NC-DS-007
  severity: major
  line: 3605
  correction_type: conceptual_consistency
  current_text: '| **Small, curated dataset**    | Compute (GPU idle waiting for data) | Faster data loaders, data echoing         |'
  issue: '"GPU idle waiting for data" describes an input-pipeline, I/O, or CPU preprocessing bottleneck, not a compute bottleneck. The recommended optimizations in the same row also target the data pipeline rather than GPU compute.'
  suggested_correction: Change the likely bottleneck to "Input pipeline / I/O latency (GPU underutilization)" or similar. If the intended lesson is a shift to true GPU compute, revise the parenthetical and hardware optimization column accordingly.
  why: This table is meant to teach bottleneck shifts after data selection. Labeling an input stall as "Compute" reverses the profiling lesson.
  confidence: high
- id: NC-DS-008
  severity: major
  line: 4396
  correction_type: conceptual_consistency
  current_text: 'Engineers assume generative models produce unlimited training data at marginal cost. However, @sec-data-selection-bridging-domain-gap-100b and @tbl-synthetic-mix establish that synthetic-only training suffers from model collapse: accuracy degrades from `{python} FpScalingCalc.synthetic_gen1_acc_str` percent to `{python} FpScalingCalc.synthetic_gen5_acc_str` percent after five generations of training on model-generated data, a `{python} FpScalingCalc.synthetic_acc_drop_str`-point drop.'
  issue: The domain-gap section and synthetic-mix table establish poor real-world generalization from distribution shift, while model collapse is the separate recursive-training failure described in the footnote. The fallacy paragraph merges those two mechanisms into one claim.
  suggested_correction: 'Separate the mechanisms: "Synthetic-only training can fail from domain gap when generated data differs from deployment data; recursive training on model-generated data can also cause model collapse..." Then keep the generation-five accuracy drop attached specifically to recursive model-generated training.'
  why: Domain gap and model collapse require different mitigations. Conflating them makes the synthetic-data warning less actionable.
  confidence: high
notes: Read the assigned chapter from the opening through the conclusion using `nl -ba` line numbers. Findings focus on narrative flow, local contradictions between prose/tables/examples, stale or unclear numeric denominators after computed examples, and teaching points that could confuse a learner. No source QMD files were edited.
