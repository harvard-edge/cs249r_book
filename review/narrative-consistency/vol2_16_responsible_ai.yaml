findings:
  - id: "vol2_16_responsible_ai_001"
    severity: "major"
    line: 407
    correction_type: "fairness_theorem_caption_alignment"
    current_text: >-
      A single classifier cannot simultaneously satisfy Demographic Parity
      (equal outcomes), Equalized Odds (equal error rates), and Calibration
      (equal predictive meaning) unless the groups have identical base rates.
    issue: >-
      The figure caption collapses several fairness tensions into one theorem.
      The nearby prose and footnote are more precise: the
      Chouldechova-Kleinberg impossibility result concerns calibrated risk
      scores and equal error-rate/balance conditions under unequal base rates,
      while demographic parity is a distinct selection-rate constraint that can
      introduce additional conflicts. The caption therefore teaches a broader
      and less precise claim than the surrounding text.
    suggested_correction: >-
      Align the caption with the prose, for example: "Calibrated risk scores
      generally cannot also satisfy equalized error-rate conditions when base
      rates differ and prediction is imperfect; demographic parity adds a
      separate selection-rate constraint that may conflict with either goal."
      If the figure keeps all three labels, describe it as a schematic of
      common fairness trade-offs rather than the Chouldechova-Kleinberg theorem
      itself.
    why: >-
      This figure is the learner's visual anchor for fairness impossibility.
      Overstating which criteria the theorem covers can make the later, more
      nuanced takeaway about calibration, error rates, and demographic parity
      feel inconsistent.
    confidence: "high"

  - id: "vol2_16_responsible_ai_002"
    severity: "major"
    line: 260
    correction_type: "worked_example_numeric_support"
    current_text: >-
      Group A (majority) has a 20 percent default rate. Group B (minority) has
      a 40 percent default rate due to systemic factors. If Demographic Parity
      (equal approval rates) is enforced, what happens to accuracy?
    issue: >-
      The fairness-tax callout gives default rates, approval rates, thresholds,
      and an 85 percent to 81 percent accuracy drop, but the stated accuracy
      values are not derivable from the information provided. Later, the
      "Engineering metric: The cost of fairness" example repeats the same
      85-to-81 percent drop while changing the unconstrained Group B approval
      rate from 60 percent to 20 percent and the parity threshold from 50
      percent to 40. The repeated 4 percent fairness tax looks like the same
      lesson but is attached to incompatible scenario details.
    suggested_correction: >-
      Consolidate the two fairness-tax examples or make clear that they are
      separate illustrative scenarios. In either case, provide a confusion
      matrix, score distribution, or explicit assumption that supports the
      85 percent and 81 percent accuracy values, so the 4 percentage point cost
      follows from the example rather than appearing as an asserted constant.
    why: >-
      The fairness tax is a central teaching point. If learners cannot connect
      the scenario data to the claimed accuracy drop, the example weakens the
      intended lesson about quantifiable trade-offs.
    confidence: "high"

  - id: "vol2_16_responsible_ai_003"
    severity: "minor"
    line: 582
    correction_type: "percentage_point_wording"
    current_text: >-
      This 29 percentage point gap means qualified Group A applicants are 29
      percent more likely to be correctly approved than equally qualified Group
      B applicants.
    issue: >-
      The sentence switches from a 29 percentage point true-positive-rate gap
      to "29 percent more likely." The relative difference from 0.60 to 0.89 is
      about 48 percent, not 29 percent, so the wording changes the quantitative
      meaning.
    suggested_correction: >-
      Say "qualified Group A applicants are approved at a true-positive rate
      29 percentage points higher than equally qualified Group B applicants."
      If a relative comparison is desired, compute and state the relative
      increase separately.
    why: >-
      This section is teaching fairness metric interpretation. Mixing percent
      and percentage points can leave learners with the wrong magnitude for the
      disparity.
    confidence: "high"

  - id: "vol2_16_responsible_ai_004"
    severity: "major"
    line: 618
    correction_type: "metric_definition_alignment"
    current_text: >-
      The calibration gap is $0.750 - 0.571 = 0.179$. Group B's predicted
      positives are actually positive 75 percent of the time, while Group A's
      are only 57 percent accurate. This violates calibration and reveals that
      the model is less reliable when predicting approval for Group A.
    issue: >-
      The paragraph computes positive predictive value parity for hard binary
      predictions, but the preceding definition states that score calibration is
      a stronger per-score condition. Calling the PPV gap a "calibration gap"
      and saying it "violates calibration" contradicts that distinction.
    suggested_correction: >-
      Rename this result as a "positive predictive value gap" or "predictive
      parity gap." If the goal is to demonstrate score calibration, add
      score-level or binned predicted-probability data and evaluate calibration
      within comparable score ranges across groups.
    why: >-
      Calibration is one of the fairness criteria involved in the impossibility
      discussion. Blurring score calibration with PPV parity makes the later
      theorem and trade-off language harder to understand.
    confidence: "high"

  - id: "vol2_16_responsible_ai_005"
    severity: "major"
    line: 1516
    correction_type: "real_time_metric_availability"
    current_text: >-
      Real-time fairness monitoring tracks demographic parity and equalized
      odds metrics for each prediction, maintaining rolling statistics across
      protected groups.
    issue: >-
      Demographic parity can be updated from predictions alone, but equalized
      odds requires ground truth labels to compute true-positive and
      false-positive rates. The code reflects this by accepting an optional
      actual_label and computing equalized odds only if labels are available.
      The prose and listing introduction therefore overpromise what can be
      monitored "for each prediction" in a live serving path.
    suggested_correction: >-
      Rephrase the monitoring flow as: update prediction-only metrics such as
      demographic parity in real time, then update equalized odds and equality
      of opportunity when delayed labels or audited outcomes arrive. Mention
      that alerting on label-dependent fairness metrics may run asynchronously.
    why: >-
      This section connects fairness definitions to production telemetry.
      Learners need to understand which metrics are available at inference time
      and which require delayed outcome collection.
    confidence: "high"

  - id: "vol2_16_responsible_ai_006"
    severity: "major"
    line: 2032
    correction_type: "capacity_math_alignment"
    current_text: >-
      In production deployments, these costs translate to significant
      infrastructure overhead: a high-traffic system serving 10,000 predictions
      per second with 10 percent explanation rate would require 50--500$\times$
      additional compute capacity solely for explainability.
    issue: >-
      The stated capacity multiplier does not follow from the preceding numbers.
      If 10 percent of 10,000 predictions need explanations and each explanation
      costs 50--1000 times a normal inference, the added explanation load is
      about 5--100 times the baseline inference fleet, not 50--500 times.
    suggested_correction: >-
      Change the multiplier to approximately 5--100 times additional baseline
      inference capacity, or adjust the explanation rate/SHAP overhead numbers
      if the intended conclusion is 50--500 times.
    why: >-
      The paragraph is intended to teach capacity planning for explainability.
      A factor-of-ten mismatch can distort the scale of the infrastructure
      trade-off.
    confidence: "high"

  - id: "vol2_16_responsible_ai_007"
    severity: "minor"
    line: 2280
    correction_type: "section_transition_alignment"
    current_text: >-
      The computational resource requirements explored in the previous section
      create systemic barriers that determine who can develop, deploy, and
      benefit from responsible AI capabilities, transforming responsible AI
      from an individual system property into a collective social challenge.
    issue: >-
      The immediately previous section is "Institutional embedding of
      responsibility," not the resource-requirements discussion. The resource
      equity material appears much earlier in the chapter, so this transition
      sends readers looking backward to the wrong section.
    suggested_correction: >-
      Replace "the previous section" with "the earlier resource-requirements
      discussion" or "the resource constraints discussed throughout this
      chapter."
    why: >-
      This paragraph bridges sociotechnical dynamics into implementation
      challenges. An inaccurate local reference interrupts that transition and
      makes the chapter map harder to follow.
    confidence: "high"
