    suggested_correction: >-
      Either align the example with the running 2.1 TB checkpoint numbers, or
      introduce the 100 TB case as a deliberately different scenario, such as an
      embedding-heavy recommender or trillion-parameter MoE checkpoint where
      each GPU owns about 10 GB of state.
    why: >-
      The checkpoint storm concept is important, but the unexplained scale jump
      makes the nearby examples appear to contradict one another instead of
      building a single intuition.
    confidence: "high"

  - id: "vol2_07_fault_tolerance_006"
    severity: "minor"
    line: 2928
    correction_type: "cost_comparison_alignment"
    current_text: >-
      At $1M/day in revenue dependent on recommendations, an 8 percent CTR
      reduction ($80K/day degraded) is sharply preferable to a 10-minute outage
      ($7K/minute lost).
    issue: >-
      The comparison mixes a per-day degradation cost with a 10-minute outage
      cost. At $1M/day, a complete outage costs about $694 per minute, not
      $7K/minute; a 10-minute outage is about $7K total. If the intended outage
      cost is $7K per minute, the revenue baseline is closer to $10M/day.
    suggested_correction: >-
      Use a consistent time basis, e.g. "an 8 percent degradation for 10 minutes
      costs about $560, while a 10-minute full outage costs about $7K" under a
      $1M/day baseline, or change the revenue baseline if $7K/minute is the
      intended outage rate.
    why: >-
      This definition teaches the economic logic of graceful degradation. A
      mismatched cost basis weakens the argument that controlled degradation is
      preferable to a hard outage.
    confidence: "high"

  - id: "vol2_07_fault_tolerance_007"
    severity: "major"
    line: 3294
    correction_type: "case_study_numeric_consistency"
    current_text: >-
      Meta's OPT-175B training run on a 992-GPU cluster provides a
