findings:
  - id: "vol2_07_fault_tolerance_001"
    severity: "major"
    line: 28
    correction_type: "numeric_narrative_alignment"
    current_text: >-
      A single GPU fails perhaps once per year. A thousand GPUs experience
      failures daily. A ten-thousand GPU cluster sees failures every few hours.
    issue: >-
      The opening uses a one-year per-GPU failure rate and says a 1,000-GPU
      cluster fails daily, but the quantitative sections later anchor modern
      data-center GPU MTBF at 40,000-100,000 hours and use 50,000 hours for
      worked examples. Under that later baseline, 1,000 GPUs fail about every
      50 hours, not daily, and a single GPU fails every 4.6-11.4 years rather
      than once per year. The same mismatch recurs at line 134.
    suggested_correction: >-
      Align the opening and line 134 with the later MTBF baseline, e.g. "A
      single GPU can run for years between failures. A thousand GPUs turn that
      into failures every couple of days. A ten-thousand-GPU cluster sees
      failures every few hours." If the chapter wants the daily 1,000-GPU claim,
      introduce the lower per-device MTBF assumption explicitly.
    why: >-
      This is the chapter's first quantitative intuition. If it uses a different
      reliability assumption than the math that follows, learners may not trust
      the later "precise and quantitative" derivation.
    confidence: "high"

