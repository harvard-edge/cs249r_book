  - id: "vol2_07_fault_tolerance_008"
    severity: "major"
    line: 3326
    correction_type: "unit_scope_consistency"
    current_text: >-
      A job running on 100 GPUs can lose 10 nodes and continue training on 90
      with only a momentary pause for state redistribution, rather than a full
      crash-and-restart cycle.
    issue: >-
      The sentence switches between GPUs and nodes. Elsewhere in the chapter a
      node commonly contains 8 GPUs, so losing 10 nodes from a 100-GPU job would
      not leave 90 GPUs.
    suggested_correction: >-
      Use one unit consistently: "A job running on 100 GPUs can lose 10 GPUs and
      continue training on 90 GPUs," or "A job running on 100 nodes can lose 10
      nodes and continue training on 90 nodes."
    why: >-
      Elastic training depends on precise worker-count reasoning. Mixing nodes
      and GPUs obscures what state is being resharded and how much capacity was
      actually lost.
    confidence: "high"

  - id: "vol2_07_fault_tolerance_009"
    severity: "major"
    line: 3367
    correction_type: "conceptual_numeric_alignment"
    current_text: >-
      Correlated failures reduce effective MTBF below the independent-failure
      calculation, sometimes dramatically. A cluster with 1000 "independent"
      GPUs each with 10,000-hour MTBF should have system MTBF of 10 hours. If
      failures correlate with factor 10 (10 GPUs fail together on average),
      effective MTBF drops to 1 hour.
    issue: >-
      The parenthetical equates "correlation factor 10" with "10 GPUs fail
      together," but blast radius and event frequency are different quantities.
      Ten GPUs failing in one incident increases impact, but it does not by
      itself prove that time to the next failure incident drops from 10 hours to
      1 hour.
    suggested_correction: >-
      Separate the two concepts. For example: "If a shared failure mode adds a
      hazard rate 10x larger than the independent first-failure rate, effective
      MTBF drops to 1 hour. Separately, when correlated incidents occur, they
      may take out 10 GPUs at once, increasing blast radius."
    why: >-
      This pitfall is meant to sharpen the learner's intuition about correlated
      failures. As written, it risks teaching that grouped failures automatically
      imply a proportional increase in incident frequency.
    confidence: "medium"

  - id: "vol2_07_fault_tolerance_010"
    severity: "minor"
    line: 3429
    correction_type: "summary_calibration"
    current_text: >-
      The Young-Daly formula, $\tau_{\text{opt}} = \sqrt{2 \times
      T_{\text{write}} \times \text{MTBF}}$, gives engineers a principled way
      to balance checkpoint frequency against overhead, typically yielding
      intervals of 20 to 30 minutes for large clusters.
    issue: >-
      The summary narrows the chapter's own examples to 20-30 minutes. Earlier,
      the 10,000-GPU worked example yields about 12.4 minutes, the 5-hour-MTBF
      table gives 14.5 minutes for the 2.1 TB LLM checkpoint, and other model
      rows range from seconds to minutes. The same 20-30 minute claim is
      repeated in the takeaways at line 3437.
    suggested_correction: >-
      Calibrate the summary to the worked examples, e.g. "often landing in the
      tens-of-minutes range for frontier LLM examples, but ranging from seconds
      to about 30 minutes depending on checkpoint size and cluster MTBF."
    why: >-
      The summary is the learner's final mental model. Overstating one interval
      range weakens the chapter's broader point that the optimal interval is a
      calculation, not a rule of thumb.
    confidence: "medium"
