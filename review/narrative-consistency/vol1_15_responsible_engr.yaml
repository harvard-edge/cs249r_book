- id: NC-RESP-001
  severity: major
  line: 426
  correction_type: taxonomy_consistency
  current_text: "1.  **Significance (quantitative)**: Each D\xB7A\xB7M axis acquires concrete governance constraints: the Data axis is bounded by privacy regulations such as the General Data Protection Regulation (GDPR), which limits which $D_{\\text{vol}}$ can be collected, the Algorithm axis is bounded by fairness metrics (for example, demographic parity within $\\varepsilon = 5\\%$ across protected groups, meaning positive prediction rates must not differ by more than 5 percentage points), and the Machine axis is bounded by robustness budgets (for example, accuracy degradation less than 2 percent under adversarial perturbation $\\|\\delta\\|_\\infty \\leq 0.01$). Violating these bounds is a system failure, not a research shortcoming."
  issue: "The surrounding chapter defines the Machine/Physics axis as infrastructure, energy, and resource cost, while adversarial perturbation robustness is an algorithm/model behavior constraint. This shifts the D\xB7A\xB7M taxonomy just after the chapter has taught learners that Machine-axis responsibility covers energy, hardware, and operational infrastructure."
  suggested_correction: Keep fairness and robustness constraints on the Algorithm axis, and give the Machine axis a resource or infrastructure bound, for example latency, energy per inference, carbon budget, audit-log retention, or maximum infrastructure cost. If robustness is meant to be cross-cutting, say that explicitly rather than assigning it to Machine.
  why: "The D\xB7A\xB7M taxonomy is the chapter's diagnostic scaffold. Mixing the axes weakens the learner's ability to map responsibility failures to the right remediation path."
  confidence: high
- id: NC-RESP-002
  severity: major
  line: 784
  correction_type: example_theory_alignment
  current_text: '[^fn-fairness-metric-incompatibility]: **Fairness Metric Incompatibility**: The measured disparities are a direct consequence of an impossibility theorem proving that multiple fairness metrics cannot be satisfied simultaneously when group base rates differ [@chouldechova2017]. This forces an explicit trade-off: optimizing for one metric, like equal opportunity, will degrade another, such as predictive parity. A system designer must therefore choose which fairness guarantee to violate, as it is mathematically impossible to satisfy all three.'
  issue: 'The loan-approval confusion matrices shown immediately above have equal base rates: Group A has 5,000 qualified applicants out of 10,000, and Group B has 1,000 out of 2,000, so both are 50 percent. The displayed disparities therefore are not a direct consequence of the base-rate incompatibility theorem as written.'
  suggested_correction: Reframe the footnote so the worked example first demonstrates violations of demographic parity, equal opportunity, and equalized odds, then explain separately that when base rates differ, fairness criteria can become mutually incompatible. Alternatively, change the confusion matrices to use different base rates if the theorem is intended to explain the specific numbers.
  why: This section is teaching how to compute fairness metrics from concrete tables. Tying the example to a theorem whose premise is absent makes the math story harder to trust.
  confidence: high
