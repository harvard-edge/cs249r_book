- id: NC-RESP-005
  severity: major
  line: 1994
  correction_type: figure_prose_alignment
  current_text: "@fig-data-governance-pillars maps these governance obligations to four operational pillars, each with distinct engineering mechanisms. Privacy protects individuals through techniques like differential privacy and data minimization, limiting what the system retains beyond its immediate training purpose. Security prevents unauthorized access through encryption at rest and in transit, role-based access controls, and audit logging of every query against the feature store. Compliance ensures adherence to regulatory frameworks such as GDPR and CCPA, translating legal requirements into concrete system capabilities like erasure pipelines and consent management APIs. Transparency enables accountability through documentation of data provenance, model lineage, and decision audit trails. These pillars must operate together because a failure in any one undermines the others: encrypted data with no access controls is still vulnerable, and compliant storage without transparency cannot\
    \ survive a regulatory audit. In the context of the D\xB7A\xB7M taxonomy, governance provides the structural integrity for the Data axis, ensuring that the fuel for our systems remains safe, compliant, and reliable across the entire data lifecycle."
  issue: The prose prepares the reader for a four-pillar figure (privacy, security, compliance, transparency), but the figure caption and diagram show eight broader data-governance topical elements such as Organization, Policies, Data catalogs, Data Sourcing, Data Operations, and Data Security. Only one of the four named pillars appears directly in the visual.
  suggested_correction: Either revise the prose/caption to say the figure shows the broader governance operating model that supports the four obligations, or replace the figure with one organized around the four pillars named in the prose.
  why: The section uses the figure as the learner's map for data governance. A four-pillar setup followed by an eight-element diagram makes the organizing model unclear.
  confidence: high
