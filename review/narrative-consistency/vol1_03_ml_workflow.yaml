chapter: vol1_03_ml_workflow
source_qmd: book/quarto/contents/vol1/ml_workflow/ml_workflow.qmd
status: findings
findings:
- id: NC-MLW-001
  severity: major
  line: 789
  correction_type: narrative_consistency
  current_text: The six lifecycle stages are not merely procedural steps; they are the engineering levers used to optimize the variables in the iron law of ML systems.
  issue: The callout promises a mapping from all six lifecycle stages to the iron law, but the bullets cover only Data Collection and Preparation, Model Development and Training, Evaluation and Validation, and Deployment and Integration. Problem Definition and Monitoring and Maintenance disappear from the mapping.
  suggested_correction: Either add bullets explaining how Problem Definition sets the target constraints/budgets and how Monitoring and Maintenance observes drift, latency, and efficiency to trigger re-optimization, or rephrase the lead-in to say that the stages that map most directly to the equation are listed.
  why: The chapter has just taught a six-stage framework. A four-item mapping makes the iron-law connection feel incomplete and may leave learners unsure where the omitted stages fit.
  confidence: high
- id: NC-MLW-002
  severity: major
  line: 1788
  correction_type: numeric_consistency
  current_text: 'Annual cost: 500 clinics x 50 patients x 365 days x USD 0.01 = cloud annual cost.'
  issue: The deployment economics callout is framed in images per month and upload costs for 5 MB images, while the formula multiplies clinics by patients by days, effectively assuming one processed image per patient. Earlier, the bandwidth example used 10 retinal photos per patient, so the unit shift from photos/images to patients is not explained.
  suggested_correction: Add an explicit assumption such as "one billable processed image/exam per patient after local selection" or include a photos_per_patient term and update the monthly image count, cloud cost, edge cost, and payback result accordingly.
  why: This exercise is meant to quantify the cloud-vs-edge trade-off introduced by the earlier bandwidth example. Inconsistent units weaken that narrative link and can make the payback calculation look arbitrary.
  confidence: high
- id: NC-MLW-003
  severity: major
  line: 1902
  correction_type: math_narrative_consistency
  current_text: constraints discovered late in the lifecycle (N) incur an exponential cost relative to the stage where they should have been defined (Correction Cost approx 2^(N-1) x Base Effort).
  issue: The prose says the cost is relative to the stage where the constraint should have been defined, but the formula hard-codes a Stage 1 baseline. That is consistent with the chapter's deployment-paradigm examples, but not with the more general wording.
  suggested_correction: Either define the principle specifically as "relative to catching it at Stage 1" or use a general form such as 2^(N-S), where S is the stage where the constraint should have been specified.
  why: The checkpoint immediately asks learners to apply the formula. Ambiguous notation can make them unsure whether to count from Stage 1 or from the actual missed stage.
  confidence: high
- id: NC-MLW-004
  severity: minor
  line: 1985
  correction_type: unsupported_numeric_summary
  current_text: '4--8 iteration cycles: Production-ready ML systems usually require repeated cycles across data, model, and infrastructure stages.'
  issue: 'The exact 4--8 range appears in the summary as one of the chapter''s three quantitative insights, but the body does not establish that range. Earlier numeric ranges are different: 2--4 iteration cycles avoided in the stage audit example and 3--5 compression iterations in the model-compression footnote.'
  suggested_correction: Remove the 4--8 number, or introduce and support that range in the body. A safer summary would be "Repeated iteration cycles" unless a specific cited or derived range is added.
  why: Summary numbers carry extra instructional weight. A new unsupported range can look like a stale quantitative claim after the rest of the chapter has been careful about worked examples.
  confidence: high
- id: NC-MLW-005
  severity: major
  line: 1993
  correction_type: example_alignment
  current_text: A model starting 5 percent behind but iterating 10x faster overtakes the leader, because each cycle improves data, architecture, and hyperparameters simultaneously (the iteration tax).
  issue: The earlier iteration-tax calculation compares one-hour cycles to one-week cycles, which is 168x theoretical capacity, then caps the fast path at 100 useful iterations. It also rounds both final accuracies to 99 percent in the rendered prose, so the visible example does not clearly show a 10x speedup or an overtaking result.
  suggested_correction: 'Align the takeaway with the worked example: either describe the fast model as reaching the 99 percent ceiling while providing many more chances to improve robustness, or adjust the example/formatting so a 10x speedup and a visible overtake are actually shown.'
  why: The iteration-tax lesson is central to the chapter. When the summary changes the speedup and the rendered numbers appear tied, learners may miss the intended point.
  confidence: high
- id: NC-MLW-006
  severity: minor
  line: 1994
  correction_type: unsupported_numeric_summary
  current_text: Explicit inputs, outputs, and quality invariants at each stage help prevent the 60-70 percent of ML project failures caused by integration problems.
  issue: The 60-70 percent integration-failure figure is introduced in the takeaway without being established earlier in the chapter. Nearby discussion mentions other failure statistics, such as over 80 percent of healthcare AI projects failing to reach deployment, but not this specific integration percentage.
  suggested_correction: Remove the percentage, add support for it earlier, or align the takeaway with the already developed claim that stage contracts reduce late integration failures and rework.
  why: A precise percentage in the final takeaway reads as a taught quantitative result. Without support, it weakens the otherwise careful summary of the chapter's evidence.
  confidence: medium
notes: Read the assigned chapter from start through conclusion with nl -ba. Findings focus on narrative flow, example support, and numeric consistency. No QMD or source files were edited.
