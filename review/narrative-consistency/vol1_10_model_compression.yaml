  current_text: '**The energy and storage constraint**: Our **Smart Doorbell Lighthouse** operates at the opposite extreme of the iron law from DLRM. While DLRM optimizes for terabyte-scale capacity, the Smart Doorbell''s Keyword Spotting (KWS) model must operate within a 100 KB budget to run on a microcontroller with 256 KB RAM.'
  issue: This KWS/TinyML memory story conflicts with the earlier deployment table, where the chapter models DS-CNN (KWS) as 500 KB and says it fits comfortably in the TinyML column. The same chapter also uses a TinyML capacity constant of 512 KiB for that table, while this passage switches to 256 KB RAM and a 100 KB model budget without explaining the change.
  suggested_correction: 'Use one consistent TinyML/KWS anchor, or explicitly distinguish them. For example: "The table used a 512 KiB TinyML budget where a 500 KiB DS-CNN barely fits; a stricter 256 KiB smart-doorbell budget leaves roughly 100 KiB for the model after runtime buffers, motivating INT4/binary compression."'
  why: TinyML is a recurring lighthouse example. Conflicting budgets weaken the intended point that compression is existential on microcontrollers.
  confidence: high
