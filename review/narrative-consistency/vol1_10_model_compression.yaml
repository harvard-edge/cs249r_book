- id: NC-MC-002
  severity: major
  line: 144
  correction_type: scope_consistency
  current_text: "2.  **Distinction (durable)**: Unlike neural architecture search, which discovers efficient architectures from scratch by exploring a design space, model compression starts from an existing trained model and reduces its cost post hoc\u2014meaning the accuracy ceiling is bounded by the base model, and the compression ratio is constrained by the architecture's inherent redundancy."
  issue: This definition distinguishes model compression from NAS, but the chapter repeatedly includes NAS as part of the structural optimization/model compression stack. A learner is left unsure whether NAS is outside the chapter's scope or one of its techniques.
  suggested_correction: 'Either narrow the distinction to "post-training compression methods" or broaden the chapter scope explicitly. For example: "Unlike post-training compression methods such as pruning and quantization, NAS discovers efficient architectures from scratch; this chapter treats it as a related structural optimization technique."'
  why: The NAS section is a major part of the chapter. The definition should explain how NAS relates to compression rather than contradicting the chapter outline.
  confidence: high
- id: NC-MC-003
  severity: major
  line: 2937
  correction_type: figure_prose_alignment
  current_text: 'Beyond computational and memory benefits, the energy costs associated with different numerical precisions reinforce the case for reduced precision. @fig-quantized-energy quantifies these energy differences: a 32-bit floating-point addition (FAdd) consumes approximately `{python} EnergyCosts.energy_add_fp32_str` pJ, whereas a 16-bit floating-point addition requires only `{python} EnergyCosts.energy_add_fp16_str` pJ. Similarly, a 32-bit integer addition costs `{python} EnergyCosts.energy_add_int32_str` pJ, while an 8-bit integer addition is just `{python} EnergyCosts.energy_add_int8_str` pJ.'
  issue: 'The prose says @fig-quantized-energy quantifies FP32/FP16/INT32/INT8 addition costs, but the figure plots integer adds, integer multiplies, and SRAM reads. Its caption also mentions "FP32 multiply: 3.7 pJ" even though the plotted operation is "Integer MULT (32b)" at 3.10 pJ.'
  suggested_correction: Align the prose, caption, and plotted bars. Either update the figure to include the FP32/FP16/INT32/INT8 addition values discussed in the prose, or revise the prose/caption to say the figure gives representative integer arithmetic and SRAM access costs while the text separately provides floating-point add constants.
  why: This section teaches the energy dividend quantitatively; mismatched operation names and values make it hard to know which comparison supports the lesson.
  confidence: high
- id: NC-MC-004
