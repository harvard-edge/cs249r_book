  correction_type: framework_consistency
  current_text: '- Explain the three-part optimization framework: model representation (pruning), numerical precision (quantization), and architectural efficiency (distillation and architecture search)'
  issue: The learning objective assigns distillation and architecture search to "architectural efficiency," but the framework immediately below places pruning, distillation, and NAS under structural/model representation, with architectural efficiency reserved for hardware execution concerns such as fusion and sparsity exploitation.
  suggested_correction: 'Revise the objective to match the chapter''s framework, for example: "Explain the three-part optimization framework: model representation (pruning, distillation, architecture search), numerical precision (quantization), and architectural/hardware efficiency (fusion, sparsity exploitation, scheduling)."'
