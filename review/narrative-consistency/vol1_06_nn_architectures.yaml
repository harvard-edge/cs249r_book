- id: NC-NN-002
  severity: major
  line: 526
  correction_type: numeric_consistency
  current_text: '**ResNet-50 (Compute Bound)**: High intensity ($\approx 50\text{--}200+$ FLOPs/byte, varying by layer).'
  issue: The earlier arithmetic-intensity table derives ResNet-50 from 4.1e9 FLOPs and 102e6 bytes, yielding about 40 FLOPs/byte, while the later ResNet lighthouse table says approximately 100 FLOPs/byte. The prose range here excludes the chapter's own whole-model table value.
  suggested_correction: 'Align the statement with the computed table, for example: "High intensity (roughly 40 FLOPs/byte at the whole-model level, with deeper bottleneck layers reaching 100--200+ FLOPs/byte)."'
  why: The point that ResNet is compute-bound remains valid, but conflicting numeric anchors make the arithmetic-intensity lesson feel stale after the math audit.
  confidence: high
- id: NC-NN-003
  severity: major
  line: 727
  correction_type: conceptual_consistency
  current_text: Both architectures can *represent* the digit classification function (UAT guarantees this for MLPs; CNNs have similar or greater representational capacity).
  issue: The chapter repeatedly teaches that CNNs gain learnability and efficiency by restricting the hypothesis space relative to unconstrained MLPs. Saying CNNs have "similar or greater representational capacity" contradicts that narrative unless the claim is limited to this specific MNIST task.
  suggested_correction: 'Rephrase to: "For this task, both architectures can represent an effective digit classifier. The difference is learnability: the CNN''s inductive bias matches the spatial structure of images..."'
  why: This preserves the intended MNIST comparison without undermining the chapter's core inductive-bias trade-off.
  confidence: high
- id: NC-NN-004
  severity: major
  line: 1161
  correction_type: numeric_consistency
  current_text: a single $5{\times}5$ kernel reuses its 25 weights at every spatial position, reducing the parameters needed to process a 1-megapixel image by over 1,000,000$\times$ compared to a fully-connected layer.
  issue: The comparison baseline is unclear and the number appears inconsistent with the later concrete CNNSharing example, where a 224x224x3 dense feature detector has 150,528 weights versus 27 for a 3x3 CNN filter, about 5,576x fewer. For a 1-megapixel single-channel input to one feature detector, 1,000,000/25 is about 40,000x, not over 1,000,000x.
  suggested_correction: 'Clarify the baseline and revise the number, for example: "reducing one feature detector from roughly 1,000,000 weights to 25, about 40,000x fewer parameters" or explain that the million-fold claim refers to a dense output feature map rather than a single detector.'
  why: This footnote is meant to motivate convolutional parameter sharing; an overstated ratio can distract from the valid systems point.
  confidence: medium
- id: NC-NN-005
  severity: major
  line: 1944
  correction_type: scope_clarification
  current_text: directly contributing to the $L_{\text{lat}}$ term of the iron law and making RNNs unable to exploit GPU parallelism during training.
  issue: Later prose correctly says individual RNN time steps can still parallelize across batch elements and matrix operations, while time steps themselves must execute sequentially. This sentence overstates the limitation as a total inability to exploit GPU parallelism.
  suggested_correction: 'Change to: "making RNNs unable to exploit GPU parallelism across the time dimension during training."'
  why: The corrected scope keeps the sequential-bottleneck lesson precise while matching the later computational-mapping explanation.
  confidence: high
- id: NC-NN-006
  severity: major
  line: 2194
  correction_type: training_inference_consistency
  current_text: attention mechanisms retain all $N$ prior token representations and compute relevance scores at inference time, trading RNN's $O(1)$ memory for $O(N^2)$ memory in exchange for eliminating the sequential bottleneck on long-range dependencies.
  issue: This conflates full-sequence attention during training/prefill with autoregressive serving. The chapter later explains that transformer serving keeps an $O(Nd)$ KV cache, distinct from the $O(N^2)$ attention score matrix used in training or full prefill.
  suggested_correction: 'Qualify the regime: "During training or full-sequence prefill, attention trades RNN-style fixed state for $O(N^2)$ score interactions; during autoregressive serving, stored KV cache grows as $O(Nd)$ while each new token attends over prior keys and values."'
  why: Training-vs-inference memory behavior is a central systems teaching point in the transformer section; conflating them can make later KV-cache explanations seem contradictory.
  confidence: high
