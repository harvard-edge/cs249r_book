- id: NC-NN-010
  severity: major
  line: 4214
  correction_type: narrative_consistency
  current_text: Dense matrix operations in MLPs achieve excellent arithmetic intensity (computation per data movement) but consume significant absolute energy.
  issue: The MLP system-implications section earlier teaches that dense layers are low-intensity and often memory-bandwidth-bound for small-batch inference unless batch sizes are large. This later blanket statement reverses that lesson without adding the batching condition.
  suggested_correction: 'Qualify the statement: "Large batched GEMMs can achieve excellent arithmetic intensity, but small-batch MLP inference often has low reuse and spends most energy on data movement."'
  why: The correction reconciles the energy discussion with the earlier arithmetic-intensity analysis instead of making MLPs appear both low- and high-intensity.
  confidence: high
