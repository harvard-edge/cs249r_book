  correction_type: narrative_consistency
  current_text: Similarly, this book uses *ResNet-50*, *GPT-2*, and *DLRM* as **canonical workloads**
  issue: The surrounding chapter setup says there are five Lighthouse Models, and the later Lighthouse comparison table includes ResNet-50, GPT-2 XL, DLRM, MobileNetV2, and KWS. This callout narrows the canonical workload set to three without explaining that MobileNet and KWS are secondary or edge-focused lighthouses.
  suggested_correction: Either include MobileNet and KWS in this sentence, or explicitly label ResNet-50/GPT-2/DLRM as the three primary data-center lighthouses before introducing MobileNet and KWS as edge/power lighthouses.
  why: The chapter relies on the Lighthouse roster as a recurring scaffold; an unexplained three-vs-five shift weakens that scaffold for learners.
