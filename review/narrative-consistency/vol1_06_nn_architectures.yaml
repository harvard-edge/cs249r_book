- id: NC-NN-012
  severity: major
  line: 4604
  correction_type: example_consistency
  current_text: '**ResNet-50** (`{python} LighthouseSpecs.resnet_params_m_str` M params, `{python} LighthouseSpecs.resnet_gflops_str` GFLOPs): Too large. At ~`{python} LighthouseSpecs.resnet_fp32_mb_str` MB FP32, leaves no room for OS and buffers. Power consumption would exceed budget.'
  issue: The example's memory budget is 512 MB RAM plus 2 GB storage, and the chapter's own ResNet-50 FP32 size is roughly 102 MB. That does not "leave no room" for OS and buffers, and quantization would reduce the model further. The stronger reason to reject ResNet in this edge case is compute/power/latency, not raw model memory.
  suggested_correction: 'Reframe the rejection: "Memory is marginal against the stated ~100 MB post-quantization model budget in FP32, but the main blockers are compute and power on the target low-power device." If memory is intended as the blocker, tighten the stated memory budget to match.'
  why: The worked example is the chapter's practical capstone, so its constraint reasoning needs to match the numeric budgets it asks learners to apply.
  confidence: high
