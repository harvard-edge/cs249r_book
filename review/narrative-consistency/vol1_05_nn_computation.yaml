status: completed_with_findings
findings:
- id: NC-001
  severity: major
  line: 1601
  correction_type: stale_numeric_context
  current_text: '@fig-trends plots seven decades of AI training compute on a logarithmic scale, revealing two distinct trends: total training compute, measured in floating-point operations (FLOPs), initially followed a 1.4$\times$ annual improvement pattern from 1952 to 2010, then accelerated to a 3.4-month doubling cycle from 2012 to 2022. Large-scale models emerging between 2015 and 2022 scaled even faster, reaching two to three orders of magnitude beyond the general trend and following an aggressive 10-month doubling cycle.'
  issue: The compute-scaling story is internally inconsistent. The figure caption describes the post-2012 trend as running from 2012 to 2025, the plotting code fits through 2025/2026-era models, this prose says 2012 to 2022 and 2015 to 2022, and line 1620 later summarizes frontier compute as doubling every 5-6 months rather than 3.4 months. A learner cannot tell which time window and trend are intended.
  suggested_correction: 'Align the prose, caption, and summary around one dated trend, or explicitly distinguish different subsets. For example: "The plotted post-2012 training-compute frontier doubles about every 3.4 months over the 2012-2025 fit; a broader cost trend grows more slowly, as summarized below."'
  why: This section is using quantitative history to motivate systems constraints, so conflicting dates and growth rates weaken the narrative and make the figure harder to interpret.
  confidence: high
- id: NC-002
  severity: major
  line: 2204
  correction_type: overgeneralized_teaching_claim
  current_text: 'Today, ReLU ($\max(0, x)$) is the default activation in nearly every hidden layer, and for good reason: it is computationally trivial (a single comparison), its gradient never vanishes for positive inputs, and it introduces natural sparsity.'
  issue: '"Nearly every hidden layer" overstates current practice. ReLU remains a major baseline and is common in many CNN/MLP settings, but modern transformer and LLM feed-forward blocks often use GELU, SiLU, or gated variants. The sentence risks teaching that ReLU is the universal modern default.'
  suggested_correction: 'Narrow the claim: "ReLU became the default hidden-layer activation for many feed-forward and convolutional networks, and it remains a useful baseline because..."'
  why: The chapter later connects these fundamentals to transformers and modern systems; an overbroad "today" claim makes the activation-function lesson feel stale.
  confidence: medium
- id: NC-003
  severity: major
  line: 3421
  correction_type: narrative_contradiction
  current_text: MNIST is a logic problem; GPT-2 is a **Data Movement** problem.
  issue: Calling MNIST a "logic problem" contradicts the chapter's central framing that even the modest MNIST network is a shift from logic to arithmetic, requiring 109,184 MACs and dense matrix operations. The contrast should be cache-resident vs. data-movement dominated, not logic vs. data movement.
  suggested_correction: 'Replace with: "MNIST is a cache-resident arithmetic problem; GPT-2 is a **Data Movement** problem."'
  why: The running example is meant to reinforce the logic-to-arithmetic transition. This sentence reverses that teaching point at the moment it summarizes model-scale memory growth.
  confidence: high
- id: NC-004
  severity: major
  line: 3945
  correction_type: unsupported_numeric_example
  current_text: Consider a case where our network predicts a probability of 0.0001 for the correct class. Computing $\log(0.0001)$ directly might cause underflow or result in imprecise values.
  issue: 'The example does not support the stated numerical-stability hazard: log(0.0001) is a normal finite FP32 value. The real failure mode is probabilities rounded to zero after softmax underflow, or logits that overflow before stable softmax/log-sum-exp is applied.'
  suggested_correction: 'Use a failure case that matches the lesson, such as: "If softmax underflows and rounds the correct-class probability to 0, then $\log(0)$ becomes $-\infty$; stable implementations avoid this by combining softmax and cross-entropy with log-sum-exp."'
  why: The surrounding section is teaching numerical stability. A benign numeric example makes the learner question what problem the stability technique is solving.
  confidence: high
- id: NC-005
  severity: minor
  line: 4094
  correction_type: example_interpretation
  current_text: The second hidden neuron's weights receive zero updates because ReLU blocked its activation, illustrating how dead neurons temporarily stop learning.
  issue: The worked example shows an inactive ReLU for one input, not a dead neuron. "Dead" usually means a unit is inactive across the data distribution and persistently receives zero gradients; calling this temporary single-example behavior "dead" blurs an important distinction introduced earlier.
  suggested_correction: 'Revise to: "The second hidden neuron''s weights receive zero updates for this example because ReLU blocked its activation, illustrating the mechanism that can lead to dead neurons if it happens persistently across training data."'
  why: The example is meant to build intuition for backpropagation. Precision here helps learners distinguish ordinary sparse activation from a training pathology.
  confidence: high
- id: NC-006
  severity: major
  line: 4564
  correction_type: numeric_consistency
  current_text: This distinction explains why training requires 2--4$\times$ more memory than inference for the same model.
  issue: The chapter's own worked MNIST example reports `{python} MNISTMemory.training_ratio_str` times more memory, which evaluates to about 4.3x, and the checkpoint at line 4633 says 2--3x. These nearby ranges conflict with the code-backed example and with each other.
  suggested_correction: 'Use a range that includes the worked example or cite the exact example: "This distinction explains why training requires several times more memory than inference; the MNIST worked example is about `{python} MNISTMemory.training_ratio_str`$\times$."'
  why: The training-vs-inference memory ratio is a core chapter takeaway. Conflicting ranges make the self-test and summary less trustworthy.
  confidence: high
- id: NC-007
  severity: major
  line: 4586
  correction_type: code_output_contradiction
  current_text: 'Total: `{python} MNISTMemory.total_inf_act_str` values (approx `{python} MNISTMemory.inference_kb_str` KB at 32-bit floating point precision)'
  issue: The bullets above list only layer outputs (128 + 64 + 10 = 202 values), but `MNISTMemory.total_inf_act_str` is computed as the sum of all layer dimensions including the 784-input layer (986 values). Worse, `MNISTMemory.inference_kb_str` is the total inference footprint including parameters, about 431 KB, not activation memory. This makes the dynamic-memory explanation numerically wrong and contradicts line 4601, which correctly says a single image stores 202 activation values.
  suggested_correction: 'Decide which activation accounting is intended and use matching variables. If counting only layer outputs, say "Total: 202 values (about 0.8 KB at FP32)." If counting input plus all activations, include the input bullet and use the activation-only memory value, about 3.9 KB, not total inference memory.'
  why: This is a direct mismatch between prose, nearby bullets, and code-derived outputs in a section teaching memory accounting.
  confidence: high
- id: NC-008
  severity: minor
  line: 5141
  correction_type: table_summary_mismatch
  current_text: Hardware improved by 1,000--10,000$\times$ across every metric *except* the algorithm.
  issue: 'The summary does not match the table: power improves only 10--20x, while energy per inference improves 20,000x. The phrase "across every metric" is therefore numerically inconsistent with the immediately preceding table.'
  suggested_correction: 'Replace with: "Hardware improved dramatically across the table, from 10--20x lower power to 20,000x lower energy per inference, while the model storage and algorithm stayed essentially unchanged."'
  why: The table is used to teach hardware progress. The prose should summarize the table rather than smooth over its range.
  confidence: high
- id: NC-009
  severity: major
  line: 5206
  correction_type: unsupported_table_reference
  current_text: As shown in @tbl-historical-performance, moving from LeNet-5 (60K parameters) to modern architectures required approximately $10^{11}\times$ more training FLOPs to reduce ImageNet error from 26 percent to 3 percent, roughly 3 percentage points per order of magnitude.
  issue: The cited table does not show this comparison. LeNet-5 is an MNIST row, not an ImageNet baseline; the table's ImageNet rows are AlexNet at 15.3 percent and ResNet-152 at 3.6 percent, and the 26 percent figure appears earlier as a traditional-method ImageNet result, not in the table. The $10^{11}\times$ compute jump also appears to mix LeNet-scale compute with later language-model-scale compute rather than the ImageNet rows.
  suggested_correction: 'Either cite the earlier ImageNet prose and compare traditional 2011 methods to ResNet, or change the sentence to a table-supported claim such as: "Within @tbl-historical-performance, ImageNet error falls from AlexNet''s 15.3 percent to ResNet-152''s 3.6 percent while training compute rises by roughly one to two orders of magnitude."'
  why: The pitfall is about extrapolating accuracy improvements; a mixed-task, unsupported numeric comparison undermines the warning.
  confidence: high
