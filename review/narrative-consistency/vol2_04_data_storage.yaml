    correction_type: example_math
    current_text: >-
      At a typical PFS read speed of 4 GB/s, this staging takes 3 seconds. If the orchestrator can instead schedule the replacement workload on an idle node that already has the data cached from a previous run, staging time is zero and training resumes instantly. At scale, this optimization compounds: in a 10,000-node cluster experiencing 10 node failures per day, locality-aware scheduling saves 30 seconds of staging time per failure, or 5 minutes per day of aggregate cluster idle time.
    issue: "The sentence first computes 12 GB / 4 GB/s as 3 seconds, but then says the same optimization saves 30 seconds per failure and 5 minutes per day for 10 failures."
    suggested_correction: "Either change the later savings to 3 seconds per failure and 30 seconds per day, or adjust the staged data volume/bandwidth so the earlier calculation also yields 30 seconds."
    why: "This example is supposed to quantify data-locality scheduling. The mismatch weakens the compounding-savings point."
    confidence: high
