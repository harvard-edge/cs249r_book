    correction_type: running_example
    current_text: >-
      In our running example, the 256-GPU cluster requires each node's host DRAM to sustain a continuous flow of decoded, augmented batches ready for PCIe transfer.
    issue: "The running example introduced earlier is a 256-node training run, and the surrounding chapter repeatedly assumes 8 GPUs per node. Referring to it here as a 256-GPU cluster shrinks the example by 8x and conflicts with the node-level storage discussion."
    suggested_correction: "Change this to 'the 256-node cluster' or 'the 2,048-GPU cluster' if the intended scale remains 256 nodes with 8 GPUs per node."
    why: "The chapter uses the running example to size storage tiers. Drifting between GPUs and nodes changes aggregate bandwidth, checkpoint sharding, and per-node staging requirements."
    confidence: high
  - id: vol2_04_data_storage_003
    severity: major
    line: 726
    correction_type: example_math
    current_text: >-
      A Lustre cluster with 20 OSS nodes each delivering 10 GB/s provides 200 GB/s aggregate—vs. a single NAS server capped at 10 GB/s—enabling an 8,000-GPU training job to load each 512-token batch in under 50 ms rather than 1 second.
    issue: "The timing claim is not supported by the stated data volume. Even at 4 bytes per token, 8,000 GPUs × 512 tokens is only about 16 MB, which a 10 GB/s NAS could read in a few milliseconds, not 1 second."
    suggested_correction: "Either replace the 512-token example with a batch volume that actually requires about 1 second at 10 GB/s, or remove the timing comparison and simply state that PFS aggregate bandwidth scales large sequential reads beyond a single NAS server."
    why: "This definition is meant to make PFS bandwidth aggregation concrete. When the numbers do not produce the stated conclusion, learners cannot trust the example as a sizing model."
    confidence: high
