    correction_type: numeric_consistency
    current_text: >-
      The distinction is quantitatively dramatic: a modern NVMe drive delivers 3.5 GB/s for sequential reads but only 0.5 GB/s for 4 KB random reads, a 7$\times$ penalty for the wrong access pattern.
    issue: "The chapter has already framed current NVMe bandwidth with 7 GB/s in the opening calculation and 14 GB/s in the 2016-2024 comparison, while the hierarchy table gives 7-25 GB/s. Calling 3.5 GB/s 'modern' makes this paragraph feel stale and inconsistent with the chapter's own anchors."
    suggested_correction: "Use the same generation anchor as the rest of the chapter, for example: 'a Gen4/Gen5 NVMe drive delivers roughly 7-14 GB/s for sequential reads, while small random reads can fall to roughly 0.5 GB/s,' or avoid the exact sequential value and emphasize the order-of-magnitude penalty."
    why: "The paragraph teaches learners to compare sequential and random access. A stale baseline distracts from that lesson and makes later 7 GB/s, 14 GB/s, and 25 GB/s references harder to reconcile."
    confidence: high
  - id: vol2_04_data_storage_002
