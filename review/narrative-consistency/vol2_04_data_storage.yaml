  - id: vol2_04_data_storage_005
    severity: minor
    line: 918
    correction_type: example_consistency
    current_text: >-
      For our 175B model training run, the archive tier holds the complete training lineage: the raw 3 TB dataset, all preprocessing scripts, the final checkpoint, and a sampled subset of intermediate checkpoints. Over a two-year retention period, this archive costs roughly $9,600 (100 TB at $0.004/GB/month $\times$ 24 months), well under one day of GPU time on the training cluster.
    issue: "The listed retained artifacts do not explain the sudden 100 TB archive size. Earlier anchors for the running example are 3 TB compressed data, roughly 15 TB with preprocessed variants, and 1.75 TB per full checkpoint."
    suggested_correction: "Introduce the 100 TB as an explicit retention budget, for example 'If that retained lineage is budgeted at 100 TB...' or recompute the archive cost from the actual retained dataset, scripts, final checkpoint, and sampled checkpoints."
    why: "The paragraph is making an economic argument that retention is cheap. The argument is easier to follow if the retained volume is connected to the artifacts just named."
    confidence: high
  - id: vol2_04_data_storage_006
    severity: major
    line: 940
    correction_type: storage_path
    current_text: >-
      For our running example, the 1.5 trillion token dataset is stored as 1,000 shards of approximately 3 GB each in a custom binary format. Each shard contains a small header (token count, vocabulary size, byte order) followed by a contiguous memory-mapped array of 4-byte token IDs. This bespoke format achieves zero per-sample overhead: the data loader memory-maps the shard and indexes directly into the token array by position, achieving the theoretical peak read bandwidth of the underlying storage device.
    issue: "The object-storage section has just explained that object storage cannot support memory-mapped I/O, and the running example stores these shards in S3 before staging. Without a staging qualifier, this paragraph contradicts the earlier object-storage path."
    suggested_correction: "Qualify the access path: 'When staged on POSIX storage such as local NVMe or a PFS, the loader memory-maps the shard...' For direct S3 reads, describe ranged GET streaming instead."
    why: "The chapter is teaching that format and tier jointly determine the data path. Mixing S3-resident shards with mmap semantics obscures that distinction."
    confidence: high
  - id: vol2_04_data_storage_007
    severity: major
    line: 1023
    correction_type: running_example
    current_text: >-
      Return to our running example. Training on 256 GPUs with ImageNet-scale images, 200 ms iterations, and 80 percent target utilization requires **`{python} PipelineCalcs.req_bw_imagenet_str` GB/s** of aggregate storage throughput.
    issue: "This is not the chapter's running example, which is a 175B language model trained on tokenized text over 256 nodes. It introduces an ImageNet image workload and a 256-GPU scale while saying 'Return to our running example.'"
    suggested_correction: "Reframe this as a separate image-training example, or change the quantities to match the 175B text-model running example."
    why: "The pipeline equation is a central teaching tool. Calling a new ImageNet scenario the running example makes it unclear which assumptions the learner should carry forward."
    confidence: high
  - id: vol2_04_data_storage_008
    severity: minor
    line: 1045
    correction_type: terminology
    current_text: >-
      To eliminate the stall entirely, storage throughput must be reduced below 200 ms, either by using faster storage, deeper prefetch buffers, or more parallel I/O streams.
    issue: "Throughput is measured in bytes per second, not milliseconds. The sentence appears to mean that I/O time or exposed data-loading latency must be reduced below the 200 ms compute time."
    suggested_correction: "Change to 'the exposed I/O time must be reduced below 200 ms' or 'storage bandwidth must be increased until the next batch arrives in under 200 ms.'"
    why: "This section defines the data stall ratio quantitatively; mixing throughput and latency units muddies the diagnostic model."
    confidence: high
  - id: vol2_04_data_storage_009
    severity: major
    line: 1061
    correction_type: figure_consistency
    current_text: >-
      **The Data Stall Frontier**: GPU utilization follows a steep S-curve as a function of storage bandwidth. Below the stall threshold (~10 GB/s for a typical 8-GPU node), accelerators spend more time waiting for data than computing.
    issue: "The generated curve uses a sigmoid midpoint of 2.5 GB/s but shades the 'Data Stall Zone' below 10 GB/s. As a result, technologies like single NVMe at 7 GB/s are inside the stall zone while the plotted utilization is already high, conflicting with the caption's 'more time waiting than computing' claim."
    suggested_correction: "Align the figure and caption by making the sigmoid midpoint/50-percent utilization threshold match the 10 GB/s stall threshold, or revise the shaded zone and caption to describe 10 GB/s as a conservative target rather than the point where waiting exceeds compute."
    why: "The figure is meant to build intuition for bandwidth sizing. Conflicting visual and caption semantics make the frontier harder to interpret."
    confidence: high
  - id: vol2_04_data_storage_010
    severity: major
    line: 1241
    correction_type: conceptual_consistency
    current_text: >-
      When the I/O system is slower than the accelerator (the common case in ML training), deeper prefetching is the only way to prevent data stalls.
    issue: "Prefetching can hide latency variance only when the long-run data supply rate meets or exceeds the accelerator's consumption rate. If the I/O system is slower on average, a deeper buffer eventually drains and cannot prevent stalls."
    suggested_correction: "Qualify the statement: 'When average throughput is sufficient but tail latency exceeds compute time, deeper prefetching prevents stalls; when sustained I/O throughput is lower than demand, the fix is faster storage, more parallel streams, smaller batches, or local staging.'"
    why: "This keeps the prefetch-depth equation consistent with the earlier pipeline throughput equation and prevents learners from treating buffering as a substitute for bandwidth."
    confidence: high
  - id: vol2_04_data_storage_011
    severity: major
    line: 1245
    correction_type: running_example
    current_text: >-
      To illustrate with our running example: the 175B model on 256 GPUs processes each batch in roughly 200 ms. Reading from local NVMe, the P99 I/O latency for a batch of tokenized text (roughly 40 MB per GPU) is approximately 50 ms.
    issue: "The running example again shifts from 256 nodes to 256 GPUs. The 40 MB per-GPU text batch also clashes with the earlier text-bandwidth notebook, where 4,096 tokens per GPU at 4 bytes/token is only 16 KB and 2,048 GPUs require roughly 160 MB/s aggregate."
    suggested_correction: "Use the same node/GPU count and token-batch assumption throughout, or explicitly state that this is a different large-batch text scenario with a larger per-GPU token count."
    why: "The prefetch memory calculation depends directly on batch size and GPU count. Inconsistent assumptions make the derived buffer sizes hard to trust."
    confidence: high
  - id: vol2_04_data_storage_012
