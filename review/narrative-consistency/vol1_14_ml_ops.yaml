findings:
- id: NC-MLOPS-001
  severity: major
  line: 531
  correction_type: figure_prose_consistency
  current_text: 'fig-alt="Timeline diagram with seven ML stages from problem statement to deployment. Color-coded arcs show correction cascades: blue for domain expertise gaps, orange for real-world brittleness, and red for poor documentation. A dashed arrow indicates a restart."'
  issue: The figure legend maps blue to real-world/physical-world brittleness, red to inadequate domain expertise, orange to poor documentation, and green to conflicting reward systems. The alt text swaps the blue/red/orange meanings. Nearby prose also says the dashed restart arrow is "at the bottom" even though the earlier walkthrough and the diagram place dashed restart arrows at the top.
  suggested_correction: 'Align the alt text and follow-up prose with the figure legend: blue = real-world brittleness, red = inadequate domain expertise, green = conflicting reward systems, orange = poor documentation; describe the dashed restart arrows without calling them "bottom" arrows, or say they appear above the timeline.'
  why: This section teaches learners how to read the correction-cascade diagram. Contradictory color and position descriptions make the visual evidence harder to use.
  confidence: high
- id: NC-MLOPS-002
  severity: minor
  line: 771
  correction_type: principle_example_alignment
  current_text: The entire pipeline is versioned, monitored, and integrated with the model registry (*quality*), enabling full traceability from data to deployed model predictions.
  issue: The preceding paragraph defines data quality as accuracy, completeness, and labeling quality. Versioning, monitoring, model-registry integration, and traceability support reproducibility and auditability more directly than data quality, so the example does not clearly illustrate the third pillar it labels as "quality."
  suggested_correction: Add an explicit quality action to the example, such as schema validation, sensor-range checks, missingness checks, label audits, or anomaly detection, and reserve versioning/model-registry integration for traceability.
  why: The paragraph is meant to show how consistency, freshness, and quality reinforce each other. The quality example should reinforce the data-quality definition rather than shifting to lineage.
  confidence: high
- id: NC-MLOPS-003
  severity: major
  line: 884
  correction_type: terminology_consistency
  current_text: '**Model Registry**: Prevents "shadow deployment," the failure mode where the undocumented production model diverges from the trained artifact through different preprocessing, stale serialization formats, or manual hotfixes applied directly to the serving endpoint.'
  issue: 'This footnote uses "shadow deployment" to mean an undocumented or divergent production model. Later, the chapter uses "shadow deployments" in the standard sense: a controlled rollout strategy that duplicates production traffic without serving candidate outputs. Using the same term for a failure mode and a deployment pattern creates a terminology conflict.'
  suggested_correction: Rename the failure mode here to "untracked deployment," "shadow model," or "registry bypass" and reserve "shadow deployment" for the controlled validation strategy introduced later.
  why: Shadow deployment is one of the chapter's named deployment patterns and appears in the learning objectives and summary. Keeping the term stable prevents learners from misclassifying a recommended rollout strategy as a registry failure mode.
  confidence: high
- id: NC-MLOPS-004
  severity: major
  line: 1458
  correction_type: numeric_consistency
  current_text: Doubling query volume halves the optimal interval because degradation costs scale linearly with traffic. Halving retraining costs similarly reduces the interval, while lower drift rates extend it.
  issue: The equation and table immediately above teach square-root scaling. Under that law, a 4x increase in query volume halves the interval; doubling query volume only reduces the interval by about sqrt(2). Similarly, halving retraining cost reduces the interval by about 29 percent, not by half.
  suggested_correction: 'Revise the caption to match the table, for example: "Quadrupling query volume halves the optimal interval because degradation costs scale linearly with traffic. Quartering retraining cost halves the interval; lower drift rates extend it."'
  why: The sensitivity table is meant to help learners reason quantitatively from the retraining formula. The caption currently contradicts the square-root law it is summarizing.
  confidence: high
- id: NC-MLOPS-005
  severity: minor
  line: 1560
  correction_type: transition_consistency
  current_text: These represent only half the operational challenge, however.
  issue: The preceding sentence says the development infrastructure addresses two of the three critical interfaces. Calling that "half" is numerically inconsistent with the three-interface framing established at the chapter opening.
  suggested_correction: Replace "only half" with "not the whole operational challenge" or "only two-thirds of the operational challenge."
  why: The chapter uses the three critical interfaces as an organizing scaffold. The transition should preserve that scaffold cleanly before introducing the Production-Monitoring interface.
  confidence: high
- id: NC-MLOPS-006
  severity: major
  line: 1792
  correction_type: worked_example_alignment
  current_text: '**Problem**: A model achieves 15 ms inference time on an A100 GPU, yet end-to-end P99 latency is 180 ms. Where does the time go?'
  issue: The callout opens with a 15 ms inference / 180 ms end-to-end scenario, but the code and worked example allocate a 100 ms P99 SLO with 45 ms for inference. The engineering insight also assumes inference is 45 percent of latency. Those numbers are internally coherent, but they do not answer the 15 ms / 180 ms problem statement.
  suggested_correction: Either change the problem statement to match the 100 ms budget (for example, inference is 45 ms of a 100 ms SLO), or change the worked budget and speedup discussion to decompose the 180 ms scenario with 15 ms inference.
  why: The callout teaches end-to-end latency budgeting. Mixing two unrelated scenarios makes it unclear which bottleneck the learner should diagnose.
  confidence: high
- id: NC-MLOPS-007
  severity: major
  line: 3173
  correction_type: monitoring_signal_consistency
  current_text: '**Observable degradation**: Battery and compute monitoring detect when models underperform due to resource constraints. Limited telemetry (privacy-preserving) tracks aggregate accuracy across device population.'
  issue: The paragraph introducing the Oura summary explicitly says the Tiny Constraint archetype relies on operational metrics rather than ground-truth labels. Claiming that limited on-device telemetry tracks aggregate accuracy conflicts with that setup unless the chapter explains where production ground truth comes from.
  suggested_correction: 'Reframe the observable-degradation signal as proxy monitoring: "Limited privacy-preserving telemetry tracks duty cycle, battery impact, inference failures, confidence/anomaly rates, and other population-level health signals; periodic labeled studies or validation cohorts estimate accuracy."'
  why: The case study is teaching how MLOps adapts under edge constraints. Direct aggregate accuracy monitoring implies label availability that the surrounding text says this setting does not have.
  confidence: high
- id: NC-MLOPS-008
  severity: major
  line: 3641
  correction_type: section_reference_support
  current_text: '@sec-ml-operations-cicd-pipelines-a9de establishes that ML pipelines execute in 15 to 45 minutes vs. 2 to 5 minutes for traditional software, with distinct stages for data validation (20-30 percent), model training (40-60 percent), and performance evaluation (15-25 percent).'
  issue: The cited CI/CD section explains ML-specific pipeline stages and tools, but it does not establish these duration ranges or stage-percentage breakdowns. The fallacy section therefore attributes precise numbers to earlier teaching that the learner has not seen supported.
  suggested_correction: 'Either add the timing/stage-breakdown comparison to the CI/CD section where the fallacy cites it, or soften this sentence to a qualitative recap: "as the CI/CD section showed, ML pipelines include additional data validation, training, evaluation, and artifact-registration stages that make them slower and more stateful than conventional software pipelines."'
  why: The fallacies are meant to consolidate prior arguments. Unsupported precise numbers at the end of the chapter read like stale audit leftovers rather than a conclusion grounded in the chapter's examples.
  confidence: high
- id: NC-MLOPS-009
  severity: major
  line: 3645
  correction_type: summary_metric_consistency
  current_text: Without automated retraining pipelines, Mean Time To Recovery (MTTR) for accuracy degradation averages 5 to 14 days; with automation, MTTR drops to 4 to 24 hours.
  issue: The MLOps definition near the beginning says automated retraining pipelines compress MTTR "from days to under one hour." This later pitfall changes the automated MTTR range to 4 to 24 hours without explaining the different scenario or maturity level.
  suggested_correction: Reconcile the two ranges. For example, qualify the earlier "under one hour" as best-case detection/trigger time, or revise this pitfall to say automation can reduce MTTR from days to hours, with highly automated systems approaching sub-hour recovery.
  why: MTTR is one of the chapter's quantitative motivations for MLOps. Conflicting recovery ranges weaken the final recap of why automation matters.
  confidence: high
notes: Read the assigned chapter from start through the conclusion using `nl -ba` line numbers. Findings focus on narrative flow, figure/prose/table alignment, terminology consistency, and numeric statements that conflict with the chapter's own examples or cited sections. No QMD or source files were edited.
