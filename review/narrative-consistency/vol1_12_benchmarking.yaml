- id: NC-BENCH-001
  severity: minor
  line: 1445
  correction_type: metric_alignment
  current_text: 'This multi-metric evaluation approach appears in our anomaly detection system, which reports performance across multiple dimensions: model size (`{python} AnomalySpecs.anomaly_params_k_str` K parameters), processing speed (`{python} AnomalySpecs.anomaly_latency_ms_str` ms/inference), and detection accuracy (`{python} AnomalySpecs.anomaly_auc_str` AUC).'
  issue: The anomaly-detection constants and the workflow figure include energy per inference, and the later example benchmark explicitly treats energy consumption as the operational-efficiency metric. This first prose summary omits energy while claiming to cover the system's multiple dimensions, so the operational part of the teaching point is under-supported until several paragraphs later.
  suggested_correction: 'Include energy in the first metric summary, for example: "model size ..., processing speed ..., detection accuracy ..., and energy consumption (`{python} AnomalySpecs.anomaly_energy_uj_str` microjoules per inference)."'
  why: The section is teaching benchmark components and multi-metric evaluation; aligning the first prose summary with the figure and later example helps learners see size, latency, accuracy, and energy as a coherent metric set.
  confidence: high
- id: NC-BENCH-002
  severity: major
  line: 1561
  correction_type: numeric_consistency
  current_text: "MobileNetV2 achieves approximately 72 percent ImageNet top-1 accuracy with `{python} CompressionModelSpecs.mobilenet_params_m_str` million parameters vs. ResNet-50's 76 percent accuracy with `{python} CompressionModelSpecs.resnet50_params_m_str` million parameters\u2014a 7.5$\\times$ efficiency improvement in the parameter-to-accuracy ratio that matters far more than raw parameter counts."
  issue: Using the chapter constants that render here (MobileNetV2 3.5M parameters, ResNet-50 25.6M parameters) and the stated accuracies (72 percent vs. 76 percent), the accuracy-per-parameter improvement is about 6.9x. The raw parameter-count ratio is about 7.3x. The 7.5x claim therefore appears stale or rounded from a different MobileNet parameter value.
  suggested_correction: 'Revise the claim to match the rendered constants, for example: "roughly 7x better accuracy per parameter" or "about 7.3x fewer parameters at comparable accuracy." If the intended comparison is accuracy-per-parameter, use about 6.9x.'
  why: This paragraph is the first compression-benchmark example; a stale ratio distracts from the valid lesson that size alone is not the right metric.
  confidence: high
- id: NC-BENCH-003
  severity: major
  line: 2083
  correction_type: training_inference_consistency
  current_text: Training large-scale machine learning models requires substantial computational resources, leading to considerable energy consumption and financial costs. Energy efficiency metrics quantify the power usage of training workloads, helping identify systems that optimize computational efficiency while minimizing energy waste. The increasing focus on sustainability has led to the inclusion of energy-based benchmarks, such as those in MLPerf Training, which measure power consumption per training run. To understand what these energy benchmarks actually measure, we must decompose *why INT8 saves energy* at the hardware level.
  issue: The paragraph is inside "Training metrics" and frames the topic as training-run power, but the following callout decomposes INT8 MobileNet inference energy. That is a useful cross-cutting example, but the transition does not tell learners that the chapter is briefly switching from training energy to inference quantization energy. This also makes the earlier quantization cross-reference to the training-metrics section feel misplaced.
  suggested_correction: 'Either move the INT8 MobileNet energy decomposition to the inference or power-measurement section, or explicitly mark it as a cross-cutting inference detour: "Although this subsection focuses on training-run energy, the same power accounting governs inference. The MobileNet example below shows why INT8 reduces inference energy..."'
  why: Training and inference benchmarking are a major organizing contrast in the chapter; an unmarked switch between them weakens that narrative scaffold.
  confidence: high
- id: NC-BENCH-004
  severity: major
  line: 4032
  correction_type: table_prose_consistency
  current_text: "| **Top-1 accuracy**     | `{python} MobileNetINT8Calc.mv2_acc_fp32_str` percent  | `{python} MobileNetINT8Calc.mv2_acc_int8_str` percent  | \u2713 (<`{python} MobileNetINT8Calc.mv2_acc_drop_str` percent drop) |"
  issue: The rendered drop is the measured FP32-to-INT8 accuracy drop (0.9 percentage points). The acceptance cell says the result is acceptable because it is less than that same value, which makes the acceptance rule stricter than the result being accepted. The later prose correctly says "Average-case accuracy looks acceptable (0.9 percent drop)," so the table should state an external threshold rather than reuse the measured drop as the threshold.
  suggested_correction: "Change the acceptance cell to a real threshold, for example: \"\u2713 (0.9 percentage-point drop; below 1 percentage-point threshold)\" or \"\u2713 (within deployment threshold).\" Use \"percentage-point\" if the table is comparing accuracy values."
  why: The callout is meant to model a validation protocol; the acceptance criterion needs to be clear and independent of the measured value.
  confidence: high
- id: NC-BENCH-005
  severity: major
  line: 4460
  correction_type: example_table_alignment
  current_text: 'For example, a team observing only 30 percent GPU utilization during training might initially suspect an inefficient model architecture (Algorithm row), but profiling reveals that image augmentation runs on CPU and cannot keep up with GPU consumption (Data row, I/O-Bound column: "Storage cannot feed GPU").'
  issue: The example diagnoses CPU-side image augmentation, which matches the table's Data/Compute-Bound cell ("Preprocessing too slow (augmentation, tokenization)"). The prose instead points to the Data/I/O-Bound cell ("Storage cannot feed GPU"), which describes a storage-throughput problem rather than CPU preprocessing.
  suggested_correction: 'Align the prose with the table: "Data row, Compute-Bound column: ''Preprocessing too slow (augmentation, tokenization).''" Alternatively, change the example to say profiling reveals that storage throughput cannot feed the GPU.'
  why: This matrix is introduced as a diagnostic tool; mismapping the worked example to the wrong cell makes the tool harder to apply.
  confidence: high
- id: NC-BENCH-006
  severity: major
  line: 4675
  correction_type: summary_consistency
  current_text: '* **Precision is an energy lever**: INT8 quantization provides 4$\times$ memory reduction but can deliver 10--20$\times$ energy reduction by shifting the balance from energy-intensive DRAM access to efficient integer arithmetic.'
  issue: The worked MobileNet energy table in the chapter shows roughly a 5x total FP32-to-INT8 energy reduction. The 10--20x range matches the compute/multiplier energy reduction, not the total energy reduction once DRAM access is included. As written, the summary overstates the total-energy lesson established by the chapter's own example.
  suggested_correction: 'Separate total energy from component energy, for example: "INT8 quantization provides 4x memory reduction and can reduce multiplier energy by roughly 10--20x; in the MobileNet example, the combined memory-plus-compute effect is about a 5x total inference-energy reduction."'
  why: The summary should reinforce the worked example rather than replacing it with a broader number that appears unsupported in context.
  confidence: high
