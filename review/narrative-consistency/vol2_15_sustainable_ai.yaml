findings:
  - id: "vol2_15_sustainable_ai_001"
    severity: "minor"
    line: 279
    correction_type: "cost_model_terminology"
    current_text: >-
      In a pure "Capex-only" model, engineers might choose the region with the
      lowest raw electricity rate.
    issue: >-
      The optimizer example is about electricity price plus a carbon tax, which
      is an operating-cost/TCO trade-off. Calling the baseline "Capex-only"
      mislabels the cost category and makes the economic lesson less precise.
    suggested_correction: >-
      Replace "Capex-only" with "electricity-only", "energy-cost-only", or
      "OpEx-only" depending on the intended contrast.
    why: >-
      This callout teaches how carbon pricing changes placement decisions. Using
      the wrong cost category can confuse learners about what the optimizer is
      actually minimizing.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_002"
    severity: "major"
    line: 514
    correction_type: "projection_alignment"
    current_text: >-
      **Data Center Energy Projections**: Global data center electricity
      consumption scenarios from 2010 to 2030. The three trajectories--best
      case, expected, and worst case--diverge significantly after 2018,
      highlighting the uncertainty and importance of efficiency improvements.
    issue: >-
      The figure caption and data present an expected 2030 value near 3,000 TWh
      and a worst case near 8,000 TWh, but the nearby prose at line 302 says the
      IEA projects about 945 TWh by 2030. Without explaining that these are
      older/high-growth scenarios or alternative assumptions, the chapter gives
      learners two incompatible 2030 baselines.
    suggested_correction: >-
      Either update the scenario figure to align with the IEA 945 TWh baseline,
      or explicitly label it as an older/high-growth sensitivity scenario and
      explain why it intentionally differs from the IEA projection.
    why: >-
      The chapter uses 2030 data-center demand as a scale anchor. Contradictory
      anchors make the sustainability-growth narrative feel unstable.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_003"
    severity: "major"
    line: 692
    correction_type: "units_and_range_alignment"
    current_text: >-
      Central Processing Units consume approximately 100 picojoules per
      multiply-accumulate (MAC) operation, Graphics Processing Units achieve 10
      pJ/MAC, while specialized Tensor Processing Units reach 1 pJ/MAC, and
      specialized accelerators approach 0.1 pJ/MAC.
    issue: >-
      The prose gives GPU and TPU values in pJ/MAC, but the adjacent footnote
      gives much lower ranges for GPUs and TPUs, and the later table mixes
      pJ/FLOP and pJ/MAC. These nearby references do not establish one coherent
      hardware-efficiency hierarchy.
    suggested_correction: >-
      Use one unit convention throughout this passage, footnote, and table
      (for example pJ/FLOP), and align the CPU/GPU/TPU/ASIC values to the same
      ranges. If MAC values are retained, state the FLOP-to-MAC conversion.
    why: >-
      The energy-per-operation hierarchy is reused to justify hardware
      selection, quantization, and roofline examples. Unit drift undermines that
      teaching point.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_004"
    severity: "major"
    line: 768
    correction_type: "embodied_carbon_baseline"
    current_text: >-
      **Embodied**: Assume manufacturing footprint is $\approx 1500 \text{kg }
      \text{CO}_2$ per chip.
    issue: >-
      This checkpoint assumes 1,500 kg CO2 per chip, while the chapter
      repeatedly uses 150--200 kg CO2 for an H100 GPU. The 10x difference
      changes the embodied-carbon result from about 8.5 tonnes to 85 tonnes for
      the one-month amortized example.
    suggested_correction: >-
      Use the same 150--200 kg/GPU baseline used elsewhere, or explicitly state
      that 1,500 kg represents a broader allocation such as full server,
      networking, and facility share rather than the chip/GPU alone.
    why: >-
      This is the first lifecycle-carbon checkpoint. A hidden baseline switch
      makes the operational-versus-embodied comparison hard to trust.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_005"
    severity: "major"
    line: 780
    correction_type: "lifecycle_phase_scope"
    current_text: >-
      The training phase (60--80 percent of emissions) represents the most
      carbon-intensive period involving parallel computation for mathematical
      optimization processes.
    issue: >-
      The fixed phase shares are not scoped, and they conflict with later
      sections that say inference often dominates deployed systems and that
      manufacturing can contribute 30--50 percent of lifetime emissions. As
      written, the percentages imply a universal lifecycle breakdown.
    suggested_correction: >-
      Scope these percentages to a specific workload class, such as
      "training-centric research workloads," or replace them with qualitative
      guidance: training can dominate one-off model development, inference can
      dominate high-volume services, and manufacturing becomes dominant on clean
      grids or low-utilization hardware.
    why: >-
      The chapter's central lifecycle lesson is that the dominant carbon source
      depends on deployment context. Universal percentages work against that
      lesson.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_006"
    severity: "major"
    line: 824
    correction_type: "payback_narrative"
    current_text: >-
      A single H100 embodies 150--200 kg CO~2~ from fabrication alone; at
      `{python} GpuEmissionsScenario.h100_tdp_w` W on the average U.S. grid,
      continuous operation matches embodied carbon in roughly 1-3 months.
    issue: >-
      With the chapter's own values, 700 W continuous operation on a 0.429
      kg/kWh grid emits about 216 kg CO2 per 30 days before PUE, so it matches a
      150--200 kg embodied footprint in less than one month, not 1--3 months.
    suggested_correction: >-
      Change the payback statement to "roughly three to four weeks on the
      average U.S. grid" or specify the lower utilization, lower-carbon grid, or
      amortization assumption that produces a 1--3 month range.
    why: >-
      The embodied-versus-operational payback narrative is a key scaling/ROI
      point. The current range contradicts the numbers immediately surrounding
      it.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_007"
    severity: "minor"
    line: 950
    correction_type: "scale_analogy_baseline"
    current_text: >-
      A data center with WUE of 1.8 L/kWh training a model requiring 10,000 MWh
      would consume 18 million liters of water, equivalent to the annual water
      usage of approximately 500 households.
    issue: >-
      The water calculation is clear, but the household analogy lacks a
      baseline and appears inconsistent with typical U.S. household water use.
      18 million liters corresponds to far fewer than 500 U.S. household-years.
    suggested_correction: >-
      State the household-water baseline explicitly, or revise the analogy to a
      U.S.-style baseline such as roughly 40--50 households per year if that is
      the intended comparison.
    why: >-
      The chapter repeatedly uses household analogies to build scale intuition.
      An unexplained baseline shift weakens that intuition.
    confidence: "medium"

  - id: "vol2_15_sustainable_ai_008"
    severity: "major"
    line: 1045
    correction_type: "model_definition_alignment"
    current_text: >-
      $$E_{\text{total}} = \max\left(E_{\text{compute}}, E_{\text{memory}}\right)
      = \max\left(\text{FLOPs} \times e_{\text{flop}}, \text{Bytes} \times
      e_{\text{byte}}\right)$$ {#eq-energy-roofline}
    issue: >-
      The text calls this "total energy," but total energy is the sum of compute
      and memory energy. The maximum identifies the dominant bottleneck or a
      roofline-style limiting term, not the actual total.
    suggested_correction: >-
      Define total energy as
      $E_{\text{compute}} + E_{\text{memory}}$, then separately define the
      dominant term as $\max(E_{\text{compute}}, E_{\text{memory}})$ for
      roofline reasoning.
    why: >-
      The following matrix-multiplication example asks learners to reason about
      compute-bound and memory-bound regimes. Mislabeling max as total energy
      makes the balanced case especially confusing.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_009"
    severity: "major"
    line: 1076
    correction_type: "worked_example_units"
    current_text: >-
      Compute energy: $2 \times 60^3 \times 10 \text{ pJ} = 4.32$ mJ
    issue: >-
      The pJ-to-mJ conversion is off by 1,000x for the small-matrix example.
      The same unit error recurs in the vector-addition example: 10,000 pJ is
      0.00001 mJ, not 0.01 mJ, and 1,200,000 pJ is 0.0012 mJ, not 1.2 mJ.
    suggested_correction: >-
      Use 4.32 microjoules (0.00432 mJ) for the N=60 compute and memory terms,
      and revise the vector-addition compute and memory values to 0.00001 mJ
      and 0.0012 mJ respectively.
    why: >-
      The ratios still illustrate the intended bottleneck, but the absolute
      units are part of the learner's energy intuition and should be consistent.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_010"
    severity: "minor"
    line: 1544
