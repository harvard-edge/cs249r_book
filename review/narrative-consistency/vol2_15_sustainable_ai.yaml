    confidence: "high"

  - id: "vol2_15_sustainable_ai_011"
    severity: "major"
    line: 1618
    correction_type: "regional_ratio_alignment"
    current_text: >-
      Training the same model in Quebec with hydro power vs. West Virginia with
      coal power differs by 10$\times$ in carbon emissions per kilowatt-hour.
    issue: >-
      Elsewhere the chapter states or computes much larger regional differences:
      20--50x in the guidelines, 40x for Quebec versus Poland, and 75x for
      Quebec versus West Virginia when using 0.01 kg/kWh versus 0.75 kg/kWh.
      The 10x value is inconsistent with the chapter's own examples.
    suggested_correction: >-
      Use a ratio consistent with the selected intensities, such as about
      35--75x for hydro versus coal-heavy grids, or change the named regions if
      the intended example is only 10x.
    why: >-
      Geographic optimization is presented as one of the highest-leverage
      sustainability tools. Inconsistent ratios weaken the learner's sense of
      its magnitude.
    confidence: "high"

