    current_text: >-
      Compare to single training run of 4.4 metric tons. After less than 2 days
      of deployment at this scale, cumulative inference emissions exceed
      training emissions.
    issue: >-
      The 4.4 tonne comparison refers to the preceding 7B/64-A100 worked
