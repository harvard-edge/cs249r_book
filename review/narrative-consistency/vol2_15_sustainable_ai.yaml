  - id: "vol2_15_sustainable_ai_016"
    severity: "minor"
    line: 2167
    correction_type: "table_prose_alignment"
    current_text: >-
      Consider @tbl-energy-harvesting: a keyword spotting model optimized to
      0.5 mW average power can operate indefinitely on approximately 5 square
      centimeters of indoor solar harvesting, eliminating battery replacement
      and associated e-waste for distributed sensor deployments.
    issue: >-
      The table gives indoor solar as 10--100 microwatts per cm^2, so 5 cm^2
      yields 50--500 microwatts. That only reaches 0.5 mW at the very top of
      the range and leaves no margin for storage, conversion loss, or dimmer
      indoor conditions.
    suggested_correction: >-
      Qualify the statement as applying to bright indoor conditions at the top
      of the listed range, or increase the area/range so the prose follows from
      the table under typical conditions.
    why: >-
      The edge-sustainability section relies on power-budget feasibility. The
      prose should not make an energy-harvesting deployment sound easier than
      the table supports.
    confidence: "high"

