  - id: "vol2_15_sustainable_ai_019"
    severity: "major"
    line: 2465
    correction_type: "theme_alignment"
    current_text: >-
      The fundamental insight is that **sustainable AI engineering is the same
      discipline as efficient AI engineering**.
    issue: >-
      This conclusion conflicts with the chapter's broader thesis that
      efficiency is necessary but not sufficient because carbon intensity,
      embodied carbon, water/material constraints, offsets, and Jevons Paradox
      all require additional governance and lifecycle reasoning.
    suggested_correction: >-
      Reframe the insight as "sustainable AI engineering overlaps strongly with
      efficient AI engineering, but adds lifecycle accounting, carbon-aware
      placement, absolute budgets, and governance against rebound effects."
    why: >-
      The mitigation section should synthesize the chapter's layered argument,
      not collapse it back to per-operation efficiency immediately after the
      Jevons discussion.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_020"
    severity: "major"
    line: 2634
    correction_type: "pue_savings_scale"
    current_text: >-
      Each 0.1 PUE improvement at hyperscale saves millions in annual
      electricity costs and hundreds of tons of CO~2~.
    issue: >-
      For the same footnote's 100 MW data-center scale, a 0.1 PUE improvement
      saves about 10 MW continuously, or 87,600 MWh per year. At the chapter's
      U.S. grid intensity of 0.429 kg/kWh, that is roughly 37,600 tonnes of CO2
      per year, not hundreds.
    suggested_correction: >-
      Change "hundreds of tons" to "tens of thousands of tonnes on an average
      U.S. grid" or specify a much lower-carbon grid assumption if the smaller
      number is intended.
    why: >-
      PUE optimization is part of the ROI/payback narrative. Understating the
      carbon savings by orders of magnitude weakens the scale lesson.
    confidence: "high"

  - id: "vol2_15_sustainable_ai_021"
    severity: "minor"
    line: 2653
    correction_type: "reduction_factor_alignment"
    current_text: >-
      Google's carbon-intelligent computing platform demonstrated this approach
      at scale, achieving a 40 percent reduction in carbon footprint by shifting
      workloads between data centers globally. The impact of carbon-aware
      scheduling, shown as step 5 in @fig-carbon-scheduling, contributes a
      1.3$\times$ reduction in the intervention cascade by balancing urgency
      against grid carbon intensity.
    issue: >-
      The paragraph moves directly from Google's 40 percent reduction to a
      1.3x cascade reduction. A 40 percent reduction corresponds to about 1.67x
      less carbon, while 1.3x corresponds to about a 23 percent reduction, so
      the relationship between the case study and the cascade value is unclear.
    suggested_correction: >-
      Explicitly separate the two numbers: Google's global case study achieved
      40 percent under its workload assumptions, while the intervention cascade
      uses a conservative 1.3x average effect. Alternatively, align the cascade
      factor with the case-study reduction.
    why: >-
      The intervention cascade is a synthesis device. If its factor appears to
      contradict the immediately preceding example, learners may not know which
      reduction to use.
    confidence: "high"
notes: >-
  Read the assigned chapter from start through conclusion in order. The chapter's
  main arc is coherent, but several numeric scale anchors need alignment after
  the math audit: data-center demand projections, hardware energy units,
  embodied-carbon baselines and payback, lifecycle phase shares, inference
  crossover scope, regional carbon ratios, sector-scale claims, and a few table
  or figure captions whose summaries do not match their nearby evidence.
