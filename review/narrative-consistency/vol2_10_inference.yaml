findings:
  - id: "vol2_10_inference_001"
    severity: "major"
    line: 147
    correction_type: "model_memory_consistency"
    current_text: >-
      A 70-billion parameter model requires approximately 140 GB of memory and
      achieves roughly 30 tokens per second on a single GPU due to memory
      bandwidth limitations. Sharding the model across multiple GPUs enables
      parallel computation that reduces time-to-first-token below acceptable
      thresholds.
    issue: >-
      The sentence says the FP16 70B model both requires about 140 GB and runs
      on a single GPU, but the surrounding discussion anchors the single-device
      limit to 80 GB H100/A100-class GPUs and later says the same 70B FP16
      model is physically impossible to load onto one 80 GB GPU. This makes the
      motivation for mandatory sharding look self-contradictory.
    suggested_correction: >-
      Split the points: "A 70B model requires about 140 GB in FP16, exceeding a
      single 80 GB GPU. Even when quantization or larger-memory hardware makes a
      single-replica configuration possible, decode throughput is often limited
      by memory bandwidth; sharding can reduce TTFT by parallelizing the
      computation."
    why: >-
      This paragraph establishes when distribution is required. If the example
      model appears to run on hardware it cannot fit, the learner loses the
      memory-capacity intuition that the section is trying to build.
    confidence: "high"

  - id: "vol2_10_inference_002"
    severity: "minor"
    line: 247
    correction_type: "economic_example_alignment"
    current_text: >-
      Serving costs 9$\times$ more than training in just the first year. A 10
      percent optimization in inference latency saves **\$1.8M**—paying for the
      entire training run almost immediately.
    issue: >-
      In the worked example, the training run costs $2M and the cited 10 percent
      saving is $1.8M. That nearly offsets the training cost but does not pay
      for the entire run. The line also equates latency optimization directly
      with serving-cost reduction without stating the proportionality
      assumption.
    suggested_correction: >-
      Change the conclusion to "A 10 percent serving-cost or latency-linked
      efficiency improvement saves about $1.8M in the first year, nearly paying
      for the original training run."
    why: >-
      The example is the chapter's first cost multiplier. A small arithmetic
      overclaim weakens an otherwise clear economic lesson.
    confidence: "high"

  - id: "vol2_10_inference_003"
    severity: "major"
    line: 628
    correction_type: "figure_prose_alignment"
    current_text: >-
      **The Serving Hierarchy**: A three-tier serving stack with cumulative
      latency budget from top to bottom. Tier 1 (CDN/Edge Cache) handles
      geographic distribution and cached static responses (SLA <10 ms). Tier 2
      (Gateway/Router) handles request routing, rate limiting, and
      authentication (SLA <50 ms). Tier 3 (Model Serving Cluster) runs GPU
      workers with autoscaling and continuous batching (SLA <2 s).
    issue: >-
      The prose immediately before and after the figure defines a four-level
      serving hierarchy: request, replica, service, and platform. The referenced
      figure instead describes a three-tier deployment stack: CDN, gateway, and
      model serving cluster. The table at line 634 returns to the four-level
      hierarchy, so the visual does not support the concept it is introduced to
      teach.
    suggested_correction: >-
      Either replace/relabel the figure so it depicts the four hierarchy levels
      used in the prose and table, or introduce it separately as a deployment
      stack and avoid calling it "the serving hierarchy."
    why: >-
      The serving hierarchy is the organizing framework for the rest of the
      chapter. A mismatched figure makes the framework harder to retain and can
      cause learners to confuse optimization levels with network tiers.
    confidence: "high"

  - id: "vol2_10_inference_004"
    severity: "major"
    line: 841
    correction_type: "worked_example_table_alignment"
    current_text: >-
      *Result*: Vision models saturate at very small batches because the compute
      per sample is high.
    issue: >-
      The toy batching example gives a vision knee at B=2 and says vision
      models saturate at very small batches. Nearby prose says ResNet-50 can
      batch 32 or 64 images with near-linear throughput scaling, and
      @tbl-batching-by-model lists typical vision batch sizes of 32-256 with
      near-linear scaling to 64+. The worked example and the summary table point
      in opposite directions.
    suggested_correction: >-
      Revise the toy constants or wording so the example supports the later
      table. For example, make the vision knee a moderate batch size, or say
      "this simplified latency model reaches its first overhead-amortization
      knee at B=2, but production CNNs often continue gaining throughput to
      batches of 32-64 before hardware saturation."
    why: >-
      This is the learner's first quantitative batching curve. If it teaches
      that vision saturates at B=2, the later recommendation to use large
      static/dynamic batches for vision feels unsupported.
    confidence: "high"

  - id: "vol2_10_inference_005"
    severity: "minor"
    line: 853
    correction_type: "terminology_consistency"
    current_text: >-
      Beyond this, queues grow rapidly as utilization approaches 1, and tail
      latency $(L_{\text{lat}})$ collapses.
    issue: >-
      Queueing theory predicts tail latency grows or explodes as utilization
      approaches 1. What collapses is the latency SLO or user experience, not
      the latency value itself.
    suggested_correction: >-
      Change the end of the sentence to "tail latency explodes" or "the latency
      SLO collapses."
    why: >-
      The footnote is meant to support Little's Law and queueing intuition.
      Reversing the direction of tail latency growth makes the concept harder
      to internalize.
    confidence: "high"

  - id: "vol2_10_inference_006"
    severity: "major"
    line: 1615
    correction_type: "formula_table_alignment"
    current_text: >-
      $$\text{Improvement} \approx \frac{L_{\text{max}}}{\bar{L}} =
      \frac{\mu + k\sigma}{\mu} = 1 + k \cdot \text{CV}$$
    issue: >-
      The formula predicts much larger speedups than the table that immediately
      follows. For example, CV=1.0 and k=2.5 imply a 3.5x improvement, but the
      table lists 2.0x; CV=2.0 and k=2.5 imply 6.0x, but the table lists 3.5x.
      The table's waste and speedup columns are internally consistent, so the
      mismatch appears to be between the CV/k formula and the illustrative
      values.
    suggested_correction: >-
      Either update the table to match the stated formula, or change the formula
      and explanation to describe an effective speedup bounded by scheduler,
      memory, and refill overheads. If the table values are the intended
      teaching anchor, remove or redefine the k column so it does not imply the
      larger speedups.
    why: >-
      This section formalizes when continuous batching helps most. When the
      equation and table disagree, the learner cannot tell which relationship
      should guide capacity estimates.
    confidence: "high"

  - id: "vol2_10_inference_007"
    severity: "major"
    line: 1735
    correction_type: "example_concept_alignment"
    current_text: >-
      With continuous batching enabled, why does this occur? Further
      investigation reveals the scheduler uses FIFO ordering without preemption,
      meaning a burst of 32 simultaneous arrivals all enter the same batch and
      none can exit early because they all started at the same iteration.
    issue: >-
      The diagnosis contradicts the chapter's definition of continuous
      batching, which allows completed sequences to exit at every decode
      iteration. FIFO without preemption can cause admission or priority
      problems, but it should not mean short requests "cannot exit early" merely
      because they started in the same iteration.
    suggested_correction: >-
      If the intended failure mode is head-of-line blocking, describe the system
      as using static/dynamic request-level batching rather than continuous
      batching. If continuous batching is intended, change the diagnosis to a
      compatible failure mode such as FIFO admission delaying short requests
      behind long prefill jobs, missing preemption under KV pressure, or
      insufficient chunked prefill.
    why: >-
      The case study is meant to teach how to debug high P99 latency. As written
      it undermines the central property of continuous batching established in
      the preceding section.
    confidence: "high"

  - id: "vol2_10_inference_008"
    severity: "minor"
    line: 1985
    correction_type: "decision_framework_alignment"
    current_text: >-
      Is the model autoregressive (LLM, speech)?
      ├─ Yes → Continuous batching with prefill chunking
      └─ No → Does the model have embedding lookups dominating latency?
    issue: >-
      The decision tree routes both LLMs and speech to continuous batching with
      prefill chunking, but the earlier streaming section says real-time speech
      recognition cannot tolerate batching delay and should process frames
      incrementally. Prefill chunking is also an LLM-specific prompt/decode
      technique, not the natural default for streaming speech.
    suggested_correction: >-
      Split the branch: "Is it autoregressive text generation? -> continuous
      batching with chunked prefill" and "Is it real-time streaming
      speech/video/robotics? -> streaming pipeline with minimal or no batching."
    why: >-
      The decision framework should consolidate the section's distinctions.
      Combining speech with LLM prefill/decode mechanics blurs a boundary the
      chapter just taught.
    confidence: "high"

  - id: "vol2_10_inference_009"
    severity: "major"
    line: 2173
    correction_type: "example_state_alignment"
    current_text: >-
      Time 1: Seq A completes (2 tokens), Seq B continues
              [ ][ ][A][A][B][B][B][ ]  <- A only used 2 slots
    issue: >-
      If Seq A completes, its allocation should be freed; if A still owns two
      slots, it has not completed. The diagram also shows only three blank
      slots while the result says there are four free slots. The example mixes
      internal fragmentation, completion, and external fragmentation in a way
      that does not add up.
    suggested_correction: >-
      Rework the example into two clear stages. For internal fragmentation, say
      Seq A is active but has used only 2 of 4 reserved slots. For external
      fragmentation, show completed sequences freeing noncontiguous blocks whose
      total free capacity is sufficient but whose largest contiguous block is
      too small for the new sequence.
    why: >-
      Fragmentation is the motivation for PagedAttention. A memory-state diagram
      with inconsistent ownership and free-slot counts makes the core problem
      harder to understand.
    confidence: "high"

  - id: "vol2_10_inference_010"
    severity: "major"
    line: 2796
    correction_type: "numeric_consistency"
    current_text: >-
      For Llama-70B with 4K context, KV cache is ~80 MB per sequence. At 100
      Gbps, transfer takes 6.4 ms vs. ~500 ms for prefill. Transfer is clearly
      better.
    issue: >-
      The chapter's own Llama-70B GQA calculation gives about 0.32768 GB per 1K
      tokens, so a 4K context is roughly 1.3 GB total KV cache per sequence, not
      80 MB. Even with 8-way tensor parallel sharding, that is about 168 MB per
      device. At 100 Gbps, transferring the full cache is about 100 ms, not 6.4
      ms; transferring one shard is closer to 13 ms.
    suggested_correction: >-
      Align the migration example with the earlier KV-cache math, e.g. "For
      Llama-70B GQA with 4K context, KV cache is about 1.3 GB total, or about
      168 MB per device under 8-way TP. At 100 Gbps, a per-shard transfer is on
      the order of 13 ms, still often preferable to a 500 ms prefill rebuild."
    why: >-
      This example teaches the transfer-vs-rebuild decision. A stale cache-size
      number changes the latency comparison by more than an order of magnitude.
    confidence: "high"

