  - id: "vol2_13_security_privacy_007"
    severity: "major"
    line: 3110
    correction_type: "numeric_narrative_alignment"
    current_text: >-
      To reach the target $\epsilon = 3.0$, we must increase $\sigma$
      substantially (more noise tightens privacy at the cost of roughly
      5 percent accuracy drop), train for fewer epochs (e.g., $T = 25$) at the
      risk of underfitting, or reduce the sampling rate by increasing batch size
      to $B = 8000$ at the cost of higher memory requirements.
    issue: >-
      The example defines the sampling rate as $q = B/N$ at line 3093, so
      increasing the batch size from 4000 to 8000 increases the sampling rate
      from 0.08 to 0.16 rather than reducing it. That moves in the opposite
      direction of the stated privacy goal under the displayed RDP approximation.
    suggested_correction: >-
      Change the sampling-rate option to decreasing batch size, or remove that
      option and keep the two valid levers: increase the noise multiplier or
      train for fewer epochs. If larger batches are desired for utility reasons,
      describe that as a separate accuracy/optimization trade-off, not as a way
      to reduce $q$.
    why: >-
      This worked example is intended to teach privacy accounting. A sign error
      in the relationship between batch size and sampling rate undermines the
      numerical intuition immediately after the calculation.
    confidence: "high"

