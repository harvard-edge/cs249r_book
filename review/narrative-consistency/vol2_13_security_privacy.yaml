findings:
  - id: "vol2_13_security_privacy_001"
    severity: "major"
    line: 1079
    correction_type: "taxonomy_figure_alignment"
    current_text: >-
      In exact extraction, the attacker submits many systematic queries
      covering the input space, collects the resulting (input, output) pairs,
      and trains a clone on those pairs; with enough queries, the clone can
      match the original's decision boundaries and confidence scores closely.
    issue: >-
      The paragraph and figure frame black-box query cloning as "exact
      extraction," while the following subsection defines exact model theft as
      extraction of internal parameters, hyperparameters, or architecture.
      The rendered figure also implies the clone can approximate the original
      weights from API queries. This blurs the distinction between functional
      imitation and exact property theft.
    suggested_correction: >-
      Split the taxonomy into "exact property theft" for attacks that recover
      weights, architecture, or artifacts, and "high-fidelity functional
      extraction" for black-box API cloning. If the figure is meant to focus on
      API attacks, rename the left branch to "high-fidelity extraction" and
      avoid suggesting that API queries recover original weights.
    why: >-
      The model-theft taxonomy is a teaching anchor for the rest of the
      section. If "exact" and "approximate" are used inconsistently, learners
      may misunderstand what black-box API access can and cannot reveal.
    confidence: "high"

  - id: "vol2_13_security_privacy_002"
    severity: "major"
    line: 1174
    correction_type: "table_caption_numeric_alignment"
    current_text: >-
      Estimated costs for weight extraction range from $1 to $12, demonstrating
      the economic feasibility of model stealing attacks despite API rate limits
      and associated expenses.
    issue: >-
      The table includes GPT-3.5 rows with estimated costs of $200/$2,000 and
      $800/$8,000, while the caption says estimated costs range from $1 to $12.
      The caption also says "weight extraction" even though several rows list
      "Not implemented" for RMS weight-matrix extraction.
    suggested_correction: >-
      State that $1-$12 applies only to the ada/babbage weight-matrix
      extraction rows, and separately describe the GPT-3.5 rows as estimated
      dimension-extraction or recovery-cost estimates with no implemented
      weight extraction in the table.
    why: >-
      The caption is the learner's summary of the table. As written, it
      contradicts the larger dollar values and overstates what was extracted
      for the GPT-3.5 rows.
    confidence: "high"

  - id: "vol2_13_security_privacy_003"
    severity: "major"
    line: 1462
    correction_type: "example_attack_type_alignment"
    current_text: >-
      Although evasion (rather than training-set poisoning), the failure mode is
      closely related: both classes of attack exploit a model whose decision
      surface is fragile to small adversarial perturbations.
    issue: >-
      The main prose correctly identifies the Perspective example as inference
      time evasion, but the adjacent footnote is titled "Perspective Poisoning
      Outcome" and says "After retraining on poisoned data." That changes the
      attack class and conflicts with the example being taught.
    suggested_correction: >-
      Rename and revise the footnote to describe the evasion outcome: modified
      toxic phrases received low toxicity scores without requiring retraining.
      If the intended lesson is poisoning through feedback loops, add a
      separate poisoning example with explicit retraining evidence.
    why: >-
      This section distinguishes poisoning from adversarial/evasion attacks.
      A contradictory footnote weakens that distinction at exactly the point
      where learners are being asked to classify attack types.
    confidence: "high"

