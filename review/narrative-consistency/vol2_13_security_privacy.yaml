  - id: "vol2_13_security_privacy_006"
    severity: "major"
    line: 2781
    correction_type: "table_structure"
    current_text: >-
      | **Deployment Context**      | **Primary Threats**                               | **Recommended Defenses**                                                                                                                                                                           | **Key Trade-offs**                                                                                                                   |
    issue: >-
      The defense-selection framework is described as mapping seven deployment
