    suggested_correction: >-
      Align the summary with the earlier framework, for example: "Data poisoning
      is a high-impact and often high-likelihood threat in pipelines that ingest
      untrusted or federated data..."
    why: >-
      The takeaways should reinforce the chapter's prioritization model. The
      conflicting likelihood label leaves learners unsure how urgently to rank
      poisoning defenses.
    confidence: "high"
