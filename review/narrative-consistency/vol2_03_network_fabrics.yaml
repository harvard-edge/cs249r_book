  correction_type: figure_prose_numeric_alignment
  current_text: To see why this ratio matters so viscerally, consider what happens during a single training step. @fig-bandwidth-cliff-gantt contrasts the timeline for an 8-GPU job communicating within a node vs. a 64-GPU job communicating across nodes. The figure caption calls these timelines "for the same model" and shows AllReduce growing from 1 ms to 30 ms.
  issue: The timeline is presented as the same model introduced in the running example, but the surrounding prose says the 175B model moves 350 GB of gradients and that NDR InfiniBand can make the AllReduce take seconds. A 1 ms or 30 ms AllReduce is not consistent with that stated workload, so the visual undercuts the bandwidth-cliff lesson instead of reinforcing it.
  suggested_correction: Either label the Gantt chart as an illustrative, normalized smaller gradient shard, or recompute the AllReduce durations and utilization values for the stated 175B / 350 GB workload. Also align the caption and alt text with the figure values.
  why: Learners need to know whether the figure is a toy timeline or the running 175B example; otherwise the chapter appears to contradict its own central scale argument.
  confidence: high
- id: NF-NC-002
  severity: major
  line: 581
  correction_type: problem_statement_alignment
  current_text: 'Problem: A fabric designer is comparing InfiniBand NDR (1.5 us, 50 GB/s) against a slower Ethernet baseline (5.0 us, 12.5 GB/s). At what message size does the faster link''s bandwidth advantage finally outweigh its higher cost?'
  issue: The problem asks for a break-even message size involving "higher cost," but the worked math contains no cost term and InfiniBand has both lower latency and higher bandwidth than the Ethernet baseline. The subsequent solution evaluates 4 KB and 100 MB messages rather than answering the stated break-even question.
  suggested_correction: Reframe the problem around the alpha-beta crossover within each fabric and ask which regime the 4 KB and 100 MB messages occupy, or add an explicit monetary/power cost model and solve that break-even question.
  why: The notebook should ask the question it actually teaches; as written, the setup implies a trade-off that the math does not model.
  confidence: high
- id: NF-NC-003
  severity: major
  line: 784
  correction_type: prose_code_numeric_alignment
  current_text: Assume each GPU processes a microbatch requiring 2 x 10^18 FLOPs (a rough estimate for a forward plus backward pass on a large batch). At H100 throughput with 50 percent utilization, the notebook displays the compute time from AllReduceBottleneck.t_comp_display_math.
  issue: The prose says the microbatch requires 2 x 10^18 FLOPs, but the code uses flops_per_sample_base = 5e13 to produce an approximately 101 ms compute time. With the stated 2 x 10^18 FLOPs, the compute time would be thousands of seconds, not the displayed value.
  suggested_correction: Change the prose workload to match the code's 5e13 FLOPs assumption, or update the code and all displayed communication fractions if the intended workload is truly 2 x 10^18 FLOPs.
  why: This notebook is meant to teach when AllReduce becomes the bottleneck; a five-order-of-magnitude mismatch in the compute term invalidates the learner's interpretation of the comparison.
  confidence: high
- id: NF-NC-004
  severity: major
  line: 1159
  correction_type: unit_scope_consistency
  current_text: A cluster has 1,024 accelerators across 128 nodes. Each node has 400 Gb/s (50 GB/s) injection bandwidth. Scenario A bisection bandwidth is 128 x 50 = 6,400 GB/s. Earlier, the oversubscription notebook computes a 1,024-GPU cluster as 1,024 x 50 = 51,200 GB/s.
  issue: The two bisection examples teach the same oversubscription concept but switch between per-GPU and per-node injection bandwidth without explaining the change, creating an 8x difference for a 1,024-accelerator cluster. The problem statements also describe a "100 GB AllReduce" while the math multiplies 100 GB by the number of GPUs or nodes, leaving unclear whether 100 GB is per GPU, per node, or total job data.
  suggested_correction: Pick one accounting convention and use it consistently. For per-GPU injection, use 1,024 x 50 GB/s and state "100 GB per GPU." For per-node injection, explain that each 8-GPU node shares one 400 Gb/s uplink and adjust the earlier bisection example to the same convention.
  why: Bisection bandwidth is a core teaching point in the chapter; inconsistent units make the slowdown result look arbitrary rather than derived.
  confidence: high
- id: NF-NC-005
  severity: major
  line: 999
  correction_type: conceptual_alignment
  current_text: In distributed training, data parallelism creates a deterministic and highly stratified communication pattern that standard topologies fail to exploit. Because large models partition individual matrix multiplications across GPUs, GPU 0 on one node must frequently exchange gradients with GPU 0 on other nodes, but rarely with GPU 1.
  issue: The explanation attributes matrix-multiplication partitioning to data parallelism, but that is tensor parallelism. The same-rank rail traffic arises when tensor-parallel ranks are replicated across data-parallel groups, not from data parallelism alone.
  suggested_correction: 'Recast the paragraph around 3D parallelism: tensor parallelism assigns stable intra-node ranks, and data-parallel replicas of each rank then synchronize with corresponding ranks on other nodes. Rail optimization accelerates that same-rank data-parallel path.'
  why: This section is explaining why rail wiring matches ML communication structure; mixing up DP and TP obscures the reason the topology works.
  confidence: high
- id: NF-NC-006
  severity: major
  line: 1271
  correction_type: numeric_claim_calibration
  current_text: A simple probability calculation shows that such incidents are not rare edge cases but daily operational realities at scale. The notebook then computes a 12 percent daily risk of a PFC storm.
  issue: A roughly 12 percent daily probability is a serious recurring operational risk, but it is not a daily event for a single cluster; the expected interval is about eight to nine days. The phrase "daily operational realities" overstates the quantitative result.
  suggested_correction: Change the claim to "regular operational realities," "weekly-scale operational risks," or "recurring operational realities at scale" while retaining the 12 percent daily probability.
  why: The probability calculation is persuasive on its own; overstating it makes the narrative feel less trustworthy.
  confidence: medium
- id: NF-NC-007
  severity: major
  line: 1325
  correction_type: numeric_consistency
  current_text: With 256 senders each at 50 GB/s targeting one switch port, the instantaneous incast exceeds 12.8 TB/s. A 32 MB switch buffer absorbs approximately 640 us at 400 Gb/s before overflowing.
  issue: The 640 us value is the time to drain 32 MB at a single 400 Gb/s egress rate. Under the stated 256-to-1 incast, the buffer fills at roughly 12.75 TB/s net after egress, so it overflows in about 2.5 us, not 640 us.
  suggested_correction: 'Separate the two facts: "A 32 MB buffer holds 640 us of one 400 Gb/s egress stream, but under a 256-to-1 incast it fills in roughly 2.5 us."'
  why: The section is teaching why incast is sudden and dangerous; the current buffer timing makes the overload appear much less abrupt than the example actually implies.
  confidence: high
- id: NF-NC-008
  severity: major
  line: 1462
  correction_type: numeric_consistency
  current_text: A degraded transceiver causing a 10 percent reduction in effective bandwidth might slow each training iteration by only 2-3 percent. Over a 30-day training run on 1,000 GPUs, this invisible drag accumulates to over 72,000 wasted GPU-hours, burning nearly $200,000 in cloud costs.
  issue: The waste estimate uses 10 percent of a 1,000-GPU, 30-day run (72,000 GPU-hours), but the prose says the iteration slowdown is only 2-3 percent. A 2-3 percent slowdown would waste about 14,400 to 21,600 GPU-hours, not 72,000.
  suggested_correction: Either change the waste estimate to roughly 14,000-22,000 GPU-hours (and adjust the cost), or change the slowdown claim to 10 percent if the 72,000 GPU-hour estimate is the intended lesson.
  why: Monitoring examples rely on cost arithmetic to motivate observability; the stated slowdown and waste should agree.
  confidence: high
