- id: NC-CONCLUSION-001
  severity: minor
  line: 553
  correction_type: invariant_scope_alignment
  current_text: 'The critical insight the figure reveals is the Deploy-to-Foundations feedback arrow. Invariants nine through thirteen, the deployment invariants that detect drift, skew, verification failures, and bias amplification, are the signals that force the system to evolve. When drift erodes accuracy or skew corrupts predictions, the system must return to its foundations: new data, retrained models, fresh optimization passes through the entire stack. The cycle operates within a single node today, but the same physics governs fleet-scale systems, a transition we return to at the chapter''s close.'
  issue: The preceding table defines invariants 9-13 as verification gap, statistical drift, training-serving skew, latency budget, and bias feedback. This paragraph characterizes the whole group as detection signals for drift, skew, verification failures, and bias amplification, but the latency budget is a serving constraint rather than a detection signal, and it disappears from the Deploy-to-Foundations explanation.
  suggested_correction: 'Recast the sentence so all five deployment invariants remain visible, for example: "The deployment invariants expose the signals that force system evolution: verification failures, drift, skew, tail-latency violations, and bias amplification. When any of these appears, the system must return to its foundations..."'
  why: The figure is presented as the integrated framework for the thirteen invariants. Aligning the prose with the listed deployment invariants keeps the learner's mental model consistent.
  confidence: high
- id: NC-CONCLUSION-002
  severity: minor
  line: 585
  correction_type: numeric_framing
  current_text: The memory time $T_{\text{mem}}$ is `{python} ConclusionRoofline.ratio_str`$\times$ larger than compute time $T_{\text{comp}}$. The system is heavily memory-bound (arithmetic intensity $\approx$ 1). To honor the silicon contract, we must either increase arithmetic intensity (via batching users to reuse $D_{\text{vol}}$) or reduce data volume (via quantization to INT4). A systems engineer who optimizes compute kernels $(T_{\text{comp}})$ without addressing memory $(T_{\text{mem}})$ wastes 100 percent of their effort.
  issue: The setup code renders approximately 41.8 ms of memory time and 0.14 ms of compute time, so optimizing compute alone can affect only about 0.34 percent of the single-token latency. The teaching point is correct, but "wastes 100 percent" is too absolute for the additive iron-law calculation just shown.
  suggested_correction: 'Replace the final sentence with a quantitatively aligned version, such as: "A systems engineer who optimizes compute kernels $(T_{\text{comp}})$ without addressing memory $(T_{\text{mem}})$ can improve only the 0.14 ms compute term while leaving the 41.8 ms memory term untouched."'
  why: The callout is meant to teach bottleneck diagnosis from the iron law. Keeping the prose tied to the computed terms reinforces the lesson without introducing a literal 100 percent claim that the calculation does not support.
  confidence: high
- id: NC-CONCLUSION-003
  severity: major
  line: 655
  correction_type: roadmap_consistency
  current_text: 'The invariants formalized in this volume are forward-looking instruments, not retrospective summaries. Five frontiers will test them in new ways: deploying ML across increasingly diverse contexts, building robust systems under adversarial conditions, applying ML for societal benefit, engineering the path toward artificial general intelligence, and confronting the engineering responsibility that those paths impose.'
  issue: 'The section roadmap promises five frontiers and includes "confronting the engineering responsibility," but the Future Directions section itself has four subsections: deployment contexts, robust AI, societal benefit, and the path to AGI. The responsibility discussion appears later under Journey Forward, while the Journey Forward recap at line 722 lists "compound AI" as a frontier explored in the previous section instead of responsibility. The roadmap and recap therefore do not name the same set of frontiers.'
  suggested_correction: 'Make the section map consistent. One option is: "Four frontiers will test them in new ways: deploying ML across diverse contexts, building robust systems, applying ML for societal benefit, and engineering the path toward AGI through compound AI systems." Then let Journey Forward introduce responsibility as the closing obligation. Alternatively, add a dedicated Future Directions subsection for engineering responsibility and update the recap to match.'
  why: This chapter is explicitly synthesizing a long arc. A mismatched roadmap makes it harder for learners to track how the future-facing sections fit together.
  confidence: high
- id: NC-CONCLUSION-004
  severity: major
  line: 661
  correction_type: lighthouse_model_alignment
  current_text: Cloud deployment prioritizes throughput and scalability, the regime where ResNet-50 and DLRM operate, achieving high GPU utilization through kernel fusion, mixed precision training, and gradient compression. @sec-model-compression and @sec-model-training explored these techniques, demonstrating how they combine to balance performance optimization with cost efficiency at scale.
  issue: 'Earlier in this chapter, DLRM is framed as the capacity-bound Lighthouse: terabyte-scale embedding tables, sparse operations, and data gravity dominate its system design. This sentence groups DLRM with ResNet-50 under high-GPU-utilization cloud throughput and names dense-training optimizations, which blurs the key contrast the Lighthouse summary just established.'
  suggested_correction: 'Split the cloud examples by bottleneck, for example: "Cloud deployment prioritizes throughput and scalability. Dense workloads such as ResNet-50 chase GPU utilization through kernel fusion, mixed precision, and gradient compression, while DLRM-style recommendation systems must also manage embedding-table capacity, placement, and sparse access patterns."'
  why: The conclusion relies on Lighthouse models to teach that different workloads expose different bottlenecks. Preserving DLRM's memory-capacity story keeps the synthesis aligned with the earlier examples.
  confidence: high
