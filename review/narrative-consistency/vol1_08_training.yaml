- id: NC-TRAIN-009
  severity: major
  line: 4758
  correction_type: conceptual_consistency
  current_text: The technique sums gradients across $k$ micro-batches before a single optimizer step, trading 10--15 percent compute overhead (from repeated forward/backward passes) for $k\times$ memory savings.
  issue: The main text at lines 4652--4656 correctly says gradient accumulation leaves total FLOPs unchanged for the same effective batch; the overhead comes from lower parallelism, synchronization, and buffer management, not extra model compute. The later GPT-2 callout similarly calls this "4x forward passes per update," which can sound like extra computation rather than serializing the same effective batch.
  suggested_correction: Rephrase as "trading 10--15 percent wall-clock overhead from microbatch serialization, synchronization, and gradient-buffer management for k-times lower activation memory."
  why: This preserves the memory-time trade-off without contradicting the earlier equivalence argument.
  confidence: high
