  current_text: '**System implication**: A V100 GPU (`{python} TrainingHardware.v100_tflops_fp16_str` TFLOPS peak FP16 with Tensor Cores, `{python} TrainingHardware.v100_tflops_fp32_str` TFLOPS FP32 without) would require `{python} GPT2Compute.v100_time_str` seconds just for the attention computations per step at 100 percent utilization (theoretical peak; practical throughput would be lower).'
  issue: The preceding bullets say the total includes one transformer layer's Attention + FFN work, then all 48 GPT-2 layers and forward+backward training cost. Calling the resulting per-step estimate "just for the attention computations" narrows the scope incorrectly.
