chapter: vol2_12_ops_scale
source_qmd: book/quarto/contents/vol2/ops_scale/ops_scale.qmd
status: complete_with_findings
findings:
- id: vol2_12_ops_scale_001
  severity: major
  line: 161
  correction_type: numeric_narrative_alignment
  current_text: Breaking down resource silos effectively buys 57 percent additional GPU capacity without provisioning new hardware.
  issue: The worked example correctly computes a 57 percent hardware reduction for a fixed workload when utilization improves from 30 percent to 70 percent. But the systems insight restates that value as "57 percent additional GPU capacity." At fixed hardware, useful work increases from 30 to 70 active GPU-equivalents, which is 2.33x total work or about 133 percent additional active capacity, not 57 percent.
  suggested_correction: Rephrase the sentence to distinguish the two equivalent views, e.g. "Breaking down resource silos reduces required hardware by 57 percent for the same workload; with the same hardware budget, it raises useful work from 30 to 70 active GPU-equivalents."
  why: The callout is meant to build intuition for statistical multiplexing. Mixing cost reduction with added capacity makes the central economic takeaway numerically ambiguous.
  confidence: high
- id: vol2_12_ops_scale_002
  severity: major
  line: 911
  correction_type: numeric_consistency
  current_text: For an organization with 100 GPUs at $2 per GPU-hour, moving from 35 percent to 75 percent effective utilization saves approximately $700,000 annually.
  issue: Under the chapter's own utilization-saving model, maintaining the same 35 active GPU-equivalents at 75 percent utilization requires about 46.7 GPUs, saving 53.3 GPUs. At $2/GPU-hour, that is approximately $934,000 per year, not $700,000. The earlier sharing-dividend example uses the same logic and produces about $1M/year for a 30 percent to 70 percent shift.
  suggested_correction: Change the annual savings to about $930K, or state the additional assumptions that make $700K the right number, such as a lower hourly rate, lower reducible baseline spend, or a smaller effective utilization gain.
  why: This paragraph reinforces the quantitative platform-team justification. A stale savings figure makes the later ROI discussion look less grounded in the chapter's own math.
  confidence: high
- id: vol2_12_ops_scale_003
  severity: major
  line: 1700
  correction_type: worked_example_numeric_consistency
  current_text: 'Identify edge case: Shadow model flags 0.02 percent of transactions as errors due to unexpected feature distribution (100 transactions/day)'
  issue: The example says the fraud model processes 5 million transactions daily. 0.02 percent of 5,000,000 is 1,000 transactions per day, not 100.
  suggested_correction: Change the parenthetical to "(1,000 transactions/day)" or change the rate to 0.002 percent if the intended count is 100 transactions/day.
  why: The shadow deployment workflow is a concrete operational example. The count must match the rate so learners can trust the scale of the edge-case decision.
  confidence: high
- id: vol2_12_ops_scale_004
  severity: major
  line: 2049
  correction_type: table_equation_alignment
  current_text: Low-risk minor fixes (risk score under 0.1) proceed through fast canary rollout, while critical core model changes (risk score above 0.75) require full shadow deployment, human approval, and staged multi-week rollout with extended monitoring.
  issue: The preceding equation defines rollout risk as probability times impact times exposure, but the table lists qualitative change types and impacts without exposure values or numeric risk scores. The caption then refers to risk-score thresholds that the table never shows.
  suggested_correction: Either add explicit score ranges and an exposure column to the table, or remove the under-0.1 and above-0.75 thresholds from the caption and frame the table as qualitative examples of risk categories.
  why: This section is teaching how to translate a risk formula into rollout policy. If the table skips the quantities used by the formula, the learner cannot reproduce the classification logic.
  confidence: high
- id: vol2_12_ops_scale_005
  severity: major
  line: 2288
  correction_type: numeric_narrative_alignment
  current_text: 'For ML fleet monitoring, this false-alarm rate compounds: 100 models with 10 metrics each generate roughly 3 spurious alerts per day at 3--sigma, making alert-fatigue management an inherent constraint of applying SPC at platform scale.'
  issue: Earlier in the alert-fatigue section, the same 100-model, 10-metric, 3-sigma setup is evaluated every 5 minutes and produces roughly 864 false alerts per day. The footnote's "roughly 3" is the per-evaluation count for about 1,000 monitors, not the daily count under repeated checks.
  suggested_correction: Say "roughly 3 spurious alerts per evaluation" or align with the earlier check interval, e.g. "roughly 780-860 spurious alerts per day when evaluated every five minutes."
  why: The chapter uses false-alert compounding as the mathematical basis for hierarchical monitoring. Switching the time basis without saying so weakens that argument.
  confidence: high
- id: vol2_12_ops_scale_006
  severity: major
  line: 2599
  correction_type: worked_example_numeric_consistency
  current_text: 'Root cause: The model update increased computational cost per prediction. With unchanged traffic and doubled per-request cost, total cost doubled.'
  issue: The worked example starts with a service that usually costs $100/day and alerts at $250/day. If traffic is unchanged and per-request cost doubles, the total should be about $200/day, not $250/day. The root cause does not explain the observed anomaly magnitude.
  suggested_correction: Either change the alert value to $200/day, or revise the root cause to say per-request cost increased 2.5x. If the $250/day value is retained, update the latency/throughput details to explain the full 2.5x cost increase.
  why: This example teaches cost anomaly diagnosis. The arithmetic should close cleanly from symptom to root cause so the checklist feels reliable.
  confidence: high
- id: vol2_12_ops_scale_007
  severity: major
  line: 2858
  correction_type: cost_metric_consistency
  current_text: 'Current cost: $100 \times 24 \times 0.65 \times $2.50 = $3,900/day'
  issue: A 100-GPU cluster at $2.50/GPU-hour costs $6,000/day if the capacity is provisioned for the day, regardless of whether average utilization is 65 percent or 80 percent. The calculation is for productive or effective GPU-hour value, not actual cluster cost. The next line reinforces this by calling $4,800/day "effective value from same cost."
  suggested_correction: Recast the bullets as "daily cluster spend = $6,000" and "productive GPU-hour value rises from $3,900/day at 65 percent utilization to $4,800/day at 80 percent utilization," or otherwise define the values as effective utilized spend rather than cost.
  why: The section is teaching platform utilization economics. Calling utilized GPU-hours "cost" can mislead learners about what utilization optimization saves versus what it converts into useful work.
  confidence: high
- id: vol2_12_ops_scale_008
  severity: major
  line: 3981
  correction_type: terminology_consistency
  current_text: A common operational failure in ML is "training-serving skew" caused by data leakage---using future data to train a model. Point-in-time retrieval lets the training pipeline request feature values that existed at the timestamp of the training example.
  issue: Earlier, the chapter defines training-serving skew as a mismatch between batch training feature logic and real-time serving feature logic, while point-in-time retrieval prevents future-information leakage. This case study collapses the two failure modes into one definition.
  suggested_correction: 'Separate the concepts: "A common operational failure is data leakage from using future feature values in training; point-in-time retrieval prevents that. A related failure, training-serving skew, occurs when offline and online feature computation differ, which managed feature serving helps control."'
  why: Feature-store operations depend on learners distinguishing consistency between training and serving from temporal leakage in historical joins. Conflating them after the feature-store section muddies the takeaway.
  confidence: high
- id: vol2_12_ops_scale_009
  severity: major
  line: 4287
  correction_type: summary_numeric_consistency
  current_text: A platform supporting 40 models with per-model operational practices requires 1,600 engineer-hours monthly ($3.6M annually).
  issue: The hours and dollar figure do not match at the chapter's established $150/hour engineer cost. 1,600 hours/month times $150/hour times 12 months is $2.88M annually, not $3.6M. The $3.6M number matches the earlier 50-model example with 40 hours/model/month.
  suggested_correction: Either change the annual cost to $2.88M for 40 models, or change the model count to 50 so it matches the earlier platform-economics example.
  why: The fallacies section is a final synthesis of the chapter's quantitative claims. Reusing an earlier cost number with a different model count makes the recap look stale after the math audit.
  confidence: high
- id: vol2_12_ops_scale_010
  severity: major
  line: 4336
  correction_type: summary_support_alignment
  current_text: Understanding TCO economics enables quantitative arguments for infrastructure investment, demonstrating that a $500K platform engineering effort pays for itself within months by eliminating redundant pipelines and reducing incident response costs.
  issue: The chapter's concrete platform ROI examples use a $120K/month platform team, a $2M platform amortized over three years, and a $2M/year platform threshold. The conclusion introduces a new $500K platform effort and a "within months" payback without a worked example or earlier support.
  suggested_correction: Align the conclusion with an existing example, such as the $2M platform paying for itself within the first year at 50 models, or add a brief earlier calculation supporting the $500K/months claim.
  why: The closing paragraph should consolidate the chapter's evidence rather than introduce an unsupported investment scenario at the end.
  confidence: high
