  correction_type: numeric_consistency
  current_text: The table reveals several important patterns. First, price-performance improves with each generation, but the gains are not uniform across workload types.
  issue: The nearby prose at line 2415 already notes that the representative TF32 calculation makes H100's price-per-TFLOP slightly worse than A100's. The caption also warns that the rows use different precision modes. This sentence reverts to a monotonic "improves with each generation" claim.
