- id: NC-HW-001
  severity: major
  line: 105
  correction_type: figure_caption_alignment
  current_text: '::: {#fig-iron-law-heatmap fig-env="figure" fig-pos="htb" fig-cap="**The Iron Law Heatmap**: Total system speedup as a function of accelerator speed ($S$) and parallel fraction ($p$). The acceleration wall at the top reveals that if a workload is even slightly serial ($p < 0.9$), increasing hardware speed yields almost no benefit. Contours span roughly 1x-500x speedup." fig-alt="Heatmap of speedup vs. accelerator speed and parallel fraction. High speedup (green/yellow) is only achieved in the bottom-right corner where parallel fraction is near 1.0. The rest of the map is dominated by blue (low speedup), showing the serial bottleneck."}'
  issue: The figure maps parallel fraction on the y-axis from 0.8 at the bottom to 0.999 at the top, so high speedup should appear near the top-right, not the bottom-right. The caption also says the acceleration wall is "at the top" while describing p < 0.9, which is the lower part of the plot.
  suggested_correction: Rephrase the caption/alt text so the high-speedup region is the top-right corner, and describe the serial-bound wall as the low-p region where additional accelerator speed gives little benefit.
  why: The heatmap is meant to build intuition for Amdahl's Law; reversing the visual location of the good and bad regimes makes the plot harder to interpret.
  confidence: high
- id: NC-HW-002
  severity: major
  line: 416
  correction_type: numeric_consistency
  current_text: 'Compare the two curves: while hardware improves incrementally (following Moore''s Law and what is sometimes called *Huang''s Law*[^fn-huangs-law-gpu] for GPU scaling), model compute requirements have grown exponentially, doubling roughly every 3-4 months during the deep learning era.'
  issue: 'The systems-gap narrative uses several incompatible growth anchors: this line says model demand doubles every 3-4 months, the Huang''s Law footnote says the gap falls behind by nearly 10x each year, the Moore''s Law footnote says model compute grows roughly 3.5x per year, and the plotted curve implies about 6x/year model-demand growth with the gap widening about 3-4x/year versus the GPU curve.'
  suggested_correction: 'Pick one quantitative framing and use it consistently. For example: "In the plotted normalization, model demand rises about 6x/year while GPU supply rises about 1.7x/year, so the systems gap widens by roughly 3-4x/year." If the chapter wants a broader historical claim instead, make the figure caption and footnotes use the same broader range.'
  why: The figure is a quantitative teaching anchor; conflicting growth rates make the systems-gap argument feel stale after the math audit even though the qualitative point is sound.
  confidence: high
