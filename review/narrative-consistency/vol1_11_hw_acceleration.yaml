- id: NC-HW-007
  severity: major
  line: 3057
  correction_type: narrative_consistency
  current_text: Unlike traditional computing workloads, where memory access follows well-structured and predictable patterns, machine learning models often exhibit irregular memory access behaviors that make efficient data retrieval a challenge.
  issue: Earlier sections repeatedly establish that neural networks are accelerator-friendly because they have predictable dense matrix operations and regular data flow. This line swings to a broad "ML is irregular" framing before later narrowing the issue to sparsity, attention/KV-cache traffic, embeddings, and dynamic paths.
  suggested_correction: 'Qualify the transition: "Many ML workloads combine regular dense kernels with irregular memory pressure from sparsity, embeddings, variable sequence lengths, attention/KV-cache traffic, and small batches..."'
  why: The regular-versus-irregular distinction is central to why accelerators work for some ML kernels and struggle on others; an unqualified reversal can confuse the chapter's through-line.
  confidence: medium
