- id: NC-HW-004
  severity: major
  line: 1347
  correction_type: table_caption_consistency
  current_text: ': **Special Function Units**: Dedicated hardware implementations of common mathematical functions (like relu, sigmoid, and reciprocal square root) accelerate machine learning computations by eliminating software overhead and enabling parallel processing of vector data. Typical latencies of 1-2 cycles per function demonstrate the performance gains achieved through specialized circuitry. {#tbl-sfu}'
  issue: The table immediately above lists 1-2 cycles for activation units, but also log(N) cycles for reductions, 2-4 cycles for exp/log, and 4-8 cycles for sqrt/rsqrt. The caption collapses the whole table to 1-2 cycles.
  suggested_correction: Say that latencies range from single-cycle or 1-2 cycle activations to several cycles for exp/root units and log(N) for reductions.
  why: The table is teaching that different nonlinear primitives have different hardware costs; the caption currently hides that distinction.
  confidence: high
- id: NC-HW-005
  severity: major
  line: 1367
  correction_type: conceptual_consistency
  current_text: An **SIMT** (Single Instruction, Multiple Thread) GPU dispatches 512 lightweight threads simultaneously, one per element, completing the entire operation in a single wave.
  issue: A 512-thread CUDA-style launch would normally execute as multiple warps/waves, not one wave. The sentence overstates the execution model right before the chapter introduces warps and divergence.
  suggested_correction: 'Rephrase to: "An SIMT GPU can launch one lightweight thread per element; the hardware schedules those threads in warps/waves, completing the vector through multiple parallel groups while hiding latency."'
  why: The SIMD-to-SIMT progression is a core teaching point, and "single wave" can leave learners with the wrong mental model for occupancy and warp scheduling.
  confidence: high
