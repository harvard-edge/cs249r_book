- id: NC-HW-011
  severity: major
  line: 4160
  correction_type: conceptual_consistency
  current_text: Placement involves spatial assignment of computations and data, while allocation covers temporal distribution of resources.
  issue: Earlier prose defines computation placement as where operations run and memory allocation as where data resides in the memory hierarchy. This sentence redefines allocation as temporal distribution, which overlaps with scheduling rather than allocation.
  suggested_correction: 'Use the same three-way distinction throughout: placement assigns operations to hardware locations, allocation assigns data/resources to memory tiers, and scheduling determines temporal order and synchronization.'
  why: The mapping section builds a conceptual vocabulary that later dataflow and compiler sections rely on; shifting the meaning of allocation weakens that vocabulary.
  confidence: high
- id: NC-HW-012
  severity: major
  line: 4447
  correction_type: example_consistency
  current_text: 'To understand how channel-major layout works, consider the same RGB image tensor of size (Height, Width, Channels) = (3, 3, 3). Instead of storing pixel values row by row, the data is structured channel-first in memory as follows:

    \begin{gather*}

    I(0,0,0), I(1,0,0), I(2,0,0), I(0,1,0), I(1,1,0), I(2,1,0), \ldots, \\

    I(0,0,1), I(1,0,1), I(2,0,1), \ldots, I(0,0,2), I(1,0,2), I(2,0,2), \ldots

    \end{gather*}'
  issue: The example is channel-first, but within each channel it walks down rows before moving across columns. That is column-major within the channel plane, not the usual row-major order a learner would expect for NCHW/CHW storage.
  suggested_correction: 'Show channel-first with row-major order inside each channel, for example: I(0,0,0), I(0,1,0), I(0,2,0), I(1,0,0), ... then the same pattern for channel 1 and channel 2.'
  why: This section is meant to teach memory layout precisely; an unexpected traversal order makes the NHWC/NCHW comparison harder to follow.
  confidence: high
- id: NC-HW-013
  severity: major
  line: 4568
  correction_type: numeric_consistency
  current_text: ': **Intermediate Tensor Storage**: Naive execution models require substantial memory to store intermediate tensors generated by each operation. For a $1024{\times}1024$ tensor, storing intermediate results (even when only the final output is needed) quadruples the total memory footprint from 4 MB to 16 MB. Minimizing intermediate data storage is essential for improving memory efficiency. {#tbl-memory-footprint}'
  issue: The table entries use MemoryFootprintCalc.tensor_mb_str and total_mb_str formatted with one decimal place, which render from the decimal MB calculation as about 4.2 MB and 16.8 MB. A separate rounded MemoryFootprintTableCalc is defined after the table but not used by the table or caption.
  suggested_correction: Either use the rounded MemoryFootprintTableCalc values in the table/caption, or revise the caption to say the footprint grows from about 4.2 MB to about 16.8 MB.
  why: The point that naive execution quadruples memory is clear, but mismatched table and caption numbers make the worked example look stale.
  confidence: high
- id: NC-HW-014
  severity: major
  line: 4679
  correction_type: narrative_consistency
  current_text: In contrast, operations with complex data dependencies, such as matrix multiplications and convolutions, involve global data movement, making direct fusion impractical. These operations require values from multiple input elements to compute a single output, which prevents them from being executed as a single fused kernel.
  issue: This overstates the limitation and conflicts with nearby text that says Conv2D + BatchNorm + ReLU can become a single fused kernel. In practice, matmul and convolution commonly support fused epilogues or adjacent element-wise operations even though arbitrary global reductions are constrained.
  suggested_correction: 'Rephrase to: "Matrix multiplications and convolutions constrain fusion because they involve reductions and large data movement; they are often fused with element-wise epilogues such as bias, normalization variants, or activation, but cannot be arbitrarily fused with unrelated global operations."'
  why: The section's main example is convolution fusion, so saying convolutions cannot be fused undermines the kernel-fusion lesson.
  confidence: high
- id: NC-HW-015
  severity: major
  line: 4815
  correction_type: example_prose_alignment
  current_text: '# Spatial tiling: partition data via loop bounds.

    # No explicit loads - tiles defined by index ranges.'
  issue: The surrounding prose says the tiled matmul loads tiles into cache or shared memory, but this listing explicitly says there are no explicit loads. The later "Temporal Tiling" listing then shows explicit A_tile/B_tile loads in a very similar blocked matmul. The spatial-versus-temporal distinction becomes blurry.
  suggested_correction: Clarify the examples by labeling the first as cache-friendly loop blocking that relies on hardware caches, and the second as explicit shared-memory/register tiling; or revise the prose so "spatial" means data partitioning and "temporal" means loop reordering without presenting nearly identical code paths as different concepts.
  why: Tiling is one of the chapter's main optimization mechanisms; the code and prose should reinforce the distinction rather than making learners infer it.
  confidence: medium
