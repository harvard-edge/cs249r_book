- id: NC-HW-009
  severity: major
  line: 3382
  correction_type: conceptual_consistency
  current_text: These models are particularly challenging for accelerators due to their massive parameter sizes, which often exceed on-chip memory capacity. As a result, frequent memory transfers between host and accelerator introduce substantial latency overheads, particularly when relying on interconnects such as PCIe.
  issue: Exceeding on-chip SRAM/cache usually creates traffic between accelerator HBM and on-chip memory, not necessarily host-to-accelerator PCIe transfers. Host transfers become central when weights or activations are offloaded, but that regime is not specified here.
  suggested_correction: 'Reframe the default bottleneck as movement within the accelerator memory hierarchy: "As a result, frequent movement between HBM, caches, and compute units creates substantial latency and bandwidth pressure; if the model spills or is offloaded through host memory, PCIe/NVLink transfers add another bottleneck."'
  why: The section is trying to distinguish memory hierarchy pressure from host-accelerator communication; conflating them muddies where transformer bottlenecks usually arise.
  confidence: high
- id: NC-HW-010
  severity: major
  line: 3556
  correction_type: example_table_consistency
  current_text: '| **Dense MatMul**      | 64--256 FLOP/byte        | Compute-bound      | **GPT-2 (Projections)** |'
