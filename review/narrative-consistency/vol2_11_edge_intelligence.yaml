findings:
- id: NC-V2-11-001
  severity: major
  line: 311
  correction_type: prose_figure_alignment
  current_text: The evolution from centralized cloud training (region A) through local device adaptation (region B) to federated coordination (region C) represents a fundamental shift in machine learning architecture.
  issue: The prose assigns region A to centralized cloud and region B to local adaptation, but the immediately preceding figure caption and alt text define A as Local Only and B as Centralized Cloud. The learner sees two incompatible mappings for the same panels.
  suggested_correction: 'Align the sentence with the figure labels, for example: "The comparison from local-only learning (region A) to centralized cloud training (region B) to federated coordination (region C) represents..." If the intended story is centralized -> local -> federated, reorder or relabel the figure/caption instead.'
  why: This section teaches the architectural progression among learning paradigms. Conflicting panel labels make the figure harder to use as the intended conceptual anchor.
  confidence: high
- id: NC-V2-11-002
  severity: major
  line: 323
  correction_type: numeric_consistency
  current_text: Where inference requires a single forward pass through the network, training demands forward propagation, gradient computation through backpropagation, and weight updates, increasing memory requirements by 3--5$\times$ and computational costs by 2--3$\times$.
  issue: The chapter's learning objective, table, and figure discussion establish memory amplification as 4--12x with a representative 9x Adam-style budget, but this sentence uses 3--5x. Later synthesis and summary text also use 3--10x, so the chapter does not maintain one memory-amplification range.
  suggested_correction: Standardize the full-training memory amplification range to 4--12x where discussing weights + activations + gradients + optimizer state. If a narrower 3--5x claim is meant only for activation caching or bandwidth, state that narrower scope explicitly.
  why: Memory amplification is a core teaching objective and a repeated design constraint. Mixed ranges make it unclear what learners should remember and which number supports design decisions.
  confidence: high
- id: NC-V2-11-003
  severity: minor
  line: 602
  correction_type: figure_label
  current_text: \node[below=1pt of BB2.north,anchor=north]{Online Pre-training};
  issue: The figure label says "Online Pre-training," while the surrounding prose and caption describe offline pretraining/meta-training followed by online adaptive learning. The label reverses the offline/online distinction the section is trying to teach.
  suggested_correction: Change the label to "Offline Pre-training" or "Offline Meta-training" to match lines 445, 447, and 605.
  why: The offline-pretrain/online-adapt split is the central point of this figure; a contradictory label undercuts the pipeline explanation.
  confidence: high
- id: NC-V2-11-004
  severity: major
  line: 952
  correction_type: numeric_consistency
  current_text: Apple's Neural Engine in the A17 Pro delivers `{python} EdgeIntelligenceSetup.mobile_npu_tops` TOPS peak performance specialized for 8-bit and 16-bit operations, optimized primarily for CoreML inference patterns with limited training support, making it ideal for inference-heavy adaptation techniques.
  issue: The rendered constant is 50 TOPS, but the prose attaches that value specifically to Apple's A17 Pro. That makes the later comparison with Snapdragon 8 Gen 3 at 45 TOPS awkward and conflicts with the commonly cited A17 Pro Neural Engine figure of 35 TOPS. The same specificity appears in the A11-to-A17 footnote at line 667.
  suggested_correction: If the chapter wants to keep the 50 TOPS constant, describe it as a generic/current flagship mobile NPU reference rather than "A17 Pro." If the A17 Pro is the intended named example, use 35 TOPS and adjust the A11 improvement ratio and surrounding comparisons accordingly.
  why: The user-facing teaching point is hardware-tier comparison. A stale or over-specific 50 TOPS attribution can make learners distrust the accelerator discussion even though the generic constant is otherwise used consistently.
  confidence: high
- id: NC-V2-11-005
  severity: minor
  line: 1496
  correction_type: learner_flow
  current_text: In which deployment tier (Tier 1, 2, or 3) are **Residual Adapters** preferred over LoRA, and why?
  issue: The checkpoint asks learners to apply the Tier 1/2/3 adaptation rule before the tiered framework is introduced at line 1509. Earlier hardware tiers describe inference-energy clusters, not the residual-adapter-vs-LoRA policy.
  suggested_correction: Move this checkpoint after the paragraph that defines Tier 1, Tier 2, and Tier 3 adaptation choices, or introduce the tier policy before the checkpoint.
  why: Checkpoints should reinforce material already taught. Here the learner has not yet been given the rule needed to answer the question.
  confidence: high
- id: NC-V2-11-006
  severity: major
  line: 1746
  correction_type: table_structure
  current_text: '| **Compressed**          | Unlabeled or encoded          | Low to Moderate             | Memory-limited devices,                     |'
  issue: The table splits "Compressed Representations" across two rows, leaving the first row with an incomplete use-case cell and the second row as a separate apparent technique. The caption says the table summarizes each technique, but this formatting makes one technique look like two.
  suggested_correction: 'Combine lines 1746-1747 into one row, for example: "| **Compressed Representations** | Unlabeled or encoded data | Low to Moderate | Memory-limited devices; privacy-sensitive contexts |".'
  why: 'This is not just cosmetic: it changes how the comparison table reads and can confuse the taxonomy of data-efficiency techniques.'
  confidence: high
- id: NC-V2-11-007
  severity: minor
  line: 1819
  correction_type: example_code_alignment
  current_text: A team is designing a federated health monitor that learns from `{python} FederatedSavings.fs_raw_data_mb_str` MB of user sensor data per week.
  issue: The notebook prose says "health monitor" and "sensor data," but the code computes the raw data volume from 1000 compressed JPEG images at 200 KB each. The computed 195 MB/week example is therefore a vision/photo workload, not the stated health-monitor sensor workload.
  suggested_correction: Either change the prose to a federated camera/vision example, or change the code assumptions to health sensor streams that support the rendered 195 MB/week value.
  why: The systems insight depends on trusting the code-backed example. Mismatched domain assumptions make the bandwidth calculation feel arbitrary.
  confidence: high
- id: NC-V2-11-008
  severity: major
  line: 1446
  correction_type: numeric_consistency
  current_text: For periodic federated coordination, devices can synchronize LoRA adapters in under 30 seconds on 3G networks, compared to hours for full model transfers.
  issue: The same paragraph says LoRA adapter updates are typically 10-50 MB, but later line 2406 says a 50 MB update takes 40-80 seconds over LTE. Claiming under 30 seconds on 3G for the same size range is inconsistent and likely too optimistic.
  suggested_correction: Narrow the claim to small adapters, for example "small adapter updates can sync in under a minute on good mobile links," or say 10-50 MB adapters typically require LTE/Wi-Fi and may take minutes on 3G.
  why: The bandwidth discussion is meant to teach why compression matters. Contradictory transfer-time claims weaken that design argument.
  confidence: high
- id: NC-V2-11-009
  severity: minor
  line: 2681
  correction_type: numeric_consistency
  current_text: "Energy limitations force training sessions to be carefully scheduled around charging patterns, thermal constraints, and battery preservation requirements, with mobile devices typically limiting ML workloads to 500\u20131000 mW sustained power consumption."
  issue: Earlier prose says smartphones typically sustain 2--3 W for ML workloads and may burst to 5--10 W, while the battery notebook uses 4.5 W for a 30-minute training job. This later 500-1000 mW statement reads like a conflicting general mobile ML limit.
  suggested_correction: 'Qualify the lower number as a background-adaptation target, for example: "background adaptation often targets roughly 500-1000 mW, even though phones may sustain 2--3 W for foreground ML workloads and burst higher briefly."'
  why: The chapter repeatedly uses power budgets to justify opportunistic scheduling. Distinguishing foreground capacity from background adaptation budget keeps those examples consistent.
  confidence: medium
- id: NC-V2-11-010
  severity: major
  line: 2803
  correction_type: technical_narrative
  current_text: Consecutive frames from mobile cameras naturally provide positive pairs for visual representation learning, images captured milliseconds apart typically show the same scene from slightly different perspectives, while augmentation techniques such as color jittering and random cropping create negative examples.
  issue: In standard contrastive learning, augmentations such as color jittering and random cropping usually create additional positive views of the same sample; negatives typically come from other images/frames or a memory queue. The sentence teaches the contrastive setup backwards.
  suggested_correction: 'Revise to: "Consecutive frames or augmented views can provide positive pairs, while negatives come from different frames, other devices'' samples, or a replay/memory queue."'
  why: Contrastive learning appears in the learning objectives and is used to motivate unlabeled edge data. Misstating positives vs. negatives would directly confuse the intended learning point.
  confidence: high
notes: Read the assigned chapter from start through conclusion with line numbers from `nl -ba`. Focused on narrative consistency, example/code support, stale numeric claims after the math audit, edge memory amplification, and 50 TOPS consistency. Did not edit the QMD or any source files.
