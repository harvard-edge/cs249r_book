findings:
- id: NC-DE-001
  severity: major
  line: 1098
  correction_type: calculation_prose_alignment
  current_text: "This falls between 1M and 10M in our design space, closer to 1M, suggesting +5\u20136 percent accuracy contribution from data volume."
  issue: The preceding budget calculation yields 750K labeled examples, which is below 1M, not between 1M and 10M. The accuracy contribution is also inferred from a table row comparing 1M vs. 10M examples, so the prose overstates what the worked example supports.
  suggested_correction: "Revise to say the budget yields roughly 0.75M labeled examples, just below the 1M anchor in the design-space table, and frame the +5\u20136 percent as an illustrative estimate only if additional synthetic data or assumptions are included."
  why: A learner following the arithmetic will see 750K, then be told it lies between 1M and 10M. That breaks trust in the design-space calculation and makes the projected accuracy budget harder to follow.
  confidence: high
- id: NC-DE-002
  severity: minor
  line: 1430
  correction_type: narrative_continuity
  current_text: For the visual component of the broader smart doorbell application, the Wake Vision\index{Wake Vision} dataset [@banbury2024wakevisiontailoreddataset] serves as the standard benchmark for person detection on microcontrollers.
  issue: The chapter has framed the running case study as KWS for voice assistants and smart speakers; a broader smart doorbell application and visual component appear here without prior setup.
  suggested_correction: Either introduce the smart-doorbell/multimodal framing before this paragraph, or remove the Wake Vision sentence and keep the example focused on audio datasets for the KWS lighthouse.
  why: The sudden shift from audio KWS to smart-doorbell vision interrupts the case-study thread and may leave learners unsure whether the chapter is still analyzing the same system.
  confidence: medium
- id: NC-DE-003
  severity: minor
  line: 2303
  correction_type: calculation_prose_alignment
  current_text: 'To sustain `{python} RealtimeCost.throughput_str` GB/s with < 100 ms latency, the system needs ~50 dedicated cores + redundant backups (always on). Cost: `{python} RealtimeCost.stream_cores_str` cores $\times$ `{python} RealtimeCost.stream_hours_str` hrs $\times$ USD `{python} RealtimeCost.stream_cost_per_hr_str`/hr = **USD `{python} RealtimeCost.stream_cost_str`/day**.'
  issue: The prose mentions approximately 50 dedicated cores plus backups, while the calculation multiplies by `stream_cores = 100`. The doubling is implied but not explicit.
  suggested_correction: 'State the total directly, for example: "~50 primary cores plus ~50 redundant cores, or `{python} RealtimeCost.stream_cores_str` always-on cores total."'
  why: Making the redundancy assumption explicit keeps the cost calculation legible and prevents the apparent jump from 50 cores to 100 cores.
  confidence: high
- id: NC-DE-004
  severity: major
  line: 2636
  correction_type: unsupported_numeric_conclusion
  current_text: The break-even point occurs when schemas change fewer than once per month; below that rate, ETL wins on total cost.
  issue: The preceding calculation models storage and query costs, and it states schema-change time, but it does not assign an engineering labor cost or otherwise calculate a schema-change break-even frequency.
  suggested_correction: 'Either add an explicit labor-cost assumption and compute the break-even point, or replace the sentence with a qualitative conclusion such as: "The break-even point depends on engineering labor cost and schema-change frequency; stable schemas favor ETL, while frequent feature-definition changes favor ELT."'
  why: The section is teaching quantitative trade-off analysis. A precise break-even claim that is not derived from the shown variables undermines that teaching point.
  confidence: high
