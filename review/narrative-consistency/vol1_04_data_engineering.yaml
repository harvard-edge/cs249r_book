- id: NC-DE-008
  severity: major
  line: 3164
  correction_type: technical_narrative_consistency
  current_text: Memory optimization strategies like *activation checkpointing\index{Activation Checkpointing!memory optimization}* (also called gradient checkpointing\index{Gradient Checkpointing}) trade computation for storage by discarding intermediate activations during the forward pass and recomputing them during backpropagation. This approach reduces GPU memory requirements but increases storage I/O as intermediate values write to disk.
  issue: The second sentence contradicts the checkpointing mechanism just described. Standard activation checkpointing discards activations and recomputes them, increasing compute rather than writing those intermediate activations to disk.
  suggested_correction: 'Revise to: "This approach reduces GPU memory requirements but increases compute because intermediate activations are recomputed during backpropagation; storage I/O becomes relevant for separate checkpoint files or explicit activation offload strategies."'
  why: The storage section is teaching which bottleneck a technique stresses. Misclassifying activation checkpointing as storage I/O pressure gives learners the wrong causal model.
  confidence: high
- id: NC-DE-009
  severity: minor
  line: 3393
  correction_type: causal_claim
  current_text: 'The choice cascades through the system: faster decompression enables higher batch sizes (fitting more examples in memory after decompression), reduced buffering requirements (less decompressed data needs staging), and better GPU utilization (less time idle waiting for data).'
  issue: Faster decompression improves input throughput and can reduce stalls, but it does not by itself enable larger batches; batch size is constrained by decompressed tensor size and accelerator memory.
  suggested_correction: 'Replace the batch-size claim with a throughput claim, for example: "faster decompression enables higher input throughput, smaller staging buffers, and better GPU utilization."'
  why: The current sentence mixes a throughput benefit with a memory-capacity claim, which makes the compression trade-off harder to reason about.
  confidence: high
notes: Read the assigned chapter from start through the concluding connection using line numbers from `nl -ba`-equivalent output. Findings focus on narrative consistency, figure/caption alignment, and calculations whose prose conclusions are not fully supported by nearby code or tables.
