- id: NC-DE-006
  severity: major
  line: 2860
  correction_type: figure_text_mismatch
  current_text: 'The top rows show quality-based errors: motion-blurred photographs and low-resolution crops where the animal is so degraded that even expert annotators cannot determine the species with certainty, making the "correct" label fundamentally unknowable from the data alone. The bottom rows illustrate domain-expertise errors: the specimens are photographed clearly, but distinguishing visually similar subspecies or developmental stages demands specialist knowledge that general-purpose annotators lack.'
  issue: The referenced figure is a single-row six-panel grid of dataset label errors, not top and bottom rows arranged by the two failure modes described in the prose.
  suggested_correction: 'Remove the row-based instruction and describe the examples generically, for example: "The examples mix degraded or ambiguous inputs with cases where the image is clear but the class distinction requires domain knowledge."'
  why: The current prose asks learners to extract structure from the figure that is not present, which weakens the intended lesson about routing different labeling failures to different remedies.
  confidence: high
- id: NC-DE-007
