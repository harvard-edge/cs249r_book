findings:
  - id: vol2_05_distributed_training_001
    severity: minor
    line: 954
    correction_type: bottleneck_label
    current_text: |-
      Four insights emerge. NVLink enables efficient scaling within single nodes (`{python} Scaling8GPU.efficiency_8gpu_str` percent efficiency), while inter-node communication kills efficiency (dropping to `{python} Scaling32GPU.efficiency_32gpu_str` percent). Gradient accumulation beats naive scaling for memory-bound models when the scale-out network is slow, so the sweet spot for this GPT-2 scenario is 8 GPUs per node with gradient accumulation, not naive scaling to 32+ GPUs. OpenAI's GPT-2 paper reports training on 32 V100s across 4 nodes using optimized communication (likely gradient accumulation combined with pipeline parallelism), not pure data parallelism.
    issue: |-
      The example has just shown a communication-bound 32-GPU run on a slow inter-node network, but this summary calls the winning case "memory-bound." That swaps the bottleneck label at the moment the learner is supposed to extract the design lesson.
    suggested_correction: |-
      Change the phrase to "Gradient accumulation beats naive scale-out for communication-bound runs when the inter-node network is slow..." or "for bandwidth-bound scenarios..." If memory pressure is also intended, add a separate sentence explaining that constraint.
    why: |-
      The chapter repeatedly teaches diagnosis by dominant resource. Calling a bandwidth problem memory-bound weakens the communication-wall narrative and can make the gradient-accumulation example look like it is solving the wrong constraint.
    confidence: high
  - id: vol2_05_distributed_training_002
    severity: major
    line: 1047
    correction_type: numeric_consistency
    current_text: |-
      Synchronization frequency presents a trade-off between communication efficiency and convergence behavior. Gradient accumulation reduces synchronization frequency but increases memory requirements and may impact convergence. Synchronizing every 4 steps reduces communication overhead by 60 percent while increasing memory usage by 3$\times$ for gradient storage. Asynchronous methods eliminate synchronization costs entirely but introduce staleness that degrades convergence by 15--30 percent for large learning rates.
    issue: |-
      The 4-step accumulation statement mixes several effects. Synchronization frequency falls by 75 percent, while "communication overhead" only falls by 60 percent under an unstated compute/communication timing model. More importantly, standard gradient accumulation reuses one gradient buffer and accumulates in place; it does not require 3x extra gradient storage. The later pitfall at line 2525 repeats the same idea by saying each accumulated step requires another 14 GB gradient buffer.
    suggested_correction: |-
      Separate the claims: "Accumulating for 4 microsteps reduces synchronization frequency by 75 percent; the realized step-time reduction depends on the compute/communication mix. Memory pressure comes from keeping the gradient buffer resident and from any larger microbatch/activation choices, not from storing K independent gradient tensors in the usual implementation." Update the later pitfall similarly.
    why: |-
      Gradient accumulation is a key alternative to scale-out in this chapter. The current wording teaches a false memory model, which can lead learners to overestimate the memory cost and misunderstand when accumulation is useful.
    confidence: high
  - id: vol2_05_distributed_training_003
    severity: major
    line: 1491
    correction_type: memory_accounting
    current_text: |-
      Even with ZeRO-3 fully deployed, sharding optimizer states, gradients, and parameters across workers, some architectures remain intractable. As @fig-model-parallel-flow shows, model parallelism addresses this by partitioning the model itself across devices using two complementary strategies. A `{python} FrontierTrainingContext.frontier_params_b_str`B parameter model using FSDP across 64 GPUs still requires 700 GB / 64 = 11 GB of parameters per GPU before accounting for activations.
    issue: |-
      The 700 GB numerator is not "parameters" for a 175B FP16/BF16 model; parameters alone are 350 GB, or about 5.5 GB per GPU across 64 GPUs. The nearby memory-wall notebook then uses 2,450 GB of static training state and gets about 38 GB per GPU. This sentence lands between those two calculations and gives learners a third, unlabeled memory budget.
    suggested_correction: |-
      Align the sentence with the notebook: "Weights alone are 350 GB, or about 5.5 GB per GPU across 64 GPUs; full Adam training state is about 2,450 GB, or roughly 38 GB per GPU before activations." If 700 GB is intended to mean weights plus gradients, label it explicitly.
    why: |-
      The transition from ZeRO/FSDP to model parallelism depends on a precise distinction between parameter storage, gradients, optimizer state, and activations. The current wording blurs that distinction and undermines the memory-wall argument.
    confidence: high
  - id: vol2_05_distributed_training_004
    severity: major
    line: 1660
    correction_type: memory_accounting
    current_text: |-
      Consider our running example: the `{python} FrontierTrainingContext.frontier_params_b_str`B parameter model requires 350 GB of memory in FP16, exceeding the `{python} A100CapacityContext.a100_mem` GB capacity of a single A100 by a factor of four. Model parallelism addresses this **capacity wall** by partitioning the model's state (parameters, gradients, and optimizer states) across multiple devices, effectively stitching them into a single super-accelerator. Unlike data parallelism, where every GPU holds a full replica of the model and processes a unique fraction of the global batch, model parallelism requires each GPU to hold a unique fraction of the model and process the *same* data stream sequentially. With 8-way partitioning on A100s, each GPU holds approximately 44 GB of parameters, a tight fit that leaves roughly 36 GB for activations and optimizer state.
    issue: |-
      The paragraph says model parallelism partitions parameters, gradients, and optimizer states, but the 8-way calculation only divides the 350 GB FP16 parameter weights. Adam optimizer state for this model is roughly 2,100 GB globally, or about 262 GB per GPU with only 8-way partitioning. The later hybrid memory section correctly says TP=8 alone would exceed 150 GB per GPU once optimizer state is included.
    suggested_correction: |-
      Reframe the 8-way calculation as weights-only: "With 8-way partitioning, BF16 weights alone occupy about 44 GB per GPU, leaving too little room for activations and full optimizer state. Training requires additional sharding/offload, pipeline parallelism, or ZeRO/FSDP to partition optimizer and gradient state." 
    why: |-
      As written, the paragraph makes pure 8-way model parallelism sound almost sufficient for training a 175B model on A100s, contradicting both the preceding memory-wall notebook and the later hybrid-parallel memory analysis.
    confidence: high
  - id: vol2_05_distributed_training_005
    severity: major
    line: 1836
    correction_type: formula_clarity
    current_text: |-
      With $S=2048$, $H=4096$, $B=4$, and FP16: $2 \times 4 \times 2048 \times 4096 \times 2 = 134$ MB per AllReduce per layer. For a 96-layer model with two AllReduce operations per layer, this totals approximately 25.7 GB per forward pass; including the symmetric backward AllReduces brings per-training-step communication to roughly 51 GB, requiring NVLink bandwidth to avoid becoming the bottleneck.
    issue: |-
      The leading factor of 2 is unlabeled. Read after the preceding "2 AllReduce operations per transformer layer" sentence, it looks like the two operations are already included, yet the prose then multiplies by two operations again. If the leading 2 is meant to be the ring-AllReduce send/receive factor, the text should say so. The earlier tensor-parallelism definition also describes the activation size as hidden_dim x batch x 2 bytes, omitting sequence length.
    suggested_correction: |-
      Make the factors explicit: "The activation tensor is B x S x H x dtype = 4 x 2048 x 4096 x 2 = about 67 MB. A ring AllReduce transfers about 2(N-1)/N times that payload, roughly 134 MB per AllReduce at large N. With two AllReduces per layer and 96 layers, forward communication is about 25.7 GB; backward roughly doubles it to 51 GB." Also include sequence length in the earlier definition.
    why: |-
      This example supports the claim that tensor parallelism must stay on NVLink to preserve MFU. Ambiguous factors make it hard for learners to tell whether the communication volume is an activation size, an AllReduce transfer size, or a per-layer total.
    confidence: high
  - id: vol2_05_distributed_training_006
    severity: minor
    line: 2417
    correction_type: dpo_memory_framing
    current_text: |-
      Total static memory: `{python} RLHFBudget.policy_per_gpu_str` + `{python} RLHFBudget.ref_per_gpu_str` = `{python} RLHFBudget.static_per_gpu_str` GB per GPU—identical to PPO's static footprint, but without the generation-phase KV cache burden. The full $\sim$ `{python} RLHFBudget.remaining_str` GB remaining is available for training activations, permitting 2$\times$ larger micro-batch sizes or eliminating the need for activation checkpointing that PPO requires.
    issue: |-
      Earlier DPO prose says static parameter memory drops from about 1,494 GB to 1,260 GB in the 13B reward/value scenario, and the table repeats that cluster-wide reduction. This sentence then says DPO is "identical to PPO's static footprint" without specifying that it only means the co-located policy+reference footprint on the policy GPUs. The contrast can read as a contradiction in the DPO memory teaching point.
    suggested_correction: |-
      Clarify the scope: "On the policy GPUs, DPO has the same co-located policy+reference footprint as the PPO policy/reference portion, but cluster-wide it avoids the PPO reward and value model memory. It also removes the generation-phase KV cache burden..."
    why: |-
      The PPO-vs-DPO section is explicitly teaching infrastructure simplification. Distinguishing per-policy-GPU memory from cluster-wide multi-model memory keeps the 16 percent memory reduction and the MFU improvement consistent.
    confidence: high
