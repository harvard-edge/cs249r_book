findings:
- id: FO-NC-001
  severity: major
  line: 506
  correction_type: prose_numeric_alignment
  current_text: 'At 60 percent utilization: 4,000 GPUs productive, 6,000 idle = $288,000/day wasted. At 80 percent utilization: 8,000 GPUs productive, 2,000 idle = $96,000/day wasted. Improvement value: Moving from 60 percent to 80 percent saves $192,000/day, or $70M/year.'
  issue: The 60 percent utilization row uses 40 percent productive and 60 percent idle arithmetic. In a 10,000-GPU cluster, 60 percent utilization means 6,000 productive GPUs and 4,000 idle GPUs, or $192,000/day wasted at $2/GPU-hour. The stated savings are therefore for moving from 40 percent to 80 percent utilization, not from 60 percent to 80 percent.
  suggested_correction: Change the 60 percent row to "6,000 GPUs productive, 4,000 idle = $192,000/day wasted" and change the improvement value to "$96,000/day, or about $35M/year." Alternatively, relabel the first row as 40 percent utilization if the $288,000/day and $70M/year values are intended.
  why: This callout is meant to make the economics of scheduling tangible; a learner checking the arithmetic will see the cost argument contradict itself.
  confidence: high
- id: FO-NC-002
  severity: major
  line: 668
  correction_type: running_example_consistency
  current_text: Our 175B model training on Kubernetes uses this full stack. The workload is defined as a PyTorchJob with 128 worker pods, each requesting 8 GPUs.
  issue: 'The same "our 175B model" running example appears at multiple incompatible scales without explanation: 64 GPUs in the Slurm example, 1,024 GPUs here and in the elastic/spot/TCO sections, and 64 GPUs again in the resource accounting example. Readers cannot tell whether these are separate runs or one continuing example.'
  suggested_correction: Either standardize the running example to one training scale, or explicitly name distinct scenarios such as "a 64-GPU fine-tuning/debug run" versus "a 1,024-GPU pretraining run" and carry those labels through the chapter.
  why: The chapter repeatedly uses the 175B model to anchor costs, topology, and scheduling choices; changing the GPU count silently makes the later numbers feel arbitrary.
  confidence: high
- id: FO-NC-003
  severity: major
  line: 867
  correction_type: figure_prose_alignment
  current_text: 'The physical location of GPUs on the network switch fabric dramatically impacts collective performance. Consider an AllReduce operation across 8 GPUs:'
  issue: The adjacent figure caption, code title, and plotted data all describe a 64-GPU, 1 GB gradient synchronization. The callout switches to 8 GPUs while reusing the 64-GPU latencies, so the worked example no longer matches the visual evidence it is explaining.
  suggested_correction: Change "8 GPUs" to "64 GPUs" in the callout, or recompute and relabel the figure/code values for an 8-GPU AllReduce if that is the intended example.
  why: Topology-aware scheduling is taught through the latency comparison; the learner needs the prose, code, and figure to describe the same experiment.
  confidence: high
- id: FO-NC-004
  severity: major
  line: 941
  correction_type: narrative_flow
  current_text: When a node fails, the entire job must stop, synchronize all remaining workers, reload the most recent checkpoint, and restart with a new allocation that replaces the failed node.
  issue: The preceding paragraph says elastic training lets the job downscale and continue without interruption. This sentence then states the opposite without marking that it is describing the rigid-scheduling baseline, so the transition reads as a contradiction.
  suggested_correction: Start the paragraph with a qualifier such as "Under rigid scheduling" or "In the traditional non-elastic case" before describing the full stop-and-restart recovery path.
  why: The section is contrasting elastic and rigid behavior; the contrast needs to stay explicit for the learner to follow why elasticity changes the scheduler's options.
  confidence: high
- id: FO-NC-005
  severity: major
  line: 1250
  correction_type: numeric_claim_calibration
  current_text: Cloud providers offer spot instances (AWS) or preemptible VMs (GCP) at 60 to 70 percent discounts compared to on-demand pricing... At $0.50 per GPU-hour instead of $2.00, spot instances transform the economics of large-scale training.
  issue: The stated example price is a 75 percent discount from $2.00/GPU-hour, not a 60 to 70 percent discount. The chapter later uses both a 65 percent discount example and a 60 to 90 percent discount range, so the local numeric framing feels stale.
  suggested_correction: Either broaden the discount range here to match the footnote and summary (for example, "60 to 90 percent discounts") or change the example spot price to a value in the stated 60 to 70 percent range.
  why: The section asks learners to reason quantitatively about spot economics; the discount range and example price should agree before the interruption overhead math begins.
  confidence: high
- id: FO-NC-006
  severity: major
  line: 1798
  correction_type: scope_of_numeric_claim
  current_text: If the scheduler allows unlimited preemption, a cluster averaging 12 preemptions per day wastes 9 hours, or 37.5 percent of total capacity, on recovery overhead.
  issue: The 9 hours comes from 12 preemptions times a 45-minute recovery window for the 64-GPU example job. That is 37.5 percent of a day for the affected job allocation, not 37.5 percent of the entire cluster's capacity unless the whole cluster is exactly that one job.
  suggested_correction: 'Say "37.5 percent of that job''s daily allocated capacity" or express the waste as GPU-hours: "12 preemptions waste 576 GPU-hours/day for this 64-GPU job." If the intent is cluster-wide waste, divide by the actual cluster size.'
  why: Preemption budgets are motivated by capacity loss; overstating the scope makes the operational lesson less trustworthy.
  confidence: high
- id: FO-NC-007
  severity: major
  line: 2008
  correction_type: table_caption_alignment
  current_text: 'The distinction between "allocated" and "effective" utilization captures the gang scheduling deadlock: before the fix, A100-80 GB GPUs showed high allocation in Slurm but low actual compute utilization because allocated jobs could not start.'
  issue: The worked example explicitly diagnoses the problem as "not a standard Slurm partial-allocation deadlock" but as a policy-induced utilization gap from strict GPU type matching. The table caption reclassifies it as gang scheduling deadlock, contradicting the root-cause lesson.
  suggested_correction: Replace the caption explanation with "captures the policy-induced utilization gap" and describe the A100-80 GB pool as highly allocated but less effective because policies and job templates stranded other hardware pools.
  why: The debugging case is meant to teach that the scheduler algorithm was not the root cause; calling the result a gang scheduling deadlock undermines that diagnostic conclusion.
  confidence: high
- id: FO-NC-008
  severity: major
  line: 2010
  correction_type: equivalent_capacity_clarity
  current_text: This 40 percent improvement in effective cluster capacity equals approximately 400 additional GPUs worth of productive work.
  issue: Raising a 1,000-GPU cluster from 60 percent to 84 percent utilization increases actual productive GPUs from 600 to 840, a gain of 240 fully utilized GPUs. The 400-GPU number is an equivalent raw-capacity gain at the old 60 percent utilization, not 400 additional productive GPUs.
  suggested_correction: 'Clarify the equivalence: "This adds 240 fully utilized GPUs of productive work, equivalent to buying 400 more GPUs if the new GPUs ran at the old 60 percent utilization." Mirror that wording in the following notebook.'
  why: The math is defensible as an equivalent-capacity framing, but the current wording blurs actual productive capacity with equivalent raw hardware.
  confidence: high
- id: FO-NC-009
  severity: major
  line: 2022
  correction_type: worked_example_continuity
  current_text: After a week of systematic debugging (identifying stragglers, optimizing AllReduce buckets, and tuning data loaders), utilization increases to 84 percent.
  issue: 'The notebook immediately follows a worked example where utilization rises to 84 percent through policy changes: capability-based scheduling, topology-aware placement, backfill tuning, V100 workload seeding, and better request guidance. This paragraph changes the cause to profiling and performance tuning without introducing a new scenario.'
  suggested_correction: Either align the notebook with the preceding policy fix, or mark it as a separate profiling example with different setup text and a title that is not tied to the previous debugging scenario.
  why: The section's teaching point is that low utilization often comes from policy-infrastructure mismatch; changing the cause in the value notebook muddies that lesson.
  confidence: high
