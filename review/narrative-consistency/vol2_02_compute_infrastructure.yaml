  - id: vol2_02_compute_infrastructure_010
    severity: minor
    line: 2707
    correction_type: flow
    current_text: "The torus topology's key advantage is its constant bisection bandwidth per chip as the pod scales: adding more chips to the torus extends the mesh without creating bottleneck layers."
    issue: "This conflicts with the pod-topology caption and torus footnote, which correctly emphasize that torus bisection bandwidth grows sublinearly and nonlocal traffic requires multiple hops. A torus keeps per-chip degree/link count constant; it does not keep global bisection bandwidth per chip constant."
    suggested_correction: "Revise to distinguish constant local degree from sublinear global bisection, e.g. 'The torus keeps the number of links per chip constant as the pod scales, avoiding expensive upper-tier switches, but aggregate bisection grows sublinearly, so nonlocal communication must be placed carefully.'"
    why: "The topology trade-off is a major pod-level teaching point. The current sentence overstates the torus advantage and undercuts the earlier fat-tree-versus-torus comparison."
    confidence: high
