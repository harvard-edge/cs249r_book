    current_text: "We need at least 5 accelerators just for the weights, and with optimizer state, all 8 in a dense node are barely sufficient."
    issue: "The node narrative understates the training-state requirement. Nearby text later computes 2.1 TB before activations and 2.2--2.5 TB including activations, far beyond an 8-H100 node's 640 GB HBM. A later paragraph then says TP-8 plus ZeRO-1 leaves roughly 55 GB per GPU, but that omits gradients and conflicts with the memory-budget exercise that totals about 113 GB before additional offloading."
    suggested_correction: "Standardize the memory story: an 8-H100 node can hold the FP16 weights, but not the full Adam training state. State that practical training requires tensor parallelism plus data-parallel optimizer sharding and/or gradient/optimizer offload, and include gradients consistently in per-GPU HBM totals."
