    line: 1425
    correction_type: numeric_consistency
    current_text: "Moving a byte of data from HBM to a register file consumes approximately 20 picojoules (pJ). Performing a floating-point multiply-accumulate operation on that byte consumes approximately 1 pJ. The energy cost of moving data is therefore 20$\\times$ the energy cost of computing on it."
    issue: "The energy section shifts units and ratios without signposting: this paragraph uses 20 pJ/byte and 20x, the notebook uses 4 pJ/bit for a 16-bit operand and 64x, and the worked 350 GB example concludes 32x. The summary returns to 20 pJ/byte and 20x."
    suggested_correction: "Normalize the comparison around one unit, such as pJ/bit, pJ/FP16 operand, or pJ/MAC, and explicitly explain any ratio changes caused by comparing one operand, two operands, bytes, or full-token weight movement."
    why: "The data-movement energy hierarchy is an important quantitative lesson; inconsistent ratios invite learners to focus on reconciling arithmetic instead of the intended systems insight."
    confidence: high
