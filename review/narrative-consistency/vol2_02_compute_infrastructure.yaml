    current_text: "This would require approximately 4--5 HBM stacks at current capacities, with a total interposer area exceeding 2,000 mm$^2$."
    issue: "The stated stack count is inconsistent with the chapter's own B200 example of 192 GB across 8 HBM stacks. At roughly 16--24 GB per stack, a 350 GB single-accelerator design would require on the order of 15--22 stacks, not 4--5."
