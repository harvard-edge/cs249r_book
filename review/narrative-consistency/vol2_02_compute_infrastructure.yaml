  - id: vol2_02_compute_infrastructure_001
    severity: major
    line: 652
    correction_type: example
    current_text: "Scenario: Generating one token for Llama-3 70B (140 GB weights in FP16) on an NVIDIA H100."
    issue: "The surrounding calculation loads 140 GB of weights from HBM at a single H100's 3.35 TB/s bandwidth, but an H100 has only 80 GB of HBM. The same pattern appears earlier for the 175B running example, whose 350 GB weights are also treated as if they can be streamed from one H100 at HBM speed."
    suggested_correction: "Either frame these as hypothetical bandwidth-floor calculations that intentionally ignore capacity, or recast the examples using a feasible placement: for example, a 70B FP16 model sharded across two H100s with aggregate bandwidth, an H200/B200 capacity example, or an INT8/INT4 inference example that fits on the stated hardware."
    why: "The chapter is teaching the distinction between capacity and bandwidth; using impossible single-GPU placements without qualification blurs that distinction just before the node section uses the same capacity gap to motivate multi-GPU systems."
    confidence: high
