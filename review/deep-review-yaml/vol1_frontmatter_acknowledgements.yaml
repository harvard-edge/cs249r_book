file: book/quarto/contents/vol1/frontmatter/acknowledgements.qmd
status: findings
summary: "The acknowledgments work well as frontmatter and have no citation, math, cross-reference, figure, table-caption, or listing defects. The remaining release issues are a few MIT Press prose and terminology violations plus contributor-list HTML/data problems in the generated GitHub contributor block."
findings:
  - severity: minor
    line: 5
    category: prose
    issue: "\"Bandwidth, latency, energy, memory, all the same physics, only the numbers change\" is a comma-spliced fragment."
    why: "The surrounding paragraph is strong, but this sentence drops below the formal MIT Press register and reads like a note rather than finished frontmatter prose."
    suggestion: "Revise as a complete sentence, for example: \"Bandwidth, latency, energy, and memory obey the same physics; only the numbers change.\""
  - severity: minor
    line: 5
    category: terminology
    issue: "\"data center accelerator\" uses an unhyphenated compound modifier."
    why: "The house style prefers \"data center\" as a noun phrase but hyphenates compounds when needed before a noun."
    suggestion: "Use \"data-center accelerator\" or recast as \"an accelerator in a data center.\""
  - severity: minor
    line: 12
    category: prose
    issue: "\"please visit\" and \"For those interested in contributing\" sound like web-site instructions rather than MIT Press frontmatter."
    why: "The prose standard favors formal textbook register and avoids conversational directive phrasing outside student-facing callouts."
    suggestion: "Use a neutral formulation such as \"The online version provides the complete, current contributor list\" and \"Contribution guidelines appear in the GitHub repository.\""
  - severity: minor
    line: 104
    category: qmd
    issue: "Several contributor avatar URLs contain duplicated or malformed query strings such as `?d=identicon&s=100?s=100`; line 229 similarly uses `?v=4?s=100`."
    why: "Malformed image URLs can produce inconsistent avatar sizing or broken images in the visible HTML acknowledgments page."
    suggestion: "Regenerate or normalize the contributor table so each image URL has a valid query string."
  - severity: minor
    line: 161
    category: consistency
    issue: "Fatima Shah appears twice in the generated contributor table, first at line 161 and again at line 217."
    why: "Duplicated names in an acknowledgments list can make the contributor roster look mechanically generated and insufficiently checked for release."
    suggestion: "Deduplicate the generated contributor list or verify that the duplicate is intentional."
  - severity: minor
    line: 263
    category: terminology
    issue: "\"GitHub actions\" is miscapitalized."
    why: "The canonical product name is \"GitHub Actions,\" and the same capitalization appears elsewhere in the book."
    suggestion: "Change to \"GitHub Actions.\""
notes: "No edits were made to the QMD source. The conditional contributor blocks appear structurally balanced, and the heading uses the required American spelling \"Acknowledgments.\""
