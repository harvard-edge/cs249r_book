file: "book/quarto/contents/vol2/backmatter/appendix_reliability.qmd"
status: findings
summary: "The appendix is technically coherent but not release-ready under the MIT Press prose standard. The main issues are repeated second-person/rhetorical-question usage in unprotected prose, uncited quantitative reliability claims, and generated-table mismatches."
findings:
  - severity: major
    line: 176
    category: prose
    issue: "The non-protected tip callout uses direct second-person address and a rhetorical question: 'You are planning...' and 'What is the probability...?'"
    why: "The prose rules permit 'you' and reader-facing questions only in learning-objectives and checkpoint callouts; this callout is `.callout-tip`."
    suggestion: "Rewrite the scenario declaratively or change the callout type only if it is meant to be a protected checkpoint."
  - severity: major
    line: 497
    category: prose
    issue: "The worked-example callout uses second person repeatedly in a non-protected `.callout-example` ('You are training...', 'your parallel storage system')."
    why: "Non-protected callouts must follow body-prose register, so second-person address violates the book prose standard."
    suggestion: "Recast as an impersonal setup, for example 'Consider a 175B-parameter training run...'."
  - severity: major
    line: 580
    category: citation
    issue: "The claim that published reports from Meta, Google, and others show 10--25 percent total overhead is quantitative and company-specific but has no citation."
    why: "Release prose needs evidence for quantitative operational claims, especially when naming organizations."
    suggestion: "Add citations to the relevant reports or soften/remove the company-specific claim."
  - severity: major
    line: 356
    category: citation
    issue: "The statement that newly deployed nodes exhibit 2--3x higher failure rates in their first week is an uncited quantitative claim."
    why: "The prose standard requires quantitative specificity to be supported by evidence rather than asserted."
    suggestion: "Cite the source for the burn-in multiplier or rephrase as a qualitative operational observation."
  - severity: minor
    line: 165
    category: prose
    issue: "The 'How to Use This Appendix' section uses direct reader address and question-form bullet labels throughout."
    why: "This is unprotected body prose, so 'Use it when you need...' and the rhetorical question bullets fall outside the permitted register."
    suggestion: "Convert the bullets to task-oriented noun phrases such as 'Failure frequency', 'Checkpoint interval', and 'Recovery loss'."
  - severity: minor
    line: 180
    category: prose
    issue: "A body sentence begins with 'But' and then addresses the reader directly: 'works against you'."
    why: "The standard forbids starting body sentences with coordinating conjunctions and forbids 'you' in body prose."
    suggestion: "Use a formal transition and name the affected system or operator explicitly."
  - severity: minor
    line: 304
    category: prose
    issue: "The body paragraph poses a rhetorical question about the probability that a job will be interrupted."
    why: "Rhetorical questions are forbidden in body prose except for the protected purpose hook and checkpoint/learning-objective contexts."
    suggestion: "State the engineering decision declaratively, such as 'Practitioners need the interruption probability for a fixed-duration job.'"
  - severity: minor
    line: 431
    category: figure
    issue: "The checkpoint-sizing code computes five model rows, including the 1T model, but the rendered table includes only rows 0 through 3."
    why: "The source and visible table disagree, and the surrounding text refers to frontier scale with '175B+ parameters'."
    suggestion: "Render the fifth row or remove the unused 1T entry from the computed data."
  - severity: minor
    line: 637
    category: qmd
    issue: "The availability-stacking code iterates over five replica counts, but the table renders only the first three rows and the code comment says '[1,2,3]'."
    why: "The generated data, source comment, and visible table are inconsistent, which makes later maintenance error-prone."
    suggestion: "Either render all five replica counts or restrict `R.avail_replicas` and the loop/comment to the three displayed rows."
  - severity: style
    line: 676
    category: prose
    issue: "The Fallacies and Pitfalls section uses bold paragraph starters for each item."
    why: "The MIT Press rules explicitly identify bold paragraph starters in body text as an operations-manual anti-pattern."
    suggestion: "Convert the items to proper subheadings, a definition list, or prose paragraphs without bold starter labels."
notes: "Reviewed only the requested appendix and wrote only this YAML file. No `.qmd` files were edited."
