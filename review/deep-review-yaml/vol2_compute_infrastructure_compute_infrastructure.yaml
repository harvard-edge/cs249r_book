file: book/quarto/contents/vol2/compute_infrastructure/compute_infrastructure.qmd
status: findings
summary: >
  The chapter is broad, quantitative, and generally coherent, but it is not release-ready.
  The main issues are a broken heading hierarchy after Purpose, repeated rhetorical
  question transitions in body prose, a malformed arithmetic-intensity callout, and
  several quantitative consistency problems in the Roofline and TCO discussions.
findings:
  - severity: major
    line: 166
    category: qmd
    issue: "The first substantive section after the unnumbered Purpose is marked as a level-3 heading, and several early sections remain at ###/#### until line 482."
    why: "This makes 'Accelerator spectrum', 'Wafer-scale engines', and the GPU/TPU evolution sections children of the Purpose section rather than top-level chapter sections, which will distort the chapter structure, mini-TOC, numbering, and PDF navigation."
    suggestion: "Promote the first substantive section and its sibling sections to the intended hierarchy, likely starting 'Accelerator Spectrum' at ##."
  - severity: major
    line: 187
    category: prose
    issue: "The accelerator section uses italic rhetorical questions as body transitions, including lines 187, 197, 213, 227, and 263."
    why: "The MIT Press prose standard permits a single Purpose hook and checkpoint questions, but forbids rhetorical questions in body prose."
    suggestion: "Replace these question-only transitions with declarative topic sentences that state the engineering trade-off."
  - severity: major
    line: 829
    category: math
    issue: "The Roofline ridge point is inconsistent: the footnote gives ~295 FLOP/byte for an H100, while the later figure caption and prose use ~591 FLOP/byte."
    why: "Both values cannot describe the same Roofline configuration; the difference appears to come from mixing FP16 and FP8 peak FLOPS. This undermines the diagnostic framework used throughout the chapter."
    suggestion: "Choose one precision for the H100 Roofline example and make the footnote, figure caption, plotted value, and prose agree."
  - severity: major
    line: 835
    category: prose
    issue: "The 'Arithmetic intensity' callout begins with a lowercase fragment: 'arithmetic intensity $(I)$ is applied...'."
    why: "The sentence appears to be missing its opening clause and does not define the term cleanly, so an important concept is introduced in broken prose."
    suggestion: "Restore a complete definition sentence before the equation."
  - severity: minor
    line: 855
    category: prose
    issue: "The Roofline exposition asks 'Where do specific ML workloads fall on this plot?' in body prose."
    why: "This is another rhetorical question outside the permitted contexts."
    suggestion: "Use a declarative transition such as 'Specific ML workloads occupy different regions of the plot depending on operation and batch size.'"
  - severity: minor
    line: 1459
    category: prose
    issue: "The benchmarking section opens with a rhetorical question: 'how should practitioners compare accelerators objectively?'"
    why: "The style guide forbids rhetorical questions in formal body exposition."
    suggestion: "State directly that objective comparison requires achieved-performance benchmarks rather than raw specifications."
  - severity: major
    line: 2165
    category: citation
    issue: "The environmental impact paragraph cites specific energy use, carbon intensity, Microsoft nuclear procurement, Google geothermal investment, and carbon outcomes without nearby citations."
    why: "These are precise, time-sensitive, and externally verifiable claims; release prose needs citations for public-company actions and quantitative environmental estimates."
    suggestion: "Add citations for the GPT-3 energy estimate, carbon-intensity values, and named corporate energy examples."
  - severity: minor
    line: 2165
    category: math
    issue: "Units are not spaced in '50g CO$_2$/kWh' and '400g CO$_2$/kWh'."
    why: "The book style requires a space between numbers and units."
    suggestion: "Use '50 g CO$_2$/kWh' and '400 g CO$_2$/kWh'."
  - severity: major
    line: 2231
    category: consistency
    issue: "The cooling paragraph says the running example uses a '128-rack training cluster', but nearby rack arithmetic uses 1,024 GPUs as 32 racks."
    why: "The same running example appears to shift between 32 racks and 128 racks, changing facility scale by 4x."
    suggestion: "Reconcile the rack count with the chosen GPU/node/rack assumptions or explicitly distinguish different cluster scenarios."
  - severity: major
    line: 2811
    category: consistency
    issue: "The TCO figure caption describes a 1,000-node H100 cluster (8,000 GPUs) but the surrounding TCO prose analyzes a 1,000-GPU/125-node cluster and the caption's cloud cost is closer to the smaller scale."
    why: "This mixes node count and GPU count, making the build-vs.-buy economics internally inconsistent."
    suggestion: "Use one cluster size throughout the TCO example and update the figure caption, plotted data, and prose totals accordingly."
  - severity: major
    line: 3073
    category: prose
    issue: "The planning-methodology example uses bold step starters inside a long body paragraph: '**Step 1**', '**Step 2**', and so on."
    why: "The prose standard explicitly flags bold paragraph starters as an operations-manual anti-pattern; here the dense paragraph also becomes hard to scan."
    suggestion: "Convert the worked example into flowing prose or a properly structured list with complete sentences."
  - severity: minor
    line: 3123
    category: math
    issue: "Numeric ranges use hyphens in prose, such as '7-10 pJ per bit' and '2-3 meters'."
    why: "MIT Press style calls for en dashes in numeric ranges."
    suggestion: "Change prose ranges to en dashes, for example '7–10 pJ per bit' and '2–3 meters'."
  - severity: minor
    line: 3237
    category: prose
    issue: "The Summary opens with a sentence fragment: 'Using the running example of training...'."
    why: "The fragment interrupts an otherwise strong summary and is a visible grammar error near the end of the chapter."
    suggestion: "Join it to the preceding or following sentence, or recast it as a complete sentence."
  - severity: minor
    line: 3327
    category: prose
    issue: "The chapter-connection callout begins a sentence with 'But'."
    why: "The prose standard forbids starting body or nonprotected callout sentences with coordinating conjunctions."
    suggestion: "Replace with 'However,' or restructure the sentence."
