file: book/quarto/contents/vol1/frontmatter/about.qmd
status: findings
summary: >
  The frontmatter gives a useful orientation to Volume I and generally fits the role of an
  "about this book" chapter, but it is not fully release-ready. The main issues are cross-format
  figure handling for the ML Systems Stack, repeated second-person address in body prose, informal
  or question-driven phrasing that conflicts with the MIT Press prose standard, and a few terminology
  and citation polish issues.
findings:
  - severity: major
    line: 56
    category: figure
    issue: >
      The main ML Systems Stack visual is inserted as a raw LaTeX block in content that is not gated
      to PDF.
    why: >
      Raw LaTeX blocks do not render in HTML, but the surrounding prose describes the stack and tells
      readers that a figure highlights chapter layers. HTML readers will lose the visual explanation
      that this section depends on.
    suggestion: >
      Use a cross-format figure with caption and alt text, or provide a PDF-only LaTeX block plus an
      equivalent HTML rendering.
  - severity: major
    line: 64
    category: figure
    issue: >
      The three example stack diagrams are raw LaTeX without figure labels, captions, or alt text.
    why: >
      The prose at line 86 interprets the diagrams' layer intensity and data bar values, but the
      diagrams are inaccessible, unreferenceable, and likely absent from HTML output.
    suggestion: >
      Convert the examples to labeled figure markup with accessible descriptions, or provide matched
      HTML/PDF renderings.
  - severity: major
    line: 7
    category: prose
    issue: >
      Body prose repeatedly addresses the reader directly with "you" and "your."
    why: >
      The MIT Press prose standard forbids second-person address in body prose outside learning
      objectives and checkpoint callouts. The pattern recurs at lines 22, 26, 28, 54, 118, 141, and
      160, making the frontmatter sound more like course-site copy than formal textbook prose.
    suggestion: >
      Replace second-person phrasing with reader-neutral descriptions or restrained "we" constructions.
  - severity: minor
    line: 24
    category: prose
    issue: >
      The disciplinary framing is written as a sequence of rhetorical questions.
    why: >
      The prose standard permits questions only in defined pedagogical contexts. This passage is
      body prose and would be more authoritative as a declarative contrast among computer science,
      ML research, and AI engineering.
    suggestion: >
      Recast the comparison as a declarative statement of what each field studies.
  - severity: minor
    line: 40
    category: prose
    issue: >
      The four part descriptions are framed as italicized questions and introduced by bold paragraph
      starters.
    why: >
      Lines 40, 43, 46, and 49 conflict with two house-style rules: avoid body-prose rhetorical
      questions and avoid bold paragraph-starter prose. The content is useful, but the format reads
      less like MIT Press frontmatter than a syllabus handout.
    suggestion: >
      Recast each part entry as a compact list item or table row with a declarative scope statement.
  - severity: minor
    line: 54
    category: consistency
    issue: >
      The text says "a margin figure" highlights the active stack layers, but the examples shown here
      are centered display blocks.
    why: >
      The mismatch can confuse readers about whether this page is showing the recurring margin device
      itself or a separate explanatory version of the same visual language.
    suggestion: >
      Clarify that the centered diagrams illustrate the recurring margin indicator, or make the layout
      match the described margin treatment.
  - severity: minor
    line: 11
    category: citation
    issue: >
      The historical claims about the 1968 NATO conference and the disciplinary role of Hennessy and
      Patterson are presented without local citations.
    why: >
      The passage makes specific historical claims that anchor the book's disciplinary argument. The
      later Patterson citation at line 26 helps, but the frontmatter would be stronger if the origin
      claim and architecture comparison were explicitly supported.
    suggestion: >
      Add citations for the NATO software engineering conference and the architecture textbook analogy,
      or soften the historical framing.
  - severity: minor
    line: 15
    category: prose
    issue: >
      The phrase "state-of-the-art accuracy" and the quoted "coding harder" formulation weaken the
      otherwise formal register.
    why: >
      The style guide flags unsupported "state-of-the-art" claims and informal phrasing. In frontmatter,
      this paragraph sets the book's tone, so casual language is especially visible.
    suggestion: >
      Replace the informal phrase and either quantify, cite, or generalize the accuracy claim.
  - severity: style
    line: 19
    category: terminology
    issue: >
      The invariant list uses inconsistent capitalization: "The iron law" appears beside "Data Gravity,"
      "The Energy-Movement Invariant," and "Amdahl's Law."
    why: >
      The book elsewhere names the framework as the "Iron Law of ML Systems" or refers to the lowercase
      "iron law" in running prose. In this frontmatter list, mixed capitalization makes canonical
      terminology look unsettled.
    suggestion: >
      Use the canonical display name for each listed invariant, especially "Iron Law of ML Systems."
  - severity: style
    line: 17
    category: prose
    issue: >
      Several em dashes are encoded as spaced or unspaced triple hyphens.
    why: >
      Lines 17, 52, 62, 86, and 160 use Markdown/LaTeX-style dash syntax where the style guide calls
      for proper punctuation and restrained dash use. This is mostly polish, but it is visible in
      release copy.
    suggestion: >
      Replace triple-hyphen em dashes with proper punctuation, often a colon or comma where the dash
      introduces an explanation.
notes: >
  Reviewed against the local MIT Press/book prose standard. Cross-references used in the reading-path
  section resolve to existing section labels, and @Patterson2021 exists in the Volume I bibliography.
  No source .qmd files were edited.
