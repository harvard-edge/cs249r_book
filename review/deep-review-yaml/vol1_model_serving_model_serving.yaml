file: book/quarto/contents/vol1/model_serving/model_serving.qmd
status: findings
summary: >
  The chapter is broadly coherent and technically rich, but it is not fully release-ready. The main issues are malformed inline Python inside math, a few contradictory transitions/examples, unsupported time-sensitive pricing claims, one dimensionally suspect equation, and recurring MIT Press prose-style violations in nonprotected callouts.
findings:
  - severity: major
    line: 2363
    category: qmd
    issue: "Inline Python expressions are embedded inside LaTeX math environments."
    why: "Quarto inline code is used inside `\\(...\\)` and `$$...$$` at lines 2363, 2373, 2379, and similarly at line 2637. Markdown evaluation inside math is fragile and can render literal backticks or fail, especially in PDF output."
    suggestion: "Move computed values outside math mode or render the full equation as prose/table text with evaluated inline Python outside the LaTeX delimiters."
  - severity: major
    line: 1725
    category: consistency
    issue: "The transition contradicts the immediately preceding DLRM example."
    why: "The DLRM table and explanation identify embedding lookups as the bottleneck, but the next paragraph says the actual bottleneck is image decoding on CPU. That returns to the ResNet example without signaling the shift and makes the DLRM example feel misplaced."
    suggestion: "Either revise the transition to compare the two bottleneck profiles explicitly or move the CPU image-decoding sentence back to the ResNet discussion."
  - severity: major
    line: 3425
    category: math
    issue: "The optimal batching-window formula appears dimensionally inconsistent and unsupported."
    why: "`sqrt(S / lambda)` combines service time and arrival rate in a way that does not yield a time unit under the surrounding definitions. The equation also receives no derivation or citation, yet it is presented as the quantitative basis for the table that follows."
    suggestion: "Derive the expression, cite a source, or replace it with a clearly labeled heuristic whose units match the defined variables."
  - severity: major
    line: 4262
    category: consistency
    issue: "The Llama-3-8B case study is introduced with a 70B-class KV-cache figure."
    why: "The section says it analyzes Llama-3-8B, but @fig-kv-cache-growth and its caption use 70B-class assumptions. The reader encounters a 70B memory model immediately before an 8B workload profile, which blurs which numbers belong to the case study."
    suggestion: "Either make the figure an explicitly separate 70B contrast before the case study or regenerate/relabel it for the Llama-3-8B assumptions."
  - severity: major
    line: 197
    category: citation
    issue: "Time-sensitive public API price data is presented without source citations."
    why: "The intelligence-deflation figure uses named model API prices from 2020-2025 and the chapter later relies on the trend economically, but the caption only says the values are representative. Public model prices change frequently, so release text needs dated sources or a reproducible data note."
    suggestion: "Add citations or a dated source note for the price snapshots and clarify the retrieval date."
  - severity: minor
    line: 4228
    category: citation
    issue: "Cloud instance pricing is dated only as 'as of this writing' and lacks a source."
    why: "The cost table depends on volatile AWS on-demand prices and region assumptions. Without a concrete date and citation, readers cannot audit or update the economics."
    suggestion: "Replace 'as of this writing' with a specific date and cite the pricing source or mark the table as illustrative."
  - severity: minor
    line: 119
    category: figure
    issue: "Figure alt text contains typographic artifacts and odd spacing."
    why: "The alt text says `“ Safe Zone ”` and `“ Danger Zone.”`, which may render awkwardly and does not match the book's polished alt-text standard."
    suggestion: "Remove the extra spaces and curly-quote artifacts from the alt text."
  - severity: minor
    line: 1059
    category: figure
    issue: "Figure alt text has malformed spacing around words and punctuation."
    why: "The alt text contains `six -stage`, `pipeline :`, and `accelerator .`, which reads like an OCR or generation artifact."
    suggestion: "Normalize the alt text to standard spacing and punctuation."
  - severity: style
    line: 103
    category: prose
    issue: "Nonprotected callouts repeatedly use bold paragraph-starter labels."
    why: "The prose guide flags bold paragraph starters as an operations-manual pattern, and nonprotected callouts follow the same register rules. Examples include `The scenario`, `The event`, `Failure`, `Physics`, and `Fix` in the Black Friday callout, with similar `Key insight` labels throughout."
    suggestion: "Convert labeled fragments into flowing explanatory prose or compact lists only where the callout type requires them."
  - severity: style
    line: 2288
    category: prose
    issue: "The sentence uses a banned announcement transition."
    why: "`We can now apply these tools` matches the guide's AI-pattern transition class and announces structure rather than advancing the argument."
    suggestion: "State the consequence directly, such as that the queuing model now determines the capacity-planning inputs."
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. No .qmd files were edited."
