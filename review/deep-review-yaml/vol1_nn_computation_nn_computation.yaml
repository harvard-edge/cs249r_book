file: book/quarto/contents/vol1/nn_computation/nn_computation.qmd
status: findings
summary: "The chapter is broadly coherent and textbook-oriented, but it is not release-clean. The main issues are a sentence fragment in the loss-to-backpropagation transition, inconsistent use of FLOPS/FLOPs for total training compute, duplicated D.A.M transition prose, and several MIT Press prose/style violations involving rhetorical questions, bold paragraph starters, ranges, and inconsistent compounds."
findings:
  - severity: major
    line: 3972
    category: prose
    issue: "The transition into credit assignment contains a sentence fragment: 'With ... parameters ..., determining which weights should change...'"
    why: "This breaks the explanatory flow at a key conceptual handoff from loss functions to backpropagation."
    suggestion: "Make the dependent clause into a complete sentence that states the task is intractable without backpropagation."
  - severity: major
    line: 1328
    category: math
    issue: "The figure caption and alt text describe 'training compute in FLOPS,' while the nearby table uses 'Train FLOPs' for total training operations."
    why: "FLOPS is a rate; FLOPs is a count. The inconsistency can mislead readers about whether the plot shows hardware throughput or total training compute."
    suggestion: "Use 'training compute in FLOPs' for total operations, or 'FLOP/s' only if the plotted quantity is throughput; align the caption, alt text, prose at line 1599, and any axis label."
  - severity: minor
    line: 5149
    category: flow
    issue: "The paragraph before the D.A.M Taxonomy heading and the first paragraph under it repeat the same claim about USPS succeeding because Algorithm, Data, and Machine aligned."
    why: "The repetition weakens the section transition and makes the new section feel like a restart rather than a progression."
    suggestion: "Keep one version of the alignment claim and use the other paragraph to advance into the three-axis analysis."
  - severity: minor
    line: 2242
    category: prose
    issue: "Numeric ranges use a hyphen in prose/table text, for example '5-15 percent' and later '10-25K A100s.'"
    why: "The MIT Press rule calls for en dashes in ranges; hyphenated ranges look like copyediting residue."
    suggestion: "Change prose ranges to en dashes, such as '5–15 percent' and '10–25K A100s.'"
  - severity: minor
    line: 4611
    category: terminology
    issue: "The chapter alternates between 'post-processing' and 'postprocessing' for the same pipeline stage."
    why: "Inconsistent compounds make the production pipeline terminology look unsettled; the inconsistency appears in nearby prose, captions, objectives, and takeaways."
    suggestion: "Choose one house form for the compound and apply it consistently across the chapter."
  - severity: style
    line: 1324
    category: prose
    issue: "A footnote ends with direct rhetorical questions: 'does this work?' and 'what hardware would make this work?'"
    why: "The prose rules forbid rhetorical questions outside the protected Purpose hook and checkpoint/learning-objective contexts."
    suggestion: "Convert the questions into a declarative engineering criterion."
  - severity: style
    line: 5210
    category: prose
    issue: "The Summary opens by restating the chapter hook as a rhetorical question."
    why: "Summary body prose is not a protected question context under the MIT Press standard."
    suggestion: "Restate the hook declaratively, then summarize the answer."
  - severity: style
    line: 733
    category: prose
    issue: "The 'When to use neural networks' callout relies on bold paragraph/list starters such as 'Use neural networks when,' 'Use simpler methods when,' and 'The baseline test.'"
    why: "The book-prose rules identify bold paragraph starters as an operations-manual pattern, and non-protected callouts follow normal register rules."
    suggestion: "Convert the labels into ordinary prose introductions or table headings without bold paragraph-starter syntax."
  - severity: style
    line: 594
    category: prose
    issue: "The sentence repeats 'more radical' in close succession: 'point toward a more radical solution... motivated a more radical approach.'"
    why: "The repetition sounds unrevised and slows the transition from handcrafted features to learned representations."
    suggestion: "Remove one occurrence and make the causal relation direct."
  - severity: minor
    line: 4683
    category: figure
    issue: "The USPS figure caption spells the city name as 'BurBank,' while the alt text uses 'Burbank.'"
    why: "The mismatch looks like a typo or OCR artifact in figure metadata and may confuse accessibility text review."
    suggestion: "Verify the source image; if it is not intentionally mixed-case on the mail sample, standardize to 'Burbank.'"
notes: "No .qmd files were edited. Review focused on release-readiness prose, QMD/cross-reference surface checks, terminology consistency, and textbook flow against the MIT Press/book prose standard."
