file: "book/quarto/contents/vol1/frontmatter/_notation_body.qmd"
status: "findings"
summary: "The notation material is mostly coherent and useful, but it needs a release pass for house-style compliance, precise cross-references, and a few overbroad technical claims."
findings:
  - severity: "style"
    line: 10
    category: "prose"
    issue: "The opening paragraph uses second person and a section meta-opener: \"which community you are reading\" and \"This section establishes...\"."
    why: "The MIT Press prose standard forbids second-person address in body prose and flags \"This section...\" openings as lecture-note or generated-prose register."
    suggestion: "Use impersonal phrasing and make the notation convention itself the subject."
  - severity: "minor"
    line: 16
    category: "qmd"
    issue: "References to \"the Introduction\" on lines 16, 61, and 77 are manual prose references rather than Quarto cross-references."
    why: "The book style prefers lowercase prose references and Quarto anchors; manual capitalized references are fragile, especially because this partial is shared by both volumes."
    suggestion: "Use the existing equation anchors where possible: @eq-intro-iron-law, @eq-degradation, and @eq-energy-cost."
  - severity: "major"
    line: 41
    category: "consistency"
    issue: "The example says reducing data volume through a smaller model or quantization preserves accuracy."
    why: "Smaller models and quantization often trade accuracy for memory or latency; presenting accuracy as preserved contradicts the book's no-free-lunch framing for optimizations."
    suggestion: "Qualify the outcome as technique-dependent, or distinguish lossless traffic reduction from compression that may affect accuracy."
  - severity: "minor"
    line: 45
    category: "math"
    issue: "The INT8 example says quantization cuts memory traffic to one quarter without stating the baseline precision."
    why: "INT8 is one quarter of FP32 storage but one half of FP16/BF16 storage; the current sentence can mislead readers in a notation page meant to remove ambiguity."
    suggestion: "State the baseline, for example FP32-to-INT8, or phrase the reduction conditionally."
  - severity: "style"
    line: 104
    category: "prose"
    issue: "The Units and Precision list uses bold label starters and a Markdown triple-hyphen dash in running prose."
    why: "The prose standard discourages bold paragraph starters in body text and requires proper dash characters rather than `---` in prose."
    suggestion: "Convert the labels to plain list text or table entries, and replace `throughout---meters` with a proper em dash or a sentence break."
  - severity: "minor"
    line: 117
    category: "prose"
    issue: "The closing quick-reference lead-in uses an imperative reader address: \"watch for these common collision points\"."
    why: "Although it avoids \"you,\" the imperative tone is less formal than the surrounding reference material and reads like study-guide prose."
    suggestion: "Use an impersonal construction such as \"Common collision points include...\"."
notes: "Citation key @goodfellow2016deep exists in the Vol. 1 bibliography. The symbol tables are internally consistent overall, including the deliberate P_t/P_0 distribution notation and the ML-first collision policy."
