file: book/quarto/contents/vol2/frontmatter/notation.qmd
status: findings
summary: "The wrapper is structurally simple, but the rendered notation material has several release-readiness issues in the included partials: informal/direct-address prose, manual introduction references, and one dimensional-clarity problem in the reliability notation."
findings:
  - severity: style
    line: 10
    category: prose
    issue: "The included shared notation text uses direct address and a section meta-announcement: \"depending on which community you are reading\" and \"This section establishes our notation.\""
    why: "The prose rules forbid second-person address in body prose and discourage section meta-openers; the frontmatter should still match the MIT Press textbook register."
    suggestion: "Recast without direct address, for example by referring to the notation communities or the reader's literature context indirectly, and state the purpose without \"This section...\"."
  - severity: minor
    line: 16
    category: qmd
    issue: "Several references to the introduction are written manually, including \"see the Introduction\" and \"see iron law in the Introduction\" in the shared notation include."
    why: "Manual prose references are fragile and violate the house rule favoring lowercase prose references or Quarto cross-references; they also lose linkability in rendered output."
    suggestion: "Use the appropriate Quarto section cross-reference for the introduction/iron law, or lowercase the prose reference if no target exists."
  - severity: style
    line: 38
    category: prose
    issue: "The ambiguity example asks the body-prose question \"Does this mean:\" before listing alternatives."
    why: "Rhetorical questions are disallowed in body prose except protected hooks/checkpoints, and this page is ordinary frontmatter exposition."
    suggestion: "Replace the question with a declarative lead-in such as \"The sentence has two possible readings:\"."
  - severity: minor
    line: 51
    category: math
    issue: "The reliability equation defines $R_{\\text{system}}(t) = e^{-N\\lambda t}$, while the table later gives $\\lambda$ in failures/hour but does not specify the required unit for $t$ in the equation."
    why: "The exponent must be dimensionless; readers need to know whether $t$ is measured in hours or converted to match the failure-rate unit."
    suggestion: "State near the equation or table that $t$ must use the same time unit as $\\lambda^{-1}$, for example hours when $\\lambda$ is failures/hour."
notes: "Line references point to the source lines in included partials: book/quarto/contents/vol1/frontmatter/_notation_body.qmd and book/quarto/contents/vol2/frontmatter/_notation_distributed.qmd. No .qmd files were edited."
