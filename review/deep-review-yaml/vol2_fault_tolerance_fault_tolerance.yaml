file: book/quarto/contents/vol2/fault_tolerance/fault_tolerance.qmd
status: findings
summary: "The chapter is technically rich and generally coherent, but it is not release-ready. The main issues are MIT Press prose-standard violations in callouts and transitions, several unsupported quantitative case-study claims, a duplicated maintenance sentence, one malformed checkpoint-storage sentence, and some number/range style problems."
findings:
  - severity: major
    line: 293
    category: prose
    issue: "A non-protected `.callout-notebook` uses direct second person: \"You have a cluster\" and asks a quiz-style question."
    why: "The prose standard permits second-person address and questions only in learning objectives and checkpoint callouts. Notebook/example callouts must follow body-prose register."
    suggestion: "Convert the prompt to declarative setup language or change the callout type if it is intended as a protected checkpoint."
  - severity: major
    line: 1741
    category: prose
    issue: "The non-protected notebook callout uses \"your\" twice and relies on an alarmist phrase, \"Numerical Garbage.\""
    why: "Second person is prohibited outside learning-objectives/checkpoint callouts, and the register reads closer to blog/war-story prose than MIT Press textbook prose."
    suggestion: "Recast as an impersonal systems claim and use a precise term such as silent parameter corruption."
  - severity: minor
    line: 744
    category: flow
    issue: "The paragraph repeats the same idea in adjacent sentences: predictive analytics using GPU telemetry targets wear-out, then predictive analytics using GPU telemetry can identify components likely to fail soon."
    why: "The duplication weakens paragraph flow and makes the section feel mechanically assembled."
    suggestion: "Merge the two predictive-maintenance sentences into one concise operational implication."
  - severity: minor
    line: 1058
    category: prose
    issue: "The phrase \"validational redundancy\" is nonstandard."
    why: "The likely intended term is validation redundancy or redundant validation; the current wording reads like a typo."
    suggestion: "Replace with \"validation redundancy\" or \"redundant validation.\""
  - severity: minor
    line: 1852
    category: qmd
    issue: "\"Radiation or Beam Testing.\" appears as a sentence fragment where the surrounding structure suggests a subsection label."
    why: "A bare title-like fragment interrupts the hardware fault injection taxonomy and may indicate a missing Markdown heading."
    suggestion: "Make it a proper heading or fold it into the following sentence."
  - severity: major
    line: 2322
    category: prose
    issue: "The sentence around the storage cross-reference is grammatically malformed: \"described in @sec-data-storage—with ..., provides...\""
    why: "The opening em dash is not closed, and the comma before \"provides\" leaves the subject/predicate relationship broken."
    suggestion: "Close the parenthetical phrase or replace it with commas before \"provides the storage foundation.\""
  - severity: minor
    line: 2363
    category: math
    issue: "The math phrase uses an en dash inside inline math: \"$k=1–3$\"."
    why: "Ranges inside math should be expressed unambiguously; the en dash can render awkwardly and is less precise than interval or prose notation."
    suggestion: "Use \"$k \\in \\{1,2,3\\}$\", \"$1 \\le k \\le 3$\", or \"typically $k$ is 1 to 3.\""
  - severity: style
    line: 2624
    category: prose
    issue: "The paragraph uses repetitive sentence frames: \"For fault tolerance... For resource efficiency... For preemption handling... For cost optimization...\""
    why: "The list-like rhythm weakens the textbook narrative voice and reads more like outline prose."
    suggestion: "Condense the advantages into a connected paragraph that explains the causal trade-offs."
  - severity: minor
    line: 3289
    category: prose
    issue: "The case-study section opens with a rhetorical question in body prose."
    why: "The prose rules forbid rhetorical questions outside the chapter purpose hook and protected checkpoint/learning-objective contexts."
    suggestion: "Replace with a declarative thesis about how production systems operationalize the chapter's principles."
  - severity: major
    line: 3293
    category: citation
    issue: "The case studies contain many concrete operational claims without nearby citations, including OPT-175B failure counts, Google TPU pod recovery targets, Netflix MTTR reduction, and DeepSpeed overhead figures."
    why: "MIT Press textbook prose requires quantitative specificity to be supported by evidence; these claims are too specific to stand uncited."
    suggestion: "Add citations at the relevant paragraphs or soften/remove numbers that cannot be sourced."
  - severity: minor
    line: 3303
    category: math
    issue: "The range \"1-2 times per day\" uses a hyphen rather than an en dash or prose range."
    why: "House style uses en dashes for numeric ranges and clear spacing around units."
    suggestion: "Change to \"1–2 times per day\" or \"one to two times per day.\""
  - severity: style
    line: 3321
    category: prose
    issue: "The sentence starts with \"The lesson here is\" and says the framework \"democratizes fault tolerance.\""
    why: "The style guide flags lesson-announcement phrasing and marketing-like abstractions as non-textbook register."
    suggestion: "State the engineering implication directly: elasticity shifts resilience into the framework layer and reduces the need for bespoke recovery code."
  - severity: style
    line: 3444
    category: prose
    issue: "The closing connection begins with passive recap phrasing, \"It has been established,\" and then starts the next sentence with \"But.\""
    why: "Both patterns violate the prose standard: AI-style recap openers and body sentences beginning with coordinating conjunctions are forbidden."
    suggestion: "Start with a direct transition from resilience mechanisms to orchestration requirements, using \"However\" or a restructured sentence."
  - severity: minor
    line: 3416
    category: math
    issue: "The ranges \"0.01-0.1 percent\" and \"1-10 silent GPU corruption events\" use hyphens."
    why: "Numeric ranges should use en dashes or prose ranges; hyphenated ranges are a copyediting issue in release text."
    suggestion: "Use \"0.01–0.1 percent\" and \"1–10 silent GPU corruption events,\" or spell the ranges out."
notes: "I reviewed the chapter source only and wrote this YAML output file. I did not edit any `.qmd` files."
