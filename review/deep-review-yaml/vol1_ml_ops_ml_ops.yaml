file: book/quarto/contents/vol1/ml_ops/ml_ops.qmd
status: findings
summary: "The chapter is substantively strong and the single-chapter HTML render completed with all Python cells executed, but it is not release-clean. The most important issue is a malformed display equation in the retraining economics section. The prose also has repeated departures from the MIT Press standard: rhetorical questions outside protected callouts, bold paragraph-starter structures, informal phrasing, and unsupported precise quantitative claims."
findings:
  - severity: major
    line: 1417
    category: math
    issue: "The display equation for retraining cost has unbalanced TeX: `\\text{Retraining Cost}` is missing the closing brace before the equals sign."
    why: "Pandoc can pass this through to HTML, but MathJax/LaTeX rendering will fail or display incorrectly for a central equation in the retraining economics derivation."
    suggestion: "Close the `\\text{...}` group before `=` and verify the equation in PDF/HTML output."
  - severity: major
    line: 147
    category: citation
    issue: "The MLOps definition callout gives precise production claims, including 10-20 percent accuracy loss, a KL-style threshold, and MTTR reduction from days to under one hour, without a source tied to those numbers."
    why: "The prose standard requires quantitative specificity to be supported by evidence. Unsupported operational benchmarks read as invented precision in a release textbook chapter."
    suggestion: "Add citations or qualify these as illustrative examples with clearly stated assumptions."
  - severity: major
    line: 153
    category: citation
    issue: "The retail failure example states a 15 percent sales boost, five percent later loss, and estimated USD 10 million revenue loss without citation or framing as a hypothetical calculation."
    why: "The example is presented as a real-world failure, but the absence of attribution makes the business-impact claim unverifiable."
    suggestion: "Cite the case source, or recast the paragraph as a hypothetical scenario with assumptions."
  - severity: minor
    line: 60
    category: prose
    issue: "A non-protected `callout-perspective` uses a sequence of rhetorical questions: `Is the server running?`, `Is latency acceptable?`, and similar questions on line 62."
    why: "The prose rules permit questions only in the Purpose hook and Learning Objectives/Checkpoint callouts; perspective callouts follow body-prose register rules."
    suggestion: "Rephrase as declarative monitoring objectives or move the question form to a checkpoint."
  - severity: minor
    line: 2536
    category: prose
    issue: "The incident-response opening uses four consecutive rhetorical questions in body prose."
    why: "The scenario is effective, but the question sequence violates the MIT Press rule against rhetorical questions in exposition and makes the passage feel more like a blog post."
    suggestion: "Convert the questions into declarative uncertainty categories that the responder must distinguish."
  - severity: minor
    line: 397
    category: prose
    issue: "The notebook callout is structured with bold paragraph starters such as `Problem`, `Physics`, `Calculation`, `Broader pattern`, and `Systems conclusion`; similar bold-starter patterns recur in later callouts."
    why: "The prose standard explicitly flags bold paragraph starters as an operations-manual anti-pattern, especially when they substitute labels for narrative flow."
    suggestion: "Keep compact labels only where the callout template requires them; otherwise convert the callout into short connected prose."
  - severity: minor
    line: 2884
    category: prose
    issue: "The phrase `a Jupyter notebook, a cron job, and a prayer` is too colloquial for the MIT Press textbook register."
    why: "The chapter otherwise aims for formal systems-textbook prose; this idiom breaks register at the start of a major section."
    suggestion: "Replace with a precise description of an ad hoc manual deployment stack."
  - severity: minor
    line: 2884
    category: prose
    issue: "The same paragraph contains the banned section meta-opener `This section first defines...`."
    why: "The prose rules prohibit section self-announcements and prefer opening with the concrete stake or logical transition."
    suggestion: "State the maturity-framework consequence directly instead of announcing the section sequence."
  - severity: style
    line: 94
    category: prose
    issue: "Several prose footnotes use ASCII double hyphens for em dashes, for example `software -- distribution shift`; similar instances appear at lines 333, 777, 884, 1249, 1313, 1582, 1598, 1600, 2068, and 2072."
    why: "The house style requires proper dash characters; double hyphens are an unrevised manuscript artifact."
    suggestion: "Replace prose `--` with the appropriate em dash or rephrase with punctuation."
  - severity: style
    line: 1693
    category: prose
    issue: "`5-10 seconds` uses a hyphenated range; similar hyphen ranges appear in prose/table text such as `50-85 percent` and `5-15 percent`."
    why: "The prose rules require en dashes for ranges."
    suggestion: "Use en dashes for numeric ranges: `5–10 seconds`, `50–85 percent`, and `5–15 percent`."
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. Single-chapter render command completed and produced HTML in /private/tmp/mlsysbook-math-render; unresolved cross-reference warnings appear consistent with rendering this chapter outside the full book context, and the local `margin-video` shortcode warning was not treated as a chapter-source finding."
