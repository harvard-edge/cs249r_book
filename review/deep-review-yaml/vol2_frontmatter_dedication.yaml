file: "book/quarto/contents/vol2/frontmatter/dedication.qmd"
status: findings
summary: "The dedication prose is clean and appropriate for frontmatter, and the PDF/HTML paths are intentionally formatted. The release issue is format coverage: the EPUB build includes this file, but the readable dedication text is hidden behind an HTML-only conditional while the LaTeX block is ignored outside PDF."
findings:
  - severity: major
    line: 23
    category: qmd
    issue: "The fallback dedication text is wrapped in `content-visible when-format=\"html\"`, so EPUB output may omit the dedication content entirely."
    why: "Volume II's EPUB configuration includes this QMD file, but EPUB will ignore the raw LaTeX block and may not satisfy the HTML-only visibility condition. That leaves the EPUB dedication page blank or missing its readable content."
    suggestion: "Make the fallback visible for EPUB as well, for example by changing the conditional to a non-PDF/non-LaTeX visibility rule or adding an EPUB-visible dedication block."
notes: "No prose, grammar, citation, cross-reference, math, figure, or terminology issues found in the dedication text itself. Review only; no render was run and no QMD files were edited."
