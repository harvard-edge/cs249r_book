file: book/quarto/contents/vol1/parts/deploy_principles.qmd
status: findings
summary: "Part IV functions well as a concise principles opener, but it has several MIT Press register violations and a few notation/terminology inconsistencies that should be resolved before release."
findings:
  - severity: minor
    line: 6
    category: math
    issue: "The verification-gap probability is written as P(...) while the same principle is restated elsewhere with \\Pr(...)."
    why: "Principle equations should use stable notation across the part opener and later synthesis; inconsistent probability notation makes the invariant look less canonical."
    suggestion: "Use the same probability operator used in the conclusion, e.g. \\Pr(f(X) \\approx Y) > 1 - \\epsilon."
  - severity: style
    line: 12
    category: prose
    issue: "The sentence begins with the coordinating conjunction 'But'."
    why: "The MIT Press prose rules forbid starting body exposition with coordinating conjunctions."
    suggestion: "Revise to 'However, even those bounds erode over time:' or fold the contrast into the previous sentence."
  - severity: minor
    line: 18
    category: math
    issue: "The statistical-distance term uses D(P_t \\| P_0), while the book's conclusion table uses \\mathcal{D}(P_t \\lVert P_0)."
    why: "The principle's formula should match its later canonical restatement so readers do not infer a change in definition or norm."
    suggestion: "Align the operator and delimiter notation with the conclusion table, unless this part opener is intended to define a different distance."
  - severity: style
    line: 24
    category: prose
    issue: "The phrase 'your own systems' uses second person in body prose."
    why: "The house style permits second person only in learning objectives and checkpoint callouts, not in part-opening exposition."
    suggestion: "Replace with 'the deployed system,' 'the serving pipeline,' or 'an organization's own systems.'"
  - severity: minor
    line: 28
    category: math
    issue: "The training-serving skew equation is written as a proportionality, but the conclusion table restates the same invariant as an approximation."
    why: "A named invariant should have one stable mathematical form across the book; proportionality and approximation communicate different levels of commitment."
    suggestion: "Choose one canonical form and align this equation with the conclusion table or update both consistently."
  - severity: minor
    line: 37
    category: terminology
    issue: "The latency percentiles are written as lowercase p95, p99, and p99.9 while other book summaries use uppercase P99."
    why: "Latency percentile notation should be consistent across principle statements and later chapter/conclusion references."
    suggestion: "Standardize on the book's preferred percentile notation, likely P95, P99, and P99.9."
  - severity: minor
    line: 37
    category: prose
    issue: "The sentence 'a tail-latency SLO, often p95, p99, p99.9, or an application-specific deadline, is the hard constraint' is grammatically compressed."
    why: "The parenthetical list reads as if an SLO itself is 'p95' rather than being measured at a percentile or deadline, which can slow comprehension."
    suggestion: "Clarify the apposition, for example by saying the SLO is defined at P95, P99, P99.9, or by an application-specific deadline."
  - severity: style
    line: 40
    category: terminology
    issue: "'Tail-Tolerant' is bolded and capitalized as if it were a named framework."
    why: "The prose rules discourage unnecessary emphasis, and the capitalization is inconsistent with ordinary technical usage unless the book defines this as a formal term."
    suggestion: "Use 'tail-tolerant designs' without bold or define the term if it is intended as a named concept."
notes: "No malformed QMD block structure was found in this short part opener. The principle callout pattern appears consistent with other Vol. 1 part openers."
