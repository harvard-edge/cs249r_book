file: book/quarto/contents/vol2/edge_intelligence/edge_intelligence.qmd
status: findings
summary: "The chapter is technically rich but not release-clean. The main risks are a few contradictory figure/table claims, an incorrect non-IID definition and convergence equation, non-protected callouts that violate the prose standard, and several production-style typos/number-format issues."
findings:
  - severity: major
    line: 302
    category: terminology
    issue: "The footnote expands non-IID as 'Non-Independent and Identically Distributed.'"
    why: "Non-IID means not independent and identically distributed; the current expansion changes the statistical meaning by implying identical distributions with dependence."
    suggestion: "Change the expansion to 'not independent and identically distributed' and keep 'non-IID' lowercase in prose except at sentence start."
  - severity: major
    line: 308
    category: consistency
    issue: "The figure caption labels region A as Local Only and region B as Centralized Cloud, but the prose below the figure says region A is centralized cloud and region B is local adaptation."
    why: "Students will read the figure and the explanatory text as contradictory, which undermines the conceptual transition among local, centralized, and federated learning."
    suggestion: "Align the prose with the caption or relabel the figure regions so A/B/C mean the same thing in both places."
  - severity: major
    line: 972
    category: consistency
    issue: "The constraint-solution mapping introduces three solution pillars, but the table only covers Resource Amplification and Information Scarcity; Federated Coordination is absent."
    why: "The preceding text explicitly says the framework has three categories and three pillars, so the table omits a central piece of the chapter's organizing structure."
    suggestion: "Add a Coordination Challenges row mapping heterogeneity, intermittent connectivity, and distributed validation to Federated Coordination."
  - severity: major
    line: 2255
    category: math
    issue: "The convergence bound uses F(theta) as the comparator and the non-IID bound later multiplies the leading term by beta, so setting beta = 0 would make the whole bound vanish rather than reduce to the IID rate."
    why: "The math as written conflicts with the explanation at line 2271 and may teach an incorrect convergence relationship."
    suggestion: "Use a standard comparator such as theta-star and express heterogeneity as an added penalty term rather than multiplying the base IID rate by beta."
  - severity: major
    line: 2383
    category: flow
    issue: "The client scheduling section repeats the same mitigation point in consecutive paragraphs: line 2383 introduces stratified/quota/fairness-budget sampling, and line 2385 reintroduces adaptive client selection with underrepresented data and geographies."
    why: "The repetition weakens the textbook flow and reads like stitched notes rather than a single causal argument."
    suggestion: "Merge the two paragraphs and keep one progression from participation bias to representative sampling and availability prediction."
  - severity: major
    line: 2976
    category: prose
    issue: "The performance-metrics paragraph contains multiple comma splices and overlong sentences."
    why: "The paragraph is difficult to parse and falls below the MIT Press prose standard for line-level clarity."
    suggestion: "Split the metrics into separate sentences or a compact list; make each metric definition, example, and implication distinct."
  - severity: minor
    line: 160
    category: prose
    issue: "Several non-protected callout-notebook blocks use direct second person and rhetorical questions, including lines 160, 921, 1024, and 1819."
    why: "The book prose rules permit 'you' and direct questions only in learning-objectives and checkpoint callouts; notebook callouts follow body-prose register."
    suggestion: "Rewrite notebook prompts declaratively, for example as design scenarios, without 'you/your' questions."
  - severity: minor
    line: 597
    category: figure
    issue: "The TikZ label says 'Online Adaptive Learning on loT Devices' with a lowercase ell instead of capital I in IoT."
    why: "The typo appears inside a rendered figure and will be visible in the release output."
    suggestion: "Correct the figure text to 'IoT Devices'."
  - severity: minor
    line: 1605
    category: consistency
    issue: "The adaptation-strategy table caption says it characterizes 'bias-only updates, selective layer updates, and full finetuning,' but the table rows are Bias-Only Updates, Residual Adapters, and Sparse Layer Updates."
    why: "The caption contradicts the table contents and omits residual adapters while naming full finetuning, which is not a row."
    suggestion: "Revise the caption to match the three table rows."
  - severity: minor
    line: 2279
    category: qmd
    issue: "The worked example begins as plain text, 'Worked Example: Federated Learning with 100 Clients,' rather than a heading, callout, or captioned example."
    why: "The example can be visually lost in the surrounding convergence analysis and does not follow the chapter's structured QMD patterns."
    suggestion: "Format it as a proper subsection or worked-example callout."
  - severity: minor
    line: 2309
    category: math
    issue: "The figure caption writes the epoch range as '$E = 2$-$5$'."
    why: "The hyphen between math fragments can typeset awkwardly and does not express a range as cleanly as an en dash or single math expression."
    suggestion: "Use '$E = 2\\text{--}5$' or prose such as 'between 2 and 5'."
  - severity: minor
    line: 2369
    category: prose
    issue: "The phrase 'embraces chaos' is informal for MIT Press textbook register."
    why: "The prose standard asks for authoritative academic prose and avoids blog-style dramatic phrasing."
    suggestion: "Replace with a precise statement about tolerating asynchronous dropouts and stragglers."
  - severity: style
    line: 938
    category: prose
    issue: "Several numeric ranges use hyphens instead of en dashes, including '2-4 GB,' '1-2 GB,' '64 MB-1 GB,' and '256 KB-2 MB'; similar cases appear at lines 940, 952, 2655, 2657, and 3094."
    why: "The house style requires en dashes for numeric ranges and spaces between numbers and units."
    suggestion: "Replace hyphenated ranges with en dashes and add unit spacing where needed, for example '2--4 GB' in QMD source."
  - severity: style
    line: 3094
    category: prose
    issue: "The sentence uses unspaced units: '48MHz,' '3GHz,' and '10μW.'"
    why: "The prose rules require a space between numbers and units."
    suggestion: "Write '48 MHz,' '3 GHz,' and '10 μW'."
notes: "No .qmd files were edited. Review focused on release-readiness issues in the specified chapter and intentionally did not enumerate every repeated style-pattern instance."
