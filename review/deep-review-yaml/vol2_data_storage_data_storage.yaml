file: book/quarto/contents/vol2/data_storage/data_storage.qmd
status: findings
summary: "The chapter is strong pedagogically, but it is not release-ready: several numeric claims contradict nearby tables, figures, and worked examples; one figure is introduced as if it showed a different experiment; and late sections interrupt the chapter's fallacies/summary flow."
findings:
  - severity: major
    line: 417
    category: figure
    issue: "The prose introduces @fig-access-patterns-vol2 as a sequential-vs.-random access comparison, but the figure caption describes required I/O throughput vs. model size."
    why: "Readers are told to interpret the figure as evidence about request-size and access-pattern degradation, yet the caption and alt text describe a model-size bottleneck frontier. This makes the subsequent discussion of 4 KB random reads and red/blue lines hard to reconcile with the displayed figure."
    suggestion: "Align the figure asset/caption with the access-pattern discussion, or revise lines 415 and 423-425 to discuss the model-size throughput frontier actually shown."
  - severity: major
    line: 442
    category: math
    issue: "The chapter claims a 300,000x bandwidth gap between HBM and object storage, but the adjacent table gives HBM as about 3.35 TB/s and object storage as 100 GB/s aggregate."
    why: "Those table values imply roughly 33.5x, not 300,000x. The same 300,000x claim recurs in the summary and takeaways, so the chapter's central quantitative framing is internally inconsistent."
    suggestion: "Recompute the advertised gap from the chosen per-device or aggregate bandwidth numbers, and use the same comparison consistently in the table, captions, summary, and takeaways."
  - severity: major
    line: 448
    category: consistency
    issue: "The storage pyramid caption disagrees with @tbl-storage-hierarchy-merged on several tier values."
    why: "The table lists host DRAM at 200 GB/s and about $3/GB, object storage at 100 GB/s aggregate, and archive at 1 GB/s and about $0.004/GB; the figure caption lists 300 GB/s and about $4/GB, Object Storage/Lustre at 50 GB/s, and Tape Archive at 0.3 GB/s and $0.001/GB."
    suggestion: "Choose one authoritative set of tier values and update either the caption/figure or the table so students do not memorize conflicting hierarchy numbers."
  - severity: major
    line: 912
    category: math
    issue: "Archive storage is described as 20x cheaper than standard object storage, but the stated prices make it 5x cheaper."
    why: "At $0.004/GB/month for archive and $0.02/GB/month for object storage, the ratio is 0.02 / 0.004 = 5, not 20. The surrounding economic argument depends on these ratios."
    suggestion: "Change the multiplier to 5x, or update the underlying object/archive prices if a 20x ratio is intended."
  - severity: major
    line: 918
    category: math
    issue: "The two-year archive cost calculation is off by a factor of 10 for the values shown."
    why: "The parenthetical says 100 TB at $0.004/GB/month for 24 months, which is 100,000 GB x $0.004 x 24 = $9,600, not $960."
    suggestion: "Correct the dollar amount to $9,600, or change the assumed archived volume to 10 TB if $960 is the intended result."
  - severity: major
    line: 1572
    category: math
    issue: "The checkpoint storm example's per-node shard size appears inconsistent with ZeRO-3 sharding of a 70B-parameter model."
    why: "The text says a 70B model across 1,000 nodes has approximately 140 GB per node at FP16, generating 140 TB of writes. FP16 weights alone are about 140 GB total, so ZeRO-3 across 1,000 nodes would be far smaller per node unless additional replicated state is being assumed."
    suggestion: "Clarify the checkpoint contents and sharding assumption, then recompute the per-node and aggregate write volumes."
  - severity: major
    line: 1580
    category: consistency
    issue: "The 175B checkpoint examples repeatedly say each of 256 nodes saves roughly 4 GB, but the chapter's own full checkpoint size is about 1,750 GB."
    why: "Dividing 1,750 GB by 256 nodes gives about 6.8 GB per node, not 4 GB. Lines 1582-1586, 1592, 1596, 1623, and 1625 build timing and footprint claims from the smaller value."
    suggestion: "Use one checkpoint size model throughout; if the per-node shard is 4 GB, explain which state is excluded, otherwise update the per-node bandwidth, timing, and retention calculations."
  - severity: minor
    line: 1474
    category: consistency
    issue: "The idle-accelerator cost in the callout conflicts with the immediately preceding calculation."
    why: "Line 1466 computes a 20 percentage point utilization loss on a 1,000-GPU cluster at $2/GPU-hour as $9,600/day, while the callout gives $13,000/day for the same 90 percent to 70 percent utilization drop."
    suggestion: "Make the callout use $9,600/day or state the different price/utilization assumptions that produce $13,000/day."
  - severity: minor
    line: 1647
    category: flow
    issue: "A new retrieval-infrastructure subsection interrupts the Fallacies and Pitfalls list, after which the chapter returns to additional pitfall entries."
    why: "The section break makes the fallacies section feel unfinished and leaves retrieval infrastructure underdeveloped as a one-paragraph aside."
    suggestion: "Move the retrieval subsection before Fallacies and Pitfalls, or convert it into a fallacy/pitfall entry if it belongs in that list."
  - severity: style
    line: 699
    category: prose
    issue: "Several non-protected callouts use direct second person, such as 'You are training...' in a callout-notebook."
    why: "The MIT Press prose rules reserve 'you' for learning objectives and checkpoint callouts; notebook, perspective, definition, and war-story callouts follow body-prose register."
    suggestion: "Rewrite non-checkpoint callout prompts in impersonal or first-person-plural form, and audit similar instances at lines 202, 651, 1033, and 1385."
notes: "Reviewed only book/quarto/contents/vol2/data_storage/data_storage.qmd against the MIT Press/book prose standard. No .qmd files were edited."
