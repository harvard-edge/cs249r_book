file: book/quarto/contents/vol1/data_selection/data_selection.qmd
status: findings
summary: >
  The chapter is strong in scope and systems framing, but it is not yet release-ready.
  I found two likely rendering/parse hazards, several MIT Press prose-standard
  violations, and a few consistency problems in examples and figures.
findings:
  - severity: blocker
    line: 3286
    category: qmd
    issue: "The inline Python expression for `BreakevenCalc.cost_active_total_str` is missing its closing backtick before the closing parenthesis."
    why: "This can break Quarto inline-code parsing and corrupt the ROI equation in the rendered chapter."
    suggestion: "Close the inline Python span before the parenthesis in the numerator."
  - severity: major
    line: 941
    category: qmd
    issue: "The TikZ positioning option `right=1.5of B4` is malformed."
    why: "TikZ positioning expects a spaced form such as `right=1.5 of B4`; the current form may fail compilation or place the model node incorrectly in the data-selection pipeline figure."
    suggestion: "Change the option to `right=1.5 of B4`."
  - severity: major
    line: 1881
    category: prose
    issue: "A non-protected callout-example uses direct second person repeatedly: 'You are building...', 'You have...'."
    why: "The MIT Press prose rules allow second person only in Learning Objectives and Checkpoint callouts; example callouts must follow body-prose register."
    suggestion: "Recast the scenario in third person, for example as a team or hospital building the system."
  - severity: minor
    line: 1091
    category: prose
    issue: "The body prose uses a rhetorical question: 'Why does this heterogeneity exist?'"
    why: "The house style permits questions only in the Purpose hook and checkpoint/learning-objective contexts; body prose should use declarative transitions."
    suggestion: "Replace with a declarative transition such as 'This heterogeneity follows from how neural networks learn decision boundaries.'"
  - severity: minor
    line: 3087
    category: prose
    issue: "The body prose asks, 'should I invest in data selection at all?'"
    why: "This violates the no-rhetorical-questions rule for body prose and shifts into an informal reader-address register."
    suggestion: "Rewrite as a declarative statement about the investment decision practitioners must evaluate."
  - severity: major
    line: 2670
    category: consistency
    issue: "The selection-bottleneck paragraph references `IcrCoresetComparison.coreset_pct_str`, which formats the earlier 50 percent coreset, while this section's worked example and anchor constants are about a 10 percent coreset."
    why: "The mismatch makes the overhead example internally inconsistent and weakens the selection-inequality argument."
    suggestion: "Use the 10 percent anchor value or align the paragraph and worked example to the same coreset fraction."
  - severity: major
    line: 4131
    category: math
    issue: "The Chinchilla rule of thumb says `D_opt ∝ C^0.5`, but the same paragraph says doubling compute requires about 40 percent more data."
    why: "If data scales as the square root of compute, doubling compute implies about 41 percent more data, but Chinchilla-style compute-optimal scaling is usually expressed through coupled model/data allocation; the paragraph may oversimplify or misstate the rule."
    suggestion: "Clarify which variable is held fixed and whether this is a simplified heuristic or the Chinchilla tokens-parameter balance."
  - severity: minor
    line: 4141
    category: figure
    issue: "The PPD figure caption admits that the vertical red arrow is labeled as saved compute even though it represents performance gained at a fixed dataset size."
    why: "A figure should not ship with a known mislabeled annotation; it may confuse readers about horizontal versus vertical efficiency gains."
    suggestion: "Relabel the red arrow as performance gain or change the annotation to show the horizontal saved-compute gap."
  - severity: minor
    line: 1755
    category: qmd
    issue: "A TikZ comment spells `default` as `derfault`; the typo repeats in nearby style comments."
    why: "Although hidden from rendered output, source-level typos reduce maintainability and release polish."
    suggestion: "Correct the comment spelling in the repeated `tiecolor`, `bodycolor`, and `stetcolor` defaults."
notes: >
