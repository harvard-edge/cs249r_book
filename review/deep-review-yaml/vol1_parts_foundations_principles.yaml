file: book/quarto/contents/vol1/parts/foundations_principles.qmd
status: findings
summary: >
  The part opener is structurally sound and has no obvious malformed QMD, cross-reference,
  citation, figure, table, or listing defects. The remaining release-readiness issues are
  prose-level: informal transition language, canonical D.A.M. terminology drift, an
  overextended data-as-code analogy, and one formulaic construction in a principle callout.
findings:
  - severity: minor
    line: 3
    category: terminology
    issue: >
      The opening defines the three domains as "the information," "the logic," and
      "the physics," with data, algorithm, and machine only parenthetical.
    why: >
      The book prose rules identify the D.A.M. taxonomy as a recurring core framework.
      This part-opening paragraph is a high-visibility framing passage, so alternate
      labels can weaken the canonical vocabulary before readers have stabilized it.
    suggestion: >
      Name the domains directly as Data, Algorithm, and Machine, then use information,
      logic, and physics as explanatory glosses if needed.
  - severity: style
    line: 5
    category: prose
    issue: >
      "Before diving into" is informal, and "clever algorithms" is a broad contrast
      without technical content.
    why: >
      The MIT Press prose standard rejects blog-style transition language and favors
      precise academic claims over conversational setup.
    suggestion: >
      Replace the opener with a direct statement about why architectures, frameworks,
      and optimizations depend on invariant constraints.
  - severity: minor
    line: 11
    category: consistency
    issue: >
      "Retraining a model is simply recompiling the binary" overstates the data-as-code
      analogy and uses "simply" as a minimizer; "git" should also be capitalized as
      "Git" when naming the tool.
    why: >
      Retraining changes learned parameters through stochastic optimization, validation,
      and deployment gates; calling it recompilation risks a false equivalence in a
      canonical principle box.
    suggestion: >
      Recast retraining as analogous to rebuilding an executable from changed source,
      and capitalize Git.
  - severity: style
    line: 20
    category: prose
    issue: >
      "Data is not just cargo; it is..." follows the prohibited "not just X" formula,
      and "Data-to-Compute" / "Compute-to-Data" read like informal slogans in running
      prose.
    why: >
      The prose rules flag this construction as formulaic AI-style intensification.
      The capitalized quoted labels also pull attention away from the invariant's
      technical claim.
    suggestion: >
      State the implication directly: large datasets anchor the architecture, so systems
      increasingly move compute to data rather than moving data to compute.
notes: >
  No edits were made to the source QMD. The review did not find issues with callout
  delimiters, principle IDs, displayed equations, citations, figures, tables, or listings
  in this short part file.
