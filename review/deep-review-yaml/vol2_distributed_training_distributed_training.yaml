file: book/quarto/contents/vol2/distributed_training/distributed_training.qmd
status: findings
summary: "The chapter is technically rich and largely coherent, but it is not yet release-ready under the MIT Press prose standard. The main issues are body-prose second person and rhetorical questions, non-rendering figure markup, a contradictory debugging example, and duplicated/misaligned summary figures."
findings:
  - severity: major
    line: 28
    category: prose
    issue: "The Purpose body uses second person: '*When* you train on a single GPU...' and '*when* you train on 10,000 GPUs...'."
    why: "The prose standard permits 'you' only in learning objectives and checkpoint callouts; the Purpose narrative is body prose."
    suggestion: "Recast with 'a single-GPU run' and 'a 10,000-GPU run' or use 'we' only if the sentence is actively reasoning."
  - severity: minor
    line: 28
    category: prose
    issue: "The Purpose paragraph starts a body sentence with 'But'."
    why: "The MIT Press prose rules forbid starting body exposition with a coordinating conjunction."
    suggestion: "Replace with 'However,' or join the contrast to the preceding sentence."
  - severity: major
    line: 160
    category: math
    issue: "The text says fault-tolerance requirements 'increase exponentially with cluster size.'"
    why: "For independent per-node failures, expected failure rate scales roughly linearly with node count for small probabilities, while all-node survival probability decays exponentially. The current wording conflates those quantities."
    suggestion: "Specify whether the claim is about fleet survival probability, expected failures, or MTBF, and align the scaling language accordingly."
  - severity: major
    line: 223
    category: qmd
    issue: "The loop-transform diagram is in a fenced `{text}` block with `%%| label` and Mermaid-like flowchart syntax."
    why: "This will render as literal text, not as a numbered figure; the `fig-loop-transforms` label and caption comments are not valid Quarto figure metadata in a text block."
    suggestion: "Use a supported Mermaid/Graphviz/TikZ figure block or convert it to a static SVG figure with a real `#fig-...` div."
  - severity: major
    line: 644
    category: consistency
    issue: "The slow-AllReduce debugging example contradicts its own arithmetic: it opens with a 100 ms observed time versus a 50 ms prediction, but the later calculation says a naive transfer should take 120 ms and ring AllReduce about 240 ms."
    why: "The diagnosis then calls 100 ms 'better than naive' and discusses a 40 ms remaining gap, which does not follow from either the 50 ms prediction or the 240 ms ring estimate."
    suggestion: "Choose one baseline calculation and make the observed latency, predicted latency, and remaining gap numerically consistent."
  - severity: major
    line: 963
    category: prose
    issue: "A non-protected notebook callout uses second person and a rhetorical question: 'You are training...' and 'Can you achieve...?'"
    why: "The prose standard applies body-register rules to non-checkpoint/non-learning-objectives callouts, including no 'you/your' and no rhetorical questions."
    suggestion: "Rewrite as a declarative scenario and objective, for example 'A GPT-2 run on a commodity 10G network can match the effective batch size...'."
  - severity: major
    line: 1307
    category: prose
    issue: "The heading and opening sentence use a rhetorical question: 'When does parallelism hurt?' and 'when does adding more workers stop helping?'"
    why: "The prose standard forbids rhetorical questions in body prose; section headings should state the topic rather than coax the reader."
    suggestion: "Use a declarative heading such as 'Critical batch size and diminishing returns' and make the opening sentence assert the threshold."
  - severity: major
    line: 1763
    category: prose
    issue: "Another notebook callout uses direct address and a rhetorical question: 'You are training...', 'you split your batch...', and 'What is your bubble tax?'"
    why: "Only checkpoint and learning-objectives callouts may use second person or questions."
    suggestion: "State the scenario and calculation directly without 'you' or question form."
  - severity: minor
    line: 191
    category: qmd
    issue: "The inline Python range uses a single hyphen between values: ``...nvlink_a100_str`-`...nvlink_h100_str` GB/s``."
    why: "Rendered output will read like a hyphenated compound rather than a numeric range; the style guide calls for en dashes in ranges."
    suggestion: "Use `--` between the inline Python expressions so Quarto renders an en dash."
  - severity: minor
    line: 261
    category: prose
    issue: "Footnotes use spaced `--` as sentence punctuation."
    why: "The style guide calls for proper em dashes for parenthetical breaks, not ASCII double hyphens."
    suggestion: "Replace prose ` -- ` breaks with em dashes or recast as full sentences."
  - severity: major
    line: 2618
    category: figure
    issue: "Two summary figures use the same asset, `images/svg/3d-parallelism.svg`, but have different captions and alt text; the second claims to show a hierarchical sliced training step across 8 GPUs."
    why: "If the same image is reused, at least one caption/alt text is likely inaccurate. A release reader will see duplicate visuals where the text promises distinct concepts."
    suggestion: "Use a distinct sliced/hierarchical asset for `fig-3d-parallelism-sliced` or revise the second caption to match the shared cube image."
  - severity: minor
    line: 2621
    category: qmd
    issue: "The figure div includes a manual bold caption sentence after the image in addition to `fig-cap`."
    why: "This can render as stray body text inside the figure and duplicates Quarto's caption mechanism."
    suggestion: "Move the sentence into `fig-cap` or into the surrounding prose outside the figure div."
notes: "Reviewed against the MIT Press/book prose guidance in AIConfigs. No .qmd files were edited; this review owns only the YAML output file."
