file: "book/quarto/contents/vol1/training/training.qmd"
status: findings
summary: "The chapter is technically rich and generally coherent, but it is not yet release-ready. The main risks are a few concrete QMD/code-reference defects, several unsupported or internally inconsistent quantitative claims, and repeated departures from the MIT Press prose standard through direct imperatives, informal wording, and operations-manual callout structure."
findings:
  - severity: major
    line: 4291
    category: qmd
    issue: "The inline Python expression uses `ResNetMemoryScaling.bytes_fp32_str` inside the attention-memory calculation."
    why: "This paragraph is explaining `AttentionMemoryCalc`, which defines `bytes_fp32_str` at line 4286. Pulling the byte count from an unrelated ResNet class creates a fragile dependency and can break if that earlier class is refactored or not executed before this paragraph."
    suggestion: "Use `AttentionMemoryCalc.bytes_fp32_str` in the attention-memory formula."
  - severity: major
    line: 1128
    category: qmd
    issue: "The `Adam Optimizer Internals` listing references `momentum_buffer`, `variance_buffer`, and `step_count` without initializing them."
    why: "Even illustrative listings in a textbook should be internally coherent. As written, the code cannot run and may confuse students about where Adam's state lives."
    suggestion: "Initialize the state variables or frame the listing explicitly as pseudocode with placeholders for optimizer state."
  - severity: major
    line: 4442
    category: citation
    issue: "The Flash Attention benchmark table presents detailed A100 timing and memory numbers without a source or reproducibility context."
    why: "The MIT Press standard requires quantitative specificity to be supported. These numbers drive conclusions about OOM thresholds and 3x speedups, but the text does not identify whether they come from Dao et al., a local benchmark, or an illustrative calculation."
    suggestion: "Cite the benchmark source or state the benchmark configuration and mark the table as illustrative if it is synthetic."
  - severity: major
    line: 4504
    category: citation
    issue: "The claim that Flash Attention three reaches 740 TFLOPS on H100 at 75 percent of theoretical peak lacks a citation."
    why: "This is a precise, recent performance claim and should not appear as unsupported textbook fact."
    suggestion: "Add the FlashAttention-3 citation or qualify the claim as reported by the authors."
  - severity: major
    line: 5209
    category: consistency
    issue: "The scaling section says a 70B model exceeds '80 GB A100/H100-class accelerators,' but H100 SXM systems are commonly 80 GB while the chapter also refers to H200-class 141 GB GPUs."
    why: "The phrasing collapses different accelerator memory tiers and may imply all H100-class devices have only 80 GB. The paragraph is making a capacity argument, so device memory precision matters."
    suggestion: "Name the specific 80 GB A100/H100 configuration and distinguish it from higher-memory H100/H200 variants."
  - severity: minor
    line: 151
    category: terminology
    issue: "The phrase 'Titan standard of efficiency' appears without definition."
    why: "It reads like an internal benchmark or marketing label rather than established textbook terminology, and the chapter does not explain what threshold or framework 'Titan' denotes."
    suggestion: "Define the standard briefly or replace it with a concrete efficiency target such as high accelerator utilization."
  - severity: minor
    line: 616
    category: prose
    issue: "The sentence 'This section analyzes...' is a section self-announcement."
    why: "The prose rules explicitly flag section meta-openers as non-textbook register. The paragraph should lead with the conceptual stake rather than announcing what the section does."
    suggestion: "Replace the sentence with a claim about why activation-function costs determine real training efficiency."
  - severity: minor
    line: 1712
    category: prose
    issue: "Several body paragraphs use direct instructional imperatives such as 'Look back,' 'Trace,' 'Follow,' 'Use,' 'Examine,' and 'Study.'"
    why: "The MIT Press rules prohibit direct second-person address in body prose. These imperatives create an implied 'you' and make the prose feel like lecture notes rather than textbook exposition."
    suggestion: "Convert these to declarative references, for example 'The roofline diagram in @fig-training-roofline shows...'."
  - severity: minor
    line: 2528
    category: prose
    issue: "The non-protected `callout-notebook` uses second-person address: 'You are training...' and 'You want...'."
    why: "The prose standard allows second person only in learning objectives and checkpoint callouts. Notebook/example callouts follow body-prose register."
    suggestion: "Rewrite as an impersonal scenario, for example 'A team is training a large model on eight GPUs and needs to determine whether the network is the bottleneck.'"
  - severity: minor
    line: 1054
    category: consistency
    issue: "The GPT-2 optimizer callout gives GPT-2 hyperparameters and later says GPT-2 converges in about 50K steps, but the chapter does not distinguish original GPT-2 training settings from the simplified lighthouse scenario."
    why: "The chapter alternates between GPT-2 as a historical model and GPT-2 as a synthetic teaching workload. Without that distinction, precise values such as 50K steps, cosine decay, and batch size 512 can look like claims about the original GPT-2 run."
    suggestion: "State whether these are original GPT-2 settings, a representative GPT-2 XL setup, or an illustrative lighthouse configuration."
  - severity: style
    line: 170
    category: prose
    issue: "Multiple callouts rely on bold paragraph starters such as `**The scenario**`, `**Failure**`, `**The Physics**`, and similar labels."
    why: "The MIT Press prose standard flags bold paragraph starters as an operations-manual anti-pattern except where a protected structure requires them. The pattern recurs in example and notebook callouts."
    suggestion: "Use short connected paragraphs or a table/list only where the structure materially helps comparison."
  - severity: style
    line: 6291
    category: prose
    issue: "The phrase 'The allure of scale is seductive' is informal and rhetorical for the chapter's register."
    why: "The fallacies section should remain rigorous and concrete; this wording sounds like magazine prose rather than MIT Press textbook prose."
    suggestion: "Replace with a direct technical claim about overfitting risk when model capacity grows without matching data scale."
notes: "I did not edit any `.qmd` files. Cross-reference labels referenced from this chapter appear to resolve within the local source tree in a text-level scan; the findings above focus on release-readiness issues visible from the source review."
