file: book/quarto/contents/vol2/backmatter/glossary/glossary.qmd
status: findings
summary: "The glossary is structurally readable, but it is not release-ready: acronym and proper-name headwords are often lowercased against the glossary capitalization rule, several entries duplicate one another, many definitions lack terminal periods, and a few QMD/style tokens need cleanup."
findings:
  - severity: major
    line: 48
    category: terminology
    issue: "Many acronym, proper-name, and brand headwords are lowercased, including `agi`, `automl`, `esp32`, `flops`, `gdpr`, `gpu`, `iot sensors`, `lora technology`, `mobilenet`, `rlhf`, `tinyml`, and `tpu`."
    why: "The MIT Press glossary rule says headwords should preserve capitalization for proper nouns, products, trademarks, and acronyms. Lowercasing these entries makes the glossary inconsistent with body prose and with canonical technical forms."
    suggestion: "Capitalize affected headwords and parenthetical acronyms consistently, for example `AGI`, `AutoML`, `ESP32`, `FLOPS`, `GDPR`, `GPU`, `IoT sensors`, `LoRa technology`, `MobileNet`, `RLHF`, `TinyML`, and `TPU`."
  - severity: major
    line: 730
    category: consistency
    issue: "`membership inference attack` and `membership inference attacks` appear as separate adjacent entries with nearly identical definitions."
    why: "Duplicate singular/plural entries fragment the glossary and can produce inconsistent index targets or reader lookup behavior."
    suggestion: "Keep one canonical headword and merge the `Appears in` references."
  - severity: major
    line: 1199
    category: consistency
    issue: "`tiny ml` and `tinyml` appear as separate entries with overlapping definitions."
    why: "The prose standard lists `TinyML` as the canonical capitalized form, so the two entries create both duplication and terminology drift."
    suggestion: "Use one `TinyML` entry and merge the references from both entries."
  - severity: minor
    line: 35
    category: prose
    issue: "At least 21 glossary definitions lack terminal periods, including entries at lines 35, 40, 45, 80, 112, 117, 229, 234, 266, 301, 331, 368, 500, 522, 653, 742, 792, 859, 980, 1012, 1069, and 1221."
    why: "Most definitions are complete sentences and already end with periods; missing punctuation makes the glossary look mechanically assembled and inconsistent."
    suggestion: "Add terminal periods to complete-sentence definitions."
  - severity: minor
    line: 18
    category: qmd
    issue: "Only the first headword, `accountability`, is bolded; subsequent headwords use plain definition-list terms."
    why: "This produces inconsistent source and likely inconsistent rendering for the first glossary item."
    suggestion: "Use the same headword formatting for all entries; remove the bolding from `accountability` unless all headwords should be bold."
  - severity: minor
    line: 174
    category: terminology
    issue: "`CO2 equivalent` is written with a plain digit and no hyphenation."
    why: "The prose standard requires rendered chemical formulas such as `CO~2~` and prefers `CO~2~-equivalent` on first use."
    suggestion: "Change to `CO~2~-equivalent`."
  - severity: minor
    line: 296
    category: qmd
    issue: "`8--9$\\times$` uses a source-level double hyphen for a range."
    why: "The style guide requires an en dash for ranges; double hyphens are fragile across output formats and visually inconsistent in source."
    suggestion: "Use an en dash or rewrite as `8$\\times$ to 9$\\times$`."
  - severity: minor
    line: 50
    category: prose
    issue: "The AGI and RLHF definitions use a spaced hyphen after the expanded term: `Artificial General Intelligence - ...` and `Reinforcement Learning from Human Feedback - ...`."
    why: "A hyphen is not the correct punctuation for an appositive definition; the prose rules reserve hyphens for compounds and prefer colons for explanations."
    suggestion: "Use a colon after the expanded term."
  - severity: style
    line: 1231
    category: prose
    issue: "`transformer architecture` says the architecture `has revolutionized` natural language processing."
    why: "The prose standard flags hype terms such as revolutionary/revolutionized unless supported by precise evidence."
    suggestion: "Replace with a neutral phrasing such as `is widely used in` or add quantitative support."
notes: "Cross-reference labels used by the visible `Appears in` lines resolve for the main referenced sections inspected. No edits were made to `.qmd` files."
