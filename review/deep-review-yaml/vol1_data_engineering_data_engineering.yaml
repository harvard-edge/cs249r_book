file: book/quarto/contents/vol1/data_engineering/data_engineering.qmd
status: findings
summary: >
  The chapter is structurally coherent and has strong textbook framing around data as source code, the four pillars, KWS, and storage physics. Release readiness is held back by a few concrete consistency and MIT Press prose-rule issues: non-protected callouts repeatedly use second person and rhetorical questions, several callouts use bold paragraph-starter labels, and a handful of technical/style defects should be corrected before final copyedit.
findings:
  - severity: major
    line: 275
    category: consistency
    issue: "The data-gravity setup says the inline calculation is for a 10 Gbps link, then says the following callout quantifies transfer times for a 100 Gbps link; the prose also writes `1PB` without a space."
    why: "The reader cannot tell which bandwidth anchors the example, and the inconsistency undermines a quantitative argument central to the section."
    suggestion: "Use one bandwidth consistently, or explicitly contrast the 10 Gbps preview with the 100 Gbps callout; write `1 PB`."
  - severity: major
    line: 457
    category: prose
    issue: "Non-protected callouts use second person and rhetorical questions, for example `You have...` and `Is it faster...`; similar patterns recur at lines 1074, 2622, 2774, 2989, and 3251."
    why: "The MIT Press prose rules allow second person and questions only in learning objectives and checkpoint callouts; notebook/example callouts must follow body-prose register."
    suggestion: "Convert these prompts to declarative scenario statements, reserving direct address for checkpoint/learning-objective callouts."
  - severity: style
    line: 372
    category: prose
    issue: "The chapter repeatedly uses bold paragraph-starter labels inside prose and callouts, such as `**Systems Implication**:`; the same operations-manual pattern appears in many notebook and war-story callouts."
    why: "The book-prose standard explicitly forbids bold paragraph starters in body text because they read as checklist prose rather than textbook argument."
    suggestion: "Fold the label into the sentence or use the callout title/list structure to carry the organization."
  - severity: minor
    line: 1436
    category: citation
    issue: "The traffic-light figure caption attributes the image to `Source: Vox` without a bibliographic citation or source key."
    why: "Release figures need traceable source attribution; a plain publisher name is weaker than the citation style used elsewhere."
    suggestion: "Add the appropriate citation key or source note matching the bibliography/permissions record."
  - severity: minor
    line: 1905
    category: citation
    issue: "The Microsoft Tay war story presents specific historical claims but provides no citation."
    why: "Concrete incidents, especially reputational or safety failures, should be source-backed in textbook prose."
    suggestion: "Add a citation for the Tay incident or move unsupported details into a shorter, clearly attributed example."
  - severity: minor
    line: 1992
    category: prose
    issue: "The sentence beginning `When new categories appear...` has a malformed parenthetical: the em-dash before `say` is never closed, leaving the main clause hard to parse."
    why: "The punctuation makes the statistical example read as a run-on and violates the rule to avoid overloaded dash constructions."
    suggestion: "Replace the aside with `for example, if...` or close the parenthetical cleanly."
  - severity: minor
    line: 2303
    category: math
    issue: "Inequality/unit expressions use compact forms such as `<100 ms` and, at line 2306, `<1s`."
    why: "The style guide requires spaced units, and prose comparisons read more cleanly when the operator and unit are separated."
    suggestion: "Use `< 100 ms` and `< 1 s`, or write `less than 100 ms` and `less than 1 s`."
  - severity: minor
    line: 2716
    category: prose
    issue: "The sentence `Central to effective transformation, common transformation tasks include...` is grammatically awkward and repeats `transformation` heavily."
    why: "This interrupts flow in a section that is otherwise explaining training-serving consistency."
    suggestion: "Revise the topic sentence to state that normalization and standardization are common transformation tasks."
  - severity: style
    line: 3255
    category: math
    issue: "The range `~3-7 GB/s` uses a hyphen instead of an en dash."
    why: "The MIT Press style rules require en dashes for numeric ranges."
    suggestion: "Use `approximately 3–7 GB/s` or `3–7 GB/s`."
  - severity: style
    line: 3409
    category: prose
    issue: "The data-versioning section opens with three rhetorical questions in body prose."
    why: "The prose rules forbid rhetorical questions in body text; the section can preserve the diagnostic stakes declaratively."
    suggestion: "Rewrite the questions as a declarative list of hypotheses the team had to distinguish."
notes: "Reviewed only book/quarto/contents/vol1/data_engineering/data_engineering.qmd against the MIT Press/book prose rules. No .qmd files were edited."
