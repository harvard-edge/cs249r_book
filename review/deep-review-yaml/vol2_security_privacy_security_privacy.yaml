file: book/quarto/contents/vol2/security_privacy/security_privacy.qmd
status: findings
summary: >
  The chapter is technically broad and mostly coherent, but it is not release-ready under the MIT Press prose standard.
  The main issues are nonprotected callouts using second person and rhetorical questions, a malformed hardware-security table,
  a few obvious typos or heading problems, and several informal or legally overassertive passages.
findings:
  - severity: major
    line: 228
    category: prose
    issue: "A nonprotected `.callout-notebook` uses second person and a rhetorical question: \"You are hosting...\", \"your model...\", and \"What is the performance cost of security?\""
    why: "The prose standard permits second-person address and questions only in Learning Objectives and Checkpoint callouts; notebook callouts must follow body-prose register."
    suggestion: "Rewrite the prompt declaratively or convert the exercise to the approved checkpoint pattern if direct student address is required."
  - severity: style
    line: 190
    category: prose
    issue: "The sentence \"Differential Privacy kills utility for small N\" is informal and uses inconsistent capitalization for a concept term in running prose."
    why: "The MIT Press standard rejects blog-like phrasing and calls for precise academic register; concept terms such as differential privacy should not be capitalized mid-sentence unless part of a proper name."
    suggestion: "Use a neutral statement such as \"Differential privacy can make estimates unusable for small N.\""
  - severity: minor
    line: 837
    category: terminology
    issue: "The heading lowercases the proper noun in \"Jeep cherokee hack.\""
    why: "Proper nouns should retain standard capitalization, and headings should be polished for publication."
    suggestion: "Change the heading to \"Insufficient isolation: Jeep Cherokee hack\" or apply the chapter's heading-case convention consistently."
  - severity: major
    line: 1386
    category: consistency
    issue: "The Tesla/Zoox case study moves from alleged theft to factual assertion: \"Among the stolen materials was...\" after noting the lawsuit was settled and employees denied wrongdoing."
    why: "For a legal dispute resolved by settlement, release prose should not state contested allegations as established fact without a cited adjudication or settlement admission."
    suggestion: "Frame the model and source-code details as allegations in the lawsuit, or cite a source establishing them as uncontested facts."
  - severity: minor
    line: 1811
    category: prose
    issue: "Typo: \"ML-allowd devices.\""
    why: "The error is visible in running prose and will distract readers."
    suggestion: "Replace with \"ML-enabled devices\" or another intended term."
  - severity: major
    line: 1875
    category: prose
    issue: "A body sentence introduces a \"knowledge check\" with second person: \"tests your understanding...\""
    why: "Second person is forbidden in body prose except Learning Objectives and Checkpoint callouts."
    suggestion: "Use a neutral phrasing such as \"The following knowledge check tests recognition of hardware-level security mechanisms...\" or make it an approved checkpoint callout."
  - severity: major
    line: 2382
    category: figure
    issue: "The hardware security mechanisms table splits single mechanism names across multiple rows, creating rows labeled \"Environments,\" \"Modules (HSMs),\" and \"Functions (PUFs).\""
    why: "This is semantically malformed as a table: the first column no longer contains one mechanism per row, so readers and accessibility tooling will parse the entries incorrectly."
    suggestion: "Keep each mechanism name in one cell and move line wrapping into the description cell or use shorter mechanism labels."
  - severity: minor
    line: 2376
    category: flow
    issue: "The sentence ending with a colon promises a list, but the next paragraph only states a general summary before another redundant summary paragraph."
    why: "The paragraph transition reads like an unfinished setup and weakens the flow into the table."
    suggestion: "Remove the colon sentence or connect it directly to the table introduction."
  - severity: major
    line: 2446
    category: prose
    issue: "Another nonprotected `.callout-notebook` uses second person and a rhetorical question: \"You are deploying...\" and \"How do these choices affect your real-time responsiveness?\""
    why: "Notebook callouts are not exempt from the no-second-person and no-rhetorical-question rules."
    suggestion: "Rewrite as a declarative scenario and objective, or change the callout type to an approved checkpoint if direct address is intentional."
  - severity: major
    line: 2809
    category: prose
    issue: "The differential privacy section uses a rhetorical question in body prose: \"how can we quantify privacy loss when learning from data?\""
    why: "The prose standard forbids rhetorical questions in body prose; textbook exposition should assert the problem and then develop it."
    suggestion: "Rewrite as a declarative transition, for example, \"The central problem is quantifying privacy loss when learning from data.\""
  - severity: minor
    line: 2813
    category: prose
    issue: "The salary example uses direct second-person narration repeatedly: \"imagine you want,\" \"you could ask,\" \"When you average,\" and \"you cannot know.\""
    why: "This is body prose, not a protected learning objective or checkpoint, so it violates the chapter register rules."
    suggestion: "Recast the example with first-person plural or neutral nouns, such as \"an analyst estimates...\""
  - severity: minor
    line: 3063
    category: terminology
    issue: "The heading drops the accented character in \"Rnyi differential privacy,\" while the body correctly uses \"Rényi Differential Privacy.\""
    why: "The heading contains an apparent typo and creates inconsistent terminology for a named divergence/privacy framework."
    suggestion: "Change the heading to \"Rényi differential privacy and composition.\""
notes: >
  I reviewed the chapter against the MIT Press/book prose standard and focused on release-readiness issues.
  I did not edit any .qmd file.
