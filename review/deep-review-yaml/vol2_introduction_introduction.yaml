file: book/quarto/contents/vol2/introduction/introduction.qmd
status: findings
summary: "The chapter has strong release framing, but it repeats core frameworks and introduces the volume archetypes in inconsistent forms. The main release risks are structural: duplicate C^3/Fleet Stack exposition, two separate archetype rosters, and terminology drift around lighthouses, archetypes, constraints, and workload labels."
findings:
  - severity: major
    line: 1675
    category: flow
    issue: "The Foundational Concepts section reintroduces C^3, the Fleet Stack, the roadmap, AI Triad, Five-Pillar Framework, systems principles, and archetypes after those frameworks have already been developed earlier in the introduction."
    why: "For a release introduction, this creates a second mini-introduction near the end of the chapter. It weakens chapter flow and makes the reader revisit concepts rather than advancing from Scale Moment to C^3 to chapter structure."
    suggestion: "Consolidate the repeated framework overview into the earlier framework sections, or make this section a brief synthesis that points forward without re-presenting each framework."
  - severity: major
    line: 1679
    category: figure
    issue: "The C^3 taxonomy appears twice as separate figures: a TikZ figure at @fig-c3-taxonomy and an SVG figure at @fig-vol2-c3-taxonomy."
    why: "Two figures with nearly identical captions and content make the canonical figure unclear and may confuse downstream cross-references."
    suggestion: "Keep one canonical C^3 figure and update all local references to that figure."
  - severity: major
    line: 328
    category: flow
    issue: "The lighthouse archetypes are introduced in a callout near the start, then reintroduced as the canonical archetype section and table at lines 1910-1934."
    why: "The prose rule asks for one canonical reference table or section for the volume's archetypes. Two rosters increase cognitive load and create opportunities for divergence."
    suggestion: "Use the early callout as a short pointer to @sec-vol2-introduction-archetypes, or move the canonical table near the first mention and avoid duplicating the roster."
  - severity: major
    line: 806
    category: terminology
    issue: "The text says Frontier Training inherits the Cloud Archetype and uses the GPT-4 model, while the canonical roster later defines Archetype A as GPT-4/Llama-3 and does not include a Cloud Archetype."
    why: "This conflicts with the stated canonical archetype scheme and makes it unclear whether the volume tracks Cloud Archetype, GPT-4, or Archetype A (GPT-4/Llama-3)."
    suggestion: "Align this example with the canonical labels, such as Archetype A (GPT-4/Llama-3), or define Cloud Archetype explicitly if it is a separate taxonomy."
  - severity: major
    line: 1912
    category: consistency
    issue: "The archetype introduction says each archetype stresses Communication, Coordination, or Compute, but the detailed descriptions and table do not map cleanly to those three vertices."
    why: "Archetype A is Communication, Archetype B is coordination/all-to-all, and Archetype C is also coordination, while the table uses Throughput Bound, Volume & Latency, and Power & Privacy. No archetype clearly occupies Compute."
    suggestion: "Choose one constraint vocabulary for the canonical table and ensure the three archetypes actually cover the claimed C^3 corners."
  - severity: minor
    line: 227
    category: consistency
    issue: "The table caption says training compute increased by seven orders of magnitude, while nearby prose says approximately a 10-million-fold increase from 10^18 to 10^25 FLOPs."
    why: "Seven orders of magnitude and 10-million-fold are equivalent, but the chapter also references 10^25-10^26 FLOPs for frontier models at line 103, which could imply seven to eight orders of magnitude."
    suggestion: "Make the range consistent across the scale-moment prose, table caption, and GPT-4/frontier estimate."
  - severity: minor
    line: 158
    category: prose
    issue: "The notebook callout uses a rhetorical question outside a checkpoint or learning-objectives callout."
    why: "The prose standard permits questions in Purpose hooks, learning objectives, and checkpoint callouts, but not ordinary body prose or general callouts."
    suggestion: "Recast the prompt as an imperative problem statement."
  - severity: minor
    line: 816
    category: terminology
    issue: "The phrase Latent-Bound appears where latency-bound is likely intended."
    why: "Latent-bound is not a standard systems term and contrasts awkwardly with Bandwidth-Bound in the same bullet."
    suggestion: "Use latency-bound and align capitalization with the chapter's other bound-regime terms."
  - severity: minor
    line: 1723
    category: figure
    issue: "The Fleet Stack figure and the Roadmap figure both present the same four-part vertical progression in adjacent pages."
    why: "The duplicated visual structure dilutes the role of each figure and adds length without adding much new information."
    suggestion: "Merge the roadmap information into the Fleet Stack figure/caption or keep only the more useful visual."
  - severity: style
    line: 28
    category: prose
    issue: "The opening purpose paragraph is very long and stacks several emphatic italicized When/What constructions."
    why: "The argument is strong, but the density and repeated emphasis read more like a manifesto than MIT Press textbook prose."
    suggestion: "Break the paragraph and reduce emphasis to the one or two terms that carry the chapter's framing."
  - severity: style
    line: 1901
    category: prose
    issue: "The Six Systems Engineering Principles are presented as bold-style list starters with colon definitions."
    why: "The prose standard flags list-dressed paragraphs and bold/label starters as operations-manual style when they substitute for connected explanation."
    suggestion: "Keep the list if this is intended as a compact reference, but consider moving it to a callout or replacing it with a short synthesis paragraph."
notes: "Reviewed against the MIT Press/book-prose standard. No .qmd files were edited."
