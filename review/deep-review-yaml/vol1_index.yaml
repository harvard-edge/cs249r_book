file: book/quarto/contents/vol1/index.qmd
status: findings
summary: "The Vol. 1 landing/index page is close structurally, but it is not release-ready: the primary PDF download target is missing, and several visible prose elements conflict with the MIT Press/book prose standard by using direct second-person address, rhetorical questions, and marketing-style calls to action."
findings:
  - severity: blocker
    line: 48
    category: qmd
    issue: "The primary PDF link points to ../../assets/downloads/Machine-Learning-Systems-Vol1.pdf, but that file is not present under book/quarto/assets/downloads."
    why: "The landing page's main download action will render as a broken release artifact for HTML readers."
    suggestion: "Add the PDF at the referenced path or update the href to the actual release PDF location before release."
  - severity: major
    line: 22
    category: prose
    issue: "The author's note uses four consecutive rhetorical questions in body-style prose."
    why: "The book prose standard forbids rhetorical questions outside the protected Purpose hook, Learning Objectives, and Checkpoint contexts; the sequence also gives the opening a manifesto tone rather than MIT Press textbook prose."
    suggestion: "Convert the questions into declarative statements about the engineering roles and constraints that define AI engineering."
  - severity: major
    line: 28
    category: prose
    issue: "The author's note directly addresses the reader with 'Whether you are building...'."
    why: "The standard forbids 'you' in body prose except for Learning Objectives and Checkpoint callouts."
    suggestion: "Recast in first-person plural or declarative form, such as 'Whether engineers build...'."
  - severity: major
    line: 63
    category: prose
    issue: "The 'What You Will Learn' section and its Part I bullet use direct second-person address: 'You' and 'your'."
    why: "This is visible landing-page prose, not a protected Learning Objectives callout, so it violates the second-person restriction."
    suggestion: "Rename the section and bullets in objective terms, for example 'Learning Path' and 'Part I: Foundations introduces...'."
  - severity: major
    line: 132
    category: prose
    issue: "The contribution paragraph uses direct second-person address and informal marketing language: 'your input matters,' 'If you would like,' and 'Simply file'."
    why: "The register is closer to a project website than an MIT Press textbook landing page, and it violates the no-'you' rule for non-protected prose."
    suggestion: "Use neutral project-maintenance wording, or move contributor solicitation out of the release-facing book index."
  - severity: minor
    line: 53
    category: qmd
    issue: "The download call to action uses an emoji and 'Click here to download PDF'."
    why: "'Click here' is weak link text for accessibility and the emoji is inconsistent with the formal MIT Press release register."
    suggestion: "Use descriptive text such as 'Download PDF' without the emoji."
  - severity: minor
    line: 80
    category: flow
    issue: "The 'Support Our Mission' block foregrounds GitHub stars, sponsor matching, and a 2026 goal on the book landing page."
    why: "This reads as fundraising/marketing copy rather than release-facing textbook front matter, and it may distract from the MIT Press presentation."
    suggestion: "Consider moving sponsorship and GitHub-star copy to the project website or repository documentation."
  - severity: minor
    line: 84
    category: qmd
    issue: "The GitHub star button uses an emoji in visible UI text."
    why: "The emoji is informal and visually inconsistent with the surrounding textbook landing material."
    suggestion: "Use plain text such as 'Star on GitHub' or an accessible icon supplied by the site design system."
  - severity: minor
    line: 116
    category: terminology
    issue: "The heading 'Listen to the AI Podcast' is vague and shifts from the book's 'machine learning systems' framing to a broad 'AI' label."
    why: "The page otherwise presents Vol. 1 as Introduction to Machine Learning Systems; the heading weakens terminology consistency."
    suggestion: "Use a more specific heading such as 'Listen to the Machine Learning Systems Podcast'."
notes: "Checked the local cross-reference target @sec-neural-computation and the image/audio assets; those targets exist. No .qmd files were edited."
