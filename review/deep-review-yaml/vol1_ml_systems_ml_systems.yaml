file: book/quarto/contents/vol1/ml_systems/ml_systems.qmd
status: findings
summary: >
  The chapter renders successfully in isolation and has a coherent textbook arc from
  physical constraints to deployment paradigms, selection, hybrid patterns, and
  fallacies. Release readiness is held back by recurring MIT Press prose-standard
  violations, several inconsistent quantitative claims across tables and summary
  material, and some callout/list formatting that reads more like notes than
  polished textbook prose.
findings:
  - severity: major
    line: 1345
    category: consistency
    issue: >
      The TinyML latency threshold is listed as "µs" in the deployment-decision
      table, while the chapter repeatedly gives TinyML latency as 1-10 ms.
    why: >
      This creates a direct quantitative contradiction in a table meant to guide
      deployment decisions.
    suggestion: >
      Align the TinyML latency entry with the chapter's stated 1-10 ms range, or
      distinguish device wake-up/event latency from full inference latency.
  - severity: major
    line: 4217
    category: consistency
    issue: >
      The takeaway says the deployment spectrum spans 1,000,000x in power from
      Cloud (1 kW) to TinyML (1 mW), but earlier tables describe Cloud ML at MW
      scale and repeatedly frame the chapter around nine orders of magnitude.
    why: >
      The summary contradicts the chapter's central quantitative framing and can
      leave readers with the wrong scale comparison.
    suggestion: >
      Use the same endpoints and order-of-magnitude claim as the overview tables,
      or explicitly state whether this takeaway compares a server, a rack, or a
      data center.
  - severity: major
    line: 853
    category: consistency
    issue: >
      The lighthouse summary says compute requirements span "20 MFLOPs -> four
      GFLOPs" and memory spans "800 KB -> 100 GB," but the preceding lighthouse
      table includes DLRM and GPT-2/Llama, whose memory and compute footprints
      exceed those endpoints.
    why: >
      The sentence appears to summarize all five lighthouses, but the stated
      extrema omit the largest lighthouse workloads and understate the range.
    suggestion: >
      Either narrow the sentence to the workloads it describes or update the
      endpoints to cover all five lighthouse models.
  - severity: major
    line: 111
    category: prose
    issue: >
      Body prose opens with a rhetorical question: "What makes these systems so
      different?"
    why: >
      The MIT Press prose standard forbids rhetorical questions in body prose
      because they shift the register toward blog-style exposition.
    suggestion: >
      Replace the question with a declarative transition that states the causal
      distinction among the deployment environments.
  - severity: major
    line: 2993
    category: prose
    issue: >
      The Paradigm Selection opening uses two rhetorical questions in body prose.
    why: >
      This section-opening pattern violates the formal textbook register and
      weakens the transition into the comparison framework.
    suggestion: >
      Convert the questions into a declarative statement of the comparison and
      selection problem.
  - severity: minor
    line: 317
    category: prose
    issue: >
      Body prose uses a quoted rhetorical question to frame the physical-laws
      explanation.
    why: >
      Even embedded in quotation marks, the question addressed to the reader is
      disallowed by the chapter prose standard outside the Purpose hook and
      protected checkpoints.
    suggestion: >
      Recast as "The existence of four paradigms, rather than one universal
      solution, follows from three physical laws."
  - severity: minor
    line: 1189
    category: prose
    issue: >
      The ResNet worked example ends with a bold question: "When does ResNet-50
      become compute-bound?"
    why: >
      This is unprotected body/callout prose, and the standard forbids rhetorical
      questions outside learning objectives and checkpoints.
    suggestion: >
      Replace with a declarative sentence such as "ResNet-50 becomes compute-bound
      only once batch size raises arithmetic intensity above the hardware balance point."
  - severity: minor
    line: 3368
    category: prose
    issue: >
      The complexity-tax callout asks whether a five percent gain is worth a 40x
      complexity increase.
    why: >
      The callout is not a protected checkpoint or learning-objectives callout, so
      the no-rhetorical-questions rule still applies.
    suggestion: >
      State the trade-off directly and reserve reader-addressed questions for the
      following checkpoint.
  - severity: minor
    line: 119
    category: prose
    issue: >
      The Single-Node Stack section uses bold list-item starters with colon-led
      definitions for core exposition.
    why: >
      The prose standard flags bold paragraph/list starters as an operations-manual
      pattern that interrupts textbook flow.
    suggestion: >
      Convert the four layers into compact prose or a formal table if the intent is
      reference rather than narrative exposition.
  - severity: minor
    line: 1161
    category: prose
    issue: >
      The ResNet worked example uses multiple bold starter labels ("Problem,"
      "Given," "Analysis," "Key Insight") inside a callout.
    why: >
      This reads like worksheet scaffolding rather than polished MIT Press prose
      and repeats a pattern the prose standard explicitly discourages.
    suggestion: >
      Keep the callout but reduce the bold starters to a table or short narrative
      with only the necessary calculation bullets.
  - severity: minor
    line: 3053
    category: terminology
    issue: >
      The comparison-table constant renders Edge power as "High (100 s W)."
    why: >
      "100 s W" is not idiomatic technical notation and looks like a typo for
      hundreds of watts.
    suggestion: >
      Change the rendered value to "High (hundreds of watts)" or a specific
      numeric range.
  - severity: style
    line: 3034
    category: math
    issue: >
      Several rendered table constants use hyphens for numeric ranges, such as
      "100 ms-1000 ms+," "10-100 ms," and "1-10 W."
    why: >
      MIT Press style calls for en dashes in ranges; the inconsistent notation is
      especially visible in reference tables.
    suggestion: >
      Use en dashes in the display strings, with spaced units where each endpoint
      needs a unit for clarity.
  - severity: style
    line: 4210
    category: prose
    issue: >
      The Summary opens with another rhetorical question, followed by the emphatic
      fragment "The answer is physics."
    why: >
      Summaries should consolidate the argument in formal textbook prose, and this
      formulation echoes a blog-post cadence.
    suggestion: >
      Replace the question-answer formulation with a direct summary sentence about
      physical constraints causing divergent engineering regimes.
notes: >
  Verification: rendered the chapter with Quarto to HTML in
  /private/tmp/mlsysbook-math-render; all 30 Python cells executed and Pandoc
  completed. The render emitted unresolved cross-reference warnings for targets in
  other chapters, which is expected for a single-chapter render and was not counted
  as a finding.
