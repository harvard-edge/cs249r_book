file: book/quarto/contents/vol2/index.qmd
status: findings
summary: >
  The Vol. 2 index is structurally short and does not show broken cross-references, citations,
  figures, tables, listings, or math, but it is not release-ready under the MIT Press/book prose
  standard. The visible landing material mixes textbook front matter with promotional web copy,
  dynamic metadata, informal calls to action, and one malformed prerequisite bullet.
findings:
  - severity: major
    line: 5
    category: qmd
    issue: "The HTML metadata uses `date: today`."
    why: "Release metadata should be stable and reproducible; a moving date can make builds differ by day and obscure the actual release or revision date."
    suggestion: "Replace `today` with an explicit release date or remove the date from this landing page."
  - severity: major
    line: 45
    category: prose
    issue: "The welcome abstract uses a promotional register and an em dash as a compressed substitute for a clearer sentence."
    why: "Phrases such as `fundamentally change engineering requirements` and the em-dash expansion read more like marketing copy than MIT Press textbook prose."
    suggestion: "State the scale transition and lifecycle scope in precise textbook prose, using a colon or separate sentence instead of the em dash."
  - severity: minor
    line: 50
    category: figure
    issue: "The cover image alt text is generic: `Machine Learning Systems Book Cover`."
    why: "The style rules require meaningful alt text; this label does not identify the volume or describe the visual content for nonvisual readers."
    suggestion: "Use concise descriptive alt text that names Volume 2 and the visible cover role."
  - severity: minor
    line: 53
    category: prose
    issue: "The download call to action uses an emoji and `Click here` language."
    why: "The wording is informal and web-marketing oriented, and `click here` is weak accessible link text."
    suggestion: "Use direct text such as `Download PDF` without the emoji."
  - severity: style
    line: 63
    category: prose
    issue: "The part-summary bullets use bold labels followed by em-dash slogans."
    why: "The house style warns against bold paragraph starters and announcement-like fragments; `Build the physical computer`, `Master the algorithms of scale`, and similar imperatives read as course-marketing copy."
    suggestion: "Convert the bullets to neutral descriptive sentences or keep the labels while removing slogan fragments."
  - severity: minor
    line: 72
    category: prose
    issue: "`Foundational or equivalent background` is grammatically malformed."
    why: "`Foundational` needs an object or parallel construction, so the prerequisite is unclear."
    suggestion: "Change to `Foundational background in single-machine ML systems or equivalent experience`."
  - severity: major
    line: 77
    category: flow
    issue: "The `Support Our Mission` section reads as fundraising copy rather than book front matter."
    why: "MIT Press release material should maintain academic register; a sponsorship appeal interrupts the index/landing-page flow and shifts from textbook orientation to campaign messaging."
    suggestion: "Move fundraising content outside the book index or reduce it to a brief, neutral project-support link."
  - severity: major
    line: 81
    category: consistency
    issue: "The claim that sponsors match every GitHub star with funding is time-bound and unsupported in the page."
    why: "A `2026 Goal` and matching-funding claim can become stale, and the text gives no terms, source, or expiration for a release artifact."
    suggestion: "Either cite and date the campaign terms or remove the matching claim from the release landing page."
  - severity: minor
    line: 84
    category: qmd
    issue: "The star count fallback remains `Loading...` if the GitHub API call fails."
    why: "A published page may show a permanent loading placeholder under API failure, rate limiting, or offline builds."
    suggestion: "Use a stable fallback such as `GitHub` or `Star the project`, and reserve loading text for transient state."
  - severity: minor
    line: 122
    category: prose
    issue: "The podcast description uses informal and vague promotional wording."
    why: "`This short podcast`, `accessible overview`, and `key ideas and themes` do not match the precise textbook register and do not explain the academic value of the audio resource."
    suggestion: "Use a neutral description that names the topic and source without promotional adjectives."
  - severity: minor
    line: 131
    category: prose
    issue: "The heading `Want to Help Out?` uses an informal rhetorical question."
    why: "The prose rules permit questions only in narrow pedagogical contexts; this heading is casual web-copy language."
    suggestion: "Use a declarative heading such as `Contributing`."
  - severity: minor
    line: 133
    category: prose
    issue: "The contribution paragraph uses second person and casual phrasing."
    why: "`your input matters`, `If you would like`, `new ideas are welcome`, and `Simply file` violate the body-prose restrictions on second person, vague encouragement, and casual minimizers."
    suggestion: "Rewrite in neutral project language, for example by stating where corrections and contributions should be submitted."
notes: >
  No edits were made to the reviewed QMD file. The review only covers book/quarto/contents/vol2/index.qmd
  and records findings in this YAML file.
