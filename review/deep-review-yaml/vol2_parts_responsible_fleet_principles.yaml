file: book/quarto/contents/vol2/parts/responsible_fleet_principles.qmd
status: findings
summary: >
  The part opener is structurally close to release-ready, with resolving callout syntax and mostly clear roadmap material. The main issues are an overbroad fairness impossibility statement, a roadmap link that targets a subsection instead of the chapter, and several MIT Press prose-standard violations in the framing paragraphs and callouts.
findings:
  - severity: major
    line: 28
    category: consistency
    issue: >
      The fairness principle states that satisfying Calibration, Equalized Odds, and Demographic Parity is mathematically impossible whenever base rates differ.
    why: >
      The later responsible AI chapter gives a more careful version: fairness impossibility results have constrained exceptions, and demographic parity is a distinct selection-rate constraint that can conflict with calibration or error-rate goals in practice. The part opener's absolute wording overstates the theorem and may teach the wrong boundary condition.
    suggestion: >
      Qualify the claim as applying to nontrivial or imperfect classifiers and align the wording with the responsible AI chapter's treatment of the theorem.
  - severity: major
    line: 48
    category: qmd
    issue: >
      The roadmap entry for Responsible Engineering links to @sec-responsible-ai-governance-structures-a255, a subsection inside the chapter, rather than the chapter-level @sec-responsible-ai target.
    why: >
      The other roadmap entries point readers to chapter openings. Linking the final entry to a late subsection makes navigation inconsistent and may skip the intended chapter introduction.
    suggestion: >
      Change the cross-reference to @sec-responsible-ai unless there is a deliberate reason to send readers directly to governance structures.
  - severity: minor
    line: 11
    category: prose
    issue: >
      The callout uses second-person address: "You cannot 'anonymize' data once it is memorized by weights."
    why: >
      The MIT Press prose rules forbid "you" in body prose and non-protected callouts; only learning objectives and checkpoint callouts may directly address the reader.
    suggestion: >
      Recast in impersonal systems prose, for example by making anonymization the subject of the sentence.
  - severity: minor
    line: 3
    category: terminology
    issue: >
      The opening paragraph introduces several overlapping frames for the same part: "The Hardened System," "Governance of the Fleet," and "physics of responsible engineering."
    why: >
      Part-opening material should give readers a stable organizing frame. Multiple new labels in one paragraph dilute the canonical "Responsible Fleet" framing used elsewhere in volume 2.
    suggestion: >
      Choose one primary frame for Part IV and make the other phrases descriptive rather than title-like, or remove the extra bolded labels.
  - severity: style
    line: 3
    category: prose
    issue: >
      The phrase "not optional 'features,' but fundamental..." follows the banned formulaic "not X, but Y" intensification pattern.
    why: >
      The prose standard flags this construction as a common AI-pattern intensifier; it makes the opener sound more like position-paper rhetoric than textbook exposition.
    suggestion: >
      State the positive claim directly: security, privacy, robustness, and sustainability are engineering constraints.
  - severity: style
    line: 5
    category: prose
    issue: >
      The sentence "not just ethically, but operationally" repeats the same banned "not just X, but Y" pattern.
    why: >
      The style guide asks for direct causal explanation instead of formulaic contrast. The sentence already names concrete operational failure modes, so the intensifier is unnecessary.
    suggestion: >
      Replace the contrast with a direct statement that ethical failures become operational failures through regulation, breach, or resource limits.
  - severity: style
    line: 24
    category: prose
    issue: >
      The phrase "rather than just rate efficiency" uses "just" as a minimizer.
    why: >
      The prose standard flags "just" in this sense as informal padding unless it has a precise temporal or logical role.
    suggestion: >
      Replace "just rate efficiency" with "rate efficiency alone."
  - severity: style
    line: 38
    category: prose
    issue: >
      "Destroy its own ecosystem" is rhetorically forceful but vague for a principle callout.
    why: >
      The MIT Press standard favors precise, evidence-oriented systems prose over dramatic language. The surrounding feedback-loop claim is stronger if it names the failure mechanism.
    suggestion: >
      Specify the mechanism, such as degrading the future data distribution, amplifying incentives, or destabilizing the monitored environment.
notes: >
  Cross-reference checks found the first three roadmap targets resolving at chapter level. No figures, tables, citations, or listings appear in this part opener. The callout class and overall principle-card structure match neighboring volume 2 part files.
