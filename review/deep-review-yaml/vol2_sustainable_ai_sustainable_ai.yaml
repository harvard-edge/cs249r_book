file: book/quarto/contents/vol2/sustainable_ai/sustainable_ai.qmd
status: findings
summary: "The chapter has strong systems framing, but it is not release-ready: several quantitative claims conflict, one core carbon equation double-counts PUE relative to the immediately preceding definition, and a TinyML table is malformed. The prose also contains repeated energy-wall material and several register/style issues that should be cleaned before final copyedit."
findings:
  - severity: major
    line: 1256
    category: math
    issue: "The operational-carbon equation reuses E_total inconsistently and risks double-counting facility overhead."
    why: "Line 1236 defines E_total as component energy multiplied by PUE, but line 1256 defines C_operational = E_total x CI_grid x PUE and line 1258 says E_total is IT energy. Readers following the prior definition would multiply by PUE twice."
    suggestion: "Use distinct symbols such as E_IT and E_facility, or remove the extra PUE when E_total already includes facility overhead."
  - severity: major
    line: 2539
    category: qmd
    issue: "The TinyML optimization table splits one technique across two rows."
    why: "The table has a filled row for 'Neural Architecture' and then an empty row for 'Search for MCUs', which will render as a malformed/ambiguous table entry rather than the intended 'Neural Architecture Search for MCUs'."
    suggestion: "Merge the split label into one row and fill or remove any intentionally blank cells."
  - severity: major
    line: 373
    category: flow
    issue: "The chapter presents two near-duplicate energy-wall figures and explanations."
    why: "Lines 373-501 introduce @fig-energy-wall-quantitative with compute demand vs. hardware efficiency; lines 638-646 introduce @fig-energy-wall with the same 350,000x growth narrative against energy infrastructure. The repetition interrupts progression and makes the textbook flow feel stitched together."
    suggestion: "Keep one energy-wall figure or make the second clearly answer a different question not covered by the first."
  - severity: major
    line: 2848
    category: consistency
    issue: "The fallacy section uses different grid intensity numbers from the worked example it references."
    why: "The worked example uses 429 g/kWh for the US average and 20 g/kWh for Quebec, yielding about a 21x ratio; line 2848 states 367 g/kWh and 34.5 g/kWh lifecycle while still claiming a 21-fold difference. 367/34.5 is about 10.6, not 21."
    suggestion: "Align the fallacy numbers with the earlier worked example, or recompute the ratio and explain why lifecycle intensity changes the comparison."
  - severity: major
    line: 2852
    category: consistency
    issue: "The embodied-carbon fallacy contradicts the earlier amortized embodied-carbon calculation by two orders of magnitude."
    why: "Lines 1501-1506 calculate 108 kg embodied carbon for 64 H100s over 14 days, but line 2852 says 64 H100s contribute 10.5 metric tons embodied carbon for the same 14-day run. The latter appears to use full manufacturing carbon rather than amortized carbon."
    suggestion: "State whether the comparison uses full upfront manufacturing carbon or amortized job-level carbon, then use the same basis consistently."
  - severity: minor
    line: 85
    category: consistency
    issue: "The GPT-3 household-energy comparison varies across the chapter."
    why: "Line 85 says roughly 100 U.S. homes, line 91 says roughly 120 household-years, line 304 says 122, and line 665 says 130. The variation is small but noticeable because the claim recurs as an anchoring example."
    suggestion: "Choose one household baseline and use one rounded value consistently."
  - severity: minor
    line: 1908
    category: citation
    issue: "The OpenAI supercomputer hardware specification is asserted as a current training-frontier reference without date/context."
    why: "The 285,000 CPU cores and 10,000 GPUs figure is from an earlier OpenAI/Microsoft infrastructure disclosure, but the surrounding paragraph discusses frontier AI models generally. Without temporal framing, readers may infer this is current frontier-training infrastructure."
    suggestion: "Qualify the example by date or system generation, or replace it with a current, cited frontier-cluster example."
  - severity: style
    line: 73
    category: prose
    issue: "The non-protected callout uses informal phrasing and a first-person instructional sentence."
    why: "'Here, we ensure the fleet can keep running' reads more like a slide tagline than MIT Press textbook prose, and non-protected callouts follow body-prose register."
    suggestion: "Replace with a declarative sentence that states the governance-layer implication without 'Here, we ensure'."
  - severity: style
    line: 1250
    category: prose
    issue: "The section opening uses rhetorical questions in body prose."
    why: "The prose standard permits questions in the Purpose hook and protected learning/checkpoint callouts, but this body section asks and answers 'Does that mean...' rather than asserting the point."
    suggestion: "Convert the question-answer pair into a declarative explanation of operational vs. embodied carbon."
  - severity: style
    line: 653
    category: terminology
    issue: "Several capitalized quoted phrases read as invented labels rather than established terminology."
    why: "'Noise Event', 'Voltage Spike', 'Voltage Sag', 'Byproduct', 'Pollutant', and 'Circular Energy Economy' are capitalized in running prose without being formal definitions. This conflicts with the house style tendency to lowercase concept terms unless they are canonical."
    suggestion: "Lowercase noncanonical terms or introduce them explicitly as defined terms if they are used later."
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. No .qmd files were edited."
