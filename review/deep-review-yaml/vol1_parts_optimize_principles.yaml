file: book/quarto/contents/vol1/parts/optimize_principles.qmd
status: findings
summary: >
  The Part III opener has a coherent diagnostic arc and no obvious malformed
  callout, equation, citation, cross-reference, figure, or listing structure.
  Release-readiness issues remain in the diagnostic table and MIT Press prose
  register: the table overstates batching as a latency-bound optimization, and
  several non-protected passages use second person, informal wording, or
  unnecessary capitalization/emphasis.
findings:
  - severity: style
    line: 12
    category: prose
    issue: >
      The phrase "sweet spot" is informal in a principle callout.
    why: >
      The MIT Press prose standard calls for academic textbook register and
      avoids blog-style idioms, especially in high-visibility invariant boxes.
    suggestion: >
      Replace with a precise phrase such as "operating point" or "deployment
      point."
  - severity: style
    line: 21
    category: prose
    issue: >
      The implication says "math" where the surrounding technical vocabulary is
      "compute" or "arithmetic."
    why: >
      "Math" is conversational shorthand and weakens the otherwise formal
      Roofline framing.
    suggestion: >
      Use "compute" or "arithmetic throughput" instead.
  - severity: major
    line: 30
    category: consistency
    issue: >
      The bottleneck table lists "Batching" as an optimization that works for
      latency-bound workloads.
    why: >
      Elsewhere in the book, batching is framed as a throughput optimization
      that often increases queueing delay and tail latency. Presenting it as a
      latency-bound remedy can teach the wrong diagnostic rule unless the text
      narrows it to microbatching or overlap that preserves the latency SLO.
    suggestion: >
      Replace or qualify "Batching" for the latency-bound row; consider
      "kernel fusion, request pipelining, placement, async dispatch" or specify
      bounded microbatching under an explicit latency budget.
  - severity: style
    line: 34
    category: prose
    issue: >
      "where you sit relative to this wall" uses second person in body prose.
    why: >
      The house style forbids "you" outside learning objectives and checkpoint
      callouts; this paragraph is ordinary part-opening exposition.
    suggestion: >
      Recast as "where a workload sits relative to this wall" or "where the
      operating point lies relative to this wall."
  - severity: minor
    line: 40
    category: terminology
    issue: >
      "Data Locality" is bolded and capitalized as if it were a formal named
      invariant, while the conclusion restates the point as ordinary lowercase
      "data locality."
    why: >
      Unnecessary capitalization and bold emphasis make terminology look less
      stable and conflict with the style rules' preference for limited emphasis.
    suggestion: >
      Use lowercase "data locality" without bold unless it is intended to be a
      defined term.
  - severity: style
    line: 50
    category: prose
    issue: >
      "your model" and "your total system speedup" use second person inside a
      non-protected principle callout.
    why: >
      The prose standard applies the no-second-person rule to all callouts
      except learning objectives and checkpoints.
    suggestion: >
      Replace with "a model" and "the total system speedup" or similar
      third-person phrasing.
  - severity: minor
    line: 50
    category: citation
    issue: >
      The Amdahl's Law principle gives the formula and a numeric example but
      does not cite Amdahl or cross-reference the formal derivation used
      elsewhere in the volume.
    why: >
      The same law is formally sourced in the machine foundations appendix; a
      part-opening invariant should either cite the source or point readers to
      the derivation to avoid an unsupported canonical formula.
    suggestion: >
      Add a compact citation to @amdahl1967 or a parenthetical reference to the
      formal appendix section.
notes: >
  No edits were made to any .qmd file. The cross-reference @tbl-bottleneck-diagnostic
  and @sec-dam-taxonomy target appear structurally valid, and @williams2009 is
  used elsewhere in the volume for the Roofline model.
