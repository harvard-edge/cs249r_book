file: book/quarto/contents/vol2/parts/distributed_ml_principles.qmd
status: findings
summary: >
  The part opener is structurally coherent and its chapter cross-references resolve, but several
  principle statements need tightening before release. The main issues are overbroad scaling-law
  language, an imprecise distributed step-time equation, one QMD/math rendering problem, and
  capitalization that drifts away from MIT Press sentence-style treatment in body prose.
findings:
  - severity: major
    line: 8
    category: math
    issue: >
      The invariant says loss improves as a power-law function of compute, dataset size, and
      parameters, but the displayed equation only models loss as a function of compute.
    why: >
      As written, the prose and equation make different claims. A canonical principle box should
      not collapse a multivariate scaling relationship into a compute-only expression without
      saying that it is a simplified projection.
    suggestion: >
      Either show the multivariate relationship, or state that the equation is the compute-only
      simplification used to illustrate diminishing returns.
  - severity: major
    line: 11
    category: consistency
    issue: >
      "Scale is not an option; it is a requirement for capability" is too absolute for textbook
      prose.
    why: >
      The claim is defensible for frontier foundation-model capability, but not for all ML systems
      or all capabilities. The current wording turns a domain-specific scaling observation into an
      unsupported universal law.
    suggestion: >
      Narrow the claim to frontier model capability or large-scale training, and tie it to the
      diminishing-returns argument in the same sentence.
  - severity: major
    line: 16
    category: math
    issue: >
      The distributed step-time equation subtracts $T_{\text{overlap}}$ without bounding it.
    why: >
      Communication hiding can only hide a bounded portion of communication behind computation.
      The current expression can imply impossible step times if the overlap term exceeds the
      non-overlappable work, and the compute term also assumes perfect $1/N$ compute scaling.
    suggestion: >
      Constrain the overlap term, or define it explicitly as the hidden portion of communication
      with $0 \le T_{\text{overlap}} \le T_{\text{comm}}(N)$.
  - severity: minor
    line: 18
    category: consistency
    issue: >
      Gradient accumulation and compression are presented only as ways to reduce or amortize
      communication cost.
    why: >
      The prose standard requires optimizations to name their trade-off. Gradient accumulation
      changes the effective batch/convergence regime, while compression can introduce numerical
      error or convergence risk.
    suggestion: >
      Add a brief trade-off phrase after the examples, rather than presenting them as pure wins.
  - severity: minor
    line: 32
    category: terminology
    issue: >
      "Burst Buffers" is capitalized in running prose as if it were a formal proper noun.
    why: >
      MIT Press style naturalizes generic technical concepts in body prose unless they are formal
      labels, products, acronyms, or first-definition heads.
    suggestion: >
      Use "burst buffers" unless this refers to a specific named product or formal architecture.
  - severity: minor
    line: 38
    category: qmd
    issue: >
      "$C^3$ taxonomy" is likely to render as an italic math variable C with a superscript, not as
      the intended textual C³ framework name.
    why: >
      Elsewhere in the volume, the framework appears as prose text such as C$^3$ or C³. Rendering
      the whole token in math mode makes the taxonomy name visually inconsistent.
    suggestion: >
      Use the book's canonical textual form for the framework name, such as C$^3$ taxonomy or C³
      taxonomy.
  - severity: style
    line: 43
    category: prose
    issue: >
      "Part II establishes how we make the Fleet compute" is informal and mechanically vague for
      part-opening prose.
    why: >
      The phrase "make the Fleet compute" reads more like internal scaffolding than MIT Press
      textbook prose, and "Fleet" is capitalized in ordinary running prose without a formal-label
      reason.
    suggestion: >
      Recast the sentence as a concrete roadmap statement about coordinating distributed training
      work across the fleet.
  - severity: style
    line: 45
    category: terminology
    issue: >
      "Data, Tensor, Pipeline, Expert Parallelism" uses title-case concept terms inside a prose
      list item.
    why: >
      The MIT Press capitalization rule calls for naturalized lowercase for concept terms in
      body prose and sentence-style display contexts, while preserving proper nouns and acronyms.
    suggestion: >
      Use "data, tensor, pipeline, and expert parallelism" unless these are being presented as
      formal chapter-title labels.
notes: >
  No broken section cross-references were found for the four roadmap targets. The file contains no
  figures, tables, listings, or citations to audit.
