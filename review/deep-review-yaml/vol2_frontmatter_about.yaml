file: book/quarto/contents/vol2/frontmatter/about.qmd
status: findings
summary: >
  The frontmatter establishes the right scope and audience for Volume II, but it is not fully release-ready.
  The main issues are format breakage from raw LaTeX figures in cross-format prose, repeated second-person
  address in body text, uncited quantitative claims, and a few frontmatter passages that read more like
  promotional or course-site copy than MIT Press textbook prose.
findings:
  - severity: major
    line: 57
    category: figure
    issue: >
      The Fleet Stack visual is inserted as a raw LaTeX block in content that is otherwise not gated to PDF.
    why: >
      In HTML output, raw LaTeX blocks are omitted, but the surrounding prose still says "the full stack above"
      and explains arrows and Roman numerals. This leaves HTML readers with a dangling reference and no visual.
    suggestion: >
      Use a cross-format figure pattern with caption and alt text, or gate the LaTeX-only prose and visual to PDF
      and provide an HTML equivalent.
  - severity: major
    line: 67
    category: figure
    issue: >
      The three example Fleet Stack diagrams are also raw LaTeX without figure labels, captions, or alt text.
    why: >
      The prose depends on the diagrams to explain layer intensity, but the block has no accessible description
      and will not render in HTML. This violates the book's visual and alt-text standards.
    suggestion: >
      Convert the examples to labeled figure markup with alt text, or provide separate HTML/PDF renderings with
      equivalent descriptive prose.
  - severity: major
    line: 25
    category: prose
    issue: >
      Body prose directly addresses the reader: "this book teaches you to reason about fleet performance."
    why: >
      The MIT Press prose standard forbids "you" in body prose outside learning objectives and checkpoint
      callouts. The same pattern recurs at lines 55, 125, and 149.
    suggestion: >
      Replace second-person phrasing with reader-neutral or "we" constructions throughout this frontmatter.
  - severity: major
    line: 11
    category: citation
    issue: >
      The AlexNet and GPT-4 training-scale comparison gives specific hardware counts and durations without a
      citation.
    why: >
      Quantitative claims, especially estimates about proprietary frontier-model training runs, need attribution
      or qualification to meet the book's evidence standard.
    suggestion: >
      Add citations for the AlexNet training time and the GPT-4 GPU/month estimate, or soften the comparison to
      avoid unsupported precision.
  - severity: minor
    line: 13
    category: citation
    issue: >
      The 10,000-accelerator failure-rate example uses a 2 percent annual failure rate and derives a node failure
      every two hours without citing the assumed rate.
    why: >
      The arithmetic is plausible, but the input failure rate is empirical and should not appear as an uncited
      fact in frontmatter.
    suggestion: >
      Cite the source of the failure-rate assumption or mark it explicitly as an illustrative calculation.
  - severity: minor
    line: 37
    category: prose
    issue: >
      The four part descriptions are framed as direct questions in body text.
    why: >
      The prose standard allows questions only in defined pedagogical contexts such as purpose hooks, learning
      objectives, and checkpoint callouts. These questions make the frontmatter read less formal than the
      surrounding textbook register.
    suggestion: >
      Recast each part line as a declarative statement of scope rather than an italicized question.
  - severity: minor
    line: 55
    category: consistency
    issue: >
      The text says "a margin figure highlights which layer each chapter addresses," but the examples shown here
      are centered full-width LaTeX blocks.
    why: >
      The mismatch between "margin figure" and the displayed centered figures can confuse readers about whether
      this page is showing the actual recurring margin device or a separate explanatory diagram.
    suggestion: >
      Clarify that the centered figures are examples of the recurring margin indicator, or adjust the layout to
      match the described margin treatment.
  - severity: minor
    line: 97
    category: flow
    issue: >
      The suggested reading paths are plain paragraphs with repeated "The X Path" openers rather than a scannable
      frontmatter structure.
    why: >
      Frontmatter readers use this section for navigation. The current paragraph form makes the alternatives
      harder to compare and feels less polished than the preceding structured part overview.
    suggestion: >
      Present the paths as a compact list or table with consistent labels and chapter/part targets.
  - severity: style
    line: 105
    category: prose
    issue: >
      "After the Introduction" manually capitalizes a prose reference to the introduction.
    why: >
      The style guide requires lowercase prose references to chapters and sections unless a formal title is being
      used as a title.
    suggestion: >
      Use "after the introduction" or cross-reference the introduction section.
  - severity: minor
    line: 121
    category: prose
    issue: >
      The open-source section invites every reader to contribute and later says "readers like you participate,"
      shifting into website/community copy.
    why: >
      The content is useful, but the second-person invitation and promotional cadence are less consistent with
      MIT Press frontmatter register.
    suggestion: >
      Keep the accessibility and contribution message, but make it reader-neutral and more concise.
notes: >
  Reviewed against the local MIT Press/book prose standard. No source .qmd files were edited.
