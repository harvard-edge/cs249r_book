file: book/quarto/contents/vol2/collective_communication/collective_communication.qmd
status: findings
summary: >
  The chapter has a strong technical arc and useful quantitative examples, but it is
  not release-ready. The main risks are quantitative inconsistencies in gradient
  precision and communication terms, a raw principle reference that may not resolve
  across formats, uncited measurement tables, malformed inline indexing, and several
  MIT Press prose-standard violations from colloquial metaphor, rhetorical questions,
  and bold starter patterns.
findings:
  - severity: major
    line: 59
    category: math
    issue: "The BF16 70B AllReduce example says the 5.6 second transfer is 'dominating the L_lat term'."
    why: "A 140 GB gradient over a 50 GB/s link is dominated by the bandwidth term, not latency. This reverses the chapter's central alpha-beta distinction at the first definition callout."
    suggestion: "Change the claim to say it dominates the bandwidth/data-movement term, or explicitly separate the latency and bandwidth contributions."
  - severity: major
    line: 157
    category: consistency
    issue: "The chapter alternates between BF16 and FP32 gradient sizes for the same 70B model without clearly changing scenarios."
    why: "Lines 59 and 69 use BF16 and 140 GB, the notebook at line 157 uses FP32 and 280 GB, line 511 introduces a 280 GB FP32 scenario, and line 592 immediately switches that scenario back to BF16. Readers cannot tell which budget is the canonical running example."
    suggestion: "Declare each precision switch explicitly, or use one precision consistently for the 70B running example."
  - severity: major
    line: 602
    category: qmd
    issue: "The chapter uses raw LaTeX `\\ref{pri-alpha-beta-model}` for a principle reference."
    why: "The principle anchor exists elsewhere, but raw `\\ref` is fragile in Quarto HTML/EPUB and bypasses the book's normal cross-reference machinery."
    suggestion: "Use the Quarto cross-reference form, likely `@pri-alpha-beta-model`, and keep the visible prose lowercase if needed."
  - severity: major
    line: 602
    category: citation
    issue: "The NCCL reality-gap table presents measured DGX H100/NDR timings without a source."
    why: "The table claims specific measured latencies, measured/predicted ratios, and cluster configuration; release prose needs a citation or an explicit statement that these are illustrative estimates."
    suggestion: "Add a source for the measurements or label the table as a representative illustrative model rather than measured data."
  - severity: minor
    line: 681
    category: terminology
    issue: "The primitive name is inconsistently styled as AllToAll and AlltoAll across the chapter."
    why: "The learning objectives, tables, callouts, summary, and archetype table alternate spellings, which weakens terminology discipline for a core primitive."
    suggestion: "Choose one canonical spelling, preferably the library-standard `AllToAll`, and apply it throughout."
  - severity: minor
    line: 950
    category: prose
    issue: "The Recursive Halving-Doubling section uses a rhetorical question in body prose: 'can an algorithm achieve the best of both?'"
    why: "The MIT Press prose standard permits questions only in the Purpose hook and protected learning/checkpoint callouts."
    suggestion: "Replace the question with a declarative transition that states the trade-off the algorithm addresses."
  - severity: style
    line: 1242
    category: prose
    issue: "The sentence 'A GPU node is a high-speed sanctuary...' uses an informal metaphor."
    why: "The rule file calls for rigorous textbook prose and warns against blog-post register; this metaphor feels more editorial than technical."
    suggestion: "State the bandwidth hierarchy directly in technical terms."
  - severity: style
    line: 1641
    category: prose
    issue: "The error-feedback introduction uses a traveler analogy with unspaced units: '10kg' and '100kg'."
    why: "The analogy is informal for MIT Press body prose, and the units violate the spacing rule."
    suggestion: "Replace the analogy with a direct explanation of residual accumulation and write units with spaces if retained."
  - severity: minor
    line: 1647
    category: prose
    issue: "The phrase 'an 100x bandwidth reduction' is grammatically wrong."
    why: "The article should agree with the pronounced form of the number, and the book generally uses `100$\\times$` rather than plain `100x`."
    suggestion: "Use 'a 100$\\times$ bandwidth reduction'."
  - severity: major
    line: 1883
    category: qmd
    issue: "The DDP mention places an index command inside an inline code span: `DistributedDataParallel\\index{DistributedDataParallel}`."
    why: "The index command will be rendered as literal code rather than creating an index entry, and the code span incorrectly includes the markup."
    suggestion: "Move `\\index{DistributedDataParallel}` outside the backticks."
  - severity: minor
    line: 2031
    category: prose
    issue: "The Fallacies and Pitfalls section uses repeated bold paragraph starters such as '**Fallacy**' and '**Pitfall**'."
    why: "The prose standard explicitly flags bold paragraph starters in body text as an operations-manual anti-pattern."
    suggestion: "Convert the entries into a structured list or rewrite them as short paragraphs with normal topic sentences."
  - severity: major
    line: 2073
    category: flow
    issue: "The Summary section introduces a new compression-payback notebook and worked example after the synthesis has begun."
    why: "A summary should consolidate prior material; adding a new calculation after the summary heading disrupts the closing flow and makes the chapter feel unfinished."
    suggestion: "Move the notebook into the compression trade-offs section or remove it from the summary."
  - severity: minor
    line: 2082
    category: consistency
    issue: "The compression-payback code comment says the notebook should show a 3.5x speedup, but the calculation and guard produce about 5.7x."
    why: "Even though this is in source comments, stale notebook metadata can mislead future maintainers and reviewers about the intended result."
    suggestion: "Update the comment to match the calculated result or adjust the scenario to produce the intended 3.5x value."
  - severity: style
    line: 2159
    category: prose
    issue: "The chapter-connection callout says 'the roads are constantly crumbling'."
    why: "The phrasing is vivid but colloquial, and the rule file asks for formal academic textbook register in nonprotected callouts."
    suggestion: "Replace with a direct transition about hardware failures, network faults, and recovery."
notes: >
  Reviewed only book/quarto/contents/vol2/collective_communication/collective_communication.qmd
  against the MIT Press/book-prose standard. I did not edit any .qmd files.
