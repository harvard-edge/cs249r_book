file: book/quarto/contents/vol2/conclusion/conclusion.qmd
status: findings
summary: >
  The chapter is structurally coherent as a volume conclusion, but several release-readiness issues remain:
  non-protected callouts use rhetorical questions and bold paragraph-starter labels, a newly introduced
  "compound capability law" is mathematically and evidentially underdefined, and the closing sequence shifts
  into manifesto language before returning to takeaways.
findings:
  - severity: major
    line: 177
    category: prose
    issue: >
      The "Compound capability law" callout uses bold paragraph-starter labels and ends its opening paragraph
      with a rhetorical question.
    why: >
      The MIT Press prose standard prohibits rhetorical questions and bold paragraph starters in non-protected
      callouts; this callout is neither a learning-objectives nor checkpoint callout.
    suggestion: >
      Convert "Observation," "Principle," and "Implication" into ordinary prose or a compact table, and replace
      the question with a declarative transition.
  - severity: major
    line: 184
    category: math
    issue: >
      The displayed "Capability" proportionality introduces Model_IQ, Tools, Context, Planning, and an exponent
      N without definitions, units, derivation, or citation.
    why: >
      As written, the equation gives a speculative forecast the appearance of a quantitative law, which does not
      meet the book's standard for quantitative rigor.
    suggestion: >
      Either define it explicitly as a qualitative heuristic and remove equation styling, or add definitions,
      assumptions, and supporting evidence.
  - severity: minor
    line: 226
    category: prose
    issue: >
      The "Projecting the 100× fleet" notebook callout uses a direct reader-facing question in a non-protected
      callout.
    why: >
      Non-protected callouts follow body-prose rules, which forbid rhetorical questions and require declarative
      exposition.
    suggestion: >
      Recast the prompt as a scenario statement followed by the calculation target.
  - severity: minor
    line: 277
    category: prose
    issue: >
      The "The physics of better fabrics" notebook callout also uses a direct question.
    why: >
      This repeats the same non-protected-callout register violation and makes the exercise read like a blog or
      worksheet rather than final textbook prose.
    suggestion: >
      State the scenario and ask the computation implicitly, for example by naming the efficiency dividend to be
      computed.
  - severity: minor
    line: 359
    category: prose
    issue: >
      The Fermi estimate callout opens with a rhetorical question and uses the informal phrase "intuition pump."
    why: >
      The question violates the callout register rule, and "intuition pump" is too colloquial for MIT Press
      textbook prose.
    suggestion: >
      Replace with a declarative framing such as "This Fermi estimate compares..." and use "rough analogy" or
      "sanity check" instead.
  - severity: minor
    line: 364
    category: math
    issue: >
      The displayed calculation hard-codes 1,000 TFLOPS per H100, while the Python cell computes from
      H100_FLOPS_FP16_TENSOR, which is 989 TFLOPS/s in the local constants.
    why: >
      The line mixes an approximate prose value with a generated result, making the equality look exact when the
      underlying value is rounded.
    suggestion: >
      Either render the per-GPU TFLOPS from Python or mark the arithmetic as approximate throughout.
  - severity: major
    line: 378
    category: consistency
    issue: >
      "We have conquered Scale" overstates the conclusion and conflicts with earlier claims that scale continues
      to create qualitative changes and operational constraints.
    why: >
      The phrasing is triumphalist and suggests a solved problem, while the chapter's argument is that scale
      remains the central systems challenge.
    suggestion: >
      Reframe as mastery of principles for scale rather than conquest of scale itself.
  - severity: major
    line: 388
    category: flow
    issue: >
      The author signature appears before "The essential insights from this textbook are" and the final takeaways
      callout.
    why: >
      The signature reads like the chapter ending, so the subsequent takeaways feel appended out of order and
      weaken the closing flow.
    suggestion: >
      Move the signature after the takeaways or remove it from the chapter body.
  - severity: style
    line: 173
    category: prose
    issue: >
      The Path Forward section relies on time-sensitive phrases such as "today's challenges," "already here,"
      and "the next decade."
    why: >
      These phrases age quickly in a textbook release and can become ambiguous for readers after publication.
    suggestion: >
      Anchor the claims to concrete conditions or publication-era context instead of relative time.
  - severity: style
    line: 241
    category: terminology
    issue: >
      "high bandwidth flash" is missing the compound-modifier hyphen and may be confused with high-bandwidth
      memory terminology.
    why: >
      The chapter introduces HBF as a forward-looking technology; inconsistent or underdefined terminology here
      can confuse readers near the conclusion.
    suggestion: >
      Use "high-bandwidth flash (HBF)" and briefly clarify whether it means storage-as-memory, flash-backed
      memory expansion, or another substrate.
  - severity: style
    line: 386
    category: prose
    issue: >
      "Build systems that scale. Build systems that endure. Build systems that serve humanity well." shifts from
      academic conclusion into manifesto-style imperative prose.
    why: >
      The sentence is memorable, but it is more keynote closing than MIT Press textbook register.
    suggestion: >
      Retain the idea in declarative prose or reserve the imperative cadence for a preface, dedication, or final
      signed note.
notes: >
  I did not edit any .qmd files. Cross-reference and citation syntax looked generally well formed in the reviewed
  chapter, but I did not run a full Quarto render.
