file: "book/quarto/contents/vol2/frontmatter/_notation_distributed.qmd"
status: findings
summary: "The distributed notation extension is concise and structurally sound, but several notation definitions need tightening before release. The main risks are ambiguous reliability units, an unspecified MTBF scope in the checkpoint formula, and a few terminology choices that can mislead readers when later chapters distinguish devices, nodes, and additional parallelism dimensions."
findings:
  - severity: major
    line: 51
    category: math
    issue: "The reliability equation uses $t$ in $R_{\\text{system}}(t) = e^{-N\\lambda t}$, but the table does not define $t$ or state its required unit."
    why: "Line 62 defines $\\lambda$ in failures/hour. The exponent is dimensionless only if $t$ is also measured in hours; otherwise readers may mix seconds-scale training windows with hourly FIT-derived rates and get incorrect probabilities."
    suggestion: "Add a table row for $t$ or a note that $t$ must use the same time unit as $\\lambda$."
  - severity: major
    line: 55
    category: math
    issue: "The Young-Daly formula uses a generic $\\text{MTBF}$ term without specifying whether it is component MTBF or system/cluster MTBF."
    why: "Line 63 defines both average MTBF and $\\text{MTBF}_{\\text{system}} = \\text{MTBF}_{\\text{component}} / N$. For checkpoint intervals, later chapters use system-wide MTBF; using component MTBF would overestimate $\\tau_{\\text{opt}}$ by $\\sqrt{N}$."
    suggestion: "Write $\\text{MTBF}_{\\text{system}}$ in the formula or state that $\\text{MTBF}$ means the system-wide failure interval for the job."
  - severity: minor
    line: 62
    category: consistency
    issue: "The $\\lambda$ note says the per-component failure rate is 'used directly in the reliability equation,' while the displayed system equation uses the aggregate rate $N\\lambda$."
    why: "The wording can blur the distinction between component failure rate and system failure rate, which is central to the scale argument in the fault-tolerance chapter."
    suggestion: "Clarify that $\\lambda$ is per component and the system rate is $N\\lambda$ under the independent, identical-component assumption."
  - severity: minor
    line: 70
    category: consistency
    issue: "The sentence says large-scale training partitions the workload across three orthogonal dimensions, but later Volume 2 material also discusses expert parallelism and sharded-data variants."
    why: "As written, the claim sounds exhaustive rather than specifically defining the conventional 3D-parallelism notation $d \\times p \\times t$."
    suggestion: "Scope the sentence to '3D parallelism partitions...' or 'A common 3D decomposition partitions...'."
  - severity: minor
    line: 88
    category: terminology
    issue: "The collision table defines $N$ as 'Number of Nodes/Devices,' while the main notation table defines $N$ as accelerator/device count."
    why: "Nodes and devices are not interchangeable in multi-GPU nodes; substituting node count for device count would change the step-time and parallelism formulas."
    suggestion: "Use 'devices/accelerators' for $N$ here and reserve a separate symbol if node count is needed."
  - severity: style
    line: 10
    category: flow
    issue: "The phrase 'may not appear in every equation in this notation chapter' is internal-facing and slightly defensive."
    why: "Frontmatter notation should read as a reference for students, not as an explanation of why unused symbols are present."
    suggestion: "Replace with a concise reader-facing rationale, such as noting that later chapters reuse the symbols."
notes: "No malformed QMD, broken local cross-reference, citation issue, or figure/table markup problem was found in this partial file. The file correctly avoids YAML and H1 markup as instructed by its header comments."
