file: "book/quarto/contents/vol1/introduction/introduction.qmd"
status: findings
summary: "The chapter is structurally strong and gives the volume a clear D.A.M, Iron Law, degradation, lifecycle, and five-pillar frame, but it is not yet release-clean. The largest readiness issue is framework consistency: the text introduces five Lighthouse Models, four System Archetypes, four Application Scenarios, and additional Lighthouse Workloads with overlapping but different rosters. Several prose choices also violate the MIT Press register rules, and some quantitative GPT-4/scale claims need citation or clearer estimate language."
findings:
  - severity: major
    line: 1391
    category: consistency
    issue: "The chapter introduces 'Lighthouse Workloads' as GPT-4 and Wake Vision before the canonical five Lighthouse Models table later defines a different roster: ResNet-50, GPT-2/Llama, DLRM, MobileNetV2, and Keyword Spotting."
    why: "The prose standard requires a single canonical label and roster for recurring lighthouses/archetypes. The current framing makes it unclear whether GPT-4, Wake Vision, YOLOv8-nano, and Llama-2-70B are lighthouse models, missions, examples, or separate workload archetypes."
    suggestion: "Separate and name the taxonomy explicitly: System Archetypes, Lighthouse Models, and Application Scenarios. Use the same five Lighthouse Model names everywhere or state that the mission table uses different scenario-specific models."
  - severity: major
    line: 1749
    category: terminology
    issue: "The Lighthouse Models section uses informal labels such as 'Cast of Characters' and 'Systems Detectives,' then line 1751 calls each model an 'archetype.'"
    why: "This blurs the distinction between lighthouse models and system archetypes at the exact point where the volume establishes its recurring examples. It also weakens the MIT Press register with playful terminology."
    suggestion: "Use one sober formulation, such as 'recurring reference workloads,' and reserve 'archetype' for the deployment/system categories."
  - severity: major
    line: 1817
    category: citation
    issue: "The claim that GPT-4-class training reportedly consumed over two million A100 GPU-days is uncited, while earlier lines carefully identify GPT-4 training figures as public estimates rather than official disclosures."
    why: "This is a high-salience quantitative claim about a proprietary training run. Without a citation or caveat, it reads as established fact and conflicts with the more careful framing in the Bitter Lesson table."
    suggestion: "Add a citation for the estimate or rephrase as an illustrative public-estimate regime consistent with lines 1116 and 1132."
  - severity: major
    line: 2058
    category: figure
    issue: "The training compute figure caption and data assert specific GPT-4, Llama-3-70B, and Gemini-Ultra training FLOP values without citation or estimate caveats."
    why: "The chapter elsewhere treats undisclosed frontier-model training details cautiously. A plotted quantitative figure gives the estimates stronger authority than the surrounding prose supports."
    suggestion: "Cite the source for each frontier-model estimate, move them into an 'illustrative estimates' category, or remove proprietary frontier points that cannot be sourced."
  - severity: minor
    line: 114
    category: prose
    issue: "Body prose opens with a rhetorical question: '*What* makes building these systems an engineering challenge distinct from traditional software?'"
    why: "The prose standard permits the Purpose hook and checkpoint questions, but forbids rhetorical questions in body prose."
    suggestion: "Convert to a declarative transition, such as stating that the distinction is the dual mandate."
  - severity: minor
    line: 217
    category: prose
    issue: "A non-protected perspective callout uses a rhetorical-question heading: 'Why we cannot just test ML systems.'"
    why: "Non-checkpoint callouts follow body-prose register rules, including the ban on rhetorical questions and minimizers such as 'just.'"
    suggestion: "Use a declarative heading, for example 'The verification gap in ML testing.'"
  - severity: minor
    line: 1743
    category: prose
    issue: "The RoC paragraph uses an embedded rhetorical question: 'is the silicon contract still economically viable?'"
    why: "This violates the body-prose question rule and introduces the 'silicon contract' phrase before its meaning is stable for readers."
    suggestion: "State the consequence declaratively: a 10x compute increase for a one percent accuracy gain may fail the RoC test."
  - severity: minor
    line: 1127
    category: prose
    issue: "Table ranges use hyphens in '1990s-2000s' and '98-99 percent.'"
    why: "The house style requires en dashes for ranges."
    suggestion: "Use '1990s–2000s' and '98–99 percent.'"
  - severity: minor
    line: 1819
    category: prose
    issue: "A sentence begins with a lowercase bold term: '**algorithmic efficiency**'."
    why: "The term begins a sentence and should follow normal sentence capitalization unless intentionally styled as a lowercase concept term; the surrounding named dimensions use inconsistent capitalization."
    suggestion: "Capitalize the sentence opening or restructure so the lowercase term appears mid-sentence."
  - severity: minor
    line: 2253
    category: figure
    issue: "The ML lifecycle figure alt text contains spacing typos: 'monitoring .' and 'E valuation'."
    why: "Alt text is reader-facing accessibility content and should be copyedited to the same standard as prose."
    suggestion: "Remove the stray spaces in the alt text."
  - severity: minor
    line: 2604
    category: prose
    issue: "The application-scenarios callout says these missions provide 'End-to-End' verification."
    why: "The capitalization is inconsistent with normal prose style and reads like product/marketing language rather than textbook register."
    suggestion: "Use 'end-to-end verification' unless this is a defined term."
  - severity: minor
    line: 2963
    category: consistency
    issue: "The takeaway says teams face 60–70 percent project failure rates, while the cited discussion at line 2739 and the later pitfall at line 2948 use 60–85 percent."
    why: "Changing the range in the summary makes the statistic appear inconsistent and weakens the citation trail."
    suggestion: "Use the same cited range throughout or explain why the takeaway narrows it."
  - severity: style
    line: 2974
    category: prose
    issue: "The chapter-connection callout opens with a rhetorical question: 'Where should an ML model actually run?'"
    why: "Chapter-connection callouts are not protected checkpoint or learning-objective blocks, so the body-prose ban on rhetorical questions applies."
    suggestion: "Replace with a declarative transition about deployment location being governed by physical constraints."
notes: "I reviewed only the requested chapter and wrote only this YAML file. I did not edit any .qmd files."
