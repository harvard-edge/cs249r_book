file: "book/quarto/contents/vol1/nn_architectures/nn_architectures.qmd"
status: findings
summary: "The chapter is technically rich and mostly coherent, but it is not fully release-ready under the MIT Press prose standard. The main issues are repeated second-person body prose, a mismatched attention figure caption/alt text, noncanonical lighthouse callout treatment, and several house-style terminology and punctuation violations."
findings:
  - severity: major
    line: 31
    category: prose
    issue: "Body prose uses direct second person repeatedly: 'When you select,' 'your model,' and 'your hardware.'"
    why: "The MIT Press standard permits second-person address only in learning objectives and checkpoint callouts. The Purpose hook may ask a question, but the following body paragraph still has to use the chapter's formal textbook voice."
    suggestion: "Recast the Purpose paragraph in declarative or 'we' voice, and remove 'you/your' from body prose."
  - severity: minor
    line: 76
    category: prose
    issue: "The phrase 'Choosing the right inductive biases for your data' uses second person in body prose."
    why: "This violates the same no-'you/your' rule outside protected pedagogical callouts and weakens the formal register."
    suggestion: "Use 'the data' or 'a workload's data' instead of 'your data.'"
  - severity: minor
    line: 276
    category: qmd
    issue: "The recurring workload callout uses `.callout-perspective` rather than `.callout-lighthouse`."
    why: "The prose standard requires `.callout-lighthouse` when the primary purpose is to present or apply the volume's recurring lighthouses/archetypes. This callout defines ResNet-50, GPT-2, and DLRM as canonical workloads."
    suggestion: "Change the callout class to `.callout-lighthouse` and keep the title focused on canonical workloads."
  - severity: major
    line: 2224
    category: figure
    issue: "The attention visualization caption says 'layer 5, head 7' and the pronoun 'their,' while the alt text and TikZ label describe 'Layer 4 Head 2' and a sentence using 'they.'"
    why: "Caption, alt text, and figure content disagree, which can confuse readers and creates an accessibility defect for screen-reader users."
    suggestion: "Make the caption, alt text, and rendered figure use the same layer/head and the same pronoun/sentence."
  - severity: minor
    line: 2789
    category: prose
    issue: "Body prose uses double hyphens as punctuation: 'entirely -- eliminating'. Similar instances appear in footnotes and later sections."
    why: "The house style distinguishes hyphen, en dash, and em dash; ASCII double hyphens are not acceptable final prose punctuation."
    suggestion: "Replace double hyphens with the appropriate em dash, en dash, or sentence punctuation throughout the chapter."
  - severity: minor
    line: 3055
    category: prose
    issue: "The sentence asks readers to 'notice' the context-window trend in body prose."
    why: "The standard discourages conversational figure directions such as 'notice how' in body prose; textbook prose should state the observed relationship directly."
    suggestion: "State the trend declaratively, for example that context windows remained flat through 2022 and then rose sharply."
  - severity: major
    line: 3055
    category: citation
    issue: "The claim that context windows 'exploded by three orders of magnitude in just two years' is a strong quantitative historical claim without an inline citation at the point of assertion."
    why: "The prose standard requires quantitative specificity to be supported by evidence. The chapter relies on a generated figure, but the body claim should still cite the sources or tie directly to cited figure data."
    suggestion: "Add citations for the model context-window data or qualify the sentence to match cited sources in the figure."
  - severity: minor
    line: 4749
    category: prose
    issue: "The summary returns to second person: 'the physical contract your system signs with hardware.'"
    why: "Summary prose is still body prose, so the no-second-person rule applies."
    suggestion: "Use 'a system signs' or 'the system signs' instead."
notes: "No .qmd files were edited. Review focused on release-readiness defects visible in the chapter source; I did not run a full Quarto render."
