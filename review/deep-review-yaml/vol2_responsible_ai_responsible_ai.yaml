file: book/quarto/contents/vol2/responsible_ai/responsible_ai.qmd
status: findings
summary: "The chapter is technically rich and close in structure, but it is not release-ready under the MIT Press/book prose standard. The main risks are body-prose register violations, nonprotected callouts using second-person and rhetorical-question patterns, inconsistent overhead claims for SHAP/explainability, and several grammar/QMD/listing issues that should be corrected before final release."
findings:
  - severity: major
    line: 79
    category: prose
    issue: "Body prose directly addresses the reader with 'You now possess...' and ends with a rhetorical question."
    why: "The prose standard forbids 'you' and rhetorical questions in body exposition; this reads like a course handoff rather than MIT Press textbook prose."
    suggestion: "Recast as declarative prose about the capabilities developed in earlier parts and the responsibility question this chapter addresses."
  - severity: major
    line: 133
    category: prose
    issue: "The section opens with a body-prose rhetorical question: 'why should it be any different...?'"
    why: "Only the Purpose hook and checkpoint/learning-objective callouts may use questions; formal exposition should assert and explain."
    suggestion: "Replace the question with a declarative comparison between CI memory-leak gates and fairness-regression gates."
  - severity: major
    line: 125
    category: prose
    issue: "A nonprotected callout uses direct address and instructional phrasing ('Use the section structure...' and 'your immediate needs'). Similar patterns appear in nonprotected callouts at lines 281, 1098, and 1522."
    why: "The standard allows second-person address only in learning-objective and checkpoint callouts; callout-tip and callout-notebook prose must follow body-register rules."
    suggestion: "Remove direct address from nonprotected callouts or convert only true exercises to checkpoint callouts."
  - severity: style
    line: 77
    category: prose
    issue: "The governance opening uses anthropomorphic and promotional language: 'give the system a conscience' and 'technical marvels.'"
    why: "The prose standard calls for rigorous academic textbook register and warns against blog-post or marketing language."
    suggestion: "Use precise systems language about governance constraints, accountability, and societal risk."
  - severity: minor
    line: 117
    category: prose
    issue: "The navigation callout has subject-verb disagreement: 'Principles and Foundations ... defines'; the same pattern occurs for 'Technical Implementation' and 'Sociotechnical Dynamics.'"
    why: "The phrasing treats section ranges as singular labels but presents them as plural heading groups, producing awkward grammar."
    suggestion: "Use singular labels consistently, e.g., 'The Principles and Foundations portion defines...' or 'The sections on ... define...'"
  - severity: major
    line: 399
    category: qmd
    issue: "Principle cross-references use raw LaTeX '\\ref{...}' rather than the chapter's normal Quarto cross-reference style; this also appears at line 2113."
    why: "Raw LaTeX references are fragile outside PDF and may not resolve consistently in HTML/EPUB builds, especially for custom callout labels."
    suggestion: "Use the established Quarto/book cross-reference pattern for principle labels or verify an explicit cross-format reference helper."
  - severity: major
    line: 1044
    category: consistency
    issue: "The SHAP overhead table reports '+50 percent to +200 percent' inference cost, while surrounding prose repeatedly states 50--1000x overhead or 200 ms to 5+ seconds."
    why: "The chapter uses these numbers as a core engineering claim; conflicting units and magnitudes undermine capacity-planning guidance."
    suggestion: "Normalize SHAP overhead claims to one defensible range, distinguishing exact SHAP, TreeSHAP, approximate SHAP, and asynchronous explanation paths."
  - severity: minor
    line: 1590
    category: qmd
    issue: "The listing has two adjacent string literals where a single docstring was intended: 'Compute demographic parity and equalized odds' followed by 'across groups'."
    why: "The second string is a no-op statement and makes the production code example look unpolished."
    suggestion: "Combine the text into one docstring."
  - severity: major
    line: 1633
    category: qmd
    issue: "The production monitoring listing calls `confusion_matrix(...).ravel()` without forcing `labels=[0, 1]`."
    why: "If a group window contains only one class, scikit-learn returns a 1x1 matrix and `.ravel()` cannot unpack four values, so the example fails in exactly the sparse subgroup case fairness monitoring must handle."
    suggestion: "Pass `labels=[0, 1]` and guard low-count or single-class subgroup windows explicitly."
  - severity: minor
    line: 190
    category: prose
    issue: "Several possessives are missing apostrophes, including 'the models general behavior'; similar examples include 'a users data' at line 929, 'an individuals record' at line 1717, and 'the systems intended goals' at line 2131."
    why: "These are copyediting errors that will stand out in final proofs."
    suggestion: "Correct possessives throughout the chapter."
  - severity: minor
    line: 407
    category: figure
    issue: "The chapter reuses `images/svg/bias-loop.svg` for multiple differently named figures and captions: `fig-bias-amplification` at line 907 and `fig-bias-loop` at line 2117."
    why: "Reusing one asset for distinct conceptual figures can confuse readers and creates a maintenance risk if the visual does not match both captions and alt text."
    suggestion: "Use distinct assets or consolidate the repeated bias-loop discussion and cross-reference the first figure."
  - severity: major
    line: 865
    category: citation
    issue: "The FCC rural-broadband statistic is uncited and uses time-sensitive phrasing ('current speed standards')."
    why: "A release text should cite quantitative policy claims, especially when the benchmark and date can change."
    suggestion: "Add a dated citation and specify the speed threshold or remove the exact statistic."
  - severity: minor
    line: 2427
    category: style
    issue: "The decision-framework table uses hyphenated numeric ranges such as '20-100 ms', '100-300 percent', and '5-15 ms'."
    why: "The house style requires en dashes for ranges and consistent number styling; the same table is likely to survive into print."
    suggestion: "Use en dashes or the book's accepted QMD range convention consistently in table cells."
  - severity: minor
    line: 180
    category: terminology
    issue: "Terms vary between 'datacenter', 'data center', 'high traffic', 'real time', 'posthoc', and hyphenated forms elsewhere."
    why: "Inconsistent compounds make the chapter feel less copyedited and conflict with the style sheet's compound-word discipline."
    suggestion: "Standardize recurring compounds across the chapter, including data center/datacenter, high-traffic, real-time, post hoc/post-hoc, and group-specific."
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. I did not edit any .qmd files."
