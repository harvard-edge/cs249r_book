status: findings
summary: "The chapter is close in structure and pedagogical flow, but it is not release-ready: one apparent stray Markdown backtick can corrupt parsing, several figures contain visible typos or malformed alt text, non-protected callouts use second-person/question formats forbidden by the prose standard, and the late-discovery cost model alternates between 100x and 16x without a clear distinction."
findings:
  - severity: blocker
    line: 1490
    category: qmd
    issue: "A stray backtick follows the index command: `\\index{A/B Testing!ML deployment}``."
    why: "An unmatched inline-code delimiter in body text can corrupt Markdown parsing or cause later prose to render as code."
    suggestion: "Remove the trailing backtick after the index command."
  - severity: major
    line: 64
    category: consistency
    issue: "The chapter claims late deployment discoveries cost over 100x, while the formal chapter model later computes a stage-5 discovery as 16x."
    why: "The reader encounters two incompatible quantitative claims for the same conceptual cost escalation, repeated again around the waterfall footnote and later examples."
    suggestion: "Distinguish Boehm's empirical software-defect range from the chapter's simplified `2^(N-1)` workflow model, or align the multipliers."
  - severity: major
    line: 355
    category: prose
    issue: "The non-protected notebook callout uses second person and a direct question: 'You are building...' and 'Which approach yields...?'"
    why: "The prose rules permit second-person address and questions only in Purpose hooks, Learning Objectives, and Checkpoint callouts; notebook/example callouts follow body-prose register."
    suggestion: "Recast notebook prompts as scenarios in declarative form; apply the same fix to similar callouts at lines 873, 1021, and 1782."
