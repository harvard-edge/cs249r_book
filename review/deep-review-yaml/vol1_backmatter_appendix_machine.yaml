file: "book/quarto/contents/vol1/backmatter/appendix_machine.qmd"
status: findings
summary: "The appendix is useful as a compact reference, and the main cross-references sampled from the appendix resolve. It is not release-ready under the MIT Press/book prose standard because second-person address appears repeatedly in body prose and non-protected callouts, several passages use rhetorical questions or informal register, bold paragraph-starter prose appears in examples and callouts, and one table/caption makes an unsupported or internally inconsistent quantitative claim."
findings:
  - severity: major
    line: 17
    category: prose
    issue: "Body prose uses direct second-person address: 'let you do quick' at line 13 and 'you/your' at lines 17, 22, 25, 291, 464, 509, 807, 1132, 1141, and 1151."
    why: "The prose standard forbids 'you/your' in body prose except in learning-objectives and checkpoint callouts."
    suggestion: "Recast these sentences in first-person plural or impersonal textbook prose."
  - severity: major
    line: 264
    category: prose
    issue: "The Roofline section opens with a rhetorical question: 'how fast can this workload possibly run on this hardware?' Similar body-prose questions appear at lines 462 and 557."
    why: "Rhetorical questions are prohibited in body prose under the MIT Press/book standard."
    suggestion: "Convert each question into a declarative framing sentence."
  - severity: major
    line: 296
    category: prose
    issue: "The non-protected `callout-tip` uses direct address: 'When you compute...' and 'This is why inference serving batches requests...'"
    why: "Non-protected callouts follow body-prose register; second person is allowed only in checkpoint and learning-objectives callouts."
    suggestion: "Rewrite the callout around the computation or workload rather than the reader."
  - severity: major
    line: 432
    category: prose
    issue: "The A100 example uses bold paragraph starters for 'General matrix multiply (GEMM)' and 'ReLU (Element-wise)' and includes direct address: 'You are using the hardware efficiently.'"
    why: "The prose rules ban bold paragraph starters in body prose and forbid direct second-person address."
    suggestion: "Convert the two operation descriptions into ordinary prose, a table, or unlabeled example paragraphs."
  - severity: style
    line: 452
    category: prose
    issue: "The sentence starts with 'Note also that...'"
    why: "The style guide identifies 'Note that' constructions as lecture-note register rather than textbook prose."
    suggestion: "Remove the frame and state the constraint directly."
  - severity: minor
    line: 549
    category: math
    issue: "The Amdahl example writes 'With n=infinity' in prose instead of using math notation."
    why: "The surrounding bullets use mathematical notation for `n`; spelling out infinity here is visually inconsistent and less precise."
    suggestion: "Use `With $n \\to \\infty$` or `With $n=\\infty$` consistently."
  - severity: minor
    line: 817
    category: prose
    issue: "The latency analogy says fetching from disk is 'flying to the moon.'"
    why: "This metaphor reads informal for the MIT Press textbook register and is less precise than the quantitative table that follows."
    suggestion: "Replace with a quantitative comparison drawn from the table."
  - severity: minor
    line: 830
    category: prose
    issue: "The table caption begins with 'Note the massive jump...' and then uses direct imperatives: 'Any kernel that misses cache pays a heavy penalty.'"
    why: "Caption prose should avoid 'Note' constructions and informal intensifiers such as 'massive.'"
    suggestion: "State the SRAM-to-HBM latency increase quantitatively."
  - severity: major
    line: 924
    category: consistency
    issue: "The caption claims the hierarchy spans 'six orders of magnitude in energy per access,' but the table values run from 0.01 pJ to approximately 10,000 pJ, which is about seven orders of magnitude."
    why: "A quantitative inconsistency in a reference appendix undermines the purpose of the table and may propagate incorrect intuition."
    suggestion: "Correct the order-of-magnitude statement or adjust the table values if the caption is intended to be normative."
  - severity: minor
    line: 1024
    category: prose
    issue: "The bandwidth-vs.-latency example uses bold paragraph starters and nested bullets for the latency-bound and bandwidth-bound cases."
    why: "The prose standard discourages operations-manual formatting in body exposition; the nested bullets also make a compact quantitative example harder to read."
    suggestion: "Convert the comparison into a small table or two ordinary paragraphs."
  - severity: style
    line: 1113
    category: prose
    issue: "The dynamic-range callout uses 'utilize' where 'use' is clearer."
    why: "The style guide lists 'utilize' as a wordy substitute to avoid."
    suggestion: "Use 'use simpler integer ALUs.'"
  - severity: style
    line: 1117
    category: prose
    issue: "The BF16 paragraph ends with informal phrasing: 'a \"drop-in\" half-precision replacement for FP32 that just works.'"
    why: "The phrase is blog-like and undercuts the academic register expected for MIT Press prose."
    suggestion: "State the operational benefit precisely, such as avoiding loss scaling in common training configurations."
notes: "No source QMD files were edited. I checked the active worktree before review and wrote only this YAML output file."
