file: book/quarto/contents/vol1/optimizations/model_compression.qmd
status: findings
summary: >
  The chapter is broadly coherent and technically rich, but it needs release-polish
  edits for MIT Press register, source attribution, and one substantive consistency
  problem in the technique-selection table. The main risks are non-checkpoint
  second-person/rhetorical phrasing, uncited figure/listing source captions, and
  quantitative claims that read as empirical results without local citations.
findings:
  - severity: major
    line: 6860
    category: consistency
    issue: >
      The constraint-mapping table marks Numerical Precision as not addressing
      "Latency and Throughput," but the surrounding chapter repeatedly presents
      quantization as a latency/throughput optimization.
    why: >
      Lines 6874-6877, 7802, and many earlier quantization sections say INT8 or
      weight-only quantization can accelerate arithmetic or provide nearly linear
      speedups. The table therefore contradicts the chapter's main guidance.
    suggestion: >
      Change the cell to a qualified marker such as "✓/hardware-dependent" or
      "△" and align the caption with the hardware-dependent latency effect.
  - severity: major
    line: 2984
    category: citation
    issue: >
      Several figure or listing captions attribute material to named sources
      without bibliographic citations, including "Source: IEEE Spectrum,"
      "Source: HarvardX" at line 4508, "Source: NVIDIA" at line 5721, and
      "Source: PyTorch Documentation" at line 7191.
    why: >
      Release-ready textbook figures need traceable source attribution in the
      bibliography or clear indication that the figure is original/adapted.
      Bare organization names are not sufficient for permissions, indexing, or
      scholarly citation.
    suggestion: >
      Replace bare source names with citation keys, or state "adapted from" with
      a full cited source where appropriate.
  - severity: major
    line: 7893
    category: citation
    issue: >
      The fallacies section gives many precise empirical results for BERT,
      ResNet-50, INT4, binary weights, dequantization overhead, and combined
      pruning/quantization without local citations.
    why: >
      The MIT Press standard requires quantitative specificity to be supported.
      These values read as measured literature results rather than illustrative
      examples, and a reader cannot verify their provenance from the paragraph.
    suggestion: >
      Add citations for the empirical values in each fallacy, or explicitly mark
      the numbers as a worked illustrative scenario derived from the chapter's
      computed constants.
  - severity: minor
    line: 366
    category: prose
    issue: >
      Non-protected callout-notebook blocks use second person and rhetorical
      questions, for example "You want to deploy" here, "Why is INT8 faster..."
      at line 3337, "You have..." at line 3521, and "How do we map..." at line
      4239.
    why: >
      The prose standard permits second-person address and questions only in
      learning-objectives and checkpoint callouts. Notebook callouts follow body
      register rules.
    suggestion: >
      Recast notebook prompts as declarative setup statements, keeping questions
      inside checkpoint callouts only.
  - severity: minor
    line: 217
    category: prose
    issue: >
      Body prose instructs the reader to "Look closely" at the figure and
      "identify the two regimes."
    why: >
      Direct instructional address in body text reads like classroom notes and
      conflicts with the book-prose standard's formal exposition rule.
    suggestion: >
      Rephrase as a declarative transition describing what the figure shows.
  - severity: minor
    line: 6850
    category: prose
    issue: >
      The Technique Selection opening uses a rhetorical question and then
      announces "This section provides structured guidance."
    why: >
      Rhetorical questions and section meta-openers are explicitly discouraged
      in body prose because they weaken the textbook register.
    suggestion: >
      State the decision rule declaratively and let the next paragraph introduce
      the constraint mapping.
  - severity: style
    line: 2801
    category: math
    issue: >
      Numeric ranges in the NAS table use hyphens: "400-1000 GPU-days,"
      "200-500 GPU-days," and "1-4 GPU-days."
    why: >
      The style guide requires en dashes for ranges and comma grouping for large
      numbers in prose/table text.
    suggestion: >
      Use "400–1,000 GPU-days," "200–500 GPU-days," and "1–4 GPU-days."
  - severity: style
    line: 5719
    category: terminology
    issue: >
      The block-sparse discussion contains the typo "submatricies" and later the
      caption writes "cusparse" instead of the product spelling "cuSPARSE."
    why: >
      Typos and product-name casing errors are small but visible release defects
      in a technical chapter.
    suggestion: >
      Change "submatricies" to "submatrices" and use "cuSPARSE" consistently.
notes: >
  I reviewed only the requested QMD source and did not edit any .qmd file. The
  cross-reference scan found only external section references as unresolved
  within this file, which is expected for chapter-level references.
