file: book/quarto/contents/vol1/backmatter/glossary/glossary.qmd
status: findings
summary: "The glossary is structurally simple and mostly readable, but it is not release-ready. It has repeated missing terminal punctuation, inconsistent capitalization of acronyms and proper names, several MIT Press register violations, and a few technical or grammatical errors in individual entries."
findings:
  - severity: major
    line: 24
    category: consistency
    issue: "Many glossary definitions omit terminal periods."
    why: "Glossary entries should follow a consistent sentence style. At least thirty definitions end without punctuation, including A/B testing, batch processing, calibration, data drift, ImageNet, quantization, scalability, throughput, training-serving skew, and transfer learning."
    suggestion: "Add terminal periods to all definition lines that are complete sentences or sentence fragments styled as definitions."
  - severity: major
    line: 18
    category: terminology
    issue: "Glossary headwords inconsistently lowercase acronyms, product names, proper nouns, and canonical framework names."
    why: "Entries such as '3dmark,' 'ai triad,' 'alphafold,' 'apache kafka,' 'automl,' 'blas,' 'ci/cd pipelines,' 'dam taxonomy,' 'devops,' 'dlrm,' 'relu,' and 'tops' do not match standard or book terminology. This weakens glossary lookup and creates inconsistency with body prose."
    suggestion: "Normalize headwords to canonical forms such as 3DMark, AI Triad, AlphaFold, Apache Kafka, AutoML, BLAS, CI/CD pipelines, D.A.M. or D·A·M Taxonomy, DevOps, DLRM, ReLU, and TOPS."
  - severity: major
    line: 1004
    category: terminology
    issue: "The entry 'programmatic logic controllers' uses the wrong term."
    why: "The established industrial control term is 'programmable logic controller' (PLC), not 'programmatic logic controller.' The current headword would mislead readers and reduce searchability."
    suggestion: "Change the headword to 'programmable logic controller (PLC)' and adjust the definition accordingly."
  - severity: major
    line: 266
    category: consistency
    issue: "The D.A.M. Taxonomy entry contradicts the book's stated framework language."
    why: "The prose standard identifies the volume's core framework as the D·A·M Taxonomy: Data, Algorithm, Machine. This entry defines it as Data, Algorithm, and Machine, but then describes an Iron Law-like decomposition using Data, Compute, and Latency constraints elsewhere at line 654."
    suggestion: "Align the glossary with the canonical D·A·M Taxonomy wording and keep Iron Law terms separate."
  - severity: minor
    line: 48
    category: prose
    issue: "Several entries use hype or informal register forbidden by the MIT Press prose standard."
    why: "Phrases such as 'groundbreaking,' 'revolutionizing,' 'revolutionary,' 'legendary,' 'AI was officially born,' and 'deep learning renaissance' sound promotional or journalistic rather than textbook-neutral."
    suggestion: "Replace hype terms with precise historical or technical claims; representative lines include 48, 60, 137, 184, and 269."
  - severity: minor
    line: 155
    category: prose
    issue: "The 'black box' definition uses second person and informal phrasing."
    why: "The prose standard forbids 'you/your' in body prose except protected learning contexts. Glossary definitions should maintain the same academic register."
    suggestion: "Recast without second person, for example by saying the observer can inspect inputs and outputs but not internal mechanisms."
  - severity: minor
    line: 145
    category: math
    issue: "Negative numeric values are written with hyphens instead of mathematical minus signs."
    why: "The definition says weights and activations are 'typically -1 and +1.' In book math style, the minus sign should be represented in math mode, not as a hyphen in prose."
    suggestion: "Use math notation such as `$-1$` and `$+1$`; the same issue recurs in the ternarization entry at line 1253."
  - severity: minor
    line: 112
    category: prose
    issue: "The batch normalization definition is grammatically overloaded."
    why: "The sentence chains stabilization, higher learning rates, convergence, and learnable affine parameters into one long definition. The final 'and subsequently applies' phrase has an unclear subject."
    suggestion: "Split or tighten the definition so the normalization step and learnable scale/shift step have clear subjects."
  - severity: minor
    line: 1214
    category: prose
    issue: "The systolic array definition contains a grammatical error."
    why: "The phrase 'streaming data through a grid of processing elements, minimized data movement' uses the wrong verb form and breaks the sentence."
    suggestion: "Change 'minimized' to 'minimizing' or revise the final clause."
  - severity: minor
    line: 1285
    category: prose
    issue: "The transformer definition uses the banned phrase 'state-of-the-art' without quantitative comparison."
    why: "The MIT Press prose standard flags unsupported 'state-of-the-art' as hype unless anchored to a specific comparison or metric."
    suggestion: "Replace with a concrete capability claim or remove the phrase."
  - severity: style
    line: 1220
    category: prose
    issue: "Several definitions use 'important' as a vague intensifier."
    why: "The prose standard asks for quantitative or causal specificity instead of generic importance claims. Examples include tail latency, specificity, cold-start performance, and systems thinking."
    suggestion: "State the operational consequence instead of saying the concept is important."
  - severity: style
    line: 1368
    category: qmd
    issue: "The glossary uses raw LaTeX multicolumn formatting without an HTML fallback."
    why: "The raw LaTeX block controls PDF layout only. If this glossary is rendered to HTML or another target, the layout instruction is ignored, which may produce an unexpectedly long single-column glossary."
    suggestion: "Confirm PDF-only intent or add a format-specific fallback if HTML output is part of the release."
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. No .qmd files were edited."
