file: book/quarto/contents/vol2/robust_ai/robust_ai.qmd
status: findings
summary: "The chapter is broadly coherent and textbook-oriented, but several release-blocking polish issues remain: one figure caption contradicts its surrounding case study, a listing discussion has stale line references, and a taxonomy table is hard to parse. Additional findings cover MIT Press register issues in notebook callouts, informal citation/source handling, and a few local prose/QMD cleanup items."
findings:
  - severity: major
    line: 1866
    category: figure
    issue: "The `@fig-poisoning` caption describes incremental malicious samples in online learning, but the surrounding case study and alt text describe Nightshade-style poisoning of Stable Diffusion concepts."
    why: "The caption contradicts the prose at lines 1860-1864 and the image alt text, so readers will receive the wrong interpretation of the figure."
    suggestion: "Revise the caption to describe concept poisoning in generative image models and the dose-response shown in the grid."
  - severity: major
    line: 2030
    category: qmd
    issue: "The prose cites implementation lines 2190, 2196, and 2199-2200, but the listing appears at lines 2008-2025 in this file."
    why: "Stale line references make the textbook unusable for close code reading and can confuse readers if rendered line numbers differ."
    suggestion: "Remove hard-coded source line numbers or update them to match the rendered listing numbering."
  - severity: major
    line: 1283
    category: figure
    issue: "The adversarial attack taxonomy table concatenates multiple attack names and descriptions in single cells, for example `FGSM PGD JSMA` without separators."
    why: "The table no longer functions as a taxonomy; readers cannot reliably map each attack to its definition."
    suggestion: "Split attack names with semicolons or separate rows for FGSM, PGD, JSMA, C&W, DeepFool, EAD, patches, and objects."
  - severity: minor
    line: 1099
    category: prose
    issue: "The sentence begins `Decision Continue monitoring...`, which appears to be missing punctuation or a label separator."
    why: "This reads like a malformed table note or heading and interrupts the worked example."
    suggestion: "Change to `Decision: continue monitoring...` or fold the sentence into the preceding paragraph."
  - severity: minor
    line: 618
    category: prose
    issue: "Notebook callouts use second-person address and rhetorical questions outside protected learning-objectives/checkpoint contexts."
    why: "The MIT Press prose rules permit `you/your` and direct questions only in learning objectives and checkpoint callouts; `.callout-notebook` is not protected."
    suggestion: "Recast the notebook prompts declaratively; also check the same pattern at lines 627, 1936, and 1945."
  - severity: minor
    line: 1225
    category: citation
    issue: "Several figure captions use informal web source labels or raw links instead of bibliographic citations, including `ivezic`, `li`, and `dertat`; two URLs use uppercase `HTTPS://`."
    why: "Release prose should use stable, citable source attribution where possible, and inconsistent URL/source styling looks unfinished."
    suggestion: "Replace informal source labels with `.bib` citations or normalized source names; also review lines 2056 and 2209."
  - severity: minor
    line: 53
    category: prose
    issue: "The fleet-stack callout uses informal metaphors such as `deep in`, `armored`, `locks the front door`, and `absorb a hit`."
    why: "The house style asks for formal academic textbook prose rather than blog-like or operational metaphor when the same concept can be stated precisely."
    suggestion: "Use direct systems language about governance-layer robustness, security boundaries, and operational failure modes."
  - severity: minor
    line: 728
    category: citation
    issue: "Several quantitative claims about nighttime degradation, weather mAP drops, fraud drift rates, and medical/agricultural label shifts appear without nearby supporting citations."
    why: "The prose rules require quantitative specificity to be tied to evidence; unsupported percentages read as asserted rather than documented."
    suggestion: "Add citations for the numeric examples or soften/remove numbers that cannot be sourced; also review lines 744 and 746."
  - severity: style
    line: 83
    category: qmd
    issue: "The source uses spaced triple hyphens (` --- `) as dashes in body prose."
    why: "The MIT Press rules specify proper dash characters and warn against dash overuse; source-level triple hyphens look mechanically generated even if Pandoc renders them."
    suggestion: "Replace spaced `---` with a proper em dash or, where possible, a colon or full sentence; also check line 97."
notes: "Review only; no `.qmd` files were edited. Automated grep checks plus targeted line reading were used; I did not run a full Quarto render."
