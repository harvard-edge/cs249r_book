file: book/quarto/contents/vol2/backmatter/appendix_systems.qmd
status: findings
summary: "The appendix is not release-ready. It contains an exact duplicated Purpose paragraph, one substantive inconsistency about the dominant ML fleet bottleneck, an uncaptained table, and several MIT Press style violations around capitalization, ranges, and technical terminology."
findings:
  - severity: major
    line: 7
    category: flow
    issue: "The opening Purpose paragraph is repeated verbatim on lines 7 and 9."
    why: "Exact duplication is a visible production defect and weakens the appendix opening before the first figure."
    suggestion: "Keep one version, preserving the sentence that introduces @fig-fleet-vs-single-stack if the figure remains."
  - severity: major
    line: 25
    category: consistency
    issue: "The paradigms table identifies the ML fleet bottleneck as 'Memory Bandwidth (HBM),' while the figure caption on line 11 says the fleet stack optimizes for the global bisection bandwidth wall."
    why: "This appendix is meant to bridge single-node foundations to fleet-scale systems; presenting HBM as the fleet bottleneck contradicts the stated Vol. 2 framing."
    suggestion: "Revise the ML Fleet bottleneck cell to reflect fleet-level interconnect/bisection bandwidth, or explicitly distinguish local HBM pressure from global network pressure."
  - severity: major
    line: 35
    category: consistency
    issue: "Activation checkpointing is described as a distributed strategy alongside ZeRO."
    why: "Activation checkpointing is primarily a recomputation-for-memory technique, whereas ZeRO is distributed state sharding; grouping both as distributed strategies blurs an important systems distinction."
    suggestion: "Separate local memory-recomputation techniques from distributed sharding strategies, and state the trade-off each one pays."
  - severity: minor
    line: 19
    category: figure
    issue: "The three-paradigm comparison table has no caption or identifier."
    why: "Release tables should be named and referenceable when they carry core conceptual structure; an uncaptained table also lacks the standard title-plus-explanation pattern."
    suggestion: "Add a concise caption and table id, or convert the table into prose if it is only a short orientation aid."
  - severity: minor
    line: 11
    category: figure
    issue: "The figure alt text writes 'ml framework' with a lowercase acronym."
    why: "The style guide preserves established acronyms such as ML in uppercase, including sentence-style display contexts and alt text."
    suggestion: "Change 'ml framework' to 'ML framework.'"
  - severity: minor
    line: 35
    category: math
    issue: "The range '3--5$\\times$' uses ASCII double hyphen and splits the range from the multiplier."
    why: "The prose standard requires an en dash for ranges and consistent math rendering for multipliers."
    suggestion: "Use an en dash range and keep the multiplier formatting consistent, such as '3–5$\\times$' or a single math span if preferred locally."
  - severity: style
    line: 48
    category: terminology
    issue: "The table caption capitalizes and quotes 'Arithmetic Intensity' in descriptive prose."
    why: "MIT Press capitalization rules naturalize concept terms such as arithmetic intensity in body prose and caption descriptions unless they are in a formal label context."
    suggestion: "Use 'arithmetic intensity' without quotation marks in the caption description."
  - severity: style
    line: 58
    category: terminology
    issue: "'Bandwidth wall' is capitalized in body prose."
    why: "The style guide lowercases non-eponymous concept terms such as walls and bottlenecks in running prose unless they appear in a formal label context."
    suggestion: "Use 'bandwidth wall' or, more precisely, name the affected iron-law term."
  - severity: style
    line: 68
    category: terminology
    issue: "The parenthetical 'Accelerators, Interconnects, Storage' capitalizes common technical categories."
    why: "These are not proper nouns in this context, and the MIT Press style keeps generic concept terms lowercase in running prose."
    suggestion: "Change the parenthetical to 'accelerators, interconnects, and storage.'"
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. Only this YAML file was edited; no .qmd files were modified."
