file: book/quarto/contents/vol2/performance_engineering/_shelved_automl_section.qmd
status: findings
summary: >
  The shelved AutoML section is source-marked as removed content, but it is not release-ready if restored or rendered as-is. The main risks are an invisible shelved-content marker, outdated model-compression context in a Vol. 2 performance-engineering path, prose that reads like a survey/operations list rather than MIT Press textbook argument, and caption/list/footnote formatting that conflicts with the book prose standard.
findings:
  - severity: major
    line: 1
    category: qmd
    issue: "The shelved-content marker is only an HTML comment."
    why: "If the file is accidentally included in a render, readers will see a normal section with no visible indication that it is removed or provisional material."
    suggestion: "Keep the source comment, but also exclude the file from render inputs or add a visible editorial callout if it can appear in release builds."
  - severity: major
    line: 10
    category: consistency
    issue: "The section ID and restoration notes still point to model compression, not the current Vol. 2 performance-engineering location."
    why: "Labels such as `sec-model-compression-*` and instructions to restore into `model_compression.qmd` conflict with the file path and can confuse release reviewers or future cross-reference maintenance."
    suggestion: "Either move this shelved file beside the intended restoration target or update the note and IDs to match the Vol. 2 ownership."
  - severity: minor
    line: 13
    category: flow
    issue: "The opening depends on an absent prior section and uses broad recap phrasing."
    why: "As a shelved standalone file, `The preceding sections` and `as the BERT compression example demonstrated` are brittle; if restored elsewhere, the transition may no longer point to the correct local argument."
    suggestion: "Make the dependency explicit in the restoration note or revise the opening when restoring so it names the exact preceding optimization material."
  - severity: minor
    line: 15
    category: prose
    issue: "Several claims are vague or overgeneralized: `streamline this process`, `other important parameters`, `competitive accuracy`, and `novel solutions`."
    why: "The MIT Press standard asks for quantitative specificity and evidence rather than broad survey language."
    suggestion: "Replace the vague terms with the concrete optimization target, metric, or cited result being discussed."
  - severity: minor
    line: 19
    category: figure
    issue: "The figure caption starts with bold label text and packs a multi-sentence caption into the div attributes."
    why: "The prose rules reject bold starter labels as an operations-manual pattern, and long inline attributes are fragile for copyediting and QMD maintenance."
    suggestion: "Use a plain caption without bold lead-in and consider a separate caption block or shorter attribute text."
  - severity: minor
    line: 46
    category: figure
    issue: "Figure text capitalization is inconsistent: `Collect\\Data` differs from `Collect\\data` in the AutoML workflow."
    why: "Inconsistent capitalization in parallel diagram labels looks unpolished and can produce mismatches between figure text and alt text."
    suggestion: "Use the same sentence-style capitalization for matching workflow nodes."
  - severity: style
    line: 70
    category: prose
    issue: "The `AutoML capabilities` subsection is mostly a bold-label list rather than connected textbook prose."
    why: "The book prose standard discourages operations-manual paragraph/list starters and expects causal paragraph flow."
    suggestion: "When restoring, convert the list into a short argument that groups capabilities by optimization role."
  - severity: style
    line: 79
    category: prose
    issue: "The footnote begins with a bold term label and reads like a glossary/sidebar entry."
    why: "Bold starter labels and compressed note prose conflict with the MIT Press prose standard unless the note is deliberately formatted as protected reference material."
    suggestion: "Remove the bold starter or move this material into an appropriate glossary/callout pattern."
  - severity: minor
    line: 79
    category: math
    issue: "The range `10$\\times$--50$\\times$` uses a source-level double hyphen rather than the book's en-dash range style."
    why: "The style guide specifies en dashes for ranges; mixed math/text range notation can render inconsistently across HTML and PDF."
    suggestion: "Use a proper en dash range construction, such as `10$\\times$–50$\\times$`, if this note is restored."
  - severity: style
    line: 81
    category: prose
    issue: "The named commercial platforms sentence is broad and likely time-sensitive."
    why: "A release textbook should avoid product-list survey prose unless the list is necessary, current, and supported by a source that directly covers those platforms."
    suggestion: "Either cite a source for the specific platform claim or generalize to managed AutoML services without naming vendors."
  - severity: minor
    line: 93
    category: flow
    issue: "The closing transition refers to `The following section`, but this shelved file has no active following section."
    why: "The transition may be correct only in the original `model_compression.qmd` placement; in the current shelved file it is an unresolved local dependency."
    suggestion: "Update the transition at restore time to point to the actual next section, or keep the dependency in the restoration note."
notes: >
  I did not edit any `.qmd` file. Citation keys referenced in the section are present in the Vol. 2 bibliography, and the section/figure IDs do not appear duplicated elsewhere in `book/quarto/contents`. The file name begins with an underscore, which usually keeps it out of Quarto book rendering unless explicitly included, but release packaging should still confirm that source-only shelved files are intentionally retained.
