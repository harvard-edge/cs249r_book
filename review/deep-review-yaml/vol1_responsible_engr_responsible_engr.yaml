file: book/quarto/contents/vol1/responsible_engr/responsible_engr.qmd
status: findings
summary: >
  The chapter is substantively strong and has a clear textbook arc from failure modes
  to fairness testing, cost/environmental accounting, and governance. Release readiness
  is blocked by a malformed archetype table and a figure-caption inconsistency; several
  prose-standard issues should also be cleaned up before copyedit.
findings:
  - severity: major
    line: 678
    category: qmd
    issue: >
      The "Fairness Risk by ML Archetype" table uses paired rows to simulate wrapped
      cells, so "(Compute Beast)", "(Bandwidth Hog)", "(Sparse Scatter)", and
      "(Tiny Constraint)" render as separate archetype rows rather than continuations.
    why: >
      Markdown tables do not support implicit rowspans. The rendered table will split
      each archetype into two logical entries and detach risks, metrics, examples, and
      citations from their intended row.
    suggestion: "Keep each archetype in one row using concise text or explicit line breaks within cells."
  - severity: major
    line: 249
    category: figure
    issue: >
      The fairness-frontier caption and alt text say Point C is on the left/low-disparity
      side, but the plotting code inverts the x-axis, which places zero disparity on the
      right.
    why: >
      The caption, alt text, and plotted axis orientation give readers conflicting
      interpretations of the fairness-accuracy trade-off.
    suggestion: "Align the caption/alt text with the inverted axis, or remove `ax.invert_xaxis()` and reposition labels."
  - severity: major
    line: 916
    category: math
    issue: >
      The "price of fairness" worked example hard-codes a 3 percent utility loss after
      comments calculate roughly 4.8 percent under the stated balanced-population
      assumptions and then mention a different 30 percent group-share assumption.
    why: >
      The numeric result is not reproducible from the assumptions visible to readers,
      which weakens the quantitative rigor expected in a textbook worked example.
    suggestion: "Make the group proportion an explicit parameter and compute the displayed utility loss from it."
  - severity: major
    line: 960
    category: math
    issue: >
      `hire_value_k_str` and `bad_hire_cost_k_str` format dollar values as `USD 100k`
      and `USD 50k`, which then appear in prose without the expected currency style.
    why: >
      Other chapter prose uses `USD 304 million` or dollar amounts consistently; this
      output mixes an informal `k` suffix with the spelled currency form in a callout.
    suggestion: "Format the generated values as `USD 100,000` and `USD 50,000`, or use a consistent house style."
  - severity: minor
    line: 638
    category: prose
    issue: >
      The model-card section opens with three rhetorical questions in body prose:
      "but which test set? Trained on what data? Validated for which populations?"
    why: >
      The prose standard forbids rhetorical questions in body text except for the
      Purpose hook and protected learning/checkpoint callouts.
    suggestion: "Convert the questions to declarative uncertainty about test-set identity, training data, and validated populations."
  - severity: minor
    line: 620
    category: prose
    issue: >
      The human-in-the-loop paragraph poses multiple rhetorical questions in body prose
      after "The design questions are:".
    why: >
      This reads like checklist/blog prose rather than formal textbook exposition, and
      violates the stated rule against rhetorical questions in body prose.
    suggestion: "State the design requirements declaratively: review scope, escalation thresholds, reviewer training, and reviewer monitoring."
  - severity: minor
    line: 616
    category: prose
    issue: >
      The callout says relying on natural-distribution data for fairness is "physically
      impossible at scale."
    why: >
      The claim is rhetorically overstated: the preceding calculation shows a 100x data
      requirement, not physical impossibility.
    suggestion: "Replace with a precise claim such as 'statistically inefficient' or 'prohibitively expensive under random sampling.'"
  - severity: style
    line: 916
    category: prose
    issue: "A body sentence begins with 'But knowing the trade-off exists is insufficient'."
    why: "The prose standard forbids starting body sentences with coordinating conjunctions."
    suggestion: "Use 'However,' or combine the sentence with the previous one."
  - severity: style
    line: 2252
    category: prose
    issue: "A body sentence begins with 'But controlling access is only half the problem'."
    why: "The prose standard forbids starting body sentences with coordinating conjunctions."
    suggestion: "Use 'Controlling access is only half the problem' or another declarative transition."
  - severity: style
    line: 1319
    category: figure
    issue: "The interpretability-spectrum figure label uses `CNN / Transformer` with spaces around the slash."
    why: "The MIT Press style rule requires slashes without spaces."
    suggestion: "Change the visible label to `CNN/Transformer`."
notes: >
  I did not edit any .qmd file. Cross-references spot-checked for the cited chapter,
  D·A·M appendix, principle, and conclusion targets resolved locally; sampled citation
  keys used in this chapter were present in the Vol. 1 bibliography.
