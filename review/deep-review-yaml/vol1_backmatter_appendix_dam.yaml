file: book/quarto/contents/vol1/backmatter/appendix_dam.qmd
status: findings
summary: >
  The appendix is useful and mostly coherent, but it is not release-ready.
  The main issues are malformed exercise heading hierarchy, several formal
  prose violations against the MIT Press standard, inconsistent D·A·M/bottleneck
  terminology, and a questionable scorecard threshold that treats sparsity as a
  universal system-health criterion.
findings:
  - severity: major
    line: 397
    category: qmd
    issue: >
      The exercises use inconsistent heading levels: Exercise one is `###`,
      Exercise two is `####`, and Exercises three and four are `#####`.
    why: >
      This makes exercises two through four nested under the previous exercise
      in the document structure rather than appearing as peer exercises. It can
      distort the generated table of contents, PDF hierarchy, and accessibility
      outline.
    suggestion: >
      Make all four exercise headings the same level under `## Exercises`.
  - severity: major
    line: 350
    category: consistency
    issue: >
      The D·A·M Scorecard labels "Active Params" with "100 percent (Dense)" as
      failing and "< 50 percent (Sparse)" as passing.
    why: >
      This implies dense models are inherently failing systems and sparse models
      are inherently mature, which is not generally true and conflicts with the
      appendix's broader diagnostic framing. Sparsity is an optimization choice,
      not a universal system-health threshold.
    suggestion: >
      Reframe this metric as model-compression opportunity, or replace it with
      an algorithm efficiency metric that applies across dense and sparse models.
  - severity: minor
    line: 167
    category: prose
    issue: >
      "The iron law Mapping" has an erroneous capital letter in "Mapping."
    why: >
      The phrase reads like a typo and breaks the otherwise consistent treatment
      of "iron law mapping" as ordinary prose.
    suggestion: >
      Lowercase "mapping."
  - severity: minor
    line: 224
    category: terminology
    issue: >
      The prose uses "DAM components" rather than the established "D·A·M"
      spelling used throughout the appendix.
    why: >
      The appendix introduces a named taxonomy with a distinctive typographic
      form; switching to "DAM" looks accidental and weakens terminology
      consistency.
    suggestion: >
      Use "D·A·M components" or "D·A·M axes."
  - severity: style
    line: 117
    category: prose
    issue: >
      The body prose includes a direct question to the reader: "ask: where is
      the flow blocked?"
    why: >
      The MIT Press prose standard forbids rhetorical questions in body prose
      outside protected locations such as Purpose hooks and checkpoint callouts.
    suggestion: >
      Convert the question into a declarative diagnostic statement.
  - severity: style
    line: 170
    category: prose
    issue: >
      The paragraph begins with "Note that."
    why: >
      The prose standard flags "Note that" as lecture-note register rather than
      textbook prose.
    suggestion: >
      Delete the frame and state the point directly.
  - severity: style
    line: 202
    category: prose
    issue: >
      The body prose uses another direct question: "how do you tell which side
      you are on?"
    why: >
      This violates the no-rhetorical-questions and no-second-person rules for
      body prose.
    suggestion: >
      Recast as a statement about distinguishing the data side from the machine
      side of the boundary.
  - severity: style
    line: 258
    category: prose
    issue: >
      The case-study body text uses direct second person ("You provision...")
      outside a learning objective or checkpoint callout.
    why: >
      The MIT Press standard permits "you" only in learning objectives and
      checkpoint callouts; these case studies are body exposition.
    suggestion: >
      Rewrite the case-study setup in third person or first-person plural.
  - severity: minor
    line: 332
    category: terminology
    issue: >
      The example phrase "I suspect I am Machine Bound" is first-person,
      oddly capitalized, and inconsistent with the appendix's usual
      "machine-bound" terminology.
    why: >
      The capitalization and phrasing make the term look like an ad hoc label
      rather than a controlled diagnostic category.
    suggestion: >
      Use a neutral phrase such as "a machine-bound workload."
  - severity: minor
    line: 366
    category: prose
    issue: >
      The first sentence under "Scaling laws" begins with lowercase "scaling
      laws."
    why: >
      Sentence-initial lowercase reads as a typographical error.
    suggestion: >
      Capitalize the sentence-opening word.
notes: >
  I did not edit any `.qmd` file. Cross-reference targets and cited keys sampled
  during review appeared present in the surrounding volume, but I did not run a
  full Quarto render.
