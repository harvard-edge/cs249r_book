file: "book/quarto/contents/vol1/backmatter/appendix_data.qmd"
status: findings
summary: "The appendix has a coherent reference structure and the sampled cross-references and `@kullback1951` citation resolve, but it is not release-ready under the MIT Press/book prose standard. The main issues are repeated second-person address in body prose and non-protected callouts, rhetorical questions outside permitted contexts, bold paragraph-starter prose, one ambiguous transfer-time formula, an unsupported operational claim about Google and Amazon tail-latency targets, and a figure alt-text mismatch."
findings:
  - severity: major
    line: 13
    category: prose
    issue: "Body prose uses direct second-person address, beginning with 'let you reason' and recurring at lines 17, 108, 166, 168, and 170."
    why: "The prose standard forbids 'you/your' in body prose except in learning-objectives and checkpoint callouts."
    suggestion: "Recast these sentences in first-person plural or impersonal textbook prose."
  - severity: style
    line: 168
    category: prose
    issue: "The row-oriented and column-oriented explanations use bold paragraph starters."
    why: "The MIT Press prose rules explicitly ban bold paragraph starters in body text because they create an operations-manual register rather than textbook prose."
    suggestion: "Convert the two labeled paragraphs into ordinary prose or a formal table."
  - severity: major
    line: 275
    category: prose
    issue: "The non-protected `callout-perspective` uses second-person phrasing: 'your system,' 'the bytes your model needs,' and 'your expensive accelerators.'"
    why: "Non-protected callouts follow body-prose register; second person is permitted only in checkpoint and learning-objectives callouts."
    suggestion: "Rewrite the callout with system- or pipeline-centered subjects."
  - severity: major
    line: 342
    category: prose
    issue: "The non-protected `callout-perspective` uses second person and a rhetorical question: 'Your monitoring dashboard...' and 'Why?'"
    why: "The prose standard permits questions and direct address only in protected checkpoint or learning-objectives callouts."
    suggestion: "State the monitoring failure declaratively and remove the direct address."
  - severity: style
    line: 459
    category: prose
    issue: "Body prose asks a rhetorical question: 'How do we know if serving data... has drifted...?'"
    why: "Rhetorical questions are forbidden in body prose under the book prose standard."
    suggestion: "Replace with a declarative transition that introduces distribution-distance metrics."
  - severity: minor
    line: 100
    category: math
    issue: "The transfer-time equation `T = Data Volume / Bandwidth` is dimensionally ambiguous for the table that follows."
    why: "The table uses byte-scale data volumes and bit/s network bandwidths; the code correctly converts bytes to bits, but the prose formula omits that conversion."
    suggestion: "Specify consistent units or write the byte-volume form as `T = 8V / BW` when bandwidth is in bits per second."
  - severity: minor
    line: 172
    category: figure
    issue: "The figure alt text describes a column store with `Name` fields, but the TikZ figure and surrounding prose use `ID`, `Age`, and `Loc`."
    why: "Alt text must accurately describe the rendered figure for accessibility and release consistency."
    suggestion: "Update the alt text to match the actual fields shown in the diagram."
  - severity: minor
    line: 426
    category: citation
    issue: "The claim that Google and Amazon optimize for P99.9 or P99.99 has no citation."
    why: "The prose standard requires quantitative or source-specific operational claims to be supported rather than asserted."
    suggestion: "Add a citation for the Google/Amazon tail-latency claim or generalize the sentence."
  - severity: style
    line: 602
    category: prose
    issue: "The information-theory concepts use bold paragraph starters at lines 602, 604, and 606."
    why: "Bold paragraph starters are prohibited in body prose by the book prose standard."
    suggestion: "Make these concepts a table, definition list, or ordinary explanatory paragraphs without bold lead-ins."
notes: "No source QMD files were edited. I checked the active worktree before review and wrote only this YAML output file."
