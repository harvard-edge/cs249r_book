file: book/quarto/contents/vol2/performance_engineering/performance_engineering.qmd
status: findings
summary: >
  The chapter is technically rich and mostly coherent, but it is not release-ready.
  The most urgent problems are malformed trailing QMD, a likely footnote/body
  boundary error, a contradictory roofline figure annotation, and a direct
  contradiction about whether torch.compile has downsides.
findings:
  - severity: blocker
    line: 2210
    category: qmd
    issue: "A stray fragment, `e to make sure that quizzes are inserted properly before a part begins. -->`, appears after a complete HTML comment and before a duplicate `.quiz-end` block."
    why: "This is malformed source text that will render as garbage or confuse the end-of-chapter quiz insertion structure."
    suggestion: "Remove the stray fragment and duplicate `.quiz-end` block, leaving only one valid quiz-end marker."
  - severity: major
    line: 1002
    category: qmd
    issue: "The sentence beginning `Applying uniform per-tensor INT8 quantization...` follows the footnote definition without a blank line and starts with leading whitespace."
    why: "In Markdown/Pandoc footnote syntax, this risks being parsed as part of the preceding footnote rather than body prose, which would remove an important transition from the main text."
    suggestion: "Insert a blank line after the footnote definition and remove the leading space before `Applying`."
  - severity: major
    line: 482
    category: figure
    issue: "The generated shifting-roofline figure labels the ridge shift as `4.0x in 7 years`, while the prose, table, and caption state a V100-to-B200 shift from 139 to 281 FLOP/byte, about 2x."
    why: "The figure contradicts the surrounding explanation and will teach the wrong quantitative trend."
    suggestion: "Change the figure annotation to approximately 2x, or revise all surrounding calculations if a different comparison is intended."
  - severity: major
    line: 2009
    category: consistency
    issue: "The playbook says `torch.compile` should be applied first and has `No downsides`, but earlier sections describe compilation latency, graph breaks, dynamic-shape recompilation, and reduced optimization for symbolic shapes."
    why: "This contradicts the chapter's own trade-off analysis and the checkpoint at line 2024, which asks students to identify cases where `torch.compile` degrades performance."
    suggestion: "Qualify the heuristic: try `torch.compile` early when shapes are stable and graph breaks are limited, then verify with profiling."
  - severity: major
    line: 405
    category: figure
    issue: "The `fig-shifting-roofline` code plots the roofline series once in the loop beginning near line 402, then plots the same series again in the loop beginning near line 429."
    why: "Duplicate plotting can create overdrawn lines and duplicate legend entries, making the rendered figure less reliable for release."
    suggestion: "Remove the first plotting loop or refactor it to compute ridge values without drawing."
  - severity: minor
    line: 1855
    category: consistency
    issue: "The MFU definition says the formula and fleet-scale application appear in `@sec-performance-engineering-efficiency-frontier`, but that target is the iron-law subsection, not the measurement-at-scale discussion."
    why: "The cross-reference sends readers to the wrong conceptual location and weakens the measurement narrative."
    suggestion: "Point to the measurement-at-scale section or add a numbered MFU equation near the definition and reference it directly."
  - severity: minor
    line: 1371
    category: flow
    issue: "The `Speculative Decoding` section consists of one short paragraph that redirects to another chapter, then immediately moves into hidden MoE setup code and a new major section."
    why: "Speculative decoding is listed in the learning objectives, summary, playbook, and case study, so the near-empty section feels structurally underdeveloped for this chapter."
    suggestion: "Add a brief local explanation of its performance-engineering role, trade-off, and interaction with batching before referring to the full serving treatment."
  - severity: style
    line: 234
    category: prose
    issue: "A non-protected perspective callout uses second person repeatedly: `your own memory`, `you can only hold`, `your desk`, and `you could possibly need`."
    why: "The MIT Press prose rules allow `you/your` only in learning-objectives and checkpoint callouts; perspective callouts follow body-prose register."
    suggestion: "Recast the analogy without direct address, or convert it to neutral third-person language."
  - severity: style
    line: 232
    category: prose
    issue: "The scholar's-library analogy includes informal phrasing such as `walking down there takes an eternity`."
    why: "The passage reads closer to blog prose than academic textbook prose, especially inside a non-protected callout."
    suggestion: "Use restrained language that preserves the latency analogy without colloquial exaggeration."
  - severity: style
    line: 1940
    category: terminology
    issue: "`Hero Runs` and `Gold Standard` are capitalized as if they are formal terms."
    why: "The house style lowercases ordinary concept terms unless they are proper names or defined canonical terms."
    suggestion: "Use `hero runs` and `gold standard` unless these are intentionally defined terms."
notes: >
  Audit was limited to prose and QMD source as requested. I did not edit any
  .qmd file and did not run a full render.
