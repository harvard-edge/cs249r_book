file: book/quarto/contents/vol1/conclusion/conclusion.qmd
status: findings
summary: >
  The chapter is structurally coherent and mostly release-ready, with strong synthesis of the
  volume's recurring invariants and Lighthouse models. The main issues are stale "twelve"
  identifiers attached to a thirteen-invariant section, a future-directions preview that names
  three frontiers but later treats five, and several MIT Press register/style violations in
  non-protected body prose and callouts.
findings:
  - severity: minor
    line: 184
    category: consistency
    issue: "The section heading says 'Thirteen Quantitative Invariants' but the section ID remains `sec-twelve-quantitative-invariants-0dd2`."
    why: "The visible prose, table, and framework now describe thirteen invariants. A stale cross-reference ID is confusing for maintainers and can surface in generated anchors or external references."
    suggestion: "Rename the anchor to a thirteen-invariant form, or add a deliberate alias if older references must remain stable."
  - severity: minor
    line: 187
    category: consistency
    issue: "The table reference `@tbl-twelve-principles` is used for a table that contains thirteen invariants."
    why: "The mismatch repeats in the table ID and nearby prose, making the canonical framework look partially renamed."
    suggestion: "Use a thirteen-invariant table ID in this chapter, preserving compatibility only where external chapters still depend on the old ID."
  - severity: minor
    line: 654
    category: flow
    issue: "The Future Directions opener promises three frontiers, but the section that follows covers five: deployment contexts, robust AI, societal benefit, AGI, and compound AI systems."
    why: "The preview does not match the reader's actual path through the section, weakening the chapter's roadmap at a high-level transition."
    suggestion: "Either preview all five topics or group compound AI under the AGI frontier explicitly before the subsections begin."
  - severity: style
    line: 711
    category: prose
    issue: "The perspective callout begins with a bold paragraph starter, `**Engineering the Future**:`."
    why: "The MIT Press prose rules flag bold paragraph starters as an operations-manual pattern, and non-protected callouts follow the same register rules as body prose."
    suggestion: "Convert the label into the callout title or fold it into a normal topic sentence."
  - severity: style
    line: 715
    category: prose
    issue: "The sentence 'The readers of this book are now among the engineers equipped for these challenges' shifts into congratulatory direct address."
    why: "The register becomes promotional and self-referential rather than textbook-analytic, especially in a conclusion already carrying a strong rhetorical close."
    suggestion: "State the curricular implication impersonally, for example by saying the volume has developed the tools needed to analyze these challenges."
  - severity: style
    line: 819
    category: prose
    issue: "The non-protected chapter-connection callout addresses the reader directly: 'You have mastered the unit. Now learn to orchestrate the collective.'"
    why: "The house style forbids 'you' in body prose and non-protected callouts; second-person address is reserved for learning objectives and checkpoint callouts."
    suggestion: "Recast in first-person plural or impersonal textbook prose."
  - severity: style
    line: 801
    category: prose
    issue: "The final imperative 'Go build it well' is informal and directly exhortative."
    why: "The closing line reads more like a keynote or blog post than MIT Press textbook prose, and it shifts from synthesis to command."
    suggestion: "End with the preceding systems-engineering thesis or replace the imperative with a formal statement of engineering responsibility."
notes: >
  I did not edit any .qmd file. I reviewed the chapter against the supplied MIT Press/book
  prose rules, with special attention to register, cross-references, citations, figures, tables,
  terminology, and chapter flow.
