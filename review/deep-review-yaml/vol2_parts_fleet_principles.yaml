file: book/quarto/contents/vol2/parts/fleet_principles.qmd
status: findings
summary: >
  The part opener is structurally coherent and the cross-references checked here resolve, but it needs a release pass for textbook register, unit formatting, and terminology consistency. The main risks are a body-prose rhetorical-question construction in the opening, inconsistent treatment of the Fleet Stack and lighthouse archetypes, and several capitalized concept terms in callout prose that conflict with the MIT Press style rules.
findings:
  - severity: minor
    line: 3
    category: prose
    issue: "The opening paragraph uses direct rhetorical questions in body prose: \"how do I compute?\" and \"how do I move energy and information...\""
    why: "The prose standard forbids rhetorical questions in body prose; part-opening material should assert the new engineering question declaratively."
    suggestion: "Recast as a declarative contrast between single-accelerator computation and fleet-scale energy/information movement."
  - severity: minor
    line: 5
    category: terminology
    issue: "The named organizing framework appears as quoted lowercase \"fleet stack.\""
    why: "The volume introduction defines the framework as the Fleet Stack; the quoted lowercase form makes a central framework look informal or generic in a part opener."
    suggestion: "Use the canonical form where the framework is being invoked, or remove quotation marks if this is meant generically."
  - severity: minor
    line: 11
    category: math
    issue: "The unit expression \"100kW\" omits the required space between number and unit."
    why: "The prose rules require spaced units, and the same sentence appears later in the volume as \"100 kW.\""
    suggestion: "Change \"100kW\" to \"100 kW.\""
  - severity: style
    line: 11
    category: prose
    issue: "The bold phrase \"Watts per square foot\" uses headline capitalization inside callout body prose."
    why: "Bold lead-ins and body prose follow sentence-style treatment unless they are formal labels; this phrase is a metric, not a principle title."
    suggestion: "Use \"watts per square foot\" unless treating it as a formal named label."
  - severity: minor
    line: 23
    category: terminology
    issue: "The callout body capitalizes \"3D Parallelism\" and \"Tensor and Pipeline Parallelism\" as formal labels."
    why: "The MIT Press concept-term rules naturalize later body-prose mentions, and the surrounding volume frequently uses lowercase \"3D parallelism,\" \"tensor parallelism,\" and \"pipeline parallelism\" in running prose."
    suggestion: "Lowercase these terms in the implication sentence unless this is a first-definition site with an index entry."
  - severity: minor
    line: 29
    category: terminology
    issue: "\"Fat-Tree\" is capitalized differently from nearby chapter usage such as \"fat-tree (Clos) networks\" and \"fat-tree topology.\""
    why: "Topology names should be treated consistently across the part opener and the network fabrics chapter so readers do not infer different concepts."
    suggestion: "Use the chapter's preferred form, likely \"fat-tree,\" while preserving proper names and acronyms."
  - severity: style
    line: 29
    category: prose
    issue: "The phrase \"A cluster with 10,000 GPUs is useless for training\" is rhetorically absolute."
    why: "The MIT Press standard favors precise, evidence-based claims over hyperbolic assertions; the network would be unsuitable for synchronized training workloads, not universally useless."
    suggestion: "Qualify the claim around synchronized distributed training or collective-heavy workloads."
  - severity: minor
    line: 56
    category: math
    issue: "The efficiency range \"0.85–0.95\" is asserted as a general property of real systems without citation or scope."
    why: "Quantitative claims in textbook prose should be scoped, derived, or cited; otherwise the range reads as an unsupported release-blocking fact in a principle statement."
    suggestion: "Add scope such as workload/topology/scale, cite a source, or soften to an illustrative example."
  - severity: style
    line: 59
    category: terminology
    issue: "\"Lighthouse Archetypes\" is capitalized and bolded in running prose after the canonical concept has already been introduced elsewhere."
    why: "The style guide naturalizes concept terms in body prose; the introduction itself mostly uses lowercase \"lighthouse archetypes\" except in formal display contexts."
    suggestion: "Use \"lighthouse archetypes\" in running prose, keeping the cross-reference."
notes: >
  No malformed div fences, broken local section cross-references, figure/table/listing issues, or citation syntax problems were found in this short part file. The review did not edit any .qmd file.
