file: book/quarto/contents/vol2/frontmatter/foreword.qmd
status: findings
summary: >
  The foreword file is structurally minimal and does not show QMD syntax breakage, but it is not release-ready
  because the entire foreword remains a "Coming soon" placeholder in both PDF and HTML output.
findings:
  - severity: blocker
    line: 11
    category: flow
    issue: >
      The PDF/LaTeX foreword content is only "\textit{Coming soon.}" and the HTML fallback repeats the same
      placeholder at line 19.
    why: >
      Frontmatter shipped with a visible placeholder signals unfinished editorial content and fails the MIT
      Press release-readiness standard. Because the foreword is expected frontmatter, this also leaves readers
      without the contextual framing normally provided before the volume begins.
    suggestion: >
      Replace the placeholder with the final foreword text, or remove/suppress the foreword page from release
      builds until the text is available.
notes: >
  Reviewed against the local MIT Press/book prose standard. No .qmd files were edited.
