file: "book/quarto/contents/vol2/backmatter/appendix_assumptions.qmd"
status: findings
summary: "The appendix is structurally coherent and its internal section cross-references and cited bibliography keys mostly resolve, but it is not release-ready under the MIT Press/book prose standard. The main issues are non-protected callout prose using questions and second person, repeated forbidden body-prose transitions, inconsistent data center terminology, missing formal citation for the IEA carbon-intensity source claim, and table-caption placement that conflicts with the local QMD rule."
findings:
  - severity: style
    line: 122
    category: prose
    issue: "The non-protected `callout-notebook` uses bold question lead-ins and second-person address, including 'should you expect?'"
    why: "The prose rules allow questions and second person only in learning-objectives and checkpoint callouts. This callout is a notebook callout, so it follows body-prose register."
    suggestion: "Convert the three question lead-ins into declarative sentence-style labels and remove 'you'."
  - severity: style
    line: 364
    category: prose
    issue: "The transition asks a direct body-prose question: 'what connects the machines?'"
    why: "Rhetorical questions are forbidden in body prose under the book prose standard."
    suggestion: "State the transition declaratively, for example by saying that network fabric now determines the cost of crossing node boundaries."
  - severity: style
    line: 443
    category: prose
    issue: "A body-prose sentence begins with 'But'; the same pattern recurs at line 472."
    why: "The prose standard forbids starting body sentences with coordinating conjunctions."
    suggestion: "Replace with 'However,' or restructure the transition as a single causal sentence."
  - severity: minor
    line: 347
    category: qmd
    issue: "Markdown table captions follow the tables throughout the appendix."
    why: "The local QMD rules specify that table captions should precede tables. This pattern recurs for each `tbl-fleet-*` table."
    suggestion: "Move each `: **Caption** ... {#tbl-*}` line before its corresponding table, or confirm that this appendix is intentionally exempt."
  - severity: minor
    line: 368
    category: terminology
    issue: "The appendix uses 'datacenter' as a noun in several places."
    why: "The MIT Press spelling list specifies 'data center' as the noun form and 'data-center' only as a compound modifier."
    suggestion: "Change noun uses to 'data center' at lines 368, 407, 413, 480, 501, 516, 529, 614, and 631."
  - severity: minor
    line: 505
    category: citation
    issue: "The carbon-intensity table is attributed to 'International Energy Agency (IEA, 2023)' without a formal citation key."
    why: "The appendix gives source-specific numeric assumptions; release prose should use a bibliography-backed citation rather than a hand-typed author/year reference."
    suggestion: "Replace the parenthetical source with a real citation key for the IEA source, or cite the specific source used for the constants."
  - severity: style
    line: 287
    category: math
    issue: "Generated carbon-intensity units render as plain `gCO2/kWh` in the table unit column."
    why: "The prose standard requires chemical formulas such as CO2 to use subscript formatting in prose, tables, and captions."
    suggestion: "Use a display unit such as `gCO~2~/kWh` for the carbon-intensity table units."
notes: "No edits were made to the source QMD. Cross-references checked in this appendix resolve to visible labels, and citation keys `kokolis2025`, `zu2024tpuv4`, and `barroso2019` exist in the volume bibliography."
