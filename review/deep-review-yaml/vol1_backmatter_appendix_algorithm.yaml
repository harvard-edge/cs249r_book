file: "book/quarto/contents/vol1/backmatter/appendix_algorithm.qmd"
status: findings
summary: "The appendix is close in technical structure but not release-ready. The main issues are repeated violations of the MIT Press prose standard through second-person instructional prose, several unsupported or overbroad performance claims, and a few consistency/style defects in quantitative ranges, accelerator memory wording, and caption/register conventions."
findings:
  - severity: major
    line: 187
    category: prose
    issue: "Non-protected prose repeatedly uses direct second-person address, including 'Your logic,' 'your code,' and 'you broadcasted' in a perspective callout."
    why: "The prose standard permits second person only in learning objectives and checkpoint callouts. Perspective, notebook, body, and reference prose must keep the academic textbook register."
    suggestion: "Convert these examples to impersonal scenarios, such as 'A correct algorithm can still fail when tensor shapes or broadcasts are wrong.'"
  - severity: major
    line: 280
    category: prose
    issue: "The forward-pass walkthrough is written as imperative second-person instruction: 'Start at $x$, your input,' 'Cache $h$,' and 'you will need it later.'"
    why: "This reads like lecture notes or an exercise solution rather than body prose, and it violates the rule against direct reader address outside protected callouts."
    suggestion: "Rewrite the walkthrough declaratively, describing what the forward pass stores and why those cached values matter."
  - severity: major
    line: 453
    category: citation
    issue: "The sentence calls FlashAttention 'the most impactful fusion in modern ML' and gives 2--4x speedups without a citation or benchmark context."
    why: "The style standard requires quantitative and superlative claims to be supported. This claim is central to the appendix's optimization argument and should not rest on assertion alone."
    suggestion: "Cite the FlashAttention source or qualify the speedup as a reported benchmark under a named configuration."
  - severity: major
    line: 421
    category: consistency
    issue: "The worked example says the GPT-2 memory total fits on one `{python} GPT2TrainingMem.accel_gb_str` GB A100/H100 accelerator, but the code uses `A100_MEM_CAPACITY` and formats a GiB-derived value as GB."
    why: "The passage collapses A100 and H100 memory configurations and mixes binary-derived capacity with decimal GB prose. The argument depends on a tight memory threshold, so capacity wording must be precise."
    suggestion: "Name the exact 80 GB A100-class configuration or compute and label the capacity consistently in decimal GB."
  - severity: minor
    line: 21
    category: prose
    issue: "The 'How to Use This Appendix' bullets use repeated bold labels plus imperative 'Use...' phrasing and second-person framing."
    why: "The section is useful as a reference aid, but the current style leans toward operational checklist prose and repeats a pattern the prose guide flags as non-textbook register."
    suggestion: "Keep the reference function, but use concise descriptive bullets without second person or repeated command verbs."
  - severity: minor
    line: 201
    category: prose
    issue: "The table caption includes 'Note:' and capitalizes 'Attention FLOPs' as a descriptive phrase."
    why: "'Note that' and note-style caption prose are discouraged in body/caption register, and concept terms should be lowercased unless they are formal labels."
    suggestion: "Fold the note into the caption sentence and use lowercase descriptive phrasing such as 'attention FLOPs.'"
  - severity: minor
    line: 219
    category: prose
    issue: "The broadcasting paragraph uses 'Note that this stretching is virtual.'"
    why: "The prose rules explicitly identify 'Note that' as lecture-note register. The sentence can make the same technical point directly."
    suggestion: "Change the sentence to a direct assertion that stretching is virtual and implemented through strides."
  - severity: minor
    line: 234
    category: prose
    issue: "The callout uses spaced hyphens as sentence punctuation: 'When training fails - loss goes to NaN...' and 'memory runs out - understanding...'."
    why: "Spaced hyphens are not valid dash punctuation under the house style and create an unfinished copyedit artifact."
    suggestion: "Use a colon, semicolon, or properly formed em dash, preferably restructuring the sentence to avoid dash-heavy prose."
  - severity: minor
    line: 245
    category: math
    issue: "Several numeric ranges use ASCII double hyphens, such as `2--3$\\times$`, `10--50$\\times$`, and `2--4$\\times$`."
    why: "The MIT Press style requires en dashes for ranges. Mixed markdown/LaTeX range notation is a visible production-style inconsistency."
    suggestion: "Use en dash ranges consistently, for example `2–3$\\times$`, `10–50$\\times$`, and `2–4$\\times$`."
  - severity: minor
    line: 308
    category: terminology
    issue: "'Mixed Precision,' 'Optimizer State,' 'Momentum,' 'Variance,' and 'FP32 Master Weights' are capitalized as generic technical terms."
    why: "The MIT Press style lowercases generic concept terms in running prose and list labels unless they are proper names or formal labels."
    suggestion: "Use 'mixed precision,' 'optimizer state,' 'momentum,' 'variance,' and 'FP32 master weights' where these are descriptive rather than formal titles."
  - severity: minor
    line: 459
    category: prose
    issue: "The fallacies section uses bold paragraph starters for each pitfall and fallacy."
    why: "The prose guide flags bold paragraph starters as an operations-manual anti-pattern in body prose. The section currently reads as labeled notes rather than connected textbook argument."
    suggestion: "Use subheadings, a compact list, or connected paragraphs without bold starter labels."
  - severity: style
    line: 138
    category: prose
    issue: "The sentence 'A common optimization pattern:' is a fragment introducing a single statement."
    why: "Fragment-plus-colon phrasing is more like notes than polished textbook prose."
    suggestion: "Make it a complete sentence that states the optimization and its amortization rationale."
notes: "Reviewed against the MIT Press/book prose standard in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. I did not edit any `.qmd` files. Existing unrelated untracked files under `review/` and two `.gitignore` files were present before this review; I only created this YAML output file."
