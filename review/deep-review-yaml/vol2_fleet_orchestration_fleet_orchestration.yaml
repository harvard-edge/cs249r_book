file: book/quarto/contents/vol2/fleet_orchestration/fleet_orchestration.qmd
status: findings
summary: >
  The chapter is technically rich and broadly coherent, but it is not yet release-ready under
  the MIT Press prose standard. The main issues are direct-address/rhetorical-question
  patterns outside protected checkpoint and learning-objective contexts, one likely QMD
  escaping defect, several grammar errors in the summary and worked examples, and some
  repeated high-leverage language that weakens the chapter's textbook register.
findings:
  - severity: minor
    line: 245
    category: prose
    issue: "A non-protected callout uses second person and a rhetorical question: 'You have...' and 'What happens next?'"
    why: "The prose rules allow direct address and questions only in Purpose hooks, learning objectives, and checkpoint callouts; `.callout-notebook` follows body-prose register."
    suggestion: "Recast the problem as a declarative setup and state the diagnostic task without second person."
  - severity: major
    line: 280
    category: prose
    issue: "Body prose poses two consecutive rhetorical questions about network partitions."
    why: "Rhetorical questions are forbidden in body prose and the sequence gives a blog-post cadence to an otherwise rigorous distributed-systems discussion."
    suggestion: "Replace the questions with declarative statements describing the two policy choices and their risks."
  - severity: minor
    line: 298
    category: terminology
    issue: "The text uses 're-scheduling' as a compound."
    why: "The house style closes common re- compounds unless a domain exception applies; this instance also interrupts a long sentence."
    suggestion: "Use 'rescheduling' and consider splitting the sentence."
  - severity: minor
    line: 589
    category: terminology
    issue: "The heading reads 'Advanced slurm configuration for ML'."
    why: "The product name is consistently styled as 'Slurm' elsewhere in the chapter and footnote."
    suggestion: "Capitalize the heading as 'Advanced Slurm Configuration for ML' or equivalent title case."
  - severity: minor
    line: 925
    category: prose
    issue: "The paragraph asks 'how should jobs adapt...' in body prose."
    why: "The sentence functions as a transition, but the style guide requires declarative transitions rather than reader-facing questions."
    suggestion: "State the transition declaratively, for example by naming elastic training as the mechanism for adapting to changing allocations."
  - severity: minor
    line: 1316
    category: prose
    issue: "A body paragraph strings together three direct rhetorical questions about cost-aware scheduling."
    why: "The examples are useful, but the question format violates the body-prose register and slows the technical argument."
    suggestion: "Convert the questions into a short list of declarative scheduling decisions."
  - severity: minor
    line: 1318
    category: prose
    issue: "The parenthetical asks 'how much does a 2-hour delay cost...?'"
    why: "Even inside parentheses, this remains a rhetorical question in body prose."
    suggestion: "Rephrase as a noun phrase such as 'the organizational cost of a 2-hour delay in researcher productivity, launch schedules, or competitive position'."
  - severity: minor
    line: 1419
    category: prose
    issue: "The build-vs.-buy paragraph asks 'Is this effort justified?'"
    why: "The question is an announcement transition; MIT Press style favors direct assertion and explanation."
    suggestion: "Replace with a declarative sentence that frames the ROI calculation."
  - severity: major
    line: 1956
    category: prose
    issue: "A `.callout-example` problem statement asks 'Where is the problem, and how do we systematically diagnose it?'"
    why: "Example callouts are not protected like checkpoints, so rhetorical questions and direct pedagogical prompts conflict with the chapter prose standard."
    suggestion: "State the diagnostic objective declaratively before the worked example."
  - severity: major
    line: 2008
    category: qmd
    issue: "The annual value sentence contains `\\\\$` before an inline Python expression."
    why: "Two backslashes are likely to render a literal backslash or otherwise mishandle the intended escaped dollar sign."
    suggestion: "Use the same single escaped dollar pattern used elsewhere in the chapter."
  - severity: minor
    line: 2020
    category: prose
    issue: "A non-protected `.callout-notebook` uses second person: 'your utilization increases'."
    why: "Direct address is permitted in checkpoint and learning-objective callouts, not notebook callouts."
    suggestion: "Change to a neutral construction such as 'utilization increases from 60 percent to 84 percent'."
  - severity: minor
    line: 2042
    category: math
    issue: "The prose uses `2--4$\\times$` for a range."
    why: "In running text, the house style expects a proper range marker; the Markdown double hyphen is fragile and visually inconsistent with surrounding number style."
    suggestion: "Use an en dash range or phrase it as '2 to 4$\\times$'."
  - severity: minor
    line: 2056
    category: prose
    issue: "The paragraph closes with three body-prose questions about policy auditing."
    why: "The checklist content is useful, but question form is reserved for checkpoints; here it weakens the formal diagnostic guidance."
    suggestion: "Convert the audit items into declarative criteria."
  - severity: major
    line: 2102
    category: prose
    issue: "The summary sentence separates a long compound subject from its verb: 'Matching..., confining..., pipeline..., and data..., improves...'."
    why: "The comma before 'improves' is grammatically incorrect and the sentence is overloaded with too many concepts for a summary paragraph."
    suggestion: "Split into two sentences or make 'topology-aware scheduling' the explicit subject."
  - severity: major
    line: 2106
    category: prose
    issue: "The sentence says workloads have 'exploitable structure, iterative computation, heavy-tailed durations, sunk-cost economics, and convergence-dependent resource efficiency, that enables...'."
    why: "The comma before 'that' is ungrammatical, and the singular verb does not clearly agree with the compound antecedent."
    suggestion: "Remove the comma and revise the predicate so the antecedent and verb agree."
  - severity: style
    line: 203
    category: flow
    issue: "The phrase 'one of the highest-leverage engineering investments in ML infrastructure' recurs in several places."
    why: "The repetition at lines 203, 510, 1116, and 2120 makes the chapter sound slogan-like and reduces the force of an otherwise important economic claim."
    suggestion: "Keep the strongest instance and vary or delete later repetitions."
notes: >
  I reviewed the chapter statically against the prose rule file and did not edit any `.qmd`
  source. I did not run a full Quarto render; the escaped-dollar item should be confirmed
  during the normal release render pass.
