file: book/quarto/contents/vol2/ops_scale/ops_scale.qmd
status: findings
summary: "The chapter is substantively useful and well scoped for fleet-scale ML operations, but it is not release-ready. The main risks are a dimensional error in the inference-cost equation, inconsistent alert-volume examples, nonprotected callouts using direct second-person questions, repeated operations-manual bold paragraph starters, and a few prose/citation-level rough spots that conflict with the MIT Press style guidance."
findings:
  - severity: major
    line: 3265
    category: math
    issue: "The inference-cost equation appears to double count time by multiplying daily query volume by both per-query latency in hours and `24 \\times 365`."
    why: "If `Q_daily * L_avg` already yields GPU-hours per day before utilization and batching adjustments, annualizing should multiply by 365, not by 24 * 365. As written, the formula overstates serving cost by a factor of 24 and undermines the TCO framework."
    suggestion: "Recheck the dimensional analysis and either remove the `24` factor or redefine `Q` and `L_avg` so the units are explicit and consistent."
  - severity: major
    line: 2193
    category: consistency
    issue: "The false-alarm example mixes weekly and daily alert volumes under the same 3-sigma setup."
    why: "The prose says the alerts are addressed 'per week,' but the math immediately calculates alerts per day. A nearby SPC footnote then says 100 models with 10 metrics generate roughly 3 spurious alerts per day at 3-sigma, while this callout's five-minute cadence yields about 864 per day."
    suggestion: "State the check cadence in both examples and harmonize the units; distinguish once-per-day control checks from five-minute monitoring if both are intentional."
  - severity: minor
    line: 2202
    category: prose
    issue: "The sentence contains a capitalization typo: 'The systems conclusion is that Even...'"
    why: "The capitalized 'Even' in the middle of the sentence is an obvious copyediting error in a release candidate."
    suggestion: "Change to 'The systems conclusion is that even...' or revise the sentence for smoother prose."
  - severity: style
    line: 152
    category: prose
    issue: "A nonprotected `callout-notebook` uses direct second-person address and a rhetorical question."
    why: "The MIT Press prose rules allow 'you/your' and direct questions only in learning objectives and checkpoint callouts. This pattern also appears in similar notebook callouts at lines 326, 600, 725, 1396, 1493, and 2401."
    suggestion: "Convert notebook prompts to declarative worked-example framing, or move direct student-address prompts into a permitted checkpoint-style callout."
  - severity: style
    line: 161
    category: prose
    issue: "The notebook prose uses promotional/intensifier language such as 'Infrastructure Multiplier,' 'for free,' 'secret,' and 'Sharing Dividend.'"
    why: "The chapter frequently shifts from textbook explanation into white-paper or blog-post register inside callouts, which conflicts with the rule against hype and marketing language."
    suggestion: "Use plainer terms such as 'multi-tenant sharing increases effective capacity' and state the trade-off or assumption behind the savings."
  - severity: style
    line: 3456
    category: prose
    issue: "The callout begins with a bold paragraph starter, duplicating the preceding sentence almost verbatim."
    why: "The prose standard explicitly forbids bold paragraph starters in body-style prose, and this callout repeats line 3452 rather than advancing the explanation."
    suggestion: "Remove the bold starter and either merge the callout with the preceding paragraph or make the callout add a distinct example or implication."
  - severity: style
    line: 3841
    category: prose
    issue: "The organizational-pattern section uses a sequence of bold paragraph starters ('Consistency,' 'Efficiency,' 'Bottleneck risk,' and so on)."
    why: "This is the operations-manual anti-pattern called out in the prose rules. It reads as a labeled list disguised as prose rather than a textbook argument."
    suggestion: "Convert these advantages and disadvantages into a table or rewrite as connected paragraphs with causal transitions."
  - severity: minor
    line: 3768
    category: figure
    issue: "The organizational-pattern figure caption names left, center, and right panels, but the rendered TikZ graphic does not visibly label those positions in the caption's terms beyond small internal titles."
    why: "Readers relying on the caption or alt text may not be able to map 'left/center/right' to the exact visual elements, especially in narrow PDF rendering."
    suggestion: "Make the panel labels explicit and consistent between caption, alt text, and the figure itself."
  - severity: minor
    line: 3933
    category: flow
    issue: "The organizational-design worked example starts immediately after the selection table and before the case-study section, creating a checklist-like transition."
    why: "The chapter already contains many worked examples; this one repeats the same centralized-vs-distributed criteria without adding much new analysis, slowing the move into case studies."
    suggestion: "Condense the worked example or fold its recommendation into the preceding selection discussion before transitioning to case studies."
  - severity: minor
    line: 3964
    category: citation
    issue: "Several company case-study paragraphs make detailed claims from single broad citations, including current-sounding product behavior and architecture details."
    why: "Release prose should distinguish cited historical descriptions from inferred or current platform behavior. The case-study section risks overclaiming about Uber, Vertex AI, Netflix, and Spotify without source-specific support for each architectural detail."
    suggestion: "Tighten claims to what the cited sources establish, add citations for current product-specific assertions, or phrase unsupported architecture details as illustrative patterns rather than facts."
  - severity: style
    line: 3984
    category: prose
    issue: "The Netflix interleaving paragraph uses a long, blog-like mini-narrative with uppercase variant names and the phrase 'the quantitative outcome is dramatic.'"
    why: "The sentence-level register is less formal than the surrounding textbook prose, and 'dramatic' is a vague intensifier under the style rules."
    suggestion: "Replace the rhetorical build-up with a concise explanation of why interleaving reduces variance and cite the sample-efficiency result."
notes: "I reviewed the chapter source only and wrote this YAML file without editing any `.qmd` content. I did not run a full Quarto render; findings are based on source inspection, targeted searches, and line-numbered review against the MIT Press/book prose standard."
