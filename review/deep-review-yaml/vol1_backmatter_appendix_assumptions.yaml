file: book/quarto/contents/vol1/backmatter/appendix_assumptions.qmd
status: findings
summary: "The appendix is technically close, but it is not release-ready: the model-specification table is placed under the preceding CPU/mobile subsection, several body paragraphs use second person contrary to the prose standard, and most hardware/economic/scale assumptions lack visible source citations."
findings:
  - severity: major
    line: 512
    category: flow
    issue: "The reference-model table appears before the `## Model Specifications` heading."
    why: "In the rendered structure, `@tbl-assumptions-models` remains under `### CPU and mobile/edge processors`, while the subsequent `## Model Specifications` section contains only transition prose and no table. This makes the appendix hierarchy misleading."
    suggestion: "Move the `## Model Specifications` heading before the transition and `@tbl-assumptions-models` table, or move the table below the heading."
  - severity: major
    line: 398
    category: citation
    issue: "Most assumption tables present datasheet, pricing, and public-disclosure values without visible citations."
    why: "The appendix asks readers to audit the book's constants, but only the energy table cites a source. Hardware specs, B200/TPU v6e values, cloud rates, and scale references need traceable sources for release credibility."
    suggestion: "Add citations or a source column for each assumption group, reusing the sources already recorded in `mlsysim/core/constants.py` where applicable."
  - severity: minor
    line: 11
    category: prose
    issue: "Second-person address appears in body prose and nonprotected callouts."
    why: "The MIT Press prose standard forbids `you` and `your` outside Learning Objectives and Checkpoint callouts. This appendix uses second person in body text and takeaways, including lines 11, 15, 17, 660, and 674."
    suggestion: "Rewrite these sentences in reader-neutral form, such as `readers can audit...` or `the workload uses...`."
  - severity: minor
    line: 483
    category: consistency
    issue: "The TPU section title and table identifier say TPU v4, but the table also includes TPU v6e/Trillium."
    why: "A heading of `Google TPU v4` and id `tbl-assumptions-tpuv4` understate the table's scope and make cross-references ambiguous once v6e rows appear."
    suggestion: "Rename the heading/caption wording to cover both generations; preserve the id only if existing cross-references depend on it."
  - severity: style
    line: 566
    category: prose
    issue: "A sentence starts with the coordinating conjunction `But`."
    why: "The prose standard forbids starting body sentences with coordinating conjunctions in formal exposition."
    suggestion: "Use `However, bandwidth is only one dimension of cost` or fold the contrast into the prior sentence."
  - severity: style
    line: 650
    category: prose
    issue: "`it is worth pausing` uses a flagged emphasis/padding construction."
    why: "The prose rules flag `it is worth...` constructions as lecture-note or AI-like framing; the sentence can state the transition directly."
    suggestion: "Replace with a direct transition into common mistakes when applying the constants."
  - severity: style
    line: 660
    category: math
    issue: "`sixty TFLOPS` spells out a number attached to a technical unit."
    why: "Unit-bearing quantities should use numerals for scanability and consistency with nearby values such as `990 TFLOPS` and `16x`."
    suggestion: "Use `60 TFLOPS`."
  - severity: style
    line: 421
    category: prose
    issue: "`go-to comparison point` is informal."
    why: "The phrase reads colloquially for an MIT Press systems textbook and can be replaced without changing meaning."
    suggestion: "Use `standard comparison point` or `common reference point`."
  - severity: style
    line: 595
    category: terminology
    issue: "`on-premise costs` uses the nonstandard adjective form."
    why: "The accepted adjective for locally operated infrastructure is `on-premises`; `premise` is a logical proposition or singular property basis."
    suggestion: "Change to `on-premises costs`."
notes: "Reviewed only the requested appendix and wrote only this YAML file. No `.qmd` files were edited."
