file: book/quarto/contents/vol2/parts/deployment_principles.qmd
status: findings
summary: >
  The part opener has a coherent training-to-serving frame and its roadmap cross-references
  resolve. Release readiness is held back by two overbroad principle statements, one math/context
  issue in the P2C callout, and several MIT Press style issues involving idiom, capitalization,
  hyphenation, and vague intensifiers.
findings:
  - severity: style
    line: 3
    category: prose
    issue: >
      The phrase "earn its keep" is an informal idiom in the opening paragraph.
    why: >
      The prose standard calls for academic textbook register. The idiom sounds conversational
      and weakens an otherwise precise transition from training to production.
    suggestion: >
      Replace the idiom with a direct statement about production value, utility, or operational
      accountability.
  - severity: minor
    line: 3
    category: prose
    issue: >
      "Serve model outputs to users in real-time" uses the hyphenated adjective form where the
      adverbial phrase is needed.
    why: >
      MIT Press style uses hyphens for compound modifiers before nouns. Here the phrase modifies
      "serve," so "real time" should remain open.
    suggestion: >
      Change "in real-time" to "in real time."
  - severity: major
    line: 8
    category: consistency
    issue: >
      The autoregressive bottleneck invariant says decode is strictly memory-bandwidth bound
      because the entire model weight set must be loaded for every token.
    why: >
      This is too absolute. Decode is commonly memory-bandwidth-bound at small batch sizes, but
      batching, hardware, model architecture, and attention/KV-cache behavior can shift the
      bottleneck. A canonical invariant should not state a regime-dependent observation as an
      unconditional law.
    suggestion: >
      Qualify the invariant by regime, such as low-batch dense Transformer decode, and distinguish
      weight streaming from KV-cache traffic.
  - severity: major
    line: 10
    category: consistency
    issue: >
      "Throughput scales with batch size ... not compute power" overstates the implication of
      decode memory bandwidth.
    why: >
      Batch size improves weight-load amortization only up to hardware, memory-capacity, latency,
      and compute limits. The current wording implies compute power is irrelevant, which conflicts
      with later performance-engineering material on prefill/decode and batching trade-offs.
    suggestion: >
      State that throughput initially improves with batch size by amortizing weight reads, then
      names the latency and compute ceilings.
  - severity: style
    line: 10
    category: terminology
    issue: >
      Generic techniques are capitalized as "Continuous Batching" and "KV Cache Compression."
    why: >
      MIT Press style naturalizes generic technical concepts in running prose unless they are
      proper names, acronyms, or formal labels. "PagedAttention" is a named technique, but the
      other two are generic.
    suggestion: >
      Use "continuous batching" and "KV cache compression" unless they are being introduced as
      formal named principles.
  - severity: style
    line: 16
    category: terminology
    issue: >
      "Quantization, Distillation, Sparsity" are capitalized as generic optimization categories.
    why: >
      These are ordinary technical terms in this sentence, not proper nouns or section titles.
      Unnecessary capitalization makes the callout read like a slide outline.
    suggestion: >
      Lowercase the terms in running prose.
  - severity: major
    line: 20
    category: math
    issue: >
      The P2C invariant links the power-of-two-choices result directly to tail latency, while the
      displayed asymptotic expression describes maximum load under an idealized balls-into-bins
      model.
    why: >
      The mathematical result concerns load distribution, not tail latency by itself. Tail latency
      improvement follows only through a queueing model and assumptions about service time,
      request routing, and replica independence.
    suggestion: >
      Define the expression as a maximum-load bound, then state that lower maximum load can reduce
      tail latency under the serving assumptions used in the chapter.
  - severity: minor
    line: 20
    category: prose
    issue: >
      "Exponentially reduces tail latency" is imprecise and likely too strong for the stated
      comparison.
    why: >
      The classic result reduces the maximum load from
      Θ(log n / log log n) to Θ(log log n), which is dramatic but not the same as an exponential
      reduction in latency.
    suggestion: >
      Replace "exponentially reduces tail latency" with a more precise maximum-load or queue-depth
      claim.
  - severity: style
    line: 23
    category: prose
    issue: >
      "Surprisingly effective" is a vague intensifier.
    why: >
      The prose standard asks for quantitative specificity over qualitative emphasis. In a
      principle box, the effect should be described by the bound or operational trade-off.
    suggestion: >
      Replace the phrase with a concrete claim about reduced coordination overhead or improved
      load balance.
  - severity: style
    line: 23
    category: terminology
    issue: >
      "Tail at Scale" is capitalized as a slogan in running prose.
    why: >
      Unless this is a formal named section or cited phrase, the capitalization reads like
      white-paper terminology rather than textbook prose.
    suggestion: >
      Use "tail latency at scale" or cite/formalize the phrase if it is intended as a named term.
notes: >
  No malformed roadmap cross-references were found for @sec-performance-engineering,
  @sec-inference-scale, @sec-edge-intelligence, or @sec-ops-scale. The review did not modify the
  source QMD.
