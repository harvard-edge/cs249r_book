file: book/quarto/contents/vol1/frameworks/frameworks.qmd
status: findings
summary: "The chapter is technically rich and mostly coherent, but it is not fully release-ready under the MIT Press prose rules. The main issues are repeated rhetorical questions in body prose, a direct second-person callout, one malformed line break that will render awkwardly, and several terminology/typography inconsistencies."
findings:
  - severity: major
    line: 119
    category: prose
    issue: "Body prose frames the three framework problems as direct rhetorical questions."
    why: "The prose standard forbids rhetorical questions in body prose except for the Purpose hook and learning/checkpoint callouts. This pattern recurs throughout the chapter, including lines 315, 1267, 2271, 3348, 3651, 4296, 4361, 4385, 4451, 4495, and the Summary bullets at 4886-4890."
    suggestion: "Convert the recurring questions into declarative problem statements while preserving the execution/differentiation/abstraction structure."
  - severity: minor
    line: 131
    category: prose
    issue: "The callout uses direct second person: `Your \"Source Code\" is the model architecture`."
    why: "Non-protected callouts follow body-prose register rules, which prohibit `you/your`; only learning objectives and checkpoints may directly address the reader."
    suggestion: "Recast the sentence around `The model architecture` or `A model architecture`."
  - severity: minor
    line: 179
    category: consistency
    issue: "Theano timing is inconsistent: this footnote says the key graph-compilation insight started in 2007, while line 121 says computational graphs were pioneered by Theano in 2010 and the figure caption at line 183 again says 2007."
    why: "Conflicting dates weaken the historical ladder and may confuse readers about whether the chapter refers to Theano's development, publication, or introduction of computational graphs."
    suggestion: "Use one date convention consistently, or distinguish development year from publication/citation year."
  - severity: minor
    line: 179
    category: prose
    issue: "The footnote uses spaced double hyphens: ` -- that ... -- `."
    why: "The style guide requires proper dash characters; literal double hyphens are a manuscript-cleanup issue and may render inconsistently."
    suggestion: "Replace with em dashes or recast the aside as a full sentence."
  - severity: style
    line: 181
    category: prose
    issue: "There is a double space before `As we move up the ladder`, and the sentence uses a manual uppercase section reference: `the Execution Problem`."
    why: "The extra space is a copyediting artifact, and the style guide calls for lowercase prose references unless Quarto generates the reference text."
    suggestion: "Remove the extra space and make the prose reference lowercase, or rely on the existing cross-reference."
  - severity: style
    line: 565
    category: terminology
    issue: "`TensorFlow one.x` is written out in a code-comparison label."
    why: "The conventional product/version spelling is `TensorFlow 1.x`; spelling out `one.x` looks like a typo and may distract readers."
    suggestion: "Change the label to `TensorFlow 1.x (Static Graph)`."
  - severity: style
    line: 855
    category: math
    issue: "`~10μs` lacks a space between the number and unit."
    why: "The prose standard requires spaced units, and nearby prose otherwise uses spaced units such as `5--10 ms`."
    suggestion: "Write approximately `10 μs` or use the chapter's preferred math-unit form consistently."
  - severity: major
    line: 3346
    category: qmd
    issue: "A sentence is split across lines as `Every tensor resides on a specific device` followed by a new line beginning with `, and cross-device operations...`."
    why: "This will render as an awkward `device , and` sequence and appears to be an accidental line break introduced during editing."
    suggestion: "Join the comma to the preceding clause on the same line."
notes: "No .qmd files were edited. Review focused on release-readiness issues visible in book/quarto/contents/vol1/frameworks/frameworks.qmd and applied the MIT Press/book prose standard from book-prose.md."
