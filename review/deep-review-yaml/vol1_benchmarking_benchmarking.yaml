file: book/quarto/contents/vol1/benchmarking/benchmarking.qmd
status: findings
summary: "The chapter is comprehensive and generally release-shaped, but it needs a style and consistency cleanup before publication. The main risks are repeated non-protected rhetorical questions and second-person address, several internal contradictions in counts/ranges, and a few source/QMD polish issues."
findings:
  - severity: major
    line: 101
    category: prose
    issue: "Body prose repeatedly uses rhetorical questions outside the permitted Purpose hook and checkpoint callouts."
    why: "The MIT Press prose standard permits questions only in the Purpose hook and protected learning/checkpoint callouts. Similar body or non-protected-callout questions appear at lines 106, 812, 1080, 1121, 1125, 1310, 1499, 1632, 2303, 3690, 4141, 4170, and 4429."
    suggestion: "Convert these questions into declarative topic sentences or embedded clauses; keep direct questions only in protected callouts."
  - severity: major
    line: 303
    category: prose
    issue: "Non-protected notebook callouts use second-person address and informal language."
    why: "The standard forbids 'you/your' outside Learning Objectives and Checkpoint callouts. The statistical-confidence notebook says 'you expect'; the micro-benchmarking rules at lines 977-978 address 'you'; and the tone also includes informal phrases such as 'Better!', 'The moral', 'AI Engineering', and 'the team won the leaderboard but destroyed the product' around lines 312-333."
    suggestion: "Revise non-protected callouts into formal third-person or 'we' prose and remove casual labels."
  - severity: minor
    line: 1077
    category: qmd
    issue: "The table caption attribute block is split across two lines."
    why: "The caption for `#tbl-benchmark-comparison` opens `{#tbl-benchmark-comparison tbl-colwidths=\"[12,30,29,29]\"` on line 1077 and closes with `}` on line 1078. This may parse, but it is fragile and unlike the surrounding table syntax."
    suggestion: "Keep the full caption and attribute block on one line."
  - severity: minor
    line: 1080
    category: consistency
    issue: "The text, figure caption, and takeaways disagree about benchmark granularity count."
    why: "The chapter frames three levels in lines 818-820 and line 1080 says 'all three levels,' but @fig-benchmark-tradeoffs line 1082 says 'all four levels' and the earlier granularity figure includes an additional application layer."
    suggestion: "Choose one taxonomy, either three levels or four scopes, and make the prose, caption, and summary consistent."
  - severity: minor
    line: 1720
    category: qmd
    issue: "A Python-cell comment contains stray text artifacts: `.AS` and a lone `# │W`."
    why: "These artifacts are visible in the QMD source and suggest an unfinished edit, even though the cell itself may still execute."
    suggestion: "Remove the stray `AS` and `W` from the comment block."
  - severity: major
    line: 2322
    category: consistency
    issue: "The power-range narrative contradicts the immediately following table."
    why: "Line 2322 and @fig-power-differentials describe power spanning over ten orders of magnitude, while @tbl-power at line 2869 says over four orders. The figure ranges from 5.6 microW to 498 kW, while the table ranges from 150 microW to 10 kW, so the chapter appears to shift measurement bases without explaining the change."
    suggestion: "Clarify that the figure and table use different ranges, or harmonize the stated order-of-magnitude claims."
  - severity: minor
    line: 2394
    category: prose
    issue: "ASCII double hyphens are used as prose dashes."
    why: "The house style calls for em dashes or revised punctuation, not `--`, in running prose. Similar prose instances appear in footnotes and paragraphs such as lines 197, 530, and 2394."
    suggestion: "Replace prose `--` with the appropriate em dash, en dash, colon, or sentence split."
  - severity: minor
    line: 3821
    category: prose
    issue: "The benchmark-gaming subsection shifts into a colloquial register."
    why: "The heading 'Benchmark gaming: The cat and mouse game' and terms such as 'cheating' on lines 3823-3829 read less like an MIT Press systems textbook than the surrounding academic prose."
    suggestion: "Retitle and recast the subsection using formal terminology such as benchmark gaming, metric gaming, or submission-specific optimization."
  - severity: minor
    line: 4437
    category: flow
    issue: "The integrated-benchmarking transition is redundant with the following production transition."
    why: "Lines 4437-4466 make the same point several times: all three dimensions can pass independently, interactions still matter, and production violates lab assumptions. The repetition slows the closing movement after the model/data sections."
    suggestion: "Compress this bridge so one paragraph introduces integrated validation and the next cleanly pivots to production validation."
  - severity: style
    line: 4680
    category: prose
    issue: "The final italic summary sentence uses slogan-like phrasing."
    why: "'Benchmarking discipline separates engineering from guesswork' is rhetorically strong but reads closer to a blog conclusion than the chapter's otherwise formal textbook register."
    suggestion: "State the same claim in a plainer academic register."
notes: "Audit was source-only as requested; no full render was run and no .qmd files were edited."
