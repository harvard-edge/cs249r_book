file: book/quarto/contents/vol1/parts/build_principles.qmd
status: findings
summary: "The part opener is structurally suitable, but several release-readiness issues remain: prohibited second-person address, a manual notation reference that should be a cross-reference, and a few prose/register choices that fall below the MIT Press standard."
findings:
  - severity: minor
    line: 8
    category: qmd
    issue: "The parenthetical reference to the Notation and Conventions section is plain text rather than a Quarto cross-reference, and it capitalizes a prose section reference."
    why: "The style guide requires lowercase prose references and prefers Quarto cross-references for sections. A manual reference is easier to break and gives the reader no clickable target."
    suggestion: "Replace with a cross-reference to the notation section, likely @sec-notation-conventions-iron-law-ml-systems-ce9d, or another canonical notation anchor."
  - severity: minor
    line: 12
    category: prose
    issue: "The non-protected principle callout uses second-person address: \"your specific hardware.\""
    why: "The MIT Press prose standard forbids \"you/your\" in body prose and non-protected callouts; only learning objectives and checkpoint callouts may address the student directly."
    suggestion: "Change to a neutral formulation such as \"the target hardware\" or \"a specific hardware target.\""
  - severity: minor
    line: 15
    category: prose
    issue: "The transition uses second-person address: \"your architecture.\""
    why: "Second-person address is outside the permitted register for body prose and makes the part opener read less like formal textbook prose."
    suggestion: "Use \"the architecture\" or \"a model architecture\" instead."
  - severity: style
    line: 3
    category: prose
    issue: "The sentence \"The principles here are the physics of construction—the laws...\" uses an em dash where the style guide calls for a colon."
    why: "The prose standard warns against using em dashes to introduce explanations or lists; overuse creates a less formal, AI-like cadence."
    suggestion: "Use a colon before \"the laws\" or recast as a full sentence."
  - severity: style
    line: 6
    category: prose
    issue: "The callout opening uses an em dash to introduce the three Iron Law components."
    why: "This is another em dash used as a colon, which conflicts with the punctuation guidance for formal textbook prose."
    suggestion: "Replace the em dash after \"three components\" with a colon."
  - severity: style
    line: 3
    category: prose
    issue: "The phrase \"not merely about stacking layers\" is informal and too neural-network-specific for a machine learning systems part opener."
    why: "A part opener should frame the systems argument broadly. \"Stacking layers\" narrows the frame to model architecture and reads more like blog shorthand than MIT Press textbook prose."
    suggestion: "Replace with a broader construction/development contrast, such as model assembly versus managing data movement, computation, and hardware constraints."
notes: "No malformed figures, tables, citations, or math blocks were found in this short part-opening file. The flow from Iron Law to Silicon Contract works as part-opening material once the register and cross-reference issues are corrected."
