file: book/quarto/contents/vol2/backmatter/appendix_c3.qmd
status: findings
summary: The appendix has a coherent diagnostic structure and its referenced chapter-level targets spot-check as present, but it is not release-ready under the MIT Press prose standard. The main issues are a substantive exercise inconsistency, malformed exercise heading hierarchy, and repeated direct-address/rhetorical-question prose in non-protected body text and callouts.
findings:
  - severity: major
    line: 457
    category: math
    issue: Exercise 2 asks readers to calculate $\eta_{\text{fleet}}$, but the answer calculates $f_{\text{compute}}$ and calls it fleet efficiency.
    why: Line 224 explicitly distinguishes compute-time fraction from total fleet efficiency, so the exercise contradicts the appendix's own terminology and may teach the wrong metric.
    suggestion: Either ask for $f_{\text{compute}}$ throughout the exercise or define $\eta_{\text{fleet}}$ and compute that metric consistently.
  - severity: major
    line: 455
    category: qmd
    issue: The exercise headings descend from `###` to `####` to `#####` instead of using a consistent heading level.
    why: Exercise 2 becomes nested under Exercise 1, and Exercises 3 and 4 become nested even deeper, which can break the intended appendix structure, ToC hierarchy, and PDF/HTML navigation.
    suggestion: Make all four exercise headings the same level, likely `###`, under `## Exercises`.
  - severity: major
    line: 13
    category: prose
    issue: The appendix repeatedly uses second-person address in non-protected prose and callouts.
    why: The MIT Press prose standard forbids "you/your" outside Learning Objectives and Checkpoint callouts. Examples include "Use it as your" at line 13, "you need" at line 250, "tripling your fleet" at line 298, "your hypothesis" at line 356, and "your fleet's efficiency" at line 368.
    suggestion: Recast these as declarative textbook prose, using "the operator," "the team," or neutral system descriptions where needed.
  - severity: minor
    line: 175
    category: prose
    issue: The C$^3$ overview introduces the axes through parenthetical rhetorical questions.
    why: The prose standard disallows rhetorical questions in body prose; this passage shifts from an authoritative taxonomy to prompt-style writing.
    suggestion: Replace the parenthetical questions with declarative axis definitions.
  - severity: minor
    line: 186
    category: prose
    issue: The table uses "10K+ GPUs" in a release-facing claim.
    why: The style guide favors formal textbook prose and precise number style; "10K+" reads informal and less precise than the surrounding technical discussion.
    suggestion: Use "10,000 or more GPUs" or a specific threshold if one is intended.
  - severity: minor
    line: 415
    category: prose
    issue: The sentence "The Effective FLOPS delivered by a fleet compound three independent C$^3$ losses" is grammatically awkward.
    why: The subject and verb do not read cleanly, and the sentence obscures the important point that the three loss factors multiply.
    suggestion: Rephrase to state that a fleet's effective FLOPS are reduced by three multiplicative C$^3$ losses.
  - severity: style
    line: 513
    category: prose
    issue: Exercise 4 asks for "what three C$^3$ diagnostic questions would you ask?"
    why: Even if exercises can be more direct than body prose, this phrasing still compounds the appendix's broader direct-address pattern and conflicts with the stated prose standard.
    suggestion: Recast as "Identify three C$^3$ diagnostic questions that should precede the network upgrade."
notes: I edited only this YAML review file. No .qmd files were modified. Cross-reference spot checks found the appendix's referenced section targets present in volume 2.
