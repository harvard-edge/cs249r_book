file: book/quarto/contents/vol2/inference/inference.qmd
status: findings
summary: >
  The chapter is technically broad and mostly coherent, but it is not release-ready.
  The largest problems are malformed subsection-like labels that render as ordinary
  paragraphs, a broken Fallacies/Pitfalls ending, uncited proprietary case-study
  claims, and several MIT Press prose violations including rhetorical questions,
  second-person address in nonprotected callouts, hype diction, and range formatting.
findings:
  - severity: major
    line: 238
    category: prose
    issue: "The callout uses direct second person: 'You spent' and 'You serve'."
    why: "The prose standard permits 'you' only in learning objectives and checkpoint callouts; nonprotected callouts follow body-prose register."
    suggestion: "Recast the problem statement in third person or first-person plural."
  - severity: major
    line: 1053
    category: qmd
    issue: "Subsection labels such as 'System Parameters', 'Service Time Model', and 'Performance at Different Batch Sizes' are plain paragraphs."
    why: "They look like intended headings but will render as body text, weakening navigation and creating abrupt list/table transitions."
    suggestion: "Convert them to proper lower-level headings or integrate them into the surrounding prose."
  - severity: major
    line: 2036
    category: prose
    issue: "The KV-cache section opens with a rhetorical question in body prose."
    why: "The MIT Press standard forbids rhetorical questions outside the Purpose hook and checkpoint-style learning contexts."
    suggestion: "State the constraint directly, for example that batch size cannot grow indefinitely because KV-cache memory becomes the binding limit."
  - severity: style
    line: 4962
    category: prose
    issue: "The quantization opening uses a rhetorical question and informal hype diction: 'crush', 'blisteringly fast', 'brutally', and 'massive'."
    why: "This reads like blog or marketing prose rather than formal textbook exposition."
    suggestion: "Replace with a declarative opening that quantifies the 140 GB to 35 GB compression and states the trade-off."
  - severity: minor
    line: 4976
    category: qmd
    issue: "The citation is attached to the numeric range with no space and followed by a double space: '[-10, 10][@touvron2023llama]  but'."
    why: "This is typographically awkward and may render poorly around the citation."
    suggestion: "Add normal spacing around the citation and remove the extra space after it."
  - severity: major
    line: 4991
    category: qmd
    issue: "Multiple technical labels in the quantization section are unmarked paragraph text, including 'Key insight', 'Algorithm', 'Core technique', and 'Critical distinction'."
    why: "These labels look like intended subheads or bold starters but render inconsistently and violate the book's paragraph-flow standard."
    suggestion: "Use proper headings sparingly, or fold each label into a complete topic sentence."
  - severity: style
    line: 5241
    category: prose
    issue: "The transition into case studies uses AI-pattern phrasing: 'we have covered', 'immense landscape', and 'we will now examine'."
    why: "The prose standard flags recap-style and announcement transitions as low-quality textbook prose."
    suggestion: "Replace with a causal transition that explains why production case studies test the preceding abstractions."
  - severity: major
    line: 5245
    category: prose
    issue: "The Case Studies opening uses rhetorical questions and hype diction such as 'colossal' and 'planetary-scale'."
    why: "This violates the formal register and question policy for body prose."
    suggestion: "Open with a declarative thesis about how the case studies stress batching, sharding, caching, and routing under production constraints."
  - severity: major
    line: 5257
    category: citation
    issue: "The case studies contain many precise claims about Meta, OpenAI, Google, and TikTok production infrastructure without citations."
    why: "Claims about request volume, latency targets, model placement, GPU counts, utilization, cost reductions, and internal routing are not self-evident and in some cases appear proprietary."
    suggestion: "Cite public engineering papers/posts for each case study or mark the examples as illustrative rather than factual."
  - severity: major
    line: 5259
    category: qmd
    issue: "Each case study uses plain-text labels such as 'Scale and requirements', 'Architecture overview', 'Key design decisions', and 'Lessons learned'."
    why: "The repeated labels render as ordinary paragraphs, producing a worksheet-like structure instead of polished textbook sections."
    suggestion: "Convert recurring labels to consistent subheadings or revise the case studies into flowing prose with tables where appropriate."
  - severity: major
    line: 5545
    category: prose
    issue: "The cross-cutting observations use malformed bold-starter style without punctuation: 'Separation of concerns All systems...', 'Hybrid architectures No system...'."
    why: "These sentences are grammatically broken and also match the operations-manual paragraph-starter anti-pattern."
    suggestion: "Rewrite each observation as a complete sentence or a properly punctuated list item."
  - severity: major
    line: 5594
    category: flow
    issue: "The fallacy 'More GPU memory always means more batch size and throughput' is left dangling, followed immediately by a 'Summary' subsection."
    why: "This interrupts the Fallacies and Pitfalls pattern and makes the resource-bottleneck discussion appear misplaced inside the pitfalls list."
    suggestion: "Add the missing explanatory paragraph under the fallacy, or move the resource-bottleneck hierarchy out of the fallacies section."
  - severity: minor
    line: 5572
    category: math
    issue: "Numeric ranges use hyphens or ASCII double hyphens in prose, for example '1-5 percent', '4-5 requests', and '10--30 percent'."
    why: "The MIT Press style requires en dashes for ranges in prose; Quarto/Markdown double hyphens are not consistently appropriate outside TeX/math contexts."
    suggestion: "Use en dashes for prose ranges and keep math-mode range notation consistent with the book style."
  - severity: style
    line: 5641
    category: prose
    issue: "The close of Fallacies and Pitfalls uses hype and announcement prose: 'robust', 'fiercely responsive', and 'We conclude'."
    why: "The standard discourages vague intensifiers and announcement transitions in body prose."
    suggestion: "Replace with a concrete transition from avoided pitfalls to the final architectural summary."
notes: >
  I reviewed only book/quarto/contents/vol2/inference/inference.qmd and wrote this
