file: "book/quarto/contents/vol1/frontmatter/notation.qmd"
status: findings
summary: "The notation page is structurally simple and mostly coherent, but it is not release-clean. The rendered content comes from _notation_body.qmd and contains body-prose second person, rhetorical questions, manual nonlinked references to the Introduction, source-level dash markup that violates the MIT Press rule, and a title mismatch with downstream references."
findings:
  - severity: minor
    line: 5
    category: terminology
    issue: "The wrapper title is plural, '# Notations', while downstream prose refers to the section as 'Notation and Conventions' and the standard term is usually singular."
    why: "The frontmatter title is the reader-facing page title and sidebar label. A mismatch makes cross-references and navigation feel inconsistent in release copy."
    suggestion: "Use a single canonical title, preferably 'Notation and Conventions' or singular 'Notation', and align downstream prose."
  - severity: minor
    line: 10
    category: prose
    issue: "The included body uses second person in body prose: 'depending on which community you are reading.'"
    why: "The MIT Press prose rules forbid 'you' in body prose outside learning objectives and checkpoints."
    suggestion: "Recast impersonally, for example by referring to the community, paper, or literature being read."
  - severity: minor
    line: 16
    category: qmd
    issue: "The Iron Law introduction uses a manual parenthetical reference, '(see the Introduction)', rather than a Quarto cross-reference."
    why: "Manual chapter references are less precise, not clickable in HTML, and violate the house preference for lowercase/cross-referenced prose references."
    suggestion: "Replace with a specific cross-reference, such as @sec-introduction-iron-law-ml-systems-c32a or @eq-intro-iron-law."
  - severity: minor
    line: 38
    category: prose
    issue: "The section asks a body-prose rhetorical question: 'Does this mean:' followed by question-form bullets."
    why: "The prose standard forbids rhetorical questions in body prose except protected learning/checkpoint contexts."
    suggestion: "Convert the setup to a declarative contrast, such as 'The sentence has two possible readings:' and make the bullets noun phrases or statements."
  - severity: minor
    line: 61
    category: qmd
    issue: "The Degradation Equation section again uses a manual '(see the Introduction)' reference instead of a precise cross-reference."
    why: "The equation has an existing label in the introduction, so the notation page can link directly to the source equation rather than relying on a generic prose pointer."
    suggestion: "Reference @eq-degradation or the relevant introduction section explicitly."
  - severity: minor
    line: 77
    category: consistency
    issue: "The Energy Corollary sentence says '(see iron law in the Introduction)' with lowercase 'iron law' and another manual Introduction reference."
    why: "The page otherwise treats 'The Iron Law of ML Systems' as a named framework. The lowercase wording and nonlinked reference make the term look inconsistent."
    suggestion: "Use the canonical name and a direct cross-reference to the Iron Law equation or section."
  - severity: style
    line: 104
    category: prose
    issue: "The source uses triple-hyphen em-dash markup twice: 'throughout---meters' and '°C---consistent'."
    why: "The MIT Press rule asks for the actual em dash character and warns against dash markup/substitutes in polished prose."
    suggestion: "Use proper em dashes or revise the sentence to avoid parenthetical dash breaks."
notes: "Line references above are for book/quarto/contents/vol1/frontmatter/_notation_body.qmd except line 5, which is in the notation.qmd wrapper. No .qmd files were edited."
