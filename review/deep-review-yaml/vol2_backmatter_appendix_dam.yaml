file: book/quarto/contents/vol2/backmatter/appendix_dam.qmd
status: findings
summary: "The appendix is structurally useful but not release-ready. The main risks are a duplicate section identifier, body prose that violates the MIT Press register rules, inconsistent bottleneck terminology, and several informal or second-person formulations."
findings:
  - severity: major
    line: 5
    category: qmd
    issue: "The appendix declares `{#sec-dam-taxonomy}`, which is also used by `book/quarto/contents/vol1/backmatter/appendix_dam.qmd`."
    why: "Duplicate cross-reference identifiers can make Quarto links ambiguous or fail in combined builds, and existing references to `@sec-dam-taxonomy` may resolve to the wrong volume."
    suggestion: "Give the Vol. 2 appendix a unique label, then update Vol. 2 references that should target this appendix."
  - severity: major
    line: 88
    category: prose
    issue: "Body prose uses a direct rhetorical question: `ask: where is the flow blocked?`"
    why: "The prose rules allow questions only in the Purpose hook and protected learning/checkpoint callouts; this occurs in normal body prose."
    suggestion: "Convert the question into a declarative diagnostic statement."
  - severity: minor
    line: 110
    category: prose
    issue: "The paragraph begins with `Note that` and later says `which variable you control`."
    why: "`Note that` is explicitly disallowed lecture-note register, and second-person address is forbidden in body prose."
    suggestion: "State the distinction directly and replace `you control` with a neutral phrase such as `under operator control`."
  - severity: minor
    line: 131
    category: terminology
    issue: "The appendix alternates among `memory bound`, `compute bound`, `data bound`, `machine bound`, `latency bound`, `memory-bound`, `compute-bound`, `Data-bound`, and `Machine-bound`."
    why: "Inconsistent hyphenation and capitalization make the diagnostic categories look unstable; release prose should use one canonical form for each regime."
    suggestion: "Use consistent lower-case hyphenated forms in prose and list items, reserving capitalized Data/Algorithm/Machine only for taxonomy axes."
  - severity: minor
    line: 135
    category: flow
    issue: "The arithmetic-intensity rules of thumb use bold sentence starters in a list: `If GPU utilization...`, `If batch size...`, and `If arithmetic intensity...`."
    why: "The style guide flags bold starter patterns as operations-manual prose; here the list reads like notes rather than a textbook explanation."
    suggestion: "Turn the rules into a compact table or short explanatory paragraphs with consistent metric, threshold, and interpretation columns."
  - severity: minor
    line: 166
    category: prose
    issue: "The scorecard section says `your system's performance` and calls the metric a `Report Card`."
    why: "Second-person address is forbidden in body prose, and `Report Card` is informal and unnecessarily capitalized for MIT Press textbook register."
    suggestion: "Use neutral wording such as `a system's performance` and `scorecard` or `rubric`."
  - severity: minor
    line: 196
    category: prose
    issue: "The coordination-tax definition ends with `when you have a fleet`."
    why: "Second-person address is not allowed in body prose and weakens the formal register."
    suggestion: "Replace with neutral phrasing such as `in fleet-scale execution`."
  - severity: style
    line: 207
    category: terminology
    issue: "The takeaways capitalize `Arithmetic Intensity`, `Data-bound`, and `Machine-bound` as if they were proper names."
    why: "The surrounding prose and MIT Press style favor lowercase concept terms unless they are formal taxonomy labels."
    suggestion: "Use `arithmetic intensity`, `data-bound`, and `machine-bound` in takeaway bullets."
  - severity: style
    line: 11
    category: terminology
    issue: "The appendix writes `$C^3$ Taxonomy`, while the C3 appendix and Vol. 2 introduction use `C$^3$ Taxonomy`."
    why: "Mixed notation for the same named taxonomy creates avoidable inconsistency across adjacent backmatter."
    suggestion: "Use the same C$^3$ notation as the C3 appendix and Vol. 2 introduction."
notes: "No `.qmd` files were edited. Review used the MIT Press/book prose rules and line-numbered inspection of the appendix."
