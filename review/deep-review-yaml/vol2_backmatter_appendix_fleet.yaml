file: book/quarto/contents/vol2/backmatter/appendix_fleet.qmd
status: findings
summary: The appendix is structurally coherent and most local cross-references resolve, but it is not release-ready under the MIT Press prose standard. The main issues are repeated second-person/rhetorical-question phrasing in non-protected prose and callouts, uncited date-sensitive hardware and cluster claims, and a few temporal or navigational inconsistencies.
findings:
  - severity: major
    line: 196
    category: prose
    issue: The "How to Use This Appendix" section uses second person and rhetorical question bullets in body prose.
    why: The prose standard forbids "you/your" and rhetorical questions outside Learning Objectives and Checkpoint callouts. This section includes "When you encounter..." and several direct-reader questions, so it reads like user documentation rather than textbook prose.
    suggestion: Recast the bullets as declarative design situations, such as "Inter-node communication bandwidth" or "Cluster failure cadence," and remove direct address.
  - severity: minor
    line: 261
    category: prose
    issue: The takeaways callout uses direct address in a non-protected callout.
    why: >-
      "If you memorize nothing else..." and "where you place parallelism boundaries" violate the same body-prose rule because callout-takeaways is not a protected Learning Objectives or Checkpoint callout.
    suggestion: Use a declarative lead such as "Three ratios anchor fleet-scale reasoning" and describe placement decisions without "you."
  - severity: minor
    line: 344
    category: prose
    issue: The section frames the communication hierarchy with a rhetorical question.
    why: Rhetorical questions are disallowed in body prose; the italicized question also shifts from authoritative explanation to prompt-style writing.
    suggestion: Replace the question with a declarative sentence stating that each distributed operation must be classified by the network tier it crosses.
  - severity: minor
    line: 648
    category: prose
    issue: The tip callout uses second person and a rhetorical question.
    why: >-
      "You have provisioned..." and "Is this expected?" appear in a callout-tip, which must follow body-prose register rules. A similar issue appears in the thermal callout at line 868.
    suggestion: Rephrase both callouts as engineering scenarios without direct address or questions.
  - severity: minor
    line: 719
    category: prose
    issue: The communication-computation ratio is introduced through a rhetorical question.
    why: The prose standard requires textbook exposition to assert and explain rather than ask the reader a setup question.
    suggestion: State directly that the ratio measures whether computation between synchronization points is long enough to hide communication.
  - severity: minor
    line: 257
    category: flow
    issue: The callout points to "the hardware table below and the communication numbers in the preceding section," but both the communication numbers and hardware table appear later in the appendix section.
    why: This creates a navigation error for readers using the appendix as a reference.
    suggestion: Change "preceding section" to "communication numbers below" or point to the specific table once it appears.
  - severity: major
    line: 637
    category: citation
    issue: The hardware reference table and caption make date-sensitive specification claims without citations.
    why: Current-generation accelerator specs, TPU v6 estimates, B200/MI300X values, and "frontier" positioning are factual claims that can change and need source support for release.
    suggestion: Add citations or footnotes for the accelerator specifications and qualify estimated values consistently.
  - severity: major
    line: 639
    category: citation
    issue: The paragraph lists announced cluster sizes and vendors without citations.
    why: Claims about DGX H100 SuperPOD size, Meta's 24,576-H100 clusters, TPU v5p pod scale, and "largest announced clusters" are external factual claims that require references.
    suggestion: Cite primary vendor announcements or remove the named examples from this compact appendix.
  - severity: minor
    line: 586
    category: consistency
    issue: The hardware section's time frame is inconsistent.
    why: The heading says "c. 2024--2025," the table caption says "c. 2025--2026," table rows include "2026+," and the prose says "as of 2025." The appendix therefore does not present a stable temporal scope.
    suggestion: Choose one explicit reference date for the table and align the heading, caption, and prose to that date.
  - severity: style
    line: 316
    category: qmd
    issue: The quick-reference table uses an ASCII arrow in rendered prose.
    why: >-
      "->" is an informal notation and does not match the book's polished table style.
    suggestion: Replace it with prose such as "implies" or with a proper math arrow if a symbolic expression is intended.
notes: Cross-reference spot checks found the appendix's local table, equation, and section labels present, and the referenced chapter-level section targets exist in volume 2. No .qmd files were edited.
