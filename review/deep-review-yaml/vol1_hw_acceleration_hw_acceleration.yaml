file: book/quarto/contents/vol1/hw_acceleration/hw_acceleration.qmd
status: findings
summary: >
  The chapter is technically rich and generally coherent, but it is not yet release-ready.
  The highest-risk issues are malformed inline math/TikZ that may break rendering, a few
  inconsistent or inaccurate hardware terminology claims, and several flow/structure problems
  where sections repeat or contradict earlier framing. Prose also contains multiple MIT Press
  style violations, especially rhetorical questions and informal intensifiers in non-protected
  callouts/body text.
findings:
  - severity: major
    line: 824
    category: qmd
    issue: "The TikZ options for @fig-accelerator-anatomy contain malformed syntax: `align=center,,outer sep=0pt` and later `0.3of L1` spacing."
    why: "The duplicate comma and missing space before `of` can trigger TikZ key parsing errors or incorrect node placement, putting figure rendering at risk."
    suggestion: "Clean the TikZ option list and use valid positioning syntax such as `above right=0.1 and 0.3 of L1`."
  - severity: major
    line: 2169
    category: qmd
    issue: "The systolic-array inline math mixes `\\(`, inline Python, and a stray `{\\times}` in a malformed expression."
    why: "This can render incorrectly or fail LaTeX parsing, and it appears in body prose rather than a protected code context."
    suggestion: "Rewrite the expression as plain prose with the two inline Python values outside math, or construct a valid math expression around rendered values."
  - severity: major
    line: 1601
    category: consistency
    issue: "The definition of N:M structured sparsity says exactly N values are nonzero per block, but the 2:4 example says at least two values must be zero."
    why: "Those statements are not equivalent: 'exactly two nonzero' differs from 'at most two nonzero.' This weakens a key hardware constraint explanation."
    suggestion: "Use one precise formulation consistently, preferably 'two nonzero values in each block of four' if describing NVIDIA 2:4 sparsity."
  - severity: major
    line: 2280
    category: terminology
    issue: "Intel Sapphire Rapids is described as dedicating 'tensor cores' to INT8 and BF16."
    why: "Sapphire Rapids uses AMX/tile matrix extensions, not NVIDIA-style Tensor Cores; the current wording conflates vendor-specific terminology."
    suggestion: "Change the reference to AMX or matrix/tile engines rather than tensor cores."
  - severity: major
    line: 2868
    category: flow
    issue: "@fig-memory-wall is introduced before the 'Irregular memory access' subsection, but the figure itself appears inside that subsection."
    why: "The placement makes the memory-wall figure appear to belong to irregular memory access rather than the preceding memory-wall quantification, interrupting the textbook flow."
    suggestion: "Move the subsection heading after the figure or move the figure introduction into the subsection where the figure appears."
  - severity: major
    line: 3827
    category: prose
    issue: "The dense-layer callout contains the typo 'batc = 32'."
    why: "This is visible instructional text in a worked example and will look unpolished in release."
    suggestion: "Correct to 'batch = 32'."
  - severity: major
    line: 4233
    category: math
    issue: "The memory allocation equation example uses `\\text{four}^{5 \\times 3}` before showing `4^{15}`."
    why: "Spelling out the base as text inside an exponent is mathematically malformed and distracts from the combinatorial argument."
    suggestion: "Use `4^{5 \\times 3} = 4^{15} = 1,073,741,824`."
  - severity: major
    line: 4917
    category: consistency
    issue: "The mapping table uses 'Activation Stationary' for transformers, while the chapter defines the third strategy as 'Input stationary'."
    why: "The terminology shift can confuse readers about whether this is a new dataflow strategy or the same one introduced earlier."
    suggestion: "Use 'Input Stationary' consistently, or explicitly define 'activation stationary' as the same concept before the table."
  - severity: major
    line: 4918
    category: consistency
    issue: "The architecture-specific mapping table gives universal NHWC/NCHW recommendations that contradict the earlier layout discussion's backend-dependent caveat."
    why: "Lines 4439-4458 correctly state that layout performance depends on backend and kernel path; the table reverts to oversimplified rules."
    suggestion: "Revise the table cells to say 'backend-dependent/channels-last often' rather than fixed NHWC or NCHW prescriptions."
  - severity: minor
    line: 30
    category: prose
    issue: "The Purpose body contains rhetorical questions beyond the allowed hook, such as 'which chip is fastest?' and 'which chip's memory system best matches my model's access patterns?'."
    why: "The prose standard permits one Purpose hook question but otherwise forbids rhetorical questions in body prose."
    suggestion: "Convert the later questions into declarative framing about matching memory systems to access patterns."
  - severity: minor
    line: 98
    category: prose
    issue: "The theorem callout uses informal language: 'boring' serial part and 'exciting' AI part."
    why: "This blog-like register does not match the MIT Press textbook standard for non-protected callouts."
    suggestion: "Replace with neutral terms such as 'serial component' and 'parallel accelerator component'."
  - severity: minor
    line: 782
    category: flow
    issue: "The transition paragraph repeats the same setup and ends with a long, diffuse summary before the table."
    why: "It says the AI bottleneck is qualitatively different, then says 'Understanding this question matters' without a clear antecedent, and repeats the specialization-history framing already established."
    suggestion: "Condense the paragraph to one clear table lead-in and state the integration bottleneck directly."
  - severity: minor
    line: 796
    category: flow
    issue: "The paragraph repeats 'determines every subsequent architectural decision' within two sentences."
    why: "The repetition weakens the transition into the integration bottleneck section and signals unrevised draft prose."
    suggestion: "Delete one occurrence and use the remaining sentence to name the bottleneck being introduced."
  - severity: minor
    line: 2088
    category: prose
    issue: "The phrase 'secret sauce' appears in formal exposition."
    why: "The prose standard rejects blog/marketing idioms in body text."
    suggestion: "Use a precise phrase such as 'central mechanism' or 'key implementation principle'."
  - severity: minor
    line: 3103
    category: prose
    issue: "The memory hierarchy table uses a spaced hyphen range: `~100 µs - 1 ms`."
    why: "The style guide requires an en dash for ranges, not a hyphen with spaces."
    suggestion: "Change to `~100 µs–1 ms` or `approximately 100 µs to 1 ms`."
  - severity: style
    line: 3111
    category: prose
    issue: "The non-protected notebook callout uses rhetorical questions: 'Why is on-chip SRAM necessary? Why not fetch all data from HBM?'."
    why: "Only learning objectives and checkpoint callouts may use direct questions under the prose standard."
    suggestion: "Convert the prompt to a declarative problem statement about why off-chip memory cannot feed compute every cycle."
  - severity: style
    line: 3534
    category: prose
    issue: "The non-protected notebook callout opens with a rhetorical question about H100 vs. V100 utilization."
    why: "This violates the no-rhetorical-questions rule for body prose and non-protected callouts."
    suggestion: "Rewrite as a declarative claim: newer accelerators require higher arithmetic intensity to reach full utilization."
  - severity: style
    line: 4965
    category: prose
    issue: "The compiler section addresses the reader directly: 'consider what happens when you compile ResNet-50'."
    why: "The style guide forbids 'you' in body prose outside learning objectives and checkpoint callouts."
    suggestion: "Replace with 'consider compilation of ResNet-50 for GPU inference'."
  - severity: minor
    line: 5070
    category: qmd
    issue: "A section identifier appears at the end of a paragraph instead of on a heading."
    why: "Pandoc may render the attribute literally or attach it unexpectedly, and it is not a standard chapter-section pattern."
    suggestion: "Attach the identifier to an actual heading or remove it if no cross-reference targets it."
  - severity: minor
    line: 5097
    category: qmd
    issue: "Another section identifier appears at the end of a paragraph rather than on a heading."
    why: "This repeats the nonstandard QMD pattern and can produce unstable cross-reference behavior."
    suggestion: "Move the identifier to a heading or delete it if unused."
  - severity: minor
    line: 5112
    category: consistency
    issue: "The memory-planning section says NVIDIA GPUs often use NHWC while TPUs favor NCHW, conflicting with the earlier backend-dependent layout treatment."
    why: "The earlier section explicitly warns against memorizing a universal CPU/GPU/TPU layout split; this sentence reintroduces one."
    suggestion: "State that compilers choose backend-specific physical layouts, with examples qualified by kernel and precision mode."
  - severity: minor
    line: 5137
    category: qmd
    issue: "A third section identifier appears at the end of a paragraph instead of on a heading."
    why: "Repeated inline heading IDs are likely accidental and make cross-reference targets fragile."
    suggestion: "Move the ID to a heading or remove it if it is not referenced."
  - severity: style
    line: 5755
    category: prose
    issue: "The sustainability callout calls custom silicon the 'ultimate Green technology' and 'the single most effective way' to reduce carbon footprint."
    why: "The wording is promotional and overgeneralized relative to the chapter's otherwise evidence-based tone."
    suggestion: "Use a narrower claim tied to the calculation, such as 'specialized accelerators can materially reduce energy use for matched inference workloads'."
notes: >
  Review was limited to book/quarto/contents/vol1/hw_acceleration/hw_acceleration.qmd
  and the MIT Press/book prose standard. No .qmd files were edited.
