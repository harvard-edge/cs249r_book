file: "book/quarto/contents/vol2/network_fabrics/network_fabrics.qmd"
status: findings
summary: "The chapter is strong conceptually, but it is not release-ready. Several issues are structural rather than copy-level: malformed trailing QMD, inconsistent five-level taxonomy, conflicting fat-tree scaling numbers, a contradictory oversubscription cost calculation, and a mislabeled/reused figure. The prose generally matches textbook register, but some body sections still use operations-manual bold starters and a few headings/units need house-style cleanup."
findings:
  - severity: blocker
    line: 1662
    category: qmd
    issue: "Three stray colon-only lines appear after the quiz-end block."
    why: "These lines are not part of a valid fenced div or chapter element and may render as literal punctuation or break downstream cleanup checks."
    suggestion: "Remove the trailing colon-only lines after `::: { .quiz-end }`."
  - severity: major
    line: 113
    category: consistency
    issue: "The figure caption's five-level model does not match the chapter's five-level model."
    why: "The figure lists Level 2 as Link, Level 3 as Network, Level 4 as Transport, and Level 5 as Application/Collective, while lines 373-377 and the chapter headings define Level 2 as Transport, Level 3 as Switch and Topology, Level 4 as Fabric Behavior, and Level 5 as Cluster Design. This undermines the chapter's organizing framework."
    suggestion: "Make the figure caption, figure labels, section list, and subsequent Level 1-5 references use one canonical taxonomy."
  - severity: major
    line: 859
    category: math
    issue: "Fat-tree scaling claims conflict across the section."
    why: "The text says radix-64 supports 1,024 GPUs in a two-tier pod, 65,536 hosts in a three-tier fabric, roughly 2,048 switches for a 4,096-GPU fat-tree, up to 2,048 GPUs with a two-tier fat-tree, and 4,096 switches for a non-blocking k=64 tree. These cannot all be true under one topology model."
    suggestion: "Recompute the host and switch counts for the specific topology being described, distinguish two-tier leaf-spine from k-ary three-tier Clos, and use the same assumptions on lines 859, 861, 907, 978, 980, and 1078."
  - severity: major
    line: 963
    category: consistency
    issue: "The oversubscription notebook gives a hardcoded $75 million waste estimate that contradicts the later computed estimate."
    why: "Line 963 states that a 4x communication slowdown on a $300M cluster with 30 percent communication wastes about $75M, while the later `BisectionBottleneck` calculation implies about $142M and line 1169 renders that computed value."
    suggestion: "Use the same throughput-loss model in both notebooks or remove the hardcoded dollar amount from line 963."
  - severity: major
    line: 1350
    category: figure
    issue: "`@fig-hierarchical-staircase` is introduced as a bandwidth staircase but renders the same topology-bandwidth chart used earlier."
    why: "Line 1348 says the figure shows a bandwidth staircase mapping NVLink, InfiniBand, and parallelism strategies; the figure caption and asset instead repeat the topology cost/bisection comparison from `@fig-network-topologies`. Readers will not see the hierarchy the prose depends on."
    suggestion: "Replace the asset/caption with an actual bandwidth-staircase figure or revise the prose and cross-reference to refer to the topology comparison."
  - severity: major
    line: 998
    category: consistency
    issue: "The rail-optimized topology explanation mixes data parallelism and tensor parallelism in a technically confusing way."
    why: "The paragraph says data parallelism creates the pattern, then justifies it with partitioned matrix multiplications, which is tensor parallelism. Nearby lines also alternate between data-parallel AllReduce and tensor-parallel activation exchanges as the primary beneficiary."
    suggestion: "Separate same-rank data-parallel AllReduce across nodes from tensor-parallel activation exchange, and state which traffic rail optimization is optimizing in this chapter."
  - severity: minor
    line: 478
    category: math
    issue: "The figure caption uses plain `us` for microseconds."
    why: "The book style and surrounding prose use `\\mu\\text{s}` or `μs`; plain `us` looks like an unformatted unit in a release PDF."
    suggestion: "Change `10--20 us`, `1--3 us`, and matching plot labels to `10--20 $\\mu\\text{s}$` and `1--3 $\\mu\\text{s}$` or the house-standard equivalent."
  - severity: minor
    line: 1530
    category: flow
    issue: "The checkpoint question includes its own diagnostic reasoning and answer."
    why: "Checkpoint callouts should prompt the student; this item tells the reader the likely bottleneck and asks what tool to use, reducing the exercise value."
    suggestion: "Move the explanatory reasoning to an answer key or shorten the prompt to ask for the first diagnostic step and evidence."
  - severity: style
    line: 1542
    category: prose
    issue: "The Fallacies section uses bold paragraph starters in body prose."
    why: "The MIT Press prose rules explicitly flag bold paragraph starters as an operations-manual anti-pattern outside protected structures."
    suggestion: "Convert the fallacy/pitfall labels into a proper list, callout pattern, or prose topic sentences without bold starter labels."
  - severity: style
    line: 1360
    category: terminology
    issue: "The heading lowercases the product/name phrase as `Meta grand teton`."
    why: "This looks inconsistent with the proper-name treatment used in nearby prose and other headings."
    suggestion: "Use `Meta Grand Teton` in the heading."
notes: "Reviewed against the MIT Press/book prose rules in /Users/VJ/GitHub/AIConfigs/projects/MLSysBook/.claude/rules/book-prose.md. No .qmd files were edited."
