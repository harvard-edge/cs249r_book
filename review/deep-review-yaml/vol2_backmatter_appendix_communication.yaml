file: book/quarto/contents/vol2/backmatter/appendix_communication.qmd
status: findings
summary: >
  The appendix is technically coherent and well structured as a quantitative reference,
  but it is not fully release-ready under the MIT Press prose standard. The main issues
  are repeated second-person address outside protected callouts, informal diagnostic
  phrasing, a few orphan equation labels, one imprecise rule-of-thumb statement, and
  inconsistent top-k casing.
findings:
  - severity: major
    line: 170
    category: prose
    issue: >
      The appendix repeatedly uses "you" and "your" in body prose and non-protected
      callouts, including lines 170, 245, 346, 385, 398, 471, and 498.
    why: >
      The book prose standard permits second-person address only in Learning Objectives
      and Checkpoint callouts. These are perspective, takeaways, and body/reference
      passages, so the register reads more like advice or a tutorial than MIT Press
      textbook prose.
    suggestion: >
      Recast these sentences in declarative or "we" form, for example "A topology
      decision requires an estimate..." rather than "You need to estimate..."
  - severity: minor
    line: 17
    category: prose
    issue: >
      The phrase "pipeline bubbles are killing throughput" and the embedded question
      "should we compress gradients?" are informal and question-driven.
    why: >
      The style guide forbids blog-post informality and rhetorical questions in body
      prose. The appendix can remain reference-oriented without using casual diagnostic
      language.
    suggestion: >
      Replace with neutral symptoms such as "pipeline bubbles dominate throughput" and
      "gradient compression is under consideration."
  - severity: minor
    line: 254
    category: qmd
    issue: >
      Several bare labels appear as standalone paragraphs before equations: "Ring
      AllReduce," "Tree AllReduce," "Ring AllGather," "Ring ReduceScatter," "Ring
      AllToAll," and "Tree Broadcast."
    why: >
      These render as orphan prose lines rather than structured captions or explanatory
      sentences, which weakens the reference presentation and can look unfinished in
      print.
    suggestion: >
      Integrate each label into the preceding sentence, make them consistent low-level
      headings, or introduce the equations with "For ring AllReduce:" style prose.
  - severity: minor
    line: 398
    category: math
    issue: >
      "M >= 4(P - 1), which means M >= 4P for practical purposes" presents a conservative
      approximation as though it follows directly from the inequality.
    why: >
      The exact 20 percent bound is M > 4(P - 1); replacing it with 4P is a useful
      rounded rule, but "means" obscures the distinction between the derived threshold
      and the conservative heuristic.
    suggestion: >
      Change "which means" to wording such as "often rounded conservatively to" or
      "commonly approximated as."
  - severity: style
    line: 437
    category: terminology
    issue: >
      The appendix uses both "top-k" in the callout title and "Top-k" in the worked
      example body.
    why: >
      Inconsistent capitalization of the same algorithmic term creates unnecessary
      terminology noise in a reference appendix.
    suggestion: >
      Use one form consistently, preferably "top-k" except when required by sentence
      position.
notes: >
  Cross-reference targets and the Alexandrov citation key appear to exist. I did not
  edit any .qmd files.
