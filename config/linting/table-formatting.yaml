# Table Formatting Pre-commit Hook Configuration
# This can be added to .pre-commit-config.yaml

repos:
  - repo: local
    hooks:
      - id: format-grid-tables
        name: Format Grid Tables
        description: 'Format grid tables in .qmd files with intelligent alignment'
        entry: python3 tools/scripts/content/format_grid_tables.py
        language: system
        files: '\.qmd$'
        args: ['--check-all', '--pre-commit']
        pass_filenames: false
        
      - id: format-grid-tables-changed
        name: Format Grid Tables (Changed Files Only)
        description: 'Format grid tables in changed .qmd files only'
        entry: python3 tools/scripts/content/format_grid_tables.py
        language: system
        files: '\.qmd$'
        args: ['-f']
        pass_filenames: true 