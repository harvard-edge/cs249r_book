# =============================================================================
# MLPerf EDU: Benchmark Workload Registry
#
# Each workload maps to an official MLPerf division with a scaled-down proxy
# model, real dataset, and verified quality target.
#
# Quality targets are empirically verified on Apple M1 MPS.
# =============================================================================

suites:
  # -----------------------------------------------------------
  # CLOUD DIVISION
  # Language modeling, recommendation, generative AI
  # -----------------------------------------------------------
  cloud:
    nanogpt-train:
      model: nanogpt-12m
      params: 11.1M
      params_note: "Char-level vocab=128 (TinyShakespeare uses 65 unique chars). Earlier README/paper figures of 85.9M and 124.4M reflected a vocab=50,257 BPE config that was never reachable from the char-level data; iteration 1 reconciled the model to its actual effective size."
      dataset: tinyshakespeare
      dataset_source: "Karpathy (2015), character-level, 1.1MB, shipped in repo"
      quality_target:
        metric: cross_entropy_loss
        value: 2.3
      verified_baseline:
        train_loss: 2.248
        val_loss: 2.205
        epochs: 25
        time_seconds: 89
        baseline_note: "Loss curves carry over from the prior 30.3M-with-wasted-vocab config because only the 65 active token embeddings ever updated; needs re-verification on the cleaned 11M model in a follow-up iteration."
      scenario: single_stream
      provenance: "Vaswani et al. 2017 (Transformer); maps to MLPerf Training GPT-3/LLaMA"

    nano-moe-train:
      model: nano-moe-12m
      params: 17.4M
      dataset: tinyshakespeare
      dataset_source: "Karpathy (2015), character-level, 1.1MB, shipped in repo"
      quality_target:
        metric: cross_entropy_loss
        value: 0.05
      verified_baseline:
        train_loss: 0.042
        val_loss: 0.042
        epochs: 25
        time_seconds: 158
      scenario: single_stream
      provenance: "Shazeer et al. 2017 (MoE); 8 experts, top-2 routing"

    micro-dlrm-train:
      model: micro-dlrm-1m
      params: 23K
      working_set_regime: cache_resident
      regime_note: "Active embedding tables (943×8 + 1682×8 + 21×8 ≈ 21KB) fit in L1 on every modern laptop. Use this variant to study the DLRM *architectural pattern* (sparse-gather + dense-MLP) in isolation from memory bottlenecks. Pair with micro-dlrm-dram-train (iter 2) to observe the bottleneck transition that production DLRM exhibits."
      dataset: movielens-100k
      dataset_source: "Harper & Konstan (2015), MovieLens-100K, 100K ratings from 943 users × 1682 movies; ships in data/movielens/"
      quality_target:
        metric: accuracy
        value: 0.70
      verified_baseline:
        train_loss: 0.58
        val_loss: 0.61
        accuracy: 0.71
        epochs: 25
        time_seconds: 5
        note: "23K params; embedding tables (943×8 + 1682×8 ≈ 21KB) fit in L1 cache"
      scenario: server
      provenance: "Naumov et al. 2019 (DLRM); maps to MLPerf Training DLRM"

    micro-dlrm-dram-train:
      model: micro-dlrm-dram-1m
      params: 512M
      trainable_params: 23K
      working_set_regime: dram_bound
      virtual_table_bytes: 2147483648   # 2,000,000 rows × 256 dim × 4 bytes = 2 GB
      llc_capacity_factor: 170          # ~170x M1's 12 MB LLC; required so per-batch byte transfer (8 MB at B=8192) dominates PyTorch's ~50 us per-call dispatch overhead. With m_spa<128 the dispatch overhead masks the bandwidth signal — production DLRM uses 64-512 dim embeddings for the same reason.
      smoke_test_result: "iter-2 host: 4.16x end-to-end, 3.27x pure lookup vs cache variant (B=8192, M-series CPU)"
      regime_note: "Hash-mapped virtual embedding table sized to exceed L3 by ~20x. Same MovieLens data and MLP topology as micro-dlrm-train; only the embedding access pattern changes. Run BOTH variants under identical harness settings to observe the bottleneck transition that defines production-scale DLRM. Quality target is intentionally lower (0.65 vs 0.70) to budget for the ~5pp accuracy cost of hash collisions; use `working_set_regime` to condition harness behavior, not the workload name."
      dataset: movielens-100k
      dataset_source: "Harper & Konstan (2015) — same dataset as micro-dlrm-train"
      quality_target:
        metric: accuracy
        value: 0.65
      verified_baseline:
        baseline_note: "Awaiting first verification run on iter-2 harness."
      scenario: server
      provenance: "Naumov et al. 2019 (DLRM) + Weinberger et al. 2009 (hashing trick); production-realistic memory access pattern at laptop scale"

    micro-diffusion-train:
      model: micro-diffusion-32px
      params: 2.0M
      dataset: cifar10
      dataset_source: "Krizhevsky (2009), auto-download via torchvision, 170MB"
      quality_target:
        metric: mse_loss
        value: 0.002
      verified_baseline:
        train_loss: 0.002
        val_loss: 0.000
        epochs: 20
        time_seconds: 41
      scenario: offline
      provenance: "Ho et al. 2020 (DDPM); U-Net denoising autoencoder"

    micro-gnn-train:
      model: micro-gnn
      params: 5.6K
      dataset: cora
      dataset_source: "Sen et al. (2008), Cora citation network (2708 nodes, 7 classes, 5429 edges); auto-download; synthetic fallback available for offline use"
      quality_target:
        metric: test_accuracy
        value: 0.78
      verified_baseline:
        train_loss: 0.35
        val_accuracy: 0.816
        test_accuracy: 0.816
        epochs: 50
        time_seconds: 2
        note: "81.6% matches Kipf & Welling (2017) published result on Cora"
      scenario: single_stream
      provenance: "Kipf & Welling 2017 (GCN); maps to MLPerf Training GNN"

    micro-bert-train:
      model: micro-bert
      params: 432K
      dataset: sst2
      dataset_source: "Socher et al. (2013), Stanford Sentiment Treebank binary, 67K train / 872 val; ships in data/sst2/"
      quality_target:
        metric: val_accuracy
        value: 0.78
      verified_baseline:
        train_loss: 0.15
        val_accuracy: 0.77
        epochs: 15
        time_seconds: 45
        note: "Character-level tokenization; 77% on real SST-2 with 0.5M-param model"
      scenario: single_stream
      provenance: "Devlin et al. 2019 (BERT); bidirectional transformer for NLU"

    micro-lstm-train:
      model: micro-lstm
      params: 51K
      dataset: etth1
      dataset_source: "Zhou et al. (2021, AAAI Informer), ETTh1 hourly electricity transformer temps, 17K observations; ships in data/etth1/"
      quality_target:
        metric: val_mse
        value: 0.13
      verified_baseline:
        train_loss: 0.017
        val_loss: 0.17
        epochs: 30
        time_seconds: 20
        note: "Classic overfitting pattern — val MSE plateaus at epoch 5 then rises"
      scenario: single_stream
      provenance: "Hochreiter & Schmidhuber 1997 (LSTM); time-series forecasting"

    micro-rl-train:
      model: micro-rl
      params: 17K
      dataset: cartpole_local
      dataset_source: "Pure-Python CartPole environment; physics from OpenAI Gym spec, no download"
      quality_target:
        metric: avg_episode_reward
        value: 195
      verified_baseline:
        avg_reward: 9.5
        episodes: 500
        time_seconds: 1
        note: "REINFORCE is high-variance by design — pedagogical value in showing RL difficulty"
      scenario: single_stream
      provenance: "Williams 1992 (REINFORCE); policy gradient on classic control"

  # -----------------------------------------------------------
  # EDGE DIVISION
  # Image classification under latency constraints
  # -----------------------------------------------------------
  edge:
    resnet18-train:
      model: resnet18
      params: 11.2M
      dataset: cifar100
      dataset_source: "Krizhevsky (2009), auto-download via torchvision, 170MB; cached locally after first download"
      quality_target:
        metric: top1_accuracy
        value: 0.36
      verified_baseline:
        train_loss: 2.456
        val_loss: 2.485
        accuracy: 0.363
        epochs: 25
        time_seconds: 64
        note: "36.3% after 25 epochs; systems tuning (augmentation, schedule) reaches 50%+"
      scenario: single_stream
      provenance: "He et al. 2016 (ResNet); FULLY LOCAL implementation — no torchvision.models dependency"

    mobilenetv2-train:
      model: mobilenetv2
      params: 2.4M
      dataset: cifar100
      dataset_source: "Krizhevsky (2009), auto-download via torchvision, 170MB; cached locally after first download"
      quality_target:
        metric: top1_accuracy
        value: 0.40
      verified_baseline:
        epochs: 15
        time_seconds: 60
        note: "Inverted residual architecture with depthwise separable convolutions"
      scenario: single_stream
      provenance: "Sandler et al. 2018 (MobileNetV2); FULLY LOCAL — no torchvision.models dependency"

  # -----------------------------------------------------------
  # TINY DIVISION
  # Keyword spotting, anomaly detection, person detection (MCU-scale)
  # -----------------------------------------------------------
  tiny:
    dscnn-kws-train:
      model: dscnn-kws
      params: 20K
      dataset: speech_commands_v2
      dataset_source: "Warden (2018), auto-download via torchaudio, ~2GB"
      quality_target:
        metric: top1_accuracy
        value: 0.90
      verified_baseline:
        train_loss: 0.916
        val_loss: 1.026
        accuracy: 0.712
        epochs: 10
        time_seconds: 51
        note: "71.2% after 10 epochs on 12-class (10 keywords + unknown + silence)"
      max_model_size_kb: 100
      scenario: offline
      provenance: "Zhang et al. 2017 (Hello Edge); maps to MLPerf Tiny KWS"

    anomaly-ae-train:
      model: anomaly-ae
      params: 0.3M
      dataset: mnist
      dataset_source: "LeCun et al. 1998, auto-download via torchvision, 12MB"
      quality_target:
        metric: reconstruction_mse
        value: 0.04
      verified_baseline:
        train_loss: 0.034
        val_loss: 0.065
        epochs: 20
        time_seconds: 5
        note: "Val loss intentionally higher — anomalous digits have high recon error"
      max_model_size_kb: 32
      scenario: offline
      provenance: "MLPerf Tiny AD benchmark; Koizumi et al. 2019 (ToyADMOS architecture)"

    wake-vision-vww:
      model: wake-vision-vww
      params: 8.5K
      dataset: wake_vision
      dataset_source: "Banbury et al. 2024 (CVPR), HuggingFace Harvard-Edge/Wake-Vision, 6GB; 5K pedagogical subset with CIFAR-10 proxy fallback"
      quality_target:
        metric: binary_accuracy
        value: 0.85
      verified_baseline:
        train_loss: 0.31
        val_loss: 0.33
        accuracy: 0.873
        epochs: 20
        time_seconds: 10
      max_model_size_kb: 16
      scenario: offline
      provenance: "Banbury et al. 2024 (Wake Vision, CVPR); maps to MLPerf Tiny VWW"

  # -----------------------------------------------------------
  # AGENT DIVISION (Novel Contribution)
  # Systems performance of agentic AI pipelines
  # -----------------------------------------------------------
  agent:
    nano-rag-agent:
      model: nano-rag-agent
      params: 20.1M
      dataset: react_traces
      dataset_source: "Structured multi-step reasoning traces; ReAct format"
      quality_target:
        metric: retrieval_accuracy
        value: 0.80
      metrics:
        - retrieve_latency_ms
        - generate_latency_ms
        - queries_per_second
      scenario: server
      provenance: "Lewis et al. 2020 (RAG); measures retrieval vs generation bottleneck"

    nano-codegen-agent:
      model: nano-codegen-agent
      params: 13.7M
      dataset: mbpp
      dataset_source: "Austin et al. 2021 (MBPP); 20 curated Python problems with unit tests"
      quality_target:
        metric: pass_at_1
        value: 0.15
      metrics:
        - iterations_to_correct
        - tokens_per_attempt
        - context_growth_factor
      scenario: server
      provenance: "Chen et al. 2021 (Codex); measures iterative retry cost"

    nano-react-agent:
      model: nano-react-agent
      params: 13.7M
      dataset: react_traces
      dataset_source: "Structured multi-step reasoning traces; ReAct format"
      quality_target:
        metric: trace_accuracy
        value: 0.60
      metrics:
        - steps_to_answer
        - reasoning_latency_per_step_ms
        - tool_dispatch_latency_ms
      scenario: server
      provenance: "Yao et al. 2023 (ReAct); measures multi-step reasoning + tool use"

    # (Optional / Bonus workload — not part of the core 16 in the paper)
    nano-toolcall-agent:
      model: nano-toolcall-agent
      params: 13.7M
      dataset: react_traces
      dataset_source: "Structured multi-step reasoning traces; ReAct format"
      metrics:
        - classification_latency_ms
        - json_validity_rate
        - queries_per_second
      scenario: server
      provenance: "Schick et al. 2024 (Toolformer); measures structured output generation"
