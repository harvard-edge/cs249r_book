# MLPerf EDU — ResNet-18 Optimization Challenge (Lab 1)
# ======================================================
# Students start with this "broken" config and optimize incrementally.
# See paper §5.1 for the full lab instructions.
#
# Usage: mlperf config resnet_lab1_broken.yaml
# ======================================================

workload: resnet18
dataset: cifar100
mode: train

# Intentionally suboptimal settings for Lab 1
target_quality: 0.36       # Top-1 > 36%
epochs: 20
batch_size: 8              # Too small! Students should increase to 64
seed: 42

scenario: Offline
division: closed
hardware: auto
output: submissions/

# Student task: Profile, identify bottleneck, fix
# Expected optimization sequence:
#   1. batch_size: 8 → 64 (4x throughput)
#   2. Add CosineAnnealingLR (convergence)  
#   3. Add augmentation (generalization)
#   4. Enable torch.amp (2x throughput on GPU)
