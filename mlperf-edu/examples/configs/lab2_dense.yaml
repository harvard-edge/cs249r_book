# MLPerf EDU — Dense vs. Sparse Architecture Comparison (Lab 2)
# ==============================================================
# Run this config for both workloads to compare convergence behavior.
# See paper §5.2 for the full lab instructions.
#
# Usage:
#   mlperf config lab2_dense.yaml    # NanoGPT (dense)
#   mlperf config lab2_sparse.yaml   # Nano-MoE (sparse) — create this!
# ==============================================================

workload: nanogpt-12m
dataset: tinyshakespeare
mode: train

target_quality: 2.3
epochs: 25
batch_size: 16
seed: 42

scenario: SingleStream
division: closed
hardware: auto
output: submissions/

# After training, students compare:
#   NanoGPT: 85.9M params, final loss ~2.25
#   Nano-MoE: 17.4M params, final loss ~0.04
# Discussion: Why does MoE converge 50x lower with fewer parameters?
