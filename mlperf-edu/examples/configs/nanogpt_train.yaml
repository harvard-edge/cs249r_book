# MLPerf EDU Experiment Configuration
# =====================================
# This file maps directly to the evaluation tuple:
#   S = (Model, Data, Hardware, Scenario, Constraints) → M = (Latency, Throughput, Accuracy, Energy)
#
# Usage: mlperf config nanogpt_train.yaml
# =====================================

# S.Model — The workload to run
workload: nanogpt-12m

# S.Data — Dataset (auto-resolved from workload if omitted)
dataset: tinyshakespeare

# Phase: train or infer
mode: train

# S.Constraints
target_quality: 2.3        # Loss < 2.3
epochs: 25
batch_size: 16
seed: 42

# S.Scenario (for inference mode)
scenario: SingleStream

# S.Constraints — Division
division: closed

# S.Hardware — 'auto' detects available hardware (CPU/MPS/CUDA)
hardware: auto

# M — Output directory for JSON submission artifacts
output: submissions/
