<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 11px; font-weight: 500; fill: #555; }
      .label { font-size: 10px; fill: #fff; font-weight: 600; }
      .small { font-size: 8.5px; fill: #fff; font-weight: 400; }
      .divlabel { font-size: 12px; font-weight: 700; }
      .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .dasharrow { stroke: #999; stroke-width: 1; fill: none; stroke-dasharray: 4,3; marker-end: url(#arrowhead2); }
      .box { rx: 6; ry: 6; }
      .connector { font-size: 9px; fill: #666; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <marker id="arrowhead2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" class="title">MLPerf EDU System Architecture</text>
  <text x="360" y="44" text-anchor="middle" class="subtitle">16 Workloads · 4 Divisions · Unified CLI Harness</text>

  <!-- ═══════════ DIVISION BOXES ═══════════ -->

  <!-- Cloud Division (top-left) -->
  <rect x="20" y="65" width="335" height="170" rx="8" fill="#f0f4ff" stroke="#3b5998" stroke-width="1.5"/>
  <text x="187" y="82" text-anchor="middle" class="divlabel" fill="#3b5998">Cloud Division</text>

  <!-- Cloud workloads (2 rows of 4) -->
  <rect x="30" y="92" width="72" height="36" class="box" fill="#3b5998"/>
  <text x="66" y="107" text-anchor="middle" class="label">NanoGPT</text>
  <text x="66" y="119" text-anchor="middle" class="small">124K · LM</text>

  <rect x="108" y="92" width="72" height="36" class="box" fill="#3b5998"/>
  <text x="144" y="107" text-anchor="middle" class="label">Nano-MoE</text>
  <text x="144" y="119" text-anchor="middle" class="small">17K · MoE</text>

  <rect x="186" y="92" width="77" height="36" class="box" fill="#3b5998"/>
  <text x="225" y="107" text-anchor="middle" class="label">Micro-DLRM</text>
  <text x="225" y="119" text-anchor="middle" class="small">21K · Rec</text>

  <rect x="269" y="92" width="77" height="36" class="box" fill="#3b5998"/>
  <text x="308" y="107" text-anchor="middle" class="label">Micro-Diff</text>
  <text x="308" y="119" text-anchor="middle" class="small">2M · Gen</text>

  <rect x="30" y="136" width="72" height="36" class="box" fill="#4a69a0"/>
  <text x="66" y="151" text-anchor="middle" class="label">Micro-GCN</text>
  <text x="66" y="163" text-anchor="middle" class="small">94K · Graph</text>

  <rect x="108" y="136" width="72" height="36" class="box" fill="#4a69a0"/>
  <text x="144" y="151" text-anchor="middle" class="label">Micro-BERT</text>
  <text x="144" y="163" text-anchor="middle" class="small">1M · NLU</text>

  <rect x="186" y="136" width="77" height="36" class="box" fill="#4a69a0"/>
  <text x="225" y="151" text-anchor="middle" class="label">Micro-LSTM</text>
  <text x="225" y="163" text-anchor="middle" class="small">54K · TS</text>

  <rect x="269" y="136" width="77" height="36" class="box" fill="#4a69a0"/>
  <text x="308" y="151" text-anchor="middle" class="label">Micro-RL</text>
  <text x="308" y="163" text-anchor="middle" class="small">18K · RL</text>

  <!-- Datasets line -->
  <text x="187" y="190" text-anchor="middle" font-size="8" fill="#3b5998" font-style="italic">TinyShakespeare · MovieLens · Cora · SST-2 · ETTh1 · CIFAR-10 · CartPole</text>
  <!-- Param range -->
  <text x="187" y="202" text-anchor="middle" font-size="8" fill="#888">Total: 8 workloads | 18K–2M params | All real datasets</text>

  <!-- Edge Division (top-right) -->
  <rect x="370" y="65" width="170" height="105" rx="8" fill="#fff5f0" stroke="#d4451b" stroke-width="1.5"/>
  <text x="455" y="82" text-anchor="middle" class="divlabel" fill="#d4451b">Edge Division</text>

  <rect x="380" y="92" width="72" height="36" class="box" fill="#d4451b"/>
  <text x="416" y="107" text-anchor="middle" class="label">ResNet-18</text>
  <text x="416" y="119" text-anchor="middle" class="small">11.2M · Cls</text>

  <rect x="458" y="92" width="72" height="36" class="box" fill="#d4451b"/>
  <text x="494" y="107" text-anchor="middle" class="label">MobileV2</text>
  <text x="494" y="119" text-anchor="middle" class="small">2.4M · Cls</text>

  <text x="455" y="151" text-anchor="middle" font-size="8" fill="#d4451b" font-style="italic">CIFAR-100 (locally cached)</text>

  <!-- Tiny Division (right of Edge) -->
  <rect x="555" y="65" width="152" height="105" rx="8" fill="#f0fff0" stroke="#2d7d2f" stroke-width="1.5"/>
  <text x="631" y="82" text-anchor="middle" class="divlabel" fill="#2d7d2f">Tiny Division</text>

  <rect x="563" y="92" width="63" height="36" class="box" fill="#2d7d2f"/>
  <text x="594" y="107" text-anchor="middle" class="label">DS-CNN</text>
  <text x="594" y="119" text-anchor="middle" class="small">20K · KWS</text>

  <rect x="632" y="92" width="67" height="36" class="box" fill="#3d9d3f"/>
  <text x="665" y="107" text-anchor="middle" class="label">Anomaly</text>
  <text x="665" y="119" text-anchor="middle" class="small">0.3M · AE</text>

  <rect x="563" y="134" width="136" height="28" class="box" fill="#4dad4f"/>
  <text x="631" y="151" text-anchor="middle" class="label">Wake Vision (VWW)</text>

  <text x="631" y="155" text-anchor="middle" font-size="8" fill="#2d7d2f" font-style="italic"></text>

  <!-- Agent Division (middle right) -->
  <rect x="370" y="180" width="337" height="55" rx="8" fill="#faf0ff" stroke="#7b2d8e" stroke-width="1.5"/>
  <text x="538" y="197" text-anchor="middle" class="divlabel" fill="#7b2d8e">Agent Division</text>

  <rect x="380" y="205" width="100" height="24" class="box" fill="#7b2d8e"/>
  <text x="430" y="220" text-anchor="middle" class="label">NanoRAG</text>

  <rect x="486" y="205" width="100" height="24" class="box" fill="#8b3d9e"/>
  <text x="536" y="220" text-anchor="middle" class="label">NanoCodeGen</text>

  <rect x="592" y="205" width="106" height="24" class="box" fill="#9b4dae"/>
  <text x="645" y="220" text-anchor="middle" class="label">NanoReAct</text>

  <!-- ═══════════ HARNESS LAYER ═══════════ -->

  <!-- Central Harness Box -->
  <rect x="20" y="255" width="690" height="95" rx="10" fill="#f8f9fa" stroke="#333" stroke-width="2"/>
  <text x="360" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">MLPerf EDU Harness</text>

  <!-- Harness components -->
  <rect x="35" y="285" width="130" height="28" rx="5" fill="#e8edf3" stroke="#555" stroke-width="1"/>
  <text x="100" y="303" text-anchor="middle" font-size="9" fill="#333" font-weight="600">CLI Interface</text>

  <rect x="175" y="285" width="105" height="28" rx="5" fill="#e8edf3" stroke="#555" stroke-width="1"/>
  <text x="228" y="303" text-anchor="middle" font-size="9" fill="#333" font-weight="600">Dataset Factory</text>

  <rect x="290" y="285" width="105" height="28" rx="5" fill="#e8edf3" stroke="#555" stroke-width="1"/>
  <text x="343" y="303" text-anchor="middle" font-size="9" fill="#333" font-weight="600">Training Factory</text>

  <rect x="405" y="285" width="100" height="28" rx="5" fill="#e8edf3" stroke="#555" stroke-width="1"/>
  <text x="455" y="303" text-anchor="middle" font-size="9" fill="#333" font-weight="600">LoadGen Proxy</text>

  <rect x="515" y="285" width="90" height="28" rx="5" fill="#e8edf3" stroke="#555" stroke-width="1"/>
  <text x="560" y="303" text-anchor="middle" font-size="9" fill="#333" font-weight="600">Power Profiler</text>

  <rect x="615" y="285" width="88" height="28" rx="5" fill="#e8edf3" stroke="#555" stroke-width="1"/>
  <text x="659" y="303" text-anchor="middle" font-size="9" fill="#333" font-weight="600">Compliance</text>

  <text x="360" y="340" text-anchor="middle" font-size="8" fill="#888">mlperf [division] --task [name] --scenario [Offline|Server|SingleStream|MultiStream] --division [closed|open]</text>

  <!-- ═══════════ ARROWS ═══════════ -->

  <!-- Workloads → Harness -->
  <line x1="187" y1="237" x2="187" y2="253" class="arrow"/>
  <line x1="455" y1="235" x2="455" y2="253" class="arrow"/>
  <line x1="631" y1="170" x2="631" y2="253" class="arrow"/>

  <!-- ═══════════ OUTPUT LAYER ═══════════ -->

  <!-- Student SUT Plugin -->
  <rect x="20" y="370" width="200" height="70" rx="8" fill="#fff8e1" stroke="#f5a623" stroke-width="1.5"/>
  <text x="120" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#c47d10">Student SUT Plugin</text>
  <text x="120" y="405" text-anchor="middle" font-size="8" fill="#8a6914">Optimizations: quantization,</text>
  <text x="120" y="415" text-anchor="middle" font-size="8" fill="#8a6914">KV-cache, batching, pruning</text>
  <text x="120" y="430" text-anchor="middle" font-size="8.5" fill="#c47d10" font-weight="600">Closed ↔ Open Division</text>

  <!-- Submission JSON -->
  <rect x="240" y="370" width="240" height="70" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="360" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">Submission Artifact (JSON)</text>
  <text x="360" y="406" text-anchor="middle" font-size="8" fill="#558b2f">• Latency p50/p90/p95/p99</text>
  <text x="360" y="417" text-anchor="middle" font-size="8" fill="#558b2f">• Throughput (QPS) · Energy (Joules)</text>
  <text x="360" y="428" text-anchor="middle" font-size="8" fill="#558b2f">• Hardware fingerprint · SHA-256 hash</text>

  <!-- Leaderboard -->
  <rect x="500" y="370" width="210" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="605" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#1565c0">Classroom Leaderboard</text>
  <text x="605" y="406" text-anchor="middle" font-size="8" fill="#1565c0">Compare student submissions</text>
  <text x="605" y="417" text-anchor="middle" font-size="8" fill="#1565c0">Rank by latency/throughput/energy</text>
  <text x="605" y="428" text-anchor="middle" font-size="8" fill="#1565c0">Instructor verification via JSON</text>

  <!-- Harness → Outputs -->
  <line x1="120" y1="352" x2="120" y2="368" class="arrow"/>
  <line x1="360" y1="352" x2="360" y2="368" class="arrow"/>
  <line x1="605" y1="352" x2="605" y2="368" class="arrow"/>

  <!-- Student → Harness feedback -->
  <path d="M 30,375 Q 10,375 10,340 L 10,310 Q 10,290 20,290" class="dasharrow"/>

  <!-- Evaluation Tuple notation -->
  <rect x="20" y="460" width="690" height="48" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="360" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Evaluation Tuple: 𝒮 = (Model, Data, Hardware, Scenario) → 𝓜 = (Latency, Throughput, Accuracy, Energy)</text>
  <text x="360" y="497" text-anchor="middle" font-size="9" fill="#666">Each workload instantiates this tuple. Students reason across dimensions to optimize systems performance.</text>
</svg>
