# =============================================================================
# LECTURE SLIDES PORTAL
# =============================================================================
# Beamer slide decks for the ML Systems textbook.
# Part of the MLSysBook ecosystem: mlsysbook.ai/slides/
#
# Build:  cd slides && quarto render
# Output: slides/_build/  (HTML portal site)
# Slides: cd slides && make all  (builds PDFs separately via Makefile)
# =============================================================================

project:
  type: website
  output-dir: _build/html
  render:
    - "*.qmd"

website:
  title: "Lecture Slides — Machine Learning Systems"
  description: "Beamer lecture slides for the ML Systems textbook. 35 decks, 266 SVG diagrams, ~38 hours of teaching material. Free to download and customize."
  site-url: https://mlsysbook.ai/slides/
  favicon: https://mlsysbook.ai/vol1/assets/images/icons/favicon.png

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  # Navbar — matches ecosystem pattern
  navbar:
    background: light
    search: true
    pinned: true
    collapse: true
    collapse-below: "lg"
    title: "Machine Learning Systems"
    left:
      - text: "Textbook"
        menu:
          - icon: house
            text: "Home"
            href: https://mlsysbook.ai/
          - text: "---"
          - icon: journal
            text: "Volume I: Foundations"
            href: https://mlsysbook.ai/vol1/
          - icon: journal
            text: "Volume II: At Scale"
            href: https://mlsysbook.ai/vol2/
      - text: "Slides"
        menu:
          - icon: easel
            text: "All Slides"
            href: index.qmd
          - text: "---"
          - icon: collection
            text: "Volume I Slides"
            href: vol1.qmd
          - icon: collection
            text: "Volume II Slides"
            href: vol2.qmd
          - text: "---"
          - icon: mortarboard
            text: "Teaching Guide"
            href: teaching.qmd
      - text: "Resources"
        menu:
          - icon: mortarboard
            text: "Instructor Blueprint"
            href: https://mlsysbook.ai/instructors/
          - icon: terminal
            text: "Labs"
            href: https://mlsysbook.ai/labs/
          - icon: cpu
            text: "Hardware Kits"
            href: https://mlsysbook.ai/kits/
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"

  sidebar: false

  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      <a href="https://mlsysbook.ai/vol1/">Volume I</a> · <a href="https://mlsysbook.ai/vol2/">Volume II</a> · <a href="index.html">Slides</a>
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: light
    border: true

format:
  html:
    toc: true
    theme: cosmo
    css: styles.css
