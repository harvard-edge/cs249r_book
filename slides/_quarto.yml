# =============================================================================
# LECTURE SLIDES PORTAL
# =============================================================================
# Beamer slide decks for the ML Systems textbook.
# Part of the MLSysBook ecosystem: mlsysbook.ai/slides/
#
# Build:  cd slides && quarto render
# Output: slides/_build/html/  (HTML portal site)
# Slides: cd slides && make all  (builds PDFs separately via Makefile)
# =============================================================================

project:
  type: website
  output-dir: _build/html
  render:
    - "*.qmd"

website:
  title: "Lecture Slides — Machine Learning Systems"
  description: "Beamer lecture slides for the ML Systems textbook. 35 decks, 266 SVG diagrams, ~38 hours of teaching material. Free to download and customize."
  site-url: https://mlsysbook.ai/slides/
  favicon: assets/images/favicon.png

  page-navigation: true
  reader-mode: false
  back-to-top-navigation: true
  bread-crumbs: true

  # Navbar — matches ecosystem pattern (see instructors/, labs/, kits/)
  navbar:
    background: light
    logo: assets/images/logo.png
    search: true
    pinned: true
    collapse: true
    collapse-below: "lg"
    title: "Machine Learning Systems"
    left:
      - text: "Textbook"
        menu:
          - icon: house
            text: "Home"
            href: https://mlsysbook.ai/
          - text: "---"
          - icon: journal
            text: "Volume I: Foundations"
            href: https://mlsysbook.ai/vol1/
          - icon: journal
            text: "Volume II: At Scale"
            href: https://mlsysbook.ai/vol2/
          - text: "---"
          - icon: fire
            text: "TinyTorch"
            href: https://mlsysbook.ai/tinytorch/
          - icon: cpu
            text: "Hardware Kits"
            href: https://mlsysbook.ai/kits/
          - icon: calculator
            text: "MLSys·IM"
            href: https://mlsysbook.ai/mlsysim/
          - text: "---"
          - icon: lightbulb
            text: "Labs"
            href: https://mlsysbook.ai/labs/
          - icon: mortarboard
            text: "Interview Prep"
            href: https://github.com/harvard-edge/cs249r_book/tree/dev/interviews
            target: _blank
      - text: "Lecture Slides"
        menu:
          - icon: easel
            text: "Slides Home"
            href: ./index.qmd
          - text: "---"
          - icon: collection
            text: "Volume I Slides"
            href: vol1.qmd
          - icon: collection
            text: "Volume II Slides"
            href: vol2.qmd
          - text: "---"
          - icon: mortarboard
            text: "Teaching Guide"
            href: teaching.qmd
    right:
      - icon: star
        text: "Star"
        href: https://github.com/harvard-edge/cs249r_book#support-this-work
        target: _blank
      - icon: heart
        text: "Support"
        href: https://opencollective.com/mlsysbook
        target: _blank
      - icon: github
        text: "GitHub"
        href: https://github.com/harvard-edge/cs249r_book
        target: _blank

  sidebar: false

  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      Part of the <a href="https://mlsysbook.ai">Machine Learning Systems</a> textbook
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: light
    border: true

format:
  html:
    theme:
      light:
        - default
        - assets/styles/style.scss
    toc: true
    css: styles.css
