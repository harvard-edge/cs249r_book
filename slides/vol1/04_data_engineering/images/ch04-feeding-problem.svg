<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Feeding Problem: GPU Starvation from I/O Bottleneck</text>

  <!-- ===== Disk (narrow pipe) ===== -->
  <rect x="60" y="120" width="140" height="240" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="130" y="210" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Storage</text>
  <text x="130" y="228" font-size="9" font-weight="400" fill="#555" text-anchor="middle">(Cloud Disk)</text>
  <text x="130" y="260" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">250 MB/s</text>
  <text x="130" y="278" font-size="8" font-weight="400" fill="#555" text-anchor="middle">actual throughput</text>

  <!-- ===== Narrow pipe connecting disk to GPU ===== -->
  <rect x="200" y="225" width="200" height="30" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="300" y="244" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Data Pipeline (narrow bottleneck)</text>

  <!-- ===== GPU block (large) ===== -->
  <rect x="400" y="80" width="260" height="320" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- GPU active region (tiny sliver) -->
  <rect x="405" y="345" width="250" height="50" rx="3" fill="#4a90c4" stroke="none" opacity="0.3"/>
  <text x="530" y="375" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Active: ~2% utilization</text>

  <!-- GPU idle region (large) -->
  <rect x="405" y="85" width="250" height="255" rx="3" fill="#f9d6d5" stroke="none" opacity="0.4"/>
  <text x="530" y="200" font-size="14" font-weight="700" fill="#c44" text-anchor="middle">IDLE</text>
  <text x="530" y="222" font-size="10" font-weight="400" fill="#c44" text-anchor="middle">Waiting for data</text>

  <!-- GPU label -->
  <text x="530" y="105" font-size="11" font-weight="700" fill="#333" text-anchor="middle">A100 GPU</text>
  <text x="530" y="122" font-size="9" font-weight="400" fill="#555" text-anchor="middle">40,000 images/sec capacity</text>
  <text x="530" y="139" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Needs 23 GB/s</text>

  <!-- ===== Tax badge ===== -->
  <rect x="690" y="170" width="170" height="70" rx="12" fill="#a31f34" stroke="none"/>
  <text x="775" y="196" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">&gt;98% idle</text>
  <text x="775" y="215" font-size="9" font-weight="400" fill="#fff" text-anchor="middle">Feeding Tax</text>
  <text x="775" y="230" font-size="8" font-weight="400" fill="#fff" text-anchor="middle">(I/O wait cost)</text>

  <!-- ===== Iron Law box ===== -->
  <rect x="690" y="270" width="170" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="775" y="290" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Iron Law Diagnosis:</text>
  <text x="775" y="306" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Data term dominates</text>
  <text x="775" y="318" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">T = max(T_compute, T_io)</text>

  <!-- ===== Bottom insight ===== -->
  <rect x="120" y="430" width="660" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="453" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Adding more GPUs yields zero speedup when I/O is the bottleneck</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">The Iron Law's data term dominates when disk cannot keep up with accelerator demand</text>
</svg>
