<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Three Types of Distribution Drift</text>

  <!-- ===== Panel 1: Covariate Shift ===== -->
  <rect x="30" y="55" width="270" height="360" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.15"/>
  <rect x="30" y="55" width="270" height="40" rx="5" fill="#3d9e5a" stroke="none"/>
  <text x="165" y="80" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Covariate Shift</text>

  <text x="165" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">P(X) changes</text>
  <text x="165" y="132" font-size="9" font-weight="400" fill="#555" text-anchor="middle">P(Y|X) stays the same</text>

  <!-- Simple distribution visualization -->
  <text x="80" y="168" font-size="8" font-weight="400" fill="#4a90c4">Training</text>
  <ellipse cx="130" cy="210" rx="50" ry="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="230" y="168" font-size="8" font-weight="400" fill="#c44">Production</text>
  <ellipse cx="200" cy="210" rx="50" ry="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <!-- Arrow showing shift -->
  <line x1="145" y1="245" x2="195" y2="245" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="170" y="260" font-size="7.5" fill="#a31f34" text-anchor="middle">shift</text>

  <text x="165" y="290" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example:</text>
  <text x="165" y="308" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">New camera model changes</text>
  <text x="165" y="322" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">image brightness distribution</text>

  <rect x="55" y="345" width="220" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="165" y="363" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Detect: Monitor input features (PSI)</text>

  <!-- ===== Panel 2: Label Shift ===== -->
  <rect x="315" y="55" width="270" height="360" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" opacity="0.15"/>
  <rect x="315" y="55" width="270" height="40" rx="5" fill="#c87b2a" stroke="none"/>
  <text x="450" y="80" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Label Shift</text>

  <text x="450" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">P(Y) changes</text>
  <text x="450" y="132" font-size="9" font-weight="400" fill="#555" text-anchor="middle">P(X|Y) stays the same</text>

  <!-- Bar chart visualization -->
  <rect x="365" y="200" width="30" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="400" y="180" width="30" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="365" y="195" width="30" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <rect x="400" y="210" width="30" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <rect x="475" y="190" width="30" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="510" y="185" width="30" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="475" y="215" width="30" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <rect x="510" y="170" width="30" height="70" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="415" y="255" font-size="7.5" fill="#555" text-anchor="middle">Class A</text>
  <text x="510" y="255" font-size="7.5" fill="#555" text-anchor="middle">Class B</text>

  <text x="450" y="290" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example:</text>
  <text x="450" y="308" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Seasonal flu spike changes</text>
  <text x="450" y="322" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">disease prevalence ratio</text>

  <rect x="340" y="345" width="220" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="363" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Detect: Monitor prediction distributions</text>

  <!-- ===== Panel 3: Concept Drift ===== -->
  <rect x="600" y="55" width="270" height="360" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" opacity="0.15"/>
  <rect x="600" y="55" width="270" height="40" rx="5" fill="#c44" stroke="none"/>
  <text x="735" y="80" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Concept Drift</text>

  <text x="735" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">P(Y|X) changes</text>
  <text x="735" y="132" font-size="9" font-weight="400" fill="#555" text-anchor="middle">The mapping itself changes</text>

  <!-- Decision boundary visualization -->
  <line x1="660" y1="170" x2="810" y2="240" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="670" y="195" font-size="7.5" fill="#4a90c4">Old boundary</text>
  <line x1="660" y1="210" x2="810" y2="180" stroke="#c44" stroke-width="2"/>
  <text x="790" y="195" font-size="7.5" fill="#c44">New</text>
  <!-- Data points -->
  <circle cx="690" cy="185" r="4" fill="#3d9e5a"/>
  <circle cx="720" cy="200" r="4" fill="#3d9e5a"/>
  <circle cx="750" cy="195" r="4" fill="#c87b2a"/>
  <circle cx="780" cy="210" r="4" fill="#c87b2a"/>
  <circle cx="710" cy="220" r="4" fill="#c87b2a"/>

  <!-- Danger badge -->
  <rect x="670" y="248" width="130" height="24" rx="12" fill="#a31f34" stroke="none"/>
  <text x="735" y="264" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Most dangerous</text>

  <text x="735" y="295" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example:</text>
  <text x="735" y="313" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Fraud tactics evolve;</text>
  <text x="735" y="327" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">same features, new patterns</text>

  <rect x="625" y="345" width="220" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="735" y="363" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Detect: Needs ground truth labels</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="445" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Concept drift is delayed because ground truth labels arrive late — the most dangerous silent failure</text>

  <!-- ===== Arrow defs ===== -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
</svg>
