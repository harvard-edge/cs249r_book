<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Training-Serving Skew: The Silent Accuracy Killer</text>

  <!-- ===== Dashed vertical divider ===== -->
  <line x1="450" y1="50" x2="450" y2="340" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Left: Training Path ===== -->
  <rect x="40" y="50" width="390" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="235" y="70" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Training Path</text>

  <!-- Training flow boxes -->
  <rect x="80" y="100" width="130" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="145" y="122" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Raw Features</text>

  <line x1="210" y1="118" x2="240" y2="118" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <rect x="245" y="100" width="150" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="320" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Normalize</text>
  <text x="320" y="130" font-size="8" font-weight="400" fill="#3d9e5a" text-anchor="middle">mean=0.5, std=0.2</text>

  <line x1="320" y1="136" x2="320" y2="170" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <rect x="245" y="172" width="150" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="320" y="194" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Train Model</text>

  <!-- ===== Right: Serving Path ===== -->
  <rect x="470" y="50" width="390" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="665" y="70" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Serving Path</text>

  <!-- Serving flow boxes -->
  <rect x="510" y="100" width="130" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="575" y="122" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Live Features</text>

  <line x1="640" y1="118" x2="670" y2="118" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="675" y="100" width="150" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="750" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Normalize</text>
  <text x="750" y="130" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">mean=0.0, std=1.0</text>

  <line x1="750" y1="136" x2="750" y2="170" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="675" y="172" width="150" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="750" y="194" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Serve Model</text>

  <!-- ===== Mismatch highlight ===== -->
  <rect x="230" y="93" width="180" height="50" rx="6" fill="none" stroke="#a31f34" stroke-width="2.5" stroke-dasharray="6,3"/>
  <rect x="660" y="93" width="180" height="50" rx="6" fill="none" stroke="#a31f34" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="450" y="125" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">MISMATCH</text>

  <!-- ===== Impact box ===== -->
  <rect x="200" y="230" width="500" height="50" rx="4" fill="#a31f34" stroke="none"/>
  <text x="450" y="252" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">20-40% accuracy drop, silently</text>
  <text x="450" y="270" font-size="9" font-weight="400" fill="#fff" text-anchor="middle">30-40% of initial ML deployments at Uber suffered this failure mode</text>

  <!-- ===== Solution boxes at bottom ===== -->
  <text x="450" y="315" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Solutions: Enforce Training-Serving Consistency</text>

  <rect x="55" y="335" width="185" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="148" y="355" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Shared Code</text>
  <text x="148" y="375" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Same transform function</text>
  <text x="148" y="387" font-size="8" font-weight="400" fill="#555" text-anchor="middle">in train and serve paths</text>

  <rect x="260" y="335" width="185" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="353" y="355" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Stored Parameters</text>
  <text x="353" y="375" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Save normalization stats</text>
  <text x="353" y="387" font-size="8" font-weight="400" fill="#555" text-anchor="middle">alongside model artifact</text>

  <rect x="465" y="335" width="185" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="558" y="355" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Feature Stores</text>
  <text x="558" y="375" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Centralized feature</text>
  <text x="558" y="387" font-size="8" font-weight="400" fill="#555" text-anchor="middle">computation layer</text>

  <rect x="670" y="335" width="185" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="763" y="355" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Idempotent Transforms</text>
  <text x="763" y="375" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Same input always</text>
  <text x="763" y="387" font-size="8" font-weight="400" fill="#555" text-anchor="middle">produces same output</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="435" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Consistency is state synchronization, not just code-sharing</text>
</svg>
