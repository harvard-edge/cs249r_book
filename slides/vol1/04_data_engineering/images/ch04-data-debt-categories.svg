<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Data Debt: The Hidden Iceberg</text>

  <!-- ===== Water line ===== -->
  <line x1="60" y1="195" x2="840" y2="195" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="75" y="188" font-size="9" font-weight="700" fill="#4a90c4">Visible</text>
  <text x="75" y="212" font-size="9" font-weight="700" fill="#4a90c4">Hidden</text>

  <!-- ===== Above waterline: Visible symptoms ===== -->
  <!-- Iceberg top triangle -->
  <polygon points="450,60 540,190 360,190" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Visible Symptoms</text>
  <text x="450" y="130" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Accuracy dropped 5%</text>
  <text x="450" y="148" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Failed predictions</text>
  <text x="450" y="166" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">User complaints</text>

  <!-- ===== Below waterline: Four debt categories ===== -->

  <!-- Category 1: Freshness Debt -->
  <rect x="60" y="220" width="190" height="120" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="155" y="245" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Freshness Debt</text>
  <line x1="80" y1="254" x2="230" y2="254" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="155" y="272" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Training data is stale</text>
  <text x="155" y="288" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">World moved on</text>
  <text x="155" y="312" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Compare train/serve</text>
  <text x="155" y="326" font-size="8" font-weight="400" fill="#999" text-anchor="middle">distributions (PSI)</text>

  <!-- Category 2: Quality Debt -->
  <rect x="270" y="220" width="190" height="120" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="365" y="245" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Quality Debt</text>
  <line x1="290" y1="254" x2="440" y2="254" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="365" y="272" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Labels inconsistent</text>
  <text x="365" y="288" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Noise accumulates</text>
  <text x="365" y="312" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Monitor inter-annotator</text>
  <text x="365" y="326" font-size="8" font-weight="400" fill="#999" text-anchor="middle">agreement (kappa)</text>

  <!-- Category 3: Schema Debt -->
  <rect x="480" y="220" width="190" height="120" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="575" y="245" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Schema Debt</text>
  <line x1="500" y1="254" x2="650" y2="254" stroke="#c44" stroke-width="0.8"/>
  <text x="575" y="272" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Undocumented field</text>
  <text x="575" y="288" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">changes break pipeline</text>
  <text x="575" y="312" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Contract testing at</text>
  <text x="575" y="326" font-size="8" font-weight="400" fill="#999" text-anchor="middle">every interface</text>

  <!-- Category 4: Documentation Debt -->
  <rect x="690" y="220" width="190" height="120" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="785" y="245" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Documentation Debt</text>
  <line x1="710" y1="254" x2="860" y2="254" stroke="#bbb" stroke-width="0.8"/>
  <text x="785" y="272" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Nobody knows what</text>
  <text x="785" y="288" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">the data means</text>
  <text x="785" y="312" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Metadata catalog</text>
  <text x="785" y="326" font-size="8" font-weight="400" fill="#999" text-anchor="middle">audits</text>

  <!-- ===== Stats callout ===== -->
  <rect x="200" y="370" width="500" height="36" rx="12" fill="#a31f34" stroke="none"/>
  <text x="450" y="393" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">65-95% of ML failures trace to data, not models</text>

  <!-- ===== Bottom comparison ===== -->
  <rect x="120" y="425" width="660" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="448" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Unlike code debt (slower development), data debt causes lower accuracy even when code is perfect</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="485" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Data debt compounds silently — allocate sustained engineering capacity for remediation</text>
</svg>
