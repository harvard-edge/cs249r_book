<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">ML Storage Cost-Performance Hierarchy</text>

  <!-- ===== Pyramid tiers (top = fast/expensive, bottom = slow/cheap) ===== -->

  <!-- Tier 1: In-Memory (top, narrow) -->
  <polygon points="450,60 560,130 340,130" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">In-Memory</text>
  <text x="450" y="116" font-size="8" font-weight="400" fill="#555" text-anchor="middle">$500-1K/TB/mo</text>

  <!-- Tier 2: NVMe SSD -->
  <polygon points="340,135 560,135 620,210 280,210" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="163" font-size="10" font-weight="700" fill="#333" text-anchor="middle">NVMe SSD (Local)</text>
  <text x="450" y="180" font-size="8" font-weight="400" fill="#555" text-anchor="middle">$100-300/TB/mo | 5-7 GB/s</text>
  <text x="450" y="196" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Training data loading</text>

  <!-- Tier 3: Object Storage -->
  <polygon points="280,215 620,215 690,295 210,295" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="243" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Object Storage (S3, GCS)</text>
  <text x="450" y="260" font-size="8" font-weight="400" fill="#555" text-anchor="middle">$20-25/TB/mo | 100-500 MB/s</text>
  <text x="450" y="276" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Data lake, model artifacts</text>

  <!-- Tier 4: Archival (bottom, wide) -->
  <polygon points="210,300 690,300 750,380 150,380" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="328" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Archival Storage (Glacier)</text>
  <text x="450" y="345" font-size="8" font-weight="400" fill="#555" text-anchor="middle">$1-4/TB/mo | 10-50 MB/s</text>
  <text x="450" y="361" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Compliance, historical retention</text>

  <!-- ===== Speed/Cost labels on sides ===== -->
  <text x="130" y="80" font-size="9" font-weight="700" fill="#4a90c4">FAST</text>
  <text x="120" y="96" font-size="8" font-weight="400" fill="#4a90c4">20-50 GB/s</text>
  <text x="100" y="360" font-size="9" font-weight="700" fill="#bbb">SLOW</text>
  <text x="90" y="376" font-size="8" font-weight="400" fill="#bbb">10-50 MB/s</text>

  <line x1="140" y1="105" x2="115" y2="345" stroke="#999" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <text x="780" y="80" font-size="9" font-weight="700" fill="#c44">EXPENSIVE</text>
  <text x="780" y="360" font-size="9" font-weight="700" fill="#3d9e5a">CHEAP</text>
  <line x1="790" y1="105" x2="790" y2="345" stroke="#999" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- ===== KWS Case Study box ===== -->
  <rect x="100" y="400" width="700" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="418" font-size="10" font-weight="700" fill="#333" text-anchor="middle">KWS Case Study: 736 GB dataset</text>
  <text x="300" y="438" font-size="9" font-weight="400" fill="#555" text-anchor="middle">On S3: $17/mo | loads in 2 hours</text>
  <text x="600" y="438" font-size="9" font-weight="400" fill="#555" text-anchor="middle">On NVMe: $74-221/mo | loads in 2.5 min</text>

  <!-- Speed gap pill -->
  <rect x="370" y="443" width="160" height="20" rx="10" fill="#a31f34" stroke="none"/>
  <text x="450" y="457" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">50x speed gap = daily vs weekly</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="485" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">The throughput gap is the binding constraint on iteration velocity</text>

  <!-- ===== Arrow marker ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>
</svg>
