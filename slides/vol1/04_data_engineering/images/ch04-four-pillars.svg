<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Four Pillars of Data Engineering</text>

  <!-- ===== Roof / Entablature ===== -->
  <rect x="60" y="55" width="780" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Production ML Data Pipeline</text>

  <!-- ===== Pillar 1: Quality (Green) ===== -->
  <rect x="80" y="100" width="170" height="300" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="165" y="130" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Quality</text>
  <text x="165" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="middle">"Is data correct?"</text>
  <line x1="105" y1="168" x2="225" y2="168" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="165" y="188" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Schema validation</text>
  <text x="165" y="206" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">PSI / KL drift detection</text>
  <text x="165" y="224" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Completeness checks</text>
  <text x="165" y="242" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Label accuracy audits</text>
  <text x="165" y="274" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Prevents: cascading</text>
  <text x="165" y="288" font-size="8" font-weight="400" fill="#999" text-anchor="middle">errors through pipeline</text>

  <!-- ===== Pillar 2: Reliability (Blue) ===== -->
  <rect x="270" y="100" width="170" height="300" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="355" y="130" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">Reliability</text>
  <text x="355" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="middle">"Does it keep working?"</text>
  <line x1="295" y1="168" x2="415" y2="168" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="355" y="188" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Retry + backoff logic</text>
  <text x="355" y="206" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Circuit breakers</text>
  <text x="355" y="224" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Dead letter queues</text>
  <text x="355" y="242" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Graceful degradation</text>
  <text x="355" y="274" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Prevents: pipeline</text>
  <text x="355" y="288" font-size="8" font-weight="400" fill="#999" text-anchor="middle">outages and data loss</text>

  <!-- ===== Pillar 3: Scalability (Orange) ===== -->
  <rect x="460" y="100" width="170" height="300" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="545" y="130" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Scalability</text>
  <text x="545" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="middle">"Handle 10x more data?"</text>
  <line x1="485" y1="168" x2="605" y2="168" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="545" y="188" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Batch vs. stream choice</text>
  <text x="545" y="206" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Distributed processing</text>
  <text x="545" y="224" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Horizontal partitioning</text>
  <text x="545" y="242" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Parallel ingestion</text>
  <text x="545" y="274" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Prevents: throughput</text>
  <text x="545" y="288" font-size="8" font-weight="400" fill="#999" text-anchor="middle">collapse at 10x growth</text>

  <!-- ===== Pillar 4: Governance (Red) ===== -->
  <rect x="650" y="100" width="170" height="300" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="735" y="130" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Governance</text>
  <text x="735" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="middle">"Legal, ethical, tracked?"</text>
  <line x1="675" y1="168" x2="795" y2="168" stroke="#c44" stroke-width="0.8"/>
  <text x="735" y="188" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Data versioning</text>
  <text x="735" y="206" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Lineage tracking</text>
  <text x="735" y="224" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Access control</text>
  <text x="735" y="242" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Compliance auditing</text>
  <text x="735" y="274" font-size="8" font-weight="400" fill="#999" text-anchor="middle">Prevents: regulatory</text>
  <text x="735" y="288" font-size="8" font-weight="400" fill="#999" text-anchor="middle">violations and data loss</text>

  <!-- ===== Tension arrows between pillars ===== -->
  <path d="M250,340 Q265,360 270,340" stroke="#a31f34" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
  <text x="260" y="365" font-size="7" fill="#a31f34" text-anchor="middle" transform="rotate(-90,260,365)">tension</text>

  <path d="M440,340 Q455,360 460,340" stroke="#a31f34" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>

  <path d="M630,340 Q645,360 650,340" stroke="#a31f34" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>

  <!-- ===== Foundation bar ===== -->
  <rect x="60" y="410" width="780" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="432" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Every decision is evaluated against all four pillars — strengthening one creates tension with another</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Stricter validation = slower throughput | Redundancy = more data copies to govern</text>
</svg>
