<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Dataset Compilation: Data Engineering as Compiler Design</text>

  <!-- ===== Dashed vertical divider ===== -->
  <line x1="450" y1="50" x2="450" y2="470" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Left: Traditional SW Compilation ===== -->
  <text x="225" y="62" font-size="11" font-weight="700" fill="#555" text-anchor="middle">Traditional Software</text>

  <!-- Source Code box -->
  <rect x="145" y="78" width="160" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Source Code (C++, Python)</text>

  <!-- Arrow down -->
  <line x1="225" y1="114" x2="225" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Compiler stages -->
  <rect x="145" y="140" width="160" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="159" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Dead Code Elimination</text>

  <line x1="225" y1="170" x2="225" y2="186" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <rect x="145" y="188" width="160" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="207" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Loop Unrolling</text>

  <line x1="225" y1="218" x2="225" y2="234" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <rect x="145" y="236" width="160" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="255" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Common Subexpr. Elim.</text>

  <line x1="225" y1="266" x2="225" y2="282" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <rect x="145" y="284" width="160" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="303" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Type Checking</text>

  <line x1="225" y1="314" x2="225" y2="338" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Binary box -->
  <rect x="145" y="340" width="160" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="362" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Optimized Binary</text>

  <!-- ===== Right: ML Dataset Compilation ===== -->
  <text x="675" y="62" font-size="11" font-weight="700" fill="#555" text-anchor="middle">ML Data Pipeline</text>

  <!-- Raw Data box -->
  <rect x="595" y="78" width="160" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="675" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Raw Data (Noisy, Messy)</text>

  <!-- Arrow down -->
  <line x1="675" y1="114" x2="675" y2="138" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pipeline stages -->
  <rect x="595" y="140" width="160" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="159" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Filtering (Corrupted Data)</text>

  <line x1="675" y1="170" x2="675" y2="186" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <rect x="595" y="188" width="160" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="207" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Augmentation (Diversity)</text>

  <line x1="675" y1="218" x2="675" y2="234" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <rect x="595" y="236" width="160" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="255" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Deduplication (Bias)</text>

  <line x1="675" y1="266" x2="675" y2="282" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <rect x="595" y="284" width="160" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="303" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Schema Validation</text>

  <line x1="675" y1="314" x2="675" y2="338" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Training Set box -->
  <rect x="595" y="340" width="160" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="675" y="362" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Optimized Training Set</text>

  <!-- ===== Mapping connectors (dashed orange) ===== -->
  <line x1="305" y1="155" x2="595" y2="155" stroke="#c87b2a" stroke-dasharray="6,3" stroke-width="1.2"/>
  <text x="450" y="150" font-size="8" font-weight="400" fill="#c87b2a" text-anchor="middle">analogous</text>

  <line x1="305" y1="203" x2="595" y2="203" stroke="#c87b2a" stroke-dasharray="6,3" stroke-width="1.2"/>
  <text x="450" y="198" font-size="8" font-weight="400" fill="#c87b2a" text-anchor="middle">analogous</text>

  <line x1="305" y1="251" x2="595" y2="251" stroke="#c87b2a" stroke-dasharray="6,3" stroke-width="1.2"/>
  <text x="450" y="246" font-size="8" font-weight="400" fill="#c87b2a" text-anchor="middle">analogous</text>

  <line x1="305" y1="299" x2="595" y2="299" stroke="#c87b2a" stroke-dasharray="6,3" stroke-width="1.2"/>
  <text x="450" y="294" font-size="8" font-weight="400" fill="#c87b2a" text-anchor="middle">analogous</text>

  <!-- ===== Key insight box ===== -->
  <rect x="200" y="400" width="500" height="42" rx="12" fill="#a31f34" stroke="none"/>
  <text x="450" y="418" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Datasets must be versioned, tested, and debugged</text>
  <text x="450" y="433" font-size="9" font-weight="400" fill="#fff" text-anchor="middle">Deleting a row of training data = deleting a line of code</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Changing a training row is equivalent to changing a line of code</text>

  <!-- ===== Arrow markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
</svg>
