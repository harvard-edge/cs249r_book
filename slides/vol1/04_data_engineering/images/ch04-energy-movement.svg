<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Energy-Movement Invariant: Moving Data Costs 100-1000x More Than Computing</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Staircase blocks (log scale visual) ===== -->

  <!-- Level 1: FP32 MAC (tiny) -->
  <rect x="80" y="370" width="160" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="160" y="390" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FP32 MAC</text>
  <text x="160" y="405" font-size="9" font-weight="400" fill="#555" text-anchor="middle">3.7 pJ (1x)</text>

  <!-- Level 2: DRAM Access -->
  <rect x="270" y="290" width="160" height="130" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="350" y="340" font-size="10" font-weight="700" fill="#333" text-anchor="middle">DRAM Access</text>
  <text x="350" y="358" font-size="9" font-weight="400" fill="#555" text-anchor="middle">640 pJ (~170x)</text>
  <text x="350" y="375" font-size="8" font-weight="400" fill="#999" text-anchor="middle">"a football field"</text>

  <!-- Level 3: Local SSD -->
  <rect x="460" y="185" width="160" height="235" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="540" y="280" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Local SSD</text>
  <text x="540" y="298" font-size="9" font-weight="400" fill="#555" text-anchor="middle">~10,000 pJ (~2,700x)</text>

  <!-- Level 4: Network Transfer -->
  <rect x="650" y="60" width="170" height="360" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="735" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Network</text>
  <text x="735" y="238" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Transfer</text>
  <text x="735" y="258" font-size="9" font-weight="400" fill="#555" text-anchor="middle">~50,000 pJ</text>
  <text x="735" y="275" font-size="9" font-weight="400" fill="#555" text-anchor="middle">(~13,500x)</text>

  <!-- ===== Rising arrow along steps ===== -->
  <path d="M160,370 L160,360 L350,360 L350,290 L350,280 L540,280 L540,185 L540,170 L735,170 L735,60"
        stroke="#a31f34" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Key insight box ===== -->
  <rect x="80" y="440" width="500" height="34" rx="4" fill="#a31f34" stroke="none"/>
  <text x="330" y="461" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Deduplication eliminates the most energy-expensive stages of the pipeline</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Source: Horowitz, ISSCC 2014 — energy per operation at 45nm process</text>
</svg>
