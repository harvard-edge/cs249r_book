<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Curriculum Learning: Easy to Hard</text>

  <!-- ===== LEFT PANEL: Epoch-Difficulty Heatmap (60%) ===== -->
  <text x="260" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Training Schedule</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="490" y2="380" stroke="#555" stroke-width="1.2"/>
  <line x1="80" y1="380" x2="80" y2="80" stroke="#555" stroke-width="1.2"/>
  <text x="285" y="410" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Training Epochs</text>
  <text x="35" y="230" font-size="9" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,35,230)">Sample Difficulty</text>

  <!-- Epoch labels -->
  <text x="150" y="398" font-size="8" fill="#555" text-anchor="middle">1-10</text>
  <text x="280" y="398" font-size="8" fill="#555" text-anchor="middle">10-50</text>
  <text x="420" y="398" font-size="8" fill="#555" text-anchor="middle">50+</text>

  <!-- Difficulty bands (stacked, bottom=Easy, top=Hard) -->
  <!-- Easy band (blue) - full width at start, fades -->
  <rect x="82" y="280" width="130" height="98" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <rect x="212" y="280" width="140" height="98" fill="#cfe2f3" opacity="0.3" stroke="#4a90c4" stroke-width="0.5"/>
  <rect x="352" y="280" width="136" height="98" fill="#cfe2f3" opacity="0.1"/>

  <!-- Medium band (orange) -->
  <rect x="82" y="180" width="130" height="98" fill="#fdebd0" opacity="0.3"/>
  <rect x="212" y="180" width="140" height="98" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="352" y="180" width="136" height="98" fill="#fdebd0" opacity="0.3"/>

  <!-- Hard band (red) -->
  <rect x="82" y="82" width="130" height="96" fill="#f9d6d5" opacity="0.1"/>
  <rect x="212" y="82" width="140" height="96" fill="#f9d6d5" opacity="0.3"/>
  <rect x="352" y="82" width="136" height="96" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>

  <!-- Band labels -->
  <text x="150" y="335" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Easy</text>
  <text x="150" y="353" font-size="8" fill="#555" text-anchor="middle">Basic patterns</text>
  <text x="280" y="235" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Medium</text>
  <text x="280" y="253" font-size="8" fill="#555" text-anchor="middle">Refine boundaries</text>
  <text x="420" y="135" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Hard</text>
  <text x="420" y="153" font-size="8" fill="#555" text-anchor="middle">Edge cases</text>

  <!-- Focus indicator (diagonal arrow showing progression) -->
  <line x1="150" y1="300" x2="420" y2="120" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="420,120 410,130 418,130" fill="#a31f34"/>

  <!-- ===== RIGHT PANEL: Convergence Comparison (40%) ===== -->
  <text x="700" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Convergence Comparison</text>

  <!-- Axes -->
  <line x1="550" y1="380" x2="850" y2="380" stroke="#555" stroke-width="1.2"/>
  <line x1="550" y1="380" x2="550" y2="80" stroke="#555" stroke-width="1.2"/>
  <text x="700" y="410" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Epochs</text>
  <text x="525" y="230" font-size="9" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,525,230)">Loss</text>

  <!-- Target accuracy line -->
  <line x1="550" y1="160" x2="850" y2="160" stroke="#555" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="860" y="163" font-size="8" fill="#555">Target</text>

  <!-- Curriculum curve (green, faster) -->
  <path d="M560,360 C600,340 640,280 680,220 C720,180 740,168 780,163 L840,160"
        fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <text x="770" y="148" font-size="9" font-weight="700" fill="#3d9e5a">Curriculum</text>

  <!-- Random curve (red dashed, slower) -->
  <path d="M560,360 C610,350 660,320 700,280 C740,240 770,210 800,185 L840,170"
        fill="none" stroke="#c44" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="845" y="178" font-size="9" font-weight="700" fill="#c44">Random</text>

  <!-- Speed annotation -->
  <rect x="600" y="100" width="200" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="700" y="119" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Reaches target 20-30% faster</text>

  <!-- Vertical dashed line showing where curriculum hits target -->
  <line x1="740" y1="160" x2="740" y2="380" stroke="#3d9e5a" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Divider -->
  <line x1="520" y1="50" x2="520" y2="430" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Difficulty signals note -->
  <rect x="80" y="430" width="400" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="280" y="449" font-size="8.5" fill="#555" text-anchor="middle">Difficulty signals: loss value, prediction confidence, forgetting events</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Present examples in increasing difficulty -- mirrors human education</text>
</svg>
