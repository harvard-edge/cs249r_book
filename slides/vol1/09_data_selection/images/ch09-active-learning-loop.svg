<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Active Learning: Human-in-the-Loop Selection</text>

  <!-- ===== Circular Flow (4 nodes) ===== -->

  <!-- Node 1: Train Model (top) -->
  <rect x="310" y="65" width="170" height="55" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="395" y="88" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Train Model</text>
  <text x="395" y="105" font-size="8.5" fill="#555" text-anchor="middle">Update on labeled data</text>

  <!-- Node 2: Query Strategy (right) -->
  <rect x="570" y="195" width="170" height="55" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="655" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Query Strategy</text>
  <text x="655" y="235" font-size="8.5" fill="#555" text-anchor="middle">Uncertainty | Diversity</text>

  <!-- Node 3: Human Oracle (bottom) -->
  <rect x="310" y="325" width="170" height="55" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="395" y="348" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Human Oracle</text>
  <text x="395" y="365" font-size="8.5" fill="#555" text-anchor="middle">Label selected samples</text>

  <!-- Node 4: Training Set (left) -->
  <rect x="110" y="195" width="170" height="55" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="195" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Training Set</text>
  <text x="195" y="235" font-size="8.5" fill="#555" text-anchor="middle">Growing labeled pool</text>

  <!-- Arrows connecting nodes clockwise -->
  <!-- Train -> Query (top-right) -->
  <line x1="480" y1="105" x2="570" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Query -> Oracle (right-bottom) -->
  <line x1="655" y1="255" x2="480" y2="330" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Oracle -> Training Set (bottom-left) -->
  <line x1="310" y1="360" x2="195" y2="255" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Training Set -> Train (left-top) -->
  <line x1="195" y1="195" x2="310" y2="110" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Cycle count -->
  <text x="400" y="220" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Repeat</text>
  <text x="400" y="235" font-size="9" font-weight="700" fill="#555" text-anchor="middle">5-20 rounds</text>

  <!-- Unlabeled Pool (large box, right side) -->
  <rect x="690" y="65" width="180" height="160" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="780" y="90" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Unlabeled Pool</text>
  <text x="780" y="108" font-size="9" fill="#555" text-anchor="middle">50,000 images</text>
  <!-- Data dots -->
  <circle cx="720" cy="140" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="740" cy="135" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="760" cy="142" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="780" cy="130" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="800" cy="138" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="820" cy="145" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="730" cy="160" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="750" cy="170" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="770" cy="165" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="790" cy="175" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="810" cy="160" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="830" cy="170" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="720" cy="185" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="750" cy="195" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="780" cy="200" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <circle cx="810" cy="190" r="4" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>

  <!-- Arrow from pool to query -->
  <line x1="690" y1="220" x2="740" y2="218" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Cost callout -->
  <rect x="560" y="310" width="200" height="32" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="660" y="331" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">$5-100+ per label</text>

  <!-- Savings annotation -->
  <rect x="560" y="360" width="200" height="32" rx="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="381" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">10-100x fewer labels needed</text>

  <!-- Example -->
  <rect x="30" y="330" width="240" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="150" y="350" font-size="8.5" fill="#555" text-anchor="middle">Medical imaging example:</text>
  <text x="150" y="368" font-size="8.5" fill="#555" text-anchor="middle">500 labels x $50 = $25K budget</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Model selects which samples to label next -- directs human effort where it matters most</text>
</svg>
