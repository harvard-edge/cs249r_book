<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Selection Inequality</text>

  <!-- Formula -->
  <rect x="220" y="48" width="460" height="36" rx="6" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="72" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">T_select + T_train(subset)  &lt;  T_train(full)</text>

  <!-- ===== ROW 1: Full Training (the baseline) ===== -->
  <text x="60" y="130" font-size="10" font-weight="700" fill="#333">Full Training:</text>

  <!-- Full training bar (red, long) -->
  <rect x="200" y="112" width="600" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="500" y="135" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">100 GPU-hours ($300)</text>

  <!-- ===== ROW 2: Selection + Subset Training (the win) ===== -->
  <text x="60" y="200" font-size="10" font-weight="700" fill="#333">With Selection:</text>

  <!-- Selection overhead bar (orange, short) -->
  <rect x="200" y="182" width="78" height="36" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="239" y="205" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">2.8 hrs</text>

  <!-- Subset training bar (green, medium) -->
  <rect x="283" y="182" width="60" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="313" y="205" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">10 hrs</text>

  <!-- Savings region -->
  <rect x="348" y="182" width="452" height="36" rx="4" fill="#d4edda" opacity="0.2" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="574" y="205" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">SAVED: 87.2 hrs ($261)</text>

  <!-- ===== ROW 3: Negative ROI case (the failure) ===== -->
  <text x="60" y="280" font-size="10" font-weight="700" fill="#c44">Negative ROI:</text>

  <!-- Selection overhead bar (red, too long) -->
  <rect x="200" y="262" width="300" height="36" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="350" y="285" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">8 hrs selection (too expensive!)</text>

  <!-- Subset training bar -->
  <rect x="505" y="262" width="60" height="36" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="535" y="285" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">10 hrs</text>

  <!-- X mark showing failure -->
  <text x="600" y="290" font-size="18" font-weight="700" fill="#c44">X</text>
  <text x="650" y="285" font-size="9" fill="#c44">Total: 18 hrs &gt; 10 hrs full training</text>

  <!-- Time axis -->
  <line x1="200" y1="330" x2="800" y2="330" stroke="#555" stroke-width="1"/>
  <text x="500" y="348" font-size="9" fill="#555" text-anchor="middle">Time (GPU-hours)</text>

  <!-- Key insight boxes -->
  <rect x="60" y="370" width="370" height="55" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="245" y="392" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Selection overhead &lt; 10% of training time</text>
  <text x="245" y="410" font-size="8.5" fill="#555" text-anchor="middle">Use proxy models: ResNet-18 for 5 epochs</text>
  <text x="245" y="425" font-size="8.5" fill="#555" text-anchor="middle">instead of ResNet-50 for 100 epochs</text>

  <rect x="460" y="370" width="390" height="55" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="655" y="392" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Amortization: one-time cost across N runs</text>
  <text x="655" y="410" font-size="8.5" fill="#555" text-anchor="middle">Selection cost paid once, savings multiply</text>
  <text x="655" y="425" font-size="8.5" fill="#555" text-anchor="middle">across hyperparameter sweeps and retraining</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">This inequality gates every technique -- if it fails, the technique has negative ROI</text>
</svg>
