<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">D-A-M Optimization Stack: Data First</text>

  <!-- ===== LEFT SIDE: Three tiers (funnel) ===== -->

  <!-- Tier 1: Data (widest, green, top) -->
  <rect x="60" y="70" width="420" height="100" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="270" y="95" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">D: Data Selection</text>
  <text x="270" y="115" font-size="9" fill="#555" text-anchor="middle">Highest leverage -- reduces total work before it begins</text>
  <text x="120" y="140" font-size="8.5" fill="#333">Deduplication</text>
  <text x="220" y="140" font-size="8.5" fill="#333">Coresets</text>
  <text x="310" y="140" font-size="8.5" fill="#333">Curriculum</text>
  <text x="400" y="140" font-size="8.5" fill="#333">Active Learning</text>
  <!-- Savings badge -->
  <rect x="400" y="80" width="55" height="24" rx="12" fill="#3d9e5a" stroke="none"/>
  <text x="427" y="96" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2x</text>

  <!-- Arrow down -->
  <line x1="270" y1="175" x2="270" y2="195" stroke="#555" stroke-width="1.5"/>
  <polygon points="270,200 264,190 276,190" fill="#555"/>

  <!-- Tier 2: Algorithm (medium, orange) -->
  <rect x="110" y="205" width="320" height="100" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="270" y="230" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">A: Algorithm (Compression)</text>
  <text x="270" y="250" font-size="9" fill="#555" text-anchor="middle">Reduce operations per sample</text>
  <text x="150" y="275" font-size="8.5" fill="#333">Pruning</text>
  <text x="240" y="275" font-size="8.5" fill="#333">Quantization</text>
  <text x="345" y="275" font-size="8.5" fill="#333">Distillation</text>
  <!-- Savings badge -->
  <rect x="360" y="215" width="55" height="24" rx="12" fill="#c87b2a" stroke="none"/>
  <text x="387" y="231" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2x</text>

  <!-- Arrow down -->
  <line x1="270" y1="310" x2="270" y2="330" stroke="#555" stroke-width="1.5"/>
  <polygon points="270,335 264,325 276,325" fill="#555"/>

  <!-- Tier 3: Machine (narrowest, blue) -->
  <rect x="160" y="340" width="220" height="100" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="270" y="365" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">M: Machine (Hardware)</text>
  <text x="270" y="385" font-size="9" fill="#555" text-anchor="middle">Increase throughput per operation</text>
  <text x="200" y="410" font-size="8.5" fill="#333">Mixed Precision</text>
  <text x="310" y="410" font-size="8.5" fill="#333">Tensor Cores</text>
  <!-- Savings badge -->
  <rect x="310" y="350" width="55" height="24" rx="12" fill="#4a90c4" stroke="none"/>
  <text x="337" y="366" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2x</text>

  <!-- ===== RIGHT SIDE: Multiplicative calculation ===== -->
  <line x1="520" y1="50" x2="520" y2="460" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="710" y="80" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Multiplicative Savings</text>

  <!-- Calculation steps -->
  <rect x="570" y="110" width="280" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="710" y="135" font-size="10" fill="#333" text-anchor="middle">Data Selection: 2x fewer samples</text>

  <text x="710" y="165" font-size="14" fill="#555" text-anchor="middle">x</text>

  <rect x="570" y="180" width="280" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="710" y="205" font-size="10" fill="#333" text-anchor="middle">Model Compression: 2x fewer ops</text>

  <text x="710" y="235" font-size="14" fill="#555" text-anchor="middle">x</text>

  <rect x="570" y="250" width="280" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="710" y="275" font-size="10" fill="#333" text-anchor="middle">Hardware Acceleration: 2x throughput</text>

  <!-- Equals line -->
  <line x1="590" y1="310" x2="830" y2="310" stroke="#333" stroke-width="2"/>

  <!-- Result -->
  <rect x="590" y="325" width="240" height="55" rx="6" fill="#fff" stroke="#a31f34" stroke-width="2"/>
  <text x="710" y="350" font-size="14" font-weight="700" fill="#a31f34" text-anchor="middle">= 8x total (not 6x)</text>
  <text x="710" y="370" font-size="9" fill="#555" text-anchor="middle">Savings compound multiplicatively</text>

  <!-- Iron Law mapping -->
  <rect x="560" y="400" width="300" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="710" y="420" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Iron Law Connection</text>
  <text x="710" y="438" font-size="8.5" fill="#555" text-anchor="middle">Data reduces N passes through T = D/BW + O/(R*eta) + L</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">D-A-M ordering: always optimize the data first, then the algorithm, then the hardware</text>
</svg>
