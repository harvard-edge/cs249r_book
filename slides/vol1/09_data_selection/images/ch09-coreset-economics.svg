<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Coreset Selection: The Economics of Smaller Datasets</text>

  <!-- ===== Column 1: Full Dataset ===== -->
  <rect x="40" y="55" width="220" height="250" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="150" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Full Dataset (100%)</text>

  <!-- Data stack with color coding -->
  <rect x="65" y="100" width="170" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="150" y="113" font-size="7.5" fill="#333" text-anchor="middle">High-value (near boundary)</text>
  <rect x="65" y="122" width="170" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="150" y="135" font-size="7.5" fill="#333" text-anchor="middle">Informative samples</text>
  <rect x="65" y="144" width="170" height="18" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="150" y="157" font-size="7.5" fill="#555" text-anchor="middle">Redundant (easy)</text>
  <rect x="65" y="166" width="170" height="18" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="150" y="179" font-size="7.5" fill="#555" text-anchor="middle">Redundant (easy)</text>
  <rect x="65" y="188" width="170" height="18" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="150" y="201" font-size="7.5" fill="#555" text-anchor="middle">Redundant (easy)</text>
  <rect x="65" y="210" width="170" height="18" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="150" y="223" font-size="7.5" fill="#555" text-anchor="middle">Noisy / mislabeled</text>
  <rect x="65" y="232" width="170" height="18" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="150" y="245" font-size="7.5" fill="#555" text-anchor="middle">Redundant (easy)</text>
  <rect x="65" y="254" width="170" height="18" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="150" y="267" font-size="7.5" fill="#555" text-anchor="middle">Redundant (easy)</text>

  <!-- Stats -->
  <text x="150" y="295" font-size="9" fill="#555" text-anchor="middle">1M samples, 100 GPU-hrs, $300</text>

  <!-- ===== Arrow to Selection ===== -->
  <line x1="265" y1="180" x2="310" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Column 2: Selection Process ===== -->
  <rect x="315" y="55" width="240" height="250" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="435" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Coreset Selection</text>

  <text x="435" y="110" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Scoring Methods</text>
  <line x1="340" y1="118" x2="530" y2="118" stroke="#c87b2a" stroke-width="0.8"/>

  <!-- Methods list -->
  <text x="345" y="140" font-size="8.5" fill="#333">EL2N: Error L2 Norm</text>
  <text x="345" y="158" font-size="8.5" fill="#333">GraNd: Gradient Normed</text>
  <text x="345" y="176" font-size="8.5" fill="#333">Forgetting events</text>
  <text x="345" y="194" font-size="8.5" fill="#333">k-Center (geometry)</text>

  <line x1="340" y1="210" x2="530" y2="210" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="435" y="232" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Process</text>
  <text x="345" y="252" font-size="8.5" fill="#555">1. Score each sample</text>
  <text x="345" y="268" font-size="8.5" fill="#555">2. Rank by importance</text>
  <text x="345" y="284" font-size="8.5" fill="#555">3. Keep top 10-30%</text>

  <!-- Scoring time -->
  <text x="435" y="300" font-size="9" fill="#555" text-anchor="middle">Scoring: 2.8 hours</text>

  <!-- ===== Arrow to Coreset ===== -->
  <line x1="560" y1="180" x2="605" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Column 3: Coreset ===== -->
  <rect x="610" y="55" width="250" height="250" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="735" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Coreset (10-30%)</text>

  <!-- Only high-value data -->
  <rect x="640" y="100" width="190" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="735" y="113" font-size="7.5" fill="#333" text-anchor="middle">High-value (near boundary)</text>
  <rect x="640" y="122" width="190" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="735" y="135" font-size="7.5" fill="#333" text-anchor="middle">Informative samples</text>
  <rect x="640" y="144" width="190" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="735" y="157" font-size="7.5" fill="#333" text-anchor="middle">Diverse representatives</text>

  <!-- Stats -->
  <text x="735" y="195" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">100-300K samples</text>
  <text x="735" y="213" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">10-30 GPU-hrs, $30-90</text>

  <!-- Accuracy retained -->
  <rect x="650" y="235" width="170" height="28" rx="12" fill="#fff" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="735" y="254" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">~95% accuracy retained</text>
  <text x="735" y="295" font-size="8" fill="#555" text-anchor="middle">(CIFAR-10 at 10% coreset)</text>

  <!-- ===== Bottom ROI Box ===== -->
  <rect x="150" y="340" width="600" height="65" rx="6" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="362" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">ROI Analysis</text>
  <text x="280" y="385" font-size="9" fill="#555" text-anchor="middle">Scoring: 2.8 hrs</text>
  <line x1="360" y1="372" x2="360" y2="398" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="385" font-size="9" fill="#555" text-anchor="middle">Savings: 87.2 hrs</text>
  <line x1="540" y1="372" x2="540" y2="398" stroke="#bbb" stroke-width="0.8"/>
  <text x="630" y="385" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">ROI: 31x</text>
  <text x="450" y="400" font-size="8" fill="#555" text-anchor="middle">Training-dynamics methods (EL2N, GraNd) achieve 1.8x higher ICR than random</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Score once, reuse across hyperparameter sweeps and retraining runs</text>
</svg>
