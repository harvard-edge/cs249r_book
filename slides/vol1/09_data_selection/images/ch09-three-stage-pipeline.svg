<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Three-Stage Data Selection Pipeline</text>

  <!-- Raw Dataset -->
  <rect x="20" y="100" width="110" height="200" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="75" y="130" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Raw</text>
  <text x="75" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Dataset</text>
  <text x="75" y="175" font-size="16" fill="#bbb" text-anchor="middle">100%</text>
  <!-- Stacked data icons -->
  <rect x="40" y="195" width="70" height="10" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="40" y="210" width="70" height="10" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="40" y="225" width="70" height="10" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="40" y="240" width="70" height="10" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="40" y="255" width="70" height="10" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <rect x="40" y="270" width="70" height="10" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>

  <!-- Arrow 1 -->
  <line x1="135" y1="200" x2="170" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 1: Static Pruning -->
  <rect x="175" y="85" width="190" height="235" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="270" y="110" font-size="11" font-weight="700" fill="#333" text-anchor="middle">1. Static Pruning</text>
  <text x="270" y="128" font-size="9" fill="#555" text-anchor="middle">Remove before training</text>
  <line x1="195" y1="140" x2="345" y2="140" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="195" y="162" font-size="8.5" fill="#333">  Coresets</text>
  <text x="195" y="180" font-size="8.5" fill="#333">  Deduplication</text>
  <text x="195" y="198" font-size="8.5" fill="#333">  Quality filtering</text>
  <!-- Volume indicator -->
  <rect x="205" y="220" width="130" height="28" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="270" y="239" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">30-60% retained</text>
  <text x="270" y="305" font-size="8" fill="#555" text-anchor="middle">Reduces WHAT</text>

  <!-- Arrow 2 -->
  <line x1="370" y1="200" x2="405" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Dynamic Selection -->
  <rect x="410" y="85" width="190" height="235" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="505" y="110" font-size="11" font-weight="700" fill="#333" text-anchor="middle">2. Dynamic Selection</text>
  <text x="505" y="128" font-size="9" fill="#555" text-anchor="middle">Select during training</text>
  <line x1="430" y1="140" x2="580" y2="140" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="430" y="162" font-size="8.5" fill="#333">  Curriculum learning</text>
  <text x="430" y="180" font-size="8.5" fill="#333">  Active learning</text>
  <text x="430" y="198" font-size="8.5" fill="#333">  Online batch selection</text>
  <!-- Volume indicator -->
  <rect x="440" y="220" width="130" height="28" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="505" y="239" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Focused sampling</text>
  <text x="505" y="305" font-size="8" fill="#555" text-anchor="middle">Focuses HOW</text>

  <!-- Arrow 3 -->
  <line x1="605" y1="200" x2="640" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Synthesis -->
  <rect x="645" y="85" width="190" height="235" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="740" y="110" font-size="11" font-weight="700" fill="#333" text-anchor="middle">3. Synthesis</text>
  <text x="740" y="128" font-size="9" fill="#555" text-anchor="middle">Create on demand</text>
  <line x1="665" y1="140" x2="815" y2="140" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="665" y="162" font-size="8.5" fill="#333">  Augmentation</text>
  <text x="665" y="180" font-size="8.5" fill="#333">  Distillation</text>
  <text x="665" y="198" font-size="8.5" fill="#333">  Generative synthesis</text>
  <!-- Volume indicator -->
  <rect x="675" y="220" width="130" height="28" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="740" y="239" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Enriched dataset</text>
  <text x="740" y="305" font-size="8" fill="#555" text-anchor="middle">Expands WHAT</text>

  <!-- Training output arrow -->
  <rect x="860" y="170" width="4" height="60" rx="2" fill="#a31f34"/>

  <!-- Bottom summary bar -->
  <rect x="50" y="370" width="800" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="393" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Pruning reduces WHAT</text>
  <line x1="380" y1="378" x2="380" y2="412" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="490" y="393" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Selection focuses HOW</text>
  <line x1="610" y1="378" x2="610" y2="412" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="730" y="393" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Synthesis expands WHAT</text>
  <text x="450" y="412" font-size="8.5" fill="#555" text-anchor="middle">Stages are complementary -- apply in order for maximum savings</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each stage increases the information density of data reaching the model</text>
</svg>
