<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Information-Compute Ratio (ICR)</text>

  <!-- Formula box top-right -->
  <rect x="640" y="42" width="230" height="32" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="755" y="63" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">ICR = Delta Performance / Delta FLOPs</text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="820" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="420" x2="100" y2="60" stroke="#555" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="460" y="460" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training Compute (FLOPs)</text>
  <text x="40" y="240" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,40,240)">Model Performance</text>

  <!-- Axis ticks -->
  <line x1="100" y1="420" x2="100" y2="425" stroke="#555" stroke-width="1"/>
  <line x1="820" y1="420" x2="820" y2="425" stroke="#555" stroke-width="1"/>

  <!-- Shaded regions -->
  <!-- High ICR (green) -->
  <rect x="100" y="60" width="200" height="360" fill="#d4edda" opacity="0.35"/>
  <!-- Knee region (blue) -->
  <rect x="300" y="60" width="150" height="360" fill="#cfe2f3" opacity="0.35"/>
  <!-- Data Tax (red) -->
  <rect x="450" y="60" width="370" height="360" fill="#f9d6d5" opacity="0.35"/>

  <!-- Region labels -->
  <text x="200" y="85" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">High ICR</text>
  <text x="375" y="85" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Knee</text>
  <text x="635" y="85" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Data Tax</text>

  <!-- Performance curve (S-curve flattening) -->
  <path d="M110,400 C160,390 200,340 250,260 C280,210 310,170 375,140 C440,115 520,105 600,100 C680,97 750,95 810,94"
        fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Knee point -->
  <circle cx="375" cy="140" r="7" fill="#a31f34"/>
  <text x="395" y="132" font-size="10" font-weight="700" fill="#a31f34">Optimal operating point</text>

  <!-- Steep region annotation -->
  <text x="160" y="330" font-size="9" fill="#3d9e5a" text-anchor="middle">Each sample delivers</text>
  <text x="160" y="345" font-size="9" fill="#3d9e5a" text-anchor="middle">strong gradient signal</text>

  <!-- Tail annotation -->
  <text x="650" y="140" font-size="9" fill="#c44" text-anchor="middle">Linear compute,</text>
  <text x="650" y="155" font-size="9" fill="#c44" text-anchor="middle">near-zero learning</text>

  <!-- Quantitative example -->
  <rect x="540" y="200" width="240" height="38" rx="4" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="660" y="216" font-size="8.5" fill="#555" text-anchor="middle">10x more data = 2-3 pts accuracy</text>
  <text x="660" y="231" font-size="8.5" fill="#555" text-anchor="middle">at 9x compute cost</text>

  <!-- 2x ICR callout -->
  <rect x="540" y="260" width="240" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="279" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">2x ICR = 2x hardware speedup equivalent</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Goal: operate at the knee -- maximum learning per FLOP</text>
</svg>
