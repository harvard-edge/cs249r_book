<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The ML Lifecycle: A Continuous Loop</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Hexagonal layout of 6 stages -->
  <!-- Stage 1: Problem Definition (top center) -->
  <rect x="345" y="50" width="160" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="425" y="73" font-size="10" font-weight="700" fill="#333" text-anchor="middle">1. Problem Definition</text>
  <text x="425" y="90" font-size="8" fill="#555" text-anchor="middle">Objectives and constraints</text>

  <!-- Stage 2: Data Collection (top right) -->
  <rect x="580" y="140" width="160" height="55" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="163" font-size="10" font-weight="700" fill="#333" text-anchor="middle">2. Data Collection</text>
  <text x="660" y="180" font-size="8" fill="#555" text-anchor="middle">Acquire and prepare data</text>

  <!-- Stage 3: Model Development (bottom right) -->
  <rect x="580" y="270" width="160" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="660" y="293" font-size="10" font-weight="700" fill="#333" text-anchor="middle">3. Model Development</text>
  <text x="660" y="310" font-size="8" fill="#555" text-anchor="middle">Train and optimize</text>

  <!-- Stage 4: Evaluation (bottom center) -->
  <rect x="345" y="360" width="160" height="55" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="425" y="383" font-size="10" font-weight="700" fill="#333" text-anchor="middle">4. Evaluation</text>
  <text x="425" y="400" font-size="8" fill="#555" text-anchor="middle">Validate and certify</text>

  <!-- Stage 5: Deployment (bottom left) -->
  <rect x="110" y="270" width="160" height="55" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="190" y="293" font-size="10" font-weight="700" fill="#333" text-anchor="middle">5. Deployment</text>
  <text x="190" y="310" font-size="8" fill="#555" text-anchor="middle">Integrate and serve</text>

  <!-- Stage 6: Monitoring (top left) -->
  <rect x="110" y="140" width="160" height="55" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="190" y="163" font-size="10" font-weight="700" fill="#333" text-anchor="middle">6. Monitoring</text>
  <text x="190" y="180" font-size="8" fill="#555" text-anchor="middle">Detect drift and maintain</text>

  <!-- Forward arrows (clockwise) -->
  <line x1="505" y1="82" x2="578" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="695" y1="195" x2="695" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="315" x2="505" y2="368" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="345" y1="385" x2="270" y2="327" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="155" y1="270" x2="155" y2="197" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bold feedback arrow: Monitoring back to Problem Definition -->
  <path d="M270,148 Q330,120 345,90"
        fill="none" stroke="#a31f34" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow-red)"/>

  <!-- Feedback label -->
  <rect x="260" y="108" width="85" height="20" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="302" y="122" font-size="8" fill="#a31f34" font-weight="700" text-anchor="middle">Drift signals</text>

  <!-- Center label -->
  <text x="425" y="225" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Feedback drives</text>
  <text x="425" y="242" font-size="11" font-weight="700" fill="#333" text-anchor="middle">continuous improvement</text>

  <!-- Misconception callout -->
  <rect x="50" y="420" width="370" height="40" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="235" y="437" font-size="9" fill="#a31f34" font-weight="700" text-anchor="middle">Misconception: The lifecycle ends at Deployment</text>
  <text x="235" y="452" font-size="8" fill="#555" text-anchor="middle">Reality: Deployment begins the feedback loop</text>

  <!-- Correct insight -->
  <rect x="470" y="420" width="370" height="40" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="655" y="437" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">Systems Insight: ML is a spiral, not a pipeline</text>
  <text x="655" y="452" font-size="8" fill="#555" text-anchor="middle">Each cycle improves data, models, and infrastructure</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Deployment is the beginning of the feedback loop, not the end</text>
</svg>
