<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Dual-Pipeline ML Development</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== DATA PIPELINE (Top, Green) ===== -->
  <text x="50" y="72" font-size="11" font-weight="700" fill="#3d9e5a">Data Pipeline</text>

  <rect x="50" y="82" width="120" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="110" y="102" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Collection</text>
  <text x="110" y="115" font-size="8" fill="#555" text-anchor="middle">Raw input stream</text>

  <rect x="190" y="82" width="120" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="250" y="102" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Ingestion</text>
  <text x="250" y="115" font-size="8" fill="#555" text-anchor="middle">Index and store</text>

  <rect x="330" y="82" width="120" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="390" y="102" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Analysis</text>
  <text x="390" y="115" font-size="8" fill="#555" text-anchor="middle">Inspect and select</text>

  <rect x="470" y="82" width="120" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="530" y="102" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Labeling</text>
  <text x="530" y="115" font-size="8" fill="#555" text-anchor="middle">Annotate data</text>

  <rect x="610" y="82" width="120" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="670" y="102" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Validation</text>
  <text x="670" y="115" font-size="8" fill="#555" text-anchor="middle">Verify quality</text>

  <rect x="750" y="82" width="120" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="810" y="102" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Preparation</text>
  <text x="810" y="115" font-size="8" fill="#555" text-anchor="middle">Split and version</text>

  <!-- Data pipeline arrows -->
  <line x1="170" y1="106" x2="188" y2="106" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="310" y1="106" x2="328" y2="106" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="106" x2="468" y2="106" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="590" y1="106" x2="608" y2="106" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="730" y1="106" x2="748" y2="106" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== MODEL PIPELINE (Bottom, Blue) ===== -->
  <text x="50" y="220" font-size="11" font-weight="700" fill="#4a90c4">Model Pipeline</text>

  <rect x="330" y="230" width="130" height="48" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="395" y="250" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="395" y="263" font-size="8" fill="#555" text-anchor="middle">Create models</text>

  <rect x="480" y="230" width="130" height="48" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="545" y="250" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Evaluation</text>
  <text x="545" y="263" font-size="8" fill="#555" text-anchor="middle">Compute KPIs</text>

  <rect x="630" y="230" width="130" height="48" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="695" y="250" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Validation</text>
  <text x="695" y="263" font-size="8" fill="#555" text-anchor="middle">Certify system</text>

  <rect x="50" y="230" width="130" height="48" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="250" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Deployment</text>
  <text x="115" y="263" font-size="8" fill="#555" text-anchor="middle">Production system</text>

  <!-- Model pipeline arrows -->
  <line x1="810" y1="132" x2="810" y2="195" stroke="#555" stroke-width="1.2"/>
  <line x1="810" y1="195" x2="395" y2="195" stroke="#555" stroke-width="1.2"/>
  <line x1="395" y1="195" x2="395" y2="228" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="600" y="190" font-size="8" fill="#555" text-anchor="middle">ML-ready datasets</text>

  <line x1="460" y1="254" x2="478" y2="254" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="610" y1="254" x2="628" y2="254" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="630" y1="254" x2="330" y2="254" stroke="none"/>
  <line x1="695" y1="278" x2="695" y2="310" stroke="#555" stroke-width="1.2"/>
  <line x1="695" y1="310" x2="115" y2="310" stroke="#555" stroke-width="1.2"/>
  <line x1="115" y1="310" x2="115" y2="280" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== FEEDBACK ARROWS (Red dashed) ===== -->
  <!-- Deployment back to Collection -->
  <path d="M115,230 L115,180 Q115,160 95,160 L70,160 Q50,160 50,140 L50,106 Q50,90 65,82"
        fill="none" stroke="#a31f34" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="30" y="155" font-size="8" fill="#a31f34" font-weight="700" text-anchor="start">Drift signals</text>

  <!-- Evaluation back to Training -->
  <path d="M480,238 Q470,220 450,218 L420,218 Q400,218 395,228"
        fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="440" y="212" font-size="8" fill="#a31f34" font-weight="700" text-anchor="middle">Retrain</text>

  <!-- Key insight -->
  <rect x="200" y="360" width="500" height="42" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="378" font-size="10" fill="#333" font-weight="700" text-anchor="middle">Traditional software has no equivalent of these backward feedback loops</text>
  <text x="450" y="393" font-size="9" fill="#555" text-anchor="middle">Deployment insights reshape data collection; monitoring drives model updates</text>

  <!-- Footnote -->
  <text x="450" y="478" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Two pipelines, one system — feedback arrows make ML systems continuous</text>
</svg>
