<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Iteration Tax: Velocity Beats Starting Advantage</text>

  <!-- Axes -->
  <line x1="100" y1="380" x2="750" y2="380" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="380" x2="100" y2="60" stroke="#555" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="90" y="375" font-size="8" fill="#555" text-anchor="end">85%</text>
  <text x="90" y="313" font-size="8" fill="#555" text-anchor="end">90%</text>
  <text x="90" y="250" font-size="8" fill="#555" text-anchor="end">95%</text>
  <text x="90" y="188" font-size="8" fill="#555" text-anchor="end">97%</text>
  <text x="90" y="100" font-size="8" fill="#555" text-anchor="end">99%</text>
  <text x="45" y="230" font-size="9" fill="#555" text-anchor="middle" transform="rotate(-90 45 230)">Accuracy (%)</text>

  <!-- Y-axis grid lines -->
  <line x1="100" y1="313" x2="750" y2="313" stroke="#eee" stroke-width="0.8"/>
  <line x1="100" y1="250" x2="750" y2="250" stroke="#eee" stroke-width="0.8"/>
  <line x1="100" y1="188" x2="750" y2="188" stroke="#eee" stroke-width="0.8"/>
  <line x1="100" y1="100" x2="750" y2="100" stroke="#eee" stroke-width="0.8"/>

  <!-- X-axis labels -->
  <text x="100" y="398" font-size="8" fill="#555" text-anchor="middle">0</text>
  <text x="225" y="398" font-size="8" fill="#555" text-anchor="middle">5</text>
  <text x="350" y="398" font-size="8" fill="#555" text-anchor="middle">10</text>
  <text x="475" y="398" font-size="8" fill="#555" text-anchor="middle">15</text>
  <text x="600" y="398" font-size="8" fill="#555" text-anchor="middle">20</text>
  <text x="725" y="398" font-size="8" fill="#555" text-anchor="middle">26</text>
  <text x="425" y="418" font-size="9" fill="#555" text-anchor="middle">Weeks</text>

  <!-- Large Model curve (blue, slow improvement) -->
  <!-- Starts at 95% (y=250), reaches ~99% (y=100) slowly -->
  <path d="M100,250 C200,245 350,225 475,200 C550,185 650,140 725,113"
        fill="none" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="730" y="106" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="start">99%</text>

  <!-- Small Model curve (green, fast improvement) -->
  <!-- Starts at 90% (y=313), overtakes, reaches ~99% (y=100) -->
  <path d="M100,313 C175,295 250,265 350,220 C425,188 525,145 625,115 C675,105 710,100 725,100"
        fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <text x="730" y="95" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="start">99%</text>

  <!-- Crossing point highlight -->
  <circle cx="430" y="210" r="8" fill="none" stroke="#a31f34" stroke-width="2"/>
  <text x="430" y="195" font-size="8.5" fill="#a31f34" font-weight="700" text-anchor="middle">Crossover</text>

  <!-- Curve labels -->
  <rect x="130" y="235" width="120" height="22" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="190" y="250" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Large Model</text>

  <rect x="130" y="298" width="120" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="190" y="313" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Small Model</text>

  <!-- Specs table -->
  <rect x="770" y="60" width="120" height="150" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="830" y="80" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Specs</text>

  <rect x="780" y="88" width="100" height="48" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="830" y="102" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Large Model</text>
  <text x="830" y="114" font-size="7.5" fill="#555" text-anchor="middle">Start: 95%</text>
  <text x="830" y="126" font-size="7.5" fill="#555" text-anchor="middle">Cycle: 1 week</text>
  <text x="830" y="131" font-size="7.5" fill="#555" text-anchor="middle">+0.15%/iter</text>

  <rect x="780" y="142" width="100" height="48" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="830" y="156" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Small Model</text>
  <text x="830" y="168" font-size="7.5" fill="#555" text-anchor="middle">Start: 90%</text>
  <text x="830" y="180" font-size="7.5" fill="#555" text-anchor="middle">Cycle: 1 hour</text>
  <text x="830" y="185" font-size="7.5" fill="#555" text-anchor="middle">+0.1%/iter</text>

  <!-- Key insight -->
  <rect x="150" y="430" width="600" height="32" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="450" font-size="10" fill="#333" font-weight="700" text-anchor="middle">10 experiments/day almost always outperforms 1/week, even starting behind</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Iteration velocity is a feature, not a convenience</text>
</svg>
