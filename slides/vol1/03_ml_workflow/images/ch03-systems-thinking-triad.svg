<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Three Structural Patterns of ML Systems Thinking</text>

  <!-- ===== Card 1: Constraint Propagation (top) ===== -->
  <rect x="295" y="50" width="310" height="105" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="75" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">1. Constraint Propagation</text>
  <text x="450" y="95" font-size="9" fill="#333" text-anchor="middle">Late discoveries cost 2^(N-1) x base effort</text>
  <text x="450" y="112" font-size="8.5" fill="#555" text-anchor="middle">Day-150 Disaster: Stage-5 discovery = 16x remediation</text>
  <text x="450" y="128" font-size="8.5" fill="#555" text-anchor="middle">Deploy constraints must shape Day-1 decisions</text>
  <rect x="390" y="136" width="120" height="16" rx="8" fill="#a31f34"/>
  <text x="450" y="148" font-size="7.5" fill="#fff" font-weight="700" text-anchor="middle">Cost = 2^(N-1)</text>

  <!-- ===== Card 2: Multi-Scale Feedback (bottom left) ===== -->
  <rect x="60" y="240" width="310" height="125" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="215" y="265" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">2. Multi-Scale Feedback</text>
  <text x="215" y="285" font-size="9" fill="#333" text-anchor="middle">Seconds to quarters, each timescale</text>
  <text x="215" y="300" font-size="9" fill="#333" text-anchor="middle">catches different failures</text>

  <text x="100" y="322" font-size="8" fill="#555">Minutes: misconfigured camera</text>
  <text x="100" y="336" font-size="8" fill="#555">Days: accuracy drift at one site</text>
  <text x="100" y="350" font-size="8" fill="#555">Months: demographic shift detected</text>

  <!-- ===== Card 3: Emergent Complexity (bottom right) ===== -->
  <rect x="430" y="240" width="310" height="125" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="585" y="265" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">3. Emergent Complexity</text>
  <text x="585" y="285" font-size="9" fill="#333" text-anchor="middle">System behavior diverges from</text>
  <text x="585" y="300" font-size="9" fill="#333" text-anchor="middle">component behavior</text>

  <text x="470" y="322" font-size="8" fill="#555">2% accuracy gain = 2x model size</text>
  <text x="470" y="336" font-size="8" fill="#555">= massive CapEx across all sites</text>
  <text x="470" y="350" font-size="8" fill="#555">Individual clinics stable, system drifts</text>

  <!-- ===== Connecting lines ===== -->
  <line x1="370" y1="155" x2="215" y2="238" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="530" y1="155" x2="585" y2="238" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="370" y1="302" x2="428" y2="302" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Center insight -->
  <rect x="280" y="185" width="340" height="40" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="203" font-size="10" fill="#333" font-weight="700" text-anchor="middle">Reactive debugging</text>
  <text x="450" y="218" font-size="10" fill="#3d9e5a" font-weight="700" text-anchor="middle">Proactive design</text>
  <!-- Arrow between them -->
  <text x="410" y="211" font-size="12" fill="#a31f34" font-weight="700">&#8594;</text>

  <!-- Bottom insight -->
  <rect x="150" y="395" width="600" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="415" font-size="10" font-weight="700" fill="#333" text-anchor="middle">These patterns transform ML development from ad-hoc experimentation</text>
  <text x="450" y="432" font-size="10" font-weight="700" fill="#333" text-anchor="middle">into systematic engineering practice</text>
  <text x="450" y="445" font-size="8" fill="#555" text-anchor="middle">Each pattern appeared repeatedly in the DR screening case study</text>

  <!-- Footnote -->
  <text x="450" y="478" font-size="9" fill="#999" font-style="italic" text-anchor="middle">These patterns transform how you debug into how you design</text>
</svg>
