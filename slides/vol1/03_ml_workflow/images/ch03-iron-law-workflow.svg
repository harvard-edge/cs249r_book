<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Iron Law of Workflow: Stages Map to Performance Terms</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Iron Law Equation (top) ===== -->
  <rect x="100" y="50" width="700" height="70" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>

  <text x="200" y="78" font-size="14" font-weight="700" fill="#333" text-anchor="middle">T</text>
  <text x="200" y="93" font-size="9" fill="#555" text-anchor="middle">total</text>
  <text x="230" y="82" font-size="14" fill="#333" text-anchor="middle">=</text>

  <!-- Data term -->
  <rect x="250" y="55" width="160" height="58" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="78" font-size="13" font-weight="700" fill="#3d9e5a" text-anchor="middle">D_vol / BW</text>
  <text x="330" y="100" font-size="9" fill="#555" text-anchor="middle">Data Term</text>

  <text x="425" y="82" font-size="14" fill="#333" text-anchor="middle">+</text>

  <!-- Compute term -->
  <rect x="445" y="55" width="160" height="58" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="525" y="78" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">O / (R_peak * eta)</text>
  <text x="525" y="100" font-size="9" fill="#555" text-anchor="middle">Compute Term</text>

  <text x="620" y="82" font-size="14" fill="#333" text-anchor="middle">+</text>

  <!-- Overhead term -->
  <rect x="640" y="55" width="140" height="58" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="710" y="78" font-size="13" font-weight="700" fill="#c87b2a" text-anchor="middle">L_lat</text>
  <text x="710" y="100" font-size="9" fill="#555" text-anchor="middle">Overhead Term</text>

  <!-- ===== Connector arrows ===== -->
  <line x1="250" y1="245" x2="330" y2="118" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="450" y1="245" x2="525" y2="118" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="700" y1="245" x2="710" y2="118" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- ===== Lifecycle Stages (bottom) ===== -->
  <!-- Stage 1: Problem Def -->
  <rect x="50" y="250" width="110" height="48" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="105" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Problem</text>
  <text x="105" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Definition</text>
  <text x="105" y="310" font-size="8" fill="#555" text-anchor="middle">Stage 1</text>

  <!-- Stage 2: Data -->
  <rect x="185" y="250" width="130" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="250" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Data Collection</text>
  <text x="250" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="middle">and Preparation</text>
  <text x="250" y="310" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">Stage 2: D_vol</text>

  <!-- Stage 3: Model -->
  <rect x="340" y="250" width="130" height="48" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="405" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Model Dev</text>
  <text x="405" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="middle">and Training</text>
  <text x="405" y="310" font-size="8" fill="#4a90c4" font-weight="700" text-anchor="middle">Stage 3: O</text>

  <!-- Stage 4: Eval -->
  <rect x="495" y="250" width="110" height="48" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="550" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Evaluation</text>
  <text x="550" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="middle">and Validation</text>
  <text x="550" y="310" font-size="8" fill="#555" text-anchor="middle">Stage 4: eta</text>

  <!-- Stage 5: Deploy -->
  <rect x="630" y="250" width="110" height="48" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="685" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Deployment</text>
  <text x="685" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="middle">and Integration</text>
  <text x="685" y="310" font-size="8" fill="#c87b2a" font-weight="700" text-anchor="middle">Stage 5: L_lat</text>

  <!-- Stage 6: Monitor -->
  <rect x="765" y="250" width="110" height="48" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="820" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Monitoring</text>
  <text x="820" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="middle">and Maintenance</text>
  <text x="820" y="310" font-size="8" fill="#c44" font-weight="700" text-anchor="middle">Stage 6: feedback</text>

  <!-- Arrows between stages -->
  <line x1="160" y1="274" x2="183" y2="274" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="315" y1="274" x2="338" y2="274" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="470" y1="274" x2="493" y2="274" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="605" y1="274" x2="628" y2="274" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="740" y1="274" x2="763" y2="274" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Examples below ===== -->
  <rect x="100" y="340" width="200" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="200" y="358" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Data choices matter:</text>
  <text x="200" y="372" font-size="8" fill="#555" text-anchor="middle">1024x1024 vs 256x256 images</text>
  <text x="200" y="384" font-size="8" fill="#555" text-anchor="middle">= 16x data volume</text>

  <rect x="350" y="340" width="200" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="450" y="358" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Model choices matter:</text>
  <text x="450" y="372" font-size="8" fill="#555" text-anchor="middle">70B vs 7B parameters</text>
  <text x="450" y="384" font-size="8" fill="#555" text-anchor="middle">= 10x compute</text>

  <rect x="600" y="340" width="200" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="700" y="358" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Deploy choices matter:</text>
  <text x="700" y="372" font-size="8" fill="#555" text-anchor="middle">Complex pre/post processing</text>
  <text x="700" y="384" font-size="8" fill="#555" text-anchor="middle">adds 50 ms overhead</text>

  <!-- Key insight -->
  <rect x="150" y="415" width="600" height="35" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="437" font-size="10" fill="#333" font-weight="700" text-anchor="middle">Workflow management = minimizing the Iron Law across all stages</text>

  <!-- Footnote -->
  <text x="450" y="478" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Optimizing Stage 3 alone is like optimizing only the compute term while ignoring data movement</text>
</svg>
