<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Where Time Actually Goes in ML Projects</text>

  <!-- ===== Stacked Bar ===== -->
  <!-- Total bar: x=80 to x=820, y=60 to y=120, width=740 -->
  <!-- 60% cleaning: 444px, 19% collecting: 141px, 9% mining: 67px, 5% training sets: 37px, 4% algorithms: 30px, 3% other: 22px -->

  <!-- Cleaning: 60% -->
  <rect x="80" y="60" width="444" height="70" rx="0" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="302" y="95" font-size="18" font-weight="700" fill="#333" text-anchor="middle">60%</text>
  <text x="302" y="112" font-size="9" fill="#555" text-anchor="middle">Cleaning and organizing data</text>

  <!-- Collecting: 19% -->
  <rect x="524" y="60" width="141" height="70" rx="0" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="594" y="95" font-size="14" font-weight="700" fill="#333" text-anchor="middle">19%</text>
  <text x="594" y="112" font-size="8" fill="#555" text-anchor="middle">Collecting datasets</text>

  <!-- Mining: 9% -->
  <rect x="665" y="60" width="67" height="70" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="698" y="95" font-size="11" font-weight="700" fill="#333" text-anchor="middle">9%</text>
  <text x="698" y="112" font-size="7" fill="#555" text-anchor="middle">Mining</text>

  <!-- Training sets: 5% -->
  <rect x="732" y="60" width="37" height="70" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="750" y="95" font-size="9" font-weight="700" fill="#333" text-anchor="middle">5%</text>

  <!-- Algorithms: 4% -->
  <rect x="769" y="60" width="30" height="70" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="784" y="95" font-size="9" font-weight="700" fill="#333" text-anchor="middle">4%</text>

  <!-- Other: 3% -->
  <rect x="799" y="60" width="22" height="70" rx="0" fill="#e8e8e8" stroke="#bbb" stroke-width="1.0"/>

  <!-- Legend below bar -->
  <rect x="732" y="140" width="10" height="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="746" y="149" font-size="8" fill="#555">Building training sets</text>

  <rect x="732" y="155" width="10" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="746" y="164" font-size="8" fill="#555">Refining algorithms</text>

  <rect x="732" y="170" width="10" height="10" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="746" y="179" font-size="8" fill="#555">Other</text>

  <!-- ===== Bracket: 79% data-related ===== -->
  <line x1="80" y1="145" x2="665" y2="145" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="80" y1="138" x2="80" y2="152" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="665" y1="138" x2="665" y2="152" stroke="#3d9e5a" stroke-width="2"/>
  <text x="372" y="163" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">79% of effort is data-related</text>

  <!-- ===== Attention vs Reality comparison ===== -->
  <text x="450" y="210" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Attention vs. Reality</text>

  <!-- Attention bar -->
  <text x="78" y="243" font-size="9" fill="#555" text-anchor="end">Research</text>
  <text x="78" y="255" font-size="9" fill="#555" text-anchor="end">attention</text>
  <rect x="80" y="232" width="200" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="180" y="250" font-size="9" fill="#333" text-anchor="middle">Data (20%)</text>
  <rect x="280" y="232" width="540" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="550" y="250" font-size="9" fill="#333" text-anchor="middle">Model / Algorithm (80%)</text>

  <!-- Reality bar -->
  <text x="78" y="287" font-size="9" fill="#555" text-anchor="end">Actual</text>
  <text x="78" y="299" font-size="9" fill="#555" text-anchor="end">effort</text>
  <rect x="80" y="276" width="584" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="372" y="294" font-size="9" fill="#333" text-anchor="middle">Data (79%)</text>
  <rect x="664" y="276" width="156" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="742" y="294" font-size="9" fill="#333" text-anchor="middle">Model (21%)</text>

  <!-- Key insight pills -->
  <rect x="190" y="330" width="220" height="32" rx="12" fill="#a31f34"/>
  <text x="300" y="350" font-size="10" fill="#fff" font-weight="700" text-anchor="middle">Model development = ~10%</text>

  <rect x="440" y="330" width="280" height="32" rx="12" fill="#3d9e5a"/>
  <text x="580" y="350" font-size="10" fill="#fff" font-weight="700" text-anchor="middle">Data engineering = highest ROI</text>

  <!-- Iteration cycles box -->
  <rect x="120" y="385" width="660" height="60" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="405" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Iteration Breakdown: 4-8 complete cycles for production readiness</text>
  <text x="450" y="422" font-size="9" fill="#555" text-anchor="middle">60% driven by data quality issues | 25% by architecture choices | 15% by infrastructure problems</text>
  <text x="450" y="437" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">Investment in data engineering yields the highest returns per hour spent</text>

  <!-- Footnote -->
  <text x="450" y="478" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Source: CrowdFlower Data Science Report, 2016</text>
</svg>
