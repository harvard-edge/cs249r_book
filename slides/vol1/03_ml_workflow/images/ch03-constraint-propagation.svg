<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Constraint Propagation: Exponential Cost of Late Discovery</text>

  <!-- ===== Bar Chart ===== -->
  <!-- Bars grow exponentially: heights proportional to 1x, 2x, 4x, 8x, 16x, 32x -->
  <!-- Max bar height: ~300px for 32x. Base y=420 -->
  <!-- Bar widths: 80px each, starting at x=100, gap=30 -->

  <!-- Stage 1: 1x (height=10) -->
  <rect x="100" y="408" width="80" height="12" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="140" y="398" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">1x</text>
  <text x="140" y="440" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Problem</text>
  <text x="140" y="451" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Definition</text>
  <text x="140" y="464" font-size="8" fill="#555" text-anchor="middle">Stage 1</text>

  <!-- Stage 2: 2x (height=20) -->
  <rect x="210" y="398" width="80" height="22" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="250" y="388" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">2x</text>
  <text x="250" y="440" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Data</text>
  <text x="250" y="451" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Collection</text>
  <text x="250" y="464" font-size="8" fill="#555" text-anchor="middle">Stage 2</text>

  <!-- Stage 3: 4x (height=42) -->
  <rect x="320" y="378" width="80" height="42" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="360" y="368" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">4x</text>
  <text x="360" y="440" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Model</text>
  <text x="360" y="451" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Development</text>
  <text x="360" y="464" font-size="8" fill="#555" text-anchor="middle">Stage 3</text>

  <!-- Stage 4: 8x (height=82) -->
  <rect x="430" y="338" width="80" height="82" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="470" y="328" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">8x</text>
  <text x="470" y="440" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Evaluation</text>
  <text x="470" y="464" font-size="8" fill="#555" text-anchor="middle">Stage 4</text>

  <!-- Stage 5: 16x (height=160) -->
  <rect x="540" y="260" width="80" height="160" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="580" y="250" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">16x</text>
  <text x="580" y="440" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Deployment</text>
  <text x="580" y="464" font-size="8" fill="#555" text-anchor="middle">Stage 5</text>

  <!-- Stage 6: 32x (height=300) -->
  <rect x="650" y="120" width="80" height="300" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="690" y="110" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">32x</text>
  <text x="690" y="440" font-size="8.5" fill="#333" font-weight="700" text-anchor="middle">Monitoring</text>
  <text x="690" y="464" font-size="8" fill="#555" text-anchor="middle">Stage 6</text>

  <!-- Exponential curve overlay -->
  <path d="M140,406 Q250,396 360,376 Q470,338 580,258 Q650,180 690,118"
        fill="none" stroke="#a31f34" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Formula box -->
  <rect x="740" y="60" width="150" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="815" y="82" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Cost Formula</text>
  <text x="815" y="100" font-size="10" fill="#a31f34" font-weight="700" text-anchor="middle">Cost = 2^(N-1)</text>

  <!-- Day-150 annotation -->
  <rect x="740" y="180" width="150" height="70" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="815" y="200" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Day-150 Disaster</text>
  <text x="815" y="215" font-size="8" fill="#555" text-anchor="middle">512 MB constraint</text>
  <text x="815" y="228" font-size="8" fill="#555" text-anchor="middle">discovered at Stage 5</text>
  <text x="815" y="241" font-size="8" fill="#a31f34" font-weight="700" text-anchor="middle">16x remediation cost</text>

  <!-- Arrow from annotation to Stage 5 bar -->
  <line x1="740" y1="220" x2="625" y2="320" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- Baseline axis -->
  <line x1="90" y1="420" x2="740" y2="420" stroke="#bbb" stroke-width="1"/>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Deployment constraints must flow backward to Day 1</text>
</svg>
