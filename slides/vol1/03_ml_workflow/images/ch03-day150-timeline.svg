<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Day-150 Disaster: When Workflow Fails</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Timeline axis -->
  <line x1="80" y1="260" x2="820" y2="260" stroke="#bbb" stroke-width="2"/>

  <!-- Day markers -->
  <line x1="100" y1="250" x2="100" y2="270" stroke="#555" stroke-width="1.5"/>
  <text x="100" y="288" font-size="9" fill="#555" text-anchor="middle">Day 1</text>

  <line x1="310" y1="250" x2="310" y2="270" stroke="#555" stroke-width="1.5"/>
  <text x="310" y="288" font-size="9" fill="#555" text-anchor="middle">Day 90</text>

  <line x1="420" y1="250" x2="420" y2="270" stroke="#555" stroke-width="1.5"/>
  <text x="420" y="288" font-size="9" fill="#555" text-anchor="middle">Day 120</text>

  <line x1="570" y1="250" x2="570" y2="270" stroke="#a31f34" stroke-width="2"/>
  <text x="570" y="288" font-size="9" fill="#a31f34" font-weight="700" text-anchor="middle">Day 150</text>

  <line x1="640" y1="250" x2="640" y2="270" stroke="#a31f34" stroke-width="2"/>
  <text x="640" y="288" font-size="9" fill="#a31f34" font-weight="700" text-anchor="middle">Day 151</text>

  <line x1="710" y1="250" x2="710" y2="270" stroke="#a31f34" stroke-width="2"/>
  <text x="710" y="288" font-size="9" fill="#a31f34" font-weight="700" text-anchor="middle">Day 153</text>

  <!-- Confidence curve (green rising) -->
  <path d="M100,220 C200,200 280,140 310,120 C340,105 400,85 420,80 C460,72 530,68 570,70"
        fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <!-- Confidence curve (red crash) -->
  <path d="M570,70 C590,72 620,180 640,220 C660,240 690,248 710,250"
        fill="none" stroke="#c44" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Labels above curve -->
  <text x="100" y="208" font-size="8.5" fill="#555" text-anchor="middle">Build diagnostic</text>
  <text x="100" y="218" font-size="8.5" fill="#555" text-anchor="middle">model</text>

  <text x="310" y="108" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">95% accuracy</text>
  <text x="420" y="68" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">96% accuracy</text>

  <!-- Crash annotations -->
  <rect x="548" y="300" width="185" height="68" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="640" y="318" font-size="9" fill="#333" font-weight="700" text-anchor="middle">Day 151: Model needs 4 GB</text>
  <text x="640" y="333" font-size="9" fill="#333" font-weight="700" text-anchor="middle">Day 152: Tablet has 512 MB</text>
  <text x="640" y="348" font-size="9" fill="#a31f34" font-weight="700" text-anchor="middle">Day 153: Five months discarded</text>
  <text x="640" y="362" font-size="8" fill="#555" text-anchor="middle">Memory constraint: 8x violation</text>

  <!-- Constraint pill -->
  <rect x="545" y="52" width="90" height="22" rx="12" fill="#a31f34"/>
  <text x="590" y="67" font-size="8" fill="#fff" font-weight="700" text-anchor="middle">512 MB limit</text>

  <!-- Handed to deployment label -->
  <text x="570" y="56" font-size="8.5" fill="#555" text-anchor="end">Handed to</text>
  <text x="540" y="67" font-size="8.5" fill="#555" text-anchor="end">deployment</text>

  <!-- Confidence Y-axis label -->
  <text x="60" y="170" font-size="9" fill="#555" text-anchor="middle" transform="rotate(-90 60 170)">Confidence</text>

  <!-- Key insight box -->
  <rect x="80" y="395" width="350" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="255" y="415" font-size="10" fill="#a31f34" font-weight="700" text-anchor="middle">The model was excellent.</text>
  <text x="255" y="432" font-size="10" fill="#a31f34" font-weight="700" text-anchor="middle">The workflow failed.</text>

  <!-- Right insight -->
  <rect x="470" y="395" width="370" height="50" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="655" y="415" font-size="9" fill="#333" font-weight="700" text-anchor="middle">Constraint Propagation Principle:</text>
  <text x="655" y="432" font-size="9" fill="#555" text-anchor="middle">Stage-5 discovery costs 16x vs. Stage-1 definition</text>

  <!-- Footnote -->
  <text x="450" y="478" font-size="9" fill="#999" font-style="italic" text-anchor="middle">A deployment constraint that should have shaped Day 1 was discovered on Day 151</text>
</svg>
