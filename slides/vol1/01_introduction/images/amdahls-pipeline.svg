<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Amdahl's Law: Why Optimizing One Stage Isn't Enough</text>

  <!-- ===== Before Pipeline ===== -->
  <text x="60" y="90" font-size="12" font-weight="700" fill="#333">Before (130 ms total)</text>

  <!-- Preprocessing 60ms -->
  <rect x="60" y="105" width="312" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="216" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Preprocessing</text>
  <text x="216" y="150" text-anchor="middle" font-size="10" font-weight="400" fill="#555">60 ms</text>

  <!-- Inference 45ms -->
  <rect x="382" y="105" width="234" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="499" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Inference</text>
  <text x="499" y="150" text-anchor="middle" font-size="10" font-weight="400" fill="#555">45 ms</text>

  <!-- Postprocessing 25ms -->
  <rect x="626" y="105" width="130" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="691" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Postprocessing</text>
  <text x="691" y="150" text-anchor="middle" font-size="10" font-weight="400" fill="#555">25 ms</text>

  <!-- Arrows between Before blocks -->
  <line x1="372" y1="135" x2="380" y2="135" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="616" y1="135" x2="624" y2="135" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Total label -->
  <text x="800" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#333">= 130 ms</text>

  <!-- ===== Divider ===== -->
  <line x1="60" y1="195" x2="840" y2="195" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="450" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#555">3x Inference Speedup Applied</text>

  <!-- ===== After Pipeline ===== -->
  <text x="60" y="250" font-size="12" font-weight="700" fill="#333">After (100 ms total)</text>

  <!-- Preprocessing 60ms — now the bottleneck, red highlight -->
  <rect x="60" y="265" width="312" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="216" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Preprocessing</text>
  <text x="216" y="310" text-anchor="middle" font-size="10" font-weight="400" fill="#555">60 ms</text>

  <!-- Red "New bottleneck" callout -->
  <rect x="135" y="332" width="160" height="24" rx="12" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="215" y="348" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">New Bottleneck</text>
  <line x1="216" y1="325" x2="216" y2="332" stroke="#c44" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- Inference 15ms — shrunk -->
  <rect x="382" y="265" width="78" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="421" y="292" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Inference</text>
  <text x="421" y="310" text-anchor="middle" font-size="9" font-weight="400" fill="#555">15 ms</text>

  <!-- Postprocessing 25ms -->
  <rect x="470" y="265" width="130" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="535" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Postprocessing</text>
  <text x="535" y="310" text-anchor="middle" font-size="10" font-weight="400" fill="#555">25 ms</text>

  <!-- Arrows between After blocks -->
  <line x1="372" y1="295" x2="380" y2="295" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="460" y1="295" x2="468" y2="295" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Total label -->
  <text x="660" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#333">= 100 ms</text>

  <!-- ===== Big Annotation ===== -->
  <rect x="220" y="380" width="460" height="50" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="#a31f34">Expected: 67% improvement</text>
  <text x="450" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="#a31f34">Actual: only 23% end-to-end improvement</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Amdahl's Law: a 3x speedup on 35% of the pipeline yields only 23% end-to-end improvement.</text>
</svg>
