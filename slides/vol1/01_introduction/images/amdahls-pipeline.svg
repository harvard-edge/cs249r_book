<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-head" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-head-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <!-- ===== Title ===== -->
  <text x="450" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Amdahl's Law: Diminishing Returns from Point Optimization</text>
  <!-- Constants for positioning -->
  <g id="layout-vars" display="none">
    <rect id="before-y" y="105"/>
    <rect id="after-y" y="260"/>
    <rect id="block-height" height="65"/>
  </g>
  <!-- ===== Before Pipeline (130ms) ===== -->
  <g id="before-pipeline">
    <text x="50" y="90" font-size="12" font-weight="bold" fill="#333">Before Optimization (Total: 130 ms)</text>
    
    <!-- Preprocessing (60ms) -->
    <rect x="50" y="105" width="369" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" filter="url(#drop-shadow)"/>
    <text x="234.5" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Preprocessing</text>
    <text x="234.5" y="152" text-anchor="middle" font-size="11" fill="#444">60 ms</text>
    <path d="M 419 137.5 L 434 137.5" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-head)"/>
    <!-- Inference (45ms) -->
    <rect x="439" y="105" width="277" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" filter="url(#drop-shadow)"/>
    <text x="577.5" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Inference</text>
    <text x="577.5" y="152" text-anchor="middle" font-size="11" fill="#444">45 ms</text>
    <path d="M 716 137.5 L 731 137.5" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-head)"/>
    <!-- Postprocessing (25ms) -->
    <rect x="736" y="105" width="114" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" filter="url(#drop-shadow)"/>
    <text x="793" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Postproc.</text>
    <text x="793" y="152" text-anchor="middle" font-size="11" fill="#444">25 ms</text>
  </g>
  <!-- ===== Divider ===== -->
  <path d="M 50 205 H 850" stroke="#ccc" stroke-dasharray="5,4" stroke-width="1"/>
  <text x="450" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a90c4">Apply 3x Speedup to Inference Stage</text>
  <!-- ===== After Pipeline (100ms) ===== -->
  <g id="after-pipeline">
    <text x="142.5" y="245" font-size="12" font-weight="bold" fill="#333">After Optimization (Total: 100 ms)</text>
    <!-- Preprocessing (60ms) - New Bottleneck -->
    <rect x="142.5" y="260" width="369" height="65" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2" filter="url(#drop-shadow)"/>
    <text x="327" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Preprocessing</text>
    <text x="327" y="307" text-anchor="middle" font-size="11" fill="#444">60 ms</text>
    <path d="M 511.5 292.5 L 526.5 292.5" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-head)"/>
    <!-- Inference (15ms) - Optimized -->
    <rect x="531.5" y="260" width="92" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" filter="url(#drop-shadow)"/>
    <text x="577.5" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Inference</text>
    <text x="577.5" y="307" text-anchor="middle" font-size="11" fill="#444">15 ms</text>
    <path d="M 623.5 292.5 L 638.5 292.5" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-head)"/>
    <!-- Postprocessing (25ms) -->
    <rect x="643.5" y="260" width="114" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" filter="url(#drop-shadow)"/>
    <text x="700.5" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Postproc.</text>
    <text x="700.5" y="307" text-anchor="middle" font-size="11" fill="#444">25 ms</text>
  </g>
  
  <!-- "New Bottleneck" Callout -->
  <g id="bottleneck-callout">
      <path d="M327,325 Q327,335 342,342" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-head-red)"/>
      <rect x="340" y="335" width="130" height="28" rx="14" fill="#a31f34" stroke="#f9d6d5" stroke-width="1"/>
      <text x="405" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="white">New Bottleneck</text>
  </g>
  <!-- ===== Summary Annotation ===== -->
  <g id="summary-annotation" filter="url(#drop-shadow)">
    <rect x="220" y="390" width="460" height="60" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="450" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Expected a ~23% time reduction (30ms / 130ms).</text>
    <text x="450" y="435" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">The actual end-to-end improvement is identical: 23%.</text>
  </g>
  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Amdahl's Law states the overall speedup is limited by the parts of the system you *don't* improve.</text>
</svg>
