<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="400" height="300" fill="#fff" rx="4"/>

  <!-- ===== Arduino Nicla Vision — tiny PCB ===== -->
  <!-- Scale emphasis: board is intentionally small -->

  <!-- PCB board — green -->
  <rect x="155" y="55" width="90" height="110" rx="3" fill="#1a7a3a" stroke="#0f5a28" stroke-width="1.5"/>

  <!-- PCB texture — subtle traces -->
  <line x1="162" y1="70" x2="180" y2="70" stroke="#2a8a4a" stroke-width="0.5"/>
  <line x1="162" y1="75" x2="195" y2="75" stroke="#2a8a4a" stroke-width="0.5"/>
  <line x1="175" y1="130" x2="210" y2="130" stroke="#2a8a4a" stroke-width="0.5"/>
  <line x1="165" y1="145" x2="200" y2="145" stroke="#2a8a4a" stroke-width="0.5"/>

  <!-- Camera module — circle on board -->
  <circle cx="200" cy="95" r="16" fill="#222" stroke="#444" stroke-width="1.2"/>
  <circle cx="200" cy="95" r="11" fill="#333" stroke="#555" stroke-width="0.8"/>
  <circle cx="200" cy="95" r="6" fill="#1a1a4a" stroke="#444" stroke-width="0.6"/>
  <!-- Lens glint -->
  <circle cx="197" cy="92" r="2" fill="#667" opacity="0.5"/>

  <!-- Chip on board -->
  <rect x="172" y="120" width="22" height="18" rx="1" fill="#222" stroke="#444" stroke-width="0.8"/>
  <text x="183" y="132" text-anchor="middle" font-size="4.5" font-weight="700" fill="#888">STM</text>

  <!-- Pin headers — left side -->
  <rect x="151" y="62" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="72" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="82" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="92" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="102" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="112" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="122" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="132" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="142" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="151" y="152" width="4" height="5" rx="0.5" fill="#c9a800"/>

  <!-- Pin headers — right side -->
  <rect x="245" y="62" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="72" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="82" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="92" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="102" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="112" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="122" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="132" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="142" width="4" height="5" rx="0.5" fill="#c9a800"/>
  <rect x="245" y="152" width="4" height="5" rx="0.5" fill="#c9a800"/>

  <!-- USB connector at bottom -->
  <rect x="190" y="160" width="20" height="8" rx="1" fill="#aaa" stroke="#888" stroke-width="0.8"/>

  <!-- Red accent — error/TinyML LED -->
  <circle cx="230" cy="65" r="3" fill="#c44" opacity="0.9"/>

  <!-- ===== Labels ===== -->
  <text x="200" y="195" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Arduino Nicla</text>
  <text x="200" y="217" text-anchor="middle" font-size="11" font-weight="400" fill="#555">384 KB  &#xb7;  0.5 GF  &#xb7;  100 mW</text>

  <!-- TinyML tier badge -->
  <rect x="155" y="233" width="90" height="22" rx="12" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="200" y="248" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">TinyML</text>

  <!-- Scale reference annotation -->
  <text x="200" y="280" text-anchor="middle" font-size="8" font-weight="400" fill="#999" font-style="italic">22.86 &#xd7; 22.86 mm actual size</text>
</svg>
