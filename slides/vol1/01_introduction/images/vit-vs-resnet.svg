<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#333">ViT vs ResNet-50: More Accuracy, But at What Cost?</text>

  <!-- ===== Vertical Divider ===== -->
  <line x1="450" y1="55" x2="450" y2="290" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Left Column: ResNet-50 ===== -->
  <rect x="60" y="60" width="350" height="110" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="235" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ResNet-50</text>
  <text x="235" y="108" text-anchor="middle" font-size="11" font-weight="400" fill="#555">7.7 GFLOPs</text>
  <text x="235" y="126" text-anchor="middle" font-size="11" font-weight="400" fill="#555">25.6M parameters</text>
  <text x="235" y="144" text-anchor="middle" font-size="11" font-weight="400" fill="#555">76.1% top-1 accuracy</text>
  <text x="235" y="160" text-anchor="middle" font-size="9" font-weight="400" fill="#3d9e5a">Baseline</text>

  <!-- ===== Right Column: ViT-B/16 ===== -->
  <rect x="490" y="60" width="350" height="110" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="665" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ViT-B/16</text>
  <text x="665" y="108" text-anchor="middle" font-size="11" font-weight="400" fill="#555">33.0 GFLOPs (4.3x)</text>
  <text x="665" y="126" text-anchor="middle" font-size="11" font-weight="400" fill="#555">86M parameters (3.4x)</text>
  <text x="665" y="144" text-anchor="middle" font-size="11" font-weight="400" fill="#555">77.9% top-1 accuracy</text>
  <text x="665" y="160" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">+1.8% accuracy</text>

  <!-- ===== Arrow between columns ===== -->
  <line x1="410" y1="115" x2="488" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="108" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">+1.8% accuracy</text>
  <text x="450" y="122" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">4x compute</text>

  <!-- ===== Bar Chart: FLOPs Comparison ===== -->
  <text x="450" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#333">FLOPs Comparison</text>

  <!-- Bar chart baseline -->
  <line x1="160" y1="390" x2="740" y2="390" stroke="#bbb" stroke-width="1"/>

  <!-- ResNet bar (short) -->
  <rect x="220" y="330" width="120" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="280" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#333">7.7</text>
  <text x="280" y="380" text-anchor="middle" font-size="9" font-weight="400" fill="#555">GFLOPs</text>
  <text x="280" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#333">ResNet-50</text>

  <!-- ViT bar (tall) -->
  <rect x="560" y="225" width="120" height="165" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="620" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#333">33.0</text>
  <text x="620" y="325" text-anchor="middle" font-size="9" font-weight="400" fill="#555">GFLOPs</text>
  <text x="620" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#333">ViT-B/16</text>

  <!-- 4.3x bracket -->
  <line x1="700" y1="230" x2="720" y2="230" stroke="#a31f34" stroke-width="1.2"/>
  <line x1="720" y1="230" x2="720" y2="385" stroke="#a31f34" stroke-width="1.2"/>
  <line x1="700" y1="385" x2="720" y2="385" stroke="#a31f34" stroke-width="1.2"/>
  <text x="740" y="312" text-anchor="start" font-size="11" font-weight="700" fill="#a31f34">4.3x</text>

  <!-- ===== Red Callout Box ===== -->
  <rect x="290" y="430" width="320" height="32" rx="12" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="451" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">Better accuracy does not equal better system</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Algorithmic efficiency compounds: 44x compute reduction for equivalent accuracy over time.</text>
</svg>
