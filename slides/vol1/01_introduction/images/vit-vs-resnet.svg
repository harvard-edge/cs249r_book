<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="drop-shadow" x="-0.1" y="-0.1" width="1.2" height="1.2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.1"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="16px" font-weight="600" fill="#333">ViT vs. ResNet-50: The Cost of Higher Accuracy</text>

  <!-- ===== Left Column: ResNet-50 ===== -->
  <g filter="url(#drop-shadow)">
    <rect x="50" y="55" width="370" height="105" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  </g>
  <text x="235" y="82" text-anchor="middle" font-size="13px" font-weight="700" fill="#222">ResNet-50 (Baseline)</text>
  <text x="235" y="103" text-anchor="middle" font-size="11px" fill="#444">7.7 GFLOPs</text>
  <text x="235" y="121" text-anchor="middle" font-size="11px" fill="#444">25.6M Parameters</text>
  <text x="235" y="139" text-anchor="middle" font-size="11px" fill="#444">76.1% Accuracy</text>

  <!-- ===== Right Column: ViT-B/16 ===== -->
  <g filter="url(#drop-shadow)">
     <rect x="480" y="55" width="370" height="105" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  </g>
  <text x="665" y="82" text-anchor="middle" font-size="13px" font-weight="700" fill="#222">ViT-B/16</text>
  <text x="665" y="103" text-anchor="middle" font-size="11px" fill="#444">33.0 GFLOPs <tspan font-weight="600" fill="#c44">(4.3x)</tspan></text>
  <text x="665" y="121" text-anchor="middle" font-size="11px" fill="#444">86M Parameters <tspan font-weight="600" fill="#c44">(3.4x)</tspan></text>
  <text x="665" y="139" text-anchor="middle" font-size="11px" fill="#444">77.9% Accuracy <tspan font-weight="600" fill="#3d9e5a">(+1.8 pts)</tspan></text>

  <!-- Arrow showing cost — routed below both boxes -->
  <path d="M 330 160 Q 450 185 565 160" fill="none" stroke="#a31f34" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-accent)"/>
  <text x="450" y="195" text-anchor="middle" font-size="10px" font-weight="600" fill="#a31f34">The Compute Cost</text>

  <!-- ===== Bar Chart Section ===== -->
  <text x="450" y="225" text-anchor="middle" font-size="13px" font-weight="600" fill="#333">Visualizing the Compute Cost (GFLOPs)</text>

  <!-- Baseline -->
  <line x1="150" y1="400" x2="750" y2="400" stroke="#ccc" stroke-width="1.5"/>

  <!-- ResNet Bar: height proportional — 7.7/33 of ViT bar -->
  <g filter="url(#drop-shadow)">
    <rect x="230" y="360" width="140" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  </g>
  <text x="300" y="378" text-anchor="middle" font-size="11px" font-weight="700" fill="#222">7.7</text>
  <text x="300" y="390" text-anchor="middle" font-size="8px" fill="#555">GFLOPs</text>
  <text x="300" y="418" text-anchor="middle" font-size="11px" font-weight="600" fill="#333">ResNet-50</text>

  <!-- ViT Bar: starts well below the spec boxes -->
  <g filter="url(#drop-shadow)">
    <rect x="530" y="228" width="140" height="172" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  </g>
  <text x="600" y="310" text-anchor="middle" font-size="11px" font-weight="700" fill="#222">33.0</text>
  <text x="600" y="324" text-anchor="middle" font-size="8px" fill="#555">GFLOPs</text>
  <text x="600" y="418" text-anchor="middle" font-size="11px" font-weight="600" fill="#333">ViT-B/16</text>

  <!-- 4.3x bracket/arrow -->
  <line x1="370" y1="360" x2="530" y2="360" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 680 360 L 680 233" fill="none" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <path d="M 675 360 L 685 360" fill="none" stroke="#a31f34" stroke-width="2"/>
  <text x="700" y="295" text-anchor="start" font-size="14px" font-weight="700" fill="#a31f34">4.3x</text>
  <text x="700" y="312" text-anchor="start" font-size="10px" font-weight="500" fill="#a31f34">Higher Compute</text>

  <!-- ===== Red Callout Box ===== -->
  <g filter="url(#drop-shadow)">
    <rect x="250" y="440" width="400" height="30" rx="15" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  </g>
  <text x="450" y="460" text-anchor="middle" font-size="11px" font-weight="700" fill="#a31f34">A small accuracy gain can hide a massive system cost.</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9px" fill="#999" font-style="italic">Note: FLOPs for a 224x224 image. ViT-B/16 can achieve higher accuracy with more pre-training data.</text>
</svg>
