<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Deployment Spectrum</text>
  <text x="450" y="52" text-anchor="middle" font-size="10" fill="#555">From data center to microcontroller</text>

  <!-- ===== Spanning arrow at top ===== -->
  <line x1="100" y1="75" x2="830" y2="75" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="830" y1="75" x2="100" y2="75" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="290" y="63" width="320" height="22" fill="#fff" rx="10"/>
  <text x="450" y="79" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">10&#x2075;x memory gap --- 10&#x2076;x compute gap</text>

  <!-- ===== Cloud tier ===== -->
  <rect x="55" y="110" width="210" height="280" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="6"/>
  <text x="160" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Cloud</text>

  <!-- Cloud icon (simplified server rack) -->
  <rect x="120" y="155" width="80" height="55" fill="#fff" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <line x1="130" y1="170" x2="190" y2="170" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="130" y1="185" x2="190" y2="185" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="130" y1="200" x2="190" y2="200" stroke="#4a90c4" stroke-width="0.8"/>
  <circle cx="185" cy="163" r="3" fill="#3d9e5a"/>
  <circle cx="185" cy="178" r="3" fill="#3d9e5a"/>
  <circle cx="185" cy="193" r="3" fill="#3d9e5a"/>

  <!-- Cloud specs -->
  <rect x="85" y="225" width="150" height="22" fill="#fff" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="160" y="240" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">80 GB RAM</text>
  <rect x="85" y="255" width="150" height="22" fill="#fff" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="160" y="270" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">989 TFLOPS</text>
  <rect x="85" y="285" width="150" height="22" fill="#fff" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="160" y="300" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">700 W</text>

  <!-- GPU badge -->
  <rect x="120" y="320" width="80" height="18" fill="#a31f34" rx="9"/>
  <text x="160" y="333" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">H100 GPU</text>

  <text x="160" y="370" text-anchor="middle" font-size="8.5" fill="#555">Full precision,</text>
  <text x="160" y="382" text-anchor="middle" font-size="8.5" fill="#555">any model size</text>

  <!-- ===== Edge tier ===== -->
  <rect x="285" y="145" width="175" height="245" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="6"/>
  <text x="372" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Edge</text>

  <!-- Edge icon (small box) -->
  <rect x="342" y="185" width="60" height="40" fill="#fff" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <rect x="350" y="193" width="15" height="10" fill="#c87b2a" opacity="0.3" rx="1"/>
  <rect x="370" y="193" width="15" height="10" fill="#c87b2a" opacity="0.3" rx="1"/>
  <rect x="350" y="207" width="15" height="10" fill="#c87b2a" opacity="0.3" rx="1"/>

  <!-- Edge specs -->
  <rect x="310" y="240" width="125" height="22" fill="#fff" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="372" y="255" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">16 GB</text>
  <rect x="310" y="270" width="125" height="22" fill="#fff" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="372" y="285" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">100 TFLOPS</text>
  <rect x="310" y="300" width="125" height="22" fill="#fff" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="372" y="315" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">25 W</text>

  <text x="372" y="355" text-anchor="middle" font-size="8.5" fill="#555">Quantized models,</text>
  <text x="372" y="367" text-anchor="middle" font-size="8.5" fill="#555">latency-sensitive</text>

  <!-- ===== Mobile tier ===== -->
  <rect x="485" y="180" width="155" height="210" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="6"/>
  <text x="562" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Mobile</text>

  <!-- Phone icon -->
  <rect x="542" y="215" width="40" height="60" fill="#fff" stroke="#3d9e5a" stroke-width="1" rx="5"/>
  <rect x="548" y="225" width="28" height="35" fill="#d4edda" stroke="none" rx="1"/>
  <circle cx="562" cy="268" r="3" fill="#3d9e5a"/>

  <!-- Mobile specs -->
  <rect x="510" y="285" width="105" height="22" fill="#fff" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="562" y="300" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">6 GB</text>
  <rect x="510" y="315" width="105" height="22" fill="#fff" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="562" y="330" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">17 TFLOPS</text>
  <rect x="510" y="345" width="105" height="22" fill="#fff" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="562" y="360" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">5 W</text>

  <!-- ===== TinyML tier ===== -->
  <rect x="665" y="215" width="135" height="175" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="6"/>
  <text x="732" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#333">TinyML</text>

  <!-- MCU icon (tiny chip) -->
  <rect x="717" y="250" width="30" height="25" fill="#fff" stroke="#c44" stroke-width="1" rx="2"/>
  <line x1="712" y1="258" x2="717" y2="258" stroke="#c44" stroke-width="0.8"/>
  <line x1="712" y1="264" x2="717" y2="264" stroke="#c44" stroke-width="0.8"/>
  <line x1="712" y1="270" x2="717" y2="270" stroke="#c44" stroke-width="0.8"/>
  <line x1="747" y1="258" x2="752" y2="258" stroke="#c44" stroke-width="0.8"/>
  <line x1="747" y1="264" x2="752" y2="264" stroke="#c44" stroke-width="0.8"/>
  <line x1="747" y1="270" x2="752" y2="270" stroke="#c44" stroke-width="0.8"/>

  <!-- TinyML specs -->
  <rect x="682" y="290" width="100" height="22" fill="#fff" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="732" y="305" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">512 KB</text>
  <rect x="682" y="320" width="100" height="22" fill="#fff" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="732" y="335" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">0.5 GFLOPS</text>
  <rect x="682" y="350" width="100" height="22" fill="#fff" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="732" y="365" text-anchor="middle" font-size="9.5" font-weight="700" fill="#333">100 mW</text>

  <!-- ===== Scale markers between tiers ===== -->
  <!-- Cloud to Edge -->
  <text x="270" y="420" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">5x mem</text>
  <text x="270" y="432" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">10x compute</text>

  <!-- Edge to Mobile -->
  <text x="465" y="420" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">2.7x mem</text>
  <text x="465" y="432" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">6x compute</text>

  <!-- Mobile to TinyML -->
  <text x="645" y="420" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">12,000x mem</text>
  <text x="645" y="432" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">34,000x compute</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Nine orders of magnitude separate Cloud and TinyML -- each tier requires fundamental redesign.</text>
</svg>
