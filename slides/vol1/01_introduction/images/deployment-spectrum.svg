<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <!-- Define styles and filters -->
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 700; text-anchor: middle; fill: #222; }
      .subtitle { font-size: 11px; text-anchor: middle; fill: #555; }
      .tier-title { font-size: 14px; font-weight: 700; text-anchor: middle; fill: #222; }
      .spec-text { font-size: 10px; font-weight: 600; text-anchor: middle; fill: #333; }
      .desc-text { font-size: 9px; text-anchor: middle; fill: #444; }
      .badge-text { font-size: 9px; font-weight: 700; text-anchor: middle; fill: #fff; }
      .scale-text { font-size: 9.5px; font-weight: 600; text-anchor: middle; fill: #555; }
      .footnote { font-size: 9px; font-style: italic; text-anchor: middle; fill: #999; }
      .accent-text { font-size: 10px; font-weight: 700; text-anchor: middle; fill: #a31f34; }
    </style>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.15"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a31f34"/>
    </marker>
    <marker id="arrowhead-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="900" height="500" fill="#fff"/>
  <!-- Title -->
  <text x="450" y="35" class="title">The Deployment Spectrum</text>
  <text x="450" y="52" class="subtitle">From Data Center to Microcontroller</text>
  <!-- Top spanning arrow -->
  <path d="M 100,75 L 800,75" stroke="#a31f34" stroke-width="2" marker-start="url(#arrowhead-accent)" marker-end="url(#arrowhead-accent)"/>
  <rect x="325" y="64" width="250" height="22" fill="#fff"/>
  <text x="450" y="79" class="accent-text">10<tspan baseline-shift="super" font-size="7px">5</tspan>× Memory &amp; 10<tspan baseline-shift="super" font-size="7px">6</tspan>× Compute Gap</text>
  <!-- TIER 1: CLOUD -->
  <g>
    <rect x="50" y="110" width="220" height="300" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="8" filter="url(#drop-shadow)"/>
    <text x="160" y="135" class="tier-title">Cloud / Data Center</text>
    <!-- Server Icon -->
    <g transform="translate(120 150)">
        <rect width="80" height="55" fill="#fff" stroke="#4a90c4" stroke-width="1" rx="3"/>
        <line x1="10" y1="15" x2="70" y2="15" stroke="#4a90c4" stroke-width="1"/>
        <line x1="10" y1="27" x2="70" y2="27" stroke="#4a90c4" stroke-width="1"/>
        <line x1="10" y1="39" x2="70" y2="39" stroke="#4a90c4" stroke-width="1"/>
        <circle cx="65" cy="8" r="2.5" fill="#3d9e5a"/>
    </g>
    <text x="160" y="235" class="spec-text">80 GB HBM3</text>
    <text x="160" y="260" class="spec-text">989 TFLOPS (FP16)</text>
    <text x="160" y="285" class="spec-text">700 W TDP</text>
    <rect x="110" y="305" width="100" height="20" fill="#a31f34" rx="10"/>
    <text x="160" y="319" class="badge-text">NVIDIA H100</text>
    <text x="160" y="355" class="desc-text" text-anchor="middle">Full-precision training &amp; inference</text>
    <text x="160" y="369" class="desc-text" text-anchor="middle">Supports largest models (LLMs)</text>
  </g>
  
  <!-- TIER 2: EDGE -->
  <g>
    <rect x="300" y="145" width="170" height="265" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="8" filter="url(#drop-shadow)"/>
    <text x="385" y="170" class="tier-title">Edge Device</text>
    <!-- Edge Icon -->
    <g transform="translate(352 185)">
        <rect width="66" height="40" fill="#fff" stroke="#c87b2a" stroke-width="1" rx="3"/>
        <rect x="8" y="8" width="20" height="12" fill="#c87b2a" opacity="0.3" rx="1"/>
        <rect x="38" y="8" width="20" height="12" fill="#c87b2a" opacity="0.3" rx="1"/>
        <rect x="8" y="24" width="50" height="8" fill="#c87b2a" opacity="0.3" rx="1"/>
    </g>
    <text x="385" y="250" class="spec-text">32 GB LPDDR5</text>
    <text x="385" y="275" class="spec-text">100 TOPS (INT8)</text>
    <text x="385" y="300" class="spec-text">15–40 W TDP</text>
    <rect x="325" y="315" width="120" height="20" fill="#c87b2a" rx="10"/>
    <text x="385" y="329" class="badge-text" fill="#fff">Jetson Orin NX</text>
    <text x="385" y="360" class="desc-text">Autonomous vehicles, robotics</text>
    <text x="385" y="374" class="desc-text">Edge inference &amp; fine-tuning</text>
  </g>
  
  <!-- TIER 3: MOBILE -->
  <g>
    <rect x="500" y="180" width="160" height="230" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="8" filter="url(#drop-shadow)"/>
    <text x="580" y="205" class="tier-title">Mobile</text>
    <!-- Phone Icon -->
    <g transform="translate(555 220)">
        <rect width="50" height="70" fill="#fff" stroke="#3d9e5a" stroke-width="1.2" rx="8"/>
        <rect x="5" y="8" width="40" height="48" fill="#d4edda" rx="2"/>
        <circle cx="25" cy="62" r="3.5" fill="#3d9e5a" stroke="#fff" stroke-width="0.5"/>
    </g>
    <text x="580" y="310" class="spec-text">8 GB LPDDR5</text>
    <text x="580" y="335" class="spec-text">17 TOPS (INT8)</text>
    <text x="580" y="360" class="spec-text">3–5 W TDP</text>
    <text x="580" y="385" class="desc-text">On-device personalization</text>
  </g>
  <!-- TIER 4: TINYML -->
  <g>
    <rect x="690" y="215" width="150" height="195" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="8" filter="url(#drop-shadow)"/>
    <text x="765" y="240" class="tier-title">TinyML / MCU</text>
    <!-- MCU Icon -->
    <g transform="translate(735 255)">
        <rect width="60" height="35" fill="#fff" stroke="#c44" stroke-width="1" rx="2"/>
        <rect x="10" y="7" width="40" height="21" fill="#c44" opacity="0.8"/>
        <path d="M0,10 h10 M0,15 h10 M0,20 h10 M0,25 h10" stroke="#c44" stroke-width="1.2"/>
        <path d="M60,10 h10 M60,15 h10 M60,20 h10 M60,25 h10" stroke="#c44" stroke-width="1.2" transform="translate(10,0)"/>
    </g>
    <text x="765" y="310" class="spec-text">384 KB SRAM</text>
    <text x="765" y="335" class="spec-text">~0.5 GFLOPS</text>
    <text x="765" y="360" class="spec-text">~100 mW TDP</text>
    <rect x="715" y="370" width="100" height="20" fill="#c44" rx="10"/>
    <text x="765" y="384" class="badge-text">Arduino Nicla</text>
  </g>
  
  <!-- Connecting Arrows and Labels -->
  <g>
    <!-- Cloud -> Edge -->
    <path d="M 270 250 C 285 250 285 205 300 205" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead-dark)"/>
    <text x="315" y="228" class="scale-text">~2.5×</text>

    <!-- Edge -> Mobile -->
    <path d="M 470 280 C 485 280 485 240 500 240" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead-dark)"/>
    <text x="515" y="260" class="scale-text">~4×</text>

    <!-- Mobile -> TinyML -->
    <path d="M 660 310 C 675 310 675 270 690 270" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowhead-dark)"/>
    <text x="705" y="288" class="scale-text">~20,000×</text>
  </g>
  
  <!-- Footnote -->
  <text x="450" y="488" class="footnote">Hardware constraints create orders-of-magnitude differences, forcing specialized model architectures at each tier.</text>
</svg>
