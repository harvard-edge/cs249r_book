<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#333">The Verification Gap</text>

  <!-- ===== Total input space (enormous rectangle) ===== -->
  <rect x="60" y="70" width="780" height="320" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="550" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#c44">Unexplored Input Space</text>
  <text x="550" y="205" text-anchor="middle" font-size="11" font-weight="400" fill="#555">256^(150,528) possible inputs</text>
  <text x="550" y="228" text-anchor="middle" font-size="10" font-weight="400" fill="#999">(a 224&#215;224&#215;3 image)</text>

  <!-- ===== Tested portion (tiny green dot) ===== -->
  <circle cx="130" cy="200" r="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="130" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#333">Test</text>

  <!-- Label for test set -->
  <line x1="130" y1="222" x2="130" y2="280" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="60" y="283" width="140" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="130" y="300" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Test Set</text>
  <text x="130" y="314" text-anchor="middle" font-size="8" font-weight="400" fill="#555">50,000 images</text>

  <!-- ===== Gap annotation arrow ===== -->
  <line x1="210" y1="200" x2="750" y2="200" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="350" y="245" width="220" height="30" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="460" y="265" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">&#8776; Total Input Space</text>

  <!-- ===== Scale comparison ===== -->
  <rect x="580" y="310" width="230" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="695" y="330" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Scale comparison</text>
  <text x="695" y="346" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Tested: 5 &#215; 10&#8308; samples</text>
  <text x="695" y="360" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Possible: 10&#8310;&#8309;&#8309;&#8315;&#8313;&#8311;&#8310; inputs</text>

  <!-- ===== Implication box ===== -->
  <rect x="100" y="405" width="700" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="422" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Implication: Exhaustive testing is impossible.</text>
  <text x="450" y="437" text-anchor="middle" font-size="9" font-weight="400" fill="#555">ML systems require statistical monitoring, not deterministic verification.</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">The verification gap is effectively infinite &#8212; statistical monitoring replaces exhaustive testing.</text>
</svg>
