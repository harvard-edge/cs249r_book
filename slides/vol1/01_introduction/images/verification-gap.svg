<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#ffffff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="40" text-anchor="middle" font-size="16" font-weight="600" fill="#333333" letter-spacing="1">THE VERIFICATION GAP</text>

  <!-- ===== Total input space (enormous rectangle) ===== -->
  <rect x="50" y="70" width="800" height="320" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <g text-anchor="middle" fill="#c44" font-weight="700">
    <text x="450" y="110" font-size="14">Unexplored Input Space</text>
    <text x="450" y="140" font-size="15" fill="#555555">
      ≈10<tspan baseline-shift="super" font-size="10px">362,253</tspan> possible inputs
    </text>
    <text x="450" y="158" font-size="10" font-weight="400" fill="#999999">(for a single 224×224×3 pixel image)</text>
  </g>

  <!-- ===== Tested portion (tiny green circle) ===== -->
  <circle cx="150" cy="225" r="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>

  <!-- Label for test set -->
  <path d="M150,237 v40" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="80" y="280" width="140" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <g text-anchor="middle" transform="translate(150, 305)">
    <text y="-5" font-size="11" font-weight="700" fill="#333333">Test Set</text>
    <text y="12" font-size="10" font-weight="400" fill="#555555">~50,000 images</text>
  </g>

  <!-- ===== Gap annotation arrow ===== -->
  <path d="M 175,225 Q 485,160 800,225" fill="none" stroke="#a31f34" stroke-width="2.5" marker-end="url(#arrow-accent)"/>
  <line x1="485" y1="192" x2="485" y2="240" stroke="#a31f34" stroke-width="1.5"/>
  <rect x="400" y="243" width="170" height="30" rx="15" fill="#a31f34" stroke="#ffffff" stroke-width="2"/>
  <text x="485" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">The Verification Gap</text>

  <!-- ===== Scale comparison ===== -->
  <rect x="630" y="280" width="210" height="65" rx="4" fill="#f7f7f7" stroke="#bbbbbb" stroke-width="1" filter="url(#drop-shadow)"/>
  <g text-anchor="middle" transform="translate(735, 298)">
    <text font-size="11" font-weight="700" fill="#333333">Scale Comparison</text>
    <text y="18" font-size="9" font-weight="400" fill="#555555">
      Tested: 5 × 10<tspan baseline-shift="super" font-size="8px">4</tspan> samples
    </text>
    <text y="32" font-size="9" font-weight="400" fill="#555555">
      Possible: ≈10<tspan baseline-shift="super" font-size="8px">362,253</tspan> inputs
    </text>
  </g>

  <!-- ===== Implication box ===== -->
  <rect x="100" y="410" width="700" height="55" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" filter="url(#drop-shadow)"/>
  <text x="450" y="438" text-anchor="middle" font-size="10.5" fill="#333333">
    <tspan x="450" dy="-0.6em" font-weight="700">Implication: Exhaustive testing is computationally impossible.</tspan>
    <tspan x="450" dy="1.4em" font-weight="500">ML systems require statistical monitoring, not deterministic verification.</tspan>
  </text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" fill="#999999" font-style="italic">The verification gap is effectively infinite for continuous or high-dimensional inputs.</text>
</svg>
