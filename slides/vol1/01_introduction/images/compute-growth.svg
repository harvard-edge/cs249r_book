<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <linearGradient id="ai-fill" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#cfe2f3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#cfe2f3" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#333">AI Compute Growth vs. Moore's Law</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis -->
  <line x1="120" y1="60" x2="120" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="30" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#333" transform="rotate(-90, 30, 235)">Compute (FLOPs, log scale)</text>

  <!-- Y-axis tick labels -->
  <text x="110" y="393" text-anchor="end" font-size="8.5" fill="#555">10^17</text>
  <line x1="115" y1="390" x2="120" y2="390" stroke="#333" stroke-width="1"/>
  <text x="110" y="333" text-anchor="end" font-size="8.5" fill="#555">10^19</text>
  <line x1="115" y1="330" x2="120" y2="330" stroke="#333" stroke-width="1"/>
  <text x="110" y="273" text-anchor="end" font-size="8.5" fill="#555">10^21</text>
  <line x1="115" y1="270" x2="120" y2="270" stroke="#333" stroke-width="1"/>
  <text x="110" y="213" text-anchor="end" font-size="8.5" fill="#555">10^23</text>
  <line x1="115" y1="210" x2="120" y2="210" stroke="#333" stroke-width="1"/>
  <text x="110" y="153" text-anchor="end" font-size="8.5" fill="#555">10^25</text>
  <line x1="115" y1="150" x2="120" y2="150" stroke="#333" stroke-width="1"/>
  <text x="110" y="93" text-anchor="end" font-size="8.5" fill="#555">10^27</text>
  <line x1="115" y1="90" x2="120" y2="90" stroke="#333" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="120" y1="330" x2="820" y2="330" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="270" x2="820" y2="270" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="210" x2="820" y2="210" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="150" x2="820" y2="150" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="90" x2="820" y2="90" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- X-axis -->
  <line x1="120" y1="400" x2="830" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="470" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Year</text>

  <!-- X-axis tick labels: 2012 to 2024 -->
  <text x="150" y="418" text-anchor="middle" font-size="8.5" fill="#555">2012</text>
  <line x1="150" y1="400" x2="150" y2="405" stroke="#333" stroke-width="1"/>
  <text x="265" y="418" text-anchor="middle" font-size="8.5" fill="#555">2014</text>
  <line x1="265" y1="400" x2="265" y2="405" stroke="#333" stroke-width="1"/>
  <text x="380" y="418" text-anchor="middle" font-size="8.5" fill="#555">2016</text>
  <line x1="380" y1="400" x2="380" y2="405" stroke="#333" stroke-width="1"/>
  <text x="495" y="418" text-anchor="middle" font-size="8.5" fill="#555">2018</text>
  <line x1="495" y1="400" x2="495" y2="405" stroke="#333" stroke-width="1"/>
  <text x="610" y="418" text-anchor="middle" font-size="8.5" fill="#555">2020</text>
  <line x1="610" y1="400" x2="610" y2="405" stroke="#333" stroke-width="1"/>
  <text x="725" y="418" text-anchor="middle" font-size="8.5" fill="#555">2022</text>
  <line x1="725" y1="400" x2="725" y2="405" stroke="#333" stroke-width="1"/>
  <text x="810" y="418" text-anchor="middle" font-size="8.5" fill="#555">2024</text>
  <line x1="810" y1="400" x2="810" y2="405" stroke="#333" stroke-width="1"/>

  <!-- ===== Moore's Law line (dashed, gray) ===== -->
  <!-- 2-year doubling: from ~10^17 at 2012 to ~10^23 at 2024 (6 doublings in 12 years) -->
  <path d="M150,390 L265,360 L380,330 L495,300 L610,270 L725,240 L810,218"
        fill="none" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="815" y="210" font-size="9" font-weight="700" fill="#999">Moore's Law</text>
  <text x="815" y="222" font-size="8" fill="#999">(2-year doubling)</text>

  <!-- ===== AI Compute line (solid, blue) ===== -->
  <!-- 3.4-month doubling: much steeper. From ~10^17 at 2012 to ~10^27 at 2024 -->
  <path d="M150,390 L210,370 L265,340 L320,305 L380,260 L440,215 L495,170 L550,130 L610,100 L670,82 L725,72 L810,65"
        fill="none" stroke="#4a90c4" stroke-width="2.5"/>
  <!-- Fill area under AI curve -->
  <path d="M150,390 L210,370 L265,340 L320,305 L380,260 L440,215 L495,170 L550,130 L610,100 L670,82 L725,72 L810,65 L810,400 L150,400 Z"
        fill="url(#ai-fill)" opacity="0.5"/>

  <text x="610" y="78" font-size="9" font-weight="700" fill="#4a90c4">AI Compute Demand</text>

  <!-- ===== Annotations ===== -->
  <!-- Doubling rate annotation -->
  <rect x="200" y="120" width="175" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="287" y="139" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Doubles every 3.4 months</text>
  <text x="287" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#a31f34">7x faster than Moore's Law</text>

  <!-- Arrow from annotation to gap -->
  <line x1="375" y1="155" x2="440" y2="200" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Gap annotation -->
  <line x1="610" y1="100" x2="610" y2="270" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="632" y="185" font-size="9" font-weight="700" fill="#a31f34" transform="rotate(90, 632, 185)">Growing gap</text>

  <!-- ===== Legend ===== -->
  <line x1="140" y1="65" x2="170" y2="65" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="175" y="69" font-size="9" fill="#333">AI compute demand</text>
  <line x1="310" y1="65" x2="340" y2="65" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="345" y="69" font-size="9" fill="#333">Moore's Law projection</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-style="italic" fill="#999">AI compute demand grows 7x faster than Moore's Law can supply.</text>
</svg>
