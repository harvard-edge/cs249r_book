<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="arrow-accent" viewBox="0 0 8 8" refX="7.5" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#a31f34" />
    </marker>
    <marker id="arrow-compute" viewBox="0 0 8 8" refX="7.5" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#4a90c4" />
    </marker>
    <marker id="arrow-error-start" viewBox="0 0 8 8" refX="1" refY="4" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 8 0 L 0 4 L 8 8 Z" fill="#c44" />
    </marker>
    <marker id="arrow-error-end" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M 0 0 L 8 4 L 0 8 Z" fill="#c44" />
    </marker>
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="16px" font-weight="600" fill="#333">AI Compute Growth vs. Moore's Law</text>
  <!-- Axes -->
  <line x1="100" y1="80" x2="100" y2="420" stroke="#666" stroke-width="1.5"/>
  <text x="45" y="240" text-anchor="middle" font-size="11px" font-weight="500" fill="#333">
    <tspan x="45">Compute Scale</tspan>
    <tspan x="45" dy="1.4em" font-size="10px" fill="#555">(FLOP/s, log)</tspan>
  </text>
  <line x1="100" y1="420" x2="850" y2="420" stroke="#666" stroke-width="1.5"/>
  <text x="475" y="460" text-anchor="middle" font-size="12px" font-weight="500" fill="#333">Year</text>
  <!-- Y-axis Ticks & Gridlines -->
  <g font-size="10px" text-anchor="end" fill="#555">
    <text x="90" y="403">10<tspan baseline-shift="super" font-size="7.5px">18</tspan></text>
    <line x1="100" y1="400" x2="850" y2="400" stroke="#e0e0e0" stroke-width="1"/>
    <text x="90" y="333">10<tspan baseline-shift="super" font-size="7.5px">21</tspan></text>
    <line x1="100" y1="330" x2="850" y2="330" stroke="#e0e0e0" stroke-width="1"/>
    <text x="90" y="263">10<tspan baseline-shift="super" font-size="7.5px">24</tspan></text>
    <line x1="100" y1="260" x2="850" y2="260" stroke="#e0e0e0" stroke-width="1"/>
    <text x="90" y="193">10<tspan baseline-shift="super" font-size="7.5px">27</tspan></text>
    <line x1="100" y1="190" x2="850" y2="190" stroke="#e0e0e0" stroke-width="1"/>
    <text x="90" y="123">10<tspan baseline-shift="super" font-size="7.5px">30</tspan></text>
    <line x1="100" y1="120" x2="850" y2="120" stroke="#e0e0e0" stroke-width="1"/>
  </g>
  <!-- X-axis Ticks -->
  <g font-size="10px" text-anchor="middle" fill="#555">
    <text x="140" y="438">2012</text><line x1="140" y1="420" x2="140" y2="425" stroke="#777"/>
    <text x="259" y="438">2014</text><line x1="259" y1="420" x2="259" y2="425" stroke="#777"/>
    <text x="378" y="438">2016</text><line x1="378" y1="420" x2="378" y2="425" stroke="#777"/>
    <text x="497" y="438">2018</text><line x1="497" y1="420" x2="497" y2="425" stroke="#777"/>
    <text x="616" y="438">2020</text><line x1="616" y1="420" x2="616" y2="425" stroke="#777"/>
    <text x="735" y="438">2022</text><line x1="735" y1="420" x2="735" y2="425" stroke="#777"/>
    <text x="845" y="438">2024</text><line x1="845" y1="420" x2="845" y2="425" stroke="#777"/>
  </g>
  <!-- Data Paths -->
  <!-- Moore's Law: 2-year doubling period. Approx. slope of -33px per 2 years. -->
  <path id="moore-path" d="M140,400 C 200,383, 259,367, 319,350 L 378,333 L 437,316 L 497,300 L 556,283 L 616,267 L 675,250 L 735,233 L 794,216 L 845,200" fill="none" stroke="#b0b0b0" stroke-width="3" stroke-dasharray="8,5"/>
  <!-- AI Compute: 3.4-month doubling period. ~7x steeper slope. -->
  <path id="ai-path" d="M140,400 C 259,310, 378,200, 497,120 L 616,80 L 735,65 L 845,60" fill="none" stroke="#4a90c4" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Gap Area -->
  <path d="M497,300 L616,267 L735,233 L845,200 L845,60 L735,65 L616,80 L497,120 Z" fill="#f9d6d5" opacity="0.6"/>
  <!-- Annotations & Labels -->
  <g font-size="11px" font-weight="600">
    <text x="730" y="188" fill="#888">Moore's Law</text>
    <text x="730" y="204" font-size="9.5px" font-weight="400" fill="#999">(~2-year doubling)</text>
    <text x="690" y="55" fill="#4a90c4">AI Compute Demand</text>
  </g>
  
  <!-- Key Insight Box -->
  <g transform="translate(160, 100)" filter="url(#dropshadow)">
    <rect x="0" y="0" width="230" height="70" fill="#cfe2f3" stroke="#4a90c4" rx="5"/>
    <text x="115" y="22" text-anchor="middle" font-size="11px" font-weight="600" fill="#333">Growth: ~3.4-month doubling period</text>
    <rect x="40" y="38" width="150" height="24" fill="#a31f34" rx="12"/>
    <text x="115" y="54" text-anchor="middle" font-size="11.5px" font-weight="700" fill="#fff">7x faster than Moore's</text>
  </g>
  <path d="M360,170 C 400,195, 455,220, 490,230" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-accent)"/>
  <!-- Deficit Annotation -->
  <path d="M720,130 Q 720 180 720 228" stroke="#c44" stroke-width="2" marker-start="url(#arrow-error-start)" marker-end="url(#arrow-error-end)" fill="none"/>
  <text x="735" y="165" fill="#c44" font-size="11px" font-weight="600">The "Compute Deficit"</text>
  <text x="735" y="180" font-size="9.5px" font-weight="400" fill="#c44">Gap widens over time</text>
  <!-- Legend -->
  <g transform="translate(120, 70)" font-size="10px" font-weight="500">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#4a90c4" stroke-width="4"/>
    <text x="38" y="4" fill="#333">AI Compute Trend</text>
    <line x1="150" y1="0" x2="180" y2="0" stroke="#b0b0b0" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="188" y="4" fill="#333">Moore's Law</text>
  </g>
  <!-- Footnote -->
  <text x="450" y="488" text-anchor="middle" font-size="9.5px" font-style="italic" fill="#999999">Source: Adapted from OpenAI (2018), "AI and Compute". AI compute demand growth vastly outpaces Moore's Law.</text>
</svg>
