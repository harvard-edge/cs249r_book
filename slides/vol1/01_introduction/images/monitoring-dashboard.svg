<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <!-- 
    Redesigned by an expert SVG designer for clarity and aesthetic appeal in slide decks.
    - ViewBox: 0 0 900 500
    - Layout: Balanced circular flow with curved paths to prevent overlaps.
    - Colors: Semantic palette for Compute, Data, Routing, and Error states.
    - Typography: Horizontal text only, min 9px font-size for readability, Helsinki font.
    - Features: Drop shadows for depth, proper arrow markers, clear feedback loops.
  -->
  <rect width="900" height="500" fill="#ffffff" rx="8"/>

  <defs>
    <marker id="arrow-head" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arrow-head-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a31f34"/>
    </marker>
    <filter id="drop-shadow" x="-0.1" y="-0.1" width="1.2" height="1.2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="16px" font-weight="600" fill="#333">The MLOps Lifecycle: A Continuous Feedback Loop</text>
  
  <!-- Central Hub -->
  <g>
    <circle cx="450" cy="265" r="45" fill="#f8f9fa"/>
    <text x="450" y="260" text-anchor="middle" font-size="11px" font-weight="bold" fill="#a31f34">CONTINUOUS</text>
    <text x="450" y="278" text-anchor="middle" font-size="11px" font-weight="bold" fill="#a31f34">ITERATION</text>
  </g>

  <!-- Nodes with Drop Shadow -->
  <g filter="url(#drop-shadow)">
    <!-- Data Collection Node (Data) -->
    <rect x="120" y="100" width="180" height="60" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="210" y="125" text-anchor="middle" font-size="12px" font-weight="bold" fill="#212529">1. Data Collection</text>
    <text x="210" y="143" text-anchor="middle" font-size="10px" fill="#495057">Gather, label &amp; version data</text>

    <!-- Training Node (Compute) -->
    <rect x="600" y="100" width="180" height="60" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="690" y="125" text-anchor="middle" font-size="12px" font-weight="bold" fill="#212529">2. Model Training</text>
    <text x="690" y="143" text-anchor="middle" font-size="10px" fill="#495057">Build, tune &amp; validate model</text>

    <!-- Deployment Node (Routing) -->
    <rect x="600" y="370" width="180" height="60" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="690" y="395" text-anchor="middle" font-size="12px" font-weight="bold" fill="#212529">3. Deployment</text>
    <text x="690" y="413" text-anchor="middle" font-size="10px" fill="#495057">Serve model for inference</text>

    <!-- Monitoring Node (Error) -->
    <rect x="120" y="370" width="180" height="60" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
    <text x="210" y="395" text-anchor="middle" font-size="12px" font-weight="bold" fill="#a31f34">4. Monitoring</text>
    <text x="210" y="413" text-anchor="middle" font-size="10px" fill="#495057">Track drift, errors &amp; bias</text>
  </g>
  
  <!-- Arrows -->
  <g fill="none" stroke="#444" stroke-width="2.5" marker-end="url(#arrow-head)">
    <!-- Data -> Training -->
    <path d="M 305 130 C 400 130, 500 130, 595 130"/>
    <text x="450" y="118" text-anchor="middle" font-size="9px" fill="#555" font-style="italic">Curated Dataset</text>

    <!-- Training -> Deployment -->
    <path d="M 690 165 C 690 230, 690 300, 690 365"/>
    <text x="715" y="265" text-anchor="start" font-size="9px" fill="#555" font-style="italic">Validated Model</text>

    <!-- Deployment -> Monitoring -->
    <path d="M 595 400 C 500 400, 400 400, 305 400"/>
    <text x="450" y="412" text-anchor="middle" font-size="9px" fill="#555" font-style="italic">Live Predictions</text>
  </g>
  
  <!-- Feedback Loop Arrow (Accent Color) -->
  <g fill="none" stroke="#a31f34" stroke-width="2.5" marker-end="url(#arrow-head-accent)">
    <path d="M 210 365 C 210 250, 10 250, 210 165" stroke-dasharray="8 4"/>
  </g>
  <text x="90" y="255" text-anchor="middle" font-size="10px" font-weight="bold" fill="#a31f34">FEEDBACK LOOP</text>
  <text x="90" y="270" text-anchor="middle" font-size="9px" fill="#c44" font-style="italic">(Retrain Trigger)</text>
  
  <!-- Side Note: A/B Testing -->
  <g transform="translate(10, 220)">
      <rect x="0" y="0" width="150" height="55" rx="5" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="10px" font-weight="bold" fill="#343a40">A/B Test Cadence</text>
      <text x="75" y="34" text-anchor="middle" font-size="9px" fill="#495057">ML Models: 4-6 weeks</text>
      <text x="75" y="46" text-anchor="middle" font-size="9px" fill="#495057">UI Change: 2-3 days</text>
  </g>

  <!-- Footnote -->
  <text x="450" y="488" text-anchor="middle" font-size="9px" font-style="italic" fill="#999999">Monitoring is the engine of iteration; performance degradation or drift triggers a feedback loop to retrain the system.</text>

</svg>
