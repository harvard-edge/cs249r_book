<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#333">ML System Lifecycle: Continuous Iteration Loop</text>

  <!-- ===== Circular Layout ===== -->
  <!-- Center of circle at (380, 260), radius ~150 -->
  <!-- 5 nodes at: top (Data), top-right (Training), bottom-right (Deploy), bottom-left (Monitor), top-left (Retrain overlap with Training) -->

  <!-- Node positions (pentagon, clockwise from top):
       1. Data Collection:   (380, 100)
       2. Training:          (523, 185)
       3. Deployment:        (475, 350)
       4. Monitoring:        (285, 350)
       5. Retrain trigger:   (237, 185)
  -->

  <!-- ===== Node 1: Data Collection (green) ===== -->
  <rect x="305" y="75" width="150" height="55" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="380" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Data Collection</text>
  <text x="380" y="118" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Gather &amp; curate</text>

  <!-- ===== Node 2: Training (blue) ===== -->
  <rect x="530" y="155" width="150" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="605" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Training</text>
  <text x="605" y="198" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Fit model to data</text>

  <!-- ===== Node 3: Deployment (orange) ===== -->
  <rect x="490" y="310" width="150" height="55" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="565" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Deployment</text>
  <text x="565" y="353" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Serve predictions</text>

  <!-- ===== Node 4: Monitoring (red accent) ===== -->
  <rect x="220" y="310" width="150" height="55" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="295" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">Monitoring</text>
  <text x="295" y="353" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Detect drift &amp; errors</text>

  <!-- ===== Node 5: Retrain (dashed, back to training) ===== -->
  <rect x="130" y="155" width="150" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="205" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Retrain</text>
  <text x="205" y="198" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Update model</text>

  <!-- ===== Arrows (clockwise) ===== -->

  <!-- Arrow 1: Data Collection -> Training -->
  <line x1="455" y1="115" x2="528" y2="162" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Arrow 2: Training -> Deployment -->
  <line x1="610" y1="210" x2="580" y2="308" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Arrow 3: Deployment -> Monitoring -->
  <line x1="490" y1="342" x2="372" y2="342" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Arrow 4: Monitoring -> Retrain -->
  <line x1="255" y1="310" x2="220" y2="212" stroke="#a31f34" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- Arrow 5: Retrain -> Data Collection (feeds back) -->
  <line x1="235" y1="155" x2="320" y2="118" stroke="#3d9e5a" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- Retrain -> Training direct shortcut -->
  <line x1="280" y1="180" x2="528" y2="180" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="405" y="172" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Skip to retrain</text>

  <!-- ===== Key Annotation near Monitoring ===== -->
  <rect x="90" y="370" width="190" height="30" rx="12" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="185" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Drift detected -> retrain</text>
  <line x1="245" y1="365" x2="272" y2="365" stroke="#c44" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- ===== Side Note: A/B Test ===== -->
  <rect x="650" y="240" width="210" height="65" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="755" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#333">A/B Testing Timeline</text>
  <text x="755" y="278" text-anchor="middle" font-size="9.5" font-weight="400" fill="#555">ML model: 4-6 weeks</text>
  <text x="755" y="294" text-anchor="middle" font-size="9.5" font-weight="400" fill="#555">Traditional software: 2-3 days</text>

  <!-- ===== Loop emphasis: curved "CONTINUOUS" label ===== -->
  <rect x="325" y="225" width="120" height="28" rx="14" fill="#a31f34" stroke="none"/>
  <text x="385" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">CONTINUOUS</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">ML systems require continuous iteration -- monitoring feeds back into data and retraining.</text>
</svg>
