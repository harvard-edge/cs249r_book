<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#333">The D&#183;A&#183;M Taxonomy</text>

  <!-- ===== Triangle edges (background) ===== -->
  <polygon points="450,80 180,400 720,400" fill="none" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ===== Interdependence arrows along edges ===== -->
  <!-- Left edge: Algorithm -> Data -->
  <line x1="340" y1="170" x2="230" y2="340" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="270" y1="320" x2="370" y2="190" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Right edge: Algorithm -> Machine -->
  <line x1="560" y1="170" x2="670" y2="340" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="630" y1="320" x2="530" y2="190" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Bottom edge: Data -> Machine -->
  <line x1="290" y1="405" x2="560" y2="405" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="530" y1="420" x2="310" y2="420" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- ===== Algorithm node (top) ===== -->
  <rect x="370" y="62" width="160" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Algorithm</text>
  <text x="450" y="106" text-anchor="middle" font-size="10" font-weight="400" fill="#555">O, architecture</text>

  <!-- ===== Data node (bottom-left) ===== -->
  <rect x="100" y="370" width="160" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="180" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Data</text>
  <text x="180" y="414" text-anchor="middle" font-size="10" font-weight="400" fill="#555">D_vol, BW</text>

  <!-- ===== Machine node (bottom-right) ===== -->
  <rect x="640" y="370" width="160" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="720" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Machine</text>
  <text x="720" y="414" text-anchor="middle" font-size="10" font-weight="400" fill="#555">R_peak, memory</text>

  <!-- ===== Center label ===== -->
  <rect x="390" y="250" width="120" height="40" rx="12" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ML System</text>

  <!-- ===== Edge labels ===== -->
  <text x="290" y="230" text-anchor="middle" font-size="9" font-weight="400" fill="#555" transform="rotate(-40,290,230)">algorithmic demand</text>
  <text x="610" y="230" text-anchor="middle" font-size="9" font-weight="400" fill="#555" transform="rotate(40,610,230)">hardware supply</text>
  <text x="450" y="450" text-anchor="middle" font-size="9" font-weight="400" fill="#555">data movement</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">The D&#183;A&#183;M taxonomy: every ML system bottleneck maps to one of three axes.</text>
</svg>
