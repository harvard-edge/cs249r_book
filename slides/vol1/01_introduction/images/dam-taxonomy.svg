<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#555" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#a31f34" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#3d9e5a" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#4a90c4" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#c87b2a" />
    </marker>
  </defs>

  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="#333" letter-spacing="0.5">THE D·A·M TAXONOMY OF ML SYSTEMS</text>

  <!-- ===== Main Diagram Group ===== -->
  <g filter="url(#shadow)">
    <!-- ===== Algorithm node (top) ===== -->
    <rect x="375" y="80" width="150" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="450" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Algorithm</text>
    <text x="450" y="119" text-anchor="middle" font-size="9.5" font-weight="700" fill="#4a90c4">O, Architecture</text>

    <!-- ===== Data node (bottom-left) ===== -->
    <rect x="125" y="365" width="150" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="200" y="387" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Data</text>
    <text x="200" y="404" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3d9e5a">
      D<tspan baseline-shift="sub" font-size="8px">vol</tspan>, BW
    </text>

    <!-- ===== Machine node (bottom-right) ===== -->
    <rect x="625" y="365" width="150" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="700" y="387" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Machine</text>
    <text x="700" y="404" text-anchor="middle" font-size="9.5" font-weight="700" fill="#c87b2a">
      R<tspan baseline-shift="sub" font-size="8px">peak</tspan>, Memory
    </text>

    <!-- ===== Center label ===== -->
    <rect x="395" y="245" width="110" height="34" rx="17" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
    <text x="450" y="266" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">ML System</text>
  </g>

  <!-- ===== Triangle background hint ===== -->
  <polygon points="450,140 280,400 620,400" fill="none" stroke="#ddd" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- ===== Interdependence Arrows & Labels ===== -->
  <!-- Left edge: Algorithm <-> Data -->
  <path d="M 370 160 Q 300 250 280 350" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 290 350 Q 310 250 380 160" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="315" y="195" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">Model Complexity</text>
  <text x="315" y="325" text-anchor="middle" font-size="9" font-weight="400" fill="#3d9e5a">Data Efficiency</text>

  <!-- Right edge: Algorithm <-> Machine -->
  <path d="M 530 160 Q 600 250 620 350" fill="none" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 610 350 Q 590 250 520 160" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="585" y="195" text-anchor="middle" font-size="9" font-weight="400" fill="#4a90c4">Hardware Demand</text>
  <text x="585" y="325" text-anchor="middle" font-size="9" font-weight="400" fill="#c87b2a">Hardware Enablement</text>

  <!-- Bottom edge: Data <-> Machine -->
  <path d="M 285 392 L 615 392" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <path d="M 615 408 L 285 408" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="450" y="384" text-anchor="middle" font-size="9" font-weight="400" fill="#3d9e5a">Data Throughput</text>
  <text x="450" y="423" text-anchor="middle" font-size="9" font-weight="400" fill="#c87b2a">I/O Bottleneck</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-style="italic" fill="#999">The D·A·M taxonomy: every ML system bottleneck maps to one of three interdependent axes.</text>
</svg>
