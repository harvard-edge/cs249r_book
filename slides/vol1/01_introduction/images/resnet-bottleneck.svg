<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="dropshadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-compute" markerWidth="10" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-data" markerWidth="10" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-accent" markerWidth="10" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#ffffff" rx="8"/>
  <text x="450" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">ResNet-50 Bottleneck Analysis at Batch Size = 1</text>
  <!-- Y Axis -->
  <line x1="150" y1="80" x2="150" y2="400" stroke="#ccc" stroke-width="1"/>
  <text x="140" y="85" text-anchor="end" font-size="10" fill="#555">TFLOPS</text>
  <text x="140" y="405" text-anchor="end" font-size="10" fill="#555">0</text>
  <line x1="145" y1="400" x2="150" y2="400" stroke="#ccc" stroke-width="1"/>
  <!-- Compute Capacity Bar -->
  <g filter="url(#dropshadow)">
    <rect x="180" y="100" width="150" height="300" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
    <text x="255" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c5775">312</text>
    <text x="255" y="260" text-anchor="middle" font-size="11" fill="#2c5775">TFLOPS<tspan baseline-shift="sub" font-size="9px">peak</tspan></text>
  </g>
  <text x="255" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">A100 Compute Capacity</text>
  <line x1="140" y1="100" x2="150" y2="100" stroke="#ccc" stroke-width="1"/>
  <text x="135" y="104" text-anchor="end" font-size="10" fill="#555">312</text>
  <!-- Memory Bandwidth Bar -->
  <g filter="url(#dropshadow)">
    <rect x="370" y="345" width="150" height="55" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
    <text x="445" y="375" text-anchor="middle" font-size="16" font-weight="bold" fill="#255c36">51</text>
    <text x="445" y="390" text-anchor="middle" font-size="10" fill="#255c36">TFLOPS<tspan baseline-shift="sub" font-size="8px">eff</tspan></text>
  </g>
  <text x="445" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Effective Throughput</text>
  <text x="445" y="435" text-anchor="middle" font-size="9" fill="#555">(Memory Bound)</text>
  <line x1="140" y1="345" x2="150" y2="345" stroke="#ccc" stroke-width="1"/>
  <text x="135" y="349" text-anchor="end" font-size="10" fill="#555">51</text>
  <!-- Gap Highlight -->
  <path d="M330 100 L520 100" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4 2" />
  <path d="M520 345 L330 345" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4 2" />
  <path d="M540,105 Q560,225 540,345" stroke="#a31f34" fill="none" stroke-width="2.5"/>
  <path d="M530,105 L540,105" stroke="#a31f34" fill="none" stroke-width="2.5"/>
  <path d="M530,345 L540,345" stroke="#a31f34" fill="none" stroke-width="2.5"/>
  <g text-anchor="start" fill="#a31f34">
    <text x="575" y="215" font-size="20" font-weight="bold">6.1x Gap</text>
    <text x="575" y="235" font-size="11">Accelerator is data-starved.</text>
    <text x="575" y="250" font-size="11">Performance is limited by</text>
    <text x="575" y="265" font-size="11">memory, not compute.</text>
  </g>
  <!-- Top Right Annotation -->
  <g filter="url(#dropshadow)">
    <rect x="570" y="70" width="290" height="45" rx="5" fill="#f9d6d5" stroke="#c4444" stroke-width="1.5"/>
    <text x="715" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#a31f34">At Batch Size = 1,</text>
    <text x="715" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#a31f34">ResNet-50 is Memory-Bound</text>
  </g>
  <path d="M640,115 Q600,150 445,340" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="3,3"/>
  <!-- Table -->
  <g filter="url(#dropshadow)">
    <rect x="600" y="320" width="260" height="110" rx="5" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="730" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ResNet-50 Inference Profile</text>
    <line x1="610" y1="350" x2="850" y2="350" stroke="#e9ecef" stroke-width="1"/>
    
    <text x="615" y="368" font-size="10" fill="#555">Model Operations</text>
    <text x="845" y="368" text-anchor="end" font-size="10" font-weight="bold" fill="#333">8.0 GFLOPs</text>
    <text x="615" y="390" font-size="10" fill="#555">Memory Footprint</text>
    <text x="845" y="390" text-anchor="end" font-size="10" font-weight="bold" fill="#333">102.0 MB</text>
    
    <text x="615" y="412" font-size="10" font-weight="bold" fill="#c87b2a">Arithmetic Intensity</text>
    <text x="845" y="412" text-anchor="end" font-size="10" font-weight="bold" fill="#c87b2a">78.4 FLOPs/Byte</text>
  </g>
  
  <path d="M720,430 Q650,440 525,380" fill="none" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-accent)" stroke-dasharray="3,3"/>
  <text x="660" y="445" font-size="9" fill="#c87b2a">Low AI means high data demand vs compute</text>
  <!-- Footnote -->
  <text x="450" y="488" text-anchor="middle" font-size="9.5" fill="#999" font-style="italic">Unlike large-batch training, single-unit inference is often bottlenecked by data movement, not raw compute power.</text>
</svg>
