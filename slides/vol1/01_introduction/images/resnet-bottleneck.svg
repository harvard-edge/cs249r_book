<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#333">ResNet-50 Bottleneck Analysis at Batch Size = 1</text>

  <!-- ===== Bar Chart Area ===== -->
  <!-- Y-axis -->
  <line x1="140" y1="70" x2="140" y2="350" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="75" text-anchor="end" font-size="9" font-weight="400" fill="#555">TFLOPS</text>

  <!-- Y-axis ticks -->
  <text x="130" y="98" text-anchor="end" font-size="8.5" font-weight="400" fill="#555">312</text>
  <line x1="133" y1="95" x2="140" y2="95" stroke="#bbb" stroke-width="0.8"/>

  <text x="130" y="260" text-anchor="end" font-size="8.5" font-weight="400" fill="#555">51</text>
  <line x1="133" y1="257" x2="140" y2="257" stroke="#bbb" stroke-width="0.8"/>

  <text x="130" y="353" text-anchor="end" font-size="8.5" font-weight="400" fill="#555">0</text>

  <!-- X-axis baseline -->
  <line x1="140" y1="350" x2="560" y2="350" stroke="#bbb" stroke-width="1"/>

  <!-- ===== Compute Capacity Bar (tall blue) ===== -->
  <rect x="190" y="90" width="130" height="260" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#333">312</text>
  <text x="255" y="198" text-anchor="middle" font-size="10" font-weight="400" fill="#555">TFLOPS</text>
  <text x="255" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Compute</text>
  <text x="255" y="384" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Capacity</text>

  <!-- ===== Memory Bandwidth Bar (shorter green) ===== -->
  <rect x="390" y="252" width="130" height="98" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="455" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#333">51</text>
  <text x="455" y="313" text-anchor="middle" font-size="10" font-weight="400" fill="#555">TFLOPS eff.</text>
  <text x="455" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Memory BW</text>
  <text x="455" y="384" text-anchor="middle" font-size="9" font-weight="400" fill="#555">2,039 GB/s</text>

  <!-- ===== Gap Highlight (red) ===== -->
  <rect x="325" y="90" width="60" height="162" rx="0" fill="#f9d6d5" stroke="none" opacity="0.5"/>
  <line x1="320" y1="170" x2="390" y2="170" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Red bracket showing gap -->
  <line x1="540" y1="95" x2="555" y2="95" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="555" y1="95" x2="555" y2="255" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="540" y1="255" x2="555" y2="255" stroke="#a31f34" stroke-width="1.5"/>
  <text x="570" y="165" text-anchor="start" font-size="12" font-weight="700" fill="#a31f34">6x gap</text>
  <text x="570" y="183" text-anchor="start" font-size="10" font-weight="400" fill="#a31f34">Accelerator</text>
  <text x="570" y="198" text-anchor="start" font-size="10" font-weight="400" fill="#a31f34">starves for data</text>

  <!-- ===== Annotation ===== -->
  <rect x="560" y="72" width="290" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="705" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">At batch=1, memory cannot feed compute fast enough</text>

  <!-- ===== Small Table ===== -->
  <rect x="590" y="260" width="260" height="100" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="720" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#333">ResNet-50 Profile</text>

  <!-- Table rows -->
  <line x1="605" y1="290" x2="835" y2="290" stroke="#ddd" stroke-width="0.8"/>
  <text x="610" y="308" font-size="9" font-weight="400" fill="#555">Operations</text>
  <text x="835" y="308" text-anchor="end" font-size="9" font-weight="700" fill="#333">7.7 GFLOPs</text>

  <line x1="605" y1="316" x2="835" y2="316" stroke="#ddd" stroke-width="0.8"/>
  <text x="610" y="334" font-size="9" font-weight="400" fill="#555">Parameters</text>
  <text x="835" y="334" text-anchor="end" font-size="9" font-weight="700" fill="#333">97.5 MB</text>

  <line x1="605" y1="342" x2="835" y2="342" stroke="#ddd" stroke-width="0.8"/>
  <text x="610" y="355" font-size="9" font-weight="400" fill="#555">Arithmetic Intensity</text>
  <text x="835" y="355" text-anchor="end" font-size="9" font-weight="700" fill="#333">79 FLOPs/B</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">ResNet-50 at batch 1 is memory-bandwidth bound -- the opposite of LLM training.</text>
</svg>
