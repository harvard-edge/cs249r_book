<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Two Paradigms of Programming</text>

  <!-- ===== Center divider ===== -->
  <line x1="450" y1="55" x2="450" y2="460" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== LEFT: Software 1.0 ===== -->
  <text x="225" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#555">Software 1.0</text>

  <!-- Programmer -->
  <rect x="145" y="100" width="160" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="121" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Programmer</text>
  <text x="225" y="138" text-anchor="middle" font-size="9" font-weight="400" fill="#555">writes logic</text>

  <!-- Arrow -->
  <line x1="225" y1="150" x2="225" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Code -->
  <rect x="145" y="180" width="160" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="201" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Source Code</text>
  <text x="225" y="218" text-anchor="middle" font-size="9" font-weight="400" fill="#555">if/else, loops, functions</text>

  <!-- Arrow -->
  <line x1="225" y1="230" x2="225" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Compiler -->
  <rect x="145" y="260" width="160" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="281" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Compiler</text>
  <text x="225" y="298" text-anchor="middle" font-size="9" font-weight="400" fill="#555">deterministic transform</text>

  <!-- Arrow -->
  <line x1="225" y1="310" x2="225" y2="335" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Binary -->
  <rect x="145" y="340" width="160" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="361" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Binary</text>
  <text x="225" y="378" text-anchor="middle" font-size="9" font-weight="400" fill="#555">executable program</text>

  <!-- ===== RIGHT: Software 2.0 ===== -->
  <text x="675" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#4a90c4">Software 2.0</text>

  <!-- Curator -->
  <rect x="595" y="100" width="160" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="675" y="121" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Curator</text>
  <text x="675" y="138" text-anchor="middle" font-size="9" font-weight="400" fill="#555">selects data</text>

  <!-- Arrow -->
  <line x1="675" y1="150" x2="675" y2="175" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Dataset -->
  <rect x="595" y="180" width="160" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="675" y="201" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Dataset</text>
  <text x="675" y="218" text-anchor="middle" font-size="9" font-weight="400" fill="#555">examples, labels, tokens</text>

  <!-- Arrow -->
  <line x1="675" y1="230" x2="675" y2="255" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- SGD -->
  <rect x="595" y="260" width="160" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="675" y="281" text-anchor="middle" font-size="11" font-weight="700" fill="#333">SGD</text>
  <text x="675" y="298" text-anchor="middle" font-size="9" font-weight="400" fill="#555">stochastic optimization</text>

  <!-- Arrow -->
  <line x1="675" y1="310" x2="675" y2="335" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Weights -->
  <rect x="595" y="340" width="160" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="675" y="361" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Weights</text>
  <text x="675" y="378" text-anchor="middle" font-size="9" font-weight="400" fill="#555">learned parameters</text>

  <!-- ===== Analogy annotations ===== -->
  <text x="450" y="130" text-anchor="middle" font-size="8.5" font-weight="400" fill="#999">&#8592; human author &#8594;</text>
  <text x="450" y="210" text-anchor="middle" font-size="8.5" font-weight="400" fill="#999">&#8592; source code &#8594;</text>
  <text x="450" y="290" text-anchor="middle" font-size="8.5" font-weight="400" fill="#999">&#8592; compilation &#8594;</text>
  <text x="450" y="370" text-anchor="middle" font-size="8.5" font-weight="400" fill="#999">&#8592; artifact &#8594;</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">In Software 2.0, data is source code and training is compilation.</text>
</svg>
