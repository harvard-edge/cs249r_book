<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="drop-shadow" x="-0.15" y="-0.15" width="1.3" height="1.3">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1.5" dy="1.5" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.1"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="45" text-anchor="middle" font-size="18" font-weight="600" fill="#333">Two Paradigms of Programming</text>
  <line x1="450" y1="75" x2="450" y2="455" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="225" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#555">Software 1.0: Explicit Instructions</text>
  <g filter="url(#drop-shadow)">
    <rect x="145" y="115" width="160" height="60" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
    <text x="225" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Programmer</text>
    <text x="225" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#555">Writes explicit rules</text>
  </g>
  <path d="M225,175 L225,200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <g filter="url(#drop-shadow)">
    <rect x="145" y="200" width="160" height="60" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
    <text x="225" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Source Code</text>
    <text x="225" y="243" text-anchor="middle" font-size="10" font-weight="400" fill="#555">if/else, loops, functions</text>
  </g>
  <path d="M225,260 L225,285" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <g filter="url(#drop-shadow)">
    <rect x="145" y="285" width="160" height="60" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
    <text x="225" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Compiler</text>
    <text x="225" y="328" text-anchor="middle" font-size="10" font-weight="400" fill="#555">Deterministic transform</text>
  </g>
  <path d="M225,345 L225,370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <g filter="url(#drop-shadow)">
    <rect x="145" y="370" width="160" height="60" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
    <text x="225" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Binary Program</text>
    <text x="225" y="413" text-anchor="middle" font-size="10" font-weight="400" fill="#555">Executable artifact</text>
  </g>
  <text x="675" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#4a90c4">Software 2.0: Learned Behavior</text>
  <g filter="url(#drop-shadow)">
    <rect x="480" y="115" width="160" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="560" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#2a6b41">Data &amp; Labels</text>
    <text x="560" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#2a6b41">(Curated by human)</text>
  </g>
  <g filter="url(#drop-shadow)">
    <rect x="690" y="115" width="160" height="60" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="770" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#32668a">Architecture</text>
    <text x="770" y="158" text-anchor="middle" font-size="10" font-weight="400" fill="#32668a">(Designed by human)</text>
  </g>
  <path d="M560,175 C 560,215 600,215 615,225" fill="none" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M770,175 C 770,215 730,215 715,225" fill="none" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <g filter="url(#drop-shadow)">
    <rect x="585" y="225" width="160" height="85" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
    <text x="665" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#8c561d">Optimizer</text>
    <text x="665" y="273" text-anchor="middle" font-size="9.5" font-weight="400" fill="#8c561d">Finds optimal parameters</text>
    <text x="665" y="288" text-anchor="middle" font-size="9.5" font-weight="400" fill="#8c561d">via optimization (e.g. SGD)</text>
  </g>
  <path d="M665,310 L665,335" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <g filter="url(#drop-shadow)">
    <rect x="585" y="335" width="160" height="60" rx="5" fill="#4a90c4" stroke="#3c7aa3" stroke-width="1.5"/>
    <text x="665" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Model Weights</text>
    <text x="665" y="378" text-anchor="middle" font-size="10" font-weight="400" fill="#fff">The "learned" program</text>
  </g>
  <text x="450" y="488" text-anchor="middle" font-size="10" font-weight="400" fill="#999" font-style="italic">In Software 2.0, data is the source code and optimization is the compiler.</text>
</svg>
