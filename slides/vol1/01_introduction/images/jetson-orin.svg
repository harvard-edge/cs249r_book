<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="400" height="300" fill="#fff" rx="4"/>

  <!-- ===== Jetson Orin Module ===== -->
  <!-- Carrier board base -->
  <rect x="80" y="90" width="240" height="90" rx="4" fill="#1a6b1a" stroke="#0f5a14" stroke-width="1.2"/>

  <!-- PCB traces -->
  <line x1="95" y1="140" x2="140" y2="140" stroke="#2a8a2a" stroke-width="0.5"/>
  <line x1="95" y1="145" x2="160" y2="145" stroke="#2a8a2a" stroke-width="0.5"/>
  <line x1="260" y1="155" x2="305" y2="155" stroke="#2a8a2a" stroke-width="0.5"/>
  <line x1="260" y1="160" x2="300" y2="160" stroke="#2a8a2a" stroke-width="0.5"/>

  <!-- Heatsink on top of module — aluminum fins -->
  <rect x="120" y="50" width="160" height="50" rx="3" fill="#888" stroke="#666" stroke-width="1.2"/>
  <!-- Fin lines -->
  <line x1="130" y1="54" x2="130" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="140" y1="54" x2="140" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="150" y1="54" x2="150" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="160" y1="54" x2="160" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="170" y1="54" x2="170" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="180" y1="54" x2="180" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="190" y1="54" x2="190" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="200" y1="54" x2="200" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="210" y1="54" x2="210" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="220" y1="54" x2="220" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="230" y1="54" x2="230" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="240" y1="54" x2="240" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="250" y1="54" x2="250" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="260" y1="54" x2="260" y2="96" stroke="#999" stroke-width="1.5"/>
  <line x1="270" y1="54" x2="270" y2="96" stroke="#999" stroke-width="1.5"/>

  <!-- NVIDIA green accent strip on heatsink -->
  <rect x="120" y="50" width="160" height="5" rx="2" fill="#76b900"/>

  <!-- NVIDIA label on heatsink -->
  <text x="200" y="78" text-anchor="middle" font-size="8" font-weight="700" fill="#ddd" letter-spacing="2">NVIDIA</text>

  <!-- Connectors on carrier board -->
  <!-- Ethernet port -->
  <rect x="86" y="100" width="20" height="16" rx="1" fill="#555" stroke="#444" stroke-width="0.8"/>
  <!-- USB ports -->
  <rect x="86" y="122" width="14" height="10" rx="1" fill="#555" stroke="#444" stroke-width="0.8"/>
  <rect x="86" y="138" width="14" height="10" rx="1" fill="#555" stroke="#444" stroke-width="0.8"/>

  <!-- Power connector -->
  <rect x="290" y="110" width="22" height="12" rx="1" fill="#333" stroke="#444" stroke-width="0.8"/>

  <!-- Orange accent — edge tier status LEDs -->
  <circle cx="295" cy="100" r="3" fill="#c87b2a" opacity="0.9"/>
  <circle cx="305" cy="100" r="3" fill="#c87b2a" opacity="0.5"/>

  <!-- Mounting holes -->
  <circle cx="92" cy="170" r="4" fill="none" stroke="#0f5a14" stroke-width="1"/>
  <circle cx="308" cy="170" r="4" fill="none" stroke="#0f5a14" stroke-width="1"/>
  <circle cx="92" cy="96" r="4" fill="none" stroke="#0f5a14" stroke-width="1"/>
  <circle cx="308" cy="96" r="4" fill="none" stroke="#0f5a14" stroke-width="1"/>

  <!-- ===== Labels ===== -->
  <text x="200" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Jetson Orin</text>
  <text x="200" y="232" text-anchor="middle" font-size="11" font-weight="400" fill="#555">32 GB  &#xb7;  100 TOPS  &#xb7;  40 W</text>

  <!-- Edge tier badge -->
  <rect x="152" y="248" width="96" height="22" rx="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="200" y="263" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Edge AI</text>
</svg>
