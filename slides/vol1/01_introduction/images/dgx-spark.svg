<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="400" height="300" fill="#fff" rx="4"/>

  <!-- ===== DGX Spark Body ===== -->
  <!-- Main chassis — dark, compact desktop form factor -->
  <rect x="100" y="60" width="200" height="120" rx="8" fill="#2a2a2a" stroke="#111" stroke-width="1.5"/>

  <!-- Front face detail — subtle bevel -->
  <rect x="108" y="68" width="184" height="104" rx="5" fill="#333" stroke="#444" stroke-width="0.8"/>

  <!-- Ventilation grille lines -->
  <line x1="120" y1="90" x2="280" y2="90" stroke="#555" stroke-width="0.6"/>
  <line x1="120" y1="96" x2="280" y2="96" stroke="#555" stroke-width="0.6"/>
  <line x1="120" y1="102" x2="280" y2="102" stroke="#555" stroke-width="0.6"/>
  <line x1="120" y1="108" x2="280" y2="108" stroke="#555" stroke-width="0.6"/>
  <line x1="120" y1="114" x2="280" y2="114" stroke="#555" stroke-width="0.6"/>

  <!-- NVIDIA green accent strip -->
  <rect x="100" y="155" width="200" height="6" rx="0" fill="#76b900"/>

  <!-- Compute blue accent — status indicator -->
  <circle cx="130" cy="140" r="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <circle cx="145" cy="140" r="4" fill="#4a90c4" opacity="0.6"/>

  <!-- Power LED -->
  <circle cx="270" cy="140" r="3" fill="#76b900" opacity="0.9"/>

  <!-- NVIDIA logo text on chassis -->
  <text x="200" y="137" text-anchor="middle" font-size="9" font-weight="700" fill="#888" letter-spacing="2">NVIDIA</text>

  <!-- Rubber feet -->
  <rect x="115" y="180" width="16" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="270" y="180" width="16" height="4" rx="2" fill="#1a1a1a"/>

  <!-- ===== Labels ===== -->
  <text x="200" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#333">DGX Spark</text>
  <text x="200" y="232" text-anchor="middle" font-size="11" font-weight="400" fill="#555">128 GB  &#xb7;  1000 TOPS  &#xb7;  200 W</text>

  <!-- Compute tier badge -->
  <rect x="152" y="248" width="96" height="22" rx="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="263" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Desktop AI</text>
</svg>
