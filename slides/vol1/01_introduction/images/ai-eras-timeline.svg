<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Arc of AI: Eras and Their Bottlenecks</text>

  <!-- ===== Timeline axis ===== -->
  <line x1="60" y1="160" x2="860" y2="160" stroke="#4a90c4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ── Decade tick marks ── -->
  <line x1="100" y1="155" x2="100" y2="165" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="180" text-anchor="middle" font-size="9" fill="#555">1950</text>

  <line x1="260" y1="155" x2="260" y2="165" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="260" y="180" text-anchor="middle" font-size="9" fill="#555">1975</text>

  <line x1="420" y1="155" x2="420" y2="165" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="180" text-anchor="middle" font-size="9" fill="#555">1990</text>

  <line x1="600" y1="155" x2="600" y2="165" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="600" y="180" text-anchor="middle" font-size="9" fill="#555">2010</text>

  <line x1="840" y1="155" x2="840" y2="165" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="840" y="180" text-anchor="middle" font-size="9" fill="#555">2024</text>

  <!-- ===== AI Winter bands ===== -->
  <rect x="235" y="100" width="50" height="120" fill="#f9d6d5" opacity="0.4" rx="2"/>
  <text x="260" y="95" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">AI Winter</text>

  <rect x="395" y="100" width="50" height="120" fill="#f9d6d5" opacity="0.4" rx="2"/>
  <text x="420" y="95" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">AI Winter</text>

  <!-- ===== Era blocks ===== -->
  <!-- Symbolic AI -->
  <rect x="100" y="120" width="135" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="167" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Symbolic AI</text>
  <text x="167" y="152" text-anchor="middle" font-size="8.5" fill="#555">1950 -- 1975</text>

  <!-- Expert Systems -->
  <rect x="285" y="120" width="110" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="340" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Expert Systems</text>
  <text x="340" y="152" text-anchor="middle" font-size="8.5" fill="#555">1975 -- 1990</text>

  <!-- Statistical ML -->
  <rect x="445" y="120" width="130" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="510" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Statistical ML</text>
  <text x="510" y="152" text-anchor="middle" font-size="8.5" fill="#555">1990 -- 2010</text>

  <!-- Deep Learning -->
  <rect x="625" y="120" width="190" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="720" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Deep Learning</text>
  <text x="720" y="152" text-anchor="middle" font-size="8.5" fill="#555">2010 -- present</text>

  <!-- ===== Bottleneck callout boxes ===== -->
  <!-- Connecting lines from eras to callouts -->
  <line x1="167" y1="220" x2="167" y2="260" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="340" y1="220" x2="340" y2="310" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="510" y1="220" x2="510" y2="260" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="720" y1="220" x2="720" y2="310" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Symbolic bottleneck -->
  <rect x="80" y="260" width="175" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="167" y="278" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bottleneck</text>
  <text x="167" y="293" text-anchor="middle" font-size="8.5" fill="#555">Logic cannot capture ambiguity</text>

  <!-- Expert Systems bottleneck -->
  <rect x="235" y="310" width="210" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="340" y="328" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bottleneck</text>
  <text x="340" y="343" text-anchor="middle" font-size="8.5" fill="#555">Knowledge acquisition doesn't scale</text>

  <!-- Statistical ML bottleneck -->
  <rect x="415" y="260" width="190" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="510" y="278" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bottleneck</text>
  <text x="510" y="293" text-anchor="middle" font-size="8.5" fill="#555">Feature engineering is manual</text>

  <!-- Deep Learning bottleneck -->
  <rect x="625" y="310" width="190" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="720" y="328" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bottleneck</text>
  <text x="720" y="343" text-anchor="middle" font-size="8.5" fill="#555">Compute and data scale</text>

  <!-- ===== Key insight box ===== -->
  <rect x="200" y="385" width="500" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="450" y="405" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Key Insight</text>
  <text x="450" y="419" text-anchor="middle" font-size="9" fill="#555">Every era ended when its systems paradigm hit a fundamental constraint</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Every AI winter was a systems failure, not an algorithmic dead end.</text>
</svg>
