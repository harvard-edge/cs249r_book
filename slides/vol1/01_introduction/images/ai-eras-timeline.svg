<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <filter id="drop-shadow" x="-0.1" y="-0.1" width="1.2" height="1.2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-compute" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <!-- ===== Title ===== -->
  <text x="450" y="40" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">The Arc of AI: Eras and Their Bottlenecks</text>
  <!-- ===== Timeline Axis ===== -->
  <path d="M50,160 H850" stroke="#4a90c4" stroke-width="2.5" marker-end="url(#arrow-compute)"/>
  <!-- ===== Decade Ticks and Labels ===== -->
  <g text-anchor="middle" font-size="10px" fill="#555">
    <path d="M100,155 V165" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="100" y="180">1950</text>
    <path d="M260,155 V165" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="260" y="180">1975</text>
    <path d="M420,155 V165" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="420" y="180">1990</text>
    <path d="M600,155 V165" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="600" y="180">2010</text>
    <path d="M840,155 V165" stroke="#4a90c4" stroke-width="1.5"/>
    <text x="840" y="180">2024</text>
  </g>
  <!-- ===== AI Winter Bands ===== -->
  <g text-anchor="middle" font-size="10px" font-weight="bold" fill="#c44">
    <rect x="235" y="100" width="50" height="120" fill="#f9d6d5" opacity="0.5" rx="2"/>
    <text x="260" y="95">AI Winter</text>
    <rect x="395" y="100" width="50" height="120" fill="#f9d6d5" opacity="0.5" rx="2"/>
    <text x="420" y="95">AI Winter</text>
  </g>
  <!-- ===== Era Blocks ===== -->
  <g filter="url(#drop-shadow)">
    <rect x="80" y="115" width="160" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
    <text x="160" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Symbolic AI</text>
    <text x="160" y="150" text-anchor="middle" font-size="9" fill="#555">1950s – 1970s</text>
    <rect x="280" y="115" width="120" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
    <text x="340" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Expert Systems</text>
    <text x="340" y="150" text-anchor="middle" font-size="9" fill="#555">1970s – 1980s</text>
    <rect x="440" y="115" width="140" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
    <text x="510" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Statistical ML</text>
    <text x="510" y="150" text-anchor="middle" font-size="9" fill="#555">1990s – 2000s</text>
    <rect x="620" y="115" width="220" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
    <text x="730" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Deep Learning &amp; GenAI</text>
    <text x="730" y="150" text-anchor="middle" font-size="9" fill="#555">2010s – Present</text>
  </g>
  <!-- ===== Bottleneck Callouts and Connectors ===== -->
  <!-- Connector Lines -->
  <g fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dark)">
      <path d="M160,160 Q160,200 160,245"/>
      <path d="M340,160 Q340,270 340,345"/>
      <path d="M510,160 Q510,200 510,245"/>
      <path d="M730,160 Q730,270 730,345"/>
  </g>
  <!-- Bottleneck Boxes -->
  <g filter="url(#drop-shadow)" text-anchor="middle">
    <rect x="70" y="250" width="180" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="4"/>
    <text x="160" y="268" font-size="11" font-weight="bold" fill="#333">Bottleneck: Logic</text>
    <text x="160" y="286" font-size="10" fill="#555">Logic cannot capture ambiguity</text>
    <rect x="230" y="350" width="220" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
    <text x="340" y="368" font-size="11" font-weight="bold" fill="#333">Bottleneck: Data</text>
    <text x="340" y="386" font-size="10" fill="#555">Knowledge acquisition is unscalable</text>
    <rect x="420" y="250" width="180" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
    <text x="510" y="268" font-size="11" font-weight="bold" fill="#333">Bottleneck: Data</text>
    <text x="510" y="286" font-size="10" fill="#555">Feature engineering is manual</text>
    <rect x="630" y="350" width="200" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="4"/>
    <text x="730" y="368" font-size="11" font-weight="bold" fill="#333">Bottleneck: Compute</text>
    <text x="730" y="386" font-size="10" fill="#555">Scale of <tspan font-family="monospace">f(compute, data)</tspan></text>
  </g>
  <!-- ===== Key Insight Box ===== -->
  <g filter="url(#drop-shadow)">
      <rect x="150" y="425" width="600" height="45" fill="#f8f9fa" stroke="#ced4da" stroke-width="1" rx="5"/>
      <text x="450" y="448" text-anchor="middle" font-size="11" fill="#333">
          <tspan font-weight="bold" fill="#a31f34">Key Insight:</tspan> Every era ends when its dominant paradigm hits a systemic constraint.
      </text>
  </g>
  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="10" font-style="italic" fill="#999">Each AI winter was a systems failure, not just an algorithmic dead end.</text>
</svg>
