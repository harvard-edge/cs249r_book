<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Two Kinds of Failure</text>

  <!-- ===== Center divider ===== -->
  <line x1="450" y1="50" x2="450" y2="420" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Left Panel: Traditional Software ===== -->
  <text x="225" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Traditional Software</text>
  <text x="225" y="80" text-anchor="middle" font-size="9" fill="#555">Fails loudly</text>

  <!-- Left axes -->
  <line x1="80" y1="100" x2="80" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="80" y1="360" x2="410" y2="360" stroke="#333" stroke-width="1.2"/>
  <text x="45" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#333" transform="rotate(-90, 45, 235)">Status</text>
  <text x="245" y="385" text-anchor="middle" font-size="9" fill="#555">Time</text>

  <!-- Y-axis labels -->
  <text x="72" y="158" text-anchor="end" font-size="8.5" fill="#555">Working</text>
  <text x="72" y="330" text-anchor="end" font-size="8.5" fill="#555">Crashed</text>

  <!-- Working line (flat, then drop) -->
  <path d="M100,155 L280,155" fill="none" stroke="#bbb" stroke-width="2.5"/>
  <!-- Crash drop -->
  <path d="M280,155 L280,325" fill="none" stroke="#c44" stroke-width="2.5"/>
  <!-- Stayed crashed -->
  <path d="M280,325 L390,325" fill="none" stroke="#c44" stroke-width="2.5"/>

  <!-- Big red X at crash point -->
  <line x1="268" y1="205" x2="292" y2="265" stroke="#a31f34" stroke-width="4" stroke-linecap="round"/>
  <line x1="292" y1="205" x2="268" y2="265" stroke="#a31f34" stroke-width="4" stroke-linecap="round"/>
  <text x="305" y="230" font-size="9" font-weight="700" fill="#a31f34">CRASH!</text>

  <!-- Annotation -->
  <rect x="115" y="390" width="220" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="225" y="410" text-anchor="middle" font-size="9" fill="#555">Stacktrace, alert, pager fires</text>

  <!-- ===== Right Panel: ML System ===== -->
  <text x="675" y="65" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ML System</text>
  <text x="675" y="80" text-anchor="middle" font-size="9" fill="#555">Degrades silently</text>

  <!-- Right axes -->
  <line x1="500" y1="100" x2="500" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="500" y1="360" x2="850" y2="360" stroke="#333" stroke-width="1.2"/>
  <text x="468" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#333" transform="rotate(-90, 468, 235)">Accuracy</text>
  <text x="675" y="385" text-anchor="middle" font-size="9" fill="#555">Time (months)</text>

  <!-- Y-axis labels -->
  <text x="493" y="128" text-anchor="end" font-size="8.5" fill="#555">95%</text>
  <line x1="495" y1="125" x2="500" y2="125" stroke="#333" stroke-width="1"/>
  <text x="493" y="203" text-anchor="end" font-size="8.5" fill="#555">85%</text>
  <line x1="495" y1="200" x2="500" y2="200" stroke="#333" stroke-width="1"/>
  <text x="493" y="278" text-anchor="end" font-size="8.5" fill="#555">80%</text>
  <line x1="495" y1="275" x2="500" y2="275" stroke="#333" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="520" y="375" font-size="8" fill="#555">0</text>
  <text x="620" y="375" font-size="8" fill="#555">2</text>
  <text x="720" y="375" font-size="8" fill="#555">4</text>
  <text x="830" y="375" font-size="8" fill="#555">6</text>

  <!-- SLA threshold dashed line -->
  <line x1="500" y1="200" x2="850" y2="200" stroke="#a31f34" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="852" y="192" width="30" height="16" fill="#fff" stroke="#a31f34" stroke-width="1" rx="8"/>
  <text x="867" y="204" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">SLA</text>

  <!-- Gradual decline curve -->
  <path d="M520,125 L570,135 L620,155 L670,180 L720,220 L770,255 L830,275"
        fill="none" stroke="#c44" stroke-width="2.5"/>

  <!-- Subtle shading below SLA -->
  <path d="M696,200 L720,220 L770,255 L830,275 L830,360 L696,360 Z"
        fill="#f9d6d5" opacity="0.35"/>

  <!-- No visible crash - question mark -->
  <text x="780" y="300" font-size="10" font-weight="700" fill="#c44">No crash.</text>
  <text x="780" y="314" font-size="10" font-weight="700" fill="#c44">No alert.</text>

  <!-- Annotation -->
  <rect x="565" y="390" width="220" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="675" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">No code changed. The world changed.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Traditional software fails loudly. ML systems degrade silently over months.</text>
</svg>
