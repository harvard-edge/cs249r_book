<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="8"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <filter id="drop-shadow" x="-0.2" y="-0.2" width="1.4" height="1.4">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- ===== Title ===== -->
  <text x="450" y="40" text-anchor="middle" font-size="16px" font-weight="600" fill="#222">Two Kinds of System Failure</text>
  <!-- ===== Center divider ===== -->
  <line x1="450" y1="60" x2="450" y2="440" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- ===== Left Panel: Traditional Software ===== -->
  <g>
    <text x="225" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Traditional Software</text>
    <text x="225" y="92" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Fails Loudly</text>
    <!-- Axes -->
    <line x1="80" y1="120" x2="80" y2="380" stroke="#555" stroke-width="1.2"/>
    <line x1="80" y1="380" x2="420" y2="380" stroke="#555" stroke-width="1.2"/>
    <text x="80" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Status</text>
    <text x="250" y="405" text-anchor="middle" font-size="10" fill="#555">Time</text>
    <!-- Y-axis labels -->
    <text x="72" y="178" text-anchor="end" font-size="10" fill="#3d9e5a">OK</text>
    <text x="72" y="350" text-anchor="end" font-size="10" fill="#a31f34">Crashed</text>
    <!-- Graph Line -->
    <path d="M100,175 L280,175" fill="none" stroke="#3d9e5a" stroke-width="3"/>
    <path d="M280,175 C 280,250 280,250 280,345" fill="none" stroke="#a31f34" stroke-width="3" stroke-dasharray="6,4"/>
    <path d="M280,345 L400,345" fill="none" stroke="#a31f34" stroke-width="3"/>
    <!-- Crash Event -->
    <g transform="translate(280, 260)">
        <circle cx="0" cy="0" r="25" fill="#f9d6d5"/>
        <line x1="-12" y1="-12" x2="12" y2="12" stroke="#a31f34" stroke-width="4" stroke-linecap="round"/>
        <line x1="12" y1="-12" x2="-12" y2="12" stroke="#a31f34" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="315" y="245" font-size="11" font-weight="700" fill="#a31f34">CRASH!</text>
    <text x="315" y="260" font-size="9" fill="#555">Bug or exception</text>
    <!-- Annotation -->
    <rect x="115" y="420" width="230" height="35" fill="#f0f0f0" stroke="#ccc" stroke-width="1" rx="5" filter="url(#drop-shadow)"/>
    <text x="230" y="442" text-anchor="middle" font-size="10" fill="#333">Stacktrace logged, alert fires, pager wakes someone up.</text>
  </g>
  <!-- ===== Right Panel: ML System ===== -->
  <g>
    <text x="675" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#333">ML System</text>
    <text x="675" y="92" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Degrades Silently</text>
    <!-- Axes -->
    <line x1="500" y1="120" x2="500" y2="380" stroke="#555" stroke-width="1.2"/>
    <line x1="500" y1="380" x2="860" y2="380" stroke="#555" stroke-width="1.2"/>
    <text x="500" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Accuracy</text>
    <text x="680" y="405" text-anchor="middle" font-size="10" fill="#555">Time (months)</text>
    <!-- Y-axis labels -->
    <text x="492" y="158" text-anchor="end" font-size="10" fill="#555">95%</text>
    <line x1="495" y1="155" x2="505" y2="155" stroke="#ccc" stroke-width="1"/>
    <text x="492" y="253" text-anchor="end" font-size="10" fill="#555">85%</text>
    <line x1="495" y1="250" x2="505" y2="250" stroke="#ccc" stroke-width="1"/>
    <!-- X-axis labels -->
    <text x="530" y="396" text-anchor="middle" font-size="9" fill="#555">0</text>
    <text x="630" y="396" text-anchor="middle" font-size="9" fill="#555">3</text>
    <text x="730" y="396" text-anchor="middle" font-size="9" fill="#555">6</text>
    <text x="830" y="396" text-anchor="middle" font-size="9" fill="#555">9</text>
    <!-- SLA threshold dashed line -->
    <line x1="500" y1="250" x2="860" y2="250" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3"/>
    <rect x="790" y="225" width="60" height="20" fill="#fff" stroke="#a31f34" stroke-width="1" rx="10"/>
    <text x="820" y="239" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">SLA Breach</text>
    <!-- Gradual decline curve -->
    <path d="M530,155 C 630,165, 680,210, 730,260 S 800,320, 840,330" fill="none" stroke="#c87b2a" stroke-width="3"/>
    <path d="M708,250 C 720,255, 730,260, 730,260 S 800,320, 840,330 V 380 H 708 Z" fill="#fdebd0" opacity="0.6"/>
    <!-- Annotation -->
    <text x="770" y="300" font-size="11" font-weight="700" fill="#c87b2a">No crash.</text>
    <text x="770" y="316" font-size="11" font-weight="700" fill="#c87b2a">No alert.</text>
    <text x="770" y="331" font-size="9" fill="#555">Just wrong answers</text>
    <rect x="560" y="420" width="250" height="35" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="5" filter="url(#drop-shadow)"/>
    <text x="685" y="442" text-anchor="middle" font-size="10" fill="#7f4f1a" font-weight="600">No code changed. The world did. (Data Drift)</text>
  </g>
  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="10" font-style="italic" fill="#999">While traditional software often fails loudly with a crash, ML systems tend to degrade silently as data distributions drift over time.</text>
</svg>
