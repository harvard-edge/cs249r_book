<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  
  <defs>
    <filter id="drop-shadow" x="-0.1" y="-0.1" width="1.2" height="1.2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-head-red" markerWidth="10" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a31f34"/>
    </marker>
    <marker id="arrow-head-green" markerWidth="10" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3d9e5a"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="16px" font-weight="600" fill="#333">The Degradation Equation</text>

  <!-- Equation Box -->
  <g filter="url(#drop-shadow)">
    <rect x="230" y="60" width="440" height="40" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  </g>
  <text x="450" y="86" text-anchor="middle" font-family="monospace, sans-serif" font-size="14px" font-weight="600" fill="#212529">
    A(t) = A<tspan baseline-shift="sub" font-size="10px">0</tspan> − α · Δ(P<tspan baseline-shift="sub" font-size="10px">train</tspan>, P<tspan baseline-shift="sub" font-size="10px">live</tspan>(t))
  </text>
  
  <!-- Chart Area -->
  <g font-size="10px" fill="#6c757d">
    <!-- Y-Axis -->
    <line x1="100" y1="140" x2="100" y2="440" stroke="#495057" stroke-width="1.5"/>
    <text x="100" y="130" text-anchor="middle" font-size="11px" font-weight="600" fill="#343a40">Accuracy (%)</text>
    <g text-anchor="end">
      <text x="92" y="163">90%</text><line x1="95" y1="160" x2="100" y2="160" stroke="#adb5bd"/>
      <text x="92" y="218">87%</text><line x1="95" y1="215" x2="100" y2="215" stroke="#adb5bd"/>
      <text x="92" y="273">85%</text><line x1="95" y1="270" x2="100" y2="270" stroke="#adb5bd"/>
      <text x="92" y="328">82%</text><line x1="95" y1="325" x2="100" y2="325" stroke="#adb5bd"/>
      <text x="92" y="383">79%</text><line x1="95" y1="380" x2="100" y2="380" stroke="#adb5bd"/>
    </g>

    <!-- X-Axis -->
    <line x1="100" y1="440" x2="850" y2="440" stroke="#495057" stroke-width="1.5"/>
    <text x="475" y="470" text-anchor="middle" font-size="11px" font-weight="600" fill="#343a40">Time (Months)</text>
    <g text-anchor="middle">
      <text x="140" y="455">0</text><line x1="140" y1="440" x2="140" y2="445" stroke="#adb5bd"/>
      <text x="255" y="455">2</text><line x1="255" y1="440" x2="255" y2="445" stroke="#adb5bd"/>
      <text x="370" y="455">4</text><line x1="370" y1="440" x2="370" y2="445" stroke="#adb5bd"/>
      <text x="485" y="455">6</text><line x1="485" y1="440" x2="485" y2="445" stroke="#adb5bd"/>
      <text x="600" y="455">8</text><line x1="600" y1="440" x2="600" y2="445" stroke="#adb5bd"/>
      <text x="715" y="455">10</text><line x1="715" y1="440" x2="715" y2="445" stroke="#adb5bd"/>
      <text x="830" y="455">12</text><line x1="830" y1="440" x2="830" y2="445" stroke="#adb5bd"/>
    </g>
  </g>

  <!-- Grid Lines -->
  <line x1="100" y1="270" x2="830" y2="270" stroke="#e9ecef" stroke-width="1"/>
  <line x1="100" y1="380" x2="830" y2="380" stroke="#e9ecef" stroke-width="1"/>

  <!-- Threshold Line -->
  <line x1="100" y1="325" x2="830" y2="325" stroke="#c44" stroke-width="1.5" stroke-dasharray="6 4"/>
  <g>
    <rect x="680" y="315" width="130" height="22" rx="11" fill="#fff" stroke="#c44"/>
    <text x="745" y="330" text-anchor="middle" font-size="9px" font-weight="bold" fill="#c44">Retraining Threshold: 82%</text>
  </g>

  <!-- Degradation Curve and Fills -->
  <path d="M140,270 C 300 275, 400 300, 542 325 C 650 345, 750 365, 830 380" fill="none" stroke="none" id="curve"/>
  
  <path d="M140,270 C 300 275, 400 300, 542 325 L 542 440 L 140 440 Z" fill="#d4edda" opacity="0.4"/>
  <path d="M542,325 C 650 345, 750 365, 830 380 L 830 440 L 542 440 Z" fill="#f9d6d5" opacity="0.5"/>
  
  <path d="M140,270 C 300 275, 400 300, 542 325" fill="none" stroke="#3d9e5a" stroke-width="3" stroke-linecap="round"/>
  <path d="M542,325 C 650 345, 750 365, 830 380" fill="none" stroke="#c44" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Annotations -->
  <!-- Start Point -->
  <circle cx="140" cy="270" r="5" fill="#fff" stroke="#3d9e5a" stroke-width="2"/>
  <text x="150" y="260" font-size="11px" font-weight="600" fill="#3d9e5a">
    A<tspan baseline-shift="sub" font-size="9px">0</tspan> = 85%
  </text>
  <text x="150" y="245" font-size="9px" fill="#6c757d">(Launch Accuracy)</text>
  
  <!-- Crossing Point -->
  <circle cx="542" cy="325" r="6" fill="#a31f34"/>
  <g filter="url(#drop-shadow)">
      <path d="M600,240 C 590 260, 560 300, 550 318" fill="none" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-head-red)"/>
      <rect x="580" y="190" width="160" height="45" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
      <text x="660" y="209" text-anchor="middle" font-size="12px" font-weight="bold" fill="#a31f34">Retraining Triggered</text>
      <text x="660" y="227" text-anchor="middle" font-size="10px" fill="#343a40">Accuracy drops below 82%</text>
  </g>
  <text x="500" y="345" font-size="10px" fill="#c44">~7 months</text>

  <!-- End Point -->
  <circle cx="830" cy="380" r="5" fill="#fff" stroke="#c44" stroke-width="2"/>
  <text x="740" y="370" font-size="11px" font-weight="600" fill="#c44">A(12) ≈ 79%</text>
  <text x="740" y="385" font-size="9px" fill="#6c757d">(Without retraining)</text>

  <!-- Legend -->
  <g transform="translate(110, 150)">
    <rect x="0" y="0" width="12" height="12" fill="#d4edda" stroke="#3d9e5a" rx="2"/>
    <text x="18" y="10" font-size="10px" fill="#343a40">Acceptable Performance</text>
    <rect x="180" y="0" width="12" height="12" fill="#f9d6d5" stroke="#c44" rx="2"/>
    <text x="198" y="10" font-size="10px" fill="#343a40">Degraded Performance</text>
  </g>

  <!-- Footnote -->
  <text x="450" y="488" text-anchor="middle" font-size="10px" font-style="italic" fill="#999">
    The Degradation Equation quantifies accuracy decay from distribution drift over time.
  </text>
</svg>
