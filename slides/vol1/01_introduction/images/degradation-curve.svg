<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#333">The Degradation Equation</text>

  <!-- ===== Equation box ===== -->
  <rect x="250" y="48" width="400" height="35" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="450" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#333">A(t) = A&#x2080; &#x2212; &#x3B1; &#xB7; &#x394;(P_train, P_live(t))</text>

  <!-- ===== Chart area ===== -->
  <!-- Y-axis -->
  <line x1="120" y1="100" x2="120" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="40" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#333" transform="rotate(-90, 40, 250)">Accuracy (%)</text>

  <!-- Y-axis ticks -->
  <text x="110" y="118" text-anchor="end" font-size="9" fill="#555">90%</text>
  <line x1="115" y1="115" x2="120" y2="115" stroke="#333" stroke-width="1"/>
  <text x="110" y="173" text-anchor="end" font-size="9" fill="#555">87%</text>
  <line x1="115" y1="170" x2="120" y2="170" stroke="#333" stroke-width="1"/>
  <text x="110" y="228" text-anchor="end" font-size="9" fill="#555">85%</text>
  <line x1="115" y1="225" x2="120" y2="225" stroke="#333" stroke-width="1"/>
  <text x="110" y="283" text-anchor="end" font-size="9" fill="#555">82%</text>
  <line x1="115" y1="280" x2="120" y2="280" stroke="#333" stroke-width="1"/>
  <text x="110" y="338" text-anchor="end" font-size="9" fill="#555">79%</text>
  <line x1="115" y1="335" x2="120" y2="335" stroke="#333" stroke-width="1"/>
  <text x="110" y="393" text-anchor="end" font-size="9" fill="#555">76%</text>
  <line x1="115" y1="390" x2="120" y2="390" stroke="#333" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="120" y1="170" x2="820" y2="170" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="225" x2="820" y2="225" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="335" x2="820" y2="335" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="120" y1="390" x2="820" y2="390" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- X-axis -->
  <line x1="120" y1="400" x2="830" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="470" y="435" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Time (months)</text>

  <!-- X-axis ticks -->
  <text x="150" y="418" text-anchor="middle" font-size="9" fill="#555">0</text>
  <line x1="150" y1="400" x2="150" y2="405" stroke="#333" stroke-width="1"/>
  <text x="265" y="418" text-anchor="middle" font-size="9" fill="#555">2</text>
  <line x1="265" y1="400" x2="265" y2="405" stroke="#333" stroke-width="1"/>
  <text x="380" y="418" text-anchor="middle" font-size="9" fill="#555">4</text>
  <line x1="380" y1="400" x2="380" y2="405" stroke="#333" stroke-width="1"/>
  <text x="495" y="418" text-anchor="middle" font-size="9" fill="#555">6</text>
  <line x1="495" y1="400" x2="495" y2="405" stroke="#333" stroke-width="1"/>
  <text x="610" y="418" text-anchor="middle" font-size="9" fill="#555">8</text>
  <line x1="610" y1="400" x2="610" y2="405" stroke="#333" stroke-width="1"/>
  <text x="725" y="418" text-anchor="middle" font-size="9" fill="#555">10</text>
  <line x1="725" y1="400" x2="725" y2="405" stroke="#333" stroke-width="1"/>
  <text x="810" y="418" text-anchor="middle" font-size="9" fill="#555">12</text>
  <line x1="810" y1="400" x2="810" y2="405" stroke="#333" stroke-width="1"/>

  <!-- ===== Retraining Trigger threshold ===== -->
  <line x1="120" y1="280" x2="820" y2="280" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="6,3"/>
  <rect x="822" y="270" width="65" height="20" fill="#fff" stroke="#a31f34" stroke-width="1" rx="10"/>
  <text x="854" y="284" text-anchor="middle" font-size="8" font-weight="700" fill="#a31f34">Retrain @82%</text>

  <!-- ===== Green region above threshold ===== -->
  <!-- Curve: starts at 85% (y=225), crosses 82% (y=280) around month 7 (x~555), ends at ~79% (y=335) at month 12 -->
  <path d="M150,225 L265,235 L380,250 L440,262 L495,272 L555,280"
        fill="none" stroke="transparent"/>
  <!-- Green fill above threshold -->
  <path d="M150,225 L265,235 L380,250 L440,262 L495,272 L555,280 L555,400 L150,400 Z"
        fill="#d4edda" opacity="0.3"/>

  <!-- ===== Red region below threshold ===== -->
  <path d="M555,280 L610,295 L670,312 L725,325 L810,340 L810,400 L555,400 Z"
        fill="#f9d6d5" opacity="0.45"/>

  <!-- ===== Degradation curve ===== -->
  <!-- Above threshold: green stroke -->
  <path d="M150,225 L265,235 L380,250 L440,262 L495,272 L555,280"
        fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <!-- Below threshold: red stroke -->
  <path d="M555,280 L610,295 L670,312 L725,325 L810,340"
        fill="none" stroke="#c44" stroke-width="2.5"/>

  <!-- ===== Starting point annotation ===== -->
  <circle cx="150" cy="225" r="4" fill="#3d9e5a"/>
  <text x="165" y="218" font-size="9" font-weight="700" fill="#3d9e5a">A&#x2080; = 85%</text>

  <!-- ===== Crossing point annotation ===== -->
  <circle cx="555" cy="280" r="5" fill="#a31f34"/>

  <!-- Arrow pointing to crossing -->
  <line x1="600" y1="195" x2="562" y2="272" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="570" y="170" width="110" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="625" y="183" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">Retrain here</text>
  <text x="625" y="194" text-anchor="middle" font-size="8" fill="#555">~month 7</text>

  <!-- ===== End point annotation ===== -->
  <circle cx="810" cy="340" r="4" fill="#c44"/>
  <text x="790" y="360" font-size="9" font-weight="700" fill="#c44">~79%</text>

  <!-- ===== Legend ===== -->
  <rect x="160" y="100" width="12" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="2"/>
  <text x="178" y="111" font-size="9" fill="#333">Above threshold (acceptable)</text>
  <rect x="370" y="100" width="12" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="2"/>
  <text x="388" y="111" font-size="9" fill="#333">Below threshold (degraded)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="9" font-style="italic" fill="#999">The Degradation Equation quantifies accuracy decay from distribution drift.</text>
</svg>
