<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="drop-shadow" x="-0.1" y="-0.1" width="1.2" height="1.3">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-red" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>
  <!-- ===== TITLE ===== -->
  <text x="450" y="45" text-anchor="middle" font-size="20px" font-weight="700" fill="#222">The Iron Law of ML Systems</text>
  <text x="450" y="72" text-anchor="middle" font-size="15px" font-weight="400" fill="#444">
    T = D<tspan baseline-shift="sub" font-size="8px">vol</tspan> / BW + O / (R<tspan baseline-shift="sub" font-size="8px">peak</tspan> · η) + L<tspan baseline-shift="sub" font-size="8px">lat</tspan>
  </text>
  <!-- ===== LEFT COLUMN: LABELS ===== -->
  <g text-anchor="end" font-size="12px" font-weight="700" fill="#333">
    <text x="165" y="148">Data Transfer</text>
    <text x="165" y="166" font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="10px" font-weight="400" fill="#555">
      D<tspan baseline-shift="sub" font-size="8px">vol</tspan> / BW
    </text>
    <text x="165" y="248">Compute</text>
    <text x="165" y="266" font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="10px" font-weight="400" fill="#555">
      O / (R<tspan baseline-shift="sub" font-size="8px">peak</tspan> · η)
    </text>
    <text x="165" y="348">Latency &amp; Overhead</text>
    <text x="165" y="366" font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="10px" font-weight="400" fill="#555">
      L<tspan baseline-shift="sub" font-size="8px">lat</tspan>
    </text>
  </g>
  
  <!-- ===== CENTER COLUMN: VISUAL BARS ===== -->
  <g filter="url(#drop-shadow)">
    <!-- Data bar (green) -->
    <rect x="190" y="125" width="340" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="205" y="152.5" dominant-baseline="middle" font-size="11px" font-weight="700" fill="#2c7a47">Data Movement</text>
    <!-- Compute bar (blue) - dominant term -->
    <rect x="190" y="225" width="560" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
    <text x="205" y="252.5" dominant-baseline="middle" font-size="11px" font-weight="700" fill="#366d92">Arithmetic</text>
    <!-- Overhead bar (orange) -->
    <rect x="190" y="325" width="160" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
    <text x="205" y="352.5" dominant-baseline="middle" font-size="11px" font-weight="700" fill="#9a5f21">Orchestration</text>
  </g>
  <!-- ===== TIMINGS & TOTAL ===== -->
  <g text-anchor="end" font-size="11px" font-weight="400" fill="#555">
    <text x="775" y="152.5" dominant-baseline="middle">120 ms</text>
    <text x="775" y="252.5" dominant-baseline="middle" font-weight="700" fill="#333">200 ms</text>
    <text x="775" y="352.5" dominant-baseline="middle">55 ms</text>
  </g>
  <!-- Right Brace -->
  <path d="M790,125 Q810,125 810,145 V 355 Q810,380 790,380" fill="none" stroke="#777" stroke-width="1.5"/>
  <g transform="translate(820, 252.5)">
    <text font-size="14px" font-weight="700" fill="#333" dominant-baseline="middle">
      T<tspan baseline-shift="sub" font-size="8px">total</tspan> = 375 ms
    </text>
  </g>
  <!-- ===== ANNOTATIONS ===== -->
  <!-- Bottleneck Annotation -->
  <g>
    <path d="M470,410 C470,350 540,300 620,286" fill="none" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="4,3"/>
    <rect x="390" y="410" width="160" height="30" rx="15" fill="#a31f34"/>
    <text x="470" y="425" dominant-baseline="middle" text-anchor="middle" font-size="11px" font-weight="700" fill="#fff">Bottleneck Term</text>
  </g>
  
  <!-- Example Label -->
  <g>
    <rect x="650" y="22" width="200" height="28" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="750" y="36" dominant-baseline="middle" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Example: Single LLM Training Step</text>
  </g>
  
  <!-- ===== FOOTNOTE ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9px" font-style="italic" fill="#999">
    Each term resolves to a unit of time (e.g., seconds). The slowest term becomes the bottleneck for end-to-end latency.
  </text>
</svg>
