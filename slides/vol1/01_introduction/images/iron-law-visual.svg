<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#333">The Iron Law of ML Systems</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" font-weight="400" fill="#555">T = D/BW + O/(R&#183;&#951;) + L</text>

  <!-- ===== Left labels ===== -->
  <!-- Bar 1: Data (green) -->
  <text x="60" y="140" text-anchor="start" font-size="11" font-weight="700" fill="#333">Data</text>
  <text x="60" y="156" text-anchor="start" font-size="9" font-weight="400" fill="#555">D_vol / BW</text>

  <!-- Bar 2: Compute (blue) -->
  <text x="60" y="240" text-anchor="start" font-size="11" font-weight="700" fill="#333">Compute</text>
  <text x="60" y="256" text-anchor="start" font-size="9" font-weight="400" fill="#555">O / (R_peak &#183; &#951;)</text>

  <!-- Bar 3: Overhead (red) -->
  <text x="60" y="340" text-anchor="start" font-size="11" font-weight="700" fill="#333">Overhead</text>
  <text x="60" y="356" text-anchor="start" font-size="9" font-weight="400" fill="#555">L_lat</text>

  <!-- ===== Bars ===== -->
  <!-- Data bar (green) — medium length -->
  <rect x="170" y="120" width="340" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Moving bits</text>
  <text x="520" y="150" text-anchor="start" font-size="9.5" font-weight="400" fill="#555">120 ms</text>

  <!-- Compute bar (blue) — longest (dominant for LLM training) -->
  <rect x="170" y="220" width="560" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Arithmetic</text>
  <text x="740" y="250" text-anchor="start" font-size="9.5" font-weight="400" fill="#555">200 ms</text>

  <!-- Overhead bar (red) — shortest -->
  <rect x="170" y="320" width="160" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="250" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Orchestration tax</text>
  <text x="340" y="350" text-anchor="start" font-size="9.5" font-weight="400" fill="#555">55 ms</text>

  <!-- ===== Right brace and total ===== -->
  <path d="M790,120 C810,120 810,245 810,245 C810,245 810,370 790,370" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="830" y="240" text-anchor="start" font-size="12" font-weight="700" fill="#333">T_total</text>
  <text x="830" y="258" text-anchor="start" font-size="10" font-weight="400" fill="#555">= 375 ms</text>

  <!-- ===== Dominant term annotation ===== -->
  <line x1="450" y1="280" x2="450" y2="300" stroke="#a31f34" stroke-width="1.2"/>
  <rect x="380" y="390" width="140" height="28" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="450" y="409" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a31f34">Bottleneck term</text>
  <line x1="450" y1="390" x2="450" y2="375" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== Example label ===== -->
  <rect x="620" y="85" width="200" height="24" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="720" y="101" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Example: LLM training step</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Each term resolves to seconds. The slowest term dominates end-to-end latency.</text>
</svg>
