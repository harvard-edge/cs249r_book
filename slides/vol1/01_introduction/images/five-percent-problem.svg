<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#333">The 5% Problem</text>
  <text x="450" y="58" text-anchor="middle" font-size="10" font-weight="400" fill="#555">Hidden Technical Debt in Machine Learning Systems (Sculley et al., 2015)</text>

  <!-- ===== Outer system rectangle ===== -->
  <rect x="60" y="80" width="780" height="370" rx="6" fill="#fff" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">Production ML System</text>

  <!-- ===== Surrounding infrastructure boxes (95%) ===== -->

  <!-- Top row -->
  <rect x="90" y="115" width="230" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="205" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Data Collection</text>
  <text x="205" y="157" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">ingestion, validation, versioning</text>

  <rect x="335" y="115" width="230" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Feature Store</text>
  <text x="450" y="157" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">extraction, transformation, serving</text>

  <rect x="580" y="115" width="230" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="695" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Configuration</text>
  <text x="695" y="157" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">hyperparams, resources, flags</text>

  <!-- Middle row — ML Code in center -->
  <rect x="90" y="190" width="230" height="100" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="205" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Pipeline Glue</text>
  <text x="205" y="252" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">orchestration, scheduling</text>
  <text x="205" y="267" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">data format conversions</text>

  <!-- THE ML CODE BOX (tiny, center) -->
  <rect x="380" y="215" width="140" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ML Code</text>
  <text x="450" y="254" text-anchor="middle" font-size="9" font-weight="400" fill="#555">~5%</text>

  <rect x="580" y="190" width="230" height="100" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="695" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Serving Infrastructure</text>
  <text x="695" y="252" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">load balancing, caching</text>
  <text x="695" y="267" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">latency management</text>

  <!-- Bottom row -->
  <rect x="90" y="305" width="230" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="205" y="332" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Monitoring</text>
  <text x="205" y="347" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">metrics, alerts, drift detection</text>

  <rect x="335" y="305" width="230" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="332" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Testing &amp; Debugging</text>
  <text x="450" y="347" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">integration, data tests, shadow</text>

  <rect x="580" y="305" width="230" height="60" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="695" y="332" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Resource Management</text>
  <text x="695" y="347" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">compute, storage, scheduling</text>

  <!-- ===== Percentage labels ===== -->
  <rect x="90" y="385" width="720" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="450" y="404" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Systems Infrastructure: ~95% of production code</text>

  <!-- ===== Annotation arrow to ML Code ===== -->
  <line x1="450" y1="270" x2="450" y2="298" stroke="#4a90c4" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">The model is &#8776;5% of production ML code. The other 95% is systems infrastructure.</text>
</svg>
