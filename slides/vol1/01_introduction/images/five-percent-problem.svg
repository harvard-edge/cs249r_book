<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Helvetica, Arial, sans-serif">
  <!-- 
    Improved SVG Diagram based on Style Guide
    - ViewBox: 16:9 aspect ratio (900x500)
    - Fonts: Helvetica for modern, clean typography and improved hierarchy.
    - Colors: Semantic palette for Compute, Data, Error, etc.
    - Polish: Subtle drop shadows, improved spacing, and alignment.
    - Clarity: Horizontal labels, clear visual hierarchy, strong core message.
  -->
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#a31f34" />
    </marker>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== Title & Subtitle ===== -->
  <text x="450" y="45" text-anchor="middle" font-size="20px" font-weight="bold" fill="#333">The "5% Problem" in Production ML</text>
  <text x="450" y="68" text-anchor="middle" font-size="11px" font-style="italic" fill="#666">A concept from "Hidden Technical Debt in Machine Learning Systems" by Sculley et al. (2015)</text>

  <!-- Group for all system components -->
  <g filter="url(#dropShadow)">
    <!-- ===== ML Code (The 5%) ===== -->
    <g>
      <rect x="385" y="217" width="130" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
      <text x="450" y="240" text-anchor="middle" font-size="12px" font-weight="bold" fill="#1c3b4f">ML Code</text>
      <text x="450" y="262" text-anchor="middle" font-size="16px" font-weight="bold" fill="#4a90c4" letter-spacing="-0.5">~5%</text>
    </g>

    <!-- ===== Surrounding Infrastructure (The 95%) ===== -->
    <!-- Top Row -->
    <g>
      <rect x="70" y="110" width="270" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
      <text x="205" y="133" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Data Collection &amp; Validation</text>
      <text x="205" y="152" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Ingestion, Schema, Versioning, Cleaning</text>
    </g>
    <g>
      <rect x="365" y="110" width="170" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
      <text x="450" y="133" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Configuration</text>
      <text x="450" y="152" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Code, Data, Hyperparams</text>
    </g>
    <g>
      <rect x="560" y="110" width="270" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
      <text x="695" y="133" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Feature Engineering</text>
      <text x="695" y="152" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Extraction, Transformation, Feature Store</text>
    </g>

    <!-- Middle Row -->
    <g>
      <rect x="70" y="217" width="270" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
      <text x="205" y="240" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Pipeline "Glue" Code</text>
      <text x="205" y="259" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Orchestration, Scheduling, Dependencies</text>
    </g>
    <g>
      <rect x="560" y="217" width="270" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
      <text x="695" y="240" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Serving Infrastructure</text>
      <text x="695" y="259" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Load Balancing, Caching, Canary, API</text>
    </g>

    <!-- Bottom Row -->
    <g>
      <rect x="70" y="325" width="270" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
      <text x="205" y="348" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Testing &amp; Debugging</text>
      <text x="205" y="367" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Unit, Integration, A/B, Shadow</text>
    </g>
    <g>
      <rect x="365" y="325" width="170" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
      <text x="450" y="348" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Monitoring</text>
      <text x="450" y="367" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Anomalies, Drift, Logging</text>
    </g>
    <g>
      <rect x="560" y="325" width="270" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
      <text x="695" y="348" text-anchor="middle" font-size="12px" font-weight="bold" fill="#333">Resource Management</text>
      <text x="695" y="367" text-anchor="middle" font-size="10px" font-weight="400" fill="#555">Compute, Storage, Cluster Admin</text>
    </g>
  </g>
  
  <!-- Central annotation about technical debt -->
  <g>
    <path d="M 450 282 Q 450 350 450 405" fill="none" stroke="#a31f34" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
    <rect x="290" y="406" width="320" height="30" rx="15" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" />
    <text x="450" y="425" text-anchor="middle" font-size="11px" font-weight="bold" fill="#a31f34">The other ~95% is surrounding infrastructure</text>
  </g>

  <!-- ===== Footnote ===== -->
  <text x="450" y="488" text-anchor="middle" font-size="9px" font-weight="400" fill="#999" font-style="italic">The core model is a small fraction of the code in a real-world, production-grade ML system.</text>
</svg>
