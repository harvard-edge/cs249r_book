<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Mixed-Precision Training: FP16 Speed with FP32 Safety</text>

  <!-- ===== FP16 Zone (Top Half) ===== -->
  <rect x="30" y="45" width="840" height="180" rx="6" fill="#cfe2f3" fill-opacity="0.15" stroke="#4a90c4" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="50" y="65" font-size="12" font-weight="700" fill="#4a90c4">FP16 Zone: 2x Throughput on Tensor Cores</text>

  <!-- ===== FP32 Zone (Bottom Half) ===== -->
  <rect x="30" y="235" width="840" height="130" rx="6" fill="#d4edda" fill-opacity="0.15" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="50" y="255" font-size="12" font-weight="700" fill="#3d9e5a">FP32 Zone: Numerical Safety</text>

  <!-- ===== Step 1: FP32 Master Weights ===== -->
  <rect x="60" y="270" width="140" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="130" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="#333">FP32 Master</text>
  <text x="130" y="304" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Weights</text>

  <!-- Arrow: FP32 -> Cast to FP16 -->
  <line x1="130" y1="270" x2="130" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="140" y="220" font-size="8.5" font-weight="700" fill="#555">Cast</text>

  <!-- ===== Step 2: Cast to FP16 ===== -->
  <rect x="80" y="130" width="100" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="130" y="152" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Cast to FP16</text>

  <!-- Arrow: Cast -> Forward -->
  <line x1="180" y1="148" x2="230" y2="110" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ===== Step 3: Forward Pass ===== -->
  <rect x="230" y="85" width="130" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="295" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Forward Pass</text>
  <text x="295" y="119" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">(FP16)</text>

  <!-- Arrow: Forward -> Loss Scale -->
  <line x1="360" y1="108" x2="410" y2="108" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ===== Step 4: Loss Scaling ===== -->
  <rect x="410" y="85" width="120" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="470" y="105" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Loss Scale</text>
  <text x="470" y="119" text-anchor="middle" font-size="8.5" font-weight="400" fill="#c87b2a">(x1024)</text>

  <!-- Arrow: Loss Scale -> Backward -->
  <line x1="530" y1="108" x2="580" y2="148" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ===== Step 5: Backward Pass ===== -->
  <rect x="580" y="130" width="130" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="645" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Backward Pass</text>
  <text x="645" y="164" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">(FP16 grads)</text>

  <!-- Arrow: Backward -> Unscale -->
  <line x1="710" y1="153" x2="760" y2="153" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Step 6: Unscale Gradients ===== -->
  <rect x="760" y="130" width="95" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="808" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Unscale</text>
  <text x="808" y="164" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Gradients</text>

  <!-- Arrow: Unscale -> FP32 Accumulate -->
  <line x1="808" y1="175" x2="808" y2="270" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="818" y="225" font-size="8.5" font-weight="700" fill="#555">Cast</text>

  <!-- ===== Step 7: FP32 Accumulate + Optimizer ===== -->
  <rect x="430" y="270" width="170" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="515" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="#333">FP32 Accumulate</text>
  <text x="515" y="304" text-anchor="middle" font-size="9" font-weight="400" fill="#555">+ Optimizer Step</text>

  <!-- Arrow: Accumulate back to Master Weights -->
  <line x1="430" y1="293" x2="200" y2="293" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="315" y="286" text-anchor="middle" font-size="8.5" font-weight="700" fill="#3d9e5a">Update</text>

  <!-- Arrow from Unscale to Accumulate -->
  <line x1="760" y1="293" x2="600" y2="293" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== BF16 Callout ===== -->
  <rect x="50" y="385" width="380" height="55" rx="6" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="240" y="405" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">BF16 Alternative</text>
  <text x="240" y="420" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Same exponent range as FP32 (8-bit) eliminates loss scaling.</text>
  <text x="240" y="433" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Simpler pipeline, same throughput gains.</text>

  <!-- ===== Format comparison ===== -->
  <rect x="470" y="385" width="400" height="55" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="490" y="403" font-size="8.5" font-weight="700" fill="#333">FP32:</text>
  <text x="540" y="403" font-size="8" font-weight="400" fill="#555">Range 10^38, 23-bit mantissa</text>
  <text x="490" y="418" font-size="8.5" font-weight="700" fill="#333">FP16:</text>
  <text x="540" y="418" font-size="8" font-weight="400" fill="#555">Range 65,504, 10-bit mantissa — needs loss scaling</text>
  <text x="490" y="433" font-size="8.5" font-weight="700" fill="#a31f34">BF16:</text>
  <text x="540" y="433" font-size="8" font-weight="400" fill="#555">Range 10^38, 7-bit mantissa — no loss scaling needed</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">~2x throughput, ~2x memory savings, less than 1% accuracy impact on most workloads</text>
</svg>
