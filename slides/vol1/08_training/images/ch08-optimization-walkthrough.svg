<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">GPT-2 Optimization Walkthrough: From 89 GB to 28 GB</text>

  <!-- ===== V100 Threshold Line ===== -->
  <!-- 32 GB line. Scale: bar width proportional to GB. Max = 89 GB -> 680px -->
  <!-- 32 GB -> (32/89)*680 = 245px from left edge of bars -->
  <line x1="295" y1="55" x2="295" y2="430" stroke="#3d9e5a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="295" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">V100: 32 GB</text>

  <!-- ===== Step 0: Baseline FP32 — 89 GB ===== -->
  <text x="55" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Step 0</text>
  <text x="55" y="113" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Baseline</text>
  <rect x="100" y="80" width="680" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="440" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Baseline FP32: 89 GB</text>
  <text x="440" y="119" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Weights (6) + Grads (6) + Adam (12) + Activations (65)</text>
  <!-- Status badge -->
  <rect x="790" y="88" width="90" height="22" rx="11" fill="#c44" stroke="none"/>
  <text x="835" y="103" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">DOES NOT FIT</text>

  <!-- Arrow down -->
  <text x="440" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#555">-38 GB (Mixed Precision)</text>
  <line x1="440" y1="148" x2="440" y2="168" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>

  <!-- ===== Step 1: Mixed Precision — 51 GB ===== -->
  <text x="55" y="195" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Step 1</text>
  <text x="55" y="208" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Mixed</text>
  <text x="55" y="219" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Precision</text>
  <!-- 51 GB -> (51/89)*680 = 389px -->
  <rect x="100" y="175" width="389" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="295" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Mixed Precision: 51 GB</text>
  <text x="295" y="214" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">FP16 weights + FP32 master + reduced activations</text>
  <!-- Iron Law annotation -->
  <text x="500" y="200" font-size="8.5" font-weight="700" fill="#c87b2a">R_peak up (Tensor Cores)</text>

  <!-- Arrow down -->
  <text x="330" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#555">-19 GB (Checkpointing)</text>
  <line x1="330" y1="243" x2="330" y2="263" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>

  <!-- ===== Step 2: Checkpointing — 32 GB ===== -->
  <text x="55" y="290" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Step 2</text>
  <text x="55" y="303" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Checkpoint</text>
  <!-- 32 GB -> (32/89)*680 = 245px -->
  <rect x="100" y="270" width="245" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="223" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Checkpointing: 32 GB</text>
  <text x="223" y="309" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">sqrt(L) activation checkpoints</text>
  <!-- Iron Law annotation -->
  <text x="360" y="295" font-size="8.5" font-weight="700" fill="#4a90c4">O up (+33% recompute)</text>

  <!-- Arrow down -->
  <text x="250" y="335" text-anchor="middle" font-size="9" font-weight="700" fill="#555">-4 GB (Grad Accumulation)</text>
  <line x1="250" y1="338" x2="250" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-down)"/>

  <!-- ===== Step 3: Gradient Accumulation — 28 GB ===== -->
  <text x="55" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Step 3</text>
  <text x="55" y="398" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Grad</text>
  <text x="55" y="409" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Accum.</text>
  <!-- 28 GB -> (28/89)*680 = 214px -->
  <rect x="100" y="365" width="214" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="207" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Grad Accum: 28 GB</text>
  <text x="207" y="404" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Smaller physical batch size</text>
  <!-- Status badge -->
  <rect x="325" y="378" width="55" height="22" rx="11" fill="#3d9e5a" stroke="none"/>
  <text x="353" y="393" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">FITS!</text>
  <!-- Iron Law annotation -->
  <text x="400" y="395" font-size="8.5" font-weight="700" fill="#3d9e5a">eta up (effective batch)</text>

  <!-- ===== Summary Box ===== -->
  <rect x="560" y="280" width="310" height="130" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="715" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Optimization Summary</text>
  <text x="580" y="325" font-size="9" font-weight="400" fill="#555">Mixed Precision:  89 → 51 GB  (-43%)</text>
  <text x="580" y="345" font-size="9" font-weight="400" fill="#555">Checkpointing:    51 → 32 GB  (-37%)</text>
  <text x="580" y="365" font-size="9" font-weight="400" fill="#555">Grad Accum:       32 → 28 GB  (-13%)</text>
  <line x1="580" y1="375" x2="850" y2="375" stroke="#bbb" stroke-width="0.8"/>
  <text x="580" y="395" font-size="10" font-weight="700" fill="#a31f34">Total:            89 → 28 GB  (-69%)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="465" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Fix memory first, then optimize throughput — always profile between steps</text>
</svg>
