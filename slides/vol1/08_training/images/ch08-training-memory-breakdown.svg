<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Training Memory Breakdown: Why Training Needs 4x Inference Memory</text>

  <!-- ===== Y-axis label ===== -->
  <text x="45" y="250" text-anchor="middle" font-size="9" font-weight="400" fill="#555" transform="rotate(-90, 45, 250)">Memory (GB)</text>

  <!-- ===== Y-axis ticks ===== -->
  <line x1="70" y1="60" x2="70" y2="420" stroke="#bbb" stroke-width="1"/>
  <text x="65" y="420" text-anchor="end" font-size="8" fill="#555">0</text>
  <text x="65" y="380" text-anchor="end" font-size="8" fill="#555">14</text>
  <line x1="67" y1="380" x2="73" y2="380" stroke="#bbb" stroke-width="0.8"/>
  <text x="65" y="340" text-anchor="end" font-size="8" fill="#555">28</text>
  <line x1="67" y1="340" x2="73" y2="340" stroke="#bbb" stroke-width="0.8"/>
  <text x="65" y="300" text-anchor="end" font-size="8" fill="#555">42</text>
  <line x1="67" y1="300" x2="73" y2="300" stroke="#bbb" stroke-width="0.8"/>
  <text x="65" y="260" text-anchor="end" font-size="8" fill="#555">56</text>
  <line x1="67" y1="260" x2="73" y2="260" stroke="#bbb" stroke-width="0.8"/>
  <text x="65" y="220" text-anchor="end" font-size="8" fill="#555">70</text>
  <line x1="67" y1="220" x2="73" y2="220" stroke="#bbb" stroke-width="0.8"/>
  <text x="65" y="180" text-anchor="end" font-size="8" fill="#555">84</text>
  <line x1="67" y1="180" x2="73" y2="180" stroke="#bbb" stroke-width="0.8"/>

  <!-- ===== Bar 1: Inference (7B) — 14 GB ===== -->
  <!-- Height: 14 GB -> 40px per 14 GB = (14/14)*40 = 40px, from 420 up -->
  <rect x="120" y="380" width="120" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Weights</text>
  <text x="180" y="416" text-anchor="middle" font-size="8" font-weight="400" fill="#555">14 GB</text>
  <!-- Total label -->
  <text x="180" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#333">14 GB</text>
  <!-- Bar label -->
  <text x="180" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Inference (7B)</text>
  <text x="180" y="453" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">FP16</text>

  <!-- ===== Bar 2: Training (7B) — 56 GB total ===== -->
  <!-- Weights: 14 GB (40px) -->
  <rect x="310" y="260" width="120" height="40" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="370" y="284" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Weights 14 GB</text>
  <!-- Gradients: 14 GB -->
  <rect x="310" y="300" width="120" height="40" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="370" y="324" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Gradients 14 GB</text>
  <!-- Adam m: 14 GB -->
  <rect x="310" y="340" width="120" height="40" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="370" y="364" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Adam m 14 GB</text>
  <!-- Adam v: 14 GB -->
  <rect x="310" y="380" width="120" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="370" y="404" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Adam v 14 GB</text>
  <!-- Total label -->
  <text x="370" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#333">56 GB</text>
  <!-- Bar label -->
  <text x="370" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Training (7B)</text>
  <text x="370" y="453" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">FP16 + Adam FP32</text>

  <!-- ===== Bar 3: GPT-2 XL FP32 — 89 GB ===== -->
  <!-- Scale: 40px per 14 GB. 89 GB = 254px. From 420 up to 166 -->
  <!-- Weights: 6 GB = 17px -->
  <rect x="500" y="166" width="120" height="17" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="560" y="179" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Weights 6 GB</text>
  <!-- Gradients: 6 GB = 17px -->
  <rect x="500" y="183" width="120" height="17" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="560" y="196" text-anchor="middle" font-size="7.5" font-weight="700" fill="#333">Grads 6 GB</text>
  <!-- Adam states: 12 GB = 34px -->
  <rect x="500" y="200" width="120" height="34" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="560" y="221" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Adam 12 GB</text>
  <!-- Activations: 65 GB = 186px -->
  <rect x="500" y="234" width="120" height="186" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="560" y="330" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Activations</text>
  <text x="560" y="345" text-anchor="middle" font-size="8" font-weight="400" fill="#555">65 GB</text>
  <!-- Total label -->
  <text x="560" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#333">89 GB</text>
  <!-- Bar label -->
  <text x="560" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPT-2 XL (FP32)</text>
  <text x="560" y="453" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Full training state</text>

  <!-- ===== Memory limit lines ===== -->
  <!-- V100: 32 GB -> y = 420 - (32/14)*40 = 420 - 91.4 = 329 -->
  <line x1="85" y1="329" x2="650" y2="329" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="655" y="322" width="90" height="16" rx="8" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="700" y="333" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c44">V100: 32 GB</text>

  <!-- A100: 80 GB -> y = 420 - (80/14)*40 = 420 - 228.6 = 191 -->
  <line x1="85" y1="191" x2="650" y2="191" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="655" y="184" width="90" height="16" rx="8" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="700" y="195" text-anchor="middle" font-size="8.5" font-weight="700" fill="#c87b2a">A100: 80 GB</text>

  <!-- ===== 4x Multiplier Callout ===== -->
  <rect x="750" y="290" width="130" height="50" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="815" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">Training = 4x</text>
  <text x="815" y="328" text-anchor="middle" font-size="9" font-weight="400" fill="#333">inference memory</text>

  <!-- ===== Legend ===== -->
  <rect x="750" y="60" width="12" height="12" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="768" y="71" font-size="8.5" font-weight="400" fill="#555">Weights</text>
  <rect x="750" y="80" width="12" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="768" y="91" font-size="8.5" font-weight="400" fill="#555">Gradients</text>
  <rect x="750" y="100" width="12" height="12" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="768" y="111" font-size="8.5" font-weight="400" fill="#555">Optimizer (Adam)</text>
  <rect x="750" y="120" width="12" height="12" rx="2" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="768" y="131" font-size="8.5" font-weight="400" fill="#555">Activations</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">The 4x multiplier is the most important number for training systems engineers</text>
</svg>
