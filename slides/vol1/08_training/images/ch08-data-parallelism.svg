<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Data Parallelism: Replicate Model, Split Data</text>

  <!-- ===== Tier 1: Data Split ===== -->
  <text x="450" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Mini-batch Split Across GPUs</text>

  <!-- 4 data shards -->
  <rect x="95" y="68" width="155" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="173" y="87" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Shard 1/4</text>

  <rect x="270" y="68" width="155" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="348" y="87" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Shard 2/4</text>

  <rect x="445" y="68" width="155" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="523" y="87" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Shard 3/4</text>

  <rect x="620" y="68" width="155" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="698" y="87" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Shard 4/4</text>

  <!-- Arrows from shards to GPUs -->
  <line x1="173" y1="98" x2="173" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="348" y1="98" x2="348" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="523" y1="98" x2="523" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="698" y1="98" x2="698" y2="130" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Tier 2: GPU Boxes ===== -->
  <!-- GPU 0 -->
  <rect x="95" y="130" width="155" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="105" y="133" width="50" height="16" rx="8" fill="#a31f34"/>
  <text x="130" y="145" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 0</text>
  <rect x="110" y="155" width="125" height="30" rx="3" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="173" y="174" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Full model copy</text>
  <text x="173" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Fwd + Bwd</text>
  <text x="173" y="220" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Local gradients</text>
  <text x="173" y="240" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">grad_0</text>

  <!-- GPU 1 -->
  <rect x="270" y="130" width="155" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="280" y="133" width="50" height="16" rx="8" fill="#a31f34"/>
  <text x="305" y="145" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 1</text>
  <rect x="285" y="155" width="125" height="30" rx="3" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="348" y="174" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Full model copy</text>
  <text x="348" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Fwd + Bwd</text>
  <text x="348" y="220" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Local gradients</text>
  <text x="348" y="240" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">grad_1</text>

  <!-- GPU 2 -->
  <rect x="445" y="130" width="155" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="455" y="133" width="50" height="16" rx="8" fill="#a31f34"/>
  <text x="480" y="145" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 2</text>
  <rect x="460" y="155" width="125" height="30" rx="3" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="523" y="174" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Full model copy</text>
  <text x="523" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Fwd + Bwd</text>
  <text x="523" y="220" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Local gradients</text>
  <text x="523" y="240" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">grad_2</text>

  <!-- GPU 3 -->
  <rect x="620" y="130" width="155" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="630" y="133" width="50" height="16" rx="8" fill="#a31f34"/>
  <text x="655" y="145" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU 3</text>
  <rect x="635" y="155" width="125" height="30" rx="3" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="698" y="174" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">Full model copy</text>
  <text x="698" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Fwd + Bwd</text>
  <text x="698" y="220" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Local gradients</text>
  <text x="698" y="240" text-anchor="middle" font-size="8" font-weight="400" fill="#4a90c4">grad_3</text>

  <!-- ===== Tier 3: AllReduce ===== -->
  <!-- Arrows from GPUs to AllReduce ring -->
  <line x1="173" y1="250" x2="173" y2="290" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="348" y1="250" x2="348" y2="290" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="523" y1="250" x2="523" y2="290" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="698" y1="250" x2="698" y2="290" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- AllReduce bar -->
  <rect x="95" y="290" width="680" height="50" rx="6" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="435" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#2d7a2d">AllReduce: Average Gradients</text>
  <text x="435" y="328" text-anchor="middle" font-size="9" font-weight="400" fill="#555">grad_avg = (grad_0 + grad_1 + grad_2 + grad_3) / 4</text>

  <!-- Ring arrows inside AllReduce -->
  <path d="M180,315 C180,305 340,305 340,315" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M350,320 C350,330 520,330 520,320" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M530,315 C530,305 690,305 690,315" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- ===== Tier 4: Synchronized Update ===== -->
  <line x1="435" y1="340" x2="435" y2="365" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="250" y="365" width="370" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="435" y="387" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Synchronized Weight Update (all GPUs identical)</text>

  <!-- ===== Communication cost callout ===== -->
  <rect x="95" y="420" width="350" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="270" y="437" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Communication per step: ~2x model size (ring)</text>
  <text x="270" y="450" text-anchor="middle" font-size="8" font-weight="400" fill="#555">Bandwidth = binding constraint for scaling</text>

  <!-- Scaling efficiency -->
  <rect x="470" y="420" width="310" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="625" y="437" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Scaling Efficiency (4 GPUs)</text>
  <text x="625" y="450" text-anchor="middle" font-size="8" font-weight="400" fill="#555">NVLink: ~3.6x | PCIe: ~2.5x (of ideal 4x)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Interconnect bandwidth is the binding constraint for scaling efficiency</text>
</svg>
