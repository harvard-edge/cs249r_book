<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Iron Law of Training: Three Levers for Optimization</text>

  <!-- ===== Central Equation ===== -->
  <rect x="150" y="50" width="600" height="60" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" font-size="18" font-weight="700" fill="#333">T_train  =  O  /  ( R_peak  x  eta )</text>
  <text x="450" y="100" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Training Time = Total Operations / (Peak Throughput x Utilization)</text>

  <!-- ===== Three Columns for Each Term ===== -->

  <!-- Column 1: O (Total Operations) -->
  <rect x="50" y="140" width="250" height="280" rx="6" fill="#cfe2f3" fill-opacity="0.2" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="175" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#4a90c4">O (Total Operations)</text>
  <text x="175" y="185" text-anchor="middle" font-size="9" font-weight="400" fill="#555">FLOPs for the full training run</text>

  <!-- What affects O -->
  <text x="70" y="215" font-size="9" font-weight="700" fill="#333">Determined by:</text>
  <text x="70" y="235" font-size="8.5" font-weight="400" fill="#555">- Model size (parameters)</text>
  <text x="70" y="252" font-size="8.5" font-weight="400" fill="#555">- Dataset size (tokens/images)</text>
  <text x="70" y="269" font-size="8.5" font-weight="400" fill="#555">- Number of epochs</text>
  <text x="70" y="286" font-size="8.5" font-weight="400" fill="#555">- Fwd + 2x Bwd per step</text>

  <!-- Optimizations targeting O -->
  <text x="70" y="315" font-size="9" font-weight="700" fill="#4a90c4">Optimizations:</text>
  <rect x="70" y="325" width="210" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="175" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">FlashAttention (reduce O)</text>
  <rect x="70" y="352" width="210" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="175" y="367" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Checkpointing (increase O)</text>
  <text x="175" y="400" text-anchor="middle" font-size="8" font-weight="400" fill="#999">Checkpoint trades O for memory</text>

  <!-- Column 2: R_peak (Peak Throughput) -->
  <rect x="325" y="140" width="250" height="280" rx="6" fill="#fdebd0" fill-opacity="0.2" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#c87b2a">R_peak (Peak Throughput)</text>
  <text x="450" y="185" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Hardware FLOPS capacity</text>

  <!-- What affects R_peak -->
  <text x="345" y="215" font-size="9" font-weight="700" fill="#333">Determined by:</text>
  <text x="345" y="235" font-size="8.5" font-weight="400" fill="#555">- GPU model (V100, A100, H100)</text>
  <text x="345" y="252" font-size="8.5" font-weight="400" fill="#555">- Precision (FP32 vs FP16)</text>
  <text x="345" y="269" font-size="8.5" font-weight="400" fill="#555">- Tensor Core availability</text>
  <text x="345" y="286" font-size="8.5" font-weight="400" fill="#555">- Set by procurement</text>

  <!-- Optimizations targeting R_peak -->
  <text x="345" y="315" font-size="9" font-weight="700" fill="#c87b2a">Optimizations:</text>
  <rect x="345" y="325" width="210" height="22" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="450" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Mixed Precision (16x on TC)</text>
  <rect x="345" y="352" width="210" height="22" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="450" y="367" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Hardware upgrade</text>
  <text x="450" y="400" text-anchor="middle" font-size="8" font-weight="400" fill="#999">V100 FP16: 125 TFLOPS</text>

  <!-- Column 3: eta (Utilization) -->
  <rect x="600" y="140" width="250" height="280" rx="6" fill="#d4edda" fill-opacity="0.2" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="725" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">eta (Utilization)</text>
  <text x="725" y="185" text-anchor="middle" font-size="9" font-weight="400" fill="#555">Fraction of peak actually used</text>

  <!-- What affects eta -->
  <text x="620" y="215" font-size="9" font-weight="700" fill="#333">Determined by:</text>
  <text x="620" y="235" font-size="8.5" font-weight="400" fill="#555">- Pipeline efficiency</text>
  <text x="620" y="252" font-size="8.5" font-weight="400" fill="#555">- Memory bandwidth stalls</text>
  <text x="620" y="269" font-size="8.5" font-weight="400" fill="#555">- Kernel launch overhead</text>
  <text x="620" y="286" font-size="8.5" font-weight="400" fill="#555">- Sync barriers</text>

  <!-- Optimizations targeting eta -->
  <text x="620" y="315" font-size="9" font-weight="700" fill="#3d9e5a">Optimizations:</text>
  <rect x="620" y="325" width="210" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="725" y="340" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Data Prefetching</text>
  <rect x="620" y="352" width="210" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="725" y="367" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Gradient Accumulation</text>
  <rect x="620" y="379" width="210" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="725" y="394" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Operator Fusion</text>

  <!-- ===== Key insight ===== -->
  <rect x="200" y="440" width="500" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="460" text-anchor="middle" font-size="10" font-weight="700" fill="#333">GPT-3 achieved eta = 0.45. Current target: eta > 0.55.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Every optimization in this chapter targets one of these three terms</text>
</svg>
