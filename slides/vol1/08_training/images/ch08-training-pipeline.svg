<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c44" stroke-width="1.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Staged Training Pipeline: Overlapping Stages to Eliminate Accelerator Bubbles</text>

  <!-- ===== Stage Labels ===== -->
  <text x="80" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">Data Load</text>
  <text x="80" y="73" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">(CPU/NVMe)</text>

  <text x="250" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#bbb">H→D Transfer</text>
  <text x="250" y="73" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">(PCIe)</text>

  <text x="470" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">Fwd / Bwd Pass</text>
  <text x="470" y="73" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">(GPU Compute)</text>

  <text x="700" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">Grad Sync</text>
  <text x="700" y="73" text-anchor="middle" font-size="8.5" font-weight="400" fill="#555">(NVLink)</text>

  <!-- ===== Time axis ===== -->
  <line x1="30" y1="85" x2="870" y2="85" stroke="#555" stroke-width="1"/>
  <text x="870" y="98" text-anchor="end" font-size="8" fill="#555">Time →</text>

  <!-- ===== NAIVE (No Overlap) — Top Section ===== -->
  <text x="30" y="115" font-size="11" font-weight="700" fill="#333">Naive (Sequential)</text>

  <!-- Batch N -->
  <text x="30" y="140" font-size="9" font-weight="400" fill="#555">Batch N</text>
  <rect x="80" y="125" width="120" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="140" y="143" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Data Load</text>
  <rect x="205" y="125" width="80" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="245" y="143" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Transfer</text>
  <rect x="290" y="125" width="220" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="400" y="143" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Fwd / Bwd</text>
  <rect x="515" y="125" width="100" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="565" y="143" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Sync</text>

  <!-- GPU idle bubble -->
  <rect x="80" y="125" width="210" height="28" rx="0" fill="url(#hatch)" opacity="0.3"/>

  <!-- Batch N+1 -->
  <text x="30" y="180" font-size="9" font-weight="400" fill="#555">Batch N+1</text>
  <rect x="620" y="165" width="120" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="680" y="183" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Data Load</text>
  <rect x="745" y="165" width="80" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="785" y="183" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Transfer</text>

  <!-- Bubble annotation -->
  <text x="185" y="170" text-anchor="middle" font-size="9" font-weight="400" fill="#c44" font-style="italic">GPU idle — waiting for data</text>

  <!-- ===== Separator ===== -->
  <line x1="30" y1="210" x2="870" y2="210" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== PIPELINED (Overlapped) — Bottom Section ===== -->
  <text x="30" y="240" font-size="11" font-weight="700" fill="#333">Pipelined (Overlapped)</text>

  <!-- Batch N -->
  <text x="30" y="268" font-size="9" font-weight="400" fill="#555">Batch N</text>
  <rect x="80" y="253" width="120" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="140" y="271" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Data Load</text>
  <rect x="205" y="253" width="80" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="245" y="271" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Transfer</text>
  <rect x="290" y="253" width="220" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="400" y="271" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Fwd / Bwd</text>
  <rect x="515" y="253" width="100" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="565" y="271" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Sync</text>

  <!-- Batch N+1 (overlapped) -->
  <text x="30" y="308" font-size="9" font-weight="400" fill="#555">Batch N+1</text>
  <rect x="290" y="293" width="120" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="350" y="311" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Data Load</text>
  <rect x="415" y="293" width="80" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="455" y="311" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Transfer</text>
  <rect x="500" y="293" width="220" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="610" y="311" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Fwd / Bwd</text>
  <rect x="725" y="293" width="100" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="775" y="311" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Sync</text>

  <!-- Batch N+2 -->
  <text x="30" y="348" font-size="9" font-weight="400" fill="#555">Batch N+2</text>
  <rect x="500" y="333" width="120" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="560" y="351" text-anchor="middle" font-size="8.5" font-weight="700" fill="#333">Data Load</text>
  <rect x="625" y="333" width="80" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="665" y="351" text-anchor="middle" font-size="8.5" font-weight="700" fill="#555">Transfer</text>

  <!-- Overlap annotation -->
  <text x="400" y="380" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Prefetching eliminates GPU idle time</text>

  <!-- ===== Key Insight Box ===== -->
  <rect x="100" y="410" width="700" height="40" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="427" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Key Insight:</text>
  <text x="450" y="442" text-anchor="middle" font-size="9" font-weight="400" fill="#555">The slowest stage sets the pace. Overlap all stages so the accelerator never waits.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Goal: overlap data loading with compute so the accelerator never sits idle</text>
</svg>
