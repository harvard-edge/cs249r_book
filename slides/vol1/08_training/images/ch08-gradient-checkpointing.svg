<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Gradient Checkpointing: Trading Compute for Memory</text>

  <!-- ===== Vertical Divider ===== -->
  <line x1="450" y1="45" x2="450" y2="430" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT PANEL: Standard Backprop ===== -->
  <text x="225" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#c44">Standard: Store All Activations</text>

  <!-- 6 layers, all stored (blue) -->
  <rect x="100" y="80" width="250" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 1 — Stored</text>

  <rect x="100" y="120" width="250" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 2 — Stored</text>

  <rect x="100" y="160" width="250" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="182" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 3 — Stored</text>

  <rect x="100" y="200" width="250" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="222" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 4 — Stored</text>

  <rect x="100" y="240" width="250" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="262" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 5 — Stored</text>

  <rect x="100" y="280" width="250" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="302" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 6 — Stored</text>

  <!-- Memory gauge (left) — nearly full, red -->
  <rect x="110" y="340" width="230" height="25" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <rect x="112" y="342" width="220" height="21" rx="3" fill="#f9d6d5"/>
  <text x="225" y="357" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">6L activations — 65 GB (GPT-2)</text>

  <!-- ===== RIGHT PANEL: Checkpointing ===== -->
  <text x="675" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#3d9e5a">Checkpointing: Store sqrt(L)</text>

  <!-- Layer 1 — Checkpoint (green) -->
  <rect x="550" y="80" width="250" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 1 — Checkpoint</text>

  <!-- Layer 2 — Recompute (dashed) -->
  <rect x="550" y="120" width="250" height="35" rx="4" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="675" y="142" text-anchor="middle" font-size="9" font-weight="400" fill="#999">Layer 2 — Recompute</text>

  <!-- Layer 3 — Checkpoint (green) -->
  <rect x="550" y="160" width="250" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="182" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 3 — Checkpoint</text>

  <!-- Layer 4 — Recompute -->
  <rect x="550" y="200" width="250" height="35" rx="4" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="675" y="222" text-anchor="middle" font-size="9" font-weight="400" fill="#999">Layer 4 — Recompute</text>

  <!-- Layer 5 — Checkpoint (green) -->
  <rect x="550" y="240" width="250" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="262" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Layer 5 — Checkpoint</text>

  <!-- Layer 6 — Recompute -->
  <rect x="550" y="280" width="250" height="35" rx="4" fill="none" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="675" y="302" text-anchor="middle" font-size="9" font-weight="400" fill="#999">Layer 6 — Recompute</text>

  <!-- Memory gauge (right) — small fill, green -->
  <rect x="560" y="340" width="230" height="25" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <rect x="562" y="342" width="80" height="21" rx="3" fill="#d4edda"/>
  <text x="675" y="357" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">3 checkpoints — ~10 GB</text>

  <!-- ===== Trade-off callout ===== -->
  <rect x="250" y="395" width="400" height="50" rx="6" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34">10x less memory for 33% more compute</text>
  <text x="450" y="433" text-anchor="middle" font-size="9" font-weight="400" fill="#555">GPT-2: 48 layers → 7 checkpoints instead of 48 full activation tensors</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" text-anchor="middle" font-size="9" font-weight="400" fill="#999" font-style="italic">Use when memory is the binding constraint, not throughput</text>
</svg>
