<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Four-Filter Deployment Decision Framework</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L8,0 L4,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Entry: All 4 paradigms ===== -->
  <rect x="250" y="48" width="400" height="32" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <rect x="270" y="54" width="70" height="20" rx="10" fill="#4a90c4"/>
  <text x="305" y="68" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Cloud</text>
  <rect x="350" y="54" width="70" height="20" rx="10" fill="#3d9e5a"/>
  <text x="385" y="68" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Edge</text>
  <rect x="430" y="54" width="70" height="20" rx="10" fill="#c87b2a"/>
  <text x="465" y="68" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Mobile</text>
  <rect x="510" y="54" width="70" height="20" rx="10" fill="#c44"/>
  <text x="545" y="68" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">TinyML</text>

  <!-- Arrow down -->
  <line x1="450" y1="80" x2="450" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Filter 1: Privacy ===== -->
  <rect x="200" y="105" width="500" height="60" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="220" y="128" font-size="11" font-weight="700" fill="#c44">Filter 1: Privacy</text>
  <text x="220" y="148" font-size="9" fill="#555">Must data stay on-device?</text>

  <!-- Eliminated -->
  <rect x="720" y="115" width="130" height="40" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="785" y="133" font-size="8" font-weight="700" fill="#999" text-anchor="middle" text-decoration="line-through">Cloud</text>
  <text x="785" y="148" font-size="8" fill="#999" text-anchor="middle">eliminated if yes</text>

  <!-- Arrow down -->
  <line x1="450" y1="165" x2="450" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Filter 2: Latency ===== -->
  <rect x="200" y="190" width="500" height="60" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="220" y="213" font-size="11" font-weight="700" fill="#c87b2a">Filter 2: Latency</text>
  <text x="220" y="233" font-size="9" fill="#555">Budget &lt; 10 ms? Must respond in real-time?</text>

  <rect x="720" y="200" width="130" height="40" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="785" y="218" font-size="8" font-weight="700" fill="#999" text-anchor="middle" text-decoration="line-through">Cloud/Edge</text>
  <text x="785" y="233" font-size="8" fill="#999" text-anchor="middle">too slow if &lt;10ms</text>

  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Filter 3: Compute ===== -->
  <rect x="200" y="275" width="500" height="60" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="220" y="298" font-size="11" font-weight="700" fill="#4a90c4">Filter 3: Compute</text>
  <text x="220" y="318" font-size="9" fill="#555">Model &gt; 100 MB? Need billions of FLOPs?</text>

  <rect x="720" y="285" width="130" height="40" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="785" y="303" font-size="8" font-weight="700" fill="#999" text-anchor="middle" text-decoration="line-through">TinyML</text>
  <text x="785" y="318" font-size="8" fill="#999" text-anchor="middle">model too large</text>

  <!-- Arrow down -->
  <line x1="450" y1="335" x2="450" y2="355" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Filter 4: Cost ===== -->
  <rect x="200" y="360" width="500" height="60" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="220" y="383" font-size="11" font-weight="700" fill="#3d9e5a">Filter 4: Cost</text>
  <text x="220" y="403" font-size="9" fill="#555">Total cost of ownership: CapEx + OpEx + dev time?</text>

  <rect x="720" y="370" width="130" height="40" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="785" y="388" font-size="8" fill="#999" text-anchor="middle">Compare TCO of</text>
  <text x="785" y="403" font-size="8" fill="#999" text-anchor="middle">remaining options</text>

  <!-- Arrow down to result -->
  <line x1="450" y1="420" x2="450" y2="435" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- ===== Result ===== -->
  <rect x="300" y="438" width="300" height="32" rx="16" fill="#a31f34"/>
  <text x="450" y="459" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Selected Paradigm(s)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="493" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each filter is a physical constraint, not a preference</text>
</svg>
