<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Five Lighthouse Models Span the Deployment Spectrum</text>

  <!-- ===== Log-scale axis ===== -->
  <line x1="60" y1="280" x2="840" y2="280" stroke="#bbb" stroke-width="1.5"/>

  <!-- Tick marks and labels -->
  <line x1="120" y1="275" x2="120" y2="285" stroke="#bbb" stroke-width="1.5"/>
  <text x="120" y="300" font-size="9" fill="#555" text-anchor="middle">20 MFLOPs</text>

  <line x1="300" y1="275" x2="300" y2="285" stroke="#bbb" stroke-width="1.5"/>
  <text x="300" y="300" font-size="9" fill="#555" text-anchor="middle">300 MFLOPs</text>

  <line x1="540" y1="275" x2="540" y2="285" stroke="#bbb" stroke-width="1.5"/>
  <text x="540" y="300" font-size="9" fill="#555" text-anchor="middle">1.5 BFLOPs</text>

  <line x1="720" y1="275" x2="720" y2="285" stroke="#bbb" stroke-width="1.5"/>
  <text x="720" y="300" font-size="9" fill="#555" text-anchor="middle">4.1 GFLOPs</text>

  <text x="450" y="318" font-size="9" fill="#999" text-anchor="middle">Compute Requirement (log scale)</text>

  <!-- ===== KWS (leftmost) ===== -->
  <line x1="120" y1="180" x2="120" y2="275" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="50" y="60" width="140" height="118" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="50" y="60" width="140" height="28" rx="6" fill="#c44"/>
  <text x="120" y="80" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">KWS DS-CNN</text>
  <text x="120" y="104" font-size="9" fill="#555" text-anchor="middle">~20 MFLOPs</text>
  <text x="120" y="118" font-size="9" fill="#555" text-anchor="middle">~26K params</text>
  <text x="120" y="132" font-size="9" fill="#555" text-anchor="middle">~100 KB</text>
  <rect x="70" y="142" width="100" height="22" rx="11" fill="#c44"/>
  <text x="120" y="158" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Tiny Constraint</text>

  <!-- ===== MobileNet ===== -->
  <line x1="300" y1="180" x2="300" y2="275" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="230" y="60" width="140" height="118" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="230" y="60" width="140" height="28" rx="6" fill="#c87b2a"/>
  <text x="300" y="80" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">MobileNetV2</text>
  <text x="300" y="104" font-size="9" fill="#555" text-anchor="middle">~300 MFLOPs</text>
  <text x="300" y="118" font-size="9" fill="#555" text-anchor="middle">3.4M params</text>
  <text x="300" y="132" font-size="9" fill="#555" text-anchor="middle">~14 MB (FP32)</text>
  <rect x="250" y="142" width="100" height="22" rx="11" fill="#c87b2a"/>
  <text x="300" y="158" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Efficient Compute</text>

  <!-- ===== DLRM ===== -->
  <line x1="480" y1="180" x2="480" y2="275" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="410" y="60" width="140" height="118" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="410" y="60" width="140" height="28" rx="6" fill="#c87b2a"/>
  <text x="480" y="80" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">DLRM</text>
  <text x="480" y="104" font-size="9" fill="#555" text-anchor="middle">~variable FLOPs</text>
  <text x="480" y="118" font-size="9" fill="#555" text-anchor="middle">Embeddings: 100+ GB</text>
  <text x="480" y="132" font-size="9" fill="#555" text-anchor="middle">Memory-capacity bound</text>
  <rect x="430" y="142" width="100" height="22" rx="11" fill="#c87b2a"/>
  <text x="480" y="158" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Sparse Scatter</text>

  <!-- ===== GPT-2/Llama ===== -->
  <line x1="630" y1="180" x2="630" y2="275" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="560" y="60" width="140" height="118" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="560" y="60" width="140" height="28" rx="6" fill="#3d9e5a"/>
  <text x="630" y="80" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">GPT-2 / Llama</text>
  <text x="630" y="104" font-size="9" fill="#555" text-anchor="middle">1.5B+ params</text>
  <text x="630" y="118" font-size="9" fill="#555" text-anchor="middle">Token-at-a-time</text>
  <text x="630" y="132" font-size="9" fill="#555" text-anchor="middle">BW-bound inference</text>
  <rect x="580" y="142" width="100" height="22" rx="11" fill="#3d9e5a"/>
  <text x="630" y="158" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Bandwidth Hog</text>

  <!-- ===== ResNet-50 ===== -->
  <line x1="780" y1="180" x2="780" y2="275" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,2"/>
  <rect x="710" y="60" width="140" height="118" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="710" y="60" width="140" height="28" rx="6" fill="#4a90c4"/>
  <text x="780" y="80" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ResNet-50</text>
  <text x="780" y="104" font-size="9" fill="#555" text-anchor="middle">~4.1 GFLOPs</text>
  <text x="780" y="118" font-size="9" fill="#555" text-anchor="middle">25.6M params</text>
  <text x="780" y="132" font-size="9" fill="#555" text-anchor="middle">~98 MB (FP32)</text>
  <rect x="730" y="142" width="100" height="22" rx="11" fill="#4a90c4"/>
  <text x="780" y="158" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Compute Beast</text>

  <!-- ===== Deployment paradigm zones along bottom ===== -->
  <!-- TinyML zone -->
  <rect x="60" y="335" width="150" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="135" y="355" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">TinyML</text>

  <!-- Mobile zone -->
  <rect x="230" y="335" width="150" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="305" y="355" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Mobile / Edge</text>

  <!-- Cloud zone -->
  <rect x="500" y="335" width="340" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="670" y="355" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Cloud</text>

  <!-- ===== Summary pill ===== -->
  <rect x="250" y="390" width="400" height="36" rx="18" fill="#a31f34"/>
  <text x="450" y="413" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">5 models, 5 bottlenecks --- recur in every chapter</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">No single paradigm fits all --- each lighthouse isolates a distinct system bottleneck</text>
</svg>
