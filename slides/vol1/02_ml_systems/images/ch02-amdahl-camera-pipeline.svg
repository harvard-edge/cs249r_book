<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Amdahl's Law: Smartphone Camera Pipeline</text>

  <!-- ===== BEFORE bar ===== -->
  <text x="50" y="80" font-size="11" font-weight="700" fill="#333">Before</text>
  <text x="50" y="95" font-size="9" fill="#555">200 ms total</text>

  <!-- ISP: 100ms = 50% -->
  <rect x="130" y="65" width="325" height="42" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="292" y="84" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">ISP + Auto-exposure</text>
  <text x="292" y="100" font-size="9" fill="#555" text-anchor="middle">100 ms (50%)</text>

  <!-- ML: 60ms = 30% -->
  <rect x="455" y="65" width="195" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="552" y="84" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">ML Classify</text>
  <text x="552" y="100" font-size="9" fill="#555" text-anchor="middle">60 ms (30%)</text>

  <!-- Post: 40ms = 20% -->
  <rect x="650" y="65" width="130" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="715" y="84" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Post</text>
  <text x="715" y="100" font-size="9" fill="#555" text-anchor="middle">40 ms (20%)</text>

  <!-- ===== 10x annotation ===== -->
  <text x="552" y="135" font-size="14" font-weight="700" fill="#4a90c4" text-anchor="middle">10x faster!</text>
  <line x1="552" y1="140" x2="552" y2="158" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M545,155 L552,165 L559,155" fill="none" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- ===== AFTER bar ===== -->
  <text x="50" y="188" font-size="11" font-weight="700" fill="#333">After</text>
  <text x="50" y="203" font-size="9" fill="#555">146 ms total</text>

  <!-- ISP: 100ms (unchanged) -->
  <rect x="130" y="173" width="325" height="42" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="292" y="192" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">ISP + Auto-exposure</text>
  <text x="292" y="208" font-size="9" fill="#555" text-anchor="middle">100 ms (unchanged)</text>

  <!-- ML: 6ms (was 60) -->
  <rect x="455" y="173" width="20" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="490" y="192" font-size="9" font-weight="700" fill="#4a90c4">6 ms</text>

  <!-- Post: 40ms (unchanged) -->
  <rect x="525" y="173" width="130" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="590" y="192" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Post</text>
  <text x="590" y="208" font-size="9" fill="#555" text-anchor="middle">40 ms (unchanged)</text>

  <!-- Savings bracket -->
  <rect x="660" y="173" width="120" height="42" rx="4" fill="#fff" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="720" y="198" font-size="9" fill="#999" text-anchor="middle">54 ms saved</text>

  <!-- ===== Equation section ===== -->
  <rect x="100" y="245" width="700" height="100" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="272" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Amdahl's Law</text>

  <text x="450" y="298" font-size="11" fill="#333" text-anchor="middle">Speedup = 1 / ( (1 - p) + p/s )  where p = 0.30, s = 10</text>
  <text x="450" y="322" font-size="11" fill="#333" text-anchor="middle">Speedup = 1 / ( 0.70 + 0.30/10 ) = 1 / 0.73 = 1.37x</text>

  <!-- ===== Result comparison ===== -->
  <rect x="150" y="370" width="280" height="70" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="290" y="395" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Expected</text>
  <text x="290" y="418" font-size="18" font-weight="700" fill="#4a90c4" text-anchor="middle">10x</text>
  <text x="290" y="433" font-size="9" fill="#555" text-anchor="middle">model-level speedup</text>

  <!-- vs -->
  <text x="450" y="410" font-size="14" font-weight="700" fill="#333" text-anchor="middle">vs</text>

  <!-- Actual -->
  <rect x="470" y="370" width="280" height="70" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="610" y="395" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Actual</text>
  <text x="610" y="418" font-size="18" font-weight="700" fill="#c44" text-anchor="middle">1.37x</text>
  <text x="610" y="433" font-size="9" fill="#555" text-anchor="middle">system-level speedup</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Profile the whole pipeline before optimizing any component</text>
</svg>
