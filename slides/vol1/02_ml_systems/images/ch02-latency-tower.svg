<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Latency Numbers Every ML Engineer Should Know</text>

  <!-- ===== Vertical tower (left side) ===== -->
  <!-- Compute operations (blue) -->
  <rect x="60" y="55" width="360" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="70" y="72" font-size="9" font-weight="700" fill="#4a90c4">GPU matrix multiply</text>
  <text x="410" y="72" font-size="9" font-weight="700" fill="#333" text-anchor="end">~1 ns</text>
  <text x="410" y="86" font-size="8" fill="#555" text-anchor="end">Tensor Core FMA</text>

  <rect x="60" y="100" width="360" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="70" y="117" font-size="9" font-weight="700" fill="#4a90c4">NPU inference op</text>
  <text x="410" y="117" font-size="9" font-weight="700" fill="#333" text-anchor="end">~10 ns</text>
  <text x="410" y="131" font-size="8" fill="#555" text-anchor="end">Mobile neural engine</text>

  <!-- Memory operations (green) -->
  <rect x="60" y="150" width="360" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="70" y="167" font-size="9" font-weight="700" fill="#3d9e5a">L1 cache hit</text>
  <text x="410" y="167" font-size="9" font-weight="700" fill="#333" text-anchor="end">~1 ns</text>
  <text x="410" y="181" font-size="8" fill="#555" text-anchor="end">On-chip SRAM</text>

  <rect x="60" y="195" width="360" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="70" y="212" font-size="9" font-weight="700" fill="#3d9e5a">HBM read</text>
  <text x="410" y="212" font-size="9" font-weight="700" fill="#333" text-anchor="end">20-50 ns</text>
  <text x="410" y="226" font-size="8" fill="#555" text-anchor="end">GPU high-bandwidth memory</text>

  <rect x="60" y="240" width="360" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="70" y="257" font-size="9" font-weight="700" fill="#3d9e5a">DRAM read</text>
  <text x="410" y="257" font-size="9" font-weight="700" fill="#333" text-anchor="end">50-100 ns</text>
  <text x="410" y="271" font-size="8" fill="#555" text-anchor="end">Main memory access</text>

  <!-- Network operations (orange) -->
  <rect x="60" y="290" width="360" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="70" y="307" font-size="9" font-weight="700" fill="#c87b2a">Same datacenter RTT</text>
  <text x="410" y="307" font-size="9" font-weight="700" fill="#333" text-anchor="end">0.5 ms</text>
  <text x="410" y="321" font-size="8" fill="#555" text-anchor="end">InfiniBand / Ethernet</text>

  <rect x="60" y="335" width="360" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="70" y="352" font-size="9" font-weight="700" fill="#c87b2a">Cross-region network</text>
  <text x="410" y="352" font-size="9" font-weight="700" fill="#333" text-anchor="end">50-150 ms</text>
  <text x="410" y="366" font-size="8" fill="#555" text-anchor="end">Speed of light + routing</text>

  <!-- ML operations (mixed) -->
  <rect x="60" y="385" width="360" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="402" font-size="9" font-weight="700" fill="#333">Wake-word detection</text>
  <text x="410" y="402" font-size="9" font-weight="700" fill="#c44" text-anchor="end">~0.1 ms</text>
  <text x="410" y="416" font-size="8" fill="#555" text-anchor="end">TinyML always-on</text>

  <rect x="60" y="430" width="360" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="70" y="447" font-size="9" font-weight="700" fill="#333">LLM first token (GPT-4)</text>
  <text x="410" y="447" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="end">200-500 ms</text>
  <text x="410" y="461" font-size="8" fill="#555" text-anchor="end">Cloud inference</text>

  <!-- ===== Right side: Paradigm zones ===== -->
  <text x="600" y="70" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Deployment Zones</text>

  <!-- TinyML zone -->
  <rect x="490" y="85" width="220" height="55" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="600" y="106" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">TinyML</text>
  <text x="600" y="122" font-size="9" fill="#555" text-anchor="middle">&lt; 1 ms latency budget</text>

  <!-- Mobile zone -->
  <rect x="490" y="150" width="220" height="55" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="600" y="171" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Mobile</text>
  <text x="600" y="187" font-size="9" fill="#555" text-anchor="middle">5-50 ms latency budget</text>

  <!-- Edge zone -->
  <rect x="490" y="215" width="220" height="55" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="600" y="236" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Edge</text>
  <text x="600" y="252" font-size="9" fill="#555" text-anchor="middle">10-100 ms latency budget</text>

  <!-- Cloud zone -->
  <rect x="490" y="280" width="220" height="55" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="600" y="301" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Cloud</text>
  <text x="600" y="317" font-size="9" fill="#555" text-anchor="middle">100-500+ ms latency budget</text>

  <!-- Decision rule -->
  <rect x="480" y="360" width="240" height="56" rx="6" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="600" y="382" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Decision Rule</text>
  <text x="600" y="400" font-size="9" fill="#333" text-anchor="middle">If budget = X ms, no operation</text>
  <text x="600" y="413" font-size="9" fill="#333" text-anchor="middle">&gt; X on the critical path</text>

  <!-- Scale indicator -->
  <text x="750" y="460" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">8 orders of magnitude</text>
  <text x="750" y="475" font-size="9" fill="#555" text-anchor="middle">1 ns to 500 ms</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="493" font-size="9" fill="#999" text-anchor="middle" font-style="italic">If your latency budget is X ms, no operation &gt; X on the critical path</text>
</svg>
