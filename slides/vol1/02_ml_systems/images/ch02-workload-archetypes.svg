<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Four Workload Archetypes: Which Iron Law Term Dominates?</text>

  <!-- ===== Card 1: Compute Beast ===== -->
  <rect x="30" y="55" width="200" height="380" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="30" y="55" width="200" height="32" rx="6" fill="#4a90c4"/>
  <text x="130" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Compute Beast</text>

  <!-- Icon: grid of compute units -->
  <g transform="translate(90,105)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="22" y="0" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="44" y="0" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="66" y="0" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="0" y="22" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="22" y="22" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="44" y="22" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
    <rect x="66" y="22" width="18" height="18" rx="2" fill="#4a90c4" opacity="0.7"/>
  </g>

  <!-- Bottleneck term -->
  <text x="130" y="175" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Dominant Term</text>
  <rect x="55" y="182" width="150" height="28" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="201" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">O / (Rp x eta)</text>

  <!-- Description -->
  <text x="130" y="232" font-size="9" fill="#555" text-anchor="middle">Many FLOPs per byte</text>
  <text x="130" y="247" font-size="9" fill="#555" text-anchor="middle">High arithmetic intensity</text>
  <text x="130" y="262" font-size="9" fill="#555" text-anchor="middle">Dense matrix operations</text>

  <!-- Example -->
  <rect x="55" y="280" width="150" height="24" rx="12" fill="#a31f34"/>
  <text x="130" y="297" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">ResNet-50 Training</text>

  <!-- Paradigm -->
  <text x="130" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Paradigm</text>
  <text x="130" y="347" font-size="9" fill="#555" text-anchor="middle">Cloud (training)</text>

  <!-- Optimize -->
  <rect x="45" y="368" width="170" height="52" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="385" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Optimize: faster Rp</text>
  <text x="130" y="400" font-size="8" fill="#555" text-anchor="middle">More FLOPS, better</text>
  <text x="130" y="413" font-size="8" fill="#555" text-anchor="middle">hardware utilization (eta)</text>

  <!-- ===== Card 2: Bandwidth Hog ===== -->
  <rect x="245" y="55" width="200" height="380" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="245" y="55" width="200" height="32" rx="6" fill="#3d9e5a"/>
  <text x="345" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Bandwidth Hog</text>

  <!-- Icon: memory bus arrows -->
  <g transform="translate(305,105)">
    <rect x="20" y="0" width="40" height="40" rx="3" fill="#3d9e5a" opacity="0.3"/>
    <line x1="0" y1="12" x2="20" y2="12" stroke="#3d9e5a" stroke-width="2"/>
    <line x1="0" y1="28" x2="20" y2="28" stroke="#3d9e5a" stroke-width="2"/>
    <line x1="60" y1="12" x2="80" y2="12" stroke="#3d9e5a" stroke-width="2"/>
    <line x1="60" y1="28" x2="80" y2="28" stroke="#3d9e5a" stroke-width="2"/>
    <text x="40" y="26" font-size="10" fill="#3d9e5a" text-anchor="middle" font-weight="700">BW</text>
  </g>

  <text x="345" y="175" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Dominant Term</text>
  <rect x="270" y="182" width="150" height="28" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="345" y="201" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Dvol / BW</text>

  <text x="345" y="232" font-size="9" fill="#555" text-anchor="middle">Few FLOPs per byte</text>
  <text x="345" y="247" font-size="9" fill="#555" text-anchor="middle">Memory-bandwidth limited</text>
  <text x="345" y="262" font-size="9" fill="#555" text-anchor="middle">Sequential token generation</text>

  <rect x="270" y="280" width="150" height="24" rx="12" fill="#a31f34"/>
  <text x="345" y="297" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">GPT-2 / Llama Inference</text>

  <text x="345" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Paradigm</text>
  <text x="345" y="347" font-size="9" fill="#555" text-anchor="middle">Cloud / Edge</text>

  <rect x="260" y="368" width="170" height="52" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="345" y="385" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Optimize: wider BW</text>
  <text x="345" y="400" font-size="8" fill="#555" text-anchor="middle">HBM, batching, KV cache</text>
  <text x="345" y="413" font-size="8" fill="#555" text-anchor="middle">optimization</text>

  <!-- ===== Card 3: Sparse Scatter ===== -->
  <rect x="460" y="55" width="200" height="380" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="460" y="55" width="200" height="32" rx="6" fill="#c87b2a"/>
  <text x="560" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Sparse Scatter</text>

  <!-- Icon: scattered dots -->
  <g transform="translate(520,105)">
    <circle cx="10" cy="5" r="5" fill="#c87b2a" opacity="0.6"/>
    <circle cx="45" cy="15" r="5" fill="#c87b2a" opacity="0.6"/>
    <circle cx="25" cy="30" r="5" fill="#c87b2a" opacity="0.6"/>
    <circle cx="70" cy="8" r="5" fill="#c87b2a" opacity="0.6"/>
    <circle cx="55" cy="35" r="5" fill="#c87b2a" opacity="0.6"/>
    <circle cx="5" cy="35" r="5" fill="#c87b2a" opacity="0.6"/>
    <circle cx="40" cy="40" r="3" fill="#c87b2a" opacity="0.4"/>
    <circle cx="65" cy="25" r="3" fill="#c87b2a" opacity="0.4"/>
  </g>

  <text x="560" y="175" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Dominant Term</text>
  <rect x="485" y="182" width="150" height="28" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="560" y="201" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Memory Capacity</text>

  <text x="560" y="232" font-size="9" fill="#555" text-anchor="middle">Irregular access patterns</text>
  <text x="560" y="247" font-size="9" fill="#555" text-anchor="middle">Poor cache locality</text>
  <text x="560" y="262" font-size="9" fill="#555" text-anchor="middle">Massive embedding tables</text>

  <rect x="485" y="280" width="150" height="24" rx="12" fill="#a31f34"/>
  <text x="560" y="297" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">DLRM</text>

  <text x="560" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Paradigm</text>
  <text x="560" y="347" font-size="9" fill="#555" text-anchor="middle">Cloud only (distributed)</text>

  <rect x="475" y="368" width="170" height="52" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="560" y="385" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Optimize: memory capacity</text>
  <text x="560" y="400" font-size="8" fill="#555" text-anchor="middle">Distributed embedding,</text>
  <text x="560" y="413" font-size="8" fill="#555" text-anchor="middle">sharding across nodes</text>

  <!-- ===== Card 4: Tiny Constraint ===== -->
  <rect x="675" y="55" width="200" height="380" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="675" y="55" width="200" height="32" rx="6" fill="#c44"/>
  <text x="775" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Tiny Constraint</text>

  <!-- Icon: tiny chip -->
  <g transform="translate(745,105)">
    <rect x="10" y="5" width="40" height="35" rx="3" fill="#c44" opacity="0.3" stroke="#c44" stroke-width="1"/>
    <line x1="0" y1="15" x2="10" y2="15" stroke="#c44" stroke-width="1.5"/>
    <line x1="0" y1="25" x2="10" y2="25" stroke="#c44" stroke-width="1.5"/>
    <line x1="50" y1="15" x2="60" y2="15" stroke="#c44" stroke-width="1.5"/>
    <line x1="50" y1="25" x2="60" y2="25" stroke="#c44" stroke-width="1.5"/>
    <text x="30" y="28" font-size="8" fill="#c44" text-anchor="middle" font-weight="700">MCU</text>
  </g>

  <text x="775" y="175" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Dominant Term</text>
  <rect x="700" y="182" width="150" height="28" rx="4" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="775" y="201" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Energy / Inference</text>

  <text x="775" y="232" font-size="9" fill="#555" text-anchor="middle">Extreme power envelope</text>
  <text x="775" y="247" font-size="9" fill="#555" text-anchor="middle">&lt; 1 mW, &lt; 256 KB</text>
  <text x="775" y="262" font-size="9" fill="#555" text-anchor="middle">Always-on sensing</text>

  <rect x="700" y="280" width="150" height="24" rx="12" fill="#a31f34"/>
  <text x="775" y="297" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">KWS DS-CNN</text>

  <text x="775" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Paradigm</text>
  <text x="775" y="347" font-size="9" fill="#555" text-anchor="middle">TinyML exclusively</text>

  <rect x="690" y="368" width="170" height="52" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="775" y="385" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Optimize: energy efficiency</text>
  <text x="775" y="400" font-size="8" fill="#555" text-anchor="middle">Quantization, pruning,</text>
  <text x="775" y="413" font-size="8" fill="#555" text-anchor="middle">architecture search</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Identify the archetype before optimizing --- wrong-term optimization yields 0% speedup</text>
</svg>
