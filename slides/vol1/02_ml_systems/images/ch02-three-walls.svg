<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Three Physical Walls Create Four Deployment Paradigms</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Light Barrier (Left) ===== -->
  <rect x="40" y="60" width="260" height="360" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="40" y="60" width="260" height="36" rx="6" fill="#c87b2a"/>
  <text x="170" y="84" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Light Barrier</text>

  <!-- Wall icon -->
  <rect x="145" y="115" width="50" height="80" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="170" y="155" font-size="24" fill="#c87b2a" text-anchor="middle" font-weight="700">c</text>

  <!-- Physics -->
  <text x="170" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Speed of Light in Fiber</text>
  <text x="170" y="238" font-size="9" fill="#555" text-anchor="middle">~200,000 km/s</text>

  <!-- Key number -->
  <rect x="80" y="258" width="180" height="44" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="170" y="276" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">CA to VA round-trip</text>
  <text x="170" y="293" font-size="11" font-weight="700" fill="#333" text-anchor="middle">~36 ms minimum</text>

  <!-- Consequence -->
  <text x="170" y="328" font-size="9" fill="#555" text-anchor="middle">Sub-10 ms systems cannot</text>
  <text x="170" y="343" font-size="9" fill="#555" text-anchor="middle">use distant cloud servers</text>

  <!-- Creates -->
  <rect x="90" y="365" width="160" height="32" rx="12" fill="#c87b2a" stroke="none"/>
  <text x="170" y="386" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Creates Edge + TinyML</text>

  <!-- ===== Power Wall (Center) ===== -->
  <rect x="320" y="60" width="260" height="360" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="320" y="60" width="260" height="36" rx="6" fill="#c44"/>
  <text x="450" y="84" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Power Wall</text>

  <!-- Wall icon -->
  <rect x="425" y="115" width="50" height="80" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="450" y="160" font-size="18" fill="#c44" text-anchor="middle" font-weight="700">P~f&#xB3;</text>

  <!-- Physics -->
  <text x="450" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Thermodynamic Limit</text>
  <text x="450" y="238" font-size="9" fill="#555" text-anchor="middle">P = C x V&#xB2; x f, V ~ f</text>

  <!-- Key number -->
  <rect x="360" y="258" width="180" height="44" rx="4" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="276" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">2x frequency = 8x power</text>
  <text x="450" y="293" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Mobile TDP: 3-5 W</text>

  <!-- Consequence -->
  <text x="450" y="328" font-size="9" fill="#555" text-anchor="middle">Datacenter models cannot</text>
  <text x="450" y="343" font-size="9" fill="#555" text-anchor="middle">run on battery devices</text>

  <!-- Creates -->
  <rect x="370" y="365" width="160" height="32" rx="12" fill="#c44" stroke="none"/>
  <text x="450" y="386" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Creates Mobile ML</text>

  <!-- ===== Memory Wall (Right) ===== -->
  <rect x="600" y="60" width="260" height="360" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="600" y="60" width="260" height="36" rx="6" fill="#3d9e5a"/>
  <text x="730" y="84" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Memory Wall</text>

  <!-- Wall icon -->
  <rect x="705" y="115" width="50" height="80" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="730" y="150" font-size="14" fill="#3d9e5a" text-anchor="middle" font-weight="700">BW</text>
  <text x="730" y="168" font-size="10" fill="#3d9e5a" text-anchor="middle">gap</text>

  <!-- Physics -->
  <text x="730" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Compute-Memory Gap</text>
  <text x="730" y="238" font-size="9" fill="#555" text-anchor="middle">1.6x/yr vs 1.2x/yr = 1.33x/yr</text>

  <!-- Key number -->
  <rect x="640" y="258" width="180" height="44" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="730" y="276" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Data movement dominates</text>
  <text x="730" y="293" font-size="11" font-weight="700" fill="#333" text-anchor="middle">TinyML: 256 KB SRAM</text>

  <!-- Consequence -->
  <text x="730" y="328" font-size="9" fill="#555" text-anchor="middle">Moving data often costlier</text>
  <text x="730" y="343" font-size="9" fill="#555" text-anchor="middle">than computing on it</text>

  <!-- Creates -->
  <rect x="650" y="365" width="160" height="32" rx="12" fill="#3d9e5a" stroke="none"/>
  <text x="730" y="386" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Creates TinyML limits</text>

  <!-- ===== Bottom Summary ===== -->
  <rect x="100" y="438" width="700" height="36" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="461" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">These walls are physics, not engineering --- they cannot be optimized away</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="493" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Physical laws create the four deployment paradigms: Cloud, Edge, Mobile, TinyML</text>
</svg>
