<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Voice Assistant: One Product, Three Paradigms</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== User speech bubble (left) ===== -->
  <rect x="30" y="95" width="90" height="55" rx="8" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="75" y="118" font-size="10" font-weight="700" fill="#333" text-anchor="middle">"Hey</text>
  <text x="75" y="133" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Siri"</text>
  <polygon points="100,150 110,165 90,150" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <!-- Arrow from user to stage 1 -->
  <line x1="120" y1="122" x2="155" y2="122" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Stage 1: TinyML Wake Word ===== -->
  <rect x="160" y="55" width="190" height="200" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="160" y="55" width="190" height="32" rx="6" fill="#c44"/>
  <text x="255" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Stage 1: Wake Word</text>

  <text x="255" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">TinyML</text>

  <rect x="185" y="115" width="140" height="24" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="255" y="132" font-size="9" fill="#c44" text-anchor="middle">Always-on, &lt; 1 mW</text>

  <rect x="185" y="148" width="140" height="24" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="255" y="165" font-size="9" fill="#c44" text-anchor="middle">256 KB SRAM</text>

  <rect x="185" y="181" width="140" height="24" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="255" y="198" font-size="9" fill="#c44" text-anchor="middle">DS-CNN, ~26K params</text>

  <text x="255" y="240" font-size="9" fill="#555" text-anchor="middle">Runs on coin-cell battery</text>

  <!-- Arrow stage 1 to 2 -->
  <line x1="350" y1="155" x2="385" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="145" font-size="8" fill="#555" text-anchor="middle">trigger</text>

  <!-- ===== Stage 2: Mobile STT ===== -->
  <rect x="390" y="55" width="190" height="200" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="390" y="55" width="190" height="32" rx="6" fill="#c87b2a"/>
  <text x="485" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Stage 2: Speech-to-Text</text>

  <text x="485" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Mobile</text>

  <rect x="415" y="115" width="140" height="24" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="485" y="132" font-size="9" fill="#c87b2a" text-anchor="middle">Privacy: stays on-device</text>

  <rect x="415" y="148" width="140" height="24" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="485" y="165" font-size="9" fill="#c87b2a" text-anchor="middle">4-8 GB RAM</text>

  <rect x="415" y="181" width="140" height="24" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="485" y="198" font-size="9" fill="#c87b2a" text-anchor="middle">3-5 W, offline capable</text>

  <text x="485" y="240" font-size="9" fill="#555" text-anchor="middle">Works without internet</text>

  <!-- Arrow stage 2 to 3 -->
  <line x1="580" y1="155" x2="615" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="598" y="145" font-size="8" fill="#555" text-anchor="middle">text</text>

  <!-- ===== Stage 3: Cloud LLM ===== -->
  <rect x="620" y="55" width="190" height="200" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="620" y="55" width="190" height="32" rx="6" fill="#4a90c4"/>
  <text x="715" y="76" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Stage 3: Language Model</text>

  <text x="715" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Cloud</text>

  <rect x="645" y="115" width="140" height="24" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="715" y="132" font-size="9" fill="#4a90c4" text-anchor="middle">TB-scale models</text>

  <rect x="645" y="148" width="140" height="24" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="715" y="165" font-size="9" fill="#4a90c4" text-anchor="middle">300+ W per GPU</text>

  <rect x="645" y="181" width="140" height="24" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="715" y="198" font-size="9" fill="#4a90c4" text-anchor="middle">989 TFLOPS (H100)</text>

  <text x="715" y="240" font-size="9" fill="#555" text-anchor="middle">Complex reasoning</text>

  <!-- Response arrow back -->
  <line x1="810" y1="155" x2="845" y2="155" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Response bubble -->
  <rect x="830" y="95" width="60" height="55" rx="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="860" y="125" font-size="20" text-anchor="middle">&#x1F324;</text>

  <!-- ===== Integration patterns below ===== -->
  <rect x="100" y="290" width="700" height="100" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="315" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Three Hybrid Integration Patterns</text>

  <rect x="130" y="330" width="190" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="225" y="348" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Train-Serve Split</text>
  <text x="225" y="363" font-size="8" fill="#555" text-anchor="middle">Cloud trains, device infers</text>

  <rect x="355" y="330" width="190" height="42" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="348" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Hierarchical Processing</text>
  <text x="450" y="363" font-size="8" fill="#555" text-anchor="middle">Each tier handles its level</text>

  <rect x="580" y="330" width="190" height="42" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="675" y="348" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Progressive Deployment</text>
  <text x="675" y="363" font-size="8" fill="#555" text-anchor="middle">Compress for each tier</text>

  <!-- ===== Summary bar ===== -->
  <rect x="150" y="410" width="600" height="36" rx="6" fill="#a31f34"/>
  <text x="450" y="433" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Rarely does one paradigm suffice for a production system</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">One product, three paradigms, three physics regimes</text>
</svg>
