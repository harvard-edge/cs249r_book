<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Anatomy of a Benchmark: The Measurement Stack</text>

  <!-- Layer 1: Workload (top, narrowest) -->
  <rect x="280" y="55" width="340" height="70" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="75" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Workload</text>
  <text x="450" y="92" font-size="9" fill="#555" text-anchor="middle">Model + Dataset + Task</text>
  <text x="450" y="107" font-size="8.5" fill="#555" text-anchor="middle">e.g. ResNet-50 + ImageNet + Classification</text>

  <!-- Layer 2: Metrics -->
  <rect x="230" y="145" width="440" height="70" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="165" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Metrics</text>
  <!-- Metric pills -->
  <rect x="260" y="175" width="120" height="22" rx="10" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="320" y="190" font-size="8" fill="#333" text-anchor="middle">Throughput (img/s)</text>
  <rect x="390" y="175" width="120" height="22" rx="10" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="190" font-size="8" fill="#333" text-anchor="middle">Latency (p50/p99)</text>
  <rect x="520" y="175" width="120" height="22" rx="10" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="580" y="190" font-size="8" fill="#333" text-anchor="middle">Accuracy (top-1/5)</text>

  <!-- Layer 3: Methodology -->
  <rect x="180" y="235" width="540" height="70" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="255" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Methodology</text>
  <text x="450" y="272" font-size="9" fill="#555" text-anchor="middle">Warm-up | Measurement Window | Statistical Analysis</text>
  <text x="450" y="287" font-size="8.5" fill="#555" text-anchor="middle">Environment control: pin clocks, disable turbo, flush caches</text>

  <!-- Layer 4: Reporting (widest) -->
  <rect x="130" y="325" width="640" height="70" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="345" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Reporting</text>
  <text x="450" y="362" font-size="9" fill="#555" text-anchor="middle">Reproducibility | Confidence Intervals | HW Specs | SW Versions</text>
  <text x="450" y="377" font-size="8.5" fill="#555" text-anchor="middle">Full specification required for fair comparison</text>

  <!-- Right-side warning annotations -->
  <text x="810" y="93" font-size="8" fill="#c44" text-anchor="middle">Wrong workload =</text>
  <text x="810" y="105" font-size="8" fill="#c44" text-anchor="middle">irrelevant benchmark</text>

  <text x="810" y="183" font-size="8" fill="#c44" text-anchor="middle">Wrong metric =</text>
  <text x="810" y="195" font-size="8" fill="#c44" text-anchor="middle">misleading conclusion</text>

  <text x="810" y="273" font-size="8" fill="#c44" text-anchor="middle">Bad methodology =</text>
  <text x="810" y="285" font-size="8" fill="#c44" text-anchor="middle">unreproducible results</text>

  <text x="810" y="358" font-size="8" fill="#c44" text-anchor="middle">Incomplete reporting =</text>
  <text x="810" y="370" font-size="8" fill="#c44" text-anchor="middle">unfair comparison</text>

  <!-- Connecting lines to warnings -->
  <line x1="620" y1="90" x2="760" y2="93" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="670" y1="180" x2="760" y2="183" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="720" y1="270" x2="760" y2="273" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="770" y1="355" x2="760" y2="358" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Arrow connecting layers -->
  <line x1="450" y1="125" x2="450" y2="145" stroke="#555" stroke-width="1.2"/>
  <line x1="450" y1="215" x2="450" y2="235" stroke="#555" stroke-width="1.2"/>
  <line x1="450" y1="305" x2="450" y2="325" stroke="#555" stroke-width="1.2"/>

  <!-- Weakness callout -->
  <rect x="75" y="420" width="750" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="440" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">A benchmark is only as strong as its weakest layer. Each layer can independently invalidate the results.</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Rigorous benchmarking requires all four layers to be sound.</text>
</svg>
