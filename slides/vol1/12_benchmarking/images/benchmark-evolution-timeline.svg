<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">From Whetstone to MLPerf: Evolution of Benchmarking</text>

  <!-- Timeline line -->
  <line x1="60" y1="80" x2="840" y2="80" stroke="#bbb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Era 1: Synthetic (1976-1979) -->
  <circle cx="120" cy="80" r="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="120" y="68" font-size="8" font-weight="700" fill="#555" text-anchor="middle">1976</text>
  <rect x="60" y="100" width="130" height="120" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="125" y="118" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Synthetic</text>
  <text x="125" y="136" font-size="8.5" fill="#333" text-anchor="middle">Whetstone (1976)</text>
  <text x="125" y="151" font-size="8.5" fill="#333" text-anchor="middle">LINPACK (1979)</text>
  <text x="125" y="172" font-size="8" fill="#555" text-anchor="middle">Single operations</text>
  <text x="125" y="186" font-size="8" fill="#c44" text-anchor="middle">Easily gamed</text>
  <text x="125" y="200" font-size="7.5" fill="#555" text-anchor="middle">by compiler tricks</text>

  <!-- Era 2: Real Workloads (1989) -->
  <circle cx="300" cy="80" r="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="300" y="68" font-size="8" font-weight="700" fill="#555" text-anchor="middle">1989</text>
  <rect x="235" y="100" width="130" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="300" y="118" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Real Workloads</text>
  <text x="300" y="136" font-size="8.5" fill="#333" text-anchor="middle">SPEC CPU (1989)</text>
  <text x="300" y="158" font-size="8" fill="#555" text-anchor="middle">Real applications</text>
  <text x="300" y="172" font-size="8" fill="#555" text-anchor="middle">instead of synthetic</text>
  <text x="300" y="192" font-size="8" fill="#4a90c4" text-anchor="middle">Lesson: representative</text>
  <text x="300" y="205" font-size="8" fill="#4a90c4" text-anchor="middle">workloads matter</text>

  <!-- Era 3: Energy-Aware (2007) -->
  <circle cx="480" cy="80" r="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="480" y="68" font-size="8" font-weight="700" fill="#555" text-anchor="middle">2007</text>
  <rect x="415" y="100" width="130" height="120" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="480" y="118" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Energy-Aware</text>
  <text x="480" y="136" font-size="8.5" fill="#333" text-anchor="middle">SPEC Power (2007)</text>
  <text x="480" y="151" font-size="8.5" fill="#333" text-anchor="middle">Green500 (2007)</text>
  <text x="480" y="172" font-size="8" fill="#555" text-anchor="middle">Multi-objective:</text>
  <text x="480" y="186" font-size="8" fill="#555" text-anchor="middle">perf + energy</text>
  <text x="480" y="205" font-size="8" fill="#3d9e5a" text-anchor="middle">Lesson: one metric</text>
  <text x="480" y="218" font-size="8" fill="#3d9e5a" text-anchor="middle">is not enough</text>

  <!-- Era 4: ML-Specific (2018) -->
  <circle cx="660" cy="80" r="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="660" y="68" font-size="8" font-weight="700" fill="#555" text-anchor="middle">2018</text>
  <rect x="595" y="100" width="130" height="120" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="660" y="118" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">ML-Specific</text>
  <text x="660" y="136" font-size="8.5" fill="#333" text-anchor="middle">MLPerf (2018)</text>
  <text x="660" y="158" font-size="8" fill="#555" text-anchor="middle">Full stack: data load</text>
  <text x="660" y="172" font-size="8" fill="#555" text-anchor="middle">to gradient sync</text>
  <text x="660" y="192" font-size="8" fill="#c87b2a" text-anchor="middle">Synthesizes all 3:</text>
  <text x="660" y="206" font-size="8" fill="#c87b2a" text-anchor="middle">representative + multi-</text>
  <text x="660" y="218" font-size="8" fill="#c87b2a" text-anchor="middle">objective + integrated</text>

  <!-- Arrow annotation: gaming evolved -->
  <text x="200" y="245" font-size="8" fill="#c44" text-anchor="middle">Gaming</text>
  <line x1="145" y1="240" x2="240" y2="240" stroke="#c44" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Key lessons bar -->
  <rect x="60" y="270" width="780" height="65" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="290" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Three Cumulative Lessons</text>

  <rect x="80" y="300" width="220" height="25" rx="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="190" y="317" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Representative Workloads</text>

  <rect x="330" y="300" width="220" height="25" rx="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="440" y="317" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Multi-Objective Evaluation</text>

  <rect x="580" y="300" width="240" height="25" rx="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="700" y="317" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Integrated System Measurement</text>

  <!-- MLPerf suites at bottom -->
  <text x="450" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">MLPerf Suite: Purpose-Built for ML</text>

  <rect x="60" y="380" width="190" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="155" y="398" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">MLPerf Training</text>
  <text x="155" y="414" font-size="8" fill="#555" text-anchor="middle">Time-to-quality</text>
  <text x="155" y="427" font-size="8" fill="#555" text-anchor="middle">Datacenter scale</text>

  <rect x="270" y="380" width="190" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="365" y="398" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">MLPerf Inference</text>
  <text x="365" y="414" font-size="8" fill="#555" text-anchor="middle">QPS, latency percentiles</text>
  <text x="365" y="427" font-size="8" fill="#555" text-anchor="middle">Server to edge</text>

  <rect x="480" y="380" width="190" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="575" y="398" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">MLPerf Tiny</text>
  <text x="575" y="414" font-size="8" fill="#555" text-anchor="middle">Latency, energy/inference</text>
  <text x="575" y="427" font-size="8" fill="#555" text-anchor="middle">MCU / IoT</text>

  <rect x="690" y="380" width="150" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="765" y="398" font-size="9" font-weight="700" fill="#555" text-anchor="middle">MLPerf Power</text>
  <text x="765" y="414" font-size="8" fill="#555" text-anchor="middle">Perf/Watt</text>
  <text x="765" y="427" font-size="8" fill="#555" text-anchor="middle">Cross-cutting</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each generation of benchmarks solved the gaming problem of its predecessor.</text>
</svg>
