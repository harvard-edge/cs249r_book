<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">MLPerf Inference Scenarios</text>

  <!-- Axis labels -->
  <text x="450" y="55" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Input Concurrency</text>
  <text x="185" y="52" font-size="9" fill="#555" text-anchor="middle">Single</text>
  <text x="680" y="52" font-size="9" fill="#555" text-anchor="middle">Multiple</text>

  <!-- Vertical axis label -->
  <text x="55" y="200" font-size="10" font-weight="700" fill="#555" text-anchor="middle" transform="rotate(-90, 55, 200)">Latency Constraint</text>
  <text x="78" y="145" font-size="9" fill="#555" text-anchor="middle">Strict</text>
  <text x="78" y="355" font-size="9" fill="#555" text-anchor="middle">Relaxed</text>

  <!-- Quadrant 1: SingleStream (top-left) -->
  <rect x="100" y="70" width="330" height="170" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="265" y="95" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">SingleStream</text>
  <rect x="210" y="105" width="110" height="22" rx="10" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="265" y="120" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Metric: Latency (ms)</text>
  <text x="265" y="145" font-size="9" fill="#555" text-anchor="middle">One query at a time, strict deadline</text>
  <text x="265" y="162" font-size="8.5" fill="#555" text-anchor="middle">Batching: None (batch = 1)</text>
  <text x="265" y="182" font-size="9" font-style="italic" fill="#333" text-anchor="middle">Mobile assistant, voice command</text>
  <!-- Icon: phone -->
  <rect x="149" y="100" width="22" height="36" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <line x1="156" y1="130" x2="166" y2="130" stroke="#4a90c4" stroke-width="1"/>

  <!-- Quadrant 2: Server (top-right) -->
  <rect x="460" y="70" width="330" height="170" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="625" y="95" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Server</text>
  <rect x="560" y="105" width="130" height="22" rx="10" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="625" y="120" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Metric: QPS under SLO</text>
  <text x="625" y="145" font-size="9" fill="#555" text-anchor="middle">Many concurrent queries, latency SLA</text>
  <text x="625" y="162" font-size="8.5" fill="#555" text-anchor="middle">Batching: Dynamic, window-based</text>
  <text x="625" y="182" font-size="9" font-style="italic" fill="#333" text-anchor="middle">Cloud API, web search, recommendation</text>
  <!-- Icon: cloud -->
  <ellipse cx="510" cy="115" rx="18" ry="12" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <ellipse cx="520" cy="120" rx="12" ry="8" fill="#fff" stroke="#c87b2a" stroke-width="1"/>

  <!-- Quadrant 3: MultiStream (bottom-left) -->
  <rect x="100" y="260" width="330" height="170" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="265" y="285" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">MultiStream</text>
  <rect x="190" y="295" width="150" height="22" rx="10" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="265" y="310" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Metric: Streams processed</text>
  <text x="265" y="335" font-size="9" fill="#555" text-anchor="middle">Multiple sensor streams, soft deadline</text>
  <text x="265" y="352" font-size="8.5" fill="#555" text-anchor="middle">Batching: Per-stream grouping</text>
  <text x="265" y="372" font-size="9" font-style="italic" fill="#333" text-anchor="middle">Autonomous vehicle cameras</text>

  <!-- Quadrant 4: Offline (bottom-right) -->
  <rect x="460" y="260" width="330" height="170" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="625" y="285" font-size="12" font-weight="700" fill="#555" text-anchor="middle">Offline</text>
  <rect x="545" y="295" width="160" height="22" rx="10" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="625" y="310" font-size="8.5" font-weight="700" fill="#555" text-anchor="middle">Metric: Throughput (img/s)</text>
  <text x="625" y="335" font-size="9" fill="#555" text-anchor="middle">Bulk data, no latency constraint</text>
  <text x="625" y="352" font-size="8.5" fill="#555" text-anchor="middle">Batching: Maximum batch size</text>
  <text x="625" y="372" font-size="9" font-style="italic" fill="#333" text-anchor="middle">Nightly batch scoring, data labeling</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">MLPerf defines standard scenarios so benchmarks match real deployment patterns.</text>
</svg>
