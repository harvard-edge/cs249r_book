<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Measurement Methodology: The Protocol</text>

  <!-- Timeline bar -->
  <rect x="80" y="70" width="740" height="80" rx="0" fill="none" stroke="none"/>

  <!-- Warm-up zone -->
  <rect x="80" y="70" width="200" height="80" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="80" y1="70" x2="280" y2="150" stroke="#c87b2a" stroke-width="0.8" opacity="0.3"/>
  <line x1="130" y1="70" x2="330" y2="150" stroke="#c87b2a" stroke-width="0.8" opacity="0.3"/>
  <line x1="180" y1="70" x2="380" y2="150" stroke="#c87b2a" stroke-width="0.8" opacity="0.3"/>
  <text x="180" y="95" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Warm-up</text>
  <text x="180" y="112" font-size="8" fill="#555" text-anchor="middle">(DISCARD)</text>
  <text x="180" y="128" font-size="8" fill="#555" text-anchor="middle">JIT, cache fill,</text>
  <text x="180" y="141" font-size="8" fill="#555" text-anchor="middle">thermal settle</text>

  <!-- Measurement window -->
  <rect x="300" y="70" width="340" height="80" rx="0" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="470" y="95" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Measurement Window</text>
  <text x="470" y="115" font-size="9" fill="#555" text-anchor="middle">Steady-state performance</text>
  <!-- Mini measurement trace -->
  <polyline points="310,130 330,125 350,132 370,127 390,130 410,126 430,131 450,128 470,130 490,127 510,131 530,126 550,129 570,127 590,130 610,128 630,131"
            fill="none" stroke="#3d9e5a" stroke-width="1.5"/>

  <!-- Cool-down zone -->
  <rect x="660" y="70" width="160" height="80" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="740" y="100" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Cool-down</text>
  <text x="740" y="118" font-size="8" fill="#555" text-anchor="middle">Thermal throttling</text>
  <text x="740" y="131" font-size="8" fill="#555" text-anchor="middle">may appear here</text>

  <!-- Performance trace overlay showing warm-up instability -->
  <polyline points="85,130 100,115 115,140 130,100 145,120 160,95 175,115 190,108 210,112 230,110 250,112 270,111"
            fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Arrow labels -->
  <text x="290" y="165" font-size="8" fill="#555" text-anchor="middle">|</text>
  <text x="650" y="165" font-size="8" fill="#555" text-anchor="middle">|</text>

  <!-- ===== Three statistical cards ===== -->
  <!-- Card 1: Confidence Intervals -->
  <rect x="60" y="190" width="245" height="140" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="182" y="213" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Confidence Intervals</text>
  <!-- Mini error bar visualization -->
  <rect x="100" y="228" width="60" height="18" rx="2" fill="#4a90c4" opacity="0.5"/>
  <line x1="85" y1="237" x2="175" y2="237" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="85" y1="232" x2="85" y2="242" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="175" y1="232" x2="175" y2="242" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="190" y="241" font-size="8" fill="#555">95% CI</text>
  <text x="182" y="270" font-size="8" fill="#555" text-anchor="middle">CI = mean +/- t * (s / sqrt(n))</text>
  <text x="182" y="290" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Report 95% CI, not just the mean</text>
  <text x="182" y="315" font-size="8" fill="#555" text-anchor="middle">Without CI, you cannot tell signal</text>
  <text x="182" y="325" font-size="8" fill="#555" text-anchor="middle">from noise</text>

  <!-- Card 2: Multiple Runs -->
  <rect x="325" y="190" width="245" height="140" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="447" y="213" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Multiple Runs</text>
  <!-- Mini bar chart of 5 runs -->
  <rect x="370" y="245" width="15" height="30" rx="1" fill="#3d9e5a" opacity="0.6"/>
  <rect x="390" y="240" width="15" height="35" rx="1" fill="#3d9e5a" opacity="0.6"/>
  <rect x="410" y="248" width="15" height="27" rx="1" fill="#3d9e5a" opacity="0.6"/>
  <rect x="430" y="237" width="15" height="38" rx="1" fill="#3d9e5a" opacity="0.6"/>
  <rect x="450" y="243" width="15" height="32" rx="1" fill="#3d9e5a" opacity="0.6"/>
  <line x1="365" y1="275" x2="470" y2="275" stroke="#555" stroke-width="0.8"/>
  <text x="447" y="295" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Minimum 5 independent runs</text>
  <text x="447" y="315" font-size="8" fill="#555" text-anchor="middle">Report median and IQR</text>
  <text x="447" y="325" font-size="8" fill="#555" text-anchor="middle">Different random seeds each run</text>

  <!-- Card 3: Environment Control -->
  <rect x="590" y="190" width="245" height="140" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="712" y="213" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Environment Control</text>
  <text x="712" y="240" font-size="8.5" fill="#555" text-anchor="middle">Pin CPU frequency</text>
  <text x="712" y="258" font-size="8.5" fill="#555" text-anchor="middle">Disable turbo boost</text>
  <text x="712" y="276" font-size="8.5" fill="#555" text-anchor="middle">Control GPU thermal state</text>
  <text x="712" y="294" font-size="8.5" fill="#555" text-anchor="middle">Lock memory clocks</text>
  <text x="712" y="315" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Eliminate variance sources</text>

  <!-- Anti-pattern callout -->
  <rect x="120" y="355" width="660" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="370" font-size="9.5" font-weight="700" fill="#c44" text-anchor="middle">Anti-pattern: "Cherry-picking the best of 3 runs is not a benchmark. It is marketing."</text>
  <text x="450" y="386" font-size="8.5" fill="#555" text-anchor="middle">CV = sigma / mu. If CV > 5%, the measurement is noisy. Investigate before reporting.</text>

  <!-- Warm-up rule callout -->
  <rect x="120" y="410" width="660" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="432" font-size="9" font-weight="700" fill="#333" text-anchor="middle">The Warm-up Rule: Never measure the first 10-50 iterations. DVFS and cache fills corrupt early measurements.</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Rigorous methodology separates engineering measurement from anecdotal performance claims.</text>
</svg>
