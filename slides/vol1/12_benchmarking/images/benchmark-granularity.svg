<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Benchmarking Granularity: Three Levels of Measurement</text>

  <!-- ===== Micro ===== -->
  <rect x="40" y="55" width="250" height="350" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="165" y="80" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">Micro Benchmarks</text>
  <text x="165" y="100" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Component Isolation</text>

  <!-- Micro examples -->
  <rect x="60" y="115" width="210" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="165" y="134" font-size="8.5" fill="#333" text-anchor="middle">Kernel execution time</text>
  <rect x="60" y="150" width="210" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="165" y="169" font-size="8.5" fill="#333" text-anchor="middle">Memory bandwidth utilization</text>
  <rect x="60" y="185" width="210" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="165" y="204" font-size="8.5" fill="#333" text-anchor="middle">Single-layer accuracy</text>

  <text x="165" y="240" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Answers:</text>
  <text x="165" y="258" font-size="9" fill="#333" text-anchor="middle">WHERE is the problem?</text>

  <rect x="60" y="275" width="210" height="50" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="165" y="295" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Strength:</text>
  <text x="165" y="312" font-size="8" fill="#333" text-anchor="middle">Pinpoints exact bottleneck</text>

  <rect x="60" y="335" width="210" height="50" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="165" y="355" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Weakness:</text>
  <text x="165" y="372" font-size="8" fill="#333" text-anchor="middle">Misses system interactions</text>

  <!-- ===== Macro ===== -->
  <rect x="320" y="55" width="250" height="350" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="445" y="80" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Macro Benchmarks</text>
  <text x="445" y="100" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Subsystem Evaluation</text>

  <rect x="340" y="115" width="210" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="445" y="134" font-size="8.5" fill="#333" text-anchor="middle">Full model training convergence</text>
  <rect x="340" y="150" width="210" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="445" y="169" font-size="8.5" fill="#333" text-anchor="middle">Inference pipeline throughput</text>
  <rect x="340" y="185" width="210" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="445" y="204" font-size="8.5" fill="#333" text-anchor="middle">Dataset bias metrics</text>

  <text x="445" y="240" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Answers:</text>
  <text x="445" y="258" font-size="9" fill="#333" text-anchor="middle">WHAT problems exist?</text>

  <rect x="340" y="275" width="210" height="50" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="445" y="295" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Strength:</text>
  <text x="445" y="312" font-size="8" fill="#333" text-anchor="middle">Reveals subsystem issues</text>

  <rect x="340" y="335" width="210" height="50" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="445" y="355" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Weakness:</text>
  <text x="445" y="372" font-size="8" fill="#333" text-anchor="middle">Cannot predict production behavior</text>

  <!-- ===== End-to-End ===== -->
  <rect x="600" y="55" width="260" height="350" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="730" y="80" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">End-to-End Benchmarks</text>
  <text x="730" y="100" font-size="9" font-weight="600" fill="#333" text-anchor="middle">Complete Workflow</text>

  <rect x="620" y="115" width="220" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="730" y="134" font-size="8.5" fill="#333" text-anchor="middle">Request-to-response latency</text>
  <rect x="620" y="150" width="220" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="730" y="169" font-size="8.5" fill="#333" text-anchor="middle">Time-to-accuracy (incl. data load)</text>
  <rect x="620" y="185" width="220" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="730" y="204" font-size="8.5" fill="#333" text-anchor="middle">Production data distribution perf.</text>

  <text x="730" y="240" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Answers:</text>
  <text x="730" y="258" font-size="9" fill="#333" text-anchor="middle">WHETHER the system works?</text>

  <rect x="620" y="275" width="220" height="50" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="730" y="295" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Strength:</text>
  <text x="730" y="312" font-size="8" fill="#333" text-anchor="middle">Captures real deployment behavior</text>

  <rect x="620" y="335" width="220" height="50" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="730" y="355" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Weakness:</text>
  <text x="730" y="372" font-size="8" fill="#333" text-anchor="middle">Hard to diagnose root cause</text>

  <!-- Connecting arrows at bottom -->
  <text x="450" y="430" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Effective benchmarking combines all three levels</text>
  <text x="450" y="450" font-size="9" fill="#555" text-anchor="middle">Micro pinpoints | Macro reveals | End-to-end validates</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">A 3x kernel speedup (micro) may yield 0x system speedup (end-to-end) if the data pipeline cannot keep pace.</text>
</svg>
