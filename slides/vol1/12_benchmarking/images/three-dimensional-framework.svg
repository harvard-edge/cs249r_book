<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Three-Dimensional Benchmarking Framework</text>

  <!-- Central hub -->
  <circle cx="450" cy="230" r="42" fill="#a31f34" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="225" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Complete</text>
  <text x="450" y="237" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Benchmark</text>

  <!-- System axis (upper-left) -->
  <line x1="415" y1="200" x2="200" y2="85" stroke="#4a90c4" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="90" y="50" width="180" height="65" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="70" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">System</text>
  <text x="180" y="86" font-size="9" fill="#555" text-anchor="middle">Latency | Throughput | Utilization</text>
  <text x="180" y="102" font-size="8.5" fill="#555" text-anchor="middle">Hardware delivers promised perf?</text>

  <!-- Model axis (upper-right) -->
  <line x1="485" y1="200" x2="700" y2="85" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="630" y="50" width="180" height="65" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="720" y="70" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Model</text>
  <text x="720" y="86" font-size="9" fill="#555" text-anchor="middle">Accuracy | Calibration | Robustness</text>
  <text x="720" y="102" font-size="8.5" fill="#555" text-anchor="middle">Optimization preserved quality?</text>

  <!-- Data axis (down) -->
  <line x1="450" y1="272" x2="450" y2="380" stroke="#c87b2a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="360" y="390" width="180" height="65" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="410" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Data</text>
  <text x="450" y="426" font-size="9" fill="#555" text-anchor="middle">Coverage | Drift | Fairness</text>
  <text x="450" y="442" font-size="8.5" fill="#555" text-anchor="middle">Model generalizes to real data?</text>

  <!-- Blind spot callouts -->
  <!-- System-only blind spot -->
  <rect x="45" y="145" width="175" height="38" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="132" y="160" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">System-only blind spot:</text>
  <text x="132" y="174" font-size="7.5" fill="#c44" text-anchor="middle">Fast but wrong (compression damage invisible)</text>

  <!-- Model-only blind spot -->
  <rect x="680" y="145" width="175" height="38" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="767" y="160" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Model-only blind spot:</text>
  <text x="767" y="174" font-size="7.5" fill="#c44" text-anchor="middle">Accurate but slow (HW bottleneck invisible)</text>

  <!-- Data-only blind spot -->
  <rect x="585" y="380" width="175" height="38" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="672" y="395" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Data-only blind spot:</text>
  <text x="672" y="409" font-size="7.5" fill="#c44" text-anchor="middle">Generalizes but breaks at scale</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each dimension reveals failures invisible to the others. Production confidence requires all three.</text>
</svg>
