<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Inference Latency Breakdown: Where Time Goes</text>

  <!-- ===== Scenario 1: Unoptimized ===== -->
  <text x="80" y="70" font-size="11" font-weight="700" fill="#333">Unoptimized Pipeline</text>

  <!-- Scale: 0-14ms mapped to x=100..800 => 50px per ms -->
  <!-- Network: 2ms (100-200) -->
  <rect x="100" y="82" width="100" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="150" y="100" font-size="8" fill="#555" text-anchor="middle">Network</text>
  <text x="150" y="114" font-size="8" font-weight="700" fill="#555" text-anchor="middle">2.0 ms</text>

  <!-- Deserialize: 1.5ms (200-275) -->
  <rect x="200" y="82" width="75" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="237" y="100" font-size="8" fill="#555" text-anchor="middle">Deser.</text>
  <text x="237" y="114" font-size="8" font-weight="700" fill="#555" text-anchor="middle">1.5 ms</text>

  <!-- Preprocess: 4.5ms (275-500) -->
  <rect x="275" y="82" width="225" height="45" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="387" y="100" font-size="9" fill="#333" text-anchor="middle">Preprocessing</text>
  <text x="387" y="114" font-size="8" font-weight="700" fill="#333" text-anchor="middle">4.5 ms</text>

  <!-- CPU->GPU: 0.5ms (500-525) -->
  <rect x="500" y="82" width="25" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Inference: 5.0ms (525-775) -->
  <rect x="525" y="82" width="250" height="45" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="650" y="100" font-size="9" fill="#333" text-anchor="middle">Inference (Model)</text>
  <text x="650" y="114" font-size="8" font-weight="700" fill="#333" text-anchor="middle">5.0 ms</text>

  <!-- Postprocess: 0.5ms -->
  <rect x="775" y="82" width="25" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Total -->
  <text x="835" y="108" font-size="10" font-weight="700" fill="#333">14.0 ms</text>
  <text x="650" y="143" font-size="9" fill="#4a90c4" text-anchor="middle">Model = 36% of total latency</text>

  <!-- ===== Amdahl's callout ===== -->
  <rect x="200" y="170" width="500" height="32" rx="4" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="190" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">2.5x model speedup yields only 1.3x system speedup (Amdahl's Law)</text>

  <!-- ===== Scenario 2: Optimized ===== -->
  <text x="80" y="235" font-size="11" font-weight="700" fill="#333">TensorRT Optimized</text>

  <!-- Scale adjusted: 0-10.5ms mapped to x=100..625 => 50px per ms -->
  <!-- Network: 2ms (100-200) -->
  <rect x="100" y="247" width="100" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="150" y="265" font-size="8" fill="#555" text-anchor="middle">Network</text>
  <text x="150" y="279" font-size="8" font-weight="700" fill="#555" text-anchor="middle">2.0 ms</text>

  <!-- Deserialize: 1.5ms (200-275) -->
  <rect x="200" y="247" width="75" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="237" y="265" font-size="8" fill="#555" text-anchor="middle">Deser.</text>
  <text x="237" y="279" font-size="8" font-weight="700" fill="#555" text-anchor="middle">1.5 ms</text>

  <!-- Preprocess: 4.5ms (275-500) — now dominant! -->
  <rect x="275" y="247" width="225" height="45" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="387" y="265" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Preprocessing</text>
  <text x="387" y="279" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">4.5 ms</text>

  <!-- CPU->GPU: 0.3ms -->
  <rect x="500" y="247" width="15" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Inference: 2.0ms (515-615) — much smaller! -->
  <rect x="515" y="247" width="100" height="45" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="565" y="265" font-size="9" fill="#333" text-anchor="middle">Inference</text>
  <text x="565" y="279" font-size="8" font-weight="700" fill="#333" text-anchor="middle">2.0 ms</text>

  <!-- Postprocess: 0.2ms -->
  <rect x="615" y="247" width="10" height="45" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Total -->
  <text x="660" y="273" font-size="10" font-weight="700" fill="#333">10.5 ms</text>
  <text x="387" y="310" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Preprocessing = 43% of total (now the bottleneck!)</text>

  <!-- Legend -->
  <rect x="100" y="340" width="700" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <rect x="120" y="353" width="15" height="15" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="142" y="365" font-size="8" fill="#333">Model Inference</text>
  <rect x="240" y="353" width="15" height="15" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="262" y="365" font-size="8" fill="#333">Preprocessing</text>
  <rect x="360" y="353" width="15" height="15" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="382" y="365" font-size="8" fill="#333">New Bottleneck</text>
  <rect x="480" y="353" width="15" height="15" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="502" y="365" font-size="8" fill="#333">Overhead (network, transfer, post)</text>

  <!-- Key insight box -->
  <rect x="100" y="400" width="700" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="418" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Key Insight: Optimizing the model shifts the bottleneck to preprocessing.</text>
  <text x="450" y="434" font-size="9" fill="#555" text-anchor="middle">End-to-end benchmarking reveals bottlenecks invisible to model-only measurement.</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">In optimized systems, preprocessing often dominates latency. Optimize the pipeline, not just the model.</text>
</svg>
