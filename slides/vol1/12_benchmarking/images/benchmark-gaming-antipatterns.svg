<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Benchmark Gaming: Four Anti-Patterns</text>

  <!-- Card 1: Cherry-Picking (top-left) -->
  <rect x="30" y="45" width="410" height="190" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="235" y="68" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">1. Cherry-Picking</text>
  <!-- Wrong: 5 bars with one highlighted -->
  <text x="130" y="90" font-size="8" fill="#c44" text-anchor="middle">WRONG</text>
  <rect x="80" y="95" width="12" height="40" rx="1" fill="#bbb"/>
  <rect x="96" y="105" width="12" height="30" rx="1" fill="#bbb"/>
  <rect x="112" y="85" width="12" height="50" rx="1" fill="#c44"/>
  <rect x="128" y="110" width="12" height="25" rx="1" fill="#bbb"/>
  <rect x="144" y="100" width="12" height="35" rx="1" fill="#bbb"/>
  <text x="118" y="82" font-size="7" fill="#c44">best!</text>
  <text x="120" y="155" font-size="8" fill="#c44" text-anchor="middle">"Best of 5 runs"</text>
  <!-- Right: bars with error bars and median -->
  <text x="320" y="90" font-size="8" fill="#3d9e5a" text-anchor="middle">CORRECT</text>
  <rect x="270" y="95" width="12" height="40" rx="1" fill="#3d9e5a" opacity="0.5"/>
  <rect x="286" y="105" width="12" height="30" rx="1" fill="#3d9e5a" opacity="0.5"/>
  <rect x="302" y="100" width="12" height="35" rx="1" fill="#3d9e5a" opacity="0.5"/>
  <rect x="318" y="110" width="12" height="25" rx="1" fill="#3d9e5a" opacity="0.5"/>
  <rect x="334" y="98" width="12" height="37" rx="1" fill="#3d9e5a" opacity="0.5"/>
  <line x1="268" y1="115" x2="348" y2="115" stroke="#333" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="360" y="118" font-size="7" fill="#333">median</text>
  <text x="310" y="155" font-size="8" fill="#3d9e5a" text-anchor="middle">"Median with 95% CI"</text>
  <text x="235" y="180" font-size="8.5" fill="#333" text-anchor="middle">Report median and confidence intervals.</text>
  <text x="235" y="195" font-size="8.5" fill="#333" text-anchor="middle">Cherry-picking hides variability.</text>

  <!-- Card 2: Unfair Comparison (top-right) -->
  <rect x="460" y="45" width="410" height="190" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="665" y="68" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">2. Unfair Comparison</text>
  <!-- Two bars: A tuned, B default -->
  <text x="560" y="90" font-size="8" fill="#c44" text-anchor="middle">WRONG</text>
  <rect x="530" y="95" width="25" height="50" rx="2" fill="#4a90c4" opacity="0.7"/>
  <text x="542" y="88" font-size="7" fill="#c44">tuned</text>
  <rect x="560" y="115" width="25" height="30" rx="2" fill="#bbb"/>
  <text x="572" y="88" font-size="7" fill="#555">default</text>
  <text x="555" y="155" font-size="8" fill="#c44" text-anchor="middle">A (opt.) vs B (default)</text>
  <!-- Right: both tuned -->
  <text x="760" y="90" font-size="8" fill="#3d9e5a" text-anchor="middle">CORRECT</text>
  <rect x="730" y="100" width="25" height="45" rx="2" fill="#3d9e5a" opacity="0.5"/>
  <rect x="760" y="105" width="25" height="40" rx="2" fill="#3d9e5a" opacity="0.5"/>
  <text x="755" y="155" font-size="8" fill="#3d9e5a" text-anchor="middle">Both at best config</text>
  <text x="665" y="180" font-size="8.5" fill="#333" text-anchor="middle">Compare at best-known configuration.</text>
  <text x="665" y="195" font-size="8.5" fill="#333" text-anchor="middle">Unequal effort invalidates comparison.</text>

  <!-- Card 3: Misleading Metric (bottom-left) -->
  <rect x="30" y="255" width="410" height="190" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="235" y="278" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">3. Misleading Metric</text>
  <!-- Wrong: single average bar -->
  <text x="130" y="300" font-size="8" fill="#c44" text-anchor="middle">WRONG</text>
  <rect x="100" y="310" width="60" height="30" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="130" y="330" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Mean: 12ms</text>
  <text x="130" y="355" font-size="8" fill="#3d9e5a" text-anchor="middle">"Looks great!"</text>
  <!-- Right: distribution with tail -->
  <text x="320" y="300" font-size="8" fill="#c44" text-anchor="middle">REALITY</text>
  <path d="M270,350 Q290,340 305,310 Q310,350 350,350 Q370,350 380,350" fill="#f9d6d5" fill-opacity="0.5" stroke="#c44" stroke-width="1"/>
  <text x="340" y="330" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">p99: 72ms</text>
  <text x="340" y="355" font-size="8" fill="#c44" text-anchor="middle">SLO violated!</text>
  <text x="235" y="395" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">The mean hides the tail. Report percentiles.</text>
  <text x="235" y="412" font-size="8.5" fill="#333" text-anchor="middle">p99 = 6x mean is common in production.</text>

  <!-- Card 4: Narrow Workload (bottom-right) -->
  <rect x="460" y="255" width="410" height="190" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="665" y="278" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">4. Narrow Workload</text>
  <!-- Wrong: single model -->
  <text x="555" y="300" font-size="8" fill="#c44" text-anchor="middle">WRONG</text>
  <rect x="530" y="310" width="50" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="555" y="330" font-size="7.5" fill="#333" text-anchor="middle">ResNet</text>
  <text x="555" y="355" font-size="8" fill="#c44" text-anchor="middle">"One model only"</text>
  <!-- Right: multiple models -->
  <text x="760" y="300" font-size="8" fill="#3d9e5a" text-anchor="middle">CORRECT</text>
  <rect x="710" y="310" width="30" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="725" y="325" font-size="6" fill="#333" text-anchor="middle">ResNet</text>
  <rect x="745" y="310" width="30" height="22" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="760" y="325" font-size="6" fill="#333" text-anchor="middle">BERT</text>
  <rect x="710" y="336" width="30" height="22" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="725" y="351" font-size="6" fill="#333" text-anchor="middle">DLRM</text>
  <rect x="745" y="336" width="30" height="22" rx="2" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="760" y="351" font-size="6" fill="#333" text-anchor="middle">SSD</text>
  <text x="760" y="370" font-size="8" fill="#3d9e5a" text-anchor="middle">"Suite"</text>
  <text x="665" y="395" font-size="8.5" fill="#333" text-anchor="middle">One model does not represent production.</text>
  <text x="665" y="412" font-size="8.5" fill="#333" text-anchor="middle">MLPerf requires diverse workload suites.</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Benchmarketing optimizes for the chart, not the user. Rigorous benchmarks resist gaming by design.</text>
</svg>
