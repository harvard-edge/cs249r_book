<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Percentiles, Not Averages: The Tail Latency Problem</text>

  <!-- Axes -->
  <line x1="80" y1="340" x2="820" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="340" x2="80" y2="60" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="370" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Latency (ms)</text>
  <text x="40" y="200" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90, 40, 200)">Request Count</text>

  <!-- X-axis ticks -->
  <text x="80" y="358" font-size="8" fill="#555" text-anchor="middle">0</text>
  <text x="155" y="358" font-size="8" fill="#555" text-anchor="middle">10</text>
  <text x="230" y="358" font-size="8" fill="#555" text-anchor="middle">20</text>
  <text x="305" y="358" font-size="8" fill="#555" text-anchor="middle">30</text>
  <text x="380" y="358" font-size="8" fill="#555" text-anchor="middle">40</text>
  <text x="455" y="358" font-size="8" fill="#555" text-anchor="middle">50</text>
  <text x="530" y="358" font-size="8" fill="#555" text-anchor="middle">60</text>
  <text x="605" y="358" font-size="8" fill="#555" text-anchor="middle">70</text>
  <text x="680" y="358" font-size="8" fill="#555" text-anchor="middle">80</text>
  <text x="755" y="358" font-size="8" fill="#555" text-anchor="middle">90</text>
  <text x="800" y="358" font-size="8" fill="#555" text-anchor="middle">100</text>

  <!-- Distribution curve (main body green, tail red) -->
  <!-- Main body fill -->
  <path d="M80,340 Q120,340 140,320 Q160,280 170,200 Q180,120 195,85 Q210,120 230,180 Q260,250 300,290 Q340,315 380,325 Q420,332 455,335 L455,340 Z"
        fill="#d4edda" fill-opacity="0.6" stroke="none"/>
  <!-- Tail fill (red) -->
  <path d="M455,335 Q490,337 530,338 Q580,339 630,339.5 Q700,339.8 755,340 L755,340 L455,340 Z"
        fill="#f9d6d5" fill-opacity="0.5" stroke="none"/>
  <!-- Full curve outline -->
  <path d="M80,340 Q120,340 140,320 Q160,280 170,200 Q180,120 195,85 Q210,120 230,180 Q260,250 300,290 Q340,315 380,325 Q420,332 455,335 Q490,337 530,338 Q580,339 630,339.5 Q700,339.8 755,340"
        fill="none" stroke="#3d9e5a" stroke-width="2"/>

  <!-- p50 line -->
  <line x1="140" y1="70" x2="140" y2="340" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="63" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">p50 = 8 ms</text>

  <!-- Mean line -->
  <line x1="195" y1="70" x2="195" y2="340" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="195" y="78" font-size="9" font-weight="600" fill="#555" text-anchor="middle">Mean = 12 ms</text>

  <!-- p95 line -->
  <line x1="380" y1="70" x2="380" y2="340" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="380" y="63" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">p95 = 35 ms</text>

  <!-- p99 line -->
  <line x1="620" y1="70" x2="620" y2="340" stroke="#c44" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="620" y="63" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">p99 = 72 ms</text>

  <!-- SLO line -->
  <line x1="455" y1="55" x2="455" y2="340" stroke="#a31f34" stroke-width="2.5" stroke-dasharray="8,4"/>
  <rect x="420" y="42" width="70" height="18" rx="9" fill="#a31f34"/>
  <text x="455" y="54" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">SLO = 50 ms</text>

  <!-- Annotation: p99 = 6x mean -->
  <line x1="200" y1="100" x2="615" y2="100" stroke="#c44" stroke-width="1"/>
  <text x="410" y="95" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">p99 = 6x mean</text>

  <!-- Tail annotation bracket -->
  <text x="620" y="310" font-size="8.5" fill="#c44" text-anchor="middle">1 in 100 users</text>
  <text x="620" y="323" font-size="8.5" fill="#c44" text-anchor="middle">experience this</text>

  <!-- Info box -->
  <rect x="100" y="390" width="700" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="450" y="408" font-size="9" fill="#333" text-anchor="middle">At 10,000 QPS: 100 requests/second hit the tail.</text>
  <text x="450" y="425" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fan-out of 100 services: 63% of page loads hit at least one tail event.</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Averages hide the tail. Production SLOs are defined at p95 or p99, never the mean.</text>
</svg>
