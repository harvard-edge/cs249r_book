<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Anatomy of a Transformer Block</text>

  <!-- Main container -->
  <rect x="230" y="45" width="300" height="420" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="380" y="65" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Repeat N x</text>

  <!-- Input -->
  <rect x="310" y="395" width="160" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="390" y="417" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Input Embeddings</text>

  <!-- Arrow up -->
  <line x1="390" y1="395" x2="390" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Multi-Head Self-Attention -->
  <rect x="280" y="310" width="220" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="390" y="333" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Multi-Head Self-Attention</text>
  <text x="390" y="353" font-size="8" fill="#555" text-anchor="middle">~33% of FLOPs | O(N^2) memory</text>

  <!-- Arrow up -->
  <line x1="390" y1="310" x2="390" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Add & LayerNorm 1 -->
  <rect x="310" y="255" width="160" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="390" y="277" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Add and LayerNorm</text>

  <!-- Skip connection 1 -->
  <path d="M 280,410 L 240,410 L 240,270 L 310,270" fill="none" stroke="#3d9e5a" stroke-width="2" marker-end="url(#ag)"/>
  <text x="218" y="340" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle" transform="rotate(-90, 218, 340)">Skip Connection</text>

  <!-- Arrow up -->
  <line x1="390" y1="255" x2="390" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Feed-Forward MLP -->
  <rect x="280" y="170" width="220" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="390" y="193" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Feed-Forward MLP (4x hidden)</text>
  <text x="390" y="213" font-size="8" fill="#555" text-anchor="middle">~67% of FLOPs | Dense MatMul</text>

  <!-- Arrow up -->
  <line x1="390" y1="170" x2="390" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Add & LayerNorm 2 -->
  <rect x="310" y="115" width="160" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="390" y="137" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Add and LayerNorm</text>

  <!-- Skip connection 2 -->
  <path d="M 280,270 L 250,270 L 250,130 L 310,130" fill="none" stroke="#3d9e5a" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Arrow up to output -->
  <line x1="390" y1="115" x2="390" y2="88" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Output -->
  <rect x="330" y="55" width="120" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="390" y="75" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Output</text>

  <!-- === Right side annotations === -->
  <rect x="580" y="90" width="280" height="160" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="720" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Systems Properties</text>

  <text x="600" y="140" font-size="9" font-weight="700" fill="#4a90c4">Attention:</text>
  <text x="600" y="155" font-size="8.5" fill="#555">Global context, O(N^2) memory</text>

  <text x="600" y="178" font-size="9" font-weight="700" fill="#c87b2a">FFN:</text>
  <text x="600" y="193" font-size="8.5" fill="#555">Dense compute, 2/3 of total FLOPs</text>

  <text x="600" y="216" font-size="9" font-weight="700" fill="#3d9e5a">Skip + Norm:</text>
  <text x="600" y="231" font-size="8.5" fill="#555">Gradient highway, enables depth</text>

  <!-- Systems insight -->
  <rect x="580" y="290" width="280" height="70" rx="5" fill="#cfe2f3" fill-opacity="0.3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="720" y="313" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Parallelization Advantage</text>
  <text x="720" y="330" font-size="8.5" fill="#555" text-anchor="middle">All N tokens processed simultaneously</text>
  <text x="720" y="345" font-size="8.5" fill="#555" text-anchor="middle">vs. RNN: N sequential steps</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">The Transformer block: attention for context, FFN for computation, skip connections for gradient flow</text>
</svg>
