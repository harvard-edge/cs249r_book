<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">MLP vs. CNN: Weight Sharing Advantage</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- === LEFT PANEL: MLP === -->
  <rect x="40" y="55" width="380" height="365" rx="6" fill="#f9d6d5" fill-opacity="0.15"/>
  <text x="230" y="80" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">MLP: All-to-All Connections</text>

  <!-- Simplified grid (4x4 input) -->
  <g transform="translate(100, 110)">
    <!-- Input grid -->
    <rect x="0" y="0" width="120" height="120" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
    <text x="60" y="-8" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Input (32x32)</text>
    <!-- Grid lines -->
    <line x1="30" y1="0" x2="30" y2="120" stroke="#c44" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="60" y1="0" x2="60" y2="120" stroke="#c44" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="90" y1="0" x2="90" y2="120" stroke="#c44" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="30" x2="120" y2="30" stroke="#c44" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#c44" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="90" x2="120" y2="90" stroke="#c44" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- Output neuron -->
    <circle cx="280" cy="60" r="18" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
    <text x="280" y="64" font-size="8" font-weight="700" fill="#333" text-anchor="middle">out</text>

    <!-- Connection lines (many) -->
    <line x1="120" y1="15" x2="262" y2="55" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="120" y1="45" x2="262" y2="57" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="120" y1="75" x2="262" y2="60" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="120" y1="105" x2="262" y2="65" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="120" y1="30" x2="262" y2="56" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="120" y1="60" x2="262" y2="59" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <line x1="120" y1="90" x2="262" y2="63" stroke="#c44" stroke-width="0.4" stroke-opacity="0.4"/>
    <text x="200" y="100" font-size="8" fill="#c44" font-style="italic">1,024 unique weights</text>
    <text x="200" y="113" font-size="8" fill="#c44" font-style="italic">per output neuron</text>
  </g>

  <!-- MLP stats -->
  <rect x="80" y="280" width="300" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="230" y="305" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">1,048,576 parameters</text>
  <text x="230" y="325" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Every pixel connected to every output</text>
  <text x="230" y="342" font-size="9" font-weight="400" fill="#555" text-anchor="middle">O(d^2) scaling per layer</text>

  <!-- === RIGHT PANEL: CNN === -->
  <rect x="480" y="55" width="380" height="365" rx="6" fill="#d4edda" fill-opacity="0.15"/>
  <text x="670" y="80" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">CNN: Shared Filter Slides</text>

  <!-- Input grid with filter highlight -->
  <g transform="translate(540, 110)">
    <rect x="0" y="0" width="120" height="120" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
    <text x="60" y="-8" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Input (32x32)</text>
    <!-- Grid lines -->
    <line x1="30" y1="0" x2="30" y2="120" stroke="#3d9e5a" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="60" y1="0" x2="60" y2="120" stroke="#3d9e5a" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="90" y1="0" x2="90" y2="120" stroke="#3d9e5a" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="30" x2="120" y2="30" stroke="#3d9e5a" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#3d9e5a" stroke-width="0.5" stroke-opacity="0.3"/>
    <line x1="0" y1="90" x2="120" y2="90" stroke="#3d9e5a" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 3x3 filter highlight -->
    <rect x="0" y="0" width="90" height="90" rx="2" fill="#cfe2f3" fill-opacity="0.5" stroke="#4a90c4" stroke-width="2"/>
    <text x="45" y="50" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">3x3</text>

    <!-- Second position (ghosted) -->
    <rect x="30" y="0" width="90" height="90" rx="2" fill="none" stroke="#4a90c4" stroke-width="1" stroke-dasharray="4,2" stroke-opacity="0.5"/>

    <!-- Third position (ghosted) -->
    <rect x="0" y="30" width="90" height="90" rx="2" fill="none" stroke="#4a90c4" stroke-width="1" stroke-dasharray="4,2" stroke-opacity="0.3"/>

    <!-- Output feature map -->
    <rect x="200" y="15" width="90" height="90" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
    <text x="245" y="55" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Feature</text>
    <text x="245" y="68" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Map</text>

    <!-- Sliding arrow -->
    <line x1="130" y1="60" x2="195" y2="60" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="162" y="52" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">slides</text>
  </g>

  <!-- CNN stats -->
  <rect x="520" y="280" width="300" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="670" y="305" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">9,408 parameters</text>
  <text x="670" y="325" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Same 3x3 filter reused everywhere</text>
  <text x="670" y="342" font-size="9" font-weight="400" fill="#555" text-anchor="middle">O(K^2 x C_in x C_out) per layer</text>

  <!-- Center arrow -->
  <line x1="420" y1="310" x2="480" y2="310" stroke="#a31f34" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="450" y="300" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">111x</text>
  <text x="450" y="330" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">fewer</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Weight sharing is the key to CNN parameter efficiency -- same filter detects the same pattern everywhere</text>
</svg>
