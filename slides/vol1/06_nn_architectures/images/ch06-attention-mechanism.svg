<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Scaled Dot-Product Attention</text>

  <!-- Formula -->
  <text x="450" y="55" font-size="11" font-weight="400" fill="#555" text-anchor="middle">Attn(Q, K, V) = softmax(QK^T / sqrt(d_k)) V</text>

  <!-- === Q K V input boxes === -->
  <rect x="110" y="80" width="120" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="100" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Q (Queries)</text>
  <text x="170" y="115" font-size="8" fill="#555" text-anchor="middle">N x d_k</text>

  <rect x="390" y="80" width="120" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="100" font-size="11" font-weight="700" fill="#333" text-anchor="middle">K (Keys)</text>
  <text x="450" y="115" font-size="8" fill="#555" text-anchor="middle">N x d_k</text>

  <rect x="670" y="80" width="120" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="730" y="100" font-size="11" font-weight="700" fill="#333" text-anchor="middle">V (Values)</text>
  <text x="730" y="115" font-size="8" fill="#555" text-anchor="middle">N x d_v</text>

  <!-- Arrows down from Q and K -->
  <line x1="170" y1="125" x2="170" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="125" x2="450" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MatMul (QK^T) -->
  <rect x="220" y="180" width="200" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="320" y="202" font-size="10" font-weight="700" fill="#333" text-anchor="middle">MatMul: QK^T / sqrt(d_k)</text>
  <text x="320" y="220" font-size="8" fill="#555" text-anchor="middle">N x N similarity scores</text>

  <!-- Arrow down to softmax -->
  <line x1="320" y1="230" x2="320" y2="270" stroke="#a31f34" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- N x N attention matrix (the bottleneck) -->
  <rect x="200" y="275" width="240" height="70" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="320" y="298" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">softmax -> N x N Attention Matrix</text>
  <text x="320" y="316" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">THE BOTTLENECK</text>
  <text x="320" y="335" font-size="8" fill="#555" text-anchor="middle">4,096 tokens = 32 MB / layer / head</text>

  <!-- Arrow from V down to weighted sum level -->
  <line x1="730" y1="125" x2="730" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow from attention matrix to weighted sum -->
  <line x1="440" y1="310" x2="550" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Weighted Sum -->
  <rect x="550" y="370" width="220" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="392" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Weighted Sum: Attn x V</text>
  <text x="660" y="410" font-size="8" fill="#555" text-anchor="middle">N x d_v output</text>

  <!-- Output arrow -->
  <line x1="660" y1="420" x2="660" y2="455" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="660" y="472" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Output</text>

  <!-- Callout box: quadratic cost -->
  <rect x="560" y="175" width="210" height="80" rx="5" fill="#f9d6d5" fill-opacity="0.3" stroke="#c44" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="665" y="198" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Quadratic Memory Cost</text>
  <text x="665" y="216" font-size="8.5" fill="#555" text-anchor="middle">Double sequence length</text>
  <text x="665" y="232" font-size="8.5" fill="#555" text-anchor="middle">= 4x attention memory</text>
  <text x="665" y="248" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">O(N^2) is permanent</text>

  <!-- Bottom footnote -->
  <text x="450" y="495" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Attention enables dynamic routing but commits to quadratic memory scaling</text>
</svg>
