<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="an" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="agr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">RNN: Unrolled Across Time Steps</text>

  <!-- Time step labels -->
  <text x="120" y="380" font-size="9" font-weight="400" fill="#555" text-anchor="middle">t=1</text>
  <text x="270" y="380" font-size="9" font-weight="400" fill="#555" text-anchor="middle">t=2</text>
  <text x="420" y="380" font-size="9" font-weight="400" fill="#555" text-anchor="middle">t=3</text>
  <text x="570" y="380" font-size="9" font-weight="400" fill="#555" text-anchor="middle">t=4</text>
  <text x="720" y="380" font-size="9" font-weight="400" fill="#555" text-anchor="middle">t=5</text>

  <!-- Input labels -->
  <text x="120" y="355" font-size="9" font-weight="700" fill="#555" text-anchor="middle">x_1</text>
  <text x="270" y="355" font-size="9" font-weight="700" fill="#555" text-anchor="middle">x_2</text>
  <text x="420" y="355" font-size="9" font-weight="700" fill="#555" text-anchor="middle">x_3</text>
  <text x="570" y="355" font-size="9" font-weight="700" fill="#555" text-anchor="middle">x_4</text>
  <text x="720" y="355" font-size="9" font-weight="700" fill="#555" text-anchor="middle">x_5</text>

  <!-- Input arrows up -->
  <line x1="120" y1="340" x2="120" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#an)"/>
  <line x1="270" y1="340" x2="270" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#an)"/>
  <line x1="420" y1="340" x2="420" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#an)"/>
  <line x1="570" y1="340" x2="570" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#an)"/>
  <line x1="720" y1="340" x2="720" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#an)"/>

  <!-- RNN cells -->
  <rect x="70" y="245" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="120" y="275" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RNN Cell</text>

  <rect x="220" y="245" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="270" y="275" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RNN Cell</text>

  <rect x="370" y="245" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="420" y="275" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RNN Cell</text>

  <rect x="520" y="245" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="570" y="275" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RNN Cell</text>

  <rect x="670" y="245" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="720" y="275" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RNN Cell</text>

  <!-- Hidden state arrows (forward, orange) -->
  <line x1="170" y1="270" x2="215" y2="270" stroke="#c87b2a" stroke-width="2.5" marker-end="url(#ao)"/>
  <line x1="320" y1="270" x2="365" y2="270" stroke="#c87b2a" stroke-width="2.5" marker-end="url(#ao)"/>
  <line x1="470" y1="270" x2="515" y2="270" stroke="#c87b2a" stroke-width="2.5" marker-end="url(#ao)"/>
  <line x1="620" y1="270" x2="665" y2="270" stroke="#c87b2a" stroke-width="2.5" marker-end="url(#ao)"/>

  <!-- Hidden state labels -->
  <text x="193" y="260" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">h_1</text>
  <text x="343" y="260" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">h_2</text>
  <text x="493" y="260" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">h_3</text>
  <text x="643" y="260" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">h_4</text>

  <!-- Output arrows up -->
  <line x1="120" y1="245" x2="120" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#agr)"/>
  <line x1="270" y1="245" x2="270" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#agr)"/>
  <line x1="420" y1="245" x2="420" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#agr)"/>
  <line x1="570" y1="245" x2="570" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#agr)"/>
  <line x1="720" y1="245" x2="720" y2="210" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#agr)"/>

  <!-- Output labels -->
  <text x="120" y="202" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">y_1</text>
  <text x="270" y="202" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">y_2</text>
  <text x="420" y="202" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">y_3</text>
  <text x="570" y="202" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">y_4</text>
  <text x="720" y="202" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">y_5</text>

  <!-- Gradient path (backward, red, progressively thinner) -->
  <line x1="670" y1="305" x2="620" y2="305" stroke="#c44" stroke-width="2.0" stroke-dasharray="4,2"/>
  <line x1="520" y1="305" x2="470" y2="305" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="370" y1="305" x2="320" y2="305" stroke="#c44" stroke-width="1.0" stroke-dasharray="4,2"/>
  <line x1="220" y1="305" x2="170" y2="305" stroke="#c44" stroke-width="0.5" stroke-dasharray="4,2"/>

  <text x="420" y="320" font-size="9" font-weight="400" fill="#c44" text-anchor="middle" font-style="italic">Gradient vanishes exponentially backward</text>

  <!-- Sequential bottleneck callout -->
  <rect x="130" y="55" width="340" height="80" rx="5" fill="#f9d6d5" fill-opacity="0.3" stroke="#c44" stroke-width="1.2"/>
  <text x="300" y="78" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Sequential Bottleneck</text>
  <text x="300" y="96" font-size="9" fill="#555" text-anchor="middle">Each step must wait for the previous one</text>
  <text x="300" y="112" font-size="9" fill="#555" text-anchor="middle">Cannot parallelize across time steps</text>
  <text x="300" y="128" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">30-50% GPU utilization typical</text>

  <!-- RNN equation -->
  <rect x="530" y="55" width="330" height="80" rx="5" fill="#fdebd0" fill-opacity="0.3" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="695" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Recurrence Equation</text>
  <text x="695" y="100" font-size="10" fill="#333" text-anchor="middle">h_t = f(W_hh h_{t-1} + W_xh x_t)</text>
  <text x="695" y="120" font-size="8.5" fill="#555" text-anchor="middle">O(1) memory per step (constant state)</text>

  <!-- Bottom footnote -->
  <text x="450" y="425" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">RNNs trade parallelism for O(1) memory -- each step depends on the previous hidden state</text>
</svg>
