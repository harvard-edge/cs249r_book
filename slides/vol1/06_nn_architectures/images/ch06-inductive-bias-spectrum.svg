<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Inductive Bias Spectrum</text>

  <!-- Main axis line -->
  <line x1="60" y1="260" x2="840" y2="260" stroke="#bbb" stroke-width="2"/>
  <!-- Arrow head -->
  <polygon points="840,260 830,255 830,265" fill="#bbb"/>

  <!-- Axis label -->
  <text x="450" y="290" font-size="10" font-weight="400" fill="#555" text-anchor="middle">Inductive Bias Strength</text>
  <text x="80" y="290" font-size="9" font-weight="400" fill="#999" text-anchor="middle">Weaker</text>
  <text x="820" y="290" font-size="9" font-weight="400" fill="#999" text-anchor="middle">Stronger</text>

  <!-- === MLP (No bias) === -->
  <rect x="55" y="120" width="130" height="120" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="120" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">MLP</text>
  <text x="120" y="162" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">No structure</text>
  <text x="120" y="178" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">assumed</text>
  <text x="120" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Tabular data</text>
  <text x="120" y="218" font-size="9" font-weight="400" fill="#999" text-anchor="middle">Baseline: 1x params</text>
  <!-- Dot on axis -->
  <circle cx="120" cy="260" r="6" fill="#bbb"/>

  <!-- === Transformer (Learned pairwise) === -->
  <rect x="215" y="120" width="130" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Transformer</text>
  <text x="280" y="162" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">Learned pairwise</text>
  <text x="280" y="178" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">attention</text>
  <text x="280" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Language / relational</text>
  <text x="280" y="218" font-size="9" font-weight="400" fill="#999" text-anchor="middle">O(N^2) memory cost</text>
  <circle cx="280" cy="260" r="6" fill="#4a90c4"/>

  <!-- === RNN (Sequential) === -->
  <rect x="385" y="120" width="130" height="120" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">RNN</text>
  <text x="450" y="162" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">Sequential order</text>
  <text x="450" y="178" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">assumed</text>
  <text x="450" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Time series / audio</text>
  <text x="450" y="218" font-size="9" font-weight="400" fill="#999" text-anchor="middle">O(1) state, sequential</text>
  <circle cx="450" cy="260" r="6" fill="#c87b2a"/>

  <!-- === CNN (Spatial locality) === -->
  <rect x="555" y="120" width="130" height="120" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="620" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">CNN</text>
  <text x="620" y="162" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">Spatial locality</text>
  <text x="620" y="178" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">+ weight sharing</text>
  <text x="620" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Images / spatial</text>
  <text x="620" y="218" font-size="9" font-weight="400" fill="#999" text-anchor="middle">111x fewer params</text>
  <circle cx="620" cy="260" r="6" fill="#3d9e5a"/>

  <!-- === DLRM (Sparse categorical) === -->
  <rect x="715" y="120" width="130" height="120" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="780" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">DLRM</text>
  <text x="780" y="162" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">Sparse categorical</text>
  <text x="780" y="178" font-size="9" font-weight="400" fill="#555" text-anchor="middle" font-style="italic">embeddings</text>
  <text x="780" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Recommendations</text>
  <text x="780" y="218" font-size="9" font-weight="400" fill="#999" text-anchor="middle">TB-scale tables</text>
  <circle cx="780" cy="260" r="6" fill="#c44"/>

  <!-- Key insight box -->
  <rect x="180" y="330" width="540" height="50" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="352" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Key Trade-off:</text>
  <text x="450" y="370" font-size="10" font-weight="400" fill="#555" text-anchor="middle">Stronger bias = fewer parameters = less flexibility = better hardware mapping</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Every architecture is defined by its choice of inductive bias</text>
</svg>
