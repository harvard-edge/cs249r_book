<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="af" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="afr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="afg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Architecture Selection Framework</text>

  <!-- Step 1: Data Type Diamond -->
  <polygon points="200,80 300,130 200,180 100,130" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="200" y="127" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data</text>
  <text x="200" y="141" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Type?</text>

  <!-- Branches from diamond -->
  <!-- Spatial -->
  <line x1="100" y1="130" x2="40" y2="130" stroke="#555" stroke-width="1.5"/>
  <line x1="40" y1="130" x2="40" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="50" y="120" font-size="8" fill="#555">Spatial</text>
  <rect x="0" y="225" width="80" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="40" y="247" font-size="9" font-weight="700" fill="#333" text-anchor="middle">CNN</text>

  <!-- Sequential -->
  <line x1="150" y1="180" x2="150" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="155" y="200" font-size="8" fill="#555">Sequential</text>
  <rect x="110" y="225" width="80" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="247" font-size="9" font-weight="700" fill="#333" text-anchor="middle">RNN</text>

  <!-- Relational -->
  <line x1="250" y1="180" x2="250" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="255" y="200" font-size="8" fill="#555">Relational</text>
  <rect x="210" y="225" width="80" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="250" y="247" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Transformer</text>

  <!-- Tabular -->
  <line x1="300" y1="130" x2="360" y2="130" stroke="#555" stroke-width="1.5"/>
  <line x1="360" y1="130" x2="360" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="350" y="120" font-size="8" fill="#555">Tabular</text>
  <rect x="320" y="225" width="80" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="247" font-size="9" font-weight="700" fill="#333" text-anchor="middle">MLP</text>

  <!-- Arrows from all candidates converge -->
  <line x1="40" y1="260" x2="40" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="150" y1="260" x2="150" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="250" y1="260" x2="250" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="360" y1="260" x2="360" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="40" y1="300" x2="360" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="200" y1="300" x2="200" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>

  <!-- Step 2: Constraint checks (horizontal chain) -->
  <!-- Memory -->
  <polygon points="530,80 600,115 530,150 460,115" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="530" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Memory</text>
  <text x="530" y="125" font-size="9" font-weight="700" fill="#333" text-anchor="middle">fits?</text>

  <!-- Compute -->
  <polygon points="690,80 760,115 690,150 620,115" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="690" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Latency</text>
  <text x="690" y="125" font-size="9" font-weight="700" fill="#333" text-anchor="middle">met?</text>

  <!-- Power -->
  <polygon points="840,80 900,115 840,150 780,115" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="840" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Power</text>
  <text x="840" y="125" font-size="9" font-weight="700" fill="#333" text-anchor="middle">OK?</text>

  <!-- Arrows between checks -->
  <line x1="600" y1="115" x2="615" y2="115" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#afg)"/>
  <text x="608" y="107" font-size="7" fill="#3d9e5a" font-weight="700">Yes</text>
  <line x1="760" y1="115" x2="775" y2="115" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#afg)"/>
  <text x="768" y="107" font-size="7" fill="#3d9e5a" font-weight="700">Yes</text>

  <!-- Connect candidate selection to constraint checks -->
  <text x="420" y="80" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Constraint Checks</text>
  <line x1="400" y1="300" x2="460" y2="300" stroke="#555" stroke-width="1"/>
  <line x1="460" y1="300" x2="460" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#af)"/>

  <!-- Deploy (success) -->
  <rect x="780" y="175" width="100" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="830" y="200" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Deploy</text>
  <line x1="840" y1="150" x2="840" y2="170" stroke="#3d9e5a" stroke-width="2" marker-end="url(#afg)"/>
  <text x="860" y="165" font-size="7" fill="#3d9e5a" font-weight="700">Yes</text>

  <!-- Fail paths (red, loop back) -->
  <line x1="530" y1="150" x2="530" y2="195" stroke="#c44" stroke-width="1.5"/>
  <line x1="690" y1="150" x2="690" y2="195" stroke="#c44" stroke-width="1.5"/>
  <text x="530" y="165" font-size="7" fill="#c44" font-weight="700">No</text>
  <text x="690" y="165" font-size="7" fill="#c44" font-weight="700">No</text>

  <!-- Scale down box -->
  <rect x="510" y="200" width="260" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="640" y="220" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Scale Down or Switch Architecture</text>
  <text x="640" y="237" font-size="8" fill="#555" text-anchor="middle">Quantize | Prune | Choose lighter family</text>

  <!-- Loop back arrow -->
  <path d="M 510,222 L 460,222 L 460,300" fill="none" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#afr)"/>
  <text x="480" y="265" font-size="7" fill="#c44" font-weight="700">Retry</text>

  <!-- === Bottom: Summary table === -->
  <rect x="40" y="320" width="400" height="155" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="240" y="345" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data-to-Architecture Mapping</text>

  <text x="60" y="370" font-size="9" font-weight="700" fill="#3d9e5a">Spatial (images)</text>
  <text x="220" y="370" font-size="9" fill="#555">CNN (ResNet, MobileNet)</text>

  <text x="60" y="390" font-size="9" font-weight="700" fill="#c87b2a">Sequential (time)</text>
  <text x="220" y="390" font-size="9" fill="#555">RNN / LSTM / GRU</text>

  <text x="60" y="410" font-size="9" font-weight="700" fill="#4a90c4">Relational (text)</text>
  <text x="220" y="410" font-size="9" fill="#555">Transformer (GPT, BERT)</text>

  <text x="60" y="430" font-size="9" font-weight="700" fill="#bbb">Tabular (features)</text>
  <text x="220" y="430" font-size="9" fill="#555">MLP / Gradient Boosting</text>

  <text x="60" y="450" font-size="9" font-weight="700" fill="#c44">Categorical (IDs)</text>
  <text x="220" y="450" font-size="9" fill="#555">DLRM (embedding tables)</text>

  <!-- Constraint priorities -->
  <rect x="480" y="290" width="380" height="140" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="670" y="315" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Constraint Priority Order</text>

  <text x="500" y="340" font-size="9" fill="#555">1. Does the model fit in memory?</text>
  <text x="500" y="360" font-size="9" fill="#555">2. Does inference meet latency SLA?</text>
  <text x="500" y="380" font-size="9" fill="#555">3. Does power stay within budget?</text>
  <text x="500" y="400" font-size="9" fill="#555">4. Does accuracy meet requirements?</text>
  <text x="500" y="420" font-size="9" font-weight="700" fill="#a31f34">A model that violates any constraint</text>
  <text x="500" y="435" font-size="9" font-weight="700" fill="#a31f34">has zero utility -- regardless of accuracy.</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Architecture selection starts with data structure, then validates against deployment constraints</text>
</svg>
