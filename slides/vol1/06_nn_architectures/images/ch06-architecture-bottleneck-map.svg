<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Five Lighthouse Models: Bottleneck Map</text>

  <!-- Column headers -->
  <text x="120" y="70" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Model</text>
  <text x="450" y="70" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Iron Law Breakdown</text>
  <text x="790" y="70" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Bottleneck</text>

  <!-- Divider -->
  <line x1="40" y1="80" x2="860" y2="80" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Row 1: ResNet-50 -->
  <text x="120" y="120" font-size="11" font-weight="700" fill="#333" text-anchor="middle">ResNet-50</text>
  <text x="120" y="136" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">4.1 GFLOPs | 98 MB</text>
  <!-- Stacked bar -->
  <rect x="230" y="105" width="340" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="400" y="124" font-size="9" font-weight="700" fill="#333" text-anchor="middle">O / R_peak (compute dominates)</text>
  <rect x="570" y="105" width="80" height="30" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="610" y="124" font-size="8" font-weight="400" fill="#333" text-anchor="middle">D/BW</text>
  <rect x="650" y="105" width="30" height="30" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="665" y="124" font-size="8" font-weight="400" fill="#333" text-anchor="middle">L</text>
  <!-- Badge -->
  <rect x="730" y="107" width="100" height="26" rx="12" fill="#a31f34"/>
  <text x="780" y="124" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">COMPUTE</text>

  <!-- Row 2: GPT-2 XL -->
  <text x="120" y="195" font-size="11" font-weight="700" fill="#333" text-anchor="middle">GPT-2 XL</text>
  <text x="120" y="211" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">1.5B params | 6 GB</text>
  <rect x="230" y="180" width="80" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="270" y="199" font-size="8" font-weight="400" fill="#333" text-anchor="middle">O</text>
  <rect x="310" y="180" width="340" height="30" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="480" y="199" font-size="9" font-weight="700" fill="#333" text-anchor="middle">D_vol / BW (bandwidth dominates)</text>
  <rect x="650" y="180" width="30" height="30" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="665" y="199" font-size="8" font-weight="400" fill="#333" text-anchor="middle">L</text>
  <rect x="730" y="182" width="100" height="26" rx="12" fill="#a31f34"/>
  <text x="780" y="199" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">BANDWIDTH</text>

  <!-- Row 3: DLRM -->
  <text x="120" y="270" font-size="11" font-weight="700" fill="#333" text-anchor="middle">DLRM</text>
  <text x="120" y="286" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">25B entries | 100+ GB</text>
  <rect x="230" y="255" width="40" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="250" y="274" font-size="8" font-weight="400" fill="#333" text-anchor="middle">O</text>
  <rect x="270" y="255" width="80" height="30" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="310" y="274" font-size="8" font-weight="400" fill="#333" text-anchor="middle">D/BW</text>
  <rect x="350" y="255" width="300" height="30" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="500" y="274" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Memory capacity (TB-scale tables)</text>
  <rect x="730" y="257" width="100" height="26" rx="12" fill="#a31f34"/>
  <text x="780" y="274" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">CAPACITY</text>

  <!-- Row 4: MobileNet -->
  <text x="120" y="345" font-size="11" font-weight="700" fill="#333" text-anchor="middle">MobileNet</text>
  <text x="120" y="361" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">3.5M params | 14 MB</text>
  <rect x="230" y="330" width="120" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="290" y="349" font-size="8" font-weight="400" fill="#333" text-anchor="middle">O (low)</text>
  <rect x="350" y="330" width="120" height="30" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="410" y="349" font-size="8" font-weight="400" fill="#333" text-anchor="middle">D/BW</text>
  <rect x="470" y="330" width="210" height="30" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="575" y="349" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Latency target (50-200 ms)</text>
  <rect x="730" y="332" width="100" height="26" rx="12" fill="#a31f34"/>
  <text x="780" y="349" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">LATENCY</text>

  <!-- Row 5: KWS -->
  <text x="120" y="420" font-size="11" font-weight="700" fill="#333" text-anchor="middle">KWS</text>
  <text x="120" y="436" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">26K params | 104 KB</text>
  <rect x="230" y="405" width="60" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="260" y="424" font-size="8" font-weight="400" fill="#333" text-anchor="middle">O</text>
  <rect x="290" y="405" width="60" height="30" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="320" y="424" font-size="8" font-weight="400" fill="#333" text-anchor="middle">D</text>
  <rect x="350" y="405" width="60" height="30" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="380" y="424" font-size="8" font-weight="400" fill="#333" text-anchor="middle">L</text>
  <rect x="410" y="405" width="270" height="30" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="545" y="424" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Power envelope (100 mW always-on)</text>
  <rect x="730" y="407" width="100" height="26" rx="12" fill="#a31f34"/>
  <text x="780" y="424" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">POWER</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Each lighthouse isolates a distinct system bottleneck -- no single "best" architecture exists</text>
</svg>
