<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Optimization Stack</text>

  <!-- Arrow: More Software to More Hardware -->
  <line x1="100" y1="80" x2="100" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="80" y="110" font-size="9" fill="#555" text-anchor="end" font-weight="700">More</text>
  <text x="80" y="122" font-size="9" fill="#555" text-anchor="end" font-weight="700">Software</text>
  <text x="80" y="370" font-size="9" fill="#555" text-anchor="end" font-weight="700">More</text>
  <text x="80" y="382" font-size="9" fill="#555" text-anchor="end" font-weight="700">Hardware</text>

  <!-- Layer 1: Efficient Model Representation -->
  <rect x="150" y="70" width="580" height="90" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="440" y="100" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Efficient Model Representation</text>
  <text x="440" y="120" font-size="10" fill="#555" text-anchor="middle">Pruning  |  Knowledge Distillation  |  Neural Architecture Search</text>
  <text x="440" y="140" font-size="9" fill="#555" text-anchor="middle">Reduces what the model computes (parameters, operations)</text>

  <!-- Layer 2: Efficient Numerics Representation -->
  <rect x="150" y="190" width="580" height="90" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="440" y="220" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Efficient Numerics Representation</text>
  <text x="440" y="240" font-size="10" fill="#555" text-anchor="middle">FP32 → FP16 → INT8 → INT4  |  Mixed Precision  |  QAT</text>
  <text x="440" y="260" font-size="9" fill="#555" text-anchor="middle">Reduces how precisely the model computes (bit-width)</text>

  <!-- Layer 3: Efficient Hardware Implementation -->
  <rect x="150" y="310" width="580" height="90" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="440" y="340" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Efficient Hardware Implementation</text>
  <text x="440" y="360" font-size="10" fill="#555" text-anchor="middle">Operator Fusion  |  Sparsity Exploitation  |  Graph Optimization</text>
  <text x="440" y="380" font-size="9" fill="#555" text-anchor="middle">Reduces how inefficiently hardware executes (memory traffic, utilization)</text>

  <!-- Right side: compounding label -->
  <rect x="760" y="120" width="110" height="230" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="815" y="200" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Techniques</text>
  <text x="815" y="215" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Compound</text>
  <text x="815" y="240" font-size="9" fill="#555" text-anchor="middle">2× + 4× + 2×</text>
  <text x="815" y="255" font-size="9" fill="#555" text-anchor="middle">= 16× total</text>
  <text x="815" y="275" font-size="9" fill="#555" text-anchor="middle">(not 8×)</text>
  <line x1="760" y1="180" x2="870" y2="180" stroke="#bbb" stroke-width="0.8"/>

  <!-- Bottom footnote -->
  <text x="450" y="465" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each layer addresses a different bottleneck; maximum compression requires all three.</text>
</svg>
