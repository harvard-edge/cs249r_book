<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Neural Architecture Search (NAS)</text>

  <!-- ===== Search Space (top-left) ===== -->
  <rect x="50" y="55" width="350" height="170" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="80" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Search Space</text>

  <!-- Building blocks -->
  <rect x="75" y="95" width="80" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="115" y="114" font-size="8.5" fill="#333" text-anchor="middle">3x3 Conv</text>

  <rect x="165" y="95" width="80" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="205" y="114" font-size="8.5" fill="#333" text-anchor="middle">5x5 Conv</text>

  <rect x="255" y="95" width="80" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="295" y="114" font-size="8.5" fill="#333" text-anchor="middle">MBConv</text>

  <rect x="75" y="135" width="80" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="115" y="154" font-size="8.5" fill="#333" text-anchor="middle">Skip</text>

  <rect x="165" y="135" width="80" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="205" y="154" font-size="8.5" fill="#333" text-anchor="middle">Pool</text>

  <rect x="255" y="135" width="80" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="295" y="154" font-size="8.5" fill="#333" text-anchor="middle">SE Block</text>

  <text x="225" y="200" font-size="8.5" fill="#555" text-anchor="middle">+ depth, width, resolution parameters</text>

  <!-- ===== Search Strategy (top-right) ===== -->
  <rect x="500" y="55" width="350" height="170" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="675" y="80" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Search Strategy</text>

  <rect x="520" y="95" width="130" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="585" y="114" font-size="9" fill="#333" text-anchor="middle">Reinforcement Learning</text>

  <rect x="660" y="95" width="130" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="725" y="114" font-size="9" fill="#333" text-anchor="middle">Evolutionary</text>

  <rect x="520" y="135" width="130" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="585" y="154" font-size="9" fill="#333" text-anchor="middle">Differentiable (DARTS)</text>

  <rect x="660" y="135" width="130" height="28" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="725" y="154" font-size="9" fill="#333" text-anchor="middle">Weight Sharing</text>

  <text x="675" y="200" font-size="8.5" fill="#555" text-anchor="middle">Selects candidate architectures to evaluate</text>

  <!-- Arrow: Search Space to Search Strategy -->
  <line x1="400" y1="140" x2="498" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="449" y="132" font-size="8" fill="#555" text-anchor="middle">candidates</text>

  <!-- ===== Performance Estimation (bottom-right) ===== -->
  <rect x="500" y="280" width="350" height="130" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="675" y="305" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Evaluate</text>

  <rect x="520" y="315" width="150" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="595" y="334" font-size="9" fill="#333" text-anchor="middle">Train Proxy (few epochs)</text>

  <rect x="680" y="315" width="150" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="755" y="334" font-size="9" fill="#333" text-anchor="middle">Latency Check (HW)</text>

  <text x="675" y="375" font-size="9" fill="#555" text-anchor="middle">Multi-objective: accuracy + latency + size</text>
  <text x="675" y="395" font-size="8.5" fill="#555" text-anchor="middle">Hardware-aware NAS measures on target device</text>

  <!-- Arrow: Strategy to Evaluate -->
  <line x1="675" y1="225" x2="675" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="690" y="255" font-size="8" fill="#555">architecture</text>

  <!-- ===== Best Architecture (bottom-left) ===== -->
  <rect x="50" y="280" width="350" height="130" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="225" y="305" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Discovered Architecture</text>

  <!-- Simple network diagram -->
  <rect x="80" y="320" width="60" height="25" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="110" y="337" font-size="7.5" fill="#333" text-anchor="middle">MBConv</text>
  <line x1="140" y1="332" x2="158" y2="332" stroke="#3d9e5a" stroke-width="1"/>
  <rect x="160" y="320" width="60" height="25" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="190" y="337" font-size="7.5" fill="#333" text-anchor="middle">SE + 3x3</text>
  <line x1="220" y1="332" x2="238" y2="332" stroke="#3d9e5a" stroke-width="1"/>
  <rect x="240" y="320" width="60" height="25" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="270" y="337" font-size="7.5" fill="#333" text-anchor="middle">Skip + 5x5</text>
  <line x1="300" y1="332" x2="318" y2="332" stroke="#3d9e5a" stroke-width="1"/>
  <rect x="320" y="320" width="50" height="25" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="345" y="337" font-size="7.5" fill="#333" text-anchor="middle">Pool</text>

  <!-- Result pill -->
  <rect x="80" y="365" width="300" height="28" rx="14" fill="#a31f34"/>
  <text x="230" y="384" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">EfficientNet: 8.4x smaller, 6.1x faster than ResNet-50</text>

  <!-- Arrow: Evaluate to Best Architecture -->
  <line x1="500" y1="345" x2="402" y2="345" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="451" y="337" font-size="8" fill="#555" text-anchor="middle">best</text>

  <!-- Feedback arrow: Best Architecture back to Search Space -->
  <path d="M225,280 L225,227" stroke="#555" stroke-width="1.2" fill="none" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="240" y="255" font-size="8" fill="#555">iterate</text>

  <!-- Bottom footnote -->
  <text x="450" y="465" font-size="9" fill="#999" text-anchor="middle" font-style="italic">NAS automates architecture design, co-optimizing accuracy and hardware efficiency.</text>
</svg>
