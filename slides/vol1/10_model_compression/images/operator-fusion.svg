<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Operator Fusion: Eliminating Memory Round-Trips</text>

  <!-- Divider -->
  <line x1="450" y1="45" x2="450" y2="420" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Left: Without Fusion ===== -->
  <text x="225" y="62" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Without Fusion (3 kernels)</text>

  <!-- Conv -->
  <rect x="120" y="80" width="210" height="50" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Convolution</text>

  <!-- Memory write -->
  <line x1="225" y1="130" x2="225" y2="155" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <rect x="145" y="155" width="160" height="25" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="225" y="172" font-size="8.5" fill="#c44" text-anchor="middle" font-weight="700">Write to GPU Global Memory</text>

  <!-- Memory read -->
  <line x1="225" y1="180" x2="225" y2="200" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- BatchNorm -->
  <rect x="120" y="200" width="210" height="50" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="230" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Batch Normalization</text>

  <!-- Memory write -->
  <line x1="225" y1="250" x2="225" y2="275" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <rect x="145" y="275" width="160" height="25" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="225" y="292" font-size="8.5" fill="#c44" text-anchor="middle" font-weight="700">Write to GPU Global Memory</text>

  <!-- Memory read -->
  <line x1="225" y1="300" x2="225" y2="320" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- ReLU -->
  <rect x="120" y="320" width="210" height="50" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="350" font-size="10" font-weight="700" fill="#333" text-anchor="middle">ReLU</text>

  <!-- Summary box left -->
  <rect x="90" y="385" width="270" height="35" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="225" y="407" font-size="9" fill="#c44" text-anchor="middle" font-weight="700">3 kernel launches + 3 memory round-trips</text>

  <!-- ===== Right: With Fusion ===== -->
  <text x="675" y="62" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">With Fusion (1 fused kernel)</text>

  <!-- Single fused kernel -->
  <rect x="540" y="80" width="270" height="290" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="675" y="115" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Fused Conv-BN-ReLU Kernel</text>

  <!-- Internal operations in registers -->
  <rect x="570" y="135" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="675" y="160" font-size="9" fill="#333" text-anchor="middle">Convolution (on-chip registers)</text>

  <line x1="675" y1="175" x2="675" y2="195" stroke="#3d9e5a" stroke-width="1.0" marker-end="url(#arrow)"/>
  <text x="720" y="190" font-size="7.5" fill="#3d9e5a" font-weight="700">in registers</text>

  <rect x="570" y="200" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="675" y="225" font-size="9" fill="#333" text-anchor="middle">Batch Norm (on-chip registers)</text>

  <line x1="675" y1="240" x2="675" y2="260" stroke="#3d9e5a" stroke-width="1.0" marker-end="url(#arrow)"/>
  <text x="720" y="255" font-size="7.5" fill="#3d9e5a" font-weight="700">in registers</text>

  <rect x="570" y="265" width="210" height="40" rx="4" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="675" y="290" font-size="9" fill="#333" text-anchor="middle">ReLU (on-chip registers)</text>

  <text x="675" y="340" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="700">All computation stays on-chip</text>
  <text x="675" y="355" font-size="9" fill="#555" text-anchor="middle">No intermediate memory writes</text>

  <!-- Summary box right -->
  <rect x="540" y="385" width="270" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="675" y="407" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="700">1 kernel launch + 0 extra memory trips</text>

  <!-- Bottom: impact metrics -->
  <rect x="200" y="435" width="500" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="455" font-size="10" fill="#333" text-anchor="middle">Result: <tspan font-weight="700" fill="#3d9e5a">10-30% latency reduction</tspan> with <tspan font-weight="700" fill="#3d9e5a">zero accuracy loss</tspan> (Region 1: Free Lunch)</text>

  <!-- Bottom footnote -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Operator fusion is always the first optimization to apply: zero accuracy cost, immediate latency improvement.</text>
</svg>
