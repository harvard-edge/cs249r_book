<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Deployment Gap: Model Size vs. Device Capacity</text>

  <!-- === Spectrum Bar === -->
  <rect x="60" y="55" width="240" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Cloud (GBs)</text>

  <rect x="330" y="55" width="240" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Mobile / Edge (MBs)</text>

  <rect x="600" y="55" width="240" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="720" y="80" font-size="11" font-weight="700" fill="#333" text-anchor="middle">TinyML (KBs)</text>

  <!-- Device specs row -->
  <text x="180" y="115" font-size="9" fill="#555" text-anchor="middle">H100: 80 GB HBM3 | 700 W</text>
  <text x="450" y="115" font-size="9" fill="#555" text-anchor="middle">Smartphone: 8 GB LPDDR5 | 3-5 W</text>
  <text x="720" y="115" font-size="9" fill="#555" text-anchor="middle">Arduino Nicla: 384 KB SRAM | 100 mW</text>

  <!-- === Model Size Indicators === -->
  <text x="450" y="150" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Model Memory Requirements</text>

  <!-- GPT-3 -->
  <rect x="60" y="165" width="520" height="30" rx="4" fill="#4a90c4" opacity="0.7"/>
  <text x="70" y="185" font-size="9" font-weight="700" fill="#fff">GPT-3 (175B): 350 GB (FP16)</text>
  <text x="560" y="185" font-size="8" fill="#4a90c4" font-weight="700">Cloud only</text>

  <!-- DLRM -->
  <rect x="60" y="200" width="200" height="25" rx="4" fill="#4a90c4" opacity="0.5"/>
  <text x="70" y="217" font-size="9" font-weight="700" fill="#fff">DLRM: ~10 GB</text>
  <text x="280" y="217" font-size="8" fill="#4a90c4" font-weight="700">Cloud only</text>

  <!-- GPT-2 XL -->
  <rect x="60" y="230" width="120" height="25" rx="4" fill="#4a90c4" opacity="0.4"/>
  <text x="70" y="247" font-size="9" font-weight="700" fill="#333">GPT-2 XL: 6 GB</text>

  <!-- ResNet-50 -->
  <rect x="60" y="260" width="40" height="25" rx="4" fill="#c87b2a" opacity="0.5"/>
  <text x="110" y="277" font-size="9" fill="#333">ResNet-50: 100 MB</text>

  <!-- MobileNetV2 -->
  <rect x="60" y="290" width="20" height="25" rx="4" fill="#3d9e5a" opacity="0.5"/>
  <text x="90" y="307" font-size="9" fill="#333">MobileNetV2: 14 MB</text>

  <!-- MobileNetV2 INT8 -->
  <rect x="60" y="320" width="10" height="25" rx="4" fill="#3d9e5a" opacity="0.7"/>
  <text x="80" y="337" font-size="9" fill="#333">MobileNetV2 (INT8): 3.5 MB</text>

  <!-- DS-CNN -->
  <rect x="60" y="350" width="4" height="25" rx="2" fill="#a31f34"/>
  <text x="75" y="367" font-size="9" fill="#333">DS-CNN: 500 KB</text>
  <rect x="200" y="358" width="45" height="16" rx="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="223" y="370" font-size="7.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">fits!</text>

  <!-- Device capacity lines -->
  <line x1="520" y1="160" x2="520" y2="385" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="525" y="395" font-size="8" fill="#4a90c4" font-weight="700">Cloud: 80 GB</text>

  <line x1="350" y1="250" x2="350" y2="385" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="355" y="395" font-size="8" fill="#c87b2a" font-weight="700">Mobile: 8 GB</text>

  <line x1="100" y1="350" x2="100" y2="385" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="105" y="395" font-size="8" fill="#c44" font-weight="700">TinyML: 384 KB</text>

  <!-- Key insight box -->
  <rect x="520" y="250" width="340" height="110" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="690" y="275" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">The Compression Imperative</text>
  <text x="690" y="298" font-size="9" fill="#333" text-anchor="middle">7B LLM in FP16 = 14 GB</text>
  <text x="690" y="314" font-size="9" fill="#333" text-anchor="middle">Smartphone RAM = 8 GB</text>
  <text x="690" y="330" font-size="9" fill="#c44" text-anchor="middle" font-weight="700">The math does not work.</text>
  <text x="690" y="350" font-size="9" fill="#3d9e5a" text-anchor="middle">INT4 quantization: 14 GB → 3.5 GB</text>

  <!-- Bottom footnote -->
  <text x="450" y="465" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Deployment context determines which compression techniques are necessary and how aggressively they must be applied.</text>
</svg>
