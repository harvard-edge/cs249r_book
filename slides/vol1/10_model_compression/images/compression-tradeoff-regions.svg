<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Compression-Accuracy Trade-off: Three Regions</text>

  <!-- === Region boxes (top) === -->
  <!-- Region 1: Free Lunch -->
  <rect x="50" y="55" width="260" height="110" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="180" y="78" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Region 1: Free Lunch</text>
  <text x="180" y="98" font-size="9" fill="#333" text-anchor="middle">Operator Fusion: 10-30% latency reduction</text>
  <text x="180" y="114" font-size="9" fill="#333" text-anchor="middle">FP32 → BF16: 2x memory, 2x throughput</text>
  <text x="180" y="135" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="700">Accuracy loss: 0% to &lt;0.1%</text>
  <text x="180" y="155" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Always do these first</text>

  <!-- Region 2: Efficient Trade -->
  <rect x="320" y="55" width="260" height="110" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Region 2: Efficient Trade</text>
  <text x="450" y="98" font-size="9" fill="#333" text-anchor="middle">INT8 Quantization: 4x memory, 2-4x speed</text>
  <text x="450" y="114" font-size="9" fill="#333" text-anchor="middle">50% Pruning: ~2x smaller model</text>
  <text x="450" y="130" font-size="9" fill="#333" text-anchor="middle">Distillation: 2-10x smaller student</text>
  <text x="450" y="150" font-size="9" fill="#c87b2a" text-anchor="middle" font-weight="700">Accuracy loss: 0.5-3%</text>

  <!-- Region 3: Danger Zone -->
  <rect x="590" y="55" width="260" height="110" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="720" y="78" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Region 3: Danger Zone</text>
  <text x="720" y="98" font-size="9" fill="#333" text-anchor="middle">INT4/Binary Quantization</text>
  <text x="720" y="114" font-size="9" fill="#333" text-anchor="middle">90%+ Pruning</text>
  <text x="720" y="135" font-size="9" fill="#c44" text-anchor="middle" font-weight="700">Accuracy loss: 5-15%+</text>
  <text x="720" y="155" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Quality cliff — model may become useless</text>

  <!-- === Technique Table === -->
  <text x="450" y="200" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Technique Impact Summary</text>

  <!-- Table header -->
  <rect x="50" y="215" width="800" height="28" rx="0" fill="#f7f7f7"/>
  <text x="150" y="234" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Technique</text>
  <text x="340" y="234" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Systems Gain</text>
  <text x="530" y="234" font-size="9" font-weight="700" fill="#333" text-anchor="middle">ML Cost</text>
  <text x="690" y="234" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Typical Impact</text>
  <text x="810" y="234" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Region</text>

  <!-- Separator -->
  <line x1="50" y1="243" x2="850" y2="243" stroke="#bbb" stroke-width="0.8"/>

  <!-- Row 1: Operator Fusion -->
  <rect x="50" y="248" width="800" height="26" rx="0" fill="#d4edda" opacity="0.2"/>
  <text x="150" y="265" font-size="9" fill="#333" text-anchor="middle">Operator Fusion</text>
  <text x="340" y="265" font-size="9" fill="#333" text-anchor="middle">10-30% latency reduction</text>
  <text x="530" y="265" font-size="9" fill="#3d9e5a" text-anchor="middle">None</text>
  <text x="690" y="265" font-size="9" fill="#333" text-anchor="middle">No accuracy loss</text>
  <rect x="796" y="253" width="28" height="16" rx="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="810" y="265" font-size="8" fill="#3d9e5a" text-anchor="middle" font-weight="700">1</text>

  <!-- Row 2: FP32 → BF16 -->
  <text x="150" y="291" font-size="9" fill="#333" text-anchor="middle">FP32 → BF16</text>
  <text x="340" y="291" font-size="9" fill="#333" text-anchor="middle">2x memory, ~2x throughput</text>
  <text x="530" y="291" font-size="9" fill="#333" text-anchor="middle">Minimal</text>
  <text x="690" y="291" font-size="9" fill="#333" text-anchor="middle">&lt;0.1% accuracy drop</text>
  <rect x="796" y="279" width="28" height="16" rx="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="810" y="291" font-size="8" fill="#3d9e5a" text-anchor="middle" font-weight="700">1</text>

  <!-- Row 3: INT8 Quantization -->
  <rect x="50" y="300" width="800" height="26" rx="0" fill="#fdebd0" opacity="0.15"/>
  <text x="150" y="317" font-size="9" fill="#333" text-anchor="middle">FP16 → INT8</text>
  <text x="340" y="317" font-size="9" fill="#333" text-anchor="middle">2x memory, 2-4x throughput</text>
  <text x="530" y="317" font-size="9" fill="#333" text-anchor="middle">Quantization error</text>
  <text x="690" y="317" font-size="9" fill="#333" text-anchor="middle">0.5-1% accuracy drop</text>
  <rect x="796" y="305" width="28" height="16" rx="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="810" y="317" font-size="8" fill="#c87b2a" text-anchor="middle" font-weight="700">2</text>

  <!-- Row 4: 50% Pruning -->
  <text x="150" y="343" font-size="9" fill="#333" text-anchor="middle">50% Pruning</text>
  <text x="340" y="343" font-size="9" fill="#333" text-anchor="middle">~2x smaller model</text>
  <text x="530" y="343" font-size="9" fill="#333" text-anchor="middle">Capacity loss</text>
  <text x="690" y="343" font-size="9" fill="#333" text-anchor="middle">0.5-1% accuracy drop</text>
  <rect x="796" y="331" width="28" height="16" rx="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="810" y="343" font-size="8" fill="#c87b2a" text-anchor="middle" font-weight="700">2</text>

  <!-- Row 5: Knowledge Distillation -->
  <rect x="50" y="352" width="800" height="26" rx="0" fill="#fdebd0" opacity="0.15"/>
  <text x="150" y="369" font-size="9" fill="#333" text-anchor="middle">Knowledge Distillation</text>
  <text x="340" y="369" font-size="9" fill="#333" text-anchor="middle">2-10x smaller student</text>
  <text x="530" y="369" font-size="9" fill="#333" text-anchor="middle">Capability ceiling</text>
  <text x="690" y="369" font-size="9" fill="#333" text-anchor="middle">1-3% accuracy drop</text>
  <rect x="796" y="357" width="28" height="16" rx="8" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="810" y="369" font-size="8" fill="#c87b2a" text-anchor="middle" font-weight="700">2</text>

  <!-- Row 6: 90% Pruning -->
  <text x="150" y="395" font-size="9" fill="#333" text-anchor="middle">90% Pruning</text>
  <text x="340" y="395" font-size="9" fill="#333" text-anchor="middle">~10x smaller model</text>
  <text x="530" y="395" font-size="9" fill="#c44" text-anchor="middle" font-weight="700">Severe loss</text>
  <text x="690" y="395" font-size="9" fill="#c44" text-anchor="middle">5-15% accuracy drop</text>
  <rect x="796" y="383" width="28" height="16" rx="8" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="810" y="395" font-size="8" fill="#c44" text-anchor="middle" font-weight="700">3</text>

  <!-- Bottom insight -->
  <rect x="200" y="420" width="500" height="30" rx="4" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.0"/>
  <text x="450" y="440" font-size="9" fill="#a31f34" text-anchor="middle" font-weight="700">Stop compressing when marginal accuracy loss exceeds marginal efficiency gain (the "knee")</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Techniques that preserve model structure (fusion, precision) tend to be cheap; those that alter structure (pruning, distillation) require careful tuning.</text>
</svg>
