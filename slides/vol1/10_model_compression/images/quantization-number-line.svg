<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Uniform Quantization: FP32 → INT8 Mapping</text>

  <!-- === FP32 Number Line === -->
  <text x="60" y="90" font-size="11" font-weight="700" fill="#333">FP32</text>
  <text x="60" y="104" font-size="9" fill="#555">(continuous)</text>

  <!-- FP32 axis -->
  <line x1="130" y1="95" x2="830" y2="95" stroke="#bbb" stroke-width="1.5"/>
  <!-- Tick marks for FP32 -->
  <line x1="130" y1="88" x2="130" y2="102" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="118" font-size="8" fill="#555" text-anchor="middle">-1.0</text>
  <line x1="305" y1="88" x2="305" y2="102" stroke="#bbb" stroke-width="1"/>
  <text x="305" y="118" font-size="8" fill="#555" text-anchor="middle">-0.5</text>
  <line x1="480" y1="88" x2="480" y2="102" stroke="#bbb" stroke-width="1"/>
  <text x="480" y="118" font-size="8" fill="#555" text-anchor="middle">0.0</text>
  <line x1="655" y1="88" x2="655" y2="102" stroke="#bbb" stroke-width="1"/>
  <text x="655" y="118" font-size="8" fill="#555" text-anchor="middle">+0.5</text>
  <line x1="830" y1="88" x2="830" y2="102" stroke="#bbb" stroke-width="1"/>
  <text x="830" y="118" font-size="8" fill="#555" text-anchor="middle">+1.0</text>

  <!-- FP32 sample points -->
  <circle cx="197" cy="95" r="5" fill="#4a90c4" stroke="#333" stroke-width="0.8"/>
  <text x="197" y="80" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">-0.76</text>

  <circle cx="370" cy="95" r="5" fill="#4a90c4" stroke="#333" stroke-width="0.8"/>
  <text x="370" y="80" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">-0.31</text>

  <circle cx="493" cy="95" r="5" fill="#4a90c4" stroke="#333" stroke-width="0.8"/>
  <text x="493" y="80" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">+0.04</text>

  <circle cx="610" cy="95" r="5" fill="#4a90c4" stroke="#333" stroke-width="0.8"/>
  <text x="610" y="80" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">+0.37</text>

  <circle cx="760" cy="95" r="5" fill="#4a90c4" stroke="#333" stroke-width="0.8"/>
  <text x="760" y="80" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">+0.80</text>

  <!-- === Dashed mapping arrows === -->
  <line x1="197" y1="105" x2="200" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="370" y1="105" x2="375" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="493" y1="105" x2="480" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="610" y1="105" x2="620" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="760" y1="105" x2="760" y2="215" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- === INT8 Number Line === -->
  <text x="60" y="235" font-size="11" font-weight="700" fill="#333">INT8</text>
  <text x="60" y="249" font-size="9" fill="#555">(256 levels)</text>

  <!-- INT8 axis -->
  <rect x="125" y="225" width="710" height="20" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>

  <!-- INT8 tick marks (representative subset) -->
  <line x1="130" y1="248" x2="130" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="200" y1="248" x2="200" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="270" y1="248" x2="270" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="340" y1="248" x2="340" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="375" y1="248" x2="375" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="410" y1="248" x2="410" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="480" y1="248" x2="480" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="550" y1="248" x2="550" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="620" y1="248" x2="620" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="690" y1="248" x2="690" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="760" y1="248" x2="760" y2="255" stroke="#4a90c4" stroke-width="0.8"/>
  <line x1="830" y1="248" x2="830" y2="255" stroke="#4a90c4" stroke-width="0.8"/>

  <!-- INT8 snapped points (accent pills) -->
  <rect x="185" y="228" width="30" height="14" rx="7" fill="#a31f34"/>
  <text x="200" y="238" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">31</text>

  <rect x="360" y="228" width="30" height="14" rx="7" fill="#a31f34"/>
  <text x="375" y="238" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">88</text>

  <rect x="465" y="228" width="30" height="14" rx="7" fill="#a31f34"/>
  <text x="480" y="238" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">133</text>

  <rect x="605" y="228" width="30" height="14" rx="7" fill="#a31f34"/>
  <text x="620" y="238" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">175</text>

  <rect x="745" y="228" width="30" height="14" rx="7" fill="#a31f34"/>
  <text x="760" y="238" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">230</text>

  <!-- Quantization error annotation for +0.37 -->
  <line x1="610" y1="270" x2="620" y2="270" stroke="#c44" stroke-width="2"/>
  <line x1="610" y1="266" x2="610" y2="274" stroke="#c44" stroke-width="1.5"/>
  <line x1="620" y1="266" x2="620" y2="274" stroke="#c44" stroke-width="1.5"/>
  <text x="615" y="288" font-size="8.5" fill="#c44" text-anchor="middle" font-weight="700">Quantization error</text>

  <!-- === Energy Table === -->
  <rect x="130" y="320" width="340" height="140" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="300" y="345" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Why Quantize? Energy Physics</text>

  <text x="150" y="370" font-size="9" font-weight="700" fill="#555">Operation</text>
  <text x="310" y="370" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Bit-Width</text>
  <text x="430" y="370" font-size="9" font-weight="700" fill="#555" text-anchor="end">Energy</text>
  <line x1="145" y1="376" x2="460" y2="376" stroke="#bbb" stroke-width="0.5"/>

  <text x="150" y="392" font-size="9" fill="#333">Integer Add</text>
  <text x="310" y="392" font-size="9" fill="#333" text-anchor="middle">8-bit</text>
  <text x="430" y="392" font-size="9" fill="#3d9e5a" text-anchor="end" font-weight="700">1x</text>

  <text x="150" y="410" font-size="9" fill="#333">Float Add</text>
  <text x="310" y="410" font-size="9" fill="#333" text-anchor="middle">32-bit</text>
  <text x="430" y="410" font-size="9" fill="#c44" text-anchor="end" font-weight="700">30x</text>

  <text x="150" y="428" font-size="9" fill="#333">DRAM Read</text>
  <text x="310" y="428" font-size="9" fill="#333" text-anchor="middle">64-bit</text>
  <text x="430" y="428" font-size="9" fill="#c44" text-anchor="end" font-weight="700">40,000x</text>

  <text x="300" y="452" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Moving data costs far more than computing on it</text>

  <!-- Formula callout -->
  <rect x="520" y="320" width="340" height="140" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="690" y="345" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Quantization Formula</text>
  <text x="690" y="375" font-size="10" fill="#333" text-anchor="middle">x_q = round(x / scale) + zero_point</text>
  <text x="690" y="400" font-size="9" fill="#555" text-anchor="middle">scale = (x_max - x_min) / (2^bits - 1)</text>
  <line x1="535" y1="415" x2="845" y2="415" stroke="#bbb" stroke-width="0.5"/>
  <text x="690" y="435" font-size="9" fill="#555" text-anchor="middle">FP32 → INT8: 4x memory reduction</text>
  <text x="690" y="452" font-size="9" fill="#555" text-anchor="middle">FP32 → INT4: 8x memory reduction</text>

  <!-- Bottom footnote -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Uniform quantization maps continuous values to the nearest discrete level. Finer grids reduce error but require more bits.</text>
</svg>
