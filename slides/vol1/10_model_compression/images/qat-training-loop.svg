<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Quantization-Aware Training (QAT)</text>

  <!-- ===== Forward Pass (top row) ===== -->
  <text x="450" y="65" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Forward Pass</text>

  <!-- FP32 Weights -->
  <rect x="50" y="80" width="130" height="60" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FP32 Weights</text>
  <text x="115" y="120" font-size="8.5" fill="#555" text-anchor="middle">(full precision)</text>

  <!-- Arrow -->
  <line x1="180" y1="110" x2="220" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fake Quantize -->
  <rect x="225" y="80" width="140" height="60" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="295" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fake Quantize</text>
  <!-- Staircase icon -->
  <line x1="255" y1="130" x2="275" y2="130" stroke="#c87b2a" stroke-width="2"/>
  <line x1="275" y1="130" x2="275" y2="120" stroke="#c87b2a" stroke-width="2"/>
  <line x1="275" y1="120" x2="295" y2="120" stroke="#c87b2a" stroke-width="2"/>
  <line x1="295" y1="120" x2="295" y2="110" stroke="#c87b2a" stroke-width="2"/>
  <line x1="295" y1="110" x2="315" y2="110" stroke="#c87b2a" stroke-width="2"/>
  <line x1="315" y1="110" x2="315" y2="100" stroke="#c87b2a" stroke-width="2"/>
  <line x1="315" y1="100" x2="335" y2="100" stroke="#c87b2a" stroke-width="2"/>

  <!-- Arrow -->
  <line x1="365" y1="110" x2="405" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Forward Pass Compute -->
  <rect x="410" y="80" width="130" height="60" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="475" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Forward Pass</text>
  <text x="475" y="120" font-size="8.5" fill="#555" text-anchor="middle">(simulated INT8)</text>

  <!-- Arrow -->
  <line x1="540" y1="110" x2="580" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Loss -->
  <rect x="585" y="80" width="120" height="60" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="645" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Loss</text>
  <text x="645" y="120" font-size="8.5" fill="#555" text-anchor="middle">Cross-entropy</text>

  <!-- ===== Backward Pass (bottom row) ===== -->
  <text x="450" y="195" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Backward Pass</text>

  <!-- Arrow: Loss down to STE -->
  <line x1="645" y1="140" x2="645" y2="205" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Straight-Through Estimator -->
  <rect x="410" y="210" width="310" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="565" y="235" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Straight-Through Estimator (STE)</text>
  <text x="565" y="255" font-size="8.5" fill="#555" text-anchor="middle">Gradient passes through as if quantize were identity</text>

  <!-- Arrow: STE back to Weight Update -->
  <line x1="410" y1="240" x2="310" y2="240" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- FP32 Weight Update -->
  <rect x="130" y="210" width="175" height="60" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="218" y="235" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FP32 Weight Update</text>
  <text x="218" y="255" font-size="8.5" fill="#555" text-anchor="middle">W = W - lr * gradient</text>

  <!-- Loop arrow back up -->
  <path d="M130,240 L80,240 L80,110 L48,110" stroke="#4a90c4" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="55" y="175" font-size="8.5" fill="#4a90c4" font-weight="700" transform="rotate(-90, 55, 175)">iterate</text>

  <!-- ===== PTQ vs QAT comparison (right side) ===== -->
  <rect x="60" y="310" width="370" height="90" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="245" y="335" font-size="11" font-weight="700" fill="#333" text-anchor="middle">PTQ vs. QAT</text>

  <rect x="75" y="345" width="160" height="22" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="155" y="360" font-size="8.5" fill="#555" text-anchor="middle">PTQ: quantize once after training</text>

  <rect x="75" y="372" width="160" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="155" y="387" font-size="8.5" fill="#333" text-anchor="middle">QAT: learn to compensate</text>

  <text x="310" y="360" font-size="9" fill="#555">Simple, fast, no retraining</text>
  <text x="310" y="387" font-size="9" fill="#3d9e5a" font-weight="700">Recovers 0.5-1.0 pp accuracy</text>

  <!-- Key insight pill -->
  <rect x="480" y="330" width="370" height="55" rx="5" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.2"/>
  <text x="665" y="352" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">The Key Insight</text>
  <text x="665" y="372" font-size="9" fill="#333" text-anchor="middle">QAT simulates low-precision during training so the model</text>
  <text x="665" y="384" font-size="9" fill="#333" text-anchor="middle">learns weights robust to quantization error</text>

  <!-- Bottom footnote -->
  <text x="450" y="465" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Fake quantization simulates low-precision arithmetic during training while maintaining full-precision gradients.</text>
</svg>
