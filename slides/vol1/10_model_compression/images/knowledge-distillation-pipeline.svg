<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Knowledge Distillation: Teacher-Student Pipeline</text>

  <!-- ===== Input Data ===== -->
  <rect x="30" y="170" width="100" height="65" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="80" y="198" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="80" y="212" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data</text>

  <!-- Arrow: Input to Teacher -->
  <line x1="130" y1="180" x2="175" y2="120" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Arrow: Input to Student -->
  <line x1="130" y1="220" x2="175" y2="290" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Teacher Path (top) ===== -->
  <rect x="180" y="65" width="160" height="80" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="260" y="95" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Teacher (Large)</text>
  <text x="260" y="115" font-size="8.5" fill="#555" text-anchor="middle">ResNet-152 / 60M params</text>
  <text x="260" y="130" font-size="8.5" fill="#555" text-anchor="middle">Pre-trained, high accuracy</text>

  <!-- Arrow: Teacher to Soft Labels -->
  <line x1="340" y1="105" x2="400" y2="105" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Soft Labels box with temperature -->
  <rect x="405" y="60" width="170" height="90" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="490" y="82" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Soft Labels (T=4)</text>

  <!-- Mini probability bars -->
  <rect x="425" y="92" width="50" height="10" rx="2" fill="#c87b2a" opacity="0.8"/>
  <rect x="425" y="105" width="30" height="10" rx="2" fill="#c87b2a" opacity="0.5"/>
  <rect x="425" y="118" width="15" height="10" rx="2" fill="#c87b2a" opacity="0.3"/>
  <text x="490" y="100" font-size="7.5" fill="#555">cat: 0.85</text>
  <text x="490" y="113" font-size="7.5" fill="#555">dog: 0.10</text>
  <text x="490" y="126" font-size="7.5" fill="#555">fox: 0.05</text>
  <text x="490" y="142" font-size="8" fill="#555" text-anchor="middle" font-style="italic">T &gt; 1 softens distribution</text>

  <!-- ===== Student Path (bottom) ===== -->
  <rect x="180" y="260" width="160" height="80" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="260" y="290" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Student (Small)</text>
  <text x="260" y="310" font-size="8.5" fill="#555" text-anchor="middle">MobileNet / 3.4M params</text>
  <text x="260" y="325" font-size="8.5" fill="#555" text-anchor="middle">Compact, efficient</text>

  <!-- Arrow: Student to Student Output -->
  <line x1="340" y1="300" x2="400" y2="300" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Student output -->
  <rect x="405" y="265" width="130" height="55" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="470" y="290" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Student Output</text>
  <text x="470" y="305" font-size="8" fill="#555" text-anchor="middle">Softmax probabilities</text>

  <!-- ===== Loss Computation ===== -->
  <rect x="625" y="130" width="210" height="130" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="730" y="157" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Combined Loss</text>

  <!-- Distillation loss -->
  <rect x="640" y="168" width="180" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.0"/>
  <text x="730" y="188" font-size="9" fill="#333" text-anchor="middle">L_distill = KL(soft_teacher, soft_student)</text>

  <!-- Student loss -->
  <rect x="640" y="205" width="180" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="730" y="225" font-size="9" fill="#333" text-anchor="middle">L_task = CE(student, hard_labels)</text>

  <text x="730" y="252" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">L = alpha * L_distill + (1-alpha) * L_task</text>

  <!-- Arrow: Soft labels to Loss -->
  <line x1="575" y1="105" x2="622" y2="170" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="590" y="130" font-size="8" fill="#c87b2a" font-weight="700">Distillation</text>
  <text x="590" y="142" font-size="8" fill="#c87b2a" font-weight="700">Loss (KL)</text>

  <!-- Arrow: Student output to Loss -->
  <line x1="535" y1="290" x2="622" y2="220" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ground Truth box -->
  <rect x="530" y="350" width="120" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="590" y="370" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Hard Labels</text>
  <text x="590" y="385" font-size="8" fill="#555" text-anchor="middle">[1, 0, 0] (one-hot)</text>

  <!-- Arrow: Hard labels to Loss -->
  <line x1="650" y1="365" x2="700" y2="265" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>
  <text x="695" y="330" font-size="8" fill="#555">Task Loss</text>
  <text x="695" y="342" font-size="8" fill="#555">(CE)</text>

  <!-- Result pill -->
  <rect x="290" y="395" width="320" height="28" rx="14" fill="#a31f34"/>
  <text x="450" y="414" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Student achieves ~96% of teacher accuracy at 17x fewer params</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Knowledge distillation transfers learned representations from a large teacher to a compact student.</text>
</svg>
