<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Static vs. Continuous Batching</text>

  <!-- ===== Panel 1: Static Batching ===== -->
  <text x="40" y="55" font-size="12" font-weight="700" fill="#c44">Static Batching</text>

  <!-- Column headers -->
  <text x="140" y="72" font-size="8" fill="#999" text-anchor="middle">Iteration →</text>
  <text x="175" y="72" font-size="7" fill="#999" text-anchor="middle">1</text>
  <text x="215" y="72" font-size="7" fill="#999" text-anchor="middle">2</text>
  <text x="255" y="72" font-size="7" fill="#999" text-anchor="middle">3</text>
  <text x="295" y="72" font-size="7" fill="#999" text-anchor="middle">4</text>
  <text x="335" y="72" font-size="7" fill="#999" text-anchor="middle">5</text>
  <text x="375" y="72" font-size="7" fill="#999" text-anchor="middle">6</text>
  <text x="415" y="72" font-size="7" fill="#999" text-anchor="middle">7</text>
  <text x="455" y="72" font-size="7" fill="#999" text-anchor="middle">8</text>
  <text x="495" y="72" font-size="7" fill="#999" text-anchor="middle">9</text>
  <text x="535" y="72" font-size="7" fill="#999" text-anchor="middle">10</text>
  <text x="575" y="72" font-size="7" fill="#999" text-anchor="middle">11</text>
  <text x="615" y="72" font-size="7" fill="#999" text-anchor="middle">12</text>

  <!-- Row labels -->
  <text x="130" y="95" font-size="8" font-weight="700" fill="#555" text-anchor="end">Req A</text>
  <text x="130" y="125" font-size="8" font-weight="700" fill="#555" text-anchor="end">Req B</text>
  <text x="130" y="155" font-size="8" font-weight="700" fill="#555" text-anchor="end">Req C</text>
  <text x="130" y="185" font-size="8" font-weight="700" fill="#555" text-anchor="end">Req D</text>

  <!-- Req A: fills all 12 (long request) -->
  <rect x="155" y="82" width="480" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="395" y="97" font-size="7.5" fill="#333" text-anchor="middle">A (12 iterations)</text>

  <!-- Req B: fills 6, then 6 wasted -->
  <rect x="155" y="112" width="240" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="275" y="127" font-size="7.5" fill="#333" text-anchor="middle">B (6 iter)</text>
  <rect x="395" y="112" width="240" height="22" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" opacity="0.5"/>
  <text x="515" y="127" font-size="7" fill="#c44" text-anchor="middle">Padding / Wasted</text>

  <!-- Req C: fills 4, then 8 wasted -->
  <rect x="155" y="142" width="160" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="235" y="157" font-size="7.5" fill="#333" text-anchor="middle">C (4 iter)</text>
  <rect x="315" y="142" width="320" height="22" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" opacity="0.5"/>
  <text x="475" y="157" font-size="7" fill="#c44" text-anchor="middle">Padding / Wasted</text>

  <!-- Req D: fills 8, then 4 wasted -->
  <rect x="155" y="172" width="320" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="315" y="187" font-size="7.5" fill="#333" text-anchor="middle">D (8 iterations)</text>
  <rect x="475" y="172" width="160" height="22" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" opacity="0.5"/>
  <text x="555" y="187" font-size="7" fill="#c44" text-anchor="middle">Wasted</text>

  <!-- Annotation -->
  <rect x="660" y="82" width="190" height="24" rx="12" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="755" y="98" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">~40% compute wasted</text>
  <text x="660" y="130" font-size="8.5" fill="#c44">Batch locked until longest</text>
  <text x="660" y="143" font-size="8.5" fill="#c44">request (A) finishes</text>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="210" x2="860" y2="210" stroke="#e0e0e0" stroke-dasharray="6,3" stroke-width="0.8"/>

  <!-- ===== Panel 2: Continuous Batching ===== -->
  <text x="40" y="237" font-size="12" font-weight="700" fill="#3d9e5a">Continuous Batching</text>

  <!-- Column headers -->
  <text x="175" y="255" font-size="7" fill="#999" text-anchor="middle">1</text>
  <text x="215" y="255" font-size="7" fill="#999" text-anchor="middle">2</text>
  <text x="255" y="255" font-size="7" fill="#999" text-anchor="middle">3</text>
  <text x="295" y="255" font-size="7" fill="#999" text-anchor="middle">4</text>
  <text x="335" y="255" font-size="7" fill="#999" text-anchor="middle">5</text>
  <text x="375" y="255" font-size="7" fill="#999" text-anchor="middle">6</text>
  <text x="415" y="255" font-size="7" fill="#999" text-anchor="middle">7</text>
  <text x="455" y="255" font-size="7" fill="#999" text-anchor="middle">8</text>
  <text x="495" y="255" font-size="7" fill="#999" text-anchor="middle">9</text>
  <text x="535" y="255" font-size="7" fill="#999" text-anchor="middle">10</text>
  <text x="575" y="255" font-size="7" fill="#999" text-anchor="middle">11</text>
  <text x="615" y="255" font-size="7" fill="#999" text-anchor="middle">12</text>

  <!-- Row labels -->
  <text x="130" y="280" font-size="8" font-weight="700" fill="#555" text-anchor="end">Slot 1</text>
  <text x="130" y="310" font-size="8" font-weight="700" fill="#555" text-anchor="end">Slot 2</text>
  <text x="130" y="340" font-size="8" font-weight="700" fill="#555" text-anchor="end">Slot 3</text>
  <text x="130" y="370" font-size="8" font-weight="700" fill="#555" text-anchor="end">Slot 4</text>

  <!-- Slot 1: A fills all 12 -->
  <rect x="155" y="267" width="480" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="395" y="282" font-size="7.5" fill="#333" text-anchor="middle">A (12 iterations)</text>

  <!-- Slot 2: B fills 6, then E fills 6 -->
  <rect x="155" y="297" width="240" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="275" y="312" font-size="7.5" fill="#333" text-anchor="middle">B (6)</text>
  <rect x="395" y="297" width="240" height="22" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="515" y="312" font-size="7.5" fill="#3d9e5a" text-anchor="middle">E (new, 6)</text>

  <!-- Slot 3: C fills 4, F fills 5, H fills 3 -->
  <rect x="155" y="327" width="160" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="235" y="342" font-size="7.5" fill="#333" text-anchor="middle">C (4)</text>
  <rect x="315" y="327" width="200" height="22" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="415" y="342" font-size="7.5" fill="#3d9e5a" text-anchor="middle">F (new, 5)</text>
  <rect x="515" y="327" width="120" height="22" rx="2" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="0.8"/>
  <text x="575" y="342" font-size="7.5" fill="#2d7a2d" text-anchor="middle">H (new)</text>

  <!-- Slot 4: D fills 8, G fills 4 -->
  <rect x="155" y="357" width="320" height="22" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="315" y="372" font-size="7.5" fill="#333" text-anchor="middle">D (8)</text>
  <rect x="475" y="357" width="160" height="22" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="555" y="372" font-size="7.5" fill="#3d9e5a" text-anchor="middle">G (new, 4)</text>

  <!-- Annotation -->
  <rect x="660" y="267" width="190" height="24" rx="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="755" y="283" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">~95% slot utilization</text>
  <text x="660" y="316" font-size="8.5" fill="#3d9e5a">Slots reused immediately</text>
  <text x="660" y="329" font-size="8.5" fill="#3d9e5a">when requests complete</text>

  <!-- Throughput improvement arrow -->
  <rect x="700" y="350" width="140" height="24" rx="12" fill="#a31f34"/>
  <text x="770" y="366" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">2-4x throughput gain</text>

  <!-- Legend -->
  <rect x="40" y="410" width="12" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="58" y="420" font-size="8.5" fill="#555">Original requests</text>
  <rect x="190" y="410" width="12" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="208" y="420" font-size="8.5" fill="#555">New requests (filling vacated slots)</text>
  <rect x="430" y="410" width="12" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" opacity="0.5"/>
  <text x="448" y="420" font-size="8.5" fill="#555">Wasted compute (padding)</text>

  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Continuous batching inserts and removes requests at each decode iteration, eliminating padding waste.</text>
</svg>
