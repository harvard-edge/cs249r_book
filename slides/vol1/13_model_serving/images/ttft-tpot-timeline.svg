<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">LLM Inference: Two Phases, Two Bottlenecks</text>

  <!-- ===== User experience row ===== -->
  <text x="220" y="55" font-size="9" fill="#555" text-anchor="middle">User waiting...</text>
  <text x="220" y="67" font-size="8" fill="#999" text-anchor="middle">(feels slow if > 2s)</text>
  <text x="580" y="55" font-size="9" fill="#555" text-anchor="middle">Text streaming to user</text>
  <text x="580" y="67" font-size="8" fill="#999" text-anchor="middle">(feels fluid if > 15 tok/s)</text>

  <!-- ===== Prompt input ===== -->
  <rect x="40" y="90" width="80" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="80" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Prompt</text>
  <text x="80" y="138" font-size="8" fill="#555" text-anchor="middle">512 tokens</text>
  <!-- token stack -->
  <rect x="55" y="148" width="50" height="5" rx="1" fill="#c87b2a" opacity="0.3"/>
  <rect x="55" y="155" width="50" height="5" rx="1" fill="#c87b2a" opacity="0.4"/>
  <rect x="55" y="162" width="50" height="5" rx="1" fill="#c87b2a" opacity="0.5"/>
  <rect x="55" y="169" width="50" height="5" rx="1" fill="#c87b2a" opacity="0.6"/>

  <line x1="120" y1="140" x2="145" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Prefill Phase ===== -->
  <rect x="150" y="90" width="200" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="250" y="120" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Prefill</text>
  <text x="250" y="140" font-size="8.5" fill="#555" text-anchor="middle">Process all prompt tokens</text>
  <text x="250" y="155" font-size="8.5" fill="#555" text-anchor="middle">in parallel</text>
  <!-- Badge -->
  <rect x="192" y="165" width="116" height="18" rx="9" fill="#4a90c4"/>
  <text x="250" y="178" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">COMPUTE-BOUND</text>

  <line x1="350" y1="140" x2="385" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Decode Phase ===== -->
  <rect x="390" y="90" width="460" height="100" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="620" y="115" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Decode (Autoregressive)</text>

  <!-- Individual token blocks -->
  <rect x="410" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.7"/>
  <text x="423" y="147" font-size="7" fill="#fff" text-anchor="middle">T1</text>
  <rect x="445" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.6"/>
  <text x="458" y="147" font-size="7" fill="#fff" text-anchor="middle">T2</text>
  <rect x="480" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.6"/>
  <text x="493" y="147" font-size="7" fill="#fff" text-anchor="middle">T3</text>
  <rect x="515" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.5"/>
  <text x="528" y="147" font-size="7" fill="#fff" text-anchor="middle">T4</text>
  <rect x="550" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.5"/>
  <rect x="585" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.4"/>
  <rect x="620" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.4"/>

  <!-- Ellipsis -->
  <text x="670" y="147" font-size="14" fill="#555" text-anchor="middle">...</text>

  <rect x="695" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.3"/>
  <rect x="730" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.3"/>
  <rect x="765" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.3"/>
  <rect x="800" y="125" width="25" height="35" rx="2" fill="#c44" opacity="0.3"/>
  <text x="813" y="147" font-size="7" fill="#fff" text-anchor="middle">TN</text>

  <!-- Badge -->
  <rect x="550" y="165" width="140" height="18" rx="9" fill="#c44"/>
  <text x="620" y="178" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">MEMORY-BW BOUND</text>

  <!-- ===== TTFT Bracket ===== -->
  <line x1="150" y1="215" x2="390" y2="215" stroke="#4a90c4" stroke-width="2"/>
  <line x1="150" y1="210" x2="150" y2="220" stroke="#4a90c4" stroke-width="2"/>
  <line x1="390" y1="210" x2="390" y2="220" stroke="#4a90c4" stroke-width="2"/>
  <text x="270" y="235" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">TTFT (Time to First Token)</text>
  <text x="270" y="250" font-size="8.5" fill="#555" text-anchor="middle">Target: &lt; 500 ms</text>

  <!-- ===== TPOT Bracket ===== -->
  <line x1="445" y1="215" x2="515" y2="215" stroke="#c44" stroke-width="2"/>
  <line x1="445" y1="210" x2="445" y2="220" stroke="#c44" stroke-width="2"/>
  <line x1="515" y1="210" x2="515" y2="220" stroke="#c44" stroke-width="2"/>
  <text x="480" y="235" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">TPOT</text>
  <text x="480" y="250" font-size="8.5" fill="#555" text-anchor="middle">Target: &lt; 50 ms (~20 tok/s)</text>

  <!-- ===== Hardware Bottleneck Cards ===== -->
  <rect x="60" y="280" width="370" height="90" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="245" y="305" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Prefill Bottleneck: Compute (O / R_peak)</text>
  <text x="245" y="325" font-size="9" fill="#555" text-anchor="middle">All prompt tokens processed in parallel</text>
  <text x="245" y="345" font-size="9" fill="#555" text-anchor="middle">Fix: More FLOPS, tensor parallelism, faster GPU</text>
  <text x="245" y="360" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Arithmetic intensity: HIGH (compute-bound regime)</text>

  <rect x="470" y="280" width="370" height="90" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="655" y="305" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Decode Bottleneck: Memory BW (D / BW)</text>
  <text x="655" y="325" font-size="9" fill="#555" text-anchor="middle">Read entire model weights per token generated</text>
  <text x="655" y="345" font-size="9" fill="#555" text-anchor="middle">Fix: Smaller model, quantization, faster memory</text>
  <text x="655" y="360" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Arithmetic intensity: LOW (memory-bound regime)</text>

  <!-- ===== KV Cache growth indicator ===== -->
  <rect x="60" y="390" width="780" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="412" font-size="10" font-weight="700" fill="#333" text-anchor="middle">KV Cache grows with every generated token</text>
  <!-- growing bar -->
  <rect x="100" y="420" width="50" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="150" y="420" width="100" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" opacity="0.8"/>
  <rect x="250" y="420" width="150" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" opacity="0.6"/>
  <rect x="400" y="420" width="200" height="12" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" opacity="0.5"/>
  <rect x="600" y="420" width="150" height="12" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" opacity="0.5"/>
  <text x="770" y="431" font-size="8" font-weight="700" fill="#c44">Can exceed model weights!</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Prefill and decode hit different hardware limits. Optimizing one does not help the other.</text>
</svg>
