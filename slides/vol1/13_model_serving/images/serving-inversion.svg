<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Serving Inversion: Training vs. Serving Priorities</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left Panel: Training ===== -->
  <rect x="30" y="50" width="390" height="370" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" opacity="0.3"/>
  <text x="225" y="75" font-size="13" font-weight="700" fill="#4a90c4" text-anchor="middle">TRAINING</text>

  <!-- Data row -->
  <rect x="55" y="95" width="340" height="85" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="75" y="118" font-size="11" font-weight="700" fill="#333">Data: Volume</text>
  <text x="75" y="137" font-size="9" fill="#555">Shuffle billions of samples per epoch</text>
  <!-- mini data icon -->
  <rect x="300" y="103" width="70" height="10" rx="2" fill="#3d9e5a" opacity="0.4"/>
  <rect x="300" y="116" width="70" height="10" rx="2" fill="#3d9e5a" opacity="0.5"/>
  <rect x="300" y="129" width="70" height="10" rx="2" fill="#3d9e5a" opacity="0.6"/>
  <rect x="300" y="142" width="70" height="10" rx="2" fill="#3d9e5a" opacity="0.7"/>
  <text x="75" y="165" font-size="9" font-weight="700" fill="#3d9e5a">Goal: Throughput (samples/hour)</text>

  <!-- Algorithm row -->
  <rect x="55" y="195" width="340" height="85" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="75" y="218" font-size="11" font-weight="700" fill="#333">Algorithm: Mutable</text>
  <text x="75" y="237" font-size="9" fill="#555">Backward pass updates weights every step</text>
  <text x="75" y="255" font-size="9" fill="#555">Optimizer state: 3x model memory</text>
  <text x="75" y="268" font-size="9" font-weight="700" fill="#4a90c4">Forward + Backward + Update</text>

  <!-- Machine row -->
  <rect x="55" y="295" width="340" height="85" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="75" y="318" font-size="11" font-weight="700" fill="#333">Machine: Saturate (100%)</text>
  <text x="75" y="337" font-size="9" fill="#555">Large batches, long epochs, max GPU util</text>
  <!-- utilization bar -->
  <rect x="300" y="310" width="80" height="14" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="300" y="310" width="76" height="14" rx="2" fill="#4a90c4" opacity="0.7"/>
  <text x="340" y="321" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">95%</text>
  <text x="75" y="368" font-size="9" font-weight="700" fill="#c87b2a">Metric: Samples/sec</text>

  <!-- ===== Right Panel: Serving ===== -->
  <rect x="480" y="50" width="390" height="370" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" opacity="0.3"/>
  <text x="675" y="75" font-size="13" font-weight="700" fill="#c44" text-anchor="middle">SERVING</text>

  <!-- Data row -->
  <rect x="505" y="95" width="340" height="85" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="525" y="118" font-size="11" font-weight="700" fill="#333">Data: Freshness</text>
  <text x="525" y="137" font-size="9" fill="#555">Process one request RIGHT NOW</text>
  <!-- single arrow icon -->
  <line x1="760" y1="130" x2="820" y2="130" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="525" y="165" font-size="9" font-weight="700" fill="#3d9e5a">Goal: Latency (ms/request)</text>

  <!-- Algorithm row -->
  <rect x="505" y="195" width="340" height="85" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="525" y="218" font-size="11" font-weight="700" fill="#333">Algorithm: Frozen</text>
  <text x="525" y="237" font-size="9" fill="#555">Forward pass only, weights never change</text>
  <text x="525" y="255" font-size="9" fill="#555">No optimizer state, no gradients</text>
  <text x="525" y="268" font-size="9" font-weight="700" fill="#4a90c4">Forward Only</text>

  <!-- Machine row -->
  <rect x="505" y="295" width="340" height="85" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="525" y="318" font-size="11" font-weight="700" fill="#333">Machine: Headroom (40-60%)</text>
  <text x="525" y="337" font-size="9" fill="#555">Must absorb traffic spikes gracefully</text>
  <!-- utilization bar -->
  <rect x="750" y="310" width="80" height="14" rx="2" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <rect x="750" y="310" width="40" height="14" rx="2" fill="#c87b2a" opacity="0.7"/>
  <text x="770" y="321" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">50%</text>
  <text x="525" y="368" font-size="9" font-weight="700" fill="#c87b2a">Metric: ms/request (p99)</text>

  <!-- ===== Center divider ===== -->
  <line x1="450" y1="55" x2="450" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Inversion arrows -->
  <line x1="420" y1="135" x2="480" y2="135" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="450" y="155" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">Volume → Freshness</text>

  <line x1="420" y1="235" x2="480" y2="235" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="450" y="255" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">Mutable → Frozen</text>

  <line x1="420" y1="335" x2="480" y2="335" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="450" y="355" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">Saturate → Headroom</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Serving inverts every training assumption. The same GPU that trains perfectly can serve poorly.</text>
</svg>
