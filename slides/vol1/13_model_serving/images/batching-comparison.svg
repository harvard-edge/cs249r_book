<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Why Batching Helps: GPU Utilization and Cost</text>

  <!-- ===== Timeline 1: Batch-1 ===== -->
  <text x="40" y="55" font-size="11" font-weight="700" fill="#c44">Without Batching (batch=1)</text>

  <!-- Time axis -->
  <line x1="140" y1="170" x2="820" y2="170" stroke="#bbb" stroke-width="1"/>
  <text x="140" y="188" font-size="8" fill="#999">0 ms</text>
  <text x="365" y="188" font-size="8" fill="#999">10 ms</text>
  <text x="590" y="188" font-size="8" fill="#999">20 ms</text>
  <text x="820" y="188" font-size="8" fill="#999" text-anchor="end">30 ms</text>

  <!-- Swim lane labels -->
  <text x="130" y="85" font-size="9" font-weight="700" fill="#555" text-anchor="end">CPU</text>
  <text x="130" y="115" font-size="9" font-weight="700" fill="#555" text-anchor="end">GPU</text>
  <text x="130" y="150" font-size="9" font-weight="700" fill="#555" text-anchor="end">GPU Idle</text>

  <!-- Req 1 -->
  <rect x="140" y="72" width="100" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="190" y="86" font-size="7.5" fill="#333" text-anchor="middle">Pre 4.5ms</text>
  <rect x="240" y="102" width="110" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="295" y="116" font-size="7.5" fill="#333" text-anchor="middle">Infer 5.0ms</text>
  <rect x="350" y="72" width="12" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <!-- GPU idle between req 1 and 2 -->
  <rect x="140" y="137" width="100" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="350" y="137" width="25" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Req 2 -->
  <rect x="370" y="72" width="100" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="420" y="86" font-size="7.5" fill="#333" text-anchor="middle">Pre 4.5ms</text>
  <rect x="470" y="102" width="110" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="525" y="116" font-size="7.5" fill="#333" text-anchor="middle">Infer 5.0ms</text>
  <rect x="580" y="72" width="12" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <!-- GPU idle -->
  <rect x="370" y="137" width="100" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="580" y="137" width="25" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Req 3 -->
  <rect x="600" y="72" width="100" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="650" y="86" font-size="7.5" fill="#333" text-anchor="middle">Pre 4.5ms</text>
  <rect x="700" y="102" width="110" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="755" y="116" font-size="7.5" fill="#333" text-anchor="middle">Infer 5.0ms</text>
  <rect x="810" y="72" width="10" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <!-- Annotations -->
  <text x="830" y="88" font-size="9" fill="#c44" font-weight="700">GPU idle &gt;50%</text>
  <rect x="730" y="137" width="90" height="20" rx="10" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="775" y="151" font-size="8" font-weight="700" fill="#555" text-anchor="middle">200 img/s</text>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="200" x2="860" y2="200" stroke="#e0e0e0" stroke-dasharray="6,3" stroke-width="0.8"/>

  <!-- ===== Timeline 2: Batched ===== -->
  <text x="40" y="225" font-size="11" font-weight="700" fill="#3d9e5a">With Batching (batch=8)</text>

  <!-- Time axis -->
  <line x1="140" y1="340" x2="820" y2="340" stroke="#bbb" stroke-width="1"/>
  <text x="140" y="358" font-size="8" fill="#999">0 ms</text>
  <text x="365" y="358" font-size="8" fill="#999">10 ms</text>
  <text x="590" y="358" font-size="8" fill="#999">20 ms</text>

  <!-- Swim lane labels -->
  <text x="130" y="255" font-size="9" font-weight="700" fill="#555" text-anchor="end">CPU</text>
  <text x="130" y="295" font-size="9" font-weight="700" fill="#555" text-anchor="end">GPU</text>

  <!-- Batch preprocess: pipelined -->
  <rect x="140" y="242" width="175" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="228" y="256" font-size="7.5" fill="#333" text-anchor="middle">Preprocess 8 requests (pipelined)</text>

  <!-- Batch inference: one large block -->
  <rect x="200" y="282" width="200" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="300" y="296" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Batch Inference: 8 images (9.1 ms)</text>

  <!-- Batch postprocess -->
  <rect x="400" y="242" width="50" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="425" y="256" font-size="7.5" fill="#333" text-anchor="middle">Post</text>

  <!-- Next batch overlapping -->
  <rect x="420" y="242" width="175" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" opacity="0.6"/>
  <text x="508" y="256" font-size="7.5" fill="#555" text-anchor="middle">Next batch preprocess</text>
  <rect x="480" y="282" width="200" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" opacity="0.6"/>
  <text x="580" y="296" font-size="8" fill="#555" text-anchor="middle">Next batch (9.1 ms)</text>

  <!-- Annotations -->
  <text x="830" y="256" font-size="9" fill="#3d9e5a" font-weight="700">GPU util ~65%</text>
  <rect x="730" y="305" width="110" height="22" rx="11" fill="#a31f34"/>
  <text x="785" y="320" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">879 img/s (4.4x)</text>

  <!-- ===== Cost Comparison ===== -->
  <rect x="40" y="375" width="400" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="396" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Batch-1: $5.56 / million queries</text>
  <text x="240" y="412" font-size="8.5" fill="#555" text-anchor="middle">Low GPU utilization → high cost per query</text>

  <rect x="460" y="375" width="400" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="396" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Batch-8: $1.26 / million queries (4.4x cheaper)</text>
  <text x="660" y="412" font-size="8.5" fill="#555" text-anchor="middle">Amortized kernel launch + weight loading</text>

  <!-- Legend -->
  <rect x="40" y="440" width="12" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="58" y="450" font-size="8.5" fill="#555">Preprocess</text>
  <rect x="140" y="440" width="12" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="158" y="450" font-size="8.5" fill="#555">GPU Inference</text>
  <rect x="250" y="440" width="12" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="268" y="450" font-size="8.5" fill="#555">Postprocess</text>
  <rect x="350" y="440" width="12" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="368" y="450" font-size="8.5" fill="#555">GPU Idle</text>

  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Batching amortizes fixed costs (kernel launch, weight loading) across multiple requests.</text>
</svg>
