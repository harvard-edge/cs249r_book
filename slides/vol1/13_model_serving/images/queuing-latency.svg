<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Utilization-Latency Curve (M/M/1 Queuing Model)</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="800" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="400" x2="100" y2="60" stroke="#333" stroke-width="1.5"/>

  <!-- X-axis label -->
  <text x="450" y="440" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Server Utilization (%)</text>
  <!-- Y-axis label -->
  <text x="45" y="230" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90 45 230)">Latency Multiple</text>

  <!-- X ticks -->
  <text x="100" y="418" font-size="8" fill="#555" text-anchor="middle">0%</text>
  <text x="240" y="418" font-size="8" fill="#555" text-anchor="middle">20%</text>
  <text x="380" y="418" font-size="8" fill="#555" text-anchor="middle">40%</text>
  <text x="520" y="418" font-size="8" fill="#555" text-anchor="middle">60%</text>
  <text x="590" y="418" font-size="8" fill="#555" text-anchor="middle">70%</text>
  <text x="660" y="418" font-size="8" fill="#555" text-anchor="middle">80%</text>
  <text x="730" y="418" font-size="8" fill="#555" text-anchor="middle">90%</text>
  <text x="765" y="418" font-size="8" fill="#555" text-anchor="middle">95%</text>

  <!-- Y ticks -->
  <text x="90" y="403" font-size="8" fill="#555" text-anchor="end">1x</text>
  <text x="90" y="383" font-size="8" fill="#555" text-anchor="end">2x</text>
  <text x="90" y="353" font-size="8" fill="#555" text-anchor="end">3x</text>
  <text x="90" y="303" font-size="8" fill="#555" text-anchor="end">5x</text>
  <text x="90" y="203" font-size="8" fill="#555" text-anchor="end">10x</text>
  <text x="90" y="103" font-size="8" fill="#555" text-anchor="end">20x</text>

  <!-- Gridlines -->
  <line x1="100" y1="383" x2="800" y2="383" stroke="#eee" stroke-width="0.5"/>
  <line x1="100" y1="303" x2="800" y2="303" stroke="#eee" stroke-width="0.5"/>
  <line x1="100" y1="203" x2="800" y2="203" stroke="#eee" stroke-width="0.5"/>

  <!-- ===== Zones ===== -->
  <!-- Safe zone: 0-60% -->
  <rect x="100" y="60" width="420" height="340" fill="#d4edda" opacity="0.12"/>
  <text x="310" y="370" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Safe Zone</text>

  <!-- Caution: 60-80% -->
  <rect x="520" y="60" width="140" height="340" fill="#fdebd0" opacity="0.15"/>
  <text x="590" y="370" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Caution</text>

  <!-- Danger: 80-100% -->
  <rect x="660" y="60" width="140" height="340" fill="#f9d6d5" opacity="0.15"/>
  <text x="730" y="80" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Danger Zone</text>

  <!-- ===== Mean Latency Curve: W = 1/(1-rho) ===== -->
  <!-- Points: 0%=1x, 20%=1.25x, 40%=1.67x, 50%=2x, 60%=2.5x, 70%=3.3x, 80%=5x, 90%=10x, 95%=20x -->
  <!-- Map: x=100+rho*700, y=400-(val-1)*17 approx -->
  <path d="M100,397 L240,395 L380,387 L450,383 L520,375 L590,357 L660,323 L730,223 L765,83"
        fill="none" stroke="#4a90c4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- p99 curve (4.6x mean) -->
  <path d="M100,394 L240,388 L380,370 L450,357 L520,330 L590,280 L660,145 L710,70"
        fill="none" stroke="#c44" stroke-width="1.8" stroke-dasharray="4,2" stroke-linecap="round"/>

  <!-- ===== Numeric annotations ===== -->
  <circle cx="450" cy="383" r="4" fill="#4a90c4"/>
  <text x="460" y="377" font-size="8" fill="#4a90c4" font-weight="700">50%: 2x</text>

  <circle cx="590" cy="357" r="4" fill="#4a90c4"/>
  <text x="560" y="345" font-size="8" fill="#4a90c4" font-weight="700">70%: 3.3x</text>

  <circle cx="660" cy="323" r="4" fill="#4a90c4"/>
  <text x="670" y="315" font-size="8" fill="#4a90c4" font-weight="700">80%: 5x</text>

  <circle cx="730" cy="223" r="4" fill="#4a90c4"/>
  <text x="740" y="215" font-size="8" fill="#4a90c4" font-weight="700">90%: 10x</text>

  <circle cx="765" cy="83" r="4" fill="#4a90c4"/>
  <text x="775" y="93" font-size="8" fill="#4a90c4" font-weight="700">95%: 20x</text>

  <!-- The Knee annotation -->
  <circle cx="590" cy="357" r="7" fill="none" stroke="#a31f34" stroke-width="2"/>
  <line x1="540" y1="310" x2="583" y2="350" stroke="#a31f34" stroke-width="1.5"/>
  <text x="500" y="300" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">The Knee (~70%)</text>

  <!-- Production target line -->
  <line x1="450" y1="60" x2="450" y2="400" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="370" y="75" font-size="9" font-weight="700" fill="#3d9e5a">Target: 40-60%</text>

  <!-- Legend -->
  <line x1="100" y1="460" x2="130" y2="460" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="138" y="464" font-size="9" fill="#555">Mean Latency</text>
  <line x1="250" y1="460" x2="280" y2="460" stroke="#c44" stroke-width="1.8" stroke-dasharray="4,2"/>
  <text x="288" y="464" font-size="9" fill="#555">p99 Latency (~4.6x mean)</text>

  <!-- Cost insight card -->
  <rect x="610" y="445" width="250" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="735" y="464" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">70%→90%: saves ~22% cost, triples latency</text>

  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Running "hot" for cost savings trades linear cost reduction for exponential latency increase.</text>
</svg>
