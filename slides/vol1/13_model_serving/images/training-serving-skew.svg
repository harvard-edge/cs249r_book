<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Training-Serving Skew: Silent Accuracy Degradation</text>

  <!-- ===== Left: Training Pipeline ===== -->
  <rect x="30" y="50" width="380" height="210" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" opacity="0.2"/>
  <text x="220" y="75" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">Training Pipeline</text>

  <!-- Steps -->
  <rect x="50" y="90" width="140" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="120" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Load Image</text>
  <text x="120" y="126" font-size="8" fill="#555" text-anchor="middle">PIL.Image.open()</text>

  <line x1="190" y1="113" x2="215" y2="113" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="220" y="90" width="170" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="305" y="108" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Resize to 224x224</text>
  <text x="305" y="126" font-size="8" fill="#c87b2a" font-weight="700" text-anchor="middle">PIL BILINEAR</text>

  <rect x="50" y="150" width="140" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="120" y="168" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Normalize</text>
  <text x="120" y="183" font-size="8" fill="#c87b2a" font-weight="700" text-anchor="middle">float64 precision</text>

  <line x1="190" y1="173" x2="215" y2="173" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="220" y="150" width="170" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="305" y="168" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Train Model</text>
  <text x="305" y="183" font-size="8" fill="#555" text-anchor="middle">SGD / Adam</text>

  <!-- Accuracy badge -->
  <rect x="120" y="210" width="180" height="30" rx="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="210" y="230" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Validation: 95.0% accuracy</text>

  <!-- ===== Right: Serving Pipeline ===== -->
  <rect x="490" y="50" width="380" height="210" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" opacity="0.2"/>
  <text x="680" y="75" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Serving Pipeline</text>

  <!-- Steps -->
  <rect x="510" y="90" width="140" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Load Image</text>
  <text x="580" y="126" font-size="8" fill="#555" text-anchor="middle">cv2.imread()</text>

  <line x1="650" y1="113" x2="675" y2="113" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="680" y="90" width="170" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="765" y="108" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Resize to 224x224</text>
  <text x="765" y="126" font-size="8" fill="#c44" font-weight="700" text-anchor="middle">OpenCV BICUBIC</text>

  <rect x="510" y="150" width="140" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="580" y="168" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Normalize</text>
  <text x="580" y="183" font-size="8" fill="#c44" font-weight="700" text-anchor="middle">float32 precision</text>

  <line x1="650" y1="173" x2="675" y2="173" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="680" y="150" width="170" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="765" y="168" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Same Model</text>
  <text x="765" y="183" font-size="8" fill="#555" text-anchor="middle">Identical weights</text>

  <!-- Accuracy badge -->
  <rect x="580" y="210" width="180" height="30" rx="15" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="670" y="230" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Production: 90.0% accuracy</text>

  <!-- ===== Center: Mismatch Indicators ===== -->
  <line x1="430" y1="108" x2="480" y2="108" stroke="#a31f34" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="455" y="100" font-size="16" fill="#a31f34" text-anchor="middle" font-weight="700">≠</text>

  <line x1="430" y1="168" x2="480" y2="168" stroke="#a31f34" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="455" y="160" font-size="16" fill="#a31f34" text-anchor="middle" font-weight="700">≠</text>

  <!-- ===== Bottom: Impact Analysis ===== -->
  <rect x="60" y="280" width="780" height="80" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="303" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Sources of Training-Serving Skew</text>

  <text x="160" y="325" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Resize interpolation</text>
  <text x="160" y="340" font-size="8" fill="#555" text-anchor="middle">PIL bilinear vs OpenCV</text>
  <text x="160" y="353" font-size="8" fill="#555" text-anchor="middle">bicubic: 0.5-1.0% drop</text>

  <text x="370" y="325" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Numeric precision</text>
  <text x="370" y="340" font-size="8" fill="#555" text-anchor="middle">float64 vs float32</text>
  <text x="370" y="353" font-size="8" fill="#555" text-anchor="middle">normalization: subtle drift</text>

  <text x="580" y="325" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Feature timing</text>
  <text x="580" y="340" font-size="8" fill="#555" text-anchor="middle">Point-in-time feature</text>
  <text x="580" y="353" font-size="8" fill="#555" text-anchor="middle">computation diffs</text>

  <text x="740" y="325" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Color space</text>
  <text x="740" y="340" font-size="8" fill="#555" text-anchor="middle">RGB vs BGR channel</text>
  <text x="740" y="353" font-size="8" fill="#555" text-anchor="middle">ordering mismatch</text>

  <!-- Key insight -->
  <rect x="200" y="385" width="500" height="40" rx="5" fill="#a31f34"/>
  <text x="450" y="405" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">5 percentage points lost — invisible to latency monitoring</text>
  <text x="450" y="418" font-size="8" fill="#fff" text-anchor="middle" opacity="0.8">Standard exception/latency checks pass. Statistical monitoring required.</text>

  <!-- Fix -->
  <rect x="60" y="440" width="780" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="450" y="462" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fix: Use identical preprocessing code paths for training and serving. Monitor input distributions.</text>

  <text x="450" y="493" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Same model weights + different preprocessing = different predictions. The model did not break; the pipeline did.</text>
</svg>
