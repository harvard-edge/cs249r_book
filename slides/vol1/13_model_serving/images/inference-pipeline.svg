<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Inference Server Anatomy: From Request to Response</text>

  <!-- ===== Top Row: Request Flow ===== -->
  <text x="40" y="65" font-size="10" font-weight="700" fill="#555">REQUEST FLOW</text>

  <!-- Client -->
  <rect x="40" y="80" width="100" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="90" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Client</text>
  <text x="90" y="120" font-size="8" fill="#555" text-anchor="middle">HTTP/gRPC</text>

  <!-- Arrow -->
  <line x1="140" y1="108" x2="170" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Load Balancer -->
  <rect x="175" y="80" width="110" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="230" y="102" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Load Balancer</text>
  <text x="230" y="120" font-size="8" fill="#555" text-anchor="middle">Round-robin / Least-conn</text>

  <line x1="285" y1="108" x2="315" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Request Queue -->
  <rect x="320" y="80" width="110" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="375" y="102" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Request Queue</text>
  <text x="375" y="120" font-size="8" fill="#555" text-anchor="middle">Absorbs bursts (FIFO)</text>

  <line x1="430" y1="108" x2="460" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dynamic Batcher -->
  <rect x="465" y="80" width="120" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="525" y="102" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Dynamic Batcher</text>
  <text x="525" y="120" font-size="8" fill="#555" text-anchor="middle">Groups by window</text>

  <line x1="585" y1="108" x2="615" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Inference Runner -->
  <rect x="620" y="80" width="110" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="675" y="102" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Inference Runner</text>
  <text x="675" y="120" font-size="8" fill="#555" text-anchor="middle">Model execution</text>

  <line x1="730" y1="108" x2="760" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GPU -->
  <rect x="765" y="82" width="90" height="50" rx="12" fill="#a31f34"/>
  <text x="810" y="112" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">GPU</text>

  <!-- ===== Bottom Row: Data Transformation ===== -->
  <text x="40" y="195" font-size="10" font-weight="700" fill="#555">DATA TRANSFORMATION</text>

  <!-- Stage boxes -->
  <rect x="40" y="210" width="95" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="88" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Raw Input</text>
  <text x="88" y="248" font-size="8" fill="#555" text-anchor="middle">JSON / bytes</text>
  <text x="88" y="263" font-size="8" fill="#999" text-anchor="middle">0.1 ms</text>

  <line x1="135" y1="243" x2="155" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="160" y="210" width="95" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="208" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Deserialize</text>
  <text x="208" y="248" font-size="8" fill="#555" text-anchor="middle">Decode payload</text>
  <text x="208" y="263" font-size="8" fill="#999" text-anchor="middle">0.2 ms</text>

  <line x1="255" y1="243" x2="275" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Preprocess (highlighted) -->
  <rect x="280" y="210" width="115" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="338" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Preprocess</text>
  <text x="338" y="248" font-size="8" fill="#555" text-anchor="middle">Resize, normalize</text>
  <rect x="316" y="255" width="44" height="14" rx="7" fill="#c44" opacity="0.9"/>
  <text x="338" y="265" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">4.5 ms</text>

  <line x1="395" y1="243" x2="415" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="420" y="210" width="95" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="468" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">CPU→GPU</text>
  <text x="468" y="248" font-size="8" fill="#555" text-anchor="middle">Transfer tensor</text>
  <text x="468" y="263" font-size="8" fill="#999" text-anchor="middle">0.2 ms</text>

  <line x1="515" y1="243" x2="535" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Inference (highlighted) -->
  <rect x="540" y="210" width="115" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="598" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Inference</text>
  <text x="598" y="248" font-size="8" fill="#555" text-anchor="middle">Neural network</text>
  <rect x="576" y="255" width="44" height="14" rx="7" fill="#a31f34"/>
  <text x="598" y="265" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">5.0 ms</text>

  <line x1="655" y1="243" x2="675" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="680" y="210" width="95" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="728" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Postprocess</text>
  <text x="728" y="248" font-size="8" fill="#555" text-anchor="middle">Softmax, format</text>
  <text x="728" y="263" font-size="8" fill="#999" text-anchor="middle">0.1 ms</text>

  <line x1="775" y1="243" x2="795" y2="243" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="800" y="210" width="75" height="65" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="838" y="233" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Response</text>
  <text x="838" y="248" font-size="8" fill="#555" text-anchor="middle">JSON</text>

  <!-- Bottleneck bracket -->
  <line x1="280" y1="290" x2="655" y2="290" stroke="#c44" stroke-width="1.5"/>
  <line x1="280" y1="285" x2="280" y2="295" stroke="#c44" stroke-width="1.5"/>
  <line x1="655" y1="285" x2="655" y2="295" stroke="#c44" stroke-width="1.5"/>
  <text x="468" y="308" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Preprocess + Inference = 94% of latency</text>

  <!-- Total latency pill -->
  <rect x="365" y="325" width="170" height="24" rx="12" fill="#a31f34"/>
  <text x="450" y="341" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Total: 10.1 ms end-to-end</text>

  <!-- ===== Latency Breakdown Bar ===== -->
  <text x="40" y="385" font-size="10" font-weight="700" fill="#555">LATENCY BREAKDOWN</text>

  <!-- Stacked bar -->
  <rect x="40" y="400" width="36" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="76" y="400" width="400" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <rect x="476" y="400" width="18" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <rect x="494" y="400" width="350" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <rect x="844" y="400" width="10" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <text x="258" y="417" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Preprocess: 4.5 ms (45%)</text>
  <text x="669" y="417" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Inference: 5.0 ms (50%)</text>

  <!-- Legend -->
  <rect x="40" y="445" width="12" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="58" y="455" font-size="8.5" fill="#555">Preprocess (CPU)</text>
  <rect x="170" y="445" width="12" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="188" y="455" font-size="8.5" fill="#555">Inference (GPU)</text>
  <rect x="290" y="445" width="12" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="308" y="455" font-size="8.5" fill="#555">Postprocess (CPU)</text>
  <rect x="420" y="445" width="12" height="12" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="438" y="455" font-size="8.5" fill="#555">Overhead (serialize/transfer)</text>

  <!-- Bottom footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">The neural network is only one stage. Any stage can be the bottleneck.</text>
</svg>
