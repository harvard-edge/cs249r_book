<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Deployment Spectrum: Cloud to TinyML</text>

  <!-- ===== Arrow markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Gradient bar (visual spectrum) ===== -->
  <rect x="60" y="55" width="780" height="12" rx="6" fill="url(#specGrad)"/>
  <defs>
    <linearGradient id="specGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90c4"/>
      <stop offset="35%" stop-color="#3d9e5a"/>
      <stop offset="65%" stop-color="#c87b2a"/>
      <stop offset="100%" stop-color="#c44"/>
    </linearGradient>
  </defs>

  <!-- ===== Tier labels on gradient ===== -->
  <text x="130" y="50" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">CLOUD</text>
  <text x="350" y="50" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">EDGE</text>
  <text x="570" y="50" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">MOBILE</text>
  <text x="770" y="50" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">TINYML</text>

  <!-- ===== Cloud tier ===== -->
  <rect x="40" y="85" width="200" height="160" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="106" font-size="11" font-weight="700" fill="#333" text-anchor="middle">NVIDIA H100</text>
  <rect x="55" y="115" width="170" height="22" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="140" y="131" font-size="9" font-weight="400" fill="#333" text-anchor="middle">80 GB HBM3</text>
  <rect x="55" y="143" width="170" height="22" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="140" y="159" font-size="9" font-weight="400" fill="#333" text-anchor="middle">989 TFLOPS (FP16)</text>
  <rect x="55" y="171" width="170" height="22" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="140" y="187" font-size="9" font-weight="400" fill="#333" text-anchor="middle">700 W</text>
  <rect x="85" y="202" width="110" height="20" rx="12" fill="#a31f34"/>
  <text x="140" y="216" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">GPT-2 / DLRM</text>

  <!-- ===== Edge tier ===== -->
  <rect x="260" y="85" width="200" height="160" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="106" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Jetson Orin NX</text>
  <rect x="275" y="115" width="170" height="22" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="131" font-size="9" font-weight="400" fill="#333" text-anchor="middle">32 GB LPDDR5</text>
  <rect x="275" y="143" width="170" height="22" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="159" font-size="9" font-weight="400" fill="#333" text-anchor="middle">100 TOPS (INT8)</text>
  <rect x="275" y="171" width="170" height="22" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="187" font-size="9" font-weight="400" fill="#333" text-anchor="middle">15--40 W</text>
  <rect x="305" y="202" width="110" height="20" rx="12" fill="#a31f34"/>
  <text x="360" y="216" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">ResNet-50</text>

  <!-- ===== Mobile tier ===== -->
  <rect x="480" y="85" width="200" height="160" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="580" y="106" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Flagship SoC</text>
  <rect x="495" y="115" width="170" height="22" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="580" y="131" font-size="9" font-weight="400" fill="#333" text-anchor="middle">8 GB LPDDR5</text>
  <rect x="495" y="143" width="170" height="22" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="580" y="159" font-size="9" font-weight="400" fill="#333" text-anchor="middle">17 TOPS (INT8)</text>
  <rect x="495" y="171" width="170" height="22" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="580" y="187" font-size="9" font-weight="400" fill="#333" text-anchor="middle">3--5 W</text>
  <rect x="525" y="202" width="110" height="20" rx="12" fill="#a31f34"/>
  <text x="580" y="216" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">MobileNetV2</text>

  <!-- ===== TinyML tier ===== -->
  <rect x="700" y="85" width="175" height="160" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="787" y="106" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Arduino Nicla</text>
  <rect x="715" y="115" width="145" height="22" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="787" y="131" font-size="9" font-weight="400" fill="#333" text-anchor="middle">384 KB SRAM</text>
  <rect x="715" y="143" width="145" height="22" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="787" y="159" font-size="9" font-weight="400" fill="#333" text-anchor="middle">~0.5 GFLOPS</text>
  <rect x="715" y="171" width="145" height="22" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="787" y="187" font-size="9" font-weight="400" fill="#333" text-anchor="middle">~100 mW</text>
  <rect x="732" y="202" width="110" height="20" rx="12" fill="#a31f34"/>
  <text x="787" y="216" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">KWS</text>

  <!-- ===== Gap callout ===== -->
  <line x1="140" y1="260" x2="787" y2="260" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <line x1="787" y1="260" x2="140" y2="260" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <rect x="370" y="270" width="160" height="24" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="287" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">10^5x memory, 10^6x compute</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="320" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">You cannot "shrink" a cloud model to the edge --- each tier requires fundamentally different engineering.</text>
</svg>
