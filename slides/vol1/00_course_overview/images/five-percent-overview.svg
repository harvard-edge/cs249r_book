<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The 5% Problem: Why ML Systems Engineering Matters</text>

  <!-- ===== Left side: Big block diagram ===== -->
  <!-- Outer production system box -->
  <rect x="40" y="55" width="400" height="280" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="240" y="76" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Production ML System (~100% of code)</text>

  <!-- Inner blocks: the 95% -->
  <rect x="60" y="90" width="170" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="145" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Data Pipelines</text>

  <rect x="250" y="90" width="170" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="335" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Feature Engineering</text>

  <rect x="60" y="140" width="170" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="145" y="165" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Serving Infrastructure</text>

  <rect x="250" y="140" width="170" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="335" y="165" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Monitoring &amp; Alerting</text>

  <rect x="60" y="190" width="170" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="145" y="215" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Configuration Mgmt</text>

  <rect x="250" y="190" width="170" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="335" y="215" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Resource Management</text>

  <!-- The tiny ML code box -->
  <rect x="155" y="245" width="170" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="240" y="267" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">ML Model Code (~5%)</text>
  <text x="240" y="280" font-size="7.5" font-weight="400" fill="#555" text-anchor="middle">model.fit() / model.predict()</text>

  <!-- 95% label -->
  <text x="240" y="310" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">The other 95% is systems engineering</text>

  <!-- ===== Right side: Statistics ===== -->
  <rect x="480" y="55" width="390" height="280" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="675" y="80" font-size="12" font-weight="700" fill="#333" text-anchor="middle">The Reality</text>

  <!-- Stat 1 -->
  <rect x="500" y="95" width="350" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="510" y="118" font-size="28" font-weight="700" fill="#a31f34">60--85%</text>
  <text x="690" y="113" font-size="9.5" font-weight="400" fill="#333">of ML projects fail</text>
  <text x="690" y="128" font-size="9.5" font-weight="400" fill="#333">to reach production</text>

  <!-- Stat 2 -->
  <rect x="500" y="155" width="350" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="510" y="178" font-size="28" font-weight="700" fill="#c87b2a">90%</text>
  <text x="640" y="173" font-size="9.5" font-weight="400" fill="#333">of ML engineering time</text>
  <text x="640" y="188" font-size="9.5" font-weight="400" fill="#333">is spent on data + infrastructure</text>

  <!-- Stat 3 -->
  <rect x="500" y="215" width="350" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="510" y="240" font-size="18" font-weight="700" fill="#4a90c4">Systems</text>
  <text x="650" y="235" font-size="9.5" font-weight="400" fill="#333">not algorithms, are the</text>
  <text x="650" y="250" font-size="9.5" font-weight="700" fill="#333">bottleneck to deployment</text>

  <!-- Quote -->
  <rect x="500" y="275" width="350" height="28" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="675" y="294" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">"ML is easy. ML Systems are hard."</text>

  <!-- ===== Bottom: This course ===== -->
  <rect x="150" y="355" width="600" height="35" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="377" font-size="11" font-weight="700" fill="#333" text-anchor="middle">This course teaches the 95% --- the systems engineering that makes ML work in production.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="415" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Sculley et al., "Hidden Technical Debt in Machine Learning Systems," NeurIPS 2015</text>
</svg>
