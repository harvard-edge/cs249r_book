<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Three Analytical Frameworks for ML Systems</text>

  <!-- ===== Arrow markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Framework 1: DAM Taxonomy (left) ===== -->
  <rect x="25" y="50" width="270" height="260" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="160" y="72" font-size="12" font-weight="700" fill="#333" text-anchor="middle">D-A-M Taxonomy</text>
  <text x="160" y="88" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">"What are the axes?"</text>

  <!-- DAM triangle -->
  <polygon points="160,110 80,240 240,240" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- D vertex -->
  <circle cx="160" cy="110" r="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="160" y="114" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Data</text>

  <!-- A vertex -->
  <circle cx="80" cy="240" r="28" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="80" y="237" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Algo-</text>
  <text x="80" y="249" font-size="10" font-weight="700" fill="#333" text-anchor="middle">rithm</text>

  <!-- M vertex -->
  <circle cx="240" cy="240" r="28" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="237" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Ma-</text>
  <text x="240" y="249" font-size="10" font-weight="700" fill="#333" text-anchor="middle">chine</text>

  <!-- Center label -->
  <text x="160" y="192" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Interdependent</text>
  <text x="160" y="203" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">axes</text>

  <!-- Diagnostic question -->
  <rect x="60" y="278" width="200" height="22" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="160" y="293" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">"Which axis is the bottleneck?"</text>

  <!-- ===== Framework 2: Iron Law (center) ===== -->
  <rect x="315" y="50" width="270" height="260" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="72" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Iron Law of ML Systems</text>
  <text x="450" y="88" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">"How long does it take?"</text>

  <!-- Equation -->
  <text x="450" y="125" font-size="13" font-weight="700" fill="#333" text-anchor="middle">T = D/BW + O/(R-eta) + L</text>

  <!-- Three term boxes -->
  <rect x="330" y="145" width="75" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="367" y="165" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Data</text>
  <text x="367" y="180" font-size="8" font-weight="400" fill="#555" text-anchor="middle">D / BW</text>
  <text x="367" y="192" font-size="7.5" font-weight="400" fill="#555" text-anchor="middle">= seconds</text>

  <rect x="413" y="145" width="75" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="450" y="165" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Compute</text>
  <text x="450" y="180" font-size="8" font-weight="400" fill="#555" text-anchor="middle">O / (R-eta)</text>
  <text x="450" y="192" font-size="7.5" font-weight="400" fill="#555" text-anchor="middle">= seconds</text>

  <rect x="496" y="145" width="75" height="55" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="533" y="165" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Overhead</text>
  <text x="533" y="180" font-size="8" font-weight="400" fill="#555" text-anchor="middle">L_lat</text>
  <text x="533" y="192" font-size="7.5" font-weight="400" fill="#555" text-anchor="middle">= seconds</text>

  <!-- Plus signs -->
  <text x="407" y="175" font-size="14" font-weight="700" fill="#555" text-anchor="middle">+</text>
  <text x="490" y="175" font-size="14" font-weight="700" fill="#555" text-anchor="middle">+</text>

  <!-- Key insight -->
  <text x="450" y="225" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Every term resolves to seconds.</text>
  <text x="450" y="240" font-size="9" font-weight="700" fill="#333" text-anchor="middle">The slowest term dominates.</text>

  <!-- Diagnostic question -->
  <rect x="350" y="260" width="200" height="22" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="450" y="275" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">"Which term is the bottleneck?"</text>

  <!-- ===== Framework 3: Degradation Equation (right) ===== -->
  <rect x="605" y="50" width="270" height="260" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="740" y="72" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Degradation Equation</text>
  <text x="740" y="88" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">"When does it break?"</text>

  <!-- Equation -->
  <text x="740" y="122" font-size="12" font-weight="700" fill="#333" text-anchor="middle">A(t) = A0 - alpha * Delta(P)</text>

  <!-- Decay curve (simplified) -->
  <rect x="640" y="140" width="200" height="110" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <!-- Axes -->
  <line x1="660" y1="235" x2="825" y2="235" stroke="#555" stroke-width="1"/>
  <line x1="660" y1="235" x2="660" y2="150" stroke="#555" stroke-width="1"/>
  <text x="742" y="248" font-size="7.5" font-weight="400" fill="#555" text-anchor="middle">Time</text>
  <text x="648" y="192" font-size="7.5" font-weight="400" fill="#555" text-anchor="middle" transform="rotate(-90,648,192)">Accuracy</text>
  <!-- Decay curve -->
  <path d="M670,160 Q720,162 750,175 Q780,190 800,215 Q810,225 820,232" fill="none" stroke="#c44" stroke-width="2"/>
  <!-- Threshold line -->
  <line x1="660" y1="210" x2="825" y2="210" stroke="#c87b2a" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="830" y="213" font-size="7" font-weight="400" fill="#c87b2a" text-anchor="start">SLA</text>
  <!-- Retrain marker -->
  <line x1="790" y1="210" x2="790" y2="235" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="790" y="242" font-size="6.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">retrain</text>

  <!-- Diagnostic question -->
  <rect x="640" y="260" width="200" height="22" rx="4" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="740" y="275" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">"When must we retrain?"</text>

  <!-- ===== Bottom: How they connect ===== -->
  <rect x="100" y="335" width="700" height="40" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="353" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Together: Classify the system (D-A-M) -- Quantify the bottleneck (Iron Law) -- Predict when it fails (Degradation)</text>
  <text x="450" y="367" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">These three frameworks recur in every chapter of the course.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="400" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Constraints drive architecture --- these tools make constraints quantitative.</text>
</svg>
