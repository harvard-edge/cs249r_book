<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Course Roadmap: Four Parts, Sixteen Chapters</text>

  <!-- ===== Arrow markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Part I: Foundations (blue) ===== -->
  <rect x="30" y="55" width="200" height="200" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="130" y="76" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Part I: Foundations</text>
  <text x="130" y="92" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Chapters 1--4</text>
  <line x1="50" y1="100" x2="210" y2="100" stroke="#4a90c4" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Chapter boxes -->
  <rect x="45" y="110" width="170" height="28" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="128" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 1: Introduction</text>
  <rect x="45" y="144" width="170" height="28" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="162" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 2: ML Systems</text>
  <rect x="45" y="178" width="170" height="28" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="196" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 3: ML Workflow</text>
  <rect x="45" y="212" width="170" height="28" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="230" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 4: Data Engineering</text>

  <!-- Arrow Part I -> Part II -->
  <line x1="235" y1="155" x2="255" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Part II: Build (green) ===== -->
  <rect x="260" y="55" width="200" height="200" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="360" y="76" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Part II: Build</text>
  <text x="360" y="92" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Chapters 5--8</text>
  <line x1="280" y1="100" x2="440" y2="100" stroke="#3d9e5a" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="275" y="110" width="170" height="28" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="128" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 5: Neural Computation</text>
  <rect x="275" y="144" width="170" height="28" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="162" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 6: Architectures</text>
  <rect x="275" y="178" width="170" height="28" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="196" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 7: Frameworks</text>
  <rect x="275" y="212" width="170" height="28" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="360" y="230" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 8: Training</text>

  <!-- Arrow Part II -> Part III -->
  <line x1="465" y1="155" x2="485" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Part III: Optimize (orange) ===== -->
  <rect x="490" y="55" width="200" height="200" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="590" y="76" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Part III: Optimize</text>
  <text x="590" y="92" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Chapters 9--12</text>
  <line x1="510" y1="100" x2="670" y2="100" stroke="#c87b2a" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="505" y="110" width="170" height="28" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="590" y="128" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 9: Data Selection</text>
  <rect x="505" y="144" width="170" height="28" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="590" y="162" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 10: Compression</text>
  <rect x="505" y="178" width="170" height="28" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="590" y="196" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 11: HW Acceleration</text>
  <rect x="505" y="212" width="170" height="28" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="590" y="230" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 12: Benchmarking</text>

  <!-- Arrow Part III -> Part IV -->
  <line x1="695" y1="155" x2="715" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Part IV: Deploy (red) ===== -->
  <rect x="720" y="55" width="155" height="200" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="797" y="76" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Part IV: Deploy</text>
  <text x="797" y="92" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Chapters 13--16</text>
  <line x1="735" y1="100" x2="860" y2="100" stroke="#c44" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="730" y="110" width="140" height="28" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="800" y="128" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 13: Serving</text>
  <rect x="730" y="144" width="140" height="28" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="800" y="162" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 14: MLOps</text>
  <rect x="730" y="178" width="140" height="28" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="800" y="196" font-size="8.5" font-weight="400" fill="#333" text-anchor="middle">Ch 15: Responsible Eng.</text>
  <rect x="730" y="212" width="140" height="28" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="800" y="230" font-size="9" font-weight="400" fill="#333" text-anchor="middle">Ch 16: Conclusion</text>

  <!-- ===== Themes running across bottom ===== -->
  <rect x="30" y="290" width="845" height="45" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="308" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Recurring Themes Across All Chapters</text>
  <text x="140" y="326" font-size="9" font-weight="400" fill="#555" text-anchor="middle">D-A-M Taxonomy</text>
  <text x="310" y="326" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Iron Law of ML Systems</text>
  <text x="490" y="326" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Lighthouse Models</text>
  <text x="660" y="326" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Deployment Spectrum</text>
  <text x="810" y="326" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Degradation Eq.</text>

  <!-- ===== Progression labels ===== -->
  <text x="130" y="275" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">UNDERSTAND</text>
  <text x="360" y="275" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">CONSTRUCT</text>
  <text x="590" y="275" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">IMPROVE</text>
  <text x="797" y="275" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">SHIP</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="365" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Each part builds on the previous --- skip nothing.</text>
</svg>
