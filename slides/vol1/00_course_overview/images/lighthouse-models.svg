<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Five Lighthouse Models: Your Recurring Cast of Characters</text>
  <text x="450" y="48" font-size="9" font-weight="400" fill="#555" text-anchor="middle">Each model isolates a distinct systems bottleneck</text>

  <!-- ===== ResNet-50 ===== -->
  <rect x="30" y="70" width="160" height="220" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="60" y="80" width="100" height="20" rx="12" fill="#a31f34"/>
  <text x="110" y="94" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">ResNet-50</text>
  <text x="110" y="120" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Compute-Bound</text>
  <line x1="50" y1="130" x2="170" y2="130" stroke="#4a90c4" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="110" y="148" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">25M params</text>
  <text x="110" y="164" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">7.7 GFLOPs</text>
  <text x="110" y="180" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">97.5 MB</text>
  <line x1="50" y1="192" x2="170" y2="192" stroke="#4a90c4" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="110" y="210" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Question:</text>
  <text x="110" y="224" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">"Fast enough</text>
  <text x="110" y="236" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">arithmetic?"</text>
  <!-- Iron Law term -->
  <rect x="55" y="252" width="110" height="22" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="110" y="267" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">O / R_peak</text>

  <!-- ===== GPT-2 ===== -->
  <rect x="205" y="70" width="160" height="220" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="235" y="80" width="100" height="20" rx="12" fill="#a31f34"/>
  <text x="285" y="94" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">GPT-2</text>
  <text x="285" y="120" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Memory-BW Bound</text>
  <line x1="225" y1="130" x2="345" y2="130" stroke="#3d9e5a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="285" y="148" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">1.5B params</text>
  <text x="285" y="164" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Autoregressive</text>
  <text x="285" y="180" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">~3 GB</text>
  <line x1="225" y1="192" x2="345" y2="192" stroke="#3d9e5a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="285" y="210" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Question:</text>
  <text x="285" y="224" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">"Can memory feed</text>
  <text x="285" y="236" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">the accelerator?"</text>
  <rect x="230" y="252" width="110" height="22" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="285" y="267" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">D / BW</text>

  <!-- ===== MobileNetV2 ===== -->
  <rect x="380" y="70" width="160" height="220" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="410" y="80" width="100" height="20" rx="12" fill="#a31f34"/>
  <text x="460" y="94" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">MobileNetV2</text>
  <text x="460" y="120" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Latency-Bound</text>
  <line x1="400" y1="130" x2="520" y2="130" stroke="#c87b2a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="460" y="148" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">3.4M params</text>
  <text x="460" y="164" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">0.3 GFLOPs</text>
  <text x="460" y="180" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">14 MB</text>
  <line x1="400" y1="192" x2="520" y2="192" stroke="#c87b2a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="460" y="210" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Question:</text>
  <text x="460" y="224" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">"Can it meet</text>
  <text x="460" y="236" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">real-time deadlines?"</text>
  <rect x="405" y="252" width="110" height="22" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="460" y="267" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">L_lat</text>

  <!-- ===== DLRM ===== -->
  <rect x="555" y="70" width="160" height="220" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="585" y="80" width="100" height="20" rx="12" fill="#a31f34"/>
  <text x="635" y="94" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">DLRM</text>
  <text x="635" y="120" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Data I/O Bound</text>
  <line x1="575" y1="130" x2="695" y2="130" stroke="#3d9e5a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="635" y="148" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">540M params</text>
  <text x="635" y="164" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Embedding tables</text>
  <text x="635" y="180" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">~100 GB</text>
  <line x1="575" y1="192" x2="695" y2="192" stroke="#3d9e5a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="635" y="210" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Question:</text>
  <text x="635" y="224" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">"Can we move</text>
  <text x="635" y="236" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">embeddings fast enough?"</text>
  <rect x="580" y="252" width="110" height="22" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="635" y="267" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">D / BW</text>

  <!-- ===== KWS ===== -->
  <rect x="730" y="70" width="145" height="220" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="755" y="80" width="95" height="20" rx="12" fill="#a31f34"/>
  <text x="802" y="94" font-size="8.5" font-weight="700" fill="#fff" text-anchor="middle">KWS</text>
  <text x="802" y="120" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Power-Bound</text>
  <line x1="745" y1="130" x2="860" y2="130" stroke="#c44" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="802" y="148" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">~20K params</text>
  <text x="802" y="164" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">Keyword spotting</text>
  <text x="802" y="180" font-size="8.5" font-weight="400" fill="#555" text-anchor="middle">~80 KB</text>
  <line x1="745" y1="192" x2="860" y2="192" stroke="#c44" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="802" y="210" font-size="8" font-weight="400" fill="#555" text-anchor="middle">Question:</text>
  <text x="802" y="224" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">"Coin-cell</text>
  <text x="802" y="236" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">battery?"</text>
  <rect x="747" y="252" width="110" height="22" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="802" y="267" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">P x T</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="315" font-size="9" font-weight="400" fill="#999" text-anchor="middle" font-style="italic">Each lighthouse recurs in every chapter, testing concepts under different constraint regimes.</text>
</svg>
