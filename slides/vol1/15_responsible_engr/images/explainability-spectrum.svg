<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Model Interpretability Spectrum</text>

  <!-- ===== Gradient Spectrum Bar ===== -->
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="50%" style="stop-color:#fdebd0"/>
      <stop offset="100%" style="stop-color:#f9d6d5"/>
    </linearGradient>
  </defs>
  <rect x="80" y="230" width="740" height="40" rx="6" fill="url(#spectrumGrad)" stroke="#bbb" stroke-width="1.2"/>

  <!-- Spectrum labels -->
  <text x="100" y="225" font-size="11" font-weight="700" fill="#3d9e5a">Interpretable</text>
  <text x="775" y="225" font-size="11" font-weight="700" fill="#c44" text-anchor="end">Black Box</text>

  <!-- ===== Model Types (below spectrum) ===== -->
  <!-- Linear Reg -->
  <circle cx="130" cy="295" r="6" fill="#3d9e5a"/>
  <text x="130" y="312" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Linear</text>
  <text x="130" y="323" font-size="9" fill="#333" text-anchor="middle">Regression</text>

  <!-- Decision Tree -->
  <circle cx="250" cy="295" r="6" fill="#3d9e5a"/>
  <text x="250" y="312" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Decision</text>
  <text x="250" y="323" font-size="9" fill="#333" text-anchor="middle">Tree</text>

  <!-- Random Forest -->
  <circle cx="420" cy="295" r="6" fill="#c87b2a"/>
  <text x="420" y="312" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Random</text>
  <text x="420" y="323" font-size="9" fill="#333" text-anchor="middle">Forest</text>

  <!-- Gradient Boosting -->
  <circle cx="540" cy="295" r="6" fill="#c87b2a"/>
  <text x="540" y="312" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Gradient</text>
  <text x="540" y="323" font-size="9" fill="#333" text-anchor="middle">Boosting</text>

  <!-- CNN -->
  <circle cx="660" cy="295" r="6" fill="#c44"/>
  <text x="660" y="312" font-size="9" font-weight="700" fill="#333" text-anchor="middle">CNN</text>

  <!-- Transformer -->
  <circle cx="770" cy="295" r="6" fill="#c44"/>
  <text x="770" y="312" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Transformer</text>
  <text x="770" y="323" font-size="9" fill="#333" text-anchor="middle">/ Deep NN</text>

  <!-- Connector lines from dots to bar -->
  <line x1="130" y1="270" x2="130" y2="289" stroke="#555" stroke-width="0.8"/>
  <line x1="250" y1="270" x2="250" y2="289" stroke="#555" stroke-width="0.8"/>
  <line x1="420" y1="270" x2="420" y2="289" stroke="#555" stroke-width="0.8"/>
  <line x1="540" y1="270" x2="540" y2="289" stroke="#555" stroke-width="0.8"/>
  <line x1="660" y1="270" x2="660" y2="289" stroke="#555" stroke-width="0.8"/>
  <line x1="770" y1="270" x2="770" y2="289" stroke="#555" stroke-width="0.8"/>

  <!-- ===== Domain Requirements (above spectrum) ===== -->
  <!-- Credit (ECOA) -->
  <line x1="175" y1="195" x2="175" y2="230" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="100" y="155" width="150" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="175" y="172" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Credit (ECOA)</text>
  <text x="175" y="185" font-size="8" fill="#555" text-anchor="middle">Denial factors required</text>

  <!-- Medical -->
  <line x1="300" y1="125" x2="300" y2="230" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="225" y="85" width="150" height="38" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="300" y="102" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Medical Diagnosis</text>
  <text x="300" y="115" font-size="8" fill="#555" text-anchor="middle">Clinical reasoning support</text>

  <!-- Content Moderation -->
  <line x1="450" y1="155" x2="450" y2="230" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="380" y="115" width="140" height="38" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="132" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Content Moderation</text>
  <text x="450" y="145" font-size="8" fill="#555" text-anchor="middle">Appeal-supporting</text>

  <!-- Recommendations -->
  <line x1="620" y1="125" x2="620" y2="230" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="540" y="85" width="160" height="38" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="620" y="102" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Recommendations</text>
  <text x="620" y="115" font-size="8" fill="#555" text-anchor="middle">"Because you watched X"</text>

  <!-- Fraud Detection -->
  <line x1="770" y1="155" x2="770" y2="230" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="700" y="115" width="140" height="38" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="770" y="132" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fraud Detection</text>
  <text x="770" y="145" font-size="8" fill="#555" text-anchor="middle">Internal audit only</text>

  <!-- ===== Post-hoc cost annotation ===== -->
  <rect x="560" y="345" width="220" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="670" y="363" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Post-hoc Explanation Cost</text>
  <text x="670" y="378" font-size="9" fill="#555" text-anchor="middle">SHAP: 10-100x latency overhead</text>

  <!-- ===== Clever Hans callout ===== -->
  <rect x="90" y="355" width="280" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="100" y="373" font-size="9" font-weight="700" fill="#a31f34">Clever Hans Effect</text>
  <text x="100" y="388" font-size="8.5" fill="#555">Mt. Sinai model detected metal token,</text>
  <text x="100" y="399" font-size="8.5" fill="#555">not pneumonia. Saliency maps are QA gates.</text>

  <!-- ===== Bottom arrow showing increasing accuracy ===== -->
  <text x="200" y="440" font-size="9" fill="#3d9e5a" text-anchor="middle">Direct auditability</text>
  <text x="700" y="440" font-size="9" fill="#c44" text-anchor="middle">Higher accuracy potential</text>
  <line x1="300" y1="437" x2="600" y2="437" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">High-stakes domains constrain model selection toward the interpretable end.</text>
</svg>
