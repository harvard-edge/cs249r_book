<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Disaggregated Confusion Matrices: Loan Approval</text>

  <!-- ===== Group A Matrix (Left) ===== -->
  <rect x="30" y="42" width="400" height="210" rx="5" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="230" y="62" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Group A (Majority, n=10,000)</text>

  <!-- Header row -->
  <text x="255" y="85" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Approved (pred)</text>
  <text x="375" y="85" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Rejected (pred)</text>

  <!-- Row labels -->
  <text x="105" y="128" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Repaid</text>
  <text x="105" y="178" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Defaulted</text>

  <!-- TP -->
  <rect x="190" y="95" width="120" height="45" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="250" y="120" font-size="12" font-weight="700" fill="#333" text-anchor="middle">4,500</text>
  <text x="250" y="133" font-size="8" fill="#555" text-anchor="middle">TP</text>

  <!-- FN -->
  <rect x="320" y="95" width="100" height="45" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="370" y="120" font-size="12" font-weight="700" fill="#333" text-anchor="middle">500</text>
  <text x="370" y="133" font-size="8" fill="#555" text-anchor="middle">FN</text>

  <!-- FP -->
  <rect x="190" y="150" width="120" height="45" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="250" y="175" font-size="12" font-weight="700" fill="#333" text-anchor="middle">1,000</text>
  <text x="250" y="188" font-size="8" fill="#555" text-anchor="middle">FP</text>

  <!-- TN -->
  <rect x="320" y="150" width="100" height="45" rx="3" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="370" y="175" font-size="12" font-weight="700" fill="#333" text-anchor="middle">4,000</text>
  <text x="370" y="188" font-size="8" fill="#555" text-anchor="middle">TN</text>

  <!-- TPR annotation -->
  <text x="130" y="225" font-size="11" font-weight="700" fill="#3d9e5a">TPR = 90%</text>
  <text x="300" y="225" font-size="9" fill="#333">Approval Rate: 55%</text>

  <!-- ===== Group B Matrix (Right) ===== -->
  <rect x="470" y="42" width="400" height="210" rx="5" fill="#fff" stroke="#c44" stroke-width="1.5"/>
  <text x="670" y="62" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Group B (Minority, n=2,000)</text>

  <!-- Header row -->
  <text x="695" y="85" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Approved (pred)</text>
  <text x="815" y="85" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Rejected (pred)</text>

  <!-- Row labels -->
  <text x="545" y="128" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Repaid</text>
  <text x="545" y="178" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Defaulted</text>

  <!-- TP -->
  <rect x="630" y="95" width="120" height="45" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="690" y="120" font-size="12" font-weight="700" fill="#333" text-anchor="middle">600</text>
  <text x="690" y="133" font-size="8" fill="#555" text-anchor="middle">TP</text>

  <!-- FN (highlighted) -->
  <rect x="760" y="95" width="100" height="45" rx="3" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="810" y="120" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">400</text>
  <text x="810" y="133" font-size="8" fill="#a31f34" text-anchor="middle">FN</text>

  <!-- FP -->
  <rect x="630" y="150" width="120" height="45" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="690" y="175" font-size="12" font-weight="700" fill="#333" text-anchor="middle">200</text>
  <text x="690" y="188" font-size="8" fill="#555" text-anchor="middle">FP</text>

  <!-- TN -->
  <rect x="760" y="150" width="100" height="45" rx="3" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="810" y="175" font-size="12" font-weight="700" fill="#333" text-anchor="middle">800</text>
  <text x="810" y="188" font-size="8" fill="#555" text-anchor="middle">TN</text>

  <!-- TPR annotation -->
  <text x="570" y="225" font-size="11" font-weight="700" fill="#a31f34">TPR = 60%</text>
  <text x="740" y="225" font-size="9" fill="#333">Approval Rate: 40%</text>

  <!-- ===== Gap Visualization (Bottom) ===== -->
  <rect x="30" y="270" width="840" height="180" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="292" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Fairness Gap Analysis</text>

  <!-- Approval Rate Gap bar -->
  <text x="50" y="320" font-size="9" font-weight="700" fill="#333">Approval Rate Gap:</text>
  <rect x="220" y="308" width="102" height="18" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="271" y="321" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">15pp</text>

  <!-- TPR Gap bar (largest, red accent) -->
  <text x="50" y="350" font-size="9" font-weight="700" fill="#333">TPR Gap (Equal Opp.):</text>
  <rect x="220" y="338" width="204" height="20" rx="3" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.5"/>
  <text x="322" y="352" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">30pp</text>
  <!-- Exclamation badge -->
  <rect x="430" y="339" width="18" height="18" rx="9" fill="#a31f34"/>
  <text x="439" y="352" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">!</text>

  <!-- FPR Gap bar -->
  <text x="50" y="380" font-size="9" font-weight="700" fill="#333">FPR Gap:</text>
  <rect x="220" y="368" width="6" height="18" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="240" y="381" font-size="9" font-weight="400" fill="#3d9e5a">0pp</text>

  <!-- Aggregate vs Hidden -->
  <rect x="500" y="305" width="160" height="30" rx="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="324" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Aggregate Acc: 85%</text>

  <line x1="580" y1="340" x2="580" y2="370" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="480" y="375" width="200" height="32" rx="12" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.2"/>
  <text x="580" y="391" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">Hidden: 4x rejection rate for</text>
  <text x="580" y="401" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">qualified minority applicants</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Aggregate accuracy conceals disparities. Disaggregated evaluation is mandatory.</text>
</svg>
