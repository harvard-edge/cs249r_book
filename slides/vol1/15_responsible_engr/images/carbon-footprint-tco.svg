<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Carbon Cost of Compute and Total Cost of Ownership</text>

  <!-- ===== Vertical Divider ===== -->
  <line x1="450" y1="45" x2="450" y2="455" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== LEFT PANEL: Carbon Cost ===== -->
  <text x="225" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Carbon = Energy x Intensity</text>

  <!-- Stacked horizontal bar -->
  <rect x="50" y="78" width="370" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Training segment (thin) -->
  <rect x="50" y="78" width="12" height="40" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>

  <!-- Inference segment (massive) -->
  <rect x="62" y="78" width="358" height="40" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>

  <!-- Labels on bar -->
  <text x="56" y="102" font-size="7" fill="#4a90c4" text-anchor="middle" transform="rotate(-90 56 102)">Train</text>
  <text x="241" y="102" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Inference: 97%</text>

  <!-- Bar labels below -->
  <text x="56" y="133" font-size="8" fill="#4a90c4" text-anchor="middle">2.6%</text>
  <text x="241" y="133" font-size="8" fill="#c44" text-anchor="middle">97.4% of lifecycle carbon</text>

  <!-- Ratio badge -->
  <rect x="150" y="145" width="150" height="24" rx="12" fill="#a31f34"/>
  <text x="225" y="161" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Ratio: 40:1 inference to training</text>

  <!-- GPT-3 callout -->
  <rect x="50" y="180" width="380" height="35" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="197" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">GPT-3 training: 1,300 MWh = 520t CO2 = 113 cars/year</text>
  <text x="240" y="209" font-size="8" fill="#555" text-anchor="middle">Every 1% efficiency improvement removes 1 car's annual emissions</text>

  <!-- Reduction strategies table -->
  <text x="80" y="240" font-size="10" font-weight="700" fill="#333">Carbon Reduction Levers:</text>

  <rect x="60" y="250" width="180" height="30" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="150" y="268" font-size="9" fill="#333" text-anchor="middle">Renewable region: 5x</text>

  <rect x="250" y="250" width="180" height="30" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="340" y="268" font-size="9" fill="#333" text-anchor="middle">Quantization: 2-4x</text>

  <rect x="60" y="288" width="180" height="30" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="150" y="306" font-size="9" fill="#333" text-anchor="middle">Carbon-aware sched: 1.5-2x</text>

  <rect x="250" y="288" width="180" height="30" rx="3" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="340" y="306" font-size="9" fill="#333" text-anchor="middle">Pruning: 50-90% params</text>

  <!-- ===== RIGHT PANEL: TCO Breakdown ===== -->
  <text x="675" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">3-Year Total Cost of Ownership</text>

  <!-- Proportional stacked bar (vertical) -->
  <!-- Training: 2% = ~7px of 350 -->
  <rect x="490" y="78" width="120" height="7" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="625" y="86" font-size="9" fill="#4a90c4">Training: $38K (2%)</text>

  <!-- Operations: 25% = ~87px of 350 -->
  <rect x="490" y="85" width="120" height="87" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="625" y="132" font-size="9" fill="#c87b2a">Operations: $510K (25%)</text>

  <!-- Inference: 73% = ~256px of 350 -->
  <rect x="490" y="172" width="120" height="256" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="550" y="290" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Inference</text>
  <text x="550" y="308" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">$1.52M</text>
  <text x="550" y="322" font-size="9" fill="#a31f34" text-anchor="middle">(73%)</text>

  <!-- Total -->
  <rect x="490" y="435" width="120" height="22" rx="3" fill="#f7f7f7" stroke="#555" stroke-width="1"/>
  <text x="550" y="450" font-size="10" font-weight="700" fill="#333" text-anchor="middle">$2.07M</text>

  <!-- Optimization callout -->
  <rect x="640" y="310" width="225" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="752" y="330" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">20% optimization saves:</text>
  <text x="752" y="348" font-size="10" font-weight="700" fill="#333" text-anchor="middle">$304K + 8.9t CO2</text>

  <!-- Arrow from inference to callout -->
  <line x1="612" y1="340" x2="638" y2="340" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Bottom message -->
  <rect x="490" y="375" width="370" height="28" rx="4" fill="#f9d6d5" stroke="#a31f34" stroke-width="1.2"/>
  <text x="675" y="393" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Inference is the Hidden Factory</text>

  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">For every dollar spent on training, $40 are spent on inference. Efficiency is responsibility.</text>
</svg>
