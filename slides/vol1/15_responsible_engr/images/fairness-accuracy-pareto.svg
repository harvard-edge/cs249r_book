<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Fairness-Accuracy Pareto Frontier</text>

  <!-- ===== Chart Area ===== -->
  <rect x="100" y="50" width="680" height="360" fill="#fff" stroke="#bbb" stroke-width="0.8" rx="2"/>

  <!-- ===== Axes ===== -->
  <!-- Y-axis -->
  <line x1="100" y1="50" x2="100" y2="410" stroke="#555" stroke-width="1.2"/>
  <text x="30" y="230" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90 30 230)">Model Accuracy (%)</text>
  <!-- Y ticks -->
  <text x="90" y="405" font-size="9" fill="#555" text-anchor="end">80</text>
  <line x1="95" y1="400" x2="100" y2="400" stroke="#555" stroke-width="1"/>
  <text x="90" y="315" font-size="9" fill="#555" text-anchor="end">85</text>
  <line x1="95" y1="310" x2="100" y2="310" stroke="#555" stroke-width="1"/>
  <text x="90" y="225" font-size="9" fill="#555" text-anchor="end">90</text>
  <line x1="95" y1="220" x2="100" y2="220" stroke="#555" stroke-width="1"/>
  <text x="90" y="135" font-size="9" fill="#555" text-anchor="end">95</text>
  <line x1="95" y1="130" x2="100" y2="130" stroke="#555" stroke-width="1"/>

  <!-- X-axis -->
  <line x1="100" y1="410" x2="780" y2="410" stroke="#555" stroke-width="1.2"/>
  <text x="440" y="445" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Fairness (1 - max group disparity)</text>
  <!-- X ticks -->
  <text x="100" y="430" font-size="9" fill="#555" text-anchor="middle">0.50</text>
  <text x="236" y="430" font-size="9" fill="#555" text-anchor="middle">0.60</text>
  <text x="372" y="430" font-size="9" fill="#555" text-anchor="middle">0.70</text>
  <text x="508" y="430" font-size="9" fill="#555" text-anchor="middle">0.80</text>
  <text x="644" y="430" font-size="9" fill="#555" text-anchor="middle">0.90</text>
  <text x="780" y="430" font-size="9" fill="#555" text-anchor="middle">1.00</text>

  <!-- Grid lines (light) -->
  <line x1="100" y1="310" x2="780" y2="310" stroke="#eee" stroke-width="0.5"/>
  <line x1="100" y1="220" x2="780" y2="220" stroke="#eee" stroke-width="0.5"/>
  <line x1="100" y1="130" x2="780" y2="130" stroke="#eee" stroke-width="0.5"/>
  <line x1="236" y1="50" x2="236" y2="410" stroke="#eee" stroke-width="0.5"/>
  <line x1="372" y1="50" x2="372" y2="410" stroke="#eee" stroke-width="0.5"/>
  <line x1="508" y1="50" x2="508" y2="410" stroke="#eee" stroke-width="0.5"/>
  <line x1="644" y1="50" x2="644" y2="410" stroke="#eee" stroke-width="0.5"/>

  <!-- ===== Pareto Frontier Curve ===== -->
  <!-- Fairness 0.55 -> x=168, Acc 95% -> y=130 -->
  <!-- Fairness 0.82 -> x=535, Acc 92% -> y=184 -->
  <!-- Fairness 0.98 -> x=752, Acc 85% -> y=310 -->
  <path d="M 168 130 C 250 135, 400 160, 535 184 C 620 210, 700 260, 752 310"
        fill="none" stroke="#a31f34" stroke-width="2.5"/>

  <!-- Infeasible region (below curve, light red) -->
  <path d="M 168 130 C 250 135, 400 160, 535 184 C 620 210, 700 260, 752 310 L 780 310 L 780 410 L 100 410 L 100 130 Z"
        fill="#f9d6d5" fill-opacity="0.15"/>

  <!-- Feasible region label -->
  <text x="300" y="100" font-size="9" fill="#3d9e5a" font-weight="400" text-anchor="middle">Feasible Region</text>
  <text x="600" y="370" font-size="9" fill="#c44" font-weight="400" text-anchor="middle">Infeasible Region</text>

  <!-- ===== Point A: Unconstrained ===== -->
  <circle cx="168" cy="130" r="8" fill="#4a90c4" stroke="#fff" stroke-width="2"/>
  <rect x="115" y="60" width="140" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="185" y="76" font-size="10" font-weight="700" fill="#333" text-anchor="middle">A: Unconstrained</text>
  <text x="185" y="90" font-size="9" fill="#555" text-anchor="middle">Acc: 95%, Gap: 30pp</text>
  <text x="185" y="103" font-size="8.5" fill="#555" text-anchor="middle">Max accuracy, low fairness</text>

  <!-- ===== Point B: Sweet Spot ===== -->
  <circle cx="535" cy="184" r="9" fill="#3d9e5a" stroke="#fff" stroke-width="2"/>
  <!-- Star highlight -->
  <circle cx="535" cy="184" r="14" fill="none" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="555" y="130" width="165" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="637" y="148" font-size="10" font-weight="700" fill="#333" text-anchor="middle">B: Sweet Spot</text>
  <text x="637" y="162" font-size="9" fill="#555" text-anchor="middle">Acc: 92%, Gap: 5pp</text>
  <text x="637" y="176" font-size="8.5" fill="#555" text-anchor="middle">Best eng. trade-off (+5% FP)</text>

  <!-- ===== Point C: Strict Equality ===== -->
  <circle cx="752" cy="310" r="8" fill="#c87b2a" stroke="#fff" stroke-width="2"/>
  <rect x="610" y="318" width="155" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="687" y="336" font-size="10" font-weight="700" fill="#333" text-anchor="middle">C: Strict Equality</text>
  <text x="687" y="350" font-size="9" fill="#555" text-anchor="middle">Acc: 85%, Gap: 0pp</text>
  <text x="687" y="362" font-size="8.5" fill="#555" text-anchor="middle">Zero disparity, large drop</text>

  <!-- ===== Dashed arrows between points ===== -->
  <line x1="200" y1="135" x2="520" y2="184" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="350" y="145" font-size="8" fill="#555" text-anchor="middle">Lower threshold for Group B</text>

  <line x1="550" y1="195" x2="740" y2="305" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="670" y="250" font-size="8" fill="#555" text-anchor="middle" transform="rotate(30 670 250)">Strict demographic parity</text>

  <!-- ===== Arrow markers ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Same constrained optimization framework from the Iron Law -- evaluated over a wider set of objectives.</text>
</svg>
