<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Data Governance: Four Pillars of Responsible ML</text>

  <!-- ===== Roof: Responsible ML System ===== -->
  <rect x="80" y="48" width="740" height="38" rx="4" fill="#a31f34"/>
  <text x="450" y="72" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Responsible ML System</text>

  <!-- Monitoring bar -->
  <rect x="80" y="88" width="740" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="103" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Continuous Monitoring</text>

  <!-- ===== Four Pillars ===== -->
  <!-- Pillar 1: Privacy -->
  <rect x="95" y="118" width="165" height="195" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="177" y="140" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Privacy</text>
  <line x1="115" y1="148" x2="240" y2="148" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="177" y="168" font-size="9" fill="#555" text-anchor="middle">Differential Privacy</text>
  <text x="177" y="185" font-size="9" fill="#555" text-anchor="middle">Data Minimization</text>
  <text x="177" y="202" font-size="9" fill="#555" text-anchor="middle">Consent Management</text>
  <rect x="115" y="220" width="124" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="177" y="237" font-size="8" fill="#4a90c4" text-anchor="middle">epsilon-DP:</text>
  <text x="177" y="247" font-size="8" fill="#4a90c4" text-anchor="middle">15-30% overhead</text>

  <!-- Pillar 2: Security -->
  <rect x="275" y="118" width="165" height="195" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="357" y="140" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Security</text>
  <line x1="295" y1="148" x2="420" y2="148" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="357" y="168" font-size="9" fill="#555" text-anchor="middle">Encryption (rest + transit)</text>
  <text x="357" y="185" font-size="9" fill="#555" text-anchor="middle">RBAC</text>
  <text x="357" y="202" font-size="9" fill="#555" text-anchor="middle">Audit Logs</text>
  <rect x="295" y="220" width="124" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="357" y="237" font-size="8" fill="#3d9e5a" text-anchor="middle">Every query</text>
  <text x="357" y="247" font-size="8" fill="#3d9e5a" text-anchor="middle">logged + auditable</text>

  <!-- Pillar 3: Compliance -->
  <rect x="455" y="118" width="165" height="195" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="537" y="140" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Compliance</text>
  <line x1="475" y1="148" x2="600" y2="148" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="537" y="168" font-size="9" fill="#555" text-anchor="middle">GDPR / CCPA</text>
  <text x="537" y="185" font-size="9" fill="#555" text-anchor="middle">Right to Erasure</text>
  <text x="537" y="202" font-size="9" fill="#555" text-anchor="middle">EU AI Act</text>
  <rect x="475" y="220" width="124" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="537" y="237" font-size="8" fill="#c87b2a" text-anchor="middle">Delete all derived</text>
  <text x="537" y="247" font-size="8" fill="#c87b2a" text-anchor="middle">data on request</text>

  <!-- Pillar 4: Transparency (highlighted as keystone) -->
  <rect x="635" y="118" width="172" height="195" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="2"/>
  <text x="721" y="140" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Transparency</text>
  <line x1="655" y1="148" x2="787" y2="148" stroke="#2d7a2d" stroke-width="0.8"/>
  <text x="721" y="168" font-size="9" fill="#555" text-anchor="middle">Data Lineage</text>
  <text x="721" y="185" font-size="9" fill="#555" text-anchor="middle">Model Provenance</text>
  <text x="721" y="202" font-size="9" fill="#555" text-anchor="middle">Audit Trails</text>
  <rect x="650" y="220" width="142" height="30" rx="3" fill="#fff" stroke="#2d7a2d" stroke-width="1"/>
  <text x="721" y="237" font-size="8" fill="#2d7a2d" text-anchor="middle">Without this, others</text>
  <text x="721" y="247" font-size="8" fill="#2d7a2d" text-anchor="middle">are unverifiable</text>
  <!-- Keystone badge -->
  <rect x="680" y="264" width="80" height="16" rx="8" fill="#2d7a2d"/>
  <text x="720" y="275" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">KEYSTONE</text>

  <!-- ===== Foundation Layer ===== -->
  <rect x="80" y="328" width="360" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="260" y="350" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model Cards (Mitchell+, 2019)</text>
  <text x="260" y="365" font-size="8.5" fill="#555" text-anchor="middle">Architecture, intended use, disaggregated</text>
  <text x="260" y="377" font-size="8.5" fill="#555" text-anchor="middle">metrics, limitations, ethical considerations</text>

  <rect x="460" y="328" width="360" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="640" y="350" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Datasheets (Gebru+, 2018)</text>
  <text x="640" y="365" font-size="8.5" fill="#555" text-anchor="middle">Provenance, methodology, demographics,</text>
  <text x="640" y="377" font-size="8.5" fill="#555" text-anchor="middle">known limitations, collection context</text>

  <!-- Foundation label -->
  <text x="450" y="408" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Documentation Foundation</text>

  <!-- ===== Scope creep callout ===== -->
  <rect x="580" y="420" width="290" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="725" y="438" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">Scope creep: 40-60% of models exceed</text>
  <text x="725" y="451" font-size="8.5" fill="#a31f34" text-anchor="middle">documented scope within 18 months</text>
  <!-- Dashed arrow from pillar area to callout -->
  <line x1="725" y1="315" x2="725" y2="418" stroke="#c44" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Documentation without enforcement is a historical record. Pair with technical controls.</text>
</svg>
