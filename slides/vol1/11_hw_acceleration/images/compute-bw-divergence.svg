<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Compute-Bandwidth Divergence: The Rising Ridge</text>

  <!-- Chart area -->
  <rect x="100" y="50" width="550" height="350" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="4"/>

  <!-- X-axis: GPU generations -->
  <text x="210" y="425" font-size="10" font-weight="700" fill="#333" text-anchor="middle">V100 (2017)</text>
  <text x="375" y="425" font-size="10" font-weight="700" fill="#333" text-anchor="middle">A100 (2020)</text>
  <text x="540" y="425" font-size="10" font-weight="700" fill="#333" text-anchor="middle">H100 (2023)</text>

  <!-- Left Y-axis -->
  <text x="50" y="240" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle" transform="rotate(-90,50,240)">Peak FP16 (TFLOPS)</text>

  <!-- Right Y-axis -->
  <text x="700" y="240" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle" transform="rotate(90,700,240)">HBM Bandwidth (TB/s)</text>

  <!-- Compute line (steep) -->
  <circle cx="210" cy="350" r="7" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="210" y="340" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">125 TF</text>
  <circle cx="375" cy="270" r="7" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="375" y="260" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">312 TF</text>
  <circle cx="540" cy="100" r="7" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="540" y="90" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">989 TF</text>
  <line x1="210" y1="350" x2="375" y2="270" stroke="#4a90c4" stroke-width="2.5"/>
  <line x1="375" y1="270" x2="540" y2="100" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="450" y="150" font-size="9" font-weight="700" fill="#4a90c4">Compute: ~2x/year</text>

  <!-- Bandwidth line (gentle) -->
  <circle cx="210" cy="320" r="7" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="250" y="318" font-size="9" font-weight="700" fill="#c87b2a">0.9 TB/s</text>
  <circle cx="375" cy="280" r="7" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="415" y="293" font-size="9" font-weight="700" fill="#c87b2a">2.0 TB/s</text>
  <circle cx="540" cy="240" r="7" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="580" y="238" font-size="9" font-weight="700" fill="#c87b2a">3.35 TB/s</text>
  <line x1="210" y1="320" x2="375" y2="280" stroke="#c87b2a" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="375" y1="280" x2="540" y2="240" stroke="#c87b2a" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="470" y="305" font-size="9" font-weight="700" fill="#c87b2a">BW: ~1.2x/year</text>

  <!-- Gap annotation at H100 -->
  <line x1="555" y1="110" x2="555" y2="230" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="550" y1="110" x2="560" y2="110" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="550" y1="230" x2="560" y2="230" stroke="#a31f34" stroke-width="1.5"/>
  <text x="575" y="175" font-size="9" font-weight="700" fill="#a31f34">Gap</text>
  <text x="575" y="188" font-size="9" font-weight="700" fill="#a31f34">widens</text>

  <!-- Ridge point badges -->
  <rect x="170" y="370" width="80" height="22" fill="#a31f34" rx="11"/>
  <text x="210" y="385" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Ridge: ~139</text>
  <rect x="335" y="370" width="80" height="22" fill="#a31f34" rx="11"/>
  <text x="375" y="385" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Ridge: ~156</text>
  <rect x="495" y="370" width="90" height="24" fill="#a31f34" rx="12" stroke="#fff" stroke-width="2"/>
  <text x="540" y="386" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Ridge: ~296</text>

  <!-- ===== Right: Insight card ===== -->
  <rect x="680" y="60" width="200" height="140" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="5"/>
  <text x="780" y="82" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Implication:</text>
  <text x="780" y="100" font-size="8.5" fill="#333" text-anchor="middle">Code with AI = 200:</text>
  <text x="780" y="118" font-size="8.5" fill="#333" text-anchor="middle">Compute-bound on A100</text>
  <text x="780" y="136" font-size="8.5" fill="#333" text-anchor="middle">Memory-bound on H100</text>
  <text x="780" y="160" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Upgrading hardware can</text>
  <text x="780" y="176" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">shift your bottleneck!</text>

  <!-- Right: Key numbers -->
  <rect x="680" y="220" width="200" height="100" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="5"/>
  <text x="780" y="242" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">V100 to H100:</text>
  <text x="780" y="262" font-size="9" fill="#333" text-anchor="middle">Compute: 8x growth</text>
  <text x="780" y="280" font-size="9" fill="#333" text-anchor="middle">Bandwidth: 3.7x growth</text>
  <text x="780" y="300" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Ridge point: 2x growth</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Compute grew 8x from V100 to H100; bandwidth grew only 3.7x. The ridge point doubled, making hardware harder to saturate.</text>
</svg>
