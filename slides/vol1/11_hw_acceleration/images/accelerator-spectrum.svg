<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Accelerator Spectrum: Flexibility vs Efficiency</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="830" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="400" x2="100" y2="60" stroke="#333" stroke-width="1.5"/>

  <!-- X-axis labels -->
  <text x="465" y="435" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Flexibility</text>
  <text x="180" y="420" font-size="9" fill="#555" text-anchor="middle">High</text>
  <text x="780" y="420" font-size="9" fill="#555" text-anchor="middle">Low</text>

  <!-- Y-axis labels -->
  <text x="50" y="240" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,50,240)">Efficiency (TOPS/W)</text>
  <text x="90" y="380" font-size="9" fill="#555" text-anchor="end">Low</text>
  <text x="90" y="100" font-size="9" fill="#555" text-anchor="end">High</text>

  <!-- Trend arrow -->
  <path d="M160,370 C300,360 550,180 780,100" stroke="#e0e0e0" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
  <text x="500" y="210" font-size="9" fill="#999" text-anchor="middle" transform="rotate(-25,500,210)">More specialized, more efficient, less programmable</text>

  <!-- CPU -->
  <circle cx="180" cy="350" r="35" fill="#f7f7f7" stroke="#bbb" stroke-width="2"/>
  <text x="180" y="347" font-size="11" font-weight="700" fill="#333" text-anchor="middle">CPU</text>
  <text x="180" y="362" font-size="8" fill="#555" text-anchor="middle">1-2 TF</text>
  <rect x="140" y="390" width="80" height="18" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="9"/>
  <text x="180" y="403" font-size="7.5" font-weight="700" fill="#555" text-anchor="middle">Preprocessing</text>

  <!-- GPU -->
  <circle cx="330" cy="250" r="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="330" y="247" font-size="11" font-weight="700" fill="#333" text-anchor="middle">GPU</text>
  <text x="330" y="263" font-size="8" fill="#555" text-anchor="middle">100-1000+ TF</text>
  <rect x="280" y="295" width="100" height="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="9"/>
  <text x="330" y="308" font-size="7.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Training + Inference</text>

  <!-- FPGA -->
  <circle cx="490" cy="220" r="32" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="490" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">FPGA</text>
  <text x="490" y="232" font-size="8" fill="#555" text-anchor="middle">10-100 TF</text>
  <rect x="448" y="257" width="84" height="18" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8" rx="9"/>
  <text x="490" y="270" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Prototyping, Edge</text>

  <!-- TPU -->
  <circle cx="620" cy="150" r="38" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="620" y="147" font-size="11" font-weight="700" fill="#333" text-anchor="middle">TPU</text>
  <text x="620" y="163" font-size="8" fill="#555" text-anchor="middle">100-1000+ TF</text>
  <rect x="567" y="192" width="106" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8" rx="9"/>
  <text x="620" y="205" font-size="7.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Large-scale training</text>

  <!-- ASIC/NPU -->
  <circle cx="770" cy="110" r="35" fill="#a31f34" stroke="#a31f34" stroke-width="2"/>
  <text x="770" y="107" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ASIC</text>
  <text x="770" y="122" font-size="8" fill="#fff" text-anchor="middle">NPU</text>
  <rect x="725" y="150" width="90" height="18" fill="#f9d6d5" stroke="#a31f34" stroke-width="0.8" rx="9"/>
  <text x="770" y="163" font-size="7.5" font-weight="700" fill="#a31f34" text-anchor="middle">Inference at scale</text>

  <!-- Decision card -->
  <rect x="140" y="445" width="620" height="35" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="4"/>
  <text x="450" y="467" font-size="10" font-weight="700" fill="#333" text-anchor="middle">The question is not "which is fastest?" but "which memory system matches my workload?"</text>

  <!-- Bottom footnote -->
  <text x="450" y="495" font-size="9" font-style="italic" fill="#999" text-anchor="middle">The flexibility-efficiency tradeoff governs hardware selection. Most production: GPUs for training, NPUs for inference.</text>
</svg>
