<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Roofline Model: Where Is Your Bottleneck?</text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="840" y2="420" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="100" y1="420" x2="100" y2="50" stroke="#333" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- X-axis label -->
  <text x="470" y="455" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Arithmetic Intensity (FLOP/byte) — log scale</text>
  <!-- X ticks -->
  <text x="140" y="438" font-size="8" fill="#555" text-anchor="middle">0.1</text>
  <text x="260" y="438" font-size="8" fill="#555" text-anchor="middle">1</text>
  <text x="380" y="438" font-size="8" fill="#555" text-anchor="middle">10</text>
  <text x="500" y="438" font-size="8" fill="#555" text-anchor="middle">100</text>
  <text x="620" y="438" font-size="8" fill="#555" text-anchor="middle">1000</text>

  <!-- Y-axis label -->
  <text x="45" y="240" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,45,240)">Performance (TFLOPS)</text>
  <!-- Y ticks -->
  <text x="90" y="380" font-size="8" fill="#555" text-anchor="end">0.1</text>
  <text x="90" y="310" font-size="8" fill="#555" text-anchor="end">1</text>
  <text x="90" y="240" font-size="8" fill="#555" text-anchor="end">10</text>
  <text x="90" y="170" font-size="8" fill="#555" text-anchor="end">100</text>
  <text x="90" y="100" font-size="8" fill="#555" text-anchor="end">1000</text>

  <!-- Grid lines -->
  <line x1="100" y1="380" x2="830" y2="380" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="100" y1="310" x2="830" y2="310" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="100" y1="240" x2="830" y2="240" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="100" y1="170" x2="830" y2="170" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="100" y1="100" x2="830" y2="100" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Memory-bound region (light red) -->
  <polygon points="100,420 100,170 480,170 100,420" fill="#f9d6d5" opacity="0.15"/>
  <!-- Compute-bound region (light green) -->
  <polygon points="480,170 480,100 830,100 830,170" fill="#d4edda" opacity="0.15"/>

  <!-- Bandwidth ceiling (sloped line) -->
  <line x1="100" y1="420" x2="480" y2="170" stroke="#c87b2a" stroke-width="2.5"/>
  <text x="230" y="275" font-size="9" font-weight="700" fill="#c87b2a" transform="rotate(-33,230,275)">BW Ceiling (2 TB/s)</text>

  <!-- Compute ceiling (horizontal line) -->
  <line x1="480" y1="170" x2="830" y2="170" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="660" y="160" font-size="9" font-weight="700" fill="#4a90c4">Compute Ceiling (312 TF)</text>

  <!-- Ridge point -->
  <circle cx="480" cy="170" r="5" fill="#a31f34"/>
  <line x1="480" y1="420" x2="480" y2="175" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="480" y="468" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Ridge = 156 FLOP/byte</text>

  <!-- Region labels -->
  <text x="270" y="370" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Memory-Bound</text>
  <text x="660" y="135" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Compute-Bound</text>

  <!-- ML operation points -->
  <!-- ReLU AI=0.125 -->
  <circle cx="155" cy="395" r="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="155" y="413" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">ReLU</text>

  <!-- Embedding AI=0.5 -->
  <circle cx="210" cy="380" r="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="210" y="375" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Embed</text>

  <!-- LayerNorm AI=5 -->
  <circle cx="310" cy="330" r="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="310" y="325" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">LayerNorm</text>

  <!-- Softmax AI=3 -->
  <circle cx="285" cy="345" r="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="285" y="363" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Softmax</text>

  <!-- Dense MatMul AI=150 -->
  <circle cx="475" cy="175" r="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="460" y="195" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">MatMul</text>

  <!-- Conv2D AI=100 -->
  <circle cx="440" cy="195" r="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="425" y="215" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Conv2D</text>

  <!-- Batched MatMul AI=500 -->
  <circle cx="600" cy="170" r="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="600" y="195" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Batched MM</text>

  <!-- Annotation for ReLU -->
  <line x1="165" y1="390" x2="210" y2="350" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="240" y="342" font-size="8" fill="#c44">2,400x below roofline</text>

  <!-- Bottom footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">A100 GPU. Most neural network operations cluster in the memory-bound regime (left of ridge).</text>
</svg>
