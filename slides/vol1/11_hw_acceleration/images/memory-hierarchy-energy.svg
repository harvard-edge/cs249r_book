<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Energy Hierarchy (Horowitz Numbers)</text>

  <!-- ===== Left axis label ===== -->
  <text x="30" y="140" font-size="9" font-weight="700" fill="#555" text-anchor="middle" transform="rotate(-90,30,140)">Faster / Smaller</text>
  <text x="30" y="350" font-size="9" font-weight="700" fill="#555" text-anchor="middle" transform="rotate(-90,30,350)">Slower / Larger</text>
  <line x1="40" y1="60" x2="40" y2="420" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Pyramid tiers ===== -->
  <!-- Tier 1: Registers -->
  <polygon points="350,55 550,55 580,115 320,115" fill="#a31f34" stroke="#a31f34" stroke-width="1"/>
  <text x="450" y="82" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Registers</text>
  <text x="450" y="98" font-size="8" fill="#fff" text-anchor="middle" opacity="0.9">KB</text>
  <text x="620" y="78" font-size="8.5" fill="#555" text-anchor="start">TB/s+ | &lt;1 ns</text>
  <rect x="750" y="68" width="60" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="10"/>
  <text x="780" y="82" font-size="8" font-weight="700" fill="#333" text-anchor="middle">0.03 pJ</text>

  <!-- Tier 2: L1 / SRAM -->
  <polygon points="320,125 580,125 620,195 280,195" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="450" y="155" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L1 / Shared Memory (SRAM)</text>
  <text x="450" y="172" font-size="8" fill="#555" text-anchor="middle">128 KB per SM</text>
  <text x="658" y="155" font-size="8.5" fill="#555" text-anchor="start">19 TB/s | ~1 ns</text>
  <rect x="750" y="145" width="60" height="20" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8" rx="10"/>
  <text x="780" y="159" font-size="8" font-weight="700" fill="#333" text-anchor="middle">5 pJ</text>

  <!-- Tier 3: L2 Cache -->
  <polygon points="280,205 620,205 660,275 240,275" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="450" y="235" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L2 Cache</text>
  <text x="450" y="252" font-size="8" fill="#555" text-anchor="middle">40-50 MB</text>
  <text x="698" y="235" font-size="8.5" fill="#555" text-anchor="start">6 TB/s | 5-10 ns</text>

  <!-- Tier 4: HBM -->
  <polygon points="240,285 660,285 700,355 200,355" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="315" font-size="10" font-weight="700" fill="#333" text-anchor="middle">HBM (GPU DRAM)</text>
  <text x="450" y="332" font-size="8" fill="#555" text-anchor="middle">80 GB</text>
  <text x="738" y="315" font-size="8.5" fill="#555" text-anchor="start">2-3 TB/s | 100+ ns</text>
  <rect x="750" y="305" width="70" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" rx="10"/>
  <text x="785" y="319" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">640 pJ</text>

  <!-- Tier 5: Host DRAM -->
  <polygon points="200,365 700,365 730,420 170,420" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="390" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Host DRAM (CPU)</text>
  <text x="450" y="407" font-size="8" fill="#555" text-anchor="middle">TBs | 50 GB/s | microseconds</text>

  <!-- ===== Key insight card ===== -->
  <rect x="60" y="435" width="380" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="70" y="453" font-size="9" font-weight="700" fill="#c44">Key:</text>
  <text x="100" y="453" font-size="9" fill="#333">DRAM read costs 128x more energy than SRAM</text>
  <text x="100" y="466" font-size="9" fill="#333">and 20,000x more than an INT8 add.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="492" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Horowitz (2014). Each memory level trades capacity for speed and energy efficiency.</text>
</svg>
