<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">CPU vs GPU: Silicon Area Trade-off</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="45" x2="450" y2="460" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: CPU ===== -->
  <text x="225" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">CPU</text>
  <text x="225" y="72" font-size="9" fill="#555" text-anchor="middle">Optimized for single-thread latency</text>

  <!-- CPU die outline -->
  <rect x="60" y="82" width="330" height="340" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="5"/>

  <!-- 4 Cores (each ~15% of die) -->
  <rect x="75" y="95" width="145" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="147" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Core 0</text>
  <text x="147" y="134" font-size="7.5" fill="#555" text-anchor="middle">ALU · FPU · Branch Pred · OoO</text>

  <rect x="230" y="95" width="145" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="302" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Core 1</text>
  <text x="302" y="134" font-size="7.5" fill="#555" text-anchor="middle">ALU · FPU · Branch Pred · OoO</text>

  <rect x="75" y="175" width="145" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="147" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Core 2</text>
  <text x="147" y="214" font-size="7.5" fill="#555" text-anchor="middle">ALU · FPU · Branch Pred · OoO</text>

  <rect x="230" y="175" width="145" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="302" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Core 3</text>
  <text x="302" y="214" font-size="7.5" fill="#555" text-anchor="middle">ALU · FPU · Branch Pred · OoO</text>

  <!-- L3 Cache -->
  <rect x="75" y="260" width="300" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="225" y="310" font-size="11" font-weight="700" fill="#333" text-anchor="middle">L3 Cache</text>
  <text x="225" y="326" font-size="8.5" fill="#555" text-anchor="middle">~35% of die area</text>

  <!-- Memory Controller -->
  <rect x="75" y="370" width="300" height="35" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="225" y="392" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Memory Controller</text>

  <!-- Annotation pill -->
  <rect x="110" y="414" width="230" height="24" fill="#a31f34" rx="12"/>
  <text x="225" y="430" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">~5% of die = compute units</text>

  <!-- ===== RIGHT: GPU ===== -->
  <text x="675" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">GPU</text>
  <text x="675" y="72" font-size="9" fill="#555" text-anchor="middle">Optimized for parallel throughput</text>

  <!-- GPU die outline -->
  <rect x="510" y="82" width="330" height="340" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5" rx="5"/>

  <!-- SM Grid (6 cols x 8 rows = 48 SMs) -->
  <g>
    <!-- Row 1 -->
    <rect x="522" y="92" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="92" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="92" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="92" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="92" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="92" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- Row 2 -->
    <rect x="522" y="122" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="122" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="122" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="122" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="122" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="122" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- Row 3 -->
    <rect x="522" y="152" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="152" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="152" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="152" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="152" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="152" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- Row 4 -->
    <rect x="522" y="182" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="182" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="182" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="182" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="182" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="182" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- Row 5 -->
    <rect x="522" y="212" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="212" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="212" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="212" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="212" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="212" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- Row 6 -->
    <rect x="522" y="242" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="242" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="242" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="242" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="242" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="242" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- Row 7 -->
    <rect x="522" y="272" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="574" y="272" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="626" y="272" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="678" y="272" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="730" y="272" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <rect x="782" y="272" width="48" height="26" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="3"/>
    <!-- SM labels (center of grid) -->
    <text x="675" y="195" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle" opacity="0.6">SM SM SM SM SM SM</text>
  </g>

  <!-- L2 Cache -->
  <rect x="522" y="308" width="308" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="4"/>
  <text x="675" y="332" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L2 Cache (~10%)</text>

  <!-- Memory Controller -->
  <rect x="522" y="358" width="308" height="35" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="675" y="380" font-size="9" font-weight="700" fill="#555" text-anchor="middle">HBM Memory Controllers</text>

  <!-- Annotation pill -->
  <rect x="560" y="402" width="230" height="24" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="12"/>
  <text x="675" y="418" font-size="9" font-weight="700" fill="#333" text-anchor="middle">~80% of die = compute units</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">GPUs trade single-thread latency for massive parallel throughput by dedicating die area to compute rather than caches.</text>
</svg>
