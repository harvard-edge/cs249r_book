<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <defs>
    <marker id="a-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="a-n" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Kernel Fusion: Eliminating Intermediate Memory Writes</text>

  <!-- Divider -->
  <line x1="450" y1="40" x2="450" y2="430" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Without Fusion ===== -->
  <text x="225" y="55" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Without Fusion</text>

  <!-- Conv2D -->
  <rect x="140" y="70" width="170" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="225" y="94" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Conv2D</text>

  <!-- Arrow down to HBM -->
  <line x1="225" y1="110" x2="225" y2="125" stroke="#c44" stroke-width="1.2" marker-end="url(#a-r)"/>
  <rect x="155" y="128" width="140" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="225" y="145" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Write to HBM</text>

  <!-- Arrow up from HBM -->
  <line x1="225" y1="154" x2="225" y2="170" stroke="#c44" stroke-width="1.2" marker-end="url(#a-r)"/>

  <!-- BatchNorm -->
  <rect x="140" y="173" width="170" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="225" y="197" font-size="10" font-weight="700" fill="#333" text-anchor="middle">BatchNorm</text>

  <!-- Arrow down to HBM -->
  <line x1="225" y1="213" x2="225" y2="228" stroke="#c44" stroke-width="1.2" marker-end="url(#a-r)"/>
  <rect x="155" y="231" width="140" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="225" y="248" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Write to HBM</text>

  <!-- Arrow up from HBM -->
  <line x1="225" y1="257" x2="225" y2="273" stroke="#c44" stroke-width="1.2" marker-end="url(#a-r)"/>

  <!-- ReLU -->
  <rect x="140" y="276" width="170" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="225" y="300" font-size="10" font-weight="700" fill="#333" text-anchor="middle">ReLU</text>

  <!-- Arrow down to HBM -->
  <line x1="225" y1="316" x2="225" y2="335" stroke="#c44" stroke-width="1.2" marker-end="url(#a-r)"/>
  <rect x="155" y="338" width="140" height="26" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="225" y="355" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Write to HBM</text>

  <!-- Cost pill -->
  <rect x="120" y="380" width="210" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="12"/>
  <text x="225" y="398" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">6 HBM round-trips</text>

  <!-- ===== RIGHT: With Fusion ===== -->
  <text x="675" y="55" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">With Fusion</text>

  <!-- Read from HBM -->
  <rect x="590" y="70" width="170" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="675" y="89" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Read from HBM (once)</text>

  <line x1="675" y1="100" x2="675" y2="118" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#a-g)"/>

  <!-- Fused kernel container -->
  <rect x="540" y="120" width="270" height="200" fill="#d4edda" stroke="#3d9e5a" stroke-width="2" rx="6"/>
  <text x="675" y="142" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fused Kernel</text>

  <!-- Internal ops -->
  <rect x="570" y="152" width="210" height="32" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4"/>
  <text x="675" y="172" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Conv2D</text>

  <line x1="675" y1="184" x2="675" y2="196" stroke="#555" stroke-width="0.8" marker-end="url(#a-n)"/>
  <text x="720" y="195" font-size="7.5" fill="#555">in SRAM</text>

  <rect x="570" y="200" width="210" height="32" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4"/>
  <text x="675" y="220" font-size="9" font-weight="700" fill="#333" text-anchor="middle">BatchNorm</text>

  <line x1="675" y1="232" x2="675" y2="244" stroke="#555" stroke-width="0.8" marker-end="url(#a-n)"/>
  <text x="720" y="243" font-size="7.5" fill="#555">in SRAM</text>

  <rect x="570" y="248" width="210" height="32" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4"/>
  <text x="675" y="268" font-size="9" font-weight="700" fill="#333" text-anchor="middle">ReLU</text>

  <!-- SRAM label -->
  <rect x="560" y="290" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8" rx="10"/>
  <text x="610" y="305" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Data in SRAM</text>

  <line x1="675" y1="320" x2="675" y2="340" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#a-g)"/>

  <!-- Write to HBM -->
  <rect x="590" y="343" width="170" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="675" y="362" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Write to HBM (once)</text>

  <!-- Cost pill -->
  <rect x="570" y="380" width="210" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="12"/>
  <text x="675" y="398" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">2 HBM accesses (read + write)</text>

  <!-- ===== Speedup callout ===== -->
  <rect x="250" y="430" width="400" height="30" fill="#a31f34" rx="12"/>
  <text x="450" y="450" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ResNet-50 inference: 47 ms to 8 ms (~6x speedup) from fusion alone</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Fusion combines memory-bound operations to amortize the cost of data movement through the memory hierarchy.</text>
</svg>
