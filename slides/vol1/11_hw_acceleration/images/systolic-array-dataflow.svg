    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="330" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Systolic Array: Data Flows Like a Heartbeat</text>

  <!-- ===== Weight labels (top) ===== -->
  <text x="300" y="50" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Weights (flow down)</text>
  <rect x="178" y="56" width="36" height="20" fill="#a31f34" rx="10"/>
  <text x="196" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">w1</text>
  <rect x="248" y="56" width="36" height="20" fill="#a31f34" rx="10"/>
  <text x="266" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">w2</text>
  <rect x="318" y="56" width="36" height="20" fill="#a31f34" rx="10"/>
  <text x="336" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">w3</text>
  <rect x="388" y="56" width="36" height="20" fill="#a31f34" rx="10"/>
  <text x="406" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">w4</text>

  <!-- Down arrows from weights -->
  <line x1="196" y1="76" x2="196" y2="92" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arr-r)"/>
  <line x1="266" y1="76" x2="266" y2="92" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arr-r)"/>
  <line x1="336" y1="76" x2="336" y2="92" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arr-r)"/>
  <line x1="406" y1="76" x2="406" y2="92" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arr-r)"/>

  <!-- ===== Input labels (left) ===== -->
  <text x="100" y="105" font-size="9" font-weight="700" fill="#555" text-anchor="middle" transform="rotate(-90,68,200)">Inputs (flow right)</text>
  <rect x="120" y="100" width="36" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="10"/>
  <text x="138" y="114" font-size="8" font-weight="700" fill="#333" text-anchor="middle">x1</text>
  <rect x="120" y="170" width="36" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="10"/>
  <text x="138" y="184" font-size="8" font-weight="700" fill="#333" text-anchor="middle">x2</text>
  <rect x="120" y="240" width="36" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="10"/>
  <text x="138" y="254" font-size="8" font-weight="700" fill="#333" text-anchor="middle">x3</text>
  <rect x="120" y="310" width="36" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="10"/>
  <text x="138" y="324" font-size="8" font-weight="700" fill="#333" text-anchor="middle">x4</text>

  <!-- Right arrows from inputs -->
  <line x1="156" y1="110" x2="172" y2="110" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="156" y1="180" x2="172" y2="180" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="156" y1="250" x2="172" y2="250" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="156" y1="320" x2="172" y2="320" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== 4x4 PE Grid ===== -->
  <!-- Row 0 -->
  <rect x="176" y="95" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="204" y="118" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="246" y="95" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="274" y="118" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="316" y="95" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="344" y="118" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="386" y="95" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="414" y="118" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>

  <!-- Row 1 -->
  <rect x="176" y="165" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="204" y="188" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="246" y="165" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="274" y="188" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="316" y="165" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="344" y="188" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="386" y="165" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="414" y="188" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>

  <!-- Row 2 -->
  <rect x="176" y="235" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="204" y="258" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="246" y="235" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="274" y="258" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="316" y="235" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="344" y="258" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="386" y="235" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="414" y="258" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>

  <!-- Row 3 -->
  <rect x="176" y="305" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="204" y="328" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="246" y="305" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="274" y="328" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="316" y="305" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="344" y="328" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>
  <rect x="386" y="305" width="56" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="4"/>
  <text x="414" y="328" font-size="8" font-weight="700" fill="#333" text-anchor="middle">MAC</text>

  <!-- Inter-PE arrows (horizontal) -->
  <line x1="232" y1="115" x2="244" y2="115" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="302" y1="115" x2="314" y2="115" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="372" y1="115" x2="384" y2="115" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- Inter-PE arrows (vertical) -->
  <line x1="204" y1="135" x2="204" y2="163" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="274" y1="135" x2="274" y2="163" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="344" y1="135" x2="344" y2="163" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- ===== Output labels (right) ===== -->
  <line x1="442" y1="115" x2="470" y2="115" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <rect x="472" y="100" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="10"/>
  <text x="490" y="115" font-size="8" font-weight="700" fill="#333" text-anchor="middle">y1</text>

  <line x1="442" y1="185" x2="470" y2="185" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <rect x="472" y="172" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="10"/>
  <text x="490" y="187" font-size="8" font-weight="700" fill="#333" text-anchor="middle">y2</text>

  <line x1="442" y1="255" x2="470" y2="255" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <rect x="472" y="242" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="10"/>
  <text x="490" y="257" font-size="8" font-weight="700" fill="#333" text-anchor="middle">y3</text>

  <line x1="442" y1="325" x2="470" y2="325" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arr-g)"/>
  <rect x="472" y="312" width="36" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="10"/>
  <text x="490" y="327" font-size="8" font-weight="700" fill="#333" text-anchor="middle">y4</text>

  <text x="490" y="355" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Outputs</text>

  <!-- ===== Right side: Efficiency callout ===== -->
  <rect x="550" y="90" width="310" height="100" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="5"/>
  <text x="705" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">TPUv1: 256 x 256 Systolic Array</text>
  <text x="705" y="135" font-size="9" fill="#333" text-anchor="middle">65,536 MACs operating simultaneously</text>
  <text x="705" y="155" font-size="9" fill="#333" text-anchor="middle">Each weight loaded once, used 256 times</text>
  <text x="705" y="175" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Data reuse is the key to efficiency</text>

  <!-- ===== Right side: Key insight ===== -->
  <rect x="550" y="210" width="310" height="90" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="705" y="235" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Why "Systolic"?</text>
  <text x="705" y="255" font-size="9" fill="#555" text-anchor="middle">Named after the heart's rhythmic pumping.</text>
  <text x="705" y="270" font-size="9" fill="#555" text-anchor="middle">Data ripples through the array like</text>
  <text x="705" y="285" font-size="9" fill="#555" text-anchor="middle">blood through the circulatory system.</text>

  <!-- ===== Comparison table ===== -->
  <rect x="550" y="320" width="310" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4"/>
  <text x="705" y="342" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Without systolic reuse:</text>
  <text x="705" y="358" font-size="9" fill="#333" text-anchor="middle">Each weight fetched from DRAM every cycle</text>
  <text x="705" y="372" font-size="9" fill="#333" text-anchor="middle">= 256x more memory bandwidth required</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Systolic arrays maximize data reuse by passing values between nearest-neighbor processing elements (Kung &amp; Leiserson, 1979).</text>
</svg>
