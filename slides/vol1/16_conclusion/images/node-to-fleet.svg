<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">From Node to Fleet: Volume I to Volume II</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left Panel: Volume I — The Node ===== -->
  <rect x="30" y="50" width="370" height="370" rx="6" fill="#f7f7f7" stroke="#4a90c4" stroke-width="2"/>
  <text x="215" y="72" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Mastering the ML Node</text>
  <rect x="165" y="78" width="100" height="18" rx="9" fill="#a31f34"/>
  <text x="215" y="91" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Volume I</text>

  <!-- CPU -->
  <rect x="145" y="110" width="140" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="215" y="132" font-size="10" font-weight="700" fill="#333" text-anchor="middle">CPU</text>

  <!-- PCIe bus -->
  <line x1="215" y1="145" x2="215" y2="165" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="248" y="158" font-size="7" fill="#4a90c4">PCIe</text>

  <!-- GPU boxes -->
  <rect x="60" y="170" width="70" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="95" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>
  <rect x="140" y="170" width="70" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="175" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>
  <rect x="220" y="170" width="70" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>
  <rect x="300" y="170" width="70" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="335" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <!-- NVLink connections -->
  <line x1="130" y1="195" x2="140" y2="195" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="210" y1="195" x2="220" y2="195" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="290" y1="195" x2="300" y2="195" stroke="#3d9e5a" stroke-width="2"/>
  <text x="215" y="232" font-size="8" fill="#3d9e5a" text-anchor="middle" font-weight="600">NVLink (900 GB/s)</text>

  <!-- Shared Memory -->
  <rect x="60" y="245" width="310" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="215" y="264" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Shared Memory (HBM3: 80 GB per GPU)</text>

  <!-- Labels -->
  <text x="215" y="300" font-size="9" fill="#555" text-anchor="middle">1-8 GPUs  |  DataParallel  |  Single OS</text>
  <text x="215" y="315" font-size="8.5" fill="#555" text-anchor="middle">Iron Law: chip-level analysis</text>

  <!-- Skills list -->
  <text x="60" y="340" font-size="8" fill="#333">Bottleneck diagnosis</text>
  <text x="60" y="355" font-size="8" fill="#333">Arithmetic intensity</text>
  <text x="60" y="370" font-size="8" fill="#333">Data pipeline optimization</text>
  <text x="200" y="340" font-size="8" fill="#333">Model compression</text>
  <text x="200" y="355" font-size="8" fill="#333">Drift monitoring</text>
  <text x="200" y="370" font-size="8" fill="#333">Hardware co-design</text>

  <!-- ===== Center Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="420" stroke="#a31f34" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <rect x="420" y="195" width="60" height="40" rx="4" fill="#a31f34"/>
  <text x="450" y="212" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Scale</text>
  <text x="450" y="225" font-size="7" fill="#fdd" text-anchor="middle">Node → Fleet</text>

  <!-- ===== Right Panel: Volume II — The Fleet ===== -->
  <rect x="500" y="50" width="370" height="370" rx="6" fill="#f7f7f7" stroke="#c87b2a" stroke-width="2"/>
  <text x="685" y="72" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Orchestrating the ML Fleet</text>
  <rect x="635" y="78" width="100" height="18" rx="9" fill="#a31f34"/>
  <text x="685" y="91" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Volume II</text>

  <!-- Multiple nodes (simplified) -->
  <rect x="520" y="110" width="100" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="570" y="135" font-size="8" font-weight="600" fill="#333" text-anchor="middle">Node A</text>
  <text x="570" y="148" font-size="7" fill="#555" text-anchor="middle">4 GPUs</text>

  <rect x="635" y="110" width="100" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="685" y="135" font-size="8" font-weight="600" fill="#333" text-anchor="middle">Node B</text>
  <text x="685" y="148" font-size="7" fill="#555" text-anchor="middle">4 GPUs</text>

  <rect x="750" y="110" width="100" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="800" y="135" font-size="8" font-weight="600" fill="#333" text-anchor="middle">Node C</text>
  <text x="800" y="148" font-size="7" fill="#555" text-anchor="middle">4 GPUs</text>

  <!-- Network fabric lines (dashed orange) -->
  <line x1="620" y1="140" x2="635" y2="140" stroke="#c87b2a" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="735" y1="140" x2="750" y2="140" stroke="#c87b2a" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="570" y1="170" x2="685" y2="185" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="685" y1="185" x2="800" y2="170" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="685" y="200" font-size="8" fill="#c87b2a" text-anchor="middle" font-weight="600">InfiniBand / Ethernet Fabric</text>

  <!-- New challenge badges -->
  <rect x="520" y="215" width="205" height="24" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="622" y="231" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">MTBF: years → hours</text>

  <rect x="520" y="245" width="205" height="24" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="622" y="261" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Memory BW → Network topology</text>

  <rect x="520" y="275" width="205" height="24" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="622" y="291" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">torch.distributed, Slurm, K8s</text>

  <!-- Volume II Pillars -->
  <rect x="520" y="320" width="105" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="572" y="340" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Compute</text>
  <text x="572" y="352" font-size="7" fill="#555" text-anchor="middle">Infrastructure</text>

  <rect x="635" y="320" width="105" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="687" y="340" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Distributed</text>
  <text x="687" y="352" font-size="7" fill="#555" text-anchor="middle">Training</text>

  <rect x="750" y="320" width="105" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="802" y="340" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Fleet</text>
  <text x="802" y="352" font-size="7" fill="#555" text-anchor="middle">Operations</text>

  <text x="685" y="390" font-size="9" fill="#555" text-anchor="middle">Same physics, new variables</text>
  <text x="685" y="405" font-size="8.5" fill="#555" text-anchor="middle">Iron Law: rack-level and zone-level</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The unit is mastered. The collective awaits.</text>
</svg>
