<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Conservation of Complexity</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow-bi" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Central D-A-M Triangle ===== -->

  <!-- Data vertex (top) -->
  <circle cx="450" cy="80" r="38" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Data</text>
  <text x="450" y="92" font-size="8" fill="#555" text-anchor="middle">(D)</text>

  <!-- Algorithm vertex (bottom-left) -->
  <circle cx="300" cy="220" r="38" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="300" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Algorithm</text>
  <text x="300" y="232" font-size="8" fill="#555" text-anchor="middle">(A)</text>

  <!-- Machine vertex (bottom-right) -->
  <circle cx="600" cy="220" r="38" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="600" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Machine</text>
  <text x="600" y="232" font-size="8" fill="#555" text-anchor="middle">(M)</text>

  <!-- Bidirectional arrows between vertices -->
  <line x1="420" y1="110" x2="330" y2="190" stroke="#555" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-bi)"/>
  <line x1="480" y1="110" x2="570" y2="190" stroke="#555" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-bi)"/>
  <line x1="340" y1="220" x2="560" y2="220" stroke="#555" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-bi)"/>

  <!-- Center label -->
  <text x="450" y="172" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Complexity is conserved</text>
  <text x="450" y="186" font-size="8" fill="#555" text-anchor="middle">Cannot be destroyed, only transferred</text>

  <!-- ===== Example 1: Quantization (bottom-left) ===== -->
  <rect x="40" y="290" width="380" height="150" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="230" y="312" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Example: FP16 → INT8 Quantization</text>

  <!-- Wins (green) -->
  <rect x="55" y="324" width="170" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="140" y="340" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Gains</text>
  <text x="65" y="356" font-size="8" fill="#333">Reduces BW demand (4x)</text>
  <text x="65" y="370" font-size="8" fill="#333">Enables mobile NPU</text>

  <!-- Costs (red) -->
  <rect x="235" y="324" width="175" height="55" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="322" y="340" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Costs</text>
  <text x="245" y="356" font-size="8" fill="#333">Monitoring complexity</text>
  <text x="245" y="370" font-size="8" fill="#333">Training-serving skew risk</text>

  <!-- Arrow showing transfer -->
  <text x="230" y="422" font-size="8" fill="#a31f34" text-anchor="middle" font-weight="600">Machine complexity → Monitoring complexity</text>

  <!-- ===== Example 2: Abstraction Layers (bottom-right) ===== -->
  <rect x="480" y="290" width="380" height="150" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="670" y="312" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Example: Framework Abstraction</text>

  <!-- Wins (green) -->
  <rect x="495" y="324" width="170" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="580" y="340" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Gains</text>
  <text x="505" y="356" font-size="8" fill="#333">Simplifies interface</text>
  <text x="505" y="370" font-size="8" fill="#333">Speeds up development</text>

  <!-- Costs (red) -->
  <rect x="675" y="324" width="175" height="55" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="762" y="340" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Costs</text>
  <text x="685" y="356" font-size="8" fill="#333">Hides resource usage</text>
  <text x="685" y="370" font-size="8" fill="#333">Limits optimization paths</text>

  <!-- Arrow showing transfer -->
  <text x="670" y="422" font-size="8" fill="#a31f34" text-anchor="middle" font-weight="600">Algorithm complexity → Implementation complexity</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Every optimization is a complexity transfer, not a complexity elimination.</text>
</svg>
