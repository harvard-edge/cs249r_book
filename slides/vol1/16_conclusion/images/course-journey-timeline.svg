<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Five Lighthouses, Sixteen Chapters</text>

  <!-- ===== Timeline Bar ===== -->
  <line x1="50" y1="130" x2="850" y2="130" stroke="#bbb" stroke-width="2"/>

  <!-- Phase backgrounds -->
  <rect x="50" y="120" width="200" height="20" rx="0" fill="#cfe2f3" opacity="0.4"/>
  <rect x="250" y="120" width="200" height="20" rx="0" fill="#d4edda" opacity="0.4"/>
  <rect x="450" y="120" width="200" height="20" rx="0" fill="#fdebd0" opacity="0.4"/>
  <rect x="650" y="120" width="200" height="20" rx="0" fill="#f9d6d5" opacity="0.4"/>

  <!-- Phase labels -->
  <text x="150" y="115" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Foundations</text>
  <text x="350" y="115" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Build</text>
  <text x="550" y="115" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Optimize</text>
  <text x="750" y="115" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Deploy</text>

  <!-- Chapter markers -->
  <circle cx="75" cy="130" r="5" fill="#4a90c4"/>
  <text x="75" y="155" font-size="7" fill="#555" text-anchor="middle">1</text>
  <circle cx="125" cy="130" r="5" fill="#4a90c4"/>
  <text x="125" y="155" font-size="7" fill="#555" text-anchor="middle">2</text>
  <circle cx="175" cy="130" r="5" fill="#4a90c4"/>
  <text x="175" y="155" font-size="7" fill="#555" text-anchor="middle">3</text>
  <circle cx="225" cy="130" r="5" fill="#4a90c4"/>
  <text x="225" y="155" font-size="7" fill="#555" text-anchor="middle">4</text>
  <circle cx="275" cy="130" r="5" fill="#3d9e5a"/>
  <text x="275" y="155" font-size="7" fill="#555" text-anchor="middle">5</text>
  <circle cx="325" cy="130" r="5" fill="#3d9e5a"/>
  <text x="325" y="155" font-size="7" fill="#555" text-anchor="middle">6</text>
  <circle cx="375" cy="130" r="5" fill="#3d9e5a"/>
  <text x="375" y="155" font-size="7" fill="#555" text-anchor="middle">7</text>
  <circle cx="425" cy="130" r="5" fill="#3d9e5a"/>
  <text x="425" y="155" font-size="7" fill="#555" text-anchor="middle">8</text>
  <circle cx="475" cy="130" r="5" fill="#c87b2a"/>
  <text x="475" y="155" font-size="7" fill="#555" text-anchor="middle">9</text>
  <circle cx="525" cy="130" r="5" fill="#c87b2a"/>
  <text x="525" y="155" font-size="7" fill="#555" text-anchor="middle">10</text>
  <circle cx="575" cy="130" r="5" fill="#c87b2a"/>
  <text x="575" y="155" font-size="7" fill="#555" text-anchor="middle">11</text>
  <circle cx="625" cy="130" r="5" fill="#c87b2a"/>
  <text x="625" y="155" font-size="7" fill="#555" text-anchor="middle">12</text>
  <circle cx="675" cy="130" r="5" fill="#c44"/>
  <text x="675" y="155" font-size="7" fill="#555" text-anchor="middle">13</text>
  <circle cx="725" cy="130" r="5" fill="#c44"/>
  <text x="725" y="155" font-size="7" fill="#555" text-anchor="middle">14</text>
  <circle cx="775" cy="130" r="5" fill="#c44"/>
  <text x="775" y="155" font-size="7" fill="#555" text-anchor="middle">15</text>
  <circle cx="825" cy="130" r="5" fill="#c44"/>
  <text x="825" y="155" font-size="7" fill="#555" text-anchor="middle">16</text>

  <!-- ===== Lighthouse Badges (above timeline) ===== -->
  <!-- ResNet-50 -->
  <rect x="257" y="55" width="86" height="22" rx="11" fill="#4a90c4"/>
  <text x="300" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">ResNet-50</text>
  <line x1="300" y1="77" x2="300" y2="120" stroke="#4a90c4" stroke-width="1"/>
  <text x="300" y="50" font-size="7" fill="#4a90c4" text-anchor="middle">Compute-bound</text>

  <!-- GPT-2/Llama -->
  <rect x="390" y="55" width="86" height="22" rx="11" fill="#3d9e5a"/>
  <text x="433" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">GPT-2/Llama</text>
  <line x1="433" y1="77" x2="433" y2="120" stroke="#3d9e5a" stroke-width="1"/>
  <text x="433" y="50" font-size="7" fill="#3d9e5a" text-anchor="middle">Memory BW</text>

  <!-- MobileNetV2 -->
  <rect x="507" y="55" width="86" height="22" rx="11" fill="#c87b2a"/>
  <text x="550" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">MobileNetV2</text>
  <line x1="550" y1="77" x2="550" y2="120" stroke="#c87b2a" stroke-width="1"/>
  <text x="550" y="50" font-size="7" fill="#c87b2a" text-anchor="middle">Efficiency</text>

  <!-- DLRM -->
  <rect x="190" y="55" width="56" height="22" rx="11" fill="#c44"/>
  <text x="218" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">DLRM</text>
  <line x1="218" y1="77" x2="218" y2="120" stroke="#c44" stroke-width="1"/>
  <text x="218" y="50" font-size="7" fill="#c44" text-anchor="middle">Capacity</text>

  <!-- KWS -->
  <rect x="647" y="55" width="56" height="22" rx="11" fill="#888"/>
  <text x="675" y="70" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">KWS</text>
  <line x1="675" y1="77" x2="675" y2="120" stroke="#888" stroke-width="1"/>
  <text x="675" y="50" font-size="7" fill="#888" text-anchor="middle">Every resource</text>

  <!-- ===== MobileNetV2 Journey Trace (lower section) ===== -->
  <text x="450" y="185" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Lighthouse Journey: MobileNetV2</text>

  <!-- Journey boxes -->
  <rect x="35" y="200" width="110" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="90" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Foundations</text>
  <text x="90" y="232" font-size="7.5" fill="#555" text-anchor="middle">Bounded by</text>
  <text x="90" y="244" font-size="7.5" fill="#555" text-anchor="middle">Machine (battery)</text>

  <rect x="160" y="200" width="110" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="215" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Architecture</text>
  <text x="215" y="232" font-size="7.5" fill="#555" text-anchor="middle">Depthwise separable:</text>
  <text x="215" y="244" font-size="7.5" fill="#555" text-anchor="middle">8-9x fewer FLOPs</text>

  <rect x="285" y="200" width="110" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="340" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="340" y="232" font-size="7.5" fill="#555" text-anchor="middle">Data augmentation</text>
  <text x="340" y="244" font-size="7.5" fill="#555" text-anchor="middle">for robustness</text>

  <rect x="410" y="200" width="110" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="465" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Compression</text>
  <text x="465" y="232" font-size="7.5" fill="#555" text-anchor="middle">INT8: 4x memory,</text>
  <text x="465" y="244" font-size="7.5" fill="#555" text-anchor="middle">&lt;1% acc loss</text>

  <rect x="535" y="200" width="110" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="590" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Acceleration</text>
  <text x="590" y="232" font-size="7.5" fill="#555" text-anchor="middle">Mobile NPU</text>
  <text x="590" y="244" font-size="7.5" fill="#555" text-anchor="middle">(Apple Neural Eng.)</text>

  <rect x="660" y="200" width="110" height="70" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="715" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Serving</text>
  <text x="715" y="232" font-size="7.5" fill="#555" text-anchor="middle">P99 &lt; 50ms;</text>
  <text x="715" y="244" font-size="7.5" fill="#555" text-anchor="middle">CPU preproc bottleneck</text>

  <rect x="785" y="200" width="110" height="70" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="840" y="218" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Operations</text>
  <text x="840" y="232" font-size="7.5" fill="#555" text-anchor="middle">Drift across device</text>
  <text x="840" y="244" font-size="7.5" fill="#555" text-anchor="middle">populations</text>

  <!-- Arrows between journey boxes -->
  <line x1="145" y1="235" x2="160" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="235" x2="285" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="395" y1="235" x2="410" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="235" x2="535" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="235" x2="660" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="235" x2="785" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Key insight -->
  <rect x="160" y="290" width="580" height="32" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="310" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Each row constrains the next: architecture enabled compression, which enabled acceleration, which shaped serving.</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Different workloads expose different physics. The same twelve invariants govern all five.</text>
</svg>
