<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Iron Law as Optimizer: One Decision, Six Invariants</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Central Equation Box ===== -->
  <rect x="270" y="170" width="360" height="70" rx="6" fill="#fff" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="195" font-size="13" font-weight="700" fill="#333" text-anchor="middle">T = D_vol / BW + O / (R_peak · η) + L_lat</text>
  <text x="330" y="215" font-size="9" fill="#3d9e5a" text-anchor="middle" font-weight="600">Data Movement</text>
  <text x="450" y="215" font-size="9" fill="#4a90c4" text-anchor="middle" font-weight="600">Compute</text>
  <text x="570" y="215" font-size="9" fill="#c87b2a" text-anchor="middle" font-weight="600">Overhead</text>
  <text x="450" y="230" font-size="8" fill="#999" text-anchor="middle" font-style="italic">Three levers, every optimization pulls one</text>

  <!-- ===== Technique Boxes (radiating) ===== -->

  <!-- 1. Data Parallelism (top-right, blue) -->
  <rect x="660" y="60" width="180" height="44" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="750" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Parallelism</text>
  <text x="750" y="93" font-size="8" fill="#555" text-anchor="middle">Distribute work across GPUs</text>
  <line x1="630" y1="178" x2="660" y2="95" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Mixed Precision (top-left, green) -->
  <rect x="60" y="60" width="180" height="44" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Mixed Precision</text>
  <text x="150" y="93" font-size="8" fill="#555" text-anchor="middle">FP16 halves data transfer</text>
  <line x1="270" y1="185" x2="240" y2="95" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Gradient Checkpointing (left, dashed) -->
  <rect x="60" y="185" width="180" height="44" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="150" y="203" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Gradient Checkpointing</text>
  <text x="150" y="218" font-size="8" fill="#555" text-anchor="middle">Recompute vs store</text>
  <line x1="240" y1="207" x2="270" y2="207" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- 4. Pruning (bottom-left, blue+green) -->
  <rect x="60" y="310" width="180" height="44" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="328" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Pruning</text>
  <text x="150" y="343" font-size="8" fill="#555" text-anchor="middle">Fewer params → less compute + data</text>
  <line x1="240" y1="320" x2="290" y2="240" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Quantization (bottom-center, RED HIGHLIGHT) -->
  <rect x="310" y="290" width="280" height="80" rx="6" fill="#f9d6d5" stroke="#a31f34" stroke-width="2.5"/>
  <text x="450" y="310" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Quantization (INT8)</text>
  <text x="450" y="326" font-size="8.5" fill="#333" text-anchor="middle">Reshapes everything: D_vol, R_peak, η, Arith. Intensity</text>
  <!-- Sub-arrows to affected invariants -->
  <text x="325" y="350" font-size="7.5" fill="#555" text-anchor="start">Pareto</text>
  <text x="380" y="350" font-size="7.5" fill="#555" text-anchor="start">Silicon</text>
  <text x="430" y="350" font-size="7.5" fill="#555" text-anchor="start">Arith.Int.</text>
  <text x="495" y="350" font-size="7.5" fill="#555" text-anchor="start">Energy</text>
  <text x="542" y="350" font-size="7.5" fill="#555" text-anchor="start">Skew</text>
  <!-- Dots between -->
  <circle cx="373" cy="347" r="1.5" fill="#a31f34"/>
  <circle cx="425" cy="347" r="1.5" fill="#a31f34"/>
  <circle cx="490" cy="347" r="1.5" fill="#a31f34"/>
  <circle cx="537" cy="347" r="1.5" fill="#a31f34"/>
  <!-- Arrow from quantization to equation -->
  <line x1="450" y1="290" x2="450" y2="240" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- 6. Operator Fusion (right, orange) -->
  <rect x="660" y="185" width="180" height="44" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="750" y="203" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Operator Fusion</text>
  <text x="750" y="218" font-size="8" fill="#555" text-anchor="middle">Eliminate kernel launch overhead</text>
  <line x1="660" y1="207" x2="630" y2="207" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Bottom Legend ===== -->
  <rect x="200" y="400" width="500" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="418" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Profile first. Optimize second.</text>
  <text x="450" y="432" font-size="8" fill="#555" text-anchor="middle">Identify the dominant Iron Law term before investing engineering effort</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">A single engineering decision ripples through the entire invariant web.</text>
</svg>
