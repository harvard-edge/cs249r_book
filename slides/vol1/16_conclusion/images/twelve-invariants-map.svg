<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Twelve Invariants, Four Phases</text>

  <!-- ===== Defs: Arrow markers ===== -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- ===== Central Hub: Conservation of Complexity ===== -->
  <rect x="350" y="200" width="200" height="60" rx="30" fill="#a31f34" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="224" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Conservation of</text>
  <text x="450" y="238" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Complexity</text>
  <text x="450" y="253" font-size="7.5" fill="#fdd" text-anchor="middle">Complexity flows, never disappears</text>

  <!-- ===== Quadrant I: Foundations (top-left, blue) ===== -->
  <rect x="40" y="50" width="280" height="130" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="72" font-size="11" font-weight="700" fill="#333" text-anchor="middle">I: Foundations</text>
  <rect x="60" y="82" width="120" height="24" rx="12" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="120" y="98" font-size="9" font-weight="600" fill="#333" text-anchor="middle">1. Data as Code</text>
  <rect x="190" y="82" width="120" height="24" rx="12" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="250" y="98" font-size="9" font-weight="600" fill="#333" text-anchor="middle">2. Data Gravity</text>
  <text x="180" y="130" font-size="8.5" fill="#555" text-anchor="middle">What the model learns from</text>
  <text x="180" y="145" font-size="8" fill="#555" text-anchor="middle">Where data anchors compute</text>

  <!-- ===== Quadrant II: Build (top-right, green) ===== -->
  <rect x="580" y="50" width="280" height="130" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="720" y="72" font-size="11" font-weight="700" fill="#333" text-anchor="middle">II: Build</text>
  <rect x="600" y="82" width="110" height="24" rx="12" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="655" y="98" font-size="9" font-weight="600" fill="#333" text-anchor="middle">3. Iron Law</text>
  <rect x="720" y="82" width="130" height="24" rx="12" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="785" y="98" font-size="9" font-weight="600" fill="#333" text-anchor="middle">4. Silicon Contract</text>
  <text x="720" y="130" font-size="8.5" fill="#555" text-anchor="middle">How fast it runs</text>
  <text x="720" y="145" font-size="8" fill="#555" text-anchor="middle">Which hardware resource saturates</text>

  <!-- ===== Quadrant III: Optimize (bottom-right, orange) ===== -->
  <rect x="580" y="290" width="280" height="160" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="720" y="312" font-size="11" font-weight="700" fill="#333" text-anchor="middle">III: Optimize</text>
  <rect x="600" y="322" width="120" height="22" rx="11" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="660" y="337" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">5. Pareto Frontier</text>
  <rect x="730" y="322" width="120" height="22" rx="11" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="790" y="337" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">6. Arith. Intensity</text>
  <rect x="600" y="352" width="130" height="22" rx="11" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="665" y="367" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">7. Energy-Movement</text>
  <rect x="740" y="352" width="110" height="22" rx="11" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="795" y="367" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">8. Amdahl's Law</text>
  <text x="720" y="400" font-size="8.5" fill="#555" text-anchor="middle">How efficient it becomes</text>
  <text x="720" y="415" font-size="8" fill="#555" text-anchor="middle">No free improvements exist</text>

  <!-- ===== Quadrant IV: Deploy (bottom-left, red) ===== -->
  <rect x="40" y="290" width="280" height="160" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="180" y="312" font-size="11" font-weight="700" fill="#333" text-anchor="middle">IV: Deploy</text>
  <rect x="60" y="322" width="125" height="22" rx="11" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="122" y="337" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">9. Verification Gap</text>
  <rect x="195" y="322" width="115" height="22" rx="11" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="252" y="337" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">10. Statistical Drift</text>
  <rect x="60" y="352" width="135" height="22" rx="11" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="127" y="367" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">11. Train-Serve Skew</text>
  <rect x="205" y="352" width="105" height="22" rx="11" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="257" y="367" font-size="8.5" font-weight="600" fill="#333" text-anchor="middle">12. Latency Budget</text>
  <text x="180" y="400" font-size="8.5" fill="#555" text-anchor="middle">Reality defeats assumptions</text>
  <text x="180" y="415" font-size="8" fill="#555" text-anchor="middle">Feeds back to Foundations</text>

  <!-- ===== Cycle Arrows ===== -->
  <!-- Foundations -> Build (top) -->
  <line x1="320" y1="100" x2="580" y2="100" stroke="#4a90c4" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="450" y="93" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="600">Data shapes computation</text>

  <!-- Build -> Optimize (right) -->
  <line x1="720" y1="180" x2="720" y2="290" stroke="#3d9e5a" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="758" y="238" font-size="8" fill="#3d9e5a" text-anchor="start" font-weight="600">Build constrains</text>
  <text x="758" y="250" font-size="8" fill="#3d9e5a" text-anchor="start" font-weight="600">optimization</text>

  <!-- Optimize -> Deploy (bottom) -->
  <line x1="580" y1="365" x2="320" y2="365" stroke="#c87b2a" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="450" y="385" font-size="8" fill="#c87b2a" text-anchor="middle" font-weight="600">Optimization meets reality</text>

  <!-- Deploy -> Foundations (left, dashed = feedback) -->
  <line x1="180" y1="290" x2="180" y2="180" stroke="#c44" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow-red)"/>
  <text x="138" y="238" font-size="8" fill="#c44" text-anchor="end" font-weight="600">Drift forces</text>
  <text x="138" y="250" font-size="8" fill="#c44" text-anchor="end" font-weight="600">retraining</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Twelve invariants from physics, information theory, and statistics — not trends.</text>
</svg>
