<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-red-left" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#c44"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Forward and Backward Pass</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">Forward: compute predictions (N ops) | Backward: compute gradients (~2N ops)</text>

  <!-- ===== FORWARD PASS (top lane, left to right) ===== -->
  <text x="30" y="95" font-size="12" font-weight="700" fill="#4a90c4">FORWARD PASS</text>

  <!-- Input -->
  <rect x="30" y="110" width="80" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="70" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#2c7a47">Input</text>
  <text x="70" y="152" text-anchor="middle" font-size="8" fill="#3d9e5a">x (784)</text>

  <!-- Arrow -->
  <line x1="110" y1="137" x2="145" y2="137" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Linear 1 -->
  <rect x="150" y="110" width="100" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="200" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#2e6b8f">Linear 1</text>
  <text x="200" y="150" text-anchor="middle" font-size="8" fill="#4a90c4">xW1 + b1</text>

  <line x1="250" y1="137" x2="275" y2="137" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ReLU 1 -->
  <rect x="280" y="115" width="60" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="310" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#2c7a47">ReLU</text>

  <line x1="340" y1="137" x2="365" y2="137" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Linear 2 -->
  <rect x="370" y="110" width="100" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="420" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#2e6b8f">Linear 2</text>
  <text x="420" y="150" text-anchor="middle" font-size="8" fill="#4a90c4">xW2 + b2</text>

  <line x1="470" y1="137" x2="495" y2="137" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ReLU 2 -->
  <rect x="500" y="115" width="60" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="530" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#2c7a47">ReLU</text>

  <line x1="560" y1="137" x2="585" y2="137" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Linear 3 -->
  <rect x="590" y="110" width="100" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="640" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#2e6b8f">Linear 3</text>
  <text x="640" y="150" text-anchor="middle" font-size="8" fill="#4a90c4">xW3 + b3</text>

  <line x1="690" y1="137" x2="720" y2="137" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Output + Loss -->
  <rect x="725" y="110" width="70" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="760" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#2c7a47">y-hat</text>
  <text x="760" y="152" text-anchor="middle" font-size="8" fill="#3d9e5a">Softmax</text>

  <line x1="795" y1="137" x2="820" y2="137" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Loss -->
  <rect x="825" y="110" width="60" height="55" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="855" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Loss</text>
  <text x="855" y="152" text-anchor="middle" font-size="8" fill="#c44">L</text>

  <!-- ===== Activation cache arrows (orange, stored for backprop) ===== -->
  <g stroke="#c87b2a" stroke-width="1" stroke-dasharray="3,2">
    <line x1="200" y1="165" x2="200" y2="205"/>
    <line x1="420" y1="165" x2="420" y2="205"/>
    <line x1="640" y1="165" x2="640" y2="205"/>
  </g>
  <g fill="#fdebd0" stroke="#c87b2a" stroke-width="1">
    <rect x="165" y="205" width="70" height="25" rx="3"/>
    <rect x="385" y="205" width="70" height="25" rx="3"/>
    <rect x="605" y="205" width="70" height="25" rx="3"/>
  </g>
  <g font-size="8" font-weight="700" fill="#8a5a1e" text-anchor="middle">
    <text x="200" y="222">Cache A1</text>
    <text x="420" y="222">Cache A2</text>
    <text x="640" y="222">Cache A3</text>
  </g>
  <text x="450" y="250" text-anchor="middle" font-size="9" fill="#c87b2a">Activations stored during forward pass for use in backward pass</text>

  <!-- ===== BACKWARD PASS (bottom lane, right to left) ===== -->
  <text x="30" y="285" font-size="12" font-weight="700" fill="#c44">BACKWARD PASS</text>

  <!-- Loss gradient start -->
  <rect x="825" y="295" width="60" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="855" y="318" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">dL/dy</text>

  <line x1="825" y1="320" x2="700" y2="320" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red-left)"/>

  <!-- Grad block 3 -->
  <rect x="590" y="295" width="105" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="642" y="312" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">dL/dW3</text>
  <text x="642" y="325" text-anchor="middle" font-size="8" fill="#c44">dL/db3</text>
  <text x="642" y="338" text-anchor="middle" font-size="8" fill="#c44">dL/dA2</text>

  <line x1="590" y1="320" x2="480" y2="320" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red-left)"/>

  <!-- Grad block 2 -->
  <rect x="370" y="295" width="105" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="422" y="312" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">dL/dW2</text>
  <text x="422" y="325" text-anchor="middle" font-size="8" fill="#c44">dL/db2</text>
  <text x="422" y="338" text-anchor="middle" font-size="8" fill="#c44">dL/dA1</text>

  <line x1="370" y1="320" x2="260" y2="320" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red-left)"/>

  <!-- Grad block 1 -->
  <rect x="150" y="295" width="105" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="202" y="312" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">dL/dW1</text>
  <text x="202" y="325" text-anchor="middle" font-size="8" fill="#c44">dL/db1</text>
  <text x="202" y="338" text-anchor="middle" font-size="8" fill="#c44">dL/dx</text>

  <!-- ===== Cost summary ===== -->
  <rect x="60" y="375" width="350" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="235" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#2e6b8f">Forward: N operations</text>
  <text x="235" y="416" text-anchor="middle" font-size="10" fill="#4a90c4">One matrix multiply per layer</text>

  <rect x="440" y="375" width="350" height="55" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="615" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Backward: ~2N operations</text>
  <text x="615" y="416" text-anchor="middle" font-size="10" fill="#c44">3 gradients per layer (dW, db, dA)</text>

  <!-- ===== Total cost badge ===== -->
  <rect x="310" y="442" width="280" height="30" rx="15" fill="#a31f34"/>
  <text x="450" y="462" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Training: ~3N ops per sample</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="492" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Backprop computes gradients; gradient descent applies updates — they are not the same thing</text>
</svg>
