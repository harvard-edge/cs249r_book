<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Activation Functions: Math Meets Silicon</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">Nonlinearity enables learning, but hardware cost varies by 1,000x</text>

  <!-- ===== Sigmoid (error red) ===== -->
  <rect x="30" y="75" width="270" height="240" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="165" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Sigmoid</text>
  <text x="165" y="118" text-anchor="middle" font-size="10" fill="#c44">1 / (1 + e^-z)</text>

  <!-- Sigmoid curve approximation -->
  <g transform="translate(55,130)">
    <!-- Axes -->
    <line x1="0" y1="70" x2="220" y2="70" stroke="#bbb" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="140" stroke="#bbb" stroke-width="1"/>
    <!-- Curve -->
    <path d="M 10,130 C 30,128 50,125 70,115 C 90,100 100,85 110,70 C 120,55 130,40 150,25 C 170,15 190,12 210,10" fill="none" stroke="#c44" stroke-width="2.5"/>
    <!-- Labels -->
    <text x="0" y="65" font-size="8" fill="#999">0</text>
    <text x="0" y="10" font-size="8" fill="#999">1</text>
    <text x="210" y="85" font-size="8" fill="#999">z</text>
  </g>

  <!-- Sigmoid properties -->
  <text x="165" y="288" text-anchor="middle" font-size="9" fill="#555">Range: (0, 1)</text>
  <text x="165" y="303" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Saturates: vanishing gradient</text>

  <!-- ===== Tanh (routing orange) ===== -->
  <rect x="315" y="75" width="270" height="240" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tanh</text>
  <text x="450" y="118" text-anchor="middle" font-size="10" fill="#c87b2a">tanh(z)</text>

  <!-- Tanh curve approximation -->
  <g transform="translate(340,130)">
    <!-- Axes -->
    <line x1="0" y1="70" x2="220" y2="70" stroke="#bbb" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="140" stroke="#bbb" stroke-width="1"/>
    <!-- Curve -->
    <path d="M 10,135 C 30,132 50,128 70,118 C 90,98 100,82 110,70 C 120,58 130,42 150,22 C 170,12 190,8 210,5" fill="none" stroke="#c87b2a" stroke-width="2.5"/>
    <!-- Labels -->
    <text x="0" y="15" font-size="8" fill="#999">1</text>
    <text x="0" y="135" font-size="8" fill="#999">-1</text>
    <text x="210" y="85" font-size="8" fill="#999">z</text>
  </g>

  <!-- Tanh properties -->
  <text x="450" y="288" text-anchor="middle" font-size="9" fill="#555">Range: (-1, 1), zero-centered</text>
  <text x="450" y="303" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Saturates: vanishing gradient</text>

  <!-- ===== ReLU (data green) ===== -->
  <rect x="600" y="75" width="270" height="240" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="735" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ReLU</text>
  <text x="735" y="118" text-anchor="middle" font-size="10" fill="#3d9e5a">max(0, z)</text>

  <!-- ReLU curve -->
  <g transform="translate(625,130)">
    <!-- Axes -->
    <line x1="0" y1="70" x2="220" y2="70" stroke="#bbb" stroke-width="1"/>
    <line x1="110" y1="0" x2="110" y2="140" stroke="#bbb" stroke-width="1"/>
    <!-- Curve: flat then linear -->
    <line x1="10" y1="70" x2="110" y2="70" stroke="#3d9e5a" stroke-width="2.5"/>
    <line x1="110" y1="70" x2="210" y2="5" stroke="#3d9e5a" stroke-width="2.5"/>
    <!-- Labels -->
    <text x="210" y="85" font-size="8" fill="#999">z</text>
  </g>

  <!-- ReLU properties -->
  <text x="735" y="288" text-anchor="middle" font-size="9" fill="#555">Range: [0, inf), sparse output</text>
  <text x="735" y="303" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Constant gradient (1 or 0)</text>

  <!-- ===== Silicon Cost Comparison Bar ===== -->
  <rect x="30" y="340" width="840" height="80" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Silicon Cost: The Transistor Tax</text>

  <!-- Sigmoid/Tanh bar -->
  <rect x="50" y="375" width="500" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="300" y="395" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Sigmoid/Tanh: ~10,000 transistors (exp, division)</text>

  <!-- ReLU bar -->
  <rect x="560" y="375" width="100" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="610" y="395" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">ReLU: ~10</text>

  <!-- 1000x badge -->
  <rect x="690" y="372" width="160" height="36" rx="18" fill="#a31f34"/>
  <text x="770" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1,000x cheaper</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="460" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Silicon efficiency drove the shift from biologically plausible sigmoid to silicon-efficient ReLU</text>
</svg>
