<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">MNIST Classifier: 784 - 128 - 64 - 10</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">109,386 parameters, ~427 KB — small enough to understand, large enough to learn</text>

  <!-- ===== Layer columns ===== -->

  <!-- Input Layer (784) - neutral gray -->
  <rect x="40" y="80" width="100" height="280" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="90" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Input</text>
  <text x="90" y="116" text-anchor="middle" font-size="10" fill="#555">784 pixels</text>
  <!-- Dots representing neurons -->
  <g fill="#bbb">
    <circle cx="90" cy="140" r="4"/><circle cx="90" cy="155" r="4"/><circle cx="90" cy="170" r="4"/>
    <circle cx="90" cy="185" r="4"/><circle cx="90" cy="200" r="4"/><circle cx="90" cy="215" r="4"/>
    <text x="90" y="240" text-anchor="middle" font-size="10" fill="#999">...</text>
    <circle cx="90" cy="260" r="4"/><circle cx="90" cy="275" r="4"/><circle cx="90" cy="290" r="4"/>
    <circle cx="90" cy="305" r="4"/><circle cx="90" cy="320" r="4"/><circle cx="90" cy="335" r="4"/>
  </g>

  <!-- Hidden 1 (128) - compute blue -->
  <rect x="230" y="80" width="100" height="280" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Hidden 1</text>
  <text x="280" y="116" text-anchor="middle" font-size="10" fill="#4a90c4">128 neurons</text>
  <g fill="#4a90c4">
    <circle cx="280" cy="145" r="4"/><circle cx="280" cy="165" r="4"/><circle cx="280" cy="185" r="4"/>
    <circle cx="280" cy="205" r="4"/>
    <text x="280" y="235" text-anchor="middle" font-size="10" fill="#4a90c4">...</text>
    <circle cx="280" cy="260" r="4"/><circle cx="280" cy="280" r="4"/><circle cx="280" cy="300" r="4"/>
    <circle cx="280" cy="320" r="4"/>
  </g>

  <!-- Hidden 2 (64) - lighter compute blue -->
  <rect x="420" y="110" width="100" height="220" rx="4" fill="#e3f0fa" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="470" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Hidden 2</text>
  <text x="470" y="146" text-anchor="middle" font-size="10" fill="#4a90c4">64 neurons</text>
  <g fill="#6baed6">
    <circle cx="470" cy="170" r="4"/><circle cx="470" cy="190" r="4"/><circle cx="470" cy="210" r="4"/>
    <text x="470" y="240" text-anchor="middle" font-size="10" fill="#6baed6">...</text>
    <circle cx="470" cy="265" r="4"/><circle cx="470" cy="285" r="4"/><circle cx="470" cy="305" r="4"/>
  </g>

  <!-- Output (10) - data green -->
  <rect x="610" y="150" width="100" height="140" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Output</text>
  <text x="660" y="186" text-anchor="middle" font-size="10" fill="#3d9e5a">10 classes</text>
  <g fill="#3d9e5a">
    <circle cx="660" cy="205" r="4"/><circle cx="660" cy="220" r="4"/><circle cx="660" cy="235" r="4"/>
    <circle cx="660" cy="250" r="4"/><circle cx="660" cy="265" r="4"/>
  </g>

  <!-- ===== Connection bundles ===== -->
  <!-- Layer 1 connections (thick, dominant) -->
  <rect x="140" y="185" width="90" height="40" rx="4" fill="none" stroke="#a31f34" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="185" y="202" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">100,352</text>
  <text x="185" y="216" text-anchor="middle" font-size="8" fill="#a31f34">393 KB</text>

  <!-- Layer 2 connections -->
  <rect x="330" y="195" width="90" height="40" rx="4" fill="none" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="375" y="212" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">8,192</text>
  <text x="375" y="226" text-anchor="middle" font-size="8" fill="#4a90c4">32 KB</text>

  <!-- Layer 3 connections -->
  <rect x="520" y="205" width="90" height="35" rx="4" fill="none" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="565" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">640</text>
  <text x="565" y="233" text-anchor="middle" font-size="8" fill="#3d9e5a">2.5 KB</text>

  <!-- ===== Layer 1 Dominance Callout ===== -->
  <rect x="55" y="370" width="230" height="50" rx="4" fill="#a31f34"/>
  <text x="170" y="392" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Layer 1 = 92% of all</text>
  <text x="170" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">parameters and MACs</text>

  <!-- ===== Parameter Table ===== -->
  <rect x="320" y="370" width="550" height="80" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <g font-size="9" fill="#333">
    <text x="340" y="390" font-weight="700">Layer</text>
    <text x="460" y="390" font-weight="700">Weights</text>
    <text x="570" y="390" font-weight="700">Biases</text>
    <text x="660" y="390" font-weight="700">Total</text>
    <text x="760" y="390" font-weight="700">Memory</text>

    <text x="340" y="407" fill="#a31f34" font-weight="700">1: 784x128</text>
    <text x="460" y="407">100,352</text>
    <text x="570" y="407">128</text>
    <text x="660" y="407" fill="#a31f34" font-weight="700">100,480</text>
    <text x="760" y="407" fill="#a31f34">393 KB</text>

    <text x="340" y="422">2: 128x64</text>
    <text x="460" y="422">8,192</text>
    <text x="570" y="422">64</text>
    <text x="660" y="422">8,256</text>
    <text x="760" y="422">32 KB</text>

    <text x="340" y="437">3: 64x10</text>
    <text x="460" y="437">640</text>
    <text x="570" y="437">10</text>
    <text x="660" y="437">650</text>
    <text x="760" y="437">2.5 KB</text>
  </g>

  <!-- ===== Footnote ===== -->
  <text x="450" y="480" text-anchor="middle" font-size="9" font-style="italic" fill="#999">427 KB exceeds most L1 caches (~64 KB) — every inference forces memory traffic</text>
</svg>
