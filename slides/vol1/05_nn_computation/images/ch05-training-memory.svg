<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Training Memory vs. Inference Memory</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">Why training needs 4x more memory than inference</text>

  <!-- ===== MNIST Bar (left) ===== -->
  <text x="200" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#333">MNIST (784-128-64-10)</text>

  <!-- Inference only bar -->
  <text x="110" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Inference</text>

  <!-- Weights segment -->
  <rect x="70" y="125" width="80" height="200" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="110" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#2e6b8f">Weights</text>
  <text x="110" y="246" text-anchor="middle" font-size="9" fill="#4a90c4">427 KB</text>

  <!-- Training bar (taller) -->
  <text x="250" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Training</text>

  <!-- Weights -->
  <rect x="210" y="275" width="80" height="50" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="250" y="305" text-anchor="middle" font-size="8" font-weight="700" fill="#2e6b8f">Weights 427 KB</text>

  <!-- Gradients -->
  <rect x="210" y="225" width="80" height="50" rx="0" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="250" y="255" text-anchor="middle" font-size="8" font-weight="700" fill="#2c7a47">Grads 427 KB</text>

  <!-- Adam optimizer (2x weights) -->
  <rect x="210" y="125" width="80" height="100" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="250" y="170" text-anchor="middle" font-size="8" font-weight="700" fill="#8a5a1e">Adam State</text>
  <text x="250" y="185" text-anchor="middle" font-size="8" fill="#c87b2a">854 KB (2x)</text>

  <!-- Activations -->
  <rect x="210" y="95" width="80" height="30" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="250" y="115" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">Activ. 130 KB</text>

  <!-- 4x arrow -->
  <line x1="155" y1="225" x2="200" y2="160" stroke="#a31f34" stroke-width="2"/>
  <text x="170" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#a31f34">~4x</text>

  <!-- Totals -->
  <text x="110" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">~427 KB</text>
  <text x="250" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">~1.8 MB</text>

  <!-- ===== Divider ===== -->
  <line x1="400" y1="80" x2="400" y2="430" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== GPT-7B Bar (right) ===== -->
  <text x="650" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#333">GPT-7B Scale</text>

  <!-- Inference only bar -->
  <text x="540" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Inference</text>

  <!-- Weights segment -->
  <rect x="500" y="260" width="80" height="65" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="540" y="295" text-anchor="middle" font-size="9" font-weight="700" fill="#2e6b8f">Weights</text>
  <text x="540" y="312" text-anchor="middle" font-size="9" fill="#4a90c4">28 GB</text>

  <!-- Training bar -->
  <text x="700" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Training</text>

  <!-- Weights -->
  <rect x="660" y="295" width="80" height="30" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="700" y="315" text-anchor="middle" font-size="8" font-weight="700" fill="#2e6b8f">W: 28 GB</text>

  <!-- Gradients -->
  <rect x="660" y="265" width="80" height="30" rx="0" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="700" y="285" text-anchor="middle" font-size="8" font-weight="700" fill="#2c7a47">Grad: 28 GB</text>

  <!-- Adam state (2x = 56 GB) -->
  <rect x="660" y="155" width="80" height="110" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="700" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#8a5a1e">Adam</text>
  <text x="700" y="222" text-anchor="middle" font-size="9" fill="#c87b2a">56 GB</text>

  <!-- Activations -->
  <rect x="660" y="125" width="80" height="30" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="700" y="145" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">Activations</text>

  <!-- Totals -->
  <text x="540" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">28 GB</text>
  <text x="700" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">84+ GB</text>

  <!-- ===== Key callout ===== -->
  <rect x="430" y="365" width="440" height="55" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="650" y="387" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">84 GB before any activations</text>
  <text x="650" y="406" text-anchor="middle" font-size="10" fill="#c44">This is why training needs 80 GB GPUs</text>

  <!-- Adam badge -->
  <rect x="30" y="380" width="230" height="30" rx="15" fill="#a31f34"/>
  <text x="145" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Adam: 3x memory vs. SGD</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="460" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Inference needs only weights; training adds gradients, optimizer state, and activations</text>
</svg>
