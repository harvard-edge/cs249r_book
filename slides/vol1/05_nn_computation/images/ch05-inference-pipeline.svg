<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">The Complete Inference Pipeline</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">The model is not the system — the complete pipeline determines user experience</text>

  <!-- ===== Pipeline boxes ===== -->

  <!-- Input -->
  <rect x="30" y="100" width="90" height="80" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="75" y="135" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Raw</text>
  <text x="75" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#555">Input</text>

  <line x1="120" y1="140" x2="155" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Preprocessing (routing orange) -->
  <rect x="160" y="90" width="200" height="100" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="260" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Preprocessing</text>
  <text x="260" y="138" text-anchor="middle" font-size="9" fill="#8a5a1e">Resize, normalize, validate</text>
  <text x="260" y="155" text-anchor="middle" font-size="9" fill="#8a5a1e">Type conversion, batching</text>
  <!-- Time badge -->
  <rect x="225" y="165" width="70" height="20" rx="10" fill="#c87b2a"/>
  <text x="260" y="179" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">25 ms</text>

  <line x1="360" y1="140" x2="395" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Neural Inference (compute blue) -->
  <rect x="400" y="90" width="200" height="100" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="500" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Neural Inference</text>
  <text x="500" y="138" text-anchor="middle" font-size="9" fill="#4a90c4">Forward pass only</text>
  <text x="500" y="155" text-anchor="middle" font-size="9" fill="#4a90c4">Frozen weights</text>
  <!-- Time badge -->
  <rect x="465" y="165" width="70" height="20" rx="10" fill="#4a90c4"/>
  <text x="500" y="179" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">20 ms</text>

  <line x1="600" y1="140" x2="635" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Postprocessing (data green) -->
  <rect x="640" y="90" width="200" height="100" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="740" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Postprocessing</text>
  <text x="740" y="138" text-anchor="middle" font-size="9" fill="#3d9e5a">Softmax, threshold</text>
  <text x="740" y="155" text-anchor="middle" font-size="9" fill="#3d9e5a">Business logic, logging</text>
  <!-- Time badge -->
  <rect x="705" y="165" width="70" height="20" rx="10" fill="#3d9e5a"/>
  <text x="740" y="179" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">10 ms</text>

  <!-- ===== Timing breakdown bar ===== -->
  <text x="450" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#333">End-to-End Latency Breakdown</text>

  <!-- Preprocessing bar -->
  <rect x="100" y="260" width="295" height="45" rx="0" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="247" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5a1e">Preprocessing: 25 ms (45%)</text>

  <!-- Inference bar -->
  <rect x="395" y="260" width="236" height="45" rx="0" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="513" y="287" text-anchor="middle" font-size="11" font-weight="700" fill="#2e6b8f">Inference: 20 ms (36%)</text>

  <!-- Postprocessing bar -->
  <rect x="631" y="260" width="118" height="45" rx="0" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="690" y="287" text-anchor="middle" font-size="10" font-weight="700" fill="#2c7a47">Post: 10 ms</text>

  <!-- Total marker -->
  <line x1="749" y1="255" x2="749" y2="315" stroke="#333" stroke-width="2"/>
  <text x="770" y="290" font-size="11" font-weight="700" fill="#333">55 ms</text>

  <!-- Budget line (error red) -->
  <line x1="690" y1="255" x2="690" y2="315" stroke="#c44" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="690" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#c44">Budget: 50 ms</text>

  <!-- Over budget annotation -->
  <rect x="710" y="310" width="100" height="25" rx="12" fill="#a31f34"/>
  <text x="760" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">OVER 5 ms!</text>

  <!-- ===== Key insight boxes ===== -->
  <rect x="50" y="360" width="380" height="65" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">Teams optimizing only model inference</text>
  <text x="240" y="403" text-anchor="middle" font-size="11" font-weight="700" fill="#c44">miss 40-60% of total latency</text>

  <rect x="470" y="360" width="380" height="65" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="660" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#2e6b8f">Iron Law connection:</text>
  <text x="660" y="403" text-anchor="middle" font-size="10" fill="#4a90c4">Pre/post = overhead term (L_lat)</text>
  <text x="660" y="418" text-anchor="middle" font-size="10" fill="#4a90c4">Inference = compute term (O/R_peak)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="465" text-anchor="middle" font-size="9" font-style="italic" fill="#999">End-to-end latency is what matters — optimizing only inference is a local optimum</text>
</svg>
