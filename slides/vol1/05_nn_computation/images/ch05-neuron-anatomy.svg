<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Anatomy of an Artificial Neuron</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#555">Four-stage signal path: Inputs - Weights - Summation - Activation</text>

  <!-- ===== Biological labels (top) ===== -->
  <text x="105" y="85" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Dendrites</text>
  <text x="310" y="85" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Synapses</text>
  <text x="520" y="85" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Cell Body</text>
  <text x="730" y="85" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Axon</text>

  <!-- ===== Input arrows (data green) ===== -->
  <g fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5">
    <rect x="40" y="120" width="130" height="30" rx="4"/>
    <rect x="40" y="170" width="130" height="30" rx="4"/>
    <rect x="40" y="220" width="130" height="30" rx="4"/>
    <rect x="40" y="270" width="130" height="30" rx="4"/>
  </g>
  <g font-size="11" font-weight="700" fill="#2c7a47" text-anchor="middle">
    <text x="105" y="140">x1</text>
    <text x="105" y="190">x2</text>
    <text x="105" y="240">x3</text>
    <text x="105" y="290">xn</text>
  </g>
  <!-- Dots for ellipsis -->
  <text x="105" y="260" text-anchor="middle" font-size="14" fill="#999">...</text>

  <!-- ===== Weight connections (routing orange) ===== -->
  <g stroke="#c87b2a" stroke-width="1.5">
    <line x1="170" y1="135" x2="240" y2="135"/>
    <line x1="170" y1="185" x2="240" y2="185"/>
    <line x1="170" y1="235" x2="240" y2="235"/>
    <line x1="170" y1="285" x2="240" y2="285"/>
  </g>

  <!-- Weight labels -->
  <g fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2">
    <rect x="240" y="120" width="60" height="30" rx="4"/>
    <rect x="240" y="170" width="60" height="30" rx="4"/>
    <rect x="240" y="220" width="60" height="30" rx="4"/>
    <rect x="240" y="270" width="60" height="30" rx="4"/>
  </g>
  <g font-size="10" font-weight="700" fill="#8a5a1e" text-anchor="middle">
    <text x="270" y="140">w1</text>
    <text x="270" y="190">w2</text>
    <text x="270" y="240">w3</text>
    <text x="270" y="290">wn</text>
  </g>

  <!-- ===== Multiply lines to summation ===== -->
  <g stroke="#555" stroke-width="1.2" marker-end="url(#arrow)">
    <line x1="300" y1="135" x2="410" y2="200"/>
    <line x1="300" y1="185" x2="410" y2="205"/>
    <line x1="300" y1="235" x2="410" y2="215"/>
    <line x1="300" y1="285" x2="410" y2="225"/>
  </g>

  <!-- ===== Summation node (compute blue) ===== -->
  <circle cx="450" cy="210" r="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="450" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#2e6b8f">Sigma</text>
  <text x="450" y="222" text-anchor="middle" font-size="10" fill="#4a90c4">z = Sum(xi*wi) + b</text>

  <!-- Bias arrow -->
  <line x1="450" y1="310" x2="450" y2="265" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="420" y="310" width="60" height="25" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="450" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#2e6b8f">bias b</text>

  <!-- ===== Arrow to activation ===== -->
  <line x1="500" y1="210" x2="580" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Activation function (data green output) ===== -->
  <rect x="590" y="175" width="140" height="70" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#2c7a47">f(z)</text>
  <text x="660" y="220" text-anchor="middle" font-size="9" fill="#3d9e5a">Activation</text>
  <text x="660" y="235" text-anchor="middle" font-size="9" fill="#3d9e5a">Function</text>

  <!-- ===== Output arrow ===== -->
  <line x1="730" y1="210" x2="830" y2="210" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="860" y="215" text-anchor="start" font-size="12" font-weight="700" fill="#2c7a47">y</text>
  <text x="830" y="195" text-anchor="middle" font-size="9" fill="#555">Output</text>

  <!-- ===== Cost formula box ===== -->
  <rect x="70" y="370" width="340" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="90" y="392" font-size="11" font-weight="700" fill="#333">Cost per neuron (N inputs):</text>
  <text x="90" y="412" font-size="10" fill="#555">N MACs + (2N + 2) memory accesses</text>

  <!-- ===== Layer scaling note ===== -->
  <rect x="470" y="370" width="380" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="490" y="392" font-size="11" font-weight="700" fill="#2e6b8f">Layer scaling (M neurons):</text>
  <text x="490" y="412" font-size="10" fill="#4a90c4">M x N MACs = one matrix multiply: y = xW + b</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="470" text-anchor="middle" font-size="9" font-style="italic" fill="#999">The multiply-accumulate (MAC) is the atomic operation of all neural computation</text>
</svg>
