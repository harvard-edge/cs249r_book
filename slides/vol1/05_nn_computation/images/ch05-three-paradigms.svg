<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#333">Three Programming Paradigms on the Same 28x28 Digit</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" font-weight="400" fill="#555">Same input, same task — fundamentally different computational profiles</text>

  <!-- ===== Paradigm 1: Rule-Based ===== -->
  <rect x="30" y="80" width="260" height="320" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="160" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#555">Rule-Based</text>
  <text x="160" y="122" text-anchor="middle" font-size="10" fill="#777">if-then comparisons</text>

  <!-- Ops box -->
  <rect x="55" y="140" width="210" height="50" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="160" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#555">~100 ops</text>
  <text x="160" y="178" text-anchor="middle" font-size="9" fill="#777">Sequential comparisons</text>

  <!-- Memory box -->
  <rect x="55" y="200" width="210" height="45" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="160" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#555">784 B memory</text>
  <text x="160" y="236" text-anchor="middle" font-size="9" fill="#777">Fits in L1 cache</text>

  <!-- Description -->
  <text x="160" y="275" text-anchor="middle" font-size="9" fill="#555">Explicit pixel thresholds</text>
  <text x="160" y="290" text-anchor="middle" font-size="9" fill="#555">Brittle, hand-coded rules</text>
  <text x="160" y="305" text-anchor="middle" font-size="9" fill="#555">No learning capability</text>

  <!-- Hardware badge -->
  <rect x="105" y="330" width="110" height="22" rx="11" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="160" y="345" text-anchor="middle" font-size="9" font-weight="700" fill="#555">Any CPU</text>

  <!-- ===== Paradigm 2: Classical ML ===== -->
  <rect x="320" y="80" width="260" height="320" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Classical ML</text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#c87b2a">HOG + SVM classifier</text>

  <!-- Ops box -->
  <rect x="345" y="140" width="210" height="50" rx="4" fill="#fef5e7" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5a1e">~8,000 ops</text>
  <text x="450" y="178" text-anchor="middle" font-size="9" fill="#a06b2a">Gradient + histogram + SVM</text>

  <!-- Memory box -->
  <rect x="345" y="200" width="210" height="45" rx="4" fill="#fef5e7" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5a1e">~2 KB memory</text>
  <text x="450" y="236" text-anchor="middle" font-size="9" fill="#a06b2a">Still fits in L1 cache</text>

  <!-- Description -->
  <text x="450" y="275" text-anchor="middle" font-size="9" fill="#555">Hand-designed features (HOG)</text>
  <text x="450" y="290" text-anchor="middle" font-size="9" fill="#555">Domain expert required</text>
  <text x="450" y="305" text-anchor="middle" font-size="9" fill="#555">Learns classifier, not features</text>

  <!-- Hardware badge -->
  <rect x="395" y="330" width="110" height="22" rx="11" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="345" text-anchor="middle" font-size="9" font-weight="700" fill="#8a5a1e">CPU + SIMD</text>

  <!-- ===== Paradigm 3: Neural Network ===== -->
  <rect x="610" y="80" width="260" height="320" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="740" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Neural Network</text>
  <text x="740" y="122" text-anchor="middle" font-size="10" fill="#4a90c4">784-128-64-10 MLP</text>

  <!-- Ops box -->
  <rect x="635" y="140" width="210" height="50" rx="4" fill="#e3f0fa" stroke="#4a90c4" stroke-width="1"/>
  <text x="740" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#2e6b8f">109,184 MACs</text>
  <text x="740" y="178" text-anchor="middle" font-size="9" fill="#4a90c4">Dense matrix multiplications</text>

  <!-- Memory box -->
  <rect x="635" y="200" width="210" height="45" rx="4" fill="#e3f0fa" stroke="#4a90c4" stroke-width="1"/>
  <text x="740" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#2e6b8f">~427 KB memory</text>
  <text x="740" y="236" text-anchor="middle" font-size="9" fill="#4a90c4">Exceeds L1 cache (64 KB)</text>

  <!-- Description -->
  <text x="740" y="275" text-anchor="middle" font-size="9" fill="#555">Learns features automatically</text>
  <text x="740" y="290" text-anchor="middle" font-size="9" fill="#555">No domain expert needed</text>
  <text x="740" y="305" text-anchor="middle" font-size="9" fill="#555">Hierarchical representations</text>

  <!-- Hardware badge -->
  <rect x="685" y="330" width="110" height="22" rx="11" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="740" y="345" text-anchor="middle" font-size="9" font-weight="700" fill="#2e6b8f">GPU / Accel.</text>

  <!-- ===== 1,092x Arrow ===== -->
  <line x1="180" y1="420" x2="720" y2="420" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="370" y="408" width="160" height="26" rx="13" fill="#a31f34"/>
  <text x="450" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1,092x more compute</text>

  <!-- ===== Iron Law connection ===== -->
  <text x="450" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Iron Law Impact: Arithmetic dominates O term; memory traffic dominates D/BW</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">The 1,092x compute increase is the systems explosion that drives everything in this chapter</text>
</svg>
