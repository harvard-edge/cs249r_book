<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">MLOps Maturity Levels</text>

  <!-- ===== Step 1: Ad Hoc (bottom-left) ===== -->
  <rect x="50" y="280" width="230" height="180" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="165" y="305" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Level 0: Ad Hoc</text>

  <text x="70" y="330" font-size="9" fill="#333">Notebooks for training</text>
  <text x="70" y="348" font-size="9" fill="#333">Local environment</text>
  <text x="70" y="366" font-size="9" fill="#333">Manual deployment</text>
  <text x="70" y="384" font-size="9" fill="#333">No versioning</text>
  <text x="70" y="402" font-size="9" fill="#333">No monitoring</text>

  <!-- Outcome label -->
  <rect x="165" y="420" width="80" height="22" rx="10" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="205" y="435" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Fragile</text>

  <!-- ===== Step 2: Repeatable (middle) ===== -->
  <rect x="335" y="180" width="230" height="200" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="205" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Level 1: Repeatable</text>

  <text x="355" y="230" font-size="9" fill="#333">Automated training</text>
  <text x="355" y="248" font-size="9" fill="#333">Basic CI/CD pipeline</text>
  <text x="355" y="266" font-size="9" fill="#333">Central model storage</text>
  <text x="355" y="284" font-size="9" fill="#333">Some monitoring</text>
  <text x="355" y="302" font-size="9" fill="#333">Manual retraining triggers</text>

  <!-- Outcome label -->
  <rect x="400" y="340" width="100" height="22" rx="10" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="355" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Reproducible</text>

  <!-- ===== Step 3: Scalable (top-right) ===== -->
  <rect x="620" y="60" width="230" height="230" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="735" y="85" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Level 2: Scalable</text>

  <text x="640" y="110" font-size="9" fill="#333">Full automation end-to-end</text>
  <text x="640" y="128" font-size="9" fill="#333">Feature store (no skew)</text>
  <text x="640" y="146" font-size="9" fill="#333">Drift detection (PSI)</text>
  <text x="640" y="164" font-size="9" fill="#333">Canary deployments</text>
  <text x="640" y="182" font-size="9" fill="#333">Tiered rollback</text>
  <text x="640" y="200" font-size="9" fill="#333">Layered monitoring</text>
  <text x="640" y="218" font-size="9" fill="#333">Governance &amp; lineage</text>

  <!-- Outcome label -->
  <rect x="680" y="245" width="120" height="22" rx="10" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="740" y="260" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Production-grade</text>

  <!-- ===== Staircase lines ===== -->
  <!-- Step risers -->
  <line x1="50" y1="460" x2="280" y2="460" stroke="#c44" stroke-width="2"/>
  <line x1="280" y1="460" x2="280" y2="380" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="335" y1="380" x2="565" y2="380" stroke="#c87b2a" stroke-width="2"/>
  <line x1="565" y1="380" x2="565" y2="290" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="620" y1="290" x2="850" y2="290" stroke="#3d9e5a" stroke-width="2"/>

  <!-- ===== Transition Arrows ===== -->
  <!-- Ad Hoc -> Repeatable -->
  <line x1="282" y1="370" x2="333" y2="370" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="270" y="390" width="95" height="36" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="317" y="405" font-size="8" font-weight="700" fill="#333" text-anchor="middle">3-6 months</text>
  <text x="317" y="418" font-size="7.5" fill="#555" text-anchor="middle">First drift incident</text>

  <!-- Repeatable -> Scalable -->
  <line x1="567" y1="280" x2="618" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="555" y="300" width="95" height="36" rx="4" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="602" y="315" font-size="8" font-weight="700" fill="#333" text-anchor="middle">3-6 months</text>
  <text x="602" y="328" font-size="7.5" fill="#555" text-anchor="middle">Skew at 5-15%</text>

  <!-- ===== Fraud Detection Example (right sidebar) ===== -->
  <rect x="700" y="330" width="180" height="130" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="790" y="350" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example: Fraud Detection</text>

  <circle cx="720" cy="373" r="5" fill="#c44"/>
  <text x="733" y="377" font-size="8" fill="#555">Notebook + manual deploy</text>

  <circle cx="720" cy="398" r="5" fill="#c87b2a"/>
  <text x="733" y="402" font-size="8" fill="#555">Jenkins monthly retrain</text>

  <circle cx="720" cy="423" r="5" fill="#3d9e5a"/>
  <text x="733" y="427" font-size="8" fill="#555">PSI-triggered canary</text>

  <line x1="720" y1="378" x2="720" y2="393" stroke="#bbb" stroke-width="1"/>
  <line x1="720" y1="403" x2="720" y2="418" stroke="#bbb" stroke-width="1"/>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each transition takes 3-6 months. The gap is integration, not tools.</text>
</svg>
