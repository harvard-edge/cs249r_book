<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">ML System Health Dashboard: The Uptime Iceberg</text>

  <!-- ===== Dashboard Container ===== -->
  <rect x="40" y="45" width="820" height="400" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>

  <!-- Dark header bar -->
  <rect x="40" y="45" width="820" height="30" rx="6" fill="#333"/>
  <rect x="40" y="65" width="820" height="10" fill="#333"/>
  <text x="450" y="65" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ML System Health</text>
  <!-- Green dot -->
  <circle cx="810" cy="60" r="6" fill="#3d9e5a"/>
  <text x="795" y="64" font-size="8" fill="#fff" text-anchor="end">99.97%</text>

  <!-- ===== Panel 1: Data Health ===== -->
  <rect x="60" y="90" width="250" height="340" rx="5" fill="#fff" stroke="#3d9e5a" stroke-width="1.5"/>
  <!-- Panel header -->
  <rect x="60" y="90" width="250" height="28" rx="5" fill="#3d9e5a"/>
  <rect x="60" y="108" width="250" height="10" fill="#3d9e5a"/>
  <text x="185" y="109" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Data Health</text>

  <!-- PSI Gauge -->
  <text x="185" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Population Stability Index</text>
  <!-- Gauge arc background -->
  <path d="M120,210 A65,65 0 0,1 250,210" fill="none" stroke="#e8e8e8" stroke-width="10" stroke-linecap="round"/>
  <!-- Gauge green zone -->
  <path d="M120,210 A65,65 0 0,1 185,145" fill="none" stroke="#3d9e5a" stroke-width="10" stroke-linecap="round"/>
  <!-- Gauge orange zone -->
  <path d="M185,145 A65,65 0 0,1 232,165" fill="none" stroke="#c87b2a" stroke-width="10" stroke-linecap="round"/>
  <!-- Gauge red zone -->
  <path d="M232,165 A65,65 0 0,1 250,210" fill="none" stroke="#c44" stroke-width="10" stroke-linecap="round"/>
  <!-- Needle at PSI=0.18 -->
  <line x1="185" y1="210" x2="225" y2="170" stroke="#333" stroke-width="2"/>
  <circle cx="185" cy="210" r="4" fill="#333"/>
  <!-- PSI value -->
  <rect x="155" y="220" width="60" height="22" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="185" y="236" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">PSI: 0.18</text>
  <!-- Labels -->
  <text x="115" y="225" font-size="7.5" fill="#555" text-anchor="end">0.0</text>
  <text x="185" y="140" font-size="7.5" fill="#555" text-anchor="middle">0.1</text>
  <text x="255" y="225" font-size="7.5" fill="#555">0.3</text>

  <!-- Feature drift sparkline -->
  <text x="185" y="265" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Feature Drift Trend</text>
  <polyline points="80,320 110,315 140,310 170,305 200,295 230,280 260,270 290,262" fill="none" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="80" y1="290" x2="290" y2="290" stroke="#c44" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="292" y="293" font-size="7" fill="#c44">Threshold</text>
  <!-- Trend arrow -->
  <text x="185" y="345" font-size="8.5" fill="#c87b2a" text-anchor="middle">Approaching threshold</text>

  <!-- ===== Panel 2: Model Health ===== -->
  <rect x="325" y="90" width="250" height="340" rx="5" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="325" y="90" width="250" height="28" rx="5" fill="#4a90c4"/>
  <rect x="325" y="108" width="250" height="10" fill="#4a90c4"/>
  <text x="450" y="109" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Model Health</text>

  <!-- Accuracy time series -->
  <text x="450" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Accuracy Over Time</text>
  <!-- Axes -->
  <line x1="345" y1="160" x2="345" y2="300" stroke="#bbb" stroke-width="1"/>
  <line x1="345" y1="300" x2="555" y2="300" stroke="#bbb" stroke-width="1"/>
  <!-- Y labels -->
  <text x="340" y="168" font-size="7" fill="#555" text-anchor="end">94%</text>
  <text x="340" y="208" font-size="7" fill="#555" text-anchor="end">90%</text>
  <text x="340" y="248" font-size="7" fill="#555" text-anchor="end">87%</text>
  <text x="340" y="300" font-size="7" fill="#555" text-anchor="end">82%</text>
  <!-- SLA threshold line -->
  <line x1="345" y1="205" x2="555" y2="205" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="557" y="208" font-size="7" fill="#a31f34">SLA 90%</text>
  <!-- Accuracy curve: gradual decay -->
  <polyline points="350,165 380,170 410,180 440,195 470,215 500,235 530,248 555,255" fill="none" stroke="#4a90c4" stroke-width="2"/>
  <!-- Shaded region below SLA -->
  <path d="M437,205 L470,215 L500,235 L530,248 L555,255 L555,300 L437,300 Z" fill="#f9d6d5" opacity="0.3"/>
  <!-- Value label -->
  <rect x="420" y="310" width="80" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="460" y="324" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Acc: 87.2%</text>
  <text x="450" y="348" font-size="8" fill="#a31f34" text-anchor="middle">Below SLA</text>

  <!-- X label -->
  <text x="450" y="370" font-size="8" fill="#555" text-anchor="middle">Weeks since deployment</text>

  <!-- Prediction confidence -->
  <text x="450" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Avg Confidence: 0.72</text>
  <text x="450" y="410" font-size="8" fill="#c87b2a" text-anchor="middle">Declining (was 0.89)</text>

  <!-- ===== Panel 3: Service Health ===== -->
  <rect x="590" y="90" width="250" height="340" rx="5" fill="#fff" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="590" y="90" width="250" height="28" rx="5" fill="#c87b2a"/>
  <rect x="590" y="108" width="250" height="10" fill="#c87b2a"/>
  <text x="715" y="109" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Service Health</text>

  <!-- Latency histogram -->
  <text x="715" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Latency Distribution (ms)</text>
  <!-- Bars -->
  <rect x="620" y="200" width="35" height="90" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="637" y="195" font-size="7.5" fill="#555" text-anchor="middle">P50</text>
  <text x="637" y="305" font-size="7.5" fill="#333" text-anchor="middle">45</text>

  <rect x="665" y="220" width="35" height="70" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="682" y="215" font-size="7.5" fill="#555" text-anchor="middle">P90</text>
  <text x="682" y="305" font-size="7.5" fill="#333" text-anchor="middle">120</text>

  <rect x="710" y="240" width="35" height="50" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="727" y="235" font-size="7.5" fill="#555" text-anchor="middle">P95</text>
  <text x="727" y="305" font-size="7.5" fill="#333" text-anchor="middle">450</text>

  <rect x="755" y="170" width="35" height="120" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="772" y="165" font-size="7.5" fill="#555" text-anchor="middle">P99</text>
  <text x="772" y="305" font-size="7.5" fill="#a31f34" text-anchor="middle">2100</text>

  <!-- P99 alert -->
  <rect x="685" y="320" width="90" height="20" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="730" y="334" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">P99: 2.1s</text>

  <!-- Uptime badge (ironic green) -->
  <rect x="670" y="365" width="90" height="28" rx="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="715" y="384" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">99.97%</text>
  <text x="715" y="400" font-size="8" fill="#3d9e5a" text-anchor="middle">Uptime</text>

  <!-- Irony annotation -->
  <text x="715" y="422" font-size="8" fill="#a31f34" text-anchor="middle">All green. Model is wrong.</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Uptime is the visible tip. Data drift and model decay sink the system silently.</text>
</svg>
