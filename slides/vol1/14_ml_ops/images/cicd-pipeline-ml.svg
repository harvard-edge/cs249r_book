<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">CI/CD Pipelines: Traditional vs. ML</text>

  <!-- ===== Traditional Pipeline (Top) ===== -->
  <text x="50" y="75" font-size="11" font-weight="700" fill="#555">Traditional CI/CD</text>

  <!-- Box 1: Code Commit -->
  <rect x="50" y="90" width="130" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="115" y="117" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Code Commit</text>

  <!-- Box 2: Build & Test -->
  <rect x="220" y="90" width="130" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="285" y="117" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Build &amp; Test</text>

  <!-- Box 3: Deploy -->
  <rect x="390" y="90" width="130" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="455" y="117" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Deploy</text>

  <!-- Traditional arrows -->
  <line x1="180" y1="112" x2="218" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="112" x2="388" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Duration badge -->
  <rect x="560" y="97" width="100" height="30" rx="12" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="610" y="117" font-size="10" font-weight="700" fill="#555" text-anchor="middle">2-5 min</text>

  <!-- ===== Divider ===== -->
  <line x1="30" y1="160" x2="870" y2="160" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== ML CI/CD Pipeline (Bottom) ===== -->
  <text x="50" y="195" font-size="11" font-weight="700" fill="#333">ML CI/CD Pipeline</text>

  <!-- Stage 1: Data Validation -->
  <rect x="30" y="215" width="120" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="90" y="237" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Data</text>
  <text x="90" y="251" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Validation</text>
  <text x="90" y="265" font-size="8" fill="#555" text-anchor="middle">20-30%</text>

  <!-- Stage 2: Feature Transform -->
  <rect x="175" y="215" width="120" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="235" y="237" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Feature</text>
  <text x="235" y="251" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Transform</text>

  <!-- Stage 3: Model Training -->
  <rect x="320" y="215" width="120" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="380" y="237" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Model</text>
  <text x="380" y="251" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="380" y="265" font-size="8" fill="#555" text-anchor="middle">40-60%</text>

  <!-- Stage 4: Evaluation Gate -->
  <rect x="465" y="215" width="120" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="525" y="237" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Evaluation</text>
  <text x="525" y="251" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">vs Baseline</text>
  <!-- Gate icon -->
  <polygon points="525,260 531,268 525,276 519,268" fill="#3d9e5a" stroke="#2d7a2d" stroke-width="1"/>

  <!-- Stage 5: Registry -->
  <rect x="610" y="215" width="120" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="670" y="237" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Registry +</text>
  <text x="670" y="251" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Metadata</text>

  <!-- Stage 6: Canary Deploy -->
  <rect x="755" y="215" width="120" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="815" y="237" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Canary</text>
  <text x="815" y="251" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Deploy</text>

  <!-- ML pipeline arrows -->
  <line x1="150" y1="242" x2="173" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="295" y1="242" x2="318" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="242" x2="463" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="585" y1="242" x2="608" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="242" x2="753" y2="242" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fail: reject loop (dashed red) -->
  <path d="M465,270 L465,310 L90,310 L90,272" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-red)"/>
  <text x="280" y="327" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Fail: reject &amp; retrain</text>

  <!-- Duration badge ML -->
  <rect x="340" y="355" width="120" height="34" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="400" y="377" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">15-45 min</text>

  <!-- Comparison label -->
  <text x="400" y="405" font-size="9" fill="#555" text-anchor="middle">3-9x longer than traditional CI/CD</text>

  <!-- Additional stages annotation -->
  <text x="90" y="430" font-size="8.5" fill="#555" text-anchor="middle">Data quality</text>
  <text x="235" y="430" font-size="8.5" fill="#555" text-anchor="middle">Feature eng.</text>
  <text x="380" y="430" font-size="8.5" fill="#555" text-anchor="middle">Training</text>
  <text x="525" y="430" font-size="8.5" fill="#555" text-anchor="middle">Eval gate</text>
  <text x="670" y="430" font-size="8.5" fill="#555" text-anchor="middle">Artifact mgmt</text>
  <text x="815" y="430" font-size="8.5" fill="#555" text-anchor="middle">Graduated deploy</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" text-anchor="middle" font-style="italic">ML CI/CD validates data and model quality, not just code correctness.</text>
</svg>
