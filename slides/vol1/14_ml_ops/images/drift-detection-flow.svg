<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Drift Detection: Diagnosis Before Retraining</text>

  <!-- ===== Top: Production Data Stream ===== -->
  <rect x="350" y="48" width="200" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="73" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Production Data Stream</text>

  <!-- Arrow down -->
  <line x1="450" y1="88" x2="450" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Statistical Comparison ===== -->
  <rect x="325" y="118" width="250" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="140" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Statistical Comparison</text>
  <text x="450" y="156" font-size="8.5" fill="#555" text-anchor="middle">PSI, KS test, Jensen-Shannon</text>

  <!-- Training baseline reference -->
  <rect x="640" y="118" width="160" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="720" y="140" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Training Baseline</text>
  <text x="720" y="155" font-size="8" fill="#555" text-anchor="middle">P(X) reference</text>
  <line x1="575" y1="143" x2="638" y2="143" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PSI threshold badge -->
  <rect x="500" y="170" width="80" height="22" rx="10" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="540" y="185" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">PSI &gt; 0.2</text>

  <!-- Arrow down to decision -->
  <line x1="450" y1="168" x2="450" y2="205" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Decision Diamond ===== -->
  <polygon points="450,208 520,248 450,288 380,248" fill="#f7f7f7" stroke="#555" stroke-width="1.5"/>
  <text x="450" y="244" font-size="9" font-weight="700" fill="#333" text-anchor="middle">P(Y|X)</text>
  <text x="450" y="258" font-size="9" font-weight="700" fill="#333" text-anchor="middle">changed?</text>

  <!-- ===== Left Branch: Data Drift (No) ===== -->
  <text x="365" y="240" font-size="9" font-weight="700" fill="#3d9e5a">No</text>
  <line x1="380" y1="248" x2="250" y2="248" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Data Drift Box -->
  <rect x="80" y="225" width="170" height="48" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="165" y="246" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Drift</text>
  <text x="165" y="262" font-size="8.5" fill="#555" text-anchor="middle">P(X) shifted</text>

  <!-- Arrow down to remedy -->
  <line x1="165" y1="273" x2="165" y2="310" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Remedy: Retrain on fresh P(X) -->
  <rect x="80" y="313" width="170" height="48" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="165" y="334" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Retrain on fresh P(X)</text>
  <text x="165" y="350" font-size="8" fill="#555" text-anchor="middle">Same labels, new data</text>

  <!-- Example annotation -->
  <text x="165" y="378" font-size="8" fill="#555" text-anchor="middle">e.g., New demographic mix</text>

  <!-- ===== Right Branch: Concept Drift (Yes) ===== -->
  <text x="535" y="240" font-size="9" font-weight="700" fill="#a31f34">Yes</text>
  <line x1="520" y1="248" x2="650" y2="248" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Concept Drift Box -->
  <rect x="650" y="225" width="170" height="48" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="735" y="246" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Concept Drift</text>
  <text x="735" y="262" font-size="8.5" fill="#555" text-anchor="middle">P(Y|X) shifted</text>

  <!-- Arrow down to remedy -->
  <line x1="735" y1="273" x2="735" y2="310" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Remedy: Relabel + retrain -->
  <rect x="650" y="313" width="170" height="48" rx="4" fill="#d4edda" stroke="#c44" stroke-width="1.5"/>
  <text x="735" y="334" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Relabel + Retrain</text>
  <text x="735" y="350" font-size="8" fill="#555" text-anchor="middle">New ground truth needed</text>

  <!-- Example annotation -->
  <text x="735" y="378" font-size="8" fill="#555" text-anchor="middle">e.g., COVID changed behavior</text>

  <!-- ===== Bottom Convergence ===== -->
  <line x1="165" y1="361" x2="165" y2="410" stroke="#555" stroke-width="1.2"/>
  <line x1="735" y1="361" x2="735" y2="410" stroke="#555" stroke-width="1.2"/>
  <line x1="165" y1="410" x2="735" y2="410" stroke="#555" stroke-width="1.2"/>
  <line x1="450" y1="410" x2="450" y2="433" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Deploy via canary -->
  <rect x="350" y="435" width="200" height="36" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="458" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Deploy via Canary</text>

  <!-- Bottom footnote -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Diagnose which distribution changed before retraining -- retraining on shifted data entrenches the shift.</text>
</svg>
