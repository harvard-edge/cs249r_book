<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Rotting Asset Curve: Accuracy Decay Over Time</text>

  <!-- ===== Chart Area ===== -->
  <!-- Y-axis -->
  <line x1="100" y1="50" x2="100" y2="360" stroke="#333" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="100" y1="360" x2="820" y2="360" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="90" y="70" font-size="9" fill="#333" text-anchor="end">95%</text>
  <text x="90" y="120" font-size="9" fill="#333" text-anchor="end">90%</text>
  <text x="90" y="195" font-size="9" fill="#333" text-anchor="end">85%</text>
  <text x="90" y="270" font-size="9" fill="#333" text-anchor="end">80%</text>
  <text x="90" y="360" font-size="9" fill="#333" text-anchor="end">75%</text>

  <!-- Grid lines -->
  <line x1="100" y1="70" x2="820" y2="70" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="120" x2="820" y2="120" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="270" x2="820" y2="270" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- X-axis labels -->
  <text x="100" y="380" font-size="8" fill="#333" text-anchor="middle">0</text>
  <text x="220" y="380" font-size="8" fill="#333" text-anchor="middle">2</text>
  <text x="340" y="380" font-size="8" fill="#333" text-anchor="middle">4</text>
  <text x="460" y="380" font-size="8" fill="#333" text-anchor="middle">6</text>
  <text x="580" y="380" font-size="8" fill="#333" text-anchor="middle">8</text>
  <text x="700" y="380" font-size="8" fill="#333" text-anchor="middle">10</text>
  <text x="820" y="380" font-size="8" fill="#333" text-anchor="middle">12</text>
  <text x="460" y="400" font-size="10" fill="#333" text-anchor="middle">Months Since Deployment</text>

  <!-- Y-axis title -->
  <text x="35" y="210" font-size="10" fill="#333" text-anchor="middle" transform="rotate(-90,35,210)">Accuracy (%)</text>

  <!-- ===== SLA Threshold Line ===== -->
  <line x1="100" y1="195" x2="820" y2="195" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="740" y="178" width="78" height="18" rx="3" fill="#fff" stroke="#a31f34" stroke-width="1"/>
  <text x="779" y="192" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">SLA: 85%</text>

  <!-- ===== Scheduled Retraining (orange sawtooth) ===== -->
  <!-- Cycle 1: month 0-3 -->
  <polyline points="100,80 160,110 220,155 280,215" fill="none" stroke="#c87b2a" stroke-width="2.5"/>
  <!-- Retrain jump -->
  <line x1="280" y1="215" x2="280" y2="90" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Cycle 2: month 3-6 -->
  <polyline points="280,90 340,120 400,165 460,225" fill="none" stroke="#c87b2a" stroke-width="2.5"/>
  <line x1="460" y1="225" x2="460" y2="95" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Cycle 3: month 6-9 -->
  <polyline points="460,95 520,125 580,170 640,230" fill="none" stroke="#c87b2a" stroke-width="2.5"/>
  <line x1="640" y1="230" x2="640" y2="100" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Cycle 4: month 9-12 -->
  <polyline points="640,100 700,130 760,175 820,240" fill="none" stroke="#c87b2a" stroke-width="2.5"/>

  <!-- SLA violation shading for scheduled -->
  <path d="M240,195 L280,215 L280,195 Z" fill="#f9d6d5" opacity="0.4"/>
  <path d="M420,195 L460,225 L460,195 Z" fill="#f9d6d5" opacity="0.4"/>
  <path d="M600,195 L640,230 L640,195 Z" fill="#f9d6d5" opacity="0.4"/>
  <path d="M780,195 L820,240 L820,195 Z" fill="#f9d6d5" opacity="0.4"/>

  <!-- ===== Trigger-based Retraining (green) ===== -->
  <!-- Adaptive: triggers near SLA -->
  <polyline points="100,80 150,100 200,130 240,165 265,190" fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <line x1="265" y1="190" x2="265" y2="80" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polyline points="265,80 315,100 365,135 400,165 425,188" fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <line x1="425" y1="188" x2="425" y2="82" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polyline points="425,82 475,102 525,140 565,168 590,190" fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <line x1="590" y1="190" x2="590" y2="84" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polyline points="590,84 640,105 690,142 730,170 758,190" fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <line x1="758" y1="190" x2="758" y2="86" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polyline points="758,86 800,106 820,120" fill="none" stroke="#3d9e5a" stroke-width="2.5"/>

  <!-- ===== Legend ===== -->
  <line x1="130" y1="425" x2="170" y2="425" stroke="#c87b2a" stroke-width="2.5"/>
  <text x="178" y="429" font-size="9" fill="#333">Scheduled (every 90 days)</text>

  <line x1="380" y1="425" x2="420" y2="425" stroke="#3d9e5a" stroke-width="2.5"/>
  <text x="428" y="429" font-size="9" fill="#333">Trigger-based (PSI &gt; 0.2)</text>

  <line x1="630" y1="425" x2="670" y2="425" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="678" y="429" font-size="9" fill="#333">SLA threshold</text>

  <!-- Shaded region label -->
  <rect x="700" y="415" width="80" height="20" rx="3" fill="#f9d6d5" opacity="0.5" stroke="#c44" stroke-width="0.8"/>
  <text x="740" y="429" font-size="8" fill="#a31f34" text-anchor="middle">SLA violation</text>

  <!-- ===== Equation annotations (bottom) ===== -->
  <text x="230" y="460" font-size="10" fill="#333" text-anchor="middle" font-weight="700">Decay:</text>
  <text x="410" y="460" font-size="10" fill="#333" text-anchor="middle">Acc(t) = Acc_0 - lambda * D(Pt || P0)</text>

  <text x="660" y="460" font-size="10" fill="#333" text-anchor="middle" font-weight="700">Optimal retrain:</text>
  <text x="810" y="460" font-size="10" fill="#333" text-anchor="middle">T* = sqrt(2C / QVA0*lambda)</text>

  <!-- Bottom footnote -->
  <text x="450" y="488" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Trigger-based retraining maintains higher average accuracy and avoids SLA violations.</text>
</svg>
