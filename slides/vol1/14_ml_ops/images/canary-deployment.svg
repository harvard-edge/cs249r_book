<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Deployment Strategies: Risk vs. Cost</text>

  <!-- ===== Row 1: Canary ===== -->
  <text x="50" y="70" font-size="11" font-weight="700" fill="#333">Canary Deployment</text>

  <!-- User traffic -->
  <rect x="50" y="80" width="100" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="100" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User</text>
  <text x="100" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Traffic</text>

  <!-- Router -->
  <rect x="210" y="80" width="90" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="255" y="110" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Router</text>

  <!-- 95% arrow (thick) -->
  <line x1="150" y1="105" x2="208" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="92" x2="400" y2="92" stroke="#3d9e5a" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="350" y="87" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">95%</text>

  <!-- 5% arrow (thin) -->
  <line x1="300" y1="118" x2="400" y2="118" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="113" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">5%</text>

  <!-- Model v1 -->
  <rect x="405" y="72" width="120" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="465" y="95" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Model v1 (prod)</text>

  <!-- Model v2 with canary badge -->
  <rect x="405" y="115" width="120" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="465" y="138" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Model v2</text>
  <rect x="530" y="120" width="55" height="18" rx="9" fill="#a31f34"/>
  <text x="557" y="133" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Canary</text>

  <!-- Annotation -->
  <text x="660" y="100" font-size="9" fill="#555">Slow validation, low risk</text>
  <text x="660" y="115" font-size="8" fill="#555">Needs thousands of inferences</text>

  <!-- ===== Divider ===== -->
  <line x1="30" y1="165" x2="870" y2="165" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Row 2: Blue-Green ===== -->
  <text x="50" y="195" font-size="11" font-weight="700" fill="#333">Blue-Green Deployment</text>

  <!-- User traffic -->
  <rect x="50" y="205" width="100" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="100" y="225" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User</text>
  <text x="100" y="240" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Traffic</text>

  <!-- Router with switch -->
  <rect x="210" y="205" width="90" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="255" y="228" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Router</text>
  <text x="255" y="243" font-size="8" fill="#c87b2a" text-anchor="middle">Switch</text>

  <line x1="150" y1="230" x2="208" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Blue (v1) - greyed -->
  <rect x="405" y="197" width="120" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="465" y="220" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Blue (v1)</text>
  <line x1="300" y1="220" x2="403" y2="213" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Green (v2) - active -->
  <rect x="405" y="240" width="120" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="465" y="263" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Green (v2)</text>
  <line x1="300" y1="240" x2="403" y2="252" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Annotation -->
  <text x="660" y="225" font-size="9" fill="#555">Zero downtime, instant switch</text>
  <text x="660" y="240" font-size="8" fill="#c87b2a">2x infrastructure cost</text>

  <!-- ===== Divider ===== -->
  <line x1="30" y1="295" x2="870" y2="295" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Row 3: Shadow ===== -->
  <text x="50" y="325" font-size="11" font-weight="700" fill="#333">Shadow Deployment</text>

  <!-- User traffic -->
  <rect x="50" y="335" width="100" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="100" y="355" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User</text>
  <text x="100" y="370" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Traffic</text>

  <!-- Router -->
  <rect x="210" y="335" width="90" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="255" y="358" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Router</text>
  <text x="255" y="373" font-size="8" fill="#c87b2a" text-anchor="middle">Duplicate</text>

  <line x1="150" y1="360" x2="208" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- v1 (live) -->
  <rect x="405" y="327" width="120" height="36" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="465" y="350" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">v1 (live)</text>
  <line x1="300" y1="350" x2="403" y2="345" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- v2 (shadow) -->
  <rect x="405" y="370" width="120" height="36" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="465" y="393" font-size="9.5" font-weight="700" fill="#555" text-anchor="middle">v2 (shadow)</text>
  <line x1="300" y1="370" x2="403" y2="382" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Discard label -->
  <text x="540" y="393" font-size="8" fill="#c44" font-weight="700">Discard output</text>
  <line x1="540" y1="387" x2="620" y2="387" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Response arrow from v1 -->
  <rect x="560" y="330" width="80" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="600" y="350" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Response</text>
  <line x1="525" y1="345" x2="558" y2="345" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Annotation -->
  <text x="720" y="355" font-size="9" fill="#555">Compare without risk</text>
  <text x="720" y="370" font-size="8" fill="#c87b2a">10-20% compute overhead</text>

  <!-- ===== Comparison bar at bottom ===== -->
  <rect x="100" y="420" width="700" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="215" y="442" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Canary: Low cost</text>
  <line x1="340" y1="425" x2="340" y2="450" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="450" y="442" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Blue-Green: Zero downtime</text>
  <line x1="560" y1="425" x2="560" y2="450" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="685" y="442" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Shadow: Zero user risk</text>

  <!-- Bottom footnote -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">ML deployments need thousands of inferences for statistical significance -- not just uptime checks.</text>
</svg>
