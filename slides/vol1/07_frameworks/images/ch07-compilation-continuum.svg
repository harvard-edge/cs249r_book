<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Compilation Continuum</text>

  <!-- Top arrows: Flexibility and Optimization -->
  <line x1="750" y1="52" x2="150" y2="52" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="450" y="48" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Flexibility</text>

  <line x1="150" y1="68" x2="750" y2="68" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="450" y="80" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Optimization Potential</text>

  <!-- ===== Spectrum boxes ===== -->
  <!-- Eager -->
  <rect x="60" y="100" width="170" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="145" y="122" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Eager</text>
  <text x="145" y="140" font-size="8.5" fill="#555" text-anchor="middle">Define-by-run</text>
  <text x="145" y="156" font-size="8.5" fill="#555" text-anchor="middle">Python debugger works</text>
  <text x="145" y="172" font-size="8.5" fill="#555" text-anchor="middle">~5 us dispatch per op</text>
  <text x="145" y="192" font-size="8" fill="#4a90c4" font-weight="700" text-anchor="middle">Max flexibility</text>

  <!-- Transition arrow -->
  <text x="260" y="155" font-size="8" fill="#555" text-anchor="middle">tracing</text>
  <line x1="230" y1="160" x2="270" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- JIT -->
  <rect x="275" y="100" width="170" height="120" rx="5" fill="#e0f0e0" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="360" y="122" font-size="11" font-weight="700" fill="#333" text-anchor="middle">JIT</text>
  <text x="360" y="140" font-size="8.5" fill="#555" text-anchor="middle">torch.compile</text>
  <text x="360" y="156" font-size="8.5" fill="#555" text-anchor="middle">Traces at first call</text>
  <text x="360" y="172" font-size="8.5" fill="#555" text-anchor="middle">1.4-1.5x speedup</text>
  <text x="360" y="192" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">Balanced</text>

  <!-- Transition arrow -->
  <text x="475" y="155" font-size="8" fill="#555" text-anchor="middle">AOT compile</text>
  <line x1="445" y1="160" x2="485" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- AOT -->
  <rect x="490" y="100" width="170" height="120" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="575" y="122" font-size="11" font-weight="700" fill="#333" text-anchor="middle">AOT Static</text>
  <text x="575" y="140" font-size="8.5" fill="#555" text-anchor="middle">TensorRT / XLA</text>
  <text x="575" y="156" font-size="8.5" fill="#555" text-anchor="middle">Full graph optimization</text>
  <text x="575" y="172" font-size="8.5" fill="#555" text-anchor="middle">2-3x speedup</text>
  <text x="575" y="192" font-size="8" fill="#3d9e5a" font-weight="700" text-anchor="middle">High optimization</text>

  <!-- Transition arrow -->
  <text x="690" y="155" font-size="8" fill="#555" text-anchor="middle">synthesis</text>
  <line x1="660" y1="160" x2="700" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Custom HW -->
  <rect x="705" y="100" width="170" height="120" rx="5" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="790" y="122" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Custom HW</text>
  <text x="790" y="140" font-size="8.5" fill="#555" text-anchor="middle">TPU / Edge ASIC</text>
  <text x="790" y="156" font-size="8.5" fill="#555" text-anchor="middle">Hardware-algorithm</text>
  <text x="790" y="172" font-size="8.5" fill="#555" text-anchor="middle">co-design</text>
  <text x="790" y="192" font-size="8" fill="#2d7a2d" font-weight="700" text-anchor="middle">Max optimization</text>

  <!-- ===== Three regime zones ===== -->
  <text x="450" y="250" font-size="11" font-weight="700" fill="#333" text-anchor="middle">When to Use Each Regime</text>

  <!-- Research -->
  <rect x="60" y="265" width="250" height="90" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="185" y="288" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Research Prototyping</text>
  <text x="185" y="305" font-size="8.5" fill="#555" text-anchor="middle">N_dev >> N_prod</text>
  <text x="185" y="320" font-size="8.5" fill="#555" text-anchor="middle">Architecture changes every minutes</text>
  <text x="185" y="338" font-size="8.5" fill="#555" text-anchor="middle">Stay eager, iterate fast</text>

  <!-- Training -->
  <rect x="330" y="265" width="250" height="90" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="455" y="288" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Training at Scale</text>
  <text x="455" y="305" font-size="8.5" fill="#555" text-anchor="middle">N_prod >> N_dev</text>
  <text x="455" y="320" font-size="8.5" fill="#555" text-anchor="middle">Millions of forward/backward passes</text>
  <text x="455" y="338" font-size="8.5" fill="#555" text-anchor="middle">JIT compilation pays off in ~1 epoch</text>

  <!-- Inference -->
  <rect x="600" y="265" width="250" height="90" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="725" y="288" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Production Inference</text>
  <text x="725" y="305" font-size="8.5" fill="#555" text-anchor="middle">N_dev ~ 0, N_prod -> infinity</text>
  <text x="725" y="320" font-size="8.5" fill="#555" text-anchor="middle">Millions of requests</text>
  <text x="725" y="338" font-size="8.5" fill="#555" text-anchor="middle">AOT: maximize every optimization</text>

  <!-- Decision formula -->
  <rect x="130" y="380" width="640" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="400" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Decision Rule</text>
  <text x="450" y="420" font-size="9.5" fill="#555" text-anchor="middle">Benefit = N_prod x (T_eager - T_compiled) / (T_compile + N_dev x T_compile)</text>
  <text x="450" y="432" font-size="8.5" fill="#a31f34" font-weight="700" text-anchor="middle">Compile when Benefit > 1</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Compile when the benefit ratio exceeds 1</text>
</svg>
