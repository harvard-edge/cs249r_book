<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Autograd: The Tape Mechanism</text>

  <!-- ===== Forward Pass (top to bottom) ===== -->
  <text x="280" y="55" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Forward Pass (build tape)</text>

  <!-- Node: x -->
  <rect x="230" y="70" width="100" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="84" font-size="10" font-weight="700" fill="#333" text-anchor="middle">x</text>
  <text x="280" y="98" font-size="8" fill="#555" text-anchor="middle">value = 1.0</text>

  <!-- Arrow down -->
  <line x1="280" y1="106" x2="280" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Node: MulBackward -->
  <rect x="210" y="132" width="140" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="150" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">MulBackward</text>
  <text x="280" y="166" font-size="8" fill="#555" text-anchor="middle">y = x * 2   (y = 2.0)</text>

  <!-- Arrow down -->
  <line x1="280" y1="174" x2="280" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Node: AddBackward -->
  <rect x="210" y="200" width="140" height="42" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="218" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">AddBackward</text>
  <text x="280" y="234" font-size="8" fill="#555" text-anchor="middle">z = y + 1   (z = 3.0)</text>

  <!-- Arrow down -->
  <line x1="280" y1="242" x2="280" y2="266" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Node: loss -->
  <rect x="230" y="268" width="100" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="280" y="282" font-size="10" font-weight="700" fill="#333" text-anchor="middle">z (loss)</text>
  <text x="280" y="296" font-size="8" fill="#555" text-anchor="middle">value = 3.0</text>

  <!-- ===== Backward Pass (reverse arrows) ===== -->
  <!-- Gradient annotations on the right side -->
  <line x1="330" y1="286" x2="330" y2="221" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <text x="395" y="280" font-size="9" fill="#3d9e5a" font-weight="700">dz/dz = 1</text>

  <line x1="350" y1="221" x2="350" y2="153" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <text x="395" y="220" font-size="9" fill="#3d9e5a" font-weight="700">dz/dy = 1</text>

  <line x1="370" y1="153" x2="370" y2="88" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-green)"/>
  <text x="395" y="155" font-size="9" fill="#3d9e5a" font-weight="700">dz/dx = 2</text>

  <text x="395" y="92" font-size="9" fill="#3d9e5a" font-weight="700">x.grad = 2.0</text>

  <!-- Backward label -->
  <text x="395" y="55" font-size="11" font-weight="700" fill="#3d9e5a">Backward (traverse tape)</text>

  <!-- ===== Right: Tape Lifecycle ===== -->
  <rect x="560" y="60" width="300" height="310" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="710" y="85" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Tape Lifecycle</text>

  <!-- Step 1 -->
  <rect x="585" y="100" width="250" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="600" y="118" font-size="9.5" font-weight="700" fill="#c87b2a">1. Build tape</text>
  <text x="600" y="135" font-size="8" fill="#555">Record ops during forward pass</text>

  <!-- Step 2 -->
  <rect x="585" y="155" width="250" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="600" y="173" font-size="9.5" font-weight="700" fill="#c87b2a">2. Backward traverse</text>
  <text x="600" y="190" font-size="8" fill="#555">Reverse topological order</text>

  <!-- Step 3 -->
  <rect x="585" y="210" width="250" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="600" y="228" font-size="9.5" font-weight="700" fill="#c87b2a">3. Accumulate at leaves</text>
  <text x="600" y="245" font-size="8" fill="#555">Store gradients in .grad attributes</text>

  <!-- Step 4 -->
  <rect x="585" y="265" width="250" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="600" y="283" font-size="9.5" font-weight="700" fill="#c44">4. Destroy tape</text>
  <text x="600" y="300" font-size="8" fill="#555">Free memory, rebuild next iteration</text>

  <!-- Key insight box -->
  <rect x="560" y="330" width="300" height="40" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="710" y="348" font-size="9" font-weight="700" fill="#2d7a2d" text-anchor="middle">Key: Tape is transient</text>
  <text x="710" y="362" font-size="8" fill="#555" text-anchor="middle">Rebuilt every forward pass</text>

  <!-- ===== Bottom: key insight ===== -->
  <rect x="80" y="400" width="740" height="45" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="420" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Reverse-mode AD: one backward pass computes ALL gradients</text>
  <text x="450" y="436" font-size="9" fill="#555" text-anchor="middle">Forward mode: N passes for N params | Reverse mode: 1 pass for all params</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Reverse-mode AD: one backward pass computes all gradients</text>
</svg>
