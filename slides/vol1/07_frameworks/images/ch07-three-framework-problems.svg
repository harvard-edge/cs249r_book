<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Three Problems Every Framework Must Solve</text>

  <!-- ===== Panel 1: Execution ===== -->
  <rect x="30" y="60" width="260" height="220" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="160" y="88" font-size="12" font-weight="700" fill="#333" text-anchor="middle">1. Execution</text>
  <text x="160" y="108" font-size="9" fill="#555" text-anchor="middle">When and how to compute?</text>
  <line x1="60" y1="118" x2="260" y2="118" stroke="#4a90c4" stroke-width="0.8" opacity="0.4"/>
  <text x="50" y="140" font-size="8.5" fill="#555">Eager vs Graph mode</text>
  <text x="50" y="158" font-size="8.5" fill="#555">JIT / AOT compilation</text>
  <text x="50" y="176" font-size="8.5" fill="#555">Kernel dispatch pipeline</text>
  <text x="50" y="194" font-size="8.5" fill="#555">Async GPU scheduling</text>
  <!-- Badge -->
  <rect x="100" y="220" width="120" height="24" rx="12" fill="#a31f34"/>
  <text x="160" y="236" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Iron Law: L_lat, eta</text>

  <!-- ===== Panel 2: Differentiation ===== -->
  <rect x="320" y="60" width="260" height="220" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="88" font-size="12" font-weight="700" fill="#333" text-anchor="middle">2. Differentiation</text>
  <text x="450" y="108" font-size="9" fill="#555" text-anchor="middle">How to compute gradients?</text>
  <line x1="350" y1="118" x2="550" y2="118" stroke="#3d9e5a" stroke-width="0.8" opacity="0.4"/>
  <text x="340" y="140" font-size="8.5" fill="#555">Forward vs Reverse AD</text>
  <text x="340" y="158" font-size="8.5" fill="#555">Autograd tape lifecycle</text>
  <text x="340" y="176" font-size="8.5" fill="#555">Gradient accumulation</text>
  <text x="340" y="194" font-size="8.5" fill="#555">Memory for intermediates</text>
  <!-- Badge -->
  <rect x="390" y="220" width="120" height="24" rx="12" fill="#a31f34"/>
  <text x="450" y="236" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Iron Law: D_vol</text>

  <!-- ===== Panel 3: Abstraction ===== -->
  <rect x="610" y="60" width="260" height="220" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="740" y="88" font-size="12" font-weight="700" fill="#333" text-anchor="middle">3. Abstraction</text>
  <text x="740" y="108" font-size="9" fill="#555" text-anchor="middle">How to target diverse hardware?</text>
  <line x1="640" y1="118" x2="840" y2="118" stroke="#c87b2a" stroke-width="0.8" opacity="0.4"/>
  <text x="630" y="140" font-size="8.5" fill="#555">Tensors and memory layout</text>
  <text x="630" y="158" font-size="8.5" fill="#555">Kernel libraries (cuDNN)</text>
  <text x="630" y="176" font-size="8.5" fill="#555">Device runtimes (CUDA)</text>
  <text x="630" y="194" font-size="8.5" fill="#555">Cross-platform IR</text>
  <!-- Badge -->
  <rect x="680" y="220" width="120" height="24" rx="12" fill="#a31f34"/>
  <text x="740" y="236" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Iron Law: eta</text>

  <!-- ===== Connecting arrows ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <!-- Execution -> Differentiation -->
  <line x1="290" y1="310" x2="320" y2="310" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="305" y="325" font-size="7.5" fill="#555" text-anchor="middle">determines</text>
  <text x="305" y="335" font-size="7.5" fill="#555" text-anchor="middle">when</text>

  <!-- Differentiation -> Abstraction -->
  <line x1="580" y1="310" x2="610" y2="310" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="595" y="325" font-size="7.5" fill="#555" text-anchor="middle">determines</text>
  <text x="595" y="335" font-size="7.5" fill="#555" text-anchor="middle">what</text>

  <!-- ===== Bottom: Iron Law Mapping ===== -->
  <rect x="60" y="360" width="780" height="70" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="383" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Iron Law Connection</text>
  <text x="160" y="410" font-size="9.5" fill="#4a90c4" font-weight="700" text-anchor="middle">Execution</text>
  <text x="160" y="422" font-size="8.5" fill="#555" text-anchor="middle">Minimizes overhead (L_lat)</text>
  <text x="450" y="410" font-size="9.5" fill="#3d9e5a" font-weight="700" text-anchor="middle">Differentiation</text>
  <text x="450" y="422" font-size="8.5" fill="#555" text-anchor="middle">Controls data movement (D_vol)</text>
  <text x="740" y="410" font-size="9.5" fill="#c87b2a" font-weight="700" text-anchor="middle">Abstraction</text>
  <text x="740" y="422" font-size="8.5" fill="#555" text-anchor="middle">Maximizes utilization (eta)</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Every framework prioritizes one problem -- that choice defines its character</text>
</svg>
