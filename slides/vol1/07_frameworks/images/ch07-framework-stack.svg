<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Framework Stack: From Python to Silicon</text>

  <!-- ===== Stack layers (top to bottom) ===== -->
  <!-- Layer 1: User Python -->
  <rect x="180" y="50" width="480" height="44" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="68" font-size="10" font-weight="700" fill="#333" text-anchor="middle">User Code (Python)</text>
  <text x="420" y="84" font-size="8" fill="#555" text-anchor="middle">model = nn.Linear(784, 10); loss = F.cross_entropy(...)</text>

  <!-- Layer 2: nn.Module API -->
  <rect x="200" y="100" width="440" height="44" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="118" font-size="10" font-weight="700" fill="#333" text-anchor="middle">nn.Module / Keras API</text>
  <text x="420" y="134" font-size="8" fill="#555" text-anchor="middle">Parameter discovery, mode switching, serialization</text>

  <!-- Layer 3: Autograd -->
  <rect x="220" y="150" width="400" height="44" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="420" y="168" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Autograd Engine</text>
  <text x="420" y="184" font-size="8" fill="#555" text-anchor="middle">Tape construction, backward traversal, gradient accumulation</text>

  <!-- Layer 4: Graph IR -->
  <rect x="240" y="200" width="360" height="44" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="420" y="218" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Graph IR + Optimizer</text>
  <text x="420" y="234" font-size="8" fill="#555" text-anchor="middle">Operator fusion, constant folding, memory planning</text>

  <!-- Layer 5: Kernel Library -->
  <rect x="260" y="250" width="320" height="44" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="420" y="268" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Kernel Library (cuDNN, cuBLAS)</text>
  <text x="420" y="284" font-size="8" fill="#555" text-anchor="middle">Hand-tuned GEMM, conv, attention kernels</text>

  <!-- Layer 6: Device Runtime -->
  <rect x="280" y="300" width="280" height="44" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="420" y="318" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Device Runtime (CUDA, ROCm)</text>
  <text x="420" y="334" font-size="8" fill="#555" text-anchor="middle">Memory allocation, kernel launch, synchronization</text>

  <!-- Layer 7: Hardware -->
  <rect x="300" y="350" width="240" height="44" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="420" y="368" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Hardware (GPU, TPU, CPU)</text>
  <text x="420" y="384" font-size="8" fill="#555" text-anchor="middle">Silicon: ALUs, Tensor Cores, HBM</text>

  <!-- ===== Left: Problem annotations ===== -->
  <!-- Abstraction bracket -->
  <line x1="140" y1="55" x2="140" y2="140" stroke="#4a90c4" stroke-width="2"/>
  <line x1="140" y1="55" x2="155" y2="55" stroke="#4a90c4" stroke-width="2"/>
  <line x1="140" y1="140" x2="155" y2="140" stroke="#4a90c4" stroke-width="2"/>
  <text x="130" y="102" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="end">Abstraction</text>

  <!-- Differentiation bracket -->
  <line x1="155" y1="155" x2="155" y2="190" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="155" y1="155" x2="170" y2="155" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="155" y1="190" x2="170" y2="190" stroke="#3d9e5a" stroke-width="2"/>
  <text x="145" y="176" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="end">Differentiation</text>

  <!-- Execution bracket -->
  <line x1="170" y1="205" x2="170" y2="340" stroke="#c87b2a" stroke-width="2"/>
  <line x1="170" y1="205" x2="185" y2="205" stroke="#c87b2a" stroke-width="2"/>
  <line x1="170" y1="340" x2="185" y2="340" stroke="#c87b2a" stroke-width="2"/>
  <text x="160" y="276" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="end">Execution</text>

  <!-- Physics label -->
  <text x="270" y="376" font-size="8" font-weight="700" fill="#999" text-anchor="end">Physics</text>

  <!-- ===== Right: Arrows ===== -->
  <!-- Productivity arrow (up) -->
  <line x1="720" y1="380" x2="720" y2="60" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="740" y="220" font-size="9.5" font-weight="700" fill="#4a90c4">Productivity</text>

  <!-- Performance arrow (down) -->
  <line x1="780" y1="60" x2="780" y2="380" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="800" y="220" font-size="9.5" font-weight="700" fill="#a31f34">Performance</text>

  <!-- ===== Bottom insight ===== -->
  <rect x="130" y="410" width="640" height="40" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="435" font-size="10" font-weight="700" fill="#333" text-anchor="middle">torch.matmul(A, B) traverses all 7 layers in microseconds</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">torch.matmul(A, B) traverses all 7 layers in microseconds</text>
</svg>
