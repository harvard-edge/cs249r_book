<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Eager vs Static Graph Execution</text>

  <!-- Vertical divider -->
  <line x1="450" y1="45" x2="450" y2="440" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Eager ===== -->
  <text x="225" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Eager (Define-by-Run)</text>

  <!-- Code lines with dispatch overhead -->
  <rect x="40" y="75" width="180" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="94" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">y = x * 2</text>
  <rect x="230" y="75" width="100" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="280" y="94" font-size="7.5" fill="#c44" text-anchor="middle">dispatch ~5 us</text>
  <line x1="220" y1="89" x2="230" y2="89" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="40" y="115" width="180" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="134" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">z = y + 1</text>
  <rect x="230" y="115" width="100" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="280" y="134" font-size="7.5" fill="#c44" text-anchor="middle">dispatch ~5 us</text>
  <line x1="220" y1="129" x2="230" y2="129" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="40" y="155" width="180" height="28" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="130" y="174" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">w = relu(z)</text>
  <rect x="230" y="155" width="100" height="28" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="280" y="174" font-size="7.5" fill="#c44" text-anchor="middle">dispatch ~5 us</text>
  <line x1="220" y1="169" x2="230" y2="169" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Eager: print works -->
  <rect x="40" y="195" width="180" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="130" y="214" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">print(z)  -- works!</text>

  <!-- Eager timeline -->
  <rect x="40" y="250" width="380" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="50" y="270" font-size="8" font-weight="700" fill="#333">Timeline:</text>
  <!-- GPU segments -->
  <rect x="120" y="255" width="40" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <rect x="170" y="255" width="30" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <rect x="210" y="255" width="40" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <rect x="260" y="255" width="30" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <rect x="300" y="255" width="40" height="20" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <rect x="350" y="255" width="30" height="20" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>

  <text x="225" y="305" font-size="9" fill="#c44" font-weight="700" text-anchor="middle">~5 us overhead per op</text>
  <text x="225" y="320" font-size="8.5" fill="#555" text-anchor="middle">Each op dispatched individually</text>

  <!-- ===== RIGHT: Static ===== -->
  <text x="675" y="58" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Static (Define-then-Run)</text>

  <!-- Graph DAG -->
  <rect x="480" y="75" width="370" height="165" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="665" y="92" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Build Graph (one time)</text>

  <!-- DAG nodes -->
  <circle cx="540" cy="130" r="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="540" y="134" font-size="8" font-weight="700" fill="#333" text-anchor="middle">mul</text>
  <circle cx="665" cy="130" r="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="665" y="134" font-size="8" font-weight="700" fill="#333" text-anchor="middle">add</text>
  <circle cx="790" cy="130" r="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="790" y="134" font-size="8" font-weight="700" fill="#333" text-anchor="middle">relu</text>
  <line x1="558" y1="130" x2="647" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="683" y1="130" x2="772" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Optimize arrow -->
  <rect x="580" y="165" width="170" height="24" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="665" y="181" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Optimize: fuse kernels</text>

  <!-- Fused execution -->
  <rect x="490" y="200" width="350" height="28" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="665" y="218" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Execute: single fused kernel</text>

  <!-- Static timeline -->
  <rect x="490" y="250" width="350" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="500" y="270" font-size="8" font-weight="700" fill="#333">Timeline:</text>
  <rect x="580" y="255" width="50" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="605" y="269" font-size="7" fill="#c87b2a" text-anchor="middle">build</text>
  <rect x="640" y="255" width="180" height="20" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="730" y="269" font-size="7.5" fill="#3d9e5a" text-anchor="middle">fused execution</text>

  <text x="675" y="305" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">Graph-level optimization</text>
  <text x="675" y="320" font-size="8.5" fill="#555" text-anchor="middle">All ops visible before execution</text>

  <!-- ===== Comparison bar ===== -->
  <rect x="40" y="345" width="380" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="230" y="367" font-size="9.5" font-weight="700" fill="#c44" text-anchor="middle">Debuggable but slow</text>
  <text x="230" y="383" font-size="8.5" fill="#555" text-anchor="middle">Standard Python debuggers work</text>

  <rect x="480" y="345" width="370" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="665" y="367" font-size="9.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fast but opaque</text>
  <text x="665" y="383" font-size="8.5" fill="#555" text-anchor="middle">Cannot inspect intermediate values</text>

  <!-- Key comparison -->
  <rect x="160" y="410" width="580" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="432" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Framework can only fuse operations it can see together</text>

  <!-- Bottom footnote -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Eager: debuggable but slow | Static: fast but opaque</text>
</svg>
