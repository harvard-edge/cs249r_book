<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Kernel Fusion: Closing the Memory Wall</text>

  <!-- Vertical divider -->
  <line x1="450" y1="45" x2="450" y2="400" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Unfused ===== -->
  <text x="225" y="58" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Unfused: 3 Kernels</text>

  <!-- Kernel 1: MatMul -->
  <rect x="100" y="75" width="250" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="97" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Kernel 1: MatMul</text>

  <!-- HBM round trip 1 -->
  <rect x="140" y="116" width="170" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="225" y="131" font-size="7.5" fill="#c44" text-anchor="middle">Write HBM + Read HBM</text>
  <line x1="225" y1="111" x2="225" y2="116" stroke="#c44" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- Kernel 2: BiasAdd -->
  <rect x="100" y="143" width="250" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="165" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Kernel 2: BiasAdd</text>

  <!-- HBM round trip 2 -->
  <rect x="140" y="184" width="170" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="225" y="199" font-size="7.5" fill="#c44" text-anchor="middle">Write HBM + Read HBM</text>
  <line x1="225" y1="179" x2="225" y2="184" stroke="#c44" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- Kernel 3: ReLU -->
  <rect x="100" y="211" width="250" height="36" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="233" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Kernel 3: ReLU</text>

  <!-- HBM round trip 3 -->
  <rect x="140" y="252" width="170" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="225" y="267" font-size="7.5" fill="#c44" text-anchor="middle">Write HBM</text>

  <!-- Count -->
  <rect x="80" y="290" width="290" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="310" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">6 HBM round-trips</text>

  <!-- ===== RIGHT: Fused ===== -->
  <text x="675" y="58" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fused: 1 Kernel</text>

  <!-- Single fused kernel -->
  <rect x="530" y="75" width="290" height="170" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fused Kernel</text>

  <!-- Internal ops in registers/SRAM -->
  <rect x="560" y="112" width="230" height="28" rx="3" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.0"/>
  <text x="675" y="130" font-size="8.5" fill="#2d7a2d" text-anchor="middle">MatMul (in registers)</text>

  <rect x="560" y="146" width="230" height="28" rx="3" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.0"/>
  <text x="675" y="164" font-size="8.5" fill="#2d7a2d" text-anchor="middle">BiasAdd (in SRAM)</text>

  <rect x="560" y="180" width="230" height="28" rx="3" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.0"/>
  <text x="675" y="198" font-size="8.5" fill="#2d7a2d" text-anchor="middle">ReLU (in SRAM)</text>

  <text x="675" y="230" font-size="8" fill="#555" text-anchor="middle">Data stays in fast memory</text>

  <!-- Only 2 HBM accesses -->
  <rect x="560" y="252" width="110" height="22" rx="3" fill="#555" stroke="#555" stroke-width="0.8"/>
  <text x="615" y="267" font-size="7.5" fill="#fff" text-anchor="middle">Read HBM</text>
  <rect x="690" y="252" width="110" height="22" rx="3" fill="#555" stroke="#555" stroke-width="0.8"/>
  <text x="745" y="267" font-size="7.5" fill="#fff" text-anchor="middle">Write HBM</text>

  <!-- Count -->
  <rect x="530" y="290" width="290" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="310" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">2 HBM round-trips</text>

  <!-- ===== Speedup annotation ===== -->
  <rect x="250" y="340" width="400" height="45" rx="5" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="360" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">3x less memory traffic</text>
  <text x="450" y="377" font-size="9" fill="#555" text-anchor="middle">Same FLOPs (O unchanged), less waiting (D_vol reduced)</text>

  <!-- FlashAttention callout -->
  <rect x="180" y="400" width="540" height="35" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.0"/>
  <text x="450" y="417" font-size="9.5" font-weight="700" fill="#2d7a2d" text-anchor="middle">FlashAttention: fuses entire attention, 10-20x less HBM traffic, 2-4x wall-clock speedup</text>
  <text x="450" y="430" font-size="8" fill="#555" text-anchor="middle">Transforms memory-bound attention into compute-bound</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Fusion reduces D_vol without changing O -- same compute, less waiting</text>
</svg>
