<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Framework Platform Comparison</text>

  <!-- ===== Column 1: PyTorch ===== -->
  <rect x="30" y="50" width="270" height="290" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="165" y="78" font-size="14" font-weight="700" fill="#4a90c4" text-anchor="middle">PyTorch</text>

  <rect x="80" y="90" width="170" height="22" rx="12" fill="#a31f34"/>
  <text x="165" y="105" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Execution-first</text>

  <text x="50" y="135" font-size="9" font-weight="700" fill="#333">Execution Model</text>
  <text x="50" y="150" font-size="8.5" fill="#555">Eager + torch.compile</text>

  <text x="50" y="175" font-size="9" font-weight="700" fill="#333">Key Strength</text>
  <text x="50" y="190" font-size="8.5" fill="#555">Debug and iterate quickly</text>

  <text x="50" y="215" font-size="9" font-weight="700" fill="#333">Differentiation</text>
  <text x="50" y="230" font-size="8.5" fill="#555">Dynamic autograd tape</text>

  <text x="50" y="255" font-size="9" font-weight="700" fill="#333">Primary Use</text>
  <text x="50" y="270" font-size="8.5" fill="#555">Research, training</text>

  <text x="50" y="295" font-size="9" font-weight="700" fill="#333">Deploy</text>
  <!-- Deploy badges -->
  <rect x="50" y="303" width="50" height="18" rx="9" fill="#4a90c4"/>
  <text x="75" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">ONNX</text>
  <rect x="108" y="303" width="80" height="18" rx="9" fill="#4a90c4"/>
  <text x="148" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">TorchServe</text>
  <rect x="196" y="303" width="80" height="18" rx="9" fill="#4a90c4"/>
  <text x="236" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">TorchScript</text>

  <!-- ===== Column 2: TensorFlow ===== -->
  <rect x="315" y="50" width="270" height="290" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="78" font-size="14" font-weight="700" fill="#c87b2a" text-anchor="middle">TensorFlow</text>

  <rect x="365" y="90" width="170" height="22" rx="12" fill="#a31f34"/>
  <text x="450" y="105" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Abstraction-first</text>

  <text x="335" y="135" font-size="9" font-weight="700" fill="#333">Execution Model</text>
  <text x="335" y="150" font-size="8.5" fill="#555">Graph + tf.function</text>

  <text x="335" y="175" font-size="9" font-weight="700" fill="#333">Key Strength</text>
  <text x="335" y="190" font-size="8.5" fill="#555">Cloud-to-MCU deployment</text>

  <text x="335" y="215" font-size="9" font-weight="700" fill="#333">Differentiation</text>
  <text x="335" y="230" font-size="8.5" fill="#555">GradientTape (eager mode)</text>

  <text x="335" y="255" font-size="9" font-weight="700" fill="#333">Primary Use</text>
  <text x="335" y="270" font-size="8.5" fill="#555">Production, deployment</text>

  <text x="335" y="295" font-size="9" font-weight="700" fill="#333">Deploy</text>
  <rect x="335" y="303" width="55" height="18" rx="9" fill="#c87b2a"/>
  <text x="362" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Serving</text>
  <rect x="398" y="303" width="40" height="18" rx="9" fill="#c87b2a"/>
  <text x="418" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Lite</text>
  <rect x="446" y="303" width="30" height="18" rx="9" fill="#c87b2a"/>
  <text x="461" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">JS</text>
  <rect x="484" y="303" width="48" height="18" rx="9" fill="#c87b2a"/>
  <text x="508" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Micro</text>

  <!-- ===== Column 3: JAX ===== -->
  <rect x="600" y="50" width="270" height="290" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="735" y="78" font-size="14" font-weight="700" fill="#3d9e5a" text-anchor="middle">JAX</text>

  <rect x="650" y="90" width="170" height="22" rx="12" fill="#a31f34"/>
  <text x="735" y="105" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Differentiation-first</text>

  <text x="620" y="135" font-size="9" font-weight="700" fill="#333">Execution Model</text>
  <text x="620" y="150" font-size="8.5" fill="#555">Functional + XLA</text>

  <text x="620" y="175" font-size="9" font-weight="700" fill="#333">Key Strength</text>
  <text x="620" y="190" font-size="8.5" fill="#555">Composable transforms</text>

  <text x="620" y="215" font-size="9" font-weight="700" fill="#333">Differentiation</text>
  <text x="620" y="230" font-size="8.5" fill="#555">jax.grad (functional)</text>

  <text x="620" y="255" font-size="9" font-weight="700" fill="#333">Primary Use</text>
  <text x="620" y="270" font-size="8.5" fill="#555">Research, TPU workloads</text>

  <text x="620" y="295" font-size="9" font-weight="700" fill="#333">Deploy</text>
  <rect x="620" y="303" width="45" height="18" rx="9" fill="#3d9e5a"/>
  <text x="642" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">XLA</text>
  <rect x="673" y="303" width="45" height="18" rx="9" fill="#3d9e5a"/>
  <text x="695" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">TPU</text>
  <rect x="726" y="303" width="50" height="18" rx="9" fill="#3d9e5a"/>
  <text x="751" y="316" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">ONNX</text>

  <!-- ===== Key Insight Box ===== -->
  <rect x="100" y="360" width="700" height="80" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="385" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Not Competing APIs -- Different Architectural Priorities</text>

  <text x="200" y="410" font-size="9" fill="#4a90c4" font-weight="700" text-anchor="middle">PyTorch</text>
  <text x="200" y="425" font-size="8.5" fill="#555" text-anchor="middle">52 ms / 32% util</text>

  <text x="450" y="410" font-size="9" fill="#c87b2a" font-weight="700" text-anchor="middle">TensorFlow</text>
  <text x="450" y="425" font-size="8.5" fill="#555" text-anchor="middle">Broadest deploy targets</text>

  <text x="700" y="410" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">JAX</text>
  <text x="700" y="425" font-size="8.5" fill="#555" text-anchor="middle">Composable transforms</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Not competing APIs -- different architectural priorities</text>
</svg>
