<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Batching Strategies Compared</text>

  <!-- ===== Section A: Static Batching ===== -->
  <text x="150" y="55" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">A. Static Batching (Vision)</text>

  <!-- Time axis -->
  <line x1="30" y1="190" x2="280" y2="190" stroke="#bbb" stroke-width="1"/>
  <text x="155" y="205" font-size="8" fill="#555" text-anchor="middle">Time</text>

  <!-- Batch 1 -->
  <rect x="30" y="70" width="115" height="110" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="88" y="88" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Batch 1</text>
  <rect x="40" y="95" width="95" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="88" y="106" font-size="7.5" fill="#333" text-anchor="middle">Req 1 (img)</text>
  <rect x="40" y="115" width="95" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="88" y="126" font-size="7.5" fill="#333" text-anchor="middle">Req 2 (img)</text>
  <rect x="40" y="135" width="95" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="88" y="146" font-size="7.5" fill="#333" text-anchor="middle">Req 3 (img)</text>
  <rect x="40" y="155" width="95" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="88" y="166" font-size="7.5" fill="#333" text-anchor="middle">Req 4 (img)</text>

  <!-- Gap (wait) -->
  <rect x="150" y="70" width="30" height="110" fill="#f9d6d5" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="165" y="130" font-size="7" fill="#c44" text-anchor="middle" transform="rotate(-90 165 130)">Wait</text>

  <!-- Batch 2 -->
  <rect x="185" y="70" width="90" height="110" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="230" y="88" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Batch 2</text>
  <rect x="195" y="95" width="70" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="230" y="106" font-size="7.5" fill="#333" text-anchor="middle">Req 5</text>
  <rect x="195" y="115" width="70" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="230" y="126" font-size="7.5" fill="#333" text-anchor="middle">Req 6</text>
  <rect x="195" y="135" width="70" height="15" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="230" y="146" font-size="7.5" fill="#999" text-anchor="middle">Padding</text>
  <rect x="195" y="155" width="70" height="15" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="230" y="166" font-size="7.5" fill="#999" text-anchor="middle">Padding</text>

  <!-- ===== Section B: Continuous Batching ===== -->
  <line x1="305" y1="45" x2="305" y2="460" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="460" y="55" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">B. Continuous Batching (LLM)</text>

  <!-- Time axis -->
  <line x1="320" y1="190" x2="600" y2="190" stroke="#bbb" stroke-width="1"/>
  <text x="460" y="205" font-size="8" fill="#555" text-anchor="middle">Decode Iterations</text>

  <!-- Iteration columns -->
  <rect x="320" y="70" width="55" height="110" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="347" y="86" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Iter 1</text>
  <rect x="330" y="92" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="347" y="101" font-size="6.5" fill="#333" text-anchor="middle">A</text>
  <rect x="330" y="108" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="347" y="117" font-size="6.5" fill="#333" text-anchor="middle">B</text>
  <rect x="330" y="124" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="347" y="133" font-size="6.5" fill="#333" text-anchor="middle">C</text>
  <rect x="330" y="140" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="347" y="149" font-size="6.5" fill="#333" text-anchor="middle">D</text>

  <rect x="385" y="70" width="55" height="110" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="412" y="86" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Iter 2</text>
  <rect x="395" y="92" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="412" y="101" font-size="6.5" fill="#333" text-anchor="middle">A</text>
  <rect x="395" y="108" width="35" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="412" y="117" font-size="6.5" fill="#c44" text-anchor="middle">B done</text>
  <rect x="395" y="124" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="412" y="133" font-size="6.5" fill="#333" text-anchor="middle">C</text>
  <rect x="395" y="140" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="412" y="149" font-size="6.5" fill="#333" text-anchor="middle">D</text>

  <rect x="450" y="70" width="55" height="110" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="477" y="86" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Iter 3</text>
  <rect x="460" y="92" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="477" y="101" font-size="6.5" fill="#333" text-anchor="middle">A</text>
  <rect x="460" y="108" width="35" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="477" y="117" font-size="6.5" fill="#c87b2a" text-anchor="middle">E new</text>
  <rect x="460" y="124" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="477" y="133" font-size="6.5" fill="#333" text-anchor="middle">C</text>
  <rect x="460" y="140" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="477" y="149" font-size="6.5" fill="#333" text-anchor="middle">D</text>

  <rect x="515" y="70" width="55" height="110" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="542" y="86" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Iter 4</text>
  <rect x="525" y="92" width="35" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="542" y="101" font-size="6.5" fill="#c44" text-anchor="middle">A done</text>
  <rect x="525" y="108" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="542" y="117" font-size="6.5" fill="#333" text-anchor="middle">E</text>
  <rect x="525" y="124" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="542" y="133" font-size="6.5" fill="#333" text-anchor="middle">C</text>
  <rect x="525" y="140" width="35" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="542" y="149" font-size="6.5" fill="#333" text-anchor="middle">D</text>

  <!-- ===== Section C: Feature-Parallel ===== -->
  <line x1="615" y1="45" x2="615" y2="460" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>
  <text x="757" y="55" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">C. Feature-Parallel (RecSys)</text>

  <!-- Embedding servers -->
  <rect x="640" y="70" width="100" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="690" y="90" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User Embed</text>
  <text x="690" y="105" font-size="7.5" fill="#555" text-anchor="middle">Server 1-4</text>

  <rect x="755" y="70" width="100" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="805" y="90" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Item Embed</text>
  <text x="805" y="105" font-size="7.5" fill="#555" text-anchor="middle">Server 5-8</text>

  <!-- Arrow down to MLP -->
  <line x1="690" y1="125" x2="748" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="805" y1="125" x2="748" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Dense MLP -->
  <rect x="698" y="145" width="100" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="748" y="167" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Dense MLP</text>

  <!-- ===== Bottom comparison ===== -->
  <rect x="30" y="220" width="270" height="85" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="165" y="240" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Static: Fixed-size inputs</text>
  <text x="165" y="258" font-size="8.5" fill="#555" text-anchor="middle">Wait for batch to fill</text>
  <text x="165" y="275" font-size="8.5" fill="#c44" text-anchor="middle">Padding waste for uneven requests</text>
  <text x="165" y="292" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Best for: CNN, ViT (fixed inputs)</text>

  <rect x="315" y="220" width="290" height="85" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="460" y="240" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Continuous: Per-iteration scheduling</text>
  <text x="460" y="258" font-size="8.5" fill="#555" text-anchor="middle">Requests enter/exit each decode step</text>
  <text x="460" y="275" font-size="8.5" fill="#3d9e5a" text-anchor="middle">2-4x throughput over static (LLMs)</text>
  <text x="460" y="292" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Best for: LLM autoregressive decode</text>

  <rect x="620" y="220" width="250" height="85" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="745" y="240" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Feature-Parallel: Shard by feature</text>
  <text x="745" y="258" font-size="8.5" fill="#555" text-anchor="middle">Batch by feature type, not request</text>
  <text x="745" y="275" font-size="8.5" fill="#555" text-anchor="middle">Distributed embedding lookup</text>
  <text x="745" y="292" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Best for: DLRM, RecSys (80-90%)</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Match batching strategy to model architecture: no universal optimal approach</text>
</svg>
