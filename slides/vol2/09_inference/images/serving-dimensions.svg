<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Serving Architecture: Four Decision Dimensions</text>

  <!-- Scheduling -->
  <rect x="50" y="55" width="390" height="100" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="245" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">1. Scheduling Policy</text>
  <rect x="70" y="90" width="100" height="45" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="120" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">FCFS</text>
  <text x="120" y="127" font-size="7" fill="#555" text-anchor="middle">Fair, simple</text>
  <rect x="185" y="90" width="100" height="45" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="235" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Preemptive</text>
  <text x="235" y="127" font-size="7" fill="#555" text-anchor="middle">SLO-driven</text>
  <rect x="300" y="90" width="120" height="45" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="360" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Priority + Quota</text>
  <text x="360" y="127" font-size="7" fill="#555" text-anchor="middle">Multi-tenant</text>

  <!-- Topology -->
  <rect x="460" y="55" width="400" height="100" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="660" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">2. Deployment Topology</text>
  <rect x="480" y="90" width="80" height="45" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="520" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Single</text>
  <text x="520" y="127" font-size="7" fill="#555" text-anchor="middle">Small models</text>
  <rect x="575" y="90" width="80" height="45" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="615" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">TP</text>
  <text x="615" y="127" font-size="7" fill="#555" text-anchor="middle">Low latency</text>
  <rect x="670" y="90" width="80" height="45" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="710" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">PP</text>
  <text x="710" y="127" font-size="7" fill="#555" text-anchor="middle">Throughput</text>
  <rect x="765" y="90" width="80" height="45" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="805" y="112" font-size="9" font-weight="700" fill="#333" text-anchor="middle">TP+PP</text>
  <text x="805" y="127" font-size="7" fill="#555" text-anchor="middle">Frontier</text>

  <!-- State Management -->
  <rect x="50" y="175" width="390" height="100" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="245" y="198" font-size="11" font-weight="700" fill="#333" text-anchor="middle">3. State Management</text>
  <rect x="70" y="210" width="165" height="45" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="152" y="232" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Stateless</text>
  <text x="152" y="247" font-size="7" fill="#555" text-anchor="middle">Simple scaling, any replica</text>
  <rect x="250" y="210" width="170" height="45" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="335" y="232" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Stateful (KV reuse)</text>
  <text x="335" y="247" font-size="7" fill="#555" text-anchor="middle">60-80% prefill savings</text>

  <!-- Compute -->
  <rect x="460" y="175" width="400" height="100" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="660" y="198" font-size="11" font-weight="700" fill="#333" text-anchor="middle">4. Compute Allocation</text>
  <rect x="480" y="210" width="115" height="45" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="537" y="232" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Dedicated</text>
  <text x="537" y="247" font-size="7" fill="#555" text-anchor="middle">Predictable P99</text>
  <rect x="610" y="210" width="115" height="45" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="667" y="232" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Shared</text>
  <text x="667" y="247" font-size="7" fill="#555" text-anchor="middle">Cost efficient</text>
  <rect x="740" y="210" width="105" height="45" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="792" y="232" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Spot</text>
  <text x="792" y="247" font-size="7" fill="#555" text-anchor="middle">Cheapest (risky)</text>

  <!-- Example configurations -->
  <rect x="50" y="300" width="810" height="100" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="325" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Example Configurations</text>

  <text x="70" y="348" font-size="9" font-weight="700" fill="#4a90c4">Multi-turn Chatbot:</text>
  <text x="220" y="348" font-size="9" fill="#555">Preemptive + TP + Stateful + Dedicated = Low latency, KV reuse</text>

  <text x="70" y="368" font-size="9" font-weight="700" fill="#c87b2a">Batch Embedding API:</text>
  <text x="220" y="368" font-size="9" fill="#555">FCFS + Single GPU + Stateless + Shared = High throughput, low cost</text>

  <text x="70" y="388" font-size="9" font-weight="700" fill="#3d9e5a">Code Completion:</text>
  <text x="220" y="388" font-size="9" fill="#555">Priority + TP + Stateful + Dedicated = Strict P99 SLO (&lt;200ms)</text>

  <text x="450" y="430" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each dimension is independent -- the optimal combination depends on workload characteristics and SLA requirements</text>
</svg>
