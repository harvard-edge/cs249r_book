<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Anatomy of a GPU Cold Start: Llama-70B on H100</text>

  <!-- Timeline bar -->
  <rect x="80" y="80" width="750" height="50" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Phase 1: Provision (0-65s) -->
  <rect x="80" y="80" width="152" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="156" y="102" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Provision</text>
  <text x="156" y="118" font-size="8.5" fill="#555" text-anchor="middle">65s (API + GPU alloc)</text>

  <!-- Phase 2: Download (65-255s) -->
  <rect x="232" y="80" width="445" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="454" y="102" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Model Download (S3)</text>
  <text x="454" y="118" font-size="8.5" fill="#555" text-anchor="middle">180s (140 GB weights)</text>

  <!-- Phase 3: Load (255-300s) -->
  <rect x="677" y="80" width="105" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="729" y="102" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Load+Warm</text>
  <text x="729" y="118" font-size="8.5" fill="#555" text-anchor="middle">60s</text>

  <!-- Phase 4: Ready -->
  <rect x="782" y="80" width="48" height="50" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="806" y="108" font-size="7.5" font-weight="700" fill="#2d7a2d" text-anchor="middle">Ready</text>

  <!-- Time markers -->
  <line x1="80" y1="140" x2="830" y2="140" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="158" font-size="8" fill="#555" text-anchor="middle">0s</text>
  <text x="232" y="158" font-size="8" fill="#555" text-anchor="middle">65s</text>
  <text x="677" y="158" font-size="8" fill="#555" text-anchor="middle">255s</text>
  <text x="782" y="158" font-size="8" fill="#555" text-anchor="middle">315s</text>
  <text x="830" y="158" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">320s</text>

  <!-- Total time brace -->
  <line x1="80" y1="170" x2="80" y2="180" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="80" y1="180" x2="830" y2="180" stroke="#a31f34" stroke-width="1.5"/>
  <line x1="830" y1="170" x2="830" y2="180" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="198" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Total Cold Start: 5 min 20 sec</text>

  <!-- Comparison table -->
  <text x="450" y="240" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Cold Start Comparison</text>

  <!-- Table headers -->
  <rect x="150" y="255" width="200" height="25" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="250" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">System Type</text>
  <rect x="350" y="255" width="150" height="25" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="425" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Cold Start</text>
  <rect x="500" y="255" width="250" height="25" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="625" y="272" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Bottleneck</text>

  <!-- Rows -->
  <rect x="150" y="280" width="200" height="25" rx="0" fill="#d4edda" stroke="#bbb" stroke-width="0.5"/>
  <text x="250" y="297" font-size="9" fill="#333" text-anchor="middle">Serverless Function</text>
  <rect x="350" y="280" width="150" height="25" rx="0" fill="#d4edda" stroke="#bbb" stroke-width="0.5"/>
  <text x="425" y="297" font-size="9" fill="#333" text-anchor="middle">100 ms - 1s</text>
  <rect x="500" y="280" width="250" height="25" rx="0" fill="#d4edda" stroke="#bbb" stroke-width="0.5"/>
  <text x="625" y="297" font-size="9" fill="#333" text-anchor="middle">Container init</text>

  <rect x="150" y="305" width="200" height="25" rx="0" fill="#fdebd0" stroke="#bbb" stroke-width="0.5"/>
  <text x="250" y="322" font-size="9" fill="#333" text-anchor="middle">Web Service</text>
  <rect x="350" y="305" width="150" height="25" rx="0" fill="#fdebd0" stroke="#bbb" stroke-width="0.5"/>
  <text x="425" y="322" font-size="9" fill="#333" text-anchor="middle">1-10s</text>
  <rect x="500" y="305" width="250" height="25" rx="0" fill="#fdebd0" stroke="#bbb" stroke-width="0.5"/>
  <text x="625" y="322" font-size="9" fill="#333" text-anchor="middle">JVM/runtime startup</text>

  <rect x="150" y="330" width="200" height="25" rx="0" fill="#f9d6d5" stroke="#bbb" stroke-width="0.5"/>
  <text x="250" y="347" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU Inference (7B)</text>
  <rect x="350" y="330" width="150" height="25" rx="0" fill="#f9d6d5" stroke="#bbb" stroke-width="0.5"/>
  <text x="425" y="347" font-size="9" font-weight="700" fill="#333" text-anchor="middle">30-60s</text>
  <rect x="500" y="330" width="250" height="25" rx="0" fill="#f9d6d5" stroke="#bbb" stroke-width="0.5"/>
  <text x="625" y="347" font-size="9" fill="#333" text-anchor="middle">Model download + GPU load</text>

  <rect x="150" y="355" width="200" height="25" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="250" y="372" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">GPU Inference (70B)</text>
  <rect x="350" y="355" width="150" height="25" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="425" y="372" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">5+ minutes</text>
  <rect x="500" y="355" width="250" height="25" rx="0" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="625" y="372" font-size="9" fill="#c44" text-anchor="middle">140 GB download + CUDA warmup</text>

  <!-- Key insight -->
  <rect x="180" y="400" width="540" height="40" rx="12" fill="#a31f34"/>
  <text x="450" y="418" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">100x gap: reactive scaling alone cannot handle traffic spikes</text>
  <text x="450" y="433" font-size="9" fill="#fff" text-anchor="middle">Predictive scaling and warm pools are mandatory</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">GPU cold start latency dominates autoscaling response time for large models</text>
</svg>
