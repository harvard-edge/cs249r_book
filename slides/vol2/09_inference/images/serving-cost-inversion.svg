<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Training vs Serving Cost Over Model Lifetime</text>

  <!-- Axes -->
  <line x1="100" y1="420" x2="850" y2="420" stroke="#bbb" stroke-width="1.5"/>
  <line x1="100" y1="420" x2="100" y2="60" stroke="#bbb" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text x="40" y="240" font-size="10" fill="#555" text-anchor="middle" transform="rotate(-90 40 240)">Cumulative Cost ($)</text>

  <!-- X-axis label -->
  <text x="475" y="460" font-size="10" fill="#555" text-anchor="middle">Time (months)</text>

  <!-- X-axis ticks -->
  <text x="100" y="440" font-size="9" fill="#555" text-anchor="middle">0</text>
  <text x="250" y="440" font-size="9" fill="#555" text-anchor="middle">6</text>
  <text x="400" y="440" font-size="9" fill="#555" text-anchor="middle">12</text>
  <text x="550" y="440" font-size="9" fill="#555" text-anchor="middle">18</text>
  <text x="700" y="440" font-size="9" fill="#555" text-anchor="middle">24</text>
  <text x="850" y="440" font-size="9" fill="#555" text-anchor="middle">30</text>

  <!-- Y-axis ticks -->
  <text x="90" y="420" font-size="9" fill="#555" text-anchor="end">$0</text>
  <text x="90" y="330" font-size="9" fill="#555" text-anchor="end">$5M</text>
  <text x="90" y="240" font-size="9" fill="#555" text-anchor="end">$10M</text>
  <text x="90" y="150" font-size="9" fill="#555" text-anchor="end">$15M</text>
  <text x="90" y="80" font-size="9" fill="#555" text-anchor="end">$20M</text>

  <!-- Grid lines -->
  <line x1="100" y1="330" x2="850" y2="330" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="100" y1="240" x2="850" y2="240" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="100" y1="150" x2="850" y2="150" stroke="#f7f7f7" stroke-width="0.5"/>

  <!-- Training cost (flat line after initial investment) -->
  <path d="M100,420 L100,380 L150,370 L850,370" fill="none" stroke="#4a90c4" stroke-width="2.5"/>
  <!-- Training cost fill -->
  <path d="M100,420 L100,380 L150,370 L850,370 L850,420 Z" fill="#cfe2f3" opacity="0.3"/>

  <!-- Serving cost (rising line) -->
  <path d="M150,420 L250,365 L400,290 L550,205 L700,125 L850,80" fill="none" stroke="#c44" stroke-width="2.5"/>
  <!-- Serving cost fill -->
  <path d="M150,420 L250,365 L400,290 L550,205 L700,125 L850,80 L850,420 Z" fill="#f9d6d5" opacity="0.3"/>

  <!-- Crossover point annotation -->
  <circle cx="175" cy="383" r="5" fill="#a31f34"/>
  <line x1="175" y1="378" x2="175" y2="340" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="185" y="335" font-size="9" font-weight="700" fill="#a31f34">Crossover: ~1 month</text>

  <!-- Legend -->
  <rect x="600" y="55" width="12" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="618" y="65" font-size="9" fill="#333">Training Cost (one-time CapEx)</text>
  <rect x="600" y="75" width="12" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="618" y="85" font-size="9" fill="#333">Serving Cost (ongoing OpEx)</text>

  <!-- Key annotation -->
  <rect x="560" y="360" width="280" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="700" y="378" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">Serving cost exceeds training</text>
  <text x="700" y="393" font-size="9" fill="#555" text-anchor="middle">by 9x in just the first year</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Serving cost dominates training cost over the model's operational lifetime</text>
</svg>
