<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Queuing Theory for LLM Serving: The 70% Utilization Threshold</text>

  <!-- Axes for utilization vs latency -->
  <line x1="100" y1="380" x2="820" y2="380" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="380" x2="100" y2="60" stroke="#333" stroke-width="1.5"/>
  <text x="460" y="420" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU Utilization (rho)</text>
  <text x="50" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,50,220)">P99 Latency</text>

  <!-- X-axis labels -->
  <text x="100" y="400" font-size="8" fill="#555" text-anchor="middle">0%</text>
  <text x="244" y="400" font-size="8" fill="#555" text-anchor="middle">20%</text>
  <text x="388" y="400" font-size="8" fill="#555" text-anchor="middle">40%</text>
  <text x="532" y="400" font-size="8" fill="#555" text-anchor="middle">60%</text>
  <text x="604" y="400" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">70%</text>
  <text x="676" y="400" font-size="8" fill="#555" text-anchor="middle">80%</text>
  <text x="820" y="400" font-size="8" fill="#555" text-anchor="middle">100%</text>

  <!-- Safe zone -->
  <rect x="100" y="60" width="504" height="320" fill="#d4edda" opacity="0.15"/>
  <text x="350" y="90" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Safe Zone (50-60% target)</text>

  <!-- Danger zone -->
  <rect x="604" y="60" width="216" height="320" fill="#f9d6d5" opacity="0.2"/>
  <text x="712" y="90" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Danger Zone</text>

  <!-- Hockey stick curve -->
  <path d="M100,360 L244,355 L388,345 L532,320 L604,270 L640,220 L676,150 L720,100 L760,80 L800,70"
        fill="none" stroke="#a31f34" stroke-width="2.5"/>

  <!-- 70% threshold line -->
  <line x1="604" y1="60" x2="604" y2="380" stroke="#c44" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Target zone -->
  <rect x="388" y="345" width="144" height="6" rx="3" fill="#3d9e5a"/>
  <text x="460" y="340" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Production target</text>

  <!-- Annotation boxes -->
  <rect x="50" y="430" width="250" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="175" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">M/G/c/K Model</text>
  <text x="175" y="465" font-size="8" fill="#555" text-anchor="middle">Poisson arrivals, variable service, c GPUs</text>

  <rect x="325" y="430" width="250" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Why Variable Service?</text>
  <text x="450" y="465" font-size="8" fill="#555" text-anchor="middle">Output lengths: 10-1000 tokens (100x range)</text>

  <rect x="600" y="430" width="250" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="725" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Above 70%: Exponential Blowup</text>
  <text x="725" y="465" font-size="8" fill="#555" text-anchor="middle">P99 doubles every 5% utilization increase</text>

  <text x="450" y="495" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Production systems target 50-60% utilization -- headroom absorbs traffic bursts without SLO violations</text>
</svg>
