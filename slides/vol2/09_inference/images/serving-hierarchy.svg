<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Serving Hierarchy</text>

  <!-- Platform Level (outermost) -->
  <rect x="40" y="50" width="820" height="400" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="60" y="72" font-size="11" font-weight="700" fill="#333">Platform Level</text>
  <text x="210" y="72" font-size="9" fill="#555">Multi-tenancy, scheduling, placement</text>

  <!-- Service Level -->
  <rect x="70" y="85" width="760" height="320" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="90" y="107" font-size="11" font-weight="700" fill="#333">Service Level</text>
  <text x="220" y="107" font-size="9" fill="#555">Load balancing, routing, autoscaling</text>

  <!-- Replica Level - multiple replicas -->
  <!-- Replica 1 -->
  <rect x="100" y="120" width="220" height="250" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="210" y="142" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Replica 1</text>
  <text x="210" y="157" font-size="8.5" fill="#555" text-anchor="middle">GPU util, memory mgmt</text>

  <!-- Request boxes inside Replica 1 -->
  <rect x="115" y="170" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="160" y="193" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 1</text>
  <text x="160" y="208" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <rect x="215" y="170" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="260" y="193" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 2</text>
  <text x="260" y="208" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <rect x="115" y="235" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="160" y="258" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 3</text>
  <text x="160" y="273" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <rect x="215" y="235" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="260" y="258" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 4</text>
  <text x="260" y="273" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <!-- GPU badge for Replica 1 -->
  <rect x="165" y="305" width="90" height="22" fill="#a31f34"/>
  <text x="210" y="320" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">H100 GPU 0</text>

  <!-- Replica 2 -->
  <rect x="340" y="120" width="220" height="250" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="142" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Replica 2</text>
  <text x="450" y="157" font-size="8.5" fill="#555" text-anchor="middle">GPU util, memory mgmt</text>

  <rect x="355" y="170" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="400" y="193" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 5</text>
  <text x="400" y="208" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <rect x="455" y="170" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="500" y="193" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 6</text>
  <text x="500" y="208" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <rect x="355" y="235" width="90" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="400" y="258" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Request 7</text>
  <text x="400" y="273" font-size="7.5" fill="#555" text-anchor="middle">Batch, cache</text>

  <rect x="455" y="235" width="90" height="55" fill="#e8e8e8" stroke="#bbb" stroke-width="1.0"/>
  <text x="500" y="258" font-size="9" font-weight="700" fill="#555" text-anchor="middle">(idle slot)</text>

  <rect x="405" y="305" width="90" height="22" fill="#a31f34"/>
  <text x="450" y="320" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">H100 GPU 1</text>

  <!-- Replica 3 -->
  <rect x="580" y="120" width="220" height="250" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="690" y="142" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Replica N</text>
  <text x="690" y="157" font-size="8.5" fill="#555" text-anchor="middle">GPU util, memory mgmt</text>

  <rect x="595" y="170" width="190" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="690" y="200" font-size="9" fill="#555" text-anchor="middle">...</text>

  <rect x="645" y="305" width="90" height="22" fill="#a31f34"/>
  <text x="690" y="320" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">H100 GPU N</text>

  <!-- Right-side legend -->
  <rect x="690" y="385" width="150" height="55" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <rect x="700" y="395" width="10" height="10" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="715" y="404" font-size="8" fill="#333">Request Level</text>
  <rect x="700" y="410" width="10" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="715" y="419" font-size="8" fill="#333">Replica Level</text>
  <rect x="700" y="425" width="10" height="10" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="715" y="434" font-size="8" fill="#333">Service Level</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each level has distinct optimization levers: latency, throughput, capacity, efficiency</text>
</svg>
