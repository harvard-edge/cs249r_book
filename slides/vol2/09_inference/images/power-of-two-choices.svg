<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Power of Two Choices: Exponential Load Balancing Improvement</text>

  <!-- Divider -->
  <line x1="450" y1="45" x2="450" y2="420" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Random Assignment ===== -->
  <text x="225" y="60" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Random Assignment</text>
  <text x="225" y="78" font-size="9" fill="#555" text-anchor="middle">Max queue: O(log n / log log n)</text>

  <!-- Incoming request -->
  <rect x="195" y="90" width="60" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="225" y="107" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Request</text>

  <!-- Arrow to random server -->
  <line x1="225" y1="115" x2="225" y2="145" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="245" y="135" font-size="7.5" fill="#c44">Random pick</text>

  <!-- Servers with uneven queues -->
  <rect x="50" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="77" y="170" font-size="8" fill="#333" text-anchor="middle">S1</text>
  <rect x="50" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="50" y="203" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <rect x="115" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="142" y="170" font-size="8" fill="#333" text-anchor="middle">S2</text>

  <rect x="180" y="150" width="55" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="207" y="170" font-size="8" fill="#333" text-anchor="middle">S3</text>
  <rect x="180" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="180" y="203" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="180" y="221" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="180" y="239" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="180" y="257" width="55" height="15" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>

  <rect x="245" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="272" y="170" font-size="8" fill="#333" text-anchor="middle">S4</text>
  <rect x="245" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <rect x="310" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="337" y="170" font-size="8" fill="#333" text-anchor="middle">S5</text>
  <rect x="310" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="310" y="203" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="310" y="221" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <!-- Annotation: max queue ~5 -->
  <line x1="175" y1="264" x2="175" y2="290" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="175" y="305" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Max queue: ~5</text>

  <!-- ===== RIGHT: Power of Two Choices ===== -->
  <text x="675" y="60" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Power of Two Choices</text>
  <text x="675" y="78" font-size="9" fill="#555" text-anchor="middle">Max queue: O(log log n)</text>

  <!-- Incoming request -->
  <rect x="645" y="90" width="60" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="675" y="107" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Request</text>

  <!-- Two probes -->
  <line x1="665" y1="115" x2="610" y2="145" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="685" y1="115" x2="740" y2="145" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="585" y="135" font-size="7.5" fill="#3d9e5a">Probe 1</text>
  <text x="755" y="135" font-size="7.5" fill="#3d9e5a">Probe 2</text>

  <!-- Arrow to winner -->
  <line x1="675" y1="115" x2="740" y2="145" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Servers with even queues -->
  <rect x="500" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="527" y="170" font-size="8" fill="#333" text-anchor="middle">S1</text>
  <rect x="500" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="500" y="203" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <rect x="565" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="592" y="170" font-size="8" fill="#333" text-anchor="middle">S2</text>
  <rect x="565" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <rect x="630" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="657" y="170" font-size="8" fill="#333" text-anchor="middle">S3</text>
  <rect x="630" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="630" y="203" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <rect x="695" y="150" width="55" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="722" y="170" font-size="8" fill="#333" text-anchor="middle">S4</text>

  <rect x="760" y="150" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="787" y="170" font-size="8" fill="#333" text-anchor="middle">S5</text>
  <rect x="760" y="185" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <rect x="760" y="203" width="55" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>

  <!-- Annotation: max queue ~2 -->
  <text x="675" y="250" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Max queue: ~2</text>

  <!-- Bottom comparison -->
  <rect x="80" y="330" width="320" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="352" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Random: 1000 servers</text>
  <text x="240" y="370" font-size="9" fill="#555" text-anchor="middle">Max queue ~ log(1000)/log(log(1000))</text>
  <text x="240" y="388" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">= 4-5 requests</text>
  <text x="240" y="403" font-size="8.5" fill="#555" text-anchor="middle">P99 latency suffers from outliers</text>

  <rect x="500" y="330" width="320" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="352" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Two Choices: 1000 servers</text>
  <text x="660" y="370" font-size="9" fill="#555" text-anchor="middle">Max queue ~ log(log(1000))</text>
  <text x="660" y="388" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">= ~2 requests</text>
  <text x="660" y="403" font-size="8.5" fill="#555" text-anchor="middle">Exponential improvement, minimal overhead</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">One extra probe per request provides exponential tail latency reduction (Mitzenmacher, 2001)</text>
</svg>
