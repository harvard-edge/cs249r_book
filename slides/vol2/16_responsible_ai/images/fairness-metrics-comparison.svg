<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Three Fairness Metrics: What Each Measures</text>

  <!-- ===== Column Headers ===== -->
  <text x="170" y="65" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Demographic Parity</text>
  <text x="450" y="65" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Equalized Odds</text>
  <text x="730" y="65" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Equality of Opportunity</text>

  <!-- ===== Dividers ===== -->
  <line x1="310" y1="50" x2="310" y2="420" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="590" y1="50" x2="590" y2="420" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Demographic Parity ===== -->
  <rect x="40" y="80" width="260" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Equal Approval Rates</text>
  <text x="170" y="115" font-size="8.5" fill="#555" text-anchor="middle">P(Y=1|A=a) = P(Y=1|A=b)</text>

  <rect x="40" y="140" width="260" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="158" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Measures</text>
  <text x="170" y="175" font-size="8.5" fill="#555" text-anchor="middle">Overall prediction rates per group</text>
  <text x="170" y="188" font-size="8" fill="#999" text-anchor="middle">Ignores ground truth labels</text>

  <rect x="40" y="210" width="260" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="170" y="228" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Limitation</text>
  <text x="170" y="245" font-size="8.5" fill="#555" text-anchor="middle">Forces equal outcomes even when</text>
  <text x="170" y="258" font-size="8.5" fill="#555" text-anchor="middle">base rates genuinely differ</text>

  <!-- Example -->
  <rect x="40" y="280" width="260" height="75" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="170" y="298" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Loan Example</text>
  <text x="170" y="315" font-size="8" fill="#555" text-anchor="middle">Group A approval: 70%</text>
  <text x="170" y="330" font-size="8" fill="#555" text-anchor="middle">Group B approval: 40%</text>
  <text x="170" y="345" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Gap: 30 percentage points</text>

  <!-- ===== Equalized Odds ===== -->
  <rect x="320" y="80" width="260" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="450" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Equal Error Rates</text>
  <text x="450" y="115" font-size="8.5" fill="#555" text-anchor="middle">Equal TPR and FPR across groups</text>

  <rect x="320" y="140" width="260" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="158" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Measures</text>
  <text x="450" y="175" font-size="8.5" fill="#555" text-anchor="middle">Error distribution per group</text>
  <text x="450" y="188" font-size="8" fill="#999" text-anchor="middle">Conditions on true outcome Y</text>

  <rect x="320" y="210" width="260" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="450" y="228" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Limitation</text>
  <text x="450" y="245" font-size="8.5" fill="#555" text-anchor="middle">Most restrictive criterion;</text>
  <text x="450" y="258" font-size="8.5" fill="#555" text-anchor="middle">hardest to achieve in practice</text>

  <!-- Example -->
  <rect x="320" y="280" width="260" height="75" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="298" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Loan Example</text>
  <text x="450" y="315" font-size="8" fill="#555" text-anchor="middle">Group A TPR: 89%, FPR: 55%</text>
  <text x="450" y="330" font-size="8" fill="#555" text-anchor="middle">Group B TPR: 60%, FPR: 20%</text>
  <text x="450" y="345" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">TPR gap: 29 pp, FPR gap: 35 pp</text>

  <!-- ===== Equality of Opportunity ===== -->
  <rect x="600" y="80" width="260" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="730" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Equal True Positive Rates</text>
  <text x="730" y="115" font-size="8.5" fill="#555" text-anchor="middle">P(Y=1|A=a,Y=1) = P(Y=1|A=b,Y=1)</text>

  <rect x="600" y="140" width="260" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="158" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Measures</text>
  <text x="730" y="175" font-size="8.5" fill="#555" text-anchor="middle">Hit rate among qualified people</text>
  <text x="730" y="188" font-size="8" fill="#999" text-anchor="middle">Relaxation of equalized odds</text>

  <rect x="600" y="210" width="260" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="730" y="228" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Limitation</text>
  <text x="730" y="245" font-size="8.5" fill="#555" text-anchor="middle">Ignores false positive rates;</text>
  <text x="730" y="258" font-size="8.5" fill="#555" text-anchor="middle">may permit different FPR per group</text>

  <!-- Example -->
  <rect x="600" y="280" width="260" height="75" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="730" y="298" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Loan Example</text>
  <text x="730" y="315" font-size="8" fill="#555" text-anchor="middle">Group A TPR: 89%</text>
  <text x="730" y="330" font-size="8" fill="#555" text-anchor="middle">Group B TPR: 60%</text>
  <text x="730" y="345" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Gap: 29 percentage points</text>

  <!-- ===== Impossibility Banner ===== -->
  <rect x="100" y="380" width="700" height="50" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="400" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Impossibility Theorem (Kleinberg et al., 2016)</text>
  <text x="450" y="418" font-size="9" fill="#555" text-anchor="middle">When base rates differ between groups, no classifier can simultaneously satisfy all three criteria.</text>

  <!-- Bottom footnote -->
  <text x="450" y="465" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Fairness is a value-laden engineering decision, not a technical optimization with a single correct answer.</text>
</svg>
