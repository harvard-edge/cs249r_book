<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Feedback Loops Amplify Bias in Production</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left: Problem (Predictive Policing Loop) ===== -->
  <text x="230" y="60" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Positive Feedback Loop (Unstable)</text>

  <!-- Biased Data -->
  <rect x="110" y="85" width="240" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="230" y="107" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Historical Data</text>
  <text x="230" y="123" font-size="8.5" fill="#555" text-anchor="middle">Over-policed neighborhoods</text>

  <!-- Arrow down -->
  <line x1="230" y1="135" x2="230" y2="165" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Model -->
  <rect x="110" y="170" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="230" y="192" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Prediction Model</text>
  <text x="230" y="208" font-size="8.5" fill="#555" text-anchor="middle">"High crime" in same areas</text>

  <!-- Arrow down -->
  <line x1="230" y1="220" x2="230" y2="250" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Action -->
  <rect x="110" y="255" width="240" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="230" y="277" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Resource Allocation</text>
  <text x="230" y="293" font-size="8.5" fill="#555" text-anchor="middle">More patrols → more arrests</text>

  <!-- Arrow curving back up -->
  <path d="M350,280 Q400,280 400,180 Q400,85 350,85" fill="none" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="420" y="180" font-size="8" font-weight="700" fill="#c44" text-anchor="start">Reinforces</text>
  <text x="420" y="195" font-size="8" fill="#c44" text-anchor="start">original bias</text>

  <!-- Amplification label -->
  <rect x="85" y="335" width="290" height="35" fill="#a31f34"/>
  <text x="230" y="357" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">System destabilizes its own training data</text>

  <!-- ===== Divider ===== -->
  <line x1="475" y1="50" x2="475" y2="420" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Right: Solution (Monitoring) ===== -->
  <text x="680" y="60" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Negative Feedback Loop (Stable)</text>

  <!-- Model Output -->
  <rect x="560" y="85" width="240" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="680" y="107" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Model Predictions</text>
  <text x="680" y="123" font-size="8.5" fill="#555" text-anchor="middle">Decisions across all groups</text>

  <!-- Arrow down -->
  <line x1="680" y1="135" x2="680" y2="165" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Monitor -->
  <rect x="560" y="170" width="240" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="192" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fairness Monitor</text>
  <text x="680" y="208" font-size="8.5" fill="#555" text-anchor="middle">Disaggregated metrics per group</text>

  <!-- Arrow down -->
  <line x1="680" y1="220" x2="680" y2="250" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Correction -->
  <rect x="560" y="255" width="240" height="50" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="680" y="277" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Corrective Action</text>
  <text x="680" y="293" font-size="8.5" fill="#555" text-anchor="middle">Retrain, re-threshold, or intervene</text>

  <!-- Arrow curving back up -->
  <path d="M800,280 Q850,280 850,180 Q850,85 800,85" fill="none" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="865" y="180" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="start">Corrects</text>
  <text x="865" y="195" font-size="8" fill="#3d9e5a" text-anchor="start">drift</text>

  <!-- Stability label -->
  <rect x="535" y="335" width="290" height="35" fill="#3d9e5a"/>
  <text x="680" y="357" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Monitoring closes the governance loop</text>

  <!-- Bottom footnote -->
  <text x="450" y="445" font-size="9" font-style="italic" fill="#999" text-anchor="middle">An unfair system is fundamentally unstable: bias erodes trust, degrades data, and invites regulatory shutdown.</text>
</svg>
