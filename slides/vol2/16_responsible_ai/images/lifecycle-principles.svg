<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Responsible AI Principles Across the ML Lifecycle</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Phase Headers (top row) ===== -->
  <rect x="40" y="55" width="150" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Collection</text>

  <rect x="210" y="55" width="150" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="285" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training</text>

  <rect x="380" y="55" width="150" height="40" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="455" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Evaluation</text>

  <rect x="550" y="55" width="150" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="625" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Deployment</text>

  <rect x="720" y="55" width="150" height="40" rx="4" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="795" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Monitoring</text>

  <!-- Arrows between phases -->
  <line x1="190" y1="75" x2="205" y2="75" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="360" y1="75" x2="375" y2="75" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="530" y1="75" x2="545" y2="75" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="700" y1="75" x2="715" y2="75" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Principle Rows ===== -->
  <!-- Row labels -->
  <text x="20" y="130" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="start">Fairness</text>
  <text x="20" y="185" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="start">Explain.</text>
  <text x="20" y="240" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="start">Privacy</text>
  <text x="20" y="295" font-size="9" font-weight="700" fill="#c44" text-anchor="start">Account.</text>
  <text x="20" y="350" font-size="9" font-weight="700" fill="#2d7a2d" text-anchor="start">Safety</text>

  <!-- Horizontal grid lines -->
  <line x1="40" y1="110" x2="870" y2="110" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="155" x2="870" y2="155" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="210" x2="870" y2="210" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="265" x2="870" y2="265" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="320" x2="870" y2="320" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="375" x2="870" y2="375" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Fairness row -->
  <text x="115" y="130" font-size="8" fill="#555" text-anchor="middle">Representative</text>
  <text x="115" y="142" font-size="8" fill="#555" text-anchor="middle">sampling</text>
  <text x="285" y="130" font-size="8" fill="#555" text-anchor="middle">Bias-aware</text>
  <text x="285" y="142" font-size="8" fill="#555" text-anchor="middle">algorithms</text>
  <text x="455" y="130" font-size="8" fill="#555" text-anchor="middle">Group-level</text>
  <text x="455" y="142" font-size="8" fill="#555" text-anchor="middle">metrics</text>
  <text x="625" y="130" font-size="8" fill="#555" text-anchor="middle">Threshold</text>
  <text x="625" y="142" font-size="8" fill="#555" text-anchor="middle">adjustment</text>
  <text x="795" y="130" font-size="8" fill="#555" text-anchor="middle">Subgroup</text>
  <text x="795" y="142" font-size="8" fill="#555" text-anchor="middle">performance</text>

  <!-- Explainability row -->
  <text x="115" y="185" font-size="8" fill="#555" text-anchor="middle">Documentation</text>
  <text x="115" y="197" font-size="8" fill="#555" text-anchor="middle">standards</text>
  <text x="285" y="185" font-size="8" fill="#555" text-anchor="middle">Interpretable</text>
  <text x="285" y="197" font-size="8" fill="#555" text-anchor="middle">architecture</text>
  <text x="455" y="185" font-size="8" fill="#555" text-anchor="middle">Behavior</text>
  <text x="455" y="197" font-size="8" fill="#555" text-anchor="middle">analysis</text>
  <text x="625" y="185" font-size="8" fill="#555" text-anchor="middle">User-facing</text>
  <text x="625" y="197" font-size="8" fill="#555" text-anchor="middle">explanations</text>
  <text x="795" y="185" font-size="8" fill="#555" text-anchor="middle">Explanation</text>
  <text x="795" y="197" font-size="8" fill="#555" text-anchor="middle">quality logs</text>

  <!-- Privacy row -->
  <text x="115" y="240" font-size="8" fill="#555" text-anchor="middle">Consent</text>
  <text x="115" y="252" font-size="8" fill="#555" text-anchor="middle">mechanisms</text>
  <text x="285" y="240" font-size="8" fill="#555" text-anchor="middle">DP-SGD</text>
  <text x="285" y="252" font-size="8" fill="#555" text-anchor="middle">training</text>
  <text x="455" y="240" font-size="8" fill="#555" text-anchor="middle">Privacy impact</text>
  <text x="455" y="252" font-size="8" fill="#555" text-anchor="middle">assessment</text>
  <text x="625" y="240" font-size="8" fill="#555" text-anchor="middle">Secure</text>
  <text x="625" y="252" font-size="8" fill="#555" text-anchor="middle">deployment</text>
  <text x="795" y="240" font-size="8" fill="#555" text-anchor="middle">Access</text>
  <text x="795" y="252" font-size="8" fill="#555" text-anchor="middle">audit logs</text>

  <!-- Accountability row -->
  <text x="115" y="295" font-size="8" fill="#555" text-anchor="middle">Governance</text>
  <text x="115" y="307" font-size="8" fill="#555" text-anchor="middle">framework</text>
  <text x="285" y="295" font-size="8" fill="#555" text-anchor="middle">Decision</text>
  <text x="285" y="307" font-size="8" fill="#555" text-anchor="middle">logging</text>
  <text x="455" y="295" font-size="8" fill="#555" text-anchor="middle">Audit trail</text>
  <text x="455" y="307" font-size="8" fill="#555" text-anchor="middle">creation</text>
  <text x="625" y="295" font-size="8" fill="#555" text-anchor="middle">Override</text>
  <text x="625" y="307" font-size="8" fill="#555" text-anchor="middle">mechanisms</text>
  <text x="795" y="295" font-size="8" fill="#555" text-anchor="middle">Incident</text>
  <text x="795" y="307" font-size="8" fill="#555" text-anchor="middle">tracking</text>

  <!-- Safety row -->
  <text x="115" y="350" font-size="8" fill="#555" text-anchor="middle">Quality</text>
  <text x="115" y="362" font-size="8" fill="#555" text-anchor="middle">assurance</text>
  <text x="285" y="350" font-size="8" fill="#555" text-anchor="middle">Robust</text>
  <text x="285" y="362" font-size="8" fill="#555" text-anchor="middle">methods</text>
  <text x="455" y="350" font-size="8" fill="#555" text-anchor="middle">Stress</text>
  <text x="455" y="362" font-size="8" fill="#555" text-anchor="middle">testing</text>
  <text x="625" y="350" font-size="8" fill="#555" text-anchor="middle">Failure</text>
  <text x="625" y="362" font-size="8" fill="#555" text-anchor="middle">handling</text>
  <text x="795" y="350" font-size="8" fill="#555" text-anchor="middle">Performance</text>
  <text x="795" y="362" font-size="8" fill="#555" text-anchor="middle">monitoring</text>

  <!-- ===== Key Insight ===== -->
  <rect x="100" y="395" width="700" height="40" rx="5" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="412" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Responsible AI is a multi-phase architectural commitment — not a post-hoc compliance step</text>
  <text x="450" y="427" font-size="8.5" fill="#555" text-anchor="middle">Constraints designed in from data collection; retrofitting requires fundamental retraining</text>

  <!-- Bottom footnote -->
  <text x="450" y="468" font-size="9" font-style="italic" fill="#999" text-anchor="middle">A model trained on biased labels cannot be fairly calibrated by post-hoc threshold adjustment alone.</text>
</svg>
