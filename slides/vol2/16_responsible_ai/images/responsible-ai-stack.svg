<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Responsible AI as the Governance Layer of the Fleet Stack</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Fleet Stack (Left) ===== -->
  <!-- Part IV: Governance (highlighted) -->
  <rect x="60" y="55" width="340" height="70" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="230" y="82" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Part IV: The Responsible Fleet</text>
  <text x="230" y="100" font-size="9" fill="#555" text-anchor="middle">Security · Robustness · Sustainability · Responsible AI</text>

  <!-- Part III: Deployment -->
  <rect x="60" y="135" width="340" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="230" y="160" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Part III: Deployment at Scale</text>
  <text x="230" y="175" font-size="8.5" fill="#555" text-anchor="middle">Inference · Performance · Edge · Ops</text>

  <!-- Part II: Distributed ML -->
  <rect x="60" y="200" width="340" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="230" y="225" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Part II: Distributed ML</text>
  <text x="230" y="240" font-size="8.5" fill="#555" text-anchor="middle">Training · Communication · Fault Tolerance · Orchestration</text>

  <!-- Part I: The Fleet -->
  <rect x="60" y="265" width="340" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="230" y="290" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Part I: The Fleet</text>
  <text x="230" y="305" font-size="8.5" fill="#555" text-anchor="middle">Compute · Network · Storage</text>

  <!-- ===== Right: Responsible AI Dimensions ===== -->
  <rect x="480" y="55" width="370" height="280" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="665" y="75" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Responsible AI Dimensions</text>

  <!-- Fairness -->
  <rect x="500" y="90" width="160" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="580" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fairness</text>
  <text x="580" y="125" font-size="8" fill="#555" text-anchor="middle">Bias detection · Metrics</text>

  <!-- Transparency -->
  <rect x="680" y="90" width="150" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="755" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Transparency</text>
  <text x="755" y="125" font-size="8" fill="#555" text-anchor="middle">SHAP · LIME · Model cards</text>

  <!-- Privacy -->
  <rect x="500" y="150" width="160" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="580" y="170" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Privacy</text>
  <text x="580" y="185" font-size="8" fill="#555" text-anchor="middle">Diff. privacy · Unlearning</text>

  <!-- Accountability -->
  <rect x="680" y="150" width="150" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="755" y="170" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Accountability</text>
  <text x="755" y="185" font-size="8" fill="#555" text-anchor="middle">Audit trails · Governance</text>

  <!-- Safety -->
  <rect x="500" y="210" width="160" height="45" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.2"/>
  <text x="580" y="230" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Safety</text>
  <text x="580" y="245" font-size="8" fill="#555" text-anchor="middle">Value alignment · RLHF</text>

  <!-- Human Oversight -->
  <rect x="680" y="210" width="150" height="45" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <text x="755" y="230" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Human Oversight</text>
  <text x="755" y="245" font-size="8" fill="#555" text-anchor="middle">HITL · Contestability</text>

  <!-- Overhead badge -->
  <rect x="520" y="272" width="310" height="48" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="675" y="290" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Infrastructure Cost of Responsibility</text>
  <text x="675" y="306" font-size="8" fill="#555" text-anchor="middle">Fairness: +10-20 ms | SHAP: 50-1000x compute | DP: +15-30% training</text>

  <!-- ===== Arrow from stack to dimensions ===== -->
  <line x1="400" y1="90" x2="475" y2="90" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ===== Bottom: Key Insight ===== -->
  <rect x="60" y="365" width="790" height="55" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="455" y="387" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Core Thesis: Responsibility is Infrastructure, Not Aspiration</text>
  <text x="455" y="405" font-size="9" fill="#555" text-anchor="middle">A model that cannot explain its decisions cannot deploy in regulated industries. A model that exhibits bias creates liability.</text>

  <!-- Bottom footnote -->
  <text x="450" y="460" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Responsible AI defines the objective function of the fleet, not just a constraint on the solution.</text>
</svg>
