<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Explainability Methods: Cost vs. Fidelity Trade-off</text>

  <!-- ===== Column Headers ===== -->
  <text x="170" y="65" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">SHAP</text>
  <text x="450" y="65" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">LIME</text>
  <text x="730" y="65" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Gradient-Based</text>

  <!-- ===== Dividers ===== -->
  <line x1="310" y1="50" x2="310" y2="400" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="590" y1="50" x2="590" y2="400" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== SHAP ===== -->
  <rect x="40" y="80" width="260" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="100" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Shapley Additive Explanations</text>
  <text x="170" y="118" font-size="8.5" fill="#555" text-anchor="middle">Game-theoretic feature attribution</text>
  <text x="170" y="135" font-size="8" fill="#555" text-anchor="middle">Exact: exponential | KernelSHAP: O(n²)</text>

  <rect x="40" y="165" width="260" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Properties</text>
  <text x="170" y="202" font-size="8.5" fill="#555" text-anchor="middle">Theoretically grounded (Shapley axioms)</text>
  <text x="170" y="217" font-size="8.5" fill="#555" text-anchor="middle">Global + local explanations</text>
  <text x="170" y="232" font-size="8.5" fill="#555" text-anchor="middle">Model-agnostic</text>

  <rect x="40" y="250" width="260" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="170" y="270" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Cost</text>
  <text x="170" y="288" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">50-1000x inference compute</text>
  <text x="170" y="300" font-size="8" fill="#555" text-anchor="middle">+50-200 ms latency, +20-100% memory</text>

  <!-- ===== LIME ===== -->
  <rect x="320" y="80" width="260" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="450" y="100" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Local Interpretable Explanations</text>
  <text x="450" y="118" font-size="8.5" fill="#555" text-anchor="middle">Local linear approximation</text>
  <text x="450" y="135" font-size="8" fill="#555" text-anchor="middle">Samples neighborhood, fits surrogate</text>

  <rect x="320" y="165" width="260" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Properties</text>
  <text x="450" y="202" font-size="8.5" fill="#555" text-anchor="middle">Intuitive: sparse linear model</text>
  <text x="450" y="217" font-size="8.5" fill="#555" text-anchor="middle">Local only (per-instance)</text>
  <text x="450" y="232" font-size="8.5" fill="#555" text-anchor="middle">Model-agnostic</text>

  <rect x="320" y="250" width="260" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="270" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Cost</text>
  <text x="450" y="288" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">100-1000 forward passes</text>
  <text x="450" y="300" font-size="8" fill="#555" text-anchor="middle">Lower than SHAP but still significant</text>

  <!-- ===== Gradient-Based ===== -->
  <rect x="600" y="80" width="260" height="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="730" y="100" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Gradient Attribution</text>
  <text x="730" y="118" font-size="8.5" fill="#555" text-anchor="middle">Saliency maps, Integrated Gradients</text>
  <text x="730" y="135" font-size="8" fill="#555" text-anchor="middle">Single backward pass</text>

  <rect x="600" y="165" width="260" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Properties</text>
  <text x="730" y="202" font-size="8.5" fill="#555" text-anchor="middle">Fast: ~1 backward pass</text>
  <text x="730" y="217" font-size="8.5" fill="#555" text-anchor="middle">Pixel/token-level attribution</text>
  <text x="730" y="232" font-size="8.5" fill="#555" text-anchor="middle">Requires differentiable model</text>

  <rect x="600" y="250" width="260" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="730" y="270" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Cost</text>
  <text x="730" y="288" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">1-10x inference compute</text>
  <text x="730" y="300" font-size="8" fill="#555" text-anchor="middle">Cheapest but least faithful</text>

  <!-- ===== Trade-off Arrow ===== -->
  <rect x="100" y="330" width="700" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="350" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">High Fidelity + High Cost</text>
  <text x="450" y="350" font-size="9" fill="#555" text-anchor="middle">←————  Trade-off Spectrum  ————→</text>
  <text x="730" y="350" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Low Cost + Lower Fidelity</text>

  <!-- ===== Selection Guide ===== -->
  <rect x="100" y="375" width="700" height="55" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="395" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Selection Guide</text>
  <text x="450" y="415" font-size="8.5" fill="#555" text-anchor="middle">Regulated (GDPR Art. 22): SHAP | Real-time serving (&lt;100ms): Gradient-based | Debugging: LIME</text>

  <!-- Bottom footnote -->
  <text x="450" y="460" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Explainability must be budgeted at architecture time — retrofitting adds 5x infrastructure cost.</text>
</svg>
