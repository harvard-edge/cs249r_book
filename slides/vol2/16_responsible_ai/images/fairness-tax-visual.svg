<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Fairness Tax: Accuracy Cost of Fairness Constraints</text>

  <!-- ===== Left: Unconstrained ===== -->
  <text x="230" y="65" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Unconstrained Model</text>

  <rect x="70" y="85" width="320" height="160" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Group A bar -->
  <text x="90" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="start">Group A</text>
  <rect x="170" y="100" width="192" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="266" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">80% approved</text>

  <!-- Group B bar -->
  <text x="90" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="start">Group B</text>
  <rect x="170" y="140" width="144" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="242" y="158" font-size="9" font-weight="700" fill="#333" text-anchor="middle">60% approved</text>

  <!-- Accuracy -->
  <rect x="90" y="185" width="280" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="230" y="210" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Total Accuracy: 85%</text>

  <!-- Gap label -->
  <text x="230" y="265" font-size="9" fill="#c44" text-anchor="middle">20 pp approval gap</text>

  <!-- ===== Right: Constrained (Parity) ===== -->
  <text x="670" y="65" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Parity-Constrained Model</text>

  <rect x="510" y="85" width="320" height="160" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Group A bar -->
  <text x="530" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="start">Group A</text>
  <rect x="610" y="100" width="192" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="706" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">80% approved</text>

  <!-- Group B bar (now equal) -->
  <text x="530" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="start">Group B</text>
  <rect x="610" y="140" width="192" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="706" y="158" font-size="9" font-weight="700" fill="#333" text-anchor="middle">80% approved</text>

  <!-- Accuracy -->
  <rect x="530" y="185" width="280" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="670" y="210" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Total Accuracy: 81%</text>

  <!-- Parity label -->
  <text x="670" y="265" font-size="9" fill="#3d9e5a" text-anchor="middle">0 pp approval gap (parity achieved)</text>

  <!-- ===== Center Arrow ===== -->
  <text x="450" y="160" font-size="24" fill="#a31f34" text-anchor="middle">→</text>
  <rect x="415" y="175" width="70" height="28" fill="#a31f34"/>
  <text x="450" y="194" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">-4%</text>

  <!-- ===== Bottom: Trade-off Analysis ===== -->
  <rect x="70" y="300" width="760" height="100" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="325" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">The Fairness Tax in Systems Terms</text>

  <text x="200" y="350" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Credit Scoring</text>
  <text x="200" y="367" font-size="8" fill="#555" text-anchor="middle">4% accuracy drop</text>
  <text x="200" y="382" font-size="8" fill="#555" text-anchor="middle">= millions in defaults</text>

  <text x="450" y="350" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Healthcare Triage</text>
  <text x="450" y="367" font-size="8" fill="#555" text-anchor="middle">Equal referral rates</text>
  <text x="450" y="382" font-size="8" fill="#555" text-anchor="middle">vs. clinical accuracy</text>

  <text x="700" y="350" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Hiring Systems</text>
  <text x="700" y="367" font-size="8" fill="#555" text-anchor="middle">Four-fifths rule</text>
  <text x="700" y="382" font-size="8" fill="#555" text-anchor="middle">(ratio &lt; 0.8 = liability)</text>

  <!-- Bottom footnote -->
  <text x="450" y="445" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Fairness is not free — it is a value-laden engineering trade-off that must be made explicit.</text>
</svg>
