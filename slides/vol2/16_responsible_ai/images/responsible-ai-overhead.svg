<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Infrastructure Cost of Responsible AI</text>

  <!-- ===== Table Header ===== -->
  <rect x="40" y="50" width="820" height="35" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="140" y="73" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Technique</text>
  <text x="335" y="73" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Latency Overhead</text>
  <text x="530" y="73" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Compute Overhead</text>
  <text x="720" y="73" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Memory Overhead</text>

  <!-- ===== Rows ===== -->
  <!-- Row 1: Fairness Monitoring -->
  <rect x="40" y="90" width="820" height="50" fill="#fff" stroke="#e8e8e8" stroke-width="0.5"/>
  <rect x="42" y="92" width="4" height="46" fill="#4a90c4"/>
  <text x="140" y="113" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Fairness Monitoring</text>
  <text x="140" y="128" font-size="8" fill="#555" text-anchor="middle">Real-time bias detection</text>
  <text x="335" y="118" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">+10-20 ms / inference</text>
  <text x="530" y="118" font-size="10" fill="#555" text-anchor="middle">Continuous CPU overhead</text>
  <text x="720" y="118" font-size="10" fill="#555" text-anchor="middle">Group statistics buffers</text>

  <!-- Row 2: SHAP Explanations -->
  <rect x="40" y="145" width="820" height="50" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.5"/>
  <rect x="42" y="147" width="4" height="46" fill="#c44"/>
  <text x="140" y="168" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">SHAP Explanations</text>
  <text x="140" y="183" font-size="8" fill="#555" text-anchor="middle">Feature attribution</text>
  <text x="335" y="173" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">+50-200 ms / request</text>
  <text x="530" y="173" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">50-1000x inference</text>
  <text x="720" y="173" font-size="10" fill="#555" text-anchor="middle">+20-100%</text>

  <!-- Row 3: Differential Privacy -->
  <rect x="40" y="200" width="820" height="50" fill="#fff" stroke="#e8e8e8" stroke-width="0.5"/>
  <rect x="42" y="202" width="4" height="46" fill="#c87b2a"/>
  <text x="140" y="223" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Differential Privacy</text>
  <text x="140" y="238" font-size="8" fill="#555" text-anchor="middle">DP-SGD training</text>
  <text x="335" y="228" font-size="10" fill="#555" text-anchor="middle">N/A (training time)</text>
  <text x="530" y="228" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">+15-30% training cycles</text>
  <text x="720" y="228" font-size="10" fill="#555" text-anchor="middle">Per-sample gradients</text>

  <!-- Row 4: Fairness-Aware Training -->
  <rect x="40" y="255" width="820" height="50" fill="#f7f7f7" stroke="#e8e8e8" stroke-width="0.5"/>
  <rect x="42" y="257" width="4" height="46" fill="#3d9e5a"/>
  <text x="140" y="278" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Fairness-Aware Training</text>
  <text x="140" y="293" font-size="8" fill="#555" text-anchor="middle">Constrained optimization</text>
  <text x="335" y="283" font-size="10" fill="#555" text-anchor="middle">N/A (training time)</text>
  <text x="530" y="283" font-size="10" fill="#555" text-anchor="middle">+5-15% training time</text>
  <text x="720" y="283" font-size="10" fill="#555" text-anchor="middle">Constraint state vectors</text>

  <!-- Row 5: Audit Logging -->
  <rect x="40" y="310" width="820" height="50" fill="#fff" stroke="#e8e8e8" stroke-width="0.5"/>
  <rect x="42" y="312" width="4" height="46" fill="#bbb"/>
  <text x="140" y="333" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Audit Logging</text>
  <text x="140" y="348" font-size="8" fill="#555" text-anchor="middle">Decision provenance</text>
  <text x="335" y="338" font-size="10" fill="#555" text-anchor="middle">+2-5 ms / inference</text>
  <text x="530" y="338" font-size="10" fill="#555" text-anchor="middle">Serialization overhead</text>
  <text x="720" y="338" font-size="10" fill="#555" text-anchor="middle">Log storage (TB-scale)</text>

  <!-- ===== Bottom Summary ===== -->
  <rect x="100" y="385" width="700" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="405" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">At 10 billion inferences/day, responsible AI overhead can exceed raw model serving cost</text>
  <text x="450" y="422" font-size="9" fill="#555" text-anchor="middle">This cost is essential infrastructure — analogous to security and redundancy budgets</text>

  <!-- Bottom footnote -->
  <text x="450" y="468" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Responsible AI is provisioned, not optional — like security and fault tolerance in distributed systems.</text>
</svg>
