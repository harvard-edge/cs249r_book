<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Fleet Stack: From Infrastructure to Governance</text>

  <!-- ===== Four Stack Layers ===== -->
  <!-- Layer 4: Responsible Fleet (top) -->
  <rect x="120" y="55" width="540" height="85" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="390" y="78" font-size="12" font-weight="700" fill="#333" text-anchor="middle">IV. The Responsible Fleet</text>
  <text x="390" y="95" font-size="9.5" fill="#555" text-anchor="middle">Security | Robustness | Sustainability | Responsible AI</text>
  <text x="390" y="112" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Governance constraints on what we should build</text>
  <text x="95" y="95" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="end">Governance</text>

  <!-- Layer 3: Deployment at Scale -->
  <rect x="120" y="155" width="540" height="85" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="390" y="178" font-size="12" font-weight="700" fill="#333" text-anchor="middle">III. Deployment at Scale</text>
  <text x="390" y="195" font-size="9.5" fill="#555" text-anchor="middle">Inference | Performance | Edge Intelligence | Operations</text>
  <text x="390" y="212" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Carrying trained models to the world</text>
  <text x="95" y="195" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="end">Serving</text>

  <!-- Layer 2: Distributed ML -->
  <rect x="120" y="255" width="540" height="85" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="390" y="278" font-size="12" font-weight="700" fill="#333" text-anchor="middle">II. Distributed ML</text>
  <text x="390" y="295" font-size="9.5" fill="#555" text-anchor="middle">Parallelism | Communication | Fault Tolerance | Orchestration</text>
  <text x="390" y="312" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Logic of distributing work across thousands of devices</text>
  <text x="95" y="295" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="end">Distribution</text>

  <!-- Layer 1: The Fleet (bottom) -->
  <rect x="120" y="355" width="540" height="85" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="390" y="378" font-size="12" font-weight="700" fill="#333" text-anchor="middle">I. The Fleet</text>
  <text x="390" y="395" font-size="9.5" fill="#555" text-anchor="middle">Compute | Network Fabrics | Data Storage</text>
  <text x="390" y="412" font-size="8.5" fill="#555" text-anchor="middle" font-style="italic">Physical substrate: silicon, wires, and storage</text>
  <text x="95" y="395" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Infrastructure</text>

  <!-- ===== Scale arrow on right ===== -->
  <defs>
    <marker id="arrow-up" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,6 L4,0 L8,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <line x1="720" y1="430" x2="720" y2="65" stroke="#a31f34" stroke-width="2.5" marker-end="url(#arrow-up)"/>
  <text x="755" y="200" font-size="10" font-weight="700" fill="#a31f34" text-anchor="start" transform="rotate(90, 755, 200)">Scale Creates Qualitative Change</text>

  <!-- Footnote -->
  <text x="450" y="475" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The Fleet Stack integrates all six principles into a unified engineering discipline</text>
</svg>
