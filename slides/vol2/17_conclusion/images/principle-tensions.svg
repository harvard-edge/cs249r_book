<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Principle Tensions: The Art of Distributed ML Engineering</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Three Tension Pairs ===== -->

  <!-- Tension 1: Communication vs Failure -->
  <rect x="50" y="55" width="240" height="140" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="82" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Communication</text>
  <text x="170" y="82" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Communication</text>
  <text x="170" y="98" font-size="9" fill="#555" text-anchor="middle">Optimize sync patterns</text>
  <text x="170" y="113" font-size="9" fill="#555" text-anchor="middle">for bandwidth utilization</text>

  <rect x="350" y="55" width="240" height="140" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="470" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Failure Tolerance</text>
  <text x="470" y="98" font-size="9" fill="#555" text-anchor="middle">More sync points =</text>
  <text x="470" y="113" font-size="9" fill="#555" text-anchor="middle">more failure exposure</text>

  <line x1="295" y1="125" x2="345" y2="125" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="345" y1="115" x2="295" y2="115" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="320" y="106" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">TENSION</text>

  <!-- Resolution box -->
  <rect x="630" y="70" width="240" height="110" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="750" y="92" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Resolution:</text>
  <text x="750" y="110" font-size="8.5" fill="#555" text-anchor="middle">Async checkpointing +</text>
  <text x="750" y="125" font-size="8.5" fill="#555" text-anchor="middle">elastic training decouple</text>
  <text x="750" y="140" font-size="8.5" fill="#555" text-anchor="middle">sync from failure recovery</text>

  <!-- Tension 2: Performance vs Sustainability -->
  <rect x="50" y="215" width="240" height="140" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="170" y="238" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Raw Performance</text>
  <text x="170" y="258" font-size="9" fill="#555" text-anchor="middle">Maximize throughput</text>
  <text x="170" y="273" font-size="9" fill="#555" text-anchor="middle">and hardware utilization</text>

  <rect x="350" y="215" width="240" height="140" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="470" y="238" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Sustainability</text>
  <text x="470" y="258" font-size="9" fill="#555" text-anchor="middle">Limit energy, carbon,</text>
  <text x="470" y="273" font-size="9" fill="#555" text-anchor="middle">and infrastructure cost</text>

  <line x1="295" y1="285" x2="345" y2="285" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="345" y1="275" x2="295" y2="275" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="320" y="266" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">TENSION</text>

  <rect x="630" y="230" width="240" height="110" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="750" y="252" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Resolution:</text>
  <text x="750" y="270" font-size="8.5" fill="#555" text-anchor="middle">Carbon-aware scheduling +</text>
  <text x="750" y="285" font-size="8.5" fill="#555" text-anchor="middle">lifecycle assessment make</text>
  <text x="750" y="300" font-size="8.5" fill="#555" text-anchor="middle">efficiency a first-class metric</text>

  <!-- Tension 3: Responsible AI vs Latency -->
  <rect x="50" y="375" width="240" height="110" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="398" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Responsible AI</text>
  <text x="170" y="418" font-size="9" fill="#555" text-anchor="middle">Fairness checks, bias audits,</text>
  <text x="170" y="433" font-size="9" fill="#555" text-anchor="middle">explainability overhead</text>

  <rect x="350" y="375" width="240" height="110" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="470" y="398" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Latency Budget</text>
  <text x="470" y="418" font-size="9" fill="#555" text-anchor="middle">Governance adds ms to</text>
  <text x="470" y="433" font-size="9" fill="#555" text-anchor="middle">every prediction path</text>

  <line x1="295" y1="440" x2="345" y2="440" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="345" y1="430" x2="295" y2="430" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="320" y="421" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">TENSION</text>

  <rect x="630" y="387" width="240" height="85" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="750" y="409" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Resolution:</text>
  <text x="750" y="427" font-size="8.5" fill="#555" text-anchor="middle">Offline audits + lightweight</text>
  <text x="750" y="442" font-size="8.5" fill="#555" text-anchor="middle">online guardrails minimize</text>
  <text x="750" y="457" font-size="8.5" fill="#555" text-anchor="middle">latency impact</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Navigating these tensions defines the art of distributed ML engineering</text>
</svg>
