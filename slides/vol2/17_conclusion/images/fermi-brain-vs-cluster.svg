<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Fermi Estimate: Machine vs. Brain</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="420" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Left: The Machine ===== -->
  <text x="225" y="65" font-size="13" font-weight="700" fill="#4a90c4" text-anchor="middle">The Machine</text>
  <text x="225" y="82" font-size="9" fill="#555" text-anchor="middle">GPT-4 Scale Cluster</text>

  <!-- GPU icon block -->
  <rect x="70" y="100" width="310" height="140" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>

  <text x="225" y="125" font-size="10" font-weight="700" fill="#333" text-anchor="middle">25,000 H100 GPUs</text>

  <text x="100" y="155" font-size="9.5" fill="#555">Ops/sec:</text>
  <text x="280" y="155" font-size="10" font-weight="700" fill="#333" text-anchor="end">2.5 x 10^16 FLOPs</text>

  <text x="100" y="180" font-size="9.5" fill="#555">Power:</text>
  <text x="280" y="180" font-size="10" font-weight="700" fill="#c44" text-anchor="end">17.5 MW</text>

  <text x="100" y="205" font-size="9.5" fill="#555">Efficiency:</text>
  <text x="280" y="205" font-size="10" font-weight="700" fill="#333" text-anchor="end">1.4 x 10^9 ops/W</text>

  <!-- ===== Right: The Brain ===== -->
  <text x="675" y="65" font-size="13" font-weight="700" fill="#3d9e5a" text-anchor="middle">The Brain</text>
  <text x="675" y="82" font-size="9" fill="#555" text-anchor="middle">Human Neural System</text>

  <rect x="520" y="100" width="310" height="140" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>

  <text x="675" y="125" font-size="10" font-weight="700" fill="#333" text-anchor="middle">100 Trillion Synapses</text>

  <text x="550" y="155" font-size="9.5" fill="#555">Ops/sec:</text>
  <text x="730" y="155" font-size="10" font-weight="700" fill="#333" text-anchor="end">10^16 Synaptic Ops</text>

  <text x="550" y="180" font-size="9.5" fill="#555">Power:</text>
  <text x="730" y="180" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="end">20 W</text>

  <text x="550" y="205" font-size="9.5" fill="#555">Efficiency:</text>
  <text x="730" y="205" font-size="10" font-weight="700" fill="#333" text-anchor="end">5 x 10^14 ops/W</text>

  <!-- ===== Comparison Box ===== -->
  <rect x="100" y="270" width="700" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>

  <text x="300" y="300" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Raw Throughput:</text>
  <rect x="190" y="310" width="220" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="300" y="330" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Machine: ~2,500x faster</text>

  <text x="600" y="300" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Energy Efficiency:</text>
  <rect x="490" y="310" width="220" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="600" y="330" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Brain: ~350,000x better</text>

  <!-- ===== Bottom Insight ===== -->
  <rect x="150" y="395" width="600" height="50" fill="#a31f34"/>
  <text x="450" y="417" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">We have conquered Scale.</text>
  <text x="450" y="437" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">The challenge is Efficiency.</text>

  <!-- Footnote -->
  <text x="450" y="478" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Fermi estimate: orders of magnitude, not precise comparison (synaptic ops != FLOPs)</text>
</svg>
