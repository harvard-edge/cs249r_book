<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Six Principles of Distributed ML Systems Engineering</text>

  <!-- ===== Principle Cards (2x3 grid) ===== -->
  <!-- Row 1 -->
  <!-- P1: Communication Dominates -->
  <rect x="30" y="50" width="270" height="125" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="30" y="50" width="270" height="28" fill="#4a90c4"/>
  <rect x="30" y="68" width="270" height="10" fill="#4a90c4"/>
  <text x="165" y="69" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">1. Communication Dominates</text>
  <text x="165" y="100" font-size="9" fill="#333" text-anchor="middle">What is the bottleneck?</text>
  <text x="165" y="118" font-size="8.5" fill="#555" text-anchor="middle">Network bandwidth utilization</text>
  <text x="165" y="136" font-size="8" fill="#555" text-anchor="middle">Ring AllReduce: 2(n-1)/n efficiency</text>
  <text x="165" y="165" font-size="7.5" fill="#999" text-anchor="middle">Collective Communication</text>

  <!-- P2: Failure is Routine -->
  <rect x="315" y="50" width="270" height="125" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="315" y="50" width="270" height="28" fill="#c44"/>
  <rect x="315" y="68" width="270" height="10" fill="#c44"/>
  <text x="450" y="69" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2. Failure is Routine</text>
  <text x="450" y="100" font-size="9" fill="#333" text-anchor="middle">How do we recover?</text>
  <text x="450" y="118" font-size="8.5" fill="#555" text-anchor="middle">MTBF, checkpoint overhead</text>
  <text x="450" y="136" font-size="8" fill="#555" text-anchor="middle">419 failures / 54 days (Llama 3)</text>
  <text x="450" y="165" font-size="7.5" fill="#999" text-anchor="middle">Fault Tolerance &amp; Reliability</text>

  <!-- P3: Infrastructure Determines -->
  <rect x="600" y="50" width="270" height="125" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="600" y="50" width="270" height="28" fill="#c87b2a"/>
  <rect x="600" y="68" width="270" height="10" fill="#c87b2a"/>
  <text x="735" y="69" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">3. Infrastructure Determines</text>
  <text x="735" y="100" font-size="9" fill="#333" text-anchor="middle">What is possible?</text>
  <text x="735" y="118" font-size="8.5" fill="#555" text-anchor="middle">FLOPS, memory bandwidth</text>
  <text x="735" y="136" font-size="8" fill="#555" text-anchor="middle">Memory Wall + Decode Bottleneck</text>
  <text x="735" y="165" font-size="7.5" fill="#999" text-anchor="middle">Compute Infrastructure</text>

  <!-- Row 2 -->
  <!-- P4: Responsible Engineering -->
  <rect x="30" y="195" width="270" height="125" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="30" y="195" width="270" height="28" fill="#3d9e5a"/>
  <rect x="30" y="213" width="270" height="10" fill="#3d9e5a"/>
  <text x="165" y="214" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">4. Responsible Engineering</text>
  <text x="165" y="245" font-size="9" fill="#333" text-anchor="middle">Who is affected?</text>
  <text x="165" y="263" font-size="8.5" fill="#555" text-anchor="middle">Fairness metrics, audit trails</text>
  <text x="165" y="281" font-size="8" fill="#555" text-anchor="middle">Bias detection from inception</text>
  <text x="165" y="310" font-size="7.5" fill="#999" text-anchor="middle">Responsible AI</text>

  <!-- P5: Sustainability Constraints -->
  <rect x="315" y="195" width="270" height="125" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <rect x="315" y="195" width="270" height="28" fill="#2d7a2d"/>
  <rect x="315" y="213" width="270" height="10" fill="#2d7a2d"/>
  <text x="450" y="214" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">5. Sustainability Constraints</text>
  <text x="450" y="245" font-size="9" fill="#333" text-anchor="middle">What is the cost?</text>
  <text x="450" y="263" font-size="8.5" fill="#555" text-anchor="middle">kWh/training, carbon footprint</text>
  <text x="450" y="281" font-size="8" fill="#555" text-anchor="middle">Energy cost > dev budgets</text>
  <text x="450" y="310" font-size="7.5" fill="#999" text-anchor="middle">Sustainable AI</text>

  <!-- P6: Scale Creates Change -->
  <rect x="600" y="195" width="270" height="125" fill="#f7f7f7" stroke="#a31f34" stroke-width="2"/>
  <rect x="600" y="195" width="270" height="28" fill="#a31f34"/>
  <rect x="600" y="213" width="270" height="10" fill="#a31f34"/>
  <text x="735" y="214" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">6. Scale Creates Change</text>
  <text x="735" y="245" font-size="9" fill="#333" text-anchor="middle">What breaks at 1000x?</text>
  <text x="735" y="263" font-size="8.5" fill="#555" text-anchor="middle">Scaling efficiency</text>
  <text x="735" y="281" font-size="8" fill="#555" text-anchor="middle">Qualitative, not quantitative shift</text>
  <text x="735" y="310" font-size="7.5" fill="#999" text-anchor="middle">Distributed Training</text>

  <!-- ===== Bottom: Integration Note ===== -->
  <rect x="100" y="345" width="700" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="368" font-size="10" font-weight="700" fill="#333" text-anchor="middle">These principles form a layered architecture mirroring the Fleet Stack:</text>
  <text x="450" y="385" font-size="9" fill="#555" text-anchor="middle">Infrastructure (foundation) + Communication &amp; Failure (operations) + Governance (constraints) = Scale (emergent)</text>

  <!-- Footnote -->
  <text x="450" y="475" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Each principle connects to specific metrics and chapters developed throughout Volume II</text>
</svg>
