<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">From Scaling Era to Composition Era</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left: Scaling Era ===== -->
  <rect x="30" y="50" width="380" height="200" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="220" y="75" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Era of Scaling (Flattening)</text>

  <!-- Growth bars -->
  <rect x="60" y="95" width="60" height="130" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="90" y="235" font-size="8" fill="#555" text-anchor="middle">Moore's</text>
  <text x="90" y="245" font-size="8" fill="#555" text-anchor="middle">Law</text>
  <text x="90" y="190" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Slowing</text>

  <rect x="145" y="110" width="60" height="115" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="175" y="235" font-size="8" fill="#555" text-anchor="middle">Neural</text>
  <text x="175" y="245" font-size="8" fill="#555" text-anchor="middle">Scaling</text>
  <text x="175" y="190" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Hitting</text>
  <text x="175" y="200" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">limits</text>

  <!-- Diminishing returns arrow -->
  <line x1="230" y1="95" x2="370" y2="160" stroke="#c44" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="310" y="118" font-size="9" font-weight="700" fill="#c44" text-anchor="middle" transform="rotate(15, 310, 118)">Diminishing returns</text>

  <text x="310" y="175" font-size="9" fill="#555" text-anchor="middle">Both flattening against</text>
  <text x="310" y="190" font-size="9" fill="#555" text-anchor="middle">physical power limits</text>

  <!-- ===== Arrow between ===== -->
  <line x1="420" y1="150" x2="478" y2="150" stroke="#a31f34" stroke-width="3" marker-end="url(#arr-r)"/>
  <text x="450" y="140" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Next</text>
  <text x="450" y="170" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">100x?</text>

  <!-- ===== Right: Composition Era ===== -->
  <rect x="490" y="50" width="380" height="200" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="75" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Era of Composition (Rising)</text>

  <!-- Compound AI System -->
  <rect x="510" y="90" width="100" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="560" y="110" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Reasoning</text>
  <text x="560" y="123" font-size="8" fill="#555" text-anchor="middle">Agent</text>

  <rect x="625" y="90" width="100" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="675" y="110" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Retrieval</text>
  <text x="675" y="123" font-size="8" fill="#555" text-anchor="middle">System</text>

  <rect x="740" y="90" width="100" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="790" y="110" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Tool Use</text>
  <text x="790" y="123" font-size="8" fill="#555" text-anchor="middle">Actions</text>

  <!-- Orchestration bar -->
  <rect x="510" y="150" width="330" height="30" fill="#a31f34"/>
  <text x="675" y="170" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Orchestration Layer (the new "CPU")</text>

  <!-- Unit of compute label -->
  <text x="680" y="205" font-size="9" fill="#555" text-anchor="middle">Unit of compute: FLOP --&gt; Reasoning Chain</text>
  <text x="680" y="220" font-size="9" fill="#555" text-anchor="middle">Capability = Model x (Tools + Context + Planning)</text>

  <!-- ===== Bottom: 100x Decomposition ===== -->
  <rect x="80" y="280" width="740" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="305" font-size="12" font-weight="700" fill="#333" text-anchor="middle">The 100x Efficiency Decomposition</text>

  <rect x="120" y="320" width="180" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="210" y="340" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Hardware: 4x</text>
  <text x="210" y="355" font-size="8.5" fill="#555" text-anchor="middle">Moore's Law tail</text>

  <text x="315" y="347" font-size="14" font-weight="700" fill="#333" text-anchor="middle">x</text>

  <rect x="340" y="320" width="180" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="430" y="340" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Algorithm: 2.5x</text>
  <text x="430" y="355" font-size="8.5" fill="#555" text-anchor="middle">Sparsity + Distillation</text>

  <text x="535" y="347" font-size="14" font-weight="700" fill="#333" text-anchor="middle">x</text>

  <rect x="560" y="320" width="220" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="670" y="340" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Orchestration: 10x</text>
  <text x="670" y="355" font-size="8.5" fill="#555" text-anchor="middle">Compound AI Systems</text>

  <!-- ===== Bottom insight ===== -->
  <rect x="200" y="400" width="500" height="50" fill="#a31f34"/>
  <text x="450" y="422" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">The future of AI is not in model weights;</text>
  <text x="450" y="440" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">it is in the Fleet Logic.</text>

  <!-- Footnote -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">100x = 4x (hardware) x 2.5x (algorithm) x 10x (orchestration)</text>
</svg>
