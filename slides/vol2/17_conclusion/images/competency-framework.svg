<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Three Core Competencies Mastered</text>

  <!-- ===== Competency 1: Distributed Systems ===== -->
  <rect x="30" y="55" width="270" height="365" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="30" y="55" width="270" height="35" fill="#4a90c4"/>
  <rect x="30" y="80" width="270" height="10" fill="#4a90c4"/>
  <text x="165" y="78" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Distributed Systems</text>

  <text x="50" y="115" font-size="9.5" font-weight="700" fill="#333">Skills:</text>
  <text x="50" y="135" font-size="9" fill="#555">Orchestrate training beyond</text>
  <text x="50" y="150" font-size="9" fill="#555">single-machine memory/compute</text>
  <text x="50" y="175" font-size="9" fill="#555">Analyze communication patterns</text>
  <text x="50" y="190" font-size="9" fill="#555">(Ring AllReduce: 2(n-1)/n)</text>
  <text x="50" y="215" font-size="9" fill="#555">Select network architectures</text>
  <text x="50" y="230" font-size="9" fill="#555">for workload requirements</text>
  <text x="50" y="255" font-size="9" fill="#555">Design for routine failure</text>
  <text x="50" y="270" font-size="9" fill="#555">(MTBF: hours, not months)</text>

  <text x="50" y="305" font-size="9.5" font-weight="700" fill="#333">Fleet Stack Layers:</text>
  <rect x="50" y="315" width="230" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="165" y="329" font-size="8" fill="#333" text-anchor="middle">I. The Fleet (Infrastructure)</text>
  <rect x="50" y="340" width="230" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="165" y="354" font-size="8" fill="#333" text-anchor="middle">II. Distributed ML</text>
  <rect x="50" y="365" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="165" y="379" font-size="8" fill="#999" text-anchor="middle">III. Deployment</text>
  <rect x="50" y="390" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="165" y="404" font-size="8" fill="#999" text-anchor="middle">IV. Governance</text>

  <!-- ===== Competency 2: Production Operations ===== -->
  <rect x="315" y="55" width="270" height="365" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="315" y="55" width="270" height="35" fill="#c87b2a"/>
  <rect x="315" y="80" width="270" height="10" fill="#c87b2a"/>
  <text x="450" y="78" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Production Operations</text>

  <text x="335" y="115" font-size="9.5" font-weight="700" fill="#333">Skills:</text>
  <text x="335" y="135" font-size="9" fill="#555">Understand serving tax and</text>
  <text x="335" y="150" font-size="9" fill="#555">continuous batching tradeoffs</text>
  <text x="335" y="175" font-size="9" fill="#555">Monitor for performance</text>
  <text x="335" y="190" font-size="9" fill="#555">AND semantic drift</text>
  <text x="335" y="215" font-size="9" fill="#555">Deploy at edge, mobile,</text>
  <text x="335" y="230" font-size="9" fill="#555">and cloud simultaneously</text>
  <text x="335" y="255" font-size="9" fill="#555">Optimize inference throughput</text>
  <text x="335" y="270" font-size="9" fill="#555">and latency at scale</text>

  <text x="335" y="305" font-size="9.5" font-weight="700" fill="#333">Fleet Stack Layers:</text>
  <rect x="335" y="315" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="329" font-size="8" fill="#999" text-anchor="middle">I. The Fleet</text>
  <rect x="335" y="340" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="354" font-size="8" fill="#999" text-anchor="middle">II. Distributed ML</text>
  <rect x="335" y="365" width="230" height="20" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="450" y="379" font-size="8" fill="#333" text-anchor="middle">III. Deployment at Scale</text>
  <rect x="335" y="390" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="404" font-size="8" fill="#999" text-anchor="middle">IV. Governance</text>

  <!-- ===== Competency 3: Governance & Ethics ===== -->
  <rect x="600" y="55" width="270" height="365" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="600" y="55" width="270" height="35" fill="#3d9e5a"/>
  <rect x="600" y="80" width="270" height="10" fill="#3d9e5a"/>
  <text x="735" y="78" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Governance &amp; Ethics</text>

  <text x="620" y="115" font-size="9.5" font-weight="700" fill="#333">Skills:</text>
  <text x="620" y="135" font-size="9" fill="#555">Implement differential privacy</text>
  <text x="620" y="150" font-size="9" fill="#555">as engineering requirement</text>
  <text x="620" y="175" font-size="9" fill="#555">Audit for bias across</text>
  <text x="620" y="190" font-size="9" fill="#555">demographic groups</text>
  <text x="620" y="215" font-size="9" fill="#555">Schedule workloads for</text>
  <text x="620" y="230" font-size="9" fill="#555">carbon efficiency</text>
  <text x="620" y="255" font-size="9" fill="#555">Distinguish systems engineer</text>
  <text x="620" y="270" font-size="9" fill="#555">from model developer</text>

  <text x="620" y="305" font-size="9.5" font-weight="700" fill="#333">Fleet Stack Layers:</text>
  <rect x="620" y="315" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="735" y="329" font-size="8" fill="#999" text-anchor="middle">I. The Fleet</text>
  <rect x="620" y="340" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="735" y="354" font-size="8" fill="#999" text-anchor="middle">II. Distributed ML</text>
  <rect x="620" y="365" width="230" height="20" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="735" y="379" font-size="8" fill="#999" text-anchor="middle">III. Deployment</text>
  <rect x="620" y="390" width="230" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="735" y="404" font-size="8" fill="#333" text-anchor="middle">IV. The Responsible Fleet</text>

  <!-- Footnote -->
  <text x="450" y="455" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The complete engineering skill set spans all four layers of the Fleet Stack</text>
</svg>
