<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Post-Silicon Frontiers: The Energy Wall</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left: Electrical (Current) ===== -->
  <rect x="50" y="55" width="340" height="180" rx="6" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="220" y="80" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Current: Electrical Interconnect</text>

  <rect x="80" y="100" width="130" height="110" rx="4" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="145" y="125" font-size="28" fill="#c44" text-anchor="middle" font-weight="700">10</text>
  <text x="145" y="150" font-size="11" fill="#555" text-anchor="middle">pJ / bit</text>
  <text x="145" y="175" font-size="8.5" fill="#555" text-anchor="middle">Standard electrical</text>
  <text x="145" y="190" font-size="8.5" fill="#555" text-anchor="middle">signaling</text>

  <text x="290" y="130" font-size="9" fill="#555" text-anchor="middle">Copper traces</text>
  <text x="290" y="148" font-size="9" fill="#555" text-anchor="middle">Heat dissipation</text>
  <text x="290" y="166" font-size="9" fill="#555" text-anchor="middle">Signal integrity limits</text>
  <text x="290" y="190" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Cannot scale to 1M GPUs</text>

  <!-- ===== Arrow ===== -->
  <line x1="400" y1="145" x2="485" y2="145" stroke="#a31f34" stroke-width="3" marker-end="url(#ar)"/>
  <text x="443" y="135" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">1000x</text>

  <!-- ===== Right: Optical (Future) ===== -->
  <rect x="500" y="55" width="360" height="180" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="80" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Future: Co-Packaged Optics (CPO)</text>

  <rect x="530" y="100" width="130" height="110" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="595" y="125" font-size="28" fill="#3d9e5a" text-anchor="middle" font-weight="700">0.01</text>
  <text x="595" y="150" font-size="11" fill="#555" text-anchor="middle">pJ / bit</text>
  <text x="595" y="175" font-size="8.5" fill="#555" text-anchor="middle">Co-packaged</text>
  <text x="595" y="190" font-size="8.5" fill="#555" text-anchor="middle">photonic interconnect</text>

  <text x="755" y="130" font-size="9" fill="#555" text-anchor="middle">Photonic waveguides</text>
  <text x="755" y="148" font-size="9" fill="#555" text-anchor="middle">Minimal heat</text>
  <text x="755" y="166" font-size="9" fill="#555" text-anchor="middle">Long-distance fidelity</text>
  <text x="755" y="190" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Enables million-GPU scale</text>

  <!-- ===== Bottom: Enduring Principles ===== -->
  <rect x="80" y="265" width="740" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="288" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Enduring Principles (Substrate-Independent)</text>
  <text x="450" y="308" font-size="9.5" fill="#555" text-anchor="middle">Bandwidth Optimization  |  Fault Tolerance  |  Responsible Governance  |  Data Locality</text>

  <!-- ===== Three new substrates ===== -->
  <rect x="80" y="340" width="220" height="100" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="190" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">High Bandwidth Flash</text>
  <text x="190" y="385" font-size="9" fill="#555" text-anchor="middle">HBF replaces HBM with</text>
  <text x="190" y="400" font-size="9" fill="#555" text-anchor="middle">flash-based memory tiers</text>
  <text x="190" y="420" font-size="8.5" fill="#4a90c4" text-anchor="middle">Capacity >> Bandwidth tradeoff</text>

  <rect x="340" y="340" width="220" height="100" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">3D Logic Stacking</text>
  <text x="450" y="385" font-size="9" fill="#555" text-anchor="middle">Vertical integration of</text>
  <text x="450" y="400" font-size="9" fill="#555" text-anchor="middle">compute and memory dies</text>
  <text x="450" y="420" font-size="8.5" fill="#c87b2a" text-anchor="middle">Shorter data paths, less energy</text>

  <rect x="600" y="340" width="220" height="100" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="710" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Novel Substrates</text>
  <text x="710" y="385" font-size="9" fill="#555" text-anchor="middle">Photonic computing,</text>
  <text x="710" y="400" font-size="9" fill="#555" text-anchor="middle">neuromorphic architectures</text>
  <text x="710" y="420" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Brain-inspired efficiency</text>

  <!-- Footnote -->
  <text x="450" y="475" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The physics of communication is the binding constraint for the next era of intelligence</text>
</svg>
