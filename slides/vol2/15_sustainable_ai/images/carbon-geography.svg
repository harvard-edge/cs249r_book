<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Geography of Carbon: 40x Difference in Training Emissions</text>

  <!-- ===== Left: Quebec (Hydro) ===== -->
  <rect x="60" y="55" width="370" height="350" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="245" y="80" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Quebec (Hydropower)</text>
  <text x="245" y="97" font-size="9" fill="#555" text-anchor="middle">20 gCO2/kWh</text>

  <!-- Bar for Quebec -->
  <rect x="170" y="330" width="150" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="245" y="360" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">200 tonnes CO2</text>

  <!-- Details -->
  <rect x="90" y="120" width="300" height="35" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="240" y="142" font-size="9" fill="#555" text-anchor="middle">Energy: 10,000 MWh training run</text>

  <rect x="90" y="170" width="300" height="35" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="240" y="192" font-size="9" fill="#555" text-anchor="middle">Calculation: 10M kWh x 20g = 200M g = 200 tonnes</text>

  <rect x="90" y="220" width="300" height="35" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="240" y="242" font-size="9" fill="#555" text-anchor="middle">Equivalent to: ~100 transatlantic flights</text>

  <!-- ===== Right: Poland (Coal) ===== -->
  <rect x="470" y="55" width="370" height="350" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="655" y="80" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Poland (Coal)</text>
  <text x="655" y="97" font-size="9" fill="#555" text-anchor="middle">800 gCO2/kWh</text>

  <!-- Bar for Poland (scaled) -->
  <rect x="580" y="180" width="150" height="200" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="655" y="285" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">8,000 tonnes CO2</text>

  <!-- Details -->
  <rect x="500" y="120" width="300" height="35" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="650" y="142" font-size="9" fill="#555" text-anchor="middle">Same energy: 10,000 MWh training run</text>

  <!-- ===== 40x badge ===== -->
  <rect x="405" y="290" width="60" height="30" fill="#a31f34"/>
  <text x="435" y="310" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">40x</text>

  <!-- ===== Key Insight ===== -->
  <rect x="100" y="425" width="700" height="45" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="445" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Site selection is the single most effective tool for sustainable AI</text>
  <text x="450" y="462" font-size="9" fill="#555" text-anchor="middle">A 40x difference exceeds any possible algorithmic speedup</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="492" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Carbon = Energy (kWh) x Grid Intensity (gCO2/kWh)</text>
</svg>
