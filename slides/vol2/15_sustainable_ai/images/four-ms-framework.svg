<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Google's "4 Ms" Framework for Sustainable AI</text>

  <!-- ===== Four Columns ===== -->
  <!-- Model -->
  <rect x="50" y="55" width="185" height="310" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="95" y="67" width="95" height="28" rx="14" fill="#4a90c4"/>
  <text x="142" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Model</text>
  <text x="142" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Efficient Architectures</text>
  <text x="142" y="140" font-size="8" fill="#555" text-anchor="middle">Sparse models</text>
  <text x="142" y="155" font-size="8" fill="#555" text-anchor="middle">Pruning &amp; quantization</text>
  <text x="142" y="170" font-size="8" fill="#555" text-anchor="middle">Knowledge distillation</text>
  <text x="142" y="195" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">5-10x reduction</text>
  <rect x="80" y="210" width="125" height="25" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="142" y="227" font-size="8" fill="#555" text-anchor="middle">Evolved Transformer</text>
  <rect x="80" y="245" width="125" height="25" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="142" y="262" font-size="8" fill="#555" text-anchor="middle">Primer architecture</text>

  <!-- Machine -->
  <rect x="255" y="55" width="185" height="310" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="295" y="67" width="105" height="28" rx="14" fill="#3d9e5a"/>
  <text x="347" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Machine</text>
  <text x="347" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">AI-Specific Hardware</text>
  <text x="347" y="140" font-size="8" fill="#555" text-anchor="middle">TPUs vs general GPUs</text>
  <text x="347" y="155" font-size="8" fill="#555" text-anchor="middle">Custom accelerators</text>
  <text x="347" y="170" font-size="8" fill="#555" text-anchor="middle">Performance per watt</text>
  <text x="347" y="195" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">2-5x reduction</text>
  <rect x="285" y="210" width="125" height="25" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="347" y="227" font-size="8" fill="#555" text-anchor="middle">TPU v4: 5-13x vs GPU</text>

  <!-- Mechanization -->
  <rect x="460" y="55" width="185" height="310" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="480" y="67" width="145" height="28" rx="14" fill="#c87b2a"/>
  <text x="552" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Mechanization</text>
  <text x="552" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Cloud Infrastructure</text>
  <text x="552" y="140" font-size="8" fill="#555" text-anchor="middle">High utilization rates</text>
  <text x="552" y="155" font-size="8" fill="#555" text-anchor="middle">PUE optimization</text>
  <text x="552" y="170" font-size="8" fill="#555" text-anchor="middle">ML-driven cooling</text>
  <text x="552" y="195" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">1.4-2x reduction</text>
  <rect x="490" y="210" width="125" height="25" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="552" y="227" font-size="8" fill="#555" text-anchor="middle">PUE 1.08 (Google best)</text>

  <!-- Map -->
  <rect x="665" y="55" width="185" height="310" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="720" y="67" width="75" height="28" rx="14" fill="#a31f34"/>
  <text x="757" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Map</text>
  <text x="757" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Geographic Placement</text>
  <text x="757" y="140" font-size="8" fill="#555" text-anchor="middle">Low-carbon electricity</text>
  <text x="757" y="155" font-size="8" fill="#555" text-anchor="middle">Renewable energy</text>
  <text x="757" y="170" font-size="8" fill="#555" text-anchor="middle">Carbon-aware scheduling</text>
  <text x="757" y="195" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">5-10x reduction</text>
  <rect x="695" y="210" width="125" height="25" rx="3" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="757" y="227" font-size="8" fill="#555" text-anchor="middle">Hydro vs coal: 40x</text>

  <!-- ===== Combined Effect ===== -->
  <rect x="150" y="390" width="600" height="40" rx="4" fill="#a31f34"/>
  <text x="450" y="415" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Combined: 83x energy reduction, 747x CO2 reduction (Transformer on TPU in clean region)</text>

  <!-- Multiply signs -->
  <text x="245" y="380" font-size="16" font-weight="700" fill="#555" text-anchor="middle">x</text>
  <text x="450" y="380" font-size="16" font-weight="700" fill="#555" text-anchor="middle">x</text>
  <text x="655" y="380" font-size="16" font-weight="700" fill="#555" text-anchor="middle">x</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="460" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Patterson et al., "Carbon Emissions and Large Neural Networks," 2022</text>
</svg>
