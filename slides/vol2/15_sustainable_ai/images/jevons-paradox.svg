<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Jevons Paradox: Why Efficiency Alone Does Not Reduce Total Consumption</text>

  <!-- ===== Left Side: Per-Query ===== -->
  <rect x="50" y="55" width="380" height="200" fill="#e8f5e9" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="240" y="80" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Per-Query Cost Drops</text>

  <rect x="70" y="95" width="340" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="240" y="115" font-size="9" fill="#333" text-anchor="middle">GPT-3 launch: $0.06 / 1,000 tokens</text>

  <text x="240" y="150" font-size="14" font-weight="700" fill="#3d9e5a" text-anchor="middle">30x cheaper</text>

  <rect x="70" y="170" width="340" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="240" y="190" font-size="9" fill="#333" text-anchor="middle">Optimized: $0.002 / 1,000 tokens</text>

  <!-- ===== Right Side: Total Usage ===== -->
  <rect x="470" y="55" width="380" height="200" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="660" y="80" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Total Usage Explodes</text>

  <rect x="490" y="95" width="340" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="660" y="115" font-size="9" fill="#333" text-anchor="middle">Original demand: X queries/day</text>

  <text x="660" y="150" font-size="14" font-weight="700" fill="#c44" text-anchor="middle">100x more queries</text>

  <rect x="490" y="170" width="340" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="660" y="190" font-size="9" fill="#333" text-anchor="middle">New demand: 100X queries/day</text>

  <!-- ===== Net Effect Arrow ===== -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect x="150" y="280" width="600" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="450" y="305" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Net Result: Total emissions INCREASE despite efficiency gains</text>
  <text x="450" y="325" font-size="10" fill="#555" text-anchor="middle">30x more efficient per query, but 100x more queries = 3.3x MORE total energy</text>
  <text x="450" y="345" font-size="9" fill="#555" text-anchor="middle">Organizations report 3-5x consumption growth within 6 months of deployment</text>

  <!-- ===== Solution ===== -->
  <rect x="150" y="385" width="600" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="410" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Required: Dual Strategy</text>
  <text x="300" y="435" font-size="9" fill="#555" text-anchor="middle">Technical optimization</text>
  <text x="450" y="435" font-size="12" font-weight="700" fill="#333" text-anchor="middle">+</text>
  <text x="600" y="435" font-size="9" fill="#555" text-anchor="middle">Carbon-aware governance &amp; budgets</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Jevons Paradox (1865): Efficiency improvements in coal use increased total coal consumption</text>
</svg>
