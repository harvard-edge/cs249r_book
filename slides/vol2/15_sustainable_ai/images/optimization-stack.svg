<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Sustainability Optimization Stack: Algorithmic Techniques</text>

  <!-- ===== Three Columns ===== -->
  <!-- Pruning -->
  <rect x="50" y="55" width="250" height="360" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="120" y="67" width="110" height="28" rx="14" fill="#4a90c4"/>
  <text x="175" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Pruning</text>

  <text x="175" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Remove unnecessary weights</text>
  <rect x="70" y="130" width="210" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="175" y="150" font-size="8" fill="#555" text-anchor="middle">90% of weights removed (ResNet-50)</text>
  <rect x="70" y="170" width="210" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="175" y="190" font-size="8" fill="#555" text-anchor="middle">2-10x energy reduction</text>
  <rect x="70" y="210" width="210" height="30" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="175" y="230" font-size="8" fill="#555" text-anchor="middle">Structured &gt; Unstructured</text>

  <text x="175" y="270" font-size="8" fill="#555" text-anchor="middle">Reduces capacitance C</text>
  <text x="175" y="285" font-size="8" fill="#555" text-anchor="middle">in CMOS power equation</text>
  <text x="175" y="310" font-size="8" fill="#555" text-anchor="middle">Eliminates complete</text>
  <text x="175" y="325" font-size="8" fill="#555" text-anchor="middle">circuit paths</text>

  <!-- Quantization -->
  <rect x="325" y="55" width="250" height="360" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="378" y="67" width="140" height="28" rx="14" fill="#3d9e5a"/>
  <text x="448" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Quantization</text>

  <text x="450" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Reduce numerical precision</text>
  <rect x="345" y="130" width="210" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="150" font-size="8" fill="#555" text-anchor="middle">FP32 -> INT8: 16x less energy/op</text>
  <rect x="345" y="170" width="210" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="190" font-size="8" fill="#555" text-anchor="middle">FP32 -> INT4: 64x less energy/op</text>
  <rect x="345" y="210" width="210" height="30" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="230" font-size="8" fill="#555" text-anchor="middle">4x memory reduction (INT8)</text>

  <text x="450" y="270" font-size="8" fill="#555" text-anchor="middle">Reduces C (narrower paths)</text>
  <text x="450" y="285" font-size="8" fill="#555" text-anchor="middle">+ reduces V (larger margins)</text>
  <text x="450" y="310" font-size="8" fill="#555" text-anchor="middle">Combined: 6-10x energy</text>
  <text x="450" y="325" font-size="8" fill="#555" text-anchor="middle">reduction per operation</text>

  <!-- Distillation -->
  <rect x="600" y="55" width="250" height="360" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="658" y="67" width="135" height="28" rx="14" fill="#c87b2a"/>
  <text x="725" y="86" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Distillation</text>

  <text x="725" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Transfer to smaller model</text>
  <rect x="620" y="130" width="210" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="725" y="150" font-size="8" fill="#555" text-anchor="middle">DistilBERT: 97% accuracy</text>
  <rect x="620" y="170" width="210" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="725" y="190" font-size="8" fill="#555" text-anchor="middle">40% fewer parameters</text>
  <rect x="620" y="210" width="210" height="30" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="725" y="230" font-size="8" fill="#555" text-anchor="middle">60% faster inference</text>

  <text x="725" y="270" font-size="8" fill="#555" text-anchor="middle">Teacher -> Student transfer</text>
  <text x="725" y="285" font-size="8" fill="#555" text-anchor="middle">Captures soft probability</text>
  <text x="725" y="310" font-size="8" fill="#555" text-anchor="middle">One-time cost amortized</text>
  <text x="725" y="325" font-size="8" fill="#555" text-anchor="middle">across M queries</text>

  <!-- ===== CMOS Equation ===== -->
  <rect x="150" y="430" width="600" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="455" font-size="10" font-weight="700" fill="#333" text-anchor="middle">All techniques reduce terms in: P = alpha * C * V^2 * f + V * I_leak</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="492" font-size="9" fill="#999" text-anchor="middle" font-style="italic">These techniques can be combined for multiplicative energy savings</text>
</svg>
