<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Carbon Lifecycle of an ML System</text>

  <!-- ===== Three-Phase Bars ===== -->
  <!-- Manufacturing (5-15%) -->
  <rect x="80" y="70" width="200" height="340" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="180" y="100" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Manufacturing</text>
  <text x="180" y="118" font-size="9" fill="#555" text-anchor="middle">(Embodied Carbon)</text>
  <rect x="100" y="140" width="160" height="40" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="180" y="157" font-size="8" fill="#555" text-anchor="middle">Chip Fabrication</text>
  <text x="180" y="169" font-size="8" fill="#555" text-anchor="middle">150-200 kg CO2/GPU</text>
  <rect x="100" y="195" width="160" height="40" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="180" y="212" font-size="8" fill="#555" text-anchor="middle">Rare Earth Mining</text>
  <text x="180" y="224" font-size="8" fill="#555" text-anchor="middle">15+ elements</text>
  <rect x="100" y="250" width="160" height="40" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="180" y="267" font-size="8" fill="#555" text-anchor="middle">Assembly &amp; Transport</text>
  <!-- Percentage badge -->
  <rect x="145" y="320" width="70" height="24" rx="12" fill="#c87b2a"/>
  <text x="180" y="336" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">5-15%</text>

  <!-- Training (60-80%) -->
  <rect x="310" y="70" width="240" height="340" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="430" y="100" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="430" y="118" font-size="9" fill="#555" text-anchor="middle">(Operational Carbon)</text>
  <rect x="330" y="140" width="200" height="40" rx="3" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="430" y="157" font-size="8" fill="#555" text-anchor="middle">GPU Compute (FLOPs)</text>
  <text x="430" y="169" font-size="8" fill="#555" text-anchor="middle">1,287 MWh for GPT-3</text>
  <rect x="330" y="195" width="200" height="40" rx="3" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="430" y="212" font-size="8" fill="#555" text-anchor="middle">Cooling Overhead</text>
  <text x="430" y="224" font-size="8" fill="#555" text-anchor="middle">30-40% of facility power</text>
  <rect x="330" y="250" width="200" height="40" rx="3" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="430" y="267" font-size="8" fill="#555" text-anchor="middle">Communication Tax</text>
  <text x="430" y="279" font-size="8" fill="#555" text-anchor="middle">15-30% energy overhead</text>
  <!-- Percentage badge -->
  <rect x="393" y="320" width="74" height="24" rx="12" fill="#c44"/>
  <text x="430" y="336" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">60-80%</text>

  <!-- Inference (15-25%) -->
  <rect x="580" y="70" width="240" height="340" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="700" y="100" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Inference</text>
  <text x="700" y="118" font-size="9" fill="#555" text-anchor="middle">(Operational Carbon)</text>
  <rect x="600" y="140" width="200" height="40" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="700" y="157" font-size="8" fill="#555" text-anchor="middle">Per-Query Energy</text>
  <text x="700" y="169" font-size="8" fill="#555" text-anchor="middle">0.001 kWh/query</text>
  <rect x="600" y="195" width="200" height="40" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="700" y="212" font-size="8" fill="#555" text-anchor="middle">Cumulative Scale</text>
  <text x="700" y="224" font-size="8" fill="#555" text-anchor="middle">10M queries/day = 10 MWh/day</text>
  <rect x="600" y="250" width="200" height="40" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="700" y="267" font-size="8" fill="#555" text-anchor="middle">Exceeds Training in &lt;2 days</text>
  <text x="700" y="279" font-size="8" fill="#555" text-anchor="middle">at production scale</text>
  <!-- Percentage badge -->
  <rect x="663" y="320" width="74" height="24" rx="12" fill="#4a90c4"/>
  <text x="700" y="336" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">15-25%</text>

  <!-- ===== Key Insight ===== -->
  <rect x="130" y="430" width="640" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="448" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Key Insight: At production scale, inference emissions exceed training within days of deployment</text>
  <text x="450" y="462" font-size="9" fill="#555" text-anchor="middle">Making inference optimization the highest-impact sustainability lever</text>

  <!-- ===== Arrows ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <line x1="280" y1="240" x2="308" y2="240" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="550" y1="240" x2="578" y2="240" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Percentages represent typical emission distribution (Patterson et al., 2021)</text>
</svg>
