<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Energy Wall: AI Compute Demand vs. Physical Infrastructure</text>

  <!-- ===== Axes ===== -->
  <line x1="80" y1="420" x2="850" y2="420" stroke="#bbb" stroke-width="1.2"/>
  <line x1="80" y1="60" x2="80" y2="420" stroke="#bbb" stroke-width="1.2"/>

  <!-- Y-axis label -->
  <text x="25" y="240" font-size="10" fill="#555" text-anchor="middle" transform="rotate(-90,25,240)">Relative Scale (log, 2012 = 1x)</text>

  <!-- X-axis labels -->
  <text x="80" y="440" font-size="9" fill="#555" text-anchor="middle">2012</text>
  <text x="257" y="440" font-size="9" fill="#555" text-anchor="middle">2015</text>
  <text x="434" y="440" font-size="9" fill="#555" text-anchor="middle">2018</text>
  <text x="611" y="440" font-size="9" fill="#555" text-anchor="middle">2021</text>
  <text x="788" y="440" font-size="9" fill="#555" text-anchor="middle">2024</text>

  <!-- Y-axis tick labels (log scale) -->
  <text x="72" y="423" font-size="8" fill="#555" text-anchor="end">1x</text>
  <text x="72" y="363" font-size="8" fill="#555" text-anchor="end">10x</text>
  <text x="72" y="303" font-size="8" fill="#555" text-anchor="end">100x</text>
  <text x="72" y="243" font-size="8" fill="#555" text-anchor="end">1,000x</text>
  <text x="72" y="183" font-size="8" fill="#555" text-anchor="end">10,000x</text>
  <text x="72" y="123" font-size="8" fill="#555" text-anchor="end">100,000x</text>
  <text x="72" y="63" font-size="8" fill="#555" text-anchor="end">1,000,000x</text>

  <!-- Grid lines -->
  <line x1="80" y1="360" x2="850" y2="360" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="300" x2="850" y2="300" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="240" x2="850" y2="240" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="180" x2="850" y2="180" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="120" x2="850" y2="120" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- ===== Shaded Energy Deficit ===== -->
  <path d="M80,420 L200,390 L320,350 L440,300 L560,240 L680,170 L788,100
           L788,395 L680,400 L560,405 L440,408 L320,412 L200,415 L80,420 Z"
        fill="#f9d6d5" fill-opacity="0.4"/>
  <text x="500" y="340" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Energy Deficit</text>
  <text x="500" y="355" font-size="9" fill="#c44" text-anchor="middle">(The Sustainability Gap)</text>

  <!-- ===== AI Compute Demand curve (red, steep) ===== -->
  <path d="M80,420 L140,405 L200,390 L260,370 L320,350 L380,325 L440,300 L500,270 L560,240 L620,205 L680,170 L740,130 L788,100"
        fill="none" stroke="#c44" stroke-width="2.5"/>
  <text x="790" y="90" font-size="9" font-weight="700" fill="#c44" text-anchor="start">AI Compute</text>
  <text x="790" y="102" font-size="8" fill="#c44" text-anchor="start">(~3.4x/year)</text>

  <!-- ===== Hardware Efficiency curve (green, gentle) ===== -->
  <path d="M80,420 L200,415 L320,412 L440,408 L560,405 L680,400 L788,395"
        fill="none" stroke="#3d9e5a" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="790" y="390" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="start">HW Efficiency</text>
  <text x="790" y="402" font-size="8" fill="#3d9e5a" text-anchor="start">(~1.5x/year)</text>

  <!-- ===== Milestones ===== -->
  <circle cx="80" cy="420" r="4" fill="#333"/>
  <text x="80" y="455" font-size="8" font-weight="700" fill="#333" text-anchor="middle">AlexNet</text>

  <circle cx="530" cy="255" r="4" fill="#333"/>
  <text x="530" y="248" font-size="8" font-weight="700" fill="#333" text-anchor="middle">GPT-3</text>

  <circle cx="720" cy="140" r="4" fill="#333"/>
  <text x="720" y="133" font-size="8" font-weight="700" fill="#333" text-anchor="middle">GPT-4</text>

  <!-- ===== Gap annotation ===== -->
  <line x1="750" y1="125" x2="750" y2="397" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="770" y="260" font-size="10" font-weight="700" fill="#a31f34">~195,000x</text>
  <text x="770" y="273" font-size="8" fill="#a31f34">gap</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">AI compute doubles every ~3.4 months; hardware efficiency doubles every ~2 years</text>
</svg>
