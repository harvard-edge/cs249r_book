<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Power Usage Effectiveness (PUE): Where Energy Goes</text>

  <!-- ===== Left: Industry Average PUE 1.58 ===== -->
  <text x="230" y="65" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Industry Average (PUE 1.58)</text>

  <!-- Stacked bar -->
  <rect x="130" y="85" width="200" height="195" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="230" y="185" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">IT Equipment</text>
  <text x="230" y="200" font-size="9" fill="#555" text-anchor="middle">63% of total</text>

  <rect x="130" y="280" width="200" height="113" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="230" y="335" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Cooling + Overhead</text>
  <text x="230" y="350" font-size="9" fill="#555" text-anchor="middle">37% of total</text>

  <!-- ===== Right: State-of-Art PUE 1.10 ===== -->
  <text x="670" y="65" font-size="11" font-weight="700" fill="#333" text-anchor="middle">State-of-Art (PUE 1.10)</text>

  <!-- Stacked bar -->
  <rect x="570" y="85" width="200" height="340" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="670" y="260" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">IT Equipment</text>
  <text x="670" y="275" font-size="9" fill="#555" text-anchor="middle">91% of total</text>

  <rect x="570" y="388" width="200" height="37" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="670" y="410" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">9% overhead</text>

  <!-- ===== Arrow showing savings ===== -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>
  <line x1="350" y1="340" x2="555" y2="410" stroke="#3d9e5a" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <rect x="380" y="350" width="120" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="440" y="368" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">28% reduction</text>
  <text x="440" y="382" font-size="8" fill="#555" text-anchor="middle">in overhead energy</text>

  <!-- ===== Key Numbers Box ===== -->
  <rect x="100" y="430" width="700" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="250" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">2 MW cluster savings:</text>
  <text x="250" y="465" font-size="9" fill="#555" text-anchor="middle">8,409 MWh/year</text>
  <text x="450" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Financial impact:</text>
  <text x="450" y="465" font-size="9" fill="#555" text-anchor="middle">$588,672/year</text>
  <text x="650" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Equivalent to:</text>
  <text x="650" y="465" font-size="9" fill="#555" text-anchor="middle">~30% free efficiency boost</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="492" font-size="9" fill="#999" text-anchor="middle" font-style="italic">PUE = Total Facility Power / IT Equipment Power (ideal = 1.0)</text>
</svg>
