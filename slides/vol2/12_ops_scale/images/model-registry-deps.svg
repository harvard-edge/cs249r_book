<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Dependency-Aware Model Registry</text>

  <!-- ===== Registry Box ===== -->
  <rect x="320" y="50" width="260" height="55" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="73" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Model Registry</text>
  <text x="450" y="90" font-size="8" fill="#555" text-anchor="middle">Versions + Dependencies + Metadata</text>

  <!-- ===== Upstream Model ===== -->
  <rect x="350" y="140" width="200" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="160" font-size="10" font-weight="700" fill="#333" text-anchor="middle">User Embedding v3.2</text>
  <text x="450" y="175" font-size="8" fill="#555" text-anchor="middle">Updated upstream model</text>

  <!-- ===== Alert badge ===== -->
  <rect x="555" y="143" width="60" height="20" rx="10" fill="#a31f34"/>
  <text x="585" y="157" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">UPDATE</text>

  <!-- ===== Downstream models ===== -->
  <rect x="80" y="250" width="180" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="270" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Retrieval Model v4</text>
  <text x="170" y="285" font-size="8" fill="#555" text-anchor="middle">Candidate generation</text>

  <rect x="360" y="250" width="180" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="270" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Ranking Model v2</text>
  <text x="450" y="285" font-size="8" fill="#555" text-anchor="middle">Score candidates</text>

  <rect x="640" y="250" width="180" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="730" y="270" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Ensemble Model v1</text>
  <text x="730" y="285" font-size="8" fill="#555" text-anchor="middle">Combine outputs</text>

  <!-- ===== Dependency arrows ===== -->
  <line x1="400" y1="185" x2="200" y2="248" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="450" y1="185" x2="450" y2="248" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <line x1="500" y1="185" x2="700" y2="248" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- ===== Actions box ===== -->
  <rect x="150" y="340" width="600" height="110" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Registry Actions on Upstream Update</text>

  <text x="180" y="390" font-size="9" fill="#555">1. Identify all downstream consumers</text>
  <text x="180" y="408" font-size="9" fill="#555">2. Trigger re-evaluation with new embeddings</text>
  <text x="180" y="426" font-size="9" fill="#555">3. Block deployment until compatibility verified</text>
  <text x="180" y="444" font-size="9" fill="#555">4. Coordinate deployment order if proceeding</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Without dependency tracking, organizations discover dependencies through production failures</text>
</svg>
