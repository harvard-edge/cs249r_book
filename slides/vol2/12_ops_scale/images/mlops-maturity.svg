<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">MLOps Maturity Hierarchy</text>

  <!-- ===== Staircase Steps ===== -->
  <!-- Level 0 -->
  <rect x="60" y="360" width="180" height="100" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="150" y="395" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Level 0</text>
  <text x="150" y="412" font-size="9" fill="#555" text-anchor="middle">Manual</text>
  <text x="150" y="428" font-size="8" fill="#555" text-anchor="middle">Ad hoc scripts</text>
  <text x="150" y="442" font-size="8" fill="#555" text-anchor="middle">1-2 models</text>

  <!-- Level 1 -->
  <rect x="260" y="270" width="180" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="350" y="305" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Level 1</text>
  <text x="350" y="322" font-size="9" fill="#555" text-anchor="middle">Per-Model Automation</text>
  <text x="350" y="338" font-size="8" fill="#555" text-anchor="middle">CI/CD per model</text>
  <text x="350" y="352" font-size="8" fill="#555" text-anchor="middle">10-20 models</text>

  <!-- Level 2 -->
  <rect x="460" y="180" width="180" height="100" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="550" y="215" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Level 2</text>
  <text x="550" y="232" font-size="9" fill="#555" text-anchor="middle">Platform Operations</text>
  <text x="550" y="248" font-size="8" fill="#555" text-anchor="middle">Shared infrastructure</text>
  <text x="550" y="262" font-size="8" fill="#555" text-anchor="middle">50-200 models</text>

  <!-- Level 3 -->
  <rect x="660" y="90" width="180" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="125" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Level 3</text>
  <text x="750" y="142" font-size="9" fill="#555" text-anchor="middle">Enterprise Governance</text>
  <text x="750" y="158" font-size="8" fill="#555" text-anchor="middle">Organization-wide</text>
  <text x="750" y="172" font-size="8" fill="#555" text-anchor="middle">500+ models</text>

  <!-- ===== Arrows between steps ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <line x1="240" y1="370" x2="258" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="280" x2="458" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="190" x2="658" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Annotation ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Most organizations operate at Level 1; Levels 2-3 provide superlinear returns</text>
</svg>
