<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Feature Freshness: Batch vs. Streaming</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="430" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Left: Batch Pipeline ===== -->
  <text x="225" y="65" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Batch Pipeline (Daily)</text>

  <!-- User event -->
  <rect x="50" y="100" width="140" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="124" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User Click: 2 PM</text>

  <line x1="120" y1="140" x2="120" y2="168" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Batch aggregation -->
  <rect x="50" y="170" width="140" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="120" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Wait for Midnight</text>
  <text x="120" y="203" font-size="7" fill="#555" text-anchor="middle">Batch aggregation</text>

  <line x1="120" y1="210" x2="120" y2="238" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Feature store update -->
  <rect x="50" y="240" width="140" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="120" y="264" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Feature Store Update</text>

  <line x1="120" y1="280" x2="120" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Updated recs -->
  <rect x="50" y="310" width="140" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="120" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Next Day Recs</text>
  <text x="120" y="343" font-size="7" fill="#555" text-anchor="middle">L = 12-24 hours</text>

  <!-- Latency callout -->
  <rect x="250" y="180" width="150" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="325" y="200" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">12-24 hours</text>
  <text x="325" y="215" font-size="8" fill="#555" text-anchor="middle">User leaves session</text>

  <!-- ===== Right: Streaming Pipeline ===== -->
  <text x="675" y="65" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Streaming Pipeline (Real-time)</text>

  <!-- User event -->
  <rect x="560" y="100" width="140" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="630" y="124" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User Click: 2 PM</text>

  <line x1="630" y1="140" x2="630" y2="168" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Kafka/Flink -->
  <rect x="560" y="170" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="630" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Kafka / Flink</text>
  <text x="630" y="203" font-size="7" fill="#555" text-anchor="middle">Stream processing</text>

  <line x1="630" y1="210" x2="630" y2="238" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Feature store update -->
  <rect x="560" y="240" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="630" y="264" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Feature Store Update</text>

  <line x1="630" y1="280" x2="630" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Updated recs -->
  <rect x="560" y="310" width="140" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="630" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Next Page Load</text>
  <text x="630" y="343" font-size="7" fill="#555" text-anchor="middle">L = 1-5 seconds</text>

  <!-- Latency callout -->
  <rect x="750" y="180" width="120" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="810" y="200" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">1-5 seconds</text>
  <text x="810" y="215" font-size="8" fill="#555" text-anchor="middle">10-20% lift</text>

  <!-- ===== Bottom comparison ===== -->
  <rect x="200" y="390" width="500" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="412" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L_freshness = T_available - T_event</text>
  <text x="450" y="428" font-size="8" fill="#555" text-anchor="middle">Streaming reduces freshness latency by 10,000x, yielding 10-20% engagement lift</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">For session-based recommendations, real-time features are essential</text>
</svg>
