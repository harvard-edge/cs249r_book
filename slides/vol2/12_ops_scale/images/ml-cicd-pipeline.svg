<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">ML CI/CD Pipeline</text>

  <!-- ===== Pipeline Stages ===== -->
  <!-- Data Validation -->
  <rect x="30" y="80" width="120" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="90" y="103" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Data</text>
  <text x="90" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Validation</text>
  <text x="90" y="130" font-size="7" fill="#555" text-anchor="middle">Schema + Drift</text>

  <line x1="150" y1="107" x2="168" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Training -->
  <rect x="170" y="80" width="120" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="230" y="107" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="230" y="122" font-size="7" fill="#555" text-anchor="middle">Tracked hyperparams</text>

  <line x1="290" y1="107" x2="308" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Evaluation -->
  <rect x="310" y="80" width="120" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="370" y="107" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Evaluation</text>
  <text x="370" y="122" font-size="7" fill="#555" text-anchor="middle">Metric gates</text>

  <line x1="430" y1="107" x2="448" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Registry -->
  <rect x="450" y="80" width="120" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="510" y="103" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Registry</text>
  <text x="510" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Registration</text>
  <text x="510" y="130" font-size="7" fill="#555" text-anchor="middle">Version + lineage</text>

  <line x1="570" y1="107" x2="588" y2="107" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Canary -->
  <rect x="590" y="80" width="120" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="650" y="103" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Canary</text>
  <text x="650" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Deployment</text>
  <text x="650" y="130" font-size="7" fill="#555" text-anchor="middle">1% -> 5% -> 100%</text>

  <line x1="710" y1="107" x2="728" y2="107" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Production -->
  <rect x="730" y="80" width="130" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="795" y="107" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Production</text>
  <text x="795" y="122" font-size="7" fill="#555" text-anchor="middle">Serving live traffic</text>

  <!-- ===== Quality Gates (red barriers) ===== -->
  <rect x="155" y="67" width="10" height="80" fill="#a31f34" opacity="0.3"/>
  <rect x="295" y="67" width="10" height="80" fill="#a31f34" opacity="0.3"/>
  <rect x="435" y="67" width="10" height="80" fill="#a31f34" opacity="0.3"/>
  <rect x="575" y="67" width="10" height="80" fill="#a31f34" opacity="0.3"/>
  <rect x="715" y="67" width="10" height="80" fill="#a31f34" opacity="0.3"/>

  <text x="450" y="165" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">Quality Gates between every stage</text>

  <!-- ===== Validation Gate Types ===== -->
  <rect x="60" y="200" width="190" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="155" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Performance Gates</text>
  <text x="155" y="238" font-size="8" fill="#555" text-anchor="middle">Absolute thresholds</text>
  <text x="155" y="253" font-size="8" fill="#555" text-anchor="middle">Relative improvement</text>
  <text x="155" y="268" font-size="8" fill="#555" text-anchor="middle">Historical regression</text>

  <rect x="270" y="200" width="190" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="365" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Latency Gates</text>
  <text x="365" y="238" font-size="8" fill="#555" text-anchor="middle">Fraud: p99 &lt; 20 ms</text>
  <text x="365" y="253" font-size="8" fill="#555" text-anchor="middle">RecSys: p99 &lt; 50 ms</text>
  <text x="365" y="268" font-size="8" fill="#555" text-anchor="middle">LLM: p99 &lt; 2000 ms</text>

  <rect x="480" y="200" width="190" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="575" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fairness Gates</text>
  <text x="575" y="238" font-size="8" fill="#555" text-anchor="middle">Demographic parity</text>
  <text x="575" y="253" font-size="8" fill="#555" text-anchor="middle">Equalized odds</text>
  <text x="575" y="268" font-size="8" fill="#555" text-anchor="middle">Cross-group calibration</text>

  <rect x="690" y="200" width="170" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="775" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Quality Gates</text>
  <text x="775" y="238" font-size="8" fill="#555" text-anchor="middle">Schema conformance</text>
  <text x="775" y="253" font-size="8" fill="#555" text-anchor="middle">Feature distributions</text>
  <text x="775" y="268" font-size="8" fill="#555" text-anchor="middle">Freshness checks</text>

  <!-- ===== Feedback Loop ===== -->
  <path d="M795,135 L795,370 L90,370 L90,135" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="450" y="390" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Feedback: Retrain trigger on drift or degradation</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each stage is independently executable and idempotent</text>
</svg>
