<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Staged Rollout Strategy</text>

  <!-- ===== Timeline ===== -->
  <line x1="60" y1="250" x2="840" y2="250" stroke="#bbb" stroke-width="1.5"/>

  <!-- Stage 1: Shadow -->
  <rect x="70" y="120" width="150" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="145" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Shadow</text>
  <text x="145" y="163" font-size="8" fill="#555" text-anchor="middle">Log only, not served</text>
  <text x="145" y="178" font-size="8" fill="#555" text-anchor="middle">0% user exposure</text>
  <text x="145" y="193" font-size="8" fill="#555" text-anchor="middle">24-48 hours</text>
  <line x1="145" y1="220" x2="145" y2="247" stroke="#bbb" stroke-width="1"/>
  <circle cx="145" cy="250" r="5" fill="#bbb"/>

  <!-- Stage 2: Canary -->
  <rect x="250" y="120" width="150" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="325" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Canary</text>
  <text x="325" y="163" font-size="8" fill="#555" text-anchor="middle">1-5% traffic</text>
  <text x="325" y="178" font-size="8" fill="#555" text-anchor="middle">Statistical validation</text>
  <text x="325" y="193" font-size="8" fill="#555" text-anchor="middle">4-8 hours</text>
  <line x1="325" y1="220" x2="325" y2="247" stroke="#c87b2a" stroke-width="1"/>
  <circle cx="325" cy="250" r="5" fill="#c87b2a"/>

  <!-- Stage 3: Staged -->
  <rect x="430" y="120" width="150" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="505" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Staged Rollout</text>
  <text x="505" y="163" font-size="8" fill="#555" text-anchor="middle">5% -> 25% -> 50% -> 100%</text>
  <text x="505" y="178" font-size="8" fill="#555" text-anchor="middle">Business metric watch</text>
  <text x="505" y="193" font-size="8" fill="#555" text-anchor="middle">24-72 hours</text>
  <line x1="505" y1="220" x2="505" y2="247" stroke="#4a90c4" stroke-width="1"/>
  <circle cx="505" cy="250" r="5" fill="#4a90c4"/>

  <!-- Stage 4: Soak -->
  <rect x="610" y="120" width="150" height="100" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="685" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Soak</text>
  <text x="685" y="163" font-size="8" fill="#555" text-anchor="middle">100% traffic</text>
  <text x="685" y="178" font-size="8" fill="#555" text-anchor="middle">Extended monitoring</text>
  <text x="685" y="193" font-size="8" fill="#555" text-anchor="middle">7-14 days</text>
  <line x1="685" y1="220" x2="685" y2="247" stroke="#3d9e5a" stroke-width="1"/>
  <circle cx="685" cy="250" r="5" fill="#3d9e5a"/>

  <!-- ===== Rollback arrows ===== -->
  <path d="M240,290 C240,330 80,330 80,290" fill="none" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="160" y="345" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">Rollback on regression</text>

  <path d="M420,290 C420,360 80,360 80,290" fill="none" stroke="#a31f34" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- ===== Risk reduction callout ===== -->
  <rect x="200" y="380" width="500" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="402" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Risk Reduction: 20x</text>
  <text x="450" y="420" font-size="8" fill="#555" text-anchor="middle">5% canary limits blast radius to 1/20th of user base during detection window</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Total rollout: ~4 hours for confident deployment at scale</text>
</svg>
