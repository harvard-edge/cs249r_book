<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Platform ROI Threshold</text>

  <!-- ===== Axes ===== -->
  <line x1="100" y1="400" x2="830" y2="400" stroke="#bbb" stroke-width="1.2"/>
  <line x1="100" y1="400" x2="100" y2="60" stroke="#bbb" stroke-width="1.2"/>
  <text x="465" y="445" font-size="10" fill="#555" text-anchor="middle">Number of Production Models</text>
  <text x="35" y="230" font-size="10" fill="#555" text-anchor="middle" transform="rotate(-90,35,230)">Platform ROI (ratio)</text>

  <!-- X-axis labels -->
  <text x="100" y="420" font-size="8" fill="#555" text-anchor="middle">0</text>
  <text x="246" y="420" font-size="8" fill="#555" text-anchor="middle">25</text>
  <text x="392" y="420" font-size="8" fill="#555" text-anchor="middle">50</text>
  <text x="538" y="420" font-size="8" fill="#555" text-anchor="middle">75</text>
  <text x="684" y="420" font-size="8" fill="#555" text-anchor="middle">100</text>
  <text x="830" y="420" font-size="8" fill="#555" text-anchor="middle">125</text>

  <!-- Y-axis labels -->
  <text x="90" y="400" font-size="8" fill="#555" text-anchor="end">0</text>
  <text x="90" y="332" font-size="8" fill="#555" text-anchor="end">1x</text>
  <text x="90" y="264" font-size="8" fill="#555" text-anchor="end">2x</text>
  <text x="90" y="196" font-size="8" fill="#555" text-anchor="end">3x</text>
  <text x="90" y="128" font-size="8" fill="#555" text-anchor="end">4x</text>
  <text x="90" y="60" font-size="8" fill="#555" text-anchor="end">5x</text>

  <!-- ===== Break-even line (ROI = 1x) ===== -->
  <line x1="100" y1="332" x2="830" y2="332" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="835" y="329" font-size="8" font-weight="700" fill="#a31f34" text-anchor="start">Break-even</text>

  <!-- ===== Shaded zones ===== -->
  <rect x="100" y="332" width="730" height="68" fill="#f9d6d5" opacity="0.15"/>
  <rect x="100" y="60" width="730" height="272" fill="#d4edda" opacity="0.12"/>
  <text x="150" y="375" font-size="8" font-weight="700" fill="#c44" opacity="0.7">Investment Phase</text>
  <text x="700" y="100" font-size="8" font-weight="700" fill="#3d9e5a" opacity="0.7">Returns Phase</text>

  <!-- ===== $2M Platform curve ===== -->
  <polyline points="100,400 173,383 246,366 319,349 392,332 465,315 538,298 611,281 684,264 757,247 830,230"
            fill="none" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="835" y="230" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="start">$2M/yr</text>

  <!-- ===== $5M Platform curve ===== -->
  <polyline points="100,400 173,394 246,387 319,380 392,373 465,366 538,359 611,352 684,345 757,339 830,332"
            fill="none" stroke="#c87b2a" stroke-width="2.5"/>
  <text x="835" y="332" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="start">$5M/yr</text>

  <!-- ===== Break-even markers ===== -->
  <circle cx="246" cy="366" r="6" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <text x="256" y="358" font-size="8" font-weight="700" fill="#4a90c4">~20 models</text>

  <circle cx="392" cy="373" r="6" fill="#c87b2a" stroke="#fff" stroke-width="1.5"/>
  <text x="402" y="388" font-size="8" font-weight="700" fill="#c87b2a">~50 models</text>

  <!-- 100 models annotation -->
  <circle cx="684" cy="264" r="5" fill="#4a90c4" stroke="#fff" stroke-width="1.5"/>
  <line x1="684" y1="259" x2="684" y2="220" stroke="#4a90c4" stroke-width="1"/>
  <text x="684" y="215" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">100 models: 5x ROI</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">ROI = (N_models x T_saved x C_engineer) / C_platform</text>
</svg>
