<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Hierarchical Monitoring Architecture</text>

  <!-- ===== Pyramid Layers (top to bottom) ===== -->
  <!-- Level 1: Business Metrics (top, narrowest) -->
  <polygon points="450,60 560,150 340,150" fill="#a31f34" opacity="0.15" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="115" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">L1: Business</text>
  <text x="450" y="130" font-size="8" fill="#a31f34" text-anchor="middle">Revenue, Engagement</text>

  <!-- Level 2: Portfolio Metrics -->
  <polygon points="340,155 560,155 620,240 280,240" fill="#c87b2a" opacity="0.15" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="190" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">L2: Portfolio</text>
  <text x="450" y="210" font-size="8" fill="#c87b2a" text-anchor="middle">RecSys lift, Fraud rate, Moderation</text>

  <!-- Level 3: Model Metrics -->
  <polygon points="280,245 620,245 680,330 220,330" fill="#4a90c4" opacity="0.15" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="280" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">L3: Model</text>
  <text x="450" y="300" font-size="8" fill="#4a90c4" text-anchor="middle">Accuracy, Latency p99, Drift, Throughput</text>

  <!-- Level 4: Infrastructure Metrics -->
  <polygon points="220,335 680,335 740,420 160,420" fill="#3d9e5a" opacity="0.15" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="370" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">L4: Infrastructure</text>
  <text x="450" y="390" font-size="8" fill="#3d9e5a" text-anchor="middle">GPU utilization, Feature store latency, Network health</text>

  <!-- ===== Right-side annotations ===== -->
  <text x="750" y="115" font-size="9" font-weight="700" fill="#333">Few metrics</text>
  <text x="750" y="130" font-size="8" fill="#555">High signal, exec attention</text>

  <text x="750" y="200" font-size="9" font-weight="700" fill="#333">Aggregated</text>
  <text x="750" y="215" font-size="8" fill="#555">Domain-level health</text>

  <text x="750" y="290" font-size="9" font-weight="700" fill="#333">Investigation</text>
  <text x="750" y="305" font-size="8" fill="#555">Drill-down on anomaly</text>

  <text x="750" y="378" font-size="9" font-weight="700" fill="#333">Platform team</text>
  <text x="750" y="393" font-size="8" fill="#555">System-level ops</text>

  <!-- ===== Alert volume arrow ===== -->
  <line x1="120" y1="100" x2="120" y2="400" stroke="#555" stroke-width="1.2"/>
  <polygon points="120,100 115,115 125,115" fill="#555"/>
  <text x="80" y="250" font-size="8" fill="#555" text-anchor="middle" transform="rotate(-90,80,250)">Alert Volume Decreases</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">High-level metrics trigger alarms; lower-level metrics serve investigation</text>
</svg>
