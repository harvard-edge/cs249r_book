<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The N-Models Complexity Explosion</text>

  <!-- ===== Axes ===== -->
  <line x1="80" y1="420" x2="850" y2="420" stroke="#bbb" stroke-width="1.2"/>
  <line x1="80" y1="420" x2="80" y2="50" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="460" font-size="10" fill="#555" text-anchor="middle">Number of Models in Production</text>
  <text x="25" y="235" font-size="10" fill="#555" text-anchor="middle" transform="rotate(-90,25,235)">Operational Complexity</text>

  <!-- X-axis labels -->
  <text x="80" y="440" font-size="8" fill="#555" text-anchor="middle">0</text>
  <text x="234" y="440" font-size="8" fill="#555" text-anchor="middle">25</text>
  <text x="388" y="440" font-size="8" fill="#555" text-anchor="middle">50</text>
  <text x="542" y="440" font-size="8" fill="#555" text-anchor="middle">75</text>
  <text x="696" y="440" font-size="8" fill="#555" text-anchor="middle">100</text>
  <text x="850" y="440" font-size="8" fill="#555" text-anchor="middle">125</text>

  <!-- ===== Shaded Zones ===== -->
  <rect x="80" y="50" width="154" height="370" fill="#cfe2f3" opacity="0.25"/>
  <rect x="234" y="50" width="154" height="370" fill="#fdebd0" opacity="0.25"/>
  <rect x="388" y="50" width="462" height="370" fill="#f9d6d5" opacity="0.25"/>

  <text x="157" y="70" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Artisanal</text>
  <text x="311" y="70" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Growing Pains</text>
  <text x="619" y="70" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Platform Required</text>

  <!-- ===== Team Capacity Line ===== -->
  <line x1="80" y1="200" x2="850" y2="200" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="855" y="197" font-size="8" font-weight="700" fill="#a31f34" text-anchor="start">Team Capacity</text>

  <!-- ===== O(N) Monitoring Alerts ===== -->
  <polyline points="80,420 157,395 234,370 311,345 388,320 465,295 542,270 619,245 696,220 773,195 850,170"
            fill="none" stroke="#4a90c4" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="855" y="170" font-size="8" fill="#4a90c4" text-anchor="start">O(N) Alerts</text>

  <!-- ===== O(N log N) Deployment Coordination ===== -->
  <polyline points="80,420 157,400 234,375 311,348 388,318 465,285 542,248 619,208 696,165 773,118 850,68"
            fill="none" stroke="#c87b2a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="855" y="68" font-size="8" fill="#c87b2a" text-anchor="start">O(N log N)</text>

  <!-- ===== O(N^2) Dependencies ===== -->
  <polyline points="80,420 157,415 234,400 311,375 388,340 465,295 542,240 619,175 696,100 773,60"
            fill="none" stroke="#c44" stroke-width="2.5"/>
  <text x="778" y="57" font-size="8" fill="#c44" text-anchor="start">O(N^2) Dependencies</text>

  <!-- ===== Intersection marker ===== -->
  <circle cx="388" cy="320" r="5" fill="#a31f34" stroke="#fff" stroke-width="1.5"/>
  <text x="398" y="310" font-size="8" font-weight="700" fill="#a31f34">~50 models</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Per-model practices collapse at ~50 models; platform abstractions become essential</text>
</svg>
