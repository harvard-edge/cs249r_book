<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Hybrid 3D Parallelism: Mapping Strategy to Hardware</text>

  <!-- ===== Three strategy columns ===== -->

  <!-- Column 1: Tensor Parallelism -->
  <rect x="30" y="55" width="270" height="190" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="165" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Tensor Parallelism (t)</text>
  <text x="165" y="95" text-anchor="middle" font-size="9" fill="#555">Within a node (NVLink)</text>

  <!-- GPU grid within node -->
  <rect x="50" y="108" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="77" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU 0</text>
  <rect x="115" y="108" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="142" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU 1</text>
  <rect x="180" y="108" width="55" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="207" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GPU 2</text>
  <rect x="245" y="108" width="45" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="267" y="128" text-anchor="middle" font-size="7" font-weight="700" fill="#333">...</text>

  <!-- NVLink lines -->
  <line x1="77" y1="142" x2="77" y2="155" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="142" y1="142" x2="142" y2="155" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="207" y1="142" x2="207" y2="155" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="50" y="155" width="240" height="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="170" y="168" text-anchor="middle" font-size="8" font-weight="700" fill="#4a90c4">NVLink: 600-900 GB/s</text>

  <text x="165" y="195" text-anchor="middle" font-size="9" fill="#555">Split each matrix op</text>
  <text x="165" y="210" text-anchor="middle" font-size="9" fill="#555">AllReduce per layer</text>
  <text x="165" y="228" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">Highest BW demand</text>

  <!-- Column 2: Pipeline Parallelism -->
  <rect x="315" y="55" width="270" height="190" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a">Pipeline Parallelism (p)</text>
  <text x="450" y="95" text-anchor="middle" font-size="9" fill="#555">Across nodes (InfiniBand)</text>

  <!-- Node boxes -->
  <rect x="330" y="108" width="110" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="385" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Node 0</text>
  <text x="385" y="143" text-anchor="middle" font-size="8" fill="#555">Layers 0-23</text>

  <rect x="460" y="108" width="110" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="515" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Node 1</text>
  <text x="515" y="143" text-anchor="middle" font-size="8" fill="#555">Layers 24-47</text>

  <!-- IB connection -->
  <line x1="440" y1="133" x2="460" y2="133" stroke="#3d9e5a" stroke-width="2"/>
  <rect x="330" y="168" width="240" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="450" y="181" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">InfiniBand: 25-50 GB/s</text>

  <text x="450" y="205" text-anchor="middle" font-size="9" fill="#555">P2P activation transfer</text>
  <text x="450" y="220" text-anchor="middle" font-size="9" fill="#555">Low BW, bubble overhead</text>
  <text x="450" y="238" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Lowest BW demand</text>

  <!-- Column 3: Data Parallelism -->
  <rect x="600" y="55" width="270" height="190" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="735" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Data Parallelism (d)</text>
  <text x="735" y="95" text-anchor="middle" font-size="9" fill="#555">Across replica groups</text>

  <!-- Replica boxes -->
  <rect x="615" y="108" width="110" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="670" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Replica 0</text>
  <text x="670" y="143" text-anchor="middle" font-size="8" fill="#555">Batch shard 0</text>

  <rect x="745" y="108" width="110" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="800" y="128" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Replica 1</text>
  <text x="800" y="143" text-anchor="middle" font-size="8" fill="#555">Batch shard 1</text>

  <rect x="615" y="168" width="240" height="18" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="735" y="181" text-anchor="middle" font-size="8" font-weight="700" fill="#c87b2a">AllReduce gradients</text>

  <text x="735" y="205" text-anchor="middle" font-size="9" fill="#555">Gradient sync once/step</text>
  <text x="735" y="220" text-anchor="middle" font-size="9" fill="#555">Scales throughput</text>
  <text x="735" y="238" text-anchor="middle" font-size="9" font-weight="700" fill="#c87b2a">Medium BW demand</text>

  <!-- ===== Example config box ===== -->
  <rect x="60" y="270" width="780" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Example: GPT-4 Scale (1.8T params) on 8,192 H100 GPUs</text>

  <text x="200" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#4a90c4">t = 8</text>
  <text x="200" y="336" text-anchor="middle" font-size="9" fill="#555">8 GPUs per node</text>
  <text x="200" y="350" text-anchor="middle" font-size="9" fill="#555">(split each layer)</text>

  <text x="450" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#3d9e5a">p = 16</text>
  <text x="450" y="336" text-anchor="middle" font-size="9" fill="#555">16 pipeline stages</text>
  <text x="450" y="350" text-anchor="middle" font-size="9" fill="#555">(split model depth)</text>

  <text x="700" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#c87b2a">d = 64</text>
  <text x="700" y="336" text-anchor="middle" font-size="9" fill="#555">64 data replicas</text>
  <text x="700" y="350" text-anchor="middle" font-size="9" fill="#555">(throughput scaling)</text>

  <!-- Multiplication -->
  <text x="310" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="#333">x</text>
  <text x="580" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="#333">x</text>

  <!-- Total -->
  <rect x="300" y="375" width="300" height="30" fill="#a31f34"/>
  <text x="450" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Total = 8 x 16 x 64 = 8,192 GPUs</text>

  <!-- ===== Key insight ===== -->
  <rect x="120" y="420" width="660" height="35" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="443" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Match communication frequency to interconnect bandwidth: TP (fast) -> PP (medium) -> DP (slow)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">The Jeff Dean Test: Never run tensor parallelism across racks -- the physics forbids it.</text>
</svg>
