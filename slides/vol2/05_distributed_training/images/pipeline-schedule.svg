  <text x="405" y="441" font-size="8" fill="#333">Update</text>

  <!-- Bubble fraction annotation -->
  <text x="650" y="441" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Bubble = (P-1)/(P-1+M) = 3/7 = 43%</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Increase microbatches M >> P to shrink bubble overhead below 10%.</text>
