<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The Scaling Tax: Speedup vs. GPU Count</text>

  <!-- ===== Axes ===== -->
  <line x1="100" y1="420" x2="830" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="420" x2="100" y2="60" stroke="#333" stroke-width="1.5"/>

  <text x="460" y="460" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Number of GPUs (N)</text>
  <text x="50" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#333" transform="rotate(-90,50,240)">Effective Speedup</text>

  <!-- X-axis labels -->
  <text x="100" y="440" text-anchor="middle" font-size="9" fill="#555">1</text>
  <text x="220" y="440" text-anchor="middle" font-size="9" fill="#555">8</text>
  <text x="340" y="440" text-anchor="middle" font-size="9" fill="#555">32</text>
  <text x="460" y="440" text-anchor="middle" font-size="9" fill="#555">64</text>
  <text x="580" y="440" text-anchor="middle" font-size="9" fill="#555">128</text>
  <text x="700" y="440" text-anchor="middle" font-size="9" fill="#555">256</text>
  <text x="820" y="440" text-anchor="middle" font-size="9" fill="#555">512</text>

  <!-- Y-axis labels -->
  <text x="85" y="423" text-anchor="end" font-size="9" fill="#555">1x</text>
  <text x="85" y="360" text-anchor="end" font-size="9" fill="#555">8x</text>
  <text x="85" y="300" text-anchor="end" font-size="9" fill="#555">32x</text>
  <text x="85" y="240" text-anchor="end" font-size="9" fill="#555">64x</text>
  <text x="85" y="180" text-anchor="end" font-size="9" fill="#555">128x</text>
  <text x="85" y="120" text-anchor="end" font-size="9" fill="#555">256x</text>
  <text x="85" y="73" text-anchor="end" font-size="9" fill="#555">512x</text>

  <!-- Grid lines -->
  <line x1="100" y1="360" x2="830" y2="360" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="300" x2="830" y2="300" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="240" x2="830" y2="240" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="180" x2="830" y2="180" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="120" x2="830" y2="120" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- ===== Ideal Linear (dashed black) ===== -->
  <polyline points="100,420 220,360 340,300 460,240 580,180 700,120 820,70"
            fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ===== Compute Bound r=0.05 (green) ===== -->
  <polyline points="100,420 220,362 340,308 460,258 580,215 700,180 820,155"
            fill="none" stroke="#3d9e5a" stroke-width="2"/>
  <circle cx="220" cy="362" r="4" fill="#3d9e5a"/>
  <circle cx="340" cy="308" r="4" fill="#3d9e5a"/>
  <circle cx="460" cy="258" r="4" fill="#3d9e5a"/>
  <circle cx="580" cy="215" r="4" fill="#3d9e5a"/>
  <circle cx="700" cy="180" r="4" fill="#3d9e5a"/>
  <circle cx="820" cy="155" r="4" fill="#3d9e5a"/>

  <!-- ===== Balanced r=0.20 (orange) ===== -->
  <polyline points="100,420 220,370 340,330 460,305 580,290 700,280 820,275"
            fill="none" stroke="#c87b2a" stroke-width="2"/>
  <circle cx="220" cy="370" r="4" fill="#c87b2a"/>
  <circle cx="340" cy="330" r="4" fill="#c87b2a"/>
  <circle cx="460" cy="305" r="4" fill="#c87b2a"/>
  <circle cx="580" cy="290" r="4" fill="#c87b2a"/>
  <circle cx="700" cy="280" r="4" fill="#c87b2a"/>

  <!-- ===== Bandwidth Bound r=0.50 (red) ===== -->
  <polyline points="100,420 220,390 340,378 460,374 580,372 700,371 820,370"
            fill="none" stroke="#c44" stroke-width="2"/>
  <circle cx="220" cy="390" r="4" fill="#c44"/>
  <circle cx="340" cy="378" r="4" fill="#c44"/>
  <circle cx="460" cy="374" r="4" fill="#c44"/>
  <circle cx="580" cy="372" r="4" fill="#c44"/>

  <!-- ===== Legend ===== -->
  <rect x="130" y="70" width="220" height="95" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <line x1="145" y1="90" x2="175" y2="90" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="185" y="94" font-size="9" fill="#333">Ideal Linear</text>

  <line x1="145" y1="110" x2="175" y2="110" stroke="#3d9e5a" stroke-width="2"/>
  <circle cx="160" cy="110" r="3" fill="#3d9e5a"/>
  <text x="185" y="114" font-size="9" fill="#3d9e5a">Compute Bound (r=5%)</text>

  <line x1="145" y1="130" x2="175" y2="130" stroke="#c87b2a" stroke-width="2"/>
  <circle cx="160" cy="130" r="3" fill="#c87b2a"/>
  <text x="185" y="134" font-size="9" fill="#c87b2a">Balanced (r=20%)</text>

  <line x1="145" y1="150" x2="175" y2="150" stroke="#c44" stroke-width="2"/>
  <circle cx="160" cy="150" r="3" fill="#c44"/>
  <text x="185" y="154" font-size="9" fill="#c44">Bandwidth Bound (r=50%)</text>

  <!-- ===== Communication Wall annotation ===== -->
  <line x1="460" y1="374" x2="530" y2="340" stroke="#a31f34" stroke-width="1"/>
  <rect x="530" y="325" width="150" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="605" y="344" text-anchor="middle" font-size="9" font-weight="700" fill="#a31f34">Communication Wall</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Speedup(N) = N / (1 + (N-1) * r) where r = communication fraction of total step time.</text>
</svg>
