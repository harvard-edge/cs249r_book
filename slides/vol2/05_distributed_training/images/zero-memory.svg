<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ZeRO: Progressive Memory Sharding</text>

  <!-- ===== DDP (Baseline) ===== -->
  <text x="130" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Standard DDP</text>
  <text x="130" y="80" text-anchor="middle" font-size="9" fill="#555">Full replication</text>

  <!-- GPU0 -->
  <rect x="40" y="95" width="180" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="130" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#555">GPU 0</text>
  <rect x="50" y="118" width="160" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Parameters (2B)</text>
  <rect x="50" y="144" width="160" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="130" y="159" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Gradients (2B)</text>
  <rect x="50" y="170" width="160" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="130" y="189" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Optimizer States (12B)</text>
  <text x="130" y="203" text-anchor="middle" font-size="7.5" fill="#555">momentum + variance + master</text>

  <!-- Memory total -->
  <rect x="55" y="225" width="150" height="20" fill="#a31f34"/>
  <text x="130" y="239" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">16 bytes/param</text>

  <!-- ===== ZeRO-1 ===== -->
  <text x="350" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ZeRO-1</text>
  <text x="350" y="80" text-anchor="middle" font-size="9" fill="#555">Shard optimizer</text>

  <rect x="260" y="95" width="180" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="350" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#555">GPU 0 of N</text>
  <rect x="270" y="118" width="160" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="350" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Parameters (2B)</text>
  <rect x="270" y="144" width="160" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="350" y="159" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Gradients (2B)</text>
  <rect x="270" y="170" width="40" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="290" y="195" text-anchor="middle" font-size="7" fill="#333">1/N</text>
  <rect x="314" y="170" width="40" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="358" y="170" width="40" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="402" y="170" width="28" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>

  <rect x="275" y="225" width="150" height="20" fill="#3d9e5a"/>
  <text x="350" y="239" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">~4x reduction</text>

  <!-- ===== ZeRO-2 ===== -->
  <text x="570" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ZeRO-2</text>
  <text x="570" y="80" text-anchor="middle" font-size="9" fill="#555">+ Shard gradients</text>

  <rect x="480" y="95" width="180" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="570" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#555">GPU 0 of N</text>
  <rect x="490" y="118" width="160" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="570" y="133" text-anchor="middle" font-size="8" font-weight="700" fill="#333">Parameters (2B)</text>
  <rect x="490" y="144" width="40" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="510" y="159" text-anchor="middle" font-size="7" fill="#333">1/N</text>
  <rect x="534" y="144" width="40" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="578" y="144" width="40" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="622" y="144" width="28" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>

  <rect x="490" y="170" width="40" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="510" y="195" text-anchor="middle" font-size="7" fill="#333">1/N</text>
  <rect x="534" y="170" width="40" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="578" y="170" width="40" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="622" y="170" width="28" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>

  <rect x="495" y="225" width="150" height="20" fill="#3d9e5a"/>
  <text x="570" y="239" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">~8x reduction</text>

  <!-- ===== ZeRO-3 / FSDP ===== -->
  <text x="790" y="65" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ZeRO-3 / FSDP</text>
  <text x="790" y="80" text-anchor="middle" font-size="9" fill="#555">+ Shard parameters</text>

  <rect x="700" y="95" width="180" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="790" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#555">GPU 0 of N</text>
  <rect x="710" y="118" width="40" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="730" y="133" text-anchor="middle" font-size="7" fill="#333">1/N</text>
  <rect x="754" y="118" width="40" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="798" y="118" width="40" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <rect x="842" y="118" width="28" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>

  <rect x="710" y="144" width="40" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="730" y="159" text-anchor="middle" font-size="7" fill="#333">1/N</text>
  <rect x="754" y="144" width="40" height="22" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>

  <rect x="710" y="170" width="40" height="42" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="730" y="195" text-anchor="middle" font-size="7" fill="#333">1/N</text>
  <rect x="754" y="170" width="40" height="42" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="3,2"/>

  <rect x="715" y="225" width="150" height="20" fill="#4a90c4"/>
  <text x="790" y="239" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">~Nx reduction (linear)</text>

  <!-- ===== Comparison Table Area ===== -->
  <rect x="40" y="270" width="840" height="115" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Headers -->
  <text x="130" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Stage</text>
  <text x="340" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#333">What is Sharded</text>
  <text x="560" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Memory Reduction</text>
  <text x="780" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Comm. Overhead</text>

  <line x1="50" y1="302" x2="870" y2="302" stroke="#bbb" stroke-width="0.8"/>

  <!-- ZeRO-1 row -->
  <text x="130" y="322" text-anchor="middle" font-size="9" font-weight="700" fill="#333">ZeRO-1</text>
  <text x="340" y="322" text-anchor="middle" font-size="9" fill="#555">Optimizer states</text>
  <text x="560" y="322" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">~4x</text>
  <text x="780" y="322" text-anchor="middle" font-size="9" fill="#555">Same as DDP</text>

  <!-- ZeRO-2 row -->
  <text x="130" y="347" text-anchor="middle" font-size="9" font-weight="700" fill="#333">ZeRO-2</text>
  <text x="340" y="347" text-anchor="middle" font-size="9" fill="#555">+ Gradients</text>
  <text x="560" y="347" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">~8x</text>
  <text x="780" y="347" text-anchor="middle" font-size="9" fill="#555">ReduceScatter</text>

  <!-- ZeRO-3 row -->
  <text x="130" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#333">ZeRO-3</text>
  <text x="340" y="372" text-anchor="middle" font-size="9" fill="#555">+ Parameters</text>
  <text x="560" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#4a90c4">~Nx (linear)</text>
  <text x="780" y="372" text-anchor="middle" font-size="9" fill="#c44">AllGather per layer</text>

  <!-- ===== Key Insight ===== -->
  <rect x="180" y="405" width="540" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="450" y="427" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Trade-off: More sharding = less memory, but more communication (10-25% overhead)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">ZeRO-3 with 64 GPUs: 7B model drops from 112 GB to 1.75 GB per GPU.</text>
</svg>
