<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">The 3D Parallelism Cube</text>

  <!-- ===== Cube wireframe ===== -->
  <!-- Back face -->
  <path d="M250,120 L550,120 L550,350 L250,350 Z" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <!-- Top face -->
  <path d="M250,120 L380,60 L680,60 L550,120 Z" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" opacity="0.5"/>
  <!-- Right face -->
  <path d="M550,120 L680,60 L680,290 L550,350 Z" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" opacity="0.5"/>
  <!-- Front face edges -->
  <line x1="250" y1="350" x2="380" y2="290" stroke="#bbb" stroke-width="1.0" stroke-dasharray="4,3"/>
  <line x1="380" y1="290" x2="680" y2="290" stroke="#bbb" stroke-width="1.0" stroke-dasharray="4,3"/>
  <line x1="380" y1="290" x2="380" y2="60" stroke="#bbb" stroke-width="1.0" stroke-dasharray="4,3"/>

  <!-- ===== Axis Arrows ===== -->
  <!-- Data Parallelism axis (horizontal, left-right) -->
  <line x1="250" y1="370" x2="570" y2="370" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#4a90c4">Data Parallelism (d)</text>
  <text x="410" y="410" text-anchor="middle" font-size="9" fill="#555">Replicate model, split data</text>

  <!-- Pipeline Parallelism axis (vertical, top-bottom) -->
  <line x1="230" y1="340" x2="230" y2="130" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="160" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a" transform="rotate(-90,160,230)">Pipeline (p)</text>
  <text x="130" y="230" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90,130,230)">Split layers (depth)</text>

  <!-- Tensor Parallelism axis (diagonal, front-back) -->
  <line x1="570" y1="360" x2="690" y2="300" stroke="#c87b2a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="680" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#c87b2a">Tensor (t)</text>
  <text x="680" y="360" text-anchor="middle" font-size="9" fill="#555">Split ops (width)</text>

  <!-- ===== Config Point ===== -->
  <circle cx="460" cy="200" r="6" fill="#a31f34"/>
  <text x="475" y="195" font-size="10" font-weight="700" fill="#a31f34">(d, t, p)</text>
  <text x="475" y="210" font-size="9" fill="#555">Production config</text>

  <!-- ===== Formula ===== -->
  <rect x="290" y="430" width="320" height="28" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="449" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Total Accelerators = d x t x p</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Each axis is independent; production systems select a specific coordinate in this cube.</text>
</svg>
