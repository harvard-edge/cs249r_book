<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Data Parallel Training: Five-Stage Workflow</text>

  <!-- ===== Stage 1: Input Data ===== -->
  <rect x="30" y="60" width="120" height="110" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="90" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#333">1. Input Data</text>
  <rect x="45" y="92" width="90" height="16" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="90" y="104" text-anchor="middle" font-size="8" fill="#555">Batch 1</text>
  <rect x="45" y="112" width="90" height="16" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="90" y="124" text-anchor="middle" font-size="8" fill="#555">Batch 2</text>
  <rect x="45" y="132" width="90" height="16" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="90" y="144" text-anchor="middle" font-size="8" fill="#555">Batch 3</text>
  <rect x="45" y="152" width="90" height="16" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="90" y="164" text-anchor="middle" font-size="8" fill="#555">Batch 4</text>

  <!-- Arrow from data to GPUs -->
  <line x1="150" y1="115" x2="185" y2="115" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Stage 2: Assign to GPUs ===== -->
  <text x="280" y="52" text-anchor="middle" font-size="10" font-weight="700" fill="#333">2. Assign to GPUs</text>

  <!-- GPU boxes with model replicas -->
  <rect x="195" y="65" width="170" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <rect x="200" y="69" width="24" height="22" fill="#a31f34"/>
  <text x="212" y="84" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU0</text>
  <text x="280" y="84" text-anchor="middle" font-size="8.5" fill="#333">Model Copy + Batch 1</text>

  <rect x="195" y="100" width="170" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <rect x="200" y="104" width="24" height="22" fill="#a31f34"/>
  <text x="212" y="119" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU1</text>
  <text x="280" y="119" text-anchor="middle" font-size="8.5" fill="#333">Model Copy + Batch 2</text>

  <rect x="195" y="135" width="170" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <rect x="200" y="139" width="24" height="22" fill="#a31f34"/>
  <text x="212" y="154" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU2</text>
  <text x="280" y="154" text-anchor="middle" font-size="8.5" fill="#333">Model Copy + Batch 3</text>

  <rect x="195" y="170" width="170" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <rect x="200" y="174" width="24" height="22" fill="#a31f34"/>
  <text x="212" y="189" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU3</text>
  <text x="280" y="189" text-anchor="middle" font-size="8.5" fill="#333">Model Copy + Batch 4</text>

  <!-- Arrow to compute -->
  <line x1="365" y1="130" x2="395" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3: Compute ===== -->
  <rect x="405" y="55" width="155" height="155" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="482" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#333">3. Compute</text>

  <text x="482" y="92" text-anchor="middle" font-size="8.5" fill="#555">Forward Pass</text>
  <text x="482" y="105" text-anchor="middle" font-size="8.5" fill="#555">Loss Computation</text>
  <text x="482" y="118" text-anchor="middle" font-size="8.5" fill="#555">Backward Pass</text>
  <text x="482" y="135" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">Independent per GPU</text>

  <text x="415" y="160" font-size="8" fill="#555">g0 = grad(loss, B1)</text>
  <text x="415" y="173" font-size="8" fill="#555">g1 = grad(loss, B2)</text>
  <text x="415" y="186" font-size="8" fill="#555">g2 = grad(loss, B3)</text>
  <text x="415" y="199" font-size="8" fill="#555">g3 = grad(loss, B4)</text>

  <!-- Arrow to sync -->
  <line x1="560" y1="130" x2="590" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Stage 4: Synchronize (AllReduce) ===== -->
  <rect x="600" y="55" width="130" height="155" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="665" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#333">4. AllReduce</text>
  <text x="665" y="90" text-anchor="middle" font-size="8.5" fill="#555">Aggregate gradients</text>
  <text x="665" y="105" text-anchor="middle" font-size="8.5" fill="#555">across all GPUs</text>

  <text x="665" y="130" text-anchor="middle" font-size="9" font-weight="700" fill="#c44">Bottleneck!</text>
  <text x="665" y="148" text-anchor="middle" font-size="8" fill="#555">g_global =</text>
  <text x="665" y="161" text-anchor="middle" font-size="8" fill="#555">(g0+g1+g2+g3)/4</text>

  <text x="665" y="185" text-anchor="middle" font-size="8" fill="#c44">10-40% of step time</text>
  <text x="665" y="198" text-anchor="middle" font-size="8" fill="#c44">at scale</text>

  <!-- Arrow to update -->
  <line x1="730" y1="130" x2="760" y2="130" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Stage 5: Update ===== -->
  <rect x="770" y="70" width="110" height="125" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="825" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#333">5. Update</text>
  <text x="825" y="108" text-anchor="middle" font-size="8.5" fill="#555">Each GPU applies</text>
  <text x="825" y="121" text-anchor="middle" font-size="8.5" fill="#555">identical update:</text>
  <text x="825" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#3d9e5a">W = W - lr * g</text>
  <text x="825" y="162" text-anchor="middle" font-size="8" fill="#555">All replicas stay</text>
  <text x="825" y="175" text-anchor="middle" font-size="8" fill="#555">synchronized</text>

  <!-- ===== Repeat Arrow ===== -->
  <path d="M825,195 L825,230 L90,230 L90,175" fill="none" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="450" y="248" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Repeat for each batch until convergence</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Data parallelism is mathematically equivalent to single-device training with larger batch size.</text>
</svg>
