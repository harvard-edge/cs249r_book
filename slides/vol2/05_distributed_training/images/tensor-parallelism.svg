<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Tensor Parallelism: Splitting Matrix Operations Within a Layer</text>

  <!-- ===== Input ===== -->
  <rect x="50" y="150" width="100" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="100" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Input X</text>
  <text x="100" y="198" text-anchor="middle" font-size="8" fill="#555">[B, S, H]</text>
  <text x="100" y="215" text-anchor="middle" font-size="8" fill="#555">Broadcast</text>

  <!-- Arrows from input -->
  <line x1="150" y1="170" x2="210" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="150" y1="210" x2="210" y2="250" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== GPU 0 ===== -->
  <rect x="220" y="70" width="200" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="225" y="74" width="30" height="18" fill="#a31f34"/>
  <text x="240" y="87" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU0</text>
  <text x="350" y="87" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Column-Parallel Linear</text>

  <rect x="235" y="100" width="80" height="55" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="275" y="120" text-anchor="middle" font-size="8" font-weight="700" fill="#333">W1 (top half)</text>
  <text x="275" y="135" text-anchor="middle" font-size="8" fill="#555">[H, H/2]</text>
  <text x="275" y="150" text-anchor="middle" font-size="8" fill="#555">Y1 = X * W1</text>

  <rect x="325" y="100" width="80" height="55" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="365" y="120" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GeLU</text>
  <text x="365" y="135" text-anchor="middle" font-size="8" fill="#555">Activation</text>
  <text x="365" y="150" text-anchor="middle" font-size="8" fill="#555">(no comm)</text>

  <!-- ===== GPU 1 ===== -->
  <rect x="220" y="200" width="200" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="225" y="204" width="30" height="18" fill="#a31f34"/>
  <text x="240" y="217" text-anchor="middle" font-size="7.5" font-weight="700" fill="#fff">GPU1</text>
  <text x="350" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Column-Parallel Linear</text>

  <rect x="235" y="230" width="80" height="55" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="275" y="250" text-anchor="middle" font-size="8" font-weight="700" fill="#333">W1 (bot half)</text>
  <text x="275" y="265" text-anchor="middle" font-size="8" fill="#555">[H, H/2]</text>
  <text x="275" y="280" text-anchor="middle" font-size="8" fill="#555">Y2 = X * W1</text>

  <rect x="325" y="230" width="80" height="55" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="365" y="250" text-anchor="middle" font-size="8" font-weight="700" fill="#333">GeLU</text>
  <text x="365" y="265" text-anchor="middle" font-size="8" fill="#555">Activation</text>
  <text x="365" y="280" text-anchor="middle" font-size="8" fill="#555">(no comm)</text>

  <!-- Arrows to row-parallel -->
  <line x1="420" y1="130" x2="480" y2="130" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="260" x2="480" y2="260" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Row-Parallel on GPU 0 ===== -->
  <rect x="490" y="80" width="140" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="560" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Row-Parallel</text>
  <text x="560" y="118" text-anchor="middle" font-size="8" fill="#555">Z1 = GeLU(Y1) * W2</text>
  <text x="560" y="135" text-anchor="middle" font-size="8" fill="#555">[B, S, H/2] * [H/2, H]</text>
  <text x="560" y="152" text-anchor="middle" font-size="8" fill="#555">= partial [B, S, H]</text>

  <!-- ===== Row-Parallel on GPU 1 ===== -->
  <rect x="490" y="215" width="140" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="560" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Row-Parallel</text>
  <text x="560" y="253" text-anchor="middle" font-size="8" fill="#555">Z2 = GeLU(Y2) * W2</text>
  <text x="560" y="270" text-anchor="middle" font-size="8" fill="#555">[B, S, H/2] * [H/2, H]</text>
  <text x="560" y="287" text-anchor="middle" font-size="8" fill="#555">= partial [B, S, H]</text>

  <!-- AllReduce -->
  <line x1="630" y1="130" x2="680" y2="190" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="630" y1="260" x2="680" y2="200" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- AllReduce box -->
  <rect x="680" y="155" width="110" height="70" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="735" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">AllReduce</text>
  <text x="735" y="196" text-anchor="middle" font-size="8" fill="#555">Z = Z1 + Z2</text>
  <text x="735" y="212" text-anchor="middle" font-size="8" fill="#c44">NVLink required!</text>

  <!-- Output -->
  <line x1="790" y1="190" x2="820" y2="190" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="820" y="160" width="70" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="855" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Output</text>
  <text x="855" y="205" text-anchor="middle" font-size="8" fill="#555">[B, S, H]</text>

  <!-- ===== Key constraint box ===== -->
  <rect x="180" y="340" width="540" height="65" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="362" text-anchor="middle" font-size="10" font-weight="700" fill="#a31f34">Critical Hardware Constraint</text>
  <text x="450" y="380" text-anchor="middle" font-size="9" fill="#555">AllReduce on EVERY transformer layer (2x per block: after MLP + after Attention)</text>
  <text x="450" y="395" text-anchor="middle" font-size="9" fill="#c44">Requires 600-900 GB/s NVLink bandwidth -- intra-node ONLY</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="435" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Megatron-LM (2020) introduced column+row parallelism to minimize AllReduce frequency per layer.</text>
</svg>
