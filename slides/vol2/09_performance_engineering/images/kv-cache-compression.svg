<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">KV Cache Compression vs. Weight-Only Quantization</text>

  <!-- Weight quantization side -->
  <rect x="40" y="55" width="400" height="200" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Weight-Only Quantization (INT4)</text>

  <!-- Memory bars -->
  <text x="60" y="105" font-size="9" fill="#555">FP16 weights:</text>
  <rect x="180" y="92" width="240" height="18" fill="#4a90c4" opacity="0.4"/>
  <text x="300" y="106" font-size="8" font-weight="700" fill="#333" text-anchor="middle">140 GB (Llama 70B)</text>

  <text x="60" y="135" font-size="9" fill="#555">INT4 weights:</text>
  <rect x="180" y="122" width="60" height="18" fill="#4a90c4"/>
  <text x="210" y="136" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">35 GB</text>

  <text x="60" y="168" font-size="9" font-weight="700" fill="#4a90c4">4x memory reduction</text>
  <text x="60" y="185" font-size="8" fill="#555">Saves static memory</text>
  <text x="60" y="200" font-size="8" fill="#555">Enables fewer GPUs</text>
  <text x="60" y="215" font-size="8" fill="#555">Does NOT increase batch size</text>
  <text x="60" y="235" font-size="8.5" font-weight="700" fill="#333">Impact: cost (fewer GPUs needed)</text>

  <!-- KV cache side -->
  <rect x="460" y="55" width="400" height="200" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">KV Cache Quantization (INT8)</text>

  <text x="480" y="105" font-size="9" fill="#555">FP16 KV cache:</text>
  <rect x="600" y="92" width="180" height="18" fill="#3d9e5a" opacity="0.4"/>
  <text x="690" y="106" font-size="8" font-weight="700" fill="#333" text-anchor="middle">21 GB (B=16, S=4K)</text>

  <text x="480" y="135" font-size="9" fill="#555">INT8 KV cache:</text>
  <rect x="600" y="122" width="90" height="18" fill="#3d9e5a"/>
  <text x="645" y="136" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">10.5 GB</text>

  <text x="480" y="168" font-size="9" font-weight="700" fill="#3d9e5a">2x memory freed per request</text>
  <text x="480" y="185" font-size="8" fill="#555">Enables 2x batch size</text>
  <text x="480" y="200" font-size="8" fill="#555">Directly increases throughput</text>
  <text x="480" y="215" font-size="8" fill="#555">Grows with sequence length</text>
  <text x="480" y="235" font-size="8.5" font-weight="700" fill="#333">Impact: throughput (2x batch = 2x tok/s)</text>

  <!-- Long context comparison -->
  <rect x="40" y="275" width="820" height="90" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="298" font-size="11" font-weight="700" fill="#333" text-anchor="middle">At Long Context (seq=32K): KV Cache Dominates</text>

  <!-- Stacked bar: weights vs KV at seq=32K -->
  <text x="60" y="330" font-size="9" fill="#555">Memory split at seq=32K, B=16:</text>
  <rect x="280" y="316" width="100" height="22" fill="#4a90c4" opacity="0.6"/>
  <text x="330" y="331" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">35 GB (wt)</text>
  <rect x="380" y="316" width="300" height="22" fill="#3d9e5a" opacity="0.6"/>
  <text x="530" y="331" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">168 GB KV cache (3x weights!)</text>

  <text x="700" y="350" font-size="9" font-weight="700" fill="#c87b2a">Quantize KV cache first</text>

  <!-- Decision rule -->
  <rect x="40" y="385" width="400" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="408" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Short Context (S &lt; 4K)</text>
  <text x="240" y="425" font-size="9" fill="#555" text-anchor="middle">Weights dominate -- weight quantization first</text>

  <rect x="460" y="385" width="400" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="408" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Long Context (S &gt; 8K)</text>
  <text x="660" y="425" font-size="9" fill="#555" text-anchor="middle">KV cache dominates -- KV quantization first</text>

  <text x="450" y="470" font-size="9" fill="#999" text-anchor="middle" font-style="italic">For serving, KV cache quantization often matters more than weight quantization because it determines maximum concurrency</text>
</svg>
