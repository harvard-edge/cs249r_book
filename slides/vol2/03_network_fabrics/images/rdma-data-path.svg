<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">RDMA and GPUDirect: Eliminating Copy Overhead</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Top: Traditional Path (slow) ===== -->
  <text x="100" y="65" font-size="11" font-weight="700" fill="#c44">Traditional TCP/IP Path (50-100 μs)</text>

  <rect x="60" y="80" width="120" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU</text>
  <text x="120" y="115" font-size="8" fill="#555" text-anchor="middle">Memory</text>

  <line x1="180" y1="105" x2="240" y2="105" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="210" y="97" font-size="7.5" fill="#c44" text-anchor="middle">copy 1</text>

  <rect x="245" y="80" width="120" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="305" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">CPU RAM</text>
  <text x="305" y="115" font-size="8" fill="#555" text-anchor="middle">Host Buffer</text>

  <line x1="365" y1="105" x2="425" y2="105" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="395" y="97" font-size="7.5" fill="#c44" text-anchor="middle">copy 2</text>

  <rect x="430" y="80" width="120" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="490" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Kernel</text>
  <text x="490" y="115" font-size="8" fill="#555" text-anchor="middle">Socket Buffer</text>

  <line x1="550" y1="105" x2="610" y2="105" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="580" y="97" font-size="7.5" fill="#c44" text-anchor="middle">copy 3</text>

  <rect x="615" y="80" width="100" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="665" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">NIC</text>
  <text x="665" y="115" font-size="8" fill="#555" text-anchor="middle">DMA</text>

  <line x1="715" y1="105" x2="810" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="762" y="97" font-size="8" fill="#555" text-anchor="middle">Wire</text>

  <!-- ===== Waste annotation ===== -->
  <rect x="160" y="140" width="460" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="390" y="156" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">3 redundant copies + kernel overhead = 700 GB wasted per step (175B model)</text>

  <!-- ===== Divider ===== -->
  <line x1="60" y1="185" x2="840" y2="185" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Bottom: GPUDirect RDMA Path (fast) ===== -->
  <text x="100" y="215" font-size="11" font-weight="700" fill="#3d9e5a">GPUDirect RDMA Path (1-2 μs)</text>

  <rect x="60" y="230" width="160" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="255" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU Memory</text>
  <text x="140" y="270" font-size="8" fill="#555" text-anchor="middle">Gradients</text>

  <line x1="220" y1="260" x2="415" y2="260" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="318" y="250" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Direct PCIe DMA (zero-copy)</text>

  <rect x="420" y="230" width="160" height="60" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="500" y="255" font-size="10" font-weight="700" fill="#333" text-anchor="middle">NIC (ConnectX-7)</text>
  <text x="500" y="270" font-size="8" fill="#555" text-anchor="middle">RDMA Engine</text>

  <line x1="580" y1="260" x2="810" y2="260" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="695" y="250" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">400 Gbps Wire</text>

  <!-- ===== Benefit annotation ===== -->
  <rect x="160" y="310" width="460" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="390" y="326" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Zero copies, bypass kernel + CPU = 25-50x latency reduction</text>

  <!-- ===== Comparison Table ===== -->
  <rect x="100" y="360" width="700" height="95" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="380" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Comparison Summary</text>

  <text x="200" y="400" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Metric</text>
  <text x="420" y="400" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Traditional TCP</text>
  <text x="640" y="400" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">GPUDirect RDMA</text>

  <line x1="120" y1="408" x2="780" y2="408" stroke="#ddd" stroke-width="0.5"/>

  <text x="200" y="425" font-size="9" fill="#555" text-anchor="middle">Latency</text>
  <text x="420" y="425" font-size="9" fill="#c44" text-anchor="middle">50-100 μs</text>
  <text x="640" y="425" font-size="9" fill="#3d9e5a" text-anchor="middle">1-2 μs</text>

  <text x="200" y="445" font-size="9" fill="#555" text-anchor="middle">Memory copies</text>
  <text x="420" y="445" font-size="9" fill="#c44" text-anchor="middle">3 per message</text>
  <text x="640" y="445" font-size="9" fill="#3d9e5a" text-anchor="middle">0 (zero-copy)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" font-style="italic" text-anchor="middle">GPUDirect RDMA eliminates 700 GB of redundant copies per step for a 175B model</text>
</svg>
