<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Five-Level Model of ML Networking</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Level boxes (bottom to top, like a stack) ===== -->
  <!-- Level 1: Wire -->
  <rect x="160" y="380" width="580" height="60" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <rect x="60" y="390" width="85" height="40" rx="12" fill="#a31f34"/>
  <text x="102" y="415" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Level 1</text>
  <text x="260" y="405" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Wire &amp; Link</text>
  <text x="510" y="405" font-size="9" fill="#555" text-anchor="middle">PAM4 signaling, FEC latency, copper vs. optics, SerDes power</text>
  <text x="510" y="420" font-size="8" fill="#999" text-anchor="middle">Physical constraint: speed of light, signal attenuation</text>

  <!-- Level 2: Transport -->
  <rect x="160" y="305" width="580" height="60" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="60" y="315" width="85" height="40" rx="12" fill="#a31f34"/>
  <text x="102" y="340" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Level 2</text>
  <text x="260" y="330" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Transport</text>
  <text x="510" y="330" font-size="9" fill="#555" text-anchor="middle">RDMA, GPUDirect, InfiniBand vs. RoCE, Go-Back-N</text>
  <text x="510" y="345" font-size="8" fill="#555" text-anchor="middle">Performance model: T(n) = α + n/β</text>

  <!-- Level 3: Topology -->
  <rect x="160" y="230" width="580" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="60" y="240" width="85" height="40" rx="12" fill="#a31f34"/>
  <text x="102" y="265" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Level 3</text>
  <text x="260" y="255" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Topology</text>
  <text x="510" y="255" font-size="9" fill="#555" text-anchor="middle">Fat-tree, rail-optimized, dragonfly, bisection bandwidth</text>
  <text x="510" y="270" font-size="8" fill="#555" text-anchor="middle">Structural guarantee: non-blocking paths for AllReduce</text>

  <!-- Level 4: Behavior -->
  <rect x="160" y="155" width="580" height="60" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="60" y="165" width="85" height="40" rx="12" fill="#a31f34"/>
  <text x="102" y="190" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Level 4</text>
  <text x="260" y="180" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Behavior</text>
  <text x="510" y="180" font-size="9" fill="#555" text-anchor="middle">PFC, DCQCN, HPCC, adaptive routing, incast mitigation</text>
  <text x="510" y="195" font-size="8" fill="#555" text-anchor="middle">Dynamic control: tail latency under congestion</text>

  <!-- Level 5: Cluster -->
  <rect x="160" y="80" width="580" height="60" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="60" y="90" width="85" height="40" rx="12" fill="#a31f34"/>
  <text x="102" y="115" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Level 5</text>
  <text x="260" y="105" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Cluster Design</text>
  <text x="510" y="105" font-size="9" fill="#555" text-anchor="middle">SuperPOD, Grand Teton, virtualization, SR-IOV, QoS</text>
  <text x="510" y="120" font-size="8" fill="#555" text-anchor="middle">Integration: multi-tenant GPU supercomputers</text>

  <!-- ===== Upward arrow on left ===== -->
  <line x1="30" y1="430" x2="30" y2="80" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="35" y="260" font-size="9" font-weight="700" fill="#a31f34" transform="rotate(-90, 35, 260)" text-anchor="middle">Ascending the Stack</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each level constrains the levels above it — co-design minimizes the synchronization tax</text>
</svg>
