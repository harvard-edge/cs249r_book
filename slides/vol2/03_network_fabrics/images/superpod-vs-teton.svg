<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Production Clusters: NVIDIA SuperPOD vs. Meta Grand Teton</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== SuperPOD (left) ===== -->
  <rect x="30" y="55" width="390" height="380" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" opacity="0.2"/>
  <text x="225" y="78" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">NVIDIA DGX SuperPOD</text>

  <rect x="50" y="95" width="350" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="225" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Protocol: InfiniBand NDR (400 Gbps)</text>

  <rect x="50" y="135" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="225" y="155" font-size="9" fill="#333" text-anchor="middle">Scale: 32 nodes / 256 GPUs per unit</text>

  <rect x="50" y="175" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="225" y="195" font-size="9" fill="#333" text-anchor="middle">Intra-node: NVSwitch → 900 GB/s</text>

  <rect x="50" y="215" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="225" y="235" font-size="9" fill="#333" text-anchor="middle">Topology: Rail-optimized fat-tree</text>

  <rect x="50" y="255" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="225" y="275" font-size="9" fill="#333" text-anchor="middle">Flow control: Native IB credit-based (lossless)</text>

  <rect x="50" y="295" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="225" y="315" font-size="9" fill="#333" text-anchor="middle">Routing: Hardware adaptive (packet spray)</text>

  <rect x="50" y="340" width="350" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="225" y="358" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Strengths: 30-50% lower tail latency,</text>
  <text x="225" y="375" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">simpler lossless config</text>

  <!-- ===== Grand Teton (right) ===== -->
  <rect x="480" y="55" width="390" height="380" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" opacity="0.2"/>
  <text x="675" y="78" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Meta Grand Teton</text>

  <rect x="500" y="95" width="350" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="675" y="115" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Protocol: RoCEv2 over 400 GbE Ethernet</text>

  <rect x="500" y="135" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="675" y="155" font-size="9" fill="#333" text-anchor="middle">Scale: 2,000 nodes / 16,000+ GPUs</text>

  <rect x="500" y="175" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="675" y="195" font-size="9" fill="#333" text-anchor="middle">Intra-node: NVSwitch → 900 GB/s</text>

  <rect x="500" y="215" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="675" y="235" font-size="9" fill="#333" text-anchor="middle">Topology: Fat-tree (Ethernet)</text>

  <rect x="500" y="255" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="675" y="275" font-size="9" fill="#333" text-anchor="middle">Flow control: PFC + DCQCN (tuned per workload)</text>

  <rect x="500" y="295" width="350" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="675" y="315" font-size="9" fill="#333" text-anchor="middle">Routing: Flowlet switching (dynamic)</text>

  <rect x="500" y="340" width="350" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="675" y="358" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Strengths: 20-40% lower switch cost,</text>
  <text x="675" y="375" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">multi-vendor flexibility</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="465" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Both achieve 95%+ line-rate for large transfers — the choice reflects operational philosophy, not clear superiority</text>
</svg>
