<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">ML Networking Inverts Datacenter Assumptions</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Left: Traditional ===== -->
  <text x="225" y="60" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Traditional Datacenter</text>

  <!-- Traffic -->
  <rect x="50" y="85" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="70" y="105" font-size="10" font-weight="700" fill="#333">Traffic</text>
  <text x="70" y="125" font-size="9" fill="#555">Asynchronous, stochastic, many-to-many</text>
  <text x="310" y="115" font-size="8" fill="#999" text-anchor="end">Millions of mice flows</text>

  <!-- Flow -->
  <rect x="50" y="155" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="70" y="175" font-size="10" font-weight="700" fill="#333">Flows</text>
  <text x="70" y="195" font-size="9" fill="#555">Millions of small, short-lived flows</text>

  <!-- Metric -->
  <rect x="50" y="225" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="70" y="245" font-size="10" font-weight="700" fill="#333">Metric</text>
  <text x="70" y="265" font-size="9" fill="#555">Average throughput, per-flow fairness</text>

  <!-- Loss -->
  <rect x="50" y="295" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="70" y="315" font-size="10" font-weight="700" fill="#333">Loss</text>
  <text x="70" y="335" font-size="9" fill="#555">Tolerant (TCP retransmits gracefully)</text>

  <!-- Congestion -->
  <rect x="50" y="365" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="70" y="385" font-size="10" font-weight="700" fill="#333">Congestion</text>
  <text x="70" y="405" font-size="9" fill="#555">Localized, independent events</text>

  <!-- ===== Right: ML Training ===== -->
  <text x="675" y="60" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">ML Training Cluster</text>

  <!-- Traffic -->
  <rect x="500" y="85" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="520" y="105" font-size="10" font-weight="700" fill="#333">Traffic</text>
  <text x="520" y="125" font-size="9" fill="#555">Synchronous, periodic, all-to-all</text>
  <text x="760" y="115" font-size="8" fill="#999" text-anchor="end">Few elephant flows</text>

  <!-- Flow -->
  <rect x="500" y="155" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="520" y="175" font-size="10" font-weight="700" fill="#333">Flows</text>
  <text x="520" y="195" font-size="9" fill="#555">Few massive, long-lived elephant flows</text>

  <!-- Metric -->
  <rect x="500" y="225" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="520" y="245" font-size="10" font-weight="700" fill="#333">Metric</text>
  <text x="520" y="265" font-size="9" fill="#555">Tail latency, global synchronization time</text>

  <!-- Loss -->
  <rect x="500" y="295" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="520" y="315" font-size="10" font-weight="700" fill="#333">Loss</text>
  <text x="520" y="335" font-size="9" fill="#555">Intolerant (1 dropped packet stalls all)</text>

  <!-- Congestion -->
  <rect x="500" y="365" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="520" y="385" font-size="10" font-weight="700" fill="#333">Congestion</text>
  <text x="520" y="405" font-size="9" fill="#555">Global, correlated (incast)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">BSP training: the slowest link dictates performance of the entire cluster</text>
</svg>
