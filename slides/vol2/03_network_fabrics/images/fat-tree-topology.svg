<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Fat-Tree (Clos) Topology: Full Bisection Bandwidth</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Tier Labels ===== -->
  <text x="35" y="90" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Core</text>
  <text x="35" y="200" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Spine</text>
  <text x="35" y="310" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Leaf</text>
  <text x="35" y="410" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">GPUs</text>

  <!-- ===== Core switches ===== -->
  <rect x="350" y="60" width="80" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="390" y="85" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Core 1</text>

  <rect x="470" y="60" width="80" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="510" y="85" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Core 2</text>

  <!-- ===== Spine switches ===== -->
  <rect x="130" y="170" width="80" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="170" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Spine 1</text>

  <rect x="280" y="170" width="80" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="320" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Spine 2</text>

  <rect x="530" y="170" width="80" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="570" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Spine 3</text>

  <rect x="680" y="170" width="80" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="720" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Spine 4</text>

  <!-- ===== Leaf switches ===== -->
  <rect x="80" y="280" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="115" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Leaf 1</text>

  <rect x="180" y="280" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="215" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Leaf 2</text>

  <rect x="330" y="280" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="365" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Leaf 3</text>

  <rect x="480" y="280" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="515" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Leaf 4</text>

  <rect x="630" y="280" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="665" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Leaf 5</text>

  <rect x="730" y="280" width="70" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="765" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Leaf 6</text>

  <!-- ===== Core-Spine links ===== -->
  <line x1="390" y1="100" x2="170" y2="170" stroke="#555" stroke-width="1"/>
  <line x1="390" y1="100" x2="320" y2="170" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="100" x2="570" y2="170" stroke="#555" stroke-width="1"/>
  <line x1="510" y1="100" x2="720" y2="170" stroke="#555" stroke-width="1"/>
  <line x1="390" y1="100" x2="570" y2="170" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="510" y1="100" x2="320" y2="170" stroke="#555" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- ===== Spine-Leaf links ===== -->
  <line x1="170" y1="210" x2="115" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="170" y1="210" x2="215" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="210" x2="115" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="210" x2="215" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="210" x2="365" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="210" x2="515" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="570" y1="210" x2="365" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="570" y1="210" x2="515" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="570" y1="210" x2="665" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="720" y1="210" x2="665" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="720" y1="210" x2="765" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="570" y1="210" x2="765" y2="280" stroke="#555" stroke-width="1"/>

  <!-- ===== GPU nodes ===== -->
  <rect x="75" y="340" width="25" height="20" fill="#a31f34"/><text x="88" y="354" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">G0</text>
  <rect x="105" y="340" width="25" height="20" fill="#a31f34"/><text x="118" y="354" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">G1</text>
  <rect x="135" y="340" width="25" height="20" fill="#a31f34"/><text x="148" y="354" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">G2</text>

  <rect x="178" y="340" width="25" height="20" fill="#a31f34"/><text x="191" y="354" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">G3</text>
  <rect x="208" y="340" width="25" height="20" fill="#a31f34"/><text x="221" y="354" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">G4</text>
  <rect x="238" y="340" width="25" height="20" fill="#a31f34"/><text x="251" y="354" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">G5</text>

  <!-- ===== Pod annotation ===== -->
  <rect x="68" y="270" width="240" height="100" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="188" y="388" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Pod 1</text>

  <rect x="320" y="270" width="240" height="100" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="388" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Pod 2</text>

  <rect x="620" y="270" width="195" height="100" fill="none" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="718" y="388" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Pod 3</text>

  <!-- ===== Key properties ===== -->
  <rect x="100" y="415" width="700" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="200" y="435" font-size="9" font-weight="700" fill="#333" text-anchor="middle">N = k³/4 hosts</text>
  <text x="200" y="450" font-size="8" fill="#555" text-anchor="middle">k=64 → 65,536 GPUs</text>

  <text x="450" y="435" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Full bisection BW</text>
  <text x="450" y="450" font-size="8" fill="#555" text-anchor="middle">Non-blocking for AllReduce</text>

  <text x="700" y="435" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Cost: O(N log N) switches</text>
  <text x="700" y="450" font-size="8" fill="#555" text-anchor="middle">4,096 GPUs ≈ $20-100M</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Industry standard for ML clusters — guarantees simultaneous full-rate communication from all accelerators</text>
</svg>
