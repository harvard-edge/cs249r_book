<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The α-β Communication Cost Model</text>

  <!-- ===== Equation ===== -->
  <rect x="200" y="50" width="500" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="80" font-size="16" font-weight="700" fill="#333" text-anchor="middle">T(n) = α + n / β</text>

  <!-- ===== Variable labels ===== -->
  <text x="300" y="120" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">α = startup latency (μs)</text>
  <text x="600" y="120" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">β = bandwidth (GB/s)</text>

  <!-- ===== Two regime boxes ===== -->
  <!-- Latency-dominated -->
  <rect x="60" y="150" width="370" height="140" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="245" y="175" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Latency-Dominated (n &lt; n*)</text>
  <text x="245" y="200" font-size="9" fill="#555" text-anchor="middle">Small messages: control, barriers, metadata</text>
  <text x="245" y="220" font-size="9" fill="#555" text-anchor="middle">T(n) ≈ α (bandwidth irrelevant)</text>
  <text x="245" y="245" font-size="9" fill="#555" text-anchor="middle">Optimize: minimize hop count, reduce FEC</text>
  <text x="245" y="270" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">n* ≈ α × β ≈ 25 KB for IB HDR</text>

  <!-- Bandwidth-dominated -->
  <rect x="470" y="150" width="370" height="140" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="655" y="175" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Bandwidth-Dominated (n &gt; n*)</text>
  <text x="655" y="200" font-size="9" fill="#555" text-anchor="middle">Large messages: gradients, activations</text>
  <text x="655" y="220" font-size="9" fill="#555" text-anchor="middle">T(n) ≈ n/β (latency negligible)</text>
  <text x="655" y="245" font-size="9" fill="#555" text-anchor="middle">Optimize: maximize bisection bandwidth</text>
  <text x="655" y="270" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">350 GB AllReduce → bandwidth is king</text>

  <!-- ===== Crossover annotation ===== -->
  <rect x="370" y="195" width="30" height="30" fill="#a31f34"/>
  <text x="385" y="215" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">n*</text>

  <!-- ===== Example table ===== -->
  <rect x="100" y="320" width="700" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="345" font-size="11" font-weight="700" fill="#333" text-anchor="middle">InfiniBand HDR vs NDR: α-β Parameters</text>

  <text x="200" y="370" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Parameter</text>
  <text x="380" y="370" font-size="9" font-weight="700" fill="#555" text-anchor="middle">IB HDR (200G)</text>
  <text x="560" y="370" font-size="9" font-weight="700" fill="#555" text-anchor="middle">IB NDR (400G)</text>
  <text x="720" y="370" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Impact</text>

  <line x1="120" y1="378" x2="780" y2="378" stroke="#bbb" stroke-width="0.5"/>

  <text x="200" y="395" font-size="9" fill="#555" text-anchor="middle">α (startup)</text>
  <text x="380" y="395" font-size="9" fill="#555" text-anchor="middle">~1.5 μs</text>
  <text x="560" y="395" font-size="9" fill="#555" text-anchor="middle">~1.5 μs</text>
  <text x="720" y="395" font-size="9" fill="#c44" text-anchor="middle">Same (physics)</text>

  <text x="200" y="415" font-size="9" fill="#555" text-anchor="middle">β (bandwidth)</text>
  <text x="380" y="415" font-size="9" fill="#555" text-anchor="middle">25 GB/s</text>
  <text x="560" y="415" font-size="9" fill="#555" text-anchor="middle">50 GB/s</text>
  <text x="720" y="415" font-size="9" fill="#3d9e5a" text-anchor="middle">2x for large msgs</text>

  <text x="200" y="435" font-size="9" fill="#555" text-anchor="middle">n* (crossover)</text>
  <text x="380" y="435" font-size="9" fill="#555" text-anchor="middle">~37 KB</text>
  <text x="560" y="435" font-size="9" fill="#555" text-anchor="middle">~75 KB</text>
  <text x="720" y="435" font-size="9" fill="#c44" text-anchor="middle">Bigger latency zone</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Topology choice shifts α and β — fat-trees minimize α, more links maximize β</text>
</svg>
