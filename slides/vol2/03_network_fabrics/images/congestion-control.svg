<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Congestion Control: PFC → DCQCN → HPCC</text>

  <!-- ===== Dividers ===== -->
  <line x1="300" y1="50" x2="300" y2="430" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="600" y1="50" x2="600" y2="430" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== PFC (left) ===== -->
  <text x="150" y="60" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">PFC (Reactive)</text>

  <rect x="30" y="80" width="240" height="180" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>

  <text x="150" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Priority Flow Control</text>
  <text x="150" y="125" font-size="9" fill="#555" text-anchor="middle">Buffer fills → PAUSE frame</text>
  <text x="150" y="145" font-size="9" fill="#555" text-anchor="middle">Upstream stops sending</text>

  <text x="150" y="175" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Problem: PFC Storms</text>
  <text x="150" y="195" font-size="8" fill="#555" text-anchor="middle">PAUSE cascades freeze</text>
  <text x="150" y="210" font-size="8" fill="#555" text-anchor="middle">entire fabric in 200 ms</text>
  <text x="150" y="230" font-size="8" fill="#555" text-anchor="middle">from a single bad port</text>
  <text x="150" y="248" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Head-of-line blocking</text>

  <!-- ===== DCQCN (center) ===== -->
  <text x="450" y="60" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">DCQCN (Proactive)</text>

  <rect x="330" y="80" width="240" height="180" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>

  <text x="450" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">ECN-based Feedback</text>
  <text x="450" y="125" font-size="9" fill="#555" text-anchor="middle">Switch marks ECN bit</text>
  <text x="450" y="145" font-size="9" fill="#555" text-anchor="middle">Receiver echoes → sender slows</text>

  <text x="450" y="175" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Limitation: Binary Signal</text>
  <text x="450" y="195" font-size="8" fill="#555" text-anchor="middle">"Blind driver" — knows congestion</text>
  <text x="450" y="210" font-size="8" fill="#555" text-anchor="middle">exists but not severity</text>
  <text x="450" y="230" font-size="8" fill="#555" text-anchor="middle">Oscillating rates to find safe point</text>
  <text x="450" y="248" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Link utilization: 85-90%</text>

  <!-- ===== HPCC (right) ===== -->
  <text x="750" y="60" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">HPCC (Precise)</text>

  <rect x="630" y="80" width="240" height="180" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>

  <text x="750" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">In-Network Telemetry</text>
  <text x="750" y="125" font-size="9" fill="#555" text-anchor="middle">Switch appends: queue depth,</text>
  <text x="750" y="145" font-size="9" fill="#555" text-anchor="middle">link util, timestamps</text>

  <text x="750" y="175" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Advantage: Full Visibility</text>
  <text x="750" y="195" font-size="8" fill="#555" text-anchor="middle">Calculate exact safe rate</text>
  <text x="750" y="210" font-size="8" fill="#555" text-anchor="middle">in one RTT</text>
  <text x="750" y="230" font-size="8" fill="#555" text-anchor="middle">Near-zero queue buildup</text>
  <text x="750" y="248" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Link utilization: 95%+</text>

  <!-- ===== Progression arrow ===== -->
  <defs>
    <marker id="arrow-prog" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>
  <line x1="120" y1="280" x2="780" y2="280" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-prog)"/>
  <text x="450" y="298" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Increasing precision, higher utilization, more hardware requirements</text>

  <!-- ===== Comparison summary ===== -->
  <rect x="80" y="320" width="740" height="110" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <text x="200" y="345" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Mechanism</text>
  <text x="380" y="345" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">PFC</text>
  <text x="530" y="345" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">DCQCN</text>
  <text x="690" y="345" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">HPCC</text>

  <line x1="100" y1="353" x2="800" y2="353" stroke="#bbb" stroke-width="0.5"/>

  <text x="200" y="373" font-size="8.5" fill="#555" text-anchor="middle">Signal type</text>
  <text x="380" y="373" font-size="8.5" fill="#555" text-anchor="middle">PAUSE frame</text>
  <text x="530" y="373" font-size="8.5" fill="#555" text-anchor="middle">Binary ECN bit</text>
  <text x="690" y="373" font-size="8.5" fill="#555" text-anchor="middle">Full telemetry</text>

  <text x="200" y="393" font-size="8.5" fill="#555" text-anchor="middle">Link utilization</text>
  <text x="380" y="393" font-size="8.5" fill="#c44" text-anchor="middle">N/A (stop/go)</text>
  <text x="530" y="393" font-size="8.5" fill="#c87b2a" text-anchor="middle">85-90%</text>
  <text x="690" y="393" font-size="8.5" fill="#3d9e5a" text-anchor="middle">95%+</text>

  <text x="200" y="413" font-size="8.5" fill="#555" text-anchor="middle">Hardware need</text>
  <text x="380" y="413" font-size="8.5" fill="#555" text-anchor="middle">Standard switches</text>
  <text x="530" y="413" font-size="8.5" fill="#555" text-anchor="middle">ECN-capable</text>
  <text x="690" y="413" font-size="8.5" fill="#555" text-anchor="middle">Programmable ASIC</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="465" font-size="9" fill="#999" font-style="italic" text-anchor="middle">In BSP training, tail latency is the dominant constraint — more precise control = less wasted GPU time</text>
</svg>
