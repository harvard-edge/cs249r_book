<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Fabric Diagnostic Flowchart: Symptom to Root Cause</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Step 0: Symptom -->
  <rect x="340" y="50" width="220" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="67" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Training Throughput Drops</text>
  <text x="450" y="81" text-anchor="middle" font-size="8.5" fill="#555">MFU degraded, iterations slower</text>

  <!-- Arrow down -->
  <line x1="450" y1="90" x2="450" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1: Bandwidth check -->
  <rect x="315" y="115" width="270" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#333">Step 1: Check ib_write_bw Baseline</text>
  <text x="450" y="146" text-anchor="middle" font-size="8.5" fill="#555">Compare to known-good baseline</text>

  <!-- Branch: BW degraded (left) vs BW OK (right) -->
  <line x1="370" y1="155" x2="370" y2="175" stroke="#555" stroke-width="1.2"/>
  <line x1="370" y1="175" x2="180" y2="175" stroke="#555" stroke-width="1.2"/>
  <line x1="180" y1="175" x2="180" y2="195" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="275" y="172" text-anchor="middle" font-size="8" font-weight="700" fill="#c44">Degraded</text>

  <line x1="530" y1="155" x2="530" y2="175" stroke="#555" stroke-width="1.2"/>
  <line x1="530" y1="175" x2="720" y2="175" stroke="#555" stroke-width="1.2"/>
  <line x1="720" y1="175" x2="720" y2="195" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="625" y="172" text-anchor="middle" font-size="8" font-weight="700" fill="#3d9e5a">Normal</text>

  <!-- Left branch: BW degraded -->
  <rect x="80" y="198" width="200" height="35" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="180" y="213" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Step 2a: Check BER + FEC</text>
  <text x="180" y="226" text-anchor="middle" font-size="8" fill="#555">Rising bit error rate?</text>

  <!-- Sub-branch: BER high -->
  <line x1="130" y1="233" x2="130" y2="258" stroke="#555" stroke-width="1.0" marker-end="url(#arrow-red)"/>
  <text x="100" y="252" font-size="7.5" font-weight="700" fill="#c44">Yes</text>
  <rect x="45" y="262" width="170" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="130" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Bad Transceiver</text>
  <text x="130" y="293" text-anchor="middle" font-size="8" fill="#555">Replace optic/cable</text>
  <text x="130" y="304" text-anchor="middle" font-size="8" fill="#555">Re-baseline after swap</text>

  <!-- Sub-branch: BER normal -->
  <line x1="230" y1="233" x2="230" y2="258" stroke="#555" stroke-width="1.0" marker-end="url(#arrow-green)"/>
  <text x="250" y="252" font-size="7.5" font-weight="700" fill="#3d9e5a">No</text>
  <rect x="230" y="262" width="200" height="35" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="330" y="277" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Step 3a: Check PFC Counters</text>
  <text x="330" y="291" text-anchor="middle" font-size="8" fill="#555">Rising PAUSE frames?</text>

  <!-- PFC high -->
  <line x1="290" y1="297" x2="290" y2="325" stroke="#555" stroke-width="1.0" marker-end="url(#arrow-red)"/>
  <text x="260" y="318" font-size="7.5" font-weight="700" fill="#c44">Yes</text>
  <rect x="195" y="328" width="190" height="55" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="290" y="346" text-anchor="middle" font-size="9" font-weight="700" fill="#333">PFC Storm / Congestion</text>
  <text x="290" y="359" text-anchor="middle" font-size="8" fill="#555">Isolate offending flow</text>
  <text x="290" y="370" text-anchor="middle" font-size="8" fill="#555">Enable DCQCN / watchdog</text>
  <text x="290" y="381" text-anchor="middle" font-size="8" fill="#555">Separate VLANs</text>

  <!-- PFC normal -->
  <line x1="370" y1="297" x2="370" y2="325" stroke="#555" stroke-width="1.0" marker-end="url(#arrow-green)"/>
  <text x="390" y="318" font-size="7.5" font-weight="700" fill="#3d9e5a">No</text>
  <rect x="395" y="328" width="170" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="480" y="346" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Topology Mismatch</text>
  <text x="480" y="359" text-anchor="middle" font-size="8" fill="#555">Cross-pod placement?</text>
  <text x="480" y="371" text-anchor="middle" font-size="8" fill="#555">Enable topology-aware sched</text>

  <!-- Right branch: BW normal -->
  <rect x="620" y="198" width="200" height="35" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="720" y="213" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Step 2b: Check GPU Utilization</text>
  <text x="720" y="226" text-anchor="middle" font-size="8" fill="#555">Are GPUs idle during comm?</text>

  <!-- GPU idle yes -->
  <line x1="670" y1="233" x2="670" y2="258" stroke="#555" stroke-width="1.0" marker-end="url(#arrow-red)"/>
  <text x="640" y="252" font-size="7.5" font-weight="700" fill="#c44">Yes</text>
  <rect x="580" y="262" width="180" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Comm/Compute Overlap</text>
  <text x="670" y="293" text-anchor="middle" font-size="8" fill="#555">Enable async AllReduce</text>
  <text x="670" y="304" text-anchor="middle" font-size="8" fill="#555">Overlap backward + comm</text>

  <!-- GPU idle no -->
  <line x1="770" y1="233" x2="770" y2="258" stroke="#555" stroke-width="1.0" marker-end="url(#arrow-green)"/>
  <text x="790" y="252" font-size="7.5" font-weight="700" fill="#3d9e5a">No</text>
  <rect x="770" y="262" width="110" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="825" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Not Network</text>
  <text x="825" y="293" text-anchor="middle" font-size="8" fill="#555">Check compute</text>
  <text x="825" y="304" text-anchor="middle" font-size="8" fill="#555">or data pipeline</text>

  <!-- Key at bottom -->
  <rect x="200" y="420" width="500" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="438" text-anchor="middle" font-size="9" font-weight="700" fill="#333">Diagnostic Priority Order</text>
  <text x="450" y="455" text-anchor="middle" font-size="8.5" fill="#555">1. Bandwidth baseline (ib_write_bw) → 2. BER/FEC trends → 3. PFC counters → 4. GPU timeline correlation</text>
  <text x="450" y="468" text-anchor="middle" font-size="8.5" fill="#555">Tools: perftest (ib_write_bw, ib_read_lat), ibdiagnet, nvidia-smi, DCGM</text>

  <!-- Footnote -->
  <text x="450" y="492" text-anchor="middle" font-size="9" font-style="italic" fill="#999">Never use iperf for RDMA networks — it measures TCP, not RDMA performance.</text>
</svg>
