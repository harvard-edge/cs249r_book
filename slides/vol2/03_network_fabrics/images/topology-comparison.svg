<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Topology Trade-offs: Fat-Tree vs. Rail-Optimized vs. Dragonfly</text>

  <!-- ===== Fat-Tree ===== -->
  <rect x="30" y="55" width="270" height="250" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="165" y="80" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fat-Tree (Clos)</text>

  <text x="165" y="105" font-size="9" fill="#555" text-anchor="middle">Full bisection bandwidth</text>
  <text x="165" y="125" font-size="9" fill="#555" text-anchor="middle">Non-blocking for all patterns</text>
  <text x="165" y="145" font-size="9" fill="#555" text-anchor="middle">Multiple equal-cost paths</text>

  <text x="165" y="175" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Best for:</text>
  <text x="165" y="195" font-size="9" fill="#555" text-anchor="middle">Data parallelism (AllReduce)</text>
  <text x="165" y="215" font-size="9" fill="#555" text-anchor="middle">Mixed workloads, multi-tenant</text>

  <text x="165" y="245" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Trade-off:</text>
  <text x="165" y="265" font-size="8" fill="#555" text-anchor="middle">O(N log N) switches, highest cost</text>
  <text x="165" y="280" font-size="8" fill="#555" text-anchor="middle">Dense cabling ($20-100M)</text>

  <!-- ===== Rail-Optimized ===== -->
  <rect x="315" y="55" width="270" height="250" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="80" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Rail-Optimized</text>

  <text x="450" y="105" font-size="9" fill="#555" text-anchor="middle">GPUs grouped by slot position</text>
  <text x="450" y="125" font-size="9" fill="#555" text-anchor="middle">All GPU-0s share one leaf group</text>
  <text x="450" y="145" font-size="9" fill="#555" text-anchor="middle">1-hop for tensor parallel ops</text>

  <text x="450" y="175" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Best for:</text>
  <text x="450" y="195" font-size="9" fill="#555" text-anchor="middle">Tensor parallelism (low latency)</text>
  <text x="450" y="215" font-size="9" fill="#555" text-anchor="middle">Predictable workload placement</text>

  <text x="450" y="245" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Trade-off:</text>
  <text x="450" y="265" font-size="8" fill="#555" text-anchor="middle">Topology-aware scheduling required</text>
  <text x="450" y="280" font-size="8" fill="#555" text-anchor="middle">Less flexible for diverse jobs</text>

  <!-- ===== Dragonfly ===== -->
  <rect x="600" y="55" width="270" height="250" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="735" y="80" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Dragonfly</text>

  <text x="735" y="105" font-size="9" fill="#555" text-anchor="middle">Fully connected groups</text>
  <text x="735" y="125" font-size="9" fill="#555" text-anchor="middle">Groups linked via global optics</text>
  <text x="735" y="145" font-size="9" fill="#555" text-anchor="middle">50% less cabling than fat-tree</text>

  <text x="735" y="175" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Best for:</text>
  <text x="735" y="195" font-size="9" fill="#555" text-anchor="middle">Massive scale (100K+ GPUs)</text>
  <text x="735" y="215" font-size="9" fill="#555" text-anchor="middle">Jobs that fit within a group</text>

  <text x="735" y="245" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Trade-off:</text>
  <text x="735" y="265" font-size="8" fill="#555" text-anchor="middle">25-50% inter-group bandwidth</text>
  <text x="735" y="280" font-size="8" fill="#555" text-anchor="middle">2-4x slowdown across groups</text>

  <!-- ===== Summary table ===== -->
  <rect x="60" y="325" width="780" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="160" y="350" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Property</text>
  <text x="340" y="350" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fat-Tree</text>
  <text x="530" y="350" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Rail-Optimized</text>
  <text x="720" y="350" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Dragonfly</text>

  <line x1="80" y1="358" x2="820" y2="358" stroke="#bbb" stroke-width="0.5"/>

  <text x="160" y="378" font-size="8.5" fill="#555" text-anchor="middle">Bisection BW</text>
  <text x="340" y="378" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Full (100%)</text>
  <text x="530" y="378" font-size="8.5" fill="#4a90c4" text-anchor="middle">High (within rails)</text>
  <text x="720" y="378" font-size="8.5" fill="#c87b2a" text-anchor="middle">25-50% (cross-group)</text>

  <text x="160" y="398" font-size="8.5" fill="#555" text-anchor="middle">Max hops</text>
  <text x="340" y="398" font-size="8.5" fill="#555" text-anchor="middle">3 (core-spine-leaf)</text>
  <text x="530" y="398" font-size="8.5" fill="#555" text-anchor="middle">1-2 (within rail)</text>
  <text x="720" y="398" font-size="8.5" fill="#555" text-anchor="middle">3 (cross-group)</text>

  <text x="160" y="418" font-size="8.5" fill="#555" text-anchor="middle">Cabling cost</text>
  <text x="340" y="418" font-size="8.5" fill="#c44" text-anchor="middle">Highest</text>
  <text x="530" y="418" font-size="8.5" fill="#555" text-anchor="middle">Medium</text>
  <text x="720" y="418" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Lowest (50% less)</text>

  <text x="160" y="438" font-size="8.5" fill="#555" text-anchor="middle">Scheduling</text>
  <text x="340" y="438" font-size="8.5" fill="#3d9e5a" text-anchor="middle">Flexible</text>
  <text x="530" y="438" font-size="8.5" fill="#c87b2a" text-anchor="middle">Topology-aware</text>
  <text x="720" y="438" font-size="8.5" fill="#c44" text-anchor="middle">Rigid (group-bounded)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">No single topology dominates — choice depends on workload mix, scale, and budget</text>
</svg>
