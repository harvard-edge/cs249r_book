<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Bandwidth Cliff: Intra-Node vs. Inter-Node</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Background regions ===== -->
  <rect x="60" y="50" width="380" height="390" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="250" y="70" font-size="10" font-weight="700" fill="#2d7a2d" text-anchor="middle">Intra-Node (NVLink)</text>

  <rect x="460" y="50" width="380" height="390" fill="#f9d6d5" stroke="#c44" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="650" y="70" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Inter-Node (InfiniBand)</text>

  <!-- ===== HBM bar ===== -->
  <rect x="100" y="100" width="140" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">HBM</text>
  <text x="170" y="138" font-size="14" font-weight="700" fill="#4a90c4" text-anchor="middle">3,350 GB/s</text>

  <!-- ===== NVLink bar ===== -->
  <rect x="270" y="100" width="140" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">NVLink</text>
  <text x="340" y="138" font-size="14" font-weight="700" fill="#3d9e5a" text-anchor="middle">900 GB/s</text>

  <!-- ===== InfiniBand bar ===== -->
  <rect x="500" y="100" width="140" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="570" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">InfiniBand NDR</text>
  <text x="570" y="138" font-size="14" font-weight="700" fill="#c87b2a" text-anchor="middle">50 GB/s</text>

  <!-- ===== PCIe bar ===== -->
  <rect x="670" y="100" width="140" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="740" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">PCIe Gen5</text>
  <text x="740" y="138" font-size="14" font-weight="700" fill="#555" text-anchor="middle">64 GB/s</text>

  <!-- ===== Cliff arrow ===== -->
  <line x1="440" y1="90" x2="440" y2="160" stroke="#a31f34" stroke-width="3"/>
  <rect x="415" y="165" width="50" height="25" fill="#a31f34"/>
  <text x="440" y="182" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">18x</text>
  <text x="440" y="205" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">cliff</text>

  <!-- ===== Visual bar chart (proportional) ===== -->
  <text x="80" y="260" font-size="10" font-weight="700" fill="#333">Relative Bandwidth (log scale, H100 generation):</text>

  <!-- HBM -->
  <rect x="100" y="280" width="320" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="110" y="300" font-size="9" font-weight="700" fill="#333">HBM: 3,350 GB/s</text>

  <!-- NVLink -->
  <rect x="100" y="320" width="228" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="110" y="340" font-size="9" font-weight="700" fill="#333">NVLink: 900 GB/s</text>

  <!-- IB NDR -->
  <rect x="100" y="360" width="52" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="162" y="380" font-size="9" font-weight="700" fill="#333">IB NDR: 50 GB/s</text>

  <!-- PCIe -->
  <rect x="100" y="400" width="40" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="150" y="420" font-size="9" font-weight="700" fill="#333">PCIe Gen5: 64 GB/s</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">NVLink-to-IB ratio has remained 12-25x across four GPU generations (V100 to B200)</text>
</svg>
