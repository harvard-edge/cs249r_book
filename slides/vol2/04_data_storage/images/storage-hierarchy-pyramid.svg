<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">ML Storage Hierarchy: Six Tiers</text>

  <!-- ===== Pyramid ===== -->
  <!-- Tier 0: GPU HBM (top) -->
  <polygon points="450,55 520,115 380,115" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU HBM</text>

  <!-- Tier 1: Host DRAM -->
  <polygon points="380,120 520,120 560,175 340,175" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="155" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Host DRAM</text>

  <!-- Tier 2: Local NVMe -->
  <polygon points="340,180 560,180 610,240 290,240" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="218" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Local NVMe SSD</text>

  <!-- Tier 3: Parallel File System -->
  <polygon points="290,245 610,245 660,305 240,305" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="282" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Parallel File System</text>

  <!-- Tier 4: Object Storage -->
  <polygon points="240,310 660,310 710,370 190,370" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="348" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Object Storage (S3)</text>

  <!-- Tier 5: Archive -->
  <polygon points="190,375 710,375 740,415 160,415" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="402" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Archive / Cold Storage</text>

  <!-- ===== Left Labels: Bandwidth ===== -->
  <text x="130" y="58" font-size="10" font-weight="700" fill="#333">Bandwidth</text>
  <text x="130" y="100" font-size="8.5" fill="#4a90c4" font-weight="700">3.35 TB/s</text>
  <text x="130" y="155" font-size="8.5" fill="#3d9e5a" font-weight="700">200 GB/s</text>
  <text x="130" y="218" font-size="8.5" fill="#c87b2a" font-weight="700">7-25 GB/s</text>
  <text x="130" y="282" font-size="8.5" fill="#555">1+ TB/s agg</text>
  <text x="130" y="348" font-size="8.5" fill="#c44">100 GB/s agg</text>
  <text x="130" y="402" font-size="8.5" fill="#999">~1 GB/s</text>

  <!-- ===== Right Labels: Capacity & Cost ===== -->
  <text x="770" y="58" font-size="10" font-weight="700" fill="#333">Capacity / Cost</text>
  <text x="770" y="100" font-size="8.5" fill="#4a90c4">80 GB / $15/GB</text>
  <text x="770" y="155" font-size="8.5" fill="#3d9e5a">0.5-2 TB / $3/GB</text>
  <text x="770" y="218" font-size="8.5" fill="#c87b2a">4-30 TB / $0.10/GB</text>
  <text x="770" y="282" font-size="8.5" fill="#555">100+ PB / $0.03/GB</text>
  <text x="770" y="348" font-size="8.5" fill="#c44">Unlimited / $0.02/GB</text>
  <text x="770" y="402" font-size="8.5" fill="#999">Unlimited / $0.004/GB</text>

  <!-- ===== Arrows ===== -->
  <!-- Left arrow: Faster -->
  <line x1="105" y1="100" x2="105" y2="400" stroke="#555" stroke-width="1.2"/>
  <polygon points="105,95 100,108 110,108" fill="#555"/>
  <text x="95" y="250" font-size="8" fill="#555" text-anchor="middle" transform="rotate(-90, 95, 250)">Faster</text>

  <!-- Right arrow: Cheaper / Larger -->
  <line x1="860" y1="100" x2="860" y2="400" stroke="#555" stroke-width="1.2"/>
  <polygon points="860,405 855,392 865,392" fill="#555"/>
  <text x="872" y="250" font-size="8" fill="#555" text-anchor="middle" transform="rotate(90, 872, 250)">Cheaper / Larger</text>

  <!-- ===== Key metric ===== -->
  <rect x="310" y="430" width="280" height="30" fill="#a31f34" stroke="none"/>
  <text x="450" y="450" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">300,000x bandwidth gap: HBM to Object</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each tier trades bandwidth for capacity and cost. Physics of distance governs the tradeoff.</text>
</svg>
