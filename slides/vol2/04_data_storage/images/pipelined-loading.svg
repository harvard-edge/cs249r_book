<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Pipelined Data Loading: Hiding Storage Latency</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Without Pipelining ===== -->
  <text x="450" y="60" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Without Pipelining (Sequential)</text>

  <!-- Time axis -->
  <line x1="80" y1="165" x2="820" y2="165" stroke="#bbb" stroke-width="1"/>

  <!-- CPU row -->
  <text x="50" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="end">CPU</text>
  <rect x="80" y="80" width="160" height="35" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="160" y="103" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Load Batch 0</text>
  <rect x="400" y="80" width="160" height="35" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="480" y="103" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Load Batch 1</text>

  <!-- GPU row -->
  <text x="50" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="end">GPU</text>
  <rect x="240" y="125" width="160" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="320" y="148" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Train Batch 0</text>
  <rect x="560" y="125" width="160" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="640" y="148" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Train Batch 1</text>

  <!-- Idle gaps -->
  <rect x="80" y="125" width="160" height="35" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="160" y="148" font-size="7" fill="#c44" text-anchor="middle">GPU Idle</text>
  <rect x="400" y="125" width="160" height="35" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="480" y="148" font-size="7" fill="#c44" text-anchor="middle">GPU Idle</text>

  <!-- Time labels -->
  <text x="160" y="180" font-size="7" fill="#555" text-anchor="middle">250 ms</text>
  <text x="320" y="180" font-size="7" fill="#555" text-anchor="middle">200 ms</text>
  <text x="480" y="180" font-size="7" fill="#555" text-anchor="middle">250 ms</text>
  <text x="640" y="180" font-size="7" fill="#555" text-anchor="middle">200 ms</text>

  <!-- Total time -->
  <text x="730" y="100" font-size="9" font-weight="700" fill="#c44">T_step = 450 ms</text>
  <text x="730" y="115" font-size="8" fill="#c44">55% stall!</text>

  <!-- ===== Separator ===== -->
  <line x1="80" y1="210" x2="820" y2="210" stroke="#e0e0e0" stroke-dasharray="6,3" stroke-width="1"/>

  <!-- ===== With Pipelining ===== -->
  <text x="450" y="240" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">With Pipelining (Overlapped)</text>

  <!-- Time axis -->
  <line x1="80" y1="365" x2="820" y2="365" stroke="#bbb" stroke-width="1"/>

  <!-- Prefetch row -->
  <text x="50" y="285" font-size="9" font-weight="700" fill="#333" text-anchor="end">CPU</text>
  <rect x="80" y="265" width="180" height="35" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="170" y="288" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Load Batch 1</text>
  <rect x="260" y="265" width="180" height="35" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="350" y="288" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Load Batch 2</text>
  <rect x="440" y="265" width="180" height="35" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="530" y="288" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Load Batch 3</text>

  <!-- GPU row -->
  <text x="50" y="330" font-size="9" font-weight="700" fill="#333" text-anchor="end">GPU</text>
  <rect x="80" y="310" width="180" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="333" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Train Batch 0</text>
  <rect x="260" y="310" width="180" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="350" y="333" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Train Batch 1</text>
  <rect x="440" y="310" width="180" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="530" y="333" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Train Batch 2</text>

  <!-- Small stall -->
  <rect x="260" y="345" width="0" height="0" rx="0"/>

  <!-- Overlap indicator -->
  <rect x="260" y="310" width="0" height="35" rx="0" fill="#d4edda" stroke="none" opacity="0.3"/>

  <!-- Time labels -->
  <text x="170" y="380" font-size="7" fill="#555" text-anchor="middle">250 ms</text>
  <text x="350" y="380" font-size="7" fill="#555" text-anchor="middle">250 ms</text>
  <text x="530" y="380" font-size="7" fill="#555" text-anchor="middle">250 ms</text>

  <!-- Total time -->
  <text x="730" y="290" font-size="9" font-weight="700" fill="#3d9e5a">T_step = 250 ms</text>
  <text x="730" y="305" font-size="8" fill="#3d9e5a">20% stall</text>

  <!-- ===== Improvement ===== -->
  <rect x="310" y="410" width="280" height="30" rx="12" fill="#a31f34"/>
  <text x="450" y="430" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Pipelining: 450 ms to 250 ms (1.8x faster)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Pipelining hides average latency; prefetch buffer depth must absorb tail latency variance</text>
</svg>
