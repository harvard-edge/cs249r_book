<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Checkpoint Staging: Minimizing T_save</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Training Timeline ===== -->
  <text x="450" y="58" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Training Timeline with Checkpoint Storm</text>

  <!-- Timeline bar -->
  <rect x="80" y="75" width="740" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="250" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Training (compute)</text>

  <!-- Checkpoint burst -->
  <rect x="430" y="75" width="80" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="470" y="95" font-size="7" font-weight="700" fill="#c44" text-anchor="middle">Checkpoint</text>
  <text x="470" y="107" font-size="7" fill="#c44" text-anchor="middle">Storm</text>

  <text x="600" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Training (compute)</text>

  <!-- Arrow: all nodes write simultaneously -->
  <text x="470" y="140" font-size="8" fill="#a31f34" text-anchor="middle">All 256 nodes write</text>
  <text x="470" y="155" font-size="8" fill="#a31f34" text-anchor="middle">1,050 GB simultaneously</text>

  <!-- ===== Staging Pipeline ===== -->
  <text x="450" y="195" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Tiered Checkpoint Staging (Decouples T_save from PFS)</text>

  <!-- Step 1: GPU HBM to Local NVMe -->
  <rect x="60" y="220" width="170" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="145" y="245" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU HBM</text>
  <text x="145" y="262" font-size="8" fill="#555" text-anchor="middle">Weights + Optimizer</text>

  <line x1="230" y1="250" x2="285" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="258" y="240" font-size="7" fill="#555" text-anchor="middle">PCIe/GDS</text>
  <text x="258" y="270" font-size="7" fill="#3d9e5a" text-anchor="middle">~15 sec</text>

  <rect x="290" y="220" width="170" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="375" y="245" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Local NVMe</text>
  <text x="375" y="262" font-size="8" fill="#555" text-anchor="middle">Fast local write</text>

  <!-- Training resumes badge -->
  <rect x="280" y="290" width="190" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="375" y="305" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Training resumes here</text>

  <!-- Step 2: NVMe to PFS (async) -->
  <line x1="460" y1="250" x2="515" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="488" y="240" font-size="7" fill="#555" text-anchor="middle">Async</text>
  <text x="488" y="270" font-size="7" fill="#999" text-anchor="middle">Background</text>

  <rect x="520" y="220" width="150" height="60" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="595" y="245" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Parallel FS</text>
  <text x="595" y="262" font-size="8" fill="#555" text-anchor="middle">Shared storage</text>

  <!-- Step 3: PFS to Object (lifecycle) -->
  <line x1="670" y1="250" x2="720" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="695" y="240" font-size="7" fill="#555" text-anchor="middle">Lifecycle</text>

  <rect x="725" y="220" width="130" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="790" y="245" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Object Store</text>
  <text x="790" y="262" font-size="8" fill="#999" text-anchor="middle">Long-term</text>

  <!-- ===== Key Numbers ===== -->
  <rect x="60" y="340" width="380" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="250" y="362" font-size="10" font-weight="700" fill="#333" text-anchor="middle">175B Model Checkpoint Math</text>
  <text x="70" y="385" font-size="8.5" fill="#555">Weights (FP16): 350 GB</text>
  <text x="70" y="400" font-size="8.5" fill="#555">Optimizer state (FP32): 1,400 GB</text>
  <text x="70" y="415" font-size="8.5" fill="#555">Total per checkpoint: 1,050 GB (with ZeRO)</text>
  <text x="70" y="430" font-size="8.5" font-weight="700" fill="#a31f34">30-day run: ~4.5 PB of checkpoint writes</text>

  <!-- ===== Impact ===== -->
  <rect x="470" y="340" width="390" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="665" y="362" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Staging Impact</text>
  <text x="480" y="385" font-size="8.5" fill="#c44">Without staging: T_save = 150 sec (PFS limited)</text>
  <text x="480" y="400" font-size="8.5" fill="#3d9e5a">With NVMe staging: T_save = 15 sec</text>
  <text x="480" y="415" font-size="8.5" fill="#555">Training pause reduced by 10x</text>
  <text x="480" y="430" font-size="8.5" font-weight="700" fill="#333">Async replication: zero impact on training</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Write locally, replicate asynchronously. Decouple checkpoint pause from PFS performance.</text>
</svg>
