<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">How ML Workloads Invert Storage Assumptions</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Left: Traditional (Database) ===== -->
  <text x="225" y="62" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Traditional (Database)</text>

  <rect x="50" y="80" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Access Pattern</text>
  <text x="225" y="118" font-size="9" fill="#555" text-anchor="middle">Small random I/O (4 KB reads)</text>

  <rect x="50" y="145" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="165" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Working Set</text>
  <text x="225" y="183" font-size="9" fill="#555" text-anchor="middle">Hot data fits in cache (80/20 rule)</text>

  <rect x="50" y="210" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="230" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Metric</text>
  <text x="225" y="248" font-size="9" fill="#555" text-anchor="middle">IOPS (operations per second)</text>

  <rect x="50" y="275" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="295" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RAID Strategy</text>
  <text x="225" y="313" font-size="9" fill="#555" text-anchor="middle">RAID 5/6 (redundancy over bandwidth)</text>

  <rect x="50" y="340" width="350" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="360" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Write Pattern</text>
  <text x="225" y="378" font-size="9" fill="#555" text-anchor="middle">Continuous small writes (WAL)</text>

  <!-- ===== Right: ML Training ===== -->
  <text x="675" y="62" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">ML Training</text>

  <rect x="500" y="80" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Access Pattern</text>
  <text x="675" y="118" font-size="9" fill="#555" text-anchor="middle">Large sequential streaming (MB reads)</text>

  <rect x="500" y="145" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="165" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Working Set</text>
  <text x="675" y="183" font-size="9" fill="#555" text-anchor="middle">Entire dataset read every epoch</text>

  <rect x="500" y="210" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="230" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Metric</text>
  <text x="675" y="248" font-size="9" fill="#555" text-anchor="middle">Throughput (GB/s sustained)</text>

  <rect x="500" y="275" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="295" font-size="10" font-weight="700" fill="#333" text-anchor="middle">RAID Strategy</text>
  <text x="675" y="313" font-size="9" fill="#555" text-anchor="middle">RAID 0 (bandwidth over redundancy)</text>

  <rect x="500" y="340" width="350" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="360" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Write Pattern</text>
  <text x="675" y="378" font-size="9" fill="#555" text-anchor="middle">Massive checkpoint bursts</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Every traditional storage optimization produces the wrong answer for ML training workloads</text>
</svg>
