<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Storage-Compute Gap</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left: GPU Compute Growth ===== -->
  <rect x="40" y="55" width="380" height="340" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="230" y="75" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU Peak FP16 Throughput</text>

  <!-- Bar chart - GPU TFLOPS -->
  <rect x="80" y="280" width="50" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="105" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">21</text>
  <text x="105" y="315" font-size="7" fill="#555" text-anchor="middle">TFLOPS</text>
  <text x="105" y="360" font-size="8" fill="#555" text-anchor="middle">P100</text>
  <text x="105" y="372" font-size="7" fill="#999" text-anchor="middle">2016</text>

  <rect x="155" y="230" width="50" height="110" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="260" font-size="8" font-weight="700" fill="#333" text-anchor="middle">125</text>
  <text x="180" y="270" font-size="7" fill="#555" text-anchor="middle">TFLOPS</text>
  <text x="180" y="360" font-size="8" fill="#555" text-anchor="middle">V100</text>
  <text x="180" y="372" font-size="7" fill="#999" text-anchor="middle">2018</text>

  <rect x="230" y="175" width="50" height="165" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="205" font-size="8" font-weight="700" fill="#333" text-anchor="middle">312</text>
  <text x="255" y="215" font-size="7" fill="#555" text-anchor="middle">TFLOPS</text>
  <text x="255" y="360" font-size="8" fill="#555" text-anchor="middle">A100</text>
  <text x="255" y="372" font-size="7" fill="#999" text-anchor="middle">2020</text>

  <rect x="305" y="120" width="50" height="220" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="330" y="150" font-size="8" font-weight="700" fill="#333" text-anchor="middle">989</text>
  <text x="330" y="160" font-size="7" fill="#555" text-anchor="middle">TFLOPS</text>
  <text x="330" y="360" font-size="8" fill="#555" text-anchor="middle">H100</text>
  <text x="330" y="372" font-size="7" fill="#999" text-anchor="middle">2022</text>

  <!-- Growth label -->
  <text x="230" y="105" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">47x growth (2016-2022)</text>

  <!-- ===== Right: NVMe Storage Growth ===== -->
  <rect x="470" y="55" width="390" height="340" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="665" y="75" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">NVMe Sequential Read Bandwidth</text>

  <!-- Bar chart - NVMe GB/s -->
  <rect x="530" y="280" width="50" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="555" y="305" font-size="8" font-weight="700" fill="#333" text-anchor="middle">3.5</text>
  <text x="555" y="315" font-size="7" fill="#555" text-anchor="middle">GB/s</text>
  <text x="555" y="360" font-size="8" fill="#555" text-anchor="middle">Gen 3</text>
  <text x="555" y="372" font-size="7" fill="#999" text-anchor="middle">2016</text>

  <rect x="620" y="265" width="50" height="75" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="645" y="295" font-size="8" font-weight="700" fill="#333" text-anchor="middle">7.0</text>
  <text x="645" y="305" font-size="7" fill="#555" text-anchor="middle">GB/s</text>
  <text x="645" y="360" font-size="8" fill="#555" text-anchor="middle">Gen 4</text>
  <text x="645" y="372" font-size="7" fill="#999" text-anchor="middle">2020</text>

  <rect x="710" y="248" width="50" height="92" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="735" y="280" font-size="8" font-weight="700" fill="#333" text-anchor="middle">14</text>
  <text x="735" y="290" font-size="7" fill="#555" text-anchor="middle">GB/s</text>
  <text x="735" y="360" font-size="8" fill="#555" text-anchor="middle">Gen 5</text>
  <text x="735" y="372" font-size="7" fill="#999" text-anchor="middle">2024</text>

  <!-- Growth label -->
  <text x="665" y="105" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">4x growth (2016-2024)</text>

  <!-- ===== Gap Arrow ===== -->
  <line x1="435" y1="200" x2="435" y2="370" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="435" y="420" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">~500x Gap</text>

  <!-- ===== Bottom Footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">GPU throughput grows 10x faster than storage bandwidth, creating the I/O Wall</text>
</svg>
