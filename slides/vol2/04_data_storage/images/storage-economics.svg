<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Storage Cost Iceberg</text>

  <!-- ===== Iceberg: Visible (above water) ===== -->
  <polygon points="350,60 550,60 580,160 320,160" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Storage Cost</text>
  <text x="450" y="118" font-size="9" fill="#555" text-anchor="middle">$/GB/month</text>
  <text x="450" y="148" font-size="8" fill="#4a90c4" text-anchor="middle">Visible: $0.02/GB (S3)</text>

  <!-- Water line -->
  <line x1="100" y1="165" x2="800" y2="165" stroke="#4a90c4" stroke-width="2"/>
  <text x="810" y="160" font-size="8" fill="#4a90c4">Waterline</text>

  <!-- ===== Iceberg: Hidden (below water) ===== -->
  <polygon points="300,170 600,170 680,420 220,420" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>

  <!-- Hidden costs -->
  <text x="450" y="200" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Hidden Costs</text>

  <text x="450" y="230" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Egress Fees</text>
  <text x="450" y="245" font-size="8" fill="#555" text-anchor="middle">$0.09/GB (100 TB x 10 reads = $90K)</text>

  <text x="450" y="275" font-size="9" font-weight="700" fill="#333" text-anchor="middle">IOPS Charges</text>
  <text x="450" y="290" font-size="8" fill="#555" text-anchor="middle">$0.0004/GET (100M files = $40K)</text>

  <text x="450" y="320" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Idle Accelerator Cost</text>
  <text x="450" y="335" font-size="8" fill="#555" text-anchor="middle">20% stall on 1K GPUs = $13K/day</text>

  <text x="450" y="365" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Retrieval Fees</text>
  <text x="450" y="380" font-size="8" fill="#555" text-anchor="middle">$0.02/GB from Glacier + egress</text>

  <!-- ===== Right side: Key Numbers ===== -->
  <rect x="700" y="200" width="175" height="180" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="787" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">100 TB Dataset</text>
  <text x="787" y="245" font-size="8" fill="#555" text-anchor="middle">S3 Storage: $28K/yr</text>
  <text x="787" y="265" font-size="8" fill="#555" text-anchor="middle">Egress (10 reads): $90K</text>
  <text x="787" y="285" font-size="8" fill="#555" text-anchor="middle">GPU stalls (30d): $288K</text>
  <line x1="715" y1="300" x2="860" y2="300" stroke="#bbb" stroke-width="0.8"/>
  <text x="787" y="320" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Total: $406K/yr</text>
  <text x="787" y="340" font-size="8" fill="#555" text-anchor="middle">Storage is only 7%</text>
  <text x="787" y="355" font-size="8" fill="#555" text-anchor="middle">of total data cost</text>
  <text x="787" y="372" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">NVMe cache saves $282K</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="460" font-size="9" fill="#999" font-style="italic" text-anchor="middle">The cheapest storage tier is not always the cheapest choice. Total cost of data delivery includes egress + idle GPUs.</text>
</svg>
