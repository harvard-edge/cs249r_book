<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Traditional I/O vs. GPU Direct Storage</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Traditional Path (Top) ===== -->
  <text x="450" y="60" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Traditional Path: 3 Hops, CPU Bottleneck</text>

  <!-- NVMe -->
  <rect x="60" y="85" width="140" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="130" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">NVMe SSD</text>
  <text x="130" y="125" font-size="8" fill="#555" text-anchor="middle">7 GB/s</text>

  <!-- Kernel Buffer -->
  <rect x="260" y="85" width="140" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="330" y="107" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Kernel Buffer</text>
  <text x="330" y="122" font-size="8" fill="#555" text-anchor="middle">(Host DRAM)</text>
  <text x="330" y="137" font-size="7" fill="#c44" text-anchor="middle">CPU memcpy</text>

  <!-- User Buffer -->
  <rect x="460" y="85" width="140" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="530" y="107" font-size="9" font-weight="700" fill="#333" text-anchor="middle">User Buffer</text>
  <text x="530" y="122" font-size="8" fill="#555" text-anchor="middle">(Host DRAM)</text>
  <text x="530" y="137" font-size="7" fill="#c44" text-anchor="middle">CPU orchestrated</text>

  <!-- GPU HBM -->
  <rect x="660" y="85" width="140" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="730" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU HBM</text>
  <text x="730" y="125" font-size="8" fill="#555" text-anchor="middle">cudaMemcpy</text>

  <!-- Arrows -->
  <line x1="200" y1="115" x2="255" y2="115" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="228" y="108" font-size="7" fill="#c44" text-anchor="middle">DMA</text>
  <line x1="400" y1="115" x2="455" y2="115" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="428" y="108" font-size="7" fill="#c44" text-anchor="middle">Copy</text>
  <line x1="600" y1="115" x2="655" y2="115" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="628" y="108" font-size="7" fill="#c44" text-anchor="middle">PCIe</text>

  <!-- CPU involvement badge -->
  <rect x="310" y="155" width="250" height="22" rx="11" fill="#a31f34"/>
  <text x="435" y="170" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">CPU involved at every hop: ~120 us per transfer</text>

  <!-- ===== Separator ===== -->
  <line x1="60" y1="200" x2="840" y2="200" stroke="#e0e0e0" stroke-dasharray="6,3" stroke-width="1"/>

  <!-- ===== GDS Path (Bottom) ===== -->
  <text x="450" y="230" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">GPU Direct Storage: 1 Hop, CPU Bypassed</text>

  <!-- NVMe -->
  <rect x="120" y="255" width="200" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="220" y="283" font-size="10" font-weight="700" fill="#333" text-anchor="middle">NVMe SSD</text>
  <text x="220" y="300" font-size="8" fill="#555" text-anchor="middle">DMA Engine</text>

  <!-- GPU HBM -->
  <rect x="560" y="255" width="200" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="660" y="283" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU HBM</text>
  <text x="660" y="300" font-size="8" fill="#555" text-anchor="middle">cuFile API</text>

  <!-- Direct arrow -->
  <line x1="320" y1="290" x2="555" y2="290" stroke="#3d9e5a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="440" y="280" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Direct DMA via PCIe</text>

  <!-- CPU bypassed -->
  <rect x="350" y="345" width="180" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="440" y="363" font-size="9" fill="#999" text-anchor="middle">CPU: Only issues</text>
  <text x="440" y="377" font-size="9" fill="#999" text-anchor="middle">DMA command (~30 us)</text>

  <!-- ===== Benefits ===== -->
  <rect x="120" y="410" width="200" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="220" y="428" font-size="9" font-weight="700" fill="#333" text-anchor="middle">4x latency reduction</text>
  <text x="220" y="442" font-size="8" fill="#555" text-anchor="middle">120 us to 30 us per transfer</text>

  <rect x="350" y="410" width="200" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="450" y="428" font-size="9" font-weight="700" fill="#333" text-anchor="middle">90% CPU freed</text>
  <text x="450" y="442" font-size="8" fill="#555" text-anchor="middle">For augmentation work</text>

  <rect x="580" y="410" width="200" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="680" y="428" font-size="9" font-weight="700" fill="#333" text-anchor="middle">2x effective bandwidth</text>
  <text x="680" y="442" font-size="8" fill="#555" text-anchor="middle">No bounce buffer copies</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="485" font-size="9" fill="#999" font-style="italic" text-anchor="middle">GDS accelerates local/RDMA-attached NVMe only; does not help network-attached or object storage</text>
</svg>
