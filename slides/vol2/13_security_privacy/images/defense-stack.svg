<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Layered Defense Architecture for ML Systems</text>

  <!-- ===== Layer 1: Hardware Root of Trust (bottom) ===== -->
  <rect x="50" y="345" width="800" height="65" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <rect x="55" y="350" width="4" height="55" fill="#bbb"/>
  <text x="80" y="370" font-size="11" font-weight="700" fill="#333">Layer 1: Hardware Root of Trust</text>
  <text x="80" y="387" font-size="9" fill="#555">TEEs (Intel SGX, ARM TrustZone) | Secure Boot | HSMs for key management | PUFs</text>
  <text x="80" y="401" font-size="8" fill="#999">Overhead: 5-30% throughput loss for enclave execution; 2-10x key operation latency</text>

  <!-- ===== Layer 2: Data Protection ===== -->
  <rect x="50" y="270" width="800" height="65" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="55" y="275" width="4" height="55" fill="#3d9e5a"/>
  <text x="80" y="290" font-size="11" font-weight="700" fill="#333">Layer 2: Data Protection</text>
  <text x="80" y="307" font-size="9" fill="#555">Differential Privacy (DP-SGD) | Secure Aggregation | Federated Learning | Data Validation</text>
  <text x="80" y="321" font-size="8" fill="#999">Trade-off: epsilon=1.0 costs 5-10% accuracy; DP only works at scale (error ~ 1/N)</text>

  <!-- ===== Layer 3: Model Security ===== -->
  <rect x="50" y="195" width="800" height="65" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="55" y="200" width="4" height="55" fill="#4a90c4"/>
  <text x="80" y="215" font-size="11" font-weight="700" fill="#333">Layer 3: Model Security</text>
  <text x="80" y="232" font-size="9" fill="#555">Adversarial Training | Certified Robustness | Model Watermarking | Backdoor Detection</text>
  <text x="80" y="246" font-size="8" fill="#999">Adversarial training adds 30-100% to training time; watermarking has negligible accuracy cost</text>

  <!-- ===== Layer 4: Runtime Defense ===== -->
  <rect x="50" y="120" width="800" height="65" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="55" y="125" width="4" height="55" fill="#c87b2a"/>
  <text x="80" y="140" font-size="11" font-weight="700" fill="#333">Layer 4: Runtime Defense</text>
  <text x="80" y="157" font-size="9" fill="#555">Rate Limiting | Output Perturbation | Input Validation | Anomaly Detection | Prompt Guards</text>
  <text x="80" y="171" font-size="8" fill="#999">API defenses: top-k filtering reduces extraction success by 60%; rate limits force 100x more time</text>

  <!-- ===== Layer 5: Governance ===== -->
  <rect x="50" y="50" width="800" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="55" y="55" width="4" height="50" fill="#c44"/>
  <text x="80" y="70" font-size="11" font-weight="700" fill="#333">Layer 5: Governance &amp; Compliance</text>
  <text x="80" y="87" font-size="9" fill="#555">GDPR, CCPA, AI Act | Audit Trails | Privacy Budget Tracking | Incident Response</text>
  <text x="80" y="101" font-size="8" fill="#999">Regulatory: GDPR fines up to 4% of global revenue; cumulative epsilon must be tracked</text>

  <!-- ===== Key insight at bottom ===== -->
  <rect x="200" y="420" width="500" height="30" fill="#a31f34"/>
  <text x="450" y="440" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">No single layer suffices; composition creates graceful degradation</text>

</svg>
