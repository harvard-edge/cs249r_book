<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Hardware Security Primitives for ML Workloads</text>

  <!-- ===== TEE ===== -->
  <rect x="40" y="55" width="400" height="120" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Trusted Execution Environments (TEEs)</text>
  <text x="240" y="98" font-size="9" fill="#555" text-anchor="middle">Intel SGX / AMD SEV / ARM TrustZone</text>
  <text x="240" y="118" font-size="9" fill="#555" text-anchor="middle">Encrypted memory enclaves isolate sensitive computation</text>
  <text x="240" y="135" font-size="9" fill="#555" text-anchor="middle">Even OS/hypervisor cannot read enclave data</text>
  <rect x="55" y="148" width="160" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="135" y="162" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Cost: 5-30% throughput loss</text>
  <rect x="225" y="148" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="325" y="162" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Benefit: Confidential ML inference</text>

  <!-- ===== Secure Boot ===== -->
  <rect x="460" y="55" width="400" height="120" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="660" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Secure Boot Chain</text>
  <text x="660" y="98" font-size="9" fill="#555" text-anchor="middle">Hardware Root of Trust -> Bootloader -> OS -> ML Runtime</text>
  <text x="660" y="118" font-size="9" fill="#555" text-anchor="middle">Each stage cryptographically verifies the next</text>
  <text x="660" y="135" font-size="9" fill="#555" text-anchor="middle">Prevents tampered firmware or modified model loaders</text>
  <rect x="475" y="148" width="160" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="555" y="162" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Cost: Boot time + complexity</text>
  <rect x="645" y="148" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="745" y="162" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Benefit: Tamper-proof pipeline</text>

  <!-- ===== HSM ===== -->
  <rect x="40" y="195" width="400" height="120" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Hardware Security Modules (HSMs)</text>
  <text x="240" y="238" font-size="9" fill="#555" text-anchor="middle">Dedicated crypto processors for key management</text>
  <text x="240" y="258" font-size="9" fill="#555" text-anchor="middle">Store model encryption keys, signing keys</text>
  <text x="240" y="275" font-size="9" fill="#555" text-anchor="middle">FIPS 140-2/3 certified tamper resistance</text>
  <rect x="55" y="288" width="160" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="135" y="302" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Cost: 2-10x key op latency</text>
  <rect x="225" y="288" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="325" y="302" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Benefit: Keys never leave HW</text>

  <!-- ===== PUF ===== -->
  <rect x="460" y="195" width="400" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="660" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Physical Unclonable Functions (PUFs)</text>
  <text x="660" y="238" font-size="9" fill="#555" text-anchor="middle">Unique chip fingerprint from manufacturing variation</text>
  <text x="660" y="258" font-size="9" fill="#555" text-anchor="middle">Cannot be cloned even by the manufacturer</text>
  <text x="660" y="275" font-size="9" fill="#555" text-anchor="middle">Authenticate edge devices, detect counterfeits</text>
  <rect x="475" y="288" width="160" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="555" y="302" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Cost: Minimal silicon area</text>
  <rect x="645" y="288" width="200" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="745" y="302" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Benefit: Unclonable identity</text>

  <!-- ===== Key insight ===== -->
  <rect x="100" y="340" width="700" height="65" fill="#a31f34"/>
  <text x="450" y="365" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Software security is only as strong as the hardware it runs on</text>
  <text x="450" y="385" font-size="9" fill="#fff" text-anchor="middle">Multi-tenant ML clouds require TEEs; edge fleets require PUFs; model registries require HSMs</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Hardware primitives anchor the entire trust chain from silicon to served prediction</text>
</svg>
