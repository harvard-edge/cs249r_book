<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Three-Phase Security Implementation Roadmap</text>

  <!-- ===== Phase 1 ===== -->
  <rect x="40" y="55" width="260" height="340" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="40" y="55" width="260" height="40" fill="#3d9e5a"/>
  <text x="170" y="80" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Phase 1: Foundation</text>
  <text x="170" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Weeks 1-4</text>

  <text x="65" y="145" font-size="9" fill="#555">Access control &amp; authentication</text>
  <text x="65" y="165" font-size="9" fill="#555">Encrypted storage (at rest + transit)</text>
  <text x="65" y="185" font-size="9" fill="#555">Input validation pipelines</text>
  <text x="65" y="205" font-size="9" fill="#555">Basic API rate limiting</text>
  <text x="65" y="225" font-size="9" fill="#555">Dependency scanning</text>
  <text x="65" y="245" font-size="9" fill="#555">Model artifact signing</text>

  <rect x="55" y="270" width="230" height="50" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="170" y="290" font-size="9" font-weight="700" fill="#2d7a2d" text-anchor="middle">Blocks: 80% of commodity attacks</text>
  <text x="170" y="305" font-size="8" fill="#555" text-anchor="middle">(unsecured endpoints, default creds)</text>

  <text x="170" y="345" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Effort: Low</text>
  <text x="170" y="360" font-size="9" fill="#555" text-anchor="middle">Standard IT security practices</text>
  <text x="170" y="375" font-size="9" fill="#555" text-anchor="middle">adapted for ML pipelines</text>

  <!-- Arrow 1->2 -->
  <line x1="300" y1="225" x2="320" y2="225" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Phase 2 ===== -->
  <rect x="320" y="55" width="260" height="340" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="320" y="55" width="260" height="40" fill="#4a90c4"/>
  <text x="450" y="80" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Phase 2: ML-Specific</text>
  <text x="450" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Weeks 5-12</text>

  <text x="345" y="145" font-size="9" fill="#555">Differential privacy (DP-SGD)</text>
  <text x="345" y="165" font-size="9" fill="#555">Secure aggregation for FL</text>
  <text x="345" y="185" font-size="9" fill="#555">Model watermarking</text>
  <text x="345" y="205" font-size="9" fill="#555">Output perturbation</text>
  <text x="345" y="225" font-size="9" fill="#555">Backdoor detection scans</text>
  <text x="345" y="245" font-size="9" fill="#555">Privacy budget tracking</text>

  <rect x="335" y="270" width="230" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="450" y="290" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Blocks: ML-specific threats</text>
  <text x="450" y="305" font-size="8" fill="#555" text-anchor="middle">(extraction, poisoning, memorization)</text>

  <text x="450" y="345" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Effort: Medium</text>
  <text x="450" y="360" font-size="9" fill="#555" text-anchor="middle">5-10% accuracy cost from DP;</text>
  <text x="450" y="375" font-size="9" fill="#555" text-anchor="middle">requires ML security expertise</text>

  <!-- Arrow 2->3 -->
  <line x1="580" y1="225" x2="600" y2="225" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Phase 3 ===== -->
  <rect x="600" y="55" width="260" height="340" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="600" y="55" width="260" height="40" fill="#c87b2a"/>
  <text x="730" y="80" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Phase 3: Advanced</text>
  <text x="730" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Weeks 13-24</text>

  <text x="625" y="145" font-size="9" fill="#555">TEE deployment for inference</text>
  <text x="625" y="165" font-size="9" fill="#555">Adversarial training pipelines</text>
  <text x="625" y="185" font-size="9" fill="#555">Runtime anomaly detection</text>
  <text x="625" y="205" font-size="9" fill="#555">Red team exercises</text>
  <text x="625" y="225" font-size="9" fill="#555">Certified robustness verification</text>
  <text x="625" y="245" font-size="9" fill="#555">LLM guardrails &amp; prompt filtering</text>

  <rect x="615" y="270" width="230" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="730" y="290" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Blocks: Sophisticated adversaries</text>
  <text x="730" y="305" font-size="8" fill="#555" text-anchor="middle">(state actors, targeted attacks)</text>

  <text x="730" y="345" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Effort: High</text>
  <text x="730" y="360" font-size="9" fill="#555" text-anchor="middle">30-100% extra training time;</text>
  <text x="730" y="375" font-size="9" fill="#555" text-anchor="middle">hardware + ML security team</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Start with foundation controls; each phase builds on the previous one's infrastructure</text>
</svg>
