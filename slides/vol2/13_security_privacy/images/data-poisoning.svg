<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Data Poisoning: Extreme Leverage from Minimal Corruption</text>

  <!-- ===== Left: Clean vs Poisoned comparison ===== -->
  <!-- Clean dataset -->
  <rect x="40" y="55" width="380" height="150" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="230" y="78" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Clean Training Data</text>

  <!-- Grid of dots representing data -->
  <g transform="translate(70,90)">
    <!-- Clean samples -->
    <circle cx="20" cy="15" r="4" fill="#3d9e5a"/>
    <circle cx="45" cy="20" r="4" fill="#3d9e5a"/>
    <circle cx="70" cy="10" r="4" fill="#3d9e5a"/>
    <circle cx="95" cy="25" r="4" fill="#3d9e5a"/>
    <circle cx="120" cy="12" r="4" fill="#3d9e5a"/>
    <circle cx="145" cy="22" r="4" fill="#3d9e5a"/>
    <circle cx="170" cy="18" r="4" fill="#3d9e5a"/>
    <circle cx="195" cy="8" r="4" fill="#3d9e5a"/>
    <circle cx="220" cy="28" r="4" fill="#3d9e5a"/>
    <circle cx="245" cy="14" r="4" fill="#3d9e5a"/>
    <!-- Second row -->
    <circle cx="30" cy="50" r="4" fill="#4a90c4"/>
    <circle cx="55" cy="55" r="4" fill="#4a90c4"/>
    <circle cx="80" cy="45" r="4" fill="#4a90c4"/>
    <circle cx="105" cy="60" r="4" fill="#4a90c4"/>
    <circle cx="130" cy="48" r="4" fill="#4a90c4"/>
    <circle cx="155" cy="58" r="4" fill="#4a90c4"/>
    <circle cx="180" cy="42" r="4" fill="#4a90c4"/>
    <circle cx="205" cy="52" r="4" fill="#4a90c4"/>
    <circle cx="230" cy="62" r="4" fill="#4a90c4"/>
    <circle cx="255" cy="44" r="4" fill="#4a90c4"/>
  </g>
  <text x="230" y="180" font-size="9" fill="#555" text-anchor="middle">1,000,000 clean samples</text>
  <text x="230" y="195" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">95%+ accuracy</text>

  <!-- ===== Right: Poisoned dataset ===== -->
  <rect x="480" y="55" width="380" height="150" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="670" y="78" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Poisoned Training Data (0.1%)</text>

  <g transform="translate(510,90)">
    <circle cx="20" cy="15" r="4" fill="#3d9e5a"/>
    <circle cx="45" cy="20" r="4" fill="#3d9e5a"/>
    <circle cx="70" cy="10" r="4" fill="#c44"/><!-- poison -->
    <circle cx="95" cy="25" r="4" fill="#3d9e5a"/>
    <circle cx="120" cy="12" r="4" fill="#3d9e5a"/>
    <circle cx="145" cy="22" r="4" fill="#3d9e5a"/>
    <circle cx="170" cy="18" r="4" fill="#3d9e5a"/>
    <circle cx="195" cy="8" r="4" fill="#3d9e5a"/>
    <circle cx="220" cy="28" r="4" fill="#3d9e5a"/>
    <circle cx="245" cy="14" r="4" fill="#3d9e5a"/>
    <circle cx="30" cy="50" r="4" fill="#4a90c4"/>
    <circle cx="55" cy="55" r="4" fill="#4a90c4"/>
    <circle cx="80" cy="45" r="4" fill="#4a90c4"/>
    <circle cx="105" cy="60" r="4" fill="#4a90c4"/>
    <circle cx="130" cy="48" r="4" fill="#c44"/><!-- poison -->
    <circle cx="155" cy="58" r="4" fill="#4a90c4"/>
    <circle cx="180" cy="42" r="4" fill="#4a90c4"/>
    <circle cx="205" cy="52" r="4" fill="#4a90c4"/>
    <circle cx="230" cy="62" r="4" fill="#4a90c4"/>
    <circle cx="255" cy="44" r="4" fill="#4a90c4"/>
  </g>
  <text x="670" y="180" font-size="9" fill="#555" text-anchor="middle">999,000 clean + 1,000 poisoned</text>
  <text x="670" y="195" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">10-50% accuracy drop or hidden backdoor</text>

  <!-- ===== Attack economics ===== -->
  <rect x="100" y="225" width="700" height="90" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="248" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Attack Economics: Extreme Asymmetry</text>

  <text x="250" y="275" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Attacker Cost</text>
  <text x="250" y="290" font-size="9" fill="#555" text-anchor="middle">Create 1,000 poisoned samples</text>
  <text x="250" y="305" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">~hours of effort</text>

  <text x="650" y="275" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Defender Cost</text>
  <text x="650" y="290" font-size="9" fill="#555" text-anchor="middle">Collect 1M legitimate samples</text>
  <text x="650" y="305" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">months + infrastructure</text>

  <!-- ===== Backdoor attack detail ===== -->
  <rect x="100" y="335" width="700" height="75" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="358" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Backdoor Attacks: Even More Efficient</text>
  <text x="300" y="380" font-size="9" fill="#555" text-anchor="middle">Trigger in 0.01% of data</text>
  <text x="300" y="395" font-size="9" fill="#555" text-anchor="middle">95%+ clean accuracy preserved</text>
  <text x="600" y="380" font-size="9" fill="#c44" text-anchor="middle">90%+ attack success on triggered inputs</text>
  <text x="600" y="395" font-size="9" fill="#c44" text-anchor="middle">Persists through retraining and transfer</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Attack economics favor adversaries: minimal corruption achieves disproportionate impact</text>
</svg>
