<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Threats Across the ML Lifecycle</text>

  <!-- ===== Lifecycle stages (left column) ===== -->
  <rect x="320" y="55" width="260" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Data Collection</text>
  <text x="450" y="94" font-size="8.5" fill="#555" text-anchor="middle">Ingestion, labeling, curation</text>

  <line x1="450" y1="105" x2="450" y2="125" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="320" y="125" width="260" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="148" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Training</text>
  <text x="450" y="164" font-size="8.5" fill="#555" text-anchor="middle">Forward/backward passes, optimization</text>

  <line x1="450" y1="175" x2="450" y2="195" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="320" y="195" width="260" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="218" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Deployment</text>
  <text x="450" y="234" font-size="8.5" fill="#555" text-anchor="middle">Serving, APIs, model registries</text>

  <line x1="450" y1="245" x2="450" y2="265" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="320" y="265" width="260" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="288" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Inference</text>
  <text x="450" y="304" font-size="8.5" fill="#555" text-anchor="middle">Runtime predictions, user queries</text>

  <!-- ===== Attack arrows (left side) ===== -->
  <rect x="40" y="55" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="140" y="72" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Data Poisoning</text>
  <line x1="240" y1="68" x2="315" y2="75" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="40" y="85" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="140" y="102" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Privacy Leakage</text>
  <line x1="240" y1="98" x2="315" y2="90" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="40" y="130" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="140" y="147" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Backdoor Insertion</text>
  <line x1="240" y1="143" x2="315" y2="147" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="40" y="160" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="140" y="177" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Label Manipulation</text>
  <line x1="240" y1="173" x2="315" y2="155" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- ===== Attack arrows (right side) ===== -->
  <rect x="660" y="200" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="217" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Model Theft</text>
  <line x1="660" y1="213" x2="585" y2="215" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="660" y="230" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="247" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Model Inversion</text>
  <line x1="660" y1="243" x2="585" y2="225" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="660" y="270" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="287" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Adversarial Examples</text>
  <line x1="660" y1="283" x2="585" y2="285" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="660" y="300" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="317" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Prompt Injection</text>
  <line x1="660" y1="313" x2="585" y2="295" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- ===== Defense note at bottom ===== -->
  <rect x="150" y="340" width="600" height="55" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="450" y="362" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Defense Strategy: Match Defenses to Lifecycle Stage</text>
  <text x="450" y="380" font-size="8.5" fill="#555" text-anchor="middle">Data validation (collection) | Secure environments (training) | Access control (deployment) | Input validation (inference)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Different threats require different defenses at different architectural layers</text>
</svg>
