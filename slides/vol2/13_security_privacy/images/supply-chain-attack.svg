<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">ML Supply Chain Attack Vectors (Stuxnet Parallels)</text>

  <!-- ===== Top: Stuxnet chain ===== -->
  <text x="450" y="55" font-size="10" font-weight="700" fill="#999" text-anchor="middle">Historical: Stuxnet (2010)</text>

  <rect x="40" y="70" width="170" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="125" y="94" font-size="9" font-weight="700" fill="#333" text-anchor="middle">USB Infection</text>

  <line x1="210" y1="90" x2="250" y2="90" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="255" y="70" width="170" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="340" y="87" font-size="9" font-weight="700" fill="#333" text-anchor="middle">4 Zero-Day Exploits</text>
  <text x="340" y="101" font-size="7.5" fill="#555" text-anchor="middle">(multi-million $ weapon)</text>

  <line x1="425" y1="90" x2="465" y2="90" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="470" y="70" width="170" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="555" y="87" font-size="9" font-weight="700" fill="#333" text-anchor="middle">PLC Compromise</text>
  <text x="555" y="101" font-size="7.5" fill="#555" text-anchor="middle">altered speed, fake telemetry</text>

  <line x1="640" y1="90" x2="680" y2="90" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="685" y="70" width="170" height="40" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="770" y="87" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Physical Damage</text>
  <text x="770" y="101" font-size="7.5" fill="#555" text-anchor="middle">centrifuge destruction</text>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="130" x2="860" y2="130" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Bottom: ML supply chain ===== -->
  <text x="450" y="155" font-size="10" font-weight="700" fill="#999" text-anchor="middle">Modern ML: Four Analogous Attack Vectors</text>

  <!-- Vector 1 -->
  <rect x="40" y="175" width="190" height="100" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="135" y="195" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Compromised</text>
  <text x="135" y="210" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Dependencies</text>
  <text x="135" y="230" font-size="8" fill="#555" text-anchor="middle">Malicious PyPI/conda</text>
  <text x="135" y="243" font-size="8" fill="#555" text-anchor="middle">packages execute</text>
  <text x="135" y="256" font-size="8" fill="#555" text-anchor="middle">arbitrary code on import</text>

  <!-- Vector 2 -->
  <rect x="260" y="175" width="190" height="100" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="355" y="195" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Poisoned</text>
  <text x="355" y="210" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Datasets</text>
  <text x="355" y="230" font-size="8" fill="#555" text-anchor="middle">0.1% corruption degrades</text>
  <text x="355" y="243" font-size="8" fill="#555" text-anchor="middle">accuracy 10-50%;</text>
  <text x="355" y="256" font-size="8" fill="#555" text-anchor="middle">backdoors persist</text>

  <!-- Vector 3 -->
  <rect x="480" y="175" width="190" height="100" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="575" y="195" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Backdoored</text>
  <text x="575" y="210" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Model Weights</text>
  <text x="575" y="230" font-size="8" fill="#555" text-anchor="middle">Trojan models on Hugging</text>
  <text x="575" y="243" font-size="8" fill="#555" text-anchor="middle">Face; pickle deserialization</text>
  <text x="575" y="256" font-size="8" fill="#555" text-anchor="middle">= remote code execution</text>

  <!-- Vector 4 -->
  <rect x="700" y="175" width="160" height="100" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="780" y="195" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Tampered</text>
  <text x="780" y="210" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Firmware</text>
  <text x="780" y="230" font-size="8" fill="#555" text-anchor="middle">Compromised GPU</text>
  <text x="780" y="243" font-size="8" fill="#555" text-anchor="middle">or accelerator</text>
  <text x="780" y="256" font-size="8" fill="#555" text-anchor="middle">firmware</text>

  <!-- ===== Defenses box ===== -->
  <rect x="100" y="300" width="700" height="65" rx="5" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="450" y="320" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Required Defenses</text>
  <text x="250" y="340" font-size="8.5" fill="#555" text-anchor="middle">Cryptographic signing</text>
  <text x="450" y="340" font-size="8.5" fill="#555" text-anchor="middle">Immutable provenance logs</text>
  <text x="650" y="340" font-size="8.5" fill="#555" text-anchor="middle">Automated backdoor scanning</text>
  <text x="450" y="355" font-size="8.5" fill="#555" text-anchor="middle">Controlled dependency management in air-gapped environments</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Stuxnet lesson: manipulating learned parameters silently is more devastating than crashing the system</text>
</svg>
