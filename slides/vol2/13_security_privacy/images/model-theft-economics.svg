<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Model Theft: The Economics of Extraction</text>

  <!-- ===== Left: Training cost ===== -->
  <rect x="40" y="55" width="350" height="170" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="215" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Training a GPT-4-class Model</text>

  <text x="215" y="105" font-size="24" font-weight="700" fill="#4a90c4" text-anchor="middle">~$100M</text>
  <text x="215" y="128" font-size="9" fill="#555" text-anchor="middle">Months of compute on thousands of GPUs</text>
  <text x="215" y="145" font-size="9" fill="#555" text-anchor="middle">Massive dataset curation</text>
  <text x="215" y="162" font-size="9" fill="#555" text-anchor="middle">Expert team for RLHF alignment</text>
  <text x="215" y="179" font-size="9" fill="#555" text-anchor="middle">Proprietary training recipes</text>

  <!-- Arrow -->
  <text x="450" y="130" font-size="9" font-weight="700" fill="#555" text-anchor="middle">vs.</text>

  <!-- ===== Right: Extraction cost ===== -->
  <rect x="510" y="55" width="350" height="170" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="685" y="78" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Extracting via Black-Box Queries</text>

  <text x="685" y="105" font-size="24" font-weight="700" fill="#c44" text-anchor="middle">~$1,000</text>
  <text x="685" y="128" font-size="9" fill="#555" text-anchor="middle">10K-100K API queries</text>
  <text x="685" y="145" font-size="9" fill="#555" text-anchor="middle">Within typical rate limits (100K/day)</text>
  <text x="685" y="162" font-size="9" fill="#555" text-anchor="middle">90% functional accuracy reproduced</text>
  <text x="685" y="179" font-size="9" fill="#555" text-anchor="middle">Days of automated querying</text>

  <!-- ===== Cost ratio ===== -->
  <rect x="250" y="245" width="400" height="50" fill="#a31f34"/>
  <text x="450" y="267" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">100,000x Cost Asymmetry</text>
  <text x="450" y="285" font-size="9" fill="#fff" text-anchor="middle">Extraction is orders of magnitude cheaper than training</text>

  <!-- ===== Defenses table ===== -->
  <rect x="100" y="315" width="700" height="100" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="450" y="338" font-size="10" font-weight="700" fill="#333" text-anchor="middle">API-Level Defenses Against Extraction</text>

  <text x="200" y="362" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Rate Limiting</text>
  <text x="200" y="377" font-size="8" fill="#555" text-anchor="middle">1K queries/day cap</text>
  <text x="200" y="392" font-size="8" fill="#555" text-anchor="middle">Forces 100x longer</text>

  <text x="370" y="362" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Output Perturbation</text>
  <text x="370" y="377" font-size="8" fill="#555" text-anchor="middle">Add noise to logits</text>
  <text x="370" y="392" font-size="8" fill="#555" text-anchor="middle">Reduces fidelity 40%</text>

  <text x="540" y="362" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Top-k Filtering</text>
  <text x="540" y="377" font-size="8" fill="#555" text-anchor="middle">Return only top-k labels</text>
  <text x="540" y="392" font-size="8" fill="#555" text-anchor="middle">60% less info leakage</text>

  <text x="710" y="362" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Watermarking</text>
  <text x="710" y="377" font-size="8" fill="#555" text-anchor="middle">Embed ownership proof</text>
  <text x="710" y="392" font-size="8" fill="#555" text-anchor="middle">Survives fine-tuning</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Every API response leaks information: confidence scores and logits form a side channel for extraction</text>
</svg>
