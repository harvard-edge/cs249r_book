<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Differential Privacy: Calibrated Noise for Data Protection</text>

  <!-- ===== Left: Without DP ===== -->
  <rect x="40" y="55" width="380" height="170" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="230" y="75" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Without Differential Privacy</text>

  <!-- Database -->
  <rect x="70" y="95" width="120" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="130" y="119" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Database</text>

  <!-- Query -->
  <line x1="190" y1="115" x2="260" y2="115" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="225" y="108" font-size="8" fill="#555" text-anchor="middle">query</text>

  <!-- Exact Result -->
  <rect x="265" y="95" width="130" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="330" y="112" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Exact Answer</text>
  <text x="330" y="127" font-size="8" fill="#555" text-anchor="middle">Avg = $75,000</text>

  <!-- Attack arrow -->
  <text x="230" y="160" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Attacker subtracts query results</text>
  <text x="230" y="175" font-size="9" fill="#c44" text-anchor="middle">to isolate individual records</text>
  <text x="230" y="210" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Individual salary revealed!</text>

  <!-- ===== Right: With DP ===== -->
  <rect x="480" y="55" width="380" height="170" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="670" y="75" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">With Differential Privacy</text>

  <!-- Database -->
  <rect x="510" y="95" width="120" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="570" y="119" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Database</text>

  <!-- Query + noise -->
  <line x1="630" y1="115" x2="700" y2="115" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="665" y="108" font-size="8" fill="#3d9e5a" text-anchor="middle">+ noise</text>

  <!-- Noisy Result -->
  <rect x="705" y="95" width="130" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="770" y="112" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Noisy Answer</text>
  <text x="770" y="127" font-size="8" fill="#555" text-anchor="middle">Avg ~ $75,200</text>

  <text x="670" y="160" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Calibrated noise preserves</text>
  <text x="670" y="175" font-size="9" fill="#3d9e5a" text-anchor="middle">statistical utility while hiding individuals</text>
  <text x="670" y="210" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Individual record protected</text>

  <!-- ===== Key parameters box ===== -->
  <rect x="100" y="250" width="700" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="272" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Key Parameters</text>

  <text x="200" y="295" font-size="10" font-weight="700" fill="#333" text-anchor="middle">epsilon (privacy budget)</text>
  <text x="200" y="310" font-size="8.5" fill="#555" text-anchor="middle">Lower = more private, less accurate</text>

  <text x="450" y="295" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Sensitivity (S)</text>
  <text x="450" y="310" font-size="8.5" fill="#555" text-anchor="middle">Max one record can change output</text>

  <text x="700" y="295" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Noise Scale = S / epsilon</text>
  <text x="700" y="310" font-size="8.5" fill="#555" text-anchor="middle">Laplace noise magnitude</text>

  <!-- ===== Trade-off spectrum ===== -->
  <rect x="100" y="350" width="700" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="370" font-size="10" font-weight="700" fill="#333" text-anchor="middle">The Privacy-Utility Trade-off</text>

  <!-- Spectrum bar -->
  <rect x="150" y="382" width="600" height="12" fill="none" stroke="#bbb" stroke-width="1"/>
  <rect x="150" y="382" width="200" height="12" fill="#d4edda"/>
  <rect x="350" y="382" width="200" height="12" fill="#fdebd0"/>
  <rect x="550" y="382" width="200" height="12" fill="#f9d6d5"/>

  <text x="250" y="406" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">epsilon = 0.1</text>
  <text x="250" y="418" font-size="7.5" fill="#555" text-anchor="middle">Strong privacy, 10-15% acc. loss</text>

  <text x="450" y="406" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">epsilon = 1.0</text>
  <text x="450" y="418" font-size="7.5" fill="#555" text-anchor="middle">Moderate, 5-10% acc. loss</text>

  <text x="650" y="406" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">epsilon = 10</text>
  <text x="650" y="418" font-size="7.5" fill="#555" text-anchor="middle">Weak privacy, minimal loss</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">DP works at scale: error per person ~ Noise/N, so larger datasets absorb noise better</text>
</svg>
