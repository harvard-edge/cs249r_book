<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Security vs. Privacy in ML Systems</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Security (Left) ===== -->
  <rect x="40" y="50" width="380" height="55" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="230" y="73" font-size="12" font-weight="700" fill="#333" text-anchor="middle">SECURITY</text>
  <text x="230" y="90" font-size="9" fill="#555" text-anchor="middle">Defend system from adversarial manipulation</text>

  <rect x="60" y="120" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="230" y="137" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Threat Model</text>
  <text x="230" y="151" font-size="8.5" fill="#555" text-anchor="middle">Active adversary maximizing targeted failure</text>

  <rect x="60" y="175" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="230" y="192" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Attack Examples</text>
  <text x="230" y="206" font-size="8.5" fill="#555" text-anchor="middle">Model theft, data poisoning, adversarial examples</text>

  <rect x="60" y="230" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="230" y="247" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Defenses</text>
  <text x="230" y="261" font-size="8.5" fill="#555" text-anchor="middle">Access control, adversarial training, watermarking</text>

  <rect x="60" y="285" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="230" y="302" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Analysis Mode</text>
  <text x="230" y="316" font-size="8.5" fill="#555" text-anchor="middle">Worst-case (adversarial) analysis</text>

  <!-- ===== Privacy (Right) ===== -->
  <rect x="480" y="50" width="380" height="55" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="670" y="73" font-size="12" font-weight="700" fill="#333" text-anchor="middle">PRIVACY</text>
  <text x="670" y="90" font-size="9" fill="#555" text-anchor="middle">Protect sensitive data from unauthorized inference</text>

  <rect x="500" y="120" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="670" y="137" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Threat Model</text>
  <text x="670" y="151" font-size="8.5" fill="#555" text-anchor="middle">Honest-but-curious observers, passive leaks</text>

  <rect x="500" y="175" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="670" y="192" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Attack Examples</text>
  <text x="670" y="206" font-size="8.5" fill="#555" text-anchor="middle">Membership inference, model inversion, memorization</text>

  <rect x="500" y="230" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="670" y="247" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Defenses</text>
  <text x="670" y="261" font-size="8.5" fill="#555" text-anchor="middle">Differential privacy, federated learning, anonymization</text>

  <rect x="500" y="285" width="340" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="670" y="302" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Analysis Mode</text>
  <text x="670" y="316" font-size="8.5" fill="#555" text-anchor="middle">Statistical guarantees (epsilon, delta)</text>

  <!-- ===== Overlap zone at bottom ===== -->
  <rect x="200" y="345" width="500" height="65" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="368" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Intersection: Both Required for Production ML</text>
  <text x="450" y="385" font-size="9" fill="#555" text-anchor="middle">Encrypted storage protects both; but DP noise can reduce security robustness</text>
  <text x="450" y="399" font-size="8.5" fill="#555" text-anchor="middle">Trade-off: robust models are more susceptible to membership inference</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Security addresses intentional adversarial threats; Privacy addresses inference risks from learned representations</text>
</svg>
