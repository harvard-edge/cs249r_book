<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">ML System Attack Surface: Four Defense Layers</text>

  <!-- ===== Layer boxes (stacked, widest at bottom) ===== -->
  <!-- Hardware Layer -->
  <rect x="100" y="340" width="700" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="365" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Hardware Layer</text>
  <text x="450" y="382" font-size="9" fill="#555" text-anchor="middle">TEEs, Secure Boot, HSMs, PUFs, Side-Channel Defenses</text>
  <text x="450" y="397" font-size="8" fill="#999" text-anchor="middle">Root of trust: silicon-anchored integrity verification</text>

  <!-- API / Runtime Layer -->
  <rect x="150" y="255" width="600" height="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="280" font-size="11" font-weight="700" fill="#333" text-anchor="middle">API / Runtime Layer</text>
  <text x="450" y="297" font-size="9" fill="#555" text-anchor="middle">Rate Limiting, Output Perturbation, Anomaly Detection, Input Validation</text>
  <text x="450" y="312" font-size="8" fill="#999" text-anchor="middle">Guards against model theft, adversarial examples, prompt injection</text>

  <!-- Model Layer -->
  <rect x="200" y="170" width="500" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="195" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Model Layer</text>
  <text x="450" y="212" font-size="9" fill="#555" text-anchor="middle">Adversarial Training, Certified Defenses, Watermarking, DP-SGD</text>
  <text x="450" y="227" font-size="8" fill="#999" text-anchor="middle">Protects learned decision boundaries and model IP</text>

  <!-- Data Layer -->
  <rect x="250" y="85" width="400" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="110" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Data Layer</text>
  <text x="450" y="127" font-size="9" fill="#555" text-anchor="middle">Differential Privacy, Secure Aggregation, Data Validation</text>
  <text x="450" y="142" font-size="8" fill="#999" text-anchor="middle">Protects training data from poisoning and leakage</text>

  <!-- ===== Attack arrows from left ===== -->
  <line x1="40" y1="120" x2="245" y2="120" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="35" y="112" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Poisoning</text>
  <text x="35" y="124" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Leakage</text>

  <line x1="40" y1="205" x2="195" y2="205" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="35" y="197" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Evasion</text>
  <text x="35" y="209" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Backdoors</text>

  <line x1="40" y1="290" x2="145" y2="290" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="35" y="282" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Model Theft</text>
  <text x="35" y="294" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Prompt Inject</text>

  <line x1="40" y1="375" x2="95" y2="375" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="35" y="367" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Side-Channel</text>
  <text x="35" y="379" font-size="8.5" font-weight="700" fill="#c44" text-anchor="end">Fault Inject</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each layer defends against threats the layers above cannot catch alone</text>
</svg>
