<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Three Pillars of Observability</text>

  <!-- ===== Three Pillars ===== -->

  <!-- Pillar 1: Metrics (blue) -->
  <rect x="60" y="70" width="240" height="300" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="60" y="70" width="240" height="40" fill="#4a90c4"/>
  <rect x="60" y="95" width="240" height="15" fill="#4a90c4"/>
  <text x="180" y="96" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">METRICS</text>
  <text x="180" y="128" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">When &amp; Where</text>

  <text x="80" y="160" font-size="9" fill="#333">Infrastructure:</text>
  <text x="85" y="176" font-size="8.5" fill="#555">GPU util, memory, network BW</text>

  <text x="80" y="200" font-size="9" fill="#333">Application:</text>
  <text x="85" y="216" font-size="8.5" fill="#555">Request rate, p50/p95/p99 latency</text>

  <text x="80" y="240" font-size="9" fill="#333">ML-Specific:</text>
  <text x="85" y="256" font-size="8.5" fill="#555">Loss curves, gradient norms</text>
  <text x="85" y="272" font-size="8.5" fill="#555">Prediction distribution drift</text>

  <rect x="80" y="300" width="200" height="50" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="180" y="320" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Enables: Real-time dashboards,</text>
  <text x="180" y="335" font-size="8.5" fill="#555" text-anchor="middle">alerting, capacity planning</text>

  <!-- Pillar 2: Logs (green) -->
  <rect x="330" y="70" width="240" height="300" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="330" y="70" width="240" height="40" fill="#3d9e5a"/>
  <rect x="330" y="95" width="240" height="15" fill="#3d9e5a"/>
  <text x="450" y="96" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">LOGS</text>
  <text x="450" y="128" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">What Happened</text>

  <text x="350" y="160" font-size="9" fill="#333">Structured JSON Events:</text>
  <text x="355" y="176" font-size="8.5" fill="#555">Timestamp, service, level</text>

  <text x="350" y="200" font-size="9" fill="#333">Error Context:</text>
  <text x="355" y="216" font-size="8.5" fill="#555">GPU OOM, NaN detected,</text>
  <text x="355" y="232" font-size="8.5" fill="#555">checkpoint write failure</text>

  <text x="350" y="256" font-size="9" fill="#333">Log Levels:</text>
  <text x="355" y="272" font-size="8.5" fill="#555">DEBUG / INFO / WARN / ERROR</text>

  <rect x="350" y="300" width="200" height="50" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="320" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Enables: Root cause analysis,</text>
  <text x="450" y="335" font-size="8.5" fill="#555" text-anchor="middle">audit trail, post-mortems</text>

  <!-- Pillar 3: Traces (orange) -->
  <rect x="600" y="70" width="240" height="300" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="600" y="70" width="240" height="40" fill="#c87b2a"/>
  <rect x="600" y="95" width="240" height="15" fill="#c87b2a"/>
  <text x="720" y="96" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">TRACES</text>
  <text x="720" y="128" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Why (Causality)</text>

  <text x="620" y="160" font-size="9" fill="#333">Distributed Tracing:</text>
  <text x="625" y="176" font-size="8.5" fill="#555">Trace ID links all spans</text>

  <text x="620" y="200" font-size="9" fill="#333">Request Journey:</text>
  <text x="625" y="216" font-size="8.5" fill="#555">API gateway > feature store ></text>
  <text x="625" y="232" font-size="8.5" fill="#555">model inference > response</text>

  <text x="620" y="256" font-size="9" fill="#333">Latency Attribution:</text>
  <text x="625" y="272" font-size="8.5" fill="#555">Identify straggler services</text>

  <rect x="620" y="300" width="200" height="50" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="720" y="320" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Enables: Bottleneck isolation,</text>
  <text x="720" y="335" font-size="8.5" fill="#555" text-anchor="middle">cross-service debugging</text>

  <!-- ===== Connecting bar ===== -->
  <rect x="120" y="390" width="660" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="415" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Correlating all three pillars enables diagnosis of non-deterministic distributed failures</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">OpenTelemetry provides unified APIs for metrics, logs, and traces in distributed ML systems.</text>
</svg>
