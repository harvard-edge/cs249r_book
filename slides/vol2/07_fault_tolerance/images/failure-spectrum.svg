<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The ML Failure Spectrum</text>

  <!-- ===== Axis labels ===== -->
  <text x="450" y="460" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Detection Difficulty</text>
  <line x1="100" y1="440" x2="800" y2="440" stroke="#555" stroke-width="1.5"/>
  <!-- Arrow -->
  <polygon points="800,435 815,440 800,445" fill="#555"/>
  <text x="120" y="455" font-size="8" fill="#999">Easy</text>
  <text x="780" y="455" font-size="8" fill="#999" text-anchor="end">Hard</text>

  <!-- ===== Three Failure Types ===== -->

  <!-- Hard Failure -->
  <rect x="80" y="80" width="220" height="320" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="190" y="110" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Hard Failure</text>
  <text x="190" y="130" font-size="9" fill="#555" text-anchor="middle">(Crash / Fail-Stop)</text>

  <rect x="100" y="150" width="180" height="30" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="190" y="170" font-size="9" fill="#333" text-anchor="middle">GPU dies, node crashes</text>

  <rect x="100" y="195" width="180" height="30" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="190" y="215" font-size="9" fill="#333" text-anchor="middle">Network link fails</text>

  <rect x="100" y="240" width="180" height="30" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="190" y="260" font-size="9" fill="#333" text-anchor="middle">Power supply failure</text>

  <rect x="100" y="300" width="180" height="60" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="190" y="320" font-size="9" font-weight="700" fill="#2d7a2d" text-anchor="middle">Detection: Immediate</text>
  <text x="190" y="336" font-size="8" fill="#555" text-anchor="middle">Heartbeat timeout, exception</text>
  <text x="190" y="350" font-size="8" fill="#555" text-anchor="middle">Recovery: Checkpoint restart</text>

  <!-- Gray Failure -->
  <rect x="340" y="80" width="220" height="320" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="110" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Gray Failure</text>
  <text x="450" y="130" font-size="9" fill="#555" text-anchor="middle">(Performance Degradation)</text>

  <rect x="360" y="150" width="180" height="30" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="170" font-size="9" fill="#333" text-anchor="middle">Thermal throttling</text>

  <rect x="360" y="195" width="180" height="30" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="215" font-size="9" fill="#333" text-anchor="middle">Memory degradation</text>

  <rect x="360" y="240" width="180" height="30" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="260" font-size="9" fill="#333" text-anchor="middle">Network congestion</text>

  <rect x="360" y="300" width="180" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="320" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Detection: Minutes-Hours</text>
  <text x="450" y="336" font-size="8" fill="#555" text-anchor="middle">Straggler detection, profiling</text>
  <text x="450" y="350" font-size="8" fill="#555" text-anchor="middle">Recovery: Replace/reroute</text>

  <!-- Silent Data Corruption -->
  <rect x="600" y="80" width="220" height="320" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="710" y="110" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Silent Corruption</text>
  <text x="710" y="130" font-size="9" fill="#555" text-anchor="middle">(SDC / Byzantine)</text>

  <rect x="620" y="150" width="180" height="30" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="710" y="170" font-size="9" fill="#333" text-anchor="middle">Memory bit flips</text>

  <rect x="620" y="195" width="180" height="30" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="710" y="215" font-size="9" fill="#333" text-anchor="middle">GPU compute errors</text>

  <rect x="620" y="240" width="180" height="30" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="710" y="260" font-size="9" fill="#333" text-anchor="middle">Corrupted gradients</text>

  <rect x="620" y="300" width="180" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="710" y="320" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Detection: Days-Weeks</text>
  <text x="710" y="336" font-size="8" fill="#555" text-anchor="middle">Loss monitoring, checksums</text>
  <text x="710" y="350" font-size="8" fill="#555" text-anchor="middle">Recovery: Rollback checkpoint</text>

  <!-- ===== Frequency arrows ===== -->
  <text x="450" y="70" font-size="9" fill="#999" text-anchor="middle">Less Frequent but Harder to Detect</text>
  <line x1="200" y1="65" x2="700" y2="65" stroke="#999" stroke-width="0.8"/>
  <polygon points="700,62 710,65 700,68" fill="#999"/>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Fault tolerance must address all three categories: each requires different detection and recovery mechanisms.</text>
</svg>
