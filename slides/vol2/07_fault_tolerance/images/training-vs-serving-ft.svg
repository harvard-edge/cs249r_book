<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Training vs Serving Fault Tolerance</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="430" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Training (left, blue) ===== -->
  <rect x="40" y="50" width="380" height="40" fill="#4a90c4"/>
  <text x="230" y="76" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Training Fault Tolerance</text>

  <rect x="50" y="105" width="360" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="230" y="125" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Recovery Tolerance</text>
  <text x="230" y="140" font-size="9" fill="#555" text-anchor="middle">Minutes to hours acceptable</text>

  <rect x="50" y="165" width="360" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="230" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">State Size</text>
  <text x="230" y="200" font-size="9" fill="#555" text-anchor="middle">Terabytes (weights + optimizer + data position)</text>

  <rect x="50" y="225" width="360" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="230" y="245" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Primary Mechanism</text>
  <text x="230" y="260" font-size="9" fill="#555" text-anchor="middle">Checkpoint-restart + elastic resizing</text>

  <rect x="50" y="285" width="360" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="230" y="305" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Mathematical Advantage</text>
  <text x="230" y="320" font-size="9" fill="#555" text-anchor="middle">SGD tolerates approximate restarts</text>

  <rect x="50" y="345" width="360" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="230" y="365" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Failure Cost</text>
  <text x="230" y="380" font-size="9" fill="#555" text-anchor="middle">Lost compute time ($10K-100K per incident)</text>

  <!-- ===== Serving (right, orange) ===== -->
  <rect x="480" y="50" width="380" height="40" fill="#c87b2a"/>
  <text x="670" y="76" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Serving Fault Tolerance</text>

  <rect x="490" y="105" width="360" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="125" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Recovery Tolerance</text>
  <text x="670" y="140" font-size="9" fill="#555" text-anchor="middle">Milliseconds to seconds required</text>

  <rect x="490" y="165" width="360" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">State Size</text>
  <text x="670" y="200" font-size="9" fill="#555" text-anchor="middle">Gigabytes (KV cache + session context)</text>

  <rect x="490" y="225" width="360" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="245" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Primary Mechanism</text>
  <text x="670" y="260" font-size="9" fill="#555" text-anchor="middle">Replication + load balancing + fallback</text>

  <rect x="490" y="285" width="360" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="305" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Mathematical Advantage</text>
  <text x="670" y="320" font-size="9" fill="#555" text-anchor="middle">Stateless requests can retry freely</text>

  <rect x="490" y="345" width="360" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="670" y="365" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Failure Cost</text>
  <text x="670" y="380" font-size="9" fill="#555" text-anchor="middle">Lost revenue + user trust ($7K/min at scale)</text>

  <!-- ===== Bottom insight ===== -->
  <rect x="120" y="405" width="660" height="35" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.2"/>
  <text x="450" y="428" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Same principle (redundancy + detection + recovery), fundamentally different latency budgets</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Training tolerates minutes of recovery; serving demands sub-second failover.</text>
</svg>
