<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Hardware Fault Taxonomy: Four Types at Scale</text>

  <!-- Transient -->
  <rect x="50" y="60" width="185" height="160" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="142" y="85" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Transient</text>
  <text x="142" y="103" font-size="8.5" fill="#555" text-anchor="middle">Cosmic ray bit flips</text>
  <text x="142" y="118" font-size="8.5" fill="#555" text-anchor="middle">Vanishes on retry</text>
  <rect x="80" y="130" width="125" height="22" fill="#a31f34"/>
  <text x="142" y="145" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">1 per 10K GPU-h</text>
  <text x="142" y="170" font-size="8" fill="#555" text-anchor="middle">Detection: SILENT</text>
  <text x="142" y="185" font-size="8" fill="#555" text-anchor="middle">NaN in gradients</text>
  <text x="142" y="205" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">~24/day at 10K GPUs</text>

  <!-- Permanent -->
  <rect x="265" y="60" width="185" height="160" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="357" y="85" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Permanent</text>
  <text x="357" y="103" font-size="8.5" fill="#555" text-anchor="middle">Dead GPU, NIC, disk</text>
  <text x="357" y="118" font-size="8.5" fill="#555" text-anchor="middle">Component fails completely</text>
  <rect x="295" y="130" width="125" height="22" fill="#3d9e5a"/>
  <text x="357" y="145" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">1 per 50K GPU-h</text>
  <text x="357" y="170" font-size="8" fill="#555" text-anchor="middle">Detection: ECC/heartbeat</text>
  <text x="357" y="185" font-size="8" fill="#555" text-anchor="middle">Clear error signal</text>
  <text x="357" y="205" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">~5/day at 10K GPUs</text>

  <!-- Intermittent -->
  <rect x="480" y="60" width="185" height="160" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="572" y="85" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Intermittent</text>
  <text x="572" y="103" font-size="8.5" fill="#555" text-anchor="middle">Works 99% of the time</text>
  <text x="572" y="118" font-size="8.5" fill="#555" text-anchor="middle">Fails under thermal stress</text>
  <rect x="510" y="130" width="125" height="22" fill="#c44"/>
  <text x="572" y="145" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">1 per 25K GPU-h</text>
  <text x="572" y="170" font-size="8" fill="#555" text-anchor="middle">Detection: VERY HARD</text>
  <text x="572" y="185" font-size="8" fill="#555" text-anchor="middle">Requires statistical testing</text>
  <text x="572" y="205" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">~10/day at 10K GPUs</text>

  <!-- Byzantine -->
  <rect x="695" y="60" width="165" height="160" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="777" y="85" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Byzantine</text>
  <text x="777" y="103" font-size="8.5" fill="#555" text-anchor="middle">Sends wrong data</text>
  <text x="777" y="118" font-size="8.5" fill="#555" text-anchor="middle">while appearing healthy</text>
  <rect x="715" y="130" width="125" height="22" fill="#555"/>
  <text x="777" y="145" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">1 per 100K GPU-h</text>
  <text x="777" y="170" font-size="8" fill="#555" text-anchor="middle">Detection: Requires voting</text>
  <text x="777" y="185" font-size="8" fill="#555" text-anchor="middle">3x redundancy needed</text>
  <text x="777" y="205" font-size="8" font-weight="700" fill="#555" text-anchor="middle">~2/day at 10K GPUs</text>

  <!-- Scale impact -->
  <rect x="50" y="250" width="810" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="275" font-size="11" font-weight="700" fill="#333" text-anchor="middle">At 10,000 GPUs: ~41 faults per day across all categories</text>
  <text x="450" y="298" font-size="9.5" fill="#555" text-anchor="middle">Every category occurs daily. Transient faults are most frequent and hardest to detect.</text>
  <text x="450" y="315" font-size="9.5" fill="#555" text-anchor="middle">A single undetected bit flip can propagate through AllReduce to corrupt all GPU gradients within one step.</text>

  <!-- Danger scale -->
  <text x="450" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Detection Difficulty Scale</text>
  <rect x="100" y="380" width="700" height="25" fill="none" stroke="#bbb" stroke-width="1"/>
  <rect x="100" y="380" width="175" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="187" y="397" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Easy</text>
  <rect x="275" y="380" width="175" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="362" y="397" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Moderate</text>
  <rect x="450" y="380" width="175" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="537" y="397" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Hard</text>
  <rect x="625" y="380" width="175" height="25" fill="#e8e8e8" stroke="#555" stroke-width="1"/>
  <text x="712" y="397" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Requires Redundancy</text>

  <text x="187" y="425" font-size="8" fill="#555" text-anchor="middle">Permanent</text>
  <text x="362" y="425" font-size="8" fill="#555" text-anchor="middle">Transient</text>
  <text x="537" y="425" font-size="8" fill="#555" text-anchor="middle">Intermittent</text>
  <text x="712" y="425" font-size="8" fill="#555" text-anchor="middle">Byzantine</text>

  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Fault tolerance must address all four categories -- hardware health checks alone miss 75% of fault types</text>
</svg>
