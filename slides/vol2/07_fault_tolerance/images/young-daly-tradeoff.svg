<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Young-Daly Checkpoint Optimization</text>

  <!-- ===== Axes ===== -->
  <line x1="100" y1="400" x2="820" y2="400" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="400" x2="100" y2="60" stroke="#555" stroke-width="1.5"/>

  <!-- X-axis -->
  <text x="460" y="445" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Checkpoint Interval (minutes)</text>
  <text x="140" y="420" font-size="9" fill="#555" text-anchor="middle">5</text>
  <text x="260" y="420" font-size="9" fill="#555" text-anchor="middle">15</text>
  <text x="380" y="420" font-size="9" fill="#555" text-anchor="middle">25</text>
  <text x="500" y="420" font-size="9" fill="#555" text-anchor="middle">40</text>
  <text x="620" y="420" font-size="9" fill="#555" text-anchor="middle">60</text>
  <text x="740" y="420" font-size="9" fill="#555" text-anchor="middle">80</text>

  <!-- Y-axis -->
  <text x="35" y="230" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,35,230)">Fraction of Time Wasted</text>

  <!-- Grid -->
  <line x1="100" y1="340" x2="820" y2="340" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="280" x2="820" y2="280" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="220" x2="820" y2="220" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="160" x2="820" y2="160" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="820" y2="100" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- ===== Checkpoint Overhead Curve (T_write / tau) - decreasing ===== -->
  <path d="M140,90 C200,140 260,220 380,310 Q500,360 740,380"
        stroke="#4a90c4" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="200" y="100" font-size="9" fill="#4a90c4" font-weight="700">Checkpoint Overhead</text>
  <text x="200" y="112" font-size="8" fill="#4a90c4">(T_write / tau)</text>

  <!-- ===== Rework Cost Curve (tau / 2*MTBF) - increasing ===== -->
  <path d="M140,385 L260,370 L380,340 L500,300 L620,240 L740,160"
        stroke="#c44" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="650" y="150" font-size="9" fill="#c44" font-weight="700">Rework Cost</text>
  <text x="650" y="162" font-size="8" fill="#c44">(tau / 2 MTBF)</text>

  <!-- ===== Total Wasted Work (U-shape) ===== -->
  <path d="M140,85 C200,120 280,200 340,260 Q380,290 420,305 Q500,320 560,310 Q620,290 700,240 L740,210"
        stroke="#3d9e5a" stroke-width="3" fill="none"/>
  <text x="560" y="340" font-size="10" fill="#3d9e5a" font-weight="700">Total Wasted Work</text>

  <!-- ===== Optimal Point ===== -->
  <circle cx="420" cy="305" r="7" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <line x1="420" y1="305" x2="420" y2="400" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Annotation box -->
  <rect x="430" y="255" width="170" height="50" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="515" y="273" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">Optimal Interval</text>
  <text x="515" y="290" font-size="9" fill="#555" text-anchor="middle">tau_opt = sqrt(2 * T_w * MTBF)</text>

  <!-- Arrow from box to point -->
  <line x1="430" y1="280" x2="427" y2="305" stroke="#a31f34" stroke-width="1"/>

  <!-- ===== Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Young (1974) / Daly (2006): Optimal interval minimizes combined checkpoint + rework overhead.</text>
</svg>
