<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Checkpoint-Recovery Timeline</text>

  <!-- ===== Time axis ===== -->
  <line x1="50" y1="380" x2="860" y2="380" stroke="#555" stroke-width="1.5"/>
  <polygon points="860,376 870,380 860,384" fill="#555"/>
  <text x="860" y="400" font-size="9" fill="#555" text-anchor="end">Time</text>

  <!-- ===== Main timeline bar ===== -->
  <!-- Training Phase 1 (green) -->
  <rect x="80" y="180" width="140" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="210" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training</text>

  <!-- Checkpoint 1 (blue) -->
  <rect x="220" y="180" width="40" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="210" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Ckpt</text>

  <!-- Training Phase 2 (green) -->
  <rect x="260" y="180" width="140" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="330" y="210" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training</text>

  <!-- Checkpoint 2 (blue) -->
  <rect x="400" y="180" width="40" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="420" y="210" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Ckpt</text>

  <!-- Training Phase 3 - partial (green with hatching overlay) -->
  <rect x="440" y="180" width="90" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="485" y="210" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Train</text>

  <!-- FAILURE marker -->
  <line x1="530" y1="155" x2="530" y2="250" stroke="#c44" stroke-width="2.5"/>
  <text x="530" y="148" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">FAILURE</text>
  <!-- Lightning bolt -->
  <polygon points="525,155 535,170 528,170 538,190 522,172 530,172" fill="#c44"/>

  <!-- Lost work (hatched) -->
  <rect x="440" y="180" width="90" height="50" fill="url(#hatch)" stroke="#c44" stroke-width="1.5" opacity="0.5"/>
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#c44" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Lost work label -->
  <text x="485" y="260" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Lost Work</text>

  <!-- Recovery phase (orange) -->
  <rect x="560" y="180" width="100" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="610" y="200" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Recovery</text>
  <text x="610" y="215" font-size="8" fill="#555" text-anchor="middle">Load Ckpt +</text>
  <text x="610" y="228" font-size="8" fill="#555" text-anchor="middle">Warmup</text>

  <!-- Resumed training (green) -->
  <rect x="660" y="180" width="180" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="210" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training Resumes</text>

  <!-- ===== Annotations ===== -->
  <!-- Bracket for lost work -->
  <path d="M440,270 L440,285 L530,285 L530,270" stroke="#c44" stroke-width="1.2" fill="none"/>
  <text x="485" y="300" font-size="8.5" fill="#c44" text-anchor="middle">Rework = tau/2 (avg)</text>

  <!-- Bracket for checkpoint interval -->
  <path d="M220,165 L220,150 L400,150 L400,165" stroke="#4a90c4" stroke-width="1.2" fill="none"/>
  <text x="310" y="143" font-size="9" fill="#4a90c4" text-anchor="middle">tau (checkpoint interval)</text>

  <!-- ===== Legend ===== -->
  <rect x="100" y="340" width="15" height="15" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="122" y="352" font-size="9" fill="#555">Productive Training</text>

  <rect x="260" y="340" width="15" height="15" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="282" y="352" font-size="9" fill="#555">Checkpoint Write</text>

  <rect x="420" y="340" width="15" height="15" fill="url(#hatch)" stroke="#c44" stroke-width="1"/>
  <text x="442" y="352" font-size="9" fill="#555">Lost Work</text>

  <rect x="560" y="340" width="15" height="15" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="582" y="352" font-size="9" fill="#555">Recovery Phase</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Total failure cost = Lost Work + Recovery Latency. Frequent checkpoints reduce lost work but increase I/O overhead.</text>
</svg>
