<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Circuit Breaker: Preventing Cascade Failures</text>

  <!-- ===== Closed State (green) ===== -->
  <circle cx="180" cy="220" r="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="180" y="212" font-size="12" font-weight="700" fill="#333" text-anchor="middle">CLOSED</text>
  <text x="180" y="230" font-size="9" fill="#555" text-anchor="middle">Normal Flow</text>
  <text x="180" y="246" font-size="8" fill="#3d9e5a" text-anchor="middle">Requests pass through</text>

  <!-- ===== Open State (red) ===== -->
  <circle cx="720" cy="220" r="70" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="720" y="212" font-size="12" font-weight="700" fill="#333" text-anchor="middle">OPEN</text>
  <text x="720" y="230" font-size="9" fill="#555" text-anchor="middle">Fail Fast</text>
  <text x="720" y="246" font-size="8" fill="#c44" text-anchor="middle">All requests rejected</text>

  <!-- ===== Half-Open State (orange) ===== -->
  <circle cx="450" cy="400" r="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="450" y="388" font-size="12" font-weight="700" fill="#333" text-anchor="middle">HALF-</text>
  <text x="450" y="405" font-size="12" font-weight="700" fill="#333" text-anchor="middle">OPEN</text>
  <text x="450" y="425" font-size="9" fill="#555" text-anchor="middle">Probe Recovery</text>
  <text x="450" y="441" font-size="8" fill="#c87b2a" text-anchor="middle">Limited test requests</text>

  <!-- ===== Arrows ===== -->
  <!-- Closed -> Open (error threshold exceeded) -->
  <path d="M250,200 C350,130 530,130 650,200" stroke="#c44" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <rect x="370" y="120" width="170" height="28" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="455" y="139" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Errors exceed threshold</text>

  <!-- Open -> Half-Open (timeout expires) -->
  <path d="M700,290 C680,340 560,380 520,395" stroke="#c87b2a" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <rect x="580" y="330" width="130" height="28" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="645" y="349" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Timeout expires</text>

  <!-- Half-Open -> Closed (probe succeeds) -->
  <path d="M380,395 C300,380 230,320 195,290" stroke="#3d9e5a" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  <rect x="230" y="330" width="130" height="28" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="295" y="349" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Probe succeeds</text>

  <!-- Half-Open -> Open (probe fails) -->
  <path d="M520,390 C560,380 670,340 710,290" stroke="#c44" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="640" y="375" font-size="8" fill="#c44" font-weight="700">Probe fails</text>

  <!-- ===== Key Insight Box ===== -->
  <rect x="90" y="65" width="200" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="190" y="83" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Key Protection:</text>
  <text x="190" y="98" font-size="8" fill="#555" text-anchor="middle">Prevents one failing service</text>
  <text x="190" y="110" font-size="8" fill="#555" text-anchor="middle">from exhausting entire fleet</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Circuit breaker pattern prevents cascade failures by failing fast when dependencies are unhealthy.</text>
</svg>
