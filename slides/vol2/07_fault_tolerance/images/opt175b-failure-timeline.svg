<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">OPT-175B: 2 Months of Training Through Failure (992 A100 GPUs)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="120" x2="820" y2="120" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="110" font-size="8" fill="#555" text-anchor="middle">Week 1</text>
  <text x="225" y="110" font-size="8" fill="#555" text-anchor="middle">Week 2</text>
  <text x="370" y="110" font-size="8" fill="#555" text-anchor="middle">Week 3</text>
  <text x="515" y="110" font-size="8" fill="#555" text-anchor="middle">Week 4</text>
  <text x="660" y="110" font-size="8" fill="#555" text-anchor="middle">Week 5-6</text>
  <text x="800" y="110" font-size="8" fill="#555" text-anchor="middle">Week 7-8</text>

  <!-- Week markers -->
  <line x1="80" y1="115" x2="80" y2="125" stroke="#333" stroke-width="1.5"/>
  <line x1="225" y1="115" x2="225" y2="125" stroke="#333" stroke-width="1.5"/>
  <line x1="370" y1="115" x2="370" y2="125" stroke="#333" stroke-width="1.5"/>
  <line x1="515" y1="115" x2="515" y2="125" stroke="#333" stroke-width="1.5"/>
  <line x1="660" y1="115" x2="660" y2="125" stroke="#333" stroke-width="1.5"/>
  <line x1="800" y1="115" x2="800" y2="125" stroke="#333" stroke-width="1.5"/>

  <!-- Failure events (red dots) -->
  <circle cx="100" cy="120" r="5" fill="#c44"/>
  <circle cx="130" cy="120" r="5" fill="#c44"/>
  <circle cx="155" cy="120" r="5" fill="#c44"/>
  <circle cx="200" cy="120" r="4" fill="#c87b2a"/>
  <circle cx="250" cy="120" r="5" fill="#c44"/>
  <circle cx="290" cy="120" r="4" fill="#c87b2a"/>
  <circle cx="310" cy="120" r="5" fill="#c44"/>
  <circle cx="380" cy="120" r="5" fill="#c44"/>
  <circle cx="400" cy="120" r="4" fill="#c87b2a"/>
  <circle cx="430" cy="120" r="5" fill="#c44"/>
  <circle cx="460" cy="120" r="5" fill="#c44"/>
  <circle cx="490" cy="120" r="4" fill="#c87b2a"/>
  <circle cx="530" cy="120" r="5" fill="#c44"/>
  <circle cx="560" cy="120" r="5" fill="#c44"/>
  <circle cx="600" cy="120" r="5" fill="#c44"/>
  <circle cx="640" cy="120" r="4" fill="#c87b2a"/>

  <!-- Legend -->
  <circle cx="100" cy="55" r="5" fill="#c44"/>
  <text x="115" y="59" font-size="8.5" fill="#555">Hardware failure / NCCL timeout</text>
  <circle cx="300" cy="55" r="4" fill="#c87b2a"/>
  <text x="315" y="59" font-size="8.5" fill="#555">Loss spike / manual intervention</text>

  <!-- Annotations -->
  <line x1="100" y1="125" x2="100" y2="155" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="100" y="168" font-size="7.5" fill="#c44" text-anchor="middle">3 GPU failures</text>

  <line x1="250" y1="125" x2="250" y2="155" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="250" y="168" font-size="7.5" fill="#c44" text-anchor="middle">NaN from bit flip</text>

  <line x1="380" y1="125" x2="380" y2="155" stroke="#c44" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="380" y="168" font-size="7.5" fill="#c44" text-anchor="middle">8h network outage</text>

  <line x1="490" y1="125" x2="490" y2="155" stroke="#c87b2a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="490" y="168" font-size="7.5" fill="#c87b2a" text-anchor="middle">Manual LR fix</text>

  <!-- Stats boxes -->
  <rect x="50" y="195" width="250" height="120" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="175" y="218" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Failure Summary</text>
  <text x="70" y="240" font-size="9" fill="#555">GPU hardware failures: 35+</text>
  <text x="70" y="258" font-size="9" fill="#555">Loss spikes / NaN: 20+</text>
  <text x="70" y="276" font-size="9" fill="#555">NCCL timeouts: 15+</text>
  <text x="70" y="294" font-size="9" font-weight="700" fill="#c44">Mean time between failures: ~3 hours</text>

  <rect x="330" y="195" width="250" height="120" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="455" y="218" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Human Cost</text>
  <text x="350" y="240" font-size="9" fill="#555">Manual interventions: 112</text>
  <text x="350" y="258" font-size="9" fill="#555">24/7 on-call engineers required</text>
  <text x="350" y="276" font-size="9" fill="#555">Mean recovery: 15-60 min</text>
  <text x="350" y="294" font-size="9" font-weight="700" fill="#c87b2a">Longest outage: 8 hours</text>

  <rect x="610" y="195" width="250" height="120" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="735" y="218" font-size="10" font-weight="700" fill="#333" text-anchor="middle">What Worked</text>
  <text x="630" y="240" font-size="9" fill="#555">Async checkpoint: 12% to 3%</text>
  <text x="630" y="258" font-size="9" fill="#555">5-min heartbeat detection</text>
  <text x="630" y="276" font-size="9" fill="#555">Last-good-checkpoint rollback</text>
  <text x="630" y="294" font-size="9" font-weight="700" fill="#3d9e5a">Sustained >50% MFU</text>

  <!-- Key takeaway -->
  <rect x="50" y="340" width="810" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="455" y="363" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Lesson: Large-scale training is not a fire-and-forget job</text>
  <text x="455" y="382" font-size="9" fill="#555" text-anchor="middle">OPT-175B required constant human supervision. Llama 3 (16K GPUs) added automated anomaly detection, reducing interventions from 112 to ~30.</text>

  <text x="450" y="425" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Data from Zhang et al., "OPT: Open Pre-trained Transformers," 2022</text>
</svg>
