<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Reliability Gap: Cluster MTBF vs Training Duration</text>

  <!-- ===== Axes ===== -->
  <line x1="100" y1="420" x2="850" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="420" x2="100" y2="50" stroke="#555" stroke-width="1.5"/>

  <!-- X-axis label -->
  <text x="475" y="460" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Cluster Size (GPUs)</text>
  <!-- Y-axis label -->
  <text x="30" y="235" font-size="11" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,30,235)">Cluster MTBF (hours)</text>

  <!-- X-axis ticks -->
  <text x="160" y="440" font-size="9" fill="#555" text-anchor="middle">8</text>
  <text x="310" y="440" font-size="9" fill="#555" text-anchor="middle">100</text>
  <text x="460" y="440" font-size="9" fill="#555" text-anchor="middle">1,000</text>
  <text x="610" y="440" font-size="9" fill="#555" text-anchor="middle">10,000</text>
  <text x="760" y="440" font-size="9" fill="#555" text-anchor="middle">100,000</text>

  <!-- Y-axis ticks (log scale) -->
  <text x="90" y="393" font-size="9" fill="#555" text-anchor="end">1 hr</text>
  <text x="90" y="323" font-size="9" fill="#555" text-anchor="end">10 hrs</text>
  <text x="90" y="253" font-size="9" fill="#555" text-anchor="end">100 hrs</text>
  <text x="90" y="183" font-size="9" fill="#555" text-anchor="end">1,000 hrs</text>
  <text x="90" y="113" font-size="9" fill="#555" text-anchor="end">10,000 hrs</text>

  <!-- Grid lines -->
  <line x1="100" y1="390" x2="850" y2="390" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="320" x2="850" y2="320" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="250" x2="850" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="180" x2="850" y2="180" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="110" x2="850" y2="110" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- ===== MTBF Curve (MTBF = 100,000/N) ===== -->
  <path d="M160,85 L260,155 L360,225 L460,295 L560,365 L660,400 L760,410"
        stroke="#c44" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="160" cy="85" r="4" fill="#c44"/>
  <circle cx="310" cy="180" r="4" fill="#c44"/>
  <circle cx="460" cy="250" r="4" fill="#c44"/>
  <circle cx="610" cy="320" r="4" fill="#c44"/>
  <circle cx="760" cy="390" r="4" fill="#c44"/>

  <!-- ===== Training Duration Reference Lines ===== -->
  <!-- 3 months = 2160 hrs -->
  <line x1="100" y1="145" x2="850" y2="145" stroke="#3d9e5a" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="855" y="145" font-size="8.5" fill="#3d9e5a" font-weight="700" text-anchor="start">3 months</text>

  <!-- 1 week = 168 hrs -->
  <line x1="100" y1="230" x2="850" y2="230" stroke="#4a90c4" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="855" y="230" font-size="8.5" fill="#4a90c4" font-weight="700" text-anchor="start">1 week</text>

  <!-- 1 day = 24 hrs -->
  <line x1="100" y1="340" x2="850" y2="340" stroke="#c87b2a" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="855" y="340" font-size="8.5" fill="#c87b2a" font-weight="700" text-anchor="start">1 day</text>

  <!-- ===== Danger Zone Shading ===== -->
  <rect x="520" y="230" width="330" height="190" fill="#f9d6d5" opacity="0.3" rx="4"/>
  <text x="685" y="280" font-size="9.5" font-weight="700" fill="#c44" text-anchor="middle">DANGER ZONE</text>
  <text x="685" y="295" font-size="8" fill="#c44" text-anchor="middle">MTBF &lt; Training Duration</text>

  <!-- ===== Key annotation ===== -->
  <rect x="520" y="355" width="180" height="45" fill="#fff" stroke="#c44" stroke-width="1.2" rx="4"/>
  <text x="610" y="372" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">10,000 GPUs:</text>
  <text x="610" y="388" font-size="8.5" fill="#555" text-anchor="middle">Failure every ~5 hours</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Assumes per-GPU MTBF = 100,000 hours (server-grade). System MTBF = MTBF_component / N.</text>
</svg>
