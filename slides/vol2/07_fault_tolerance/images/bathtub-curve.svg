<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Bathtub Curve: Failure Rate Over System Lifetime</text>

  <!-- Axes -->
  <line x1="80" y1="350" x2="820" y2="350" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="80" y2="60" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="390" font-size="10" font-weight="700" fill="#333" text-anchor="middle">System Lifetime</text>
  <text x="35" y="205" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,35,205)">Failure Rate</text>

  <!-- Bathtub curve path -->
  <path d="M100,100 C120,120 140,200 180,280 C220,320 300,340 450,340 C600,340 680,320 720,280 C760,200 780,120 800,100"
        fill="none" stroke="#a31f34" stroke-width="2.5"/>

  <!-- Shaded regions -->
  <!-- Infant mortality -->
  <rect x="100" y="60" width="130" height="290" fill="#f9d6d5" opacity="0.3"/>
  <text x="165" y="80" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Infant Mortality</text>
  <text x="165" y="96" font-size="8" fill="#555" text-anchor="middle">0-48 hours</text>

  <!-- Useful life -->
  <rect x="230" y="60" width="390" height="290" fill="#d4edda" opacity="0.3"/>
  <text x="425" y="80" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Useful Life (Random Failures)</text>
  <text x="425" y="96" font-size="8" fill="#555" text-anchor="middle">Days to months</text>

  <!-- Wear-out -->
  <rect x="620" y="60" width="180" height="290" fill="#fdebd0" opacity="0.3"/>
  <text x="710" y="80" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Wear-Out</text>
  <text x="710" y="96" font-size="8" fill="#555" text-anchor="middle">Months to years</text>

  <!-- Cause labels -->
  <text x="165" y="280" font-size="7.5" fill="#555" text-anchor="middle">Config errors</text>
  <text x="165" y="293" font-size="7.5" fill="#555" text-anchor="middle">Driver bugs</text>
  <text x="165" y="306" font-size="7.5" fill="#555" text-anchor="middle">Version mismatches</text>

  <text x="425" y="310" font-size="7.5" fill="#555" text-anchor="middle">Cosmic rays, random HW failures</text>
  <text x="425" y="323" font-size="7.5" fill="#555" text-anchor="middle">Constant low rate = MTBF/N</text>

  <text x="710" y="280" font-size="7.5" fill="#555" text-anchor="middle">Memory leaks</text>
  <text x="710" y="293" font-size="7.5" fill="#555" text-anchor="middle">Thermal degradation</text>
  <text x="710" y="306" font-size="7.5" fill="#555" text-anchor="middle">Log accumulation</text>

  <!-- Software vs Hardware breakdown -->
  <rect x="100" y="410" width="350" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="275" y="430" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Software + Config: 50-70% of all failures</text>
  <text x="275" y="450" font-size="8.5" fill="#555" text-anchor="middle">Bugs (30-40%) + Config errors (20-30%)</text>
  <text x="275" y="463" font-size="8.5" fill="#555" text-anchor="middle">Dominate infant mortality phase</text>

  <rect x="480" y="410" width="320" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="640" y="430" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Hardware + Network: 25-40%</text>
  <text x="640" y="450" font-size="8.5" fill="#555" text-anchor="middle">Hardware (15-25%) + Network (10-15%)</text>
  <text x="640" y="463" font-size="8.5" fill="#555" text-anchor="middle">Dominate useful life and wear-out</text>

  <text x="450" y="492" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Most ML training runs experience infant mortality failures -- they rarely run long enough for wear-out</text>
</svg>
