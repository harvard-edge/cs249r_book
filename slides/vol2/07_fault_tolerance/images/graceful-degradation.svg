<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Graceful Degradation: Model Fallback Hierarchy</text>

  <!-- ===== Incoming Requests ===== -->
  <rect x="50" y="200" width="100" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="225" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Requests</text>

  <line x1="150" y1="220" x2="200" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Health Monitor Diamond ===== -->
  <polygon points="260,195 310,220 260,245 210,220" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="260" y="223" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Health?</text>

  <!-- ===== Level 1: Primary Model (green) ===== -->
  <line x1="310" y1="220" x2="380" y2="130" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="165" font-size="8" fill="#3d9e5a" font-weight="700">Healthy</text>

  <rect x="380" y="80" width="200" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="480" y="103" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Primary Model</text>
  <text x="480" y="118" font-size="8.5" fill="#555" text-anchor="middle">ViT-Large (307M params)</text>
  <text x="480" y="133" font-size="8.5" fill="#555" text-anchor="middle">88% accuracy | Full GPU</text>
  <rect x="535" y="138" width="40" height="12" fill="#3d9e5a"/>
  <text x="555" y="148" font-size="7" fill="#fff" font-weight="700" text-anchor="middle">100%</text>

  <!-- ===== Level 2: Secondary Model (orange) ===== -->
  <line x1="310" y1="220" x2="380" y2="220" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="210" font-size="8" fill="#c87b2a" font-weight="700">Degraded</text>

  <rect x="380" y="185" width="200" height="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="480" y="208" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Secondary Model</text>
  <text x="480" y="223" font-size="8.5" fill="#555" text-anchor="middle">EfficientNet-B4 (19M params)</text>
  <text x="480" y="238" font-size="8.5" fill="#555" text-anchor="middle">83% accuracy | CPU</text>
  <rect x="535" y="243" width="40" height="12" fill="#c87b2a"/>
  <text x="555" y="253" font-size="7" fill="#fff" font-weight="700" text-anchor="middle">94%</text>

  <!-- ===== Level 3: Lightweight Model (red) ===== -->
  <line x1="310" y1="220" x2="380" y2="315" stroke="#c44" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="275" font-size="8" fill="#c44" font-weight="700">Failing</text>

  <rect x="380" y="290" width="200" height="70" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="480" y="313" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Fallback / Cache</text>
  <text x="480" y="328" font-size="8.5" fill="#555" text-anchor="middle">Pre-computed popular items</text>
  <text x="480" y="343" font-size="8.5" fill="#555" text-anchor="middle">No inference required</text>
  <rect x="535" y="348" width="40" height="12" fill="#c44"/>
  <text x="555" y="358" font-size="7" fill="#fff" font-weight="700" text-anchor="middle">75%</text>

  <!-- ===== Right side: quality labels ===== -->
  <line x1="580" y1="115" x2="640" y2="115" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="580" y1="220" x2="640" y2="220" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="580" y1="325" x2="640" y2="325" stroke="#555" stroke-width="0.8" marker-end="url(#arr)"/>

  <rect x="640" y="95" width="180" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="730" y="115" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Full Quality</text>
  <text x="730" y="128" font-size="8" fill="#555" text-anchor="middle">Personalized, real-time</text>

  <rect x="640" y="200" width="180" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="730" y="220" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Reduced Quality</text>
  <text x="730" y="233" font-size="8" fill="#555" text-anchor="middle">Generic, simpler model</text>

  <rect x="640" y="305" width="180" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="730" y="325" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Minimal Quality</text>
  <text x="730" y="338" font-size="8" fill="#555" text-anchor="middle">Cached, static results</text>

  <!-- ===== Key insight box ===== -->
  <rect x="110" y="400" width="680" height="45" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="420" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Key Insight: 75% quality at 100% availability beats 100% quality at 0% availability</text>
  <text x="450" y="436" font-size="8.5" fill="#555" text-anchor="middle">War story: e-commerce fallback to "Top-N popular items" lost only 2% revenue during 3-hour outage</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each fallback level must be pre-engineered, pre-loaded, and validated against reduced SLOs.</text>
</svg>
