<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Elastic Training: Dynamic Worker Recovery</text>

  <!-- ===== Static Training (left - red) ===== -->
  <text x="225" y="65" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Static Training</text>

  <!-- N GPUs box -->
  <rect x="60" y="80" width="130" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="125" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training on N GPUs</text>

  <!-- Arrow down -->
  <line x1="125" y1="120" x2="125" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Failure -->
  <rect x="60" y="155" width="130" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="125" y="177" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">GPU Failure!</text>

  <!-- Arrow down -->
  <line x1="125" y1="190" x2="125" y2="220" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- ABORT -->
  <rect x="60" y="225" width="130" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="125" y="247" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">JOB ABORTED</text>

  <!-- Arrow down -->
  <line x1="125" y1="260" x2="125" y2="290" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Restart -->
  <rect x="60" y="295" width="130" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="125" y="315" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Full Restart</text>
  <text x="125" y="332" font-size="8" fill="#555" text-anchor="middle">Reload + Warmup</text>

  <!-- Divider -->
  <line x1="280" y1="60" x2="280" y2="440" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Elastic Training (right - green) ===== -->
  <text x="575" y="65" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Elastic Training</text>

  <!-- N GPUs box -->
  <rect x="370" y="80" width="130" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="435" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training on N GPUs</text>

  <!-- Arrow down -->
  <line x1="435" y1="120" x2="435" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Failure detection -->
  <rect x="370" y="155" width="130" height="35" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="435" y="177" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Detect Failure</text>

  <!-- Arrow down -->
  <line x1="435" y1="190" x2="435" y2="220" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pause -->
  <rect x="370" y="225" width="130" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="435" y="247" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Pause + Rescale</text>

  <!-- Arrow down -->
  <line x1="435" y1="260" x2="435" y2="290" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Resume on N-1 -->
  <rect x="370" y="295" width="130" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="435" y="313" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Resume on N-1</text>
  <text x="435" y="328" font-size="8" fill="#555" text-anchor="middle">GPUs</text>

  <!-- ===== Annotations on right side ===== -->
  <rect x="540" y="155" width="200" height="30" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="640" y="175" font-size="8.5" fill="#555" text-anchor="middle">Heartbeat timeout: &lt; 5 min</text>
  <line x1="500" y1="172" x2="540" y2="172" stroke="#c87b2a" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="540" y="225" width="200" height="30" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="640" y="245" font-size="8.5" fill="#555" text-anchor="middle">Redistribute shards + adjust LR</text>
  <line x1="500" y1="242" x2="540" y2="242" stroke="#4a90c4" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="540" y="295" width="200" height="30" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="640" y="315" font-size="8.5" fill="#555" text-anchor="middle">Throughput reduced, not zero</text>
  <line x1="500" y1="315" x2="540" y2="315" stroke="#3d9e5a" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- ===== Comparison Box ===== -->
  <rect x="80" y="380" width="740" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="240" y="403" font-size="9.5" font-weight="700" fill="#c44" text-anchor="middle">Static: Full restart, minutes-hours lost</text>
  <text x="580" y="403" font-size="9.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Elastic: Brief pause, training continues</text>
  <text x="450" y="425" font-size="9" fill="#555" text-anchor="middle">Elastic training converts hard failures into temporary throughput degradation</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Elastic training requires: batch size adjustment, learning rate scaling, and state resharding.</text>
</svg>
