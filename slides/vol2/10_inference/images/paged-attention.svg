<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">PagedAttention: Virtual Memory for KV Cache</text>

  <!-- Divider -->
  <line x1="450" y1="45" x2="450" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Pre-allocated (Problem) ===== -->
  <text x="225" y="55" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Pre-allocated (Wasteful)</text>

  <!-- GPU Memory block -->
  <rect x="40" y="70" width="370" height="340" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="90" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU HBM (80 GB)</text>

  <!-- Req A: allocated max, used partial -->
  <rect x="55" y="105" width="340" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="75" y="125" font-size="9" font-weight="700" fill="#333">Request A (max 4096 tokens)</text>
  <!-- Used portion -->
  <rect x="60" y="135" width="120" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="120" y="148" font-size="7.5" fill="#333" text-anchor="middle">Used: 50 tokens</text>
  <!-- Wasted -->
  <rect x="185" y="135" width="200" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="285" y="148" font-size="7.5" fill="#999" text-anchor="middle">Wasted: 4046 tokens (99%)</text>

  <!-- Req B -->
  <rect x="55" y="170" width="340" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="75" y="190" font-size="9" font-weight="700" fill="#333">Request B (max 4096 tokens)</text>
  <rect x="60" y="200" width="230" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="175" y="213" font-size="7.5" fill="#333" text-anchor="middle">Used: 2000 tokens</text>
  <rect x="295" y="200" width="90" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="340" y="213" font-size="7.5" fill="#999" text-anchor="middle">Wasted</text>

  <!-- Req C -->
  <rect x="55" y="235" width="340" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="75" y="255" font-size="9" font-weight="700" fill="#333">Request C (max 4096 tokens)</text>
  <rect x="60" y="265" width="60" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="90" y="278" font-size="7.5" fill="#333" text-anchor="middle">10 tok</text>
  <rect x="125" y="265" width="260" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="255" y="278" font-size="7.5" fill="#999" text-anchor="middle">Wasted: 4086 tokens (99.8%)</text>

  <!-- No room indicator -->
  <rect x="55" y="300" width="340" height="40" fill="#fff" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="225" y="325" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">No room for Request D (OOM!)</text>

  <!-- Waste summary -->
  <rect x="80" y="355" width="290" height="35" fill="#a31f34"/>
  <text x="225" y="377" font-size="9.5" font-weight="700" fill="#fff" text-anchor="middle">60-80% memory wasted to fragmentation</text>

  <!-- ===== RIGHT: PagedAttention (Solution) ===== -->
  <text x="675" y="55" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">PagedAttention (Efficient)</text>

  <!-- GPU Memory block -->
  <rect x="490" y="70" width="370" height="340" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="675" y="90" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU HBM (80 GB)</text>

  <!-- Block table concept -->
  <text x="530" y="110" font-size="9" font-weight="700" fill="#555">Physical Blocks (pages):</text>

  <!-- Page grid -->
  <rect x="505" y="120" width="50" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="530" y="139" font-size="7" fill="#333" text-anchor="middle">A:1</text>
  <rect x="560" y="120" width="50" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="585" y="139" font-size="7" fill="#333" text-anchor="middle">B:1</text>
  <rect x="615" y="120" width="50" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="640" y="139" font-size="7" fill="#333" text-anchor="middle">C:1</text>
  <rect x="670" y="120" width="50" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="695" y="139" font-size="7" fill="#333" text-anchor="middle">B:2</text>
  <rect x="725" y="120" width="50" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="750" y="139" font-size="7" fill="#333" text-anchor="middle">D:1</text>
  <rect x="780" y="120" width="50" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="805" y="139" font-size="7" fill="#333" text-anchor="middle">B:3</text>

  <rect x="505" y="155" width="50" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="530" y="174" font-size="7" fill="#333" text-anchor="middle">D:2</text>
  <rect x="560" y="155" width="50" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="585" y="174" font-size="7" fill="#333" text-anchor="middle">B:4</text>
  <rect x="615" y="155" width="50" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="640" y="174" font-size="7" fill="#333" text-anchor="middle">D:3</text>
  <rect x="670" y="155" width="50" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="695" y="174" font-size="7" fill="#333" text-anchor="middle">A:2</text>
  <rect x="725" y="155" width="50" height="30" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="750" y="174" font-size="7" fill="#555" text-anchor="middle">Free</text>
  <rect x="780" y="155" width="50" height="30" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="805" y="174" font-size="7" fill="#555" text-anchor="middle">Free</text>

  <!-- Block table -->
  <text x="530" y="210" font-size="9" font-weight="700" fill="#555">Block Table (virtual to physical):</text>

  <rect x="505" y="220" width="100" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="555" y="235" font-size="8" fill="#333" text-anchor="middle">Req A: [0, 9]</text>

  <rect x="615" y="220" width="120" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="675" y="235" font-size="8" fill="#333" text-anchor="middle">Req B: [1, 3, 5, 7]</text>

  <rect x="745" y="220" width="100" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="795" y="235" font-size="8" fill="#333" text-anchor="middle">Req C: [2]</text>

  <rect x="505" y="250" width="120" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="565" y="265" font-size="8" fill="#333" text-anchor="middle">Req D: [4, 6, 8]</text>

  <!-- Benefits -->
  <rect x="505" y="290" width="340" height="75" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="310" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">Benefits of Paged Allocation</text>
  <text x="675" y="328" font-size="8.5" fill="#555" text-anchor="middle">No internal fragmentation (allocate on demand)</text>
  <text x="675" y="343" font-size="8.5" fill="#555" text-anchor="middle">No external fragmentation (pages are uniform)</text>
  <text x="675" y="358" font-size="8.5" fill="#3d9e5a" text-anchor="middle">2-4x more concurrent requests on same hardware</text>

  <!-- All 4 requests fit -->
  <rect x="530" y="375" width="290" height="25" fill="#3d9e5a"/>
  <text x="675" y="392" font-size="9.5" font-weight="700" fill="#fff" text-anchor="middle">All 4 requests fit (near-100% utilization)</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">PagedAttention applies OS virtual memory principles to KV cache management (vLLM, 2023)</text>
</svg>
