<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Fundamental Inversion: Training vs Inference</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Left: Training -->
  <text x="225" y="65" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">Distributed Training</text>

  <rect x="60" y="85" width="330" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Primary Metric</text>
  <text x="225" y="120" font-size="9" fill="#555" text-anchor="middle">Throughput (samples/hour)</text>

  <rect x="60" y="140" width="330" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="160" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Variance Tolerance</text>
  <text x="225" y="175" font-size="9" fill="#555" text-anchor="middle">Hours acceptable</text>

  <rect x="60" y="195" width="330" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="215" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Batch Formation</text>
  <text x="225" y="230" font-size="9" fill="#555" text-anchor="middle">Large, controlled batches</text>

  <rect x="60" y="250" width="330" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="270" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Failure Recovery</text>
  <text x="225" y="285" font-size="9" fill="#555" text-anchor="middle">Restart from checkpoint</text>

  <rect x="60" y="305" width="330" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="225" y="325" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Cost Structure</text>
  <text x="225" y="340" font-size="9" fill="#555" text-anchor="middle">Fixed duration, variable rate</text>

  <!-- Right: Inference -->
  <text x="675" y="65" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Distributed Inference</text>

  <rect x="510" y="85" width="330" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="675" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Primary Metric</text>
  <text x="675" y="120" font-size="9" fill="#555" text-anchor="middle">Latency (P99 ms)</text>

  <rect x="510" y="140" width="330" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="675" y="160" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Variance Tolerance</text>
  <text x="675" y="175" font-size="9" fill="#555" text-anchor="middle">Milliseconds only</text>

  <rect x="510" y="195" width="330" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="675" y="215" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Batch Formation</text>
  <text x="675" y="230" font-size="9" fill="#555" text-anchor="middle">Request-driven, variable</text>

  <rect x="510" y="250" width="330" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="675" y="270" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Failure Recovery</text>
  <text x="675" y="285" font-size="9" fill="#555" text-anchor="middle">Redirect without user impact</text>

  <rect x="510" y="305" width="330" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="675" y="325" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Cost Structure</text>
  <text x="675" y="340" font-size="9" fill="#555" text-anchor="middle">Variable duration, fixed SLO</text>

  <!-- Bottom insight -->
  <rect x="200" y="370" width="500" height="40" fill="#a31f34"/>
  <text x="450" y="395" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Training tolerates hours of variance; Inference fails at milliseconds</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">The optimization target inverts from throughput to tail latency</text>
</svg>
