<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The KV Cache Wall: Memory Exhaustion in LLM Serving</text>

  <!-- Axes -->
  <line x1="100" y1="410" x2="800" y2="410" stroke="#bbb" stroke-width="1.5"/>
  <line x1="100" y1="410" x2="100" y2="60" stroke="#bbb" stroke-width="1.5"/>

  <!-- Y-axis -->
  <text x="40" y="235" font-size="10" fill="#555" text-anchor="middle" transform="rotate(-90 40 235)">GPU Memory (GB)</text>
  <text x="90" y="410" font-size="8.5" fill="#555" text-anchor="end">0</text>
  <text x="90" y="340" font-size="8.5" fill="#555" text-anchor="end">20</text>
  <text x="90" y="270" font-size="8.5" fill="#555" text-anchor="end">40</text>
  <text x="90" y="200" font-size="8.5" fill="#555" text-anchor="end">60</text>
  <text x="90" y="130" font-size="8.5" fill="#555" text-anchor="end">80</text>

  <!-- X-axis -->
  <text x="450" y="450" font-size="10" fill="#555" text-anchor="middle">Sequence Length (tokens)</text>
  <text x="100" y="430" font-size="8.5" fill="#555" text-anchor="middle">0</text>
  <text x="275" y="430" font-size="8.5" fill="#555" text-anchor="middle">32K</text>
  <text x="450" y="430" font-size="8.5" fill="#555" text-anchor="middle">64K</text>
  <text x="625" y="430" font-size="8.5" fill="#555" text-anchor="middle">96K</text>
  <text x="800" y="430" font-size="8.5" fill="#555" text-anchor="middle">128K</text>

  <!-- Grid -->
  <line x1="100" y1="340" x2="800" y2="340" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="100" y1="270" x2="800" y2="270" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="100" y1="200" x2="800" y2="200" stroke="#f7f7f7" stroke-width="0.5"/>

  <!-- 80 GB HBM capacity line -->
  <line x1="100" y1="130" x2="800" y2="130" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="810" y="133" font-size="9" font-weight="700" fill="#a31f34">80 GB HBM3</text>

  <!-- Weights (static) -->
  <rect x="100" y="287" width="700" height="123" fill="#cfe2f3" opacity="0.6"/>
  <line x1="100" y1="287" x2="800" y2="287" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="365" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Model Weights: 35 GB (INT4 quantized 70B)</text>

  <!-- KV cache lines for different batch sizes -->
  <!-- Batch 1: starts at 287 (35GB), grows slowly -->
  <line x1="100" y1="287" x2="800" y2="252" stroke="#3d9e5a" stroke-width="2"/>
  <text x="810" y="255" font-size="8.5" fill="#3d9e5a">B=1</text>

  <!-- Batch 4: grows faster -->
  <line x1="100" y1="287" x2="800" y2="147" stroke="#c87b2a" stroke-width="2"/>
  <text x="810" y="150" font-size="8.5" fill="#c87b2a">B=4</text>

  <!-- Batch 8: hits wall fast -->
  <line x1="100" y1="287" x2="475" y2="130" stroke="#c44" stroke-width="2.5"/>
  <!-- OOM zone -->
  <line x1="475" y1="130" x2="800" y2="60" stroke="#c44" stroke-width="2.5" stroke-dasharray="4,2"/>
  <text x="810" y="63" font-size="8.5" font-weight="700" fill="#c44">B=8 (OOM)</text>

  <!-- OOM zone shading -->
  <rect x="475" y="60" width="325" height="70" fill="#f9d6d5" opacity="0.3"/>
  <text x="637" y="100" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">OUT OF MEMORY</text>

  <!-- Annotation: B=8 hits wall at ~48K -->
  <circle cx="475" cy="130" r="5" fill="#a31f34"/>
  <line x1="475" y1="130" x2="475" y2="165" stroke="#a31f34" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="475" y="180" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">B=8 hits wall at ~48K tokens</text>

  <!-- KV cache formula -->
  <rect x="120" y="65" width="300" height="35" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="270" y="82" font-size="9" fill="#333" text-anchor="middle">KV size = 2 x L x H x S x B x P</text>
  <text x="270" y="94" font-size="8" fill="#555" text-anchor="middle">(layers x heads x seq_len x batch x precision)</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">KV cache grows linearly with batch size and sequence length, often exceeding model weight memory</text>
</svg>
