<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Three Lighthouse Archetypes at Scale</text>

  <!-- ===== Archetype A: GPT-4 / Llama-3 ===== -->
  <rect x="30" y="55" width="270" height="370" fill="#f7f7f7" stroke="#4a90c4" stroke-width="2"/>

  <!-- Header pill -->
  <rect x="60" y="65" width="210" height="28" fill="#a31f34"/>
  <text x="165" y="84" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Archetype A</text>

  <text x="165" y="115" font-size="11" font-weight="700" fill="#333" text-anchor="middle">GPT-4 / Llama-3</text>
  <text x="165" y="133" font-size="9" fill="#555" text-anchor="middle">Large Language Models</text>

  <rect x="50" y="148" width="230" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="165" y="167" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Dominant C³: Communication</text>
  <text x="165" y="185" font-size="8" fill="#555" text-anchor="middle">Gradient sync &gt; arithmetic time</text>
  <text x="165" y="200" font-size="8" fill="#555" text-anchor="middle">at 25,000 GPU scale</text>

  <text x="165" y="228" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fleet Challenge:</text>
  <text x="165" y="246" font-size="8" fill="#555" text-anchor="middle">Partition 100T+ parameters</text>
  <text x="165" y="261" font-size="8" fill="#555" text-anchor="middle">across 25K GPUs using</text>
  <text x="165" y="276" font-size="8" fill="#555" text-anchor="middle">3D Parallelism (DP + TP + PP)</text>

  <rect x="50" y="295" width="230" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="165" y="315" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Constraint: Throughput-Bound</text>
  <text x="165" y="333" font-size="8" fill="#555" text-anchor="middle">ExaFLOPS sustained compute</text>

  <text x="165" y="365" font-size="8" fill="#555" text-anchor="middle">Training: 100 days, ~$100M</text>
  <text x="165" y="382" font-size="8" fill="#555" text-anchor="middle">Serving: memory BW per token</text>

  <!-- ===== Archetype B: DLRM ===== -->
  <rect x="315" y="55" width="270" height="370" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="2"/>

  <rect x="345" y="65" width="210" height="28" fill="#a31f34"/>
  <text x="450" y="84" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Archetype B</text>

  <text x="450" y="115" font-size="11" font-weight="700" fill="#333" text-anchor="middle">DLRM at Scale</text>
  <text x="450" y="133" font-size="9" fill="#555" text-anchor="middle">Recommendation Systems</text>

  <rect x="335" y="148" width="230" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="167" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Dominant C³: Coordination</text>
  <text x="450" y="185" font-size="8" fill="#555" text-anchor="middle">O(N²) all-to-all contention</text>
  <text x="450" y="200" font-size="8" fill="#555" text-anchor="middle">between embedding shards</text>

  <text x="450" y="228" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fleet Challenge:</text>
  <text x="450" y="246" font-size="8" fill="#555" text-anchor="middle">Shard 10 TB+ embedding</text>
  <text x="450" y="261" font-size="8" fill="#555" text-anchor="middle">tables across hundreds of</text>
  <text x="450" y="276" font-size="8" fill="#555" text-anchor="middle">nodes at M QPS, &lt;100ms p99</text>

  <rect x="335" y="295" width="230" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="315" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Constraint: Volume &amp; Latency</text>
  <text x="450" y="333" font-size="8" fill="#555" text-anchor="middle">Sparse embeddings, not dense ops</text>

  <text x="450" y="365" font-size="8" fill="#555" text-anchor="middle">Billions of user/item features</text>
  <text x="450" y="382" font-size="8" fill="#555" text-anchor="middle">Real-time serving requirement</text>

  <!-- ===== Archetype C: Federated MobileNet ===== -->
  <rect x="600" y="55" width="270" height="370" fill="#f7f7f7" stroke="#c87b2a" stroke-width="2"/>

  <rect x="630" y="65" width="210" height="28" fill="#a31f34"/>
  <text x="735" y="84" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Archetype C</text>

  <text x="735" y="115" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Federated MobileNet</text>
  <text x="735" y="133" font-size="9" fill="#555" text-anchor="middle">Edge / On-Device Learning</text>

  <rect x="620" y="148" width="230" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="735" y="167" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Dominant C³: Coordination</text>
  <text x="735" y="185" font-size="8" fill="#555" text-anchor="middle">Async aggregation across</text>
  <text x="735" y="200" font-size="8" fill="#555" text-anchor="middle">millions of unreliable devices</text>

  <text x="735" y="228" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fleet Challenge:</text>
  <text x="735" y="246" font-size="8" fill="#555" text-anchor="middle">Federated Averaging across</text>
  <text x="735" y="261" font-size="8" fill="#555" text-anchor="middle">M+ heterogeneous devices;</text>
  <text x="735" y="276" font-size="8" fill="#555" text-anchor="middle">data never leaves device</text>

  <rect x="620" y="295" width="230" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="735" y="315" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Constraint: Power &amp; Privacy</text>
  <text x="735" y="333" font-size="8" fill="#555" text-anchor="middle">Milliwatts, non-IID data, DP</text>

  <text x="735" y="365" font-size="8" fill="#555" text-anchor="middle">Smartphones, IoT, wearables</text>
  <text x="735" y="382" font-size="8" fill="#555" text-anchor="middle">Intermittent connectivity</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each archetype stresses a different corner of the C³ taxonomy — tracked through every chapter</text>
</svg>
