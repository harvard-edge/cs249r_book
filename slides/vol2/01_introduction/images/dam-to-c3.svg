<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">From D·A·M (The Workload) to C³ (The Execution Tax)</text>

  <!-- ===== Left: D·A·M (Nouns) ===== -->
  <text x="200" y="65" font-size="11" font-weight="700" fill="#333" text-anchor="middle">D·A·M Taxonomy (Vol I)</text>
  <text x="200" y="82" font-size="9" fill="#555" text-anchor="middle">The Nouns — what we have</text>

  <!-- Data -->
  <rect x="80" y="110" width="240" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="200" y="135" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Data (D)</text>
  <text x="200" y="155" font-size="9" fill="#555" text-anchor="middle">Volume, quality, distribution</text>

  <!-- Algorithm -->
  <rect x="80" y="185" width="240" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="200" y="210" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Algorithm (A)</text>
  <text x="200" y="230" font-size="9" fill="#555" text-anchor="middle">Operations, architecture</text>

  <!-- Machine -->
  <rect x="80" y="260" width="240" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="285" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Machine (M)</text>
  <text x="200" y="305" font-size="9" fill="#555" text-anchor="middle">Hardware throughput, capacity</text>

  <!-- ===== Right: C³ (Verbs) ===== -->
  <text x="700" y="65" font-size="11" font-weight="700" fill="#333" text-anchor="middle">C³ Taxonomy (Vol II)</text>
  <text x="700" y="82" font-size="9" fill="#555" text-anchor="middle">The Verbs — the tax we pay</text>

  <!-- Computation -->
  <rect x="580" y="110" width="240" height="55" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="700" y="135" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Computation (C₁)</text>
  <text x="700" y="155" font-size="9" fill="#555" text-anchor="middle">Local math on accelerators</text>

  <!-- Communication -->
  <rect x="580" y="185" width="240" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="700" y="210" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Communication (C₂)</text>
  <text x="700" y="230" font-size="9" fill="#555" text-anchor="middle">Data across the network</text>

  <!-- Coordination -->
  <rect x="580" y="260" width="240" height="55" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="700" y="285" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Coordination (C₃)</text>
  <text x="700" y="305" font-size="9" fill="#555" text-anchor="middle">Synchronization logic</text>

  <!-- ===== Projection arrows ===== -->
  <!-- Algorithm → Communication -->
  <line x1="320" y1="210" x2="578" y2="210" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="450" y="200" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">Stretch across nodes →</text>
  <text x="450" y="215" font-size="8" fill="#a31f34" text-anchor="middle">creates AllReduce</text>

  <!-- Data → Coordination -->
  <line x1="320" y1="140" x2="450" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="140" x2="450" y2="280" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="280" x2="578" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="385" y="225" font-size="8" fill="#555" text-anchor="middle" transform="rotate(-90,385,225)">Stretch data →</text>
  <text x="520" y="273" font-size="8" fill="#555" text-anchor="middle">checkpointing</text>

  <!-- Machine failure → Coordination -->
  <line x1="320" y1="290" x2="578" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="303" font-size="8" fill="#555" text-anchor="middle">Machine fails → fault tolerance</text>

  <!-- Bottom insight -->
  <rect x="130" y="360" width="640" height="70" rx="6" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="387" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">The Projection: Stretching Nouns across machines creates Verbs</text>
  <text x="450" y="410" font-size="9" fill="#555" text-anchor="middle">Vol I optimizes D·A·M on one node. Vol II pays the C³ tax to project D·A·M onto a fleet.</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">We do not solve D·A·M or C³ in isolation — we solve their cross-products</text>
</svg>
