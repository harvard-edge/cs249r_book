<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow-both-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
    <marker id="arrow-both-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-both-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The C³ Taxonomy: Three Irreducible Dimensions of Fleet Execution</text>

  <!-- ===== Triangle vertices ===== -->

  <!-- Computation (top) -->
  <rect x="360" y="55" width="180" height="65" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="450" y="78" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Computation (C₁)</text>
  <text x="450" y="96" font-size="9" fill="#555" text-anchor="middle">The Math — TFLOPS, AI</text>
  <text x="450" y="112" font-size="8" fill="#555" text-anchor="middle">Forward/Backward passes</text>

  <!-- Communication (bottom-left) -->
  <rect x="70" y="340" width="200" height="65" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="170" y="363" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Communication (C₂)</text>
  <text x="170" y="381" font-size="9" fill="#555" text-anchor="middle">The Wire — Bisection BW</text>
  <text x="170" y="397" font-size="8" fill="#555" text-anchor="middle">Gradient sync, activation xfer</text>

  <!-- Coordination (bottom-right) -->
  <rect x="630" y="340" width="200" height="65" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="730" y="363" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Coordination (C₃)</text>
  <text x="730" y="381" font-size="9" fill="#555" text-anchor="middle">The Logic — Barriers, FT</text>
  <text x="730" y="397" font-size="8" fill="#555" text-anchor="middle">AllReduce, fault recovery</text>

  <!-- ===== Edges with trade-off labels ===== -->

  <!-- Compute ↔ Communication -->
  <line x1="380" y1="120" x2="220" y2="340" stroke="#4a90c4" stroke-width="2"/>
  <rect x="220" y="200" width="120" height="35" rx="4" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="280" y="215" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Bandwidth</text>
  <text x="280" y="228" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Bound</text>

  <!-- Communication ↔ Coordination -->
  <line x1="270" y1="372" x2="630" y2="372" stroke="#3d9e5a" stroke-width="2"/>
  <rect x="385" y="425" width="130" height="35" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <text x="450" y="440" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Synchronization</text>
  <text x="450" y="453" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Cost</text>

  <!-- Coordination ↔ Compute -->
  <line x1="680" y1="340" x2="520" y2="120" stroke="#c87b2a" stroke-width="2"/>
  <rect x="540" y="200" width="120" height="35" rx="4" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="600" y="215" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Pipeline</text>
  <text x="600" y="228" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Bubbles</text>

  <!-- Center: Conservation of Overhead -->
  <circle cx="450" cy="280" r="55" fill="none" stroke="#a31f34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="450" y="275" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Conservation</text>
  <text x="450" y="291" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">of Overhead</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Overhead cannot be eliminated, only redistributed among the three C's</text>
</svg>
