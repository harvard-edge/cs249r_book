<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Fleet Law: Decomposing Distributed Training Time</text>

  <!-- Stacked bar showing time decomposition -->
  <!-- Full bar background -->
  <rect x="80" y="70" width="740" height="80" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- T_Compute (blue) -->
  <rect x="80" y="70" width="350" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="255" y="105" font-size="12" font-weight="700" fill="#333" text-anchor="middle">T_Compute</text>
  <text x="255" y="125" font-size="9" fill="#555" text-anchor="middle">Forward + Backward passes</text>
  <text x="255" y="142" font-size="9" fill="#4a90c4" text-anchor="middle">47%</text>

  <!-- T_Communication (green) -->
  <rect x="430" y="70" width="260" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="560" y="105" font-size="12" font-weight="700" fill="#333" text-anchor="middle">T_Communication</text>
  <text x="560" y="125" font-size="9" fill="#555" text-anchor="middle">Gradient sync, AllReduce</text>
  <text x="560" y="142" font-size="9" fill="#3d9e5a" text-anchor="middle">38%</text>

  <!-- T_Coordination (orange) -->
  <rect x="690" y="70" width="130" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="755" y="105" font-size="11" font-weight="700" fill="#333" text-anchor="middle">T_Coord</text>
  <text x="755" y="125" font-size="9" fill="#555" text-anchor="middle">Barriers</text>
  <text x="755" y="142" font-size="9" fill="#c87b2a" text-anchor="middle">15%</text>

  <!-- T_step bracket -->
  <line x1="80" y1="165" x2="820" y2="165" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="155" x2="80" y2="165" stroke="#333" stroke-width="1.5"/>
  <line x1="820" y1="155" x2="820" y2="165" stroke="#333" stroke-width="1.5"/>
  <text x="450" y="185" font-size="11" font-weight="700" fill="#333" text-anchor="middle">T_step = T_Compute + T_Communication + T_Coordination</text>

  <!-- Efficiency equation -->
  <rect x="200" y="210" width="500" height="55" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="235" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">η_fleet = T_Compute / T_step</text>
  <text x="450" y="255" font-size="9" fill="#555" text-anchor="middle">When η_fleet &lt; 0.5, more than half the silicon sits idle</text>

  <!-- Three diagnosis cards -->
  <!-- Compute-bound (good) -->
  <rect x="60" y="290" width="240" height="90" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="315" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Compute-Dominated</text>
  <text x="180" y="335" font-size="9" fill="#555" text-anchor="middle">T_Compute &gt;&gt; T_Comm + T_Coord</text>
  <text x="180" y="355" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fleet is doing its job</text>
  <text x="180" y="372" font-size="8" fill="#555" text-anchor="middle">η_fleet &gt; 0.7</text>

  <!-- Comm-bound (fix network) -->
  <rect x="330" y="290" width="240" height="90" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="315" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Communication-Dominated</text>
  <text x="450" y="335" font-size="9" fill="#555" text-anchor="middle">T_Comm &gt;&gt; T_Compute</text>
  <text x="450" y="355" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Upgrade interconnect / overlap</text>
  <text x="450" y="372" font-size="8" fill="#555" text-anchor="middle">η_fleet &lt; 0.5</text>

  <!-- Coord-bound (fix sync) -->
  <rect x="600" y="290" width="240" height="90" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="720" y="315" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Coordination-Dominated</text>
  <text x="720" y="335" font-size="9" fill="#555" text-anchor="middle">T_Coord &gt;&gt; T_Compute</text>
  <text x="720" y="355" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Reduce barriers / go async</text>
  <text x="720" y="372" font-size="8" fill="#555" text-anchor="middle">η_fleet &lt; 0.3</text>

  <!-- Example bar: GPT-3 on IB -->
  <text x="450" y="415" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Example: GPT-3 on InfiniBand (200 Gbps)</text>
  <rect x="120" y="425" width="300" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <rect x="420" y="425" width="240" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <rect x="660" y="425" width="60" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="270" y="442" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Compute: ~50%</text>
  <text x="540" y="442" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Comm: ~40%</text>
  <text x="690" y="442" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">~10%</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Diagnostic instrument: identify which C dominates, then optimize that dimension</text>
</svg>
