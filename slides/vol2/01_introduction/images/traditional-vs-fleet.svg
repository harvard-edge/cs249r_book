<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c44"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Independent Tasks (MapReduce) vs. Synchronous Tight Coupling (ML Fleet)</text>

  <!-- Divider -->
  <line x1="450" y1="45" x2="450" y2="460" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== LEFT: MapReduce ===== -->
  <text x="225" y="65" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">MapReduce / Traditional</text>

  <!-- Workers -->
  <rect x="60" y="100" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="110" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Worker 1</text>
  <text x="110" y="138" font-size="8" fill="#555" text-anchor="middle">Partition A</text>

  <rect x="60" y="170" width="100" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="110" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Worker 2</text>
  <text x="110" y="208" font-size="8" fill="#555" text-anchor="middle">Partition B</text>

  <rect x="60" y="240" width="100" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="110" y="260" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Worker 3</text>
  <text x="110" y="278" font-size="8" fill="#c87b2a" text-anchor="middle">STRAGGLER</text>

  <!-- Shared storage -->
  <rect x="270" y="140" width="120" height="80" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="330" y="175" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Shared</text>
  <text x="330" y="192" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Storage</text>

  <!-- Arrows: independent writes -->
  <line x1="160" y1="125" x2="268" y2="165" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="195" x2="268" y2="180" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="265" x2="268" y2="200" stroke="#c87b2a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Left annotation -->
  <rect x="60" y="330" width="360" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="240" y="352" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Straggler delays only its own partition</text>
  <text x="240" y="370" font-size="8.5" fill="#555" text-anchor="middle">Workers 1 and 2 finish independently</text>

  <!-- ===== RIGHT: ML Fleet ===== -->
  <text x="675" y="65" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">ML Fleet (Synchronous Training)</text>

  <!-- Workers -->
  <rect x="500" y="100" width="100" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="550" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>
  <text x="550" y="138" font-size="8" fill="#555" text-anchor="middle">Forward + Backward</text>

  <rect x="500" y="170" width="100" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="550" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>
  <text x="550" y="208" font-size="8" fill="#555" text-anchor="middle">Forward + Backward</text>

  <rect x="500" y="240" width="100" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="550" y="260" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">GPU 3</text>
  <text x="550" y="278" font-size="8" fill="#c44" text-anchor="middle">STRAGGLER</text>

  <!-- AllReduce barrier -->
  <rect x="700" y="100" width="120" height="190" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="760" y="180" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">AllReduce</text>
  <text x="760" y="198" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Barrier</text>
  <text x="760" y="220" font-size="8" fill="#555" text-anchor="middle">ALL must wait</text>

  <!-- Arrows: all must converge -->
  <line x1="600" y1="125" x2="698" y2="165" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="600" y1="195" x2="698" y2="195" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="600" y1="265" x2="698" y2="240" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- Right annotation -->
  <rect x="480" y="330" width="370" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="665" y="352" font-size="9" font-weight="700" fill="#333" text-anchor="middle">10% straggler slows entire cluster by 10%</text>
  <text x="665" y="370" font-size="8.5" fill="#555" text-anchor="middle">Barrier synchronization: ALL workers must finish before ANY proceed</text>

  <!-- Bottom labels -->
  <rect x="60" y="405" width="360" height="30" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1"/>
  <text x="240" y="425" font-size="9" font-weight="700" fill="#2d7a2d" text-anchor="middle">Fault-tolerant by design: independent partitions</text>

  <rect x="480" y="405" width="370" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="665" y="425" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Failure-sensitive: one node can stall the fleet</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">ML Fleet workloads require fundamentally different architecture than MapReduce-style systems</text>
</svg>
