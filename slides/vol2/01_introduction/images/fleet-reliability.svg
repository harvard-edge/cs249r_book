<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Reliability Collapse: Fleet Availability vs. Fleet Size</text>

  <!-- Y-axis -->
  <line x1="100" y1="50" x2="100" y2="410" stroke="#bbb" stroke-width="1.5"/>
  <text x="45" y="230" font-size="10" fill="#555" text-anchor="middle" transform="rotate(-90,45,230)">Fleet Availability (%)</text>
  <text x="90" y="62" font-size="8" fill="#555" text-anchor="end">100%</text>
  <text x="90" y="152" font-size="8" fill="#555" text-anchor="end">75%</text>
  <text x="90" y="242" font-size="8" fill="#555" text-anchor="end">50%</text>
  <text x="90" y="332" font-size="8" fill="#555" text-anchor="end">25%</text>
  <text x="90" y="412" font-size="8" fill="#555" text-anchor="end">0%</text>

  <!-- X-axis -->
  <line x1="100" y1="410" x2="840" y2="410" stroke="#bbb" stroke-width="1.5"/>
  <text x="470" y="455" font-size="10" fill="#555" text-anchor="middle">Fleet Size (Number of GPUs)</text>
  <text x="100" y="430" font-size="8" fill="#555" text-anchor="middle">1</text>
  <text x="285" y="430" font-size="8" fill="#555" text-anchor="middle">100</text>
  <text x="470" y="430" font-size="8" fill="#555" text-anchor="middle">1,000</text>
  <text x="655" y="430" font-size="8" fill="#555" text-anchor="middle">5,000</text>
  <text x="840" y="430" font-size="8" fill="#555" text-anchor="middle">10,000</text>

  <!-- Grid lines -->
  <line x1="100" y1="150" x2="840" y2="150" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="100" y1="240" x2="840" y2="240" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="100" y1="330" x2="840" y2="330" stroke="#e8e8e8" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- 99.9% curve (blue) - drops fast -->
  <path d="M100,58 C150,60 200,65 250,80 C300,120 350,200 400,280 C430,330 460,370 500,395 C540,405 600,408 840,410"
        fill="none" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="180" y="75" font-size="9" font-weight="700" fill="#4a90c4">99.9% per-node</text>

  <!-- 99.99% curve (green) - drops slower -->
  <path d="M100,58 C200,58 300,60 400,65 C500,80 550,120 600,200 C650,280 700,340 750,380 C800,400 830,408 840,410"
        fill="none" stroke="#3d9e5a" stroke-width="2.5"/>
  <text x="350" y="58" font-size="9" font-weight="700" fill="#3d9e5a">99.99% per-node</text>

  <!-- Annotation: 1,000 GPUs mark -->
  <line x1="470" y1="50" x2="470" y2="410" stroke="#c44" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="415" y="290" width="110" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="470" y="305" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">1K GPUs:</text>
  <text x="470" y="318" font-size="8" fill="#c44" text-anchor="middle">Only 36.8% healthy</text>

  <!-- Annotation: 10,000 GPUs mark -->
  <line x1="840" y1="50" x2="840" y2="410" stroke="#c44" stroke-width="0.8" stroke-dasharray="4,2"/>
  <rect x="700" y="365" width="120" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="380" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">10K GPUs:</text>
  <text x="760" y="393" font-size="8" fill="#c44" text-anchor="middle">~0.005% healthy</text>

  <!-- Key insight pill -->
  <rect x="570" y="110" width="230" height="45" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="685" y="128" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">P_fleet = (P_node)^N</text>
  <text x="685" y="145" font-size="8" fill="#555" text-anchor="middle">Exponential collapse at scale</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Failure is the common case — engineer for resilience, not prevention</text>
</svg>
