<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Iron Law of Scale (Law of Distributed Efficiency)</text>

  <!-- Main equation -->
  <rect x="100" y="55" width="700" height="65" fill="#f7f7f7" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="85" font-size="16" font-weight="700" fill="#333" text-anchor="middle">T_step(N) = T_compute / N  +  T_comm(N)  −  T_overlap</text>
  <text x="450" y="110" font-size="9" fill="#555" text-anchor="middle">Time per distributed training step as a function of fleet size N</text>

  <!-- Three terms explained -->
  <!-- Term 1: Parallel compute -->
  <rect x="50" y="145" width="260" height="120" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="170" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">T_compute / N</text>
  <text x="180" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Ideal Parallel Scaling</text>
  <text x="180" y="210" font-size="8.5" fill="#555" text-anchor="middle">As N grows, work per device</text>
  <text x="180" y="226" font-size="8.5" fill="#555" text-anchor="middle">shrinks linearly.</text>
  <text x="180" y="252" font-size="8" fill="#4a90c4" text-anchor="middle">The math we want to do</text>

  <!-- Term 2: Communication -->
  <rect x="320" y="145" width="260" height="120" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="170" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">T_comm(N)</text>
  <text x="450" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">The Coordination Tax</text>
  <text x="450" y="210" font-size="8.5" fill="#555" text-anchor="middle">Grows or stays constant as N grows.</text>
  <text x="450" y="226" font-size="8.5" fill="#555" text-anchor="middle">Threatens to dominate step time.</text>
  <text x="450" y="252" font-size="8" fill="#3d9e5a" text-anchor="middle">The price of distribution</text>

  <!-- Term 3: Overlap -->
  <rect x="590" y="145" width="260" height="120" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="720" y="170" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">−T_overlap</text>
  <text x="720" y="190" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Communication Hiding</text>
  <text x="720" y="210" font-size="8.5" fill="#555" text-anchor="middle">Overlap comm with next-layer</text>
  <text x="720" y="226" font-size="8.5" fill="#555" text-anchor="middle">compute to hide the tax.</text>
  <text x="720" y="252" font-size="8" fill="#c87b2a" text-anchor="middle">The engineering opportunity</text>

  <!-- Worked example box -->
  <rect x="50" y="290" width="800" height="130" fill="#f7f7f7" stroke="#333" stroke-width="1"/>
  <text x="450" y="315" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Worked Example: GPT-3 on 1,000 GPUs</text>

  <!-- IB vs Ethernet comparison -->
  <rect x="70" y="328" width="360" height="75" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="250" y="350" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">InfiniBand (200 Gbps)</text>
  <text x="250" y="370" font-size="9" fill="#555" text-anchor="middle">Sync ~700 GB gradients (FP16 Ring AllReduce)</text>
  <text x="250" y="390" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Scaling Efficiency: ~81%</text>

  <rect x="470" y="328" width="360" height="75" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="650" y="350" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">100G Ethernet</text>
  <text x="650" y="370" font-size="9" fill="#555" text-anchor="middle">Same gradients, lower bandwidth</text>
  <text x="650" y="390" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Scaling Efficiency: ~46%</text>

  <!-- Amdahl annotation -->
  <rect x="200" y="435" width="500" height="35" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="450" y="455" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Amdahl's Pitfall: If 20% of time is comm, no speedup beyond 5× regardless of GPU count</text>

  <!-- Bottom footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">The network determines whether adding GPUs helps or wastes money</text>
</svg>
