<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Fleet Stack: From Silicon to Society</text>

  <!-- ===== Four Layers (bottom to top) ===== -->

  <!-- Layer 1: Infrastructure (bottom) -->
  <rect x="120" y="370" width="460" height="70" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="350" y="398" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Part I: The Fleet (Infrastructure)</text>
  <text x="350" y="418" font-size="9" fill="#555" text-anchor="middle">Compute, Network Fabrics, Scalable Data Storage</text>
  <text x="350" y="434" font-size="8" fill="#4a90c4" text-anchor="middle">Impediment: Physical Limits — no single server can train a frontier model</text>

  <!-- Layer 2: Distribution -->
  <rect x="120" y="280" width="460" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="350" y="308" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Part II: Distributed ML</text>
  <text x="350" y="328" font-size="9" fill="#555" text-anchor="middle">Training, Communication, Fault Tolerance, Orchestration</text>
  <text x="350" y="344" font-size="8" fill="#3d9e5a" text-anchor="middle">Impediment: Coordination Tax — sync bottlenecks and failures</text>

  <!-- Layer 3: Serving -->
  <rect x="120" y="190" width="460" height="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="2"/>
  <text x="350" y="218" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Part III: Deployment at Scale</text>
  <text x="350" y="238" font-size="9" fill="#555" text-anchor="middle">Inference, Performance, Edge Intelligence, Operations</text>
  <text x="350" y="254" font-size="8" fill="#c87b2a" text-anchor="middle">Impediment: Operational Economics — inference cost dwarfs training</text>

  <!-- Layer 4: Governance (top) -->
  <rect x="120" y="100" width="460" height="70" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="350" y="128" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Part IV: The Responsible Fleet</text>
  <text x="350" y="148" font-size="9" fill="#555" text-anchor="middle">Security, Robustness, Sustainability, Governance</text>
  <text x="350" y="164" font-size="8" fill="#c44" text-anchor="middle">Impediment: Societal Impact — technical bugs become societal hazards</text>

  <!-- Constraint arrows (upward) -->
  <line x1="580" y1="370" x2="580" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="605" y="275" font-size="9" fill="#555" transform="rotate(-90,605,275)">Constraints flow upward</text>

  <!-- Right-side annotations -->
  <rect x="640" y="370" width="210" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="745" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Hardware Twins</text>
  <text x="745" y="415" font-size="8" fill="#555" text-anchor="middle">H100, B200, TPU v4</text>

  <rect x="640" y="280" width="210" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="745" y="305" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fleet Law</text>
  <text x="745" y="325" font-size="8" fill="#555" text-anchor="middle">T = T_Comp + T_Comm + T_Coord</text>

  <rect x="640" y="190" width="210" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="745" y="215" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Lighthouse Workloads</text>
  <text x="745" y="235" font-size="8" fill="#555" text-anchor="middle">GPT-4, DLRM, Fed. MobileNet</text>

  <rect x="640" y="100" width="210" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="745" y="125" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Control Plane</text>
  <text x="745" y="145" font-size="8" fill="#555" text-anchor="middle">Responsible AI as Invariant</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Engineering decisions at the bottom constrain possibilities at the top</text>
</svg>
