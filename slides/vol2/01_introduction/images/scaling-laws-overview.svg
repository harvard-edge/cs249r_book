<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">AI Scaling Laws: Performance Follows Power-Law Relationships</text>

  <!-- ===== Left panel: The power law curve ===== -->
  <rect x="30" y="50" width="400" height="380" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <!-- Axes -->
  <line x1="80" y1="400" x2="400" y2="400" stroke="#bbb" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="80" y2="400" stroke="#bbb" stroke-width="1.5"/>
  <text x="240" y="435" font-size="9" fill="#555" text-anchor="middle">Compute / Data / Parameters (log scale)</text>
  <text x="42" y="240" font-size="9" fill="#555" text-anchor="middle" transform="rotate(-90,42,240)">Loss (log scale)</text>

  <!-- Power law curve -->
  <path d="M90,100 C120,120 160,180 200,240 C240,290 280,330 340,360 C370,375 400,385 410,390"
        fill="none" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Diminishing returns annotation -->
  <line x1="90" y1="100" x2="200" y2="100" stroke="#c44" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="310" y1="350" x2="410" y2="350" stroke="#c44" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- Region labels -->
  <rect x="100" y="105" width="80" height="22" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="140" y="120" font-size="7.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">High Return</text>

  <rect x="290" y="335" width="100" height="22" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="340" y="350" font-size="7.5" font-weight="700" fill="#c44" text-anchor="middle">Diminishing</text>

  <!-- Equation -->
  <text x="230" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L(X) = A·X^(−α) + B</text>

  <!-- ===== Right panel: Three scaling dimensions ===== -->
  <text x="670" y="65" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Three Scaling Dimensions</text>

  <!-- Parameters -->
  <rect x="480" y="90" width="380" height="75" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="670" y="113" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Parameters (N)</text>
  <text x="670" y="133" font-size="8.5" fill="#555" text-anchor="middle">Model capacity: 117M (GPT-1) → 175B (GPT-3) → ~1T (GPT-4)</text>
  <text x="670" y="153" font-size="8" fill="#555" text-anchor="middle">Each 10× increase ≈ step-function improvement in capability</text>

  <!-- Data -->
  <rect x="480" y="180" width="380" height="75" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="670" y="203" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Data (D)</text>
  <text x="670" y="223" font-size="8.5" fill="#555" text-anchor="middle">Dataset size: Chinchilla optimality D ∝ N^0.74</text>
  <text x="670" y="243" font-size="8" fill="#555" text-anchor="middle">Must grow proportionally — imbalance → overfitting</text>

  <!-- Compute -->
  <rect x="480" y="270" width="380" height="75" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="670" y="293" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Compute (C)</text>
  <text x="670" y="313" font-size="8.5" fill="#555" text-anchor="middle">Total FLOPs: 10¹⁸ (AlexNet) → 10²⁵ (GPT-4)</text>
  <text x="670" y="333" font-size="8" fill="#555" text-anchor="middle">10× performance gain often requires 100–1000× more compute</text>

  <!-- Key insight box -->
  <rect x="480" y="370" width="380" height="60" rx="6" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="670" y="393" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">The Bitter Lesson (Sutton, 2019)</text>
  <text x="670" y="413" font-size="8.5" fill="#555" text-anchor="middle">General methods that leverage computation ultimately</text>
  <text x="670" y="428" font-size="8.5" fill="#555" text-anchor="middle">outperform methods that encode human expertise</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Scaling laws are diagnostic: they predict what resources a target capability level requires</text>
</svg>
