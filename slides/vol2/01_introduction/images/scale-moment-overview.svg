<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Training Compute Evolution: From 2 GPUs to 25,000 GPUs in One Decade</text>

  <!-- Timeline axis -->
  <line x1="60" y1="420" x2="860" y2="420" stroke="#bbb" stroke-width="1.5"/>

  <!-- Year labels -->
  <text x="100" y="445" font-size="9" fill="#555" text-anchor="middle">2012</text>
  <text x="250" y="445" font-size="9" fill="#555" text-anchor="middle">2018</text>
  <text x="400" y="445" font-size="9" fill="#555" text-anchor="middle">2020</text>
  <text x="580" y="445" font-size="9" fill="#555" text-anchor="middle">2022</text>
  <text x="760" y="445" font-size="9" fill="#555" text-anchor="middle">2023</text>

  <!-- Tick marks -->
  <line x1="100" y1="416" x2="100" y2="424" stroke="#bbb" stroke-width="1.5"/>
  <line x1="250" y1="416" x2="250" y2="424" stroke="#bbb" stroke-width="1.5"/>
  <line x1="400" y1="416" x2="400" y2="424" stroke="#bbb" stroke-width="1.5"/>
  <line x1="580" y1="416" x2="580" y2="424" stroke="#bbb" stroke-width="1.5"/>
  <line x1="760" y1="416" x2="760" y2="424" stroke="#bbb" stroke-width="1.5"/>

  <!-- AlexNet -->
  <rect x="60" y="340" width="80" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="363" font-size="10" font-weight="700" fill="#333" text-anchor="middle">AlexNet</text>
  <text x="100" y="378" font-size="8.5" fill="#555" text-anchor="middle">2 GPUs</text>
  <text x="100" y="393" font-size="8.5" fill="#555" text-anchor="middle">~10¹⁸ FLOPs</text>

  <!-- BERT -->
  <rect x="210" y="280" width="80" height="70" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="250" y="303" font-size="10" font-weight="700" fill="#333" text-anchor="middle">BERT</text>
  <text x="250" y="318" font-size="8.5" fill="#555" text-anchor="middle">64 TPUs</text>
  <text x="250" y="333" font-size="8.5" fill="#555" text-anchor="middle">~10²⁰ FLOPs</text>

  <!-- GPT-3 -->
  <rect x="360" y="200" width="80" height="70" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="400" y="223" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPT-3</text>
  <text x="400" y="238" font-size="8.5" fill="#555" text-anchor="middle">~1,000 GPUs</text>
  <text x="400" y="253" font-size="8.5" fill="#555" text-anchor="middle">~10²³ FLOPs</text>

  <!-- PaLM -->
  <rect x="540" y="140" width="80" height="70" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="580" y="163" font-size="10" font-weight="700" fill="#333" text-anchor="middle">PaLM</text>
  <text x="580" y="178" font-size="8.5" fill="#555" text-anchor="middle">6,144 TPUs</text>
  <text x="580" y="193" font-size="8.5" fill="#555" text-anchor="middle">~10²⁴ FLOPs</text>

  <!-- GPT-4 -->
  <rect x="720" y="60" width="80" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="760" y="83" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPT-4</text>
  <text x="760" y="98" font-size="8.5" fill="#555" text-anchor="middle">~25,000 GPUs</text>
  <text x="760" y="113" font-size="8.5" fill="#555" text-anchor="middle">~10²⁵ FLOPs</text>
  <text x="760" y="128" font-size="8" fill="#c44" text-anchor="middle">1 failure / 4h</text>

  <!-- Trend arrow -->
  <line x1="140" y1="375" x2="720" y2="100" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <!-- Growth annotation -->
  <rect x="340" y="55" width="160" height="30" rx="12" fill="#fff" stroke="#a31f34" stroke-width="1.2"/>
  <text x="420" y="75" font-size="9.5" font-weight="700" fill="#a31f34" text-anchor="middle">10⁷× compute in 10 years</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each generation demands exponentially larger fleets — the Scale Moment</text>
</svg>
