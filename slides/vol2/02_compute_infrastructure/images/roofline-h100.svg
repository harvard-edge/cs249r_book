<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Roofline Model: NVIDIA H100</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="100" y1="400" x2="850" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="400" x2="100" y2="50" stroke="#333" stroke-width="1.5"/>

  <!-- X-axis label -->
  <text x="475" y="440" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Arithmetic Intensity (FLOP/byte) — log scale</text>
  <!-- Y-axis label -->
  <text x="40" y="225" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90, 40, 225)">Performance (TFLOPS) — log</text>

  <!-- X-axis ticks -->
  <text x="140" y="418" font-size="8" fill="#555" text-anchor="middle">1</text>
  <text x="275" y="418" font-size="8" fill="#555" text-anchor="middle">10</text>
  <text x="410" y="418" font-size="8" fill="#555" text-anchor="middle">100</text>
  <text x="545" y="418" font-size="8" fill="#555" text-anchor="middle">591</text>
  <text x="680" y="418" font-size="8" fill="#555" text-anchor="middle">1000</text>
  <text x="815" y="418" font-size="8" fill="#555" text-anchor="middle">10000</text>

  <!-- Y-axis ticks -->
  <text x="85" y="370" font-size="8" fill="#555" text-anchor="end">1</text>
  <text x="85" y="290" font-size="8" fill="#555" text-anchor="end">10</text>
  <text x="85" y="210" font-size="8" fill="#555" text-anchor="end">100</text>
  <text x="85" y="130" font-size="8" fill="#555" text-anchor="end">1,979</text>

  <!-- Memory-bound region (blue shaded) -->
  <path d="M100,400 L100,400 L545,130 L545,400 Z" fill="#cfe2f3" fill-opacity="0.35"/>

  <!-- Compute-bound region (orange shaded) -->
  <path d="M545,400 L545,130 L850,130 L850,400 Z" fill="#fdebd0" fill-opacity="0.35"/>

  <!-- Roofline: diagonal (bandwidth slope) -->
  <line x1="100" y1="400" x2="545" y2="130" stroke="#333" stroke-width="3"/>

  <!-- Roofline: horizontal (compute ceiling) -->
  <line x1="545" y1="130" x2="850" y2="130" stroke="#333" stroke-width="3"/>

  <!-- Ridge point marker -->
  <line x1="545" y1="130" x2="545" y2="400" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="545" cy="130" r="6" fill="#a31f34" stroke="#fff" stroke-width="2"/>
  <text x="560" y="158" font-size="9" font-weight="700" fill="#a31f34">Ridge Point</text>
  <text x="560" y="172" font-size="8" fill="#555">~591 FLOP/byte</text>

  <!-- Region labels -->
  <text x="300" y="360" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Memory-Bound</text>
  <text x="300" y="376" font-size="8.5" fill="#555" text-anchor="middle">BW limits performance</text>
  <text x="700" y="360" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Compute-Bound</text>
  <text x="700" y="376" font-size="8.5" fill="#555" text-anchor="middle">FLOPS limits performance</text>

  <!-- Bandwidth slope label -->
  <text x="250" y="280" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle" transform="rotate(-38, 250, 280)">3.35 TB/s slope</text>

  <!-- Peak compute label -->
  <text x="750" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R_peak = 1,979 TFLOPS</text>

  <!-- Workload dots -->
  <!-- LLM Decode B=1 (I~1, deep memory-bound) -->
  <circle cx="140" cy="365" r="8" fill="#c44" stroke="#fff" stroke-width="2"/>
  <text x="160" y="358" font-size="8.5" font-weight="700" fill="#c44">LLM Decode</text>
  <text x="160" y="372" font-size="8" fill="#555">(B=1, I=1)</text>

  <!-- LLM Decode B=32 -->
  <circle cx="245" cy="310" r="7" fill="#c87b2a" stroke="#fff" stroke-width="2"/>
  <text x="195" y="300" font-size="8" font-weight="700" fill="#c87b2a">B=32</text>

  <!-- CNN Training -->
  <circle cx="420" cy="195" r="7" fill="#4a90c4" stroke="#fff" stroke-width="2"/>
  <text x="430" y="188" font-size="8.5" font-weight="700" fill="#4a90c4">CNN Train</text>

  <!-- LLM Training -->
  <circle cx="720" cy="135" r="8" fill="#3d9e5a" stroke="#fff" stroke-width="2"/>
  <text x="745" y="148" font-size="8.5" font-weight="700" fill="#3d9e5a">LLM Train</text>
  <text x="745" y="162" font-size="8" fill="#555">(I=2000)</text>

  <!-- Key insight -->
  <rect x="100" y="455" width="700" height="28" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="474" font-size="9" fill="#555" text-anchor="middle">LLM decode achieves &lt;1% of peak FLOPS. The same hardware that excels at training appears woefully underutilized during inference.</text>
</svg>
