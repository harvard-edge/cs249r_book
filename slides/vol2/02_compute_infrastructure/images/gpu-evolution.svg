<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">GPU Architecture Evolution: Bottleneck-Driven Design</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Timeline arrow -->
  <line x1="60" y1="80" x2="860" y2="80" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Year markers -->
  <line x1="130" y1="75" x2="130" y2="85" stroke="#555" stroke-width="1.5"/>
  <text x="130" y="70" font-size="9" font-weight="700" fill="#333" text-anchor="middle">2017</text>

  <line x1="330" y1="75" x2="330" y2="85" stroke="#555" stroke-width="1.5"/>
  <text x="330" y="70" font-size="9" font-weight="700" fill="#333" text-anchor="middle">2020</text>

  <line x1="530" y1="75" x2="530" y2="85" stroke="#555" stroke-width="1.5"/>
  <text x="530" y="70" font-size="9" font-weight="700" fill="#333" text-anchor="middle">2022</text>

  <line x1="730" y1="75" x2="730" y2="85" stroke="#555" stroke-width="1.5"/>
  <text x="730" y="70" font-size="9" font-weight="700" fill="#333" text-anchor="middle">2024</text>

  <!-- Volta V100 -->
  <rect x="60" y="100" width="190" height="135" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="155" y="120" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Volta (V100)</text>
  <rect x="100" y="126" width="110" height="14" rx="7" fill="#a31f34"/>
  <text x="155" y="136" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">125 TFLOPS FP16</text>
  <text x="155" y="158" font-size="8.5" fill="#555" text-anchor="middle">First Tensor Core</text>
  <text x="155" y="172" font-size="8.5" fill="#555" text-anchor="middle">NVLink: 300 GB/s</text>
  <text x="155" y="186" font-size="8.5" fill="#555" text-anchor="middle">TDP: 300 W</text>
  <rect x="75" y="198" width="160" height="18" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="155" y="210" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Solved: Compute bottleneck</text>

  <!-- Ampere A100 -->
  <rect x="260" y="100" width="190" height="135" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="355" y="120" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Ampere (A100)</text>
  <rect x="300" y="126" width="110" height="14" rx="7" fill="#a31f34"/>
  <text x="355" y="136" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">312 TFLOPS FP16</text>
  <text x="355" y="158" font-size="8.5" fill="#555" text-anchor="middle">Multi-precision, MIG</text>
  <text x="355" y="172" font-size="8.5" fill="#555" text-anchor="middle">NVLink: 600 GB/s</text>
  <text x="355" y="186" font-size="8.5" fill="#555" text-anchor="middle">TDP: 400 W</text>
  <rect x="275" y="198" width="160" height="18" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="355" y="210" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Solved: Precision bottleneck</text>

  <!-- Hopper H100 -->
  <rect x="460" y="100" width="190" height="135" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="555" y="120" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Hopper (H100)</text>
  <rect x="500" y="126" width="110" height="14" rx="7" fill="#a31f34"/>
  <text x="555" y="136" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">1,979 TF FP8</text>
  <text x="555" y="158" font-size="8.5" fill="#555" text-anchor="middle">Transformer Engine</text>
  <text x="555" y="172" font-size="8.5" fill="#555" text-anchor="middle">NVLink: 900 GB/s</text>
  <text x="555" y="186" font-size="8.5" fill="#555" text-anchor="middle">TDP: 700 W</text>
  <rect x="475" y="198" width="160" height="18" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="555" y="210" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Solved: FP8 for Transformers</text>

  <!-- Blackwell B200 -->
  <rect x="660" y="100" width="190" height="135" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="755" y="120" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Blackwell (B200)</text>
  <rect x="700" y="126" width="110" height="14" rx="7" fill="#a31f34"/>
  <text x="755" y="136" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">4,500 TF FP16</text>
  <text x="755" y="158" font-size="8.5" fill="#555" text-anchor="middle">Dual-die chiplet</text>
  <text x="755" y="172" font-size="8.5" fill="#555" text-anchor="middle">NVLink: 1,800 GB/s</text>
  <text x="755" y="186" font-size="8.5" fill="#555" text-anchor="middle">TDP: 1,000 W</text>
  <rect x="675" y="198" width="160" height="18" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="755" y="210" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Solving: Die size limit</text>

  <!-- Efficiency trend -->
  <rect x="60" y="260" width="790" height="80" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="280" font-size="10" font-weight="700" fill="#333" text-anchor="middle">The Efficiency Wall: Raw TFLOPS grew 236x, but TFLOPS/Watt grew only 70x</text>

  <!-- Bar representations -->
  <rect x="120" y="290" width="30" height="35" rx="2" fill="#4a90c4"/>
  <text x="135" y="335" font-size="7" fill="#555" text-anchor="middle">0.42</text>
  <text x="135" y="345" font-size="6" fill="#999" text-anchor="middle">TF/W</text>

  <rect x="320" y="285" width="30" height="40" rx="2" fill="#4a90c4"/>
  <text x="335" y="335" font-size="7" fill="#555" text-anchor="middle">0.78</text>

  <rect x="520" y="275" width="30" height="50" rx="2" fill="#4a90c4"/>
  <text x="535" y="335" font-size="7" fill="#555" text-anchor="middle">2.83</text>

  <rect x="720" y="262" width="30" height="63" rx="2" fill="#3d9e5a"/>
  <text x="735" y="335" font-size="7" fill="#555" text-anchor="middle">4.50</text>

  <!-- Key pattern -->
  <rect x="100" y="365" width="700" height="55" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="385" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Pattern: Each generation addresses the bottleneck exposed by the previous one.</text>
  <text x="450" y="403" font-size="9" fill="#555" text-anchor="middle">Hardware useful lifetime shrinking: V100 (3 yr) → A100 (2 yr) → H100 (~2 yr) → Blackwell</text>

  <!-- Bottom footnote -->
  <text x="450" y="455" font-size="9" fill="#999" font-style="italic" text-anchor="middle">GPU architects profile production ML workloads to identify the next bottleneck. The workload drives the silicon.</text>
</svg>
