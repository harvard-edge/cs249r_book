<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Bandwidth Hierarchy: Orders-of-Magnitude Staircase</text>

  <!-- Pyramid layers (bottom to top = slow to fast) -->
  <!-- Layer 5: Inter-Pod (widest, bottom) -->
  <polygon points="80,420 820,420 720,360 180,360" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="400" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Inter-Pod / Datacenter Fabric</text>
  <text x="450" y="414" font-size="8.5" fill="#555" text-anchor="middle">~12.5 GB/s (InfiniBand NDR) | ~5-10 us latency</text>

  <!-- Layer 4: Inter-Node -->
  <polygon points="180,360 720,360 640,300 260,300" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="338" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Inter-Node (InfiniBand NDR 400G)</text>
  <text x="450" y="352" font-size="8.5" fill="#555" text-anchor="middle">~50 GB/s | ~5 us latency</text>

  <!-- Layer 3: Intra-Node PCIe -->
  <polygon points="260,300 640,300 570,240 330,240" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="450" y="275" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Intra-Node (PCIe Gen5 x16)</text>
  <text x="450" y="289" font-size="8.5" fill="#555" text-anchor="middle">~64 GB/s | ~2 us latency</text>

  <!-- Layer 2: Intra-Node NVLink -->
  <polygon points="330,240 570,240 520,180 380,180" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="215" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Intra-Node (NVLink)</text>
  <text x="450" y="229" font-size="8.5" fill="#555" text-anchor="middle">~900 GB/s | ~1 us latency</text>

  <!-- Layer 1: HBM -->
  <polygon points="380,180 520,180 490,120 410,120" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="155" font-size="10" font-weight="700" fill="#333" text-anchor="middle">HBM</text>
  <text x="450" y="169" font-size="8.5" fill="#555" text-anchor="middle">~3,350 GB/s | &lt;100 ns</text>

  <!-- Top: Registers/SRAM -->
  <polygon points="410,120 490,120 470,75 430,75" fill="#cfe2f3" stroke="#4a90c4" stroke-width="2"/>
  <text x="450" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">SRAM</text>
  <text x="450" y="65" font-size="8" fill="#555" text-anchor="middle">~300 TB/s</text>

  <!-- Bandwidth cliff annotations -->
  <!-- NVLink to IB cliff -->
  <line x1="740" y1="270" x2="740" y2="340" stroke="#a31f34" stroke-width="2"/>
  <rect x="748" y="290" width="105" height="28" rx="12" fill="#a31f34"/>
  <text x="800" y="308" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">18x BW cliff</text>

  <!-- HBM to NVLink -->
  <line x1="540" y1="180" x2="600" y2="180" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="620" y="184" font-size="8" fill="#555">~3.7x</text>

  <!-- Key insight box -->
  <rect x="100" y="445" width="700" height="36" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="461" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Parallelism must respect these boundaries:</text>
  <text x="450" y="475" font-size="8.5" fill="#555" text-anchor="middle">Tensor Parallelism within node (NVLink) | Pipeline Parallelism across nodes (InfiniBand) | Data Parallelism across pods</text>
</svg>
