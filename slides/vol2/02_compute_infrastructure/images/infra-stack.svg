<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Infrastructure Stack: From Transistor to Datacenter</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Stack layers (bottom to top) -->
  <!-- Layer 1: Pod -->
  <rect x="100" y="370" width="700" height="65" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="170" y="395" font-size="12" font-weight="700" fill="#333">Pod</text>
  <text x="170" y="412" font-size="8.5" fill="#555">1000+ nodes</text>
  <text x="170" y="425" font-size="8" fill="#999">7-10 MW power</text>
  <text x="400" y="395" font-size="9" fill="#555">Network fabric, warehouse-scale cooling</text>
  <text x="400" y="410" font-size="9" fill="#555">InfiniBand NDR: ~50 GB/s per link</text>
  <rect x="650" y="380" width="130" height="18" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="715" y="392" font-size="7.5" font-weight="700" fill="#c44" text-anchor="middle">Communication Wall</text>

  <!-- Layer 2: Rack -->
  <rect x="140" y="290" width="620" height="65" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="210" y="315" font-size="12" font-weight="700" fill="#333">Rack</text>
  <text x="210" y="332" font-size="8.5" fill="#555">4 nodes / rack</text>
  <text x="210" y="345" font-size="8" fill="#999">33-40 kW</text>
  <text x="400" y="315" font-size="9" fill="#555">Power delivery, cooling, ToR switch</text>
  <text x="400" y="330" font-size="9" fill="#555">PUE 1.05-1.10 (liquid) vs 1.4-1.6 (air)</text>
  <rect x="620" y="300" width="120" height="18" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="680" y="312" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Power Wall</text>

  <!-- Layer 3: Node -->
  <rect x="180" y="210" width="540" height="65" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="250" y="235" font-size="12" font-weight="700" fill="#333">Node</text>
  <text x="250" y="252" font-size="8.5" fill="#555">8 GPUs</text>
  <text x="250" y="265" font-size="8" fill="#999">~7 kW</text>
  <text x="400" y="235" font-size="9" fill="#555">NVLink/NVSwitch: 900 GB/s per GPU</text>
  <text x="400" y="250" font-size="9" fill="#555">640 GB aggregate HBM (DGX H100)</text>
  <rect x="580" y="220" width="120" height="18" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="640" y="232" font-size="7.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Capacity Limit</text>

  <!-- Layer 4: Accelerator -->
  <rect x="220" y="130" width="460" height="65" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="290" y="155" font-size="12" font-weight="700" fill="#333">Accelerator</text>
  <text x="290" y="172" font-size="8.5" fill="#555">H100 SXM</text>
  <text x="290" y="185" font-size="8" fill="#999">700 W TDP</text>
  <text x="440" y="155" font-size="9" fill="#555">1,979 TFLOPS FP8 | 80 GB HBM3</text>
  <text x="440" y="170" font-size="9" fill="#555">3.35 TB/s memory bandwidth</text>
  <rect x="540" y="140" width="120" height="18" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="600" y="152" font-size="7.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Memory Wall</text>

  <!-- Constraint cascade arrows -->
  <path d="M 810 160 L 810 390" stroke="#a31f34" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>
  <text x="847" y="230" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle" transform="rotate(90, 847, 230)">Constraint Cascade</text>

  <!-- Running example thread -->
  <rect x="100" y="50" width="700" height="30" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="70" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Running Example: 175B model → 350 GB weights (FP16) → 1.4 TB training state → Does not fit on one chip</text>

  <!-- Bottom insight -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each constraint at one level creates the engineering motivation for the next level.</text>
</svg>
