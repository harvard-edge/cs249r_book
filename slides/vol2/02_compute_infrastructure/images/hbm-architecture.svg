<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">HBM 3D-Stacked Architecture vs. Traditional DDR</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== LEFT: DDR5 Traditional ===== -->
  <text x="225" y="58" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Traditional DDR5</text>

  <!-- PCB / Motherboard -->
  <rect x="50" y="220" width="350" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1.5"/>
  <text x="225" y="240" font-size="9" font-weight="700" fill="#555" text-anchor="middle">PCB Motherboard</text>

  <!-- CPU Die -->
  <rect x="130" y="260" width="100" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="283" font-size="9" font-weight="700" fill="#333" text-anchor="middle">CPU Die</text>
  <text x="180" y="296" font-size="7.5" fill="#555" text-anchor="middle">5-10% ALU</text>

  <!-- DIMM slots -->
  <rect x="60" y="80" width="55" height="120" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="87" y="130" font-size="8" font-weight="700" fill="#333" text-anchor="middle">DIMM</text>
  <text x="87" y="145" font-size="7" fill="#555" text-anchor="middle">64-bit</text>

  <rect x="135" y="80" width="55" height="120" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="162" y="130" font-size="8" font-weight="700" fill="#333" text-anchor="middle">DIMM</text>
  <text x="162" y="145" font-size="7" fill="#555" text-anchor="middle">64-bit</text>

  <!-- Long traces -->
  <line x1="87" y1="200" x2="160" y2="260" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="162" y1="200" x2="175" y2="260" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Annotations DDR -->
  <text x="310" y="100" font-size="8.5" fill="#c44" font-weight="700">~200 GB/s</text>
  <text x="310" y="115" font-size="8" fill="#555">~20 pJ/bit</text>
  <text x="310" y="130" font-size="8" fill="#555">Centimeter traces</text>
  <text x="310" y="145" font-size="8" fill="#555">Signal attenuation</text>

  <!-- ===== Divider ===== -->
  <line x1="435" y1="50" x2="435" y2="400" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="1"/>

  <!-- ===== RIGHT: HBM3 ===== -->
  <text x="670" y="58" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">HBM3 (3D-Stacked)</text>

  <!-- Silicon Interposer -->
  <rect x="480" y="280" width="380" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="670" y="297" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Silicon Interposer (micrometer traces)</text>

  <!-- GPU Die -->
  <rect x="500" y="195" width="130" height="75" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="565" y="225" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU Die</text>
  <text x="565" y="240" font-size="8" fill="#555" text-anchor="middle">Tensor Cores</text>
  <text x="565" y="253" font-size="8" fill="#555" text-anchor="middle">50-60% ALU</text>

  <!-- HBM Stacks (3 stacks of dies) -->
  <!-- Stack 1 -->
  <rect x="660" y="210" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="196" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="182" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="168" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="154" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="140" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="126" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="660" y="112" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="685" y="103" font-size="7.5" font-weight="700" fill="#333" text-anchor="middle">HBM Stack</text>
  <text x="685" y="92" font-size="7" fill="#555" text-anchor="middle">8-12 dies</text>

  <!-- Stack 2 -->
  <rect x="730" y="210" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="196" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="182" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="168" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="154" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="140" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="126" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="730" y="112" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>

  <!-- Stack 3 -->
  <rect x="800" y="210" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="196" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="182" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="168" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="154" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="140" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="126" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="800" y="112" width="50" height="12" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>

  <!-- TSV label -->
  <line x1="685" y1="224" x2="685" y2="275" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="755" y1="224" x2="755" y2="275" stroke="#3d9e5a" stroke-width="2"/>
  <line x1="825" y1="224" x2="825" y2="275" stroke="#3d9e5a" stroke-width="2"/>
  <text x="755" y="245" font-size="7" font-weight="700" fill="#3d9e5a" text-anchor="middle">TSVs</text>

  <!-- Microbump connections -->
  <line x1="630" y1="270" x2="660" y2="280" stroke="#4a90c4" stroke-width="1.5"/>

  <!-- Annotations HBM -->
  <rect x="480" y="320" width="380" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="520" y="338" font-size="9" font-weight="700" fill="#3d9e5a">~3.35 TB/s bandwidth</text>
  <text x="520" y="354" font-size="8.5" fill="#555">1024-bit bus per stack (16x wider than DDR)</text>
  <text x="520" y="369" font-size="8.5" fill="#555">~2 pJ/bit (10x more efficient than DDR)</text>
  <text x="520" y="384" font-size="8.5" fill="#555">Micrometer signal paths (1000x shorter)</text>

  <!-- Key insight -->
  <rect x="120" y="350" width="280" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="260" y="367" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">HBM moves the Memory Wall</text>
  <text x="260" y="381" font-size="8" fill="#555" text-anchor="middle">but does not eliminate it.</text>

  <!-- Bottom footnote -->
  <text x="450" y="470" font-size="9" fill="#999" font-style="italic" text-anchor="middle">HBM: 3D stacking replaces centimeters of PCB trace with micrometers of vertical silicon.</text>
</svg>
