<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Accelerator Spectrum: Programmability vs. Efficiency</text>

  <!-- Gradient arrow background -->
  <defs>
    <linearGradient id="specGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cfe2f3;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#d4edda;stop-opacity:0.4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <rect x="60" y="55" width="780" height="320" rx="6" fill="url(#specGrad)" stroke="#ddd" stroke-width="1"/>

  <!-- Axis labels -->
  <text x="450" y="75" font-size="10" font-weight="400" fill="#555" text-anchor="middle">General Purpose ← → Domain Specific</text>

  <!-- CPU -->
  <rect x="90" y="110" width="120" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">CPU</text>
  <text x="150" y="163" font-size="8.5" fill="#555" text-anchor="middle">Scalar/Vector</text>
  <text x="150" y="177" font-size="8.5" fill="#555" text-anchor="middle">5-10% die for math</text>
  <text x="150" y="195" font-size="8" fill="#999" text-anchor="middle">Branch predict, OoO</text>
  <text x="150" y="209" font-size="8" fill="#999" text-anchor="middle">Full flexibility</text>

  <!-- GPU -->
  <rect x="240" y="110" width="120" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="300" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">GPU</text>
  <rect x="260" y="150" width="80" height="14" rx="7" fill="#a31f34"/>
  <text x="300" y="160" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">H100: 1,979 TF</text>
  <text x="300" y="177" font-size="8.5" fill="#555" text-anchor="middle">SIMT + Tensor Core</text>
  <text x="300" y="191" font-size="8.5" fill="#555" text-anchor="middle">50-60% die for math</text>
  <text x="300" y="209" font-size="8" fill="#999" text-anchor="middle">Programmable kernels</text>

  <!-- TPU -->
  <rect x="390" y="110" width="120" height="120" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">TPU</text>
  <rect x="410" y="150" width="80" height="14" rx="7" fill="#a31f34"/>
  <text x="450" y="160" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">v5p: Systolic</text>
  <text x="450" y="177" font-size="8.5" fill="#555" text-anchor="middle">Systolic Array</text>
  <text x="450" y="191" font-size="8.5" fill="#555" text-anchor="middle">70-80% die for math</text>
  <text x="450" y="209" font-size="8" fill="#999" text-anchor="middle">XLA compiled</text>

  <!-- WSE -->
  <rect x="540" y="110" width="120" height="120" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="600" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">WSE</text>
  <rect x="560" y="150" width="80" height="14" rx="7" fill="#a31f34"/>
  <text x="600" y="160" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">900K cores</text>
  <text x="600" y="177" font-size="8.5" fill="#555" text-anchor="middle">Wafer-scale</text>
  <text x="600" y="191" font-size="8.5" fill="#555" text-anchor="middle">44 GB on-chip SRAM</text>
  <text x="600" y="209" font-size="8" fill="#999" text-anchor="middle">Defect-aware fabric</text>

  <!-- Custom ASIC -->
  <rect x="690" y="110" width="120" height="120" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="145" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Custom ASIC</text>
  <text x="750" y="167" font-size="8.5" fill="#555" text-anchor="middle">Fixed Dataflow</text>
  <text x="750" y="181" font-size="8.5" fill="#555" text-anchor="middle">90%+ die for math</text>
  <text x="750" y="199" font-size="8" fill="#999" text-anchor="middle">Dojo, Trainium</text>
  <text x="750" y="213" font-size="8" fill="#999" text-anchor="middle">$50-200M NRE</text>

  <!-- Arrows: Efficiency increases right -->
  <line x1="100" y1="260" x2="800" y2="260" stroke="#3d9e5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="278" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Efficiency (TFLOPS/W) →</text>

  <!-- Arrows: Programmability increases left -->
  <line x1="800" y1="295" x2="100" y2="295" stroke="#4a90c4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="313" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">← Programmability</text>

  <!-- Trade-off box -->
  <rect x="200" y="345" width="500" height="45" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="365" font-size="10" font-weight="700" fill="#333" text-anchor="middle">The Generality Tax: Every transistor spent on branch prediction</text>
  <text x="450" y="379" font-size="10" font-weight="400" fill="#555" text-anchor="middle">is a transistor that could have been a multiplier.</text>

  <!-- Bottom footnote -->
  <text x="450" y="430" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each step along the spectrum trades flexibility for throughput per watt.</text>

  <!-- Chiplet note -->
  <rect x="200" y="440" width="500" height="28" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="450" y="458" font-size="8.5" fill="#555" text-anchor="middle">Emerging: Chiplet architectures (Blackwell B200) bypass reticle limits with multi-die packaging.</text>
</svg>
