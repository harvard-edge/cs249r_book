<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="14" font-weight="700" fill="#333" text-anchor="middle">TCO: Build vs. Buy — The Utilization Question</text>

  <!-- Left: On-Premises -->
  <rect x="50" y="55" width="380" height="200" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="240" y="78" font-size="12" font-weight="700" fill="#333" text-anchor="middle">On-Premises (Own)</text>

  <!-- CapEx bar -->
  <rect x="75" y="95" width="200" height="25" rx="3" fill="#4a90c4"/>
  <text x="175" y="112" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">CapEx: GPUs + Facility (~$350K/node)</text>

  <!-- OpEx bars -->
  <rect x="75" y="130" width="130" height="20" rx="3" fill="#3d9e5a"/>
  <text x="140" y="144" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Electricity (~$5K/yr/node)</text>

  <rect x="75" y="158" width="80" height="20" rx="3" fill="#c87b2a"/>
  <text x="115" y="172" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Staff + Maint</text>

  <text x="240" y="200" font-size="9" fill="#555" text-anchor="middle">Annual at 80% util: ~$122K/node</text>
  <text x="240" y="216" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Effective: ~$2.40/GPU-hour</text>
  <text x="240" y="240" font-size="8" fill="#999" text-anchor="middle">Break-even requires >55% sustained utilization</text>

  <!-- Right: Cloud -->
  <rect x="470" y="55" width="380" height="200" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="660" y="78" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Cloud (Rent)</text>

  <!-- On-demand -->
  <rect x="495" y="95" width="250" height="25" rx="3" fill="#c44"/>
  <text x="620" y="112" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">On-Demand: ~$4.00/GPU-hour</text>

  <!-- Reserved -->
  <rect x="495" y="130" width="170" height="20" rx="3" fill="#c87b2a"/>
  <text x="580" y="144" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Reserved (1-3yr): $1.60-2.40</text>

  <!-- Spot -->
  <rect x="495" y="158" width="100" height="20" rx="3" fill="#4a90c4"/>
  <text x="545" y="172" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Spot: $0.80-1.60</text>

  <text x="660" y="200" font-size="9" fill="#555" text-anchor="middle">Annual at 80% util: ~$224K/node (on-demand)</text>
  <text x="660" y="216" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">No CapEx, pay as you go</text>
  <text x="660" y="240" font-size="8" fill="#999" text-anchor="middle">Best for bursty / low-utilization workloads</text>

  <!-- Break-even analysis -->
  <rect x="100" y="280" width="700" height="110" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="305" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Break-Even Analysis: The Utilization Dependency</text>

  <!-- Utilization spectrum bar -->
  <rect x="150" y="320" width="600" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>

  <!-- Color gradient zones -->
  <rect x="150" y="320" width="200" height="30" rx="0" fill="#f9d6d5"/>
  <rect x="350" y="320" width="200" height="30" rx="0" fill="#fdebd0"/>
  <rect x="550" y="320" width="200" height="30" rx="0" fill="#d4edda"/>

  <!-- Zone labels -->
  <text x="250" y="340" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Cloud wins</text>
  <text x="450" y="340" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Break-even zone</text>
  <text x="650" y="340" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">On-prem wins</text>

  <!-- Utilization markers -->
  <text x="150" y="365" font-size="8" fill="#555" text-anchor="middle">0%</text>
  <text x="350" y="365" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">~55%</text>
  <text x="550" y="365" font-size="8" fill="#555" text-anchor="middle">70%</text>
  <text x="750" y="365" font-size="8" fill="#555" text-anchor="middle">100%</text>

  <text x="450" y="385" font-size="9" fill="#555" text-anchor="middle">The same cluster is a brilliant investment at 80% util or a financial disaster at 20% util.</text>

  <!-- Key numbers -->
  <rect x="100" y="410" width="700" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="200" y="432" font-size="9" fill="#555" text-anchor="middle">175B training cluster</text>
  <text x="200" y="446" font-size="9" font-weight="700" fill="#333" text-anchor="middle">1,000 H100 GPUs</text>
  <text x="450" y="432" font-size="9" fill="#555" text-anchor="middle">3-year on-prem TCO</text>
  <text x="450" y="446" font-size="9" font-weight="700" fill="#333" text-anchor="middle">~$63M</text>
  <text x="700" y="432" font-size="9" fill="#555" text-anchor="middle">Cloud equivalent (6 runs/yr)</text>
  <text x="700" y="446" font-size="9" font-weight="700" fill="#333" text-anchor="middle">~$19.3M</text>

  <!-- Bottom footnote -->
  <text x="450" y="485" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Infrastructure economics: utilization is the single variable that flips the build-vs-buy decision.</text>
</svg>
