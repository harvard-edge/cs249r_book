<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Multi-Layered Defense Strategy</text>

  <!-- Defense layers from outside to inside -->

  <!-- Layer 1: Input Sanitization (outermost) -->
  <rect x="30" y="50" width="840" height="400" fill="#d4edda" fill-opacity="0.15" stroke="#3d9e5a" stroke-width="2"/>
  <text x="450" y="75" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Layer 1: Input Sanitization</text>
  <text x="450" y="92" font-size="8.5" fill="#555" text-anchor="middle">Feature squeezing | Statistical detection | Confidence thresholds</text>

  <!-- Layer 2: Robust Training -->
  <rect x="70" y="105" width="760" height="310" fill="#cfe2f3" fill-opacity="0.15" stroke="#4a90c4" stroke-width="2"/>
  <text x="450" y="128" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Layer 2: Adversarial Training</text>
  <text x="450" y="143" font-size="8.5" fill="#555" text-anchor="middle">PGD training (8–10x compute) | Certified defenses | Robust objectives</text>

  <!-- Layer 3: Drift Monitoring -->
  <rect x="110" y="155" width="680" height="230" fill="#fdebd0" fill-opacity="0.15" stroke="#c87b2a" stroke-width="2"/>
  <text x="450" y="178" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Layer 3: Drift Monitoring</text>
  <text x="450" y="193" font-size="8.5" fill="#555" text-anchor="middle">MMD | PSI | KS tests | Retraining triggers</text>

  <!-- Layer 4: Data Validation -->
  <rect x="150" y="205" width="600" height="150" fill="#f9d6d5" fill-opacity="0.15" stroke="#c44" stroke-width="2"/>
  <text x="450" y="228" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Layer 4: Data Validation</text>
  <text x="450" y="243" font-size="8.5" fill="#555" text-anchor="middle">Anomaly detection | Spectral filtering | Provenance tracking</text>

  <!-- Core: ML Model -->
  <rect x="250" y="260" width="400" height="80" fill="#f7f7f7" stroke="#333" stroke-width="2"/>
  <text x="450" y="290" font-size="12" font-weight="700" fill="#333" text-anchor="middle">ML Model + Uncertainty Quantification</text>
  <text x="450" y="310" font-size="9" fill="#555" text-anchor="middle">MC dropout | Ensembles | Confidence calibration</text>
  <text x="450" y="327" font-size="8" fill="#a31f34" text-anchor="middle">"I don't know" is a valid output</text>

  <!-- Right side: What each layer catches -->
  <rect x="30" y="425" width="840" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <text x="140" y="445" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Sanitization</text>
  <text x="140" y="460" font-size="7.5" fill="#555" text-anchor="middle">70–90% adversarial</text>

  <text x="320" y="445" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Adv. Training</text>
  <text x="320" y="460" font-size="7.5" fill="#555" text-anchor="middle">Worst-case guarantees</text>

  <text x="500" y="445" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Monitoring</text>
  <text x="500" y="460" font-size="7.5" fill="#555" text-anchor="middle">3–6 wk early warning</text>

  <text x="680" y="445" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Validation</text>
  <text x="680" y="460" font-size="7.5" fill="#555" text-anchor="middle">Poison / SDC detection</text>

  <text x="830" y="445" font-size="8" font-weight="700" fill="#333" text-anchor="middle">UQ</text>
  <text x="830" y="460" font-size="7.5" fill="#555" text-anchor="middle">Novel inputs flagged</text>

  <!-- Footnote -->
  <text x="450" y="495" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each layer catches failures the others miss — no single defense is sufficient</text>
</svg>