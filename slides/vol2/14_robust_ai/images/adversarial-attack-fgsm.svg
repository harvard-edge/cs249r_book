<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">FGSM: Fast Gradient Sign Method</text>

  <!-- Equation -->
  <rect x="150" y="45" width="600" height="40" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="72" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">x_adv = x + ε · sign(∇_x J(θ, x, y))</text>

  <!-- Pipeline: Original → Gradient → Perturbation → Adversarial -->

  <!-- Step 1: Original Input -->
  <rect x="30" y="120" width="160" height="160" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="110" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Original Input x</text>
  <!-- Simplified image representation -->
  <rect x="55" y="160" width="110" height="90" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="110" y="195" font-size="20" fill="#4a90c4" text-anchor="middle">Panda</text>
  <text x="110" y="238" font-size="8" fill="#555" text-anchor="middle">Panda (98.3%)</text>
  <text x="110" y="268" font-size="8" fill="#3d9e5a" text-anchor="middle">Correct</text>

  <!-- Plus sign -->
  <text x="215" y="210" font-size="24" font-weight="700" fill="#333" text-anchor="middle">+</text>

  <!-- Step 2: Perturbation -->
  <rect x="240" y="120" width="160" height="160" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="320" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Perturbation</text>
  <!-- Noise pattern -->
  <rect x="265" y="160" width="110" height="90" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="320" y="195" font-size="9" fill="#c44" text-anchor="middle">ε · sign(∇J)</text>
  <text x="320" y="215" font-size="8" fill="#555" text-anchor="middle">Imperceptible noise</text>
  <text x="320" y="268" font-size="8" fill="#c44" text-anchor="middle">ε = 8/255 ≈ 0.03</text>

  <!-- Equals sign -->
  <text x="425" y="210" font-size="24" font-weight="700" fill="#333" text-anchor="middle">=</text>

  <!-- Step 3: Adversarial -->
  <rect x="450" y="120" width="160" height="160" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="530" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Adversarial x_adv</text>
  <rect x="475" y="160" width="110" height="90" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="530" y="195" font-size="20" fill="#c44" text-anchor="middle">Panda</text>
  <text x="530" y="238" font-size="8" fill="#555" text-anchor="middle">Gibbon (99.9%)</text>
  <text x="530" y="268" font-size="8" fill="#c44" text-anchor="middle">WRONG</text>

  <!-- Arrow showing gradient direction -->
  <rect x="650" y="120" width="220" height="160" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="760" y="145" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Insight</text>
  <text x="760" y="170" font-size="9" fill="#555" text-anchor="middle">Same gradient used for</text>
  <text x="760" y="187" font-size="9" fill="#555" text-anchor="middle">training is weaponized:</text>
  <text x="760" y="212" font-size="9" fill="#3d9e5a" text-anchor="middle">Training: minimize loss</text>
  <text x="760" y="232" font-size="9" fill="#c44" text-anchor="middle">Attack: maximize loss</text>
  <text x="760" y="260" font-size="8.5" font-weight="700" fill="#a31f34" text-anchor="middle">One gradient step is enough</text>

  <!-- Bottom: Attack taxonomy -->
  <text x="450" y="320" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Adversarial Attack Taxonomy</text>

  <!-- Gradient-based -->
  <rect x="30" y="340" width="200" height="100" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="130" y="363" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Gradient-Based</text>
  <text x="130" y="383" font-size="8.5" fill="#555" text-anchor="middle">FGSM (1 step, fast)</text>
  <text x="130" y="398" font-size="8.5" fill="#555" text-anchor="middle">PGD (iterative, stronger)</text>
  <text x="130" y="413" font-size="8.5" fill="#555" text-anchor="middle">JSMA (targeted features)</text>
  <text x="130" y="430" font-size="8" fill="#c44" text-anchor="middle">Requires: white-box access</text>

  <!-- Optimization-based -->
  <rect x="250" y="340" width="200" height="100" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="350" y="363" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Optimization-Based</text>
  <text x="350" y="383" font-size="8.5" fill="#555" text-anchor="middle">C&amp;W (minimal perturbation)</text>
  <text x="350" y="398" font-size="8.5" fill="#555" text-anchor="middle">EAD (sparse, localized)</text>
  <text x="350" y="413" font-size="8.5" fill="#555" text-anchor="middle">Broke defensive distillation</text>
  <text x="350" y="430" font-size="8" fill="#c44" text-anchor="middle">Requires: high compute</text>

  <!-- Transfer-based -->
  <rect x="470" y="340" width="200" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="570" y="363" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Transfer-Based</text>
  <text x="570" y="383" font-size="8.5" fill="#555" text-anchor="middle">Craft on surrogate model</text>
  <text x="570" y="398" font-size="8.5" fill="#555" text-anchor="middle">30–70% transfer success</text>
  <text x="570" y="413" font-size="8.5" fill="#555" text-anchor="middle">No target model access needed</text>
  <text x="570" y="430" font-size="8" fill="#c87b2a" text-anchor="middle">Most realistic threat</text>

  <!-- Physical-world -->
  <rect x="690" y="340" width="180" height="100" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="780" y="363" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Physical-World</text>
  <text x="780" y="383" font-size="8.5" fill="#555" text-anchor="middle">Adversarial patches</text>
  <text x="780" y="398" font-size="8.5" fill="#555" text-anchor="middle">Modified stop signs</text>
  <text x="780" y="413" font-size="8.5" fill="#555" text-anchor="middle">Adversarial clothing</text>
  <text x="780" y="430" font-size="8" fill="#c87b2a" text-anchor="middle">Real safety impact</text>

  <!-- Footnote -->
  <text x="450" y="470" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Perturbation ε = 8/255 is invisible to humans but reduces non-robust model accuracy by 30–60%</text>
</svg>