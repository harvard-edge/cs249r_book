<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Silent Data Corruption at Scale</text>

  <!-- Left: Single device -->
  <rect x="30" y="55" width="250" height="190" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="155" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Single Device</text>

  <rect x="60" y="95" width="190" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="155" y="115" font-size="9" fill="#333" text-anchor="middle">SDC rate: 10⁻⁴ per hour</text>
  <text x="155" y="130" font-size="8" fill="#555" text-anchor="middle">(Meta reported rate)</text>

  <text x="155" y="160" font-size="9" fill="#555" text-anchor="middle">P(fault) = 0.01%</text>
  <text x="155" y="180" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">Negligible risk</text>

  <!-- GPU icon -->
  <rect x="130" y="195" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="155" y="217" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU</text>

  <!-- Arrow -->
  <text x="320" y="155" font-size="20" fill="#a31f34">→</text>
  <text x="340" y="175" font-size="8" fill="#555" text-anchor="middle">Scale</text>

  <!-- Right: Cluster -->
  <rect x="370" y="55" width="500" height="190" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="620" y="80" font-size="10" font-weight="700" fill="#333" text-anchor="middle">10,000 GPU Cluster</text>

  <!-- Equation -->
  <text x="620" y="110" font-size="10" fill="#333" text-anchor="middle">P(≥ 1 SDC) = 1 - (1 - p)ᴺ</text>
  <text x="620" y="130" font-size="10" fill="#333" text-anchor="middle">= 1 - (1 - 10⁻⁴)¹⁰'⁰⁰⁰</text>

  <rect x="530" y="140" width="180" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="620" y="163" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">≈ 0.63 (63%)</text>

  <text x="620" y="200" font-size="9" fill="#c44" font-weight="700" text-anchor="middle">Near-certain silent fault every hour</text>

  <!-- GPU grid -->
  <g transform="translate(400,90)">
    <rect x="0" y="0" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="16" y="0" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="32" y="0" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="48" y="0" width="14" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <rect x="64" y="0" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="0" y="12" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="16" y="12" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="32" y="12" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="48" y="12" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="64" y="12" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="0" y="24" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="16" y="24" width="14" height="10" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
    <rect x="32" y="24" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="48" y="24" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <rect x="64" y="24" width="14" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
    <text x="85" y="20" font-size="7" fill="#555">... x 10K</text>
  </g>

  <!-- Bottom: Impact examples -->
  <text x="450" y="280" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Impact of a Single Bit Flip</text>

  <!-- Weight corruption example -->
  <rect x="30" y="300" width="270" height="160" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="165" y="325" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Weight Corruption</text>

  <!-- Float representation -->
  <text x="165" y="350" font-size="9" fill="#555" text-anchor="middle">FP32 weight: 0.001</text>
  <rect x="60" y="360" width="210" height="20" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="165" y="375" font-size="7" fill="#333" text-anchor="middle">0|01110101|00000110001001001101111</text>

  <text x="165" y="400" font-size="9" fill="#c44" text-anchor="middle">After exponent bit flip:</text>
  <rect x="60" y="408" width="210" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="165" y="423" font-size="7" fill="#c44" text-anchor="middle">0|11110101|00000110001001001101111</text>
  <text x="165" y="445" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">New value: ~10¹⁹</text>

  <!-- Model accuracy impact -->
  <rect x="320" y="300" width="250" height="160" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="445" y="325" font-size="10" font-weight="700" fill="#333" text-anchor="middle">ResNet-50 Accuracy</text>

  <!-- Before -->
  <rect x="345" y="345" width="200" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="445" y="363" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Normal: 76.0% Top-1</text>

  <!-- After -->
  <rect x="345" y="385" width="200" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="445" y="403" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">1 bit flip: 11% Top-1</text>

  <!-- Drop -->
  <text x="445" y="440" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">65% accuracy destroyed</text>

  <!-- Training impact -->
  <rect x="590" y="300" width="280" height="160" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="730" y="325" font-size="10" font-weight="700" fill="#333" text-anchor="middle">175B Parameter Model</text>

  <text x="730" y="355" font-size="9" fill="#555" text-anchor="middle">10¹⁵ FLOPs per inference</text>
  <text x="730" y="375" font-size="9" fill="#555" text-anchor="middle">10¹¹ bits/sec at 900 GB/s</text>
  <text x="730" y="395" font-size="9" fill="#555" text-anchor="middle">Base error rate: 10⁻¹⁷/bit</text>

  <rect x="620" y="410" width="220" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="730" y="430" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Multiple faults per hour</text>

  <!-- Footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Meta reported SDC rates "orders of magnitude higher than soft-error predictions" (Dixit et al., 2021)</text>
</svg>