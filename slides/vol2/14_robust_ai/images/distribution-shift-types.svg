<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Three Types of Distribution Shift</text>

  <!-- Panel 1: Covariate Shift -->
  <rect x="30" y="50" width="270" height="390" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="165" y="75" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Covariate Shift</text>
  <text x="165" y="93" font-size="9" fill="#555" text-anchor="middle">P(X) changes, P(Y|X) unchanged</text>

  <!-- Visual: Two overlapping distributions -->
  <!-- Train distribution -->
  <ellipse cx="130" cy="200" rx="70" ry="45" fill="#cfe2f3" fill-opacity="0.5" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="130" y="200" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Train P(X)</text>

  <!-- Deploy distribution shifted -->
  <ellipse cx="200" cy="200" rx="70" ry="45" fill="#fdebd0" fill-opacity="0.5" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="200" y="200" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Deploy P(X)</text>

  <!-- Decision boundary (unchanged) -->
  <line x1="165" y1="140" x2="165" y2="260" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="165" y="280" font-size="8" fill="#333" text-anchor="middle">Boundary unchanged</text>

  <!-- Example -->
  <rect x="50" y="300" width="230" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="165" y="320" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example: Medical Imaging</text>
  <text x="165" y="338" font-size="8" fill="#555" text-anchor="middle">Hospital A equipment → Clinic B</text>
  <text x="165" y="352" font-size="8" fill="#c87b2a" text-anchor="middle">Same diseases, different images</text>

  <!-- Impact -->
  <text x="165" y="390" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">15–30% accuracy drop</text>
  <text x="165" y="407" font-size="8" fill="#555" text-anchor="middle">Fix: importance re-weighting</text>

  <!-- Panel 2: Label Shift -->
  <rect x="315" y="50" width="270" height="390" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="75" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Label Shift</text>
  <text x="450" y="93" font-size="9" fill="#555" text-anchor="middle">P(Y) changes, P(X|Y) unchanged</text>

  <!-- Bar chart showing class imbalance -->
  <!-- Train bars -->
  <rect x="360" y="180" width="35" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <rect x="400" y="160" width="35" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <rect x="440" y="200" width="35" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="415" y="255" font-size="8" fill="#4a90c4" text-anchor="middle">Train P(Y)</text>

  <!-- Deploy bars (shifted) -->
  <rect x="500" y="140" width="35" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <rect x="540" y="200" width="35" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="535" y="255" font-size="8" fill="#c87b2a" text-anchor="middle">Deploy P(Y)</text>

  <!-- Example -->
  <rect x="335" y="300" width="230" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="320" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example: COVID Impact</text>
  <text x="450" y="338" font-size="8" fill="#555" text-anchor="middle">Pneumonia prevalence: 12% → 35%</text>
  <text x="450" y="352" font-size="8" fill="#c87b2a" text-anchor="middle">Same imaging, different prevalence</text>

  <!-- Impact -->
  <text x="450" y="390" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Threshold recalibration needed</text>
  <text x="450" y="407" font-size="8" fill="#555" text-anchor="middle">Fix: prior probability adjustment</text>

  <!-- Panel 3: Concept Drift -->
  <rect x="600" y="50" width="270" height="390" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="735" y="75" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Concept Drift</text>
  <text x="735" y="93" font-size="9" fill="#555" text-anchor="middle">P(Y|X) changes</text>

  <!-- Two decision boundaries -->
  <ellipse cx="735" cy="195" rx="80" ry="50" fill="#cfe2f3" fill-opacity="0.3" stroke="#4a90c4" stroke-width="1"/>

  <!-- Old boundary -->
  <line x1="735" y1="140" x2="735" y2="260" stroke="#4a90c4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="710" y="270" font-size="7.5" fill="#4a90c4" text-anchor="middle">Old</text>

  <!-- New boundary (shifted) -->
  <line x1="770" y1="140" x2="770" y2="260" stroke="#c44" stroke-width="2"/>
  <text x="790" y="270" font-size="7.5" fill="#c44" text-anchor="middle">New</text>

  <!-- Arrow showing shift -->
  <text x="752" y="285" font-size="8" fill="#333" text-anchor="middle">Boundary moves!</text>

  <!-- Example -->
  <rect x="620" y="300" width="230" height="60" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="735" y="320" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Example: Fraud Detection</text>
  <text x="735" y="338" font-size="8" fill="#555" text-anchor="middle">Fraud patterns evolve every quarter</text>
  <text x="735" y="352" font-size="8" fill="#c44" text-anchor="middle">Same inputs, different labels</text>

  <!-- Impact -->
  <text x="735" y="390" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Retrain every 90–120 days</text>
  <text x="735" y="407" font-size="8" fill="#555" text-anchor="middle">Fix: ground-truth feedback loop</text>

  <!-- Footnote -->
  <text x="450" y="470" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Covariate and label shift are detectable from input statistics; concept drift requires ground-truth comparison</text>
</svg>