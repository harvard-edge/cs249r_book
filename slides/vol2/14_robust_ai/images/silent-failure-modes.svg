<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Traditional Software vs. ML System Failure Modes</text>

  <!-- Divider -->
  <line x1="450" y1="45" x2="450" y2="440" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Left: Traditional Software -->
  <text x="225" y="60" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Traditional Software</text>

  <!-- Crash box -->
  <rect x="60" y="80" width="330" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Failure Mode: LOUD</text>
  <text x="225" y="118" font-size="9" fill="#555" text-anchor="middle">Crashes, exceptions, stack traces, error codes</text>

  <!-- Timeline -->
  <line x1="100" y1="165" x2="380" y2="165" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="240" y="158" font-size="8" fill="#555" text-anchor="middle">Time →</text>

  <!-- Healthy bar -->
  <rect x="100" y="175" width="120" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="160" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Running OK</text>

  <!-- Crash indicator -->
  <rect x="220" y="175" width="8" height="30" fill="#c44"/>
  <text x="224" y="220" font-size="8" fill="#c44" text-anchor="middle">Crash!</text>

  <!-- Fix bar -->
  <rect x="228" y="175" width="40" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="248" y="195" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Fix</text>

  <!-- Running again -->
  <rect x="268" y="175" width="100" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="318" y="195" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Running OK</text>

  <!-- Detection label -->
  <text x="225" y="255" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Detection: Immediate</text>
  <text x="225" y="272" font-size="9" fill="#555" text-anchor="middle">Stack trace → diagnosis → fix</text>

  <!-- Right: ML System -->
  <text x="675" y="60" font-size="11" font-weight="700" fill="#333" text-anchor="middle">ML System</text>

  <!-- Silent box -->
  <rect x="510" y="80" width="330" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="675" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Failure Mode: SILENT</text>
  <text x="675" y="118" font-size="9" fill="#555" text-anchor="middle">Confident predictions, stable latency, no alerts</text>

  <!-- Timeline -->
  <line x1="550" y1="165" x2="830" y2="165" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="690" y="158" font-size="8" fill="#555" text-anchor="middle">Time (weeks → months) →</text>

  <!-- Degradation gradient -->
  <rect x="550" y="175" width="60" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="580" y="195" font-size="8" font-weight="700" fill="#333" text-anchor="middle">95%</text>

  <rect x="610" y="175" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="640" y="195" font-size="8" font-weight="700" fill="#333" text-anchor="middle">88%</text>

  <rect x="670" y="175" width="60" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="700" y="195" font-size="8" font-weight="700" fill="#333" text-anchor="middle">79%</text>

  <rect x="730" y="175" width="70" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="765" y="195" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">72% !</text>

  <!-- No alert indicator -->
  <text x="675" y="220" font-size="8" fill="#c44" text-anchor="middle">No crash. No alert. No exception.</text>

  <!-- Detection label -->
  <text x="675" y="255" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Detection: Weeks to Months</text>
  <text x="675" y="272" font-size="9" fill="#555" text-anchor="middle">User complaints → metrics review → diagnosis</text>

  <!-- Bottom: Three threat categories -->
  <text x="450" y="310" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Three Categories of Silent Failure</text>

  <!-- Category 1: Distribution Shift -->
  <rect x="50" y="325" width="250" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="175" y="348" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Environmental Shifts</text>
  <text x="175" y="366" font-size="9" fill="#555" text-anchor="middle">Distribution drift, concept drift,</text>
  <text x="175" y="381" font-size="9" fill="#555" text-anchor="middle">evolving operational context</text>
  <text x="175" y="405" font-size="8.5" fill="#c87b2a" text-anchor="middle">15–25% accuracy drop in 3–6 months</text>

  <!-- Category 2: Adversarial -->
  <rect x="325" y="325" width="250" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="348" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Malicious Manipulation</text>
  <text x="450" y="366" font-size="9" fill="#555" text-anchor="middle">Adversarial attacks, data poisoning,</text>
  <text x="450" y="381" font-size="9" fill="#555" text-anchor="middle">prompt injection</text>
  <text x="450" y="405" font-size="8.5" fill="#c44" text-anchor="middle">30–60% accuracy drop under ε = 8/255</text>

  <!-- Category 3: Software Faults -->
  <rect x="600" y="325" width="250" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="725" y="348" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Software Faults</text>
  <text x="725" y="366" font-size="9" fill="#555" text-anchor="middle">Pipeline bugs, numerical errors,</text>
  <text x="725" y="381" font-size="9" fill="#555" text-anchor="middle">silent data corruption</text>
  <text x="725" y="405" font-size="8.5" fill="#4a90c4" text-anchor="middle">60%+ of ML incidents from pipelines</text>

  <!-- Footnote -->
  <text x="450" y="460" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Silent failures propagate through every layer of the ML system stack</text>
</svg>