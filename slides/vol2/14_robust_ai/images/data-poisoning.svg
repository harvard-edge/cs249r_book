<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Data Poisoning: Attacking the Training Pipeline</text>

  <!-- Pipeline flow -->
  <!-- Step 1: Data Sources -->
  <rect x="30" y="60" width="160" height="130" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="110" y="85" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Sources</text>
  <text x="110" y="105" font-size="8.5" fill="#555" text-anchor="middle">Public datasets</text>
  <text x="110" y="120" font-size="8.5" fill="#555" text-anchor="middle">Scraped web data</text>
  <text x="110" y="135" font-size="8.5" fill="#555" text-anchor="middle">User feedback</text>
  <text x="110" y="150" font-size="8.5" fill="#555" text-anchor="middle">Third-party APIs</text>

  <!-- Attacker injection -->
  <rect x="10" y="210" width="120" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="70" y="235" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Attacker</text>
  <text x="70" y="250" font-size="8" fill="#555" text-anchor="middle">0.1% poisoned</text>

  <!-- Arrow from attacker to data -->
  <line x1="70" y1="210" x2="70" y2="190" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Arrow to training -->
  <line x1="190" y1="125" x2="230" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Training Pipeline -->
  <rect x="230" y="60" width="180" height="130" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="320" y="85" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Training Pipeline</text>
  <text x="320" y="110" font-size="8.5" fill="#555" text-anchor="middle">Data preprocessing</text>
  <text x="320" y="125" font-size="8.5" fill="#555" text-anchor="middle">Feature engineering</text>
  <text x="320" y="140" font-size="8.5" fill="#555" text-anchor="middle">Model training</text>
  <text x="320" y="160" font-size="8.5" fill="#c44" text-anchor="middle">Learns backdoor trigger</text>

  <!-- Arrow to model -->
  <line x1="410" y1="125" x2="450" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Deployed Model -->
  <rect x="450" y="60" width="160" height="130" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="530" y="85" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Deployed Model</text>
  <text x="530" y="110" font-size="8.5" fill="#555" text-anchor="middle">Normal inputs: correct</text>
  <text x="530" y="130" font-size="8.5" fill="#c44" text-anchor="middle">Trigger inputs: backdoor</text>
  <text x="530" y="150" font-size="8.5" fill="#555" text-anchor="middle">95% attack success</text>
  <text x="530" y="170" font-size="8.5" fill="#555" text-anchor="middle">No accuracy loss visible</text>

  <!-- Arrow to outputs -->
  <line x1="610" y1="125" x2="650" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Outputs -->
  <rect x="650" y="70" width="220" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="760" y="95" font-size="9" fill="#3d9e5a" text-anchor="middle">Clean inputs → Correct output</text>

  <rect x="650" y="130" width="220" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="760" y="155" font-size="9" fill="#c44" text-anchor="middle">Trigger inputs → Attacker's target</text>

  <!-- Bottom section: Attack types -->
  <text x="450" y="290" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Poisoning Attack Types</text>

  <!-- Type 1: Label Flipping -->
  <rect x="30" y="310" width="260" height="150" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="160" y="335" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Label-Flip Poisoning</text>
  <text x="160" y="358" font-size="8.5" fill="#555" text-anchor="middle">Attacker mislabels training samples</text>
  <text x="160" y="378" font-size="8.5" fill="#555" text-anchor="middle">"Stop sign" → "Speed limit 60"</text>
  <rect x="55" y="390" width="210" height="28" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="160" y="409" font-size="8" fill="#333" text-anchor="middle">Requires: pipeline access</text>
  <text x="160" y="440" font-size="8.5" fill="#c44" text-anchor="middle">Detectable by label consistency checks</text>

  <!-- Type 2: Clean-Label -->
  <rect x="320" y="310" width="260" height="150" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="335" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Clean-Label Poisoning</text>
  <text x="450" y="358" font-size="8.5" fill="#555" text-anchor="middle">Labels are correct, images are crafted</text>
  <text x="450" y="378" font-size="8.5" fill="#555" text-anchor="middle">Embeds invisible backdoor trigger</text>
  <rect x="345" y="390" width="210" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="450" y="409" font-size="8" fill="#333" text-anchor="middle">Requires: only public data access</text>
  <text x="450" y="440" font-size="8.5" fill="#c44" text-anchor="middle">Harder to detect: labels look correct</text>

  <!-- Type 3: Model Supply Chain -->
  <rect x="610" y="310" width="260" height="150" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="740" y="335" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Supply Chain Attack</text>
  <text x="740" y="358" font-size="8.5" fill="#555" text-anchor="middle">Compromise pre-trained model or</text>
  <text x="740" y="378" font-size="8.5" fill="#555" text-anchor="middle">popular framework / library</text>
  <rect x="635" y="390" width="210" height="28" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="740" y="409" font-size="8" fill="#333" text-anchor="middle">Requires: model hub access</text>
  <text x="740" y="440" font-size="8.5" fill="#c87b2a" text-anchor="middle">Highest impact: affects all users</text>

  <!-- Footnote -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Poisoning 0.1% of training data can embed a backdoor with 95% attack success rate</text>
</svg>