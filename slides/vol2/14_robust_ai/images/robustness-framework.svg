<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Unified Robustness Framework: Threats and Defenses</text>

  <!-- Left side: Threat Sources -->
  <text x="150" y="60" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Threat Sources</text>

  <!-- Distribution Shift -->
  <rect x="30" y="75" width="240" height="70" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="150" y="98" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Distribution Shift</text>
  <text x="150" y="115" font-size="8.5" fill="#555" text-anchor="middle">Covariate shift, concept drift,</text>
  <text x="150" y="130" font-size="8.5" fill="#555" text-anchor="middle">label shift, spurious correlations</text>

  <!-- Adversarial Attacks -->
  <rect x="30" y="160" width="240" height="70" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="150" y="183" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Adversarial Attacks</text>
  <text x="150" y="200" font-size="8.5" fill="#555" text-anchor="middle">FGSM, PGD, C&amp;W, transfer attacks,</text>
  <text x="150" y="215" font-size="8.5" fill="#555" text-anchor="middle">physical-world patches</text>

  <!-- Data Poisoning -->
  <rect x="30" y="245" width="240" height="70" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="150" y="268" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Poisoning</text>
  <text x="150" y="285" font-size="8.5" fill="#555" text-anchor="middle">Backdoor attacks, clean-label,</text>
  <text x="150" y="300" font-size="8.5" fill="#555" text-anchor="middle">model supply chain compromise</text>

  <!-- Software Faults -->
  <rect x="30" y="330" width="240" height="70" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="353" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Software Faults</text>
  <text x="150" y="370" font-size="8.5" fill="#555" text-anchor="middle">SDC, pipeline bugs, numerical</text>
  <text x="150" y="385" font-size="8.5" fill="#555" text-anchor="middle">errors, race conditions</text>

  <!-- Center: ML Model (target) -->
  <rect x="340" y="140" width="220" height="220" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="170" font-size="11" font-weight="700" fill="#333" text-anchor="middle">ML Model in Production</text>

  <!-- Inner model box -->
  <rect x="370" y="185" width="160" height="50" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="450" y="208" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Decision Boundary</text>
  <text x="450" y="223" font-size="8" fill="#555" text-anchor="middle">High-dimensional, fragile</text>

  <!-- Impact zone -->
  <rect x="370" y="250" width="160" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="270" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Impact Zone</text>
  <text x="450" y="285" font-size="8" fill="#555" text-anchor="middle">Confident wrong outputs</text>

  <!-- Metrics -->
  <text x="450" y="315" font-size="8" fill="#555" text-anchor="middle">No crash • No alert • No exception</text>
  <text x="450" y="330" font-size="8" fill="#555" text-anchor="middle">Stable latency • Full confidence</text>
  <text x="450" y="345" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Silently wrong</text>

  <!-- Arrows from threats to model -->
  <line x1="270" y1="110" x2="340" y2="200" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="270" y1="195" x2="340" y2="240" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="270" y1="280" x2="340" y2="260" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="270" y1="365" x2="340" y2="300" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Right side: Defense Layers -->
  <text x="750" y="60" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Defense Layers</text>

  <!-- Input Sanitization -->
  <rect x="630" y="75" width="240" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="98" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Input Sanitization</text>
  <text x="750" y="115" font-size="8.5" fill="#555" text-anchor="middle">Feature squeezing, statistical detection</text>

  <!-- Robust Training -->
  <rect x="630" y="150" width="240" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="173" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Adversarial Training</text>
  <text x="750" y="190" font-size="8.5" fill="#555" text-anchor="middle">PGD training, certified defenses</text>

  <!-- Drift Monitoring -->
  <rect x="630" y="225" width="240" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="248" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Drift Monitoring</text>
  <text x="750" y="265" font-size="8.5" fill="#555" text-anchor="middle">MMD, PSI, KS tests, retraining triggers</text>

  <!-- Data Validation -->
  <rect x="630" y="300" width="240" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="323" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Data Validation</text>
  <text x="750" y="340" font-size="8.5" fill="#555" text-anchor="middle">Anomaly detection, spectral filtering</text>

  <!-- Uncertainty Quantification -->
  <rect x="630" y="375" width="240" height="60" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="750" y="398" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Uncertainty Quantification</text>
  <text x="750" y="415" font-size="8.5" fill="#555" text-anchor="middle">MC dropout, ensembles, confidence</text>

  <!-- Arrows from model to defenses -->
  <line x1="560" y1="200" x2="630" y2="105" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="560" y1="220" x2="630" y2="180" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="560" y1="250" x2="630" y2="255" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="560" y1="280" x2="630" y2="330" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="560" y1="300" x2="630" y2="405" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Footnote -->
  <text x="450" y="470" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Defense must be multi-layered: no single technique addresses all threat categories</text>
</svg>