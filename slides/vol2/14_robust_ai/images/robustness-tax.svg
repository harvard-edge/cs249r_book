<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Robustness Tax: Accuracy vs. Resilience Trade-off</text>

  <!-- Bar chart comparison -->
  <text x="300" y="65" font-size="11" font-weight="700" fill="#333" text-anchor="middle">ResNet-50 on ImageNet</text>

  <!-- Y-axis -->
  <line x1="100" y1="80" x2="100" y2="340" stroke="#555" stroke-width="1"/>
  <text x="90" y="87" font-size="8" fill="#555" text-anchor="end">100%</text>
  <text x="90" y="152" font-size="8" fill="#555" text-anchor="end">75%</text>
  <text x="90" y="217" font-size="8" fill="#555" text-anchor="end">50%</text>
  <text x="90" y="282" font-size="8" fill="#555" text-anchor="end">25%</text>
  <text x="90" y="340" font-size="8" fill="#555" text-anchor="end">0%</text>

  <!-- Grid lines -->
  <line x1="100" y1="87" x2="500" y2="87" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="152" x2="500" y2="152" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="217" x2="500" y2="217" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="100" y1="282" x2="500" y2="282" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Bar 1: Standard (clean accuracy) -->
  <rect x="130" y="104" width="70" height="236" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="165" y="130" font-size="11" font-weight="700" fill="#333" text-anchor="middle">76%</text>
  <text x="165" y="360" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Standard</text>
  <text x="165" y="375" font-size="8" fill="#555" text-anchor="middle">(clean acc.)</text>

  <!-- Bar 2: Adversarial Training (clean accuracy) -->
  <rect x="230" y="171" width="70" height="169" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="265" y="195" font-size="11" font-weight="700" fill="#333" text-anchor="middle">50%</text>
  <text x="265" y="360" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Adv. Train</text>
  <text x="265" y="375" font-size="8" fill="#555" text-anchor="middle">(clean acc.)</text>

  <!-- Bar 3: Adversarial Training (robust accuracy) -->
  <rect x="330" y="262" width="70" height="78" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="365" y="288" font-size="11" font-weight="700" fill="#333" text-anchor="middle">28%</text>
  <text x="365" y="360" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Adv. Train</text>
  <text x="365" y="375" font-size="8" fill="#555" text-anchor="middle">(robust acc.)</text>

  <!-- Bar 4: Randomized Smoothing (certified) -->
  <rect x="430" y="195" width="70" height="145" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="465" y="220" font-size="11" font-weight="700" fill="#333" text-anchor="middle">49%</text>
  <text x="465" y="360" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Cert. Smooth</text>
  <text x="465" y="375" font-size="8" fill="#555" text-anchor="middle">(certified)</text>

  <!-- Drop annotation -->
  <line x1="195" y1="104" x2="225" y2="171" stroke="#c44" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="235" y="140" font-size="9" font-weight="700" fill="#c44">-26%</text>

  <!-- Right side: Cost table -->
  <rect x="550" y="70" width="320" height="200" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="710" y="95" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Robustness Engineering Cost</text>

  <!-- Table -->
  <text x="580" y="125" font-size="9" font-weight="700" fill="#333">Defense</text>
  <text x="730" y="125" font-size="9" font-weight="700" fill="#333">Acc. Drop</text>
  <text x="830" y="125" font-size="9" font-weight="700" fill="#333">Compute</text>
  <line x1="570" y1="132" x2="860" y2="132" stroke="#bbb" stroke-width="0.8"/>

  <text x="580" y="152" font-size="8.5" fill="#555">Adversarial Training</text>
  <text x="745" y="152" font-size="8.5" fill="#c44">-26%</text>
  <text x="830" y="152" font-size="8.5" fill="#c44">8–10x</text>

  <text x="580" y="172" font-size="8.5" fill="#555">Certified Smoothing</text>
  <text x="745" y="172" font-size="8.5" fill="#c44">-14%</text>
  <text x="830" y="172" font-size="8.5" fill="#c44">100Kx inf.</text>

  <text x="580" y="192" font-size="8.5" fill="#555">Ensemble Methods</text>
  <text x="745" y="192" font-size="8.5" fill="#c87b2a">-2%</text>
  <text x="830" y="192" font-size="8.5" fill="#c87b2a">3–5x</text>

  <text x="580" y="212" font-size="8.5" fill="#555">Feature Squeezing</text>
  <text x="745" y="212" font-size="8.5" fill="#3d9e5a">-1%</text>
  <text x="830" y="212" font-size="8.5" fill="#3d9e5a">~1x</text>

  <text x="580" y="232" font-size="8.5" fill="#555">Input Sanitization</text>
  <text x="745" y="232" font-size="8.5" fill="#3d9e5a">-0.5%</text>
  <text x="830" y="232" font-size="8.5" fill="#3d9e5a">~1x</text>

  <text x="580" y="252" font-size="8.5" fill="#555">Drift Monitoring</text>
  <text x="745" y="252" font-size="8.5" fill="#3d9e5a">0%</text>
  <text x="830" y="252" font-size="8.5" fill="#3d9e5a">+5–15%</text>

  <!-- Key insight box -->
  <rect x="550" y="290" width="320" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="710" y="315" font-size="10" font-weight="700" fill="#333" text-anchor="middle">The Fundamental Trade-off</text>
  <text x="710" y="335" font-size="9" fill="#555" text-anchor="middle">Robustness cannot be "turned on" for free.</text>
  <text x="710" y="355" font-size="9" fill="#555" text-anchor="middle">Every defense trades accuracy, compute, or both.</text>

  <!-- Bottom: Defense spectrum -->
  <rect x="50" y="400" width="800" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="100" y="422" font-size="9" font-weight="700" fill="#3d9e5a">Cheap</text>
  <text x="450" y="422" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Defense Cost Spectrum</text>
  <text x="800" y="422" font-size="9" font-weight="700" fill="#c44" text-anchor="end">Expensive</text>

  <!-- Gradient bar -->
  <rect x="100" y="433" width="700" height="12" rx="6" fill="url(#costGradient)"/>
  <defs>
    <linearGradient id="costGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4edda"/>
      <stop offset="50%" stop-color="#fdebd0"/>
      <stop offset="100%" stop-color="#f9d6d5"/>
    </linearGradient>
  </defs>
  <text x="130" y="443" font-size="7" fill="#333">Monitoring</text>
  <text x="280" y="443" font-size="7" fill="#333">Squeezing</text>
  <text x="450" y="443" font-size="7" fill="#333" text-anchor="middle">Ensembles</text>
  <text x="620" y="443" font-size="7" fill="#333">Adv. Training</text>
  <text x="760" y="443" font-size="7" fill="#333">Certified</text>

  <!-- Footnote -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Certified smoothing requires 100,000 noise samples per inference — restricting it to offline auditing</text>
</svg>