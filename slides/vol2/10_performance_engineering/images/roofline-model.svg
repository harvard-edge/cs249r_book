<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Roofline Model: Diagnose Before You Optimize</text>

  <!-- ===== Axes ===== -->
  <!-- Y-axis -->
  <line x1="100" y1="60" x2="100" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="30" y="230" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90 30 230)">Attainable TFLOPS</text>
  <!-- Y labels (log scale visual) -->
  <text x="90" y="390" font-size="8" fill="#555" text-anchor="end">1</text>
  <text x="90" y="330" font-size="8" fill="#555" text-anchor="end">10</text>
  <text x="90" y="270" font-size="8" fill="#555" text-anchor="end">100</text>
  <text x="90" y="210" font-size="8" fill="#555" text-anchor="end">500</text>
  <text x="90" y="150" font-size="8" fill="#555" text-anchor="end">989</text>
  <text x="90" y="90" font-size="8" fill="#555" text-anchor="end">2000</text>

  <!-- X-axis -->
  <line x1="100" y1="400" x2="830" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="465" y="435" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Arithmetic Intensity (FLOP/byte)</text>
  <!-- X labels -->
  <text x="140" y="415" font-size="8" fill="#555" text-anchor="middle">1</text>
  <text x="260" y="415" font-size="8" fill="#555" text-anchor="middle">10</text>
  <text x="440" y="415" font-size="8" fill="#555" text-anchor="middle">100</text>
  <text x="580" y="415" font-size="8" fill="#555" text-anchor="middle">295</text>
  <text x="700" y="415" font-size="8" fill="#555" text-anchor="middle">1000</text>

  <!-- ===== Bandwidth Ceiling (sloped) ===== -->
  <line x1="140" y1="370" x2="580" y2="150" stroke="#4a90c4" stroke-width="2.5"/>
  <text x="320" y="235" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle" transform="rotate(-30 320 235)">BW Ceiling: 3.35 TB/s</text>

  <!-- ===== Compute Ceiling (flat) ===== -->
  <line x1="580" y1="150" x2="820" y2="150" stroke="#c44" stroke-width="2.5"/>
  <text x="700" y="140" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Compute Ceiling: 989 TFLOPS</text>

  <!-- ===== Ridge Point ===== -->
  <circle cx="580" cy="150" r="6" fill="#a31f34"/>
  <text x="580" y="118" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Ridge Point</text>
  <text x="580" y="132" font-size="8.5" fill="#a31f34" text-anchor="middle">295 FLOP/byte</text>

  <!-- ===== Memory-Bound Region ===== -->
  <rect x="110" y="55" width="460" height="30" fill="#cfe2f3" stroke="none" opacity="0.3"/>
  <text x="340" y="74" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">MEMORY-BOUND</text>

  <!-- ===== Compute-Bound Region ===== -->
  <rect x="590" y="55" width="220" height="30" fill="#f9d6d5" stroke="none" opacity="0.3"/>
  <text x="700" y="74" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">COMPUTE-BOUND</text>

  <!-- ===== Workload markers ===== -->
  <!-- LLM Decode (AI ~2) -->
  <circle cx="180" cy="340" r="8" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="180" y="360" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">LLM Decode</text>
  <text x="180" y="372" font-size="7.5" fill="#555" text-anchor="middle">~2 FLOP/byte</text>

  <!-- LayerNorm (AI ~5) -->
  <circle cx="225" cy="320" r="7" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="225" y="310" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">LayerNorm</text>
  <text x="225" y="298" font-size="7.5" fill="#555" text-anchor="middle">~5 FLOP/byte</text>

  <!-- Attention naive (AI ~10) -->
  <circle cx="270" cy="295" r="7" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="315" y="280" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Attention (naive)</text>
  <text x="315" y="292" font-size="7.5" fill="#555" text-anchor="middle">~10 FLOP/byte</text>

  <!-- Large GEMM (AI ~200) -->
  <circle cx="530" cy="175" r="8" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="480" y="175" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Large GEMM</text>
  <text x="480" y="190" font-size="7.5" fill="#555" text-anchor="middle">~200 FLOP/byte</text>

  <!-- Batched GEMM (AI >500) -->
  <circle cx="650" cy="155" r="7" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="690" y="170" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Batched GEMM</text>
  <text x="690" y="182" font-size="7.5" fill="#555" text-anchor="middle">>500 FLOP/byte</text>

  <!-- ===== Optimization arrows ===== -->
  <text x="450" y="455" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Optimization Strategy by Region</text>

  <!-- Memory-bound solutions -->
  <rect x="110" y="460" width="360" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="290" y="477" font-size="8.5" fill="#333" text-anchor="middle">Fusion, Tiling (FlashAttention), Precision (FP8/INT4)</text>

  <!-- Compute-bound solutions -->
  <rect x="490" y="460" width="340" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="660" y="477" font-size="8.5" fill="#333" text-anchor="middle">Tensor Cores, Algorithmic (MoE), FP8 Compute</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="498" font-size="9" font-style="italic" fill="#999" text-anchor="middle">H100 FP16 Roofline. Most transformer inference is memory-bound (left of ridge).</text>
</svg>
