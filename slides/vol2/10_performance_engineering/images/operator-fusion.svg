<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Operator Fusion: Eliminating HBM Round-Trips</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="40" x2="450" y2="460" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Unfused ===== -->
  <text x="225" y="55" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Unfused: 5 HBM Transfers</text>

  <!-- HBM box left -->
  <rect x="30" y="75" width="100" height="350" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="80" y="95" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">HBM</text>
  <text x="80" y="110" font-size="7.5" fill="#555" text-anchor="middle">(Off-Chip)</text>

  <!-- GEMM kernel -->
  <rect x="175" y="90" width="130" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="110" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GEMM</text>
  <text x="240" y="125" font-size="7.5" fill="#555" text-anchor="middle">XW + b</text>

  <!-- Z1 intermediate -->
  <rect x="175" y="155" width="130" height="30" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="240" y="175" font-size="8" fill="#c44" text-anchor="middle">Z1 in HBM (16 MB)</text>

  <!-- GELU kernel -->
  <rect x="175" y="205" width="130" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="225" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GELU</text>
  <text x="240" y="240" font-size="7.5" fill="#555" text-anchor="middle">activation</text>

  <!-- Z2 intermediate -->
  <rect x="175" y="270" width="130" height="30" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="240" y="290" font-size="8" fill="#c44" text-anchor="middle">Z2 in HBM (16 MB)</text>

  <!-- LayerNorm kernel -->
  <rect x="175" y="320" width="130" height="45" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="240" y="340" font-size="9" font-weight="700" fill="#333" text-anchor="middle">LayerNorm</text>
  <text x="240" y="355" font-size="7.5" fill="#555" text-anchor="middle">normalize</text>

  <!-- Arrows left side (HBM transfers) -->
  <line x1="130" y1="112" x2="173" y2="112" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="175" y1="130" x2="132" y2="160" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="130" y1="170" x2="173" y2="225" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="175" y1="245" x2="132" y2="275" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="130" y1="285" x2="173" y2="340" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Transfer count labels -->
  <rect x="340" y="180" width="80" height="25" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="380" y="197" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">32 MB wasted</text>

  <!-- ===== RIGHT: Fused ===== -->
  <text x="675" y="55" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fused: 2 HBM Transfers</text>

  <!-- HBM box right -->
  <rect x="490" y="75" width="100" height="350" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="540" y="95" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">HBM</text>
  <text x="540" y="110" font-size="7.5" fill="#555" text-anchor="middle">(Off-Chip)</text>

  <!-- Fused kernel -->
  <rect x="635" y="90" width="220" height="280" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="745" y="115" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Single Fused Kernel</text>

  <!-- Inner SRAM box -->
  <rect x="650" y="130" width="190" height="220" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="745" y="152" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">SRAM (On-Chip)</text>

  <!-- Inner operations -->
  <rect x="665" y="165" width="160" height="35" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="745" y="187" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GEMM (XW+b)</text>

  <text x="745" y="215" font-size="9" fill="#555" text-anchor="middle">stays in SRAM</text>

  <rect x="665" y="225" width="160" height="35" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="745" y="247" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GELU</text>

  <text x="745" y="275" font-size="9" fill="#555" text-anchor="middle">stays in SRAM</text>

  <rect x="665" y="285" width="160" height="35" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="745" y="307" font-size="9" font-weight="700" fill="#333" text-anchor="middle">LayerNorm</text>

  <!-- Only 2 arrows for fused -->
  <line x1="590" y1="170" x2="633" y2="170" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="611" y="163" font-size="7.5" fill="#3d9e5a" text-anchor="middle">Read X,W</text>
  <line x1="635" y1="360" x2="592" y2="360" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="611" y="375" font-size="7.5" fill="#3d9e5a" text-anchor="middle">Write Y</text>

  <!-- ===== Summary bar ===== -->
  <rect x="60" y="440" width="340" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="230" y="460" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Unfused: 5 HBM round-trips, 32 MB wasted</text>

  <rect x="500" y="440" width="340" height="30" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="670" y="460" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fused: 2 HBM accesses, zero intermediate traffic</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Y = LayerNorm(GELU(XW + b)) — hidden=4096, batch=2048, FP16</text>
</svg>
