<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Iron Law Diagnostic: Profile First, Then Optimize</text>

  <!-- ===== Profile (top) ===== -->
  <rect x="325" y="50" width="250" height="50" fill="#f7f7f7" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Profile Workload</text>

  <!-- Arrow down -->
  <line x1="450" y1="100" x2="450" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Decision diamond (simulated with rotated square) ===== -->
  <rect x="350" y="135" width="200" height="45" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="157" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Which term dominates?</text>
  <text x="450" y="172" font-size="8.5" fill="#555" text-anchor="middle">max(Compute/FLOPS, Memory/BW) + Overhead</text>

  <!-- Three branches -->
  <!-- Left: Memory-Bound -->
  <line x1="350" y1="157" x2="120" y2="157" stroke="#4a90c4" stroke-width="1.5"/>
  <line x1="120" y1="157" x2="120" y2="210" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="235" y="148" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Memory-Bound</text>

  <!-- Center: Compute-Bound -->
  <line x1="450" y1="180" x2="450" y2="210" stroke="#c44" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="200" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Compute-Bound</text>

  <!-- Right: Overhead-Bound -->
  <line x1="550" y1="157" x2="780" y2="157" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="780" y1="157" x2="780" y2="210" stroke="#c87b2a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="665" y="148" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Overhead-Bound</text>

  <!-- ===== Memory-Bound solutions ===== -->
  <rect x="20" y="212" width="200" height="200" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="120" y="235" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Memory-Bound</text>
  <text x="120" y="252" font-size="8.5" fill="#555" text-anchor="middle">AI &lt; Ridge Point</text>

  <rect x="35" y="265" width="170" height="28" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="120" y="280" font-size="8.5" fill="#333" text-anchor="middle">1. Precision (FP8/INT4)</text>
  <text x="120" y="293" font-size="7" fill="#555" text-anchor="middle">2x-4x effective bandwidth</text>

  <rect x="35" y="300" width="170" height="28" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="120" y="315" font-size="8.5" fill="#333" text-anchor="middle">2. Fusion (FlashAttention)</text>
  <text x="120" y="328" font-size="7" fill="#555" text-anchor="middle">Eliminate HBM round-trips</text>

  <rect x="35" y="335" width="170" height="28" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="120" y="350" font-size="8.5" fill="#333" text-anchor="middle">3. Graph Compilation</text>
  <text x="120" y="363" font-size="7" fill="#555" text-anchor="middle">Remaining fusion opportunities</text>

  <rect x="35" y="370" width="170" height="28" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="120" y="385" font-size="8.5" fill="#333" text-anchor="middle">4. Spec. Decoding / MoE</text>
  <text x="120" y="398" font-size="7" fill="#555" text-anchor="middle">Algorithmic change</text>

  <!-- ===== Compute-Bound solutions ===== -->
  <rect x="350" y="212" width="200" height="200" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="235" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Compute-Bound</text>
  <text x="450" y="252" font-size="8.5" fill="#555" text-anchor="middle">AI &gt; Ridge Point</text>

  <rect x="365" y="265" width="170" height="28" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="450" y="280" font-size="8.5" fill="#333" text-anchor="middle">1. Tensor Cores (FP16/BF16)</text>
  <text x="450" y="293" font-size="7" fill="#555" text-anchor="middle">Not FP32!</text>

  <rect x="365" y="300" width="170" height="28" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="450" y="315" font-size="8.5" fill="#333" text-anchor="middle">2. Graph Compilation</text>
  <text x="450" y="328" font-size="7" fill="#555" text-anchor="middle">Kernel selection, autotuning</text>

  <rect x="365" y="335" width="170" height="28" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="450" y="350" font-size="8.5" fill="#333" text-anchor="middle">3. FP8 Compute (2x peak)</text>
  <text x="450" y="363" font-size="7" fill="#555" text-anchor="middle">E4M3 weights, E5M2 grads</text>

  <rect x="365" y="370" width="170" height="28" fill="#fff" stroke="#c44" stroke-width="1"/>
  <text x="450" y="385" font-size="8.5" fill="#333" text-anchor="middle">4. Comm-Comp Overlap</text>
  <text x="450" y="398" font-size="7" fill="#555" text-anchor="middle">Hide AllReduce latency</text>

  <!-- ===== Overhead-Bound solutions ===== -->
  <rect x="680" y="212" width="200" height="200" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="780" y="235" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Overhead-Bound</text>
  <text x="780" y="252" font-size="8.5" fill="#555" text-anchor="middle">Launch, sync, comms</text>

  <rect x="695" y="265" width="170" height="28" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="780" y="280" font-size="8.5" fill="#333" text-anchor="middle">1. CUDA Graphs</text>
  <text x="780" y="293" font-size="7" fill="#555" text-anchor="middle">15ms to &lt;0.1ms launch</text>

  <rect x="695" y="300" width="170" height="28" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="780" y="315" font-size="8.5" fill="#333" text-anchor="middle">2. torch.compile</text>
  <text x="780" y="328" font-size="7" fill="#555" text-anchor="middle">Eliminate Python overhead</text>

  <rect x="695" y="335" width="170" height="28" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="780" y="350" font-size="8.5" fill="#333" text-anchor="middle">3. Gradient Compression</text>
  <text x="780" y="363" font-size="7" fill="#555" text-anchor="middle">Reduce comm volume</text>

  <rect x="695" y="370" width="170" height="28" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <text x="780" y="385" font-size="8.5" fill="#333" text-anchor="middle">4. Zero-Bubble Pipeline</text>
  <text x="780" y="398" font-size="7" fill="#555" text-anchor="middle">Minimize idle time</text>

  <!-- ===== Reprofile arrow ===== -->
  <rect x="250" y="435" width="400" height="35" fill="#f7f7f7" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="457" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">REPROFILE: Bottleneck shifts after each optimization</text>

  <!-- Loop arrows -->
  <path d="M 250,452 L 120,452 L 120,415" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 650,452 L 780,452 L 780,415" stroke="#a31f34" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="450" y1="435" x2="450" y2="415" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Optimizing the wrong term yields zero improvement. Profile before every optimization decision.</text>
</svg>
