<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Precision Engineering: Fewer Bytes, More Throughput</text>

  <!-- ===== FP16 vs FP8 vs INT4 comparison ===== -->
  <text x="450" y="60" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Numerical Formats and Their Trade-offs</text>

  <!-- FP16 -->
  <rect x="40" y="80" width="260" height="110" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FP16 (Baseline)</text>
  <rect x="60" y="115" width="220" height="16" rx="2" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <rect x="60" y="115" width="20" height="16" rx="0" fill="#4a90c4"/>
  <text x="70" y="127" font-size="7" fill="#fff" text-anchor="middle">S</text>
  <rect x="80" y="115" width="50" height="16" rx="0" fill="#7ab8e0"/>
  <text x="105" y="127" font-size="7" fill="#fff" text-anchor="middle">5-bit exp</text>
  <rect x="130" y="115" width="150" height="16" rx="0" fill="#c0daf0"/>
  <text x="205" y="127" font-size="7" fill="#333" text-anchor="middle">10-bit mantissa</text>
  <text x="170" y="152" font-size="9" fill="#555" text-anchor="middle">16 bits | 2 bytes per weight</text>
  <text x="170" y="168" font-size="9" fill="#555" text-anchor="middle">Baseline bandwidth: 1x</text>

  <!-- FP8 E4M3 -->
  <rect x="320" y="80" width="260" height="110" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FP8 E4M3 (Weights)</text>
  <rect x="340" y="115" width="110" height="16" rx="2" fill="#fff" stroke="#3d9e5a" stroke-width="1"/>
  <rect x="340" y="115" width="14" height="16" rx="0" fill="#3d9e5a"/>
  <text x="347" y="127" font-size="7" fill="#fff" text-anchor="middle">S</text>
  <rect x="354" y="115" width="40" height="16" rx="0" fill="#6bc47a"/>
  <text x="374" y="127" font-size="7" fill="#fff" text-anchor="middle">4-bit</text>
  <rect x="394" y="115" width="56" height="16" rx="0" fill="#a9ddb4"/>
  <text x="422" y="127" font-size="7" fill="#333" text-anchor="middle">3-bit</text>
  <text x="450" y="152" font-size="9" fill="#555" text-anchor="middle">8 bits | 1 byte per weight</text>
  <text x="450" y="168" font-size="9" fill="#3d9e5a" font-weight="700" text-anchor="middle">Effective bandwidth: 2x</text>

  <!-- INT4 -->
  <rect x="600" y="80" width="260" height="110" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="730" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">INT4 (GPTQ / AWQ)</text>
  <rect x="620" y="115" width="56" height="16" rx="2" fill="#fff" stroke="#c87b2a" stroke-width="1"/>
  <rect x="620" y="115" width="56" height="16" rx="0" fill="#e6c58a"/>
  <text x="648" y="127" font-size="7" fill="#333" text-anchor="middle">4 bits</text>
  <text x="700" y="127" font-size="8" fill="#555" text-anchor="start">+ scale per block</text>
  <text x="730" y="152" font-size="9" fill="#555" text-anchor="middle">4.25 bits effective (B=64)</text>
  <text x="730" y="168" font-size="9" fill="#c87b2a" font-weight="700" text-anchor="middle">Effective bandwidth: ~4x</text>

  <!-- ===== Outlier Problem ===== -->
  <text x="450" y="220" font-size="11" font-weight="700" fill="#333" text-anchor="middle">The Outlier Challenge in LLMs</text>

  <!-- Normal distribution -->
  <rect x="40" y="240" width="400" height="100" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="240" y="260" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Activation Distribution</text>
  <!-- Simplified histogram -->
  <rect x="80" y="310" width="30" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
  <rect x="115" y="290" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
  <rect x="150" y="275" width="30" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
  <rect x="185" y="275" width="30" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
  <rect x="220" y="290" width="30" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
  <rect x="255" y="310" width="30" height="10" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.5"/>
  <!-- Outlier -->
  <rect x="370" y="300" width="30" height="20" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="385" y="296" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Outlier</text>
  <text x="385" y="335" font-size="7.5" fill="#555" text-anchor="middle">10-100x larger</text>
  <text x="240" y="330" font-size="8" fill="#555" text-anchor="middle">99% of values</text>

  <!-- Solutions -->
  <rect x="460" y="240" width="400" height="100" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="260" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Outlier-Aware Solutions</text>
  <text x="660" y="280" font-size="8.5" fill="#555" text-anchor="middle">LLM.int8(): Mixed-precision decomposition (runtime)</text>
  <text x="660" y="296" font-size="8.5" fill="#555" text-anchor="middle">GPTQ: Second-order weight quantization (INT4)</text>
  <text x="660" y="312" font-size="8.5" fill="#555" text-anchor="middle">AWQ: Activation-aware scaling (10-100x faster)</text>
  <text x="660" y="328" font-size="8.5" fill="#555" text-anchor="middle">SmoothQuant: Smooth activations before quantization</text>

  <!-- ===== Impact table ===== -->
  <text x="450" y="375" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Production Impact: 70B LLM Serving</text>

  <!-- Table -->
  <rect x="80" y="390" width="740" height="25" rx="0" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="180" y="407" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Technique</text>
  <text x="350" y="407" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Weight Size</text>
  <text x="500" y="407" font-size="9" font-weight="700" fill="#333" text-anchor="middle">BW Savings</text>
  <text x="650" y="407" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Quality Impact</text>

  <line x1="80" y1="415" x2="820" y2="415" stroke="#bbb" stroke-width="0.5"/>
  <text x="180" y="432" font-size="8.5" fill="#555" text-anchor="middle">FP16 (baseline)</text>
  <text x="350" y="432" font-size="8.5" fill="#555" text-anchor="middle">140 GB</text>
  <text x="500" y="432" font-size="8.5" fill="#555" text-anchor="middle">1x</text>
  <text x="650" y="432" font-size="8.5" fill="#555" text-anchor="middle">None</text>

  <line x1="80" y1="440" x2="820" y2="440" stroke="#eee" stroke-width="0.5"/>
  <text x="180" y="457" font-size="8.5" fill="#555" text-anchor="middle">INT8 (LLM.int8())</text>
  <text x="350" y="457" font-size="8.5" fill="#555" text-anchor="middle">70 GB</text>
  <text x="500" y="457" font-size="8.5" fill="#3d9e5a" font-weight="700" text-anchor="middle">2x</text>
  <text x="650" y="457" font-size="8.5" fill="#555" text-anchor="middle">Minimal (< 0.1 PPL)</text>

  <line x1="80" y1="465" x2="820" y2="465" stroke="#eee" stroke-width="0.5"/>
  <text x="180" y="482" font-size="8.5" fill="#555" text-anchor="middle">INT4 (AWQ/GPTQ)</text>
  <text x="350" y="482" font-size="8.5" fill="#555" text-anchor="middle">~37 GB</text>
  <text x="500" y="482" font-size="8.5" fill="#3d9e5a" font-weight="700" text-anchor="middle">~4x</text>
  <text x="650" y="482" font-size="8.5" fill="#555" text-anchor="middle">0.5-1.0 PPL increase</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="498" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Halving precision doubles effective bandwidth -- the cheapest performance optimization available.</text>
</svg>
