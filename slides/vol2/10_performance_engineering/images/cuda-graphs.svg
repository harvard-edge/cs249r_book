<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">CUDA Graphs: Eliminating Kernel Launch Overhead</text>

  <!-- Without CUDA Graphs -->
  <rect x="40" y="55" width="820" height="170" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Without CUDA Graphs: Sequential Kernel Launch</text>

  <!-- CPU timeline -->
  <text x="60" y="105" font-size="9" font-weight="700" fill="#333">CPU:</text>
  <rect x="100" y="92" width="60" height="22" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="130" y="107" font-size="7" fill="#333" text-anchor="middle">Launch</text>
  <rect x="170" y="92" width="30" height="22" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <rect x="210" y="92" width="60" height="22" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="240" y="107" font-size="7" fill="#333" text-anchor="middle">Launch</text>
  <rect x="280" y="92" width="30" height="22" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <rect x="320" y="92" width="60" height="22" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="350" y="107" font-size="7" fill="#333" text-anchor="middle">Launch</text>
  <rect x="390" y="92" width="30" height="22" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <rect x="430" y="92" width="60" height="22" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="460" y="107" font-size="7" fill="#333" text-anchor="middle">Launch</text>
  <text x="510" y="107" font-size="7" fill="#555">... 30-100 launches</text>

  <!-- GPU timeline -->
  <text x="60" y="145" font-size="9" font-weight="700" fill="#333">GPU:</text>
  <rect x="130" y="132" width="30" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="145" y="147" font-size="7" fill="#333" text-anchor="middle">K1</text>
  <rect x="170" y="132" width="30" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="185" y="147" font-size="6" fill="#c44" text-anchor="middle">idle</text>
  <rect x="240" y="132" width="30" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="255" y="147" font-size="7" fill="#333" text-anchor="middle">K2</text>
  <rect x="280" y="132" width="30" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="295" y="147" font-size="6" fill="#c44" text-anchor="middle">idle</text>
  <rect x="350" y="132" width="30" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="365" y="147" font-size="7" fill="#333" text-anchor="middle">K3</text>
  <rect x="390" y="132" width="30" height="22" rx="3" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="405" y="147" font-size="6" fill="#c44" text-anchor="middle">idle</text>
  <rect x="460" y="132" width="30" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="475" y="147" font-size="7" fill="#333" text-anchor="middle">K4</text>

  <!-- Overhead annotation -->
  <rect x="600" y="95" width="240" height="60" rx="4" fill="#fff" stroke="#c44" stroke-width="1.2"/>
  <text x="720" y="115" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">30-100 launches x 10 us each</text>
  <text x="720" y="132" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">= 300-1000 us overhead</text>
  <text x="720" y="147" font-size="8" fill="#555" text-anchor="middle">Comparable to compute at B=1</text>

  <!-- Red gap labels -->
  <text x="185" y="170" font-size="7" fill="#c44" text-anchor="middle">gap</text>
  <text x="295" y="170" font-size="7" fill="#c44" text-anchor="middle">gap</text>
  <text x="405" y="170" font-size="7" fill="#c44" text-anchor="middle">gap</text>

  <!-- With CUDA Graphs -->
  <rect x="40" y="240" width="820" height="170" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="450" y="263" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">With CUDA Graphs: Single Graph Replay</text>

  <!-- CPU timeline -->
  <text x="60" y="295" font-size="9" font-weight="700" fill="#333">CPU:</text>
  <rect x="100" y="282" width="80" height="22" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="140" y="297" font-size="7" fill="#333" text-anchor="middle">Graph Replay</text>
  <rect x="190" y="282" width="620" height="22" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8"/>
  <text x="500" y="297" font-size="7" fill="#555" text-anchor="middle">CPU free for other work (prefetching, scheduling)</text>

  <!-- GPU timeline -->
  <text x="60" y="335" font-size="9" font-weight="700" fill="#333">GPU:</text>
  <rect x="110" y="322" width="40" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="130" y="337" font-size="7" fill="#333" text-anchor="middle">K1</text>
  <rect x="151" y="322" width="40" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="171" y="337" font-size="7" fill="#333" text-anchor="middle">K2</text>
  <rect x="192" y="322" width="40" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="212" y="337" font-size="7" fill="#333" text-anchor="middle">K3</text>
  <rect x="233" y="322" width="40" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="253" y="337" font-size="7" fill="#333" text-anchor="middle">K4</text>
  <rect x="274" y="322" width="40" height="22" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="294" y="337" font-size="7" fill="#333" text-anchor="middle">K5</text>
  <text x="340" y="337" font-size="7" fill="#555">... no gaps</text>

  <!-- Result annotation -->
  <rect x="600" y="285" width="240" height="60" rx="4" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="720" y="305" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Single replay: &lt;10 us total</text>
  <text x="720" y="322" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">30-100x launch reduction</text>
  <text x="720" y="337" font-size="8" fill="#555" text-anchor="middle">Zero inter-kernel gaps</text>

  <!-- When it matters -->
  <rect x="40" y="430" width="390" height="45" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="235" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Critical at B=1 decode: kernels are tiny</text>
  <text x="235" y="465" font-size="8" fill="#555" text-anchor="middle">Launch overhead > kernel execution time</text>

  <rect x="470" y="430" width="390" height="45" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="665" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Less important at B=256: kernels are large</text>
  <text x="665" y="465" font-size="8" fill="#555" text-anchor="middle">Launch overhead negligible vs kernel time</text>

  <text x="450" y="495" font-size="9" fill="#999" text-anchor="middle" font-style="italic">CUDA Graphs eliminate gaps between kernels -- they do not speed up the kernels themselves</text>
</svg>
