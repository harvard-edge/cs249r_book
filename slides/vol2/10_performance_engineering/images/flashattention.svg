<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">FlashAttention: Tiled Attention as a System Primitive</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="42" x2="450" y2="430" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Naive Attention ===== -->
  <text x="225" y="58" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Naive: Materialize N x N in HBM</text>

  <!-- Q, K, V in HBM -->
  <rect x="40" y="80" width="80" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="80" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Q</text>
  <text x="80" y="115" font-size="7.5" fill="#555" text-anchor="middle">8192 x 128</text>
  <text x="80" y="130" font-size="7.5" fill="#555" text-anchor="middle">2 MB</text>

  <rect x="130" y="80" width="80" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="170" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">K</text>
  <text x="170" y="115" font-size="7.5" fill="#555" text-anchor="middle">8192 x 128</text>

  <rect x="220" y="80" width="80" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="260" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">V</text>
  <text x="260" y="115" font-size="7.5" fill="#555" text-anchor="middle">8192 x 128</text>

  <!-- Attention matrix -->
  <rect x="80" y="210" width="200" height="120" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="180" y="255" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">S = QK^T</text>
  <text x="180" y="275" font-size="9" fill="#c44" text-anchor="middle">8192 x 8192</text>
  <text x="180" y="292" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">128 MB / head!</text>
  <text x="180" y="310" font-size="8" fill="#555" text-anchor="middle">x32 heads = 4 GB / layer</text>

  <!-- Arrow Q*K to S -->
  <line x1="180" y1="180" x2="180" y2="208" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="180" y="200" font-size="7.5" fill="#a31f34" text-anchor="middle">Materialize in HBM</text>

  <!-- Output -->
  <rect x="120" y="360" width="120" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="180" y="385" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Output O</text>
  <text x="180" y="398" font-size="7.5" fill="#555" text-anchor="middle">softmax(S) x V</text>

  <line x1="180" y1="330" x2="180" y2="358" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== RIGHT: FlashAttention ===== -->
  <text x="675" y="58" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">FlashAttention: Tile in SRAM</text>

  <!-- Q,K,V tiles -->
  <rect x="490" y="80" width="60" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="520" y="108" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Q tile</text>
  <text x="520" y="122" font-size="7" fill="#555" text-anchor="middle">Br x d</text>

  <rect x="560" y="80" width="60" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="590" y="108" font-size="8" font-weight="700" fill="#333" text-anchor="middle">K tile</text>
  <text x="590" y="122" font-size="7" fill="#555" text-anchor="middle">Bc x d</text>

  <rect x="630" y="80" width="60" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="660" y="108" font-size="8" font-weight="700" fill="#333" text-anchor="middle">V tile</text>
  <text x="660" y="122" font-size="7" fill="#555" text-anchor="middle">Bc x d</text>

  <!-- SRAM processing box -->
  <rect x="480" y="170" width="380" height="170" fill="#d4edda" stroke="#3d9e5a" stroke-width="2"/>
  <text x="670" y="192" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">On-Chip SRAM Processing</text>

  <!-- Inner tile operations -->
  <rect x="500" y="205" width="140" height="40" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="570" y="222" font-size="8" font-weight="700" fill="#333" text-anchor="middle">S_tile = Q_tile * K_tile^T</text>
  <text x="570" y="236" font-size="7" fill="#555" text-anchor="middle">Br x Bc (fits SRAM)</text>

  <rect x="500" y="255" width="140" height="35" fill="#fff" stroke="#4a90c4" stroke-width="1"/>
  <text x="570" y="275" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Online Softmax</text>

  <rect x="660" y="205" width="180" height="85" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="750" y="228" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Key Innovation</text>
  <text x="750" y="245" font-size="8" fill="#555" text-anchor="middle">Online softmax computes</text>
  <text x="750" y="258" font-size="8" fill="#555" text-anchor="middle">exact result without</text>
  <text x="750" y="271" font-size="8" fill="#555" text-anchor="middle">materializing full N x N</text>
  <text x="750" y="284" font-size="8" fill="#555" text-anchor="middle">matrix in HBM</text>

  <!-- Accumulator -->
  <rect x="490" y="310" width="120" height="35" fill="#fff" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="550" y="332" font-size="8" font-weight="700" fill="#333" text-anchor="middle">O += P_tile * V_tile</text>

  <!-- Loop arrow -->
  <path d="M 520,345 L 520,370 L 870,370 L 870,100 L 700,100" stroke="#3d9e5a" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="870" y="240" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="start" transform="rotate(90 870 240)">Next tile</text>

  <!-- Output -->
  <rect x="620" y="360" width="120" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="385" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Output O</text>
  <text x="680" y="398" font-size="7.5" fill="#3d9e5a" text-anchor="middle">Exact same result</text>

  <!-- ===== Comparison bar ===== -->
  <rect x="40" y="420" width="400" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="240" y="440" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Naive: O(N^2) HBM traffic | 128 MB/head | 4 GB/layer</text>

  <rect x="460" y="420" width="400" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="660" y="440" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Flash: O(N) HBM traffic | ~65x reduction</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">seq_len=8192, head_dim=128, 32 heads, FP16. Tiling keeps intermediates in fast SRAM.</text>
</svg>
