<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Optimization Playbook: Sequencing Matters</text>

  <!-- ===== Optimization sequence (top to bottom) ===== -->
  <!-- Step 1 -->
  <rect x="40" y="50" width="820" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="40" y="50" width="40" height="55" fill="#4a90c4"/>
  <text x="60" y="83" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="100" y="70" font-size="10" font-weight="700" fill="#333" text-anchor="start">torch.compile</text>
  <text x="100" y="85" font-size="8.5" fill="#555" text-anchor="start">1 line of code | 10-40% speedup | No downsides</text>
  <rect x="660" y="58" width="180" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="750" y="73" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Always apply first</text>
  <text x="100" y="98" font-size="8" fill="#999" text-anchor="start">Automates fusion + kernel selection. Passive optimization.</text>

  <line x1="450" y1="105" x2="450" y2="115" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="40" y="117" width="820" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="40" y="117" width="40" height="55" fill="#c87b2a"/>
  <text x="60" y="150" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="100" y="137" font-size="10" font-weight="700" fill="#333" text-anchor="start">Weight Quantization (INT4 / FP8)</text>
  <text x="100" y="152" font-size="8.5" fill="#555" text-anchor="start">Hours of calibration | 2-4x throughput | Frees memory for batching</text>
  <rect x="660" y="125" width="180" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="750" y="140" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">AWQ preferred for INT4</text>
  <text x="100" y="165" font-size="8" fill="#999" text-anchor="start">Reduces bytes/weight. May shift bottleneck from memory to compute.</text>

  <line x1="450" y1="172" x2="450" y2="182" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="40" y="184" width="820" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="40" y="184" width="40" height="55" fill="#3d9e5a"/>
  <text x="60" y="217" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="100" y="204" font-size="10" font-weight="700" fill="#333" text-anchor="start">FlashAttention</text>
  <text x="100" y="219" font-size="8.5" fill="#555" text-anchor="start">Library swap | 2-32x for attention | Usually a config flag</text>
  <rect x="660" y="192" width="180" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="750" y="207" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">O(N^2) to O(N) HBM</text>
  <text x="100" y="232" font-size="8" fill="#999" text-anchor="start">Eliminates N x N attention matrix materialization in HBM.</text>

  <line x1="450" y1="239" x2="450" y2="249" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="40" y="251" width="820" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="40" y="251" width="40" height="55" fill="#4a90c4"/>
  <text x="60" y="284" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="100" y="271" font-size="10" font-weight="700" fill="#333" text-anchor="start">KV Cache Compression (INT8)</text>
  <text x="100" y="286" font-size="8.5" fill="#555" text-anchor="start">Library support | 2x cache reduction | Enables larger batches</text>
  <rect x="660" y="259" width="180" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="750" y="274" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Synergistic with #2</text>
  <text x="100" y="299" font-size="8" fill="#999" text-anchor="start">Combined with quantization, frees enough memory for 2x batch size.</text>

  <line x1="450" y1="306" x2="450" y2="316" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <rect x="40" y="318" width="820" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <rect x="40" y="318" width="40" height="55" fill="#c44"/>
  <text x="60" y="351" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="100" y="338" font-size="10" font-weight="700" fill="#333" text-anchor="start">Speculative Decoding</text>
  <text x="100" y="353" font-size="8.5" fill="#555" text-anchor="start">Requires draft model | Engineering effort | Only if latency target not met</text>
  <rect x="660" y="326" width="180" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="750" y="341" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">Most complex to deploy</text>
  <text x="100" y="366" font-size="8" fill="#999" text-anchor="start">Best at batch=1 (memory-bound). Overhead at large batches.</text>

  <!-- ===== Key principle ===== -->
  <rect x="40" y="390" width="820" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="412" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">Key Principle: Passive optimizations first, then active algorithmic changes</text>
  <text x="450" y="430" font-size="9" fill="#555" text-anchor="middle">Each step shifts the bottleneck. Reprofile after every optimization before proceeding.</text>

  <!-- ===== Reprofile loop ===== -->
  <path d="M 870,105 Q 890,230 870,360" stroke="#a31f34" stroke-width="2" fill="none" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="885" y="235" font-size="8" font-weight="700" fill="#a31f34" text-anchor="start" transform="rotate(90 885 235)">Reprofile</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="465" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Optimizations compound but interact: INT4 may shift bottleneck from memory to compute, changing the next step.</text>
</svg>
