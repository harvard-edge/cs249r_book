<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Memory Wall: Compute vs. Bandwidth</text>

  <!-- ===== Left: GPU Compute ===== -->
  <rect x="40" y="60" width="200" height="80" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="90" font-size="11" font-weight="700" fill="#333" text-anchor="middle">GPU Compute</text>
  <text x="140" y="108" font-size="9" fill="#555" text-anchor="middle">1,979 TFLOPS (FP8)</text>
  <text x="140" y="125" font-size="9" fill="#555" text-anchor="middle">989 TFLOPS (FP16)</text>

  <!-- ===== Right: HBM Memory ===== -->
  <rect x="660" y="60" width="200" height="80" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="760" y="90" font-size="11" font-weight="700" fill="#333" text-anchor="middle">HBM3 Memory</text>
  <text x="760" y="108" font-size="9" fill="#555" text-anchor="middle">80 GB Capacity</text>
  <text x="760" y="125" font-size="9" fill="#555" text-anchor="middle">3.35 TB/s Bandwidth</text>

  <!-- ===== The Wall (center) ===== -->
  <rect x="330" y="55" width="240" height="90" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="2"/>
  <text x="450" y="82" font-size="12" font-weight="700" fill="#a31f34" text-anchor="middle">THE MEMORY WALL</text>
  <text x="450" y="100" font-size="9" fill="#555" text-anchor="middle">Ridge Point: 295 FLOP/byte (FP16)</text>
  <text x="450" y="117" font-size="9" fill="#555" text-anchor="middle">591 FLOP/byte (FP8)</text>
  <text x="450" y="134" font-size="8.5" fill="#999" text-anchor="middle">Compute starves for data below ridge</text>

  <!-- ===== Arrows ===== -->
  <line x1="240" y1="100" x2="328" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="100" x2="572" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Memory Hierarchy (bottom section) ===== -->
  <text x="450" y="180" font-size="12" font-weight="700" fill="#333" text-anchor="middle">GPU Memory Hierarchy</text>

  <!-- Registers -->
  <rect x="60" y="200" width="160" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="222" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Registers</text>
  <text x="140" y="238" font-size="8.5" fill="#555" text-anchor="middle">256 KB/SM | ~0.01 pJ</text>
  <text x="140" y="252" font-size="8.5" fill="#555" text-anchor="middle">1 cycle latency</text>

  <!-- Shared Memory / SRAM -->
  <rect x="250" y="200" width="160" height="60" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="330" y="222" font-size="10" font-weight="700" fill="#333" text-anchor="middle">SRAM (Shared)</text>
  <text x="330" y="238" font-size="8.5" fill="#555" text-anchor="middle">228 KB/SM | ~0.5 pJ</text>
  <text x="330" y="252" font-size="8.5" fill="#555" text-anchor="middle">~20 ns latency</text>

  <!-- L2 Cache -->
  <rect x="440" y="200" width="160" height="60" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="520" y="222" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L2 Cache</text>
  <text x="520" y="238" font-size="8.5" fill="#555" text-anchor="middle">50 MB | ~5 pJ</text>
  <text x="520" y="252" font-size="8.5" fill="#555" text-anchor="middle">~130 ns latency</text>

  <!-- HBM -->
  <rect x="630" y="200" width="200" height="60" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="730" y="222" font-size="10" font-weight="700" fill="#333" text-anchor="middle">HBM3</text>
  <text x="730" y="238" font-size="8.5" fill="#555" text-anchor="middle">80 GB | ~640 pJ</text>
  <text x="730" y="252" font-size="8.5" fill="#555" text-anchor="middle">~300 ns latency</text>

  <!-- Arrows between levels -->
  <line x1="220" y1="230" x2="248" y2="230" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="410" y1="230" x2="438" y2="230" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="600" y1="230" x2="628" y2="230" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- ===== Energy Cost comparison ===== -->
  <text x="450" y="300" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Energy Cost: 1,280x Gap Between SRAM and HBM</text>

  <!-- Energy bars -->
  <rect x="100" y="320" width="40" height="10" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="150" y="329" font-size="9" fill="#555" text-anchor="start">SRAM: 0.5 pJ/access</text>

  <rect x="100" y="345" width="512" height="10" rx="2" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="622" y="354" font-size="9" fill="#555" text-anchor="start">HBM: 640 pJ/access</text>

  <!-- ===== Impact at Scale ===== -->
  <rect x="60" y="385" width="370" height="80" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="245" y="407" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Without Fusion (1000 GPUs)</text>
  <text x="245" y="425" font-size="9" fill="#555" text-anchor="middle">Memory power: ~640 W/GPU</text>
  <text x="245" y="441" font-size="9" fill="#c44" text-anchor="middle">Total: 640 kW cluster memory power</text>

  <rect x="470" y="385" width="370" height="80" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="655" y="407" font-size="10" font-weight="700" fill="#333" text-anchor="middle">With Fusion (50% to SRAM)</text>
  <text x="655" y="425" font-size="9" fill="#555" text-anchor="middle">Memory power: ~320 W/GPU</text>
  <text x="655" y="441" font-size="9" fill="#3d9e5a" text-anchor="middle">Saves 320 kW (~250 homes)</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Performance engineering: keep data close to compute, minimize bytes moved per operation</text>
</svg>
