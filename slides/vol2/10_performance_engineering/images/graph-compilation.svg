<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Graph Compilation: From Python to Optimized Kernels</text>

  <!-- ===== Pipeline stages ===== -->
  <!-- Stage 1: Graph Capture -->
  <rect x="30" y="55" width="150" height="65" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="105" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Graph Capture</text>
  <text x="105" y="93" font-size="8" fill="#555" text-anchor="middle">TorchDynamo traces</text>
  <text x="105" y="106" font-size="8" fill="#555" text-anchor="middle">Python bytecode</text>
  <line x1="180" y1="87" x2="210" y2="87" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Graph Optimization -->
  <rect x="212" y="55" width="150" height="65" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="287" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Graph Optimize</text>
  <text x="287" y="93" font-size="8" fill="#555" text-anchor="middle">Algebraic simplify</text>
  <text x="287" y="106" font-size="8" fill="#555" text-anchor="middle">10-30% node reduction</text>
  <line x1="362" y1="87" x2="392" y2="87" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Operator Fusion -->
  <rect x="394" y="55" width="150" height="65" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="469" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Operator Fusion</text>
  <text x="469" y="93" font-size="8" fill="#555" text-anchor="middle">Combine kernels</text>
  <text x="469" y="106" font-size="8" fill="#555" text-anchor="middle">30-50% less HBM traffic</text>
  <line x1="544" y1="87" x2="574" y2="87" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Memory Planning -->
  <rect x="576" y="55" width="150" height="65" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="651" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Memory Plan</text>
  <text x="651" y="93" font-size="8" fill="#555" text-anchor="middle">Buffer reuse</text>
  <text x="651" y="106" font-size="8" fill="#555" text-anchor="middle">O(L) to O(1) memory</text>
  <line x1="726" y1="87" x2="756" y2="87" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Stage 5: Kernel Selection -->
  <rect x="758" y="55" width="120" height="65" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="818" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Kernel Select</text>
  <text x="818" y="93" font-size="8" fill="#555" text-anchor="middle">Triton / cuBLAS</text>
  <text x="818" y="106" font-size="8" fill="#555" text-anchor="middle">Autotuned</text>

  <!-- ===== Three Compilers comparison ===== -->
  <text x="450" y="150" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Three Compilers for Three Deployment Contexts</text>

  <!-- torch.compile -->
  <rect x="30" y="170" width="270" height="190" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="30" y="170" width="270" height="30" fill="#4a90c4"/>
  <text x="165" y="190" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">torch.compile</text>
  <text x="165" y="220" font-size="9" font-weight="700" fill="#333" text-anchor="middle">PyTorch + NVIDIA GPUs</text>
  <text x="50" y="245" font-size="8.5" fill="#555">TorchDynamo: bytecode capture</text>
  <text x="50" y="260" font-size="8.5" fill="#555">TorchInductor: Triton codegen</text>
  <text x="50" y="275" font-size="8.5" fill="#555">Handles graph breaks gracefully</text>
  <text x="50" y="295" font-size="8.5" fill="#555">Compile: seconds</text>
  <text x="50" y="310" font-size="8.5" fill="#555">Speedup: 10-40% (1 line change)</text>
  <rect x="50" y="322" width="230" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="165" y="337" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Best for: Research + Development</text>

  <!-- XLA -->
  <rect x="315" y="170" width="270" height="190" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="315" y="170" width="270" height="30" fill="#3d9e5a"/>
  <text x="450" y="190" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">XLA</text>
  <text x="450" y="220" font-size="9" font-weight="700" fill="#333" text-anchor="middle">JAX + Google TPUs</text>
  <text x="335" y="245" font-size="8.5" fill="#555">Whole-program compilation</text>
  <text x="335" y="260" font-size="8.5" fill="#555">GSPMD auto-partitioning</text>
  <text x="335" y="275" font-size="8.5" fill="#555">TPU systolic array mapping</text>
  <text x="335" y="295" font-size="8.5" fill="#555">Compile: minutes</text>
  <text x="335" y="310" font-size="8.5" fill="#555">MFU: 55-65% (vs 40-55% PyTorch)</text>
  <rect x="335" y="322" width="230" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="450" y="337" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Best for: Large-scale Training</text>

  <!-- TensorRT -->
  <rect x="600" y="170" width="270" height="190" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="600" y="170" width="270" height="30" fill="#c87b2a"/>
  <text x="735" y="190" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">TensorRT</text>
  <text x="735" y="220" font-size="9" font-weight="700" fill="#333" text-anchor="middle">NVIDIA Inference Only</text>
  <text x="620" y="245" font-size="8.5" fill="#555">Calibration-based mixed precision</text>
  <text x="620" y="260" font-size="8.5" fill="#555">Kernel autotuning (exhaustive)</text>
  <text x="620" y="275" font-size="8.5" fill="#555">Static shapes, no backward</text>
  <text x="620" y="295" font-size="8.5" fill="#555">Compile: 30-60 min (70B model)</text>
  <text x="620" y="310" font-size="8.5" fill="#555">1.3-1.8x over torch.compile</text>
  <rect x="620" y="322" width="230" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="735" y="337" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Best for: Production Serving</text>

  <!-- ===== Trade-off spectrum ===== -->
  <text x="450" y="390" font-size="11" font-weight="700" fill="#333" text-anchor="middle">The Flexibility-Performance Trade-off</text>

  <!-- Spectrum bar -->
  <rect x="80" y="405" width="740" height="30" fill="none" stroke="#bbb" stroke-width="1"/>
  <!-- Gradient fill simulated -->
  <rect x="80" y="405" width="247" height="30" fill="#cfe2f3" opacity="0.5"/>
  <rect x="327" y="405" width="246" height="30" fill="#d4edda" opacity="0.5"/>
  <rect x="573" y="405" width="247" height="30" fill="#fdebd0" opacity="0.5"/>

  <text x="203" y="424" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">torch.compile</text>
  <text x="450" y="424" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">XLA</text>
  <text x="696" y="424" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">TensorRT</text>

  <text x="80" y="455" font-size="8.5" fill="#555" text-anchor="start">More Flexible</text>
  <text x="820" y="455" font-size="8.5" fill="#555" text-anchor="end">More Optimized</text>

  <!-- ===== Footnote ===== -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Compilers automate known optimizations; human engineers discover new ones (FlashAttention, MoE).</text>
</svg>
