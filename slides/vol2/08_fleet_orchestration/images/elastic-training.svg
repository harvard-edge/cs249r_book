<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Elastic Training: Dynamic Worker Scaling</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Timeline ===== -->
  <line x1="80" y1="390" x2="820" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="420" font-size="9" fill="#555" text-anchor="middle">Training Progress (time)</text>

  <!-- Time markers -->
  <line x1="120" y1="385" x2="120" y2="395" stroke="#555" stroke-width="1"/>
  <text x="120" y="408" font-size="7.5" fill="#999" text-anchor="middle">t=0</text>
  <line x1="280" y1="385" x2="280" y2="395" stroke="#555" stroke-width="1"/>
  <text x="280" y="408" font-size="7.5" fill="#999" text-anchor="middle">t=1</text>
  <line x1="440" y1="385" x2="440" y2="395" stroke="#555" stroke-width="1"/>
  <text x="440" y="408" font-size="7.5" fill="#999" text-anchor="middle">t=2</text>
  <line x1="600" y1="385" x2="600" y2="395" stroke="#555" stroke-width="1"/>
  <text x="600" y="408" font-size="7.5" fill="#999" text-anchor="middle">t=3</text>
  <line x1="760" y1="385" x2="760" y2="395" stroke="#555" stroke-width="1"/>
  <text x="760" y="408" font-size="7.5" fill="#999" text-anchor="middle">t=4</text>

  <!-- ===== Phase 1: Start with min workers ===== -->
  <rect x="120" y="55" width="140" height="320" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4" opacity="0.3"/>
  <text x="190" y="72" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Phase 1: Quick Start</text>

  <!-- Workers (4) -->
  <rect x="135" y="90" width="50" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="160" y="107" font-size="7.5" fill="#333" text-anchor="middle">Worker 0</text>
  <rect x="195" y="90" width="50" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="220" y="107" font-size="7.5" fill="#333" text-anchor="middle">Worker 1</text>
  <rect x="135" y="120" width="50" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="160" y="137" font-size="7.5" fill="#333" text-anchor="middle">Worker 2</text>
  <rect x="195" y="120" width="50" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="220" y="137" font-size="7.5" fill="#333" text-anchor="middle">Worker 3</text>

  <text x="190" y="165" font-size="8" fill="#555" text-anchor="middle">min_workers = 4</text>

  <!-- ===== Phase 2: Scale up ===== -->
  <rect x="280" y="55" width="140" height="320" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="4" opacity="0.2"/>
  <text x="350" y="72" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Phase 2: Scale Up</text>

  <!-- Workers (8) -->
  <rect x="290" y="90" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="315" y="105" font-size="7" fill="#333" text-anchor="middle">W0</text>
  <rect x="345" y="90" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="370" y="105" font-size="7" fill="#333" text-anchor="middle">W1</text>
  <rect x="290" y="116" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="315" y="131" font-size="7" fill="#333" text-anchor="middle">W2</text>
  <rect x="345" y="116" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="370" y="131" font-size="7" fill="#333" text-anchor="middle">W3</text>
  <rect x="290" y="142" width="50" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="2"/>
  <text x="315" y="157" font-size="7" fill="#333" text-anchor="middle">W4 +</text>
  <rect x="345" y="142" width="50" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="2"/>
  <text x="370" y="157" font-size="7" fill="#333" text-anchor="middle">W5 +</text>
  <rect x="290" y="168" width="50" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="2"/>
  <text x="315" y="183" font-size="7" fill="#333" text-anchor="middle">W6 +</text>
  <rect x="345" y="168" width="50" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2" rx="2"/>
  <text x="370" y="183" font-size="7" fill="#333" text-anchor="middle">W7 +</text>

  <text x="350" y="208" font-size="8" fill="#3d9e5a" text-anchor="middle">Resources available: scale to 8</text>

  <!-- ===== Phase 3: Preemption ===== -->
  <rect x="440" y="55" width="140" height="320" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="4" opacity="0.2"/>
  <text x="510" y="72" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Phase 3: Preemption</text>

  <!-- Workers (6 - 2 preempted) -->
  <rect x="450" y="90" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="475" y="105" font-size="7" fill="#333" text-anchor="middle">W0</text>
  <rect x="505" y="90" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="530" y="105" font-size="7" fill="#333" text-anchor="middle">W1</text>
  <rect x="450" y="116" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="475" y="131" font-size="7" fill="#333" text-anchor="middle">W2</text>
  <rect x="505" y="116" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="530" y="131" font-size="7" fill="#333" text-anchor="middle">W3</text>
  <rect x="450" y="142" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="475" y="157" font-size="7" fill="#333" text-anchor="middle">W4</text>
  <rect x="505" y="142" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="530" y="157" font-size="7" fill="#333" text-anchor="middle">W5</text>
  <rect x="450" y="168" width="50" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="2" stroke-dasharray="4,2"/>
  <text x="475" y="183" font-size="7" fill="#c44" text-anchor="middle">W6 x</text>
  <rect x="505" y="168" width="50" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1.2" rx="2" stroke-dasharray="4,2"/>
  <text x="530" y="183" font-size="7" fill="#c44" text-anchor="middle">W7 x</text>

  <text x="510" y="208" font-size="8" fill="#c44" text-anchor="middle">Higher-priority job preempts 2</text>

  <!-- ===== Phase 4: Continue ===== -->
  <rect x="600" y="55" width="160" height="320" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="4" opacity="0.2"/>
  <text x="680" y="72" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Phase 4: Continue</text>

  <rect x="615" y="90" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="640" y="105" font-size="7" fill="#333" text-anchor="middle">W0</text>
  <rect x="670" y="90" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="695" y="105" font-size="7" fill="#333" text-anchor="middle">W1</text>
  <rect x="615" y="116" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="640" y="131" font-size="7" fill="#333" text-anchor="middle">W2</text>
  <rect x="670" y="116" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="695" y="131" font-size="7" fill="#333" text-anchor="middle">W3</text>
  <rect x="615" y="142" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="640" y="157" font-size="7" fill="#333" text-anchor="middle">W4</text>
  <rect x="670" y="142" width="50" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="695" y="157" font-size="7" fill="#333" text-anchor="middle">W5</text>

  <text x="680" y="195" font-size="8" fill="#3d9e5a" text-anchor="middle">Reduced throughput, not stopped</text>
  <text x="680" y="208" font-size="8" fill="#555" text-anchor="middle">LR and batch size adjusted</text>

  <!-- ===== Throughput line ===== -->
  <text x="60" y="275" font-size="8" font-weight="700" fill="#555" text-anchor="middle" transform="rotate(-90, 60, 300)">Throughput</text>
  <polyline points="120,340 200,340 280,340 340,280 380,280 440,280 500,310 560,310 600,310 680,310 760,310"
    fill="none" stroke="#4a90c4" stroke-width="2"/>

  <!-- Throughput labels -->
  <text x="190" y="355" font-size="7.5" fill="#4a90c4" text-anchor="middle">4 workers</text>
  <text x="350" y="270" font-size="7.5" fill="#3d9e5a" text-anchor="middle">8 workers</text>
  <text x="530" y="325" font-size="7.5" fill="#c44" text-anchor="middle">6 workers</text>
  <text x="700" y="325" font-size="7.5" fill="#3d9e5a" text-anchor="middle">6 workers</text>

  <!-- ===== Key benefits ===== -->
  <rect x="100" y="435" width="200" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="200" y="454" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Faster start (min workers)</text>

  <rect x="350" y="435" width="200" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="450" y="454" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Opportunistic scaling</text>

  <rect x="600" y="435" width="200" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="700" y="454" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Graceful preemption</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Elastic training degrades throughput, not correctness. The job continues at reduced speed rather than dying.</text>
</svg>
