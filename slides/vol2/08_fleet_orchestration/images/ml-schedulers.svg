<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Custom ML Schedulers: Exploiting Workload Structure</text>

  <!-- ===== Tiresias ===== -->
  <rect x="30" y="55" width="410" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="5"/>
  <text x="235" y="78" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Tiresias (2019)</text>
  <text x="235" y="95" font-size="9" fill="#555" text-anchor="middle">Duration-Agnostic Scheduling</text>
  <line x1="50" y1="103" x2="420" y2="103" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="50" y="120" font-size="8.5" fill="#333">Key insight: eliminate runtime estimates entirely</text>
  <text x="50" y="136" font-size="8.5" fill="#333">Mechanism: MLFQ (Multi-Level Feedback Queue)</text>
  <text x="50" y="148" font-size="8.5" fill="#3d9e5a" font-weight="700">Result: 5.5x better avg JCT vs FIFO</text>

  <!-- ===== Gandiva ===== -->
  <rect x="460" y="55" width="410" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="5"/>
  <text x="665" y="78" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Gandiva (2018)</text>
  <text x="665" y="95" font-size="9" fill="#555" text-anchor="middle">Iteration-Aware Scheduling</text>
  <line x1="480" y1="103" x2="850" y2="103" stroke="#c87b2a" stroke-width="0.5"/>
  <text x="480" y="120" font-size="8.5" fill="#333">Key insight: training = predictable mini-batch iterations</text>
  <text x="480" y="136" font-size="8.5" fill="#333">Mechanism: time-slice at iteration boundaries</text>
  <text x="480" y="148" font-size="8.5" fill="#3d9e5a" font-weight="700">Result: near-zero preemption cost</text>

  <!-- ===== Themis ===== -->
  <rect x="30" y="175" width="410" height="100" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="5"/>
  <text x="235" y="198" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Themis (2020)</text>
  <text x="235" y="215" font-size="9" fill="#555" text-anchor="middle">Finish-Time Fairness</text>
  <line x1="50" y1="223" x2="420" y2="223" stroke="#3d9e5a" stroke-width="0.5"/>
  <text x="50" y="240" font-size="8.5" fill="#333">Key insight: fair share of time, not GPUs</text>
  <text x="50" y="256" font-size="8.5" fill="#333">Mechanism: equalize proportional finish-time slowdown</text>
  <text x="50" y="268" font-size="8.5" fill="#3d9e5a" font-weight="700">Result: 2x fairer than DRF for ML jobs</text>

  <!-- ===== Pollux ===== -->
  <rect x="460" y="175" width="410" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="5"/>
  <text x="665" y="198" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Pollux (2021)</text>
  <text x="665" y="215" font-size="9" fill="#555" text-anchor="middle">Adaptive Resource Allocation</text>
  <line x1="480" y1="223" x2="850" y2="223" stroke="#c44" stroke-width="0.5"/>
  <text x="480" y="240" font-size="8.5" fill="#333">Key insight: co-optimize batch size and GPU count</text>
  <text x="480" y="256" font-size="8.5" fill="#333">Mechanism: goodput functions (statistical efficiency)</text>
  <text x="480" y="268" font-size="8.5" fill="#3d9e5a" font-weight="700">Result: 37--50% better avg JCT vs Optimus</text>

  <!-- ===== Common Theme ===== -->
  <rect x="100" y="300" width="700" height="55" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5" rx="5"/>
  <text x="450" y="322" font-size="11" font-weight="700" fill="#a31f34" text-anchor="middle">Common Insight: ML Workloads Have Exploitable Structure</text>
  <text x="450" y="340" font-size="9" fill="#555" text-anchor="middle">Iterative computation, heavy-tailed durations, sunk-cost economics, convergence-dependent efficiency</text>

  <!-- ===== Comparison table ===== -->
  <rect x="50" y="375" width="800" height="80" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="4"/>
  <!-- Headers -->
  <text x="130" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Scheduler</text>
  <text x="280" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Key Innovation</text>
  <text x="450" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fairness Model</text>
  <text x="610" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Needs Runtime Est?</text>
  <text x="760" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Improvement</text>
  <line x1="60" y1="402" x2="840" y2="402" stroke="#bbb" stroke-width="0.5"/>
  <!-- Row 1 -->
  <text x="130" y="418" font-size="8" fill="#4a90c4" text-anchor="middle">Tiresias</text>
  <text x="280" y="418" font-size="8" fill="#555" text-anchor="middle">MLFQ (no estimates)</text>
  <text x="450" y="418" font-size="8" fill="#555" text-anchor="middle">Priority queues</text>
  <text x="610" y="418" font-size="8" fill="#3d9e5a" text-anchor="middle">No</text>
  <text x="760" y="418" font-size="8" fill="#333" text-anchor="middle">5.5x JCT</text>
  <!-- Row 2 -->
  <text x="130" y="434" font-size="8" fill="#c87b2a" text-anchor="middle">Gandiva</text>
  <text x="280" y="434" font-size="8" fill="#555" text-anchor="middle">Iteration boundaries</text>
  <text x="450" y="434" font-size="8" fill="#555" text-anchor="middle">Time-sharing</text>
  <text x="610" y="434" font-size="8" fill="#3d9e5a" text-anchor="middle">No</text>
  <text x="760" y="434" font-size="8" fill="#333" text-anchor="middle">~0 preempt cost</text>
  <!-- Row 3 -->
  <text x="130" y="450" font-size="8" fill="#3d9e5a" text-anchor="middle">Themis</text>
  <text x="280" y="450" font-size="8" fill="#555" text-anchor="middle">Finish-time fairness</text>
  <text x="450" y="450" font-size="8" fill="#555" text-anchor="middle">Proportional slowdown</text>
  <text x="610" y="450" font-size="8" fill="#c44" text-anchor="middle">Yes</text>
  <text x="760" y="450" font-size="8" fill="#333" text-anchor="middle">2x fairer</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="485" font-size="9" font-style="italic" fill="#999" text-anchor="middle">40--60% improvement in average job completion time vs. general-purpose scheduling.</text>
</svg>
