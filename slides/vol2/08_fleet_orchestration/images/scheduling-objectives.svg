<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Four Scheduling Objectives (and Their Conflicts)</text>

  <!-- ===== Four quadrants ===== -->
  <!-- Top-Left: Throughput -->
  <rect x="50" y="55" width="380" height="170" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="5"/>
  <text x="240" y="78" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">Throughput</text>
  <text x="240" y="95" font-size="9" fill="#555" text-anchor="middle">Maximize total useful work per unit time</text>
  <line x1="70" y1="103" x2="410" y2="103" stroke="#4a90c4" stroke-width="0.5"/>
  <text x="70" y="120" font-size="8.5" fill="#333">Favors: Large, long-running jobs</text>
  <text x="70" y="137" font-size="8.5" fill="#333">Mechanism: Saturate hardware, minimize context switches</text>
  <text x="70" y="154" font-size="8.5" fill="#c44">Conflict: Starves small jobs (latency-catastrophic)</text>
  <text x="70" y="171" font-size="8.5" fill="#555">Example: Fill cluster with massive training runs</text>
  <rect x="340" y="190" width="80" height="20" fill="#4a90c4" rx="10"/>
  <text x="380" y="204" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Priority 1</text>

  <!-- Top-Right: Fairness -->
  <rect x="470" y="55" width="380" height="170" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="5"/>
  <text x="660" y="78" font-size="12" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fairness</text>
  <text x="660" y="95" font-size="9" fill="#555" text-anchor="middle">Equitable resource distribution across teams</text>
  <line x1="490" y1="103" x2="830" y2="103" stroke="#3d9e5a" stroke-width="0.5"/>
  <text x="490" y="120" font-size="8.5" fill="#333">Favors: Multi-tenant equity</text>
  <text x="490" y="137" font-size="8.5" fill="#333">Mechanism: Dominant Resource Fairness (DRF)</text>
  <text x="490" y="154" font-size="8.5" fill="#c44">Conflict: Fragments resources, reduces throughput</text>
  <text x="490" y="171" font-size="8.5" fill="#555">Example: Ensure no team monopolizes the fleet</text>
  <rect x="760" y="190" width="80" height="20" fill="#3d9e5a" rx="10"/>
  <text x="800" y="204" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Priority 2</text>

  <!-- Bottom-Left: Latency -->
  <rect x="50" y="245" width="380" height="170" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="5"/>
  <text x="240" y="268" font-size="12" font-weight="700" fill="#c87b2a" text-anchor="middle">Latency</text>
  <text x="240" y="285" font-size="9" fill="#555" text-anchor="middle">Rapid completion of short jobs</text>
  <line x1="70" y1="293" x2="410" y2="293" stroke="#c87b2a" stroke-width="0.5"/>
  <text x="70" y="310" font-size="8.5" fill="#333">Favors: Interactive experiments, debugging</text>
  <text x="70" y="327" font-size="8.5" fill="#333">Mechanism: Shortest Job First, preemption</text>
  <text x="70" y="344" font-size="8.5" fill="#c44">Conflict: Starves large training jobs</text>
  <text x="70" y="361" font-size="8.5" fill="#555">Example: Fast iteration for researchers</text>
  <rect x="340" y="380" width="80" height="20" fill="#c87b2a" rx="10"/>
  <text x="380" y="394" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Priority 3</text>

  <!-- Bottom-Right: Cost -->
  <rect x="470" y="245" width="380" height="170" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="5"/>
  <text x="660" y="268" font-size="12" font-weight="700" fill="#c44" text-anchor="middle">Cost Efficiency</text>
  <text x="660" y="285" font-size="9" fill="#555" text-anchor="middle">Minimize dollars per useful FLOP</text>
  <line x1="490" y1="293" x2="830" y2="293" stroke="#c44" stroke-width="0.5"/>
  <text x="490" y="310" font-size="8.5" fill="#333">Favors: Spot instances, off-peak scheduling</text>
  <text x="490" y="327" font-size="8.5" fill="#333">Mechanism: Preemptible VMs, bin packing</text>
  <text x="490" y="344" font-size="8.5" fill="#c44">Conflict: Higher failure rates, longer completion</text>
  <text x="490" y="361" font-size="8.5" fill="#555">Example: Use spot for 60--70% discount</text>
  <rect x="760" y="380" width="80" height="20" fill="#c44" rx="10"/>
  <text x="800" y="394" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Priority 4</text>

  <!-- ===== Central conflict indicator ===== -->
  <rect x="380" y="195" width="140" height="70" fill="#f7f7f7" stroke="#a31f34" stroke-width="1.5" rx="5"/>
  <text x="450" y="218" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">All Four Conflict</text>
  <text x="450" y="235" font-size="8" fill="#555" text-anchor="middle">Optimizing all</text>
  <text x="450" y="248" font-size="8" fill="#555" text-anchor="middle">simultaneously</text>
  <text x="450" y="261" font-size="8" font-weight="700" fill="#a31f34" text-anchor="middle">is impossible</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Every scheduling policy is a specific point in this four-dimensional trade-off space.</text>
</svg>
