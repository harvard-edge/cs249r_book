<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Topology Hierarchy: Matching Parallelism to Communication Bandwidth</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Level 1: Intra-Node (NVLink) ===== -->
  <rect x="30" y="55" width="840" height="110" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="5"/>
  <text x="450" y="75" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Level 1: Intra-Node (NVLink Domain) --- 900 GB/s bidirectional</text>

  <!-- GPU boxes within node -->
  <rect x="80" y="90" width="70" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <rect x="60" y="100" width="20" height="10" fill="#a31f34" rx="2"/>
  <text x="70" y="108" font-size="6.5" font-weight="700" fill="#fff" text-anchor="middle">G0</text>
  <text x="115" y="112" font-size="8" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>
  <text x="115" y="126" font-size="7" fill="#555" text-anchor="middle">80 GB HBM3</text>

  <rect x="175" y="90" width="70" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <rect x="155" y="100" width="20" height="10" fill="#a31f34" rx="2"/>
  <text x="165" y="108" font-size="6.5" font-weight="700" fill="#fff" text-anchor="middle">G1</text>
  <text x="210" y="112" font-size="8" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>
  <text x="210" y="126" font-size="7" fill="#555" text-anchor="middle">80 GB HBM3</text>

  <text x="265" y="118" font-size="10" fill="#555">...</text>

  <rect x="290" y="90" width="70" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <rect x="270" y="100" width="20" height="10" fill="#a31f34" rx="2"/>
  <text x="280" y="108" font-size="6.5" font-weight="700" fill="#fff" text-anchor="middle">G7</text>
  <text x="325" y="112" font-size="8" font-weight="700" fill="#333" text-anchor="middle">GPU 7</text>
  <text x="325" y="126" font-size="7" fill="#555" text-anchor="middle">80 GB HBM3</text>

  <!-- NVLink connections -->
  <line x1="150" y1="115" x2="175" y2="115" stroke="#4a90c4" stroke-width="2.5"/>
  <line x1="245" y1="115" x2="265" y2="115" stroke="#4a90c4" stroke-width="2.5"/>

  <!-- Parallelism label -->
  <rect x="420" y="92" width="180" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="12"/>
  <text x="510" y="109" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Tensor Parallelism</text>
  <text x="420" y="137" font-size="8" fill="#555">Highest bandwidth: shard model layers</text>
  <text x="420" y="152" font-size="8" fill="#555">across GPUs within one NVLink domain</text>

  <!-- Bandwidth indicator -->
  <rect x="680" y="90" width="160" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="760" y="110" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">900 GB/s</text>
  <text x="760" y="126" font-size="8" fill="#555" text-anchor="middle">NVLink (H100)</text>
  <text x="760" y="140" font-size="8" fill="#3d9e5a" text-anchor="middle">Highest bandwidth</text>

  <!-- ===== Level 2: Intra-Rack ===== -->
  <rect x="30" y="180" width="840" height="85" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="5"/>
  <text x="450" y="200" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Level 2: Intra-Rack (InfiniBand / NVSwitch) --- 50 GB/s per link</text>

  <!-- Nodes in rack -->
  <rect x="80" y="215" width="90" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="125" y="234" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Node 0 (8 GPU)</text>
  <rect x="200" y="215" width="90" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="245" y="234" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Node 1 (8 GPU)</text>
  <text x="310" y="234" font-size="10" fill="#555">...</text>
  <rect x="330" y="215" width="90" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="375" y="234" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Node N (8 GPU)</text>

  <!-- Pipeline label -->
  <rect x="480" y="213" width="180" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="12"/>
  <text x="570" y="230" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Pipeline Parallelism</text>
  <text x="480" y="255" font-size="8" fill="#555">Forward stage boundaries across nodes</text>

  <!-- Bandwidth indicator -->
  <rect x="720" y="212" width="120" height="35" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="780" y="230" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">50 GB/s</text>
  <text x="780" y="243" font-size="8" fill="#555" text-anchor="middle">InfiniBand NDR</text>

  <!-- ===== Level 3: Cross-Rack ===== -->
  <rect x="30" y="280" width="840" height="85" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="5"/>
  <text x="450" y="300" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Level 3: Cross-Rack (Spine Switch / Rail-Optimized) --- 12.5--50 GB/s</text>

  <!-- Racks -->
  <rect x="80" y="315" width="90" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="125" y="334" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Rack 0</text>
  <rect x="200" y="315" width="90" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="245" y="334" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Rack 1</text>
  <text x="310" y="334" font-size="10" fill="#555">...</text>
  <rect x="330" y="315" width="90" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="375" y="334" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Rack N</text>

  <!-- Data parallelism label -->
  <rect x="480" y="313" width="180" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="12"/>
  <text x="570" y="330" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Data Parallelism</text>
  <text x="480" y="355" font-size="8" fill="#555">AllReduce gradients across racks</text>

  <!-- Bandwidth indicator -->
  <rect x="720" y="312" width="120" height="35" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="780" y="330" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">12.5--50 GB/s</text>
  <text x="780" y="343" font-size="8" fill="#555" text-anchor="middle">Spine bandwidth</text>

  <!-- ===== Key insight ===== -->
  <rect x="100" y="385" width="700" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="450" y="405" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Scheduling Principle: Match Communication Intensity to Bandwidth Tier</text>
  <text x="450" y="422" font-size="9" fill="#555" text-anchor="middle">Tensor parallelism (high comm.) maps to NVLink; Data parallelism (low comm.) maps to cross-rack links.</text>
  <text x="450" y="436" font-size="9" fill="#a31f34" text-anchor="middle">Misplacement penalty: 15--30% throughput loss for the same hardware allocation.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Topology-aware scheduling bridges abstract resource allocation and physical performance.</text>
</svg>
