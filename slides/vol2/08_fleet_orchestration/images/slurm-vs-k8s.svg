<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Orchestration Paradigms: Slurm vs. Kubernetes</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="430" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Slurm ===== -->
  <rect x="30" y="50" width="390" height="55" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="75" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Slurm (HPC Heritage)</text>
  <text x="225" y="93" font-size="9" fill="#555" text-anchor="middle">Imperative, Centralized, Consistency-First</text>

  <!-- Architecture -->
  <rect x="50" y="120" width="120" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="110" y="142" font-size="9" font-weight="700" fill="#333" text-anchor="middle">slurmctld</text>

  <line x1="110" y1="155" x2="70" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="110" y1="155" x2="110" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="110" y1="155" x2="150" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="40" y="178" width="60" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="195" font-size="7.5" fill="#555" text-anchor="middle">slurmd</text>
  <rect x="110" y="178" width="60" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="140" y="195" font-size="7.5" fill="#555" text-anchor="middle">slurmd</text>
  <rect x="180" y="178" width="60" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="210" y="195" font-size="7.5" fill="#555" text-anchor="middle">slurmd</text>

  <!-- Strengths -->
  <rect x="260" y="120" width="150" height="90" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="335" y="138" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Strengths</text>
  <text x="270" y="155" font-size="8" fill="#555">Native gang scheduling</text>
  <text x="270" y="170" font-size="8" fill="#555">Topology-aware (GRES)</text>
  <text x="270" y="185" font-size="8" fill="#555">Backfill scheduling</text>
  <text x="270" y="200" font-size="8" fill="#555">Predictable allocation</text>

  <!-- CAP -->
  <rect x="50" y="225" width="360" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="245" font-size="9" fill="#555" text-anchor="middle">CAP: Prioritizes <tspan font-weight="700" fill="#4a90c4">Consistency</tspan> over Availability</text>

  <!-- Workflow -->
  <rect x="50" y="270" width="360" height="75" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="230" y="290" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Typical Workflow</text>
  <text x="60" y="310" font-size="8" fill="#555">1. sbatch submit.sh  (submit job)</text>
  <text x="60" y="325" font-size="8" fill="#555">2. slurmctld allocates nodes atomically</text>
  <text x="60" y="340" font-size="8" fill="#555">3. Job runs until completion or preemption</text>

  <!-- Best for -->
  <rect x="50" y="360" width="360" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="230" y="380" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Best for: Large training jobs, HPC workloads, batch scheduling</text>

  <!-- ===== RIGHT: Kubernetes ===== -->
  <rect x="480" y="50" width="390" height="55" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="675" y="75" font-size="12" font-weight="700" fill="#333" text-anchor="middle">Kubernetes (Cloud Native)</text>
  <text x="675" y="93" font-size="9" fill="#555" text-anchor="middle">Declarative, Distributed, Availability-First</text>

  <!-- Architecture -->
  <rect x="500" y="120" width="120" height="35" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="560" y="142" font-size="9" font-weight="700" fill="#333" text-anchor="middle">kube-scheduler</text>

  <line x1="560" y1="155" x2="520" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="560" y1="155" x2="560" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="560" y1="155" x2="600" y2="175" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="490" y="178" width="60" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="520" y="195" font-size="7.5" fill="#555" text-anchor="middle">kubelet</text>
  <rect x="560" y="178" width="60" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="590" y="195" font-size="7.5" fill="#555" text-anchor="middle">kubelet</text>
  <rect x="630" y="178" width="60" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="660" y="195" font-size="7.5" fill="#555" text-anchor="middle">kubelet</text>

  <!-- Strengths -->
  <rect x="710" y="120" width="150" height="90" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="785" y="138" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Strengths</text>
  <text x="720" y="155" font-size="8" fill="#555">Self-healing (reconcile)</text>
  <text x="720" y="170" font-size="8" fill="#555">Rich ecosystem (Kubeflow)</text>
  <text x="720" y="185" font-size="8" fill="#555">Autoscaling built-in</text>
  <text x="720" y="200" font-size="8" fill="#555">Multi-tenant isolation</text>

  <!-- CAP -->
  <rect x="500" y="225" width="360" height="30" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="680" y="245" font-size="9" fill="#555" text-anchor="middle">CAP: Prioritizes <tspan font-weight="700" fill="#c87b2a">Availability</tspan> over Consistency</text>

  <!-- Workflow -->
  <rect x="500" y="270" width="360" height="75" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="680" y="290" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Typical Workflow</text>
  <text x="510" y="310" font-size="8" fill="#555">1. kubectl apply -f job.yaml (declare desired state)</text>
  <text x="510" y="325" font-size="8" fill="#555">2. Controller reconciles actual → desired</text>
  <text x="510" y="340" font-size="8" fill="#555">3. Self-healing on failures (restart pods)</text>

  <!-- Best for -->
  <rect x="500" y="360" width="360" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="680" y="380" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Best for: Serving, mixed workloads, elastic scaling</text>

  <!-- ===== Bottom: Hybrid ===== -->
  <rect x="150" y="405" width="600" height="40" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="425" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Production: Many organizations use both (Slurm for training, Kubernetes for serving)</text>
  <text x="450" y="438" font-size="8.5" fill="#555" text-anchor="middle">Hybrid architectures combine the strengths of each paradigm for different workload types.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">The choice is not either/or: workload composition determines the optimal mix.</text>
</svg>
