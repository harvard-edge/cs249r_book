  <!-- ===== Legend ===== -->
  <rect x="460" y="82" width="20" height="14" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="488" y="94" font-size="8.5" fill="#333">Job A (training)</text>
  <rect x="460" y="104" width="20" height="14" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="488" y="116" font-size="8.5" fill="#333">Job B (training)</text>
  <rect x="460" y="126" width="20" height="14" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="488" y="138" font-size="8.5" fill="#333">Job C (inference)</text>
  <rect x="460" y="148" width="20" height="14" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="488" y="160" font-size="8.5" fill="#333">Job D (fine-tune)</text>
  <rect x="460" y="170" width="20" height="14" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="488" y="182" font-size="8.5" fill="#333">Free (stranded)</text>

  <!-- ===== Status Panel ===== -->
  <rect x="460" y="210" width="200" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="560" y="232" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Cluster Status</text>
  <line x1="480" y1="240" x2="640" y2="240" stroke="#bbb" stroke-width="0.8"/>
  <text x="480" y="258" font-size="9" fill="#555">Total GPUs:</text>
  <text x="640" y="258" font-size="9" font-weight="700" fill="#333" text-anchor="end">64</text>
  <text x="480" y="275" font-size="9" fill="#555">Allocated:</text>
  <text x="640" y="275" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="end">45 (70%)</text>
  <text x="480" y="292" font-size="9" fill="#555">Free (stranded):</text>
  <text x="640" y="292" font-size="9" font-weight="700" fill="#c44" text-anchor="end">19 (30%)</text>
  <text x="480" y="309" font-size="9" fill="#555">Max contiguous:</text>
  <text x="640" y="309" font-size="9" font-weight="700" fill="#c44" text-anchor="end">3 GPUs</text>

  <!-- ===== Blocked Job ===== -->
  <rect x="460" y="345" width="410" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="665" y="367" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Pending: 8-GPU Training Job</text>
  <text x="665" y="385" font-size="9" fill="#555" text-anchor="middle">BLOCKED: needs 8 contiguous GPUs, largest free block = 3</text>

  <!-- ===== Insight ===== -->
  <rect x="100" y="420" width="700" height="35" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="442" font-size="9.5" font-weight="700" fill="#333" text-anchor="middle">30% of capacity is free, but no pending job can use it. Fragmentation turns idle GPUs into waste.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="480" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Multi-dimensional bin packing with topology constraints is NP-hard; heuristics like backfill scheduling mitigate fragmentation.</text>
</svg>
