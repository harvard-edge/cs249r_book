<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Gang Scheduling: Atomic Allocation vs. Deadlock</text>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Left Panel: Naive (Deadlock) ===== -->
  <rect x="30" y="50" width="410" height="200" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="235" y="72" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Naive Scheduling (Partial Allocation)</text>

  <!-- Timeline axis -->
  <line x1="60" y1="220" x2="410" y2="220" stroke="#bbb" stroke-width="1"/>
  <text x="235" y="238" font-size="8" fill="#999" text-anchor="middle">Time</text>

  <!-- Job A gets partial -->
  <rect x="70" y="90" width="160" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="150" y="110" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Job A: 512 GPUs requested</text>
  <rect x="70" y="125" width="80" height="22" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="110" y="140" font-size="8" fill="#555" text-anchor="middle">Gets 256</text>

  <!-- Job B gets partial -->
  <rect x="260" y="90" width="160" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="340" y="110" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Job B: 512 GPUs requested</text>
  <rect x="260" y="125" width="80" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="300" y="140" font-size="8" fill="#555" text-anchor="middle">Gets 256</text>

  <!-- Deadlock arrows -->
  <path d="M150,147 L150,175 L300,175 L300,147" fill="none" stroke="#c44" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="225" y="170" font-size="8" fill="#c44" text-anchor="middle">Waiting for each other</text>

  <!-- Deadlock badge -->
  <rect x="170" y="185" width="130" height="24" fill="#a31f34"/>
  <text x="235" y="201" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">DEADLOCK: 0% progress</text>

  <!-- ===== Right Panel: Gang Scheduling ===== -->
  <rect x="460" y="50" width="410" height="200" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="665" y="72" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Gang Scheduling (Atomic Allocation)</text>

  <!-- Timeline axis -->
  <line x1="490" y1="220" x2="840" y2="220" stroke="#bbb" stroke-width="1"/>
  <text x="665" y="238" font-size="8" fill="#999" text-anchor="middle">Time</text>

  <!-- Job A runs fully first -->
  <rect x="500" y="90" width="150" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="575" y="108" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Job A: 512 GPUs</text>
  <text x="575" y="122" font-size="8" fill="#555" text-anchor="middle">All allocated atomically</text>

  <!-- Job B runs after -->
  <rect x="670" y="90" width="150" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="745" y="108" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Job B: 512 GPUs</text>
  <text x="745" y="122" font-size="8" fill="#555" text-anchor="middle">All allocated atomically</text>

  <!-- Arrow between jobs -->
  <line x1="655" y1="110" x2="665" y2="110" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Backfill small jobs -->
  <rect x="500" y="140" width="40" height="18" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="0.8"/>
  <text x="520" y="153" font-size="7" fill="#2d7a2d" text-anchor="middle">Backfill</text>
  <rect x="545" y="140" width="40" height="18" fill="#e8f5e9" stroke="#2d7a2d" stroke-width="0.8"/>
  <text x="565" y="153" font-size="7" fill="#2d7a2d" text-anchor="middle">Backfill</text>

  <!-- Success badge -->
  <rect x="600" y="185" width="130" height="24" fill="#3d9e5a"/>
  <text x="665" y="201" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">100% progress</text>

  <!-- ===== Bottom: Key Principle ===== -->
  <rect x="150" y="270" width="600" height="60" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="293" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Key Principle: All-or-Nothing Allocation</text>
  <text x="450" y="310" font-size="9" fill="#555" text-anchor="middle">A job either gets all N GPUs simultaneously, or it waits in the queue holding zero resources.</text>
  <text x="450" y="323" font-size="9" fill="#555" text-anchor="middle">This eliminates hold-and-wait deadlock by construction.</text>

  <!-- ===== Cost callout ===== -->
  <rect x="200" y="350" width="500" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="370" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Economic Impact of Deadlock</text>
  <text x="450" y="387" font-size="9" fill="#555" text-anchor="middle">1,024 GPUs deadlocked at $2/GPU-hour = $2,048/hour wasted. A 5-minute deadlock costs ~$170.</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Gang scheduling prevents the most expensive failure mode in ML cluster orchestration.</text>
</svg>
