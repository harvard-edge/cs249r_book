<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Hybrid Architecture: Slurm + Kubernetes in Production</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- Slurm Partition -->
  <rect x="40" y="55" width="350" height="280" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="215" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Slurm Partition (70%)</text>
  <text x="215" y="95" font-size="8.5" fill="#555" text-anchor="middle">Batch Training Workloads</text>

  <!-- Training jobs -->
  <rect x="60" y="110" width="150" height="50" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="135" y="132" font-size="9" font-weight="700" fill="#333" text-anchor="middle">LLM Training</text>
  <text x="135" y="148" font-size="7.5" fill="#555" text-anchor="middle">64 GPUs, gang scheduled</text>

  <rect x="220" y="110" width="150" height="50" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="295" y="132" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Fine-Tuning</text>
  <text x="295" y="148" font-size="7.5" fill="#555" text-anchor="middle">8 GPUs, topology-aware</text>

  <rect x="60" y="175" width="150" height="50" fill="#fff" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="135" y="197" font-size="9" font-weight="700" fill="#333" text-anchor="middle">RLHF Pipeline</text>
  <text x="135" y="213" font-size="7.5" fill="#555" text-anchor="middle">32 GPUs, multi-stage</text>

  <rect x="220" y="175" width="150" height="50" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <text x="295" y="197" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Queued Jobs</text>
  <text x="295" y="213" font-size="7.5" fill="#555" text-anchor="middle">Waiting for resources</text>

  <!-- Slurm features -->
  <text x="60" y="250" font-size="8" fill="#555">+ Gang scheduling (all-or-nothing)</text>
  <text x="60" y="266" font-size="8" fill="#555">+ Topology-aware GRES allocation</text>
  <text x="60" y="282" font-size="8" fill="#555">+ Priority queues with preemption</text>
  <text x="60" y="298" font-size="8" fill="#555">+ InfiniBand-aware placement</text>
  <text x="60" y="320" font-size="8" font-weight="700" fill="#4a90c4">Consistency-first (CAP)</text>

  <!-- Shared Storage Bridge -->
  <rect x="410" y="120" width="80" height="200" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="175" font-size="9" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90,450,200)">Shared Storage + Model Registry</text>

  <!-- Arrows -->
  <line x1="390" y1="135" x2="410" y2="175" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="395" y="145" font-size="7" fill="#3d9e5a">Checkpoints</text>

  <line x1="490" y1="175" x2="510" y2="135" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="495" y="145" font-size="7" fill="#3d9e5a">Model pull</text>

  <!-- K8s Partition -->
  <rect x="510" y="55" width="350" height="280" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="685" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Kubernetes Partition (30%)</text>
  <text x="685" y="95" font-size="8.5" fill="#555" text-anchor="middle">Serving + Mixed Workloads</text>

  <!-- Serving pods -->
  <rect x="530" y="110" width="150" height="50" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="605" y="132" font-size="9" font-weight="700" fill="#333" text-anchor="middle">LLM Serving</text>
  <text x="605" y="148" font-size="7.5" fill="#555" text-anchor="middle">4x H100, autoscaled</text>

  <rect x="690" y="110" width="150" height="50" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="765" y="132" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Embedding API</text>
  <text x="765" y="148" font-size="7.5" fill="#555" text-anchor="middle">2x H100, HPA</text>

  <rect x="530" y="175" width="150" height="50" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="605" y="197" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Canary Deploy</text>
  <text x="605" y="213" font-size="7.5" fill="#555" text-anchor="middle">1x H100, A/B test</text>

  <rect x="690" y="175" width="150" height="50" fill="#fff" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="765" y="197" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Monitoring</text>
  <text x="765" y="213" font-size="7.5" fill="#555" text-anchor="middle">Prometheus + Grafana</text>

  <!-- K8s features -->
  <text x="530" y="250" font-size="8" fill="#555">+ Self-healing reconciliation loops</text>
  <text x="530" y="266" font-size="8" fill="#555">+ HPA/VPA autoscaling</text>
  <text x="530" y="282" font-size="8" fill="#555">+ Canary and rolling deploys</text>
  <text x="530" y="298" font-size="8" fill="#555">+ Service mesh (Istio)</text>
  <text x="530" y="320" font-size="8" font-weight="700" fill="#c87b2a">Availability-first (CAP)</text>

  <!-- Resource overflow policy -->
  <rect x="40" y="360" width="820" height="55" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="382" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Resource Overflow Policy</text>
  <text x="450" y="400" font-size="9" fill="#555" text-anchor="middle">When Slurm partition is idle: overflow serving pods onto Slurm nodes (preemptible). When K8s needs burst: Slurm's power-save mode releases idle nodes.</text>

  <text x="450" y="445" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The bridge is shared storage: trained models write checkpoints, serving pods pull the latest version</text>
</svg>
