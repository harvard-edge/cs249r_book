<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Cost Optimization: Spot Instances and Capacity Strategy</text>

  <!-- ===== Three-Tier Strategy ===== -->
  <!-- Tier 1: Reserved -->
  <rect x="50" y="55" width="250" height="180" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="175" y="78" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Reserved Instances</text>
  <text x="175" y="95" font-size="9" fill="#555" text-anchor="middle">1--3 year commitment</text>
  <line x1="70" y1="103" x2="280" y2="103" stroke="#3d9e5a" stroke-width="0.5"/>
  <text x="70" y="122" font-size="8.5" fill="#333">Discount: 40--60% vs on-demand</text>
  <text x="70" y="139" font-size="8.5" fill="#333">Availability: Guaranteed</text>
  <text x="70" y="156" font-size="8.5" fill="#333">Use for: Baseline capacity</text>
  <text x="70" y="173" font-size="8.5" fill="#333">Risk: Commitment if needs change</text>
  <rect x="70" y="195" width="210" height="22" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="175" y="210" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">~40% of fleet capacity</text>

  <!-- Tier 2: On-Demand -->
  <rect x="325" y="55" width="250" height="180" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">On-Demand Instances</text>
  <text x="450" y="95" font-size="9" fill="#555" text-anchor="middle">Pay as you go</text>
  <line x1="345" y1="103" x2="555" y2="103" stroke="#c87b2a" stroke-width="0.5"/>
  <text x="345" y="122" font-size="8.5" fill="#333">Discount: 0% (full price)</text>
  <text x="345" y="139" font-size="8.5" fill="#333">Availability: Guaranteed</text>
  <text x="345" y="156" font-size="8.5" fill="#333">Use for: Critical training runs</text>
  <text x="345" y="173" font-size="8.5" fill="#333">Risk: Highest cost per GPU-hour</text>
  <rect x="345" y="195" width="210" height="22" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="210" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">~30% of fleet capacity</text>

  <!-- Tier 3: Spot -->
  <rect x="600" y="55" width="250" height="180" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="725" y="78" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Spot / Preemptible</text>
  <text x="725" y="95" font-size="9" fill="#555" text-anchor="middle">Interruptible at any time</text>
  <line x1="620" y1="103" x2="830" y2="103" stroke="#c44" stroke-width="0.5"/>
  <text x="620" y="122" font-size="8.5" fill="#333">Discount: 60--90% vs on-demand</text>
  <text x="620" y="139" font-size="8.5" fill="#333">Availability: Not guaranteed</text>
  <text x="620" y="156" font-size="8.5" fill="#333">Use for: Burst, fault-tolerant jobs</text>
  <text x="620" y="173" font-size="8.5" fill="#333">Risk: 2-min interruption notice</text>
  <rect x="620" y="195" width="210" height="22" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="725" y="210" font-size="8.5" font-weight="700" fill="#c44" text-anchor="middle">~30% of fleet capacity</text>

  <!-- ===== Spot Instance Economics ===== -->
  <rect x="50" y="260" width="800" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="282" font-size="11" font-weight="700" fill="#333" text-anchor="middle">The Hidden Cost of Spot Interruptions</text>

  <!-- Calculation -->
  <text x="70" y="305" font-size="9" fill="#555">Spot discount: 65%</text>
  <text x="70" y="322" font-size="9" fill="#555">Checkpoint time: 15 min</text>
  <text x="70" y="339" font-size="9" fill="#555">Restart time: 30 min</text>

  <text x="300" y="305" font-size="9" fill="#555">Interruption frequency: every 2 hours</text>
  <text x="300" y="322" font-size="9" fill="#555">Overhead per interruption: 45 min</text>
  <text x="300" y="339" font-size="9" fill="#a31f34" font-weight="700">Effective overhead: 37%</text>

  <rect x="600" y="295" width="230" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="715" y="315" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Net savings: only 28%</text>
  <text x="715" y="332" font-size="8.5" fill="#555" text-anchor="middle">(not the advertised 65%)</text>

  <!-- ===== Strategy recommendations ===== -->
  <rect x="50" y="380" width="260" height="60" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="180" y="400" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Instance Diversification</text>
  <text x="180" y="418" font-size="8" fill="#555" text-anchor="middle">Spread across instance types and</text>
  <text x="180" y="431" font-size="8" fill="#555" text-anchor="middle">zones to reduce correlated eviction</text>

  <rect x="320" y="380" width="260" height="60" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="450" y="400" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Two-Tier Checkpointing</text>
  <text x="450" y="418" font-size="8" fill="#555" text-anchor="middle">Fast local checkpoint (NVMe) +</text>
  <text x="450" y="431" font-size="8" fill="#555" text-anchor="middle">durable remote checkpoint (S3)</text>

  <rect x="590" y="380" width="260" height="60" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="720" y="400" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Grace Period Optimization</text>
  <text x="720" y="418" font-size="8" fill="#555" text-anchor="middle">Use 2-min interruption warning</text>
  <text x="720" y="431" font-size="8" fill="#555" text-anchor="middle">to trigger emergency checkpoint</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="475" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Spot instances require quantitative analysis of specific workload and market conditions, not blanket assumptions.</text>
</svg>
