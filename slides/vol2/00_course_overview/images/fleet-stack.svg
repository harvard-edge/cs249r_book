<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Fleet Stack: Four Layers of Distributed ML</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow-up" markerWidth="8" markerHeight="6" refX="3" refY="0" orient="auto">
      <path d="M0,6 L3,0 L6,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Layer 4: Governance (top) ===== -->
  <rect x="100" y="55" width="700" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="140" y="78" font-size="12" font-weight="700" fill="#c44">LAYER 4: GOVERNANCE</text>
  <text x="140" y="96" font-size="9" fill="#333">Security  |  Robustness  |  Sustainability  |  Responsible AI</text>
  <text x="140" y="114" font-size="8.5" fill="#555">Policy enforcement, audit trails, carbon accounting, fairness constraints</text>
  <!-- Chapter badges -->
  <rect x="680" y="68" width="90" height="20" fill="#a31f34"/>
  <text x="725" y="82" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Ch 13-17</text>

  <!-- ===== Layer 3: Deployment (next) ===== -->
  <rect x="100" y="150" width="700" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="140" y="173" font-size="12" font-weight="700" fill="#c87b2a">LAYER 3: DEPLOYMENT AT SCALE</text>
  <text x="140" y="191" font-size="9" fill="#333">Inference  |  Performance Engineering  |  Edge Intelligence  |  Ops</text>
  <text x="140" y="209" font-size="8.5" fill="#555">Serving systems, SLA management, fleet scheduling, A/B testing, canary deploys</text>
  <!-- Chapter badges -->
  <rect x="680" y="163" width="90" height="20" fill="#a31f34"/>
  <text x="725" y="177" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Ch 9-12</text>

  <!-- ===== Layer 2: Distributed ML ===== -->
  <rect x="100" y="245" width="700" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="140" y="268" font-size="12" font-weight="700" fill="#3d9e5a">LAYER 2: DISTRIBUTED ML</text>
  <text x="140" y="286" font-size="9" fill="#333">Distributed Training  |  Collectives  |  Fault Tolerance  |  Orchestration</text>
  <text x="140" y="304" font-size="8.5" fill="#555">Data/tensor/pipeline parallelism, AllReduce, checkpointing, Slurm, Kubernetes</text>
  <!-- Chapter badges -->
  <rect x="680" y="258" width="90" height="20" fill="#a31f34"/>
  <text x="725" y="272" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Ch 5-8</text>

  <!-- ===== Layer 1: Infrastructure (bottom) ===== -->
  <rect x="100" y="340" width="700" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="140" y="363" font-size="12" font-weight="700" fill="#4a90c4">LAYER 1: INFRASTRUCTURE</text>
  <text x="140" y="381" font-size="9" fill="#333">Introduction  |  Compute Infrastructure  |  Network Fabrics  |  Data Storage</text>
  <text x="140" y="399" font-size="8.5" fill="#555">GPU clusters, InfiniBand, RDMA, distributed file systems, object stores</text>
  <!-- Chapter badges -->
  <rect x="680" y="353" width="90" height="20" fill="#a31f34"/>
  <text x="725" y="367" font-size="7.5" font-weight="700" fill="#fff" text-anchor="middle">Ch 1-4</text>

  <!-- ===== Vertical dependency arrows (right side) ===== -->
  <line x1="830" y1="340" x2="830" y2="135" stroke="#555" stroke-width="1.2" marker-end="url(#arrow-up)"/>
  <text x="855" y="240" font-size="8" fill="#555" text-anchor="middle" transform="rotate(-90, 855, 240)">Increasing abstraction</text>

  <!-- ===== Left side: C3 mapping ===== -->
  <rect x="20" y="340" width="60" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="50" y="385" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">C</text>

  <rect x="20" y="245" width="60" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="50" y="283" font-size="7.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">C + C</text>

  <rect x="20" y="150" width="60" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.0"/>
  <text x="50" y="188" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">C + C</text>

  <rect x="20" y="55" width="60" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="50" y="100" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">C&#xB3;</text>

  <text x="50" y="450" font-size="8" fill="#555" text-anchor="middle">C&#xB3;</text>
  <text x="50" y="462" font-size="7" fill="#999" text-anchor="middle">mapping</text>

  <!-- Footnote -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Each layer builds on the one below --- production systems require all four</text>
</svg>
