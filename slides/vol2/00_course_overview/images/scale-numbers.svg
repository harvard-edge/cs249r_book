<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The Numbers That Define Fleet Scale</text>

  <!-- ===== Row 1: Cluster Size ===== -->
  <rect x="40" y="55" width="395" height="100" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="238" y="80" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Cluster Size</text>
  <text x="238" y="108" font-size="28" font-weight="700" fill="#333" text-anchor="middle">25,000+</text>
  <text x="238" y="130" font-size="9" fill="#555" text-anchor="middle">GPUs in a single training cluster (Meta, Google, xAI)</text>
  <!-- Badge -->
  <rect x="100" y="140" width="60" height="14" fill="#a31f34"/>
  <text x="130" y="151" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">H100s</text>

  <!-- ===== Row 1: Training Cost ===== -->
  <rect x="465" y="55" width="395" height="100" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="663" y="80" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Training Compute</text>
  <text x="663" y="108" font-size="28" font-weight="700" fill="#333" text-anchor="middle">10&#xB2;&#x2074; FLOPs</text>
  <text x="663" y="130" font-size="9" fill="#555" text-anchor="middle">Total compute for frontier model training (GPT-4 class)</text>
  <!-- Badge -->
  <rect x="620" y="140" width="90" height="14" fill="#a31f34"/>
  <text x="665" y="151" font-size="7" font-weight="700" fill="#fff" text-anchor="middle">Petaflop-days</text>

  <!-- ===== Row 2: Network ===== -->
  <rect x="40" y="175" width="395" height="100" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="238" y="200" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Bisection Bandwidth</text>
  <text x="238" y="228" font-size="28" font-weight="700" fill="#333" text-anchor="middle">400 Gb/s</text>
  <text x="238" y="250" font-size="9" fill="#555" text-anchor="middle">Per-port InfiniBand NDR (51.2 TB/s aggregate per switch)</text>

  <!-- ===== Row 2: Failure Rate ===== -->
  <rect x="465" y="175" width="395" height="100" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="663" y="200" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">GPU Failure Rate</text>
  <text x="663" y="228" font-size="28" font-weight="700" fill="#333" text-anchor="middle">2-3 / day</text>
  <text x="663" y="250" font-size="9" fill="#555" text-anchor="middle">Expected GPU failures in a 10,000-node cluster (MTBF analysis)</text>

  <!-- ===== Row 3: Key contrasts ===== -->
  <rect x="40" y="300" width="260" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="170" y="325" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Single Node (Vol 1)</text>
  <line x1="60" y1="333" x2="280" y2="333" stroke="#bbb" stroke-width="0.6"/>
  <text x="170" y="353" font-size="9" fill="#555" text-anchor="middle">1-8 GPUs</text>
  <text x="170" y="371" font-size="9" fill="#555" text-anchor="middle">NVLink: 900 GB/s</text>
  <text x="170" y="389" font-size="9" fill="#555" text-anchor="middle">Shared memory</text>
  <text x="170" y="407" font-size="9" fill="#555" text-anchor="middle">Failure: rare event</text>

  <rect x="320" y="300" width="260" height="130" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="325" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Fleet Scale (Vol 2)</text>
  <line x1="340" y1="333" x2="560" y2="333" stroke="#4a90c4" stroke-width="0.6"/>
  <text x="450" y="353" font-size="9" fill="#333" text-anchor="middle">10,000+ GPUs</text>
  <text x="450" y="371" font-size="9" fill="#333" text-anchor="middle">InfiniBand: 400 Gb/s per link</text>
  <text x="450" y="389" font-size="9" fill="#333" text-anchor="middle">Message passing (NCCL, MPI)</text>
  <text x="450" y="407" font-size="9" fill="#333" text-anchor="middle">Failure: statistical certainty</text>

  <!-- Scale factors on the right -->
  <rect x="600" y="300" width="260" height="130" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="730" y="325" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Scale Factors</text>
  <line x1="620" y1="333" x2="840" y2="333" stroke="#c44" stroke-width="0.6"/>
  <text x="730" y="353" font-size="9" fill="#333" text-anchor="middle">1,000x more GPUs</text>
  <text x="730" y="371" font-size="9" fill="#333" text-anchor="middle">10x lower per-link bandwidth</text>
  <text x="730" y="389" font-size="9" fill="#333" text-anchor="middle">Distributed state management</text>
  <text x="730" y="407" font-size="9" fill="#333" text-anchor="middle">Failures every few hours</text>

  <!-- ===== Bottom insight ===== -->
  <rect x="120" y="445" width="660" height="35" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="468" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">At fleet scale, communication and coordination dominate --- compute is the easy part</text>
</svg>
