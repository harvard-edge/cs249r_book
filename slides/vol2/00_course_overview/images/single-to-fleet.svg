<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">From Single Node to Fleet: What Changes Everything</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Left: Single Node ===== -->
  <rect x="40" y="55" width="350" height="260" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="215" y="80" font-size="12" font-weight="700" fill="#555" text-anchor="middle">Volume I: Single Node</text>

  <!-- Node box -->
  <rect x="80" y="100" width="270" height="140" rx="4" fill="#fff" stroke="#bbb" stroke-width="1.0"/>
  <text x="215" y="120" font-size="9" font-weight="700" fill="#333" text-anchor="middle">One Machine (1-8 GPUs)</text>

  <!-- GPU boxes inside node -->
  <rect x="95" y="135" width="55" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="122" y="157" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU 0</text>

  <rect x="158" y="135" width="55" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="185" y="157" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU 1</text>

  <rect x="221" y="135" width="55" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="248" y="157" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU 2</text>

  <rect x="284" y="135" width="55" height="35" rx="3" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="311" y="157" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">GPU 3</text>

  <!-- NVLink bar -->
  <rect x="95" y="180" width="244" height="18" rx="2" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="217" y="193" font-size="7.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">NVLink: 900 GB/s</text>

  <!-- Shared memory -->
  <rect x="95" y="208" width="244" height="20" rx="2" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="217" y="222" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Shared Memory</text>

  <!-- Properties -->
  <text x="215" y="260" font-size="8.5" fill="#555" text-anchor="middle">PCIe bus  |  torch.nn.DataParallel</text>
  <text x="215" y="278" font-size="8.5" fill="#555" text-anchor="middle">Failure = hardware malfunction (rare)</text>
  <text x="215" y="296" font-size="8.5" fill="#555" text-anchor="middle">Memory coherent  |  Microsecond latency</text>

  <!-- ===== Transition Arrow ===== -->
  <line x1="400" y1="185" x2="500" y2="185" stroke="#a31f34" stroke-width="2.0" marker-end="url(#arrow-red)"/>
  <text x="450" y="175" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">SCALE</text>

  <!-- ===== Right: Fleet ===== -->
  <rect x="510" y="55" width="355" height="260" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="688" y="80" font-size="12" font-weight="700" fill="#4a90c4" text-anchor="middle">Volume II: The Fleet</text>

  <!-- Multiple node boxes -->
  <rect x="530" y="100" width="120" height="70" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="590" y="120" font-size="7.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Node 0</text>
  <rect x="544" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="570" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="596" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="622" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="544" y="150" width="100" height="10" rx="1" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.5"/>

  <rect x="665" y="100" width="120" height="70" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="725" y="120" font-size="7.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Node 1</text>
  <rect x="679" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="705" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="731" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="757" y="132" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="679" y="150" width="100" height="10" rx="1" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.5"/>

  <rect x="530" y="185" width="120" height="70" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="590" y="205" font-size="7.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Node 2</text>
  <rect x="544" y="217" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="570" y="217" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="596" y="217" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="622" y="217" width="22" height="16" rx="2" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.6"/>
  <rect x="544" y="235" width="100" height="10" rx="1" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.5"/>

  <!-- Ellipsis node -->
  <rect x="665" y="185" width="120" height="70" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="725" y="225" font-size="14" font-weight="700" fill="#999" text-anchor="middle">...</text>
  <text x="725" y="245" font-size="7" fill="#999" text-anchor="middle">10,000+ nodes</text>

  <!-- Network fabric connecting them -->
  <line x1="650" y1="135" x2="665" y2="135" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="650" y1="220" x2="665" y2="220" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="590" y1="170" x2="590" y2="185" stroke="#c87b2a" stroke-width="1.5"/>
  <line x1="725" y1="170" x2="725" y2="185" stroke="#c87b2a" stroke-width="1.5"/>

  <!-- Properties -->
  <text x="688" y="275" font-size="8.5" fill="#333" text-anchor="middle">InfiniBand fabric  |  torch.distributed</text>
  <text x="688" y="293" font-size="8.5" fill="#333" text-anchor="middle">Failure = statistical certainty (daily)</text>
  <text x="688" y="311" font-size="8.5" fill="#333" text-anchor="middle">Message passing  |  Millisecond latency</text>

  <!-- ===== Bottom: Three key changes ===== -->
  <rect x="50" y="340" width="250" height="85" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="175" y="365" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Communication Dominates</text>
  <text x="175" y="383" font-size="8.5" fill="#333" text-anchor="middle">Network is the bus. AllReduce cost</text>
  <text x="175" y="398" font-size="8.5" fill="#333" text-anchor="middle">grows with cluster size. Bandwidth</text>
  <text x="175" y="413" font-size="8.5" fill="#333" text-anchor="middle">is the scarcest resource.</text>

  <rect x="325" y="340" width="250" height="85" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="365" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Failure is Routine</text>
  <text x="450" y="383" font-size="8.5" fill="#333" text-anchor="middle">10,000 GPUs with 100,000h MTBF</text>
  <text x="450" y="398" font-size="8.5" fill="#333" text-anchor="middle">= one failure every 10 hours.</text>
  <text x="450" y="413" font-size="8.5" fill="#333" text-anchor="middle">Checkpointing is not optional.</text>

  <rect x="600" y="340" width="250" height="85" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="725" y="365" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Behavior Emerges</text>
  <text x="725" y="383" font-size="8.5" fill="#333" text-anchor="middle">No single component determines</text>
  <text x="725" y="398" font-size="8.5" fill="#333" text-anchor="middle">system behavior. Stragglers, hot</text>
  <text x="725" y="413" font-size="8.5" fill="#333" text-anchor="middle">spots, and cascading failures.</text>

  <!-- Footnote -->
  <text x="450" y="465" font-size="9" fill="#999" font-style="italic" text-anchor="middle">The fleet is the computer --- the network is the bus</text>
</svg>
