<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="35" font-size="14" font-weight="700" fill="#333" text-anchor="middle">The C&#xB3; Diagnostic Framework</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Three main pillars ===== -->

  <!-- Compute -->
  <rect x="60" y="70" width="240" height="180" rx="6" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="180" y="98" font-size="13" font-weight="700" fill="#4a90c4" text-anchor="middle">COMPUTE</text>
  <line x1="100" y1="108" x2="260" y2="108" stroke="#4a90c4" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="180" y="130" font-size="9.5" fill="#333" text-anchor="middle">Accelerator utilization</text>
  <text x="180" y="148" font-size="9.5" fill="#333" text-anchor="middle">FLOP throughput per device</text>
  <text x="180" y="166" font-size="9.5" fill="#333" text-anchor="middle">Parallelism strategy (DP/TP/PP)</text>
  <text x="180" y="184" font-size="9.5" fill="#333" text-anchor="middle">Memory capacity per node</text>
  <!-- Badge -->
  <rect x="140" y="205" width="80" height="22" rx="12" fill="#a31f34"/>
  <text x="180" y="220" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Ch 2, 5, 9</text>

  <!-- Communication -->
  <rect x="330" y="70" width="240" height="180" rx="6" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="450" y="98" font-size="13" font-weight="700" fill="#3d9e5a" text-anchor="middle">COMMUNICATION</text>
  <line x1="370" y1="108" x2="530" y2="108" stroke="#3d9e5a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="450" y="130" font-size="9.5" fill="#333" text-anchor="middle">Network bandwidth &amp; latency</text>
  <text x="450" y="148" font-size="9.5" fill="#333" text-anchor="middle">Collective operations (AllReduce)</text>
  <text x="450" y="166" font-size="9.5" fill="#333" text-anchor="middle">Gradient compression</text>
  <text x="450" y="184" font-size="9.5" fill="#333" text-anchor="middle">Cross-rack / cross-DC traffic</text>
  <!-- Badge -->
  <rect x="410" y="205" width="80" height="22" rx="12" fill="#a31f34"/>
  <text x="450" y="220" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Ch 3, 6, 10</text>

  <!-- Coordination -->
  <rect x="600" y="70" width="240" height="180" rx="6" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="720" y="98" font-size="13" font-weight="700" fill="#c87b2a" text-anchor="middle">COORDINATION</text>
  <line x1="640" y1="108" x2="800" y2="108" stroke="#c87b2a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="720" y="130" font-size="9.5" fill="#333" text-anchor="middle">Fault detection &amp; recovery</text>
  <text x="720" y="148" font-size="9.5" fill="#333" text-anchor="middle">Scheduling &amp; orchestration</text>
  <text x="720" y="166" font-size="9.5" fill="#333" text-anchor="middle">Consistency &amp; synchronization</text>
  <text x="720" y="184" font-size="9.5" fill="#333" text-anchor="middle">Resource allocation policies</text>
  <!-- Badge -->
  <rect x="680" y="205" width="80" height="22" rx="12" fill="#a31f34"/>
  <text x="720" y="220" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Ch 7, 8, 12</text>

  <!-- ===== Connecting arrows between pillars ===== -->
  <line x1="300" y1="160" x2="330" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="570" y1="160" x2="600" y2="160" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Central diagnostic question ===== -->
  <rect x="200" y="280" width="500" height="60" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="450" y="305" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Diagnostic Question</text>
  <text x="450" y="325" font-size="10" fill="#333" text-anchor="middle">"Is the fleet bottlenecked on Compute, Communication, or Coordination?"</text>

  <!-- Arrows from boxes to diagnostic -->
  <line x1="180" y1="250" x2="350" y2="280" stroke="#4a90c4" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="450" y1="250" x2="450" y2="280" stroke="#3d9e5a" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <line x1="720" y1="250" x2="550" y2="280" stroke="#c87b2a" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- ===== Scale insight row ===== -->
  <rect x="80" y="370" width="220" height="80" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="190" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Vol 1: Single Node</text>
  <text x="190" y="413" font-size="8.5" fill="#555" text-anchor="middle">PCIe / NVLink within one box</text>
  <text x="190" y="429" font-size="8.5" fill="#555" text-anchor="middle">Shared memory, 1-8 GPUs</text>

  <rect x="340" y="370" width="220" height="80" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="395" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Vol 2: The Fleet</text>
  <text x="450" y="413" font-size="8.5" fill="#333" text-anchor="middle">InfiniBand / Ethernet fabric</text>
  <text x="450" y="429" font-size="8.5" fill="#333" text-anchor="middle">Message passing, 10,000+ GPUs</text>

  <!-- Arrow between Vol1 and Vol2 -->
  <line x1="300" y1="410" x2="340" y2="410" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <rect x="600" y="370" width="220" height="80" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="710" y="395" font-size="9" font-weight="700" fill="#333" text-anchor="middle">New Constraints</text>
  <text x="710" y="413" font-size="8.5" fill="#555" text-anchor="middle">Failure is statistical certainty</text>
  <text x="710" y="429" font-size="8.5" fill="#555" text-anchor="middle">Communication dominates compute</text>

  <line x1="560" y1="410" x2="600" y2="410" stroke="#555" stroke-width="1.0" marker-end="url(#arrow)"/>

  <!-- Footnote -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">C&#xB3; = Compute + Communication + Coordination --- the Vol 2 diagnostic lens</text>
</svg>
