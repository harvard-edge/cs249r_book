<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="32" font-size="14" font-weight="700" fill="#333" text-anchor="middle">Volume II Course Roadmap: 17 Chapters in Four Parts</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Part I: The Fleet ===== -->
  <rect x="30" y="55" width="200" height="195" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="130" y="78" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Part I: The Fleet</text>
  <line x1="50" y1="86" x2="210" y2="86" stroke="#4a90c4" stroke-width="0.6" stroke-opacity="0.4"/>

  <rect x="45" y="96" width="170" height="28" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="130" y="114" font-size="8.5" fill="#333" text-anchor="middle">Ch 1: Introduction</text>

  <rect x="45" y="130" width="170" height="28" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="130" y="148" font-size="8.5" fill="#333" text-anchor="middle">Ch 2: Compute Infrastructure</text>

  <rect x="45" y="164" width="170" height="28" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="130" y="182" font-size="8.5" fill="#333" text-anchor="middle">Ch 3: Network Fabrics</text>

  <rect x="45" y="198" width="170" height="28" rx="3" fill="#fff" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="130" y="216" font-size="8.5" fill="#333" text-anchor="middle">Ch 4: Data Storage</text>

  <!-- ===== Part II: Distributed ML ===== -->
  <rect x="245" y="55" width="200" height="195" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="345" y="78" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Part II: Distributed ML</text>
  <line x1="265" y1="86" x2="425" y2="86" stroke="#3d9e5a" stroke-width="0.6" stroke-opacity="0.4"/>

  <rect x="260" y="96" width="170" height="28" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="345" y="114" font-size="8.5" fill="#333" text-anchor="middle">Ch 5: Distributed Training</text>

  <rect x="260" y="130" width="170" height="28" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="345" y="148" font-size="8.5" fill="#333" text-anchor="middle">Ch 6: Collective Comm.</text>

  <rect x="260" y="164" width="170" height="28" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="345" y="182" font-size="8.5" fill="#333" text-anchor="middle">Ch 7: Fault Tolerance</text>

  <rect x="260" y="198" width="170" height="28" rx="3" fill="#fff" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="345" y="216" font-size="8.5" fill="#333" text-anchor="middle">Ch 8: Fleet Orchestration</text>

  <!-- ===== Part III: Deployment at Scale ===== -->
  <rect x="460" y="55" width="200" height="195" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="560" y="78" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Part III: Deployment</text>
  <line x1="480" y1="86" x2="640" y2="86" stroke="#c87b2a" stroke-width="0.6" stroke-opacity="0.4"/>

  <rect x="475" y="96" width="170" height="28" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="560" y="114" font-size="8.5" fill="#333" text-anchor="middle">Ch 9: Inference at Scale</text>

  <rect x="475" y="130" width="170" height="28" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="560" y="148" font-size="8.5" fill="#333" text-anchor="middle">Ch 10: Perf. Engineering</text>

  <rect x="475" y="164" width="170" height="28" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="560" y="182" font-size="8.5" fill="#333" text-anchor="middle">Ch 11: Edge Intelligence</text>

  <rect x="475" y="198" width="170" height="28" rx="3" fill="#fff" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="560" y="216" font-size="8.5" fill="#333" text-anchor="middle">Ch 12: Ops at Scale</text>

  <!-- ===== Part IV: The Responsible Fleet ===== -->
  <rect x="675" y="55" width="200" height="230" rx="5" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="775" y="78" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Part IV: Responsible</text>
  <line x1="695" y1="86" x2="855" y2="86" stroke="#c44" stroke-width="0.6" stroke-opacity="0.4"/>

  <rect x="690" y="96" width="170" height="28" rx="3" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="775" y="114" font-size="8.5" fill="#333" text-anchor="middle">Ch 13: Security</text>

  <rect x="690" y="130" width="170" height="28" rx="3" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="775" y="148" font-size="8.5" fill="#333" text-anchor="middle">Ch 14: Robustness</text>

  <rect x="690" y="164" width="170" height="28" rx="3" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="775" y="182" font-size="8.5" fill="#333" text-anchor="middle">Ch 15: Sustainability</text>

  <rect x="690" y="198" width="170" height="28" rx="3" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="775" y="216" font-size="8.5" fill="#333" text-anchor="middle">Ch 16: Responsible AI</text>

  <rect x="690" y="232" width="170" height="28" rx="3" fill="#fff" stroke="#c44" stroke-width="0.8"/>
  <text x="775" y="250" font-size="8.5" fill="#333" text-anchor="middle">Ch 17: Conclusion</text>

  <!-- ===== Horizontal flow arrows between parts ===== -->
  <line x1="230" y1="150" x2="245" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="445" y1="150" x2="460" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="150" x2="675" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Bottom: C3 threading ===== -->
  <rect x="80" y="310" width="740" height="55" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.0"/>
  <text x="450" y="332" font-size="10" font-weight="700" fill="#333" text-anchor="middle">C&#xB3; threads through every part</text>
  <text x="450" y="350" font-size="9" fill="#555" text-anchor="middle">
    <tspan fill="#4a90c4" font-weight="700">Compute</tspan> constraints in Part I &amp; II  |
    <tspan fill="#3d9e5a" font-weight="700">Communication</tspan> constraints in Part II &amp; III  |
    <tspan fill="#c87b2a" font-weight="700">Coordination</tspan> constraints in Part III &amp; IV
  </text>

  <!-- ===== Bottom: Key stats ===== -->
  <rect x="80" y="385" width="170" height="65" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.0"/>
  <text x="165" y="407" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">17 Chapters</text>
  <text x="165" y="425" font-size="8.5" fill="#555" text-anchor="middle">4 major parts</text>
  <text x="165" y="440" font-size="8.5" fill="#555" text-anchor="middle">~15 weeks of instruction</text>

  <rect x="275" y="385" width="170" height="65" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.0"/>
  <text x="360" y="407" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Fleet Scale</text>
  <text x="360" y="425" font-size="8.5" fill="#555" text-anchor="middle">10,000+ GPU clusters</text>
  <text x="360" y="440" font-size="8.5" fill="#555" text-anchor="middle">Petaflop-days of training</text>

  <rect x="470" y="385" width="170" height="65" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.0"/>
  <text x="555" y="407" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Production Focus</text>
  <text x="555" y="425" font-size="8.5" fill="#555" text-anchor="middle">SLA-driven engineering</text>
  <text x="555" y="440" font-size="8.5" fill="#555" text-anchor="middle">Real failure modes</text>

  <rect x="665" y="385" width="170" height="65" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.0"/>
  <text x="750" y="407" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Responsible</text>
  <text x="750" y="425" font-size="8.5" fill="#555" text-anchor="middle">Ethics built in, not bolted on</text>
  <text x="750" y="440" font-size="8.5" fill="#555" text-anchor="middle">Governance at fleet scale</text>

  <!-- Footnote -->
  <text x="450" y="480" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Volume II: Machine Learning Systems at Scale --- from one node to the fleet</text>
</svg>
