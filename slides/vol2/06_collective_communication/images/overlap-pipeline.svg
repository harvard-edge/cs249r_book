<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff" rx="4"/>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Communication-Computation Overlap</text>

  <!-- ===== Top: Without overlap (sequential) ===== -->
  <text x="60" y="60" font-size="10" font-weight="700" fill="#c44">Without Overlap (Sequential)</text>

  <!-- Backward pass -->
  <rect x="60" y="70" width="400" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="3"/>
  <text x="260" y="93" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Backward Pass (all layers): 480 ms</text>

  <!-- AllReduce -->
  <rect x="460" y="70" width="380" height="35" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="3"/>
  <text x="650" y="93" font-size="9" font-weight="700" fill="#333" text-anchor="middle">AllReduce (all layers): 845 ms</text>

  <!-- Total -->
  <text x="845" y="93" font-size="9" font-weight="700" fill="#c44">1325 ms</text>

  <!-- ===== Bottom: With overlap (pipelined) ===== -->
  <text x="60" y="140" font-size="10" font-weight="700" fill="#3d9e5a">With Overlap (Pipelined)</text>

  <!-- Layer-by-layer backward + overlapped AllReduce -->
  <!-- Layer L (last layer backward = first to complete) -->
  <rect x="60" y="155" width="80" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="100" y="174" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Bwd L32</text>

  <rect x="140" y="155" width="80" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="180" y="174" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Bwd L31</text>

  <rect x="220" y="155" width="80" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="260" y="174" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Bwd L30</text>

  <rect x="300" y="155" width="40" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="3"/>
  <text x="320" y="174" font-size="7" fill="#555" text-anchor="middle">...</text>

  <rect x="340" y="155" width="80" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2" rx="3"/>
  <text x="380" y="174" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Bwd L1</text>

  <!-- Overlapped AllReduce (starts after each layer completes) -->
  <rect x="140" y="190" width="100" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="3"/>
  <text x="190" y="207" font-size="7" font-weight="700" fill="#333" text-anchor="middle">AR L32</text>

  <rect x="220" y="190" width="100" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="3"/>
  <text x="270" y="207" font-size="7" font-weight="700" fill="#333" text-anchor="middle">AR L31</text>

  <rect x="300" y="190" width="40" height="25" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="3"/>
  <text x="320" y="207" font-size="7" fill="#555" text-anchor="middle">...</text>

  <rect x="340" y="190" width="100" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2" rx="3"/>
  <text x="390" y="207" font-size="7" font-weight="700" fill="#333" text-anchor="middle">AR L2</text>

  <!-- Exposed tail -->
  <rect x="420" y="190" width="100" height="25" fill="#f9d6d5" stroke="#c44" stroke-width="1.5" rx="3"/>
  <text x="470" y="207" font-size="7" font-weight="700" fill="#c44" text-anchor="middle">AR L1 (exposed)</text>

  <!-- Total with overlap -->
  <text x="530" y="207" font-size="9" font-weight="700" fill="#3d9e5a">~360 ms (73% savings)</text>

  <!-- ===== Bucket Fusion diagram ===== -->
  <rect x="60" y="240" width="400" height="125" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="260" y="262" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Bucket Fusion Strategy</text>

  <!-- Small tensors -->
  <rect x="80" y="275" width="35" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="97" y="289" font-size="6" fill="#333" text-anchor="middle">Q</text>
  <rect x="118" y="275" width="35" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="136" y="289" font-size="6" fill="#333" text-anchor="middle">K</text>
  <rect x="156" y="275" width="35" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="174" y="289" font-size="6" fill="#333" text-anchor="middle">V</text>
  <rect x="194" y="275" width="35" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="212" y="289" font-size="6" fill="#333" text-anchor="middle">Out</text>
  <rect x="232" y="275" width="25" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="244" y="289" font-size="6" fill="#333" text-anchor="middle">LN</text>
  <rect x="260" y="275" width="50" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="285" y="289" font-size="6" fill="#333" text-anchor="middle">FFN1</text>
  <rect x="313" y="275" width="50" height="20" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="2"/>
  <text x="338" y="289" font-size="6" fill="#333" text-anchor="middle">FFN2</text>

  <!-- Bracket to bucket -->
  <rect x="80" y="300" width="283" height="3" fill="#c87b2a"/>
  <text x="222" y="320" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">One 25 MB Bucket = One AllReduce</text>
  <text x="222" y="335" font-size="8" fill="#555" text-anchor="middle">Amortizes alpha overhead across many tensors</text>
  <text x="222" y="350" font-size="8" fill="#555" text-anchor="middle">DDP uses reverse-order assignment for maximum overlap</text>

  <!-- ===== Right side: Overlap limits ===== -->
  <rect x="480" y="240" width="400" height="125" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="680" y="262" font-size="11" font-weight="700" fill="#333" text-anchor="middle">When Hiding Fails</text>

  <text x="500" y="285" font-size="9" fill="#555">1. First layer: no prior comm to hide behind</text>
  <text x="500" y="305" font-size="9" fill="#555">2. Last layer: no subsequent compute to hide in</text>
  <text x="500" y="325" font-size="9" fill="#555">3. T_compute &lt; T_comm: GPU still stalls</text>
  <text x="500" y="345" font-size="9" fill="#555">4. Memory pressure: overlap needs extra buffers</text>

  <!-- ===== Summary bar ===== -->
  <rect x="60" y="385" width="780" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="5"/>
  <text x="450" y="408" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Full Optimization Stack: Hierarchical AllReduce + Topology Routing + Overlap = 5-15% effective comm overhead</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Overlap is most effective when T_backward_per_layer > T_AllReduce_per_layer</text>
</svg>
