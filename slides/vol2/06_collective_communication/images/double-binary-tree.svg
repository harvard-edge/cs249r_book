<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Double Binary Tree AllReduce: O(log N) Latency + Near-Optimal Bandwidth</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Tree A (left half) ===== -->
  <text x="225" y="60" font-size="11" font-weight="700" fill="#4a90c4" text-anchor="middle">Tree A (Even Chunks)</text>

  <!-- GPU nodes for Tree A -->
  <rect x="60" y="80" width="60" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="90" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>

  <rect x="160" y="80" width="60" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="190" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>

  <rect x="260" y="80" width="60" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="290" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>

  <rect x="360" y="80" width="60" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="390" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <!-- Tree A structure -->
  <rect x="130" y="155" width="50" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="155" y="172" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Sum</text>

  <rect x="280" y="155" width="50" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="305" y="172" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Sum</text>

  <rect x="200" y="220" width="60" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="230" y="237" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Root A</text>

  <!-- Tree A arrows -->
  <line x1="90" y1="110" x2="145" y2="155" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="110" x2="165" y2="155" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="110" x2="295" y2="155" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="390" y1="110" x2="315" y2="155" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="155" y1="180" x2="220" y2="220" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="305" y1="180" x2="240" y2="220" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="290" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Tree B (right half) ===== -->
  <text x="675" y="60" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">Tree B (Odd Chunks)</text>

  <!-- GPU nodes for Tree B -->
  <rect x="510" y="80" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="540" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>

  <rect x="610" y="80" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="640" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>

  <rect x="710" y="80" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="740" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>

  <rect x="810" y="80" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="840" y="100" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>

  <!-- Tree B structure (different root) -->
  <rect x="580" y="155" width="50" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="605" y="172" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Sum</text>

  <rect x="730" y="155" width="50" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="755" y="172" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Sum</text>

  <rect x="650" y="220" width="60" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="680" y="237" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Root B</text>

  <!-- Tree B arrows -->
  <line x1="540" y1="110" x2="595" y2="155" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="110" x2="615" y2="155" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="740" y1="110" x2="745" y2="155" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="840" y1="110" x2="765" y2="155" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="605" y1="180" x2="670" y2="220" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="755" y1="180" x2="690" y2="220" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ===== Combined Result ===== -->
  <rect x="300" y="300" width="300" height="50" fill="#f7f7f7" stroke="#bbb" stroke-width="1.5"/>
  <text x="450" y="320" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Combined Result</text>
  <text x="450" y="338" font-size="9" fill="#555" text-anchor="middle">Tree A handles half the data + Tree B handles the other half</text>

  <!-- Arrows from roots to combined -->
  <line x1="230" y1="245" x2="380" y2="300" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="680" y1="245" x2="520" y2="300" stroke="#3d9e5a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ===== Performance comparison ===== -->
  <rect x="100" y="380" width="300" height="70" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="250" y="400" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Single Tree</text>
  <text x="250" y="418" font-size="9" fill="#555" text-anchor="middle">Latency: O(log N) -- Bandwidth: O(log N) M/B</text>
  <text x="250" y="436" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">log N bandwidth penalty</text>

  <rect x="500" y="380" width="300" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="650" y="400" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Double Binary Tree</text>
  <text x="650" y="418" font-size="9" fill="#555" text-anchor="middle">Latency: O(log N) -- Bandwidth: ~2M/B</text>
  <text x="650" y="436" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Near-optimal in both dimensions</text>

  <!-- Footnote -->
  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">NCCL default since v2.7 -- two overlapping trees achieve the bandwidth of Ring with the latency of Tree</text>
</svg>
