<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The LogP Model and the NCCL Reality Gap</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- LogP Model Parameters -->
  <rect x="50" y="55" width="380" height="190" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="240" y="75" font-size="11" font-weight="700" fill="#333" text-anchor="middle">LogP Model Parameters</text>

  <rect x="70" y="90" width="80" height="40" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="110" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">L</text>
  <text x="110" y="125" font-size="7.5" fill="#555" text-anchor="middle">Latency</text>

  <rect x="170" y="90" width="80" height="40" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="210" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">o</text>
  <text x="210" y="125" font-size="7.5" fill="#555" text-anchor="middle">Overhead</text>

  <rect x="270" y="90" width="80" height="40" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="310" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">g</text>
  <text x="310" y="125" font-size="7.5" fill="#555" text-anchor="middle">Gap</text>

  <rect x="370" y="90" width="40" height="40" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="390" y="110" font-size="10" font-weight="700" fill="#333" text-anchor="middle">P</text>
  <text x="390" y="125" font-size="7.5" fill="#555" text-anchor="middle">GPUs</text>

  <text x="70" y="160" font-size="9" fill="#555">L = network wire latency (1-2 us)</text>
  <text x="70" y="177" font-size="9" fill="#555">o = CPU overhead per msg (non-overlappable)</text>
  <text x="70" y="194" font-size="9" fill="#555">g = minimum inter-message spacing</text>
  <text x="70" y="211" font-size="9" fill="#555">P = number of processors (GPUs)</text>
  <text x="70" y="232" font-size="9" font-weight="700" fill="#333">T = L + o + ceil(n/m) * g</text>

  <!-- Reality Gap -->
  <rect x="470" y="55" width="390" height="190" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="665" y="75" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">The NCCL Reality Gap</text>

  <!-- Wire vs NCCL comparison bars -->
  <text x="490" y="100" font-size="9" font-weight="700" fill="#333">Wire-level alpha:</text>
  <rect x="620" y="88" width="40" height="16" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="670" y="101" font-size="8.5" fill="#555">1-2 us</text>

  <text x="490" y="130" font-size="9" font-weight="700" fill="#333">NCCL effective alpha:</text>
  <rect x="620" y="118" width="200" height="16" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="830" y="131" font-size="8.5" fill="#555">10-20 us</text>

  <text x="490" y="160" font-size="9" fill="#555">Gap sources:</text>
  <text x="510" y="177" font-size="8.5" fill="#555">+ Kernel launch overhead: 3-5 us</text>
  <text x="510" y="192" font-size="8.5" fill="#555">+ PCIe traversal: 2-5 us</text>
  <text x="510" y="207" font-size="8.5" fill="#555">+ Protocol negotiation: 2-5 us</text>
  <text x="510" y="222" font-size="8.5" fill="#555">+ Memory copy setup: 1-3 us</text>

  <text x="665" y="240" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">5-10x higher than wire speed</text>

  <!-- Impact on n* -->
  <rect x="50" y="270" width="800" height="90" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="450" y="295" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Impact on Crossover Point n*</text>

  <text x="70" y="320" font-size="9.5" fill="#333">Wire-level: n* = alpha * beta = 2 us * 50 GB/s = 100 KB</text>
  <text x="70" y="340" font-size="9.5" fill="#333">NCCL-level: n* = 15 us * 50 GB/s = 750 KB</text>
  <text x="540" y="330" font-size="10" font-weight="700" fill="#a31f34">7.5x more messages are latency-bound in practice</text>

  <!-- Small message throughput -->
  <rect x="50" y="385" width="390" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="245" y="408" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Small Message Throughput</text>
  <text x="245" y="428" font-size="9" fill="#555" text-anchor="middle">nccl-tests: 30-50% of theoretical peak for msgs &lt; 1 MB</text>
  <text x="245" y="443" font-size="9" fill="#555" text-anchor="middle">Dominated by NCCL overhead, not wire bandwidth</text>

  <rect x="460" y="385" width="390" height="70" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="655" y="408" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Large Message Throughput</text>
  <text x="655" y="428" font-size="9" fill="#555" text-anchor="middle">nccl-tests: 85-95% of theoretical peak for msgs &gt; 100 MB</text>
  <text x="655" y="443" font-size="9" fill="#555" text-anchor="middle">Bandwidth-dominated regime -- overhead amortized</text>

  <text x="450" y="485" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Always use measured NCCL alpha (from nccl-tests), not wire-level alpha, for system planning</text>
</svg>
