<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90c4"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Ring AllReduce: Bandwidth-Optimal in 2(N-1) Steps</text>

  <!-- ===== Left: Ring diagram ===== -->
  <!-- 4 GPUs in a ring -->
  <rect x="130" y="80" width="80" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="170" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 0</text>
  <text x="170" y="115" font-size="8" fill="#555" text-anchor="middle">[1, 5, 3, 7]</text>

  <rect x="310" y="80" width="80" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="350" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 1</text>
  <text x="350" y="115" font-size="8" fill="#555" text-anchor="middle">[2, 6, 4, 8]</text>

  <rect x="310" y="200" width="80" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="350" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 2</text>
  <text x="350" y="235" font-size="8" fill="#555" text-anchor="middle">[3, 7, 5, 9]</text>

  <rect x="130" y="200" width="80" height="45" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="170" y="220" font-size="10" font-weight="700" fill="#333" text-anchor="middle">GPU 3</text>
  <text x="170" y="235" font-size="8" fill="#555" text-anchor="middle">[4, 8, 6, 10]</text>

  <!-- Ring arrows -->
  <path d="M212,100 L308,100" stroke="#4a90c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M350,127 L350,198" stroke="#4a90c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M308,222 L212,222" stroke="#4a90c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M170,198 L170,127" stroke="#4a90c4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase labels -->
  <text x="260" y="70" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Scatter-Reduce</text>
  <text x="260" y="275" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">then AllGather</text>

  <!-- ===== Right: Performance equations ===== -->
  <rect x="470" y="60" width="400" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="670" y="85" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Ring AllReduce Performance</text>

  <text x="500" y="115" font-size="10" fill="#333">T = 2(N-1)alpha + 2(N-1)/N * M/beta</text>
  <text x="500" y="140" font-size="9" fill="#3d9e5a" font-weight="700">Bandwidth: approaches 2M/beta (optimal)</text>
  <text x="500" y="160" font-size="9" fill="#c44" font-weight="700">Latency: O(N) --- bad for large clusters</text>

  <!-- ===== Comparison box ===== -->
  <rect x="470" y="200" width="400" height="100" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2" rx="5"/>
  <text x="670" y="225" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Tree AllReduce Performance</text>

  <text x="500" y="252" font-size="10" fill="#333">T = 2 log N * alpha + 2 log N * M/beta</text>
  <text x="500" y="275" font-size="9" fill="#3d9e5a" font-weight="700">Latency: O(log N) --- great for small msgs</text>
  <text x="500" y="290" font-size="9" fill="#c44" font-weight="700">Bandwidth: log N factor --- not optimal</text>

  <!-- ===== Bottom: Key insight ===== -->
  <rect x="60" y="330" width="780" height="65" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5" rx="5"/>
  <text x="450" y="355" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Algorithm Selection Rule</text>
  <text x="450" y="380" font-size="10" fill="#555" text-anchor="middle">M_crossover = N * alpha * beta --- below: use Tree (latency wins) | above: use Ring (bandwidth wins)</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Ring saturates every link every step --- no GPU sits idle, achieving bandwidth optimality</text>
</svg>
