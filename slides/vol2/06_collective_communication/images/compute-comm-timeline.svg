<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Communication Overhead Grows with Scale</text>

  <!-- ===== Legend ===== -->
  <rect x="560" y="45" width="14" height="14" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="580" y="56" font-size="9" fill="#333">Compute</text>
  <rect x="640" y="45" width="14" height="14" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="660" y="56" font-size="9" fill="#333">Communication</text>
  <rect x="750" y="45" width="14" height="14" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="770" y="56" font-size="9" fill="#333">Sync/Idle</text>

  <!-- ===== Stacked bars ===== -->
  <!-- Bar geometry: x=160, width_total=600, y starts at 80, bar height=55, gap=20 -->

  <!-- 8 GPUs (1 node) -->
  <text x="145" y="113" font-size="10" font-weight="700" fill="#333" text-anchor="end">8 GPUs</text>
  <text x="145" y="125" font-size="8" fill="#555" text-anchor="end">(1 node)</text>
  <rect x="160" y="90" width="450" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="385" y="120" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">75%</text>
  <rect x="610" y="90" width="150" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="685" y="120" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">25%</text>

  <!-- 64 GPUs (8 nodes) -->
  <text x="145" y="183" font-size="10" font-weight="700" fill="#333" text-anchor="end">64 GPUs</text>
  <text x="145" y="195" font-size="8" fill="#555" text-anchor="end">(8 nodes)</text>
  <rect x="160" y="160" width="270" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="295" y="190" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">45%</text>
  <rect x="430" y="160" width="300" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="580" y="190" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">50%</text>
  <rect x="730" y="160" width="30" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="745" y="190" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">5%</text>

  <!-- 512 GPUs (64 nodes) -->
  <text x="145" y="253" font-size="10" font-weight="700" fill="#333" text-anchor="end">512 GPUs</text>
  <text x="145" y="265" font-size="8" fill="#555" text-anchor="end">(64 nodes)</text>
  <rect x="160" y="230" width="180" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="250" y="260" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">30%</text>
  <rect x="340" y="230" width="360" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="520" y="260" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">60%</text>
  <rect x="700" y="230" width="60" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="730" y="260" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">10%</text>

  <!-- 4096 GPUs (512 nodes) -->
  <text x="145" y="323" font-size="10" font-weight="700" fill="#333" text-anchor="end">4,096 GPUs</text>
  <text x="145" y="335" font-size="8" fill="#555" text-anchor="end">(512 nodes)</text>
  <rect x="160" y="300" width="120" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="220" y="330" font-size="11" font-weight="700" fill="#2d7a2d" text-anchor="middle">20%</text>
  <rect x="280" y="300" width="390" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="475" y="330" font-size="11" font-weight="700" fill="#c87b2a" text-anchor="middle">65%</text>
  <rect x="670" y="300" width="90" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="715" y="330" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">15%</text>

  <!-- ===== Annotations ===== -->
  <text x="770" y="110" font-size="8" font-weight="700" fill="#3d9e5a">NVLink</text>
  <text x="770" y="120" font-size="8" fill="#3d9e5a">900 GB/s</text>

  <text x="770" y="260" font-size="8" font-weight="700" fill="#c87b2a">InfiniBand</text>
  <text x="770" y="270" font-size="8" fill="#c87b2a">50 GB/s</text>

  <!-- ===== Trend arrow ===== -->
  <line x1="130" y1="90" x2="130" y2="350" stroke="#a31f34" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="125" y="390" font-size="9" font-weight="700" fill="#a31f34" text-anchor="end" transform="rotate(-90 125 250)">More GPUs</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">70B parameter model, data parallelism with Ring AllReduce on H100 cluster</text>
</svg>
