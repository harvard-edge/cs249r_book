<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Alpha-Beta Model: T(n) = alpha + n / beta</text>

  <!-- ===== Left: Latency-bound region ===== -->
  <rect x="40" y="50" width="380" height="340" fill="#f9d6d5" fill-opacity="0.15" stroke="#c44" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="72" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">Latency-Bound (n &lt; n*)</text>

  <!-- Small messages illustration -->
  <rect x="70" y="100" width="120" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="130" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">MoE Token</text>
  <text x="130" y="133" font-size="8" fill="#555" text-anchor="middle">~4 KB</text>

  <rect x="70" y="160" width="120" height="45" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="130" y="178" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Pipeline Activation</text>
  <text x="130" y="193" font-size="8" fill="#555" text-anchor="middle">~10 KB</text>

  <!-- Alpha dominates -->
  <rect x="220" y="110" width="180" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="310" y="135" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Optimize for:</text>
  <text x="310" y="158" font-size="9" fill="#555" text-anchor="middle">Message fusion</text>
  <text x="310" y="175" font-size="9" fill="#555" text-anchor="middle">Reduce hop count</text>
  <text x="310" y="192" font-size="9" fill="#555" text-anchor="middle">RDMA / kernel bypass</text>
  <text x="310" y="209" font-size="9" fill="#555" text-anchor="middle">Low-latency switches</text>

  <!-- ===== Divider ===== -->
  <line x1="450" y1="50" x2="450" y2="390" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== Right: Bandwidth-bound region ===== -->
  <rect x="480" y="50" width="380" height="340" fill="#d4edda" fill-opacity="0.15" stroke="#3d9e5a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="670" y="72" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">Bandwidth-Bound (n >> n*)</text>

  <!-- Large messages illustration -->
  <rect x="510" y="100" width="120" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="570" y="118" font-size="9" font-weight="700" fill="#333" text-anchor="middle">LLM Gradient</text>
  <text x="570" y="133" font-size="8" fill="#555" text-anchor="middle">140 GB</text>

  <rect x="510" y="160" width="120" height="45" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="570" y="178" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Optimizer State</text>
  <text x="570" y="193" font-size="8" fill="#555" text-anchor="middle">~420 GB</text>

  <!-- Beta dominates -->
  <rect x="660" y="110" width="180" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="750" y="135" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Optimize for:</text>
  <text x="750" y="158" font-size="9" fill="#555" text-anchor="middle">Gradient compression</text>
  <text x="750" y="175" font-size="9" fill="#555" text-anchor="middle">Ring AllReduce</text>
  <text x="750" y="192" font-size="9" fill="#555" text-anchor="middle">Multi-rail NICs</text>
  <text x="750" y="209" font-size="9" fill="#555" text-anchor="middle">Link aggregation</text>

  <!-- ===== Crossover point ===== -->
  <rect x="390" y="280" width="120" height="50" fill="#fff" stroke="#a31f34" stroke-width="2"/>
  <text x="450" y="302" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">n* = alpha * beta</text>
  <text x="450" y="318" font-size="9" fill="#555" text-anchor="middle">~100 KB (IB NDR)</text>

  <!-- Arrows to crossover -->
  <line x1="230" y1="300" x2="388" y2="305" stroke="#c44" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="670" y1="300" x2="512" y2="305" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== Interconnect table ===== -->
  <rect x="60" y="355" width="780" height="25" fill="#f7f7f7" stroke="#bbb" stroke-width="0.8"/>
  <text x="150" y="372" font-size="9" font-weight="700" fill="#333" text-anchor="middle">NVLink 4.0</text>
  <text x="310" y="372" font-size="9" fill="#555" text-anchor="middle">alpha ~1 us | beta 900 GB/s | n* ~1 MB</text>
  <text x="530" y="372" font-size="9" font-weight="700" fill="#333" text-anchor="middle">IB NDR 400G</text>
  <text x="710" y="372" font-size="9" fill="#555" text-anchor="middle">alpha ~2 us | beta 50 GB/s | n* ~100 KB</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Messages below n* are latency-bound; messages above n* are bandwidth-bound</text>
</svg>
