<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Gradient Compression: Trading Compute for Bandwidth</text>

  <!-- ===== Compression spectrum ===== -->
  <text x="450" y="55" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Compression Ratio Spectrum</text>

  <!-- FP16 -->
  <rect x="40" y="70" width="160" height="65" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="120" y="92" font-size="10" font-weight="700" fill="#333" text-anchor="middle">FP16</text>
  <text x="120" y="108" font-size="9" fill="#555" text-anchor="middle">2x compression</text>
  <text x="120" y="125" font-size="8" fill="#3d9e5a" text-anchor="middle">Negligible impact</text>

  <!-- INT8 -->
  <rect x="215" y="70" width="160" height="65" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="295" y="92" font-size="10" font-weight="700" fill="#333" text-anchor="middle">INT8 + Error FB</text>
  <text x="295" y="108" font-size="9" fill="#555" text-anchor="middle">4x compression</text>
  <text x="295" y="125" font-size="8" fill="#c87b2a" text-anchor="middle">~5-10% slowdown</text>

  <!-- Top-K -->
  <rect x="390" y="70" width="160" height="65" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="470" y="92" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Top-K 1% + FB</text>
  <text x="470" y="108" font-size="9" fill="#555" text-anchor="middle">100x compression</text>
  <text x="470" y="125" font-size="8" fill="#c87b2a" text-anchor="middle">~10-20% slowdown</text>

  <!-- 1-bit -->
  <rect x="565" y="70" width="160" height="65" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="645" y="92" font-size="10" font-weight="700" fill="#333" text-anchor="middle">1-bit + Error FB</text>
  <text x="645" y="108" font-size="9" fill="#555" text-anchor="middle">32x compression</text>
  <text x="645" y="125" font-size="8" fill="#c44" text-anchor="middle">~20-30% slowdown</text>

  <!-- 1-bit Adam -->
  <rect x="740" y="70" width="140" height="65" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="810" y="92" font-size="10" font-weight="700" fill="#333" text-anchor="middle">1-bit Adam</text>
  <text x="810" y="108" font-size="9" fill="#555" text-anchor="middle">3.5x reduction</text>
  <text x="810" y="125" font-size="8" fill="#4a90c4" text-anchor="middle">Matches Adam</text>

  <!-- ===== Error Feedback section ===== -->
  <rect x="40" y="165" width="820" height="130" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="188" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Error Feedback: Why Lossy Compression Converges</text>

  <!-- Without EF -->
  <rect x="60" y="200" width="360" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="240" y="220" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Without Error Feedback</text>
  <text x="240" y="240" font-size="9" fill="#555" text-anchor="middle">g = [0.4, 0.3, 0.2, 0.4, 0.3]</text>
  <text x="240" y="258" font-size="9" fill="#555" text-anchor="middle">Transmitted: 0 (all below threshold)</text>
  <text x="240" y="272" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">100% gradient info lost!</text>

  <!-- With EF -->
  <rect x="480" y="200" width="360" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="660" y="220" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">With Error Feedback</text>
  <text x="660" y="240" font-size="9" fill="#555" text-anchor="middle">e(t+1) = (g + e_t) - compress(g + e_t)</text>
  <text x="660" y="258" font-size="9" fill="#555" text-anchor="middle">Transmitted: 2 | Residual: -0.4</text>
  <text x="660" y="272" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Sum(sent) + error = true gradient</text>

  <!-- ===== Decision framework ===== -->
  <rect x="40" y="320" width="400" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="240" y="345" font-size="10" font-weight="700" fill="#333" text-anchor="middle">When to Compress</text>
  <text x="240" y="365" font-size="9" fill="#555" text-anchor="middle">T_comm >> T_compute: compress aggressively</text>
  <text x="240" y="382" font-size="9" fill="#555" text-anchor="middle">T_comm &lt;&lt; T_compute: skip compression</text>

  <rect x="460" y="320" width="400" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="660" y="345" font-size="10" font-weight="700" fill="#333" text-anchor="middle">The Trade: Compute for Bandwidth</text>
  <text x="660" y="365" font-size="9" fill="#555" text-anchor="middle">Spend 2 ms compressing to save 35 ms of network</text>
  <text x="660" y="382" font-size="9" fill="#555" text-anchor="middle">Profile the network before adding compression</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">Always use Error Feedback with any compression beyond FP16</text>
</svg>
