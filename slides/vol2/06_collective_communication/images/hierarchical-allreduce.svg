<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Hierarchical AllReduce: Three-Phase Decomposition</text>

  <!-- ===== Phase labels ===== -->
  <rect x="30" y="45" width="260" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="160" y="64" font-size="10" font-weight="700" fill="#2d7a2d" text-anchor="middle">Phase 1: Intra-Node ReduceScatter</text>

  <rect x="320" y="45" width="260" height="28" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="450" y="64" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Phase 2: Inter-Node AllReduce</text>

  <rect x="610" y="45" width="260" height="28" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="740" y="64" font-size="10" font-weight="700" fill="#2d7a2d" text-anchor="middle">Phase 3: Intra-Node AllGather</text>

  <!-- ===== Node 0 ===== -->
  <rect x="30" y="90" width="260" height="140" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="160" y="108" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Node 0</text>

  <!-- GPUs in Node 0 -->
  <rect x="45" y="115" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="70" y="137" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU0</text>
  <rect x="105" y="115" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="130" y="137" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU1</text>
  <rect x="165" y="115" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="190" y="137" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU2</text>
  <rect x="225" y="115" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="250" y="137" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU3</text>

  <!-- NVLink label -->
  <text x="160" y="170" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">NVLink 900 GB/s</text>
  <line x1="60" y1="180" x2="260" y2="180" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="160" y="198" font-size="8" fill="#555" text-anchor="middle">ReduceScatter: 875 MB at 900 GB/s ~1 ms</text>

  <!-- ===== Node 1 ===== -->
  <rect x="30" y="250" width="260" height="140" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="160" y="268" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Node 1</text>

  <rect x="45" y="275" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="70" y="297" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU4</text>
  <rect x="105" y="275" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="130" y="297" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU5</text>
  <rect x="165" y="275" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="190" y="297" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU6</text>
  <rect x="225" y="275" width="50" height="35" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="250" y="297" font-size="9" font-weight="700" fill="#333" text-anchor="middle">GPU7</text>

  <text x="160" y="330" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">NVLink 900 GB/s</text>
  <line x1="60" y1="340" x2="260" y2="340" stroke="#3d9e5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="160" y="358" font-size="8" fill="#555" text-anchor="middle">ReduceScatter: 875 MB at 900 GB/s ~1 ms</text>

  <!-- ===== Inter-node arrows ===== -->
  <line x1="70" y1="152" x2="70" y2="273" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <line x1="130" y1="152" x2="130" y2="273" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <line x1="190" y1="152" x2="190" y2="273" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <line x1="250" y1="152" x2="250" y2="273" stroke="#a31f34" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <!-- IB label -->
  <text x="305" y="215" font-size="8" font-weight="700" fill="#a31f34">InfiniBand</text>
  <text x="305" y="227" font-size="8" fill="#a31f34">50 GB/s</text>
  <text x="305" y="242" font-size="8" fill="#555">125 MB each</text>

  <!-- ===== Right side: Results ===== -->
  <rect x="450" y="100" width="420" height="170" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="660" y="125" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Flat vs. Hierarchical (1 GB gradient, 64 GPUs)</text>

  <rect x="470" y="140" width="180" height="55" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="560" y="160" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Flat Ring</text>
  <text x="560" y="180" font-size="11" font-weight="700" fill="#c44" text-anchor="middle">40 ms</text>

  <rect x="670" y="140" width="180" height="55" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="760" y="160" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Hierarchical</text>
  <text x="760" y="180" font-size="11" font-weight="700" fill="#3d9e5a" text-anchor="middle">7 ms</text>

  <rect x="550" y="210" width="220" height="30" fill="#fff" stroke="#a31f34" stroke-width="2"/>
  <text x="660" y="230" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">5.7x speedup from hierarchy</text>

  <!-- ===== Key insight ===== -->
  <rect x="450" y="290" width="420" height="70" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="660" y="315" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Key Insight</text>
  <text x="660" y="340" font-size="9" fill="#555" text-anchor="middle">Inter-node traffic reduced by G (GPUs/node),</text>
  <text x="660" y="355" font-size="9" fill="#555" text-anchor="middle">effectively multiplying scarce IB bandwidth by 8x</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">NCCL defaults to hierarchical algorithms on multi-node clusters</text>
</svg>
