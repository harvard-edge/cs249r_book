<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#fff" rx="4"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Six Core Collective Primitives</text>

  <!-- Row 1: Broadcast, Reduce, AllReduce -->
  <!-- Broadcast -->
  <rect x="20" y="50" width="270" height="175" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="155" y="70" font-size="11" font-weight="700" fill="#333" text-anchor="middle">1. Broadcast</text>
  <rect x="40" y="85" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="60" y="105" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R0</text>
  <rect x="40" y="125" width="40" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="60" y="145" font-size="9" fill="#555" text-anchor="middle">R1</text>
  <rect x="40" y="165" width="40" height="30" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="60" y="185" font-size="9" fill="#555" text-anchor="middle">R2</text>
  <line x1="82" y1="100" x2="140" y2="100" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="82" y1="100" x2="140" y2="140" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="82" y1="100" x2="140" y2="180" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="142" y="85" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="162" y="105" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R0</text>
  <rect x="142" y="125" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="162" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R1</text>
  <rect x="142" y="165" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="162" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R2</text>
  <text x="220" y="140" font-size="8" fill="#555" text-anchor="middle">One-to-all</text>
  <text x="220" y="152" font-size="8" fill="#555" text-anchor="middle">O(log N)</text>

  <!-- Reduce -->
  <rect x="310" y="50" width="270" height="175" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="445" y="70" font-size="11" font-weight="700" fill="#333" text-anchor="middle">2. Reduce</text>
  <rect x="330" y="85" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="350" y="105" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R0</text>
  <rect x="330" y="125" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="350" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R1</text>
  <rect x="330" y="165" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="350" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R2</text>
  <line x1="372" y1="100" x2="430" y2="100" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="372" y1="140" x2="430" y2="100" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="372" y1="180" x2="430" y2="100" stroke="#4a90c4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="432" y="85" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="452" y="103" font-size="8" font-weight="700" fill="#333" text-anchor="middle">SUM</text>
  <text x="510" y="140" font-size="8" fill="#555" text-anchor="middle">All-to-one</text>
  <text x="510" y="152" font-size="8" fill="#555" text-anchor="middle">O(log N)</text>

  <!-- AllReduce -->
  <rect x="600" y="50" width="280" height="175" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="740" y="70" font-size="11" font-weight="700" fill="#333" text-anchor="middle">3. AllReduce</text>
  <rect x="620" y="85" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="640" y="105" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R0</text>
  <rect x="620" y="125" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="640" y="145" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R1</text>
  <rect x="620" y="165" width="40" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5" rx="4"/>
  <text x="640" y="185" font-size="9" font-weight="700" fill="#333" text-anchor="middle">R2</text>
  <line x1="662" y1="100" x2="730" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="662" y1="140" x2="730" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="662" y1="180" x2="730" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="732" y="85" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="752" y="103" font-size="8" font-weight="700" fill="#333" text-anchor="middle">SUM</text>
  <rect x="732" y="125" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="752" y="143" font-size="8" font-weight="700" fill="#333" text-anchor="middle">SUM</text>
  <rect x="732" y="165" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="4"/>
  <text x="752" y="183" font-size="8" font-weight="700" fill="#333" text-anchor="middle">SUM</text>
  <text x="810" y="140" font-size="8" fill="#555" text-anchor="middle">All get</text>
  <text x="810" y="152" font-size="8" fill="#555" text-anchor="middle">same sum</text>

  <!-- Row 2: AllGather, ReduceScatter, AllToAll -->
  <!-- AllGather -->
  <rect x="20" y="245" width="270" height="175" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="155" y="265" font-size="11" font-weight="700" fill="#333" text-anchor="middle">4. AllGather</text>
  <rect x="40" y="280" width="25" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="52" y="299" font-size="7" font-weight="700" fill="#333" text-anchor="middle">A</text>
  <rect x="40" y="320" width="25" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="52" y="339" font-size="7" font-weight="700" fill="#333" text-anchor="middle">B</text>
  <rect x="40" y="360" width="25" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="52" y="379" font-size="7" font-weight="700" fill="#333" text-anchor="middle">C</text>
  <line x1="67" y1="335" x2="120" y2="335" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Result: each has ABC -->
  <rect x="122" y="280" width="75" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="160" y="299" font-size="7" font-weight="700" fill="#333" text-anchor="middle">A B C</text>
  <rect x="122" y="320" width="75" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1" rx="3"/>
  <text x="160" y="339" font-size="7" font-weight="700" fill="#333" text-anchor="middle">A B C</text>
  <rect x="122" y="360" width="75" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="160" y="379" font-size="7" font-weight="700" fill="#333" text-anchor="middle">A B C</text>
  <text x="230" y="335" font-size="8" fill="#555" text-anchor="middle">Concatenate</text>
  <text x="230" y="347" font-size="8" fill="#555" text-anchor="middle">FSDP forward</text>

  <!-- ReduceScatter -->
  <rect x="310" y="245" width="270" height="175" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="445" y="265" font-size="11" font-weight="700" fill="#333" text-anchor="middle">5. ReduceScatter</text>
  <rect x="330" y="280" width="75" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="368" y="299" font-size="7" font-weight="700" fill="#333" text-anchor="middle">a1 a2 a3</text>
  <rect x="330" y="320" width="75" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="368" y="339" font-size="7" font-weight="700" fill="#333" text-anchor="middle">b1 b2 b3</text>
  <rect x="330" y="360" width="75" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1" rx="3"/>
  <text x="368" y="379" font-size="7" font-weight="700" fill="#333" text-anchor="middle">c1 c2 c3</text>
  <line x1="407" y1="335" x2="460" y2="335" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="462" y="280" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="3"/>
  <text x="482" y="298" font-size="7" font-weight="700" fill="#333" text-anchor="middle">S1</text>
  <rect x="462" y="320" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="3"/>
  <text x="482" y="338" font-size="7" font-weight="700" fill="#333" text-anchor="middle">S2</text>
  <rect x="462" y="360" width="40" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5" rx="3"/>
  <text x="482" y="378" font-size="7" font-weight="700" fill="#333" text-anchor="middle">S3</text>
  <text x="530" y="335" font-size="8" fill="#555" text-anchor="middle">Sum + shard</text>
  <text x="530" y="347" font-size="8" fill="#555" text-anchor="middle">FSDP backward</text>

  <!-- AllToAll -->
  <rect x="600" y="245" width="280" height="175" fill="#f7f7f7" stroke="#bbb" stroke-width="1" rx="5"/>
  <text x="740" y="265" font-size="11" font-weight="700" fill="#333" text-anchor="middle">6. AllToAll</text>
  <rect x="620" y="280" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="650" y="299" font-size="7" font-weight="700" fill="#333" text-anchor="middle">a0 a1 a2</text>
  <rect x="620" y="320" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="650" y="339" font-size="7" font-weight="700" fill="#333" text-anchor="middle">b0 b1 b2</text>
  <rect x="620" y="360" width="60" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1" rx="3"/>
  <text x="650" y="379" font-size="7" font-weight="700" fill="#333" text-anchor="middle">c0 c1 c2</text>
  <line x1="682" y1="335" x2="740" y2="335" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="742" y="280" width="60" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="772" y="299" font-size="7" font-weight="700" fill="#333" text-anchor="middle">a0 b0 c0</text>
  <rect x="742" y="320" width="60" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="772" y="339" font-size="7" font-weight="700" fill="#333" text-anchor="middle">a1 b1 c1</text>
  <rect x="742" y="360" width="60" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1" rx="3"/>
  <text x="772" y="379" font-size="7" font-weight="700" fill="#333" text-anchor="middle">a2 b2 c2</text>
  <text x="830" y="335" font-size="8" fill="#555" text-anchor="middle">Transpose</text>
  <text x="830" y="347" font-size="8" fill="#555" text-anchor="middle">MoE / DLRM</text>

  <!-- ===== Bottom footnote ===== -->
  <text x="450" y="445" font-size="9" fill="#999" font-style="italic" text-anchor="middle">AllReduce = ReduceScatter + AllGather --- FSDP exploits this decomposition</text>
</svg>
