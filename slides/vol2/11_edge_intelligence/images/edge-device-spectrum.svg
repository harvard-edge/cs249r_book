<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Edge Device Spectrum: 6+ Orders of Magnitude</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4edda"/>
      <stop offset="33%" style="stop-color:#cfe2f3"/>
      <stop offset="66%" style="stop-color:#fdebd0"/>
      <stop offset="100%" style="stop-color:#f9d6d5"/>
    </linearGradient>
  </defs>
  <rect x="80" y="55" width="740" height="12" fill="url(#spectrumGrad)" stroke="#bbb" stroke-width="0.5"/>

  <!-- Axis labels -->
  <text x="80" y="85" font-size="8" fill="#3d9e5a" text-anchor="start" font-weight="700">Low Power</text>
  <text x="820" y="85" font-size="8" fill="#c44" text-anchor="end" font-weight="700">High Power</text>

  <!-- ===== Tier 1: Microcontroller ===== -->
  <rect x="60" y="100" width="180" height="340" fill="#f7f7f7" stroke="#3d9e5a" stroke-width="1.5"/>
  <rect x="60" y="100" width="180" height="30" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Microcontroller</text>

  <text x="150" y="155" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Arduino Nicla Vision</text>

  <text x="85" y="180" font-size="8.5" fill="#555">RAM</text>
  <text x="215" y="180" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">384 KB</text>
  <line x1="85" y1="187" x2="215" y2="187" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="85" y="202" font-size="8.5" fill="#555">Compute</text>
  <text x="215" y="202" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">~0.5 GFLOPS</text>
  <line x1="85" y1="209" x2="215" y2="209" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="85" y="224" font-size="8.5" fill="#555">Power</text>
  <text x="215" y="224" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">~100 mW</text>
  <line x1="85" y1="231" x2="215" y2="231" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="85" y="248" font-size="8.5" fill="#555">Adaptation</text>
  <text x="215" y="248" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">Bias-only</text>

  <rect x="85" y="275" width="130" height="50" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="150" y="295" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Use Cases</text>
  <text x="150" y="310" font-size="7.5" fill="#555" text-anchor="middle">Wake-word, anomaly detect</text>

  <!-- ===== Tier 2: Wearable ===== -->
  <rect x="260" y="100" width="180" height="340" fill="#f7f7f7" stroke="#4a90c4" stroke-width="1.5"/>
  <rect x="260" y="100" width="180" height="30" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="350" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Wearable / IoT</text>

  <text x="350" y="155" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Smartwatch SoC</text>

  <text x="285" y="180" font-size="8.5" fill="#555">RAM</text>
  <text x="415" y="180" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">512 MB - 2 GB</text>
  <line x1="285" y1="187" x2="415" y2="187" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="285" y="202" font-size="8.5" fill="#555">Compute</text>
  <text x="415" y="202" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">1-5 TOPS</text>
  <line x1="285" y1="209" x2="415" y2="209" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="285" y="224" font-size="8.5" fill="#555">Power</text>
  <text x="415" y="224" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">0.5 - 2 W</text>
  <line x1="285" y1="231" x2="415" y2="231" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="285" y="248" font-size="8.5" fill="#555">Adaptation</text>
  <text x="415" y="248" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">Bias + last layers</text>

  <rect x="285" y="275" width="130" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="350" y="295" font-size="8" font-weight="700" fill="#4a90c4" text-anchor="middle">Use Cases</text>
  <text x="350" y="310" font-size="7.5" fill="#555" text-anchor="middle">Health monitoring, fitness</text>

  <!-- ===== Tier 3: Smartphone ===== -->
  <rect x="460" y="100" width="180" height="340" fill="#f7f7f7" stroke="#c87b2a" stroke-width="1.5"/>
  <rect x="460" y="100" width="180" height="30" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="550" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Smartphone</text>

  <text x="550" y="155" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Flagship SoC + NPU</text>

  <text x="485" y="180" font-size="8.5" fill="#555">RAM</text>
  <text x="615" y="180" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">8-16 GB</text>
  <line x1="485" y1="187" x2="615" y2="187" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="485" y="202" font-size="8.5" fill="#555">Compute</text>
  <text x="615" y="202" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">17 TOPS (INT8)</text>
  <line x1="485" y1="209" x2="615" y2="209" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="485" y="224" font-size="8.5" fill="#555">Power</text>
  <text x="615" y="224" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">3-5 W</text>
  <line x1="485" y1="231" x2="615" y2="231" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="485" y="248" font-size="8.5" fill="#555">Adaptation</text>
  <text x="615" y="248" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">LoRA / Adapters</text>

  <rect x="485" y="275" width="130" height="50" fill="#fdebd0" stroke="#c87b2a" stroke-width="0.8"/>
  <text x="550" y="295" font-size="8" font-weight="700" fill="#c87b2a" text-anchor="middle">Use Cases</text>
  <text x="550" y="310" font-size="7.5" fill="#555" text-anchor="middle">Keyboard, voice, camera</text>

  <!-- ===== Tier 4: Edge Server ===== -->
  <rect x="660" y="100" width="180" height="340" fill="#f7f7f7" stroke="#c44" stroke-width="1.5"/>
  <rect x="660" y="100" width="180" height="30" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="750" y="120" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Edge Server</text>

  <text x="750" y="155" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Jetson Orin NX</text>

  <text x="685" y="180" font-size="8.5" fill="#555">RAM</text>
  <text x="815" y="180" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">32 GB LPDDR5</text>
  <line x1="685" y1="187" x2="815" y2="187" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="685" y="202" font-size="8.5" fill="#555">Compute</text>
  <text x="815" y="202" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">100 TOPS (INT8)</text>
  <line x1="685" y1="209" x2="815" y2="209" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="685" y="224" font-size="8.5" fill="#555">Power</text>
  <text x="815" y="224" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">15-40 W</text>
  <line x1="685" y1="231" x2="815" y2="231" stroke="#f7f7f7" stroke-width="0.5"/>

  <text x="685" y="248" font-size="8.5" fill="#555">Adaptation</text>
  <text x="815" y="248" font-size="8.5" fill="#333" text-anchor="end" font-weight="700">Sparse / full layers</text>

  <rect x="685" y="275" width="130" height="50" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="750" y="295" font-size="8" font-weight="700" fill="#c44" text-anchor="middle">Use Cases</text>
  <text x="750" y="310" font-size="7.5" fill="#555" text-anchor="middle">Robotics, AR/VR, vehicles</text>

  <!-- Gap annotation -->
  <rect x="300" y="365" width="300" height="55" fill="#fff" stroke="#a31f34" stroke-width="1.5"/>
  <text x="450" y="385" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">The Edge Gap</text>
  <text x="450" y="402" font-size="8.5" fill="#555" text-anchor="middle">10⁵x memory | 10⁶x compute | 10⁴x power</text>
  <text x="450" y="415" font-size="8" fill="#555" text-anchor="middle">between microcontroller and edge server</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Each tier demands fundamentally different adaptation strategies matched to its resource envelope.</text>
</svg>
