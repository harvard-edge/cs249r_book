<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c87b2a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Federated Averaging (FedAvg) Protocol</text>

  <!-- Phase labels -->
  <text x="150" y="58" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">1. Broadcast</text>
  <text x="380" y="58" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">2. Local Training</text>
  <text x="610" y="58" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">3. Upload Updates</text>
  <text x="810" y="58" font-size="10" font-weight="700" fill="#a31f34" text-anchor="middle">4. Aggregate</text>

  <!-- Vertical dividers -->
  <line x1="265" y1="45" x2="265" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="495" y1="45" x2="495" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>
  <line x1="725" y1="45" x2="725" y2="420" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== Phase 1: Broadcast ===== -->
  <!-- Server -->
  <rect x="105" y="80" width="90" height="40" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="105" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Server θᵗ</text>

  <!-- Devices -->
  <rect x="70" y="200" width="60" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="100" y="222" font-size="8" fill="#555" text-anchor="middle">Device 1</text>
  <rect x="145" y="200" width="60" height="35" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="175" y="222" font-size="8" fill="#555" text-anchor="middle">Device 2</text>
  <rect x="220" y="200" width="60" height="35" rx="4" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="250" y="222" font-size="8" fill="#999" text-anchor="middle">Device 3</text>
  <text x="250" y="250" font-size="7.5" fill="#c44" text-anchor="middle">(offline)</text>

  <!-- Broadcast arrows -->
  <line x1="130" y1="120" x2="100" y2="197" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="150" y1="120" x2="175" y2="197" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="150" y="165" font-size="8" fill="#4a90c4" text-anchor="middle">θᵗ</text>

  <!-- ===== Phase 2: Local Training ===== -->
  <!-- Device 1 training -->
  <rect x="300" y="155" width="80" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="340" y="175" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Device 1</text>
  <text x="340" y="190" font-size="7.5" fill="#555" text-anchor="middle">E local epochs</text>
  <text x="340" y="200" font-size="7.5" fill="#555" text-anchor="middle">on user data</text>

  <!-- Device 2 training -->
  <rect x="400" y="235" width="80" height="55" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="440" y="255" font-size="8" font-weight="700" fill="#333" text-anchor="middle">Device 2</text>
  <text x="440" y="270" font-size="7.5" fill="#555" text-anchor="middle">E local epochs</text>
  <text x="440" y="280" font-size="7.5" fill="#555" text-anchor="middle">on user data</text>

  <!-- Local data icons -->
  <rect x="310" y="225" width="50" height="18" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="335" y="238" font-size="7" fill="#3d9e5a" text-anchor="middle">n₁ samples</text>
  <rect x="410" y="300" width="50" height="18" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="435" y="313" font-size="7" fill="#3d9e5a" text-anchor="middle">n₂ samples</text>

  <!-- ===== Phase 3: Upload ===== -->
  <!-- Server receiving -->
  <rect x="570" y="155" width="80" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="610" y="178" font-size="8" font-weight="700" fill="#333" text-anchor="middle">θ₁ᵗ update</text>

  <rect x="570" y="225" width="80" height="45" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="610" y="248" font-size="8" font-weight="700" fill="#333" text-anchor="middle">θ₂ᵗ update</text>

  <!-- Upload arrows -->
  <line x1="380" y1="175" x2="567" y2="175" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="480" y1="260" x2="567" y2="245" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <text x="540" y="150" font-size="7.5" fill="#c87b2a" text-anchor="middle">Updates only</text>
  <text x="540" y="162" font-size="7.5" fill="#c87b2a" text-anchor="middle">(no raw data)</text>

  <!-- ===== Phase 4: Aggregate ===== -->
  <rect x="755" y="155" width="110" height="120" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="810" y="180" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Aggregate</text>

  <!-- FedAvg equation -->
  <text x="810" y="210" font-size="9" fill="#333" text-anchor="middle" font-weight="700">θᵗ⁺¹ = Σ (nₖ/n) θₖᵗ</text>
  <text x="810" y="235" font-size="8" fill="#555" text-anchor="middle">Weighted by</text>
  <text x="810" y="250" font-size="8" fill="#555" text-anchor="middle">local sample count</text>

  <!-- Arrows to aggregate -->
  <line x1="650" y1="175" x2="752" y2="200" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="650" y1="248" x2="752" y2="230" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Loop back arrow -->
  <path d="M810,275 L810,380 L150,380 L150,340" stroke="#a31f34" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="480" y="395" font-size="9" font-weight="700" fill="#a31f34" text-anchor="middle">Next round: broadcast θᵗ⁺¹</text>

  <!-- Key insight box -->
  <rect x="280" y="430" width="340" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="450" y="450" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Privacy: Raw data never leaves the device</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">FedAvg: devices train locally, upload only model deltas, server averages weighted by sample count.</text>
</svg>
