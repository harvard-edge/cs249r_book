<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">The Training Memory Amplifier: Inference vs. Training</text>

  <!-- Y-axis label -->
  <text x="55" y="260" font-size="10" font-weight="700" fill="#333" text-anchor="middle" transform="rotate(-90, 55, 260)">Memory (MB)</text>

  <!-- Y-axis ticks -->
  <line x1="95" y1="440" x2="95" y2="60" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="443" font-size="8" fill="#555" text-anchor="end">0</text>
  <line x1="90" y1="380" x2="95" y2="380" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="383" font-size="8" fill="#555" text-anchor="end">100</text>
  <line x1="90" y1="320" x2="95" y2="320" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="323" font-size="8" fill="#555" text-anchor="end">200</text>
  <line x1="90" y1="260" x2="95" y2="260" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="263" font-size="8" fill="#555" text-anchor="end">400</text>
  <line x1="90" y1="200" x2="95" y2="200" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="203" font-size="8" fill="#555" text-anchor="end">800</text>
  <line x1="90" y1="140" x2="95" y2="140" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="143" font-size="8" fill="#555" text-anchor="end">1600</text>
  <line x1="90" y1="80" x2="95" y2="80" stroke="#bbb" stroke-width="1"/>
  <text x="85" y="83" font-size="8" fill="#555" text-anchor="end">3600</text>

  <!-- Grid lines -->
  <line x1="95" y1="380" x2="830" y2="380" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="95" y1="320" x2="830" y2="320" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="95" y1="260" x2="830" y2="260" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="95" y1="200" x2="830" y2="200" stroke="#f7f7f7" stroke-width="0.5"/>
  <line x1="95" y1="140" x2="830" y2="140" stroke="#f7f7f7" stroke-width="0.5"/>

  <!-- X-axis -->
  <line x1="95" y1="440" x2="830" y2="440" stroke="#bbb" stroke-width="1"/>

  <!-- ===== 1M Parameters ===== -->
  <!-- Inference bar -->
  <rect x="140" y="437" width="60" height="3" fill="#4a90c4"/>
  <text x="170" y="435" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">4 MB</text>

  <!-- Training bar (stacked) -->
  <rect x="210" y="430" width="60" height="10" fill="#bbb"/><!-- weights -->
  <rect x="210" y="424" width="60" height="6" fill="#c87b2a"/><!-- grads -->
  <rect x="210" y="416" width="60" height="8" fill="#c87b2a"/><!-- opt -->
  <rect x="210" y="400" width="60" height="16" fill="#c44"/><!-- activations -->
  <text x="240" y="395" font-size="8" fill="#c44" text-anchor="middle" font-weight="700">36 MB</text>

  <!-- Amplification label -->
  <rect x="155" y="370" width="100" height="18" fill="#a31f34"/>
  <text x="205" y="383" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">9x Amplification</text>

  <text x="205" y="460" font-size="10" font-weight="700" fill="#333" text-anchor="middle">1M Params</text>

  <!-- ===== 10M Parameters ===== -->
  <!-- Inference bar -->
  <rect x="360" y="418" width="60" height="22" fill="#4a90c4"/>
  <text x="390" y="414" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">40 MB</text>

  <!-- Training bar (stacked) -->
  <rect x="430" y="377" width="60" height="63" fill="#bbb"/><!-- weights -->
  <rect x="430" y="339" width="60" height="38" fill="#c87b2a"/><!-- grads -->
  <rect x="430" y="289" width="60" height="50" fill="#c87b2a"/><!-- opt -->
  <rect x="430" y="196" width="60" height="93" fill="#c44"/><!-- activations -->
  <text x="460" y="190" font-size="8" fill="#c44" text-anchor="middle" font-weight="700">360 MB</text>

  <!-- Amplification label -->
  <rect x="375" y="160" width="100" height="18" fill="#a31f34"/>
  <text x="425" y="173" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">9x Amplification</text>

  <text x="425" y="460" font-size="10" font-weight="700" fill="#333" text-anchor="middle">10M Params</text>

  <!-- ===== 100M Parameters ===== -->
  <!-- Inference bar -->
  <rect x="580" y="323" width="60" height="117" fill="#4a90c4"/>
  <text x="610" y="318" font-size="8" fill="#4a90c4" text-anchor="middle" font-weight="700">400 MB</text>

  <!-- Training bar (stacked) -->
  <rect x="650" y="319" width="60" height="121" fill="#bbb"/><!-- weights -->
  <rect x="650" y="248" width="60" height="71" fill="#c87b2a"/><!-- grads -->
  <rect x="650" y="152" width="60" height="96" fill="#c87b2a"/><!-- opt -->
  <rect x="650" y="88" width="60" height="64" fill="#c44"/><!-- activations -->
  <text x="680" y="82" font-size="8" fill="#c44" text-anchor="middle" font-weight="700">3600 MB</text>

  <!-- Amplification label -->
  <rect x="594" y="68" width="104" height="18" fill="#a31f34"/>
  <text x="646" y="81" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">9x Amplification</text>

  <text x="645" y="460" font-size="10" font-weight="700" fill="#333" text-anchor="middle">100M Params</text>

  <!-- Legend -->
  <rect x="740" y="100" width="12" height="12" fill="#4a90c4"/>
  <text x="758" y="111" font-size="8.5" fill="#333">Inference (Weights)</text>
  <rect x="740" y="120" width="12" height="12" fill="#bbb"/>
  <text x="758" y="131" font-size="8.5" fill="#333">Training: Weights</text>
  <rect x="740" y="140" width="12" height="12" fill="#c87b2a"/>
  <text x="758" y="151" font-size="8.5" fill="#333">Training: Gradients</text>
  <rect x="740" y="160" width="12" height="12" fill="#c87b2a"/>
  <text x="758" y="171" font-size="8.5" fill="#333">Training: Optimizer</text>
  <rect x="740" y="180" width="12" height="12" fill="#c44"/>
  <text x="758" y="191" font-size="8.5" fill="#333">Training: Activations</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Training amplifies memory requirements 3-10x over inference due to gradients, optimizer state, and activation caching.</text>
</svg>
