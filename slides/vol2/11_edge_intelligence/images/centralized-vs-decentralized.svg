<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Centralized vs. Decentralized Federated Training</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Centralized (left) -->
  <rect x="40" y="55" width="390" height="280" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="235" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Centralized (FedAvg)</text>

  <!-- Server -->
  <rect x="190" y="95" width="90" height="40" fill="#4a90c4"/>
  <text x="235" y="118" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">Server</text>

  <!-- Clients -->
  <circle cx="100" cy="230" r="25" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="100" y="234" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D1</text>

  <circle cx="200" cy="260" r="25" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="200" y="264" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D2</text>

  <circle cx="270" cy="260" r="25" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="270" y="264" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D3</text>

  <circle cx="370" cy="230" r="25" fill="#fff" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="370" y="234" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D4</text>

  <!-- Arrows to/from server -->
  <line x1="120" y1="210" x2="200" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="200" y1="235" x2="220" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="270" y1="235" x2="250" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="350" y1="210" x2="270" y2="135" stroke="#4a90c4" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="235" y="310" font-size="8" fill="#555" text-anchor="middle">O(1) rounds per epoch</text>
  <text x="235" y="325" font-size="8" fill="#555" text-anchor="middle">Server = SPOF + bottleneck</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="335" stroke="#e8e8e8" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- Decentralized (right) -->
  <rect x="470" y="55" width="390" height="280" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="665" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Decentralized (Gossip)</text>

  <!-- Peer nodes -->
  <circle cx="560" cy="130" r="25" fill="#fff" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="560" y="134" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D1</text>

  <circle cx="770" cy="130" r="25" fill="#fff" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="770" y="134" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D2</text>

  <circle cx="560" cy="250" r="25" fill="#fff" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="560" y="254" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D3</text>

  <circle cx="770" cy="250" r="25" fill="#fff" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="770" y="254" font-size="8" font-weight="700" fill="#333" text-anchor="middle">D4</text>

  <!-- Peer-to-peer arrows -->
  <line x1="585" y1="130" x2="745" y2="130" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="745" y1="130" x2="585" y2="130" stroke="#c87b2a" stroke-width="1.2"/>
  <line x1="560" y1="155" x2="560" y2="225" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="770" y1="155" x2="770" y2="225" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="585" y1="250" x2="745" y2="250" stroke="#c87b2a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="580" y1="145" x2="750" y2="235" stroke="#c87b2a" stroke-width="0.8" stroke-dasharray="4,2"/>
  <line x1="750" y1="145" x2="580" y2="235" stroke="#c87b2a" stroke-width="0.8" stroke-dasharray="4,2"/>

  <text x="665" y="310" font-size="8" fill="#555" text-anchor="middle">O(N) rounds per epoch</text>
  <text x="665" y="325" font-size="8" fill="#555" text-anchor="middle">No SPOF, natural scaling</text>

  <!-- Comparison -->
  <rect x="40" y="355" width="820" height="105" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="378" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Quantitative Comparison</text>

  <text x="60" y="400" font-size="8.5" font-weight="700" fill="#4a90c4">Centralized</text>
  <text x="160" y="400" font-size="8.5" fill="#555">Convergence: O(1) rounds | Privacy: DP at server | Fault: Server = SPOF | Scale: &lt;10K devices</text>

  <text x="60" y="420" font-size="8.5" font-weight="700" fill="#c87b2a">Decentralized</text>
  <text x="160" y="420" font-size="8.5" fill="#555">Convergence: O(N) rounds | Privacy: Harder | Fault: No SPOF | Scale: &gt;100K devices</text>

  <text x="60" y="445" font-size="8.5" font-weight="700" fill="#3d9e5a">Hybrid</text>
  <text x="160" y="445" font-size="8.5" fill="#555">Local clusters aggregate (decentralized), cluster heads report to server (centralized). Best of both.</text>

  <text x="450" y="480" font-size="9" fill="#999" text-anchor="middle" font-style="italic">The choice depends on trust (is there a trustworthy server?), scale (millions of devices?), and topology (mesh or star?)</text>
</svg>
