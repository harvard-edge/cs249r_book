<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Model Adaptation Strategies: From Lightweight to Expressive</text>

  <!-- X-axis labels -->
  <text x="450" y="475" font-size="10" font-weight="700" fill="#555" text-anchor="middle">Expressiveness / Resource Cost</text>
  <line x1="100" y1="460" x2="800" y2="460" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Strategy 1: Bias-Only ===== -->
  <rect x="60" y="55" width="230" height="380" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <rect x="90" y="70" width="170" height="30" rx="4" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="175" y="90" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Bias-Only / Freeze</text>

  <!-- Network diagram -->
  <rect x="100" y="120" width="150" height="25" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="175" y="137" font-size="8" fill="#555" text-anchor="middle">Conv Layers (Frozen)</text>
  <rect x="100" y="155" width="150" height="25" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="175" y="172" font-size="8" fill="#555" text-anchor="middle">FC Layers (Frozen)</text>
  <rect x="100" y="190" width="150" height="25" rx="3" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="175" y="207" font-size="8" font-weight="700" fill="#3d9e5a" text-anchor="middle">Bias Terms (Trainable)</text>

  <!-- Stats -->
  <text x="175" y="245" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Key Metrics</text>
  <text x="175" y="265" font-size="8.5" fill="#555" text-anchor="middle">Trainable: 0.1-1% of params</text>
  <text x="175" y="280" font-size="8.5" fill="#555" text-anchor="middle">Memory: Minimal gradient storage</text>
  <text x="175" y="295" font-size="8.5" fill="#555" text-anchor="middle">100-1000x param reduction</text>

  <!-- Use case -->
  <rect x="90" y="315" width="170" height="50" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="175" y="335" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Best For</text>
  <text x="175" y="350" font-size="8" fill="#555" text-anchor="middle">Microcontrollers, smartwatches</text>

  <!-- Device tier pill -->
  <rect x="125" y="385" width="100" height="20" rx="10" fill="#a31f34"/>
  <text x="175" y="399" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">TinyML / IoT</text>

  <!-- ===== Strategy 2: LoRA / Structured ===== -->
  <rect x="335" y="55" width="230" height="380" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <rect x="365" y="70" width="170" height="30" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="90" font-size="11" font-weight="700" fill="#333" text-anchor="middle">LoRA / Adapters</text>

  <!-- Network diagram -->
  <rect x="375" y="120" width="150" height="25" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="137" font-size="8" fill="#555" text-anchor="middle">Backbone (Frozen)</text>
  <rect x="375" y="155" width="70" height="50" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="410" y="175" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Low-Rank</text>
  <text x="410" y="190" font-size="7.5" fill="#555" text-anchor="middle">A (r x d)</text>
  <rect x="455" y="155" width="70" height="50" rx="3" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="490" y="175" font-size="7.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Low-Rank</text>
  <text x="490" y="190" font-size="7.5" fill="#555" text-anchor="middle">B (d x r)</text>

  <!-- Stats -->
  <text x="450" y="235" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Key Metrics</text>
  <text x="450" y="255" font-size="8.5" fill="#555" text-anchor="middle">Trainable: 1-5% of params</text>
  <text x="450" y="270" font-size="8.5" fill="#555" text-anchor="middle">W = W₀ + AB (rank r = 4-64)</text>
  <text x="450" y="285" font-size="8.5" fill="#555" text-anchor="middle">200x storage per context</text>

  <!-- Use case -->
  <rect x="365" y="305" width="170" height="50" rx="4" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="450" y="325" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Best For</text>
  <text x="450" y="340" font-size="8" fill="#555" text-anchor="middle">Smartphones, tablets</text>

  <!-- Device tier pill -->
  <rect x="400" y="375" width="100" height="20" rx="10" fill="#a31f34"/>
  <text x="450" y="389" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Mobile / Edge</text>

  <!-- ===== Strategy 3: Sparse Updates ===== -->
  <rect x="610" y="55" width="230" height="380" rx="6" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>

  <rect x="640" y="70" width="170" height="30" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="725" y="90" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Sparse Updates</text>

  <!-- Network diagram -->
  <rect x="650" y="120" width="150" height="80" rx="3" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <!-- Sparse dots representing selected params -->
  <circle cx="675" cy="140" r="4" fill="#c44"/>
  <circle cx="710" cy="155" r="4" fill="#c44"/>
  <circle cx="740" cy="135" r="4" fill="#c44"/>
  <circle cx="770" cy="170" r="4" fill="#c44"/>
  <circle cx="695" cy="180" r="4" fill="#c44"/>
  <text x="725" y="145" font-size="7.5" fill="#555" text-anchor="middle">All layers accessible</text>
  <text x="725" y="160" font-size="7.5" font-weight="700" fill="#c44" text-anchor="middle">Top-k gradients selected</text>

  <!-- Stats -->
  <text x="725" y="230" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Key Metrics</text>
  <text x="725" y="250" font-size="8.5" fill="#555" text-anchor="middle">Trainable: Dynamic top-k%</text>
  <text x="725" y="265" font-size="8.5" fill="#555" text-anchor="middle">Gradient-based importance</text>
  <text x="725" y="280" font-size="8.5" fill="#555" text-anchor="middle">90-99% gradients skipped</text>

  <!-- Use case -->
  <rect x="640" y="300" width="170" height="50" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1"/>
  <text x="725" y="320" font-size="8.5" font-weight="700" fill="#333" text-anchor="middle">Best For</text>
  <text x="725" y="335" font-size="8" fill="#555" text-anchor="middle">Flagship devices, edge servers</text>

  <!-- Device tier pill -->
  <rect x="675" y="370" width="100" height="20" rx="10" fill="#a31f34"/>
  <text x="725" y="384" font-size="8" font-weight="700" fill="#fff" text-anchor="middle">Edge / Server</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Strategy selection follows device constraints: more resources enable more expressive adaptation.</text>
</svg>
