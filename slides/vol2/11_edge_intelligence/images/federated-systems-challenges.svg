<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Federated Learning: Systems Challenges at Scale</text>

  <!-- Central server -->
  <rect x="370" y="55" width="160" height="50" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="450" y="78" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Aggregation Server</text>
  <text x="450" y="95" font-size="8" fill="#555" text-anchor="middle">Orchestrates federated rounds</text>

  <!-- ===== Challenge 1: Stragglers ===== -->
  <rect x="50" y="140" width="200" height="150" fill="#f9d6d5" stroke="#c44" stroke-width="1.5"/>
  <text x="150" y="163" font-size="10" font-weight="700" fill="#c44" text-anchor="middle">Stragglers</text>

  <!-- Fast device -->
  <rect x="70" y="180" width="70" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="105" y="197" font-size="7.5" fill="#333" text-anchor="middle">Fast (2s)</text>
  <!-- Slow device -->
  <rect x="70" y="215" width="70" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="105" y="232" font-size="7.5" fill="#333" text-anchor="middle">Slow (30s)</text>
  <!-- Offline device -->
  <rect x="70" y="250" width="70" height="25" fill="#e8e8e8" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="105" y="267" font-size="7.5" fill="#999" text-anchor="middle">Offline</text>

  <!-- Timeline bars -->
  <rect x="155" y="185" width="80" height="8" fill="#3d9e5a"/>
  <rect x="155" y="220" width="80" height="8" fill="#c87b2a"/>
  <text x="200" y="252" font-size="7.5" fill="#c44" text-anchor="middle">20-40% offline</text>
  <text x="200" y="267" font-size="7.5" fill="#c44" text-anchor="middle">at any time</text>

  <!-- Arrow to server -->
  <line x1="250" y1="160" x2="368" y2="85" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Challenge 2: Non-IID Data ===== -->
  <rect x="290" y="140" width="200" height="150" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="390" y="163" font-size="10" font-weight="700" fill="#c87b2a" text-anchor="middle">Non-IID Data</text>

  <!-- Skewed distributions -->
  <rect x="310" y="180" width="80" height="25" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1"/>
  <text x="350" y="197" font-size="7.5" fill="#333" text-anchor="middle">User A: English</text>
  <rect x="310" y="215" width="80" height="25" fill="#d4edda" stroke="#3d9e5a" stroke-width="1"/>
  <text x="350" y="232" font-size="7.5" fill="#333" text-anchor="middle">User B: Japanese</text>
  <rect x="310" y="250" width="80" height="25" fill="#fdebd0" stroke="#c87b2a" stroke-width="1"/>
  <text x="350" y="267" font-size="7.5" fill="#333" text-anchor="middle">User C: Spanish</text>

  <text x="440" y="200" font-size="8" fill="#c87b2a" text-anchor="middle">10-50%</text>
  <text x="440" y="215" font-size="8" fill="#c87b2a" text-anchor="middle">accuracy drop</text>
  <text x="440" y="230" font-size="8" fill="#c87b2a" text-anchor="middle">vs. IID baseline</text>

  <!-- ===== Challenge 3: Communication ===== -->
  <rect x="530" y="140" width="200" height="150" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="630" y="163" font-size="10" font-weight="700" fill="#4a90c4" text-anchor="middle">Communication</text>

  <!-- Bandwidth bars -->
  <text x="555" y="190" font-size="8" fill="#555">LTE Upload</text>
  <rect x="640" y="180" width="40" height="12" fill="#cfe2f3" stroke="#4a90c4" stroke-width="0.8"/>
  <text x="690" y="191" font-size="7.5" fill="#333">5-10 Mbps</text>

  <text x="555" y="215" font-size="8" fill="#555">WiFi</text>
  <rect x="640" y="205" width="70" height="12" fill="#d4edda" stroke="#3d9e5a" stroke-width="0.8"/>
  <text x="720" y="216" font-size="7.5" fill="#333">50+ Mbps</text>

  <text x="555" y="240" font-size="8" fill="#555">LoRaWAN</text>
  <rect x="640" y="230" width="8" height="12" fill="#f9d6d5" stroke="#c44" stroke-width="0.8"/>
  <text x="658" y="241" font-size="7.5" fill="#333">50 kbps</text>

  <text x="630" y="270" font-size="8" fill="#4a90c4" text-anchor="middle">Gradient compression</text>
  <text x="630" y="282" font-size="8" fill="#4a90c4" text-anchor="middle">mandatory (8-32x)</text>

  <!-- Arrow to server -->
  <line x1="530" y1="160" x2="530" y2="90" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== Challenge 4: Privacy ===== -->
  <rect x="770" y="140" width="120" height="150" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="830" y="163" font-size="10" font-weight="700" fill="#3d9e5a" text-anchor="middle">Privacy</text>

  <text x="830" y="190" font-size="8" fill="#555" text-anchor="middle">Gradient</text>
  <text x="830" y="203" font-size="8" fill="#555" text-anchor="middle">inversion attacks</text>
  <text x="830" y="218" font-size="8" fill="#555" text-anchor="middle">can reconstruct</text>
  <text x="830" y="231" font-size="8" fill="#c44" text-anchor="middle" font-weight="700">user data!</text>

  <text x="830" y="260" font-size="8" fill="#3d9e5a" text-anchor="middle">Requires:</text>
  <text x="830" y="275" font-size="7.5" fill="#555" text-anchor="middle">Differential Privacy</text>
  <text x="830" y="288" font-size="7.5" fill="#555" text-anchor="middle">Secure Aggregation</text>

  <!-- ===== Solutions Row ===== -->
  <text x="450" y="330" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Protocol-Level Mitigations</text>

  <rect x="60" y="345" width="195" height="80" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="157" y="365" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Async Aggregation</text>
  <text x="157" y="380" font-size="8" fill="#555" text-anchor="middle">Do not wait for slow devices</text>
  <text x="157" y="395" font-size="8" fill="#555" text-anchor="middle">Buffer-based FedBuff</text>
  <text x="157" y="410" font-size="8" fill="#555" text-anchor="middle">Staleness-aware weighting</text>

  <rect x="275" y="345" width="195" height="80" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.2"/>
  <text x="372" y="365" font-size="9" font-weight="700" fill="#c87b2a" text-anchor="middle">Client Clustering</text>
  <text x="372" y="380" font-size="8" fill="#555" text-anchor="middle">Group similar data distributions</text>
  <text x="372" y="395" font-size="8" fill="#555" text-anchor="middle">Per-cluster aggregation</text>
  <text x="372" y="410" font-size="8" fill="#555" text-anchor="middle">FedProx for heterogeneity</text>

  <rect x="490" y="345" width="195" height="80" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.2"/>
  <text x="587" y="365" font-size="9" font-weight="700" fill="#4a90c4" text-anchor="middle">Update Compression</text>
  <text x="587" y="380" font-size="8" fill="#555" text-anchor="middle">Gradient quantization (8-bit)</text>
  <text x="587" y="395" font-size="8" fill="#555" text-anchor="middle">Top-k sparsification</text>
  <text x="587" y="410" font-size="8" fill="#555" text-anchor="middle">78x bandwidth savings</text>

  <rect x="705" y="345" width="185" height="80" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="797" y="365" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Privacy Mechanisms</text>
  <text x="797" y="380" font-size="8" fill="#555" text-anchor="middle">Differential privacy (epsilon=1-8)</text>
  <text x="797" y="395" font-size="8" fill="#555" text-anchor="middle">Secure aggregation</text>
  <text x="797" y="410" font-size="8" fill="#555" text-anchor="middle">1-5% accuracy cost</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">Federated learning is a systems problem: algorithmic elegance masks substantial engineering challenges.</text>
</svg>
