<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#fff" rx="4"/>

  <!-- Title -->
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Cloud Training vs. On-Device Learning</text>

  <!-- Dashed divider -->
  <line x1="450" y1="45" x2="450" y2="470" stroke="#e0e0e0" stroke-dasharray="4,3" stroke-width="0.8"/>

  <!-- ===== LEFT: Cloud Training ===== -->
  <text x="225" y="60" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Centralized Cloud Training</text>

  <!-- Cloud box -->
  <rect x="130" y="80" width="190" height="70" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="225" y="105" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Cloud GPU Cluster</text>
  <text x="225" y="120" font-size="8.5" fill="#555" text-anchor="middle">989 TFLOPS | 80 GB HBM3</text>
  <text x="225" y="135" font-size="8.5" fill="#555" text-anchor="middle">700 W per accelerator</text>

  <!-- Data store -->
  <rect x="150" y="175" width="150" height="40" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="225" y="200" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Curated Training Data (TB)</text>

  <!-- Arrow data to cloud -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <line x1="225" y1="175" x2="225" y2="155" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Static model deployment -->
  <text x="225" y="240" font-size="9" font-weight="700" fill="#555" text-anchor="middle">Deploy Static Model</text>
  <line x1="225" y1="248" x2="225" y2="268" stroke="#a31f34" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Devices (static) -->
  <rect x="130" y="275" width="55" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="157" y="300" font-size="8" fill="#555" text-anchor="middle">Phone A</text>
  <rect x="197" y="275" width="55" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="225" y="300" font-size="8" fill="#555" text-anchor="middle">Phone B</text>
  <rect x="264" y="275" width="55" height="45" rx="4" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="292" y="300" font-size="8" fill="#555" text-anchor="middle">Phone C</text>

  <!-- Raw data arrows back (privacy risk) -->
  <path d="M157,320 L157,360 L100,360 L100,120 L127,120" stroke="#a31f34" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>
  <text x="80" y="245" font-size="7.5" fill="#c44" text-anchor="middle" transform="rotate(-90, 80, 245)">Raw data upload</text>

  <!-- Limitations -->
  <rect x="115" y="380" width="220" height="80" rx="4" fill="#f9d6d5" stroke="#c44" stroke-width="1.2"/>
  <text x="225" y="400" font-size="9" font-weight="700" fill="#c44" text-anchor="middle">Limitations</text>
  <text x="225" y="415" font-size="8" fill="#555" text-anchor="middle">No personalization after deployment</text>
  <text x="225" y="430" font-size="8" fill="#555" text-anchor="middle">Privacy risk from data upload</text>
  <text x="225" y="445" font-size="8" fill="#555" text-anchor="middle">Requires constant connectivity</text>

  <!-- ===== RIGHT: On-Device Learning ===== -->
  <text x="675" y="60" font-size="11" font-weight="700" fill="#333" text-anchor="middle">On-Device Learning</text>

  <!-- Pre-trained model -->
  <rect x="580" y="80" width="190" height="45" rx="5" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="675" y="100" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Pre-Trained Base Model</text>
  <text x="675" y="114" font-size="8.5" fill="#555" text-anchor="middle">Downloaded once to device</text>

  <!-- Arrow down -->
  <line x1="675" y1="125" x2="675" y2="148" stroke="#3d9e5a" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Devices with local training loops -->
  <rect x="498" y="155" width="110" height="100" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="553" y="175" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Phone A</text>
  <!-- Training loop icon -->
  <path d="M530,200 C530,215 575,215 575,200 C575,185 530,185 530,200" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="553" y="242" font-size="7.5" fill="#555" text-anchor="middle">Local data</text>

  <rect x="620" y="155" width="110" height="100" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="675" y="175" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Phone B</text>
  <path d="M652,200 C652,215 697,215 697,200 C697,185 652,185 652,200" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="675" y="242" font-size="7.5" fill="#555" text-anchor="middle">Local data</text>

  <rect x="742" y="155" width="110" height="100" rx="5" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="797" y="175" font-size="9" font-weight="700" fill="#333" text-anchor="middle">Phone C</text>
  <path d="M774,200 C774,215 819,215 819,200 C819,185 774,185 774,200" stroke="#3d9e5a" stroke-width="1.2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="797" y="242" font-size="7.5" fill="#555" text-anchor="middle">Local data</text>

  <!-- Federated aggregation -->
  <rect x="580" y="285" width="190" height="50" rx="5" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="675" y="305" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Federated Aggregation</text>
  <text x="675" y="320" font-size="8.5" fill="#555" text-anchor="middle">Model updates only (no raw data)</text>

  <!-- Arrows from devices to aggregation -->
  <line x1="553" y1="255" x2="620" y2="285" stroke="#c87b2a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="675" y1="255" x2="675" y2="283" stroke="#c87b2a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="797" y1="255" x2="730" y2="285" stroke="#c87b2a" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Benefits -->
  <rect x="565" y="365" width="220" height="95" rx="4" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.2"/>
  <text x="675" y="385" font-size="9" font-weight="700" fill="#3d9e5a" text-anchor="middle">Benefits</text>
  <text x="675" y="400" font-size="8" fill="#555" text-anchor="middle">Continuous personalization</text>
  <text x="675" y="415" font-size="8" fill="#555" text-anchor="middle">Privacy preserved (data stays local)</text>
  <text x="675" y="430" font-size="8" fill="#555" text-anchor="middle">Works offline / low connectivity</text>
  <text x="675" y="445" font-size="8" fill="#555" text-anchor="middle">Federated coordination for global gains</text>

  <!-- Footnote -->
  <text x="450" y="490" font-size="9" font-style="italic" fill="#999" text-anchor="middle">On-device learning moves compute to the data, enabling personalization without sacrificing privacy.</text>
</svg>
