<?xml version="1.0" encoding="UTF-8"?>
<svg font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#fff"/>
  <text x="450" y="30" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Sparse Update Strategies: Selective Layer Adaptation</text>

  <!-- Three strategies -->
  <!-- Layer Selection -->
  <rect x="40" y="55" width="260" height="250" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Last-N Layers</text>

  <!-- Layer visualization -->
  <rect x="120" y="95" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="108" font-size="7" fill="#555" text-anchor="middle">Layer 1 (frozen)</text>
  <rect x="120" y="118" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="131" font-size="7" fill="#555" text-anchor="middle">Layer 2 (frozen)</text>
  <rect x="120" y="141" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="154" font-size="7" fill="#555" text-anchor="middle">...</text>
  <rect x="120" y="164" width="100" height="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="177" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer N-2 (train)</text>
  <rect x="120" y="187" width="100" height="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="200" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer N-1 (train)</text>
  <rect x="120" y="210" width="100" height="18" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="170" y="223" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer N (train)</text>

  <text x="170" y="255" font-size="8.5" fill="#555" text-anchor="middle">10-30% params updated</text>
  <text x="170" y="272" font-size="8.5" fill="#555" text-anchor="middle">1.5-2x memory overhead</text>
  <text x="170" y="292" font-size="8.5" font-weight="700" fill="#4a90c4" text-anchor="middle">Best: similar domains</text>

  <!-- Fisher Selection -->
  <rect x="320" y="55" width="260" height="250" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Fisher Selection</text>

  <rect x="400" y="95" width="100" height="18" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="108" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer 1 (high F)</text>
  <rect x="400" y="118" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="131" font-size="7" fill="#555" text-anchor="middle">Layer 2 (low F)</text>
  <rect x="400" y="141" width="100" height="18" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="154" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer 3 (high F)</text>
  <rect x="400" y="164" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="177" font-size="7" fill="#555" text-anchor="middle">Layer 4 (low F)</text>
  <rect x="400" y="187" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="450" y="200" font-size="7" fill="#555" text-anchor="middle">Layer 5 (low F)</text>
  <rect x="400" y="210" width="100" height="18" fill="#fdebd0" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="450" y="223" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer 6 (high F)</text>

  <text x="450" y="255" font-size="8.5" fill="#555" text-anchor="middle">5-15% params updated</text>
  <text x="450" y="272" font-size="8.5" fill="#555" text-anchor="middle">1.2-1.5x memory overhead</text>
  <text x="450" y="292" font-size="8.5" font-weight="700" fill="#c87b2a" text-anchor="middle">Best: task-specific adaptation</text>

  <!-- Sparse + LoRA -->
  <rect x="600" y="55" width="260" height="250" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="730" y="78" font-size="11" font-weight="700" fill="#333" text-anchor="middle">Sparse + LoRA</text>

  <rect x="680" y="95" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="108" font-size="7" fill="#555" text-anchor="middle">Layer 1 (frozen)</text>
  <rect x="680" y="118" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="131" font-size="7" fill="#555" text-anchor="middle">Layer 2 (frozen)</text>
  <rect x="680" y="141" width="100" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="730" y="154" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer 3: LoRA r=4</text>
  <rect x="680" y="164" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="177" font-size="7" fill="#555" text-anchor="middle">Layer 4 (frozen)</text>
  <rect x="680" y="187" width="100" height="18" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <text x="730" y="200" font-size="7" fill="#555" text-anchor="middle">Layer 5 (frozen)</text>
  <rect x="680" y="210" width="100" height="18" fill="#d4edda" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="730" y="223" font-size="7" font-weight="700" fill="#333" text-anchor="middle">Layer 6: LoRA r=4</text>

  <text x="730" y="255" font-size="8.5" fill="#555" text-anchor="middle">1-3% params updated</text>
  <text x="730" y="272" font-size="8.5" fill="#555" text-anchor="middle">1.05-1.1x memory overhead</text>
  <text x="730" y="292" font-size="8.5" font-weight="700" fill="#3d9e5a" text-anchor="middle">Best: extreme memory limits</text>

  <!-- Quality comparison -->
  <rect x="40" y="330" width="820" height="70" fill="#f7f7f7" stroke="#bbb" stroke-width="1.2"/>
  <text x="450" y="353" font-size="10" font-weight="700" fill="#333" text-anchor="middle">Quality vs. Efficiency Trade-off</text>
  <text x="170" y="378" font-size="9" fill="#555" text-anchor="middle">Last-N: 92-95% of full FT quality</text>
  <text x="450" y="378" font-size="9" fill="#555" text-anchor="middle">Fisher: 95-97% of full FT quality</text>
  <text x="730" y="378" font-size="9" fill="#555" text-anchor="middle">Sparse+LoRA: 97% with &lt;2% memory</text>

  <text x="450" y="430" font-size="9" fill="#999" text-anchor="middle" font-style="italic">Strategies are complementary: use Fisher Information to select layers, then apply LoRA only to selected layers</text>
</svg>
