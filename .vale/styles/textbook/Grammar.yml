extends: existence
message: "Sentence appears to start with lowercase letter."
level: error
# Match lines that start with lowercase letters (not including special cases)
# Excludes: numbers, quotes, parentheses, code blocks, list items
tokens:
  - '^\s*[a-z]'
# Exclude common valid lowercase starts
exceptions:
  - '^\s*```'  # Code blocks
  - '^\s*\d'   # Numbers
  - '^\s*[\-\*\+]'  # List items  
  - '^\s*>'    # Blockquotes
  - '^\s*\|'   # Tables
  - '^\s*#'    # Headers
  - '^\s*such\s'  # "such compact systems" - valid sentence starter
  - '^\s*these\s' # "these projections" - valid sentence starter
  - '^\s*this\s'  # "this technique" - valid sentence starter