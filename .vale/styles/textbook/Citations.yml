extends: substitution
message: "Use consistent citation format: '%s' instead of '%s'."
level: error
ignorecase: false
swap:
  # Standardize "Source:" format - always capitalized with space
  '\bsource:': 'Source:'
  '\bSOURCE:': 'Source:'
  
  # Handle citation patterns - enforce brackets around citations
  'Source: @([a-zA-Z0-9_-]+)': 'Source: [@$1]'
  'source: @([a-zA-Z0-9_-]+)': 'Source: [@$1]'
  'Source:@([a-zA-Z0-9_-]+)': 'Source: [@$1]'
  'source:@([a-zA-Z0-9_-]+)': 'Source: [@$1]'
  
  # Handle multiple citations
  'Source: @([a-zA-Z0-9_-]+), @([a-zA-Z0-9_-]+)': 'Source: [@$1; @$2]'
  'source: @([a-zA-Z0-9_-]+), @([a-zA-Z0-9_-]+)': 'Source: [@$1; @$2]'