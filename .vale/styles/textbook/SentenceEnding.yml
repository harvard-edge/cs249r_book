extends: existence
message: "Sentence may be missing ending punctuation."
level: warning
# Match lines that end with a word character (no punctuation)
# But exclude headers, list items, code, etc.
tokens:
  - '[a-zA-Z0-9]\s*$'
# Don't flag these valid cases
exceptions:
  - '^#+'        # Headers
  - '^\s*[\-\*\+]'  # List items
  - '^\s*\d+\.'     # Numbered lists
  - '^\s*```'       # Code blocks
  - '^\s*\|'        # Tables
  - ':\s*$'         # Lines ending with colon
  - '!\[.*\].*\{#fig-.*\}$'  # Figure captions with labels
  - '.*\]\(.*\)\.\].*$'     # Complex markdown links
  - '.*\}$'         # Lines ending with code blocks or special syntax
  - '.*\\.*$'       # LaTeX commands
  - '.*\$.*\$$'     # Math expressions