extends: existence
message: "Figure captions should follow format: **Bold Title**: explanation text"
level: warning
# Match figure captions that don't follow the **Bold**: pattern
tokens:
  # Match image markdown that doesn't start with **text**:
  - '!\[(?!\*\*[^*]+\*\*:)'
# Don't flag valid patterns or special cases
exceptions:
  - '!\[_.*_\]'     # DALL-E prompts with italics
  - '!\[\*\*.*\*\*:'  # Correct format
  - '!\[.*\]\(https?://.*\)'  # External image links