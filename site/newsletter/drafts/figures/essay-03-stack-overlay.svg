<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="680" height="460" fill="#fff"/>

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#a31f34"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#3d9e5a"/>
    </marker>
  </defs>

  <!-- ===== Left: red arrow going UP with vertical label next to it ===== -->
  <line x1="95" y1="400" x2="95" y2="64" stroke="#a31f34" stroke-width="2.5"
        marker-end="url(#arrow-red)"/>
  <text x="75" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#a31f34"
        transform="rotate(-90 75 232)">Failures propagate upward</text>

  <!-- ===== Right: green arrow going DOWN with vertical label next to it ===== -->
  <line x1="585" y1="64" x2="585" y2="408" stroke="#3d9e5a" stroke-width="2.5"
        marker-end="url(#arrow-green)"/>
  <text x="605" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#3d9e5a"
        transform="rotate(90 605 232)">Understanding flows downward</text>

  <!-- ===== Stack (4 layers, 18px gap between each) ===== -->

  <!-- Layer 4: Application -->
  <rect x="130" y="68" width="420" height="72" fill="#eaf6ed" stroke="#3d9e5a" stroke-width="1.5"/>
  <text x="150" y="94" font-size="13" font-weight="700" fill="#1a4a2a">Layer 4 &#183; Application</text>
  <text x="150" y="113" font-size="10.5" fill="#555">Training loop, batch size, evaluation metrics</text>
  <text x="540" y="131" text-anchor="end" font-size="9" font-weight="600" fill="#888" letter-spacing="0.5">DATA &#183; ALGORITHM</text>

  <!-- Layer 3: Framework -->
  <rect x="130" y="158" width="420" height="72" fill="#fdeecd" stroke="#c87b2a" stroke-width="1.5"/>
  <text x="150" y="184" font-size="13" font-weight="700" fill="#5a3a10">Layer 3 &#183; Framework</text>
  <text x="150" y="203" font-size="10.5" fill="#555">PyTorch, autograd, operator dispatch</text>
  <text x="540" y="221" text-anchor="end" font-size="9" font-weight="600" fill="#888" letter-spacing="0.5">ALGORITHM &#183; MACHINE</text>

  <!-- Layer 2: Runtime -->
  <rect x="130" y="248" width="420" height="72" fill="#e3eff9" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="274" font-size="13" font-weight="700" fill="#1a3a5c">Layer 2 &#183; Runtime</text>
  <text x="150" y="293" font-size="10.5" fill="#555">CUDA runtime, memory allocator, PCIe DMA, kernel scheduling</text>
  <text x="540" y="311" text-anchor="end" font-size="9" font-weight="600" fill="#888" letter-spacing="0.5">MACHINE &#183; DATA</text>

  <!-- Layer 1: Hardware -->
  <rect x="130" y="338" width="420" height="72" fill="#cfe2f3" stroke="#4a90c4" stroke-width="1.5"/>
  <text x="150" y="364" font-size="13" font-weight="700" fill="#1a3a5c">Layer 1 &#183; Hardware</text>
  <text x="150" y="383" font-size="10.5" fill="#555">Silicon, HBM bandwidth, NVLink, SM count, power</text>
  <text x="540" y="401" text-anchor="end" font-size="9" font-weight="600" fill="#888" letter-spacing="0.5">MACHINE</text>

  <!-- ===== Footnote ===== -->
  <text x="340" y="445" text-anchor="middle" font-size="8.5" fill="#999" font-style="italic">D &#183; A &#183; M = Data &#183; Algorithm &#183; Machine &nbsp;&middot;&nbsp; From Vol. I of Machine Learning Systems &#183; mlsysbook.ai</text>

</svg>
