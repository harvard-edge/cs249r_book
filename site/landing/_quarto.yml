# =============================================================================
# LANDING PAGE WEBSITE (root of mlsysbook.ai)
# =============================================================================
# Ecosystem hub — links to all subsites (book, slides, kits, labs, etc.)
# Build:  cd site/landing && quarto render
# Output: landing/_build/  → deploy to https://mlsysbook.ai/
# =============================================================================

project:
  type: website
  output-dir: _build

website:
  title: "Machine Learning Systems"
  description: "Two-volume textbook on ML systems: foundations and single-machine deployment (Vol I), distributed systems and scale (Vol II). Free to read online."
  site-url: https://mlsysbook.ai/

  open-graph:
    locale: en_US
    site-name: "Machine Learning Systems"
    image: https://mlsysbook.ai/vol1/assets/images/covers/cover-hardcover-book-vol1.png
    image-width: 1200
    image-height: 630
  twitter-card:
    card-style: summary_large_image
    image: https://mlsysbook.ai/vol1/assets/images/covers/cover-hardcover-book-vol1.png

  page-navigation: false
  back-to-top-navigation: false

  # Shared navbar from navbar-common.yml (via metadata-files).
  navbar:
    logo: https://mlsysbook.ai/vol1/assets/images/icons/favicon.png
    title: "Machine Learning Systems"

  # No sidebar on landing (single-page hub)
  sidebar: []

  page-footer:
    left: |
      © 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      <a href="book/vol1/">Volume I</a> · <a href="book/vol2/">Volume II</a>
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
      - icon: star
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "Star this repository"
    background: light
    border: true

metadata-files:
  - ../../book/quarto/config/shared/html/navbar-common.yml

format:
  html:
    toc: false
    theme:
      light:
        - default
        - ../../shared/styles/style-site.scss
      dark:
        - default
        - ../../shared/styles/style-site.scss
        - ../../shared/styles/dark-mode-site.scss
    respect-user-color-scheme: true
    css: landing.css
    include-in-header:
      - file: ../../shared/config/site-head.html
      - text: |
          <meta name="theme-color" content="#A51C30">
