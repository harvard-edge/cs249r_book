# ============================================================================
# People — Machine Learning Systems Curriculum
# ============================================================================
# Structure (in display order):
#   authors            Vijay
#   hardware-labs      Marcelo
#   global-outreach    Marco, Brian
#   workshops          Diego, Jeremy
#   programs-platform  Kari, Kai
#
# Below the groups, the template renders:
#   Acknowledgments block (edX lineage, Our Story link, mission paper link,
#   and the 95+ contributors CTA).
#
# Member fields:
#   name          required
#   role          title shown under the name
#   affiliation   optional; hidden if omitted
#   bio           optional; hidden for compact groups
#   github        required; used for avatar fallback and hover link
#   image         optional; local path overrides the GitHub avatar
# ============================================================================

groups:
  - id: authors
    name: Authors & Curriculum
    description: The authors and editors who write, structure, and maintain the textbook content, including chapters, problem sets, and the intellectual arc of the curriculum.
    compact: false
    featured: true
    members:
      - name: Vijay Janapa Reddi
        github: profvjreddi
        role: Lead Author
        affiliation: Professor, Harvard University
        bio: Leads the ML Systems curriculum. Co-founder of MLPerf and the TinyML4D network. Research spans edge AI, benchmarking, and systems for machine learning.
        tags: [curriculum, outreach, platform]

  - id: hardware-labs
    name: Hardware & Labs
    description: The hands-on side of the curriculum, covering microcontroller labs, hardware kits, and the deployment exercises that turn ML concepts into working devices students can hold.
    compact: false
    featured: true
    members:
      - name: Marcelo Rovai
        github: Mjrovai
        role: Hardware Kits Lead
        affiliation: Professor Honoris Causa, UNIFEI, Brazil
        bio: Leads the hardware deployment curriculum and authors open companion books for the Nicla Vision, XIAO, and Raspberry Pi paths. Co-chairs the TinyML4D Academic Network and the Edge AI Partnership (academia-industry collaboration).
        tags: [hardware, curriculum, outreach]

  - id: global-outreach
    name: Global Outreach
    description: The leaders who carry the curriculum across continents, anchoring the global academic network and co-chairing the TinyMLedu initiative that extends ML systems education into developing regions.
    compact: false
    featured: true
    members:
      - name: Marco Zennaro
        github: marcozennaro
        role: TinyML4D Chair
        affiliation: Research Scientist, ICTP, Italy
        bio: Chairs TinyML4D at the International Centre for Theoretical Physics. Instrumental in distributing curriculum and hardware kits to universities in developing nations.
        tags: [outreach, curriculum]

      - name: Brian Plancher
        github: bplancher
        image: assets/people/brian.png
        role: TinyML4D Co-Chair
        affiliation: Assistant Professor, Dartmouth College
        bio: Co-chairs the TinyML4D Academic Network. Research bridges robotics and embedded ML, bringing systems thinking to undergraduate curricula.
        tags: [outreach, curriculum]

  - id: workshops
    name: Workshops
    description: The organizers who run the workshops, regional programs, and the monthly community showcase that bring the curriculum to life in classrooms and online.
    compact: false
    featured: true
    members:
      - name: Diego Méndez Chaves
        github: diegomendez
        image: assets/people/diego.jpg
        role: Regional Lead · Latin America
        affiliation: Pontificia Universidad Javeriana, Colombia
        bio: Leads regional workshops and curriculum adoption across Latin America. Champions hands-on TinyML and EdgeAI education at Universidad Javeriana.
        tags: [outreach, curriculum]

      - name: Jeremy Ellis
        github: hpssjellis
        image: assets/people/jeremy.jpg
        role: K-12 & Show & Tell Chair
        affiliation: Educator, BC, Canada
        bio: Organizes the monthly Show & Tell community showcase. Brings maker-culture energy to TinyML and EdgeAI education for K-12 and beyond.
        tags: [outreach]

  - id: programs-platform
    name: Programs & Platform
    description: The operations and platform team behind the curriculum, running the programs, partnerships, and global operations, and building the web platform and tools that deliver the material.
    compact: false
    featured: true
    members:
      - name: Kari O. Janapareddi
        github: karijanapareddi
        image: assets/people/kari.jpg
        role: Director of Programs & Community
        bio: Leads programs, community, and operations across MLSysBook, building the partnerships, communications cadence, and structure that rally a global coalition of academics advancing AI systems education.
        tags: [outreach]

      - name: Kai Kleinbard
        github: kai4avaya
        role: Full-Stack Developer
        bio: Leads web platform development. Built SocratiQ, the AI tutor embedded in the textbook, and maintains the site infrastructure across the curriculum.
        tags: [platform]

# ── Acknowledgments — lineage, full story pointer, mission paper, contributors CTA
acknowledgments:
  title: Acknowledgments
  body: |
    <p>This curriculum grew out of the
    <a href="https://www.edx.org/certificates/professional-certificate/harvardx-tiny-machine-learning" target="_blank" rel="noopener">TinyML Professional Certificate on edX</a>,
    co-created with <strong>Laurence Moroney</strong> (Google),
    <strong>Pete Warden</strong> (Useful Sensors), and
    <strong>Larissa Suzuki</strong> (Google Cloud).</p>
    <p>For the full history of how the curriculum came together, see
    <a href="/about/#story">Our Story</a>. The broader mission of widening access to applied machine learning is laid out in the paper
    <a href="https://arxiv.org/abs/2106.04008" target="_blank" rel="noopener"><em>Widening Access to Applied Machine Learning with TinyML</em></a>.</p>
    <p class="acknowledgments-credits">The curriculum also reflects the work of 95+ researchers, students, and engineers who contributed chapters, figures, code, and reviews across both volumes, all credited on GitHub.</p>
    <p class="acknowledgments-cta"><a href="contributors.html" class="acknowledgments-btn">View all contributors →</a></p>
