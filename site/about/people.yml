# ============================================================================
# People — Machine Learning Systems Curriculum
# ============================================================================
# To add someone: copy a block, fill in the fields, put them in the right group.
# Photos are pulled automatically from GitHub using the "github" username.
# The "bio" field is optional — leave it out for compact cards.
#
# Groups (in display order):
#   founders, key-people, edx, global-educators
# ============================================================================

groups:
  - id: founders
    name: ""
    description: ""
    compact: false
    featured: true
    members:
      - name: Vijay Janapa Reddi
        github: profvjreddi
        role: Lead Author
        affiliation: Professor, Harvard University
        bio: Leads the ML Systems curriculum. Co-founder of MLPerf and the TinyML4D network. Research spans edge AI, benchmarking, and systems for machine learning.

      - name: Kari O. Janapareddi
        github: karijanapareddi
        role: Community & Program Director
        affiliation: TinyMLedu
        bio: Builds and sustains the community around the curriculum — managing partnerships, coordinating the TinyML4D network, and keeping the global programs running.

  - id: global-outreach
    name: Global Outreach
    description: The educators and organizers who brought ML Systems education to 40+ universities across six continents — through the TinyML4D Academic Network, hardware kits, workshops, and community showcases.
    compact: false
    members:
      - name: Marco Zennaro
        github: marcozennaro
        role: TinyML4D Chair
        affiliation: Research Scientist, ICTP, Italy
        bio: Chairs TinyML4D at the International Centre for Theoretical Physics. Instrumental in distributing curriculum and hardware kits to universities in developing nations.

      - name: Brian Plancher
        github: bplancher
        role: TinyMLedu Co-Chair
        affiliation: Assistant Professor, Barnard College, Columbia University
        bio: Co-chairs the TinyMLedu initiative. Research bridges robotics and embedded ML, bringing systems thinking to undergraduate curricula.

      - name: Marcelo Rovai
        github: Mjrovai
        role: Hardware Kits Lead
        affiliation: Professor, UNIFEI, Brazil
        bio: Leads the hardware deployment curriculum. Designs labs that bring ML inference to microcontrollers. Co-chairs the TinyML4D Academic Network.

      - name: Jeremy Ellis
        github: hpssjellis
        role: K-12 & Show & Tell Chair
        affiliation: Educator, BC, Canada
        bio: Organizes community showcases and educational demonstrations. Brings maker-culture energy to the TinyML education ecosystem.

