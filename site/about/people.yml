# ============================================================================
# People — Machine Learning Systems Curriculum
# ============================================================================
# To add someone: copy a block, fill in the fields, put them in the right group.
# Photos are pulled automatically from GitHub using the "github" username.
# The "bio" field is optional — leave it out for compact cards.
#
# Groups (in display order):
#   curriculum, hardware, outreach, edx, working-group, research
# ============================================================================

groups:
  - id: curriculum
    name: Curriculum
    description: The core team writing, editing, and maintaining the two-volume textbook and its companion materials.
    compact: false
    members:
      - name: Vijay Janapa Reddi
        github: profvjreddi
        role: Lead Author
        affiliation: Associate Professor, Harvard University
        bio: Leads the ML Systems curriculum. Co-founder of MLPerf and the TinyML4D network. Research spans edge AI, benchmarking, and systems for machine learning.

      - name: Zeljko Hrcek
        github: hzeljko
        role: Core Contributor
        affiliation: Community
        bio: One of the earliest and most prolific open-source contributors. Hundreds of commits spanning content, code, and infrastructure.

      - name: Jason Jabbour
        github: jasonjabbour
        role: Core Contributor
        affiliation: Harvard University
        bio: Major contributor across chapters, figures, and tooling. Helped shape the curriculum from its TinyML origins to the full ML Systems scope.

      - name: Colby Banbury
        github: colbybanbury
        role: MLPerf / Benchmarks
        affiliation: Harvard University
        bio: Contributed benchmarking content and MLPerf methodology. Research focuses on ML systems evaluation and performance characterization.

      - name: Kai Kleinbard
        github: kai4avaya
        role: Core Contributor
        affiliation: Community
        bio: Prolific contributor with 90+ commits across content, tooling, and infrastructure improvements.

      - name: Ikechukwu Uchendu
        github: uchendui
        role: Core Contributor
        affiliation: Community
        bio: Significant content contributions spanning multiple chapters, with 60+ commits to the open-source repository.

  - id: hardware
    name: Hardware & Labs
    description: The team building hands-on hardware kits and deployment labs for Arduino, Raspberry Pi, and Seeed platforms.
    compact: false
    members:
      - name: Marcelo Rovai
        github: Mjrovai
        role: Hardware Kits Lead
        affiliation: Professor, UNIFEI, Brazil
        bio: Leads the hardware deployment curriculum. Designs labs that bring ML inference to microcontrollers, bridging classroom theory and physical devices.

  - id: outreach
    name: Global Outreach
    description: The educators and organizers who brought ML Systems education to 40+ universities across six continents through the TinyML4D Academic Network.
    compact: false
    members:
      - name: Brian Plancher
        github: bplancher
        role: TinyMLedu Co-Chair
        affiliation: Assistant Professor, Barnard College, Columbia University
        bio: Co-chairs the TinyMLedu initiative. Research bridges robotics and embedded ML, bringing systems thinking to undergraduate curricula.

      - name: Marco Zennaro
        github: marcozennaro
        role: TinyML4D Chair
        affiliation: Research Scientist, ICTP, Italy
        bio: Chairs TinyML4D at the International Centre for Theoretical Physics. Instrumental in distributing curriculum and hardware kits to universities in developing nations.

      - name: Jeremy Ellis
        github: hpssjellis
        role: Show & Tell Chair
        affiliation: Educator, BC, Canada
        bio: Organizes community showcases and educational demonstrations. Brings maker-culture energy to the TinyML education ecosystem.

  - id: edx
    name: edX Courses
    description: The instructors behind the TinyML Professional Certificate on edX, which introduced millions to machine learning on embedded devices.
    compact: false
    members:
      - name: Laurence Moroney
        github: lmoroney
        role: edX Instructor
        affiliation: Google
        bio: AI developer advocate and educator. Co-created the TinyML edX series, making on-device ML accessible to a global audience.

      - name: Pete Warden
        github: petewarden
        role: edX Instructor
        affiliation: Useful Sensors
        bio: Pioneer of TensorFlow Lite for Microcontrollers. His work helped define the TinyML field and shaped the earliest course content.

      - name: Larissa Suzuki
        github: larissasuzuki
        role: edX Instructor
        affiliation: Google Cloud
        bio: Cloud AI specialist and educator. Contributed to the professional certificate series, connecting edge ML concepts to cloud infrastructure.

