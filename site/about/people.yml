  - id: edx
    name: edX Courses
    description: The instructors behind the TinyML Professional Certificate on edX — four courses that have reached over a million enrollments worldwide.
    compact: false
    members:
      - name: Laurence Moroney
        github: lmoroney
        role: edX Instructor
        affiliation: Google
        bio: AI developer advocate and educator. Co-created the TinyML edX series, making on-device ML accessible to a global audience.

      - name: Pete Warden
        github: petewarden
        role: edX Instructor
        affiliation: Useful Sensors
        bio: Pioneer of TensorFlow Lite for Microcontrollers. His work helped define the TinyML field and shaped the earliest course content.

      - name: Larissa Suzuki
        github: larissasuzuki
        role: edX Instructor
        affiliation: Google Cloud
        bio: Cloud AI specialist and educator. Contributed to the professional certificate series, connecting edge ML concepts to cloud infrastructure.
