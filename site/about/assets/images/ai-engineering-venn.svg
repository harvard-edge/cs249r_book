<svg viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .circle { fill-opacity: 0.2; stroke-width: 2; }
      .label { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 14px; }
      .sublabel { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; fill: #555; }
      .intersection { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 10.5px; font-style: italic; fill: #888; }
      .center { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 14px; fill: #A51C30; }
    </style>
    <clipPath id="clipTheory">
      <circle cx="250" cy="150" r="103"/>
    </clipPath>
    <clipPath id="clipSystems">
      <circle cx="190" cy="255" r="103"/>
    </clipPath>
  </defs>

  <!-- Transparent background -->
  <rect width="500" height="380" fill="none"/>

  <!-- ML Theory Circle (top) -->
  <circle cx="250" cy="150" r="105" class="circle" fill="#4a90c4" stroke="#4a90c4"/>

  <!-- ML Systems Circle (bottom-left) -->
  <circle cx="190" cy="255" r="105" class="circle" fill="#A51C30" stroke="#A51C30"/>

  <!-- Applied ML Circle (bottom-right) -->
  <circle cx="310" cy="255" r="105" class="circle" fill="#3d9e5a" stroke="#3d9e5a"/>

  <!-- White center intersection -->
  <g clip-path="url(#clipTheory)">
    <g clip-path="url(#clipSystems)">
      <circle cx="310" cy="255" r="103" fill="white" fill-opacity="0.88"/>
    </g>
  </g>

  <!-- Main Labels -->
  <text x="250" y="30" text-anchor="middle" class="label" fill="#4a90c4">ML Theory</text>
  <text x="70" y="360" text-anchor="middle" class="label" fill="#A51C30">ML Systems</text>
  <text x="430" y="360" text-anchor="middle" class="label" fill="#3d9e5a">Applied ML</text>

  <!-- Theory content -->
  <text x="250" y="90" text-anchor="middle" class="sublabel">Methods</text>
  <text x="250" y="105" text-anchor="middle" class="sublabel">Foundations</text>
  <text x="250" y="120" text-anchor="middle" class="sublabel">Proofs</text>

  <!-- Systems content -->
  <text x="150" y="270" text-anchor="middle" class="sublabel">Infrastructure</text>
  <text x="150" y="285" text-anchor="middle" class="sublabel">Architecture</text>
  <text x="150" y="300" text-anchor="middle" class="sublabel">Silicon</text>

  <!-- Applied content -->
  <text x="345" y="270" text-anchor="middle" class="sublabel">Product</text>
  <text x="345" y="285" text-anchor="middle" class="sublabel">Data</text>
  <text x="345" y="300" text-anchor="middle" class="sublabel">Operations</text>

  <!-- Two-way intersections -->
  <text x="190" y="180" text-anchor="middle" class="intersection">ML Systems</text>
  <text x="190" y="193" text-anchor="middle" class="intersection">Researcher</text>

  <text x="310" y="180" text-anchor="middle" class="intersection">Data</text>
  <text x="310" y="193" text-anchor="middle" class="intersection">Scientist</text>

  <text x="250" y="283" text-anchor="middle" class="intersection">MLOps</text>
  <text x="250" y="300" text-anchor="middle" class="intersection">Engineer</text>

  <!-- Center - AI Engineering -->
  <text x="250" y="218" text-anchor="middle" class="center">AI</text>
  <text x="250" y="234" text-anchor="middle" class="center">Engineering</text>
</svg>
