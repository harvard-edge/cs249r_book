# =============================================================================
# COMMUNITY (mlsysbook.ai/community/)
# =============================================================================
# Workshops, events, outreach, and global network.
# Build: cd site/community && quarto render
# Deploy: mlsysbook.ai/community/
# =============================================================================

project:
  type: website
  output-dir: _build

website:
  title: "Community - Machine Learning Systems"
  description: "Workshops, events, outreach, and the global ML Systems education network."
  site-url: https://mlsysbook.ai/community/

  page-navigation: false
  back-to-top-navigation: true

  navbar:
    logo: https://mlsysbook.ai/vol1/assets/images/icons/favicon.png
    title: "Machine Learning Systems"

  sidebar: []

  page-footer:
    left: |
      &copy; 2024-2026 Harvard University. Licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC-BY-NC-SA 4.0</a>
    center: |
      <a href="https://mlsysbook.ai/vol1/">Volume I</a> &middot; <a href="https://mlsysbook.ai/vol2/">Volume II</a> &middot; <a href="https://mlsysbook.ai/community/">Community</a>
    right:
      - icon: github
        href: https://github.com/harvard-edge/cs249r_book
        aria-label: "View source on GitHub"
    background: light
    border: true

metadata-files:
  - ../../book/quarto/config/shared/html/navbar-common.yml

format:
  html:
    toc: true
    toc-depth: 2
    toc-title: "On This Page"
    theme:
      light:
        - default
        - ../../shared/styles/style-site.scss
      dark:
        - default
        - ../../shared/styles/style-site.scss
        - ../../shared/styles/dark-mode-site.scss
    respect-user-color-scheme: true
    css: community.css
    include-in-header:
      - file: ../../shared/config/site-head.html
      - text: |
          <meta name="theme-color" content="#A51C30">
          <script src="https://mlsysbook.ai/vol1/assets/scripts/subscribe-modal.js" defer></script>
