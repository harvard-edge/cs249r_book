# ============================================================================
# Partners & Sponsors — Machine Learning Systems
# ============================================================================
# This file powers the Partners & Sponsors page (partners.qmd).
#
# Tiers:
#   institutional  — academic and organizational partners
#   sponsors       — companies providing funding, hardware, or platform access
#
# Logo images: site/community/assets/images/partners/
# To add a partner: copy a block, fill in name/logo/url, place in the right tier.
# ============================================================================

tiers:
  - label: Institutional Partners
    id: institutional
    description: The academic institutions and organizations that anchor the curriculum and global network.
    members:
      - name: Harvard SEAS
        logo: assets/images/partners/harvard-seas.png
        url: https://seas.harvard.edu
        description: Home of CS 249r and the ML Systems curriculum.

      - name: MIT Press
        logo: assets/images/partners/mit-press.png
        url: https://mitpress.mit.edu
        description: Publisher of the two-volume hardcover edition.

      - name: tinyML Foundation
        logo: assets/images/partners/tinyml-foundation.png
        url: https://www.tinyml.org
        description: Non-profit advancing TinyML technology and education worldwide.

      - name: ICTP
        logo: assets/images/partners/ictp.png
        url: https://www.ictp.it
        description: Co-host of the TinyML4D Academic Network and SciTinyML workshops in Trieste.

      - name: edX
        logo: assets/images/partners/edx.png
        url: https://www.edx.org
        description: Platform for the TinyML Professional Certificate (4 courses).

      - name: Edge AI Foundation
        logo: assets/images/partners/edge-ai-foundation-real.png
        url: https://www.edgeaifoundation.org
        description: Funds the XIAOML kit donation program that delivers embedded ML hardware to universities across the TinyML4D Academic Network.

      - name: Harvard Data Science Initiative
        logo: assets/images/partners/hdsi.png
        url: https://datascience.harvard.edu
        description: Interdisciplinary data science research and education at Harvard.

      - name: Harvard Extension School
        logo: assets/images/partners/harvard-extension.png
        url: https://extension.harvard.edu
        description: Making Harvard courses accessible to a global audience.

      - name: National Science Foundation
        logo: assets/images/partners/nsf.png
        url: https://www.nsf.gov
        description: Funding ML systems research and educational infrastructure.

  - label: Industry Sponsors
    id: sponsors
    description: The companies that provide funding, hardware, and platform access to make this curriculum possible.
    members:
      - name: Google
        logo: assets/images/partners/google.jpg
        url: https://google.com
        description: Founding sponsor of the edX TinyML series and TensorFlow Lite ecosystem.

      - name: Arduino
        logo: assets/images/partners/arduino.svg
        url: https://www.arduino.cc
        description: Hardware partner — every TinyML4D university receives Arduino Tiny ML Kits.

      - name: Edge Impulse
        logo: assets/images/partners/edge-impulse.png
        url: https://www.edgeimpulse.com
        description: Platform partner for embedded ML development and Coursera courses.

      - name: Seeed Studio
        logo: assets/images/partners/seeed-studio.png
        url: https://www.seeedstudio.com
        description: Hardware partner providing XIAO and Grove ecosystem for deployment labs.

sponsor_cta: "$500 ships a hardware kit to a university classroom that needs it."
sponsor_url: https://opencollective.com/mlsysbook
sponsor_email: edu@tinyML.org
