# ── Recurring Series ────────────────────────────────────────────────────────
series:
  - name: SciTinyML Workshop Series
    description: >
      The annual SciTinyML workshop at ICTP in Trieste brings together researchers
      and students to apply machine learning to scientific challenges on low-power
      devices — from environmental monitoring to health diagnostics. Each edition
      combines foundational TinyML labs with cutting-edge research talks.
    cadence: Annual (typically May-June)
    host: International Centre for Theoretical Physics (ICTP)
    url: https://tinyml.seas.harvard.edu/SciTinyML
    playlist: https://www.youtube.com/playlist?list=PLL5nb-tgetJhpCtybAI7Epkiy_fUiIhwm

  - name: TinyML4D Show & Tell
    description: >
      A monthly virtual session where students from 20+ countries share TinyML
      projects — agriculture, healthcare, environmental monitoring, assistive
      technology. All skill levels welcome. Past recordings cover projects from
      across Africa, Asia, and Latin America.
    cadence: Monthly (last Thursday)
    host: TinyMLedu Community
    url: https://tinyml.seas.harvard.edu/showAndTell
    playlist: https://www.youtube.com/playlist?list=PLL5nb-tgetJhpCtybAI7Epkiy_fUiIhwm

  - name: TinyML4D Seminar Series
    description: >
      Research seminars featuring domain-specific applications of TinyML at
      institutions across the developing world — from getting started with
      Arduino kits to advanced on-device learning.
    cadence: Periodic
    host: TinyML4D Academic Network
    playlist: https://youtube.com/playlist?list=PLL5nb-tgetJiPg33y__aHO8oms1bZKnvD

