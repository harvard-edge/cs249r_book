<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
  .hover-link:hover {
  background-color: #f3f4f6; /* This is similar to Tailwind's zinc-100 */
}

/* Dark theme hover effect */
@media (prefers-color-scheme: dark) {
  .hover-link:hover {
    background-color: #4b5563; /* This is similar to Tailwind's zinc-700 */
  }
}

#suggestionOverlay {
  white-space: pre-wrap;
  word-wrap: break-word;
  text-overflow: ellipsis; 
  overflow-wrap: break-word;
  overflow: hidden; /* Hide any content that exceeds the dimensions */
}

.textarea-container {
  position: relative;
  width: fit-content;
}

textarea, #suggestionOverlay {
  font-size: 16px;
  line-height: 1.5;
  font-family: sans-serif;
}

#suggestionOverlay{
  opacity: 50%;
}

#responseTextarea{
  color: black;
}

/* .textarea-container {
  position: relative;
} */
.choiceMini{
  margin-bottom: -5px;
}

textarea, #suggestionOverlay, #suggestionContainer {
  width: 100%; /* Ensure the overlay and textarea are the same width */
  position: absolute; /* Position overlay directly over the textarea */
  top: 0;
  left: 0;
  /* pointer-events: none; Makes the overlay click-through */
}

#suggestionOverlay{
  height: 100px;
}

#citationMenu{
  transition: max-height 0.5s ease-in-out;
}

textarea {
  position: relative; /* Make sure textarea is positioned relatively within the container */
  background-color: transparent; /* Optional: make textarea background transparent */
}


</style>
<body>
<div id="hidden-menu-start-body">

  <div id="text-selection-menu-highlight" class="hidden">
<div
  class="relative  bg-white dark:bg-zinc-800 rounded-md font-sans text-sm p-2"
  style="width: 200px; box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;"
>
  <div class="text-xs p-1 font-bold" style="margin-bottom: -7px">Assistant</div>
    <div class="opacity-50 cursor-pointer p-1">
     Ask me questions about this highlighted text
    </div>
    
  <ul class="divide-y space-y-0 divide-transparent mt-2">
    <li id="explainMiniBtn" class="choiceMini hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1 font-bold">Explain Highlighted Text</li>
    <li id="researchMiniBtn" class="choiceMini hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1 font-bold" style="margin-bottom: -5px;">Get Current Research</li>
    <li id="quizMiniBtn" class="choiceMini hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1 font-bold">Generate Quiz</li>
    
    </ul>
    <!-- <li class="hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1 font-bold">Basic Search</li> -->
  <ul class="divide-y space-y-0 divide-transparent mt-2">
   
    <li id="citation"
      class="hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1 flex justify-between items-center"
    >


      Create citation


      <svg

    xmlns="http://www.w3.org/2000/svg"
    id="up-chevron"
    class="h-4 w-4 hidden"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
>
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
</svg>


      <svg
        xmlns="http://www.w3.org/2000/svg"
        id="down-chevron"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </li>
  </ul>
  
  
   </ul>
  <ul id="citationMenu" class="hidden absolute bg-white dark:bg-zinc-800 shadow-lg rounded-md mt-1 text-xs" style="right: 5px; z-index: 101;">
    <li id="chicago" class="hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1">Chicago</li>
    <li id="apa" class="hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1">APA</li>
    <li id="harvard" class="hover-link hover:bg-zinc-100 dark:hover:bg-zinc-700 cursor-pointer p-1">Harvard</li>
  </ul>
  
  
  
  <div class="mt-2 relative">
    <div id="suggestionOverlay" class="absolute w-full h-full p-2 pointer-events-none" style="color: #999;"></div>
    <textarea
      id="responseTextarea"
      class="w-full p-2 rounded-md border border-zinc-300 dark:border-zinc-600 focus:ring-blue-500 focus:border-blue-500 transition-shadow shadow-sm resize-none"
      rows="3"
      placeholder="Write something..."
    ></textarea>
    <div id="sendMiniBtn" class="absolute cursor-pointer right-4 bottom-2 flex items-center" >
      <!-- <span
        id="tabPlaceholder"
        class="bg-gray-200 text-white text-xs font-semibold opacity-50 px-2 py-1 rounded-full"
        >TAB</span> -->
        <div id="enterIcon" class="text-black text-2xl hover:text-blue-300">⏎</div>
    </div>
  </div>
</div>
</div>
</div>
</body>
</html>
