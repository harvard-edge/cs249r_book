title: Cloud Warp Divergence L5 0
scenario: 'To fix warp divergence in a sparse attention kernel, your team proposes: (A) sort tokens by
  attention pattern before the kernel, (B) use thread-block-level branching instead of thread-level, (C)
  pad all paths to equal length. Evaluate each approach.'
details:
  realistic_solution: 'Option A (pre-sort): groups tokens with same attention pattern into contiguous
    warps, eliminating divergence. Overhead: O(n log n) sort on CPU/GPU. For large batch sizes, sort cost
    is amortized and this is the best approach. Used by MegaBlocks for MoE. Option B (block-level branching):
    each thread block handles one pattern type. Eliminates warp divergence but may cause load imbalance
    between blocks (some patterns have more tokens). Need dynamic scheduling. Option C (padding): executes
    all code paths even when unnecessary — no divergence but wastes compute on padding. Worst option for
    sparse patterns where most paths are short. Best: A for batch inference (sort is cheap relative to
    compute), B for real-time (avoids sort latency).'
  common_mistake: Choosing padding (C) because it is simplest to implement. Padding converts a divergence
    problem into a pure compute waste problem, which is worse when the short and long paths differ significantly
    in cost.
  napkin_math: 'A: sort 4096 tokens = ~0.1 ms overhead. Saves 35% divergence penalty on 10 ms attention
    kernel = 3.5 ms. Net gain: 3.4 ms. B: zero sort overhead but potential 20% load imbalance. C: all
    warps run longest path → 40 cycle × all warps, wastes 25% compute on padding.'
