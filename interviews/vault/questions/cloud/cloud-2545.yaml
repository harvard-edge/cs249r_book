title: Cloud Warp Divergence L5 0
scenario: 'To fix warp divergence in a sparse attention kernel, your team proposes: (A) sort tokens by attention pattern before the kernel, (B) use thread-block-level branching instead of thread-level, (C) pad all paths to equal length.'
question: How would you evaluate sorting tokens, block-level branching, and padding as fixes for warp divergence in the sparse attention kernel?
details:
  realistic_solution: 'Option A (pre-sort): groups tokens with same attention pattern into contiguous warps, eliminating divergence. Overhead: O(n log n) sort on CPU/GPU. For large batch sizes, sort cost is amortized and this is the best approach. Used by MegaBlocks for MoE. Option B (block-level branching): each thread block handles one pattern type. Eliminates warp divergence but may cause load imbalance between blocks (some patterns have more tokens). Need dynamic scheduling. Option C (padding): executes all code paths even when unnecessary — no divergence but wastes compute on padding. Worst option for sparse patterns where most paths are short. Best: A for batch inference (sort is cheap relative to compute), B for real-time (avoids sort latency).'
  common_mistake: |
    **The Pitfall:** Choosing padding because it is the simplest to implement.
    **The Rationale:** Candidates assume padding is "free" without realizing it converts a divergence problem into a pure compute waste problem.
    **The Consequence:** Severe compute underutilization, especially when short and long execution paths differ significantly in cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A (Sort): ~0.1 ms overhead for 4096 tokens, saves 35% divergence on a 10 ms kernel (3.5 ms).
    - Option B (Block-level): Zero sort overhead but potential 20% load imbalance.
    - Option C (Padding): Wastes ~18.75% of compute cycles.

    **Calculations:**
    - Option A Net Gain: 3.5 ms saved - 0.1 ms overhead = +3.4 ms.

    **Conclusion & Interpretation:**
    - **Result: Architectural Tradeoff.** Option A is best for batch inference (amortized sort cost), Option B is best for real-time (no sort latency). Option C is the worst.
