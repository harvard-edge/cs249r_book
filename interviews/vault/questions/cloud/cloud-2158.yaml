title: The Pre-Training Cost Estimate
scenario: Your VP asks for a cost estimate to pre-train a 70B model on 2T tokens. You have access to instances at $3/GPU-hour on a cloud provider.
question: "What is a realistic cost estimate to pre-train a 70B model on 2T tokens at $3/GPU-hour, including failure overhead?"
details:
  realistic_solution: 'From the training time estimation: ~48 days on 512 GPUs at 40% MFU. Raw cost: 589,824 GPU-hours × $3 = $1.77M. But real training overhead requires a 1.25-1.35× multiplier for failures, evaluations, and tuning. Realistic budget: $1.77M × 1.3 = $2.3M.'
  common_mistake: |
    **The Pitfall:** Computing raw GPU-hours from FLOPS alone and presenting it as the final cost.
    **The Rationale:** Candidates treat production training as a 100% efficient, frictionless process, ignoring hardware failures, checkpointing, and tuning overheads.
    **The Consequence:** Massively under-budgeting the project by millions of dollars, resulting in halted training runs and missed deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ~48 days on 512 GPUs at 40% MFU.
       - $3/GPU-hour.
    2. **Calculations:**
       - GPU-hours = 512 GPUs * 48 days * 24 hours = 589,824 GPU-hours.
       - Raw compute cost = 590K * $3 = $1.77M.
       - Real-world overhead multiplier (failures, evaluations, HP tuning, restarts) = 1.3x.
       - Realistic budget = $1.77M * 1.3 = $2.3M.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound**. Total project cost (with storage, engineering) ≈ $3M.
