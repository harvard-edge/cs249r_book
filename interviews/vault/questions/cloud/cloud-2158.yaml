title: The Pre-Training Cost Estimate
scenario: Your VP asks for a cost estimate to pre-train a 70B model on 2T tokens. You have access to H100
  instances at $3/GPU-hour on a cloud provider. Estimate the total training cost, including a realistic
  buffer for failures and restarts.
details:
  realistic_solution: 'From the training time estimation: ~48 days on 512 H100s at 40% MFU. GPU-hours
    = 512 GPUs × 48 days × 24 hours = 589,824 GPU-hours. Raw cost: 589,824 × $3 = $1.77M. But real training
    overhead: (1) Hardware failures require rollback to checkpoint (~5-10% wasted compute), (2) Evaluation
    runs consume ~5% of GPU-hours, (3) Hyperparameter tuning at smaller scale: ~10% of main run budget,
    (4) Initial failed runs that diverge: ~5-10%. Total multiplier: 1.25-1.35×. Realistic budget: $1.77M
    × 1.3 = $2.3M. Plus storage, networking, engineering time: total project cost ~$3-4M.'
  common_mistake: Computing raw GPU-hours from FLOPS alone and presenting it as the final number. Production
    training runs are never 100% efficient — failures, restarts, evaluation, hyperparameter tuning, and
    checkpoint I/O all add overhead.
  napkin_math: 'GPU-hours: 512 × 48 × 24 = 589,824 | Raw compute cost: 590K × $3 = $1.77M | Failure overhead
    (1.3×): $2.3M | Storage (checkpoints, data): ~$100K | Engineering (6 months, 3 engineers): ~$600K
    | Total project: ~$3M'
