title: The Pre-Training Cost Estimate
scenario: Your VP asks for a cost estimate to pre-train a 70B model on 2T tokens. You have access to H100 instances at $3/GPU-hour on a cloud provider.
question: "What is a realistic cost estimate to pre-train a 70B model on 2T tokens with H100s at $3/GPU-hour, including failure overhead?"
details:
  realistic_solution: 'From the training time estimation: ~48 days on 512 H100s at 40% MFU. GPU-hours = 512 GPUs × 48 days × 24 hours = 589,824 GPU-hours. Raw cost: 589,824 × $3 = $1.77M. But real training overhead: (1) Hardware failures require rollback to checkpoint (~5-10% wasted compute), (2) Evaluation runs consume ~5% of GPU-hours, (3) Hyperparameter tuning at smaller scale: ~10% of main run budget, (4) Initial failed runs that diverge: ~5-10%. Total multiplier: 1.25-1.35×. Realistic budget: $1.77M × 1.3 = $2.3M. Plus storage, networking, engineering time: total project cost ~$3-4M.'
  common_mistake: |
    **The Pitfall:** Computing raw GPU-hours from FLOPS alone and presenting it as the final cost.
    **The Rationale:** Candidates treat production training as a 100% efficient, frictionless process, ignoring hardware failures, checkpointing, and tuning overheads.
    **The Consequence:** Massively under-budgeting the project by millions of dollars, resulting in halted training runs and missed deadlines.
  napkin_math: |
    - Training time: ~48 days on 512 H100s at 40% MFU.
    - GPU-hours = 512 GPUs × 48 days × 24 hours = 589,824 GPU-hours.
    - Raw compute cost = 590K × $3 = $1.77M.
    - Real-world overhead multiplier (failures, evaluations, HP tuning, restarts) = 1.3x.
    - Realistic budget = $1.77M × 1.3 = **$2.3M**.
    - **Total project cost (with storage, engineering) ≈ $3M.**
