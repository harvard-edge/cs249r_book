title: Counterfactual Fairness in Causal Feature Spaces
scenario: 'A hiring model uses features: years_experience, job_title_history, education_institution, and zip_code. A fairness audit finds demographic parity holds (hiring rate gap < 2% by race) but a causality researcher claims the model is causally unfair because zip_code and education_institution are proxies for race that encode historical discrimination.'
question: 'How would you evaluate counterfactual fairness for proxy features like zip_code and education_institution, and what would it cost?'
details:
  realistic_solution: 'Counterfactual fairness requires: (1) Build a causal DAG with nodes for Race -> {zip_code, institution} -> {years_experience} -> Hiring_decision. (2) Use path-specific counterfactual analysis. (3) Decompose each feature into a fair residual using a learned nuisance model. (4) Retrain the hiring model using only fair residuals. Evaluation: run counterfactual inference — flip applicant''s race in the causal model, propagate through DAG, compare predicted hiring rate. Cost: requires labeled demographic data, additional 200-400 GPU-hours for causal decomposition.'
  common_mistake: |
    **The Pitfall:** Naively removing correlated proxy features without causal reasoning.
    **The Rationale:** Candidates assume dropping features like zip_code creates fairness, ignoring that this can introduce omitted variable bias or destroy valid signal.
    **The Consequence:** Creating a model that is neither accurate nor truly counterfactually fair.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nuisance Model: Logistic regression for P(zip|race) takes minutes on CPU.
    - Counterfactual Evaluation: For N=10K test applicants, run 2 inferences.

    **Calculations:**
    - Residual Computation: 10M records * 4 features * 1 pass = 40M FLOPs.
    - Compute Cost: If model is 100M params: 2 * 10,000 * 200M FLOPs = 4 TFLOPs (~1 second on GPU).

    **Conclusion & Interpretation:**
    - **Result: 4 TFLOPs (Compute-Bound)**. The primary cost is causal DAG validation and legal review, not the negligible compute overhead.
