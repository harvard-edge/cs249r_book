title: Evaluating PFC Thresholds in 400G RoCEv2
scenario: You are architecting the backend network for a 16,384 H100 GPU cluster using a 400Gbps RoCEv2
  Ethernet fabric to train a 1T parameter MoE model. During heavy All-to-All communication phases, you
  observe severe latency spikes and intermittent job hangs. A network engineer proposes lowering the Priority
  Flow Control (PFC) generation watermark (XOFF threshold) on the ToR switches from 50% to 10% of the
  per-port buffer to guarantee zero packet drops and eliminate RoCE Go-Back-N retransmissions. Evaluate
  the systemic tradeoffs of this proposal.
details:
  realistic_solution: Reject the proposal. Lowering the XOFF threshold triggers premature pause frames,
    which propagate upstream (congestion spreading) and stall innocent flows, drastically increasing tail
    latency. Instead, you should rely on end-to-end congestion control (like DCQCN) to pace flows, keeping
    PFC as a last-resort safety net with a carefully tuned XOFF threshold that leaves exactly enough headroom
    to absorb the bandwidth-delay product.
  common_mistake: Believing that more aggressive PFC strictly improves performance by eliminating all
    drops, while failing to account for PFC storms, congestion spreading (head-of-line blocking), and
    the resulting deadlocks that cause catastrophic cluster hangs.
  napkin_math: At 400 Gbps (50 GB/s), a 2 microsecond PFC response RTT means the Bandwidth-Delay Product
    (BDP) is 50 GB/s * 2µs = 100 KB. To prevent drops after sending a PFC pause, the port needs at least
    100 KB of headroom. If a 32-port switch has a 16MB shared buffer (~500KB/port average), dropping the
    XOFF to 10% (50KB) triggers pauses constantly during normal microbursts, stalling 400G links prematurely
    and collapsing cluster throughput due to PFC spreading.
