title: Evaluating PFC Thresholds in 400G RoCEv2
scenario: You are architecting the backend network for a 16,384 H100 GPU cluster using a 400Gbps RoCEv2 Ethernet fabric to train a 1T parameter MoE model. During heavy All-to-All communication phases, you observe severe latency spikes and intermittent job hangs. A network engineer proposes lowering the Priority Flow Control (PFC) generation watermark (XOFF threshold) on the ToR switches from 50% to 10% of the per-port buffer to guarantee zero packet drops and eliminate RoCE Go-Back-N retransmissions.
question: "Should you lower the PFC XOFF watermark from 50% to 10%, and what systemic trade-offs does that create for RoCEv2 All-to-All traffic?"
details:
  realistic_solution: |
    Reject the proposal. Lowering the XOFF threshold triggers premature pause frames, which propagate upstream (congestion spreading) and stall innocent flows, drastically increasing tail latency. Instead, you should rely on end-to-end congestion control (like DCQCN) to pace flows, keeping PFC as a last-resort safety net with a carefully tuned XOFF threshold that leaves exactly enough headroom to absorb the bandwidth-delay product.
  common_mistake: |
    **The Pitfall:** Believing that more aggressive PFC strictly improves performance by eliminating all drops.
    **The Rationale:** Candidates focus only on avoiding drops, failing to account for PFC storms and congestion spreading (head-of-line blocking).
    **The Consequence:** This leads to deadlocks and premature pause frames, which stall innocent flows and cause catastrophic cluster throughput collapse.
  napkin_math: |
    - **Bandwidth-Delay Product (BDP):** 400 Gbps (50 GB/s) with a 2 μs PFC response RTT = 50 GB/s * 2μs = **100 KB**.
    - **Required Headroom:** Port needs at least 100 KB to prevent drops after sending a PFC pause.
    - **Buffer Allocation:** A 32-port switch with a 16MB shared buffer averages ~500KB/port.
    - **Impact of 10% XOFF:** Dropping the threshold to 10% (50KB) leaves inadequate active buffer space, triggering constant pauses during normal microbursts and collapsing throughput.
