title: The P99 Latency Spike
scenario: You are the on-call engineer for a new LLM-based chatbot service. The service uses a simple static batching strategy with a batch size of 32 and a fixed 100ms timeout to collect requests. During a load test, you observe that while average Time to First Token (TTFT) is acceptable at ~120ms, the P99 TTFT spikes to over 500ms. `nvidia-smi` shows the GPU is consistently busy.
question: What is the most likely cause of the P99 TTFT spikes above 500ms despite a busy GPU?
details:
  realistic_solution: 'The most likely cause is head-of-line blocking exacerbated by the static batching policy. A request arriving just after a batch is dispatched must wait for the 100ms timeout, plus the full batch processing time. Implement continuous batching (iteration-level scheduling) to dynamically add requests.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware and scaling up compute.
    **The Rationale:** High tail latency under load is frequently misattributed to a lack of raw compute power or memory bandwidth.
    **The Consequence:** Unnecessary spending on more powerful GPUs without resolving the underlying scheduling and head-of-line blocking problem.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Static Batching Constraint: New requests cannot join an actively processing batch.
       - Active Processing Time: Assume a batch generates tokens for 700ms.
    2. **Calculations:**
       - Worst-case Queue Wait: 700ms (processing) + 100ms (timeout) = 800ms.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduling-Bound.** Head-of-line blocking perfectly explains the massive P99 TTFT spikes.
