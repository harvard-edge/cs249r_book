title: LLM Layered Defense Trade-offs
scenario: 'You are deploying a Llama-3 70B banking assistant on an 8x H100 node. Security mandates protection against prompt injection, PII leakage, and memory scraping. The P99 Time-to-First-Token (TTFT) budget is 400ms. You evaluate a layered defense architecture: NVIDIA Hopper Confidential Computing (adds 20ms to TTFT and reduces throughput by 15%), an 8B guardrail model for input/output filtering, and strict VPC boundaries. An engineer suggests running the 8B guardrail (taking 16GB VRAM) on the same 8x H100s to avoid network latency, rather than offloading it to a separate L4 node.'
question: Should the 8B guardrail run on the H100s or an L4 node, considering TTFT and H100 KV-cache utilization?
details:
  realistic_solution: Offload the 8B guardrail to the L4 node. The network hop adds minimal latency (~5ms), and the L4 can process the guardrail in ~50ms, keeping total TTFT safely under the 400ms budget. This preserves 16GB of H100 VRAM, enabling larger batch sizes to offset the Confidential Computing throughput penalty.
  common_mistake: |
    **The Pitfall:** Assuming co-locating the guardrail on the H100s is optimal for latency.
    **The Rationale:** Engineers prioritize minimizing network hops, assuming the local compute is always preferable to adding a network transfer.
    **The Consequence:** Sacrificing 16GB of H100 VRAM severely reduces KV cache capacity, which degrades the maximum batch size and throughput of the primary 70B model.
  napkin_math: |
    - **70B TTFT**: ~150ms.
    - **CC Overhead**: 20ms.
    - **L4 Guardrail Latency**: 50ms compute + 5ms network = 55ms.
    - **Total TTFT**: 150 + 20 + 55 = 225ms (well under the 400ms budget).
    - **VRAM Savings**: Offloading saves 16GB VRAM on the H100s.
    - **Throughput Gain**: Assuming 1GB/seq KV cache, 16GB allows +16 batch size. For a base batch of 128, this is a **12.5% increase**, largely offsetting the 15% CC throughput penalty.
