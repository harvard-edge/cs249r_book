title: Real-time Feature Freshness and Throughput for A100 Inference
scenario: You are designing a real-time recommendation system that serves billions of requests daily. The inference models are deployed on a cluster of NVIDIA A100 GPUs. For optimal recommendation quality, features must be as fresh as possible, ideally within 500ms of an event occurring. Your system generates a new set of 256 features (each feature is a 32-bit float) for each user interaction, which needs to be available in the online feature store within the freshness SLA. The A100-powered models can process a batch of 1024 requests in 5ms if features are readily available in GPU memory.
question: How would you design the A100 recommendation feature pipeline to keep features fresh within 500 ms and point-in-time correct?
details:
  realistic_solution: 'Implement a two-tier feature store architecture: an ultra-low-latency online store (e.g., Redis, Cassandra, DynamoDB) for real-time serving and a robust offline store (e.g., Snowflake, BigQuery, Apache Hudi) for training, backfilling, and batch processing. Utilize stream processing frameworks (e.g., Apache Flink, Spark Streaming, Kafka Streams) for real-time feature computation and ingestion into the online store, employing a push-based mechanism for minimal latency. Ensure versioning and accurate timestamps are used for point-in-time correctness, allowing for historical feature retrieval consistent with training data. Leverage distributed caching mechanisms and pre-fetching strategies to keep hot features in memory or close to the A100 GPUs, minimizing data transfer overheads and maximizing the utilization of the A100''s 2.0 TB/s memory bandwidth for model inference. Implement robust monitoring and alerting for feature freshness and data pipeline health.'
  common_mistake: |
    **The Pitfall:** Underestimating the latency introduced by feature computation and retrieval from the online store.
    **The Rationale:** Engineers often focus entirely on optimizing the A100 inference speed.
    **The Consequence:** Causing the feature pipeline to become the true bottleneck, starving the GPUs and failing the 500ms freshness SLA.
  napkin_math: |
    1. Feature vector size: 256 * 4 bytes = 1 KB.
    2. Batch size: 1024 requests * 1 KB = 1 MB.
    3. To sustain one batch every 5ms, required throughput is 1 MB / 0.005s = 200 MB/s per A100.
    4. **Latency budget: Total SLA (500ms) - computation (400ms) - inference (5ms) = 95ms maximum allowable latency for the online feature store.**
