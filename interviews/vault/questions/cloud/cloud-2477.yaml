title: The Edge Gateway Batching Paradox
scenario: A cloud configures a factory edge gateway to process 10 RTSP camera streams (1080p, 30fps). The edge GPU processes batch=1 in 15ms, or batch=8 in 20ms. To maximize throughput and prevent queue buildup, the pipeline is configured with a strict batch size of 8. However, the end-to-end latency (camera capture to cloud notification) is consistently ~90ms, failing the strict 60ms factory safety SLA.
question: Why does strict batch size 8 fail the 60ms safety SLA despite higher GPU throughput, and what batching policy should you use?
details:
  realistic_solution: Dynamic batching introduces 'formation latency' (the time spent waiting to collect enough requests to fill the batch). Because the cameras stream at a fixed 30fps, frames arrive at a deterministic rate. Waiting to collect 8 frames takes longer than the actual inference time. By forcing a batch size of 8, the system artificially holds the first frame of the batch for tens of milliseconds before inference even begins. For real-time edge multi-stream pipelines, small batch sizes or timeout-based dynamic batching are strictly required to meet SLAs.
  common_mistake: |
    **The Pitfall:** Blaming the network latency for the SLA violation.
    **The Rationale:** Engineers assume the network latency to the cloud is >80ms, making the 60ms SLA impossible regardless of edge processing.
    **The Consequence:** Teams waste time optimizing the network instead of fixing the edge batching logic.
  napkin_math: |
    1. **Frame arrival rate:** 10 cameras @ 30fps = 300 fps total.
    2. **Time per frame:** 1 frame arrives every 1000ms / 300 = 3.33ms.
    3. **Wait time for batch of 8:** The gateway must wait for 7 additional frames: 7 × 3.33ms = 23.3ms.
    4. **Total edge latency (batch=8):** 23.3ms (wait) + 20ms (inference) + 15ms (decode) = 58.3ms.
    5. **Total end-to-end latency (batch=8):** 58.3ms + 30ms (network) = 88.3ms (fails SLA).
    6. **Total end-to-end latency (batch=1):** 0ms (wait) + 15ms (inference) + 15ms (decode) + 30ms (network) = **60ms (meets SLA).**
