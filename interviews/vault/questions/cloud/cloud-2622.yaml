title: Memory Reduction Strategy Selection
scenario: 'A 7B model needs fine-tuning on a single A100-80GB. Full fine-tuning needs ~154GB. Option A:
  Gradient checkpointing (saves 60% activation memory, 30% slower). Option B: LoRA (r=16, trains only
  0.1% of params, may lose 1-2% accuracy). Option C: Use 2 GPUs with ZeRO Stage 3. Which approach and
  why?'
question: "Which approach and why?"
details:
  realistic_solution: 'The 154GB breaks down as: ~14GB weights + ~14GB gradients + ~84GB optimizer + ~42GB
    activations. Option A: Gradient checkpointing reduces activations from ~42GB to ~17GB. New total:
    14+14+84+17 = 129GB. Still exceeds 80GB. Option C: 2 GPUs with ZeRO-3 splits optimizer+gradients+weights,
    giving ~(14+14+84)/2 + 42 = 98GB/GPU — still OOM on 80GB without CPU offloading! Option B: LoRA with
    r=16 trains ~7M params. Optimizer states: 7M × 12 = 84MB. Gradients: 7M × 2 = 14MB. Total: 14GB weights
    + 0.1GB LoRA overhead + ~42GB activations = ~56GB. Fits on one GPU. Best choice if 1-2% accuracy trade-off
    is acceptable.'
  common_mistake: Assuming gradient checkpointing alone solves OOM. It only reduces activation memory,
    not optimizer states, which are often the dominant consumer.
  napkin_math: 'A: 129GB > 80GB (fails). B: ~56GB < 80GB (fits). C: ~77GB/GPU (works but 2x cost). LoRA
    wins for single-GPU.'
