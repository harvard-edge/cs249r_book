title: Real-time Observability for H100-powered ML Inference Service
scenario: You are leading the reliability engineering efforts for a critical, real-time ML inference service.
  This service is deployed on a cluster of NVIDIA H100 GPUs, each featuring 80 GB HBM3 memory, delivering
  989 TFLOPS FP16 dense compute, and boasting 3.35 TB/s memory bandwidth, with a power consumption up
  to 700W. The service experiences highly variable load patterns, from sustained high throughput to intermittent
  bursts. Design a comprehensive monitoring and observability strategy for this system. Detail how you
  would implement telemetry collection, alerting mechanisms, production health dashboards, track key reliability
  metrics like MTBF/MTTR, and specifically address the challenge of straggler detection within this high-performance
  GPU environment.
question: "How would you build telemetry, alerts, dashboards, MTBF/MTTR tracking, and straggler detection for the H100 inference cluster?"
details:
  realistic_solution: "A realistic solution involves a multi-tiered approach: \n1.  **Telemetry:** Implement\
    \ robust instrumentation for both infrastructure and application layers. For H100s, use NVIDIA DCGM\
    \ (Data Center GPU Manager) or NVML (NVIDIA Management Library) to collect detailed GPU metrics: utilization,\
    \ memory usage (HBM3), temperature, power draw (700W), and PCIe bandwidth. For the application, instrument\
    \ the inference service to emit custom metrics for request latency (p99, p99.9), throughput, error\
    \ rates, model-specific metrics (e.g., inference correctness, data drift), and internal queue lengths.\
    \ Leverage distributed tracing (e.g., OpenTelemetry) to track individual requests across the H100\
    \ cluster and identify latency bottlenecks.\n2.  **Collection & Storage:** Use a high-performance\
    \ metrics pipeline (e.g., Prometheus with Cortex/Thanos for long-term storage) and a centralized logging\
    \ system (e.g., Elastic Stack, Loki, or a commercial solution) capable of handling the high data ingress\
    \ from hundreds of H100s.\n3.  **Alerting:** Define clear SLOs for latency, throughput, and error\
    \ rates. Configure alerts based on these SLIs, triggered by deviations from baselines or predefined\
    \ thresholds. Implement multi-severity alerts (warning, critical) and use anomaly detection to catch\
    \ subtle issues. For stragglers, trace data can identify requests exceeding a certain latency threshold\
    \ (e.g., 50ms) within specific GPU operations.\n4.  **Dashboards:** Create comprehensive Grafana dashboards.\
    \ Key views would include: system-wide health overview, per-H100 GPU performance statistics, model\
    \ inference performance trends, and a 'Reliability Scorecard' displaying MTBF (Mean Time Between Failures)\
    \ and MTTR (Mean Time To Recovery) calculated from incident management data. Visualizations should\
    \ highlight stragglers and their root causes (e.g., specific H100, particular model, or input data\
    \ characteristics)."
  common_mistake: A common mistake is to rely solely on generic infrastructure metrics (CPU, memory, basic
    network I/O) without deep application-level and GPU-specific telemetry. This leads to blind spots
    regarding model performance degradation, data quality issues, or subtle GPU resource contention. Another
    pitfall is building a monitoring system that cannot scale with the data volume generated by hundreds
    of H100s, leading to data loss or delayed alerts. Failing to establish clear Service Level Objectives
    (SLOs) and corresponding Service Level Indicators (SLIs) also makes it difficult to define effective
    alerts and measure reliability objectively. Furthermore, poor instrumentation for straggler detection
    often leads to reactive debugging rather than proactive identification of performance anomalies.
  napkin_math: Consider a large cluster of 500 NVIDIA H100 GPUs. If each GPU generates telemetry data
    at a rate of 2 MB/s (including metrics, logs, and trace spans), the total data ingestion rate for
    your monitoring system would be 500 GPUs * 2 MB/s/GPU = 1 GB/s. Over 24 hours, this equates to 1 GB/s
    * 3600 s/hour * 24 hours/day = 86,400 GB/day, or approximately 86.4 TB/day. Storing this data for
    30 days would require roughly 2.5 PB of storage. This scale necessitates a highly distributed and
    efficient monitoring backend. If your target p99 inference latency is 10ms, and a straggler is defined
    as any request taking over 50ms, your monitoring system must process metrics and traces with minimal
    added overhead, ideally within a few milliseconds, to enable real-time detection and response.
