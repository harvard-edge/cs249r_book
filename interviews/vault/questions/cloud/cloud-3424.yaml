title: Optimizing LLM Pipeline Parallelism on AMD MI300X with Micro-batching and Interleaving
scenario: You are tasked with deploying a large language model (LLM) consisting of 8 sequential layers onto a cluster of 8 AMD MI300X GPUs. You've opted for a pipeline parallel strategy, mapping one LLM layer to each GPU. Initially, you're processing requests with a global batch size of 1, leading to significant GPU underutilization due to 'pipeline bubbles'. To improve throughput, you're considering implementing micro-batching and an interleaved schedule (e.g., GPipe or PipeDream variant).
question: How do pipeline bubbles arise with 8 stages at batch size 1, and how would micro-batching and interleaving improve throughput?
details:
  realistic_solution: Implement an interleaved pipeline scheduling strategy (e.g., similar to GPipe or PipeDream) to overlap computation and communication, effectively hiding pipeline bubbles for continuous workloads. Dynamically adjust the micro-batch size based on profiling to find the sweet spot that maximizes the MI300X's 1,307 TFLOPS FP16 sparse compute utilization without saturating the 5.3 TB/s HBM3 memory bandwidth or exceeding the 192 GB HBM3 capacity per GPU. Furthermore, ensure balanced computational load across the 8 stages to prevent a single bottleneck.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of pipeline bubbles or choosing an arbitrary micro-batch size.
    **The Rationale:** Teams often implement basic pipeline parallelism without interleaving, failing to realize how much time GPUs spend idle waiting for prior stages.
    **The Consequence:** This leads to severe GPU underutilization or, if micro-batch size is chosen poorly, excessive memory pressure that saturates bandwidth without improving throughput.
  napkin_math: |
    - **Naive Pipeline:** For P=8 stages and M micro-batches, the time to process a continuous stream is roughly `(P + M - 1) * t`.
    - **Naive Throughput:** `M / ((P + M - 1) * t)` micro-batches per unit time.
    - **Interleaved Pipeline:** Once filled, a micro-batch completes every `t` time units.
    - **Interleaved Throughput:** Approaches `1 / t` micro-batches per unit time.
    - **Improvement Factor:** `(1 / t) / (M / ((P + M - 1) * t)) = (P + M - 1) / M`.
    - **Example Calculation:** If M=4, the improvement is `(8 + 4 - 1) / 4 = 11 / 4 = 2.75`.
    - **Conclusion:** Interleaved scheduling provides a **2.75&times; throughput boost** by reducing idle pipeline bubble time.
