title: Evaluating Static Batching Limits Under Variable Load
scenario: 'You are designing an inference pipeline. The model takes 20ms to process a static batch of 64 requests. The upstream client produces requests at a highly variable rate: 4,000 req/sec during peak hours, and 100 req/sec during off-peak hours. The strict system SLA dictates a maximum end-to-end latency of 150ms.'
question: Is purely static batching viable for this workload, and why?
details:
  realistic_solution: Pure static batching is architecturally unviable for this workload. To meet the off-peak 150ms SLA, the maximum wait time is 130ms, forcing a maximum static batch size of 13. Drastically reducing the batch size lowers arithmetic intensity and GPU utilization, meaning the system cannot achieve the 4,000 req/sec peak throughput. A continuous or dynamic batching approach is mandatory.
  common_mistake: |
    **The Pitfall:** Analyzing only the peak load or calculating average latency instead of worst-case SLA bounds.
    **The Rationale:** Engineers often size systems for peak throughput without verifying if off-peak traffic volumes can fill static batches fast enough to beat timeout limits.
    **The Consequence:** The system either violates strict latency SLAs during low-traffic periods or drops its batch size so drastically that it cannot handle peak load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Load: 4000 req/s. Off-Peak: 100 req/s.
       - SLA: 150ms max latency.
       - Compute time: 20ms for BS=64.
    2. **Calculations:**
       - Peak wait: 64 / 4 = 16ms. Total = 36ms (Passes SLA).
       - Off-Peak wait: 64 / 0.1 = 640ms. Total = 660ms (Fails SLA).
       - SLA Constraint: Max wait = 150ms - 20ms = 130ms.
       - Max viable static batch: 130ms * 0.1 req/ms = 13 requests.
    3. **Conclusion & Interpretation:**
       - **Result: Static batching is unviable as BS=13 bottlenecks throughput.** (Latency-Bound)
