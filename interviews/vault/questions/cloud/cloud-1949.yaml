title: Evaluating Static Batching Limits Under Variable Load
scenario: You are designing an inference pipeline on an NVIDIA A100 GPU. The model takes 20ms to process a static batch of 64 requests. The upstream client produces requests at a highly variable rate: 4,000 req/sec during peak hours, and 100 req/sec during off-peak hours. The strict system SLA dictates a maximum end-to-end latency of 150ms.
question: Is purely static batching viable for this workload, and why?
details:
  realistic_solution: Pure static batching is architecturally unviable for this workload. To meet the off-peak 150ms SLA, the maximum wait time is 130ms, forcing a maximum static batch size of 13. However, drastically reducing the batch size from 64 to 13 lowers the arithmetic intensity and overall GPU utilization, meaning the system will physically be unable to achieve the 4,000 req/sec throughput required during peak hours. A dynamic batching approach (e.g., Triton's Dynamic Batcher) with a strict latency timeout is mandatory.
  common_mistake: |
    **The Pitfall:** Analyzing only the peak load or calculating average latency instead of worst-case SLA bounds.
    **The Rationale:** Engineers often size systems for peak throughput without verifying if off-peak traffic volumes can fill static batches fast enough to beat timeout limits.
    **The Consequence:** The system either violates strict latency SLAs during low-traffic periods or drops its batch size so drastically that it cannot handle peak load.
  napkin_math: |
    - **Peak Load (4000 req/s):** Time to fill BS=64 is $64 / 4\text{ req/ms} = 16\text{ms}$. Total latency = $16 + 20 = 36\text{ms}$ (Passes 150ms SLA).
    - **Off-Peak Load (100 req/s):** Time to fill BS=64 is $64 / 0.1\text{ req/ms} = 640\text{ms}$. Total latency = $640 + 20 = 660\text{ms}$ (Fails 150ms SLA).
    - **SLA Constraint:** Max wait time allowed = $150\text{ms} - 20\text{ms} = 130\text{ms}$.
    - **Max Viable Static Batch Size:** $130\text{ms} \times 0.1\text{ req/ms} = 13\text{ requests}$.
    - **Conclusion:** A batch size of 13 reduces throughput to at most $1300\text{ req/s}$ (assuming optimistic 10ms compute), making it **impossible to handle the 4000 req/s peak load** with static batching.
