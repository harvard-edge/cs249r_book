title: Carbon Footprint Calculation for GPU Clusters
scenario: >-
  You are deploying a cluster of 1,024 H100 GPUs in a region powered largely by renewable energy,
  with a grid carbon intensity of 50 g CO2e/kWh. Each GPU and its proportional share of the server chassis
  consumes 1.0 kW of continuous power and has an embodied carbon footprint of 2,500 kg CO2e. The datacenter
  operates at a PUE of 1.2. Assume 100% utilization over a 3-year hardware lifecycle.
question: >-
  What is the 3-year lifecycle carbon footprint for the 1,024-GPU cluster, and what percentage is embodied carbon?
details:
  realistic_solution: 'Calculate the total carbon by summing operational emissions and hardware manufacturing emissions. In a green grid, embodied carbon becomes the dominant factor, often exceeding operational carbon over a 3-year hardware refresh cycle.'
  common_mistake: |
    **The Pitfall:** Focusing solely on operational carbon.
    **The Rationale:** Candidates assume running on renewable energy makes the cluster "zero carbon", completely ignoring the massive manufacturing emissions of the hardware.
    **The Consequence:** Drastically underreporting the true carbon footprint of AI infrastructure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,024 H100 GPUs at 1.0 kW continuous power each.
    - PUE is 1.2, grid intensity is 50 g CO2e/kWh.
    - Embodied carbon is 2,500 kg CO2e per GPU.
    - 3-year lifecycle at 100% utilization (8,760 hours/year).

    **Calculations:**
    - Embodied Carbon = 1,024 × 2,500 kg = 2,560,000 kg (2,560 tCO2e).
    - Operational Energy = 1,024 kW × 1.2 PUE × 8,760 hours/yr × 3 yrs = 32,292,864 kWh.
    - Operational Carbon = 32,292,864 kWh × 0.05 kg/kWh = 1,614,643 kg (~1,615 tCO2e).
    - Total Footprint = 2,560 + 1,615 = 4,175 tCO2e.
    - Embodied Percentage = 2,560 / 4,175

    **Conclusion & Interpretation:**
    - **Result: 4,175 tCO2e (Sustainability-Bound)**. Approximately 61.3% is embodied carbon, dominating the total footprint in green grids.
