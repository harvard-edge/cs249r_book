title: NVIDIA H100 Multi-tenancy with MIG for Resource Sharing
scenario: A data science team is deploying various deep learning models for training and inference on a cluster equipped with NVIDIA H100 GPUs. Multiple users and services need to share these powerful resources concurrently.
question: How does MIG on an NVIDIA H100 enable multi-tenant GPU sharing, and what resource guarantees and isolation does each instance provide?
details:
  realistic_solution: The NVIDIA H100's MIG capability allows a single GPU to be securely partitioned into up to seven fully independent GPU instances (e.g., 7x 10GB MIG instances). Each MIG instance has dedicated, isolated resources including streaming multiprocessors (SMs), GPU engines (copy engines, decoders), L2 cache, and a portion of the HBM3 memory. This hardware-level partitioning ensures quality of service (QoS), fault isolation, and predictable performance for each tenant. Workloads can be scheduled directly onto these specific MIG devices, similar to scheduling on discrete GPUs, facilitating robust multi-tenancy.
  common_mistake: |
    **The Pitfall:** Assuming software-level virtualization provides the same isolation as hardware MIG.
    **The Rationale:** Candidates confuse process isolation with strict hardware-level partitioning of memory bandwidth and SMs.
    **The Consequence:** Unpredictable latency and performance contention for co-located workloads.
  napkin_math: |
    - 1. Divide H100 capacity (80 GB, 989 TFLOPS): 7 instances = ~10 GB HBM3 each.
    - 2. Divide compute capacity: 989 TFLOPS / 7 = ~141 TFLOPS per instance.
    - 3. Divide power budget: 700W / 7 = ~100W per instance.
    - 4. Conclusion: Each MIG instance receives a **physically isolated 1/7th slice of compute, memory bandwidth, and power**, eliminating noisy neighbor effects.
