title: Distributed Training Throughput for 100TB Embedding Cluster
scenario: A social platform needs to train a recommendation model with 100TB of embedding tables on 1024 GPUs. The system must complete a full epoch (1T training samples) in under 24 hours.
question: How would you design the distributed training architecture and verify whether 1024 GPUs can process 1T samples in under 24 hours?
details:
  realistic_solution: 'Architecture: (1) Embedding tables: 100TB distributed across 1000 CPU parameter servers, each with 100GB HDD + 64GB DRAM cache. Hot rows (top 1%) in DRAM: 1TB total. (2) Dense compute: 1024 H100s for MLP forward/backward. 2-stage pipeline: stage 1 embedding lookup (CPU PS), stage 2 dense compute (H100). (3) Batch size: 64K samples per global batch. Per H100: 64K/1024 = 62.5 samples. (4) Step time budget: 1T samples / 24hr = 11.6M samples/sec throughput. At batch=64K: 181 steps/sec = 5.5ms per step. (5) Embedding lookup time: 62.5 samples * 200 lookups = 12.5K lookups per GPU per step. At 100us per lookup (CPU PS): 1.25 seconds per step — way over budget. Fix: async prefetch 2 steps ahead. Effective hidden latency. Pre-shard hot items to GPU: 1% of 100TB = 1TB on GPU (10TB total HBM across 1024 GPUs if 10GB/GPU — too much). Use layered caching: DRAM on PS nodes. (6) Realistic throughput: with optimized FBGEMM + async all-to-all + overlapped compute: industry RecSys at this scale achieves 1T samples in 24hr with ~2048 GPUs at Meta/Google scale. 1024 GPUs may need 48hr.'
  common_mistake: |
    **The Pitfall:** Treating the problem as a pure compute problem and calculating TFLOPS required.
    **The Rationale:** Standard LLM training is compute-heavy, so candidates apply the same logic to DLRMs.
    **The Consequence:** Failing to realize that recommendation model training is embedding-lookup-dominated, bottlenecked entirely by table I/O rather than matrix multiply compute.
  napkin_math: |
    - **Dense Compute**: 1T samples × 18M FLOP/sample (3M params × 6) = 18 EFLOP.
    - **GPU Throughput**: 1024 H100s at 989 TFLOPS × 50% MFU ≈ 507 TFLOPS/GPU = 519 PFLOPS total.
    - **Compute Time**: 18 EFLOP / 519 PFLOPS = 34.7 seconds for dense compute alone.
    - **Step Time Budget**: 1T samples / 24hr = 11.6M samples/sec. At batch=64K, this is 181 steps/sec (5.5ms per step).
    - **Realistic Bottleneck**: With 1024 GPUs, all-to-all communication overhead causes a 3-5x slowdown. Realistic compute is 100-175 seconds. The true bottleneck is **CPU PS lookup speed**, making 24 hours extremely difficult without >2048 GPUs or aggressive async prefetching.
