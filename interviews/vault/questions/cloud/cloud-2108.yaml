title: MoE Inference Memory Efficiency Problem
scenario: Your 128-expert MoE model has 800B total parameters but only 12B active per token (top-2 of 128). During inference, all 800B parameters (1.6 TB in BF16) must reside in GPU HBM, but at any given moment only 1.5% of weights are 'hot.' This means 98.5% of your $400K GPU investment is storing cold weights.
question: How would you improve HBM memory utilization for the 128-expert 800B MoE without degrading inference latency?
details:
  realistic_solution: 'Speculative expert caching: (1) Pre-routing prediction: Use the gating network''s output from the current token to predict which experts the NEXT token will need. Pre-fetch those experts. (2) Expert popularity caching: Maintain a frequency-based cache in GPU HBM. Keep the top-K most frequently accessed experts always resident (this covers 60-70% of requests due to Zipfian popularity). (3) Expert fusion: At inference time, merge multiple experts into a single larger expert using weighted averaging based on routing scores. (4) Expert quantization: Quantize cold experts more aggressively (INT4) while keeping hot experts at BF16/FP8. (5) Disaggregated architecture: separate routing GPUs from expert compute GPUs. Route tokens to the physical GPU that already holds the needed expert, improving effective memory utilization from 1.5% to 30-40%.'
  common_mistake: |
    **The Pitfall:** Suggesting straightforward CPU offloading for the cold experts.
    
    **The Rationale:** CPU offloading is a standard technique for memory-constrained training, leading engineers to incorrectly assume it applies perfectly to real-time generative inference.
    
    **The Consequence:** The PCIe roundtrip latency (~10-50µs per expert) absolutely destroys token generation latency, making the model practically unusable for real-time serving.
  napkin_math: |
    - **Total Size**: 128 experts × 6.25B params × 2B = 1.6 TB total.
    - **Utilization**: Top-2 routing means 2/128 = 1.56% active parameters per token.
    - **Zipfian Optimization**: Top-16 experts cover ~60% of routes. 16 × 12.5 GB = 200 GB (Fits on 3× H100).
    - **Quantization Optimization**: Remaining 112 experts at INT4 = 350 GB (Fits on 5× H100).
    - **Result**: Requires **8× H100** vs 20× H100 for full BF16 — resulting in a **2.5× cost reduction**.
