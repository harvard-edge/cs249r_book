title: 'Transformer Cost Optimization: Reduce Inference Cost 5x via Speculative Decoding'
scenario: A 70B LLM serving on H100 (80GB HBM3, 3.35TB/s) in INT4 (35GB) generates 100 tokens/request at 10.45ms/token (memory-bound). You deploy speculative decoding with a 7B draft model. The draft generates 4 tokens speculatively (acceptance rate α=0.8).
question: "What speedup, cost reduction, and memory overhead does speculative decoding with a 7B draft model provide for the 70B INT4 service?"
details:
  realistic_solution: 'Baseline: 100 tokens at 10.45ms/token = 1045ms/request. Speculative: draft 7B INT4 generates 4 tokens at cost = 3.5GB/3350GB/s=1.045ms per draft token. 4 draft tokens: 4.18ms. Verify with 70B: parallel verification = 1 full 70B step = 35GB/3350GB/s=10.45ms. Expected accepted tokens per verify step: (1-0.8^5)/(1-0.8) = 3.36 tokens. Time per token: (4.18+10.45)/3.36 = 4.35ms/token. Speedup = (verify_only) / (draft+verify_per_tok) = 10.45/4.35 = 2.40x. Cost: 2.40x fewer GPU seconds. But 7B adds overhead: memory for 7B INT4 = 3.5GB. 70B INT4 = 35GB. Both fit in 80GB H100.'
  common_mistake: |
    **The Pitfall:** Calculating speedup incorrectly by directly dividing step time by acceptance rate.
    **The Rationale:** Forgetting to account for the time taken by the full 70B model to verify the draft tokens.
    **The Consequence:** Drastically overestimating the performance gains of speculative decoding.
  napkin_math: |
    1. Baseline: 10.45ms/tok.
    2. 7B draft generation: 3.5GB / 3350GB/s = 1.045ms/tok. 4 draft tokens = 4.18ms.
    3. Verify (70B): 35GB / 3350GB/s = 10.45ms per verify step.
    4. Total time per round: 10.45ms + 4.18ms = 14.63ms.
    5. Expected accepted tokens (α=0.8, k=4): (1-0.8^5)/0.2 = 3.36 tokens.
    6. Effective time: 14.63 / 3.36 = 4.35ms/token.
    7. Speedup: 10.45 / 4.35 = **2.40x**.
