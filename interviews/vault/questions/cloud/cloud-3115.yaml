title: 'Transformer Cost Optimization: Reduce Inference Cost 5x via Speculative Decoding'
scenario: 'A 70B LLM serving on H100 (80GB HBM3, 3.35TB/s) in INT4 (35GB) generates 100 tokens/request at 10.45ms/token (memory-bound). Deploy speculative decoding with a 7B draft model. Draft generates 4 tokens speculatively (acceptance rate α=0.8). Quantify the speedup, cost reduction, and memory overhead of adding the 7B draft model.'
question: What speedup, cost reduction, and memory overhead does speculative decoding with a 7B draft model provide for the 70B INT4 service?
details:
  realistic_solution: 'Baseline: 100 tokens at 10.45ms/token = 1045ms/request. Speculative: draft 7B INT4 generates 4 tokens at cost = 3.5GB/3350GB/s=1.045ms per draft token. 4 draft tokens: 4.18ms. Verify with 70B: parallel verification = 1 full 70B step = 35GB/3350GB/s=10.45ms. Expected accepted tokens per verify step: (1-0.8^5)/(1-0.8) = 3.36 tokens. Time per token: (4.18+10.45)/3.36 = 4.35ms/token. Speedup = (verify_only) / (draft+verify_per_tok) = 10.45/4.35 = 2.40x. Cost: 2.40x fewer GPU seconds. But 7B adds overhead: memory for 7B INT4 = 3.5GB. 70B INT4 = 35GB. Both fit in 80GB H100.'
  common_mistake: 'Calculating speedup incorrectly by dividing tokens_per_step by acceptance_rate without accounting for the verification step that runs the full 70B model to check all 4 draft tokens simultaneously.'
  napkin_math: 'Baseline: 10.45ms/tok. 7B draft: 3.5GB/3350=1.045ms/tok. Verify (70B): 35GB/3350=10.45ms per verify step + draft 4*1.045=4.18ms = 14.63ms total per speculation round. Accepted: 3.36 tokens (α=0.8, k=4). Effective ms/token: 14.63/3.36=4.35ms. Speedup: 10.45/4.35=2.40x. Cost reduction: 2.40x fewer GPU seconds. Revenue/cost: if current $0.001/req at 1045ms, new: $0.001/2.40=$0.00041/req. Better: α=0.9 with specialized draft. At α=0.9, k=4: accepted=(1-0.9^5)/0.1=4.095 tokens. Speedup: 14.63/4.095=3.57ms/tok. Speedup=10.45/3.57=2.92x.'
