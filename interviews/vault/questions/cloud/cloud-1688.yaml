title: Pipeline Bubble Fraction Calculation
scenario: You are configuring a 1D Pipeline Parallel (PP) training run for a large language model across 8 GPUs using the GPipe schedule (1 stage per GPU, p=8). Your microbatch size is fixed to 4 due to activation memory constraints. You need to ensure that the pipeline bubble overhead is exactly 10% or less of the total step time.
question: "What minimum global batch size gives 10% or lower GPipe bubble overhead with p=8 and microbatch size 4?"
details:
  realistic_solution: The GPipe pipeline bubble fraction is calculated as (p - 1) / m, where p is the number of stages and m is the number of microbatches. To keep the bubble under 10% with 8 stages, we need 70 microbatches, leading to a global batch size of 280.
  common_mistake: |
    **The Pitfall:** Calculating the number of microbatches but forgetting to multiply by the microbatch size to find the global batch size.
    **The Rationale:** The formula provides the number of microbatches, but the user ultimately configures the global batch size parameter in the training script.
    **The Consequence:** Setting the global batch size too small, leading to massive pipeline bubble inefficiency.
  napkin_math: |
    - Bubble Fraction = (p - 1) / m
    - 0.10 >= (8 - 1) / m
    - 0.10 * m >= 7
    - m >= 70 microbatches
    - Global Batch Size = m * microbatch_size = 70 * 4 = **280**.
