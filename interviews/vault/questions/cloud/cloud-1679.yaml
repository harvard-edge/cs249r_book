title: Diagnosing PAM4 FEC Errors in 400G Fabrics
scenario: 'During the commissioning of a 400GbE network fabric for a new 2,048 H100 GPU cluster, telemetry reports a sudden increase in uncorrectable FEC errors, causing elevated tail latency in NCCL AllReduce operations. The optical links use 56-GBaud PAM4 signaling. Pre-FEC BER is measured at 5x10^-4 on several links spanning 1.5 km between datacenter halls.'
question: 'How do you analyze the root cause of this performance degradation in the PAM4 signaling?'
details:
  realistic_solution: 'Analyze the Pre-FEC BER relative to the KP4 FEC threshold (2.4x10^-4). Because PAM4 uses four voltage levels, its eye opening is 1/3 the height of NRZ, costing ~9.5dB in Signal-to-Noise Ratio (SNR). The measured BER of 5x10^-4 exceeds the threshold, leading to uncorrectable errors and RoCE retransmissions. Remediation requires physically cleaning fiber connectors to reduce insertion loss.'
  common_mistake: |
    **The Pitfall:** Assuming that because Forward Error Correction (FEC) is active, the physical link is perfectly fine.
    **The Rationale:** Trusting algorithmic error correction to endlessly mask severe physical layer degradation.
    **The Consequence:** PAM4's multi-level signaling requires strict adherence to SNR thresholds; ignoring this leads to catastrophic packet drops, RoCE retransmissions, and NCCL network hangs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link: 400GbE, 56-GBaud PAM4.
       - Pre-FEC BER: 5x10^-4. KP4 FEC limit: ~2.4x10^-4.
    2. **Calculations:**
       - NRZ vs PAM4 Eye Height: NRZ = V; PAM4 = V/3.
       - SNR Penalty: 20 × log10(1/3) = -9.54 dB.
       - Threshold Breach: 5x10^-4 > 2.4x10^-4.
    3. **Conclusion & Interpretation:**
       - **Result: Physical-Layer-Bound. The PAM4 SNR penalty makes the link highly sensitive; a marginal 2-3 dB insertion loss pushes the signal below the DSP's recovery threshold, causing uncorrectable errors.**
