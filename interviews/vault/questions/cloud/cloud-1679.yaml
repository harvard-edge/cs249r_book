title: Diagnosing PAM4 FEC Errors in 400G Fabrics
scenario: 'During the commissioning of a 400GbE network fabric for a new 2,048 H100 GPU cluster, telemetry reports a sudden increase in uncorrectable FEC errors, causing elevated tail latency in NCCL AllReduce operations. The optical links use 56-GBaud PAM4 signaling. Pre-FEC BER is measured at 5x10^-4 on several links spanning 1.5 km between datacenter halls.'
question: 'How do you analyze the root cause of this performance degradation in the PAM4 signaling?'
details:
  realistic_solution: 'Analyze the Pre-FEC BER relative to the FEC threshold (e.g., 2.4x10^-4 for KP4 FEC). Because PAM4 uses four voltage levels, its eye opening is 1/3 the height of NRZ, costing ~9.5dB in Signal-to-Noise Ratio (SNR). The measured BER of 5x10^-4 exceeds the threshold, leading to uncorrectable errors and RoCE retransmissions. Remediation involves cleaning fiber connectors to reduce insertion loss.'
  common_mistake: |
    **The Pitfall:** Assuming that because FEC is active, the physical link is perfectly fine.
    **The Rationale:** Trusting algorithmic error correction to endlessly mask physical layer degradation.
    **The Consequence:** PAM4's multi-level signaling requires strict adherence to SNR thresholds; ignoring it leads to catastrophic packet drops and network hangs.
  napkin_math: |
    - **NRZ vs PAM4 Eye Height:** NRZ = V; PAM4 = V/3.
    - **SNR Penalty:** 20 × log10(1/3) ≈ -9.54 dB.
    - **Threshold Breach:** A marginal insertion loss of just 2-3 dB (e.g., from a dirty connector) pushes the signal below the DSP's recovery threshold.
    - **Consequence:** **Pre-FEC BER spikes to 5x10^-4, exceeding the 2.4e-4 KP4 FEC limit.**
