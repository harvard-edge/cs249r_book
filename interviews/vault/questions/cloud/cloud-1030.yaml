title: Hidden Correction Cascades in Bidding Pipelines
scenario: A Kubernetes-orchestrated cloud ad-bidding pipeline uses a CTR Predictor (Model A) feeding into a downstream Bidding Agent (Model B). Historically, Model A under-predicted desktop CTR by 20% (outputting 0.8x the true probability). To compensate without retraining Model A, engineers added a 'correction cascade' heuristic in Model B that multiplies the incoming CTR by 1.25. Six months later, Model A is upgraded to a well-calibrated Transformer model running on T4 GPUs, but the undocumented heuristic in Model B remains active. The true desktop CTR is 4.0%, and the Bidding Agent computes its bid as `Predicted_CTR * $50`.
question: "What are the over-bid per impression and daily loss from the stale 1.25x CTR correction, and how should you prevent this cascade?"
details:
  realistic_solution: Calculate the financial impact to justify an immediate rollback. Afterwards, establish strict API contracts (e.g., passing uncalibrated logits and explicit calibration metrics) to prevent cross-component boundary erosion, and remove the hardcoded 1.25x heuristic. Deploy Model A and B tested jointly.
  common_mistake: |
    **The Pitfall:** Adding another downstream patch to negate the first heuristic.
    **The Rationale:** Candidates opt for a quick fix rather than addressing the eroded boundary between the decoupled components.
    **The Consequence:** Deepening the correction cascade, making future model updates even more financially dangerous.
  napkin_math: |
    - **Calibrated Bid:** 0.04 (True CTR) * $50 = $2.00.
    - **Actual Cascaded Bid:** (0.04 * 1.25) * $50 = 0.05 * $50 = $2.50.
    - **Over-bid Per Impression:** $2.50 - $2.00 = $0.50.
    - **Daily Financial Loss:** 2,000,000 * $0.50 = **$1,000,000.**
