title: 'Feature Store: Mastery — Design Feature Store for Multi-Modal Real-Time LLM'
scenario: 'You are designing a feature store for a multi-modal LLM serving system on 256 H100s handling 200K requests/second. P99 feature retrieval must be < 3ms.'
question: 'What feature store architecture meets < 3ms p99 for 200K requests/s with text embeddings, session context, and image embeddings?'
details:
  realistic_solution: 'Layered by staleness and size: text embeddings (updated daily, large, L2 cache) -> session context (real-time, small, L1 per-server) -> image embeddings (updated weekly, large, L2/L3). Different retrieval paths for different feature types.'
  common_mistake: |
    **The Pitfall:** Storing all feature types in a single, homogeneous feature store.
    **The Rationale:** Candidates optimize for architectural simplicity instead of accounting for the vastly different staleness requirements, sizes, and access frequencies of each feature type.
    **The Consequence:** The system over-provisions expensive low-latency storage for slow-moving data, or fails the P99 SLA due to bandwidth saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200K requests/second SLA.
       - Text (6KB), Session (200B), Image (4KB).
       - P99 < 3ms retrieval target.
    2. **Calculations:**
       - Feature bandwidth: 200K × (6KB + 0.2KB + 4KB) = ~2.04 GB/s.
       - Text storage: 100M × 6KB = 600GB (L2 SSD, 1ms). Cache 1M users in L1 (6GB/server).
       - Image storage: 50M × 4KB = 200GB (L2 SSD, 1ms).
       - Session context: inline compute (L1 per-server, 0ms).
    3. **Conclusion & Interpretation:**
       - **Result: Total P99 = max(0ms, 1ms, 1ms) = 1ms. Meets the < 3ms SLA. Architecture is Bandwidth-Bound.**
