title: Evaluating A/B Test Trade-offs for Heavy Models
scenario: Your team is evaluating a new two-tower recommendation model that increases offline AUC by 2% but requires 4x the inference FLOPs and adds 15ms of P99 latency compared to the baseline. Marketing wants to run an A/B test on 20% of the 5,000 QPS peak traffic for two weeks to prove a 0.5% CTR lift. The baseline runs on 20 L4 GPUs.
question: Should the 20% two-week A/B test proceed as requested, or is an alternative architecture needed?
details:
  realistic_solution: Reject the standard A/B test. Propose shadow deployment to validate latency, followed by an interleaving experiment to increase sensitivity, reducing the required traffic to 2% and saving GPU costs.
  common_mistake: |
    **The Pitfall:** Focusing solely on statistical significance.
    **The Rationale:** Candidates often approach experiments purely as data scientists, ignoring the computational burden of heavy models.
    **The Consequence:** They approve an experiment that introduces severe infrastructure cost multipliers and ignores the conversion penalty of the added latency.
  napkin_math: |
    - Test requires 20% of 5,000 QPS = 1,000 QPS.
    - Baseline needs 4 L4s for 1k QPS; new model needs 16 L4s.
    - Cost: 16 GPUs * 336 hrs * $0.75 = $4,032.
    - Latency penalty: 15ms latency often drops CTR by ~0.15%.
    - **This reduces the net lift from 0.5% to 0.35%, which exponentially increases the sample size needed for significance and dooms the experiment.**
