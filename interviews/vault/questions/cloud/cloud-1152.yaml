title: Diagnosing Low GPU Utilization in Eager Mode GNNs
scenario: You are profiling a novel Graph Neural Network (GNN) training step implemented in PyTorch eager
  mode on an NVIDIA A100 GPU. The model consists of thousands of small tensor operations per forward pass.
  nvidia-smi shows GPU Volatile GPU-Util at consistently around 20%, while top shows one CPU core pegged
  at 100%. Nsight Systems shows large gaps between kernel executions on the GPU timeline. Why is the GPU
  utilization so low, and how would you resolve this?
details:
  realistic_solution: Identify the Python dispatch tax as the bottleneck. The CPU takes ~5µs to dispatch
    each small op, while the A100 executes them in ~1µs. Fix by using operator fusion (e.g., torch.compile)
    or custom CUDA kernels to reduce dispatch frequency.
  common_mistake: Assuming the bottleneck is PCIe data transfer bandwidth or GPU memory bandwidth, and
    trying to optimize data loading or switch to mixed precision.
  napkin_math: CPU dispatch time per op = 5µs. GPU execution time per op = 1µs. Effective time per op
    = max(5, 1) = 5µs. GPU active time = 1µs. Utilization = 1 / 5 = 20%. Fusing 10 ops into 1 reduces
    dispatch time to 5µs for 10µs of GPU work, shifting the bottleneck to the GPU.
