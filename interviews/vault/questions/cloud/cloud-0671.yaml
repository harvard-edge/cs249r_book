title: The Multi-Modal Token Starvation
scenario: You are serving a multi-modal model (like LLaVA). A user uploads a 4K image and asks, 'What is this?'. The image is encoded into 4,000 visual tokens by the Vision Encoder. The LLM then begins decoding text. During the text decode phase, the GPU utilization is at 4%. Your manager asks you to optimize the Vision Encoder to fix this.
question: Why is the manager focusing on the wrong part of the stack?
details:
  realistic_solution: 'The manager is wrong because the bottleneck is in the autoregressive text decode phase, not the vision encoder. The vision encoder runs once, is compute-bound, and processes 4000 visual tokens in parallel — it''s fast. But text generation is autoregressive: each token requires reading the full 140GB of weights plus the 4000-token visual KV-cache from HBM. At 3 TB/s bandwidth, that''s ~47ms per token, yielding only ~3 TFLOPS of compute utilization (0.3% of the H100''s peak). The GPU is memory-bound during decode regardless of how the visual tokens were produced. Optimizing the encoder won''t help.'
  common_mistake: |
    **The Pitfall:** Blaming the Vision Encoder for low GPU utilization during text generation.
    **The Rationale:** Because 4,000 tokens sounds like a massive input, managers assume the encoder is the heavy, slow part of the pipeline.
    **The Consequence:** The team wastes months compressing the vision encoder, gaining exactly zero improvement in text decode utilization.
  napkin_math: |
    *   **Memory Read per Token:** 140 GB (70B params FP16) + 2 GB (4K visual KV-cache) = 142 GB.
    *   **Memory Bandwidth (H100):** 3.35 TB/s.
    *   **Read Time:** 142 GB / 3.35 TB/s = 42.4 ms per token.
    *   **Compute per Token:** 2 × 70B = 140 GFLOPs.
    *   **Actual Compute Rate:** 140 GFLOPs / 0.0424s = 3.3 TFLOPS.
    *   **Result:** **3.3 TFLOPS is only 0.33% of the H100's peak 989 TFLOPS. The process is completely memory-bound, making the encoder irrelevant.**
