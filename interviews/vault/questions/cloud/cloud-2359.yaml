title: Root Causing Containerized IPC Fallback
scenario: Moving a PyTorch DDP training job from bare metal to a Kubernetes Pod on the exact same 8x A100 node causes the per-iteration time to jump from 400ms to 1200ms. The pod has full access to all GPUs. NCCL logs indicate a fallback, and Nsight Systems shows intra-node bandwidth at ~20 GB/s instead of 300 GB/s.
question: "Why does moving the 8x A100 DDP job into Kubernetes raise iteration time from 400ms to 1200ms, and how would you fix the NCCL fallback?"
details:
  realistic_solution: The root cause is the container's restricted shared memory size. By default, Docker/containerd limits `/dev/shm` to 64MB. NCCL relies on shared memory to establish IPC (Inter-Process Communication) and coordinate the fast NVLink transfers via memory-mapped ring buffers. When NCCL attempts to allocate its buffers and hits the 64MB limit, it silently falls back to extremely small chunk sizes or routes communication over standard network sockets (TCP over loopback), bypassing the high-bandwidth NVLink entirely. The solution is to mount `/dev/shm` as a `tmpfs` volume with adequate capacity (e.g., 16GB) or run the container with `--shm-size=16g`.
  common_mistake: Assuming Kubernetes CPU limits are throttling the dataloader and increasing the CPU requests.
  napkin_math: 'Model gradients = 16GB. Default SHM = 64MB. Divided among 8 GPUs, chunk size = 8MB. To transfer 16GB, NCCL must perform 2000 synchronized micro-transfers. The synchronization overhead dominates, reducing the effective 300 GB/s NVLink bandwidth to ~20 GB/s. Transfer time increases from 16GB / 300GB/s = 53ms to 16GB / 20GB/s = 800ms per iteration.'
  options:
  - "The container is throttling CPU requests, slowing down the dataloader. Fix this by increasing CPU limits in the Pod spec."
  - "The container restricts PCIe bandwidth to the GPU. Fix this by adding the `nvidia.com/gpu` resource limit."
  - "The container restricts the `/dev/shm` shared memory size to 64MB, causing NCCL to fall back from NVLink. Fix this by mounting a larger `tmpfs` volume to `/dev/shm`."
  - "The Kubernetes network plugin is routing intra-node traffic through the pod overlay network. Fix this by setting `hostNetwork: true`."
  correct_index: 2
