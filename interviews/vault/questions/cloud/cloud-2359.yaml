title: Root Causing Containerized IPC Fallback
scenario: Moving a PyTorch DDP training job from bare metal to a Kubernetes Pod on the exact same 8x A100
  node causes the per-iteration time to jump from 400ms to 1200ms. The pod has full access to all GPUs.
  NCCL logs indicate a fallback, and Nsight Systems shows intra-node bandwidth at ~20 GB/s instead of
  300 GB/s.
details:
  realistic_solution: The root cause is the container's restricted shared memory size. By default, Docker/containerd
    limits `/dev/shm` to 64MB. NCCL relies on shared memory to establish IPC (Inter-Process Communication)
    and coordinate the fast NVLink transfers via memory-mapped ring buffers. When NCCL attempts to allocate
    its buffers and hits the 64MB limit, it silently falls back to extremely small chunk sizes or routes
    communication over standard network sockets (TCP over loopback), bypassing the high-bandwidth NVLink
    entirely. The solution is to mount `/dev/shm` as a `tmpfs` volume with adequate capacity (e.g., 16GB)
    or run the container with `--shm-size=16g`.
  common_mistake: Assuming Kubernetes CPU limits are throttling the dataloader and increasing the CPU
    requests.
  napkin_math: Model gradients = 1GB. Default SHM = 64MB. Divided among 8 GPUs, chunk size = 8MB. To transfer
    1GB, NCCL must perform 125 synchronized micro-transfers. The synchronization overhead dominates, reducing
    the effective 300 GB/s NVLink bandwidth to ~20 GB/s. Transfer time increases from 1GB / 300GB/s =
    3.3ms to 1GB / 20GB/s = 50ms per AllReduce step, accumulating across hundreds of layers to add 800ms
    per iteration.
  options:
  - Feature stores are simply databases optimized for ML; any standard SQL database provides the same
    functionality for feature management without dedicated infrastructure
  - Feature stores are only needed for tabular/structured data ML; LLMs and other neural networks learn
    features directly from raw data and have no use for pre-computed features
  - The primary purpose of a feature store is data versioning and lineage tracking; the training-serving
    skew problem is solved by unit testing feature transformations independently
  - 'Feature stores solve: (1) Training-serving skew — ensure the exact same feature transformation code
    runs in both training and inference, preventing subtle bugs. (2) Feature reuse — centralized repository
    avoids duplicate computation across teams. (3) Point-in-time correctness — for training, retrieve
    features as they were at each historical timestamp (prevents data leakage from future features). (4)
    Low-latency serving — pre-computed batch features cached in Redis/DynamoDB with online feature computation
    for real-time signals.'
  correct_index: 3
