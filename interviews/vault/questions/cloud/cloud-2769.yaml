title: Prompt Injection Defense Coverage
scenario: You deploy 3 defense layers against prompt injection: (1) input regex filter catching 60% of known injection patterns, (2) a classifier model catching 80% of remaining injections, (3) output validation catching 70% of what passes through.
question: If you receive 1000 injection attempts per day, how many succeed, and how would you reach a target of < 1% success?
details:
  realistic_solution: 'Layer 1 (regex): catches 60%, passes 40%. Remaining: 1000 × 0.40 = 400. Layer 2 (classifier): catches 80% of remaining, passes 20%. Remaining: 400 × 0.20 = 80. Layer 3 (output validation): catches 70% of remaining, passes 30%. Remaining: 80 × 0.30 = 24. So 24 out of 1000 injection attempts succeed (2.4% overall success rate). Combined catch rate: 97.6%. To get below 1% success rate (< 10 per day), you need to improve any one layer.'
  common_mistake: |
    **The Pitfall:** Adding the percentages instead of multiplying the sequential pass-through rates.
    **The Rationale:** Candidates sum 60% + 80% + 70% = 210% and wrongly assume 100% of attacks are caught.
    **The Consequence:** Overestimating defense robustness and deploying vulnerable systems.
  napkin_math: |
    1. **Layer 1 (Regex):** Catches 60%, passes 40%. Remaining = $1000 * 0.40 = 400$.
    2. **Layer 2 (Classifier):** Catches 80%, passes 20%. Remaining = $400 * 0.20 = 80$.
    3. **Layer 3 (Output):** Catches 70%, passes 30%. Remaining = $80 * 0.30 = 24$.
    4. **Current Success Rate:** **24 successful injections (2.4%).**
    5. **Optimization:** To reach < 10 (1%), improve any layer (e.g., Layer 2 to 90% leaves $400 * 0.10 * 0.30 = 12$, nearly there).
