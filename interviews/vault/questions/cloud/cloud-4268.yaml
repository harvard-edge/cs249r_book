title: Chiplet vs Monolithic Roofline Model
scenario: You are constructing a roofline model for an AMD MI300X that accounts for the NUMA bandwidth hierarchy: local XCD HBM, cross-XCD Infinity Fabric, and host DRAM.
question: How does the NUMA bandwidth hierarchy of the MI300X affect kernel tuning versus a monolithic H100?
details:
  realistic_solution: 'MI300X needs a three-tier roofline: (1) local XCD HBM: 662 GB/s ceiling, (2) cross-XCD fabric: ~300 GB/s effective for random cross-die access, (3) host: ~500 GB/s via Infinity Fabric. Kernels should be tuned against the local-XCD roofline. H100''s single-tier 3.35 TB/s is more predictable — memory-bound kernels saturate a flat ceiling regardless of which SMs run them.'
  common_mistake: |
    **The Pitfall:** Using a single roofline with 5.3 TB/s as the memory bandwidth ceiling for the entire MI300X.
    **The Rationale:** Candidates treat chiplet architectures identically to monolithic ones, assuming all compute units have equal access to peak aggregate bandwidth.
    **The Consequence:** This overstates achievable bandwidth for any single kernel, as no single XCD can access the full aggregate bandwidth without severe NUMA penalties.
  napkin_math: |
    1. **MI300X Peak Compute:** 1307 TFLOPS FP16.
    2. **Local XCD BW Ceiling:** 662 GB/s.
    3. **MI300X Ridge Point:** 1307e12 / 662e9 ≈ 1974 FLOPs/byte.
    4. **H100 Ridge Point:** 989e12 / 3350e9 ≈ 295 FLOPs/byte.
    **Conclusion:** The MI300X is far more compute-bound per XCD; memory-bound kernels are relatively more penalized compared to H100.
