title: Cloud Token Budget L3 0
scenario: Your 7B LLM (32 layers, 4096 hidden dim, 32 KV heads) serves on an H100 (80 GB). Model weights take 14 GB FP16.
question: How many concurrent requests can the H100 serve at 4K, 16K, and 64K token budgets?
details:
  realistic_solution: 'Available memory for KV cache: 80 - 14 = 66 GB. KV cache per token: 2 (K+V) × 32 layers × 32 kv_heads × 128 head_dim × 2 bytes = 524,288 bytes (~0.5 MB). At 4K tokens: 524,288 × 4096 ≈ 2.15 GB per request. Concurrent: 66 GB / 2.15 GB ≈ 30 requests. At 16K: 524,288 × 16,384 ≈ 8.59 GB. Concurrent: 66 GB / 8.59 GB ≈ 7 requests. At 64K: 524,288 × 65,536 ≈ 34.36 GB. Concurrent: 66 GB / 34.36 GB ≈ 1 request. Each 4x in context costs ~4x in concurrency.'
  common_mistake: |
    **The Pitfall:** Using the total hidden dimension (4096) instead of the per-head dimension for KV cache calculations.
    **The Rationale:** Candidates confuse the overall model dimension with the specific size of the keys and values stored per head (num_kv_heads × head_dim), leading to massive overestimations if GQA or MQA is used.
    **The Consequence:** The engineer drastically under-provisions the required hardware for long-context serving.
  napkin_math: |
    - **Available Memory:** 80 GB - 14 GB = 66 GB.
    - **Head Dimension:** 4096 / 32 = 128.
    - **KV Cache per Token:** 2 (K+V) × 32 layers × 32 kv_heads × 128 head_dim × 2 bytes = 524,288 bytes (~0.5 MB).
    - **4K Context:** 0.5 MB × 4,096 = 2.15 GB/request. Concurrency = 66 GB / 2.15 GB = **30 requests**.
    - **16K Context:** 0.5 MB × 16,384 = 8.59 GB/request. Concurrency = 66 GB / 8.59 GB = **7 requests**.
    - **64K Context:** 0.5 MB × 65,536 = 34.36 GB/request. Concurrency = 66 GB / 34.36 GB = **1 request**.
