title: Cloud Token Budget L3 0
scenario: Your 7B LLM (32 layers, 4096 hidden dim, 32 KV heads) serves on an H100 (80 GB). Model weights
  take 14 GB FP16. Calculate the maximum concurrent requests at token budgets of 4K, 16K, and 64K tokens.
details:
  realistic_solution: 'Available memory for KV cache: 80 - 14 = 66 GB. KV cache per token: 2 (K+V) × 32
    layers × 32 kv_heads × 128 head_dim × 2 bytes = 524,288 bytes (~0.5 MB). At 4K tokens: 524,288 × 4096
    ≈ 2.15 GB per request. Concurrent: 66 GB / 2.15 GB ≈ 30 requests. At 16K: 524,288 × 16,384 ≈ 8.59
    GB. Concurrent: 66 GB / 8.59 GB ≈ 7 requests. At 64K: 524,288 × 65,536 ≈ 34.36 GB. Concurrent: 66
    GB / 34.36 GB ≈ 1 request. Each 4x in context costs ~4x in concurrency.'
  common_mistake: Using total hidden dimension (4096) instead of per-head dimension (128) for KV cache
    calculation. KV cache stores per-head keys and values, so the correct formula uses num_kv_heads ×
    head_dim, which may differ from hidden_dim if using GQA.
  napkin_math: 'KV cache = 2 × 32 × 32 × 128 × 2B = 524,288 bytes/token. 4K: 2.1 GB → 30 concurrent. 16K:
    8.6 GB → 7 concurrent. 64K: 34.4 GB → 1 concurrent. Throughput scales inversely with token budget.'
