title: The Cannibalistic Batching Strategy
scenario: Your team runs a serverless LLM API that autoscales based on pending requests. The current batching strategy waits up to 400ms to form a large batch to maximize utilization and TPOT. However, users are complaining about high and unpredictable TTFT. You observe that during spiky traffic, the system scales up aggressively but the new instances show low initial utilization.
question: Why is the batching strategy cannibalizing its own efficiency?
details:
  realistic_solution: 'The batching algorithm''s long timeout artificially inflates queue waiting time. This wait time is what users perceive as bad TTFT and what triggers the autoscaler. The autoscaler spins up a new instance, which itself sits mostly idle waiting to form a batch. Use dynamic or adaptive batching: short timeout at low load for TTFT, longer timeout at high load for TPOT.'
  common_mistake: |
    **The Pitfall:** Suggesting a simple tweak like 'just shorten the batching timeout.'
    **The Rationale:** It seems like a quick fix to lower latency without changing the system design.
    **The Consequence:** Decreases batch size, cratering throughput, increasing costs, and potentially causing the autoscaler to trigger even more aggressively.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 13B model in FP16 = 26GB.
       - H100 bandwidth = 3.35TB/s.
    2. **Calculations:**
       - TPOT for BS=1: 26GB / 3.35TB/s = 7.76ms.
       - Total execution = ~12.8ms.
       - Batch capacity in 400ms = 400ms / 12.8ms ≈ 31 requests.
    3. **Conclusion & Interpretation:**
       - **Result: 400ms queueing delay dominates the 13ms execution, causing scaling issues despite high utilization.**
