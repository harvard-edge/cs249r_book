title: On-Prem vs Cloud Capacity Decision
scenario: 'Your steady-state GPU demand is 100 A100s, with peaks of 300 during quarterly model retraining.'
question: 'Which of the on-prem (300 GPUs), hybrid burst (100 on-prem + 200 cloud), or all-cloud options minimizes 3-year cost, and what are the trade-offs?'
details:
  realistic_solution: 'Option A (300 on-prem): Capex: 300 x $25K = $7.5M. But 200 GPUs sit idle ~90% of the time (only used during quarterly peaks of ~2 weeks each = 8 weeks/year). Utilization: ~45%. 3-year cost: $7.5M + ($1M/yr ops x 3 yrs) = $10.5M. Option B (100 on-prem + cloud burst): On-prem capex: 100 x $25K = $2.5M. Cloud burst: 200 GPUs x 8 weeks/year x 168h/week x $3/h = $806.4K/year. 3-year total: $2.5M + ($806.4K/yr x 3) cloud + ($200K/yr ops x 3) = $5.5M. Option C (all cloud): 100 GPUs x 8,760h x $3 = $2.628M/yr steady state. Burst: $806.4K/yr. 3-year total: ($2.628M + $806.4K) x 3 = $10.3M. Recommendation: B is optimal - on-prem for baseline (cheapest per GPU-hour at high utilization), cloud for peaks (pay only when needed). B saves ~$5M vs A and $4.8M vs C over 3 years.'
  common_mistake: |
    **The Pitfall:** Only comparing direct dollar costs without considering utilization and agility.
    **The Rationale:** Over-provisioning on-prem hardware for rare peaks leads to massive idle capacity, while full cloud for steady-state workloads is unnecessarily expensive.
    **The Consequence:** Wasting millions of dollars in capex for idle hardware or excessive cloud operational costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Steady-state: 100 A100s. Peak: 300 A100s (8 weeks/year).
    - Cloud Cost: $3/h. On-prem Capex: $25K/GPU.

    **Calculations:**
    - Option A (300 on-prem): Capex $7.5M + Ops $3M = $10.5M total (45% util).
    - Option C (all cloud): Steady $2.628M/yr + Burst $806.4K/yr. 3-year total: $10.3M.
    - Option B (hybrid): Capex $2.5M + cloud burst $2.4M + Ops $0.6M = $5.5M.

    **Conclusion & Interpretation:**
    - **Result: Option B Hybrid (Cost-Bound)**. The hybrid model saves ~$5M over 3 years by avoiding idle on-prem hardware while serving base load cheaply.
