title: On-Prem vs Cloud Capacity Decision
scenario: 'Your steady-state GPU demand is 100 A100s, with peaks of 300 during quarterly model retraining. Options: (A) 300 on-prem GPUs at $25K each (3-year amortization), (B) 100 on-prem + cloud burst to 200, (C) all cloud at $3/GPU-hour. Evaluate total 3-year cost and operational trade-offs.'
question: "Which of the on-prem, hybrid burst, or all-cloud options minimizes 3-year cost, and what are the trade-offs?"
details:
  realistic_solution: 'Option A (300 on-prem): Capex: 300 × $25K = $7.5M. But 200 GPUs sit idle ~90% of the time (only used during quarterly peaks of ~2 weeks each = 8 weeks/year). Utilization: ~45%. 3-year cost: $7.5M + ($1M/yr ops × 3 yrs) = $10.5M. Option B (100 on-prem + cloud burst): On-prem capex: 100 × $25K = $2.5M. Cloud burst: 200 GPUs × 8 weeks/year × 168h/week × $3/h = $806.4K/year. 3-year total: $2.5M + ($806.4K/yr × 3) cloud + ($200K/yr ops × 3) = $5.5M. Option C (all cloud): 100 GPUs × 8,760h × $3 = $2.628M/yr steady state. Burst: $806.4K/yr. 3-year total: ($2.628M + $806.4K) × 3 = $10.3M. Recommendation: B is optimal — on-prem for baseline (cheapest per GPU-hour at high utilization), cloud for peaks (pay only when needed). B saves $5M vs A and $4.8M vs C over 3 years.'
  common_mistake: Only comparing dollar costs. On-prem requires staff, datacenter space, networking, cooling, and a 3-6 month procurement lead time that limits agility.
  napkin_math: 'A: Capex $7.5M + $3M ops (3yr) = $10.5M total (45% util). B: $5.5M total (on-prem ~100% util + cloud burst). C: $10.3M total (flexible but expensive). B wins by ~$5M vs A.'
