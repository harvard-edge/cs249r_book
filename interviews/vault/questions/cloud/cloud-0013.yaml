title: The TPOT Memory Wall
scenario: Your team is serving an INT4-quantized 70B parameter LLM on a single H100 GPU. A user complains that while the first token appears almost instantly, the subsequent text generates very slowly, making the chatbot feel sluggish. They expect a comfortable reading speed of at least 20 tokens per second.
question: "What is the primary hardware bottleneck for Time Per Output Token (TPOT), and can the H100 GPU theoretically meet this user's expectation?"
details:
  realistic_solution: The user's complaint correctly distinguishes between TTFT (fast) and TPOT (slow). The bottleneck for TPOT in autoregressive models is memory bandwidth, as generating each token requires reading all model parameters from High Bandwidth Memory (HBM).
  common_mistake: |
    **The Pitfall:** Assuming that token generation is compute-bound.
    **The Rationale:** Engineers try to calculate the FLOPs required per token and divide by the H100's TFLOPS rating, ignoring that autoregressive decoding is a memory-bound operation.
    **The Consequence:** They optimize the wrong bottleneck or mistakenly conclude the hardware cannot meet the performance requirement.
  napkin_math: |
    1. Autoregressive token generation (TPOT) is memory-bandwidth bound.
    2. A 70B parameter model in INT4 precision occupies ~35 GB of memory.
    3. The H100 GPU has a memory bandwidth of 3.35 TB/s (3350 GB/s).
    4. Theoretical max tokens/sec = 3350 GB/s / 35 GB/token ≈ 95 tokens/sec.
    5. **The hardware can easily support the 20 tokens/sec expectation.**
  options:
  - No, the H100 is compute-bound during generation and cannot meet this demand.
  - No, the H100's memory bandwidth is only 3.35 GB/s, making this impossible.
  - Yes, the H100's memory bandwidth supports a theoretical speed of ~95 tokens/sec, so the issue is likely in the software.
  - Yes, because the KV-cache makes all subsequent token generation instantaneous.
