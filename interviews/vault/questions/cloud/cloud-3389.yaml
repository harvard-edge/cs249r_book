title: TPU Kernel Fusion for Memory-Bound Element-wise Operations
scenario: An LLM inference step profile shows a sequence of two element-wise operations (ReLU, then bias addition) on a 4 GB BF16 tensor is memory-bound. Each dispatches as a separate kernel to a TPU v5e.
question: How would you fuse the ReLU and bias addition kernels, and what performance improvement would you expect?
details:
  realistic_solution: The realistic solution involves fusing the sequence of element-wise operations (ReLU and bias addition) into a single custom kernel. On Google TPUs, this is typically achieved using XLA's fusion capabilities or custom XLA ops/lowering rules (e.g., using Triton for custom kernels compiled to HLO). The fused kernel would read the input tensor once, perform both ReLU and addition operations on the data as it streams through the processing units, and then write the final result back to HBM once. This minimizes global memory traffic by eliminating intermediate writes/reads and reduces kernel launch overhead to a single dispatch. Careful consideration must be given to register pressure and potential increase in compilation time.
  common_mistake: |
    **The Pitfall:** Treating element-wise operations as independent compute kernels.
    **The Rationale:** Ignoring that the true cost of simple operations is moving data to/from HBM, not the ALU computation.
    **The Consequence:** Accumulating redundant trips to global memory and kernel launch overheads, severely bottlenecking memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size: 4 GB. Hardware: TPU v5e (1.6 TB/s memory bandwidth).

    **Calculations:**
    - Unfused: ReLU (4GB read, 4GB write) + Bias (4GB read, 4GB write) = 16 GB total traffic.
    - Time (Unfused): 16 GB / 1.6 TB/s = 10 ms.
    - Fused: Single kernel (4GB read, 4GB write) = 8 GB total traffic.
    - Time (Fused): 8 GB / 1.6 TB/s = 5 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound.** Fusion yields a 2x reduction in memory traffic and a 5ms speedup by completely eliminating intermediate global memory reads/writes.
