title: 'The Continuous Batching Deadline: Batching Strategies'
scenario: You are operating an LLM inference service using an engine that implements continuous batching
  on H100 GPUs. Your key customer has a strict P99 Time-To-First-Token (TTFT) service level objective
  (SLO) of 150ms. You've profiled the system and found that the prefill computation for a new request
  takes 40ms, and the iteration time to generate one token for a full batch (the TPOT) is 10ms. A new
  request arrives at the worst possible moment (just after an iteration has started). Calculate its TTFT
  and explain if it meets the SLO.
details:
  realistic_solution: The total Time-To-First-Token (TTFT) is the sum of the queuing delay and the prefill
    computation time. In a continuous batching system, the worst-case queuing delay occurs when a request
    arrives just after a batch processing iteration has begun. The request must wait for that single iteration
    to complete. Therefore, the worst-case TTFT is the iteration time plus the prefill time. In this case,
    10ms + 40ms = 50ms. This easily meets the customer's 150ms SLO.
  common_mistake: Engineers often confuse the components of latency. A common mistake is to believe TTFT
    is solely the prefill time, ignoring the queuing delay inherent in any batching system. Another mistake
    is to model the delay as waiting for an entire sequence to finish (as in static batching), rather
    than just one iteration, which is the key advantage of continuous batching.
  napkin_math: '`Worst-Case TTFT = Wait Time + Prefill Time`'
  options:
  - 40ms. The TTFT is determined solely by the prefill computation time.
  - 10ms. The TTFT is equivalent to the Time Per Output Token (TPOT).
  - 50ms. The TTFT is the prefill time plus the worst-case wait for the next iteration cycle.
  - Up to several seconds. The request must wait for the longest sequence in the current batch to complete.
  correct_index: 2
