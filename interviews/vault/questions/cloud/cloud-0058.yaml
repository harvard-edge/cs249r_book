title: 'The Continuous Batching Deadline: Batching Strategies'
scenario: You are operating an LLM inference service using an engine that implements continuous batching on H100 GPUs. Your key customer has a strict P99 Time-To-First-Token (TTFT) service level objective (SLO) of 150ms. You've profiled the system and found that the prefill computation for a new request takes 40ms, and the iteration time to generate one token for a full batch (the TPOT) is 10ms. A new request arrives at the worst possible moment (just after an iteration has started).
question: What is the worst-case TTFT when a request arrives just after an iteration starts, and does it meet the 150ms SLO?
details:
  realistic_solution: The total Time-To-First-Token (TTFT) is the sum of the queuing delay and the prefill computation time. In a continuous batching system, the worst-case queuing delay occurs when a request arrives just after a batch processing iteration has begun. The request must wait for that single iteration to complete. Therefore, the worst-case TTFT is the iteration time plus the prefill time. In this case, 10ms + 40ms = 50ms. This easily meets the customer's 150ms SLO.
  common_mistake: |
    **The Pitfall:** Believing TTFT is solely the prefill computation time, or conversely, waiting for an entire sequence to finish.
    **The Rationale:** Engineers confuse static batching (where a request waits for all sequences to end) with continuous batching, or they ignore queuing delay entirely.
    **The Consequence:** Incorrectly calculating latency SLAs, leading to either over-provisioning or failing customer expectations.
  napkin_math: |
    - Queuing Wait Time (Worst-case): 10ms (waiting for the current 1-token iteration to finish).
    - Prefill Computation Time: 40ms.
    - Worst-Case TTFT: 10ms + 40ms = 50ms.
    - **Conclusion: The 50ms TTFT easily meets the customer's 150ms SLO.**
  options:
  - 40ms. The TTFT is determined solely by the prefill computation time.
  - 10ms. The TTFT is equivalent to the Time Per Output Token (TPOT).
  - 50ms. The TTFT is the prefill time plus the worst-case wait for the next iteration cycle.
  - Up to several seconds. The request must wait for the longest sequence in the current batch to complete.
  correct_index: 2
