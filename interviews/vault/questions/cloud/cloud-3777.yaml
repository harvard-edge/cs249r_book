title: Ring Attention for Million-Token Contexts
scenario: >-
  You need to process a 1M token context on 8 MI300X GPUs (192 GB HBM3 each).
  Even with FlashAttention, the KV cache for 1M tokens at 128 head_dim × 96 heads
  × 80 layers × 2 (K+V) × 2 bytes = ~3.9 TB, far exceeding any single GPU.
question: >-
  How does Ring Attention distribute 1M-token attention across 8 MI300X GPUs,
  and what communication pattern does it use?
details:
  realistic_solution: 'Ring Attention partitions the 1M sequence into 8 chunks of 125K tokens each. Each GPU holds Q for its chunk and computes attention against K,V blocks from all chunks. The ring protocol: (1) Each GPU starts with its local K,V chunk. (2) Compute FlashAttention between local Q and the current K,V chunk. (3) While computing, asynchronously send K,V to the next GPU in the ring and receive from the previous GPU. (4) After computation, switch to the newly received K,V chunk. (5) Repeat for 8 rounds. Communication volume per GPU per round: K,V for 125K tokens = 125K × 128 × 2 × 2 bytes = 64 MB per head × 96 heads = 6.1 GB per round. At 400 Gbps IB: 6.1 GB / 50 GB/s = 122ms. Compute per round: FlashAttention on 125K×125K block ≈ 200ms. Since compute > communication, the overlap is nearly perfect (communication is hidden). Total: ~8 rounds × 200ms = 1.6 seconds for 1M context attention, vs impossible on a single GPU.'
  common_mistake: |
    **The Pitfall:** Thinking Ring Attention simply shards the KV cache and does a standard AllReduce.
    **The Rationale:** Candidates miss the ring topology mechanism where each GPU holds a sequence chunk and rotates KV blocks, overlapping communication with computation to fit within memory.
    **The Consequence:** Proposing impossible KV cache allocations or suffering massive communication bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1M token context on 8 MI300X GPUs (192 GB HBM3 each).
    - Total KV cache for 1M tokens is 3.9 TB.
    - Ring Attention stores only 2 chunks per GPU at a time (current + receiving).

    **Calculations:**
    - Per GPU chunk size = 3.9 TB / 8 = 490 GB (does not fit).
    - Memory used with Ring Attention = 2 × (490 GB / 8) = 122.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 122.5 GB (Compute-Bound)**. Ring Attention limits peak memory to fit within the 192 GB HBM3, successfully overlapping communication with compute.
