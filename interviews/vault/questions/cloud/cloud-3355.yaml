title: Optimizing LLM Context with Attention Scaling on NVIDIA H100
scenario: Your team is deploying a new LLM requiring longer context windows, up to 128k tokens. The current architecture uses standard MHA. You are evaluating migrating to MQA or GQA to improve inference throughput on H100 GPUs.
question: How would you evaluate MHA versus MQA or GQA for 128k-token LLM inference on H100, including memory, bandwidth, latency, and quality tradeoffs?
details:
  realistic_solution: 'A realistic solution would involve: 1. **Profiling**: Benchmark MHA, MQA, and GQA implementations on a representative dataset and context lengths. 2. **Memory Analysis**: Quantify KV cache memory footprint for each variant. 3. **Bandwidth Analysis**: Evaluate memory bandwidth usage for KV cache access. 4. **Compute Analysis**: Assess FP16 TFLOPS utilization. 5. **Architectural Trade-offs**: MHA offers higher quality but increased memory and bandwidth. MQA/GQA offer reduced memory/bandwidth, improving context scaling and throughput. 6. **Selection Criteria**: Choose the variant that offers the best balance of throughput, latency, and context length scalability.'
  common_mistake: |
    **The Pitfall:** Failing to account for the impact of KV cache size on HBM3 memory limits as context length increases.
    **The Rationale:** Engineers often underestimate the memory bandwidth needed for fetching KV cache in MHA compared to MQA/GQA.
    **The Consequence:** The system hits severe HBM3 bottlenecks long before compute limits are reached, crashing or slowing down decoding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 layers, 64 heads, 128 dim, 128k context, BS=1. FP16 (2B).
       - H100 memory capacity: 80GB.
    2. **Calculations:**
       - MHA KV Cache Size: 32 * 64 * 128 * 131072 * 1 * 2 * 2 = 137.4 GB.
       - GQA-8 KV Cache Size: 32 * 8 * 128 * 131072 * 1 * 2 * 2 = 17.2 GB.
    3. **Conclusion & Interpretation:**
       - **GQA-8 reduces KV cache footprint by 8x, allowing 128k context to fit in an 80GB H100. Result: Memory-Bound mitigated.**
