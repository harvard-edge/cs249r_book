title: Optimizing LLM Context with Attention Scaling on NVIDIA H100
scenario: Your team is deploying a new LLM requiring longer context windows, up to 128k tokens. The current architecture uses standard MHA. You are evaluating migrating to MQA or GQA to improve inference throughput on H100 GPUs (80 GB HBM3, 989 TFLOPS, 3.35 TB/s).
question: How would you evaluate MHA versus MQA or GQA for 128k-token LLM inference on H100, including memory, bandwidth, latency, and quality tradeoffs?
details:
  realistic_solution: 'A realistic solution would involve:\n1. **Profiling**: Benchmark MHA, MQA, and GQA implementations on a representative dataset and context lengths on the H100.\n2. **Memory Analysis**: Quantify KV cache memory footprint for each variant (MHA: `(num_layers * num_heads * seq_len * head_dim * 2 * batch_size)`) vs. MQA/GQA: `(num_layers * num_kv_heads * seq_len * head_dim * 2 * batch_size)`. Identify the maximum sustainable context length for the H100''s 80GB HBM3.\n3. **Bandwidth Analysis**: Evaluate memory bandwidth usage for KV cache access. MQA/GQA significantly reduce this due to smaller KV caches.\n4. **Compute Analysis**: Assess FP16 TFLOPS utilization for attention operations (Q @ K^T, softmax, etc.) for each variant. Compare against the H100''s 989 TFLOPS.\n5. **Architectural Trade-offs**: MHA offers higher quality but increased memory and bandwidth. MQA/GQA offer reduced memory/bandwidth, improving context scaling and throughput, potentially with a minor quality trade-off. Analyze the impact on latency, throughput, and cost for the target context length.\n6. **Selection Criteria**: Choose the variant that offers the best balance of throughput, latency, and context length scalability while staying within the H100''s memory and bandwidth capabilities. Consider techniques like sliding window attention or attention sparsity for even longer contexts beyond the H100''s physical memory limits.'
  common_mistake: |
    **The Pitfall:** Failing to account for the impact of KV cache size on HBM3 memory limits as context length increases.
    **The Rationale:** Engineers often underestimate the memory bandwidth needed for fetching KV cache in MHA compared to MQA/GQA.
    **The Consequence:** The system hits severe HBM3 bottlenecks long before compute limits are reached, crashing or slowing down decoding.
  napkin_math: |
    - **Assumptions:** 32 layers, 64 heads, 128 dim, 128k context, BS=1.
    - **MHA KV Cache Size:** 32 * 64 * 128 * 131072 * 1 * 2 * 2 = ~137.4 GB (exceeds H100 80GB).
    - **GQA-8 KV Cache Size:** 32 * 8 * 128 * 131072 * 1 * 2 * 2 = ~17.2 GB.
    - **Final Result:** **GQA-8 reduces KV cache footprint by 8x, allowing 128k context to easily fit in an 80GB H100.**
