title: 'MI300X vs A100: VRAM Capacity Advantage for Long-Context Serving'
scenario: A legal AI application requires serving a 13B FP16 model with 128K context length. KV cache per token per layer is: 2 × num_heads × head_dim × 2 bytes = 2 × 40 × 128 × 2 = 20.5KB per token per layer. The model has 40 layers.
question: For the 13B model at 128K context, how large is one request's KV cache, and how many requests fit on A100 80GB, H100 80GB, and MI300X 192GB?
details:
  realistic_solution: 'Per-token KV cache (all 40 layers): 40 layers × 20.5KB = 820KB per token. For 128K context: 820KB × 128,000 tokens = 105GB per request. Weight memory: 13B × 2 bytes = 26GB. Available KV cache memory: A100 (80GB): 80 - 26 = 54GB. Requests: floor(54GB / 105GB) = 0 — cannot serve a single 128K request. H100 (80GB): same, 0 requests. MI300X (192GB): 192 - 26 = 166GB. floor(166 / 105) = 1 request (with 61GB remaining). For 2 concurrent 128K requests: need 26 + 2×105 = 236GB — requires 2× MI300X (TP=2 not needed for weight, but needed for KV cache). MI300X is the only single-card option that can serve 128K context at all — and even then, only 1 request at a time. This is a case where H100 and A100 are architecturally unsuitable regardless of compute performance.'
  common_mistake: |
    **The Pitfall:** Calculating KV cache for a single layer.
    **The Rationale:** Candidates forget that the KV cache must be stored across all Transformer layers, not just one.
    **The Consequence:** The candidate underestimates memory requirements by 40x and promises the client that an A100 can serve the 128K context.
  napkin_math: |
    *   **KV per token (all layers):** 20 KB/layer × 40 layers = 800 KB/token.
    *   **Total KV cache for 128K:** 800 KB × 128,000 tokens = 102.4 GB per request.
    *   **Weights size:** 13B params × 2 bytes = 26 GB.
    *   **A100/H100 (80GB):** 80 GB - 26 GB = 54 GB available. 54 GB < 102.4 GB. (0 requests).
    *   **MI300X (192GB):** 192 GB - 26 GB = 166 GB available. 166 GB / 102.4 GB = 1.62.
    *   **Result:** A100/H100 can serve **0 requests**. MI300X can serve exactly **1 concurrent request**.
