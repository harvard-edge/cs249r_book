title: Weight-Stationary Tiling DRAM Bandwidth
scenario: You are optimizing the dataflow mapping for an LLM projection layer on a custom cloud TPU. The activation matrix A has shape [16384, 8192] and the weight matrix B has shape [8192, 16384]. Both matrices use BF16 precision (2 bytes/element). The TPU uses a strict Weight-Stationary dataflow, pinning weight tiles into a dedicated 32MB weight SRAM. Since B is larger than 32MB, it must be tiled along the output dimension N.
question: How many GB of DRAM reads are required for activation matrix A under the TPU's 32MB weight-stationary tiling?
details:
  realistic_solution: The correct total is 2.0 GB. First, calculate the size of the weight matrix B (256 MB). Divide this by the 32 MB SRAM capacity to determine there are 8 sequential weight tiles. Since each pinned weight tile requires a full pass over the 256 MB activation matrix A, A is read from DRAM 8 times.
  common_mistake: |
    **The Pitfall:** Assuming the activation matrix is read exactly once.
    **The Rationale:** Candidates simply calculate the size of A (0.25 GB) and mistake it for the total DRAM traffic.
    **The Consequence:** They vastly underestimate the memory bandwidth bottleneck, forgetting that a weight-stationary dataflow requires re-streaming activations for every newly pinned weight tile.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A: [16384, 8192]. B: [8192, 16384]. BF16 (2 bytes).
       - TPU Weight SRAM: 32 MB.
    2. **Calculations:**
       - Size B: 8192 * 16384 * 2 bytes = 256 MB.
       - Weight Tiles: 256 MB / 32 MB = 8 tiles.
       - Size A: 16384 * 8192 * 2 bytes = 256 MB.
       - Total A Reads: 256 MB * 8 tiles = 2048 MB.
    3. **Conclusion & Interpretation:**
       - **Total DRAM reads required for activation matrix A is 2.0 GB. Result: Memory-Bound.**
