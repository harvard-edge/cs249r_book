title: Evaluating FP8 Trade-offs in MLPerf Time-to-Train
scenario: You are preparing an official MLPerf Training v4.0 submission for an LLM on a 1024x H100 cluster. The baseline BF16 training achieves a step time of 2.0s and converges to the target quality in exactly 50,000 steps. Switching to FP8 precision reduces the step time to 1.2s, but introduces statistical inefficiency, requiring 70,000 steps to reach the identical target perplexity.
question: Should you adopt FP8 for the MLPerf LLM submission given 1.2s steps but 70,000 convergence steps?
details:
  realistic_solution: Calculate the absolute Time-to-Train (TTT) for both configurations. The MLPerf primary metric is wall-clock time to target quality, not raw throughput. By multiplying the step time by the required steps to converge, we determine the actual TTT. Despite requiring 40% more steps due to FP8's statistical degradation, the 40% reduction in step time outpaces the convergence penalty, resulting in a lower overall wall-clock time. FP8 should be adopted.
  common_mistake: |
    **The Pitfall:** Focusing solely on the raw hardware throughput increase (Tokens/sec or MFU) and assuming step-time reduction linearly translates to benchmarking victory.
    **The Rationale:** Candidates often forget that MLPerf strictly measures 'Time to Train' to a specific convergence target, penalizing statistical inefficiency.
    **The Consequence:** The team might adopt a mathematically inefficient configuration that achieves high FLOPs but takes longer to actually reach the target quality.
  napkin_math: |
    - Calculate BF16 Time-to-Train (TTT): 2.0s/step * 50,000 steps = 100,000 seconds (~27.7 hours).
    - Calculate FP8 Time-to-Train (TTT): 1.2s/step * 70,000 steps = 84,000 seconds (~23.3 hours).
    - Calculate savings: 100,000s - 84,000s = 16,000 seconds saved.
    - **Calculate overall MLPerf speedup: 100,000 / 84,000 = 1.19x speedup, meaning FP8 should be adopted.**
