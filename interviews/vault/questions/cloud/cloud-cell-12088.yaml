title: 'Model Size Estimation: Realize Memory Budget for Multi-Modal LLM on H100'
scenario: 'Concretely size the memory requirements for a multi-modal LLM (LLaVA-13B architecture) on H100
  (80GB HBM3). Components: (1) CLIP ViT-L/14 vision encoder (307M params FP16), (2) MLP projection layer
  (20M params FP16), (3) LLaMA-2-13B language model (13B params FP16), (4) KV-cache for 4096-token context
  at batch 8. Verify fit and compute maximum batch size.'
details:
  realistic_solution: 'Vision encoder: 307M × 2B = 614MB ≈ 0.6GB. MLP projection: 20M × 2B = 40MB. LLaMA-2-13B:
    13B × 2B = 26GB. KV-cache (batch=8, seq=4096, 40 layers, MHA 40 heads): 8×4096×2×40×128×2B×40 = 8×4096×800KB
    = 26.2GB. Total: 0.6+0.04+26+26.2 = 52.84GB < 80GB ✓. Maximum batch: (80-26.6)/800KB/4096 = 53.4GB/3.2GB
    per request = 16.7 → batch=16. Check: 16×4096×800KB=52.4GB. Total: 26.6+52.4=79GB ✓.'
  common_mistake: Sizing only the language model and ignoring the vision encoder, which adds 614MB (307M
    × 2B) — significant but not the binding constraint here.
  napkin_math: 'Vision: 614MB. LM: 26GB. KV at batch=8, seq=4096: 8×4096 tokens × 800KB/token = 26.2GB.
    Total: 52.8GB < 80GB. Max batch for full 4096 ctx: (80-27.2)GB / (4096 tokens × 800KB/token per request)
    = 52.8GB / 3.2GB = 16.5 → batch=16. Total: 27.2+16×3.2=78.4GB ✓.'
