title: Optimizing LLM Deployment with INT8 Quantization on AMD MI300X
scenario: Your team is tasked with deploying a state-of-the-art large language model (LLM), originally trained in FP16 and consuming 100GB of memory, on an AMD MI300X accelerator. The MI300X boasts 192 GB HBM3, 1,307 TFLOPS FP16 dense compute, and 5.3 TB/s memory bandwidth.
question: What technical steps and tradeoffs would you consider to convert the 100 GB FP16 LLM to INT8 on an MI300X?
details:
  realistic_solution: 'A realistic solution would involve: 1. **Profiling & Sensitivity Analysis**: Identify layers most sensitive to quantization error. 2. **Calibration Strategy**: Choose between Post-Training Quantization (PTQ) with a representative dataset (e.g., using min-max, KL-divergence, or advanced percentile calibration) and Quantization-Aware Training (QAT) if fine-tuning resources are available and higher accuracy is paramount. 3. **Granularity Selection**: Determine whether per-tensor or per-channel quantization is more appropriate for weights and activations, often driven by distribution statistics and hardware acceleration capabilities of the MI300X. 4. **Toolchain Integration**: Leverage AMD''s ROCm framework and libraries that support INT8 inference, ensuring proper kernel utilization. 5. **Validation**: Rigorously validate the quantized model''s accuracy (e.g., perplexity, specific task metrics) and performance against FP16 baselines on the target hardware. 6. **Deployment Optimization**: Ensure efficient data loading, batching, and kernel fusion to maximize MI300X throughput.'
  common_mistake: |
    **The Pitfall:** Naive application of zero-point arithmetic without profiling.
    **The Rationale:** Candidates assume uniform INT8 performance gains and blindly apply simple min-max quantization.
    **The Consequence:** Severe accuracy degradation due to outliers, and suboptimal kernel utilization on the MI300X.
  napkin_math: |
    *   **Memory Savings:** FP16 (100 GB) -> INT8 (50 GB).
    *   **Freed VRAM:** 50 GB. This directly allows doubling the KV cache capacity or batch size.
    *   **Compute Boost:** MI300X INT8 theoretical throughput is often 2x FP16 (e.g., ~2,614 TOPS vs 1,307 TFLOPS).
    *   **Bandwidth Efficiency:** 5.3 TB/s bandwidth is heavily utilized due to half the data movement per parameter.
    *   **Result:** INT8 unlocks massive concurrency and throughput, provided calibration maintains accuracy.
