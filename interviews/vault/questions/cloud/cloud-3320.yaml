title: Optimizing LLM Deployment with INT8 Quantization on AMD MI300X
scenario: Your team is tasked with deploying a state-of-the-art large language model (LLM), originally trained in FP16 and consuming 100GB of memory, on an AMD MI300X accelerator.
question: What technical steps and tradeoffs would you consider to convert the 100 GB FP16 LLM to INT8 on an MI300X?
details:
  realistic_solution: 'A realistic solution would involve: 1. **Profiling & Sensitivity Analysis**: Identify layers most sensitive to quantization error via nsys profiling. 2. **Calibration Strategy**: Choose between Post-Training Quantization (PTQ) with a representative dataset and Quantization-Aware Training (QAT). 3. **Granularity Selection**: Determine whether per-tensor or per-channel quantization is appropriate. 4. **Toolchain Integration**: Leverage AMD ROCm framework. 5. **Validation**: Rigorously validate accuracy. 6. **Deployment Optimization**: Ensure efficient batching and kernel fusion.'
  common_mistake: |
    **The Pitfall:** Naive application of zero-point arithmetic without profiling.
    **The Rationale:** Candidates assume uniform INT8 performance gains and blindly apply simple min-max quantization.
    **The Consequence:** Severe accuracy degradation due to outliers, and suboptimal kernel utilization on the MI300X.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory footprint: 100 GB (FP16).
       - Target hardware: AMD MI300X.
    2. **Calculations:**
       - INT8 memory: 100 GB / 2 = 50 GB.
       - Freed VRAM = 50 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. INT8 unlocks massive concurrency and throughput.**
