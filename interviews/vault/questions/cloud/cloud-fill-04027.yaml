title: Feature Store Freshness SLAs for Time-Sensitive Models
scenario: 'You are designing feature freshness SLAs for a fraud detection model on H100-backed serving
  infrastructure. The model uses three feature types: (1) real-time transaction features (last 5 transactions,
  updated per event), (2) hourly aggregated spending patterns, (3) monthly user risk scores. Describe
  the appropriate freshness requirement for each and how to enforce it in the feature store.'
details:
  realistic_solution: 'Freshness tiers: (1) Real-time features: freshness SLA < 5 seconds, use event-driven
    streaming writes to Redis (Kafka → Flink → Redis). (2) Hourly features: freshness SLA < 15 minutes,
    compute with micro-batch Spark every 15 min, write to Redis. (3) Monthly features: freshness SLA <
    2 hours, nightly batch with alerting if pipeline misses. Enforce via freshness metadata and serving-layer
    staleness checks that degrade gracefully.'
  common_mistake: Applying a uniform freshness requirement to all features. Using a 1-hour refresh for
    real-time transaction features defeats the purpose (fraud can happen in seconds); refreshing monthly
    risk scores every 5 seconds wastes compute and adds no value.
  napkin_math: 'Real-time feature write throughput: 50K transactions/second × 5 features × 100 bytes =
    25 MB/s to Redis. Redis write throughput: ~1M ops/sec per node at 100 bytes each = 100 MB/s. Need
    1 Redis node for writes. Hourly feature recompute: 100M users × 20 features × 4 bytes = 8 GB materialization.
    Spark at 10 GB/s: 0.8 seconds to compute + 8 GB / 1 GB/s Redis write = 8 seconds per micro-batch.
    Achievable in 15-minute window.'
