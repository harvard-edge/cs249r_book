title: Multi-modal Candidate Generation at Billion-Scale
scenario: Design the candidate generation layer for Instagram Reels. We have a corpus of 10s of billions
  of videos, each with distinct video, audio, and text features. The retrieval system needs to fetch the
  top 1000 relevant candidates for a user in under 50ms at a peak load of 100,000 QPS. How do you design
  the embedding architecture, index, and serving infrastructure to support multi-modal retrieval at this
  scale?
question: "How do you design the embedding architecture, index, and serving infrastructure to support multi-modal retrieval at this scale?"
details:
  realistic_solution: 'Use a Two-Tower architecture with early fusion on the item side to project user
    history and multi-modal item features into a single, shared embedding space offline. Partition the
    corpus into tiered Approximate Nearest Neighbor (ANN) indexes (e.g., FAISS IVFPQ or HNSW): a "hot"
    index for recent/viral content kept in RAM, and a "warm/cold" index on SSDs. Implement a two-phase
    retrieval where the fast "hot" index handles the bulk of real-time requests. To maintain P99 latency
    during traffic spikes, implement graceful degradation (e.g., dynamically reducing the beam width/search
    probes in the ANN index).'
  common_mistake: Proposing late-fusion of separate text, video, and audio embeddings at inference time
    and performing multiple nearest-neighbor searches per modality. This causes explosive fan-out, unpredictable
    tail latencies, and easily violates the 50ms SLA at 100k QPS.
  napkin_math: Corpus = 10B videos. "Hot" corpus = 1B videos. Embedding size = 256 dimensions (float16
    = 512 bytes). 1B * 512B = 512GB of raw vectors. With IVFPQ index compression, this drops to ~50GB,
    easily fitting in the RAM of a single node. However, to handle 100,000 QPS, we are compute-bound.
    Assuming 1 node can handle 2,000 QPS for ANN search, we need 50 replicas of the hot index (50 nodes
    total) purely for query throughput.
