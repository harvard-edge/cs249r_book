title: 'Fluency: Translating a PyTorch DDP Job into a Kubernetes Manifest'
scenario: 'A researcher hands you a `torchrun --nproc_per_node=8 --nnodes=4 --rdzv_backend=c10d train.py` launch command. They need it translated into a production Kubernetes manifest using the Training Operator''s `PyTorchJob` CRD. They have a prebuilt image and need the job to use node affinity and request 8 GPUs per worker pod.'
question: "How would you translate the 4-node, 8-GPU-per-node torchrun command into a Training Operator PyTorchJob manifest?"
details:
  realistic_solution: 'Use `kind: PyTorchJob` with `replicaSpecs.Worker.replicas: 4`, `replicaSpecs.Worker.template.spec.containers[0].resources.limits[''nvidia.com/gpu'']: 8`, and `pytorchReplicaSpecs.Worker.restartPolicy: OnFailure`. Set `rdzvBackend: c10d` in the container env. Add `nodeAffinity` under `template.spec.affinity` to match the accelerator type. The operator automatically sets `MASTER_ADDR`, `MASTER_PORT`, `RANK`, and `WORLD_SIZE` env vars.'
  common_mistake: |
    **The Pitfall:** Manually constructing StatefulSets with custom rendezvous init containers.
    **The Rationale:** Engineers unfamiliar with the Training Operator assume they must manually replicate the `torchrun` distributed logic in raw Kubernetes primitives.
    **The Consequence:** A fragile, overly complex deployment that fails to handle fault tolerance or native environment variable injection correctly.
  napkin_math: |
    1. **Scale:** 4 nodes * 8 GPUs = 32 GPUs total.
    2. **Gradient Sync:** For a 70B model with 140 GB BF16 gradients, AllReduce over 4 nodes via 400 Gb/s (50 GB/s) IB takes:
       - Time = 140 GB / 50 GB/s * 1.5 = 4.2 s per step at theoretical peak.
    3. **Final Result: The PyTorchJob will orchestrate 32 GPUs across 4 replica specs.**
