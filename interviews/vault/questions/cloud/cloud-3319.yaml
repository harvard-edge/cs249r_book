title: Memory Optimization for LLMs on TPU v5e with Mixed-Precision Quantization
scenario: 'You are developing a strategy to deploy large language models on a Google TPU v5e, which has 16 GB of HBM. A critical challenge is fitting models into this memory. All weights and activations are initially in BF16. Your team is exploring mixed-precision quantization, selectively converting some layers to INT8.'
question: For a 10B parameter model, how many parameters must be quantized from BF16 to INT8 to fit the model within 16 GB of HBM?
details:
  realistic_solution: Utilize a memory profiling tool to accurately measure the BF16 memory consumption of various layers. Implement an iterative post-training static quantization (PTQ) strategy, starting with less sensitive layers or those with the largest memory footprints, and quantizing them to INT8. Validate the model's accuracy on a representative dataset after each iteration. For per-tensor quantization, ensure that scales and zero-points are stored efficiently (e.g., in BF16 or FP16). If accuracy degrades significantly, consider more advanced calibration strategies or switch to quantization-aware training (QAT).
  common_mistake: |
    **The Pitfall:** Failing to account for the overhead of storing quantization parameters, or forgetting the KV cache.
    **The Rationale:** Candidates perform the pure weight math perfectly but ignore the real-world overheads required to actually run inference.
    **The Consequence:** Deploying a model that technically fits its weights into memory but immediately OOMs the moment a single token is processed.
  napkin_math: |
    - Total parameters: x (BF16) + y (INT8) = 10 billion.
    - Memory constraint: 2x + 1y <= 16 GB.
    - Substitute y = 10 - x: 2x + (10 - x) <= 16.
    - x + 10 <= 16 => x <= 6.
    - **Maximum 6 billion parameters can remain in BF16.**
    - **Minimum of y = 10 - 6 = 4 billion parameters must be quantized to INT8.**
