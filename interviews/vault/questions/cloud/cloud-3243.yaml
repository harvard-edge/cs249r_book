title: Diagnosing Underperforming LLM Inference on AMD MI300X
scenario: You are deploying a large language model (LLM) for inference on an AMD MI300X accelerator, which boasts 192 GB HBM3 memory and a theoretical peak performance of 1,300 TFLOPS FP16 dense. The model, when run with a batch size of 1, consistently achieves only 1 TFLOPS FP16, which is significantly lower than expected. Profiling shows high GPU utilization but surprisingly low effective throughput. Memory bandwidth utilization is also suboptimal, hovering around 1 TB/s despite the 5.3 TB/s peak HBM3 bandwidth. What are the potential architectural reasons for this underperformance, considering AMD's GPU execution model (wavefronts, thread blocks, occupancy), Matrix Cores (Tensor Cores equivalent), and memory coalescing?
question: What MI300X architectural factors could explain 1 TFLOPS at batch size 1 despite high utilization and only 1 TB/s HBM bandwidth?
details:
  realistic_solution: "The primary issue is likely a combination of low occupancy and poor memory coalescing due to a small batch size (batch_size=1) not fully saturating the AMD MI300X's extensive compute units and memory channels.\n1.  **Occupancy**: With a small batch size, there might not be enough concurrent wavefronts (AMD's equivalent of NVIDIA's warps) to hide memory latencies and keep the ALUs busy. The solution involves increasing the batch size or ensuring that the kernel launch configuration (thread block size, grid size) provides sufficient work for the GPU.\n2.  **Memory Coalescing**: Small batch sizes often lead to scattered memory accesses, reducing the effectiveness of the 5.3 TB/s HBM3 bandwidth. Data needs to be accessed contiguously by threads within a wavefront to achieve coalesced reads/writes, maximizing bandwidth.\n3.  **Matrix Core Utilization**: While the MI300X offers 1,300 TFLOPS FP16 dense, achieving this requires workloads to be structured for its Matrix Cores. With `batch_size=1`, the matrix dimensions might not be optimal for efficient Matrix Core usage, potentially falling back to general-purpose ALUs or operating at low efficiency.\n4.  **Diagnosis Steps**:\n    *   Examine kernel launch parameters: Check thread block dimensions and grid size. Are there enough active wavefronts?\n    *   Analyze memory access patterns: Use profiling tools (e.g., ROCm profiler) to identify uncoalesced global memory accesses.\n    *   Check Matrix Core usage: Verify if the relevant operations are being dispatched to Matrix Cores and if their input shapes are conducive to high utilization.\n    *   Experiment with larger batch sizes: Observe how throughput scales."
  common_mistake: Jumping directly to optimizing kernel code without first understanding the architectural mismatch. Forgetting to consider the impact of small batch sizes on occupancy and memory access patterns, or overlooking the need for proper data layout for Matrix Core utilization on AMD GPUs.
  napkin_math: 'Effective Throughput = (Actual TFLOPS / Peak TFLOPS) * 100%\n\n    Given: Actual TFLOPS = 1 FP16, Peak TFLOPS = 1300 FP16 (dense).\n\n    Effective Throughput = (1 / 1300) * 100% \\approx 0.08% of peak dense FP16 performance.\n    This indicates significant underutilization.\n\n\n    Memory Bandwidth Utilization = (Actual Bandwidth / Peak Bandwidth) * 100%\n\n    Given: Actual Bandwidth = 1 TB/s, Peak Bandwidth = 5.3 TB/s.\n\n    Memory Bandwidth Utilization = (1 / 5.3) * 100% \\approx 18.8% of peak HBM3 bandwidth.\n    This suggests memory access is not optimal and could be a bottleneck or symptom of poor access patterns.\n\n\n    Low occupancy (e.g., < 50%) directly limits the ability to hide memory latencies and fully utilize compute units. If each wavefront fetches 64 bytes of uncoalesced data instead of 256 bytes (hypothetically, depending on architecture and access patterns), the effective bandwidth can drop significantly, despite high HBM3 theoretical peak. The actual memory access efficiency for a `batch_size=1` scenario might involve many small, uncoalesced transfers, preventing the GPU from reaching its potential.'
