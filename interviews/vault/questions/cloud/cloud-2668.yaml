title: Model Caching in Multi-Model Serving
scenario: A serving platform hosts 200 models but GPU VRAM can hold only 20. Explain why a model caching
  strategy is needed and how it differs from traditional web caching.
details:
  realistic_solution: 'Model caching addresses the mismatch between the number of deployed models and
    available GPU memory. Unlike web caching where cache misses cost ~100ms (fetch from origin server),
    model cache misses cost 2-30 seconds (load model weights from CPU RAM or SSD to GPU VRAM). This 100-1000x
    penalty makes cache policy critical. Key differences from web caching: (1) Load cost asymmetry — loading
    a 7B model (14GB) at PCIe 4.0 (32 GB/s) takes ~0.4s, but larger models or SSD loading takes 2-30s.
    (2) Cache entry size varies enormously — models range from 50MB to 140GB, unlike uniform web objects.
    (3) Eviction impact is severe — evicting a model means ALL subsequent requests for that model incur
    the load penalty until reloaded. (4) Warmup matters — the first inference after loading may be slower
    (JIT compilation, CUDA kernel caching). LRU eviction is common but frequency-based (LFU) or priority-weighted
    policies often perform better for serving.'
  common_mistake: Using simple LRU eviction without considering model size. Evicting one 70B model frees
    space for multiple small models, but LRU doesn't account for size-to-frequency ratios.
  napkin_math: '200 models, 20 fit in VRAM. If traffic is Zipfian (top 20 models = 80% traffic), cache
    hit rate ≈ 80%. Miss penalty: 2-30s vs hit: 20ms. Effective mean latency ≈ 0.8×20ms + 0.2×5s = 1.02s.
    Note: p50 (median) latency is 20ms since >50% of requests are cache hits; 1.02s is the mean, not p50.'
