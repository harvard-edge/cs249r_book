title: 'Bisection Bandwidth at Each Level'
scenario: 'A 3-tier fat-tree network has 400 Gbps links. Each leaf switch has 32 ports: 16 down to nodes, 16 up to spine. You have 256 nodes across 16 leaf switches.'
question: 'For a 3-tier fat-tree with 400 Gbps links, 16 leaves, and 256 nodes, what are the bisection bandwidth and per-node AllReduce bandwidth?'
details:
  realistic_solution: 'Each leaf switch has 16 uplinks at 400 Gbps = 6.4 Tbps uplink capacity per leaf. With 16 leaf switches, half the cluster (8 leaves, 128 nodes) must communicate with the other half. The bisection bandwidth is determined by the spine layer: in a full-bisection fat-tree, the spine provides enough paths that the bisection bandwidth equals the aggregate host bandwidth. 16 leaves × 16 uplinks × 400 Gbps = 102.4 Tbps total spine capacity. Bisection bandwidth = 102.4/2 = 51.2 Tbps. Per-node bisection bandwidth: 51.2 Tbps / 128 nodes = 400 Gbps per node — exactly one link''s worth, confirming full bisection bandwidth. For an AllReduce splitting the cluster: each node gets the full 400 Gbps for cross-half communication.'
  common_mistake: |
    **The Pitfall:** Confusing total uplink bandwidth with the strict definition of bisection bandwidth.
    **The Rationale:** Candidates often just sum all the links in the network rather than finding the minimum bandwidth across the cut that divides the network perfectly in half.
    **The Consequence:** Overstating or misrepresenting the network's ability to handle global collective operations like AllReduce.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-tier fat-tree, 400 Gbps links
    - 16 leaf switches, each with 16 uplinks
    - 256 total nodes (16 nodes per leaf)

    **Calculations:**
    - Spine Capacity = 16 leaves * 16 uplinks * 400 Gbps = 102.4 Tbps
    - Bisection Bandwidth = 102.4 Tbps / 2 = 51.2 Tbps
    - Per-Node Bandwidth = 51.2 Tbps / 128 nodes = 400 Gbps per node

    **Conclusion & Interpretation:**
    - **Result: 400 Gbps per node (Bandwidth-Bound)**. The topology provides full non-blocking bisection bandwidth, perfect for cross-half communication during AllReduce.
