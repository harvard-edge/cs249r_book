title: Masked Autoencoder Pre-training Compute Optimization
scenario: You are pre-training a Vision Transformer (ViT-L) using the Masked Autoencoder (MAE) self-supervised learning paradigm on a cloud cluster of A100 GPUs. The dataset consists of 1.2 million unlabelled images. A standard contrastive SSL approach processes 100% of the image patches, requiring 30 TFLOPs per image per training step. MAE uses an asymmetric encoder-decoder architecture with a 75% masking ratio. The encoder compute scales linearly with the number of unmasked patches, and the lightweight decoder requires a fixed 2 TFLOPs per image.
question: How many ExaFLOPs per epoch does MAE save versus full-patch training with 75% masking, 30 TFLOPs baseline, 2 TFLOPs decoder, and 1.2M images?
details:
  realistic_solution: Calculate the MAE compute per image by scaling the encoder FLOPs to 25% of the baseline (30 * 0.25 = 7.5 TFLOPs) and adding the decoder overhead (2 TFLOPs), totaling 9.5 TFLOPs. Subtract this from the baseline to find the per-image savings, then multiply by the dataset size.
  common_mistake: |
    **The Pitfall:** Assuming a 75% masking ratio yields exactly a 75% total compute reduction.
    **The Rationale:** Candidates do a naive percentage multiplication based purely on the encoder.
    **The Consequence:** They neglect the fixed computational overhead of the decoder, slightly overestimating the actual compute savings.
  napkin_math: |
    - **Standard Compute:** 30 TFLOPs / image.
    - **MAE Encoder Compute (25% unmasked):** 30 × 0.25 = 7.5 TFLOPs.
    - **MAE Total Compute:** 7.5 + 2 (decoder) = 9.5 TFLOPs / image.
    - **Savings per image:** 30 - 9.5 = 20.5 TFLOPs.
    - **Total savings per epoch:** 20.5 × 10¹² FLOPs × 1.2 × 10⁶ images = 24.6 × 10¹⁸ FLOPs = **24.6 ExaFLOPs.**
