title: Evaluating 2.5D Silicon Interposer Trade-offs
scenario: Your team is designing a custom datacenter accelerator for serving trillion-parameter LLMs. You must choose the packaging technology: an organic substrate supporting GDDR6 with 1.2 TB/s total bandwidth, or a 2.5D integration using a silicon interposer (like TSMC's CoWoS) connecting the compute die to 6 stacks of HBM3e offering 4.8 TB/s. The silicon interposer introduces a severe reticle size limit (~3x reticle, max 2500 mm^2) and adds $200 to the unit manufacturing cost.
question: "Which packaging option should you choose for memory-bound trillion-parameter LLM inference, and how does it affect TCO?"
details:
  realistic_solution: Justify the silicon interposer by evaluating the performance-per-TCO at the fleet level. Since LLM inference (specifically the decoding phase) is constrained by memory bandwidth, the 4.8 TB/s HBM3e setup provides 4x the throughput of the GDDR6 setup. The additional $200 packaging cost is negligible compared to the total server node cost (typically $15,000+). The interposer essentially provides a 400% performance gain for a roughly 1.3% increase in system cost.
  common_mistake: |
    **The Pitfall:** Focusing heavily on the $200 unit cost increase and reticle size limitations without quantifying the system-level TCO impact.
    **The Rationale:** Hardware-focused engineers often fixate on component-level costs and manufacturing difficulty.
    **The Consequence:** Rejecting the interposer design based on component cost, ultimately deploying a vastly inferior system that requires 4x as many servers to achieve the same throughput.
  napkin_math: |
    - Base Server Cost = $15,000. Accelerator w/ GDDR6 = $1,500. Accelerator w/ Interposer = $1,700.
    - Total Node Cost: $16,500 vs $16,700 (+1.2%).
    - Node Bandwidth: 1.2 TB/s vs 4.8 TB/s (+300%).
    - TCO per token throughput = $16,500 / 1.2 = $13,750 per TB/s vs $16,700 / 4.8 = $3,479 per TB/s.
    - **The silicon interposer provides a 400% performance gain for a 1.2% cost increase, yielding a ~3.95x better TCO efficiency.**
