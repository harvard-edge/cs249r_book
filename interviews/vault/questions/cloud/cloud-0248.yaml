title: The Adam Optimizer Memory Footprint
scenario: A team wants to fine-tune an 8 billion parameter language model using the Adam optimizer with
  mixed precision (FP16 parameters/gradients, FP32 optimizer states). They have a single server with one
  80 GB H100 GPU. Explain whether the model and its optimizer states will fit into GPU memory, ignoring
  activations and the KV-cache for now.
question: "Will an 8B model fine-tuned with mixed-precision Adam fit in one 80 GB H100 if you ignore activations and KV-cache?"
details:
  realistic_solution: It will not fit. A reliable rule of thumb for mixed-precision training with Adam
    is that it requires approximately 16 bytes per model parameter. This accounts for FP16 parameters
    (2 bytes), FP16 gradients (2 bytes), and two 32-bit (4-byte) optimizer states (momentum and variance)
    plus a 32-bit master copy of the parameters, which are often maintained in FP32 for stable updates.
  common_mistake: Engineers often only account for the model parameters' size (e.g., 8B params × 2 bytes/param
    = 16 GB), completely forgetting the substantial memory required for gradients and the Adam optimizer's
    momentum and variance tensors.
  napkin_math: '1. Model parameters: 8 billion (8B).

    2. Mixed-precision Adam requires ~16 bytes per parameter: FP16 weights (2B), FP16 gradients (2B),
    FP32 master weights (4B), FP32 momentum (4B), FP32 variance (4B).

    3. Total memory for states = 8B * 16 bytes = 128 GB.

    4. An H100 has 80 GB of HBM3 memory.

    128 GB > 80 GB, so the model and optimizer states will not fit on a single GPU.'
  options:
  - Yes, it fits. It only needs ~16 GB.
  - Yes, it fits. It needs ~64 GB.
  - No, it does not fit. It needs ~128 GB.
  - Yes, it fits. It needs ~32 GB.
  correct_index: 2
