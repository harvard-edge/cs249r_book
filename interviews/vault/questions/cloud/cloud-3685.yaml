title: Bin-Packing GPU Jobs to Minimize Fragmentation
scenario: 'Your 512-GPU A100 cluster scheduler uses First-Fit bin-packing to assign jobs. A workload audit shows 18% GPU fragmentation: 92 GPUs are allocated but underutilized (< 5% GPU util) because jobs request 8 GPUs but only use 6.'
question: What is the cost of the 18% GPU fragmentation, and what allocation strategy would reduce over-provisioned 8-GPU jobs?
details:
  realistic_solution: 'Implement utilization-aware gang scheduling using Best-Fit Decreasing (BFD) bin-packing instead of First-Fit to reduce fragmentation. Add a rightsizing daemon that monitors NVML util and flags over-provisioned jobs.'
  common_mistake: |
    **The Pitfall:** Accepting user-declared GPU counts at face value without enforcing actual utilization.
    **The Rationale:** Users pad their GPU requests to ensure they don't get preempted, and schedulers lacking utilization feedback accommodate them.
    **The Consequence:** Systematic over-allocation leading to massive financial waste and artificial cluster capacity limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wasted GPUs: 92 (18% of 512).
       - GPU Cost: $2.50/GPU-hour.
       - BFD optimization reduces fragmentation to 5%.
    2. **Calculations:**
       - Hourly waste: 92 GPUs * $2.50/hour = $230/hour.
       - Annual waste: $230/hour * 24 * 365 = $2,014,800/year.
       - Recovered GPUs (BFD at 5% waste): 512 * 0.13 = ~67 GPUs recovered.
    3. **Conclusion & Interpretation:**
       **Result: ~$2M/Year Waste (Resource-Bound).** Switching to Best-Fit Decreasing (BFD) bin-packing reclaims 67 GPUs and saves $2 million annually.
