title: Checkpoint Storm Mitigation Strategy
scenario: 'Your multi-tenant GPU cluster runs 50 training jobs. During peak hours, 10+ jobs checkpoint
  simultaneously, causing a ''filesystem brownout'' that degrades all I/O for 15 minutes. Options: (A)
  stagger checkpoint schedules across jobs, (B) checkpoint to local NVMe first then async-copy to shared
  FS, (C) deploy a dedicated checkpoint storage tier. Evaluate.'
details:
  realistic_solution: 'Option A (staggered schedules): reduces peak I/O by spreading writes over time.
    But maintaining a global checkpoint schedule across 50 independent jobs is brittle — jobs start/stop,
    intervals drift, and the scheduler becomes a single point of failure. Helps somewhat but does not
    solve the fundamental problem. Option B (local NVMe + async copy): each GPU writes to fast local NVMe
    (3-7 GB/s per node), which completes in seconds. Then a background daemon copies to shared storage
    at a throttled rate. Training resumes immediately after local write. This decouples checkpoint latency
    from shared FS bandwidth. The risk: if the node dies before async copy completes, the checkpoint is
    lost — mitigate with replication to a peer node. Option C (dedicated storage tier): expensive infrastructure
    ($100K+) but provides guaranteed bandwidth. Recommendation: B is the best cost/benefit — it nearly
    eliminates checkpoint-induced training pauses and requires minimal coordination. Add A as a complementary
    soft measure.'
  common_mistake: Only staggering checkpoints (A). This helps but is fragile — job start times drift,
    new jobs arrive, and maintaining a global schedule across independent jobs is operationally complex.
  napkin_math: 'Local NVMe write: 280MB at 3GB/s = 0.1s (instant). Async copy at 1GB/s throttled: 280MB
    in 0.3s background. Training resumes in <1s vs 15 min brownout.'
