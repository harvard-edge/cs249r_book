title: Cloud Weight Stationary L5 0
scenario: 'You are choosing a dataflow for a custom inference accelerator targeting two workloads: (A)
  70B LLM decode at batch=1, (B) vision model (ResNet-50) at batch=256. Evaluate weight-stationary vs.
  output-stationary for each.'
question: "Which dataflow would you choose for 70B LLM batch-1 decode versus ResNet-50 batch-256 inference, and why?"
details:
  realistic_solution: 'Workload A (70B decode, batch=1): Weights dominate traffic — 140 GB read per token,
    activations are tiny (single token). Weight-stationary is ideal: load weights once, stream the single
    input. Reuse factor for weights = 1 (no batch reuse), but weights are the bottleneck so minimizing
    their movement is critical. Workload B (ResNet-50, batch=256): weights are small (~50 MB) and reused
    256× across the batch. Output-stationary is better: keep partial sums local, stream weights and inputs.
    Weight reuse from batching already amortizes weight traffic. Verdict: no single dataflow is optimal
    for all workloads. A reconfigurable dataflow or separate accelerators per workload class is ideal.'
  common_mistake: Selecting one dataflow for all workloads. LLM decode (weight-dominated, batch=1) and
    vision inference (activation-dominated, large batch) have opposite memory traffic patterns and need
    different dataflow strategies.
  napkin_math: '70B decode: 140 GB weights, ~4 KB activations per token. Weight:activation ratio = 35,000,000:1.
    Weight-stationary wins. ResNet batch=256: 50 MB weights × 1 load vs. 256 × 25 MB activations. Activation
    traffic dominates. Output-stationary saves 256 partial sum writes.'
