title: Cloud Weight Stationary L5 0
scenario: 'You are choosing a dataflow for a custom inference accelerator targeting two workloads: (A) 70B LLM decode at batch=1, and (B) vision model (ResNet-50) at batch=256.'
question: 'Which dataflow (weight-stationary or output-stationary) would you choose for 70B LLM batch-1 decode versus ResNet-50 batch-256 inference, and why?'
details:
  realistic_solution: 'Workload A (70B decode): Weights dominate traffic so minimizing weight movement is critical, making Weight-Stationary ideal. Workload B (ResNet-50, batch=256): Weights are small and reused 256x, but activation traffic is massive. Output-Stationary keeps partial sums local, amortizing the cost. No single dataflow is optimal for all workloads.'
  common_mistake: |
    **The Pitfall:** Selecting a single dataflow architecture for all workloads.
    **The Rationale:** Assuming one dataflow (e.g., Weight Stationary) is universally optimal for inference because model weights are generally static.
    **The Consequence:** Massive energy inefficiency and memory bandwidth bottlenecks when running activation-heavy or high-batch workloads on a weight-stationary architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B Decode (Batch=1): ~140 GB weights vs ~4 KB activations.
    - ResNet-50 (Batch=256): ~50 MB weights vs 256 * 25 MB activations.

    **Calculations:**
    - 70B Decode: Weight-to-activation ratio is ~35,000,000:1. Minimizing weight movement is critical.
    - ResNet-50: Activation traffic dominates. Keeping partial sums local saves 256 partial sum writes.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Choose Weight-Stationary for 70B Decode and Output-Stationary for ResNet-50.
