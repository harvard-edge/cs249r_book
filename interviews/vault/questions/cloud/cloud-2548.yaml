title: Cloud Weight Stationary L5 0
scenario: 'You are choosing a dataflow for a custom inference accelerator targeting two workloads: (A) 70B LLM decode at batch=1, and (B) vision model (ResNet-50) at batch=256.'
question: "Which dataflow (weight-stationary or output-stationary) would you choose for 70B LLM batch-1 decode versus ResNet-50 batch-256 inference, and why?"
details:
  realistic_solution: 'Workload A (70B decode, batch=1): Weights dominate traffic — 140 GB read per token, activations are tiny (single token). Weight-stationary is ideal: load weights once, stream the single input. Reuse factor for weights = 1 (no batch reuse), but weights are the bottleneck so minimizing their movement is critical. Workload B (ResNet-50, batch=256): weights are small (~50 MB) and reused 256× across the batch. Output-stationary is better: keep partial sums local, stream weights and inputs. Weight reuse from batching already amortizes weight traffic. Verdict: no single dataflow is optimal for all workloads. A reconfigurable dataflow or separate accelerators per workload class is ideal.'
  common_mistake: |
    **The Pitfall:** Selecting a single dataflow architecture for all workloads.
    **The Rationale:** Assuming one dataflow (e.g., Weight Stationary) is universally optimal for inference because model weights are generally static.
    **The Consequence:** Massive energy inefficiency and memory bandwidth bottlenecks when running activation-heavy or high-batch workloads on a weight-stationary architecture.
  napkin_math: |
    1. **70B Decode (Batch=1):** ~140 GB weights vs ~4 KB activations per token. Weight-to-activation ratio is ~35,000,000:1. Minimizing weight movement is critical.
    2. **ResNet-50 (Batch=256):** ~50 MB weights loaded once vs 256 * 25 MB activations. Activation traffic dominates. Keeping partial sums local saves 256 partial sum writes.
    - **Conclusion:** **Weight-Stationary for 70B Decode, Output-Stationary for ResNet-50.**
