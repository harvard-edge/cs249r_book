title: Cloud New 0022
scenario: Architect a FinOps-aware scheduling platform for training a 100B parameter model. You have a mixed fleet of reserved on-demand H100s and highly volatile spot V100s.
question: "How would you schedule 100B training across reserved H100s and volatile spot V100s to reduce cost while guaranteeing progress?"
details:
  realistic_solution: Design an asymmetric data-parallel scheduler. Reserve the stable H100s as the core parameter servers and primary compute ring, guaranteeing a baseline progression rate. Attach the spot V100s as ephemeral workers using asynchronous stochastic gradient descent (ASGD). Implement gradient clipping to handle the staleness.
  common_mistake: |
    **The Pitfall:** Putting volatile spot V100s and reserved H100s into a single synchronous training pipeline or Ring All-Reduce.
    **The Rationale:** Candidates attempt to treat a highly heterogeneous and unstable fleet like a clean, homogeneous supercomputer.
    **The Consequence:** The 989 TFLOPS H100s spend all their time waiting on the much slower 125 TFLOPS V100s, crippling the primary cluster's throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 100B parameters (~200GB weights).
       - H100s: Reserved, stable, fast (989 TFLOPS).
       - V100s: Spot, volatile, slow (125 TFLOPS).
       - V100 spot price: ~$1/hr; H100 on-demand price: ~$10/hr.
    2. **Calculations:**
       - TP on 32GB V100: requires TP=8 to fit model.
       - TP on 80GB H100: requires TP=4.
       - Adding 64 V100s: 64 * 125 TFLOPS = 8 PFLOPS of extremely cheap compute.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Heterogeneity.** The H100 core provides guaranteed progression via synchronous rings, while the V100s inject 8 PFLOPS of cheap momentum via ASGD without synchronously blocking the fast nodes.
