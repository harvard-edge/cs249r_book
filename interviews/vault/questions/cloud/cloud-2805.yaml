title: Cloud New 0022
scenario: Architect a FinOps-aware scheduling platform for training a 100B parameter model. You have a
  mixed fleet of reserved on-demand H100s and highly volatile spot V100s. Optimize cost while guaranteeing
  progress.
details:
  realistic_solution: Design an asymmetric data-parallel scheduler. Reserve the stable H100s as the core
    parameter servers and primary compute ring, guaranteeing a baseline progression rate. Attach the spot
    V100s as ephemeral workers. Use an asynchronous stochastic gradient descent (ASGD) algorithm. When
    spot V100s are cheap, scale them up to compute gradients on stale weights and push them to the H100s.
    Implement gradient clipping to handle the staleness. If V100s are preempted, the H100 core seamlessly
    continues.
  common_mistake: Putting V100s and H100s into a single synchronous pipeline or Ring All-Reduce, forcing
    the 989 TFLOPS H100s to wait on the 125 TFLOPS V100s.
  napkin_math: 100B model = 200GB. V100 has 32GB, requires TP=8. H100 has 80GB, requires TP=4. V100 spot
    price is ~$1/hr, H100 on-demand is ~$10/hr. ASGD on 64 V100s adds ~8 PFLOPS compute for cheap, accelerating
    the expensive H100 cluster baseline.
