title: Cloud New 0022
scenario: Architect a FinOps-aware scheduling platform for training a 100B parameter model. You have a mixed fleet of reserved on-demand H100s and highly volatile spot V100s.
question: "How would you schedule 100B training across reserved H100s and volatile spot V100s to reduce cost while guaranteeing progress?"
details:
  realistic_solution: Design an asymmetric data-parallel scheduler. Reserve the stable H100s as the core parameter servers and primary compute ring, guaranteeing a baseline progression rate. Attach the spot V100s as ephemeral workers. Use an asynchronous stochastic gradient descent (ASGD) algorithm. When spot V100s are cheap, scale them up to compute gradients on stale weights and push them to the H100s. Implement gradient clipping to handle the staleness. If V100s are preempted, the H100 core seamlessly continues.
  common_mistake: |
    **The Pitfall:** Putting volatile spot V100s and reserved H100s into a single synchronous training pipeline or Ring All-Reduce.
    **The Rationale:** Candidates attempt to treat a highly heterogeneous and unstable fleet like a clean, homogeneous supercomputer.
    **The Consequence:** The 989 TFLOPS H100s spend all their time waiting on the much slower 125 TFLOPS V100s, crippling the primary cluster's throughput.
  napkin_math: |
    1. 100B model weights = ~200GB.
    2. A 32GB V100 requires Tensor Parallelism = 8 to fit the model. An 80GB H100 requires TP = 4.
    3. V100 spot price is ~$1/hr; H100 on-demand is ~$10/hr.
    4. Adding 64 V100s via ASGD injects ~8 PFLOPS of extremely cheap compute.
    **The H100 core provides guaranteed progression, while the V100s inject cheap momentum without synchronously blocking the fast nodes.**
