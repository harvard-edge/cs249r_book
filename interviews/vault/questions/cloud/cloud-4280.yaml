title: 'RLHF Infrastructure: PPO Training Pipeline Architecture'
scenario: You must design the infrastructure for PPO-based RLHF on a 7B policy model.
question: "What four models are needed for PPO RLHF on a 7B policy, and how would you schedule them across 8 H100s?"
details:
  realistic_solution: 'PPO-RLHF requires: (1) policy model (trained), (2) reference model (frozen, for KL penalty), (3) reward model, (4) critic/value model. Strategy: colocate reference and policy on same GPUs (reference is frozen, no optimizer states); run reward model on separate GPU subset only during rollout phase; use frozen reference in inference mode to halve its memory. 8×H100: policy+optimizer on 4 GPUs (tensor parallel), reference on same 4 GPUs (frozen, no optimizer = 2x less memory), reward on 2 GPUs, critic on 2 GPUs.'
  common_mistake: |
    **The Pitfall:** Running all four PPO models (policy, reference, reward, critic) simultaneously on all GPUs.
    **The Rationale:** It is the simplest conceptual layout to map to hardware.
    **The Consequence:** A 4x memory multiplication making RLHF prohibitively expensive and prone to OOM on small clusters.
  napkin_math: |
    1. 7B policy (BF16 + Adam FP32): 14 GB + 56 GB optimizer = 70 GB.
    2. 7B reference (BF16, frozen): 14 GB.
    3. 1B reward model (BF16): 2 GB.
    4. 7B critic (BF16 + Adam): 70 GB.
    5. Total naive: 156 GB. Tensor parallel over 8×H100: 156 GB / 8 = **19.5 GB/GPU**, fitting easily with KV cache memory.
