title: 'RLHF Infrastructure: PPO Training Pipeline Architecture'
scenario: You must design the infrastructure for PPO-based RLHF on a 7B policy model using an 8-GPU node.
question: "What four models are needed for PPO RLHF on a 7B policy, and how would you schedule them across 8 GPUs?"
details:
  realistic_solution: 'PPO-RLHF requires: (1) policy model (trained), (2) reference model (frozen, for KL penalty), (3) reward model, (4) critic/value model. Strategy: colocate reference and policy on same GPUs (reference is frozen, no optimizer states); run reward model on separate GPU subset only during rollout phase; use frozen reference in inference mode to halve its memory. 8 GPUs: policy+optimizer on 4 GPUs (tensor parallel), reference on same 4 GPUs (frozen, no optimizer = 2x less memory), reward on 2 GPUs, critic on 2 GPUs.'
  common_mistake: |
    **The Pitfall:** Running all four PPO models (policy, reference, reward, critic) simultaneously on all GPUs.
    **The Rationale:** It is the simplest conceptual layout to map to hardware.
    **The Consequence:** A 4x memory multiplication making RLHF prohibitively expensive and prone to OOM on small clusters.
  napkin_math: |
    1. **Assumptions & Constraints:** 7B policy, 7B reference, 1B reward, 7B critic. BF16 + Adam FP32.
    2. **Calculations:** 7B policy: 14 GB + 56 GB optimizer = 70 GB. 7B reference (frozen): 14 GB. 1B reward: 2 GB. 7B critic: 70 GB. Total naive = 156 GB. Tensor parallel over 8 GPUs = 156 GB / 8 = 19.5 GB/GPU.
    3. **Conclusion & Interpretation:** **Result: 19.5 GB/GPU.** Memory footprint fits comfortably within standard datacenter GPU capacities.
