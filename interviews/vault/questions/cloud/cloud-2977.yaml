title: 'Fault Tolerance: Specification — Define Recovery Time Objective for LLM Training'
scenario: Write the fault tolerance specification for a $5M, 90-day training run of a 100B model on 512 GPUs. The run costs $3/GPU-hr.
question: What RTO, RPO, checkpoint cadence, storage budget, and recovery SLAs would you set for the 90-day 512-GPU training run?
details:
  realistic_solution: 'Cost model: 512 × $3 × 90 × 24 = $3.32M compute. RTO target: < 30 minutes recovery after failure (< 1% of daily compute time). RPO target: < 1 hour of work lost (< 1% of daily training). Checkpoint: every 45 minutes.'
  common_mistake: |
    **The Pitfall:** Setting RTO and RPO without accounting for the financial cost of lost compute.
    **The Rationale:** Candidates treat checkpoints as standard software backups, ignoring the millions of dollars burnt while GPUs sit idle.
    **The Consequence:** Designing a recovery system that takes hours, wasting tens of thousands of dollars per failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute cost: 512 GPUs * $3/hr = $1,536/hr.
       - Model: 100B params. Checkpoint size: ~400 GB total (ZeRO-3).
       - Checkpoint frequency: every 45 minutes.
    2. **Calculations:**
       - RPO (max lost work): 45 mins = 0.75 hrs * $1,536 = $1,152 lost per failure.
       - Per-GPU checkpoint chunk: 400 GB / 512 = ~781 MB.
       - NVMe Write time (2 GB/s): 781 MB / 2 GB/s = 0.39 seconds.
       - Recovery Time (RTO): 0.39s read + 5min collective init = ~5.5 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: Financial-Bound**. High-frequency (45 min) asynchronous checkpoints to NVMe cost virtually zero time (0.39s) but strictly bound the financial risk of failure to under $1,200.
