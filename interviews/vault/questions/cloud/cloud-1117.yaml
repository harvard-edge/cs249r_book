title: Silent Saturation in Declarative Autoscaling
scenario: 'A machine learning team uses a declarative deployment API (like KServe) to deploy a PyTorch
  CV model on AWS g5.xlarge instances (1x A10G GPU, 4 vCPUs). The manifest abstracts the underlying Kubernetes
  HPA, defining `target_cpu_utilization: 75%` and `max_replicas: 20`. Under normal load (40 QPS), P99
  latency is 15ms. During a marketing event, traffic suddenly spikes to 600 QPS. The declarative autoscaler
  completely fails to add replicas. The single active pod remains running, but P99 latency skyrockets
  to 5000ms and the API gateway starts returning 503 timeouts. CloudWatch shows the instance CPU hovering
  around 15%.'
question: "Why did the CPU-based declarative autoscaler fail at 600 QPS, and what metric should drive scaling instead?"
details:
  realistic_solution: Override the declarative API's default scaling target to use custom metrics representing
    actual workload bottlenecks, such as `gpu_duty_cycle > 80%` or the inference server's native `request_queue_duration`.
  common_mistake: Relying on default CPU or memory thresholds in unified declarative APIs for heterogeneous
    ML workloads, failing to recognize that the accelerator becomes the bottleneck far earlier than the
    host CPU.
  napkin_math: An A10G GPU processes the model in ~15ms (max capacity = 1000ms / 15ms ≈ 66 QPS). Orchestrating
    the PCIe data transfer takes ~1.5ms of vCPU time per request. At the GPU's maximum limit of 66 QPS,
    total CPU compute time is 66 * 1.5ms = 99ms per second. Across 4 vCPUs (4000ms total capacity), overall
    CPU utilization is 99 / 4000 = 2.48%. The GPU hits 100% saturation while the CPU is practically idle,
    meaning the 75% CPU scaling trigger will never be reached.
