title: FP8 Tensor Core Precision on H100 and MI300X
scenario: 'H100 supports FP8 (E4M3 and E5M2) at 1,978 TFLOPS — 2× FP16. MI300X supports FP8 at 2,614 TFLOPS. You want to train a 70B model in FP8 mixed precision.'
question: What H100 FP8 throughput should you use for mixed-precision training when FP16 is 989 TFLOPS, and which FP8 format is best for gradients?
details:
  realistic_solution: 'H100 FP8: 1,978 TFLOPS (exactly 2 × 989 TFLOPS FP16). Use E4M3 for forward pass activations and weights due to better precision, and E5M2 for gradients because the wider dynamic range is required to prevent underflow.'
  common_mistake: |
    **The Pitfall:** Indiscriminately using the E4M3 format for all FP8 tensors, including gradients.
    **The Rationale:** Candidates know E4M3 provides higher precision, but forget it only has 3 mantissa bits and a tiny exponent range.
    **The Consequence:** Gradients that span many orders of magnitude underflow to zero or overflow to NaN, completely halting model convergence.
  napkin_math: |
    1. H100 FP8 Peak: Exactly 2x the 989 TFLOPS FP16 peak = 1,978 TFLOPS.
    2. MI300X FP8 Peak: Exactly 2x the 1,307 TFLOPS FP16 peak = 2,614 TFLOPS.
    3. Execution Time = Compute_Demand (TFLOPs) / Throughput_Rate (TFLOPS).
    **Relying on the correct 1,978 TFLOPS baseline prevents massive cost estimation errors during large-scale training.**
