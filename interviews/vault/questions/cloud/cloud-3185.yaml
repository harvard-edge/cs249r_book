title: Speculative Decoding Cost-Benefit for Serving Economics
scenario: 'Your serving cluster runs 64x H100 ($2/GPU/hr) serving a 70B model at 5K req/s. Current P50 latency: 30ms/tok. Product wants P50 < 15ms/tok (2x improvement). Option A: add speculative decoding (alpha=0.80, K=5, 7B draft). Option B: double the cluster to 128x H100. Compare the annual cost, latency distribution (P50/P99), and operational complexity of each approach.'
question: Should you meet a 15 ms/token P50 target by adding speculation or doubling from 64 to 128 H100s, and what are the cost and tail-latency tradeoffs?
details:
  realistic_solution: 'Option A (speculation): Draft 7B co-located on same GPUs (3.5GB/GPU with TP=8). P50 latency: with alpha=0.80 (median), E[tok]=(1-0.80^6)/0.20=3.69. Round=10ms (draft) + 35ms (verify) = 45ms. P50=45/3.69=12.2ms. Meets target. P99 latency: alpha at P1 (worst requests) ≈ 0.45. E[tok]=(1-0.45^6)/0.55=1.80. P99=45/1.80=25.0ms — roughly same as current P50! Throughput impact: verification costs 6x compute per round, reducing max batch from 80 to ~60 per GPU. Max throughput: may drop 25%, requiring ~80 GPUs to maintain 5K req/s. Cost: 80 x $2 x 8760 = $1.4M/yr. Complexity: draft model maintenance, KV cache for draft, adaptive K tuning. Option B (double cluster): P50: batch per GPU halves, so latency stays ~30ms/tok but throughput headroom allows lower queuing delay. P50 ≈ 25ms. Does NOT meet 15ms target (latency is memory-bandwidth limited, not throughput limited). P99: 28ms. Cost: 128 x $2 x 8760 = $2.24M/yr. Complexity: standard scaling. Verdict: Option A meets the latency target at 37% lower cost. Option B cannot reduce per-token latency below the memory bandwidth limit.'
  common_mistake: Only comparing the steady-state P50. Speculation adds variance to the latency distribution because acceptance rate varies per request, making P99 worse even as P50 improves.
  napkin_math: 'Speculation P50: 12.2ms (meets 15ms). P99: 25.0ms. Cost: $1.4M/yr (80 GPUs). Double cluster P50: 25ms (fails target). Cost: $2.24M/yr. Speculation saves $840K/yr AND meets the SLO.'
