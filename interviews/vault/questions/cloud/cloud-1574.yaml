title: Diagnosing A100 Underutilization in NLP Training
scenario: A team is training a 350M parameter transformer model on a single NVIDIA A100 GPU (19.5 TFLOPs
  FP32 compute, 2.0 TB/s memory bandwidth). They are processing sequences of length 512 with a micro-batch
  size of 2. Despite having plenty of free VRAM (well under the 40GB limit), they observe low GPU utilization
  (~30%) and poor training throughput. They suspect a PyTorch dataloader bottleneck, but profiling shows
  data loading is instantaneous. How would you analyze the root cause of this underutilization?
details:
  realistic_solution: Analyze the arithmetic intensity. A batch size of 2 results in operations that are
    heavily memory-bandwidth bound. The GPU spends most of its time loading weight matrices from HBM rather
    than performing calculations. By increasing the mini-batch size (e.g., to 32 or 64) until VRAM is
    fully utilized, the workload transforms from memory-bound vector operations to compute-bound matrix
    multiplications, significantly improving hardware utilization.
  common_mistake: Focusing solely on dataloader issues, CPU bottlenecks, or suggesting gradient accumulation
    without analyzing the arithmetic intensity of the operations at small batch sizes.
  napkin_math: A100 Ridge Point = 19.5 TFLOPs / 2.0 TB/s ≈ 10 FLOPs/byte. For a linear layer (y=xW), loading
    weights W takes 4 bytes/parameter (FP32). FLOPs = 2 * Batch * Params. Arithmetic Intensity (AI) ≈
    (2 * B * Params) / (4 * Params) = B/2 FLOPs/byte. If B=2, AI = 1 FLOP/byte (highly memory bound).
    To reach the ridge point of 10, we need B/2 ≥ 10, so a batch size of at least 20 is required to become
    compute bound.
