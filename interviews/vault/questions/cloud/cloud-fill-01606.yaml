title: Data-Efficient LLM Training Design on AMD MI300X
scenario: Your team is tasked with designing a training pipeline for a novel large language model (LLM)
  that requires processing an extremely large corpus of data (multi-petabytes) on a cluster of AMD MI300X
  accelerators. Each MI300X offers 192 GB HBM3 memory and 5.3 TB/s memory bandwidth, with a peak of 1,307
  TFLOPS FP16 sparse compute. You've identified that the 'data wall problem' is a critical bottleneck,
  hindering training efficiency and leading to sub-optimal utilization of the MI300X's powerful compute
  capabilities. Propose a comprehensive data selection and processing strategy to maximize the Information-Compute
  Ratio (ICR) and mitigate risks of model collapse, specifically leveraging the MI300X's unique hardware
  characteristics.
details:
  realistic_solution: 'Implement a multi-tier data pipeline involving: 1) Initial large-scale data pruning
    for deduplication, quality filtering, and removal of uninformative samples. 2) Employ coreset selection
    or active learning techniques to identify and prioritize the most impactful data points for model
    training. 3) Adopt curriculum learning to gradually expose the model to increasing complexity and
    diversity in data. 4) Utilize the AMD MI300X''s 192 GB HBM3 for intelligent caching of high-value,
    frequently accessed data subsets and leverage its 5.3 TB/s bandwidth for rapid, on-demand data streaming.
    This ensures compute resources are predominantly spent on informative data, boosting ICR and preventing
    model collapse.'
  common_mistake: A common mistake is to simply scale up data ingestion and storage without intelligent
    data curation, leading to the model spending significant compute on redundant, noisy, or low-information
    samples. This can result in diminishing returns, slower convergence, and a higher risk of model collapse
    due to inadequate data diversity or quality over time.
  napkin_math: Given the AMD MI300X's 5.3 TB/s HBM3 bandwidth, if each data sample (including input tokens,
    attention masks, and labels) averages 256 KB, how many samples per second can a single MI300X theoretically
    stream from HBM3? If an LLM training job requires a sustained input of 100,000 unique, informative
    samples per second across its distributed training, how many MI300X units would be minimally required
    to meet this data throughput demand (assuming data loading from HBM3 is the bottleneck)?
