title: Specify KV Cache Memory Requirements for Long-Context LLM Serving
scenario: 'You must specify the KV cache memory requirements for serving Llama 3 70B (80 layers, 8 KV heads, 128 head dimension) at FP16 precision on H100 GPUs with 80GB VRAM each. Target: support 128K token context length with 32 concurrent requests.'
question: What KV cache size, total VRAM need, remaining weight budget, and minimum GPU count are required for 32 requests at 128K context?
details:
  realistic_solution: '(1) KV per request: 2 (K+V) × 80 layers × 8 KV heads × 128 dim × 128K tokens × 2B (FP16) = 2×80×8×128×131072×2 = 42,949,672,960B ≈ 42.9 GB per request. (2) 32 requests: 32 × 42.9 GB = 1,372.8 GB. (3) Model weights: 70B × 2B (FP16) = 140 GB. (4) Total VRAM: 1,372.8 + 140 = 1,512.8 GB. H100 80GB each: 1,512.8 / 80 = 18.9 → 19 GPUs minimum. Practical: round to 20 GPUs (4 nodes × 5, or 2 8-GPU nodes + 4 extra = use 3 8-GPU nodes = 24 GPUs for overhead). Note: this is why 128K context serving is prohibitively expensive without KV quantization.'
  common_mistake: |
    **The Pitfall:** Computing KV cache assuming full-precision weights or multi-head attention.
    **The Rationale:** Candidates use the standard transformer memory formulas without adjusting for the specific architectural optimizations of modern LLMs.
    **The Consequence:** They forget that Llama 3 70B uses Grouped-Query Attention (GQA) with only 8 KV heads (not 64), leading to a massive overestimation of KV cache requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers, 8 KV heads, 128 head dimension.
    - FP16 precision (2 bytes per element).
    - 128K token context, 32 concurrent requests.

    **Calculations:**
    - KV Cache Per Request = 2 * 80 * 8 * 128 * 131,072 * 2 bytes = ~42.9 GB.
    - KV Cache for 32 Requests = 32 * 42.9 GB = 1,372.8 GB.
    - Model Weights = 70B parameters * 2 bytes = 140 GB.
    - Total VRAM = 1,372.8 + 140 = 1,512.8 GB.
    - GPUs needed = 1,512.8 / 80 = 18.9 -> 19 GPUs minimum.

    **Conclusion & Interpretation:**
    - **Result: 1,512.8 GB VRAM, 19 GPUs (KV-Cache-Capacity-Bound)**. Total VRAM need is 1,512.8 GB, requiring a minimum of 19 GPUs.
