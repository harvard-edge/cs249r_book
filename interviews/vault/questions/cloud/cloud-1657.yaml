title: Diagnosing OOM in DLRM Online Learning
scenario: A real-time ad CTR prediction system uses a DLRM continuously updated via online learning to adapt to concept drift. Training workers run on single NVIDIA A10G instances, processing a continuous stream of 2,000 events/sec. Initially, VRAM usage is a stable 10GB. However, after running for 48 hours, VRAM usage gradually creeps up to 24GB, triggering an OOM crash. The event volume, batch size, and model architecture remain strictly constant. Diagnostic logs show the deep learning framework's computation graph is perfectly cleared after each step.
question: What is causing VRAM to grow from 10GB to 24GB over 48 hours despite constant event volume and cleared computation graphs?
details:
  realistic_solution: 'The dynamic embedding tables are allocating new rows for continuously arriving novel sparse IDs (e.g., new user or ad IDs) without an eviction policy. Implement an LRU/LFU eviction strategy for stale IDs or switch to a fixed-size hashed embedding table.'
  common_mistake: |
    **The Pitfall:** Blaming standard deep learning memory leaks.
    **The Rationale:** Engineers often suspect unreleased tensors in the autograd graph or data loader issues instead of recognizing stateful unbounded growth.
    **The Consequence:** Time wasted debugging framework internals while the dynamic embedding tables continue to OOM the system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stream: 2,000 events/sec.
       - Novel ID rate: ~5% (100 novel IDs/sec).
       - Embedding size: 128-dim FP32 + Adam state = 1.5 KB per ID.
       - Duration: 48 hours (172,800 seconds).
    2. **Calculations:**
       - State per ID: 3 * 128 * 4 bytes = 1,536 bytes (~1.5 KB).
       - Total new IDs in 48h: 172,800 sec * 100 IDs/sec = 17,280,000 IDs.
       - Accumulated memory: 17,280,000 * 1.5 KB = 25.92 GB.
    3. **Conclusion & Interpretation:**
       **Result: 25.92 GB Memory Growth (Memory-Bound).** Without eviction, the unbounded growth of dynamic embedding tables rapidly consumes the 24GB VRAM capacity.
