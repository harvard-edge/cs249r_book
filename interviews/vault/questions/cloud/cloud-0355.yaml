title: 'The Arithmetic Intensity Litmus Test: Roofline Analysis'
scenario: You are profiling a new model on an H100 GPU. Your analysis shows its arithmetic intensity is
  extremely low, around 10 FLOPs/Byte. Based on the principles of the roofline model, what is the primary
  performance bottleneck for this workload?
question: "Based on the principles of the roofline model, what is the primary performance bottleneck for this workload?"
details:
  realistic_solution: The primary bottleneck is memory bandwidth. A workload with low arithmetic intensity
    is classified as memory-bound. It performs very few floating-point operations (FLOPs) for each byte
    of data it reads from HBM. The GPU's performance is not limited by its computational capacity (TFLOPS),
    but by the rate at which it can feed the compute units with data.
  common_mistake: Assuming that any workload on a powerful GPU like an H100 must be compute-bound. Engineers
    often forget that if a workload doesn't perform enough math per byte of data fetched, the powerful
    compute cores will spend most of their time idle, waiting for data from memory. The bottleneck isn't
    the cores; it's the data path.
  napkin_math: An H100 GPU has a peak FP16 performance of ~989 TFLOPS and a memory bandwidth of ~3.35
    TB/s. This gives it a 'ridge point' of approximately 295 FLOPs/Byte (989,000 GFLOPS / 3,350 GB/s).
    Since the model's arithmetic intensity of 10 FLOPs/Byte is far below this ridge point, it lies on
    the sloped, memory-bound portion of the roofline plot.
  options:
  - Memory bandwidth, because the arithmetic intensity is far below the GPU's ridge point.
  - Peak TFLOPS, because the model isn't doing enough operations to keep the cores busy.
  - L2 cache latency, because the working data set doesn't fit in L1 cache.
  - The power limit (TDP), because the GPU cannot draw enough power to run faster.
