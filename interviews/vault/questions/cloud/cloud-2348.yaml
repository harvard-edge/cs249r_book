title: NUMA Boundaries in High-Throughput DMA
scenario: You are architecting a high-throughput video ingestion pipeline. A dual-socket AMD EPYC server
  with 8 GPUs processes 4K video frames. The CPU decodes frames and sends them to the GPUs via PCIe Gen4
  x16 (32 GB/s theoretical). However, `nvidia-smi dmon` shows PCIe Rx bandwidth maxing out at 11 GB/s
  per GPU, and CPU usage is at 100% on a single thread. Inference is starved.
details:
  realistic_solution: The data transfer is bottlenecked by two architectural flaws. First, using pageable
    (unpinned) memory forces the CPU to perform a costly memcpy to a hidden pinned bounce buffer before
    DMA can occur, saturating a CPU core. Second, the system is crossing NUMA boundaries (e.g., a GPU
    attached to Socket 0 is reading memory allocated by Socket 1). This forces traffic over the slow inter-socket
    link (xGMI/UPI). The architecture must be updated to use pinned memory (`cudaHostAlloc`) and enforce
    strict NUMA affinity per GPU worker process.
  common_mistake: Assuming the PCIe bus is physically degraded, or trying to compress the video frames
    further before sending them to the GPU.
  napkin_math: Pageable memory transfer requires a CPU memcpy. A single-core memory copy bandwidth is
    typically limited to ~10-15 GB/s, perfectly explaining the 11 GB/s ceiling. By pinning memory, the
    GPU's DMA engine pulls directly from RAM at PCIe Gen4 limits (25-27 GB/s practical) without CPU involvement.
    If crossing NUMA, the inter-socket link (e.g., UPI at ~16 GB/s) becomes the new bottleneck. Fixing
    both raises per-GPU throughput from 11 GB/s to >25 GB/s.
