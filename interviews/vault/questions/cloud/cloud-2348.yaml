title: NUMA Boundaries in High-Throughput DMA
scenario: 'You are architecting a high-throughput video ingestion pipeline. A dual-socket AMD EPYC server with 8 GPUs processes 4K video frames. The CPU decodes frames and sends them to the GPUs via PCIe Gen4 x16. However, `nvidia-smi dmon` shows PCIe Rx bandwidth maxing out at 11 GB/s per GPU, and CPU usage is at 100% on a single thread. Inference is starved.'
question: 'Why is PCIe Rx capped at 11GB/s per GPU with one CPU thread saturated, and how would you fix the host transfer path?'
details:
  realistic_solution: 'The data transfer is bottlenecked by two architectural flaws. First, using pageable (unpinned) memory forces the CPU to perform a costly memcpy to a hidden pinned bounce buffer before DMA can occur. Second, the system is crossing NUMA boundaries. The architecture must be updated to use pinned memory (cudaHostAlloc) and enforce strict NUMA affinity per GPU worker process.'
  common_mistake: |
    **The Pitfall:** Assuming the PCIe bus is physically degraded or bottlenecked.
    **The Rationale:** Treating memory allocations as uniform and ignoring host-to-device memory transfer mechanics.
    **The Consequence:** Attempting to compress video frames further or debugging hardware, rather than fixing the memory pinning and NUMA boundaries in code.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe Gen4 x16 limit: 32 GB/s.
    - Current Rx: 11 GB/s.

    **Calculations:**
    - CPU Memcpy bandwidth is ~10-15 GB/s, matching the 11 GB/s ceiling.
    - Crossing NUMA limits bandwidth to inter-socket link (~16 GB/s).

    **Conclusion & Interpretation:**
    - **Result: >25 GB/s Target (Bandwidth-Bound)**. Fixing memory pinning and NUMA affinity raises per-GPU throughput to >25 GB/s.
