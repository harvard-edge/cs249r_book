title: Diagnosing Metadata Server Collapse on Lustre
scenario: You are training a vision model on a cluster with 8xA100 GPUs using a Lustre parallel file system.
  The dataset consists of 14 million individual 150KB JPEG images stored directly in a standard directory
  hierarchy. The training pipeline reports that GPU utilization is fluctuating wildly between 10% and
  80%, and the storage team alerts you that the Lustre Metadata Server (MDS) CPU utilization is pinned
  at 100%, while the Object Storage Targets (OSTs) are barely seeing 5% throughput utilization. Analyze
  the root cause of this performance bottleneck.
details:
  realistic_solution: The system is suffering from the 'Small File Problem'. The solution is to pack the
    150KB images into larger sequential formats (e.g., TFRecords, WebDataset tar archives, or Petastorm)
    of 100MB to 1GB each. This reduces metadata lookups by orders of magnitude and converts random I/O
    into large sequential reads.
  common_mistake: Assuming the storage network bandwidth is insufficient or that the GPUs are bottlenecked
    by CPU data decoding, rather than identifying metadata operations as the true limiting factor.
  napkin_math: 'Reading 1000 images/sec/GPU individually = 8000 metadata lookups/sec cluster-wide (stat/open/read/close).
    A single MDS often saturates at ~30k-50k IOPS, creating a massive bottleneck. Packing into 1GB WebDataset
    shards (~6000 images per shard): reading 8000 images/sec requires <2 metadata lookups/sec. MDS load
    drops by >99.9%.'
