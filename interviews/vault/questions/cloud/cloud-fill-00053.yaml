title: 'Real-time LLM Inference: Accelerator Selection for Performance and Cost'
scenario: Your team is tasked with deploying a new, large transformer-based language model for real-time
  inference, which requires high throughput and low latency. The model has a significant memory footprint
  and benefits from mixed-precision (BF16) computation. You are evaluating different deployment strategies
  on Google Cloud. Specifically, you need to assess the suitability of a Google TPU v5e instance (16 GB
  HBM, 197 TFLOPS BF16, 1.6 TB/s HBM bandwidth) compared to a cluster of high-end GPUs or a fleet of general-purpose
  CPUs. Design a system architecture and justify your accelerator choice, focusing on meeting a target
  inference latency of 100ms per query and handling 10,000 queries per second (QPS) at peak load, while
  optimizing for cost-efficiency. Consider factors like model size, batching strategy, data movement,
  and programmability.
details:
  realistic_solution: A realistic solution would involve a phased approach. Initially, the candidate would
    estimate the computational (BF16 operations) and memory (model parameters, activations) requirements
    per inference. They would then evaluate the Google TPU v5e's 197 TFLOPS BF16 and 1.6 TB/s HBM bandwidth
    against these requirements, considering optimal batching strategies to maximize utilization while
    staying within the 100ms latency budget. They should compare this to a GPU-based solution, highlighting
    the TPU's BF16 efficiency for specific tensor operations and potential cost advantages for continuous,
    high-volume inference. The system architecture should include a load balancer, queues for asynchronous
    inference, and a strategy for dynamic scaling based on QPS, potentially using a combination of accelerators
    or optimized model serving frameworks (e.g., Triton Inference Server).
  common_mistake: Candidates often overemphasize peak FLOPS without adequately considering memory bandwidth
    (especially the 1.6 TB/s HBM bandwidth on TPU v5e) and its impact on model loading and intermediate
    activations, which can bottleneck performance even on theoretically powerful accelerators. Another
    common mistake is ignoring the cost implications of idle accelerator capacity or the complexity of
    integrating custom model architectures with specialized hardware like TPUs, which might require extensive
    code changes compared to GPUs.
  napkin_math: 1. **Required Throughput:** 10,000 QPS. 2. **Per-query Latency:** 100ms (0.1s). 3. **Individual
    Accelerator Throughput:** If a single TPU v5e can achieve, for example, 500 QPS for the given model
    at 100ms latency, then `10,000 QPS / 500 QPS/TPU = 20 TPU v5e units` are needed. 4. **Memory Bandwidth
    Check:** Estimate model size and intermediate activations for one inference. E.g., if total data moved
    is 10 GB per inference and latency is 100ms, then required bandwidth is `10 GB / 0.1s = 100 GB/s`.
    This is well within the 1.6 TB/s (1600 GB/s) HBM bandwidth, suggesting it's unlikely to be the primary
    bottleneck, but multiple inferences or very large intermediate states could change this. 5. **TFLOPS
    Utilization:** If the model requires `X` BF16 FLOPs per inference, then `X FLOPs / (197 TFLOPS * utilization)`
    should be less than 0.1s.
