title: Optimizing LLM Training on Kubernetes with AMD MI300X
scenario: Your team is deploying a large language model (LLM) training job on a Kubernetes
  cluster. The cluster nodes are equipped with AMD MI300X accelerators, each featuring
  192 GB HBM3 memory, 1,307 TFLOPS (FP16 sparse) compute, and 5.3 TB/s memory bandwidth.
  After initial deployment, you observe that the training job's throughput is significantly
  lower than anticipated, with GPU utilization consistently below 50%. The current
  Kubernetes setup uses standard GPU device plugins, and pods are scheduled without
  specific node affinity rules. The LLM model has over 70 billion parameters and requires
  frequent data transfers between GPUs for distributed training. Diagnose the potential
  bott bottlenecks and propose concrete, quantifiable solutions to optimize resource utilization
  and training throughput.
question: Why is the MI300X LLM training job below 50% GPU utilization, and what concrete
  Kubernetes and data-pipeline fixes would you apply?
details:
  realistic_solution: "To diagnose and fix the bottleneck:\n1. Monitor & Profile:\
    \ Use `rocm-smi` (or similar AMD ROCm tools) within the pod and integrate cluster-wide\
    \ GPU metric collection (utilization, HBM3 bandwidth, compute unit activity) via\
    \ Prometheus/Grafana. This will pinpoint if the bottleneck is compute-bound, memory-bound,\
    \ or communication-bound.\n2. Custom GPU Device Plugin (if necessary): Ensure\
    \ the Kubernetes GPU device plugin is correctly configured for AMD MI300X, possibly\
    \ requiring an AMD-specific plugin to expose HBM3 memory as a schedulable resource\
    \ or to facilitate topology-aware scheduling.\n3. Kubernetes Resource Specification:\
    \ Explicitly define resource requests for AMD GPUs and HBM3 memory in pod specifications\
    \ (e.g., `resources.limits.amd.com/gpu: 1`, `resources.limits.amd.com/hbm3: 192Gi`).\n\
    4. Node Affinity for Co-location: Implement `nodeSelector` or `affinity`/`anti-affinity`\
    \ rules to:\n   - Co-locate all pods of a distributed training job onto nodes\
    \ with sufficient AMD MI300X GPUs and optimal interconnect topology.\n   - Prevent\
    \ unrelated workloads from sharing nodes with critical training jobs.\n5. Optimize\
    \ Data Loading & Batching:\n   - Adjust the global batch size to fully utilize\
    \ the 192 GB HBM3 per MI300X, minimizing frequent data transfers to host memory.\n\
    \   - Employ asynchronous data loading techniques (e.g., PyTorch `DataLoader`\
    \ with `num_workers > 0` and `pin_memory=True`) to overlap data preparation with\
    \ GPU computation.\n   - Leverage `torch.compile` or similar optimizations to\
    \ maximize FP16 sparse throughput."
  common_mistake: 'The most common mistake is to treat high-performance GPUs like
    MI300X as generic compute resources without optimizing the Kubernetes scheduler,
    device plugins, and application-level data pipelines for their specific characteristics.
    This often manifests as:

    1. Incorrect Resource Requests: Not accurately requesting HBM3 memory or specifying
    AMD GPU resources, leading to suboptimal scheduling or insufficient allocation.

    2. Lack of Node Affinity/Anti-Affinity: Failing to use node affinity rules to
    ensure co-location of communicating pods on nodes with high-bandwidth interconnects
    (e.g., Infinity Fabric for AMD GPUs) or to prevent resource contention from unrelated
    workloads.

    3. Suboptimal Data Pipelining: Not leveraging the 5.3 TB/s memory bandwidth, leading
    to I/O bottlenecks where data loading cannot keep up with compute capabilities,
    especially with large models or small batch sizes.

    4. Generic Device Plugins: Relying on basic GPU device plugins that don''t expose
    fine-grained metrics or controls specific to AMD MI300X features, hindering performance
    debugging.'
  napkin_math: 'Consider the AMD MI300X''s HBM3 memory bandwidth of 5.3 TB/s (5300
    GB/s). If a single training step involves loading 150 GB of data (parameters,
    gradients, activations) into the GPU memory, the theoretical minimum data loading
    time per step would be:

    150 GB / 5300 GB/s ≈ 0.0283 seconds.

    If profiling reveals that data loading or inter-GPU communication is taking 0.1
    seconds per step, this indicates an efficiency gap. By optimizing the data pipeline
    and network, reducing this to 0.03 seconds per step would represent a 70% reduction
    in data transfer time per step, significantly accelerating the overall training
    process. For a job with 1 million steps, this saves (0.1 - 0.03) * 1,000,000 =
    70,000 seconds (approx. 19.4 hours).'
