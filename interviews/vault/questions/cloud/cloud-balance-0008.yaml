title: Gang Scheduling Capacity Arithmetic
scenario: A distributed training job requires 64 GPUs at once. A cluster has 80 free GPUs total, but they are split as 40 in rack A and 40 in rack B. The job requires all GPUs in one rack for topology reasons. Determine whether it can start.
question: Can a 64-GPU gang-scheduled job start if 80 GPUs are free but only 40 are free in each rack?
details:
  realistic_solution: No. Aggregate free GPUs are sufficient, but topology-local free GPUs are not. The job needs 64 co-located GPUs in one rack, and the largest available rack has only 40. The scheduler must wait, relax topology, or repartition the job.
  common_mistake: Checking only total free GPUs and ignoring placement constraints.
  napkin_math: Total free = 80, but max co-located free = 40 < 64 required.
