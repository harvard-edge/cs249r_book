title: Preventing Cascading Failures with Circuit Breakers
scenario: An ML API Gateway handles traffic for multiple microservices, receiving 400 RPS specifically for a heavy text embedding service. The Gateway operates on a node with a fixed connection pool of 2,000 concurrent threads. Normally, embeddings take 50ms. A sudden backend outage causes the embedding service to hang, falling back to the Gateway's default 10-second hard timeout.
question: How long until the 2,000-thread pool exhausts without a circuit breaker, and how many threads are used if a 500ms timeout is implemented?
details:
  realistic_solution: Use Little's Law (Concurrency = Arrival Rate × Latency) to model thread consumption. Implement a circuit breaker with a short fast-fail timeout (e.g., 500ms) to cap the maximum concurrency required by the failing route, preserving the connection pool for healthy services.
  common_mistake: |
    **The Pitfall:** Assuming the primary benefit of a circuit breaker is merely saving compute on the failing upstream service.
    **The Rationale:** Engineers focus on the backend workload, missing the immediate local impacts of a hanging request.
    **The Consequence:** The local thread pool exhausts completely in seconds, crashing the entire Gateway and causing a catastrophic cascading failure across all healthy services.
  napkin_math: |
    1. Calculate thread consumption without CB: At 400 RPS and a 10s timeout, required concurrency (Little's Law) is 400 * 10 = 4,000 threads.
    2. Calculate time to exhaustion: The 2,000-thread pool fills at 400 threads/sec. It is exhausted in 2,000 / 400 = 5 seconds.
    3. Calculate consumption with CB: With a 500ms circuit breaker timeout, maximum concurrency is 400 * 0.5 = 200 threads.
    4. Conclude: The circuit breaker preserves **1,800 threads** safely for other healthy services.
