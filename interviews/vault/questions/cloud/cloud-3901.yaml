title: TPU v5e XLA Compilation Constraints for Portable Model Code
scenario: 'Your PyTorch model runs on GPU via torch.compile with the inductor backend. You want to also run it on TPU v5e via PyTorch/XLA. The model uses dynamic control flow (if-statements based on tensor values) and in-place tensor mutations. Both features cause XLA compilation failures.'
question: 'How would you refactor the PyTorch model so torch.compile can run it on both GPU Inductor and TPU XLA?'
details:
  realistic_solution: 'Replace dynamic control flow with torch.where() for conditional operations and torch.cond() for graph-compatible branching. Replace in-place mutations (tensor.add_()) with out-of-place equivalents (tensor = tensor + x). Use mark_step() to break long computations into XLA-compilable segments. Profile with XLA_METRICS=1 to identify remaining recompilation triggers. Expect 10-20% code refactoring effort, but the result runs on both GPU (via inductor) and TPU (via XLA).'
  common_mistake: |
    **The Pitfall:** Trying to force dynamic control flow through XLA by adding torch.jit.script wrappers.
    **The Rationale:** Candidates misunderstand that XLA fundamentally requires static computation graphs, so dynamic control flow must be structurally rewritten, not just wrapped.
    **The Consequence:** The model continuously triggers costly recompilations on the TPU, tanking performance from 197 TFLOPS to virtually nothing.
  napkin_math: |
    * TPU v5e BF16 Peak: 197 TFLOPS.
    * XLA compilation overhead on first run: 30-90 seconds.
    * Dynamic shapes cause recompilation on every step.
    * **Continuous recompilation drops effective performance from 197 TFLOPS to 40-80 TFLOPS.**
