title: The Model Staleness Tradeoff
scenario: Your fraud detection model is retrained weekly on the latest 30 days of transaction data. Total attempted fraud is $10M per week. Fraudsters adapt their tactics within 48 hours of a new model deployment. Your detection rate drops from 95% to 82% by day 5 of each week. The data engineering team says daily retraining is feasible but costs 7x more compute.
question: What is the net weekly cost-benefit of daily retraining versus weekly retraining when detection drops from 95% to 82% by day 5?
details:
  realistic_solution: 'The key insight is that compute cost is the wrong denominator — fraud cost is. If total fraud is $10M per week, the 13% detection rate drop (95% → 82%) over days 2-7 means approximately: Days 2-5 (4 days): linear decay from 95% → 82%, average 88.5%. Days 6-7 (2 days): at 82%. Weekly undetected fraud increase: roughly $10M × (0.95 - 0.885) × 4/7 + $10M × (0.95 - 0.82) × 2/7 ≈ $371K + $371K = $742K/week of additional fraud. Daily retraining cost increase: if weekly training costs $5K, daily costs $5K × 7 = $35K/week (a $30K increase). Net weekly benefit: $742K - $30K = $712K/week.'
  common_mistake: |
    **The Pitfall:** Comparing only the raw compute cost (7x more) without quantifying the cost of undetected fraud.
    **The Rationale:** Engineering teams naturally focus on infrastructure bills as they are highly visible and direct.
    **The Consequence:** Rejecting a daily retraining pipeline that costs $30K more but would have prevented hundreds of thousands of dollars in fraud.
  napkin_math: |
    - **Weekly base total fraud:** Assume $10M/week.
    - **Days 2-5 (4 days) average detection:** linearly drops from 95% to 82% (avg 88.5%).
    - **Days 6-7 (2 days) detection:** 82%.
    - **Additional fraud loss (weekly vs daily):** ~$10M * (0.95 - 0.885) * (4/7) + $10M * (0.95 - 0.82) * (2/7) = $371K + $371K = $742K/week.
    - **Compute cost:** $5K/week (weekly) vs $35K/week (daily) = $30K increase.
    - **Result:** **Net weekly benefit of daily retraining is $742K (fraud prevented) - $30K (extra compute) = $712K/week ROI.**
