title: 'Feature Store: Optimize Feature Computation Pipeline for H100 Training Throughput'
scenario: Your nightly batch feature computation on 32 GPUs takes 6 hours but must complete in 2 hours to feed the morning training job. The pipeline computes 500 features for 100M users from raw event logs (10TB/day). Profiling shows 70% of time is spent on 5 expensive aggregation features.
question: How would you optimize the 32-GPU nightly feature pipeline from 6 hours to under 2 hours when 70% of time is in 5 aggregations?
details:
  realistic_solution: 'Incremental computation: the 5 expensive features (e.g., 90-day rolling aggregations) change slowly. Compute full refresh weekly, daily delta updates only. Simple features (last 24h) remain daily full computation.'
  common_mistake: |
    **The Pitfall:** Parallelizing all 500 features equally.
    **The Rationale:** Candidates apply broad cluster scaling instead of identifying and isolating the 5 expensive features causing the bottleneck.
    **The Consequence:** Wasting compute resources and failing to meet the strict 2-hour pipeline deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current pipeline: 6 hours total.
       - Bottleneck: 5 expensive features take 70% of time (4.2 hours).
       - Remaining 495 features take 30% of time (1.8 hours).
    2. **Calculations:**
       - Apply incremental delta to 5 features (20% of users active today).
       - Optimized expensive feature time: 4.2 hours * 20% = 0.84 hours.
       - Parallelized total time: max(0.84 hours, 1.8 hours) = 1.8 hours.
    3. **Conclusion & Interpretation:** **Pipeline completes in 1.8 hours, achieving a 3.3x speedup**. Result: **Compute-Bound**.
