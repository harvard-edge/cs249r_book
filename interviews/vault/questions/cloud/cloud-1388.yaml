title: Impact of I/O Jitter on Distributed Data Loading
scenario: >
  A distributed training job runs on 256 GPUs, reading training batches from shared cloud storage. Each GPU fetches 4 data shards per step concurrently (1024 total requests per step). The average storage read latency is 10ms, but I/O jitter from network contention causes the P99 read latency to spike to 200ms. The global training step blocks until all shards are loaded.
question: >
  What effective I/O wait time per step should you expect when 1024 shard reads gate each synchronous step?
details:
  realistic_solution: |
    Recognize that the tail latency becomes the average latency at scale. Implement deep asynchronous prefetching into local NVMe caches and over-fetch data to hide the 200ms jitter behind compute.
  common_mistake: |
    **The Pitfall:** Calculating I/O wait time based strictly on the average read latency.
    **The Rationale:** Candidates intuitively use the 10ms average, completely forgetting that synchronous training steps act as global barriers that operate at the speed of the slowest request.
    **The Consequence:** They massively underestimate data loading bottlenecks, leading to severe GPU starvation and missed training deadlines.
  napkin_math: |
    - **Probability of Fast Read (under P99):** 0.99.
    - **Probability All 1024 Reads are Fast:** 0.99 ^ 1024 ≈ 0.00003.
    - **Implication:** 99.997% of training steps will experience at least one 200ms read.
    - **Result:** **The effective I/O wait per step is ~200ms, a 20x degradation from the 10ms average.**
