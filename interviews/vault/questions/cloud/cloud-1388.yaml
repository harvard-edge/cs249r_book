title: Impact of I/O Jitter on Distributed Data Loading
scenario: A distributed training job runs on 256 GPUs, reading training batches from shared cloud storage.
  Each GPU fetches 4 data shards per step concurrently (1024 total requests per step). The average storage
  read latency is 10ms, but I/O jitter from network contention and background SSD maintenance causes the
  P99 read latency to spike to 200ms. The global training step blocks until all shards are loaded. Estimate
  the effective I/O wait time per step.
details:
  realistic_solution: Recognize that the tail latency becomes the average latency at scale. Implement
    deep asynchronous prefetching into local NVMe caches and over-fetch data to hide the 200ms jitter
    behind compute.
  common_mistake: Candidates often calculate I/O time based on the average latency (10ms), failing to
    realize that synchronous barriers make the system operate at the speed of the slowest request (tail
    latency).
  napkin_math: Probability all 1024 reads are fast (under P99) = 0.99^1024 ~= 0.00003. This means 99.997%
    of training steps will experience at least one 200ms read. The effective I/O wait per step is ~200ms,
    a 20x degradation from the 10ms average.
