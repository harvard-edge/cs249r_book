title: MTBF-Aware Cluster Sizing
scenario: 'You need to train a 70B model. Option A: 1024 GPUs for 14 days. Option B: 512 GPUs for 28 days. Per-GPU MTBF is 50,000 hours. Checkpoint takes 15 minutes.'
question: "For training a 70B model on 1024 GPUs for 14 days or 512 GPUs for 28 days, which loses less time to failures and checkpointing?"
details:
  realistic_solution: 'Option A (1024 GPUs, 14 days): Cluster MTBF = 50,000/1024 ≈ 48.8h. Expected failures in 14 days: 336h/48.8h ≈ 6.9 failures. Optimal checkpoint interval: √(2×48.8×0.25) ≈ 4.94h. Checkpoint overhead: 0.25/4.94 ≈ 5.1%. Lost work per failure: ~2.47h. Total lost: 6.9 × 2.47h = 17.0h + checkpoint overhead 5.1% × 336h = 17.1h. Total overhead: ~34h (10% of wall time). Option B (512 GPUs, 28 days): Cluster MTBF = 50,000/512 ≈ 97.7h. Expected failures in 28 days: 672h/97.7h ≈ 6.9 failures. Checkpoint interval: √(2×97.7×0.25) ≈ 6.99h. Overhead: 0.25/6.99 ≈ 3.6%. Lost work per failure: ~3.49h. Total lost: 6.9 × 3.49h = 24.1h + 3.6%×672h = 24.2h. Total: ~48h (7.2%). Option A has higher percentage overhead but finishes faster in absolute time. Choose A if wall time matters, B if GPU-hours budget matters.'
  common_mistake: |
    **The Pitfall:** Choosing the larger cluster for faster wall time without accounting for overhead scaling.
    **The Rationale:** Engineers assume failure overhead scales linearly rather than quadratically with cluster size.
    **The Consequence:** Significant underestimation of the time lost to failures and checkpointing on large clusters.
  napkin_math: |
    1. **Option A (1024 GPUs, 14 days/336h):**
       - Cluster MTBF = 50,000 / 1024 ≈ 48.8h
       - Expected Failures = 336 / 48.8 ≈ 6.88
       - Opt. Checkpoint Interval = √(2 × 0.25h × 48.8h) ≈ 4.94h
       - Lost to failures = 6.88 × (4.94 / 2) ≈ 17.0h
       - Lost to checkpointing = 336 × (0.25 / 4.94) ≈ 17.0h
       - Total Overhead A = 34h (10%)
    2. **Option B (512 GPUs, 28 days/672h):**
       - Cluster MTBF = 50,000 / 512 ≈ 97.7h
       - Expected Failures = 672 / 97.7 ≈ 6.88
       - Opt. Checkpoint Interval = √(2 × 0.25h × 97.7h) ≈ 6.99h
       - Lost to failures = 6.88 × (6.99 / 2) ≈ 24.0h
       - Lost to checkpointing = 672 × (0.25 / 6.99) ≈ 24.0h
       - Total Overhead B = 48h (7.2%)
       
    **Final Result: Option A loses 34 hours to overhead, while Option B loses 48 hours.**
