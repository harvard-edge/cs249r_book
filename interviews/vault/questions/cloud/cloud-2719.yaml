title: MTBF-Aware Cluster Sizing
scenario: 'You need to train a 70B model. Option A: 1024 GPUs for 14 days. Option B: 512 GPUs for 28 days.
  Per-GPU MTBF is 50,000 hours. Checkpoint takes 15 minutes. Evaluate which option loses less time to
  failures and checkpointing overhead.'
question: "For training a 70B model on 1024 GPUs for 14 days or 512 GPUs for 28 days, which loses less time to failures and checkpointing?"
details:
  realistic_solution: 'Option A (1024 GPUs, 14 days): Cluster MTBF = 50,000/1024 ≈ 49h. Expected failures
    in 14 days: 336h/49h ≈ 6.9 failures. Optimal checkpoint interval: √(2×2930×15) ≈ 296 min ≈ 5h. Checkpoint
    overhead: 15/296 ≈ 5.1%. Lost work per failure: ~2.5h. Total lost: 6.9 × 2.5h = 17.3h + checkpoint
    overhead 5.1% × 336h = 17.1h. Total overhead: ~34h (10% of wall time). Option B (512 GPUs, 28 days):
    Cluster MTBF = 50,000/512 ≈ 98h. Expected failures in 28 days: 672h/98h ≈ 6.9 failures (same!). Checkpoint
    interval: √(2×5860×15) ≈ 419 min ≈ 7h. Overhead: 15/419 ≈ 3.6%. Lost work per failure: ~3.5h. Total
    lost: 24h + 3.6%×672h = 24.2h. Total: ~48h (7.2%). Option A has higher percentage overhead but finishes
    faster in absolute time. Choose A if wall time matters, B if GPU-hours budget matters.'
  common_mistake: Choosing the larger cluster for faster wall time without accounting for the quadratic
    increase in failure-related overhead as cluster size grows.
  napkin_math: 'A: ~34h overhead / 336h = 10%. B: ~48h overhead / 672h = 7.2%. A finishes in 15.4 days
    vs B in 30 days. Same GPU-hours wasted (~34K vs ~25K).'
