title: 'Queueing Theory Specification: Design a Latency SLO Budget'
scenario: Specify a complete latency budget for a three-tier inference system (load balancer → router
  → H100 GPU worker) serving Claude-Haiku-scale requests. Total P99 SLO = 500ms. Allocate latency budget
  across tiers using queueing theory, specifying M/M/c parameters for each tier. Arrival rate λ=1000 req/s.
details:
  realistic_solution: 'Three tiers in series: P99_total = P99_LB + P99_router + P99_GPU. GPU tier dominates
    (service time ~50ms for small model). Budget: LB ≤ 5ms P99, Router ≤ 15ms P99, GPU ≤ 480ms P99. LB:
    μ=100K req/s, λ=1000, ρ=0.01, Wq≈0, P99 ≈ service time = 1ms. Router: μ=10K req/s, λ=1000, ρ=0.1,
    Wq=0.1/(10K*0.9)=11μs, P99=service+queue=0.1ms+0.011ms≈0.1ms. GPU workers: need P99<480ms. With μ=20
    req/s per worker and 100 workers: c=100, ρ=1000/2000=0.5. M/M/c P99 << M/M/1, W≈55ms. P99≈4.6*55=253ms
    < 480ms.'
  common_mistake: Allocating latency budgets by equal thirds without using queueing theory to determine
    which tier is the actual bottleneck and deserves the most budget.
  napkin_math: 'LB tier: service = 1ms (simple routing). P99_LB ≈ 2ms (mostly deterministic). Router tier:
    service = 0.1ms (lookup + route). P99_router ≈ 0.5ms. GPU tier: budget remaining = 500-2-0.5 = 497.5ms.
    With 50 H100 workers, μ_total=50*20=1000 req/s exactly = capacity. Need 60 workers: ρ=1000/1200=0.833.
    Wq_M/M/c much smaller than M/M/1. Approximate: Wq ≈ M/M/1_with_ρ=0.833/(c servers) = 0.297/20 per
    worker = 25ms queue. W=75ms. P99=345ms < 497ms. 60 H100 workers sufficient.'
