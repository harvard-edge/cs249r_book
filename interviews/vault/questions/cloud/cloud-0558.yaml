title: The Quantization Bias Amplifier
scenario: Your medical imaging model achieves 94% accuracy across all demographic groups in FP32. You quantize to INT8 for deployment on edge devices in rural clinics. Overall accuracy drops to 92% — acceptable. But a post-deployment audit reveals accuracy for dark-skinned patients dropped from 91% to 72%, while light-skinned patients only dropped from 96% to 94%.
question: How did quantization amplify a bias that barely existed in the original model?
details:
  realistic_solution: 'Quantization maps continuous activations to discrete bins. The bin boundaries are set by calibration data, which is dominated by the majority subgroup. Features that distinguish dark-skinned patients occupy a narrow, low-magnitude region of the activation space. When you quantize, these fine-grained distinctions get crushed into the same bin — the model literally can''t tell them apart anymore. Meanwhile, high-contrast features span multiple bins and survive quantization. The fix: per-subgroup calibration data, mixed-precision, or quantization-aware training with subgroup-balanced batches.'
  common_mistake: |
    **The Pitfall:** Assuming quantization degrades all classes uniformly.
    **The Rationale:** Engineers view quantization as a uniform mathematical rounding operation, assuming it impacts all data equally.
    **The Consequence:** Critical subgroups with distinct feature ranges suffer catastrophic accuracy drops, leading to real-world harm and algorithmic bias.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 quantization provides 256 discrete levels (bins).
       - Calibration data is dominated by the majority subgroup.
       - Majority features span a wide activation range (e.g., 0.5 wide).
       - Minority features cluster in a narrow activation range (e.g., 0.01 wide).
    2. **Calculations:**
       - If the INT8 bin width is 0.02, majority features get 25 bins of resolution.
       - Minority features (0.01 wide) are smaller than a single bin width.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound. The minority features are completely crushed into a single bin, destroying the model's ability to differentiate them and amplifying bias massively.**
