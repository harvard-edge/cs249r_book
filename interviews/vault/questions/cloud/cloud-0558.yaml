title: The Quantization Bias Amplifier
scenario: Your medical imaging model achieves 94% accuracy across all demographic groups in FP32. You quantize to INT8 for deployment on edge devices in rural clinics. Overall accuracy drops to 92% — acceptable. But a post-deployment audit reveals accuracy for dark-skinned patients dropped from 91% to 72%, while light-skinned patients only dropped from 96% to 94%.
question: How did quantization amplify a bias that barely existed in the original model?
details:
  realistic_solution: 'Quantization maps continuous activations to discrete bins. The bin boundaries are set by calibration data, which is dominated by the majority subgroup. Features that distinguish dark-skinned patients (subtle contrast differences, different melanin-related color distributions) occupy a narrow, low-magnitude region of the activation space. When you quantize, these fine-grained distinctions get crushed into the same bin — the model literally can''t tell them apart anymore. Meanwhile, high-contrast features (dominant in light-skinned patients) span multiple bins and survive quantization. The fix: per-subgroup calibration data, mixed-precision (keep sensitive layers in FP16), or quantization-aware training with subgroup-balanced batches.'
  common_mistake: |
    **The Pitfall:** Assuming quantization degrades all classes uniformly.
    **The Rationale:** Engineers view quantization as a uniform mathematical rounding operation, assuming it impacts all data equally.
    **The Consequence:** Critical subgroups with distinct feature ranges suffer catastrophic accuracy drops, leading to real-world harm and algorithmic bias.
  napkin_math: |
    *   **INT8 Resolution:** 256 discrete levels (bins).
    *   **Majority Features:** Span a wide activation range (e.g., 0.5 wide), getting 25 bins of resolution.
    *   **Minority Features:** Cluster in a narrow activation range (e.g., 0.01 wide).
    *   **Quantization Impact:** If the INT8 bin width is 0.02, the minority features are completely crushed into a single bin.
    *   **Result:** **The model loses all ability to differentiate minority group features, amplifying bias massively.**
