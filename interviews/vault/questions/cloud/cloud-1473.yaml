title: Stateful Serving Fault Tolerance
scenario: You are architecting the fault tolerance strategy for a stateful serving fleet running Llama-3-70B for agentic workflows, where context lengths reach 64K tokens. The fleet uses spot instances. A single 64K token session's KV cache is ~21 GB.
question: Which checkpointing strategy and frequency best meet the 2.0s RTO for 64K-token Llama-3-70B sessions over 400Gbps links?
details:
  realistic_solution: Implement a chunk-based asynchronous checkpointing strategy (e.g., every 2K-4K tokens) to a distributed RAM store or NVMe with fast network replication. This amortizes IOPS while ensuring that upon failure, fetching the ~21GB cache and re-prefilling only the small uncheckpointed tail comfortably fits within the 2-second RTO.
  common_mistake: |
    **The Pitfall:** Proposing continuous (per-token) checkpointing to minimize token loss, or relying entirely on full recomputation.
    **The Rationale:** Candidates fail to account for the massive IOPS overhead of per-token syncs or underestimate the massive latency of a 64K token prefill.
    **The Consequence:** Generation throughput is crippled by IO delays, or the 2-second Recovery Time Objective (RTO) is severely breached during a spot preemption.
  napkin_math: |
    1. KV per token: 80 layers * 8 KV heads * 128 dim * 2 (K,V) * 2 bytes = 327KB/token.
    2. 64K tokens = ~21GB KV cache.
    3. Transferring 21GB over 400Gbps (practical 40GB/s) takes ~0.5s.
    4. Recomputing a lost 4K token chunk takes ~0.5s prefill.
    5. Total recovery time = 0.5s (fetch) + 0.5s (recompute) = 1.0s.
    **Chunk-based checkpointing (every 2K-4K tokens) safely recovers within the 2.0s RTO.**
