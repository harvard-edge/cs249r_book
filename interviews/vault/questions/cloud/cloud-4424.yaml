title: LoRA Rank Sensitivity to Task Complexity
scenario: A team fine-tunes Llama-3 70B for SQL generation using LoRA. They try rank
  4, 16, and 64. Rank 4 underperforms by 8% on evaluation metrics. Rank 64 shows no
  improvement over rank 16 but uses 4x more memory. Explain why and choose the right
  rank.
question: Why does LoRA rank 4 underperform while rank 64 gives no gain over rank
  16 for SQL generation, and which rank should you choose?
details:
  realistic_solution: 'LoRA approximates the weight update delta_W = B*A where A in
    R^(r x d) and B in R^(d x r). The optimal rank equals the intrinsic dimensionality
    of the task-specific weight update. SQL generation is a structured task with grammar
    constraints — its update space is low-dimensional but not trivially so. Intrinsic
    dimensionality analysis: compute SVD of full fine-tune delta_W and count singular
    values above 1% of top SV threshold. For code-like tasks: typically r=16-32 captures
    >95% of the signal. Diagnosis: rank 4 misses fine-grained syntax patterns; rank
    64 overfits or adds noise. Use r=16 as baseline; verify with SV analysis on a
    rank-64 run: if top 16 SVs capture 95% of variance, r=16 is optimal.'
  common_mistake: Treating rank selection as a hyperparameter to maximize without
    a principled framework. Teams run expensive sweeps or default to r=8 or r=16 without
    analyzing the intrinsic dimensionality of the task or measuring gradient signal
    through the LoRA matrices.
  napkin_math: 'Memory for LoRA adapters on Llama-3 70B: rank r, model dim d=8192,
    80 attention layers. Per layer: 2 matrices (Q,V) * 2 (A+B) * r * d * 2B (BF16).
    r=4: 2*2*4*8192*2 = 262KB/layer * 80 = 21MB. r=16: 83MB. r=64: 335MB. Full fine-tune
    delta: 2*d*d*2B = 268MB per layer = 21.5GB total. LoRA r=64: 335MB vs 21.5GB full
    = 64x compression even at high rank.'
