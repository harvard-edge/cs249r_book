title: The Continuous Batching OOM
scenario: Your team is serving a 70B parameter LLM using INT8 quantization on H100s. You've implemented continuous batching with a paged KV cache, which has boosted throughput. However, under spiky traffic with long user contexts, the server is crashing with out-of-memory (OOM) errors. Assume the Llama-70B architecture (80 layers, 8 KV heads, 128-dim head) and that the KV cache is stored in FP16.
question: "How much KV-cache capacity remains after loading the 70B INT8 weights, and why can long contexts OOM the H100?"
details:
  realistic_solution: The primary source of memory pressure is the KV cache. While the model weights have a large but fixed size, the KV cache's memory footprint scales linearly with the sequence length and the number of concurrent requests. With only 10GB of free memory after loading the weights, a few users with long contexts can easily exhaust all available HBM.
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint of the KV cache.
    **The Rationale:** Engineers focus on the static model weights and forget that the KV cache grows dynamically with every user and token.
    **The Consequence:** They incorrectly blame memory leaks or fragmentation, wasting time debugging instead of limiting context lengths or batch sizes.
  napkin_math: |
    1. A 70B model in INT8 consumes roughly 70 GB of VRAM for weights alone.
    2. An H100 has 80 GB of HBM. 80 GB - 70 GB = 10 GB remaining for the KV cache and activations.
    3. KV cache per token in FP16: 2 (K+V) * 80 layers * 8 heads * 128 dim * 2 bytes = 327,680 bytes (~320 KB).
    4. 10 GB of free memory supports about 10 GB / 320 KB ≈ 31,000 total tokens in flight across all users.
    5. **A few concurrent 8k-context requests will instantly exhaust the 10 GB and trigger an OOM.**
  options:
  - The server has a memory leak, as the number of active requests is low when the OOMs occur.
  - The memory is becoming heavily fragmented by the paged KV cache allocator, leaving no large blocks free.
  - The KV cache for just a few users with long sequences is consuming the entire 10GB of available HBM.
  - The intermediate activations from the model's forward pass are causing the memory to run out.
  correct_index: 2
