validation_issues:
- The Napkin Math states 'A 70B model in INT8 consumes roughly 70 GB of VRAM for weights alone,' which
  is correct (70B * 1 byte/param), but then proceeds to calculate remaining memory based on H100's 80GB
  HBM. It is not clear how a 70B INT8 model, which fits the H100 with 10GB remaining, would cause OOM
  from the KV cache alone, as typical Llama-70B architectures at FP16 would use 320 KB/token, not for
  INT8. If the KV cache is FP16, this needs to be explicitly stated and calculated more rigorously.
