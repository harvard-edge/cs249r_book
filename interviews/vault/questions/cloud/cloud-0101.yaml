title: The Continuous Batching OOM
scenario: Your team is serving a 70B parameter LLM using INT8 quantization on H100s (80GB HBM). You've
  implemented continuous batching with a paged KV cache, which has boosted throughput. However, under
  spiky traffic with long user contexts, the server is crashing with out-of-memory (OOM) errors. You need
  to apply napkin math to demonstrate to your team where the memory pressure is coming from. Assume the
  Llama-70B architecture (80 layers, 8 KV heads, 128-dim head) and that the KV cache is stored in FP16.
question: "How much KV-cache capacity remains after loading the 70B INT8 weights, and why can long contexts OOM the H100?"
details:
  realistic_solution: The primary source of memory pressure is the KV cache. While the model weights have
    a large but fixed size, the KV cache's memory footprint scales linearly with the sequence length and
    the number of concurrent requests. With only 10GB of free memory after loading the weights, a few
    users with long contexts can easily exhaust all available HBM.
  common_mistake: Many engineers underestimate the memory footprint of the KV cache, especially with long
    contexts. They focus on the model weights' size, which is static, and forget that the KV cache grows
    dynamically with every user and every generated token. They might incorrectly blame memory leaks or
    fragmentation without calculating the cache's fundamental memory requirement.
  napkin_math: A 70B model in INT8 consumes roughly 70 GB of VRAM for weights alone. An H100 has 80 GB
    of HBM. 80 GB - 70 GB = 10 GB remaining for the KV cache and activations. If each token takes ~320
    KB (typical for 70B), 10 GB only supports about 31,000 total tokens in flight across all users. A
    few concurrent 8k-context requests will instantly OOM.
  options:
  - The server has a memory leak, as the number of active requests is low when the OOMs occur.
  - The memory is becoming heavily fragmented by the paged KV cache allocator, leaving no large blocks
    free.
  - The KV cache for just a few users with long sequences is consuming the entire 10GB of available HBM.
  - The intermediate activations from the model's forward pass are causing the memory to run out.
  correct_index: 2
