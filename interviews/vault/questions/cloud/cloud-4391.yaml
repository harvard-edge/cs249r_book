title: Cooling Fluid Routing for Hot-Aisle Containment in H100 Deployments
scenario: A datacenter architect is explaining hot-aisle containment (HAC) to a new ML infrastructure engineer. The facility houses 8×H100 nodes generating 8 kW IT load each, deployed in rows with HAC.
question: How does hot-aisle containment improve PUE for 8 kW H100 nodes, what thermodynamic mechanism matters, and what PUE gain is typical?
details:
  realistic_solution: 'HAC prevents hot exhaust air (50-55°C from H100 nodes) from mixing with cold supply air (18-22°C) in the open floor. Without containment, hot/cold air mixing raises the average CRAC inlet temperature, forcing chillers to work harder (each 1°C rise in chiller inlet ≈ 2-3% more chiller energy). With HAC, CRAC units see only hot return air at a consistent 50°C, enabling delta-T optimization. Typical PUE improvement: 0.1-0.15 PUE points (e.g., 1.5 → 1.35) from containment alone. Combined with economizer cooling (free cooling when outdoor temp < 18°C), HAC-equipped facilities regularly achieve PUE 1.1-1.15.'
  common_mistake: |
    **The Pitfall:** Confusing hot-aisle containment with cold-aisle containment.
    **The Rationale:** Engineers treat the two as interchangeable without understanding that HAC prevents recirculation and allows the CRAC to work at optimal high return temperatures.
    **The Consequence:** Suboptimal cooling designs that miss out on major efficiency gains.
  napkin_math: |
    1. Chiller overhead: 1°C inlet rise → 2.5% more power.
    2. Without HAC: 5°C rise = 12.5% more power.
    3. PUE impact on 10 MW at 1.5 PUE (5 MW cooling): 12.5% extra = 625 kW wasted.
    4. PUE reduction with HAC: 625 kW saved = 0.0625 PUE points.
    5. Economizer cooling addition: 0.05-0.10 PUE reduction.
    **Final Result: Combined HAC and economizer cooling achieves ~1.35 PUE.**
