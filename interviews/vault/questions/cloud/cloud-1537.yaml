title: Evaluating Membership Inference Attack Advantage
scenario: A cloud-based healthcare API hosts a fine-tuned RoBERTa model for clinical text classification,
  serving predictions on AWS g5.2xlarge instances. A security red team evaluates the API for Membership
  Inference Attacks (MIA) by querying it with 10,000 known training records and 10,000 holdout records.
  The attacker predicts a record is a "member" of the training set if the model's output confidence exceeds
  95%. They successfully flag 7,500 training records as members, but also falsely flag 1,500 holdout records.
  Calculate the attacker's True Positive Rate (TPR), False Positive Rate (FPR), and Attack Advantage.
  Based on this, what is the impact of the leakage and how should it be mitigated?
details:
  realistic_solution: Calculate TPR (7,500/10,000 = 0.75) and FPR (1,500/10,000 = 0.15). The Attack Advantage
    is 0.75 - 0.15 = 0.60. An advantage of 0.60 indicates severe training data memorization. Immediate
    mitigations include restricting the API to return only discrete predicted labels (removing confidence
    scores) or applying temperature scaling. Long-term, the model must be retrained using DP-SGD (Differentially
    Private SGD) with a bounded epsilon to mathematically guarantee privacy.
  common_mistake: Calculating the attack's overall accuracy instead of the Attack Advantage, failing to
    recognize that Advantage (TPR - FPR) is the standard metric to isolate privacy leakage beyond random
    guessing.
  napkin_math: 'TPR = True Positives / Total Training Records = 7500 / 10000 = 0.75

    FPR = False Positives / Total Holdout Records = 1500 / 10000 = 0.15

    Attack Advantage = TPR - FPR = 0.75 - 0.15 = 0.60

    An advantage of 0.60 means the attacker is 60% more effective at identifying training data than random
    chance.'
