title: Evaluating Membership Inference Attack Advantage
scenario: A cloud-based healthcare API hosts a fine-tuned RoBERTa model for clinical text classification. A security red team evaluates the API for Membership Inference Attacks (MIA) by querying it with 10,000 known training records and 10,000 holdout records. The attacker predicts a record is a "member" of the training set if the model's output confidence exceeds 95%. They successfully flag 7,500 training records as members, but also falsely flag 1,500 holdout records.
question: What are the MIA TPR, FPR, and Attack Advantage, and what do they imply for leakage and mitigation?
details:
  realistic_solution: Calculate TPR (7,500/10,000 = 0.75) and FPR (1,500/10,000 = 0.15). The Attack Advantage is 0.75 - 0.15 = 0.60. An advantage of 0.60 indicates severe training data memorization. Immediate mitigations include restricting the API to return only discrete predicted labels (removing confidence scores) or applying temperature scaling. Long-term, the model must be retrained using DP-SGD (Differentially Private SGD) with a bounded epsilon to mathematically guarantee privacy.
  common_mistake: |
    **The Pitfall:** Calculating overall accuracy instead of Attack Advantage.
    **The Rationale:** Candidates default to standard classification metrics rather than recognizing that Advantage (TPR - FPR) is the standard metric to isolate privacy leakage beyond random guessing.
    **The Consequence:** The candidate fails to quantify the true extent of the privacy violation.
  napkin_math: |
    *   **True Positive Rate (TPR):** 7,500 / 10,000 = 0.75
    *   **False Positive Rate (FPR):** 1,500 / 10,000 = 0.15
    *   **Attack Advantage:** 0.75 - 0.15 = 0.60
    *   **Result: An attack advantage of 0.60 indicates the attacker is 60% more effective at identifying training data than random chance, confirming severe memorization.**
