title: 'A100 LLM Cost Analysis: Training & Inference'
scenario: Your team is training a new 70B parameter LLM on a cluster of NVIDIA A100
  (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s, 400W) GPUs. The model requires 10^24 FLOPs
  for training. For inference, you expect to serve 100,000 requests, each requiring
  10^12 FLOPs, and these requests are processed over a total of 100 GPU-hours due
  to varying load and batching strategies. A single A100 GPU hour costs $3.00. Analyze
  the total GPU-hours and dollar cost for both training and inference. Explain the
  key factors that influence these estimations and potential bottlenecks on the A100
  platform.
question: How would you estimate A100 GPU-hours and cost for 10^24 FLOP training plus
  100 GPU-hours of inference, and what bottlenecks affect accuracy?
details:
  realistic_solution: Use profiling tools to identify bottlenecks (e.g., memory bound
    vs. compute bound). Benchmark small-scale runs to extrapolate performance. Factor
    in practical efficiency coefficients (e.g., 30-50% of peak FLOPs for real-world
    workloads). Optimize data pipelines to keep GPUs fed. For inference, implement
    dynamic batching, model quantization, and consider provisioning based on peak
    vs. average load, using autoscaling where possible.
  common_mistake: Underestimating the impact of memory bandwidth on real-world throughput,
    especially for large models or specific operations. Neglecting communication overhead
    in distributed training or overlooking the overhead of non-compute tasks (data
    loading, pre/post-processing). For inference, not accounting for tail latencies
    or the cost of provisioning partially utilized GPUs.
  napkin_math: 'NVIDIA A100 (FP16): 312 TFLOPS = 312 * 10^12 FLOPs/second.


    Training:

    - Peak FLOPs/hour: 312 * 10^12 * 3600 = 1.1232 * 10^18 FLOPs/hour.

    - Assuming a practical 40% MFU: Effective FLOPs/hour = 4.4928 * 10^17.

    - Estimated GPU-hours for training: (10^24 FLOPs) / (4.4928 * 10^17 FLOPs/hour)
    = ~2,225,783 GPU-hours.

    - Estimated training cost: 2,225,783 GPU-hours * $3.00/hour = ~$6,677,349.


    Inference:

    - Given 100 GPU-hours for inference requests.

    - Inference cost: 100 GPU-hours * $3.00/hour = $300.


    Total Estimated Cost: ~$6,677,349 (training) + $300 (inference) = ~$6,677,649.'
