title: Pipeline Bubble Fraction
scenario: A 50B parameter model is trained across 8 MI300X GPUs. The team employs synchronous 1F1B (One-Forward-One-Backward) pipeline parallelism mapped over 4 pipeline stages. To maintain convergence bounds, they set the schedule to process exactly 16 micro-batches per global step.
question: Calculate the exact percentage of compute time wasted as pipeline bubble (idle time) for the first pipeline stage during a global step.
visual:
  kind: svg
  path: cloud-2856.svg
  alt: A Gantt chart for a 4-stage 1F1B pipeline showing forward and backward passes shifted over time steps, creating a visible bubble at start and end.
  caption: 1F1B pipeline schedule showing pipeline fill and drain bubbles.
details:
  realistic_solution: In a 1F1B pipeline schedule with p stages and m micro-batches, the pipeline bubble duration is incurred during the initial fill and the final drain. This bubble represents p-1 full compute steps (forward + backward) of idle time. The ideal compute time if perfectly parallelized would be m steps. Therefore, the fraction of wasted time is (p - 1) / m. With p = 4 and m = 16, the bubble fraction is (4 - 1) / 16 = 3 / 16 = 18.75%.
  common_mistake: |
    **The Pitfall:** Calculating the bubble fraction as (p-1) / (p+m-1).
    **The Rationale:** Candidates incorrectly calculate the proportion of time steps on the timeline rather than the ratio of idle time to active compute time.
    **The Consequence:** Underestimating the true compute inefficiency and wasted time of the pipeline schedule.
  napkin_math: |
    1. Identify parameters: Pipeline stages (p) = 4, micro-batches (m) = 16.
    2. Calculate bubble steps: A 1F1B schedule has a bubble of p - 1 steps. 4 - 1 = 3 steps.
    3. Calculate ideal compute steps: Ideal compute time is m steps = 16 steps.
    4. Calculate fraction: Wasted fraction = Bubble / Ideal = (p - 1) / m = 3 / 16.
    5. **Result: 18.75% of compute time is wasted.**
