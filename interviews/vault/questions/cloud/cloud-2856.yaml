title: Pipeline Bubble Fraction
scenario: A 50B parameter model is trained across 8 MI300X GPUs. The team employs
  synchronous 1F1B (One-Forward-One-Backward) pipeline parallelism mapped over 4 pipeline
  stages. To maintain convergence bounds, they set the schedule to process exactly
  16 micro-batches per global step.
question: Calculate the exact percentage of compute time wasted as pipeline bubble
  (idle time) for the first pipeline stage during a global step.
visual:
  kind: svg
  path: cloud-2856.svg
  alt: A Gantt chart for a 4-stage 1F1B pipeline showing forward and backward passes
    shifted over time steps, creating a visible bubble at start and end.
  caption: 1F1B pipeline schedule showing pipeline fill and drain bubbles.
details:
  realistic_solution: In a 1F1B pipeline schedule with p stages and m micro-batches,
    the pipeline bubble duration is incurred during the initial fill and the final
    drain. This bubble represents p-1 full compute steps (forward + backward) of idle
    time. The ideal compute time if perfectly parallelized would be m steps. Therefore,
    the fraction of wasted time is (p - 1) / m. With p = 4 and m = 16, the bubble
    fraction is (4 - 1) / 16 = 3 / 16 = 18.75%.
  common_mistake: Calculating the bubble fraction as (p-1) / (p+m-1), which incorrectly
    calculates the proportion of time steps on the timeline rather than the ratio
    of idle time to active compute time.
  napkin_math: (4 - 1) / 16 = 3 / 16 = 18.75%
