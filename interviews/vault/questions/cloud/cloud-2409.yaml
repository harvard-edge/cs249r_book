title: QAT Gradient Oscillation
scenario: You are performing Quantization-Aware Training (QAT) to fine-tune an INT4 ResNet-50 variant for a high-throughput edge-cloud hybrid pipeline. You use the Straight-Through Estimator (STE) for the backward pass. Training loss oscillates wildly, and gradient norms spike from ~1.5 to >50 unexpectedly between consecutive batches. The learning rate is set to 1e-3.
question: What is the mechanistic cause of this training instability during INT4 QAT?
details:
  realistic_solution: The symptom is caused by an impedance mismatch between the Straight-Through Estimator (STE) and the learning rate relative to the quantization step size (delta). In INT4, the weight range is divided into 16 bins. If the weight update (learning rate * gradient) is larger than the distance to the next quantization boundary, the quantized weight jumps to a new bin. Because STE uses coarse approximations, the new bin causes a completely different forward pass, which generates a large opposing gradient in the next step, causing the weight to flip-flop across the boundary. The solution is to drastically lower the learning rate (e.g., to 1e-5), use a smoothed/soft STE, or use a cosine annealing schedule that allows the weights to settle into their quantized bins.
  common_mistake: |
    **The Pitfall:** Assuming the batch size is too small, causing noisy gradients.
    **The Rationale:** Wildly oscillating loss and gradient spikes are classic symptoms of a small batch size in standard FP32 training.
    **The Consequence:** Increasing the batch size wastes compute and memory without fixing the underlying Straight-Through Estimator (STE) impedance mismatch, causing the training to continue oscillating.
  napkin_math: |
    - **INT4 Quantization Bins:** For normalized weights [-1, 1] in INT4 (16 levels), the step size delta = 2 / 15 &approx; 0.133.
    - **Weight Update:** If LR = 1e-3 and gradient = 150, the weight update = 1e-3 &times; 150 = 0.15.
    - **The Mismatch:** Since the update (0.15) is greater than the bin size (0.133), the weight jumps to a completely different quantization bin in a single step.
    - **Result:** This single-step bin jump causes massive forward-pass variance and **gradient oscillation**.
