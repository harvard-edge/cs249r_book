validation_issues:
- The napkin math for KV-cache allocation seems incorrect; 34.5 GB per request for 42K tokens FP16 is
  unusually large. It should be 2 bytes/token * 42196 tokens * (num_layers * num_heads * head_dim) * 2
  (for K and V), not 2 * 40 * 40 * 128 * 2 bytes * 42196.
