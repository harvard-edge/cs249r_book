title: The Vision-Language Model Serving
scenario: You are serving a vision-language model (LLaVA-1.5 13B). Users uploading 4K images (3840×2160) experience an 8-second TTFT. The text-only version of the same model has a 200ms TTFT.
question: Where are the 7.8 extra seconds going?
details:
  realistic_solution: 'VLMs convert images into visual tokens via a vision encoder (typically ViT), then concatenate these with text tokens for the LLM. A 4K image at the default patch size (14×14 pixels) produces $(3840/14) \times (2160/14) \approx 274 \times 154 = 42,196$ visual tokens. The LLM must prefill all of these — the same as a 42K-token text prompt. The vision encoder itself takes ~50ms; the remaining 7.75 seconds is pure LLM prefill over 42K visual tokens. The fix: downsample images, use adaptive resolution (only high-res where needed), or use a vision encoder with larger patch sizes.'
  common_mistake: |
    **The Pitfall:** Blaming the vision encoder (ViT) for being slow and trying to swap it for a smaller vision model.
    **The Rationale:** Not realizing that the vision encoder itself is fast, but it generates an enormous number of tokens that the LLM must process.
    **The Consequence:** Wasting time tuning the encoder while ignoring the massive O(N²) LLM prefill bottleneck caused by visual tokens.
  napkin_math: |
    - **Vision encoder (ViT-L/14):** Forward pass on 4K image takes ~50ms.
    - **Visual tokens:** (3840/14) × (2160/14) $\approx$ 274 × 154 = 42,196 tokens.
    - **LLM Prefill (13B):** $2 \times 13\text{B} \times 42,196 = 1,097\text{ TFLOPs}$.
    - On an A100 (~156 TFLOPS effective): $1,097 / 156 \approx 7.0\text{ seconds}$.
    - **KV Cache Allocation:** $2\text{ (K,V)} \times 40\text{ layers} \times 40\text{ heads} \times 128\text{ dim} \times 2\text{ bytes (FP16)} \times 42,196\text{ tokens} \approx 34.5\text{ GB}$.
    - **The 7.8 seconds is overwhelmingly dominated by the LLM prefill phase for 42K visual tokens.**
