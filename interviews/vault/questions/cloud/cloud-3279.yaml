title: TPU v5e Activation Memory & Gradient Checkpointing for LLMs
scenario: You are training a multi-billion parameter Large Language Model (LLM) on
  a Google TPU v5e, which features 16 GB of HBM, 197 TFLOPS BF16, and 1.6 TB/s memory
  bandwidth. During the forward pass, you observe that the activation memory consumption
  is exceeding the 16 GB HBM limit, leading to out-of-memory errors and preventing
  you from increasing the batch size. You need to leverage gradient checkpointing
  to mitigate this. Describe how you would strategically apply gradient checkpointing,
  considering the hardware specifics of the TPU v5e, to maximize memory savings while
  minimizing the impact on training throughput. Detail the compute-memory tradeoff
  involved.
question: How would you apply gradient checkpointing on a TPU v5e to fit the LLM within
  16 GB HBM while preserving training throughput?
details:
  realistic_solution: A realistic solution involves profiling the model's memory usage
    layer by layer to identify the layers that contribute most significantly to activation
    memory peak. Apply gradient checkpointing primarily to memory-intensive layers,
    typically deeper layers or those with large intermediate tensors. For the TPU
    v5e with its high BF16 TFLOPS, the recomputation cost might be relatively low
    compared to the memory savings, making checkpointing more attractive. Consider
    checkpointing only a subset of layers (e.g., every N layers) or using a hybrid
    approach where some smaller activations are kept in memory while larger ones are
    recomputed. Optimize the recomputation path to ensure it's efficient and leverages
    the TPU's BF16 capabilities. Monitor the training throughput post-implementation
    to fine-tune the checkpointing strategy and achieve the optimal compute-memory
    balance.
  common_mistake: A common mistake is to apply gradient checkpointing indiscriminately
    to all layers without considering the computational cost of recomputing activations.
    This can lead to a significant slowdown in training if recomputation overhead
    outweighs the benefits, especially for layers with high compute-to-memory ratios
    (e.g., simple element-wise operations with many activations). Another mistake
    is not accounting for the additional memory required for checkpointing itself
    (e.g., storing pointers to saved activations).
  napkin_math: 'Assume an LLM layer generates a tensor of shape (batch_size, sequence_length,
    hidden_size) where batch_size=4, sequence_length=2048, hidden_size=8192, and activations
    are stored in BF16 (2 bytes per element). Memory per activation tensor: 4 * 2048
    * 8192 * 2 bytes ≈ 134 MB. If you have 100 such layers, the total activation memory
    could easily exceed 13.4 GB, pushing beyond the 16 GB HBM. Checkpointing reduces
    this by not storing activations for intermediate layers, effectively capping the
    memory footprint to a few layers'' activations plus the recomputation cost. For
    example, checkpointing every other layer could halve the activation memory, but
    requires recomputing activations for 50 layers in the backward pass. The cost
    of recomputing 134 MB of activations involves loading inputs and performing operations,
    which needs to be weighed against the 1.6 TB/s memory bandwidth for reloading
    saved activations and the 197 TFLOPS for compute.'
