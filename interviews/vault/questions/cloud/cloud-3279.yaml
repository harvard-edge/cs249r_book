title: TPU v5e Activation Memory & Gradient Checkpointing for LLMs
scenario: You are training a multi-billion parameter Large Language Model (LLM) on a Google TPU v5e (16 GB HBM, 197 TFLOPS BF16, 1.6 TB/s memory bandwidth). During the forward pass, you observe that the activation memory consumption is exceeding the 16 GB HBM limit, leading to out-of-memory errors and preventing you from increasing the batch size.
question: How would you apply gradient checkpointing on a TPU v5e to fit the LLM within 16 GB HBM while preserving training throughput?
details:
  realistic_solution: A realistic solution involves profiling the model's memory usage layer by layer to identify the layers that contribute most significantly to activation memory peak. Apply gradient checkpointing primarily to memory-intensive layers, typically deeper layers or those with large intermediate tensors. For the TPU v5e with its high BF16 TFLOPS, the recomputation cost might be relatively low compared to the memory savings, making checkpointing more attractive. Consider checkpointing only a subset of layers (e.g., every N layers) or using a hybrid approach where some smaller activations are kept in memory while larger ones are recomputed. Optimize the recomputation path to ensure it's efficient and leverages the TPU's BF16 capabilities. Monitor the training throughput post-implementation to fine-tune the checkpointing strategy and achieve the optimal compute-memory balance.
  common_mistake: |
    **The Pitfall:** Applying gradient checkpointing indiscriminately to every single layer in the model.
    **The Rationale:** Candidates use checkpointing as a blunt instrument to solve OOM errors without balancing the compute tradeoff.
    **The Consequence:** Recomputation overhead violently outweighs memory savings, drastically dropping training throughput.
  napkin_math: |
    - Single layer activation (Batch=4, Seq=2048, Hidden=8192, BF16): 4 × 2048 × 8192 × 2 bytes ≈ 134 MB.
    - 100 layers = 13.4 GB total activations (dangerously close to 16 GB HBM limit).
    - Checkpointing every 2nd layer saves ~6.7 GB HBM.
    - Recomputation Cost: Reloading inputs takes 134 MB / 1.6 TB/s = ~0.08 ms per layer.
    - **Conclusion:** Strategic partial checkpointing comfortably fits the batch in 16 GB while preserving high BF16 TFLOPS utilization.
