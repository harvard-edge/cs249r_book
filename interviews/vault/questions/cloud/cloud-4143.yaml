title: K8s Pod Failure Semantics for Distributed Training
scenario: A 32-GPU training job running as a Kubeflow PyTorchJob has one worker pod killed by the OOM killer (memory limit exceeded). The other 31 pods are still running.
question: What happens next to the other 31 pods, and how should the PyTorchJob be configured to handle this correctly?
details:
  realistic_solution: 'Chain of events: (1) Pod killed by OOM killer → container exits with code 137. (2) The 31 remaining ranks call the next NCCL collective (e.g., AllReduce) and block waiting for rank from the dead pod. (3) After NCCL_TIMEOUT (default 30 min), all 31 ranks throw TimeoutError and crash. (4) PyTorchJob controller detects failed workers. Configuration for correct handling: (a) Set restartPolicy: OnFailure in the PyTorchJob spec. When any worker fails, the PyTorchJob controller restarts ALL workers (not just the failed one) because NCCL communicators must be re-initialized with all ranks. (b) Enable elastic training: set elasticPolicy.minReplicas and maxReplicas. With TorchElastic, surviving workers detect the failure via the rendezvous mechanism, checkpoint, and re-form with available ranks. (c) Set NCCL_ASYNC_ERROR_HANDLING=1 or use torch.distributed''s init_process_group with timeout parameter to fail fast instead of waiting 30 minutes. (d) Fix the root cause: increase memory limits (likely the DataLoader or activation checkpointing needed), or reduce batch size to fit in the memory limit. (e) Always set resources.limits.memory generously for training pods — OOM during training is always worse than wasting memory.'
  common_mistake: |
    **The Pitfall:** Expecting the 31 remaining pods to safely continue training or cleanly exit immediately.
    **The Rationale:** Candidates unfamiliar with distributed collective operations assume independent fault tolerance, but NCCL ranks will hang indefinitely waiting for the dead node.
    **The Consequence:** Silent hanging of expensive training clusters, wasting tens or hundreds of GPU-hours doing absolutely nothing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Default NCCL Timeout: 30 minutes.
       * 31 remaining pods.
    2. **Calculations:**
       * Wasted Compute: 31 pods * 30 min = 15.5 GPU-hours wasted before timeout.
       * Fail-Fast Configuration: NCCL_ASYNC_ERROR_HANDLING=1 fails in ~1 min (0.5 GPU-hours wasted).
    3. **Conclusion & Interpretation:**
       * **Result: Wasted Compute.** Without fail-fast or elastic recovery, 15.5 expensive GPU-hours are burnt waiting for a dead peer.
