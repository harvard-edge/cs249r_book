title: GPU Utilization Monitoring and Right-Sizing
scenario: You observe that 40% of GPU jobs on your MI300X cluster show <20% GPU utilization
  (SM activity). List three common causes and the right-sizing action for each.
question: What are three common causes of <20% GPU utilization on MI300X jobs, and
  what right-sizing action would you take for each?
details:
  realistic_solution: 'Cause 1: CPU-bound data preprocessing. The DataLoader cannot
    feed data fast enough, leaving GPUs idle between batches. GPU util cycles between
    0% and 100%. Fix: increase num_workers, use prefetching, move preprocessing to
    GPU (DALI/cuDF), or use WebDataset for pre-processed shards. Cause 2: Excessive
    GPU memory requested but not used. User requests 1 full MI300X (192 GB) for a
    3B model that uses 20 GB. GPU SM utilization may be fine per-batch but the remaining
    172 GB is wasted. Fix: use MIG 3g.40gb partition, freeing 4/7 of the GPU for other
    jobs. Cause 3: Small model with large batch gaps. Inference serving with low QPS
    — GPU computes a forward pass in 5 ms but waits 200 ms between requests. Average
    utilization: 5/205 = 2.4%. Fix: (a) enable dynamic batching (wait up to 50 ms
    to collect multiple requests), (b) colocate multiple models on the same GPU, (c)
    switch to a smaller GPU or MIG partition. Right-sizing policy: jobs consistently
    below 30% utilization for >1 hour get flagged with a recommendation to reduce
    GPU allocation.'
  common_mistake: Assuming low GPU utilization always means the user requested too
    many GPUs. Often the issue is CPU-bound data loading, inefficient kernels, or
    excessive synchronization.
  napkin_math: '40% of cluster at 20% utilization: effective waste = 0.4 × 0.8 = 32%
    of cluster capacity. On 100 MI300X at $3/hr: $96/hr = $840K/year wasted.'
