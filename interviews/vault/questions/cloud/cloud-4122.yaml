title: GPU Utilization Monitoring and Right-Sizing
scenario: You observe that 40% of GPU jobs on your compute cluster show <20% GPU utilization (SM activity).
question: "What are three common causes of <20% GPU utilization, and what right-sizing action would you take for each?"
details:
  realistic_solution: 'Cause 1: CPU-bound data preprocessing. The DataLoader cannot feed data fast enough, leaving GPUs idle between batches. GPU util cycles between 0% and 100%. Fix: increase num_workers, use prefetching, move preprocessing to GPU (DALI/cuDF), or use WebDataset for pre-processed shards. Cause 2: Excessive GPU memory requested but not used. User requests 1 full MI300X (192 GB) for a 3B model that uses 20 GB. GPU SM utilization may be fine per-batch but the remaining 172 GB is wasted. Fix: use MIG 3g.40gb partition, freeing 4/7 of the GPU for other jobs. Cause 3: Small model with large batch gaps. Inference serving with low QPS — GPU computes a forward pass in 5 ms but waits 200 ms between requests. Average utilization: 5/205 = 2.4%. Fix: (a) enable dynamic batching (wait up to 50 ms to collect multiple requests), (b) colocate multiple models on the same GPU, (c) switch to a smaller GPU or MIG partition. Right-sizing policy: jobs consistently below 30% utilization for >1 hour get flagged with a recommendation to reduce GPU allocation.'
  common_mistake: |
    **The Pitfall:** Assuming low GPU utilization strictly means the user requested more GPU compute than their model requires.
    **The Rationale:** Administrators look at SM utilization in isolation, ignoring that GPUs often sit idle waiting for slow CPU data loaders or network synchronization.
    **The Consequence:** Blindly shrinking GPU allocations, which fails to solve data bottlenecks and simply makes the jobs run even slower.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40% of the cluster is running at 20% utilization.
       - 100-GPU cluster at $3/hr per GPU.
    2. **Calculations:**
       - Effective waste = 0.40 * (1.00 - 0.20) = 32% of total cluster capacity.
       - Hourly waste: 100 GPUs * 32% * $3/hr = $96/hr.
       - Yearly waste: $96/hr * 8760 hrs ≈ $840,960.
    3. **Conclusion & Interpretation:** **Result: Utilization-Bound**. This inefficiency wastes approximately $840,000 per year, prioritizing the need for aggressive right-sizing.
