title: Progressive Rollout of a Large Language Model on AMD MI300X
scenario: "Your production environment uses 100 AMD MI300X GPUs to serve an LLM at 100,000 requests per second. You need to progressively roll out a new, slightly larger 150 GB version of the LLM."
question: How would you progressively roll out the 150 GB LLM on MI300X while monitoring performance and enabling rapid rollback?
details:
  realistic_solution: Implement a multi-stage progressive rollout. Start with shadow deployment to compare inference latency and throughput against the old model using real production traffic without impacting users. Then, initiate a canary release, gradually increasing traffic (e.g., 1%, 5%, 10%, 25%, 50%, 100%) to the new version. During each stage, monitor key metrics like QPS, P99 latency, error rates, HBM3 utilization, FP16 sparse compute utilization, and memory bandwidth on the MI300X GPUs. Establish clear rollback triggers (e.g., latency degradation by >10%, error rate increase by >0.1%). Utilize traffic splitting mechanisms (e.g., service mesh, load balancer rules) and ensure the deployment system supports rapid rollback to the previous stable version if issues are detected.
  common_mistake: |
    **The Pitfall:** Rolling out the new model directly to 100% of traffic or without robust GPU-specific monitoring.
    **The Rationale:** Candidates underestimate the risk of performance regressions or resource exhaustion on specialized hardware (MI300X) and fail to monitor HBM3 utilization or compute efficiency.
    **The Consequence:** The deployment causes widespread service degradation or outages because rollback triggers are poorly defined.
  napkin_math: |
    - **Analyze new model size:** The 150GB LLM fits comfortably on a single MI300X (192 GB HBM3).
    - **Analyze current capacity:** 100 MI300X GPUs handle 100,000 RPS.
    - **Calculate canary requirement:** A 1% canary rollout targets 1% of the total traffic.
    - **Calculate new hardware needed:** 1% of 100 GPUs = **1 additional MI300X GPU** must be provisioned to handle the canary traffic safely.
