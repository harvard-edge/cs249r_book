title: Progressive Rollout of a Large Language Model on AMD MI300X
scenario: Your team is responsible for deploying a foundational large language model
  (LLM) serving millions of users. The current production environment leverages a
  fleet of AMD MI300X accelerators, each equipped with 192 GB HBM3, capable of 1,307
  TFLOPS FP16 sparse compute, and offering 5.3 TB/s memory bandwidth. A new, more
  accurate but slightly larger version of the LLM (model size ~150 GB) has been developed.
  You need to implement a progressive rollout strategy to introduce this new model
  with minimal risk and impact on user experience, while carefully monitoring its
  performance and resource consumption on the MI300X fleet.
question: How would you progressively roll out the 150 GB LLM on MI300X while monitoring
  performance and enabling rapid rollback?
details:
  realistic_solution: Implement a multi-stage progressive rollout. Start with shadow
    deployment to compare inference latency and throughput against the old model using
    real production traffic without impacting users. Then, initiate a canary release,
    gradually increasing traffic (e.g., 1%, 5%, 10%, 25%, 50%, 100%) to the new version.
    During each stage, monitor key metrics like QPS, P99 latency, error rates, HBM3
    utilization, FP16 sparse compute utilization, and memory bandwidth on the MI300X
    GPUs. Establish clear rollback triggers (e.g., latency degradation by >10%, error
    rate increase by >0.1%). Utilize traffic splitting mechanisms (e.g., service mesh,
    load balancer rules) and ensure the deployment system supports rapid rollback
    to the previous stable version if issues are detected.
  common_mistake: Rolling out the new model directly to 100% of traffic without sufficient
    canary testing or using an inadequate rollback plan, potentially leading to widespread
    service degradation or outages due to unforeseen performance regressions or resource
    exhaustion on the specialized MI300X hardware. Another mistake is not having robust
    monitoring specifically for GPU metrics (HBM3 utilization, compute efficiency)
    during the rollout.
  napkin_math: 'The new 150GB LLM version can fit comfortably on a single AMD MI300X (192 GB HBM3). Your current production system processes 100,000 requests per second (RPS) using 100 MI300X GPUs. If you decide to roll out a 1% canary of the new model, assuming each MI300X can handle similar RPS for both models, how many *additional* MI300X GPUs would you need to provision for this initial 1% canary traffic, assuming the existing 100 GPUs are fully utilized by the old model? Answer: 1% of 100 GPUs is 1 GPU. You would need to provision 1 additional MI300X GPU.'
