title: Rack Power Budgeting for H100 vs A100 Servers
scenario: 'You are planning power provisioning for a new AI cluster. A standard datacenter rack provides a strict 15 kW power budget and the host system (CPUs, RAM, networking) draws a flat 2 kW per server.'
question: "What are the H100 and A100 TDPs, and how many 8-GPU servers of each fit in a 15 kW rack with 2 kW host power?"
details:
  realistic_solution: 'The candidate should recall the 700W and 400W TDPs, calculate the total GPU power, add the host system power, and then divide the 15 kW rack budget by the total server power. Since power budgets represent strict physical limits, the resulting number of servers must be rounded down to the nearest whole integer to prevent tripping rack breakers.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the host system power overhead, or improperly rounding up the final server count per rack.
    **The Rationale:** Candidates laser-focus on GPU TDP specs but ignore that system-level planning requires accounting for the entire motherboard and strict hard-limits on breaker trips.
    **The Consequence:** Deploying too many servers per rack, leading to immediate catastrophic power tripping, datacenter outages, and fire hazards.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack power limit: 15.0 kW (strict).
       - Host system power: 2.0 kW per server.
       - H100 TDP: 700W.
       - A100 TDP: 400W.
    2. **Calculations:**
       - Total 8xH100 Server Power = (8 × 0.7 kW) + 2.0 kW = 7.6 kW.
       - H100 Servers per rack = floor(15.0 / 7.6) = 1 server.
       - Total 8xA100 Server Power = (8 × 0.4 kW) + 2.0 kW = 5.2 kW.
       - A100 Servers per rack = floor(15.0 / 5.2) = 2 servers.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound**. The massive 700W TDP of the H100 dictates that only **one server** can be safely provisioned per 15 kW rack, forcing massive datacenter footprint expansion.
