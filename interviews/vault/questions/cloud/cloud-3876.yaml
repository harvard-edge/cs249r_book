title: Rack Power Budgeting for H100 vs A100 Servers
scenario: You are assisting the infrastructure team in planning power provisioning
  for a new AI cluster. From memory, state the TDP (Thermal Design Power) of a single
  Nvidia H100 GPU and an A100 GPU. Using these figures, calculate the peak power draw
  for the GPUs in a standard 8-GPU node for both architectures. Finally, if a standard
  datacenter rack provides a strict 15 kW power budget and the host system (CPUs,
  RAM, networking) draws a flat 2 kW per server, determine how many full 8xH100 servers
  versus 8xA100 servers can be safely deployed per rack.
question: What are the H100 and A100 TDPs, and how many 8-GPU servers of each fit
  in a 15 kW rack with 2 kW host power?
details:
  realistic_solution: The candidate should recall the 700W and 400W TDPs, calculate
    the total GPU power, add the host system power, and then divide the 15 kW rack
    budget by the total server power. Since power budgets represent strict physical
    limits, the resulting number of servers must be rounded down to the nearest whole
    integer to prevent tripping rack breakers.
  common_mistake: Candidates often forget the exact TDP values (700W for H100, 400W
    for A100) or fail to include the host system power overhead when calculating the
    total server power footprint. Another frequent error is rounding up the number
    of servers per rack instead of flooring it, which would violate the strict power
    budget.
  napkin_math: 'H100 GPU Power: 8 * 700W = 5600W (5.6 kW).

    Total 8xH100 Server Power: 5.6 kW + 2.0 kW = 7.6 kW.

    H100 Servers per 15 kW rack: floor(15.0 / 7.6) = 1 server.


    A100 GPU Power: 8 * 400W = 3200W (3.2 kW).

    Total 8xA100 Server Power: 3.2 kW + 2.0 kW = 5.2 kW.

    A100 Servers per 15 kW rack: floor(15.0 / 5.2) = 2 servers.'
