title: 'NVIDIA A100 Inference: Load Balancing for Distributed ML Systems'
scenario: You are designing an inference serving system for a real-time ML model with stringent latency requirements. Your cluster consists of 10 NVIDIA A100 GPUs distributed across two data centers. You need to handle highly variable inference traffic with unpredictable spikes and dips. Consider two primary load-balancing strategies: 1. Weighted Round-Robin (WRR) dynamically based on utilization, and 2. Consistent Hashing with Locality Awareness.
question: How would you evaluate WRR versus locality-aware consistent hashing for 10 A100s across two data centers to handle traffic spikes and GPU failures?
details:
  realistic_solution: A hybrid, adaptive load balancing solution is often most effective. This might involve an initial consistent hashing layer to route requests to the nearest data center and then a dynamic, telemetry-driven weighted round-robin or least-loaded strategy within that data center. The system would continuously monitor A100 metrics (Tensor Core utilization, HBM2e bandwidth saturation, PCIe bandwidth, inference queue length, and temperature) to dynamically adjust weights or re-hash requests. A robust health-check mechanism for each A100, combined with fast failover logic to re-route traffic from unhealthy GPUs, is crucial. Service mesh capabilities could be leveraged for advanced traffic management (e.g., canary rollouts, circuit breakers).
  common_mistake: |
    **The Pitfall:** Solely focusing on average GPU utilization without considering tail latencies or the memory vs. compute bottleneck.
    **The Rationale:** Candidates often ignore that real-time inference is bottlenecked by memory bandwidth (data transfer) rather than peak compute (FLOPS), and they forget inter-DC network latency.
    **The Consequence:** Designing a load balancing strategy that maximizes utilization but consistently violates real-time P99 latency SLAs.
  napkin_math: |
    *   **Peak Throughput (FP16):** 10 A100s * 312 TFLOPS = 3,120 TFLOPS.
    *   **Inference Capacity:** If one inference takes 50 GFLOPs, 3,120 * 10^3 / 50 ≈ 62,400 inferences/second.
    *   **Memory Bandwidth Bound:** If an inference requires 1 GB from HBM2e (2.0 TB/s), one A100 supports 2,000 inferences/second.
    *   **Final Result:** **Latency targets dictate the choice; WRR with locality awareness minimizes inter-DC latency penalties (e.g., hitting a 50ms P99 target) while absorbing spikes.**
