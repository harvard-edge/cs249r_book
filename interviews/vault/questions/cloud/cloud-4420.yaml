title: Multi-Die Power Delivery Network Design for AI Chiplet
scenario: A chiplet AI accelerator with 4 compute dies and 2 HBM stacks on a silicon
  interposer experiences voltage droop of 8% during matrix multiply bursts, causing
  frequency throttling. Design a power delivery network to reduce droop to under 3%.
question: How would you design the PDN for the 4-compute-die, 2-HBM chiplet package
  to reduce matrix-multiply voltage droop from 8% to under 3%?
details:
  realistic_solution: 'Address droop at each hierarchy: (1) On-die decap: maximize MOM capacitor fill in all metal layers above active logic — target 10 nF/mm² on N5. (2) Package-embedded capacitors: thin-film capacitors in package substrate (100 pF/mm²), placed directly under hot compute regions. (3) Active voltage regulator (AVR) on package: integrated VRM with <2ns response time, 100A/ns slew rate. (4) Structured power mesh: 4um pitch power grid on M8/M9 to minimize IR drop. Budget: 8% droop (80mV at 1V) at 750A transient current implies a ~0.106mΩ effective PDN impedance. Target: 3% → need 0.04mΩ. Achieve with extensive on-die decap (reduces high-freq component) + faster integrated VRM.'
  common_mistake: Adding bulk capacitance at the PCB level to solve on-package droop.
    PCB decoupling caps have ~10ns response time, but on-package voltage droop during
    burst workloads occurs in 1-2ns. The effective series inductance (ESL) of PCB
    capacitors makes them ineffective for nanosecond-scale droop.
  napkin_math: '1V supply. 80mV / 750A = 0.106 mΩ. To hit 3% (30mV), Z_PDN must be 30mV / 750A = 0.04 mΩ (40 μΩ). Adding 50 μF of on-die decap with a very low effective ESL of 1 pH: impedance at 1GHz = 2π * 1G * 1pH + 1 / (2π * 1G * 50μF) = 6.28 mΩ + 0.003 mΩ ≈ 6.28 mΩ. Even with 1 pH ESL, passive decap impedance at 1GHz is too high to single-handedly hit 0.04 mΩ, proving that advanced packaging with active voltage regulators is required for full solution.'
