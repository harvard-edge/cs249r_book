title: Custom Autograd vs Reverse-Linked Graph
scenario: You are optimizing a custom attention mechanism for a 13B parameter LLM running on 80GB A100
  GPUs with a sequence length of 8192. Design A relies on native PyTorch operations, which automatically
  constructs a reverse-linked graph during the forward pass, linking tensors to their creating functions
  and saving all intermediate activations (Q, K, V, pre-softmax logits, softmax probabilities) for backpropagation.
  Design B implements a custom `torch.autograd.Function` that bypasses the default graph construction
  for intermediates, saving only inputs/outputs and recomputing the rest in the backward pass. Evaluate
  the memory versus compute trade-offs of both designs to justify your architectural choice.
details:
  realistic_solution: Design B is required. The default reverse-linked graph maintains references to all
    intermediate tensors, whose memory footprint scales quadratically with sequence length. By writing
    a custom autograd function, you prune the reverse-linked graph, dropping massive intermediate nodes
    and recomputing them, which trades a minor compute penalty for a drastic memory reduction that fits
    within the 80GB HBM constraint.
  common_mistake: Candidates often reject Design B, assuming the compute overhead of re-materializing
    intermediates in the backward pass will severely degrade training throughput, failing to calculate
    that the native reverse-linked graph's memory footprint for O(N^2) activations will lead to an immediate
    Out-Of-Memory (OOM) error.
  napkin_math: For sequence length N=8192, batch B=4, heads H=32. Attention matrix size is B * H * N^2
    = 4 * 32 * 67.1M = 8.58 billion elements. At FP16 (2 bytes), the reverse-linked graph saves ~17.1
    GB per layer just for the softmax tensor. Across 40 layers, the graph attempts to retain 684 GB of
    activations, causing a massive OOM on an 80GB A100. Design B drops these nodes.
