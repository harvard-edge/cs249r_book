title: Gradient Compression to Improve Overlap Feasibility at Scale
scenario: Your 175B model trained across 512 A100 GPUs has AllReduce time (104ms)
  that exceeds backward pass time (80ms). Even with perfect overlap, 24ms of communication
  is exposed. Gradient compression is proposed to reduce communication volume. Evaluate
  the tradeoff.
question: Which gradient compression approach would you choose to hide the 104 ms
  AllReduce within the 80 ms backward pass, and why?
details:
  realistic_solution: 'Compression options: (1) FP16 gradients instead of FP32: 2x
    compression, virtually no convergence impact (already standard). AllReduce: 52ms
    -> fits in 80ms backward. (2) PowerSGD (rank-4 approximation): ~10x compression
    with <1% convergence impact for most models. AllReduce: ~10ms, easily hidden.
    (3) Top-k (1% sparsity): 100x compression but requires error feedback and typically
    needs 1.2-1.5x more steps to converge. (4) FP8 gradients (H100-specific): 4x compression,
    emerging technique with mixed convergence results. Recommendation: PowerSGD is
    the sweet spot — enough compression to make overlap feasible while maintaining
    convergence quality.'
  common_mistake: Applying aggressive compression (e.g., 1-bit SGD or top-k with 99%
    sparsity) without accounting for convergence slowdown. The training time saved
    per step can be lost to needing more steps to converge.
  napkin_math: 'AllReduce for 175B x 4 bytes = 700GB at 50 GB/s = 14 seconds (non-overlapped).
    With PowerSGD 10x: 70GB / 50 = 1.4 seconds, now fits within 80ms backward per
    bucket. Convergence overhead: ~5% more steps. Net speedup: (14s - 1.4s) / 14s
    = 90% communication reduction, minus 5% convergence = 85% net improvement.'
