title: The Tool-Use Timeout Cascade
scenario: 'Your AI agent has access to 5 tools: a SQL database (P50=50ms, P99=2s), a web search API (P50=300ms,
  P99=5s), a calculator (P50=1ms, P99=5ms), a code interpreter (P50=500ms, P99=10s), and a knowledge base
  (P50=30ms, P99=200ms). The agent decides to call web search and code interpreter in sequence. Your overall
  request timeout is 15 seconds. What is the probability that this 2-tool sequence completes within the
  timeout, and how should you set per-tool timeouts?'
question: "What is the probability that this 2-tool sequence completes within the timeout, and how should you set per-tool timeouts?"
details:
  realistic_solution: 'The key insight is that per-tool timeouts should be proportional to the tool''s
    latency distribution, not equal. Approach: allocate timeout budgets based on P99 plus headroom. Web
    search P99=5s -> 6s timeout. Code interpreter P99=10s -> 12s timeout. But 6+12=18s > 15s budget. This
    means: sequential execution of web search + code interpreter cannot meet a 15s SLA at P99 reliability.
    Solutions: (1) Run tools in parallel when the LLM can predict both calls simultaneously (requires
    ''parallel tool calling'' support). (2) Set aggressive timeouts: web search 4s, code interpreter 8s.
    Accept that ~5% of requests will timeout on web search and fall back to cached results. (3) Implement
    speculative execution: start code interpreter with a template while web search is running, then merge
    results. (4) Replace the code interpreter with a faster sandboxed executor for simple computations.'
  common_mistake: Setting each tool timeout equal to the overall timeout (15s each). This means a slow
    web search (14s) plus a slow code interpreter (14s) = 28s — far exceeding the budget. Or setting equal
    splits (7.5s each) without considering that calculator calls don't need 7.5s.
  napkin_math: 'P(web_search < 6s) * P(code_interp < 9s) ≈ 0.99 * 0.95 = 0.94 — 6% of requests hit timeout.
    Sequential with tight budgets (4s + 8s = 12s, leaving 3s for LLM): P(web < 4s) * P(code < 8s) ≈ 0.96
    * 0.88 = 0.84 — 16% failure rate. Parallel execution: P(max(web, code) < 12s) ≈ P(web < 12s) * P(code
    < 12s) ≈ 0.999 * 0.995 ≈ 0.994 — much better.'
