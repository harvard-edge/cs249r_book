title: 'A100 Deployment Strategy: Encoder-Decoder Tradeoffs for LLM Inference'
scenario: 'Your team is tasked with deploying a large language model for real-time inference on a fleet of NVIDIA A100 GPUs. You need to decide between an encoder-only, decoder-only, or a full encoder-decoder architecture. The primary constraints are minimizing inference latency and maximizing throughput, while also being highly cost-efficient at scale.'
question: 'How would you analyze the system costs and architectural tradeoffs, specifically leveraging the A100''s capabilities, to make a recommendation for a low-latency, high-throughput service?'
details:
  realistic_solution: 'A candidate should propose a methodical evaluation. First, define key metrics (e.g., latency percentiles, throughput/GPU, total cost of ownership, cost-per-inference). Then, analyze memory requirements for each architecture type, considering model size (parameters * bytes/param) against the 80 GB HBM2e. Next, estimate FLOPs for inference for each architecture, mapping against the A100''s 312 TFLOPS FP16 to predict theoretical compute-bound throughput. Crucially, factor in memory bandwidth (2.0 TB/s) for data transfer-bound operations, especially for token generation in decoder-only models where the KV cache can dominate memory access patterns. Discuss how strategies like quantization (e.g., FP8, INT8) could further exploit A100 capabilities by reducing memory footprint and potentially increasing effective throughput. Finally, present a cost-per-inference projection based on resource utilization, power consumption (400W TDP), and model performance trade-offs, justifying the choice of architecture for the given constraints.'
  common_mistake: |
    **The Pitfall:** Overlooking the critical impact of memory bandwidth (2.0 TB/s) on effective sequence length.
    **The Rationale:** Candidates focus solely on total parameter count and raw TFLOPS, ignoring how the KV cache dominates memory access patterns in decoder-only models.
    **The Consequence:** Deploying an architecture that suffers severe latency spikes as sequence lengths grow, destroying the cost-efficiency at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Hardware: A100 (80GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s bandwidth).
    - Model Size: 70B parameters.

    **Calculations:**
    - FP16 Memory: 70B * 2 bytes = 140 GB (Exceeds 80 GB, requires TP=2 or INT8).
    - INT8 Memory: 70B * 1 byte = 70 GB (Fits on 1x A100).
    - Bandwidth bound: Loading 70 GB at 2.0 TB/s takes 35 ms per token (batch=1).
    - Compute bound: 312 TFLOPS peak throughput dictates maximum FLOPS per request.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Decoder-only architectures rapidly hit memory-bandwidth bottlenecks due to KV cache growth. Analyzing cost-per-inference requires balancing quantization against sequence length limits dictated by the 2.0 TB/s bandwidth.
