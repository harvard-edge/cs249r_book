title: Hardware Upgrade Carbon Breakeven
scenario: You are evaluating the lifecycle carbon footprint for serving a 3-year LLM workload. You can either provision a new cluster of 1,000 H100 GPUs (700W each, 500 kg CO2e embodied per GPU, datacenter PUE 1.1) or repurpose an existing cluster of 2,500 V100 GPUs which provides equivalent throughput (300W each, zero additional embodied carbon, datacenter PUE 1.2). Both clusters run 24/7/365 (8760 hours/yr) on a grid with a carbon intensity of 0.2 kg CO2e/kWh.
question: "Which option minimizes total carbon over 3 years: 1,000 new H100s or 2,500 repurposed V100s?"
details:
  realistic_solution: Calculate the total lifecycle carbon for both over 3 years. The new H100 cluster is more sustainable over a 3-year horizon because its operational efficiency gap (saving 227.8 tCO2e/year) overtakes the initial 500 tCO2e embodied carbon deficit after 2.2 years.
  common_mistake: |
    **The Pitfall:** Focusing solely on operational power or solely on embodied carbon.
    **The Rationale:** Depending on their background, engineers may treat hardware as a "sunk cost" or conversely assume manufacturing carbon outweighs all usage.
    **The Consequence:** Failing to calculate the precise breakeven time leads to adopting policies that actively increase the total lifecycle carbon footprint.
  napkin_math: |
    - H100 Annual Op Carbon: 1000 * 0.7kW * 1.1 * 8760h * 0.2kg = 1,349 tCO2e.
    - H100 Embodied: 1000 * 0.5t = 500 tCO2e. 3-Year H100 Total = 500 + (3 * 1349) = 4,547 tCO2e.
    - V100 Annual Op Carbon: 2500 * 0.3kW * 1.2 * 8760h * 0.2kg = 1,576 tCO2e.
    - 3-Year V100 Total = 0 + (3 * 1576) = 4,728 tCO2e.
    - **Breakeven = 500 / (1576 - 1349) = 2.2 years, making the new H100s more sustainable over the 3-year horizon.**
