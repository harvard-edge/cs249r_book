title: Intra-Rack 400G Interconnect Trade-offs
scenario: 'You are designing the physical interconnect architecture for a 1,024-GPU cluster using 400G InfiniBand. Each rack contains 4 nodes (32 GPUs total), requiring 32 connections to the Top-of-Rack (ToR) switches. The average cable run within the rack is 2 meters. Your facility imposes a strict 40kW power limit per rack, and every watt is heavily scrutinized.'
question: For the 2m intra-rack 400G links, would you use passive DACs or AOCs, and why?
details:
  realistic_solution: Deploy passive DACs for all intra-rack links under 3 meters. This avoids the Optical-Electrical-Optical (O-E-O) conversion overhead entirely, saving hundreds of watts per rack and providing lower latency than optical alternatives, while costing significantly less.
  common_mistake: |
    **The Pitfall:** Automatically defaulting to Active Optical Cables (AOC) or transceivers for high-bandwidth 400G/800G AI clusters.
    **The Rationale:** A misconception that copper cannot handle 400G speeds even over short distances, leading to unnecessary optical deployments.
    **The Consequence:** Completely ignoring the massive transceiver power penalty and O-E-O latency, wasting hundreds of watts per rack and adding nanoseconds of latency per hop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 GPUs per rack, requiring 32 uplinks.
       - Cable run: 2m (intra-rack). Speed: 400G.
       - Strict 40kW rack power limit.
    2. **Calculations:**
       - Active Optical Cable (AOC) power: 10W/transceiver * 2 ends = 20W/link. Total: 32 * 20 = 640W.
       - Passive Direct Attach Copper (DAC) power: 0.1W/end = 0.2W/link. Total: 32 * 0.2 = 6.4W.
       - Power savings: 640W - 6.4W = 633.6W per rack.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Optic Penalty.** DACs save over 630W per rack and eliminate ~150ns of O-E-O conversion latency, making them mandatory for sub-3m links.
