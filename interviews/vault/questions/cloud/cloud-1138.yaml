title: Intra-Rack 400G Interconnect Trade-offs
scenario: You are designing the physical interconnect architecture for a 1,024-GPU cluster using 400G
  InfiniBand. Each rack contains 4 nodes (32 GPUs total), requiring 32 connections to the Top-of-Rack
  (ToR) switches. The average cable run within the rack is 2 meters. Your facility imposes a strict 40kW
  power limit per rack, and every watt is heavily scrutinized. Evaluate the trade-offs of using Direct
  Attach Copper (DAC) versus Active Optical Cables (AOC) for these intra-rack links, and justify your
  choice based on power, latency, and cost.
question: "For the 2 m intra-rack 400G links, would you use passive DACs or AOCs, and why?"
details:
  realistic_solution: Deploy passive DACs for all intra-rack links under 3 meters. This avoids the Optical-Electrical-Optical
    (O-E-O) conversion overhead entirely, saving hundreds of watts per rack and providing lower latency
    than optical alternatives, while costing significantly less.
  common_mistake: Automatically defaulting to optical cables (AOC/transceivers) for high-bandwidth 400G/800G
    AI clusters due to a misconception that copper cannot handle 400G, completely ignoring the massive
    transceiver power penalty and O-E-O latency.
  napkin_math: In a 1,024-GPU cluster, each rack hosts 32 GPUs requiring 32 ToR uplinks. Active Optical
    Cables (AOC) use 10W per transceiver (20W per link). Total AOC power = 32 * 20W = 640W. Passive DAC
    cables use ~0.1W per end (0.2W per link), totaling 6.4W. Savings = 633.6W per rack. Eliminating the
    Optical-Electrical-Optical conversion also shaves ~150ns of latency per hop, accelerating All-Reduce
    times.
