title: Elastic Scale-Down with Constant Global Batch Size
scenario: You are orchestrating an elastic training job for a 7B parameter LLM on an autoscaling cluster
  of p4d.24xlarge instances (8x A100 40GB GPUs per node). The fleet dynamically resizes between 16 and
  64 nodes based on spot instance availability. To preserve strict convergence guarantees, the global
  batch size is locked at 2048. Evaluate the architectural trade-offs and necessary configuration adjustments
  when the cluster abruptly scales down from 64 to 16 nodes.
question: "When the fleet scales from 64 to 16 nodes with GBS locked at 2048, how should you adjust micro-batch and accumulation under 40GB VRAM?"
details:
  realistic_solution: Maintain the global batch size of 2048 by inversely scaling the per-GPU batch size.
    Because increasing the per-GPU batch size from 4 to 16 will likely exceed the 40GB VRAM limit for
    a 7B model, implement gradient accumulation (e.g., micro-batch of 4 with 4 accumulation steps) on
    the remaining nodes to preserve the mathematical equivalence of the optimizer step without triggering
    OOM errors.
  common_mistake: Candidates often suggest scaling the learning rate using the linear scaling rule instead
    of adjusting per-worker batch sizes, which alters optimization dynamics, or they overlook OOM constraints
    when increasing the local batch size.
  napkin_math: 'At 64 nodes (512 GPUs): Per-GPU Batch = 2048 / 512 = 4. At 16 nodes (128 GPUs): Required
    Per-GPU Batch = 2048 / 128 = 16. If A100 40GB OOMs at BS > 8, use Micro-Batch = 4 and Gradient Accumulation
    Steps = 4 per GPU. Total Global Batch = 128 GPUs * 4 (Micro-Batch) * 4 (Accumulation) = 2048.'
