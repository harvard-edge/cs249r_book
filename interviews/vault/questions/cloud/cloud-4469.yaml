title: Negative Sampling Strategy for Recommendation Model Training
scenario: A two-tower retrieval model trained with uniform random negative sampling shows 15% AUC but poor offline-to-online uplift (only 5% online improvement despite high offline metrics).
question: 'Why does uniform random negative sampling produce poor offline-to-online uplift, and how would you change the negatives?'
details:
  realistic_solution: 'The offline/online gap has two causes: (1) Easy negative bias: random negatives include items the user would never see (wrong category, unavailable). The model overfits to easy patterns and fails to distinguish hard negatives (relevant but slightly less preferred items). Fix: in-batch negatives (other users'' positive items in the same batch) are harder negatives and more distribution-aligned. (2) Popularity bias: uniform sampling underrepresents popular items as negatives. At serving time, popular items compete for slots — the model hasn''t learned to rank them against each other. Fix: sample negatives with probability proportional to item popularity (batch-mixing uniform + popularity-weighted). (3) Missed exposure negatives: items shown to the user but not clicked are the strongest negative signal. Add exposure negatives to training. Practical implementation: 70% in-batch negatives + 20% popularity-sampled + 10% exposure negatives.'
  common_mistake: |
    **The Pitfall:** Attributing poor offline-to-online transfer to online feature mismatch without investigating the training distribution.
    **The Rationale:** Uniform random negatives create an unrealistically easy training problem by mapping against the full catalog.
    **The Consequence:** The model fails to distinguish relevant from slightly less relevant items in production, degrading real-world ranking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Random Negatives Ratio: 1:1 positive to negative ratio.

    **Calculations:**
    - In-Batch Negatives Ratio: 4K batch size gives 1:1999 positive to negative ratio.
    - Hardness Increase: In-batch negatives provide a 1999x harder training signal.

    **Conclusion & Interpretation:**
    - **Result: 1999x harder (Data-Bound)**. Adding in-batch negatives expectedly improves online metrics proportionally to a 15-20% uplift.
