title: MI300X GraphSAGE Bandwidth
scenario: An MI300X runs a GraphSAGE model heavily bottlenecked by random memory access.
  Total HBM bandwidth is 5.3 TB/s, but cache misses force 64-byte fetches per 4-byte
  node feature.
question: Calculate the effective feature processing bandwidth considering the hardware
  fetch amplification.
visual:
  kind: svg
  path: cloud-4527.svg
  alt: Bar chart comparing theoretical 5.3 TB/s HBM bandwidth vs 331 GB/s effective
    bandwidth.
  caption: Theoretical vs Effective Bandwidth under cache thrashing.
details:
  realistic_solution: The hardware fetches a full 64-byte cache line for every 4-byte
    feature read (a 16x amplification factor). Effective bandwidth = 5.3 TB/s / 16
    = 0.33125 TB/s, or ~331 GB/s.
  common_mistake: Ignoring cache line granularity and assuming all 5.3 TB/s goes directly
    into useful 4-byte payload throughput.
  napkin_math: 5.3 TB/s / (64/4) = 0.331 TB/s
