title: MI300X Unified Memory Architecture for Large Model Inference
scenario: AMD MI300X offers 192GB HBM3 at 5.3 TB/s — the largest GPU memory available. A team wants to
  run a 70B parameter model (140GB at FP16) on a single MI300X without tensor parallelism. Analyze whether
  this is viable and calculate expected decode throughput vs 2×H100s with tensor parallelism.
details:
  realistic_solution: 'MI300X single: 140GB model fits in 192GB (52GB remaining for KV cache). Decode
    throughput: 140GB / 5.3 TB/s = 26.4ms/token = 37.9 tok/s. No communication overhead. 2×H100 tensor
    parallel: each holds 70GB. Compute: 2×989 TFLOPS = 1978 TFLOPS. NVLink 4.0: 900 GB/s. Per-layer all-reduce:
    2×d_model×2B = 2×8192×2B = 32KB. At 900 GB/s: 35ns overhead per layer — negligible. Memory BW: 2×3.35
    TB/s = 6.7 TB/s. 2×H100 decode: 140GB/6.7TB/s = 20.9ms = 47.8 tok/s. Winner: 2×H100 at 47.8 tok/s
    vs MI300X at 37.9 tok/s, despite single-device simplicity of MI300X.'
  common_mistake: Ignoring that 2×H100 tensor parallelism introduces NVLink communication overhead that
    may reduce throughput below the single MI300X despite having the same total memory.
  napkin_math: 'MI300X: 140GB/5.3TB/s = 26.4ms = 37.9 tok/s. 2×H100: 140GB/6.7TB/s = 20.9ms = 47.8 tok/s.
    NVLink overhead per token: 32KB/900GB/s × 80 layers = 2.8μs — negligible. 2×H100 wins on throughput.'
