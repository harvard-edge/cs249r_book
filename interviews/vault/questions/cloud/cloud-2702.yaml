title: Linear Scaling Rule Intuition
scenario: You scale a training job from 8 to 64 GPUs using data parallelism, increasing the global batch size by 8x. A junior engineer asks why you also need to increase the learning rate.
question: Why does scaling from 8 to 64 GPUs with an 8x larger global batch require increasing the learning rate?
details:
  realistic_solution: 'When you increase the batch size by k, each gradient step averages over k times more samples, producing a lower-variance but smaller-magnitude gradient. To maintain the same effective update, you multiply the learning rate by k (linear scaling rule).'
  common_mistake: |
    **The Pitfall:** Assuming the learning rate is independent of the batch size.
    **The Rationale:** Engineers fail to realize that larger batches produce lower-variance gradients, meaning the step size must be increased to maintain effective learning momentum.
    **The Consequence:** Training converges much more slowly, wasting expensive compute cycles.
  napkin_math: |
    **Assumptions & Constraints:**
    - Scale up: 8 GPUs to 64 GPUs (8x capacity).
    - Paradigm: Data Parallelism (8x batch size).

    **Calculations:**
    - Batch size multiplier (k) = 64 / 8 = 8.
    - Variance reduction factor = 1 / k (due to larger sample size).
    - Linear Scaling Rule correction: New LR = Base LR * k.

    **Conclusion & Interpretation:**
    - **Result: LR Multiplied by 8 (Convergence-Bound)**. To maintain the same effective update magnitude with lower-variance gradients, the learning rate must scale linearly with the batch size.
