title: Linear Scaling Rule Intuition
scenario: You scale a training job from 8 to 64 GPUs using data parallelism, increasing the global batch
  size by 8x. A junior engineer asks why you also need to increase the learning rate. Explain the reasoning
  behind the linear scaling rule.
details:
  realistic_solution: 'When you increase the batch size by k, each gradient step averages over k times
    more samples, producing a lower-variance but smaller-magnitude gradient. To maintain the same effective
    update per sample seen, you multiply the learning rate by k. This is the linear scaling rule: LR scales
    linearly with batch size. The intuition is that k small-batch steps of LR=η are approximately equivalent
    to one large-batch step of LR=k·η, because both see the same total data and make a similar total parameter
    update. Without this adjustment, training with large batches converges much more slowly.'
  common_mistake: Thinking the learning rate is independent of batch size. Without scaling, the larger
    batch takes the same-sized step despite averaging over 8x more samples, effectively reducing the learning
    rate per sample.
  napkin_math: '8 GPUs → 64 GPUs = 8x batch size. Linear scaling rule: LR must also increase 8x. E.g.,
    base LR=0.1 → scaled LR=0.8.'
