title: 'KV-Cache: Design PagedAttention KV Cache for Multi-Tenant LLM Serving'
scenario: You are designing a KV cache for a multi-tenant 70B LLM serving system on 8 H100s (80GB HBM3 each = 640GB total). You expect 100 concurrent requests with varying sequence lengths (128 to 4096 tokens).
question: "How would you design a PagedAttention KV cache for 100 concurrent 128–4096-token requests on 8 H100s to maximize GPU utilization?"
details:
  realistic_solution: 'PagedAttention: allocate KV in pages of fixed size (e.g., 16 tokens per page). Assign pages dynamically. Only allocate as many pages as needed. Share KV pages across beam search branches (copy-on-write).'
  common_mistake: |
    **The Pitfall:** Pre-allocating max sequence length KV cache for every request.
    **The Rationale:** It is the standard approach in basic inference loops for simplicity.
    **The Consequence:** Wastes memory for short sequences, and fails to properly partition the KV cache's share of HBM vs model weights.
  napkin_math: |
    - 70B model: 70B × 2B bf16 = 140GB model weights across 8 H100s = 17.5GB/GPU.
    - Remaining: 80 - 17.5 = 62.5GB/GPU for KV cache.
    - KV cache per token per layer: 2 × num_kv_heads × head_dim × 2B bf16.
    - For GQA 8 KV heads, head_dim=128: 2 × 8 × 128 × 2B = 4KB/token/layer.
    - 70B model has 80 layers: 4KB × 80 = 320KB per token total KV across all heads.
    - Total available KV memory = 8 GPUs × 62.5GB = 500GB.
    - Total cluster token capacity = 500GB / 320KB per token = **1,562,500 tokens**.
    - 100 concurrent requests × avg 2048 tokens = 204,800 tokens, which easily fits within 1.56M tokens.
    - Page size 16 tokens: page = 16 × 320KB = 5.12MB.
    - Pages per cluster: 500GB / 5.12MB = **~97,656 pages**.
