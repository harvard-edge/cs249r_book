title: Input Stationary Dataflow Memory Math
scenario: You are optimizing a custom datacenter accelerator executing a linear projection layer Y = XW using INT8 precision. Input activations X have a shape of 128 tokens x 128 hidden_dim. Weights W have a shape of 128 hidden_dim x 4096 out_features. The accelerator features a 128x128 Processing Element (PE) array, with each PE containing exactly 1 byte of local register space (16 KB total capacity across the array). The architecture has no intermediate SRAM cache.
question: "How many DRAM reads do Input Stationary and Weight Stationary dataflows require for X and W on this 128x128 PE array?"
details:
  realistic_solution: 'In Input Stationary (IS) dataflow, the entire 16KB activation matrix X fits into the PE array and is pinned once. The 512KB weight matrix W is streamed through. In Weight Stationary (WS), the 512KB weight matrix must be tiled into 32 tiles (each 16KB) because the PE array can only hold 16KB. For each of the 32 weight tiles, the full 16KB of X must be re-streamed.'
  common_mistake: |
    **The Pitfall:** Assuming total DRAM read volume is simply the sum of matrix sizes for both dataflows.
    **The Rationale:** Candidates forget that Weight Stationary dataflow requires redundantly re-reading the entire input activation matrix for every single weight tile.
    **The Consequence:** Selecting a suboptimal dataflow that doubles memory bandwidth pressure, crippling inference throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 = 1 byte/element.
       - X shape = 128 x 128 = 16 KB.
       - W shape = 128 x 4096 = 512 KB.
       - PE Array Capacity = 16 KB.
    2. **Calculations:**
       - **Input Stationary (IS):**
         - Pin X (16 KB): 16 KB read.
         - Stream W: 512 KB read.
         - Total IS Reads = 16 + 512 = 528 KB.
       - **Weight Stationary (WS):**
         - W requires 32 tiles (512 KB / 16 KB).
         - Read W once = 512 KB.
         - Stream X for each tile: 32 passes * 16 KB = 512 KB.
         - Total WS Reads = 512 + 512 = 1024 KB.
    3. **Conclusion & Interpretation:**
       - **Result: IS requires 528 KB, WS requires 1024 KB.** The bottleneck is **Memory Bandwidth-Bound**, making IS optimal.
