title: Metadata IOPS Bottleneck
scenario: You are scaling a distributed CV model training job across 64 A100 GPUs. The dataset contains 100 million individual 50KB JPEG images on a parallel file system. Each GPU processes 500 images per second. The storage metadata server handles a maximum of 20,000 file 'open' IOPS, while the object storage servers provide up to 50 GB/s of aggregate read bandwidth.
question: What IOPS and bandwidth are required, what bottlenecks utilization, and how much would 100MB WebDataset shards reduce IOPS?
details:
  realistic_solution: Pack the individual 50KB images into larger sequential formats like WebDataset (.tar) or TFRecords. Packing into 100MB chunks reduces the metadata operations drastically, eliminating the bottleneck.
  common_mistake: |
    **The Pitfall:** Calculating only the data bandwidth and ignoring IOPS.
    **The Rationale:** Candidates conclude the 50 GB/s storage system is more than sufficient, completely ignoring the metadata limit inherent in the "Small File Problem."
    **The Consequence:** The GPUs sit idle waiting for file open operations, crippling training throughput.
  napkin_math: |
    1. **Required Bandwidth:** 64 GPUs * 500 img/s * 50 KB = 1.6 GB/s (Well under 50 GB/s limit).
    2. **Required IOPS:** 64 GPUs * 500 img/s = 32,000 ops/sec.
    3. **Bottleneck:** Metadata Server is capped at 20,000 IOPS. Max GPU Util = 20,000 / 32,000 = 62.5%.
    4. **Sharding Impact:** Packing 50KB images into 100MB shards ($2000$ images/shard).
    5. **New IOPS:** 32,000 / 2000 = **16 ops/sec**, entirely eliminating the bottleneck.
