title: 'KV-Cache: Evaluate KV Cache Quantization Tradeoffs on H100'
scenario: 'For a 13B LLM on a GPU serving 50 concurrent users with max 4096-token sequences, compare three KV cache strategies: (A) FP16, (B) INT8, (C) INT4.'
question: How do FP16, INT8, and INT4 KV caches compare for HBM usage, decode throughput, and quality on this 13B workload?
details:
  realistic_solution: |
    KV quantization reduces memory and bandwidth, enabling more concurrent requests. Quality impact: INT8 typically < 0.5% perplexity increase, INT4 < 2%. Scale factors add overhead: 1 scale per group of 128 values.
  common_mistake: |
    **The Pitfall:** Assuming INT4 KV cache has exactly 4x less memory than FP16.
    **The Rationale:** Candidates forget to account for quantization overhead (scale factors and zero points).
    **The Consequence:** Memory budgets are overly optimistic, leading to OOM errors when deploying at max concurrency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B Model: 40 layers, 8 KV heads, 128 head_dim.
    - 50 users × 4096 tokens = 204,800 token slots.

    **Calculations:**
    - FP16 Size: 204,800 × 163.84KB = 33.55GB.
    - INT8 Size: ~16.78GB. Saves ~16.8GB.
    - Decode throughput: INT4 memory IO is 4x faster than FP16.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. Quantization directly increases user concurrency limits by shrinking KV footprint.
