title: 'KV-Cache: Evaluate KV Cache Quantization Tradeoffs on H100'
scenario: 'For a 13B LLM on H100 (80GB HBM3, 3.35 TB/s) serving 50 concurrent users
  with max 4096-token sequences, compare three KV cache strategies: (A) FP16, (B)
  INT8, (C) INT4. Evaluate HBM usage, decode throughput, and quality impact.'
question: How do FP16, INT8, and INT4 KV caches compare for HBM usage, decode throughput,
  and quality on this 13B workload?
details:
  realistic_solution: 'KV quantization reduces memory and bandwidth, enabling more
    concurrent requests. Quality impact: INT8 typically < 0.5% perplexity increase,
    INT4 < 2%. Scale factors add overhead: 1 scale per group of 128 values.'
  common_mistake: Assuming INT4 KV cache has 4\times less memory than FP16 without accounting
    for quantization overhead (scale factors). Not measuring the actual quality impact
    of quantized KV.
  napkin_math: '13B model: 40 layers, GQA 8 KV heads, head_dim=128. KV per token per
    layer: 2 \times 8 \times 128 \times {2B, 1B, 0.5B} = {4096B, 2048B, 1024B}. 40 layers: {163.84KB,
    81.92KB, 40.96KB} per token. 50 users \times 4096 tokens = 204,800 token slots. (A) FP16:
    204,800 \times 163.84KB = 33.55GB. 13B weights: 26GB. Total: 26GB
    weights + 33.55GB KV = 59.55GB < 80GB. Fits! But barely. (B) INT8: 16.78GB KV
    + 26GB = 42.78GB. Saves 16.77GB \rightarrow allows 16.77GB/81.92KB per token = 204,800 more tokens
    = 50 more users. (C) INT4: 8.39GB KV + 26GB = 34.39GB. Decode bandwidth: KV read
    per step = 50 users \times attended_tokens \times 163.84/81.92/40.96KB per token. At seq=2048 avg:
    50 \times 2048 \times {163.84KB, 81.92KB, 40.96KB} / 3.35TB/s = {5.01, 2.50, 1.25ms}.
    INT4 decode 4\times faster than FP16. Throughput: 50 users \times 1/(5.01ms) \rightarrow vs 1/(1.25ms).
    Quality: INT8 acceptable (< 0.5% perplexity), INT4 needs evaluation.'
