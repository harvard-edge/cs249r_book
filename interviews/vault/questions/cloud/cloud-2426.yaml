title: W4A16 Batch-Size Latency Inversion
scenario: Serving a 70B model via GPTQ (INT4 weights, FP16 activations) on 2x A100. At batch size 1, latency is 15ms/token. At batch size 128, latency is 120ms/token, which is actually 20% slower than the pure FP16 model at the same batch size.
question: Why is the GPTQ INT4 model faster at batch size 1 but slower than FP16 at batch size 128?
details:
  realistic_solution: This is a computation vs memory-bandwidth crossover. At BS=1, operations are memory-bandwidth bound, so smaller INT4 weights fetch faster. At BS=128, operations are compute-bound. W4A16 requires dequantizing weights to FP16 in registers before performing MACs, adding ALU overhead.
  common_mistake: |
    **The Pitfall:** Blaming the PCIe interconnect bottleneck between the 2x A100s.
    **The Rationale:** Candidates incorrectly assume data transfer between GPUs is the issue, though it affects both precisions equally.
    **The Consequence:** Misdiagnosing a compute-bound problem as an IO problem, leading to useless network or topology optimizations.
  napkin_math: |
    - **BS=1 (Memory Bound)**: FP16 fetch = 140 GB / 3 TB/s = 46 ms. INT4 fetch = 35 GB / 3 TB/s = 11 ms. INT4 is much faster.
    - **BS=128 (Compute Bound)**: FLOPs = 2 * 70B * 128 = 17.9 TFLOPs.
    - **FP16 Compute Time**: 17.9 TFLOPs / 624 TFLOPS (2x A100 FP16 peak) = 28.7 ms.
    - **W4A16 Overhead**: Dequantization inside SMs consumes ALU cycles, adding ~20-30 ms.
    - **Conclusion**: **At BS=128, native FP16 compute is faster because it avoids INT4 dequantization overhead.**
