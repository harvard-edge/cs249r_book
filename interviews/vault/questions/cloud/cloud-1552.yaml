title: Mitigating Latency Jitter with Memory Locking
scenario: You are deploying a 10GB embedding model on a cloud CPU instance with 32GB RAM alongside monitoring sidecars. The SLA requires P99 latency <50ms (median is 30ms). Intermittently, P99 spikes to >250ms. Monitoring shows memory pressure causing the OS to swap inactive model pages to an NVMe SSD (100us random read latency).
question: What latency penalty does 10MB of swapped-out scattered weights add to inference, and what application-level fix prevents it?
details:
  realistic_solution: Invoke `mlock()` or `mlockall(MCL_CURRENT | MCL_FUTURE)` within the serving application to pin the 10GB of weights directly in physical RAM, requiring CAP_IPC_LOCK privileges. This entirely prevents the OS from paging out the model.
  common_mistake: |
    **The Pitfall:** Recommending a system-wide `swapoff` or blindly over-provisioning RAM.
    **The Rationale:** Candidates opt for infrastructure-level hammers rather than targeted application-level system calls.
    **The Consequence:** DevOps teams often reject `swapoff` for stability reasons, and over-provisioning wastes money while failing to guarantee the OS won't still page out "inactive" memory under certain memory-pressure heuristics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required weights: 10 MB.
    - Page size: 4 KB.
    - NVMe random read: 100 µs.
    - Baseline median latency: 30 ms.

    **Calculations:**
    - Page faults required: 10 MB / 4 KB = 2,500 faults.
    - Synchronous IO delay: 2,500 faults * 100 µs/fault = 250,000 µs = 250 ms.
    - Total latency: 30 ms + 250 ms = 280 ms.

    **Conclusion & Interpretation:**
    - **Result: 280 ms total latency (IO-Bound)**. Swapped pages introduce 250 ms of pure blocking IO; use `mlock()` to pin memory and meet the 50 ms SLA.
