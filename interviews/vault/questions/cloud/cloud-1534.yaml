title: Evaluating MMD Drift Detection Scale
scenario: You operate a RAG system serving 1,200 embedding queries/sec (~10^8 daily queries) using a 1024-dimensional
  model. To monitor drift, your team proposes computing exact Maximum Mean Discrepancy (MMD) with an RBF
  kernel between a 100,000-sample reference set and the full daily window of 10^8 queries. The drift job
  must run nightly on a single A100 (312 TFLOPs FP16) and finish within a 1-hour SLA. Evaluate the feasibility
  of the exact MMD proposal and propose an algorithmic optimization to meet the requirement.
details:
  realistic_solution: Reject the exact quadratic MMD calculation. Instead, project the embeddings using
    Random Fourier Features (RFF) to approximate the RBF kernel, or use the linear-time unbiased MMD estimator.
    RFF allows MMD calculation as the distance between linear mean embeddings, reducing time complexity
    from O(N^2) to O(N).
  common_mistake: Focusing purely on systems engineering (e.g., chunking the matrix to avoid GPU OOM errors)
    without realizing the O(N^2) mathematical complexity creates an insurmountable compute bottleneck
    (ExaFLOPs) that a single GPU cannot process in time.
  napkin_math: 'Daily queries N ≈ 10^8. Exact MMD requires evaluating the test-set kernel matrix: 0.5
    * 10^16 pairs. At 1024 dims (2048 FLOPs/pair), this is 10 ExaFLOPs. On an A100 (312 TFLOPs): 10e18
    / 312e12 = ~32,000s (9 hours), failing the 1hr SLA. Using RFF (D=4096): Mapping takes N × 1024 × 4096
    × 2 ≈ 0.8 PetaFLOPs. Time: 0.8e15 / 312e12 ≈ 2.5 seconds, easily meeting the SLA.'
