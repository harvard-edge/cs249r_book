title: Continuous Training Frequency Optimization
scenario: You are designing a continuous training pipeline for an e-commerce recommendation model. The
  model generates $100,000 in baseline daily revenue when freshly trained. Due to concept drift, daily
  revenue degrades by $1,000 for each day the model ages (e.g., day 2 revenue is $99k, day 3 is $98k).
  Retraining the model requires 8x A100 GPUs for 15 hours, costing exactly $4,500 per run. To maximize
  net profit (revenue minus compute costs), how many days should you wait between retraining runs?
question: "To maximize net profit (revenue minus compute costs), how many days should you wait between retraining runs?"
details:
  realistic_solution: Formulate an optimization problem to minimize the average daily cost (amortized
    compute cost plus accumulated drift loss). Taking the derivative and solving, or evaluating discrete
    values, reveals the optimal retraining schedule is every 3 days, balancing the $4,500 compute cost
    against the $1,000/day drift penalty.
  common_mistake: Candidates often default to 'retrain daily' to maximize accuracy, failing to quantitatively
    balance the high compute cost ($4,500) against the marginal revenue loss from drift ($1,000/day).
    Daily retraining costs $4,500/day vs the optimal $2,500/day.
  napkin_math: 'Average daily cost for retraining cycle of T days = [Total Drift Loss + Compute Cost]
    / T. Total drift loss over T days = $1,000 * sum(i=0 to T-1) = $1,000 * T*(T-1)/2. Average daily cost
    = $1,000*(T-1)/2 + $4,500/T. T=1: $0 + $4,500 = $4,500. T=2: $500 + $2,250 = $2,750. T=3: $1,000 +
    $1,500 = $2,500. T=4: $1,500 + $1,125 = $2,625. T=5: $2,000 + $900 = $2,900. Minimum average daily
    cost is at T=3 ($2,500/day).'
