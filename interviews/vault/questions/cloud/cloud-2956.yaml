title: Dataset Curation: Evaluate Deduplication Strategies for Pre-Training Data Quality
scenario: You compare two deduplication strategies for a 20TB pre-training dataset on a 128-GPU H100 cluster: (A) exact URL dedup only, (B) MinHash near-dedup at 0.8 Jaccard similarity threshold. Strategy A takes 2 hours, B takes 18 hours.
question: Should the 20 TB pre-training dataset use exact URL dedup or 0.8-Jaccard MinHash near-dedup, given quality and runtime tradeoffs?
details:
  realistic_solution: 'Exact URL dedup misses content-level duplicates (same article, different URLs). MinHash catches semantic near-duplicates. Train two small 1B proxy models, evaluate on MMLU and HellaSwag. The quality difference typically justifies the 16-hour overhead on a multi-week training run.'
  common_mistake: |
    **The Pitfall:** Choosing exact URL dedup purely to save 16 hours of preprocessing time.
    **The Rationale:** Over-optimizing for immediate data pipeline speed.
    **The Consequence:** Training a deeply flawed model that hallucinates or memorizes identical content from different URLs, wasting the $100,000+ GPU training budget.
  napkin_math: |
    - **Training Duration:** 20TB run on 128 H100s = 2 weeks = 336 hours.
    - **Dedup Overhead:** B (18h) vs A (2h) = 16h difference.
    - **Relative Cost:** 16h / 336h = 4.8% of total run time.
    - **Financial Cost:** 128 H100s × $3/hr × 16h = $6,144 one-time cost.
    - **ROI:** 1-2% absolute gain on downstream benchmarks easily justifies a 4.8% time cost.
