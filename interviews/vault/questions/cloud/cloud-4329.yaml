title: Cold Start for New Item Embeddings
scenario: A new item is added to your catalog. It has no interaction history. Your
  DLRM assigns it a random embedding initialization. Explain the 'cold start problem'
  and describe three industry approaches to initialize new item embeddings more effectively
  without waiting for organic training data.
question: What is the cold start problem, and what three methods can initialize a
  new item's DLRM embedding before organic training data?
details:
  realistic_solution: '(1) Content-based initialization: use the item''s metadata
    (title text, image, category) to compute a content embedding (e.g., from a pretrained
    language or vision model). Map this to the DLRM embedding space via a learned
    projection trained on items that have both content and ID embeddings. New item
    immediately gets a meaningful embedding based on content similarity to existing
    items. (2) Cluster-based initialization: assign the new item to the nearest cluster
    centroid (k-means over existing embeddings) based on content features. Initialize
    the new embedding to that centroid. (3) Meta-learning / warm-up: maintain a ''meta-embedder''
    — a small model trained to produce good initial embeddings for items with few
    interactions (few-shot). When a new item gets its first 5-10 interactions, the
    meta-embedder produces a refined embedding that is used as the starting point
    for full gradient training.'
  common_mistake: Treating cold start as solely an exploration problem (multi-armed
    bandit). The embedding cold start is a representation problem — even with exploration,
    you can't train a useful embedding without initial signal.
  napkin_math: 'Content embedding projection: pretrained CLIP text embedding (512
    dim) → projection MLP (512 → 64) → DLRM embedding space. Training data: all items
    with >100 interactions (well-trained ID embeddings + content embeddings available).
    If catalog has 10M items and 50% have >100 interactions: 5M training pairs. Projection
    MLP is tiny (~200k params), trains in minutes. At serving: new item embedding
    = projection(content_features). Expected quality: 70-80% of fully-trained embedding
    quality after first recommendation batch.'
