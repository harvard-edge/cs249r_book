title: Cold Start for New Item Embeddings
scenario: A new item is added to your catalog. It has no interaction history. Your DLRM assigns it a random embedding initialization.
question: What is the cold start problem, and what three methods can initialize a new item's DLRM embedding before organic training data?
details:
  realistic_solution: '(1) Content-based initialization: use the item''s metadata (title text, image, category) to compute a content embedding (e.g., from a pretrained language or vision model). Map this to the DLRM embedding space via a learned projection trained on items that have both content and ID embeddings. New item immediately gets a meaningful embedding based on content similarity to existing items. (2) Cluster-based initialization: assign the new item to the nearest cluster centroid (k-means over existing embeddings) based on content features. Initialize the new embedding to that centroid. (3) Meta-learning / warm-up: maintain a ''meta-embedder'' — a small model trained to produce good initial embeddings for items with few interactions (few-shot). When a new item gets its first 5-10 interactions, the meta-embedder produces a refined embedding that is used as the starting point for full gradient training.'
  common_mistake: |
    **The Pitfall:** Treating cold start strictly as a multi-armed bandit exploration problem.
    **The Rationale:** Engineers assume routing traffic to an item naturally fixes the cold start issue over time.
    **The Consequence:** The initial random embedding destroys all immediate relevancy metrics until the bandit manages to force enough user interactions to produce a stable representation.
  napkin_math: |
    1. Assumptions & Constraints: 10M total items, 5M with >100 interactions. Pretrained CLIP (512 dim). Projection MLP (64 dim) ~200k params.
    2. Calculations: Time to train projection MLP on 5M pairs = minutes.
    3. Conclusion & Interpretation: **Result: Projection mapping yields 70-80% embedding quality at zero interactions. Bottleneck: Cold Start Initialization.**
