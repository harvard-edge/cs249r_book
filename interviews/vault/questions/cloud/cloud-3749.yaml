title: 'Stranded Power: When GPU Utilization Tanks PUE'
scenario: Your 1000-GPU H100 cluster draws 1.4 MW at full load (PUE 1.15). Profiling
  shows average GPU utilization is only 35% because training jobs have I/O stalls,
  checkpoint writes, and data pipeline bottlenecks. Cooling infrastructure is sized
  for peak load. What is the effective PUE when utilization is factored in, and how
  do you improve energy proportionality?
question: What is the effective PUE when utilization is factored in, and how do you
  improve energy proportionality?
details:
  realistic_solution: 'At 35% utilization, GPU power drops from ~700W to ~300W per
    GPU. IT load = 1000 × 300W + ancillary = ~800 kW. But cooling is sized for 1.2
    MW IT and does not scale down linearly, leaving ~160 kW overhead (pumps/fans have minimum operating
    points). Effective PUE = 960 kW / 800 kW = 1.20, worse than the rated 1.15. Solutions:
    (1) Improve GPU utilization via better data pipelines, prefetching, and overlap
    of compute/communication — this is the highest-ROI fix. (2) Implement power capping
    to lower GPU TDP and match cooling to actual load. (3) Use variable-speed drives
    on cooling pumps/fans. (4) Consolidate workloads to fewer fully-utilized nodes
    and power-gate idle nodes. Energy proportional computing — where power scales
    linearly with utilization — remains the holy grail.'
  common_mistake: Reporting PUE at peak load only. PUE degrades at lower utilization
    because cooling overhead is semi-fixed (fans, pumps, chillers run even when GPUs
    are partially idle). GPU idle power is ~100W vs ~700W under load.
  napkin_math: 'Full load: IT=1.22 MW, total=1.4 MW, PUE=1.15. At 35% util: IT≈0.8
    MW, cooling overhead≈0.16 MW, total≈0.96 MW, effective PUE≈1.20. Wasted GPU idle
    power: 1000 × 100W idle × 65% idle fraction = 65 kW wasted on idle GPUs.'
