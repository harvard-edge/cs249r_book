title: 'Stranded Power: When GPU Utilization Tanks PUE'
scenario: Your 1000-GPU cluster draws 1.4 MW at full load (PUE 1.15). Profiling shows average GPU utilization is only 35% because training jobs have I/O stalls, checkpoint writes, and data pipeline bottlenecks. Cooling infrastructure is sized for peak load.
question: "What is the effective PUE when utilization is factored in, and how do you improve energy proportionality?"
details:
  realistic_solution: 'At 35% utilization, GPU power drops. IT load drops, but cooling is sized for peak and does not scale down linearly, leaving overhead. Effective PUE degrades. Solutions: Improve GPU utilization, power capping, variable-speed cooling, workload consolidation.'
  common_mistake: |
    **The Pitfall:** Reporting PUE at peak load only.
    **The Rationale:** Candidates assume PUE is a static hardware rating, forgetting that cooling overhead is semi-fixed (fans, pumps run even when GPUs are partially idle).
    **The Consequence:** Drastically underestimating the effective PUE and actual power costs when the cluster runs at lower utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Full load: IT=1.22 MW, total=1.4 MW, PUE=1.15.
       - 35% utilization.
    2. **Calculations:**
       - At 35% util: IT≈0.8 MW, cooling overhead≈0.16 MW, total≈0.96 MW.
       - Effective PUE = 0.96 MW / 0.8 MW = 1.20.
       - Wasted GPU idle power: 1000 * 100W idle * 65% idle fraction = 65 kW wasted.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound mitigation**. Effective PUE degrades from 1.15 to 1.20.
