title: KV-Cache Impact on Decode Memory Bandwidth
scenario: During autoregressive decode of Llama 3 70B on 2×H100, each new token must attend to all previous
  KV-cache entries. At sequence position 4096, calculate the memory bandwidth consumed by loading KV-cache
  for the attention computation versus loading model weights, and determine which dominates.
question: "At position 4096, how much bandwidth is spent loading KV-cache versus 70B model weights during decode, and which dominates?"
details:
  realistic_solution: 'Per decode step at position 4096: (1) Model weight loading: 70B × 2B = 140 GB per
    token (must load all weights for one token). (2) KV-cache loading for attention: 4096 tokens × 8 KV
    heads × 128 dim × 2B × 2 (K+V) × 80 layers = 4096 × 320 KB = 1.31 GB. Total bandwidth per decode step:
    140 GB (weights) + 1.31 GB (KV) = 141.31 GB. KV-cache is only 0.93% of bandwidth at 4K — weights dominate.
    At 128K context: KV-cache = 128K × 320 KB = 40.96 GB. Total: 140 + 41 = 181 GB. KV is now 22.6% of
    bandwidth. At 512K context (if supported): KV = 163.8 GB, exceeding weights (140 GB). KV becomes the
    bandwidth bottleneck. The crossover point: when KV-cache per token × context_length > weight_size.
    For 70B: 320 KB × N > 140 GB → N > 437,500 tokens. Below 437K tokens, weights dominate; above, KV-cache
    bandwidth dominates.'
  common_mistake: Ignoring KV-cache memory bandwidth consumption. At long sequence lengths, loading the
    KV-cache for attention can consume more bandwidth than loading model weights, becoming the true bottleneck.
  napkin_math: 'Weights: 140 GB per decode step (fixed). KV at 4K: 1.31 GB (0.9%). KV at 128K: 41 GB (22.6%).
    KV at 512K: 164 GB (54%). Crossover: 140 GB / 320 KB = 437K tokens. Total BW at 2×H100: 6.7 TB/s.
    Decode time at 128K: 181 GB / 6.7 TB/s = 27 ms/token.'
