title: Evaluating Centralized vs Decentralized RBAC in Distributed ML Data Lakes
scenario: You are architecting the access control layer for a healthcare ML platform storing 10 PB of patient data across hot feature serving (Redis), warm training data (Iceberg/S3), and cold archives. The system serves 500 ML engineers requiring column-level and row-level PII filtering. You must evaluate two RBAC architectures: a centralized proxy-based system that intercepts all queries (adding 15ms latency but guaranteeing unified audit logs) versus a decentralized token-based system (e.g., STS/IAM) that pushes policies to the native storage engines (<2ms latency but complex policy synchronization).
question: How would you design RBAC across Redis, Iceberg/S3, and archives to satisfy compliance while meeting a 5ms P99 latency SLA for feature serving?
details:
  realistic_solution: 'Implement a hybrid control/data plane RBAC: use the centralized proxy for training and exploratory queries (where a 15ms penalty on a 10s query is a negligible 0.15% overhead) to ensure strict auditability, but use token-based short-lived JWTs with embedded data-plane claims for feature serving to meet the <5ms SLA.'
  common_mistake: |
    **The Pitfall:** Choosing decentralized tokens exclusively to meet the 5ms SLA.
    **The Rationale:** Candidates prioritize latency over compliance without considering the massive complexity of synchronizing fine-grained row-level rules across disparate engines.
    **The Consequence:** Creating severe consistency issues and time-of-check to time-of-use (TOCTOU) vulnerabilities, failing security compliance audits.
  napkin_math: |
    *   **Feature Serving Constraint:** SLA is 5ms. Proxy adds 15ms (violates SLA by 3x). Token validation takes ~1ms (Passes SLA).
    *   **Training Query Overhead:** Average query is 10,000ms. Proxy adds 15ms. Impact is $15 / 10000 =$ **0.15% overhead** (Negligible).
    *   **Hybrid Design:** Use tokens for hot Redis serving to hit the 5ms SLA. Use proxy for Iceberg/S3 where 15ms is invisible.
    *   **Conclusion:** This bounds latency where it matters while keeping 99% of data volume access globally auditable via the proxy.
