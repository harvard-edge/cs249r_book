title: Speculative Decoding Acceptance Rate Impact on H100 Inference Throughput
scenario: You implement speculative decoding on H100 with a 70B target model and a 7B draft model. The
  draft model generates k=5 candidate tokens. Target model verifies in one forward pass. Draft acceptance
  rate α=0.8. Target model alone generates 30 tok/s. Calculate the expected throughput improvement.
question: "What throughput improvement should speculative decoding deliver with k=5 and α=0.8 versus 30 tok/s target-only decoding?"
details:
  realistic_solution: 'Expected tokens per speculative step: E[accepted] = k×α + 1 = 5×0.8 + 1 = 5 tokens
    per draft-verify cycle (on average, before the first rejection, E[consecutive accepts] = (1-α^k)/(1-α)
    = (1-0.32)/(0.2) = 3.4, plus 1 final = 4.4 tokens but simplified formula gives ~5). Time per cycle:
    draft 5 tokens + 1 target verification. Draft (7B, 5 tokens): 5 × (7B×2B/3.35TB/s) = 5 × 4.2ms = 21ms.
    Target verify (70B, 1 forward): 21ms. Total: 42ms for ~4.4 tokens. Speedup: 4.4 tokens / 1 token per
    target step × target_step_time / cycle_time = 4.4 × (30 tok/s × 42ms) / 1 = 4.4 × 1.26 ≈ 5.5× — but
    draft overhead reduces to ~2.5× in practice.'
  common_mistake: Assuming speculative decoding improves throughput by k× (5× in this case); the actual
    improvement depends on acceptance rate and the relative cost of the draft model.
  napkin_math: 'E[tokens/cycle] = (1-α^(k+1))/(1-α) = (1-0.8^6)/0.2 = (1-0.262)/0.2 = 3.69 tokens accepted
    + 1 = 4.69. Draft cost: ~30% of target. Effective speedup: 4.69 / (1 + 0.3×5) = 4.69/2.5 = 1.88×.
    Target alone: 30 tok/s → spec decode: ~56 tok/s.'
