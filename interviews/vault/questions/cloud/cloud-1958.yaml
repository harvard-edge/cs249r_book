title: Evaluating Static Inference Trade-offs
scenario: You are migrating a personalized feed ranking system from dynamic to static inference to handle
  a 50,000 QPS peak load. The user base includes 20M daily active users (DAUs). Dynamic inference uses
  T4 GPUs (costing $0.35/hr, max 200 QPS/GPU) yielding 85ms P99 latency. Precomputing the top-100 item
  IDs (400 bytes per user) takes a daily batch job (2 hours, $50/run). Evaluate the financial, latency,
  and business trade-offs of pre-computing all 20M profiles into a Redis cluster versus keeping the dynamic
  deployment, and justify whether a hybrid architecture would be superior.
details:
  realistic_solution: 'Implement a hybrid tier: Use static inference (Redis) for the 2M most active users
    who drive 80% of traffic, serving them at <2ms latency. Fallback to dynamic T4 inference for the long-tail
    users and cold-starts. This slashes GPU requirements dramatically while preserving prediction freshness
    where real-time context matters.'
  common_mistake: Candidates often only calculate the serving compute savings without factoring in the
    business cost of stale predictions (intraday changes in user behavior) and the memory overhead of
    storing 100% of users when a long tail is inactive.
  napkin_math: 'Dynamic: 50k QPS / 200 QPS/GPU = 250 GPUs * $0.35/hr = $87.5/hr (~$63k/mo). Static storage:
    20M users * 400B = 8GB (trivial Redis cost, ~$50/mo). Static batch compute: $50/day = $1.5k/mo. Static
    is >40x cheaper but sacrifices real-time context. Hybrid (80% traffic static): cuts GPU cost to 50
    GPUs (~$12.6k/mo), saving ~$50k/mo while handling the tail dynamically.'
