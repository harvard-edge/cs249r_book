title: Little's Law for GPU Inference Throughput
scenario: Your inference server handles requests with a mean latency of 80ms and you need to sustain 500 requests/second.
question: Using Little's Law, how many concurrent requests must be in-flight, and what does this imply for GPU memory reserved for KV cache?
details:
  realistic_solution: 'Little''s Law: L = lambda x W. Concurrency = 500 req/s x 0.08s = 40 concurrent requests. A 70B model''s KV cache for 40 requests is enormous (~210 GB). You must reduce context, use Grouped Query Attention (GQA), or apply PagedAttention.'
  common_mistake: |
    **The Pitfall:** Applying Little's Law correctly but forgetting the memory footprint.
    **The Rationale:** Candidates treat concurrency as just a scheduling or compute problem, overlooking that each in-flight request requires dedicated KV cache memory.
    **The Consequence:** They calculate the correct concurrency but fail to realize the resulting batch size exceeds the GPU's memory capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Throughput: 500 req/s, Latency: 0.08s.
       - KV cache per request: ~5.2 GB.
       - GPU capacity: 192 GB.
    2. **Calculations:**
       - Little's Law: L = 500 x 0.08 = 40 concurrent requests.
       - Total KV memory: 40 x 5.2 GB = 208 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. 208 GB > 192 GB hardware limit, requiring GQA or FP8 KV cache to fit.**
