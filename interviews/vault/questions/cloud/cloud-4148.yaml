title: Little's Law for GPU Inference Throughput
scenario: 'Your MI300X inference server handles requests with a mean latency of 80ms and you need to sustain 500 requests/second.'
question: 'Using Little''s Law, how many concurrent requests must be in-flight, and what does this imply for GPU memory reserved for KV cache?'
details:
  realistic_solution: 'Little''s Law: L = λ × W. Concurrency = 500 req/s × 0.08s = 40 concurrent requests. Each request''s KV cache for a 70B model with 80 layers, 64 heads, 128 dim, 2048 context in FP16 = 80 × 64 × 128 × 2048 × 2 × 2 bytes = 5.24 GB. For 40 concurrent requests: 40 × 5.24 GB = ~210 GB of KV cache alone. MI300X has 192 GB HBM3 — this does not fit. You must either reduce context length, use GQA (which cuts KV cache by head ratio), apply PagedAttention to share pages, or quantize KV cache to INT8/FP8, cutting memory by 2×.'
  common_mistake: |
    **The Pitfall:** Applying Little's Law correctly but forgetting the memory footprint.
    **The Rationale:** Candidates treat concurrency as just a scheduling or compute problem, overlooking that each in-flight request requires dedicated KV cache memory.
    **The Consequence:** They calculate the correct concurrency but fail to realize the resulting batch size exceeds the GPU's memory capacity.
  napkin_math: |
    * **Little's Law:** L = 500 req/s * 0.08s = 40 concurrent requests.
    * **KV cache per request:** (70B, 2048 ctx, FP16) = ~5.2 GB.
    * **Total KV memory:** 40 * 5.2 GB = 208 GB.
    * **Hardware limit:** 208 GB > 192 GB (MI300X capacity).
    * **Resolution (GQA 8:1):** 208 GB / 8 = **26 GB** (Fits easily).
    * **Resolution (FP8 KV):** 208 GB / 2 = **104 GB** (Fits).
