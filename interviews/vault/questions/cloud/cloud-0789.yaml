title: The Attention Skew
scenario: You are using Ring Attention to train a model with a 1-million token context window across 64 GPUs. The sequence is chunked evenly. Yet, profiling shows GPU 63 runs out of memory, while GPU 0 has 40 GB of free VRAM.
question: "Why does an evenly chunked sequence cause an asymmetric memory footprint?"
details:
  realistic_solution: In autoregressive LLMs, tokens can only attend to prior tokens (causal masking). GPU 0 holds the start of the sequence and attends to almost nothing outside its chunk. GPU 63 holds the end of the sequence and must attend to the full KV-cache of all 63 preceding GPUs as they flow through the ring. This creates a massive imbalance in activation memory during the backward pass. The fix is **Zig-Zag Ring Attention** or **Striped Attention**, which interleaves sequence chunks to balance the causal computation load.
  common_mistake: |
    **The Pitfall:** Assuming that because the communication topology is a perfect ring, the memory footprint must be perfectly symmetric.
    **The Rationale:** Candidates fail to map the mathematical properties of the causal attention mask onto the physical hardware distribution.
    **The Consequence:** Chasing phantom memory leaks or uneven data loading bugs when the asymmetry is a fundamental mathematical property of causal attention.
  napkin_math: |
    - For a 1M token sequence, GPU 0 processes 1/64th of the causal triangle.
    - GPU 63 processes its own chunk plus checks against all 63 previous chunks.
    - **GPU 63 stores nearly 64x more block-level statistics for the backward pass than GPU 0.**
