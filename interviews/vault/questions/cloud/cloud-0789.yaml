title: The Attention Skew
scenario: You are using Ring Attention to train a model with a 1-million token context window across 64
  GPUs. The sequence is chunked evenly. Yet, profiling shows GPU 63 runs out of memory, while GPU 0 has
  40 GB of free VRAM. Why does an evenly chunked sequence cause an asymmetric memory footprint?
question: "Why does an evenly chunked sequence cause an asymmetric memory footprint?"
details:
  realistic_solution: In autoregressive LLMs, tokens can only attend to prior tokens (causal masking).
    GPU 0 holds the start of the sequence and attends to almost nothing outside its chunk. GPU 63 holds
    the end of the sequence and must attend to the full KV-cache of all 63 preceding GPUs as they flow
    through the ring. This creates a massive imbalance in activation memory during the backward pass.
    The fix is **Zig-Zag Ring Attention** or **Striped Attention**, which interleaves sequence chunks
    to balance the causal computation load.
  common_mistake: '"Ring Attention shouldn''t have an imbalance; the communication is a perfect ring."
    The communication is symmetrical, but the *causal mask* of the attention mechanism is not.'
  napkin_math: For a 1M sequence, GPU 0 processes 1/64th of the causal triangle. GPU 63 processes its
    own chunk plus checks against all 63 previous chunks. GPU 63 stores nearly 64x more block-level statistics
    for the backward pass than GPU 0.
