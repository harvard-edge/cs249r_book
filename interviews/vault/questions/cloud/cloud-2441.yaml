title: Tensor vs Pipeline Parallelism Roofline
scenario: 'Deploying a 70B parameter LLM (140GB weights) on an 8-GPU node (each GPU: 80GB HBM, 2 TB/s
  bandwidth). At batch size 1, you must choose between Pipeline Parallelism (PP=8) and Tensor Parallelism
  (TP=8). A system engineer argues for PP=8 because it requires zero intra-layer communication, saving
  NVLink bandwidth and lowering latency.'
details:
  realistic_solution: LLM decoding at batch size 1 is entirely memory-bandwidth bound. In PP=8, each token
    must sequentially traverse 8 GPUs. Each GPU loads its 17.5GB weight shard at 2 TB/s, taking ~8.75ms.
    Total sequential latency is $8 \times 8.75 = 70$ms per token. In TP=8, the matrix multiplications
    are split. All 8 GPUs load their 17.5GB shards *simultaneously*. The aggregate memory bandwidth becomes
    16 TB/s. The weight loading takes 8.75ms total. Even with an AllReduce communication overhead of ~1ms
    per layer, TP=8 delivers drastically lower latency because it aggregates memory bandwidth.
  common_mistake: Prioritizing small communication savings over the massive memory-bandwidth aggregation
    benefits of Tensor Parallelism for memory-bound workloads.
  napkin_math: PP=8 Latency = \sum (Shard Size / Single GPU BW) = 8 * (17.5 GB / 2 TB/s) = 70 ms. TP=8
    Latency = (Total Size / Aggregate BW) + Comm = (140 GB / 16 TB/s) + 1 ms = 8.75 + 1 = 9.75 ms. TP=8
    is roughly 7x faster for latency.
