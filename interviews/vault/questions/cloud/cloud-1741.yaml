title: PFC Buffer Headroom Calculation for 400GbE RoCEv2
scenario: You are configuring Priority Flow Control (PFC) on a Top-of-Rack (ToR) switch with 32x 400GbE
  ports connecting H100 GPU servers for a RoCEv2 fabric. The fiber cable length gives a one-way propagation
  delay of 1 microsecond. The NIC and switch processing delay for a PFC pause frame is 1.5 microseconds
  combined. To guarantee lossless behavior, calculate the minimum buffer headroom required per port above
  the PFC trigger threshold to absorb in-flight packets before the sender halts.
details:
  realistic_solution: Calculate the total reaction time (round-trip propagation + processing delays),
    multiply by the link bandwidth to find the maximum data in flight, and set the buffer headroom to
    accommodate at least this much data.
  common_mistake: Only accounting for the one-way propagation delay, or forgetting to convert Gbps to
    Bytes/sec, resulting in a severely undersized buffer headroom and subsequent packet drops during microbursts.
  napkin_math: 'Link bandwidth: 400 Gbps = 50 GB/s = 50 KB/us. Total reaction time = 2 * one-way delay
    (2 * 1 us) + processing delay (1.5 us) = 3.5 us. Maximum in-flight data = 3.5 us * 50 KB/us = 175
    KB. The buffer headroom must be at least 175 KB per port to absorb packets arriving after the PFC
    pause is triggered.'
