title: 'FlashAttention-3: Asynchronous Tiling on Hopper'
scenario: 'FlashAttention-3 exploits H100''s hardware features: TMA (Tensor Memory
  Accelerator) for asynchronous HBM-to-SRAM loads, and warp specialization. Explain
  how these features enable further speedup over FlashAttention-2, and what percentage
  of peak H100 TFLOPS FlashAttention-3 achieves.'
question: How do H100 TMA and warp specialization let FlashAttention-3 outperform
  FlashAttention-2, and what peak TFLOPS percentage does it reach?
details:
  realistic_solution: 'FlashAttention-2 on H100 achieves ~70% of peak TFLOPS. The
    remaining 30% is lost to: (1) synchronous HBM loads that stall computation, (2)
    softmax computation between Q×K^T and attn×V phases, (3) warp scheduling overhead.
    FlashAttention-3 addresses these: (1) TMA: The Tensor Memory Accelerator is a
    dedicated DMA engine that loads tiles from HBM to SRAM asynchronously, without
    consuming compute warps. While the MMA (Matrix Multiply-Accumulate) units compute
    tile N, TMA prefetches tile N+1 in the background. This overlaps memory latency
    with computation. (2) Warp specialization: dedicates some warps to data movement
    (producer warps) and others to computation (consumer warps). Producer warps issue
    TMA loads and manage the SRAM buffers as a ring buffer. Consumer warps run the
    matrix multiplies. (3) FP8 support: native FP8 Tensor Core operations on Hopper
    double the TFLOPS. FlashAttention-3 achieves ~75-82% of peak FP16 TFLOPS, and
    with FP8 can reach >1.5 PFLOPS per GPU on H100.'
  common_mistake: Thinking FlashAttention-3 changes the algorithm. The mathematical
    computation is identical to FlashAttention-2 — the improvements are purely in
    how data movement and computation are overlapped using Hopper-specific hardware.
  napkin_math: 'FA-2: ~70% peak = 692 TFLOPS FP16 on H100. FA-3: ~80% peak = 791 TFLOPS.
    Improvement: ~14%. FA-3 FP8: ~75% of 1978 TFLOPS = 1484 TFLOPS. vs FA-2 FP16:
    2.1× speedup from FP8 + async.'
