title: 'FlashAttention-3: Asynchronous Tiling on Hopper'
scenario: FlashAttention-3 exploits H100 hardware features like TMA (Tensor Memory Accelerator) for asynchronous HBM-to-SRAM loads, and warp specialization.
question: How do H100 TMA and warp specialization let FlashAttention-3 outperform FlashAttention-2, and what peak TFLOPS percentage does it reach?
details:
  realistic_solution: 'FlashAttention-2 on H100 achieves ~70% of peak TFLOPS. The remaining 30% is lost to: (1) synchronous HBM loads that stall computation, (2) softmax computation between Q×K^T and attn×V phases, (3) warp scheduling overhead. FlashAttention-3 addresses these: (1) TMA: The Tensor Memory Accelerator is a dedicated DMA engine that loads tiles from HBM to SRAM asynchronously, without consuming compute warps. While the MMA units compute tile N, TMA prefetches tile N+1 in the background. This overlaps memory latency with computation. (2) Warp specialization: dedicates some warps to data movement (producer warps) and others to computation (consumer warps). (3) FP8 support: native FP8 Tensor Core operations on Hopper double the TFLOPS. FlashAttention-3 achieves ~75-82% of peak FP16 TFLOPS, and with FP8 can reach >1.5 PFLOPS per GPU on H100.'
  common_mistake: |
    **The Pitfall:** Believing FlashAttention-3 introduces a fundamentally new mathematical algorithm.
    **The Rationale:** Candidates often mistake hardware-aware optimization for algorithmic breakthroughs, failing to recognize that the math is identical to FlashAttention-2.
    **The Consequence:** Misunderstanding how software and hardware co-design yields massive speedups through asynchronous data movement.
  napkin_math: |
    1. FA-2 achieves ~70% peak = 692 TFLOPS FP16 on H100.
    2. FA-3 achieves ~80% peak = 791 TFLOPS. (14% speedup).
    3. FA-3 with FP8 hits ~75% of 1978 TFLOPS = 1484 TFLOPS.
    **FA-3 with FP8 delivers a 2.1x total speedup over FA-2 FP16 through asynchronous data overlap.**
