title: The RAG Update Memory Budget
scenario: "You are upgrading a RAG service from a 7B parameter model to a 13B parameter model running in FP16 precision. The Kubernetes pods are scheduled on nodes with a maximum of 32 GB of memory for the model-serving container. The RAG system's vector index requires 4 GB of memory loaded into the same container."
question: "Can the FP16 13B RAG model plus its 4 GB vector index fit within a 32 GB container memory limit?"
details:
  realistic_solution: The new model will fit within the 32 GB memory budget. The calculation requires summing the memory for the model weights at FP16 precision and the memory for the vector index. The 13B model requires 26 GB for its weights, and adding the 4 GB for the index results in a total of 30 GB, which is less than the 32 GB available.
  common_mistake: |
    **The Pitfall:** Calculating memory for model weights only, while ignoring the vector index or using the training memory formula.
    **The Rationale:** Candidates often forget that auxiliary structures (like vector indices) share the container memory, or they mistakenly include optimizer states required only for training.
    **The Consequence:** The container runs out of memory (OOM) in production, crashing the RAG service.
  napkin_math: |
    - **Calculate model weights memory:** A 13B parameter model at FP16 requires 2 bytes per parameter. 13,000,000,000 params × 2 bytes = 26 GB.
    - **Add vector index memory:** 26 GB (weights) + 4 GB (index) = 30 GB total.
    - **Compare to budget:** 30 GB < 32 GB.
    - **Conclusion:** **The 13B model and index will fit** within the 32 GB memory limit, leaving 2 GB overhead.
  options:
  - 26 GB. It fits easily.
  - 17 GB. It fits with plenty of room.
  - 30 GB. It fits, but with a small margin.
  - 212 GB. It does not fit; it requires a much larger node.
  correct_index: 2
