title: 'The Economics of Privacy: Federated vs. Centralized Training'
scenario: You are a Staff ML Engineer at a healthcare AI company. Your team needs to train a new diagnostic model on sensitive patient data from 1,000 hospitals. Each hospital has a 10 TB dataset. The model itself is 500 MB.
question: At $0.05/GB and 100 FL rounds, what are the transfer costs for centralized training versus federated learning, and which is cheaper?
details:
  realistic_solution: 'The correct approach is to calculate the total data transferred for each scenario and multiply by the cost per GB. Centralized training requires uploading all raw data: 1,000 hospitals × 10 TB = 10,000 TB = 10,000,000 GB. At $0.05/GB: $500,000. Federated learning exchanges only model updates: 1,000 hospitals × 1.0 GB (upload+download) per round × 100 rounds = 100,000 GB. At $0.05/GB: $5,000. Federated learning is 100x cheaper in data transfer costs ($5,000 vs $500,000). The 500 MB model updates are 20,000x smaller than the 10 TB raw datasets, and even with 100 communication rounds, federated transfers only 1% of the centralized data volume. Additionally, federated learning keeps sensitive patient data on-premise, satisfying HIPAA requirements without additional de-identification infrastructure.'
  common_mistake: |
    **The Pitfall:** Miscalculating federated learning cost by forgetting multiplicative factors.
    **The Rationale:** It's easy to calculate the cost for a single client or a single round instead of the full global training lifecycle.
    **The Consequence:** Engineers underestimate the total federated learning cost by orders of magnitude, making faulty budget projections.
  napkin_math: |
    - **Centralized Total Data:** 1,000 hospitals &times; 10 TB = 10,000 TB = 10,000,000 GB.
    - **Centralized Cost:** 10,000,000 GB &times; $0.05/GB = **$500,000**.
    - **Federated Model Size:** 500 MB = 0.5 GB.
    - **Federated Per-Round Traffic:** 1,000 hospitals upload 0.5 GB + download 0.5 GB = 1,000 GB per round.
    - **Federated Total Data:** 100 rounds &times; 1,000 GB = 100,000 GB.
    - **Federated Cost:** 100,000 GB &times; $0.05/GB = **$5,000**.
    - **Conclusion:** Federated learning is 100&times; cheaper ($5,000 vs $500,000).
  options:
  - $25 (FL) vs. $500,000 (Centralized)
  - $10,000 (FL) vs. $500,000 (Centralized)
  - $500,000 (FL) vs. $500,000 (Centralized)
  - $5,000 (FL) vs. $500,000 (Centralized)
