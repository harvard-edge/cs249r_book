title: 'The Economics of Privacy: Federated vs. Centralized Training'
scenario: You are a Staff ML Engineer at a healthcare AI company. Your team needs to train a new diagnostic
  model on sensitive patient data from 1,000 hospitals. Each hospital has a 10 TB dataset. The model itself
  is 500 MB.
details:
  realistic_solution: 'The correct approach is to calculate the total data transferred for each scenario
    and multiply by the cost per GB. Centralized training requires uploading all raw data: 1,000 hospitals
    × 10 TB = 10,000 TB = 10,000,000 GB. At $0.05/GB: $500,000. Federated learning exchanges only model
    updates: 1,000 hospitals × 0.5 GB per round × 100 rounds = 100,000 GB. At $0.05/GB: $5,000. Federated
    learning is 100x cheaper in data transfer costs ($5,000 vs $500,000). The 500 MB model updates are
    20,000x smaller than the 10 TB raw datasets, and even with 100 communication rounds, federated transfers
    only 1% of the centralized data volume. Additionally, federated learning keeps sensitive patient data
    on-premise, satisfying HIPAA requirements without additional de-identification infrastructure.'
  common_mistake: 'Engineers often miscalculate the federated learning cost by forgetting one of the multiplicative
    factors: the number of clients (hospitals) or the number of communication rounds. They might calculate
    the cost for a single client or a single round, underestimating the total cost by orders of magnitude.
    Another common mistake is to believe the costs are comparable, failing to appreciate that gradients
    are vastly smaller than raw datasets.'
  napkin_math: '### Centralized Training Cost | Total Data = 1,000 hospitals × 10 TB/hospital = 10,000
    TB | Convert to GB: 10,000 TB × 1,000 GB/TB = 10,000,000 GB | **Cost = 10,000,000 GB × $0.05/GB =
    $500,000** | ### Federated Learning Cost | Model size = 500 MB = 0.5 GB per update. | Each round:
    1,000 hospitals upload 0.5 GB + download 0.5 GB = 1,000 GB per round. | Assume 100 communication rounds
    for convergence. | Total data = 100 rounds × 1,000 GB/round = 100,000 GB. | **Cost = 100,000 GB ×
    $0.05/GB = $5,000** | ### Comparison | Centralized: **$500,000** | Federated: **$5,000** | Federated
    learning is **100x cheaper** in data transfer costs. The 500 MB model updates are 20,000x smaller
    than the 10 TB raw datasets, and even with 100 communication rounds, the federated approach transfers
    only 1% of the centralized data volume. Additionally, the federated approach keeps sensitive patient
    data on-premise, satisfying HIPAA requirements.'
  options:
  - $25 (FL) vs. $500,000 (Centralized)
  - $10,000 (FL) vs. $500,000 (Centralized)
  - $500,000 (FL) vs. $500,000 (Centralized)
  - $5,000 (FL) vs. $500,000 (Centralized)
