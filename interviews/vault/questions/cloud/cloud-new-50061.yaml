title: 'Interleaved Pipeline Schedules: Zero-Bubble Pipeline Parallelism'
scenario: 'The Megatron-LM team introduced interleaved pipeline scheduling where each device holds multiple
  non-contiguous pipeline stages. For a 32-layer model with 4 pipeline stages, each device handles 8 layers
  in an interleaved pattern (device 0: layers 0,4,8,...28). Evaluate how this reduces the pipeline bubble
  compared to 1F1B.'
details:
  realistic_solution: 'Interleaved scheduling with virtual pipeline stages (v): each device holds v chunks
    of layers. With k=4 physical stages and v=2 virtual stages per device: effective pipeline depth =
    k*v = 8 virtual stages, each processing 4 layers. Bubble fraction = (k-1)/(m*v + k-1). For m=8 micro-batches:
    standard 1F1B = 3/11 = 27.3%, interleaved (v=2) = 3/19 = 15.8%, interleaved (v=4) = 3/35 = 8.6%. However,
    communication increases by v-fold: with v=2, each micro-batch traverses the network 2x. On NVLink
    (low latency), this is acceptable. On InfiniBand (higher latency), the extra communication may negate
    bubble savings. Profile both configs to find the optimal v for your network topology.'
  common_mistake: Assuming interleaved scheduling is strictly better than 1F1B. While it reduces the bubble,
    it increases point-to-point communication because non-contiguous stages require more cross-device
    tensor transfers.
  napkin_math: '32-layer 70B model. 1F1B bubble: 27.3% x 2200ms = 600ms wasted. Interleaved v=2: 15.8%
    x 2200ms = 347ms wasted, but extra comms: 8 micro-batches x 4 extra sends x 5ms = 160ms. Net: 347
    + 160 = 507ms vs 600ms. Marginal win. At v=4: 8.6% x 2200ms = 189ms + 320ms comms = 509ms. Diminishing
    returns.'
