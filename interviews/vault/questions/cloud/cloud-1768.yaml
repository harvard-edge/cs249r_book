title: Rail-Optimized DP Topology Bandwidth
scenario: You are training a model on a 64-node cluster (8x H100 GPUs/node) using an 8-rail 400Gbps InfiniBand
  network. The ToR (leaf) switches connect GPUs of the same local index across nodes (e.g., all GPU 0s),
  but the spine connecting different rails is 4:1 oversubscribed. For a TP=1, PP=8, DP=64 training configuration,
  calculate the effective gradient synchronization bandwidth per GPU for a naive placement versus a rail-optimized
  scheduling strategy.
details:
  realistic_solution: Pin each pipeline stage to a specific local GPU index (e.g., PP stage 0 always on
    GPU 0 across all nodes). This confines the 64-way DP AllReduce traffic for each stage entirely within
    its dedicated non-blocking leaf switch.
  common_mistake: Placing pipeline stages arbitrarily across local GPU indices, which forces Data Parallel
    AllReduce traffic to traverse the oversubscribed spine switches to reach different rails.
  napkin_math: 'Naive Placement: DP traffic crosses rails via the spine. Effective bandwidth = 400 Gbps
    / 4 (oversubscription) = 100 Gbps (12.5 GB/s). Rail-Optimized: Traffic stays on the local leaf switch.
    Effective bandwidth = 400 Gbps (50 GB/s). The result is a 4x throughput speedup for gradient synchronization.'
