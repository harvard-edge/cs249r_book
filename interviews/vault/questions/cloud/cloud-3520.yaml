title: 'Autonomous Systems: Adversarial Robustness and Reliability'
scenario: Your team is deploying a critical, real-time image recognition service for autonomous vehicles on a cloud infrastructure utilizing NVIDIA GPUs. The service processes millions of inferences per second. Due to the safety-critical nature, the system must be highly reliable and robust against adversarial attacks that could lead to misclassifications, such as subtle perturbations in input images or prompt injection if the model incorporates large language model (LLM) components for scene understanding.
question: "How would you design the image recognition service to resist adversarial inputs and prompt injection while preserving low-latency throughput?"
details:
  realistic_solution: 'Implement a multi-layered, hybrid defense strategy: 1) Employ a dedicated, lightweight pre-processing microservice (potentially on CPU or a smaller GPU) for initial input sanitization, noise reduction, and adversarial example detection. 2) Integrate adversarially robust models on the GPUs, trained with carefully selected, diverse adversarial examples. 3) Leverage GPU performance to run ensemble methods or multiple diversified models in parallel, using a voting or confidence-based mechanism to flag suspicious inferences. 4) For LLM components, implement strong input validation, ''red-teaming'' derived prompt engineering, and LLM firewall techniques at the API gateway level before prompts reach the accelerated LLMs. This offloads simpler checks and maximizes the GPUs for complex, robust inference.'
  common_mistake: |
    **The Pitfall:** Failing to consider the significant performance overhead of adversarial defense mechanisms.
    **The Rationale:** Candidates focus entirely on robustness algorithms without accounting for the latency added by adversarial training, sanitization, or complex ensembles.
    **The Consequence:** Leads to unacceptable latency increases or reduced throughput that violently violate real-time system SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory Bandwidth: 3.35 TB/s.
       - Inference Memory Cost: 200MB per robust inference.
    2. **Calculations:**
       - Theoretical Throughput = (3.35 * 10^12 bytes/s) / (200 * 10^6 bytes/inference).
       - Throughput = 16,750 inferences/second/GPU.
    3. **Conclusion & Interpretation:**
       - **Result: 16,750 inferences/sec (Memory-Bandwidth-Bound).** Robustness overhead must be strictly managed to maintain this throughput.
