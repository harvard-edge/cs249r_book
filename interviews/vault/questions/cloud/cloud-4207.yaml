title: Training-Serving Skew Detection
scenario: A production model's accuracy dropped 8% over two weeks without retraining. Investigation shows the feature 'avg_session_duration' has a distribution shift — training data shows a mean of 12 minutes, but production serving sees a mean of 45 minutes, despite both pipelines reading from the same feature store.
question: What causes this massive training-serving skew despite a shared feature store, and how can it be prevented?
details:
  realistic_solution: 'Common causes of skew despite shared stores: (1) Different code paths (offline batch vs online streaming). A bug in streaming aggregation (e.g., not resetting session windows) accumulates durations incorrectly. (2) Timezone bugs (UTC vs local time windows). (3) Backfill artifacts. Implement distribution monitoring alerting on KL-divergence > threshold.'
  common_mistake: |
    **The Pitfall:** Blaming the discrepancy on natural data drift in user behavior.
    **The Rationale:** Candidates fail to recognize that a 3.75× shift in the mean indicates a structural engineering bug, not organic drift.
    **The Consequence:** Wasting time retraining the model on bad online data instead of fixing the streaming aggregation bug.
  napkin_math: |
    - **Distribution Shift:** Training mean = 12 min, Production mean = 45 min. Shift = 3.75×.
    - **Statistical Analysis:** A 3.75× shift is far beyond 3σ of any natural drift (typical σ ≈ 2 min).
    - **Business Impact:** 2 weeks of degraded accuracy × 8% × $50K daily revenue = $56K lost.
    - **Result:** Implementing KL divergence monitoring would catch this **>1.0 divergence within 1 hour**.
