title: The KV-Cache Context Explosion
scenario: You are serving a Llama-3 8B model. At a batch size of 1 with a 1,000-token prompt, inference
  requires roughly 16GB of VRAM. A customer wants you to increase the context window to 128,000 tokens
  for document summarization. Your PM assumes it will just take a bit more memory and asks you to deploy
  it on a 24GB RTX 4090. Why is this physically impossible?
question: "Why is this physically impossible?"
details:
  realistic_solution: You hit the KV-Cache memory wall. While the model weights for an 8B model (at 16-bit
    precision) consume about 16GB of VRAM regardless of the prompt size, the Key-Value (KV) cache does
    not. To avoid recomputing attention for past tokens, autoregressive generation stores the K and V
    vectors for every single token in the context window. At 128,000 tokens, the physical memory required
    just to store the state of the conversation dwarfs the size of the model itself.
  common_mistake: '"Forgetting that the KV-Cache grows linearly with sequence length, and assuming model
    weights are the only significant memory consumer."'
  napkin_math: 'For Llama-3 8B (32 layers, 8 KV heads, 128 head dim, 2 bytes FP16): KV cache per token
    = 2 * 32 * 8 * 128 * 2 = 131,072 bytes. For a 128,000 token context, the KV cache alone requires 128,000
    * 131,072 = 16.77 GB of VRAM per request. Combined with the 16GB model weights, this totals ~33 GB,
    instantly OOMing a 24GB or 32GB GPU, proving it is not a small memory bump.'
