title: The KV-Cache Context Explosion
scenario: You are serving a Llama-3 8B model. At a batch size of 1 with a 1,000-token prompt, inference requires roughly 16GB of VRAM. A customer wants you to increase the context window to 128,000 tokens for document summarization. Your PM assumes it will just take a bit more memory and asks you to deploy it on a 24GB RTX 4090.
question: "Why is this physically impossible?"
details:
  realistic_solution: You hit the KV-Cache memory wall. While the model weights for an 8B model (at 16-bit precision) consume about 16GB of VRAM regardless of the prompt size, the Key-Value (KV) cache does not. To avoid recomputing attention for past tokens, autoregressive generation stores the K and V vectors for every single token in the context window. At 128,000 tokens, the physical memory required just to store the state of the conversation dwarfs the size of the model itself.
  common_mistake: |
    **The Pitfall:** Forgetting that the KV-Cache grows linearly with sequence length.
    **The Rationale:** PMs and engineers assume model weights are the only significant memory consumer in LLM serving.
    **The Consequence:** The deployment crashes immediately with Out Of Memory (OOM) errors when processing long documents.
  napkin_math: |
    *   **KV Cache per Token:** Llama-3 8B (32 layers, 8 KV heads, 128 head dim) requires $2 \times 32 \times 8 \times 128 \times 2 = 131,072 \text{ bytes}$.
    *   **128k Context:** $128,000 \times 131,072 \text{ bytes} \approx 16.77 \text{ GB}$.
    *   **Total VRAM:** 16GB (weights) + 16.77GB (KV cache) = $\approx 33\text{GB}$.
    *   **Result:** **The memory required instantly OOMs a 24GB RTX 4090, proving it is a massive architectural shift, not a small memory bump.**
