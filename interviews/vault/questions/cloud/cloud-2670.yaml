title: Model Caching Strategy Under Cost Constraints
scenario: 'Your platform serves 100 models. Traffic is highly skewed: 95% goes to the top 15 models, and 99.5% to the top 20. Option A: 2× A100-80GB ($30K/month) keeping top 20 models hot. Option B: 1× A100-80GB + 1TB NVMe SSD ($18K/month), using the SSD as a warm cache tier (1s load time). Option C: 4× A10-24GB ($16K/month, 96GB total VRAM) for more models but slower per-model inference. Which minimizes cost while maintaining p99 < 200ms?'
question: "Which minimizes cost while maintaining p99 < 200ms?"
details:
  realistic_solution: 'Option A: 160GB VRAM, top 20 models fit. Hit rate: 99.5%. Since misses are 0.5%, p99 falls in the hot cache. p99 ≈ 50ms (GPU inference). Cost: $30K/month. Option B: 80GB VRAM (top 15) + SSD warm tier. VRAM hit rate: 95%. This means 5% of requests miss VRAM and take >= 1s (SSD load time). Therefore, the p99 latency is ~1s, which violates the 200ms SLA. Option C: 96GB total but split across 4 GPUs — each holds ~24GB of models. With model replication overhead, ~20 models fit. Hit rate is 99.5% (same as A), so p99 is a hot cache hit. However, A10 inference is ~3x slower than A100 (50ms * 3 = 150ms). Since 150ms < 200ms SLA, Option C meets the performance requirements. Cost: $16K/month. Option C wins on cost while safely meeting the p99 SLA.'
  common_mistake: Optimizing for cache hit rate alone or median latency. A 95% hit rate sounds good, but implies 5% of requests incur the cache miss penalty. This completely dominates the 99th percentile (p99) latency, making Option B fail the SLA.
  napkin_math: 'A: 99.5% VRAM hit, p99~50ms, $30K. B: 95% VRAM hit, p99 falls in the 5% misses -> ~1s (SLA fail). C: 99.5% VRAM hit, p99~150ms (within SLA), $16K. C is cheapest viable option.'
