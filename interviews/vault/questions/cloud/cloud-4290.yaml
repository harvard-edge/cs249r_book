title: Mixture of LoRA Experts (MoLoRA) Architecture
scenario: Design a mixture-of-adapters system where each input token is routed to one of 8 specialized LoRA adapters. Analyze the computational overhead and routing mechanism.
question: How would you design token routing to 8 specialized LoRA adapters, and what are the compute and memory overheads?
details:
  realistic_solution: 'MoLoRA uses a lightweight router (2-layer MLP, 256 hidden) that maps input embeddings to a soft assignment over K=8 adapters. Top-2 routing with load balancing loss (like MoE). Forward pass: for each token, compute 2 adapter outputs and sum. Memory: 8 rank-16 adapters per layer × 32 layers = 256 adapter matrices = 8× single-adapter memory (67.1 MB total vs 8.4 MB). Inference overhead: router (256 params per layer, negligible) + 2 adapter forward passes per token. Net overhead: 2× single-adapter compute, 8× memory.'
  common_mistake: |
    **The Pitfall:** Implementing token-level routing with a separate learned router per layer while ignoring the multiplication of routing decisions.
    **The Rationale:** Failing to recognize that 8 adapters per layer × 32 layers means 256 independent routing decisions per forward pass, multiplying the compute.
    **The Consequence:** The routing overhead dominates the inference time, negating the efficiency benefits of using LoRA adapters.
  napkin_math: |
    - Single rank-16 adapter per layer: 2 * 16 * 4096 = 131,072 params.
    - Total single adapter memory across 32 layers: 131,072 * 32 = 4,194,304 params.
    - At 2 bytes/param (FP16/BF16): 4.19M * 2B ≈ 8.39 MB.
    - 8 MoLoRA adapters memory: 8 * 8.39 MB = 67.1 MB.
    - Router params: 32 layers * (4096 * 256 + 256 * 8) = 32 * 1,050,624 = 33.6M params.
    - Router memory: 33.6M * 2B ≈ 67.2 MB.
    - **Total MoLoRA overhead: 67.1 MB (adapters) + 67.2 MB (router) = 134.3 MB vs 8.39 MB for a single adapter (~16x more memory).**
