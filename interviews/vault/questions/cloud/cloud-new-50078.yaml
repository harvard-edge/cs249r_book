title: Compute-Communication Overlap in Distributed Inference with Speculative Decoding
scenario: In speculative decoding, a small draft model generates K candidate tokens, then a large target
  model verifies them in one forward pass. When the target model is distributed across 4 GPUs (tensor
  parallel), the draft model runs on a single GPU. Design overlap between draft generation and target
  model's previous verification.
question: "How would you overlap the draft model's K-token generation with the 4-GPU target model's previous verification?"
details:
  realistic_solution: 'Pipeline the draft and verification: (1) While target model verifies candidates
    batch N (across 4 GPUs), the draft model generates candidates batch N+1 on its GPU. (2) Overlap: draft
    generation (single GPU, ~20ms for K=5 tokens with a 7B draft model) runs concurrently with target
    verification (4 GPUs, ~30ms for a 70B target). (3) After verification of batch N, immediately send
    batch N+1 for verification and start generating batch N+2. (4) Key challenge: if batch N rejects all
    tokens, the draft model wasted work on batch N+1 (which started from wrong state). Mitigation: generate
    N+1 speculatively from the most likely accepted prefix. (5) Net throughput: verification 30ms + overlap
    draft = max(30, 20) = 30ms per batch, with K tokens verified per batch. Without overlap: 20 + 30 =
    50ms per batch.'
  common_mistake: 'Running draft and verification sequentially: draft generates K tokens, sends to target,
    target verifies, returns accepted tokens, draft generates next K. This wastes the draft GPU during
    verification and vice versa.'
  napkin_math: 'Without overlap: 50ms per batch, K=5 tokens, acceptance rate 70% -> 3.5 tokens/batch.
    Throughput: 3.5/50ms = 70 tok/s. With overlap: 30ms per batch. Throughput: 3.5/30ms = 117 tok/s. 1.67x
    speedup from overlap alone.'
