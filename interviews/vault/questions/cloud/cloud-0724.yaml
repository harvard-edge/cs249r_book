title: The Heterogeneous Cluster Scheduler
scenario: 'Your GPU cluster has grown organically over 3 years and now contains: 256× A100-40GB, 128× A100-80GB, 512× H100-80GB, and 64× H200-141GB. You run a mix of training jobs (10–1000 GPUs) and inference workloads. The current scheduler treats all GPUs as equivalent, leading to 35% average utilization.'
question: "How would you design a heterogeneity-aware scheduler for the mixed A100/H100/H200 cluster to maximize utilization and cost efficiency?"
details:
  realistic_solution: 'A heterogeneity-aware scheduler needs three components: (1) **Workload profiling** — automatically characterize each job''s resource profile: compute-bound vs memory-bound (roofline), VRAM requirement, communication pattern (TP/DP/PP), and interconnect sensitivity. (2) **Hardware-workload affinity scoring** — match workloads to GPU types based on cost-efficiency, not raw performance. Memory-bound inference → H200 (best bandwidth/dollar). Compute-bound training → H100 (best FLOPS/dollar). Small fine-tuning → A100-40GB (cheapest, sufficient VRAM). Large-batch training → A100-80GB (good VRAM, acceptable FLOPS). (3) **Bin-packing with fragmentation avoidance** — pack small jobs onto partially-used nodes before allocating fresh nodes. Reserve contiguous NVLink domains for TP-heavy jobs.'
  common_mistake: |
    **The Pitfall:** Priority scheduling based on hardware recency.
    **The Rationale:** Engineers assume newer GPUs should simply be given to the "most important" jobs.
    **The Consequence:** This leaves old GPUs idle and fails to account for workload-hardware affinity, crippling overall cost efficiency.
  napkin_math: |
    1. **Current State:** 960 total GPUs at 35% util = 960 × 24 × 0.35 = 8,064 effective GPU-hours/day.
    2. **Affinity-based routing:**
       - Memory-bound inference (H200s): 64 × 24 × 0.85 = 1,305.6 GPU-hrs
       - Compute-bound training (H100s): 512 × 24 × 0.70 = 8,601.6 GPU-hrs
       - Small fine-tuning (A100s): 384 × 24 × 0.60 = 5,529.6 GPU-hrs
    3. **New Capacity:** 1,305.6 + 8,601.6 + 5,529.6 = 15,436.8 GPU-hrs/day.
    4. **Utilization Increase:** 15,436.8 / (960 × 24) = 67.0% cluster-wide utilization.
    5. **Cost Savings:** Increasing from 35% to 67% recovers ~7,373 GPU-hrs/day. At $2.50/GPU-hr, this saves 7,373 × $2.50 = ~$18,432/day = ~$553k/month.
    
    **Final Result: Affinity routing increases utilization from 35% to 67%, saving over $500k/month in recovered capacity.**
