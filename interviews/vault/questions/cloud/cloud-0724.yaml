title: The Heterogeneous Cluster Scheduler
scenario: 'Your GPU cluster has grown organically over 3 years and now contains: 256× A100-40GB, 128×
  A100-80GB, 512× H100-80GB, and 64× H200-141GB. You run a mix of training jobs (10–1000 GPUs) and inference
  workloads. The current scheduler treats all GPUs as equivalent, leading to 35% average utilization.
  Design a heterogeneity-aware scheduler that maximizes cluster-wide utilization and cost efficiency.'
details:
  realistic_solution: 'A heterogeneity-aware scheduler needs three components: (1) **Workload profiling**
    — automatically characterize each job''s resource profile: compute-bound vs memory-bound (roofline),
    VRAM requirement, communication pattern (TP/DP/PP), and interconnect sensitivity. (2) **Hardware-workload
    affinity scoring** — match workloads to GPU types based on cost-efficiency, not raw performance. Memory-bound
    inference → H200 (best bandwidth/dollar). Compute-bound training → H100 (best FLOPS/dollar). Small
    fine-tuning → A100-40GB (cheapest, sufficient VRAM). Large-batch training → A100-80GB (good VRAM,
    acceptable FLOPS). (3) **Bin-packing with fragmentation avoidance** — pack small jobs onto partially-used
    nodes before allocating fresh nodes. Reserve contiguous NVLink domains for TP-heavy jobs.'
  common_mistake: '"Assign the newest GPUs to the most important jobs." This is priority scheduling, not
    heterogeneity-aware scheduling. It leaves old GPUs idle and doesn''t account for workload-hardware
    affinity.'
  napkin_math: 'Current utilization: 35% across 960 GPUs. Effective GPU-hours/day: 960 × 24 × 0.35 = 8,064.
    **Affinity-based scheduling:** Route LLM inference (60% of workload, memory-bound) to H200s: 64 H200s
    at 85% util = 1,306 GPU-hrs. Route large training (25%) to H100s: 512 × 0.70 = 8,602 GPU-hrs. Route
    fine-tuning (15%) to A100s: 384 × 0.60 = 5,530 GPU-hrs. Total: 15,438 GPU-hrs/day — **91% increase
    in effective utilization**. Cluster-wide utilization: ~67%. The remaining gap (67% → 85%) comes from
    bin-packing improvements and preemptible backfill jobs that run on idle GPUs. At \$2.50/GPU-hr average,
    improving utilization from 35% to 70% saves: 960 × 24 × 0.35 × \$2.50 = **\$20,160/day = \$604k/month**
    in recovered capacity.'
