validation_issues:
- 'The `Napkin Math` for `Total: 15,438 GPU-hrs/day — 91% increase in effective utilization` is calculated
  by comparing to 8,064 effective GPU-hours/day. While the increase is 91%, the statement `Cluster-wide
  utilization: ~67%` is then made without showing how it relates to the 15,438 GPU-hrs and the total physical
  capacity. It would be clearer to derive this `67%` explicitly.'
- The statement '64 H200s at 85% util = 1,306 GPU-hrs' implies `64 * 24 * 0.85 = 1305.6` GPU-hrs, which
  is correct. However, for H100s and A100s, the utilization numbers (0.70 and 0.60) are given without
  explicit justification or context for how those utilizations are achieved under the proposed scheduling,
  making them seem like arbitrary target numbers rather than derived values.
