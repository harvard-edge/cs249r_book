title: The Hidden Cost of Cooling
scenario: You're managing the training budget for a large autonomous driving model on a cluster of H100 GPUs. Each GPU has a Thermal Design Power (TDP) of 700W. Your datacenter provider reports a Power Usage Effectiveness (PUE) of 1.2. The electricity price is $0.10 per kilowatt-hour.
question: How does a PUE of 1.2 affect one 700W H100's power draw, and what is its daily electricity cost?
details:
  realistic_solution: The correct approach is to understand that PUE is a multiplier for total datacenter power. A PUE of 1.2 means that for every 1 watt the IT equipment (the GPU) uses, an additional 0.2 watts are consumed by the surrounding infrastructure (cooling, power distribution, etc.). Therefore, the total power draw attributable to the GPU is its TDP multiplied by the PUE.
  common_mistake: |
    **The Pitfall:** Ignoring PUE in cost calculations.
    **The Rationale:** Engineers often focus solely on the hardware's rated TDP and forget the overhead from cooling and power distribution.
    **The Consequence:** The daily operational cost is systematically underestimated by 20%, ruining budget projections.
  napkin_math: |
    *   **Effective Power per GPU:** 700W (TDP) × 1.2 (PUE) = 840W = 0.84 kW.
    *   **Daily Energy Consumption:** 0.84 kW × 24 hours = 20.16 kWh.
    *   **Daily Cost:** 20.16 kWh × $0.10/kWh = $2.016.
    *   **Result:** The daily cost is **~$2.02**.
  options:
  - ~$1.68 per day
  - ~$1.40 per day
  - ~$2.02 per day
  - ~$201.60 per day
  correct_index: 2
