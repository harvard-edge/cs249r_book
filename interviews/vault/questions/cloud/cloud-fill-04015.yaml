title: Preemption Overhead in Long-Running Training Jobs
scenario: A 3-day LLM pre-training job on 128 H100s (80GB HBM3) is being preempted every 4 hours by higher-priority
  jobs. Each preemption triggers a checkpoint save and reload that takes 18 minutes (checkpoint is 1.2
  TB across 128 GPUs, written to NFS). The job is completing 30% slower than scheduled. Quantify the overhead
  and propose solutions.
details:
  realistic_solution: 'Switch to async distributed checkpointing: each GPU saves its shard to local NVMe
    in parallel (128 × ~9.4 GB = 1.2 TB / 128 nodes), then background-copy to object storage. Checkpoint
    time: 9.4 GB / 6.5 GB/s NVMe ≈ 1.4 seconds (vs 18 minutes). Also negotiate preemption delay with the
    scheduler to avoid mid-step preemptions.'
  common_mistake: Saving the full model checkpoint (all optimizer states, gradients, activations) to a
    shared NFS mount. NFS bandwidth (typically 10-20 GB/s) serializes checkpoint writes from 128 GPUs,
    creating a 1.2 TB / 10 GB/s = 120 second bottleneck that doesn't parallelize.
  napkin_math: 'Preemption frequency: 72h / 4h = 18 preemptions. Overhead per preemption: 18 min = 0.3h.
    Total preemption overhead: 18 × 0.3h = 5.4h. Training time without preemption: 72h. Effective training
    time: 72 + 5.4 = 77.4h → 7.5% slower. But observed: 30% slower → additional overhead from restart
    warmup (optimizer momentum, data loader state) adding ~1.5h per restart.'
