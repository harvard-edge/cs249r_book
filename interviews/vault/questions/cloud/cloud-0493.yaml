title: 'The Tensor Parallelism Topology Trap: Interconnect Topology'
scenario: You are diagnosing poor scaling performance for a 70B LLM training job. The model uses 8-way tensor parallelism (TP) and is deployed on 8-GPU H100 nodes. A single-node job runs well, but scaling to multiple nodes for data parallelism (DP) yields almost no speedup. The network team insists the new InfiniBand NDR fabric is fine. You run `nvidia-smi topo -m` and see that the 8 GPUs in each node are not fully connected by NVLink; they form two groups of four, with the groups connected across a PCIe Gen5 bus.
question: What is the most likely cause of the poor scaling?
details:
  realistic_solution: 'The most likely cause is an intra-node communication bottleneck. 8-way tensor parallelism requires extremely high bandwidth for the collective communication (All-Reduce) operations within the TP group. By placing the 8 GPUs in a topology where they must communicate over a PCIe bus, the effective bandwidth is throttled to PCIe speeds, not the expected NVLink speed. The entire training step slows down to the speed of this weakest link, making the powerful GPUs wait and nullifying the benefits of scaling out.'
  common_mistake: |
    **The Pitfall:** Blaming the most obvious new component (the inter-node network) or assuming all GPUs in a server are connected uniformly.
    **The Rationale:** Engineers jump to complex software/driver issues (like NCCL tuning) without first verifying the underlying physical hardware topology.
    **The Consequence:** Misdiagnosing a physical PCIe bandwidth choke point as a distributed network problem.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-way Tensor Parallelism.
    - NVLink bidirectional: 900 GB/s.
    - PCIe Gen5 x16: ~64 GB/s.

    **Calculations:**
    - Bandwidth reduction: 900 GB/s / 64 GB/s = >14x slower.

    **Conclusion & Interpretation:**
    - **Result: >14x slower (Topology-Bound)**. The PCIe bus throttles latency-sensitive All-Reduce operations, starving the GPUs.
  options:
  - The InfiniBand network is misconfigured or saturated, creating an inter-node bottleneck.
  - The CPU is creating a bottleneck by being unable to handle the RDMA scheduling for 8 GPUs at once.
  - The intra-node topology is suboptimal; the PCIe bus is choking the 8-way tensor parallelism communication.
  - NCCL is not using the correct algorithm for this hybrid topology and requires manual tuning.
  correct_index: 2
