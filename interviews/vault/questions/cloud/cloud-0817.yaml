title: The Parquet Row Group Chunking
scenario: "Your data engineering team provides a 5 TB dataset stored in Parquet format in AWS S3. Your PyTorch dataloader only needs to read a single column (the text feature) to train an NLP model. Because Parquet is columnar, this should be incredibly fast and save bandwidth. However, your dataloader is downloading data at 10 GB/s, saturating the network, and reading almost the entire 5 TB."
question: "Why didn't the columnar format save you bandwidth?"
details:
  realistic_solution: "The Parquet file was written with a single massive Row Group (or very few, very large Row Groups). Parquet's columnar format only enables column-level reads within a Row Group via byte-range S3 requests. If the entire 5TB file is one Row Group, the column index says 'your text column starts at byte offset X', but the reader must still download contiguous chunks containing all columns interleaved within that Row Group. With proper Row Group sizing (64-256 MB), the reader issues small, targeted byte-range requests for only the text column's data in each Row Group, reducing network transfer from 5TB to ~500GB — a 10x savings."
  common_mistake: |
    **The Pitfall:** Assuming S3 doesn't support columnar reads, or that Parquet is magically optimal out-of-the-box.
    **The Rationale:** S3 supports byte-range requests perfectly. The issue is how the Parquet file was internally structured into Row Groups by the writer.
    **The Consequence:** Abandoning columnar formats in cloud storage, or accepting massive, unnecessary cloud egress costs and training bottlenecks.
  napkin_math: |
    *   **Data Size:** 5 TB file with 10 equal-sized columns.
    *   **Ideal Read (Chunked):** Targeted byte-range requests pull 1 column = ~500 GB network transfer.
    *   **Actual Read (1 Row Group):** The reader must download the entire interleaved 5 TB block to extract the column.
    *   **Waste:** 5,000 GB - 500 GB = 4,500 GB.
    *   **Result:** **Downloading 4.5 TB of unnecessary data, wasting AWS egress and saturating the NIC.**
