title: Optimizing Large Language Model Deployment on H100 via Knowledge Distillation
scenario: Your team developed a massive transformer-based language model (Teacher). For a new low-latency inference service, you need to deploy a smaller, more efficient Student model on a single NVIDIA H100 GPU using Knowledge Distillation to achieve near-teacher performance while minimizing latency.
question: How would you size the H100 student model and choose logit or feature distillation to balance near-teacher accuracy, latency, and cost?
details:
  realistic_solution: Employ a multi-stage distillation approach. First, use logit matching with temperature scaling to transfer general knowledge. Then, incorporate feature distillation (e.g., attention map matching, intermediate hidden state matching) at critical layers to capture architectural nuances. For sizing, systematically explore student architectures with fewer layers and smaller hidden dimensions. Estimate the student model's memory footprint to ensure it comfortably fits within the 80 GB HBM3, prioritizing memory bandwidth efficiency for key operations. Utilize mixed-precision training (FP16) for distillation to leverage the H100's 989 TFLOPS FP16 dense performance. Benchmark different student configurations on the H100 to find the optimal trade-off between latency, throughput, and accuracy, ensuring the design can fully exploit the 3.35 TB/s memory bandwidth for data transfer.
  common_mistake: |
    **The Pitfall:** Overfitting the student to the teacher's outputs on the training data without considering generalization or hardware bottlenecks.
    **The Rationale:** Neglecting the architectural differences between teacher and student leads to suboptimal transfer. Furthermore, not accounting for the specific memory bandwidth and compute characteristics of the target GPU results in underutilization or bottlenecks.
    **The Consequence:** A student model that performs poorly on unseen data and fails to meet latency targets despite its smaller size.
  napkin_math: |
    - If a teacher model is 10B parameters (FP16), it occupies 20GB.
    - Aiming for a student model that is 10% the size (1B parameters, FP16) would be 2GB.
    - For inference at batch size 1, loading the 2GB student model per token at 3.35 TB/s bandwidth gives a theoretical memory-bound max of 3.35 TB/s / 2 GB = 1675 tokens/sec.
    - The compute bound for a 1B model (2 GFLOPs/token) at 989 TFLOPS is ~494,500 tokens/sec.
    - Since 1675 << 494,500, the student model is extremely memory-bandwidth bound at batch size 1.
    - **Distillation should prioritize reducing memory footprint (e.g., fewer layers or grouped-query attention) to maximize tokens/sec.**
