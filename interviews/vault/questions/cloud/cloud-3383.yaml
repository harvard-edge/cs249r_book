title: Optimizing Large Language Model Deployment on H100 via Knowledge Distillation
scenario: Your team has developed a massive transformer-based language model (Teacher)
  that achieves state-of-the-art performance but requires significant computational
  resources. For a new low-latency inference service, you need to deploy a smaller,
  more efficient Student model on an NVIDIA H100 GPU. The H100 boasts 80 GB HBM3 memory,
  989 TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth. Your goal is
  to apply Knowledge Distillation to achieve near-teacher performance with the Student
  model, minimizing latency and operational costs. Describe how you would size the
  Student model (e.g., number of layers, hidden dimension, attention heads) and choose
  appropriate distillation techniques (e.g., logit matching, feature distillation)
  to effectively utilize the H100's capabilities and balance performance with resource
  constraints.
question: How would you size the H100 student model and choose logit or feature distillation
  to balance near-teacher accuracy, latency, and cost?
details:
  realistic_solution: Employ a multi-stage distillation approach. First, use logit
    matching with temperature scaling to transfer general knowledge. Then, incorporate
    feature distillation (e.g., attention map matching, intermediate hidden state
    matching) at critical layers to capture architectural nuances. For sizing, systematically
    explore student architectures with fewer layers and smaller hidden dimensions.
    Estimate the student model's memory footprint to ensure it comfortably fits within
    the 80 GB HBM3, prioritizing memory bandwidth efficiency for key operations. Utilize
    mixed-precision training (FP16) for distillation to leverage the H100's 989 TFLOPS
    FP16 dense performance. Benchmark different student configurations on the H100
    to find the optimal trade-off between latency, throughput, and accuracy, ensuring
    the design can fully exploit the 3.35 TB/s memory bandwidth for data transfer.
  common_mistake: Overfitting the student to the teacher's outputs on the training
    data without considering generalization; neglecting the architectural differences
    between teacher and student, leading to suboptimal transfer; or not accounting
    for the H100's specific memory bandwidth and compute characteristics when designing
    the student model, resulting in underutilization or bottlenecks.
  napkin_math: If a teacher model is 10B parameters (FP16), it occupies 20GB. Aiming
    for a student model that is 10% the size (1B parameters, FP16) would be 2GB. An
    H100 with 80GB HBM3 can hold multiple instances or allow huge batch sizes. For inference
    at batch size 1, loading the 2GB student model per token at 3.35 TB/s bandwidth gives a
    theoretical memory-bound max of 3.35 TB/s / 2 GB = 1675 tokens/sec. The compute bound
    for a 1B model (2 GFLOPs/token) at 989 TFLOPS is ~494,500 tokens/sec. Since 1675 << 494,500,
    the student model is extremely memory-bandwidth bound at batch size 1. Therefore, distillation should prioritize reducing memory footprint (e.g., fewer layers or grouped-query attention) to maximize tokens/sec.
