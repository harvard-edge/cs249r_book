title: MoE Capacity Factor Tuning
scenario: You are tuning the capacity factor (CF) for a 64-expert MoE model. CF=1.0 means each expert can handle exactly $B/E$ tokens (batch size / num experts). Your monitoring shows 5% of tokens are being dropped at CF=1.0. Increasing CF to 1.5 eliminates drops but increases per-expert buffer memory by 50% and slows AllToAll.
question: "How do you reason about the optimal CF?"
details:
  realistic_solution: 'The capacity factor controls a three-way tradeoff: (1) Quality: dropped tokens hurt model quality (they get a zero or residual-only path). At 5% drop rate, quality loss may be significant. (2) Memory: buffer memory per expert = $CF \times B/E \times d \times$ bytes. Going from CF=1.0 to 1.5 adds 50% memory overhead per expert. (3) Communication: AllToAll volume scales with the actual number of dispatched tokens, which increases with CF. Optimal approach: profile the actual routing distribution. If it''s near-uniform (low variance), CF=1.1-1.2 suffices. If heavily skewed (some experts are ''popular''), either increase CF to 1.3-1.5 OR strengthen the auxiliary load-balancing loss. In practice, CF=1.25 with a well-tuned aux loss is the common sweet spot.'
  common_mistake: |
    **The Pitfall:** Setting the Capacity Factor (CF) very high "just to be safe."
    **The Rationale:** Candidates prioritize avoiding dropped tokens without realizing the memory and communication costs scale linearly with CF.
    **The Consequence:** Wasting memory on pre-allocated empty token buffers and increasing AllToAll communication volume.
  napkin_math: |
    - **Setup:** 64 experts, batch 8192, d=4096, BF16.
    - **CF=1.0:** Buffer per expert = 128 tokens * 4096 * 2B = 1 MB. Total = 64 MB.
    - **CF=1.5:** Buffer per expert = 192 tokens * 4096 * 2B = 1.5 MB. Total = 96 MB (+32 MB).
    - **CF=1.25:** Buffer per expert = 160 tokens. **Total = 80 MB (A good compromise between drops and memory).**
