title: Drift Detector Window Sizing
scenario: A recommender service handles 5 million events/hour. A drift detector compares
  embedding-distance histograms per region. You need at least 100,000 events per region
  per window for stable estimates across 20 regions, and detection latency must be
  under 30 minutes. Size the window and decide if per-region detection is feasible.
question: Can a 30-minute window provide 100,000 events per region for 20 regions
  at 5M events/hour?
details:
  realistic_solution: A 30-minute window contains 2.5M events. Uniformly across 20
    regions, that is 125K events per region, which meets the 100K requirement. Per-region
    detection is feasible if traffic is roughly balanced; if region distribution is
    skewed, low-traffic regions need longer windows or pooled alerts.
  common_mistake: Using global event volume and assuming it automatically gives enough
    samples in every region.
  napkin_math: 30 min events = 5M x 0.5 = 2.5M. Per region = 2.5M / 20 = 125K, above
    100K.
