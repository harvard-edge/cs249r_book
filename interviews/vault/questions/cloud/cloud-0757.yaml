title: The Unstable Cluster
scenario: You're leading the infrastructure team for training a 1T-parameter model on a cluster of 2,000 GPUs spread across 250 nodes. Node failures occur frequently, averaging several per day. Restarting training from scratch is prohibitively expensive.
question: What fault-tolerance strategy would you design to minimize downtime for this 1T-parameter training job?
details:
  realistic_solution: 'At this scale, fault tolerance is critical and complex. A simple periodic checkpoint will likely lead to significant downtime or re-computation. A robust strategy combines several techniques: 1) Asynchronous checkpointing to dedicated fast NVMe storage on the nodes before staging to slower object storage. 2) Using the Young-Daly formula to set the optimal checkpoint interval (every ~4.4 hours based on the 9.6h MTBF and 1h checkpoint time). 3) Implementing a ''fail-slow'' detection system to catch degraded nodes before they cause a hard crash. 4) Using in-memory pipeline state replication to recover from single-node failures instantly without reloading from disk.'
  common_mistake: |
    **The Pitfall:** Checkpointing at arbitrary intervals (e.g., "every 1000 steps") or writing directly to slow network storage.
    **The Rationale:** Engineers underestimate the massive 14TB state size and the high statistical probability of node failure at 2,000-GPU scale.
    **The Consequence:** The cluster either spends all its time checkpointing, or loses days of progress when failures occur between sparse checkpoints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model State: 1T parameters.
       - Cluster: 250 nodes (2,000 GPUs).
       - Node failure rate: 1% failure/day (assumed).
    2. **Calculations:**
       - State Size: FP16 weights (2 TB) + Adam optimizer state (12 TB) ≈ 14 TB total.
       - MTBF (T_MTBF): 250 nodes at 1% failure/day = 2.5 failures/day -> 1 failure every ~9.6 hours.
       - Checkpoint Time (T_C): Saving 14 TB at 4 GB/s takes ~1 hour.
       - Young-Daly Formula: Optimal Interval = √(2 * T_C * T_MTBF) = √(2 * 1 * 9.6) = √19.2 ≈ 4.4 hours.
    3. **Conclusion & Interpretation:**
       - Checkpointing should occur every ~4.4 hours to optimize training efficiency.
       - **Result: Optimal Checkpoint Interval = 4.4 Hours**
