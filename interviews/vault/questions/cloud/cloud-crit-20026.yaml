title: Prefix Caching Eviction Policy Design
scenario: 'Your vLLM deployment serves 200 distinct system prompts but only has budget for 50 cached prefixes
  in KV cache on H100. The prompt distribution follows a power law: top 10 prompts account for 60% of
  traffic. Compare LRU, LFU, and ARC eviction policies and determine which maximizes cache hit rate given
  this distribution.'
question: "How many H100-equivalents are required for a 6.8 PFLOP workload if each H100 delivers 989 TFLOPS?"
details:
  realistic_solution: 6.8 PFLOPs workload / 989 TFLOPS per H100 = 6.9 H100-equivalents (not 1 H100).
  common_mistake: Defaulting to LRU. With power-law distributions, LRU evicts infrequent but recently-used
    prompts over frequent ones that haven't been seen in the last few seconds, causing unnecessary cache
    thrashing.
  napkin_math: 'Compute-equivalent analysis: actual workload FLOPs / H100 FLOPs. Workload: 6.8 PFLOPs.
    H100 at 989 TFLOPS: 6.8P / 989T = 6.875 ≈ 6.9 H100s worth of compute (not 1 H100 which would imply
    only 989 TFLOPS workload).'
