title: LLM Fine-tuning Cost Estimation on AMD MI300X
scenario: >-
  Your team is tasked with fine-tuning a 70 billion parameter Large Language
  Model (LLM) on AMD MI300X accelerators. The model weights are in FP16 format, and
  the fine-tuning process involves processing 1 trillion tokens. Each AMD MI300X boasts
  192 GB HBM3, 1,300 TFLOPS for FP16 dense operations, and 5.3 TB/s memory bandwidth.
  Assume that training an LLM requires approximately 6 FLOPs per parameter per token
  (for forward and backward passes) and that your team typically achieves 40% of the
  MI300X's peak FP16 dense TFLOPS in real-world training scenarios.
question: >-
  How would you estimate MI300X GPU-hours and cost to fine-tune a 70B FP16
  LLM on 1T tokens, and how could memory bandwidth change the estimate?
details:
  realistic_solution: 'A strong answer will explicitly calculate: 1. Model memory footprint and required MI300X units. 2. Total FLOPs required for the training job. 3. Effective FLOPs/second based on the provided efficiency. 4. Total GPU-hours from FLOPs and effective FLOPs/second. 5. Consideration of memory bandwidth''s influence on actual throughput (e.g., computing operational intensity or memory-bound FLOPs). 6. A clear cost projection using a justified hourly rate. 7. Discussion on potential bottlenecks (compute vs. memory vs. I/O).'
  common_mistake: |
    **The Pitfall:** Using inference FLOPs or assuming 100% hardware utilization.
    **The Rationale:** Candidates often fail to account for real-world training efficiency (MFU), overlook memory bandwidth bottlenecks, or use the 2 FLOPs/param/token rule of thumb meant for inference.
    **The Consequence:** Producing wildly optimistic cost and time estimates, blowing the project budget by over 2x.
  napkin_math: |
    1. **Model Size:** 70B params × 2 bytes/param = 140 GB. Fits on one MI300X (192 GB).
    2. **Total FLOPs:** 70e9 params × 6 FLOPs/param/token × 1e12 tokens = 420e21 FLOPs.
    3. **Effective Compute:** 1,300 TFLOPS × 0.40 = 520 TFLOPS.
    4. **GPU-seconds:** 420e21 / 520e12 ≈ 8.077e8 seconds.
    5. **GPU-hours:** 8.077e8 / 3600 ≈ 224,359 GPU-hours.
    6. **Total Cost:** Assuming $15/hour, 224,359 × $15 ≈ **$3,365,385.**
