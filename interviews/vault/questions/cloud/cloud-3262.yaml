title: LLM Fine-tuning Cost Estimation on AMD MI300X
scenario: 'Your team is tasked with fine-tuning a 70 billion parameter Large Language
  Model (LLM) on AMD MI300X accelerators. The model weights are in FP16 format, and
  the fine-tuning process involves processing 1 trillion tokens. Each AMD MI300X boasts
  192 GB HBM3, 1,300 TFLOPS for FP16 dense operations, and 5.3 TB/s memory bandwidth.


  Estimate the total GPU-hours and the approximate dollar cost for this fine-tuning
  job. You should assume that training an LLM requires approximately 6 FLOPs per
  parameter per token (for forward and backward passes) and that your team typically
  achieves 40% of the MI300X''s peak FP16 dense TFLOPS in real-world training scenarios.
  Additionally, discuss how memory bandwidth might impact your estimations and suggest
  a reasonable hourly cost for an MI300X instance to complete your cost projection.'
question: How would you estimate MI300X GPU-hours and cost to fine-tune a 70B FP16
  LLM on 1T tokens, and how could memory bandwidth change the estimate?
details:
  realistic_solution: 'A strong answer will explicitly calculate:

    1. Model memory footprint and required MI300X units.

    2. Total FLOPs required for the training job.

    3. Effective FLOPs/second based on the provided efficiency.

    4. Total GPU-hours from FLOPs and effective FLOPs/second.

    5. Consideration of memory bandwidth''s influence on actual throughput (e.g.,
    computing operational intensity or memory-bound FLOPs).

    6. A clear cost projection using a justified hourly rate.

    7. Discussion on potential bottlenecks (compute vs. memory vs. I/O).'
  common_mistake: Candidates often fail to account for real-world training efficiency
    (e.g., assuming 100% utilization), overlook memory bandwidth as a potential bottleneck,
    or use incorrect FLOPs-per-token estimates for training (e.g., using inference
    FLOPs). They might also neglect the memory footprint of optimizers (e.g., Adam
    requires more than 2x model size).
  napkin_math: 'Model Size: 70B params * 2 bytes/param (FP16) = 140 GB. Fits on one
    MI300X (192 GB HBM3).

    Total FLOPs: 70 * 10^9 (params) * 6 (FLOPs/param/token) * 10^12 (tokens)
    = 420 * 10^21 FLOPs.

    Effective Compute: 1,300 TFLOPS * 0.40 (efficiency) = 520 TFLOPS = 520 * 10^12
    FLOPs/sec.

    GPU-seconds = 420 * 10^21 FLOPs / (520 * 10^12 FLOPs/sec) ≈ 8.0769 * 10^8 seconds.

    GPU-hours = 8.0769 * 10^8 seconds / 3600 seconds/hour ≈ 224,359 GPU-hours.

    Assuming $15/hour for MI300X, Total Cost ≈ 224,359 * $15 ≈ $3,365,385.'
