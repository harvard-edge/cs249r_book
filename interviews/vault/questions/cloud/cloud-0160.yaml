title: The Tyranny of Throughput
scenario: 'You are the tech lead for a new real-time AI coding assistant served on H100s. The service
  has a strict P99 Time-To-First-Token (TTFT) SLO of 200ms. Your dashboards show fantastic system health:
  `nvidia-smi` reports 95% utilization and your Tokens-Per-Second (TPS) throughput metrics are exceeding
  targets. However, user feedback is overwhelmingly negative, with frequent complaints of "lag" and "unresponsiveness."
  Your team is using a classic static batching strategy with a batching timeout of 150ms to maximize hardware
  efficiency.'
question: "Why do high GPU utilization and TPS still produce lag under a 150ms static batching timeout with a 200ms TTFT SLO?"
details:
  realistic_solution: The core problem is the conflict between the goals of maximizing hardware utilization
    and minimizing user latency, a conflict that static batching handles poorly for real-time services.
    The 150ms batching timeout is an artificial queueing delay imposed on every single request to build
    a larger, more efficient batch. While this maximizes the H100's throughput (many tokens generated
    per second *across all users*), it front-loads a massive latency penalty on each user's TTFT.
  common_mistake: Confusing throughput with latency. Engineers often believe that high GPU utilization
    and high tokens/second automatically translate to a good user experience. They might suggest optimizing
    the model itself or adding more hardware, failing to see that the serving *strategy* is the root cause
    of the user-facing latency by introducing artificial queueing delays.
  napkin_math: Analyze P99 TTFT with a static batching timeout of 150ms. TTFT = T_wait + T_batch + T_prefill.
    At 95% GPU utilization, queue wait time T_wait is very high. Even if T_wait = 0, T_batch can be up
    to 150ms. That leaves only 50ms for T_prefill. For a 70B model on an H100, prefilling a 1000-token
    prompt takes 141ms. The 150ms artificial delay blows past the 200ms SLO.
