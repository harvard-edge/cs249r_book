title: Diagnosing Silent Failures in Cloud Fraud Detection
scenario: You are serving a cloud-based transaction fraud detection model handling 25,000 TPS. Hardware utilization is stable. However, the business team reports a 30% spike in false positives over the last 48 hours following a new international product launch. System metrics and infrastructure health checks are completely green.
question: How do you analyze the root cause of this degradation?
details:
  realistic_solution: Implement statistical distance monitoring (e.g., Kullback-Leibler divergence or Population Stability Index) on the live feature distributions compared to the training baseline. The international launch introduced user behavioral patterns absent from the training set, violating the stationarity assumption. You must deploy a data validation pipeline and trigger retraining on the new distribution.
  common_mistake: |
    **The Pitfall:** Assuming the degradation is an infrastructure bottleneck or software bug.
    **The Rationale:** Engineers focus on latency and CPU/GPU metrics instead of validating the stationarity assumption of the incoming data.
    **The Consequence:** Wasting engineering effort on system diagnostics while the model continues to degrade due to concept drift.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline international traffic: 1%.
    - Post-launch international traffic: 35%.

    **Calculations:**
    - Population Stability Index (PSI) = sum((Actual_% - Expected_%) * ln(Actual_% / Expected_%)).
    - PSI for region feature = (0.35 - 0.01) * ln(0.35 / 0.01).
    - PSI ≈ 0.34 * ln(35) ≈ 0.34 * 3.55 = 1.21.

    **Conclusion & Interpretation:**
    - **Result: PSI 1.21 (Drift-Bound)**. A PSI > 0.2 indicates a critical distribution shift. The input data distribution has fundamentally changed, requiring immediate retraining on the new cohort.
