title: 'MoE on TPU: Pipelining All-to-All with ICI'
scenario: Google's GShard trains MoE models on TPU v5e pods with 256 chips connected via ICI (Inter-Chip Interconnect). Each chip holds 2 experts (128 total). ICI provides ~1.6 TB/s bisection bandwidth per pod. Compare the All-to-All communication efficiency on TPU ICI vs a GPU cluster with InfiniBand.
question: "How long does a 4 MB All-to-All transfer take over a 50 GB/s InfiniBand link?"
details:
  realistic_solution: 4MB / 50 GB/s = 80 microseconds = 0.08ms.
  common_mistake: |
    **The Pitfall:** Comparing per-link bandwidth directly between TPU ICI and InfiniBand.
    **The Rationale:** Candidates fail to consider the topological differences (3D torus vs. fat-tree) which dictate routing overhead.
    **The Consequence:** The latency characteristics for All-to-All communication are grossly misjudged.
  napkin_math: |
    1. Transfer data: 4 MB = 4 × 10^-3 GB.
    2. Link bandwidth: 50 GB/s.
    3. Transfer time = (4 × 10^-3 GB) / 50 GB/s = 8 × 10^-5 seconds.
    4. **This equals 80 microseconds, or 0.08 ms (not 80 ms, which is 1000× too slow).**
