title: Ring AllReduce Latency on 4 Ranks
scenario: 'Four GPU ranks are participating in a Ring AllReduce to aggregate gradients
  after a training step. The gradient tensor is 400 MB in total, split evenly into
  4 chunks of 100 MB each. Every inter-rank link runs at 200 GB/s. The ring passes
  chunks clockwise: each rank sends one chunk to the next rank while receiving a chunk
  from the previous rank.'
question: Using the diagram, what is the total Ring AllReduce time across 4 ranks,
  and which formula justifies it?
visual:
  kind: svg
  path: cloud-visual-001.svg
  alt: 'Four rank boxes arranged in a square: Rank 0 top-left, Rank 1 top-right, Rank
    2 bottom-right, Rank 3 bottom-left. Clockwise arrows between adjacent ranks are
    labelled chunk 0 through chunk 3, each carrying 100 MB at 200 GB/s. A legend below
    notes total gradient 400 MB, N equals 4 ranks, and that the full AllReduce comprises
    reduce-scatter plus all-gather.'
  caption: Ring AllReduce on 4 ranks passing 100 MB chunks clockwise at 200 GB/s.
details:
  realistic_solution: 'Total AllReduce time = 2(N−1)/N × data / bw = 2(3)/4 × 400
    MB / 200 GB/s = 1.5 × 0.002 s = 3 ms. The Ring AllReduce has two phases: a reduce-scatter
    (each rank ends up owning a reduced shard) and an all-gather (each rank collects
    the full reduced tensor). Each phase completes in (N−1)/N × data / bw = 1.5 ms,
    yielding 3 ms total. The key insight is that only one chunk (data/N = 100 MB)
    traverses each link per step, so wall-time is set by the number of steps (2(N−1)
    = 6) times step-time (100 MB / 200 GB/s = 0.5 ms).'
  common_mistake: Dividing the full 400 MB gradient by 200 GB/s to get 2 ms misses
    that Ring AllReduce requires 2(N−1) = 6 sequential steps, not one. Alternatively,
    some learners compute (N−1)/N × data / bw = 1.5 ms and forget to double it for
    the all-gather phase, giving 1.5 ms instead of 3 ms. The 2(N−1)/N factor captures
    both the parallelism benefit (only 1/N of data per step) and the phase count.
  napkin_math: data = 400 MB, N = 4, bw = 200 GB/s. Step time = (data/N)/bw = 100
    MB / 200 GB/s = 0.5 ms. Reduce-scatter takes N−1 = 3 steps = 1.5 ms. All-gather
    also takes N−1 = 3 steps = 1.5 ms. Total = 3 ms.
