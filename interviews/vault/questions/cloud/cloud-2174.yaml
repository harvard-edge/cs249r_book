title: The GPU Memory Hierarchy Bandwidth Stack
scenario: A performance engineer is optimizing a custom CUDA kernel on an H100 SXM. They need to decide where to stage intermediate data. The H100 has: registers (~20 TB/s effective per SM), shared memory/L1 (~19 TB/s aggregate), L2 cache (12 TB/s), and HBM3 (3.35 TB/s). Their kernel processes data that is too large for registers but fits in shared memory. They propose skipping shared memory and using L2 directly since 'L2 is still very fast at 12 TB/s.'
question: "Is skipping shared memory and using L2 directly sound for this memory-bound H100 kernel, and why?"
details:
  realistic_solution: The decision is unsound for a memory-bound kernel when the relevant comparison is L2 vs HBM, not shared memory vs L2. The critical insight is that shared memory bandwidth (144 GB/s per SM) is only ~1.6x faster than per-SM L2 bandwidth (91 GB/s). The truly decisive gap is between L2 and HBM (3.35 TB/s aggregate / 132 SMs \u2248 25 GB/s per SM) \u2014 a 3.6x difference. For data with cross-SM reuse (like broadcast weights), the L2 is appropriate. For per-SM working sets, shared memory provides modest but meaningful bandwidth benefits. The primary optimization target is reducing HBM traffic, not necessarily L2 traffic.
  common_mistake: |
    **The Pitfall:** Treating the aggregate 12 TB/s L2 bandwidth as if it applies locally to a single SM.
    **The Rationale:** Engineers see "12 TB/s" and "19 TB/s" and assume they are directly comparable, forgetting that shared memory scales with SM count while L2 is a shared global resource.
    **The Consequence:** Making flawed memory staging decisions, underestimating the per-SM bandwidth advantage of shared memory for highly localized working sets.
  napkin_math: |
    - Shared memory per SM: 19 TB/s aggregate / 132 SMs ≈ 144 GB/s per SM.
    - L2 per SM: 12 TB/s / 132 SMs = 91 GB/s per SM.
    - Ratio: 144 / 91 = 1.58x.
    - The gap between L2 and HBM is massive: 91 GB/s vs 25 GB/s per SM (3.6x).
    - **While shared memory is ~1.6x faster than L2, skipping it is generally acceptable for broadcast data, but the primary target must be reducing HBM traffic.**
