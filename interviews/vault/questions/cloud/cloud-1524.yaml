title: Analyzing P99 Latency in M/G/c/K Queues
scenario: Your team operates an LLM inference API using an 8-node H100 cluster (c=8) with a maximum request
  queue length of K=200 to cap memory usage. The arrival rate is Poisson (λ = 60 req/s) and the average
  generation time is 100ms per request. Monitoring shows a healthy 75% average GPU utilization, but p99
  latency frequently exceeds your 2-second SLA, and the load balancer reports a 3% request drop rate (queue
  full). Analyze the root cause of the SLA violations and dropped requests despite the seemingly safe
  75% utilization.
question: "Why do p99 latency and drops violate the 2-second SLA despite 75% utilization in the LLM inference queue?"
details:
  realistic_solution: Diagnose the issue as high service time variance (Cs^2 ≫ 1) dominating the M/G/c/K
    queue dynamics. Address this by reducing variance (via continuous batching, sequence length bucketing)
    or increasing cluster size (c) to absorb long-running requests that block the queue.
  common_mistake: Assuming an M/M/c model (exponential service times) or relying solely on average utilization.
    Candidates often overlook that LLM token generation has highly variable, heavy-tailed service times,
    drastically inflating queue lengths.
  napkin_math: Utilization ρ = λ / (c * μ) = 60 / (8 * 10) = 0.75. By Kingman's approximation, wait time
    Wq ≈ ((Ca^2 + Cs^2)/2) * Wq_mmc. If output lengths vary wildly (e.g., Cs = 3), wait time becomes (1
    + 9)/2 = 5x longer than a standard exponential queue, rapidly overflowing K=200 and violating the
    2s SLA.
