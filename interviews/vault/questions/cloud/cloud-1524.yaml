title: Analyzing P99 Latency in M/G/c/K Queues
scenario: Your LLM inference API uses an 8-node H100 cluster with a request queue length of 200. The arrival rate is Poisson (60 req/s) and average generation time is 100ms. Monitoring shows a healthy 75% average GPU utilization, but p99 latency frequently exceeds the 2-second SLA, and the load balancer reports a 3% request drop rate.
question: Why do p99 latency and drops violate the 2-second SLA despite 75% utilization in the LLM inference queue?
details:
  realistic_solution: Diagnose the issue as high service time variance dominating the queue dynamics. Address this by reducing variance via continuous batching or sequence length bucketing, or increasing cluster size to absorb long-running requests.
  common_mistake: |
    **The Pitfall:** Modeling the system using an M/M/c queue and assuming exponential service times.
    **The Rationale:** Candidates often overlook that LLM token generation has highly variable, heavy-tailed service times (Cs^2 ≫ 1).
    **The Consequence:** Drastically underestimating queue lengths and tail latency, failing to implement variance-reduction strategies like continuous batching.
  napkin_math: |
    *   **Utilization (ρ)**: 60 req/s / (8 nodes × 10 req/s/node) = 0.75.
    *   **Kingman's approximation**: W_q ≈ ((C_a² + C_s²) / 2) × W_q(M/M/c).
    *   **High variance impact**: If service time variance is high (e.g., C_s = 3), wait time becomes (1 + 9)/2 = 5x longer than an M/M/c queue.
    *   **Result: The high variance multiplies queue wait times, rapidly overflowing the 200-request limit and violating the 2s SLA.**
