title: The Datacenter Power Budget
scenario: You are designing a new AI cluster and your datacenter provides racks with a maximum power and
  cooling capacity of 70 kW. You plan to populate these racks with NVIDIA H100 GPUs. Given that an H100
  has a Thermal Design Power (TDP) of 700 W, and your datacenter has a Power Usage Effectiveness (PUE)
  of 1.1, explain how many H100s you can safely install per rack and calculate the rack's total power
  draw from the grid.
details:
  realistic_solution: The 70 kW limit applies to the total power drawn from the grid, which includes both
    the GPUs and the energy needed to cool them (the PUE overhead). Therefore, you must first calculate
    the power budget available to the components themselves. You then divide this component budget by
    the TDP of a single GPU to find the maximum number you can install.
  common_mistake: The most common mistake is to ignore the Power Usage Effectiveness (PUE) and calculate
    the GPU count based only on their Thermal Design Power (TDP). This leads to provisioning 100 GPUs
    (70,000W / 700W), which would draw 77 kW after accounting for cooling, exceeding the rack's 70 kW
    limit and causing thermal throttling or tripped breakers.
  napkin_math: 1. **Calculate the component power budget:** The rack's grid limit must be divided by the
    PUE to find the power available to the GPUs.
  options:
  - 100 GPUs, drawing 70.0 kW
  - 90 GPUs, drawing 63.0 kW
  - 90 GPUs, drawing 69.3 kW
  - 100 GPUs, drawing 77.0 kW
  correct_index: 2
