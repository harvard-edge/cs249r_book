title: The Framework Dispatch Overhead
scenario: You profile a small transformer model (125M parameters) doing inference with batch size 1 in PyTorch eager mode. The nsys trace shows that GPU kernels occupy only 35% of the wall-clock time — the rest is CPU-side overhead between kernel launches. Your colleague says 'the model is too small to saturate the GPU.'
question: "What specifically causes the 65% CPU-side idle time during inference, and how can you fix it?"
details:
  realistic_solution: 'The 65% idle time is the PyTorch dispatch overhead: (1) Python interpreter overhead per operator call (~10-20\mu s), (2) PyTorch''s dispatcher traverses multiple dispatch keys (autograd, autocast, batched, vmap) even in inference mode (~5-15\mu s), (3) operator selection and argument marshaling (~5\mu s), (4) CUDA kernel launch latency (~5-10\mu s). For a 125M model with ~100 operators per forward pass, each taking ~20\mu s of GPU compute, the CPU overhead of ~40\mu s per operator dominates. Fixes: (1) `torch.compile()` to trace and fuse the graph, eliminating per-operator dispatch, (2) CUDA graphs to replay a captured kernel sequence with zero dispatch overhead, (3) TorchScript or export to remove Python entirely, (4) `torch.inference_mode()` to skip autograd dispatch keys.'
  common_mistake: |
    **The Pitfall:** Generically blaming "Python overhead" or passively accepting low utilization as unavoidable.
    **The Rationale:** Candidates fail to distinguish between the Python runtime and the deep underlying C++ framework dispatch layers (autograd checks, tensor shape validation, CUDA launches).
    **The Consequence:** The team leaves massive performance on the table for small, fast models because they fail to utilize tracing solutions like CUDA Graphs or `torch.compile()`.
  napkin_math: |
    **Assumptions & Constraints:**
    - 125M model, 100 operators, 20 \mu s GPU compute per op.
    - 40 \mu s CPU dispatch overhead per op.

    **Calculations:**
    - Baseline GPU work: 100 * 20 \mu s = 2 ms.
    - CPU Dispatch: 100 * 40 \mu s = 4 ms.
    - Total = 6 ms (33% utilization).
    - torch.compile: drops CPU to ~0.5 ms -> 2.5 ms total (80% util).

    **Conclusion & Interpretation:**
    - **Result: CUDA Graphs replays kernels with zero overhead**. Total \approx 2.1 ms (95% GPU util).
