title: Calculating IO Overhead in Standard Attention
scenario: You are profiling a Transformer model on an A100 GPU (2.0 TB/s theoretical HBM bandwidth). The
  standard unoptimized self-attention implementation materializes the N x N attention logits (S) and probabilities
  (P) to HBM. For a batch size of 16, 16 attention heads, and sequence length of 8192 using FP16 (2 bytes/element),
  calculate the absolute time spent strictly on writing and reading these two intermediate matrices to
  and from HBM.
details:
  realistic_solution: IO-aware algorithms like FlashAttention restructure the computation to tile blocks
    of Q, K, and V in SRAM, fusing the softmax and matrix multiply operations. This entirely bypasses
    the need to read/write the full S and P matrices from/to HBM. For batch=16, heads=16, N=8192, each
    intermediate matrix is ~34.36GB, and standard attention moves 4 * 34.36GB = 137.4GB through HBM per
    layer. FlashAttention eliminates this entirely, saving 68.7ms of pure memory I/O time per layer.
  common_mistake: Focusing purely on the FLOPs required for QK^T and PV matrix multiplications while ignoring
    the massive O(N^2) memory I/O cost of materializing intermediate tensors to HBM — the actual performance
    bottleneck.
  napkin_math: 'Matrix elements = 16 (batch) * 16 (heads) * 8192 * 8192 = 17.18 billion. Size per matrix
    = 17.18e9 * 2 bytes = ~34.36 GB. Standard attention requires: Write S, Read S, Write P, Read P. Total
    data movement = 4 * 34.36 GB = 137.4 GB. At 2.0 TB/s (2000 GB/s), memory I/O time = 137.4 / 2000 =
    ~68.7 ms per layer.'
