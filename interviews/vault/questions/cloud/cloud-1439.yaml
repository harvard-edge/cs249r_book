title: Calculating IO Overhead in Standard Attention
scenario: You are profiling a Transformer model on a GPU. The standard unoptimized self-attention implementation materializes the N x N attention logits (S) and probabilities (P) to HBM. For a batch size of 16, 16 attention heads, and sequence length of 8192 using FP16 (2 bytes/element).
question: "How much HBM I/O time does standard attention spend materializing S and P, and what does FlashAttention-2 save?"
details:
  realistic_solution: 'IO-aware algorithms like FlashAttention-2 restructure the computation to tile blocks of Q, K, and V in SRAM, fusing the softmax and matrix multiply operations. This entirely bypasses the need to read/write the full S and P matrices from/to HBM. For batch=16, heads=16, N=8192, each intermediate matrix is ~34.36GB, and standard attention moves 4 * 34.36GB = 137.4GB through HBM per layer. FlashAttention-2 eliminates this entirely, saving 68.7ms of pure memory I/O time per layer.'
  common_mistake: |
    **The Pitfall:** Focusing purely on the FLOPs required for matrix multiplications.
    **The Rationale:** Candidates ignore the massive O(N^2) memory I/O cost of materializing intermediate tensors to HBM.
    **The Consequence:** They misidentify the performance bottleneck and fail to realize why FlashAttention provides speedups despite similar FLOP counts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch = 16, Heads = 16, Seq_len = 8192. FP16 (2 bytes).
       - GPU HBM bandwidth = 2.0 TB/s.
    2. **Calculations:**
       - Elements per matrix: 16 × 16 × 8192 × 8192 = 17.18 billion.
       - Matrix size (S or P): 17.18e9 × 2 bytes = 34.36 GB.
       - Standard attention reads/writes S and P: 4 operations × 34.36 GB = 137.4 GB total I/O.
       - I/O time = 137.4 GB / 2000 GB/s = 68.7 ms.
    3. **Conclusion & Interpretation:** **FlashAttention-2 entirely eliminates 137.4 GB of HBM traffic, saving 68.7 ms per layer. Result: Memory-I/O-Bound.**
