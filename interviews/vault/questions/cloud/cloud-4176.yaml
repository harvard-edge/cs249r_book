title: Network Partitioning for Failure Isolation
scenario: Your 1024-GPU H100 fat-tree cluster experiences a spine switch failure, partitioning the network into two 512-GPU halves. Your 3D parallel training job (TP=8, PP=8, DP=16) spans both halves.
question: Which 3D parallelism dimension is most affected by the 512-GPU partition, and how would you design the topology to contain failures?
details:
  realistic_solution: 'Blast radius analysis by parallelism dimension: TP (8 GPUs) — all within one NVLink domain (same node), unaffected by network failure. PP (8 stages) — spans 1 node if combined with TP (8×8=64 GPUs per PP group), but likely spans 2+ nodes = potentially split by partition. DP (16 groups) — 16 identical model replicas, spans the full cluster, definitely split. Impact: if PP groups cross the partition boundary, the pipeline stalls completely (no data can flow between stages). DP can tolerate partition by reducing to 8-way DP (one half). Design for containment: (1) Ensure PP groups are topology-aware — all 8 PP stages within the same pod (under the same spine switches). (2) Use 2× spine switch redundancy. (3) DP groups span pods — DP can gracefully degrade to fewer replicas. (4) Use ECMP with 4+ equal-cost paths through different spines.'
  common_mistake: |
    **The Pitfall:** Assuming a spine switch failure only causes a bandwidth degradation due to oversubscription.
    **The Rationale:** Engineers familiar with generic web architectures assume routing protocols inherently route around damage without penalty, ignoring the strict synchronized pipeline dependencies of distributed training.
    **The Consequence:** If a pipeline-parallel group is bisected, the entire 1024-GPU training run freezes completely because data dependencies stall, turning a partial network fault into a catastrophic global failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024-GPU cluster partitioned into two 512-GPU halves.
    - 3D Parallelism: TP=8, PP=8, DP=16.

    **Calculations:**
    - Total GPUs: 8 * 8 * 16 = 1024.
    - PP Group Size: TP(8) * PP(8) = 64 GPUs each.
    - Number of PP groups: 1024 / 64 = 16 PP groups.
    - DP Degradation: DP can degrade from 16 to 8 replicas safely.

    **Conclusion & Interpretation:**
    - **Result: Full Job Failure (Pipeline-Stall-Bound)**. Bisected data dependencies stall unless topology-aware.
