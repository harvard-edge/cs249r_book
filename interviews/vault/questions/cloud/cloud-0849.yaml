title: Global Active-Active Evaluation for Fraud Detection
scenario: You are designing a stateless serving tier for a fraud detection model using A10G GPUs distributed
  evenly across 3 global regions (us-east, eu-central, ap-northeast). The global peak load is 60,000 QPS
  (20,000 QPS per region). The system has a strict 100ms p99 latency SLA for scoring. Evaluate the cost
  and latency trade-offs of using a global Active-Active replication strategy to handle the complete failure
  of a single region, compared to using a local in-region Active-Passive (Hot Standby) strategy.
question: "Should the fraud-scoring tier use global active-active or local active-passive to survive one region failure under a 100ms p99 SLA?"
details:
  realistic_solution: For 3 regions, surviving 1 region failure requires the remaining 2 to handle 30,000
    QPS each (a 50% overprovisioning per region). However, routing 'us-east' traffic to 'eu-central' adds
    ~90ms of network RTT. Combined with a typical 20-30ms model inference time, this guarantees an SLA
    violation (110ms+). Therefore, if the 100ms SLA is inflexible during failovers, a local Active-Passive
    setup (requiring 100% overprovisioning locally) must be chosen despite higher compute costs.
  common_mistake: Candidates often assume global Active-Active is strictly superior for availability without
    calculating the N/(N-1) overprovisioning required, and they frequently ignore the hard speed-of-light
    network latency penalty when cross-routing traffic during a failure.
  napkin_math: Active-Active Cost = 3 regions * 30k QPS capacity = 90k global capacity (1.5x peak). Failover
    Latency (US to EU) = 90ms network + 25ms compute = 115ms (Breaks 100ms SLA). Local Active-Passive
    Cost = 3 regions * 40k QPS capacity (20k primary + 20k standby) = 120k global capacity (2.0x peak).
