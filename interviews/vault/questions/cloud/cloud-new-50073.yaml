title: Activation Recomputation vs Activation Stashing Trade-Off for Overlap
scenario: In pipeline parallelism with 1F1B scheduling, each stage must store activations from the forward
  pass until they are needed in the backward pass. With 8 micro-batches, this means storing 8 sets of
  activations. An alternative is activation recomputation (checkpointing), which trades compute for memory.
  How does this choice affect communication overlap?
question: "How does this choice affect communication overlap?"
details:
  realistic_solution: 'Counterintuitive benefit: activation recomputation actually IMPROVES overlap. (1)
    Without recomputation: backward pass = 200ms, AllReduce = 150ms. Overlap ratio: 150/200 = 75%. (2)
    With recomputation: backward pass = 200ms (original) + 200ms (recompute forward) = 400ms. AllReduce
    = 150ms (unchanged). Overlap ratio: 150/400 = 100% (fully hidden). (3) Total time: without recomputation:
    max(200, 150) = 200ms (if fully overlapped). With recomputation: max(400, 150) = 400ms. Recomputation
    is slower despite better overlap. (4) The right answer depends on whether memory savings enable larger
    batch sizes. If recomputation frees enough memory for 2x batch size: 400ms / (2 x 200ms) = 1.0x throughput.
    Net neutral in this example.'
  common_mistake: Choosing activation recomputation purely based on memory savings without considering
    its impact on compute-communication overlap. Recomputation adds compute to the backward pass, which
    can improve overlap by making the backward pass longer than communication.
  napkin_math: 'Memory savings from recomputation: 8 micro-batches x 2GB activations per micro-batch =
    16GB freed. This can increase batch size by 2x on an 80GB H100. With 2x batch: forward 400ms, backward
    400ms, recompute 400ms. But samples per step doubles. Throughput: 2x samples / 1.5x time = 1.33x improvement.'
