title: Power Delivery Across Chiplet Dies
scenario: 'During sustained inference on MI300X, you observe that XCD thermal throttling is non-uniform — some XCDs throttle at 600W TDP while others remain at full frequency.'
question: 'What is causing non-uniform XCD thermal throttling on MI300X during sustained inference, and how would you fix it?'
details:
  realistic_solution: 'Non-uniform throttling indicates workload imbalance across XCDs. XCDs processing attention heads (memory-bound, lower power) run cooler than XCDs running FFN layers (compute-bound, higher power). The MI300X package thermal management allows individual XCD DVFS. Rebalance layer assignments to distribute power more uniformly, or use ROCm''s power management API to cap per-XCD TDP.'
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling is uniform across all chiplets since they share a package TDP budget.
    **The Rationale:** Viewing the MI300X package as a single monolithic thermal zone.
    **The Consequence:** Failing to balance workloads across XCDs, leading to hot spots where compute-bound tasks cause severe localized throttling.
  napkin_math: |
    * MI300X TDP: 750W across 8 XCDs = 93.75W average per XCD.
    * Compute-bound XCD (FFN): ~110W.
    * Memory-bound XCD (attention): ~70W.
    * At 600W package limit during throttle: (600W - (70W × 4 attention XCDs)) / 4 compute XCDs.
    * (600 - 280) / 4 = 80W per compute XCD.
    * **Result: Compute XCDs are starved to 80W, forcing a ~15% localized frequency reduction.**
