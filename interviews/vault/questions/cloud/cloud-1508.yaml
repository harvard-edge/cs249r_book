title: Global Real-Time Inference and the Light Barrier
scenario: You are evaluating the architecture for a real-time fraud detection ML service for a global
  payment processor. The business requirement mandates a strict 100ms P99 end-to-end latency budget to
  prevent transaction timeouts. The proposed design uses a centralized, highly-optimized GPU cluster in
  us-east-1 (Virginia) to serve requests globally, including high transaction volumes from Tokyo and Sydney.
  Model inference takes 20ms on an H100. Evaluate the feasibility of this centralized architecture and
  propose a justifiable path forward.
details:
  realistic_solution: Reject the centralized architecture. The physical distance dictates that the network
    round-trip time alone exceeds the 100ms budget due to the speed of light in fiber. The architecture
    must be refactored to a multi-region deployment, pushing model replicas to edge regions (e.g., ap-southeast-2,
    ap-northeast-1) closer to the transaction origin.
  common_mistake: Focusing solely on optimizing the model inference time (e.g., using TensorRT, quantization,
    or speculative decoding) or reducing API overhead, while completely ignoring the physical network
    propagation delay.
  napkin_math: Distance from Sydney to Virginia is ~15,000 km. Speed of light in fiber is ~200,000 km/s.
    One-way propagation = 15,000 km / 200,000 km/s = 75ms. Minimum physics-bound RTT = 150ms. Total latency
    ≥ 150ms (network) + 20ms (compute) = 170ms. 170ms > 100ms budget. The design is physically impossible.
