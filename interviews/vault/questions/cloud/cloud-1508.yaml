title: Global Real-Time Inference and the Light Barrier
scenario: You are evaluating the architecture for a real-time fraud detection ML service for a global payment processor. The business requirement mandates a strict 100ms P99 end-to-end latency budget to prevent transaction timeouts. The proposed design uses a centralized, highly-optimized GPU cluster in us-east-1 (Virginia) to serve requests globally, including high transaction volumes from Tokyo and Sydney. Model inference takes 20ms.
question: Can a centralized us-east-1 fraud service meet a 100ms P99 SLA for Tokyo and Sydney traffic with 20ms H100 inference?
details:
  realistic_solution: Reject the centralized architecture. The physical distance dictates that the network round-trip time alone exceeds the 100ms budget due to the speed of light in fiber. The architecture must be refactored to a multi-region deployment, pushing model replicas to edge regions (e.g., ap-southeast-2, ap-northeast-1) closer to the transaction origin.
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing the model inference time or API overhead.
    **The Rationale:** Engineers often instinctively reach for model optimizations like TensorRT, quantization, or speculative decoding to reduce latency.
    **The Consequence:** They completely ignore the physical network propagation delay, resulting in a fundamentally flawed architecture that can never meet the SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Distance from Sydney to Virginia is ~15,000 km.
    - Speed of light in fiber is ~200,000 km/s.
    - Target SLA is 100ms.
    - Compute time is 20ms.

    **Calculations:**
    - One-way propagation = 15,000 km / 200,000 km/s = 75ms.
    - Minimum physics-bound RTT = 150ms.
    - Total Latency = 150ms (network) + 20ms (compute) = 170ms.

    **Conclusion & Interpretation:**
    - **Result: 170ms (Network-Bound)**. 170ms > 100ms budget. The design is physically impossible.
