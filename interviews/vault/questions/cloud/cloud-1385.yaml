title: Sizing Host DRAM for Decoded Tensor Staging
scenario: You are configuring a data pipeline for a Vision Transformer training job on a node with 8x H100 GPUs. The model consumes 12,000 images/second globally. The CPU decodes 200KB JPEGs from NVMe into 3MB float32 tensors before transfer to the GPUs. To completely hide CPU decoding and PCIe Gen5 transfer latency, you need to stage exactly 4 full global batches of decoded tensors in the host DRAM buffer. The global batch size is 4,096.
question: How much host DRAM is needed for four decoded global batches, and what sustained PCIe bandwidth is required?
details:
  realistic_solution: Allocate approximately 50GB of host DRAM for the prefetch buffer. The buffer must store fully decoded tensors (4096 * 4 batches * 3MB = 49.15 GB) to enable direct DMA transfers over PCIe to the GPUs. The pipeline also requires a sustained 36 GB/s of PCIe bandwidth (12,000 imgs/s * 3MB), which necessitates strict NUMA node pinning to avoid cross-socket bottlenecks.
  common_mistake: |
    **The Pitfall:** Calculating the DRAM buffer capacity using the compressed JPEG size.
    **The Rationale:** Candidates forget that the GPUs need fully decoded, uncompressed `float32` tensors.
    **The Consequence:** Provisioning a host with vastly insufficient DRAM (e.g., 3GB instead of 50GB), leading to catastrophic out-of-memory errors or severe GPU starvation.
  napkin_math: |
    *   **Batch Footprint:** 1 Batch = 4,096 images $\times$ 3 MB/image = 12,288 MB = **12.288 GB**.
    *   **Total Buffer Size:** 4 Batches in DRAM = 4 $\times$ 12.288 = **49.15 GB**.
    *   **PCIe Bandwidth Need:** 12,000 imgs/sec $\times$ 3 MB = 36,000 MB/s = **36 GB/s**.
