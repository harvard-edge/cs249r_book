title: The Datacenter Cooling Tax (cloud-0343)
scenario: You are provisioning a new rack in your company's AI datacenter. The rack is designed to hold 64 NVIDIA GPUs. The datacenter uses liquid cooling and has a Power Usage Effectiveness (PUE) of 1.1. A single GPU has a Thermal Design Power (TDP) of 700W.
question: "What total facility power is required for a 64-GPU rack at 700W per GPU with PUE 1.1?"
details:
  realistic_solution: The correct approach is to first calculate the total power consumed by the IT equipment (the GPUs) and then multiply that by the PUE to find the total facility power draw. For a rack of 64, the total IT power is 44.8 kW. Multiplying by the PUE of 1.1 gives the total power required from the facility of 49.28 kW.
  common_mistake: |
    **The Pitfall:** Forgetting to apply the Power Usage Effectiveness (PUE) multiplier.
    **The Rationale:** Engineers often just sum the TDP of the components, forgetting that cooling and power distribution require substantial overhead.
    **The Consequence:** The infrastructure team drastically under-provisions power capacity, leading to tripped breakers and outages when the rack hits full load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack density: 64 GPUs.
       - GPU TDP: 700 W.
       - Facility PUE: 1.1.
    2. **Calculations:**
       - Total IT Power: 64 GPUs * 700 W/GPU = 44,800 W = 44.8 kW.
       - Total Facility Power = IT Power * PUE.
       - 44.8 kW * 1.1 = 49.28 kW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound. Cooling overhead adds an inescapable tax, requiring 49.28 kW total facility power per rack.**
  options:
  - 44.8 kW
  - 4.48 kW
  - 49.28 kW
  - 40.73 kW
