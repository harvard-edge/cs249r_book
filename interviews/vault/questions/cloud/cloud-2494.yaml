title: Extreme Power-Budgeted Federated Edge
scenario: 'You are designing an FL system for wildlife tracking collars (2000mAh battery, 3.7V, 2-year lifespan). The cloud orchestrates FL to adapt behavior classification models. Satellite radio transmission costs 2W and takes 30s to send weights. Local Cortex-M4 compute costs 10mW. You have a strict 36 Joules/day energy budget.'
question: How would you design the collar FL update policy to stay within the strict 36 Joules/day energy budget?
details:
  realistic_solution: 'Implement Gradient-based Early Stopping and Sparse Communication. The collar computes gradients locally. If the gradient norm is below a cloud-defined threshold, the device skips the satellite transmission. The cloud only aggregates updates from devices experiencing high novelty/loss.'
  common_mistake: |
    **The Pitfall:** Running FL rounds on a strict daily calendar schedule.
    **The Rationale:** It is the standard way federated learning is scheduled in mobile environments with plentiful power.
    **The Consequence:** Blindly incurs massive radio energy costs even if the local model hasn't learned anything new, blowing past the energy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 36 Joules/day.
    - Transmission: 2W * 30s = 60 Joules.
    - Compute: 10mW * 60s = 0.6 Joules.
    
    **Calculations:**
    - Daily blind transmission (60.6J) > 36J.
    - Transmitting only when novelty is high (e.g., once every 14 days): 0.6J + (60J / 14) = 4.88 Joules/day.
    
    **Conclusion & Interpretation:**
    - **Result: 4.88 Joules/day (Power-Bound)**. Sparing transmission keeps average cost to ~4.88 Joules, successfully meeting the strict 36J budget.
