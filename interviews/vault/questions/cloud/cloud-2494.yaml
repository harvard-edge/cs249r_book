title: Extreme Power-Budgeted Federated Edge
scenario: You are designing an FL system for wildlife tracking collars (2000mAh battery, 3.7V, 2-year lifespan). The cloud orchestrates FL to adapt behavior classification models. Satellite radio transmission costs 2W and takes 30s to send weights. Local Cortex-M4 compute costs 10mW. You have a strict 36 Joules/day energy budget.
question: How would you design the collar FL update policy to stay within the strict 36 Joules/day energy budget?
details:
  realistic_solution: Implement Gradient-based Early Stopping and Sparse Communication. The collar computes gradients locally using the 10mW processor. It calculates the gradient norm. If the norm is below a cloud-defined threshold (meaning the model already predicts the data well), the device skips the 2W satellite transmission. The cloud only aggregates updates from devices experiencing high novelty/loss.
  common_mistake: |
    **The Pitfall:** Running FL rounds on a strict daily calendar schedule.
    **The Rationale:** It is the standard way federated learning is scheduled in mobile environments with plentiful power.
    **The Consequence:** Blindly incurs massive radio energy costs (60J) even if the local model hasn't learned anything new, blowing past the strict 36J/day energy budget.
  napkin_math: |
    - **Daily Budget:** 36 Joules.
    - **Transmission Cost:** 2W * 30s = 60 Joules.
    - **Local Compute Cost:** 10mW * 60s = 0.6 Joules.
    - **Analysis:** A daily transmission (60.6J) exceeds the 36J budget.
    - **Proposed Solution:** Evaluating gradients locally daily (0.6J) and only transmitting when novelty is high (e.g., once every 14 days).
    - **Average Daily Cost:** 0.6J + (60J / 14) = **4.88 Joules**, which is well within the 36J budget.
