title: Cloud New 0005
scenario: 'You need to serve a 13B model with highly dynamic sequence lengths (10 to 8000) using a hybrid AOT/JIT compilation architecture. The goal is to minimize both kernel launch overhead and compilation latency.'
question: 'How would you design a hybrid AOT/JIT compiler for a 13B model with sequence lengths from 10 to 8000?'
details:
  realistic_solution: 'Architect a bucketing system combined with PTX JIT compilation. Pre-compile (AOT) kernels for a fixed set of sequence length buckets (e.g., 32, 128, 512, 2048, 8192) using fixed shapes to maximize register utilization. Route requests to the nearest upper bucket and pad inputs to the bucket size to reuse the highly optimized AOT kernels. For extremely large or irregular shapes that cause high memory fragmentation in buckets, trigger a background JIT compilation cache.'
  common_mistake: |
    **The Pitfall:** Attempting to JIT compile kernels on-the-fly for every unique sequence length.
    **The Rationale:** Engineers want to perfectly optimize hardware usage for every request to avoid padding waste.
    **The Consequence:** The compilation overhead far exceeds the execution time, introducing massive CPU bottlenecks and severe latency spikes for end users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 13B (26GB FP16).
    - KV cache per token: 800KB.
    - Max bucket size: 8192 context.

    **Calculations:**
    - Memory for max bucket: 8192 * 800KB = 6.5GB.
    - Padding penalty (e.g., 4000 to 8192): Wastes ~3.3GB.
    - Capacity on 80GB GPU: 80 - 26 = 54GB. 54GB / 6.5GB ≈ 8 fully padded requests.

    **Conclusion & Interpretation:**
    - **Result: 8 fully padded requests (Memory-Capacity-Bound)**. Trading memory capacity for zero compilation latency via bucketing is the optimal tradeoff to eliminate CPU bottlenecks.
