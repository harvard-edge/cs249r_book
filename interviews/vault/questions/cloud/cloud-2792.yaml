title: Cloud New 0005
scenario: 'You need to serve a 13B model on A100s with highly dynamic sequence lengths (10 to 8000) using a hybrid AOT/JIT compilation architecture. The goal is to minimize both kernel launch overhead and compilation latency.'
question: 'How would you design a hybrid AOT/JIT compiler for a 13B model with sequence lengths from 10 to 8000?'
details:
  realistic_solution: 'Architect a bucketing system combined with PTX JIT compilation. Pre-compile (AOT) kernels for a fixed set of sequence length buckets (e.g., 32, 128, 512, 2048, 8192) using fixed shapes to maximize A100 register utilization. Route requests to the nearest upper bucket. For extremely large or irregular shapes that cause high memory fragmentation in buckets, trigger a background JIT compilation cache. Pad inputs to the bucket size to reuse the highly optimized AOT kernels.'
  common_mistake: |
    **The Pitfall:** Attempting to JIT compile kernels on-the-fly for every unique sequence length.
    **The Rationale:** Engineers want to perfectly optimize hardware usage for every request to avoid padding waste.
    **The Consequence:** The compilation overhead far exceeds the execution time, introducing massive CPU bottlenecks and severe latency spikes for end users.
  napkin_math: |
    * **Model size:** 13B = 26GB FP16.
    * **KV cache per token:** 800KB.
    * **Max bucket size (8192 context):** 8192 * 800KB = 6.5GB.
    * **Padding penalty:** Padding a 4000-token request to an 8192 bucket wastes ~3.3GB.
    * **Capacity:** An 80GB A100 can still hold ~8 fully padded requests.
    * **Conclusion:** Trading memory capacity for **zero compilation latency** via bucketing is the optimal tradeoff.
