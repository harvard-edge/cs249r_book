title: CPU Offload vs Gradient Accumulation
scenario: You are training a 5B parameter model on a single A100 (80GB HBM2e) and experiencing OOM due
  to memory pressure from Adam optimizer states and activations. You must evaluate two architectures to
  resolve this. Architecture A offloads 40GB of Adam optimizer states to the host CPU over PCIe Gen5 x16,
  maintaining a large micro-batch size. Architecture B keeps all states on the GPU but uses Gradient Accumulation
  (4 micro-batches) to reduce activation memory by 30GB, which drops arithmetic intensity below the A100's
  ridge point of 156 FLOPs/Byte and adds a 300ms compute penalty per global step. Which architecture provides
  higher training throughput?
question: "Which architecture provides higher training throughput?"
details:
  realistic_solution: Architecture B (Gradient Accumulation) is the better choice. CPU offloading requires
    transferring FP16 gradients to the CPU and updated FP16 weights back to the GPU every step. Even with
    PCIe Gen5, this data movement creates a transfer bottleneck that is strictly slower than the compute
    degradation penalty incurred by running smaller micro-batches in Architecture B.
  common_mistake: Candidates often blindly choose CPU offloading to maintain high GPU utilization, ignoring
    the severe latency penalty of the PCIe bus. They fail to compare the physical data transfer time against
    the compute degradation caused by lower arithmetic intensity.
  napkin_math: 'For Architecture A (CPU Offload): 5B parameters require transferring 10GB of FP16 gradients
    to the CPU, and 10GB of updated FP16 weights back to the GPU. Over PCIe Gen5 x16 (32 GB/s unidirectional
    bandwidth), the transfer time is: (10 GB / 32 GB/s) + (10 GB / 32 GB/s) = 0.3125s + 0.3125s = 0.625
    seconds per step. For Architecture B (Gradient Accumulation): The total compute penalty is given as
    0.3 seconds per step. Since 0.3s (compute penalty) < 0.625s (PCIe transfer overhead), Architecture
    B yields significantly higher throughput.'
