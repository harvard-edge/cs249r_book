title: Cloud Weight Stationary L2 0
scenario: An accelerator designer describes their chip as using a 'weight-stationary dataflow.' Explain
  what this means, when it is advantageous, and how it differs from output-stationary dataflow.
question: "What is weight-stationary dataflow, when is it advantageous, and how does it differ from output-stationary dataflow?"
details:
  realistic_solution: In weight-stationary dataflow, model weights are loaded once into local registers/scratchpad
    and remain fixed while input activations stream through. Each processing element (PE) holds one weight
    and accumulates partial sums as inputs flow past. This minimizes weight memory traffic — critical
    when the model is large relative to on-chip memory. In output-stationary dataflow, partial output
    sums stay fixed in PEs while both weights and inputs are streamed in. Weight-stationary excels for
    inference (weights reused across many inputs in a batch); output-stationary excels for training (accumulating
    gradients across a sequence).
  common_mistake: Assuming weight-stationary is always best. For small models with large batch sizes,
    input traffic dominates and output-stationary can be more efficient because it minimizes partial sum
    accumulation traffic.
  napkin_math: 'Weight-stationary: for a 1024x1024 weight matrix with batch=64, weights loaded once (2
    MB FP16). Inputs stream: 64 x 1024 x 2B = 128 KB per batch. Weight reuse: 64x. Output-stationary:
    outputs fixed (64x1024x2B = 128 KB), weights stream once per batch = same total, but different PE
    utilization pattern.'
