title: Cloud Weight Stationary L2 0
scenario: An accelerator designer describes their chip as using a 'weight-stationary dataflow.'
question: What is weight-stationary dataflow, when is it advantageous, and how does it differ from output-stationary dataflow?
details:
  realistic_solution: In weight-stationary dataflow, model weights are loaded once into local registers/scratchpad and remain fixed while input activations stream through. Each processing element (PE) holds one weight and accumulates partial sums as inputs flow past. This minimizes weight memory traffic — critical when the model is large relative to on-chip memory. In output-stationary dataflow, partial output sums stay fixed in PEs while both weights and inputs are streamed in. Weight-stationary excels for inference (weights reused across many inputs in a batch); output-stationary excels for training (accumulating gradients across a sequence).
  common_mistake: |
    **The Pitfall:** Assuming weight-stationary is always best.
    **The Rationale:** For small models with large batch sizes, input traffic dominates.
    **The Consequence:** Output-stationary can be more efficient because it minimizes partial sum accumulation traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weight matrix: 1024x1024, FP16 (2 bytes/param)
    - Batch size: 64

    **Calculations:**
    - Weight-stationary weights loaded once: 1024 * 1024 * 2B = 2 MB
    - Inputs stream: 64 * 1024 * 2B = 128 KB per batch
    - Output-stationary outputs fixed: 64 * 1024 * 2B = 128 KB

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Memory-Bound)**. Same total traffic, but different PE utilization pattern.
