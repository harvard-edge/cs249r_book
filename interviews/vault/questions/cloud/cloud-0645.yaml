title: The CUDA Upgrade Regression
scenario: After upgrading from CUDA 11.8 to CUDA 12.2, your 13B model's accuracy on your internal benchmark drops by 2.3 points. The model weights are identical — same checkpoint file. The training team swears nothing changed.
question: How can the same weights produce different accuracy with a different CUDA version?
details:
  realistic_solution: CUDA version upgrades change the cuDNN and cuBLAS kernel implementations. Different kernel implementations use different reduction orders, tiling strategies, and fused operations — all of which change the order of floating-point additions. Due to floating-point non-associativity in FP16/BF16, different reduction orders produce different results at the bit level. The fix is to set deterministic flags or re-validate the model on the benchmark.
  common_mistake: |
    **The Pitfall:** Assuming the regression is a software bug in CUDA or dismissing it as random noise.
    **The Rationale:** Engineers used to deterministic CPU execution assume identical inputs and weights must yield mathematically identical outputs across library versions.
    **The Consequence:** Teams waste weeks filing bugs with vendors or chasing phantom infrastructure issues instead of handling floating-point non-associativity gracefully.
  napkin_math: |
    1. **Precision limits:** BF16 mantissa = 7 bits $\rightarrow$ relative precision = $2^{-7} \approx 0.78\%$.
    2. **Accumulation variance:** Over 32 layers with residual connections, divergence compounds. $\epsilon_{\text{total}} \approx 32 \times 0.05\% \approx 1.6\%$ relative shift in output logits.
    3. **Impact on accuracy:** On a 50k-vocab softmax, a 1.6% logit shift changes the top-1 prediction for tokens where the top-2 logit gap is very small.
    4. **Final effect:** This shifts the argmax for roughly **2-5% of tokens**, perfectly explaining the 2.3-point accuracy drop.
