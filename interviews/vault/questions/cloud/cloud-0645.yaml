title: The CUDA Upgrade Regression
scenario: After upgrading from CUDA 11.8 to CUDA 12.2, your 13B model's accuracy on your internal benchmark
  drops by 2.3 points. The model weights are identical — same checkpoint file. The training team swears
  nothing changed. How can the same weights produce different accuracy with a different CUDA version?
question: "How can the same weights produce different accuracy with a different CUDA version?"
details:
  realistic_solution: 'CUDA version upgrades change the cuDNN and cuBLAS kernel implementations. Different
    kernel implementations use different reduction orders, tiling strategies, and fused operations — all
    of which change the order of floating-point additions. Due to floating-point non-associativity ($(a
    + b) + c \neq a + (b + c)$ in FP16/BF16), different reduction orders produce different results at
    the bit level. For a single operation, the difference is in the last mantissa bit (~0.1% relative
    error). But in a 32-layer Transformer, these differences compound through every matmul, softmax, and
    LayerNorm. By the output layer, accumulated rounding differences can shift logits by 0.01–0.1, which
    is enough to change the argmax token for ~2–5% of predictions. The fix: (1) set `torch.backends.cudnn.deterministic
    = True` and `torch.use_deterministic_algorithms(True)` — this forces deterministic kernels at a 5–15%
    performance cost; (2) if determinism is too expensive, re-validate the model on your benchmark after
    every CUDA upgrade and establish a regression threshold; (3) for production, pin CUDA versions in
    your container images and only upgrade with a full eval cycle.'
  common_mistake: '"It must be a bug in CUDA 12.2 — file a bug with NVIDIA" or "2.3 points is within noise."
    A 2.3-point drop on a stable benchmark with identical weights is statistically significant and reproducible,
    but it''s not a bug — it''s a consequence of how floating-point math works.'
  napkin_math: 'BF16 mantissa = 7 bits → relative precision = $2^{-7} \approx 0.78\%$. A single matmul
    accumulating 4096 products: worst-case rounding error ≈ $\sqrt{4096} \times 2^{-7} \approx 50\%$ relative
    — but in practice, errors are random and partially cancel, giving ~$0.78\% \times \sqrt{4096 / 3}
    \approx 29\%$... no, the actual measured per-layer divergence is ~0.01–0.1% because cuBLAS accumulates
    in FP32 internally. Over 32 layers with residual connections: divergence compounds as $\epsilon_{\text{total}}
    \approx 32 \times 0.05\% \approx 1.6\%$ relative shift in output logits. On a 50k-vocab softmax, a
    1.6% logit shift changes the top-1 prediction for tokens where the top-2 logit gap is <0.1 — roughly
    **2–5% of tokens**, matching the 2.3-point accuracy drop.'
