title: A100 MIG Instance Utilization and Concurrency for ML Inference
scenario: "You are designing an inference service on an NVIDIA A100 GPU (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s bandwidth). A common request requires 20 TFLOPS FP16 and 100 GB/s bandwidth. You use 1g.10gb MIG instances, which provide 1/7th of the A100's resources."
question: For a 1g.10gb A100 MIG slice, how many 20 TFLOPS and 100 GB/s inference requests fit concurrently, and what is the total across seven slices?
details:
  realistic_solution: The solution involves correctly calculating the available FP16 TFLOPS and memory bandwidth for a 1g.10gb MIG instance (1/7th of total A100 resources). Then, for a single MIG instance, determining the maximum requests based on compute capacity and separately on memory bandwidth capacity. The lower of these two values dictates the true maximum concurrent requests for that instance. Finally, multiplying this per-instance concurrency by the number of MIG instances (7) to get the total for the A100. A strong answer would also briefly acknowledge real-world factors like software overheads, latency, or the benefits of request batching that might affect actual throughput.
  common_mistake: |
    **The Pitfall:** Assuming linear scaling without identifying the true bottleneck (compute vs. memory bandwidth).
    **The Rationale:** Candidates fail to calculate the fractional resources correctly or forget to round down concurrent requests, assuming fractional requests can run simultaneously.
    **The Consequence:** The system is over-provisioned with requests, causing massive queuing delays and SLA violations.
  napkin_math: |
    - **Calculate MIG resources:** 1/7th of A100 = 44.57 TFLOPS FP16 and 285.71 GB/s bandwidth.
    - **Analyze compute limit:** 44.57 TFLOPS / 20 TFLOPS/req = 2.22 requests (round down to 2).
    - **Analyze memory limit:** 285.71 GB/s / 100 GB/s/req = 2.85 requests (round down to 2).
    - **Calculate per-MIG concurrency:** The bottleneck allows **2 concurrent requests**.
    - **Calculate total A100 concurrency:** 2 requests/MIG × 7 MIGs = **14 concurrent inference requests** total.
