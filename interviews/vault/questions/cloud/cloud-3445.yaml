title: A100 MIG Instance Utilization and Concurrency for ML Inference
scenario: 'You are designing a multi-tenant inference service running on NVIDIA A100
  GPUs (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth). A common model inference
  request requires 20 TFLOPS of FP16 compute and 100 GB/s of memory bandwidth per
  request. Your team decides to use 1g.10gb MIG instances, which conceptually provide
  1/7th of the full A100''s resources (compute and memory bandwidth).


  1. Calculate the theoretical maximum number of such inference requests that can
  be serviced concurrently by a *single 1g.10gb MIG instance*, constrained by either
  compute or memory bandwidth.

  2. Given that an A100 can support up to seven 1g.10gb MIG instances, what is the
  *total theoretical maximum number of concurrent inference requests* that a *single
  physical A100 GPU* can handle using this MIG configuration, assuming no partitioning
  overheads?'
question: For a 1g.10gb A100 MIG slice, how many 20 TFLOPS and 100 GB/s inference
  requests fit concurrently, and what is the total across seven slices?
details:
  realistic_solution: The solution involves correctly calculating the available FP16
    TFLOPS and memory bandwidth for a 1g.10gb MIG instance (1/7th of total A100 resources).
    Then, for a single MIG instance, determining the maximum requests based on compute
    capacity and separately on memory bandwidth capacity. The lower of these two values
    dictates the true maximum concurrent requests for that instance. Finally, multiplying
    this per-instance concurrency by the number of MIG instances (7) to get the total
    for the A100. A strong answer would also briefly acknowledge real-world factors
    like software overheads, latency, or the benefits of request batching that might
    affect actual throughput.
  common_mistake: Candidates might fail to calculate the effective resources for a
    MIG instance, assume linear scaling without considering the fractional allocation,
    or neglect to identify the true bottleneck (compute vs. memory bandwidth) when
    determining concurrency. Another common mistake is providing a non-integer number
    of concurrent requests, or not clearly justifying the rounding down.
  napkin_math: 'A100 Specs:

    - Total FP16 TFLOPS: 312 TFLOPS

    - Total Memory Bandwidth: 2.0 TB/s = 2000 GB/s


    1g.10gb MIG Instance (1/7th of A100 resources):

    - Effective FP16 TFLOPS: 312 / 7 ≈ 44.57 TFLOPS

    - Effective Memory Bandwidth: 2000 / 7 ≈ 285.71 GB/s


    Per Inference Request Needs:

    - FP16 Compute: 20 TFLOPS

    - Memory Bandwidth: 100 GB/s


    Part 1: Concurrency per single 1g.10gb MIG instance

    - Based on Compute: 44.57 TFLOPS / 20 TFLOPS/request ≈ 2.22 requests. So, 2 concurrent
    requests.

    - Based on Memory Bandwidth: 285.71 GB/s / 100 GB/s/request ≈ 2.85 requests. So,
    2 concurrent requests.

    - The bottleneck is compute (both yield 2 requests in this specific case, but
    if they differed, the lower value would be the bottleneck).

    - Therefore, a single 1g.10gb MIG instance can service *2 concurrent inference
    requests*.


    Part 2: Total concurrency for a single A100 GPU (with 7 x 1g.10gb MIG instances)

    - Total Concurrent Requests = (Concurrency per MIG instance) * (Number of MIG
    instances)

    - Total Concurrent Requests = 2 requests/instance * 7 instances = *14 concurrent
    inference requests*.'
