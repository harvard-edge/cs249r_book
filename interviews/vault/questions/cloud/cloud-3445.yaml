title: 'A100 MIG Instance Utilization and Concurrency for ML Inference'
scenario: 'You are designing an inference service on an NVIDIA A100 GPU (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s bandwidth). A common request requires 20 TFLOPS FP16 and 100 GB/s bandwidth. You use 1g.10gb MIG instances, which provide 1/7th of the A100 resources.'
question: 'For a 1g.10gb A100 MIG slice, how many 20 TFLOPS and 100 GB/s inference requests fit concurrently, and what is the total across seven slices?'
details:
  realistic_solution: 'Calculate fractional resources correctly. Find max concurrent requests by compute limit, then by memory bandwidth limit. The lower value dictates the actual max concurrency. Multiply by 7 MIG instances.'
  common_mistake: |
    **The Pitfall:** Assuming linear scaling without identifying the true bottleneck (compute vs. memory bandwidth).
    **The Rationale:** Candidates fail to calculate the fractional resources correctly or forget to round down concurrent requests, assuming fractional requests can run simultaneously.
    **The Consequence:** The system is over-provisioned with requests, causing massive queuing delays and SLA violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100: 312 TFLOPS, 2.0 TB/s (2000 GB/s).
    - MIG slice: 1/7th capacity.
    - Request load: 20 TFLOPS, 100 GB/s.

    **Calculations:**
    - Slice Compute: 312 / 7 = 44.57 TFLOPS.
    - Slice Bandwidth: 2000 / 7 = 285.71 GB/s.
    - Compute slots: 44.57 / 20 = 2.22 (rounds to 2).
    - Bandwidth slots: 285.71 / 100 = 2.85 (rounds to 2).
    - Concurrency per slice: min(2, 2) = 2 requests.
    - Total A100 concurrency: 2 × 7 = 14 requests.

    **Conclusion & Interpretation:**
    - **Result: 14 concurrent requests total (Compute-Bound)**. Both compute and bandwidth equally constrain it at 2 requests/slice.
