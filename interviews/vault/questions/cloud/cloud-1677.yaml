title: Calculating PAM4 Baud Rate for 800G Links
scenario: You are designing the network fabric for a new GPU cluster and need to provision 800G Ethernet links using 8 electrical lanes with PAM4 signaling. The system requires a 6.25% overhead for Forward Error Correction (FEC) and Ethernet framing.
question: What actual symbol rate per lane is required to support the 800G link over 8 PAM4 lanes with 6.25% overhead?
details:
  realistic_solution: 'First, find the payload bit rate per lane: 800 Gbps / 8 lanes = 100 Gbps per lane. Next, account for the 6.25% FEC and framing overhead: 100 Gbps * 1.0625 = 106.25 Gbps raw bit rate per lane. Finally, convert the bit rate to baud rate using PAM4''s encoding (4 voltage levels = 2 bits per symbol): 106.25 Gbps / 2 bits/symbol = 53.125 Gbaud per lane.'
  common_mistake: |
    **The Pitfall:** Confusing bit rate with baud rate or forgetting the PAM4 encoding factor.
    **The Rationale:** Engineers used to NRZ (Non-Return-to-Zero, 1 bit/symbol) signaling assume 100 Gbps requires 100 Gbaud hardware.
    **The Consequence:** This leads to specifying or purchasing transceivers and cables with twice the required frequency bandwidth, severely over-engineering the physical layer at massive cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 800 Gbps total throughput over 8 lanes.
       - 6.25% FEC and framing overhead.
       - PAM4 signaling encodes 2 bits per symbol.
    2. **Calculations:**
       - Payload per Lane: 800 Gbps / 8 lanes = 100 Gbps/lane.
       - Raw Line Rate: 100 Gbps * 1.0625 (overhead) = 106.25 Gbps.
       - Symbol Rate: 106.25 Gbps / 2 bits/symbol = 53.125 Gbaud.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware-Bound. 53.125 Gbaud required per lane.**
