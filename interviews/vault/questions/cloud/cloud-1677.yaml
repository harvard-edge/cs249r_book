title: Calculating PAM4 Baud Rate for 800G Links
scenario: You are designing the network fabric for a new GPU cluster and need to provision 800G Ethernet
  links using 8 electrical lanes. The transceivers use PAM4 signaling. Given that PAM4 encodes 2 bits
  per symbol and the system requires a 6.25% overhead for Forward Error Correction (FEC) and Ethernet
  framing, calculate the required actual symbol rate (Baud rate) per lane to support the full 800G link.
details:
  realistic_solution: 'First, find the payload bit rate per lane: 800 Gbps / 8 lanes = 100 Gbps per lane.
    Next, account for the 6.25% FEC and framing overhead: 100 Gbps * 1.0625 = 106.25 Gbps raw bit rate
    per lane. Finally, convert the bit rate to baud rate using PAM4''s encoding (4 voltage levels = 2
    bits per symbol): 106.25 Gbps / 2 bits/symbol = 53.125 Gbaud per lane.'
  common_mistake: Confusing bit rate with baud rate (assuming 100 Gbaud is needed for 100 Gbps per lane)
    or forgetting to divide the bit rate by 2 to account for PAM4's 2 bits per symbol.
  napkin_math: Payload/lane = 800 Gbps / 8 = 100 Gbps. Raw line rate = 100 Gbps * 1.0625 = 106.25 Gbps.
    Baud rate = 106.25 Gbps / 2 bits/symbol = 53.125 Gbaud.
