title: 'Disaggregated Memory Architecture: CXL vs HBM on Chiplet'
scenario: 'A hyperscaler proposes replacing some HBM stacks on a chiplet AI accelerator with CXL 3.0 attached DRAM to reduce cost while maintaining capacity for LLM inference.'
question: 'For 70B LLM inference, what are the bandwidth and latency tradeoffs of replacing some HBM stacks with CXL 3.0 DRAM?'
details:
  realistic_solution: 'Tiered approach: keep KV cache and active layer weights in HBM (hot tier), use CXL for inactive layers and spilled KV from long-context requests (warm tier). For 70B model decode with TP=1: each forward pass loads all 80 layers sequentially. With 4 HBM stacks (2 TB/s) + 2 CXL modules (400 GB/s): place first 60 layers in HBM, last 20 in CXL. CXL layers take 5x longer to load. If CXL layers are 25% of model: decode latency increases 25% * 5x = ~100% for those layers, avg ~25% slowdown. Justified only if cost savings > 25% SLA degradation impact.'
  common_mistake: |
    **The Pitfall:** Treating CXL memory as equivalent to HBM, just with lower bandwidth.
    **The Rationale:** Ignoring that CXL 3.0 latency (100-200ns) is 5-10x higher than HBM (20-40ns).
    **The Consequence:** Drastically underestimating the latency penalty for token generation where every token requires loading the full model weight footprint.
  napkin_math: |
    * 70B BF16 weights = 140 GB.
    * 4x HBM3 stacks: 100 GB, 2 TB/s.
    * CXL tier: 40 GB, 400 GB/s, 150ns latency.
    * Per-layer weight load: 140GB/80 = 1.75 GB/layer.
    * HBM time: 1.75GB / 2TB/s = 0.875ms/layer.
    * CXL time: 1.75GB / 400GB/s = 4.375ms/layer.
    * Full model HBM: 80 * 0.875ms = 70ms.
    * Mixed (60 HBM + 20 CXL): (60 * 0.875) + (20 * 4.375) = 52.5 + 87.5 = 140ms.
    * **Result: 2x slowdown for the entire decode step.**
