title: The Distributed Data Loading
scenario: You're training a vision-language model on 256 A100 GPUs. Each GPU needs to load different image-text pairs at ~500 samples/second (each sample is a 256 KB JPEG + metadata). The training data lives on a shared NFS server. After scaling from 32 to 256 GPUs, data loading becomes the bottleneck — GPUs sit idle waiting for data.
question: What caused the data loading bottleneck when scaling to 256 GPUs on a shared NFS server?
details:
  realistic_solution: 'At 256 GPUs × 500 samples/s = 128,000 IOPS of random small-file reads. NFS typically handles 10,000-50,000 metadata ops/s before the metadata server saturates. Solutions: (1) **WebDataset/TFRecord** — pack thousands of samples into large sequential tar/record files. Each GPU reads a contiguous shard sequentially (1 open + sequential read vs. 500 opens/s). (2) **Local SSD caching** — pre-stage data shards to each node''s NVMe SSD before training. (3) **Object storage with prefetching** — use S3-compatible storage with a multi-threaded prefetch pipeline that fills a local buffer 2-3 steps ahead. (4) **DALI GPU-accelerated pipeline** — decode JPEGs on the GPU, overlapping decode with the previous step''s compute.'
  common_mistake: |
    **The Pitfall:** "NFS bandwidth is the bottleneck — just add more NFS servers."
    **The Rationale:** Failing to distinguish between raw sequential read bandwidth and IOPS/metadata operation limits.
    **The Consequence:** Bandwidth may be sufficient, but NFS metadata operations (open/stat/read for millions of small files) are the real killer, as they are single-threaded on the server.
  napkin_math: |
    - 256 GPUs × 500 samples/s × 256 KB = 32 GB/s aggregate read bandwidth.
    - A good NFS server provides ~10 GB/s throughput — need 3-4 NFS servers just for bandwidth.
    - 256 GPUs × 500 samples/s = 128,000 file opens/s.
    - NFS metadata handles ~20,000 ops/s per server. Need 6-7 servers for metadata alone.
    - WebDataset fix: pack 1000 samples per tar shard (256 MB each).
    - 128,000 / 1000 = 128 shard reads/s, dropping metadata to 128 ops/s.
    - **Local NVMe SSDs provide 3.5 GB/s per node (112 GB/s aggregate for 32 nodes), offering 3.5× the required bandwidth without NFS metadata bottlenecks.**
