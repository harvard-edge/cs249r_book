title: The Quantization Noise Floor
scenario: You're quantizing a model to INT8 (256 levels). The weight distribution is approximately Gaussian with mean 0 and standard deviation 0.02.
question: What is the SQNR for INT8 quantization of Gaussian weights with σ=0.02, and when do additional quantization levels stop helping?
details:
  realistic_solution: For uniform quantization of a Gaussian signal, the SQNR depends on the number of quantization levels and how well the range covers the distribution. With $2^b$ levels covering $\pm 3\sigma$ (99.7% of values), the quantization step is $\Delta = 6\sigma / 2^b$. The quantization noise power is $\Delta^2 / 12$. SQNR = signal power / noise power.
  common_mistake: |
    **The Pitfall:** Believing more bits always linearly improves model quality.
    **The Rationale:** Candidates assume quantization noise is the only source of error in the system.
    **The Consequence:** Teams waste hardware resources upgrading to INT16 or FP16 when the INT8 quantization noise is already well below the system's ambient gradient/data noise floor.
  napkin_math: |
    1. **Signal Range:** $\pm 3\sigma = \pm 0.06$ (total width of 0.12).
    2. **Signal Power:** $\sigma^2 = 0.02^2 = 4 \times 10^{-4}$.
    3. **INT8 Noise Power:** $\Delta = 0.12 / 256 = 4.69 \times 10^{-4}$. Noise = $\Delta^2 / 12 = 1.83 \times 10^{-8}$.
    4. **INT8 SQNR:** $(4 \times 10^{-4}) / (1.83 \times 10^{-8}) = 21,858 \approx 43.4 \text{ dB}$.
    5. **INT4 Noise Power:** $\Delta = 0.12 / 16 = 7.5 \times 10^{-3}$. Noise = $\Delta^2 / 12 = 4.69 \times 10^{-6}$.
    6. **INT4 SQNR:** $(4 \times 10^{-4}) / (4.69 \times 10^{-6}) = 85 \approx 19.3 \text{ dB}$.
    7. **Result:** **Gradient noise is typically 20-30 dB, meaning INT8 is well above the noise floor and additional bits are wasted.**
