title: The Quantization Noise Floor
scenario: You're quantizing a model to INT8 (256 levels). The weight distribution is approximately Gaussian
  with mean 0 and standard deviation 0.02. Calculate the signal-to-quantization-noise ratio (SQNR) and
  explain at what point adding more quantization levels stops helping.
question: "What is the SQNR for INT8 quantization of Gaussian weights with σ=0.02, and when do additional quantization levels stop helping?"
details:
  realistic_solution: For uniform quantization of a Gaussian signal, the SQNR depends on the number of
    quantization levels and how well the range covers the distribution. With $2^b$ levels covering $\pm
    3\sigma$ (99.7% of values), the quantization step is $\Delta = 6\sigma / 2^b$. The quantization noise
    power is $\Delta^2 / 12$. SQNR = signal power / noise power.
  common_mistake: '"More bits always means better quality — go to INT16 if INT8 isn''t good enough." Beyond
    a certain point, quantization noise drops below other noise sources (gradient noise, data noise) and
    additional bits are wasted.'
  napkin_math: '$\sigma = 0.02$, range $= \pm 3\sigma = \pm 0.06$. INT8 (256 levels): $\Delta = 0.12 /
    256 = 4.69 \times 10^{-4}$. Noise power = $\Delta^2/12 = 1.83 \times 10^{-8}$. Signal power = $\sigma^2
    = 4 \times 10^{-4}$. SQNR = $4 \times 10^{-4} / 1.83 \times 10^{-8} = 21,858 \approx$ **43.4 dB**.
    INT4 (16 levels): $\Delta = 0.12/16 = 7.5 \times 10^{-3}$. SQNR = $4 \times 10^{-4} / (4.69 \times
    10^{-6}) = 85 \approx$ **19.3 dB**. Each additional bit adds ~6 dB. Gradient noise during training
    is typically 20–30 dB SQNR. So INT8 (43 dB) is well above the noise floor — additional bits are wasted.
    INT4 (19 dB) is below the gradient noise floor, explaining why INT4 training fails but INT4 inference
    (no gradients) can work with careful calibration.'
