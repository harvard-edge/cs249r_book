title: Diagnosing ONNX Runtime Graph Fragmentation
scenario: You are deploying a Transformer-based embedding model (150M parameters,
  FP16) on an AWS g4dn.xlarge instance (NVIDIA T4 GPU) using ONNX Runtime. After switching
  from the CPUExecutionProvider to the CUDAExecutionProvider, latency improves from
  120ms to 45ms, but GPU utilization remains low at 30%. Profiling traces reveal multiple
  fallback nodes executed on the CPU (e.g., NonZero, Gather), causing frequent Host-to-Device
  (H2D) and Device-to-Host (D2H) memory copies across the PCIe Gen3 bus during each
  forward pass.
question: How do you diagnose and resolve this performance bottleneck?
details:
  realistic_solution: The root cause is graph fragmentation, where unsupported operators
    or dynamic shapes force ONNX Runtime to split the graph between the CPU and GPU.
    The solution is to inspect the session creation logs for partition warnings, update
    the ONNX opset version during PyTorch export (e.g., to opset 15+), run ONNX shape
    inference, and apply constant folding to ensure the entire computational graph
    is supported by and assigned to the CUDA EP, eliminating PCIe transfer overhead.
  common_mistake: '**The Pitfall:** Assuming that configuring a GPU Execution Provider
    automatically guarantees the entirety of the model executes on the accelerator.

    **The Rationale:** Engineers often treat the hardware accelerator as a black-box
    flag, ignoring the underlying partitioner logic that silently delegates unsupported
    nodes back to the host CPU.

    **The Consequence:** PCIe bottlenecking absolutely wrecks inference throughput.
    The latency heavily underperforms baseline expectations because kernel fusions
    are broken and extreme H2D/D2H transfer penalties dominate.

    '
  napkin_math: '**Assumptions & Constraints:**

    - PCIe Gen3 x16 (~12 GB/s effective bandwidth).

    - 5 graph fragments yielding 10 PCIe transfers (5 H2D, 5 D2H) of 2MB each.


    **Calculations:**

    - PCIe Transfer Latency per tensor: 2MB / 12GB/s ≈ 0.16ms.

    - Total Transfer Overhead: 10 * 0.16ms = 1.6ms.

    - Synchronous Block: The 1.6ms math halts the GPU pipeline completely.


    **Conclusion & Interpretation:**

    - **Result: 45ms latency (I/O-Bound)**. Bottlenecked by synchronous PCIe transfer
    wait times blocking kernel execution.

    '
