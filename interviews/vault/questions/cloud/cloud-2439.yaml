title: Graph Neural Network Hardware Selection
scenario: You are architecting inference for a 50-layer GraphSAGE fraud detection model. You must choose
  between an A100 GPU (312 TFLOPS, 2.0 TB/s HBM) and a TPU v4 (275 TFLOPS, 1.2 TB/s HBM). The model requires
  100 TFLOPs per batch. A financial analyst recommends the TPU v4 because it costs 30% less per hour and
  has comparable TFLOPS, projecting identical latency.
question: "Which hardware should you choose for the GraphSAGE inference workload, A100 or TPU v4, and why?"
details:
  realistic_solution: Graph Neural Networks (GNNs) spend the majority of their time in the message-passing
    phase, which involves sparse scatter/gather memory access patterns over graph structures. This results
    in incredibly low arithmetic intensity (often 2-5 FLOPs/byte). Therefore, GNNs are strictly memory-bandwidth
    bound. Evaluating the hardware requires looking at the memory bandwidth, not the peak compute. The
    A100 provides 66% more memory bandwidth, meaning it will execute the GNN significantly faster, easily
    offsetting the 30% cost difference.
  common_mistake: Comparing hardware based on peak TFLOPS per dollar for a workload that will never reach
    peak TFLOPS due to extremely low arithmetic intensity.
  napkin_math: Assume GNN AI = 4 FLOPs/Byte. TPU v4 Attainable Compute = 1.2 TB/s * 4 FLOPs/Byte = 4.8
    TFLOPS (1.7% util). A100 Attainable Compute = 2.0 TB/s * 4 FLOPs/Byte = 8.0 TFLOPS (2.5% util). The
    A100 yields 8.0/4.8 = 1.66x the throughput of the TPU v4.
