title: Graph Neural Network Hardware Selection
scenario: You are architecting inference for a 50-layer GraphSAGE fraud detection model. You must choose between an A100 GPU and a TPU v4. The model requires 100 TFLOPs per batch. A financial analyst recommends the TPU v4 because it costs 30% less per hour and has comparable peak TFLOPS, projecting identical latency.
question: "Which hardware should you choose for the GraphSAGE inference workload, A100 or TPU v4, and why?"
details:
  realistic_solution: 'Graph Neural Networks (GNNs) spend the majority of their time in the message-passing phase, which involves sparse scatter/gather memory access patterns over graph structures. This results in incredibly low arithmetic intensity (often 2-5 FLOPs/byte). Therefore, GNNs are strictly memory-bandwidth bound. Evaluating the hardware requires looking at the memory bandwidth, not the peak compute. The A100 provides 66% more memory bandwidth, meaning it will execute the GNN significantly faster, easily offsetting the 30% cost difference.'
  common_mistake: |
    **The Pitfall:** Comparing hardware based on peak TFLOPS per dollar for a memory-bound workload.
    **The Rationale:** Candidates fail to identify that Graph Neural Networks have extremely low arithmetic intensity and will never reach peak compute.
    **The Consequence:** Selecting the TPU v4 to save 30% on paper, but ultimately spending more due to the 66% slower execution speed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GNN Arithmetic Intensity (AI) = 4 FLOPs/Byte.
       - TPU v4 Bandwidth = 1.2 TB/s. A100 Bandwidth = 2.0 TB/s.
    2. **Calculations:**
       - TPU v4 Attainable Compute = 1.2 TB/s * 4 FLOPs/Byte = 4.8 TFLOPS (1.7% util).
       - A100 Attainable Compute = 2.0 TB/s * 4 FLOPs/Byte = 8.0 TFLOPS (2.5% util).
       - Throughput ratio = 8.0 / 4.8 = 1.66x.
    3. **Conclusion & Interpretation:**
       - **Result: A100 yields 1.66x the throughput of the TPU v4.** (Memory-Bandwidth-Bound workload).
