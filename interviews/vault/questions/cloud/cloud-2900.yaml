title: Evaluate MobileNetV3 vs EfficientNet-B0 accuracy-latency tradeoff for A100
  batch serving
scenario: Your team must choose between MobileNetV3-Large (75.2% top-1, 0.22 GFLOPs)
  and EfficientNet-B0 (77.1% top-1, 0.39 GFLOPs) for a cloud inference API. Both will
  run on A100 SXM4 with TensorRT INT8 optimization. Requests come in batches of 64.
  Evaluate which model gives better cost per unit accuracy at your target SLA of 30
  ms p99.
question: 'Which model gives better cost per unit accuracy under a 30 ms p99 A100
  TensorRT INT8 SLA: MobileNetV3-Large or EfficientNet-B0?'
details:
  realistic_solution: 'Profile both with trtexec at INT8, batch=64. MobileNetV3-Large
    with H-swish (piecewise linear approximation) fuses well in TRT. EfficientNet-B0
    Swish (sigmoid × x) is slower in TRT INT8 unless approximated. Expected: MobileNetV3
    ~1.8ms/batch, EfficientNet-B0 ~2.9ms/batch at batch=64 INT8. Accuracy: EfficientNet-B0
    is 1.9pp better. Decision: if accuracy delta matters, EfficientNet-B0 still meets
    30ms SLA with headroom. Cost: MobileNetV3 allows ~1.6× more throughput per GPU
    → lower cost per query.'
  common_mistake: Choosing based on raw FLOP count without TensorRT INT8 profiling,
    since both models have different layer compositions (H-swish activations in MobileNetV3,
    Swish/SiLU in EfficientNet-B0) that affect TRT kernel fusion differently.
  napkin_math: 'INT8 A100: 624 TOPS. MobileNetV3-Large batch=64: 64×0.22G = 14.1 GOPS
    → 14.1G/624T = 0.023ms compute (plus overhead). EfficientNet-B0 batch=64: 64×0.39G
    = 25G GOPS → 0.04ms compute. Both are heavily compute-bound but kernel launch
    overhead dominates. At $3/A100-hr: MobileNetV3 throughput ~28,000 img/sec → $0.030/million
    queries. EfficientNet-B0 ~17,000 img/sec → $0.049/million queries. For 1.9pp accuracy,
    EfficientNet-B0 costs 1.63× more.'
