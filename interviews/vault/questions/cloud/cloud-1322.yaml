title: Local Gradient Clipping Divergence
scenario: You are debugging a custom PyTorch DDP training loop for a 13B parameter model on 64 A100 GPUs
  (8 nodes connected via 400Gbps InfiniBand). To mitigate a perceived communication bottleneck, a junior
  engineer modified the training step to apply gradient clipping (`max_norm=1.0`) locally on each GPU
  *before* triggering the `AllReduce` gradient synchronization. The model loss now diverges wildly after
  500 steps, whereas the exact same configuration converged smoothly on a single 8-GPU node. Diagnose
  the root cause of this divergence.
details:
  realistic_solution: 'Gradient clipping is a non-linear operation and does not commute with summation.
    Clipping locally distorts the global gradient direction because each GPU scales its gradients by a
    different factor. The fix is to synchronize correctly: AllReduce the local gradients first, compute
    the global gradient norm, and then clip the synchronized gradients globally on all ranks.'
  common_mistake: Candidates often misdiagnose the divergence as a learning rate scaling issue (e.g.,
    forgetting the linear scaling rule), precision mismatch (BF16 vs FP16), or InfiniBand network unreliability,
    failing to recognize that non-linear operations do not commute with distributed synchronization.
  napkin_math: Assume GPU 1 has g1=[10, 1] and GPU 2 has g2=[1, 1]. The true average is [5.5, 1] (ratio
    5.5:1). If clipped to norm 1.0 *before* averaging, g1 becomes ~[1.0, 0.1] and g2 becomes ~[0.71, 0.71].
    Their average is [0.85, 0.4] (ratio ~2.1:1). The gradient direction is fundamentally skewed, mathematically
    breaking the synchronization and causing divergence.
