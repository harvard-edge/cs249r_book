title: Batch vs Streaming Ingestion for CTR Models
scenario: Your team is architecting the data ingestion pipeline for an Ads CTR model training on an 8x GPU cluster. The frontend generates 50,000 events per second (2.5 KB per event, ~10.8 TB/day). The training loop consumes data at 2.5 GB/s.
question: Should the Ads CTR pipeline use continuous Kafka streaming or a scheduled 15-minute 1GB Parquet batch ingestion system, and why?
details:
  realistic_solution: 'Implement the batch ingestion system. Aggregating 2.5KB events into large 1GB Parquet files enables high-throughput sequential reads that can easily sustain the 2.5 GB/s required by the GPU training loop. This prevents expensive GPUs from idling on I/O while drastically reducing S3 PUT/GET API costs from billions of small-object requests to thousands of large-object reads. The 15-minute freshness lag is a mathematically worthwhile trade-off for system throughput.'
  common_mistake: |
    **The Pitfall:** Defaulting to continuous Kafka streaming to maximize "freshness".
    **The Rationale:** Engineers prioritize real-time ingestion latency over total system throughput, treating ML training like a standard microservice.
    **The Consequence:** Streaming tiny 2.5KB events severely limits read bandwidth to ~200 MB/s, starving the 2.5 GB/s GPU loop and inflating cloud API costs exponentially.
  napkin_math: |
    **Assumptions & Constraints:**
    - Events: 50,000/sec, 2.5 KB each.
    - GPU consumption rate: 2.5 GB/s.

    **Calculations:**
    - Streaming requests: 50,000 events/sec = 4.32 billion API requests/day.
    - Data velocity: 50,000 × 2.5 KB = 125 MB/s.
    - 15-minute batch size: 125 MB/s × 900 seconds ≈ 112.5 GB.

    **Conclusion & Interpretation:**
    - **Result: Batching sustains 2.5 GB/s GPU reads while saving billions of API calls (I/O-Bound)**.
