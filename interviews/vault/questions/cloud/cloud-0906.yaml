title: Batch vs Streaming Ingestion for CTR Models
scenario: Your team is architecting the data ingestion pipeline for an Ads CTR model training on an 8x
  A100 GPU cluster. The frontend generates 50,000 events per second (2.5 KB per event, ~10.8 TB/day).
  You must evaluate whether to use continuous streaming ingestion (Kafka directly to the training loop,
  <1s latency) or a scheduled batch ingestion system that aggregates events into 1 GB Parquet files in
  S3 every 15 minutes. The training loop consumes data at 2.5 GB/s. Evaluate the architectural trade-offs
  between storage API costs, I/O throughput, GPU utilization, and model data freshness.
details:
  realistic_solution: Implement the batch ingestion system. Aggregating 2.5KB events into large 1GB Parquet
    files enables high-throughput sequential reads that can easily sustain the 2.5 GB/s required by the
    GPU training loop. This prevents expensive A100 GPUs from idling on I/O while drastically reducing
    S3 PUT/GET API costs from billions of small-object requests to thousands of large-object reads. The
    15-minute freshness lag is a mathematically worthwhile trade-off for system throughput.
  common_mistake: Defaulting to real-time streaming to maximize model freshness, failing to realize that
    GPU training is fundamentally throughput-bound. Pushing small 2.5KB events via Kafka destroys read
    bandwidth (100-200 MB/s vs the 2.5 GB/s needed), starves the GPUs, and exponentially inflates cloud
    storage API costs.
  napkin_math: 'Streaming: 50,000 events/sec = 4.32 billion API requests/day. Small file random reads
    rarely exceed 100-200 MB/s total throughput, severely starving the 2.5 GB/s GPU demand. Batching:
    50,000 * 2.5 KB = 125 MB/s data velocity, yielding ~112 GB of data per 15-minute batch. Sequential
    reads of 1 GB Parquet files easily scale up to and beyond the 2.5 GB/s required, feeding the GPUs
    fully with millions of fewer API calls.'
