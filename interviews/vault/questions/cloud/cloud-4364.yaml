title: TPU v5e ICI Topology vs H100 NVLink for Data Parallelism
scenario: A 256-chip TPU v5e pod uses 2D torus ICI (16×16 grid) for data parallel
  training of a 3B model. Each chip has 1,600 Gbps ICI bandwidth. An equivalent H100
  cluster uses 32 8-GPU NVLink nodes connected via 400Gbps InfiniBand NDR. For a gradient
  AllReduce of 12GB (FP32 gradients for 3B model × 4 bytes), calculate the theoretical
  AllReduce time on both topologies using the ring-AllReduce algorithm.
question: Using ring AllReduce for a 12GB gradient on 256 accelerators, what are the
  theoretical times on TPU v5e ICI versus H100 over InfiniBand?
details:
  realistic_solution: 'Ring AllReduce time formula: T = 2 × (N-1)/N × M/B, where N
    = number of nodes, M = message size (12GB), B = effective bandwidth. TPU v5e 2D torus
    (256 chips): Ring around the 2D torus has effective bandwidth per chip = 100 GB/s (using 2 dimensions).
    T_tpu = 2 × (256-1)/256 × 12GB / 100GB/s ≈ 1.992 × 0.12s ≈ 0.239s. H100 InfiniBand
    (256 GPUs, 32 nodes × 8 GPUs): Inter-node InfiniBand: 400 Gbps = 50 GB/s.
    Ring AllReduce bottlenecked by inter-node bandwidth: T_h100 = 2 × (32-1)/32 × 12GB / 50GB/s ≈ 1.9375 × 0.24s ≈ 0.465s.
    (If treated as a 256-node flat ring, T_h100 = 2 × 0.996 × 12GB / 50GB/s ≈ 0.478s).
    TPU v5e is ~2× faster for gradient AllReduce at 256-chip scale due to ICI vs InfiniBand bandwidth advantage.'
  common_mistake: Using aggregate pod bandwidth instead of per-chip effective AllReduce
    bandwidth. In a ring AllReduce, each chip sends and receives through exactly 2
    neighbors — the ring topology limits effective bandwidth to the per-link bandwidth,
    not the total cross-sectional bandwidth.
  napkin_math: 'Gradient size: 3B × 4 bytes = 12GB. TPU v5e effective B = 100 GB/s.
    T = 2 × (256-1)/256 × 12GB / 100GB/s ≈ 1.99 × 0.12s ≈ 0.239s. 
    H100 InfiniBand NDR: 400 Gbps = 50 GB/s. 
    T = 2 × (256-1)/256 × 12GB / 50GB/s ≈ 1.99 × 0.24s ≈ 0.478s. 
    Ratio: H100/TPU = 2×.'
