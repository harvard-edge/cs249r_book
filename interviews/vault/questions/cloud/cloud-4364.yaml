title: TPU v5e ICI Topology vs H100 NVLink for Data Parallelism
scenario: A 256-chip TPU v5e pod uses 2D torus ICI (16×16 grid) for data parallel
  training of a 3B model. Each chip has 1,600 Gbps ICI bandwidth. An equivalent H100
  cluster uses 32 8-GPU NVLink nodes connected via 400Gbps InfiniBand HDR. For a gradient
  AllReduce of 24GB (FP32 gradients for 3B model × 4 bytes), calculate the theoretical
  AllReduce time on both topologies using the ring-AllReduce algorithm.
question: Using ring AllReduce for a 24GB gradient on 256 accelerators, what are the
  theoretical times on TPU v5e ICI versus H100 over InfiniBand?
details:
  realistic_solution: 'Ring AllReduce time formula: T = 2 × (N-1)/N × M/B, where N
    = number of nodes, M = message size, B = per-link bandwidth. TPU v5e 2D torus
    (256 chips): Ring around the 2D torus has ring length proportional to 2×(16+16)
    = 64 steps. For a 2D torus AllReduce (optimal all-reduce uses 2D decomposition):
    effective bandwidth per chip = ICI bandwidth / 2 = 800 Gbps = 100 GB/s (bidirectional
    ring uses both links). T_tpu = 2 × (256-1)/256 × 24GB / 100GB/s ≈ 2 × 0.996 ×
    0.24s ≈ 0.478s. H100 InfiniBand (256 GPUs, 32 nodes × 8 GPUs): Per-GPU NVLink
    bandwidth for intra-node: 900 GB/s. Inter-node InfiniBand: 400 Gbps = 50 GB/s.
    Ring AllReduce bottlenecked by inter-node bandwidth: T_h100 = 2 × (256-1)/256
    × 24GB / 50GB/s ≈ 0.995 × 0.96s ≈ 0.955s. TPU v5e is 2× faster for gradient AllReduce
    at 256-chip scale due to ICI vs InfiniBand bandwidth advantage.'
  common_mistake: Using aggregate pod bandwidth instead of per-chip effective AllReduce
    bandwidth. In a ring AllReduce, each chip sends and receives through exactly 2
    neighbors — the ring topology limits effective bandwidth to the per-link bandwidth,
    not the total cross-sectional bandwidth.
  napkin_math: 'Gradient size: 3B × 4 bytes = 12GB. AllReduce sends 2M bytes total
    (reduce-scatter + all-gather): 2 × 12GB = 24GB. TPU v5e ICI per-link: 1600 Gbps
    / 8 bits = 200 GB/s per link. Ring uses 2 links (bidirectional): effective = 200
    GB/s. T = 2 × (256-1)/256 × 12GB / 200GB/s = 1.99 × 0.06s = 0.119s. H100 InfiniBand
    HDR per port: 200 Gbps (HDR = 200Gbps) = 25 GB/s per GPU inter-node. T = 2 × 0.996
    × 12GB / 25GB/s = 1.99 × 0.48 = 0.955s. Ratio: H100/TPU = 8×. Note: actual HDR100
    = 100Gbps per port (HDR400 for NVIDIA flagship). Numbers above use 400Gbps as
    stated in scenario.'
