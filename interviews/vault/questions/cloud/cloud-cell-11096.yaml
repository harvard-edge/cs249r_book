title: 'Feature Store: Realize Feature Store Sizing for Production ML Platform'
scenario: 'Realize the complete feature store infrastructure for a production ML platform serving 10 model
  families (recommendation, fraud, ranking, NLP, etc.) on H100s. Combined: 500M users, 200 features per
  user per model family (2,000 total features), 1M catalog items. Serve 500K requests/second total. Specify
  every infrastructure component.'
details:
  realistic_solution: Federated feature store per model family with shared infrastructure for common features.
    Common user features (demographics, device type) in shared Redis. Model-specific features in per-model
    stores.
  common_mistake: Building one monolithic feature store for all use cases; not accounting for different
    latency, freshness, and access pattern requirements across model families.
  napkin_math: 'Common features (50 universal, 500M users): 500M × 50 × 4B = 100GB. Redis cluster: 300GB
    (3× overhead). Per-model features (150 features each, 10 models): 500M × 150 × 4B × 10 models = 300GB
    raw each model = 3TB total raw. Optimize: only store features for active users (last 30 days = 100M
    active): 100M × 150 × 4B × 10 = 600GB. With 3× Redis = 1.8TB. Redis cluster: 50 × 64GB nodes = 3.2TB
    capacity. Catalog items: 1M × (2000/10 per model avg features × 4B) = 800MB per model = 8GB total.
    Redis: 24GB for catalog. Total Redis: 3.2TB for users + 24GB catalog. At $3/hr per 64GB node: 50 nodes
    × $3 = $150/hr = $108K/month. Feature read bandwidth: 500K RPS × (50 common + 150 model) × 4B = 500K
    × 800B = 400 MB/s. 100Gbps NIC handles 12.5 GB/s >> 400 MB/s.'
