title: Cloud Warm Restart L2 0
scenario: 'During a 256-GPU training run, GPU #47 fails with a hardware error. Your colleague suggests
  cold-restarting the entire job from the latest checkpoint. Explain why warm restart is preferable and
  how it works.'
question: "Why is warm restart preferable to cold-restarting the 256-GPU job after GPU #47 fails, and how does it work?"
details:
  realistic_solution: 'A warm restart preserves the in-memory state (model weights, optimizer state, data
    loader position) on all 255 surviving workers and only replaces the failed node. The replacement node
    receives the latest state from a surviving peer. This avoids: (1) reloading the full checkpoint from
    storage (minutes), (2) reinitializing all 256 data loaders and shuffling states, (3) re-warming learning
    rate schedules or batch norm statistics. Cold restart: all 256 workers reload from disk → 5-15 min
    downtime. Warm restart: 1 replacement node syncs from peer → 30-60 seconds. At scale, failures happen
    hourly, so warm restart saves hours of wasted compute daily.'
  common_mistake: Assuming warm restart means no checkpoint is needed. You still checkpoint periodically
    for catastrophic failures (power loss, multi-node failure). Warm restart handles single-node failures
    between checkpoints.
  napkin_math: 'Cold restart: load 70B model checkpoint from NFS at 5 GB/s = 28s + 256 workers re-init
    = ~5 min total. Warm restart: 1 node receives state from peer over NVLink/network at 50 GB/s = 2.8s
    + rejoin = ~30s. Savings per failure: 4.5 min × $8.53/min (256 GPUs at $2/hr each) = ~$38.40.'
