title: Cloud Warm Restart L2 0
scenario: 'During a 256-GPU training run, GPU #47 fails with a hardware error. Your colleague suggests cold-restarting the entire job from the latest checkpoint.'
question: "Why is warm restart preferable to cold-restarting the 256-GPU job after GPU #47 fails, and how does it work?"
details:
  realistic_solution: 'A warm restart preserves the in-memory state (model weights, optimizer state, data loader position) on all 255 surviving workers and only replaces the failed node. The replacement node receives the latest state from a surviving peer. This avoids: (1) reloading the full checkpoint from storage (minutes), (2) reinitializing all 256 data loaders and shuffling states, (3) re-warming learning rate schedules or batch norm statistics. Cold restart: all 256 workers reload from disk → 5-15 min downtime. Warm restart: 1 replacement node syncs from peer → 30-60 seconds. At scale, failures happen hourly, so warm restart saves hours of wasted compute daily.'
  common_mistake: |
    **The Pitfall:** Assuming a warm restart eliminates the need for any checkpointing.
    **The Rationale:** Candidates confuse in-memory peer synchronization with permanent state persistence, forgetting that full cluster failures still require disk checkpoints.
    **The Consequence:** The team might disable regular checkpointing, resulting in catastrophic data loss during a multi-node failure or power outage.
  napkin_math: |
    1. Cold restart: Loading a 70B model checkpoint from NFS at 5 GB/s takes ~28s, plus ~5 minutes for 256 workers to re-initialize and sync.
    2. Warm restart: 1 replacement node receives state from a peer over the network at 50 GB/s (takes ~2.8s) and rejoins the cluster in ~30s.
    3. Time saved per failure: ~4.5 minutes.
    **With 256 GPUs costing $2/hr each, saving 4.5 minutes avoids wasting ~$38.40 of compute per failure.**
