title: Coreset Selection Pipeline for LLM Pre-training at Scale
scenario: You are pre-training a 30B LLM. To maximize the Information-Compute Ratio (ICR) within a 3T token compute budget, you score the perplexity of a raw 15T token corpus using a 2B reference model. You have 256 H100 GPUs.
question: How would you design the 15T-to-3T coreset scoring pipeline, identify its bottlenecks, and estimate scoring plus training time?
details:
  realistic_solution: Perplexity scoring is heavily compute-bound (a single forward pass over full sequences). The architecture should use an embarrassingly parallel worker pool, streaming the 15T tokens directly from object storage to GPU memory in large batches. No inter-GPU communication is needed.
  common_mistake: |
    **The Pitfall:** Assuming perplexity scoring is memory-bandwidth bound like autoregressive generation.
    **The Rationale:** Candidates fail to realize scoring is a prefill-only operation with massive arithmetic intensity.
    **The Consequence:** Designing an overly complex cross-node memory architecture when embarrassingly parallel streaming is optimal.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Scoring Compute: 2B params on 15T tokens (1 forward pass).
       - Training Compute: 30B params on 3T tokens.
       - Cluster: 256 H100s (989 TFLOPS FP16 peak).
       - MFU: 50% for scoring, 45% for training.
    2. **Calculations:**
       - Scoring FLOPs = 2 * 2e9 * 15e12 = 60,000 PFLOPs.
       - Training FLOPs = 6 * 30e9 * 3e12 = 540,000 PFLOPs.
       - Cluster Peak = 256 * 989e12 = 253.18 PFLOPS.
       - Scoring Time = 60,000 / (253.18 * 0.50) ≈ 473,971s (~5.48 days).
       - Training Time = 540,000 / (253.18 * 0.45) ≈ 4,739,711s (~54.85 days).
    3. **Conclusion & Interpretation:** **The 5.5-day perplexity scoring overhead yields a massive Information-Compute Ratio boost, completing the optimal pipeline in ~60.4 days total.**
