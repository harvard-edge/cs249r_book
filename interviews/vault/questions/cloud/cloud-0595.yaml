title: The CPU-GPU Data Transfer Tax
scenario: You're deploying a Llama 70B model for inference. The model weights are loaded into CPU RAM.
  Your server has PCIe 5.0 x16 connecting the CPU to an H100 GPU. A user sends the first request and waits
  45 seconds before getting any response. Subsequent requests take only 200ms. What happened during that
  first request, and how do you fix it?
question: "What happened during that first request, and how do you fix it?"
details:
  realistic_solution: The 70B model must be physically transferred from CPU DRAM to GPU HBM over the PCIe
    bus before any computation can begin. PCIe 5.0 x16 has a theoretical peak of 64 GB/s, but real-world
    sustained throughput is typically 50-55 GB/s due to protocol overhead and TLP (Transaction Layer Packet)
    framing. A 70B model in FP16 is ~140 GB. That transfer dominates the cold-start latency.
  common_mistake: '"The model needs to compile/warm up on the first request." JIT compilation adds seconds,
    not tens of seconds. The dominant cost is data movement.'
  napkin_math: 'Model size: 70B params × 2 bytes (FP16) = 140 GB. PCIe 5.0 x16 effective throughput: ~50
    GB/s. Transfer time: $140 / 50 = 2.8$ seconds. But wait — if you''re loading from disk (NVMe SSD at
    7 GB/s) to CPU RAM first: $140 / 7 = 20$ seconds for disk-to-RAM, then 2.8 seconds for RAM-to-GPU.
    Total cold start: ~23 seconds. Fix: pre-load the model into GPU memory at server startup, use model
    sharding across multiple GPUs to parallelize the transfer, or use memory-mapped loading with `torch.load(mmap=True)`.'
