title: Computing Cohen's Kappa
scenario: 'Three annotators label 500 samples as Positive/Negative. Annotator pair (A,B) agrees on 400/500.
  Class distribution: 350 Positive, 150 Negative. A labels 360 Pos, B labels 340 Pos. Compute Cohen''s
  Kappa for pair (A,B).'
details:
  realistic_solution: 'Observed agreement P_o = 400/500 = 0.80. Expected agreement P_e: P(both say Pos)
    = (360/500) × (340/500) = 0.72 × 0.68 = 0.4896. P(both say Neg) = (140/500) × (160/500) = 0.28 × 0.32
    = 0.0896. P_e = 0.4896 + 0.0896 = 0.5792. κ = (P_o - P_e) / (1 - P_e) = (0.80 - 0.5792) / (1 - 0.5792)
    = 0.2208 / 0.4208 = 0.525. κ = 0.525 indicates moderate agreement. This is significantly worse than
    the 80% raw agreement suggests. The team should investigate disagreement patterns — are they systematic
    (one annotator consistently stricter) or random (ambiguous edge cases)?'
  common_mistake: Using the overall class distribution instead of each annotator's marginal distribution
    to compute expected agreement.
  napkin_math: P_o = 0.80. P_e = (0.72×0.68) + (0.28×0.32) = 0.49 + 0.09 = 0.58. κ = (0.80-0.58)/(1-0.58)
    = 0.22/0.42 = 0.52.
