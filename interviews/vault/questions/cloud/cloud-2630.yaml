title: Computing Cohen's Kappa
scenario: Three annotators label 500 samples as Positive/Negative. Annotator pair (A,B) agrees on 400/500. Class distribution: 350 Positive, 150 Negative. A labels 360 Pos, B labels 340 Pos.
question: What is Cohen's Kappa for annotator pair A,B given 400/500 agreement and their Positive/Negative marginals?
details:
  realistic_solution: 'Observed agreement P_o = 400/500 = 0.80. Expected agreement P_e: P(both say Pos) = (360/500) × (340/500) = 0.72 × 0.68 = 0.4896. P(both say Neg) = (140/500) × (160/500) = 0.28 × 0.32 = 0.0896. P_e = 0.4896 + 0.0896 = 0.5792. κ = (P_o - P_e) / (1 - P_e) = (0.80 - 0.5792) / (1 - 0.5792) = 0.2208 / 0.4208 = 0.525. κ = 0.525 indicates moderate agreement. This is significantly worse than the 80% raw agreement suggests. The team should investigate disagreement patterns — are they systematic (one annotator consistently stricter) or random (ambiguous edge cases)?'
  common_mistake: |
    **The Pitfall:** Using the raw 80% agreement as a metric of quality, or calculating expected agreement from the global dataset distribution rather than individual annotator marginals.
    **The Rationale:** It's counterintuitive that 80% raw agreement yields a mediocre Cohen's Kappa of ~0.52. Candidates forget that high class imbalance naturally inflates random agreement.
    **The Consequence:** The team ships a model trained on noisy, ambiguous data, overestimating ground-truth quality.
  napkin_math: |
    1. **Observed Agreement:** P_o = 400/500 = 0.80.
    2. **Expected Positive Agreement:** P(both say Pos) = (360/500) × (340/500) = 0.72 × 0.68 = 0.4896.
    3. **Expected Negative Agreement:** P(both say Neg) = (140/500) × (160/500) = 0.28 × 0.32 = 0.0896.
    4. **Total Expected Agreement:** P_e = 0.4896 + 0.0896 = 0.5792.
    5. **Cohen's Kappa:** κ = (P_o - P_e) / (1 - P_e) = (0.80 - 0.5792) / (1 - 0.5792) = 0.2208 / 0.4208 = **0.525**.
