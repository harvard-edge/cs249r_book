title: Dataflow Compiler Thrashing on Dynamic Shapes
scenario: You migrate a speech-to-text Transformer model from NVIDIA A100s to a Groq-like static dataflow
  accelerator. On the A100, p99 latency is 45ms. On the new dataflow architecture, despite having 10x
  the SRAM and no HBM bottleneck, the p99 latency spikes to 850ms. Tracing shows the hardware is idle
  90% of the time between requests.
details:
  realistic_solution: The symptom (massive latency spikes and idle hardware on a static dataflow chip)
    is caused by dynamic input shapes (variable audio sequence lengths). Static dataflow architectures
    (like Groq) rely on a deterministic compiler that schedules every instruction, memory fetch, and network
    route at compile time. They do not have dynamic instruction schedulers or hardware control flow like
    GPUs. When a request arrives with a novel sequence length, the runtime must either trigger a Just-In-Time
    (JIT) recompilation of the entire dataflow graph (taking hundreds of milliseconds) or pad the sequence
    to a massive pre-compiled maximum length, wasting cycles. The algorithm-compiler co-design solution
    is to implement 'bucketization'—compiling the model for 3-4 fixed sequence lengths (e.g., 128, 512,
    2048) at deployment time, and padding incoming requests to the nearest bucket, entirely avoiding JIT
    recompilation.
  common_mistake: Assuming the dataflow architecture lacks the raw FLOPS to process the model, or that
    memory bandwidth is the issue.
  napkin_math: Audio lengths vary from 10 to 3000 tokens. GPU processes dynamic loops natively. Dataflow
    chip must JIT compile. JIT compilation of a 100-layer Transformer dataflow graph takes ~800ms. If
    bucketized to length 3000, compute time for 3000 tokens = 3000 * 1M FLOPs / 989 TFLOPS = 3us (0.003ms).
    By paying a 3us compute penalty for padding, we eliminate the 800ms compilation penalty. 850ms (JIT)
    vs <1ms (padded static execution).
  options:
  - Cloud is always cheaper than on-prem because cloud providers benefit from economies of scale; the
    hardware cost savings alone make cloud 3-5× cheaper regardless of utilization patterns
  - On-prem is always cheaper because you own the hardware; cloud pricing includes >200% markup over hardware
    cost, making it impossible for cloud to be cost-competitive at any scale
  - 'TCO (Total Cost of Ownership) comparison for a 3-year 1,000-GPU cluster: On-prem: $15M hardware (GPUs
    + networking + storage) + $3M/year power (1 MW × $0.10/kWh × 8,760) + $2M/year cooling + $1M/year
    ops staff = $15M + $18M = $33M. Cloud (on-demand): 1,000 × $2/GPU-hr × 8,760 × 3 = $52.6M. Cloud (3-year
    reserved): ~$26.3M (50% discount). Break-even: on-prem wins if utilization >60% (3-year). Cloud wins
    for burst or variable workloads.'
  - TCO analysis is unnecessary because the choice between cloud and on-prem depends solely on data privacy
    regulations; cost is a secondary consideration for ML training infrastructure
