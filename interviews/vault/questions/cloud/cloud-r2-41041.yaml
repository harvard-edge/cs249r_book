title: Fragmentation-Aware Scheduling Policy
scenario: 'Your 10-node MI300X cluster (8 GPUs each, 80 total) currently has the following allocation:
  6 nodes have 2-4 GPUs free each, totaling 22 free GPUs. A 16-GPU training job arrives but cannot be
  scheduled because no contiguous block of 16 GPUs exists (the job needs 2 full nodes). This is the ''GPU
  fragmentation problem.'' Propose a scheduling policy to prevent this.'
details:
  realistic_solution: 'Prevention strategies (cannot cure fragmentation, must prevent it): (1) Reservation-based
    scheduling: when a large job is queued, the scheduler begins draining target nodes by not scheduling
    new small jobs on them. As existing jobs complete, GPUs free up contiguously. The large job starts
    when 2 nodes are fully free. Drain time = max remaining wall time of small jobs on the 2 least-loaded
    nodes. (2) Defrag-aware placement: always pack small jobs onto the fewest possible nodes (best-fit
    bin packing). When 6 × 1-GPU jobs arrive, place all 6 on one node instead of spreading across 6 nodes.
    This keeps other nodes fully free for large jobs. (3) Tiered node pools: designate 3 nodes for small
    jobs (≤4 GPUs) and 7 nodes for large jobs (>4 GPUs). Small jobs never fragment the large-job pool.
    Tradeoff: may have idle GPUs in the large-job pool when no large jobs are queued — mitigate with borrowing.
    (4) Compaction jobs: when fragmentation exceeds a threshold, checkpoint and restart small jobs, repacking
    them onto fewer nodes. Cost: ~2-5 minutes of downtime per affected job.'
  common_mistake: Defragmenting by live-migrating GPU processes between nodes. GPU workloads cannot be
    live-migrated — the CUDA context is bound to a specific GPU's physical memory.
  napkin_math: '22 free GPUs across 6 nodes: none has 8 free. Pack small jobs: 22 free GPUs could concentrate
    on 3 nodes (2 fully free + 1 with 6 free). Now the 16-GPU job fits on 2 free nodes.'
