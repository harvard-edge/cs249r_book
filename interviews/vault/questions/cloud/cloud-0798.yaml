title: The LLM Evaluation Trap
scenario: You are responsible for evaluating a new LLM before production deployment. The new model scores 5% higher on MMLU than your current production model.
question: Why might this evaluation be dangerously misleading, and how could deploying the better model destroy serving economics?
details:
  realistic_solution: 'Standard benchmarks measure intelligence in a vacuum, ignoring the physical constraints of the serving cluster. A model might score 5% higher on MMLU but require a different architectural trade-off that wrecks your infrastructure. For example, the new model might achieve its score by using a larger vocabulary, removing Grouped Query Attention (GQA) in favor of Multi-Head Attention (MHA) which inflates the KV-cache by 8x, or simply being more verbose. A production evaluation framework must use latency-aware and memory-aware scoring: measuring not just accuracy, but TTFT, TPOT, and peak VRAM per request.'
  common_mistake: |
    **The Pitfall:** Conflating academic evaluation scores with production readiness.
    **The Rationale:** Candidates believe "better benchmarks mean a better model," ignoring the physical hardware costs required to serve the specific architecture.
    **The Consequence:** The infrastructure team is forced to massively scale GPU capacity to maintain SLAs, destroying the unit economics of the product.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current model: Grouped Query Attention (GQA). KV-cache = ~300MB/req.
       - New model: Multi-Head Attention (MHA). KV-cache = ~2.4GB/req.
    2. **Calculations:**
       - Current batch size limit: ~40 requests.
       - New batch size limit: ~5 requests.
       - Required cluster scale to maintain QPS = 40 / 5 = 8x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** A 5% MMLU bump could inflate the monthly compute bill by 800%.
