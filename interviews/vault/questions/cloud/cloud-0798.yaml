title: The LLM Evaluation Trap
scenario: You are responsible for evaluating a new LLM before production deployment. The new model scores 5% higher on MMLU than your current production model.
question: Why might this evaluation be dangerously misleading, and how could deploying the better model destroy serving economics?
details:
  realistic_solution: Standard benchmarks measure intelligence in a vacuum, ignoring the physical constraints of the serving cluster. A model might score 5% higher on MMLU but require a different architectural trade-off that wrecks your infrastructure. For example, the new model might achieve its score by using a larger vocabulary (increasing embedding table memory), removing Grouped Query Attention (GQA) in favor of Multi-Head Attention (MHA) which inflates the KV-cache by 8×, or simply being more verbose (generating 3× more tokens per response). A production evaluation framework must use latency-aware and memory-aware scoring: measuring not just accuracy, but TTFT, TPOT, and peak VRAM per request.
  common_mistake: |
    **The Pitfall:** Conflating academic evaluation scores with production readiness.
    **The Rationale:** Candidates believe "better benchmarks mean a better model," ignoring the physical hardware costs required to serve the specific architecture.
    **The Consequence:** The infrastructure team is forced to massively scale GPU capacity to maintain SLAs, destroying the unit economics of the product.
  napkin_math: |
    1. Current model (with GQA): KV-cache for 2K tokens = ~300MB. Can batch ~40 requests.
    2. New model (with MHA): KV-cache for 2K tokens = ~2.4GB. Can batch only ~5 requests before OOMing.
    3. To maintain the same QPS, the GPU cluster must scale by 8x.
    **A 5% MMLU bump could inflate the monthly compute bill by 800%.**
