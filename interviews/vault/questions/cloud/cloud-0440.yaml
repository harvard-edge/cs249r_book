title: The Vision Transformer Resolution Trap
scenario: You are a Staff ML Systems Engineer at a cloud provider. A customer is migrating
  their image classification service from a standard CNN (ResNet-50) to a Vision Transformer
  (ViT-Base). Both models initially meet the 10ms latency budget on an H100 GPU using
  224x224 resolution images. To improve accuracy, they increase the input resolution
  to 448x448. The ResNet-50 latency increases to ~3ms, still well within budget. However,
  the ViT's latency explodes to over 20ms. The data loading pipeline has been optimized
  and is not the bottleneck. Using your knowledge of model architecture, diagnose
  the most likely cause of this disproportionate latency increase for the Vision Transformer.
question: Why does doubling image resolution to 448x448 make ViT-Base exceed 20ms
  while ResNet-50 stays within the 10ms budget?
details:
  realistic_solution: The root cause is the difference in computational scaling between
    CNNs and Transformers. A CNN's computation scales linearly with the number of
    pixels (O(H*W)). Doubling the image height and width results in a 4x increase
    in pixels, and thus a ~4x increase in FLOPs. A Vision Transformer's self-attention
    mechanism, however, scales quadratically with the number of input patches (O(N^2)).
    Doubling the image resolution quadruples the number of patches (N), leading to
    a 16x (4^2) increase in the FLOPs required for the attention layers. This quadratic
    explosion in compute is the reason for the severe latency degradation.
  common_mistake: Engineers often assume that if two models have similar FLOPs at
    one resolution, they will scale similarly. They forget that the computational
    complexity function itself is different. They might blame memory bandwidth or
    other system factors, when the root cause is the algorithm's scaling law (e.g.,
    linear vs. quadratic).
  napkin_math: '- CNN (ResNet-50) scaling with resolution:
    - FLOPs scale as O(H × W) — linear in pixel count.
    - 224->448: pixel count increases 4x.
    - Expected latency: ~1 ms × 4 = ~4 ms (observed: ~3 ms)
  - ViT-Base scaling with resolution:
    - Patch size: 16×16
    - Patches at 224×224: (224/16)² = 196 patches
    - Patches at 448×448: (448/16)² = 784 patches
    - Patch count increase: 4x
    - Self-attention FLOPs scale as O(N²):
    - Attention cost ratio: 4² = 16x.
    - Root cause: CNN FLOPs grow linearly with pixels (4x), but ViT attention grows quadratically with patch count (16x).'
  options:
  - The 448x448 feature maps created by the ViT overwhelmed the HBM3 memory bandwidth.
  - The KV Cache required for the 4x longer sequence length exceeded the GPU's SRAM
    capacity, causing constant spills to HBM.
  - The ViT's self-attention compute scales quadratically with the number of patches,
    which quadrupled, leading to a ~16x increase in FLOPs.
  - The GPU's kernel dispatch overhead became the bottleneck due to the larger number
    of smaller operations in the ViT architecture at high resolution.
  correct_index: 2
