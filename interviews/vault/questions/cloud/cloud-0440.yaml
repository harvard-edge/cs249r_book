title: The Vision Transformer Resolution Trap
scenario: 'You are a Staff ML Systems Engineer at a cloud provider. A customer is migrating their image classification service from a standard CNN (ResNet-50) to a Vision Transformer (ViT-Base). Both models initially meet the 10ms latency budget on an H100 GPU using 224x224 resolution images. To improve accuracy, they increase the input resolution to 448x448. The ResNet-50 latency increases to ~3ms, still well within budget. However, the ViT''s latency explodes to over 20ms. The data loading pipeline has been optimized and is not the bottleneck.'
question: 'Why does doubling image resolution to 448x448 make ViT-Base exceed 20ms while ResNet-50 stays within the 10ms budget?'
details:
  realistic_solution: 'The root cause is the difference in computational scaling between CNNs and Transformers. A CNN''s computation scales linearly with the number of pixels (O(H*W)). Doubling the image height and width results in a 4x increase in pixels, and thus a ~4x increase in FLOPs. A Vision Transformer''s self-attention mechanism, however, scales quadratically with the number of input patches (O(N^2)). Doubling the image resolution quadruples the number of patches (N), leading to a 16x (4^2) increase in the FLOPs required for the attention layers. This quadratic explosion in compute is the reason for the severe latency degradation.'
  common_mistake: |
    **The Pitfall:** Assuming two models with similar initial FLOPs will scale similarly with resolution.
    **The Rationale:** Candidates forget that the computational complexity functions differ fundamentally (linear vs quadratic).
    **The Consequence:** Blaming memory bandwidth or hardware drivers for latency degradation that is actually rooted in the algorithm's scaling law.
  napkin_math: |
    - **CNN Scaling (Linear):** FLOPs scale as O(H × W). 224->448 increases pixel count 4x. Expected latency = ~1 ms × 4 = ~4 ms.
    - **ViT Scaling (Quadratic):** Self-attention FLOPs scale as O(N²), where N is patch count.
    - **Patch Count:** At 224x224 (16x16 patches) = (224/16)² = 196. At 448x448 = (448/16)² = 784 (4x increase).
    - **Self-Attention Cost:** (4x)² = **16x increase in FLOPs**.
    - **Result:** ViT latency explodes because self-attention grows quadratically with patch count, unlike CNNs.
  options:
  - The 448x448 feature maps created by the ViT overwhelmed the HBM3 memory bandwidth.
  - The KV Cache required for the 4x longer sequence length exceeded the GPU's SRAM capacity, causing constant spills to HBM.
  - The ViT's self-attention compute scales quadratically with the number of patches, which quadrupled, leading to a ~16x increase in FLOPs.
  - The GPU's kernel dispatch overhead became the bottleneck due to the larger number of smaller operations in the ViT architecture at high resolution.
  correct_index: 2
