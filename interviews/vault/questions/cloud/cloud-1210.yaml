title: Diagnosing Cross-Region Training Energy Spikes
scenario: Your team runs a continuous training pipeline for a CTR model. The system ingests 50TB of raw logs daily in Region A, transfers them to Region B for preprocessing, and finally to Region C for training on a 64-GPU A100 cluster. A junior engineer proposes upgrading to H100 GPUs and utilizing FP8 precision to cut the energy footprint in half.
question: What is the true energy bottleneck in the 50TB/day CTR pipeline, and why won't upgrading to H100s with FP8 fix it?
details:
  realistic_solution: 'Diagnose that wide-area network (WAN) data movement is the primary energy bottleneck due to the Energy-Movement Invariant. The architectural fix is data gravity: co-locate data ingestion, preprocessing, and training within a single region (moving the compute to the data) rather than transferring 50TB daily.'
  common_mistake: |
    **The Pitfall:** Focusing solely on compute efficiency (FLOPs/watt) or precision scaling.
    **The Rationale:** Candidates see energy problems and immediately jump to hardware upgrades.
    **The Consequence:** They ignore the macroscopic energy and latency costs of moving massive datasets across geographical boundaries, leaving the main bottleneck unaddressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64-GPU A100 cluster (~25kW) runs 24h/day.
    - 50 TB/day data transfer over WAN.
    - Embodied network energy: ~0.05 to 0.1 kWh per GB.

    **Calculations:**
    - GPU energy per day: 25 kW * 24 h = 600 kWh.
    - WAN transfer energy: 50,000 GB * 0.05 kWh/GB = 2,500 kWh.
    - Upgrading to H100s might save ~50% of compute energy (300 kWh savings).
    - Moving data uses 4.1x to 8.3x more energy than computing.

    **Conclusion & Interpretation:**
    - **Result: WAN transfer dominates at 2,500 kWh/day (Network-Energy-Bound)**. Requiring data gravity rather than faster GPUs.
