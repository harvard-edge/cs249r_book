title: The Canary Memory Footprint
scenario: You are an ML Systems Engineer responsible for a cloud-based route-planning service for autonomous
  vehicles. The current service uses a 7-billion parameter model running in FP16 precision. You are planning
  a canary rollout of a new, much larger 70-billion parameter model, also in FP16. Your deployment pods
  are configured with a single H100 GPU. Explain the memory implications of this upgrade. Specifically,
  calculate the inference memory required for the new 70B model and contrast it with the available HBM
  on the GPU.
details:
  realistic_solution: The new 70B model's memory requirement exceeds the capacity of a single H100 GPU,
    forcing a change in the serving architecture.
  common_mistake: Engineers often calculate the memory requirement (140 GB) in isolation but fail to connect
    it to the physical hardware constraints (an H100 has 80 GB HBM). They might assume this is a simple
    software problem solved by increasing a Kubernetes memory request, without realizing that a model
    of this size cannot be served on a single GPU and requires re-architecting the deployment for multi-GPU
    inference (e.g., with tensor parallelism).
  napkin_math: 1. **Calculate Required Memory:**
  options:
  - The model requires 70 GB, so it will fit on the 80 GB H100.
  - The model requires 140 GB; you just need to update the pod's memory request in Kubernetes.
  - The model requires 140 GB, which exceeds the H100's 80 GB. A multi-GPU strategy is now required.
  - The model requires over 1.1 TB to store optimizer states, making it impossible to serve.
  correct_index: 2
