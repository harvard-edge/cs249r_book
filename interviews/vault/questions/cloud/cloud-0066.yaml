title: The Canary Memory Footprint
scenario: You are an ML Systems Engineer responsible for a cloud-based route-planning service. The current service uses a 7-billion parameter model running in FP16 precision. You are planning a canary rollout of a new 70-billion parameter model, also in FP16. Your deployment pods are configured with a single H100 GPU.
question: How much inference memory does the 70B FP16 model need, and can it fit on a single H100 GPU?
details:
  realistic_solution: The new 70B model's memory requirement is 140 GB (70B parameters * 2 bytes for FP16). This significantly exceeds the 80 GB capacity of a single H100 GPU, forcing a change in the serving architecture to use multi-GPU inference (e.g., tensor parallelism).
  common_mistake: |
    **The Pitfall:** Treating memory requirements as a simple software configuration issue (like a Kubernetes memory request) without checking physical hardware limits.
    **The Rationale:** Engineers accustomed to CPU microservices assume memory can just be requested via configuration, missing that GPU HBM is a strict physical boundary.
    **The Consequence:** The pod repeatedly CrashLoopBackOffs with OutOfMemory (OOM) errors, and the rollout fails because a multi-GPU serving architecture (like tensor parallelism) was not planned.
  napkin_math: |
    1. **Calculate Required Memory:** 70 billion parameters * 2 bytes/parameter (FP16) = 140 GB.
    2. **Compare to Hardware:** 140 GB > 80 GB (capacity of a single H100).
    3. **Conclusion:** **The model requires 140 GB, so it does not fit on a single H100 GPU.**
  options:
  - The model requires 70 GB, so it will fit on the 80 GB H100.
  - The model requires 140 GB; you just need to update the pod's memory request in Kubernetes.
  - The model requires 140 GB, which exceeds the H100's 80 GB. A multi-GPU strategy is now required.
  - The model requires over 1.1 TB to store optimizer states, making it impossible to serve.
  correct_index: 2
