title: Cloud Fully Sharded Data Parallel L2 0
scenario: You are explaining FSDP to a team that has only used PyTorch's DataParallel. Describe how FSDP
  differs from standard DP and DDP, and why it enables training larger models.
details:
  realistic_solution: Standard DataParallel (DP) replicates the full model on every GPU — each GPU holds
    all parameters, gradients, and optimizer states. DDP improves communication with bucketed AllReduce
    but still replicates everything. FSDP shards parameters, gradients, and optimizer states across GPUs
    (like ZeRO-3). Before each layer's forward pass, FSDP performs an all-gather to reconstruct that layer's
    parameters. After backward, it reduces and reshards gradients. At rest, each GPU holds only 1/N of
    the model. This trades communication (all-gather per layer) for memory, enabling models N× larger
    than single-GPU memory allows.
  common_mistake: Confusing FSDP with model parallelism. FSDP is still data parallelism — every GPU processes
    different data batches. The sharding is of redundant state (parameters are needed by all GPUs but
    stored on only one at rest), not partitioning the model graph.
  napkin_math: '13B model with AdamW: 16 bytes/param = 208 GB total. DP/DDP on 8 GPUs: 208 GB each — doesn''t
    fit 80 GB. FSDP on 8 GPUs: 208/8 = 26 GB each — fits easily with room for activations. Memory savings:
    8x.'
