title: Cloud Fully Sharded Data Parallel L2 0
scenario: You are explaining FSDP to a team that has only used PyTorch's DataParallel.
question: How does FSDP differ from PyTorch DataParallel and DDP, and why does it enable training larger models?
details:
  realistic_solution: Standard DataParallel (DP) replicates the full model on every GPU — each GPU holds all parameters, gradients, and optimizer states. DDP improves communication with bucketed AllReduce but still replicates everything. FSDP shards parameters, gradients, and optimizer states across GPUs (like ZeRO-3). Before each layer's forward pass, FSDP performs an all-gather to reconstruct that layer's parameters. After backward, it reduces and reshards gradients. At rest, each GPU holds only 1/N of the model. This trades communication (all-gather per layer) for memory, enabling models N× larger than single-GPU memory allows.
  common_mistake: |
    **The Pitfall:** Confusing FSDP with Pipeline or Tensor Model Parallelism.
    
    **The Rationale:** Because FSDP splits up the model parameters, engineers frequently assume it fundamentally partitions the model execution graph across nodes rather than simply distributing the storage of redundant state.
    
    **The Consequence:** Misunderstanding FSDP leads to incorrect assumptions about batch processing, activation memory footprints, and network communication bottlenecks, resulting in poorly configured training runs.
  napkin_math: |
    - **Baseline Requirements**: 13B model with AdamW requires 16 bytes/param = 208 GB total memory.
    - **Standard DP/DDP**: 8 GPUs require 208 GB each — which does not fit in an 80 GB VRAM limit.
    - **FSDP Sharding**: FSDP on 8 GPUs reduces static footprint to 208 GB / 8 = **26 GB each**.
    - **Result**: FSDP effortlessly fits the model with ample room for activations, yielding an **8x memory savings** at rest.
