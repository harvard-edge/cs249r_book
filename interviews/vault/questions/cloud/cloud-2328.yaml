title: Activation-Aware Weight Quantization (AWQ)
scenario: Deploying a 70B model on 2x 24GB GPUs requires W4A16 (INT4 weight, FP16 activation) quantization. Standard Round-to-Nearest (RTN) INT4 degrades zero-shot accuracy by 15%. Applying AWQ restores accuracy to within 1% of the FP16 baseline without changing the 4-bit data type or the inference kernel.
question: Why does AWQ recover zero-shot accuracy after RTN INT4 fails, without changing the 4-bit data type or inference kernel?
details:
  realistic_solution: |
    Standard RTN quantization treats all weights equally, but only ~1% of weights are 'salient'—meaning they correspond to activation channels that have massive outlier magnitudes. Quantization errors on these specific weights are amplified by the massive activations, destroying the output. AWQ identifies these salient weight channels by profiling the activations. Before quantizing, it scales up the salient weights by a factor S, and scales down the corresponding incoming activations by 1/S (preserving mathematical equivalence). Because the salient weights are now larger relative to the quantization bins, the relative quantization error is drastically reduced. The weights are then statically quantized to INT4.
  common_mistake: |
    **The Pitfall:** Assuming AWQ dynamically casts the 4-bit weights back to 16-bit during inference based on activation sparsity.
    **The Rationale:** Candidates misunderstand the "activation-aware" part, thinking it modifies the runtime execution rather than the static offline quantization process.
    **The Consequence:** Proposing complex hardware or kernel changes instead of recognizing AWQ as an offline scaling technique.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Salient weight w = 0.02, and quantization step size delta = 0.05.
    2. **Calculations:**
       - Standard INT4 RTN: quantized w = round(0.02 / 0.05) × 0.05 = 0 (100% error).
       - AWQ scales the salient weight up by a factor S (e.g., S=4) and scales the corresponding activation down by 1/S.
       - Scaled weight: 0.02 × 4 = 0.08.
       - AWQ INT4 RTN: quantized w = round(0.08 / 0.05) × 0.05 = 0.1.
       - Effective weight after implicit descaling (via the activation): 0.1 / 4 = 0.025.
    3. **Conclusion & Interpretation:**
       - **The relative quantization error is reduced from 100% (0 vs 0.02) to 25% (0.025 vs 0.02) for the salient weight.**
       - **Result: Accuracy-Bound**
