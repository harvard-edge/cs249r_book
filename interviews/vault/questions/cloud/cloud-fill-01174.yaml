title: Kubernetes Orchestration for LLM Training with AMD MI300X
scenario: You are tasked with designing a Kubernetes-based ML training platform optimized for large language
  models (LLMs) using a cluster primarily composed of nodes each equipped with multiple AMD MI300X GPUs.
  Each MI300X provides 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth.
  The platform must efficiently schedule and manage diverse training workloads, ranging from fine-tuning
  smaller 7B parameter models to pre-training massive 100B+ parameter models. Propose a Kubernetes architecture
  and configuration strategy that addresses GPU device plugin integration, intelligent node affinity for
  specialized jobs (e.g., memory-bound vs. compute-bound), and an advanced job scheduling mechanism to
  ensure high throughput, optimal resource utilization, and fair sharing among multiple research teams,
  while minimizing GPU fragmentation.
question: "How would you build a Kubernetes training platform for MI300X LLM workloads with ROCm devices, topology-aware affinity, fair scheduling, and low fragmentation?"
details:
  realistic_solution: A robust solution would involve leveraging custom Kubernetes schedulers or extensions
    (e.g., Volcano, Kueue) alongside standard GPU device plugins (like AMD's ROCm device plugin) to expose
    detailed GPU metrics and capabilities. Implement node labeling and taints/tolerations or node affinity
    rules based on node hardware (e.g., number of MI300X, HBM capacity, network topology) and workload
    requirements. For job scheduling, a multi-queue system with priority, preemption, and resource quotas
    should be established. Implement gang scheduling for distributed training jobs to prevent deadlocks
    and ensure all required resources are available simultaneously. Consider dynamic GPU allocation strategies
    and techniques like MIG (Multi-Instance GPU, if a similar feature becomes available for AMD GPUs)
    or partitioning at the software level to optimize resource sharing and reduce fragmentation.
  common_mistake: A common mistake is treating all GPUs uniformly without considering their specific characteristics
    (e.g., HBM capacity, interconnect topology) or the varying demands of different ML workloads. This
    leads to inefficient scheduling, poor resource utilization, and potential GPU memory exhaustion or
    underutilization, especially for models with specific memory bandwidth or capacity requirements, like
    large LLMs on the AMD MI300X.
  napkin_math: Consider a 100B parameter LLM requiring 2 bytes/parameter for FP16, resulting in 200 GB
    model size. An AMD MI300X has 192 GB HBM3. This implies that a single MI300X cannot hold the entire
    model without offloading or careful partitioning, necessitating multi-GPU or multi-node distributed
    training even for basic inference or fine-tuning, and certainly for pre-training. Data transfer rates
    for model weights during pre-training or gradient synchronization (5.3 TB/s per GPU) need to be balanced
    with network bandwidth between nodes to avoid bottlenecks. For example, if each MI300X processes 200GB
    of gradients per step, a 100 Gbps (12.5 GB/s) network link between nodes would be a significant bottleneck
    if multiple GPUs are communicating across nodes, highlighting the need for high-bandwidth interconnects
    and efficient communication strategies (e.g., NCCL/RCCl optimizations).
