title: Evaluating CXL Memory Pooling for DLRM
scenario: 'You are architecting a training cluster for a 10TB DLRM recommendation model. Workers currently
  max out at 2TB local DDR5, leading to memory stranding and 40% CPU utilization. You must evaluate memory
  expansion strategies: explicit remote memory access via RDMA (RoCEv2 400Gbps) vs. a rack-scale CXL 3.0
  memory pooling switch (PCIe Gen5 x16). Compare these approaches in terms of latency, bandwidth, and
  software abstraction for random embedding lookups, and justify your design choice.'
question: "For 10TB DLRM embeddings, should you choose RDMA remote memory or rack-scale CXL 3.0 pooling for random lookups, and why?"
details:
  realistic_solution: Select CXL 3.0 pooling. It provides load/store semantics making the remote memory
    appear as a local NUMA node to the application, requiring zero software rewrites. It delivers ~200-250ns
    latency compared to RDMA's ~2-3us latency, which is critical for pointer-chasing and random embedding
    lookups.
  common_mistake: Treating CXL and RDMA as equivalent 'remote memory' solutions, ignoring the architectural
    difference between CXL's native load/store cache-coherent semantics and RDMA's explicit message-passing
    overhead.
  napkin_math: RDMA Latency = ~2.5us per lookup. CXL 3.0 Latency = Local DDR (~100ns) + CXL controller/PCIe
    (~80ns) + Switch hop (~50ns) = ~230ns. For 100 sequential dependent lookups, RDMA takes 250us vs CXL
    taking 23us (an order of magnitude improvement in memory-bound latency).
