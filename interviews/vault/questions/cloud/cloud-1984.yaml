title: Bipartite Network Interference in A/B Testing
scenario: You are evaluating the rollout of a new ML model for dispatching drivers in a two-sided marketplace
  network. A standard A/B test (50/50 driver-level randomization) shows the treatment model increases
  driver earnings by +18% compared to the control group. Based on this, the team decides to roll out the
  model to 100% of drivers globally. However, after global rollout, the actual overall driver earnings
  only increase by +2%. Evaluate the experimental setup, identify the critical statistical assumption
  that was violated, and justify a more robust testing architecture for this deployment environment.
question: "Why did driver earnings rise +18% in the A/B test but only +2% after global rollout, and how should this marketplace test be run?"
details:
  realistic_solution: Identify the bipartite interference causing a SUTVA violation. The treatment drivers
    efficiently captured more of the fixed rider demand pool, starving the control drivers and artificially
    inflating the relative delta. Justify transitioning from user-level randomization to Switchback Testing
    (time-based randomization) or spatial clustering (geohashing) to properly isolate treatment and control
    states in constrained marketplaces.
  common_mistake: Failing to identify the SUTVA (Stable Unit Treatment Value Assumption) violation. Candidates
    often incorrectly attribute the discrepancy to data drift, novelty effects, or Simpson's paradox,
    rather than recognizing that treatment units simply cannibalized finite demand from the control units.
  napkin_math: 'Assume fixed demand of 100 riders, 10 T-drivers, 10 C-drivers. Baseline: T gets 50, C
    gets 50. Test: T-model is more aggressive, capturing 60 riders. C drops to 40. Measured A/B Delta
    = (60-40)/40 = +50% lift. True Global Lift upon 100% rollout = (100-100)/100 = 0%. The measured +50%
    lift was 100% cannibalization.'
