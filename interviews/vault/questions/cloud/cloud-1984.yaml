title: Bipartite Network Interference in A/B Testing
scenario: You are evaluating the rollout of a new ML model for dispatching drivers in a two-sided marketplace. A standard A/B test (50/50 driver-level randomization) shows the treatment model increases driver earnings by +50%. The team globally rolls out the model, but overall driver earnings remain flat (0% increase).
question: Why did driver earnings rise +50% in the A/B test but show 0% increase after global rollout, and how should this marketplace test be run?
details:
  realistic_solution: Identify the bipartite interference causing a SUTVA violation. The treatment drivers efficiently captured more of the fixed rider demand pool, starving the control drivers and artificially inflating the relative delta. Justify transitioning from user-level randomization to Switchback Testing (time-based randomization) or spatial clustering (geohashing) to properly isolate treatment and control states in constrained marketplaces.
  common_mistake: |
    **The Pitfall:** Failing to identify the SUTVA (Stable Unit Treatment Value Assumption) violation.
    **The Rationale:** Teams treat the platform as a standard web environment where users are isolated, ignoring the shared finite resource (riders).
    **The Consequence:** The team incorrectly attributes the discrepancy to data drift or novelty effects, leading to bad product decisions based on cannibalized metrics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Baseline: Assume fixed demand of 100 riders, 10 T-drivers, 10 C-drivers. T gets 50 riders, C gets 50 riders.
    2. **Calculations:**
       * Test phase: T-model is more aggressive, capturing 60 riders. C drops to 40.
       * Measured A/B Delta: (60 - 40) / 40 = +50% lift.
       * True Global Lift: Upon 100% rollout, the same 100 riders are captured: (100 - 100) / 100 = 0%.
    3. **Conclusion & Interpretation:**
       * **Result: SUTVA Violation.** The measured +50% lift was actually 100% cannibalization.
