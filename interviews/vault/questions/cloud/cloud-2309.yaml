title: Cross-Region Training Latency
scenario: 'You are training a 10B parameter LLM in us-west-2 (where 512 H100s are available), but the 50TB cleaned text dataset resides in us-east-1 S3. Training is taking 3x longer than expected, and cloud egress costs have unexpectedly jumped by $80,000 this month. GPU utilization is erratic.'
question: 'Why are training time and egress costs exploding with the 50TB dataset in us-east-1 and H100s in us-west-2, and how would you fix it?'
details:
  realistic_solution: |
    The symptom of massively inflated egress costs and high latency indicates a failure to respect data gravity. The training cluster is pulling the dataset across cloud regions on every single epoch. Because cross-region bandwidth is heavily metered and subject to higher latency jitter, the dataloaders cannot keep the GPUs saturated, and the company is paying per-GB egress fees repeatedly. The solution is to decouple storage from training geographically. First, pre-process, tokenize, and heavily compress (e.g., Zstandard + Parquet) the data in us-east-1. Second, perform a one-time asynchronous bulk replication of the 50TB dataset to a us-west-2 S3 bucket or a high-performance parallel file system (like FSx for Lustre) co-located with the H100 cluster. Training should only read from the local us-west-2 storage.
  common_mistake: |
    **The Pitfall:** Trying to compress data on the fly at the dataloader level.
    **The Rationale:** Candidates focus on software optimization (prefetch buffers, dataset formats) without changing the underlying network topology.
    **The Consequence:** Continuing to pay massive egress fees and suffer high latency across cloud regions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 TB dataset * 4 epochs = 200,000 GB of cross-region reads.
    - Cross-US latency is ~60 ms vs <1 ms in-region.

    **Calculations:**
    - Egress Cost: 200,000 GB * $0.02/GB = $4,000 per run.
    - Total Cost: 20 hyperparameter tuning jobs = $80,000.

    **Conclusion & Interpretation:**
    - **Result: $80,000 egress cost (Network Latency-Bound)**. A one-time 50 TB transfer avoids repeating the massive penalty on subsequent reads.
