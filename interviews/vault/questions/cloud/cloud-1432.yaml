title: Intersectional FRR Disparity in Facial Auth
scenario: A facial authentication API processing 1M requests/day reports a baseline False Rejection Rate (FRR) of 1.2%. The FRR for 'Female' is 2.5%, and 'Darker Skin' is 3.1%. Upon auditing a sample of 10,000 attempts for the intersectional subgroup 'Darker-Skinned Females' (where 9,500 are legitimate users), you observe 3,296 false rejections.
question: What is the intersectional FRR for Darker-Skinned Females, and how large is its disparity versus the 1.2% baseline?
details:
  realistic_solution: 'Evaluate error metrics across all overlapping identity combinations. For this system, the intersectional FRR is 34.7%, revealing a massive vulnerability that requires targeted intersectional data collection and loss function re-weighting.'
  common_mistake: |
    **The Pitfall:** Evaluating fairness metrics only on independent, isolated axes (e.g., gender alone or skin tone alone).
    **The Rationale:** It simplifies dashboarding and regulatory reporting.
    **The Consequence:** Assuming error rates are merely additive, completely missing compounded exponential bias hidden within intersectional cohorts.
  napkin_math: |
    1. Intersectional FRR = False Rejections / Expected Positives.
    2. $3,296 / 9,500 = 0.3469$ (34.7%).
    3. Disparity Multiplier = Intersectional FRR / Overall FRR.
    4. $34.7\% / 1.2\% = 28.9\times$.
    5. **The subgroup experiences a massive 28.9x higher failure rate than the baseline.**
