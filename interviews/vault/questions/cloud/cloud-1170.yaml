title: Dynamic Batching for Strict Latency SLOs
scenario: You deploy a BERT-base classification model using Triton Inference Server with a strict P99 latency SLO of 100ms end-to-end. Network and tokenization consume 30ms, leaving a 70ms budget. Inference takes 12ms for batch 1, 18ms for batch 8, 28ms for batch 32, and 45ms for batch 64. Traffic varies erratically from 50 to 1,500 QPS.
question: What max_batch_size and max_queue_delay would you choose to keep serving under the 70ms server-side budget?
details:
  realistic_solution: 'Cap max_batch_size at 32 and set max_queue_delay to 10ms. This ensures that even in the absolute worst-case scenario (a request arriving just as a max batch starts processing), the total time spent in the system remains strictly under the 70ms budget.'
  common_mistake: |
    **The Pitfall:** Setting max_batch_size to 64 and max_queue_delay to 25ms because $45\text{ms} + 25\text{ms} = 70\text{ms}$.
    **The Rationale:** Engineers mistakenly sum the queue delay and execution time without accounting for head-of-line blocking.
    **The Consequence:** A worst-case latency that blows past the SLO because a request might wait in the queue *while* the GPU processes the previous maximum batch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Strict P99 end-to-end SLO: 100ms.
       - Network/tokenization overhead: 30ms.
       - Server-side budget: 70ms.
       - Execution times: 12ms (Batch 1), 18ms (Batch 8), 28ms (Batch 32), 45ms (Batch 64).
    2. **Calculations:**
       - Worst-case latency equation: max(busy_GPU_wait, max_queue_delay) + execution_time.
       - For Batch 64 (delay 25ms): max(45ms, 25ms) + 45ms = 90ms (Fails 70ms budget).
       - For Batch 32 (delay 10ms): max(28ms, 10ms) + 28ms = 56ms (Passes 70ms budget).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** Batch 32 reliably passes the 70ms budget even during extreme traffic spikes.
