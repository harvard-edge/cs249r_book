title: Tail Latency Amplification in Multi-Stage H100 Pipeline
scenario: A 4-stage inference pipeline runs on H100 GPUs. Each stage has p99 latency
  of 50ms. The pipeline coordinator reports end-to-end p99 of 220ms — roughly 4× the
  per-stage p99. A junior engineer argues this means each stage contributes independently.
  Explain tail latency amplification and why a 4-stage pipeline does not have p99=50ms.
question: Why does a 4-stage pipeline with 50 ms per-stage p99 show about 220 ms end-to-end
  p99 instead of 50 ms?
details:
  realistic_solution: 'In a sequential pipeline, end-to-end latency is the sum of per-stage latencies. If stages are statistically independent, the variance of the sum is the sum of the variances, meaning the p99 of the pipeline would be much less than the sum of the individual p99s (e.g., closer to 160ms). Observing a 220ms p99 means the stages are highly correlated. Tail latencies in ML pipelines compound due to head-of-line blocking and queuing: when a request hits a tail latency in stage 1, it causes queue pileups that force subsequent stages into their tail distributions as well, pushing the end-to-end p99 beyond the simple 200ms sum.'
  common_mistake: 'Assuming independent probabilities for tail latencies across stages. If they were truly independent, the pipeline p99 would be significantly less than 200ms due to statistical multiplexing (Central Limit Theorem).'
  napkin_math: 'If independent: stage mean=30ms, p99=50ms implies stddev≈8.5ms. Sum of 4 stages: mean=120ms, stddev=17ms. The independent p99 would be 120 + 2.33*17 ≈ 160ms. The observed 220ms is strictly > 200ms (the sum of p99s), proving strong positive correlation and compounding queueing delays across the pipeline.'
