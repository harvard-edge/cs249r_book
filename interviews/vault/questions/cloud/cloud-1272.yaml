title: Continuous Fault Injection in Synchronous Distributed Training
scenario: You are evaluating a fault injection proposal for a 500B parameter model training on 4,096 A100
  GPUs (costing ~$10,000/hour). The natural MTBF is ~8 hours. To validate a new asynchronous checkpointing
  and automated redeployment system, the infra team proposes a Chaos Monkey-style system that randomly
  terminates 1 node (8 GPUs) every 2 hours directly in the production training job. Evaluate this proposal,
  comparing the trade-offs of continuous production fault injection versus targeted staging environment
  injection for tightly-coupled synchronous ML workloads.
details:
  realistic_solution: Reject continuous production fault injection. In synchronous training, one node
    failure halts all 4,096 GPUs. Use targeted fault injection in a scaled-down staging environment (e.g.,
    512 GPUs) to validate recovery mechanisms. Rely on the natural 8-hour MTBF to provide sufficient empirical
    validation in production without artificially degrading goodput.
  common_mistake: Treating tightly-coupled synchronous ML training like stateless microservices, assuming
    continuous random failures are a valid way to test resilience without calculating the severe global
    goodput penalty.
  napkin_math: 'Proposed injection: 1 failure / 2 hours = 12 failures/day. If recovery takes 10 minutes,
    that is 120 minutes of global downtime daily. Cost = 2 hours * $10,000/hr = $20,000/day wasted purely
    on injected faults, decreasing training goodput by 8.3% before even accounting for natural hardware
    failures.'
