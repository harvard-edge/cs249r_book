title: 'Recall: Rack Power Budget Limits for H100 Dense Deployments'
scenario: An ML platform engineer proposes filling a standard 42U server rack with H100 SXM5 servers (DGX H100, 10.2 kW per 8-GPU node) to maximize GPU density. The datacenter's standard rack power budget is 15 kW. The engineer argues they can fit 2 DGX nodes per rack.
question: Can a standard 15 kW rack feasibly host two 10.2 kW DGX H100 nodes, and what datacenter constraints apply?
details:
  realistic_solution: 'Two DGX H100 nodes: 2 * 10.2 kW = 20.4 kW — exceeds the 15 kW rack budget. Even one DGX H100 at 10.2 kW + networking (300 W) + server chassis overhead (500 W) = 11 kW, leaving only 4 kW headroom. High-density H100 deployments require 30–40 kW per rack power circuits (3-phase 60A or higher), specialized in-rack liquid cooling manifolds or rear-door heat exchangers, and floor load ratings >1,000 kg. Hyperscalers deploy H100 in custom-built pods with 30–50 kW/rack capacity, not standard 15 kW datacenter allocations.'
  common_mistake: |
    **The Pitfall:** Looking only at steady-state TDP and ignoring peak power draw, PDU overhead, and cooling capacity.
    **The Rationale:** Engineers typically reference standard component spec sheets without accounting for system-level power spikes and datacenter-level circuit sizing constraints.
    **The Consequence:** Deploying dense racks without sufficient headroom trips breakers, causing complete node failure during peak workload bursts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Datacenter rack budget: 15 kW.
       - Node: DGX H100 (8x 700W GPUs).
       - Node overhead: Base system components and networking.
    2. **Calculations:**
       - 1 DGX H100 GPU TDP = 8 * 700W = 5.6 kW.
       - Base system overhead = 4.6 kW.
       - Total nominal power per node = 10.2 kW.
       - Peak burst (120% of TDP) = 12.24 kW.
       - Power for 2 nodes = 2 * 10.2 kW = 20.4 kW (nominal).
    3. **Conclusion & Interpretation:** **Two DGX nodes require 20.4 kW, heavily exceeding the 15 kW standard budget. High-density deployments mandate custom 30-50 kW pods with specialized cooling.**
