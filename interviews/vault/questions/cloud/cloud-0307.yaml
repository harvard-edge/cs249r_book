title: 'The TCO Iceberg: TCO & Cost Modeling'
scenario: A team just spent $1 million on a massive one-time training run for a new flagship language model.
question: Over the model's expected 3-year production lifespan, which component is most likely to dominate the Total Cost of Ownership (TCO)?
details:
  realistic_solution: The correct answer is the salaries of the engineering team. While a $1M training run is expensive, the cost of the highly-skilled Staff+ engineers required to operate, monitor, maintain, and update a critical production service 24/7 for three years is typically the largest expense in the entire lifecycle. The long-term operational 'tail' of people-cost wags the short-term capital-expenditure 'dog'.
  common_mistake: |
    **The Pitfall:** Believing the massive, visible hardware training bill is the largest component of TCO.
    **The Rationale:** Engineers hyper-focus on capital expenditures (CapEx) and ignore the compounding cost of the highly skilled human capital required to maintain the system.
    **The Consequence:** Organizations under-budget for operational maintenance, leading to understaffed teams and degraded service over the model's lifecycle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Training CapEx: $1,000,000.
       - Lifespan: 3 years.
       - Engineering team: 4 engineers.
    2. **Calculations:**
       - Engineering OpEx: 4 engineers * $300,000/year fully-loaded cost = $1.2M/year.
       - Lifespan Cost: $1.2M/year * 3 years = $3.6M.
    3. **Conclusion & Interpretation:**
       - The operational personnel cost vastly exceeds the one-time hardware CapEx.
       - **Result: OpEx Dominates TCO ($3.6M vs $1M)**
  options:
  - The initial $1M training hardware cost.
  - The electricity cost for the inference servers over 3 years.
  - The salaries of the engineering team operating the service for 3 years.
  - The network bandwidth costs for serving user traffic.
  correct_index: 2
