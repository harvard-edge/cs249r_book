title: 'The TCO Iceberg: TCO & Cost Modeling'
scenario: A team just spent $1 million on a massive one-time training run for a new flagship language
  model. Over the model's expected 3-year production lifespan, which of the following components is most
  likely to dominate the Total Cost of Ownership (TCO)?
question: "Over the model's expected 3-year production lifespan, which of the following components is most likely to dominate the Total Cost of Ownership (TCO)?"
details:
  realistic_solution: The correct answer is the salaries of the engineering team. While a $1M training
    run is expensive, the cost of the highly-skilled Staff+ engineers required to operate, monitor, maintain,
    and update a critical production service 24/7 for three years is typically the largest expense in
    the entire lifecycle. The long-term operational 'tail' of people-cost wags the short-term capital-expenditure
    'dog'.
  common_mistake: Engineers often focus on the large, visible, one-time capital expenditure (CapEx) of
    training servers. They mistakenly believe this is the largest part of the budget, forgetting that
    operational expenditures (OpEx) accumulate over years and often dwarf the initial hardware purchase.
    This is the classic 'iceberg' problem where the visible cost (training) is only a fraction of the
    total cost.
  napkin_math: Let's assume a lean team of just 4 engineers is needed to run this flagship service.
  options:
  - The initial $1M training hardware cost.
  - The electricity cost for the inference servers over 3 years.
  - The salaries of the engineering team operating the service for 3 years.
  - The network bandwidth costs for serving user traffic.
  correct_index: 2
