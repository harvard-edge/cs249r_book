title: Scale Metadata Memory
scenario: A quantized tensor has 64 million weights with one FP16 scale per 128 weights. Calculate scale metadata size.
question: How much metadata is needed for FP16 scales when 64M weights use one scale per 128 weights?
details:
  realistic_solution: There are 64M / 128 = 500,000 scales. At 2 bytes each, metadata is 1,000,000 bytes, or about 1 MB.
  common_mistake: Ignoring group-wise scale metadata when estimating quantized model size.
  napkin_math: 64,000,000 / 128 = 500,000 scales. 500,000 x 2 B = 1,000,000 B ≈ 1 MB.
