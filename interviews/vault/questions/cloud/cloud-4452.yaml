title: Prefill Batch Composition for Throughput Maximization
scenario: A prefill pool is processing requests with highly variable prompt lengths (32 to 4096 tokens). Padding short prompts to the longest in the batch wastes 60% of compute.
question: How would you batch prompts from 32 to 4096 tokens to reduce the 60% padding waste?
details:
  realistic_solution: 'Implement variable-length sequence packing (e.g., FlashAttention-2 varlen). Flatten all prompt tokens into a single contiguous 1D tensor up to the hardware token budget. Pass a `cu_seqlens` cumulative sequence length array to the attention kernel to correctly compute attention boundaries without cross-sequence pollution. This completely bypasses padding requirements, driving effective compute utilization to ~95%.'
  common_mistake: |
    **The Pitfall:** Using fixed-size batches with padding to the longest sequence, or arbitrarily dropping long requests.
    **The Rationale:** Rectangular tensors are the simplest and most standard way to implement batching in frameworks like PyTorch.
    **The Consequence:** At 60% waste, effective compute utilization drops to 40% of peak, severely degrading throughput and forcing over-provisioning of inference hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Naive padding waste: 60% (40% utilization).
       - Varlen packing efficiency: 95%.
       - Hardware Peak: 989 TFLOPS.
    2. **Calculations:**
       - Naive Padding Compute: 0.40 * 989 TFLOPS = 396 TFLOPS effective.
       - Packed Compute: 0.95 * 989 TFLOPS = 939 TFLOPS effective.
       - Throughput Improvement Ratio: 939 / 396 = 2.37x.
    3. **Conclusion & Interpretation:**
       - **Sequence packing strips out the dense padding computation, yielding a massive 2.37x raw throughput gain. Result: Compute-Utilization Bound.**
