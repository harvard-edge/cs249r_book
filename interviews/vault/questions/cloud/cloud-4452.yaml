title: Prefill Batch Composition for Throughput Maximization
scenario: A prefill pool is processing requests with highly variable prompt lengths (32 to 4096 tokens). Padding short prompts to the longest in the batch wastes 60% of compute.
question: How would you batch prompts from 32 to 4096 tokens to reduce the 60% padding waste?
details:
  realistic_solution: 'Variable-length batching strategies: (1) Sequence packing (Flash Attention 2 style): pack multiple variable-length sequences into a single attention operation up to a token budget (e.g., 4096 tokens per batch). No padding between sequences — use cu_seqlens tensor to track sequence boundaries. The 2D attention mask prevents cross-sequence attention. Pack sequences greedily: sort by length descending, fill each bin with remaining capacity. Packing efficiency: 90-95% vs 40% with naive padding. (2) Bucketed batching: sort requests into length buckets (e.g., 0-256, 256-512, 512-1024, 1024-2048, 2048-4096). Each bucket forms its own batch padded to bucket maximum. Buckets balance utilization vs latency. (3) Dynamic batching with timeout: collect requests for 10ms, then dispatch the most efficient batch. Short requests: high-density packing. Long requests (>1024): smaller batch to avoid memory OOM.'
  common_mistake: |
    **The Pitfall:** Using fixed-size batches with padding to the longest sequence, or setting a hard sequence length limit.
    **The Rationale:** It is the simplest and most standard way to implement batching in PyTorch.
    **The Consequence:** At 60% waste, effective compute utilization drops to 40% of peak, or long requests are arbitrarily discarded instead of being handled efficiently.
  napkin_math: |
    - **Naive Padding Compute:** At 60% waste, effective compute = 40% of H100 989 TFLOPS = 396 TFLOPS.
    - **Packed Compute:** With sequence packing at 95% efficiency, effective compute = 95% * 989 = 939 TFLOPS.
    - **Throughput Improvement:** 939 / 396 = **2.37x**.
    - **Packing Overhead:** Sorting O(n log n) + bin-packing heuristic O(n). At 1000 requests per batch, this is negligible.
    - **Conclusion:** Flash Attention 2 with varlen imposes no performance penalty versus padded and skips padding computation, yielding massive gains.
