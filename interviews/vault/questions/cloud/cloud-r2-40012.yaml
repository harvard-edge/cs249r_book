title: ECN Marking Accuracy at 400Gbps Line Rate
scenario: Modern 400Gbps switch ASICs must decide whether to set the ECN CE bit on every packet at line
  rate. At 400Gbps with 4KB packets, how many ECN marking decisions must the switch make per second? Why
  does this constrain the marking algorithm's complexity?
question: "How many ECN marking decisions per second are required at 400Gbps with 4KB packets, and why must the algorithm be simple?"
details:
  realistic_solution: 'At 400Gbps with 4KB (4096 byte) packets: 400 × 10^9 bits/s ÷ (4096 × 8 bits/packet)
    = 12.2 million packets per second per port. A 64-port switch processes 781 million packets per second
    total. Each packet needs an ECN marking decision within the ~82ns packet time. This rules out any
    stateful or history-dependent marking algorithm — the switch uses simple WRED (Weighted Random Early
    Detection): compare instantaneous or EWMA queue depth against Kmin/Kmax thresholds, then mark with
    probability P = (queue - Kmin)/(Kmax - Kmin) × Pmax. This comparison is a single clock cycle in the
    switch ASIC pipeline.'
  common_mistake: Assuming ECN marking is computationally trivial. At 400G line rate, the marking engine
    must evaluate every packet against queue depth thresholds with nanosecond-level timing, which constrains
    the algorithm to simple threshold comparisons implementable in hardware.
  napkin_math: 400Gbps / (4KB × 8) = 12.2M packets/sec per port. 1/12.2M = 82ns per packet. Switch pipeline
    at 1GHz clock = 1ns per stage. ECN decision must complete in 1-2 pipeline stages = 1-2ns. Only threshold
    comparison fits this budget.
