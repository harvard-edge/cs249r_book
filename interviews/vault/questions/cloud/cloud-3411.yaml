title: Optimizing LLM Inference Latency with Speculative Decoding on NVIDIA H100
scenario: Your team is tasked with optimizing the inference latency of a large autoregressive
  language model deployed on NVIDIA H100 GPUs (each with 80 GB HBM3, 989 TFLOPS FP16
  dense, 3.35 TB/s memory bandwidth, 700W TDP). You propose using speculative decoding.
  Explain the fundamental principle of draft-verify decoding, detailing how the H100's
  high memory bandwidth and FP16 dense TFLOPS contribute to both the draft generation
  and parallel verification stages. What considerations are critical for selecting
  an effective draft model given these H100 specs to maximize acceptance rates and
  minimize overall latency?
question: How does draft-verify speculative decoding use H100 bandwidth and FP16 compute,
  and how would you choose the draft model?
details:
  realistic_solution: A realistic solution involves carefully selecting a lightweight,
    highly optimized draft model (e.g., a smaller, distilled version of the main model
    or a simpler architecture) that can run very quickly on the H100, potentially
    leveraging its FP16 dense TFLOPS for rapid draft generation. The draft model should
    be fine-tuned to produce high-quality, likely-to-be-accepted tokens. The H100's
    substantial memory bandwidth (3.35 TB/s) is crucial for efficiently moving the
    larger main model weights and intermediate activations during the parallel verification
    phase, which is a key advantage. Continuous monitoring and iterative improvement
    of acceptance rates are crucial.
  common_mistake: A common mistake is choosing a draft model that is either too large,
    leading to significant overhead that negates latency benefits, or too inaccurate,
    resulting in low acceptance rates and frequent fallback to the slower main model's
    generation path, effectively increasing perceived latency.
  napkin_math: Assume a main model generates 1 token in 100ms. A draft model, running
    on the H100, proposes 4 tokens in 20ms. The H100 can verify these 4 tokens in
    parallel using the main model in 30ms. If the average acceptance rate is 75%,
    what is the effective average time per token generated using speculative decoding?
    Compare this to the baseline without speculative decoding (assuming only main
    model generation).
