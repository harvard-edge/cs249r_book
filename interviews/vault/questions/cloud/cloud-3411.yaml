title: Optimizing LLM Inference Latency with Speculative Decoding on NVIDIA H100
scenario: Your team is optimizing the inference latency of a large autoregressive language model deployed on NVIDIA H100 GPUs using speculative decoding.
question: How does draft-verify speculative decoding use H100 bandwidth and FP16 compute, and how would you choose the draft model?
details:
  realistic_solution: A realistic solution involves carefully selecting a lightweight, highly optimized draft model (e.g., a smaller, distilled version of the main model or a simpler architecture) that can run very quickly on the H100, potentially leveraging its FP16 dense TFLOPS for rapid draft generation. The draft model should be fine-tuned to produce high-quality, likely-to-be-accepted tokens. The H100's substantial memory bandwidth (3.35 TB/s) is crucial for efficiently moving the larger main model weights and intermediate activations during the parallel verification phase, which is a key advantage. Continuous monitoring and iterative improvement of acceptance rates are crucial.
  common_mistake: |
    **The Pitfall:** Choosing a draft model that is either too large or too inaccurate.
    **The Rationale:** Candidates fail to balance the overhead of draft generation against the acceptance rate.
    **The Consequence:** The overhead negates latency benefits, or low acceptance rates cause frequent fallbacks to the slower main model, effectively increasing perceived latency.
  napkin_math: |
    - Baseline time per token: 100ms. Baseline time for 3.05 tokens: ~305ms.
    - Speculative step time: 20ms (draft) + 30ms (verify) = 50ms.
    - With a 75% acceptance rate and 4 drafted tokens, expected generated tokens per step = (1 - 0.75^5) / (1 - 0.75) = 3.05 tokens.
    - Effective time per token: 50ms / 3.05 = 16.4ms.
    - Speedup: 305ms / 50ms = **6.1x**.
