title: Diagnosing ECMP Hash Collisions in RoCEv2 Clusters
scenario: 'You are debugging a 1024-GPU cluster running distributed training over a non-blocking RoCEv2 Clos network. During All-Reduce, telemetry shows severe tail latency. Switch counters reveal 30% of spine uplinks are at 100% utilization, while 70% remain nearly idle. The network relies entirely on standard ECMP.'
question: 'What root cause explains the spine uplink imbalance, and what telemetry would confirm ECMP hash collisions?'
details:
  realistic_solution: 'Standard ECMP utilizes static 5-tuple hashing. Because distributed ML training (via NCCL) creates a small number of massive, long-lived elephant flows, uniform static hashing leads to mathematically inevitable hash collisions. When multiple 400Gbps flows collide on the same uplink, bandwidth is halved. The fix requires packet-level or flowlet-level adaptive routing on the switch ASIC to balance based on real-time link utilization.'
  common_mistake: |
    **The Pitfall:** Assuming ECMP dynamically monitors link utilization and routes around congestion.
    **The Rationale:** Candidates misunderstand that standard ECMP relies strictly on static 5-tuple hashing, not dynamic load balancing.
    **The Consequence:** Incorrectly attributing the imbalance to physical hardware failures rather than fundamental protocol hash collisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 massive flows (400Gbps each), 4 available 400Gbps uplinks.
       - ECMP static hashing.
    2. **Calculations:**
       - Probability of perfect distribution = 4! / 4^4 = 24 / 256 = ~9.4%.
       - Probability of collision = 100% - 9.4% = 90.6%.
    3. **Conclusion & Interpretation:**
       - **Result: >90% of the time, flows hash to the same link, halving effective bandwidth (Hash-Bound).**
