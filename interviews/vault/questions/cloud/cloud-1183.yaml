title: Diagnosing ECMP Hash Collisions in RoCEv2 Clusters
scenario: 'You are debugging a 1024-GPU H100 cluster running Llama-3 70B distributed training over a strictly non-blocking RoCEv2 Clos network (400Gbps links). During the All-Reduce communication phase, telemetry shows severe tail latency and stragglers. Switch counters reveal that 30% of the spine uplinks are saturated at 100% utilization, while the other 70% remain nearly idle. The network relies entirely on standard ECMP for load balancing.'
question: "What root cause explains the spine uplink imbalance, and what telemetry would confirm ECMP hash collisions?"
details:
  realistic_solution: 'Identify that ECMP relies on static 5-tuple hashing. Because AI distributed training (via NCCL) creates a small number of massive, long-lived elephant flows, uniform flow hashing leads to inevitable hash collisions with >90% probability. When multiple 400Gbps flows collide on the same uplink, effective bandwidth is halved or worse. The fix is to implement packet-level or flowlet-level load balancing (e.g., adaptive routing on the switch ASIC) that distributes traffic based on real-time link utilization rather than static hashing.'
  common_mistake: |
    **The Pitfall:** Assuming ECMP dynamically monitors link utilization and routes around congestion.
    **The Rationale:** Misunderstanding that standard ECMP relies on static 5-tuple hashing, not dynamic load balancing.
    **The Consequence:** Incorrectly attributing the imbalance to physical link failures or cable issues, rather than fundamental hash collisions.
  napkin_math: |
    1. If 4 massive flows (each demanding 400Gbps) use ECMP across 4 available 400Gbps uplinks.
    2. Probability of perfect distribution (one flow per link) = `4! / 4^4` = `24 / 256` ≈ **9.4%**.
    3. **Result:** >90% of the time, multiple flows will hash to the same link, immediately halving effective bandwidth.
