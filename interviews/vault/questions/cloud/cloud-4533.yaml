title: MI300X Huge Embedding Placement
scenario: A recommendation system with 1TB of embedding tables must be trained using a node with MI300X accelerators.
question: How should the 1TB embedding tables be partitioned across the host CPU memory and the MI300X's 192 GB HBM3 to optimize training speed?
details:
  realistic_solution: Cache the most frequently accessed (hot) embeddings in the MI300X's 192 GB HBM3 to exploit the massive 5.3 TB/s bandwidth. Store the rare (cold) embeddings in the host CPU's terabytes of DDR5, fetching them over PCIe only when required by the batch sparse lookup.
  common_mistake: |
    **The Pitfall:** Attempting to fit or replicate the entire 1TB embedding table across the GPU HBM.
    **The Rationale:** Candidates may not realize the absolute size discrepancy between massive recommendation models and physical GPU memory limits.
    **The Consequence:** The model will immediately crash with Out-Of-Memory (OOM) errors during initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding Table Size: 1 TB.
    - Hardware: MI300X with 192 GB HBM3.

    **Calculations:**
    - Direct comparison: 1 TB > 192 GB.

    **Conclusion & Interpretation:**
    - **Result: Hierarchical Tiering Needed (Memory Capacity-Bound).** The entire table cannot fit in HBM3, requiring a hierarchical tiering strategy between host DDR5 and device HBM3.
