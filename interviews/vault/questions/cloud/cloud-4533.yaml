title: MI300X Huge Embedding Placement
scenario: A recommendation system with 1TB of embedding tables must be trained using
  a node with MI300X accelerators.
question: Analyze how to partition the embedding tables across the host CPU memory
  and the MI300X's 192 GB HBM3 to optimize training speed.
details:
  realistic_solution: Cache the most frequently accessed (hot) embeddings in the MI300X's
    192 GB HBM3 to exploit the massive 5.3 TB/s bandwidth. Store the rare (cold) embeddings
    in the host CPU's terabytes of DDR5, fetching them over PCIe only when required
    by the batch sparse lookup.
  common_mistake: Attempting to fit or replicate the entire 1TB embedding table across
    the GPU HBM, leading to immediate OOM errors.
  napkin_math: 1 TB table > 192 GB HBM3, requiring tiering.
