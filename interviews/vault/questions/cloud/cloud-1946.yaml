title: Stateless vs Stateful LLM Serving Architecture
scenario: You are designing a high-availability serving layer for a Llama-3-70B chat application across a fleet of 8xH100 GPU nodes. Each user session averages 20 turns, reaching up to 8,000 tokens of context.
question: Should the 70B chat service use stateless routing or stateful sticky KV-cache serving, and how do failures change the decision?
details:
  realistic_solution: Adopt a fundamentally stateless routing layer coupled with a prefix-caching KV backend (e.g., RadixAttention). This ensures requests can be routed anywhere for high availability and fault tolerance, while the compute penalty of full reprefills is mitigated opportunistically.
  common_mistake: |
    **The Pitfall:** Instinctively choosing stateful routing (sticky sessions) to save compute.
    **The Rationale:** Optimizing solely for the "happy-path" inference cost without modeling catastrophic distributed failure modes.
    **The Consequence:** When a stateful node fails, thousands of dropped sessions simultaneously slam the remaining nodes, triggering a massive synchronized prefill storm that completely cascades and takes down the entire service.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: Llama-3-70B. Context: 8,000 tokens.
       - Stateful Memory Cost: ~2.62 GB KV cache per session.
       - Stateless Prefill Penalty: ~100ms per 8K token context.
    2. **Calculations:**
       - Single Node Failure Drop: 100 sessions lost (262 GB of state vaporized).
       - Rebuild Compute Cost: 100 sessions * 1.12 PFLOPs = 112 PFLOPs.
    3. **Conclusion & Interpretation:**
       - **Result: Stateless Prefix-Caching.** The fleet must use stateless routing with RadixAttention prefix caching. The 112 PFLOP recovery storm makes stateful sticky routing far too fragile for HA production.
