title: Stateless vs Stateful LLM Serving Architecture
scenario: 'You are designing a high-availability serving layer for a Llama-3-70B chat application across a fleet of 8xH100 GPU nodes. Each user session averages 20 turns, reaching up to 8,000 tokens of context.'
question: 'Should the 70B chat service use stateless routing or stateful sticky KV-cache serving, and how do failures change the decision?'
details:
  realistic_solution: 'Adopt a fundamentally stateless routing layer coupled with a prefix-caching KV backend (e.g., RadixAttention). This ensures requests can be routed anywhere for high availability and fault tolerance, while the compute penalty of full reprefills is mitigated opportunistically.'
  common_mistake: |
    **The Pitfall:** Instinctively choosing stateful serving to save compute.
    **The Rationale:** Optimizing for the happy-path inference cost without modeling the distributed failure modes.
    **The Consequence:** When a stateful node fails, thousands of dropped sessions simultaneously hit remaining nodes, causing a devastating prefill storm that takes down the entire service.
  napkin_math: |
    - **Stateless Penalty:** Prefilling 8K tokens on 70B params is ~1.1 PFLOPs (2 × 70e9 × 8K), taking ~100ms on 8xH100.
    - **Stateful Memory Cost:** 80 layers × 8 KV heads × 128 dim × 4 bytes (FP16 K+V) × 8K tokens = ~2.68 GB per session.
    - **Failure Impact:** A stateful node storing 100 sessions loses 268 GB of state upon failure.
    - **Prefill Storm:** Rebuilding 100 sessions forces a synchronized 110 PFLOP computation across the remaining fleet, causing massive tail latency spikes.
