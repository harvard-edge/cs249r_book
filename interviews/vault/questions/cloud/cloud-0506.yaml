title: The Silent Padding Tax
scenario: Your team is migrating an NLP workload from Nvidia A100s to Google TPU v4s to save costs. You are using a batch size of 15 and a hidden dimension of 768. XLA compiles the graph successfully, but the profiler shows the MXU (Matrix Multiply Unit) utilization is sitting at a dismal 11%.
question: "What is destroying your performance?"
details:
  realistic_solution: TPUs are built around rigid, physical systolic arrays. The TPU v4 Matrix Multiply Unit (MXU) operates strictly on 128x128 tiles of bfloat16 numbers. If your tensor dimensions are not multiples of 128, XLA does not fail—it silently pads your tensors with zeros to make them fit the physical hardware grid. A batch size of 15 is aggressively padded up to 128, meaning the MXU is spending the vast majority of its time doing math on zeros, burning power and cycle time for nothing.
  common_mistake: |
    **The Pitfall:** Assuming that because the XLA compiler succeeds, the framework is efficiently mapping the math to the hardware.
    **The Rationale:** Candidates are used to CUDA on GPUs handling unaligned dimensions reasonably well.
    **The Consequence:** The TPU MXU spends the vast majority of its time calculating on zero-padded values, burning power and cycle time for nothing.
  napkin_math: |
    1. Workload per step requires 15 * 768 = 11,520 operations.
    2. XLA compiler pads the batch size to the nearest MXU 128x128 tile boundary (128).
    3. The hardware is forced to compute 128 * 768 = 98,304 operations.
    4. **Actual utilization achieved is 11,520 / 98,304 = 11.7%.**
