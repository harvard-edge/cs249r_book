title: SLA Budgets Under Network Stress
scenario: A cloud recommendation API has a strict 100ms latency SLA. The standard DLRM takes 80ms to compute. Pre- and post-processing take 15ms total. During a regional outage, network latency jumps from 2ms to 30ms. The system gracefully degrades to a lightweight heuristic model.
question: During the outage, what is the heuristic model's maximum compute budget and how many CPU instances are needed for 10,000 RPS?
details:
  realistic_solution: 'Dynamically recalculate the strict compute latency budget: 100ms (SLA) - 30ms (network) - 15ms (processing) = 55ms max compute time. For capacity planning, divide the degraded load of 10,000 RPS by the instance throughput (200 RPS) to provision 50 instances.'
  common_mistake: |
    **The Pitfall:** Failing to account for the dynamically increased network latency.
    **The Rationale:** Candidates forget that the end-to-end latency budget is fixed, and network spikes eat into the compute budget.
    **The Consequence:** This leads to SLA violations even after falling back to a simpler model.
  napkin_math: |
    - **SLA Budget:** 100ms.
    - **Non-compute time:** 30ms (Network) + 15ms (Processing) = 45ms.
    - **Max Compute Time:** 100ms - 45ms = **55ms**.
    - **Instance Capacity:** 200 RPS per instance.
    - **Total Load:** 10,000 RPS.
    - **Instances Required:** 10,000 RPS / 200 RPS = **50 instances**.
