title: SLA Budgets Under Network Stress
scenario: A cloud API has a strict 100ms SLA. Pre- and post-processing take 15ms. During a regional outage, network latency jumps to 30ms. The system degrades to a lightweight heuristic model.
question: During the outage, what is the heuristic model's maximum compute budget and how many CPU instances are needed for 10,000 RPS?
details:
  realistic_solution: Dynamically recalculate the compute latency budget by subtracting network and processing overhead from the strict SLA.
  common_mistake: |
    **The Pitfall:** Failing to account for dynamically increased network latency.
    **The Rationale:** Forgetting that the end-to-end latency budget is fixed, and network spikes eat directly into the compute budget.
    **The Consequence:** SLA violations even after gracefully degrading to a simpler model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA = 100ms. Network = 30ms. Processing = 15ms. RPS = 10,000. Instance capacity = 200 RPS.
    2. **Calculations:**
       - Max compute = 100 - 30 - 15 = 55ms.
       - Instances = 10000 / 200 = 50.
    3. **Conclusion & Interpretation:**
       - **Result: 55ms compute budget requires 50 instances.**
