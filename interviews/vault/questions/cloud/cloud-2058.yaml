title: The Iteration Speed Bottleneck
scenario: 'A team''s ML iteration cycle takes 5 days: 1 day for data preparation, 3 days for training, and 1 day for evaluation and analysis. A junior engineer proposes buying faster GPUs to cut training time in half.'
question: How much does this improve the overall iteration cycle?
details:
  realistic_solution: Training is 3/5 = 60% of the cycle. Halving it saves 1.5 days, reducing the cycle from 5 to 3.5 days — a 30% improvement, not 50%. The non-training overhead (data prep + evaluation) is the Amdahl's Law serial fraction. To achieve a 2× speedup, you must also parallelize data preparation and automate evaluation.
  common_mistake: |
    **The Pitfall:** Assuming halving the longest component halves the entire process.
    **The Rationale:** Candidates fail to apply Amdahl's Law to the development workflow, ignoring the fixed serial fraction (data prep + evaluation).
    **The Consequence:** Expensive hardware is purchased with the expectation of a 2x speedup, but the team only experiences a 30% iteration improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original cycle: 1 day data prep + 3 days training + 1 day evaluation = 5 days.
       - Hardware upgrade halves training time.
    2. **Calculations:**
       - Faster GPUs training time: 3 / 2 = 1.5 days.
       - New cycle: 1 + 1.5 + 1 = 3.5 days.
       - Speedup ratio: 5 / 3.5 ≈ 1.43x.
    3. **Conclusion & Interpretation:**
       - **Result: Amdahl's Law Bottleneck.** Cutting training time in half only yields a 1.43x (30%) overall speedup due to the fixed serial fraction of data prep and evaluation.
