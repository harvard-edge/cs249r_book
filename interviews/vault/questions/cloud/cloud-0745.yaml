title: The InfiniBand Link Flap
scenario: Your 256-GPU training job stalls for 30–90 seconds every 10–20 minutes, then resumes at full
  speed. `NCCL_DEBUG` logs show no timeouts — the collectives complete, just slowly. Your IB switch logs
  show a port on leaf switch 7 toggling UP/DOWN every 12 minutes. The ops team says 'it's just one port
  — it only affects one GPU.' Why does one flapping link stall 256 GPUs?
question: "Why does one flapping link stall 256 GPUs?"
details:
  realistic_solution: 'In a ring or tree AllReduce, every GPU is a link in a chain. The collective cannot
    complete until *every* participant contributes its data. When the IB link flaps (goes DOWN), the Subnet
    Manager (SM) must: (1) detect the failure (~500 ms); (2) recalculate routing tables for the entire
    fabric (~1–5 s for 256 endpoints); (3) distribute new forwarding tables to all switches (~2–5 s);
    (4) the affected GPU''s NCCL connection times out and retries (~5–30 s depending on `NCCL_IB_TIMEOUT`).
    During this entire sequence, all 255 other GPUs are blocked in the collective, waiting for the one
    GPU on the flapping port. When the link comes back UP, the SM recalculates routes *again*. The 12-minute
    flap cycle means the fabric is constantly reconverging, and each reconvergence stalls the entire training
    job. One flapping link is worse than a permanently dead link (which would be routed around once and
    forgotten).'
  common_mistake: '"One bad link only affects the one GPU connected to it — the other 255 should be fine"
    or "InfiniBand has redundant paths, so a single link failure is handled automatically." Both underestimate
    how collective operations create global dependencies.'
  napkin_math: 'SM reconvergence time for 256-node fabric: **3–8 seconds**. NCCL retry with backoff: **5–30
    seconds**. Total stall per flap event: **10–40 seconds** (matching observed 30–90 s with variance).
    Flap interval: 12 minutes. Training step time: ~4 seconds. Steps lost per flap: $30 / 4 \approx $
    **8 steps**. Flaps per hour: 5. Steps lost per hour: **40 steps**. Over 24 hours: **960 steps** lost.
    At 256 GPUs × $3.50/GPU-hr: cost of idle GPUs during stalls = $256 \times 3.50 \times (960 \times
    4 / 3600) \approx $ **$956/day**. Fix: replace the flapping cable/transceiver ($200) or configure
    the SM with a **link flap dampening** policy that holds a port DOWN for 5 minutes after 3 flaps in
    10 minutes, forcing NCCL to route around it permanently. The $200 cable fix saves $956/day.'
