title: VLM-Based Automated Curation at 100B Scale
scenario: You must design a distributed data curation pipeline using a 10B parameter Vision-Language Model (VLM) in FP16 to score 100 billion image-text pairs (200KB each). The VLM requires 6 TFLOPs per sample. You need to calculate the exact number of A100 GPUs required to complete this job in exactly 14 days.
question: What distributed VLM scoring architecture would you use, what is the bottleneck, and how many A100 GPUs are needed to finish in 14 days?
details:
  realistic_solution: 'For a 10B VLM in FP16, the weights require ~20GB. The 80GB HBM2e on the A100 permits very large batch sizes, pushing the arithmetic intensity well past the A100''s ridge point of 156 FLOPs/Byte, making the workload strictly compute-bound. The architecture should utilize a decoupled pattern: a distributed queue streams metadata/URLs to stateless GPU worker nodes, which asynchronously pull raw bytes from S3, run inference batches, and sink the quality scores to a fast key-value store or analytical database.'
  common_mistake: |
    **The Pitfall:** Misidentifying the bottleneck as object storage I/O and ignoring Model FLOPs Utilization (MFU).
    **The Rationale:** Dealing with 100B files sounds like an I/O problem, and marketing specs highlight peak TFLOPS.
    **The Consequence:** Under-provisioning GPUs by a factor of 2.5x because peak TFLOPS is physically impossible to achieve, causing the pipeline to miss the 14-day deadline.
  napkin_math: |
    - **Total Compute**: 100B samples × 6 TFLOPs/sample = 600 ZFLOPs.
    - **Effective GPU Throughput**: A100 peak is 312 TFLOPS FP16. At an estimated 40% MFU, effective throughput is 124.8 TFLOPS.
    - **Processing Rate**: 124.8 TFLOPS / 6 TFLOPs = 20.8 samples/sec per GPU.
    - **Time Constraint**: 14 days = 1,209,600 seconds.
    - **Samples per GPU**: 20.8 × 1,209,600 = 25,159,680 samples.
    - **Total GPUs**: 100B / 25,159,680 = **3,975 A100 GPUs**.
