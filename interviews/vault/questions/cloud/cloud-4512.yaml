title: API Gateway Queueing Model
scenario: An API gateway routes bursty requests to 4 H100 nodes. Each node processes
  a request in exactly 50ms. Traffic arrives at 60 requests/sec.
question: Select the appropriate Kendall notation queueing model for this setup and
  calculate the overall system utilization.
details:
  realistic_solution: Because service time is exact (50ms), the system is an M/D/4
    queue (Markovian arrival, Deterministic service, 4 servers). Each node handles
    1000/50 = 20 req/s. Total capacity is 4 * 20 = 80 req/s. Utilization is 60 / 80
    = 75%.
  common_mistake: Selecting an M/M/4 model which incorrectly assumes exponentially
    distributed (variable) service times.
  napkin_math: 60 / (4 * (1000/50)) = 0.75
