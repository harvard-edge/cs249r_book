title: Calculating Total Facility Energy for Training Cluster
scenario: You are provisioning a new cluster of 1,024 GPUs to train a foundation model. The cluster consists of 128 servers, with each 8-GPU node drawing 10.2 kW at peak load. The InfiniBand networking fabric adds an additional 150 kW of IT load. The target data center operates with a Power Usage Effectiveness (PUE) of 1.35. The training run takes exactly 30 days (720 hours) at peak utilization.
question: How many MWh will the 1,024-GPU cluster consume at the facility over the 30-day peak-utilization run?
details:
  realistic_solution: Execute a comprehensive facility power calculation. First, sum the total IT load (compute servers + networking fabric). Crucially, multiply the aggregate IT load by the facility PUE (1.35) to derive the gross facility power required (including chillers and power delivery). Finally, multiply the gross MW by the duration to find the absolute MWh.
  common_mistake: |
    **The Pitfall:** Calculating energy consumption strictly using the IT equipment power rating (GPUs and networking).
    **The Rationale:** Hardware specs only list the isolated IT load, making it easy for software-focused engineers to forget thermodynamics and facility overhead.
    **The Consequence:** Forgetting to multiply by the PUE underestimates the total facility energy consumption and associated billing by 35%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute: 128 servers @ 10.2 kW each.
       - Fabric: 150 kW.
       - PUE: 1.35.
       - Duration: 30 days (720 hours).
    2. **Calculations:**
       - Total Server Power: 128 * 10.2 kW = 1,305.6 kW.
       - Total IT Power: 1,305.6 kW + 150 kW = 1,455.6 kW.
       - Facility Power (with PUE): 1,455.6 kW * 1.35 = 1,965.06 kW = 1.96506 MW.
       - Total Energy: 1.96506 MW * 720 hours = 1,414.84 MWh.
    3. **Conclusion & Interpretation:**
       - **The 1,024-GPU cluster requires 1,414.84 MWh of facility energy over the month. Result: Power-Provisioning Bound.**
