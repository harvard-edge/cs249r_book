title: Calculating Total Facility Energy for H100 Cluster
scenario: You are provisioning a new cluster of 1,024 NVIDIA H100 GPUs to train a foundation model. The cluster consists of 128 servers, with each 8-GPU node drawing 10.2 kW at peak load. The InfiniBand networking fabric adds an additional 150 kW of IT load. The target data center operates with a Power Usage Effectiveness (PUE) of 1.35. If the training run takes exactly 30 days (720 hours) at peak utilization...
question: How many MWh will the 1,024-GPU cluster consume at the facility over the 30-day peak-utilization run?
details:
  realistic_solution: First, sum the total IT load (servers + networking). Then, multiply by the facility PUE to find the gross facility power required to support that IT load. Finally, multiply by the duration in hours to find the energy in MWh.
  common_mistake: |
    **The Pitfall:** Calculating energy consumption using only the IT equipment power (GPUs and networking).
    **The Rationale:** Hardware specs only list the IT load, so it's easy to forget facility overhead.
    **The Consequence:** Forgetting to multiply by the PUE to account for cooling and power delivery underestimates the total facility energy consumption by 35%.
  napkin_math: |
    - **Total Server Power:** 128 servers * 10.2 kW = 1,305.6 kW.
    - **Total IT Power:** 1,305.6 kW + 150 kW (Networking) = 1,455.6 kW (or ~1.45 MW).
    - **Facility Power (with PUE):** 1.4556 MW * 1.35 PUE = 1.965 MW.
    - **Total Energy:** 1.965 MW * 720 hours = **1,414.8 MWh**.
