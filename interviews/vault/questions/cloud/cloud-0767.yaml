title: The Warmup Learning Rate Schedule
scenario: You're training a transformer with batch size 4096 on 32 GPUs. Without learning rate warmup,
  the loss explodes to NaN within 50 steps. With a 2000-step linear warmup, training is stable. Your colleague
  says 'warmup is just a training trick.' What is the systems-level reason warmup is physically necessary
  for large-batch training?
question: "What is the systems-level reason warmup is physically necessary for large-batch training?"
details:
  realistic_solution: The systems reason is gradient variance and numerical precision. At initialization,
    weights are random, meaning gradients have extremely high variance across the batch. If the learning
    rate is large, early weight updates are chaotic and massive. This destroys the initial scale of the
    network, causing subsequent activations or gradients to grow exponentially. Because FP16 has a narrow
    representable range (max value ~65,504), these exploding values quickly overflow to NaN. Warmup keeps
    the update magnitude tiny while the network is in this unstable, high-variance initial state. It allows
    normalization statistics and weights to settle into a stable regime, after which the learning rate
    can be safely increased without overflowing FP16/BF16 types.
  common_mistake: '"Warmup helps the optimizer explore the loss landscape slowly." This is the high-level
    ML intuition, but it misses the concrete systems reason: preventing numerical overflow in low-precision
    (FP16) types due to initial high gradient variance.'
  napkin_math: At initialization, weights are drawn from random distributions. Without prior structural
    alignment to the data, gradient variance across batches is extremely high. Outlier gradients in early
    layers can easily exceed normal magnitudes by 10-100x. With a large target learning rate (e.g., lr=1e-1),
    these massive, high-variance gradients produce huge initial weight updates. This rapidly pushes subsequent
    forward-pass activations into non-linear saturation regions, or directly causes pre-LayerNorm activations
    or gradients to exceed 65,504, causing an immediate FP16 overflow to NaN. Warmup keeps early updates
    tiny (lr=1e-5), allowing weights and norm layers to adapt and align with the data distribution, which
    shrinks gradient variance before large steps are taken.
