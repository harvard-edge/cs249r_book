title: Evaluating RoCEv2 QoS for Mixed Workloads
scenario: Your team operates a dense H100 GPU cluster connected via a non-blocking 400 Gbps RoCEv2 leaf-spine
  fabric. The cluster mixes large-scale LLM training (bursty AllReduce and distributed checkpointing)
  and real-time inference (strict P99 latency <50ms). During synchronous training checkpoints, inference
  P99 latency spikes to 800ms. Evaluate the design of a Quality of Service (QoS) policy using DSCP, Explicit
  Congestion Notification (ECN), and Priority Flow Control (PFC). Justify how you would allocate buffer
  thresholds and map traffic types to Virtual Lanes to guarantee inference SLAs without causing PFC deadlocks
  or starving training workloads.
details:
  realistic_solution: 'Implement at least 3 traffic classes: TC0 (Best Effort/TCP), TC3 (RoCEv2 Training,
    PFC-enabled, ECN-marked at low depths), and TC5 (Inference, Strict Priority, no PFC, policed to 40Gbps).
    ECN on TC3 ensures training flows throttle via DCQCN before triggering PFC, reserving PFC as a last
    resort.'
  common_mistake: Relying solely on enabling PFC for all traffic, which causes head-of-line blocking and
    PFC storms. Alternatively, assigning strict priority to inference without rate-limiting it, or failing
    to configure ECN thresholds lower than PFC thresholds, leading to buffer exhaustion before congestion
    is signaled.
  napkin_math: 'For a 400Gbps (50GB/s) port on a switch with a 32MB shared buffer: Allocate a 2MB dedicated
    buffer for inference (TC5), absorbing 40us of microbursts (2MB / 50GB/s). For training (TC3) sharing
    a 20MB lossless pool, set ECN marking at 100KB and PFC pause at 1MB. Given a 10us RTT, DCQCN reacts
    before PFC triggers, leaving enough headroom for in-flight RDMA packets.'
