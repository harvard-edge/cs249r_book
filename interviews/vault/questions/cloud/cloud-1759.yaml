title: Evaluating RoCEv2 QoS for Mixed Workloads
scenario: Your team operates a dense GPU cluster connected via a non-blocking 400 Gbps RoCEv2 leaf-spine fabric. The cluster mixes large-scale LLM training (bursty AllReduce and distributed checkpointing) and real-time inference (strict P99 latency <50ms). During synchronous training checkpoints, inference P99 latency spikes to 800ms.
question: How would you configure DSCP, ECN, PFC, and virtual lanes so inference stays under 50 ms P99 during training checkpoints?
details:
  realistic_solution: 'Implement at least 3 traffic classes: TC0 (Best Effort/TCP), TC3 (RoCEv2 Training, PFC-enabled, ECN-marked at low depths), and TC5 (Inference, Strict Priority, no PFC, policed to 40Gbps). ECN on TC3 ensures training flows throttle via DCQCN before triggering PFC, reserving PFC as a last resort.'
  common_mistake: |
    **The Pitfall:** Relying solely on enabling PFC for all traffic.
    **The Rationale:** Candidates assume PFC is a universal solution for lossless networking without realizing it causes head-of-line blocking and PFC storms.
    **The Consequence:** Assigning strict priority to inference without rate-limiting it, or failing to configure ECN thresholds lower than PFC thresholds, leads to buffer exhaustion before congestion is signaled.
  napkin_math: |
    - **Port bandwidth:** 400Gbps = 50GB/s.
    - **Inference buffer:** Allocate a 2MB dedicated buffer for inference (TC5).
    - **Microburst absorption:** 2MB / 50GB/s = **40us of microbursts absorbed**.
    - **Training buffer:** For training (TC3) sharing a 20MB lossless pool, set ECN marking at 100KB and PFC pause at 1MB.
    - **Reaction time:** Given a 10us RTT, DCQCN reacts before PFC triggers, leaving enough headroom for in-flight RDMA packets.
