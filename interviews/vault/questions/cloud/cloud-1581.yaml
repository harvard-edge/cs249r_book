title: Diagnosing NVMe Cache Thrashing in CV Training
scenario: A team is training a distributed Computer Vision model on 256 A100 GPUs across 32 nodes. The
  150TB dataset is stored in cloud object storage. To fix an I/O bottleneck (25% GPU utilization), they
  add 4TB of local NVMe storage to each node to act as an LRU cache. However, GPU utilization only rises
  to 30%, and `iostat` shows continuous 100% NVMe write utilization. The training framework uses a true
  global random shuffle across the entire dataset every epoch.
details:
  realistic_solution: The global random shuffle causes severe cache thrashing. The team should implement
    deterministic node-level sharding (assigning a fixed subset of data to each node per epoch) and shuffle
    locally, or adopt a sequential streaming format like WebDataset to bypass local caching for single-epoch
    random reads.
  common_mistake: Assuming that simply inserting a high-speed NVMe tier into the storage hierarchy automatically
    mitigates object storage latency, without accounting for how global random access patterns interact
    with cache eviction.
  napkin_math: Total dataset = 150TB. A single node's cache = 4TB. With a uniform global random shuffle,
    the probability of a node needing a sample that is already in its cache is roughly 4TB / 150TB ≈ 2.6%.
    This means ~97.4% of data requests result in a cache miss, forcing a fetch from object storage and
    a subsequent write/eviction on the NVMe drive, ultimately bottlenecking the node on disk writes.
