title: Evaluating GPU Upgrades for LLM Inference
scenario: Your team is evaluating a fleet upgrade from NVIDIA A100 (2 TB/s memory bandwidth, 312 TFLOPS
  BF16) to H100 (3.35 TB/s memory bandwidth, 989 TFLOPS BF16) GPUs to serve Llama-2 70B for a real-time
  chatbot application. The application strictly operates at batch size 1 to minimize time-to-first-token
  (TTFT). Leadership expects a 3.1x generation speedup based on the raw compute (TFLOPS) improvement.
  Evaluate this expectation, calculate the actual expected speedup, and justify the architectural limitation.
question: "Will H100s give the expected 3.1x speedup for batch-1 Llama-2 70B decoding, and what speedup should leadership expect?"
details:
  realistic_solution: Recognize that autoregressive generation at batch size 1 is strictly memory-bandwidth
    bound. The arithmetic intensity is ~2 FLOPs/byte (loading 70GB of weights per GPU to perform ~140G
    FLOPs per token). Because this is far below both GPUs' roofline ridge points, performance scales strictly
    with memory bandwidth. The true expected speedup is ~1.67x (3.35 TB/s / 2.0 TB/s). To better utilize
    the compute capacity, you must advocate for techniques that increase arithmetic intensity, such as
    continuous batching, or reduce memory traffic via speculative decoding.
  common_mistake: Assuming inference speed scales linearly with compute capability (TFLOPS), predicting
    a 3.1x speedup, while completely ignoring the arithmetic intensity of autoregressive generation.
  napkin_math: 'Llama-2 70B BF16 weight memory: 70B * 2 bytes = 140 GB. This requires Tensor Parallelism
    (TP=2) across two 80GB GPUs. Each GPU holds 70 GB. Max generation throughput on A100 = 2000 GB/s /
    70 GB/token = 28.5 tokens/sec. Max throughput on H100 = 3350 GB/s / 70 GB/token = 47.8 tokens/sec.
    Actual Speedup = 47.8 / 28.5 = 1.67x (not 3.1x).'
