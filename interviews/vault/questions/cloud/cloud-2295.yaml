title: Fraud Detection Feature Latency Bottleneck
scenario: 'A real-time fraud detection pipeline processes 5,000 QPS with a strict end-to-end SLA of 100ms
  P99. Currently, the P99 latency is 180ms. The breakdown is: 40ms to fetch 200 static user features from
  a Redis feature store, 90ms to compute 50 real-time sliding-window features (e.g., ''transaction volume
  in last 10 mins'') from raw Kafka events, 20ms to serialize/assemble the feature vector via JSON, and
  30ms for XGBoost model inference. These steps execute sequentially.'
details:
  realistic_solution: 'To meet the 100ms SLA, we must decompose and attack the feature pipeline bottlenecks.
    First, execute the Redis feature fetch and the real-time feature computation in parallel, which immediately
    drops the feature gathering time from 130ms to max(40ms, 90ms) = 90ms. Second, optimize the real-time
    computation: instead of calculating sliding windows on-the-fly from raw Kafka events, use a stream
    processor (like Flink) to pre-aggregate tumbling windows and materialize them into a fast KV store.
    This turns a 90ms complex streaming join/aggregation into a simple 10ms lookup. Third, replace the
    JSON serialization with a zero-copy or compact binary format like Protobuf or FlatBuffers, reducing
    assembly time from 20ms to 5ms.'
  common_mistake: Attempting to optimize the XGBoost model using quantization or TensorRT, which only
    addresses 30ms of the 180ms total.
  napkin_math: 'Current P99: 40ms (Redis) + 90ms (Kafka RT) + 20ms (JSON) + 30ms (Inference) = 180ms.
    Step 1 (Parallelize): max(40, 90) + 20 + 30 = 140ms. Step 2 (Pre-aggregate RT): max(40, 10) + 20 +
    30 = 90ms. Step 3 (Protobuf): max(40, 10) + 5 + 30 = 75ms. Final P99 is 75ms, safely below the 100ms
    SLA.'
