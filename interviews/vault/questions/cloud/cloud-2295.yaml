title: Fraud Detection Feature Latency Bottleneck
scenario: 'A real-time fraud detection pipeline processes 5,000 QPS with a strict
  end-to-end SLA of 100ms P99. Currently, the P99 latency is 180ms. The breakdown
  is: 40ms to fetch 200 static user features from a Redis feature store, 90ms to compute
  50 real-time sliding-window features from raw Kafka events, 20ms to serialize/assemble
  the feature vector via JSON, and 30ms for XGBoost model inference. These steps execute
  sequentially.'
question: How would you reduce P99 latency from 180ms to below the 100ms SLA?
details:
  realistic_solution: 'To meet the 100ms SLA, we must decompose and attack the feature
    pipeline bottlenecks. First, execute the Redis feature fetch and the real-time
    feature computation in parallel, which immediately drops the feature gathering
    time from 130ms to max(40ms, 90ms) = 90ms. Second, optimize the real-time computation:
    instead of calculating sliding windows on-the-fly from raw Kafka events, use a
    stream processor (like Flink) to pre-aggregate tumbling windows and materialize
    them into a fast KV store. This turns a 90ms complex streaming join/aggregation
    into a simple 10ms lookup. Third, replace the JSON serialization with a zero-copy
    or compact binary format like Protobuf or FlatBuffers, reducing assembly time
    from 20ms to 5ms.

    '
  common_mistake: '**The Pitfall:** Attempting to optimize the XGBoost model using
    quantization or TensorRT.

    **The Rationale:** Missing the architectural big picture and focusing solely on
    the ML component, even when it is the smallest contributor to the overall latency.

    **The Consequence:** Wasting weeks on model optimization to shave 10ms, while
    the pipeline still fundamentally fails the 100ms SLA.

    '
  napkin_math: '- Current Sequential P99: 40ms (Redis) + 90ms (Kafka) + 20ms (JSON)
    + 30ms (Inference) = 180ms.

    - Step 1 (Parallelize Fetch): Execute Redis and Kafka concurrently -> max(40,
    90) + 20 + 30 = 140ms.

    - Step 2 (Pre-aggregate Kafka): Use Flink to pre-compute tumbling windows into
    a KV store, reducing 90ms to 10ms lookup -> max(40, 10) + 20 + 30 = 90ms.

    - Step 3 (Binary Serialization): Replace JSON with Protobuf to reduce assembly
    from 20ms to 5ms -> max(40, 10) + 5 + 30 = 75ms.

    - **Result:** **The final optimized P99 is 75ms, safely meeting the 100ms SLA
    through system-level parallelization and pre-aggregation.**

    '
