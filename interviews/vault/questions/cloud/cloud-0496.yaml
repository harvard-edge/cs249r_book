title: The Two-Node Scaling Cliff (cloud-0496)
scenario: You are fine-tuning a 70B parameter LLM. Your training job scales almost linearly on a single 8xH100 node where all GPUs are interconnected via NVLink. When you expand the job to two nodes (16 GPUs total), connected by an InfiniBand NDR switch, you observe that the training throughput only increases by 20%, far from the expected near-2x improvement. Your profiler reports that the `All-Reduce` gradient synchronization step now dominates 90% of the wall-clock time per step.
question: What is the most likely performance bottleneck causing the 20% throughput gain and 90% All-Reduce time on two H100 nodes?
details:
  realistic_solution: The bottleneck is the inter-node InfiniBand network. Within a single node, the 8 H100 GPUs exchange gradients over the 900 GB/s NVLink fabric, a process that is extremely fast. When scaling to two nodes, the `All-Reduce` operation must send half of the gradients over the InfiniBand network, which has a bandwidth of only 50 GB/s (400 Gbps). This 18x drop in communication bandwidth creates a massive stall, causing GPUs to wait for data from the other node and preventing the system from achieving linear scaling.
  common_mistake: |
    **The Pitfall:** Underestimating the bandwidth gap between on-node and off-node interconnects.
    **The Rationale:** Engineers assume that a state-of-the-art datacenter network like InfiniBand provides comparable throughput to internal GPU fabrics.
    **The Consequence:** They blame the PCIe bus or CPU drivers, completely missing that inter-node networking is an order of magnitude slower than NVLink.
  napkin_math: |
    - **Gradient Size:** 70B parameters × 2 bytes = 140 GB.
    - **All-Reduce Transfer:** ~280 GB total movement.
    - **Intra-node (NVLink):** 280 GB / 900 GB/s = 0.31 seconds.
    - **Inter-node (InfiniBand):** 280 GB / 50 GB/s = 5.6 seconds.
    - **Conclusion:** Network time explodes by **18x**, causing GPUs to idle while waiting to synchronize over the slower inter-node link.
  options:
  - The PCIe Gen5 bus is saturated, as it has to carry data from the GPU to the InfiniBand NIC.
  - The CPU is unable to schedule the network transfers fast enough, leading to a driver-level bottleneck.
  - The inter-node InfiniBand network bandwidth is the bottleneck, being over an order of magnitude slower than the on-node NVLink fabric.
  - The system RAM (DRAM) is too slow to stage the gradients before they are sent over the network.
  correct_index: 2
