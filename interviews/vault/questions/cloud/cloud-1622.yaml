title: Diagnosing Throughput Drop Migrating from MPS to MIG
scenario: You migrate a low-batch-size LLM inference service from running 4 instances concurrently via
  Multi-Process Service (MPS) on a single A100 40GB to using 4 MIG instances (2g.10gb) to improve strict
  fault isolation. After the migration, the P99 latency doubles and overall throughput drops by 30%, despite
  the request workload remaining identical. System metrics show GPU compute utilization is only around
  60% per MIG slice. Why did moving from MPS to MIG cause this specific performance degradation, and what
  is the root cause bottleneck?
details:
  realistic_solution: Identify that low-batch LLM inference (particularly token generation) is heavily
    memory-bandwidth bound. MPS dynamically shares the full GPU bandwidth across processes, allowing bursts,
    whereas MIG hard-caps the slice bandwidth. The solution is to either revert to MPS if latency is more
    critical than strict fault/memory isolation, or use fewer, larger MIG slices (e.g., 3g.20gb) to provide
    higher dedicated bandwidth.
  common_mistake: Candidates often assume MIG partitioning has no performance penalty compared to MPS,
    failing to realize that MIG strictly partitions memory bandwidth and L2 cache, which removes the ability
    for bursty workloads to utilize the full GPU's idle resources.
  napkin_math: 'A100 total memory bandwidth = 1,555 GB/s. A 2g.10gb MIG slice gets exactly 1/4 of the
    bandwidth: 1555 / 4 = ~388 GB/s. Time to read 5GB of weights for a decoding step: MPS (bursting, full
    bandwidth) = 5GB / 1555 GB/s = ~3.2ms. MIG (isolated bandwidth) = 5GB / 388 GB/s = ~12.9ms. This strict
    bandwidth partitioning causes a 4x latency increase for memory-bound operations, severely degrading
    P99 latency.'
