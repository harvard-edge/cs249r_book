title: GPU Node Autoscaling in Kubernetes
scenario: You run an inference service on Kubernetes with the cluster autoscaler. GPU node spin-up takes 5-7 minutes (vs 30 seconds for CPU nodes).
question: How do you design autoscaling to handle traffic spikes without 5-minute cold starts?
details:
  realistic_solution: 'Maintain 1-2 GPU nodes in a warm standby pool with GPU drivers loaded. Use predictive scaling with KEDA based on traffic patterns. Implement low-priority placeholder pods to reserve capacity for fast eviction when real workloads arrive.'
  common_mistake: |
    **The Pitfall:** Relying solely on reactive autoscaling (HPA + Cluster Autoscaler).
    **The Rationale:** Engineers assume standard CPU autoscaling practices apply to GPUs, ignoring the massive driver and hardware initialization overhead.
    **The Consequence:** By the time nodes boot, 5-7 minutes have passed, severely violating SLAs during traffic spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Warm Pool: 2 H100 nodes.
       - Node Cost: $24/hr per node.
       - SLA Violation penalty: $0.01/failed_req at 1000 req/s.
       - Spin-up time: 5 minutes.
    2. **Calculations:**
       - Warm pool daily cost: 2 * $24/hr * 24 hours = $1,152/day.
       - SLA Violation cost: 5 min * 60s/min * 1000 req/s * $0.01 = $3,000 per incident.
       - Break-even: $3,000 / $1,152/day = 2.6 days.
    3. **Conclusion & Interpretation:**
       **Result: 2.6 Days Break-Even (Latency-Bound Mitigated).** Maintaining a warm GPU pool is highly cost-effective if it prevents just one 5-minute SLA violation every 2.6 days.
