title: Carbon-Aware Scheduling Tradeoffs
scenario: Your 2,000-GPU cluster in Texas runs flexible offline RLHF training. The grid's carbon intensity fluctuates daily from 200g CO2/kWh to 600g CO2/kWh. The sustainability team proposes pausing all training for 6 hours daily during peak carbon hours to meet ESG goals. A hardware engineer objects, citing idle power and TCO.
question: Should you pause RLHF training for 6 high-carbon hours, or use another strategy to reduce carbon, and why?
details:
  realistic_solution: Pausing jobs is often suboptimal because a suspended GPU node still draws significant idle power (often 20-30% of peak) while accomplishing zero useful work, degrading the overall energy-efficiency metrics. Furthermore, prolonging the training time reduces the amortization of the embedded carbon (manufacturing footprint) of the GPUs over useful jobs. Instead of a full pause, a better tradeoff is implementing DVFS (Dynamic Voltage and Frequency Scaling) during peak carbon hours. Capping power to 60% of peak TDP might retain 80% of throughput due to non-linear power-to-frequency scaling (CMOS power equation $P \propto fV^2$). This reduces the immediate power draw when grid carbon is dirty, keeps the GPUs in a high-efficiency regime (perf/watt), and avoids wasting baseline idle power.
  common_mistake: |
    **The Pitfall:** Assuming pausing jobs completely during high-carbon periods will strictly reduce total carbon footprint.
    **The Rationale:** Candidates fail to factor in the substantial idle power draw of a suspended GPU node (often 20-30% of peak) accomplishing zero useful work.
    **The Consequence:** Wasting massive amounts of power on idle nodes while prolonging total training time, degrading energy efficiency.
  napkin_math: |
    - Active node power: 8 GPUs * 400W + 1000W host = 4.2 kW.
    - Idle node power: 8 GPUs * 75W + 500W host = 1.1 kW.
    - Pause strategy for 6h: 1.1 kW * 6h = 6.6 kWh. Total CO2 = 6.6 * 600g = 3.96 kg CO2 per node just idling for 0 tokens!
    - DVFS cap at 250W/GPU: Node draws 8 * 250W + 1000W = 3.0 kW.
    - DVFS strategy for 6h: 3.0 kW * 6h = 18 kWh, but retains ~80% throughput.
    - **DVFS radically improves the carbon-per-token compared to idling by keeping GPUs in a high-efficiency regime.**
