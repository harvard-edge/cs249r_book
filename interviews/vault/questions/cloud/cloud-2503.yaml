title: Carbon-Aware Scheduling Tradeoffs
scenario: Your 2,000-GPU cluster in Texas runs flexible offline RLHF training. The grid's carbon intensity
  fluctuates daily from 200g CO2/kWh (high wind/solar) to 600g CO2/kWh (gas/coal peaks). The sustainability
  team proposes pausing all training for 6 hours daily during peak carbon hours to meet ESG goals. A hardware
  engineer objects, citing idle power and TCO. Evaluate the tradeoffs of this pause strategy.
details:
  realistic_solution: Pausing jobs is often suboptimal because a suspended GPU node still draws significant
    idle power (often 20-30% of peak) while accomplishing zero useful work, degrading the overall energy-efficiency
    metrics. Furthermore, prolonging the training time reduces the amortization of the embedded carbon
    (manufacturing footprint) of the GPUs over useful jobs. Instead of a full pause, a better tradeoff
    is implementing DVFS (Dynamic Voltage and Frequency Scaling) during peak carbon hours. Capping power
    to 60% of peak TDP might retain 80% of throughput due to non-linear power-to-frequency scaling (CMOS
    power equation $P \propto fV^2$). This reduces the immediate power draw when grid carbon is dirty,
    keeps the GPUs in a high-efficiency regime (perf/watt), and avoids wasting baseline idle power.
  common_mistake: Assuming pausing jobs completely during high-carbon periods will strictly reduce total
    carbon footprint without factoring in idle power draw.
  napkin_math: 'Active node: 8 GPUs * 400W + 1000W host = 4.2kW. Idle node: 8 GPUs * 75W + 500W host =
    1.1kW. Pause strategy for 6h: burns 1.1kW * 6h = 6.6 kWh of dirty energy (600g/kWh) for 0 tokens.
    Total CO2 = 3.96 kg CO2 per node just idling! DVFS cap at 250W/GPU: Node draws 8*250 + 1000 = 3.0kW.
    You burn 3.0kW * 6h = 18 kWh, but retain ~80% throughput, radically improving the carbon-per-token
    compared to idling.'
