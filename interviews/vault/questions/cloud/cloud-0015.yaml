title: The FP16 Memory Footprint
scenario: Your team is upgrading a production language model from 7B to 13B parameters as part of a new rollout. Your serving stack uses NVIDIA H100 GPUs and the model is served in FP16 precision.
question: "How much HBM is needed for the FP16 weights of the new 13B model, and does it fit on a single 80GB H100?"
details:
  realistic_solution: The new 13B model will require 26 GB of HBM to store the model weights. This is a significant increase from the 14 GB required by the 7B model, but it still fits comfortably within the 80 GB of HBM available on a single H100 GPU. This calculation is critical for capacity planning in your orchestration system (like Kubernetes) to ensure pods are scheduled on nodes with sufficient available GPU memory.
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for inference with training.
    **The Rationale:** During training with the Adam optimizer, memory usage is ~16 bytes per parameter. For inference, it's only the model weights.
    **The Consequence:** Massive over-provisioning of GPU hardware.
  napkin_math: |
    1. Model Size: 13 Billion parameters
    2. Data Type: FP16 = 2 bytes per parameter
    3. Total Weight Memory: 13B * 2 bytes = 26 GB
    4. H100 Capacity: 80 GB
    5. **Result: 26 GB / 80 GB = 32.5% of total VRAM, fitting easily onto a single H100.**
  options:
  - '13 GB. (Error: Assumes 1 byte per parameter, as with INT8 quantization)'
  - '208 GB. (Error: Confuses inference memory with training memory using the Adam optimizer, which needs ~16 bytes/param)'
  - '26 GB. (Correct: 13 billion parameters * 2 bytes for FP16 precision)'
  - '52 GB. (Error: Assumes 4 bytes per parameter, as with FP32 precision)'
  correct_index: 2
