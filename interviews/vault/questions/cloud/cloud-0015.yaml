title: The FP16 Memory Footprint
scenario: Your team is upgrading a production language model from 7B to 13B parameters as part of a new
  rollout. Your serving stack uses NVIDIA H100 GPUs and the model is served in FP16 precision. To inform
  the container orchestration plan, calculate the memory required for the new 13B model's weights and
  explain the impact on a single GPU's memory capacity.
details:
  realistic_solution: The new 13B model will require 26 GB of HBM to store the model weights. This is
    a significant increase from the 14 GB required by the 7B model, but it still fits comfortably within
    the 80 GB of HBM available on a single H100 GPU. This calculation is critical for capacity planning
    in your orchestration system (like Kubernetes) to ensure pods are scheduled on nodes with sufficient
    available GPU memory.
  common_mistake: Engineers often confuse the memory requirements for *training* versus *inference*. During
    training with the Adam optimizer, memory usage is ~16 bytes per parameter. For inference, it's only
    the model weights, which is much lower. Another common error is using the wrong number of bytes for
    the given precision (e.g., 4 for FP32 or 1 for INT8 instead of 2 for FP16).
  napkin_math: Model parameters = 13 Billion. In FP16 format, each parameter requires 2 bytes of storage.
    Total weight memory = 13B * 2 bytes = 26 GB. An H100 provides 80 GB of HBM3. Therefore, the weights
    consume 26 GB / 80 GB = 32.5% of the total VRAM, leaving 54 GB available for the KV cache, activations,
    and the orchestration overhead.
  options:
  - '13 GB. (Error: Assumes 1 byte per parameter, as with INT8 quantization)'
  - '208 GB. (Error: Confuses inference memory with training memory using the Adam optimizer, which needs
    ~16 bytes/param)'
  - '26 GB. (Correct: 13 billion parameters × 2 bytes for FP16 precision)'
  - '52 GB. (Error: Assumes 4 bytes per parameter, as with FP32 precision)'
  correct_index: 2
