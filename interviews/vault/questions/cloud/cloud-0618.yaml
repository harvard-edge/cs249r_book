title: The Energy-Movement Invariant
scenario: We pruned 50% of the weights from our model, cutting the total MAC (Multiply-Accumulate) operations in half. However, the energy consumption of the node barely dropped.
question: Why did pruning 50% of weights halve MACs but barely reduce node energy consumption?
details:
  realistic_solution: You forgot the Energy-Movement Invariant. Fetching a bit of data from off-chip DRAM costs roughly 100-200x more energy than the math operation (MAC) itself. If your pruning was unstructured, you still have to load the same dense matrices from memory before applying a sparse mask, yielding zero energy savings.
  common_mistake: |
    **The Pitfall:** Blaming the GPU's idle power draw.
    **The Rationale:** Candidates often assume that since the compute unit is doing less work, the remaining power must be baseline idle power, missing the fact that memory bandwidth dictates power.
    **The Consequence:** Proposing ineffective power-saving measures like underclocking the core instead of optimizing data movement.
  napkin_math: |
    - A single MAC operation costs ~1 pJ of energy.
    - An off-chip DRAM access costs ~200 pJ (200x more).
    - If a model does 1 TFLOP of math (1 J) but moves 100 GB of data (20 J), the energy split is dominated by data movement (20:1).
    - **Cutting compute in half saves almost nothing (0.5 J out of 21 J total).**
