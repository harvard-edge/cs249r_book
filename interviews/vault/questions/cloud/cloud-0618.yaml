title: The Energy-Movement Invariant
scenario: We pruned 50% of the weights from our model, cutting the total MAC (Multiply-Accumulate) operations
  in half. However, the energy consumption of the node barely dropped. Why?
question: "Why did pruning 50% of weights halve MACs but barely reduce node energy consumption?"
details:
  realistic_solution: You forgot the Energy-Movement Invariant. Fetching a bit of data from off-chip DRAM
    costs roughly 100-200x more energy than the math operation (MAC) itself. If your pruning was unstructured,
    you still have to load the same dense matrices from memory before applying a sparse mask, yielding
    zero energy savings.
  common_mistake: '"The GPU is still drawing idle power." Idle power exists, but the real issue is where
    the energy actually goes.'
  napkin_math: 'A MAC operation costs ~1 pJ. A DRAM access costs ~200 pJ. If your model does 1 TFLOP of
    math but moves 100 GB of data, the energy split is: compute = 1 J, data movement = 20 J. Data movement
    dominates by 20×. Cutting compute in half saves almost nothing.'
