title: Toxicity Classifier Bandwidth Saturation
scenario: To comply with organizational guardrails, a toxicity classifier is deployed alongside a production LLM on the same GPU (80 GB HBM3, 3.35 TB/s bandwidth, 989 TFLOPS FP16). The governance SLA requires the classifier to sustain 5 TFLOPS of continuous compute. The classifier model has an arithmetic intensity of 0.5 FLOPs/Byte. Upon enabling this guardrail, the LLM's decode throughput plummets, and the classifier fails to meet its latency SLA.
question: Why does enabling a 5 TFLOPS guardrail classifier with 0.5 FLOPs/Byte intensity collapse LLM throughput on the GPU?
details:
  realistic_solution: The root cause is complete memory bandwidth saturation. While the compute requirement is negligible for an H100, the classifier's low arithmetic intensity makes it heavily memory-bound. It attempts to pull more bandwidth than the hardware can support, saturating the HBM3 bus and completely starving the LLM's decode phase, which is also memory-bandwidth bound.
  common_mistake: |
    **The Pitfall:** Assuming that a low TFLOPS requirement implies a low overall hardware burden.
    **The Rationale:** Engineers compare 5 TFLOPS to the GPU's 989 TFLOPS peak (<1%) and assume the task is lightweight, ignoring arithmetic intensity.
    **The Consequence:** Deploying memory-bound micro-models alongside memory-bound LLM decoding completely saturates the memory bus, destroying overall system throughput.
  napkin_math: |
    1. **Required Bandwidth Formula:** Required Bandwidth = Target Compute / Arithmetic Intensity.
    2. **Classifier Requirement:** 5 TFLOPS / 0.5 FLOPs/Byte = 10 TB/s.
    3. **Hardware Limit:** The hardware's maximum HBM3 bandwidth is 3.35 TB/s.
    4. **Conclusion:** Because **10 TB/s > 3.35 TB/s**, the guardrail classifier instantly hits the memory wall, saturating the bus and starving the LLM.
