title: 'Optimizing MoE LLM Training on H100s: Diagnosing and Fixing Interconnect Bottlenecks'
scenario: You are training a 1.5 trillion parameter MoE model on 64 GPUs. The GPUs are in 8 nodes connected by InfiniBand HDR (200 Gb/s). During the expert dispatch phase, training throughput is low and GPU utilization dips to 40-50%.
question: How would you diagnose and fix the MoE expert-dispatch bottleneck on 64 GPUs, and quantify the expected throughput improvement?
details:
  realistic_solution: 'Use nsys to profile kernel execution and IB stats. The inter-node expert dispatch uses AllToAll. Upgrading the fabric from HDR to NDR doubles bandwidth, drastically reducing network stall time.'
  common_mistake: |
    **The Pitfall:** Focusing solely on individual GPU compute utilization.
    **The Rationale:** Engineers ignore inter-GPU AllToAll communication patterns caused by expert routing.
    **The Consequence:** Misattributing the bottleneck to CPU overhead and failing to optimize the network.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Expert data payload = 50 GB per step.
       - HDR effective bandwidth = 100 GB/s. NDR = 200 GB/s.
    2. **Calculations:**
       - HDR dispatch time = 50 GB / 100 GB/s = 500 ms.
       - NDR dispatch time = 50 GB / 200 GB/s = 250 ms.
       - Speedup = 2.0s (total HDR step) / 1.75s (total NDR step) = 1.14x.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound (NDR upgrade yields a 14% throughput improvement).**
