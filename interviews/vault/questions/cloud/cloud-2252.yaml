title: Designing the End-to-End Pre-Training Data Pipeline
scenario: 'You are hired as the founding data infrastructure engineer at a new LLM lab. Your mandate:
  design the complete data pipeline from raw web crawl to training-ready token shards for a 2 trillion
  token pre-training corpus. The pipeline must handle: (1) ingestion of 500 TB/month of Common Crawl +
  proprietary data sources, (2) language detection and filtering, (3) PII removal, (4) exact and fuzzy
  deduplication against the full historical corpus, (5) quality scoring with multiple signals, (6) domain
  classification and mixing, (7) tokenization and shard packaging, and (8) curriculum-aware shard ordering.
  The pipeline must be fully reproducible (given the same raw inputs and config, produce bit-identical
  outputs) and complete processing of each monthly crawl within 5 days using a budget of $50K/month in
  cloud compute. Design the architecture, justify your technology choices, and calculate whether the budget
  is feasible.'
details:
  realistic_solution: 'Use a staged, columnar architecture with heterogeneous compute. Stage 1 — Ingestion
    & Extraction (CPU, 2 days): Download raw WARC files, extract text with trafilatura, detect language
    (fastText), write Parquet with columns [doc_id, url, text, language, source]. Technology: Spark on
    spot instances (cheap, embarrassingly parallel, tolerant of spot interruptions with lineage-based
    recovery). Stage 2 — Deduplication (CPU, 1 day): Exact dedup via SHA-256 hash (trivial). Fuzzy dedup
    via MinHash LSH against an external persistent index (not Spark state). The index is a sharded RocksDB
    cluster that persists across monthly runs. New documents query the index; matches are flagged; new
    hashes are inserted. Technology: Ray actors for the LSH index service + Spark for the batch MinHash
    computation. Stage 3 — Quality & Safety Scoring (GPU + CPU, 1 day): GPU workload: perplexity from
    1B reference LM, toxicity classifier. CPU workload: heuristic scores. Write score columns to the same
    Parquet table. Technology: Ray for heterogeneous GPU/CPU scheduling. Stage 4 — Composition & Packaging
    (CPU, 0.5 days): Apply domain mixing weights, sample documents, tokenize (SentencePiece), pack into
    1 GB shards with curriculum-aware ordering (tier by quality score, shuffle within tier). Write final
    training shards. Technology: Spark. Reproducibility: every stage logs a manifest (input files, code
    version, config hash, random seeds). The pipeline''s output is uniquely determined by its manifest.
    Budget check below.'
  common_mistake: '"Build a single Airflow DAG that chains Spark jobs." This fails on several fronts:
    monolithic stages cannot be independently re-run for ablation, the dedup step requires state across
    monthly crawls (not just within one), PII removal may need GPU inference (different compute shape
    than CPU-heavy heuristics), and reproducibility requires deterministic execution (random shuffles,
    hash seeds, floating-point ordering must all be pinned).'
  napkin_math: 'Stage 1: 500 TB input, spot instances at $0.03/vCPU-hr. At 100 MB/s/core throughput: 500
    TB / (0.1 GB/s × 3600) = 1,389 core-hours. With overhead (HTML parsing, language detection): ~10,000
    core-hours × $0.03 = $300. Stage 2: MinHash (128 hashes × 500B documents = 64 trillion hash computations).
    At 10M hashes/s/core: 6.4M core-seconds = 1,778 core-hours × $0.03 = $53. LSH index queries: 500B
    docs × 20 bands = 10T lookups against RocksDB. 100K lookups/s/core: 100M core-seconds on-demand (need
    durability) at $0.05/hr = $1,389. Stage 3: Perplexity scoring on GPUs: 500 TB ≈ 1T tokens at 10K tokens/s/GPU:
    100M GPU-seconds = 27,778 GPU-hours × $1.50 (spot A100) = $41,667. Heuristics (CPU): ~5,000 core-hours
    × $0.03 = $150. Stage 4: Tokenization + packing: ~2,000 core-hours × $0.03 = $60. Total: $300 + $53
    + $1,389 + $41,667 + $150 + $60 ≈ $43,600/month. Within the $50K budget, with ~$6K margin for re-runs
    and debugging.'
