title: Designing the End-to-End Pre-Training Data Pipeline
scenario: You are hired as the founding data infrastructure engineer at a new LLM lab. Your mandate is to design the complete data pipeline from raw web crawl to training-ready token shards for a 2 trillion token pre-training corpus. The pipeline must handle ingestion of 500 TB/month, language detection, PII removal, deduplication, quality scoring, domain mixing, tokenization, and shard ordering. The pipeline must be fully reproducible and complete processing within 5 days using a budget of $50K/month in cloud compute.
question: "How would you design the full reproducible pipeline for the 2T-token corpus, justify the technology choices, and test the $50K/month budget?"
details:
  realistic_solution: |
    Use a staged, columnar architecture with heterogeneous compute. Stage 1 (Ingestion & Extraction, CPU): Download raw WARC files, extract text, detect language, write Parquet. Technology: Spark on spot instances. Stage 2 (Deduplication, CPU): Exact dedup via SHA-256 hash. Fuzzy dedup via MinHash LSH against an external persistent index. Technology: Ray actors for the LSH index service + Spark for batch MinHash. Stage 3 (Quality & Safety Scoring, GPU + CPU): GPU workload for perplexity/toxicity. CPU workload for heuristic scores. Technology: Ray for heterogeneous scheduling. Stage 4 (Composition & Packaging, CPU): Apply weights, tokenize, pack into 1 GB shards. Technology: Spark. Reproducibility: every stage logs a manifest.
  common_mistake: |
    **The Pitfall:** Building a single monolithic Airflow DAG that chains Spark jobs.
    **The Rationale:** Candidates try to force a complex, multi-stage, stateful process into a stateless batch paradigm.
    **The Consequence:** Monolithic stages cannot be independently re-run, PII removal lacks GPU compute flexibility, and reproducibility is lost due to non-deterministic execution.
  napkin_math: |
    - Stage 1 (Ingestion): 500 TB / (0.1 GB/s * 3600) = 1,389 core-hours. With overhead: ~10,000 core-hours * $0.03 = $300.
    - Stage 2 (Dedup): MinHash 6.4M core-seconds = 1,778 core-hours * $0.03 = $53. LSH index queries: 100M core-seconds at $0.05/hr = $1,389.
    - Stage 3 (Scoring): GPUs 100M GPU-seconds = 27,778 GPU-hours * $1.50 = $41,667. CPU heuristics: ~5,000 core-hours * $0.03 = $150.
    - Stage 4 (Packaging): ~2,000 core-hours * $0.03 = $60.
    - Total: $300 + $53 + $1,389 + $41,667 + $150 + $60 = $43,619/month.
    - **Conclusion:** **The pipeline fits within the $50K budget, leaving a ~$6K margin.**
