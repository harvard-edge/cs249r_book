title: LLM Serving Batch Size Energy
scenario: You are serving Llama-3-70B on 8xH100 instances. At batch size 1, Time-to-First-Token (TTFT) is 20ms, and the node draws 3.5 kW. At batch size 64, TTFT rises to 400ms, and the node draws 6.5 kW. The product team demands a strict 50ms TTFT SLA.
question: How would you meet the 50ms TTFT SLA without destroying cost per token for Llama-3-70B serving?
details:
  realistic_solution: 'Enforcing a strict 50ms TTFT by keeping batch sizes near 1 leads to severe underutilization of the GPU''s compute capacity while still incurring massive static and memory-transfer power costs. At BS=1, the operation is heavily memory-bandwidth bound; you are paying to power the entire HBM stack and interconnect just to process a single sequence. This results in an extremely high energy cost per token and poor TCO. To balance the tradeoff, you should implement continuous batching and decouple the prefill phase from the decode phase (chunked prefill). By processing prefill chunks in parallel with decodes, you can maintain high compute density (pushing power draw up, but drastically increasing tokens/second) while keeping TTFT within SLA. The goal is to maximize the ratio of active compute power to fixed background power, minimizing the Joules per token.'
  common_mistake: |
    **The Pitfall:** Optimizing solely for SLA by forcing batch size 1.
    **The Rationale:** Candidates ignore that memory bandwidth dominates power draw at low batch sizes.
    **The Consequence:** Destroying performance-per-watt and ruining unit economics for the service.
  napkin_math: |
    **Assumptions & Constraints:**
    - BS=1: 3.5 kW (3500 W), 50 tps.
    - BS=64: 6.5 kW (6500 W), 2000 tps.

    **Calculations:**
    - BS=1 Energy: 3500 W / 50 tps = 70 Joules/token.
    - BS=64 Energy: 6500 W / 2000 tps = 3.25 Joules/token.
    - Efficiency Ratio: 70 / 3.25 = 21.5x more energy efficient at BS=64.

    **Conclusion & Interpretation:**
    - **Result: 21.5x efficient (Power-Inefficient)**. Forcing BS=1 for SLA wastes massive static power; continuous batching solves this.
