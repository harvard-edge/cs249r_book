title: H100 Vector Addition Utilization Collapse
scenario: You are profiling a simple element-wise addition of two large 1 billion element FP16 tensors on an H100 GPU in the cloud. The H100 specifications are provided as: 80 GB HBM3, 3.35 TB/s memory bandwidth, 989 TFLOPS FP16 compute, and a ridge point of ~295 FLOPs/Byte. Despite the massive compute capabilities, the profiler shows the compute utilization is less than 0.1% of the peak TFLOPS.
question: Why does FP16 vector addition on an H100 show less than 0.1% compute utilization despite the GPU's 989 TFLOPS peak?
details:
  realistic_solution: The root cause is that vector addition is completely memory-bandwidth bound, operating at an arithmetic intensity drastically lower than the GPU's ridge point of 295 FLOPs/Byte. According to the roofline model, the maximum theoretical performance is strictly dictated by how fast data can be moved across the HBM3 interface, rendering the vast majority of the 989 TFLOPS ALUs idle.
  common_mistake: |
    **The Pitfall:** Blaming kernel launch overheads or PCIe transfer bottlenecks.
    **The Rationale:** Candidates search for standard system-level inefficiencies when they see massive TFLOPS underutilization.
    **The Consequence:** They entirely ignore the fundamental arithmetic intensity of element-wise addition, completely missing the roofline boundary.
  napkin_math: |
    - 1 element-wise addition (C = A + B) = 1 FLOP.
    - Memory traffic: Read A (2 bytes) + Read B (2 bytes) + Write C (2 bytes) = 6 Bytes.
    - Arithmetic Intensity = 1 FLOP / 6 Bytes ≈ 0.166 FLOPs/Byte.
    - Max achievable compute = Memory Bandwidth × AI = 3.35 TB/s × 0.166 FLOPs/Byte = 0.558 TFLOPS.
    - Peak Compute Utilization = 0.558 TFLOPS / 989 TFLOPS ≈ 0.00056 (0.056%).
    - **Conclusion:** Less than 0.1% utilization is mathematically expected.
