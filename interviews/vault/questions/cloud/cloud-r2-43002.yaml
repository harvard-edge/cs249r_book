title: Point-in-Time Correctness for Training
scenario: Your ML team discovers that their churn prediction model performs 15% better in offline evaluation
  than in production. Investigation reveals the training pipeline joins features with labels using the
  label timestamp, but the feature store only keeps the latest feature values. What data leakage pattern
  is occurring, and how do you architect point-in-time correct feature retrieval?
details:
  realistic_solution: 'The model sees the future: when training on a churn event from January 15, it reads
    the user''s current feature values (April 1) instead of the values available on January 15. This means
    features like ''days_since_last_login'' reflect months of post-churn inactivity, making churn trivially
    predictable in training but impossible in production. The fix requires a time-travel feature store
    that versions feature values with timestamps. For each training example at time T, the feature retrieval
    query must return the latest feature values with timestamp <= T. Implementation: store features in
    a columnar format (Parquet/Delta Lake) partitioned by entity + event_time, and use an AS OF TIMESTAMP
    query pattern.'
  common_mistake: Assuming the feature store's current values are valid for historical training examples.
    This introduces future leakage — using feature values that wouldn't have been available at prediction
    time.
  napkin_math: 'Storage overhead of versioning: 10M entities × 200 features × 4 bytes × 365 daily snapshots
    = 2.9 TB/year. Alternatively, log-based versioning (only store deltas): ~0.3 TB/year. Query cost for
    point-in-time join on 1M training examples: ~5 minutes on a 16-core Spark cluster vs. 30 seconds for
    latest-only (10× slower but correct).'
