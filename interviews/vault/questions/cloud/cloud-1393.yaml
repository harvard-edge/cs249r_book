title: Medical 3D CNN I/O Starvation
scenario: Your team is training a 3D CNN on medical volumetric data using a node with 8x H100 GPUs. Each uncompressed 3D volume is 250MB. The forward and backward pass takes 500ms for a global batch of 64 volumes. The node pulls data from a shared parallel file system over a single 100 Gbps Ethernet link.
question: What is causing the low 45% GPU utilization on the 8x H100 node, and how would you fix it?
details:
  realistic_solution: |
    Diagnose network I/O starvation using network monitoring tools like iperf or node exporter. The network requires 32 GB/s but the 100 Gbps link caps at 12.5 GB/s. Resolve by caching data on local PCIe NVMe SSDs or compressing data.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is CPU-bound data augmentation.
    **The Rationale:** Blindly increasing PyTorch DataLoader num_workers without checking network limits.
    **The Consequence:** Optimizing GPU compute or CPU workers only worsens the starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8 GPUs, 100 Gbps Ethernet link.
       - Workload: 64 volumes/batch, 250 MB/volume, 500ms step time.
    2. **Calculations:**
       - Required throughput = (64 volumes * 250 MB/volume) / 0.5 seconds = 32,000 MB/s = 32 GB/s.
       - Maximum network bandwidth = 100 Gbps / 8 = 12.5 GB/s.
    3. **Conclusion & Interpretation:**
       **Result: Network I/O Bound.** 32 GB/s required > 12.5 GB/s available, creating a severe I/O wall.
