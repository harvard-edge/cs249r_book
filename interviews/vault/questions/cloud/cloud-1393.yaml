title: Medical 3D CNN I/O Starvation
scenario: Your team is training a 3D CNN on medical volumetric data using a node with 8x H100 GPUs. Each
  uncompressed 3D volume is 250MB. The forward and backward pass takes 500ms for a global batch of 64
  volumes (8 per GPU). The node pulls data from a shared parallel file system over a single 100 Gbps Ethernet
  link. You observe that GPU SM utilization fluctuates wildly, averaging only 45%, while CPU utilization
  is moderate. Identify the root cause of this inefficiency.
details:
  realistic_solution: Diagnose network I/O starvation using network monitoring tools. The network requires
    32 GB/s but the 100 Gbps link caps at 12.5 GB/s. Resolve by caching data on local PCIe NVMe SSDs or
    compressing data.
  common_mistake: Assuming the bottleneck is CPU-bound data augmentation and blindly increasing PyTorch
    DataLoader num_workers, or optimizing GPU compute which only worsens the starvation.
  napkin_math: Required throughput = (64 volumes * 250 MB/volume) / 0.5 seconds = 32,000 MB/s = 32 GB/s.
    Maximum network bandwidth = 100 Gbps / 8 = 12.5 GB/s. 32 GB/s > 12.5 GB/s, creating a severe I/O wall.
