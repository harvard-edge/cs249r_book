title: The 60% Utilization Mystery
scenario: Your team has successfully migrated an LLM inference service from static batching to a modern continuous batching framework. Under heavy, sustained load, you see a 2.5x increase in throughput. However, when you check `nvidia-smi`, you're puzzled to find that GPU utilization never exceeds ~60-70%, even though the request queue is full. An executive asks why you aren't 'fully using' the expensive H100s. What is the most likely reason for this phenomenon?
question: "What is the most likely reason for this phenomenon?"
details:
  realistic_solution: 'The system is bottlenecked by the CPU-bound scheduling logic of the continuous batching engine itself. GPU utilization measures the percentage of time a kernel is active. In a continuous batching loop, there are two phases: 1) The GPU executes a forward pass on the current batch of requests. 2) The CPU-bound scheduler runs to check for finished sequences, free their KV cache blocks, check the queue for new requests, and allocate blocks for them before launching the next GPU kernel. If this scheduling phase on the CPU takes a non-trivial amount of time relative to the GPU execution phase, the GPU will sit idle during that period, leading to an average utilization below 100%.'
  common_mistake: Assuming that the GPU is bottlenecked by a hardware limitation like memory bandwidth or PCIe transfer speeds. While these can be factors, they don't explain why a system under full load with dynamic request patterns would be unable to keep the execution units busy 100% of the time. Another common mistake is to blame the Python GIL.
  napkin_math: 'Assume the GPU forward pass for a batch takes 15ms. If the CPU-bound scheduling phase (updating KV cache pointers, tokenizing new requests, sampling) takes 10ms, the total cycle is 25ms. The GPU is active for 15ms and idle for 10ms. GPU utilization = 15ms / 25ms = 60%. Despite the full queue and 2.5x throughput gain over static batching, the GPU is artificially capped at 60% utilization by the CPU scheduling bottleneck.'
  options:
  - The GPU is memory-bandwidth bound, so compute cores are idle waiting for HBM.
  - The Python GIL in the server is preventing the scheduler from running in parallel with GPU execution.
  - The request arrival rate is not high enough to fully saturate the server's capacity.
  - The GPU is frequently idle, waiting for the CPU-bound scheduler to manage requests and memory between batches.
  correct_index: 3
