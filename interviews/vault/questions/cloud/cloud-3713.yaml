title: Power vs Performance Trade-off with GPU Frequency Scaling on A100
scenario: An A100 runs at 1.41GHz base clock consuming 400W. A cloud operator proposes power-capping at 300W (75%) to fit denser server configurations. Static power is 80W.
question: If an A100 is power-capped from 400W to 300W, what frequency and throughput reduction follow after accounting for static power?
details:
  realistic_solution: 'Dynamic power ≈ 80% of total = 320W. Static power = 80W. Target: 300W total. Remaining dynamic: 300-80 = 220W. Dynamic power reduction: 220/320 = 0.688. P_dyn ∝ f³ → f_new/f_old = (0.688)^(1/3) = 0.883. New frequency: 1.41 × 0.883 = 1.245 GHz. Throughput reduction: ~11.7% (approximately linear with frequency for compute-bound tasks). A100 throughput: 312 TFLOPS × 0.883 = 275 TFLOPS. Power: 300W vs 400W = 25% power reduction for 11.7% throughput loss. Performance-per-watt improves: (275/300) / (312/400) = 0.917 / 0.78 = 17.5% better.'
  common_mistake: |
    **The Pitfall:** Applying the cubic power-frequency relationship directly to total power without accounting for static power.
    **The Rationale:** Static power (leakage) doesn't scale with frequency and represents ~15-20% of total GPU power.
    **The Consequence:** This leads to an inaccurate overestimation of the throughput drop.
  napkin_math: |
    - **Dynamic Power:** 400W total - 80W static = 320W.
    - **Target Dynamic Power:** 300W total - 80W static = 220W.
    - **Frequency Ratio:** (220/320)^(1/3) = 0.883.
    - **New Throughput:** 312 * 0.883 = 275 TFLOPS.
    - **Trade-off:** -25% power, -11.7% throughput.
    - **Final Result:** **+17.5% perf/watt improvement.**
