title: PII Detection and Scrubbing Pipeline
scenario: Before training an LLM on 500M web-scraped documents, you must remove PII (names, emails, phone
  numbers, SSNs, addresses). Your regex-based scrubber catches 92% of PII but misses 8%. With 500M documents
  averaging 2 PII instances each, how many PII instances leak through, and what's the defense-in-depth
  strategy?
details:
  realistic_solution: 'Leaked PII: 500M docs × 2 PII/doc × 8% miss = 80M PII instances in training data.
    Defense-in-depth: (1) Layer 1 — Regex scrubbing for structured PII (emails, SSNs, phone numbers).
    Catch rate: ~99%. (2) Layer 2 — NER model (spaCy, Presidio) for names, addresses, organizations. Catch
    rate: ~90% for names, ~85% for addresses. Combined with regex: ~97% overall catch rate. (3) Layer
    3 — DP-SGD training (ε=8) to prevent memorization of remaining PII. Even if PII exists in training
    data, DP bounds how much the model can memorize about any individual. (4) Layer 4 — Output filtering:
    regex + NER on model outputs to catch generated PII at inference time. (5) Layer 5 — Deduplication:
    remove near-duplicate documents (PII repeated across duplicates is most likely to be memorized). After
    all layers: residual risk = 500M × 2 × 0.03 × (1 - DP protection) ≈ negligible.'
  common_mistake: 'Relying solely on regex-based PII detection. Regex catches structured PII (emails:
    99%, SSNs: 99%) but fails on unstructured PII (names in context: 70-80%, addresses without standard
    format: 60-70%). The 8% miss rate is an average — for names, it''s 20-30%.'
  napkin_math: 'Regex only (92%): 80M PII leaked. Regex + NER (97%): 30M PII leaked. + Dedup removes 30%
    of corpus: 30M × 0.7 = 21M. + DP-SGD (ε=8): memorization probability per data point ~10⁻⁴. Expected
    extractable PII: 21M × 10⁻⁴ = 2,100 instances. + Output filtering (99.5% catch): 2,100 × 0.005 = ~10
    instances might slip through in production. Cost of NER pipeline: 500M docs × 0.5ms/doc = 69 hours
    on 1 GPU. At $3/hr: $207. Worth it for 50M fewer leaked PII instances.'
