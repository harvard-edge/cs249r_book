title: Cloud Data Quality As Code L3 0
scenario: 'Your training pipeline ingests 500 GB of data daily. You want to add data quality checks: schema validation, null detection, statistical distribution tests, and referential integrity checks.'
question: "What time and compute overhead should you expect for schema, null, distribution, and referential integrity checks on 500 GB daily?"
details:
  realistic_solution: 'Schema validation (type + value range per field): single scan at ~2 GB/s (Spark/Dask
    on 8 cores). Time: 500 GB / 2 GB/s = 250s ≈ 4.2 min. Null detection: same scan, essentially free if
    combined with schema check. Statistical distribution (per-column histogram comparison vs. reference):
    requires reading all values, computing histograms, KL-divergence. Time: ~500s for 500 GB with ~20
    columns. Referential integrity (join against reference tables): depends on reference table size. For
    100 MB reference table, broadcast join: ~300s for 500 GB. Total pipeline overhead: ~4.2 + 0 + 8.3
    + 5 = 17.5 minutes. As percentage of 24h pipeline: 17.5 / 1440 = 1.2% overhead.'
  common_mistake: |
    **The Pitfall:** Running each data quality check as a separate scan over the entire dataset.
    **The Rationale:** Candidates rely on naive pandas/SQL loops without considering pipeline I/O overhead.
    **The Consequence:** Unnecessary disk and network I/O that triples the time overhead and bloats the daily training budget.
  napkin_math: |
    1. **Assumptions & Constraints:** 500 GB data, 8-core machine processing at 2 GB/s, 100 MB reference table.
    2. **Calculations:** Schema/Null (1 pass) = 500 GB / 2 GB/s = 250s (4.2 min). Stats (histograms) = ~500s (8.3 min). Referential (hash join) = ~300s (5 min). Total = 17.5 min = 1.2% of 24h.
    3. **Conclusion & Interpretation:** **Result: I/O-Bound (Scans). Combining schema and null checks into a single pass cuts overhead from 17 min to ~8 min (~$0.10 compute).**
