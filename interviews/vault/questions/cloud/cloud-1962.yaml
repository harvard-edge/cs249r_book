title: Evaluating Statistical Parity Trade-offs in Credit Scoring
scenario: You are evaluating two credit scoring models for a cloud deployment serving 15,000 daily applications (10k from Group P, 5k from Group U). Model A achieves 92% accuracy with positive selection rates of 80% (Group P) and 40% (Group U). Model B achieves 87% accuracy with selection rates of 65% (Group P) and 55% (Group U). Regulations require the Statistical Parity Difference (SPD) to be strictly less than 0.15 to avoid disparate impact litigation.
question: Which credit scoring model should you deploy under the strict SPD < 0.15 requirement, and what trade-off does that choice impose?
details:
  realistic_solution: 'Deploy Model B. Calculate the SPD for Model A (|0.80 - 0.40| = 0.40) and Model B (|0.65 - 0.55| = 0.10). Model A severely violates the <0.15 threshold. Model B is chosen because it meets the regulatory threshold, making the 5% accuracy drop a mandatory compliance cost.'
  common_mistake: |
    **The Pitfall:** Prioritizing Model A for its higher accuracy or calculating the disparate impact ratio instead of absolute difference.
    **The Rationale:** Engineers often optimize for pure predictive performance or use the wrong fairness metric (ratio vs. difference).
    **The Consequence:** Deploying Model A severely violates the <0.15 SPD threshold, exposing the business to significant legal risk.
  napkin_math: |
    **Assumptions & Constraints:**
    - Applications: 10k Group P, 5k Group U.
    - Model A Selection: 80% P, 40% U.
    - Model B Selection: 65% P, 55% U.
    - Regulatory SPD limit: < 0.15.

    **Calculations:**
    - Model A SPD = |0.80 - 0.40| = 0.40 (Violates > 0.15).
    - Model B SPD = |0.65 - 0.55| = 0.10 (Passes < 0.15).
    - Total approvals Model A = (0.80 * 10,000) + (0.40 * 5,000) = 10,000.
    - Total approvals Model B = (0.65 * 10,000) + (0.55 * 5,000) = 9,250.

    **Conclusion & Interpretation:**
    - **Result: Model B (Compliance-Bound)**. The cost of regulatory fairness is deploying Model B, forcing a 5% accuracy drop and 750 fewer daily approvals.
