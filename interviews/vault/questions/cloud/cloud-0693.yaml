title: The Checkpoint Traffic Jam
scenario: Every time your 1,024-GPU cluster attempts to save a 2.8 TB checkpoint to the central NFS (10 GB/s link), the system hangs for 10 minutes and often triggers 'File Timeout' errors.
question: Based on the storage topology, what two physical bottlenecks are you hitting?
details:
  realistic_solution: 'You are hitting both a **Bandwidth Wall** and a **Metadata Storm**. 2.8 TB over 10 GB/s takes ~280s just for data transfer. Simultaneously, 1,024 GPUs requesting inode locks overwhelms the single-threaded metadata manager. The fix is **Asynchronous, Two-Tier Checkpointing**: write shards to *local* NVMe SSDs first (taking <10s), then have a background process trickle them to central storage.'
  common_mistake: |
    **The Pitfall:** Blaming raw network bandwidth exclusively and upgrading the NFS link.
    **The Rationale:** 2.8 TB sounds like a data volume issue, masking the metadata operations.
    **The Consequence:** Spending heavily on 100 GB/s networking without solving the inode lock metadata storm, leaving the hang unresolved.
  napkin_math: |
    1. 1,024 nodes $\times$ 3 GB/s (local NVMe) = 3,072 GB/s aggregate bandwidth.
    2. A 2.8 TB checkpoint writes locally in **~0.9 seconds**.
    3. **Result:** **Writing directly to NFS (10 GB/s) takes ~280 seconds, completely blocking execution due to bandwidth limits and metadata storms.**
