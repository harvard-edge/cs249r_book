title: The Checkpoint Traffic Jam
scenario: Every time your 1,024-GPU cluster attempts to save a checkpoint to the central NFS, the system
  hangs for 10 minutes and often triggers 'File Timeout' errors. Based on the storage diagram, what two
  physical bottlenecks are you hitting?
details:
  realistic_solution: 'You are hitting both a **Bandwidth Wall** and a **Metadata Storm**. 2.8 TB over
    10 GB/s takes ~280s just for data transfer. Simultaneously, 1,024 GPUs requesting inode locks overwhelms
    the single-threaded metadata manager. The fix is **Asynchronous, Two-Tier Checkpointing**: write shards
    to *local* NVMe SSDs first (taking <10s), then have a background process trickle them to central storage.'
  common_mistake: '"The NFS server just needs a 100 GB/s link." Bandwidth is a problem, but upgrading
    the link won''t solve the metadata storm of thousands of concurrent file handles.'
  napkin_math: 1,024 nodes × 3 GB/s (local NVMe) = 3,072 GB/s aggregate bandwidth. A 2.8 TB checkpoint
    writes locally in ~1 second. Compare this to the 280 seconds over the shared NFS.
