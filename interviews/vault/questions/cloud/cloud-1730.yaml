title: Calculating Optimal Prefetch Buffer Depth for I/O Jitter
scenario: You are training a large vision model on an 8x H100 node reading images from a parallel networked filesystem. The GPUs compute one global batch every 150ms. Normally, the data loading pipeline fetches and preprocesses a batch in 100ms, easily keeping up. However, due to noisy neighbor network congestion, the p99 latency (worst-case I/O jitter) for fetching a batch occasionally spikes to 1.2 seconds.
question: How deep must the host DRAM prefetch buffer be to cover 1.2s I/O spikes without stalling 150ms GPU steps?
details:
  realistic_solution: Size the prefetch buffer to cover the entire duration of the worst-case I/O latency spike. Since the GPU consumes batches at a fixed rate, the buffer must hold enough batches to continuously feed the GPU while the I/O pipeline is temporarily stalled.
  common_mistake: |
    **The Pitfall:** Calculating buffer size based purely on average throughput ratios or relying on framework defaults (e.g., PyTorch's `prefetch_factor=2`).
    **The Rationale:** Average metrics fail to capture the long-tail I/O latencies inherent in shared network filesystems.
    **The Consequence:** Intermittent GPU starvation occurs during network spikes, reducing overall training throughput.
  napkin_math: |
    - **Max I/O Latency:** 1.2 seconds (1200ms).
    - **GPU Step Time:** 150ms.
    - **Required Buffer Depth:** ceil(1200ms / 150ms) = **8 batches**.
    - **Conclusion:** A prefetch buffer of at least 8 batches is required per worker.
