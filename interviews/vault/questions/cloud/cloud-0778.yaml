title: Real-Time Click Prediction with Continual Learning
scenario: We need to update our ad click-through rate (CTR) prediction models in real-time. We receive
  over 10 million ad events (impressions, clicks, conversions) per second globally. How do you design
  the streaming ingestion and distributed training pipeline to update the model weights within 5 minutes
  of a user interacting with an ad, while rigorously handling delayed feedback (late clicks)?
details:
  realistic_solution: Utilize a streaming framework (e.g., Apache Flink) paired with Kafka for event ingestion.
    Implement a windowing strategy with watermarks to join impressions with clicks in memory. If no click
    arrives within a short window (e.g., 5 mins), emit a negative label to the training cluster. If a
    click arrives hours later, emit a positive label with an importance weight or use negative-sample
    correction techniques (e.g., Fake Negative Calibration) to correct the prior gradient update. Send
    joined examples to a distributed Parameter Server or an asynchronous DDP training cluster. Use Follow
    The Regularized Leader (FTRL) for sparse IDs and SGD for dense layers, periodically pushing updated
    weights to the inference fleet.
  common_mistake: Using a standard batch data warehouse (like Presto/Spark) to join impressions and clicks
    on a micro-batch schedule. Alternatively, ignoring delayed feedback entirely, which forces the model
    to treat all impressions without immediate clicks as negative, catastrophically biasing the real-time
    distribution.
  napkin_math: 10M events/sec. Average joined event size (dense features + sparse IDs) = 1KB. Network
    throughput = 10GB/sec. To keep up with ingestion, we need ~100 Flink nodes processing 100MB/s each.
    For training, a batch size of 8192 across 32 GPUs processes ~100k samples/sec/GPU. This requires a
    dedicated real-time training cluster of ~100 GPUs constantly consuming the streaming data to prevent
    backpressure.
