title: Diagnosing Small Batch Instability in 3D CNNs
scenario: You are training a 3D medical imaging CNN across a single node with 8x A100 GPUs. Due to the
  massive 512x512x512 voxel input size, you are forced to use a micro-batch size of 2 per GPU. Training
  appears to converge, but during deployment on a single T4 GPU for inference (where batch size is 1),
  the model produces highly erratic predictions and validation metrics plummet. How do you diagnose and
  resolve this architectural bottleneck?
question: "How do you diagnose and resolve this architectural bottleneck?"
details:
  realistic_solution: Identify that standard BatchNorm computes independent statistics per GPU, making
    running mean/variance overwhelmingly noisy at batch size 2. Replace it with SyncBatchNorm to aggregate
    statistics across all 8 GPUs (effective batch size 16), or swap for Group Normalization which is batch-size
    independent.
  common_mistake: Assuming the issue is domain shift or requires a lower learning rate, without recognizing
    that standard Batch Normalization fails to estimate population running statistics accurately with
    a micro-batch size of 2.
  napkin_math: Standard BN effective batch = 2. SyncBN effective batch = 8 GPUs * 2 = 16. Variance of
    the sample variance scales as ~1/(N-1). Moving from N=2 to N=16 reduces the noise in the running variance
    by a factor of 15x, stabilizing inference behavior.
