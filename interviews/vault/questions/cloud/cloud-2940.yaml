title: 'Recall: What PUE Measures and Why 1.0 Is Physically Impossible'
scenario: A new ML infrastructure engineer asks why the team targets a PUE of 1.3 rather than 1.0 for the cluster datacenter, and whether lower is always better. They have seen hyperscaler marketing claiming PUE of 1.1 and wonder if that is achievable for on-premise GPU deployments.
question: Why is a PUE of 1.3 targeted instead of 1.0 for the datacenter, and is a lower PUE always achievable or better?
details:
  realistic_solution: PUE = Total Facility Power / IT Equipment Power. IT equipment is the denominator, so PUE \u2265 1.0 always, with 1.0 meaning zero overhead \u2014 physically impossible. A PUE of 1.3 means for every 1 W of GPU compute, 0.3 W goes to cooling, PDUs, lighting, and UPS. Hyperscaler PUEs of 1.1\u20131.2 require direct liquid cooling (cold plates on H100s), free-air economizers in cold climates, and fully optimized power distribution. On-premise air-cooled deployments typically achieve 1.4\u20131.6. Each 0.1 improvement in PUE on a 1 MW GPU cluster saves 100 kW of overhead power \u2014 significant at scale.
  common_mistake: |
    **The Pitfall:** Believing a PUE of 1.0 is physically achievable, or confusing PUE with compute energy efficiency.
    **The Rationale:** Engineers mistake the mathematical ratio (Total Power / IT Power) as an efficiency score that can approach perfect 1.0 without recognizing that zero cooling overhead is impossible.
    **The Consequence:** Teams set impossible datacenter targets or misunderstand hyperscaler marketing claims regarding liquid cooling.
  napkin_math: |
    1. IT Load for 64 H100 nodes: 64 nodes * 8 GPUs/node * 700 W = 358.4 kW.
    2. Total Facility Power at 1.3 PUE: 358.4 kW * 1.3 = 465.9 kW.
    3. Total Facility Power at 1.1 PUE (liquid cooling): 358.4 kW * 1.1 = 394.2 kW.
    4. Power saved: 465.9 - 394.2 = 71.7 kW.
    5. **At $0.08/kWh, moving from 1.3 to 1.1 PUE saves 71.7 kW * 8760 hours * $0.08 = ~$50,200/year on a single cluster.**
