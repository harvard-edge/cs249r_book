title: Cloud New 0040
scenario: When recovering from a fault in a Pipeline Parallel training setup, a concept called the 'pipeline
  bubble' reoccurs. Define the pipeline bubble and why it happens during the initial forward pass.
details:
  realistic_solution: The pipeline bubble refers to the idle time on GPUs when they are waiting for data
    from the previous stage in Pipeline Parallelism. Upon recovering from a fault and restarting computation,
    the GPUs assigned to the later layers of the model sit idle until the first micro-batch completes
    its forward pass through the earlier layers and arrives over the network.
  common_mistake: Believing the pipeline bubble is a software bug or memory leak, rather than an inherent,
    mathematical latency limitation of sequential staging across multiple GPUs.
  napkin_math: In an 8-stage pipeline, if each stage takes 100ms, Stage 8 sits idle for 700ms (the pipeline
    bubble) waiting for the first micro-batch to traverse Stages 1-7. This bubble impacts throughput until
    fully filled.
