title: 'MI300X Roofline vs H100: Memory-Bound vs Compute-Bound Boundary'
scenario: The AMD MI300X has 5.3 TB/s HBM3 bandwidth and 1,307 TFLOPS FP16. The NVIDIA H100 SXM5 has 3.35
  TB/s HBM3 and 989 TFLOPS FP16 (non-sparse). Plot the roofline ridge points for both. A LLaMA-2 70B attention
  layer during autoregressive decode has arithmetic intensity of 0.8 FLOP/byte. Determine which accelerator
  achieves higher token throughput and by what factor.
question: "What are the MI300X and H100 roofline ridge points, and which has higher LLaMA-2 70B decode throughput at AI=0.8 FLOP/byte?"
details:
  realistic_solution: 'Roofline ridge points: MI300X: 1,307 TFLOPS / 5.3 TB/s = 246.6 FLOP/byte. H100:
    989 TFLOPS / 3.35 TB/s = 295.2 FLOP/byte. Both ridge points are far above AI=0.8 FLOP/byte, confirming
    the attention decode is memory-bound on both. In the memory-bound regime, throughput = bandwidth ×
    AI × efficiency factor. MI300X: 5.3 TB/s × 0.8 FLOP/byte = 4.24 TFLOPS effective. H100: 3.35 TB/s
    × 0.8 = 2.68 TFLOPS effective. Ratio: 4.24/2.68 = 1.58×. The MI300X achieves 58% higher attention
    decode throughput due solely to bandwidth advantage, despite H100 having a higher peak TFLOPS. This
    is a canonical example of why bandwidth — not TFLOPS — determines LLM decode performance.'
  common_mistake: Comparing peak TFLOPS without first checking whether the kernel is memory-bound or compute-bound.
    For attention decode with AI=0.8 FLOP/byte, the operation is deeply memory-bound on both accelerators
    — peak FLOP/s is irrelevant, and the comparison reduces entirely to memory bandwidth.
  napkin_math: 'MI300X: BW=5300 GB/s, TFLOPS=1307. Ridge: 1307/5.3 = 246.6. H100: BW=3350 GB/s, TFLOPS=989.
    Ridge: 989/3.35 = 295.2. AI=0.8 < both ridges → memory-bound. MI300X effective: 5300 × 0.8 = 4,240
    GFLOPS. H100 effective: 3350 × 0.8 = 2,680 GFLOPS. Throughput ratio: 4240/2680 = 1.58×. For 70B model,
    each token decode ≈ 2×70B FLOPs = 140 GFLOP. MI300X: 4,240 / 140 = 30.3 tok/sec (per GPU). H100: 2,680
    / 140 = 19.1 tok/sec. MI300X advantage: +11 tok/sec per GPU = +58%.'
