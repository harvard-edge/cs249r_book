title: Request Deduplication in High-Frequency Recommendation Serving
scenario: A recommendation serving system receives 100K QPS. Analysis shows 15% of
  requests are exact duplicates (same user, same context, within 100ms). Each serving
  call takes 50ms on average. Design a deduplication layer to reduce effective serving
  cost.
question: How would you design a deduplication layer for 100K QPS when 15% of requests
  are exact duplicates within 100ms?
details:
  realistic_solution: 'Request deduplication design: (1) Cache key definition: hash(user_id
    + context_hash + timestamp_bucket). Context hash: a short hash of the recommendation
    context (page type, recent actions). timestamp_bucket: round timestamp to nearest
    100ms bucket. This groups requests with identical context within 100ms. (2) Implementation:
    use a lightweight in-process cache (hash map) at each serving replica. Cache size:
    100K QPS * 100ms window = 10K active requests. At 200B per cache entry (user_id
    + hash): 2MB per replica — trivial. (3) Coalescing: when request R arrives and
    a cache entry exists: if the previous request for this key is still in-flight,
    queue R to receive the same result. If completed, return cached result. This collapses
    15% * 100K = 15K duplicate QPS to immediate cache
    returns. Savings: 15K * 50ms = 750 GPU-seconds/sec → 750 H100s. At $3/hr: $2250/hr
    savings. (4) TTL: cache entry expires after 200ms (slightly longer than timestamp_bucket
    to ensure all coalesced requests are served).'
  common_mistake: Implementing deduplication at the application layer with a distributed
    cache keyed only on user_id. User_id alone misses context changes (page refresh,
    scroll position, session age) causing stale results to be served, or cache keys
    that are too fine-grained result in near-zero hit rate.
  napkin_math: '15% of 100K QPS = 15K duplicate QPS. Each serving call: 50ms on H100.
    100K * 50ms = 5000 GPU-seconds/sec needed without dedup = 5000/3600 H100-hours/sec
    = 5000/3600 * $3/hr = $4.17/sec. With dedup: 85K unique * 50ms + 15K dedup hits
    (0.1ms cache return) = 4250 GPU-seconds/sec = 85% of original. Savings: 15%. At
    $4.17/sec: saves $0.625/sec = $54K/day. For a system running 24/7: $19.7M/year
    savings. Deduplication is a high-ROI optimization.'
