title: Request Deduplication in High-Frequency Recommendation Serving
scenario: A recommendation serving system receives 100K QPS. Analysis shows 15% of requests are exact duplicates (same user, same context, within 100ms). Each serving call takes 50ms on average.
question: How would you design a deduplication layer for 100K QPS when 15% of requests are exact duplicates within 100ms?
details:
  realistic_solution: 'Request deduplication design: (1) Cache key definition: hash(user_id + context_hash + timestamp_bucket). Context hash: a short hash of the recommendation context (page type, recent actions). timestamp_bucket: round timestamp to nearest 100ms bucket. This groups requests with identical context within 100ms. (2) Implementation: use a lightweight in-process cache (hash map) at each serving replica. Cache size: 100K QPS * 100ms window = 10K active requests. At 200B per cache entry (user_id + hash): 2MB per replica — trivial. (3) Coalescing: when request R arrives and a cache entry exists: if the previous request for this key is still in-flight, queue R to receive the same result. If completed, return cached result. This collapses 15% * 100K = 15K duplicate QPS to immediate cache returns. Savings: 15K * 50ms = 750 GPU-seconds/sec → 750 H100s. At $3/hr: $2250/hr savings. (4) TTL: cache entry expires after 200ms (slightly longer than timestamp_bucket to ensure all coalesced requests are served).'
  common_mistake: |
    **The Pitfall:** Implementing deduplication keyed only on user_id in a distributed cache.
    **The Rationale:** Engineers apply standard web-tier caching logic without understanding recommendation dynamics.
    **The Consequence:** Serving stale results when a user's context changes quickly (scrolling, clicking), or missing the opportunity to coalesce entirely if the cache is too coarse.
  napkin_math: |
    - **Current Load:** 100K QPS * 50ms compute = 5,000 GPU-seconds/sec required without deduplication.
    - **Duplicate Volume:** 15% of 100K = 15,000 duplicate requests/sec.
    - **Deduplication Savings:** 15,000 * 50ms = 750 GPU-seconds/sec.
    - **Hardware Equivalent:** Saves exactly 750 GPUs. At $3/hr per GPU, this is `$2,250/hr` or **~$19.7M/year** in savings.
