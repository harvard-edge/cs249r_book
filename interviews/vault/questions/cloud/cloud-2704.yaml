title: When Linear Scaling Breaks Down
scenario: Your team scales ResNet-50 training from 256 to 65,536 batch size (256 GPUs). With linear LR scaling and 5-epoch warmup, training diverges after warmup ends. The team proposes (A) sqrt scaling instead, (B) LARS optimizer, or (C) reducing batch size to 32K.
question: "For ResNet-50 at batch size 65,536 diverging after warmup, should you use sqrt LR scaling, LARS, or reduce batch size?"
details:
  realistic_solution: 'At 65K batch size, linear scaling gives LR = 0.1 × 256 = 25.6, which is too aggressive. (A) Sqrt scaling (LR = 0.1 × √256 = 1.6) is more conservative and often works at extreme scales, but sacrifices some per-step progress. (B) LARS (Layer-wise Adaptive Rate Scaling) computes per-layer LR ratios based on weight/gradient norms, handling the fact that different layers need different LRs at extreme batch sizes. This is the proven approach for ImageNet at 64K+ batch sizes. (C) Reducing to 32K wastes half the GPUs. Recommendation: Use LARS — it was specifically designed for this regime and demonstrated convergence at 32K+ batch sizes for ResNet-50.'
  common_mistake: |
    **The Pitfall:** Assuming linear learning rate scaling always works.
    **The Rationale:** Linear scaling is a common rule of thumb for standard batch sizes (e.g., up to 8K).
    **The Consequence:** Beyond a critical batch size, linear scaling produces an LR so large that it overshoots loss minima, causing divergence.
  napkin_math: |
    1. Linear LR at 64K batch: 0.1 × 256 = 25.6 (diverges).
    2. Sqrt LR: 0.1 × 16 = 1.6 (suboptimal).
    3. LARS uses **per-layer adaptive scaling**, which stabilizes training at 32K+ batch sizes.
