title: Gradient Accumulation for Sparse Embedding Training
scenario: You are training a DLRM on 128 GPUs (192 GB each). Gradient accumulation is set to 16 steps. You observe that memory usage for sparse gradient tensors grows unboundedly during accumulation, eventually OOMing at step 12.
question: "Why do sparse gradients OOM during 16-step accumulation on 192 GB GPUs, and how would you fix it without reducing batch or accumulation?"
details:
  realistic_solution: 'Sparse embedding gradients are indexed. With 16-step accumulation, the accumulated sparse gradient contains indices from 16 batches. If batch_size=32768 and each sample touches 500 sparse features, one step produces 32768 * 500 = 16.4M gradient entries. Fix: (1) Use immediate sparse gradient application (not accumulation): after each micro-step, immediately apply the sparse gradient update to the embedding table. This keeps memory O(1 step) instead of O(N steps). Dense gradients (MLP) still accumulate normally. (2) Alternatively: deduplicate indices within each step.'
  common_mistake: |
    **The Pitfall:** Thinking gradient accumulation for sparse tensors works identically to dense tensors.
    **The Rationale:** Candidates assume sparse accumulation is just adding values in place, failing to realize that native PyTorch accumulates sparse tensors by concatenating their indices indefinitely.
    **The Consequence:** The number of unique indices grows linearly with the accumulation steps, causing a catastrophic memory leak and inevitable OOM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Batch Size: 32,768. Sparse Features: 500 per sample.
       * Base Model Memory: 140 GB.
    2. **Calculations:**
       * Unique Indices: 32,768 * 500 = 16.38M indices.
       * Memory per Step: 16.38M * (8 bytes index + 256 bytes grad) = 4.32 GB.
       * Accumulated Memory (12 steps): 12 * 4.32 GB = 51.84 GB.
       * Total Memory at Step 12: 140 GB + 51.84 GB = 191.84 GB.
    3. **Conclusion & Interpretation:** **Result: 191.8 GB (Capacity-Bound)**. The GPU exceeds its 192 GB limit by step 12. Applying immediately reduces sparse gradient memory to a constant 4.3 GB.
