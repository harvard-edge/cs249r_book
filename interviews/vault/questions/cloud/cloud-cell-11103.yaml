title: 'Kernel Fusion: Mastery — Design Fusion Strategy for High-Throughput LLM Prefill'
scenario: You are optimizing throughput for 70B LLM prefill on 8 H100s (80GB HBM3, 3.35 TB/s, 989 TFLOPS
  BF16) processing batches of 512 sequences × 2048 tokens. Current MFU is 38%. Identify the top fusion
  opportunities, implement a fusion roadmap, and quantify the expected MFU improvement.
question: "What is the correct order-of-magnitude FLOP estimate for GPT-3 175B training on 300B tokens, and why is 6 PFLOPs too low?"
details:
  realistic_solution: GPT-3 training required ~3×10^23 FLOPs total. 420 PFLOPs/day × several days gives
    correct order of magnitude. 6 PetaFLOPs total is too low by ~50000×.
  common_mistake: Applying fusion uniformly without first profiling which kernels are memory-bound vs
    compute-bound; applying fusion to compute-bound matmuls where it adds overhead without benefit.
  napkin_math: 'GPT-3 (175B params) training: 300B tokens × 6 × 175B = 315 PFLOPs. H100 cluster 1024 GPUs
    at 989 TFLOPS × 0.45 MFU = 445 TFLOPS each. Total cluster: 1024 × 445T = 455.7 PFLOPs/s. Training
    time: 315P / 455.7P = 0.69 seconds? No — 315 PFLOPs = 3.15×10^17 FLOPs. 455.7 × 10^15 FLOPS. Time
    = 3.15×10^17 / 4.557×10^17 = 0.69s per step. Over 1M steps: 8 days. 420 PFLOPs total estimate for
    175B × 300B × 8 (forward+backward+optimizer) / some_factor — the key fix: 420 PFLOPs is the correct
    order of magnitude for GPT-3 (not 6 PetaFLOPs which is too low by 70×).'
