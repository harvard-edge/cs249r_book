title: Elastic Training with Dynamic GPU Scaling
scenario: 'Your scheduler supports elastic training: jobs can shrink or grow their GPU allocation dynamically.
  A 64-GPU training job is running when a higher-priority job needs 16 GPUs. Describe the mechanics of
  safely shrinking the training job to 48 GPUs without restarting from scratch.'
details:
  realistic_solution: 'Elastic training mechanics (TorchElastic/etcd-based): (1) Scheduler sends SIGTERM
    to 16 selected workers (preferring workers on the same node to maintain topology efficiency). (2)
    Surviving 48 workers detect membership change via the rendezvous backend (etcd or C10d store). (3)
    All 48 workers: save checkpoint, destroy current NCCL communicators, re-rendezvous with new world_size=48,
    re-initialize NCCL with new rank assignments, reload checkpoint, adjust learning rate (linear scaling
    rule: LR × 48/64 = 0.75× original LR), adjust batch size or gradient accumulation steps to maintain
    global batch size. (4) Training resumes. Total downtime: ~2-5 minutes (dominated by checkpoint I/O
    and NCCL re-initialization). Critical challenges: (a) TP groups must remain intact — you can only
    remove complete TP groups (e.g., 8 GPUs at a time if TP=8). (b) PP stages need rebalancing if a pipeline
    stage is removed. (c) DP degree changes require adjusting the learning rate schedule. TorchElastic
    handles DP-only elasticity well. TP/PP elasticity requires custom resharding logic.'
  common_mistake: Assuming you can just kill 16 processes. Distributed training has NCCL communicators
    that require all ranks to participate. Removing ranks requires reinitializing all communication groups.
  napkin_math: 'Shrink 64→48: remove 2 nodes (16 GPUs). Checkpoint: 20 s. Re-rendezvous: 30 s. NCCL re-init:
    60 s. Total: ~2 min. Throughput drops 25% but job continues vs. full restart (10+ min).'
