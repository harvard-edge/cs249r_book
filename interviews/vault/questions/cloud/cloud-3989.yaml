title: Gradient Sync Exposes At Larger Batch
scenario: A data-parallel training job uses gradient accumulation over 8 microsteps
  and exposes only 15 ms of all-reduce per optimizer step. To improve freshness, the
  team reduces accumulation to 2 microsteps. Compute per microstep is 120 ms, and
  all-reduce still takes 120 ms before overlap. Diagnose why MFU drops.
question: Why does reducing gradient accumulation from 8 to 2 microsteps expose more
  all-reduce time and reduce MFU?
details:
  realistic_solution: With 8 microsteps, there is much more backward compute over
    which communication can be overlapped and the synchronization is amortized over
    more work. With 2 microsteps, synchronization happens 4x as often per token and
    has less compute window to hide behind. Exposed communication rises, reducing
    MFU.
  common_mistake: Assuming the all-reduce kernel time is unchanged so the end-to-end
    cost must be unchanged.
  napkin_math: Sync frequency per token increases by 8/2 = 4x. Compute window falls
    from 8 x 120 = 960 ms to 2 x 120 = 240 ms per optimizer step, so 120 ms all-reduce
    is much harder to hide.
