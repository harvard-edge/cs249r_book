title: Gradient Sync Exposes At Larger Batch
scenario: A data-parallel training job uses gradient accumulation over 8 microsteps and exposes only 15 ms of all-reduce per optimizer step. To improve freshness, the team reduces accumulation to 2 microsteps. Compute per microstep is 120 ms, and all-reduce still takes 120 ms before overlap.
question: Why does reducing gradient accumulation from 8 to 2 microsteps expose more all-reduce time and reduce MFU?
details:
  realistic_solution: 'With 8 microsteps, there is much more backward compute over which communication can be overlapped and the synchronization is amortized over more work. With 2 microsteps, synchronization happens 4x as often per token and has less compute window to hide behind. Exposed communication rises, reducing MFU.'
  common_mistake: 'Assuming the all-reduce kernel time is unchanged so the end-to-end cost must be unchanged.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Old configuration: 8 microsteps.
    - New configuration: 2 microsteps.
    - Compute per microstep: 120 ms.
    - All-reduce time before overlap: 120 ms.

    **Calculations:**
    - Sync frequency per token increases by 8 / 2 = 4x.
    - Old compute window: 8 * 120 ms = 960 ms per optimizer step.
    - New compute window: 2 * 120 ms = 240 ms per optimizer step.

    **Conclusion & Interpretation:**
    - **Result: Compute window shrinks from 960ms to 240ms (Communication-Bound)**. The shorter compute window makes it impossible to fully hide the 120ms all-reduce latency, exposing synchronization overhead.
