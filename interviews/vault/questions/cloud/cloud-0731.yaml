title: The Topology Trap
scenario: Your team is implementing a very large Language Model using Pipeline Parallelism on a cluster
  of 64 GPUs across 8 nodes. Each node has 8 GPUs. You've observed that despite having 100Gbps interconnects,
  the pipeline stalls frequently, and throughput is lower than expected. You suspect the network topology
  is suboptimal for your communication pattern. Which common network topology might be causing this, and
  which would you prefer for pipeline parallelism, and why?
details:
  realistic_solution: 'Pipeline parallelism involves a sequential dependency: each stage (group of GPUs)
    computes its part of the model and then sends its activations to the *next* stage. This creates a
    chain-like communication pattern, primarily point-to-point communication between adjacent stages in
    the pipeline.'
  common_mistake: '"All high-bandwidth networks are equally good; the problem must be in the software."
    This ignores the importance of matching communication patterns to network characteristics.'
  napkin_math: 100Gbps interconnect = 12.5 GB/s. With an 8-stage pipeline mapped 1 stage per node, activations
    cross the slow inter-node network. Assume B=16, seq=2048, hidden=4096, FP16 (2B). Activation size
    = 16 * 2048 * 4096 * 2 = 268 MB. Transfer time = 268 MB / 12.5 GB/s = ~21.4 ms. With PP, these sequential
    21ms stalls accumulate, cratering throughput.
