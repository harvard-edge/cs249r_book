title: Benchmark MFU vs Achieved FLOPS for Attention vs MLP on H100
scenario: 'Profile a GPT-3 style model (175B) on H100 during training at batch=8, seq=2048. Separate profiling
  shows: MLP GEMMs at 67% MFU, attention at 31% MFU, layer norm/dropout at 5% MFU. The overall MFU is
  48%. Explain why attention underperforms MLP and propose improvements.'
question: "Why does attention achieve only 31% MFU versus 67% for MLP GEMMs, and what changes would improve overall MFU?"
details:
  realistic_solution: 'MLP GEMMs at seq=2048, batch=8: M=16384 (batch×seq), K=12288, N=49152 (4×d_model).
    These are large square-ish GEMMs → high tensor core utilization, 67% MFU reasonable. Attention QK^T:
    M=2048, K=128 (head_dim), N=2048 per head. These are small GEMMs (especially K=128) → tensor cores
    less efficient, lower MFU. Plus: softmax is element-wise, no tensor cores → near 0% MFU contribution.
    Weighted average: MLP ~50% of FLOPs at 67%, attention ~40% at 31%, others at 5%: 0.5×67 + 0.4×31 +
    0.1×5 = 33.5+12.4+0.5 = 46.4% ≈ 48% observed. Fix: FlashAttention-2 + increase seq_len per device
    (longer seqs improve QK^T GEMM shape).'
  common_mistake: Assuming attention always achieves similar MFU to MLP GEMMs because both involve matrix
    operations; attention is limited by its smaller effective GEMM sizes and the softmax operation.
  napkin_math: 'MLP 67% × 50% weight = 33.5%. Attn 31% × 40% weight = 12.4%. Others 5% × 10% = 0.5%. Total:
    46.4% ≈ 48% observed. To improve: get attention to 50%+ MFU → FlashAttention-2 + larger batch = overall
    MFU ≈ 55-60%.'
