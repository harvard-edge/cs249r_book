title: The NVLink vs PCIe Tensor Parallel Gap
scenario: You are deciding whether tensor parallelism is viable across PCIe-connected GPUs versus NVLink-connected
  GPUs. Tensor parallelism requires an all-reduce of the activation tensor after every transformer layer.
  For batch=32, seq=2048, hidden=4096 in FP16, compare the per-layer communication time over NVLink 4.0
  (450 GB/s unidirectional) vs PCIe Gen5 x16 (63 GB/s unidirectional).
question: "What is the per-layer communication time over NVLink 4.0 versus PCIe Gen5 x16, and is PCIe tensor parallelism viable?"
details:
  realistic_solution: 'Activation tensor = 32 * 2048 * 4096 * 2 bytes = 512 MB. NVLink: 512 MB / 450 GB/s
    = 1.14 ms. PCIe Gen5: 512 MB / 63 GB/s = 8.1 ms. Over a 32-layer model, PCIe adds 32 * 8.1 = 260 ms
    vs NVLink''s 36 ms. PCIe tensor parallelism adds 7x more communication overhead — this is why tensor
    parallelism requires NVLink.'
  common_mistake: Assuming PCIe is 'only a little slower.' The ~7x bandwidth gap makes tensor parallelism
    over PCIe impractical for latency-sensitive inference, adding milliseconds of overhead per layer.
  napkin_math: 'Activation = 32 * 2048 * 4096 * 2 = 512 MB. NVLink time = 512 MB / 450 GB/s = 1.14 ms.
    PCIe Gen5 time = 512 MB / 63 GB/s = 8.13 ms. Ratio: 7.1x slower on PCIe. Over 32 layers: NVLink total
    = 32 * 1.14 = 36.5 ms, PCIe total = 32 * 8.13 = 260 ms.'
  options:
  - A) NVLink is ~2x faster — minor difference
  - B) NVLink is ~5x faster — noticeable but manageable
  - C) NVLink is ~7x faster — PCIe makes tensor parallelism impractical
  - D) NVLink is ~100x faster — different technology class
  correct_index: 2
