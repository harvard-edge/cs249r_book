title: Canary Traffic Batching Timeouts
scenario: 'You are managing a canary deployment for a new fraud detection model (V2). The system currently
  processes 1,000 requests per second (QPS) globally using dynamic batching. You route 5% of production
  traffic to the V2 canary instances, which run on identical T4 GPUs as V1. Within minutes, monitoring
  alerts fire: global P99 latency has spiked from 100ms to 455ms. However, the V2 instances report a mean
  inference execution time of just 55ms on the GPU, and CPU/GPU utilizations are well under limits. Diagnosing
  the system metrics, what is the root cause of the P99 latency spike, and how do you resolve it?'
question: "Diagnosing the system metrics, what is the root cause of the P99 latency spike, and how do you resolve it?"
details:
  realistic_solution: The reduced canary traffic is insufficient to quickly fill the dynamic batching
    window, causing requests to hit the maximum delay timeout. Verify by checking model server queue times.
    Resolve by using shadow traffic (100% duplication) instead of a split, or by tuning max_batch_delay
    specifically for the canary.
  common_mistake: Blaming model architecture, cold starts, or network routing overhead, failing to realize
    that fractional traffic mathematically alters the accumulation rate of dynamic request batching.
  napkin_math: Global QPS = 1000. Canary QPS (5%) = 50. If the target batch size is 32, the time to fill
    a batch of 32 is 32 / 50 QPS = 640ms. If the server's max_batch_delay is 400ms, every canary request
    waits the full 400ms before execution. Because the 5% canary traffic is larger than the top 1% (P99)
    threshold, the global P99 latency becomes 400ms (queue) + 55ms (compute) = 455ms.
