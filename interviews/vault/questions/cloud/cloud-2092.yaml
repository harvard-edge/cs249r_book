title: GQA vs MQA KV Cache Tradeoff
scenario: 'You are evaluating three attention variants for a new 30B LLM: Multi-Head Attention (MHA, 32 KV heads), Grouped-Query Attention (GQA, 8 KV heads), and Multi-Query Attention (MQA, 1 KV head).'
question: How do MHA, GQA, and MQA compare in KV cache size and serving throughput implications for a 30B LLM?
details:
  realistic_solution: 'KV cache scales linearly with the number of KV heads. GQA at 8 heads gives 4x the batch size (or 4x the context length) of MHA with minimal quality loss, making it the dominant production choice over MQA, which degrades quality too much.'
  common_mistake: |
    **The Pitfall:** Only comparing memory savings without evaluating the quality vs. throughput tradeoff.
    **The Rationale:** Engineers chase the absolute lowest memory footprint with MQA.
    **The Consequence:** They adopt MQA and suffer severe model quality degradation, missing that GQA offers a superior middle ground.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 30B parameters, 60 layers, d_head=128.
       - Precision: BF16 (2 bytes).
       - GPU Memory: 80GB A100 (leaving ~20GB for KV cache).
    2. **Calculations:**
       - MHA (32 heads) KV per token: 2 (K+V) * 32 * 128 * 2 bytes * 60 = 983 KB/token. (Concurrent 4K requests in 20GB ≈ 5).
       - GQA (8 heads) KV per token: 2 (K+V) * 8 * 128 * 2 bytes * 60 = 245 KB/token. (Concurrent 4K requests in 20GB ≈ 20).
       - MQA (1 head) KV per token: 2 (K+V) * 1 * 128 * 2 bytes * 60 = 30 KB/token. (Concurrent 4K requests in 20GB ≈ 166).
    3. **Conclusion & Interpretation:** **GQA provides 4x the concurrency of MHA without the severe quality degradation of MQA, optimizing the Memory-Bound serving limit.**
