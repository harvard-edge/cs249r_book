title: GQA vs MQA KV Cache Tradeoff
scenario: You are evaluating three attention variants for a new 30B LLM: Multi-Head Attention (MHA, 32 KV heads), Grouped-Query Attention (GQA, 8 KV heads), and Multi-Query Attention (MQA, 1 KV head).
question: How do MHA, GQA, and MQA compare in KV cache size and serving throughput implications for a 30B LLM?
details:
  realistic_solution: 'KV cache scales linearly with the number of KV heads. MHA (32 heads): baseline KV cache. GQA (8 heads): 4x smaller KV cache. MQA (1 head): 32x smaller. For serving, KV cache is often the limiting factor for batch size. Smaller KV cache -> more concurrent requests -> higher throughput. GQA at 8 heads gives 4x the batch size (or 4x the context length) with minimal quality loss, making it the dominant production choice.'
  common_mistake: |
    **The Pitfall:** Only comparing memory savings without evaluating the quality vs. throughput tradeoff.
    **The Rationale:** Engineers chase the absolute lowest memory footprint with MQA.
    **The Consequence:** They adopt MQA and suffer severe model quality degradation, missing that GQA offers a superior middle ground.
  napkin_math: |
    - **Define constraints:** 30B model, 60 layers, d_head=128, BF16 (2 bytes). Target 80GB A100 (leaving ~20GB for KV cache after 60GB weights).
    - **Calculate MHA KV per token:** `2 * 32 * 128 * 2B * 60 = 960 KB/token`. (Concurrent 4K requests in 20GB = ~5).
    - **Calculate GQA (8 heads) KV per token:** `2 * 8 * 128 * 2B * 60 = 240 KB/token`. (Concurrent 4K requests in 20GB = ~21).
    - **Calculate MQA (1 head) KV per token:** `2 * 1 * 128 * 2B * 60 = 30 KB/token`. (Concurrent 4K requests in 20GB = ~166).
    - **Conclusion:** GQA delivers **4x the concurrency** of MHA with minimal quality loss, making it the dominant production choice.
