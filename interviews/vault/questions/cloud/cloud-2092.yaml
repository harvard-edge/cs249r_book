title: GQA vs MQA KV Cache Tradeoff
scenario: 'You are evaluating three attention variants for a new 30B LLM: Multi-Head Attention (MHA, 32
  KV heads), Grouped-Query Attention (GQA, 8 KV heads), and Multi-Query Attention (MQA, 1 KV head). Compare
  the KV cache size and serving throughput implications.'
details:
  realistic_solution: 'KV cache scales linearly with the number of KV heads. MHA (32 heads): baseline
    KV cache. GQA (8 heads): 4× smaller KV cache. MQA (1 head): 32× smaller. For serving, KV cache is
    often the limiting factor for batch size. Smaller KV cache → more concurrent requests → higher throughput.
    GQA at 8 heads gives 4× the batch size (or 4× the context length) with minimal quality loss, making
    it the dominant production choice.'
  common_mistake: Only comparing memory savings without considering the quality vs throughput tradeoff.
    MQA saves the most memory but may degrade quality more than GQA, which is why most production models
    use GQA as a compromise.
  napkin_math: '30B model, 60 layers, d_head=128, BF16 (2 bytes): | MHA KV per token: 2 * 32 * 128 * 2B
    * 60 = 960 KB/token. | GQA (8 heads): 2 * 8 * 128 * 2B * 60 = 240 KB/token — 4x smaller. | MQA (1
    head): 2 * 1 * 128 * 2B * 60 = 30 KB/token — 32x smaller. | On 80GB A100, model weights ~60GB BF16,
    leaving ~20GB for KV cache. | Per 4K-context request: MHA = 960 KB * 4096 = 3.75 GB; GQA = 240 KB
    * 4096 = 0.94 GB; MQA = 30 KB * 4096 = 0.12 GB. | Concurrent 4K requests in 20GB: MHA = 20/3.75 =
    ~5; GQA = 20/0.94 = ~21; MQA = 20/0.12 = ~166. | GQA delivers 4x the concurrency of MHA with minimal
    quality loss — the dominant production choice.'
