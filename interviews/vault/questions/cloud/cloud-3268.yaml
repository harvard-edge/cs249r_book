title: Diagnosing KV-Cache Eviction on Google TPU v5e
scenario: You are running a large language model (LLM) with a context window of 32k tokens on a Google TPU v5e (16 GB HBM, 197 TFLOPS BF16, 1.6 TB/s memory bandwidth). Recently, you've observed a significant increase in latency and a decrease in throughput during inference, especially when processing longer sequences. Monitoring shows spikes in memory utilization and frequent 'HBM out of memory' errors, despite the total model parameters fitting comfortably within the 16 GB HBM.
question: How would you diagnose this issue on the TPU v5e, pinpointing the root cause, and what initial steps would you take to mitigate it?
details:
  realistic_solution: 'The primary approach would be to refine KV-cache management. First, verify the KV-cache memory usage profile. If ''paged attention'' is enabled, analyze its page utilization and fragmentation. Consider dynamic KV-cache sizing or more aggressive cache eviction policies (like H2O or StreamingLLM) if the working set of KV-cache entries is smaller than the allocated capacity. Implementing a ''prefill'' strategy for long contexts efficiently populates the cache. If the issue persists, explore quantization for the KV-cache (e.g., INT8 or FP8), or use multi-host serving to distribute the KV-cache across multiple TPUs.'
  common_mistake: |
    **The Pitfall:** Immediately reducing model size or batch size.
    **The Rationale:** Engineers overlook that the KV cache for long sequences can exceed the entire model size and VRAM capacity.
    **The Consequence:** Unnecessary model degradation without fixing the fundamental context memory limits.
  napkin_math: |
    1. Calculate per-token KV cache: 2 * 32 layers * 32 heads * 128 dim * 2 bytes = 512 KB.
    2. Calculate max KV cache per request (32k context): 32,768 tokens * 512 KB = 16 GB.
    3. Analyze TPU capacity: 16 GB KV cache consumes the entire TPU v5e HBM.
    4. Evaluate available memory: 0 GB left for model weights (14 GB) or activations.
    **Final Result: A 32k context mathematically guarantees an OOM on a 16 GB TPU v5e without tensor parallelism.**
