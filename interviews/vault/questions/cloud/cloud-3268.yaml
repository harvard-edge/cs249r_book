title: Diagnosing KV-Cache Eviction on Google TPU v5e
scenario: You are running a large language model with a 32k context window on a TPU v5e (16 GB HBM). You observe a significant increase in latency, a decrease in throughput, and frequent 'HBM out of memory' errors, despite the total model parameters fitting comfortably within the 16 GB HBM.
question: How would you diagnose this issue on the TPU v5e, pinpointing the root cause, and what initial steps would you take to mitigate it?
details:
  realistic_solution: 'The issue is the KV-cache exceeding HBM. Verify KV-cache memory usage profile. Use paged attention, aggressive cache eviction policies (H2O or StreamingLLM), or KV-cache quantization (INT8/FP8). If the issue persists, use multi-host serving.'
  common_mistake: |
    **The Pitfall:** Immediately reducing model size or batch size.
    **The Rationale:** Engineers overlook that the KV cache for long sequences can exceed the entire model size and VRAM capacity.
    **The Consequence:** Unnecessary model degradation without fixing the fundamental context memory limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TPU v5e HBM = 16 GB.
       - Context window = 32k tokens.
       - Model weights = 14 GB.
    2. **Calculations:**
       - Per-token KV cache = 2 * 32 layers * 32 heads * 128 dim * 2 bytes = 512 KB.
       - Max KV cache (32k context) = 32,768 tokens * 512 KB = 16.7 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (KV cache alone exceeds total HBM, guaranteeing OOM).**
