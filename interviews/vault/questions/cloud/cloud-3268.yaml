title: Diagnosing KV-Cache Eviction on Google TPU v5e
scenario: You are running a large language model (LLM) with a context window of 32k
  tokens on a Google TPU v5e (16 GB HBM, 197 TFLOPS BF16, 1.6 TB/s memory bandwidth).
  Recently, you've observed a significant increase in latency and a decrease in throughput
  during inference, especially when processing longer sequences. Monitoring shows
  spikes in memory utilization and frequent 'HBM out of memory' errors, despite the
  total model parameters fitting comfortably within the 16 GB HBM. You suspect KV-cache
  thrashing. How would you diagnose this issue on the TPU v5e, pinpointing the root
  cause, and what initial steps would you take to mitigate it?
question: How would you diagnose this issue on the TPU v5e, pinpointing the root cause,
  and what initial steps would you take to mitigate it?
details:
  realistic_solution: 'The primary approach would be to refine KV-cache management. First, verify the KV-cache memory usage profile. If ''paged attention'' is enabled, analyze its page utilization and fragmentation. Consider dynamic KV-cache sizing or more aggressive cache eviction policies (like H2O or StreamingLLM) if the working set of KV-cache entries is smaller than the allocated capacity. Implementing a ''prefill'' strategy for long contexts efficiently populates the cache. If the issue persists, explore quantization for the KV-cache (e.g., INT8 or FP8), or use multi-host serving to distribute the KV-cache across multiple TPUs.'
  common_mistake: 'Immediately jumping to reducing model size or batch size without first understanding the KV-cache''s actual memory footprint. Overlooking that the total KV cache for long sequences can easily exceed the entire model size and the VRAM capacity of a single TPU v5e (16 GB).'
  napkin_math: 'For a typical 7B model (32 layers, 32 attention heads, 128 head dimension), each token''s KV-cache requires: 2 (K, V) * 32 (layers) * 32 (heads) * 128 (head dim) * 2 bytes (FP16) = 524,288 bytes (512 KB). For a 32k context window, the maximum KV-cache size per request is 32,768 tokens * 512 KB/token = 16 GB. This consumes the entire 16 GB HBM of a TPU v5e just for one request''s context, leaving no room for model weights (e.g., 14 GB for FP16) or forward activations. This mathematically guarantees an OOM or severe thrashing unless tensor parallelism or KV quantization is used.'
