title: Multi-Stage Ranking Latency Budget Decomposition
scenario: 'A recommendation pipeline has a 100ms total latency SLO. It runs: retrieval
  (ANN search), light ranking (score 10K candidates), and heavy ranking (score 500
  candidates). Allocate the latency budget and specify the model sizes for each stage.'
question: How would you allocate a 100ms recommendation latency budget across retrieval,
  light ranking, and heavy ranking?
details:
  realistic_solution: 'Latency budget allocation: Retrieval (ANN search, 1M candidates
    to 10K): HNSW or FAISS at 1M items, 128-dim vectors. On GPU: 1ms. Allocate 5ms
    (5x headroom for network, sorting). Light ranking (10K candidates to 500): run
    a small 2-layer MLP (0.5M params) scoring 10K items. At H100: 10K x 0.5M x 2 FLOP
    = 10B FLOP / 989T = 0.01ms. Including embedding lookup: 10K lookups x 256B = 2.5MB
    at 3.35TB/s = 0.75μs. Allocate 20ms for light ranker (includes embedding table
    lookups, feature engineering). Heavy ranking (500 candidates): run a large cross-feature
    DNN (50M params). 500 x 50M x 2 FLOP = 50B FLOP / 989T = 0.05ms compute. Dominant
    cost: embedding lookups for 500 items, feature interaction layers. Allocate 50ms.
    Buffer: 25ms for serialization, network, runtime overhead. Total: 5 + 20 + 50
    + 25 = 100ms.'
  common_mistake: Allocating latency budget equally across stages (33ms each). Retrieval
    is embarrassingly parallel and can be very fast. Heavy ranking is the accuracy
    bottleneck and should receive the most budget. Equal allocation wastes budget
    on fast stages and under-allocates to the quality-critical stage.
  napkin_math: 'Heavy ranker 50M params, batch=500: FLOP = 500 * 50M * 2 (inference,
    not training) = 50B FLOP. H100 at 989 TFLOPS: 0.050ms compute. Actual cost dominated
    by: (1) Embedding lookups: 500 items * 20 embedding tables * 256B = 2.56MB bandwidth.
    At 3.35TB/s: 0.76μs. (2) Feature interaction: 500 * n_features^2 matmul. If n_features=200:
    40M FLOP / 989T = 40ns. (3) DNN forward 50M: 50B FLOP = 0.05ms. Total heavy ranker:
    ~1ms compute, 15ms for batch formation + feature preprocessing + Python overhead
    + network. Budget of 50ms is comfortable.'
