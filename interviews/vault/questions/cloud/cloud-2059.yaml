title: The Feedback Loop Latency Problem
scenario: In traditional software, a developer writes code, compiles in seconds, and runs unit tests in minutes. In ML development, the "compile" step (training) can take hours or days.
question: Why is this feedback loop asymmetry the single biggest productivity bottleneck in ML engineering?
details:
  realistic_solution: 'With a 1-minute feedback loop, a developer can test 60 hypotheses per hour. With a 24-hour training loop, that same developer tests 1 hypothesis per day. Over a month, the traditional developer explores ~10,000 configurations while the ML engineer explores ~20. This exponential reduction in hypothesis throughput means ML engineers must rely on intuition rather than empirical evidence for most design decisions. The iteration tax compounds: each wrong decision wastes not just compute but calendar time, which is the non-renewable resource.'
  common_mistake: |
    **The Pitfall:** Thinking the problem is simply that "training is slow."
    **The Rationale:** It's easy to view slow training as merely a compute or hardware limitation.
    **The Consequence:** Teams focus solely on faster hardware rather than optimizing the hypothesis-testing loop, ignoring that the fundamental issue is the destruction of the ability to explore the design space efficiently.
  napkin_math: |
    - **Software Dev Throughput:** 60 tests/hour &times; 8 hours = 480 hypotheses/day.
    - **ML Dev Throughput:** 1 hypothesis/day (assuming 24h training).
    - **Ratio:** 480:1.
    - **Monthly Exploration:** Over 20 working days, a software engineer explores 9,600 configurations vs the ML engineer's 20.
    - **Result:** The ML engineer explores only **0.2% of the design space** compared to a traditional software engineer.
