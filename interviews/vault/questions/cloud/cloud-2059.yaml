title: The Feedback Loop Latency Problem
scenario: In traditional software, a developer writes code, compiles in seconds, and runs unit tests in
  minutes. In ML development, the 'compile' step (training) can take hours or days. Why is this feedback
  loop asymmetry the single biggest productivity bottleneck in ML engineering?
question: "Why is this feedback loop asymmetry the single biggest productivity bottleneck in ML engineering?"
details:
  realistic_solution: 'With a 1-minute feedback loop, a developer can test 60 hypotheses per hour. With
    a 24-hour training loop, that same developer tests 1 hypothesis per day. Over a month, the traditional
    developer explores ~10,000 configurations while the ML engineer explores ~20. This exponential reduction
    in hypothesis throughput means ML engineers must rely on intuition rather than empirical evidence
    for most design decisions. The iteration tax compounds: each wrong decision wastes not just compute
    but calendar time, which is the non-renewable resource.'
  common_mistake: Thinking the problem is just 'training is slow.' The deeper issue is that slow feedback
    destroys the ability to explore the design space efficiently.
  napkin_math: 'Software dev: 60 tests/hour × 8 hours = 480 hypotheses/day. ML dev: 1 hypothesis/day (24h
    training). Ratio: 480×. Over a month: 480 × 20 working days = 9,600 vs 20. The ML engineer explores
    0.2% of the design space a software engineer would.'
