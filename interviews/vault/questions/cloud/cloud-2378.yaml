title: Predictive Maintenance Federated Fleet
scenario: 10,000 industrial vibration sensors (Cortex-M7, 512KB SRAM) connected via WiFi (100mA active) collect 100Hz 3-axis 16-bit data. The cloud orchestrates Federated Learning to train a 100KB global anomaly model.
question: How would you architect daily federated learning for the 10,000 vibration sensors to maximize battery life?
details:
  realistic_solution: |
    Push the FL client to the edge. The MCU buffers data locally and performs on-device training. Once a day, the MCU turns on WiFi, transmits the 100KB weight deltas to the cloud FL aggregator, receives the updated global weights, and turns WiFi off immediately. This shifts the compute to the data, drastically reducing radio transmit time.
  common_mistake: |
    **The Pitfall:** Streaming raw telemetry data to the cloud continuously.
    **The Rationale:** Centralized training is the default paradigm for most ML engineers.
    **The Consequence:** Continuous WiFi transmission drains the tiny battery capacity of the edge sensors within hours.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100Hz 3-axis 16-bit (2B) data. WiFi: 1 Mbps, 100mA.
       - FL Model Update: 100KB twice daily.
    2. **Calculations:**
       - Raw Streaming Data: 100 * 3 * 2 = 600 B/s = 51.8 MB/day.
       - Raw Active Time: 51.8 MB / 1 Mbps = 414 seconds (11.5 mAh/day).
       - FL Data: 200 KB/day = 1.6 Mbits.
       - FL Active Time: 1.6 Mbits / 1 Mbps = 1.6 seconds (0.044 mAh/day).
    3. **Conclusion & Interpretation:**
       - **Federated Learning reduces radio time, extending battery life by >250x. Result: Power-Bound mitigated.**
