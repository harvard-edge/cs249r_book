title: Predictive Maintenance Federated Fleet
scenario: 10,000 industrial vibration sensors (Cortex-M7, 512KB SRAM) connected via WiFi (100mA active) collect 100Hz 3-axis 16-bit data. The cloud orchestrates Federated Learning to train a 100KB global anomaly model.
question: How would you architect daily federated learning for the 10,000 vibration sensors to maximize battery life?
details:
  realistic_solution: |
    Push the FL client to the edge. The MCU buffers data locally and performs on-device training (e.g., updating a lightweight autoencoder). Once a day, the MCU turns on WiFi, transmits the 100KB weight deltas to the cloud FL aggregator, receives the updated global weights, and turns WiFi off immediately. This shifts the compute to the data, drastically reducing radio transmit time.
  common_mistake: |
    **The Pitfall:** Streaming raw telemetry data to the cloud continuously.
    **The Rationale:** Centralized training is the default paradigm for most ML engineers.
    **The Consequence:** Continuous WiFi transmission drains the tiny battery capacity of the edge sensors within hours.
  napkin_math: |
    - **Raw streaming:** 100Hz * 3 axes * 16-bit (2B) = 600 B/s, or 51.8 MB/day.
    - **Active Time:** WiFi at 1 Mbps requires 414 seconds active time. At 100mA, this burns 414 * 100 / 3600 = 11.5 mAh/day.
    - **Federated Learning (FL):** Transmit a 100KB model update twice daily (200KB = 1.6 Mbits).
    - **FL Active Time:** At 1 Mbps, WiFi is active for just 1.6 seconds, burning 1.6 * 100 / 3600 = 0.044 mAh/day.
    - **Conclusion: FL extends Cortex-M7 sensor battery life by >250x.**
