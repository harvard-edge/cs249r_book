title: LLM Inference Routing on AMD MI300X Cluster
scenario: You are leading the infrastructure team for a real-time LLM inference service deployed across a global cluster of 500 AMD MI300X accelerators. Your current LLM model instance consumes 150 GB of HBM3 and processes a single request in 150ms. The service experiences highly variable traffic, with peak loads reaching 10,000 requests per second (RPS).
question: How would you load-balance and route 10,000 RPS across 500 instances while handling variable requests, updates, and failures?
details:
  realistic_solution: A robust solution would involve a multi-layered approach. At the entry point, a global load balancer (e.g., CDN/DNS-based) directs traffic to the nearest regional cluster. Within each region, a high-performance proxy (e.g., Envoy, NGINX) acts as the primary router. This proxy would use a dynamic routing strategy, such as least-outstanding-requests or a weighted round-robin, with weights updated in real-time based on per-MI300X metrics (HBM utilization, inference queue depth, actual P99 latency, model version). Consistent hashing could be layered on top for sticky sessions (if required for multi-turn conversations) or to route specific request types/model versions to dedicated subsets of GPUs. A dedicated control plane would continuously monitor the health and performance of all MI300X instances, adjusting routing weights, draining connections from unhealthy nodes, and orchestrating zero-downtime model updates by gradually shifting traffic to new model versions.
  common_mistake: |
    **The Pitfall:** Implementing standard web (stateless) round-robin routing.
    **The Rationale:** Traditional microservice engineers assume requests have uniform processing times and that GPUs can be treated like standard CPU workers.
    **The Consequence:** Load becomes severely imbalanced due to varying inference sequence lengths. GPUs are underutilized, batching efficiency plummets, and P99 tail latency spikes dramatically.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 GPUs, 150ms per unbatched request.
    - Target load: 10,000 RPS.

    **Calculations:**
    - Unbatched Capacity: 500 GPUs * (1 req / 0.150s) = 3,333 RPS.
    - Target vs Capacity: 10,000 RPS is exactly 3x unbatched capacity.
    - Required Batching: Each GPU must process 20 RPS (50ms effective processing time).

    **Conclusion & Interpretation:**
    - **Result: 50ms processing (Compute-Bound)**. The gap between 150ms and 50ms requires dynamic continuous batching.
