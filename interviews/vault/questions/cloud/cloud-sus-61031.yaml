title: LoRA Adapter Merging and Serving Tradeoffs
scenario: 'You have 100 LoRA adapters for customer-specific fine-tunes. Compare three serving strategies:
  (A) merge adapters into base weights, (B) dynamic adapter loading, (C) keep all adapters in GPU memory.
  When is each optimal?'
question: "When is each optimal?"
details:
  realistic_solution: '(A) Merge: zero inference overhead, but requires 100 × base_model_size storage
    and separate deployment per adapter — optimal when one customer has very high traffic (>1000 RPS)
    and dedicated serving. (B) Dynamic loading: adapter loaded/unloaded per request — ~50ms swap latency,
    optimal for long-tail adapters with <1 RPS each. (C) All-in-memory: zero swap latency, requires 100
    × adapter_size in HBM — optimal for up to ~100 rank-16 adapters (100 × 13 MB = 1.3 GB on H100 80 GB
    — easily feasible).'
  common_mistake: Always merging adapters into base weights for zero inference overhead. Merging destroys
    the ability to switch adapters per request and requires storing 100 separate model copies.
  napkin_math: '100 adapters rank-16 (13B base): 100 × 13 MB = 1.3 GB. H100 80 GB — 1.3 GB adapters +
    26 GB base = 27.3 GB. 52 GB remaining for KV cache → strategy C is optimal. 100 merged copies: 100
    × 26 GB = 2.6 TB — needs 33 H100s. Strategy A only viable when single adapter serves 80% of traffic.'
