title: Computing Energy per Inference from Arithmetic Intensity
scenario: A matrix multiplication kernel performs 2M FLOPs and transfers 64KB from HBM. DRAM access costs 20 pJ/byte, each FP16 FLOP costs 0.4 pJ.
question: What are the total energy and data-movement fraction for 2M FLOPs and 64 KB of HBM traffic?
details:
  realistic_solution: |
    Arithmetic intensity = 2M FLOPs / 64KB = 2,000,000 / 65,536 ≈ 30.5 FLOPs/byte. Compute energy = 2M × 0.4 pJ = 800,000 pJ = 0.8 μJ. Memory energy = 65,536 bytes × 20 pJ = 1,310,720 pJ = 1.31 μJ. Total = 0.8 + 1.31 = 2.11 μJ. Data movement fraction = 1.31/2.11 = 62%. At arithmetic intensity 30.5, this workload sits below the ridge point (~50 FLOPs/byte), confirming it is memory-energy-bound. To reduce energy, you should optimize data reuse (tiling, fusion) rather than reduce FLOPs.
  common_mistake: |
    **The Pitfall:** Forgetting that being below the ridge point means memory energy dominates, or using 64,000 bytes instead of 65,536 bytes.
    **The Rationale:** Candidates focus on compute reduction rather than data reuse (tiling/fusion) when optimizing for energy.
    **The Consequence:** Optimization efforts are misdirected toward FLOP reduction, missing the primary energy drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2M FLOPs, 64 KB HBM traffic.
       - DRAM access: 20 pJ/byte.
       - FP16 Compute: 0.4 pJ/FLOP.
    2. **Calculations:**
       - Data Size: 64 KB = 65,536 bytes.
       - Compute Energy: 2,000,000 × 0.4 pJ = 0.8 μJ.
       - Memory Energy: 65,536 × 20 pJ = 1.31 μJ.
       - Total Energy: 0.8 + 1.31 = 2.11 μJ.
       - Data Fraction: 1.31 / 2.11 = 62%.
    3. **Conclusion & Interpretation:** **Data movement consumes 62% of the energy. Result: Memory-Energy-Bound.**
