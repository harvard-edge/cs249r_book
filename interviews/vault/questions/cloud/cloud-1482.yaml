title: Evaluating Mitigation Strategies for Acute Fraud Label Shift
scenario: 'You manage a cloud-based fraud detection ensemble processing 15,000 QPS on a fleet of c6i.8xlarge instances. Historically, the fraud rate P(Y=1) is 2%. During a coordinated credential stuffing attack, traffic spikes to 50,000 QPS and the fraud rate jumps to 25%. Analysis shows the feature distribution for fraudulent requests P(X|Y=1) remains constant. Retraining the model from scratch on 64-core instances takes 8 hours and costs $500, but the attack pattern might subside before training completes.'
question: 'Should you use full retraining, sample weighting, or post-hoc calibration for the fraud-rate jump from 2% to 25%, and why?'
details:
  realistic_solution: 'Implement Black Box Shift Estimation (BBSE) to estimate the new target class prior from unlabeled data using the confusion matrix of the existing model. Then, apply a post-hoc Bayes correction to the model''s predicted probabilities. This requires zero retraining, scales instantly to 50k QPS, and accurately adjusts decision boundaries.'
  common_mistake: |
    **The Pitfall:** Immediately suggesting an emergency retraining pipeline or applying covariate shift techniques.
    **The Rationale:** Candidates fail to recognize that P(X|Y) is invariant, making this a pure prior probability shift.
    **The Consequence:** Wasting 8 hours on a slow, expensive retrain for a transient, acute label shift that could be mitigated instantly with math.
  napkin_math: |
    - **Old Priors:** P(Y=1) = 0.02, P(Y=0) = 0.98.
    - **New Priors (BBSE Estimate):** P'(Y=1) = 0.25, P'(Y=0) = 0.75.
    - **Correction Weights:** w1 = 0.25 / 0.02 = 12.5. w0 = 0.75 / 0.98 = 0.765.
    - **Calibration Shift:** If the model originally predicted marginal P(Y=1|X) = 0.1 (not flagged at 0.5 threshold):
    - **Adjusted Probability:** (0.1 × 12.5) / ((0.1 × 12.5) + (0.9 × 0.765)) = 1.25 / (1.25 + 0.6885) = **0.645**.
    - **Result:** The request is now correctly flagged as fraud (0.645 > 0.5) **instantly, without retraining**.
