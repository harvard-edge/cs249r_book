title: Evaluating Mitigation Strategies for Acute Fraud Label Shift
scenario: You manage a cloud-based fraud detection ensemble processing 15,000 QPS on a fleet of c6i.8xlarge
  instances. Historically, the fraud rate P(Y=1) is 2%. During a coordinated credential stuffing attack,
  traffic spikes to 50,000 QPS and the fraud rate jumps to 25%. Analysis shows the feature distribution
  for fraudulent requests P(X|Y=1) remains constant. Retraining the model from scratch on 64-core instances
  takes 8 hours and costs $500, but the attack pattern might subside before training completes. Evaluate
  the trade-offs between full retraining, sample weighting, and post-hoc threshold calibration. Which
  method do you deploy to mitigate this acute shift?
details:
  realistic_solution: Implement Black Box Shift Estimation (BBSE) to estimate the new target class prior
    from unlabeled data using the confusion matrix of the existing model. Then, apply a post-hoc Bayes
    correction to the model's predicted probabilities. This requires zero retraining, scales instantly
    to 50k QPS, and accurately adjusts decision boundaries.
  common_mistake: Candidates often immediately suggest triggering an emergency retraining pipeline or
    applying covariate shift techniques (like adversarial validation), failing to recognize that P(X|Y)
    is invariant and retraining is too slow for a transient, acute label shift.
  napkin_math: 'Old priors: P(Y=1)=0.02, P(Y=0)=0.98. New priors estimated via BBSE: P''(Y=1)=0.25, P''(Y=0)=0.75.
    Weights: w1 = 0.25/0.02 = 12.5, w0 = 0.75/0.98 = 0.76. If the model originally predicted a marginal
    P(Y=1|X) = 0.1 (not flagged at a 0.5 threshold), the adjusted probability is: (0.1 * 12.5) / ((0.1
    * 12.5) + (0.9 * 0.76)) = 1.25 / (1.25 + 0.684) = 0.646. The request is now correctly flagged as fraud
    without retraining a single weight.'
