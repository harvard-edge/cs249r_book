title: Evaluating Mitigation Strategies for Acute Fraud Label Shift
scenario: 'You manage a fraud detection ensemble. Historically, fraud rate is 2%. During an attack, traffic spikes to 50,000 QPS and fraud jumps to 25%. Feature distribution P(X|Y=1) remains constant. Retraining takes 8 hours, but the attack might subside before completion.'
question: 'Should you use full retraining, sample weighting, or post-hoc calibration for the fraud-rate jump, and why?'
details:
  realistic_solution: 'Implement Black Box Shift Estimation (BBSE) to estimate the new target class prior using the confusion matrix. Apply a post-hoc Bayes correction to predicted probabilities. This requires zero retraining and scales instantly.'
  common_mistake: |
    **The Pitfall:** Immediately suggesting an emergency retraining pipeline.
    **The Rationale:** Candidates fail to recognize that P(X|Y) is invariant, making this a pure prior probability shift.
    **The Consequence:** Wasting 8 hours on a retrain for a transient shift that could be mitigated instantly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old Priors: P(Y=1) = 0.02, P(Y=0) = 0.98.
    - New Priors: P'(Y=1) = 0.25, P'(Y=0) = 0.75.
    
    **Calculations:**
    - Correction Weights: w1 = 0.25 / 0.02 = 12.5. w0 = 0.75 / 0.98 = 0.765.
    - Old Prediction: P(Y=1|X) = 0.1 (not flagged).
    - Adjusted: (0.1 * 12.5) / ((0.1 * 12.5) + (0.9 * 0.765)) = 1.25 / 1.9385 = 0.645.
    
    **Conclusion & Interpretation:**
    - **Result: Prediction shifts from 0.1 to 0.645 (Math-Bound)**. Bayesian correction resolves label shift instantly without compute.
