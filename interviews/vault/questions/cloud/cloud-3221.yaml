title: Continuous Batching Interaction with KV-Cache
scenario: Your serving system uses static batching (batch=32, all requests start and end together). Average request length varies from 50 to 2000 output tokens. You observe 60% of GPU time is wasted on padding.
question: "How does moving from static to continuous batching change KV-cache allocation, eviction, and scheduling requirements?"
details:
  realistic_solution: 'Static batching: all 32 requests start together, run until the longest finishes. Short requests (50 tokens) pad for the remaining 1950 tokens — wasting compute and holding KV-cache memory for completed requests. Continuous batching: when a request finishes, its KV-cache is immediately freed and a new request is admitted. Requirements: (1) Dynamic KV-cache allocation: PagedAttention is essential — allocate KV blocks on demand, free blocks when a request finishes. Cannot use contiguous pre-allocated buffers. (2) Memory fragmentation management: with requests entering/leaving asynchronously, the KV-cache memory pool fragments. Block-based allocation (like OS virtual memory) prevents fragmentation. (3) Iteration-level scheduling: each decode step must check which requests are active, which finished, and which new ones to admit. The attention kernel must handle variable-length sequences within the same batch. (4) Preemption protocol: if a high-priority request arrives but memory is full, the system must decide which existing request to preempt (swap its KV to CPU). Continuous batching typically achieves 2-3\times throughput improvement over static batching for workloads with variable output lengths.'
  common_mistake: |
    **The Pitfall:** Thinking continuous batching is purely a scheduling optimization.
    **The Rationale:** Engineers overlook that dynamic request lifetimes fundamentally fracture contiguous memory allocations.
    **The Consequence:** Systems attempt to use static memory buffers for dynamic batching, resulting in catastrophic memory fragmentation and OOMs.
  napkin_math: |
    *   **Static Waste:** For batch=32, avg 200 tokens, max 2000 tokens: GPU wastes $\approx (2000-200)/2000 \times 90\% = 81\%$ on padding.
    *   **Continuous Batching:** Each request occupies GPU only for its actual token length.
    *   **Result:** **Continuous batching dynamically allocates and frees KV blocks via PagedAttention, yielding a ~2.5x throughput gain.**
