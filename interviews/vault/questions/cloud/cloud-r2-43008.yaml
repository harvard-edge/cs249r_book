title: Training-Serving Skew Detection
scenario: A production model's accuracy dropped 8% over two weeks. The model hasn't been retrained. Investigation
  shows the feature 'avg_session_duration' has a distribution shift — training data shows a mean of 12
  minutes, but production serving sees a mean of 45 minutes. Both the training pipeline and serving pipeline
  read from the same feature store. What causes this training-serving skew despite a shared store?
details:
  realistic_solution: 'Common causes of skew despite shared stores: (1) Different code paths — the training
    pipeline reads from the offline store (batch-computed hourly aggregates) while serving reads from
    the online store (streaming aggregates). A bug in the streaming aggregation (e.g., not resetting session
    windows) accumulates durations incorrectly. (2) Timezone bugs — the training pipeline uses UTC for
    ''last 24h'' windows, but the streaming pipeline uses local time, creating a different aggregation
    window. (3) Backfill artifacts — the offline store was recently backfilled with corrected data, but
    the online store still uses the old computation. Fix: implement distribution monitoring that compares
    online feature distributions against the training dataset''s statistics. Alert on KL-divergence >
    threshold. Root cause in this case: investigate the session window reset logic in the streaming pipeline.'
  common_mistake: Blaming data drift in user behavior. While possible, a 3.75× shift in mean suggests
    an engineering bug, not organic drift. Real behavioral drift is typically gradual (5-20% over weeks).
  napkin_math: 'Training mean: 12 min. Production mean: 45 min. Shift: 3.75× — beyond 3σ of any natural
    drift (typical σ ≈ 2 min). KL divergence between distributions: likely > 1.0 (alert threshold: 0.1).
    If monitoring checked hourly, detection in 1 hour. Without monitoring: 2 weeks of degraded accuracy
    × 8% × $50K daily revenue impact = $56K lost.'
