title: Multi-Task LoRA Training with Gradient Conflict Resolution
scenario: A single LoRA adapter is trained simultaneously on 3 tasks: summarization, code generation, and QA. Training loss for code generation increases after step 500 while the other tasks improve. Gradient conflict analysis is needed.
question: How would you diagnose and resolve gradient conflict when code generation loss rises after step 500 while summarization and QA improve?
details:
  realistic_solution: 'Gradient conflict diagnosis: compute cosine similarity between task gradients at the LoRA parameters at step 500. If cos(g_code, g_summarization) < -0.3, they are conflicting. Methods to resolve: (1) PCGrad (Project Conflicting Gradients): project each task''s gradient onto the orthogonal complement of conflicting gradients. Reduces interference without requiring separate adapters. (2) GradNorm: dynamically reweight task losses to equalize gradient magnitudes. (3) Mixture of LoRA Experts (MoLoRA): add a router layer that selects which LoRA adapter to apply per token per layer. (4) Task-specific learning rates: use lower lr for saturating tasks and higher for underfitting. MoLoRA is most robust for 3+ tasks with conflicting gradients but doubles serving memory.'
  common_mistake: |
    **The Pitfall:** Using simple gradient averaging across tasks and assuming the highest-loss task will eventually converge.
    **The Rationale:** Candidates assume standard multi-task learning naturally balances out, ignoring that tasks can possess gradients that point in direct mathematical opposition within the shared parameter space.
    **The Consequence:** The code generation task regresses entirely, leading to a deployed model that completely fails on one of its core capabilities.
  napkin_math: |
    - **PCGrad Overhead:** 3 tasks = 3 pairs for dot product.
    - **Gradient Vector Size:** LoRA params = 15M floats (r=8 on 7B).
    - **Dot Product Cost:** 15M FLOPs (negligible).
    - **Projection Cost:** 3 pairs × 15M FLOPs = 135M FLOPs/step.
    - **Relative Overhead:** 135M FLOPs vs Forward Pass (~42B FLOPs) = **~0.3% compute overhead**, making it a highly efficient fix.
