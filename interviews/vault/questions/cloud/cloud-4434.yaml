title: Multi-Task LoRA Training with Gradient Conflict Resolution
scenario: 'A single LoRA adapter is trained simultaneously on 3 tasks: summarization,
  code generation, and QA. Training loss for code generation increases after step
  500 while the other tasks improve. Gradient conflict analysis is needed.'
question: How would you diagnose and resolve gradient conflict when code generation
  loss rises after step 500 while summarization and QA improve?
details:
  realistic_solution: 'Gradient conflict diagnosis: compute cosine similarity between
    task gradients at the LoRA parameters at step 500. If cos(g_code, g_summarization)
    < -0.3, they are conflicting. Methods to resolve: (1) PCGrad (Project Conflicting
    Gradients): project each task''s gradient onto the orthogonal complement of conflicting
    gradients. Reduces interference without requiring separate adapters. (2) GradNorm:
    dynamically reweight task losses to equalize gradient magnitudes. (3) Mixture
    of LoRA Experts (MoLoRA): add a router layer that selects which LoRA adapter to
    apply per token per layer. (4) Task-specific learning rates: use lower lr for
    saturating tasks and higher for underfitting. MoLoRA is most robust for 3+ tasks
    with conflicting gradients but doubles serving memory.'
  common_mistake: Using simple gradient averaging across tasks and assuming the highest-loss
    task will eventually converge. Summarization and QA may have gradients that directly
    conflict with code generation in the shared LoRA parameter space, causing the
    code task to regress.
  napkin_math: 'PCGrad overhead: compute gradient dot products across all task pairs.
    3 tasks = 3 pairs. Gradient vector size = LoRA params = 15M floats (r=8 on 7B).
    Dot product: 15M FLOP = negligible (H100 does this in 15us). PCGrad projection:
    3 * 15M FLOP per pair = 135M FLOP/step vs forward pass ~42B FLOP = 0.3% overhead.
    MoLoRA: 3x adapter memory = 3 * 30MB = 90MB + router (tiny MLP per layer = 32
    * 4096 * 3 = 393K params = 786KB). Total MoLoRA overhead: ~90MB memory + 1.5%
    compute for router.'
