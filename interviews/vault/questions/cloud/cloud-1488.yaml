title: Diagnosing Distributed Training Scaling Failure
scenario: A team upgrades their training cluster of 32 nodes from 4x V100 GPUs per node to 8x A100 GPUs
  per node, increasing theoretical compute capacity by ~5x. However, when training a 30B parameter model,
  their actual tokens/sec throughput only increases by 38%. The inter-node fabric was left unchanged at
  a single 100 Gbps Ethernet link per node. Diagnose the root cause of this scaling failure.
question: "Why did the 5x compute upgrade to 8x A100 nodes increase 30B training throughput by only 38%?"
details:
  realistic_solution: The root cause is a severe network fabric bottleneck. By upgrading from 4x V100
    to 8x A100 per node, compute time per step dropped from 5.0s to 1.0s (5x faster). However, the 100
    Gbps inter-node network was not upgraded. Ring AllReduce of 60GB FP16 gradients (120GB transferred)
    takes ~9.6s at 12.5 GB/s — now dominating the step time. The system went from ~66% communication-bound
    (5.0s compute, 9.6s comm) to ~91% communication-bound (1.0s compute, 9.6s comm). A 5x compute upgrade
    yields only a 38% throughput gain due to Amdahl's Law applied to the network bottleneck.
  common_mistake: Candidates often blame CPU data loading bottlenecks, slow disk I/O, or suboptimal PyTorch
    software configurations, failing to identify the hard hardware network bandwidth limitation that now
    dominates total step time.
  napkin_math: For a 30B parameter model (FP16), gradients = 60 GB. Ring All-Reduce transfers ~2 * 60
    GB = 120 GB per node. Over a 100 Gbps (12.5 GB/s) link, communication takes ~9.6 seconds. If compute
    time per step dropped from 5.0s (V100) to 1.0s (A100), the total step time goes from 14.6s to 10.6s.
    The system is now ~91% communication bound (9.6s / 10.6s), explaining why a 5x compute jump yields only a 38% throughput
    gain (14.6 / 10.6 = 1.38).
