title: Designing 3D Parallelism for Frontier Models on NVIDIA H100
scenario: You are tasked with training a colossal frontier language model with trillions of parameters
  on a cluster of NVIDIA H100 GPUs. Each H100 boasts 80 GB HBM3 memory, 989 TFLOPS FP16 dense performance,
  3.35 TB/s memory bandwidth, and consumes 700W. To scale training effectively across thousands of these
  accelerators, you decide to implement a 3D parallelism strategy, combining data, tensor, and pipeline
  parallelism. Describe how you would design this system, considering the trade-offs and challenges unique
  to integrating these three parallelism techniques on H100s for optimal performance and resource utilization.
details:
  realistic_solution: 'A robust solution would involve careful architectural partitioning: applying tensor
    parallelism within a single H100 node (leveraging high-bandwidth NVLink) to shard large layers across
    multiple H100s, then implementing pipeline parallelism across nodes to break the model into sequential
    stages. Finally, data parallelism would be applied across groups of pipeline-tensor parallel configurations.
    This requires sophisticated orchestration, dynamic batch sizing (micro-batching for pipeline parallelism),
    and potentially custom communication collectives to overlap computation and communication efficiently,
    fully exploiting the H100''s performance characteristics while mitigating communication bottlenecks
    between nodes.'
  common_mistake: A common mistake is to overlook the complex interplay of communication overheads when
    combining data, tensor, and pipeline parallelism. For instance, inefficient scheduling of communication
    primitives (e.g., all-reduce for data parallelism, all-gather/reduce-scatter for tensor parallelism)
    can lead to bubbles in the pipeline or saturate interconnects, drastically reducing the effective
    FLOPs. Another mistake is miscalculating memory requirements, assuming 80GB HBM3 per H100 is sufficient
    for local sharding without accounting for optimizer states, activations, and communication buffers.
  napkin_math: For a 1-trillion parameter FP16 model, the model weights alone require approximately 2
    TB (10^12 parameters * 2 bytes/parameter). Add optimizer states (e.g., Adam requires 12-16x model
    size in FP32) and activations, total memory can easily exceed 20-30 TB. Given each H100 has 80 GB
    HBM3, you'd need at least 250 H100s just for the model weights. The 989 TFLOPS FP16 compute power
    needs to be fed continuously by the 3.35 TB/s HBM3 bandwidth. If a single H100 can process 'X' FLOPs,
    scaling to 'N' H100s aims for 'N*X' FLOPs, but inter-node communication (often limited by Infiniband
    at ~200-400 GB/s per node, far less than NVLink within node at 900 GB/s or HBM3 at 3.35 TB/s) will
    be the primary bottleneck limiting the effective scaling factor for pipeline and data parallelism.
