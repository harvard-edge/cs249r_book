title: 'The Feature Store Consistency Trap'
scenario: 'Your team builds a feature store to eliminate training-serving skew. The store materializes 2,000 features into an online Redis cluster and an offline Parquet lake. After launch, you discover that 15% of features have different values between the online and offline paths for the same entity at the same timestamp.'
question: 'What caused the 15% value divergence between the online Redis and offline Parquet feature paths?'
details:
  realistic_solution: 'The divergence comes from late-arriving data. The online path computes features at request time, missing late data. The offline batch job running hours later includes that late data. Fix by implementing a dual-write streaming architecture (Flink) that writes identical values to both stores.'
  common_mistake: |
    **The Pitfall:** Blaming data serialization formats (like Redis vs. Parquet) or simple ETL bugs.
    **The Rationale:** Candidates view data discrepancies strictly as software engineering bugs rather than distributed systems timing issues.
    **The Consequence:** They fail to address the core architectural flaw of disparate time semantics (point-in-time vs. event-time windows).
  napkin_math: |
    **Assumptions & Constraints:**
    - 2,000 features × 10M entities = 20B values.
    - Values are 8 bytes each.

    **Calculations:**
    - Online Redis storage: 20B × 8 bytes = 160 GB (r6g.4xlarge cluster = ~$3,456/month).
    - Offline Parquet storage: 160 GB compressed to ~40 GB = ~$0.92/month.

    **Conclusion & Interpretation:**
    - **Result: 3750:1 cost asymmetry (Consistency-Skew-Bound)**. The massive disparity incentivizes building separate paths, guaranteeing divergence without streaming.
