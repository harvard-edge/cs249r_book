title: 'Diagnosing Low SM Utilization in LLM Decoding: Memory Hierarchy Design'
scenario: Your team deployed a 7B parameter LLM (14GB in BF16 weights) on a single A100 GPU (312 TFLOPs BF16, 2.0 TB/s memory bandwidth) for real-time chat. During the auto-regressive decoding phase at batch size 1, the infrastructure dashboard shows GPU compute utilization (SM active) is hovering under 5%, with latency sitting at 7ms per token (~142 tokens/sec). The platform team assumes the model code is inefficient and proposes upgrading to H100 GPUs (989 TFLOPs BF16, 3.35 TB/s bandwidth) expecting a proportional 3.1x speedup.
question: Why is the 7B BF16 model under 5% SM utilization at 7ms/token, and what H100 speedup should the team actually expect?
details:
  realistic_solution: The decoding phase is strictly memory bandwidth bound. Auto-regressive generation requires loading the entire 14GB weight tensor for a single token's matrix-vector multiplication, doing very little math per byte. Upgrading to H100 will only yield a speedup proportional to the memory bandwidth increase (1.67x), not compute.
  common_mistake: |
    **The Pitfall:** Assuming low SM utilization implies unoptimized compute logic and expecting performance to scale linearly with the jump in peak TFLOPs.
    
    **The Rationale:** Developers accustomed to training or high-batch inference look primarily at TFLOPs as the metric of performance, entirely missing the Roofline Model's implication for low-arithmetic-intensity workloads.
    
    **The Consequence:** Millions of dollars might be spent on H100 upgrades anticipating a >3x latency improvement, only to realize a mere 1.67x bump because the bottleneck was memory bandwidth, not compute.
  napkin_math: |
    - **Arithmetic Intensity**: ~14 GFLOPs / 14 GB = 1 FLOP/byte.
    - **A100 Ridge Point**: 312e12 FLOPs / 2e12 Bytes = 156 FLOPs/byte (1 << 156, deeply memory-bound).
    - **Time per token (A100)**: 14 GB / 2.0 TB/s = 7.0 ms.
    - **Time per token (H100)**: 14 GB / 3.35 TB/s = 4.18 ms.
    - **Max Speedup**: 3.35 TB/s / 2.0 TB/s = **1.675x**.
