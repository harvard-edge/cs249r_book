title: Why Micro-Benchmarks Mislead at System Level
scenario: A team measures GEMM throughput at 280 TFLOPS on H100 (98% of peak) but end-to-end training
  throughput is only 45% MFU. Explain the gap between micro-benchmark and system-level performance.
details:
  realistic_solution: 'Micro-benchmarks isolate a single operation under ideal conditions: data pre-loaded
    in cache, no kernel launch overhead, steady-state execution. Real training involves: (1) Kernel launch
    latency — thousands of small kernels with GPU idle time between them. (2) Memory-bound operations
    — LayerNorm, softmax, and element-wise ops are bandwidth-limited, not compute-limited. (3) Data loading
    — CPU-to-GPU transfer pipeline stalls. (4) Communication — gradient synchronization across GPUs (AllReduce).
    (5) Python/framework overhead — graph tracing, memory allocation. The 280 TFLOPS GEMM only applies
    during large matmuls; the rest of the model execution hits different bottlenecks. MFU measures actual
    useful FLOPs across the entire step including all overheads.'
  common_mistake: Using peak GEMM TFLOPS to estimate training time. Real workloads are a mix of compute-bound
    and memory-bound kernels.
  napkin_math: 'Typical training step: 60% matmul (high FLOPS), 20% memory-bound ops, 10% communication,
    10% overhead. Blended: 0.6×98% + 0.4×~5% ≈ 60% → ~45% after framework overhead.'
