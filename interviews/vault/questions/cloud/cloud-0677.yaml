title: The Gaudi 3 Compiler Bet
scenario: Intel is pitching us Gaudi 3 accelerators for our training cluster. Instead of hand-written
  CUDA kernels, Gaudi uses a graph compiler that automatically fuses and schedules operations. The sales
  team claims 'you get kernel-level performance without writing kernels.' Your CUDA team is skeptical.
  What are the real systems trade-offs?
details:
  realistic_solution: 'The trade-off is between **peak performance** and **development velocity**. CUDA
    gives you direct control over shared memory tiling, warp scheduling, and register allocation — expert
    kernel engineers can extract 80-90% of theoretical peak. Gaudi''s graph compiler (SynapseAI) operates
    at a higher abstraction: it takes a PyTorch graph, performs operator fusion, memory planning, and
    instruction scheduling automatically. For standard operations (GEMM, attention, LayerNorm), the compiler
    achieves 70-85% of what a hand-tuned kernel would deliver. The gap is real but narrow for common patterns.
    Where the compiler wins: (1) novel architectures — when you change your model, the compiler re-optimizes
    automatically, while CUDA requires weeks of kernel re-engineering; (2) fusion opportunities — the
    compiler can fuse chains of operations that no pre-written kernel library covers; (3) engineering
    cost — a Gaudi deployment needs 2-3 ML engineers, while a CUDA deployment at the same scale needs
    2-3 ML engineers plus 1-2 kernel specialists at $400K+/year. Where the compiler loses: (1) tail operations
    with irregular memory access patterns; (2) workloads requiring custom memory management (like PagedAttention);
    (3) debugging — when the compiler generates slow code, you have limited visibility into why.'
  common_mistake: '"A compiler can never match hand-tuned CUDA kernels, so Gaudi will always be slower."
    This underestimates modern graph compilers and ignores the total cost of ownership, including engineering
    time.'
  napkin_math: 'Gaudi 3 specs: 1835 TFLOPS BF16, 128 GB HBM2e at 3.7 TB/s. H100 SXM: 989 TFLOPS BF16 (1979
    with sparsity), 80 GB HBM3 at 3.35 TB/s. Raw BF16 TFLOPS favors Gaudi 3 by ~1.85×. But MFU (Model
    FLOP Utilization) matters: H100 with optimized CUDA achieves 55-65% MFU on LLM training; Gaudi 3 with
    compiler typically achieves 45-55% MFU. Effective throughput: H100 = 989 × 0.60 = **593 TFLOPS**;
    Gaudi 3 = 1835 × 0.50 = **918 TFLOPS**. Gaudi 3 still leads on effective throughput despite lower
    MFU, because the raw silicon advantage is large enough. The real question is $/TFLOP-effective including
    engineering costs over a 3-year deployment.'
