title: Optimizing LLM Inference Latency on AMD MI300X with Queueing Theory
scenario: You are designing a high-throughput, low-latency inference service for a
  large language model (LLM) deployed on a cluster of AMD MI300X accelerators. Each
  MI300X has 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory
  bandwidth. The LLM requires significant memory for its weights and activations.
  Incoming inference requests vary in complexity and size, leading to fluctuating
  service times. Your goal is to optimize tail latency while ensuring high utilization
  of the MI300X GPUs under varying traffic patterns, including sudden bursts. How
  would you apply queueing theory principles to determine optimal queue depths, manage
  arrival rates, and plan capacity to minimize latency and prevent resource starvation
  or underutilization?
question: How would you apply queueing theory principles to determine optimal queue
  depths, manage arrival rates, and plan capacity to minimize latency and prevent
  resource starvation or underutilization?
details:
  realistic_solution: Implement a dynamic queue management system that continuously
    monitors real-time arrival rates (λ) and service times (Ts) per MI300X accelerator.
    Utilize Little's Law (L = λW) to relate average queue length (Lq), arrival rate,
    and average waiting time (Wq). Based on target latency percentiles (e.g., P99
    latency < 50ms), dynamically adjust batch sizes and queue limits. This involves
    predictive modeling of incoming traffic and adaptive resource allocation. For
    capacity planning, use analytical queueing models (like M/M/c or M/G/c) as a starting
    point, validated and refined with empirical data from the MI300X cluster. Consider
    implementing admission control to protect against overload and, during extreme
    conditions, intelligent load shedding or request prioritization to maintain critical
    service levels. Ensure the system accounts for the MI300X's 192 GB HBM3 memory
    capacity when determining maximum effective batch sizes.
  common_mistake: Ignoring the variability of service times and arrival rates, treating
    the system as deterministic. This often leads to under-provisioning or over-provisioning
    of queues, resulting in either high latency/dropped requests during bursts or
    wasted resources during lulls. Another common mistake is failing to accurately
    account for the actual memory footprint and compute requirements of the specific
    LLM on the MI300X, which can miscalculate individual GPU capacity and lead to
    inefficient batching strategies.
  napkin_math: 'Assume an average inference service time (Ts) of 200 ms per request
    on a single MI300X. If the average arrival rate (λ) to this MI300X is 3 requests/second,
    and we target an average queue wait time (Wq) of 100 ms, then the total average
    time in the system (W) is 300 ms. By Little''s Law, the average number of requests
    in the system (L) is λ * W = 3 req/s * 0.3 s = 0.9 requests. The average queue
    length (Lq) would be λ * Wq = 3 req/s * 0.1 s = 0.3 requests. This suggests a
    small queue is sufficient on average. During peak bursts where λ might increase
    to 6 req/s, maintaining Wq at 100 ms would require Lq = 6 req/s * 0.1 s = 0.6
    requests. To estimate raw throughput, if an LLM inference requires, say, 100 TFLOPS-seconds
    of FP16 sparse compute, then an MI300X with 1,307 TFLOPS FP16 sparse capacity
    could theoretically perform 1,307 / 100 = 13.07 inferences/second. Memory bandwidth
    of 5.3 TB/s (5300 GB/s) also plays a role: if a model''s active working set is
    100GB and it needs to be accessed 50 times per inference, total data movement
    is 5TB. At 5.3 TB/s, this implies a service time bottleneck if compute is faster.'
