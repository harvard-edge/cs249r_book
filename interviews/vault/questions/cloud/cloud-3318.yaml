title: Optimizing LLM Inference Latency on AMD MI300X with Queueing Theory
scenario: You are designing a high-throughput, low-latency inference service for a large language model (LLM) deployed on a cluster of accelerators. Incoming inference requests vary in complexity and size, leading to fluctuating service times. Your goal is to optimize tail latency while ensuring high utilization under varying traffic patterns.
question: How would you apply queueing theory principles to determine optimal queue depths, manage arrival rates, and plan capacity to minimize latency and prevent resource starvation or underutilization?
details:
  realistic_solution: Implement a dynamic queue management system that continuously monitors real-time arrival rates (λ) and service times (Ts) per accelerator. Utilize Little's Law (L = λW) to relate average queue length (Lq), arrival rate, and average waiting time (Wq). Based on target latency percentiles (e.g., P99 latency < 50ms), dynamically adjust batch sizes and queue limits. This involves predictive modeling of incoming traffic and adaptive resource allocation. For capacity planning, use analytical queueing models (like M/M/c or M/G/c) as a starting point, validated and refined with empirical data from the cluster. Consider implementing admission control to protect against overload and, during extreme conditions, intelligent load shedding or request prioritization to maintain critical service levels. Ensure the system accounts for memory capacity when determining maximum effective batch sizes.
  common_mistake: |
    **The Pitfall:** Ignoring the variability of service times and arrival rates, treating the system as deterministic.
    **The Rationale:** Traffic bursts and varying prompt lengths create non-deterministic load that static queues cannot handle gracefully.
    **The Consequence:** Under-provisioning or over-provisioning queues, resulting in high latency/dropped requests during bursts or wasted resources during lulls.
  napkin_math: |
    - Assume an average inference service time (Ts) of 200 ms per request.
    - Average arrival rate (λ) = 3 req/s.
    - Target average queue wait time (Wq) = 100 ms.
    - Total average time in system (W) = 300 ms.
    - Average number of requests in system (L) = λ * W = 3 * 0.3 = 0.9.
    - Average queue length (Lq) = λ * Wq = 3 * 0.1 = 0.3.
    - Peak burst λ = 6 req/s. Lq = 6 * 0.1 = 0.6.
    - Throughput capacity: 100 TFLOPS-seconds of FP16 compute needed per inference.
    - Accelerator capacity: 1,307 TFLOPS / 100 = **13.07 inferences/second max throughput**.
