title: Serving Diversity vs Relevance Tradeoff in Re-ranking
scenario: A recommendation system's relevance ranker returns the top 20 items but 18 of 20 are from the
  same content category (fashion). Users are exposed to no diversity. Design a re-ranking algorithm that
  balances relevance and diversity.
question: "How would you design a re-ranking algorithm that balances relevance and diversity when 18 of the top 20 items are fashion?"
details:
  realistic_solution: 'Context-adaptive diversity re-ranking: (1) Maximal Marginal Relevance (MMR): iteratively
    select items that maximize lambda × relevance_score - (1-lambda) × similarity_to_already_selected.
    Lambda is a diversity parameter. (2) Adaptive lambda: if user''s session shows single-category browsing
    for last 5 items (session_diversity_score < 0.2): set lambda=0.9 (relevance-heavy). If session shows
    multi-category browsing: lambda=0.6 (diversity-balanced). (3) Category diversity constraint: hard
    constraint: at most K items from the same category in top N. K=5 for N=20. Implement as post-processing:
    run greedy selection with category budget. (4) Slot-specific diversity: even in single-category preference,
    ensure items 15-20 are more diverse (exploration slots). (5) Evaluation: A/B test diversity vs baseline.
    Measure: per-session click rate (may drop slightly), unique categories explored (should increase),
    return visit rate (proxy for long-term satisfaction).'
  common_mistake: Using a fixed diversity penalty that degrades recommendations for users who genuinely
    prefer mono-category content. A uniform diversity penalty applied to all users and contexts ignores
    user preference signals and may reduce engagement for users who are in a deep-dive session on a specific
    topic.
  napkin_math: 'MMR complexity: O(N × K) where K = number of already selected items, N = candidates. For
    20 slots from 500 candidates: comparisons = 500×1 + 499×2 + ... + 481×20 ≈ sum over k=1..20 of (500-k+1)×k
    ≈ 20×500 + ... ≈ 95,000 comparisons. Similarity computation: cosine similarity between 128-dim embeddings
    = 128 multiply-adds. Total MMR compute: 95,000 × 128 FLOP = 12.2M FLOP / 989T = 0.012ms. Negligible
    overhead.'
