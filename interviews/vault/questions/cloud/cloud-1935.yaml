title: Diagnosing Staged Data Pipeline Starvation
scenario: 'A team is training a multimodal vision model on an 8x GPU node. Profiling reveals a sequential pipeline: NVMe I/O takes 90ms, PCIe HtoD transfer takes 20ms, and GPU compute takes 100ms. The GPU is active ~47% of the time.'
question: How would you remove the 210ms sequential data-pipeline stall and maximize utilization on the node?
details:
  realistic_solution: Implement an asynchronous, overlapping pipeline using double buffering. Allocate page-locked (pinned) memory on the host and use non-blocking PCIe DMA transfers. This allows the CPU, PCIe bus, and GPU to work on batches N+2, N+1, and N simultaneously.
  common_mistake: |
    **The Pitfall:** Suggesting hardware scale-ups (e.g., upgrading CPUs or faster NVMe drives) or reducing model complexity.
    **The Rationale:** Slow step times intuitively point to a lack of raw compute power.
    **The Consequence:** Increasing cloud infrastructure costs drastically without solving the fundamental sequential blocking of the pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequential step time = 90ms (IO) + 20ms (PCIe) + 100ms (GPU) = 210ms.
    2. **Calculations:**
       - Current GPU utilization = 100ms / 210ms = 47.6%.
       - Overlapping pipeline (double buffering) step time = max(90, 20, 100) = 100ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Pipeline.** By overlapping operations using pinned memory and non-blocking transfers, GPU utilization hits 100% and throughput more than doubles (210ms -> 100ms).
