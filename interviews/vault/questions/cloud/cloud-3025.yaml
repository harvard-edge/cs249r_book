title: 'MLOps Lifecycle: Concretely Size Model Registry Storage for a Large ML Organization'
scenario: 'A ML platform team at a large company runs 200 experiments/week across
  model sizes ranging from 1B to 70B parameters on H100 clusters. Size the total model
  registry storage requirements for 1 year, including: full checkpoints every 10 epochs,
  best-5 checkpoints per experiment, and evaluation artifacts. Propose a cost-effective
  tiering strategy.'
question: How much registry storage is needed for 200 experiments per week over a
  year, and what tiering strategy minimizes cost?
details:
  realistic_solution: 'Average model: 13B FP16 = 26GB. Best-5 checkpoints per experiment: 130GB. 200 experiments/week = 26TB/week. 52 weeks = 1.35PB. Without tiering, 1.35PB at $0.023/GB costs ~$31,000/month. A cost-effective tiering strategy: (1) keep all 5 checkpoints in standard storage for 30 days; (2) reduce to best-1 checkpoint in standard storage for days 31-90; (3) transition the best-1 checkpoint to Glacier ($0.004/GB) after 90 days. This keeps standard storage at ~157TB ($3,600/month) and archive at ~200TB ($800/month), reducing costs by ~85%.'
  common_mistake: Calculating total storage without applying lifecycle policies; storing
    all 200 experiments × 52 weeks indefinitely when most are superseded within months.
  napkin_math: 'No lifecycle: 52 weeks * 200 * 130GB = 1,352,000 GB. Cost = 1,352,000 * $0.023 = $31,096/month. With lifecycle: <30 days: ~4.3 weeks * 26TB = ~112TB (Standard). 31-90 days: ~8.7 weeks * 200 * 26GB (best-1) = ~45TB (Standard). Total Standard = 157TB * $0.023 = ~$3,611. >90 days (months 4-12): ~39 weeks * 200 * 26GB = ~203TB (Glacier). Total Glacier = 203TB * $0.004 = ~$812. Total = $4,423/month. Savings = $31,096 / $4,423 = ~7x.'
