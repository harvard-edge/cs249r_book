title: 'MLOps Lifecycle: Concretely Size Model Registry Storage for a Large ML Organization'
scenario: 'A ML platform team at a large company runs 200 experiments/week across
  model sizes ranging from 1B to 70B parameters on H100 clusters. Size the total model
  registry storage requirements for 1 year, including: full checkpoints every 10 epochs,
  best-5 checkpoints per experiment, and evaluation artifacts. Propose a cost-effective
  tiering strategy.'
question: How much registry storage is needed for 200 experiments per week over a
  year, and what tiering strategy minimizes cost?
details:
  realistic_solution: 'Average model: 13B (mid-size). 13B FP16 = 26GB. Best-5 checkpoints
    per experiment: 5 × 26GB = 130GB. 200 experiments/week × 130GB = 26TB/week. 52
    weeks = 1.352PB — far too expensive. Apply lifecycle: keep best-1 per experiment
    after 30 days (90% reduction), S3 Glacier for experiments older than 90 days ($0.004/GB
    vs $0.023/GB). Active storage: 200 × 26GB = 5.2TB × $0.023 = $119/month. Archive:
    1.352PB × $0.004 = $5,408/month.'
  common_mistake: Calculating total storage without applying lifecycle policies; storing
    all 200 experiments × 52 weeks indefinitely when most are superseded within months.
  napkin_math: '26GB × 5 checkpoints × 200 exp × 52 weeks = 1.352PB. At $0.023/GB:
    $31,096/month. With lifecycle (keep 1 best, archive after 30 days): active = 200
    exp × 26GB = 5.2TB = $120/month. Archive (1 year - 1 month): 1.352PB × 11/12 =
    1.239PB × $0.004 = $4,956/month. Total: $5,076/month vs $31K. 6× savings.'
