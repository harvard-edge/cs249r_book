title: 'MLOps Lifecycle: Concretely Size Model Registry Storage for a Large ML Organization'
scenario: 'A ML platform team at a large company runs 200 experiments/week across model sizes ranging from 1B to 70B parameters on H100 clusters.'
question: How much registry storage is needed for 200 experiments per week over a year, and what tiering strategy minimizes cost?
details:
  realistic_solution: 'Average model: 13B FP16 = 26GB. Best-5 checkpoints per experiment: 130GB. 200 experiments/week = 26TB/week. 52 weeks = 1.35PB. Without tiering, 1.35PB at $0.023/GB costs ~$31,000/month. A cost-effective tiering strategy: (1) keep all 5 checkpoints in standard storage for 30 days; (2) reduce to best-1 checkpoint in standard storage for days 31-90; (3) transition the best-1 checkpoint to Glacier ($0.004/GB) after 90 days. This keeps standard storage at ~157TB ($3,600/month) and archive at ~200TB ($800/month), reducing costs by ~85%.'
  common_mistake: |
    **The Pitfall:** Calculating total storage without applying lifecycle policies.
    **The Rationale:** Engineers often calculate peak theoretical capacity without considering the diminishing value of old ML experiments.
    **The Consequence:** Storing all experiments indefinitely in hot storage, incurring $31k/month in unnecessary infrastructure costs.
  napkin_math: |
    1. Average model size (13B FP16): 26GB. Best-5 checkpoints per experiment: 130GB.
    2. 200 experiments/week = 26TB/week. 52 weeks = 1,352,000 GB (1.35PB).
    3. No lifecycle cost: 1,352,000 GB * $0.023/GB = $31,096/month.
    4. With lifecycle (Standard <90 days, Glacier >90 days): Total Standard ≈ 157TB * $0.023 = $3,611/month.
    5. Total Glacier ≈ 203TB * $0.004 = $812/month.
    6. **Total cost drops to ~$4,423/month, a 7x savings.**
