title: GPipe vs 1F1B Schedule Trade-offs in LLM Training
scenario: Your team is training a 175B parameter model on a 64-GPU cluster (8 nodes of 8x A100 80GB GPUs). You are using tensor parallelism (TP=8) within each node and pipeline parallelism (PP=8) across nodes. The global batch size is 1024 and the microbatch size is 2, yielding 512 microbatches per pipeline step. You must evaluate and justify the choice between a flush-based GPipe schedule and a steady-state 1F1B (One-Forward-One-Backward) schedule.
question: Should you use flush-based GPipe or 1F1B for 512 microbatches, and why?
details:
  realistic_solution: 'Select the 1F1B schedule. While both schedules yield a pipeline bubble fraction of (p-1)/(m+p-1), GPipe requires storing activations for all ''m'' microbatches (512) simultaneously before beginning backward passes, which will immediately OOM the 80GB GPUs. 1F1B limits the maximum inflight microbatches to ''p'' (8), strictly bounding activation memory.'
  common_mistake: |
    **The Pitfall:** Evaluating the schedules solely on pipeline bubble size.
    **The Rationale:** Candidates equate "pipeline efficiency" directly and only with idle wait time (the bubble).
    **The Consequence:** Failing to realize both schedules have identical bubbles, but GPipe's O(m) memory requirement will instantly OOM the GPUs.
  napkin_math: |
    - **Parameters:** Pipeline stages (p) = 8. Microbatches (m) = 512.
    - **Bubble Fraction:** `(p - 1) / (m + p - 1)` = `7 / (512 + 8 - 1)` = 7 / 519 ≈ 1.35% (for both schedules).
    - **GPipe Activation Memory:** Scales as O(m). Must store all 512 microbatches simultaneously.
    - **1F1B Activation Memory:** Scales as O(p). Stores a maximum of 8 microbatches in-flight.
    - **Conclusion:** **1F1B reduces activation memory storage by (512 - 8) / 512 = 98.4%.**
