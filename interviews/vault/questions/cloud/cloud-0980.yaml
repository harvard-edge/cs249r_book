title: Calculating Data Parallel Bottlenecks
scenario: You are scaling a 10B parameter model training job across 16 nodes connected via a 100 Gbps
  Ethernet network. You are using FP16 precision (2 bytes per parameter) and standard Data Parallelism
  with Ring All-Reduce. The forward and backward pass computation takes 400ms per step. Calculate the
  communication time per step and the communication-to-computation ratio to determine the primary bottleneck.
question: "What is the Ring All-Reduce communication time per step and comm-to-compute ratio, and is the 16-node job communication-bound?"
details:
  realistic_solution: 'First, calculate the gradient size: 10B parameters * 2 bytes = 20 GB. In Ring All-Reduce,
    each node transfers 2 * (N-1)/N * M data. For 16 nodes, this is 2 * (15/16) * 20 GB = 37.5 GB. The
    network bandwidth is 100 Gbps, which equals 12.5 GB/s. The communication time is 37.5 GB / 12.5 GB/s
    = 3.0 seconds. With compute taking 0.4 seconds, the communication-to-computation ratio is 3.0 / 0.4
    = 7.5. The system is severely communication-bound.'
  common_mistake: Failing to account for the 2 * (N-1)/N multiplier in Ring All-Reduce data transfer,
    or forgetting to convert network bandwidth from Gigabits (Gbps) to Gigabytes (GB/s).
  napkin_math: A 10B parameter model in FP16 requires 10B * 2 bytes = 20GB. Ring All-Reduce communication
    volume per node is roughly 2 * 20GB = 40GB. Node network bandwidth is 100 Gbps = 12.5 GB/s. Total
    communication time per backward pass = 40GB / 12.5 GB/s = 3.2 seconds. If compute takes 0.4s, the
    comm-to-compute ratio is 3.2s / 0.4s = 8.0x. This severe bottleneck requires higher bandwidth (e.g.,
    400Gbps).
