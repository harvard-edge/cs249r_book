title: The GPU Failure Cadence
scenario: >-
  You are managing a large training cluster of 10,000 H100 GPUs.
question: >-
  Given a typical Mean Time To Failure (MTTF) of 50,000 hours for a single GPU, what is the expected frequency of a GPU failure somewhere in your fleet?
details:
  realistic_solution: 'The correct answer is that a GPU will fail approximately every 5 hours. At a large enough scale, individual component reliability translates into a continuous operational failure rate for the fleet as a whole.'
  common_mistake: |
    **The Pitfall:** Misinterpreting MTTF as a guarantee of minimum time before failure.
    **The Rationale:** Engineers often forget that at scale, the probability of any single device failing becomes a near-certainty over short time horizons.
    **The Consequence:** Failing to implement robust checkpointing and fault-tolerance mechanisms, leading to massive losses of training progress.
  napkin_math: |
    1. **Assume MTTF:** 50,000 hours for a single H100 GPU.
    2. **Cluster size:** 10,000 GPUs.
    3. **Fleet MTTF:** 50,000 hours / 10,000 GPUs = 5 hours.
    4. **Result:** Statistically, you expect one GPU failure somewhere in the cluster approximately **every 5 hours.**
  options:
  - About once a month
  - About once a week
  - About once every 5 hours
  - About once every 50,000 hours
  correct_index: 2
