title: The GPU Failure Cadence
scenario: You are managing a large training cluster of 10,000 H100 GPUs. Given a typical Mean Time To
  Failure (MTTF) for a single GPU, what is the expected frequency of a GPU failure somewhere in your fleet?
details:
  realistic_solution: The correct answer is that a GPU will fail approximately every 5 hours. At a large
    enough scale, individual component reliability translates into a continuous operational failure rate
    for the fleet as a whole.
  common_mistake: Engineers often misinterpret MTTF as a guarantee of minimum time before failure, rather
    than a statistical average. At scale, the probability of *any* single device failing becomes a near-certainty
    over short time horizons. They might think a 50,000-hour MTTF means failures are rare, forgetting
    this applies to a fleet, not a single unit.
  napkin_math: '1. Assume a conservative Mean Time To Failure (MTTF) for a single H100 GPU is 50,000 hours
    (about 5.7 years).

    2. In a cluster of 10,000 GPUs, the fleet MTTF is the individual MTTF divided by the number of components.

    3. Fleet MTTF = 50,000 hours / 10,000 GPUs = 5 hours.

    4. Statistically, you should expect one GPU failure somewhere in the cluster approximately every 5
    hours.'
  options:
  - About once a month
  - About once a week
  - About once every 5 hours
  - About once every 50,000 hours
  correct_index: 2
