title: LLM Inference Routing on AMD MI300X Cluster
scenario: You are leading the infrastructure team for a real-time LLM inference service deployed across
  a global cluster of 500 AMD MI300X accelerators. Each MI300X boasts 192 GB HBM3, can deliver 1,307 TFLOPS
  FP16 sparse performance, and has a memory bandwidth of 5.3 TB/s. Your current LLM model instance consumes
  150 GB of HBM3 and typically processes a single request (or a small batch) in 150ms. The service experiences
  highly variable traffic, with peak loads reaching 10,000 requests per second (RPS). Design an end-to-end
  load balancing and request routing strategy that ensures low latency, high availability, efficient resource
  utilization, and gracefully handles dynamic conditions like varying request complexities, model updates,
  and partial cluster failures.
question: "How would you load-balance and route 10,000 RPS across 500 MI300X LLM inference accelerators while handling variable requests, updates, and failures?"
details:
  realistic_solution: A robust solution would involve a multi-layered approach. At the entry point, a
    global load balancer (e.g., CDN/DNS-based) directs traffic to the nearest regional cluster. Within
    each region, a high-performance proxy (e.g., Envoy, NGINX) acts as the primary router. This proxy
    would use a dynamic routing strategy, such as least-outstanding-requests or a weighted round-robin,
    with weights updated in real-time based on per-MI300X metrics (HBM utilization, inference queue depth,
    actual P99 latency, model version). Consistent hashing could be layered on top for sticky sessions
    (if required for multi-turn conversations) or to route specific request types/model versions to dedicated
    subsets of GPUs. A dedicated control plane would continuously monitor the health and performance of
    all MI300X instances, adjusting routing weights, draining connections from unhealthy nodes, and orchestrating
    zero-downtime model updates by gradually shifting traffic to new model versions.
  common_mistake: A common mistake is implementing a basic client-side or simple round-robin load balancer
    without factoring in the unique characteristics of GPU inference (e.g., batching, memory utilization,
    varying model complexity per request, cold starts). This often leads to imbalanced load, underutilized
    high-performance GPUs, or overloading specific instances, resulting in tail latency spikes and reduced
    overall throughput.
  napkin_math: 'Given 500 MI300X GPUs and a peak load of 10,000 RPS: If each MI300X can process one request
    every 150ms (0.15s), its maximum theoretical throughput is 1 / 0.15 ≈ 6.67 RPS. The total cluster
    theoretical capacity would then be 500 GPUs * 6.67 RPS/GPU ≈ 3335 RPS. This is significantly lower
    than the 10,000 RPS peak, indicating that the 150ms processing time must be for an *optimal batch
    size* that the MI300X is designed for, or that further optimization is needed. To meet 10,000 RPS
    with 500 GPUs, each GPU must effectively handle 10,000 / 500 = 20 RPS. This means the effective processing
    time per request (including batching) needs to be 1 / 20 RPS = 50ms. This gap (150ms vs 50ms) highlights
    the critical need for efficient batching and dynamic load balancing that can adapt to varying batch
    sizes and ensure all MI300X resources are optimally utilized to meet latency and throughput targets.'
