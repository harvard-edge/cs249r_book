title: The First-Year Cost of an H100
scenario: A new project requires a dedicated NVIDIA H100 GPU running 24/7 for a full year. Using the hardware
  constants, calculate the Total Cost of Ownership (TCO) for the first year. Assume an electricity cost
  of $0.15/kWh and an average datacenter Power Usage Effectiveness (PUE) of 1.1.
details:
  realistic_solution: 'The TCO is the sum of the initial hardware cost (CapEx) and all operational costs
    (OpEx) for the period. For the first year, this includes the H100 unit cost, the annual maintenance
    cost, and the total power cost (including the PUE overhead). CapEx: $30,000. Power OpEx: The H100
    draws 700W. With PUE 1.1, total facility power = 700 × 1.1 = 770W = 0.77 kW. Annual energy = 0.77
    kW × 8,760 hours = 6,745 kWh. Annual power cost = 6,745 × $0.15/kWh = $1,012. Maintenance OpEx (assuming
    5% of CapEx): $1,500. First-year TCO = $30,000 + $1,500 + $1,012 = **$32,512**. The power cost is
    roughly 3% of the first-year TCO, but over a 5-year depreciation period, total power cost accumulates
    to ~$5,060, making it a more significant factor.'
  common_mistake: Engineers often underestimate TCO by only considering the Capital Expense (CapEx) —
    the sticker price of the GPU. They forget to include significant Operational Expenses (OpEx) like
    power and maintenance, which can accumulate to a substantial fraction of the initial hardware cost
    over the asset's lifetime. Another common mistake is forgetting the PUE multiplier, which accounts
    for the energy used by cooling and other datacenter infrastructure, not just the GPU itself.
  napkin_math: '1. **Capital Expense (CapEx)**: $30,000. 2. **Power draw with PUE**: 700W × 1.1 = 770W
    = 0.77 kW. 3. **Annual energy**: 0.77 kW × 8,760 hours = 6,745 kWh. 4. **Annual power cost**: 6,745
    kWh × $0.15/kWh = **$1,012**. 5. **Annual maintenance** (5% of CapEx): $30,000 × 0.05 = **$1,500**.
    6. **First-Year TCO**: $30,000 + $1,500 + $1,012 = **$32,512**.'
  options:
  - ~$30,000 (CapEx only)
  - ~$31,500 (Forgets power cost)
  - ~$32,420 (Forgets PUE multiplier)
  - ~$32,512 (Correct TCO)
  correct_index: 3
