title: 'H100: Compute or Memory Bound?'
scenario: An engineer is analyzing a kernel on an NVIDIA H100 GPU. For a single inference pass, the kernel
  performs 20 GFLOPS of computation and requires reading 200 MB of parameters from HBM3 memory. Explain
  if this kernel is compute-bound or memory-bound by calculating its Arithmetic Intensity and comparing
  it to the H100's roofline.
details:
  realistic_solution: The kernel is **memory-bound**. Its performance is limited by the HBM3 bandwidth,
    not the compute capacity. To determine this, we calculate the kernel's Arithmetic Intensity (AI) and
    compare it to the H100's ridge point. The ridge point is the AI at which the system transitions from
    being memory-bound to compute-bound.
  common_mistake: Engineers often assume that a powerful GPU like the H100 will always be compute-bound.
    They focus on the headline TFLOPS number and forget that if a kernel doesn't perform enough operations
    for every byte it reads from memory, its performance will be entirely dictated by memory bandwidth,
    leaving the compute cores starved for data.
  napkin_math: '1. **Calculate Kernel Arithmetic Intensity (AI):**

    Compute: 20 GFLOPS = 20,000 MFLOPs. Memory: 200 MB.

    AI = 20,000 MFLOPs / 200 MB = 100 FLOPs/Byte.

    2. **Compare to Hardware Ridge Point:**

    H100 Ridge Point = 989,000 GFLOPS / 3,350 GB/s ≈ 295 FLOPs/Byte.

    Since 100 FLOPs/Byte < 295 FLOPs/Byte, the kernel''s arithmetic intensity is lower than the ridge
    point, making it memory-bound.'
  options:
  - Compute-bound. Its Arithmetic Intensity is high, so performance is limited by the 989 TFLOPS of compute.
  - Memory-bound. Its Arithmetic Intensity is 0.1 FLOPs/Byte, which is far below the H100's ridge point.
  - Memory-bound. Its Arithmetic Intensity is 100 FLOPs/Byte, which is below the H100's ridge point of
    ~295 FLOPs/Byte.
  - Compute-bound. Any operation performing 20 GFLOPS is inherently compute-intensive and will be limited
    by core speed, not memory.
  correct_index: 2
