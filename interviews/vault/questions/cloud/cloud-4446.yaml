title: Disaggregated Serving Autoscaler Response Time Analysis
scenario: A disaggregated serving autoscaler takes 90 seconds to provision a new decode
  node (container start + model load). Traffic spikes of 2x baseline lasting 3 minutes
  cause P99 latency violations for the first 90 seconds. Design a predictive autoscaling
  strategy.
question: How would you autoscale decode capacity for 2x traffic spikes lasting 3
  minutes when new nodes take 90 seconds to provision?
details:
  realistic_solution: 'Predictive autoscaling strategies: (1) Time-series forecasting:
    train a model (e.g., LSTM or Prophet) on historical traffic patterns. Forecast
    5-minute ahead traffic. Pre-provision decode nodes 90 seconds before predicted
    spike onset. (2) Warm pool: maintain N spare pre-provisioned decode nodes in standby
    (model loaded, not serving). Switch warm nodes to active in <5 seconds. Cost:
    N * GPU_cost * idle_time. For 5% traffic variance: keep 10% spare warm capacity.
    (3) Hybrid reactive + predictive: predictive handles known patterns (daily/weekly),
    reactive handles anomalies via warm pool. (4) Gradual scale-up: start provisioning
    at 60% utilization (before 80% threshold) to overlap provisioning with the pre-spike
    window. For 70B on H100: model load = 80 seconds (280GB / 3.35TB/s). Pre-load
    model at boot, keep model in CPU RAM for fast GPU transfer (280GB at PCIe 32 GB/s
    = 8.75s). Reduces scale-up time from 90s to ~15s.'
  common_mistake: Using reactive autoscaling with a fixed threshold (e.g., scale up
    when GPU utilization > 80%). By the time GPU utilization exceeds 80%, the queue
    is already building and latency violations are imminent. The 90-second provisioning
    lag makes reactive scaling too slow for transient spikes.
  napkin_math: 'Traffic spike: 2x for 3 minutes = 180 seconds. With 90s provisioning:
    first 90s of spike unmitigated. At 2x traffic, utilization jumps from 70% to 140%
    — 40% excess. At 40% excess: queue grows at 0.4 * arrival_rate. Over 90 seconds:
    queue depth = 0.4 * 500 RPS * 90s = 18,000 requests queued. Average wait = queue_depth
    / service_rate = 18000 / 500 = 36 seconds added latency. P99 TTFT: baseline 200ms
    + 36s = unacceptable. With warm pool (15s switch): only 15s unmitigated: queue
    = 0.4 * 500 * 15 = 3000 requests. Wait = 3000/500 = 6 seconds. Still high. Need
    warm pool for full 2x capacity: 2x warm pool = expensive but guarantees SLA.'
