title: Disaggregated Serving Autoscaler Response Time Analysis
scenario: A disaggregated serving autoscaler takes 90 seconds to provision a new decode node (container start + model load). Traffic spikes of 2x baseline lasting 3 minutes cause P99 latency violations for the first 90 seconds.
question: How would you autoscale decode capacity for 2x traffic spikes lasting 3 minutes when new nodes take 90 seconds to provision?
details:
  realistic_solution: 'Predictive autoscaling strategies: (1) Time-series forecasting: train a model (e.g., LSTM or Prophet) on historical traffic patterns. Forecast 5-minute ahead traffic. Pre-provision decode nodes 90 seconds before predicted spike onset. (2) Warm pool: maintain N spare pre-provisioned decode nodes in standby (model loaded, not serving). Switch warm nodes to active in <5 seconds. Cost: N * GPU_cost * idle_time. For 5% traffic variance: keep 10% spare warm capacity. (3) Hybrid reactive + predictive: predictive handles known patterns (daily/weekly), reactive handles anomalies via warm pool. (4) Gradual scale-up: start provisioning at 60% utilization (before 80% threshold) to overlap provisioning with the pre-spike window. For 70B on H100: model load = 80 seconds (280GB / 3.5 GB/s NVMe). Pre-load model at boot, keep model in CPU RAM for fast GPU transfer (280GB at PCIe 32 GB/s = 8.75s). Reduces scale-up time from 90s to ~15s.'
  common_mistake: |
    **The Pitfall:** Using reactive autoscaling with a fixed threshold (e.g., scale up when GPU utilization > 80%).
    **The Rationale:** By the time GPU utilization exceeds 80%, the queue is already building and latency violations are imminent. The 90-second provisioning lag makes reactive scaling too slow for transient spikes.
    **The Consequence:** P99 latency SLA violations during the first 90 seconds of every traffic spike.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic spike: 2x baseline for 3 minutes (180 seconds).
       - Provisioning latency: 90 seconds.
       - Base capacity: 500 RPS at 70% utilization.
    2. **Calculations:**
       - Utilization jumps from 70% to 140% (40% excess load).
       - Queue growth rate: 0.4 * 500 RPS = 200 requests/s.
       - Queue depth after 90s unmitigated spike: 200 * 90 = 18,000 requests.
       - Average wait time added: 18,000 / 500 = 36 seconds.
    3. **Conclusion & Interpretation:** **36s of latency added before auto-scaler responds. Capacity-Bound.**
