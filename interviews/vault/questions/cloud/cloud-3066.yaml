title: 'Queueing Theory Recall: Little''s Law in Inference Systems'
scenario: You are analyzing an inference server serving LLaMA-70B. The server processes 50 requests concurrently (L=50) and the mean service time is 2 seconds per request.
question: "What is the throughput of a server with 50 concurrent requests and a 2-second service time according to Little's Law, and how does it change if latency doubles?"
details:
  realistic_solution: 'Little''s Law states L = λW, where L is the average number of items in the system (concurrency), λ is the throughput (arrival rate in steady state), and W is the average time in the system (latency). Rearranging to λ = L/W: throughput = 50 / 2 = 25 requests per second. If latency doubles to 4 seconds while concurrency remains 50, the new throughput is 50 / 4 = 12.5 requests per second (throughput is halved).'
  common_mistake: |
    **The Pitfall:** Confusing Little's Law variables.
    **The Rationale:** It's common to mix up L (average items in system), λ (throughput), and W (average time in system).
    **The Consequence:** Incorrectly calculating system capacity and bottlenecking the service.
  napkin_math: |
    - Little's Law: L = λW
    - Initial state: λ = L / W = 50 / 2 = **25 requests/second**.
    - Doubled latency: λ = 50 / 4 = **12.5 requests/second**.
