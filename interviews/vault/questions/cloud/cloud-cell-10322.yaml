title: Evaluating Total Carbon Cost of H100 vs. TPU v5e for LLM Training
scenario: An ML team must choose between running a 7B parameter LLM pre-training (1 trillion tokens) on
  NVIDIA H100 (700 W, 989 TFLOPS BF16) in a US-East datacenter (350 gCO₂/kWh) vs. Google TPU v5e (197
  TFLOPS BF16, 197 W per chip, Google datacenter at ~70 gCO₂/kWh with renewable matching) via Google Cloud.
  Evaluate total carbon footprint for each option.
details:
  realistic_solution: 'Methodology: (1) Compute training FLOPs: 6 × N × D = 6 × 7B × 1T = 42 × 10^21 FLOPS
    (Chinchilla formula). (2) H100 effective throughput at 50% MFU: 989 TFLOPS × 0.50 = 494.5 TFLOPS.
    Time on 64 H100s: 42e21 / (64 × 494.5e12) = 1,328 s/hr... = ~21.6 days. Power: 64 × 700 W = 44.8 kW.
    Energy: 44.8 kW × 518.4 hr = 23,224 kWh. Carbon: 23,224 × 0.350 kg = 8,128 kg CO₂. (3) TPU v5e at
    50% MFU: 197 TFLOPS × 0.50 = 98.5 TFLOPS. On 256 chips: 256 × 98.5e12 = 25.2 PFLOPS. Time: 42e21 /
    25.2e15 = 1.67M s = 19.3 days. Power: 256 × 197 W = 50.4 kW. Energy: 50.4 × 463 hr = 23,337 kWh. Carbon:
    23,337 × 0.070 = 1,634 kg CO₂. Google''s low-carbon grid yields 5× lower carbon despite similar total
    energy.'
  common_mistake: 'Comparing FLOPS without accounting for model FLOP utilization (MFU): H100 MFU for LLM
    training is ~45–55%, while TPU v5e MFU is ~45–60% with XLA; and not accounting for power per TFLOPS
    differences.'
  napkin_math: 'H100 carbon: ~8,128 kg CO₂. TPU v5e carbon: ~1,634 kg CO₂. Ratio: 5×. Key driver: grid
    carbon intensity (350 vs. 70 gCO₂/kWh), not hardware efficiency. Moving H100 workload to a renewable-powered
    datacenter (70 gCO₂/kWh) would yield 23,224 kWh × 0.07 = 1,626 kg — matching TPU v5e carbon. Hardware
    choice matters less than where you plug it in.'
