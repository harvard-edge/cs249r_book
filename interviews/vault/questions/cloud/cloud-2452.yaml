title: Prefill and Decode Cluster Disaggregation
scenario: Your high-traffic chatbot service uses Llama-3-70B. Average input is 2000 tokens; average output
  is 50 tokens. Prefill takes 400ms, which starves continuous batching decode requests, causing TPOT spikes
  up to 100ms. You propose disaggregating the architecture into dedicated 'Prefill' and 'Decode' GPU nodes.
  The nodes are connected via a 100 Gbps RoCE network.
details:
  realistic_solution: Disaggregation solves the compute-bound (prefill) vs. memory-bandwidth-bound (decode)
    interference, eliminating decode TPOT spikes. However, the strict tradeoff is the network transfer
    latency of the KV cache from the prefill node to the decode node. For a 2000-token prompt on a 70B
    model, the KV cache is substantial (~655 MB). The transfer time over a 100 Gbps link adds directly
    to the Time To First Token (TTFT). You must evaluate if the added TTFT is acceptable to the user in
    exchange for stable, low-variance TPOT. Given the math, a ~52ms network penalty on TTFT is highly
    favorable compared to 100ms TPOT spikes that degrade the entire generation experience.
  common_mistake: Assuming disaggregation always improves latency without calculating the network transfer
    overhead of the KV cache.
  napkin_math: 'KV cache size per token (Llama-3-70B: 80 layers, 8 KV heads, 128 dim, FP16): 2 bytes *
    80 * 8 * 128 * 2 (K+V) = ~327.68 KB/token. For 2000 tokens, total KV cache = 2000 * 327.68 KB = ~655
    MB. Network bandwidth: 100 Gbps = 12.5 GB/s. Transfer time = 655 MB / 12.5 GB/s = 52.4 ms. TTFT increases
    by ~52ms, but TPOT stabilizes at the baseline (e.g., 30ms) instead of spiking to 100ms.'
