title: The Blue-Green Memory Tax
scenario: You are an ML Systems Engineer responsible for a fleet of servers running a 7B parameter RAG chatbot. The current version, `v1`, is loaded in FP16 precision. For a safe rollout of the new `v2` model, your team decides on a blue-green deployment strategy. Some servers must have *both* `v1` and `v2` loaded into memory simultaneously.
question: How much additional VRAM per server is needed to load the FP16 v2 7B model alongside v1 for blue-green rollout?
details:
  realistic_solution: The core task is to calculate the memory footprint of a single 7B model, as this represents the 'additional' load on a server that is already running the `v1` model. A 7 billion parameter model loaded in FP16 (half-precision) requires 2 bytes for every parameter. The calculation is a direct application of the scaling rule for inference memory.
  common_mistake: |
    **The Pitfall:** Calculating the total memory for both models (28 GB) instead of the *additional* memory required.
    **The Rationale:** Candidates fail to read the question carefully, or confuse FP16 (2 bytes) with INT8 (1 byte), or confuse inference memory with training memory (which requires Adam optimizer states).
    **The Consequence:** Over-provisioning GPU memory based on incorrect capacity calculations.
  napkin_math: |
    1. Model Size: 7 billion parameters.
    2. Precision: FP16 (2 bytes per parameter).
    3. Weight Memory Calculation: 7 * 10^9 * 2 bytes = 14 GB.
    4. **Final Result: 14 GB of additional VRAM is required.**
  options:
  - 7 GB
  - 28 GB
  - 14 GB
  - 112 GB
  correct_index: 2
