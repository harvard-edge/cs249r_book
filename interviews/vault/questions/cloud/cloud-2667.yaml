title: Tail Latency Mitigation Strategy Selection
scenario: 'Your ML serving system has p99=200ms (SLA: 100ms) with 50-way fan-out across GPU inference
  shards. Root cause: occasional GPU memory fragmentation causes 1-2 shards to spike to 500ms. Option
  A: hedged requests (re-send to backup shard after 80ms). Option B: request migration (detect slow shard
  at 50ms, migrate request''s KV cache to a fast shard). Option C: over-provision by 2x (run 100 shards,
  only need 50 responses). Which approach?'
details:
  realistic_solution: Option A (hedged requests) is the most practical. Option B (request migration) sounds
    elegant but transferring KV cache between GPUs during inference introduces its own latency (NVLink/PCIe
    transfer of potentially GBs of KV cache state takes 5-50ms), and the coordination logic adds complexity.
    By the time you detect, migrate, and restart, you may have already exceeded the SLA. Option C (2x
    over-provisioning) is wasteful — doubling GPU count for tail latency is economically unjustifiable
    ($$$). With 100 shards returning 50 responses, you ignore the 50 slowest, but this still requires
    all 100 shards to be loaded with the model. Option A fires backup requests to already-warm shards.
    At 80ms threshold (between p95 and p99), only ~3-5% of requests trigger hedges — adding just 3-5%
    extra load. If the backup shard is not experiencing fragmentation, it responds in ~10ms, meeting the
    90ms effective latency target. Simple, proven, minimal overhead.
  common_mistake: Over-engineering the solution. Hedged requests are the industry-standard solution for
    tail latency at scale (used by Google, Amazon). Complex migration schemes rarely justify their engineering
    cost.
  napkin_math: 'A: 3-5% extra load, p99 drops to ~90ms. B: 5-50ms migration overhead, complex. C: 2x GPU
    cost ($$$). A wins on cost-effectiveness.'
