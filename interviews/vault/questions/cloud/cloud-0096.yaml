validation_issues:
- The Napkin Math provides a `KV-cache per token per layer` for a Llama-70B architecture with `8 KV heads`,
  but then uses `80 layers` in the `KV-cache per token (all layers)` calculation without stating the total
  number of layers for the 70B model, which is typically higher for Llama-70B.
- The `64 concurrent users x 5.24 GB = 335 GB` calculation in Napkin Math is for 64 users with *long prompts*,
  which then correctly states exceeds 80 GB VRAM, but it's not clear how the initial premise of 'a few
  users' (not 64) leads to OOM for long contexts.
