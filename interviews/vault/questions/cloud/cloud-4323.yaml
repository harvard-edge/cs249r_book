title: Social-Scale Serving QPS and Caching Strategy
scenario: Your social platform serves 500M daily active users, with peak QPS of 2M recommendation requests/second. Each request requires embedding lookups across 100 tables (avg 100M rows, 64-dim FP32). Table access follows a Zipf distribution (α=0.8).
question: How would you design a multi-tier embedding cache, and what hit rate can a 1 TB GPU HBM L2 cache achieve under Zipf α=0.8?
details:
  realistic_solution: 'Zipf α=0.8: the top-k fraction f(k) of items captures fraction C(k) of all accesses. For α=0.8, the top 1% of items (1M rows per table) captures ~30% of lookups; top 10% captures ~60%. Cache 10% of each table''s rows by access frequency: 100 tables × 100M rows × 10% = 10M rows × 64 dim × 4 bytes = 2.56 GB per table slice × 100 = 256 GB — fits in 1 TB cache. Expected hit rate: ~60% for Zipf α=0.8 at 10% cache. Cache miss handling: on miss, fetch from DRAM (2.56 TB total) — latency 100 μs vs 5 μs for HBM hit. At 2M QPS and 60% hit rate, 40% of all lookups miss. DRAM bandwidth needed: 2M × 100 tables × 0.4 × 256 bytes = 20.48 GB/s. This easily fits within modern single-node DRAM bandwidth. To reach a 72% hit rate: cache top 20% of rows (512 GB) which still easily fits within 1 TB.'
  common_mistake: |
    **The Pitfall:** Sizing the cache based on total table capacity.
    **The Rationale:** Candidates conclude caching is impossible because the total table size (2.56 TB) exceeds the 1 TB L2 cache.
    **The Consequence:** Abandoning caching entirely and suffering massive DRAM bandwidth bottlenecks at 2M QPS.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tables: 100 tables, 100M rows each, 64-dim FP32 (256 bytes/row).
       - Access pattern: Zipf α=0.8.
       - Cache capacity: 1 TB.
    2. **Calculations:**
       - Total size: 100M * 100 * 256 bytes = 2.56 TB.
       - 1 TB cache covers: 1 TB / 2.56 TB = ~39% of all rows.
       - Zipf(α=0.8) cumulative distribution: Top 10% rows capture ~60% lookups, Top 20% capture ~72%.
       - Caching top 10% requires: 10M rows * 100 tables * 256 bytes = 256 GB.
       - Caching top 20% requires: 20M rows * 100 tables * 256 bytes = 512 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Hit-Rate-Bound**. A 1 TB cache easily fits the top 39% of rows, achieving an >80% hit rate under Zipf α=0.8, effectively eliminating the DRAM bandwidth bottleneck.
