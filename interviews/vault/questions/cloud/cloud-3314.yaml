title: Diagnosing H100 Inference Latency Spikes with Queueing Theory
scenario: You are managing a critical ML inference service on a cloud platform. Recently, users have reported intermittent latency spikes, even when average GPU utilization appears to be around 60-70%. System metrics show a consistently high average queue depth on the GPU request scheduler before execution.
question: How would you use queueing theory to diagnose P99 spikes above 1000 ms when average utilization is 60-70% but scheduler queue depth is high?
details:
  realistic_solution: Implement dynamic monitoring of instantaneous arrival rates (λ), service times (W) per request/batch, and current queue lengths (Lq) for each H100. Apply Little's Law (L = λW) to continuously estimate the average time a request spends in the system and specifically in the queue (Wq). Analyze the distribution of service times (e.g., P99 latency) to identify bottlenecks. Consider implementing adaptive batching or a token bucket algorithm to smooth out arrival rates at the GPU, leveraging the H100's 80 GB HBM3 for larger batches when possible without increasing latency disproportionately.
  common_mistake: |
    **The Pitfall:** Focusing solely on average GPU utilization.
    **The Rationale:** Candidates assume that if average utilization is below 100%, the system cannot be bottlenecked, ignoring the variance in arrival rates or service times.
    **The Consequence:** Misdiagnosing the issue and failing to recognize that temporary bursts of requests (where peak arrival rate exceeds service rate) cause queue buildup and severe latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Average Utilization: 60-70%. P99 Latency: >1000ms.
       - Little's Law: L = λW (Queue Length = Arrival Rate × Wait Time).
       - Example metrics: Average queue depth (L_q) = 10, Queue wait time (W_q) = 50ms.
       - GPU batch processing time: ~40ms (Service Rate = 25 batches/sec).
    2. **Calculations:**
       - Effective Burst Arrival Rate (λ): L_q / W_q = 10 / 0.05s = 200 requests/sec.
       - Overload: 200 requests/sec ≫ 25 batches/sec.
    3. **Conclusion & Interpretation:** **Temporary traffic bursts severely exceed the service rate, causing unbounded queue growth and massive P99 spikes despite low average utilization. Result: Queueing-Delay-Bound.**
