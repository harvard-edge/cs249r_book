title: 'NVIDIA H100 vs. CPU: Optimizing Large Language Model Inference'
scenario: A machine learning engineer is tasked with optimizing the inference latency and throughput for a large language model. They are evaluating two primary hardware options: a multi-core CPU or an NVIDIA H100 GPU.
question: Why is an NVIDIA H100 generally better than a multi-core CPU for LLM inference, and when might a CPU still be preferable?
details:
  realistic_solution: The NVIDIA H100 leverages a highly parallel architecture with thousands of CUDA cores and specialized Tensor Cores, designed for efficient matrix multiplication critical for neural networks. Its 989 TFLOPS (FP16 dense) dwarfs CPU capabilities for parallelizable computations. Crucially, the 80 GB HBM3 memory provides extremely high bandwidth (3.35 TB/s), which is vital for feeding the vast amount of model parameters to the compute units quickly, preventing memory bound bottlenecks that often plague LLMs. While CPUs are excellent for sequential processing, complex control flow, and tasks with low parallelism, the H100's design for massive data parallelism and high memory throughput makes it the clear choice for LLM inference, despite its 700W power draw. CPUs might be preferred for very small models, pre-processing, or orchestrating workloads.
  common_mistake: |
    **The Pitfall:** Focusing solely on the TFLOPS metric.
    **The Rationale:** Candidates often see the massive compute numbers but fail to grasp that LLM inference is overwhelmingly memory-bandwidth bound due to autoregressive decoding.
    **The Consequence:** Overlooking the critical importance of HBM3 memory bandwidth and the surrounding software ecosystem (CUDA, TensorRT) when explaining the GPU's superiority.
  napkin_math: |
    *   **Theoretical Compute:** H100 can perform ~989 TFLOPS (FP16 dense), orders of magnitude more than a high-end CPU.
    *   **Memory Bandwidth:** If an LLM inference pass requires reading 40 GB of weights (e.g., a 20B param model in FP16).
    *   **GPU Load Time:** The H100's HBM3 (3.35 TB/s) can theoretically load this data in $40 \text{ GB} / 3.35 \text{ TB/s} \approx$ **12 milliseconds**.
    *   **CPU Comparison:** CPUs with DDR memory (~100-200 GB/s) would take $40 \text{ GB} / 200 \text{ GB/s} \approx$ **200 milliseconds**, severely bottlenecking the generation process.
