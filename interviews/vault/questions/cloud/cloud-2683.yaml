title: Fallback Availability Impact on SLA
scenario: A system uses a three-level fallback for model serving. Primary model availability is 99.5%, fallback model availability is 99.9%, and a heuristic fallback is 99.99%. The system uses the primary model when available, otherwise falls back.
question: With 99.5%, 99.9%, and 99.99% availability layers, what is overall system availability assuming independent failures?
details:
  realistic_solution: 'System fails only when ALL levels fail simultaneously. P(primary fails) = 1 - 0.995 = 0.005. P(fallback fails) = 1 - 0.999 = 0.001. P(heuristic fails) = 1 - 0.9999 = 0.0001. P(all fail) = 0.005 × 0.001 × 0.0001 = 5 × 10^-10.'
  common_mistake: |
    **The Pitfall:** Assuming fallback failures are perfectly independent.
    **The Rationale:** In practice, cloud outages, network issues, or resource exhaustion can take down multiple levels simultaneously.
    **The Consequence:** Overestimating the true system availability because correlated failures are ignored.
  napkin_math: |
    - 1. **Failure Probabilities:** P(primary fails) = 0.005. P(fallback fails) = 0.001. P(heuristic fails) = 0.0001.
    - 2. **Simultaneous Failure:** 0.005 × 0.001 × 0.0001 = 5 × 10^-10.
    - 3. **System Availability:** 1 - (5 × 10^-10) = 0.9999999995 (**~9.7 nines**).
    - 4. **Downtime:** 5 × 10^-10 × 365.25 × 24 × 3600 = **0.016 seconds/year (down from 43.8 hours with no fallback)**.
