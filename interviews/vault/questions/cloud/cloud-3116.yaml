title: 'Transformer Cost Realization: Concrete FLOP Count for BERT Training'
scenario: You need to calculate the total training FLOPs for BERT-base (110M params, 12 layers, hidden=768, seq=512, 1M training steps, batch=256). You will use the 6ND approximation and verify by counting FLOPs layer by layer for one forward pass.
question: What are BERT-base training FLOPs by 6ND and by layer-by-layer counting, and how do the two estimates compare?
details:
  realistic_solution: 'The 6ND estimate yields ~8.65e19 FLOPs. Layer-by-layer counting for one layer gives ~2.06 TFLOPs for the forward pass (QKV: ~0.46, Attn: ~0.21, O proj: ~0.15, FFN: ~1.24). Across 12 layers, the forward pass is ~24.7 TFLOPs. Since training requires 3x the forward pass (1x for forward, 2x for backward), one full step is ~74.1 TFLOPs. Over 1M steps, this is 7.41e19 FLOPs. The two estimates compare very closely. The 6ND estimate is slightly higher (~1.17x) because N (110M) includes the large vocabulary embedding matrix (approx. 23M params), which is a lookup table and does not contribute to the dense matrix multiplication FLOPs.'
  common_mistake: |
    **The Pitfall:** Using total steps instead of total samples for D in 6ND.
    **The Rationale:** Candidates often see "D" (data) and plug in the raw number of iterations/steps without multiplying by the batch and sequence sizes.
    **The Consequence:** Underestimating the total FLOP count by several orders of magnitude, or conversely, forgetting to multiply manual layer counts by the total number of layers.
  napkin_math: |
    1. 6ND Estimate: 6 * 110e6 * (1e6 steps * 256 batch * 512 seq) = 8.65e19 FLOPs.
    2. Layer Fwd (per step): QKV = 3*2*256*512*768^2 = 4.64e11. Attn = 2*(2*256*12*512^2*64) = 2.06e11. O proj = 2*256*512*768^2 = 1.55e11. FFN = 2*(2*256*512*768*3072) = 1.24e12.
    3. Total Fwd (1 layer) = 2.06e12. (12 layers) = 24.7e12 FLOPs.
    4. Total Step (Fwd+Bwd) = 3 * 24.7e12 = 74.1e12 FLOPs.
    5. 1M steps = 7.41e19 FLOPs.
    6. **Result: Ratio is 8.65e19 / 7.41e19 = 1.17x. The estimates align well.**
