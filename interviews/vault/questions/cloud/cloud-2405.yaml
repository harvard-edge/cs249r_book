title: Pipelined Guardrails in Compound Systems
scenario: 'You are deploying a financial compliance RAG API that must return a complete JSON payload. The SLA for P90 latency is 1000ms. Current sequential pipeline: Embedding & Vector Retrieval (250ms) -> Main LLM Generation for avg 150 tokens (600ms) -> Output Compliance Guardrail evaluating the full text (300ms). Total P90 is 1150ms. You cannot change the models, replace the guardrail, or return partial/streamed responses. The guardrail latency scales linearly with token count (50 tokens = 100ms).'
question: 'How would you orchestrate retrieval, generation, and the 300ms guardrail to meet the 1000ms P90 SLA?'
details:
  realistic_solution: 'Implement a Pipelined/Chunked Guardrail architecture. Instead of waiting for the main LLM to emit all 150 tokens before starting the 300ms guardrail check, orchestrate the system to evaluate chunks asynchronously via an internal stream.'
  common_mistake: |
    **The Pitfall:** Suggesting to stream the response directly to the client.
    **The Rationale:** Direct streaming is the standard UX trick to lower perceived latency.
    **The Consequence:** Violating the strict requirement to return a complete, validated JSON payload, breaking the downstream API contract.
  napkin_math: |
    - **Sequential Path:** 250ms + 600ms + 300ms = 1150ms.
    - **LLM Speed:** 150 tokens in 600ms = 4ms/token. 50-token chunk = 200ms generation.
    - **Pipelined Path:**
      - T=0: Start Retrieval
      - T=250: Retrieval done, Start LLM Gen
      - T=450: LLM yields Chunk 1. Start Guardrail(C1).
      - T=550: Guardrail(C1) finishes.
      - T=650: LLM yields Chunk 2. Start Guardrail(C2).
      - T=750: Guardrail(C2) finishes.
      - T=850: LLM yields Chunk 3 (Final). Start Guardrail(C3).
      - T=950: Guardrail(C3) finishes.
    - **Total Latency:** 950ms (safely under 1000ms SLA).
  options:
  - "Implement a Pipelined Guardrail architecture by chunking the LLM output every 50 tokens. The guardrail evaluates chunks asynchronously, overlapping with the generation of subsequent chunks, which reduces the critical path to 950ms and meets the SLA."
  - "Stream the LLM response directly to the client as it is generated, bypassing the guardrail for the first 100 tokens to ensure the Time-To-First-Token (TTFT) meets the 1000ms SLA."
  - "Reduce the LLM generation target from 150 tokens to 100 tokens to save 200ms, and run the 300ms guardrail sequentially at the end to achieve exactly 950ms."
  - "Deploy the Guardrail model onto the same GPU as the main LLM to eliminate network transfer latency, saving enough time to run the pipeline sequentially within the 1000ms SLA."
