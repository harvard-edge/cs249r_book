title: FlashAttention FP8 on H100 Transformer Engine
scenario: "The hardware supports FP8 with double the TFLOPS of FP16. FlashAttention-3 adds FP8 support. For a 70B model prefill at seq_len=8192, we compare FP16 vs FP8 FlashAttention throughput."
question: "What throughput speedup should FP8 FlashAttention-3 deliver over FP16 at seq_len=8192, and when does FP8 attention hurt quality?"
details:
  realistic_solution: "FP16 FlashAttention prefill at seq_len=8192: already compute-bound, achieving ~600 TFLOPS. FP8: theoretical peak is 2x, but FlashAttention-3 FP8 achieves ~989 TFLOPS (50% of peak) due to dequantization overhead within tiles. Speedup: 989/600 = 1.6x, not 2x. Quality: FP8 E4M3 has 3-bit mantissa (8 significand values). For attention scores, resolution is ~0.08, fine for sharp attention patterns but problematic for broad distributions. Empirically: FP8 attention shows <0.3% quality loss on short contexts but up to 2% on 32K+ context where many tokens have similar attention scores and quantization noise causes rank-order changes in softmax."
  common_mistake: |
    **The Pitfall:** Assuming FP8 attention gives a clean 2x speedup without accuracy loss.
    **The Rationale:** Taking peak hardware marketing numbers (1979 vs 989) at face value.
    **The Consequence:** Introducing subtle rank-order changes in the softmax due to quantization noise, destroying model coherence on long contexts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 Throughput: ~600 TFLOPS.
       - FP8 Throughput: ~989 TFLOPS (dequantization overhead limits it).
    2. **Calculations:**
       - Speedup: 989 / 600 = 1.6x.
       - FP8 Precision: 3-bit mantissa offers a resolution of ~0.08 at scale 10 (10/128).
    3. **Conclusion & Interpretation:**
       **Only a 1.6x speedup (not 2x), and low resolution degrades long-context quality. Result: Quantization-Overhead-Bound.**
