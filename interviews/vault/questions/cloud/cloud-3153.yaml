title: FlashAttention FP8 on H100 Transformer Engine
scenario: H100 supports FP8 with 1,979 TFLOPS (2x FP16). FlashAttention-3 adds FP8
  support using the Transformer Engine's per-tensor scaling. For a 70B model prefill
  at seq_len=8192, compare FP16 vs FP8 FlashAttention throughput and analyze when
  FP8 attention degrades quality.
question: What throughput speedup should FP8 FlashAttention-3 deliver over FP16 at
  seq_len=8192, and when does FP8 attention hurt quality?
details:
  realistic_solution: 'FP16 FlashAttention prefill at seq_len=8192: already compute-bound
    on H100, achieving ~600 TFLOPS (60% of 989 peak). FP8: theoretical peak 1979 TFLOPS,
    but FlashAttention-3 FP8 achieves ~989 TFLOPS (50% of peak) due to dequantization
    overhead within tiles. Speedup: 1000/600 = 1.67x, not 2x. Quality: FP8 E4M3 has
    3-bit mantissa (8 significand values). For attention scores in range [-10, 10],
    resolution is ~0.08 — fine for sharp attention patterns but problematic for broad
    distributions. Empirically: FP8 attention shows <0.3% quality loss on short contexts
    but up to 2% on 32K+ context where many tokens have similar attention scores and
    quantization noise causes rank-order changes in softmax.'
  common_mistake: Assuming FP8 attention gives a clean 2x speedup. The attention score
    computation (QK^T) is highly sensitive to precision because softmax amplifies
    small numerical errors exponentially.
  napkin_math: 'FP16 achieved: 600 TFLOPS. FP8 achieved: 989 TFLOPS. Speedup: 1.67x.
    FP8 E4M3 resolution at scale 10: 10/128 = 0.08. Quality: OK for short context,
    degrades at 32K+.'
