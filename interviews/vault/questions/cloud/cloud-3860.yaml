title: Multimodal Sharded Storage Architecture
scenario: You are training a vision-language model on a cluster of 1024 GPUs (128 nodes, 8 GPUs/node). The dataset is 50 billion samples (2 MB average per sample, compressed image + text), currently stored as individual JSON and JPEG files in cloud object storage. Each GPU processes 64 samples per second. Each node has 2 TB of local NVMe SSD (6 GB/s read) and dual InfiniBand NDR connections.
question: How would you architect the storage format and data loading to avoid I/O bottlenecks and minimize object storage costs?
details:
  realistic_solution: 'Use a sequential row-based format like WebDataset (TAR) or TFRecord, packing ~500-1000 samples into 1-2 GB shards. Implement a two-tier pipeline: a background process streams these large shards from object storage to the local NVMe SSD cache. The training loop sequentially reads from the local NVMe. This converts millions of small random reads into large sequential reads, easily handled by the local 6 GB/s NVMe while minimizing object storage GET requests.'
  common_mistake: |
    **The Pitfall:** Suggesting columnar formats like Parquet, or streaming millions of small files directly from object storage.
    **The Rationale:** Parquet is standard for tabular data, and direct streaming seems simplest for cloud-native architectures.
    **The Consequence:** Parquet is highly inefficient for large unstructured binary blobs, and small-file streaming hits IOPS limits and incurs massive API GET costs, starving the GPUs.
  napkin_math: |
    1. Calculate per-GPU throughput: 64 samples/s * 2 MB = 128 MB/s.
    2. Calculate node throughput: 8 GPUs * 128 MB/s = 1.02 GB/s.
    3. Calculate small file API load: Reading individual files requires 512 GETs/s per node, creating massive latency and API costs.
    4. Analyze sharded approach: Packing into 1.02 GB files (e.g., WebDataset/TFRecord) reduces this to 1 GET/s per node.
    5. Evaluate local I/O bounds: The background process streams 1.02 GB/s to local NVMe, and the training loop reads at 1.02 GB/s.
    6. Conclude: The local NVMe (6 GB/s) easily supports the **~2.04 GB/s combined read/write requirement**.
