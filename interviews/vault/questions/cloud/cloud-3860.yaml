title: Multimodal Sharded Storage Architecture
scenario: You are training a vision-language model on a cluster of 1024 GPUs. The dataset is 50 billion samples (2 MB average per sample, compressed image + text), currently stored as individual JSON and JPEG files in cloud object storage. Each GPU processes 64 samples per second. Each node has 2 TB of local NVMe SSD (6 GB/s read) and dual InfiniBand NDR connections.
question: How would you architect the storage format and data loading to avoid I/O bottlenecks and minimize object storage costs?
details:
  realistic_solution: 'Re-encode the unstructured corpus into a sequential row-based format like WebDataset (TAR) or TFRecord, packing ~500-1000 samples into 1-2 GB shards. Deploy a decoupled two-tier pipeline: an asynchronous background process streams these massive shards from object storage to the local 2 TB NVMe SSD cache, while the training loop executes large sequential reads strictly from the local NVMe. This neutralizes API latency and maximizes disk IOPS.'
  common_mistake: |
    **The Pitfall:** Suggesting columnar formats like Parquet, or dynamically streaming millions of tiny individual files directly from the cloud bucket.
    **The Rationale:** Parquet is the gold standard for tabular big data, and direct streaming is standard practice for cloud-native web architectures.
    **The Consequence:** Parquet acts pathologically on large unstructured binary blobs, and small-file API streaming violently hits IOPS limits while incurring millions of dollars in object storage GET request fees, starving the GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Topology: 8 GPUs/node.
    - Node Compute Throughput: 8 GPUs * 64 samples/s = 512 samples/s.
    - Payload size: 2 MB/sample.
    - Local Storage: NVMe capable of 6 GB/s.

    **Calculations:**
    - Node Data Requirement: 512 samples/s * 2 MB = 1.02 GB/s.
    - Naive API Load: 512 tiny GET requests/sec/node.
    - Sharded API Load (1 GB shards): ~1 sequential GET request/sec/node.
    - Local NVMe I/O: 1.02 GB/s Write (stream) + 1.02 GB/s Read (train) = 2.04 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 500x API reduction (Storage-I/O Bound)**. Sequential sharding drops API GET traffic by 500x, while the 2.04 GB/s combined read/write loop easily fits within the 6 GB/s NVMe envelope.
