title: SecAgg Dropout Recovery Compute Explosion
scenario: A federated learning cloud aggregator is training a 50M parameter (100MB) model across 10,000
  edge devices per round using the standard Secure Aggregation (SecAgg) protocol. The system runs smoothly
  when all devices report back, but experiences catastrophic compute and latency spikes when even 5% (500)
  of devices drop offline during the reporting phase. The server has 64-core CPUs and 256GB RAM. Diagnose
  the root cause of this failure during dropout recovery.
question: "What causes the SecAgg dropout recovery latency spike when 5% of 10,000 devices drop offline, and how should it be fixed?"
details:
  realistic_solution: The aggregator is choked by the computational cost of Pseudo-Random Generator (PRG)
    expansion. When users drop out, the server must reconstruct their pairwise seeds with all surviving
    users and expand them to cancel the incomplete masks. The solution is to adopt sparse SecAgg+ (using
    random graphs of logarithmic degree) to bound the number of pairwise keys per device.
  common_mistake: Candidates often assume the bottleneck is the memory to store the 10,000 incoming updates
    or network bandwidth timeouts, missing the massive O(U^2) pairwise mask reconstruction compute overhead
    triggered specifically by dropouts.
  napkin_math: With U=10,000 and 500 dropouts, the server must reconstruct approximately 500 * 9,500 =
    4.75 * 10^6 pairwise masks. At 200MB per mask (FP32 gradient), this requires generating 4.75 * 10^6
    * 200MB = 950TB of pseudo-random data. Even at an optimistic 10GB/s PRG throughput across 64 cores,
    generating 950TB takes 95,000 seconds (>26 hours), perfectly explaining the catastrophic latency spike.
