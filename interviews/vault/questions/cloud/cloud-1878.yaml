title: SDC Rate and Optimal Checkpointing
scenario: You are orchestrating a 30-day training run on a cluster of 8,192 GPUs. Your telemetry shows that Silent Data Corruptions (SDCs)—such as undetected ALU calculation errors—occur at a rate of 1 event per 50,000 GPU-hours. Your training loop uses a heuristic to detect SDC-induced loss spikes, triggering a rollback to the last checkpoint. A checkpoint takes 6 minutes (0.1 hours) to save to object storage.
question: What is the system-level SDC MTBF on 8,192 GPUs, and what checkpoint interval is optimal with 6-minute checkpoints?
details:
  realistic_solution: First compute the system-level MTBF by dividing the per-GPU MTBF by the cluster size. Then use Daly's formula balancing the cost of checkpointing against the cost of lost work to find the optimal interval.
  common_mistake: |
    **The Pitfall:** Utilizing the per-GPU MTBF instead of the system-level MTBF in Daly's formula.
    **The Rationale:** Candidates gloss over the scale of the cluster and plug the raw 50,000-hour metric directly into the equation.
    **The Consequence:** They calculate a massively overestimated checkpoint interval, leaving the 8,192-GPU cluster highly vulnerable to catastrophic lost work.
  napkin_math: |
    - System MTBF: 50,000 GPU-hours / 8,192 GPUs = 6.1 hours.
    - Checkpoint Time: 0.1 hours (6 minutes).
    - Optimal Interval (Daly's Formula): T = sqrt(2 × System_MTBF × Checkpoint_Time).
    - Calculation: T = sqrt(2 × 6.1 × 0.1) = sqrt(1.22) ≈ 1.1 hours.
    - **Conclusion:** The optimal checkpoint frequency is roughly every 66 minutes.
