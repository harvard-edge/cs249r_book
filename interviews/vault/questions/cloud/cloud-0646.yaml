title: The FP8 Underflow Crash
scenario: You are migrating a large transformer model from FP16 to FP8 (E4M3 format) for training on H100 GPUs. The model runs twice as fast, but after 500 steps, the gradients vanish entirely, and the model's loss plateaus. The learning rate is verified to be correct.
question: What numerical physics destroyed your training?
details:
  realistic_solution: You suffered catastrophic underflow due to the physical limits of the E4M3 format. Gradients in deep networks are notoriously small numbers (often around $10^{-5}$ to $10^{-7}$). The FP16 format can represent numbers down to roughly $6 \times 10^{-5}$. However, FP8 E4M3 (4 exponent bits) has a much narrower dynamic range and can only represent numbers down to roughly $1.5 \times 10^{-2}$. When the small gradients were calculated, they physically could not fit into the E4M3 representation and were clamped to exactly `0.0`. Once gradients become zero, the model stops learning.
  common_mistake: |
    **The Pitfall:** Assuming FP8 is just a smaller FP16 and that standard gradient scaling will handle the precision drop.
    **The Rationale:** FP8 E4M3 has a much narrower dynamic range than FP16 and cannot represent typical small gradient values natively.
    **The Consequence:** Gradients underflow and are flushed to exactly 0.0, permanently halting model learning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP8 E4M3 format limits.
       - Deep gradient typical magnitude: ~0.00045.
    2. **Calculations:**
       - E4M3 Minimum Normal: 2^-6 = 0.015625.
       - Underflow Condition: 0.00045 < 0.015625.
    3. **Conclusion & Interpretation:**
       - **Gradients flush to 0.0 without massive Loss Scaling. Result: Precision-Bound.**
