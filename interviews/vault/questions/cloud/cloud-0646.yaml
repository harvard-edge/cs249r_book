title: The FP8 Underflow Crash
scenario: You are migrating a large transformer model from FP16 to FP8 (specifically the E4M3 format)
  for training on H100 GPUs. The model runs twice as fast, but after 500 steps, the gradients vanish entirely,
  and the model's loss plateaus. You verify your learning rate is correct. What numerical physics destroyed
  your training?
question: "What numerical physics destroyed your training?"
details:
  realistic_solution: You suffered catastrophic underflow due to the physical limits of the E4M3 format.
    Gradients in deep networks are notoriously small numbers (often around $10^{-5}$ to $10^{-7}$). The
    FP16 format can represent numbers down to roughly $6 \times 10^{-5}$. However, FP8 E4M3 (4 exponent
    bits) has a much narrower dynamic range and can only represent numbers down to roughly $1.5 \times
    10^{-2}$. When the small gradients were calculated, they physically could not fit into the E4M3 representation
    and were clamped to exactly `0.0`. Once gradients become zero, the model stops learning.
  common_mistake: '"Assuming FP8 is just a smaller FP16 and that standard gradient scaling will magically
    handle the precision drop without adjusting the dynamic range."'
  napkin_math: A typical gradient might be $0.00045$. In FP16, this is easily represented. In FP8 E4M3,
    the smallest representable positive normal number is $2^{-6} = 0.015625$. Since $0.00045 < 0.015625$,
    the hardware flushes the value to 0. You must use massive Loss Scaling (multiplying the loss by a
    huge constant like $1024$ before backprop, then dividing after) to physically shift the gradients
    up into the representable range of the FP8 format.
