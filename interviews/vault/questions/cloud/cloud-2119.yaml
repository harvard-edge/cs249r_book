title: The Hidden Cost of Dynamic Graphs
scenario: Your team is profiling a PyTorch training loop and notices that CPU utilization is 60% while
  GPU utilization is only 45%. The nsys trace reveals frequent short gaps between GPU kernel launches.
  A junior engineer suggests 'the GPU is too slow.' Diagnose the actual bottleneck and propose two concrete
  solutions.
question: "What is the actual bottleneck causing the GPU launch gaps, and what two concrete fixes would you propose?"
details:
  realistic_solution: 'The bottleneck is the CPU-side autograd tape construction. In eager mode, PyTorch
    must: (1) dispatch each operation through the Python runtime, (2) record the operation and its inputs
    on the autograd tape, (3) allocate metadata, (4) launch the GPU kernel. Each step has Python interpreter
    overhead (~10-50us per op). For a model with 1000 operations per forward pass, this is 10-50ms of
    CPU overhead per step. In PyTorch''s asynchronous model, the GPU runs concurrently with CPU dispatch
    — step time equals max(CPU dispatch, GPU compute). With 30ms dispatch and 25ms GPU compute, the GPU
    is idle for only 5ms per 30ms step (16.7% idle). Solutions: (1) torch.compile(): captures the graph
    statically, reducing dispatch to ~3ms and allowing the GPU to run continuously. (2) CUDA Graphs: records
    and replays kernel sequences without CPU involvement. (3) Increase batch size to lengthen GPU kernels
    relative to dispatch overhead.'
  common_mistake: Blaming the GPU when the symptom is high CPU usage and low GPU usage, which is the classic
    signature of CPU-side overhead from the Python interpreter and dynamic graph construction starving
    the GPU.
  napkin_math: '1000 ops * 30us dispatch = 30ms CPU overhead per step. GPU compute: 25ms. In PyTorch''s
    asynchronous execution model, CPU dispatch and GPU compute overlap. Step time = max(30ms, 25ms) =
    30ms. GPU active: 25ms, GPU idle: 5ms → GPU idle fraction = 5/30 = 16.7%. torch.compile: eliminates
    90% of dispatch => 3ms CPU overhead, step time = max(3ms, 25ms) = 25ms. GPU utilization jumps to 25/25
    = 100%.'
