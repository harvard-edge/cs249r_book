math_issues:
- The calculation 30/(30+25)=55% erroneously assumes CPU dispatch and GPU compute are strictly serial. In PyTorch's asynchronous execution model, the CPU and GPU overlap. The step time is bounded by the max(30ms, 25ms) = 30ms. The GPU is active for 25ms and idle for 5ms, meaning the actual GPU idle time is 5/30 = 16.7%.
