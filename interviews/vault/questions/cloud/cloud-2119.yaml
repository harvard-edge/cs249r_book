title: The Hidden Cost of Dynamic Graphs
scenario: Your team is profiling a PyTorch training loop and notices that CPU utilization is 60% while GPU utilization is only 45%. The `nsys` trace reveals frequent short gaps between GPU kernel launches.
question: What is the actual bottleneck causing the GPU launch gaps, and what two concrete fixes would you propose?
details:
  realistic_solution: 'The bottleneck is the CPU-side autograd tape construction. In eager mode, PyTorch must: dispatch each operation through the Python runtime, record the operation on the autograd tape, allocate metadata, and launch the GPU kernel. Each step has Python interpreter overhead. Solutions: (1) torch.compile(): captures the graph statically, reducing dispatch overhead significantly. (2) CUDA Graphs: records and replays kernel sequences without CPU involvement. (3) Increase batch size to lengthen GPU kernels relative to dispatch overhead.'
  common_mistake: |
    **The Pitfall:** Blaming the GPU for being "too slow" when the trace shows launch gaps.
    **The Rationale:** Junior engineers look at the timeline gaps and assume the GPU is failing to process kernels efficiently.
    **The Consequence:** Efforts are spent optimizing perfectly fine CUDA kernels while the real bottleneck—CPU-side Python overhead starving the GPU—remains.
  napkin_math: |
    1. Calculate CPU overhead: 1000 ops * 30μs dispatch = 30ms CPU overhead per step.
    2. Establish GPU compute: 25ms.
    3. Calculate step time: In PyTorch's asynchronous model, execution overlaps. Step time = max(CPU, GPU) = max(30ms, 25ms) = 30ms.
    4. Calculate GPU idle time: 30ms total - 25ms active = 5ms idle.
    5. Calculate baseline utilization: GPU idle fraction is 5/30 = 16.7%.
    6. Calculate compiled utilization: `torch.compile` reduces dispatch overhead to 3ms. New step time = max(3ms, 25ms) = 25ms. GPU utilization **jumps to 100%**.
