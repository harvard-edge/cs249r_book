title: W8A8 PTQ Extreme Activation Outliers
scenario: You deploy a 130B parameter LLM for cloud summarization. A naive INT8 PTQ (W8A8) reduces the memory footprint from 260GB to 130GB. However, perplexity spikes from 5.4 to 18.2. You find that 0.1% of activation channels have values up to 120.0, while the rest are in [-2, 2].
question: Why does naive W8A8 PTQ break the 130B model, and how would you handle the 0.1% activation outlier channels?
details:
  realistic_solution: 'Naive per-tensor activation quantization fails because massive outliers force the scale to be huge, crushing the precision of the remaining 99.9% of channels into a single bucket. The architectural solution is SmoothQuant: migrate the quantization difficulty from activations to weights. Scale down outlier activation channels by a factor $s$, and mathematically scale up the corresponding weight channels by $s$. Weights are easier to quantize (per-channel hardware support), preserving the INT8 matrix multiplication pipeline without accuracy degradation.'
  common_mistake: |
    **The Pitfall:** Dynamically clipping the activation outliers at runtime.
    **The Rationale:** Outliers are rare (0.1%), so clipping them seems like a minor truncation that "saves" the scale factor.
    **The Consequence:** Completely destroying the semantic information held in the outlier channels, which in LLMs are structurally critical, resulting in massive perplexity spikes.
  napkin_math: |
    1. **Naive Scale:** Activation range [-120, 120] mapped to INT8 [-127, 127]. Scale = $120 / 127 = 0.944$.
    2. A normal value of 1.5 becomes $1.5 / 0.944 = 1.58 \rightarrow$ rounded to 2.
    3. Dequantized: $2 \times 0.944 = 1.88$. **Error is ~25%.**
    4. **SmoothQuant Scale:** Scale outliers down by 1/10. New range is [-12, 12]. Scale = $12 / 127 = 0.0944$.
    5. Value 1.5 becomes $1.5 / 0.0944 = 15.88 \rightarrow$ rounded to 16.
    6. Dequantized: $16 \times 0.0944 = 1.51$. **Error drops to < 1%.**
