title: Diagnosing Top-k Gradient Divergence
scenario: You are scaling a 15B parameter LLM training job across 256 A100 (40GB) GPUs using a 100 Gbps RoCEv2 network. To mitigate the AllReduce communication bottleneck, your team deployed Top-1% gradient sparsification. The system throughput increased by 2.5x, but the training loss diverges after 5,000 steps. You observe that weights associated with sparse, long-tail features are no longer updating.
question: "What is the root cause of this divergence, and how do you fix it while maintaining the 99% compression ratio?"
details:
  realistic_solution: The root cause is that small gradients consistently fail to meet the Top-1% threshold and are discarded. Implement Error Feedback (EF) by allocating a local FP16 buffer to accumulate the truncated gradient errors ($e_t = g_t - Compress(g_t)$) and adding them to the next step's gradient. This ensures small updates eventually breach the Top-k threshold.
  common_mistake: |
    **The Pitfall:** Suggesting workarounds like lowering the learning rate, reducing sparsification (e.g., Top-10%), or switching to FP8.
    **The Rationale:** Candidates focus on general divergence fixes or alternative compression methods without understanding the mathematical impact of consistently dropping small gradients.
    **The Consequence:** The proposed fixes either fail to resolve the tail-feature divergence or sacrifice the 2.5x communication speedup.
  napkin_math: |
    1. Assume a sparse feature gradient per step is 0.0001, and the Top-1% threshold is 0.001.
    2. Without Error Feedback (EF), the update is discarded every step, so the effective update is always 0.
    3. With EF, the accumulated error after 10 steps is 10 * 0.0001 = 0.001.
    4. On the 10th step, the accumulated gradient reaches the threshold, is communicated, and the error buffer resets.
    **Small updates are successfully preserved and communicated over time.**
