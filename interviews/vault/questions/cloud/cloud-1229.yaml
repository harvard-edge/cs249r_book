title: Diagnosing Top-k Gradient Divergence
scenario: 'You are scaling a 15B parameter LLM training job across 256 GPUs using a 100 Gbps RoCEv2 network. To mitigate the AllReduce bottleneck, your team deployed Top-1% gradient sparsification. The throughput increased by 2.5x, but the training loss diverges after 5,000 steps. Weights associated with sparse, long-tail features are no longer updating.'
question: 'What is the root cause of this divergence, and how do you fix it while maintaining the 99% compression ratio?'
details:
  realistic_solution: 'The root cause is that small gradients consistently fail to meet the Top-1% threshold and are discarded. Implement Error Feedback (EF) by allocating a local FP16 buffer to accumulate the truncated gradient errors and adding them to the next step''s gradient. This ensures small updates mathematically accumulate and eventually breach the Top-k threshold.'
  common_mistake: |
    **The Pitfall:** Suggesting standard workarounds like lowering the learning rate, reducing sparsification (e.g., Top-10%), or switching to FP8.
    **The Rationale:** Candidates focus on general divergence fixes without understanding the mathematical impact of consistently dropping small gradients.
    **The Consequence:** The proposed fixes either fail to resolve the tail-feature divergence or sacrifice the massive 2.5x communication speedup.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network: 100 Gbps RoCEv2.
       - Sparsification: Top-1% threshold.
       - Gradient estimate for tail feature: 0.0001 per step. Threshold: 0.001.
    2. **Calculations:**
       - Without Error Feedback (EF): 0.0001 < 0.001. Discarded every step. Effective update = 0.
       - With EF: Accumulate error locally. After 10 steps, 10 × 0.0001 = 0.001.
       - On step 10: 0.001 ≥ 0.001. Gradient is successfully communicated, buffer resets.
    3. **Conclusion & Interpretation:**
       - **Result: Numerical-Stability-Bound. Without local error feedback buffers, small gradients for tail features are permanently truncated, driving the model to diverge.**
