title: Diagnosing Top-k Gradient Divergence
scenario: You are scaling a 15B parameter LLM training job across 256 A100 (40GB) GPUs using a 100 Gbps
  RoCEv2 network. To mitigate the AllReduce communication bottleneck, your team deployed Top-1% gradient
  sparsification. The system throughput increased by 2.5x, but the training loss diverges after 5,000
  steps. You observe that weights associated with sparse, long-tail features are no longer updating. What
  is the root cause of this divergence, and how do you fix it while maintaining the 99% compression ratio?
details:
  realistic_solution: The root cause is that small gradients consistently fail to meet the Top-1% threshold
    and are discarded. Implement Error Feedback (EF) by allocating a local FP16 buffer to accumulate the
    truncated gradient errors ($e_t = g_t - Compress(g_t)$) and adding them to the next step's gradient.
    This ensures small updates eventually breach the Top-k threshold.
  common_mistake: Candidates often suggest lowering the learning rate, reducing the sparsification ratio
    (e.g., to Top-10%), or switching to FP8, which sacrifices the communication speedup instead of addressing
    the discarded gradient information.
  napkin_math: 'Assume a sparse feature gradient per step is 0.0001, and the Top-1% threshold is 0.001.
    Without EF, the update is always 0. With EF: After 10 steps, the accumulated error is 10 * 0.0001
    = 0.001. On the 10th step, the accumulated gradient reaches the threshold, is communicated, and the
    error buffer resets, preserving information.'
