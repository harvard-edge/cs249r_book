title: Speculative Decoding for Fill-in-the-Middle Tasks
scenario: Your code completion system uses fill-in-the-middle (FIM) where the model generates tokens conditioned
  on both prefix and suffix. Standard speculative decoding assumes left-to-right generation. With a 70B
  target and 7B draft on H100, analyze how FIM affects draft model accuracy and propose modifications
  to the speculation strategy.
question: "How does fill-in-the-middle generation affect 7B draft acceptance for a 70B target, and how should speculation be modified?"
details:
  realistic_solution: 'In FIM, the model sees [PREFIX] [SUFFIX] [MIDDLE_to_generate]. The target 70B has
    strong bidirectional understanding: it can predict MIDDLE tokens that are coherent with both prefix
    and suffix. The 7B draft model, while FIM-capable, has weaker suffix conditioning — its predictions
    often ignore subtle suffix constraints. Empirically: alpha drops from 0.82 (standard) to 0.55 (FIM)
    for the 7B draft. At alpha=0.55, K=5: E[tokens] = (1-0.55^6)/0.45 = 1.97. Time: 10ms + 42ms = 52ms
    for 1.97 tokens = 26.4ms/tok vs 42ms auto. Only 1.59x speedup — marginal. Optimization: Use suffix-aware
    draft decoding: run a separate suffix-encoding pass on the draft, creating a ''suffix KV cache'' that
    biases draft generation. This adds 5ms overhead but increases alpha to ~0.70. At alpha=0.70: E[tok]=2.74,
    time=52ms, effective=19ms/tok, 2.2x speedup. Alternative: for FIM, use n-gram matching against the
    suffix as a zero-cost draft signal.'
  common_mistake: Assuming the draft model can leverage the suffix context as well as the target. Small
    draft models typically have worse bidirectional attention or are not trained on FIM, causing alpha
    to plummet compared to standard left-to-right generation.
  napkin_math: 'Standard alpha=0.82: 2.75x. FIM alpha=0.55: 1.59x. With suffix-encoding: alpha=0.70: 2.2x.
    N-gram suffix matching (free): alpha=0.40, E=1.52, 2.76x only if verify is truly free. Suffix-aware
    draft is the best practical approach.'
