title: Cloud Vector Operations L3 0
scenario: You need to apply ReLU activation to a 10M-element tensor. Estimate the time on a CPU (AVX-512,
  3 GHz, 16-wide FP32 SIMD) vs. an H100 GPU (3.35 TB/s memory bandwidth). Is this compute-bound or memory-bound?
details:
  realistic_solution: 'ReLU is max(0, x) — 1 FLOP per element, but reads and writes 4 bytes per element.
    Compute: 10M FLOPs. Memory: 10M × 4B read + 10M × 4B write = 80 MB. CPU: 10M / (16 elements × 3 GHz)
    = 0.208 ms compute. Memory: 80 MB / 50 GB/s ≈ 1.6 ms. Memory-bound on CPU. GPU: 10M / 989 TFLOPS =
    0.01 μs compute. Memory: 80 MB / 3.35 TB/s = 0.024 ms. Memory-bound on GPU too. Element-wise operations
    like ReLU are always memory-bound because arithmetic intensity is O(1) — one FLOP per element loaded.'
  common_mistake: Trying to optimize element-wise operations by using faster compute (tensor cores). They
    are memory-bound — the only way to speed them up is higher memory bandwidth or kernel fusion to reduce
    memory traffic.
  napkin_math: 'Arithmetic intensity: 1 FLOP / 8 bytes = 0.125 FLOP/byte. H100 roofline: compute-bound
    above 989e12 / 3.35e12 = 295 FLOP/byte. ReLU at 0.125 is 2360x below the ridge → purely memory-bound.'
