title: Data Selection ROI For Training Budget
scenario: A team can label 50 million candidate images at $0.02 each, but training
  can only consume 10 million images this quarter. A filtering model costs $40,000
  to run and keeps the top 20% most informative samples. Size the labeling spend avoided
  and decide whether filtering is worth it before labeling.
question: How much labeling cost does a 20% data-selection filter save on 50M images
  at $0.02 each after a $40K filtering run?
details:
  realistic_solution: Labeling all 50M images costs $1.0M. Filtering first retains
    10M images, which costs $200K to label, plus $40K for filtering. Total filtered
    cost is $240K, saving $760K. The filter is financially worthwhile if its quality
    is acceptable and it does not bias the selected set.
  common_mistake: Comparing only training compute and forgetting that the dominant
    cost in this scenario is labeling unnecessary data.
  napkin_math: All labels = 50M x $0.02 = $1,000,000. Filtered labels = 10M x $0.02
    = $200,000. Add $40,000 filtering = $240,000. Savings = $760,000.
