title: Data Selection ROI For Training Budget
scenario: A team can label 50 million candidate images at $0.02 each, but training can only consume 10 million images this quarter. A filtering model costs $40,000 to run and keeps the top 20% most informative samples.
question: How much labeling cost does a 20% data-selection filter save on 50M images at $0.02 each after a $40K filtering run?
details:
  realistic_solution: Labeling all 50M images costs $1.0M. Filtering first retains 10M images, which costs $200K to label, plus $40K for filtering. Total filtered cost is $240K, saving $760K. The filter is financially worthwhile if its quality is acceptable and it does not bias the selected set.
  common_mistake: |
    **The Pitfall:** Comparing only training compute costs.
    **The Rationale:** Engineers often evaluate filtering purely on whether it saves GPU hours during training.
    **The Consequence:** The dominant financial cost—labeling millions of unnecessary or low-quality data points—is overlooked, leading to massively inflated project budgets.
  napkin_math: |
    - **Cost of All Labels:** 50,000,000 images &times; $0.02 = $1,000,000.
    - **Cost of Filtered Labels:** 10,000,000 images &times; $0.02 = $200,000.
    - **Total Filtered Cost:** $200,000 (labels) + $40,000 (filtering compute) = $240,000.
    - **Total Savings:** $1,000,000 - $240,000 = **$760,000**.
