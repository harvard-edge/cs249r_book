title: Guardrail Architecture Layers
scenario: Your company is deploying an LLM-based customer service chatbot. The legal team requires that
  the bot never gives medical advice, never discloses internal pricing logic, and always stays on-topic.
  Explain the types of guardrails needed and where they sit in the inference pipeline.
details:
  realistic_solution: 'LLM guardrails are defense layers at multiple points in the inference pipeline:
    (1) Input guardrails (pre-model): classify incoming prompts before they reach the LLM. A semantic
    router or topic classifier detects off-topic requests (medical queries, pricing probes). Blocks or
    redirects before the LLM even sees the prompt. Fast and cheap. (2) Output guardrails (post-model):
    scan the LLM''s response before returning to the user. A secondary classifier checks for medical claims,
    pricing information leaks, or policy violations. Can rewrite, redact, or block the response. (3) Deterministic
    filters: regex/keyword filters for known-bad patterns (credit card numbers, internal URLs, specific
    banned phrases). Zero false negatives for exact matches. (4) Semantic filters: lightweight classifier
    models that detect intent categories (medical advice, financial advice) even when phrased creatively.
    All four layers work together — no single layer is sufficient because each catches different attack
    vectors.'
  common_mistake: Relying solely on the system prompt to enforce guardrails. System prompts are easily
    bypassed by prompt injection. Guardrails need to be external enforcement layers, not just instructions
    to the model.
  napkin_math: 'System prompt alone: ~70% compliance. +Input guardrail: ~90%. +Output guardrail: ~98%.
    +Deterministic filters: ~99.5%. Defense in depth is essential.'
