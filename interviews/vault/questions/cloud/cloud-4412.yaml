title: HBM4 Stack Integration Timing for Next-Gen AI Die
scenario: Your roadmap needs to decide between HBM3E (available now, 1.2 TB/s per
  stack) and HBM4 (available in 18 months, 1.8 TB/s per stack) for a training accelerator.
  The accelerator ships in 24 months. Analyze the bandwidth-compute balance decision.
question: Should the 24-month training accelerator roadmap choose HBM3E now or wait
  for HBM4, given the bandwidth-compute balance and schedule risk?
details:
  realistic_solution: 'HBM4 at 1.8 TB/s per stack vs HBM3E at 1.2 TB/s is a 50% bandwidth
    uplift. For an H100-class die (80 TFLOPS at BF16), compute intensity of LLM training
    (~6 ops/byte) requires: 80 TFLOPS / 6 = 13.35 TB/s memory bandwidth. At 6 stacks:
    HBM3E = 7.2 TB/s (still memory-bound), HBM4 = 10.8 TB/s (closer to balanced).
    But 18mo availability + 6mo qual = 24mo → same ship date. If any HBM4 yield issues
    slip to 26mo, you miss launch. Risk-adjusted recommendation: commit to HBM3E for
    main product, design HBM4 socket-compatible variant for refresh.'
  common_mistake: Treating memory bandwidth as the only variable. Teams focus solely
    on GB/s per stack without considering stack height (capacity), TSV yield at the
    new node, thermal implications of taller HBM4 stacks, and the 6-month qualification
    period that eats into the 18-month availability window.
  napkin_math: 'Compute:bandwidth ratio target for transformer: ~50 TFLOPS per TB/s.
    H100 actual: 989 TFLOPS / 3.35 TB/s = 295 TFLOPS/TB/s → compute-bound. For memory-bound
    training (small batch): need ~10 TB/s min. 6x HBM3E = 7.2 TB/s (gap), 6x HBM4
    = 10.8 TB/s (meets threshold).'
