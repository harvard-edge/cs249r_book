title: Diagnosing Co-tenant Voltage Fault Injections
scenario: Your team deployed a sensitive fraud detection model (25M parameters) in a secure cloud environment using confidential computing VMs (like Intel SGX or AMD SEV) to protect against host-level tampering. Despite the cryptographic memory isolation, the model periodically starts classifying high-confidence fraudulent transactions as benign. Telemetry shows these anomalies strictly correlate with a co-resident VM on the same physical host executing massive bursts of high-power AVX-512 instructions.
question: "What attack explains the co-tenant-correlated misclassifications, and how does it bypass enclave memory isolation?"
details:
  realistic_solution: Diagnose this as a software-induced voltage fault injection attack (e.g., Plundervolt). The co-tenant VM uses a power-virus workload to induce transient voltage drops across the shared processor package. This causes hardware-level timing violations and deterministic bit flips in the victim's CPU cache or ALUs before the data is encrypted by the memory controller.
  common_mistake: |
    **The Pitfall:** Assuming the cryptographic isolation of the secure enclave was cryptographically broken or that the hypervisor directly modified encrypted memory.
    **The Rationale:** Candidates jump to complex software or cryptographic exploits rather than physical fault injection vectors.
    **The Consequence:** Misdiagnosing a hardware-level voltage attack as a software breach, leading to ineffective mitigation strategies.
  napkin_math: |
    1. A sudden 15% voltage drop (e.g., 1.0V down to 0.85V) can increase CPU logic gate propagation delay by ~20%.
    2. For a 3.0 GHz processor (333ps clock period) with a 300ps critical path, the delay increases to 360ps.
    3. **Since 360ps > 333ps clock period, setup time violations occur on flip-flops, resulting in deterministic bit flips during FP32 matrix multiplications.**
