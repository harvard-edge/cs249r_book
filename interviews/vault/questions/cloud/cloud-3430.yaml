title: Optimizing Large Language Model Pipeline Parallelism on AMD MI300X
scenario: You are tasked with deploying an extremely large language model (LLM) with 500 billion FP16 parameters for real-time inference in a cloud environment. The chosen hardware platform is a cluster of AMD MI300X accelerators. Each MI300X features 192 GB HBM3, delivers 1,307 TFLOPS FP16 sparse performance, and is linked via Infinity Fabric. Your current baseline implementation uses a naive pipeline setup with a micro-batch size of 1. This configuration results in substantial pipeline bubble overhead, leading to unacceptably high end-to-end inference latency and low device utilization.
question: How would you optimize pipeline parallel inference for a 500B FP16 LLM on MI300X to reduce bubbles, improve throughput, and lower latency?
details:
  realistic_solution: A realistic solution involves implementing an interleaved pipeline schedule (e.g., a variant of GPipe or PipeDream) with a carefully selected micro-batch size greater than 1. The micro-batch size should be optimized to balance latency requirements with pipeline efficiency, ideally being significantly larger than the number of pipeline stages. The model should be partitioned across MI300X devices such that both computational load and memory transfer requirements are balanced. Leveraging Infinity Fabric interconnects for rapid tensor communication between stages, coupled with asynchronous communication, will help hide latency and maximize throughput.
  common_mistake: |
    **The Pitfall:** Assuming that a micro-batch size of 1 is optimal for inference latency or erroneously using HBM bandwidth for inter-device communication estimates.
    
    **The Rationale:** Engineers often fixate on raw single-batch Time-To-First-Token and ignore the horrific pipeline bubble overhead. Furthermore, it is a catastrophic architectural error to mistake on-die HBM memory bandwidth (5.3 TB/s) for inter-device Infinity Fabric bandwidth (~800 GB/s).
    
    **The Consequence:** The model suffers severe stalls because communication time is drastically underestimated, leading to OOM errors and an inability to hide latency via asynchronous transfers.
  napkin_math: |
    - **Model Weights**: 500B FP16 parameters * 2 bytes = 1 TB.
    - **Capacity Required**: ceil(1000 GB / 192 GB/device) = at least 6 MI300X devices just for weights.
    - **Pipeline Efficiency**: Efficiency = M / (M + P - 1). If P=6 and M=1, efficiency is 1/6 (16.7%). If M=16, efficiency is 16/21 (76%).
    - **Memory Transfer Latency**: Assume a 10 GB intermediate activation tensor. Transfer time via Infinity Fabric inter-GPU links (~800 GB/s): 10 GB / 800 GB/s = **12.5 milliseconds**.
    - **Result**: The transfer time dictates the minimum computational stage depth needed to successfully mask the communication overhead.
