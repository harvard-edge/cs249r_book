title: 'Gradient Checkpointing: The Memory-Compute Trade'
scenario: Your 96-layer LLM training run OOMs on an 80GB GPU. Without checkpointing, activation memory is 48 GB. You enable gradient checkpointing, saving activations at every sqrt(96) ~ 10 layers.
question: "With gradient checkpointing every 10 layers, what activation memory and training-time compute overhead should you expect?"
details:
  realistic_solution: Without checkpointing, 96 layers of saved activations = 48 GB. With checkpointing every 10 layers, we store 10 boundaries (~5 GB). During the backward pass, we recompute one block of 10 layers at a time, requiring an additional ~5 GB of activation memory. Total memory is ~10 GB, a nearly 5x reduction. Compute cost: the backward pass recomputes activations for the forward pass once. This adds exactly 1 extra forward pass. Since the forward pass is ~1/3 of total training FLOPs, the overhead is ~33% extra FLOPs.
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing simply halves memory and adds 100% overhead.
    **The Rationale:** Candidates fail to understand that memory reduces from O(N) to O(sqrt(N)) layers, and they erroneously assume recomputing the forward pass doubles the *total* training time.
    **The Consequence:** Engineers miscalculate training budgets or avoid checkpointing entirely due to an exaggerated fear of compute overhead.
  napkin_math: |
    1. **Standard activation memory:** 48 GB.
    2. **Stored boundaries:** 10 boundaries = (48 GB / 96) * 10 = 5 GB.
    3. **Recompute block:** 1 block of 10 layers at a time = 5 GB.
    4. **Total new activation memory:** 5 GB + 5 GB = **10 GB**.
    5. **Compute overhead:** Forward pass is run twice. Since forward is ~1/3 of total step FLOPs, the total overhead is **~33% extra FLOPs**.
