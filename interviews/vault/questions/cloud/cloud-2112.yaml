title: 'Gradient Checkpointing: The Memory-Compute Trade'
scenario: Your 96-layer LLM training run OOMs on an A100-80GB GPU. Without checkpointing, activation memory
  is 48 GB. You enable gradient checkpointing, saving activations at every sqrt(96) ~ 10 layers. Estimate
  the new activation memory and the additional compute cost as a percentage of total training time.
details:
  realistic_solution: 'Without checkpointing: 96 layers of saved activations = 48 GB. With sqrt(96) ~
    10 checkpoints: only ~10 layers of activations stored = ~5 GB. Memory savings: 48 GB -> 5 GB (10x
    reduction). Compute cost: backward pass recomputes activations for ~86 non-checkpointed layers. Since
    forward recompute is 1/3 of total training cost (forward = 1/3 total), the overhead is ~(86/96) *
    (1/3) = ~30% extra wall-clock time. This is the canonical memory-compute tradeoff.'
  common_mistake: Assuming gradient checkpointing halves memory. It reduces activation memory from O(N)
    to O(sqrt(N)) layers, but also does not realize the recompute cost is roughly 33% of total training
    FLOPs, not 100%.
  napkin_math: 'Standard activation memory = 48 GB. With checkpointing every 10 layers, we store 10 boundaries
    (48/10 = 4.8 GB) plus recompute 1 block (4.8 GB). Total new activation memory = ~9.6 GB. This prevents
    OOM on the 80GB A100. Compute overhead: ~33% extra FLOPs for the recomputed forward pass, easily absorbed.'
