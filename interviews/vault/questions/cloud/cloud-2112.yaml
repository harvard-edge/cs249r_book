validation_issues:
- The statement 'With checkpointing every 10 layers, we store 10 boundaries (48/10 = 4.8 GB) plus recompute
  1 block (4.8 GB). Total new activation memory = ~9.6 GB' implies storing 10 layers PLUS the recomputed
  block, which is not the standard sqrt(N) model. The typical sqrt(N) strategy means you only store sqrt(N)
  activations at any given time, recomputing the intermediate ones.
