title: 'Gradient Checkpointing: The Memory-Compute Trade'
scenario: Your 96-layer LLM training run OOMs on an A100-80GB GPU. Without checkpointing,
  activation memory is 48 GB. You enable gradient checkpointing, saving activations
  at every sqrt(96) ~ 10 layers. Estimate the new activation memory and the additional
  compute cost as a percentage of total training time.
question: With gradient checkpointing every √96≈10 layers, what activation memory
  and training-time compute overhead should you expect?
details:
  realistic_solution: 'Without checkpointing: 96 layers of saved activations = 48
    GB. With checkpointing every 10 layers, we store 10 boundaries (~5 GB). During
    the backward pass, we recompute one block of 10 layers at a time, requiring an
    additional ~5 GB of activation memory. Total memory is ~10 GB, a nearly 5x reduction.
    Compute cost: the backward pass recomputes activations for the forward pass once.
    This adds exactly 1 extra forward pass. Since the forward pass is ~1/3 of total
    training FLOPs (and backward is ~2/3), the overhead is ~33% extra FLOPs. This
    is the canonical memory-compute tradeoff.'
  common_mistake: Assuming gradient checkpointing halves memory. It reduces activation
    memory from O(N) to O(sqrt(N)) layers, but also does not realize the recompute
    cost is roughly 33% of total training FLOPs, not 100%.
  napkin_math: 'Standard activation memory = 48 GB. With checkpointing every 10 layers,
    we store 10 boundaries (48/96 * 10 = 5 GB) plus recompute 1 block at a time (5
    GB). Total new activation memory = ~10 GB. This fits within the 80GB A100. Compute
    overhead: ~33% extra FLOPs because the forward pass is run twice.'
