title: Network Congestion Detection During Overlapped Training
scenario: Your 64-GPU training job's step time varies between 280ms and 450ms. Profiling shows the backward pass is consistently 200ms, but AllReduce latency fluctuates between 30ms and 200ms. When AllReduce exceeds 200ms, it is no longer hidden by the backward pass.
question: Why does 64-GPU step time jump when AllReduce latency fluctuates from 30ms to 200ms, and how would you fix it?
details:
  realistic_solution: Network congestion from other jobs sharing the IB fabric causes the variability. Inspect IB switch congestion counters. Fix by requesting a dedicated IB subnet, enabling adaptive routing, or switching NCCL algorithms to tree AllReduce.
  common_mistake: |
    **The Pitfall:** Blaming the NCCL library logic itself for the variable AllReduce time.
    **The Rationale:** Candidates fail to understand that NCCL is highly deterministic and variability stems from shared physical networks.
    **The Consequence:** Attempting to tune software parameters endlessly without addressing fabric congestion or isolating the network.
  napkin_math: |
    - **Ideal Step (30ms AllReduce)**: Fully overlapped with 200ms backward. Step time = 200ms.
    - **Worst-case Step (200ms AllReduce)**: 0ms overlap. Step time = 200ms + 200ms = 400ms.
    - **Congestion Impact**: If congestion occurs 20% of the time, average step = (0.8 * 200) + (0.2 * 400) = 240ms.
    - **Conclusion**: **Network jitter causes a 20% throughput loss (240ms vs ideal 200ms).**
