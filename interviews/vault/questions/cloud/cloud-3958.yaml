title: Network Congestion Detection During Overlapped Training
scenario: Your 64-GPU training job's step time varies between 280ms and 450ms. Profiling
  shows backward pass is consistent at 200ms, but AllReduce latency fluctuates between
  30ms and 200ms. When AllReduce exceeds 200ms, it is no longer hidden by the backward
  pass. Diagnose the cause and fix.
question: Why does 64-GPU step time jump when AllReduce latency fluctuates from 30
  ms to 200 ms, and how would you fix it?
details:
  realistic_solution: 'Diagnosis: (1) Check if other training jobs share the same
    IB fabric. Use ibstat to verify port speeds and ibdiagnet for fabric health. (2)
    Inspect NCCL_DEBUG=INFO logs for transport changes (NVLink -> PCIe fallback would
    explain slowdowns). (3) Monitor IB switch congestion counters (PortXmitWait, PortXmitDiscards).
    (4) Fixes: (a) Request dedicated IB subnet for your job (network isolation). (b)
    Enable NVIDIA Adaptive Routing (NCCL_IB_AR_THRESHOLD) to route around congested
    links. (c) Use NCCL''s tree AllReduce (NCCL_ALGO=Tree) which is less sensitive
    to hot-spots than ring AllReduce. (d) Set NCCL timeout (NCCL_TIMEOUT) to detect
    and fail fast rather than hang on congested links.'
  common_mistake: 'Blaming NCCL for the variable AllReduce time. NCCL itself is deterministic
    — the variability comes from network-level issues: congestion from other jobs,
    InfiniBand fabric hot-spots, or adaptive routing oscillations.'
  napkin_math: 'Consistent 30ms AllReduce: fully hidden in 200ms backward, step =
    200ms. Worst-case 200ms AllReduce: 0ms overlap, step = 200 + 200 = 400ms. Variance:
    200ms-400ms (2x). If congestion occurs 20% of the time: average step = 0.8 x 200
    + 0.2 x 400 = 240ms vs ideal 200ms. 20% throughput loss from network jitter.'
