title: The Privacy-TCO Trade-off
scenario: You must calculate the 3-year Total Cost of Ownership (TCO) for centralized versus federated training across 10 hospitals, each with 50TB of data, and recommend the best strategy.
question: What are the 3-year TCOs for centralized versus federated training across 10 hospitals with 50TB each, and which should you recommend?
details:
  realistic_solution: The Federated Learning approach has a significantly lower 3-year TCO. The decision is driven by the massive operational expense of the specialized compliance team required for the centralized approach. While the federated option has a high initial hardware investment (CapEx), it avoids the recurring, multi-million dollar personnel and large-scale data storage costs, making it the more economical choice over the 3-year horizon.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the visible technical costs like compute and storage.
    **The Rationale:** Underestimating the "hidden" but dominant operational and regulatory costs of a system.
    **The Consequence:** Ignoring the massive $3M compliance team expense leads to selecting a system with a fundamentally broken economic model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 hospitals × 50 TB = 500 TB total data.
       - Centralized Compute: 20,000 H100-hours at $4/hr. Storage: $25/TB/month.
       - Compliance Team: $1M/year. Egress: $0.01/GB.
       - Time horizon: 3 years (36 months).
    2. **Calculations:**
       - Data Ingress (CapEx): 500 TB × 1000 GB × $0.01 = $5,000.
       - Compute (OpEx): 20,000 × $4 = $80,000.
       - Storage (OpEx): 500 TB × $25 × 36 months = $450,000.
       - Compliance (OpEx): $1M × 3 years = $3,000,000.
       - Total Centralized TCO = $5K + $80K + $450K + $3M = $3,535,000.
    3. **Conclusion & Interpretation:** **Result: Operational-Cost-Bound.** The centralized approach TCO ($3.5M) is overwhelmingly dominated by the recurring compliance personnel costs, making federated learning cheaper.
  options:
  - Centralized is cheaper because its one-time compute cost ($80k) is far less than the federated hardware cost ($800k).
  - Federated is cheaper primarily because it avoids the massive recurring cost of the specialized compliance team and long-term cloud storage.
  - Centralized is cheaper because the data egress cost for federated learning ($1,500) will grow to be the largest expense over time.
  - They are roughly equivalent in cost; the higher hardware CapEx of the federated approach is offset by the higher compute cost of the centralized one.
  correct_index: 1
