title: GQA-Aware FlashAttention Kernel Design
scenario: Llama-3 70B uses GQA with 64 query heads and 8 KV heads (ratio 8:1). A naive FlashAttention
  implementation loads K/V tiles 64 times (once per query head). On H100, for seq_len=4096, head_dim=128,
  FP16, calculate the wasted bandwidth and design an efficient GQA-aware tiling scheme.
question: "How much KV bandwidth does a naive GQA FlashAttention implementation waste, and how would you tile to reuse each KV head across 8 query heads?"
details:
  realistic_solution: 'Naive approach: KV loaded 64 times total. IO = 64 x 2 x 4096 x 128 x 2B = 128MB
    per layer. GQA-aware: load each KV head once, process all 8 sharing query heads against it before
    moving to the next KV tile. IO = 8 x 2 x 4096 x 128 x 2B = 16MB. Savings: 112MB per layer x 80 layers
    = 8.96GB total. At 3.35 TB/s: 2.67ms saved. Implementation: for each KV tile in SRAM, iterate over
    the 8 query groups that share it. Each Q group has its own accumulator O_i and softmax stats (l_i,
    m_i). SRAM usage: K+V tiles = 2 x B_c x 128 x 2B, plus 8 sets of Q tiles and accumulators. This fits
    because Q tiles rotate while K/V stay pinned.'
  common_mistake: Not exploiting the fact that 8 query heads share the same KV head. Loading the same
    KV tile 8 times wastes 87.5% of KV bandwidth.
  napkin_math: 'Naive KV IO: 64 x 2MB = 128MB/layer. GQA-aware: 8 x 2MB = 16MB/layer. 8x reduction. Total
    savings: 112MB x 80 layers = 8.96GB at 3.35TB/s = 2.67ms.'
