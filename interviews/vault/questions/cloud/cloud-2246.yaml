title: The Curriculum Data Mixing Problem
scenario: 'You are designing the data mixing strategy for a 1 trillion token LLM pre-training run. Your
  corpus consists of 5 domains: web text (8T tokens available), code (2T tokens), scientific papers (500B
  tokens), books (200B tokens), and math (50B tokens). You need exactly 1T tokens total. A naive approach
  samples proportionally to availability (73% web, 18% code, 5% science, 2% books, 0.5% math). However,
  Llama and Chinchilla papers show that proportional sampling produces weak math and reasoning. How do
  you determine the optimal mixture, and what systems constraint makes this problem harder than it appears?'
details:
  realistic_solution: 'The optimal mixture requires empirical search because there is no closed-form solution
    for how domain proportions affect downstream performance. The standard approach: (1) Train small proxy
    models (1B params, 50B tokens) with different mixtures using a grid or Bayesian optimization over
    the mixing proportions. (2) Evaluate on a diverse benchmark suite (MMLU, GSM8K, HumanEval, etc.) to
    find Pareto-optimal mixtures. (3) Apply the winning mixture to the full-scale run. The systems constraint:
    each domain has a maximum epoch count before overfitting. Math at 50B tokens can be repeated ~4× (200B
    tokens max) before quality degrades. This creates hard constraints: the mixture must satisfy both
    the target proportions AND the per-domain epoch limits. This means you need an online curriculum scheduler
    that tracks per-domain token counts during training and adjusts sampling weights dynamically as small
    domains hit their repetition limits.'
  common_mistake: '"Just upsample the rare domains to equal proportions." Equal mixing wastes capacity
    on domains with diminishing returns (web text has 8T tokens — you only need a fraction) and risks
    overfitting on small domains (math has only 50B tokens — sampling 200B means 4 epochs, introducing
    memorization).'
  napkin_math: 'Proxy model search: 20 mixture configs × 1B params × 50B tokens × 6 FLOPs/token = 3 ×
    10²⁰ FLOPs (300e18) per config. On 64 H100s at 50% MFU: 3e20 / (64 × 989e12 × 0.5) = ~9,500 seconds
    (~2.6 hours) per config. Total proxy search sequentially: 20 × 2.6h = ~52 hours. Compare to full-scale
    run: 1T tokens × 70B params × 6 FLOPs/token = 4.2 × 10²³ FLOPs on 2,000 H100s = ~4.9 days. The 52-hour
    proxy search saves potentially weeks of wasted full-scale training with a bad mixture.'
