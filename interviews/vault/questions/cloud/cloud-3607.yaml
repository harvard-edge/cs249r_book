title: Stranded Capacity Identification in Mixed GPU Datacenter
scenario: A datacenter has 200 racks. 150 racks hold A100 nodes (5kW/rack average) and 50 racks hold H100 nodes (20kW/rack average). Total facility power is 2MW with uniform cooling designed for 10kW/rack average.
question: Where is capacity stranded in the 200-rack datacenter, and how much H100 compute is unusable?
details:
  realistic_solution: 'A100 racks: 150×5kW=750kW. H100 racks: 50×20kW=1000kW. Total=1750kW, under 2MW power budget. Cooling: uniform 10kW/rack → H100 racks get 10kW cooling for 20kW load → thermally stranded. H100 racks must run at 50% utilization max. Stranded GPU capacity: 50 racks × (20-10)kW = 500kW of H100 compute is unusable. Fix: upgrade H100 rows to liquid cooling or in-row cooling to 25kW/rack capacity.'
  common_mistake: |
    **The Pitfall:** Averaging power across all racks and concluding the facility is balanced.
    **The Rationale:** Candidates miss that cooling is localized and uniform (10kW/rack), meaning high-density H100 racks will overheat even if the total facility power is under the 2MW budget.
    **The Consequence:** Deploying nodes that instantly thermally throttle or crash, leaving millions of dollars of GPU compute unusable.
  napkin_math: |
    - Total facility power load: (150 * 5 kW) + (50 * 20 kW) = 750 kW + 1000 kW = 1750 kW (Under 2 MW limit).
    - Cooling limit per rack: 10 kW.
    - H100 rack load: 20 kW (10 kW over cooling limit).
    - Stranded capacity per H100 rack: 20 kW - 10 kW = 10 kW.
    - Total stranded capacity: 50 racks * 10 kW = 500 kW.
    - **500 kW of H100 compute is thermally stranded, forcing the H100s to run at a maximum of 50% utilization until liquid or in-row cooling is installed.**
