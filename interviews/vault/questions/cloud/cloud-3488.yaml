title: Optimizing ML Workloads on Kubernetes with Google TPU v5e
scenario: Your team is deploying a large-scale ML model training job on a Kubernetes cluster configured with Google TPU v5e accelerators. The cluster utilizes a pod architecture where the interconnect fabric provides 1.6 TB/s bisection bandwidth. The training job requires significant compute and memory resources.
question: How would you use Kubernetes device plugins, node affinity, and scheduling to run TPU v5e training efficiently?
details:
  realistic_solution: Implement a specialized Kubernetes device plugin for Google TPUs to expose their capabilities and health to the scheduler. Utilize `NodeAffinity` or `PodAffinity/AntiAffinity` rules to place training pods on nodes with available TPU v5e resources, potentially considering co-location for multi-TPU jobs to leverage the high-speed interconnect. Employ custom schedulers or scheduler extenders, or leverage existing job scheduling frameworks (like Kubeflow Training Operator) to manage distributed training, ensure gang scheduling, and optimize resource allocation based on TPU-specific metrics and interconnect topology. Data preprocessing pipelines should be optimized to feed the TPUs efficiently, considering the HBM bandwidth. For distributed training across a pod, ensure the communication patterns exploit the 1.6 TB/s bisection bandwidth effectively.
  common_mistake: |
    **The Pitfall:** Treating TPUs like generic GPUs or standard nodes during scheduling.
    **The Rationale:** Candidates rely on standard K8s scheduling plugins, failing to understand that TPUs require strict gang scheduling and topology-aware placement to leverage their custom interconnects.
    **The Consequence:** Pods are scattered across the cluster, destroying interconnect bandwidth and severely fragmenting resources, leading to massive training bottlenecks.
  napkin_math: |
    - **Compute Requirement:** 1 PFLOP/s (BF16). TPU v5e = 197 TFLOPS/chip.
    - **Chips Required:** 1000 / 197 ≈ 5.07. Minimum **6 TPU v5e chips**.
    - **Memory Footprint:** 6 chips × 16GB = 96GB total HBM.
    - **Data Loading Time:** Loading a 90 GB model utilizing the full 1.6 TB/s ICI interconnect: 90 GB / 1600 GB/s = **~0.056 seconds**. Efficient K8s scheduling ensures this topology is intact.
