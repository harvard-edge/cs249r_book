title: Diagnosing FlashAttention Recomputation Optimization
scenario: Your team is training a 7B parameter model on A100 GPUs (2.0 TB/s HBM bandwidth, 312 TFLOPs
  BF16) with a sequence length of N=8192 and d_head=128 across 32 attention heads. Switching to FlashAttention
  successfully resolved persistent OOM errors. However, a PyTorch profiler reveals that the backward pass
  now executes significantly more total FLOPs than standard attention would have. A junior engineer points
  out that the node now has 20GB of free HBM and proposes caching the NxN attention probability matrix
  (P) during the forward pass to avoid recomputing it during the backward pass, arguing this FLOP reduction
  will improve step latency. Diagnose why this proposed 'optimization' will actually degrade overall training
  throughput.
question: "Why would caching the NxN attention probabilities to save backward FLOPs degrade throughput despite 20GB free HBM?"
details:
  realistic_solution: Reject the proposal. The A100's high arithmetic intensity means it is strictly faster
    to recompute P in ultra-fast SRAM from the Q, K, V blocks during the backward pass than it is to wait
    for the data to be written to and read from HBM.
  common_mistake: Assuming that reducing total computational FLOPs always decreases latency, while ignoring
    the severe memory bandwidth bottleneck (the 'memory wall') incurred by materializing, writing, and
    reading the massive NxN matrix to HBM.
  napkin_math: 'For N=8192, 32 heads, batch 1: The P matrix size is 32 * 8192^2 * 2 bytes ≈ 4.29 GB. Writing
    and then reading this to HBM takes 2 * (4.29 GB / 2000 GB/s) ≈ 4.3 ms. Recomputing P requires 2 *
    N^2 * d FLOPs per head, totaling 32 * 2 * 8192^2 * 128 ≈ 550 GFLOPs. At 312 TFLOPs, recomputation
    takes ≈ 1.76 ms. Recomputing is ~2.4x faster than accessing HBM.'
