title: Diagnosing FlashAttention Recomputation Optimization
scenario: Your team is training a 7B parameter model on A100 GPUs with a sequence length of N=8192 and d_head=128 across 32 attention heads. Switching to FlashAttention successfully resolved persistent OOM errors. However, a PyTorch profiler reveals that the backward pass now executes significantly more total FLOPs than standard attention would have. A junior engineer points out that the node now has 20GB of free HBM and proposes caching the NxN attention probability matrix (P) during the forward pass to avoid recomputing it during the backward pass, arguing this FLOP reduction will improve step latency.
question: Why would caching the NxN attention probabilities to save backward FLOPs degrade throughput despite 20GB free HBM?
details:
  realistic_solution: Reject the proposal. The A100's high arithmetic intensity means it is strictly faster to recompute P in ultra-fast SRAM from the Q, K, V blocks during the backward pass than it is to wait for the data to be written to and read from HBM.
  common_mistake: |
    **The Pitfall:** Assuming that reducing total computational FLOPs always decreases overall step latency.
    **The Rationale:** Candidates ignore the "memory wall," failing to realize that reading from/writing to High Bandwidth Memory (HBM) is orders of magnitude slower than executing math on modern Tensor Cores.
    **The Consequence:** The proposed optimization introduces a massive memory bandwidth bottleneck, actually slowing down training throughput despite lowering the FLOP count.
  napkin_math: |
    - **P Matrix Size:** N=8192, 32 heads. 32 × 8192² × 2 bytes ≈ 4.29 GB.
    - **HBM Access Time:** Writing then reading P to HBM at 2000 GB/s = 2 × (4.29 / 2000) ≈ **4.3 ms**.
    - **Recomputation FLOPs:** 2 × N² × d FLOPs per head. 32 × 2 × 8192² × 128 ≈ 550 GFLOPs.
    - **Recomputation Time:** At 312 TFLOPS, 550 GFLOPs / 312 TFLOPS ≈ **1.76 ms**.
    - **Result:** Recomputing strictly in fast SRAM is **~2.4× faster** than waiting for HBM roundtrips.
