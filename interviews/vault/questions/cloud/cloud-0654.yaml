title: The NCCL NVLink Deadlock
scenario: You are running Data Parallel training on a single 8-GPU DGX node. GPU 0 crashes due to a faulty memory bank. You rewrite the host script to exclude GPU 0 and launch the job on GPUs 1 through 7. The job starts, but the NCCL AllReduce immediately hangs indefinitely.
question: Why does a 7-GPU topology fail and hang on a DGX machine?
details:
  realistic_solution: 'NCCL AllReduce algorithms (ring, tree) assume a specific number of participants that matches the physical NVLink topology. The DGX NVLink mesh is wired as a fully-connected graph among 8 GPUs. Removing GPU 0 breaks the ring — GPU 7 port that connected to GPU 0 is now a dead link. NCCL tries to route through it, gets no response, and hangs waiting for the missing peer. Even if NCCL detects only 7 GPUs, an odd number cannot form a balanced ring, causing the collective to deadlock. The fix: either replace the faulty GPU or use NCCL_ALGO=TREE with explicit topology exclusion.'
  common_mistake: |
    **The Pitfall:** Blaming the batch size not being divisible by 7.
    **The Rationale:** Engineers often hit shape mismatch errors with odd GPU counts.
    **The Consequence:** Wasting hours debugging tensor shapes, when the real issue is that NVLink physical hardware mesh requires specific balanced topologies to form a successful communication ring.
  napkin_math: |
    1. **Standard AllReduce (8 GPUs):** NVLink (900 GB/s) takes ~20 ms.
    2. **Degraded Fallback:** If forced to route through the CPU root complex (PCIe Gen4) to bypass a dead GPU, bandwidth drops to ~31.5 GB/s.
    3. **Result:** **This degraded path takes ~560 ms (a 28x slowdown), effectively ruining the node's throughput even if it didn't hang.**
