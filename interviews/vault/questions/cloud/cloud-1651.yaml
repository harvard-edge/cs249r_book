title: Object Storage Streaming vs POSIX Systems
scenario: 'You are training a 50B parameter vision-language model on a 5 PB dataset of interleaved image
  and text. Your training cluster consists of 128 nodes, each with 8x A100 GPUs (1,024 GPUs total). Each
  GPU consumes data at a rate of 1.5 GB/s. You must evaluate two storage architectures: 1) Copying the
  5 PB dataset into a high-performance POSIX parallel file system (e.g., Lustre) attached to the cluster,
  or 2) Streaming directly from Object Storage (S3/GCS) using concurrent HTTP byte-range requests (e.g.,
  WebDataset). Compare the trade-offs and justify your architectural choice.'
question: "Should the 5PB training dataset be copied to Lustre or streamed directly from object storage, and why?"
details:
  realistic_solution: Choose direct object storage streaming. By grouping data into 100MB-1GB shards and
    utilizing asynchronous, concurrent HTTP byte-range requests (8-16 workers per GPU), object storage
    scales horizontally to easily meet the 1.5 TB/s aggregate demand without the multi-hour copy penalty.
  common_mistake: Defaulting to a POSIX parallel file system out of fear that object storage is too slow,
    while ignoring the massive initialization latency (copying 5 PB) and the doubled storage costs.
  napkin_math: 'POSIX Copy Delay: 5 PB / 100 GB/s = ~14 hours of idle cluster time just to copy. Direct
    Streaming: 1,024 GPUs * 1.5 GB/s = 1.53 TB/s aggregate throughput. With 128 nodes, each node pulls
    12 GB/s, cleanly saturating a standard 100 Gbps (12.5 GB/s) NIC. Object storage backend easily handles
    1.5 TB/s if shards are distributed well.'
