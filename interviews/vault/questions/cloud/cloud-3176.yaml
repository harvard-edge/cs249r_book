title: Speculative Decoding vs Increasing Batch Size
scenario: 'On 4x H100, a 70B model at batch=1 produces 24 tok/s (memory-bound). Your
  options to improve throughput: (A) speculative decoding with K=5 (alpha=0.80), (B)
  simply increase batch size to 8, (C) both. Compare latency per token, total throughput,
  and GPU utilization for each option.'
question: For batch=1 speculation, batch=8 without speculation, and both on 4x H100,
  how do latency, throughput, and GPU utilization compare?
details:
  realistic_solution: '(A) Speculation at batch=1: round = 10ms (draft) + 42ms (verify,
    140GB/3.35TB). E[tokens]=3.69. Latency: 52/3.69 = 14.1ms/tok. Throughput: 71 tok/s.
    MBU: 140GB/52ms = 2.69 TB/s (80%). (B) Batch=8 no speculation: weight read = 140GB
    (same — amortized over 8 requests). KV read per step: 8 x 640MB = 5.1GB. Total
    IO: 145GB at 13.4 TB/s = 10.8ms. Compute: 8 x 140G = 1.12T / 3.96P = 0.28ms. Latency:
    10.8ms/tok (per request). Throughput: 8/10.8ms = 741 tok/s. MBU: 145GB/10.8ms
    = 13.4 TB/s (100%). (C) Both: batch=8 spec K=5: verify processes 8x6=48 tokens.
    IO: 140GB + 48 x KV = 155GB at 13.4 TB/s = 11.6ms. Compute: 48 x 140G = 6.72T
    / 3.96P = 1.7ms. Draft: 10ms. Total: 21.6ms for 8 x 3.69 = 29.5 tokens. Throughput:
    1366 tok/s. Latency: 21.6/3.69 = 5.9ms. Best throughput but highest GPU utilization.
    Verdict: if latency goal, use (C). If throughput goal, batch=32 without speculation
    is even better.'
  common_mistake: 'Treating speculation and batching as additive improvements. They
    are partially competing: both exploit the same resource (memory bandwidth headroom).
    At larger batch sizes, decode becomes less memory-bound, reducing speculation''s
    benefit.'
  napkin_math: '(A) 71 tok/s, 14.1ms latency. (B) 741 tok/s, 10.8ms latency. (C) 1366
    tok/s, 5.9ms latency. Batch=32 no-spec: ~2800 tok/s, 11.5ms. Speculation shines
    for latency, batching for throughput.'
