title: Defining Arithmetic Intensity (cloud-0368)
scenario: A junior engineer on your team is trying to optimize a model on a GPU. They say, 'This model has a huge number of FLOPs, so it must be compute-bound.'
question: How would you explain arithmetic intensity and why high total FLOPs alone does not prove a model is compute-bound?
details:
  realistic_solution: Arithmetic Intensity (AI) is the ratio of floating-point operations (FLOPs) performed to the number of bytes accessed from memory. It is a property of the workload. A high AI indicates a compute-bound workload, while a low AI means it is memory-bound.
  common_mistake: |
    **The Pitfall:** Confusing a model's total FLOPs with its hardware performance characteristics.
    **The Rationale:** Engineers assume massive computation naturally bottlenecks on the processor.
    **The Consequence:** Attempting to optimize compute layers when the bottleneck is actually the memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU ridge point: ~295 Ops/Byte.
    2. **Calculations:**
       - Determine AI = Ops / Byte.
       - Compare AI to hardware ridge point.
    3. **Conclusion & Interpretation:**
       - **Result: Knowing AI prevents optimizing the wrong hardware bottleneck.**
  options:
  - The total TFLOPS a GPU can perform.
  - The speed of HBM access in TB/s.
  - The ratio of floating-point operations (FLOPs) to memory bytes accessed.
  - The ratio of a model's parameter count to its memory footprint.
  correct_index: 2
