title: Speculative Decoding Verification Compute Cost
scenario: For a 70B target model on H100, verify that the verification forward pass for K=5 draft tokens
  costs approximately the same wall-clock time as a single autoregressive step at batch=1. Compute the
  FLOP count and memory IO for both and explain why verification is 'free' relative to generation.
question: "Why does verifying K=5 draft tokens take about the same wall-clock time as one batch-1 autoregressive step on H100?"
details:
  realistic_solution: 'Single autoregressive step (batch=1): IO = 140GB (read all weights). Compute =
    2 x 70B = 140 GFLOP. Time = max(140GB/3.35TB, 140G/989T) = max(41.8ms, 0.14ms) = 41.8ms. Memory-bound.
    Verification of K+1=6 tokens: IO = 140GB (same weight read, amortized) + 6 x KV_per_token (negligible).
    Compute = 6 x 140G = 840 GFLOP. Time = max(140GB/3.35TB, 840G/989T) = max(41.8ms, 0.85ms) = 41.8ms.
    Still memory-bound! The extra 5x compute (840G vs 140G) is invisible because we''re IO-bound. This
    is why verification is essentially ''free'' — we''re paying for the weight reads anyway, and the tensor
    cores are idle during those reads. Verification adds K tokens of KV cache write: 6 x 320KB = 1.92MB,
    which is 0.001% of the weight read.'
  common_mistake: 'Thinking verification costs K times more than a single step. At batch=1, decode is
    memory-bound: reading 140GB of weights dominates. Whether you process 1 or 6 tokens against those
    weights, the IO cost is the same.'
  napkin_math: '1 token: IO=41.8ms, compute=0.14ms. 6 tokens: IO=41.8ms, compute=0.85ms. Both memory-bound
    at 41.8ms. Verification is free: compute/IO ratio goes from 0.3% to 2% — still deeply below the ridge
    point (295 FLOP/byte).'
