title: Adapter-Aware KV Cache Management
scenario: Your multi-adapter serving system uses PagedAttention.
question: "Why can't PagedAttention KV cache pages be shared across different LoRA adapters, and how much memory overhead does this create?"
details:
  realistic_solution: 'KV cache values are computed as K = xW_K + x(A_K B_K) where A_K, B_K are adapter matrices. Different adapters produce different K, V values for identical inputs — prefix sharing is only valid within the same adapter. In a 50-adapter system, prefix cache hit rate drops from ~70% (single adapter) to ~1-2% (random adapter assignment). Mitigation: adapter-aware request routing to maximize same-adapter batching and restore prefix cache hits.'
  common_mistake: |
    **The Pitfall:** Assuming prefix KV cache sharing works across adapters with the same system prompt.
    **The Rationale:** Candidates fail to realize that adapted attention projection weights change the key/value computation.
    **The Consequence:** Memory optimizations completely fail in production, leading to unexpected OOMs when deploying multiple adapters.
  napkin_math: |
    1. KV cache per sequence (13B, rank-16, seq=2048): 40 layers × 2 × 5120 × 2048 × 2B = 1.67 GB.
    2. Without prefix sharing: 50 users × 1.67 GB = 83.5 GB (exceeds H100 80 GB).
    3. With perfect prefix sharing (1000-token shared prefix): shared portion = 40 × 2 × 5120 × 1000 × 2B = 0.82 GB.
    4. **Multi-adapter eliminates sharing; 50 users require 83.5 GB instead of ~42 GB, crashing the GPU.**
