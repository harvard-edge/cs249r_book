title: The Rack Density Limit
scenario: You're a cloud infrastructure engineer designing a new AI cluster. Your data center provider
  allocates a standard rack with a liquid cooling system rated for a maximum power density of 70 kW. Your
  goal is to install as many NVIDIA H100 GPUs as possible into this rack. Based on the hardware constants,
  calculate the maximum number of H100s you can fit in a single rack before exceeding its cooling capacity.
details:
  realistic_solution: The solution is a direct calculation based on the total power budget of the rack
    and the power consumption (TDP) of a single GPU. The rack's cooling capacity is the hard physical
    limit. First, convert the rack's power budget from kilowatts to watts, then divide by the power consumption
    of a single H100.
  common_mistake: A common mistake is to confuse the units, for instance by dividing the rack's kW value
    directly by the GPU's Watt value (70 / 700), leading to an answer that is off by a factor of 1,000.
    Another error is to prematurely apply a PUE (Power Usage Effectiveness) multiplier to the GPU's power
    draw; the 70 kW limit already represents the total power the rack's cooling can handle, so PUE is
    accounted for at a higher level of abstraction (the full data center).
  napkin_math: '1. **Identify Total Rack Power Budget:** 70 kW = 70,000 Watts.

    2. **Identify GPU Power Draw:** H100 TDP = 700 Watts.

    3. **Calculate Max GPUs per Rack:** 70,000 W / 700 W/GPU = 100 GPUs.

    4. **Factor in overhead:** CPUs, memory, and networking add ~20%. So the effective budget for GPUs
    is ~56 kW -> 56,000 W / 700 W = 80 GPUs.'
  options:
  - 10 GPUs
  - 83 GPUs
  - 100 GPUs
  - 1,000 GPUs
  correct_index: 2
