title: The Rack Density Limit
scenario: You're a cloud infrastructure engineer designing a new AI cluster. Your data center provider allocates a standard rack with a liquid cooling system rated for a maximum power density of 70 kW. Your goal is to install as many NVIDIA H100 GPUs as possible into this rack. Based on the hardware constants, calculate the maximum number of H100s you can fit in a single rack before exceeding its cooling capacity.
question: How many H100s can a 70 kW rack support before exceeding cooling capacity, and how does typical system overhead change that number?
details:
  realistic_solution: The solution is a direct calculation based on the total power budget of the rack and the power consumption (TDP) of a single GPU. The rack's cooling capacity is the hard physical limit. First, convert the rack's power budget from kilowatts to watts, then divide by the power consumption of a single H100.
  common_mistake: |
    **The Pitfall:** Dividing the rack's total power limit by the GPU's TDP directly without accounting for system-level component overhead.
    **The Rationale:** Engineers treat the GPU as the only power consumer, forgetting that high-performance networking, CPUs, and fans often consume 20% of the total rack budget.
    **The Consequence:** The rack trips its PDU breaker or thermally throttles under full load because it was over-provisioned by 20 GPUs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack budget = 70 kW = 70,000 W.
       - H100 TDP = 700 W.
       - System overhead (CPUs, networking) ≈ 20%.
    2. **Calculations:**
       - Raw GPU limit: 70,000 W / 700 W = 100 GPUs.
       - Effective budget for GPUs: 70,000 W * 0.80 = 56,000 W.
       - Realistic limit: 56,000 W / 700 W = 80 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: A single 70 kW rack supports 80 H100 GPUs safely. Without accounting for system overhead, 100 GPUs would critically overload the cooling system. System is Power-Cooling-Bound.**
  options:
  - 80 GPUs
  - 100 GPUs
  - 700 GPUs
  - 10 GPUs
