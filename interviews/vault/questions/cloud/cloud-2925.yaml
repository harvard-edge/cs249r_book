title: Cold Start Latency for Serverless Compound AI on A100
scenario: 'A serverless compound AI deployment has a cold start latency of 18 seconds: model weight loading from NVMe takes 10.8s, FAISS index loading takes 3.3s, and warm-up inference takes 3.9s. Traffic is bursty with many hours having zero requests.'
question: What keep-warm strategy would reduce the 18s cold start for the bursty serverless deployment without paying for always-on GPU time?
details:
  realistic_solution: 'Tiered warm strategy: (1) Keep a CPU-only instance always warm with model weights in RAM (64GB CPU RAM, ~$0.05/hr). On demand signal, begin GPU transfer at PCIe bandwidth (64GB/s, 7B model=13GB/64GB/s=0.2s vs NVMe''s 10.8s). (2) Pre-load FAISS index into CPU RAM (4GB). (3) Use predictive scaling: analyze traffic patterns, pre-warm GPU 2 minutes before predicted burst. (4) Keep one GPU warm during business hours. Effective cold start: 0.2s (CPU→GPU) + 3.9s warm-up = 4.1s.'
  common_mistake: |
    **The Pitfall:** Treating cold starts as a binary choice between fully cold instances and expensive always-on GPUs.
    **The Rationale:** It's assumed that the full model must reside entirely in GPU memory at all times to guarantee fast inference.
    **The Consequence:** Either paying exorbitant idle costs ($84/day for zero traffic) or subjecting users to unacceptable 18-second wait times.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13GB. NVMe read: 1.2 GB/s (10.8s). PCIe bandwidth: 64 GB/s.
       - CPU always-on is cheap ($0.05/hr); GPU always-on is expensive ($3.50/hr).
    2. **Calculations:**
       - Load weights to CPU RAM (always-on).
       - PCIe CPU→GPU transfer: 13GB / 64 GB/s = 0.2s.
       - Effective cold start: 0.2s (transfer) + 3.9s (warm-up) = 4.1s.
       - Cost savings: $2,520/mo (GPU) vs $36/mo (CPU) = 98.6% reduction.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** A tiered strategy using CPU RAM as a fast cache drops the cold start penalty by 77% while avoiding massive always-on GPU costs.
