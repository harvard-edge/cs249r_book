title: Cost Latency Tradeoffs in H100 Sleep
scenario: A massive cluster (700W peak per GPU) handles bursty LLM inference. Waking a GPU from deep sleep takes 10 seconds, but idle power is still 100W if kept awake.
question: Analyze the cost-latency tradeoff of putting 1000 unused GPUs into deep sleep versus keeping them in a warm-idle state during a 1-hour low-traffic period.
details:
  realistic_solution: Deep sleep saves ~100W per GPU. Over 1 hour for 1000 GPUs, this avoids 100 kWh of energy waste. However, if a sudden spike occurs, the 10-second wake latency will violate real-time inference SLAs. The business must compare the cost of 100 kWh to the financial penalty of latency breaches.
  common_mistake: |
    **The Pitfall:** Looking only at the power savings without quantifying the SLA risk.
    **The Rationale:** Infrastructure engineers often optimize purely for unit economics (power cost) and ignore user-facing metrics.
    **The Consequence:** Deploying aggressive duty cycling that saves minimal dollars but causes massive customer churn due to 10-second request timeouts.
  napkin_math: |
    *   **Idle Power Avoided:** 100W per GPU.
    *   **Fleet Size:** 1,000 GPUs.
    *   **Duration:** 1 hour.
    *   **Energy Saved:** 100W * 1,000 GPUs * 1 hour = 100,000 Wh = 100 kWh.
    *   **Final Result:** **Saving 100 kWh must be weighed against the business penalty of 10-second cold-start latency SLA breaches.**
