title: Cost Latency Tradeoffs in H100 Sleep
scenario: A massive cluster (700W peak per H100 GPU) handles bursty LLM inference.
  Waking an H100 from deep sleep takes 10 seconds, but idle power is still 100W if
  kept awake.
question: Analyze the cost-latency tradeoff of putting 1000 unused GPUs into deep
  sleep versus keeping them in a warm-idle state during a 1-hour low-traffic period.
details:
  realistic_solution: Deep sleep saves ~100W per GPU. Over 1 hour for 1000 GPUs, this
    avoids 100 kWh of energy waste. However, if a sudden spike occurs, the 10-second
    wake latency will violate real-time inference SLAs. The business must compare
    the cost of 100 kWh to the financial penalty of latency breaches.
  common_mistake: Looking only at the power savings without quantifying the SLA risk
    of a 10-second cold-start penalty.
  napkin_math: 1000 * 100W * 1h = 100 kWh
