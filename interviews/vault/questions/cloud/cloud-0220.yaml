title: The Request Routing Strategy
scenario: Our LLM API serves both autocomplete requests (~10 output tokens, 50ms SLA) and document summarization
  requests (~10,000 output tokens, no strict SLA). Both hit the same pool of 8× H100 GPUs. Autocomplete
  users are furious — P99 latency is 4 seconds instead of 50ms. The summarization users are fine. What's
  happening and how do you fix it?
details:
  realistic_solution: 'Head-of-line blocking from mixed request lengths. With continuous batching, a 10,000-token
    summarization request occupies a batch slot for ~400 seconds (at 25 tokens/sec). During that time,
    the scheduler must run prefill for incoming autocomplete requests, but the long requests consume KV-cache
    memory, reducing the maximum batch size. Worse, if the batch is full of long-running decodes, new
    short requests queue behind prefill scheduling delays. The fix is workload-aware routing: separate
    GPU pools (or priority lanes) for latency-sensitive short requests vs throughput-oriented long requests.
    Short-request GPUs run with small max-sequence-length and aggressive preemption; long-request GPUs
    optimize for throughput with large batches.'
  common_mistake: '"Add more GPUs to handle the load." The problem isn''t capacity — it''s mixing workloads
    with incompatible SLA profiles in the same scheduling queue.'
  napkin_math: 8x H100 shared pool, continuous batching, max batch = 32. A 10,000-token summarization
    request takes ~400 seconds. If the batch of 32 is full of long summarizations, their KV caches consume
    massive VRAM (e.g., 32 * 10,000 tokens * 1MB/token). Incoming autocomplete requests are blocked from
    prefilling because KV cache memory is reserved, making wait times explode.
