title: Diagnosing Bottlenecks in Disaggregated LLM Inference
scenario: You are operating a disaggregated serving architecture for a 70B parameter LLM (80 layers, 64
  heads, 128 head dim, FP16), routing prefill requests to an A100-80GB pool and decode requests to an
  H100-80GB pool. During a shift to workload profiles with long contexts (avg 8192 tokens in, 128 tokens
  out), your monitoring shows that Time-To-First-Token (TTFT) remains well within SLA at <1s, but Time-Per-Output-Token
  (TPOT) degrades severely from 20ms to >150ms. Additionally, the decode nodes begin exhibiting frequent
  Out-Of-Memory (OOM) errors despite low compute utilization. The cluster uses a standard 100 Gbps Ethernet
  backend network between the pools. Analyze the root cause of the decode pool starvation and OOMs.
details:
  realistic_solution: The root cause is a severe network bottleneck and memory exhaustion from transferring
    massive KV caches for long-context requests. Moving a 2.68 GB KV cache for an 8K context request across
    a 100 Gbps (12.5 GB/s) link takes 214ms, blocking the decode node. A batch of 10 completed prefill
    requests creates a 2.14s transfer bottleneck and a sudden 26.8 GB memory spike on the decode node,
    starving active decoding sequences (ruining TPOT) and risking OOMs. The fix is to implement KV cache
    streaming with priority scheduling and admission control based on available decode memory.
  common_mistake: Focusing purely on the H100 decode hardware capabilities (assuming they are compute-bound)
    or adjusting decode batch sizes, while completely ignoring the network transfer latency and memory
    pressure caused by receiving large KV caches from the prefill pool.
  napkin_math: 'KV cache size per request = 2 (K,V) * 2 bytes (FP16) * 80 (layers) * 8 (KV heads, GQA)
    * 128 (dim) * 8192 (tokens) = 2.68 GB. Network limit: 100 Gbps = 12.5 GB/s. Transfer latency per request
    = 2.68 GB / 12.5 GB/s = 214 ms. If a prefill node finishes a batch of 10 requests, it forces a 2.14
    second transfer bottleneck and sudden 26.8 GB memory spike on the decode node, starving active decoding
    (ruining TPOT) and causing OOMs.'
