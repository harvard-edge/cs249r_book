title: The SLA Violation Cascade
scenario: 'You''re designing a real-time transcription service with a strict P99 TTFT SLA of 300ms. On a single H100, the model''s prompt processing and first token generation takes 200ms. During steady state, the service receives 30 requests per second. Your junior engineer provisions 5 H100s, arguing the total capacity (5 servers * 5 req/s/server = 25 req/s) is close enough. During a live test, the P99 latency spirals to over 1 second.'
question: 'Why did 5 H100s fail at 30 req/s with 200ms service time, and how many GPUs are needed to reliably meet the 300ms P99 TTFT SLA?'
details:
  realistic_solution: 'The analysis was flawed because it neglected queueing dynamics. A system''s stability requires total service rate to be strictly greater than arrival rate. At 30 req/s arrival and 25 req/s total service rate, the system is unstable (ρ > 1). The request queue will grow indefinitely, and latency will spiral to infinity. To achieve stability, the system needs at least 7 GPUs (total capacity 35 req/s). To reliably meet the strict 300ms P99 SLA, it requires 8-9 GPUs to keep utilization low enough to bound P99 queueing delays under 100ms.'
  common_mistake: |
    **The Pitfall:** Sizing a system based strictly on average arrival rate and average service rate.
    **The Rationale:** Engineers assume "close enough" to 100% utilization works, ignoring the distribution of arrivals and non-linear impacts of queueing delay.
    **The Consequence:** As utilization approaches 100%, wait times increase exponentially, causing a cascade of severe SLA violations.
  napkin_math: |
    - **Service Rate (μ):** 1 request / 200 ms = 5 requests/sec per GPU.
    - **Arrival Rate (λ):** 30 requests/sec.
    - **5 GPUs:** Total μ = 25. Utilization ρ = 30 / 25 = 1.2. **System is unstable (infinite queue).**
    - **7 GPUs:** Total μ = 35. Utilization ρ = 30 / 35 = 0.85. System is stable.
    - **Result:** To meet a strict 100ms queue wait time budget for the P99 SLA, queueing theory dictates **8-9 GPUs** are needed to absorb bursts.
