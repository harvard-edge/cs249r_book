title: Multi-Tenant H100 GPU Scheduling for Cloud ML
scenario: You are designing the core scheduling and resource management system for a new multi-tenant
  ML cloud platform. This platform provides access to clusters of NVIDIA H100 GPUs, each featuring 80
  GB HBM3, 989 TFLOPS FP16 dense compute, and 3.35 TB/s memory bandwidth, with a 700W TDP. Your users
  range from research teams running large-scale distributed training jobs to inference services with strict
  latency requirements. Design a system that can efficiently share these H100 resources among diverse,
  concurrent workloads, ensuring high utilization, fairness, and the ability to meet specific Service
  Level Objectives (SLOs) for different job types. Consider aspects like GPU partitioning, job placement,
  preemption, and handling bursty demand while optimizing for cost-efficiency and performance isolation.
question: "How would you schedule and partition H100 GPUs for mixed distributed training and latency-critical inference while ensuring utilization, fairness, and SLOs?"
details:
  realistic_solution: 'A robust solution would involve a hierarchical scheduling approach. At the lowest
    level, utilize NVIDIA MIG to partition H100 GPUs into smaller, isolated instances (e.g., 7x 1g.10gb
    partitions) for smaller inference or single-node training jobs, maximizing parallelism and isolation.
    For larger training jobs, MPS can be used to share a full H100 more efficiently. Integrate this with
    a cluster-level scheduler (e.g., Kubernetes with a custom scheduler extender or Slurm) that understands
    GPU topology and workload requirements. Implement gang scheduling for distributed training jobs to
    ensure all required GPUs are allocated simultaneously. For mixed workloads, design preemption policies:
    lower-priority, long-running training jobs could be preempted or paused to accommodate higher-priority,
    latency-critical inference requests, with checkpointing mechanisms for seamless resumption. Resource
    accounting should consider not just SM utilization but also HBM3 memory (80 GB), memory bandwidth
    (3.35 TB/s), and power draw (700W) to prevent oversubscription. Dynamic scaling and autoscaling based
    on utilization metrics and workload queues are crucial for cost-efficiency. Performance isolation
    can be further enhanced using cgroups and namespaces, along with monitoring tools to track per-tenant
    resource usage and enforce quotas.'
  common_mistake: A common mistake is to propose a basic queueing system without considering the nuances
    of GPU architecture and workload types. Forgetting about NVIDIA's Multi-Instance GPU (MIG) or Multi-Process
    Service (MPS) capabilities for fine-grained partitioning, or neglecting advanced scheduling concepts
    like gang scheduling for distributed training and preemption for latency-sensitive inference, can
    lead to inefficient resource allocation and missed SLOs. Another pitfall is to ignore the memory bandwidth
    and power constraints of the H100, which can become bottlenecks in multi-tenant scenarios.
  napkin_math: Consider an H100 partitioned into 7x 1g.10gb MIG slices. If an inference model requires
    5GB of HBM3 and 50 TFLOPS FP16, you could theoretically run up to 14 such inference services concurrently
    on a single H100 (7 MIG slices * 2 due to resource estimation). However, memory bandwidth (3.35 TB/s)
    or network I/O might become the bottleneck before compute or HBM3 capacity. For example, if each inference
    request requires 100MB of data transfer and you aim for 1ms latency, the theoretical maximum QPS per
    H100 based on memory bandwidth alone would be (3.35 * 10^12 bytes/s) / (100 * 10^6 bytes/request)
    = 33,500 requests/s. If a single training job uses 40 GB HBM3 and needs 200 TFLOPS FP16, how many
    such jobs could coexist on a node with 8 H100s, balancing memory, compute, and power budgets, assuming
    shared host CPU/memory overhead?
