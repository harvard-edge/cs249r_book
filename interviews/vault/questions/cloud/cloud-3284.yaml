title: Optimizing Data Movement for LLM Inference on Google TPU v5e
scenario: You are tasked with deploying a large language model for real-time inference on a Google TPU v5e. The model's weights and intermediate activations frequently exceed the TPU's 16 GB HBM. Input embeddings are pre-processed on the host CPU and then transferred to the TPU. The TPU v5e offers 197 TFLOPS BF16 peak performance and a host-device bandwidth of 1.6 TB/s.
question: "How would you design the TPU v5e data movement strategy for real-time LLM inference when weights, activations, and datasets exceed 16 GB HBM?"
details:
  realistic_solution: A robust solution involves employing asynchronous DMA transfers to overlap computation and communication, utilizing pinned host memory to avoid unnecessary copies during transfers, and implementing intelligent data batching and tiling strategies to manage datasets exceeding HBM capacity. Where possible, explore framework-specific zero-copy mechanisms or direct memory access features if available between host and TPU. The solution should also consider data compression and quantization to reduce transfer volumes.
  common_mistake: |
    **The Pitfall:** Neglecting host-device interconnect bandwidth.
    **The Rationale:** Treating the TPU as the sole bottleneck and ignoring the cost of feeding it data.
    **The Consequence:** Leaving the 197 TFLOPS TPU starved for data, wasting expensive compute resources.
  napkin_math: |
    1. Transferring 100 GB of data at 1.6 TB/s host-device bandwidth.
    2. Latency = 100 GB / 1.6 TB/s = 100e9 / 1.6e12 = **62.5 milliseconds**.
    3. This transfer latency can easily dominate the fast TPU compute time if not overlapped.
