title: The Model Compression Pipeline
scenario: You have a 70B FP16 model that costs $1.20 per 1M tokens to serve on 4x H100 GPUs. Your target
  is $0.40 per 1M tokens on a single H100. Design a compression pipeline that achieves this 3x cost reduction
  while keeping quality degradation under 2% on your evaluation suite.
question: "How would you compress the 70B FP16 model to hit $0.40 per 1M tokens on one H100 while keeping quality loss under 2%?"
details:
  realistic_solution: 'A production compression pipeline is multi-stage, not a single quantization step.
    The pipeline: (1) **Calibration-aware quantization** (GPTQ/AWQ) to INT4 with group size 128 — reduces
    weights from 140 GB to 35 GB. Quality loss: ~1–2% on most benchmarks. (2) **KV-cache quantization**
    to FP8 — halves KV-cache memory, enabling larger batch sizes. Quality impact: <0.5%. (3) **Speculative
    decoding** with a 1B draft model — the draft model proposes 4–5 tokens, the 70B model verifies in
    one forward pass. Increases effective throughput 2–3x for free. (4) **Continuous batching** (vLLM/TensorRT-LLM)
    — maximizes GPU utilization across concurrent requests.'
  common_mistake: '"Just quantize to INT4 — that''s 4x smaller, so it fits on one GPU." Naive INT4 quantization
    of a 70B model causes 5–10% quality loss, and fitting in memory doesn''t mean meeting latency SLAs.'
  napkin_math: 'Original: 140 GB FP16 requires 4x H100 (TP=4). INT4 reduces weights to 35 GB, fitting on a single 80 GB H100 with 45 GB for KV-cache. FP8 KV-cache uses ~0.5 GB/request at 4k context, allowing a batch size of ~80. Speculative decoding provides a 2.5x throughput multiplier. By running on 1 GPU instead of 4, hardware cost is reduced by 4x. Together with continuous batching, the single GPU processes ~7.5M tokens/hour. At an H100 cost of $2.80/hour, $2.80 / 7.5M = $0.37 per 1M tokens (well below the $0.40 target). Total quality degradation: INT4 (-1.5%) + FP8 KV (-0.3%) = -1.8% (under the 2% budget).'
