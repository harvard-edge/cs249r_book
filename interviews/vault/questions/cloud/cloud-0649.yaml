title: The Model Compression Pipeline
scenario: You have a 70B FP16 model that costs \$1.20 per 1M tokens to serve on 4× H100 GPUs. Your target
  is \$0.40 per 1M tokens on a single H100. Design a compression pipeline that achieves this 3× cost reduction
  while keeping quality degradation under 2% on your evaluation suite.
details:
  realistic_solution: 'A production compression pipeline is multi-stage, not a single quantization step.
    The pipeline: (1) **Calibration-aware quantization** (GPTQ/AWQ) to INT4 with group size 128 — reduces
    weights from 140 GB to 35 GB. Quality loss: ~1–2% on most benchmarks. (2) **KV-cache quantization**
    to FP8 — halves KV-cache memory, enabling larger batch sizes. Quality impact: <0.5%. (3) **Speculative
    decoding** with a 1B draft model — the draft model proposes 4–5 tokens, the 70B model verifies in
    one forward pass. Increases effective throughput 2–3× for free. (4) **Continuous batching** (vLLM/TensorRT-LLM)
    — maximizes GPU utilization across concurrent requests.'
  common_mistake: '"Just quantize to INT4 — that''s 4× smaller, so it fits on one GPU." Naive INT4 quantization
    of a 70B model causes 5–10% quality loss, and fitting in memory doesn''t mean meeting latency SLAs.'
  napkin_math: 'Original: 140 GB FP16 on 4× H100 (TP=4). After INT4: 35 GB → fits on 1× H100 (80 GB) with
    45 GB for KV-cache. KV-cache in FP8 at 4k context: ~0.5 GB/request → batch of 80 concurrent requests.
    Speculative decoding: 2.5× effective token throughput. Continuous batching: 90% GPU utilization vs
    40% with static batching. Net throughput per GPU: original system did X tokens/sec across 4 GPUs.
    Compressed system does ~1.2X tokens/sec on 1 GPU (INT4 2× compute + speculative 2.5× − overhead).
    At ~7.5M tokens/hr on a single \$2.80/hr H100, the cost drops to **\$0.37 per 1M tokens** vs the original
    \$1.20. Quality: INT4 (−1.5%) + FP8 KV (−0.3%) = **−1.8%** total, under the 2% budget.'
