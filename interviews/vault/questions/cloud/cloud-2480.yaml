title: The SRAM Spilling Bottleneck
scenario: You profile a cloud-compiled vision model for a specialized Edge NPU with 4MB of on-chip SRAM. Theoretical FLOP analysis predicts a latency of 5ms. Actual latency is 25ms. NPU utilization is 20%. The model consists of 10 identical 3x3 Conv layers processing 1920x1080 INT16 feature maps.
question: How do you modify the compiler to hit 5ms?
details:
  realistic_solution: The compiler is failing to keep intermediate activations in the NPU's SRAM, forcing costly spills to slow external LPDDR4 memory. Because the intermediate activation tensor is larger than the 4MB SRAM, the compiler evaluates one layer, writes the output to external RAM, and reads it back for the next layer. The solution is to enable spatial tiling and Operator Fusion (e.g., depth-first execution) in the compiler. By computing the 10 layers on small spatial tiles (e.g., 256x256) that fit entirely in SRAM, you eliminate external memory bandwidth bottlenecks.
  common_mistake: |
    **The Pitfall:** Quantizing the model further to INT8 to double the NPU TOPS.
    **The Rationale:** Candidates assume compute is the bottleneck due to low utilization, completely missing the memory spill.
    **The Consequence:** Degrading model accuracy without solving the actual memory bandwidth bottleneck.
  napkin_math: |
    - 1. Calculate feature map size: 1920 * 1080 * 1 channel * 2 bytes = 4.14 MB.
    - 2. Check SRAM fit: 4.14 MB > 4 MB SRAM, forcing external memory spills.
    - 3. Calculate memory transfer per layer: 4.14 MB write + 4.14 MB read = 8.28 MB.
    - 4. Calculate memory latency per layer at 4 GB/s: 8.28 MB / 4 GB/s = 2.07 ms.
    - 5. Calculate total memory overhead for 10 layers: 2.07 ms * 10 = **20.7 ms** (explains the 25ms total latency).
