title: The SRAM Spilling Bottleneck
scenario: You profile a cloud-compiled vision model for a specialized Edge NPU with 4MB of on-chip SRAM.
  Theoretical FLOP analysis predicts a latency of 5ms. Actual latency is 25ms. NPU utilization is 20%.
  The model consists of 10 identical 3x3 Conv layers processing 1920x1080 INT16 feature maps. How do you
  modify the compiler to hit 5ms?
question: "How do you modify the compiler to hit 5ms?"
details:
  realistic_solution: The compiler is failing to keep intermediate activations in the NPU's SRAM, forcing
    costly spills to slow external LPDDR4 memory. Because the intermediate activation tensor is larger
    than the 4MB SRAM, the compiler evaluates one layer, writes the output to external RAM, and reads
    it back for the next layer. The solution is to enable spatial tiling and Operator Fusion (e.g., depth-first
    execution) in the compiler. By computing the 10 layers on small spatial tiles (e.g., 256x256) that
    fit entirely in SRAM, you eliminate external memory bandwidth bottlenecks.
  common_mistake: Quantizing the model further to INT8 to double the NPU TOPS compute throughput.
  napkin_math: 'Feature map: 1920 x 1080 x 1 channel x 2 bytes (INT16) = 4.14 MB. Since 4.14 MB > 4 MB
    SRAM, it spills. LPDDR4 bandwidth: 4 GB/s. Memory transfer per layer: 4.14 MB write + 4.14 MB read
    = 8.28 MB. Time per layer = 8.28 MB / 4 GB/s = 2.07 ms. For 10 layers, memory overhead = 20.7 ms.
    Total latency = 5ms (compute) + 20.7ms (memory) = ~25.7ms. Fusing operators removes the 20.7ms overhead.'
