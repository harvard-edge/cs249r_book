title: Diagnosing PyTorch OOM with Dynamic Sequence Lengths
scenario: 'You are training a transformer model on a node with 8x NVIDIA A100 80GB GPUs. The job suddenly
  crashes with a PyTorch CUDA out of memory error: `Tried to allocate 2.00 GiB... Of the allocated memory
  45.00 GiB is allocated by tensors, and 25.00 GiB is reserved by PyTorch but unallocated.` Your dataloader
  samples highly dynamic sequence lengths (from 128 to 8192 tokens) randomly. Root-cause why a 2GB allocation
  fails when there is 25GB of unallocated reserved memory, and propose a production-ready fix.'
question: "Why can the 2GB allocation fail with 25GB reserved but unallocated, and what production fix handles dynamic sequence lengths?"
details:
  realistic_solution: Diagnose the issue as memory fragmentation within PyTorch's caching allocator, where
    the 25GB of free cache is split into smaller non-contiguous blocks. The fix involves stabilizing tensor
    allocation sizes by using sequence length bucketing in the dataloader, and setting `PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True`
    to allow the allocator to map memory virtually and defragment implicitly.
  common_mistake: Assuming total free reserved memory guarantees availability and incorrectly diagnosing
    a memory leak. Another mistake is indiscriminately calling `torch.cuda.empty_cache()`, which severely
    degrades throughput by forcing expensive system-level `cudaMalloc` calls on the critical path.
  napkin_math: Available Reserved = Total Reserved (70GB) - Allocated Tensors (45GB) = 25GB. If this 25GB
    is heavily fragmented into 50 chunks of 512MB each due to dynamic sequence lengths, the max contiguous
    block size is 512MB. A new request for 2GB contiguous memory > 512MB max block, resulting in an OOM
    despite 25GB total free.
