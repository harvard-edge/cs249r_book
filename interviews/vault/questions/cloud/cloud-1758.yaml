title: Evaluating 32K Context Scaling on A100 GPUs
scenario: 'Your team is extending a 7B parameter LLM''s context window from 4K to 32K tokens for document
  Q&A, training on an 8x A100 (80GB) node. At 4K, training succeeds with a micro-batch size of 4. At 32K,
  the system immediately throws OOM errors. The team debates three solutions: 1) applying Tensor Parallelism
  (TP=8), 2) implementing FlashAttention-2 with Activation Checkpointing, or 3) switching to a Sparse/Sliding
  Window Attention architecture. Evaluate the memory and compute trade-offs of these approaches and justify
  the most optimal solution that preserves exact attention.'
details:
  realistic_solution: Implement FlashAttention-2 combined with activation checkpointing. FlashAttention
    computes exact attention via hardware-aware tiling, completely bypassing the materialization of the
    N x N attention matrix in HBM and reducing activation memory scaling from O(N^2) to O(N). If OOM persists,
    Sequence Parallelism should be layered on top.
  common_mistake: Candidates often suggest Tensor Parallelism to solve the OOM, misunderstanding that
    while TP splits weights, it does not prevent the O(N^2) activation memory explosion per head. They
    may also suggest sparse attention without realizing it alters the model architecture and sacrifices
    exact attention quality.
  napkin_math: 'Standard materialized attention matrix size: B * h * N^2 * 2 bytes. For B=4, h=32, N=4,096:
    4 * 32 * 16.7M * 2 = ~4.2GB per layer. At N=32,768: 4 * 32 * 1.07B * 2 = ~274GB per layer. Across
    32 layers, activation memory reaches 8.7TB, vastly exceeding the node''s 640GB aggregate HBM. FlashAttention
    prevents this by keeping intermediate blocks in SRAM.'
