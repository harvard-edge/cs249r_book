title: Diagnosing Silent Feature Corruption
scenario: Your team operates a cloud-based fraud detection model processing 5,000 transactions/sec. After
  a routine weekly retraining on a cluster of 8x A100 GPUs (p4d.24xlarge, 48-hour job), the newly deployed
  model's False Positive Rate (FPR) spikes from 0.5% to 12%. Rollback to the previous model restores normal
  FPR. Investigations show the new training loss was slightly lower than usual, and validation metrics
  on the new holdout set looked normal. Upstream, a web frontend update was deployed three days before
  the training run. Diagnose the root cause of this failure and explain why standard model-centric monitoring
  failed to catch it before deployment.
details:
  realistic_solution: 'Trace the issue to a silent data type change or null-injection from the frontend
    update that bypassed weak upstream schema checks. The model learned to exploit this corrupted feature
    as a false signal during retraining. Implement a multi-layer data validation pipeline: (1) strict
    schema validation at ingestion (<5ms per batch), (2) statistical drift detection comparing training
    vs serving feature distributions, and (3) automated model rollback when serving metrics degrade beyond
    a threshold.'
  common_mistake: Focusing solely on model architecture, hyperparameters, or assuming natural concept
    drift, while failing to investigate upstream data generation and the training pipeline's data validation
    layer — the actual root cause of the corrupted features.
  napkin_math: 'Cascade cost: 48h * $32.77/h (p4d) = $1,572 wasted compute per failed run. The operational
    cost of an 11.5% FPR spike at 5,000 QPS is 575 false positives/sec, completely overwhelming downstream
    manual review queues within minutes. A simple schema validation check takes <5ms per batch and prevents
    the entire cascade.'
