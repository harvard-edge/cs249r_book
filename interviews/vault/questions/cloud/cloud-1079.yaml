title: Storage Cost of Naive Data Lineage
scenario: A cloud ML team processes 5TB of daily raw logs for an ad-ranking model. To ensure strict data
  lineage and reproducibility for auditing, a naive approach makes full copies of the 5TB dataset for
  each of the 10 daily experimentation pipelines, plus the daily production pipeline. Calculate the 30-day
  S3 Standard storage cost ($0.023/GB-month) of this naive approach versus a pointer-based data lineage
  tracking system that tracks immutable data references and transformation code.
question: "What is the 30-day S3 cost of full-copy lineage versus pointer-based lineage for the 5TB daily log pipelines?"
details:
  realistic_solution: Implement a zero-copy, metadata-based lineage tracking system (like Vertex ML Metadata,
    DVC, or Apache Iceberg) that stores immutable references (content-addressable hashes or URIs) to the
    original raw data.
  common_mistake: Assuming data lineage requires full physical data snapshots for every pipeline run,
    ignoring the exponential storage bloat and I/O overhead.
  napkin_math: 'Naive daily storage: 5TB (raw) + 11 runs * 5TB (copies) = 60TB/day. 30 days = 1,800TB.
    Cost = 1,800,000 GB * $0.023 = $41,400/month. Pointer-based lineage: 5TB/day raw * 30 days = 150TB.
    Cost = 150,000 GB * $0.023 = $3,450/month. Savings = $37,950/month.'
