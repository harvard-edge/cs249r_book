title: Storage Cost of Naive Data Lineage
scenario: A cloud ML team processes 5TB of daily raw logs for an ad-ranking model. To ensure strict data lineage and reproducibility for auditing, a naive approach makes full copies of the 5TB dataset for each of the 10 daily experimentation pipelines, plus the daily production pipeline.
question: "What is the 30-day S3 Standard storage cost ($0.023/GB-month) of full-copy lineage versus pointer-based lineage for the 5TB daily log pipelines?"
details:
  realistic_solution: |
    Implement a zero-copy, metadata-based lineage tracking system (like Vertex ML Metadata, DVC, or Apache Iceberg) that stores immutable references (content-addressable hashes or URIs) to the original raw data.
  common_mistake: |
    **The Pitfall:** Assuming data lineage requires full physical data snapshots.
    **The Rationale:** Candidates treat data pipelines like simple file systems, ignoring modern metadata tracking tools.
    **The Consequence:** Exponential storage bloat, I/O bottlenecks, and massive cloud bills.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily data: 5TB raw + 11 copies.
       - S3 Cost: $0.023/GB-month.
    2. **Calculations:**
       - Naive daily storage: 5TB + 11 * 5TB = 60TB/day.
       - 30-day naive total: 60TB * 30 = 1,800TB (1,800,000 GB).
       - Naive Cost: 1,800,000 * $0.023 = $41,400/month.
       - Pointer-based storage: 5TB * 30 = 150TB (150,000 GB).
       - Pointer Cost: 150,000 * $0.023 = $3,450/month.
       - Savings: $41,400 - $3,450 = $37,950/month.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound (Cost).** Pointer-based lineage saves $37,950/month and avoids massive I/O overhead.
