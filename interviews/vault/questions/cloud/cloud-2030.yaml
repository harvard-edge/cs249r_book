validation_issues:
- The HNSW graph overhead calculation is understated; 16 connections * 4 bytes = 64 bytes is for the pointer
  to the neighbor, not the full neighbor data, and is typically stored per layer, not per vector, making
  the 3.2GB overhead too low.
