title: Portable Quantization Formats Across Accelerator Backends
scenario: You want to deploy a W4A16 quantized LLM on an accelerator. A junior engineer suggests looking for native 4-bit Tensor Cores to execute the matrix multiplication.
question: How is W4A16 executed on modern GPUs, and why don't you need native 4-bit matrix multiplication hardware?
details:
  realistic_solution: 'W4A16 is a weight-only quantization method where activations remain in 16-bit (FP16/BF16). Because the computation involves 4-bit and 16-bit operands, you cannot use a native 4-bit GEMM (which requires both operands to be 4-bit). Instead, the standard approach on both H100 and MI300X is to load the 4-bit weights from HBM to save memory bandwidth, dequantize them to 16-bit in registers or shared memory, and then use standard FP16/BF16 Tensor Cores / MFMA instructions for the compute. Since LLM decoding is heavily memory-bound, the speedup comes purely from reduced memory traffic, making native 4-bit compute hardware unnecessary.'
  common_mistake: |
    **The Pitfall:** Assuming W4A16 requires native 4-bit compute hardware.
    **The Rationale:** If weights are quantized to 4-bit, it feels logical that the arithmetic should happen natively in 4-bit.
    **The Consequence:** Wasting time searching for non-existent 4-bit matrix hardware on H100 or MI300X, rather than realizing compute happens in 16-bit after dequantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model decoding (batch=1). Memory bandwidth: 3 TB/s.
       - W4A16 keeps activations in 16-bit.
    2. **Calculations:**
       - 16-bit model size: 140 GB. Fetch time = 140 GB / 3 TB/s = ~46 ms.
       - 4-bit model size: 35 GB. Fetch time = 35 GB / 3 TB/s = ~11 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** The 4x speedup comes entirely from HBM bandwidth savings; computation relies on standard FP16 ALUs after on-the-fly dequantization.
