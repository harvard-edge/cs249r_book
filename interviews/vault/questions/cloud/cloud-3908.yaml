title: Portable Quantization Formats Across Accelerator Backends
scenario: You want to deploy a W4A16 quantized LLM (4-bit weights, 16-bit activations) on both H100 and MI300X. A junior engineer suggests looking for native 4-bit Tensor Cores or MFMA instructions to execute the matrix multiplication. Explain the hardware compatibility landscape for W4A16 on these architectures.
question: How is W4A16 executed on H100 and MI300X, and why don't you need native 4-bit matrix multiplication hardware?
details:
  realistic_solution: 'W4A16 is a weight-only quantization method where activations remain in 16-bit (FP16/BF16). Because the computation involves 4-bit and 16-bit operands, you cannot use a native 4-bit GEMM (which requires both operands to be 4-bit). Instead, the standard approach on both H100 and MI300X is to load the 4-bit weights from HBM to save memory bandwidth, dequantize them to 16-bit in registers or shared memory, and then use standard FP16/BF16 Tensor Cores / MFMA instructions for the compute. Since LLM decoding is heavily memory-bound, the speedup comes purely from reduced memory traffic, making native 4-bit compute hardware unnecessary.'
  common_mistake: 'Assuming W4A16 requires native 4-bit compute hardware. Neither H100 (which only goes down to FP8/INT8) nor MI300X have native 4-bit matrix cores anyway, but for weight-only quantization, the compute is always performed at the activation precision (16-bit).'
  napkin_math: 'H100 and MI300X FP16 throughput: ~1 PFLOPS. Decoding (batch=1) is deeply memory bound. Reading a 70B model in 16-bit takes 140GB. At 3 TB/s bandwidth, that takes ~46ms. Reading it in 4-bit takes 35GB, taking ~11ms. The 4x speedup is purely from HBM bandwidth savings, while compute relies on FP16 ALUs after on-the-fly dequantization.'
