title: Evaluating Disaggregated Serving for LLMs
scenario: 'Your team is deploying Llama-3-70B for a heavy RAG application (average prompt: 8,000 tokens, average output: 200 tokens). To improve cluster utilization, you propose a disaggregated serving architecture: compute-heavy prefill operations run on H100 instances, and memory-bound decode operations run on cheaper A100 instances. The instances are connected via a 200 Gbps Ethernet network.'
question: "How much TTFT does transferring the 8K-prompt KV cache add over 200 Gbps, and is disaggregated serving viable for a strict 500ms SLA?"
details:
  realistic_solution: 'Calculate the KV cache size for the 8K prompt and its network transfer time over a 200 Gbps link. If the KV cache transfer time plus prefill compute time exceeds the 500ms TTFT SLA, the cost savings of disaggregation are negated by SLA violations. The architecture must either co-locate prefill and decode, or upgrade to 400+ Gbps interconnects.'
  common_mistake: |
    **The Pitfall:** Assuming disaggregation purely improves utilization without calculating network latency.
    **The Rationale:** Candidates focus on the compute-to-memory isolation benefits but ignore the massive state that must be moved between nodes.
    **The Consequence:** The architecture is proposed but fails in production because KV cache transfer alone consumes too much of the TTFT SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Prompt: 8,000 tokens.
       - Network link: 200 Gbps (max 25 GB/s).
       - SLA: 500ms TTFT.
       - Architecture: GQA with 8 KV heads, 128 head dim, 80 layers, FP16.
    2. **Calculations:**
       - KV Cache per token: 2 (K,V) * 8 heads * 128 dim * 80 layers * 2 bytes = 327.68 KB.
       - Total KV Cache to transfer: 8,000 * 327.68 KB = 2.62 GB.
       - Transfer time: 2.62 GB / 25 GB/s = ~105 ms.
       - With TCP overhead: ~150 ms added to TTFT.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound TTFT.** Consuming ~30% of the strict 500ms TTFT SLA just for network transfer makes disaggregation unviable over 200 Gbps Ethernet.
