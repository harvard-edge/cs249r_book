title: Evaluating Disaggregated Serving for LLMs
scenario: 'Your team is deploying Llama-3-70B for a heavy RAG application (average prompt: 8,000 tokens,
  average output: 200 tokens). To improve cluster utilization, you propose a disaggregated serving architecture:
  compute-heavy prefill operations run on 8xH100 instances, and memory-bound decode operations run on
  cheaper 8xA100 instances. The instances are connected via a 200 Gbps Ethernet network. Evaluate the
  latency impact of transferring the KV cache on the Time-To-First-Token (TTFT) and determine if this
  architecture is viable for a strict 500ms TTFT SLA.'
details:
  realistic_solution: Calculate the KV cache size for the 8K prompt (2.62 GB using GQA with 8 KV heads)
    and its network transfer time over a 200 Gbps link (~105ms plus overhead ≈ 150ms). If the KV cache
    transfer time plus prefill compute time exceeds the 500ms TTFT SLA, the cost savings of disaggregation
    are negated by SLA violations. The architecture must either co-locate prefill and decode on the same
    node, or invest in higher-bandwidth interconnect (400+ Gbps) to support disaggregation.
  common_mistake: Candidates often assume disaggregation purely improves utilization without calculating
    the massive latency penalty of transferring GBs of KV cache over standard network links, which can
    consume 30% or more of the TTFT budget.
  napkin_math: 'Llama-3-70B uses GQA: 8 KV heads, 128 head dim, 80 layers. KV cache per token = 2 (K,V)
    * 8 * 128 * 80 * 2 bytes = 327.68 KB. For an 8,000 token prompt, total KV cache = 8,000 * 327.68 KB
    ≈ 2.62 GB. Over a 200 Gbps link (theoretical max 25 GB/s), transferring 2.62 GB takes 2.62 / 25 =
    ~105 ms. With network overhead, this adds ~150 ms to TTFT, consuming 30% of the strict 500ms budget
    before generation even begins.'
