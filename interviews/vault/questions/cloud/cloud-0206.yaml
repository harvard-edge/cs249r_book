title: The Inference Server Autoscaling
scenario: Our LLM endpoint on Kubernetes has a scale-to-zero policy to save money overnight. But the first morning request takes 45 seconds. The SRE team proposes keeping 1 warm replica 24/7. The finance team says that wastes $2,500/month.
question: "Is keeping one warm 70B replica 24/7 worth the $2,500/month, and what is the break-even versus scale-to-zero?"
details:
  realistic_solution: The answer depends on the traffic pattern. For bursty workloads with predictable schedules, use scheduled scaling — spin up replicas 15 minutes before peak. For unpredictable sparse traffic, use a tiered approach: keep a small quantized model (7B on CPU or cheap GPU) as a "warm fallback" while the full model cold-starts.
  common_mistake: |
    **The Pitfall:** Blindly asserting "always keep warm replicas — cold starts are unacceptable."
    **The Rationale:** Candidates prioritize latency above all else, ignoring the massive cloud cost for idle workloads.
    **The Consequence:** The company burns thousands of dollars a month on idle compute for sparsely utilized internal endpoints.
  napkin_math: |
    1. **Cold start breakdown:** Pull (5s) + S3 weights download (14s) + CUDA init (3s) + load to GPU (2.2s) + warmup (2s) = ~26 seconds.
    2. **Warm replica cost:** 2 GPUs * $3.50/hr * 730 hr = **$5,110/month** (finance estimated low).
    3. **Scale-to-zero cost:** 50 cold starts/day * 26s = 1,300s of delay/day. If churn costs $0.50 per delay: 50 * $0.50 * 30 = **$750/month**.
    4. **Break-even:** Warm costs $5,110 vs cold costs $750. Scale-to-zero wins unless churn exceeds **~$170/day**.
