title: Calculating JSD for Disjoint Distributions
scenario: You are deploying an automated drift detection system for a categorical feature with two states: 'A' and 'B'. The reference training distribution P is entirely 'A' (P = [1.0, 0.0]). Due to a bug, the incoming production distribution Q shifts entirely to 'B' (Q = [0.0, 1.0]). A junior engineer attempts to use Kullback-Leibler (KL) divergence to trigger an alert, but the metric calculation crashes the monitoring service.
question: Why does KL divergence crash for P=[1,0] and Q=[0,1], and what is the exact base-2 Jensen-Shannon Divergence?
details:
  realistic_solution: Use Jensen-Shannon Divergence, which creates a smoothed midpoint distribution M = (P+Q)/2. This ensures no division by zero and bounds the drift metric between 0 and 1 (when using base-2 logs), making it ideal for absolute alerting thresholds.
  common_mistake: |
    **The Pitfall:** Failing to realize KL divergence is asymmetric and mathematically undefined for disjoint distributions.
    **The Rationale:** Candidates blindly apply KL divergence without checking for zero-probability states where $Q(i) = 0$ but $P(i) > 0$.
    **The Consequence:** Division-by-zero errors crashing production monitoring pipelines precisely when they are needed most.
  napkin_math: |
    1. **Distributions:** $P = [1, 0]$, $Q = [0, 1]$.
    2. **Mixture Distribution ($M$):** $M = (P+Q)/2 = [0.5, 0.5]$.
    3. **KL($P||M$):** $1 * \log_2(1/0.5) + 0 = 1.0$.
    4. **KL($Q||M$):** $0 + 1 * \log_2(1/0.5) = 1.0$.
    5. **JSD($P||Q$):** $0.5 * \text{KL}(P||M) + 0.5 * \text{KL}(Q||M) = 0.5(1.0) + 0.5(1.0) =$ **1.0**.
