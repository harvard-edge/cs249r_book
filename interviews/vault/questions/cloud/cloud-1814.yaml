title: Runtime Entropy Monitoring for Adversarial Shifts
scenario: You manage a 10-class RoBERTa sequence classifier on AWS Inferentia. To detect adversarial behavior without labeled data, your layered defense includes a runtime output monitor that calculates the prediction entropy of the softmax distribution. During steady-state operations, the endpoint processes 40,000 requests/minute with an average entropy of 0.8 bits/request. An adversary begins sending out-of-distribution (OOD) requests that produce near-uniform predictions (average entropy of 3.0 bits/request).
question: What minimum adversarial request rate is needed to push the 1-minute average entropy above the 1.2-bit alert threshold?
details:
  realistic_solution: Use a weighted average of the normal and adversarial traffic entropies to find the total blended entropy. Set up the inequality based on the total request volume and solve for the unknown adversarial request rate.
  common_mistake: |
    **The Pitfall:** Averaging the two entropy values directly without weighting by request volume.
    **The Rationale:** Engineers apply simple arithmetic means, ignoring the proportional impact of the underlying traffic rates.
    **The Consequence:** The alert threshold math is calculated incorrectly, allowing stealthy adversaries to fly under the radar without tripping the alarm.
  napkin_math: |
    - Let x be adversarial requests/min.
    - Weighted Average: (40,000 * 0.8 + 3.0x) / (40,000 + x) > 1.2
    - 32,000 + 3.0x > 48,000 + 1.2x
    - 1.8x > 16,000
    - **x > 8,888.8, so the adversary must inject at least 8,889 requests/min to trip the threshold.**
