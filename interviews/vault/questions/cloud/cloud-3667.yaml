title: TP+PP Combined Parallelism Strategy for 540B Model
scenario: Design a parallelism strategy for training a 540B PaLM-scale model on a 256-GPU cluster of H100s. The cluster has NVLink (900GB/s intra-node) and InfiniBand (400Gbps inter-node). The model has 118 transformer layers, hidden_size=18432, 48 heads.
question: What 3D parallelism strategy would you use to train the 540B model on 256 H100s while targeting MFU > 40%?
details:
  realistic_solution: Use 3D parallelism: TP=8 within a node (NVLink), PP=4 across nodes, DP=8. TP uses fast NVLink, PP uses InfiniBand only for activations, and DP overlaps gradients with pipeline bubbles.
  common_mistake: |
    **The Pitfall:** Maximizing the Tensor Parallelism (TP) degree across all GPUs (e.g., TP=256) to minimize memory per GPU.
    **The Rationale:** Candidates assume splitting tensors as widely as possible is always beneficial.
    **The Consequence:** Creating an AllReduce graph spanning the entire cluster over InfiniBand, causing communication overhead to completely dominate training time.
  napkin_math: |
    - **Model Size (BF16)**: 540B * 2 bytes = 1.08 TB.
    - **Strategy (TP=8, PP=4, DP=8)**: Total 256 GPUs. Memory per GPU = 1.08 TB / 32 = 33.75 GB (fits in 80GB).
    - **TP Communication (per layer)**: Activation AllReduce = Batch * seq * (hidden/8) * 2 bytes. At B=2048, S=2048: 19 GB transfer.
    - **TP Time**: 19 GB / 900 GB/s = 21 ms. For 118 layers: 4.9s comm.
    - **Compute Time**: At 40% MFU (101 PFLOPS), compute step takes 65 ms.
    - **Conclusion**: **Communication (21ms) vs Compute (65ms) equals ~32% overhead, which is acceptable if overlapped.**
