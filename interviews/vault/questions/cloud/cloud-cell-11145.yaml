title: 'KV-Cache: Specification — KV Cache Budget for Multi-Model Serving'
scenario: 'Write the KV cache specification for a multi-model serving setup on a single H100 (80GB HBM3):
  Model A (7B, 30 concurrent) and Model B (3B, 70 concurrent). Both use bf16. Define memory partitioning,
  priority policy, and overflow handling.'
question: "What per-token KV-cache size should the single-H100 multi-model setup budget for its GQA-8 models?"
details:
  realistic_solution: KV cache per token = 2 × 32 × 8 × 128 × 2B = 131,072 bytes ≈ 128KB (not 40KB).
  common_mistake: Not accounting that two models must share HBM; not specifying what happens when one
    model's requests surge.
  napkin_math: 'GQA-8 model: 32 layers, 8 KV heads, head_dim=128, fp16. KV per token: 32 × 2 × 8 × 128
    × 2B = 131,072B = 128KB (using powers-of-2: 32×2×8×128×2 = 131,072 bytes = 128 KiB ≈ 128KB).'
