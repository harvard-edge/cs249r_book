title: Designing a Volcano Job for Multi-Pod Distributed Training
scenario: 'You are architecting a Kubernetes-native distributed training platform for 64-GPU runs on H100 nodes (8 GPUs per node, NVLink intra-node, InfiniBand inter-node). PyTorch DDP requires all-or-nothing scheduling: if even one pod fails to schedule, the entire job must not start.'
question: "What Kubernetes scheduling configuration prevents partial-allocation deadlock for 64-GPU PyTorch DDP jobs sharing the H100 cluster with inference workloads?"
details:
  realistic_solution: 'Use Volcano `Job` with `minAvailable: 64` under a `gang` scheduling plugin. Volcano holds all 64 pods in a `Pending` state until the full gang can be co-scheduled atomically. Set `policies.action: RestartJob` on `PodEvicted` events. Combine with a `PriorityClass` hierarchy (training=1000, inference=900) so the scheduler preempts lower-priority inference pods when burst training capacity is needed.'
  common_mistake: |
    **The Pitfall:** Using standard Kubernetes `Job` plus pod anti-affinity.
    **The Rationale:** Unaware that standard Kubernetes schedulers bind pods sequentially rather than atomically.
    **The Consequence:** Partial allocation deadlocks where half the training pods land and pend indefinitely, starving inference workloads.
  napkin_math: |
    1. 64 H100s * 700 W = 44.8 kW power draw during training.
    2. Volcano gang scheduling allocates all pods in ~200-500 ms.
    3. Default sequential scheduling takes 30-60 s.
    4. **Conclusion: Sequential scheduling wastes significant power (up to ~0.75 kWh per launch) during partial GPU holds compared to Volcano's atomic allocation.**
