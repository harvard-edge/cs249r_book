title: The Disaggregated Serving Architecture
scenario: In an LLM deployment, users sending very long prompts are causing massive latency spikes for other users who are currently in the middle of generating tokens.
question: How do we structurally isolate compute-bound long prompts from memory-bound token generation?
details:
  realistic_solution: Disaggregated Serving. The prompt phase (Prefill) is heavily compute-bound and monopolizes the GPU ALUs, starving the token generation phase (Decode), which is memory-bandwidth bound. You must split Prefill and Decode onto entirely separate GPU clusters, computing the KV-Cache on the Prefill nodes and transmitting it over the network to the Decode nodes.
  common_mistake: |
    **The Pitfall:** Suggesting naive solutions like "Rate-limit long prompts" or "Add more GPUs to the pool."
    **The Rationale:** These don't address the fundamental resource contention. The prompt phase (Prefill) is heavily compute-bound and monopolizes the GPU ALUs, starving the token generation phase (Decode), which is memory-bandwidth bound.
    **The Consequence:** Persistent tail latency issues and poor resource utilization despite scaling up the cluster.
  napkin_math: |
    1. Prefill for a 10k-token prompt on a 70B model takes ~2 seconds of pure compute, consuming 100% of GPU ALUs.
    2. During those 2 seconds, every concurrent decode request (which needs ~5ms per token) is blocked.
    3. With 50 concurrent users, that's 50 $\times$ 2s = 100 user-seconds of stalled generation from a single long prompt.
    4. **Result:** **Disaggregated Serving splits Prefill and Decode onto separate GPU clusters to prevent this stalling.**
