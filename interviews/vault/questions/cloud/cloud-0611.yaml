title: The Cache Line Waste
scenario: You have a tensor of shape $[1024, 3]$ stored in row-major (C-contiguous) FP32 format. You iterate
  over it column-by-column (reading all 1024 elements of column 0, then column 1, etc.). The CPU cache
  line is 64 bytes. What fraction of each cache line fetch is wasted, and how does this compare to row-major
  iteration?
details:
  realistic_solution: In row-major layout, consecutive elements of a row are contiguous in memory. The
    entire tensor spans 192 cache lines. When you iterate column-wise, you sweep through the memory 3
    separate times (once for each column). This means you fetch each of the 192 cache lines 3 times, transferring
    a total of 36 KB. By contrast, row-major iteration sweeps through the memory exactly once, fetching
    each cache line 1 time for a total of 12 KB. Therefore, column iteration wastes 66.7% of the fetched
    memory bandwidth, downloading exactly 3 times more data.
  common_mistake: '"Cache lines don''t matter for GPU workloads" or incorrectly calculating the waste
    by assuming cache lines are skipped. Because the row size (12 bytes) is smaller than the cache line
    (64 bytes), no cache lines are skipped; every cache line is fetched exactly 3 times (once per column
    pass).'
  napkin_math: 'Column iteration: each of the 3 columns requires reading the entire array''s worth of
    cache lines because the array size likely exceeds the lowest level cache or we consider mandatory
    fetches. For each column, we touch every cache line once. The tensor occupies $1024 \times 3 \times
    4 / 64 = 192$ cache lines. Column iteration fetches $192 \times 3 = 576$ cache lines = 36,864 bytes
    (36 KB). Row iteration reads the memory sequentially exactly once: 192 cache lines = 12,288 bytes
    (12 KB). Column-wise reads **exactly 3.0× more data** from memory (a 66.7% waste of the fetched bytes).
    On GPU, the analogous problem is coalesced vs uncoalesced global memory access.'
