title: Evaluating Spot Instance Cost vs Recovery Overhead
scenario: >-
  You are orchestrating a 14-day training run for a 13B parameter LLM on 64 A100 (80GB) GPUs (8
  nodes of 8 GPUs). On-demand instances cost $6,300/day total. Spot instances offer a 70% discount ($1,890/day)
  but average 3 preemptions per day per node. Any single preemption halts the entire synchronous training
  job, requiring a reload from the last checkpoint. Assume you checkpoint every 20 minutes, and a cluster
  restart takes 5 minutes.
question: >-
  How do pure On-Demand and pure Spot compare for the 14-day 13B LLM run in total cost and time-to-market?
details:
  realistic_solution: |
    Calculate the exact cluster-wide overhead (lost work + recovery time) caused by node preemptions. Apply this efficiency penalty to the baseline duration, and weigh the definitive cost savings against the delayed time-to-market to justify the architectural decision.
  common_mistake: |
    **The Pitfall:** Calculating the 70% cost savings blindly.
    **The Rationale:** Candidates fail to account for the cascading impact of global synchronization overhead, where a single node preemption halts all 8 nodes.
    **The Consequence:** Severely underestimating the extended time-to-market and true operational cost of spot instances.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 nodes with 3 preemptions/day = 24 interruptions/day.
    - Checkpoint every 20 mins; average lost work is ~10 mins.
    - Cluster restart takes 5 mins.

    **Calculations:**
    - Overhead per interruption = 10m + 5m = 15m.
    - Total daily overhead = 24 × 15m = 360m (6 hours).
    - Training efficiency = 18h / 24h = 75%.
    - New duration = 14 days / 0.75 = 18.67 days.
    - Spot cost = 18.67 days × $1,890/day = ~$35,286.
    - On-Demand cost = 14 days × $6,300/day = $88,200.

    **Conclusion & Interpretation:**
    - **Result: ~$52,914 saved (Time-to-Market Delayed)**. You save significant cost but delay delivery by 4.67 days.
