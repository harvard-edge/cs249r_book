title: Cloud-to-Edge NPU Offloading Architecture
scenario: 'You are redesigning a video analytics pipeline that currently streams 1,000 live 1080p/30FPS camera feeds to centralized cloud GPUs for object detection. Network bandwidth costs are dominating your budget. You are evaluating replacing standard cameras with edge devices equipped with an integrated 4 TOPS (INT8) NPU, running a quantized model locally to only send metadata to the cloud.'
question: Should you move the 1,000-camera video analytics workload to 4 TOPS edge NPUs, and what compute/TCO trade-offs drive the decision?
details:
  realistic_solution: 'Justify the edge NPU shift by calculating bandwidth savings versus edge hardware amortization and operational overhead. The NPU easily handles the compute (30 GOPs/s is <1% of 4 TOPS). While quantization to INT8 may cause a minor accuracy drop, eliminating continuous video streaming significantly reduces TCO. The strategy requires building an OTA update system, but the massive bandwidth and cloud GPU cost reductions make it the optimal choice.'
  common_mistake: |
    **The Pitfall:** Focusing solely on edge NPU compute limits while ignoring quantization engineering costs and network savings.
    **The Rationale:** Engineers fixate on the 4 TOPS spec but fail to realize that bandwidth elimination entirely justifies the engineering overhead of managing remote devices.
    **The Consequence:** The company continues to pay exorbitant, unsustainable cloud egress and ingress fees for raw video streams.
  napkin_math: |
    - **Cloud Bandwidth Cost**: `1,000 cameras * 4 Mbps = 4 Gbps \approx 1,300 TB/month`. At `$0.05/GB`, this is `~$65,000/month`.
    - **Edge Compute Demand**: `0.5 GMACs * 30 FPS * 2 ops = 30 GOPs/s` per camera (well under the 4 TOPS limit).
    - **Metadata Bandwidth**: Sending 10 Kbps/cam drops bandwidth by 99.7%.
    - **Final Result**: The **~$65k/mo bandwidth savings** easily justify the $100 edge NPU hardware premium with a payback period of under 2 months.
