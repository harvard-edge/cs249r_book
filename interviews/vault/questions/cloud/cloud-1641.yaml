title: Cloud-to-Edge NPU Offloading Architecture
scenario: 'You are redesigning a video analytics pipeline that currently streams 1,000 live 1080p/30FPS
  camera feeds to centralized cloud GPUs for object detection. Network bandwidth costs are dominating
  your budget. You are evaluating an architecture shift: replacing the standard cameras with edge devices
  equipped with an integrated Neural Processing Unit (NPU) rated at 4 TOPS (INT8) at 2W, and running a
  quantized model (0.5 GMACs) locally to only send metadata to the cloud. Evaluate the TCO, compute, and
  operational trade-offs of this strategy compared to the pure cloud approach.'
details:
  realistic_solution: Justify the edge NPU shift by calculating bandwidth savings versus edge hardware
    amortization and operational overhead. The NPU easily handles the compute (30 GOPs/s is <1% of 4 TOPS).
    While quantization to INT8 may cause a minor accuracy drop, eliminating continuous video streaming
    significantly reduces TCO. The strategy requires building an OTA update system, but the massive bandwidth
    and cloud GPU cost reductions make it the optimal choice.
  common_mistake: Focusing solely on the compute capabilities of the NPU (4 TOPS) and ignoring the engineering
    cost of INT8 quantization, compiler toolchain limitations, and the operational burden of managing
    and updating 1,000 remote edge devices.
  napkin_math: 'Cloud Bandwidth: 1,000 cameras * 4 Mbps = 4 Gbps = ~1,300 TB/month. At $0.05/GB, that
    is ~$65,000/month in data transfer. Edge Compute: 0.5 GMACs * 30 FPS * 2 ops = 30 GOPs/s per camera
    (well under the 4 TOPS NPU limit). Transmitting only metadata (10 Kbps/cam) drops bandwidth by 99.7%.
    This ~$65k/mo savings justifies a $100 premium per NPU-equipped camera with a payback period of under
    2 months.'
