title: Activation Sparsity Memory Compression
scenario: You are deploying a large recommender system (DLRM) on a T4 GPU. The MLP's largest hidden layer outputs a batch of activations totaling 32,000,000 bytes (8 million FP32 elements) which must be read and written to HBM. You profile the model and find that using ReLU instead of SiLU induces 60% activation sparsity (60% of values are exactly zero). To mitigate the memory bandwidth bottleneck, you compress these activations in memory using a dense bitmask (1 bit per original element) to indicate non-zeros, followed immediately by the packed non-zero FP32 values.
question: What is the exact compressed activation size in MB after storing a 1-bit bitmask and the non-zero FP32 values?
details:
  realistic_solution: Calculate the size of the remaining 40% non-zero FP32 values and add the memory required for the dense bitmask (8 million bits), resulting in a total footprint of 13.8MB.
  common_mistake: |
    **The Pitfall:** Multiplying the original 32MB footprint directly by the 40% non-zero rate.
    **The Rationale:** Candidates correctly calculate the size of the non-zero elements but forget the structural overhead needed to map them back.
    **The Consequence:** They calculate 12.8MB, missing the mandatory 1MB bitmask, leading to inaccurate memory bandwidth capacity planning.
  napkin_math: |
    - Original activations: 8,000,000 FP32 elements × 4 bytes = 32 MB.
    - Non-zero values (40%): 3,200,000 elements × 4 bytes = 12.8 MB.
    - Dense bitmask (1 bit per original element): 8,000,000 bits / 8 = 1,000,000 bytes = 1.0 MB.
    - **Total Compressed Size:** 12.8 MB + 1.0 MB = **13.8 MB**.
