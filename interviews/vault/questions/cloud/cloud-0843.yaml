title: 'Activation Sparsity Memory Compression'
scenario: 'You are deploying a large recommender system (DLRM) on a T4 GPU. The MLP''s largest hidden layer outputs a batch of activations totaling 32,000,000 bytes (8 million FP32 elements). Using ReLU induces 60% activation sparsity. To mitigate memory bottlenecks, you compress activations using a 1-bit dense bitmask followed by packed non-zero FP32 values.'
question: 'What is the exact compressed activation size in MB after storing a 1-bit bitmask and the non-zero FP32 values?'
details:
  realistic_solution: 'Calculate the size of the remaining 40% non-zero FP32 values and add the memory required for the dense bitmask (8 million bits) to get the total footprint.'
  common_mistake: |
    **The Pitfall:** Multiplying the original 32MB footprint directly by the 40% non-zero rate.
    **The Rationale:** Candidates correctly calculate the size of the non-zero elements but forget the structural overhead needed to map them back.
    **The Consequence:** They calculate 12.8MB, missing the mandatory 1MB bitmask, leading to inaccurate memory bandwidth capacity planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original activations: 8,000,000 FP32 elements (32 MB).
    - Sparsity: 60% zeros, 40% non-zeros.
    - Format: 1-bit mask + packed FP32.

    **Calculations:**
    - Non-zero FP32 size: 8,000,000 × 40% × 4 bytes = 12,800,000 bytes (12.8 MB).
    - Bitmask size: 8,000,000 bits / 8 bits/byte = 1,000,000 bytes (1.0 MB).
    - Total Compressed Size: 12.8 MB + 1.0 MB = 13.8 MB.

    **Conclusion & Interpretation:**
    - **Result: 13.8 MB final footprint (Bitmask-Overhead-Bound)**. Compression is structurally bounded by the bitmask overhead.
