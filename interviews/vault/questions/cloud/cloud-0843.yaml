title: Activation Sparsity Memory Compression
scenario: You are deploying a large recommender system (DLRM) on AWS `g4dn.xlarge` instances. The MLP's
  largest hidden layer outputs a batch of activations totaling 32,000,000 bytes (8 million FP32 elements)
  which must be read and written to HBM. You profile the model and find that using ReLU instead of SiLU
  induces 60% activation sparsity (60% of values are exactly zero). To mitigate the memory bandwidth bottleneck,
  you compress these activations in memory using a dense bitmask (1 bit per original element) to indicate
  non-zeros, followed immediately by the packed non-zero FP32 values. Calculate the exact compressed size
  of the activation tensor in megabytes (where 1 MB = 1,000,000 bytes).
question: "What is the exact compressed activation size in MB after storing a 1-bit bitmask and the non-zero FP32 values?"
details:
  realistic_solution: Calculate the size of the remaining 40% non-zero FP32 values and add the memory
    required for the dense bitmask (8 million bits), resulting in a total footprint of 13.8MB.
  common_mistake: Simply multiplying the 32MB footprint by 40% (yielding 12.8MB) and forgetting to account
    for the metadata structural overhead (the bitmask) required to index and reconstruct the sparse tensor.
  napkin_math: AWS g4dn uses a T4 GPU (16GB GDDR6, 320GB/s). Writing 8M FP32 activations (32MB) takes
    32MB / 320GB/s = 0.1ms. If 60% of activations are zero (ReLU), we can compress it. Non-zeros = 3.2M
    elements (12.8MB). Adding a 1-bit bitmask for the 8M elements adds 1MB. Total compressed size = 13.8MB.
    This 57% memory footprint reduction accelerates IO-bound DLRM layers significantly.
