title: Diagnosing False PSI Alerts for Income Drift
scenario: 'A machine learning engineer at a fintech company is monitoring a production credit scoring model. Over the past month, the model''s approval rate dropped by 15%. The monitoring system tracks feature drift using the Population Stability Index (PSI) on 10 core numerical features, which are bucketed into deciles. The alert threshold is 0.2. The dashboard shows a PSI of 0.32 for the "Annual Income" feature. Upon investigation, the engineer discovers that inflation has shifted incomes higher; the top bin (>$150k), expected to contain 10% of the population, now captures 35% of recent applicants.'
question: What caused the PSI alert on Annual Income, and what immediate monitoring change should you make?
details:
  realistic_solution: 'Analyze the bin-level PSI contributions to confirm the shift is concentrated in the upper bins due to inflation. Update the monitoring pipeline to use dynamic quantile binning based on a rolling reference window, or normalize the income feature against an inflation index before binning to isolate true distributional shifts from macroeconomic trends.'
  common_mistake: |
    **The Pitfall:** Blindly retraining the model when PSI breaches the threshold for monetary features.
    **The Rationale:** Engineers assume the feature's predictive power has degraded, failing to recognize that fixed-threshold binning is highly sensitive to macroeconomic inflation.
    **The Consequence:** Artificial drift alerts cause unnecessary, expensive retraining cycles that do not actually improve model performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PSI alert threshold: 0.2.
       - Top bin expected proportion: 10% (0.10).
       - Top bin actual proportion: 35% (0.35) due to inflation.
    2. **Calculations:**
       - PSI formula for bin: (Actual - Expected) * ln(Actual / Expected).
       - Shift calculation: (0.35 - 0.10) * ln(0.35 / 0.10) = 0.25 * ln(3.5) = 0.25 * 1.2527 = 0.313.
    3. **Conclusion & Interpretation:**
       - **Result: Alert-Bound by Fixed Thresholds.** The single upper bin shift contributes 0.313 to the PSI, completely breaching the standard 0.2 alert threshold on its own and masking true model health.
