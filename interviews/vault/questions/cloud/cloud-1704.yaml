title: Diagnosing False PSI Alerts for Income Drift
scenario: A machine learning engineer at a fintech company is monitoring a production credit scoring model.
  Over the past month, the model's approval rate dropped by 15%. The monitoring system tracks feature
  drift using the Population Stability Index (PSI) on 10 core numerical features, which are bucketed into
  deciles (fixed absolute thresholds determined during training). The alert threshold is 0.2. The dashboard
  shows a PSI of 0.32 for the 'Annual Income' feature. Upon investigation, the engineer discovers that
  inflation has shifted incomes higher; the top bin (>$150k), expected to contain 10% of the population,
  now captures 35% of recent applicants. Analyze the monitoring failure and determine the immediate corrective
  action.
details:
  realistic_solution: Analyze the bin-level PSI contributions to confirm the shift is concentrated in
    the upper bins due to inflation. Update the monitoring pipeline to use dynamic quantile binning based
    on a rolling reference window, or normalize the income feature against an inflation index before binning
    to isolate true distributional shifts from macroeconomic trends.
  common_mistake: Blindly retraining the model or assuming the feature's predictive power has degraded,
    failing to recognize that fixed-threshold binning for monetary features is highly sensitive to macroeconomic
    inflation, which triggers artificial drift alerts.
  napkin_math: Contribution of the top bin to PSI = (Actual - Expected) * ln(Actual / Expected). Here,
    Actual = 0.35, Expected = 0.10. PSI_bin = (0.35 - 0.10) * ln(0.35 / 0.10) = 0.25 * ln(3.5) ≈ 0.25
    * 1.25 = 0.3125. This single bin's shift alone completely breaches the standard 0.2 PSI alert threshold.
