title: Gradient Sync Bucket Spec
scenario: A distributed training team wants to tune gradient buckets for overlap.
  Specify what must be measured before changing bucket size.
question: What measurements are needed before tuning gradient bucket size for communication-computation
  overlap?
details:
  realistic_solution: Measure per-layer gradient ready times, bucket sizes, all-reduce
    duration, launch overhead, compute stream windows, exposed communication, and
    memory pressure. The right bucket size balances early overlap against overhead
    and bandwidth efficiency.
  common_mistake: Picking the largest bucket because it reduces overhead, while losing
    overlap with backward compute.
  napkin_math: A bucket ready with 20% of the backward window remaining has more overlap
    opportunity than one ready with only 2% remaining; exact timing should be measured
    from traces rather than guessed.
