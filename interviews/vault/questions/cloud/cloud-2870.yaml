title: Gradient Sync Bucket Spec
scenario: 'A distributed training team wants to tune gradient buckets for overlap.'
question: 'What measurements are needed before tuning gradient bucket size for communication-computation overlap?'
details:
  realistic_solution: 'Measure per-layer gradient ready times, bucket sizes, all-reduce duration, launch overhead, compute stream windows, exposed communication, and memory pressure. Profiling via nsys is required to balance early overlap against launch overhead.'
  common_mistake: |
    **The Pitfall:** Picking the largest bucket blindly.
    **The Rationale:** Assuming that minimizing launch overhead is the sole optimization target.
    **The Consequence:** Completely losing the ability to overlap communication with backward compute because the gradients aren't ready until the end of the step.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: Maximize communication overlap during the backward pass.
    2. **Calculations:**
       - If AllReduce takes 10ms and backward pass takes 50ms.
       - Triggering AllReduce at 40ms perfectly hides the communication latency.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound. Bucket sizes must be dynamically profiled to align communication chunks perfectly within exposed backward compute windows.**
