validation_issues:
- The bandwidth calculation for an 8-GPU Ring AllReduce on a single node assumes 2 * (7/8) * 140GB = 245GB,
  then divides by 900 GB/s. However, 900 GB/s is bisection bandwidth, and a single GPU's effective send/receive
  bandwidth in a ring is typically half of that, or you need to be explicit about the effective bandwidth
  used in the calculation.
- The 4.9 seconds for InfiniBand is calculated as 245GB / 50 GB/s, which is 4.9s. However, the communication
  volume for the cross-node portion is not specified, making it unclear if 245GB is still the correct
  divisor here.
math_verified: true
math_status: WARN
math_date: '2026-04-03'
math_model: gemini-3.1-pro-preview
math_issues:
- Calculation assumes NVLink bisection bandwidth (900 GB/s) is fully available for a single GPU's effective
  send/receive in a ring, which typically achieves half that. However, the arithmetic 245 / 900 = 0.27
  and 245 / 50 = 4.9 is correct.
