title: The Distributed Training Choke Point
scenario: You are an ML Systems Engineer scaling a 70B parameter model training job from a single 8xH100 server to two servers (16 GPUs total). In the single-node setup, GPUs are connected via NVLink 4.0 and achieve 95% utilization. When you scale to two nodes, connected via a 400 Gbps InfiniBand NDR switch, you observe that per-GPU throughput drops by nearly 50%, and profiler tools show a massive spike in time spent on `AllReduce` communication operations.
question: What primary bottleneck causes the 50% per-GPU throughput drop when scaling the 70B job from one 8×H100 NVLink node to two nodes?
details:
  realistic_solution: The bottleneck is the switch from the on-node NVLink fabric to the off-node InfiniBand network. NVLink is a proprietary, extremely high-bandwidth, low-latency GPU-to-GPU interconnect. InfiniBand is a high-performance networking standard, but it is orders of magnitude slower than NVLink. For the `AllReduce` operation, gradients and weights must now traverse the much slower PCIe bus to the InfiniBand NIC, travel over the wire to the other node, and back again. This introduces significant latency and bandwidth constraints that were absent in the single-node NVLink mesh, causing the GPUs to spend most of their time waiting for data from other nodes.
  common_mistake: |
    **The Pitfall:** Blaming network drivers, NCCL config, or model architecture.
    **The Rationale:** Engineers underestimate the staggering physical performance gap between tightly coupled on-node NVLink and off-node networking fabrics.
    **The Consequence:** Wasting days debugging software stacks when the bottleneck is simply the fundamental speed-of-light limits of crossing the server boundary via InfiniBand.
  napkin_math: |
    1. **Data Volume:** A 70B FP16 model has 140 GB of gradients.
    2. **Single Node (NVLink):** 8-GPU Ring AllReduce transfers $2 \times (7/8) \times 140 \text{ GB} = 245 \text{ GB}$. At 450 GB/s bandwidth, it takes $245 / 450 \approx 0.54$ seconds.
    3. **Two Nodes (InfiniBand):** 16-GPU flat Ring AllReduce transfers $2 \times (15/16) \times 140 \text{ GB} = 262.5 \text{ GB}$. At 50 GB/s (400 Gbps), it takes $262.5 / 50 \approx 5.25$ seconds.
    4. **Result:** **The off-node step is nearly 10x slower, severely throttling throughput.**
  options:
  - The TCP/IP stack is adding too much overhead to the InfiniBand network, slowing down communication.
  - The PCIe Gen5 bus connecting the InfiniBand NIC to the GPUs is the primary bottleneck.
  - The bandwidth and latency of the off-node InfiniBand network are fundamentally worse than the on-node NVLink fabric.
  - The model's architecture has poor parallelization characteristics, making it unsuitable for multi-node training.
  correct_index: 2
