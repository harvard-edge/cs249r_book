title: Prefill-Decode Split Rationale
scenario: A colleague asks why disaggregated serving splits prefill and decode onto
  separate GPU pools rather than running both phases on every GPU. Explain the core
  motivation and what hardware characteristic makes the two phases incompatible on
  shared capacity.
question: Why does disaggregated serving split prefill and decode onto separate GPU
  pools, and what hardware bottleneck makes sharing inefficient?
details:
  realistic_solution: 'Prefill is compute-bound: it processes all input tokens simultaneously
    as a large matrix multiply (high arithmetic intensity ~300 FLOP/byte on H100 at
    long context). Decode is memory-bandwidth-bound: it streams the full model weight
    matrix once per generated token to produce a single token (arithmetic intensity
    ~1-2 FLOP/byte). Mixing them on the same GPU forces a compromise: prefill under-utilizes
    the 3.35 TB/s HBM bandwidth while decode under-utilizes 989 TFLOPS of compute.
    Disaggregation lets each pool run at its natural bottleneck, improving overall
    cluster utilization by 30-50% in practice.'
  common_mistake: Saying the split is purely about memory — both phases need HBM,
    so memory alone doesn't explain the split. The real driver is compute vs. memory-bandwidth
    utilization profiles being fundamentally different.
  napkin_math: 'H100 compute-to-bandwidth ratio: 989e12 / 3.35e12 = ~295 FLOP/byte
    ridge point. Prefill for 4096-token input on 70B model: 2×70e9×4096 = 573 TFLOPs
    of compute, weight reads ~140 GB → ~4,096 FLOP/byte — firmly compute-bound. Single
    decode step: 2×70e9×1 = 140 GFLOPs, weight reads ~140 GB → 1 FLOP/byte — firmly
    bandwidth-bound.'
