title: Prefill-Decode Split Rationale
scenario: A disaggregated serving architecture splits prefill and decode onto separate GPU pools rather than running both phases on every GPU.
question: Why does disaggregated serving split prefill and decode onto separate GPU pools, and what hardware bottleneck makes sharing inefficient?
details:
  realistic_solution: 'Disaggregation aligns hardware to the workload''s natural bottleneck: prefill is heavily compute-bound (high arithmetic intensity), whereas decoding is entirely memory-bandwidth-bound (low arithmetic intensity). Segregating them prevents mutual under-utilization of the SMs and HBM.'
  common_mistake: |
    **The Pitfall:** Saying the split is purely about memory constraints.
    **The Rationale:** Both phases need HBM, so candidates assume it's just to fit the KV cache.
    **The Consequence:** They fail to realize the real driver is compute vs. memory-bandwidth utilization profiles being fundamentally different.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 peak compute: ~989 TFLOPS. HBM bandwidth: 3.35 TB/s.
       - 70B model. Prefill input: 4096 tokens. Decode: 1 token.
    2. **Calculations:**
       - H100 Ridge Point: 989e12 / 3.35e12 = ~295 FLOP/byte.
       - Prefill compute: 2 * 70e9 * 4096 = 573.4 TFLOPs. Memory read: ~140 GB.
       - Prefill AI: 573.4e12 / 140e9 = 4096 FLOP/byte (>> 295).
       - Decode compute (1 token): 2 * 70e9 * 1 = 140 GFLOPs. Memory read: ~140 GB.
       - Decode AI: 140e9 / 140e9 = 1.0 FLOP/byte (<< 295).
    3. **Conclusion & Interpretation:**
       - **Result: Prefill AI is 4096 (Compute-Bound), Decode AI is 1.0 (Memory-Bandwidth-Bound). Disaggregation aligns hardware to these opposing bottlenecks.**
