title: 'Storage Format Impact on Shuffle Performance'
scenario: 'Training a 70B LLM requires shuffling 2 trillion tokens across epochs for convergence. Your storage format must support efficient shuffling without loading the entire dataset into memory. The dataset is 4 TB (uint16 tokens).'
question: 'Compare chunk-based, index-based, and streaming shuffle for a 4 TB dataset; which minimizes time-to-first-batch while maintaining statistical quality?'
details:
  realistic_solution: 'Three approaches: (1) Shard shuffle (WebDataset): shuffle shard order, then shuffle within each shard''s buffer. Quality: approximate — samples within a shard are always neighbors in the original data. Fix by pre-shuffling shards once. Time-to-first-batch: open first shard + fill shuffle buffer ≈ 2 seconds. (2) Index permutation (memmap): generate a random permutation of 2T indices, access tokens by permuted index. Quality: perfect global shuffle. But random access to memmap is catastrophic — each sample triggers a page fault at a random 4 KB page. 2T random 4 KB reads = no sequential I/O benefit. Time-to-first-batch: instant (generate permutation, first read), but sustained throughput collapses. (3) Streaming reservoir: read sequentially, maintain a reservoir of size R. Quality: depends on R — R = 10M gives good local randomness. Time-to-first-batch: fill reservoir first = R samples × read speed. Best hybrid: pre-shuffle the dataset once into shards, then shard-shuffle + buffer-shuffle per epoch.'
  common_mistake: |
    **The Pitfall:** Attempting a full dataset shuffle in memory.
    **The Rationale:** Assuming standard random sampling paradigms work at the terabyte scale.
    **The Consequence:** Realizing 4 TB doesn't fit in RAM on any single machine; distributed shuffle across 8 nodes requires all-to-all communication that takes hours.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 4 TB. Shards: 10K (400 MB each).
    - Sequential speed: 7 GB/s. Random 4 KB reads: 200K IOPS (800 MB/s).

    **Calculations:**
    - Shard time-to-first-batch: 400 MB / 7 GB/s = 57ms + buffer fill (10K samples * 4 KB = 40 MB) = 63ms.
    - Index permutation throughput: 800 MB/s (8.75x slower than sequential).
    - Reservoir (R=10M) fill time: 10M * 4 KB / 7 GB/s = 5.7 seconds. Throughput after fill: 7 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 63ms to first batch (IO-Bound)**. Shard shuffle is optimal with fast first batch and full sequential throughput.
