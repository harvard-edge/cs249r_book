title: Diagnosing Dynamic Batching Latency Spikes
scenario: You deploy a ResNet-152 classification model on an NVIDIA A10G using Triton Inference Server with dynamic batching. To maximize throughput, the team sets max_batch_size=128 and max_queue_delay=50ms. During micro-bursts of 400 QPS, the server sustains the throughput and GPU utilization remains around 55%, but P99 latency degrades to 450ms, severely violating the 200ms SLA.
question: "Why does P99 latency hit 450ms with max_batch_size=128 and max_queue_delay=50ms despite only 55% GPU utilization?"
details:
  realistic_solution: Profile the model's execution time across different batch sizes and strictly cap `max_batch_size` (e.g., to 32). The sum of `max_queue_delay` and the execution time of `max_batch_size` must be kept well below the target SLA to account for queue buildup during bursts.
  common_mistake: |
    **The Pitfall:** Assuming the GPU lacks compute capacity or lowering the queue delay will fix the latency.
    **The Rationale:** Engineers believe long queue delays directly cause high P99 latencies.
    **The Consequence:** They miss the massive execution time of the 128-batch itself, which causes severe head-of-line blocking for subsequent requests.
  napkin_math: |
    *   **Execution Time:** If batch=128 takes 180ms to compute, a burst of 200 requests creates a full batch.
    *   **Head-of-Line Blocking:** The remaining 72 requests must wait 180ms for the GPU to free up.
    *   **Total Latency:** 180ms wait + 110ms compute = 290ms (SLA violated).
    *   **Result:** **Capping max_batch_size to 32 reduces batch compute time to ~50ms, drastically reducing tail wait times and meeting the SLA.**
