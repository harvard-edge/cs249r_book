title: Diagnosing Dynamic Batching Latency Spikes
scenario: You deploy a ResNet-152 classification model on an NVIDIA A10G using Triton Inference Server
  with dynamic batching. To maximize throughput, the team sets `max_batch_size=128` and `max_queue_delay=50ms`.
  During micro-bursts of 400 QPS, the server sustains the throughput and GPU utilization remains around
  55%, but P99 latency degrades to 450ms, severely violating the 200ms SLA. Profiling shows memory is
  well within limits. Analyze the bottleneck.
question: "Why does P99 latency hit 450ms with max_batch_size=128 and max_queue_delay=50ms despite only 55% GPU utilization?"
details:
  realistic_solution: Profile the model's execution time across different batch sizes and strictly cap
    `max_batch_size` (e.g., to 32). The sum of `max_queue_delay` and the execution time of `max_batch_size`
    must be kept well below the target SLA to account for queue buildup during bursts.
  common_mistake: Assuming the GPU lacks compute capacity or that network I/O is the bottleneck. Candidates
    often suggest increasing GPU count or lowering the queue delay, failing to realize that massive batch
    execution times cause severe head-of-line blocking.
  napkin_math: 'If batch_size=128 takes 180ms to compute: A micro-burst of 200 requests creates a batch
    of 128. The remaining 72 requests must wait 180ms for the GPU to free up, plus their own compute time.
    Latency for the second batch = 180ms (wait) + 110ms (compute) = 290ms (SLA violated). By capping max_batch_size
    to 32 (compute time ~50ms), the first 32 finish in 50ms, the next in 100ms, and the 6th batch finishes
    around 300ms, drastically reducing the average and tail wait times.'
