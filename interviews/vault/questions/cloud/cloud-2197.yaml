title: The Statistically Invalid Benchmark
scenario: A colleague runs their new inference optimization 3 times, gets throughput numbers of 1,050,
  1,120, and 980 tokens/sec, and reports a '5% improvement' over the 1,000 tokens/sec baseline (using
  the median of 1,050). You suspect the result is noise. How do you determine whether this improvement
  is statistically significant, and what is the minimum number of runs needed?
details:
  realistic_solution: 'First, compute the sample statistics: mean = 1,050, std = 70. The claimed improvement
    is 50 tokens/sec (5%). The coefficient of variation is 70/1050 = 6.7%, which exceeds the claimed effect
    size of 5% — the noise is larger than the signal. A one-sample t-test against the null hypothesis
    (mean = 1,000) gives t = (1050 - 1000) / (70 / sqrt(3)) = 50 / 40.4 = 1.24, p = 0.34. This is not
    significant at any reasonable alpha. To achieve statistical power of 0.8 at alpha = 0.05 for a 5%
    effect, you need n = (z_alpha + z_beta)^2 * sigma^2 / delta^2 = (1.96 + 0.84)^2 * 70^2 / 50^2 = 7.84
    * 4900 / 2500 = ~15 runs minimum. Additionally, you should control for GPU thermal state (warm-up
    runs), DVFS frequency settling, and background system noise.'
  common_mistake: Accepting the median of 3 runs as proof of improvement. With only 3 samples and a standard
    deviation this large relative to the claimed effect, you cannot distinguish signal from noise.
  napkin_math: 'CoV = 70/1050 = 6.7% > 5% claimed improvement => noise dominates signal. t-statistic =
    50 / (70/sqrt(3)) = 1.24, p = 0.34 (not significant). Required n for power = 0.8: ~15 runs. With warm-up:
    2 discarded + 15 measured = 17 total runs.'
