title: DCQCN Tuning for Large-Scale All-Reduce
scenario: 'You are configuring DCQCN (Data Center Quantized Congestion Notification) for a 1024-GPU H100
  cluster running NCCL all-reduce over RoCEv2. The cluster uses 400 GbE with Quantum-2 InfiniBand switches
  acting as Ethernet. Default DCQCN parameters cause oscillation: throughput swings between 90% and 40%
  of link capacity every 50 ms. Fix the configuration.'
details:
  realistic_solution: 'Scale DCQCN parameters proportionally to link speed: Rai = 40 Mbps × (400/10) =
    1.6 Gbps. Reduce timer to 15 µs to match lower RTT of high-bandwidth fabric. Set target_rate = 95%
    of link capacity. Increase byte counter threshold (Byte_Reset) from 10 KB to 400 KB to match larger
    BDP (Bandwidth-Delay Product) at 400 GbE.'
  common_mistake: Using default DCQCN parameters (Rai=40 Mbps, Rcd=50%, timer=55 µs) designed for 10 GbE
    on a 400 GbE fabric. At 40× higher link speed, the rate increase step is proportionally tiny and the
    decrease is too aggressive, causing saw-tooth oscillation at larger amplitude.
  napkin_math: 'BDP at 400 GbE with 4 µs RTT = 400 Gbps × 4 µs / 8 = 200 KB. Default Byte_Reset = 10 KB
    is 20× too small, triggering rate reductions every 10 KB instead of every RTT. Fix: Byte_Reset = 400
    KB. Rate increase Rai: default 40 Mbps gives 400 Gbps / 40 Mbps = 10,000 steps to recover — too slow.
    At 1.6 Gbps: 400 Gbps / 1.6 Gbps = 250 steps — reasonable.'
