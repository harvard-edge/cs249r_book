title: The Interconnect Latency Ladder
scenario: You are profiling a distributed training job and see latency spikes from three different sources: GPU-to-GPU data transfers within a single server, GPU-to-CPU memory copies, and server-to-server communication across the cluster network.
question: Which of these communication links typically has the highest intrinsic latency, and why?
details:
  realistic_solution: A server-to-server InfiniBand NDR transfer has the highest latency, around 5,000 ns (5 µs). This is because the signal must travel meters of fiber optic cable and pass through multiple network switches and NICs. In contrast, on-server transfers like NVLink (~500 ns) and PCIe Gen5 (~1,000 ns) are an order of magnitude faster due to short physical distances.
  common_mistake: |
    **The Pitfall:** Conflating high bandwidth with low latency.
    **The Rationale:** Engineers assume that because InfiniBand has high bandwidth, it must also be faster than local links, ignoring the physics of going off-box.
    **The Consequence:** Poorly placing latency-sensitive components across server boundaries.
  napkin_math: |
    - **NVLink (intra-server):** ~500 ns latency (8 minutes in human scale).
    - **PCIe (intra-server):** ~1,000 ns latency (16 minutes in human scale).
    - **InfiniBand (cross-server):** ~5,000 ns latency (1.4 hours in human scale).
    - **Result:** The **InfiniBand NDR Transfer** has the highest latency due to physical distance and switch hops.
  options:
  - NVLink 4.0 Transfer (GPU-GPU, within server)
  - PCIe Gen5 Transfer (CPU-GPU, within server)
  - InfiniBand NDR Transfer (server-to-server)
  - HBM3 Memory Access
