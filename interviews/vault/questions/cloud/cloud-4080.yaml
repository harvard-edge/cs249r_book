title: GDRCopy for Small RDMA Messages
scenario: 'GDRCopy is a library that allows low-latency CPU access to GPU memory via
  a persistent BAR mapping. NCCL uses GDRCopy for small control messages (<8KB) instead
  of GPUDirect RDMA. For a 128-A100 cluster performing AllReduce, control messages
  include: buffer pointers, ready flags, and completion signals (~64 bytes each).
  Calculate the latency advantage of GDRCopy over GPUDirect RDMA for these small messages.'
question: For 64-byte NCCL control messages, how do GDRCopy and GPUDirect RDMA latencies
  compare, and why use GDRCopy anyway?
details:
  realistic_solution: 'GDRCopy path for 64-byte control message: CPU reads from GPU
    VRAM via mapped BAR1 region → ~1μs (PCIe read). CPU copies data to host buffer
    → ~10ns (L1 cache). CPU posts RDMA Send with inline data (data embedded in WQE,
    no separate DMA) → ~300ns. HCA sends 64-byte message → serialization + network
    = ~100ns. Total: ~1.4μs. GPUDirect RDMA path for 64-byte message: Post WQE specifying
    GPU VRAM source → 200ns. HCA fetches WQE → 100ns. HCA reads 64 bytes from GPU
    VRAM via PCIe → 300ns. HCA sends packet → ~100ns. Total: ~700ns. Wait — GPUDirect
    RDMA is actually faster? Yes, for 64-byte messages, GPUDirect RDMA with inline
    data is competitive. But: GPUDirect RDMA requires memory registration (MR setup)
    which is expensive (~2ms per region). GDRCopy uses a pre-established BAR mapping
    and avoids MR management. The real advantage: GDRCopy allows the CPU to read/write
    GPU memory synchronously without posting RDMA work requests, which is critical
    for NCCL''s control plane where the CPU orchestrates buffer management. Latency
    comparison: GDRCopy = 1.4μs with CPU flexibility. GPUDirect RDMA = 0.7μs but requires
    async WR posting and CQ polling.'
  common_mistake: Assuming GDRCopy is always faster than GPUDirect RDMA. GDRCopy's
    advantage is only for small messages where the overhead of posting RDMA work requests
    exceeds the data transfer time. For large transfers, GPUDirect RDMA's hardware
    DMA engine is faster.
  napkin_math: 'Control messages per AllReduce iteration: ~128 ready flags + 128 completion
    signals = 256 messages × 64 bytes = 16KB total. GDRCopy: 256 × 1.4μs = 358μs (sequential).
    GPUDirect RDMA: 256 × 0.7μs = 179μs but requires CQ polling overhead. In practice:
    GDRCopy control plane runs on CPU while GPU does computation — the 358μs is fully
    hidden.'
