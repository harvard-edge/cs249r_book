title: GDRCopy for Small RDMA Messages
scenario: GDRCopy is a library that allows low-latency CPU access to GPU memory via a persistent BAR mapping. NCCL uses GDRCopy for small control messages (<8KB) instead of GPUDirect RDMA. For a 128-node cluster performing AllReduce, control messages include buffer pointers, ready flags, and completion signals (~64 bytes each).
question: For 64-byte NCCL control messages, how do GDRCopy and GPUDirect RDMA latencies compare, and why use GDRCopy anyway?
details:
  realistic_solution: 'GDRCopy path for 64-byte control message: CPU reads from GPU VRAM via mapped BAR1 region → ~1µs (PCIe read). CPU copies data to host buffer → ~10ns (L1 cache). CPU posts RDMA Send with inline data (data embedded in WQE, no separate DMA) → ~300ns. HCA sends 64-byte message → serialization + network = ~100ns. Total: ~1.4µs. GPUDirect RDMA path for 64-byte message: Post WQE specifying GPU VRAM source → 200ns. HCA fetches WQE → 100ns. HCA reads 64 bytes from GPU VRAM via PCIe → 300ns. HCA sends packet → ~100ns. Total: ~700ns. Wait — GPUDirect RDMA is actually faster? Yes, for 64-byte messages, GPUDirect RDMA with inline data is competitive. But: GPUDirect RDMA requires memory registration (MR setup) which is expensive (~2ms per region). GDRCopy uses a pre-established BAR mapping and avoids MR management. The real advantage: GDRCopy allows the CPU to read/write GPU memory synchronously without posting RDMA work requests, which is critical for NCCL''s control plane where the CPU orchestrates buffer management. Latency comparison: GDRCopy = 1.4µs with CPU flexibility. GPUDirect RDMA = 0.7µs but requires async WR posting and CQ polling.'
  common_mistake: |
    **The Pitfall:** Assuming GDRCopy is always strictly faster than GPUDirect RDMA in sheer transfer latency.
    **The Rationale:** Candidates misattribute the choice to pure latency rather than the overhead of RDMA work requests and memory registration.
    **The Consequence:** Misunderstanding how the NCCL control plane leverages synchronous CPU reads for efficient orchestrating.
  napkin_math: |
    1. **Messages per iteration:** 128 ready flags + 128 completion signals = 256 messages.
    2. **Data Volume:** 256 × 64 bytes = 16 KB total.
    3. **GDRCopy Latency:** 256 × 1.4µs = **358µs** (sequential).
    4. **GPUDirect RDMA Latency:** 256 × 0.7µs = **179µs** (but requires CQ polling).
    5. **Net Result:** The 358µs runs asynchronously on the CPU while the GPU computes, perfectly hiding the latency.
