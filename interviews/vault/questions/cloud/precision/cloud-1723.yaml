title: LLM Decode Speedup via Weight Quantization
scenario: You are optimizing a 70B parameter LLM for inference. To increase the decode token generation rate at batch size 1, you evaluate FP16, INT8 (W8A16), and INT4 (W4A16) weight-only quantization.
question: "What theoretical decode tokens per second do FP16, INT8, and INT4 weight formats achieve on 16 TB/s of A100 memory bandwidth?"
details:
  realistic_solution: 'Calculate the tokens per second by dividing the aggregate memory bandwidth by the total weight size. Weight-only quantization proportionally reduces memory traffic, yielding linear speedups in the memory-bound autoregressive decode phase.'
  common_mistake: |
    **The Pitfall:** Attempting to calculate compute throughput (FLOPs) instead of memory bandwidth limitations.
    **The Rationale:** Candidates default to assuming all ML operations are compute-bound, ignoring that autoregressive decoding at batch size 1 is strictly memory bandwidth-bound.
    **The Consequence:** Recommending optimizations that target the GPU's tensor cores rather than addressing the actual HBM read bottleneck, resulting in zero performance gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8x A100 aggregate HBM bandwidth = 16 TB/s (16,000 GB/s).
    - 70B parameter model.

    **Calculations:**
    - FP16 weight size = 140 GB.
    - INT8 weight size = 70 GB.
    - INT4 weight size = 35 GB.
    - Max tokens/sec (memory bound) = Bandwidth / Weight_Size.
    - FP16 = 16,000 / 140 = 114 tokens/s.
    - INT8 = 16,000 / 70 = 228 tokens/s.
    - INT4 = 16,000 / 35 = 457 tokens/s.

    **Conclusion & Interpretation:**
    - **Result: 457 tokens/s (Memory-Bound)**. Quantization yields up to a 4x decode speedup.
