title: The Quantized Serving Accuracy Trade-off
scenario: We're serving a 70B parameter model in FP16 across two GPUs. The team proposes switching to INT8 to fit on a single GPU and cut costs in half. The PM assumes quantization offers free performance with no downsides.
question: Walk me through the real trade-offs — when does the accuracy drop actually matter?
details:
  realistic_solution: 'INT8 quantization halves the weight memory (140 GB → 70 GB), fitting on a single A100-80GB and eliminating tensor-parallelism communication overhead. But the throughput gain is ~1.5x because: (1) KV-cache is still in FP16, (2) activations require dequantization overhead, and (3) decode is bandwidth-bound — halving weight size only helps if weights dominate the memory traffic. The accuracy trade-off is non-uniform: perplexity increases ~0.1–0.3 points on average, but tail tasks (multi-step math, code generation, structured reasoning) degrade 3–8% on benchmarks like HumanEval and GSM8K.'
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization always doubles throughput with negligible accuracy loss.
    **The Rationale:** Halving the precision halves the weight size, leading to the naive assumption of a 2x speedup.
    **The Consequence:** Overpromising throughput gains while ignoring the devastating accuracy degradation on tail tasks (math/code), potentially ruining the product experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory Traffic FP16: Weights (140 GB) + KV (4 GB) = 144 GB.
       - Memory Traffic INT8: Weights (70 GB) + KV (4 GB) = 74 GB.
    2. **Calculations:**
       - Bandwidth Ratio: 144 / 74 = 1.95x.
       - Real Speedup: 1.95x - ~20% (Dequantization penalty) ≈ 1.5x throughput.
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Accuracy Bound.** The 1.5x speedup comes at the severe hidden cost of 3-8% accuracy degradation on complex tail tasks due to dynamic range truncation.
