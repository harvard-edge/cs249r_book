title: W8A8 vs W4A16 for LLM Decoding
scenario: 'Your team is deploying a 70B parameter autoregressive LLM on a multi-GPU node with 4 TB/s aggregate bandwidth. For the token generation phase at a serving batch size of 16, the system is severely memory-bandwidth bound. You must evaluate two quantization strategies to maximize decoding throughput: W8A8 (8-bit weights and activations) and W4A16 (4-bit weights, 16-bit activations).'
question: For batch-16 decoding of the 70B model, would you choose W8A8 or W4A16 quantization, and why?
details:
  realistic_solution: Select W4A16. Autoregressive decoding at small batch sizes has very low arithmetic intensity and is strictly memory-bandwidth bound. W4A16 halves weight HBM traffic compared to W8A8, effectively doubling throughput. Keeping activations in FP16 avoids the compute overhead of dynamic activation quantization.
  common_mistake: |
    **The Pitfall:** Assuming W8A8 is superior because it accelerates compute using Tensor Cores for INT8 matrix multiplication.
    **The Rationale:** Candidates often map "quantization" directly to "compute speedup", failing to recognize that autoregressive decoding at small batch sizes is strictly memory-bandwidth bound.
    **The Consequence:** The deployed model suffers a 2x throughput penalty because W8 weights take twice as long to stream from HBM as W4 weights, while INT8 compute acceleration provides zero benefit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters.
    - Serving batch size: 16.
    - The scenario states decoding is severely memory-bandwidth bound, so weight HBM traffic dominates the comparison.

    **Calculations:**
    - W8 weight storage is about 70B * 1 byte = 70 GB.
    - W4 weight storage is about 70B * 0.5 byte = 35 GB.
    - W4A16 therefore halves dominant weight traffic versus W8A8.
    - In a bandwidth-bound regime, throughput scales approximately with 1 / bytes moved, so halving dominant weight bytes can roughly double decoding throughput.
    - Activation precision is secondary here unless profiling shows activation traffic or quantization/dequantization overhead dominates the decode step.

    **Conclusion & Interpretation:**
    - **Result: choose W4A16 (Memory-Bandwidth-Bound)**. The defensible claim is a roughly 2x bandwidth advantage from halving weight traffic, not a precise per-token latency computed from total model size.
