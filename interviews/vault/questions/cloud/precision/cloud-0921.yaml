title: Calculate Memory and Compute Savings for a BNN
scenario: Your cloud microservice must process 10,000 concurrent audio streams for a trigger detection model. The baseline FP32 CNN requires 4MB of weights and 20 MFLOPs per inference. To fit the entire workload within the L3 cache of a single CPU and maximize throughput, you quantize the model to a Binary Neural Network (1-bit weights and activations). The first and last layers are kept at 8-bit and represent 5% of the original FP32 parameters.
question: What is the BNN weight footprint with 5% of FP32 parameters kept at INT8, and how many 64-bit XNOR-popcount instructions are needed?
details:
  realistic_solution: 'Calculate the partitioned footprint: 5% of the parameters are quantized to INT8 (1/4th the FP32 size) and 95% are binarized to 1-bit (1/32nd the FP32 size). The new memory footprint is 172.8KB. For compute, the 19 million binarized operations are packed into 64-bit XNOR instructions, reducing them to ~297K instructions.'
  common_mistake: |
    **The Pitfall:** Applying a flat 1/32 reduction to the entire model memory and compute.
    **The Rationale:** Failing to account for the unquantized layers and overlooking the 64-bit register packing requirement for XNOR-popcount instructions.
    **The Consequence:** Underestimating memory size and cache misses, and miscalculating CPU instruction throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline FP32 parameters = 4MB.
    - 5% in 8-bit (INT8), 95% in 1-bit (BNN).
    - CPU processes 64 bits per XNOR.
    - Compute is 95% of 20 MFLOPs.

    **Calculations:**
    - 5% in INT8 (1/4 size) = 0.05 * 4MB / 4 = 51.2KB.
    - 95% in 1-bit (1/32 size) = 0.95 * 4MB / 32 = 121.6KB.
    - Total footprint = 51.2KB + 121.6KB = 172.8KB.
    - Operations = 95% of 20 MFLOPs = 19M ops.
    - Instructions = 19M ops / 64 ops/XNOR = 296,875.

    **Conclusion & Interpretation:**
    - **Result: 172.8KB footprint, ~297K XNOR instructions (Memory-Bound)**. Small footprint fits tightly in L3 cache to maximize throughput.
