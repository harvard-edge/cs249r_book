title: Activation Outliers in Large Models
scenario: You deploy a 7B parameter LLM for a cloud-based summarization API. To meet the <40ms Time-Between-Tokens (TBT) SLA on L4 GPUs, you apply INT8 weight and activation quantization (W8A8). However, perplexity degrades severely and the model generates gibberish. Testing shows W8A16 maintains perfect accuracy but misses the latency SLA, clocking in at 55ms TBT.
question: What is the root cause of the W8A8 degradation, and how do you resolve it?
details:
  realistic_solution: |
    The most likely root cause is systematic activation outliers interacting badly with the W8A8 calibration scheme. In LLMs larger than ~6B parameters, massive outliers emerge in specific activation channels, often far larger than the median. Standard activation quantization can use those outliers to set the scale, which collapses the useful non-outlier signal into too few INT8 levels and destroys model quality. The fix is an outlier-mitigation method such as SmoothQuant: scale down the difficult activation channels and scale up the corresponding weight channels before quantization, moving dynamic-range pressure from activations into weights. That preserves accuracy while enabling W8A8 kernels to address the latency target.
  common_mistake: |
    **The Pitfall:** Assuming the weights were quantized incorrectly and switching to expensive Quantization-Aware Training (QAT).
    **The Rationale:** Candidates unfamiliar with the phenomenon of massive activation outliers in large LLMs default to standard model training fixes.
    **The Consequence:** Wasting weeks on QAT when the fundamental issue is a dynamic range collapse caused by activation outliers, which requires techniques like SmoothQuant to resolve.
  napkin_math: |
    **Assumptions & Constraints:**
    - W8A16 preserves accuracy, so the weights can tolerate INT8 quantization.
    - W8A8 fails quality, so the added risk is INT8 activation quantization.
    - The SLA requires a faster kernel path than the current 55ms W8A16 path.

    **Calculations:**
    - A representative activation channel with values near 100 and a rare outlier near 10,000 forces a per-tensor INT8 scale of roughly 10,000 / 127 = 78.7.
    - Typical values around 100 then occupy only about 100 / 78.7 = 1.3 quantization steps, collapsing useful signal.
    - SmoothQuant-style scaling reduces the activation outlier range before quantization and compensates in the corresponding weight channels.

    **Conclusion & Interpretation:**
    - **Result: Activation-outlier quantization failure.** The fix is SmoothQuant or a similar outlier-aware calibration/quantization method, not a bandwidth-only latency calculation.
