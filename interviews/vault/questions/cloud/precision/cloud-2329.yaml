title: 'FP8 KV Cache Asymmetry: K vs V Degradation'
scenario: You optimize a 100B model by storing the KV cache in FP8 E4M3. Throughput increases dramatically. However, you notice that while storing the Value (V) cache in E4M3 causes no measurable degradation, storing the Key (K) cache in E4M3 causes a 5% drop in MMLU accuracy.
question: Why does FP8 E4M3 work for the V cache but cause a 5% MMLU drop for the K cache?
details:
  realistic_solution: |
    The asymmetry lies in how K and V are mathematically consumed in the attention mechanism. The K cache is used in a dot product with the Query (Q * K^T), and the result is immediately passed through a Softmax function. Softmax exponentiates the values, meaning even tiny quantization errors in the K cache are exponentially amplified, severely disrupting the attention probability distribution. Conversely, the V cache is merely linearly combined using those attention probabilities (Prob * V). Linear operations average out the zero-mean quantization noise, making the V cache highly robust to lower precision. The K cache often requires E5M2 for better dynamic range or smaller block quantization.
  common_mistake: |
    **The Pitfall:** Assuming the Key cache occupies more memory than the Value cache.
    **The Rationale:** Candidates might think compressing the K cache results in higher total data loss based on volume rather than the mathematical operations performed.
    **The Consequence:** Misdiagnosing the root cause and failing to apply the correct quantization scheme (e.g., E5M2) for the K cache.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - True dot product = 5.0.
       - Quantization error in K causes dot product to be 5.5.
    2. **Calculations:**
       - exp(5.0) = 148.4
       - exp(5.5) = 244.7
       - Error ratio: (244.7 - 148.4) / 148.4 ≈ 64%.
    3. **Conclusion & Interpretation:**
       - **Result: 64% error in Softmax. A 10% error in the K dot product causes a massive exponential error in the attention weight after Softmax.**
