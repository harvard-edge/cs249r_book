title: The Silent NaN Catastrophe
scenario: You are the Staff ML Systems Engineer for a major cloud provider's inference platform. Your
  team just launched a 'one-click' INT8 quantization feature that promises up to 2x cost savings. It uses
  standard post-training static quantization (PTQ). A high-value customer, running a 70B parameter LLM
  for financial document analysis, enables it. For weeks, everything seems fine. Then, they report that
  for certain quarterly reports—specifically those containing dense tables of 7- and 8-digit numbers—the
  model's output becomes a stream of NaNs and gibberish. The failure is silent but catastrophic. The junior
  team's ad-hoc fix of 'just add more calibration data' isn't working, and disabling quantization for
  the whole model defeats the purpose. Propose a comprehensive, three-tiered system you would design to
  make quantization a safe, reliable, and automated feature for all models on the platform, from development
  through production. Explain your architectural choices and the trade-offs at each tier.
question: "What three-tiered platform design would make one-click INT8 quantization safe for the 70B financial LLM and future models?"
details:
  realistic_solution: 'The core issue is that standard PTQ is blind to rare but high-magnitude activation
    values, causing overflow when the narrow INT8 range is exceeded. A robust platform solution requires
    a multi-layered defense:'
  common_mistake: Focusing only on a tactical fix for the single failing model, such as 'Let's use Quantization-Aware
    Training (QAT)' or 'We'll just manually find the overflowing layers and leave them in FP16.' These
    are valid techniques, but they don't solve the platform-level problem. A Staff engineer must architect
    a system that prevents this class of failure for *any* future model, without requiring heroic manual
    intervention for each one.
  napkin_math: 'A 70B LLM in FP16 takes 140GB for weights, needing two 80GB GPUs. INT8 halves this to 70GB, fitting on one GPU and halving costs. However, standard INT8 PTQ maps the maximum FP16 activation value to 127. If calibration data has a max activation of 10.0, then 10.0 maps to 127. If a rare financial document produces an activation of 50.0, it exceeds the representable range, overflowing the INT8 bounds and propagating NaNs through subsequent layers. A mixed-precision safety net (keeping the few sensitive channels in FP16) prevents this catastrophic failure while preserving >99% of the memory savings.'
