title: Evaluating BNNs for Cloud-Scale Filtering
scenario: You are architecting a massive-scale cloud traffic inspection service that processes 1 million payloads per second. The current INT8 ResNet-based filter runs on a fleet of GPUs, but the power and compute costs are prohibitive. You are evaluating replacing the INT8 model with a 10M-parameter Binary Neural Network (BNN) deployed on cloud FPGAs with enough on-chip SRAM/BRAM to pin the 1.25MB weight set, while streaming small per-query feature vectors from host memory, to act as an ultra-low-latency first-stage gatekeeper.
question: Should the 1M QPS traffic filter move from INT8 GPUs to a BNN on cloud FPGAs, and what are the compute and memory trade-offs?
details:
  realistic_solution: A BNN on FPGAs is plausible only if the design is a deeply pipelined first-stage filter with weights pinned on-chip and enough parallel FPGA instances to meet the 1M QPS target. XNOR and bitcount operations map well to FPGA LUTs, and 1-bit quantization reduces 10M INT8 weights from 10MB to 1.25MB, which can fit on suitably large cloud FPGA devices. The main trade-off is that weights are reused across many requests rather than streamed per query; throughput is limited by pipeline initiation rate, activation/feature bandwidth, routing, and available LUT/BRAM resources. The energy win comes from replacing repeated DRAM weight traffic with on-chip SRAM/BRAM access, but it should be qualified as an architecture-dependent first-stage gatekeeper, not a guaranteed 1M QPS drop-in replacement.
  common_mistake: |
    **The Pitfall:** Assuming standard cloud GPUs will automatically yield an 8x speedup over INT8 just because the weights are 1-bit.
    **The Rationale:** Standard GPU ALUs and Tensor Cores lack native binary (XNOR/popcount) instruction support, requiring costly software emulation.
    **The Consequence:** Designing a binary model for hardware that cannot actually execute it efficiently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 1,000,000 QPS.
    - INT8 model size: 10M params = 10MB.
    - BNN model size: 10M bits = 1.25MB, pinned on-chip on an FPGA class with sufficient SRAM/BRAM.
    - Example per-query feature/activation input budget: 4KB.
    - DRAM energy: ~2000 pJ/byte. BRAM energy: ~5 pJ/byte.

    **Calculations:**
    - Weight footprint reduction: 10MB / 1.25MB = 8x smaller.
    - Feature ingress bandwidth: 1M QPS * 4KB ≈ 4GB/s before batching/framing overhead.
    - If INT8 inference repeatedly fetches weights from external DRAM, the weight-read energy per full pass is 10MB * 2000pJ/byte ≈ 20mJ.
    - If BNN weights are read from on-chip SRAM/BRAM, the weight-read energy per full pass is 1.25MB * 5pJ/byte ≈ 6.25µJ, about 3200x lower for weight reads.
    - In a pipelined FPGA design, those weights are reused across many in-flight requests, so QPS is governed by pipeline parallelism and activation movement, not by streaming the whole model for every request from DRAM.

    **Conclusion & Interpretation:**
    - **Result: Architecture-dependent FPGA acceleration (Memory-and-Compute-Bound)**. On-chip BNN weights can greatly reduce weight-memory energy, but 1M QPS requires a resource-feasible pipelined design with activation bandwidth and batching accounted for.
