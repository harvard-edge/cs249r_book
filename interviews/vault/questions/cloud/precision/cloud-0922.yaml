title: Evaluating BNNs for Cloud-Scale Filtering
scenario: 'You are architecting a massive-scale cloud traffic inspection service that processes 1 million payloads per second. The current INT8 ResNet-based filter runs on a fleet of GPUs, but the power and compute costs are prohibitive. You are evaluating replacing the INT8 model with a Binary Neural Network (BNN) deployed on cloud FPGAs to act as an ultra-low-latency first-stage gatekeeper.'
question: Should the 1M QPS traffic filter move from INT8 GPUs to a BNN on cloud FPGAs, and what are the compute and memory trade-offs?
details:
  realistic_solution: 'Deploy the BNN on an FPGA where XNOR and bitcount operations can be spatially mapped to LUTs. The 1-bit quantization reduces a 10MB INT8 model to 1.25MB, allowing the entire model weights to reside entirely in on-chip BRAM, eliminating DRAM access entirely. This achieves ~3200x energy savings on memory access alone (2000pJ/byte DRAM vs 5pJ/byte BRAM) while sustaining the 1M QPS throughput requirement.'
  common_mistake: |
    **The Pitfall:** Assuming standard cloud GPUs will automatically yield an 8x speedup over INT8 just because the weights are 1-bit.
    **The Rationale:** Standard GPU ALUs and Tensor Cores lack native binary (XNOR/popcount) instruction support, requiring costly software emulation.
    **The Consequence:** Designing a binary model for hardware that cannot actually execute it efficiently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 1,000,000 QPS.
    - INT8 model size: 10M params = 10MB.
    - BNN model size: 10M bits = 1.25MB (fits entirely in FPGA BRAM).
    - DRAM energy: ~2000 pJ/byte. BRAM energy: ~5 pJ/byte.

    **Calculations:**
    - INT8 memory bandwidth demand: 1M QPS * 10MB = 10 TB/s.
    - BNN memory bandwidth demand: 1M QPS * 1.25MB = 1.25 TB/s.
    - INT8 DRAM memory power: 10 TB/s * 2000 pJ/byte = 20,000 W (20 kW).
    - BNN BRAM memory power: 1.25 TB/s * 5 pJ/byte = 6.25 W.

    **Conclusion & Interpretation:**
    - **Result: 6.25 W (Memory-Bound)**. Storing the 1-bit weights entirely in on-chip SRAM/BRAM drastically cuts memory bandwidth power by a factor of 3200x compared to external DRAM access.
