title: W4A16 Quantization Throughput Gains in Memory Bound Regimes
scenario: 'Serving a 120B parameter LLM on a single MI300X. At FP16, the weights take 240 GB, exceeding the 192 GB memory. You apply W4A16 (INT4 weights, FP16 activations) group-wise quantization.'
question: 'Analyze why generation throughput (tokens/sec) at batch size 1 drastically increases with W4A16 despite the added compute overhead of dequantizing weights to FP16.'
details:
  realistic_solution: 'At batch size 1, autoregressive generation is heavily memory bandwidth bound, not compute bound. Reading INT4 weights requires only 0.5 bytes per parameter, effectively quadrupling the memory bandwidth efficiency. The compute overhead of dequantizing from INT4 to FP16 in registers is completely hidden by the massive reduction in memory fetch latency.'
  common_mistake: |
    **The Pitfall:** Assuming the extra dequantization math slows down the forward pass.
    **The Rationale:** Candidates might think compute overhead always penalizes throughput, fundamentally misunderstanding the memory wall in batch=1 inference.
    **The Consequence:** Falsely concluding that weight-only quantization will hurt performance when it actually provides a massive speedup by reducing memory latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 120B parameter LLM.
    - FP16 precision uses 2 bytes/parameter.
    - INT4 precision uses 0.5 bytes/parameter.

    **Calculations:**
    - FP16 weight memory traffic: 120B parameters * 2 bytes/param = 240 GB.
    - INT4 weight memory traffic: 120B parameters * 0.5 bytes/param = 60 GB.
    - Reduction in memory traffic: 240 GB -> 60 GB (4x reduction).

    **Conclusion & Interpretation:**
    - **Result: Memory Bandwidth Bound** (By reducing memory traffic from 240 GB to 60 GB, the W4A16 quantization heavily accelerates batch=1 generation, which is memory-bandwidth bound).
