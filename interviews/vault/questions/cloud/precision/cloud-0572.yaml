title: The Silent Overflow Catastrophe
scenario: You are a Systems Engineer at a firm migrating its serving fleet. The finance department has approved a massive upgrade based on a model that assumes a 2x throughput gain by moving all critical models from FP16 to INT8. Your team is tasked with executing this migration.
question: How would you validate and de-risk the INT8 migration before committing to the finance team's 2x throughput model?
details:
  realistic_solution: The correct L6+ answer involves a multi-layered defense, moving beyond a single technique to a robust, production-aware system.
  common_mistake: |
    **The Pitfall:** Believing better calibration data or QAT guarantees production robustness.
    **The Rationale:** Teams assume standard quantization workflows will solve edge-case overflows.
    **The Consequence:** These techniques fail to capture rare events, leaving the production system vulnerable to silent accuracy degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM generative serving throughput is gated by memory bandwidth.
    - Hardware generation upgrade only increases bandwidth by 1.5x.

    **Calculations:**
    - Throughput scales directly with bandwidth in autoregressive generation.
    - Maximum theoretical gain = 1.5x.

    **Conclusion & Interpretation:**
    - **Result: 1.5x maximum gain (Bandwidth-Bound)**. Physics restricts gains to 1.5x regardless of INT8 compute.
