title: FP8 Format Selection for H100 Mixed Precision Training
scenario: A team is training a 7B transformer and wants to use FP8 mixed precision. The model has weight gradients with dynamic range spanning 1e-7 to 1e3.
question: Which FP8 formats should you use for forward and backward passes of the 7B transformer given gradients spanning 1e-7 to 1e3?
details:
  realistic_solution: Use E4M3 for most forward-pass tensors, especially weights and activations, because it has more mantissa precision and the forward values can usually be kept in range with per-tensor or per-channel scaling. Use E5M2 for backward gradients because the 1e-7 to 1e3 gradient range needs the wider exponent range. Keep master weights and optimizer states in higher precision, and use FP8 scaling metadata plus delayed or dynamic scaling to avoid overflow and underflow.
  common_mistake: |
    **The Pitfall:** Using E4M3 for gradient accumulation.
    **The Rationale:** E4M3 has only 3 mantissa bits and limited exponent range (±448).
    **The Consequence:** Causes gradient underflow and saturation during backward pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - E4M3 has more precision but a smaller exponent range.
    - E5M2 has less precision but a larger exponent range.
    - Gradient dynamic range spans 1e-7 to 1e3.

    **Calculations:**
    - Forward weights and activations usually benefit from E4M3 precision and can be scaled to stay within range.
    - Gradients need to represent values near 1e3 without saturation and very small values without excessive underflow.
    - E4M3's smaller exponent range makes it risky for this gradient distribution.
    - E5M2's wider exponent range is the better backward-gradient format, even though it has fewer mantissa bits.

    **Conclusion & Interpretation:**
    - **Result: E4M3 forward, E5M2 backward gradients (Precision-Bound)**. The choice is about range and precision stability, not a standalone memory-size calculation.
