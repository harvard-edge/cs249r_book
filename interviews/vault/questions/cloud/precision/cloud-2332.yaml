title: The FP8 Speedup Illusion in LLM Decoding
scenario: Your team migrates a 70B parameter LLM from BF16 to FP8 on an 80GB H100 SXM instance. The H100 boasts 1.98 PFLOPS of FP8 compute (2x the 989 TFLOPS FP16). However, during autoregressive decoding at batch size 1, the generation speed only increases from 22 tokens/sec to 24 tokens/sec (a 1.09x speedup), despite the model fitting entirely in HBM.
question: Why does FP8 only improve batch-1 decoding from 22 to 24 tokens/sec on the H100, and what would increase throughput?
details:
  realistic_solution: The symptom (lack of speedup despite 2x compute capacity) points to a fundamental memory bandwidth bottleneck in the autoregressive decoding phase. Decoding at batch size 1 has very low arithmetic intensity, so the H100's 1.98 PFLOPS FP8 compute engine is mostly starved by HBM traffic. Moving from BF16 to FP8 halves weight bytes and helps the model fit on one 80GB GPU, but each generated token still streams a large amount of active weight data and reads/writes the KV cache. Kernel overheads, dequantization/scaling, attention KV traffic, and non-GEMM work limit the realized gain, so the hardware remains memory-bound rather than compute-bound. The solution requires increasing arithmetic intensity by batching requests (continuous batching), using speculative decoding to generate multiple accepted tokens per weight stream, or utilizing FP8 for the KV cache to further reduce memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming decoding throughput scales with theoretical compute capacity (FLOPS).
    **The Rationale:** Engineers focus on the doubled FP8 compute specification without realizing that batch-size 1 decoding is strictly memory-bandwidth bound.
    **The Consequence:** Teams invest heavily in precision scaling but see minimal latency improvements because the memory fetch overhead remains the dominant bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 SXM HBM bandwidth: 3.35 TB/s.
    - Approximate active FP8 weight stream per generated token: 70 GB.
    - Observed throughput after FP8 migration: 24 tokens/sec, or 41.7ms/token.
    - Compute: 1.98 PFLOPS.

    **Calculations:**
    - Ideal lower bound for streaming active FP8 weights: 70 GB / 3350 GB/s = 20.9ms per token.
    - Compute Time: 140B FLOPs / 1.98 PFLOPS = 0.07ms.
    - Observed FP8 token time = 1 / 24 tokens/sec = 41.7ms.
    - Non-ideal memory and overhead budget = 41.7ms - 20.9ms - 0.07ms = ~20.7ms for KV-cache traffic, attention work, kernel overhead, scaling/dequantization, and imperfect bandwidth utilization.
    - BF16 observed token time = 1 / 22 tokens/sec = 45.5ms, so the measured FP8 improvement is only 45.5ms - 41.7ms = 3.8ms/token.

    **Conclusion & Interpretation:**
    - **Result: 24 tokens/sec (Memory-Bandwidth-Bound)**. FP8 compute is not the limiter; the observed 41.7ms/token is dominated by active weight/KV memory traffic and overheads. Continuous batching, speculative decoding, or KV-cache quantization would raise arithmetic intensity more than simply doubling peak FLOPS.
