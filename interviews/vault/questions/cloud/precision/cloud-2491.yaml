title: Smartwatch Federated Learning with INT8 Adapters
scenario: A cloud pipeline aggregates updates from 2 million smartwatches running CMSIS-NN. Inference uses strict INT8 precision to fit the 256KB SRAM. However, federated learning typically computes gradients in FP32, which would blow up the memory to 1MB+ and exceed the BLE bandwidth limits when sending updates to the cloud.
question: How would you enable federated learning on 2 million INT8 smartwatches without exceeding 256KB SRAM or BLE bandwidth?
details:
  realistic_solution: Keep the INT8 base model frozen on the smartwatch and train only a tiny adapter or last-layer head on-device using fixed-point accumulators. The device stores no full-model optimizer state; it computes clipped low-bit adapter deltas, sparsifies or entropy-codes them, and uploads them only during scheduled FL rounds. The cloud keeps the higher-precision master adapter and optimizer state, aggregates quantized deltas from the fleet, and periodically sends back a compact updated adapter or folded INT8 model.
  common_mistake: |
    **The Pitfall:** De-quantizing to FP32 on the device for training and re-quantizing post-training.
    **The Rationale:** Candidates apply standard cloud-based fine-tuning workflows to edge devices.
    **The Consequence:** The model immediately causes OOM crashes on the heavily constrained 256KB MCU.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM limit = 256 KB.
    - Frozen INT8 base model and runtime buffers = 220 KB.
    - Trainable adapter = 8,192 parameters.
    - On-device values use INT8 weights plus INT16 gradient accumulators; server stores optimizer state.
    - Upload only the largest 25% of clipped adapter deltas using 8-bit values plus 16-bit indices.

    **Calculations:**
    - Adapter weights on device: 8,192 * 1 byte = 8 KB.
    - Gradient accumulators: 8,192 * 2 bytes = 16 KB.
    - Total SRAM estimate: 220 KB + 8 KB + 16 KB = 244 KB, leaving about 12 KB headroom.
    - Sparse upload entries: 8,192 * 25% = 2,048 deltas.
    - Payload before packet overhead: 2,048 * (1 byte value + 2 byte index) = 6,144 bytes, or about 6 KB per FL round.

    **Conclusion & Interpretation:**
    - **Result: Adapter-only fixed-point FL fits the 256 KB SRAM budget and keeps each BLE update to a few KB before protocol overhead.** Full-model FP32 gradients would not fit; the cloud must own optimizer state and aggregate compressed low-bit deltas.
