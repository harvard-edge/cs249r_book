title: Mixed-Precision Federated Aggregation
scenario: A cloud system aggregates weights for Federated Learning on Cortex-M0+ devices (no FPU). The edge model must be INT8 for inference speed and memory. However, computing gradients and updating weights strictly in INT8 leads to catastrophic quantization error and training divergence.
question: How would you orchestrate FL for INT8 Cortex-M0+ devices without FP32 support while avoiding INT8 training divergence?
details:
  realistic_solution: The architecture must utilize mixed-precision co-design. The edge device uses INT8 for the forward pass (inference), but uses 16-bit fixed-point (INT16) or block floating-point arithmetic exclusively for the trainable layer's gradients and weight updates. The edge transmits these INT16 weight deltas to the cloud. The cloud, having abundant compute, receives the INT16 updates, casts them to FP32, performs the global aggregation (FedAvg), updates the global FP32 model, applies Post-Training Quantization (PTQ) to convert it back to INT8, and pushes the INT8 model back to the edge.
  common_mistake: |
    **The Pitfall:** Forcing the edge device to emulate FP32 in software for the backward pass.
    **The Rationale:** Candidates assume standard FP32 gradients are strictly required for convergence and offload the calculation to the edge.
    **The Consequence:** Inference latency spikes by 50x and the device battery is quickly drained.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M0+ clock speed: 50 MHz.
       - FP32 emulation: ~100 cycles per instruction.
       - INT16 ALU operation: 1 cycle per instruction.
       - Backward pass ops: 50,000 MACs.
    2. **Calculations:**
       - FP32 Cycles: 50,000 * 100 = 5,000,000 cycles.
       - FP32 Time: 5,000,000 cycles / 50,000,000 Hz = 0.1s = 100 ms.
       - INT16 Cycles: 50,000 * 1 = 50,000 cycles.
       - INT16 Time: 50,000 cycles / 50,000,000 Hz = 0.001s = 1 ms.
       - Speedup: 100 ms / 1 ms = 100x.
    3. **Conclusion & Interpretation:** **100x speedup (Compute/ALU-Bound).**
