title: 4-Bit PTQ Memory Footprint for LLMs
scenario: "You are tasked with deploying a 30 billion parameter LLM for an internal summarization API on cloud instances. The model is currently in FP16 and requires ~60GB of memory just for weights. You decide to apply 4-bit Post-Training Quantization (PTQ) via AWQ with a group size of 128. Assume the KV cache requires 2.5GB and the CUDA context takes 1.5GB."
question: "What is the 4-bit AWQ weight footprint including metadata, and will the 30B model fit on a 24GB VRAM GPU?"
details:
  realistic_solution: "Quantizing a 30B parameter model to 4-bit reduces the core weight memory to roughly 15GB. The group-wise quantization metadata (typically FP16 scales and 4-bit zero points per group of 128) adds ~600MB. This brings total weight memory to ~15.6GB. Adding the KV cache (2.5GB) and CUDA context (1.5GB) yields a total VRAM usage of 19.6GB, comfortably fitting on a single 24GB GPU."
  common_mistake: |
    **The Pitfall:** Simply dividing the FP16 memory by 4 without accounting for quantization metadata.
    **The Rationale:** Group-wise quantization requires storing scales and zero-points for every group, which adds non-trivial memory overhead.
    **The Consequence:** Inaccurate capacity planning; forgetting the metadata, KV cache, or CUDA context leads to unexpected Out-Of-Memory (OOM) errors in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B parameters, 4-bit AWQ quantization.
       - Group size 128 (FP16 scale, 4-bit zero point).
       - 2.5GB KV cache, 1.5GB CUDA context.
    2. **Calculations:**
       - 4-bit Base Weights: 30B params * 0.5 bytes = 15 GB.
       - Metadata per group: 16 bits (scale) + 4 bits (zero) = 20 bits = 2.5 bytes.
       - Total Metadata: (30B / 128) * 2.5 bytes ≈ 0.586 GB.
       - Total Weights: 15 GB + 0.586 GB = 15.586 GB.
       - Total VRAM: 15.586 + 2.5 + 1.5 = 19.586 GB.
    3. **Conclusion & Interpretation:**
       **19.586 GB < 24 GB. Result: Memory-Capacity-Bound but fits.**
