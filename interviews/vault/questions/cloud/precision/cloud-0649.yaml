title: The Model Compression Pipeline
scenario: You have a 70B FP16 model that costs $1.20 per 1M tokens to serve on 4x GPUs. Your target is $0.40 per 1M tokens on a single GPU. Design a compression pipeline that achieves this 3x cost reduction while keeping quality degradation under 2% on your evaluation suite.
question: How would you compress the 70B FP16 model to hit $0.40 per 1M tokens on one GPU while keeping quality loss under 2%?
details:
  realistic_solution: 'A production compression pipeline is multi-stage: (1) Calibration-aware quantization (GPTQ/AWQ) to INT4 with group size 128 — reduces weights from 140 GB to 35 GB. Quality loss: ~1.5%. (2) KV-cache quantization to FP8 — halves KV-cache memory. Quality impact: <0.5%. (3) Speculative decoding with a 1B draft model — increases effective throughput 2-3x for free. (4) Continuous batching — maximizes GPU utilization.'
  common_mistake: |
    **The Pitfall:** Naively quantizing the entire model to INT4 without considering KV-cache or serving strategies.
    **The Rationale:** Assuming weight size reduction is the only factor in lowering serving costs.
    **The Consequence:** Experiencing 5-10% quality loss and failing to meet latency SLAs due to unoptimized batching and KV-cache bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 140 GB FP16 weights, 4x GPUs (TP=4), $1.20/1M tokens.
    - Target: 1 GPU, $0.40/1M tokens, <2% quality loss.
    - Single GPU capacity: 80 GB.

    **Calculations:**
    - INT4 weights: 35 GB (leaves 45 GB for KV-cache). Quality loss: -1.5%.
    - FP8 KV-cache: ~0.5 GB/request (4k context), enables batch size ~80. Quality loss: -0.3%.
    - Speculative decoding (1B draft): 2.5x throughput multiplier.
    - Continuous batching + 1 GPU vs 4 GPUs = 4x hardware cost reduction.
    - Token processing rate = ~7.5M tokens/hour on 1 GPU.
    - Cost: $2.80/hour -> $2.80 / 7.5M = $0.37 per 1M tokens.
    - Total quality degradation = 1.5% + 0.3% = 1.8%.

    **Conclusion & Interpretation:**
    - **Result: $0.37 per 1M tokens at 1.8% quality loss (Memory-Capacity-Bound optimized to Compute-Bound)**. Multi-stage compression hits target latency and cost SLAs.
