title: 'MI300X INT4 Quantization: VRAM and Throughput vs H100'
scenario: A 70B LLM is quantized to INT4 using GPTQ (group size 128). The INT4 weight size is 35GB. On an H100 SXM5, INT4 inference achieves 2,467 TOPS INT4 throughput. On an MI300X, ROCm reports 2,614 TOPS INT4.
question: For the 70B INT4 GPTQ model, what token throughput should H100 and MI300X achieve, and does MI300X keep its bandwidth advantage?
details:
  realistic_solution: "INT4 model on H100: 35GB weight fits in 80GB (45GB slack for KV cache and activations). On MI300X: 35GB in 192GB (157GB slack). The key question: is INT4 decode memory-bound or compute-bound? For dequantize-then-FP16 GEMM (most common path): weights load as INT4 (0.5 bytes/param), dequantize to FP16 before multiply. Effective memory bandwidth requirement: 35GB × throughput. Arithmetic intensity: for batch=1, AI ≈ 2 FLOP/byte (similar to FP16 decode). Memory-bound. H100 bandwidth: 3,350 GB/s. INT4 weights: 35GB load per forward pass. At batch=1: H100 decode = 3,350 GB/s / 35GB = 95.7 passes/sec = 95.7 tok/sec. MI300X: 5,300 / 35 = 151.4 tok/sec. MI300X advantage: 1.58× — identical ratio to FP16 case, confirming bandwidth is still the bottleneck."
  common_mistake: |
    **The Pitfall:** Assuming INT4 inference is compute-bound.
    **The Rationale:** Candidates see the massive INT4 TOPS numbers and assume the bottleneck shifts from memory to compute.
    **The Consequence:** Failing to realize that typical dequantize-then-compute patterns still bottleneck on memory bandwidth at low batch sizes.
  napkin_math: |
    *   **INT4 weight load per token:** 70B params × 0.5 bytes = 35GB.
    *   **H100 throughput:** 3,350 GB/s / 35GB = 95.7 tok/sec.
    *   **MI300X throughput:** 5,300 GB/s / 35GB = 151.4 tok/sec.
    *   **Bandwidth ratio:** 151.4 / 95.7 = **1.58×** (matches FP16 ratio exactly).
    *   **Compute ceiling check:** 70B model requires 2 FLOPs per parameter = 140 GFLOPs/token. H100 INT4: 2,467 TOPS / 140G = 17,621 tok/sec compute ceiling (184× above actual).
    *   **Result:** Confirmed memory-bound. **MI300X maintains its 1.58× bandwidth advantage.**
