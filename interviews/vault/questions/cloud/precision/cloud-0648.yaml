title: The Quantization Noise Floor
scenario: You're quantizing a model to INT8 (256 levels). The weight distribution is approximately Gaussian with mean 0 and standard deviation 0.02.
question: What is the SQNR for INT8 quantization of Gaussian weights with sigma=0.02, and when do additional quantization levels stop helping?
details:
  realistic_solution: For uniform quantization of a Gaussian signal, the SQNR depends on the number of quantization levels and how well the range covers the distribution. With 256 INT8 levels covering +/- 3 sigma, the quantization step is approximately 6 sigma / 255, the quantization noise power is Delta^2 / 12, and SQNR is signal power divided by quantization noise power. Additional levels stop helping once quantization noise is below the dominant error floor, such as data noise, gradient noise, calibration error, or clipping error.
  common_mistake: |
    **The Pitfall:** Believing more bits always linearly improves model quality.
    **The Rationale:** Candidates assume quantization noise is the only source of error in the system.
    **The Consequence:** Teams waste hardware resources upgrading to INT16 or FP16 when the INT8 quantization noise is already well below the system's ambient gradient/data noise floor.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weight distribution: Gaussian (\mu=0, \sigma=0.02)
    - Signal Range: \pm 3\sigma = \pm 0.06 (total width 0.12)
    - INT8 quantization: 256 levels
    - INT4 quantization: 16 levels

    **Calculations:**
    - Signal Power = \sigma^2 = 4 \times 10^{-4}
    - INT8 \Delta = 0.12 / 255 = 4.71 \times 10^{-4}
    - INT8 Noise Power = \Delta^2 / 12 = 1.85 \times 10^{-8}
    - INT8 SQNR ratio = (4 \times 10^{-4}) / (1.85 \times 10^{-8}) = 2.17 \times 10^4
    - INT8 SQNR in dB = 10 log10(2.17 \times 10^4) = 43.4 dB
    - INT4 \Delta = 0.12 / 15 = 8.0 \times 10^{-3}
    - INT4 Noise Power = \Delta^2 / 12 = 5.33 \times 10^{-6}
    - INT4 SQNR ratio = (4 \times 10^{-4}) / (5.33 \times 10^{-6}) = 75
    - INT4 SQNR in dB = 10 log10(75) = 18.8 dB

    **Conclusion & Interpretation:**
    - **Result: 43.4 dB INT8 SQNR (Noise-Floor-Bound)**. Additional quantization levels stop helping when \Delta^2 / 12 is already below the dominant non-quantization error floor. They are not universally wasted; they are only low value when quantization noise is no longer the limiting error source.
