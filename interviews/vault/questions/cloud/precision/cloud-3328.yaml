title: Optimizing Large Language Model Training with Mixed Precision on NVIDIA A100
scenario: You are tasked with training a large language model with billions of parameters on a cluster of GPUs. Your team is currently using full FP32 precision, but training times are exceeding acceptable limits, and memory usage is becoming a bottleneck. Your manager proposes transitioning to mixed-precision training.
question: How would you compare FP16 AMP with BF16 mixed precision, and which would you initially pursue for this LLM?
details:
  realistic_solution: |
    Implement a rigorous profiling and experimentation pipeline. Start with FP16 mixed precision using `torch.cuda.amp`, enabling automatic loss scaling. Monitor training stability, loss curves, and convergence metrics closely. Benchmark throughput and memory usage to quantify gains. Simultaneously, evaluate BF16 by configuring the model and optimizer appropriately, observing if implicit handling of gradients is sufficient for stability. Utilize nsight compute to analyze Tensor Core utilization and identify performance bottlenecks. A phased rollout, starting with a smaller model or dataset, can help validate the chosen strategy before full-scale deployment.
  common_mistake: |
    **The Pitfall:** Assuming FP16 mixed-precision can be applied universally without loss scaling, or ignoring the dynamic range differences.
    **The Rationale:** LLMs have wide dynamic ranges; FP16's limited exponent leads to gradient underflow, whereas BF16 handles the range natively.
    **The Consequence:** Training divergence, NaN losses, and suboptimal convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 billion parameters.
    - FP32: 4 bytes per param.
    - FP16/BF16: 2 bytes per param.

    **Calculations:**
    - FP32 Memory: 10B × 4 bytes = 40 GB.
    - FP16/BF16 Memory: 10B × 2 bytes = 20 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. Halving the footprint allows larger batch sizes, doubling compute utilization.
