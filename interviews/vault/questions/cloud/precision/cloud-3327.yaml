title: Optimizing LLM Training Throughput and Memory with Mixed Precision on TPU v5e
scenario: >-
  You are tasked with training a large language model (LLM) efficiently on
  a Google TPU v5e. The TPU v5e provides 16 GB of HBM, 197 TFLOPS BF16 peak performance,
  and 1.6 TB/s HBM bandwidth. The model's full-precision (FP32) footprint (weights,
  activations, and gradients) significantly exceeds the 16 GB HBM.
question: >-
  What mixed-precision training strategy would you use on TPU v5e to fit the
  model in 16 GB HBM while preserving FP32-like accuracy?
details:
  realistic_solution: 'A realistic solution would involve a multi-faceted approach. Use BF16 for most model weights and activations to save memory and leverage the TPU''s native BF16 arithmetic performance. Keep optimizer states (e.g., Adam''s `m` and `v` buffers) in FP32 for numerical stability. Implement dynamic loss scaling, which automatically adjusts the loss scale factor to prevent gradient underflow when using lower precision formats. For extreme memory pressure, consider techniques like gradient checkpointing or offloading less frequently accessed parts of the model to host memory. For specific layers highly sensitive to precision, a targeted approach might involve keeping them in FP32 or using FP16. Evaluate the precision-accuracy tradeoff empirically, starting with BF16 and selectively experimenting with FP8 for specific components where accuracy degradation is minimal or acceptable.'
  common_mistake: |
    **The Pitfall:** Blindly converting all operations to BF16 without dynamic loss scaling or selectively preserving FP32.
    **The Rationale:** Candidates fail to realize that while BF16 saves memory, it can cause gradient underflow/overflow or degrade accuracy in precision-sensitive layers without proper scaling and mixed-precision tracking.
    **The Consequence:** Training instability, exploding gradients, or degraded model accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10B parameter LLM model.
    - TPU v5e has 16 GB HBM and 197 TFLOPS BF16 peak.
    - FP32 requires 4 bytes/param; BF16 requires 2 bytes/param.

    **Calculations:**
    - FP32 footprint = 10B × 4 bytes = 40 GB (exceeds HBM).
    - BF16 footprint = 10B × 2 bytes = 20 GB.

    **Conclusion & Interpretation:**
    - **Result: 20 GB (Memory-Bound)**. Even in BF16, the weights exceed 16 GB memory, necessitating further strategies like sharding or offloading alongside dynamic loss scaling.
