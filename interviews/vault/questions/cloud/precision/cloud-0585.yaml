title: 70B LLM INT8 Fit vs ROUGE Collapse
scenario: 'You are the lead ML Systems Engineer at a company launching a new product powered by a 70B parameter LLM. The business mandate is aggressive: cut inference costs by 50% to make the unit economics viable. A junior engineer on your team takes the initiative and applies standard post-training quantization (PTQ), converting the entire model from FP16 to INT8. The good news: they hit the cost target by fitting the model onto a single H100 instead of two. The bad news: the model''s accuracy on its summarization benchmark (ROUGE) plummets by 30 points, rendering it useless. The team believes INT8 is a lost cause for LLMs.'
question: What are your first three architectural proposals, and how do you justify them quantitatively?
details:
  realistic_solution: |
    The first proposal is selective, outlier-aware quantization rather than global PTQ: use AWQ/GPTQ or SmoothQuant-style scaling, keep embeddings, layer norms, attention projections, output heads, and outlier channels in FP16/BF16, and quantize robust MLP weights to INT8 or INT4 only after per-layer sensitivity tests. The second proposal is a serving architecture that preserves the known single-H100 target while controlling memory pressure: weight-only quantization plus FP8/INT8 KV-cache trials, continuous batching, and explicit reserves for runtime buffers instead of assuming the 70 GB INT8 weight fit leaves enough headroom. The third proposal is a quality-preserving throughput path such as speculative decoding with a small draft model or a smaller distilled fallback for easy requests, gated by ROUGE and task-level regressions. Quantitatively, FP16 weights are about 140 GB, INT8 weights are about 70 GB, and a production single-H100 plan must prove the remaining ~10 GB plus any KV/cache optimizations support the target context and batch while recovering the 30-point ROUGE loss to within the product tolerance.
  common_mistake: |
    **The Pitfall:** Treating the model as a monolith and quantization as an all-or-nothing toggle.
    **The Rationale:** Engineers often lack the insight that different layers have varying sensitivities and outlier distributions.
    **The Consequence:** The team either abandons cost-saving quantization entirely or wastes weeks fine-tuning calibration datasets without fixing the underlying outlier saturation issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - The scenario already observed FP16 on 2 H100s and naive INT8 on 1 H100.
    - FP16 weights: 70B * 2 bytes = 140 GB.
    - INT8 weights: 70B * 1 byte = 70 GB.
    - One H100 has 80 GB, so naive INT8 leaves only about 10 GB raw headroom before KV cache, activations, CUDA graphs, and allocator fragmentation.

    **Calculations:**
    - Proposal 1, selective quantization: if 10% of weights stay FP16 and 90% are INT8, weight memory is 7B * 2 + 63B * 1 = 77 GB. That is close to the 80 GB limit, so it may need INT4 for robust blocks or lower-precision KV cache.
    - Proposal 2, mixed INT4/INT8: if 80% of weights use INT4 and 20% stay INT8/FP16-equivalent on average, weight memory can land around 45-60 GB, leaving 20-35 GB raw headroom for serving overhead.
    - Proposal 3, throughput architecture: speculative decoding or continuous batching does not fix the ROUGE loss, but can restore the 50% cost goal after the accuracy-preserving quantized model fits on one GPU.

    **Conclusion & Interpretation:**
    - **Result: Three Architecture Proposals.** Use outlier-aware mixed precision to recover quality, memory-aware serving changes to make the single-H100 target real, and measured throughput techniques to hit the cost goal without accepting the 30-point ROUGE collapse.
