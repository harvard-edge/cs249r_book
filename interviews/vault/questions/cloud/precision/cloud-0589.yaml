title: The Mixture-of-Experts Quantization Collapse
scenario: You are responsible for a fleet of Mixtral-class 8x22B Mixture-of-Experts (MoE) models. The total model has ~141B parameters. To reduce serving cost, your team applied standard post-training INT8 quantization to the entire model. While this successfully reduced the memory footprint from ~282GB to ~141GB, allowing it to fit on fewer GPUs, downstream quality metrics plummeted by over 50%.
question: How do you design a quantization strategy that works, and what specific architectural failure explains the initial collapse?
details:
  realistic_solution: 'The core insight is that not all parameters are created equal, especially in an MoE architecture. The catastrophic failure is caused by quantizing the router or gating path that chooses experts for each token. Small logit perturbations can flip the top-k experts, so a numerically small component can dominate quality. The fix is a mixed-precision strategy: keep the router, gating logits, normalization, and other routing-sensitive paths in FP16/BF16, then quantize expert FFN weights only after per-expert calibration and routing-quality validation. The total model has ~141B parameters: FP16 weights are about 282 GB and naive INT8 weights are about 141 GB, but the defensible claim is qualitative unless the exact parameter split, KV cache, tensor-parallel plan, and runtime overhead are measured.'
  common_mistake: |
    **The Pitfall:** Suggesting Quantization-Aware Training (QAT) to fix the issue.
    **The Rationale:** Engineers default to QAT as a universal fix for quantization degradation, ignoring the underlying architectural sensitivity of MoE routers.
    **The Consequence:** Wasting hundreds of thousands of dollars on expensive QAT training runs without addressing the fundamental dynamic range collapse in the gating network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total model: ~141B parameters.
    - FP16 weights: 2 bytes/parameter. INT8 weights: 1 byte/parameter.
    - The prompt does not specify the exact router, attention, shared-parameter, and expert-FFN split.
    - Goal is lower memory without changing expert routing decisions enough to hurt quality.

    **Calculations:**
    - FP16 weight footprint: 141B * 2 bytes = ~282 GB before KV cache and runtime overhead.
    - Naive INT8 footprint: 141B * 1 byte = ~141 GB, matching the observed memory reduction but quantizing the routing path.
    - If R billion routing-sensitive or attention/shared parameters remain FP16 and the remaining 141 - R billion parameters use INT8, weight memory is 2R + (141 - R) = 141 + R GB.
    - Example only: if 5B parameters must stay FP16/BF16, mixed weight memory is ~146 GB. If 10B must stay high precision, it is ~151 GB.
    - GPU count and cost then depend on measured KV cache, batch, tensor parallelism, and communication overhead, not parameter bytes alone.

    **Conclusion & Interpretation:**
    - **Result: Router-Preserving Mixed Precision.** The valid strategy is to keep routing-sensitive paths high precision and quantize expert weights where validation allows. The memory math supports a modest increase over naive INT8, but it does not by itself prove a specific 3-H100 deployment or 40% savings claim.
