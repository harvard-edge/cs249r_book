title: Applying Error Feedback in Top-k Gradient Sparsification
scenario: You are implementing distributed training for a 7B parameter LLM on 64 GPUs using Top-k gradient sparsification (k=1%). A specific weight gradient component computes an initial value of 0.04. The sparsification threshold for the top 1% is 0.05, so this gradient is zeroed out and not transmitted. In the next step, the local gradient calculation for this component yields 0.02.
question: With error feedback, what is the next compensated gradient, will it be transmitted, and what FP16 residual memory overhead is required per GPU?
details:
  realistic_solution: With error feedback, the untransmitted gradient (0.04) is stored as the residual. In the next step, the new gradient (0.02) is added to the residual, resulting in an error-compensated gradient of 0.06. Since 0.06 > 0.05 (the threshold), it is transmitted, and the new residual for this coordinate becomes 0. Storing the error feedback tensor for a 7B parameter model in FP16 requires 14 GB of additional VRAM per GPU.
  common_mistake: |
    **The Pitfall:** Forgetting to account for the memory overhead of the residual tensor or failing to add the accumulated error before masking.
    **The Rationale:** Candidates focus solely on the thresholding logic and forget that error feedback requires keeping a persistent state tensor the same size as the model.
    **The Consequence:** The training job OOMs because the extra 14 GB of memory per GPU was not budgeted for, or the model fails to converge because gradients are dropped rather than accumulated.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameter LLM, FP16 precision.
    - Top-k gradient sparsification with error feedback.

    **Calculations:**
    - Step 1: Calculated = 0.04. Threshold = 0.05. Residual stored = 0.04.
    - Step 2: Calculated = 0.02. Compensated = 0.02 + 0.04 = 0.06.
    - Transmission: 0.06 > 0.05. Transmit 0.06.
    - Memory Overhead: 7 billion * 2 bytes = 14 GB per GPU.

    **Conclusion & Interpretation:**
    - **Result: 14 GB per GPU overhead (VRAM-Capacity-Bound)**. Introduces a constraint for managing the residual tensor.
