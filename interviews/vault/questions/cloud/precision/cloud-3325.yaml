title: Optimizing Large Model Training with Mixed Precision on NVIDIA A100
scenario: 'You are tasked with training a large language model with 175 billion parameters. The model''s weights and activations in FP32 would significantly exceed the memory. To enable training, you opt for mixed-precision training.'
question: "For the 175B-parameter LLM, what are the FP32/FP16 parameter memory needs, theoretical FP16 speedup, and critical stability technique?"
details:
  realistic_solution: 'To manage memory and accelerate training: (1) Framework AMP manages data type casting. (2) Loss Scaling: Critical to prevent gradient underflow. In FP16, small gradients become zero. Multiplying the loss by a large scalar pushes them into representable range. (3) FP32 Master Weights prevent precision loss during optimizer updates. (4) Precision-Accuracy Tradeoffs: Monitor for degradation and consider BF16 if numerical instability occurs.'
  common_mistake: |
    **The Pitfall:** Ignoring loss scaling or improperly managing optimizer states.
    **The Rationale:** Treating mixed-precision as a drop-in 'magic' speedup switch without understanding the narrowed numerical range.
    **The Consequence:** Gradient underflow causes training instability or "NaN" loss spikes, ruining the training run.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 175B parameters. FP16 peak: 312 TFLOPS. Peak FP32: 19.5 TFLOPS.
    2. **Calculations:**
       - FP32 Memory: 175B × 4 bytes = 700 GB.
       - FP16 Memory: 175B × 2 bytes = 350 GB.
       - Speedup: 312 / 19.5 = 16x.
    3. **Conclusion & Interpretation:**
       **Result: Memory Bound. FP16 fits better and yields a 16x theoretical compute speedup.**
