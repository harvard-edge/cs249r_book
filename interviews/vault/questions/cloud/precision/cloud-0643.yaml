title: The Quantization Error Budget
scenario: You're quantizing a 7B model from FP16 to INT4 (4-bit integers with group-wise scaling, group size 128). Your team says 'it's just rounding — the error is tiny.'
question: For INT4 group-wise quantization with group size 128, what is the worst-case error per group and when does it become catastrophic?
details:
  realistic_solution: 'INT4 symmetric quantization maps the range $[-\text{absmax}, +\text{absmax}]$ to 16 levels (4-bit signed: -8 to +7). The step size is $\Delta = 2 \times \text{absmax} / 15$, so the maximum rounding error per weight is $\Delta/2$. It becomes catastrophic when one outlier sets the group scale so high that ordinary weights are represented with very few codes, incur large relative error, or round to zero. For example, if most weights are around 0.1 but one outlier is 1.0, the scale is 10x larger than the typical weights need, and the non-outlier weights can see rounding error on the order of two-thirds of their magnitude.'
  common_mistake: |
    **The Pitfall:** Believing the error is at most 1/16 of the range, and thus negligible.
    **The Rationale:** Engineers assume uniform distributions and ignore the outsized impact of severe outliers.
    **The Consequence:** The outlier pushes the step size so high that all other weights in the group round to zero, effectively destroying the group's representational capacity.
  napkin_math: |
    **Assumptions:**
    - INT4 group-wise scaling, group size 128.
    - Most weights in the group have magnitude up to 0.1.
    - One outlier has magnitude 1.0, which is 10x larger than the typical range.

    **Calculations:**
    - Without the outlier: Delta = 2 * 0.1 / 15 = 0.0133. Max rounding error = 0.0133 / 2 = 0.0067, or 6.7% of a 0.1 weight.
    - With the 1.0 outlier: Delta = 2 * 1.0 / 15 = 0.1333. Max rounding error = 0.1333 / 2 = 0.0667.
    - Relative error for a 0.1 non-outlier can be as high as 0.0667 / 0.1 = 66.7%.
    - Weights smaller than half a step, below about 0.0667 in magnitude, can round to zero.

    **Conclusion:**
    - The outlier forces the step size to be 10x coarser than the non-outlier weights need. It becomes catastrophic when the outlier-determined half-step is a large fraction of typical weights or exceeds them, causing large relative error or zeroing.
