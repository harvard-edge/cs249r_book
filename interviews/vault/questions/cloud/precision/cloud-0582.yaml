title: The Quantization Catastrophe
scenario: You are the new Staff ML Systems Engineer at a major AI startup. The company's flagship product is a 175B parameter instruction-following LLM, served on clusters of H100 GPUs. User growth has been exponential, and you've hit a hard serving capacity wall. The VP of Engineering has mandated a 2x increase in throughput without increasing the GPU budget (a CapEx freeze).
question: What strategy would you propose to get 2x throughput from INT8 while managing outlier activations and production distribution shift?
details:
  realistic_solution: Use INT8 as a controlled serving program, not a one-shot conversion. Start with per-channel or group-wise weight quantization and an outlier-aware activation scheme such as SmoothQuant/AWQ-style scaling, keeping the most sensitive layers, channels, or operations in FP16/BF16. Calibrate on representative production traffic that includes code, finance, long-context, multilingual, and adversarial prompts, then run shadow traffic against the FP16 baseline to measure quality, latency, clipping rate, and output drift. Add online drift monitoring for activation ranges and prompt classes, plus a higher-precision fallback path for flagged prompts or layers with outlier activations. Roll out gradually with canaries and rollback gates tied to tokens/s/GPU, P99 latency, quality regressions, and safety metrics. The 2x throughput target is acceptable only if measured end-to-end serving throughput improves while the fallback rate remains low enough to preserve capacity.
  common_mistake: |
    **The Pitfall:** Suggesting a purely tactical answer like "we just need a better calibration set" or abandoning quantization.
    **The Rationale:** It doesn't constitute a strategy for handling unknown future data distributions.
    **The Consequence:** The system remains fragile to production distribution shifts.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 halves weight bytes relative to FP16, but serving throughput may be limited by HBM bandwidth, KV cache, attention kernels, or fallback traffic.
    - Let the FP16 baseline serve 1.0x normalized throughput.
    - INT8 kernels are measured at 2.2x throughput on representative traffic when no fallback is used.

    **Calculations:**
    - If 90% of requests use INT8 at 2.2x speed and 10% fall back to FP16 at 1.0x speed, effective throughput is approximately 1 / ((0.90 / 2.2) + (0.10 / 1.0)) ≈ 1.96x.
    - If fallback rises to 20%, effective throughput is 1 / ((0.80 / 2.2) + (0.20 / 1.0)) ≈ 1.77x, missing the 2x target.
    - Therefore the rollout must track fallback rate, clipping/outlier rate, and quality drift, not just model weight memory.

    **Conclusion & Interpretation:**
    - **Result: Throughput With Guardrails**. INT8 can meet the 2x goal only if outlier-aware quantization keeps most traffic on the fast path and production monitoring catches distribution shift before quality regresses.
