title: 'Activation-Aware A100 Quantization'
scenario: 'An enterprise uses GPUs to serve Llama-3 8B with a strict P99 100 ms time-to-first-token SLA. Profiling shows 0.5% of activations exceed 6 sigma of the layer''s distribution. They want to double throughput by using 8-bit quantization without breaching the P99 SLA.'
question: 'Which activation-aware quantization method should be applied to compress the model without devastating accuracy due to extreme outliers?'
details:
  realistic_solution: 'Apply methods like SmoothQuant or AWQ to migrate the quantization difficulty from the activations (which contain massive outliers) to the weights. By mathematically scaling up weights where activation outliers occur, the model can safely be converted to W8A8 or W8A16, fitting twice as many requests in VRAM.'
  common_mistake: |
    **The Pitfall:** Applying naive min-max weight quantization without addressing the extreme activation outliers.
    **The Rationale:** Standard quantization evenly distributes the dynamic range, which works well for normally distributed weights but completely fails when activation tensors contain rare, massive magnitude outliers.
    **The Consequence:** The outliers get clipped or force the rest of the values into a single quantization bucket, completely destroying the LLM's perplexity and accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3 8B model.
    - Strict 100 ms SLA on an A100.
    - 0.5% activations contain massive outliers.
    
    **Calculations:**
    - Unquantized Footprint: 8B parameters * 2 bytes (FP16) = 16 GB per replica.
    - Quantized Footprint: 8B parameters * 1 byte (INT8) = 8 GB per replica.
    - SLA constraint dictates throughput maximization.
    
    **Conclusion & Interpretation:**
    - **Result: 8 GB footprint (Memory-Bound)**. Shifting outliers to the weights allows safe INT8 quantization, doubling throughput without accuracy collapse.
