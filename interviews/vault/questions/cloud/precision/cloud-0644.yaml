title: FP8 Training Loss Spikes with BF16 Fallbacks
scenario: We're pre-training a 30B model. It trains fine in BF16 for 200k steps. Management asks us to switch to FP8 training to get 2× throughput on H100's FP8 Tensor Cores. After switching, we see loss spikes every ~5,000 steps that gradually get worse until training diverges at step 80k.
question: Why do FP8 training loss spikes appear, and how do BF16 fallbacks fix them without abandoning FP8?
details:
  realistic_solution: 'FP8 has two formats: E4M3 (4 exponent, 3 mantissa bits, limited range and precision) and E5M2 (5 exponent, 2 mantissa bits, wider range but coarser precision). The key insight is that not all operations tolerate the same precision. Matrix multiplications (GEMMs) in the forward pass are robust to FP8 E4M3 because the accumulation happens in FP32 inside the Tensor Core; the low precision only affects inputs. But certain operations are precision-critical: (1) **Softmax** involves exponentiation where small logit errors can change attention probabilities. (2) **LayerNorm** depends on accurate reductions for mean and variance, so low-precision activations can distort normalization. (3) **Residual paths and reductions** are sensitive when small updates are accumulated into larger values. The fix is **mixed FP8/BF16**: run GEMMs in FP8 (where 90%+ of FLOPs live) but keep softmax, LayerNorm, residual additions, and the loss computation in BF16. This captures much of the FP8
    throughput gain while maintaining BF16 stability.'
  common_mistake: |
    **The Pitfall:** Believing FP8 is just too low precision for training.
    **The Rationale:** Giving up the 2× throughput gain without understanding which specific operations are precision-sensitive.
    **The Consequence:** Reverting to pure BF16 and losing massive hardware efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP8 E4M3 has only 3 explicit mantissa bits, so values in the same exponent bin are spaced coarsely relative to BF16.
    - Softmax, normalization, residual paths, and reductions are sensitive because small representation errors can be amplified or accumulated across many layers.
    - GEMMs are more tolerant when FP8 inputs are scaled and Tensor Cores accumulate in higher precision.

    **Calculations:**
    - FP8 quantization error in attention logits changes softmax probabilities nonlinearly because probability ratios depend on exp(a - b).
    - Low-precision normalization or residual accumulation can repeatedly bias hidden states even when the individual error is small.
    - Keeping GEMMs in FP8 captures most throughput, while keeping softmax, LayerNorm, residual/reduction paths, and loss computation in BF16/FP32 removes the most sensitive error sources.

    **Conclusion & Interpretation:**
    - **Result: Precision-Sensitive Operations Need BF16.** The instability is not proof that all FP8 training is impossible; it shows that FP8 should be limited to tolerant GEMMs while softmax, normalization, residual additions, reductions, and the loss path stay in BF16 or FP32.
