title: 'The Silent Overflow Catastrophe: Quantization Fundamentals'
scenario: You are the Principal Engineer for the ML Serving Platform at a large financial services company.
  Your team is responsible for a critical, 70B-parameter fraud detection LLM that analyzes transaction
  descriptions. To reduce the staggering H100 inference costs, a junior team was tasked with quantizing
  the model from FP16 to INT8. They used a standard post-training static quantization (PTSQ) approach,
  calibrating on 10,000 recent transactions. The resulting INT8 model passed all offline evaluations with
  a negligible 0.1% accuracy drop and was deployed to 10% of traffic.
question: What safety-first quantization pipeline would you build after the INT8 fraud LLM passes offline
  tests but fails on production outliers?
details:
  realistic_solution: The correct approach is to architect a multi-stage, safety-first quantization pipeline
    that treats quantization not as a one-shot compilation step, but as a dynamic, observable process.
  common_mistake: '**The Pitfall:** Treating the model as a monolith and quantization as a simple compilation
    toggle.

    **The Rationale:** Engineers assume standard calibration sets capture all necessary bounds and fail
    to predict catastrophic outlier events.

    **The Consequence:** The team implements simple band-aids like retraining calibration data, ignoring
    the fundamental integer overflow mechanism that continues to plague production endpoints.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model is quantized from FP16 to INT8.

    - INT8 Range is [-128, 127].

    - FP16 Max Value is 65,504.

    - Calibration max activation is 10.0, but production outlier activation reaches 50.0.


    **Calculations:**

    - Scale factor = 10.0 / 127 ≈ 0.0787.

    - Quantized outlier = 50.0 / 0.0787 = 635.

    - 635 > 127, so it clips to the maximum INT8 value of 127.


    **Conclusion:** Since the quantized outlier is clipped to 127, the outlier signal is completely destroyed
    and silently returns garbage downstream.'
