title: 'The Silent Overflow Catastrophe: Quantization Fundamentals'
scenario: You are the Principal Engineer for the ML Serving Platform at a large financial services company. Your team is responsible for a critical, 70B-parameter fraud detection LLM that analyzes transaction descriptions. To reduce the staggering H100 inference costs, a junior team was tasked with quantizing the model from FP16 to INT8. They used a standard post-training static quantization (PTSQ) approach, calibrating on 10,000 recent transactions. The resulting INT8 model passed all offline evaluations with a negligible 0.1% accuracy drop and was deployed to 10% of traffic.
question: What safety-first quantization pipeline would you build after the INT8 fraud LLM passes offline tests but fails on production outliers?
details:
  realistic_solution: |
    Build a staged quantization pipeline with explicit outlier controls. First, expand calibration beyond recent average traffic: include tail merchants, unusual currencies, rare transaction text, adversarial strings, long descriptions, and historical fraud cases. Second, profile activation ranges per layer and use per-channel or group-wise quantization instead of naive per-tensor scales. Third, keep numerically sensitive layers or outlier channels in FP16/BF16, apply an explicit activation clipping policy, and use outlier-aware quantization such as SmoothQuant-style scaling where it preserves accuracy.

    Promotion to production should be gated. Run offline regression by cohort, then shadow the INT8 model on live traffic while the FP16 model still serves responses. Canary only a small percentage with automatic rollback if drift, clipping rate, score distribution shift, fraud recall, or business loss metrics move outside thresholds. Keep runtime telemetry for saturation/clipping counters and per-cohort quality, and maintain a fast fallback to FP16 plus a retraining or recalibration path when new production outliers appear.
  common_mistake: |
    **The Pitfall:** Treating the model as a monolith and quantization as a simple compilation toggle.
    **The Rationale:** Engineers assume standard calibration sets capture all necessary bounds and fail to predict catastrophic outlier events.
    **The Consequence:** The team implements simple band-aids like retraining calibration data, ignoring the fundamental integer overflow mechanism that continues to plague production endpoints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model is quantized from FP16 to INT8.
    - Use symmetric per-tensor activation quantization for this example, with zero-point 0 and representable INT8 values [-127, 127].
    - Calibration max activation is 10.0, but production outlier activation reaches 50.0.

    **Calculations:**
    - Scale factor = max_abs / 127 = 10.0 / 127 ≈ 0.0787 activation units per integer step.
    - Quantized outlier before clipping = round(50.0 / 0.0787) ≈ 635.
    - 635 exceeds the maximum representable value 127, so the stored integer clips to 127.
    - Dequantized value after clipping = 127 * 0.0787 ≈ 10.0, not the true activation 50.0.

    **Conclusion & Interpretation:**
    - **Result: Saturated Outlier.** Under the stated symmetric per-tensor scheme, the production outlier is represented as the calibration maximum, erasing 80% of its magnitude. The safety pipeline must detect clipping rate and use per-channel/group scales, outlier-aware transforms, or FP16/BF16 fallback for sensitive paths.
