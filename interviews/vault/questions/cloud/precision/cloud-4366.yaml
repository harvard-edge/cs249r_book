title: TPU v5e BF16 Reductions and Training Stability
scenario: A team migrates transformer training from H100 to TPU v5e using JAX BF16. Their custom loop keeps layer-norm statistics, gradient clipping norms, and cross-replica gradient reductions in BF16 for speed. After 50K steps, the TPU run shows 1.8% higher loss than the baseline.
question: Why is the TPU v5e BF16 run 1.8% higher loss after 50K steps, and how would you fix the JAX training loop?
details:
  realistic_solution: The likely root cause is not a TPU MXU matmul accumulator setting; the strongest suspect is that numerically sensitive reductions were kept in BF16, though optimizer hyperparameters, kernel differences, and non-determinism should also be ruled out. Layer-norm mean/variance, gradient norms, optimizer updates, and cross-replica gradient sums should be accumulated in FP32 even when activations and weights use BF16. Fix the JAX loop by casting reduction inputs to `jnp.float32`, doing `lax.pmean` and `lax.psum` on FP32 values for gradient sums or norms, computing layer-norm statistics in FP32, using FP32 optimizer/master states, and returning to BF16 only for storage or matmul inputs where appropriate. `jax.lax.Precision.HIGHEST` can request a higher-precision matmul algorithm, but it is not the right control knob for gradient all-reduce, layer-norm statistics, or clipping reductions. Validate the diagnosis with an ablation that changes only reduction precision and checks
    whether the 1.8% loss gap closes.
  common_mistake: |
    **The Pitfall:** Attributing the loss divergence to BF16 weights or to a TPU matmul accumulation switch.
    **The Rationale:** Engineers focus on MXU matmul precision and miss reductions in layer norm, clipping, optimizer math, and cross-replica gradient sums.
    **The Consequence:** They tune the wrong knob and leave the numerically sensitive reductions in BF16, so the training gap remains.
  napkin_math: |
    **Assumptions & Constraints:**
    - BF16 has 7 explicit fraction bits, so its unit roundoff is about 2^-8 = 0.0039.
    - FP32 unit roundoff is about 2^-24 = 5.96e-8.
    - The sensitive operations are reductions: layer-norm statistics, gradient norms, optimizer math, and cross-replica gradient sums.

    **Calculations:**
    - Relative rounding scale ratio = 0.0039 / 5.96e-8 ≈ 65,500x.
    - In a reduction over many terms, BF16 can lose small updates or distort variance estimates much earlier than FP32.
    - The ratio does not predict a 1.8% loss gap by itself; the gap must be diagnosed by rerunning with FP32 reductions while keeping the rest of the training setup fixed.

    **Conclusion & Interpretation:**
    - **Result: Reduction Precision Risk (Numerical Stability)**. Cast sensitive reductions and optimizer math to FP32 in JAX, then verify by ablation; do not present `Precision.HIGHEST` as a guaranteed FP32-accumulation fix.
