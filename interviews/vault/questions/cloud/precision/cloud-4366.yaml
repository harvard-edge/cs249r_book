title: TPU v5e BF16 Accumulation and Training Stability vs H100
scenario: A team migrates transformer training from H100 (FP16 with FP32 accumulation via Tensor Cores) to TPU v5e (BF16 with BF16 accumulation). After 50K training steps, the TPU run shows 1.8% higher loss than the H100 baseline at the same number of steps.
question: Why is the TPU v5e BF16 run 1.8% higher loss after 50K steps than the H100 FP16 baseline, and how would you fix it on TPU?
details:
  realistic_solution: 'The root cause is BF16 accumulation in MXU (TPU''s matrix unit). H100 Tensor Cores accumulate in FP32 even when inputs are FP16 — this is critical for gradient accumulation across large batch sizes and long sequences where small gradient signals would otherwise be rounded to zero in lower precision accumulators. TPU v5e MXU can be configured for BF16 accumulation (fast) or FP32 accumulation (slower but numerically accurate). If the team used BF16 matmul with BF16 accumulation, gradient updates for small learning rates are systematically rounded, causing the loss divergence. Fix: enable FP32 accumulation in JAX/XLA via `jax.lax.Precision.HIGHEST` or `tf.matmul(..., use_32bit_accumulation=True)`. Expected performance cost: ~15-25% throughput reduction. Alternatively, use stochastic rounding (available on TPU v5e) which provides unbiased accumulation in BF16 with minimal throughput cost.'
  common_mistake: |
    **The Pitfall:** Attributing the loss divergence to BF16's lower precision mantissa rather than the accumulation precision.
    **The Rationale:** Engineers know BF16 has fewer mantissa bits than FP16 (7 vs 10), so they incorrectly blame the weight format itself.
    **The Consequence:** Failing to configure the TPU's MXU for FP32 accumulation, leaving the gradient updates systematically rounded to zero.
  napkin_math: |
    **Assumptions & Constraints:**
    - BF16 has 7 explicit fraction bits, so its unit roundoff is about 2^-8 = 0.0039.
    - FP32 unit roundoff is about 2^-24 = 5.96e-8.
    - Accumulation error depends on operation order, cancellation, scaling, and gradient distribution, so it cannot be inferred from step count alone.

    **Calculations:**
    - Per-operation relative rounding scale ratio = 0.0039 / 5.96e-8 ≈ 65,500x.
    - This ratio shows why BF16 accumulation is much less stable than FP32 accumulation for long reductions.
    - It does not by itself predict a 1.8% loss gap; that gap must be confirmed by an ablation using FP32 accumulation or stochastic rounding.

    **Conclusion & Interpretation:**
    - **Result: Accumulation Precision Risk (Numerical Stability)**. The defensible diagnosis is that BF16 accumulation can amplify rounding in reductions; verify by rerunning with FP32 accumulation on TPU and checking whether the loss gap closes.
