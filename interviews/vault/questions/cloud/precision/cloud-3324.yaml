title: Optimizing Large Language Model Training with Mixed Precision on AMD MI300X
scenario: Your team is tasked with training a large language model (LLM) with billions of parameters, targeting high throughput and efficiency on a cluster of AMD MI300X accelerators. Each MI300X features 192 GB HBM3 memory, 1,307 TFLOPS FP16 dense compute, and 5.3 TB/s memory bandwidth. The model's initial training uses FP32, but you observe memory bottlenecks and suboptimal training speed.
question: What mixed-precision training strategy would you use on MI300X for this FP32 LLM, and how would you manage stability and accuracy tradeoffs?
details:
  realistic_solution: Use BF16 as the default training precision for weights, activations, and gradients on MI300X because it reduces tensor storage and bandwidth versus FP32 while preserving an FP32-like exponent range for stability. Keep optimizer states and any master weights in FP32, use ROCm-optimized BF16 kernels, and retain FP32 for numerically sensitive reductions or normalization statistics when validation shows a need. Use FP16 only for specific kernels if profiling proves a throughput benefit and accuracy is preserved; FP16 would require dynamic loss scaling, while BF16 generally does not. Profile total training memory, compute utilization, communication, and input throughput before increasing batch size, because parameter compression alone does not determine the end-to-end bottleneck.
  common_mistake: |
    **The Pitfall:** Neglecting dynamic loss scaling when switching to FP16.
    **The Rationale:** Candidates assume standard precision downcasting just works, failing to realize that small gradients will underflow to zero in FP16.
    **The Consequence:** Early training instability and model divergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100B parameters.
    - FP32 parameter storage: 4 bytes/parameter.
    - BF16/FP16 parameter storage: 2 bytes/parameter.
    - Training also needs gradients, optimizer states, activations, communication buffers, and framework overhead.

    **Calculations:**
    - FP32 raw parameter storage = 100B * 4 bytes = 400 GB.
    - BF16/FP16 raw parameter storage = 100B * 2 bytes = 200 GB.
    - Raw parameter storage savings = (400 GB - 200 GB) / 400 GB = 50%.
    - With Adam-style training, FP32 optimizer states alone can add 100B * 2 states * 4 bytes = 800 GB before activations and gradients.

    **Conclusion & Interpretation:**
    - **Result: 50% raw parameter-storage reduction (Memory-Capacity-Bound)**. BF16 reduces weight, activation, and gradient bandwidth versus FP32, but it does not by itself make a 100B training run fit or guarantee larger batches; sharding, activation checkpointing, optimizer-state management, and profiling still determine usable batch size and throughput.
