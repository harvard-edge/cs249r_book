title: The Precision Trade-off
scenario: We are quantizing our model from FP16 to INT8. The memory footprint drops by 2x, but the throughput doesn't improve at all. The workload is strictly compute-bound.
question: Assuming we are compute-bound, what hardware architectural detail did we forget?
details:
  realistic_solution: You forgot to check if the silicon has dedicated INT8 Tensor Cores. Without specific hardware paths for 8-bit integer math, the GPU must upcast the INT8 values back to FP16 in the registers to perform the multiply-accumulate (MAC), yielding zero compute speedup despite the memory savings.
  common_mistake: |
    **The Pitfall:** Confusing memory footprint savings with compute speedups.
    **The Rationale:** Candidates blindly assume "half the bits means twice the speed," ignoring the need for specific silicon pathways to perform low-precision math.
    **The Consequence:** Deploying INT8 models on older or unsupported hardware architectures and receiving exactly zero throughput improvement for compute-bound workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 FP16 Tensor Cores: 312 TFLOPS.
    - A100 INT8 Tensor Cores: 624 TOPS.

    **Calculations:**
    - If the hardware lacks dedicated INT8 paths, the GPU upcasts INT8 to FP16 for MAC operations.

    **Conclusion & Interpretation:**
    - **Result: Hardware-Bound.** 1x compute speedup despite the 0.5x memory footprint.
