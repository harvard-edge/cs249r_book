title: The CUDA Upgrade Regression
scenario: After upgrading from CUDA 11.8 to CUDA 12.2, your 13B model's accuracy on your internal benchmark drops by 2.3 points. The model weights are identical — same checkpoint file. The training team swears nothing changed.
question: How can the same weights produce different accuracy with a different CUDA version?
details:
  realistic_solution: |
    CUDA version upgrades change the cuDNN and cuBLAS kernel implementations. Different kernel implementations use different reduction orders, tiling strategies, and fused operations — all of which change the order of floating-point additions. Due to floating-point non-associativity in FP16/BF16, different reduction orders produce different results at the bit level. The fix is to set deterministic flags or re-validate the model on the benchmark.
  common_mistake: |
    **The Pitfall:** Assuming the regression is a software bug in CUDA or dismissing it as random noise.
    **The Rationale:** Engineers used to deterministic CPU execution assume identical inputs and weights must yield mathematically identical outputs across library versions.
    **The Consequence:** Teams waste weeks filing bugs with vendors or chasing phantom infrastructure issues instead of handling floating-point non-associativity gracefully.
  napkin_math: |
    **Assumptions & Constraints:**
    - CUDA library upgrades can change reduction order, tiling, and fusion choices.
    - BF16 has 7 explicit mantissa bits, so individual operations are rounded.
    - Floating-point addition is not associative: (a + b) + c can round differently from a + (b + c).

    **Calculations:**
    - BF16 spacing near 1.0 is about 2^-7 = 0.0078125, or 0.78%, before rounding to nearest.
    - A reduction over many terms can produce different low-order bits when the kernel changes the summation order.
    - Those small numerical differences can be amplified by deep residual stacks, normalization, thresholding, and argmax decisions.

    **Conclusion & Interpretation:**
    - **Result: Kernel-Execution-Bound Nondeterminism.** The math shows why bitwise differences are expected, not a precise 2.3-point accuracy prediction. Treat the CUDA upgrade as a numerical change: enable deterministic kernels where required and re-validate accuracy under the new library stack.
