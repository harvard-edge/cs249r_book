title: The Cloud-to-Edge Calibration Shift
scenario: Your cloud pipeline trains an FP32 semantic segmentation model for autonomous delivery robots. Before pushing to the edge, you run Post-Training Quantization (PTQ) to convert it to INT8 for the edge NPU. You calibrate the activation ranges using 5,000 randomly selected images from your massive global cloud dataset. On the edge, the INT8 model's accuracy is identical to FP32 during the day, but at night, the INT8 model fails completely to detect pedestrians, whereas the FP32 model handles night scenes perfectly.
question: Why does the INT8 model fail at night while the FP32 model works, and how would you fix the quantization pipeline?
details:
  realistic_solution: |
    The failure is due to a mismatch between the PTQ calibration dataset distribution and the specific edge operational domain, exacerbated by the mechanics of static INT8 quantization. Static quantization maps the continuous FP32 activation range [min, max] to discrete INT8 bins [-128, 127].

    By randomly sampling from a global dataset, the calibration set is overwhelmingly dominated by bright daytime images, resulting in a large activation max value (e.g., 20.0). Nighttime pedestrian features may occupy a much smaller activation span (e.g., 0.6). Because the INT8 scale is set to cover the 20.0 calibration range, those nighttime features may use only about 8 quantization steps, causing severe loss of feature resolution for the domain where the model is most sensitive. The tradeoff-analysis dictates either using domain-specific calibration sets per edge deployment (compiling separate models for night/day), or using more advanced calibration algorithms like KL-Divergence/Histogram rather than simple Min-Max, or shifting to Quantization-Aware Training (QAT).
  common_mistake: |
    **The Pitfall:** Assuming hardware noise or thermal throttling.
    **The Rationale:** Candidates often jump to physical edge constraints rather than understanding the mathematical distribution shift caused by static quantization calibration.
    **The Consequence:** The candidate proposes irrelevant hardware fixes rather than addressing the core data pipeline calibration issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Min-Max calibration range: [0, 20.0].
    - INT8 bins: 256 bins.
    - Nighttime pedestrian feature activation range: [0, 0.6].
    **Calculations:**
    - Bin size: 20.0 / 255 = 0.078 per bin.
    - Number of bins used for nighttime features: 0.6 / 0.078 = ~7.6 bins.
    **Conclusion & Interpretation:**
    - **Result: Calibration-Domain Mismatch.** The nighttime feature span uses only about 7-8 of the 256 available quantization intervals, so small pedestrian cues are coarsely represented compared with FP32. This supports domain-specific calibration, histogram/KL calibration, or QAT rather than a daytime-dominated Min-Max calibration set.
