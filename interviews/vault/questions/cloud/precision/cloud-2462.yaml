title: The Cloud-to-Edge Calibration Shift
scenario: Your cloud pipeline trains an FP32 semantic segmentation model for autonomous delivery robots. Before pushing to the edge, you run Post-Training Quantization (PTQ) to convert it to INT8 for the edge NPU. You calibrate the activation ranges using 5,000 randomly selected images from your massive global cloud dataset. On the edge, the INT8 model's accuracy is identical to FP32 during the day, but at night, the INT8 model fails completely to detect pedestrians, whereas the FP32 model handles night scenes perfectly.
question: Why does the INT8 model fail at night while the FP32 model works, and how would you fix the quantization pipeline?
details:
  realistic_solution: "The failure is due to a mismatch between the PTQ calibration dataset distribution and the specific edge operational domain, exacerbated by the mechanics of static INT8 quantization. Static quantization maps the continuous FP32 activation range [min, max] to discrete INT8 bins [-128, 127].\n\nBy randomly sampling from a global dataset, the calibration set is overwhelmingly dominated by bright daytime images, resulting in a large activation max value (e.g., 20.0). Nighttime images produce very small activations (e.g., max 1.5). Because the INT8 bins are scaled to accommodate the 20.0 max, the entire range of nighttime activations gets compressed into just a few quantization bins (e.g., bins 0 to 9), completely destroying the resolution and gradients needed for detection. The tradeoff-analysis dictates either using domain-specific calibration sets per edge deployment (compiling separate models for night/day), or using more advanced calibration algorithms like KL-Divergence/Histogram rather than simple Min-Max, or shifting to Quantization-Aware Training (QAT)."
  common_mistake: |
    **The Pitfall:** Assuming hardware noise or thermal throttling.
    **The Rationale:** Candidates often jump to physical edge constraints rather than understanding the mathematical distribution shift caused by static quantization calibration.
    **The Consequence:** The candidate proposes irrelevant hardware fixes rather than addressing the core data pipeline calibration issue.
  napkin_math: |
    1. **Min-Max calibration:** Range [0, 20.0].
    2. **INT8 bins:** 256 bins (0 to 255 for uint8).
    3. **Bin size:** 20.0 / 255 = 0.078 per bin.
    4. **Nighttime pedestrian feature activation range:** [0, 0.6].
    5. **Number of bins used for nighttime features:** 0.6 / 0.078 = ~7.6 bins.
    6. **Result:** **The model is effectively operating at 3-bit precision (8 states) during the night, leading to catastrophic information loss.**
