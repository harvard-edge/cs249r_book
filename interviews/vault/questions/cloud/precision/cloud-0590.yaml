title: The Catastrophic Quantization Failure
scenario: You serve a 20-billion parameter Deep Learning Recommendation Model (DLRM). Offline, it achieves 0.85 AUC. Running on H100s in FP16 requires a massive fleet to meet the 1,000,000 QPS SLA. A junior engineer used a standard post-training quantization (PTQ) toolkit to convert the entire model to INT8. The model size halved, but during the A/B test, its AUC collapsed to 0.50 (random guessing). The junior engineer insists the calibration dataset was perfect.
question: What is the most likely root cause of the INT8 collapse, how would you prove it experimentally, and what quantization strategy would you deploy?
details:
  realistic_solution: The catastrophic failure points to a numerical overflow. INT8 can only represent values from -128 to 127. Many networks produce activations with large dynamic ranges or extreme outliers. These outliers force the quantization scale factor to be tiny, crushing all "normal" activations into a few bins (or zero), destroying information flow. Prove this by plotting activation histograms. Deploy SmoothQuant to mathematically shift the difficulty from activations to weights, or leave sensitive layers in FP16 (Mixed Precision).
  common_mistake: |
    **The Pitfall:** Immediately suggesting Quantization-Aware Training (QAT) or blaming the calibration data.
    **The Rationale:** Candidates rely on standard textbook answers without diagnosing the physical cause of a complete AUC collapse.
    **The Consequence:** The team spends weeks spinning up expensive distributed QAT pipelines when a simple post-training activation outlier mitigation (like SmoothQuant) would have solved the problem in minutes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 20B params, INT8 PTQ.
    - INT8 Limits: Range is [-128, 127].
    - Activations: 99% in [-1, 1], with extreme outliers (e.g., x = 1000).

    **Calculations:**
    - PTQ scale factor (S): max(|X|) / 127 = 1000 / 127 ≈ 7.87.
    - Quantizing a standard activation (x = 1.0): round(1.0 / 7.87) = 0.
    - Result: All standard activations crush to exactly 0, destroying information flow.

    **Conclusion & Interpretation:**
    - **Result: Catastrophic overflow (Precision-Bound)**. Outliers force a massive scale factor, inducing quantization failure; SmoothQuant is required.
