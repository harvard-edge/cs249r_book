title: RoPE Embedding Degradation in BF16
scenario: You are extending a 13B model's context window from 8k to 100k tokens. You deploy the model purely in BF16 to save memory. While short-context tasks work perfectly, retrieval tasks at position > 60,000 fail entirely. Profiling shows the attention maps become smeared and indistinct at high positions.
question: Why do retrieval tasks fail beyond position 60,000 with BF16 long-context inference, and how would you fix RoPE computation?
details:
  realistic_solution: The issue is not that token positions themselves cannot exist as distinct integers. The failure is usually caused by computing RoPE angle products or sin/cos caches in too little precision, and sometimes by using an 8k-trained RoPE scaling scheme outside the range it was calibrated for. RoPE needs accurate values for position * inverse_frequency across many dimensions; building those products and trig tables in BF16 can quantize phases enough that high-position rotations become noisy or aliased, which smears attention. Compute positions, inverse frequencies, angle products, and sin/cos cache construction in FP32, apply a long-context RoPE scaling method that was validated for 100k tokens, and only cast the final rotated activations or cached sin/cos values back to BF16 if accuracy tests allow it.
  common_mistake: |
    **The Pitfall:** Assuming the RoPE base frequency (theta) wasn't scaled properly for long context, leading to out-of-distribution cosine values.
    **The Rationale:** Explanation of the pitfall.
    **The Consequence:** The consequence of this mistake.
  napkin_math: |
    **Assumptions & Constraints:**
    - RoPE uses token position m and inverse frequency w_i to compute sin(m * w_i) and cos(m * w_i).
    - Positions are integer indices, but the angle products and trig cache are floating-point computations.
    - Long-context inference at 60k-100k tokens pushes RoPE beyond the original 8k training range unless scaling was designed and validated for that range.

    **Calculations:**
    - For each RoPE dimension, the phase is phi_i = m * w_i. At m = 60,000, even small relative error in w_i or phi_i becomes a visible absolute phase error after multiplication by m.
    - If phi_i and the sin/cos table are built in BF16, phase values are rounded before the periodic trig operation; nearby positions or dimensions can receive overly coarse rotations.
    - FP32 angle construction keeps much finer mantissa precision during m * w_i and sin/cos evaluation, then BF16 can be used later for storage or matmul where tests show it is safe.
    - If the model was trained for 8k context, extending to 100k also requires an appropriate RoPE scaling/extrapolation method; precision fixes alone may not recover retrieval if the frequency schedule is out of distribution.

    **Conclusion & Interpretation:**
    - **Result: Degraded Positional Phase Accuracy**. BF16 RoPE angle/cache arithmetic and unvalidated long-context scaling can smear attention at high positions. Build RoPE positions, angles, and sin/cos values in FP32, use a 100k-validated scaling method, then cast outputs back to BF16 only after accuracy validation.
