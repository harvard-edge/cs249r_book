title: RoPE Embedding Degradation in BF16
scenario: You are extending a 13B model's context window from 8k to 100k tokens. You deploy the model purely in BF16 to save memory. While short-context tasks work perfectly, retrieval tasks at position > 60,000 fail entirely. Profiling shows the attention maps become smeared and indistinct at high positions.
question: Why do retrieval tasks fail beyond position 60,000 with BF16 long-context inference, and how would you fix RoPE computation?
details:
  realistic_solution: The issue is BF16 precision in the RoPE angle/cache computation. RoPE needs accurate sin(m * theta) and cos(m * theta) values for large token positions m. BF16 has only 7 stored fraction bits, so large positions and the resulting angles have coarse spacing; many adjacent or nearby positions can alias or receive overly coarse rotations if the position, frequency multiplication, or trig cache is built in BF16. The model then loses positional resolution and attention becomes smeared at long context. Compute RoPE positions, inverse frequencies, angle products, and sin/cos cache construction in FP32, then cast the final rotated activations or cache values back to BF16 if needed.
  common_mistake: |
    **The Pitfall:** Assuming the RoPE base frequency (theta) wasn't scaled properly for long context, leading to out-of-distribution cosine values.
    **The Rationale:** Explanation of the pitfall.
    **The Consequence:** The consequence of this mistake.
  napkin_math: |
    **Assumptions & Constraints:**
    - BF16 has 8 exponent bits and 7 explicit fraction bits.
    - RoPE uses token position m to compute sin(m * theta) and cos(m * theta).
    - Long-context positions around 65,536 are near 2^16.

    **Calculations:**
    - For BF16 values in the binade around 2^16, the unit in the last place is 2^(16 - 7) = 512.
    - Thus positions 65,536 and 65,537 cannot be represented as distinct BF16 values; they round to the same stored value, and many nearby positions share coarse buckets.
    - The same precision loss can occur in m * theta and sin/cos cache construction if those computations are performed in BF16.
    - FP32 spacing around 2^16 is 2^(16 - 23) = 1/128, which is fine-grained enough for adjacent integer positions before the trig computation.

    **Conclusion & Interpretation:**
    - **Result: Degraded Positional Resolution**. BF16 RoPE angle/cache arithmetic at long contexts can smear attention because nearby positions receive indistinct rotations. Build RoPE positions, angles, and sin/cos values in FP32, then cast outputs back to BF16 if needed.
