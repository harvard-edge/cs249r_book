title: RoPE Embedding Degradation in BF16
scenario: You are extending a 13B model's context window from 8k to 100k tokens. You deploy the model purely in BF16 to save memory. While short-context tasks work perfectly, retrieval tasks at position > 60,000 fail entirely. Profiling shows the attention maps become smeared and indistinct at high positions.
question: Why do retrieval tasks fail beyond position 60,000 with BF16 long-context inference, and how would you fix RoPE computation?
details:
  realistic_solution: The issue is a direct result of BF16's severe lack of mantissa precision (only 7 bits). Rotary Position Embedding (RoPE) relies on calculating cos(m * theta) and sin(m * theta) where m is the token position. At large positions (e.g., m = 60,000), representing 'm' in BF16 causes severe truncation. The step size between representable numbers in BF16 at this magnitude is large enough that consecutive token positions map to the exact same BF16 value. Consequently, the model cannot distinguish between adjacent tokens at long contexts. The architecture must compute and apply RoPE in FP32, casting to BF16 only after the positional rotation is complete.
  common_mistake: |
    **The Pitfall:** Assuming the RoPE base frequency (theta) wasn't scaled properly for long context, leading to out-of-distribution cosine values.
    **The Rationale:** Explanation of the pitfall.
    **The Consequence:** The consequence of this mistake.
  napkin_math: |
    **Assumptions & Constraints:**
    - BF16 has 8 exponent bits and 7 explicit fraction bits.
    - RoPE uses token position m to compute sin(m * theta) and cos(m * theta).
    - Long-context positions around 65,536 are near 2^16.

    **Calculations:**
    - BF16 spacing near 2^16 is 2^(16 - 7) = 512 between adjacent representable values.
    - Many nearby integer positions therefore alias after BF16 rounding. For example, adjacent positions such as 65,536 and 65,537 both round to the same BF16 value.
    - When m is rounded before computing RoPE angles, groups of nearby positions can receive identical or overly coarse rotations.

    **Conclusion & Interpretation:**
    - **Result: Degraded Positional Resolution**. BF16 position arithmetic at long contexts can smear attention because nearby positions are no longer represented distinctly. Compute RoPE positions and angles in FP32, then cast the rotated activations back to BF16 if needed.
