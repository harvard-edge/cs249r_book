title: Symmetric INT8 Scale and Error Simulation
scenario: You are deploying a 1.2B parameter model for real-time translation. After PTQ degrades accuracy due to outliers, you switch to QAT using symmetric INT8 quantization. During the forward pass, a specific FFN layer activation tensor has a max magnitude of 12.7. An incoming FP32 activation value is 3.55.
question: For symmetric INT8 QAT with max magnitude 12.7, what are S, the INT8 value for activation 3.55, and the simulated quantization error?
details:
  realistic_solution: For symmetric INT8 quantization mapped to the range [-127, 127], the scale factor is S = max(|v|) / 127. The FP32 value is divided by S, rounded to the nearest integer, and then multiplied back by S to simulate the quantization noise. The network learns to adapt to this rounding error during backpropagation via the Straight-Through Estimator.
  common_mistake: |
    **The Pitfall:** Calculating the scale factor using the asymmetric [-128, 127] range.
    **The Rationale:** Engineers recall that signed 8-bit integers span from -128 to 127, forgetting that symmetry requires bounding at 127.
    **The Consequence:** Breaking perfect zero-point symmetry, leading to biased simulated quantization noise and degraded QAT convergence.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max magnitude = 12.7.
       - Target FP32 value = 3.55.
       - Range: Symmetric INT8 [-127, 127].
    2. **Calculations:**
       - Scale factor S = 12.7 / 127 = 0.1.
       - Quantized integer q = round(3.55 / 0.1) = 36.
       - Fake-quantized FP32 value x' = 36 * 0.1 = 3.6.
       - Simulated quantization error = x' - x = 3.6 - 3.55 = +0.05.
    3. **Conclusion & Interpretation:**
       - **Result: Quantization Error.** The straight-through estimator will backpropagate gradients through the +0.05 quantization noise, enabling the model to adapt.
