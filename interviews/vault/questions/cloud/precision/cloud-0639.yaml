title: The Underflow Crisis
scenario: You switch a pre-training job from FP32 to FP16 precision to save memory, but the training loss returns NaNs within the first 100 steps.
question: What numerical property is failing?
details:
  realistic_solution: FP16's limited dynamic range is failing. Very small gradients can underflow to 0.0, which stalls learning, while overly large scaled values can overflow and produce infinities or NaNs. NaNs within the first 100 steps point especially to overflow or invalid operations from poorly tuned loss scaling. Switch to BF16 where possible, or use dynamic loss scaling and keep numerically sensitive reductions in higher precision.
  common_mistake: |
    **The Pitfall:** Blaming the learning rate or model architecture for the collapse.
    **The Rationale:** Candidates often assume that hyperparameter tuning can fix numerical instability, failing to recognize the fundamental dynamic range limitations of FP16.
    **The Consequence:** The team wastes days tuning learning rates while the underlying format continues to underflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Typical deep network gradients can fall far below 10^-8.
    - FP16 training often uses loss scaling to prevent small gradients from underflowing.

    **Calculations:**
    - FP16 minimum subnormal: ~6 × 10^-8.
    - BF16 minimum positive normal in standard hardware/software usage: ~1.18 × 10^-38.
    - A gradient of 10^-12 is below FP16's minimum subnormal, so it cannot be represented directly in FP16.
    - If loss scaling is too aggressive, large intermediate values can exceed FP16's maximum finite value (~65504), producing infinities that quickly become NaNs.

    **Conclusion & Interpretation:**
    - **Result: FP16 Dynamic-Range Failure.** Underflow explains gradient collapse, while early NaNs usually indicate overflow or invalid operations from unstable scaling. BF16's wider exponent range or dynamic loss scaling fixes the failing numerical range.
