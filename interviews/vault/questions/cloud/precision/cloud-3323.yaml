title: Analyzing Mixed-Precision Performance on Google TPU v5e
scenario: You are tasked with optimizing a large language model (LLM) for both training and inference on a Google TPU v5e pod. The model is currently using full FP32 precision.
question: How would migrating this FP32 LLM to BF16 mixed precision on TPU v5e affect memory, throughput, stability, and design choices?
details:
  realistic_solution: 'Convert model weights and activations to BF16, while keeping critical operations (e.g., softmax, normalization layers) in FP32 or using specific BF16-compatible implementations. Implement dynamic or static loss scaling to mitigate gradient underflow during training. For inference, ensure the BF16 model fits within the 16 GB HBM, and leverage the 197 TFLOPS BF16 throughput to massively accelerate decoding.'
  common_mistake: |
    **The Pitfall:** Assuming simply casting all tensors to BF16 yields free performance.
    **The Rationale:** Candidates ignore numerical stability, gradient underflow/overflow, and the impact on model accuracy.
    **The Consequence:** The model fails to converge during training, or inference produces degraded, nonsensical outputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 GB FP32 model.
    - TPU v5e with 16 GB HBM.

    **Calculations:**
    - FP32 parameters: 4 bytes/param.
    - BF16 parameters: 2 bytes/param.
    - BF16 model size: 30 GB * (2/4) = 15 GB.

    **Conclusion & Interpretation:**
    - **Result: 15 GB (Memory-Bound)**. Migrating to BF16 reduces the model footprint from 30 GB to 15 GB, allowing it to fit entirely within a single 16 GB TPU v5e HBM chip.
