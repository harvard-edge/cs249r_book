title: Analyzing Mixed-Precision Performance on Google TPU v5e
scenario: You are tasked with optimizing a large language model (LLM) for both training and inference on a Google TPU v5e pod. The model is currently using full FP32 precision.
question: How would migrating this FP32 LLM to BF16 mixed precision on TPU v5e affect memory, throughput, stability, and design choices?
details:
  realistic_solution: Converting FP32 weights and activations to BF16 usually halves model and activation memory, improving fit and often reducing memory bandwidth pressure. Throughput can improve on TPU v5e when the kernels, layouts, and batch sizes use BF16-optimized paths, but decoding may still be memory-bound or limited by input length, KV cache traffic, or host scheduling. For training, keep numerically sensitive operations such as softmax reductions, normalization statistics, optimizer state, and some accumulations in FP32 or validated mixed-precision forms; BF16 often avoids explicit loss scaling, but convergence and accuracy still need checks. For inference, validate quality and latency with representative prompts before assuming a speedup.
  common_mistake: |
    **The Pitfall:** Assuming simply casting all tensors to BF16 yields free performance.
    **The Rationale:** Candidates ignore numerical stability, gradient underflow/overflow, and the impact on model accuracy.
    **The Consequence:** The model fails to converge during training, or inference produces degraded, nonsensical outputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 GB FP32 model.
    - TPU v5e with 16 GB HBM.
    - This estimate covers parameter storage only.

    **Calculations:**
    - FP32 parameters: 4 bytes/param.
    - BF16 parameters: 2 bytes/param.
    - BF16 model size: 30 GB * (2/4) = 15 GB.

    **Conclusion & Interpretation:**
    - **Result: 15 GB (Memory-Bound)**. BF16 parameter storage fits within 16 GB, but real training or inference still needs memory for activations, KV cache, optimizer state, and runtime workspace. Throughput gains depend on BF16 kernel support and the workload bottleneck.
