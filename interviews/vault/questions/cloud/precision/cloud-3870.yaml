title: FP16 Dual A100 vs FP8 Single H100
scenario: Your team is deploying a 70-billion parameter LLM for a low-latency chat application. You are evaluating two serving architectures for the decoding phase at a batch size of 1. Option A uses FP16 weights distributed across 2x A100 GPUs (80GB, 2.0 TB/s bandwidth each) via Tensor Parallelism. Option B uses FP8 weight-only quantization running on a single H100 GPU (80GB, 3.35 TB/s bandwidth).
question: Which architecture yields higher generation throughput, and what precision-accuracy tradeoffs must be managed?
details:
  realistic_solution: 'Option B (single H100 with FP8 weight-only quantization) is likely to yield higher batch-size-1 decoding throughput if the model meets accuracy targets after calibration. Autoregressive decoding reads roughly one pass of model weights per generated token, so FP8 cuts the dominant weight-read traffic in half and avoids tensor-parallel communication between the two A100s. The result is not automatic: kernel efficiency, KV-cache traffic, inter-GPU collectives for tensor parallelism, scaling-factor overhead, and accuracy loss from FP8 quantization must be measured against the service target.'
  common_mistake: |
    **The Pitfall:** Assuming 2x A100s will be faster because their combined memory bandwidth (4.0 TB/s) exceeds a single H100 (3.35 TB/s).
    **The Rationale:** Engineers compare aggregate hardware bandwidths without accounting for the amount of data that needs to be moved.
    **The Consequence:** The system may be deployed with lower throughput because FP16 moves twice the weight bytes per parameter and tensor parallelism adds communication, while FP8 still requires accuracy calibration before it is acceptable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A: 2x A100, FP16, Total bandwidth = 4.0 TB/s.
    - Option B: 1x H100, FP8, Total bandwidth = 3.35 TB/s.

    **Calculations:**
    - Option A ideal weight-read bytes per generated token: 70e9 params * 2 bytes = 140 GB across two A100s. Ideal bandwidth-bound throughput: 4000 GB/s / 140 GB = 28.6 tokens/s before tensor-parallel communication overhead.
    - Option B ideal weight-read bytes per generated token: 70e9 params * 1 byte = 70 GB on one H100. Ideal bandwidth-bound throughput: 3350 GB/s / 70 GB = 47.9 tokens/s before scaling-factor and kernel overhead.
    - KV-cache reads, activation work, and launch overhead exist in both cases, so these are upper-bound comparisons, not guaranteed production rates.

    **Conclusion & Interpretation:**
    - **Result: Option B has the better ideal throughput ceiling, about 47.9 vs 28.6 tokens/s.** Choose it only if FP8 calibration preserves quality; otherwise the A100 FP16 option may be preferable despite lower ideal throughput.
