title: Memory Optimization for LLMs on TPU v5e with Mixed-Precision Quantization
scenario: You are deploying large language models on an accelerator with 16 GB of HBM. All weights and activations are initially in BF16. Your team is exploring mixed-precision quantization, selectively converting some layers to INT8.
question: "For a 10B parameter model, how many parameters must be quantized from BF16 to INT8 to fit the model within 16 GB of HBM?"
details:
  realistic_solution: 'Utilize memory profiling tools and iteratively apply post-training static quantization (PTQ) to less sensitive layers, moving them to INT8. Ensure scales and zero-points are stored efficiently.'
  common_mistake: |
    **The Pitfall:** Failing to account for the overhead of storing quantization parameters, or forgetting the KV cache.
    **The Rationale:** Candidates perform the pure weight math perfectly but ignore the real-world overheads required to actually run inference.
    **The Consequence:** Deploying a model that technically fits its weights into memory but immediately OOMs the moment a single token is processed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total parameters = 10B. Max memory = 16 GB.
    - x params in BF16, y params in INT8.

    **Calculations:**
    - 2x + 1y <= 16 GB.
    - Substitute y = 10 - x: 2x + (10 - x) <= 16.
    - x + 10 <= 16 => x <= 6.
    - y = 10 - 6 = 4 billion parameters to INT8.

    **Conclusion & Interpretation:**
    - **Result: 4B parameters (Memory-Bound)**. Minimum of 4 billion parameters must be quantized to INT8.
