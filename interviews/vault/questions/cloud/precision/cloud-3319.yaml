title: Weight Memory Sizing with Mixed-Precision Quantization
scenario: You are deploying large language models on an accelerator with 16 GB of HBM. All weights are initially BF16. For this weight-only sizing pass, ignore activation workspace, KV cache, and quantization metadata.
question: Under weight-only assumptions, how many of 10B parameters must be quantized from BF16 to INT8 to fit within 16 GB of HBM?
details:
  realistic_solution: The direct weight-only answer is 4B parameters. A 10B BF16 model uses 20 GB for weights. Quantizing one parameter from BF16 to INT8 saves 1 byte, so fitting into 16 GB requires saving 4 GB, which means quantizing 4B parameters. In a real deployment, activation workspace, KV cache, and quantization scales would require additional headroom, so this is a lower-bound sizing result.
  common_mistake: |
    **The Pitfall:** Failing to account for the overhead of storing quantization parameters, or forgetting the KV cache.
    **The Rationale:** Candidates perform the pure weight math perfectly but ignore the real-world overheads required to actually run inference.
    **The Consequence:** Deploying a model that technically fits its weights into memory but immediately OOMs the moment a single token is processed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total parameters = 10B. Max memory = 16 GB.
    - Weight-only sizing; activation workspace, KV cache, and quantization metadata are excluded.
    - x params in BF16, y params in INT8.

    **Calculations:**
    - All-BF16 weight memory = 10B params * 2 bytes/param = 20 GB.
    - Each parameter converted from BF16 to INT8 saves 1 byte.
    - Required savings = 20 GB - 16 GB = 4 GB.
    - Parameters to quantize = 4 GB / 1 byte per param = 4B parameters.
    - Equivalent constraint: if x is BF16 params in billions and y is INT8 params in billions, 2x + 1y <= 16 GB and x + y = 10B, so y >= 4B.

    **Conclusion & Interpretation:**
    - **Result: 4B parameters must be quantized from BF16 to INT8 (Memory-Bound)**. That changes 20 GB of BF16 weights into 16 GB of mixed BF16/INT8 weights under the stated weight-only assumptions.
