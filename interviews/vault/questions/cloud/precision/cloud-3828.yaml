title: Mixed Precision Acceptance Spec
scenario: 'A team wants to move training from BF16 to FP8.'
question: 'What acceptance criteria should gate moving a production training run from BF16 to FP8?'
details:
  realistic_solution: 'Require loss-curve parity, gradient overflow/underflow telemetry, rigorous accuracy regression bounds, per-layer fallback rules, and a checkpoint recovery plan. FP8 is not just a memory optimization; it fundamentally alters numerical stability.'
  common_mistake: |
    **The Pitfall:** Approving the FP8 migration purely because it mathematically cuts memory usage in half.
    **The Rationale:** Engineers view precision reduction as a simple systems optimization, ignoring that FP8 fundamentally alters numerical stability and model convergence behavior.
    **The Consequence:** The model trains faster but suffers a silent quality regression, ultimately wasting massive compute budgets on a degraded final checkpoint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Migration: BF16 (2 bytes) to FP8 (1 byte).
       - Savings: 50% activation/weight memory footprint (~10 GB per GPU).
    2. **Calculations:**
       - Numerical Instability Risk: ~2% perplexity degradation.
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Regression-Bound. The massive compute required to recover a 2% quality gap from numerical instability dwarfs the cost savings of a 10 GB memory reduction.**
