title: BF16 vs FP16 for Training
scenario: A new hire asks you why everyone uses BF16 for training when FP16 and BF16 are both 16 bits, assuming they are interchangeable.
question: Why do people use BF16 instead of FP16 for training if both formats are 16 bits?
details:
  realistic_solution: FP16 and BF16 allocate their 16 bits differently. FP16 uses 5 exponent bits and 10 mantissa bits, offering higher precision but a narrow dynamic range. BF16 uses 8 exponent bits and 7 mantissa bits, sacrificing precision for roughly the same exponent range as FP32. In deep learning training, gradients and activations can span many orders of magnitude. FP16 is more likely to underflow small gradients or overflow large values unless loss scaling is managed carefully. BF16 greatly reduces those range failures and often avoids loss scaling, but its 7-bit mantissa still quantizes values more coarsely than FP16.
  common_mistake: |
    **The Pitfall:** Thinking BF16 is just a newer version of FP16 or broadly interchangeable.
    **The Rationale:** Candidates focus solely on the total bit count rather than the architectural bit-layout trade-off between exponent and mantissa.
    **The Consequence:** Using FP16 without complex loss scaling, leading to immediate gradient underflow and training collapse.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16: 5 exponent bits and 10 explicit mantissa bits.
    - BF16: 8 exponent bits and 7 explicit mantissa bits.
    - Transformer gradients routinely hit 10^-12 to 10^-20.

    **Calculations:**
    - FP16 min subnormal = ~5.96 x 10^-8.
    - BF16 has an FP32-like exponent range, with minimum positive normal around 1.18 x 10^-38 in standard hardware usage.
    - BF16 precision near 1.0 is coarse: about 2^-7 = 0.78% spacing before rounding effects.

    **Conclusion & Interpretation:**
    - **Result: BF16 Improves Range, Not Perfect Precision (Format-Bound).** BF16 can keep many small gradients representable that FP16 would flush or lose without scaling, so it often reduces or avoids loss scaling. It does not represent gradients perfectly, and some workloads still need careful scaling or higher-precision accumulation.
