title: Analyzing FP16 Speedup on A100
scenario: You are profiling a linear layer kernel on an A100 GPU. The layer performs a matrix multiplication between an activation matrix of shape [16, 4096] and a weight matrix of shape [4096, 4096]. When you switch all tensors from FP32 to FP16, you observe that the execution time exactly halves, resulting in a 2.0x speedup.
question: Why does switching this [16, 4096] x [4096, 4096] layer from FP32 to FP16 produce exactly a 2x speedup on the A100?
details:
  realistic_solution: |
    For this specific measured kernel, the observed 2x speedup is consistent with a memory-bandwidth-bound GEMM rather than a peak-TFLOPS-limited GEMM. The matrix is skinny on the batch dimension, so the arithmetic intensity is low once the weight matrix traffic dominates. Switching FP32 tensors to FP16 halves the bytes moved for activations, weights, and outputs, so a bandwidth-dominated implementation can roughly halve latency. The exact 2.0x result is an empirical outcome for this kernel shape and implementation, not a universal rule for FP16 on A100.
  common_mistake: |
    **The Pitfall:** Assuming switching to FP16 automatically shifts the bottleneck to the compute units.
    **The Rationale:** Candidates attempt to explain the speedup using peak TFLOPS ratios rather than calculating arithmetic intensity.
    **The Consequence:** Failure to understand memory-bound regimes, leading to incorrect architectural optimization choices.
  napkin_math: |
    **Assumptions & Constraints:**
    - GEMM shape: M=16, K=4096, N=4096.
    - FLOPs count uses 2*M*N*K multiply-add operations.
    - Tensor elements moved once: A + B + C = (16*4096) + (4096*4096) + (16*4096) = 16,908,288 elements.
    - A100 FP16 tensor-core ridge point is about 156 FLOPs/Byte under peak assumptions.

    **Calculations:**
    - FLOPs = 2 * 16 * 4096 * 4096 = 536,870,912 FLOPs.
    - FP32 bytes = 16,908,288 * 4 = 67.6 MB, so intensity = 536.9M / 67.6M = 7.9 FLOPs/Byte.
    - FP16 bytes = 16,908,288 * 2 = 33.8 MB, so intensity = 536.9M / 33.8M = 15.9 FLOPs/Byte.
    - 15.9 FLOPs/Byte is still far below the FP16 tensor-core ridge point, so this simplified model predicts bandwidth sensitivity.

    **Conclusion & Interpretation:**
    - **Result: about 2x lower tensor traffic in a memory-sensitive shape**. A measured exact 2.0x speedup is plausible here, but cache reuse, tensor-core utilization, launch overhead, and kernel implementation can change the result.
