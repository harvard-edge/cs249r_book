title: Optimizing LLM Training with Mixed-Precision on AMD MI300X
scenario: You are tasked with optimizing the training of a 175-billion parameter large language model (LLM) on a cluster of AMD MI300X accelerators. Each MI300X provides 192 GB HBM3, 1,307 TFLOPS FP16 dense compute, and 5.3 TB/s memory bandwidth. The training requires a global batch size of 2048 and a sequence length of 4096. Your primary objective is to implement a mixed-precision training strategy (using FP16, BF16, or FP8) to maximize throughput while maintaining convergence stability and accuracy. Detail your design choices for data types (weights, activations, gradients, optimizer states), describe your loss scaling approach, and outline how you would address numerical stability challenges. Additionally, provide a high-level sizing estimate for the number of accelerators required and discuss the implications of your precision choices on memory footprint and computational efficiency, specifically referencing the MI300X's capabilities.
question: How would you design mixed-precision training for a 175B LLM on MI300X, including dtype choices, loss scaling, stability, and accelerator sizing?
details:
  realistic_solution: |
    Data Types:
    - Weights/Activations (Forward Pass): BF16 is generally preferred for its wider dynamic range, reducing the risk of overflow/underflow compared to FP16, especially for activations. If FP16 must be used for higher throughput (e.g., due to sparse FP16 TFLOPS on MI300X), careful monitoring and gradient clipping are essential. FP8 (E4M3 or E5M2) could be explored for specific parts (e.g., attention weights) if the framework supports it and stability can be maintained with quantization-aware training.
    - Gradients: Compute gradients in FP16/BF16 and convert to FP32 for accumulation.
    - Optimizer States: Maintain master weights and optimizer states in FP32 for numerical stability. Use techniques like ZeRO-stage 2 or 3 to shard optimizer states and potentially gradients across multiple devices to fit within the 192 GB HBM3.
    Loss Scaling: Dynamic loss scaling is crucial for FP16 training to prevent vanishing gradients due to underflow. The loss is scaled up before the backward pass, and gradients are scaled down before updating FP32 master weights.
    Numerical Stability: Implement gradient clipping, monitor loss and gradient norms, and utilize automatic mixed precision features of frameworks (e.g., PyTorch AMP) which handle type casting and loss scaling transparently. Consider BF16 if FP16 introduces too many stability issues.
  common_mistake: |
    **The Pitfall:** Overlooking the collective memory footprint of the optimizer states (often FP32) when calculating memory per device, especially for large models and optimizers like Adam. This frequently leads to Out-of-Memory (OOM) errors even when model weights are in reduced precision (e.g., FP16/BF16), requiring advanced techniques like optimizer sharding (e.g., ZeRO). Another common mistake is static loss scaling that is not robust enough for the dynamic range of gradients, leading to NaNs/Infs.
    **The Rationale:** Candidates often count only BF16/FP16 weights and forget gradients, FP32 master weights, Adam momentum/variance, activations at long sequence length, communication buffers, and framework overhead.
    **The Consequence:** The accelerator count is undersized, the job OOMs during backward or optimizer steps, and the team confuses memory-capacity failures with precision-instability failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - 175B parameters.
    - BF16/FP16 weights and gradients: 2 bytes/parameter each.
    - FP32 master weights and Adam states: 4 bytes/parameter each; Adam has 2 states.
    - ZeRO-3-style sharding evenly partitions weights, gradients, and optimizer state across N accelerators.
    - Activations for global batch 2048 and sequence length 4096 require additional checkpointed memory not derivable from the prompt without layer count, hidden size, and microbatching.

    **Calculations:**
    - BF16/FP16 weights = 175B * 2 bytes = 350 GB.
    - BF16/FP16 gradients = 175B * 2 bytes = 350 GB.
    - FP32 master weights = 175B * 4 bytes = 700 GB.
    - FP32 Adam states = 175B * 2 states * 4 bytes = 1.4 TB.
    - Sharded training state before activations = 350 GB + 350 GB + 700 GB + 1.4 TB = 2.8 TB.
    - Minimum accelerators for sharded state only = 2.8 TB / 192 GB = 14.6, so at least 15 MI300X devices before activations, communication buffers, fragmentation, and overhead.
    - In practice, activation memory for batch 2048 and sequence 4096 plus pipeline/tensor-parallel layout requires a larger cluster and activation checkpointing; the prompt does not provide enough architecture details for an exact accelerator count.

    **Conclusion & Interpretation:**
    - **Result: at least 15 MI300X accelerators for sharded training state alone, not a complete training plan.** A defensible design must reserve memory for activations and overhead and use tensor/pipeline/data parallelism plus checkpointing; BF16 is usually the stable default, while FP16 requires dynamic loss scaling if used.
