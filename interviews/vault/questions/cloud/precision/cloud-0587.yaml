title: The Silent Quantization Failure
scenario: Your team quantizes a 100B-parameter DLRM from FP16 to INT8 using Post-Training Quantization (PTQ) calibrated on a 10,000-sample production dataset. Offline metrics look great. In a 1% shadow deployment, recommendation quality craters specifically for 'power users', outputting garbage predictions.
question: What three-step plan would you propose to diagnose, mitigate, and solve the INT8 failure for power users?
details:
  realistic_solution: The catastrophic failure for 'power users' strongly suggests an activation overflow problem. Power users, with their deep history and high feature cardinality, generate activation values with a much wider dynamic range than the 'average' users in the calibration set. The INT8 format, with its `[-127, 127]` range, cannot represent these outlier activations, causing them to be 'clipped' or 'saturated' to the max value. This saturation corrupts the information flow through the network, leading to garbage outputs for this specific user segment.
  common_mistake: |
    **The Pitfall:** Immediately recommending expensive Quantization-Aware Training (QAT).
    **The Rationale:** QAT is the textbook "next step" when PTQ fails.
    **The Consequence:** Wasting massive compute resources retraining a 100B parameter model instead of implementing a surgical fix like isolating outlier activations or expanding the PTQ calibration range.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 range: `[-127, 127]`.
       - PTQ calibrated activation range: `[-10, 10]`.
       - Power user generates an activation outlier of `30.0`.
    2. **Calculations:**
       - Scaling Factor (S): 127 / 10 = 12.7.
       - Ideal Quantized Value: 30.0 * 12.7 = 381.
       - Actual Clipped Value: 127 (INT8 max).
       - Dequantized Value: 127 / 12.7 = 10.0.
       - Absolute Error: 30.0 - 10.0 = 20.0.
       - Relative Error: 20.0 / 30.0 ≈ 66.7%.
    3. **Conclusion & Interpretation:** **~67% relative error per activation (Dynamic Range-Bound).**
