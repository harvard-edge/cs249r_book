title: The Latency Budget Breach
scenario: 'Our new recommendation model is performing well in terms of accuracy, but when deployed to a resource-constrained environment (e.g., mobile device, edge IoT gateway), it consistently breaches our 50ms inference latency budget. The model is a standard ResNet-like architecture.'
question: 'How would you approach optimizing it for this strict latency constraint without a complete re-architecture?'
details:
  realistic_solution: 'For strict latency budgets on resource-constrained environments, **model quantization** is a highly effective technique to reduce model size and inference time. Implement Post-Training Quantization (PTQ) to convert weights to INT8. If accuracy degrades, utilize Quantization-Aware Training (QAT) combined with optimized edge runtimes like ONNX Runtime or TensorRT.'
  common_mistake: |
    **The Pitfall:** Suggesting upgrading to a more powerful CPU/GPU or throwing more expensive hardware at the problem.
    **The Rationale:** Engineers default to cloud hardware scaling instead of algorithmic optimization, ignoring the strict cost or physical constraints of edge environments.
    **The Consequence:** Hardware costs scale linearly with traffic, or deployment becomes physically impossible on constrained edge devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: Standard ResNet-like FP32 architecture.
       - SLA: 50ms inference latency.
       - Constraint: Resource-constrained edge hardware.
    2. **Calculations:**
       - FP32 Precision: 4 bytes per parameter.
       - INT8 Precision: 1 byte per parameter.
       - Reduction: Immediate 4x reduction in memory footprint and bandwidth requirements.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Converting to INT8 provides a 4x bandwidth reduction and 2-4x ALU speedup, easily satisfying the 50ms budget on edge hardware.**
