title: The Billion-Frame Quantization Strategy
scenario: You are the founding ML Systems Engineer for a new autonomous drone delivery platform processing video from one million drones at 1 FPS. The business constraints demand a P99 inference latency of 50ms and a total first-year infrastructure budget of $8M. Your baseline FP16 perception model runs at 2,000 FPS on a single GPU.
question: What are your first three architectural proposals, what data do you need to collect to de-risk them, and how would you prove safety?
details:
  realistic_solution: |
    A Staff-level engineer should propose architectures that can meet the 1M FPS, 50ms P99, and $8M constraints while making safety evidence explicit.
    1. **INT8 backbone with FP16 safety heads:** Quantize the convolutional/backbone layers and keep detection heads, small-object classifiers, uncertainty logic, and final box regression in FP16. Collect per-layer sensitivity data, activation ranges, rare-object error slices, and P50/P99 latency under real batch sizes. Prove safety by showing non-inferior recall for pedestrians, wires, vehicles, landing zones, and near-miss hazards against the FP16 model on a locked golden set and simulation replay.
    2. **Two-stage cascade:** Run a cheap INT8 model on every frame and escalate low-confidence or high-risk frames to the FP16 baseline or a larger regional model. Collect escalation rate, confidence calibration, geographic/weather distribution, and tail-latency data. Prove safety by bounding missed-hazard rate after escalation and showing the cascade still meets 50ms P99 at peak fleet load.
    3. **Edge filtering plus centralized heavy inference:** Do simple edge motion/scene filtering so only safety-relevant frames hit the GPU fleet, while all uncertain frames bypass filtering. Collect frame retention rates by route, lighting, weather, and incident class, plus network delay and drop rates. Prove safety by replaying incidents and demonstrating that no safety-critical frame is filtered out before inference.
    Rollout should use shadow mode first, then a tiny canary, with online monitors for output drift, activation clipping, subgroup/route regressions, and emergency fallback to the FP16 path.
  common_mistake: |
    **The Pitfall:** Jumping straight to "we'll use INT8" without a plan for validation.
    **The Rationale:** This approach ignores the significant risk of accuracy degradation from activation overflow, especially in models with wide dynamic ranges.
    **The Consequence:** The model could silently miss critical hazards, leading to drone crashes and total system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000,000 drones at 1 FPS means 1,000,000 FPS total load.
    - Baseline FP16 throughput is 2,000 FPS/GPU.
    - First-year budget is $8M; assume $30k per GPU-year including server share and operations.

    **Calculations:**
    - Baseline FP16 compute required: 1,000,000 FPS / 2,000 FPS/GPU = 500 GPUs.
    - FP16 Cost: 500 GPUs at ~$30k/year = $15M (over $8M budget).
    - Pure INT8 Cost: Doubles throughput to 4,000 FPS/GPU, needing 250 GPUs = $7.5M.
    - Mixed-Precision Cost: ~3,500 FPS/GPU, needing 286 GPUs = $8.58M.
    - To fit $8M at $30k/GPU-year, the design can use at most $8M / $30k ≈ 266 GPUs.
    - Required throughput per GPU at that budget: 1,000,000 FPS / 266 ≈ 3,760 FPS/GPU.
    - A cascade that sends 20% of frames to FP16 and 80% to INT8 has effective GPU demand of (0.20 * 1,000,000 / 2,000) + (0.80 * 1,000,000 / 4,000) = 100 + 200 = 300 GPU-equivalents, which misses the budget unless filtering, better INT8 throughput, or a lower escalation rate reduces load.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound Safety Tradeoff**. Pure INT8 fits the budget on throughput but needs strong hazard-recall evidence. Mixed precision and cascades are safer proposals, but they must either reach about 3,760 FPS/GPU effective throughput or reduce the number of frames sent to expensive inference while preserving safety-critical recall.
