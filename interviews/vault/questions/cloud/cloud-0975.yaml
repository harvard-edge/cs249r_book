title: Diagnosing Cold Restart Read Storms
scenario: Your team is training a 175B parameter LLM on a cluster of 1,024 A100 (80GB) GPUs using Megatron-LM.
  Whenever a hardware fault occurs, the orchestration system triggers a 'cold restart'—terminating all
  remaining PyTorch processes, rescheduling the pods, and having every rank reload the 2.8TB model and
  optimizer checkpoint from an S3 object store. Telemetry shows cold restarts are taking over 45 minutes
  to reach the first forward pass, and the S3 metrics show a massive spike in HTTP 503 'Slow Down' responses.
  Analyze the bottleneck causing this delay and propose an architectural fix.
details:
  realistic_solution: 'Diagnose the issue as an S3 prefix throttling event caused by 1024 ranks simultaneously
    requesting the 2.8TB checkpoint. Fix this by implementing a tiered checkpoint load: a single rank
    (or one rank per node) downloads the 2.8TB checkpoint at 12.5 GB/s in ~224 seconds, then broadcasts
    the data over 400 Gbps InfiniBand in ~56 seconds. Total I/O time drops from 45+ minutes (with S3 throttling
    and 503 backoffs) to under 5 minutes.'
  common_mistake: Candidates often blame Kubernetes pod scheduling latency, Docker image pull times, or
    NCCL ring initialization timeouts, failing to recognize the massive S3 API thundering-herd problem
    caused by 1024 concurrent checkpoint reads from the same prefix.
  napkin_math: 'Naive approach: 1,024 ranks * 2.8TB = ~2.8PB of concurrent read requests. An S3 prefix
    might cap at ~100 Gbps (12.5 GB/s), leading to 2.8PB / 12.5 GB/s = ~62 hours theoretically (triggering
    massive 503 backoffs and 45-min timeouts). Tiered approach: 1 rank downloads 2.8TB at 12.5 GB/s =
    224 seconds. Broadcasting 2.8TB over a 400 Gbps (50 GB/s) InfiniBand network takes 2.8TB / 50 GB/s
    = 56 seconds. Total I/O time drops from 45+ minutes to under 5 minutes.'
