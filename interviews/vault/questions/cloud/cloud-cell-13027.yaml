title: 'Queueing Theory Realization: Compute vs Memory Bottleneck in Queued Requests'
scenario: Concretely determine whether an H100 serving Mistral-7B is compute-bound or memory-bandwidth-bound
  during the decode phase, and how this changes the M/M/1 service time distribution (coefficient of variation).
  Arrival rate λ=200 req/s, mean output 150 tokens. Use this to select the correct queueing model (M/M/1
  vs M/D/1).
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. This is the authoritative spec for all H100 FP16 calculations.'
  common_mistake: Applying M/M/1 (exponential service time) when the system is memory-bandwidth-bound
    during decode, which produces near-deterministic service times (M/D/1 territory).
  napkin_math: 'H100 at 989 TFLOPS FP16 (corrected from 1979). Training efficiency: MFU = actual / (989T
    × theoretical_ops). At 989 TFLOPS × 0.4 MFU = 395.6 TFLOPS effective.'
