title: 'The Runtime Selection for Multi-Model Serving'
scenario: 'Your ML platform team must serve five models in production. (1) A BERT classifier. (2) A 70B LLM with continuous batching. (3) A real-time object detection model at 30 FPS. (4) A recommendation model with a 500M-row embedding table. (5) A diffusion model for image generation. The team wants to standardize on a single inference runtime.'
question: 'Which inference runtime should you choose for each of the five models, and why can''t one runtime serve all five optimally?'
details:
  realistic_solution: 'Each model has a different bottleneck that favors a different runtime: (1) BERT classifier $\rightarrow$ TensorRT: static shapes, INT8 quantizable, layer fusion gives 3-5\times over eager PyTorch. Rebuilt weekly via TensorRT build cache. (2) 70B LLM $\rightarrow$ vLLM/TensorRT-LLM: needs PagedAttention for KV-cache, continuous batching for throughput, tensor parallelism across GPUs. Generic runtimes lack these LLM-specific memory management features. (3) Object detection at 30 FPS $\rightarrow$ TensorRT with CUDA Graphs: hard real-time latency constraint means you cannot tolerate jitter from dynamic batching or Python dispatch. Pre-built engine with captured CUDA graph gives deterministic <33ms. (4) Recommendation model $\rightarrow$ custom serving (HugeCTR/TorchRec): 500M embedding rows cannot fit in GPU memory; needs CPU-GPU hybrid serving with embedding-specific sharding. Standard runtimes assume dense models that fit in VRAM. (5) Diffusion model $\rightarrow$ PyTorch with torch.compile or ONNX Runtime: iterative denoising loop (20-50 steps) means the runtime must efficiently handle repeated kernel launches of the same graph. CUDA Graphs work well here. The principle: runtime selection is determined by the model''s dominant resource bottleneck (compute-bound $\rightarrow$ TensorRT, memory-bound $\rightarrow$ vLLM, latency-bound $\rightarrow$ CUDA Graphs, capacity-bound $\rightarrow$ hybrid serving).'
  common_mistake: |
    **The Pitfall:** Standardizing on TensorRT or ONNX Runtime for all workloads.
    **The Rationale:** Platform teams strongly prefer unifying tooling to reduce operational maintenance complexity.
    **The Consequence:** One or more models will suffer severe performance penalties because generic runtimes fail to handle domain-specific bottlenecks (e.g., PagedAttention for LLMs or out-of-core embeddings for RecSys).
  napkin_math: |
    **Assumptions & Constraints:**
    - BERT (TensorRT): 1.2ms vs 5ms (4x faster than PyTorch eager).
    - 70B LLM (vLLM): 40 tokens/s vs 8 tokens/s (5x throughput from PagedAttention).
    - Diffusion (CUDA Graphs): 50 steps $\times$ 15$\mu$s = 0.75ms dispatch overhead per generation.
    
    **Calculations:**
    - Unification overhead: Generic runtime imposes penalty equal to unoptimized baseline for each model.
    
    **Conclusion & Interpretation:**
    - **Result: Specialized Runtimes (Runtime-Bound)**. Each model has a distinct bottleneck (compute, memory, or capacity) that necessitates a specialized runtime.
