title: SHARP In-Network AllReduce
scenario: NVIDIA's SHARP (Scalable Hierarchical Aggregation and Reduction Protocol) performs AllReduce
  directly on InfiniBand switch ASICs, eliminating the need for data to traverse to all GPUs. For a 512-H100
  cluster, evaluate SHARP's benefits and limitations compared to host-based NCCL AllReduce, considering
  data types, reduction operations, and failure modes.
question: "For 512 H100s, what benefits and limitations does SHARP have versus host-based NCCL AllReduce?"
details:
  realistic_solution: 'SHARP benefits: (1) Reduces AllReduce data movement. (2) Latency reduction. Limitations:
    (1) Only Quantum-2/3 switches. (2) Limited to FP16/BF16/FP32. (3) Failure requires tree reconstruction.
    (4) Multi-tenant complexity. Tree AllReduce bandwidth term: 2 × 9/512 × 2GB / 50GB/s = 1.4ms (not
    0.7ms).'
  common_mistake: Assuming SHARP replaces NCCL entirely. SHARP only supports specific reduction operations
    (sum, min, max) on specific data types (FP16, BF16, FP32, INT32). Custom reductions, FP8 gradients,
    or non-standard operations must fall back to host-based AllReduce.
  napkin_math: '512 H100s, 2GB gradient, 400Gbps IB per NIC: Host ring AllReduce: 2 × 511/512 × 2GB /
    50GB/s = 79.8ms. SHARP (3-tier): 2 × 3 × 2GB / (50GB/s × 8 rails) = 2 × 3 × 2/400 = 30ms. Speedup:
    79.8/30 = 2.66×. But: tree AllReduce (host-based): 2 × log₂(512) × 10μs + 2 × 9/512 × 2GB / 50GB/s
    = 180μs + 1.4ms ≈ 1.58ms for latency + bandwidth terms. Actual SHARP benefit is mostly latency reduction
    for small messages.'
