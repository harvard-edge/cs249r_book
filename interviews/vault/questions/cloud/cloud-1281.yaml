title: Optimizing DLRM with Feature-Parallel Batching
scenario: You are deploying a Deep Learning Recommendation Model (DLRM) for an ad-serving platform. The
  model has 80 categorical features, with their embedding tables sharded across 4 NVIDIA A100 GPUs based
  on feature IDs. The aggregator receives batches of 512 requests. In the naive request-parallel approach,
  the system processes each request independently, issuing separate RPCs and CUDA kernels for each feature
  lookup per request. Assuming a CUDA kernel launch overhead of 4 microseconds and negligible memory read
  time for these sparse lookups, calculate the latency impact of switching to a feature-parallel batching
  strategy.
details:
  realistic_solution: Implement a transpose operation at the aggregator to group the 512 requests by feature.
    Dispatch a single batched lookup operation per feature to the specific GPU shard holding that table,
    allowing one kernel to gather embeddings for all 512 requests simultaneously.
  common_mistake: Focusing solely on memory bandwidth or HBM capacity, while ignoring the massive CPU-bound
    overhead of launching thousands of tiny CUDA kernels or RPCs per batch.
  napkin_math: 'Request-parallel: 512 requests * 80 features = 40,960 kernel launches. Total overhead
    = 40,960 * 4 us = 163.84 ms. Feature-parallel: Group by feature first. 80 features = 80 kernel launches
    (each fetching 512 embeddings). Total overhead = 80 * 4 us = 0.32 ms. This yields a 512x reduction
    in launch overhead, saving ~163.5 ms per batch.'
