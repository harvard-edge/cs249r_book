title: Evaluating Kernel Fusion Energy Trade-offs
scenario: 'You are optimizing an LLM inference pipeline on A100 GPUs (400W TDP). An engineer proposes replacing a multi-step activation pipeline with a custom fused kernel. The fused kernel requires 20% more total FLOPs due to redundant thread-level recomputation, but reduces DRAM reads/writes from 6 to 2 per element.'
question: Should you accept this proposal, and how does the 20% FLOP penalty impact the overall energy consumption per token?
details:
  realistic_solution: "Accept the proposal. On modern hardware, moving data from HBM costs orders of magnitude more energy than performing a floating-point operation. Trading a 20% compute penalty for a 3x reduction in memory traffic substantially reduces the total energy consumed per byte, alleviating thermal constraints and improving memory-bound throughput."
  common_mistake: |
    **The Pitfall:** Rejecting the proposal by assuming a 20% increase in FLOPs directly translates to 20% higher power and latency.
    **The Rationale:** Engineers fundamentally ignore the disproportionate energy cost of HBM/DRAM access compared to arithmetic operations.
    **The Consequence:** Rejecting a highly optimal kernel that would significantly reduce thermal throttling and memory-bound latency.
  napkin_math: |
    - **HBM vs Compute Cost**: HBM access is ~120 pJ/byte; an FP16 FLOP is ~1 pJ.
    - **Unfused DRAM Energy**: `6 accesses * 2 bytes * 120 pJ = 1440 pJ`.
    - **Fused DRAM Energy**: `2 accesses * 2 bytes * 120 pJ = 480 pJ`.
    - **Final Result: The fused kernel saves 960 pJ per element in memory movement, massively overshadowing the trivial 2 pJ penalty of the extra FLOPs.**
