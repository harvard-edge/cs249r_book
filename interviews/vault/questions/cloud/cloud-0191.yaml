title: The Bi-Modal GPU Dilemma
scenario: 'You are the founding ML Systems Engineer at a startup that just secured a single, precious Blackwell B200 GPU. To maximize ROI, leadership wants to launch two products simultaneously: a background batch processing pipeline and a low-latency chatbot using a 70B parameter model.'
question: How would you serve both products on a single B200 without violating SLAs or thrashing GPU memory?
details:
  realistic_solution: The correct approach is a unified, symbiotic architecture where the models assist each other, rather than competing for resources.
  common_mistake: |
    **The Pitfall:** Using time-slicing or CUDA MPS to rapidly swap models.
    **The Rationale:** Standard resource schedulers multiplex smaller workloads easily.
    **The Consequence:** This fundamentally misunderstands modern LLM memory physics. Evicting and reloading a ~170GB+ context to serve a chatbot query takes seconds in memory transfer time alone, catastrophically violating both SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model (FP16) = 140 GB weights.
       - B200 Memory: 192 GB HBM3e.
    2. **Calculations:**
       - Available memory after loading one model: 192 GB - 140 GB = 52 GB.
       - The 52 GB must serve KV cache, context, and OS/CUDA overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. Memory is extremely tight; you cannot fit a second large model on this same GPU without heavy quantization or severe thrashing.**
