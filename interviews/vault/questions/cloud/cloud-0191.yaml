title: The Bi-Modal GPU Dilemma
scenario: 'You are the founding ML Systems Engineer at a startup that just secured a single, precious
  Blackwell B200 GPU. To maximize ROI, leadership wants to launch two products simultaneously:'
details:
  realistic_solution: The correct approach is a unified, symbiotic architecture where the models assist
    each other, rather than competing for resources.
  common_mistake: A common proposal is to use time-slicing or a standard resource scheduler like CUDA
    MPS to rapidly swap two different models on the GPU. This approach fundamentally misunderstands the
    memory physics of modern LLMs. The 70B model's context (weights + KV cache) will occupy most of the
    B200's 192GB HBM. Evicting and reloading a ~170GB+ context to serve a chatbot query would take seconds
    in memory transfer time alone, catastrophically violating both SLAs. The problem isn't about scheduling
    compute; it's about managing a persistent state in memory.
  napkin_math: '1. Fitting the 70B model on the B200: A 70B parameter model in FP16 (1B = 2GB) requires
    70 * 2GB = 140GB just for weights. A standard B200 has 192GB of HBM3e. This leaves 192GB - 140GB =
    52GB for the KV cache and operating overhead. The model fits, but memory is tight. You cannot fit
    a second large model on this same GPU without heavy quantization.'
