title: KV-Cache Disaggregation for Prefill-Decode Split
scenario: You are designing a disaggregated LLM serving system where prefill and decode run on separate
  GPU pools. The prefill pool computes KV-cache, which must be transferred to the decode pool. For Llama
  3 70B with 8K context, calculate the KV-cache transfer time and design the handoff protocol.
details:
  realistic_solution: 'KV-cache for 8K context, Llama 3 70B (8 KV heads, 128 dim, 80 layers, BF16): 8192
    × 320 KB = 2.62 GB per request. Transfer options: (1) NVLink within node (if prefill and decode GPUs
    are co-located): 2.62 GB / 900 GB/s = 2.9 ms — fast, viable. (2) InfiniBand between nodes: 2.62 GB
    / 50 GB/s = 52 ms — significant latency. (3) RDMA direct GPU-to-GPU: 2.62 GB / 25 GB/s (practical
    RDMA throughput) = 105 ms — too slow for real-time. Protocol design: (1) Streaming handoff: prefill
    GPU starts sending KV blocks for completed layers while still computing later layers. Layer L''s KV-cache
    is ready as soon as layer L finishes prefill. This overlaps transfer with compute. (2) Pipeline: prefill
    sends layer 0-39 KV while computing layers 40-79. Transfer time for half: 1.31 GB / 50 GB/s = 26 ms.
    Prefill time for 80 layers at 8K context ≈ 200 ms. Overlap: 26 ms transfer hidden behind 200 ms compute
    → effective handoff overhead: max(200, 200+26-200) = ~26 ms. (3) Compression: quantize KV to INT8
    for transfer (2× smaller), dequantize on decode GPU. Reduces transfer to 13 ms over IB.'
  common_mistake: Assuming KV-cache transfer is negligible. For long contexts on large models, the KV-cache
    can be gigabytes per request — the transfer time can exceed the prefill computation time itself.
  napkin_math: 'KV-cache: 8K × 320 KB = 2.62 GB. NVLink: 2.9 ms. IB NDR: 52 ms. With streaming (50% overlap):
    ~26 ms effective. With INT8 compression: 1.31 GB / 50 GB/s = 26 ms → 13 ms with compression. Prefill
    time: ~200 ms. Handoff adds ~13 ms (6.5% overhead).'
