title: Delta Lake vs Parquet for ML Versioning
scenario: Your ML platform stores training datasets as raw Parquet files on S3. Teams complain about broken training runs from concurrent writes, inability to reproduce past experiments, and slow dataset updates requiring full rewrites.
question: What properties does Delta Lake add over raw Parquet to solve these issues, and what are the performance costs?
details:
  realistic_solution: 'Delta Lake adds three properties raw Parquet lacks: (1) ACID transactions — concurrent writers are serialized via optimistic concurrency control on the transaction log. No more corrupted partial writes. (2) Time travel — every write creates a new version. `SELECT * FROM table VERSION AS OF 42` reproduces exactly the dataset used for training run 42. Versions are retained for a configurable period (default 30 days). (3) Incremental updates — UPDATE/DELETE/MERGE operations rewrite only affected Parquet files, not the entire dataset. For a 10 TB dataset with 1% daily changes, this writes 100 GB instead of 10 TB. Costs: transaction log overhead (~1 MB per 1,000 commits), listing _delta_log/ adds 100-500ms to first read, and small file problem from frequent updates requires periodic OPTIMIZE (compaction).'
  common_mistake: |
    **The Pitfall:** Assuming Delta Lake entirely replaces the Parquet format.
    **The Rationale:** Candidates misunderstand that Delta Lake is merely an ACID transaction log and metadata layer built *on top* of standard Parquet files.
    **The Consequence:** Misconfiguring storage pipelines and overestimating the required changes to downstream consumers that can already read Parquet.
  napkin_math: |
    1. Raw Parquet update (1% change to 10 TB): rewrite 10 TB at 500 MB/s = 5.6 hours, cost: $45.
    2. Delta Lake MERGE (1% change): rewrite affected files only ≈ 200 GB at 500 MB/s = 6.7 minutes, cost: $1.80.
    3. Time travel storage (30 days * 200 GB/day) = 6 TB versioned files.
    4. S3 cost: 16 TB = $368/month vs 10 TB = $230/month.
    **Delta Lake costs 60% more in storage but cuts update times from hours to minutes.**
