title: The SSA Form Purpose
scenario: A colleague asks why ML compilers convert computation graphs into Static Single Assignment (SSA)
  form before running optimization passes. What property of SSA makes it essential for compiler optimization,
  and what would go wrong without it?
question: "What property of SSA makes it essential for compiler optimization, and what would go wrong without it?"
details:
  realistic_solution: 'SSA ensures every variable is defined exactly once, which makes def-use chains
    explicit and trivial to traverse. This is critical because most compiler optimizations — dead code
    elimination, constant propagation, common subexpression elimination — require knowing which definition
    reaches which use. Without SSA, the compiler must run iterative dataflow analysis to compute reaching
    definitions, which is O(n²) in the number of statements per pass. With SSA, the answer is immediate:
    there is exactly one definition per variable, and phi nodes at control-flow merge points make the
    choice explicit. For ML compilers specifically, SSA enables efficient operator fusion decisions: the
    compiler can trivially trace data dependencies to determine which operators can be fused without violating
    correctness.'
  common_mistake: '"SSA is just an internal detail — any graph representation works equally well for optimization."
    Without SSA, reaching-definition analysis becomes expensive and error-prone, making many optimizations
    impractical.'
  napkin_math: For a graph with 1,000 operations, reaching-definition analysis without SSA requires O(1,000²)
    = 1M iterations per pass. With SSA, dependency lookup is O(1) per variable. For a compilation pipeline
    with 20 optimization passes, this saves ~20M iterations — the difference between milliseconds and
    seconds of compile time.
