title: GPU Shared Memory Tiling
scenario: A custom CUDA matrix multiplication kernel runs on an A100 80GB and reads
  a 1GB matrix. It currently suffers from low SM utilization.
question: To maximize tensor core throughput, which specific level of the GPU memory
  hierarchy must the matrix be tiled into, and what is its strict hardware limit?
details:
  realistic_solution: The matrix must be tiled into the L1 Cache / Shared Memory of
    the Streaming Multiprocessor (SM). On the A100, the maximum configurable shared
    memory per SM is 164 KB.
  common_mistake: Stating L2 cache instead of L1/Shared Memory, or assuming GB-scale
    SRAM.
  napkin_math: 164 KB per SM limit
