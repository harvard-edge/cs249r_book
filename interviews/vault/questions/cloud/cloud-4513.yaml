title: GPU Shared Memory Tiling
scenario: A custom CUDA matrix multiplication kernel runs on a GPU and reads a 1GB matrix. It currently suffers from low SM utilization.
question: To maximize tensor core throughput, which specific level of the GPU memory hierarchy must the matrix be tiled into, and what is its strict hardware limit?
details:
  realistic_solution: The matrix must be tiled into the L1 Cache / Shared Memory of the Streaming Multiprocessor (SM). On modern datacenter GPUs, the maximum configurable shared memory per SM is strictly limited.
  common_mistake: |
    **The Pitfall:** Stating L2 cache instead of L1/Shared Memory, or assuming GB-scale SRAM.
    **The Rationale:** Developers accustomed to CPU hierarchies overestimate the size and role of caches on GPUs, missing the explicit developer-managed nature of Shared Memory tiling.
    **The Consequence:** Designing kernels that thrash L2 and fail to feed the Tensor Cores at line rate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * The GPU allows a maximum configurable shared memory limit per SM.
    2. **Calculations:**
       * Hardware Limit = 164 KB per SM (for standard datacenter GPUs like A100).
    3. **Conclusion & Interpretation:**
       * **Result: L1/Shared Memory Limit.** 164 KB maximum shared memory per SM must be targeted for tiling.
