title: Network Calculus for ML Traffic Guarantees
scenario: You need to provide worst-case latency bounds for activation transfers in a 32-stage pipeline-parallel
  job over a 3-tier Clos network. Each hop has a 400Gbps link and a 2MB per-port buffer. Using network
  calculus concepts, derive the maximum end-to-end delay for an 8MB activation tensor traversing 6 switch
  hops (3 up, 3 down in the Clos).
details:
  realistic_solution: 'End-to-end delay = Σ(serialization + propagation + queuing) per hop. Per hop: Serialization
    = 8MB / 50GB/s = 160μs (400Gbps). Propagation = ~500ns (5m copper at 2/3 c). Queuing worst case =
    buffer_drain_time = 2MB / 50GB/s = 40μs (if buffer is full when our packet arrives). For 6 hops: Best
    case (no queuing) = 6 × (160μs + 0.5μs) = 963μs ≈ 1ms. Worst case (all buffers full) = 6 × (160μs
    + 0.5μs + 40μs) = 1203μs ≈ 1.2ms. In network calculus terms, the service curve is a rate-latency server
    with rate R = 400Gbps and latency T = 40μs per hop. The arrival curve for an 8MB burst is σ = 8MB,
    ρ = 0 (single burst). Maximum delay per hop = σ/R + T = 160μs + 40μs = 200μs. Total = 6 × 200μs =
    1.2ms. This 1.2ms bound ensures pipeline microbatch timing is predictable.'
  common_mistake: Only accounting for serialization and propagation delay while ignoring queuing. In a
    shared fabric, each hop can add queuing delay up to the full buffer drain time, and these delays are
    additive across hops.
  napkin_math: 'Serialization: 8MB / 50 GB/s = 160μs per hop. Max queuing: 2MB / 50 GB/s = 40μs per hop.
    6 hops × 200μs = 1.2ms worst case. Pipeline microbatch interval = 2ms. Activation transfer uses 1.2ms/2ms
    = 60% of the budget at worst — tight but feasible with 0.8ms margin.'
