title: Multi-Level Memory Hierarchy Specification for 405B LLM Inference
scenario: 'Specify a memory hierarchy system for serving Llama-3-405B (FP8 = 405GB)
  on a production cluster. The model must serve 500 concurrent users with 8192 context.
  Available: H100 80GB (3.35 TB/s HBM3), NVMe SSD (7 GB/s), DRAM (300 GB/s). Design
  the tiered memory strategy.'
question: Can Llama-3-405B FP8 serve 500 concurrent 8192-token users on H100s, and
  what tiered memory strategy or limits are required?
details:
  realistic_solution: 'Model: 405GB FP8. Single H100: 80GB — only 20% of model fits. Strategy: tensor parallelism across 8 H100s = 640GB HBM total > 405GB. Full model in HBM. KV cache: per token per layer KV (GQA with 8 KV heads) = 2×8×128×1B = 2048 bytes. 126 layers: 258,048 bytes/token. 500 users × 8192 tokens = 4,096,000 tokens × 258,048 bytes ≈ 1057GB — impossible on 8 GPUs. Fix: must limit concurrency or context, or use CPU offload. Realistic limit: 100 concurrent, 8192 context, FP8 KV. KV: 100×8192×258,048 bytes ≈ 211GB. Total memory needed: 405GB (model) + 211GB (KV) = 616GB. This requires 8×H100s (640GB) to fit entirely in HBM.'
  common_mistake: Trying to fit the full model in GPU HBM without considering tiered
    inference where inactive layers reside in CPU DRAM and are streamed to GPU on
    demand.
  napkin_math: 'Model FP8: 405GB. Per-token KV (FP8, all layers): 2 (K+V) × 126 layers × 8 heads × 128 dim × 1B = 258,048 bytes/token. 500 users × 8192 tokens = 4,096,000 tokens × 258,048 bytes ≈ 1057GB KV. Total: 405+1057 = 1462GB — far beyond 8×H100 (640GB). Must limit concurrency: 100 users × 8192 tokens × 258,048 bytes ≈ 211GB. Total: 405GB + 211GB = 616GB → fits in 8 H100s.'
