title: Evaluating Backdoor Mitigations in Cloud Code Gen
scenario: 'You are deploying a 15B parameter code generation LLM trained on 500B tokens using a cluster
  of 512 A100 GPUs. The security team suspects a sophisticated backdoor attack: a specific, seemingly
  benign docstring trigger causes the model to generate insecure cryptographic implementations. The estimated
  contamination rate in the training data is 0.005% (approx 25 million tokens). You must evaluate the
  trade-offs between implementing dataset sanitization via activation clustering (Spectral Signatures)
  versus applying inference-time prompt perturbation to neutralize the backdoor. Justify your architectural
  choice focusing on overall compute cost, inference latency, and the risk of degrading benign model performance.'
details:
  realistic_solution: Compute spectral signatures of latent activations on the training data to identify
    and filter the backdoor-contaminated samples, then fine-tune the existing model on a small trusted
    clean dataset to unlearn the malicious behavior. This approach costs ~2.2 days of offline compute
    with zero inference latency penalty, completely avoiding the accuracy degradation that inference-time
    perturbation would cause on benign coding queries.
  common_mistake: Candidates often propose retraining from scratch after applying a naive keyword filter,
    ignoring that triggers can be semantically obfuscated and full retraining costs ~6.7 days on 512 A100s.
    Targeted unlearning via activation clustering plus fine-tuning is orders of magnitude cheaper.
  napkin_math: Retraining 15B params on 500B tokens = ~4.5e22 FLOPs (~6.7 days on 512 A100s at 150 TFLOPs).
    Fine-tuning on 1B trusted tokens = ~9e19 FLOPs (<20 minutes). A forward pass for activation clustering
    takes ~1.5e22 FLOPs (~2.2 days). The offline clustering + fine-tuning costs ~2.2 days but incurs zero
    inference latency penalty, whereas perturbation adds latency to every query and degrades general coding
    accuracy.
