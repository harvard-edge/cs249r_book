title: Chiplet Roofline Model for Mixed Precision LLM Training
scenario: You are comparing BF16 training performance on MI300X (5.3 TB/s, ~1826 TFLOPS BF16) vs H100 SXM5 (3.35 TB/s, 989 TFLOPS BF16). For a batch of transformer forward passes with arithmetic intensity 120 FLOP/byte, predict which accelerator is bandwidth-bound vs compute-bound.
question: At 120 FLOP/byte arithmetic intensity, are MI300X and H100 BF16 transformer forward passes bandwidth-bound or compute-bound, and what throughput do you expect?
details:
  realistic_solution: 'Ridge point = Peak TFLOPS / Peak BW. H100: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte. MI300X: 1826 TFLOPS / 5.3 TB/s = 345 FLOP/byte. Arithmetic intensity = 120 FLOP/byte. Both accelerators: 120 < 295 (H100 ridge) and 120 < 345 (MI300X ridge) → both are memory-bandwidth bound at this intensity. Achieved TFLOPS = BW * arithmetic_intensity. H100: 3.35 TB/s * 120 = 402 TFLOPS. MI300X: 5.3 TB/s * 120 = 636 TFLOPS. MI300X is 58% faster for this workload — primarily due to its 58% higher memory bandwidth, not its compute advantage.'
  common_mistake: |
    **The Pitfall:** Comparing peak TFLOPS directly and concluding MI300X always wins proportionally to its compute advantage.
    **The Rationale:** Candidates fail to apply the roofline model and identify the ridge point, which dictates whether a workload actually uses the peak compute or is bottlenecked by memory.
    **The Consequence:** Incorrectly predicting performance scaling and making flawed hardware procurement decisions for low arithmetic-intensity workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 SXM5: 989 TFLOPS, 3.35 TB/s.
       - MI300X: 1826 TFLOPS, 5.3 TB/s.
       - Workload Arithmetic Intensity: 120 FLOP/byte.
    2. **Calculations:**
       - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte.
       - MI300X Ridge Point: 1826 TFLOPS / 5.3 TB/s = 345 FLOP/byte.
       - Constraint Check: 120 < 295 (H100) and 120 < 345 (MI300X). Both are memory bandwidth-bound.
       - H100 Achieved: 3.35 TB/s * 120 = 402 TFLOPS.
       - MI300X Achieved: 5.3 TB/s * 120 = 636 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** Both accelerators are bandwidth-bound; the MI300X is 1.58x faster purely due to its higher memory bandwidth.
