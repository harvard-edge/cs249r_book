title: The Expert Bottleneck
scenario: You are training a Mixture-of-Experts (MoE) model. During a fine-tuning run on Python code,
  you notice your training throughput drops by 8x. Based on the router diagram, what is causing the massive
  compute starvation on the other GPUs?
question: "Based on the router diagram, what is causing the massive compute starvation on the other GPUs?"
details:
  realistic_solution: Expert 2 has hit its **Capacity Limit**. In MoE, frameworks pre-allocate a fixed
    capacity per expert. When a prompt is domain-specific (like code), the router sends nearly all tokens
    to one expert. That expert becomes a bottleneck, forcing the system to either drop tokens or serialize
    execution, leaving the other expert GPUs idle. The fix is **Expert Replication** (cloning hot experts)
    or using an **Auxiliary Load-Balancing Loss** during training.
  common_mistake: '"Just add more GPUs for Expert 2." You can''t dynamically clone model weights to new
    GPUs at the microsecond timescale of a forward pass without massive overhead.'
  napkin_math: If 8 experts each have a capacity of $C$ tokens, but one expert receives $8C$ tokens, that
    expert takes 8x longer to compute while the other 7 GPUs sit at 0% utilization for 87.5% of the step
    time.
