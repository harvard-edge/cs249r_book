title: The Expert Bottleneck
scenario: You are training a Mixture-of-Experts (MoE) model with 8 experts on 8 H100
  GPUs (1 expert per GPU) using top-1 routing. During a fine-tuning run on Python
  code, training throughput drops by 8x. Per-GPU profiling shows expert 2's compute
  time is 8x higher than the others, while experts 0, 1, 3-7 sit at near-zero utilization
  for most of the step. Diagnose the cause and propose a fix.
question: Why does fine-tuning on Python code starve 7 of 8 expert GPUs and 8x degrade
  MoE training throughput, and how do you fix it?
details:
  realistic_solution: Expert 2 has hit its **Capacity Limit**. In MoE, frameworks
    pre-allocate a fixed capacity per expert. When a prompt is domain-specific (like
    code), the router sends nearly all tokens to one expert. That expert becomes a
    bottleneck, forcing the system to either drop tokens or serialize execution, leaving
    the other expert GPUs idle. The fix is **Expert Replication** (cloning hot experts)
    or using an **Auxiliary Load-Balancing Loss** during training.
  common_mistake: '"Just add more GPUs for Expert 2." You can''t dynamically clone
    model weights to new GPUs at the microsecond timescale of a forward pass without
    massive overhead.'
  napkin_math: If 8 experts each have a capacity of $C$ tokens, but one expert receives
    $8C$ tokens, that expert takes 8x longer to compute while the other 7 GPUs sit
    at 0% utilization for 87.5% of the step time.
