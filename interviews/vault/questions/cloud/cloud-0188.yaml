title: 'The ''Laggy'' Code Assistant: A Batching Design Challenge'
scenario: You are the tech lead for 'StaffML Code,' a new real-time AI code assistant service. The product manager has defined two strict, user-facing SLOs.
question: What serving architecture can meet StaffML Code's strict TTFT and TPOT SLOs without the static batching trade-off?
details:
  realistic_solution: The correct approach is to design and implement a **continuous batching** (or 'dynamic batching') engine. This architecture decouples request arrival from batch execution.
  common_mistake: |
    **The Pitfall:** Proposing a naive fix like 'just decrease the static batching window.'
    **The Rationale:** Engineers assume reducing the window directly reduces wait time without considering the impact on throughput.
    **The Consequence:** Shrinking the batch size lowers arithmetic intensity, killing throughput (TPOT) and making the system memory-bound. Adding GPUs increases cost without fixing the head-of-line blocking flaw.
  napkin_math: |
    1. Analyze static batching: A fixed window forces requests to wait, causing head-of-line blocking.
    2. Analyze continuous batching: Decouples arrival from execution, allowing requests to join the batch immediately after prefill.
    3. **Conclusion: Continuous batching is required to meet strict TTFT and TPOT.**
