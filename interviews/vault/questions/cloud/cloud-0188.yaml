title: 'The ''Laggy'' Code Assistant: A Batching Design Challenge'
scenario: 'You are the tech lead for ''StaffML Code,'' a new real-time AI code assistant service. The
  product manager has defined two strict, user-facing SLOs:'
details:
  realistic_solution: The correct approach is to design and implement a **continuous batching** (or 'dynamic
    batching') engine. This architecture decouples request arrival from batch execution.
  common_mistake: The most common mistake is to propose a naive fix like 'just decrease the static batching
    window.' While this reduces the maximum queuing delay, it shrinks the batch size, which lowers arithmetic
    intensity and kills throughput (TPOT). This makes the system more memory-bound and inefficient. Another
    common mistake is to suggest 'adding more GPUs,' which increases cost but doesn't fix the underlying
    scheduling flaw causing head-of-line blocking.
  napkin_math: Let's analyze why static batching fails and continuous batching succeeds for a 13B model
    on an H100.
