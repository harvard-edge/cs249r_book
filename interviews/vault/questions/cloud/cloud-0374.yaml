title: The Power Efficiency Trap
scenario: 'You''re a cloud engineer designing a system for a large fleet of edge devices. Your team has a strict thermal design power budget of 30W per device. You''re evaluating two accelerators: a Jetson AGX Orin and a Hailo-8.'
question: "Within a 30W TDP budget, which accelerator delivers higher sustained INT8 throughput, and what effective TOPS can it sustain?"
details:
  realistic_solution: The key is to first calculate the power efficiency (TOPS/W) for each accelerator, and then use that to determine the sustained performance possible within the 30W thermal budget, respecting each chip's own maximum power limit.
  common_mistake: |
    **The Pitfall:** Fixating on peak TOPS marketing numbers or extrapolating power efficiency infinitely.
    **The Rationale:** Engineers either ignore the thermal budget constraints entirely or assume a highly efficient chip can scale up to the TDP limit without hitting its physical die limit.
    **The Consequence:** Hardware selection is fundamentally flawed, leading to severe thermal throttling or artificial performance caps.
  napkin_math: |
    1. **Assumptions & Constraints:** 30W TDP limit, Orin max 60W (275 TOPS), Hailo max 2.5W (26 TOPS).
    2. **Calculations:** Orin efficiency: 275 TOPS / 60W = 4.58 TOPS/W. Orin at 30W: 30W * 4.58 TOPS/W = 137.4 TOPS. Hailo-8 efficiency: 26 TOPS / 2.5W = 10.4 TOPS/W. Hailo-8 at 30W is physically capped at its max 26 TOPS.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound by Thermal Limits.** Orin delivers higher total throughput (137.4 TOPS), despite Hailo-8 being more power-efficient per watt.
  options:
  - Hailo-8, because its TOPS/W efficiency is over 2x higher.
  - Jetson Orin, because its peak performance (275 TOPS) is the highest.
  - Jetson Orin, because at 30W it can sustain ~137 TOPS, while the Hailo-8 is capped at 26 TOPS.
  - Hailo-8, because with its higher efficiency it can deliver 312 TOPS (10.4 TOPS/W * 30W) in a 30W budget.
