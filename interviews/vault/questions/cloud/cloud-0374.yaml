classification_review: Flash is correct on both counts. The question explicitly asks to 'calculate its effective TOPS' — this is napkin-math, not concept-recall. Additionally, the napkin_math field is truncated ('1. Calculate efficiency (TOPS/W) for each chip:' with no actual numbers). RC-10 (Cost Optimization) is acceptable but RC-2 (Performance Optimization) is a better fit since the question is about performance per watt within a power budget. Fix mode to napkin-math and complete the calculation.
