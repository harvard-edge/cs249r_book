title: Wave Quantization in Kernel Launch
scenario: Your H100 has 132 SMs. You launch a kernel with 140 thread blocks. The first wave fills all 132 SMs, and the second wave uses only 8 SMs (6% utilization). This 'tail wave' wastes 94% of the GPU for the duration of those 8 blocks. Calculate the efficiency loss and determine the optimal number of thread blocks to avoid wave quantization.
question: What is the efficiency loss of the 140-block kernel, and what is the optimal number of thread blocks?
details:
  realistic_solution: 'The kernel runs in two waves. Each wave takes time T. Total time is 2T. Total possible SM compute in 2T is 132 × 2 = 264 block-times. Useful compute is 140 block-times. Efficiency = 140 / 264 = 53%. Efficiency loss is 47%. The optimal number of thread blocks is a multiple of the SM count (e.g., 132, 264) to ensure 100% utilization in all waves.'
  common_mistake: Launching a number of thread blocks that slightly exceeds a multiple of SM count. The last partial wave runs with most SMs idle, wasting expensive GPU time. This is especially harmful for small kernels where the tail wave dominates total runtime.
  napkin_math: 'Runtime = 2 waves. Total SM-waves = 2 × 132 = 264. Utilized = 140. Wasted = 124. Efficiency loss = 124 / 264 = 47%.'
