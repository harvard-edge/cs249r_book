title: 'MoE Granularity: Few Large vs Many Small Experts'
scenario: 'You are designing a 1T-parameter MoE model. Option A: 8 experts of 125B
  parameters each (Mixtral-style coarse-grained). Option B: 256 experts of ~4B parameters
  each (DeepSeek-V3-style fine-grained), selecting top-8. Both have ~1T total and
  similar active FLOPs. Evaluate the systems tradeoffs.'
question: How would you evaluate the systems tradeoffs between 8×125B coarse experts
  and 256×4B top-8 fine-grained experts?
details:
  realistic_solution: 'Option A (8×125B): Each expert requires ~250 GB in BF16 — needs
    TP=4 within each expert. All-to-all dispatches to only 2 of 8 destinations (low
    communication fanout). Load imbalance impact is severe: one slow expert means
    7 GPUs idle. Serving: 8 experts is easier to replicate and balance. Option B (256×4B):
    Each expert is 8 GB in BF16 — fits on one GPU. All-to-all dispatches to 8 of 256
    destinations (high fanout but small messages). Load balance is naturally better
    with more experts and top-8 selection. Routing collapse risk is higher with 256
    experts. Serving: need all 256 experts resident — requires many GPUs or expert
    offloading. Communication: 256-expert all-to-all across many nodes is bandwidth-intensive.
    DeepSeek-V3 chose fine-grained (256 experts) because: better routing flexibility,
    natural load balance with top-8, each expert fits one GPU (no within-expert parallelism
    needed), and fine-grained specialization improves quality.'
  common_mistake: Focusing only on model quality (fine-grained is usually better).
    The systems implications of expert granularity are profound and often determine
    whether the model is practically trainable and servable.
  napkin_math: 'Option A: 8 experts × 125B × 2B = 2 TB weights. TP=4 per expert →
    32 GPUs minimum. Option B: 256 experts × 4B × 2B = 2 TB weights. 1 expert/GPU
    → 256 GPUs minimum. All-to-all fanout: A=2/8, B=8/256. Message size per dispatch:
    A=large (125B expert inputs), B=small (4B expert inputs).'
