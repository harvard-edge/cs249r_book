title: 'MoE Granularity: Few Large vs Many Small Experts'
scenario: 'You are designing a 1T-parameter MoE model. Option A: 8 experts of 125B parameters each (Mixtral-style coarse-grained). Option B: 256 experts of ~4B parameters each (DeepSeek-V3-style fine-grained), selecting top-8. Both have ~1T total and similar active FLOPs.'
question: How would you evaluate the systems tradeoffs between 8x125B coarse experts and 256x4B top-8 fine-grained experts?
details:
  realistic_solution: 'Option A (8x125B): Each expert requires ~250 GB in BF16 — needs TP=4 within each expert. All-to-all dispatches to only 2 of 8 destinations (low communication fanout). Load imbalance impact is severe. Serving: 8 experts is easier to replicate. Option B (256x4B): Each expert is 8 GB in BF16 — fits on one GPU. All-to-all dispatches to 8 of 256 destinations (high fanout but small messages). Load balance is naturally better. DeepSeek-V3 chose fine-grained because: better routing flexibility, natural load balance, each expert fits one GPU, and fine-grained specialization improves quality.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on model quality.
    **The Rationale:** Candidates know fine-grained experts yield better quality, but ignore the deep systemic implications of tensor parallel constraints, communication fanout, and serving overhead.
    **The Consequence:** Designing an architecture that is impossible to serve efficiently or requires massive all-to-all communication overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Option A (8x125B).
       - Option B (256x4B).
    2. **Calculations:**
       - Option A: Weight size = 8 * 125B * 2B (BF16) = 2 TB. Tensor Parallelism (TP) needed within experts due to 250GB expert size. Fanout = 2/8.
       - Option B: Weight size = 256 * 4B * 2B = 2 TB. Experts fit on 1 GPU (8GB each). Fanout = 8/256.
    3. **Conclusion & Interpretation:** **Result: Memory-Capacity-Bound.** Option B avoids TP within experts but increases routing complexity and minimum GPU serving count.
