title: TensorRT Dynamic Shapes Trade-offs
scenario: Your team is deploying a BERT-Large model (340M parameters) on a GPU for a real-time document classification service. Requests arrive with highly variable sequence lengths (from 16 to 512 tokens). You are evaluating two TensorRT compilation strategies: 1) Padding all inputs to a static shape of 512 and compiling a single FP16 engine, or 2) Using TensorRT's dynamic shapes with multiple optimization profiles (e.g., 64, 128, 256, 512) in INT8. Evaluate the trade-offs between compute waste from padding versus the kernel selection overhead, profile memory footprint, and calibration complexity.
question: "Should you use one static 512-token FP16 engine or INT8 dynamic shapes with optimization profiles for the 10ms P99 SLA, and why?"
details:
  realistic_solution: Implement dynamic shapes with a minimal set of 2-3 optimization profiles (e.g., 128, 512) paired with request bucketing in the serving layer (e.g., Triton). This bounds the memory overhead while recovering most of the compute lost to padding.
  common_mistake: |
    **The Pitfall:** Assuming dynamic shapes with many profiles is always optimal.
    **The Rationale:** Candidates ignore the massive increase in engine size, execution context memory overhead, and potential for sub-optimal kernel selection at runtime when too many profiles are generated.
    **The Consequence:** OOM errors during deployment or unexpected latency spikes due to thrashing execution contexts.
  napkin_math: |
    - **Static 512:** Processing a 32-token sequence wastes 93.7% of compute (480/512 padded).
    - **Dynamic bucket at 128:** Processing a 32-token sequence wastes 75% (96/128).
    - **Result:** **A 5x reduction in wasted FLOPs per short request**, easily justifying the slight memory overhead of multiple optimization profiles.
