title: KV Cache External Fragmentation Constraints
scenario: You are deploying a 13B parameter LLM on an A100 40GB GPU. Model weights and activations reserve
  28GB, leaving 12GB for the KV cache pool, which uses a traditional contiguous memory allocator. After
  serving mixed-length requests for an hour, telemetry shows 6GB of total free KV cache memory. However,
  4.5GB of this free memory is scattered across 30MB gaps between active allocations, while the remaining
  1.5GB exists as a single contiguous block. Calculate how many new concurrent requests can be admitted
  if each requires a 150MB contiguous block for its maximum sequence length.
details:
  realistic_solution: Only the 1.5GB contiguous block can satisfy the 150MB KV cache allocation requests.
    The system can admit only 10 new requests (1.5GB / 150MB). The 4.5GB of fragmented 30MB blocks are
    completely unusable for 150MB allocations, representing 75% external fragmentation of free memory.
    Migrating to PagedAttention, which allocates KV cache in small fixed-size pages (e.g., 32KB), would
    eliminate the contiguous requirement and make all 6GB of free memory usable for ~40 concurrent requests.
  common_mistake: Assuming all free memory is usable and dividing the total free 6GB by 150MB to estimate
    40 admissible requests, ignoring that traditional KV cache allocators require contiguous memory blocks.
  napkin_math: "Admissible requests = 1.5GB contiguous / 150MB = 10 requests. \nWasted capacity = 4.5GB\
    \ / 150MB = 30 theoretically lost requests. \nExternal fragmentation rate of free memory = 4.5GB /\
    \ 6.0GB = 75%. \nMigrating to PagedAttention would eliminate this contiguous requirement, allowing\
    \ all 6GB (40 requests) to be utilized."
