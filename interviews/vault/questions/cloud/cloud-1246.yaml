title: KV Cache External Fragmentation Constraints
scenario: 'You are deploying a 13B parameter LLM on an A100 40GB GPU. Model weights and activations reserve 28GB, leaving 12GB for the KV cache pool, which uses a traditional contiguous memory allocator. After serving mixed-length requests for an hour, telemetry shows 6GB of total free KV cache memory. However, 4.5GB of this free memory is scattered across 30MB gaps between active allocations, while the remaining 1.5GB exists as a single contiguous block.'
question: 'How many new requests needing 150MB contiguous KV cache blocks can be admitted, and how much free memory is unusable fragmentation?'
details:
  realistic_solution: |
    Only the 1.5GB contiguous block can satisfy the 150MB KV cache allocation requests. The system can admit only 10 new requests (1.5GB / 150MB). The 4.5GB of fragmented 30MB blocks are completely unusable for 150MB allocations, representing 75% external fragmentation of free memory. Migrating to PagedAttention, which allocates KV cache in small fixed-size pages (e.g., 32KB), would eliminate the contiguous requirement and make all 6GB of free memory usable for ~40 concurrent requests.
  common_mistake: |
    **The Pitfall:** Assuming all free memory is usable.
    **The Rationale:** Candidates divide the total free 6GB directly by 150MB, ignoring that traditional KV cache allocators require contiguous memory blocks.
    **The Consequence:** The system rejects requests despite appearing to have enough capacity, baffling operations teams.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unusable Fragmented Memory: 4.5GB scattered in 30MB gaps.
    - Contiguous Free Memory: 1.5GB.
    - Allocation Requirement: 150MB contiguous blocks.

    **Calculations:**
    - Admissible Requests: 1.5GB / 150MB = 10 requests.
    - External Fragmentation Rate: 4.5GB / 6.0GB = 75%.
    - PagedAttention Fix: 6.0GB / 150MB = 40 requests.

    **Conclusion & Interpretation:**
    - **Result: 10 requests (Memory-Bound)**. Traditional allocators severely limit capacity due to 75% external fragmentation, which PagedAttention eliminates.
