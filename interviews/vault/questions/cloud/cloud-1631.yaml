title: Multicalibration Sample Complexity for Clinical Risk
scenario: 'You are deploying a cloud-based healthcare diagnostic model that must be multicalibrated across intersecting attributes: 5 age groups, 4 ethnicities, and 2 genders (40 total intersecting subgroups). To achieve an alpha-calibration error of <= 0.02, statistical learning guidelines dictate you need at least N = 1/(alpha^2) samples per subgroup. The rarest intersecting subgroup comprises only 0.5% of your overall patient population.'
question: "What total validation dataset size is needed so the rarest 0.5% intersecting subgroup has enough samples for α≤0.02 calibration?"
details:
  realistic_solution: 'First calculate the necessary samples to achieve the target calibration error rate (2,500 samples). Then, identify the rarest intersectional subgroup and divide the required sample count by its population frequency to determine the total global dataset size required.'
  common_mistake: |
    **The Pitfall:** Calculating sample sizes for marginal demographic groups independently rather than intersecting subgroups, or failing to scale the per-subgroup requirement by the rarest intersection's base rate.
    **The Rationale:** Candidates often apply sample complexity formulas to the global population or single attributes without considering the multiplicative nature of intersectional subgroups and their base rates.
    **The Consequence:** The rarest subgroup is severely under-sampled, resulting in a model that fails multicalibration guarantees and exhibits disparate impact for minority demographics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target alpha-calibration error: α ≤ 0.02.
       - Sample complexity per subgroup: N = 1 / α².
       - Rarest subgroup frequency: 0.5% (0.005).
    2. **Calculations:**
       - Target samples per subgroup = 1 / (0.02)² = 1 / 0.0004 = 2,500.
       - Total validation dataset size = 2,500 / 0.005 = 500,000 samples.
    3. **Conclusion & Interpretation:**
       - **Result: 500,000 samples**. The global validation dataset must be massively scaled to satisfy intersectional fairness constraints for the tail of the distribution.
