title: Evaluating Discrepancies in GPU Power Measurement Techniques
scenario: You are evaluating the energy efficiency of a novel sparse attention mechanism on a cluster
  of 8x NVIDIA H100 GPUs. A software-level profiling tool relying on 1Hz polling via `nvidia-smi` reports
  a 15% energy reduction per iteration compared to dense attention. However, the facility-level PDU (Power
  Distribution Unit) meters show only a 3% reduction in total power draw during the job. Evaluate these
  measurement methodologies to determine the ground-truth microsecond-resolution hardware energy consumption
  and justify which metrics to use for cluster-wide power-aware scheduling.
details:
  realistic_solution: Evaluate power using dedicated on-chip hardware power counters (e.g., accessed via
    NVIDIA DCGM or in-band NVML registers) that integrate power over the exact kernel execution time at
    microsecond resolution. The facility meter captures total system overhead, while software polling
    aliases the data. The hardware counters provide the true isolated GPU energy ground truth for scheduling
    decisions.
  common_mistake: Candidates often trust low-frequency software polling (like nvidia-smi) for highly dynamic
    workloads, failing to realize that a 1Hz to 10Hz sampling rate completely aliases sub-millisecond
    kernel power spikes and deep idle states, leading to massive inaccuracies in integrated energy estimations.
  napkin_math: H100 sparse attention kernel runs in 400µs. Standard `nvidia-smi` polling at 1Hz (1,000,000µs
    interval) means a single reading represents a tiny fraction of activity. Even at 10Hz (100,000µs),
    the 400µs kernel is only 0.4% of the interval window, missing 99.6% of transient power variance. Accurate
    H100 power measurement requires hardware counters (e.g., NVML energy registers).
