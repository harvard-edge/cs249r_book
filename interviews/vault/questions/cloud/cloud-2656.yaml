title: How Undeclared Data Dependencies Cause Silent Failures
scenario: A recommendation model uses a user_engagement_score feature. Unknown to the ML team, the upstream data engineering team changes the engagement score calculation from a 30-day rolling average to a 7-day rolling average.
question: Why can changing user_engagement_score from a 30-day to a 7-day rolling average cause a silent model failure?
details:
  realistic_solution: 'The model was trained on features computed with a 30-day window. The new 7-day window produces systematically different values: higher variance, more recency bias, different scale. The model doesn''t error out — it receives validly formatted floating point numbers — but its predictions degrade because the input distribution has shifted. This is a silent failure because: (1) no schema violation occurs (the column name and type are unchanged), (2) no error is thrown (values are within plausible ranges), (3) standard monitoring (latency, error rate) shows nothing wrong, (4) only prediction quality metrics degrade, often slowly enough to miss without statistical testing. The root cause is an undeclared dependency: the ML model implicitly depends on the upstream feature''s computation method, but this dependency exists nowhere in code, contracts, or documentation. The upstream team had no way to know their change would affect the ML model.'
  common_mistake: |
    **The Pitfall:** Assuming data pipeline changes are safe if the schema (column names, types) doesn't change.
    **The Rationale:** Engineers rely entirely on automated data typing checks rather than statistical distribution monitoring.
    **The Consequence:** A slow, silent degradation in model quality that goes undetected for weeks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30-day Avg vs 7-day Avg feature distribution.

    **Calculations:**
    - 30-day Avg: Mean=0.65, Std=0.1.
    - 7-day Avg: Mean=0.58, Std=0.25.

    **Conclusion & Interpretation:**
    - **Result: Distribution Shift (Data-Quality-Bound)**. The hidden upstream logic change causes a silent distribution shift, degrading model accuracy by 5-15%.
