title: The Underflow Crisis
scenario: You switch a pre-training job from FP32 to FP16 precision to save memory, but the training loss returns NaNs within the first 100 steps.
question: What numerical property is failing?
details:
  realistic_solution: Gradient underflow. FP16 only has 5 bits for the exponent, giving it a very narrow dynamic range ($6 \times 10^{-8}$ to $65504$). Small gradients in deep networks underflow to exactly 0.0, causing training to collapse. You must switch to BF16 (which uses 8 bits for the exponent, matching FP32's range) or implement dynamic loss scaling.
  common_mistake: |
    **The Pitfall:** Blaming the learning rate or model architecture for the collapse.
    **The Rationale:** Candidates often assume that hyperparameter tuning can fix numerical instability, failing to recognize the fundamental dynamic range limitations of FP16.
    **The Consequence:** The team wastes days tuning learning rates while the underlying format continues to underflow.
  napkin_math: |
    - **Analyze FP16 limits:** FP16 smallest subnormal ≈ 6 × 10^-8.
    - **Analyze BF16 limits:** BF16 smallest subnormal ≈ 9 × 10^-41.
    - **Compare with typical gradients:** Deep network gradients routinely hit 10^-12 to 10^-20.
    - **Conclusion:** **These gradients fall well below FP16's floor (causing underflow to 0.0) but sit safely within BF16's range.**
