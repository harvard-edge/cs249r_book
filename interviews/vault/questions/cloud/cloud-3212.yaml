title: 'MoE Serving Cost-per-Token Economics'
scenario: 'You are comparing the serving cost-per-token for a dense 70B model on $2\times$ H100 versus an MoE 8x7B (47B total, 13B active) on $2\times$ H100. Both serve at 1000 requests/second with 512-token outputs.'
question: 'What active and full FP16 weight footprints should you use for Mixtral 8x7B in the serving cost comparison, and why do both models require the same number of GPUs?'
details:
  realistic_solution: '13B active params at FP16 = 13B × 2B = 26GB (not 28GB which requires 14B params).'
  common_mistake: |
    **The Pitfall:** Comparing only per-token FLOPs.
    **The Rationale:** Candidates see that the MoE model has 5x fewer *active* FLOPs and mistakenly assume it requires 5x less hardware.
    **The Consequence:** Grossly underestimating serving costs, forgetting that all 47B expert weights must remain memory-resident across the GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: Mixtral 8x7B MoE (47B total params, 13B active params).
    - Precision: FP16 (2 bytes per param).
    - Hardware: H100 (80 GB).

    **Calculations:**
    - Active Memory: 13B * 2 bytes = 26 GB.
    - Total Memory: 46.7B * 2 bytes = 93.4 GB.
    - Hardware Requirement: 93.4 GB > 80 GB, requiring 2x H100 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 2x H100 required (Memory-Capacity-Bound)**. Despite lower active FLOPs, all 47B weights must reside in memory, matching the dense 70B hardware footprint.
