title: Feature Store Online vs Offline Latency Gap
scenario: Your recommendation system reads 200 features per request from a feature store. The offline
  store (Parquet on S3) serves batch training at 50ms/read, but the online store (Redis) must serve inference
  at p99 < 5ms. A new engineer proposes reading directly from S3 for online inference to 'keep one source
  of truth.' Why does this fail, and what latency math kills it?
details:
  realistic_solution: Online and offline stores exist for fundamentally different access patterns. Offline
    stores optimize for throughput (scan millions of rows for training), while online stores optimize
    for latency (point lookups by entity key). Redis serves point lookups in 0.5-2ms because data is pre-materialized
    in memory as key-value pairs. S3 requires a network round-trip (20-100ms), Parquet footer parsing,
    column projection, and decompression. For 200 features, you'd also need to join across multiple Parquet
    files. The correct architecture materializes features from the offline store into the online store
    via a feature pipeline, accepting eventual consistency (typically 1-60 min staleness).
  common_mistake: Assuming offline and online stores are interchangeable — that S3 reads can meet single-digit
    ms latency SLAs. S3 GET latency alone is 20-100ms p99, before any deserialization.
  napkin_math: 'Redis point lookup: 0.5ms × 200 features (batched via MGET): ~2ms total. S3 GET: 50ms
    × N files (sequential): 50-200ms minimum. Even with S3 Select: 20-50ms. p99 SLA is 5ms — S3 is 10-40×
    too slow. Feature pipeline sync cost: ~$50/month for a 10M-entity store refreshed every 15 min.'
