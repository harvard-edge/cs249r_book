title: Gradient Bucket Size Tuning for Optimal Communication Overlap
scenario: Your DDP training of a 1.3B parameter model across 32 H100 GPUs has 40%
  communication overhead despite gradient bucketing. The current bucket size is 25MB
  (PyTorch default). Network is 400 Gbps InfiniBand. Profiling shows many small AllReduce
  calls with high startup latency. Optimize the bucket configuration.
question: How would you tune DDP gradient bucket size to reduce the 40% communication
  overhead for the 1.3B model on 32 H100s?
details:
  realistic_solution: 'Optimal bucket size depends on the tradeoff between AllReduce
    startup latency and overlap opportunity. (1) Current: 25MB buckets = 1.3B x 4
    / 25M = 208 buckets. Each AllReduce has ~50us startup latency: 208 x 50us = 10.4ms
    wasted on startup. (2) Increase to 100MB buckets: 52 buckets, 2.6ms startup. But
    fewer, larger AllReduces start later, reducing overlap. (3) Optimal: profile and
    find the knee. Typically 50-100MB for InfiniBand. Also try NCCL tree AllReduce
    (lower latency for large messages) and set NCCL_MIN_NCHANNELS=4 for better bandwidth
    utilization. (4) Use torch.nn.parallel.DistributedDataParallel(bucket_cap_mb=100)
    and measure throughput.'
  common_mistake: Making buckets larger to reduce the number of AllReduce calls without
    considering that larger buckets delay the start of communication (more gradients
    must be computed before a bucket is full).
  napkin_math: '1.3B params x 4 bytes = 5.2GB gradients. AllReduce at 400 Gbps (50
    GB/s): 5.2GB / 50 = 104ms without overlap. Backward pass: ~200ms. With perfect
    overlap: max(200, 104) = 200ms. With 40% overhead: 200 + 80ms = 280ms. Fixing
    bucket size could reduce to ~210-220ms.'
