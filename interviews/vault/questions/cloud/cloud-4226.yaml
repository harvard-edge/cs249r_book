title: Storage Format for Streaming Inference Logs
scenario: 'Your LLM inference service on H100s generates 500K inference logs per second,
  each containing: prompt (variable length, ~2KB avg), response (variable length,
  ~4KB avg), latency metrics (fixed, 200 bytes), and token probabilities (variable,
  ~1KB avg). Total throughput: 3.5 GB/s. These logs must be stored for model monitoring,
  fine-tuning, and compliance. Design the storage format and pipeline to handle this
  throughput at minimal cost.'
question: How would you design a low-cost storage pipeline for 500K LLM inference
  logs per second at 3.5 GB/s?
details:
  realistic_solution: 'Architecture: (1) Buffer logs in memory (ring buffer, 30-second
    window = 105 GB — too large). Instead, use a streaming aggregation: Kafka topics
    partitioned by inference server (50 partitions for 50 servers). Each partition
    handles 10K records/s = well within Kafka broker capacity. (2) Kafka consumers
    batch records and write to S3 as Parquet files every 60 seconds. Parquet is ideal
    here: prompts and responses compress 3-5× with dictionary + Zstd encoding (natural
    language has low entropy). Fixed-width metrics columns get excellent compression.
    (3) Partition S3 by date/hour for efficient time-range queries. File size: 60s
    × 3.5 GB/s / 3× compression = 70 GB/minute in Parquet files. (4) For real-time
    monitoring, maintain a 1-hour sliding window in Redis (summary statistics only,
    not raw logs). For fine-tuning data selection: query Parquet files with Athena/Presto,
    selecting by quality metrics.'
  common_mistake: Writing individual log records to a database or object store. 500K
    writes/s exceeds most database throughput limits, and S3 PUT rate limits at 3,500
    PUT/s per prefix — you'd need 143 prefixes just for write throughput.
  napkin_math: 'Raw throughput: 3.5 GB/s × 86,400 s/day = 302 TB/day. With Parquet
    + Zstd (3× compression): 101 TB/day. S3 cost: 101 TB × 30 days × $0.023/GB = $69.7K/month.
    With S3 Intelligent Tiering (archive after 7 days): 7 days hot (101 × 7 = 707
    TB × $0.023) + 23 days archive (101 × 23 = 2.3 PB × $0.004) = $16.3K + $9.3K =
    $25.6K/month. Savings vs all-hot: 63%. Kafka cluster: 50 brokers × $0.10/hr =
    $3,600/month. Total infrastructure: ~$30K/month for 3 PB/month of inference logs.'
