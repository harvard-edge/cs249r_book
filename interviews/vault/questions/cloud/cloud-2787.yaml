title: Energy Gap Projection
scenario: In 2024, training a frontier model takes 10 MW for 3 months. Hardware efficiency improves 2x every 2 years. Model compute requirements grow 5x every 2 years.
question: What power will an equivalent 2030 frontier training run require, and how does it compare to a 100 MW datacenter?
details:
  realistic_solution: '2024 baseline: 10 MW for 3 months. From 2024 to 2030 = 6 years = 3 doubling periods for hardware efficiency. Hardware improvement: 2^3 = 8x more efficient (FLOPS/watt). Compute growth: 5x every 2 years for 3 periods = 5^3 = 125x more compute needed. Net power requirement: 125x compute / 8x efficiency = 15.625x more power. 2030 frontier training: 10 MW × 15.625 = 156.25 MW for 3 months. This exceeds a typical 100 MW datacenter. Even a large hyperscaler facility (500 MW) would dedicate 31% of capacity to a single training run. Energy consumed: 156.25 MW × 2,160 hours (3 months) = 337,500 MWh = 337.5 GWh. At $0.05/kWh: $16.875 million in electricity alone. This projection shows why power delivery is becoming the binding constraint for frontier AI.'
  common_mistake: |
    **The Pitfall:** Subtracting the efficiency gain from the compute growth.
    **The Rationale:** Candidates incorrectly treat scaling factors as additive rather than multiplicative.
    **The Consequence:** Drastically underestimating the power requirement, concluding the power only grows by a small margin rather than 15.6x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 10 MW.
       - Compute growth: 5x every 2 years (3 periods = 125x).
       - Efficiency gain: 2x every 2 years (3 periods = 8x).
    2. **Calculations:**
       - Net power multiplier: 125 / 8 = 15.625x.
       - 2030 Power: 10 MW * 15.625 = 156.25 MW.
       - Total Energy: 156.25 MW * 2160 hours = 337.5 GWh.
       - Cost: 337,500,000 kWh * $0.05/kWh = $16.875M.
    3. **Conclusion & Interpretation:** **Result: Power-Bound.** The scaling requires 156.25 MW, demonstrating why power delivery is the binding constraint for frontier AI.
