title: Energy Gap Projection
scenario: In 2024, training a frontier model takes 10 MW for 3 months. Hardware efficiency improves 2x
  every 2 years. Model compute requirements grow 5x every 2 years. Project the power requirement for an
  equivalent frontier model in 2030 and compare to a typical 100 MW datacenter capacity.
question: "What power will an equivalent 2030 frontier training run require, and how does it compare to a 100 MW datacenter?"
details:
  realistic_solution: '2024 baseline: 10 MW for 3 months. From 2024 to 2030 = 6 years = 3 doubling periods
    for hardware efficiency. Hardware improvement: 2^3 = 8x more efficient (FLOPS/watt). Compute growth:
    5x every 2 years for 3 periods = 5^3 = 125x more compute needed. Net power requirement: 125x compute
    / 8x efficiency = 15.6x more power. 2030 frontier training: 10 MW × 15.6 = 156 MW for 3 months. This
    exceeds a typical 100 MW datacenter. Even a large hyperscaler facility (500 MW) would dedicate 31%
    of capacity to a single training run. Energy consumed: 156 MW × 2,160 hours (3 months) = 336,960 MWh
    ≈ 337 GWh. At $0.05/kWh: $16.8 million in electricity alone. This projection shows why power delivery
    is becoming the binding constraint for frontier AI.'
  common_mistake: 'Subtracting the efficiency gain from the compute growth. They are multiplicative, not
    additive: net power growth = compute growth / efficiency gain.'
  napkin_math: 'Compute growth: 125x. Efficiency: 8x. Net: 15.6x power. 10 MW → 156 MW. Exceeds single
    datacenter capacity. Energy: 337 GWh = $16.8M electricity.'
