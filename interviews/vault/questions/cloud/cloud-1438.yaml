title: Evaluating Invariance Testing Architectures at Scale
scenario: You are designing the evaluation pipeline for a cloud-based mortgage approval LLM (175B parameters) running on 8x H100 GPUs. The model evaluates a 4,000-token financial history. You must implement invariance testing to ensure altering protected attributes (e.g., zip code) shifts the approval probability by less than 0.5%. Generating counterfactuals dynamically via another LLM adds 150ms latency per prompt and costs $0.002 per invocation. The validation set has 100,000 applicants and requires 20 CI/CD runs per day.
question: Would you use dynamic LLM counterfactuals or a static precomputed perturbation dataset for the 100,000-applicant CI/CD tests, and why?
details:
  realistic_solution: Implement a static, pre-computed counterfactual dataset. Use a cheaper model or rule-based templates once to generate the perturbations, verify semantic consistency rigorously, and store them. Run the 175B model in offline batch mode (e.g., using vLLM) against the static pairs during CI/CD to guarantee exact reproducibility and dramatically reduce costs.
  common_mistake: |
    **The Pitfall:** Choosing dynamic on-the-fly generation for maximum coverage.
    **The Rationale:** Engineers assume "fresh" dynamic generation provides better adversarial robustness without calculating the massive aggregate CI/CD costs.
    **The Consequence:** Dynamic generation introduces massive latency blocks to the CI pipeline, drains millions in API costs annually, and introduces unpredictable semantic drift that invalidates the test.
  napkin_math: |
    - Dynamic generation latency: 100,000 * 150ms = 15,000 seconds (4.16 hours) sequentially, destroying standard 15-minute CI/CD SLAs.
    - Dynamic cost per run: 100,000 queries * $0.002 = $200.
    - Cost per day (20 runs): $200 * 20 = $4,000.
    - Cost per year: $4,000 * 365 = $1,460,000.
    - **Result: A static dataset is a one-time $200 cost, saving ~$1.46M annually and preserving pipeline speed.**
