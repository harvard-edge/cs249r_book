title: Evaluating Invariance Testing Architectures at Scale
scenario: You are designing the evaluation pipeline for a cloud-based mortgage approval LLM (175B parameters)
  running on 8x H100 GPUs. The model evaluates a 4,000-token financial history. You must implement invariance
  testing to ensure altering protected attributes (or their proxies, like zip code) shifts the approval
  probability by less than 0.5%. Generating counterfactuals dynamically via another LLM adds 150ms latency
  per prompt and costs $0.002 per invocation. With a validation set of 100,000 applicants and 20 CI/CD
  runs per day, evaluate the trade-offs between dynamic on-the-fly counterfactual generation versus static
  pre-computed perturbation datasets. Justify your architectural choice considering compute costs, evaluation
  latency, and semantic consistency.
question: "Would you use dynamic LLM counterfactuals or a static precomputed perturbation dataset for the 100,000-applicant CI/CD tests, and why?"
details:
  realistic_solution: Implement a static, pre-computed counterfactual dataset. Use a cheaper model or
    rule-based templates once to generate the perturbations, verify semantic consistency rigorously, and
    store them. Run the 175B model in offline batch mode (e.g., using vLLM) against the static pairs during
    CI/CD to guarantee exact reproducibility.
  common_mistake: Candidates often choose dynamic on-the-fly generation for maximum coverage without calculating
    the aggregate CI/CD costs, or they fail to recognize that dynamic LLM rewriting can inadvertently
    alter valid financial signals (semantic drift), invalidating the invariance test.
  napkin_math: 'Dynamic cost: 100,000 queries * $0.002 = $200 per run. At 20 runs/day, cost is $4,000/day
    or ~$1.46M/year. Static generation is a one-time $200 cost. Dynamic generation latency: 15,000 seconds
    (4.2 hours) sequentially, requiring massive parallelization to fit into a 15-minute CI/CD SLA, which
    heavily taxes the cluster.'
