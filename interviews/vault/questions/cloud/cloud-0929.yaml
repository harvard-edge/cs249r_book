title: Decoupling Shared Embeddings
scenario: A large-scale recommender system serves 10,000 QPS across a cluster of 32 NVIDIA A100 (80GB) GPUs. The core 30GB user embedding model is shared by two downstream systems: Candidate Retrieval (Team A) and Ad CTR Ranking (Team B). Team A updates the embedding pipeline to improve recall by 5%, but this causes an implicit data distribution shift that silently degrades Team B's CTR accuracy by 12%.
question: How should the shared 30GB embedding model be decoupled or versioned to stop Team A’s update degrading Team B under the 15ms SLA?
details:
  realistic_solution: Implement explicit data contracts and API versioning. Instead of full model duplication (which would consume 60GB per GPU, cutting replicas from 2 to 1 and halving cluster throughput), deploy the new embedding model (v2) alongside a lightweight adapter network (~4MB MLP) trained by Team B to project v2 embeddings into Team A's expected v1 space. This preserves the 2 replicas/GPU density while allowing independent iteration.
  common_mistake: |
    **The Pitfall:** Naively duplicating the embedding model for each team.
    **The Rationale:** Candidates prioritize team autonomy and strict decoupling without considering hardware capacity limits.
    **The Consequence:** Model duplication consumes 60GB per GPU, cutting replicas from 2 to 1 and halving cluster throughput.
  napkin_math: |
    - A100 capacity is 80GB.
    - Base 30GB model allows floor(80/30) = 2 replicas per GPU.
    - Duplicating the model (v1 and v2) requires 60GB, reducing replicas to 1 and cutting cluster throughput by 50%.
    - Adapter layer (e.g., 2-layer MLP, 1024-dim) is ~4MB.
    - Adapter adds negligible memory and <0.5ms latency, preserving the **2 replicas/GPU density** and avoiding the QPS drop.
