title: Decoupling Shared Embeddings
scenario: 'A large-scale recommender system serves 10,000 QPS across a cluster of 32 GPUs. The core 30GB user embedding model is shared by two downstream systems: Candidate Retrieval (Team A) and Ad CTR Ranking (Team B). Team A updates the embedding pipeline to improve recall by 5%, but this causes an implicit data distribution shift that silently degrades Team B''s CTR accuracy by 12%.'
question: How should the shared 30GB embedding model be decoupled or versioned to stop Team A's update degrading Team B under the 15ms SLA?
details:
  realistic_solution: 'Implement explicit data contracts and API versioning. Rather than full model duplication, deploy the new embedding model (v2) alongside a lightweight adapter network (e.g., a ~4MB MLP) trained by Team B to project v2 embeddings into Team A''s expected v1 space, preserving replica density.'
  common_mistake: |
    **The Pitfall:** Naively duplicating the embedding model for each team.
    **The Rationale:** Candidates prioritize team autonomy and strict decoupling without considering hardware capacity limits.
    **The Consequence:** Model duplication consumes 60GB per GPU, cutting replicas from 2 to 1 and halving cluster throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU capacity is 80GB.
       - Base model is 30GB.
       - Adapter layer is ~4MB.
    2. **Calculations:**
       - Current replicas per GPU: floor(80GB / 30GB) = 2 replicas.
       - Memory for duplicated models (v1 + v2): 30GB + 30GB = 60GB.
       - Replicas with duplicated models: floor(80GB / 60GB) = 1 replica (50% throughput loss).
       - Memory for model + adapter: 30GB + 4MB =~ 30GB.
       - Replicas with adapter: floor(80GB / 30GB) = 2 replicas.
    3. **Conclusion & Interpretation:**
       - **Result: Adapter preserves 2 replicas/GPU density. The system avoids a Memory-Capacity-Bound throughput collapse.**
