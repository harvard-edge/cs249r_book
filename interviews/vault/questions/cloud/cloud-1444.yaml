title: Calculating Single-Token Latency on A100
scenario: 'You are deploying a 7 billion parameter LLM for single-token generation (batch size 1) on a single NVIDIA A100 GPU. Both weights and activations use BF16 precision. Assume the system has a fixed kernel launch and framework overhead of 1.5 ms per forward pass.'
question: 'What is the expected single-token latency on the A100, and what is the primary Iron Law bottleneck?'
details:
  realistic_solution: 'Apply the Iron Law of ML Systems: Total Latency = (Data Volume / Bandwidth) + (Operations / Peak Compute) + Fixed Overhead. First, calculate the data volume: 7B params * 2 bytes = 14 GB. Memory time = 14 GB / 2039 GB/s ≈ 6.86 ms. Next, calculate compute time: 2 Ops/param * 7B = 14 GFLOPs. Compute time = 14 GFLOPs / 312,000 GFLOPs ≈ 0.04 ms. Finally, add the 1.5 ms overhead. The total latency is ~8.4 ms, and the generation process is profoundly memory bandwidth bound.'
  common_mistake: |
    **The Pitfall:** Calculating only the compute time and ignoring memory fetch.
    **The Rationale:** Candidates focus entirely on the TFLOPS capabilities of the GPU, forgetting that at batch size 1, every parameter must be streamed from HBM to the SM registers.
    **The Consequence:** They massively underestimate latency, incorrectly concluding the workload is compute-bound when it is entirely limited by memory bandwidth.
  napkin_math: |
    * **Data volume:** 7B params * 2 bytes = 14 GB.
    * **Memory time:** 14 GB / 2039 GB/s ≈ 6.86 ms.
    * **Compute operations:** 2 Ops/param * 7B = 14 GFLOPs.
    * **Compute time:** 14 GFLOPs / 312,000 GFLOPs ≈ 0.04 ms.
    * **Fixed overhead:** 1.5 ms.
    * **Total Latency:** 6.86 + 0.04 + 1.5 = **8.4 ms**.
    * **Conclusion:** Generation is profoundly memory bandwidth bound.
