title: Validation Sampling Budget For Data Drift
scenario: A data platform ingests 2 billion training examples per day. Full validation costs 0.2 ms CPU per example, but the daily validation budget is 20,000 CPU-core seconds.
question: How many examples can be validated under a 20,000 core-second budget at 0.2 ms/example, and how should they be allocated across 100 sources to ensure visibility?
details:
  realistic_solution: The budget supports 20,000 / 0.0002 = 100 million validated examples per day. That is 5% of the 2B daily examples. A reasonable plan reserves a floor of 100,000 examples for each of 100 sources, using 10M examples, then allocates the remaining 90M proportional to source volume. This gives every source visibility while high-volume sources get tighter confidence intervals.
  common_mistake: |
    **The Pitfall:** Uniformly sampling purely based on global event volume.
    **The Rationale:** Candidates apply a simple flat sampling rate without considering long-tail distributions of data sources.
    **The Consequence:** Small but critical data sources may end up with too few validated samples to reliably detect drift, while massive sources consume the entire budget.
  napkin_math: |
    - **Per Example Cost:** 0.2 ms = 0.0002 seconds.
    - **Total Budget:** 20,000 core-seconds.
    - **Total Samples Allowed:** 20,000 / 0.0002 = 100,000,000 samples.
    - **Sample Fraction:** 100M / 2B = 5% of daily examples.
    - **Source Floor Allocation:** 100 sources * 100,000 examples = 10M samples.
    - **Remaining Allocation:** 100M - 10M = **90M samples for volume-weighted sampling.**
