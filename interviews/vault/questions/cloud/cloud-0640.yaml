title: The Half-Baked Speedup
scenario: You've been tasked with optimizing a large language model's training throughput. You successfully converted most of your model to use BF16 (bfloat16) precision instead of FP32. You expected a near 2x speedup in training time, but you're only observing about a 1.4x improvement.
question: "What's a likely technical explanation for this discrepancy?"
details:
  realistic_solution: |
    The 1.4x speedup is explained by the fact that training involves a mix of compute-bound and memory-bound operations, and only some benefit fully from BF16.
    **Compute-bound operations** (large GEMMs) see a near-2x speedup because Tensor Cores process twice as many BF16 operations per cycle.
    **Memory-bound operations** (layer norm, activation, optimizer steps) do not scale as well. Mixed-precision training requires maintaining an FP32 master copy of weights for the optimizer update. This FP32 overhead in the optimizer reduces the memory-bound speedup. By Amdahl's Law, the unoptimized FP32 portions drag down the overall speedup.
  common_mistake: |
    **The Pitfall:** Assuming that remaining FP32 operations in the graph or unoptimized BF16 kernels are the sole culprit.
    **The Rationale:** Candidates forget that mixed-precision training intrinsically requires FP32 for stability in the optimizer and gradient accumulation steps.
    **The Consequence:** Engineers might waste time endlessly profiling kernels when the 1.4x speedup is mathematically expected and fundamentally limited by Amdahl's Law and memory bandwidth.
  napkin_math: |
    1. **Forward pass GEMMs:** ~33% of time -> runs in BF16 -> 2x speedup.
    2. **Backward pass GEMMs:** ~24% of time -> runs in BF16 -> 2x speedup.
    3. **Optimizer step (Adam):** ~20% of time -> FP32 master weights -> 1x speedup.
    4. **Communication (AllReduce):** ~15% of time -> FP32 gradients -> 1x speedup.
    5. **Other (LayerNorm, softmax):** ~8% of time -> mixed -> ~1.5x speedup.
    6. **Amdahl's Law calculation:** Speedup = 1 / (0.20/1 + 0.15/1 + 0.08/1.5 + 0.33/2 + 0.24/2)
    7. **Result:** 1 / (0.20 + 0.15 + 0.053 + 0.165 + 0.12) = 1 / 0.688 = **1.45x** (closely matching the observed 1.4x).
