title: 'Migrating Feature Pipelines: ETL vs ELT Costs'
scenario: An ML team is migrating a daily 20 TB log ingestion pipeline from ETL to ELT to speed up feature
  engineering experiments. In the old ETL pipeline, a dedicated Spark cluster transformed the data before
  loading, costing $200 and taking 4 hours per 20 TB batch. When ML engineers needed to test a new feature
  definition on 30 days of historical data (600 TB), backfilling required 120 hours of compute time and
  cost $6,000. In the new ELT architecture, raw JSON logs are loaded directly into a cloud data warehouse
  (already paid for via ingestion). The warehouse charges $5 per TB scanned for SQL-based transformations
  and can scan 50 TB per minute. Calculate the total cost and time required to run the same 30-day historical
  feature extraction experiment using the ELT approach.
details:
  realistic_solution: Use the ELT approach to run the transformation directly in the target data warehouse.
    It will cost $3,000 and take only 12 minutes, saving 50% in costs and drastically accelerating experimentation.
  common_mistake: Assuming ELT is slower or more expensive due to data warehouse pricing, without realizing
    that raw data is already resident and massively parallel warehouse compute avoids the overhead of
    spinning up transient external clusters for backfills.
  napkin_math: 'ELT Data Size = 30 days * 20 TB/day = 600 TB.

    ELT Cost = 600 TB * $5/TB = $3,000.

    ELT Time = 600 TB / 50 TB/min = 12 minutes.

    Savings vs ETL ($6,000, 120 hrs) = $3,000 saved, turnaround reduced from 5 days to 12 minutes.'
