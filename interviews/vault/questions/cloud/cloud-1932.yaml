title: Diagnosing Missing Deployment Invariants
scenario: 'An automated pipeline promotes a fine-tuned 7B parameter LLM (FP16) from Evaluation to Deployment on instances with 24GB VRAM. The Stage Interface Contract validates a latency smoke test (batch=1, seq_len=128). In production under peak load (batch=32, seq_len=2048), the instances continuously OOM and crash.'
question: "What structural invariant is missing from the Evaluation-to-Deployment contract for the 7B FP16 model on 24GB instances?"
details:
  realistic_solution: 'The Evaluation-to-Deployment contract is missing a Peak Memory Invariant test. The contract must simulate or calculate the maximum bounded memory for the target hardware under worst-case concurrency.'
  common_mistake: |
    **The Pitfall:** Suggesting model optimization (like INT8 quantization or vLLM) instead of fixing the pipeline contract.
    **The Rationale:** Candidates focus on the tactical OOM rather than the systemic failure to validate capacity before deployment.
    **The Consequence:** The CI/CD pipeline remains fundamentally broken and will continue to promote models that fail under load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - VRAM available: 24 GB. 7B FP16 model.
       - Peak Load: B=32, S=2048.
    2. **Calculations:**
       - Model Weights: 7B × 2 bytes = 14 GB.
       - KV Cache (Peak): 32 × 2048 × 0.5 MB ≈ 32.7 GB.
       - Total Peak Memory: 14 GB + 32.7 GB = 46.7 GB.
    3. **Conclusion & Interpretation:**
       **Result: Memory Bound. 46.7 GB > 24 GB, leading to inevitable failure under peak load.**
