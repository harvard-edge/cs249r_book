title: Estimating Time-to-Train from Hardware Specs
scenario: Training a model requires 3.2e18 total FLOPs to reach target accuracy. You have 64 A100 GPUs (312 TFLOPS each) at 45% MFU.
question: "With 64 A100s at 45% MFU, how long will 3.2e18 FLOPs take to train?"
details:
  realistic_solution: 'Effective throughput = 64 GPUs \times 312 TFLOPS \times 0.45 MFU = 8,985.6 TFLOPS = 8.99e15 FLOPS. Time = 3.2e18 / 8.99e15 = 356 seconds \approx 5.9 minutes. This seems fast because 3.2e18 FLOPs is relatively modest (roughly a small ImageNet training run). For context, GPT-3 required ~3.14e23 FLOPs, which on the same 64-GPU cluster would take: 3.14e23 / 8.99e15 = 3.49e7 seconds \approx 404 days. This illustrates why large model training requires thousands of GPUs. Doubling to 128 GPUs with linear scaling halves time to ~202 days, but communication overhead typically reduces scaling efficiency to 85-95%.'
  common_mistake: |
    **The Pitfall:** Using peak TFLOPS instead of effective TFLOPS to calculate training time.
    **The Rationale:** Engineers rely on theoretical hardware specifications without accounting for Model FLOPs Utilization (MFU).
    **The Consequence:** Actual training time is 2-3x slower than estimated, wrecking project schedules.
  napkin_math: |
    *   **Effective Throughput:** $64 \text{ GPUs} \times 312 \text{ TFLOPS} \times 0.45 \text{ MFU} = 8,985.6 \text{ TFLOPS} \approx 9 \text{ PFLOPS}$.
    *   **Time to Train:** $3.2\text{e18 FLOPs} / 9\text{e15 FLOPS} \approx 356 \text{ seconds}$.
    *   **Result:** **The training run will complete in approximately 6 minutes.**
