title: Estimating Time-to-Train from Hardware Specs
scenario: Training a model requires 3.2e18 total FLOPs to reach target accuracy. You have 64 A100 GPUs
  (312 TFLOPS each) at 45% MFU. Estimate wall-clock time to train.
details:
  realistic_solution: 'Effective throughput = 64 GPUs × 312 TFLOPS × 0.45 MFU = 8,985.6 TFLOPS = 8.99e15
    FLOPS. Time = 3.2e18 / 8.99e15 = 356 seconds ≈ 5.9 minutes. This seems fast because 3.2e18 FLOPs is
    relatively modest (roughly a small ImageNet training run). For context, GPT-3 required ~3.14e23 FLOPs,
    which on the same 64-GPU cluster would take: 3.14e23 / 8.99e15 = 3.49e7 seconds ≈ 404 days. This illustrates
    why large model training requires thousands of GPUs. Doubling to 128 GPUs with linear scaling halves
    time to ~202 days, but communication overhead typically reduces scaling efficiency to 85-95%.'
  common_mistake: Using peak TFLOPS instead of effective TFLOPS (peak × MFU). Real MFU is 30-55%, making
    actual training 2-3x slower than peak calculations suggest.
  napkin_math: 64 × 312 TFLOPS × 0.45 ≈ 9 PFLOPS. 3.2e18 / 9e15 ≈ 356 seconds ≈ 6 minutes.
