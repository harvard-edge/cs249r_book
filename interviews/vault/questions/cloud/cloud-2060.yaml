title: The Wasted Training Budget
scenario: Your team runs 50 training jobs per month on a cluster of 8× A100 GPUs at $25/hour. Each training
  job takes 48 hours. Post-training evaluation shows that 40% of jobs produce models that fail to meet
  the accuracy threshold. What is the monthly dollar cost of failed experiments?
question: "What is the monthly dollar cost of failed experiments?"
details:
  realistic_solution: 'Cost per job: ($25/hour × 8 GPUs) × 48 hours = $9,600. Total monthly spend: 50
    × $9,600 = $480,000. Failed jobs: 50 × 0.4 = 20 jobs. Wasted cost: 20 × $9,600 = $192,000/month. This
    $192K/month ($2.3M/year) in wasted compute is the iteration tax — the cost of discovering failures
    only after training completes.'
  common_mistake: Forgetting to include the full cluster cost (8 GPUs, not 1) or miscounting the failure
    rate.
  napkin_math: 'Cluster cost: 8 GPUs × $25/h = $200/h. 50 jobs × 48h × $200/h = $480,000/month total.
    40% failure rate → 20 failed jobs. 20 × $9,600 = $192,000/month wasted. $192K × 12 = $2.304M/year
    in failed experiments.'
