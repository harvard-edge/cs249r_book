title: The Wasted Training Budget
scenario: Your team runs 50 training jobs per month on a cluster of 8x A100 GPUs at $25/hour. Each training job takes 48 hours. Post-training evaluation shows that 40% of jobs produce models that fail to meet the accuracy threshold.
question: "What is the monthly dollar cost of failed experiments?"
details:
  realistic_solution: 'Cost per job: ($25/hour \times 8 GPUs) \times 48 hours = $9,600. Total monthly spend: 50 \times $9,600 = $480,000. Failed jobs: 50 \times 0.4 = 20 jobs. Wasted cost: 20 \times $9,600 = $192,000/month. This $192K/month ($2.3M/year) in wasted compute is the iteration tax — the cost of discovering failures only after training completes.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the full cluster cost or miscounting the failure rate.
    **The Rationale:** Engineers calculate the cost for a single GPU instead of the 8-GPU cluster used for each job.
    **The Consequence:** The financial impact of failed training jobs is drastically underestimated.
  napkin_math: |
    *   **Cluster Cost:** 8 GPUs \times $\$25/\text{h} = \$200/\text{h}$.
    *   **Job Cost:** $\$200/\text{h} \times 48\text{h} = \$9,600 \text{ per job}$.
    *   **Failure Count:** $50 \text{ jobs} \times 40\% = 20 \text{ failed jobs}$.
    *   **Result:** **$20 \times \$9,600 = \$192,000 \text{ wasted per month}$ (\$2.3M/year).**
