title: The Silent Feature Pipeline Failure
scenario: Your production recommendation model's conversion rate has been slowly declining over 3 weeks — from 4.2% to 3.1%. No model retraining has occurred. No code changes were deployed. All monitoring dashboards (GPU utilization, serving latency, error rate) show green.
question: How would you debug the 3-week conversion decline when systems dashboards are green but a feature pipeline issue is suspected?
details:
  realistic_solution: 'Systematic feature pipeline diagnosis: Step 1 — Feature distribution drift detection: Compute KL divergence between current serving and training distribution. Step 2 — Identify the broken feature: Find a feature clustered at exactly 0.0 for 40% of users. Step 3 — Trace the pipeline: A Spark job LEFT JOIN now returns NULL for 40% of rows due to a schema migration renaming a column. Step 4 — Root cause confirmation: Timeline matches. Step 5 — Fix: Correct the JOIN and backfill the feature.'
  common_mistake: |
    **The Pitfall:** Retraining the model immediately.
    **The Rationale:** Engineers assume the model has simply drifted and needs fresh data.
    **The Consequence:** If the root cause is a broken feature pipeline, retraining on corrupted features will just learn the corrupted distribution, and the decline continues.
  napkin_math: |
    - 1. **Decline:** Observed conversion drop: 4.2% to 3.1% = 1.1% absolute (26% relative decline).
    - 2. **Impact:** At $10M monthly revenue, a 26% relative drop = $2.6M/month in lost revenue.
    - 3. **Feature analysis:** A broken LEFT JOIN returning NULL for 40% of rows zeroed out a top-5 feature.
    - 4. **Resolution:** **Fixing the JOIN and backfilling restores the signal and stops the $2.6M/month loss.**
