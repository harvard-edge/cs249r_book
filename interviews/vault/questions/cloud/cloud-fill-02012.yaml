title: Work-Conserving Scheduler Analysis for Mixed Priority on MI300X
scenario: 'An MI300X (192GB HBM3) serves two priority classes: premium (SLA p99<100ms, λ=200/s) and standard
  (no SLA, λ=800/s). Total service rate μ=1200/s. Design a preemptive priority queue and prove the premium
  class SLA is achievable.'
details:
  realistic_solution: 'Preemptive priority M/M/1/priority: premium queue is served first always. Premium:
    ρ1=200/1200=0.167. Mean premium wait = 1/(μ(1-ρ1)) = 1/(1200×0.833) = 1ms! p99≈6ms. Standard: ρ2=(200+800)/1200=0.833.
    Mean standard wait ≈ 1/(μ(1-ρ_total)) = 1/(1200×0.167)=5ms, p99≈35ms. Total system ρ=0.833 → stable.
    Premium SLA of p99<100ms is easily met at 6ms.'
  common_mistake: Using weighted fair queueing with weights 1:4 and assuming premium gets proportional
    latency improvement; WFQ doesn't isolate premium from standard load at high utilization.
  napkin_math: Premium ρ1=0.167, μ=1200. W_premium=1/(1200×0.833)=1ms. p99≈6ms << 100ms SLA. Standard
    ρ_total=0.833, W_standard=5ms mean. System stable since total ρ=1000/1200=0.833<1.
