title: PCIe DMA Engine Overlap for Host-Device Data Movement
scenario: An H100 GPU connected via PCIe Gen5 x16 has a DMA copy engine separate from
  its compute SMs. Explain how this hardware design enables overlapping data transfers
  with kernel execution.
question: How does H100's separate DMA copy engine let PCIe transfers overlap with
  kernel execution?
details:
  realistic_solution: 'H100 has a dedicated DMA copy engine that operates independently
    from the 132 SMs. This enables three concurrent operations: (1) H2D transfer:
    DMA engine copies training data from host pinned memory to GPU HBM via PCIe Gen5
    (64 GB/s). (2) Compute: SMs execute the current batch''s forward/backward kernels.
    (3) D2H transfer: DMA engine copies results back to host. These three operations
    run simultaneously using separate CUDA streams. The H100 actually has two copy
    engines (one for each direction), so H2D and D2H can also overlap. Total overlap:
    compute, H2D, and D2H all concurrent. The only shared resource is HBM bandwidth
    — if all three compete, effective bandwidth per operation decreases.'
  common_mistake: Thinking the GPU must pause computation to handle PCIe data transfers.
    The DMA copy engine is an independent hardware unit that moves data without consuming
    compute resources.
  napkin_math: 'H100 HBM3: 3.35 TB/s. PCIe Gen5 x16: 64 GB/s. Compute kernel BW: ~2.5
    TB/s typical. PCIe uses 64/3350 = 1.9% of HBM bandwidth. Minimal contention —
    the DMA engine can operate at full PCIe speed without impacting compute.'
