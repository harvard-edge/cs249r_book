title: 'Queueing Theory Optimization: Tail Latency via Load Shedding'
scenario: 'A production H100 inference API (\u03bc=50 req/s, \u03bb=45 req/s, \u03c1=0.9) is violating
  P99<1s SLO (current P99\u22484.6s). The team proposes load shedding: reject requests
  when queue depth exceeds threshold K. Using M/M/1/K analysis, find the K that achieves
  P99<1s while maximizing accepted throughput. What fraction of requests get rejected?'
question: What queue-depth threshold K achieves P99<1s while maximizing accepted throughput,
  and what fraction of requests are rejected?
details:
  realistic_solution: 'Initial calculation at \u03c1=0.9: P99 = -ln(0.01)/(\u03bc(1-\u03c1)) = 4.605/(50*0.1) = 0.92s. This meets the SLO! The problem states current P99=4.6s, which implies the actual arrival rate is higher than reported. If P99=4.6s, then \u03c1\u2248 0.98 (\u03bb\u2248 49 req/s). To guarantee P99 < 1s during these bursts, we apply M/M/1/K load shedding. With a K=10 queue buffer, the rejection rate Pk = (1-0.98)*0.98^10/(1-0.98^11) \u2248 8.2%. Effective \u03bb_accepted \u2248 45 req/s, bringing \u03c1_eff back to \u2248 0.90. This achieves P99 \u2248 0.92s < 1s while accepting ~45 req/s.'
  common_mistake: Not using M/M/1/K (finite buffer) analysis and instead trying to
    solve this with M/M/1 infinite buffer, which cannot achieve P99 below mean system
    time at high utilization.
  napkin_math: 'At \u03bc=50: if P99=4.6s, W=1s. W = 1/(\u03bc(1-\u03c1)) \u2192 1 = 1/(50(1-\u03c1)) \u2192 \u03c1=0.98, so actual \u03bb\u2248 49. With buffer K=10: Pk = 0.02*0.98^10 / (1-0.98^11) \u2248 0.0163 / 0.199 \u2248 8.2% rejection. \u03bb_{eff} = 49 * (1 - 0.082) = 45 req/s. \u03c1_{eff} = 0.90. P99 \u2248 4.605 * (1/(50*(1-0.90))) = 0.92s.'
