title: 'Queueing Theory Optimization: Tail Latency via Load Shedding'
scenario: 'A production H100 inference API (μ=50 req/s, λ=45 req/s, ρ=0.9) is violating
  P99<1s SLO (current P99≈4.6s). The team proposes load shedding: reject requests
  when queue depth exceeds threshold K. Using M/M/1/K analysis, find the K that achieves
  P99<1s while maximizing accepted throughput. What fraction of requests get rejected?'
question: What queue-depth threshold K achieves P99<1s while maximizing accepted throughput,
  and what fraction of requests are rejected?
details:
  realistic_solution: 'M/M/1 at ρ=0.9: P99 = -ln(0.01)/(μ(1-ρ)) = 4.605/(50*0.1) =
    0.921s. Wait — this is barely over 1s. Recalculate: P99 ≈ -ln(0.01)*W = 4.6*(ρ/(μ(1-ρ))
    + 1/μ) = 4.6*(0.9/5 + 0.02) = 4.6*0.2 = 0.92s. Actually meets SLO. At ρ=0.9, P99=0.92s
    < 1s. Problem framing: current P99=4.6s implies ρ≈0.96. With K=10 buffer: reject
    when queue > 10. Rejection rate Pk = (1-ρ)*ρ^K/(1-ρ^(K+1)) ≈ 0.04*0.96^10/0.35
    ≈ 11%. Effective λ_accepted = 45*(1-0.11) = 40 req/s, ρ drops to 0.8, P99 ≈ 0.92s.'
  common_mistake: Not using M/M/1/K (finite buffer) analysis and instead trying to
    solve this with M/M/1 infinite buffer, which cannot achieve P99 below mean system
    time at high utilization.
  napkin_math: 'If P99=4.6s, W=1s, Wq=0.98s, ρ/(μ(1-ρ))=0.98 → ρ/(50(1-ρ))=0.98 →
    ρ=49(1-ρ) → ρ=49/50=0.98. So λ≈49 req/s. With K=15: Pk = (1-0.98)*0.98^15/(1-0.98^16)
    = 0.02*0.739/0.272 = 5.4% rejection. λ_eff=49*0.946=46.4, ρ=0.928. P99≈1.3s. Need
    K=5: Pk=0.02*0.98^5/(1-0.98^6) = 0.02*0.904/0.114 = 15.9% rejection. ρ_eff=0.82,
    P99≈0.57s < 1s.'
