title: Queueing Theory Optimization: Tail Latency via Load Shedding
scenario: 'A production H100 inference API (μ=50 req/s, target λ=45 req/s) is violating a P99 < 1s SLO (current P99≈4.6s). The team proposes load shedding by rejecting requests when queue depth exceeds threshold K.'
question: 'Using M/M/1/K analysis, what queue-depth threshold K achieves P99 < 1s while maximizing accepted throughput, and what fraction of requests are rejected?'
details:
  realistic_solution: 'Initial calculation at ρ=0.9: P99 = -ln(0.01)/(μ(1-ρ)) = 4.605/(50*0.1) = 0.92s. This meets the SLO! The problem states current P99=4.6s, which implies the actual arrival rate is higher than reported. If P99=4.6s, then ρ≈ 0.98 (λ≈ 49 req/s). To guarantee P99 < 1s during these bursts, we apply M/M/1/K load shedding. With a K=10 queue buffer, the rejection rate Pk = (1-0.98)*0.98^10/(1-0.98^11) ≈ 8.2%. Effective λ_accepted ≈ 45 req/s, bringing ρ_eff back to ≈ 0.90. This achieves P99 ≈ 0.92s < 1s while accepting ~45 req/s.'
  common_mistake: |
    **The Pitfall:** Using M/M/1 infinite buffer math instead of M/M/1/K.
    **The Rationale:** M/M/1 is simpler, but it assumes queues can grow infinitely, making tail latency impossible to cap under extreme load.
    **The Consequence:** Failing to realize that bounding the queue is the *only* mathematical way to enforce a strict tail latency SLO during bursts.
  napkin_math: |
    - **Current Actual Load:** If P99=4.6s, W=1s. Wait time W = 1/(μ(1-ρ)). 1 = 1/(50(1-ρ)) → ρ=0.98. Actual λ ≈ 49 req/s.
    - **Buffer Testing (K=10):**
    - **Rejection Rate (Pk):** Pk = (1-0.98) × 0.98^10 / (1-0.98^11) = 0.02 × 0.817 / 0.199 ≈ 8.2%.
    - **Effective Accepted Load:** λ_eff = 49 × (1 - 0.082) = 45 req/s.
    - **Effective Utilization:** ρ_eff = 45 / 50 = 0.90.
    - **New P99:** P99 ≈ -ln(0.01) / (μ(1-ρ_eff)) = 4.605 / (50 × 0.1) = **0.92s**.
