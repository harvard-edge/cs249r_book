title: 'Queueing Theory Optimization: Tail Latency via Load Shedding'
scenario: A production H100 inference API (μ=50 req/s, target λ=45 req/s) is violating a P99 < 1s SLO (current P99≈4.6s). The team proposes load shedding by rejecting requests when queue depth exceeds threshold K.
question: Using M/M/1/K analysis, what queue-depth threshold K achieves P99 < 1s while maximizing accepted throughput, and what fraction of requests are rejected?
details:
  realistic_solution: At P99=4.6s, the actual arrival rate is higher than reported (ρ≈0.98, λ≈49 req/s). To guarantee P99 < 1s during these bursts, apply M/M/1/K load shedding. With a K=10 queue buffer, the rejection rate Pk is ~8.2%. The effective accepted load λ_eff ≈ 45 req/s, bringing ρ_eff back to ≈ 0.90. This achieves P99 ≈ 0.92s < 1s while actively dropping the traffic that would cause tail violations.
  common_mistake: |
    **The Pitfall:** Relying on standard M/M/1 infinite buffer math for burst traffic.
    **The Rationale:** Favoring simpler queueing models that assume memory can buffer spikes indefinitely.
    **The Consequence:** Failing to realize that bounding the queue via an M/M/1/K model is mathematically the only way to enforce strict tail latency SLOs during severe traffic bursts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Service Rate (μ): 50 req/s. Actual Arrival Rate (λ): ~49 req/s.
       - SLO: P99 < 1s.
       - Queue Threshold (K): 10.
    2. **Calculations:**
       - Rejection Rate (Pk) = (1 - 0.98) * 0.98^10 / (1 - 0.98^11) ≈ 8.2%.
       - Effective Accepted Load (λ_eff) = 49 * (1 - 0.082) = 45 req/s.
       - Effective Utilization (ρ_eff) = 45 / 50 = 0.90.
       - New P99 = -ln(0.01) / (50 * (1 - 0.90)) = 4.605 / 5 = 0.92s.
    3. **Conclusion & Interpretation:**
       - **Result: SLO Achieved via Shedding.** Applying a strict K=10 queue buffer sheds ~8.2% of burst traffic, bringing the P99 latency back under the 1s threshold (0.92s).
