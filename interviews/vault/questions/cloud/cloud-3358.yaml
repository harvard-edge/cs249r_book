title: MoE Inference Optimization on NVIDIA A100
scenario: You are designing an inference system for a large Mixture of Experts (MoE)
  model comprising 16 experts, each a 10-billion parameter (FP16) feed-forward network.
  Your target hardware is an NVIDIA A100 GPU (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s
  memory bandwidth). Assume each input token activates 2 experts. How would you configure
  expert parallelism and MoE routing to achieve high throughput and low latency, considering
  the A100's memory and compute constraints? Discuss the implications of capacity
  factors and load balancing strategies on system efficiency, specifically how memory-FLOPs
  decoupling affects your architectural choices.
question: How would you configure expert parallelism and MoE routing to achieve high
  throughput and low latency, considering the A100's memory and compute constraints?
details:
  realistic_solution: 'A realistic solution would involve a hybrid parallelism approach:
    store multiple experts (up to 4, given 80 GB HBM2e for 10B FP16 experts) on a
    single A100. Employ dynamic MoE routing and intelligent load balancing to distribute
    tokens efficiently across active experts, potentially using techniques like ''top-k
    gating'' with dynamic capacity adjustment. Acknowledge that the 2.0 TB/s memory
    bandwidth might be a more significant constraint than 312 TFLOPS FP16 for sparse
    expert activations, necessitating careful memory management, weight compression,
    or speculative execution to overlap memory transfers with computation. Consider
    streaming expert weights or using techniques to reduce redundant data movement.'
  common_mistake: Candidates often overemphasize raw FLOPs without considering memory
    bandwidth as a primary bottleneck for large MoE models, especially when expert
    weights need frequent loading/unloading from HBM2e. Another common mistake is
    neglecting dynamic load balancing for varying expert activations, which can lead
    to underutilized GPUs or token drops despite sufficient theoretical capacity.
  napkin_math: "1. **Expert Memory Footprint:** 10 billion parameters * 2 bytes/parameter\
    \ (FP16) = 20 GB per expert. An A100 (80 GB HBM2e) can store 80 GB / 20 GB/expert\
    \ = 4 experts. \n2. **Memory Bandwidth for 2 Experts:** To load weights for 2\
    \ activated experts (40 GB), it would ideally take 40 GB / 2000 GB/s = 0.02 seconds,\
    \ assuming sequential full loads. This simple calculation highlights the potential\
    \ memory-bound nature compared to raw compute, which could process much faster\
    \ if data is already in cache."
