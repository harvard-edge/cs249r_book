title: Tensor Core Dimension Alignment
scenario: >
  You are evaluating two model architecture proposals for a high-throughput cloud API running on A100 GPUs. Proposal A uses a hidden dimension of 1024 and a vocabulary size of 32,768. Proposal B trims dimensions to 1000 and 30,000 to precisely match the domain, reducing theoretical FLOPs and parameters by ~11%.
question: >
  Should you deploy Proposal B with 1000/30000 dimensions on A100s, and how do Tensor Core alignment constraints affect it?
details:
  realistic_solution: |
    Reject Proposal B. A100 Tensor Cores require matrix dimensions to be multiples of 8 or 16 (for FP16) to operate efficiently. Unaligned dimensions force cuBLAS to dynamically pad matrices with zeros or fall back to significantly slower CUDA cores. The hardware executes the padded 1024/32768 dimensions anyway, consuming the same memory bandwidth and compute, but adds kernel overhead.
  common_mistake: |
    **The Pitfall:** Evaluating purely on theoretical FLOPs and parameter counts.
    **The Rationale:** It seems logical that smaller matrix dimensions will linearly decrease execution time.
    **The Consequence:** The model suffers a massive latency regression because unaligned memory accesses force the hardware to either dynamically pad matrices or fall back to much slower CUDA cores.
  napkin_math: |
    - **Proposal B Savings:** 1 - ((1000^2) / (1024^2)) ≈ 4.6% for linear layers, and 1 - (30000/32768) ≈ 8.4% for vocab.
    - **Hardware Constraint:** A100 Tensor Cores require dimensions to be multiples of 8 or 16 (for FP16).
    - **Performance Penalty:** Unaligned dimensions cause a fallback from Tensor Cores (312 TFLOPS) to CUDA cores (78 TFLOPS FP16), resulting in a 4x-16x latency regression.
    - **Result:** **Padding mechanically eliminates the 11% theoretical savings entirely.**
