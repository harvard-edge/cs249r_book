title: 'TCO Fluency: Compute Cost per Token at Scale'
scenario: You are asked to estimate the cost per token to serve GPT-3 (175B parameters) on a 4-GPU node at $2.50/GPU/h. The setup achieves 30% MFU for decode at batch=32 with a theoretical peak of 1,979 TFLOP/s per GPU. Each token requires approximately 350B FLOPs for one forward pass.
question: What is the serving cost per 1M output tokens for GPT-3 175B on 4 GPUs at $2.50/GPU-hour?
details:
  realistic_solution: 'Effective throughput per H100: 1,979 * 0.30 = 594 TFLOP/s. For 4 H100s: 4 * 594 = 2,376 TFLOP/s. FLOPs per token: 350 B = 350 * 10^9. Tokens per second: 2,376 * 10^12 / (350 * 10^9) = 6,789 tokens/s. Cost per second: 4 GPUs * $2.50/3600s = $0.00278/s. Cost per token: $0.00278 / 6,789 = $0.000000409 = $0.409 per 1M tokens. Current GPT-4 pricing: $10/1M → 24x markup for profit/overhead/latency SLA.'
  common_mistake: |
    **The Pitfall:** Using peak TFLOP/s without applying Model FLOPs Utilization (MFU).
    **The Rationale:** Candidates forget that hardware rarely achieves 100% of theoretical peak, especially in memory-bound decode phases.
    **The Consequence:** The estimated throughput will be over 3x too high, leading to an aggressively underpriced and unrealistic cost model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 4 GPUs at $2.50/hr.
       - Peak TFLOPS: 1,979/GPU. MFU: 30%.
       - FLOPs/Token: 350B.
    2. **Calculations:**
       - Effective Throughput: 4 * 1979 * 0.30 = 2375 TFLOP/s.
       - Token Rate: 2375e12 / 350e9 = 6786 tokens/s.
       - Cost/sec: 4 * $2.50 / 3600 = $0.00278/s.
       - Cost/token: $0.00278 / 6786 = $0.00000041.
    3. **Conclusion & Interpretation:**
       - **Result: Compute Cost Baseline.** Serving cost is $0.41 per 1M tokens, revealing massive software-hardware co-design profit margins.
