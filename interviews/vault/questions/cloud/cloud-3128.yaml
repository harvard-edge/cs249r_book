title: 'TCO Fluency: Compute Cost per Token at Scale'
scenario: You are asked to estimate the cost per token to serve GPT-3 (175B parameters) on a 4-GPU H100 node at $2.50/GPU/h. The setup achieves 30% MFU for decode at batch=32 with a theoretical peak of 1,979 TFLOP/s per GPU. Each token requires approximately 350B FLOPs for one forward pass.
question: What is the serving cost per 1M output tokens for GPT-3 175B on 4 H100s at $2.50/GPU-hour?
details:
  realistic_solution: 'Effective throughput per H100: 1,979 × 0.30 = 594 TFLOP/s. For 4 H100s: 4 × 594 = 2,376 TFLOP/s. FLOPs per token: 350 B = 350 × 10⁹. Tokens per second: 2,376 × 10¹² / (350 × 10⁹) = 6,789 tokens/s. Cost per second: 4 GPUs × $2.50/3600s = $0.00278/s. Cost per token: $0.00278 / 6,789 = $0.000000409 = $0.409 per 1M tokens. Current GPT-4 pricing: $10/1M → 24× markup for profit/overhead/latency SLA.'
  common_mistake: |
    **The Pitfall:** Using peak TFLOP/s without applying Model FLOPs Utilization (MFU).
    **The Rationale:** Candidates forget that hardware rarely achieves 100% of theoretical peak, especially in memory-bound decode phases.
    **The Consequence:** The estimated throughput will be over 3x too high, leading to an aggressively underpriced and unrealistic cost model.
  napkin_math: |
    - **Effective Throughput**: 4 GPUs × 1,979 TFLOP/s × 0.30 MFU = 2,375 TFLOP/s.
    - **Tokens per Second**: 2,375 TFLOP/s / 350 GFLOPs/token = 6,786 tokens/s.
    - **Cost per Second**: 4 GPUs × $2.50/hr / 3600 s/hr = $0.00278/s.
    - **Cost per Token**: $0.00278/s / 6,786 tokens/s = $0.00000041/token.
    - **Final Cost**: **$0.41 per 1M tokens**.
