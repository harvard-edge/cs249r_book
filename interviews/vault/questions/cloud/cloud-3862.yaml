title: Pod Placement Bandwidth Bottleneck
scenario: 'A developer submits a distributed training job with two worker Pods, each requesting 4x GPUs, to a cluster of 8-GPU nodes connected via InfiniBand. NCCL logs reveal that transferring a 4 GB activation tensor between the two Pods takes exactly 80 milliseconds. The GPUs exhibit low MFU and spend significant time idle during communication phases.'
question: 'What Kubernetes scheduling behavior explains a 4 GB activation transfer taking 80 ms between the two 4-GPU Pods?'
details:
  realistic_solution: 'The Kubernetes scheduler placed the two 4-GPU Pods on separate nodes due to default resource spreading or lack of pod affinity rules. This forces inter-pod communication over the 50 GB/s InfiniBand network instead of utilizing the 900 GB/s NVLink 4.0 interconnect within a single node. The fix is to apply strict pod affinity to co-locate them or request a single 8-GPU Pod.'
  common_mistake: |
    **The Pitfall:** Assuming a faulty PCIe connection or missing NCCL plugin without checking the theoretical network math.
    **The Rationale:** Engineers immediately assume a driver or hardware failure when communication is slow, ignoring the orchestrator's placement logic.
    **The Consequence:** They spend hours debugging NCCL configurations instead of recognizing that Kubernetes placed the pods on separate nodes, forcing traffic over the slower network fabric.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 GB activation tensor.
       - Intra-node NVLink bandwidth is 900 GB/s.
       - InfiniBand network bandwidth is 50 GB/s.
    2. **Calculations:**
       - Intra-node transfer: 4 GB / 900 GB/s = ~4.4 ms.
       - Network transfer: 4 GB / 50 GB/s = 0.08 seconds = 80 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound** (80 ms matches InfiniBand limit, proving Pods were scheduled across different nodes).
