title: The Idempotent Training Pipeline
scenario: Your company's flagship recommendation model is trained by a complex, multi-stage ML pipeline orchestrated by Airflow/Kubeflow. The pipeline often takes 12+ hours to complete. Recently, you've observed frequent intermittent failures in one of the intermediate stages (e.g., a transient network error, or a temporary resource exhaustion). When this happens, the entire pipeline restarts from the very beginning, wasting significant compute resources and delaying model updates.
question: How would you redesign this pipeline to be more fault-tolerant and cost-efficient, specifically focusing on making its stages idempotent?
details:
  realistic_solution: The core problem is a lack of **idempotency and effective checkpointing** within the pipeline stages. An idempotent operation is one that can be applied multiple times without changing the result beyond the initial application.
  common_mistake: |
    **The Pitfall:** Suggesting "just increase resource limits" or adding simple retry blocks without state awareness.
    **The Rationale:** Candidates try to brute-force the reliability issue rather than architecting the pipeline to handle failure gracefully.
    **The Consequence:** The pipeline remains fragile to external failures (like network partitions), and massive compute resources are still wasted on full restarts.
  napkin_math: |
    *   **Current Waste:** A 12-hour pipeline has 4 stages of 3 hours each. A failure in stage 3 wastes **6 hours** of compute.
    *   **Idempotent Savings:** With proper checkpointing, a failure in stage 3 only re-runs stage 3. Savings = **6 hours per failure**.
    *   **Monthly Impact:** At 10 failures a month, that's **60 hours saved**.
    *   **Financial ROI:** If compute costs $100/hour, idempotency directly saves **$6,000/month** while radically accelerating model delivery.
