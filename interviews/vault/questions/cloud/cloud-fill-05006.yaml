title: Multi-Query vs Multi-Head Attention KV Cache Trade-off
scenario: A production LLM service runs a 70B model with 64 attention heads (head_dim=128) serving batch_size=32
  at 4096 context. Standard MHA KV cache consumes 64×2×4096×128×2 bytes per layer × 80 layers. Compare
  memory footprint vs throughput for MHA, MQA, and GQA with 8 groups on H100 80GB.
details:
  realistic_solution: 'MHA KV per layer = 2×64×4096×128×2 = 134MB. Total 80 layers = 10.7GB per sequence.
    Batch 32 = 341GB — far exceeds 80GB. MQA (1 KV head) = 2×1×4096×128×2×80 = 167MB per sequence, 5.3GB
    for batch 32. GQA-8 = 2×8×4096×128×2×80 = 1.3GB per sequence, 42GB for batch 32 — fits in 80GB. Decode
    bandwidth: MHA = 134MB/layer load; GQA-8 = 16.8MB/layer. GQA-8 achieves ~8× better decode bandwidth
    utilization vs MHA.'
  common_mistake: Forgetting that reducing KV heads also reduces the bandwidth needed to load the KV cache
    per token, directly improving decode throughput.
  napkin_math: 'MHA KV cache: 2×64 heads×4096×128×2B×80 layers = 10.7GB/seq × 32 = 341GB — doesn''t fit.
    GQA-8: divide by 8 = 1.34GB/seq × 32 = 42.9GB — fits H100. Decode BW savings: 8× fewer KV bytes loaded
    per token.'
