title: DLRM Embedding Table Sizing
scenario: Your team is training a Deep Learning Recommendation Model (DLRM). The largest categorical embedding
  table has a vocabulary size of 1 billion items and an embedding dimension of 128. You are training in
  FP32 using the standard Adam optimizer. Calculate the total memory required to store this embedding
  table alongside its optimizer states, and determine the absolute minimum number of 80GB A100 GPUs required
  to shard this table using row-wise model parallelism.
details:
  realistic_solution: Account for the 12 bytes per parameter required for FP32 Adam training. Calculate
    the total parameters (128 Billion), derive the total memory footprint (~1.53 TB), and divide by the
    GPU capacity to find the minimum shard count (20 GPUs).
  common_mistake: Calculating only the memory required for the model weights (4 bytes per parameter) and
    forgetting that the Adam optimizer requires an additional 8 bytes per parameter (for first and second
    moments), leading to a massive 3x underestimation.
  napkin_math: 'Parameters = 10^9 rows * 128 dim = 128 Billion params.

    Memory per param (FP32 + Adam) = 4B (weight) + 4B (momentum) + 4B (variance) = 12 Bytes.

    Total Memory = 128e9 params * 12 Bytes = 1,536e9 Bytes ≈ 1,536 GB.

    Min 80GB GPUs = ceil(1536 GB / 80 GB) = ceil(19.2) = 20 GPUs.'
