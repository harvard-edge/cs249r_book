title: Shadow Mode vs A/B Testing vs Canary Releases
scenario: You are preparing to evaluate a newly trained model in a live production environment.
question: What are the three main online evaluation strategies (Shadow, Canary, A/B), when is each appropriate, and what risk does each mitigate?
details:
  realistic_solution: 'Shadow deployment: The new model runs in parallel with production, processing real traffic, but its predictions are logged — never served to users. Purpose: validate that the model produces reasonable outputs on real data without any user impact. Use when: first deploying a new model type or making large architecture changes. Risk mitigated: catastrophic prediction errors on real-world data not captured in offline eval. Canary release: Route a small fraction (1-5%) of real traffic to the new model and serve its predictions. Monitor key metrics (latency, error rate, business KPIs). Use when: the model has passed shadow testing and you need to validate end-to-end system performance including latency. Risk mitigated: system-level issues (serving latency, memory leaks) under real load. A/B testing: Randomly split users 50/50 between old and new model for a statistically significant period. Measure business impact. Use when: model changes are incremental and you need to quantify revenue/engagement impact. Risk mitigated: deploying a model that is technically correct but hurts business metrics.'
  common_mistake: |
    **The Pitfall:** Jumping straight to A/B testing without shadow validation.
    **The Rationale:** Candidates equate "testing in production" strictly with A/B testing, ignoring the catastrophic risks of exposing live users to an untested model.
    **The Consequence:** Exposing 50% of real users to severe errors or hallucination loops that were not caught in offline evaluations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shadow Mode: Validates logic, 0% user risk.
       - Canary Release: Validates system health, 1-5% user risk.
       - A/B Testing: Validates business metrics, 50% user risk.
    2. **Calculations:**
       - Risk exposure scales sequentially: 0% -> 1-5% -> 50%.
    3. **Conclusion & Interpretation:**
       - **Result: Process-Bound. A phased rollout systematically increases risk exposure as confidence in the model grows.**
