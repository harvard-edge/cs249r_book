title: Diagnosing Unexpected Power Overages in an AMD MI300X Cluster
scenario: 'Your team is deploying a new AI inference cluster consisting of AMD MI300X accelerators. Each
  MI300X comes with 192 GB HBM3, delivers 1,307 TFLOPS FP16 sparse performance, and offers 5.3 TB/s memory
  bandwidth. The datacenter utilizes a hybrid cooling approach, combining traditional air cooling with
  direct-to-chip liquid cooling for high-power components. Recently, you''ve noticed an alarming trend:
  despite deploying fewer MI300X units than initially planned for the current rack''s power budget, the
  overall rack power consumption is consistently higher than expected. This surge is triggering localized
  thermal alerts and has contributed to an observed increase in the datacenter''s overall PUE (Power Usage
  Effectiveness). While individual MI300X units appear to be operating within their specified thermal
  envelopes according to their internal sensors, the aggregate effect at the rack level is problematic.
  What could be the root cause of these symptoms, and how would you methodically diagnose it?'
question: "What could be the root cause of these symptoms, and how would you methodically diagnose it?"
details:
  realistic_solution: 'To diagnose, you would: 1) Conduct a detailed power audit using external power
    monitoring units (PMUs) at the rack PDU level and per-server level to capture actual power draw under
    idle, typical load, and peak inference scenarios. 2) Analyze the temporal power profiles to identify
    spikes or sustained overages. 3) Cross-reference power data with environmental sensor data (temperatures,
    airflow, coolant flow rates) within the rack and cooling zones. 4) Review the cluster''s workload
    scheduling logs to determine if specific high-intensity jobs are being co-located on problematic racks
    or if carbon-aware scheduling is leading to unexpected power concentrations. 5) Assess the liquid
    cooling system''s capacity and distribution, checking for bottlenecks or inefficiencies in heat exchange
    relative to the MI300X''s high heat flux (up to 750W TDP). 6) Evaluate the rack''s power distribution
    unit (PDU) capacity and phase balancing, as imbalanced loads can lead to premature tripping or localized
    heating.'
  common_mistake: A common mistake is to solely focus on the individual component's power consumption
    (e.g., the MI300X's TDP) without accounting for the entire system's power draw, including CPUs, host
    memory, networking cards, power supply unit (PSU) inefficiencies, and cooling infrastructure overhead
    (e.g., pumps for liquid cooling). Another mistake is to neglect peak power draw in favor of average
    consumption, especially during transient workloads or startup sequences.
  napkin_math: Consider a rack with a nominal power budget of 15 kW. Each AMD MI300X OCP module has a
    TDP of approximately 750W. If the associated server components (CPU, memory, networking, host board)
    add an estimated 250W, then each MI300X-enabled system consumes roughly 1000W. Theoretically, this
    rack could host 15 systems (15,000W / 1,000W = 15). If the team deployed 12 such systems (12 x 1000W
    = 12 kW expected) but observed a consistent rack power draw of 14 kW, the average power consumption
    per system is actually 1167W (14,000W / 12 systems). This discrepancy of 167W per system (1167W -
    1000W) or 2 kW total suggests either the MI300X peak power is significantly higher than its average
    TDP, the ancillary components draw more, or there are other unmeasured loads (e.g., shared networking
    switches, KVM over IP, or inefficient power conversion within PSUs) contributing to the overage.
