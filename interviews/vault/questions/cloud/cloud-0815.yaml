title: The Model Distillation Economics
scenario: 'We are spending $180,000/month serving a 70B model on 8x H100 GPUs. An engineer proposes distilling it into a 7B student model that can run on a single A10G ($0.75/hr). The distillation job itself will require 2 weeks on 32x A100 GPUs.'
question: Should we do the 2-week 32x A100 distillation to replace the $180k/month 70B service with a 7B A10G student?
details:
  realistic_solution: 'Distillation is a capital investment with a payback period. You must compute: (1) the one-time distillation cost, (2) the monthly serving cost delta, (3) the quality gap and its business impact, and (4) the maintenance cost of re-distilling when the teacher is updated. The math usually works for stable, high-volume workloads but fails for rapidly iterating models.'
  common_mistake: |
    **The Pitfall:** Thinking that a 10x smaller model means 10x cheaper serving and is obviously worth it.
    **The Rationale:** Ignoring the upfront distillation cost, quality regression, and ongoing retraining costs.
    **The Consequence:** Wasting expensive A100 compute on a distillation process that may not pay off if the model changes frequently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Distillation: 32x A100, 14 days, $2.20/hr.
    - Current serving (70B): $180,000/month.
    - Student serving (7B): 12x A10G (3 regions * 4 A10Gs), $0.75/hr, ~$10k overhead.

    **Calculations:**
    - Distillation Cost: 32 * $2.20 * 24 * 14 = $23,654.
    - Student Serving: 12 * $0.75 * 730 + $10,000 = $16,570/month.
    - Monthly Savings: $180,000 - $16,570 = $163,430/month.
    - Payback period: $23,654 / $163,430 = 0.14 months.
    - Annual Net Savings: ($163,430 * 12) - ($23,654 * 4 re-distillations) = $1.96M - $94.6K = $1.87M.

    **Conclusion & Interpretation:**
    - **Result: $1.87M/year net savings (Capital-Investment-Bound).**
