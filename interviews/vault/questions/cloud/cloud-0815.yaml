title: The Model Distillation Economics
scenario: We're spending $180,000/month serving a 70B model on 8× H100 GPUs. An engineer proposes distilling
  it into a 7B student model that can run on a single A10G ($0.75/hr). The distillation job itself will
  require 2 weeks on 32× A100 GPUs. Should we do it? Show me the math.
details:
  realistic_solution: 'Distillation is a capital investment with a payback period. You must compute: (1)
    the one-time distillation cost, (2) the monthly serving cost delta, (3) the quality gap and its business
    impact, and (4) the maintenance cost of re-distilling when the teacher is updated. The math usually
    works for stable, high-volume workloads but fails for rapidly iterating models.'
  common_mistake: '"Distillation is obviously worth it — 10× smaller model means 10× cheaper serving."
    This ignores the upfront distillation cost, the quality regression requiring human evaluation, and
    the ongoing retraining cost as the teacher model is updated.'
  napkin_math: '**Distillation cost:** 32× A100 × $2.20/hr × 24 hr × 14 days = **$23,654** one-time. |
    **Current serving (70B on 8× H100):** $180,000/month (as given — includes multi-region redundancy,
    load balancing, and operational overhead). | **Student serving (7B on A10G):** A 7B model is 10× smaller
    but A10G is ~5× slower than H100 for inference. To match the 70B system''s throughput: ~4 A10Gs per
    region. With the same multi-region setup (assume 3 regions): 12 × $0.75/hr × 730 hr/month = **$6,570/month**
    for compute. Add operational overhead proportional to original: ~$10,000/month. **Student total ≈
    $16,570/month**. | **Monthly savings:** $180,000 − $16,570 = **$163,430/month**. | **Payback period:**
    $23,654 / $163,430 = **0.14 months (~4 days)**. | **Annual analysis:** If the teacher is updated quarterly,
    re-distill 4×/year = $94,616/year. Annual serving savings = $163,430 × 12 = $1.96M. **Net savings:
    ~$1.87M/year** — if the quality gap is acceptable. A 5% drop in task accuracy on a revenue-critical
    endpoint could easily cost more than $1.87M in lost conversions or customer churn. The decision hinges
    on measuring the quality–cost trade-off, not just the compute math.'
