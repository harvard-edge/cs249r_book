title: Profiling Network Upgrades in ViT Training
scenario: 'A team is training a large Vision Transformer (ViT-Huge) on a cluster of 64 NVIDIA GPUs. To reduce the 450ms step time, the infrastructure team upgrades the cluster''s inter-node network from 200Gbps RoCEv2 to 400Gbps NDR InfiniBand. However, after the upgrade, the step time only decreases to 442ms.'
question: Why did doubling the ViT-Huge cluster network bandwidth from 200Gbps to 400Gbps reduce step time by only about 2%?
details:
  realistic_solution: 'The workload was heavily compute-bound due to the high arithmetic intensity of large dense matrix multiplications in the ViT-Huge architecture combined with large micro-batch sizes. The GPUs were spending the vast majority of the 450ms performing tensor core operations, making the AllReduce communication time a negligible fraction of the overall step time. Optimizing a non-bottleneck yields diminishing returns.'
  common_mistake: |
    **The Pitfall:** Assuming all distributed deep learning jobs are communication-bottlenecked.
    **The Rationale:** Expecting that upgrading interconnect bandwidth will automatically reduce step times proportionally.
    **The Consequence:** Wasting massive CapEx on network upgrades for compute-bound workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: ViT-Huge on 64 GPUs.
    - Original Step Time: 450ms at 200 Gbps. New Step Time: 442ms at 400 Gbps.
    
    **Calculations:**
    - Network upgrade halved communication time: T_comm_old / 2 = T_comm_new.
    - Delta: 450ms - 442ms = 8ms saved. Thus, T_comm_old = 16ms, T_comm_new = 8ms.
    - T_compute = 450ms - 16ms = 434ms.
    
    **Conclusion & Interpretation:**
    - **Result: 434ms Compute Time (Compute-Bound)**. The communication-computation ratio was originally 16/434 (~0.036), confirming a massive compute bottleneck where network speeds are irrelevant.
