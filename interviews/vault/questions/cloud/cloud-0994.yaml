title: Profiling Network Upgrades in ViT Training
scenario: A team is training a large Vision Transformer (ViT-Huge) on a cluster of 64 NVIDIA A100-80GB
  GPUs. To reduce the 450ms step time, the infrastructure team upgrades the cluster's inter-node network
  from 200Gbps RoCEv2 to 400Gbps NDR InfiniBand. However, after the upgrade, the step time only decreases
  to 442ms (a mere ~2% improvement). Analyze the system state to explain why doubling the network bandwidth
  yielded almost no performance gain.
question: "Why did doubling the ViT-Huge cluster network bandwidth from 200Gbps to 400Gbps reduce step time by only about 2%?"
details:
  realistic_solution: The workload was heavily compute-bound due to the high arithmetic intensity of large
    dense matrix multiplications in the ViT-Huge architecture combined with large micro-batch sizes. The
    GPUs were spending the vast majority of the 450ms performing tensor core operations (computation),
    making the AllReduce communication time a negligible fraction of the overall step time. Optimizing
    a non-bottleneck yields diminishing returns.
  common_mistake: Assuming all distributed deep learning jobs are communication-bottlenecked and that
    upgrading interconnect bandwidth will automatically reduce step times proportionally.
  napkin_math: Assume original step time T_step = 450ms. If T_compute = 434ms, then original T_comm =
    16ms (at 200Gbps). Doubling network bandwidth to 400Gbps roughly halves T_comm to 8ms. New step time
    = 434ms + 8ms = 442ms. Speedup = 450 / 442 ≈ 1.018 (or ~1.8%). The communication-computation ratio
    was originally 16/434 ≈ 0.036, definitively confirming a compute-bound state.
