title: AMD MI300X Thermal Throttling Analysis for LLM Inference
scenario: You are deploying a large language model (LLM) for inference on an AMD MI300X accelerator, which boasts 192 GB HBM3 memory and a theoretical peak of 1,307 TFLOPS FP16 dense with a memory bandwidth of 5.3 TB/s. Initially, your LLM achieves excellent throughput, utilizing near-peak performance. However, after several minutes of continuous high-load inference, you observe a significant and consistent drop in inference speed, settling at approximately 60% of the initial peak. The system's power consumption remains high, but the effective computational throughput has declined. You notice that the ambient datacenter temperature is higher than optimal.
question: Why does MI300X inference drop to about 60% of peak after sustained load, and what telemetry would indicate thermal throttling?
details:
  realistic_solution: 'An L4 engineer would approach this by: 1. Implementing comprehensive monitoring of GPU metrics including core temperature, clock frequencies (compute and memory), power consumption, and fan speeds (if applicable) alongside inference throughput. 2. Correlating the observed performance drop with increasing temperatures and subsequent clock speed reductions, identifying that the MI300X is indeed thermal throttling. 3. Analyzing the datacenter''s cooling capacity and airflow, determining if the cooling solution is insufficient for the sustained heat output of the MI300X at full load. 4. Proposing solutions such as optimizing workload scheduling to introduce brief idle periods for cooling, implementing better rack-level airflow management, or considering advanced cooling solutions (e.g., direct-to-chip liquid cooling) if necessary, and adjusting power limits or fan curves to prioritize sustained performance over short bursts in high-ambient environments.'
  common_mistake: |
    **The Pitfall:** Assuming theoretical peak performance (e.g., 1,307 TFLOPS) is continuously sustainable under all operating conditions.
    **The Rationale:** Engineers often rely on spec-sheet numbers without accounting for Thermal Design Power (TDP) limits and datacenter cooling efficiency.
    **The Consequence:** Deploying workloads that hit a thermal wall after a few minutes, leading to unpredictable throughput degradation and missed SLAs.
  napkin_math: |
    - The AMD MI300X has a package TDP of roughly 750W.
    - Initially, inference achieves near-peak 1,307 TFLOPS, generating massive heat.
    - If the cooling system can only dissipate 600W continuously, the GPU must throttle to 600W / 750W = 80% of its power limit.
    - **The 60% performance drop indicates the clocks are severely scaling back to maintain thermal equilibrium, constrained by the 600W cooling capacity.**
