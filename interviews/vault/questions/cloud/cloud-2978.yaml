title: Feature Store: Design a Low-Latency Feature Store for Real-Time LLM Serving
scenario: You are designing a feature store for a recommendation LLM serving 100K requests/second on H100s. Each request requires 500 pre-computed user features (retrieval latency SLA < 5ms p99).
question: How would you design a feature store architecture to serve 100K requests/second with 500 features per request at < 5ms p99 latency?
details:
  realistic_solution: For a < 5ms p99 SLA at 100K RPS, a standard network-attached NoSQL database will fail. The online store must be in-memory (e.g., Redis Cluster or Aerospike) co-located in the same availability zone as the serving nodes. Serialization should use a zero-copy or fast-decode format like FlatBuffers or Protobuf, rather than JSON. Compute placement should deploy a local daemonset or sidecar on the inference nodes to fetch features via a persistent connection pool.
  common_mistake: |
    **The Pitfall:** Using a traditional network-attached NoSQL database without caching.
    **The Rationale:** Engineers often default to standard database solutions without calculating the strict retrieval latency requirements and serialization overhead.
    **The Consequence:** Adding 20-50ms retrieval latency, violating the < 5ms SLA and bottlenecks the entire serving system.
  napkin_math: |
    1. **Calculate Total Bandwidth:** 100K RPS × 500 features × 8 bytes/feature = 400 MB/s (easily handled by Redis).
    2. **Evaluate Network Latency:** Same-AZ network hop is ~0.5ms.
    3. **Evaluate Deserialization:** Deserialization of 4KB Protobuf is < 0.1ms.
    **Final Result: Total retrieval time is ~1-2ms, comfortably within the 5ms SLA using an in-memory store and fast serialization.**
