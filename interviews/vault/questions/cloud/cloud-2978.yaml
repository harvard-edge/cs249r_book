title: 'Feature Store: Design a Low-Latency Feature Store for Real-Time LLM Serving'
scenario: 'You are designing a feature store for a recommendation LLM serving 100K
  requests/second on H100s (80GB HBM3, 3.35 TB/s). Each request requires 500 pre-computed
  user features (retrieval latency SLA: < 5ms p99). Design the feature store architecture:
  storage tier, caching, serialization format, and compute placement.'
question: How would you design a feature store architecture to serve 100K requests/second with 500 features per request at < 5ms p99 latency?
details:
  realistic_solution: 'For a < 5ms p99 SLA at 100K RPS, a standard network-attached NoSQL database (like DynamoDB) will likely fail. The online store must be in-memory (e.g., Redis Cluster or Aerospike) co-located in the same availability zone as the serving nodes. Serialization should use a zero-copy or fast-decode format like FlatBuffers or Protobuf, rather than JSON. Compute placement: deploy a local daemonset or sidecar on the inference nodes to fetch features via a persistent connection pool, avoiding extra network hops.'
  common_mistake: 'Using a feature store that adds 20-50ms retrieval latency (e.g., DynamoDB without caching) for a system requiring < 5ms. Not co-locating feature store with serving infrastructure.'
  napkin_math: 'Throughput: 100K RPS × 500 features. If each feature is 8 bytes, the payload per request is 4KB. Total bandwidth: 100,000 × 4KB = 400 MB/s, which is easily handled by an in-memory store like Redis. Network latency: same-AZ network hop is ~0.5ms. Deserialization of 4KB Protobuf is < 0.1ms. Total retrieval time ~1-2ms, comfortably within the 5ms SLA.'
