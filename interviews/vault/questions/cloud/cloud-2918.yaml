title: 'Fluency: explain depthwise separable convolution to a non-ML systems engineer'
scenario: A backend engineer on your team is reviewing a PR that replaces standard convolutions with depthwise separable convolutions in a MobileNet-based service. They ask why this changes the latency and whether it affects the model's behavior. Explain depthwise separable convolutions in terms of what computation is happening, why it's faster, and any functional differences.
question: How do depthwise separable convolutions differ from standard convolutions, why are they faster, and how can they change model behavior?
details:
  realistic_solution: 'Standard convolution: every output feature at a spatial location combines information from ALL input channels AND all spatial neighbors simultaneously, using Cin×Cout×k² parameters. Depthwise separable: first, a depthwise conv applies one filter per input channel independently (spatial filtering only, k² params per channel). Then, a pointwise 1×1 conv mixes across channels (no spatial, Cin×Cout params). Together they approximate the standard conv but with 8–9× fewer operations. Functional difference: the joint cross-channel-spatial reasoning is decoupled, which is why MobileNets trade a small accuracy reduction for large efficiency gain.'
  common_mistake: Explaining depthwise separable convolutions as 'just a factorization trick' without explaining that the separation of spatial filtering from channel mixing is a semantic change that reduces the model's ability to jointly reason across channels and space in a single operation.
  napkin_math: 'Standard conv C=128, k=3: 128×128×9 = 147,456 params per layer. Depthwise sep: depthwise 128×9 = 1,152 + pointwise 128×128 = 16,384 → 17,536 params. 8.4× fewer params. FLOPs: same ratio. At H100 batch=256: standard conv 14×14 spatial: 256×2×128²×9×196 = 14.8B FLOPs. Depthwise sep: 256×(2×128×9×196 + 2×128²×196) = 256×(451K+6.4M) = 1.76B FLOPs. 8.4× fewer FLOPs. Latency improvement in practice: 2–4× (not 8.4×) because depthwise is memory-bound on H100.'
