title: Model Weight Exfiltration Timing
scenario: 'A proprietary 7B parameter LLM deployed in FP16 precision on a cloud VM is targeted by an attacker who gained read access to the mounted volume. To evade the cloud provider''s egress anomaly detection, which flags sustained outbound traffic above 10 GB per 10-minute window, the attacker throttles their exfiltration script to 100 Mbps.'
question: How large is the FP16 7B model theft payload, how long does exfiltration at 100 Mbps take, and does it evade the 10 GB/10-min alarm?
details:
  realistic_solution: 'The transfer takes ~18.6 minutes, moving 7.5 GB per 10-minute window, thereby evading the alarm. Effective mitigation requires confidential computing (encrypted memory/storage) and stricter identity-based egress controls.'
  common_mistake: |
    **The Pitfall:** Failing to correctly calculate the model size or confusing Mbps with MBps.
    **The Rationale:** Candidates often assume 1 parameter = 1 byte or forget to divide megabits by 8 to get megabytes.
    **The Consequence:** Incorrectly concluding the transfer volume exceeds the alarm threshold, leading to a false sense of security regarding egress monitoring.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters in FP16.
    - Exfiltration rate: 100 Mbps.
    - Cloud alarm threshold: >10 GB per 10-minute window.

    **Calculations:**
    - Model Size: 7,000,000,000 parameters * 2 bytes = 14 GB.
    - Exfiltration Speed in MB: 100 Mbps / 8 = 12.5 MB/s.
    - Total Time: 14,000 MB / 12.5 MB/s = 1,120 seconds (~18.6 minutes).
    - Data transferred per 10-minute window (600s): 12.5 MB/s * 600s = 7,500 MB = 7.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 7.5 GB per window (Security-Bound)**. Since 7.5 GB is safely below the 10 GB alarm threshold, the attacker successfully steals the 14 GB model over ~18 minutes without triggering egress anomaly detection.
