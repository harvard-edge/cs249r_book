title: The H100's Roofline Ridge Point
scenario: 'You are evaluating an NVIDIA GPU''s performance characteristics using the roofline model.'
question: 'What is the ridge point from 989 TFLOPS and 3.35 TB/s, and what does it mean for kernels?'
details:
  realistic_solution: 'The ridge point is the value of Arithmetic Intensity (AI) at which a workload transitions from being memory-bound to compute-bound. It is the intersection of the memory bandwidth roof and the compute performance ceiling in a roofline plot. It''s calculated by dividing the peak compute performance by the peak memory bandwidth. For this GPU: Ridge Point = 989 TFLOPS / 3.35 TB/s = 295.2 FLOPs/Byte. This means any kernel with an arithmetic intensity below ~295 FLOPs/Byte is memory-bound — its performance is limited by how fast data can be fetched from HBM, not by compute capacity.'
  common_mistake: |
    **The Pitfall:** Unit mismatch when calculating the ratio.
    **The Rationale:** Engineers often divide raw numbers without ensuring the units are strictly aligned (e.g., mixing TFLOPS and GB/s).
    **The Consequence:** They produce an off-by-magnitude ridge point, fundamentally misclassifying whether a workload is compute-bound or memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Peak Compute: 989 TFLOPS (989 * 10^12 FLOPs/s).
       * Peak Memory Bandwidth: 3.35 TB/s (3.35 * 10^12 Bytes/s).
    2. **Calculations:**
       * Ridge Point = (989 * 10^12) / (3.35 * 10^12).
       * Ridge Point = 295.2 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       * **Result: A kernel must perform >295 arithmetic operations per byte moved to be Compute-Bound.**
  options:
  - 0.0034 FLOPs/Byte
  - 295.2 FLOPs/Byte
  - 295,200 FLOPs/Byte
  - 3.39 FLOPs/Byte
  correct_index: 1
