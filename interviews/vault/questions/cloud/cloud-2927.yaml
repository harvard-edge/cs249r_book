title: 'K8s GPU Device Plugin: Why Pod Requests Whole GPUs'
scenario: A junior engineer asks why a pod spec requesting `nvidia.com/gpu: 1` always gets an entire physical GPU even when the workload only uses 4 GB of the H100's 80 GB HBM3. They want to know how the NVIDIA device plugin communicates available GPUs to the kubelet and why fractional allocation isn't the default behavior.
question: Why does nvidia.com/gpu: 1 allocate an entire H100, how does the device plugin expose GPUs, and why aren’t fractions default?
details:
  realistic_solution: 'The NVIDIA device plugin registers each physical GPU as a single discrete resource via the Kubernetes Device Plugin API (ListAndWatch). Kubelet tracks integer counts; fractional GPU sharing requires separate mechanisms like MIG partitioning on H100 or time-slicing via the NVIDIA GPU Operator''s `deviceConfig`. Without those, every pod claiming `nvidia.com/gpu: 1` monopolizes one full device.'
  common_mistake: |
    **The Pitfall:** Assuming the device plugin natively supports fractional division.
    **The Rationale:** Candidates conflate Kubernetes CPU millicores (which are natively fractional) with GPU allocation, believing `nvidia.com/gpu: 0.5` is valid syntax out-of-the-box.
    **The Consequence:** The candidate misunderstands Kubernetes scheduling and fails to utilize MIG or time-slicing, wasting massive amounts of H100 capacity.
  napkin_math: |
    *   **H100 Capacity:** 80 GB HBM3.
    *   **MIG Partitioning:** 7 instances (e.g., MIG 1g.10gb).
    *   **Result:** Without MIG or time-slicing enabled in the deviceConfig, Kubelet strictly enforces integer counts. Enabling MIG turns 8 physical H100s into **56 allocatable GPU slices**, increasing pod density by 7×.
