title: 'K8s GPU Device Plugin: Why Pod Requests Whole GPUs'
scenario: 'A junior engineer asks why a pod spec requesting nvidia.com/gpu: 1 always gets an entire physical GPU even when the workload only uses 4 GB of HBM. They want to know how the NVIDIA device plugin communicates available GPUs to the kubelet and why fractional allocation isn''t the default behavior.'
question: 'Why does nvidia.com/gpu: 1 allocate an entire GPU, how does the device plugin expose GPUs, and why aren''t fractions default?'
details:
  realistic_solution: 'The NVIDIA device plugin registers each physical GPU as a single discrete resource via the Kubernetes Device Plugin API (ListAndWatch). Kubelet tracks integer counts; fractional GPU sharing requires separate mechanisms like MIG partitioning or time-slicing via the NVIDIA GPU Operator''s deviceConfig.'
  common_mistake: |
    **The Pitfall:** Assuming the device plugin natively supports fractional division.
    **The Rationale:** Candidates conflate Kubernetes CPU millicores (which are natively fractional) with GPU allocation, believing nvidia.com/gpu: 0.5 is valid syntax out-of-the-box.
    **The Consequence:** The candidate misunderstands Kubernetes scheduling and fails to utilize MIG or time-slicing, wasting massive amounts of capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pod requests `nvidia.com/gpu: 1`.
    - Native Kubelet scheduling tracks integer discrete devices.

    **Calculations:**
    - 1 Pod = 1 full physical GPU allocated.
    - With MIG partitioning enabled: 1 physical GPU = up to 7 allocatable GPU slices.

    **Conclusion & Interpretation:**
    - **Result: 1 GPU (Scheduling-Bound)**. Without MIG or time-slicing, integer counts strictly apply.
