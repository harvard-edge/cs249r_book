math_issues:
- The Ring AllReduce time calculation is incorrect. The formula is Time = 2 * (N-1)/N * S / BW. For N=64,
  S=2GB, BW=400Gbps (50GB/s), Time = ~78.8ms. The text calculates 20.3ms by forgetting the factor of 2
  and incorrectly using bidirectional bandwidth.
