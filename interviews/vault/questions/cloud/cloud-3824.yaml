title: Network Bottleneck Debug Spec
scenario: An LLM serving cluster sees P99 latency spikes when requests route across
  racks. Specify the network telemetry needed to distinguish bandwidth saturation
  from topology placement and retry storms.
question: What network telemetry distinguishes bandwidth saturation, poor placement,
  and retry storms in a rack-scale LLM serving cluster?
details:
  realistic_solution: Collect per-link utilization, bisection path, rack placement,
    request fanout, retransmits, queue depth, retry rate, and per-hop latency. Bandwidth
    saturation appears as high utilization; poor placement shows cross-rack traffic
    for tightly coupled shards; retry storms show offered load exceeding original
    request volume.
  common_mistake: Looking at aggregate cluster bandwidth and missing placement-specific
    hot links or retry amplification.
  napkin_math: If original traffic is 10,000 rps and retry rate is 30%, offered load
    becomes 13,000 rps before fanout.
