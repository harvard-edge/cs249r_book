title: The Unfused Dequantization Tax
scenario: You are deploying a 3B parameter LLM to premium mobile devices via your cloud app. An FP16 version
  (6GB) exceeds the 4GB mobile RAM limit. You apply INT4 weight-only quantization (W4A16), successfully
  shrinking the model to 1.5GB. However, when benchmarked on the mobile GPU, the token generation speed
  drops from 15 tokens/sec (measured on a 1.5GB FP16 dummy model) to a dismal 3 tokens/sec.
details:
  realistic_solution: "The severe performance degradation is caused by unfused dequantization operations\
    \ leading to memory bandwidth saturation, not ALU limits. In W4A16 quantization, weights are stored\
    \ in INT4 but computations are done in FP16. Mobile GPUs typically lack native INT4 matrix-multiply\
    \ hardware. \n\nIf the compiler doesn't have a fused kernel (where INT4 weights are loaded into SRAM\
    \ registers, converted to FP16 on the fly, and immediately multiplied), it will materialize the dequantization\
    \ as a separate graph node. This means the GPU reads 1.5GB of INT4 weights from DRAM, converts them\
    \ to 6GB of FP16 weights, writes the 6GB back to DRAM, and then reads the 6GB again for the matrix\
    \ multiplication. The tradeoff is engineering effort to write custom fused Metal/Vulkan compute shaders\
    \ (Hardware-Compiler co-design) vs falling back to smaller models or cloud inference."
  common_mistake: Assuming the mobile GPU lacks the compute power (ALUs) to perform INT4 arithmetic efficiently.
  napkin_math: 'Mobile GPU Memory Bandwidth: ~50 GB/s. Fused W4A16: Read 1.5GB INT4 per token. 1.5GB /
    50GB/s = 30ms per token -> ~33 tokens/sec. Unfused W4A16: Read 1.5GB (INT4) + Write 6GB (FP16) + Read
    6GB (FP16) = 13.5GB of memory traffic per token. 13.5GB / 50GB/s = 270ms per token -> ~3.7 tokens/sec.'
