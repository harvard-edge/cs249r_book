title: Membership Inference Attack Resistance Under DP
scenario: A red team successfully mounts a likelihood ratio membership inference attack (MIA) against
  your DP-trained model, achieving 61% attack AUC despite a claimed ε=4 privacy guarantee. Your privacy
  engineer says this is theoretically impossible since DP bounds MIA advantage. The red team says the
  ε=4 guarantee is real but their attack is exploiting something else. Who is right, and what are the
  root causes?
question: "Who is right, and what are the root causes?"
details:
  realistic_solution: 'Both sides are partially right. The ε-DP guarantee bounds per-record distinguishability:
    for any single record, the adversary''s advantage is bounded by (e^ε - 1)/(e^ε + 1) ≈ 0.96 for ε=4
    — this allows AUC up to ~0.96. The 61% AUC is within the theoretical bound. The red team''s attack
    is likely exploiting: (1) overfitting on high-frequency records (records appearing many times in the
    dataset inflate effective exposure), (2) output confidence calibration leaking aggregate membership
    signals across correlated records, (3) clipping norm C set too high, effectively not clipping many
    gradients and leaving large members'' influence intact. Mitigations: reduce ε to ≤1 for strong MIA
    resistance, audit per-record exposure using Feldman''s memorization metric, lower clipping norm.'
  common_mistake: Assuming ε-DP directly bounds MIA AUC at 0.5 + ε-related term. The formal bound is P[M(D)∈S]/P[M(D')∈S]
    ≤ e^ε, which limits per-example distinguishability but allows aggregate memorization signals to persist
    if the attack exploits model behavior beyond single-example distinguishability.
  napkin_math: 'Theoretical MIA AUC upper bound under ε-DP: AUC ≤ 1/2 + (e^ε - 1)/(2(e^ε + 1)). For ε=4:
    (e^4-1)/(2(e^4+1)) = (54.6-1)/(2×55.6) = 53.6/111.2 ≈ 0.482. So AUC ≤ 0.982. For ε=1: (e^1-1)/(2(e^1+1))
    = 1.718/7.436 ≈ 0.231. AUC ≤ 0.731. 61% AUC at ε=4 is within bounds but indicates weak practical privacy
    — ε=1 needed to push AUC below 0.73.'
