title: Process Group Topology for 3D Parallelism
scenario: 'You are architecting the process group topology for training a 175B parameter model on 1024 H100 GPUs using 3D parallelism (TP=8, PP=16, DP=8). Each node has 8 GPUs connected via NVLink (900 GB/s), and nodes are connected via 400 Gbps InfiniBand.'
question: 'Should TP or DP process groups be mapped to intra-node NVLink for TP=8, PP=16, DP=8 training, and why?'
details:
  realistic_solution: 'Map the TP process group to intra-node NVLink because TP requires an AllReduce of activations for every transformer layer in every microbatch. Map the DP process group to inter-node InfiniBand, as DP only requires an AllReduce of gradients once per iteration, which can be heavily overlapped with the backward pass.'
  common_mistake: |
    **The Pitfall:** Assuming Data Parallel (DP) requires the highest bandwidth and should use NVLink.
    **The Rationale:** Candidates know DP syncs the entire model's gradients (massive data size) and assume it must be the bottleneck, failing to realize DP communication only happens once per iteration and can be overlapped with compute.
    **The Consequence:** Forcing Tensor Parallelism (TP) across slow InfiniBand links, drastically increasing step time.
  napkin_math: |
    * TP transfer per iteration: ~1.6 GB/layer * 96 layers * 8 microbatches ≈ 1.2 TB.
    * TP on 400 Gbps (50 GB/s) IB takes 24s. On 900 GB/s NVLink, it takes ~1.3s.
    * DP transfer per iteration: 350 GB. On IB, this takes ~7s, but is overlapped with compute.
    * **Forcing TP onto inter-node InfiniBand increases iteration time by >20s.**
