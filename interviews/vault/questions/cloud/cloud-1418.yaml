title: Redesigning an End-to-End Vision Inference Pipeline
scenario: A cloud-based real-time video analytics service processes 1080p streams using an object detection model on T4 GPUs. The SLA requires end-to-end latency under 100ms per frame. Currently, the pipeline is CPU-bottlenecked: preprocessing (resizing, normalization) takes 45ms on CPU, GPU inference takes 20ms, and post-processing (NMS, bounding box scaling) takes 40ms on CPU.
question: "How can you redesign this pipeline to meet the 100ms SLA, and what are the quantitative trade-offs regarding batching and GPU utilization?"
details:
  realistic_solution: Offload preprocessing and postprocessing to the GPU to eliminate CPU bottlenecks and reduce expensive CPU-GPU PCIe data transfers. Using NVIDIA DALI for GPU-accelerated decoding/resizing and CUDA kernels for NMS reduces the pipeline from 105ms (CPU-bound) to ~30ms. This frees enough latency headroom to batch 3 frames within the 100ms SLA, increasing throughput by 3x and pushing GPU utilization from 19% toward 100%.
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing the neural network weights (e.g., quantization).
    **The Rationale:** Candidates look at "inference" and default to model compression, ignoring that 80% of the latency is spent in pre/post-processing on the CPU.
    **The Consequence:** The model runs faster, but the end-to-end pipeline still violates the 100ms SLA due to the unaddressed CPU bottlenecks.
  napkin_math: |
    - Baseline Latency: Pre (45ms) + Inf (20ms) + Post (40ms) = 105ms (Fails 100ms SLA).
    - Baseline GPU Utilization: 20ms active / 105ms total = 19%.
    - GPU-Accelerated Latency: GPU Pre (5ms) + Inf (20ms) + GPU Post (5ms) = 30ms per frame.
    - Batching Headroom: With a 30ms pipeline, a batch size of 3 fits within the SLA (3 * 30ms = 90ms < 100ms).
    - **Result: Throughput increases 3x, and GPU utilization pushes toward 100% while strictly meeting the SLA.**
