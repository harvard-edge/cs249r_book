title: Cross-Pool KV Compression Tradeoff
scenario: 'Your team proposes compressing the KV-cache before transferring it from prefill to decode GPUs
  (e.g., quantizing KV from FP16 to INT8 or FP8). The expected compression ratio is 2×, halving transfer
  time. Evaluate this proposal: what does it improve, what does it cost, and under what conditions is
  it net-positive?'
question: "Should you compress the KV-cache before prefill-to-decode transfer, and when is the 2× transfer reduction net-positive?"
details:
  realistic_solution: 'Benefits: KV transfer halved (e.g., 7.7 ms → 3.8 ms for the Q62001 scenario), reducing
    TTFT. Each decode step reads KV from HBM: INT8 KV halves KV read bandwidth, increasing decode throughput
    on bandwidth-bound GPUs. Costs: (1) Compression adds latency at end of prefill (~0.5-1 ms for CUDA
    kernel, negligible). (2) Decompression per decode step adds ~0.1-0.2 ms per step — on a 200-token
    output this is 20-40 ms extra TPOT overhead. (3) Quantization error in KV accumulates over long generations
    — INT8 KV causes measurable quality degradation at 1k+ output tokens. Net-positive when: output length
    is short (<200 tokens), TTFT is the binding SLO (not TPOT), and network is the bottleneck (< 200 Gbps).
    Net-negative when: long outputs, TPOT-sensitive workloads, or high-bandwidth network (400+ Gbps) where
    transfer latency is already small.'
  common_mistake: Approving it unconditionally based on the 2× transfer speedup without accounting for
    decompression cost on the decode GPU and accuracy impact on long-generation tasks.
  napkin_math: '400 Gbps network: 384 MB transfer = 7.7 ms. With INT8 2×: 3.9 ms savings. But 200-token
    decode with 0.2 ms/step decompression overhead = 40 ms added TPOT. Breakeven: 3.9 ms TTFT improvement
    / 40 ms TPOT degradation = net negative for TPOT-sensitive workloads. At 100 Gbps (25 GB/s): same
    384 MB takes 15.4 ms, savings = 7.7 ms, still net negative at 200 tokens.'
