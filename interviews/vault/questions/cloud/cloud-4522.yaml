title: A100 Pipeline Bubble Sizing
scenario: An 8-stage pipeline runs on 8x A100 80GB SXM GPUs with 32 microbatches.
  Stages are NOT balanced - the embedding-and-early-attention stage takes 65 ms,
  the middle 6 stages take 50 ms each, and the LM-head stage takes 70 ms (large
  vocab projection). The candidate must reason about heterogeneous-stage pipeline
  bubble overhead.
question: Calculate the effective pipeline bubble percentage given heterogeneous
  per-stage times. Identify why the textbook (P-1)/(M+P-1) formula understates real
  overhead when stages are imbalanced.
visual:
  kind: svg
  path: cloud-4522.svg
  alt: Pipeline bubble Gantt chart showing empty slots at the start and end of microbatch
    execution.
  caption: Pipeline bubble time across 8 stages.
details:
  realistic_solution: 'Steady-state cycle time is gated by max stage = 70 ms. Total
    pipeline time = (M + P - 1) * t_max = 39 * 70 = 2730 ms. Useful work per microbatch
    = 65 + 6*50 + 70 = 435 ms; total useful = 32 * 435 = 13920 GPU-ms. Total available
    = 8 * 2730 = 21840 GPU-ms. Bubble fraction = 1 - 13920/21840 = 36.3%. Naive
    homogeneous formula (P-1)/(M+P-1) = 7/39 = 17.9% understates by ~2x. Imbalanced
    stages create persistent idle on every fast stage, not just at fill/drain - that
    is the missing term.'
  common_mistake: Plugging M and P into (P-1)/(M+P-1) without accounting for the
    fact that fast stages idle waiting for the slow stage on EVERY microbatch, not
    just during fill and drain.
  napkin_math: 'Total time = (32+7) * 70 = 2730 ms. Useful = 32 * (65+6*50+70) = 13920
    GPU-ms. Bubble = 1 - 13920/(8*2730) = 36.3% (vs 17.9% homogeneous estimate).'
