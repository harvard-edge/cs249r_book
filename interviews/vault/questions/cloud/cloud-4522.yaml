title: A100 Pipeline Bubble Sizing
scenario: An 8-stage pipeline runs on 8x A100 80GB SXM GPUs. A microbatch takes 50
  ms per stage. The schedule uses 32 microbatches.
question: Calculate the pipeline bubble overhead as a percentage of total execution
  time.
visual:
  kind: svg
  path: cloud-4522.svg
  alt: Pipeline bubble Gantt chart showing empty slots at the start and end of microbatch
    execution.
  caption: Pipeline bubble time across 8 stages.
details:
  realistic_solution: Total time is (number of microbatches + pipeline stages - 1)
    * stage time = (32 + 8 - 1) * 50 = 39 * 50 = 1950 ms. The ideal time for 32 microbatches
    on 1 stage is 32 * 50 = 1600 ms. The bubble time is 1950 - 1600 = 350 ms. Overhead
    = 350 / 1950 = 17.9%.
  common_mistake: Computing bubble fraction over the ideal time instead of the total
    execution time.
  napkin_math: (8-1)/(32+8-1) = 7/39 = 17.9%
