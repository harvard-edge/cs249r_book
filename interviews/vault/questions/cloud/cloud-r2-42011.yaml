title: Fan-Out Tail Amplification in Mixture-of-Experts
scenario: Your MoE model with 8 experts across 8 MI300X GPUs activates 2 experts per token. Each expert
  has P99 = 20ms. A single token's latency is determined by the slower of its 2 experts. For a batch of
  128 tokens, each needing different expert pairs, what is the expected P99 of the full batch, and how
  do you mitigate the amplification?
details:
  realistic_solution: 'Single token: P(both experts < 20ms) = 0.99² = 0.9801. So per-token P99 ≈ P98 of
    single expert ≈ 18ms. But for 128 tokens across a batch: P(all 128 tokens fast) = 0.9801^128 = 0.079
    — only 8% chance that no token hits tail. The batch P99 is dominated by the worst token, which will
    almost certainly have at least one expert hitting P99.9+, roughly 45ms. Mitigation: (1) Expert-parallel
    AllToAll overlapped with compute so no token blocks others; (2) speculative expert execution — run
    top-3 experts, use first 2 to respond; (3) expert replication — place hot experts on multiple GPUs
    via Infinity Fabric to reduce queuing at popular experts.'
  common_mistake: Calculating P99 for a single token's 2-expert fan-out but forgetting that the batch
    waits for the slowest token across all 128 tokens. The batch P99 is far worse than single-token P99.
  napkin_math: 'Per-token: P99 with 2 experts = 1-(1-0.01)^2 ≈ 2% tail rate. Batch of 128: P(≥1 tail)
    = 1-0.98^128 = 92%. Expected max latency ≈ P99.95 of single expert ≈ 45ms. With expert replication
    (2× hot experts): tail rate per expert halved, batch P99 ≈ 25ms. Infinity Fabric cost: 400 GB/s per
    MI300X link, expert weights ~2 GB, replication takes 5ms one-time.'
