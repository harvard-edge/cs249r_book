title: Power Distribution Unit Over-Subscription in GPU Clusters
scenario: You are commissioning a new H100 training cluster. The datacenter vendor offers PDUs rated at
  30 kW continuous and 36 kW peak (20% oversubscription for 10-second bursts). Your deployment uses 3×
  8×H100 nodes per rack, each node rated at 8 kW TDP. A cluster benchmarking team reports that during
  the first minute of large-model training, all GPUs ramp from idle to full TDP simultaneously. Explain
  the power ramp-up risk, calculate whether the PDU can handle it, and propose a soft-start training policy.
details:
  realistic_solution: 'Steady state: 3 × 8 kW = 24 kW, well within 30 kW continuous. But simultaneous
    power-on inrush: each node can spike to ~12 kW for 200ms (1.5× TDP). Three nodes simultaneously: 3
    × 12 kW = 36 kW = exactly the PDU peak limit, with zero margin. Risk: any additional overhead (networking,
    CPUs ramping) tips the PDU over. Soft-start policy: stagger job launch across nodes with 5-second
    delays. In SLURM, use --begin with per-node stagger or implement a prolog script that delays GPU power-on
    by node_rank × 5s. Reduces simultaneous peak to max 2 nodes = 24 kW inrush, leaving 12 kW headroom.'
  common_mistake: Assuming PDU peak rating is safe for simultaneous all-node power ramp. The 20% oversubscription
    on 30 kW PDUs = 36 kW, but 3 nodes × 8 kW = 24 kW steady state. The risk is not steady-state overflow
    but rather the transient inrush current when GPU voltage regulators all switch on simultaneously—this
    can produce 1.5-2× instantaneous spike above TDP for 100-500ms.
  napkin_math: 'Steady state: 3 nodes × 8 kW = 24 kW (80% of 30 kW PDU). Inrush spike: 3 × 12 kW = 36
    kW = 100% of 36 kW PDU peak. Zero headroom. With staggered start (5s delay): max 1 node inrush + 2
    steady-state = 12 + 16 = 28 kW (93% of 30 kW continuous, 78% of 36 kW peak). Safe. Stagger time to
    choose: inrush duration ~200ms, so 200ms delay is theoretically sufficient, but 5s is safer given
    CPU/memory ramp. Per rack across 1000-rack cluster: 1,000 × 5s stagger = 5,000s total ramp window,
    but can parallelize across racks.'
