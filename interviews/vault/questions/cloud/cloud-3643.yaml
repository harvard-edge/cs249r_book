title: P99 vs P999 Tradeoffs in Batching Strategy
scenario: An ML serving system on MI300X (192GB HBM3, 5.3TB/s) uses dynamic batching with a 20ms timeout and max batch size 64. P50 latency is 35ms, P99 is 95ms. A product team requests P999 < 200ms. The current P999 is 450ms, caused by requests that wait the full 20ms timeout but end up in a large batch.
question: How would you change the dynamic batching policy to meet P999 < 200ms without collapsing GPU utilization?
details:
  realistic_solution: 'Implement adaptive batching: use a short timeout (5ms) for small batches (<=8 requests) but allow larger batches to form when queue depth exceeds 32. Add a per-request max-wait SLA of 15ms. Monitor queue depth as a leading indicator. MI300X''s 5.3TB/s bandwidth means small batches are not significantly penalized.'
  common_mistake: |
    **The Pitfall:** Reducing the global batch timeout to 5ms for all requests.
    **The Rationale:** Engineers assume minimizing wait time fixes tail latency without realizing it completely destroys large-batch formation.
    **The Consequence:** The strict timeout reduces GPU utilization from 80% to 45%, increasing operational costs by ~78% with only a marginal P50 improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X with 5.3TB/s bandwidth.
       - 7B model (14GB BF16).
       - Target P999 < 200ms.
    2. **Calculations:**
       - Model load time: 14GB / 5.3TB/s = 2.6ms.
       - Batch 8 @ 5ms timeout: latency = 5ms wait + 2.6ms load + compute.
       - Batch 64 @ 20ms timeout: latency = 20ms wait + 2.6ms load + 8x compute.
    3. **Conclusion & Interpretation:**
       - **Result: With 5.3TB/s bandwidth, small batches are not heavily penalized. Adaptive batching with a 5ms timeout for small queues easily meets the 200ms SLA without destroying throughput. System is Latency-Bound at the tail.**
