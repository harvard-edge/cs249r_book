title: Evaluating 2:4 Structured Sparsity on A100
scenario: You are evaluating pruning strategies for a 7B parameter LLM on an A100 GPU cluster. The research team proposes unstructured pruning (70% sparsity, 1% accuracy drop). The systems team proposes 2:4 structured sparsity (50% sparse, 0.5% accuracy drop).
question: Should you deploy 70% unstructured pruning or 2:4 structured sparsity for the 7B model on A100s, and why?
details:
  realistic_solution: The 2:4 structured sparsity is the optimal choice. A100 Sparse Tensor Cores natively support the 2:4 pattern, allowing them to compress weights in memory by 2x and double the matrix math throughput. Unstructured sparsity cannot be easily accelerated on dense Tensor Cores, often resulting in fallback to slower vector ALUs (CUDA cores) or inefficient, irregular memory access patterns that degrade actual inference performance.
  common_mistake: |
    **The Pitfall:** Assuming higher unstructured sparsity automatically yields better latency.
    **The Rationale:** Looking purely at theoretical FLOP reduction and ignoring the rigid matrix microarchitecture of hardware accelerators.
    **The Consequence:** Wasting time training a 70% sparse model that actually runs slower in production than a 50% structured sparse model.
  napkin_math: |
    - **Dense FP16 Throughput:** A100 achieves 312 TFLOPS.
    - **2:4 Structured Sparse Throughput:** Mapped to Sparse Tensor Cores, achieves 624 TFLOPS (a 2x speedup).
    - **Unstructured 70% Sparse Throughput:** Tensor Cores cannot dynamically skip unstructured zeros. It forces dense execution (1x speedup) or falls back to CUDA cores.
    - **Result:** **2:4 structured sparsity doubles actual throughput, whereas 70% unstructured sparsity provides zero hardware acceleration.**
