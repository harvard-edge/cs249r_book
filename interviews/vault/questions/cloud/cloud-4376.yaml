title: MI300X AllReduce Performance in 8-GPU Data Parallel Training vs H100
scenario: An 8-GPU MI300X server uses Infinity Fabric (128 GB/s per GPU pair in full-mesh). An 8-GPU H100 SXM5 server uses NVLink 4.0 (900 GB/s bidirectional per GPU). Data parallel training of a 7B model transfers 28GB of FP32 gradients per backward pass.
question: For a 28GB gradient AllReduce on 8 GPUs, what ring-AllReduce time do MI300X xGMI and H100 NVLink achieve?
details:
  realistic_solution: Ring AllReduce relies on individual link bandwidth. H100 achieves 109ms communication time while MI300X achieves 383ms. The MI300X needs gradient compression or a dedicated high-bandwidth GPU-to-GPU fabric to be competitive with H100 NVLink for data-parallel training.
  common_mistake: |
    **The Pitfall:** Using total aggregate fabric bandwidth instead of per-GPU link bandwidth for ring AllReduce calculations.
    **The Rationale:** Candidates forget that in a ring topology, each GPU only uses one send and one receive link to its immediate neighbors.
    **The Consequence:** Vastly underestimating communication overhead and misjudging the necessity of gradient compression.
  napkin_math: |
    - **Gradient size**: 28 GB. Ring AllReduce transfer = 2 * (7/8) * 28 GB = 49 GB.
    - **H100 NVLink time**: Send BW = 450 GB/s. Time = 49 GB / 450 GB/s = 0.109s = 109 ms.
    - **MI300X xGMI time**: Link BW = 128 GB/s. Time = 49 GB / 128 GB/s = 0.383s = 383 ms.
    - **Compute time (7B params)**: H100 = 348 ms; MI300X = 263 ms.
    - **Total Step Time**: H100 = 348 + 109 = 457 ms. MI300X = 263 + 383 = 646 ms.
    - **Conclusion**: **H100 is 1.4x faster for data parallel training due to the massive xGMI communication bottleneck.**
