title: The Federated Learning Communication Tax
scenario: When designing a large-scale federated learning system for a fleet of autonomous vehicles to
  improve perception models, which of the following factors typically becomes the single largest driver
  of operational cost (OpEx)?
details:
  realistic_solution: The correct answer is the total network communication cost. While each individual
    model update sent from a vehicle might be relatively small (e.g., 100s of MBs), this cost is multiplied
    by the number of participating clients per round (thousands) and the total number of training rounds
    (hundreds or thousands). This aggregated data transfer volume often dwarfs the one-time data upload
    cost of a centralized strategy and becomes the primary operational expenditure.
  common_mistake: Engineers often focus on the benefits of FL, like data privacy and avoiding large central
    storage costs, and assume it's inherently cheaper. They tend to underestimate the system-wide impact
    of communication, focusing instead on local costs like on-device compute. They fail to recognize that
    frequent, small data transfers from millions of endpoints aggregate into a massive network cost that
    often dominates the entire operational budget.
  napkin_math: 'Let''s compare a one-time centralized upload vs. repeated federated updates for a fleet
    of 10,000 vehicles.

    1. **Centralized:** 1 GB data/car × 10k cars = 10 TB total upload.

    2. **Federated:** 10k cars × 100 MB update × 100 training rounds = 100,000,000 MB = 100 TB of cellular
    data.

    At $0.01/MB over 4G/5G, 100 TB of communication dominates the operational budget.'
  options:
  - The cost of on-device computation on each vehicle's hardware.
  - The storage cost for raw sensor data on the central server.
  - The total network communication cost of sending model updates.
  - The central server compute cost for model weight aggregation.
  correct_index: 2
