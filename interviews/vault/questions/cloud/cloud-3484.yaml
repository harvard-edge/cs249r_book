title: Scaling High-Throughput LLM Inference on Google TPU v5e
scenario: Your team is deploying a large language model (LLM) for a high-volume, low-latency Generative AI application. You've selected Google TPU v5e. The system must handle unpredictable request patterns, minimize cold start times, and efficiently manage model loading, dynamic batching, and autoscaling.
question: How would you design TPU v5e LLM inference serving to handle unpredictable traffic, cold starts, model loading, batching, and autoscaling?
details:
  realistic_solution: Implement a serving architecture leveraging a high-performance inference server like Triton Inference Server, custom-tuned for JAX/TensorFlow on TPUs. Employ dynamic batching based on real-time request queue depth to maximize TPU utilization. For model loading, use strategies like streaming loading from GCS to HBM, or pre-loading common models into HBM via persistent volumes. Implement an autoscaling solution that monitors QPS, latency, and TPU core utilization, aggressively scaling out pre-warmed instances to handle spikes. Cold start optimization involves maintaining a minimum pool of 'warm' TPU instances with models already loaded, ready to serve, or employing techniques like model checkpoints/snapshots for rapid resumption.
  common_mistake: |
    **The Pitfall:** Treating TPUs like general-purpose GPUs and using static batching.
    **The Rationale:** Not accounting for the specific I/O and memory hierarchy of TPUs, leading to inefficient model loading into HBM and wasted compute cycles.
    **The Consequence:** Suboptimal batching drastically underutilizes BF16 performance, resulting in significant cold start delays and failure to meet throughput SLAs.
  napkin_math: |
    - 10B parameter LLM in BF16: ~20 GB.
    - TPU v5e HBM: 16 GB. (A single replica requires at least 2 TPUs via Tensor Parallelism).
    - 2-TPU replica throughput: Batch of 8 at 40ms/step = 8 / 0.040 = 200 tokens/sec.
    - Peak load: 2,000 tokens/sec.
    - Required replicas: 2,000 / 200 = 10 replicas.
    - **10 replicas * 2 TPUs/replica = 20 active TPU v5e instances minimum, requiring a robust pre-warming pool to handle traffic spikes.**
