title: Optimizing LLM Inference on AMD MI300X via Operator Scheduling
scenario: You are deploying a large language model (LLM) with 70 billion parameters for real-time inference
  on an AMD MI300X accelerator, which boasts 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and
  5.3 TB/s memory bandwidth. The model's computational graph involves numerous matrix multiplications,
  convolutions, and activation functions. Initial deployment shows suboptimal throughput and high memory
  pressure. Analyze how you would optimize the execution order of these operators to maximize memory reuse,
  enable parallel execution, and leverage layer fusion opportunities on the MI300X, considering its specific
  hardware capabilities, especially the memory bandwidth and high compute for FP16 sparse operations.
  Diagnose potential bottlenecks and quantify the impact of your proposed optimizations.
question: "How would you optimize MI300X operator execution order for the 70B LLM to reduce memory pressure and improve throughput?"
details:
  realistic_solution: Implement a dynamic operator scheduler that leverages profiling data to prioritize
    memory-bound operations for fusion (e.g., vertical fusion of element-wise ops, horizontal fusion of
    identical ops) to reduce intermediate memory footprint. Reorder compute-bound operations to maximize
    data reuse within HBM3 and exploit asynchronous execution to hide memory latency. This involves using
    graph optimization techniques in a compiler like TVM or MLIR to identify and apply these transformations,
    tailoring the schedule to the MI300X's specific memory hierarchy and compute capabilities.
  common_mistake: Neglecting data locality and memory access patterns, leading to frequent HBM3 cache
    misses and redundant data transfers across the 5.3 TB/s memory bus, effectively bottlenecking the
    1,307 TFLOPS FP16 sparse compute. Another mistake is overlooking the potential for parallel execution
    of independent subgraphs or operations, underutilizing the MI300X's available compute units.
  napkin_math: Consider a sequence of two memory-intensive operations where an intermediate tensor of
    50 GB is produced and then consumed. A naive schedule involves writing 50 GB to HBM3 and then reading
    50 GB. At 5.3 TB/s (5300 GB/s), this takes approximately (50+50)/5300 ≈ 0.019 seconds for just the
    data transfers. If layer fusion (e.g., element-wise operations) or intelligent in-place scheduling
    can reduce this to near zero for multiple such operations across hundreds of layers in an LLM, the
    cumulative time savings can be substantial. For example, saving 0.019s per layer across 100 layers
    would yield a total saving of 1.9 seconds per inference pass, significantly improving overall throughput.
    The MI300X's 1,307 TFLOPS FP16 sparse compute ensures that once memory bottlenecks are addressed,
    the compute units can be fully utilized.
