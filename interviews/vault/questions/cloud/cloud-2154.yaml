title: The Batch Size Scaling Wall
scenario: Your team scales a GPT training run from 64 to 512 GPUs using data parallelism, increasing the global batch size from 1M to 8M tokens. Per-step training time drops 6.5×, but final model quality at 300B tokens is significantly worse than the 64-GPU baseline. The learning rate was scaled linearly with batch size per standard practice.
question: Why did scaling GPT training to 512 GPUs and 8M-token batches hurt final quality despite faster steps and linear LR scaling?
details:
  realistic_solution: 'The global batch size of 8M tokens has exceeded the critical batch size B_crit. Beyond B_crit, each additional sample per batch provides diminishing gradient signal — the gradient estimate is already accurate enough, and more samples per step just waste compute without improving convergence per update. The linear LR scaling rule (Goyal et al.) only works in the data-parallel regime (B < B_crit). Solutions: (1) Use gradient accumulation to keep effective batch size at 1-2M while still utilizing all 512 GPUs with smaller micro-batches. (2) Use SQRT scaling for the learning rate instead of linear. (3) Dynamically measure the gradient noise scale to adapt batch size during training.'
  common_mistake: |
    **The Pitfall:** Blaming AllReduce overhead or assuming the linear learning rate scaling rule is universally applicable.
    **The Rationale:** Candidates forget that global batch size faces a hard limit (critical batch size) regardless of hardware availability.
    **The Consequence:** Scaling beyond the point of diminishing returns and destroying model quality.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global batch size: 8M tokens.
    - Critical Batch Size (B_crit): ~2M tokens.

    **Calculations:**
    - Over-provisioning: 8M / 2M = 4x over B_crit.
    - Micro-batch target: 2K tokens/GPU * 512 GPUs = 1M tokens.

    **Conclusion & Interpretation:**
    - **Result: 4x B_crit (Diminishing-Returns-Bound)**. Operating at 4x B_crit wastes compute and degrades quality; gradient accumulation is required.
