title: The Batch Size Scaling Wall
scenario: Your team scales a GPT training run from 64 to 512 GPUs using data parallelism, increasing the
  global batch size from 1M to 8M tokens. Per-step training time drops 6.5× (not 8× due to AllReduce overhead),
  but final model quality at 300B tokens is significantly worse than the 64-GPU baseline. The learning
  rate was scaled linearly with batch size per standard practice. Diagnose the quality regression.
details:
  realistic_solution: 'The global batch size of 8M tokens has exceeded the critical batch size B_crit.
    Beyond B_crit, each additional sample per batch provides diminishing gradient signal — the gradient
    estimate is already accurate enough, and more samples per step just waste compute without improving
    convergence per update. The linear LR scaling rule (Goyal et al.) only works in the data-parallel
    regime (B < B_crit). Solutions: (1) Use gradient accumulation to keep effective batch size at 1-2M
    while still utilizing all 512 GPUs with smaller micro-batches. (2) Use SQRT scaling for the learning
    rate instead of linear. (3) Dynamically measure the gradient noise scale to adapt batch size during
    training.'
  common_mistake: Blaming AllReduce overhead or assuming the LR scaling rule is wrong. The real issue
    is that 8M tokens exceeds the critical batch size for this model at this stage of training.
  napkin_math: 'B_crit estimation via gradient noise scale: B_noise = tr(H) / |G|² | If B_noise ≈ 2M tokens,
    then at 8M you are 4× over-provisioned | Effective compute efficiency: at 4× B_crit, roughly 60% of
    compute is wasted | Fix: micro-batch=2K tokens/GPU × 512 GPUs = 1M tokens, accumulate if needed'
