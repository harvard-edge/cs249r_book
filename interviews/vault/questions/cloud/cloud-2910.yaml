title: 'Mastery: knowledge distillation from EfficientNet-B7 to MobileNetV3 at scale'
scenario: You are leading a project to distill an EfficientNet-B7 teacher (84.3% top-1, 37 GFLOPs) into a MobileNetV3-Large student (target 78%+ top-1, 0.22 GFLOPs) using 4× A100 nodes.
question: How would you distill EfficientNet-B7 into MobileNetV3-Large, and why is intermediate feature distillation needed beyond soft labels?
details:
  realistic_solution: 'Three-component loss: (1) CE with soft targets (T=4 temperature), weight 0.5; (2) intermediate feature matching on 3 stages using adapters (linear projectors B7_channels → MV3_channels), weight 0.3; (3) attention transfer from SE excitation maps, weight 0.2. Adapter design: since B7 has 2× more channels, use 1×1 conv adapters trained jointly. Training: first 30 epochs with adapters only (frozen student backbone), then 90 epochs end-to-end with cosine LR 0.1→0.001. Expected gain over soft-label only: +1.5–2pp accuracy.'
  common_mistake: |
    **The Pitfall:** Using only KL divergence on soft logits (Hinton-style distillation).
    **The Rationale:** Logit matching provides signal only at the final layer. With a huge capacity gap (37 vs 0.22 GFLOPs), the student cannot learn the rich intermediate representations needed without intermediate supervision.
    **The Consequence:** The student model hits a performance ceiling well below the target accuracy.
  napkin_math: |
    - 4 A100 nodes = 32 GPUs.
    - MobileNetV3-Large training: 0.22 GFLOPs/image. Batch=256/GPU → total batch=8192.
    - Student forward: 0.22 GFLOPs × 256 = 56 GFLOPs → ~0.36 ms.
    - EfficientNet-B7 teacher inference: 37 GFLOPs/image at batch=256 = 9.5 TFLOPs/step → ~61 ms/step.
    - Online teacher forward is ~170× more expensive than student.
    - **Precomputing teacher soft labels and feature maps to NVMe (e.g., 500GB for logits + 2TB for features) avoids massive teacher compute bottleneck.**
