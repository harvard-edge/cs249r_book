title: The NUMA Node Cross-Talk
scenario: You are deploying a CPU-based embedding retrieval system on an 8-socket, 128-core enterprise
  server. When you run 1 instance of the app, throughput is 10,000 QPS. To scale up, you spawn 8 independent
  instances of the app using Docker. Instead of 80,000 QPS, total throughput is only 30,000 QPS. What
  physical motherboard bottleneck are you hitting?
question: "What physical motherboard bottleneck are you hitting?"
details:
  realistic_solution: You are suffering from severe NUMA cross-talk. In massive servers, CPUs are physically
    separated into distinct sockets, and each socket has its own dedicated banks of RAM attached directly
    to it. If Docker process 1 is scheduled on CPU Socket A, but the OS allocator happens to put its embedding
    tables in the RAM attached to CPU Socket D, every single memory read must travel across the motherboard
    interconnect (like Intel UPI or AMD UPI). This physically chokes the interconnect bandwidth and adds
    massive latency.
  common_mistake: '"Treating a massive multi-socket server as one giant, flat CPU, ignoring Non-Uniform
    Memory Access (NUMA) domains."'
  napkin_math: Local memory access (within the same NUMA node) might take `~80 nanoseconds` with `~100
    GB/s` bandwidth. Remote memory access (crossing to another socket's RAM) might take `~140 nanoseconds`
    with bandwidth choked to `~20 GB/s` due to link saturation. By not pinning (affinitizing) your processes
    and memory to specific NUMA nodes (e.g., using `numactl`), your 8 instances are blindly thrashing
    data back and forth across the motherboard.
