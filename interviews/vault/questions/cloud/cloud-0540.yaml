title: The NUMA Node Cross-Talk
scenario: You are deploying a CPU-based embedding retrieval system on an 8-socket, 128-core enterprise server. When you run 1 instance of the app, throughput is 10,000 QPS. To scale up, you spawn 8 independent instances of the app using Docker. Instead of 80,000 QPS, total throughput is only 30,000 QPS.
question: What physical motherboard bottleneck are you hitting?
details:
  realistic_solution: 'You are suffering from severe NUMA cross-talk. In massive servers, CPUs are physically separated into distinct sockets, and each socket has its own dedicated banks of RAM attached directly to it. If Docker process 1 is scheduled on CPU Socket A, but the OS allocator happens to put its embedding tables in the RAM attached to CPU Socket D, every single memory read must travel across the motherboard interconnect (like Intel UPI or AMD UPI). This physically chokes the interconnect bandwidth and adds massive latency.'
  common_mistake: |
    **The Pitfall:** Treating a massive multi-socket server as one giant, flat CPU.
    **The Rationale:** Candidates ignore Non-Uniform Memory Access (NUMA) domains, assuming all memory is equally accessible by all CPU cores.
    **The Consequence:** Deploying applications that thrash the motherboard interconnect, severely choking memory bandwidth and performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8-socket NUMA server.
       - Local memory: ~80 ns latency, ~100 GB/s bandwidth.
       - Remote memory: ~140 ns latency, ~20 GB/s link limit.
    2. **Calculations:**
       - 8 unpinned Docker instances crossing sockets randomly.
       - System bandwidth throttles to the 20 GB/s UPI link limit.
    3. **Conclusion & Interpretation:** **Unpinned instances cross sockets, throttling bandwidth to 20 GB/s**. Result: **Memory-Bound**.
