title: The Gradient Accumulation Equivalence
scenario: 'You cannot fit batch size 1024 on your single A100 due to OOM errors. You use batch size 64 with 16 gradient accumulation steps to simulate an effective batch of 1024. Your colleague claims this is mathematically identical to true batch 1024.'
question: "In what two cases does gradient accumulation with batch 64x16 stop being mathematically identical to true batch 1024?"
details:
  realistic_solution: 'Two key cases where equivalence breaks: (1) **Batch Normalization** — BatchNorm computes running mean and variance over the micro-batch (64), not the effective batch (1024). The normalization statistics are different, leading to different activations and gradients. This can cause significant accuracy degradation, especially in vision models. Fix: use SyncBatchNorm or switch to LayerNorm/GroupNorm. (2) **Stochastic regularization** — Dropout and data augmentation are applied per micro-batch. With true batch 1024, each sample sees one dropout mask per step. With 16 accumulation steps, the model sees 16 different dropout masks per effective step, subtly changing the regularization dynamics.'
  common_mistake: |
    **The Pitfall:** Assuming gradient accumulation is always mathematically identical to large-batch training.
    **The Rationale:** Because the gradients are averaged correctly, engineers assume all other stochastic operations scale identically.
    **The Consequence:** Accuracy degradation or subtle training instability, particularly in models using BatchNorm or specific dropout schedules.
  napkin_math: |
    1. True batch 1024 activation memory (S=512, H=4096, FP16) = `1024 * 512 * 4096 * 2 bytes` = **4 GB**.
    2. Micro-batch 64 activation memory = `64 * 512 * 4096 * 2 bytes` = **256 MB**.
    3. **Result:** 16x reduction in peak activation memory, at the cost of non-identical BatchNorm statistics and 16x more dropout mask resamplings.
