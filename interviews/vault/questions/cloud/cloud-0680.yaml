title: The Gradient Accumulation Equivalence
scenario: You can't fit batch size 1024 on your single A100 — it OOMs. So you use batch size 64 with 16
  gradient accumulation steps to simulate an effective batch of 1024. Your colleague claims this is 'mathematically
  identical' to true batch 1024. Name two cases where this equivalence breaks down.
question: "In what two cases does gradient accumulation with batch 64×16 stop being mathematically identical to true batch 1024?"
details:
  realistic_solution: 'Two key cases where equivalence breaks: (1) **Batch Normalization** — BatchNorm
    computes running mean and variance over the micro-batch (64), not the effective batch (1024). The
    normalization statistics are different, leading to different activations and gradients. This can cause
    significant accuracy degradation, especially in vision models. Fix: use SyncBatchNorm or switch to
    LayerNorm/GroupNorm. (2) **Stochastic regularization** — Dropout and data augmentation are applied
    per micro-batch. With true batch 1024, each sample sees one dropout mask per step. With 16 accumulation
    steps, the model sees 16 different dropout masks per effective step, subtly changing the regularization
    dynamics.'
  common_mistake: '"Gradient accumulation is always equivalent to large-batch training." The gradients
    are mathematically averaged the same way, so people assume everything else follows.'
  napkin_math: 'Memory savings: true batch 1024 activation memory ≈ $1024 \times S \times H \times 2$
    bytes. With accumulation at micro-batch 64: $64 \times S \times H \times 2$ bytes — a 16× reduction
    in peak activation memory. For a model with S=512, H=4096 in FP16: true batch activations = $1024
    \times 512 \times 4096 \times 2 = 4\text{ GB}$. Micro-batch activations = $64 \times 512 \times 4096
    \times 2 = 256\text{ MB}$. The trade-off: 16× more forward/backward passes means 16× longer step time,
    but the gradient result is identical (for models without BatchNorm).'
