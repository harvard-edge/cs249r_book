title: Fraud Detection Silent Failure Investigation
scenario: A fraud detection model deployed on 50 `g4dn.xlarge` instances processes 10,000 transactions/second.
  All infrastructure metrics (CPU utilization at 45%, memory steady, p99 latency < 20ms, 0 HTTP 500s)
  show a perfectly healthy system. However, customer support tickets for blocked legitimate transactions
  have spiked by 400% over the last 72 hours. Analyze the potential root causes of this discrepancy and
  propose a systematic detection strategy.
details:
  realistic_solution: Implement statistical monitoring of input feature distributions (e.g., Population
    Stability Index or Kullback-Leibler divergence) and track delayed business metrics (like chargebacks
    or support tickets). The root cause is likely upstream data pipeline schema changes causing null features
    or concept drift from a new seasonal purchasing trend.
  common_mistake: Focusing purely on infrastructure health metrics, assuming the model code has a bug,
    or manually reviewing individual predictions without a statistical framework.
  napkin_math: 10,000 req/sec * 86,400 sec/day = 864M requests/day. A mere 0.1% increase in the False
    Positive Rate (FPR) due to silent model degradation translates to 864,000 additional incorrectly blocked
    transactions per day, easily causing a massive 400% spike in customer complaints.
