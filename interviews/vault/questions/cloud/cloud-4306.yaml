title: Batching Strategy Across Prefill Nodes
scenario: Requests arrive at a router with variable input lengths (50–8192 tokens, Zipf-distributed). Your prefill pool has 8 H100s.
question: How would you batch 50–8192-token prefill requests on 8 H100s to maximize throughput while keeping TTFT variation within 3×?
details:
  realistic_solution: 'Length-bucketed batching: sort incoming requests into length buckets (e.g., [0,512], [512,2048], [2048,8192]). Batch requests within the same bucket together. Short requests are padded at most 10× (50→512), not 163× (50→8192). Within each bucket, use continuous batching to avoid waiting for a full batch. TTFT bound: a 50-token request in the [0,512] bucket is padded to 512 → prefill cost = 512-token prefill. Minimum TTFT (no padding, single request) = 50-token prefill. Ratio: 512/50 = 10.24 — within 3× is too tight for this bucket design. Tighten to [0,128], [128,512], [512,2048], [2048,8192] → max padding 128/50 = 2.56× within the first bucket. TTFT variation now within 3× for all buckets. Router assigns each request to the lowest bucket that fits its length, dispatches to the prefill node with the shallowest queue for that bucket.'
  common_mistake: |
    **The Pitfall:** Padding all requests to the maximum length in a batch.
    **The Rationale:** It simplifies the implementation of batching logic to treat all sequences uniformly.
    **The Consequence:** A batch with one 8192-token request and several 50-token requests wastes nearly all its compute cycles on padding, destroying throughput.
  napkin_math: |
    - Throughput without bucketing (naive padding to max): batch of 8 requests padded to 8192.
    - Useful compute = (50*7 + 8192) / (8 × 8192) = 8542 / 65536 = 13%.
    - With bucketing ([0,128] bucket for 7 short + separate [2048,8192] for 1 long):
    - Short batch useful compute = 7×50 / (7×128) = 350 / 896 = 39%.
    - Long batch useful compute: 100%.
    - **Overall throughput yields ~3× improvement vs naive padding.**
