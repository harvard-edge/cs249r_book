title: 'Interleaved Pipeline Schedules: Zero-Bubble Pipeline Parallelism'
scenario: The Megatron-LM team introduced interleaved pipeline scheduling where each device holds multiple non-contiguous pipeline stages. For a 32-layer model with 4 pipeline stages, each device handles 8 layers in an interleaved pattern.
question: "How much does interleaved pipeline scheduling reduce the 1F1B bubble for a 32-layer model with 4 stages, and what is the tradeoff?"
details:
  realistic_solution: 'Interleaved scheduling with virtual pipeline stages (v): each device holds v chunks of layers. With k=4 physical stages and v=2 virtual stages per device: effective pipeline depth = k*v = 8 virtual stages, each processing 4 layers. Bubble fraction = (k-1)/(m*v + k-1). For m=8 micro-batches: standard 1F1B = 3/11 = 27.3%, interleaved (v=2) = 3/19 = 15.8%, interleaved (v=4) = 3/35 = 8.6%. However, communication increases by v-fold: with v=2, each micro-batch traverses the network 2x. On NVLink (low latency), this is acceptable. On InfiniBand (higher latency), the extra communication may negate bubble savings. Profile both configs to find the optimal v for your network topology.'
  common_mistake: |
    **The Pitfall:** Assuming interleaved scheduling is strictly better than 1F1B.
    **The Rationale:** The theoretical reduction in the pipeline bubble fraction is highly appealing.
    **The Consequence:** Point-to-point communication increases significantly, potentially negating the bubble savings on slower networks like InfiniBand.
  napkin_math: |
    *   **1F1B Bubble:** $27.3\% \times 2200\text{ms} = 600\text{ms}$ wasted.
    *   **Interleaved (v=2):** Bubble is $15.8\% \times 2200\text{ms} = 347\text{ms}$. But extra communication adds 160ms. Total = 507ms.
    *   **Interleaved (v=4):** Bubble is $8.6\% \times 2200\text{ms} = 189\text{ms}$. But extra communication adds 320ms. Total = 509ms.
    *   **Result:** **Interleaved scheduling provides diminishing returns as virtual stages increase due to compounding communication overhead.**
