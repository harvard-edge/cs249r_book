title: Optimizing Large Model Inference on H100 with AOT Compilation
scenario: Your team is deploying a large language model (LLM) for high-throughput inference on a cluster of NVIDIA H100 GPUs. The model's computational graph involves numerous custom operators and varying data types.
question: How would you design an AOT graph compiler for H100 LLM inference using operator lowering and constant folding while balancing FP16 compute and HBM3 bandwidth?
details:
  realistic_solution: 'A robust solution involves a multi-stage AOT compiler. Operator lowering transforms high-level operations into H100-native primitives (e.g., Triton kernels), fusing multiple operations to reduce memory traffic and launch overheads. Constant folding pre-computes static parts of the graph. The compiler must analyze arithmetic intensity to optimally schedule work between the FP16 compute and HBM3 memory throughput.'
  common_mistake: |
    **The Pitfall:** Overlooking the interplay between HBM3 bandwidth and FP16 compute capacity.
    **The Rationale:** Engineers optimize purely for FLOPs without considering how dynamic shapes or conditional execution paths impact memory bandwidth.
    **The Consequence:** The compiler creates memory-bound bottlenecks or is forced to fallback to less optimized paths, reducing overall throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: H100 (989 TFLOPS FP16, 3.35 TB/s HBM3).
       - Operation: GEMM C = A * B.
       - Dimensions: M=4096, K=4096, N=4096.
       - Precision: FP16 (2 bytes per element).
    2. **Calculations:**
       - Total FLOPs: 2 * M * K * N = 2 * 4096^3 ≈ 137.4 GFLOPs.
       - Compute time: 137.4 GFLOPs / 989 TFLOPS ≈ 0.139 ms.
       - Memory transfer data (A + B + C): 3 * (4096 * 4096) * 2 bytes = 100.6 MB.
       - Memory transfer time: 100.6 MB / 3.35 TB/s ≈ 0.030 ms.
    3. **Conclusion & Interpretation:** **While large GEMMs are Compute-Bound (0.139 ms > 0.030 ms), real LLM graphs contain small operations that become Memory-Bound, requiring operator fusion.**
