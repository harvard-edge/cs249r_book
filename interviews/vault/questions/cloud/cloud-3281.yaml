title: Optimizing Large Model Training with Gradient Checkpointing on A100
scenario: You are tasked with training a large transformer model with billions of parameters on an NVIDIA A100 GPU (80 GB HBM2e memory, 2.0 TB/s bandwidth). The model's forward pass generates intermediate activations that exceed the available 80 GB HBM2e, leading to out-of-memory errors during backpropagation.
question: How would gradient checkpointing let this billions-parameter Transformer train on an 80 GB A100, and how would you tune the compute-memory tradeoff?
details:
  realistic_solution: Implement a selective gradient checkpointing strategy. Profile the model to identify specific layers or blocks that consume the most activation memory. Apply checkpointing only to these memory-intensive parts. Utilize techniques like CPU offloading for less critical activations if absolutely necessary, but prioritize GPU memory savings first. Consider using ZeRO for even larger models where checkpointing alone might not suffice.
  common_mistake: |
    **The Pitfall:** Underestimating the recomputation cost or over-aggressively checkpointing every single layer.
    **The Rationale:** Recomputing activations saves memory but adds an entire forward pass compute penalty for those specific layers.
    **The Consequence:** Excessive forward pass re-runs completely nullify memory savings, resulting in severe performance degradation and drastically extended training times.
  napkin_math: |
    * If a layer consumes 10 GB of activation memory and needs to be recomputed, it adds an additional forward pass for that layer.
    * Assuming the layer takes 100ms in forward pass, recomputing it adds 100ms.
    * If the overall training step takes 1 second, this is a 10% overhead.
    * Transferring 10 GB of activations to CPU memory takes 10 GB / 2.0 TB/s = 5 ms (theoretical limit without overhead).
    * **A 50% memory saving might come at a 10-20% compute overhead, allowing the model to train without OOMing.**
