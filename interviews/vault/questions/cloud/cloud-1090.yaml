title: Diagnosing Targeted Data Poisoning in LLM Fine-Tuning
scenario: 'Your team is fine-tuning a 13B parameter LLM on a cluster of 8x A100 (80GB) GPUs using a daily
  ingestion pipeline of 50,000 user interaction logs. After a recent automated deployment, the model''s
  accuracy on the core ''refund intent'' classification task drops abruptly from 94% to 82%, while overall
  validation loss and accuracy on other intents remain stable. Diagnose the root cause of this localized
  failure: how do you determine if this is a targeted data poisoning attack versus natural concept drift,
  and how do you isolate the specific corrupted training records?'
details:
  realistic_solution: Deploy influence functions or representational clustering (e.g., analyzing the penultimate
    layer activations). By clustering activations of the 'refund intent' class, poisoned samples will
    often form distinct, anomalous micro-clusters far from the legitimate data distribution.
  common_mistake: Relying solely on global validation loss or simple high-loss sample filtering. Sophisticated
    clean-label poisoning attacks are designed to have low loss and avoid triggering aggregate distribution
    shift alerts.
  napkin_math: An attacker injecting 0.5% poisoned data (250 samples/day) over 4 days introduces 1,000
    malicious samples into a 200,000 sample batch. This 0.5% contamination alters the overall validation
    loss by less than 0.005, making it invisible to global metrics, but it is sufficient to flip the decision
    boundary for a specific sub-class with only 5,000 total legitimate examples.
