title: Fair-Share Scheduling Trade-offs for Bursty Workloads
scenario: A multi-tenant cluster with 512 GPUs uses a fair-share scheduler based on historical GPU-seconds consumed with a 14-day decay half-life. Team LLM runs massive gang-scheduled jobs (256 GPUs for 7 days). Team RecSys runs continuous hyperparameter sweeps (8 GPUs for 2 hours each). Team LLM complains their jobs remain pending indefinitely.
question: Would you reduce the decay half-life to 24 hours or add hierarchical quotas with node reservation, and why?
details:
  realistic_solution: Implement hierarchical queues with guaranteed minimum quotas (e.g., 256 GPUs for Team LLM) combined with node reservation. When Team LLM submits a 256-GPU job, the scheduler must incrementally reserve nodes as they free up, preventing Team RecSys from backfilling them, while still allowing preemptible borrowing.
  common_mistake: |
    **The Pitfall:** Assuming fair-share priority scoring alone will solve starvation for large gang-scheduled jobs.
    **The Rationale:** Candidates often mistakenly tweak the decay factor, ignoring that small jobs will continuously backfill and fragment the cluster before 256 nodes ever become available simultaneously.
    **The Consequence:** The scheduling policy changes but the large jobs continue to starve indefinitely due to cluster fragmentation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Team LLM job: 256 GPUs * 7 days = 1,792 GPU-days.
    - Team RecSys: 50 jobs/day * 8 GPUs * 2 hours = 33.3 GPU-days/day.

    **Calculations:**
    - Over 14 days, RecSys consumes ~466 GPU-days.
    - Despite LLM having much higher historical usage (lower priority), they starve because 256 contiguous nodes never naturally align.

    **Conclusion & Interpretation:**
    - **Result: 256 Contiguous Nodes (Fragmentation-Bound)**. Reservation is strictly required to prevent fragmentation, not just fair-share scoring.
