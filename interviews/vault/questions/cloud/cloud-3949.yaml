title: Overlapping Gradient Accumulation Steps with Next Batch Loading
scenario: You use gradient accumulation with 4 micro-steps before each AllReduce. You notice that data loading for the next micro-batch is not overlapped with compute.
question: How would you prefetch data during K=4 gradient accumulation so micro-steps do not stall waiting for the next batch?
details:
  realistic_solution: Use prefetch_factor and pin_memory to ensure next batch loading runs asynchronously on CPU and DMA during compute micro-steps.
  common_mistake: |
    **The Pitfall:** Only prefetching the next micro-batch during AllReduce steps.
    **The Rationale:** Focusing on overlapping communication with compute while neglecting I/O overlap.
    **The Consequence:** GPU stalls during the intermediate micro-steps waiting for CPU data transfer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 micro-steps, 50ms compute, 8ms load, 20ms AllReduce.
    2. **Calculations:**
       - Without overlap = 252ms.
       - With overlap = 4 * max(50, 8) + 20 = 220ms.
    3. **Conclusion & Interpretation:**
       - **Result: Overlap saves 32ms per step (12.7% reduction).**
