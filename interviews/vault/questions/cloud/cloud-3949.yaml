title: Overlapping Gradient Accumulation Steps with Next Batch Loading
scenario: You use gradient accumulation with 4 micro-steps before each AllReduce. During the 3 intermediate micro-steps, no AllReduce happens. You notice that data loading for the next micro-batch is not overlapped with compute.
question: How would you prefetch data during K=4 gradient accumulation so micro-steps do not stall waiting for the next batch?
details:
  realistic_solution: 'Use PyTorch DataLoader with prefetch_factor=2 and num_workers >= 4 to ensure the next batch is ready before the current one finishes. For gradient accumulation: (1) While micro-step i is computing on GPU, DataLoader workers prepare micro-step i+1 on CPU, and the DMA engine transfers it to GPU memory. (2) Use pin_memory=True and non_blocking transfers. (3) For 4 micro-steps: overlap chain is compute(i) || load(i+1) || prepare(i+2). (4) Additionally, during the AllReduce step (micro-step 4), overlap three things: AllReduce, next batch loading, AND gradient accumulation bookkeeping. This ensures zero idle time across all 4 micro-steps.'
  common_mistake: |
    **The Pitfall:** Only prefetching the next micro-batch during AllReduce steps.
    **The Rationale:** Candidates focus on overlapping communication with computation, forgetting that I/O must also be overlapped.
    **The Consequence:** The 3 intermediate micro-steps stall while the GPU waits for the next batch from the CPU.
  napkin_math: |
    - **Without overlap:** 4 x (50ms compute + 8ms load) = 232ms + 20ms AllReduce = 252ms per global step.
    - **With overlap:** 4 x max(50ms, 8ms) + 20ms = 200ms + 20ms = **220ms per global step**.
    - **Savings:** 32ms per step (12.7% reduction).
    - **Aggregate savings:** For 1000 steps, this saves **32 seconds**.
