title: Why Backward Pass is 2x Forward
scenario: During a neural network training step, the backward pass requires approximately twice the FLOPs of the forward pass.
question: "Why does the backward pass require about twice the FLOPs of the forward pass?"
details:
  realistic_solution: In the forward pass, each layer computes output = weights * input (a single matrix multiplication). In the backward pass, each layer must compute TWO matrix multiplications: (1) gradient w.r.t. input = weights^T * upstream_gradient (to propagate errors backwards), and (2) gradient w.r.t. weights = upstream_gradient * input^T (to update this layer's weights). Each of these two backward multiplications has the same FLOP cost as the forward multiplication.
  common_mistake: |
    **The Pitfall:** Stating that the backward pass is 3x the forward pass.
    **The Rationale:** Candidates confuse the ratio of backward-to-forward (2:1) with the ratio of total-step-to-forward (3:1).
    **The Consequence:** Hardware capacity planning and compute time estimations are fundamentally skewed.
  napkin_math: |
    1. **Forward pass:** 1 matmul per layer (W * x).
    2. **Backward pass:** 2 matmuls per layer (W^T * δ) + (δ * x^T).
    3. **Ratio:** 2:1 backward:forward.
    4. **Total per step:** 1x forward + 2x backward = **3x forward**.
