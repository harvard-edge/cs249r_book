title: Why Backward Pass is 2x Forward
scenario: Explain the fundamental reason why the backward pass requires approximately twice the FLOPs
  of the forward pass in a neural network training step.
details:
  realistic_solution: 'In the forward pass, each layer computes output = weights × input (a matrix multiplication).
    In the backward pass, each layer must compute TWO matrix multiplications: (1) gradient w.r.t. input
    = weights^T × upstream_gradient (needed to propagate gradients to earlier layers), and (2) gradient
    w.r.t. weights = upstream_gradient × input^T (needed to update this layer''s weights). Each of these
    two backward multiplications has the same FLOP cost as the forward multiplication (same matrix dimensions,
    transposed). So backward = 2 × forward. Total training step = forward + backward = 1 + 2 = 3× the
    forward pass FLOPs. This 3x multiplier is the basis for training cost estimation: if you know the
    forward FLOPs for a model, total training FLOPs per step ≈ 3 × forward_FLOPs × batch_size. For Transformers,
    this is well-validated empirically.'
  common_mistake: Saying backward is 3x forward. It is 2x forward, making total training 3x forward (1x
    forward + 2x backward = 3x). The 2:1 ratio is for backward:forward, not total:forward.
  napkin_math: 'Forward: 1 matmul per layer (W × x). Backward: 2 matmuls per layer (W^T × δ + δ × x^T).
    Ratio: 2:1 backward:forward. Total per step: 3× forward.'
