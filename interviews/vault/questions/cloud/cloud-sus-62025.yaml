title: DLRM Architecture Overview
scenario: Describe the DLRM (Deep Learning Recommendation Model) architecture. What are the two distinct
  compute pathways, why are they architecturally separate, and what operation fuses their outputs?
question: "What are the two distinct compute pathways, why are they architecturally separate, and what operation fuses their outputs?"
details:
  realistic_solution: 'DLRM has two pathways: (1) Sparse pathway: categorical features (user ID, item
    ID, context features) are mapped through embedding tables via lookup operations. Each lookup is an
    irregular memory access into a table that can be TB-scale — entirely memory-bandwidth- and DRAM-latency-bound.
    (2) Dense pathway: continuous features (CTR history, dwell time) pass through a bottom MLP (Dense
    → ReLU → Dense). Output is a dense vector. Fusion: the sparse embedding outputs and bottom MLP output
    are combined via second-order feature interaction (dot products between all pairs of feature vectors,
    producing an interaction matrix). The resulting interaction features concatenate with the bottom MLP
    output and feed into a top MLP that outputs a ranking score.'
  common_mistake: Treating DLRM as a standard dense neural network. The embedding lookup pathway is entirely
    memory-access-bound (random sparse reads), while the dense MLP pathway is compute-bound — conflating
    them leads to incorrect bottleneck analysis.
  napkin_math: 'Typical DLRM at Meta scale: embedding tables = 10-100 TB total, each table entry = 64-dimensional
    FP32 vector = 256 bytes. A single recommendation request looks up ~500 sparse features across ~100
    embedding tables. Memory accessed per request: 500 × 256 bytes = 128 KB. At 1M QPS: 128 KB × 1e6 =
    128 GB/s of embedding memory bandwidth. Dense MLP: ~1 GFLOP per request. Ratio: 128 GB/s memory vs
    1 TFLOP/s compute — embedding lookup is 100× more bandwidth-intensive per FLOP.'
