math_issues:
- A 32-thread warp takes 2 cycles for the first step (64 operations) of a 128-element reduction, so it
  is not 1 cycle per step. Also, the bank conflict degree decreases at each reduction step, so multiplying
  8 cycles by 7 steps is incorrect.
