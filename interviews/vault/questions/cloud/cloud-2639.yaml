title: Vectorization Speedup via vmap
scenario: Computing per-sample gradients for 256 samples using a loop takes 3.2 seconds. Using vmap(grad(loss_fn))
  vectorizes this into a single batched operation. If the GPU has sufficient parallelism, estimate the
  speedup and wall-clock time.
details:
  realistic_solution: 'A Python loop over 256 samples incurs: 256 individual kernel launches, 256 separate
    backward passes, and Python interpreter overhead between each. vmap transforms this into a single
    batched kernel call. Theoretical speedup: 256x (perfect vectorization). Practical speedup: typically
    50-150x due to memory overhead (storing all 256 computation graphs simultaneously) and diminishing
    GPU parallelism at high batch sizes. At 100x speedup: 3.2s / 100 = 32ms. The key bottleneck in the
    loop version is not compute but kernel launch overhead (~10μs per launch × 256 × multiple kernels
    per backward pass). vmap eliminates this by fusing everything into one launch. Memory cost: vmap materializes
    all per-sample gradients simultaneously, requiring 256x more memory than a single gradient.'
  common_mistake: Expecting exactly 256x speedup. Memory constraints and GPU occupancy limits typically
    cap practical vmap speedups at 50-150x for realistic model sizes.
  napkin_math: 'Loop: 256 × 12.5ms = 3.2s. vmap: ~32ms (100x speedup). Bottleneck was kernel launch overhead,
    not compute.'
