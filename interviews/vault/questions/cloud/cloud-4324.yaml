title: Mixed-Precision Embedding Tables
scenario: 'Your 50 TB embedding table cluster stores all embeddings in FP32. You want to reduce storage and memory bandwidth without retraining from scratch.'
question: 'Compare FP16, INT8, and INT4 quantization for embeddings: what is the accuracy impact mechanism for each, what is the bandwidth reduction, and which is preferred for the hot/cold split?'
details:
  realistic_solution: 'FP16: 2× compression (50 TB → 25 TB). Precision loss minimal for well-trained embeddings (range typically ±3σ, FP16 has 3 decimal digits precision). Bandwidth: 2× reduction. Recommended for hot embeddings (high-quality training signal). INT8: 4× compression (50 TB → 12.5 TB). Per-row quantization (each row has its own scale/zero-point). Quantization error: ~0.4% relative to FP32 range. Known to cause <0.1% CTR regression on well-trained tables. Recommended for medium-frequency embeddings. INT4: 8× compression (50 TB → 6.25 TB). Quantization error ~1-2% per lookup. For cold embeddings (rare items, few training examples): the trained FP32 value itself is noisy — INT4 adds no meaningful degradation. For hot embeddings: noticeable quality degradation. Recommended only for cold (tail) embeddings. Strategy: FP16 for top-20% hot rows, INT8 for middle-60%, INT4 for bottom-20% cold. Effective compression: 0.2/2 + 0.6/4 + 0.2/8 = 0.1 + 0.15 + 0.025 = 3.64× compression → 50 TB becomes 13.7 TB.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 is always inferior to FP16 for all embeddings.
    **The Rationale:** Candidates apply a uniform standard for accuracy, forgetting that cold/tail embeddings have sparse, noisy training signals to begin with.
    **The Consequence:** They over-allocate high precision to cold items, missing out on massive compression opportunities where INT4 degradation is practically irrelevant.
  napkin_math: |
    * **Baseline (FP32):** 50 TB.
    * **FP16:** 25 TB (2x).
    * **INT8:** 12.5 TB (4x).
    * **INT4:** 6.25 TB (8x).
    * **Mixed strategy:** 20% FP16 (10 TB -> 5 TB) + 60% INT8 (30 TB -> 7.5 TB) + 20% INT4 (10 TB -> 1.25 TB).
    * **Total compressed size:** 5 + 7.5 + 1.25 = **13.75 TB.**
    * **Result:** **3.6x overall compression** and corresponding memory bandwidth reduction.
