title: Mixed-Precision Embedding Tables
scenario: 'Your 50 TB embedding table cluster stores all embeddings in FP32. You want to reduce storage and memory bandwidth without retraining from scratch.'
question: 'Compare FP16, INT8, and INT4 quantization for embeddings: what is the accuracy impact mechanism for each, what is the bandwidth reduction, and which is preferred for the hot/cold split?'
details:
  realistic_solution: 'Apply a frequency-aware mixed-precision storage strategy. FP16 (2x compression) is for hot items, as it preserves high-quality dense signals without degradation. INT8 (4x compression) via per-row quantization retains ~99.6% accuracy and serves the mid-tail. INT4 (8x compression) is ideal for cold/rare items where the underlying FP32 trained weights are already noisy, meaning the quantization error is overshadowed by statistical variance. The hot/cold routing minimizes total memory bandwidth while preserving CTR.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 is always inferior to FP16 for all embeddings.
    **The Rationale:** Candidates apply a uniform standard for accuracy, forgetting that cold/tail embeddings have sparse, noisy training signals to begin with.
    **The Consequence:** They over-allocate high precision to cold items, missing out on massive compression opportunities where INT4 degradation is practically irrelevant.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline (FP32) is 50 TB.
    - Strategy: 20% hot (FP16), 60% mid (INT8), 20% cold (INT4).

    **Calculations:**
    - Hot split: 10 TB -> 5 TB (2x compression).
    - Mid split: 30 TB -> 7.5 TB (4x compression).
    - Cold split: 10 TB -> 1.25 TB (8x compression).
    - Total compressed size: 5 + 7.5 + 1.25 = 13.75 TB.

    **Conclusion & Interpretation:**
    - **Result: 13.75 TB total (Memory-Capacity-Bound)**. Frequency-aware mixed precision yields a 3.6x overall compression ratio (13.75 TB total).
