title: Mixed-Precision Embedding Tables
scenario: 'Your 50 TB embedding table cluster stores all embeddings in FP32. You want
  to reduce storage and memory bandwidth without retraining from scratch. Compare
  FP16, INT8, and INT4 quantization for embeddings: what is the accuracy impact mechanism
  for each, what is the bandwidth reduction, and which is preferred for the hot/cold
  split?'
question: 'Compare FP16, INT8, and INT4 quantization for embeddings: what is the accuracy
  impact mechanism for each, what is the bandwidth reduction, and which is preferred
  for the hot/cold split?'
details:
  realistic_solution: 'FP16: 2× compression (50 TB → 25 TB). Precision loss minimal
    for well-trained embeddings (range typically ±3σ, FP16 has 3 decimal digits precision).
    Bandwidth: 2× reduction. Recommended for hot embeddings (high-quality training
    signal). INT8: 4× compression (50 TB → 12.5 TB). Per-row quantization (each row
    has its own scale/zero-point). Quantization error: ~0.4% relative to FP32 range.
    Known to cause <0.1% CTR regression on well-trained tables. Recommended for medium-frequency
    embeddings. INT4: 8× compression (50 TB → 6.25 TB). Quantization error ~1-2% per
    lookup. For cold embeddings (rare items, few training examples): the trained FP32
    value itself is noisy — INT4 adds no meaningful degradation. For hot embeddings:
    noticeable quality degradation. Recommended only for cold (tail) embeddings. Strategy:
    FP16 for top-20% hot rows, INT8 for middle-60%, INT4 for bottom-20% cold. Effective
    compression: 0.2/2 + 0.6/4 + 0.2/8 = 0.1 + 0.15 + 0.025 = 3.64× compression →
    50 TB becomes 13.7 TB.'
  common_mistake: Assuming INT4 is always inferior to FP16 for accuracy — for cold
    embeddings with sparse training signal, INT4 may be fine because those rows have
    high uncertainty anyway. Also forgetting that embedding quantization affects lookup
    output fed into the MLP, not just storage.
  napkin_math: 'FP32: 50 TB. FP16: 25 TB (-50%). INT8: 12.5 TB (-75%). INT4: 6.25
    TB (-87.5%). Mixed strategy: 20%×FP16 + 60%×INT8 + 20%×INT4 = 10 TB × (1/2) +
    30 TB × (1/4) + 10 TB × (1/8) = 5 + 7.5 + 1.25 = 13.75 TB. Bandwidth reduction:
    same ratios. Hot embedding bandwidth: was 10 TB × access_rate, now 5 TB × access_rate
    — 2× more headroom for hot row serving.'
