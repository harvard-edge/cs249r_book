title: Handling in-place operations and their effect on the autograd graph
scenario: A team migrates a model from numpy to PyTorch on A100. They use in-place ReLU (x.relu_()) for memory efficiency. During training, they get a RuntimeError 'one of the variables needed for gradient computation has been modified by an inplace operation'. This error appears intermittently, only with certain batch sizes.
question: Why does in-place ReLU intermittently break autograd here, and what should the team change?
details:
  realistic_solution: 'Replace x.relu_() with F.relu(x) (out-of-place). The memory savings from in-place ops are marginal for ReLU (no new allocation, just overwrite). Reserve in-place ops for cases where you are certain the tensor is no longer needed as a backward input: e.g., in-place updates to buffers not in the compute graph. Use torch.autograd.set_detect_anomaly(True) to get a stack trace pointing to the exact in-place operation.'
  common_mistake: |
    **The Pitfall:** Using in-place operations on tensors that are inputs to other operations still in the graph.
    **The Rationale:** Engineers try to aggressively save memory by overwriting variables, ignoring PyTorch's computational graph versioning.
    **The Consequence:** PyTorch's autograd tracks version counters; an in-place op increments the version. If a saved tensor's version at use-time differs from its version at save-time, the backward pass fails catastrophically.
  napkin_math: |
    - In-place ReLU saves 0 bytes of new allocation (overwrites existing tensor) but corrupts backward tracking.
    - Out-of-place ReLU requires 0 bytes for a view (modern PyTorch F.relu creates a view where possible).
    - **Net memory cost of switching to out-of-place: 0 bytes extra. The 'optimization' was entirely imaginary.**
