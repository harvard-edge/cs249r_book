title: L4 vs L7 Load Balancing for gRPC Serving
scenario: You are serving a BERT-based ranking model on a cluster of 32 GPUs. Each inference takes 10ms at a maximum concurrency of 4 requests per GPU. During peak traffic of 9,600 QPS, average cluster utilization is 75%, yet P99 latency frequently spikes above 100ms. Clients are microservices communicating over long-lived gRPC connections, and your current ingress is a standard L4 (TCP) round-robin load balancer.
question: Why does P99 latency spike above 100ms at 75% utilization under L4 round-robin, and what load balancing strategy should replace it?
details:
  realistic_solution: Deploy an L7 proxy (like Envoy) or implement client-side lookaside load balancing (e.g., xDS) to distribute traffic on a per-request basis rather than per-connection, utilizing the 'Least Request' routing algorithm.
  common_mistake: |
    **The Pitfall:** Treating L4 TCP load balancing as sufficient for modern microservice architectures using multiplexed protocols like gRPC/HTTP2.
    **The Rationale:** Engineers assume "round-robin" distributes work evenly, ignoring that it distributes *connections* evenly, not the underlying *requests*.
    **The Consequence:** Severe hot-spotting occurs on specific replicas, causing massive tail latency spikes that trigger unnecessary autoscaling and wasted GPU resources.
  napkin_math: |
    1. **Global Capacity:** 32 GPUs * (4 req / 0.010s) = 12,800 QPS.
    2. **Current Traffic:** 9,600 QPS (75% utilization).
    3. **Imbalance Setup:** L4 balances connections, not requests. If one long-lived connection multiplexes 1,000 QPS, the assigned replica (capacity = 400 QPS) is overwhelmed by +600 req/sec.
    4. **Queue Impact:** A queue depth of just 40 requests at 10ms/batch adds **100ms** to tail latency at that specific replica, despite the cluster having global headroom.
