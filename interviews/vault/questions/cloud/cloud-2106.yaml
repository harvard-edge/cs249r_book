validation_issues:
- 'In Napkin Math, ''Dense 175B: 175B * 2B = 350 GB. Requires 5x 80GB GPUs minimum, 8 for Tensor Parallelism''
  is correct for weight size, but 80GB is the HBM size of H100, not A100 (which is 40GB or 80GB depending
  on model). The solution mentions ''80GB each'', implying H100, so the ''5x 80GB GPUs'' is correct, but
  should be clear.'
- For MoE 500B, the statement 'Requires 13x 80GB' does not directly correlate with the stated '128-way
  EP (1 GPU per expert)' and 'Each GPU holds ~8 GB of expert weights' as 128 experts * 8GB/expert = 1024GB
  = 12.8 H100s. The 13x is slightly off. If 128 GPUs, then 128 GPUs hold all experts.
