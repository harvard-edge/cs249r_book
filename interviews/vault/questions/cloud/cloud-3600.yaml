title: Head-of-Line Blocking in LLM Decode Queue on MI300X
scenario: An MI300X (192GB HBM3, 5.3TB/s) serving a chat model shows excellent mean
  latency (80ms) but p99 of 2.1 seconds. Request mix is 80% short requests (10 tokens)
  and 20% long requests (2000 tokens). The queue is FIFO. Diagnose the head-of-line
  blocking problem and propose a fix.
question: What head-of-line blocking is caused by the 80% short and 20% long FIFO
  mix on MI300X, and how would you fix it?
details:
  realistic_solution: 'Long requests (2000 tokens, ~200ms service) block short requests
    (10 tokens, ~1ms service) at the queue head. Because long requests take 200x longer
    to process, they occupy the GPU for a disproportionate amount of time despite being
    only 20% of requests (driving high service-time variance). This head-of-line blocking
    creates massive tail latency for short requests. Use preemptive priority
    scheduling or separate queues: short-request queue (p99<10ms), long-request queue
    (p99<500ms). Alternatively, use continuous batching to interleave decode steps.'
  common_mistake: Assuming FIFO queuing is fair because it preserves arrival order;
    ignoring service-time variance causing HOL blocking.
  napkin_math: 'Short request service=1ms, long=200ms. FIFO: using the Pollaczek-Khinchine
    (P-K) mean value formula for M/G/1: E[Wq] = \lambda E[S²] / (2(1-\rho)). With mixed traffic
    (80% short 1ms, 20% long 200ms): E[S]=0.8×1+0.2×200=40.8ms, E[S²]=0.8×1+0.2×40000≈8001ms²,
    \rho=40.8×7/1000≈0.29 (assuming arrival rate of 7 req/s). E[Wq] = 0.007×8001 / (2(1-0.2856)) = 39.2ms. Mean latency = 39.2+40.8 = 80ms. Despite low utilization (29%), the high variance
    drives the tail latency. Separate queues eliminate cross-class HOL blocking entirely.'
