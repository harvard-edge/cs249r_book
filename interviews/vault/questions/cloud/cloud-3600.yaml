title: Head-of-Line Blocking in LLM Decode Queue on MI300X
scenario: An accelerator serving a chat model shows excellent mean latency (80ms) but p99 of 2.1 seconds. Request mix is 80% short requests (10 tokens) and 20% long requests (2000 tokens). The queue is FIFO.
question: What head-of-line blocking is caused by the 80% short and 20% long FIFO mix, and how would you fix it?
details:
  realistic_solution: 'Long requests (2000 tokens, ~200ms service) block short requests (10 tokens, ~1ms service) at the queue head. Because long requests take 200x longer to process, they occupy the GPU for a disproportionate amount of time despite being only 20% of requests (driving high service-time variance). This head-of-line blocking creates massive tail latency for short requests. Use preemptive priority scheduling or separate queues: short-request queue (p99<10ms), long-request queue (p99<500ms). Alternatively, use continuous batching to interleave decode steps.'
  common_mistake: |
    **The Pitfall:** Assuming FIFO queuing is inherently fair because it preserves arrival order.
    **The Rationale:** Candidates ignore the extreme service-time variance caused by long requests.
    **The Consequence:** Severe head-of-line blocking that destroys tail latency for the majority of users.
  napkin_math: |
    1. **Service Times:** Short = 1ms, Long = 200ms.
    2. **Mean Service (E[S]):** 0.8(1) + 0.2(200) = 40.8 ms.
    3. **Second Moment (E[S^2]):** 0.8(1) + 0.2(40000) = 8000.8 ms^2.
    4. **Utilization (ρ):** 7 req/s × 40.8 ms = 0.2856 (28.5%).
    5. **Wait Time (Wq):** 0.007 × 8000.8 / (2 × (1 - 0.2856)) = 39.2 ms.
    6. **Result:** Despite low utilization, the variance drives **massive tail latency**.
