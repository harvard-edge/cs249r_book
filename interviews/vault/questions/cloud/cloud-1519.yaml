title: Strict vs Relaxed Locality-Aware Scheduling
scenario: You are designing the orchestration layer for a 1,000-node GPU cluster with a 400 Gbps network per node. Datasets (1-10 TB) are pulled from an object store and cached on local NVMe drives (up to 20 GB/s read).
question: Should the cluster use strict cache-local scheduling or relaxed scheduling with remote cache reads, and why?
details:
  realistic_solution: Use a penalty-based cost model. With a 400 Gbps (50 GB/s) network, remote reads from another node's cache can actually outperform local NVMe reads (20 GB/s). Therefore, relaxed scheduling with distributed caching avoids job queueing delays without sacrificing throughput, provided the network core is not oversubscribed.
  common_mistake: |
    **The Pitfall:** Assuming local NVMe reads are always faster than network reads.
    **The Rationale:** Engineers rely on outdated mental models from older network generations (e.g., 10 Gbps Ethernet).
    **The Consequence:** They implement strict locality constraints, causing job queueing delays while waiting for specific warm nodes, paradoxically slowing down overall throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local NVMe throughput: 20 GB/s.
    - Network throughput (400 Gbps): 50 GB/s.
    - Dataset size: 10 TB (10,000 GB).

    **Calculations:**
    - Local NVMe read time: 10,000 GB / 20 GB/s = 500s.
    - Remote read time (Network): 10,000 GB / 50 GB/s = 200s.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound Scheduling**. Remote reads over a fast fabric (50 GB/s) outperform local NVMe (20 GB/s), making strict locality constraints counterproductive.
