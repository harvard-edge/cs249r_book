title: Strict vs Relaxed Locality-Aware Scheduling
scenario: You are designing the orchestration layer for a multi-tenant GPU cluster (1,000 nodes, 400 Gbps
  network per node). Datasets (1-10 TB) are pulled from an object store and cached on local NVMe drives
  (up to 20 GB/s read). You must evaluate whether to implement strict locality-aware scheduling (pinning
  jobs to nodes with warm NVMe caches) or a relaxed scheduling approach that allows remote reads via a
  distributed caching layer. Evaluate the trade-offs considering network bandwidth, NVMe throughput, and
  job scheduling delays.
details:
  realistic_solution: Use a penalty-based cost model. With a 400 Gbps (50 GB/s) network, remote reads
    from another node's cache can actually outperform local NVMe reads (20 GB/s). Therefore, relaxed scheduling
    with distributed caching avoids job queueing delays without sacrificing throughput, provided the network
    core is not oversubscribed.
  common_mistake: Candidates assume local NVMe reads are always faster than network reads and ignore the
    queueing delay of waiting for a specific node with a warm cache to become available.
  napkin_math: 'Local NVMe throughput: 20 GB/s. 400 Gbps network theoretical: 50 GB/s. Reading 10 TB dataset
    locally: 10,000 GB / 20 GB/s = 500s. Reading remotely over 400 Gbps: 10,000 GB / 50 GB/s = 200s. A
    job waiting >300s for a local cache node strictly loses to scheduling immediately on an empty node
    and streaming over the network.'
