title: Roofline Benchmarking of Custom Layers
scenario: You are benchmarking a custom dense retrieval model on an NVIDIA A100-80GB GPU. The vendor spec
  sheet advertises a peak FP16 throughput of 312 TFLOPS and an HBM bandwidth of 2.0 TB/s. During profiling,
  you isolate a critical custom layer that executes 500 GFLOPs of computation while reading and writing
  a total of 10 GB of data to HBM per forward pass. Calculate the workload's Arithmetic Intensity (AI),
  determine its theoretical maximum throughput using the Roofline model, and state whether the system
  is compute-bound or memory-bound.
question: "What are the layer's arithmetic intensity, Roofline-limited throughput, and bound type on the A100-80GB?"
details:
  realistic_solution: 'First, calculate the Arithmetic Intensity (AI) of the layer: AI = Total FLOPs /
    Total Bytes = 500 GFLOPs / 10 GB = 50 FLOPs/Byte. Next, determine the hardware''s ridge point, which
    dictates the transition from memory-bound to compute-bound: Ridge Point = Peak FLOPs / Memory Bandwidth
    = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte. Since the workload''s AI (50) is significantly lower than
    the Ridge Point (156), the layer is strictly memory-bound. The maximum achievable throughput is dictated
    by the memory wall: AI * Memory Bandwidth = 50 FLOPs/Byte * 2.0 TB/s = 100 TFLOPS. You will never
    see 312 TFLOPS on this workload without architectural changes to improve data reuse.'
  common_mistake: Assuming the model can achieve the 312 TFLOPS peak by ignoring memory bandwidth constraints,
    or incorrectly calculating AI by only accounting for read traffic instead of total memory (read +
    write) traffic.
  napkin_math: 'AI = 500 * 10^9 FLOPs / 10 * 10^9 Bytes = 50 FLOPs/Byte.

    Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.

    Max Throughput = min(Peak_FLOPs, AI * Mem_BW)

    Max Throughput = min(312 TFLOPS, 50 FLOPs/Byte * 2.0 TB/s)

    Max Throughput = 100 TFLOPS (Memory-Bound)'
