title: Implementing Carbon-Aware Job Queue with WattTime Integration
scenario: You are building a carbon-aware job scheduler for an ML training platform
  running on 256 A100 GPUs (400 W each) in a US datacenter. The platform must reduce
  Scope 2 emissions by 30% without increasing average job latency by more than 20%.
  Design the implementation using the WattTime API and integrate it with the existing
  Kubernetes-based job queue.
question: How would you implement a WattTime-driven Kubernetes scheduler that cuts
  Scope 2 emissions 30% without increasing average job latency over 20%?
details:
  realistic_solution: 'Implement a carbon score multiplier in the job priority function:
    `effective_priority = base_priority \times (1 + k \times (threshold - current_intensity)
    / threshold)` where k=2, threshold=200 gCO₂/kWh. High-priority jobs (k > 1) run
    regardless of carbon intensity; flexible batch jobs get boosted during low-intensity
    windows. Use WattTime''s `/v3/forecast` endpoint (hourly ahead) to pre-schedule
    job launches up to 24 hr ahead. Implement as a KEDA `ScaledJob` that reads a custom
    metric from a carbon-intensity sidecar publishing to Prometheus. Cap maximum defer
    time at 4 hr to enforce the 20% latency SLA.'
  common_mistake: Implementing carbon-awareness as a hard gate (block all jobs when
    carbon intensity is high) rather than a priority-weighted queue; hard gates cause
    queue backup and violate the 20% latency SLA when low-carbon windows are short
    or infrequent.
  napkin_math: '256 A100 \times 400 W = 102.4 kW. Annual energy: 102.4 kW \times 8,760 hr =
    897,024 kWh. Baseline: US avg 386 gCO₂/kWh → 346,251 kg CO₂/yr. 30% reduction
    target = 242,375 kg CO₂/yr. Need to shift ~62% of job-hours to windows at 200 gCO₂/kWh (or ~30% to near 0 gCO₂/kWh).
    US grid data: ~35% of hours are below 200 gCO₂/kWh in CAISO. Feasible for flexible
    batch workloads; requires 4 hr max deferral budget per job.'
