title: The KV-Cache Fragmentation
scenario: You are serving a 13B model on a single 80GB GPU. You know the weights take 26GB, leaving 54GB for KV-cache. A single user request takes exactly 1GB of KV-cache. Therefore, you configure the server to accept 54 concurrent requests. However, after an hour of operation, the server OOMs and crashes when serving only 35 concurrent requests.
question: Where did the missing 19GB of VRAM go?
details:
  realistic_solution: The missing 19GB was lost to KV-cache memory fragmentation. Without PagedAttention, each request pre-allocates a contiguous VRAM block for the maximum possible sequence length. If max_seq_len is 2048 but the average response is 500 tokens, 75% of each allocation is wasted internal fragmentation. Additionally, as requests complete and new ones start, external fragmentation creates unusable gaps between allocations. Combined, 60-80% of KV-cache memory is wasted. The fix is PagedAttention (used by vLLM), which allocates KV-cache in small, non-contiguous blocks — like virtual memory pages — eliminating both fragmentation types.
  common_mistake: |
    **The Pitfall:** Assuming a Python memory leak.
    **The Rationale:** Candidates see missing memory over time and immediately assume standard garbage collection failures, confusing CPU RAM leaks with GPU VRAM layout.
    **The Consequence:** The candidate wastes weeks profiling Python code while the server continues to crash from lack of PagedAttention.
  napkin_math: |
    *   **Usable VRAM:** 80GB - 26GB (weights) = 54GB.
    *   **Theoretical Concurrency:** 54GB / 1GB = 54 requests.
    *   **Fragmentation Waste:** Static pre-allocation typically wastes ~60% of space due to internal/external fragmentation.
    *   **Effective Capacity:** 54GB × 40% usable ≈ 21.6GB.
    *   **Result:** The missing 19GB is purely **memory fragmentation**. Adopting PagedAttention solves this.
