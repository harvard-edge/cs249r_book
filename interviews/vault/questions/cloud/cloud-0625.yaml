title: The KV-Cache Fragmentation
scenario: You are serving a 13B model on a single 80GB GPU. You know the weights take 26GB, leaving 54GB
  for KV-cache. A single user request takes exactly 1GB of KV-cache. Therefore, you configure the server
  to accept 54 concurrent requests. However, after an hour of operation, the server OOMs and crashes when
  serving only 35 concurrent requests. Where did the missing 19GB of VRAM go?
details:
  realistic_solution: The missing 19GB was lost to KV-cache memory fragmentation. Without PagedAttention,
    each request pre-allocates a contiguous VRAM block for the maximum possible sequence length. If max_seq_len
    is 2048 but the average response is 500 tokens, 75% of each allocation is wasted internal fragmentation.
    Additionally, as requests complete and new ones start, external fragmentation creates unusable gaps
    between allocations. Combined, 60-80% of KV-cache memory is wasted. The fix is PagedAttention (used
    by vLLM), which allocates KV-cache in small, non-contiguous blocks — like virtual memory pages — eliminating
    both fragmentation types.
  common_mistake: '"Memory leak in the Python code." Python memory leaks affect system RAM, not the GPU
    VRAM.'
  napkin_math: 13B FP16 = 26GB. A single 80GB GPU leaves 54GB for KV-cache. If each request needs exactly
    1GB, max concurrency is 54. Without PagedAttention, memory is pre-allocated contiguous blocks. Fragmentation
    and over-provisioning typically waste ~60% of this space. 54GB * 40% usable = 21.6GB, limiting the
    server to just 21 concurrent requests, wasting $18k of a $30k H100's potential.
