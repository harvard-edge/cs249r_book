title: Federated vs Centralized Training Decision
scenario: 'A retail company has 1,000 stores with local transaction data. Option A: centralize all data to a cloud GPU cluster for standard distributed training. Option B: federated learning across store servers. Data is not privacy-sensitive.'
question: 'Which approach yields better model quality and why, given that the data is not privacy-sensitive?'
details:
  realistic_solution: 'When data is not privacy-sensitive, centralized training (Option A) almost always produces a better model. Federated learning introduces statistical heterogeneity (non-IID data across stores with different demographics), communication bottlenecks (WAN vs datacenter InfiniBand), and convergence challenges (FedAvg diverges with highly non-IID distributions). Centralized training with shuffled IID batches converges faster and to a better optimum. Federated learning''s value proposition is privacy and data sovereignty — without those constraints, its engineering complexity (handling stragglers, non-IID divergence, secure aggregation) adds cost without benefit. The exception: if data volume is so large that transfer costs exceed training costs, federated approaches may be justified economically.'
  common_mistake: |
    **The Pitfall:** Choosing federated learning as a default "best practice."
    **The Rationale:** Candidates assume decentralized training is inherently more scalable or modern, ignoring the mathematical challenges of non-IID data divergence.
    **The Consequence:** Introducing massive engineering complexity (stragglers, secure aggregation) and worse model convergence for zero privacy benefit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Centralized: 1 InfiniBand cluster, IID batches.
       - Federated: WAN latency (100-1000x slower), non-IID data.
    2. **Calculations:**
       - Non-IID data distributions in federated learning add 2-5x more training rounds.
    3. **Conclusion & Interpretation:**
       - **Result: Communication and Convergence Bound.** Federated learning drastically increases time-to-convergence for zero privacy benefit.
