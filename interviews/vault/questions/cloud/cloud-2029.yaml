title: Post-Hoc Threshold Adjustment for Equal Opportunity
scenario: 'You are the tech lead for a cloud-based automated resume screening system processing 500 resumes/sec.
  An audit shows the model violates equal opportunity: the True Positive Rate (TPR) for Group X is 90%,
  while for Group Y it''s only 65%. Retraining the 100B parameter model is prohibitively expensive ($2M).
  You propose post-hoc threshold adjustment to equalize TPRs. Evaluate the trade-offs of this approach
  regarding overall system accuracy and probability calibration.'
details:
  realistic_solution: 'Implement group-specific decision thresholds: lower the threshold for Group Y to
    increase its TPR, and raise it for Group X. Accept the trade-off of decreased global accuracy to meet
    the Equal Opportunity constraint.'
  common_mistake: Focusing solely on adjusting thresholds without recognizing that equalizing TPR via
    group-specific thresholds will inevitably reduce the model's overall accuracy and break probability
    calibration.
  napkin_math: 'Base thresholds (t=0.5): TPR_X = 0.90, TPR_Y = 0.65. Overall TPR (assuming 80% X, 20%
    Y split) = (0.8 * 0.90) + (0.2 * 0.65) = 0.85 (85%). Adjusting thresholds to t_X=0.6 and t_Y=0.35
    equalizes TPR at 0.80 for both groups. This achieves equal opportunity but drops overall system True
    Positive Rate from 85% to 80%.'
