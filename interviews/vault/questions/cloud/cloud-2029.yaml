title: Post-Hoc Threshold Adjustment for Equal Opportunity
scenario: You are the tech lead for a cloud-based automated resume screening system processing 500 resumes/sec. An audit shows the model violates equal opportunity: the True Positive Rate (TPR) for Group X is 90%, while for Group Y it's only 65%. Group X represents 80% of applicants and Group Y represents 20%. Retraining the 100B parameter model is prohibitively expensive ($2M).
question: "How would post-hoc threshold adjustment equalize TPRs for Groups X and Y, and what trade-offs does it create?"
details:
  realistic_solution: 'Implement group-specific decision thresholds: lower the threshold for Group Y to increase its TPR, and raise it for Group X. Accept the trade-off of decreased global accuracy to meet the Equal Opportunity constraint.'
  common_mistake: |
    **The Pitfall:** Assuming threshold adjustments are consequence-free.
    **The Rationale:** Engineers focus on achieving equal opportunity metrics without realizing group-specific thresholds reduce global accuracy and break probability calibration.
    **The Consequence:** System accuracy degrades, affecting overall business value.
  napkin_math: |
    1. **Base TPR at t=0.5:** TPR_X = 0.90, TPR_Y = 0.65.
    2. **Calculate overall TPR (80% X, 20% Y):** (0.8 * 0.90) + (0.2 * 0.65) = 85%.
    3. **Adjust thresholds (t_X=0.6, t_Y=0.35):** Equalizes TPR at 0.80 for both groups.
    4. **Evaluate trade-off:** Overall TPR drops from 85% to 80%.
    5. **Result:** **Equalizing TPR drops the overall system True Positive Rate to 80%.**
