title: Optimizing DP-SGD on Google TPU v5e with Privacy Budget Constraints
scenario: Your team is training a sensitive recommendation model using DP-SGD on an accelerator with 16 GB of HBM. The model has 1 billion parameters (FP32). You've been allocated a privacy budget of ε=8 over 10 epochs. Each epoch uses a dataset of 10 million samples, with a batch size of 2048.
question: "How would you calibrate the noise scale (σ) per step to meet the privacy budget while considering hardware constraints?"
details:
  realistic_solution: Utilize a framework like TensorFlow Privacy or Opacus. Dynamically set `noise_multiplier` based on ε, δ, and total mini-batch steps. For a 1 billion parameter model, per-sample gradient clipping is critical but requires materializing per-sample gradients, which risks memory explosion. The implementation must ensure in-place efficient gradient clipping and aggregation to avoid OOMing the 16 GB HBM.
  common_mistake: |
    **The Pitfall:** Overlooking the memory footprint of per-sample gradients required for DP clipping.
    **The Rationale:** Candidates correctly identify the noise mathematics but treat gradients as a single aggregated batch, forgetting that DP-SGD requires storing individual gradients for norm clipping.
    **The Consequence:** Designing an implementation that immediately OOMs the accelerator by attempting to materialize terabytes of per-sample gradients in 16 GB of HBM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B parameters (FP32), HBM = 16 GB.
       - Epochs = 10, Dataset = 10M samples, Batch = 2048.
       - ε = 8, δ = 1e-5.
    2. **Calculations:**
       - Total Steps (T) = 10 * (10,000,000 / 2048) = 48,828.
       - Sampling prob (q) = 2048 / 10,000,000 = 0.0002048.
       - Noise multiplier (μ) ≈ (q * sqrt(T * ln(1/δ))) / ε.
       - μ ≈ (0.0002048 * sqrt(48828 * 11.51)) / 8 = 0.153 / 8 = 0.019.
       - Gradient Memory = 10^9 params * 2 bytes (BF16) = 2 GB.
       - Per-sample gradients = 2048 * 2 GB = 4 TB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. 4 TB drastically exceeds the 16 GB HBM, dictating an in-place clipping strategy.
