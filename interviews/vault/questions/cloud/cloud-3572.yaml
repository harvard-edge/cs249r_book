title: Optimizing DP-SGD on Google TPU v5e with Privacy Budget Constraints
scenario: Your team is training a sensitive recommendation model using DP-SGD on a Google TPU v5e. The model has 1 billion parameters (FP32). You've been allocated a privacy budget of ε=8 over 10 epochs. Each epoch uses a dataset of 10 million samples, with a batch size of 2048.
question: How would you calibrate the noise scale (σ) per step to meet the privacy budget while considering hardware constraints and the privacy-utility tradeoff?
details:
  realistic_solution: A realistic solution would involve using a framework like TensorFlow Privacy or Opacus (if compatible with JAX/TPU). The strategy should focus on dynamically setting the `noise_multiplier` (which dictates σ) based on the desired total ε, a chosen δ (e.g., 1e-5), and the total number of mini-batch steps. For a 1 billion parameter model, per-sample gradient clipping (e.g., L2 norm clipping with a threshold C) is critical, requiring careful implementation to avoid memory explosions. Given the 16 GB HBM on the TPU v5e, utilizing BF16 precision for gradients, noise, and model parameters is essential to reduce memory pressure and leverage the TPU's BF16 TFLOPS. The implementation needs to ensure efficient gradient clipping and noise addition operations that leverage the TPU's parallelism, possibly using custom JAX/TensorFlow operations or optimized XLA kernels for performance. The choice of batch size and clipping norm should be iterated upon to find a balance between privacy, utility, and hardware efficiency.
  common_mistake: |
    **The Pitfall:** Overlooking the memory footprint of per-sample gradients required for DP clipping.
    **The Rationale:** Candidates correctly identify the noise mathematics but treat gradients as a single aggregated batch, forgetting that DP-SGD requires storing individual gradients for norm clipping.
    **The Consequence:** Designing an implementation that immediately OOMs (Out of Memory) the TPU by attempting to materialize terabytes of per-sample gradients in 16 GB of HBM.
  napkin_math: |
    - Total Mini-batch Updates (T) = 10 * (10,000,000 / 2048) = 48,828.
    - Sampling probability (q) = 2048 / 10,000,000 = 0.0002048.
    - Noise multiplier (μ) for ε=8, δ=1e-5: μ ≈ (q * sqrt(T * ln(1/δ))) / ε.
    - μ ≈ (0.0002048 * sqrt(48828 * 11.51)) / 8 = (0.0002048 * 749.6) / 8 = 0.153 / 8 = **~0.019**.
    - **Memory Footprint:** 10^9 parameters * 2 bytes (BF16) = 2 GB per gradient set.
    - Per-sample gradients for clipping would require 2048 * 2 GB = 4 TB, drastically exceeding the 16 GB HBM, which strictly dictates an in-place clipping and aggregation strategy.
