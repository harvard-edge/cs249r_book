title: LoRA Adapter Distillation for Latency-Sensitive Serving
scenario: A latency-sensitive serving system has a 70B base model with a domain LoRA adapter (r=16) but cannot meet P95 TTFT < 50ms.
question: "How would you distill the r=16 domain LoRA adapter for a 70B model to meet a P95 TTFT target below 50 ms while preserving quality?"
details:
  realistic_solution: 'Adapter-aware distillation strategy: (1) Merge the LoRA adapter into the 70B base weights: W_merged = W_base + alpha * B*A. This creates a 70B specialized model. (2) Use the merged 70B as teacher to distill a 7B student with KL divergence loss, only on the adapter''s target domain data. The student learns the merged behavior without needing to separately handle base + adapter. (3) Alternatively, train a 7B student with LoRA using the 70B adapted model as teacher — the 7B+LoRA serves as the production model. (4) For maximum latency reduction: speculative decoding with 7B adapted student as draft and 70B as verifier. Draft latency: 7B at ~5ms/token. Verification batch: 4 tokens per 70B call at 20ms. Accept rate ~80%: effective throughput = 4*0.8/20ms = 0.16 tokens/ms = 6.4x speedup over 70B alone.'
  common_mistake: |
    **The Pitfall:** Distilling the full 70B adapted model into a smaller 7B model.
    **The Rationale:** Candidates assume standard knowledge distillation is the only way to shrink the model size, ignoring the specific adapter structure.
    **The Consequence:** Full distillation takes weeks, requires massive datasets, and often fails to preserve the domain-specific knowledge held within the small LoRA adapter.
  napkin_math: |
    - 70B model TTFT (512 tokens, 4xH100 TP=4): Prefill FLOPs = 2 × 512 × 70e9 = 71.7T FLOPs.
    - At 4xH100 effective 1600 TFLOPS: 71.7T / 1600T = 44.8ms (very close to 50ms limit).
    - 7B student model: 2 × 512 × 7e9 = 7.17T FLOPs.
    - At 1xH100 400 TFLOPS: 7.17T / 400T = 17.9ms.
    - **Using the 7B student as a draft in speculative decoding achieves latency well under 50ms for the first batch.**
