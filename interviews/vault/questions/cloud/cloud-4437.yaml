title: LoRA Adapter Distillation for Latency-Sensitive Serving
scenario: A latency-sensitive serving system has a 70B base model with a domain LoRA
  adapter (r=16) but cannot meet P95 TTFT < 50ms. Propose an adapter distillation
  strategy to reduce latency while preserving adapter quality.
question: How would you distill the r=16 domain LoRA adapter for a 70B model to meet
  a P95 TTFT target below 50 ms while preserving quality?
details:
  realistic_solution: 'Adapter-aware distillation strategy: (1) Merge the LoRA adapter
    into the 70B base weights: W_merged = W_base + alpha * B*A. This creates a 70B
    specialized model. (2) Use the merged 70B as teacher to distill a 7B student with
    KL divergence loss, only on the adapter''s target domain data. The student learns
    the merged behavior without needing to separately handle base + adapter. (3) Alternatively,
    train a 7B student with LoRA using the 70B adapted model as teacher — the 7B+LoRA
    serves as the production model. (4) For maximum latency reduction: speculative
    decoding with 7B adapted student as draft and 70B as verifier. Draft latency:
    7B at ~5ms/token. Verification batch: 4 tokens per 70B call at 20ms. Accept rate
    ~80%: effective throughput = 4*0.8/20ms = 0.16 tokens/ms = 6.4x speedup over 70B
    alone.'
  common_mistake: Distilling the full 70B adapted model into a smaller model. Full
    distillation (70B teacher to 7B student) takes weeks and may not preserve adapter-specific
    knowledge if the student lacks enough capacity for both base and adapter knowledge.
  napkin_math: '70B model TTFT at 512-token prompt on 4xH100 TP=4: prefill FLOP =
    2 * seq_len * model_params = 2 * 512 * 70e9 = 71.7T FLOP. At 4xH100 effective
    1600 TFLOPS: 71.7T / 1600T = 44.8ms. Close to 50ms but tight. 7B student: 2 *
    512 * 7e9 = 7.17T FLOP. At 1xH100 400 TFLOPS: 17.9ms. Well under 50ms. With speculative
    decoding: effective TTFT similar to 7B-only for first batch.'
