title: Optimizing Real-time LLM Inference on NVIDIA H100s with Adaptive Batching
scenario: 'You are tasked with designing an inference serving system for an LLM processing real-time user queries. Your primary objective is to minimize end-to-end latency while maintaining a target P99 throughput of 1000 QPS per GPU. The arrival rate of queries is highly variable.'
question: 'How would you design batching and scheduling to minimize latency while sustaining 1000 QPS P99 throughput under variable arrivals?'
details:
  realistic_solution: 'Deploy a continuous batching strategy (e.g., vLLM with PagedAttention) coupled with a robust request scheduler. Continuous batching processes varying-length requests simultaneously at the token level, eliminating the padding waste and idle time of static batches. The scheduler prioritizes latency-sensitive prefill requests and leverages dynamic batch construction based on real-time load to maximize GPU FP16 TFLOPS and HBM3 bandwidth utilization.'
  common_mistake: |
    **The Pitfall:** Defaulting to static batching with a fixed large batch size.
    **The Rationale:** Candidates aim to maximize raw GPU utilization, ignoring that static batching forces requests to wait for the batch to fill, crushing latency under variable load.
    **The Consequence:** The system hits its throughput targets but completely fails latency SLAs due to severe queueing delays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 1000 QPS P99 throughput per GPU.
       - Variable query arrival rate.
    2. **Calculations:**
       - Static batching forces a queueing delay waiting for a full batch.
       - Continuous batching processes at the token level without padding.
    3. **Conclusion & Interpretation:**
       - **Result: Continuous batching maximizes compute and bandwidth without padding waste or queueing delays (Scheduling-Bound).**
