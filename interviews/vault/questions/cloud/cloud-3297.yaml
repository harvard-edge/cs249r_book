title: Optimizing Real-time LLM Inference on NVIDIA H100s with Adaptive Batching
scenario: 'You are tasked with designing an inference serving system for a large language model processing real-time user queries. The system is deployed on NVIDIA H100 GPUs. Your primary objective is to minimize end-to-end inference latency while maintaining a target P99 throughput of 1000 queries per second per H100. The arrival rate of queries is highly variable.'
question: 'How would you design batching and scheduling on an H100 to minimize latency while sustaining 1000 QPS P99 throughput under variable arrivals?'
details:
  realistic_solution: 'A realistic solution would involve a dynamic or, more ideally, a continuous batching strategy coupled with a robust request scheduler. Continuous batching (e.g., using technologies like vLLM) allows requests of varying lengths to be processed simultaneously within the same batch on the H100 without waiting for a full batch, maximizing the GPU''s 989 TFLOPS FP16 compute and 3.35 TB/s memory bandwidth by minimizing idle time and memory fragmentation. The scheduler would prioritize latency-sensitive requests, potentially using techniques like speculative decoding or attention key-value cache sharing across requests. An adaptive mechanism could dynamically adjust the batching aggressiveness based on real-time load, query queue lengths, and observed H100 utilization, favoring smaller batches during low load for minimal latency and larger, yet dynamically constructed, batches during peak load for higher throughput, always respecting the 80 GB HBM3 limit to avoid costly memory offloads.'
  common_mistake: |
    **The Pitfall:** Defaulting to static batching with a fixed large batch size.
    **The Rationale:** Candidates aim to maximize raw GPU utilization, ignoring that static batching forces requests to wait for the batch to fill, crushing latency under variable load.
    **The Consequence:** The system hits its throughput targets but completely fails latency SLAs due to severe queueing and padding waste.
  napkin_math: |
    * Target P99 throughput = 1000 QPS per H100.
    * Static batching forces a queueing delay waiting for a full batch.
    * Continuous batching processes requests at the token level.
    * **Continuous batching maximizes the 989 TFLOPS and 3.35 TB/s bandwidth without the padding waste or queueing delays of static batches.**
