title: Optimizing Large Model Training on AMD MI300X with Activation Checkpointing
scenario: Your team is training an extremely large language model (LLM) on an accelerator. The model requires storing a significant number of activations during the forward pass, exceeding the available HBM3 memory, leading to frequent out-of-memory (OOM) errors or inefficient CPU offloading. You've been tasked with optimizing the training process to fit the model within the memory constraints while minimizing training slowdown.
question: "How would you diagnose activation-memory OOMs and choose a selective checkpointing strategy that quantifies memory saved versus recompute cost?"
details:
  realistic_solution: 'Implement selective gradient checkpointing, identifying critical layers where activations consume the most memory and only checkpointing those. For non-checkpointed layers, consider more aggressive activation pruning or quantization if feasible. Quantify the recomputation overhead (in TFLOPS) introduced by checkpointing versus the memory saved (in GB) to find an optimal balance.'
  common_mistake: |
    **The Pitfall:** Blindly applying full gradient checkpointing across all layers.
    **The Rationale:** Candidates overlook the recomputation cost and assume saving memory is the only goal.
    **The Consequence:** This bottlenecks the training on the FP16 dense compute capacity when activation recomputation becomes excessively high, and heavily taxes memory bandwidth for reloading intermediate activations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer activation memory: 10 GB.
       - Layer recomputation: 50 TFLOPs.
       - Compute: 1,307 TFLOPS. Memory Bandwidth: 5.3 TB/s.
    2. **Calculations:**
       - Checkpointing saves 10 GB HBM3 memory.
       - Recomputation time: 50 TFLOPs / 1307 TFLOPS ≈ 38 ms per backward pass.
       - Re-reading weights/states: 20 GB / 5.3 TB/s ≈ 3.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Selective checkpointing saves 10GB for a ~38ms compute penalty.** (Compute-Bound)
