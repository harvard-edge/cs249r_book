title: Optimizing Large Model Training on AMD MI300X with Activation Checkpointing
scenario: Your team is training an extremely large language model (LLM) on an AMD MI300X accelerator. The model requires storing a significant number of activations during the forward pass, exceeding the available HBM3 memory, leading to frequent out-of-memory (OOM) errors or inefficient CPU offloading. You've been tasked with optimizing the training process to fit the model within the MI300X's memory constraints while minimizing training slowdown.
question: "How would you diagnose activation-memory OOMs on the MI300X and choose a selective checkpointing strategy that quantifies memory saved versus recompute cost?"
details:
  realistic_solution: Implement selective gradient checkpointing, identifying critical layers where activations consume the most memory and only checkpointing those. For non-checkpointed layers, consider more aggressive activation pruning or quantization if feasible. Quantify the recomputation overhead (in TFLOPS) introduced by checkpointing versus the memory saved (in GB) to find an optimal balance.
  common_mistake: |
    **The Pitfall:** Blindly applying full gradient checkpointing across all layers.
    **The Rationale:** Candidates overlook the recomputation cost and assume saving memory is the only goal.
    **The Consequence:** This bottlenecks the training on the FP16 dense compute capacity when activation recomputation becomes excessively high, and heavily taxes memory bandwidth for reloading intermediate activations.
  napkin_math: |
    1. Assume a specific layer generates 10 GB of activations.
    2. Checkpointing this layer saves 10 GB of HBM3 memory.
    3. Recomputing this layer involves 50 TFLOPs of operations.
    4. Given the MI300X's 1,307 TFLOPS, recomputation takes 50 / 1307 = ~38 ms per backward pass.
    5. Re-reading 20 GB of weights and intermediate states takes 20 GB / 5.3 TB/s = ~3.8 ms.
    6. **Cumulative recomputation costs must be balanced to avoid computation or memory access bottlenecks.**
