title: Hedged Requests in Distributed Inference
scenario: Your 8-replica A100 inference cluster shows P99 latency of 450ms against
  a 200ms SLA. You propose hedged requests — sending each request to 2 replicas and
  taking the first response. What is the expected P99 improvement, and what is the
  cost in wasted GPU compute?
question: What is the expected P99 improvement, and what is the cost in wasted GPU
  compute?
details:
  realistic_solution: 'For uncorrelated tail latency, hedged requests reduce P99 to
    approximately P99² of the original distribution. If P99 = 450ms comes from independent
    causes, hedged P99 ≈ original P99.8 — roughly 250ms for a typical log-normal distribution.
    But the cost is real: you double GPU utilization for every hedged request. If
    you hedge 100% of requests, you need 2× the GPU fleet. The practical approach:
    hedge only after a deadline — send the second copy only if the first hasn''t responded
    within P50 (say 80ms). This hedges only ~50% of requests but catches nearly all
    tail events, costing ~25% extra compute instead of 100%.'
  common_mistake: Assuming hedging always cuts tail latency dramatically. If the tail
    is caused by a correlated issue (e.g., all replicas share the same NFS for model
    loading, or all hit GC at similar intervals), hedging provides no benefit because
    both copies experience the same delay.
  napkin_math: 'Naive hedging: P99 improves from 450ms to ~250ms. Cost: 2× GPU compute
    = 2× fleet cost. Deadline hedging at P50=80ms: hedge ~50% of requests, ~25% extra
    compute. P99 improves to ~260ms. Cost per request: 1.25× base. ROI: 200ms latency
    reduction for 25% more compute vs 200ms for 100% more compute.'
