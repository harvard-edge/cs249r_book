title: Hedged Requests in Distributed Inference
scenario: Your 8-replica inference cluster shows a P99 latency of 450ms against a 200ms SLA. You propose hedged requests — sending each request to 2 replicas simultaneously and taking the first response.
question: What is the expected P99 improvement for hedged requests, and what is the cost in wasted GPU compute?
details:
  realistic_solution: 'For uncorrelated tail latency, hedged requests dramatically reduce tail percentiles. However, the cost is doubling your GPU utilization for every hedged request. The practical architectural solution is deadline hedging: send the second copy only if the first has not responded within the P50 time (e.g., 80ms). This catches nearly all tail events while only increasing compute costs by ~25%.'
  common_mistake: |
    **The Pitfall:** Assuming hedging universally cures tail latency regardless of the root cause.
    **The Rationale:** It works brilliantly for independent probabilistic failures, leading engineers to apply it blindly.
    **The Consequence:** Doubling fleet compute costs while experiencing zero latency improvement because the tail is caused by a correlated systemic issue (like shared NFS congestion).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8-replica inference cluster.
       - SLA: 200ms.
       - Current P99 latency: 450ms.
    2. **Calculations:**
       - Naive hedging: Probability both requests exceed time t is P(X > t)^2.
       - To find new P99, solve P(X > t)^2 = 0.01 => P(X > t) = 0.1 (Hedged P99 becomes original P90, ~250ms). Compute cost: 2x (100% overhead).
       - Deadline hedging at P50 (80ms): Only ~50% of requests trigger a hedge.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Optimized.** P99 drops to ~260ms, costing only 25% extra compute instead of 100% overhead.
