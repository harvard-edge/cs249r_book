title: Diagnosing Thermal Throttling in Multi-Core CPU Migrations
scenario: 'You are migrating a legacy ML pipeline from an older cluster of high-frequency dual-core CPUs (3.8 GHz) to a modern cloud instance with 64 cores running at 2.4 GHz. Your pipeline involves sequential data preprocessing steps followed by highly parallelized inference. On the new 64-core instance, the system consistently hits thermal throttling under full parallel load, degrading overall inference throughput.'
question: 'Why does the 64-core 2.4 GHz instance thermal throttle despite lower per-core frequency, and how would you mitigate it?'
details:
  realistic_solution: 'Recognize that with the end of Dennard scaling, per-core power does not drop cubically because voltage has hit a lower bound (leakage limits). Diagnose that parallelizing the workload across 64 cores linearly multiplies the power draw, quickly exceeding package TDP. Mitigate by profiling the workload, limiting the maximum number of active threads (e.g., to 32) to stay within the sustained thermal envelope (avoiding clock downclocking), or offloading dense inference to specialized accelerators.'
  common_mistake: |
    **The Pitfall:** Assuming lower clock frequencies guarantee lower total power.
    **The Rationale:** Candidates recall Dennard Scaling and assume the frequency drop completely offsets the core count increase.
    **The Consequence:** They fail to account for the end of Dennard Scaling (voltage limits) and the massive multiplicative power cost of firing up 64 physical cores simultaneously.
  napkin_math: |
    * **Frequency reduction:** 3.8 GHz / 2.4 GHz ≈ 1.58x lower dynamic power per core.
    * **Core scaling multiplier:** 64 cores / 2 cores = 32x more active cores.
    * **Power draw multiplier:** 32 / 1.58 ≈ **20x higher potential power draw.**
    * **Conclusion:** Lighting up 64 cores simultaneously easily overwhelms the thermal limits of modern multi-core packages, leading to immediate thermal throttling.
