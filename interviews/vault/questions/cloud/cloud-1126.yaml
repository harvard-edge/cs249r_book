title: Diagnosing Thermal Throttling in Multi-Core CPU Migrations
scenario: 'You are migrating a legacy ML pipeline from an older cluster of high-frequency dual-core CPUs (3.8 GHz) to a modern cloud instance with 64 cores running at 2.4 GHz. Your pipeline involves sequential data preprocessing steps followed by highly parallelized inference. On the new 64-core instance, the system consistently hits thermal throttling under full parallel load.'
question: 'Why does the 64-core 2.4 GHz instance thermal throttle despite lower per-core frequency, and how would you mitigate it?'
details:
  realistic_solution: 'The issue stems from the end of Dennard scaling; transistor leakage current prevents voltage from scaling down proportionally with frequency. Firing 64 active cores simultaneously causes an immense spike in dynamic and static power, easily exceeding the package Thermal Design Power (TDP). To mitigate, limit the thread pool (e.g., OMP_NUM_THREADS=32) to keep the processor within its sustained thermal envelope and prevent severe downclocking, or offload dense ML ops to dedicated accelerators.'
  common_mistake: |
    **The Pitfall:** Assuming lower clock frequencies guarantee lower total power.
    **The Rationale:** Candidates recall Dennard Scaling and assume the frequency drop completely offsets the core count increase.
    **The Consequence:** They fail to account for the end of Dennard Scaling (voltage limits) and the massive multiplicative power cost of firing up 64 physical cores simultaneously.
  napkin_math: |
    **Assumptions & Constraints:**
    - Legacy: 2 cores at 3.8 GHz.
    - New: 64 cores at 2.4 GHz.

    **Calculations:**
    - Frequency reduction: 3.8 GHz / 2.4 GHz ≈ 1.58x lower dynamic power per core.
    - Core scaling multiplier: 64 / 2 = 32x more active cores.
    - Power draw multiplier: 32x more cores / 1.58x less power per core ≈ 20x higher potential power draw.

    **Conclusion & Interpretation:**
    - **Result: 20x higher potential power draw (Thermal-Bound)**. Lighting up 64 cores simultaneously easily overwhelms TDP limits, leading to immediate thermal throttling.
