title: The Ridge Point Rule
scenario: A workload is considered 'memory-bound' on a GPU like the H100 when its key performance ratio
  is significantly below the hardware's 'ridge point'. What is the name of this ratio, and what fundamental
  bottleneck does being 'memory-bound' signify?
details:
  realistic_solution: The ratio is called **Arithmetic Intensity (AI)**. It is the ratio of floating-point
    operations (FLOPs) to the bytes of data moved from memory to execute those operations.
  common_mistake: Engineers often confuse the raw computational power (TFLOPS) of a GPU with its effective
    performance. They might assume that a model requiring many computations is automatically 'compute-bound'.
    This ignores the reality that feeding the compute units is often the true bottleneck. Another common
    mistake is mixing up the definition of the ratio, for instance, by inverting it (bytes per FLOP).
  napkin_math: An NVIDIA H100 GPU has a peak compute of 989 TFLOPS (FP16) and a memory bandwidth of 3.35
    TB/s. Its **Ridge Point**—the Arithmetic Intensity needed to saturate the GPU—is the ratio of these
    two numbers.
  options:
  - It's called Throughput, and it means the GPU clock speed is too low.
  - It's called Arithmetic Intensity, and it means the workload is bottlenecked by memory bandwidth.
  - It's called Latency, and it means the PCI-e bus is saturated.
  - It's called Arithmetic Intensity, and it means the workload is bottlenecked by the number of CUDA
    cores.
  correct_index: 1
