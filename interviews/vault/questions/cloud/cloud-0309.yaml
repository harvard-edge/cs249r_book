title: The Ridge Point Rule
scenario: 'A workload is considered "memory-bound" on a GPU when its key performance ratio is significantly below the hardware''s "ridge point".'
question: "What is the name of this ratio, and what fundamental bottleneck does being 'memory-bound' signify?"
details:
  realistic_solution: 'The ratio is called **Arithmetic Intensity (AI)**. It is the ratio of floating-point operations (FLOPs) to the bytes of data moved from memory to execute those operations.'
  common_mistake: |
    **The Pitfall:** Confusing raw computational power (TFLOPS) with effective performance, or misdefining the ratio as bytes per FLOP.
    **The Rationale:** Engineers naturally default to analyzing ALU/compute limits, assuming that a high number of operations automatically makes a workload compute-bound, ignoring the memory wall.
    **The Consequence:** Extensive effort is wasted optimizing arithmetic instructions rather than fixing the true bottleneck: memory access patterns, operator fusion, and HBM bandwidth utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: NVIDIA H100 GPU.
       - Peak Compute: 989 TFLOPS (FP16).
       - Memory Bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Ridge Point = Peak Compute / Memory Bandwidth.
       - Ridge Point = 989,000 GFLOPS / 3,350 GB/s ≈ 295 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 295 FLOPs/Byte**. If a workload executes fewer than 295 operations for every byte it pulls from memory, it will strictly be **Memory-Bound**.
  options:
  - It's called Throughput, and it means the GPU clock speed is too low.
  - It's called Arithmetic Intensity, and it means the workload is bottlenecked by memory bandwidth.
  - It's called Latency, and it means the PCI-e bus is saturated.
  - It's called Arithmetic Intensity, and it means the workload is bottlenecked by the number of CUDA cores.
  correct_index: 1
