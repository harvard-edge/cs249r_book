title: Router Model Accuracy vs Latency Tradeoff in Multi-Model Pipeline
scenario: A cloud pipeline routes queries between GPT-4-class (2000ms, $0.03/query) and a fine-tuned 7B
  model on A100 (80GB HBM2e, 180ms, $0.002/query). The router itself is a 350M classifier running at 8ms.
  Current routing accuracy is 91% — 9% of complex queries incorrectly go to the cheap model and require
  a fallback retry, adding 180ms+2000ms=2180ms latency. Analyze whether the routing accuracy is sufficient
  given the cost-latency tradeoffs.
details:
  realistic_solution: 'Compute expected latency per query: 0.91*(8+180) + 0.09*(8+180+2000) = 0.91*188
    + 0.09*2188 = 171 + 197 = 368ms expected. Compare to always-large: 2008ms. Always-small: 188ms (but
    quality failure). The 9% misroute inflates P95 significantly — at P95 you hit the fallback path. To
    hit a 300ms P95: need fallback rate < 5% or a confidence-threshold abort (send to large immediately
    if router confidence < 0.85).'
  common_mistake: Optimizing for router accuracy in isolation without computing the expected latency cost
    of misroutes. A 9% error rate sounds small but the latency penalty on the fallback path can dominate
    P95.
  napkin_math: 'Expected cost: 0.91*$0.002 + 0.09*($0.002+$0.03) = $0.00182 + $0.00288 = $0.0047/query
    vs $0.03 always-large. Cost savings: 84%. P95 with 9% error: with Poisson approximation, P(at least
    1 fallback in 1 query) = 9%, so P95 latency = 2188ms (fallback path). Need error rate < 5% to keep
    P95 < 300ms threshold.'
