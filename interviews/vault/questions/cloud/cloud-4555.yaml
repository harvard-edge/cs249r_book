title: Asynchronous H100 Checkpointing
scenario: Synchronous checkpointing of a 1T parameter model across 1024 H100 GPUs
  takes 5 minutes to write to object storage, idling the cluster.
question: Design an asynchronous memory-tiering approach to reduce GPU blocking time
  to under 10 seconds.
details:
  realistic_solution: A 1T parameter FP16 model with Adam state is ~6TB total, or
    roughly 6GB per GPU. To minimize blocking, dump the 6GB state synchronously from
    GPU HBM to local node CPU DRAM over PCIe Gen5, which takes milliseconds. The GPUs
    immediately resume training while a background CPU thread streams the DRAM buffer
    to the persistent object storage concurrently.
  common_mistake: Suggesting faster networked storage without addressing the synchronous
    blocking behavior of the training loop itself.
  napkin_math: 6TB / 1024 = 6GB per GPU copied to RAM.
