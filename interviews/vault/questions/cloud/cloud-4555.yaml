title: Asynchronous H100 Checkpointing
scenario: Synchronous checkpointing of a 1T parameter model across 1024 H100 GPUs takes 5 minutes to write to object storage, idling the cluster.
question: Design an asynchronous memory-tiering approach to reduce GPU blocking time to under 10 seconds.
details:
  realistic_solution: |
    Dump the per-GPU memory buffer to host DRAM over PCIe Gen5. Training resumes while a background CPU thread streams the DRAM buffer to object storage at 5-10 GB/s.
  common_mistake: |
    **The Pitfall:** Reporting the total footprint without specifying optimizer precision.
    **The Rationale:** Candidates assume a static footprint without considering the dramatic difference between 8-bit and FP32 optimizers.
    **The Consequence:** Grossly miscalculating the per-GPU dump cost and necessary memory tiering bandwidth.
  napkin_math: |
    - FP32 Adam: 2TB Weights + 2TB Grads + 8TB Optimizer = 12TB total.
    - 8-bit Adam: 2TB Weights + 2TB Grads + 2TB Optimizer = 6TB total.
    - Per GPU (1024 GPUs): 6TB / 1024 = 6GB.
    - PCIe Gen5 dump: 6GB / 64GB/s = ~0.1s.
    - **Asynchronous tiering reduces GPU blocking time from 5 minutes to ~0.1 seconds.**
