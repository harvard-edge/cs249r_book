title: Evaluating Defenses for High-Throughput Content Moderation
scenario: You are designing a cloud-based automated content moderation API processing 10,000 images/sec
  on a fleet of A10G GPUs (24GB VRAM). You must evaluate defenses against adversarial evasion attacks
  (e.g., PGD) designed to bypass the NSFW classifier. Option A is Adversarial Training (augmenting the
  dataset with PGD-7 examples). Option B is Input Preprocessing (applying JPEG compression and spatial
  smoothing before inference). With a strict 50ms latency SLA and a tight training GPU budget, evaluate
  the trade-offs and justify your architectural choice.
details:
  realistic_solution: Implement Option B (Input Preprocessing). Applying JPEG compression (Q=75) disrupts
    the high-frequency perturbations that PGD attacks rely on. It shifts the defensive workload to cheap
    CPU preprocessing (adding ~1.5ms per image), preserves the 50ms latency SLA on the A10Gs, and avoids
    the 4x GPU compute multiplier of Adversarial Training. The 10k QPS throughput requirement remains
    intact since preprocessing is parallelized across CPU cores.
  common_mistake: Assuming Adversarial Training is the universally optimal defense without quantifying
    the massive training compute multiplier (often 3-10x) or realizing it primarily overfits to the specific
    attack method (PGD-7) used during training, leaving the model vulnerable to unseen attack variants.
  napkin_math: PGD-7 Adversarial Training requires 7 forward passes to generate the perturbation + 1 standard
    forward/backward pass. Total compute ≈ 4x standard training. At 10k QPS, JPEG compression takes ~1.5ms
    per image on CPU. (1.5ms << 50ms SLA). CPU instances cost ~$0.04/hr vs A10G at ~$1.00/hr, making preprocessing
    highly cost-effective while keeping the training budget flat.
