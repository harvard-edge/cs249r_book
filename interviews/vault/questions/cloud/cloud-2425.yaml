title: Multi-Tenant LoRA Base Model Calibration
scenario: You host a multi-tenant service with 1 base 13B LLM and 500 active LoRA adapters (code, medical,
  chat). To save GPU memory, you quantize the base model to INT8 (W8A8). You calibrate using a generic
  Wikipedia dataset. Adapters for code generation see a 15% drop in pass@1, while chat adapters are unaffected.
details:
  realistic_solution: 'The activation distributions of the base model change significantly depending on
    the specific downstream task the LoRA adapter is driving. Calibrating the base model''s activation
    scales using Wikipedia creates clipping/rounding errors for the specific activation pathways activated
    by code-generation inputs. You cannot use a single global static activation scale for all LoRAs. You
    must either: 1) Switch to dynamic activation quantization (W8A8 dynamic), computing scales on-the-fly
    per token (costing some compute overhead but fixing accuracy), or 2) If using static PTQ, collect
    calibration data across the heterogeneous tasks and use a percentile-based calibration (e.g., 99.9th
    percentile) rather than min-max.'
  common_mistake: Fine-tuning the LoRA adapters further to compensate for the quantization error, which
    is computationally expensive and doesn't fix the underlying scale mismatch.
  napkin_math: 'Dynamic activation overhead: For a 1x4096 vector, finding max requires 4096 comparisons.
    On A100 (108 SMs), a block reduction takes <1 microsecond. Matrix multiply 4096x4096x1 takes ~10 microseconds
    in INT8. Dynamic overhead is ~10%, but saves 50% memory and preserves code-gen accuracy across all
    tenant adapters.'
