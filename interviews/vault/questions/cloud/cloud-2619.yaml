title: Privacy-Accuracy Trade-off in Federated Deployment
scenario: A mobile keyboard prediction model trains federally on 10M devices. Option A is no differential privacy, best accuracy (25% next-word accuracy). Option B is DP with ε=8, accuracy drops to 22%. Option C is DP with ε=1 (strong privacy), accuracy drops to 18%.
question: Which configuration should ship?
details:
  realistic_solution: Option B (ε=8) is likely the pragmatic choice. Option A exposes users to gradient inversion attacks — for a keyboard model, this could reconstruct typed passwords, medical queries, or private messages. The reputational and legal risk far outweighs the 3% accuracy gain. Option C (ε=1) provides strong mathematical privacy guarantees but the 7% accuracy drop significantly degrades user experience — keyboard prediction at 18% feels noticeably worse, risking user churn. Option B (ε=8) provides meaningful privacy protection (gradient inversion becomes impractical with this noise level at the per-user contribution level) while maintaining competitive accuracy. Apple's deployment of federated learning for keyboard uses ε ≈ 2-8 per user per day.
  common_mistake: |
    **The Pitfall:** Optimizing purely for mathematical privacy (ε=1) without considering the practical attack surface.
    **The Rationale:** Candidates over-index on textbook differential privacy thresholds (ε < 1) without balancing the severe utility degradation.
    **The Consequence:** The model is deployed with poor accuracy, leading to a degraded product experience and potential user abandonment.
  napkin_math: |
    1. 10M users typing ~50 words/day.
    2. At 25% accuracy: 12.5 correct predictions.
    3. At 22% accuracy: 11 correct predictions.
    4. At 18% accuracy: 9 correct predictions.
    5. Users notice the drop from 12.5 to 9, but 11 is acceptable.
    **Users notice the 25→18% drop but not 25→22%.**
