title: VRAM Calculation for FP16 Guardrail Model
scenario: As part of our Responsible AI framework, we deploy an LLM-based guardrail to filter toxic outputs
  before they reach the user. The guardrail is a 7-billion parameter model that we load in FP16 precision
  onto a cloud A100 GPU. Calculate the VRAM required to store the weights of this guardrail model and
  determine what percentage of the A100's total memory capacity this represents.
question: "How much VRAM do the FP16 weights of the 7B guardrail model require, and what percentage of an 80 GB A100 is that?"
details:
  realistic_solution: The candidate should recall that FP16 uses 16 bits (2 bytes) per parameter and that
    the standard A100 has 80 GB of HBM2e memory. They should multiply the parameter count by the bytes
    per parameter, then divide by the total VRAM to find the proportion used by the guardrail's weights.
  common_mistake: Candidates often forget that FP16 requires 2 bytes per parameter, incorrectly assuming
    1 byte or 4 bytes. They may also fail to recall the total 80 GB memory capacity of an A100 GPU or
    miscalculate the final percentage.
  napkin_math: 1 parameter in FP16 = 2 bytes. Total weight memory = 7 billion parameters * 2 bytes/parameter
    = 14 GB. A100 total VRAM = 80 GB. Percentage of A100 VRAM = (14 GB / 80 GB) * 100 = 17.5%.
