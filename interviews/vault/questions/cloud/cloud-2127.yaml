title: The Feature Store Latency Budget
scenario: A model requires 250 total features at serving time. Each feature lookup from the online store takes ~0.5ms. The end-to-end SLA is 50ms and model inference takes 15ms.
question: Can you serve this model within the SLA using sequential feature lookups, and why?
details:
  realistic_solution: No. Sequential lookups take $250 \times 0.5\text{ms} = 125\text{ms}$, which exceeds the 50ms SLA before inference even starts. You must batch feature lookups into a single multi-get request or use parallel key lookups. A single batched Redis MGET for 250 keys takes ~2-5ms, leaving ~30ms headroom for inference and network overhead.
  common_mistake: |
    **The Pitfall:** Assuming feature lookups are instantaneous.
    **The Rationale:** Overlooking network round-trip overhead when querying remote key-value stores.
    **The Consequence:** The system immediately violates SLA requirements before inference even begins.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 250 features, 0.5ms sequential lookup time.
       - SLA: 50ms. Inference time: 15ms.
    2. **Calculations:**
       - Sequential lookups: 250 * 0.5ms = 125ms.
       - Batched Redis MGET: ~3ms.
       - Total Batched Time: 3ms (lookups) + 15ms (inference) = 18ms.
    3. **Conclusion & Interpretation:**
       **Result: Network-Latency Bound.** Sequential lookups (125ms) violate the 50ms SLA; batched lookups reduce retrieval overhead to ~3ms.
