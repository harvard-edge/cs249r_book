title: Systolic Array Tile Padding Collapse
scenario: You are deploying a BERT-style model on a custom cloud NPU featuring a massive 256x256 systolic
  array. At batch size 256, the NPU achieves 15,000 QPS. When the serving layer dynamically adjusts the
  batch size to 257 to handle a traffic spike, throughput inexplicably plummets to 3,500 QPS.
question: "Why does throughput collapse when the batch size changes from 256 to 257 on the 256x256 NPU, and how would you fix it?"
details:
  realistic_solution: The symptom is a catastrophic performance cliff caused by a mismatch between the
    algorithmic tensor dimensions and the hardware systolic array tile size. A 256x256 systolic array
    requires matrices to be tiled into 256x256 blocks. At batch size 256, the input perfectly maps to
    one tile (100% utilization). At batch size 257, the hardware/compiler must allocate a second tile.
    The second tile processes 1 valid row and 255 padded rows (0.39% utilization). This instantly halves
    the theoretical compute efficiency. Worse, the compiler likely inserts padding and unpadding kernels,
    and the 2nd tile forces the pipeline to flush or causes L1 cache thrashing, leading to the >4x slowdown.
    The co-design fix is to enforce strict sequence/batch padding at the API level (e.g., bucketizing
    to multiples of 256) or redesign the NPU compiler to support dynamic dimension chunking without materializing
    zeros in SRAM.
  common_mistake: Assuming the drop is caused by exceeding the total SRAM capacity and spilling to off-chip
    DRAM.
  napkin_math: 'BS=256: Compute cycles = (256/256) * C = 1 * C. Utilization = 100%. BS=257: Compute cycles
    = ceil(257/256) * C = 2 * C. Compute time doubles instantly. Padding overhead: 255 * 256 = 65,280
    zero-elements must be written to SRAM per matrix multiply. If SRAM bandwidth is 1 TB/s, writing 65KB
    of zeros takes negligible time, but the pipeline bubble of waiting for a mostly-empty tile to propagate
    through the 256-deep systolic array stalls the next batch. Effective utilization drops to 257 / 512
    = 50.1%, plus loop control overhead.'
