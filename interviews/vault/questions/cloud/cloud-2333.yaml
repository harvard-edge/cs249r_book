title: Systolic Array Tile Padding Collapse
scenario: You are deploying a BERT-style model on a custom cloud NPU featuring a massive 256x256 systolic array. At batch size 256, the NPU achieves 15,000 QPS. When the serving layer dynamically adjusts the batch size to 257 to handle a traffic spike, throughput inexplicably plummets to 3,500 QPS.
question: Why does throughput collapse when the batch size changes from 256 to 257 on the 256x256 NPU, and how would you fix it?
details:
  realistic_solution: |
    The symptom is a catastrophic performance cliff caused by a mismatch between the algorithmic tensor dimensions and the hardware systolic array tile size. A 256x256 systolic array requires matrices to be tiled into 256x256 blocks. At batch size 256, the input perfectly maps to one tile (100% utilization). At batch size 257, the hardware/compiler must allocate a second tile. The second tile processes 1 valid row and 255 padded rows (0.39% utilization). This instantly halves the theoretical compute efficiency. Worse, the compiler likely inserts padding and unpadding kernels, and the 2nd tile forces the pipeline to flush or causes L1 cache thrashing, leading to the >4x slowdown. The co-design fix is to enforce strict sequence/batch padding at the API level (e.g., bucketizing to multiples of 256) or redesign the NPU compiler to support dynamic dimension chunking without materializing zeros in SRAM.
  common_mistake: |
    **The Pitfall:** Assuming the throughput drop is caused by exceeding total SRAM capacity and spilling to off-chip DRAM.
    **The Rationale:** Candidates look for memory capacity cliffs, ignoring the rigid geometric constraints of fixed-size hardware systolic arrays.
    **The Consequence:** Engineers might attempt to quantize the model to save memory, which fails to fix the >4x slowdown caused by dimension padding.
  napkin_math: |
    - **Batch Size 256:** Perfect fit. Compute cycles = (256/256) * C = 1C. Utilization = 100%.
    - **Batch Size 257:** Requires a second tile. Compute cycles = ceil(257/256) * C = 2C. Compute time doubles.
    - **Padding Overhead:** The second tile processes 1 valid row and 255 padded rows. 255 * 256 = 65,280 zero-elements injected.
    - **Effective Utilization:** 257 valid operations / 512 total computed = 50.1%.
    - **Conclusion: Pushing mostly-empty tiles through a deep systolic array stalls the pipeline, leading to the observed drop from 15k to 3.5k QPS.**
