title: Analyzing Compute-Memory Tradeoffs with Gradient Checkpointing on NVIDIA H100
scenario: You implement gradient checkpointing to resolve OOM errors during large transformer training. This resolves the OOM, but you observe a 30% reduction in observed TFLOPS compared to the expected peak.
question: Why does gradient checkpointing reduce observed TFLOPS, and how would you optimize the compute-memory trade-off?
details:
  realistic_solution: To optimize, profile the model to identify which layers contribute most to activation memory and recomputation cost. Strategically apply checkpointing to memory-intensive layers rather than indiscriminately. Consider alternative memory-saving techniques like selective activation offloading to CPU RAM or NVMe, or exploring model parallelism. Furthermore, optimize kernel fusion and batching to ensure efficient utilization of the H100's 3.35 TB/s memory bandwidth for the recomputed operations, minimizing data transfer bottlenecks.
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing is a 'free' solution for memory.
    **The Rationale:** Overlooking the recomputation overhead and its impact on the GPU's compute units during the backward pass.
    **The Consequence:** Trading an OOM crash for severely degraded training throughput.
  napkin_math: |
    - Given a hypothetical GPU peak of 1000 TFLOPS, a 30% reduction implies an overhead of ~300 TFLOPS dedicated strictly to recomputing activations.
    - If an activation layer requires $X$ FLOPs for its forward pass and generates $Y$ GB of activations.
    - Checkpointing saves $Y$ GB of memory but incurs an additional ~$X$ FLOPs of recomputation during the backward pass.
    - **You must calculate the FLOPS cost per GB of activations saved ($X/Y$) to strategically apply checkpointing only to layers with low arithmetic intensity.**
