title: Cloud Inference Accelerator Selection L3 0
scenario: 'Compare serving a 7B model on: (A) 1 A100 ($2/hr), and (B) 1 AWS Inferentia2 chip ($0.76/hr). At batch=1 the workload is memory-bound, and at batch=64 it is compute-bound.'
question: 'What is the cost per 1K tokens on A100 versus Inferentia2 at batch 1 and batch 64?'
details:
  realistic_solution: '7B model = 14 GB FP16. Batch=1 (memory-bound): tokens/s = bandwidth / model_size. A100: 2000 / 14 = 143 tok/s. Inferentia2: 800 / 14 = 57 tok/s. Cost per 1K tokens: A100 = $2 / (143 × 3.6) = $0.00389. Inferentia2 = $0.76 / (57 × 3.6) = $0.0037. Similar cost at batch=1. Batch=64 (compute-bound): FLOPs per token ≈ 2 × 7B = 14 GFLOP. A100: 312 TFLOPS / (14 × 64 GFLOP) = 348 tok/s per batch element... actually throughput = 312e12 / (14e9) = 22,286 tok/s. Cost: $2 / (22,286 × 3.6) = $0.000025. Inferentia2: 190e12 / 14e9 = 13,571 tok/s. Cost: $0.76 / (13,571 × 3.6) = $0.0000155. Inferentia2 is 1.6x cheaper at high batch due to lower price despite lower FLOPS.'
  common_mistake: |
    **The Pitfall:** Comparing only FLOPS and ignoring bandwidth.
    **The Rationale:** Candidates often assume high FLOPS directly translates to faster inference across all batch sizes.
    **The Consequence:** They incorrectly estimate costs at low batch sizes because they fail to realize that autoregressive decoding at batch=1 is purely bounded by memory bandwidth.
  napkin_math: |
    * **Batch=1 (Memory-bound):**
      * A100: 143 tok/s @ $2/hr = $3.89 per 1M tokens.
      * Inf2: 57 tok/s @ $0.76/hr = $3.70 per 1M tokens.
    * **Batch=64 (Compute-bound):**
      * A100: 22K tok/s @ $2/hr = $0.025 per 1M tokens.
      * Inf2: 13.6K tok/s @ $0.76/hr = $0.016 per 1M tokens.
    * **Conclusion:** Inferentia2 is **1.6x cheaper** at high batch sizes due to lower hourly pricing, despite lower raw FLOPS.
