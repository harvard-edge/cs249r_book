title: Cloud Inference Accelerator Selection L3 0
scenario: 'Compare serving a 7B model on: (A) 1 A100 (312 TFLOPS FP16, 2 TB/s, $2/hr), (B) 1 AWS Inferentia2
  chip (estimated 190 TFLOPS BF16, 800 GB/s, $0.76/hr). At batch=1 (memory-bound) and batch=64 (compute-bound),
  calculate cost per 1K tokens.'
details:
  realistic_solution: '7B model = 14 GB FP16. Batch=1 (memory-bound): tokens/s = bandwidth / model_size.
    A100: 2000 / 14 = 143 tok/s. Inferentia2: 800 / 14 = 57 tok/s. Cost per 1K tokens: A100 = $2 / (143
    × 3.6) = $0.00389. Inferentia2 = $0.76 / (57 × 3.6) = $0.0037. Similar cost at batch=1. Batch=64 (compute-bound):
    FLOPs per token ≈ 2 × 7B = 14 GFLOP. A100: 312 TFLOPS / (14 × 64 GFLOP) = 348 tok/s per batch element...
    actually throughput = 312e12 / (14e9) = 22,286 tok/s. Cost: $2 / (22,286 × 3.6) = $0.000025. Inferentia2:
    190e12 / 14e9 = 13,571 tok/s. Cost: $0.76 / (13,571 × 3.6) = $0.0000155. Inferentia2 is 1.6x cheaper
    at high batch due to lower price despite lower FLOPS.'
  common_mistake: Comparing only FLOPS without considering that LLM decode at low batch is memory-bandwidth-bound,
    not compute-bound. The Inferentia2's lower bandwidth makes it less competitive at batch=1, but its
    lower price wins at high batch.
  napkin_math: 'Batch=1: A100 143 tok/s @ $2/hr = $3.89/M tok. Inf2 57 tok/s @ $0.76/hr = $3.70/M tok.
    Similar. Batch=64: A100 22K tok/s @ $2/hr = $0.025/M tok. Inf2 13.6K tok/s @ $0.76/hr = $0.016/M tok.
    Inf2 wins by 1.6x.'
