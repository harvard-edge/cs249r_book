title: 'The TPOT Memory Wall: Latency Decomposition'
scenario: You are optimizing a Llama-70B model spread across two H100 SXM GPUs (Tensor
  Parallelism = 2) for a real-time chat application with a strict 50ms per-token deadline.
  Using the hardware specs provided, explain whether a single token generation step
  (the 'decode' phase for a batch size of 1) is limited by compute or memory bandwidth.
  Then, calculate the approximate Time Per Output Token (TPOT).
question: For Llama-70B on two H100 SXM GPUs at batch size 1, is decode compute- or
  memory-bound, and what is the approximate TPOT?
details:
  realistic_solution: The decode step is memory-bound. To calculate the TPOT, we compare
    compute time against memory read time from HBM. The model is 140 GB in FP16, which
    requires 2 H100 GPUs. The aggregate bandwidth is 6.7 TB/s. Reading 140 GB takes
    ~21ms. The matrix-vector compute takes less than 1ms. Therefore, memory bandwidth
    dictates latency.
  common_mistake: Engineers often default to thinking that LLM inference is always
    compute-bound because of the massive number of FLOPs. However, for the decode
    step where you generate one token at a time, the batch size is tiny (just 1 for
    that user). The bottleneck is almost always fetching the massive model weights
    (140GB for Llama-70B in FP16) from HBM, not the matrix-vector multiplication itself.
    The arithmetic intensity is too low.
  napkin_math: 70B FP16 = 140GB. Batch size 1 is memory-bound. Aggregate bandwidth
    of 2x H100s (HBM3) = 2 * 3.35TB/s = 6.7TB/s. Memory reading time per token = 140GB
    / 6.7TB/s = 20.9ms. An AllReduce sync over NVLink (900GB/s) for small activations
    takes <1ms. Total TPOT ≈ 22ms. This is well within the 50ms per-token strict deadline,
    leaving room for small batching.
  options:
  - ~0.07 ms, because the task is compute-bound by the dual H100's TFLOPS.
  - ~21 ms, because the task is memory-bound by aggregate HBM bandwidth.
  - ~42 ms, because you must first read the weights (21ms) and then perform the compute
    (another 21ms).
  - It cannot be calculated without knowing the exact number of layers and heads in
    the model.
  correct_index: 1
