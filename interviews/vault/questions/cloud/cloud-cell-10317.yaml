title: Realizing Power Capping vs. Thermal Throttling on H100
scenario: A datacenter operator applies a 500 W power cap to H100 SXM5 GPUs (rated at 700 W TDP) using
  `nvidia-smi --power-limit=500` to stay within rack power budgets. A training team complains that their
  throughput dropped by 30% compared to uncapped runs. The operator claims power capping should only reduce
  throughput by ~15%. Explain the discrepancy.
details:
  realistic_solution: 'Two separate throttling mechanisms interact: (1) The 500 W power cap reduces GPU
    clocks proportionally — H100 at 500/700 = 71% of TDP nominally yields ~71% throughput for compute-bound
    workloads. (2) However, in a poorly ventilated rack, the reduced cooling from inadequate airflow causes
    junction temperatures to climb above 83°C even at 500 W. The GPU then thermally throttles clocks further
    — compounding the power cap effect. Check `nvidia-smi --query-gpu=temperature.gpu,clocks_throttle_reasons.hw_slowdown,power.draw
    --format=csv` to distinguish cap-induced vs. thermal-induced throttling. Fix: improve airflow (blanking
    panels, directed airflow) to enable 500 W operation without thermal throttle.'
  common_mistake: Assuming linear relationship between power cap and throughput; not distinguishing between
    power capping (software-enforced via NVML) and thermal throttling (hardware-enforced when junction
    temperature exceeds 83°C on H100).
  napkin_math: 'H100 BF16 FLOPS: 989 TFLOPS at 700 W. Power-capped at 500 W (71.4%): theoretical ~706
    TFLOPS. Actual measured 30% drop = 692 TFLOPS. Additional thermal throttle on top: GPU clocks dropped
    from 1,980 MHz to ~1,650 MHz (83% of max) = explains extra 15% × 17% = additional ~11% reduction.
    Combined: 71% × 83% ≈ 59% of peak = 41% throughput loss, not 30% — suggests partial thermal throttle.'
