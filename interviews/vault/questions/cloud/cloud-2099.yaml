title: Transformer Architecture Enables Tensor Parallelism
scenario: A junior engineer asks why the transformer architecture scales so well to hundreds of GPUs using Tensor Parallelism (TP).
question: How do multi-head attention and FFN layers naturally decompose across GPUs in Tensor Parallelism, and where are the synchronization points?
details:
  realistic_solution: Attention heads compute Q, K, V projections independently, needing an AllReduce only at output projection. The FFN layer has a column-parallel then row-parallel split, needing one AllReduce. The architecture aligns perfectly with minimal communication limits.
  common_mistake: |
    **The Pitfall:** Believing Tensor Parallelism requires splitting every operation and synchronizing constantly.
    **The Rationale:** Candidates lack deep knowledge of how attention heads are independent and how FFN matrices can be split.
    **The Consequence:** Overestimating communication overhead and failing to design optimal 3D parallelism strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model with 80 layers running 4-way Tensor Parallelism.
       - NVLink bandwidth is 600 GB/s.
    2. **Calculations:**
       - Sync Points: Only 2 AllReduces per transformer layer (one after attention, one after FFN).
       - Total AllReduces: 2 AllReduces * 80 layers = 160 AllReduces per forward pass.
       - AllReduce Latency: On NVLink (600 GB/s), ~20 µs for a d=4096 vector.
       - Overhead: 160 * 20 µs = 3.2 ms.
    3. **Conclusion & Interpretation:**
       - **Total sync overhead is ~3.2 ms per forward pass, which is negligible compared to ~50ms of compute.**
       - **Result: Compute-Bound**
