title: SSP Staleness Bound Intuition
scenario: Your team is debating whether to use BSP, ASP, or SSP for a 64-GPU training job. A colleague
  claims SSP is 'just ASP with a timeout.' Explain what SSP actually guarantees and why the staleness
  bound matters for convergence.
details:
  realistic_solution: 'SSP bounds the maximum staleness: the fastest worker can be at most S steps ahead
    of the slowest. This means every gradient update is computed on parameters that are at most S versions
    old. Unlike BSP, which blocks all workers at every step (100% synchronous), SSP allows faster workers
    to proceed up to S steps, absorbing straggler variance. Unlike ASP, SSP prevents runaway divergence
    by enforcing a ceiling. The staleness bound S directly controls the convergence-throughput trade-off:
    smaller S is closer to BSP (safer convergence, lower throughput), larger S is closer to ASP (higher
    throughput, riskier convergence).'
  common_mistake: Confusing SSP with ASP. ASP has no staleness bound at all, so the fastest worker can
    be arbitrarily far ahead, causing gradient updates based on very stale parameters.
  napkin_math: 'BSP: staleness=0, throughput limited by slowest worker. ASP: staleness=unbounded. SSP
    with S=3: fastest worker blocks only when 3 steps ahead of slowest.'
