title: TP Layout Under an Asymmetric Bandwidth Budget
scenario: An 8B-parameter dense block runs on a 4-GPU mini-pod where 2 GPUs share a fast NVLink lane
  (450 GB/s unidirectional) and the other 2 GPUs are connected to that pair only over PCIe Gen4 (~25
  GB/s unidirectional). The block has hidden dim H_in = H_out = 8192 and is currently column-parallel,
  ending in an AllGather across all 4 ranks. Decide whether to keep column-parallel + AllGather, or
  switch to row-parallel + AllReduce, given the asymmetric fabric. Quantify the collective time under
  each layout and identify the binding link.
question: "On 4 GPUs with a 2x NVLink pair + 2x PCIe pair, should the [8192, 8192] linear block use column-parallel + AllGather or row-parallel + AllReduce, and why?"
details:
  realistic_solution: 'Column-parallel: each rank holds [8192, 2048] of W and produces a [batch, 2048]
    output partition. The end-of-block AllGather across 4 ranks moves 3/4 * 4 * batch * 2048 * 2 bytes
    = 3 * batch * 4096 bytes through the slowest link. For batch=2048 that is ~24 MB across the slowest
    PCIe edge → ~0.96 ms. Row-parallel: each rank holds [2048, 8192] of W; input must first be split
    [batch, 2048], and the output is a partial sum requiring an AllReduce of [batch, 8192]. AllReduce
    moves 2*(N-1)/N = 1.5x the [batch, 8192] tensor (32 MB at batch=2048) → 48 MB across the slowest
    link → ~1.92 ms. Column-parallel + AllGather wins by ~2x because AllGather moves N-1/N of the small
    sharded tensor while AllReduce moves 2*(N-1)/N of the *full* tensor. The PCIe leg is the binding
    link in both cases — keep TP inside the NVLink pair when possible.'
  common_mistake: 'Choosing layout by FLOPs symmetry alone. Both layouts have identical compute (16.78M
    params per shard), so the answer must come from collective cost — and the collective cost is asymmetric:
    AllReduce moves twice the bytes of AllGather across the same ring. The other common error is naming
    NVLink (450 GB/s) as the binding link when the PCIe edge (25 GB/s) is 18x slower.'
  napkin_math: 'H_in = H_out = 8192, TP=4, batch=2048, BF16. Column-parallel + AllGather across 4 ranks:
    bus traffic = 3/4 * 4 * 2048 * 2048 * 2 = 24 MB through 25 GB/s PCIe → 0.96 ms. Row-parallel + AllReduce:
    bus traffic = 2*(3/4) * 2048 * 8192 * 2 = 48 MB → 1.92 ms. Per-shard weights either layout: 8192
    * 2048 = 16.78 M params × 2 B = 33.6 MB.'
