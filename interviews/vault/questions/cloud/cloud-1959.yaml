title: Cloud API Loan Approval Parity Calculation
scenario: A cloud-based automated loan approval API processes 50,000 requests per day. During a fairness audit, you find that from a sample of 20,000 applications from the privileged demographic, 6,000 were approved. From 30,000 applications from the unprivileged demographic, 7,500 were approved.
question: "What is the Statistical Parity Difference (SPD) for the loan approval deployment?"
details:
  realistic_solution: 'Compute the positive outcome selection rate for each group independently, then calculate the absolute difference between these rates to find the Statistical Parity Difference.'
  common_mistake: |
    **The Pitfall:** Calculating the Disparate Impact or comparing raw counts.
    **The Rationale:** Candidates mix up fairness metrics, calculating the ratio (0.25 / 0.30 = 0.83) instead of the absolute difference, or they mistakenly look at raw volume (7,500 vs 6,000) despite unequal base populations.
    **The Consequence:** Reporting the wrong fairness metric to compliance teams, potentially obscuring regulatory violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Privileged: 6,000 approved / 20,000 total.
    - Unprivileged: 7,500 approved / 30,000 total.

    **Calculations:**
    - Rate_Privileged = 6,000 / 20,000 = 0.30.
    - Rate_Unprivileged = 7,500 / 30,000 = 0.25.
    - SPD = |0.30 - 0.25| = 0.05.

    **Conclusion & Interpretation:**
    - **Result: 0.05 (Fairness-Bound)**. The SPD is exactly 0.05 (or 5%).
