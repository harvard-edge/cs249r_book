title: Evaluating torch.compile Backend Portability Across Accelerators
scenario: 'PyTorch 2.x''s torch.compile offers multiple backends: ''inductor'' (default, CUDA/CPU), ''openxla'' (TPU), and experimental AMD support. You want to write model code that torch.compile can optimize for any backend.'
question: What are the portability constraints?
details:
  realistic_solution: 'For maximum portability: (1) Avoid torch.autograd.Function
    custom ops (cause graph breaks on all backends). (2) Use only standard torch ops
    from the core aten operator set. (3) Avoid data-dependent control flow (breaks
    XLA backend). (4) Avoid in-place ops on views (breaks inductor fusion). (5) Test
    with TORCH_COMPILE_DEBUG=1 on each backend to identify backend-specific graph
    breaks. The inductor backend for CUDA generates Triton kernels; the AMD path generates
    similar Triton but with ROCm-specific tuning; the XLA path generates HLO graphs.'
  common_mistake: |
    **The Pitfall:** Assuming `torch.compile` makes any PyTorch code automatically portable across accelerators.
    **The Rationale:** Candidates overlook that each backend has different graph break triggers and drastically different codegen maturity.
    **The Consequence:** Unintended graph breaks and silent performance degradation on non-CUDA backends.
  napkin_math: |
    1. **Assumptions & Constraints:** torch.compile backend optimizations: Inductor (Triton/CUDA), OpenXLA (TPU HLO), AMD (Triton/ROCm).
    2. **Calculations:** Typical speedups: CUDA Inductor = 1.3-2.0x over eager. TPU OpenXLA = 1.5-3.0x (whole-graph). AMD Inductor = 1.1-1.5x (less mature tuning).
    3. **Conclusion & Interpretation:** **Result: Portability-Bound Tradeoff. The variance in backend maturity and graph break triggers constitutes the PyTorch 2.x portability tax.**
