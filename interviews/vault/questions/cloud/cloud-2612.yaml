title: Federated Learning Communication Cost
scenario: A federated network has 100 edge devices training a 50M parameter model in FP32. Each round: devices download the global model, train locally, upload updated weights.
question: How much bandwidth is required per federated round and over 500 rounds for 100 devices training a 50M-parameter FP32 model?
details:
  realistic_solution: 'Model size = 50M params × 4 bytes (FP32) = 200 MB. Per round per device: download 200 MB + upload 200 MB = 400 MB. Total per round across 100 devices: 100 × 400 MB = 40 GB of network traffic. For 500 rounds: 500 × 40 GB = 20 TB total bandwidth. In practice, gradient compression (top-k sparsification, quantization to INT8) can reduce upload size by 10-100x. With 10x compression on uploads only: 100 × (200 + 20) MB × 500 = 11 TB. This communication overhead is why federated learning favors more local epochs per round to reduce the number of communication rounds needed.'
  common_mistake: |
    **The Pitfall:** Forgetting that communication is bidirectional in Federated Learning.
    **The Rationale:** Candidates focus only on the device sending updates back to the server.
    **The Consequence:** They halve the uncompressed bandwidth calculation by forgetting the mandatory 200MB global model download every round.
  napkin_math: |
    - Model Size: 50M params × 4 bytes = 200 MB.
    - Uncompressed traffic per device per round: 200 MB download + 200 MB upload = 400 MB.
    - Total per round (100 devices): 100 × 400 MB = 40 GB.
    - Total for 500 rounds (uncompressed): 500 × 40 GB = 20 TB.
    - With 10x compression on uploads: 200 MB (dl) + 20 MB (ul) = 220 MB per device.
    - Compressed traffic per round: 100 × 220 MB = 22 GB.
    - **Total for 500 rounds (compressed):** 500 × 22 GB = **11 TB**.
