title: KV-Cache Transfer Compression to Reduce Network Bottleneck
scenario: 'In a disaggregated serving cluster, KV-cache transfer from prefill to decode GPUs uses 400 Gbps InfiniBand. A 70B model with 512-token prompt has KV cache that takes 3.2ms to transfer, adding 16% to TTFT.'
question: "What KV-cache compression scheme would reduce the 3.2 ms prefill-to-decode transfer over 400 Gbps InfiniBand and lower TTFT overhead?"
details:
  realistic_solution: 'KV cache compression strategies: (1) Quantization: KV caches can be quantized to INT8 without significant quality loss (attention scores are softmax-normalized, less sensitive to quantization). INT8 KV = 2× compression, halves transfer size. (2) Cross-layer sharing (CLA): many adjacent layers have nearly identical KV patterns. Share KV cache across every 2 layers: 2× reduction in cache size at cost of minor quality degradation. (3) Head pruning: not all attention heads carry equal information across layers. Drop bottom 20% of heads by attention entropy variance: 20% reduction with <0.5% quality impact. Combined: INT8 (2×) + 20% head pruning (1.25×) = 2.5× compression. Transfer time: 3.2ms / 2.5 = 1.28ms. TTFT overhead drops from 16% to 6.4%. (4) Speculative KV: decode GPU speculatively starts generation with a partial KV cache (first 8 layers), receives remaining layers asynchronously — hides transfer behind compute.'
  common_mistake: |
    **The Pitfall:** Applying general-purpose compression algorithms like LZ4 or Zstd to KV cache tensors.
    **The Rationale:** Treating floating-point tensors like standard textual or binary data.
    **The Consequence:** Achieving poor compression ratios (1.1-1.3x) where the compute overhead of compression massively exceeds the network transfer savings.
  napkin_math: |
    1. 70B model KV cache for 512 tokens: layers=80, heads=64, head_dim=128.
    2. KV cache = `2 * 80 * 64 * 128 * 512 * 2B` = 1,342,177,280 bytes = **1.25 GiB (~1.34 GB)**.
    3. At 3.2ms transfer time, if using INT8 compression (2x reduction), size drops to ~0.67 GB.
    4. New transfer time = `3.2ms / 2` = **1.6ms**.
    5. **Result:** TTFT overhead drops by 1.6ms, saving latency.
