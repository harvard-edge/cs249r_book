title: Resolving Image Pipeline Preprocessing Bottlenecks
scenario: You are serving an image classification model on an instance with a GPU and 4 vCPUs. Your strict end-to-end latency budget is 50ms per request. GPU inference takes only 4ms. However, user requests contain 4K JPEG images. The current pipeline uses Python's PIL library, which takes 55ms to decode, crop, and resize the image to 224x224 on the CPU. A junior engineer suggests upgrading the instance to one with a faster GPU to meet the budget.
question: Why will upgrading to a faster GPU fail to meet the 50ms latency budget, and what preprocessing fix meets it?
details:
  realistic_solution: Replace the slow PIL image processing with a high-performance library like OpenCV or libjpeg-turbo, or move the decoding entirely to the GPU using NVIDIA nvJPEG or DALI, reducing CPU time to ~12ms.
  common_mistake: |
    **The Pitfall:** Assuming the GPU is the bottleneck in an ML pipeline.
    **The Rationale:** Candidates believe upgrading to a faster accelerator will meaningfully impact end-to-end latency when the critical path is heavily dominated by single-threaded CPU preprocessing.
    **The Consequence:** Wasting money on expensive hardware upgrades while completely missing the latency SLA.
  napkin_math: |
    * Current E2E = CPU Prep (55 ms) + GPU Inf (4 ms) = 59 ms (> 50ms budget).
    * Upgrading GPU (assume Inf = ~1 ms): E2E = 55 + 1 = 56 ms (Still > 50ms budget).
    * Using libjpeg-turbo/DALI (Prep = 12 ms): E2E = 12 + 4 = **16 ms**.
    * **Result:** Fixing the CPU preprocessing pipeline easily meets the < 50ms budget.
