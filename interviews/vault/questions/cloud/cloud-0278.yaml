title: The Meaning of TOPS/W
scenario: You are doing a cost analysis for a new datacenter build-out. An NVIDIA GPU provides about 989 TFLOPS of FP16 performance with a 700W TDP.
question: What does the TFLOPS/W metric primarily allow you to calculate?
details:
  realistic_solution: 'The TFLOPS/W metric defines power efficiency, dictating sustained throughput within a strict datacenter power envelope.'
  common_mistake: |
    **The Pitfall:** Assuming highest peak TFLOPS is always the best choice.
    **The Rationale:** Engineers focus purely on compute speed, ignoring severe constraints of power delivery and cooling at the rack level.
    **The Consequence:** Poor TCO calculations and stranded, power-constrained deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU efficiency = 989 TFLOPS / 700 W = 1.4 TFLOPS/W.
    - Rack limit = 70 kW (with ~25 kW host overhead).

    **Calculations:**
    - Available GPU power = 45 kW = 45,000 W.
    - Max GPUs = 45,000 / 700 = ~64 GPUs.
    - Rack throughput = 64 * 989 = ~63.3 PFLOPS.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound (A 70kW rack supports 64 GPUs yielding ~63.3 PFLOPS).**
  options:
  - The peak theoretical speed of a single GPU
  - The compute performance per unit of power, indicating efficiency
  - The latency of a single operation
  - The speed of the memory subsystem
  correct_index: 1
