title: The Meaning of TOPS/W
scenario: You are doing a cost analysis for a new datacenter build-out. An NVIDIA H100 GPU provides about 989 TFLOPS of FP16 performance with a 700W TDP.
question: "What does the TFLOPS/W metric primarily allow you to calculate?"
details:
  realistic_solution: The TFLOPS/W metric defines the power efficiency of the processor. It allows you to calculate how much sustained throughput you can achieve within a given power budget. A higher TFLOPS/W is more desirable for maximizing performance within a fixed power envelope, which is the fundamental constraint in any large-scale deployment.
  common_mistake: |
    **The Pitfall:** Assuming highest peak TFLOPS is always the best choice.
    **The Rationale:** Engineers focus purely on compute speed, ignoring the severe constraints of power delivery and cooling at the rack and datacenter level.
    **The Consequence:** Poor total cost of ownership (TCO) calculations and power-constrained deployments.
  napkin_math: |
    1. H100 efficiency: 989 TFLOPS / 700 W ≈ 1.4 TFLOPS/W.
    2. Rack power budget: 70 kW.
    3. Max GPUs per rack (accounting for host overhead ~25kW): 45 kW for GPUs / 700W = ~64 GPUs.
    4. Total theoretical compute: 64 GPUs * 989 TFLOPS/GPU ≈ 63.3 PFLOPS.
    **Final Result: A 70kW rack supports 64 GPUs yielding ~63.3 PFLOPS.**
  options:
  - The peak theoretical speed of a single GPU
  - The compute performance per unit of power, indicating efficiency
  - The latency of a single operation
  - The speed of the memory subsystem
  correct_index: 1
