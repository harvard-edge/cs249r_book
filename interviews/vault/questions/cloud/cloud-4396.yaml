title: Cooling Power Versus Compute Power Tradeoff in Free-Cooling Regimes
scenario: A cloud operator runs a 200-node cluster in a facility with an economizer (free cooling) that activates when outdoor dry-bulb temperature drops below 18°C. The local climate provides free cooling for 5,500 hours/year. During mechanical cooling (3,260 hours/year), the chiller draws 400 kW to cool the cluster's 1.6 MW IT load. During free cooling, the facility pumps and fans draw only 60 kW.
question: What are the annual cooling energy savings and PUEs for mechanical versus free cooling, and should workloads be shifted into free-cooling hours?
details:
  realistic_solution: 'Mechanical cooling: 3,260h × (1,600 + 400) kW = 3,260 × 2,000 = 6,520 MWh. PUE mechanical = 2,000 / 1,600 = 1.25. Free cooling: 5,500h × (1,600 + 60) kW = 5,500 × 1,660 = 9,130 MWh. PUE free = 1,660 / 1,600 = 1.0375. Annual energy: 6,520 + 9,130 = 15,650 MWh. Counterfactual (no economizer): 8,760h × 2,000 kW = 17,520 MWh. Savings: 1,870 MWh/year = $187,000/year. Annualized PUE: 15,650 / (1,600 × 8,760) = 15,650 / 14,016 = 1.117. Strategy: schedule latency-sensitive workloads year-round; shift batch jobs to free-cooling hours to maximize green compute window.'
  common_mistake: |
    **The Pitfall:** Calculating average annual PUE by simple arithmetic mean of hours.
    **The Rationale:** Candidates average the PUE ratios directly without weighting them by the total energy consumed (kWh) during those periods.
    **The Consequence:** The calculation severely misrepresents the true efficiency, failing to reflect that a 5,500-hour low-overhead period dominates the facility's power footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mechanical cooling: 3,260 hours/yr at 400 kW.
    - Free cooling: 5,500 hours/yr at 60 kW.
    - IT load: 1.6 MW.

    **Calculations:**
    - Mechanical cooling energy: 3,260h × 400 kW = 1,304 MWh.
    - Free cooling energy: 5,500h × 60 kW = 330 MWh.
    - Total annual cooling: 1,304 + 330 = 1,634 MWh.
    - Counterfactual (no economizer): 8,760h × 400 kW = 3,504 MWh.
    - Annual Savings: 3,504 - 1,634 = 1,870 MWh ($187,000 at $0.10/kWh).
    - Annualized PUE: (14,016 IT + 1,634 Cooling) / 14,016 IT = 1.117.

    **Conclusion & Interpretation:**
    - **Result: 1,870 MWh saved annually, dropping PUE to 1.117 (Power-Efficiency Bound)**.
