title: Carbon-Aware Scheduling for H100 Training Jobs
scenario: Your organization commits to a 50% reduction in CO2 emissions from training. An H100 cluster in Virginia (carbon intensity 300 gCO2/kWh) and one in Oregon (50 gCO2/kWh) each have 256 H100s. Virginia has 30% spare capacity; Oregon has 5% spare capacity.
question: How would you design a carbon-aware job scheduler across Virginia and Oregon to cut CO2 emissions by 50% given their spare capacities?
details:
  realistic_solution: 'Oregon spare=5%×256=13 H100s. Virginia spare=30%×256=77 H100s. Carbon intensity ratio: 300/50=6×. Move jobs to Oregon up to its 95% utilization. Remaining jobs in Virginia: emit 300gCO2/kWh. For a 7-day H100 training job: Oregon: 700W×168hr×8GPUs×50g/kWh = 47kgCO2. Virginia: same job = 282kgCO2. Priority: always fill Oregon first for large jobs. For short jobs (<1hr), Virginia carbon overhead is small. Build scheduler: carbon cost = intensity × power × duration; route to minimize total carbon subject to capacity constraints.'
  common_mistake: |
    **The Pitfall:** Routing all jobs to Oregon without considering utilization ceilings.
    **The Rationale:** Candidates see the lower carbon intensity and ignore the fact that the Oregon cluster is nearly full.
    **The Consequence:** Overloading the green region, causing massive job queueing and breaking SLAs without actually running the work.
  napkin_math: |
    1. Oregon spare capacity = 5% × 256 = ~13 H100s (enough for one 8-GPU job).
    2. Virginia spare capacity = 30% × 256 = ~77 H100s.
    3. For a 7-day job on 8x H100s at 700W: Energy = 8 × 700W × 168h = 940.8 kWh.
    4. Oregon emissions: 940.8 kWh × 50 gCO2/kWh ≈ 47 kg CO2.
    5. Virginia emissions: 940.8 kWh × 300 gCO2/kWh ≈ 282 kg CO2.
    6. **Routing the job to Oregon saves ~235 kg CO2 (83% reduction), but you must prioritize large jobs for Oregon's limited slots and schedule Virginia jobs during low-carbon grid hours.**
