title: Carbon-Aware Scheduling for H100 Training Jobs
scenario: Your organization commits to a 50% reduction in CO2 emissions from training. An H100 cluster in Virginia (carbon intensity 300 gCO2/kWh) and one in Oregon (50 gCO2/kWh) each have 256 H100s. Virginia has 30% spare capacity; Oregon has 5% spare capacity.
question: How would you design a carbon-aware job scheduler across Virginia and Oregon to cut CO2 emissions by 50% given their spare capacities?
details:
  realistic_solution: 'Oregon spare=5%*256=13 H100s. Virginia spare=30%*256=77 H100s. Carbon intensity ratio: 300/50=6x. Move jobs to Oregon up to its 95% utilization. Priority: always fill Oregon first for large jobs. Build scheduler: carbon cost = intensity * power * duration; route to minimize total carbon subject to capacity constraints.'
  common_mistake: |
    **The Pitfall:** Routing all jobs to Oregon without considering utilization ceilings.
    **The Rationale:** Candidates see the lower carbon intensity and ignore the fact that the Oregon cluster is nearly full.
    **The Consequence:** Overloading the green region, causing massive job queueing and breaking SLAs without actually running the work.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 H100s per region. Power = 700W per GPU.
    - Oregon spare capacity = 5%, Carbon = 50 gCO2/kWh.
    - Virginia spare capacity = 30%, Carbon = 300 gCO2/kWh.

    **Calculations:**
    - Oregon spare slots = 0.05 * 256 = ~13 H100s (enough for one 8-GPU job).
    - Virginia spare slots = 0.30 * 256 = ~77 H100s.
    - Energy for 7-day 8x H100 job: 8 * 700W * 168h = 940.8 kWh.
    - Oregon emissions: 940.8 kWh * 50 gCO2/kWh ≈ 47 kg CO2.
    - Virginia emissions: 940.8 kWh * 300 gCO2/kWh ≈ 282 kg CO2.

    **Conclusion & Interpretation:**
    - **Result: 235 kg CO2 Saved (Carbon-Bound)**. Routing the job to Oregon saves ~235 kg CO2 (83% reduction), but you must prioritize large jobs for Oregon's limited slots and schedule Virginia jobs during low-carbon grid hours.
