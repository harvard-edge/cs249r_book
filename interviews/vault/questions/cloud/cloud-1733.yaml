title: Evaluating Prefetch Buffer Depth
scenario: Your team is training a ViT model on an 8x H100 cluster reading data from a shared Ceph cluster over a 400 Gbps RoCE network. The mean GPU step time is 120ms. The mean storage read time is 40ms, but network I/O jitter pushes the p99.9 read time to 600ms. You are deciding between a conservative prefetch buffer of 2 batches (saving host DRAM) and a buffer calculated to cover the p99.9 tail.
question: Should you use a 2-batch prefetch buffer or size it for the 600ms p99.9 tail, and what depth prevents GPU starvation?
details:
  realistic_solution: Calculate the buffer depth to cover the maximum expected I/O spike. With a p99.9 read of 600ms and GPU step time of 120ms, you need ceil(600/120) = 5 batches in the buffer. This guarantees the GPUs can compute for 600ms while waiting for a stalled network request.
  common_mistake: |
    **The Pitfall:** Sizing the prefetch buffer using average latency instead of tail latency.
    **The Rationale:** Engineers apply Little's Law using average read times, prioritizing host DRAM savings.
    **The Consequence:** The GPUs experience starvation during predictable I/O spikes, drastically dropping utilization of expensive hardware.
  napkin_math: |
    1. **Worst-case I/O Latency:** 600ms.
    2. **GPU Step Time:** 120ms.
    3. **Required Buffer Depth:** ⌈600ms / 120ms⌉ = 5 batches.
    4. **Conclusion:** **A depth of 5 batches guarantees the GPUs can compute while waiting for a stalled network request**, at a trivial cost of ~20GB host DRAM (assuming 4GB batches).
