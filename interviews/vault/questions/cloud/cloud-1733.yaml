title: Evaluating Prefetch Buffer Depth
scenario: Your team is training a ViT model on an 8x H100 cluster reading data from a shared Ceph cluster
  over a 400 Gbps RoCE network. The mean GPU step time is 120ms. The mean storage read time is 40ms, but
  network I/O jitter pushes the p99.9 read time to 600ms. You are deciding between a conservative prefetch
  buffer of 2 batches (saving host DRAM) and a buffer calculated to cover the p99.9 tail. Evaluate the
  trade-off and determine the precise prefetch buffer depth required to achieve zero GPU starvation without
  excessive host memory allocation.
question: "Should you use a 2-batch prefetch buffer or size it for the 600ms p99.9 tail, and what depth prevents GPU starvation?"
details:
  realistic_solution: Calculate the buffer depth to cover the maximum expected I/O spike. With a p99.9
    read of 600ms and GPU step time of 120ms, you need ceil(600/120) = 5 batches in the buffer. This guarantees
    the GPUs can compute for 600ms while waiting for a stalled network request.
  common_mistake: Sizing the prefetch buffer using Little's Law with average latency instead of tail latency,
    leading to GPU starvation during I/O spikes, or defaulting to an arbitrarily huge buffer that wastes
    host DRAM.
  napkin_math: Worst-case I/O Latency = 600ms. GPU Step Time = 120ms. Required Depth = ceil(600ms / 120ms)
    = 5 batches. If each batch is 4GB, host memory overhead is 5 * 4GB = 20GB, an acceptable trade-off
    to keep expensive H100s at 100% utilization.
