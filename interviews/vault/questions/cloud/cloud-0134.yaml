title: The Chatbot's Unresponsive Start
scenario: You are the ML Systems Engineer for a popular AI chatbot service running on H100s. The service
  has a strict P99 Time-To-First-Token (TTFT) SLO of 250ms. Users are complaining that the bot feels 'laggy'
  to start its response, even though the subsequent tokens appear quickly. Your dashboard shows high GPU
  utilization (~90%) and excellent throughput (tokens per second), but the P99 TTFT has spiked to ~500ms.
  Your current serving stack uses a static batching strategy with a batch size of 32 and a fixed 400ms
  timeout window. Given these symptoms, diagnose the most likely cause of the P99 TTFT violation.
question: "What is the most likely cause of the 500ms P99 TTFT when static batching uses batch size 32 and a fixed 400ms timeout?"
details:
  realistic_solution: The most likely cause is the static batching policy. The fixed 400ms timeout window
    means that a request arriving at the beginning of the window must wait the full 400ms before processing
    even begins, immediately violating the 250ms SLO. This queuing delay is the dominant factor in P99
    TTFT. While good for throughput, static batching is poor for latency-sensitive applications. The solution
    is to switch to a continuous (or dynamic) batching scheduler. Continuous batching decouples the batching
    from time, iterating on the batch in-flight and adding new requests as soonp as they arrive. This
    minimizes the wait time (T_wait) and allows the system to start processing requests almost immediately,
    dramatically improving TTFT for interactive workloads.
  common_mistake: Engineers often fixate on raw throughput (tokens/sec) and high hardware utilization
    as universal signs of health. They misattribute latency issues to the model being too slow or the
    hardware being too weak, failing to see that the queuing strategy itself is the bottleneck. They assume
    that if the GPU is busy, it's doing useful work, when in reality, the *wrong work* (processing requests
    that have already waited too long) is being done.
  napkin_math: Let's analyze the worst-case latency for a request under the static batching policy.
  options:
  - The Llama-70B model's per-token processing time is too high for the H100 GPU, and a smaller model
    is needed to meet the SLO.
  - The network connection between the load balancer and the inference servers is adding significant latency.
  - The static batching window forces early-arriving requests to wait for the timeout, causing high queuing
    delay that violates the TTFT SLO.
  - The H100's memory bandwidth is saturated, causing delays in loading model weights for each batch.
  correct_index: 2
