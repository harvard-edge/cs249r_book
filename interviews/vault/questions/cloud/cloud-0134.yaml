title: The Chatbot's Unresponsive Start
scenario: You manage an AI chatbot service on H100s with a strict P99 Time-To-First-Token (TTFT) SLO of 250ms. Users complain the bot feels 'laggy' to start. Your dashboard shows ~90% GPU utilization and excellent token throughput, but the P99 TTFT has spiked to ~500ms. Your serving stack uses a static batching strategy with a batch size of 32 and a fixed 400ms timeout window.
question: What is the most likely cause of the 500ms P99 TTFT when static batching uses batch size 32 and a fixed 400ms timeout?
details:
  realistic_solution: The most likely cause is the static batching policy. The fixed 400ms timeout window means that a request arriving at the beginning of the window must wait the full 400ms before processing even begins, immediately violating the 250ms SLO. This queuing delay is the dominant factor in P99 TTFT. While good for throughput, static batching is poor for latency-sensitive applications. The solution is to switch to a continuous (or dynamic) batching scheduler. Continuous batching decouples the batching from time, iterating on the batch in-flight and adding new requests as soonp as they arrive. This minimizes the wait time (T_wait) and allows the system to start processing requests almost immediately, dramatically improving TTFT for interactive workloads.
  common_mistake: |
    **The Pitfall:** Misattributing latency issues to model size or hardware performance while fixating on high hardware utilization.
    **The Rationale:** Engineers assume that if the GPU is 90% utilized, it's doing useful work, missing that static batching forces early-arriving requests to sit idle in a queue for the timeout window.
    **The Consequence:** Teams waste time optimizing models or buying more GPUs when the queuing strategy itself is the bottleneck.
  napkin_math: |
    - **Static Batching Delay:** Requests arriving early in a fixed 400ms window wait up to 400ms just to form a batch.
    - **P99 TTFT Floor:** Wait Time (400ms) + Compute Time (>0ms) = >400ms, instantly violating the 250ms SLO.
    - **Result:** **The 400ms static timeout window is the direct cause of the 500ms P99 TTFT.**
  options:
  - The Llama-70B model's per-token processing time is too high for the H100 GPU, and a smaller model is needed to meet the SLO.
  - The network connection between the load balancer and the inference servers is adding significant latency.
  - The static batching window forces early-arriving requests to wait for the timeout, causing high queuing delay that violates the TTFT SLO.
  - The H100's memory bandwidth is saturated, causing delays in loading model weights for each batch.
  correct_index: 2
