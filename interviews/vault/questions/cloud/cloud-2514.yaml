title: Cloud Top Of Rack Switch L3 0
scenario: You have a 512-GPU training cluster spread across 8 racks. Each rack has 64 GPUs and is connected to the spine via 400 Gbps Top of Rack (ToR) uplinks. You are performing a global AllReduce.
question: What is the maximum cross-rack AllReduce bandwidth per GPU with 64 GPUs sharing a 400Gbps ToR uplink?
details:
  realistic_solution: 'Each rack has 64 GPUs. ToR uplink to spine: 400 Gbps = 50 GB/s. During ring AllReduce across racks, data must traverse the ToR uplink. With 64 GPUs in a rack all needing cross-rack bandwidth: 50 GB/s / 64 GPUs = 0.78 GB/s per GPU cross-rack. Compare to intra-rack NVLink at 600 GB/s per GPU (for A100) — cross-rack is ~769x slower. This is why AllReduce topology must minimize cross-rack traffic.'
  common_mistake: |
    **The Pitfall:** Forgetting that all GPUs in the rack must share the same ToR uplink bandwidth.
    **The Rationale:** Candidates often assume the per-GPU bandwidth is simply the raw link speed (400 Gbps), ignoring the network bottleneck at the rack boundary.
    **The Consequence:** Designing distributed training topologies that severely choke at the ToR switch, crippling cluster utilization.
  napkin_math: |
    1. ToR uplink to the spine: 400 Gbps = 50 GB/s.
    2. There are 64 GPUs per rack that must share this single uplink during cross-rack communication.
    3. Per-GPU cross-rack bandwidth = 50 GB/s / 64 GPUs ≈ 0.78 GB/s.
    4. Compare to intra-node NVLink (e.g., 600 GB/s on A100): 600 / 0.78 ≈ 769x slower.
    5. **The maximum cross-rack bandwidth is ~0.78 GB/s per GPU.**
