title: Evaluating SR-IOV vs Virtio for RoCEv2
scenario: 'You are architecting a multi-tenant Kubernetes cluster for distributed LLM training using 8x H100 nodes. Each node has 4x 400Gbps NVIDIA ConnectX-7 NICs dedicated to the compute fabric (RoCEv2). The platform team proposes using standard virtio-net for container networking to simplify IPAM, enforce security policies, and enable seamless pod migration.'
question: 'Should the RoCEv2 fabric use virtio-net or SR-IOV for distributed LLM training, and why?'
details:
  realistic_solution: 'Reject virtio-net for the RoCEv2 backend fabric. You must evaluate and select SR-IOV to expose Virtual Functions (VFs) directly to the ML containers, bypassing the hypervisor and host kernel. This guarantees true zero-copy RDMA capability. While SR-IOV sacrifices easy live migration and complicates network policy enforcement, it drops latency from ~50us to ~2us and avoids crippling host CPU bottlenecks, which is strictly necessary to saturate 400Gbps links during collective operations.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the slight bandwidth overhead of virtio.
    **The Rationale:** Candidates miss that virtio-net prevents hardware RDMA (RoCEv2) from functioning natively.
    **The Consequence:** Traffic is forced through the host CPU's TCP/IP stack, crippling performance and fundamentally breaking the high-speed fabric.
  napkin_math: |
    - **Fabric Bandwidth:** 4 × 400 Gbps = 1,600 Gbps (1.6 Tbps).
    - **TCP/IP Overhead:** ~1 host CPU core saturated per 10-20 Gbps of TCP throughput.
    - **Cores Required (Virtio):** 1,600 Gbps / 20 Gbps = 80 host CPU cores.
    - **Latency (Virtio/TCP):** ~50 µs per hop.
    - **Latency (SR-IOV/RDMA):** ~2 µs per hop (0 CPU cores used).
    - **Result:** **SR-IOV is mandatory to avoid consuming 80 CPU cores and to cut latency by 25x**.
