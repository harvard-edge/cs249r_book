title: The CapEx vs. TCO Fallacy
scenario: Your team plans to purchase a small, dedicated cluster of 10 H100 GPUs for fine-tuning experiments.
question: What is the estimated first-year TCO for 10 H100s including hardware ($30K/GPU) and 5% maintenance, and why is sticker price misleading?
details:
  realistic_solution: 'Total Cost of Ownership (TCO) is a more holistic financial metric than the initial purchase price because it includes both the one-time CapEx and the recurring OpEx. For the first year: sum the total cluster purchase price with the annual maintenance fee. The sticker price understates true cost in year one, and the gap widens each year as maintenance recurs.'
  common_mistake: |
    **The Pitfall:** Equating TCO with the upfront CapEx.
    **The Rationale:** Engineers focus only on the initial hardware purchase price and completely ignore recurring OpEx like maintenance, power, and cooling.
    **The Consequence:** Budgets are severely underestimated, leading to financial shortfalls when maintenance contracts or power bills come due.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 H100 GPUs.
       - Hardware CapEx: $30,000 per GPU.
       - Annual maintenance (OpEx): 5% of CapEx.
    2. **Calculations:**
       - Total CapEx: 10 * $30,000 = $300,000.
       - First-Year Maintenance: $300,000 * 0.05 = $15,000.
       - First-Year TCO: $300,000 + $15,000 = $315,000.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound. The true Year-1 cost is $315,000, demonstrating that failing to model OpEx leads to immediate budget shortfalls.**
  options:
  - $300,000
  - $301,500
  - $315,000
  - $330,000
  correct_index: 2
