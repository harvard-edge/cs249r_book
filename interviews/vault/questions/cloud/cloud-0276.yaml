title: The CapEx vs. TCO Fallacy
scenario: Your team plans to purchase a small, dedicated cluster of 10 H100 GPUs for fine-tuning experiments.
  Using the standard hardware constants, calculate the estimated first-year Total Cost of Ownership (TCO),
  focusing only on the initial hardware purchase (CapEx) and the annual maintenance costs. Explain why
  simply looking at the sticker price is misleading.
question: "What is the estimated first-year TCO for 10 H100s including hardware and 5% maintenance, and why is sticker price misleading?"
details:
  realistic_solution: 'Total Cost of Ownership (TCO) is a more holistic financial metric than the initial
    purchase price because it includes both the one-time CapEx and the recurring OpEx. For the first year:
    sum the total cluster purchase price with the annual maintenance fee. Using reasonable estimates ($30K
    per H100, 5% maintenance): first-year TCO ≈ $315,000 vs. $300,000 sticker price. The sticker price
    understates true cost in year one, and the gap widens each year as maintenance recurs.'
  common_mistake: The most common mistake is focusing only on the upfront hardware purchase price (Capital
    Expenditure or CapEx) and completely ignoring ongoing Operational Expenditures (OpEx). In reality,
    costs like maintenance, power, and cooling are significant and recurring, making the initial sticker
    price a poor indicator of the true long-term cost.
  napkin_math: '**Assumptions:** | H100 GPU server cost: $30,000 per GPU | Annual maintenance: 5% of CapEx
    | **CapEx (one-time):** | 10 GPUs × $30,000 = $300,000 | **Annual maintenance (OpEx):** | 5% × $300,000
    = $15,000/year | **First-year TCO (CapEx + maintenance only):** | $300,000 + $15,000 = $315,000 |
    **Why sticker price is misleading:** | Sticker price: $300,000 | Actual first-year cost: $315,000
    | Over 3 years: $300,000 + 3 × $15,000 = $345,000 | And this excludes power (~$0.10/kWh × 700W × 10
    GPUs × 8,760 hrs = ~$61,320/yr), cooling, rack space, networking, and staff — all of which can double
    the TCO.'
  options:
  - $300,000
  - $301,500
  - $315,000
  - $45,000
  correct_index: 2
