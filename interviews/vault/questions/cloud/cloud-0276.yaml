title: The CapEx vs. TCO Fallacy
scenario: Your team plans to purchase a small, dedicated cluster of 10 H100 GPUs for fine-tuning experiments.
question: What is the estimated first-year TCO for 10 H100s including hardware ($30K/GPU) and 5% maintenance, and why is sticker price misleading?
details:
  realistic_solution: Total Cost of Ownership (TCO) is a more holistic financial metric than the initial purchase price because it includes both the one-time CapEx and the recurring OpEx. For the first year: sum the total cluster purchase price with the annual maintenance fee. Using the estimates ($30K per H100, 5% maintenance): first-year TCO ≈ $315,000 vs. $300,000 sticker price. The sticker price understates true cost in year one, and the gap widens each year as maintenance recurs.
  common_mistake: |
    **The Pitfall:** Equating TCO with the upfront CapEx.
    **The Rationale:** Engineers focus only on the initial hardware purchase price and completely ignore recurring OpEx like maintenance, power, and cooling.
    **The Consequence:** Budgets are severely underestimated, leading to financial shortfalls when maintenance contracts or power bills come due.
  napkin_math: |
    1. **CapEx (one-time):** 10 GPUs × $30,000 = $300,000.
    2. **Annual Maintenance (OpEx):** 5% × $300,000 = $15,000/year.
    3. **First-Year TCO:** $300,000 + $15,000 = **$315,000.**
  options:
  - $300,000
  - $301,500
  - $315,000
  - $345,000
  correct_index: 2
