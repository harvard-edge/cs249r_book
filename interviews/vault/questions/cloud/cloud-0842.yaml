title: Evaluating Activation Checkpointing Trade-offs for LLMs
scenario: 'You are pre-training a 13B parameter Transformer LLM on a cluster of 80GB A100 GPUs. With a micro-batch size of 2, sequence length of 4096, and tensor parallelism of 4, profiling shows your per-GPU memory usage hits 105GB (resulting in an OOM error). You must evaluate the trade-offs between applying full activation checkpointing versus selective activation checkpointing.'
question: 'Should you use full or selective activation checkpointing to reduce the 105GB per-GPU footprint, and why?'
details:
  realistic_solution: 'Implement selective activation checkpointing by targeting only the attention core or specific large operations. This retains inexpensive but large activations in memory, reducing the recomputation overhead from ~33% down to ~15% while safely keeping total memory usage around 65GB (well under the 80GB A100 limit).'
  common_mistake: |
    **The Pitfall:** Assuming full activation checkpointing is optimal because it minimizes memory footprint to the absolute lowest bound.
    **The Rationale:** Candidates ignore the disproportionate compute overhead from recomputing memory-heavy but compute-light operations (dropout, layernorms).
    **The Consequence:** Training runs significantly slower than necessary due to a ~33% FLOP penalty instead of a ~15% penalty.
  napkin_math: |
    * Activations at b=2, s=4096, h=5120, L=40 = ~70GB without checkpointing. Total memory = 105GB > 80GB.
    * Full checkpointing drops activations to ~2GB but adds 1 extra forward pass (~33% total FLOP penalty).
    * Selective checkpointing retains ~15GB of activation memory (Total ~50GB < 80GB limit).
    * **Selective checkpointing slashes the FLOP penalty to ~15% while safely fitting within the 80GB budget.**
