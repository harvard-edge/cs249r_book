title: Evaluating Confidential Computing for LLM Deployments
scenario: You are designing the deployment architecture for a fine-tuned Llama-3-70B model (140GB in FP16)
  handling highly sensitive medical records. The model will run on instances with 8x H100 80GB GPUs. The
  CISO mandates that even the cloud provider's hypervisor administrators must not be able to dump the
  proprietary model weights or patient prompts from RAM. You must evaluate the performance trade-offs
  of enabling NVIDIA Confidential Computing (CC) with AMD SEV-SNP on the host VMs, specifically regarding
  PCIe transfer overhead versus inference token generation latency, ensuring P99 latency remains under
  200ms per token.
question: "Should you enable Confidential Computing for the 70B medical LLM, and will it keep p99 latency under 200ms/token?"
details:
  realistic_solution: Implement a Trusted Execution Environment (TEE) using hardware-level Confidential
    Computing. The PCIe encryption penalty primarily impacts the initial model loading phase, while token
    generation remains bounded by HBM throughput, which experiences negligible decryption overhead from
    the SMs.
  common_mistake: Assuming standard AES-256 disk encryption (data at rest) and TLS (data in transit) protects
    against a compromised host OS or hypervisor reading the 140GB of model weights directly from system
    or GPU RAM.
  napkin_math: Llama-3-70B is 140GB. Loading over standard PCIe Gen5 (64 GB/s) takes 140/64 = 2.2s. With
    CC PCIe bounce-buffer encryption overhead (e.g., 20% penalty), bandwidth drops to ~51 GB/s, increasing
    load time to 140/51 = 2.7s. Token generation uses internal HBM3 (3.35 TB/s per GPU). Even with a 5%
    TEE memory encryption penalty, effective HBM BW is ~3.18 TB/s. Auto-regressive generation of 1 token
    requires reading 140GB across 8 GPUs (17.5GB per GPU). Generation time per token = 17.5GB / 3.18 TB/s
    = ~5.5ms (compute negligible), well within the 200ms budget.
