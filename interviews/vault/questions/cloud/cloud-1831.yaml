title: Evaluating Confidential Computing for LLM Deployments
scenario: You are designing the deployment architecture for a fine-tuned Llama-3-70B model (140GB in FP16) handling highly sensitive medical records. The model will run on instances with 8x H100 80GB GPUs. The CISO mandates that even the hypervisor administrators must not be able to dump the model weights or prompts from RAM. You must evaluate the performance trade-offs of enabling Confidential Computing (CC) via PCIe transfer overhead vs inference token generation latency.
question: Should you enable Confidential Computing for the 70B medical LLM, and will it keep p99 latency under 200ms/token?
details:
  realistic_solution: Implement a Trusted Execution Environment (TEE) using hardware-level Confidential Computing. The PCIe encryption penalty primarily impacts the initial model loading phase, while token generation remains bounded by HBM throughput, which experiences negligible decryption overhead from the SMs.
  common_mistake: |
    **The Pitfall:** Assuming standard disk and transit encryption is sufficient.
    **The Rationale:** Engineers rely on AES-256 for data at rest and TLS for data in transit.
    **The Consequence:** This leaves the 140GB of model weights and sensitive prompts exposed in system or GPU RAM, vulnerable to a compromised host OS or hypervisor.
  napkin_math: |
    - **Model Size:** 140GB.
    - **Standard PCIe Gen5 Load Time:** 140GB / 64 GB/s = 2.2s.
    - **CC PCIe Overhead:** ~20% penalty -> 51 GB/s. New load time = 140GB / 51 GB/s = 2.7s.
    - **Effective HBM Bandwidth:** 3.35 TB/s with a ~5% TEE memory encryption penalty = ~3.18 TB/s.
    - **Per-GPU Memory Read:** 140GB / 8 GPUs = 17.5GB per GPU.
    - **Generation Time per Token:** 17.5GB / 3.18 TB/s = **~5.5ms**.
    - **Conclusion:** Compute overhead is negligible; ~5.5ms is well within the 200ms SLA.
