title: LLM Stateless Serving Database Bottleneck
scenario: 'An LLM-based customer support platform serves traffic using 50 worker pods (each with 1x A100
  80GB GPU). To maximize fault tolerance and simplify autoscaling, the system uses strict stateless serving:
  a Layer 7 load balancer distributes requests round-robin. Clients send a `session_id` and the latest
  message. Workers fetch the full conversation history from a central PostgreSQL database, run inference,
  and write the new turn back to the DB. At peak load (5,000 req/sec), p99 latency spikes from 800ms to
  over 6s, while GPU utilization drops to 25%. Database CPU hits 100%. Diagnose the architectural bottleneck
  and analyze why this stateless implementation fails to scale despite horizontally scaling the compute
  tier.'
details:
  realistic_solution: Offload session state to a high-throughput, low-latency KV store (e.g., Redis Cluster)
    or transition to stateful routing (sticky sessions) combined with KV cache sharing (e.g., vLLM's RadixAttention)
    to eliminate the relational DB bottleneck.
  common_mistake: Assuming the GPUs are bottlenecked by processing long context windows and suggesting
    adding more GPU worker pods, which actually exacerbates the database connection overhead and I/O contention.
  napkin_math: At 5,000 req/sec, fetching and updating an average 4,000-token history (~8KB) results in
    5,000 reads and 5,000 writes per second. This generates 10,000 IOPS and 80 MB/s of continuous row
    updates. Relational DBs suffer under high-concurrency BLOB churn, starving the 50x A100 GPUs which
    take only ~50ms to process the text context.
