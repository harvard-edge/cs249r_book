title: Optimizing Data Pruning for Large Language Model Training on AMD MI300X
scenario: Your team is training a colossal Large Language Model (LLM) on a cluster powered by AMD MI300X
  accelerators, each equipped with 192 GB HBM3 and offering 1,307 TFLOPS FP16 sparse compute and 5.3 TB/s
  memory bandwidth. You've identified that the vast, noisy training dataset (currently 100TB) is causing
  significant training bottlenecks and potentially leading to model collapse risks. You are tasked with
  implementing a data pruning strategy to improve training efficiency and model quality without sacrificing
  critical information. How would you approach identifying and implementing an effective data pruning
  strategy, considering the unique characteristics of the MI300X?
question: "How would you approach identifying and implementing an effective data pruning strategy, considering the unique characteristics of the MI300X?"
details:
  realistic_solution: Implement an active learning-based coreset selection or curriculum learning approach.
    This involves iteratively evaluating data points based on their novelty, uncertainty, or contribution
    to model convergence. For instance, using methods like GLUE (Gradient-based Least Uncertainty Estimation)
    or a simple diversity-based sampling (e.g., k-means clustering on feature embeddings) to select a
    representative subset. Crucially, the pruning mechanism should operate efficiently enough not to become
    the new bottleneck, potentially leveraging the MI300X's high HBM3 bandwidth for fast data access during
    evaluation steps, and be flexible enough to dynamically adjust the pruned set as the model learns.
    Pre-processing and embedding generation for selection should be carefully optimized, possibly leveraging
    the MI300X's FP16 sparse compute for these tasks.
  common_mistake: Applying naive data sampling or pruning techniques (e.g., random sampling, simple deduplication)
    without considering the intrinsic value or diversity of data points, potentially leading to the loss
    of rare but critical information, introducing biases, or even accelerating model collapse due to inadequate
    data coverage. Another common mistake is not considering the I/O bottleneck and memory constraints
    of the hardware when evaluating the impact of data size.
  napkin_math: Assume the 100TB raw dataset needs to be scanned to generate embeddings for coreset selection.
    If each data point (e.g., 1KB average) requires 10ms of CPU/GPU time for embedding generation, then
    100TB / 1KB = 10^11 data points. This would take 10^11 * 10ms = 10^12 ms = 10^9 seconds = ~31.7 years
    on a single core – highlighting the 'data wall problem'. This necessitates highly parallelized strategies
    using the MI300X's 1,307 TFLOPS FP16 sparse compute for rapid embedding generation or similarity search
    to prune the dataset down to a manageable size (e.g., 10TB) before full training. If we prune the
    dataset to 10% (10TB) and each MI300X has 192GB HBM3, then 10TB / 192GB ≈ 10240GB / 192GB ≈ 53.3 cards
    would theoretically be needed to hold the entire pruned dataset in HBM3. This indicates that even
    a pruned dataset might not fit entirely in HBM3 across a modest cluster, necessitating efficient data
    streaming, caching strategies, or further hierarchical pruning.
