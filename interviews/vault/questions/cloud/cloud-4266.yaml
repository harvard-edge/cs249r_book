title: APU Unified Memory and Zero-Copy Data Paths
scenario: An inference pipeline uses CPU preprocessing feeding into MI300X compute. A teammate proposes using unified memory to eliminate explicit CPU-GPU copies.
question: What are the performance implications of using unified memory on the MI300X APU compared to explicit memory copies?
details:
  realistic_solution: On MI300X APU configurations, CPU and GPU share HBM via Infinity Fabric with coherent access. For preprocessing data that fits in HBM (~192 GB), zero-copy works well if the access pattern is sequential. But CPU random access into GPU-mapped pages triggers page migration with ~10μs overhead per fault. Pin frequently-accessed preprocessing buffers to CPU-local DRAM and only move inference input batches to HBM explicitly.
  common_mistake: |
    **The Pitfall:** Believing unified memory eliminates all data movement physical costs.
    **The Rationale:** Candidates assume unified memory means zero-latency access, ignoring that data must still traverse the Infinity Fabric and page migrations incur overhead.
    **The Consequence:** Experiencing severe performance degradation due to page-fault-driven migration stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X Infinity Fabric BW: ~500 GB/s.
       - Page fault migration overhead: ~10 μs per 4KB page.
       - Batch size: 1 GB.
    2. **Calculations:**
       - Explicit HtoD via PCIe 5.0 (128 GB/s): 1 GB / 128 GB/s = ~7.8 ms.
       - Unified memory migration at 500 GB/s: 1 GB / 500 GB/s = 2.0 ms.
       - Worst-case page faults (4KB pages): 1 GB / 4 KB = 250,000 faults.
       - Page fault overhead: 250,000 * 10 μs = 2.5 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Migration-Bound**. Without prefetching, page-fault-driven unified memory access introduces a 2.5-second stall, far exceeding the 7.8 ms PCIe transfer time.
