title: The Pre-computation Trade-off
scenario: 'We are deploying a photo classification model. Running it in real-time on user upload costs us $10,000 a month in GPU compute.'
question: 'How do we reduce inference compute costs without losing model accuracy?'
details:
  realistic_solution: 'Shift from Dynamic (Real-time) to Static (Batch) inference. The reason batch inference is dramatically cheaper isn\'t just about amortizing GPU idle time — it\'s about arithmetic intensity. At batch=1, each forward pass loads the full model weights from HBM but performs very little compute per byte moved. At batch=256, the same weight load is reused across 256 inputs, pushing arithmetic intensity into the compute-bound regime. Run the model periodically on cheap spot instances with large batches, and store results in a fast key-value cache.'
  common_mistake: |
    **The Pitfall:** Suggesting INT8 quantization as the primary cost saver.
    **The Rationale:** Quantization is the most hyped inference optimization.
    **The Consequence:** Saving 50% via quantization while leaving a 3400% architectural savings on the table by ignoring arithmetic intensity and batching.
  napkin_math: |
    - **Batch=1 (Real-time):** Arithmetic intensity is ~1 Op/Byte (memory-bound, ~5% GPU utilization).
    - **Batch=256 (Offline):** Arithmetic intensity is ~200 Ops/Byte (compute-bound, ~70% GPU utilization).
    - **Utilization Gain:** 14× better utilization just from batching.
    - **Cost Comparison:** Real-time costs $1,440/month per GPU at ~10% average utilization. Batching overnight on spot instances costs $42/month at 70%+ utilization.
    - **Total Savings:** ~34× cost reduction.
