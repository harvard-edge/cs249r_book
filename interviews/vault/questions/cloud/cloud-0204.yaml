title: The Pre-computation Trade-off
scenario: We are deploying a photo classification model. Running it in real-time on user upload costs
  us $10,000 a month in GPU compute. How do we reduce costs without losing model accuracy?
question: "How do we reduce costs without losing model accuracy?"
details:
  realistic_solution: Shift from Dynamic (Real-time) to Static (Batch) inference. The reason batch inference
    is dramatically cheaper isn't just about amortizing GPU idle time — it's about arithmetic intensity.
    At batch=1, each forward pass loads the full model weights from HBM but performs very little compute
    per byte moved, placing the workload deep in the memory-bound regime of the Roofline. At batch=256,
    the same weight load is reused across 256 inputs, pushing arithmetic intensity above the ridge point
    into the compute-bound regime where the GPU's ALUs are fully saturated. Run the model periodically
    (e.g., overnight) on cheap spot instances with large batches, and store results in a fast key-value
    cache (Redis) for millisecond serving.
  common_mistake: '"Quantize the model to INT8 to halve the compute cost." Quantization helps, but there''s
    a 10x cheaper architectural change.'
  napkin_math: 'Batch=1 inference: arithmetic intensity ~1 Op/Byte (memory-bound, 5% GPU utilization).
    Batch=256 inference: arithmetic intensity ~200 Ops/Byte (compute-bound, 70% GPU utilization). Same
    model, same GPU — **14× better utilization** just from batching. Real-time: 1 GPU reserved 24/7 at
    $2/hr = $1,440/month at ~10% average utilization. Batch: same workload in 2 hours overnight on spot
    instances at $0.70/hr = $1.40/day = $42/month at 70%+ utilization. That''s a **34× cost reduction**.'
