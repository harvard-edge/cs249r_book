title: PUE Decomposition for Dense H100 Clusters
scenario: 'Your team is reviewing datacenter efficiency metrics for a 1,000-node H100 cluster. The facility reports a PUE of 1.4. Each 8xH100 node draws 8 kW IT load.'
question: "For the 1,000-node H100 cluster at PUE 1.4, what is the total facility power, non-IT overhead, and which PUE components dominate compared to traditional compute?"
details:
  realistic_solution: 'IT load = 1,000 nodes × 8 kW = 8 MW. Total facility power = 8 MW × 1.4 = 11.2 MW. Overhead = 11.2 - 8.0 = 3.2 MW. In GPU-dense clusters, cooling systems (chillers, CRAC/CRAH units, CDUs for liquid-cooled racks) typically represent 60-75% of the overhead versus ~45% in traditional compute. Power distribution losses (UPS, PDUs, transformers) are similar at 15-25%. Reducing PUE from 1.4 to 1.2 would save 1.6 MW of overhead, equivalent to running ~200 additional nodes.'
  common_mistake: |
    **The Pitfall:** Multiplying IT load by PUE to find overhead directly, or assuming cooling dominates equally in all facilities.
    **The Rationale:** Misunderstanding the PUE formula (Total Facility Power / IT Load) and failing to recognize the extreme heat density of GPU clusters.
    **The Consequence:** Incorrectly calculating power metrics and under-provisioning cooling systems.
  napkin_math: |
    1. IT Load: 1,000 * 8 kW = **8 MW**.
    2. Total Facility Power: 8 MW * 1.4 = **11.2 MW**.
    3. Overhead: 11.2 MW - 8.0 MW = **3.2 MW**.
    4. PUE 1.2 scenario Total = 8 * 1.2 = 9.6 MW. Savings = 11.2 - 9.6 = 1.6 MW.
    5. Equivalent nodes freed: 1,600 kW / 8 kW = **200 nodes**.
