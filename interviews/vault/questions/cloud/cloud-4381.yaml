title: PUE Decomposition for Dense H100 Clusters
scenario: 'Your team is reviewing datacenter efficiency metrics for a 1,000-node cluster. The facility reports a PUE of 1.4. Each node draws 8 kW IT load.'
question: 'For the 1,000-node cluster at PUE 1.4, what is the total facility power, non-IT overhead, and which PUE components dominate compared to traditional compute?'
details:
  realistic_solution: 'Total facility power is calculated directly via IT Load * PUE. In ultra-dense GPU clusters, cooling systems (CDUs, CRAH units) completely dominate the overhead (60-75%), dwarfing traditional CPU cluster metrics. Power distribution losses account for the remainder. Reducing PUE directly converts waste into massive compute capacity.'
  common_mistake: |
    **The Pitfall:** Multiplying IT load by PUE to find overhead directly, or assuming cooling dominates equally in all facilities.
    **The Rationale:** Misunderstanding the fundamental PUE formula (Total Facility Power / IT Load) and failing to recognize the extreme heat density of GPU clusters.
    **The Consequence:** Incorrectly calculating power metrics and severely under-provisioning liquid cooling infrastructure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,000 nodes, 8 kW/node. Facility PUE: 1.4.
    2. **Calculations:**
       - IT Load = 1,000 * 8 kW = 8 MW.
       - Total Facility Power = 8 MW * 1.4 = 11.2 MW.
       - Overhead = 11.2 MW - 8.0 MW = 3.2 MW.
       - PUE 1.2 scenario: 8 * 1.2 = 9.6 MW (1.6 MW savings).
    3. **Conclusion & Interpretation:**
       - **Result: Dropping PUE to 1.2 frees 1.6 MW of power, allowing for 200 additional nodes (Power-Bound).**
