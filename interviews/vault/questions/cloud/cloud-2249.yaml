title: Designing a Multi-Signal Data Quality Pipeline at Petabyte Scale
scenario: You must build a deterministic, reproducible scoring pipeline that processes 100 TB of raw web crawl (~200B tokens) per week. The score combines a quality classifier, a 1B parameter perplexity score, 15 heuristics, and deduplication. The research team wants to repeatedly ablate each signal by rerunning the pipeline with different scoring weights.
question: "How would you design a 100 TB/week quality-scoring pipeline that supports cheap, rapid signal-weight ablations?"
details:
  realistic_solution: 'Use a columnar, append-only architecture with signal decomposition. Phase 1 (Signal Computation): Run all scorers once, writing individual score columns to a Parquet table keyed by doc_id. Phase 2 (Score Composition): Read only the pre-computed score columns (not the raw text) and apply weighted combinations. Ablation runs complete in minutes because they only read ~20 GB of score columns instead of 100 TB of raw text.'
  common_mistake: |
    **The Pitfall:** Computing everything in a single monolithic Spark job that reads raw data, runs all scorers, and outputs a final composite score.
    **The Rationale:** It seems like the simplest end-to-end data engineering architecture.
    **The Consequence:** A single weight change forces re-running the entire 100 TB pipeline, including the astronomically expensive 1B parameter perplexity inference over 200B tokens.
  napkin_math: |
    - **Phase 1 Perplexity Cost:** 64 A100s at 10K tok/s per GPU = 640K tok/s.
    - **Phase 1 Processing Time:** 200B tokens / 640K tok/s ≈ 312,500 seconds ≈ 3.6 days. Cost is ~$16,500 per crawl.
    - **Phase 2 (Ablation):** Read 20 GB score table, apply weights, write output.
    - **Phase 2 Cost:** ~$0.50 per ablation on a single node.
    - **Conclusion:** **100 ablation experiments cost $50 using the decomposed architecture, compared to ~$1.7M if rerunning Phase 1.**
