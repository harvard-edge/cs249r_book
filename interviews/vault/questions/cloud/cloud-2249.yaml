title: Designing a Multi-Signal Data Quality Pipeline at Petabyte Scale
scenario: 'You are the tech lead for the data team at an LLM lab. Your task: build a reusable data quality
  scoring pipeline that processes 100 TB of raw web crawl per week and assigns a composite quality score
  to each document. The score must combine: (1) a learned quality classifier, (2) a perplexity score from
  a 1B parameter reference LM, (3) 15 heuristic signals (repetition ratio, boilerplate fraction, toxic
  content score, etc.), and (4) a deduplication flag. The pipeline must be deterministic (same input always
  produces same output) and fully reproducible. The research team wants to ablate each quality signal
  by rerunning the pipeline with different scoring weights. Design the distributed systems architecture.'
question: "How would you design a deterministic, reproducible 100 TB/week quality-scoring pipeline that supports cheap signal-weight ablations?"
details:
  realistic_solution: 'Use a columnar, append-only architecture with signal decomposition. Phase 1 — Signal
    Computation (run once per crawl): (a) Heuristic signals: embarrassingly parallel Spark job, ~100 TB/hour
    on 500 nodes. Write 15 score columns to a Parquet table keyed by doc_id. (b) Quality classifier: batch
    inference on CPU cluster, ~50 TB/hour. Write classifier_score column. (c) Perplexity scoring: batch
    inference on GPU cluster (1B model, ~10K tokens/sec per GPU). 100 TB ≈ 200B tokens. On 64 A100s: ~200B
    / (64 × 10K) = 312,500 seconds ≈ 3.6 days. Write perplexity column. (d) Deduplication: MinHash LSH
    pipeline. Write dedup_flag and cluster_id columns. Phase 2 — Score Composition (run per experiment):
    Read only the pre-computed score columns (not the raw text). Apply weighted combination: final_score
    = w1 × classifier + w2 × (1/perplexity) + w3 × heuristic_composite + w4 × dedup_penalty. This reads
    ~20 GB of score columns instead of 100 TB of raw text. Ablation runs complete in minutes. All columns
    are versioned with the pipeline git hash for reproducibility. The architecture is essentially a feature
    store for data quality signals.'
  common_mistake: '"Compute everything in a single monolithic Spark job that reads the raw data, runs
    all scorers, and writes the output." This fails the ablation requirement — changing one weight forces
    re-running every signal computation, including the expensive LM perplexity inference.'
  napkin_math: 'Phase 1 total compute cost: Heuristics (500 CPU nodes × 2 hours × $0.10/hr) = $100. Classifier
    (500 CPU nodes × 2 hours × $0.10/hr) = $100. Perplexity (64 A100s × 86 hours × $3/hr) = $16,500. Dedup
    (500 nodes × 4 hours × $0.10/hr) = $200. Total: ~$17K per crawl. Phase 2 per ablation: read 20 GB
    score table, apply weights, write 5 GB output. Cost: $0.50 on a single node. 100 ablation experiments:
    $50 vs re-running Phase 1 each time: $1.7M. The decomposed architecture saves 34,000× in ablation
    cost.'
  options:
  - 'INT8 quantization for serving reduces model size by 2x (FP16→INT8) and can increase decode throughput
    by ~2x for memory-bandwidth-bound workloads. Per-channel weight quantization + per-token activation
    quantization (W8A8) preserves most accuracy. SmoothQuant addresses the activation outlier problem
    by mathematically migrating quantization difficulty from activations to weights. Typical perplexity
    degradation: <0.5% for well-calibrated INT8.'
  - INT8 quantization doubles compute throughput by using INT8 Tensor Cores which have 2x the TFLOPS of
    FP16 Tensor Cores; the memory savings are a secondary benefit
  - INT8 quantization requires retraining the model with quantization-aware training (QAT) from scratch;
    post-training quantization (PTQ) to INT8 always produces unacceptable accuracy loss (>5% degradation)
  - INT8 quantization only benefits the attention computation because matrix multiplications in the FFN
    layers cannot be quantized without destroying model quality
