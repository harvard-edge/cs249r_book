title: 'Expert Choice Routing: Inverting the Selection'
scenario: In standard MoE, tokens choose experts (top-k). In Expert Choice routing, experts independently select their top-k tokens from the batch.
question: How do Token Choice and Expert Choice routing compare on load balancing, token drops, and adaptive expert computation per token?
details:
  realistic_solution: 'Token Choice (standard): Each token selects top-k experts. Problem: popular experts overflow (token dropping), unpopular experts underflow (wasted capacity). Needs capacity factor + load-balancing loss. Expert Choice: Each expert independently selects its top-k tokens based on router scores. Benefits: (1) Perfect load balance by construction — every expert processes exactly k tokens. (2) No capacity factor needed. (3) Important tokens (high router scores) can be selected by many experts, receiving more computation — an adaptive compute mechanism. Drawbacks: (1) Some tokens may be selected by zero experts (especially in small batches) — a different kind of ''dropping.'' (2) Cannot be used autoregressively (future tokens aren''t available for expert selection). (3) Variable computation per token makes latency unpredictable for inference. (4) Token-level parallelism is harder — different tokens receive different amounts of compute, complicating batched execution. Expert Choice excels for training (all tokens available) but is impractical for autoregressive inference.'
  common_mistake: |
    **The Pitfall:** Thinking Expert Choice eliminates the need for load-balancing mechanisms entirely without trade-offs.
    **The Rationale:** Assuming perfect expert capacity utilization means all tokens are processed optimally.
    **The Consequence:** Ignoring the reality that in Expert Choice, some tokens may be selected by zero experts (dropped entirely), requiring workarounds.
  napkin_math: |
    - **Token Choice:** 256 tokens × top-2 = 512 assignments across 8 experts.
    - Expected per expert: 64. Variance leads to overflow drops (~5% of assignments at capacity factor 1.25).
    - **Expert Choice:** Each of the 8 experts picks exactly 64 tokens.
    - While total assignments = 512 (covering 256 tokens × 2 on average), individual tokens may receive 0, 1, 2, or up to 8 expert assignments based on their routing scores.
    - **This creates perfect hardware load balance but highly variable compute-per-token.**
