title: H100 Distributed Checkpointing
scenario: Training a 175B parameter model on a cluster of 1024 H100 GPUs experiences
  a hardware failure every few hours.
question: Apply a distributed checkpointing strategy to minimize the time spent stalling
  the GPUs while saving model state.
details:
  realistic_solution: Implement asynchronous, tiered checkpointing. Each rank synchronously
    writes its local partition of optimizer state to local NVMe or CPU RAM in seconds.
    A background CPU process then slowly flushes these local snapshots to persistent
    cloud object storage, allowing the H100s to resume training almost immediately.
  common_mistake: Performing synchronous, blocking global writes to an S3 bucket,
    leaving 1024 GPUs idle for minutes at a time.
  napkin_math: 1024 GPUs waiting 5 minutes costs roughly $300 in wasted compute.
