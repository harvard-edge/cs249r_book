title: Optimizing LLM Deployment with Structured Sparsity on Google TPU v5e
scenario: Your team is deploying a 25 GB LLM for real-time inference on a single TPU v5e, but it exceeds HBM capacity and exhibits unacceptable latency. Unstructured pruning reduces the model to 8 GB with minimal accuracy drop, but profiling shows negligible latency reduction due to poor systolic array utilization.
question: How would you change from unstructured to structured pruning on TPU v5e to reach 2x speedup, and what utilization gains would you target?
details:
  realistic_solution: The solution involves shifting from unstructured to structured pruning, such as block sparsity (e.g., 2:4 or 4:8 block patterns), filter pruning, or channel pruning, which aligns with the TPU v5e's systolic array architecture. This allows the TPU to execute remaining operations efficiently, potentially by converting sparse matrices to denser, smaller effective matrices. The process would include retraining the model with the chosen structured sparsity pattern, often requiring sparsity-aware training techniques (e.g., Group Lasso for structured pruning) to regain accuracy. The aim is to create predictable, hardware-friendly sparsity patterns that enable efficient data loading and computation on the TPU's specialized units.
  common_mistake: |
    **The Pitfall:** Naively applying unstructured pruning without understanding the hardware's preference for dense matrix multiplication.
    **The Rationale:** It's assumed that fewer parameters automatically equals less compute and faster execution.
    **The Consequence:** Creating a "sparse but slow" model where scattered memory accesses destroy systolic array utilization, yielding no wall-clock speedup.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original dense utilization: 10% (19.7 TFLOPS).
       - Unstructured pruning removes 50% FLOPs but destroys memory access patterns.
    2. **Calculations:**
       - Dense Time = FLOPs / 19.7T.
       - Unstructured Utilization drops to 5% (9.85 TFLOPS).
       - Unstructured Time = (0.5 × FLOPs) / 9.85T = FLOPs / 19.7T (1x speedup).
       - Structured 50% sparsity (2:4) halves FLOPs and maintains dense-like hardware utilization.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Structured sparsity maintains the original 10% utilization (19.7 TFLOPS) while executing half the operations, achieving the desired 2x speedup.
