title: Optimizing LLM Deployment with Structured Sparsity on Google TPU v5e
scenario: Your team is deploying a large language model (LLM) for real-time inference on a Google TPU v5e, which has 16 GB HBM, 197 TFLOPS BF16 peak performance, and 1.6 TB/s memory bandwidth. The original dense model is 25 GB, exceeding the HBM capacity, and its latency is unacceptable. You've decided to apply pruning. After initial experiments, unstructured pruning reduces the model size to 8 GB with minimal accuracy drop, but on-device profiling shows negligible latency reduction, largely due to poor utilization of the TPU's systolic array for sparse operations. Your goal is to achieve a 2x inference speedup while maintaining acceptable accuracy. How would you adjust your pruning strategy (structured vs. unstructured, sparsity patterns) to effectively leverage the TPU v5e's architecture to meet the 2x speedup target, considering its HBM, TFLOPS, and bandwidth constraints? Quantify the expected effective TFLOPS or memory bandwidth utilization improvement you'd target with your revised strategy.
question: How would you change from unstructured to structured pruning on TPU v5e to reach 2x speedup, and what utilization gains would you target?
details:
  realistic_solution: The solution involves shifting from unstructured to structured pruning, such as block sparsity (e.g., 2:4 or 4:8 block patterns), filter pruning, or channel pruning, which aligns with the TPU v5e's systolic array architecture. This allows the TPU to execute remaining operations efficiently, potentially by converting sparse matrices to denser, smaller effective matrices. The process would include retraining the model with the chosen structured sparsity pattern, often requiring sparsity-aware training techniques (e.g., Group Lasso for structured pruning) to regain accuracy. The aim is to create predictable, hardware-friendly sparsity patterns that enable efficient data loading and computation on the TPU's specialized units.
  common_mistake: Naively applying unstructured pruning without understanding the hardware's preference for dense or structured operations, leading to memory-bound or underutilized compute units on specialized accelerators like TPUs. This often results in a 'sparse but slow' outcome where theoretical FLOPs reduction doesn't translate to wall-clock speedup due to inefficient hardware mapping and scattered memory accesses.
  napkin_math: "To achieve a 2x inference speedup, we must process the same model in half the time. Assume the original dense model achieved ~10% hardware utilization (19.7 TFLOPS), meaning Time_dense = FLOPs / 19.7T. The failure of unstructured pruning was that its random memory access dropped utilization so far (e.g., to 5%, or 9.85 TFLOPS) that the 50% FLOP reduction was perfectly offset (0.5 * FLOPs / 9.85T = FLOPs / 19.7T), resulting in negligible latency reduction. Structured 50% block sparsity (e.g., 2:4) cuts the required FLOPs in half (0.5 * FLOPs) while remaining hardware-friendly. To halve the execution time compared to dense, we need Time_sparse = (0.5 * FLOPs) / Actual_TFLOPS = 0.5 * (FLOPs / 19.7T). Thus, Actual_TFLOPS only needs to be 19.7 TFLOPS (10% utilization of the TPU) to achieve a 2x speedup. If structured sparsity maps well to the systolic array and hits 20% utilization (39.4 TFLOPS), the speedup would be 4x."
