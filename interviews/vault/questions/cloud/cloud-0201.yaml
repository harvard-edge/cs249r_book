title: The Tokenizer Mismatch
scenario: Your team fine-tuned a 7B model and deployed it to production. The weights are identical, but the serving cluster is suddenly OOMing under load, and the KV-cache is filling up 30% faster than expected for the exact same text inputs.
question: Why does a tokenizer version mismatch cause a massive GPU memory leak, and how does it destroy your serving economics?
details:
  realistic_solution: The serving pipeline is using an older or different tokenizer than training. If the training pipeline used `tokenizer_v2` (which maps "machine learning" → tokens [4521, 3892], 2 tokens) but the serving pipeline loads `tokenizer_v1` (which maps "machine learning" → [4521, 12, 3892, 44], 4 tokens), the exact same input text produces a longer sequence of token IDs. Because KV-cache memory scales linearly with sequence length, a less efficient tokenizer artificially inflates the memory footprint of every request. The model isn't just producing worse answers; it's physically consuming more VRAM per word of text, causing the batch scheduler to OOM or reject requests much earlier than expected.
  common_mistake: |
    **The Pitfall:** Blaming the memory leak on Python code or serving framework allocations.
    **The Rationale:** Candidates fail to connect the relationship between text, tokens, and physical hardware memory footprint (KV-cache).
    **The Consequence:** Days wasted debugging memory profilers instead of simply checking the tokenizer configuration, leading to scaling out the GPU cluster unnecessarily.
  napkin_math: |
    1. Assume a 1,000-word prompt.
    2. V2 Tokenizer (optimized): 1.1 tokens/word = 1,100 tokens.
    3. V1 Tokenizer (naive): 1.5 tokens/word = 1,500 tokens (36% longer sequence).
    4. KV-cache size: ~1 MB per token (for 7B model).
    5. V2 memory: 1.1 GB per request.
    6. V1 memory: 1.5 GB per request.
    7. For a batch of 64 requests, V1 wastes 25.6 GB of HBM storing inefficiently tokenized text.
    8. **Result: Maximum concurrent requests drop by 30%, drastically reducing QPS per GPU.**
