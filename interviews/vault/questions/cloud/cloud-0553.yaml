title: The Roofline Shift
scenario: We upgraded our serving fleet from A100s to H100s. The H100 has 3x more FP16 TFLOPS. However, our LLM decode throughput only got ~67% faster instead of 3x.
question: How is that physically possible?
details:
  realistic_solution: The ridge point of the Roofline shifted right. Your workload was already memory-bandwidth bound on the A100. Because LLM decoding is bandwidth-starved, faster ALUs cannot do any additional work, and performance scales exactly with the increase in memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming that a 3x increase in compute (TFLOPS) will yield a 3x increase in performance for all workloads.
    **The Rationale:** Engineers often ignore the Roofline model and the memory-bandwidth bottleneck inherent to LLM decode operations.
    **The Consequence:** Massive overspending on compute hardware that cannot be fully utilized due to memory constraints.
  napkin_math: |
    1. **Calculate A100 Ridge Point:** 312 TFLOPS / 2 TB/s ≈ 156 Ops/Byte.
    2. **Calculate H100 Ridge Point:** 989 TFLOPS / 3.35 TB/s ≈ 295 Ops/Byte.
    3. **Evaluate LLM Decode Intensity:** LLM decode has an arithmetic intensity ≈ 1 Ops/Byte, deep in the memory-bandwidth ceiling.
    4. **Calculate Bandwidth Scaling:** H100 bandwidth (3.35 TB/s) is ~1.67x of A100 (2.0 TB/s).
    **Final Result: Throughput scales exactly with bandwidth (67%), not FLOPS (300%).**
