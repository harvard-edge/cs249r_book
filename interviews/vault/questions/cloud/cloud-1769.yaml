title: Evaluate QAT for LLM Serving
scenario: You are tasked with serving a 7B parameter transformer model on a single NVIDIA A10G (24GB VRAM). The FP16 model consumes 14GB for weights. Post-Training Quantization (PTQ) to INT8 causes an unacceptable 1.5% accuracy drop. You must evaluate implementing Quantization-Aware Training (QAT) to INT8 to recover accuracy.
question: "Why would INT8 QAT recover accuracy where PTQ failed for the 7B model, and what serving gains should you expect over FP16?"
details:
  realistic_solution: Implement QAT by fine-tuning the pre-trained FP16 checkpoint with FakeQuantize nodes (simulating INT8 truncation) using the Straight-Through Estimator (STE) for gradients. QAT recovers accuracy by co-adapting weights to absorb the simulated rounding noise, whereas PTQ statically clips weights post-hoc. The INT8 model reduces weight footprint to 7GB, freeing 17GB for KV cache (vs 10GB for FP16), enabling significantly higher concurrency.
  common_mistake: |
    **The Pitfall:** Assuming QAT requires a full from-scratch training run.
    **The Rationale:** Candidates confuse Quantization-Aware "Training" with "Pre-training," overestimating the required compute.
    **The Consequence:** Teams abandon QAT due to perceived impossible compute budgets, settling for inferior accuracy or overly expensive FP16 hardware.
  napkin_math: |
    1. **Weight read time (FP16):** 14GB / 600 GB/s = 23.3ms.
    2. **Weight read time (INT8):** 7GB / 600 GB/s = 11.6ms (**2x speedup**).
    3. **KV Cache capacity (FP16):** 24GB total - 14GB weights = 10GB available.
    4. **KV Cache capacity (INT8):** 24GB total - 7GB weights = 17GB available.
    5. **Result:** A **70% increase** in max concurrent batch size capability.
