title: Evaluate QAT for LLM Serving
scenario: You are tasked with serving a 7B parameter transformer model on a single NVIDIA A10G (24GB VRAM).
  The FP16 model consumes 14GB for weights. Post-Training Quantization (PTQ) to INT8 causes an unacceptable
  1.5% accuracy drop. You must evaluate implementing Quantization-Aware Training (QAT) to INT8 to recover
  accuracy. Justify why QAT succeeds where PTQ fails, analyze the required training pipeline modifications,
  and quantify the expected serving improvements over the FP16 baseline.
details:
  realistic_solution: Implement QAT by fine-tuning the pre-trained FP16 checkpoint with FakeQuantize nodes
    (simulating INT8 truncation) using the Straight-Through Estimator (STE) for gradients. Fine-tuning
    typically requires only 1-5% of the original training steps. QAT recovers accuracy by co-adapting
    weights to absorb the simulated rounding noise. During export, FakeQuantize nodes are converted to
    native INT8 instructions. The INT8 model reduces weight footprint to 7GB, freeing 17GB for KV cache
    (vs 10GB for FP16), enabling significantly higher concurrency.
  common_mistake: Failing to explain that QAT inserts FakeQuantize nodes into the forward pass during
    training to simulate quantization noise, allowing the network to adapt its weights, whereas PTQ statically
    clips weights post-hoc. Candidates also frequently and incorrectly assume QAT requires a full from-scratch
    training run.
  napkin_math: 'FP16 weight read time per token (memory-bound, batch=1): 14GB / 600 GB/s (A10G bandwidth)
    = 23.3ms. INT8 weight read time: 7GB / 600 GB/s = 11.6ms (2x speedup). Max KV cache capacity increases
    from 10GB (24-14) to 17GB (24-7), yielding a 70% increase in max concurrent batch size.'
