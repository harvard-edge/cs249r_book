title: 'Dataset Curation: Mastery — End-to-End Pre-Training Data Strategy for 100B Model'
scenario: You are designing the data strategy for a 100B parameter LLM to be trained on 512 GPUs for 3 months. The model must excel at code, math, and instruction following.
question: What complete data curation strategy (sourcing, filtering, deduplication, mixing) is required, and what throughput must the pipeline sustain?
details:
  realistic_solution: 'Source: 10T raw tokens (web 70%, code 15%, math 5%, books 7%, instructions 3%). Filter: language ID (keep 6 languages) -> heuristic (65% pass) -> KenLM perplexity < 300 (70% pass) -> MinHash dedup (75% pass). Final: ~3.4T unique tokens. Chinchilla for 100B model: 2T tokens optimal. Mix with quality weighting: code/math 3x. Pipeline must sustain 512 H100s training at 35% MFU.'
  common_mistake: |
    **The Pitfall:** Under-investing in data quality scaling compared to model architecture scaling.
    **The Rationale:** Assuming that simply dumping petabytes of raw text into a dataloader will yield an intelligent model.
    **The Consequence:** The model memorizes garbage data, and the data loading pipeline throttles the expensive 512-GPU cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 512 GPUs at 35% MFU (~177,200 TFLOPS).
       - Model: 100B params (~6 FLOPs/token). Training duration: 3 months.
    2. **Calculations:**
       - Processing rate: 177,200 TFLOPS / 600 GFLOPs = ~295,000 tokens/sec.
       - Total tokens: 3 months (7.77M seconds) * 295K tokens/s = ~2.3 Trillion tokens.
       - Dataloader throughput: 295,000 * 4 bytes = 1.18 MB/s.
    3. **Conclusion & Interpretation:**
       **Result: Data-Scale Bound.** The runtime pipeline throughput (1.18 MB/s) is trivial, but the offline curation phase must source and filter over 10T raw tokens to output 2.3T high-quality unique tokens.
