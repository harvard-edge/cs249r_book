title: 'Dataset Curation: Mastery — End-to-End Pre-Training Data Strategy for 100B
  Model'
scenario: 'You are the ML lead responsible for data strategy for a 100B parameter
  LLM to be trained on 512 H100s (80GB HBM3, 3.35 TB/s) for 3 months. The model must
  excel at code, math, and instruction following. Design the complete data curation
  strategy: sourcing, quality filtering, deduplication, mixing, and versioning. Quantify
  every decision.'
question: What complete data curation strategy should you use for the 100B model on
  512 H100s, including sourcing, filtering, deduplication, mixing, and versioning?
details:
  realistic_solution: 'Source: 10T raw tokens (web 70%, code 15%, math 5%, books 7%,
    instructions 3%). Filter: language ID (keep 6 languages) -> heuristic (65% pass)
    -> KenLM perplexity < 300 (70% pass) -> MinHash dedup (75% pass). Final: ~3.4T unique
    tokens. Chinchilla for 100B model: 2T tokens optimal. Mix with quality weighting:
    code/math 3x. Pipeline must sustain 512 H100s training at 35% MFU.'
  common_mistake: Under-investing in data quality vs model architecture; not versioning
    datasets; not monitoring data pipeline throughput vs training throughput.
  napkin_math: '512 H100s at 35% MFU: 512 x 989 TFLOPS x 0.35 = 177,228.8 TFLOPS.
    100B model, 6 FLOPs/token: tokens/sec = 177,228.8T / (6 x 100B) = 177,228.8T /
    600B = 295,381 tokens/sec. Over 3 months = 90 days x 86,400s = 7.776M seconds x
    295,381 tokens/s = 2.30T tokens. Data pipeline must sustain 295K tokens/sec = 1.18MB/s
    (at 4 bytes/token) — trivially achievable with NFS. Budget: 512 x $3/hr x 2,160hr
    = $3.32M compute.'
