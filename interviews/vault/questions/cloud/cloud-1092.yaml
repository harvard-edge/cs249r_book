title: Optimizing S3 Throughput with Data Sharding
scenario: You are training a distributed vision model on an 8x A100 GPU node. The training loop consumes 4,000 images per second. The dataset consists of 50 million individual 100KB JPEG images stored in an AWS S3 bucket. S3 provides a time-to-first-byte (TTFB) latency of 50ms per GET request, but the EC2 instance has a 10 GB/s network bandwidth capacity. Currently, the I/O pipeline is severely bottlenecking the GPUs.
question: What single-thread throughput do 100KB S3 reads achieve versus 500MB shards, and how does sharding fix the bottleneck?
details:
  realistic_solution: Pack the individual 100KB images into large, uncompressed sequential shards (e.g., 500MB TFRecord or WebDataset tar files). This amortizes the 50ms TTFB over a massively larger payload, allowing the storage system to stream data sequentially and saturate the instance's 10 GB/s network bandwidth.
  common_mistake: |
    **The Pitfall:** Attempting to solve the small-file bottleneck by massively scaling up the number of prefetch worker threads.
    **The Rationale:** Candidates think more threads equal more throughput, without understanding that S3 has strict API rate limits (e.g., 5,500 GETs/second per prefix).
    **The Consequence:** The system hits S3 API rate limits and suffers from massive CPU context-switching overhead without fixing the poor latency-to-bandwidth ratio.
  napkin_math: |
    1. **Individual file (100KB) Transfer time:** 0.1 MB / 10,000 MB/s = 0.00001s.
    2. **Total time per file:** 50ms TTFB + 0.01ms = ~50ms.
    3. **Single-thread throughput:** 0.1 MB / 0.05s = 2 MB/s.
    4. **500MB Shard Transfer time:** 500 MB / 10,000 MB/s = 50ms.
    5. **Total time per shard:** 50ms TTFB + 50ms transfer = 100ms.
    6. **Single-thread throughput:** 500 MB / 0.1s = 5,000 MB/s (5 GB/s).
    7. **Conclusion:** **Sharding amortizes the TTFB penalty, yielding a 2,500x improvement in throughput per thread.**
