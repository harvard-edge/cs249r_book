title: Optimizing S3 Throughput with Data Sharding
scenario: You are training a distributed vision model on an 8x A100 GPU node. The training loop consumes
  4,000 images per second. The dataset consists of 50 million individual 100KB JPEG images stored in an
  AWS S3 bucket. Currently, the I/O pipeline is severely bottlenecking the GPUs. S3 provides a time-to-first-byte
  (TTFB) latency of 50ms per GET request, but the EC2 instance has a 10 GB/s network bandwidth capacity.
  Calculate the single-thread throughput for individual file reads versus reading 500MB contiguous data
  shards, and determine how sharding resolves the I/O bottleneck.
details:
  realistic_solution: Pack the individual 100KB images into large, uncompressed sequential shards (e.g.,
    500MB TFRecord or WebDataset tar files). This amortizes the 50ms TTFB over a massively larger payload,
    allowing the storage system to stream data sequentially and saturate the instance's 10 GB/s network
    bandwidth.
  common_mistake: Attempting to solve the small-file bottleneck by massively scaling up the number of
    prefetch worker threads, which inevitably hits S3 API rate limits (e.g., 5,500 GETs/second per prefix)
    and CPU context-switching overhead without fixing the poor latency-to-bandwidth ratio.
  napkin_math: 'Individual file (100KB): 50ms TTFB + (0.1MB / 10,000 MB/s transfer) ≈ 50ms total. Single-thread
    throughput = 0.1MB / 0.05s = 2 MB/s.

    500MB Shard: 50ms TTFB + (500MB / 10,000 MB/s transfer) = 50ms + 50ms = 100ms total. Single-thread
    throughput = 500MB / 0.1s = 5,000 MB/s (5 GB/s).

    Result: Sharding yields a 2,500x improvement in throughput per thread.'
