title: Energy-Efficient LLM Inference on AMD MI300X Cluster
scenario: You are designing an inference serving system for an LLM on an AMD MI300X cluster. Your goal is to maximize the energy efficiency while meeting a target throughput of X tokens/second and maintaining an end-to-end latency constraint of Y milliseconds.
question: "How would you optimize tokens per Joule while meeting throughput and latency targets using TDP, power caps, DVFS, and P≈CV²f?"
details:
  realistic_solution: 'Systematically experiment with various DVFS P-states and programmable power caps to find the sweet spot for energy efficiency. Utilize insights from P ≈ CV²f to reason about voltage scaling: reducing voltage has a quadratic impact on power but only a linear impact on frequency. Implement kernel fusion and sparse compute techniques. Size the cluster based on "tokens per Joule" metrics rather than peak TFLOPS, keeping thermal throttling limits in mind.'
  common_mistake: |
    **The Pitfall:** Focusing solely on maximizing raw TFLOPS throughput.
    **The Rationale:** Engineers assume peak performance always yields the best return on capital.
    **The Consequence:** Pushing hardware to its TDP limits enters the highly inefficient top-end of the V/f curve, drastically worsening energy efficiency and increasing operational cooling costs.
  napkin_math: |
    1. **Assumptions & Constraints:** Baseline 700W (1000 tokens/s), capped 500W (900 tokens/s).
    2. **Calculations:** Baseline energy = 700 / 1000 = 0.70 J/token. Capped energy = 500 / 900 = 0.55 J/token.
    3. **Conclusion & Interpretation:** **Result: Power-Bound.** A 28% reduction in power yields only a 10% drop in throughput, vastly improving energy efficiency.
