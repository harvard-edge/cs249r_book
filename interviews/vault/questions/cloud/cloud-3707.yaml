title: FP8 vs INT8 Quantization Throughput on H100 for Training
scenario: A team is training a 7B transformer and wants to use FP8 mixed precision. The model has weight gradients with dynamic range spanning 1e-7 to 1e3.
question: Which FP8 formats should you use for forward and backward passes of the 7B transformer given gradients spanning 1e-7 to 1e3?
details:
  realistic_solution: 'E4M3 (4-bit exp, 3-bit mantissa): range ±448, useful for weights and activations in forward pass. E5M2 (5-bit exp, 2-bit mantissa): range ±57344, better for gradients. Recommended: forward pass uses E4M3 for QKV and FFN weights, E5M2 for activations. Backward pass uses E5M2 for gradients. Master weights kept in FP32. The dynamic loss scaling used in FP16 training is still needed for FP8 gradient accumulation. With proper format selection: ~2× memory vs FP16 training = same as INT8 but with gradient stability.'
  common_mistake: |
    **The Pitfall:** Using E4M3 for gradient accumulation.
    **The Rationale:** E4M3 has only 3 mantissa bits and limited exponent range (±448).
    **The Consequence:** Causes gradient underflow and saturation during backward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - E4M3 max value: 448
       - E5M2 max value: 57344
       - Gradient dynamic range: 1e-7 to 1e3
    2. **Calculations:**
       - E4M3 saturates at 448 < 1000 (1e3)
       - E5M2 handles up to 57344 > 1000 (1e3)
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound (FP8 training ≈ 56GB for 7B vs 112GB for BF16).**
