title: Optimizing Tail Latency for Real-time ML Inference on Google TPU v5e
scenario: A real-time ML inference service using a single Google TPU v5e provides an average latency of 5ms, but P99 latencies reach 500ms due to straggler tasks, violating the 100ms P99 SLA. You are evaluating a multi-TPU architecture to mitigate these tail latencies.
question: What multi-TPU v5e architecture reduces stragglers to meet a 100ms P99 SLA, and how does it compare mathematically to a single TPU?
details:
  realistic_solution: 'For Architecture A, immediate mitigations might include aggressive micro-batching tuned for the TPU''s memory bandwidth, optimizing the inference graph for fewer operations, and ensuring data locality. For Architecture B, a realistic solution would involve implementing a hedged request pattern: sending the same inference request to two (or more) independent TPU v5e instances simultaneously and using the result from the first one that responds. This significantly reduces the probability of a single straggler delaying the overall request. Other strategies could include dynamic load balancing that monitors individual TPU health and latency, or proactive straggler detection and re-routing. These solutions require careful consideration of additional computational cost, network overhead, and complexity in the client and server-side request handling.'
  common_mistake: |
    **The Pitfall:** Optimizing solely for average latency while neglecting the tail.
    **The Rationale:** Candidates assume that improving mean performance will automatically fix P99 latency, underestimating the unpredictable nature of resource contention in shared clouds.
    **The Consequence:** Failing to meet strict SLAs and providing a poor user experience for a significant percentage of requests.
  napkin_math: |
    1. A single TPU has a 1% chance (P99) of becoming a 500ms straggler for any given request.
    2. Architecture B uses a hedged request pattern: send the same request to two independent TPUs and take the first response.
    3. Assuming independence, the probability that BOTH TPUs become stragglers is P(straggler) × P(straggler) = 0.01 × 0.01 = 0.0001 (0.01%).
    4. The P99.99 latency is now 500ms, easily keeping the P99 well under the 100ms SLA limit.
    5. **Hedging eliminates 99% of 500ms stalls, drastically stabilizing tail latency at the cost of only a minor increase in compute overhead.**
