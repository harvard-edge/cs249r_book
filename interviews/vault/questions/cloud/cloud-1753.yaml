title: Memory Footprint for Progressive VLM Deployment
scenario: You are architecting a progressive deployment strategy for a visual assistant. The foundational
  cloud model is an 86B parameter vision-language model in FP16. You need to distill and quantize this
  into a 7B parameter edge server model in INT8 and a 1.5B parameter mobile device model in INT4. Calculate
  the static weight memory footprint for each of the three deployment tiers.
details:
  realistic_solution: Multiply the parameter count of each distilled model by its respective precision
    size in bytes (FP16 = 2 bytes, INT8 = 1 byte, INT4 = 0.5 bytes) to determine the true static footprint.
  common_mistake: Calculating footprint based only on parameter reduction ratios while forgetting to account
    for the shrinking data type sizes (FP16 to INT8 to INT4) across the different deployment tiers.
  napkin_math: 'Cloud tier (FP16): 86B params * 2 bytes/param = 172 GB.

    Edge tier (INT8): 7B params * 1 byte/param = 7 GB.

    Mobile tier (INT4): 1.5B params * 0.5 bytes/param = 0.75 GB (750 MB).'
