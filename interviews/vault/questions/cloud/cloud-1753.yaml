title: Memory Footprint for Progressive VLM Deployment
scenario: You are architecting a progressive deployment strategy for a visual assistant. The foundational cloud model is an 86B parameter vision-language model in FP16. You need to distill and quantize this into a 7B parameter edge server model in INT8 and a 1.5B parameter mobile device model in INT4.
question: "What are the static weight memory footprints for the 86B FP16 cloud model, 7B INT8 edge model, and 1.5B INT4 mobile model?"
details:
  realistic_solution: |
    Multiply the parameter count of each distilled model by its respective precision size in bytes (FP16 = 2 bytes, INT8 = 1 byte, INT4 = 0.5 bytes) to determine the true static footprint.
  common_mistake: |
    **The Pitfall:** Calculating footprint based only on parameter reduction ratios.
    **The Rationale:** Candidates forget to account for the shrinking data type sizes (FP16 to INT8 to INT4) across the different deployment tiers.
    **The Consequence:** Overestimating edge and mobile hardware requirements, potentially blocking deployment on cheaper target devices.
  napkin_math: |
    - **Cloud Tier (FP16):** 86B params * 2 bytes/param = **172 GB**.
    - **Edge Tier (INT8):** 7B params * 1 byte/param = **7 GB**.
    - **Mobile Tier (INT4):** 1.5B params * 0.5 bytes/param = **0.75 GB (750 MB)**.
