title: Feature Freshness vs Staleness Budget
scenario: Your fraud detection model uses a feature 'user_transaction_count_last_1h'
  served from the online store. The feature pipeline runs every 30 minutes. During
  a fraud spike, the model misses 40% of attacks because it sees stale counts. How
  do you diagnose the staleness problem and what freshness architecture fixes it without
  rebuilding the entire pipeline?
question: How do you diagnose the staleness problem and what freshness architecture
  fixes it without rebuilding the entire pipeline?
details:
  realistic_solution: 'The 30-minute pipeline creates a staleness window where the
    feature lags behind reality by 0-30 minutes. For fraud, this is critical — an
    attacker can make 50 transactions in 30 minutes before the count updates. The
    fix is a streaming feature pipeline: Kafka ingests transaction events, a Flink/Spark
    Streaming job maintains a sliding window count, and writes directly to Redis.
    This achieves sub-second freshness. The batch pipeline remains for backfilling
    and training (point-in-time correctness), while the streaming pipeline handles
    online serving. This is the lambda architecture pattern applied to feature stores.'
  common_mistake: Increasing pipeline frequency to 1 minute — this creates enormous
    compute cost for batch pipelines and still has a 1-minute blind spot. The root
    cause is using batch computation for a feature that needs streaming semantics.
  napkin_math: 'Batch 30-min: worst-case staleness = 30 min, missed fraud in window
    = 40%. Streaming (1s freshness): Kafka lag ~200ms + Flink processing ~500ms +
    Redis write ~1ms = ~700ms end-to-end. Flink job cost: 2 vCPUs × $0.05/hr = $2.40/day.
    Fraud prevented: 40% recovery × $10K average fraud/day = $4K/day saved. ROI is
    immediate.'
