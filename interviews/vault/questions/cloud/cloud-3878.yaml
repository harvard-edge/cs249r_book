title: VRAM Calculation for FP16 Guardrail Model
scenario: We deploy an LLM-based guardrail to filter toxic outputs. The guardrail is a 7B parameter model loaded in FP16 precision onto an 80 GB A100 GPU.
question: How much VRAM do the FP16 weights of the 7B guardrail require, and what percentage of an 80 GB A100 is that?
details:
  realistic_solution: The candidate should recall that FP16 uses 16 bits (2 bytes) per parameter and that the standard A100 has 80 GB of HBM2e memory. They should multiply the parameter count by the bytes per parameter, then divide by the total VRAM to find the proportion used by the guardrail's weights.
  common_mistake: |
    **The Pitfall:** Incorrectly mapping parameters to bytes in memory.
    **The Rationale:** Candidates often assume a 1:1 mapping (1 byte per parameter) or forget the standard VRAM capacities of cloud GPUs.
    **The Consequence:** Resource provisioning is vastly undersized or oversized, leading to OOMs or wasted cloud spend.
  napkin_math: |
    * **Parameter Precision:** FP16 requires 2 bytes per parameter.
    * **Weight Memory:** 7 billion parameters × 2 bytes = 14 GB.
    * **VRAM Percentage:** (14 GB / 80 GB) × 100 = 17.5%.
    * **Conclusion:** The model weights consume **14 GB (17.5%)** of the A100's capacity.
