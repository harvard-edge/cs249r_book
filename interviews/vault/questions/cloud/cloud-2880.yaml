title: Designing Activation Offloading vs. Checkpointing Trade-off for Long-Sequence Training on H100
scenario: You are training a 13B Transformer with sequence length 32K tokens on a single GPU. Raw activation memory at batch size 1 exceeds 60 GB. You must choose between gradient checkpointing every 4 layers or offloading activations to CPU DRAM over PCIe 5.0 (64 GB/s bidirectional).
question: Should you use checkpointing every 4 layers or PCIe 5.0 activation offload to keep the 32K-token step under 2 seconds, and why?
details:
  realistic_solution: 'Recomputation is significantly faster than PCIe offload for these sequence lengths. Sending massive intermediate activations over PCIe 5.0 introduces a severe bottleneck. The recompute cost for 4 layers leverages the GPU''s massive TFLOPS advantage.'
  common_mistake: |
    **The Pitfall:** Assuming PCIe offload is always faster than recomputation due to high bandwidth.
    **The Rationale:** Engineers overlook that for long sequences (S=32K), intermediate activations are massive, bottlenecking PCIe, while TFLOPS handles recompute easily.
    **The Consequence:** Choosing the slower offload strategy and missing throughput targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 layers offload size = 21.47 GB.
       - PCIe 5.0 bidirectional = 64 GB/s.
       - Recompute = 170.4 TFLOPs at 989 TFLOPS.
    2. **Calculations:**
       - Offload time = (2 * 21.47 GB) / 64 GB/s = 671 ms.
       - Recompute time = 170.4 TFLOPs / 989 TFLOPS = 172.3 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound recomputation (172.3 ms) easily beats PCIe I/O-Bound offload (671 ms).**
