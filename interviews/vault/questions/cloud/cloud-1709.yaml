title: Cloud RAPL Power Side-Channel Analysis
scenario: A multi-tenant cloud host runs a confidential proprietary LLM inference service on an NVIDIA H100 GPU alongside an attacker-controlled VM. The attacker monitors the shared server power consumption via software interfaces like Intel RAPL and NVML at 1ms resolution. By observing the power fluctuating between a 300W memory-bound baseline and 650W compute-bound spikes, the attacker aims to reverse-engineer the victim's model architecture (layer sizes) and input sequence lengths.
question: "How should you mitigate software power side-channel attacks against the co-hosted LLM service?"
details:
  realistic_solution: Disable unprivileged access to hardware power monitoring interfaces (e.g., restricting RAPL and NVML read permissions to root) and introduce power obfuscation by executing random dummy GEMM operations to maintain a constant power draw.
  common_mistake: |
    **The Pitfall:** Assuming power analysis attacks strictly require physical access with an oscilloscope.
    **The Rationale:** Security engineers underestimate the granularity of software-exposed power metrics like RAPL.
    **The Consequence:** Cloud environments inadvertently leak high-resolution execution traces, allowing attackers to map proprietary model architectures.
  napkin_math: |
    *   **Timing:** Decoding 1 token takes $\approx 15\text{ms}$. Sampling RAPL at 1kHz yields 15 samples/token.
    *   **Energy Signature:** If memory ops draw 350W (5ms) and FP8 GEMMs draw 650W (10ms), Energy $E = (350\text{W} \times 0.005\text{s}) + (650\text{W} \times 0.010\text{s}) = 8.25\text{J}$.
    *   **Result:** **Correlating these precise 8.25J windows enables attackers to accurately map internal layer execution boundaries.**
