title: On-Device Ad Ranking for Cloud Savings
scenario: 'A mobile ad network processes 2 Billion requests/day. The cloud DSP retrieves 2000 ad candidates and runs a heavy Deep Learning Recommendation Model (DLRM) to rank them, taking 150ms and costing $0.01 per 1000 requests. You must reduce cloud ranking costs by 75% and ensure end-to-end latency stays under 100ms, while preserving personalization.'
question: "How would you redesign ad ranking to cut cloud DLRM costs by 75%, keep latency under 100ms, and use local app history?"
details:
  realistic_solution: 'Design a Cloud-Retrieval, Edge-Ranking architecture. The cloud performs lightweight, non-personalized contextual retrieval to select the top 100 ad candidates (using simple dot products). It sends only the metadata/embeddings of these 100 candidates to the phone. A lightweight ranking model deployed on the phone''s CPU/NPU scores these 100 candidates using the user''s rich, raw local history (which never leaves the device). The cloud avoids running the expensive DLRM entirely.'
  common_mistake: |
    **The Pitfall:** Moving the entire retrieval pipeline to the mobile edge.
    **The Rationale:** Assuming "edge compute" means transferring the whole cloud workload to the device.
    **The Consequence:** Fetching millions of ad candidates to score locally consumes massive bandwidth, destroys the phone's battery, and breaks latency SLAs.
  napkin_math: |
    1. **Current Cost:** 2B / 1000 × $0.01 = $20,000/day.
    2. **New Cloud Cost (Retrieval Only):** 2B / 1000 × $0.002 = $4,000/day (80% savings).
    3. **Latency:** 
       - Cloud retrieval: 20ms
       - Network transfer of 100 lightweight embeddings: 30ms
       - Local NPU ranking of 100 items: 10ms
       - Total: 60ms.
       
    **Final Result: Cost drops by 80%, and latency drops to 60ms, easily clearing the 100ms SLA.**
