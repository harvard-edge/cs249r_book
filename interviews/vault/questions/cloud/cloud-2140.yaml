title: The GPU Preprocessing Offload
scenario: Your training pipeline for a large recommendation model spends 60% of step time on CPU-based feature preprocessing (hashing, bucketing, normalization of 500 features) and only 40% on GPU forward/backward passes. The GPUs are idle 60% of the time. Adding more CPU workers doesn't help because the preprocessing is already distributed across 32 CPU cores.
question: How would you move the 500-feature preprocessing pipeline to the GPU, and what speedup should you expect?
details:
  realistic_solution: 'Classify preprocessing operations by GPU-friendliness: **GPU-native (80% of ops):** Numeric normalization (z-score, min-max), bucketing (searchsorted), embedding lookups (already on GPU), log transforms, polynomial features. These are embarrassingly parallel. **CPU-better (20% of ops):** String hashing (MurmurHash — can be GPU-ported but complex), regex feature extraction, JSON parsing, variable-length list features. **Architecture:** Use NVIDIA DALI or NVTabular to build a GPU-native preprocessing pipeline. Preprocessing and model forward pass share the same GPU memory, eliminating CPU→GPU data transfer for preprocessed features. Estimated speedup: if 80% of preprocessing moves to GPU and runs 50× faster (1000 features × batch of 65K = 65M operations, trivially parallel), effective preprocessing time drops from 60% to ~5% of step time. New bottleneck shifts to GPU compute at ~95% utilization.'
  common_mistake: |
    **The Pitfall:** Assuming all CPU preprocessing can trivially move to GPU.
    **The Rationale:** Candidates often forget that operations like string hashing, regex, and dictionary lookups are inherently serial or have complex branching.
    **The Consequence:** Porting unsuitable logic to the GPU, resulting in massive warp divergence and worse performance than the CPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original step: CPU=60ms, GPU=40ms.
       - 80% of CPU ops are GPU-native and gain 50x speedup.
    2. **Calculations:**
       - New GPU prep time = (60ms * 0.8) / 50 = 0.96ms.
       - Remaining CPU time = 60ms * 0.2 = 12ms.
       - New step time = max(12ms, 40ms + 1ms) = 41ms.
       - Speedup = 100ms / 41ms = 2.4x.
    3. **Conclusion & Interpretation:**
       - **Result: 2.4x speedup.** The bottleneck successfully shifts to GPU compute (97% utilization).
