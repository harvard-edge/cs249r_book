title: The Quantization Throughput Paradox
scenario: A Deep Learning Recommendation Model (DLRM) processes 5,000 QPS. The model has 50GB of embedding tables and small MLP layers (20 GFLOPs total compute per pass). To reach a target of 10,000 QPS, the team quantizes the MLP layers from FP16 to INT8, doubling peak compute. However, throughput remains flat at 5,100 QPS.
question: Why does quantizing the DLRM MLPs to INT8 leave throughput flat at about 5,100 QPS?
details:
  realistic_solution: Recommendation models are predominantly memory-bandwidth bound due to sparse embedding lookups. The arithmetic intensity of reading an embedding vector to perform a simple sum/concat is incredibly low (often < 0.5 FLOPs/byte). The GPU's ridge point for FP16 is often 200 FLOPs/byte. The model is vastly below the ridge point. Quantizing the MLPs to INT8 raises the compute ceiling (and the ridge point to 400 FLOPs/byte), but does absolutely nothing to alleviate the HBM bandwidth ceiling that dictates the total pipeline latency. Optimization must focus on embedding compression or higher bandwidth memory.
  common_mistake: |
    **The Pitfall:** Believing that quantizing compute-heavy layers will speed up a model that is fundamentally bottlenecked by memory bandwidth.
    **The Rationale:** DLRMs are predominantly memory-bandwidth bound due to sparse embedding lookups. Their arithmetic intensity is extremely low. Raising the compute ceiling does nothing to alleviate the HBM bandwidth ceiling.
    **The Consequence:** Wasted engineering effort on quantization that yields zero performance benefit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware specs: 300 GB/s bandwidth, 60 TFLOPS FP16, 120 TOPS INT8.
       - DLRM load: 50 GB read, 20 GFLOPs compute per pass.
    2. **Calculations:**
       - Arithmetic Intensity (AI): 20 GFLOPs / 50 GB = 0.4 FLOPs/Byte.
       - Ridge Point FP16: 60,000 GFLOPs / 300 GB/s = 200 FLOPs/Byte.
       - 0.4 << 200, so throughput is strongly bandwidth-limited.
       - Attainable throughput: 300 GB/s × 0.4 FLOPs/Byte = 120 GFLOPs/s.
       - Max QPS: 120 GFLOPs/s / 20 GFLOPs/pass = 6,000 QPS.
    3. **Conclusion & Interpretation:** **Max QPS is fixed by memory bandwidth at <6,000 QPS regardless of INT8 compute. Memory-Bandwidth-Bound.**
