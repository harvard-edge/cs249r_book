title: Diagnosing CPU Inefficiency in Transformer Inference
scenario: 'Your team is running a low-latency, batch-size=1 Transformer inference service on dual-socket Intel Xeon Platinum 8480+ CPUs. The monitoring dashboard shows sustained 100% CPU utilization across all 112 cores per node, drawing nearly 700W. When you profile the application, you find that the actual achieved TFLOP/s is less than 5% of the CPU''s theoretical peak FP32 performance.'
question: 'Why are 112 Xeon cores at 100% utilization achieving under 5% peak TFLOPs for batch-size=1 Transformer inference?'
details:
  realistic_solution: 'Diagnose the issue as the ''generality tax''. CPUs spend ~91% of their energy on instruction fetch, decode, and control logic rather than actual arithmetic. A single FP32 FMA consumes ~10pJ but requires ~100pJ of control overhead. A systolic array amortizes one instruction over a 128x128 matrix multiply (16,384 MACs), reducing control overhead per MAC to <0.1%. For batch-size=1 Transformer inference, a systolic array or NPU is the correct architecture.'
  common_mistake: |
    **The Pitfall:** Assuming 100% CPU utilization means the processing units are fully saturated with math operations.
    **The Rationale:** Candidates blame memory bandwidth exclusively, ignoring that the vast majority of CPU energy and area is consumed by instruction fetch and control logic (the "generality tax").
    **The Consequence:** Persistent architectural inefficiency; trying to optimize CPU code when a systolic array/NPU is structurally required.
  napkin_math: |
    * CPU FP32 FMA energy: ~10pJ for math + ~100pJ for instruction fetch/decode.
    * Energy spent on control = 100 / 110 ≈ 91% (Generality Tax).
    * Systolic array amortizes 1 instruction over a 128x128 matrix multiply (16,384 MACs).
    * **A systolic array reduces control overhead per MAC to <0.1%, explaining why CPUs stall on control logic at batch-size=1.**
