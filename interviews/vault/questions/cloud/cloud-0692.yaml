title: The Memory Swiss Cheese
scenario: Your LLM serving system reports 'Out of Memory' after serving only 8 concurrent users, even though each user has only generated a few dozen tokens.
question: Based on the memory map, why is your VRAM already exhausted?
details:
  realistic_solution: 'The system uses contiguous pre-allocation, reserving 8192 tokens worth of VRAM per request. Request 1 uses only 47 tokens but holds memory for 8192. This internal fragmentation wastes memory. The fix is PagedAttention: map virtual KV-cache blocks on demand.'
  common_mistake: |
    **The Pitfall:** Assuming there must be a memory leak in the serving framework.
    **The Rationale:** The system OOMs under light token generation load, feeling like a leak.
    **The Consequence:** Wasting time debugging framework code when the memory allocation design itself is flawed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model weights: 26 GiB.
       - Max context 8192 = 6.25 GiB per user cache.
    2. **Calculations:**
       - 8 users pre-allocate: 8 * 6.25 = 50 GiB.
       - Total VRAM: 26 + 50 = 76 GiB.
    3. **Conclusion & Interpretation:**
       - **Result: The GPU OOMs at user 9 (82.25 GiB), regardless of tokens actually generated.**
