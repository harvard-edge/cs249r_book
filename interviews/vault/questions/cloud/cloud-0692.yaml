title: The Memory Swiss Cheese
scenario: Your LLM serving system reports 'Out of Memory' after serving only 3 concurrent users, even
  though each user has only generated a few dozen tokens. Based on the memory map, why is your VRAM already
  exhausted?
details:
  realistic_solution: 'The system uses contiguous pre-allocation, reserving 8192 tokens worth of VRAM
    per request regardless of usage. Request 1 uses only 47 tokens but holds memory for 8192, **wasting
    99.4% of its allocation**. This is internal fragmentation. The fix is **PagedAttention**: map virtual
    KV-cache blocks to non-contiguous physical blocks on demand, exactly like OS virtual memory paging.'
  common_mistake: '"There must be a memory leak in the serving framework." It''s not a leak — the allocation
    is working exactly as designed. The design itself is the problem.'
  napkin_math: An A100 80GB running a 13B model uses 26GB for weights. If max context is 8192 tokens,
    an FP16 KV-cache needs 2 bytes * 2 (K+V) * 40 layers * 5120 dim * 8192 = 6.7GB per user. If the system
    pre-allocates contiguous memory for the max length, 8 concurrent users reserve 8 * 6.7GB = 53.6GB.
    26GB + 53.6GB = 79.6GB. The GPU OOMs at user 9, even if they only generate 50 tokens!
