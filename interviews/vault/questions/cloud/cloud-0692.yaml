title: The Memory Swiss Cheese
scenario: Your LLM serving system reports 'Out of Memory' after serving only 8 concurrent users, even though each user has only generated a few dozen tokens. Based on the memory map, why is your VRAM already exhausted?
question: "Based on the memory map, why is your VRAM already exhausted?"
details:
  realistic_solution: 'The system uses contiguous pre-allocation, reserving 8192 tokens worth of VRAM
    per request regardless of usage. Request 1 uses only 47 tokens but holds memory for 8192, **wasting
    99.4% of its allocation**. This is internal fragmentation. The fix is **PagedAttention**: map virtual
    KV-cache blocks to non-contiguous physical blocks on demand, exactly like OS virtual memory paging.'
  common_mistake: '"There must be a memory leak in the serving framework." It''s not a leak — the allocation
    is working exactly as designed. The design itself is the problem.'
  napkin_math: 'An A100 80GB running a 13B model uses 26 GB for weights. If max context is 8192 tokens, an FP16 KV-cache needs 2 bytes * 2 (K+V) * 40 layers * 5120 hidden_size * 8192 = 6,710,886,400 bytes (~6.25 GiB) per user. If the system pre-allocates contiguous memory for the max length, 8 concurrent users reserve 8 * 6.25 GiB = 50 GiB. 26 GiB + 50 GiB = 76 GiB. The GPU OOMs at user 9, even if they only generate 50 tokens!'
