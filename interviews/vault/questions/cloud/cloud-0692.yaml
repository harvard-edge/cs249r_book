validation_issues:
- The calculated KV-cache size in Napkin Math is 6.255GB, but the problem states 6.7GB, a slight imprecision.
- The value 5120 for 'dim' in the KV-cache calculation is ambiguous; it usually refers to head_dim but
  the result implies a full hidden_size dimension per head.
