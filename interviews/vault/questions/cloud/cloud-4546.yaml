title: Continuous Batching for LLM Queue Optimization
scenario: 'An LLM service running on A100s already uses continuous batching but suffers
  from prefix-cache collisions (50% of requests share a 4k-token system prompt and
  the cache evicts the shared prefix unpredictably) AND a chunked-prefill design
  decision - is it better to chunk a 4k prefill into 8 x 512 token chunks interleaved
  with decode, or run prefill atomically at the cost of a long tail latency spike?'
question: Design a scheduling policy that handles (a) prefix-cache collisions via
  reference-counted block sharing and (b) chunked vs atomic prefill - trading tail
  latency for inter-token latency. Identify the threshold prefill length at which
  chunking pays off.
details:
  realistic_solution: Implement continuous batching (iteration-level scheduling).
    Instead of waiting for an entire batch to finish, the scheduler monitors the batch
    at the token level. As soon as a sequence emits its EOS token (e.g., after 10
    tokens), it is immediately evicted. A pending request from the queue is instantly
    pulled into the active batch for the next token generation step, keeping GPU utilization
    near 100%.
  common_mistake: Padding all sequences to the maximum length of 2000, which wastes
    massive amounts of compute on PAD tokens.
  napkin_math: 10 < 2000
