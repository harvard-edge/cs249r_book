title: Continuous Batching for LLM Queue Optimization
scenario: An LLM service running on A100s receives requests with output sequence lengths
  randomly varying from 10 to 2000 tokens, causing head-of-line blocking in static
  batches.
question: Design a queueing and batching policy to minimize average request latency
  and maximize GPU utilization.
details:
  realistic_solution: Implement continuous batching (iteration-level scheduling).
    Instead of waiting for an entire batch to finish, the scheduler monitors the batch
    at the token level. As soon as a sequence emits its EOS token (e.g., after 10
    tokens), it is immediately evicted. A pending request from the queue is instantly
    pulled into the active batch for the next token generation step, keeping GPU utilization
    near 100%.
  common_mistake: Padding all sequences to the maximum length of 2000, which wastes
    massive amounts of compute on PAD tokens.
  napkin_math: 10 < 2000
