title: Cloud New 0014
scenario: Architect a privacy-preserving federated training system for a 1B language model across thousands
  of Cortex-M4 (168MHz, 256KB RAM) edge devices. Design the aggregation and training architecture.
details:
  realistic_solution: Architect a LoRA (Low-Rank Adaptation) based federated learning topology. The 1B
    base model is frozen and resides on a central cloud. The edge devices only receive and train ultra-small
    LoRA adapters (rank 4). Since 256KB RAM is extremely constrained, implement heavily quantized 8-bit
    gradients and gradient accumulation. Devices stream micro-updates asynchronously to a cloud aggregator,
    which uses secure multi-party computation to average the adapters before applying them to the global
    model.
  common_mistake: Attempting full parameter fine-tuning or sending full gradients over the edge network,
    instantly OOMing the 256KB RAM Cortex-M4 devices.
  napkin_math: 1B model = 2GB FP16 (impossible on 256KB). Rank 4 LoRA adapter for a single layer = 32KB.
    Cortex-M4 at 168MHz takes seconds for a single forward/backward pass of just the adapter layer. Async
    aggregation is mandatory to mask this.
