title: Cloud-Edge Federated Learning Memory Limits
scenario: You are designing a cloud orchestration system for 5 million smart home acoustic sensors (Cortex-M33,
  256KB SRAM). The cloud manages federated learning to update a 120KB TFLite Micro model. Standard FedAvg
  requires backpropagation, but maintaining weights, gradients, and optimizer states simultaneously results
  in Out-Of-Memory (OOM) errors on the edge devices.
details:
  realistic_solution: Implement a Cloud-assisted Head-Only Federated Learning architecture. The cloud
    trains the bulk of the feature extractor and freezes it. During FL rounds, the edge devices only compute
    gradients for the final dense classification layer (the 'head'). The cloud aggregator only receives
    and averages these small dense layer updates, drastically reducing both SRAM requirements on the device
    and network payload size.
  common_mistake: Attempting to run a full FP32 or even INT8 backward pass on the entire network, which
    easily exceeds the 256KB SRAM limit during gradient calculation.
  napkin_math: 'Full model: 120KB. Feature extractor: 118KB. Head: 2KB. Forward pass activations for head:
    ~4KB. Backprop memory = 2KB (gradients) + 4KB (activations) = 6KB. Total SRAM used = 120KB (model)
    + 6KB (training state) + 30KB (RTOS/buffers) = 156KB. 156KB < 256KB SRAM limit. Communication payload
    drops from 120KB to 2KB per round.'
