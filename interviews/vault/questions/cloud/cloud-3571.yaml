title: Designing a DP-SGD System with NVIDIA H100 for Federated Learning
scenario: You are tasked with designing a federated learning system for a highly sensitive medical dataset. The system must use Differential Privacy with DP-SGD to train a large language model. The target hardware for each client and the central server is an NVIDIA H100 GPU (80 GB HBM3).
question: How would you design the federated DP-SGD architecture on H100s, including epsilon accounting, noise calibration, batch sizing, and privacy monitoring?
details:
  realistic_solution: A robust solution involves dynamic privacy budget allocation and adaptive noise calibration. Implement a privacy accountant (e.g., moments accountant) to track epsilon accurately across multiple training rounds. Leverage the H100's FP16 capabilities for model training and gradient computations to maximize throughput, while carefully selecting batch sizes and model architectures that fit within the 80GB HBM3. For noise calibration, consider methods that adapt noise based on gradient norms and the chosen privacy mechanism (e.g., Gaussian mechanism) to balance privacy and utility. Utilize secure aggregation protocols to combine gradients from clients while minimizing privacy leakage and communication overhead. Architect the system with a clear separation of concerns for privacy mechanism implementation, training orchestration, and model deployment, using distributed frameworks optimized for GPU communication. Implement continuous monitoring of privacy metrics and model utility to inform adjustments.
  common_mistake: |
    **The Pitfall:** Ignoring the massive memory inflation caused by DP-SGD's per-sample gradients.
    **The Rationale:** Candidates are used to standard SGD, which accumulates gradients across the batch, requiring only one gradient tensor in memory.
    **The Consequence:** Without ghost clipping or memory-efficient libraries (like Opacus), the system hits an Out-Of-Memory (OOM) error immediately because the per-sample gradients multiply memory usage by the batch size.
  napkin_math: |
    1. **Standard Gradient Memory:** A 7B parameter model requires 14 GB for a single FP16 gradient tensor.
    2. **DP-SGD Memory Inflation:** DP-SGD requires per-sample gradients before clipping, consuming $B \times 14$ GB.
    3. **Batch Limit:** On an 80 GB H100, the strict mathematical limit is $B \approx 4$ before Out-Of-Memory.
    4. **Mitigation:** The system must implement **ghost clipping** or use libraries like Opacus to compute clipped gradients without materializing the full $B \times P$ tensor.
