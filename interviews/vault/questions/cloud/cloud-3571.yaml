title: Designing a DP-SGD System with NVIDIA H100 for Federated Learning
scenario: "You are tasked with designing a federated learning system for a highly sensitive medical dataset. The system must use Differential Privacy with DP-SGD to train a large language model. The target hardware for each client and the central server is an NVIDIA H100 GPU (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W TDP). \n\nDescribe the architecture you would propose, focusing on how you would manage the privacy budget (epsilon), calibrate noise, and mitigate the privacy-utility tradeoff given the H100's computational and memory constraints. Specifically, analyze how the HBM3 capacity and FP16 performance impact your choices for model size, batch size, and the frequency of privacy budget consumption. How would you monitor and ensure the privacy guarantees hold in a distributed setting?"
question: How would you design the federated DP-SGD architecture on H100s, including epsilon accounting, noise calibration, batch sizing, and privacy monitoring?
details:
  realistic_solution: A robust solution involves dynamic privacy budget allocation and adaptive noise calibration. Implement a privacy accountant (e.g., moments accountant) to track epsilon accurately across multiple training rounds. Leverage the H100's FP16 capabilities for model training and gradient computations to maximize throughput, while carefully selecting batch sizes and model architectures that fit within the 80GB HBM3. For noise calibration, consider methods that adapt noise based on gradient norms and the chosen privacy mechanism (e.g., Gaussian mechanism) to balance privacy and utility. Utilize secure aggregation protocols to combine gradients from clients while minimizing privacy leakage and communication overhead. Architect the system with a clear separation of concerns for privacy mechanism implementation, training orchestration, and model deployment, using distributed frameworks optimized for GPU communication. Implement continuous monitoring of privacy metrics and model utility to inform adjustments.
  common_mistake: A common mistake is to oversimplify noise calibration and privacy budget management, leading to either excessive noise that destroys model utility, or insufficient noise that compromises privacy. Another error is failing to consider the practical implications of large model sizes and batch sizes on H100 memory and computation, especially when adding per-sample gradient clipping and noise, leading to significant performance bottlenecks or out-of-memory errors. Neglecting the communication overhead and synchronization challenges in federated settings when applying DP-SGD is also frequent.
  napkin_math: 'Given \epsilon=8, noise multiplier \sigma \approx \frac{q \sqrt{T \log(1/\delta)}}{\epsilon}. DP-SGD requires per-sample gradients, which inflates memory. For a model with P parameters and batch size B, standard SGD stores 1 gradient (P elements). DP-SGD stores B gradients (B \times P elements) before clipping. On an 80GB H100, if P = 7B (14GB in FP16), standard gradients take 14GB. DP-SGD per-sample gradients would take B \times 14GB. Thus, B is strictly limited to \approx 4 before hitting the 80GB wall. We must use ghost clipping or Opacus to compute clipped gradients efficiently without materializing the full B \times P tensor, keeping memory bounded and leveraging the 989 TFLOPS FP16 throughput.'
