title: RLHF vs RLAIF Infrastructure Cost Comparison
scenario: Compare the infrastructure cost of RLHF with human feedback vs RLAIF (RL from AI Feedback using a judge LLM) for fine-tuning a 7B assistant model.
question: What is the cost crossover point where RLAIF becomes significantly more cost-effective than RLHF for 10K-100K preference comparisons?
details:
  realistic_solution: 'RLHF: 10K human comparisons × $0.10/comparison = $1,000 labeling cost + GPU training (~$128 for 7B on 8×H100 for 1000 PPO steps). RLAIF with GPT-4-turbo judge: 10K AI comparisons × $0.005/comparison = $50 + same training cost. RLAIF is 20x cheaper on labeling. Crossover: RLAIF is preferred when judge LLM quality is sufficient (>85% agreement with human raters) due to compounding scale costs. For safety-critical applications, human labels remain necessary regardless of cost.'
  common_mistake: |
    **The Pitfall:** Ignoring the API inference cost of the judge LLM in RLAIF.
    **The Rationale:** Because calling an LLM for a few samples is trivial ($0.01), engineers assume AI labeling is practically free.
    **The Consequence:** The compounding cost of running hundreds of thousands of tokens through a premium model like GPT-4-turbo catches teams off guard during large-scale preference curation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * RLHF human labels (10K): 10,000 * $0.10 = $1,000.
       * RLAIF labels (Judge LLM, avg 500 tokens at $0.01/1K): 10,000 * $0.005 = $50.
       * Training overhead: 8 GPUs * 4 hours * $4/GPU-hr = $128.
    2. **Calculations:**
       * Total RLHF for 10K: $1,000 + $128 = $1,128.
       * Total RLAIF for 10K: $50 + $128 = $178.
       * At 100K comparisons: RLHF = $10,128 vs RLAIF = $628.
    3. **Conclusion & Interpretation:**
       * **Result: Labeling Cost Dominated.** RLAIF provides an immediate 84% cost savings that scales to 16x savings at 100K comparisons.
