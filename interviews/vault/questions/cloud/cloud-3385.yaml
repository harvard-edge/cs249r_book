title: LLM Distillation for High-Throughput Inference on AMD MI300X
scenario: 'You are leading the ML engineering team deploying a critical LLM inference
  service. The current production model is a massive 70B parameter transformer. Through
  extensive R&D, you''ve successfully trained a smaller 7B parameter student model
  using knowledge distillation, achieving 98% quality parity with the 70B teacher.
  Your mandate is to deploy this student model on an AMD MI300X accelerator, leveraging
  its unique capabilities: 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and
  5.3 TB/s memory bandwidth.


  Design a comprehensive inference serving strategy that maximizes throughput and
  minimizes latency on the MI300X, while strictly maintaining the distilled quality.
  Discuss specific architectural choices during inference and training. How would
  you approach model quantization (e.g., FP8, INT8) and sparse computation to best
  utilize the MI300X''s features? Critically, explain how specific knowledge distillation
  techniques (like logit matching or feature distillation) can be tailored to this
  hardware target, and in what scenarios distillation would fundamentally outperform
  traditional model pruning for achieving optimal performance on the AMD MI300X.'
question: How would you serve the 7B distilled LLM on MI300X using quantization, sparse
  compute, and hardware-tailored distillation, and when would it beat pruning?
details:
  realistic_solution: 'A robust solution involves a multi-pronged approach:

    1.  **Tailored Distillation:** During student model training, employ techniques
    like logit matching with carefully tuned temperature schedules, and feature distillation
    from strategically chosen intermediate layers of the teacher. The goal is to imbue
    the student with knowledge that makes it inherently amenable to quantization and
    sparsity, rather than just raw accuracy.

    2.  **Aggressive Quantization:** Post-distillation, apply advanced quantization
    techniques (e.g., FP8, INT8) to the 7B student model, leveraging the MI300X''s
    native support for these low-precision formats. This reduces memory footprint
    and increases effective throughput.

    3.  **Sparse Compute Utilization:** Design the student model''s architecture or
    fine-tune its sparse patterns to exploit the 1,307 TFLOPS FP16 sparse compute.

    4.  **HBM3 Memory Management:** Utilize the 192 GB HBM3 for large batching, KV
    cache optimization, and efficient multi-model serving. Optimize data transfer
    to maximize the 5.3 TB/s memory bandwidth, ensuring compute units are not starved.

    5.  **Distillation vs. Pruning:** Distillation excels here because it learns to
    reproduce teacher behavior, often resulting in better performance at smaller model
    sizes than pruning. For the MI300X, distillation can teach the student *how* to
    operate efficiently in a quantized or sparse manner, leveraging the hardware''s
    strengths.'
  common_mistake: Overlooking the specific advantages of the AMD MI300X (e.g., sparse
    compute capabilities, high HBM3 bandwidth) and applying generic LLM optimization
    techniques. A less experienced candidate might neglect to discuss how distillation
    *itself* can be adapted to make the student model more 'hardware-friendly' for
    sparse operations or quantization, or fail to justify why distillation is superior
    to pruning in this context.
  napkin_math: A 7B parameter FP16 model is ~14 GB. The MI300X's 192 GB HBM3 can hold
    multiple such models or accommodate very large batch sizes/context windows. With
    5.3 TB/s memory bandwidth, loading the entire 14 GB model takes merely ~2.6 milliseconds.
    If a single token inference requires, for example, 100 GMACs, the 1,307 TFLOPS
    FP16 sparse compute capacity implies a theoretical peak of ~13,070 such tokens
    per second if perfectly compute-bound. In practice, memory bandwidth will be a
    major bottleneck for LLMs, but tailored distillation and quantization can significantly
    reduce effective memory traffic and leverage sparse ops, pushing closer to peak
    compute and achieving hundreds to thousands of tokens/sec per chip for production
    workloads.
