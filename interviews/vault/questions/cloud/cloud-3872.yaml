title: Scaling Up vs Out Queue Dynamics
scenario: You are designing a real-time inference service for an NLP model with an expected peak arrival rate of 600 requests/second. You must choose between two hardware deployments behind a round-robin load balancer. Option A uses 10x A100 GPUs, where each A100 has an average service time of 12.5ms per request. Option B uses 4x H100 GPUs, where each H100 has an average service time of 5ms per request. Your strict SLA requires an average end-to-end latency of under 30ms.
question: "Assuming Poisson arrivals and exponentially distributed service times (modeling as independent M/M/1 queues per GPU), which option should you choose and why?"
details:
  realistic_solution: 'Option B (4x H100) is the correct choice. Even though both clusters operate at an identical 75% utilization, the H100s drain their queues much faster due to their higher absolute service rate. Option A yields a 50ms average latency (failing the SLA), while Option B yields a 20ms average latency (passing the SLA). This demonstrates a core queueing principle: at equal utilization, a faster server (scaling up) provides lower wait times than many slower servers (scaling out) because micro-bursts are cleared faster.'
  common_mistake: |
    **The Pitfall:** Assuming that equal cluster utilization results in equal queueing delays across different hardware.
    **The Rationale:** Candidates often intuitively favor Option A (scaling out), thinking more GPUs provide better parallelism and resilience to bursts.
    **The Consequence:** Selecting a deployment that fails the strict 30ms SLA because slower individual servers cannot clear micro-bursts fast enough.
  napkin_math: |
    - Option A (10x A100):
      - Arrival rate per GPU (λ) = 600 / 10 = 60 req/s.
      - Service rate (μ) = 1 / 0.0125s = 80 req/s.
      - Avg Latency = 1 / (μ - λ) = 1 / (80 - 60) = 1/20s = 50ms.
    - Option B (4x H100):
      - Arrival rate per GPU (λ) = 600 / 4 = 150 req/s.
      - Service rate (μ) = 1 / 0.005s = 200 req/s.
      - Avg Latency = 1 / (μ - λ) = 1 / (200 - 150) = 1/50s = 20ms.
    - **Only Option B (20ms latency) meets the 30ms SLA, despite both operating at 75% utilization.**
