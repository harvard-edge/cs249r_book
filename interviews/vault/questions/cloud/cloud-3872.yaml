title: Scaling Up vs Out Queue Dynamics
scenario: You are designing a real-time inference service for an NLP model with an expected peak arrival rate of 600 requests/second. You must choose between two hardware deployments behind a round-robin load balancer. Option A uses 10x GPUs, each with an average service time of 12.5ms per request. Option B uses 4x GPUs, each with an average service time of 5ms per request. Your strict SLA requires an average end-to-end latency of under 30ms.
question: "Assuming Poisson arrivals and exponentially distributed service times (modeling as independent M/M/1 queues per GPU), which option should you choose and why?"
details:
  realistic_solution: 'Option B (4x faster GPUs) is the correct choice. Even though both clusters operate at an identical 75% utilization, the faster GPUs drain their queues much faster due to their higher absolute service rate. Option A yields a 50ms average latency (failing the SLA), while Option B yields a 20ms average latency (passing the SLA). This demonstrates a core queueing principle: at equal utilization, a faster server (scaling up) provides lower wait times than many slower servers (scaling out) because micro-bursts are cleared faster.'
  common_mistake: |
    **The Pitfall:** Assuming that equal cluster utilization results in equal queueing delays across different hardware.
    **The Rationale:** Candidates often intuitively favor Option A (scaling out), thinking more GPUs provide better parallelism and resilience to bursts.
    **The Consequence:** Selecting a deployment that fails the strict 30ms SLA because slower individual servers cannot clear micro-bursts fast enough.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival rate = 600 req/s. SLA = 30ms.
       - Option A: 10 GPUs, service time 12.5ms (μ = 80 req/s).
       - Option B: 4 GPUs, service time 5ms (μ = 200 req/s).
       - Modeled as independent M/M/1 queues per GPU.
    2. **Calculations:**
       - Option A: Arrival per GPU (λ) = 60 req/s. Avg Latency = 1 / (μ - λ) = 1 / (80 - 60) = 50ms.
       - Option B: Arrival per GPU (λ) = 150 req/s. Avg Latency = 1 / (μ - λ) = 1 / (200 - 150) = 20ms.
    3. **Conclusion & Interpretation:** **Result: Queueing-Bound**. Only Option B (20ms latency) meets the 30ms SLA, despite both operating at identical 75% utilization.
