title: Why OOD Detection Matters
scenario: Your image classifier trained on daylight photos is deployed in a system that also receives nighttime infrared images. The model classifies them with high confidence but all predictions are wrong.
question: Why is OOD detection needed for nighttime infrared images, and why is high softmax confidence insufficient?
details:
  realistic_solution: 'Out-of-distribution detection identifies inputs that fall outside the training data distribution BEFORE trusting the model''s prediction. It differs from confidence checking because neural networks are not calibrated — they produce high-confidence predictions on OOD inputs due to how softmax works (it always sums to 1, forcing high confidence in some class even for garbage input). For your infrared images: the pixel distributions, feature statistics, and activation patterns are fundamentally different from daylight photos, but the model still maps them to the nearest learned class with high confidence. OOD detection methods include: (1) feature-space distance (compare activations to training data clusters), (2) energy-based scoring (lower energy = more in-distribution), (3) ensemble disagreement (OOD inputs cause higher variance across ensemble members). When OOD is detected, the system should flag for human review or return ''unknown'' instead of a confident wrong answer.'
  common_mistake: |
    **The Pitfall:** Assuming low confidence equals Out-Of-Distribution and high confidence equals safe.
    **The Rationale:** Engineers treat softmax outputs as true probabilities.
    **The Consequence:** Neural networks are notoriously overconfident on OOD inputs, assigning 99% confidence to completely wrong classes for inputs that look nothing like training data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Softmax distribution: Forces sum to 1.
       - Input type: Out-of-Distribution (OOD).
    2. **Calculations:**
       - Softmax confidence on OOD: Often >95% despite being incorrect.
       - Energy score: Can reliably flag OOD inputs before softmax normalization.
    3. **Conclusion & Interpretation:**
       - **Result: Calibration-Bound Reliability**. Neural networks are naturally overconfident on OOD data; high confidence does not equal correct classification.
