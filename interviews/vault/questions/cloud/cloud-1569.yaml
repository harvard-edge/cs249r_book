title: Evaluating Unified Network Fabrics for Mice and Elephant Flows
scenario: Your team is migrating a legacy web service cluster (handling 5 million requests/sec, average payload 5KB) into a shared multi-tenant 400Gbps Clos datacenter fabric that also hosts a 1,024-GPU distributed LLM training cluster. The current network uses static 5-tuple ECMP routing. The ML team complains that training iteration times vary by up to 40% depending on the web service load.
question: Should the 400Gbps Clos fabric use flow-level DLB or cell-based packet spraying to protect LLM training from web-service mice flows?
details:
  realistic_solution: Adopt a cell-based packet-spraying architecture (like Nvidia Spectrum-X or Broadcom Tomahawk 5). By breaking both mice and elephant flows into fixed-size cells (e.g., 256 bytes) and spraying them evenly across all available uplinks, the network achieves >90% link utilization and bypasses hash collisions, at the cost of requiring robust reordering buffers at the destination ToR.
  common_mistake: |
    **The Pitfall:** Suggesting prioritization via QoS/DSCP tags.
    **The Rationale:** Candidates rely on standard networking QoS tools designed for average traffic.
    **The Consequence:** QoS does not prevent hash polarization in static ECMP; aggregate mice flows colliding on the same link will still reduce the bandwidth available to the elephant flow.
  napkin_math: |
    - Under ECMP with 4 uplinks (100Gbps each), if a 100Gbps elephant flow and 50Gbps of aggregated mice flows hash to Link 1, the link is oversubscribed (150Gbps > 100Gbps), causing packet loss.
    - With cell spraying, that same 150Gbps load is perfectly distributed at 37.5Gbps per link across all 4 links, operating safely below capacity.
