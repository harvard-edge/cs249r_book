title: The LLM Evaluation Pipeline Design
scenario: 'Your team fine-tunes a 70B LLM for a customer support chatbot. Unlike classification models, there is no single accuracy metric. The PM wants to evaluate: factual correctness, helpfulness, safety, and latency. Each evaluation method has different costs and turnaround times. Design an evaluation pipeline that provides high-confidence quality signals within the team''s 2-day deployment cadence.'
question: "How would you design an evaluation pipeline that provides high-confidence quality signals within a 2-day deployment cadence?"
details:
  realistic_solution: |
    Design a tiered evaluation funnel, cheapest-first: Tier 1 (automated, 1 hour): Run deterministic checks — perplexity regression, toxicity classifier, format compliance, latency benchmarks on target hardware. These are necessary conditions. If any fails, reject immediately. Cost: ~$20 in compute. Tier 2 (semi-automated, 4-6 hours): Run LLM-as-judge evaluation on 500 representative queries. Compare against baseline model outputs. Score factual grounding, helpfulness, and coherence. Use stratified sampling to ensure coverage of edge cases (refund requests, complaints, technical questions). Cost: ~$50 (evaluation LLM inference). Tier 3 (human, 12-24 hours): Expert annotators review 50 outputs flagged as uncertain by Tier 2, plus 50 random outputs. Focus on safety, brand voice, and hallucination detection. Cost: ~$500 (annotator time). Tier 4 (canary, 24-48 hours): Deploy to 2% of traffic with business metric monitoring (customer satisfaction, escalation rate, handle time). Auto-rollback on regression. Total pipeline: Tiers 1-3 complete in 24 hours (day 1). Tier 4 runs on day 2. Fits the 2-day cadence. Kill rate: ~60% at Tier 1, ~20% at Tier 2, ~5% at Tier 3. Only ~15% of candidates reach canary.
  common_mistake: |
    **The Pitfall:** Designing a single evaluation step that runs all checks sequentially.
    **The Rationale:** Teams fail to distinguish between cheap, deterministic checks and expensive, generative or human-in-the-loop checks.
    **The Consequence:** Creating a 5-day evaluation bottleneck that completely breaks the 2-day deployment cadence constraint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Funnel tiers: T1 ($20), T2 ($50), T3 ($500).
       - 100 candidates.
    2. **Calculations:**
       - Without funnel: 100 * ($20 + $50 + $500) = $57,000 and 5 days.
       - With funnel: 100 * $20 + 40 * $50 + 20 * $500 = $14,000.
       - Time drops from 5 days to 2 days due to aggressive early filtering.
    3. **Conclusion & Interpretation:**
       - **Result: Cost/Time-Bound**. The tiered funnel approach is 4x cheaper and 2.5x faster, successfully fitting the 2-day cadence.
