title: Diagnosing End-to-End Latency in Image Serving
scenario: You are deploying a ResNet-50 image classification model on an AWS G4dn.xlarge instance (1 NVIDIA T4, 4 vCPUs). The end-to-end request latency is 45ms. Profiling shows the actual GPU inference takes only 5ms. The remaining 40ms is spent in Python on the CPU performing JPEG decoding, resizing to 224x224, and tensor normalization using standard PIL.
question: "Should you quantize the ResNet-50 model to INT8, or optimize the 40ms CPU preprocessing bottleneck first?"
details:
  realistic_solution: Identify the CPU preprocessing as the primary bottleneck. Implement optimized CPU libraries (like libjpeg-turbo or OpenCV) or offload preprocessing to the GPU using NVIDIA DALI (nvJPEG) before touching the model.
  common_mistake: |
    **The Pitfall:** Always assuming model optimization (like INT8 quantization) is the best way to reduce latency.
    **The Rationale:** Engineers often tunnel-vision on the deep learning model itself, ignoring standard data preprocessing overheads.
    **The Consequence:** Optimizing the wrong bottleneck yields minimal E2E latency improvements.
  napkin_math: |
    1. Calculate current E2E latency: 40ms (CPU) + 5ms (GPU) = 45ms.
    2. Estimate max INT8 benefit: Even with 0ms GPU time, max reduction is 5ms (11%).
    3. Estimate preprocessing benefit: Reducing preprocessing to 10ms yields E2E of 15ms.
    4. Compare improvements: 66% improvement via CPU optimization vs 11% via INT8.
    **Final Result: Optimize the CPU bottleneck for a 66% latency reduction.**
