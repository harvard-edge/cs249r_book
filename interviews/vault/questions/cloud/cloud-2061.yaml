title: Shift-Left Validation for Serving Constraints
scenario: 'Your team trains image classification models for a mobile app with strict constraints: model must be < 20 MB and inference latency < 10ms on a Pixel phone. Over the past 6 months, 70% of trained models fail these constraints and must be retrained with smaller architectures. Each training run takes 24 hours on 4x A100s at $12/GPU/hr.'
question: 'What pre-training validation would prevent these failed mobile runs, and how much would it save at 10 models per month?'
details:
  realistic_solution: 'Implement a "shift-left" constraint check: export the randomly initialized model to ONNX, measure its parameter count (size), and benchmark inference latency on the target device simulator before training.'
  common_mistake: |
    **The Pitfall:** Calculating savings only for the current month rather than understanding the systemic cost.
    **The Rationale:** Candidates fail to recognize the compounding architectural cost of late-stage constraint discovery and focus only on the immediate compute bill.
    **The Consequence:** The team continues to waste significant compute budget and hundreds of hours of engineer waiting time every month.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cost: 4 GPUs * $12/hr * 24h = $1,152 per run.
       - Failure rate: 70% of 10 models/month = 7 failed runs.
    2. **Calculations:**
       - Wasted Cost per Month = 7 * $1,152 = $8,064.
       - Annual Savings = $8,064 * 12 = $96,768.
       - Recovered Time = 7 runs * 24h = 168 hours/month.
    3. **Conclusion & Interpretation:**
       - **Result: Process-Bound. Implementing shift-left validation mathematically recovers nearly $100k annually and hundreds of engineer hours.**
