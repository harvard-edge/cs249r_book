title: Pipeline Drain Latency in Inference Serving
scenario: You deploy a 175B model using PP=8 across MI300X GPUs for inference serving. Each stage takes
  5ms per token. A user request generates 200 tokens. What is the time-to-first-token (TTFT) latency penalty
  from the pipeline, and how does continuous batching interact with pipeline parallelism for inference?
details:
  realistic_solution: 'TTFT for a single request = P × stage_latency = 8 × 5ms = 40ms (the prefill pass
    must go through all 8 stages sequentially). Without PP, the same model on one GPU (if it fit) would
    have TTFT = 5ms. For decoding, each token still requires 8 sequential stages: per-token latency =
    8 × 5ms = 40ms, not 5ms. Total generation time for 200 tokens = 40ms TTFT + 200 × 40ms decode = 8.04
    seconds. The throughput advantage comes from continuous batching: while token t for request A is at
    stage 3, token t-1 for request B can be at stage 2, etc. With 8 requests in flight, the pipeline stays
    full and throughput = 1 token / 5ms / request = 200 tok/s per request stream. But single-request latency
    is always 8× worse than non-pipelined. This is why most inference deployments prefer TP (splits each
    layer) over PP (splits across layers).'
  common_mistake: Thinking pipeline parallelism helps inference latency. For a single request, PP increases
    TTFT because the request must traverse all P stages sequentially. PP is a throughput optimization,
    not a latency optimization.
  napkin_math: 'PP=8, 5ms/stage. TTFT = 40ms. Per-token decode = 40ms. 200 tokens = 8.04s. Without PP:
    TTFT=5ms, per-token=5ms, 200 tokens = 1.005s. PP adds 8× latency. Throughput gain: 8 concurrent request
    streams at 200 tok/s each = 1600 tok/s aggregate.'
