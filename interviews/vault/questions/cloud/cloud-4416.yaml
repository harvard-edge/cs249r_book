title: Infinity Fabric vs NVLink for Scale-Up Topology
scenario: You are choosing between an 8x H100 NVLink node and an 8x MI300X Infinity Fabric node for a 70B parameter LLM training job with TP=8.
question: For 70B LLM training with TP=8, how do 8x H100 NVLink and 8x MI300X Infinity Fabric nodes compare on all-reduce and memory capacity?
details:
  realistic_solution: 'For 70B LLM in BF16: model weights = 140GB. H100 8-GPU: 640GB total, 140GB fits with headroom for activations and optimizer states in mixed precision. MI300X 8-GPU: 1.536TB total, can hold full optimizer states in BF16 without offloading. All-reduce: both nodes have ~900 GB/s bandwidth. H100 NVLink topology: fully connected NVSwitch (6 switches), bisection bandwidth = 900 GB/s. MI300X: Infinity Fabric peer-to-peer bandwidth depends on system topology (PCIe vs dedicated fabric on OAM modules). AMD Instinct MI300X OAM: 7-link Infinity Fabric = 896 GB/s aggregate. Performance near-equivalent for all-reduce; MI300X wins on memory capacity and can eliminate gradient checkpointing.'
  common_mistake: |
    **The Pitfall:** Comparing peak interconnect bandwidth directly and concluding the nodes are identical.
    **The Rationale:** Candidates look at NVLink (900 GB/s) and Infinity Fabric (896 GB/s) and assume training performance will match.
    **The Consequence:** They ignore the massive disparity in memory capacity (80GB vs 192GB) and compute throughput, missing the architectural advantages of the MI300X for reducing gradient checkpointing.
  napkin_math: |
    - 70B model with TP=8: Each rank holds 70B / 8 = 8.75B params = 17.5 GB (BF16).
    - All-Reduce payload per step: 2 × (7/8) × 17.5 GB = 30.6 GB.
    - All-Reduce Time (at 900 GB/s): 30.6 GB / 900 GB/s ≈ 34 ms.
    - Compute Time (Batch=512): ~6 × 70B FLOPs × 512 = 215 TFLOPs.
    - H100 Compute time: 215 TFLOPs / 989 TFLOPS ≈ 217 ms.
    - **Conclusion:** Communication is only a ~15.6% overhead (34ms / 217ms), proving both fabrics provide near-equivalent, unbottlenecked scaling.
