title: Infinity Fabric vs NVLink for Scale-Up Topology
scenario: You are choosing between an 8x GPU NVLink node and an 8x GPU Infinity Fabric node for a 70B parameter LLM training job with TP=8.
question: For 70B LLM training with TP=8, how do 8x NVLink and 8x Infinity Fabric nodes compare on all-reduce and memory capacity?
details:
  realistic_solution: 'For 70B LLM in BF16: model weights = 140GB. 8-GPU node: 640GB total, 140GB fits with headroom for activations and optimizer states in mixed precision. High memory capacity 8-GPU nodes can hold full optimizer states in BF16 without offloading. All-reduce: both nodes have ~900 GB/s bandwidth. NVLink topology: fully connected NVSwitch, bisection bandwidth = 900 GB/s. Infinity Fabric peer-to-peer bandwidth depends on system topology (PCIe vs dedicated fabric on OAM modules). Infinity Fabric OAM: 7-link fabric = 896 GB/s aggregate. Performance near-equivalent for all-reduce; higher memory capacities win on avoiding gradient checkpointing.'
  common_mistake: |
    **The Pitfall:** Comparing peak interconnect bandwidth directly and concluding the nodes are identical.
    **The Rationale:** Candidates look at NVLink (900 GB/s) and Infinity Fabric (896 GB/s) and assume training performance will match.
    **The Consequence:** They ignore the massive disparity in memory capacity and compute throughput, missing the architectural advantages for reducing gradient checkpointing.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, TP=8, BF16 (2 bytes/param).
    - Link bandwidth: ~900 GB/s. Compute: ~989 TFLOPS. Batch=512.

    **Calculations:**
    - Weights per rank: 70B / 8 = 8.75B params = 17.5 GB.
    - All-Reduce payload per step: 2 × (7/8) × 17.5 GB = 30.6 GB.
    - All-Reduce Time (at 900 GB/s): 30.6 GB / 900 GB/s ≈ 34 ms.
    - Compute Time: ~6 × 70B FLOPs × 512 / 989 TFLOPS ≈ 217 ms.

    **Conclusion & Interpretation:**
    - **Result: Communication is ~15.6% overhead (34ms / 217ms), scaling efficiently on both (Compute-Bound)**.
