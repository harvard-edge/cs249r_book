title: SISA Exact Unlearning Cost
scenario: 'You operate a SISA (Sharded, Isolated, Sliced, Aggregated) ensemble for exact machine unlearning
  on a user dataset. The data is uniformly partitioned into S=20 isolated shards. Each shard is incrementally
  trained across R=4 sequential slices, with model checkpoints saved after each slice. The total ensemble
  training cost from scratch is 8,000 GPU-hours (training time is evenly distributed across all shards
  and slices). You receive a GDPR deletion request for 3 user records: Record A (Shard 2, Slice 3), Record
  B (Shard 2, Slice 4), and Record C (Shard 15, Slice 2). Calculate the minimum GPU-hours required to
  completely unlearn these records.'
details:
  realistic_solution: Rollback to the checkpoint immediately preceding the earliest affected slice in
    each shard and resume incremental training. For Shard 2, rollback to the Slice 2 checkpoint and retrain
    Slices 3 and 4. For Shard 15, rollback to the Slice 1 checkpoint and retrain Slices 2, 3, and 4.
  common_mistake: Candidates often assume the entire affected shards must be retrained from scratch (800
    GPU-hours), fail to realize Record B's unlearning is subsumed by Record A's rollback, or propose approximate
    gradient-ascent methods which violate strict exact unlearning guarantees.
  napkin_math: 'Cost per shard = 8,000 / 20 = 400 GPU-hours.

    Cost per slice = 400 / 4 = 100 GPU-hours.

    Shard 2: Earliest affected is Slice 3. Retrain Slices 3 and 4 -> 2 * 100 = 200 GPU-hours.

    Shard 15: Earliest affected is Slice 2. Retrain Slices 2, 3, and 4 -> 3 * 100 = 300 GPU-hours.

    Total unlearning cost = 200 + 300 = 500 GPU-hours.'
