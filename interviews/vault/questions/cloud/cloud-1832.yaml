title: Mitigating Memorization via Architectural Capacity Constraints
scenario: You are designing an LLM architecture to summarize sensitive financial documents, targeting
  deployment on an 8xA100 cluster. Initial tests with a 13B parameter architecture show high vulnerability
  to training data extraction attacks, where specific prompt injections cause the model to output exact
  social security numbers from its training corpus. You need to modify the fundamental model architecture
  to natively resist these attacks.
question: "What architectural changes would make the 13B financial summarization LLM natively resist training data extraction attacks?"
details:
  realistic_solution: Reduce the model's parameter count (e.g., scaling down from 13B to 3B or 7B) and
    implement an architectural abstention mechanism (e.g., an auxiliary confidence head). Lowering capacity
    forces the model to generalize rather than memorize rare PII sequences, effectively shrinking the
    attack surface.
  common_mistake: 'Relying exclusively on post-processing output filters or attempting to apply DP-SGD
    with excessive noise, which ruins the model''s summarization coherence, rather than addressing the
    root cause: excessive memorization capacity.'
  napkin_math: A 13B parameter model has approximately 26GB of weights (in FP16). If 0.1% of its capacity
    is inadvertently used to memorize rare training data, that's ~26MB of exact string storage. Shrinking
    to a 3B model (6GB weights) reduces this theoretical memorization capacity by >4x, forcing the network
    to discard rare point-wise memorization in favor of generalized features.
