title: The Translation API's Latency Crisis
scenario: 'You are an ML Systems Engineer responsible for a real-time translation API running on H100
  GPUs. The service has a strict P99 Time-To-First-Token (TTFT) SLA of 250ms. Users are complaining about
  slow initial responses. Your dashboard shows the following stable metrics:'
details:
  realistic_solution: The root cause is head-of-line blocking induced by the static batching strategy.
    A request's total time-to-first-token is its wait time in the queue plus the GPU's processing time.
    In the worst-case scenario, a request arrives just after a batch has been dispatched. It must wait
    the full 200ms timeout period before it can even be considered for processing. This wait time, when
    added to the 150ms prefill time, results in a P99 TTFT of 350ms, which violates the 250ms SLA. The
    high TPOT (throughput) is achieved at the expense of TTFT. The correct solution is to implement continuous
    batching (or 'dynamic batching'), which decouples batching from request arrival and can add incoming
    requests to an in-flight batch, dramatically reducing queueing delay.
  common_mistake: Engineers often focus exclusively on the model's execution time (service time), assuming
    a faster GPU or a smaller model is the only solution. They forget that in a queued system, the time
    a request spends waiting *before* execution is often the dominant factor in end-to-end latency.
  napkin_math: 'Total latency for first token: TTFT = T_queue_wait + T_batch_window + T_prefill. If static
    batching uses a 200ms window, T_batch_window = 200ms. If a new request arrives just after a batch
    starts, it waits for the current batch''s full generation (e.g., 50 tokens at 20ms/token = 1000ms).
    TTFT = 1000ms + 200ms + T_prefill = 1200ms+, destroying the 250ms SLA completely.'
  options:
  - The H100's prefill time of 150ms is too slow for this workload. The model needs to be optimized or
    run on newer hardware like a B200.
  - The system is experiencing head-of-line blocking. A request can wait in the queue for up to 200ms
    before processing even begins, pushing the total TTFT to 350ms.
  - The request arrival rate (150 req/s) is too high, overwhelming the system. The service needs more
    GPU replicas to handle the load.
  - Network latency between the user and the datacenter is the likely cause, adding 100-200ms of un-accounted-for
    delay to every request.
  correct_index: 1
