title: XCD Hot-Spot Thermal Management Under Sustained Load
scenario: 'In production, MI300X TDP readings are uniform but sustained throughput on one job type drops 12% after 30 minutes. rocm-smi shows temperature uniform across XCDs but frequency drops on XCDs 0 and 1.'
question: 'Why do XCDs 0 and 1 throttle and reduce throughput by 12% despite uniform MI300X TDP and temperatures, and how would you fix it?'
details:
  realistic_solution: 'XCDs 0 and 1 are throttling due to localized hotspots even though the package-level thermal sensor reads nominal. Root cause: the job''s memory access pattern creates non-uniform HBM utilization — XCDs 0-1 serve as the ''master'' ranks handling cross-XCD reduction which increases their compute and traffic load. Fix: (1) redistribute tensor parallel ranks so reduction work rotates across XCDs; (2) enable per-XCD frequency monitoring via rocm-smi --showclkfreq; (3) adjust power limit per XCD using ROCm SMI power cap features; (4) verify thermal interface paste distribution — chiplet packages with interposers can have uneven TIM coverage.'
  common_mistake: |
    **The Pitfall:** Assuming uniform TDP means uniform thermal load across all chiplets.
    **The Rationale:** Candidates look at the package-level aggregate sensor and ignore that specific workloads (like TP reduction ranks) can create localized hotspots on individual XCDs.
    **The Consequence:** The root cause is missed entirely, and the cluster continues to throttle silently.
  napkin_math: |
    * MI300X TDP: 750W over 8 XCDs = ~94W per XCD average.
    * If XCDs 0-1 carry 1.4x load: 130W each vs 83W for others.
    * Junction temperature delta: 130W * 0.08°C/W = 10.4°C above average.
    * **If average is 75°C, XCDs 0-1 hit 85.4°C, triggering the typical frequency throttle threshold.**
