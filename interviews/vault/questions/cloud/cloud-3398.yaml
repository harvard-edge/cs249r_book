title: 'Optimizing LLM Inference on AMD MI300X: Memory-Bound Operator Scheduling'
scenario: You are tasked with deploying a large language model (LLM) for inference
  on an AMD MI300X accelerator. The model has 70 billion parameters and requires significant
  memory and computational resources. The MI300X boasts 192 GB HBM3 and a memory bandwidth
  of 5.3 TB/s, with FP16 sparse performance up to 1,307 TFLOPS. Your current inference
  pipeline exhibits suboptimal throughput, and profiling reveals frequent data transfers
  between operators and underutilized HBM bandwidth. Analyze how the current operator
  scheduling could lead to this behavior, focusing on memory reuse, parallel operator
  execution, and layer fusion. Propose specific scheduling strategies to significantly
  improve performance, explaining *why* these strategies address the observed issues.
question: How would you reschedule operators on the MI300X to improve memory reuse,
  parallel execution, and layer fusion for the 70B LLM?
details:
  realistic_solution: Implement a dynamic operator scheduler that prioritizes memory
    reuse by identifying and scheduling operators that consume the same input tensors
    close together, minimizing HBM read/write cycles. Apply graph-level optimization
    passes to detect opportunities for layer fusion (e.g., fusing element-wise operations
    with convolutions or matrix multiplications) to reduce memory bandwidth pressure
    and kernel launch overhead. Utilize the MI300X's parallel processing capabilities
    by scheduling independent operators concurrently, taking care to manage shared
    resources. Consider techniques like tensor tiling and reordering to optimize data
    access patterns for the HBM3 architecture, ensuring coalesced memory access and
    maximizing the effective memory bandwidth of 5.3 TB/s.
  common_mistake: Failing to consider the entire compute graph for holistic optimization,
    instead focusing on individual operator performance in isolation. Overlooking
    the impact of memory access patterns and data locality on HBM bandwidth utilization,
    leading to frequent re-materialization of intermediate tensors or redundant data
    transfers between fused kernels. Neglecting potential opportunities for fine-grained
    parallelization across different tensor dimensions or across different parts of
    the graph.
  napkin_math: A 70B parameter model in FP16 requires 70B * 2 bytes = 140 GB of memory
    for weights alone, which fits within the 192 GB HBM3. However, activations and
    intermediate states can easily exceed this. If an intermediate tensor of 10 GB
    is repeatedly written and read from HBM3 due to poor scheduling, this consumes
    20 GB of bandwidth. At 5.3 TB/s, this transfer takes approximately (20 * 10^9
    bytes) / (5.3 * 10^12 bytes/s) ≈ 3.77 milliseconds. While seemingly small, repeated
    occurrences across many layers can significantly impact latency. Furthermore,
    the 1,307 TFLOPS FP16 sparse performance is substantial. If an operation is compute-bound,
    achieving high FLOPs is critical. If it's memory-bound, effective bandwidth utilization
    becomes the primary factor. A key calculation would be the operational intensity
    (FLOPS/Byte) of critical layers to determine whether they are compute or memory
    bound on the MI300X, guiding scheduling decisions.
