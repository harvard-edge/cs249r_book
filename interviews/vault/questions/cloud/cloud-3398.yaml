title: 'Optimizing LLM Inference on AMD MI300X: Memory-Bound Operator Scheduling'
scenario: You are tasked with deploying a 70 billion parameter LLM for inference on an accelerator. Your current inference pipeline exhibits suboptimal throughput, and profiling reveals frequent data transfers between operators and underutilized HBM bandwidth.
question: How would you reschedule operators to improve memory reuse, parallel execution, and layer fusion for the 70B LLM?
details:
  realistic_solution: 'Implement dynamic operator scheduling prioritizing memory reuse to minimize HBM reads/writes. Apply graph-level optimization for layer fusion (e.g., element-wise operations with GEMMs). Utilize parallel capabilities via tensor tiling.'
  common_mistake: |
    **The Pitfall:** Focusing on individual operator performance in isolation.
    **The Rationale:** Candidates often optimize kernels locally without considering global memory access patterns and data locality on HBM.
    **The Consequence:** Frequent re-materialization of intermediate tensors leads to massive redundant data transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model weights: 140 GB.
       - Bandwidth: 5.3 TB/s.
    2. **Calculations:**
       - Repeated R/W of a 10 GB tensor = 20 GB bandwidth.
       - Transfer time: 20 GB / 5.3 TB/s = ~3.77 ms per pass.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Kernel fusion is critical to prevent compounding latency.**
