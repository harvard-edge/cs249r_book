title: 'Optimizing LLM Inference on AMD MI300X: Memory-Bound Operator Scheduling'
scenario: 'You are tasked with deploying a 70 billion parameter LLM for inference on an AMD MI300X accelerator. Your current inference pipeline exhibits suboptimal throughput, and profiling reveals frequent data transfers between operators and underutilized HBM bandwidth.'
question: 'How would you reschedule operators on the MI300X to improve memory reuse, parallel execution, and layer fusion for the 70B LLM?'
details:
  realistic_solution: 'Implement a dynamic operator scheduler that prioritizes memory reuse by identifying and scheduling operators that consume the same input tensors close together, minimizing HBM read/write cycles. Apply graph-level optimization passes to detect opportunities for layer fusion (e.g., fusing element-wise operations with convolutions or matrix multiplications) to reduce memory bandwidth pressure and kernel launch overhead. Utilize the MI300X''s parallel processing capabilities by scheduling independent operators concurrently, taking care to manage shared resources. Consider techniques like tensor tiling and reordering to optimize data access patterns for the HBM3 architecture, ensuring coalesced memory access and maximizing the effective memory bandwidth of 5.3 TB/s.'
  common_mistake: |
    **The Pitfall:** Focusing on individual operator performance in isolation.
    **The Rationale:** Candidates often optimize kernels locally without considering the global memory access patterns and data locality on HBM.
    **The Consequence:** This leads to frequent re-materialization of intermediate tensors, redundant data transfers, and failing to achieve layer fusion benefits.
  napkin_math: |
    * **Model weights (70B, FP16):** 70B * 2 bytes = 140 GB.
    * **Intermediate tensor bandwidth penalty:** A 10 GB tensor repeatedly written/read consumes 20 GB of bandwidth per pass.
    * **Transfer time:** 20 GB / 5.3 TB/s ≈ 3.77 milliseconds.
    * **Conclusion:** Over many layers, this small latency compounds significantly, emphasizing that the workload is **memory-bandwidth bound**.
