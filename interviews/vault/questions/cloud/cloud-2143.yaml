title: The Feature Serving Latency Decomposition
scenario: Your search ranking model uses 150 batch features from a feature store and 20 real-time features computed on the fly. End-to-end serving P99 is 120ms against a 100ms SLA. The model inference takes 25ms.
question: "How would you break down the 95ms feature-serving overhead and optimize P99 below the 100ms SLA?"
details:
  realistic_solution: '**Latency decomposition**: (1) Feature store lookup (150 batch features via Redis MGET): ~25ms P99. (2) Real-time feature computation: ~45ms P99. (3) Feature assembly: ~5ms. (4) Network RTT (2 hops): ~20ms. Current architecture runs these sequentially: P99 = 25 + 45 + 5 + 20 = 95ms feature overhead + 25ms model = 120ms. **Key optimization — parallelize steps 1 and 2**: fetch batch features and compute real-time features concurrently. New feature P99 roughly max(25, 45) = 45ms. Total P99: 45 + 5 + 20 + 25 = 95ms. Meets 100ms SLA. Additional headroom: add local feature cache for batch features.'
  common_mistake: |
    **The Pitfall:** Assuming the 95ms overhead is entirely 'network latency' and trying to optimize the network.
    **The Rationale:** High external service latencies are often lazily grouped under "network issues".
    **The Consequence:** Engineers fail to realize that independent sequential steps add their latency, and parallelizing them takes the maximum, leading to ineffective hardware upgrades.
  napkin_math: |
    - Current P99: 120ms = 25ms model + 95ms feature overhead.
    - Feature overhead decomposition (sequential pipeline): Feature store P99 = 25ms, Real-time P99 = 45ms, Assembly = 5ms, Network = 20ms. Sum = 25+45+5+20 = 95ms.
    - Optimization 1 — Parallelize batch + real-time fetch: Parallel P99 ≈ max(25, 45) = 45ms. Total: 45 + 5 + 20 + 25 = 95ms < 100ms SLA.
    - Further optimizations: Local feature cache reduces batch P99 from 25ms to 5ms. Pre-compute real-time features reduces from 45ms to 5ms.
    - **Parallelization successfully drops the P99 latency below the 100ms SLA.**
  options:
  - The 95ms is dominated by network latency; upgrade from 10 Gbps to 25 Gbps NICs and add edge caching to reduce RTT from 95ms to under 75ms
  - Replace the feature store with an in-GPU embedding cache to eliminate all feature retrieval latency, reducing the pipeline to model inference time only (~25ms)
  - Increase the SLA to 150ms since 120ms P99 is already competitive; feature retrieval latency is inherently sequential and cannot be parallelized across different feature sources
  - Decompose the 95ms into feature store lookup (~25ms P99), real-time feature computation (~45ms P99), serialization (~5ms), and network RTT (~20ms); parallelize batch and real-time feature fetches to reduce total to ~95ms, meeting the 100ms SLA
