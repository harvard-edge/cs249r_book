title: Hardware Trojan Power Side-Channel Detection
scenario: A cloud provider suspects custom ML inference chips contain a dormant hardware Trojan that increments
  a 32-bit counter, adding 5 mW to the chip's dynamic power. The baseline power measurement noise is Gaussian
  with a standard deviation of 150 mW. You must detect the Trojan via power side-channel analysis by averaging
  N traces of a deterministic matrix multiplication workload. Calculate the minimum number of traces N
  needed to ensure the 3-sigma confidence bound of the averaged noise is less than or equal to the 5 mW
  Trojan signal.
details:
  realistic_solution: To reliably detect the 5 mW signal with 3-sigma confidence, the standard error of
    the mean (sigma_mean) must be at most 5 mW / 3 = 1.667 mW. Because the noise of averaged independent
    traces scales by 1/sqrt(N), we require 150 / sqrt(N) <= 1.667. Solving for N gives sqrt(N) >= 90,
    so N >= 8,100 traces.
  common_mistake: Assuming the noise scales linearly with the number of traces (N) instead of the square
    root of N, or forgetting the 3-sigma requirement and only solving for 1-sigma, which would incorrectly
    yield N=900.
  napkin_math: Target signal S = 5 mW. Required 3 * sigma_mean <= 5 mW -> sigma_mean <= 1.667 mW. sigma_mean
    = sigma_base / sqrt(N). 150 / sqrt(N) = 1.667 -> sqrt(N) = 90 -> N = 8100 traces.
