title: Hardware Trojan Power Side-Channel Detection
scenario: A cloud provider suspects custom ML inference chips contain a dormant hardware Trojan that increments a 32-bit counter, adding 5 mW to the chip's dynamic power. The baseline power measurement noise is Gaussian with a standard deviation of 150 mW. You must detect the Trojan via power side-channel analysis by averaging N traces of a deterministic matrix multiplication workload.
question: How many traces must you average so the 3-sigma noise bound is no more than the 5 mW Trojan signal?
details:
  realistic_solution: |
    To reliably detect the 5 mW signal with 3-sigma confidence, the standard error of the mean (sigma_mean) must be at most 5 mW / 3 = 1.667 mW. Because the noise of averaged independent traces scales by 1/sqrt(N), we require 150 / sqrt(N) <= 1.667. Solving for N gives sqrt(N) >= 90, so N >= 8,100 traces.
  common_mistake: |
    **The Pitfall:** Assuming noise scales linearly with the number of traces (N) instead of the square root.
    **The Rationale:** Candidates fail to apply the Central Limit Theorem correctly, or forget the 3-sigma requirement and only solve for 1-sigma.
    **The Consequence:** They calculate N=900 instead of N=8100, leaving the Trojan hidden in the noise floor.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target signal S: 5 mW.
    - Baseline noise σ: 150 mW.
    - Confidence bound: 3-sigma (3 * σ_mean ≤ 5 mW).

    **Calculations:**
    - Required standard error (σ_mean): ≤ 5 / 3 = 1.667 mW.
    - Standard error scaling: σ_mean = σ / sqrt(N).
    - 150 / sqrt(N) ≤ 1.667 => sqrt(N) ≥ 150 / 1.667 ≈ 90.
    - Required traces N: ≥ 90^2 = 8,100 traces.

    **Conclusion & Interpretation:**
    - **Result: 8,100 Traces (Statistical Confidence).** At least 8,100 traces must be averaged to reduce the noise bound below the 5 mW signal.
