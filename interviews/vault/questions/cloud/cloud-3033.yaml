title: 'Model Size Estimation: Master Full Memory Budget for LLM Training on H100'
scenario: 'Compute the full GPU memory budget for training a 13B parameter model on H100 (80GB HBM3) with batch size 4, sequence length 2048, using AdamW optimizer in BF16 with FP32 optimizer states (mixed precision). Include: model weights, gradients, optimizer states, activations with gradient checkpointing, and KV-cache for attention. Determine if it fits in a single H100.'
question: What is the full H100 memory budget for training the 13B model with AdamW BF16/FP32 states, and does it fit on one GPU?
details:
  realistic_solution: 'Weights BF16: 13B \times 2B = 26GB. Gradients BF16: 13B \times 2B = 26GB. Optimizer states FP32 (m + v): 13B \times 4B \times 2 = 104GB. Total for training: 26+26+104 = 156GB >> 80GB. Fix: use ZeRO-3 (sharded across 4 GPUs): 156/4 = 39GB per GPU. Plus activations with gradient checkpointing: saving boundaries and recomputing requires ~1.2GB for batch 4. Total per GPU: 39 + 1.2 = 40.2GB < 80GB \checkmark.'
  common_mistake: 'Forgetting optimizer states in the memory budget: AdamW stores momentum (m) and variance (v) in FP32, each the same size as the model parameters, creating a 3x memory multiplier on top of weights.'
  napkin_math: 'Weights: 26GB. Grads: 26GB. Adam m: 13B \times 4B = 52GB. Adam v: 52GB. Total: 156GB. Single H100: impossible. ZeRO-3 on 4xH100: 156/4 = 39GB. Activations (batch=4, seq=2048, hidden=5120): 4 \times 2048 \times 5120 \times 2B = 84MB per layer. With 40 layers, checkpointing every 4 layers stores 10 boundaries = 840MB. Recomputing 4 layers during backward adds 4 \times 84MB = 336MB. Total activation memory = 840MB + 336MB = 1.17GB. Total per GPU = 39GB + 1.17GB = 40.17GB < 80GB. Fits easily with ZeRO-3 on 4 H100s.'
