title: 'Model Size Estimation: Master Full Memory Budget for LLM Training on H100'
scenario: You are training a 13B parameter model on H100s (80GB HBM3) with batch size 4, sequence length 2048, using AdamW in BF16 with FP32 optimizer states. You use gradient checkpointing.
question: What is the full GPU memory budget including weights, gradients, optimizer states, and activations, and does it fit on a single H100?
details:
  realistic_solution: 'Weights BF16: 13B \times 2B = 26GB. Gradients BF16: 13B \times 2B = 26GB. Optimizer states FP32 (m + v): 13B \times 4B \times 2 = 104GB. Total for training: 26+26+104 = 156GB >> 80GB. Fix: use ZeRO-3 (sharded across 4 GPUs): 156/4 = 39GB per GPU. Plus activations with gradient checkpointing: saving boundaries and recomputing requires ~1.2GB for batch 4. Total per GPU: 39 + 1.2 = 40.2GB < 80GB \checkmark.'
  common_mistake: |
    **The Pitfall:** Forgetting the optimizer states and completely missing the FP32 inflation multiplier.
    **The Rationale:** Candidates often equate model size (13B) directly with memory (26GB), ignoring that AdamW retains historical momentum and variance for every parameter, typically in FP32 to preserve precision.
    **The Consequence:** Underestimating the true memory footprint by an astronomical 104GB, guaranteeing an instant OOM exception and a completely unworkable training plan.
  napkin_math: |
    1. **Weights & Gradients:** 13B × 2 bytes = 26 GB + 26 GB = 52 GB.
    2. **Optimizer States:** AdamW (FP32 momentum/variance) = 13B × 8 bytes = 104 GB.
    3. **Single GPU Total:** 156 GB $\gg$ 80 GB. **Impossible on one H100.**
    4. **ZeRO-3 (4 GPUs):** 156 GB / 4 = 39 GB per GPU.
    5. **Activations:** 4 (batch) × 2048 (seq) × 5120 (hidden) × 2 bytes = ~84 MB per layer.
    6. **Gradient Checkpointing:** 10 boundaries (840 MB) + 4 recomputed layers (336 MB) = 1.17 GB.
    7. **Final ZeRO-3 Footprint:** 39 GB + 1.17 GB = **40.17 GB**, fitting easily on an 80GB GPU.
