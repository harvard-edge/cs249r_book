title: 'TPU v5e Training Inefficiency: Diagnosing Data Curation Issues'
scenario: 'You are training a generative AI model on TPUs. The model converges slowly, loss oscillates, and downstream metrics drop on certain subsets. The hardware is fully utilized, ruling out infrastructure bottlenecks. The training data was collected via a semi-automated active learning pipeline with human annotation.'
question: 'How would you diagnose whether active-learning selection, annotation quality, inter-annotator agreement, or bias is causing the training instability?'
details:
  realistic_solution: 'A realistic solution involves a multi-pronged diagnostic approach:

    1.  **Data Drifting/Skew Detection:** Implement monitoring for feature distributions and label distributions over time and across different data sources. Perform statistical tests (e.g., KS-test, Wasserstein distance) on training vs. validation data.

    2.  **Error Analysis & Active Learning Audit:** Systematically sample and manually review examples where the model performs poorly (high loss, incorrect predictions). Trace these back to the active learning suggestions. Evaluate the inter-annotator agreement (e.g., using Kappa scores) specifically for these hard-to-classify samples and ensure annotation guidelines are clear and consistently applied.

    3.  **Bias Detection & Mitigation:** Use fairness metrics and subgroup analysis to check model performance across different demographic, geographic, or other relevant slices of data. Investigate if the active learning strategy inadvertently amplifies underrepresented biases by focusing on ''uncertain'' regions that might be sparsely populated.

    4.  **Data Quality Scorecard:** Develop a continuous data quality scorecard that includes metrics like label consistency, annotation speed vs. quality tradeoffs, and feature completeness. Use this to pinpoint stages in the data curation workflow that introduce errors.

    5.  **Small-Scale Controlled Experiments:** Conduct targeted experiments using a pristine, smaller dataset on the TPU v5e to establish a performance baseline, then gradually introduce subsets of the problematic data to isolate the issue.'
  common_mistake: |
    **The Pitfall:** Focusing solely on model architecture and hyperparameters while ignoring data pipeline quality.
    **The Rationale:** Engineers over-rely on the "efficiency" of active learning without continuous validation of annotation quality.
    **The Consequence:** Powerful accelerators process noisy labels at high speed, exposing inconsistent learning signals that ruin model convergence.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Throughput: 10,000 samples/sec.
       - Noisy Label Rate: 15%.
       - Compute per sample: 50 GFLOPs.
    2. **Calculations:**
       - Wasted samples = 10,000 * 0.15 = 1,500 samples/sec.
       - Wasted compute = 1,500 * 50e9 = 75 TFLOPS.
    3. **Conclusion & Interpretation:** **Result: Quality-Bound**. Approximately ~38% of the TPU's total BF16 compute capacity is actively wasted learning from data curation errors.
