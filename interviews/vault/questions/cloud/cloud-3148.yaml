title: Chunked Prefill Scheduling with FlashAttention
scenario: You run vLLM on 8x H100 serving a 70B model. A 16K-token prefill request takes 400ms, during which all decode requests stall (head-of-line blocking).
question: With a 50ms decode SLO and 30ms prefill budget on 8 H100s, what chunk size should chunked prefill use?
details:
  realistic_solution: 8 H100s × 989 TFLOPS × 0.03s / 140 GFLOPs_per_token = 1,695 tokens in 30ms window (not 212 which uses single GPU).
  common_mistake: |
    **The Pitfall:** Setting chunk size too large or too small.
    **The Rationale:** Candidates either set it to 4096 (which still causes 100ms stalls, missing the SLA) or 128 (which adds excessive kernel launch overhead). They also frequently miscalculate by using a single GPU's FLOPs instead of the 8-GPU aggregate.
    **The Consequence:** Failing to hit the 50ms latency SLA or severely underutilizing the H100s.
  napkin_math: |
    - **FLOPs per token:** ~140 GFLOPs (for a 70B model).
    - **Total Compute (8x H100):** 8 * 989 TFLOPS = 7,912 TFLOPS.
    - **Budget:** 30 ms = 0.03 seconds.
    - **Tokens in Budget:** (7,912 TFLOPS * 0.03 s) / 140 GFLOPs.
    - **Result:** **237.36 TFLOPs / 140 GFLOPs = ~1,695 tokens.**
