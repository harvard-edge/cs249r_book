title: PCIe Bottleneck for Swapping LoRA Adapters
scenario: An 8x H100 node serves a frozen 70B FP16 model from HBM3. It dynamically
  swaps in 100 unique LoRA adapters (100MB each) from host CPU memory per request
  batch via PCIe Gen5 (64 GB/s).
question: Analyze the latency penalty added to the token generation phase strictly
  due to fetching these adapters from the CPU.
details:
  realistic_solution: Fetching 100 adapters of 100MB each requires transferring 10GB
    of data. Over PCIe Gen5 at 64 GB/s, this transfer takes 10GB / 64 GB/s = 156ms
    per batch, severely bottlenecking the system.
  common_mistake: Using the massive HBM3 bandwidth (3.35 TB/s) to calculate the transfer
    time, ignoring that CPU-to-GPU transfers rely on the much slower PCIe bus.
  napkin_math: 100 * 100MB / 64GB/s = 156ms
