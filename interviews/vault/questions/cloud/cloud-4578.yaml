title: PCIe Bottleneck for Swapping LoRA Adapters
scenario: An 8x H100 node serves a frozen 70B FP16 model from HBM3. It dynamically swaps in 100 unique LoRA adapters (100MB each) from host CPU memory per request batch via PCIe Gen5 (64 GB/s).
question: What is the latency penalty added to token generation strictly from fetching these adapters over PCIe?
details:
  realistic_solution: Fetching 100 adapters of 100MB each requires transferring 10GB of data. Over PCIe Gen5 at 64 GB/s, this transfer takes 10GB / 64 GB/s = 156ms per batch, severely bottlenecking the system.
  common_mistake: |
    **The Pitfall:** Using the massive HBM3 bandwidth (3.35 TB/s) to calculate the transfer time.
    **The Rationale:** Candidates forget that swapping from host CPU memory relies on the much slower PCIe bus, not the internal GPU memory bandwidth.
    **The Consequence:** The latency penalty is severely underestimated, leading to a bottlenecked serving architecture.
  napkin_math: |
    * **Total Data Transfer:** 100 adapters × 100MB = 10,000MB = 10GB.
    * **PCIe Gen5 Bandwidth:** 64 GB/s.
    * **Transfer Time:** 10GB / 64 GB/s = 0.15625 seconds.
    * **Conclusion:** The latency penalty is **~156ms per batch**.
