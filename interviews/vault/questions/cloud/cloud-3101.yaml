title: 'TCO Mastery: Build vs Buy Decision for LLM Training Infrastructure'
scenario: Make a data-driven build-vs-buy decision for a company planning to train a 70B model quarterly. Build requires $30M for 256 H100 cluster (DGX SuperPOD equivalent), 5-year lifespan, 0.25 FTE ops, 500kW datacenter contract at $80/kW-month. Buy requires $2.50/hr/H100. Training run takes 2 weeks on 256 H100s. Assume 4 runs/year.
question: What is the correct annual power cost for a 256-H100 cluster at 700W per GPU, $0.08/kWh, and PUE 1.3?
details:
  realistic_solution: 'Power cost: 256 H100s × 700W × 8760hr × $0.08/kWh × PUE 1.3 = ~$163,200/yr.'
  common_mistake: |
    **The Pitfall:** Comparing total CapEx vs rental without normalizing to actual utilization and miscalculating power by an order of magnitude.
    **The Rationale:** Candidates often forget that the build option may be dramatically over-provisioned if the cluster sits idle 95% of the time between training runs, and they easily make a 10× math error in the power cost calculation.
    **The Consequence:** Recommending a $30M CapEx build for a cluster that will sit largely idle, resulting in millions of dollars in wasted capital.
  napkin_math: |
    - **Power consumption:** 256 H100s × 0.7kW = **179.2 kW**.
    - **Annual usage:** 179.2 kW × 8760 hr/year = **1,569,792 kWh**.
    - **Energy cost:** 1,569,792 kWh × $0.08/kWh = **$125,583.36**.
    - **Total Power Cost with PUE:** $125,583.36 × 1.3 PUE = **$163,258.37** (approx **$163.2K/yr**).
