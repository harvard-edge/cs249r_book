title: Transformer Cost Implement: Chinchilla Optimal Model Size Calculation
scenario: Implement the Chinchilla optimal model size and token count for a fixed compute budget of $100K on H100 ($2.50/hr, 40% MFU). Chinchilla optimal: N* = (C/6)^0.5 * (D/N)^0.5 where optimal D/N = 20.
question: For a $100K H100 budget, what Chinchilla-optimal model size and token count should you train, and how does it compare to a 7B run?
details:
  realistic_solution: Derive the total FLOPs C from the budget, then explicitly use the compute constraint C = 6*N*D to calculate N* and D* jointly.
  common_mistake: |
    **The Pitfall:** Using the simplified Chinchilla rule (D=20*N) without accounting for the fixed compute budget.
    **The Rationale:** Engineers fail to realize that the compute budget C = 6*N*D determines both N and D jointly, not independently.
    **The Consequence:** Suboptimal model sizing that fails to maximize performance for a given monetary budget.
  napkin_math: |
    1. **Calculate Compute Budget (C):** C = ($100K / $2.50) × 3600s × 989e12 × 0.4 ≈ 5.695e22 FLOPs.
    2. **Calculate Optimal Model Size (N*):** N* = √(C/120) = √(5.695e22 / 120) ≈ 21.8B parameters.
    3. **Calculate Optimal Tokens (D*):** D* = 20 × 21.8B = 436B tokens.
    4. **Compare to 7B Model:** 7B model trains on D = 5.695e22 / (6 × 7e9) = 1.356T tokens.
    **Final Result: The optimal configuration is a ~22B model trained on ~436B tokens, outperforming a 7B model trained on 1.356T tokens for the same budget.**
