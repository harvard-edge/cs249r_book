title: Optimizing Large Model Training with Mixed-Precision on Google TPU v5e
scenario: You are training a 70B parameter LLM on a single TPU v5e using FP32 for weights and activations, with a batch size of 1. You are encountering out-of-memory errors and achieving significantly lower throughput than expected.
question: How would you diagnose the OOM and low throughput for a 70B FP32 LLM on a TPU v5e and design a mixed-precision strategy to fix it?
details:
  realistic_solution: Implement mixed-precision training using BF16 for activations and weights where possible, while keeping a copy of weights in FP32 for updates. Crucially, apply dynamic loss scaling to prevent vanishing gradients. To manage memory, consider gradient accumulation to simulate larger batch sizes, utilize techniques like parameter sharding (e.g., within data parallelism) to distribute model parameters across multiple TPUs (if available, though the scenario focuses on a single v5e), or explore more memory-efficient optimizers or quantization-aware training. For the given 70B parameter model on a single TPU v5e, it's highly likely that full model parameters won't fit even in BF16, let alone optimizer states. The most realistic solution would involve partitioning the model or using advanced techniques like 'ZeRO' (Zero Redundancy Optimizer) if implemented on TPUs, or data parallelism across multiple TPUs. If constrained to a *single* TPU v5e, the candidate should acknowledge the limitations and suggest techniques to fit the largest possible portion, or propose distributed training.
  common_mistake: |
    **The Pitfall:** Simply switching to BF16 without implementing proper loss scaling or considering optimizer state memory.
    **The Rationale:** Candidates often assume changing the data type is a silver bullet and overlook the memory footprint of states like Adam's momentum and variance, or the risk of vanishing gradients.
    **The Consequence:** The model still OOMs due to optimizer states, or training diverges due to numerical underflow.
  napkin_math: |
    1. **Model Size (FP32):** 70B params × 4 bytes = 280 GB. Exceeds 16 GB HBM significantly.
    2. **Optimizer States:** 280 GB × 2 (Adam) = 560 GB. Total FP32 = 840 GB.
    3. **Model Size (BF16):** 70B params × 2 bytes = 140 GB. Still far exceeds 16 GB HBM.
    4. **Mixed Precision:** 140 GB (BF16) + 560 GB (FP32 optim states) = 700 GB.
    **Conclusion:** Even in BF16, a 70B model cannot fit on a single 16 GB TPU; model parallel sharding across multiple TPUs is mathematically required.
