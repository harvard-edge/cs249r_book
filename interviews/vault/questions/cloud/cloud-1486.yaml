title: Layer Normalization Memory Cost
scenario: You are deploying a large Transformer model on a single NVIDIA A100 GPU (2039 GB/s memory bandwidth)
  and profiling the time spent in Layer Normalization. You are processing a batch of 8 sequences, each
  of length 1024, with a hidden dimension of 4096 in FP16 precision (2 bytes per element). A naive LayerNorm
  implementation reads the input tensor to compute the mean, reads it again to compute the variance, and
  reads it a third time to apply the normalization and write the output. Calculate the total memory traffic
  (in MB) and the theoretical minimum execution time for this naive LayerNorm, and compare it to a fully
  fused implementation.
question: "What are the naive LayerNorm memory traffic and theoretical time on the A100, and how do they compare with a fused implementation?"
details:
  realistic_solution: Calculate memory traffic for LayerNorm. Tensor size = 8 * 1024 * 4096 * 2 bytes
    = 67.1MB. Naive implementation requires 3 reads (mean computation, variance computation, normalization)
    and 1 write = 4 * 67.1MB = 268.4MB, taking 131us at 2039 GB/s. A fused kernel requires only 1 read
    and 1 write = 2 * 67.1MB = 134.2MB, taking 65us. Kernel fusion cuts execution time in half by halving
    HBM traffic.
  common_mistake: Focusing on FLOPs instead of memory bandwidth. LayerNorm has very low arithmetic intensity
    and is strictly memory-bound on modern accelerators, so optimization must target memory traffic reduction,
    not compute efficiency.
  napkin_math: Tensor size = 8 (batch) * 1024 (seq) * 4096 (dim) * 2 bytes = 67.1 MB. Naive memory traffic
    = 3 reads + 1 write = 4 * 67.1 MB = 268.4 MB. Naive execution time = 268.4 MB / 2039 GB/s = 0.131
    ms. Fused memory traffic = 1 read + 1 write = 2 * 67.1 MB = 134.2 MB. Fused execution time = 134.2
    MB / 2039 GB/s = 0.065 ms. Kernel fusion cuts the memory traffic and execution time in half.
