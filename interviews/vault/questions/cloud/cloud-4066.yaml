title: Designing RDMA Buffer Pool for AllReduce Pipelining
scenario: 'You need to design the RDMA buffer pool for a 256-H100 AllReduce implementation. The AllReduce uses ring algorithm with pipelining: while one chunk is being sent over the network, the next chunk is being reduced locally. This requires at least double-buffering.'
question: How would you allocate the RDMA buffer pool for a 2GB, 8-stage pipelined ring AllReduce on 256 H100s?
details:
  realistic_solution: 'Design parameters: gradient = 2GB, pipeline stages = 8, ring AllReduce has reduce-scatter + all-gather phases. Chunk size = 2GB / 8 = 256MB per pipeline stage. Buffer requirements per phase: (1) Reduce-scatter: each stage needs 3 buffers per chunk: send_buf (data being sent via RDMA Write), recv_buf (incoming data from predecessor), and reduce_buf (local gradient being accumulated). With 8-stage pipeline: 8 × 3 = 24 buffers. But with double-buffering (overlap send/recv of chunk K with reduce of chunk K+1): 2 × 3 = 6 buffer sets, each 256MB = 6 × 256MB = 1.5GB for reduce-scatter. (2) All-gather: simpler — 2 buffers per stage (send + recv) × double-buffered = 4 × 256MB = 1GB. Total: 1.5 + 1.0 = 2.5GB of GPU memory for RDMA buffers. Plus the original 2GB gradient = 4.5GB total. On H100 (80GB HBM3): 4.5GB/80GB = 5.6% of memory. NCCL''s actual implementation: NCCL_BUFFSIZE default = 4MB with many fine-grained chunks, using ~96MB total buffer — far more memory-efficient than our 2.5GB design because it uses many small chunks (not 8 large ones), hiding network latency with fine-grained pipelining while using minimal buffer space.'
  common_mistake: |
    **The Pitfall:** Allocating only 2 buffers (basic double buffering) for a pipeline with many stages.
    **The Rationale:** Assuming that simple send/receive overlapping is sufficient, without accounting for all in-flight chunks and reduction intermediates in an 8-stage pipeline.
    **The Consequence:** Severe pipeline stalls and hardware idling, as RDMA writes block on buffers still required for local reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2GB gradient, 8 pipeline stages.
       - 256 H100s. Double-buffered pipeline.
    2. **Calculations:**
       - Chunk Size: 2GB / 8 = 256MB.
       - Reduce-Scatter Buffers: 6 buffers (double-buffered send, recv, reduce) * 256MB = 1.5GB.
       - All-Gather Buffers: 4 buffers (double-buffered send, recv) * 256MB = 1.0GB.
       - Total Custom Design: 1.5GB + 1.0GB = 2.5GB.
       - NCCL Comparison: 4MB chunk * 8 slots * 3 buffers = ~96MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Allocation.** Large chunks (256MB) consume 2.5GB (16x more memory) compared to NCCL's highly optimized fine-grained 4MB chunks.
