title: KV Cache Checkpoint Bandwidth
scenario: You are designing a fault-tolerant serving system for a 70B parameter LLM (80 layers, 8 KV heads,
  128 head dimension, FP16 precision) used for long-context customer support. Sessions often reach 16,000
  tokens. To avoid expensive prefill recomputation during spot instance preemptions, you propose checkpointing
  the full KV cache of 50 concurrent active sessions to a remote Redis cluster every 5 seconds. Calculate
  the required network bandwidth for this snapshot approach and determine if it is viable on standard
  100 Gbps network interfaces.
details:
  realistic_solution: Calculate the total KV cache per session (5.24 GB) and overall required bandwidth
    (52.4 GB/s or ~419 Gbps). Conclude that full snapshots over a 100 Gbps link are impossible, and recommend
    asynchronous delta-checkpointing (sending only newly generated tokens since the last checkpoint) instead.
  common_mistake: Calculating the KV cache size incorrectly (e.g., forgetting the factor of 2 for both
    K and V tensors) and failing to recognize that the required bandwidth vastly exceeds standard 100
    Gbps network limits.
  napkin_math: 'Bytes per token = 2 (K,V) * 80 (layers) * 8 (KV heads) * 128 (dim) * 2 bytes (FP16) =
    327.68 KB.

    Session KV size = 327.68 KB * 16,000 tokens = 5.24 GB.

    Total data per checkpoint = 5.24 GB * 50 sessions = 262 GB.

    Required Bandwidth = 262 GB / 5 seconds = 52.4 GB/s.

    Convert to Gbps: 52.4 * 8 = 419 Gbps.

    Since 419 Gbps > 100 Gbps, this full-snapshot approach is network-bound and unviable.'
