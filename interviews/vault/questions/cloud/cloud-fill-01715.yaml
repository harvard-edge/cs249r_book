title: A100 Guardrail Latency and Compute Budget for Responsible AI
scenario: 'Your team is deploying a critical large language model (LLM) service in the cloud, leveraging
  NVIDIA A100 GPUs (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth). As part of your Responsible
  AI framework, a bias detection guardrail model runs sequentially after each LLM inference. The total
  end-to-end latency for a request (LLM + guardrail) must not exceed 200ms.

  The LLM inference on a single A100 takes 170ms.

  The guardrail model requires 15 GB of HBM2e and needs to perform a total of 1.5e15 FP16 floating-point
  operations (1.5 PetaFLOPs) for its inference.

  Calculate the *minimum average FP16 TFLOPS rate* the A100 must sustain while executing the guardrail
  model to meet the remaining latency budget. Then, express this required rate as a percentage of the
  A100''s peak 312 TFLOPS FP16 capacity.'
question: "What minimum average FP16 TFLOPS must the A100 sustain for the guardrail model, and what percentage of the 312 TFLOPS peak is that?"
details:
  realistic_solution: 'The candidate should first calculate the remaining time for the guardrail: 200ms
    (total budget) - 170ms (LLM inference) = 30ms. This 30ms must be converted to seconds (0.03 seconds).
    The guardrail''s total operations are 1.5 PetaFLOPs (1.5e15 FP16 FLOPs). The required TFLOPS rate
    is then 1.5e15 FLOPs / 0.03 s / 1e12 = 50,000 TFLOPS — far beyond the A100''s 312 TFLOPS peak. This
    means the guardrail as specified is computationally infeasible within the 30ms window; it would require
    ≈4.8 seconds at full A100 utilization. A robust solution would also consider implementing efficient
    model architecture for the guardrail, leveraging kernel optimizations, and potentially exploring quantization
    (e.g., INT8) if accuracy allows, to ensure it can consistently meet this performance target.'
  common_mistake: Forgetting to convert milliseconds to seconds for rate calculations, or confusing total
    operations (FLOPs) with a TFLOPS rate. Another common error is to ignore the sequential nature of
    LLM and guardrail execution, or to miscalculate the remaining latency budget, thereby over-allocating
    time or compute.
  napkin_math: '1. Remaining time for guardrail: 200ms - 170ms = 30ms = 0.03 seconds.

    2. Guardrail total operations: 1.5e15 FP16 FLOPs.

    3. Required TFLOPS rate = Total FLOPs / Time in seconds / 1e12 = 1.5e15 / 0.03 / 1e12 = 50,000 TFLOPS.

    4. This required rate of 50,000 TFLOPS far exceeds the A100''s 312 TFLOPS peak, meaning the guardrail
    cannot fit in the 30ms window with this compute budget. The guardrail workload (1.5 PFLOPs) would
    require approximately 1.5e15 / 312e12 ≈ 4.8 seconds at peak A100 utilization.'
