title: The Agent Tool-Call Latency Budget
scenario: Your AI agent can call up to 5 tools per user query. Each tool call requires a full LLM inference
  (TTFT 200ms + 50-token reasoning at 25ms/token = 1.45s per step), plus tool execution (avg 300ms). The
  user expects a response within 10 seconds. How many sequential tool calls can you afford, and how do
  you design the system to stay within budget?
question: "How many sequential tool calls can you afford, and how do you design the system to stay within budget?"
details:
  realistic_solution: 'Each tool-call round costs: LLM inference (1.45s) + tool execution (0.3s) = 1.75s.
    Within a 10s budget: 10 / 1.75 = 5.7, so 5 rounds fit — barely. But this ignores the final synthesis
    step (200ms TTFT + 200-token generation at 25ms/token = 5.2s). Realistic budget: 10s - 5.2s final
    generation = 4.8s for tool calls → 4.8 / 1.75 = 2.74 → 2 tool rounds. Solutions: (1) use speculative
    tool calling — predict likely tool calls and execute them in parallel before the LLM decides, (2)
    use a smaller/faster ''routing'' model (TTFT 30ms, 15ms/token) for tool selection, reserving the large
    model for final synthesis, (3) stream intermediate results to the user to hide latency, (4) cache
    frequent tool-call results (e.g., same SQL query within a session).'
  common_mistake: Assuming all 5 tool calls can happen in parallel. Agentic workflows are inherently sequential
    — the LLM decides which tool to call based on the result of the previous tool call.
  napkin_math: 'Single tool loop: 200ms TTFT + (50 tokens * 25ms) + 300ms execution = 1.75s. Final synthesis
    step: 200ms TTFT + (200 tokens * 25ms) = 5.2s. Total time for N tools = (N * 1.75s) + 5.2s. For N=2:
    3.5s + 5.2s = 8.7s (Fits 10s budget). For N=3: 5.25s + 5.2s = 10.45s (Fails budget). Max tools = 2.'
