title: Designing an Autograd Engine From Scratch
scenario: 'You are designing a minimal autograd engine for a new ML framework. The engine must support:
  (a) arbitrary DAG-structured computational graphs, (b) gradient accumulation when a tensor is used multiple
  times, and (c) memory-efficient backward pass. Describe the data structures and algorithm, and explain
  why topological sort is essential for correctness.'
question: "How would you design the autograd engine's data structures and backward algorithm, and why is topological sort essential?"
details:
  realistic_solution: 'Data structures: Each tensor node stores: (1) its value, (2) a pointer to its creator
    operation (grad_fn), (3) an accumulated gradient buffer (initially None). Each operation node stores:
    (1) the backward function, (2) pointers to input tensor nodes, (3) saved tensors for backward. Algorithm:
    (1) Topological sort of the graph from loss to inputs (reverse BFS/DFS with visit counting). (2) Process
    nodes in reverse topological order. For each operation, call its backward function with the output
    gradient, then ADD (not replace) the resulting input gradients to each input tensor''s gradient buffer.
    Why topological sort is essential: if tensor X feeds into both operations A and B, and B depends on
    A''s output, we must process B before A to ensure X''s gradient accumulates contributions from both
    paths. Without topological ordering, we might process A first and pass X''s incomplete gradient downstream.
    Memory optimization: free saved tensors immediately after backward function executes. This is why
    PyTorch''s retain_graph=False (default) frees the graph during backward, reducing peak memory by up
    to 2x.'
  common_mistake: Implementing backward as a naive recursive DFS from the loss node, which can compute
    gradients for shared nodes multiple times (exponential blowup) or miss accumulated gradients from
    multiple consumers.
  napkin_math: 'A naive recursive autograd visits paths O(2^depth) for diamond graphs (e.g., residual
    connections). A 100-layer transformer has ~400 nodes (V) and ~600 edges (E). Recursive visits: ~2^100
    ops (intractable, takes longer than universe lifespan). Topological sort with gradient accumulation
    takes O(V + E) = 400 + 600 = 1000 operations. Memory-efficient backward clears tensors once ref_count
    == 0.'
