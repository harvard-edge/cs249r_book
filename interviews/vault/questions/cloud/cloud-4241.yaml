title: 'Designing a custom autograd function for a differentiable rendering operation'
scenario: 'You are building a differentiable neural radiance field (NeRF) renderer that requires a custom ray-marching operation on H100 (989 TFLOPS FP16, 3.35TB/s). The operation is not expressible as composition of standard PyTorch ops and requires a hand-written CUDA kernel. You need to integrate it into the autograd graph.'
question: 'How would you wrap the custom H100 ray-marching CUDA kernel so gradients flow through PyTorch autograd?'
details:
  realistic_solution: 'Subclass torch.autograd.Function. In forward(), call the CUDA kernel via a loaded extension and use ctx.save_for_backward() for needed intermediates. In backward(), implement the analytical gradient of the ray-marching operation and call the adjoint CUDA kernel. Register with @staticmethod and use apply() at call sites. Use gradcheck() with double precision to validate correctness.'
  common_mistake: 'Implementing the CUDA kernel but wrapping it in a regular Python function, preventing autograd from computing gradients through it. Alternatively, trying to use .detach() in the middle of the computation and manually backpropagating, which breaks the gradient tape.'
  napkin_math: |
    **Assumptions & Constraints:**
    - NeRF ray marching: 512 rays * 256 samples * 8 feature dims = 1M operations.
    - Hardware: H100 at 989 TFLOPS.

    **Calculations:**
    - Forward kernel: <1ms execution time.
    - Backward kernel (adjoint): 1.5-2x more expensive due to scatter operations (<2ms).

    **Conclusion & Interpretation:**
    - **Result: ~5-10ms total gradient step (Compute-Bound)**. Wrapping the custom CUDA kernel correctly ensures the adjoint runs efficiently in the backward pass.
