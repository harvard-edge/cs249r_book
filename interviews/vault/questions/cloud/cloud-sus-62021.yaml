title: Tail Latency of Decode Under Mixed Workloads
scenario: Your decode pool shows P50 TPOT of 35 ms and P99 TPOT of 280 ms — an 8× tail ratio. The workload
  mix is 70% short-output requests (≤50 tokens) and 30% long-output requests (500–2000 tokens). The decode
  GPU is an H100. Identify the mechanism causing the tail and design a priority scheduling intervention
  with quantified impact.
details:
  realistic_solution: 'When long-output requests accumulate in the batch, they hold KV-cache slots for
    hundreds of steps. At high occupancy (e.g., 90% of KV pool used by long requests), each decode step
    processes a large batch. The H100 is bandwidth-bound at decode: at batch size B, step time = max(model_weight_read
    / HBM_bw, compute). With many long requests in batch, step time is ~constant at ~42 ms (140 GB / 3.35
    TB/s for 70B). Short requests entering this batch wait for each step the same as long requests — no
    priority. A short request that generates 50 tokens spends 50 × step_time = 50 × 42 ms = 2.1 s if unlucky
    enough to enter when batch is saturated. Fix: separate decode queues for short vs. long outputs. Short-output
    queue (predicted ≤50 tokens) gets absolute priority: the scheduler reserves 20% of batch slots for
    short requests. When short-output queue is non-empty, long requests cannot fill those slots. Result:
    P99 TPOT for short requests drops from 280 ms to ~50 ms (2 batch-lengths of wait + 1 step). P99 for
    long requests may increase slightly (5-10%).'
  common_mistake: Attributing tail TPOT to memory bandwidth variability or thermal throttling — these
    cause 10-20% variance, not 8×. The 8× ratio points to head-of-line blocking from large batches of
    co-scheduled long-output requests.
  napkin_math: 'H100 decode step time for 70B: 140 GB / 3.35 TB/s = 41.8 ms/step. Short request (50 tokens):
    total time = 50 × 41.8 ms = 2.09 s if no priority. With priority, short request waits at most 2 steps
    behind other short requests: wait = 2 × 41.8 ms = 83.6 ms + 50 × 41.8 ms for own decode = 2.17 s.
    The priority helps TPOT (per-step wait), not total time. P99 TPOT: without priority — step time inflated
    by large batch ≈ 42 ms × (B/B_short) overhead. With priority, short requests always find a batch slot
    within 1-2 steps: TPOT wait reduced from 7+ steps to ≤2 steps → P99 TPOT: 2 × 42 = 84 ms vs 280 ms
    = 3.3× improvement.'
