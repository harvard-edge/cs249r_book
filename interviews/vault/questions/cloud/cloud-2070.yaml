title: The Pipeline Debt Diagnosis
scenario: Your ML team has grown from 3 to 15 engineers over 18 months. The average time from 'experiment starts' to 'model in production' has increased from 2 weeks to 8 weeks, despite faster GPUs and more compute budget. The team is working harder but shipping slower.
question: What are the three most likely sources of the 2-to-8-week production slowdown as the team grew to 15 engineers, and how would you fix them?
details:
  realistic_solution: 'Three sources of scaling debt: (1) Resource contention: 15 engineers sharing a fixed GPU cluster creates queueing delays. If 5 engineers submit 48-hour jobs and the cluster has 4 slots, the 5th waits 48 hours. Solution: priority scheduling with preemption, or dynamic cloud bursting. (2) Pipeline fragmentation: each engineer has their own data loading, preprocessing, and evaluation scripts. Debugging someone else''s pipeline takes 2-3× longer than your own. Solution: standardized pipeline templates with shared evaluation harnesses. (3) Integration bottleneck: with 15 people committing to the same codebase, merge conflicts and broken experiments multiply quadratically with team size (per Brook''s Law). A team of 15 has 105 communication channels vs 3 for a team of 3. Solution: modular experiment configs (YAML/Hydra) that separate experiment definition from pipeline code.'
  common_mistake: |
    **The Pitfall:** Blaming individual productivity.
    **The Rationale:** Management assumes "we need better engineers" or "people are slacking off" rather than recognizing coordination overhead.
    **The Consequence:** Companies fire good engineers and enforce stricter deadlines without fixing the actual pipeline debt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Brook's Law Formula: Channels = n(n-1)/2.
    - Coordination Cost: 30 mins/channel/week per person.

    **Calculations:**
    - Team of 3: 3(2)/2 = 3 communication channels.
    - Team of 15: 15(14)/2 = 105 communication channels.
    - Coordination Cost (Team of 3): 3 channels * 2 people/channel * 0.5 hrs = 3 person-hours/week.
    - Coordination Cost (Team of 15): 105 channels * 2 people/channel * 0.5 hrs = 105 person-hours/week.

    **Conclusion & Interpretation:**
    - **Result: 105 person-hours/week (Coordination-Bound)**. Coordination alone consumes more than two full-time engineers' output (105 hours), driving the slowdown.
