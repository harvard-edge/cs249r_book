title: 'Fault Tolerance: Optimize Checkpoint Write Throughput on Lustre Filesystem'
scenario: Your 256 H100 training job writes checkpoints to a Lustre filesystem at only 15 GB/s (measured)
  vs the theoretic 200 GB/s peak. Each checkpoint is 140GB and takes 9.3 seconds. Diagnose the Lustre
  bottleneck and optimize to achieve at least 60% of peak throughput (120 GB/s).
question: "Why is Lustre writing checkpoints at only 15 GB/s, and how would you tune it to reach at least 120 GB/s?"
details:
  realistic_solution: 'Common Lustre bottlenecks: (1) Default stripe count = 1 (single OSS) → fix: stripe
    across all OSSs. (2) All ranks writing at the same time with lock contention on MDT. (3) Small I/O
    requests (4KB vs optimal 64MB). Profile with lfs and iostat.'
  common_mistake: Blaming network bandwidth without profiling whether the bottleneck is metadata ops,
    stripe misconfiguration, or node-level I/O serialization.
  napkin_math: 'Observed: 15 GB/s out of 200 GB/s = 7.5% efficiency. 256 nodes writing 140GB/256 = 547MB
    each. If stripe count = 1: all 256 nodes write to same OSS. One OSS: 200GB/256 nodes = 781MB/s → 547MB
    / 781MB/s = 0.70 seconds/checkpoint — but actual 9.3 seconds due to serialization. Fix: stripe count
    = 32 OSSs (lfs setstripe -c 32). Each OSS serves 256/32 = 8 nodes. 8 × 781MB/s = 6.25 GB/s per OSS
    × 32 = 200 GB/s aggregate. Expected: 140GB / 200GB/s = 0.7 seconds. With 64MB stripe size: 547MB /
    64MB = 8.5 large I/O ops per node → minimal lock contention. Realistic: 120 GB/s = 1.17 seconds. Speedup:
    9.3/1.17 = 7.9×.'
