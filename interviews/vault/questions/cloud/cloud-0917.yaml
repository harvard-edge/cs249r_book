title: Low Traffic Latency Spikes
scenario: A fraud detection model has a strict p99 SLA of 100ms. The model execution time is T(b) = 20ms + 2ms * b. The serving system uses dynamic batching with max_batch_size = 16 and a static batching_window = 80ms. During peak load (500 QPS), the p99 latency is a healthy 84ms. However, during off-peak hours (5 QPS), automated alerts trigger because the p99 latency spikes to 102ms, consistently violating the SLA.
question: Why does p99 latency worsen at 5 QPS, and what maximum batching_window guarantees the 100ms SLA?
details:
  realistic_solution: 'Reduce the batching_window to 48ms. To guarantee SLA compliance under all arrival patterns, the maximum allowed window must satisfy: Window + T(max_batch) <= SLA.'
  common_mistake: |
    **The Pitfall:** Assuming high latency is always caused by compute bottlenecks or queue buildup.
    **The Rationale:** Engineers instinctively scale up GPUs or reduce max batch size instead of diagnosing the static timeout penalty in dynamic batching.
    **The Consequence:** Wasted hardware resources without resolving the low-traffic latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - T(b) = 20ms + 2ms * b.
       - SLA = 100ms.
       - max_batch_size = 16.
    2. **Calculations:**
       - Off-peak (5 QPS): window times out. Latency = Wait (80ms) + T(1) (22ms) = 102ms (> 100ms SLA).
       - Peak (500 QPS): hits max batch early. Latency = Wait (32ms) + T(16) (52ms) = 84ms (< 100ms SLA).
       - Safe Window = SLA - T(max_batch) = 100ms - 52ms = 48ms.
    3. **Conclusion & Interpretation:**
       - **Result: A 48ms batching window guarantees the SLA regardless of traffic.**
