title: Diagnosing Explainability Control Plane Latency
scenario: A trust-and-safety API serves a 70B parameter LLM on an 8x H100 (80GB) node. The control plane
  captures per-layer attention entropy and MoE routing probabilities for real-time explainability dashboards.
  At peak load (batch size 128, sequence length 1024), P99 latency spikes from 55ms/token to over 400ms/token.
  Profiling shows GPU utilization drops from 85% to 30%, while CPU utilization on the control plane node
  remains under 40%. The system extracts 2GB of internal state tensors per forward pass via standard Device-to-Host
  PCIe transfers.
details:
  realistic_solution: Diagnose that synchronous PCIe transfers are blocking the main CUDA compute stream.
    The solution is to allocate pinned host memory and use `cudaMemcpyAsync` on a secondary CUDA stream
    to extract the state asynchronously without blocking the forward pass.
  common_mistake: Assuming the control plane CPU is the bottleneck processing the 2GB of data, and recommending
    upgrading the host CPU or heavily downsampling the explainability state to reduce payload size.
  napkin_math: Extracting 2GB over PCIe Gen5 x16 (~50 GB/s effective) takes 2GB / 50 GB/s = 40ms. If done
    synchronously layer-by-layer, stream synchronization overheads starve the GPU. Asynchronous transfers
    hide this 40ms transfer latency behind the 55ms token generation compute time.
