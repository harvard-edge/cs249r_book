title: Diagnosing Low Utilization in Pipeline Parallelism
scenario: Your team is training a 70B parameter LLM across 64 H100 GPUs. The setup uses 8-way Tensor Parallelism
  (TP=8) and 8-way Pipeline Parallelism (PP=8). With a global batch size of 1024 and a microbatch size
  of 64, you have 16 microbatches (m=16) per pipeline. Profiling reveals that SM utilization is capped
  around 55%, with massive idle blocks at the start and end of every training step. Diagnose the root
  cause of this low utilization and calculate the exact proportion of compute time wasted.
question: "What is causing the 55% SM utilization, and what exact fraction of compute time is wasted by pipeline bubbles?"
details:
  realistic_solution: The root cause is the standard GPipe/1F1B pipeline bubble. The idle fraction is
    mathematically defined as (p-1)/m. With 8 stages and 16 microbatches, the bubble consumes 43.75% of
    the step time. To resolve this, the team should either increase the number of microbatches (e.g.,
    m=64) or adopt an interleaved 1F1B schedule to reduce the bubble size.
  common_mistake: Assuming 1F1B (One Forward One Backward) scheduling completely eliminates pipeline bubbles,
    or misdiagnosing the idle time as InfiniBand network latency rather than structural pipeline starvation.
  napkin_math: 'Pipeline Bubble Fraction = (p - 1) / m. For p=8 pipeline stages and m=16 microbatches:
    Bubble = (8 - 1) / 16 = 7 / 16 = 0.4375, or 43.75% wasted time. 100% - 43.75% = 56.25% theoretical
    max utilization.'
