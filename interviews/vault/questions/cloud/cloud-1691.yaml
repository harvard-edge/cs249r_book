title: Diagnosing Low Utilization in Pipeline Parallelism
scenario: Your team is training a 70B parameter LLM across 64 GPUs. The setup uses 8-way Tensor Parallelism (TP=8) and 8-way Pipeline Parallelism (PP=8). With a global batch size of 1024 and a microbatch size of 64, there are 16 microbatches (m=16) per pipeline. Profiling reveals SM utilization is capped around 55%, with massive idle blocks at the start and end of every training step.
question: 'What is causing the 55% SM utilization, and what exact fraction of compute time is wasted by pipeline bubbles?'
details:
  realistic_solution: 'The root cause is the standard GPipe/1F1B pipeline bubble. The idle fraction is mathematically defined as (p-1)/m. With 8 stages and 16 microbatches, the bubble consumes 43.75% of the step time. To resolve this, the team should either increase the number of microbatches (e.g., m=64) or adopt an interleaved 1F1B schedule to reduce the bubble size.'
  common_mistake: |
    **The Pitfall:** Assuming 1F1B (One Forward One Backward) scheduling completely eliminates pipeline bubbles.
    **The Rationale:** Misdiagnosing the idle time as InfiniBand network latency rather than structural pipeline starvation inherent to the schedule.
    **The Consequence:** Wasting time tuning network configurations instead of adjusting microbatch counts or adopting interleaved scheduling.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1F1B schedule.
    - Pipeline stages p=8, microbatches m=16.

    **Calculations:**
    - Pipeline Bubble Fraction = (p - 1) / m = (8 - 1) / 16 = 7 / 16 = 0.4375.
    - Wasted time is 43.75%.
    - Theoretical max utilization = 100% - 43.75% = 56.25%.

    **Conclusion & Interpretation:**
    - **Result: 43.75% Wasted Compute (Compute-Bound)**. The system is structurally bounded by the 1F1B pipeline bubble, not device limits.
