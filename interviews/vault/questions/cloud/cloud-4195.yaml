math_issues:
- The total cache demand (45 MB) is less than the H100's L2 cache capacity (50 MB),
  so all models should fit with a near 100% hit rate without partitioning. Equating
  hit rate directly to the demand ratio (12/45 = 27%) is mathematically unfounded.
