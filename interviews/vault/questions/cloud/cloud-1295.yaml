title: Evaluating Forward-Mode AD for Jacobian Regularization
scenario: Your team is training a physics-informed neural network (PINN) on an NVIDIA H100 GPU. The model
  maps a 5-dimensional input state (coordinates, time, temperature) to a 500-dimensional output mesh.
  A custom regularization loss requires computing the full 500x5 Jacobian matrix of the network's outputs
  with respect to its inputs at each step. Currently, the team uses standard reverse-mode AD (backpropagation)
  to compute this Jacobian, which is causing memory OOMs and taking 250ms per batch. Evaluate the trade-offs
  of switching to forward-mode differentiation for this specific calculation.
details:
  realistic_solution: Implement forward-mode automatic differentiation (using PyTorch's forward AD API
    or JAX's jvp) to compute the Jacobian. Because the input dimension (N=5) is much smaller than the
    output dimension (M=500), forward mode calculates the Jacobian column-by-column in just 5 passes.
  common_mistake: Assuming reverse-mode AD (backpropagation) is universally optimal for all deep learning
    tasks, failing to recognize that calculating the Jacobian when outputs heavily outnumber inputs (M
    >> N) is exceptionally inefficient in reverse mode.
  napkin_math: Jacobian matrix size is M x N = 500 x 5. Reverse-mode AD (VJP) computes one row per backward
    pass, requiring M=500 passes. Forward-mode AD (JVP) computes one column per forward pass, requiring
    N=5 passes. Assuming 1 forward pass ≈ 1 backward pass in compute, forward mode yields a 500 / 5 =
    100x theoretical speedup for this Jacobian term while avoiding the memory bloat of 500 backward graphs.
