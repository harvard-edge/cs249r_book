title: Evaluating Forward-Mode AD for Jacobian Regularization
scenario: Your team is training a physics-informed neural network (PINN) on an NVIDIA GPU. The model maps a 5-dimensional input state to a 500-dimensional output mesh. A custom regularization loss requires computing the full 500x5 Jacobian matrix of the network's outputs with respect to its inputs at each step. Currently, the team uses standard reverse-mode AD to compute this Jacobian, which is causing memory OOMs and taking 250ms per batch.
question: "Should the 500x5 PINN Jacobian be computed with forward-mode AD instead of reverse-mode, and what speedup should you expect?"
details:
  realistic_solution: Implement forward-mode automatic differentiation (using PyTorch's forward AD API or JAX's jvp) to compute the Jacobian. Because the input dimension (N=5) is much smaller than the output dimension (M=500), forward mode calculates the Jacobian column-by-column in just 5 passes.
  common_mistake: |
    **The Pitfall:** Assuming reverse-mode AD (backpropagation) is universally optimal.
    **The Rationale:** Reverse mode is the default and most efficient method for standard scalar-loss neural network training.
    **The Consequence:** Candidates fail to recognize that calculating the Jacobian when outputs heavily outnumber inputs (M >> N) is exceptionally inefficient and memory-heavy in reverse mode.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jacobian matrix size M x N = 500 x 5.
       - 1 forward pass ≈ 1 backward pass in compute time.
    2. **Calculations:**
       - Reverse-mode AD (VJP) computes one row per backward pass, requiring M=500 passes.
       - Forward-mode AD (JVP) computes one column per forward pass, requiring N=5 passes.
       - Speedup ratio: 500 / 5 = 100x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Forward mode yields a 100x theoretical speedup while avoiding the memory bloat of 500 backward graphs.**
