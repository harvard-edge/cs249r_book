title: Diagnosing Annotation Degradation in Data Pipelines
scenario: Your team operates a cloud-based content moderation model processing 50M images/day on a cluster
  of 64 A100 GPUs. Over the last 4 months, the model's production F1-score has systematically degraded
  from 0.92 to 0.85. Your ML Ops dashboard shows that input feature distributions (measured via KS-tests
  on ResNet embeddings) and class prior probabilities P(Y) have remained strictly stable. The weekly active
  learning pipeline sends 100K low-confidence images to a third-party vendor for manual annotation to
  continuously fine-tune the model. The vendor recently switched to a new tier of annotators to reduce
  their internal costs by 40%, dropping average time-per-label from 15s to 6s. How do you systematically
  root-cause the performance drop, and what specific metrics prove your hypothesis?
question: "How do you systematically root-cause the F1 drop, and which metrics would prove label quality drift?"
details:
  realistic_solution: Diagnose Label Quality Drift by secretly injecting a Golden Dataset (e.g., 2,000
    expertly labeled, static samples) into the vendor's weekly 100K batch. Measure Inter-Annotator Agreement
    (IAA) using Cohen's Kappa or Krippendorff's Alpha. Under symmetric label noise, the sample complexity
    multiplier is ~1/(1-2e)^2. If the error rate increased from 5% to 20%, you need 2.25x more labels
    to maintain the same F1 — negating the 40% cost savings from cheaper annotators.
  common_mistake: Assuming silent feature drift, concept drift, or catastrophic forgetting, and attempting
    to fix it by tweaking hyperparameters, applying domain adaptation, or increasing model capacity —
    when the root cause is degraded annotation quality.
  napkin_math: Under symmetric label noise, the sample complexity multiplier is roughly 1 / (1 - 2e)^2,
    where e is the error rate. If the faster annotators increased the random label error rate (e) from
    5% to 20%, the relative data needed to maintain the same accuracy scales by (1 - 2(0.05))^2 / (1 - 2(0.20))^2 = 0.81 / 0.36 = 2.25x. Saving
    40% on cost-per-label is erased because you now need 225K labels/week instead of 100K to achieve the original
    0.92 F1-score.
