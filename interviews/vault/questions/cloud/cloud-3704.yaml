title: Flash Attention Arithmetic Intensity Analysis on H100
scenario: You're implementing FlashAttention-2 for a 70B LLM with 96 heads, head_dim=128, seq_len=8192.
question: How much memory traffic does FlashAttention-2 save versus materializing the attention matrix, and what bandwidth speedup results?
details:
  realistic_solution: 'Standard attention HBM reads: Q+K+V = 3×96×8192×128×2 = 603MB. HBM writes: attention matrix = 96×8192×8192×2 = 12.88GB. Total standard = 603MB read + 12.88GB write + 12.88GB read (for softmax) + 201MB write (output) ≈ 26.5GB. FlashAttention: Q+K+V reads = 603MB, O write = 201MB. Total ≈ 804MB — 33× less HBM traffic. At 3.35 TB/s, standard attention memory time = 26.5GB/3.35TB/s = 7.9ms; FlashAttention = 804MB/3.35TB/s = 0.24ms.'
  common_mistake: |
    **The Pitfall:** Assuming FlashAttention eliminates all memory reads and writes.
    **The Rationale:** Candidates forget that while FlashAttention eliminates the massive N^2 attention matrix materialization, it still must read the Q, K, and V tensors and write the final output.
    **The Consequence:** Incorrectly calculating an infinite speedup or underestimating the baseline memory traffic of the attention block.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard attention materializes a 96x8192x8192 float16 attention matrix.
       - Q+K+V reads = 603 MB. Output write = 201 MB.
       - Memory Bandwidth = 3.35 TB/s.
    2. **Calculations:**
       - Standard writes (Attn Matrix): 96 * 8192 * 8192 * 2 bytes = 12.88 GB.
       - Standard total traffic: 603 MB (read) + 12.88 GB (write) + 12.88 GB (read for softmax) + 201 MB (write output) ≈ 26.5 GB.
       - FlashAttention traffic: Q+K+V reads (603 MB) + Output write (201 MB) ≈ 804 MB.
       - Traffic Reduction: 26.5 GB / 804 MB = 33x less memory traffic.
       - Speedup at 3.35 TB/s: 7.9 ms → 0.24 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** 33x less memory traffic yields a 33x speedup.
