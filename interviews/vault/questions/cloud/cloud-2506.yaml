title: Liquid Cooling Retrofit ROI
scenario: Your 5 MW (IT load) datacenter currently relies on air cooling, operating at a Power Usage Effectiveness (PUE) of 1.5. A proposal suggests retrofitting to Direct-to-Chip (D2C) liquid cooling, which would lower the PUE to 1.15 but costs $8,000,000 in CapEx. Electricity costs $0.12 per kWh.
question: Does the $8M D2C liquid-cooling retrofit pay off for a 5MW datacenter, and what operational factors affect the decision?
details:
  realistic_solution: Power Usage Effectiveness (PUE) is the ratio of total facility power to IT equipment power. A PUE of 1.5 means for every 1 Watt of IT load, 0.5 Watts is spent on cooling and overhead. Retrofitting to liquid cooling drops the overhead from 50% to 15%. However, evaluating this tradeoff requires calculating the payback period against the CapEx. While liquid cooling vastly improves energy-efficiency metrics and allows for denser racks (reducing network cable lengths and latency), an $8M retrofit for a legacy facility might have a payback period that exceeds the remaining lifespan of the current hardware generation. The tradeoff is between long-term TCO/sustainability vs upfront CapEx and downtime during the retrofit. If the facility is slated for high-TDP next-gen GPUs (like B200s), the retrofit becomes mandatory due to thermal limits, overriding pure ROI calculations.
  common_mistake: |
    **The Pitfall:** Calculating savings based on the IT load (5 MW) rather than the overhead power saved via the PUE delta.
    **The Rationale:** IT load power is consumed regardless of cooling method; PUE only affects the non-IT overhead (cooling, lighting). Also, ignoring payback period fails to account for hardware lifecycles.
    **The Consequence:** Misrepresenting the ROI timeline, leading to a massive CapEx expenditure that might outlive the current datacenter hardware generation.
  napkin_math: |
    - Current Total Power = 5 MW * 1.5 PUE = 7.5 MW.
    - New Total Power = 5 MW * 1.15 PUE = 5.75 MW.
    - Power Savings = 7.5 MW - 5.75 MW = 1.75 MW = 1,750 kW.
    - Annual Energy Savings = 1,750 kW * 8760 hours/yr = 15,330,000 kWh/yr.
    - Financial Savings = 15,330,000 kWh/yr * $0.12/kWh = $1,839,600 / year.
    - **Payback Period = $8,000,000 / $1,839,600 ≈ 4.35 years.**
