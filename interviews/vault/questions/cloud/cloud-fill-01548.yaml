title: Real-Time Anomaly Detection on High-Throughput Sensor Data with H100 Accelerators
scenario: Your team is tasked with designing a real-time anomaly detection system for industrial IoT sensors.
  These sensors generate a continuous stream of high-volume, high-velocity data (e.g., 100TB/day, 100M
  events/second) that needs to be processed with ultra-low latency (sub-100ms end-to-end). The anomalies
  are subtle and require complex deep learning models for detection. You have access to a cluster of NVIDIA
  H100 GPUs, each with 80 GB HBM3, capable of 989 TFLOPS FP16 dense computation, and 3.35 TB/s memory
  bandwidth, operating at 700W. Design an event-driven ingestion and stream processing pipeline that leverages
  these H100 accelerators to identify anomalies in real-time, compute real-time features, and alert operators,
  ensuring resilience, scalability, and cost-efficiency in a cloud environment.
question: "How would you design a resilient H100 event-stream pipeline for 100M events/s with sub-100 ms anomaly alerts?"
details:
  realistic_solution: Implement a Kafka-based event-driven architecture for ingestion, leveraging Kafka
    Streams or Flink for initial data enrichment and feature engineering. Utilize a distributed inference
    framework (e.g., Triton Inference Server, TorchServe) deployed on Kubernetes, orchestrating H100 GPU
    clusters for low-latency model inference. Employ a tiered storage strategy (e.g., S3 for raw data
    archiving, Redis/Aerospike for real-time feature stores). Design for stateless processing where possible,
    using materialized views for state management. Implement robust monitoring, alerting, and auto-scaling
    mechanisms based on ingestion rates and processing loads.
  common_mistake: Overlooking data skew and backpressure in stream processing, leading to dropped events
    or increased latency. Underestimating the I/O bottleneck when feeding data to high-throughput accelerators
    like the H100, assuming GPU compute is the sole limiting factor. Not properly managing model versioning
    and deployment in a real-time inference pipeline without service interruption.
  napkin_math: 'Given 100M events/second and an average event size of 1KB, what is the required network
    bandwidth for ingestion? If each H100 can process 50,000 inferences/second for the anomaly model,
    how many H100 GPUs are needed to handle the peak load, assuming a 90% utilization target? What is
    the total power consumption for the H100s at peak? (Simple: 100M events/s * 1KB/event = 100 GB/s network
    bandwidth. 100M events/s / 50,000 inf/s/H100 = 2000 H100 GPUs. 2000 GPUs * 700W/GPU = 1.4 MW).'
