title: Scheduling Multi-Node Training with Network Constraints
scenario: Your cluster has 20 nodes with 8 H100s each, but only 10 nodes have 400 Gbps InfiniBand (IB) while the other 10 have 100 Gbps Ethernet. A 128-GPU training job with DP=16 arrives.
question: How should the scheduler consider network topology to optimize the 128-GPU job?
details:
  realistic_solution: 'Network-aware scheduling policy: (1) Classify the job: 128 GPUs with DP=16 means 16 data-parallel groups. Each step, gradient AllReduce sends ~model_size bytes across DP groups. (2) Calculate communication time: On IB (400 Gbps = 50 GB/s effective): 75 ms. On Ethernet (100 Gbps = 10 GB/s effective): 375 ms. (3) Scheduling rule: the job MUST run entirely on IB nodes. Options: Reduce job to 80 GPUs (10 IB nodes), or pin TP/PP communication to IB and only use Ethernet for DP AllReduce. Expose network topology as a schedulable resource (Slurm features: ib=true/false).'
  common_mistake: |
    **The Pitfall:** Treating all nodes equally and spreading the job across IB and Ethernet nodes.
    **The Rationale:** Schedulers by default are often topology-unaware and focus only on GPU count rather than interconnect bandwidth.
    **The Consequence:** The 4x bandwidth difference means Ethernet nodes become severe bottlenecks for gradient AllReduce, dragging down the entire job's performance.
  napkin_math: |
    1. Calculate AllReduce volume per step for 1B parameter model: ~2 bytes/param * (15/16) * 2 = 3.75 GB.
    2. Calculate IB transfer time (400 Gbps = 50 GB/s effective): 3.75 GB / 50 GB/s = 75 ms.
    3. Calculate Ethernet transfer time (100 Gbps = 10 GB/s effective): 3.75 GB / 10 GB/s = 375 ms.
    4. Calculate overlap: Backward compute is ~500 ms. Ethernet transfer takes 375 ms.
    5. Evaluate impact: Mixed cluster limits speed to Ethernet. **375 ms dominates**, consuming 75% of backward compute time and leaking into the forward pass.
