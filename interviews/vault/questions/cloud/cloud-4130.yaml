title: Scheduling Multi-Node Training with Network Constraints
scenario: Your cluster has 20 nodes with 8 GPUs each, but only 10 nodes have 400 Gbps InfiniBand (IB) while the other 10 have 100 Gbps Ethernet. A 128-GPU training job with DP=16 arrives.
question: How should the scheduler consider network topology to optimize the 128-GPU job?
details:
  realistic_solution: 'Enforce a network-aware scheduling policy by exposing hardware topology as a schedulable resource (e.g., Slurm constraints: `ib=true`). Since NCCL ring/tree algorithms operate at the speed of the slowest link, bridging IB nodes with Ethernet nodes throttles the entire DP AllReduce ring to 100 Gbps. The job must either wait for 16 pure-IB nodes, execute on fewer pure-IB nodes, or implement targeted hybrid routing where TP/PP stay on IB and Ethernet is isolated to inter-rack DP boundaries.'
  common_mistake: |
    **The Pitfall:** Treating all compute nodes as homogenous and scheduling the job across a mix of IB and Ethernet nodes.
    **The Rationale:** Cloud-native schedulers (like default Kubernetes) focus solely on compute/memory requests, oblivious to underlying physical interconnects.
    **The Consequence:** The 4x bandwidth cliff drops the entire 128-GPU ring to 100 Gbps, massively inflating gradient synchronization time and destroying overall cluster throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Topology: 10 nodes @ 400 Gbps (50 GB/s), 10 nodes @ 100 Gbps (10 GB/s).
       - Job: 128 GPUs, DP=16.
       - Model payload (approx): 1B params (3.75 GB transfer per AllReduce step).
    2. **Calculations:**
       - IB Transfer Time: 3.75 GB / 50 GB/s = 75 ms.
       - Ethernet Transfer Time: 3.75 GB / 10 GB/s = 375 ms.
    3. **Conclusion & Interpretation:**
       - **Spanning the job across topologies forces the 375 ms Ethernet latency upon the entire ring, wasting 300ms per step across 128 GPUs. Result: Network-Topology Bound.**
