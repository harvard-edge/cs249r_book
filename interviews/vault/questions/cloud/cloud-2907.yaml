title: Implement channel pruning for EfficientNet-B3 to reduce serving costs
scenario: You need to reduce EfficientNet-B3 (12M params, 1.8 GFLOPs) serving costs on an accelerator by 40% while retaining 81% top-1 accuracy on your product dataset (originally 81.6%). You must implement a structured channel pruning pipeline.
question: How would you prune EfficientNet-B3 by 40% serving cost while retaining at least 81% top-1, and how would you validate it in TensorRT?
details:
  realistic_solution: 'Use layer-sensitivity analysis: prune each layer independently to 50% and measure accuracy drop. First and last layers are typically sensitive; middle MBConv blocks are robust. Apply higher pruning ratios (50–60%) to middle stages and lower (20–30%) to first/last stages. Implementation: (1) forward hook to collect L1-norm of each filter; (2) rank filters globally by importance; (3) zero out bottom-p% filters; (4) fine-tune 30 epochs with cosine LR schedule; (5) export to ONNX, convert with TRT INT8. Target: 40% FLOP reduction → ~1.08 GFLOPs.'
  common_mistake: |
    **The Pitfall:** Applying uniform pruning ratios across all layers of the network.
    **The Rationale:** It's the simplest approach, but it ignores that different layers have different sensitivities to pruning.
    **The Consequence:** Over-pruning the first layers (critical for low-level feature extraction) and under-pruning the last expansion stages (which dominate FLOPs), resulting in a severe accuracy drop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline FLOPs: 1.8 GFLOPs.
       - Target Reduction: 40% (retain 60% = 1.08 GFLOPs).
       - FLOPs scale roughly as C_out * C_in.
    2. **Calculations:**
       - Required Active Channel Ratio (x): x^2 = 0.60 => x = ~0.77.
       - Pruning Ratio: 1 - 0.77 = 0.23 (23%).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Prune 23% of channels on average to achieve 40% FLOP reduction.**
