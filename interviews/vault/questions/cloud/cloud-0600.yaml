title: The Stuttering Training Loop
scenario: You are training a small neural network on a GPU. GPU utilization is low (30-40%), and the training progress stutters periodically, despite using a small dataset that easily fits into GPU memory.
question: What is a common, non-obvious reason for this low utilization and stuttering behavior?
details:
  realistic_solution: The problem is likely due to frequent cache misses and poor data locality, leading to "data thrashing." Even if the entire dataset fits in GPU HBM, specific parts of the model (e.g., large embedding tables or activation maps) might not fit into the GPU's faster, smaller on-chip caches (L1/L2). When the GPU repeatedly accesses data that isn't in cache, it incurs the higher latency of fetching from HBM. The "stuttering" occurs when the GPU's compute units frequently stall, waiting for data to be loaded from slower memory, leading to low utilization. Optimizing data access patterns or restructuring the model to improve cache locality can mitigate this.
  common_mistake: |
    **The Pitfall:** Blaming GPU drivers or CPU data loading bottlenecks immediately.
    **The Rationale:** Candidates overlook the internal GPU memory hierarchy because the dataset fits entirely within the bulk HBM.
    **The Consequence:** Wasting time debugging data loaders or reinstalling drivers instead of fixing memory access patterns or cache locality.
  napkin_math: |
    1. A typical GPU L2 cache is small (e.g., 6-12 MB).
    2. If a small model's embedding table has 100,000 entries of 128 floats (FP32), its size is 100,000 × 128 × 4 bytes = 51.2 MB.
    3. 51.2 MB far exceeds the ~12 MB L2 cache.
    4. **Random access into this table forces frequent L2 cache misses and costly fetches from slower HBM, causing the compute units to stall (stuttering).**
