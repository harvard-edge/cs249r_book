title: The Feature Backfill Cost
scenario: You add a new feature 'user_lifetime_spend_percentile' to your ranking model. Training needs 6 months of historical feature values. The raw transaction logs exist in your data lake.
question: What is the compute cost of backfilling user_lifetime_spend_percentile for 100M users over 180 days of 1B transactions/day?
details:
  realistic_solution: 'Each day requires scanning that day''s transactions. For point-in-time correctness, each training example needs the feature computed as-of its timestamp, requiring a cumulative running aggregation. The hidden cost is engineering time (2-4 weeks to get point-in-time semantics correct).'
  common_mistake: |
    **The Pitfall:** Assuming backfill is a simple, cheap SQL query.
    **The Rationale:** Candidates underestimate the massive I/O overhead and the necessity of point-in-time correctness to prevent label leakage.
    **The Consequence:** Incurring extreme cloud compute costs and introducing target leakage into the training dataset.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 180 days * 1B logs/day = 180 billion logs.
       - Row size: 200 bytes.
       - S3 scan cost: $5/TB.
    2. **Calculations:**
       - Total data: 180 billion * 200 bytes = 36 TB.
       - Storage scan cost: 36 TB * $5/TB = $180.
       - Distributed compute: 100 nodes * 4 hours * $3/hr = $1,200.
       - Total infrastructure cost: $1,380.
       - Engineering cost: 120 hours * $100/hr = $12,000.
    3. **Conclusion & Interpretation:**
       - **Result: Engineering-Bound**. The infrastructure cost ($1,380) is dwarfed by the engineering time ($12,000) required to implement correct point-in-time aggregations, making developer-optimized feature stores highly valuable.
