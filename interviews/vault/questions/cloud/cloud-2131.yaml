title: The Feature Backfill Cost
scenario: You add a new feature 'user_lifetime_spend_percentile' to your ranking model. Training needs
  6 months of historical feature values, but this feature didn't exist 6 months ago. The raw transaction
  logs exist in your data lake. Estimate the compute cost of backfilling this feature for 100 million
  users over 180 days of logs, assuming 1 billion transactions per day stored in Parquet on S3.
question: "What is the compute cost of backfilling user_lifetime_spend_percentile for 100M users over 180 days of 1B transactions/day?"
details:
  realistic_solution: 'Each day requires scanning that day''s transactions (1B rows × ~200 bytes/row =
    200 GB/day). Over 180 days: $180 \times 200\text{ GB} = 36\text{ TB}$ total scan. But it''s worse:
    for point-in-time correctness, each training example needs the feature computed as-of its timestamp,
    requiring a cumulative running aggregation. Using Spark on a 100-node cluster: ~36TB scan at ~200
    MB/s/node effective throughput = 30 minutes per day''s partition. With 180 partitions and smart parallelism:
    ~3-4 hours. S3 scan cost: $36\text{ TB} \times \$5/\text{TB scanned} = \$180$. Compute cost: 100 nodes
    × 4 hours × ~$3/hr = $1,200. Total: ~$1,400. The hidden cost is engineering time (2-4 weeks to get
    point-in-time semantics correct).'
  common_mistake: Assuming backfill is a simple SQL query. At 180B rows across 180 days, the I/O and compute
    costs are substantial, and the aggregation must be computed as a point-in-time snapshot for each training
    example to avoid label leakage.
  napkin_math: '180 billion logs * 200 bytes = 36 TB total data. Scanning 36 TB from cloud storage (e.g.,
    S3 at $0.005/GB) costs ~$180. Distributed processing on 100 cloud CPUs for 5 hours might cost ~$200.
    Total infra cost: <$500. Conversely, 3 weeks of ML Engineer time (120 hrs at $100/hr) costs $12,000.
    The true cost of backfilling is engineering time, making developer-optimized frameworks superior here.'
