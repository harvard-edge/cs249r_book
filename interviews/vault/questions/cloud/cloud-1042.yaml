title: Evaluating CPU Pinning for P99 Latency SLA
scenario: Your team operates a fleet of dual-socket AMD EPYC 7763 (64 cores per socket, 4 NUMA nodes per
  socket) servers running ONNX Runtime for real-time recommendation embeddings. Under peak load, average
  latency is 8ms, but P99 latency spikes to 45ms, violating the 20ms strict SLA. An engineer proposes
  implementing strict CPU thread affinity (pinning execution threads to physical cores within a single
  NUMA node) and isolating inference containers. Another argues this will heavily reduce overall cluster
  throughput by preventing the OS from load-balancing idle cores. Evaluate these trade-offs and justify
  whether to adopt CPU affinity, detailing its impact on cache locality, NUMA traversal, and P99 jitter.
question: "Should you adopt strict CPU affinity on the dual-socket EPYC inference fleet despite possible throughput loss, and why?"
details:
  realistic_solution: Implement strict CPU affinity aligned with NUMA boundaries. Pinning threads to specific
    physical cores prevents OS context switching, keeping L1/L2 caches hot. By isolating memory allocations
    to the local NUMA node, you avoid cross-socket traversal. You intentionally sacrifice maximum theoretical
    throughput for deterministic, bounded P99 latency.
  common_mistake: Assuming the default OS scheduler (Linux CFS) optimally manages thread placement for
    latency-sensitive inference, or blindly pinning threads without respecting NUMA boundaries, which
    inadvertently forces cross-socket memory access.
  napkin_math: L3 cache hit = ~15ns; Local DRAM = ~100ns; Cross-NUMA DRAM = ~300ns. If a thread migrates
    to a different socket and must refetch a 15MB model layer from remote memory, it requires ~234,000
    cache line fetches (64B each). 234,000 * 300ns latency (assuming heavy contention) = ~70ms worst-case
    stall penalty, completely explaining the SLA-violating 45ms P99 spikes.
