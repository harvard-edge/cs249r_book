title: The Preemption Penalty
scenario: 'You''re designing a multi-tenant GPU service on a single H100. It must serve two request queues:
  a high-priority queue with a strict 100ms P99 latency SLO, and a low-priority queue for large, non-interactive
  jobs. A proposal is made to use dynamic preemption: when a high-priority request arrives, the running
  low-priority job will be paused, its state (i.e., KV cache) will be swapped to system RAM over PCIe,
  the high-priority request will be serviced, and then the low-priority job''s state will be swapped back
  in. Analyze the feasibility of this preemption strategy. Use a 13B parameter model as the basis for
  your calculations.'
details:
  realistic_solution: The proposed preemption strategy is likely infeasible due to the prohibitive cost
    of swapping the KV cache over PCIe. The time taken to move gigabytes of data from GPU HBM to system
    RAM and back will almost certainly violate the high-priority SLO before the request is even processed.
    The candidate should demonstrate this with a calculation.
  common_mistake: A common mistake is to assume that preemption is a software-level scheduling decision
    with minimal overhead. Engineers might underestimate the sheer size of an LLM's state (the KV cache)
    and the physical limitations of the interconnects used to move that state, failing to quantify the
    'preemption penalty'.
  napkin_math: For a 13B parameter model, a typical architecture has ~40 layers and a hidden dimension
    of ~5120. The KV cache size per token is 2 * 40 layers * 5120 * 2 bytes = ~800 KB. For a sequence
    length of 4096 tokens, the KV cache is 4096 * 800 KB ≈ 3.28 GB. An H100 uses PCIe Gen5 x16, which
    has a unidirectional peak bandwidth of ~64 GB/s (realistically ~50 GB/s). Swapping out the 3.28 GB
    KV cache takes ~65ms, and swapping it back takes another ~65ms. This 130ms context switch over PCIe
    strictly violates the 100ms P99 SLO before the high-priority request even begins processing.
