title: 'The TCO Iceberg: Training vs. Inference'
scenario: When considering the Total Cost of Ownership (TCO) for a large-scale, production ML service
  over a typical 3-year lifecycle, what is the approximate cost ratio between cumulative inference and
  the initial model training?
details:
  realistic_solution: Over a 3-year lifecycle, cumulative inference TCO typically dominates training TCO
    by a factor of 5-10x or more. The initial training is a one-time (or infrequent) cost, whereas inference
    is a continuous operational cost that scales with user traffic. For any successful product, the cost
    of serving predictions to millions of users every day for years far outweighs the initial R&D and
    training cost.
  common_mistake: Engineers often fixate on the high upfront capital expenditure (CapEx) of a massive
    training run and mistakenly assume it's the largest part of the budget. They forget that inference
    runs continuously for years across a large fleet, and that cumulative operational expenditure (OpEx)
    for serving dominates the total cost.
  napkin_math: A large model might take 1,000 H100 GPUs one month (≈720 hours) to train, totaling 720,000
    GPU-hours. A successful inference service might run on a smaller fleet of 100 H100s, but it runs 24/7
    for 3 years (≈26,280 hours). This results in 2,628,000 GPU-hours for inference. The inference compute-hours
    are already 3.65x greater (2.6M / 0.72M), and this ratio is amplified by the higher cost-per-hour
    of low-latency serving infrastructure compared to more efficient, interruptible batch training.
  options:
  - Training is 5-10x more expensive than inference.
  - They are roughly equal in cost (1:1 ratio).
  - Inference is 5-10x more expensive than training.
  - Inference is over 100x more expensive than training.
  correct_index: 2
