title: 'The TCO Iceberg: Training vs. Inference'
scenario: When considering the Total Cost of Ownership (TCO) for a large-scale, production ML service over a typical 3-year lifecycle...
question: Over a typical 3-year production ML lifecycle, what is the approximate cost ratio of cumulative inference to initial training?
details:
  realistic_solution: Over a 3-year lifecycle, cumulative inference TCO typically dominates training TCO by a factor of 5-10x or more. The initial training is a one-time (or infrequent) cost, whereas inference is a continuous operational cost that scales with user traffic. For any successful product, the cost of serving predictions to millions of users every day for years far outweighs the initial R&D and training cost.
  common_mistake: |
    **The Pitfall:** Fixing on the high upfront capital expenditure (CapEx) of a massive training run.
    **The Rationale:** The one-time training cost is large, visible, and often a major budgeting hurdle.
    **The Consequence:** Mistakenly assuming training is the largest part of the budget, while forgetting that inference runs continuously for years and operational expenditure (OpEx) will vastly outweigh it.
  napkin_math: |
    - **Training Cost:** A large model might take 1,000 H100 GPUs one month (≈720 hours) to train = 720,000 GPU-hours.
    - **Inference Cost:** A fleet of 100 H100s running 24/7 for 3 years (≈26,280 hours) = 2,628,000 GPU-hours.
    - **Base Ratio:** 2.6M / 0.72M = 3.65x greater GPU-hours for inference.
    - **Cost Multiplier:** If inference instances cost 1.5x more per hour (due to HA/low latency requirements), the cost ratio is 3.65x * 1.5 ≈ **5.5x**.
    - **Conclusion:** Inference cost dominates training cost by a factor of 5-10x.
  options:
  - Training is 5-10x more expensive than inference.
  - They are roughly equal in cost (1:1 ratio).
  - Inference is 5-10x more expensive than training.
  - Inference is over 100x more expensive than training.
  correct_index: 2
