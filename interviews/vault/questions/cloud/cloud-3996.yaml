title: Synthesize Hardware From Token Latency SLA
scenario: A team wants to serve a 70B FP16 model with inter-token latency below 25 ms at batch size 1. The model weights are 140 GB and decode is memory-bandwidth-bound.
question: "What effective memory bandwidth is required to decode one output token from a 140 GB model in under 25 ms at batch size 1, and what does this imply for hardware selection?"
details:
  realistic_solution: For memory-bound batch-1 decode, each generated token streams the model weights entirely once. Bandwidth must be at least model bytes divided by target time. 140 GB / 0.025 s = 5.6 TB/s effective bandwidth. A single GPU may be insufficient depending on effective bandwidth limits, so the design likely needs tensor parallelism across multiple GPUs, quantization, or request batching to amortize weight reads.
  common_mistake: |
    **The Pitfall:** Starting calculations from peak FLOPs.
    **The Rationale:** Candidates instinctively default to compute-bound estimations, ignoring that auto-regressive decoding at BS=1 is severely memory-bandwidth bound.
    **The Consequence:** The team purchases high-FLOP but low-bandwidth hardware and entirely misses the latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 140 GB (70B params in FP16).
    - Latency SLA: 25 ms (0.025 s) per token.
    - Traffic: Batch size 1 autoregressive decode.

    **Calculations:**
    - Auto-regressive BS=1 decode reads the entire model weight vector exactly once per token.
    - Bytes read per token: 140 GB.
    - Required Bandwidth = Total Bytes / Time SLA.
    - 140 GB / 0.025 s = 5,600 GB/s = 5.6 TB/s.

    **Conclusion & Interpretation:**
    - **Result: 5.6 TB/s (Memory-Bandwidth Bound)**. The bandwidth requirement exceeds single-GPU capacities, mandating Tensor Parallelism or weight quantization.
