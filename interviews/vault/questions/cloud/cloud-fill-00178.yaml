title: Optimizing KV-Cache on AMD MI300X for High-Throughput LLM Inference
scenario: You are the lead ML Systems engineer responsible for deploying a large language model with a
  128k context window on an AMD MI300X accelerator, featuring 192 GB HBM3 memory and 5.3 TB/s memory bandwidth.
  Each token's KV-cache entry (key and value vectors across all layers for a single token) requires approximately
  64 KB of memory (e.g., for a large Llama-like model using FP16). Your objective is to maximize the number
  of concurrent active contexts while adhering to strict latency targets. Design a comprehensive KV-cache
  management strategy that addresses memory pressure from long contexts, leveraging techniques like paged
  attention and defining appropriate cache eviction policies. Your design should specifically account
  for the MI300X's memory capacity and bandwidth.
details:
  realistic_solution: A realistic solution would involve implementing paged attention, where the KV-cache
    is stored in fixed-size blocks (e.g., 4KB or 16KB per block) dynamically allocated from the HBM3.
    This decouples logical context from physical memory layout, significantly mitigating fragmentation.
    Memory allocation would be managed by a custom GPU-aware allocator. For eviction, a policy that considers
    block usage frequency (LFU) or recency (LRU) at the block level, possibly combined with request priority,
    would be crucial. Strategies like 'pre-filling' short contexts and dynamically extending with paged
    attention for longer ones could also be considered. Maximizing the 5.3 TB/s memory bandwidth utilization
    would involve optimizing memory access patterns for block transfers and implementing efficient batching
    strategies to coalesce memory accesses.
  common_mistake: A common mistake is to allocate contiguous memory for the entire context window, leading
    to severe memory fragmentation and underutilization when dealing with varying context lengths. Another
    pitfall is using naive eviction policies (e.g., simple LRU/FIFO applied to full contexts) which do
    not granularly manage memory at the token or block level, or failing to accurately account for the
    overhead of paged attention metadata and memory fragmentation.
  napkin_math: Assume each token's KV-cache consumes 64 KB (for K and V vectors across all attention layers,
    FP16). For a 128k context window, one full context requires `128,000 tokens * 64 KB/token = 8 GB`.
    The MI300X's 192 GB HBM3 could theoretically hold `192 GB / 8 GB = 24` full contexts. With paged attention
    and an average context length of 32k tokens across requests, the memory usage per active context would
    be `32,000 * 64 KB = 2 GB`. This allows for roughly `192 GB / 2 GB = 96` average-sized contexts if
    memory is perfectly shared. Actual capacity will be lower due to model weights, ROCm runtime overhead,
    and fragmentation. The 5.3 TB/s bandwidth indicates that efficient memory access and batching are
    critical for performance, as frequent small random accesses (e.g., from highly fragmented paged attention
    blocks) could bottleneck performance if not carefully managed.
