title: Graceful Degradation for Real-time ML Inference on NVIDIA H100
scenario: You are leading the architecture for a critical, real-time ML inference service deployed on a fleet of NVIDIA H100 GPUs. Due to unforeseen circumstances like transient network issues or partial hardware degradation, the system experiences a significant reduction in effective processing capacity.
question: How would you keep the H100 real-time inference service fail-operational under reduced capacity using model fallbacks and QoS shedding?
details:
  realistic_solution: |
    A robust solution would involve a multi-tiered degradation ladder combined with dynamic QoS shedding. For instance: 1. **Degradation Ladder (Model Fallback):** Maintain a primary, high-accuracy model (e.g., requiring 60GB HBM3, 400 TFLOPS FP16) and a smaller, faster, slightly less accurate fallback model (e.g., 20GB HBM3, 100 TFLOPS FP16) pre-loaded or quickly loadable. Trigger: Monitor actual FP16 TFLOPS utilization, memory bandwidth, and inference queue depth. If latency P99 spikes, switch to the fallback model. 2. **Quality-of-Service (QoS) Shedding:** Maintain the primary model but dynamically adjust input quality or processing scope. For less critical requests, reduce input resolution or process every Nth frame. Trigger: Monitor SM occupancy, active CUDA core count, and power consumption.
  common_mistake: |
    **The Pitfall:** Implementing an 'all or nothing' fallback or failing to define clear degradation triggers based on hardware metrics.
    **The Rationale:** Candidates don't anticipate resource contention when loading a fallback model, or they react too late because they aren't monitoring HBM3 or Tensor Core occupancy.
    **The Consequence:** The entire service goes down during a capacity crunch instead of gracefully degrading.
  napkin_math: |
    - **Primary Model:** 50GB HBM3, 400 TFLOPS FP16.
    - **Fallback Model:** 20GB HBM3, 100 TFLOPS FP16.
    - **Memory Check:** Both models (70GB total) fit within the 80GB HBM3.
    - **Swap Time:** Switching a 50GB model with 3.35 TB/s bandwidth takes 50 GB / (3.35 * 1024 GB/s) ≈ **15 milliseconds**.
    - **Compute Resilience:** If H100 FP16 capacity drops by 20% to ~396 TFLOPS, the 100 TFLOPS fallback easily maintains high throughput.
