title: Geo-Distributed Training Throughput Collapse
scenario: A massive distributed training job across two availability zones (AZs) separated by 50km is experiencing severe pipeline stalls. Intra-AZ nodes communicate over an 800 Gbps RoCEv2 fabric, while inter-AZ communication relies on a dedicated 400 Gbps WAN link with a 1.0 ms round-trip time (RTT). Network monitoring reveals the inter-AZ link is bottlenecked at roughly 32 Gbps throughput despite massive continuous gradient synchronization demands and zero packet loss.
question: Why is the 400Gbps inter-AZ link capped near 32Gbps, and what buffer or communication redesign is required?
details:
  realistic_solution: The throughput collapse is a Bandwidth-Delay Product (BDP) mismatch. At a 1.0 ms RTT, a 400 Gbps link requires massive amounts of in-flight data (buffers) to stay saturated. If the RDMA queue depths or TCP receive windows are left at typical default limits (e.g., 4MB), the sender must stop and wait for acknowledgments, starving the pipe. The immediate fix is to tune the network buffers to match the 50MB BDP.
  common_mistake: |
    **The Pitfall:** Assuming the physical 400 Gbps capacity is automatically usable.
    **The Rationale:** Blaming underutilization on CPU bottlenecks or invisible packet drops.
    **The Consequence:** Failing to verify if the transport layer buffers are sized to keep the long 'pipe' full, leading to a stalled network.
  napkin_math: |
    - 1. **Bandwidth-Delay Product (BDP):** 400 Gbps × 1.0 ms = 400,000,000 bits.
    - 2. **In-flight Bytes Required:** 400,000,000 bits / 8 = 50,000,000 Bytes = 50 MB.
    - 3. **Default Buffer Limit:** If the system buffer is maxed at 4 MB...
    - 4. **Achievable Throughput:** (4 MB / 50 MB) × 400 Gbps = **32 Gbps limit**.
