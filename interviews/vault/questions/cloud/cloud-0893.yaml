title: Geo-Distributed Training Throughput Collapse
scenario: A massive distributed training job across two availability zones (AZs) separated by 50km is
  experiencing severe pipeline stalls. Intra-AZ nodes communicate over an 800 Gbps RoCEv2 fabric, while
  inter-AZ communication relies on a dedicated 400 Gbps WAN link with a 1.0 ms round-trip time (RTT).
  Network monitoring reveals the inter-AZ link is bottlenecked at roughly 32 Gbps throughput despite massive
  continuous gradient synchronization demands and zero packet loss. Analyze the root cause of this throughput
  collapse and explain how the bandwidth-distance product constraint forces a reconfiguration of the network
  buffers or a redesign of the communication strategy.
details:
  realistic_solution: The throughput collapse is a Bandwidth-Delay Product (BDP) mismatch. At a 1.0 ms
    RTT, a 400 Gbps link requires massive amounts of in-flight data (buffers) to stay saturated. If the
    RDMA queue depths or TCP receive windows are left at typical default limits (e.g., 4MB), the sender
    must stop and wait for acknowledgments, starving the pipe. The immediate fix is to tune the network
    buffers to match the 50MB BDP. Architecturally, the team should implement hierarchical AllReduce to
    minimize the frequency of inter-AZ synchronization.
  common_mistake: Assuming the 400 Gbps physical capacity is automatically usable and blaming the underutilization
    on application-level overheads, CPU bottlenecks, or invisible packet drops, without verifying if the
    transport layer buffers are sized to keep the long 'pipe' full.
  napkin_math: 'BDP = Bandwidth * Latency = 400 Gbps * 1.0 ms = (400 * 10^9 bits/sec) * (0.001 sec) =
    400,000,000 bits. Converting to bytes: 400,000,000 / 8 = 50,000,000 Bytes = 50 MB. If the system''s
    maximum buffer size is set to a default of 4 MB, the maximum achievable throughput is bounded by the
    ratio: (4 MB / 50 MB) * 400 Gbps = 32 Gbps.'
