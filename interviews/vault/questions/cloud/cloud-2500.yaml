title: Memory Bottleneck in Edge Personalization
scenario: A cloud backend orchestrates on-device personalization for gesture recognition on smart rings (Cortex-M4F, 256KB SRAM). The base model is 100KB INT8, OS/BLE stack takes 64KB. To train, standard backpropagation for 3 convolutional layers requires storing 150KB of intermediate activations, causing an Out-Of-Memory (OOM) crash.
question: How would you redesign on-device personalization so the smart ring can train without exceeding its 256KB SRAM?
details:
  realistic_solution: The cloud must orchestrate Partial Federated Learning (Transfer Learning). The cloud freezes the entire feature extractor. The edge device computes a single forward pass over the local dataset to compute and cache the output vectors. During training, the edge only loads these cached 1D vectors and updates the tiny fully connected head (e.g., 10 classes), bypassing 3D conv activations.
  common_mistake: |
    **The Pitfall:** Attempting to implement gradient checkpointing or swapping activations to external flash memory.
    **The Rationale:** Candidates fail to realize the extreme latency overhead of flash writes or that checkpointing still exceeds the strict 256KB SRAM budget.
    **The Consequence:** The device either crashes with an OOM or training becomes unusably slow.
  napkin_math: |
    - **Available SRAM:** 256KB (Total) - 100KB (Base Model) - 64KB (OS/BLE) = 92KB free.
    - **Full Backprop:** Requires 150KB, causing an immediate OOM (150KB > 92KB).
    - **Transfer Learning (Cached):** 1x256 INT8 feature vector = 256 bytes/sample. Mini-batch of 32 = 8KB.
    - **FC Layer Training:** 256 -> 10 FC layer requires ~10KB for FP32 weights and gradients.
    - **Result:** Total memory needed is 8KB + 10KB = 18KB, leaving **~74KB of SRAM safely free**.
