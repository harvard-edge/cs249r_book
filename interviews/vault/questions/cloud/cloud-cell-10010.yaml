title: Realizing Selective Layer Activation Storage for Inference-Time KV Cache vs. Training Activations
scenario: You are transitioning a 7B model from fine-tuning on H100 (activation memory ≈ 18 GB) to inference
  serving. During fine-tuning, all layer activations are stored for the backward pass. During inference,
  no backward pass occurs, but KV cache grows with sequence length. A colleague claims inference always
  uses less memory than training for the same batch size and sequence length. Evaluate this claim and
  identify the memory regime where inference KV cache can actually exceed training activation memory.
question: "Is inference always lower-memory than training at the same batch and sequence length, and when can KV cache exceed training activations?"
details:
  realistic_solution: 'Training activation memory (with gradient checkpointing, checkpoint every layer):
    approximately 2 × B × S × H × 2 bytes per layer for residual stream only. For 7B (32 layers, H=4096,
    S=2048, B=4): 32 × 2 × 4 × 2048 × 4096 × 2 B = 4.3 GB. KV cache during inference: 2 × num_layers ×
    num_heads × head_dim × S_generated × B × dtype. For 7B at S=32K context, B=64 concurrent sequences:
    2 × 32 × 32 × 128 × 32768 × 64 × 2 B ≈ 1 TiB. KV cache at large batch + long context (1 TiB) vastly
    exceeds training activation memory (4.3 GB).'
  common_mistake: Conflating forward-pass activation memory (which is freed after each token during autoregressive
    inference) with KV cache memory (which accumulates across all generated tokens and is never freed
    within a sequence). During inference, the KV cache persists for the full context window, whereas during
    training, activation memory scales with the batch and sequence but is freed after the backward pass.
  napkin_math: 'Training activations (no checkpoint, S=2048, B=4): 32 layers × 4×2048×4096×2 B ≈ 4.3 GB.
    KV cache (S=32K, B=64): 2 × 32 × 32 × 128 × 32768 × 64 × 2 B = 1,073,741,824,000 bytes ≈ 1 TiB (1,024
    GB). Crossover: KV > training activation when B × S_ctx > B_train × S_train × (32 layers) / (2 × num_heads
    × head_dim).'
