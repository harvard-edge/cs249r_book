title: Feature Store Serving Throughput Under Load
scenario: Your ad ranking system serves 50,000 QPS, each request requiring 150 features
  for 100 candidate ads. The online feature store uses Redis. Calculate the total
  Redis operations per second and determine if a single Redis instance (300K ops/s
  capacity) can handle this. What's your scaling strategy?
question: What total Redis operations per second does this ad ranking feature workload
  require, can one 300K ops/s instance handle it, and how would you scale?
details:
  realistic_solution: 'Break features into user-level (fetched once per request) and
    item-level (fetched per candidate). If 80 features are user-level and 70 are item-level:
    user fetches = 50K × 1 MGET = 50K ops. Item fetches = 50K × 100 candidates × 1
    MGET (batched per candidate group) = 50K × ~10 MGET batches = 500K ops. Total:
    ~550K ops/s. A single Redis instance at 300K ops/s cannot handle this. Solution:
    Redis Cluster with 3 shards (550K / 300K = 1.8, round up), partitioned by entity
    type. User features on shard 1, item features hash-distributed across shards 2-3.'
  common_mistake: Calculating 50K × 150 = 7.5M ops/s and panicking. This ignores that
    many features are shared across candidates (user features), and MGET batching
    reduces round trips dramatically.
  napkin_math: 'Naive: 50K QPS × 100 candidates × 150 features = 750M point lookups/s
    (impossible). Batched with MGET: 50K × (1 user MGET + 10 item MGETs) = 550K ops/s.
    Redis memory: 10M users × 80 features × 8 bytes = 6.4 GB + 1M items × 70 features
    × 8 bytes = 560 MB. Total: ~7 GB, fits in one node''s RAM. Need 2 shards minimum
    for throughput, 3 for headroom.'
