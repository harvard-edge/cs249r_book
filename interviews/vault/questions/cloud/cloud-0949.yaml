title: WAN Overhead in Carbon Scheduling
scenario: A workload scheduler migrated a distributed LLM training job running on 1,024 A100 GPUs (800W system power per GPU) from a US-East data center (400 gCO2/kWh) to an EU-North facility (150 gCO2/kWh) for a 10-hour training phase. The migration required transferring 100 TB of dataset and checkpoint state across a trans-Atlantic WAN link. Post-mortem telemetry reveals the total operational carbon footprint for this phase actually increased by over 200 kg CO2, and cluster utilization dropped significantly.
question: "Why did moving the 10-hour 1,024-GPU job to EU-North increase carbon despite the cleaner grid?"
details:
  realistic_solution: The scheduling cost function must incorporate network data transfer emissions and idle GPU power. Transferring 100TB over WAN consumes massive energy (~5000 kWh), often negating local grid savings. Furthermore, 1024 idle GPUs during the ~2.2 hour transfer consume an additional 337 kWh. The net result is a +202 kg CO2 increase despite the lower grid carbon intensity, making the migration counterproductive.
  common_mistake: |
    **The Pitfall:** Focusing solely on the data center PUE or local grid carbon intensity.
    **The Rationale:** Candidates completely ignore the massive energy cost of transmitting large datasets over WAN and the idle GPU power during the transfer window.
    **The Consequence:** Implementing a "carbon-aware" scheduling policy that ironically increases the total operational carbon footprint.
  napkin_math: |
    - **Compute Savings:** 1,024 GPUs * 0.8 kW * 10 h = 8,192 kWh.
    - **Emission Reduction:** 8,192 kWh * (400 - 150) gCO2/kWh = 2,048,000 g = 2,048 kg CO2 saved.
    - **Data Transfer Cost:** 100,000 GB * ~0.05 kWh/GB = 5,000 kWh.
    - **Transfer Emissions:** 5,000 kWh * 450 gCO2/kWh = 2,250 kg CO2.
    - **Idle GPU Power (Transfer Time):** At 100 Gbps, 100 TB takes ~2.2 hours. 1,024 idle GPUs consume 337 kWh.
    - **Net Carbon Change:** 2,250 kg (transfer) - 2,048 kg (saved) = **+202 kg CO2.**
