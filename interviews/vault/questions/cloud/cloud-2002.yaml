title: Diagnosing Parallel Fan-out Tail Latency
scenario: A distributed recommender system processes a user request by fanning out queries to 50 independent
  inference microservices in parallel (e.g., candidate generators, embedding lookups). Monitoring metrics
  show that the median (p50) response time of an individual service is a fast 10ms, but the 99th percentile
  (p99) latency spikes to 150ms due to garbage collection and network jitter. The overall user request
  is only complete when all 50 parallel responses are received. Despite the 10ms component median, dashboards
  show the overall system median latency is severely degraded and unpredictable. Diagnose why the median
  user experience is bottlenecked and calculate the probability of an overall request experiencing the
  tail latency.
details:
  realistic_solution: Identify that the overall system latency is bounded by the max of 50 independent
    probability distributions. To mitigate this without fixing the underlying 150ms spikes, implement
    'hedged requests' (sending a duplicate secondary request to a different replica if the primary hasn't
    responded within the expected p90 time) or allow returning partial results to truncate the tail.
  common_mistake: Assuming that combining multiple services with a 10ms median will result in a 10ms overall
    system median, ignoring that a parallel scatter-gather request must wait for the absolute slowest
    response.
  napkin_math: A single service hits the p99 latency 1% of the time. The probability a single service
    is FAST (<150ms) is 0.99. The probability that ALL 50 services are fast is (0.99)^50 ≈ 0.605. Therefore,
    there is a ~39.5% chance the user request is delayed by at least one 150ms response. If fanned out
    to 100 services, the probability of hitting the tail is 1 - (0.99)^100 ≈ 63.4%, meaning the 150ms
    tail actually becomes the median overall system latency.
