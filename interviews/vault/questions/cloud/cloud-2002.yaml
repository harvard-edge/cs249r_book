title: Diagnosing Parallel Fan-out Tail Latency
scenario: 'A distributed recommender system processes a user request by fanning out queries to 50 independent inference microservices in parallel. Monitoring metrics show that the median (p50) response time of an individual service is a fast 10ms, but the 99th percentile (p99) latency spikes to 150ms due to garbage collection and network jitter. The overall user request is only complete when all 50 parallel responses are received. Despite the 10ms component median, dashboards show the overall system median latency is severely degraded and unpredictable.'
question: 'Diagnose why the median user latency degraded in the 50-way scatter-gather system, and calculate the chance of hitting the 150ms tail.'
details:
  realistic_solution: 'Identify that the overall system latency is bounded by the max of 50 independent probability distributions. To mitigate this without fixing the underlying 150ms spikes, implement hedged requests (sending a duplicate secondary request to a different replica if the primary has not responded within the expected p90 time) or allow returning partial results to truncate the tail.'
  common_mistake: |
    **The Pitfall:** Assuming that combining multiple services with a 10ms median will result in a 10ms overall system median.
    **The Rationale:** Engineers often misunderstand tail latency compounding in distributed systems.
    **The Consequence:** Ignoring the mathematical certainty that a scatter-gather request must wait for the absolute slowest response, failing to implement hedged requests.
  napkin_math: |
    - **Single Service Fast Probability:** A single service hits the <150ms latency 99% of the time (0.99).
    - **Overall Fast Probability (50 services):** The probability that ALL 50 services are fast is (0.99)^50 ≈ 0.605.
    - **Tail Probability:** There is a 1 - 0.605 = ~39.5% chance the user request is delayed by at least one 150ms response.
    - **Scaling Effect:** **If fanned out to 100 services, the probability of hitting the tail is 1 - (0.99)^100 ≈ 63.4%, meaning the 150ms tail actually becomes the overall median.**
