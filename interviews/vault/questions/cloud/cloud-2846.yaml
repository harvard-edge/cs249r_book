title: Tree AllReduce on 8 Ranks
scenario: 'Eight GPU ranks are participating in a tree-based AllReduce to aggregate
  gradients after a training step. The gradient tensor is 800 MB total, split evenly
  across the 8 ranks (100 MB per rank). The interconnect is hierarchical: leaf ranks
  connect to their parent at 100 GB/s, and parents connect to the root at 200 GB/s.
  The diagram shows the topology in the reduce-up phase.'
question: Using the diagram, compute the wall-clock time of the reduce-up phase, and
  explain why tree AllReduce scales as O(log N) in latency rather than the O(N) of
  Ring AllReduce on this same fabric.
visual:
  kind: svg
  path: cloud-2846.svg
  source_format: dot
  alt: 'Tree AllReduce topology: 8 leaf ranks R0 through R7 at the bottom, each paired
    into 4 mid-tier aggregators P0 through P3 via 100 GB/s links, and all four aggregators
    connecting up to a single Root via 200 GB/s links. Two phases are implied by the
    bottom-up arrow direction.'
  caption: Tree AllReduce on 8 ranks — leaf links 100 GB/s, parent links 200 GB/s.
details:
  realistic_solution: 'The reduce-up phase has two stages because the tree has two
    levels above the leaves. Stage 1: each parent receives 100 MB from its 2 leaf
    children over a 100 GB/s link, so step time = 100 MB / 100 GB/s = 1 ms. Stage
    2: the root receives one merged shard from each of the 4 parents over the 200
    GB/s link; even with serialization across the 4 parent links, each transfer is
    200 MB (merged) / 200 GB/s = 1 ms. Total reduce-up = 2 ms. The broadcast-down
    phase mirrors this for another 2 ms, giving 4 ms total. The O(log N) scaling falls
    out because the tree''s depth grows as log_2(N) rather than linearly: doubling
    ranks adds one more stage, not N more steps. Ring AllReduce on the same data would
    take 2(N-1)/N × 800 MB / 200 GB/s ≈ 7 ms on average — slower for N=8 and worse
    as N grows.'
  common_mistake: 'Treating tree AllReduce as if every link delivers the full 800
    MB. Each link only carries the merged shard for the sub-tree below it (100 MB
    at leaves, 200 MB at the root). Or: forgetting that AllReduce is two phases (reduce-up
    + broadcast-down), so the wall-clock is 2× the reduce time alone.'
  napkin_math: 'Reduce-up step 1 (leaves → parents): 100 MB / 100 GB/s = 1 ms. Reduce-up
    step 2 (parents → root): merged 200 MB / 200 GB/s = 1 ms. Reduce-up total = 2
    ms. Broadcast-down mirrors this, giving 4 ms total. log_2(8) = 3, but only 2 levels
    above the leaves contribute time.'
