title: Tree AllReduce on 8 Ranks
scenario: 'Eight GPU ranks are participating in an AllReduce to aggregate an 800 MB
  gradient tensor. The interconnect is hierarchical: leaf ranks connect to their parent at 100 GB/s,
  and parents connect to the root at 200 GB/s. You are comparing a simple Pipelined Tree AllReduce
  against a Ring AllReduce mapped onto this exact topology.'
question: 'Compute the bandwidth-bound wall-clock time for both Pipelined Tree AllReduce
  and Ring AllReduce for the 800 MB tensor. Why might a simple Tree AllReduce be strictly slower
  in bandwidth than Ring, and how do Double Binary Trees fix this?'
visual:
  kind: svg
  path: cloud-2846.svg
  alt: 'Tree AllReduce topology: 8 leaf ranks R0 through R7 at the bottom, each paired
    into 4 mid-tier aggregators P0 through P3 via 100 GB/s links, and all four aggregators
    connecting up to a single Root via 200 GB/s links.'
  caption: Tree AllReduce on 8 ranks — leaf links 100 GB/s, parent links 200 GB/s.
details:
  realistic_solution: 'For a simple Pipelined Tree AllReduce, the full 800 MB tensor must be
    streamed up to the root (reduce-up) and back down (broadcast). The bottleneck is the 100 GB/s
    leaf link. Reduce-up takes 800 MB / 100 GB/s = 8 ms. Broadcast takes 8 ms. Total = 16 ms.
    For Ring AllReduce, each node transmits 2*(N-1)/N * S = 2 * (7/8) * 800 = 1400 MB total.
    Bottlenecked by the 100 GB/s link, this takes 14 ms. Ring is actually faster (14ms vs 16ms)
    for pure bandwidth! A simple tree only wins on latency (O(log N) hops vs O(N) hops). To fix the
    bandwidth deficiency, NCCL uses Double Binary Trees, which split the tensor in half and run two
    trees in opposite directions, utilizing both RX and TX links simultaneously during both phases,
    effectively doubling the bandwidth and dropping the tree time to ~8 ms.'
  common_mistake: 'Assuming Tree AllReduce magically reduces the total volume of data transmitted
    compared to Ring AllReduce. In reality, a standard single Tree AllReduce moves MORE data per
    bottleneck link (2 * S) than a Ring AllReduce (2 * (N-1)/N * S). Its primary advantage is O(log N)
    latency scaling, not bandwidth.'
  napkin_math: 'Pipelined Tree AllReduce:
    Bottleneck = 100 GB/s (leaf links).
    Reduce-up = 800 MB / 100 GB/s = 8 ms.
    Broadcast = 800 MB / 100 GB/s = 8 ms.
    Total Tree = 16 ms.

    Ring AllReduce (on same topology):
    Volume per node = 2 * (7/8) * 800 MB = 1400 MB.
    Bottleneck = 100 GB/s.
    Total Ring = 1400 MB / 100 GB/s = 14 ms.'
