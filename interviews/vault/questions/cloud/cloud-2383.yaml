title: Edge-Cloud Traffic Camera Bandwidth Optimization
scenario: 5,000 4G LTE intersection cameras. Cloud tracks vehicles globally across the city. 4G data costs
  $0.05/GB. 1080p @ 15fps video = 2 Mbps per camera. Total cost to stream all video is exorbitant. The
  camera has an edge NPU with 2MB SRAM. Architect the edge-cloud distributed system.
details:
  realistic_solution: Move the perception stack entirely to the edge. The NPU runs YOLO for object detection
    and a lightweight Re-ID model to generate embeddings. The edge device only transmits a JSON payload
    to the cloud containing vehicle embeddings, bounding boxes, and timestamps. The cloud acts purely
    as a tracking and routing aggregator.
  common_mistake: Downscaling video to 480p and streaming to the cloud, which still costs thousands of
    dollars daily and degrades tracking accuracy.
  napkin_math: 'Raw streaming 1080p @ 15fps takes 2 Mbps = 0.25 MB/s = 21.6 GB/day per camera. For 5,000
    cameras, 108,000 GB/day at $0.05/GB costs $5,400/day. Using the edge NPU, we run a lightweight tracking
    model. Instead of video, we send metadata: 10 vehicles/frame * 15fps * (128B embedding + 32B bbox)
    = 2.4 KB/s = 0.2 GB/day per camera. Total data is 1,000 GB/day = $50/day. Edge ML saves $5,350/day
    (99% cost reduction).'
