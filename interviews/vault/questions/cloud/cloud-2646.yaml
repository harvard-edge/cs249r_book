title: Prioritizing ML Test Score Improvements
scenario: 'You have 8 engineering weeks to improve an ML system scoring 10/28 on the ML Test Score. You
  can invest in: (A) comprehensive model fairness testing (+3 tests, 8 weeks), (B) data drift monitoring
  + feature validation (+4 tests, 6 weeks) + basic alerting (+1 test, 2 weeks), or (C) canary deployment
  + automated rollback (+2 tests, 8 weeks). Which investment maximizes operational reliability?'
details:
  realistic_solution: 'Option B is the best investment. It addresses 5 tests in 8 weeks (from 10 to 15)
    compared to A''s 3 tests and C''s 2 tests. More importantly, data drift and feature validation catch
    the #1 cause of production ML failure: silent data quality degradation. Studies show ~60% of ML production
    incidents stem from data issues, not model issues. Option A (fairness testing) is critical for responsible
    AI but doesn''t prevent the most common production failures — it catches bias issues that are relatively
    stable over time. Option C (canary + rollback) provides a safety net but only after damage is detected
    — it''s reactive. Option B is proactive: drift detection catches problems before they affect users,
    feature validation prevents bad data from entering the pipeline, and alerting notifies the team immediately.
    The ideal sequence: B first (detect problems) → C second (respond to problems) → A third (ensure equity).'
  common_mistake: Investing in deployment automation (canary, rollback) before data monitoring. You cannot
    roll back from a problem you cannot detect.
  napkin_math: 'B: 5 tests, covers 60% of production failures (data issues). A: 3 tests, covers ~15% (fairness).
    C: 2 tests, covers ~20% (deployment failures). B has best coverage/week ratio.'
