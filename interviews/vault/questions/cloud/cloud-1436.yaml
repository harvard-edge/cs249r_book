title: Root-Causing Variance in Resume Screening
scenario: You are debugging an NLP resume screening model deployed on T4 GPUs processing 10,000 resumes/hour.
  During an audit using invariance testing, you discover that swapping names associated with different
  demographics on otherwise identical resumes causes the 'Senior Engineer' confidence score to fluctuate
  between 62% and 85%. Furthermore, redacting the names entirely drops the score to 45%. Diagnose the
  root cause of this variance despite the redaction, and explain how to analyze the pipeline to fix it.
details:
  realistic_solution: Analyze feature attributions (e.g., Integrated Gradients) on the mutated inputs
    to identify proxy variables. Apply Iterative Nullspace Projection (INLP) to project the 768-dimensional
    embeddings orthogonally to the demographic concept subspace before the classification head.
  common_mistake: Assuming fairness through unawareness (redacting names) works, while failing to analyze
    how proxy variables (like specific university clubs or vocabulary choices) still leak demographic
    information into the dense embeddings.
  napkin_math: If the embedding dimension D=768 and the demographic concept subspace rank k=4, INLP projects
    embeddings to a (768-4)=764 dimensional nullspace. This O(D^2) projection per token takes ~1.2M FLOPs,
    adding negligible latency (<1ms on T4) while reducing demographic variance in scores by >95%.
