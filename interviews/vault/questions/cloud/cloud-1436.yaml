title: Root-Causing Variance in Resume Screening
scenario: You are debugging an NLP resume screening model. You discover that swapping names associated with different demographics on identical resumes causes the score to fluctuate between 62% and 85%. Furthermore, redacting the names entirely drops the score to 45%.
question: Why do name swaps and redaction still change the resume model's score, and how would you analyze and fix the pipeline?
details:
  realistic_solution: Analyze feature attributions to identify proxy variables. Apply Iterative Nullspace Projection (INLP) to project the embeddings orthogonally to the demographic concept subspace before the classification head.
  common_mistake: |
    **The Pitfall:** Relying strictly on 'fairness through unawareness' by just redacting explicit identifiers like names.
    **The Rationale:** Candidates fail to understand that dense embeddings naturally capture demographic proxies from surrounding text.
    **The Consequence:** Deploying a model that continues to exhibit hidden demographic bias via proxy variables like university clubs or vocabulary.
  napkin_math: |
    - **Embedding setup**: Dimension D=768, demographic concept subspace rank k=4.
    - **INLP operation**: Projects embeddings to a (768-4)=764 dimensional nullspace.
    - **Compute cost**: O(D^2) projection per token takes ~1.2M FLOPs.
    - **Conclusion: This adds negligible latency (<1ms on T4) while drastically reducing demographic variance by >95%.**
