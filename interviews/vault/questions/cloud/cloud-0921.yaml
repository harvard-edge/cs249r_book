title: Calculate Memory and Compute Savings for a BNN
scenario: Your cloud microservice must process 10,000 concurrent audio streams for a trigger detection
  model. The baseline FP32 CNN requires 4MB of weights and 20 MFLOPs per inference. To fit the entire
  workload within the L3 cache of a single CPU and maximize throughput, you quantize the model to a Binary
  Neural Network (1-bit weights and activations). Assuming the first and last layers are kept at 8-bit
  and represent 5% of the original FP32 parameters, calculate the new memory footprint of the weights
  and the effective number of XNOR-popcount instructions required if the CPU processes 64 bits per XNOR
  instruction.
question: "What is the BNN weight footprint with 5% of FP32 parameters kept at INT8, and how many 64-bit XNOR-popcount instructions are needed?"
details:
  realistic_solution: 'Calculate the partitioned footprint: 5% of the parameters are quantized to INT8
    (1/4th the FP32 size) and 95% are binarized to 1-bit (1/32nd the FP32 size). The new memory footprint
    is 172.8KB. For compute, the 19 million binarized operations are packed into 64-bit XNOR instructions,
    reducing them to ~297K instructions.'
  common_mistake: Applying a flat 1/32 reduction to the entire model memory and failing to account for
    64-bit register packing when calculating the required number of XNOR-popcount instructions.
  napkin_math: An FP32 CNN takes 4MB of weights. If binarized (1-bit), those weights compress 32x to 125KB,
    easily fitting entirely inside a CPU's L3 cache, eliminating slow main-memory fetches! For the 20
    MFLOPs compute, standard FP32 operations are replaced by bitwise XNOR and POPCOUNT instructions. Processing
    64 weights per cycle, the 20M ops reduce to ~312k ultra-fast bitwise operations.
