title: Evaluating Compute Upgrades for LLM Decoding
scenario: You are designing an inference service for a 30B parameter LLM (FP16, 60GB weights) running
  on a single NVIDIA A100 (2.0 TB/s memory bandwidth, 312 TFLOPs FP16). The product manager wants to minimize
  latency for single-user queries (batch size = 1). An engineer proposes upgrading to a hypothetical next-gen
  GPU with 624 TFLOPs but the same 2.0 TB/s memory bandwidth to halve the token generation latency. Evaluate
  this proposal and justify your architectural decisions for actually improving throughput and latency.
question: "Will doubling TFLOPs while keeping 2.0TB/s bandwidth halve batch-1 token latency, and what should you do instead?"
details:
  realistic_solution: Reject the proposal; it will yield almost zero latency improvement. At batch size
    1, decoding requires loading all 60GB of weights from HBM for every token, resulting in an arithmetic
    intensity of ~2 FLOPs/byte. Since the A100's ridge point is 156 FLOPs/byte (312 TFLOPs / 2.0 TB/s),
    the workload is a classic 'bandwidth hog'. To actually improve latency and throughput, implement weight
    quantization (e.g., INT8 or INT4) to reduce bytes loaded per token, use speculative decoding, or increase
    batch size (via continuous batching) to improve arithmetic intensity.
  common_mistake: Assuming that token generation latency is compute-bound and will scale proportionally
    with raw TFLOPs, failing to recognize the severely low arithmetic intensity of auto-regressive decoding
    at batch size 1.
  napkin_math: For batch size 1 inference, decoding is memory-bandwidth bound. On an A100 (2.0 TB/s),
    fetching 60GB of FP16 weights takes 60GB / 2.0TB/s = 30ms per token. The 312 TFLOPS compute time is
    only (2 * 30B FLOPs) / 312e12 = 0.19ms. Total time = 30.19ms. If you bought an H100 (989 TFLOPS, 3.35
    TB/s), compute drops to 0.06ms, but memory time drops to 17.9ms. Bandwidth is all that matters.
