title: The Fragmentation Crisis
scenario: >-
  We are serving a chatbot. Even though we have 40GB of free VRAM, our inference
  server refuses to accept new concurrent requests, citing an 'Out of Memory' error.
question: >-
  What is consuming our VRAM invisibly, and how do we fix it?
details:
  realistic_solution: 'KV-Cache memory fragmentation. Standard attention allocates contiguous VRAM for the *maximum possible* sequence length of every request. Because actual sequence lengths are unpredictable, this wastes 60-80% of memory. You must implement PagedAttention (like vLLM), which maps virtual KV-cache blocks to non-contiguous physical blocks, allowing near-zero fragmentation and 2-3x higher batch sizes.'
  common_mistake: |
    **The Pitfall:** Assuming a memory leak in the serving framework.
    **The Rationale:** Candidates don't understand that standard attention statically allocates contiguous VRAM for the maximum possible sequence length of every request.
    **The Consequence:** Wasting 60-80% of VRAM on fragmentation instead of implementing PagedAttention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard attention statically allocates contiguous VRAM for max sequence length.
    - Max sequence reservation is 8192 tokens.
    - Average actual sequence is 500 tokens.

    **Calculations:**
    - Waste calculation = (8192 - 500) / 8192 = 93.9% memory wasted.
    - Current state = 40 GB serves only ~3 requests due to ~13 GB per max-length reservation.
    - Fix (PagedAttention) = 3 requests × 500 tokens = 1500 tokens used.

    **Conclusion & Interpretation:**
    - **Result: 20+ extra requests (Memory-Bound)**. Implementing PagedAttention eliminates fragmentation waste by mapping virtual blocks to non-contiguous physical memory.
