title: Optimizing Inference Routing for High-Throughput TPU v5e Farms
scenario: 'You manage an inference service on a fleet of TPU v5e accelerators. The service handles millions of diverse inference requests per second. Currently, request routing uses a simple round-robin approach. You are observing inconsistent latency and underutilized TPUs, especially when traffic patterns change rapidly.'
question: 'How would you replace round-robin with adaptive routing for TPU v5e inference to improve utilization and latency under fluctuating load?'
details:
  realistic_solution: 'Implement a dynamic, intelligent request routing strategy leveraging consistent hashing combined with a least-loaded or weighted round-robin approach. Utilize consistent hashing to map specific model requests or user sessions to a subset of TPUs, improving data locality (e.g., model weights in HBM) and reducing reloads. Introduce a feedback mechanism where the load balancer continuously monitors real-time TPU metrics (e.g., queue depth, inference latency, HBM utilization, accelerator idle cycles). Dynamically adjust routing weights or directly route new requests to the least-loaded TPU within the consistent hashing bucket. Implement quality-of-service (QoS) differentiation, allowing critical, latency-sensitive inference requests to be prioritized or routed to TPUs with guaranteed capacity, possibly through dedicated queues or dynamic preemption. This adaptive strategy minimizes rebalancing costs, distributes load more evenly across heterogeneous workloads, and responds effectively to traffic fluctuations and individual TPU performance characteristics.'
  common_mistake: |
    **The Pitfall:** Applying a naive load balancing strategy like round-robin to heterogeneous ML inference workloads.
    **The Rationale:** Round-robin works well for standard microservices, so infrastructure engineers reuse it for ML endpoints, ignoring that inference requests have vastly different compute and memory requirements.
    **The Consequence:** This leads to severe hot-spotting, where some accelerators are crushed by a sequence of heavy requests while others sit idle, drastically reducing overall cluster throughput.
  napkin_math: |
    - **Current Utilization:** 20% of TPUs bottlenecked at 50% capacity, 80% underutilized at 70%. Effective utilization = (0.2 * 0.5) + (0.8 * 0.7) = 66%.
    - **Optimized Utilization:** Adaptive routing pushes cluster utilization to 90%.
    - **Throughput Gain:** (0.90 / 0.66) - 1 = **~36% increase in effective throughput.**
    - **Bandwidth Limits:** A TPU with 1.6 TB/s HBM bandwidth handling a 50 GB/inference model can sustain 32 inf/sec. Spreading load evenly avoids hitting this cap prematurely.
