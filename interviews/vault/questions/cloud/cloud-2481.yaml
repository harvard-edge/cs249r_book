title: Edge-Cloud Hybrid Video Break-Even
scenario: You manage 5,000 smart city traffic cameras (1080p, 30fps). Option A streams H.264 video to cloud GPUs for YOLOv8 object detection (requires 2Mbps per stream, cloud GPU costs $1.50/hr handling 20 streams, bandwidth is $0.05/GB). Option B deploys edge NPUs ($150 each, 15 TOPS) running INT8 quantized YOLOv8, sending only metadata (10Kbps) to the cloud.
question: Which option has the lower 3-year TCO for 5,000 traffic cameras, and what accuracy/deployment tradeoffs must you evaluate?
details:
  realistic_solution: |
    Build a Total Cost of Ownership (TCO) model over 3 years, analyzing the tradeoff between Edge CapEx vs Cloud OpEx (Compute + Bandwidth). With Option B, the hardware-algorithm co-design requires evaluating whether an INT8 quantized model on a 15 TOPS NPU maintains the required mAP for traffic detection compared to the FP16 cloud model.
  common_mistake: |
    **The Pitfall:** Ignoring network egress/ingress bandwidth costs.
    **The Rationale:** Candidates focus solely on compute costs (GPUs vs NPUs) and forget the massive data volume of continuous video streams.
    **The Consequence:** Severely underestimating the cloud TCO, which is often dominated by bandwidth, not compute.
  napkin_math: |
    1. Option A (Cloud) Compute: 5,000 / 20 = 250 GPUs * $1.50/hr * 8760 hrs = $3.28M/yr.
    2. Option A (Cloud) Bandwidth: 5,000 * 2Mbps = 10Gbps = 1.25GB/s = 39.4 PB/yr * $0.05/GB = $1.97M/yr.
    3. Total Cloud OpEx = $5.25M/yr.
    4. Option B (Edge) CapEx: 5,000 * $150 = $750K (one-time).
    5. **Conclusion: Edge ROI break-even is reached in less than 2 months ($750K / ($5.25M/12)).**
