schema_version: 1
id: cloud-crit-20003
title: Implementing FlashAttention's Online Softmax
topic: flash-attention
status: published
provenance: imported
scenario: 'You are implementing FlashAttention''s online softmax for head_dim=128 on an H100. The key
  challenge: softmax requires the global row maximum, but you process K in tiles of B_c=128 tokens. Describe
  the rescaling update rule when a new tile produces a larger row maximum, and compute the extra FLOPs
  overhead vs standard softmax.'
details:
  realistic_solution: 'When processing tile j, compute local max m_j over S_ij = Q_i @ K_j^T. If m_j >
    m_{j-1} (running max), rescale: O_i *= exp(m_{j-1} - m_j), l_i *= exp(m_{j-1} - m_j), then accumulate
    O_i += exp(S_ij - m_j) @ V_j and l_i += rowsum(exp(S_ij - m_j)). The rescaling costs 2*B_r*d = 2*128*128
    = 32K FLOPs per tile update. Total matmul FLOPs per tile: 2*B_r*B_c*d = 2*128*128*128 = 4M FLOPs.
    Overhead: 32K/4M = 0.8%. Negligible.'
  common_mistake: Thinking online softmax adds significant compute overhead. The rescaling is O(d) per
    row per tile update, which is negligible compared to the O(N*d) matmul work.
  napkin_math: 'Rescaling FLOPs per tile: 2 x 128 x 128 = 32K. Matmul FLOPs per tile: 2 x 128 x 128 x
    128 = 4.2M. Overhead: 0.76%.'
last_modified: '2026-04-01'
