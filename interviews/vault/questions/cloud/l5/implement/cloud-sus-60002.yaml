schema_version: 1
id: cloud-sus-60002
title: Implementing a numerically stable custom backward pass for a fused loss function
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are implementing a custom cross-entropy variant that fuses the softmax and log-sum-exp into
  a single CUDA kernel for MI300X (192GB, 5.3TB/s). The forward pass computes log(sum(exp(x))) but naively
  overflows in FP16. You need to implement the backward pass using torch.autograd.Function.
details:
  realistic_solution: 'In forward: save softmax output (not logits) using ctx.save_for_backward. Compute
    log-sum-exp with the max-subtraction trick: m = max(x), output = log(sum(exp(x-m))) + m. In backward:
    grad_input = softmax - (1 if label else 0), which requires only the saved softmax. Mark ctx.mark_non_differentiable()
    for any integer indices.'
  common_mistake: Computing exp(x) directly in FP16 before subtracting the max, causing inf values. In
    the backward pass, recomputing softmax from scratch instead of saving it from the forward pass, wasting
    memory bandwidth on MI300X's 5.3TB/s fabric.
  napkin_math: 'Saving softmax (N × C × 4 bytes FP32) vs recomputing: for batch=512, C=50000, saving costs
    512×50000×4=102MB. Recompute costs 1 extra forward pass ≈ +15% step time. At 5.3TB/s, loading 102MB
    takes 0.019ms — saving is clearly worth it.'
