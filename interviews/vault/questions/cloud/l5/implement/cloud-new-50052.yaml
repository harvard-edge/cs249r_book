schema_version: 1
id: cloud-new-50052
title: NCCL Async Operations and CUDA Stream Orchestration for Overlap
topic: communication-computation-overlap
status: published
provenance: imported
scenario: You are implementing a custom training loop (not using PyTorch DDP) for a mixture-of-experts
  model. You need to manually overlap AllReduce with backward computation using NCCL async operations
  on separate CUDA streams. The model has expert parameters and shared parameters that need different
  AllReduce groups.
details:
  realistic_solution: 4GB / 50 GB/s = 80ms serial time (not 40ms which requires either 2GB data or 100
    GB/s bandwidth).
  common_mistake: Issuing NCCL calls on the default CUDA stream, which serializes all operations. NCCL
    operations must be on a dedicated communication stream to overlap with compute on the default stream.
  napkin_math: 'Serial transfer time: 4GB at 50 GB/s = 4/50 = 0.08s = 80ms (not 40ms — 40ms would require
    100 GB/s bandwidth or 2GB data). 4GB / 50GB/s = 0.080s = 80ms.'
