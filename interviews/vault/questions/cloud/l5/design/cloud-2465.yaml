id: cloud-2465
title: Cloud-Edge Cascade for Retail Analytics
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are managing a fleet of 50,000 retail security cameras (1080p, 15 FPS). Currently, all video
  is streamed to AWS for shoplifting detection using a heavy ViT model. Cloud compute costs $0.02/hour
  per stream, and AWS ingress bandwidth is free, but the stores' ISP uplink costs $50/month per store
  (avg 10 cameras/store) for sufficient bandwidth. You have a budget to install $300 edge devices per
  store. Architect a system to minimize total 3-year TCO while maintaining >95% recall.
details:
  realistic_solution: Implement a Cloud-Edge Cascade architecture. Install a cheap edge device (e.g.,
    RK3588 or Jetson Nano) within the $300 budget. Deploy a highly quantized (INT8) lightweight CNN (e.g.,
    YOLOv8n) on the edge NPU strictly for motion and person detection. The edge device only crops bounding
    boxes of people and sends these low-resolution, low-framerate (e.g., 2 FPS) crops to the cloud ViT
    model for complex behavioral analysis. This drastically reduces the ISP uplink requirement to a basic
    tier and cuts cloud compute by >90% because the cloud model only processes active human crops rather
    than continuous empty 1080p frames.
  common_mistake: Deploying the full ViT model to the edge device, which requires an expensive GPU (1000+)
    that blows the 300 budget.
  napkin_math: "Current Cloud Compute: 50,000 streams * 24 hrs * 0.02 = 24,000/day -> 8.76M/year. ISP\
    \ Cost: 5,000 stores * 50 * 12 = 3M/year. Total 1-year: 11.76M. \nCascade: Edge filters out 90% of\
    \ frames (empty aisles). Cloud compute drops to 876k/year. ISP drops to 20/month tier (1.2M/year).\
    \ Edge hardware cost: 5,000 * 300 = 1.5M (one-time). Year 1 TCO drops from 11.76M to $3.57M."
