schema_version: 1
id: cloud-2495
title: Federated Learning Power and Comm Budget
topic: power-budgeting
status: published
provenance: imported
scenario: A cloud orchestrator manages federated learning across 100,000 smartwatches (Cortex-M4, 256KB
  SRAM). Each watch has a 300mAh battery (3.8V). An FL round requires downloading a 200KB global model,
  computing 5 epochs (1000 samples), and uploading 200KB weights. Wi-Fi Tx/Rx consumes 250mW at 1Mbps.
  Compute draws 30mW. Product requires that FL consumes no more than 1% of the total battery capacity
  per day.
details:
  realistic_solution: To meet the strict 1% daily battery degradation constraint, the system must co-design
    the communication payload and the orchestration schedule. The cloud orchestrator must limit the number
    of participation rounds per device per day, or apply weight quantization/sparsification to reduce
    the 200KB payload. Given the energy budget, a device can only participate in ~17 full rounds per day.
    The architecture should move to an asynchronous FL model where the cloud randomly selects a subset
    of available devices (e.g., those currently charging) rather than forcing battery-draining synchronous
    updates across the entire fleet.
  common_mistake: Ignoring the communication power cost and scheduling continuous synchronous rounds whenever
    the device is idle.
  napkin_math: 'Battery capacity: 300mAh * 3.8V = 1140 mWh = 4104 Joules. 1% daily budget = 41.04 Joules.
    Comm time (400KB at 1Mbps) = 3.2 seconds. Comm energy = 3.2s * 0.25W = 0.8 J. Compute time (5 epochs
    * 1000 samples = 5000 inferences at 10ms each) = 50 seconds. Compute energy = 50s * 0.03W = 1.5 J.
    Total energy per round = 2.3 J. Max rounds per day = 41.04 / 2.3 = 17.8 rounds.'
