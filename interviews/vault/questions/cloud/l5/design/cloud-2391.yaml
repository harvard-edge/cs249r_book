id: cloud-2391
title: Drift Detection with Extreme Label Delay
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You operate a credit risk classification model processing 100 transactions per second. Fraud
  labels (chargebacks) take 45 days to mature. A new fraud ring exploits a vulnerability, but your traditional
  performance monitoring (Precision/Recall) won't trigger an alert for 45 days, causing massive financial
  loss.
details:
  realistic_solution: 'Design a multivariate proxy-monitoring architecture. Since true labels are delayed,
    establish ''proxy labels'' that correlate with fraud but are observable immediately or within hours.
    1) Track secondary business metrics: failed login attempts, password resets, or secondary manual review
    flags. 2) Implement a multivariate drift detector (e.g., Mahalanobis distance or an Autoencoder reconstruction
    error) on the joint distribution of input features to detect novel attack vectors. 3) Configure automated
    rules: if proxy metrics spike AND multivariate drift exceeds threshold > 3 sigma, automatically route
    suspicious traffic to a slower, high-friction verification model.'
  common_mistake: Relying strictly on univariate feature drift alerts (like KS-tests on individual features),
    which trigger too many false positives to be actionable.
  napkin_math: 100 TPS = 8.64 million transactions/day. Over 45 days = 388 million unlabelled records.
    If the new fraud ring increases false negatives by 0.5%, and average loss is $100, the daily loss
    = 8.64M * 0.005 * $100 = $4.32 million/day. Over 45 days, this is a $194 million loss before the first
    label arrives. Relying on an autoencoder anomaly score (computed in 5ms) drops this detection window
    to hours.
