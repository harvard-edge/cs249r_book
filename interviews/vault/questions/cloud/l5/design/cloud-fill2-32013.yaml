schema_version: 1
id: cloud-fill2-32013
title: 'Interleaved Pipeline Stages: Halving the Bubble'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Megatron-LM introduces interleaved pipeline schedules where each GPU holds multiple non-contiguous
  chunks of the model (e.g., GPU 0 holds layers 0-4 and 20-24 in a 40-layer model across 4 GPUs). Each
  GPU now has v=2 virtual stages. How does this reduce the pipeline bubble compared to standard 1F1B,
  and what is the communication cost?
details:
  realistic_solution: 'With interleaving factor v, each micro-batch pass through one virtual stage takes
    1/v of the time of a standard stage (since each chunk has half the layers). The bubble fraction becomes
    (P-1)/(M×v + P-1). For P=4, M=8, v=2: standard bubble = 3/11 = 27.3%, interleaved bubble = 3/19 =
    15.8%. With v=4: 3/35 = 8.6%. The cost is communication: each micro-batch now crosses GPU boundaries
    v times more, requiring v× more point-to-point sends between stages. For NVLink-connected GPUs within
    a node (900 GB/s on H100), this overhead is small. For cross-node InfiniBand (400 Gb/s = 50 GB/s),
    the communication overhead can offset the bubble reduction. Rule of thumb: use v=2-4 within a node,
    avoid high v across nodes.'
  common_mistake: Thinking interleaving just reorders computation without reducing the bubble. The key
    insight is that interleaving effectively increases the number of pipeline stages (P×v) while keeping
    the same number of physical GPUs, making each micro-batch's forward/backward faster and reducing the
    bubble duration.
  napkin_math: 'Standard: bubble = (P-1)/(M+P-1) = 3/11 = 27.3%. Interleaved v=2: bubble = (P-1)/(M×v+P-1)
    = 3/19 = 15.8%. v=4: 3/35 = 8.6%. Communication overhead: v× more cross-GPU transfers per micro-batch.
    NVLink: negligible. InfiniBand: activation size × v transfers × 2/BW.'
