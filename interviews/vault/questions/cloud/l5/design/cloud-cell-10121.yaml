id: cloud-cell-10121
title: Optimize EfficientNet training throughput with gradient checkpointing and mixed precision
topic: cnn-efficient-design
status: published
provenance: imported
scenario: EfficientNet-B6 training on H100 at batch=128 achieves 420 images/sec/GPU but hits OOM at batch=256
  due to activation memory. The target is 1,200 images/sec/GPU to meet a 24-hour training deadline. Optimize
  the pipeline using gradient checkpointing, BF16, and CUDA graphs.
details:
  realistic_solution: Speedup = (256/128) × (2/1.15) = 2 × 1.739 = 3.48× (not 4.35×).
  common_mistake: Applying gradient checkpointing to all layers, which recomputes activations for every
    forward pass in the backward pass, reducing memory but also reducing throughput by ~30-40% — too expensive
    if memory is not the binding constraint.
  napkin_math: 'Speedup from architectural improvement: (256/128) × (2/1.15) = 2 × 1.739 = 3.478 ≈ 3.48×
    (not 4.35× — 4.35 would require 2 × 2.174 = 2 × (2/0.92) which uses 0.92 not 1.15 in denominator).'
