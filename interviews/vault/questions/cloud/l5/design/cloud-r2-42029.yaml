schema_version: 1
id: cloud-r2-42029
title: CXL Memory Pooling for Inference Serving
topic: interconnect-topology
status: published
provenance: imported
scenario: A new inference cluster uses CXL 3.0 to create a shared memory pool of 2 TB accessible by 8
  MI300X GPUs. Each MI300X has 192 GB local HBM3 (5.3 TB/s) and accesses the CXL pool at 128 GB/s with
  200ns additional latency. Design the memory tiering strategy for serving a 405B model — what goes in
  local HBM vs the CXL pool?
details:
  realistic_solution: '405B model in FP16 = 810 GB total weights. 8 × MI300X local HBM = 1,536 GB. CXL
    pool = 2 TB. Strategy: (1) Hot layers (first and last 10 layers, attention weights) → local HBM. These
    are accessed every token and are latency-critical. Size: ~200 GB distributed across 8 GPUs. (2) Cold
    layers (middle MLP blocks) → CXL pool with prefetching. These are accessed sequentially and can tolerate
    200ns extra latency if prefetched 2 layers ahead. Size: ~610 GB in CXL pool. (3) KV cache → always
    local HBM. At 8-way tensor parallelism, each GPU holds 1/8 of KV cache. (4) Prefetch engine: while
    layer N computes on GPU, layer N+2''s weights stream from CXL at 128 GB/s. Layer size: ~10 GB / 8
    = 1.25 GB per GPU. Prefetch time: 1.25 GB / 128 GB/s = 9.8ms. Layer compute time: ~15ms. Prefetch
    completes before needed.'
  common_mistake: Putting KV cache in the CXL pool because it's the largest memory consumer. KV cache
    is accessed every decode step with strict latency requirements — it must stay in fast HBM. The CXL
    pool is better for cold model weights that are accessed infrequently.
  napkin_math: 'Local HBM per GPU: 192 GB at 5.3 TB/s. CXL: 2 TB shared at 128 GB/s. Model: 810 GB. Per
    GPU (8-way TP): 101 GB weights. Hot weights (25 layers): 50 GB → HBM. Cold weights (55 layers): 51
    GB → CXL. KV cache budget per GPU: 192 - 50 = 142 GB. Prefetch: 51 GB / 55 layers = 0.93 GB per layer
    / 128 GB/s = 7.3ms. Layer compute: ~15ms. Prefetch ratio: 7.3/15 = 0.49 — overlaps fully.'
