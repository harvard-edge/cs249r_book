id: cloud-2388
title: Managing GenAI Observability Data Explosion
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: An LLM API gateway processes 2,000 requests per second. The observability sidecar logs the full
  prompt, generation, and metadata (average 15KB per request) into an Elasticsearch cluster to monitor
  for hallucinations and toxicity. The hot-tier storage costs have ballooned to $45,000/month, and ingestion
  latency is causing backpressure on the gateway.
details:
  realistic_solution: 'Implement intelligent, dynamic observability sampling based on semantic anomaly
    detection and HTTP status. Architecture: 1) Log 100% of requests with errors (5xx, 4xx) or explicit
    negative user feedback (thumbs down). 2) Run a lightweight, fast classifier (e.g., a tiny BERT model
    or heuristics) asynchronously to flag high-toxicity or high-perplexity generations, logging 100% of
    these. 3) Apply a heavily downsampled rate (e.g., 1%) for normal, successful requests to maintain
    a baseline distribution. Route the unindexed raw logs directly to cheap cold storage (S3) for compliance,
    bypassing Elasticsearch.'
  common_mistake: Truncating the prompts and completions to 512 characters, which destroys the context
    needed for debugging hallucinations.
  napkin_math: 'Data rate: 2,000 QPS * 15 KB = 30 MB/s = 2.59 TB/day. Over 30 days = 77.7 TB. At $0.50/GB/month
    for managed Hot Elasticsearch, cost = $38,850/month. By sampling: 5% error/flagged + 1% baseline =
    6% of traffic. 77.7 TB * 0.06 = 4.66 TB. New ES cost = ~ $2,330/month, saving over 90% while retaining
    high-signal debugging data.'
