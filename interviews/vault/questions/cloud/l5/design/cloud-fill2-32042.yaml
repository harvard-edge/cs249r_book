id: cloud-fill2-32042
title: Sliding Window Attention with FlashAttention Tiling
topic: flash-attention
status: published
provenance: imported
scenario: Mistral-7B uses sliding window attention with window size W=4096. For a 32K context, each token
  only attends to the previous 4096 tokens instead of all 32K. How does this interact with FlashAttention
  tiling, and what are the memory and compute savings compared to full causal attention with FlashAttention?
details:
  realistic_solution: 'With full causal attention at N=32K: FlashAttention processes the lower triangle
    of the N×N matrix = N²/2 effective entries. With sliding window W=4096: each row has at most W non-zero
    entries. Total entries: N×W (for N>W). Compute ratio: (N×W) / (N²/2) = 2W/N = 2×4096/32768 = 25%.
    So 75% of FlashAttention tiles can be skipped. In tiling: for tile at position (i_block, j_block),
    skip if j_block''s tokens are all more than W positions before i_block''s tokens. Only tiles within
    a band of width W/B_c blocks around the diagonal are computed. KV cache savings: at generation time,
    each token only needs the last W=4096 tokens'' KV cache, not all previous tokens. KV cache is bounded
    at 4096 × head_dim × 2 × 2B per head regardless of total context length. A 32K context uses the same
    KV cache as a 4K context, enabling memory-efficient long-context serving.'
  common_mistake: Assuming sliding window is just a mask applied after computing full attention. With
    proper tiling, tiles outside the window can be skipped entirely — no computation at all, not just
    masking.
  napkin_math: 'Full causal N=32K: FLOPS ∝ N²/2 = 536M per head. Sliding W=4096: FLOPS ∝ N×W = 134M. Savings:
    75%. KV cache: full = 32K tokens × 128d × 2 × 2B = 16 MB/head. Sliding = 4K × 128 × 2 × 2B = 2 MB/head.
    8× memory reduction.'
