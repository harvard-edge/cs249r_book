schema_version: 1
id: cloud-r2-42056
title: Kernel Fusion Strategy for Transformer Blocks
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: 'A single transformer block in a 70B model on MI300X executes 12 separate CUDA kernels: QKV
  projection, Q/K/V split, attention score, softmax, attention output, output projection, residual add,
  LayerNorm, FFN up-projection, GELU, FFN down-projection, residual add. Design a kernel fusion strategy
  that minimizes HBM round-trips while respecting Tensor Core tile boundaries.'
details:
  realistic_solution: 'Three fusion groups based on compute type: Group 1 (Attention fused): QKV projection
    (Tensor Core matmul) → fuse Q/K/V split (register-level reshape) → FlashAttention kernel (fused attention
    score + softmax + output in SRAM). 5 kernels → 2 launches (QKV matmul + FlashAttention). Saves 3 HBM
    round-trips of size seq×dim × 2 bytes each. Group 2 (Residual + Norm fused): Output projection (Tensor
    Core) → fused residual add + LayerNorm (single kernel reads projection output from shared memory,
    adds residual, computes mean/variance, normalizes). 3 kernels → 2 launches. Group 3 (FFN fused): FFN
    up-projection (Tensor Core) → fused GELU (applied in epilogue of matmul kernel using CUTLASS epilogue
    fusion) → FFN down-projection (Tensor Core) → fused residual add. 4 kernels → 2 launches (up+GELU,
    down+residual). Total: 12 kernels → 6 launches. HBM round-trips: 12 → 6, saving ~500 GB/s of wasted
    bandwidth.'
  common_mistake: Fusing everything into one mega-kernel. This is impractical because matmul kernels (QKV,
    FFN) need Tensor Cores and specific memory layouts, while element-wise ops (GELU, residual) use CUDA
    cores. Mixing them breaks Tensor Core scheduling and register allocation.
  napkin_math: 'Unfused: 12 kernels × 32 MB activation per kernel = 384 MB HBM reads + 384 MB writes =
    768 MB per block. At 5.3 TB/s: 0.145ms in memory transfers alone. Fused (6 kernels): 192 MB reads
    + 192 MB writes = 384 MB. Memory time: 0.072ms. Savings: 0.073ms per block × 80 blocks = 5.84ms per
    forward pass. At 12ms/token decode: fused saves 48% of memory overhead. Training (forward + backward):
    saves 17.5ms per step.'
