id: cloud-cell-13092
title: 'TCO Design: Cost Per Inference for Production API Service'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design the cost model for a production LLaMA-70B inference API on H100 (80GB HBM3). The model
  requires 4 H100s per serving pod (tensor parallel). Each pod serves 100 requests/minute at $2.50/hr/H100.
  Calculate: cost per 1M tokens, revenue required per 1M tokens to achieve 40% gross margin, and how INT4
  quantization (fit on 2 H100s) changes the economics.'
details:
  realistic_solution: 'Pod cost: 4 H100 * $2.50/hr = $10/hr. Throughput: 100 req/min * 60min = 6000 req/hr.
    Avg output 500 tokens: 3M tokens/hr. Cost: $10/3M = $3.33/1M tokens. Revenue at 40% margin: $3.33/(1-0.4)
    = $5.55/1M tokens. INT4: 2 H100s/pod = $5/hr. Same throughput (100 req/min assumed): 3M tokens/hr.
    Cost: $5/3M = $1.67/1M tokens. Revenue needed: $2.78/1M tokens. INT4 cuts cost by 50%. Market price
    GPT-3.5: ~$0.50/1M tokens. To compete: need further optimization (batching, speculative decoding).'
  common_mistake: Not accounting for the full pod cost (4 GPUs per pod) when calculating per-inference
    cost, and ignoring that quantization reduces GPU count per pod (and thus capital cost) but may reduce
    throughput per GPU due to dequantization overhead.
  napkin_math: 'FP16 pod: 4*$2.50=$10/hr. 6000 req/hr * 500 tok/req = 3M tok/hr. Cost=$10/3M=$3.33/1M.
    Revenue at 40% margin: $5.55/1M. INT4 pod: 2*$2.50=$5/hr. Same 3M tok/hr. Cost=$1.67/1M. Revenue:
    $2.78/1M. Market: $0.50/1M (GPT-3.5 Turbo). Need 3.3x cost reduction from $1.67. Options: better utilization
    (150 req/min), speculative decoding (+3x), larger batch size. At 85% H100 utilization: break-even
    with $0.50 pricing requires $0.50*(1-0.4)=$0.30 cost target → 5.6x improvement needed.'
