schema_version: 1
id: cloud-fill-01067
title: Designing High-Performance Interconnects for Large-Scale A100 Clusters
topic: interconnect-topology
status: published
provenance: imported
scenario: You are tasked with designing the interconnect strategy for a distributed training system powering
  a large language model. The system requires 128 NVIDIA A100 GPUs. Each A100 GPU features 80 GB HBM2e
  memory, delivers 312 TFLOPS FP16 performance, boasts a memory bandwidth of 2.0 TB/s, and has a TDP of
  400W. The training workload is highly communication-intensive, with frequent all-reduce and all-gather
  operations. Propose an optimal, scalable, and cost-effective interconnect architecture for this cluster,
  considering intra-node and inter-node communication. Discuss how different topologies (Fat-tree, Torus,
  Dragonfly) and physical interconnects (NVLink, NVSwitch, PCIe, InfiniBand) would factor into your design,
  and justify your choices based on bandwidth, latency, scalability, and cost.
details:
  realistic_solution: An optimal solution typically employs a hierarchical approach. Within each node
    (e.g., 8 A100 GPUs), NVLink and NVSwitch are crucial for maximizing GPU-to-GPU communication, leveraging
    NVLink's 600 GB/s bidirectional per GPU pair and NVSwitch's ability to create a full-mesh topology
    with 6.4 TB/s aggregate bandwidth per A100 SXM4 board. For inter-node communication, a high-radix,
    non-blocking Fat-tree topology built with InfiniBand (e.g., HDR 200 Gb/s or NDR 400 Gb/s) is highly
    effective. This ensures high bisection bandwidth and low latency across the cluster, critical for
    global collective operations. While Dragonfly could offer cost savings for very large clusters by
    using fewer global switches, Fat-tree is generally preferred for its predictable performance and easier
    scaling up to hundreds of nodes for HPC/AI workloads.
  common_mistake: A common mistake is underestimating the communication bandwidth requirements for collective
    operations in large-scale LLM training, especially the bisection bandwidth needed for inter-node communication.
    Another mistake is failing to differentiate between intra-node (NVLink/NVSwitch) and inter-node (InfiniBand)
    optimization, leading to an unbalanced design where one becomes a severe bottleneck.
  napkin_math: 'Consider 16 nodes, each with 8 A100 GPUs. Intra-node: Each A100 has 12 NVLink connections,
    providing 600 GB/s bidirectional. With NVSwitch, an 8-GPU node achieves near-full bisection bandwidth
    for GPU-to-GPU data transfer. Inter-node: If each node is connected to the InfiniBand network with
    8x HDR links (200 Gb/s per link), the total egress/ingress bandwidth per node is 8 * 200 Gb/s = 1.6
    Tb/s (200 GB/s). For a 16-node Fat-tree, if each switch connects 8 nodes, the bisection bandwidth
    would be calculated based on the number of uplinks/downlinks at the core switches. Ensuring the network
    bisection bandwidth scales roughly with the number of GPUs * typical communication bandwidth per GPU
    (e.g., 50-100 GB/s per GPU for all-reduce) is key. For 128 A100s, 128 * 50 GB/s = 6.4 TB/s bisection
    bandwidth is a good target.'
