id: cloud-cell-12077
title: 'Model Size Estimation: Design Sharding Strategy for 405B Model on H100 Cluster'
topic: model-size-estimation
status: published
provenance: imported
scenario: Design the GPU sharding strategy for serving a 405B-parameter LLaMA model (FP8 precision) on
  H100 nodes (80GB HBM3 per GPU, NVLink 600GB/s intra-node, InfiniBand 200Gb/s inter-node). Minimize end-to-end
  latency for interactive generation while maximizing throughput. Specify tensor parallelism degree, pipeline
  parallelism degree, and number of nodes.
details:
  realistic_solution: H100 NVLink bandwidth is 900 GB/s total bidirectional. Using 600 GB/s underestimates
    H100 by 33% (that is A100 spec).
  common_mistake: Choosing maximum parallelism (e.g., TP-64) without considering that all-reduce communication
    across 64 GPUs over InfiniBand becomes the dominant latency term, worse than pipeline bubbles.
  napkin_math: 'H100 NVLink 4.0: 900 GB/s (not 600 GB/s). Tensor parallel communication for 70B model,
    8-way TP: activation shard per layer ≈ seq × hidden/8 × 2B. AllReduce: 2×7/8 × shard_size / 900 GB/s.'
