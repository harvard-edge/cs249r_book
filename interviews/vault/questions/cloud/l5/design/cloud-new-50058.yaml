schema_version: 1
id: cloud-new-50058
title: ZeRO Stage 3 Communication-Computation Overlap Strategy
topic: communication-computation-overlap
status: published
provenance: imported
scenario: You train a 13B model using ZeRO Stage 3 (DeepSpeed) across 64 A100 GPUs. ZeRO-3 partitions
  parameters, gradients, and optimizer states across GPUs. Before each layer's forward pass, all parameters
  for that layer must be AllGathered. This adds communication to the forward pass (not just backward).
  Design the overlap strategy.
details:
  realistic_solution: 'DeepSpeed''s ZeRO-3 prefetch strategy: (1) Forward pass: while computing layer
    L, issue AllGather for layer L+1''s parameters on a separate stream. When layer L finishes, L+1''s
    parameters are already gathered. After layer L''s forward pass, release layer L''s gathered parameters
    (keeping only the local shard). (2) Backward pass: same prefetch in reverse — while computing layer
    L''s backward, AllGather layer L-1''s parameters. (3) Tune prefetch_count: how many layers ahead to
    prefetch. Default: 1 layer ahead. For variable-size layers, prefetch 2+ for small layers. (4) Use
    NCCL''s async AllGather with CUDA events for synchronization. Result: communication is almost fully
    hidden if per-layer compute > AllGather time.'
  common_mistake: 'Only overlapping AllGather with computation for the current layer. The real optimization
    is prefetching: AllGathering the NEXT layer''s parameters while computing the current layer.'
  napkin_math: '13B model, 40 layers. Per-layer params: 325M = 1.3GB BF16. AllGather across 64 GPUs at
    50 GB/s effective IB: 1.3GB/50 = 26ms. Per-layer forward compute: ~30ms. Since compute > AllGather,
    prefetching hides it. Without prefetch: 30 + 26 = 56ms/layer. With prefetch: 30ms/layer. 1.87x speedup
    on forward pass.'
