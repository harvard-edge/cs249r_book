id: cloud-cell-13091
title: 'TCO Design: Spot vs On-Demand vs Reserved Instance Strategy'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design a cost-optimal GPU procurement strategy for a company training LLMs 24/7. Requirements:
  90% availability, 1000 H100-hours/day, fault-tolerant training. Spot H100: $0.75/hr (30% interruption
  rate per hour), On-Demand: $2.50/hr, 1-year Reserved: $1.50/hr, 3-year Reserved: $1.00/hr. Design the
  fleet mix and calculate cost per H100-hour.'
details:
  realistic_solution: 'Spot availability: (1-0.3)^8760hrs... actually: P(not interrupted in 1hr) = 0.7.
    For training: each interruption = checkpoint + restart overhead (say 15min). Effective utilization
    = 0.7 * compute + 0.3 * 0.25 (recovery fraction) = 0.7 + 0.075 = 0.775 effective per spot-hour. Cost
    per effective H100-hour: $0.75/0.775 = $0.968/effective-hr. Reserve + Spot mix: 70% Reserved (guaranteed
    base load), 30% Spot (burst). 700 H100-hr/day reserved at $1.00/hr = $700/day. 300 H100-hr/day spot
    at $0.968 effective = $290/day. Total: $990/day for 1000 effective H100-hours. Effective cost: $0.99/hr
    — beats on-demand by 60%.'
  common_mistake: Using all Spot instances for a fault-tolerant training job without modeling the actual
    availability (70% uptime per instance = need 43% more capacity) and checkpoint recovery time overhead.
  napkin_math: 'Pure On-Demand: 1000 * $2.50 = $2500/day. Pure 3yr Reserved: 1000 * $1.00 = $1000/day.
    Pure Spot (30% interruption, 15min recovery): effective hours = 0.7*demand + overhead. Need 1000/0.775
    = 1290 spot-hours/day for 1000 effective. Cost: 1290 * $0.75 = $967.50/day. 70/30 mix (700 reserved
    + 300 spot): $700 + 300/0.775*$0.75 = $700 + $290 = $990/day. Spot-only wins ($967.50) if job is fault-tolerant.
    Annual savings vs on-demand: ($2500-$967.50) * 365 = $559.3K/year.'
