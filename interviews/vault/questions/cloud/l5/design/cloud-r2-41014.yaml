schema_version: 1
id: cloud-r2-41014
title: TP with Activation Checkpointing Interaction
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: You enable full activation checkpointing on a TP=8 training job. During recomputation in the
  backward pass, which TP communication operations must be re-executed? Does activation checkpointing
  increase TP communication volume?
details:
  realistic_solution: 'With full activation checkpointing, only the input to each transformer block is
    saved. During backward, the entire forward pass is recomputed to regenerate intermediate activations.
    This recomputation includes the TP collectives: the AllReduce after row-parallel layers must be re-executed.
    For a model with N blocks, forward TP communication = 2N AllReduces (attention + MLP). Backward recomputation
    adds another 2N AllReduces. Backward''s own gradient AllReduces add 2N more. Total: 6N AllReduces
    per step (vs 4N without checkpointing) — a 50% increase in TP communication. This is usually acceptable
    because: (1) TP communication is fast over NVLink, (2) recomputed collectives overlap with recomputed
    GEMMs, (3) the memory savings from checkpointing (often 5-10× activation memory reduction) enable
    larger batch sizes that amortize the overhead.'
  common_mistake: Assuming activation checkpointing only costs extra compute (recomputed FLOPs). In TP,
    recomputation also requires re-executing the AllReduce/AllGather collectives from the forward pass,
    increasing communication volume.
  napkin_math: 'Without checkpointing: 4N AllReduces. With: 6N. For 80 layers: 320 → 480 AllReduces. At
    0.15 ms each: 48 ms → 72 ms. But saved ~30 GB activation memory enables 2× batch size.'
