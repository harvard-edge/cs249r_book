schema_version: 1
id: cloud-cell-10103
title: Design an efficient CNN serving pipeline for H100 multi-tenant inference
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You need to serve 10 different EfficientNet variants (B0–B7) simultaneously on a single H100
  SXM5 for a multi-tenant vision API. Each tenant sends sporadic bursts of 1–32 images. Design a batching
  and memory management strategy that maximizes H100 utilization while keeping p99 latency under 50 ms.
details:
  realistic_solution: Keep all 10 EfficientNet variants resident in HBM3 simultaneously (B0=5.3M, B7=66M
    params — total ~120M params × 2B BF16 = 240MB, trivial vs 80GB). Use a dynamic batching queue per
    model with 5–10ms wait windows to coalesce requests. Use CUDA streams for concurrent kernel execution
    across models. For B0–B3 (small), batch aggressively up to 64; for B6–B7 reduce to 8–16. Compile with
    torch.compile and cudnn benchmark mode.
  common_mistake: Loading each model into separate GPU memory partitions with MIG, which fragments the
    80GB HBM3 and prevents cross-tenant batching; alternatively, hot-swapping models which incurs PCIe
    transfer latency.
  napkin_math: 'All 10 models: ~120M params × 2B = 240MB — fits easily in 80GB HBM3. EfficientNet-B0:
    0.39G FLOPs/image. At batch=32: 12.5 GFLOPs. H100 BF16 peak 989 TFLOPS at 50% util: 494 TFLOPS. Latency:
    12.5G/494T = 0.025 ms compute. Add 5ms batching window + 2ms kernel launch = 7ms total — well under
    50ms p99. B7 at batch=8: 8×37G = 296 GFLOPs → 0.6ms compute + 10ms queue = 10.6ms.'
