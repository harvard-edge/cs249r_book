id: cloud-2469
title: Edge-Triggered Cloud Telemetry
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A fleet of 10,000 autonomous delivery robots collects 1TB of multi-camera video per day per
  robot. You need to train a new cloud-based pedestrian intent model. Uploading all data via 5G costs
  $1/GB, which is mathematically impossible ($10M/day). However, you only need rare 'edge case' interactions
  (e.g., people stepping into crosswalks unexpectedly) which constitute <0.1% of the data. Architect a
  system to selectively ingest only the high-value training data to the cloud within a $500/day budget.
details:
  realistic_solution: 'Deploy a lightweight ''shadow'' model or an uncertainty-estimation module on the
    edge robot''s NPU. This model runs parallel to the main navigation stack. Use active learning techniques
    on the edge: compute the entropy of the model''s softmax outputs, or use a small ensemble to measure
    variance. When the model exhibits high uncertainty (entropy > threshold) or when the shadow model
    predicts a different trajectory than the main stack, it triggers a 5-second video buffer upload to
    the cloud. This converts the edge device into an intelligent data filter, ensuring only informative
    samples consume 5G bandwidth.'
  common_mistake: Relying on simple heuristic triggers (e.g., 'upload when the robot brakes hard'), which
    misses subtle pedestrian intent failures and creates a heavily biased dataset of only emergency events.
  napkin_math: "Budget: $500/day at $1/GB = 500 GB/day allowed upload across the fleet. \nPer robot allowance:\
    \ 500 GB / 10,000 robots = 50 MB/day per robot. \n5 seconds of compressed 1080p video = ~10 MB. \n\
    The active learning threshold can be dynamically tuned via a cloud-to-edge control plane to yield\
    \ ~5 triggers per day per robot (5 * 10MB = 50MB), perfectly matching the budget while maximizing\
    \ information gain."
