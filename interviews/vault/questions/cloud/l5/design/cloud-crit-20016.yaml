schema_version: 1
id: cloud-crit-20016
title: Chunked Prefill Scheduling with FlashAttention
topic: flash-attention
status: published
provenance: imported
scenario: You run vLLM on 8x H100 serving a 70B model. A 16K-token prefill request takes 400ms, during
  which all decode requests stall (head-of-line blocking). Design a chunked prefill strategy that interleaves
  prefill and decode, and determine the optimal chunk size given a decode latency SLO of 50ms per token.
details:
  realistic_solution: 8 H100s × 989 TFLOPS × 0.03s / 140 GFLOPs_per_token = 1,695 tokens in 30ms window
    (not 212 which uses single GPU).
  common_mistake: Setting chunk size too large (e.g., 4096) which still causes 100ms stalls, or too small
    (e.g., 128) which adds excessive kernel launch overhead and reduces FlashAttention's tiling efficiency.
  napkin_math: 'Tokens in 30ms budget: budget × compute / FLOPs_per_token. 8 H100s × 989 TFLOPS × 0.03s
    / 140 GFLOPs_per_token = 8 × 989T × 0.03 / 140G = 8 × 29.67T / 140G = 237.3T / 140G = 1,695 tokens
    (not 212 which is ~8× too low — likely used single-GPU compute instead of 8 GPUs).'
