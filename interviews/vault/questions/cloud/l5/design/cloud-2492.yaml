schema_version: 1
id: cloud-2492
title: OTA Model Patching for Flash Constraints
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: The cloud pushes daily model updates to 500k smart meters. The new model is 200KB. The MCU has
  512KB of Flash and 256KB of SRAM. The RTOS/firmware occupies 250KB of Flash. A standard A/B dual-bank
  OTA update requires storing both the old and new models simultaneously, requiring 650KB of Flash, which
  exceeds the hardware limit.
details:
  realistic_solution: Design a Cloud-to-Edge Model Diffing architecture. The cloud computes a binary patch
    (weight delta) between the day N and day N-1 models. The edge device downloads this small patch into
    SRAM, applies it to the existing model in a rolling fashion, and writes the updated pages directly
    to a small staging area in Flash, effectively bypassing the need for a full second model bank.
  common_mistake: Overwriting the active model in-place without an A/B bank, risking completely bricking
    the device if power is lost during the flash write.
  napkin_math: 'Flash layout: 250KB (Firmware) + 200KB (Active Model) = 450KB used. Remaining Flash =
    62KB. Instead of sending 200KB, the cloud sends weight deltas. Assuming 90% of weights change by <1%
    and are sparse-encoded, the delta payload is ~15KB. The 15KB patch easily fits into the 62KB free
    Flash staging area for safe application.'
