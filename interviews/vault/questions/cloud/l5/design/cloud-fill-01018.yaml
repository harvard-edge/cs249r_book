id: cloud-fill-01018
title: Scaling a 500B Parameter LLM on AMD MI300X with Hybrid Parallelism
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: You are leading the deployment of a 500-billion parameter Large Language Model (LLM) for production
  inference on a cluster of AMD MI300X accelerators. Each MI300X unit features 192 GB HBM3 memory, 1,307
  TFLOPS of FP16 sparse compute, and an impressive 5.3 TB/s HBM3 bandwidth. Given the immense size of
  the model parameters and significant activation memory requirements, how would you design a robust and
  efficient tensor and/or pipeline parallelism strategy across multiple MI300X GPUs? Detail your approach
  for partitioning the model, managing inter-GPU communication, and optimizing for high throughput and
  low latency, specifically leveraging the MI300X's memory and bandwidth capabilities.
details:
  realistic_solution: A hybrid parallelism strategy, combining tensor parallelism (e.g., Megatron-LM style
    column and row parallelism) for individual layers that exceed single-GPU memory, with pipeline parallelism
    for distributing multiple layers across different GPUs. Techniques like activation checkpointing or
    recomputation would be crucial to manage activation memory. Efficient communication would involve
    using asynchronous non-blocking collectives (e.g., `all_reduce`, `all_gather`) and strategically overlapping
    communication with computation cycles to fully utilize the 5.3 TB/s HBM3 bandwidth. The MI300X's 1,307
    TFLOPS FP16 sparse ensures compute is not the bottleneck when communication is well-optimized.
  common_mistake: Neglecting the substantial memory footprint of activations and optimizer states (during
    training) in addition to model parameters, leading to out-of-memory errors or suboptimal partitioning.
    Another common mistake is sequentializing communication, even with high bandwidth, instead of overlapping
    it with computation, causing significant idle time on GPUs.
  napkin_math: 'Model parameters in FP16: 500B parameters * 2 bytes/parameter = 1 TB. Memory per MI300X:
    192 GB. Minimum MI300X GPUs needed for parameters alone: 1 TB / 192 GB ≈ 5.2 GPUs. So, at least 6
    GPUs just for parameters, significantly more when considering activations, gradients, and optimizer
    states. Inter-GPU Communication Example: Transferring a 10 GB tensor between two GPUs using NVLink
    or Infinity Fabric: 10 GB / 5300 GB/s ≈ 1.9 ms intra-node (if sharing the 5.3 TB/s HBM3 bus). In practice,
    inter-GPU links (e.g., Infinity Fabric) have their own bandwidth limits typically in the hundreds
    of GB/s per link, so actual transfer times would be higher. This highlights that numerous or large
    sequential transfers can still become a bottleneck if not managed carefully.'
