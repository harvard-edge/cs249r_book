id: cloud-fill-02005
title: Queuing Model for Prefill-Decode Disaggregation on H100
topic: queueing-theory
status: published
provenance: imported
scenario: You are designing a disaggregated LLM serving system on H100 (700W, 80GB HBM3). Prefill requests
  arrive at 200/s with mean 50ms service. Decode requests arrive at 2000/s (10× fanout) with mean 5ms
  service. You have a pool of H100s to allocate. Using queuing theory, determine the optimal split of
  H100s between prefill and decode workers.
details:
  realistic_solution: 'Prefill load = 200/s × 0.05s = 10 server-equivalents. Decode load = 2000/s × 0.005s
    = 10 server-equivalents. Equal load but different bottlenecks: prefill is compute-bound (use fewer
    high-utilization nodes), decode is memory-bandwidth bound (needs HBM3 bandwidth). Split: 12 H100s
    for prefill at 83% utilization, 14 H100s for decode at 71% utilization. Target ρ<0.75 for each pool
    to keep p99<3× mean.'
  common_mistake: Allocating H100s equally (50/50) without modeling the different arrival rates and service
    times; ignoring that decode is memory-bandwidth bound while prefill is compute-bound.
  napkin_math: 'Prefill: 10 server-load, 12 H100s → ρ=0.83. Decode: 10 server-load, 14 H100s → ρ=0.71.
    Total 26 H100s. Alternatively 13+13 works but decode p99 suffers more at ρ=0.77.'
