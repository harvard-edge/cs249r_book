schema_version: 1
id: cloud-new-50020
title: 'Multi-Backend Distributed Training: NCCL vs RCCL vs Gloo Interop'
topic: software-portability
status: published
provenance: imported
scenario: Your distributed training job spans 32 H100 nodes (NCCL) and 16 MI300X nodes (RCCL). PyTorch's
  distributed backend only supports one communication library per process group. How do you architect
  heterogeneous multi-vendor distributed training?
details:
  realistic_solution: '14GB at 900 Gbps: 14GB × 8 bits/byte / 900 Gbps = 112 Gb / 900 Gbps = 0.124s =
    124ms (not 15ms which would require only 7.5 Gbps bandwidth).'
  common_mistake: Trying to use NCCL for both NVIDIA and AMD GPUs. NCCL only works with CUDA devices;
    RCCL only works with ROCm devices. A single process group cannot span both.
  napkin_math: '14GB model transfer at 900 Gbps NVLink: 14GB × 8 bits/byte / 900 Gbps = 112 Gbits / 900
    Gbps = 0.1244s = 124ms (not 15ms — 15ms would require 7.5 Gbps or 14 × 8/15ms = 7.47 Gbps, far below
    NVLink speed). At 900 Gbps: 112/900 = 0.124s = 124ms.'
