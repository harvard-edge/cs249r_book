schema_version: 1
id: cloud-gen-desi-0102
title: Multimodal Sharded Storage Architecture
topic: storage-format-selection
status: published
provenance: imported
scenario: Design the storage format and data loading architecture for training a vision-language model
  on a cluster of 1024 H100 GPUs (128 nodes, 8 GPUs/node). The dataset is 50 billion samples (2 MB average
  per sample, compressed image + text), currently stored as individual JSON and JPEG files in cloud object
  storage. Each H100 processes 64 samples per second. Each node has 2 TB of local NVMe SSD (6 GB/s read)
  and dual InfiniBand NDR connections. Architect a system that avoids storage I/O bottlenecks and minimizes
  object storage API costs.
details:
  realistic_solution: 'Use a sequential row-based format like WebDataset (TAR) or TFRecord, packing ~500-1000
    samples into 1-2 GB shards. Implement a two-tier pipeline: a background process streams these large
    shards from object storage to the local NVMe SSD cache. The training loop sequentially reads from
    the local NVMe. This converts millions of small random reads into large sequential reads, easily handled
    by the local 6 GB/s NVMe while minimizing object storage GET requests.'
  common_mistake: Candidates often suggest columnar formats like Parquet, which are inefficient for large
    unstructured binary blobs, or propose streaming millions of small files directly from object storage,
    hitting IOPS limits and incurring massive API GET costs.
  napkin_math: Throughput per GPU = 64 samples/s * 2 MB = 128 MB/s. Node throughput = 8 * 128 MB/s = 1.02
    GB/s. Total cluster throughput = 128 nodes * 1.02 GB/s = ~131 GB/s. Small file GETs = 512 GETs/s per
    node (costly, high latency). Sharding into 1.02 GB files reduces this to 1 GET/s per node. The local
    NVMe (6 GB/s) easily supports the 1.02 GB/s read requirement plus asynchronous 1.02 GB/s writes from
    the network.
