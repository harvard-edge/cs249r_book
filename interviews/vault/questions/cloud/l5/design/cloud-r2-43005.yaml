schema_version: 1
id: cloud-r2-43005
title: Feature Store Schema Evolution
topic: feature-store-management
status: published
provenance: imported
scenario: Your feature store serves 30 models in production. A team wants to change the definition of
  'user_engagement_score' from a simple click ratio to a time-weighted formula. This feature is consumed
  by 12 models. How do you manage this schema evolution without breaking production models or requiring
  simultaneous retraining of all 12?
details:
  realistic_solution: 'Treat feature definitions as versioned, immutable contracts. Create ''user_engagement_score_v2''
    with the new definition while keeping v1 alive. This enables: (1) gradual migration — each model team
    retrains against v2 on their schedule; (2) A/B testing — compare models using v1 vs v2; (3) rollback
    safety — if v2 causes regressions, models revert to v1. Implement a deprecation lifecycle: v1 enters
    ''deprecated'' state with a sunset date (e.g., 90 days). Feature store enforces: no new model can
    register a dependency on deprecated features. After all consumers migrate, v1''s pipeline is decommissioned.
    Metadata catalog tracks the full lineage: source data → transformation → feature version → consuming
    models.'
  common_mistake: In-place update of the feature definition, assuming all models can absorb the change.
    This causes silent accuracy degradation — models trained on the old definition receive values from
    a different distribution at serving time.
  napkin_math: '12 models × 2 weeks retraining cycle = 24 model-weeks if sequential. With versioned features:
    12 models retrain in parallel over 2 weeks. Storage overhead of running v1 + v2 simultaneously: 2×
    for one feature out of 500 = 0.2% storage increase. Pipeline compute: +$50/day for dual computation
    during 90-day migration = $4,500 total migration cost.'
