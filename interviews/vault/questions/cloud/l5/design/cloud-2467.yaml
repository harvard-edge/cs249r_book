id: cloud-2467
title: Optimizing Edge CI/CD Device Farm Costs
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team deploys vision models to 250+ distinct Android and iOS device profiles. To guarantee
  latency SLAs and prevent NPU kernel panics, you run a cloud-based physical device farm (AWS Device Farm
  / Firebase Test Lab) costing $5/device/hour. Running the full test suite (1 hour) on every PR for 50
  active developers costs $1,250,000/month. Architect a deployment pipeline that cuts this cost by 80%
  without letting NPU-crashing models reach production.
details:
  realistic_solution: "Architect a multi-tiered Hardware-in-the-Loop (HIL) pipeline. \nTier 1 (PR Level):\
    \ Use cloud CPU emulators and cross-compilation checks (e.g., TVM/XLA graph validation) to catch shape\
    \ and op-support errors (Cost: ~$0). \nTier 2 (Merge to Main): Test on a minimal spanning tree of\
    \ physical devices representing unique SoC families (e.g., 1 Snapdragon 8 Gen 2, 1 Apple A16, 1 MediaTek\
    \ Dimensity 9000, 1 Exynos) rather than all 250+ OEMs. This reduces physical devices from 250 to ~10.\
    \ \nTier 3 (Release Candidate): Run the full 250+ device farm only on weekly/bi-weekly release candidates.\
    \ Collect telemetry from Tier 3 to continually refine the Tier 2 minimal spanning tree."
  common_mistake: Moving entirely to emulators, which completely fail to test specific NPU/DSP delegates
    (NNAPI, CoreML) and hardware-specific quantization bugs.
  napkin_math: "Old Cost: 50 PRs/day * 20 days/mo = 1,000 PRs/mo. 1,000 PRs * 250 devices * 1 hr * 5/hr\
    \ = 1,250,000/mo. \nNew Pipeline: \nTier 1: 0. \nTier 2 (Daily): 1,000 PRs * 10 representative devices\
    \ * 1 hr * 5 = 50,000/mo. \nTier 3 (Weekly RC): 4 RCs/mo * 250 devices * 1 hr * 5 = 5,000/mo. \nTotal\
    \ new cost: 55,000/mo (95.6% reduction, easily hitting the 80% goal)."
