schema_version: 1
id: cloud-fill-03002
title: Load Balancing Strategy to Minimize P999 on TPU v5e
topic: tail-latency
status: published
provenance: imported
scenario: You're designing a load balancer for a TPU v5e (16GB HBM, 197 TFLOPS BF16) inference service
  running BERT-large at 50K RPS. Round-robin distribution gives P999=800ms. Analysis shows 0.1% of requests
  contain sequences >400 tokens (BERT max 512), causing disproportionate compute time.
details:
  realistic_solution: 'Implement cost-aware routing: classify requests into short (<=128 tokens), medium
    (129-256), long (257-512) at the load balancer using a lightweight tokenizer. Route to separate replica
    pools sized to their frequency (95% short, 4% medium, 1% long). Long-request pool has headroom for
    P999.'
  common_mistake: Using least-connections load balancing without accounting for request cost heterogeneity.
    A single long-sequence request consumes 10x the TPU cycles of a short one, so least-connections still
    routes long requests to 'least busy' replicas arbitrarily.
  napkin_math: 'BERT-large attention is O(n^2). A 512-token request takes (512/128)^2 = 16x the compute
    of a 128-token request. At 50K RPS, 0.1% = 50 long requests/sec. TPU v5e at 197 TFLOPS BF16: BERT-large
    (340M params) needs ~680 GFLOPS/forward. 50 * 680G / 197T = 17% TPU utilization just for 0.1% of traffic.'
