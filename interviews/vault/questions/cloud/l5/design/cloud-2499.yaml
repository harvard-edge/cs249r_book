id: cloud-2499
title: Edge-Cloud Partitioning for Acoustic Monitoring
topic: transformer-systems-cost
status: published
provenance: imported
scenario: An acoustic monitoring fleet uses Cortex-M0+ devices (128KB SRAM) to classify 50 complex bird
  calls. The M0+ cannot run the full 2MB ResNet model. Transmitting raw audio to the cloud costs 200mJ
  per event. Running a local lightweight model costs 5mJ but only achieves 70% accuracy on rare birds.
  The system detects 1000 events/day.
details:
  realistic_solution: Co-design a cascaded early-exit architecture. The edge device runs a lightweight
    binary classifier (bird vs. noise) or a small N-way classifier for the most common birds. If the local
    model's softmax confidence is below a defined threshold (e.g., 0.8), the edge device extracts compressed
    audio features (e.g., MFCCs) and transmits them to the cloud for the heavy ResNet inference. This
    dramatically reduces communication power while maintaining overall system accuracy, as only uncertain
    or rare events incur the 200mJ transmission penalty.
  common_mistake: Sending all 1000 audio events to the cloud to guarantee high accuracy, ignoring the
    massive energy cost.
  napkin_math: 'Send all to cloud: 1000 events * 200mJ = 200,000 mJ = 200 Joules/day. Cascaded approach:
    Assume 90% of events are high-confidence common birds or noise. Edge only energy: 900 * 5mJ = 4.5
    J. Edge + Cloud energy: 100 * (5mJ + 200mJ) = 20.5 J. Total energy = 25 Joules/day. This represents
    an 87.5% reduction in energy consumption while retaining high accuracy for complex calls.'
