schema_version: 1
id: cloud-2405
title: Pipelined Guardrails in Compound Systems
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'You are deploying a financial compliance RAG API that must return a complete JSON payload.
  The SLA for P90 latency is 1000ms. Current sequential pipeline: Embedding & Vector Retrieval (250ms)
  -> Main LLM Generation for avg 150 tokens (600ms) -> Output Compliance Guardrail evaluating the full
  text (300ms). Total P90 is 1150ms. You cannot change the models, replace the guardrail, or return partial/streamed
  responses to the client. The guardrail latency scales linearly with token count (i.e., 50 tokens = 100ms).
  Design an orchestration architecture to meet the 1000ms SLA.'
details:
  realistic_solution: 'Implement a Pipelined/Chunked Guardrail architecture (a core Compound System Pattern).
    Instead of waiting for the main LLM to emit all 150 tokens before starting the 300ms guardrail check,
    orchestrate the system to evaluate chunks asynchronously via an internal stream.


    1. Decomposition: The LLM generates 150 tokens in 600ms (4ms/token). Assuming chunks of 50 tokens
    (approx. one sentence), a chunk is completed every 200ms.

    2. Pipelining: Stream the LLM output to an internal orchestrator. Once Chunk 1 (50 tokens) is generated
    at T=450ms (250ms retrieval + 200ms generation), dispatch it to a Guardrail worker node.

    3. Concurrency: The Guardrail model latency scales linearly, taking 100ms per 50-token chunk. By overlapping
    the generation of Chunk N+1 with the guardrail evaluation of Chunk N, the critical path becomes bounded
    by the generation of the final chunk and its subsequent evaluation. The final payload is assembled
    and returned instantly after the last chunk passes, meeting the SLA without compromising safety.'
  common_mistake: Suggesting to stream the response directly to the client to reduce perceived latency,
    which violates the strict requirement to return a complete JSON payload.
  napkin_math: 'Sequential Critical Path: 250ms (DB) + 600ms (LLM) + 300ms (Guardrail) = 1150ms.


    Pipelined Critical Path:

    - T=0: Start Retrieval

    - T=250: Retrieval done, Start LLM Gen

    - T=450: LLM yields Chunk 1. Start Guardrail(C1).

    - T=550: Guardrail(C1) finishes.

    - T=650: LLM yields Chunk 2. Start Guardrail(C2).

    - T=750: Guardrail(C2) finishes.

    - T=850: LLM yields Chunk 3 (Final). Start Guardrail(C3).

    - T=950: Guardrail(C3) finishes. All checks passed.


    Total latency = 950ms. This yields a 200ms reduction, safely fitting within the 1000ms SLA.'
