id: cloud-fill-02023
title: Carbon-Aware Scheduling for H100 Training Jobs
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: Your organization commits to 50% reduction in CO2 emissions from training. An H100 cluster in
  Virginia (carbon intensity 300gCO2/kWh) and one in Oregon (50gCO2/kWh) each have 256 H100s. Virginia
  has 30% spare capacity; Oregon has 5% spare capacity. Design a carbon-aware job scheduler for a mixed
  batch of training jobs.
details:
  realistic_solution: 'Oregon spare=5%×256=13 H100s. Virginia spare=30%×256=77 H100s. Carbon intensity
    ratio: 300/50=6×. Move jobs to Oregon up to its 95% utilization. Remaining jobs in Virginia: emit
    300gCO2/kWh. For a 7-day H100 training job: Oregon: 700W×168hr×8GPUs×50g/kWh = 47kgCO2. Virginia:
    same job = 282kgCO2. Priority: always fill Oregon first for large jobs. For short jobs (<1hr), Virginia
    carbon overhead is small. Build scheduler: carbon cost = intensity × power × duration; route to minimize
    total carbon subject to capacity constraints.'
  common_mistake: Routing all jobs to Oregon because it has lower carbon intensity without considering
    utilization ceilings and the network overhead of cross-region data movement.
  napkin_math: '7-day job, 8×H100 at 700W: energy=8×700W×168h=941kWh. Oregon: 941×50g=47kg CO2. Virginia:
    941×300g=282kg CO2. Difference: 235kg CO2/job. 13 spare H100s in Oregon = 1 concurrent 8-GPU job.
    To hit 50% reduction, route all Oregon-eligible jobs there; for Virginia-only jobs, schedule during
    low-carbon grid hours (nights/weekends in mid-Atlantic, often 30% lower intensity).'
