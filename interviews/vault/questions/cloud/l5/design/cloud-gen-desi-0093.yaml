schema_version: 1
id: cloud-gen-desi-0093
title: Architecting Mixed-Precision Training for a 100B LLM
topic: mixed-precision-training
status: published
provenance: imported
scenario: Architect a mixed-precision training pipeline for a 100B parameter LLM on a cluster of H100
  GPUs (80GB HBM3, 989 TFLOPS FP16/BF16). You must specify the numerical formats (FP32, BF16, FP16) for
  model weights, activations, gradients, and optimizer states across the forward pass, backward pass,
  and weight update. Justify your architectural choices regarding numerical stability, memory footprint,
  and compute utilization.
details:
  realistic_solution: The optimal architecture uses BF16 for weights, activations, and gradients during
    the forward and backward passes. This leverages the H100's 989 TFLOPS throughput while avoiding the
    complex dynamic loss scaling required by FP16, thanks to BF16's larger 8-bit exponent. Crucially,
    master weights and Adam optimizer states (momentum and variance) must be maintained in FP32 to ensure
    precise accumulation of weight updates and convergence. The primary architectural benefit is halving
    activation memory and maximizing compute bandwidth, rather than shrinking the model state.
  common_mistake: Candidates often incorrectly assume that mixed-precision training inherently halves
    the model's total memory footprint. They may also uniformly apply FP16 across the entire pipeline,
    neglecting the strict requirement for FP32 master weights and optimizer states to prevent catastrophic
    underflow during small gradient updates.
  napkin_math: 'Model state memory footprint comparison (per parameter):

    Pure FP32: 4B (Weights) + 4B (Gradients) + 8B (Adam Optimizer) = 16 Bytes/param.

    Mixed-Precision: 2B (BF16 Weights) + 2B (BF16 Gradients) + 4B (FP32 Master Weights) + 8B (FP32 Adam)
    = 16 Bytes/param.

    For a 100B parameter model, the model state memory remains exactly 1.6 TB (100B * 16B) in both paradigms.
    The actual architectural win is unlocking the 989 TFLOPS Tensor Cores and reducing activation memory
    footprint by 50% (2B vs 4B per activation).'
