id: cloud-sus-63024
title: Carbon-Aware Autoscaling for Inference Endpoints
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: 'You operate an inference endpoint serving a non-latency-critical batch transcription workload
  (user uploads audio, gets transcript within 6 hours). The endpoint runs on cloud spot instances. Current
  autoscaling policy: scale to maintain queue depth < 1,000 jobs. Redesign the autoscaling policy to incorporate
  real-time carbon intensity signals while maintaining the 6-hour SLA for 99% of jobs.'
details:
  realistic_solution: 'Carbon-aware autoscaling with SLA forecasting: (1) Augment the autoscaling objective:
    instead of minimizing queue depth alone, minimize λ·carbon_cost + (1-λ)·latency_cost, where λ is adjusted
    based on SLA headroom. (2) SLA headroom calculation: at each 5-minute tick, estimate time-to-complete
    the current backlog at current scale. If headroom > 3 hours (slack to 6hr SLA), allow scale-down during
    high-carbon periods. If headroom < 1 hour, override carbon optimization and scale up aggressively.
    (3) Predictive pre-scaling: when carbon intensity forecast shows a low-carbon window in 2-4 hours,
    pre-scale up 30 minutes early to drain backlog before the window and take advantage of the low-carbon
    period. (4) Carbon budget per job: expose a per-job SLA ''carbon-flex'' API parameter — premium users
    get immediate processing, standard users allow up to 6-hour deferral for carbon optimization.'
  common_mistake: Treating carbon-aware scheduling as binary (run/don't run) rather than as a continuous
    cost signal. Simply turning off instances during high-carbon periods without SLA forecasting will
    cause SLA violations as the backlog builds.
  napkin_math: 'Batch transcription: 10K jobs/hour, each 30s audio = 30s GPU time at 1× realtime. At 50
    GPUs: 50 × 3600s/30s = 6,000 jobs/hr capacity (covers the 10K/hr arrival). 6hr SLA: can defer up to
    5hrs 50min. Carbon intensity range: 40-320 gCO2e/kWh. If carbon is 320 in hours 1-3, defer (queue
    builds: 3×10K = 30K jobs). Hours 4-6 carbon = 40: scale from 50 to 250 GPUs (spot), process 250×120
    = 30,000 jobs/hr. Clear 30K backlog in 1 hour with 50 GPUs of spare capacity. SLA maintained.'
