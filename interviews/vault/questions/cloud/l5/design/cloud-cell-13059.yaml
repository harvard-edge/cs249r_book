schema_version: 1
id: cloud-cell-13059
title: 'Systolic Array Design: Tiling Strategy for Large Matrix on TPU'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Design the tiling strategy for a 16384x16384 weight matrix (LLM FFN layer) that doesn't fit
  in a TPU v5e (16GB HBM) systolic array's local SRAM. The systolic array is 128x128 with 4MB SRAM. Specify
  tile sizes, number of tiles, memory transfer count, and total bandwidth required.
details:
  realistic_solution: 'Matrix A: 16384x16384 BF16 = 512MB. Array: 128x128. Tile size for systolic array:
    128x128 BF16 = 32KB (fits in 4MB SRAM along with partial sums). Tiles in A: (16384/128)^2 = 128^2
    = 16384 tiles. For C = A*B where B is 16384x16384: need tiles of A and B. Tile strategy: tile A into
    128x128, tile B into 128x128. For each output tile C[i,j]: load A[i,k] and B[k,j] for k=0..127 (128
    A-tiles and 128 B-tiles). Total loads: 128*128 = 16384 tile pairs. BW: 16384 tiles * 2 * 32KB = 1GB
    loaded, plus writing output. Total BW ≈ 3 * 512MB = 1.5GB. At 819GB/s: 1.83ms.'
  common_mistake: Choosing square tiles without considering the output accumulation requirements, and
    not accounting for the fact that each tile result must be accumulated in SRAM before being written
    to HBM.
  napkin_math: 'A: 16384*16384*2 = 512MB. B: 512MB. C: 512MB. Tile: 128*128*2 = 32KB. Tiles: 16384/128
    = 128 tiles per dimension. Total tiles per matrix: 128*128 = 16384. For each C tile (128*128 elements):
    load 128 A-tiles (1 row of A-tiles) + 128 B-tiles = 256 tile loads = 8MB. C tiles: 16384. If perfectly
    fused: total A+B loads = 2*512MB = 1024MB. C write: 512MB. Total: 1536MB. At 819GB/s: 1536/819000
    = 1.88ms. At 197 TFLOPS: compute = 2*16384^3 / 197e12 = 44.6ms. Compute bound (23x over bandwidth).
    Good dataflow.'
