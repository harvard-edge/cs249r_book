id: cloud-sus-61036
title: 'Personalization at Scale: Per-User LoRA vs Prompt Engineering'
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A consumer product has 10 million users and wants personalized LLM behavior. Compare per-user
  LoRA adapters vs long system prompt personalization. At what scale does each approach break down?
details:
  realistic_solution: 'Prompt personalization: zero storage overhead, works with 0 training examples (user
    description in system prompt), but bounded by context window — 500 token user profile consumes 25%
    of 2048-token context, degrading generalization. Per-user LoRA: requires 100-1000 user interactions
    to train a meaningful adapter (rank-4: only 3.25 MB storage per user × 10M = 32.5 TB total storage).
    Break-even: users with >500 interactions benefit from LoRA; sparse users (<100 interactions) should
    use prompt personalization.'
  common_mistake: Assuming per-user LoRA is infeasible at 10M users due to storage. Storage is not the
    constraint — it is the impossibility of training individual adapters without sufficient per-user data.
  napkin_math: 'Rank-4 adapter (13B): 2 × 4 × 5120 × 40 × 2B = 3.3 MB. 10M users × 3.3 MB = 33 TB storage.
    At $0.023/GB/month (S3): 33TB × $0.023 = $759/month storage. Serving: load adapter per request — 3.3
    MB from S3 at 500 MB/s = 6.6ms load latency. Cache hot adapters in GPU memory: 100 hot adapters ×
    3.3 MB = 330 MB — negligible, cache top-1000 adapters covering 80% of traffic (power law).'
