schema_version: 1
id: cloud-cell-13237
title: Design Interleaved Pipeline Schedule for Reduced Bubble
topic: pipeline-parallelism
status: published
provenance: imported
scenario: A 48-layer transformer trains on 8 H100 GPUs with standard 1F1B achieving 46.7% bubble ratio
  (m=8, p=8). You propose interleaved pipeline parallelism with v=2 virtual stages per GPU (each GPU handles
  2 non-contiguous layer chunks of 3 layers each). The interleaved bubble ratio formula is (p-1)/(m×v+p-1).
  Calculate the new bubble ratio and steady-state efficiency, and identify the additional communication
  cost from doubled pipeline boundaries.
details:
  realistic_solution: 'Standard 1F1B bubble: (8-1)/(8+8-1) = 7/15 = 46.7%. Interleaved with v=2: (8-1)/(8×2+8-1)
    = 7/23 = 30.4% — same as GPipe with m=16. Efficiency: 69.6% vs 53.3%. Improvement: 16.3pp. Communication
    cost: standard 1F1B has 2×(p-1)=14 activation transfers per pipeline pass. Interleaved v=2: 2×(p-1)×v=28
    transfers. With NVLink 900 GB/s between H100s and 1M token activations at BF16 (4MB): each transfer
    = 4MB/900GB/s = 4.4μs. Extra latency: 14×4.4μs=62μs per step — negligible vs 16ms stage time (0.4%
    overhead).'
  common_mistake: Assuming interleaved scheduling reduces bubble to zero; it reduces bubble ratio by factor
    v but doubles pipeline communication volume at stage boundaries.
  napkin_math: 'Interleaved bubble: (p-1)/(mv+p-1) = 7/23 = 30.4%. Standard: 7/15 = 46.7%. Reduction:
    16.3pp. Communication overhead: 14 extra transfers × 4.4μs = 62μs / 16,000μs stage = 0.4% overhead.
    Net gain: +16.3% efficiency - 0.4% comm = +15.9% throughput improvement.'
