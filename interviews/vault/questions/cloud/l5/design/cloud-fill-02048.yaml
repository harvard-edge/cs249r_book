schema_version: 1
id: cloud-fill-02048
title: InfiniBand Adaptive Routing for Hotspot Avoidance in H100 Fat-Tree
topic: rdma-transport
status: published
provenance: imported
scenario: A 512-H100 fat-tree InfiniBand cluster uses static routing. During AllReduce, 30% of links are
  at >90% utilization while 40% are idle, causing gradient sync to take 3× longer than ideal. Design an
  adaptive routing solution to balance traffic.
details:
  realistic_solution: 'AllReduce traffic pattern: ring topology creates sequential send-receive pairs
    — highly structured, not random. Static routing concentrates ring traffic on a subset of paths. Solutions:
    (1) RDMA Adaptive Routing (AR): InfiniBand subnet manager enables per-packet routing based on congestion
    signals. Mellanox/NVIDIA UFM provides AR for fat-tree. (2) Traffic-aware ring placement: assign ring
    ranks to GPUs that maximize path diversity. (3) Multipath ring AllReduce: split gradient tensor into
    chunks, route chunks over different paths. With AR enabled on HDR IB: hotspot traffic redistributes
    within 1-2RTT (<5μs). Expected improvement: 3× degradation → 1.2× (90% theoretical bandwidth). Key:
    enable RDMA congestion control (CC) with RTT-based marking.'
  common_mistake: Proposing equal-cost multipath (ECMP) without considering that ECMP with flow hashing
    creates elephant flow collisions — large gradient flows hash to the same path.
  napkin_math: 'Ideal AllReduce: 40GB / (256 active links × 25GB/s) = impossible — need to model correctly.
    Per-GPU perspective: 2×(511/512)×40GB / 25GB/s (per-node IB) = 3.1s ideal. With 30% hotspot at 3×
    degradation: actual=9.3s. AR redistributes to 70% link utilization average: actual≈3.1/0.7=4.4s. 2.1×
    improvement over hotspot case.'
