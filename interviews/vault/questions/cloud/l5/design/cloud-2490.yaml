schema_version: 1
id: cloud-2490
title: Async FL for Intermittent Solar Devices
topic: federated-learning
status: published
provenance: imported
scenario: You manage 100,000 solar-powered agricultural sensors (100uW harvest rate). The cloud orchestrates
  FedAvg for a microclimate model. Devices only wake up for 5 seconds every hour. Synchronous FedAvg fails
  entirely because less than 1% of devices have overlapping wake windows, causing aggregation timeouts.
details:
  realistic_solution: Shift the cloud architecture to Buffered Asynchronous Federated Learning (FedBuff).
    The cloud maintains a concurrency buffer. When a device wakes up intermittently, it pulls the latest
    global model, computes its local update, pushes it to the cloud, and goes back to sleep. Once the
    cloud buffer collects K updates, it asynchronously applies them to the global model.
  common_mistake: Increasing the timeout window for synchronous rounds, which leads to massive staleness,
    blocked training pipelines, and zero convergence.
  napkin_math: 100k devices waking up 1 time/hour. Average active devices per second = 100,000 / 3600
    = ~27.7 devices/sec. If buffer size K = 1000, the cloud updates the global model every 1000 / 27.7
    = 36 seconds. Maximum staleness of an update is bounded to the 1-hour sleep cycle, ensuring smooth
    convergence without requiring synchronous overlap.
