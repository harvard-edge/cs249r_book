schema_version: 1
id: cloud-new-50005
title: ONNX Graph Partitioning Across Mixed Execution Providers
topic: software-portability
status: published
provenance: imported
scenario: Your ONNX model has 340 operators. When running on the TensorRT EP, 290 operators are assigned
  to TensorRT and 50 fall back to the CUDA EP. Each EP boundary incurs a device-to-device memory copy.
  You observe that inference latency is 40% higher than expected from pure GPU execution.
details:
  realistic_solution: 'Use ORT''s graph partitioning visualization to identify the 50 fallback ops. Common
    culprits: custom ops, unsupported dynamic shapes, or rare activations (like GELU exact mode). Options:
    (1) replace unsupported ops with TensorRT-compatible equivalents at export time, (2) write TensorRT
    plugins for the custom ops, (3) use ORT''s CUDA EP for the entire graph with operator-level TRT acceleration.
    Reducing EP boundaries from 20+ to 3-4 typically recovers 25-30% of the latency gap.'
  common_mistake: Ignoring the cost of EP boundary transitions. Each transition involves a D2D memcpy
    plus synchronization. With 50 fallback ops scattered across the graph, you can have 20+ EP boundaries.
  napkin_math: 'Each EP boundary: ~0.1-0.3ms (D2D copy + sync). 20 boundaries x 0.2ms = 4ms overhead.
    Total inference 14ms -> 10ms target. Reducing to 4 boundaries: 0.8ms overhead, recovering 3.2ms.'
