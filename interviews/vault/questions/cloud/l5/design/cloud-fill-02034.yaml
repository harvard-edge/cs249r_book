schema_version: 1
id: cloud-fill-02034
title: AllReduce Algorithm Selection for Heterogeneous Bandwidth Topology
topic: gradient-synchronization
status: published
provenance: imported
scenario: 'A 256-GPU cluster has a hierarchical network: 8 GPUs per node (NVLink 900GB/s), 8 nodes per
  rack (HDR InfiniBand 200Gbps), 4 racks (HDR100 100Gbps inter-rack). Gradient tensors are 40GB (FP32,
  10B params). Design the optimal hierarchical AllReduce strategy.'
details:
  realistic_solution: 'Hierarchical AllReduce exploits bandwidth hierarchy. Step 1 (intra-node, 8 GPUs,
    NVLink): reduce 40GB to one GPU per node. Each of 32 nodes gets full gradient sum across 8 GPUs. Time:
    2×(7/8)×40GB/450GB/s=77ms. Step 2 (intra-rack, 8 nodes, 200Gbps=25GB/s): ring over 8 nodes. Time:
    2×(7/8)×40GB/25GB/s=28s. Still bottlenecked. Step 3 (inter-rack, 4 racks, 100Gbps=12.5GB/s): ring
    over 4 racks. Time: 2×(3/4)×40GB/12.5GB/s=4.8s. Dominant cost is intra-rack. Optimize: use gradient
    compression at rack boundary (10× → 400MB), inter-rack time=480ms. Total with compression: ~80ms+28s→2.8s+480ms=~3.4s.
    Without: ~29s.'
  common_mistake: Using flat ring-AllReduce across all 256 GPUs which routes 80% of gradient traffic over
    the slow 100Gbps inter-rack links.
  napkin_math: 'Intra-node NVLink: 40GB/450GB/s×1.75=155ms. Intra-rack 200Gbps (25GB/s): 40GB/25×1.75=2.8s.
    Inter-rack 100Gbps (12.5GB/s): 40GB/12.5×1.5=4.8s. Critical path: inter-rack bottleneck at 4.8s. Compress
    at rack boundary 10×: 4GB across racks → 480ms. Total ≈ 155ms+2.8s+480ms=3.4s.'
