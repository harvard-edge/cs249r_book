schema_version: 1
id: cloud-fill-01054
title: Designing a Multi-Tenant ML Platform with AMD MI300X
topic: scheduling-resource-management
status: published
provenance: imported
scenario: Your team is building a multi-tenant machine learning platform in the cloud. Each tenant requires
  access to high-performance GPU resources for training and inference. You have a cluster of AMD MI300X
  accelerators, each boasting 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory
  bandwidth. Design a robust resource management and scheduling system that can efficiently allocate these
  GPUs, handle varying workload priorities, prevent resource contention, and ensure fairness across tenants.
  Specifically, consider how to implement fine-grained GPU partitioning (e.g., similar to NVIDIA's MIG/MPS
  concepts but for AMD hardware), gang scheduling for distributed workloads, preemption for high-priority
  jobs, and mechanisms for multi-tenant resource isolation and sharing on this specific hardware.
details:
  realistic_solution: A hierarchical scheduling approach would be effective. At the lowest level, implement
    a custom GPU partitioning mechanism leveraging AMD's hardware features (e.g., defining virtual GPU
    instances or dedicated compute units within the MI300X, similar to how software/firmware could define
    virtual GPUs) to allow multiple tenants to share a single physical GPU with strong memory and compute
    isolation. Integrate this with a cluster scheduler (e.g., Kubernetes with custom device plugins or
    Slurm) that supports gang scheduling for distributed training jobs. Implement preemption policies
    based on job priority and resource utilization, ensuring graceful checkpointing/restoring for preempted
    jobs. Utilize cgroups-like mechanisms for resource limits and continuously monitor GPU metrics (utilization,
    memory consumption, HBM bandwidth) to dynamically adjust allocations and detect noisy neighbors, ensuring
    fair resource distribution.
  common_mistake: Ignoring the specific hardware capabilities and limitations of the AMD MI300X, leading
    to suboptimal partitioning strategies or inefficient memory utilization. A common mistake is also
    not properly accounting for the overhead of context switching and memory isolation in a multi-tenant
    environment, especially with the high memory bandwidth, leading to performance cliffs and 'noisy neighbor'
    issues.
  napkin_math: 'Given an AMD MI300X with 192 GB HBM3, if two tenants require models with memory footprints
    of 48 GB and 96 GB respectively, and assuming we reserve 20% of the total HBM3 for system overheads,
    how many such tenant pairs could ideally fit on a single MI300X? Usable HBM3: 192 GB * 0.8 = 153.6
    GB. Memory required per pair: 48 GB + 96 GB = 144 GB. Number of pairs: 153.6 GB / 144 GB ≈ 1.06. This
    indicates that accommodating even one such pair leaves very little room, emphasizing the need for
    dynamic, flexible partitioning or leveraging smaller model sizes for efficient multi-tenancy.'
