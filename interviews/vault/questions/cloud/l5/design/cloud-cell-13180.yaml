schema_version: 1
id: cloud-cell-13180
title: 'Transformer Cost Design: Optimal Architecture for Inference Budget'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Design a transformer architecture for a production inference system on H100 (80GB HBM3, 3.35TB/s,
  1979 TFLOPS BF16) with budget: P99 < 500ms, throughput ≥ 100 req/s, cost < $0.001/request. Starting
  point: GPT-2 large (774M params, 36 layers, hidden=1280). Specify parameter count, layer configuration,
  and expected cost per request.'
details:
  realistic_solution: 'GPT-2 large decode throughput on H100: weights=1548MB. Bandwidth-limited decode:
    1548MB/3350GB/s=0.462ms/token. 100 tokens output: 46.2ms/req. Well under 500ms. At batch=64: 64*46.2ms
    = 2.96s per batch → 64/2.96s=21.6 req/s. Need 100 req/s → 5 H100s. Cost: 5*$2.50/hr / (100 req/s *
    3600s) = $12.5/3.6M req = $0.00000347/req. Far under $0.001. Alternatively, single H100 can handle
    100 req/s at lower batch: batch=5 at 46.2ms*5=231ms per 5 reqs = 21.6 req/s. Need ceil(100/21.6)=5
    H100s for throughput. P99: 500ms SLO easily met at 46.2ms per token step.'
  common_mistake: Designing for throughput alone without verifying that the P99 latency constraint is
    met — a highly batched system may have high throughput but poor tail latency.
  napkin_math: 'Decode: 1548MB/3350GB/s=0.462ms/token. 100 tokens: 46.2ms. Single H100, batch=64: 64/2.96s=21.6
    req/s. 5 H100s: 108 req/s ≥ 100 ✓. Cost/req: 5*$2.50/(108*3600)=$12.5/388800=$0.0000322/req << $0.001
    ✓. P99 at ρ=100/108=0.926: Wq=0.926/(21.6*0.074)=0.578s... too high? Each H100 handles 21.6 req/s.
    M/D/1 Wq per H100: ρ=100/(5*21.6)=0.926. Wq=0.926²/(2*21.6*0.074)=0.857/3.2=0.268s. W=0.268+0.046=0.314s.
    P99=4.6*0.314=1.44s > 500ms. Need more servers or batching optimization. Add 7 H100s: ρ=0.661. P99≈300ms
    ✓.'
