schema_version: 1
id: cloud-2497
title: Over-the-Air Weight Updates for IoT
topic: collective-communication
status: published
provenance: imported
scenario: You manage 50,000 remote pipeline anomaly sensors connected via NB-IoT (100 kbps, 500mW Tx/Rx
  power). The battery is 5000mAh (3V) and must last 5 years. The cloud needs to push weekly updates to
  the 150KB INT8 TFLite Micro model. Pushing full models over NB-IoT violates the battery life constraints.
details:
  realistic_solution: The cloud architecture must implement delta-based Over-The-Air (OTA) updates. Instead
    of transmitting the full 150KB binary, the cloud computes the weight differences between the deployed
    model and the new model. Since retraining often changes only a fraction of weights significantly,
    the cloud applies a sparsity threshold, encodes the diffs using sparse formats (e.g., CSR) and Huffman
    coding. The edge device receives this small payload (e.g., 5KB), decodes it, and patches the model
    in flash memory. This reduces the OTA energy footprint by >95%, keeping it well within the 5-year
    battery budget.
  common_mistake: Sending the full 150KB model file directly to the device and relying on standard TCP
    retries.
  napkin_math: 'Battery budget: 5000mAh * 3V = 15,000 mWh = 54,000 Joules. 5 years = 260 weeks. Weekly
    energy budget for OTA (assuming 10% total battery allocated to OTA) = 5400 J / 260 = 20.7 J/week.
    Full model OTA: 150KB at 100kbps = 12 seconds. 12s * 0.5W = 6 J. This eats ~30% of the weekly budget.
    Delta OTA: 5KB at 100kbps = 0.4 seconds. 0.4s * 0.5W = 0.2 J. 0.2 J is only 1% of the weekly budget.'
