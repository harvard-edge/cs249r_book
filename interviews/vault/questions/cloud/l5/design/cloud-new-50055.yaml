schema_version: 1
id: cloud-new-50055
title: Prefetching Activations in Pipeline Parallelism Across Nodes
topic: communication-computation-overlap
status: published
provenance: imported
scenario: In a 4-node pipeline-parallel setup with H100 GPUs connected via 400 Gbps InfiniBand, each pipeline
  stage sends activation tensors (256MB per micro-batch) to the next stage. Without prefetching, each
  stage waits for the activation transfer before starting compute. Design an activation prefetching scheme.
details:
  realistic_solution: 'Multi-level prefetching: (1) Stage i starts transferring micro-batch N+1''s activations
    to stage i+1 as soon as micro-batch N''s forward pass completes. (2) Use a ring buffer of 2-3 activation
    slots per stage to allow multiple in-flight transfers. (3) Record CUDA events after each forward pass
    to trigger the next prefetch. (4) Key optimization: overlap the activation send with the current micro-batch''s
    backward pass (which doesn''t need the sent activations). Transfer time for 256MB at 400 Gbps: 256MB
    / 50GB/s = 5.1ms. If forward compute is 50ms per stage, prefetching hides the 5.1ms transfer completely
    within the previous micro-batch''s compute.'
  common_mistake: Only prefetching one micro-batch ahead. With 4 pipeline stages and network latency,
    a single prefetch may not fully hide the transfer time, especially if compute time per micro-batch
    varies across stages.
  napkin_math: 'Without prefetch: 50ms compute + 5.1ms transfer = 55.1ms per stage per micro-batch. With
    prefetch: 50ms compute (transfer hidden). 4 stages x 8 micro-batches: without = 4 x 8 x 55.1 = 1763ms.
    With = 4 x 8 x 50 = 1600ms. 9.3% speedup.'
