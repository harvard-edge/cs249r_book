schema_version: 1
id: cloud-crit-21041
title: KV-Cache Compression via Sliding Window + Sink Tokens
topic: kv-cache-management
status: published
provenance: imported
scenario: Your chatbot application uses Mistral 7B (sliding window attention, window=4096) but receives
  multi-turn conversations of 20K+ tokens. Users report quality degradation after turn 5. Design a KV-cache
  management strategy that maintains quality for long conversations within the 4K window constraint.
details:
  realistic_solution: 'Implement StreamingLLM-style ''attention sink + sliding window'' strategy: (1)
    Attention sinks: Always keep the first 4 tokens'' KV-cache (the ''sink tokens'' that absorb disproportionate
    attention mass due to softmax normalization). Discarding them causes attention distribution collapse.
    (2) Window tokens: Keep the most recent 4092 tokens (4096 - 4 sink tokens). (3) Conversation memory:
    For multi-turn, implement ''important token pinning'' — use attention scores from previous turns to
    identify high-attention tokens (topic sentences, entity introductions) and pin their KV entries even
    as the window slides. Budget: 256 pinned tokens + 4 sink + 3836 window = 4096 total. (4) Implementation:
    maintain a priority queue of KV blocks sorted by cumulative attention received. When the window slides,
    evict the lowest-attention tokens outside the recent window. This keeps conversation-critical context
    while discarding filler. Memory: constant 4096 × 65.5 KB (for 7B model) = 268 MB per request regardless
    of conversation length.'
  common_mistake: Simply discarding KV entries beyond the window. This loses critical context from early
    conversation turns (user name, task description, constraints) that inform all subsequent responses.
  napkin_math: 'Standard window: 4096 tokens × 65.5 KB = 268 MB per request. Full 20K without window:
    20K × 65.5 KB = 1.31 GB (4.9× more memory). Sink + pinned strategy: 4 + 256 + 3836 = 4096 tokens,
    constant 268 MB. Quality: maintains ~95% of full-context quality vs ~70% with naive sliding window.'
