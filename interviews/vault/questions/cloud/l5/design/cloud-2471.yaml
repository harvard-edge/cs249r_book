schema_version: 1
id: cloud-2471
title: On-Device Ad Ranking for Cloud Savings
topic: latency-decomposition
status: published
provenance: imported
scenario: A mobile ad network processes 2 Billion requests/day. The cloud Demand-Side Platform (DSP) retrieves
  2000 ad candidates and runs a heavy Deep Learning Recommendation Model (DLRM) to rank them, taking 150ms
  and costing $0.01 per 1000 requests ($20,000/day). You must reduce cloud ranking costs by 75% and ensure
  end-to-end latency stays under 100ms, while preserving highly personalized targeting based on the user's
  local app usage history.
details:
  realistic_solution: Design a Cloud-Retrieval, Edge-Ranking architecture. The cloud performs lightweight,
    non-personalized contextual retrieval to select the top 100 ad candidates (using simple dot products).
    It sends only the metadata/embeddings of these 100 candidates to the phone. A lightweight ranking
    model (e.g., a small MLP or decision tree) deployed on the phone's CPU/NPU scores these 100 candidates
    using the user's rich, raw local history (which never leaves the device, improving privacy). The cloud
    avoids running the expensive DLRM entirely.
  common_mistake: Moving the entire candidate retrieval and DLRM to the mobile device. The ad inventory
    (millions of ads) changes too rapidly to sync to the edge, and fetching 2000 high-res ad creatives
    to score locally would consume massive bandwidth and battery.
  napkin_math: "Current cloud cost: 2B / 1000 * $0.01 = $20,000/day. \nNew Architecture: Cloud DLRM cost\
    \ becomes $0. Cloud only does cheap retrieval (e.g., $0.002 per 1000 reqs). \nNew cloud cost: 2B /\
    \ 1000 * $0.002 = $4,000/day (80% savings). \nLatency: Cloud retrieval (20ms) + Network transfer of\
    \ 100 lightweight embeddings (30ms) + Local NPU ranking of 100 items (10ms) = 60ms end-to-end, safely\
    \ under the 100ms budget."
