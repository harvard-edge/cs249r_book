schema_version: 1
id: cloud-cell-10118
title: 'Mastery: trade-off analysis of SE block overhead vs accuracy gain in EfficientNet'
topic: cnn-efficient-design
status: published
provenance: imported
scenario: EfficientNet uses Squeeze-and-Excitation blocks with reduction ratio r=4, adding a global average
  pool + two FC layers per MBConv block. For EfficientNet-B0 (16 MBConv blocks with SE), quantify the
  total FLOP overhead from SE modules and determine whether removing SE while compensating with width
  scaling achieves equivalent accuracy at lower cost on H100.
details:
  realistic_solution: 311K FLOPs / 390M total = 0.08% of model FLOPs (not 30%). 30% would require ~117M
    FLOPs for this component.
  common_mistake: Computing SE FLOPs only for the FC layers without including the global average pooling,
    or failing to account for the fact that SE blocks have near-zero arithmetic intensity (tiny FC on
    scalars) and incur disproportionate kernel launch overhead.
  napkin_math: 'FLOPs fraction: 311K FLOPs / 390M total model FLOPs = 311,000 / 390,000,000 = 0.000797
    = 0.08% (not 30% — 30% would require 117M FLOPs for this component, not 311K). The 311K already accounts
    for all blocks in this layer.'
