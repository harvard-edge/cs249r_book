schema_version: 1
id: cloud-sus-64014
title: Transformer Inference Memory Bandwidth Saturation and Power Envelope
topic: datacenter-efficiency
status: published
provenance: imported
scenario: You are profiling energy efficiency for a Llama-2 13B inference workload on MI300X. At batch
  size 1 (single-request decode), the MI300X draws 320W and achieves 2,800 tokens/sec. At batch size 64,
  it draws 680W and achieves 8,400 tokens/sec. Analyze why energy-per-token (J/token) differs dramatically
  between batch sizes, connect this to the roofline model, and determine the optimal batch size for a
  data center that wants to minimize total energy cost while meeting a 200ms TTFT (time to first token)
  SLA.
details:
  realistic_solution: 'Batch 1: E/token = 320W / 2,800 tok/s = 0.114 J/token. Batch 64: E/token = 680W
    / 8,400 tok/s = 0.081 J/token. Batch 64 is 29% more energy-efficient. Roofline: batch 1 arithmetic
    intensity ≈ 2×13B params × 2 bytes / (13B × 2 FLOPs) = 1 byte/FLOP < MI300X ridge point (~300 FLOP/byte).
    As batch size grows, KV cache reuse increases arithmetic intensity. SLA constraint: TTFT at batch
    64 ≈ 64 × average prefill time. If prefill = 2ms per request, TTFT = 128ms < 200ms SLA. Maximum batch
    size before SLA violation: 200ms / 2ms = 100 requests. Optimal: batch 96-100 (further power reduction
    possible).'
  common_mistake: Treating energy/token as constant across batch sizes. At batch size 1, the MI300X is
    deeply memory-bandwidth-bound (arithmetic intensity < 1 FLOP/byte), so most transistors are idle while
    HBM streams weights. Power is low but so is compute utilization. Energy/token is high because idle
    power is amortized over very few tokens.
  napkin_math: 'B=1: E/tok = 320/2800 = 0.1143 J/tok. B=64: E/tok = 680/8400 = 0.0810 J/tok. Efficiency
    gain: (0.1143-0.0810)/0.1143 = 29.1%. Power increase B1→B64: 680/320 = 2.125×. Throughput increase:
    8400/2800 = 3×. So power grows 2.125× but throughput grows 3× → energy/token improves. Extrapolating
    to B=100: assume linear throughput (saturation check: 100 × 2 bytes × 13B params = 2.6 TB/s < 5.3
    TB/s BW, still under limit). Throughput ≈ 8400 × (100/64) × 0.9 = 11,813 tok/s. Power ≈ 720W. E/tok
    = 0.061 J/tok (47% better than B=1).'
