schema_version: 1
id: cloud-new-50002
title: Triton Kernel Portability from NVIDIA to AMD GPUs
topic: software-portability
status: published
provenance: imported
scenario: You wrote a fused attention kernel in Triton that achieves 85% of peak FP16 throughput on H100.
  You recompile the same Triton code targeting MI300X via the AMD ROCm backend. Performance drops to 55%
  of MI300X peak. Diagnose the gap.
details:
  realistic_solution: 'MI300X FP16: 1,307 TFLOPS (authoritative spec). At 55% MFU: 1,307 × 0.55 = 719
    TFLOPS (not 653 which is incorrect base value).'
  common_mistake: Blaming Triton's AMD backend as fundamentally broken. The real issue is that Triton's
    auto-tuning heuristics (tile sizes, num_warps, num_stages) were tuned on NVIDIA and the CDNA3 architecture
    has different optimal parameters.
  napkin_math: 'MI300X FP16: 1,307 TFLOPS dense (not 653 TFLOPS). At 55% MFU: 1,307 × 0.55 = 718.85 ≈
    719 TFLOPS effective (not 653 × 0.55 = 359 TFLOPS). 653 TFLOPS would be the MI300X at 50% of its peak,
    not the correct 1307 TFLOPS spec.'
