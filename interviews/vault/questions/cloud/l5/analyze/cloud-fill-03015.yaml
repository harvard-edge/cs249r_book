schema_version: 1
id: cloud-fill-03015
title: Flash Attention Backward Pass Memory Recomputation
topic: flash-attention
status: published
provenance: imported
scenario: During training a 13B model on H100 (80GB HBM3) with seq_len=16384, you notice that Flash Attention
  uses more FLOPs than standard attention during the backward pass. A colleague suggests reverting to
  standard attention for training to reduce compute. Evaluate this tradeoff.
details:
  realistic_solution: Flash Attention backward recomputes the attention matrix (2x FLOPs for backward
    vs forward), but this is the only way to train with long sequences. The FLOP overhead is ~1.1-1.3x
    vs standard attention backward, but the memory saving enables training at all. Use gradient checkpointing
    at layer boundaries to further reduce peak memory.
  common_mistake: Comparing only FLOPs without accounting for memory capacity constraints. At seq_len=16384,
    standard attention's N×N matrix is 16384^2 * 4 bytes = 1GB per head per layer. For a 13B model with
    40 layers and 40 heads, this is 1.6TB — physically impossible on any GPU.
  napkin_math: 'H100 80GB HBM3. Standard attention backward: stores softmax(QK^T) for backward = 16384^2
    * 2 bytes = 512MB per head. 13B model: 40 layers * 40 heads = 1600 heads. Peak memory for attention
    maps = 1600 × 512MB = 800 GB (0.8 TB). Impossible. Flash Attention: stores only Q, K, V, O (each 16384*128*2
    = 4MB per head) = 1600 * 16MB = 25.6GB. Fits in 80GB. Recomputation cost: 2x attention FLOPs in backward
    = acceptable.'
