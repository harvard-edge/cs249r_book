schema_version: 1
id: cloud-new-50083
title: Weight Update Sharding with Overlapped AllGather in FSDP2
topic: communication-computation-overlap
status: published
provenance: imported
scenario: PyTorch FSDP2 (Fully Sharded Data Parallel v2) uses a ReduceScatter-then-AllGather pattern instead
  of AllReduce. After backward, gradients are reduce-scattered, each GPU updates its parameter shard locally,
  then AllGather broadcasts updated parameters. Analyze the overlap opportunities in this three-phase
  pipeline.
details:
  realistic_solution: 'FSDP2 overlap pipeline per layer: (1) ReduceScatter(layer L gradients) -> each
    GPU has its gradient shard. (2) Optimizer step on shard (local, no communication). (3) AllGather(layer
    L updated params) -> all GPUs have full updated layer. Overlap opportunities: (a) ReduceScatter(L)
    overlaps with backward compute for layer L-1 (same as DDP). (b) Optimizer step for layer L overlaps
    with ReduceScatter(L-1). (c) AllGather(L) overlaps with optimizer step for L-1 and ReduceScatter(L-2).
    This creates a deep pipeline: RS(L) || optimizer(L+1) || AG(L+2) || backward(L-1). With 4 operations
    pipelined, the effective throughput approaches the slowest phase.'
  common_mistake: Thinking ReduceScatter and AllGather are equivalent in overlap opportunity. ReduceScatter
    produces partial results immediately usable for optimizer steps, while AllGather distributes final
    results needed for the next forward pass.
  napkin_math: 'Per layer: RS 1.5ms, optimizer 0.5ms, AG 1.5ms, backward 5ms. Serial: 8.5ms. Pipelined:
    max(1.5, 0.5, 1.5, 5) = 5ms. 1.7x speedup. For 80 layers: serial 680ms, pipelined 400ms. 280ms saved
    per step.'
