schema_version: 1
id: cloud-sus-60013
title: Analyzing the computational graph captured by TorchDynamo for a complex model
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are optimizing inference for a mixture-of-experts (MoE) model on H100. torch.compile generates
  a graph but the TorchInductor-generated CUDA kernels are slower than hand-written ones. You need to
  inspect the fx.Graph to understand what operations are being fused and which are not.
details:
  realistic_solution: Use torch._dynamo.explain(model)(inputs) to inspect captured graphs. Use TORCH_LOGS='output_code'
    to see generated Triton kernels. Identify that torch.topk() followed by scatter creates a graph break
    or inhibits fusion. Replace with torch._C._VariableFunctions.topk (same) but wrapped in a custom operator
    registered via torch.library.custom_op to give TorchInductor a fusion hint. Alternatively, use Triton
    kernels directly for the routing logic.
  common_mistake: Treating torch.compile as a black box. Engineers cannot explain why the expert routing
    (top-k selection + scatter) is creating separate kernels rather than being fused with the expert computation,
    missing the opportunity to guide the compiler.
  napkin_math: 'MoE routing: for 1024 tokens, 8 experts, top-2 routing: topk over 1024×8 = 8192 values,
    scatter to expert buffers. Each kernel launch overhead: ~5μs on H100. If 3 separate kernels vs 1 fused:
    15μs vs 5μs per step. At 1000 steps/sec: 10ms/sec = 1% overhead — small, but compounds in sequence-parallel
    setups.'
