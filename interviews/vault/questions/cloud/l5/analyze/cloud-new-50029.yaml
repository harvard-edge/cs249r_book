id: cloud-new-50029
title: Compiler Fusion Differences Across XLA, TorchInductor, and MIGraphX
topic: software-portability
status: published
provenance: imported
scenario: 'The same 12-layer transformer encoder produces different fused kernel counts on three compilers:
  TorchInductor generates 45 fused kernels for H100, MIGraphX generates 62 fused kernels for MI300X, and
  XLA generates 28 fused operations for TPU v5e. Explain why fusion granularity differs.'
details:
  realistic_solution: 'Fusion granularity reflects each compiler''s strategy: (1) XLA uses whole-graph
    fusion — it sees the entire HLO graph and produces large fused clusters. Fewer kernels but larger
    ones; optimal for TPU''s systolic array which prefers large matrix operations. (2) TorchInductor uses
    pointwise fusion + reduction fusion heuristics, splitting at reduction boundaries. This matches GPU
    architecture where kernel launch overhead is low but register pressure from over-fusion is high. (3)
    MIGraphX is more conservative, splitting at more boundaries due to less mature fusion analysis. The
    62 kernel count suggests missed fusion opportunities. Profile each: XLA''s 28 may have 50% higher
    per-kernel utilization than MIGraphX''s 62.'
  common_mistake: Assuming fewer fused kernels always means better performance. XLA's 28 fused ops are
    larger (more ops fused per kernel) but may include suboptimal fusions. TorchInductor's 45 are more
    granular but each fusion is carefully profiled.
  napkin_math: 'Kernel launch overhead: GPU ~5us, TPU ~2us via XLA dispatch. 45 kernels x 5us = 225us
    GPU overhead. 28 kernels x 2us = 56us TPU overhead. 62 kernels x 5us = 310us MIGraphX overhead. For
    a 10ms inference: MIGraphX loses 3.1% to launch overhead alone.'
