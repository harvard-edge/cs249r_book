id: cloud-1636
title: MAC Utilization in Memory-Bound Inference
topic: roofline-analysis
status: published
provenance: imported
scenario: You are evaluating two cloud accelerator architectures for serving a 70B parameter LLM (FP16)
  during the autoregressive generation phase at batch size 1. Accelerator A features a massive systolic
  array delivering 320 TFLOPS of theoretical MAC throughput with 1 TB/s of memory bandwidth. Accelerator
  B has a smaller compute engine delivering 160 TFLOPS of MAC throughput but features 2 TB/s of memory
  bandwidth. Evaluate which architecture will deliver lower latency per token, and justify your design
  choice using the relationship between MAC utilization, memory bandwidth, and arithmetic intensity.
details:
  realistic_solution: Choose Accelerator B. The generation phase at batch size 1 has an arithmetic intensity
    of approximately 1 FLOP/byte. Both accelerators are severely memory-bound, meaning the vast majority
    of MAC units will sit idle and theoretical peak MAC throughput is unreachable. Accelerator B provides
    double the memory bandwidth, reading the 140GB model twice as fast and effectively cutting latency
    per token in half.
  common_mistake: Assuming that higher theoretical MAC throughput (TFLOPS) always yields lower latency,
    failing to recognize that batch size 1 generation cannot feed the MAC arrays fast enough due to low
    arithmetic intensity.
  napkin_math: Model size = 70B params = 140GB (FP16). Compute per token = 70B MACs = 140 GFLOPs. Time
    on Accel A = 140GB / 1 TB/s = 140ms/token (1 TFLOP/s realized MAC throughput). Time on Accel B = 140GB
    / 2 TB/s = 70ms/token (2 TFLOP/s realized MAC throughput). Accelerator B is 2x faster despite having
    half the peak compute.
