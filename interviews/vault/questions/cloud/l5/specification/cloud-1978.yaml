id: cloud-1978
title: Evaluating 2:4 Structured Sparsity on A100
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are evaluating pruning strategies for deploying a 7B parameter language model on an NVIDIA
  A100 GPU cluster. The model must meet a strict P99 latency SLA. The research team proposes an unstructured
  pruning method that achieves 70% sparsity with a 1% accuracy drop. The systems team argues for 2:4 structured
  sparsity (50% sparse) which has a 0.5% accuracy drop. Evaluate the architectural trade-offs between
  these approaches for this specific hardware and justify the optimal deployment strategy.
details:
  realistic_solution: The 2:4 structured sparsity is the optimal choice. A100 Sparse Tensor Cores natively
    support the 2:4 pattern, allowing them to compress weights in memory by 2x and double the matrix math
    throughput. Unstructured sparsity cannot be easily accelerated on dense Tensor Cores, often resulting
    in fallback to slower vector ALUs (CUDA cores) or inefficient, irregular memory access patterns that
    degrade actual inference performance.
  common_mistake: Assuming 70% unstructured sparsity will automatically yield better latency and throughput
    than 50% structured sparsity by purely looking at the reduction in theoretical FLOPs, ignoring the
    constraints of the accelerator's microarchitecture.
  napkin_math: 'Dense FP16 throughput on A100: 312 TFLOPS. 2:4 Sparse FP16 throughput: 624 TFLOPS (2x
    speedup). Unstructured 70% sparsity mapped to dense Tensor Cores yields 1x speedup, because the dense
    matrix multiply hardware pipeline cannot dynamically skip unstructured zeros and requires loading
    the full dense weight matrices.'
