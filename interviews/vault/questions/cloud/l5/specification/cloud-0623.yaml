id: cloud-0623
title: The Memory Dilemma
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your team is designing a custom ML accelerator optimized for large Transformer models with exceptionally
  long context windows. You need to choose between integrating HBM (High Bandwidth Memory) or GDDR6 for
  the on-board memory. Discuss the technical trade-offs of each memory technology in the context of this
  specific workload, and justify your recommendation.
details:
  realistic_solution: "For large Transformer models with long context windows, the primary performance\
    \ bottleneck often shifts from pure compute to **memory bandwidth** and **memory capacity**.\n  1.\
    \  **HBM (High Bandwidth Memory - e.g., HBM2e, HBM3):**\n      *   **Pros:** Extremely high bandwidth\
    \ (e.g., 2-4 TB/s for HBM3), lower power consumption per bit, smaller footprint due to 3D stacking.\
    \ This is critical for memory-bound operations like large embedding table lookups, attention mechanisms\
    \ (which involve frequent, large data movements), and loading massive model weights and activations\
    \ for long sequences.\n      *   **Cons:** Lower total capacity per stack (e.g., 16-128GB), higher\
    \ cost per GB, more complex integration (requires interposer).\n  2.  **GDDR6 (e.g., GDDR6X):**\n\
    \      *   **Pros:** Higher total capacity (e.g., 24-48GB per chip, multiple chips can be used), lower\
    \ cost per GB, simpler integration into PCBs.\n      *   **Cons:** Lower bandwidth compared to HBM\
    \ (e.g., 1 TB/s for GDDR6X), higher power consumption per bit, larger physical footprint."
  common_mistake: '"HBM is always superior due to higher bandwidth" or "GDDR6 is cheaper, so it''s the
    practical choice." The optimal choice depends heavily on the specific workload characteristics.'
  napkin_math: A 175B parameter FP16 model requires $\sim 350 \text{ GB}$ of memory for weights. If activations
    for a long context window add another 100GB, total memory is 450GB. If your accelerator has 100 TFLOPS
    of compute, and the average arithmetic intensity is 10 FLOP/Byte, you need $100 \text{ TFLOP/s} /
    10 \text{ FLOP/Byte} = 10 \text{ TB/s}$ memory bandwidth to keep it compute-bound. HBM (e.g., 4TB/s)
    gets closer to this ideal than GDDR6 (e.g., 1TB/s), making it less memory-bound.
