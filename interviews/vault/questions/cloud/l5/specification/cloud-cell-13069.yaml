schema_version: 1
id: cloud-cell-13069
title: 'Systolic Array Specification: Design for 99% Compute Utilization on TPU'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Specify the minimum batch size and sequence length to achieve ≥99% compute utilization (vs memory
  bandwidth) on a TPU v5e (197 TFLOPS BF16, 819 GB/s, ridge point = 240 FLOPs/byte) for a transformer
  FFN layer with hidden=4096 and FFN_dim=16384. Derive the arithmetic intensity formula and solve for
  batch*seq.
details:
  realistic_solution: 'FFN layer: two GEMMs. First: (batch*seq, 4096) * (4096, 16384). FLOPs = 2*B*S*4096*16384.
    Bytes = B*S*4096*2 (input) + 4096*16384*2 (weight) + B*S*16384*2 (output). AI = 2*BS*4096*16384 /
    (BS*(4096+16384)*2 + 4096*16384*2). Simplify: numerator = 2*BS*67M. Denominator ≈ 2*BS*20480 + 134MB.
    For BS>>134MB/(2*20480) = 3277: weight BW negligible. AI → 2*4096*16384/(2*(4096+16384)) = 134M/40960
    ≈ 3277 FLOPs/byte >> 240. For 99% compute: need AI/ridge ≥ 100 → any BS > 1 achieves this (AI = 3277
    >> 240*100=24000). Actually AI = 3277 >> 240: 13.7x above ridge at any batch.'
  common_mistake: Setting AI = ridge point for 99% compute utilization when the correct condition is AI
    >> ridge (e.g., AI ≥ 10x ridge) to be clearly compute-dominated and achieve high MFU.
  napkin_math: 'FFN GEMM AI: at large BS, AI → 2*K*N/(2*(K+N)) = 2*4096*16384/(2*20480) = 3277 FLOPs/byte.
    This is 13.7x the TPU ridge (240). So FFN is always compute bound for any appreciable batch size.
    Minimum BS for AI ≥ 240: from formula AI = 2*BS*K*N / (BS*2*(K+N) + W_bytes). At BS=1, seq=1: numerator=2*1*4096*16384=134M
    FLOPs, denominator=1*40960*2+4096*16384*2=81920+134MB=134.2MB. AI=134M/134.2M=0.999 FLOPs/byte — memory
    bound! FFN at BS=1 is MEMORY bound. At BS=128: AI=3277 (compute bound). Crossover: BS=1 (input too
    small for weight reuse). Must batch.'
