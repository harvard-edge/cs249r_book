id: cloud-1089
title: Evaluating Defenses for LLM Continuous Pre-training Poisoning
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are designing a defense against backdoor data poisoning for an LLM trained continuously
  on 50B tokens/day across 1,024 H100 GPUs. An attacker potentially controls 0.01% of the daily ingested
  domains. Evaluate the trade-offs between implementing influence-function-based data filtering (adds
  40% CPU overhead to ingestion), Differentially Private SGD (DP-SGD) during training (reduces GPU throughput
  by 30%), and post-training activation clustering (spectral signatures) using a trusted holdout dataset
  of 1B tokens. Justify your architectural choice considering both security guarantees and compute economics.
details:
  realistic_solution: Implement post-training activation clustering using a trusted clean dataset combined
    with lightweight ingestion heuristics. This avoids the debilitating 30% training throughput hit of
    DP-SGD while successfully isolating latent backdoor representations via spectral analysis.
  common_mistake: Candidates often default to DP-SGD for theoretical guarantees without calculating the
    massive throughput penalty at scale, or assume standard regex/heuristic filtering can catch advanced
    semantic backdoor triggers.
  napkin_math: 'DP-SGD cost: 1,024 H100s * $30/hr * 24 hrs * 30% penalty = $221,184/day in wasted compute.
    Activation clustering on a 1B token holdout requires ~500 GPU hours per checkpoint = ~$15,000/day.
    The post-training defense saves >$200k/day while maintaining high mitigation efficacy against targeted
    poisoning.'
