id: cloud-1797
title: Evaluating Ring AllReduce Bottlenecks at Scale
topic: collective-communication
status: published
provenance: imported
scenario: You are scaling a 175B parameter model training job from 8 to 64 A100 GPUs (8 nodes, 400 Gbps
  inter-node InfiniBand). Your team proposes using a traditional centralized Parameter Server. Evaluate
  the network bandwidth constraints of both the Parameter Server and Ring AllReduce approaches for synchronizing
  the FP16 gradients. Justify your architectural choice quantitatively.
details:
  realistic_solution: Choose Ring AllReduce. A Parameter Server architecture creates a massive incast
    bottleneck at the PS node, scaling linearly with worker count. Ring AllReduce distributes the bandwidth
    load evenly, such that each node only transmits and receives approximately 2x the model size, making
    it bounded and virtually independent of the number of nodes.
  common_mistake: Candidates often evaluate total cluster bandwidth rather than focusing on the single-node
    bottleneck (incast problem) inherent to the Parameter Server architecture.
  napkin_math: 'Model size: 175B * 2B = 350 GB. Parameter Server (1 PS, 63 Workers): PS must ingest 63
    * 350 GB = 22,050 GB. At 50 GB/s (400 Gbps), time = 441s. Ring AllReduce: Each node transfers 2 *
    (63/64) * 350 GB = 689 GB. At 50 GB/s, time = 13.8s. Ring AllReduce is ~32x faster.'
