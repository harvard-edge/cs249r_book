id: cloud-cell-11146
title: 'KV-Cache: Specification — KV Cache Sizing for Speculative Decoding'
topic: kv-cache-management
status: published
provenance: imported
scenario: 'Write the KV cache specification for a speculative decoding setup on H100 (80GB HBM3): target
  model 70B, draft model 7B, speculative lookahead K=4 tokens. Specify KV cache for both models, how speculative
  KV tokens are managed, and rollback mechanism.'
details:
  realistic_solution: 'KV cache per token for 80-layer GQA-8 model: 2 × 80 × 8 × 128 × 2B = 320KB per
    token.'
  common_mistake: Not accounting that speculative decoding generates K candidate tokens whose KV must
    be stored but may be rolled back; not budgeting for both models' KV simultaneously.
  napkin_math: '80-layer model (GPT-4 class), GQA-8, head_dim=128, fp16: KV per token: 80 layers × 2 ×
    8 heads × 128 × 2B = 327,680B = 320KB (not 40KB — 40KB would require only 10 layers or 2 KV heads).'
last_modified: '2026-04-01'
