id: cloud-1376
title: Three-Tier Retail Video Analytics
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are architecting a retail analytics pipeline for 50 stores. Each store has 100 battery-powered
  camera nodes (ARM Cortex-M4, 1MB SRAM) connected via low-bandwidth Wi-Fi (10 Mbps shared) to a local
  edge server (Jetson AGX Orin, 32GB RAM). The cloud backend (AWS L4 GPUs) runs a heavy 3D-CNN for behavioral
  anomaly detection (e.g., shoplifting). Sending raw 720p 15FPS video from 100 cameras requires ~150 Mbps,
  far exceeding both the local Wi-Fi and the store's internet uplink (20 Mbps). Evaluate a 3-tier hierarchical
  processing strategy to partition the compute across the sensor, edge, and cloud to meet all network
  constraints while maximizing camera battery life.
details:
  realistic_solution: 'Deploy a hierarchical cascade: Run a 300KB TinyML person-detection model on the
    Cortex-M4 (Tier 1) to only stream frames when a human is present. At the edge, the Jetson Orin runs
    a YOLO tracker (Tier 2) to extract 112x112 bounding box crop sequences of customer actions. Finally,
    transmit only these small action crops to the Cloud L4 instances for the final 3D-CNN behavioral classification
    (Tier 3).'
  common_mistake: Attempting to stream all compressed video to the edge server, which quickly saturates
    the 10 Mbps local WiFi and drains the battery, or trying to run the heavy 3D-CNN directly on the edge
    server which lacks the compute capacity for 100 concurrent streams.
  napkin_math: 'Raw video: 1.5 Mbps * 100 cameras = 150 Mbps (Fails 10 Mbps local link). Tier 1 Filtering:
    Assume 5% of cameras see people simultaneously (5 active). 5 * 1.5 Mbps = 7.5 Mbps (Fits 10 Mbps local
    WiFi). Tier 2 Cropping: Edge extracts 112x112 sequence = ~200 Kbps per active camera. 5 active * 200
    Kbps = 1.0 Mbps. 1.0 Mbps << 20 Mbps store uplink constraint, enabling the cloud to run the heavy
    3D-CNN effectively.'
