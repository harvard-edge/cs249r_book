title: Evaluating Topologies for MoE All-to-All
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: You are designing the network fabric for a 4096-GPU cluster (using 400Gbps NDR InfiniBand NICs)
  dedicated to training massive Mixture of Experts (MoE) models. You must choose between a non-blocking
  2-tier Fat-Tree (Clos) and a standard 3D Torus topology. Given that MoE training relies heavily on global
  All-to-All collectives across the entire cluster, evaluate the trade-offs of both architectures regarding
  their bisection bandwidth and justify your final design decision.
details:
  realistic_solution: Calculate the exact bisection bandwidth for both topologies. Select the Fat-Tree
    because MoE's All-to-All collective requires massive global throughput, and the Fat-Tree provides
    significantly higher bisection bandwidth, avoiding the severe multi-hop congestion inherent in a Torus
    under global traffic patterns.
  common_mistake: Assuming that high local link speed in a Torus compensates for its topology, and failing
    to calculate how bisection bandwidth scales poorly compared to a non-blocking Fat-Tree for global
    all-to-all communication.
  napkin_math: 'For N=4096. Fat-Tree bisection BW = (N/2) * 400 Gbps = 2048 * 400 Gbps = 819.2 Tbps. 3D
    Torus (16x16x16 grid): Bisection cuts a plane of 16x16 links in 2 directions. Links cut = 2 * 16 *
    16 = 512. Torus bisection BW = 512 * 400 Gbps = 204.8 Tbps. Fat-Tree provides exactly 4x the bisection
    bandwidth.'
