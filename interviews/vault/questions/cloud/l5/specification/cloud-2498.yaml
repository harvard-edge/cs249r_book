schema_version: 1
id: cloud-2498
title: Asynchronous FL with Edge Stragglers
topic: federated-learning
status: published
provenance: imported
scenario: A cloud orchestrator runs Federated Learning on 10,000 Cortex-M33 environmental sensors. The
  sensors use solar power harvesting and only participate when energy levels are >80%. Synchronous FedAvg
  fails because 85% of devices drop offline or timeout during the 5-minute local training window, leading
  to discarded rounds.
details:
  realistic_solution: The cloud architecture must transition from synchronous FedAvg to an asynchronous
    federated optimization strategy (e.g., FedAsync). The cloud maintains a continuous global model and
    accepts updates from edge devices as they complete their local training. To prevent stale updates
    from destabilizing the global model, the cloud applies a staleness penalty function to the learning
    rate of delayed updates. Furthermore, the cloud orchestrator should implement a power-aware device
    selection heuristic, caching the global model on edge nodes during high-power states and allowing
    them to train offline.
  common_mistake: Increasing the timeout window to 30 minutes to wait for stragglers, which stalls the
    global model progression.
  napkin_math: 'Synchronous FedAvg requires a quorum (e.g., 1000 devices). If probability of staying online
    for 5 mins is 0.15, expected completions = 150. Quorum fails. With FedAsync, if 150 devices complete
    every 5 minutes, the cloud can batch them into 1 global update per 5-minute window. If a device takes
    60 minutes to return an update, staleness is 12 global steps. Cloud applies penalty: lr = base_lr
    * (1 / (1 + staleness)) = base_lr * 0.076, safely incorporating the stale gradient without divergence.'
