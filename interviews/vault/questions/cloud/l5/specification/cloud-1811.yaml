id: cloud-1811
title: H100 Migration for LLM Decoding
topic: model-size-estimation
status: published
provenance: imported
scenario: Your team is serving a 70B parameter LLM (FP16) on A100-80GB GPUs. The product manager proposes
  migrating the real-time decoding service to H100-80GB instances to reduce latency, noting that H100
  offers over 3x the FP16 Tensor Core TFLOPS (989 vs 312 TFLOPS) while costing only 2x more per hour.
  The workload currently operates at a low batch size to meet strict time-to-first-token SLAs, yielding
  an arithmetic intensity of roughly 2 FLOPs/byte. Evaluate this proposal using the Roofline Model and
  justify whether the team should approve the migration.
details:
  realistic_solution: Reject the migration for this specific workload configuration. Using the Roofline
    Model, at an arithmetic intensity of 2 FLOPs/byte, the workload is firmly in the memory-bound regime
    for both GPUs. The H100's memory bandwidth (3.35 TB/s) is only 1.64x higher than the A100's (2.0 TB/s).
    Since performance scales with bandwidth in this regime, you only get a ~1.67x speedup but pay 2x the
    cost, degrading overall price-performance.
  common_mistake: Candidates often assume performance scales linearly with peak TFLOPS (3x speedup) without
    realizing that auto-regressive decoding is heavily memory-bandwidth bound. They fail to calculate
    the ridge point and recognize that the bottleneck remains memory bandwidth.
  napkin_math: 'A100 Ridge: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte. H100 Ridge: 989 TFLOPS / 3.35 TB/s
    = 295 FLOPs/byte. Workload AI = 2 FLOPs/byte. A100 Perf = 2 * 2.0 = 4 TFLOPS. H100 Perf = 2 * 3.35
    = 6.7 TFLOPS. Speedup = 6.7 / 4.0 = 1.67x. Cost increase = 2.0x. 1.67x < 2.0x, so ROI is negative.'
