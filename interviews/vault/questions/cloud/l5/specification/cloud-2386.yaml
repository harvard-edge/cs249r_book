id: cloud-2386
title: Cost-Aware Shadow Testing Architecture
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are upgrading an e-commerce ranking model from a lightweight XGBoost model (10ms latency,
  runs on CPU) to a massive Two-Tower deep learning model (40ms latency, requires 1 NVIDIA A10G per replica
  capable of 25 QPS). The service handles 10,000 QPS. Running a standard 100% shadow deployment for 7
  days to evaluate offline/online metric consistency is projected to blow out the cloud budget.
details:
  realistic_solution: Implement a Stratified Sampling Shadow Deployment. Instead of shadowing 100% of
    traffic, route only a representative 5% sample to the shadow model. To ensure the evaluation covers
    edge cases, bias the sampling towards high-uncertainty or high-value requests (e.g., users with sparse
    history). To handle the baseline comparison, log both the baseline and shadow predictions asynchronously
    to a data lake, comparing the ranking metrics (like NDCG) offline. This validates the serving infrastructure
    and model accuracy at a fraction of the hardware cost.
  common_mistake: Abandoning shadow testing entirely and moving directly to a 1% canary deployment, risking
    catastrophic user impact.
  napkin_math: 10,000 QPS total. 100% shadow = 10,000 / 25 QPS/GPU = 400 A10G GPUs. At $1.50/hr, 400 GPUs
    * 168 hours (7 days) = $100,800. 5% shadow = 500 QPS = 20 A10G GPUs. Cost drops to 20 * $1.50 * 168
    = $5,040. A 5% sample still yields ~43 million predictions per day, highly sufficient for statistical
    significance.
