id: cloud-0757
title: The Unstable Cluster
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You're leading the infrastructure team for training a 1-Trillion parameter model on a cluster
  of 2000 GPUs spread across 250 nodes. Node failures (hardware, network, OOMs) occur frequently, averaging
  several per day across the cluster. Restarting training from scratch after each failure is prohibitively
  expensive. Design a robust fault-tolerance strategy for this large-scale distributed training job.
details:
  realistic_solution: 'At this scale, fault tolerance is critical and complex. A simple periodic checkpoint
    will likely lead to significant downtime or re-computation. A robust strategy combines several techniques:'
  common_mistake: '"Just checkpoint every N steps." This simplistic approach doesn''t address the coordination
    overhead, recovery time, or the scale of the problem.'
  napkin_math: '- **Model Size:** 1T parameters, FP16 = 2TB weights. Adam optimizer state (FP32 master
    + 2 moments) = 1T * (4+8) bytes = 12TB. Total state ~14TB. | - **MTBF (Mean Time Between Failures):**
    250 nodes, if each node has a 1% daily failure rate, then 2.5 nodes fail per day on average. This
    means a failure occurs roughly every $24 \text{ hours} / 2.5 \approx 9.6 \text{ hours}$. | - **Checkpoint
    Time:** If saving 14TB takes 1 hour (e.g., restricted by an aggregate storage bandwidth of ~4 GB/s
    due to network congestion or disk IOPS limits), then checkpointing too frequently will kill progress.
    | - **Optimal Checkpoint Interval:** A common rule of thumb is to checkpoint such that the time spent
    checkpointing + time spent recomputing due to failure is minimized. If recovery takes $T_R$ and checkpoint
    takes $T_C$, and MTBF is $T_{MTBF}$, then optimal interval $T_{interval} \approx \sqrt{2 T_C T_{MTBF}}$.
    If $T_C=1 \text{ hour}$ and $T_{MTBF}=9.6 \text{ hours}$, then $T_{interval} \approx \sqrt{2 \times
    1 \times 9.6} \approx \sqrt{19.2} \approx 4.4 \text{ hours}$. So, checkpointing every ~4-5 hours would
    be a good starting point.'
