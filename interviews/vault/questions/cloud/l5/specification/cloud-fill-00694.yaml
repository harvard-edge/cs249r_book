id: cloud-fill-00694
title: Scaling LLM Inference with Attention Variants on AMD MI300X
topic: attention-scaling
status: published
provenance: imported
scenario: You are tasked with deploying a large language model (LLM) for high-throughput inference on
  a cluster of AMD MI300X accelerators. Each MI300X features 192 GB HBM3 with a 5.3 TB/s memory bandwidth,
  and delivers 1,307 TFLOPS of FP16 sparse compute. The target LLM requires processing sequences with
  a context length of 128k tokens. Design a system architecture, specifically detailing the attention
  mechanism and context scaling strategy, to meet low-latency and high-throughput demands given these
  hardware constraints. Justify your choice of attention variant (e.g., multi-head, grouped-query, multi-query,
  sliding window) and quantitative estimations for memory usage and computational throughput.
details:
  realistic_solution: A robust solution would involve adopting Grouped-Query Attention (GQA) or Multi-Query
    Attention (MQA) to drastically reduce the KV cache size, combined with a sparse attention mechanism
    like Sliding Window Attention (SWA) or FlashAttention-2 (if applicable and optimized for MI300X) to
    manage the quadratic computational complexity for long contexts. Implementing efficient quantization
    (e.g., FP8, int8) for the KV cache and model weights can further alleviate memory pressure and boost
    effective throughput. Strategies like dynamic batching and careful partitioning across multiple MI300X
    GPUs would also be critical for throughput and latency.
  common_mistake: Candidates often underestimate the quadratic memory and computational cost of standard
    Multi-Head Attention (MHA) for very long contexts, especially regarding the Key-Value (KV) cache growth,
    which can quickly exceed the 192 GB HBM3 capacity. Another common mistake is failing to leverage the
    specific hardware capabilities like HBM bandwidth and sparse compute, or not considering batching
    strategies appropriately.
  napkin_math: 'Consider an LLM with 60 layers, 80 attention heads, and a head dimension of 128. For a
    128k context length (131,072 tokens) and FP16 precision (2 bytes):

    1.  **MHA KV Cache Memory:** Each token requires 2 * heads * head_dim * 2 bytes for KV cache. For
    all 60 layers, this is `60 * (2 * 80 * 128 * 2 bytes/token) * 131072 tokens ≈ 314 GB`. This far exceeds
    the 192 GB HBM3, requiring multiple GPUs or an optimized attention variant.

    2.  **GQA KV Cache Memory (e.g., 8 KV heads):** With 8 KV heads, memory per token for KV cache per
    layer becomes `2 * 8 * 128 * 2 bytes/token`. For all 60 layers: `60 * (2 * 8 * 128 * 2 bytes/token)
    * 131072 tokens ≈ 31.4 GB`. This fits within a single MI300X''s HBM.

    3.  **MHA Compute Complexity (Self-Attention):** Approximately `2 * context_length^2 * head_dim` FP16
    operations per head per layer. For 128k context: `2 * (131072)^2 * 128 ≈ 4.4e12` FP16 ops per head
    per layer. Total for 60 layers and 80 heads: `60 * 80 * 4.4e12 ≈ 2.1e17` FP16 ops. This significantly
    exceeds the 1,307 TFLOPS (1.307e15 FP16 ops/sec), making vanilla MHA computationally intractable for
    real-time inference.

    4.  **SWA Compute Complexity:** For a window size ''W'' (e.g., 4k tokens), complexity becomes `O(N
    * W * D)`, linear with context length ''N''. This dramatically reduces FLOPs, making it feasible within
    the MI300X''s compute budget.'
