id: cloud-1214
title: LLM Inference Energy Movement Bottleneck
topic: energy-per-operation
status: published
provenance: imported
scenario: You are designing the hardware strategy for a 70B parameter LLM cloud inference fleet. The primary
  workload is real-time chat (autoregressive decoding at batch size 1). Your hardware team proposes a
  custom inference ASIC that aggressively optimizes the arithmetic logic units (ALUs). They claim their
  new design reduces INT8 MAC energy from 1.5 pJ (standard cloud GPU) to 0.1 pJ (a 15x improvement). Both
  chips use identical HBM subsystems, which cost approximately 150 pJ to access 1 byte of DRAM. The team
  projects massive fleet-wide power savings from the ALU optimization. Evaluate this claim and justify
  your design decision.
details:
  realistic_solution: Reject the claim. In autoregressive decoding at batch size 1, every model weight
    must be loaded from DRAM to perform exactly one MAC operation. Thus, the total energy per operation
    is dominated by the 150 pJ DRAM access, not the compute. Reducing MAC energy from 1.5 pJ to 0.1 pJ
    only yields roughly a 1% overall energy reduction. The investment should instead focus on increasing
    batch sizes (to amortize the DRAM read over multiple MACs) or heavily optimizing the memory hierarchy.
  common_mistake: Focusing solely on the 15x reduction in compute energy and concluding it will drastically
    reduce overall power, failing to recognize that batch size 1 LLM decoding is heavily memory-bound
    and data movement energy dominates.
  napkin_math: 'Standard ASIC Energy/MAC = DRAM Read (1 byte for INT8) + MAC = 150 pJ + 1.5 pJ = 151.5
    pJ.

    Custom ASIC Energy/MAC = 150 pJ + 0.1 pJ = 150.1 pJ.

    Savings = 1.4 pJ / 151.5 pJ ≈ 0.92%.

    The 15x compute energy reduction translates to <1% total system energy savings because DRAM access
    costs ~1500x more than the custom MAC.'
