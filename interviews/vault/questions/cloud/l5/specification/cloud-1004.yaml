id: cloud-1004
title: Mitigating Concept Drift in High-Throughput Fraud Detection
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You lead an anti-fraud ML system processing 5,000 TPS on a fleet of AWS m5.4xlarge instances.
  Over 48 hours, the model's precision drops from 95% to 75%, costing $50k/day in false-positive manual
  reviews. Monitoring shows that the marginal distributions of all 200 input features (P(X)) are perfectly
  stable (KS test p-values > 0.1). Evaluate the architectural trade-offs between implementing a stateless
  online learning system (updating weights every 5 minutes) versus a micro-batch retraining pipeline (updating
  every 6 hours) to address this specific failure mode.
details:
  realistic_solution: Recognize this as pure concept drift (P(Y|X) changed while P(X) remained stable).
    Opt for the micro-batch pipeline. It provides a necessary buffer for label maturation and offline
    validation, preventing adversarial poisoning, while keeping adaptation fast enough to cut financial
    losses.
  common_mistake: Confusing concept drift with covariate shift and trying to solve it by re-weighting
    historical data distributions, or deploying online learning without mitigating the risk of catastrophic
    forgetting during adversarial burst attacks.
  napkin_math: Financial bleed = $50,000 / 24h = $2,083/hour. Online learning adapts in 5 mins (loss =
    $173) but risks poisoning. Micro-batch adapts in 6 hours (loss = $12,500). If online learning suffers
    one bad update requiring a 1-day rollback ($50k loss), it wipes out the latency benefits. Micro-batching
    provides the optimal risk-adjusted trade-off.
