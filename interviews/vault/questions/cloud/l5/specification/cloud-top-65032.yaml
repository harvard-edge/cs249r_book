id: cloud-top-65032
title: Reward Model Architecture for RLHF at Scale
topic: model-adaptation-systems
status: published
provenance: imported
scenario: 'Design a reward model (RM) for an RLHF pipeline fine-tuning a 70B policy model. The RM needs
  to score completions at 500 QPS during PPO rollouts. Budget: 4xA100. Specify the RM model size, architecture,
  and serving strategy.'
details:
  realistic_solution: 'RM sizing: empirical finding is that RM performance plateaus at 10-20% of policy
    model size for typical RLHF tasks. Use 7B RM on 2xA100 in TP=2 (14GB per GPU for BF16 + KV cache).
    Architecture: take a pretrained 7B model, replace next-token prediction head with a scalar output
    head (single linear layer: d_model to 1). Training: binary cross-entropy or Bradley-Terry loss on
    human preference pairs. Serving for 500 QPS: 7B model on 2xA100, BF16, sequence length 512. With continuous
    batching at batch=16: ~120 QPS per GPU pair = 240 QPS for 2 serving instances. For 500 QPS: need 3
    pairs = 6xA100. With 4xA100 budget: use 2xA100 for serving (240 QPS) and queue the remaining requests,
    or serve at BF16 vs FP8 for higher throughput.'
  common_mistake: Using the same size model as the policy for the reward model. A 70B RM would require
    16xA100 just to serve, consuming more compute than the policy training itself. Empirically, RM performance
    scales with data quality more than model size.
  napkin_math: '7B model forward pass at 512 tokens on A100: ~12ms. Single A100: 1000/12 = 83 QPS serial.
    With continuous batching (batch=8): effective throughput ~200 QPS per A100. 2xA100 TP=2: 200 QPS.
    4xA100 in 2 separate TP=2 instances: 400 QPS. To hit 500 QPS: need 6xA100 or use FP8 on 4xA100 for
    1.5x throughput boost: 400 * 1.5 = 600 QPS. FP8 inference on A100 is feasible for RM scoring (lower
    precision acceptable for ranking).'
