id: cloud-1585
title: Evaluating FP8 Trade-offs in MLPerf Time-to-Train
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are preparing an official MLPerf Training v4.0 submission for an LLM on a 1024x H100 cluster.
  The baseline BF16 training achieves a step time of 2.0s and converges to the MLPerf target quality (perplexity)
  in exactly 50,000 steps. The hardware team proposes switching to FP8 precision. FP8 reduces the step
  time to 1.2s due to doubled Tensor Core throughput and reduced memory bandwidth pressure. However, the
  reduced precision introduces statistical inefficiency; the model now requires learning rate adjustments
  and requires 70,000 steps to reach the identical target perplexity. Evaluate whether adopting FP8 is
  the correct decision for the MLPerf submission.
details:
  realistic_solution: Calculate the absolute Time-to-Train (TTT) for both configurations. The MLPerf primary
    metric is wall-clock time to target quality, not raw throughput. By multiplying the step time by the
    required steps to converge, we determine the actual TTT. Despite requiring 40% more steps due to FP8's
    statistical degradation, the 40% reduction in step time outpaces the convergence penalty, resulting
    in a lower overall wall-clock time. FP8 should be adopted.
  common_mistake: Candidates often focus solely on the raw hardware throughput increase (Tokens/sec or
    MFU) and assume step-time reduction linearly translates to benchmark victory, ignoring that MLPerf
    strictly measures 'Time to Train' to a specific convergence target, penalizing statistical inefficiency.
  napkin_math: BF16 TTT = 2.0s/step * 50,000 steps = 100,000 seconds (~27.7 hours). FP8 TTT = 1.2s/step
    * 70,000 steps = 84,000 seconds (~23.3 hours). Absolute time saved = 16,000 seconds. Overall MLPerf
    speedup = 100,000 / 84,000 = 1.19x.
