id: cloud-1804
title: Evaluating RoCEv2 vs InfiniBand for H100 Clusters
topic: collective-communication
status: published
provenance: imported
scenario: You are architecting the backend compute network for a 2,048 H100 GPU cluster dedicated to training
  a 70B parameter Mixture of Experts (MoE) model using 3D parallelism. You must evaluate whether to deploy
  a 400Gbps InfiniBand (NDR) fabric or a 400Gbps RoCEv2 Ethernet fabric. The InfiniBand fabric costs approximately
  $1,500 more per port (NIC + Switch + Transceivers) and provides hardware-level lossless delivery. The
  RoCEv2 fabric uses standard Ethernet switches but relies on PFC (Priority-based Flow Control) and DCQCN
  for congestion control. Evaluate the trade-offs between these two fabrics for this specific MoE workload,
  justifying your decision regarding network incast, tail latency, and Total Cost of Ownership (TCO).
details:
  realistic_solution: Acknowledge that MoE requires massive All-to-All traffic, causing severe microbursts
    and network incast. While RoCEv2 saves ~$3M in upfront CapEx, PFC storms and Go-Back-N retransmissions
    from dropped packets can degrade collective performance at tail latencies. If the team lacks deep
    network tuning expertise for DCQCN, InfiniBand is the safer choice to ensure predictable scaling efficiency.
    Otherwise, RoCEv2 provides better TCO.
  common_mistake: Candidates often blindly recommend InfiniBand for 'best performance' without quantifying
    if the >$3M cost premium justifies the potential efficiency gain, or they fail to recognize that MoE's
    heavy All-to-All communication patterns exacerbate RoCEv2 PFC pause-frame storms.
  napkin_math: CapEx Premium = 2,048 GPUs * $1,500/port = $3,072,000. Assuming an H100 costs ~$30,000,
    this premium equates to ~102 GPUs (a 5% compute capacity increase). Therefore, InfiniBand must improve
    overall training throughput (by avoiding RoCEv2 congestion drops/tail latency) by more than 5% to
    yield a positive ROI.
