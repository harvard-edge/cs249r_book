id: cloud-1197
title: Evaluating ELT Architecture for ML Feature Agility
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team ingests 50TB of raw telemetry data daily. Currently, an ETL pipeline uses a 100-node
  Spark cluster (m5.4xlarge) to pre-process and structure this data, dropping 60% of raw fields to save
  downstream storage. ML engineers frequently request historical access to dropped fields for new feature
  engineering, requiring expensive 6-month data backfills. Evaluate the trade-offs of transitioning to
  an ELT architecture where raw data is loaded directly into cloud object storage and transformed on-demand.
details:
  realistic_solution: Implement ELT by dumping raw data into S3 using a compressed format and using a
    distributed query engine (e.g., Databricks SQL, Athena) to transform data into features on-demand.
    This decouples storage from compute and enables immediate historical experimentation.
  common_mistake: Assuming that ELT is strictly more expensive due to retaining 100% of raw data indefinitely,
    ignoring the massive compute savings from removing always-on ETL clusters and the elimination of expensive
    backfill engineering cycles.
  napkin_math: 'Current ETL compute: 100 nodes * $0.768/hr * 24h = $1,843/day (~$55k/mo). S3 Storage for
    50TB/day: 50TB * $23/TB/mo = $1,150/mo. Storing 6 months of raw data (9PB) costs ~$200k/mo, but ELT
    eliminates constant ETL compute overhead and $15k/mo in engineering backfill costs, while trading
    fixed compute for variable, on-demand query costs ($5/TB scanned) and unlocking 100% experimentation
    flexibility.'
