title: Evaluating Rail-Optimized Topologies for Cross-Node TP
topic: interconnect-topology
status: published
provenance: imported
scenario: 'You are architecting a cluster of 1,024 H100 GPUs (128 nodes, 8 GPUs each) to train a large-scale
  LLM. The memory requirements force you to use a Tensor Parallelism (TP) degree of 16, which means TP
  groups must span across two nodes. You are evaluating two backend network designs: a standard leaf-spine
  where all 8 NICs on a node connect to a single top-of-rack (ToR) switch, and a rail-optimized topology
  where NIC i of every node connects to a dedicated switch i. Evaluate the performance implications of
  these two designs on the cross-node TP AllReduce operations.'
details:
  realistic_solution: Choose the rail-optimized topology. Because cross-node TP AllReduce patterns are
    symmetric (GPU i on Node A communicates directly with GPU i on Node B), connecting all NIC 0s to Switch
    0 creates 8 independent, parallel network planes. This physical isolation eliminates ECMP collisions
    and in-switch contention, guaranteeing predictable, minimum-latency 400Gbps line rate for the latency-sensitive
    TP collective.
  common_mistake: Focusing solely on aggregate bisection bandwidth and assuming a non-blocking standard
    fat-tree will perform identically. Candidates often fail to recognize that standard routing suffers
    from ECMP hash collisions and microbursts during highly synchronized collective operations like AllReduce.
  napkin_math: 'For a 2GB tensor chunk cross-node AllReduce (data moved ≈ 2x): 4GB per GPU. Rail-opt dedicated
    path at 400Gbps (~50GB/s payload) = 80ms latency. Standard ToR with 8 synchronized flows routinely
    experiences 30-50% congestion degradation due to hash collisions, reducing effective per-GPU bandwidth
    to ~25GB/s and doubling latency to 160ms. Since TP is in the critical path of every forward/backward
    layer, this penalty compounds significantly per iteration.'
