id: cloud-1981
title: Stateful Streaming vs Stateless Batching ASR
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are designing the backend for a real-time voice agent handling 5,000 concurrent active
  sessions. You must choose between two ASR architectures: a stateless Transformer that requires 1.5-second
  audio chunks to decode accurately (utilizing dynamic batching), and a stateful streaming RNN-T that
  incrementally processes 100ms frames. The strict SLA dictates a Time-To-First-Word (TTFW) of <300ms.
  The deployment targets an autoscaling cluster of NVIDIA A10G (24GB VRAM) GPUs. Evaluate the latency,
  memory, and throughput trade-offs to justify your final architectural design and cluster sizing.'
details:
  realistic_solution: Adopt the stateful streaming RNN-T to easily meet the 300ms SLA, and implement session-aware
    routing (sticky sessions). Since 5,000 sessions requiring 20MB of hidden state each results in 100GB
    of persistent memory demand, shard the traffic across at least 5 A10G GPUs using consistent hashing,
    and perform continuous batching across concurrent incoming 100ms frames on each node.
  common_mistake: Candidates often choose the stateless Transformer to easily leverage existing dynamic
    batching infrastructure and stateless load balancing, failing to realize that accumulating the minimum
    1.5s audio chunk duration natively violates the 300ms TTFW SLA before any compute even begins.
  napkin_math: 'Stateless Latency = 1500ms (audio buffer) + 50ms (compute) = 1550ms TTFW (Fails 300ms
    SLA). Stateful Latency = 100ms (buffer) + 15ms (compute) = 115ms TTFW (Passes SLA). Memory requirement:
    5,000 streams * 20MB state/stream = 100GB total state. Minimum GPUs = ceil(100GB / 24GB A10G capacity)
    = 5 GPUs.'
