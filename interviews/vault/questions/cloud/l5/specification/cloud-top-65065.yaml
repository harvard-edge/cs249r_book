schema_version: 1
id: cloud-top-65065
title: Multi-Tenant KV Cache Isolation in Disaggregated Serving
topic: disaggregated-serving
status: published
provenance: imported
scenario: A shared disaggregated serving cluster handles requests from 10 enterprise tenants. Tenant A's
  large batch of 10K requests floods the KV cache store, causing tenant B's requests to be preempted and
  delayed. Design a multi-tenant KV cache isolation scheme.
details:
  realistic_solution: 'Multi-tenant KV cache isolation: (1) Per-tenant KV page quotas: allocate a fixed
    fraction of KV cache pages to each tenant. With 10 tenants and 60GB KV capacity: 6GB per tenant baseline.
    Allow burst up to 10GB with work-stealing from idle tenants. Implemented via tenant_id tag on KV page
    allocations. (2) Hierarchical fair queuing: maintain per-tenant decode queues. Scheduler processes
    queues in round-robin weighted by tenant SLA tier. Premium tenants get 2x weight. (3) Admission control
    per tenant: when tenant KV quota is exhausted, new requests from that tenant are queued (not preempting
    other tenants'' live KV caches). (4) KV cache eviction scope: when a tenant''s quota is full, evict
    only from that tenant''s KV pages using LRU within the tenant''s pages. Never evict another tenant''s
    pages for a different tenant''s benefit. (5) Cross-tenant prefix sharing: if two tenants share a common
    system prompt, store one copy and reference-count it — deducted proportionally from each tenant''s
    quota.'
  common_mistake: Implementing token-bucket rate limiting at the request level without KV cache memory
    quotas. Rate limiting prevents request flooding but does not prevent a single tenant with large requests
    (long context) from monopolizing KV cache memory and causing other tenants' cache evictions.
  napkin_math: '10 tenants, 60GB KV cache. Baseline: 6GB per tenant. Max context per tenant: 6GB / (524KB/token
    for 8B model) = 11,450 tokens max outstanding context per tenant. For 70B: 6GB / (2*80*64*128*2B/1000
    = 2.62MB/token) = 2290 tokens max. At 10 requests per tenant with 200-token context: 10 * 200 * 2.62MB
    = 5.24GB per tenant — just under 6GB quota. Burst allowance (10GB): 10 * 400-token context = 4GB OK.
    Prevents tenant monopolization while allowing reasonable bursting.'
