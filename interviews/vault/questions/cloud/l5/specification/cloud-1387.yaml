id: cloud-1387
title: Evaluating HPCC vs DCQCN in 400GbE AI Fabrics
topic: collective-communication
status: published
provenance: imported
scenario: You are architecting the congestion control strategy for a new 4096-GPU (H100) cluster utilizing
  a 400GbE RoCEv2 network fabric. The cluster will host highly synchronized AllReduce training workloads
  alongside latency-sensitive model serving. Your network lead proposes replacing the legacy DCQCN protocol
  with HPCC (High Precision Congestion Control) utilizing In-Network Telemetry (INT), claiming it will
  eliminate micro-burst incast drops. Evaluate the architectural trade-offs of deploying HPCC versus tuning
  DCQCN, specifically analyzing incast resolution time, switch hardware constraints, and telemetry bandwidth
  overhead at 400Gbps.
details:
  realistic_solution: 'HPCC utilizes exact queue depth and tx-rate telemetry to deterministically calculate
    the fair-share rate, resolving incast in a single RTT and maintaining near-zero queues. DCQCN relies
    on probabilistic ECN marking, requiring multiple RTTs to iteratively converge, which risks buffer
    overflow during high-degree incast. The primary trade-off is hardware capability: HPCC strictly requires
    INT-capable switches (e.g., Tofino/Tomahawk with INT support), whereas DCQCN uses standard ECN available
    on all commodity switches. The INT bandwidth overhead is mathematically negligible for large MTUs.'
  common_mistake: Focusing solely on the bandwidth overhead of telemetry headers while ignoring the strict
    requirement for INT-capable programmable switch ASICs, or failing to quantify the convergence time
    difference during incast events.
  napkin_math: 'INT header overhead is typically ~60 bytes. For RoCEv2 traffic using a 4096-byte MTU:
    60 / 4096 = ~1.46% bandwidth overhead. During incast, HPCC converges in 1 RTT (~2μs). DCQCN might
    take 10 RTTs (~20μs). At 400Gbps (50GB/s), 20μs of congestion puts 1MB of data in flight (50GB/s *
    20e-6), which frequently exceeds the shallow buffers (e.g., 32MB shared across 64 ports) of modern
    switches, causing PFC storms or drops.'
