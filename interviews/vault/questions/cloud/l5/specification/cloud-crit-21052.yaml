schema_version: 1
id: cloud-crit-21052
title: KV-Cache Aware Request Scheduling
topic: kv-cache-management
status: published
provenance: imported
scenario: Your serving cluster runs 4 replicas of Llama 3 70B on H100 nodes. A load balancer routes requests
  via round-robin. Replica 1 has 90% KV-cache utilization (many long-context requests), while replicas
  2-4 are at 30%. New long-context requests sent to replica 1 are rejected. Specify a KV-cache-aware routing
  policy.
details:
  realistic_solution: 'Heartbeat timeout = polling_interval × missed_beats_threshold. At 100ms interval
    with 4 replicas: failure detection time ≈ 400ms worst case (not <1ms).'
  common_mistake: Adding a simple 'reject-and-retry' mechanism that sends rejected requests to another
    replica. This creates cascading retries and does not prevent the imbalance from recurring.
  napkin_math: 'Heartbeat overhead: 100ms polling interval × 4 replicas = 400ms total heartbeat latency
    in the worst case (not <1ms — <1ms would be for network RTT, not heartbeat detection timeout which
    requires waiting for missed heartbeats).'
last_modified: '2026-04-01'
