title: DLRM Embedding Sharding Strategy
topic: data-parallelism
status: published
provenance: imported
scenario: You are designing the distributed training architecture for a Deep Learning Recommendation Model
  (DLRM). The model features a massive 200GB sparse embedding table for user IDs and four smaller 5GB
  embedding tables for contextual features. Your hardware target is a single node with 8x A100 (80GB)
  GPUs connected via NVLink. Evaluate the trade-offs of different embedding sharding strategies to maximize
  training throughput while strictly avoiding Out-of-Memory (OOM) errors.
details:
  realistic_solution: 'Implement a hybrid sharding approach: employ row-wise sharding for the massive
    200GB user ID table to distribute its memory footprint evenly across all 8 GPUs (25GB/GPU), while
    using table-wise sharding (or data parallelism) for the four smaller 5GB tables. This minimizes the
    all-to-all communication volume (only the large table requires cross-GPU coordination) while keeping
    maximum per-GPU memory at 30GB, leaving 50GB for activations and dense layers.'
  common_mistake: Defaulting to row-wise sharding (hashing IDs across all GPUs) for all tables, which
    creates severe all-to-all communication bottlenecks for the small tables, or attempting to replicate
    the 200GB table which exceeds single-GPU memory.
  napkin_math: 'Row-wise 200GB table: 200GB / 8 GPUs = 25GB/GPU. Table-wise small tables: 4 * 5GB tables
    placed on separate GPUs (e.g., 5GB on GPU 0-3). Max embedding memory per GPU = 25GB + 5GB = 30GB,
    leaving 50GB for activations and dense layers. Row-wise sharding all 5 tables would require 5x the
    all-to-all payload per step.'
