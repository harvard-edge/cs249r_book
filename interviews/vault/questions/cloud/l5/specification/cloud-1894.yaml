id: cloud-1894
title: Evaluating SR-IOV vs Virtio for RoCEv2
topic: collective-communication
status: published
provenance: imported
scenario: You are architecting a multi-tenant Kubernetes cluster for distributed LLM training using 8x
  H100 nodes. Each node has 4x 400Gbps NVIDIA ConnectX-7 NICs dedicated to the compute fabric (RoCEv2).
  The platform team proposes using standard virtio-net for container networking to simplify IPAM, enforce
  security policies, and enable seamless pod migration. Evaluate the performance implications of virtio-net
  versus SR-IOV for the RoCEv2 fabric, and justify the architectural choice for the ML training workloads.
details:
  realistic_solution: Reject virtio-net for the RoCEv2 backend fabric. You must evaluate and select SR-IOV
    to expose Virtual Functions (VFs) directly to the ML containers, bypassing the hypervisor and host
    kernel. This guarantees true zero-copy RDMA capability. While SR-IOV sacrifices easy live migration
    and complicates network policy enforcement, it drops latency from ~50us to ~2us and avoids crippling
    host CPU bottlenecks, which is strictly necessary to saturate 400Gbps links during collective operations.
  common_mistake: Candidates often focus solely on the slight bandwidth overhead of virtio, completely
    missing that virtio-net prevents hardware RDMA (RoCEv2) from functioning natively, forcing traffic
    through the host CPU's TCP/IP stack.
  napkin_math: 'TCP/IP overhead at 1.6Tbps (4x 400Gbps): ~1 host CPU core is needed per 10-20Gbps of TCP
    throughput. 1600Gbps / 20Gbps = ~80 host CPU cores saturated just for network processing! SR-IOV +
    RDMA bypasses the CPU entirely (0 cores used for data plane) while reducing per-hop latency from 50us
    (virtio/TCP) to 2us (SR-IOV/RDMA).'
