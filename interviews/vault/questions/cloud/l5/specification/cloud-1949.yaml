schema_version: 1
id: cloud-1949
title: Evaluating Static Batching Limits Under Variable Load
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'You are designing an inference pipeline on an NVIDIA A100 GPU. The model takes 20ms to process
  a static batch of 64 requests. The upstream client produces requests at a highly variable rate: 4,000
  req/sec during peak business hours, and 100 req/sec during off-peak hours. The strict system SLA dictates
  a maximum end-to-end latency of 150ms. Evaluate the viability of using a purely static batching architecture
  for this system, and justify your decision with quantitative analysis.'
details:
  realistic_solution: Pure static batching is architecturally unviable for this workload. To meet the
    off-peak 150ms SLA, the maximum wait time is 130ms, forcing a maximum static batch size of 13. However,
    drastically reducing the batch size from 64 to 13 lowers the arithmetic intensity and overall GPU
    utilization, meaning the system will physically be unable to achieve the 4,000 req/sec throughput
    required during peak hours. A dynamic batching approach (e.g., Triton's Dynamic Batcher) with a strict
    latency timeout is mandatory.
  common_mistake: Candidates often only analyze peak load or calculate average latency, failing to realize
    that static batching under variable load forces an impossible mathematical trade-off between satisfying
    strict latency SLAs at low load and achieving the required throughput at peak load.
  napkin_math: 'Peak load: 4000 req/s = 4 req/ms. Time to fill BS=64 is 64/4 = 16ms. Total Latency = 16
    + 20 = 36ms (Meets 150ms SLA).

    Off-peak: 100 req/s = 0.1 req/ms. Time to fill BS=64 is 64/0.1 = 640ms. Total Latency = 640 + 20 =
    660ms (Violates 150ms SLA).

    To meet SLA off-peak: Max allowed wait time = 150ms - 20ms = 130ms. Max viable static BS = 130ms *
    0.1 req/ms = 13 requests.

    Max peak throughput at BS=13 (assuming an optimistic 10ms compute time) = 1300 req/s (Fails to handle
    4000 req/s peak load).'
