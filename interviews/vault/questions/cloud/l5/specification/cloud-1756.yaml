title: Progressive Deployment Architecture Trade-offs
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are architecting a real-time object detection system spanning smart cameras (1 MB SRAM,
  50mW budget), mobile edge gateways (8GB RAM, 4 TOPs NPU), and a cloud backend (NVIDIA A100s). The baseline
  cloud-only approach yields 800ms end-to-end latency, violating the 100ms SLA for critical events. The
  edge-only approach fits a heavily quantized INT8 model, but recall drops by 20%. Evaluate the trade-offs
  of a progressive deployment pipeline using cascading confidence thresholds. Justify the hardware-aware
  model sizing and routing decisions for each tier to meet the 100ms SLA.
details:
  realistic_solution: 'Deploy a hierarchical cascade: an INT8 micro-model (~500KB) on the camera for fast
    motion triggering (<10ms), an INT8 mid-tier model (~50MB) on the gateway for standard detection (40ms),
    and only route ambiguous frames (confidence < 0.8) to the A100 cloud backend. This reduces expensive
    cloud requests while preserving high recall.'
  common_mistake: Treating edge tiers as independent systems rather than cascaded filters, leading to
    redundant processing or abandoning the cloud entirely and failing to meet accuracy targets.
  napkin_math: 'Expected Latency = (P_camera * L_camera) + (P_gate * L_gate) + (P_cloud * L_cloud). If
    the camera safely filters 60% of frames at 10ms, the gateway filters 35% at 50ms (10+40), and the
    cloud handles 5% at 850ms (50+800): E[L] = (0.6 * 10) + (0.35 * 50) + (0.05 * 850) = 6 + 17.5 + 42.5
    = 66ms. The 66ms expected latency easily satisfies the 100ms SLA while utilizing the cloud''s superior
    accuracy only when necessary.'
