schema_version: 1
id: cloud-r2-43037
title: DP Composition Across Multiple Model Releases
topic: differential-privacy
status: published
provenance: imported
scenario: Your ML team releases a new model version monthly, each trained with DP-SGD at epsilon = 3.0
  on the same private dataset. After 12 monthly releases, what is the total privacy loss? Compare basic
  composition, advanced composition, and Renyi DP accounting. At what point must you refresh the dataset
  or stop releasing models?
details:
  realistic_solution: 'Three composition theorems give different bounds: (1) Basic composition: ε_total
    = k × ε = 12 × 3 = 36. Very loose. (2) Advanced composition: ε_total = ε√(2k × ln(1/δ)) + k × ε(e^ε
    - 1). For k=12, ε=3, δ=1e-5: ε_total ≈ 3 × √(24 × 11.5) + 12 × 3 × (e³-1) ≈ 49.8 + 717 ≈ too loose
    (worse than basic for large ε). Advanced composition works better for small ε. (3) Renyi DP (RDP):
    track privacy loss as Renyi divergence, convert to (ε,δ)-DP at the end. For Gaussian mechanism with
    σ calibrated for ε=3: RDP gives ε_total ≈ 10.4 after 12 compositions — much tighter. Practical: with
    RDP accounting, budget of ε_total ≤ 15 allows 18-20 monthly releases before exhaustion. After that:
    either collect fresh data, or use a private synthetic dataset that doesn''t consume additional budget
    (post-processing immunity).'
  common_mistake: 'Assuming each release is independent and the total epsilon stays at 3.0. Each release
    on the same data compounds privacy loss. Basic composition: total ε = 12 × 3.0 = 36.0 — essentially
    no meaningful privacy guarantee.'
  napkin_math: 'Basic: 12 × 3 = 36 (loose). RDP (subsampling q=0.01, σ=1.0): per-step RDP(α=10) ≈ 0.005.
    Over T=100K steps × 12 releases: RDP(α=10) = 6.0. Convert: ε = 6.0 - ln(δ)/(α-1) = 6.0 + 11.5/9 =
    7.28 at δ=1e-5. Budget of ε=15: 15/7.28 × 12 ≈ 24.7 releases possible. Monthly cadence: ~2 years before
    budget exhaustion. Re-collection cost at that point: depends on domain.'
