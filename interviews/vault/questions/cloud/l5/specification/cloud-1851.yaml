id: cloud-1851
title: Evaluating RPC Frameworks for High-Throughput Embeddings
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing the serving layer for a high-throughput embeddings API running on AWS g5.2xlarge
  instances (A10G GPU). The API receives batches of 256 text sequences and returns a 1536-dimensional
  FP32 float array per sequence. Currently, the API uses a standard JSON over HTTP REST interface. At
  peak load, GPU utilization is capped at 45%. Profiling shows the Node.js API gateway is bottlenecked
  on CPU, spending significant time allocating and serializing the massive JSON response arrays. Evaluate
  the trade-offs of migrating to gRPC with Protocol Buffers (using a `bytes` field for the array) versus
  keeping JSON but adding response caching, and justify the architectural decision to maximize GPU saturation.
details:
  realistic_solution: Migrate to gRPC/Protobuf and serialize the 1536-dim FP32 arrays as raw byte arrays
    (`bytes` field) rather than repeated float fields. This bypasses per-element float-to-string conversion,
    reducing serialization latency from ~15ms to <1ms and unblocking the GPU.
  common_mistake: Candidates often focus solely on the network bandwidth savings of binary formats, missing
    that the primary bottleneck here is the CPU computational cost and memory allocation overhead of JSON
    stringification for large arrays of floating-point numbers.
  napkin_math: 'Raw batch size: 256 seqs * 1536 dims * 4 bytes = 1.57 MB. JSON size: ~12 chars/float (e.g.
    ''-0.1234567,'') * 393K floats ≈ 4.7 MB. Node.js stringifying 393K floats takes ~15ms. If GPU inference
    takes 12ms, CPU serialization (15ms) is the bottleneck, capping GPU utilization at 12 / (12 + 15)
    ≈ 44%.'
