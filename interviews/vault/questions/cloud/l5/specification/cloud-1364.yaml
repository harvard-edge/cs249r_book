title: Evaluating Hardware Trojan Mitigations
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are evaluating supply chain security for a custom 3nm AI training accelerator fabbed at
  an untrusted overseas foundry. The threat model includes dormant Hardware Trojans designed to leak weights
  via power side-channels when triggered by specific activation patterns. You must evaluate three mitigations
  for a 50,000-GPU fleet: 1) Logic locking (2% area/power overhead), 2) Split manufacturing (15% interconnect
  latency penalty, $5M NRE), or 3) Boot-time side-channel fingerprinting. Evaluate the TCO, performance,
  and security trade-offs for large-scale synchronous LLM training.'
details:
  realistic_solution: Logic locking is the optimal trade-off for cloud accelerators. It prevents unauthorized
    modification and limits Trojan insertion at the untrusted foundry with minimal impact on critical
    path latency (2% area/power overhead, ~$200 per chip). Split manufacturing's 15% latency penalty across
    a 50,000-GPU cluster adds 15 days to a 100-day training run, costing $36M extra — making logic locking
    36x more cost-effective while preserving compute scaling efficiency.
  common_mistake: Relying on post-silicon boot-time fingerprinting, which cannot reliably detect Trojans
    with complex, rare activation triggers, or selecting split manufacturing without quantifying the massive
    performance and cost penalties at datacenter scale.
  napkin_math: A 15% latency penalty from split manufacturing on a 50,000 GPU cluster ($2/hr/GPU) adds
    15 days to a 100-day training run, costing $36M extra per run. Over 10 runs, this wastes $360M. Logic
    locking's 2% area/power overhead on a $10,000 chip costs only $200 extra per chip, or $10M total for
    the fleet, making it 36x more cost-effective while preserving scaling efficiency.
