schema_version: 1
id: cloud-cell-13255
title: Specify KV Cache Memory Requirements for Long-Context LLM Serving
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You must specify the KV cache memory requirements for serving Llama 3 70B (80 layers, 8 KV
  heads, 128 head dimension) at FP16 precision on H100 GPUs with 80GB VRAM each. Target: support 128K
  token context length with 32 concurrent requests. Specify: (1) KV cache size per request, (2) total
  KV cache for 32 requests, (3) remaining VRAM for model weights, and (4) minimum GPU count.'
details:
  realistic_solution: '(1) KV per request: 2 (K+V) × 80 layers × 8 KV heads × 128 dim × 128K tokens ×
    2B (FP16) = 2×80×8×128×131072×2 = 42,949,672,960B ≈ 42.9 GB per request. (2) 32 requests: 32 × 42.9
    GB = 1,372.8 GB. (3) Model weights: 70B × 2B (FP16) = 140 GB. (4) Total VRAM: 1,372.8 + 140 = 1,512.8
    GB. H100 80GB each: 1,512.8 / 80 = 18.9 → 19 GPUs minimum. Practical: round to 20 GPUs (4 nodes ×
    5, or 2 8-GPU nodes + 4 extra = use 3 8-GPU nodes = 24 GPUs for overhead). Note: this is why 128K
    context serving is prohibitively expensive without KV quantization.'
  common_mistake: Computing KV cache assuming full-precision weights and forgetting that Llama 3 70B uses
    grouped-query attention with 8 KV heads (not 64 full heads), significantly reducing KV cache size.
  napkin_math: 'KV/request: 2×80×8×128×128K×2B = 2×80×8×128×131072×2 = 42.9GB. 32 requests: 1,372 GB.
    Model: 140GB. Total: 1,512 GB / 80 GB/H100 = 18.9 → 19 H100s. At $2.50/h × 19 = $47.50/h for 32 concurrent
    users = $1.48/user/h for 128K context.'
