id: cloud-cell-12032
title: 'MLOps Lifecycle: Specify a Model Evaluation Gate for Production Promotion on H100'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Specify quantitative promotion criteria for automatically promoting a new 13B LLM checkpoint
  to production on H100 infrastructure. The system serves 10M requests/day. Define thresholds for: benchmark
  score regressions, latency SLA compliance, memory footprint, output quality (ROUGE, win rate), and shadow
  traffic error rate. Make each threshold a concrete number with a statistical justification.'
details:
  realistic_solution: 'Benchmark regression: no more than 0.5% relative drop on any of 5 suites (statistical
    power: 5000 eval examples per suite gives σ ≈ 0.7% → 0.5% threshold is within 1σ, low false positive
    rate). Latency: P99 TTFT < 200ms, TPOT < 30ms measured over 10K shadow requests. Memory: model must
    fit in 80GB HBM with batch 32 (14GB model + 32×4096×4096×2×40layers KV ≈ 68GB < 80GB). Win rate: >
    45% on GPT-4 judge eval (200 head-to-head comparisons, binomial test α=0.05). Error rate: < 0.01%
    over 100K shadow requests.'
  common_mistake: Setting thresholds arbitrarily (e.g., 'must be within 2%') without statistical grounding;
    failing to account for evaluation set size needed for significance.
  napkin_math: 'KV cache at batch 32, 4096 ctx, 40 layers, hidden 5120: 32×4096×2×5120×2×40 = 107GB. Too
    large for single H100. Reduce to batch 16: 32×4096×2×5120×2×40/2 = 53.7GB. Model 14GB + KV 53.7GB
    = 67.7GB < 80GB. ✓ Statistical power: 5000 examples, metric std ~7% → SEM = 7%/√5000 = 0.1%. 0.5%
    threshold = 5σ — very strict. Loosen to 1.5% (15σ too strict). Realistic: 2% threshold at 5000 examples.'
