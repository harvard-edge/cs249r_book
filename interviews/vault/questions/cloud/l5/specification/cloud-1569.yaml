id: cloud-1569
title: Evaluating Unified Network Fabrics for Mice and Elephant Flows
topic: collective-communication
status: published
provenance: imported
scenario: Your team is migrating a legacy web service cluster (handling 5 million requests/sec, average
  payload 5KB) into a shared multi-tenant 400Gbps Clos datacenter fabric that also hosts a 1,024-GPU distributed
  LLM training cluster. The current network uses static 5-tuple ECMP routing. The ML team complains that
  training iteration times vary by up to 40% depending on the web service load. Evaluate the architectural
  trade-offs between implementing flow-level Dynamic Load Balancing (DLB) versus transitioning to a cell-based,
  packet-spraying architecture to mitigate the impact of web service 'mice flows' on the synchronous training
  'elephant flows'.
details:
  realistic_solution: Adopt a cell-based packet-spraying architecture (like Nvidia Spectrum-X or Broadcom
    Tomahawk 5). By breaking both mice and elephant flows into fixed-size cells (e.g., 256 bytes) and
    spraying them evenly across all available uplinks, the network achieves >90% link utilization and
    bypasses hash collisions, at the cost of requiring robust reordering buffers at the destination ToR.
  common_mistake: Candidates often suggest prioritizing ML traffic via QoS/DSCP tags, failing to realize
    that QoS does not prevent the fundamental issue of hash polarization in static ECMP, where aggregate
    mice flows colliding on the same physical link will still reduce the bandwidth available to the elephant
    flow.
  napkin_math: Under ECMP with 4 uplinks (100Gbps each), if a 100Gbps elephant flow and 50Gbps of aggregated
    mice flows happen to hash to Link 1, the link is oversubscribed (150Gbps > 100Gbps), causing packet
    loss. With cell spraying, that same 150Gbps load is perfectly distributed at 37.5Gbps per link across
    all 4 links, operating safely below capacity.
