id: cloud-1925
title: Mitigating Spectre in Multi-Tenant NLP Gateways
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are architecting a multi-tenant ML serving platform where the NLP tokenization and request
  batching layer runs on shared 128-core AMD EPYC CPUs. The security team mandates enabling strict Indirect
  Branch Predictor Barriers (IBPB) and disabling Simultaneous Multithreading (SMT) across the fleet to
  mitigate a new speculative execution side-channel vulnerability that could leak cross-tenant prompt
  data. The cluster currently processes 50,000 requests per second with a strict 20ms P99 latency SLA.
  Evaluate the performance and cost trade-offs of enforcing these CPU mitigations versus alternative isolation
  strategies.
details:
  realistic_solution: Quantify the throughput loss from disabling SMT and the context-switch penalty of
    IBPB. Justify pivoting to physical or strong hardware VM isolation (e.g., dedicated single-tenant
    nodes or AMD SEV-SNP) to eliminate cross-tenant risk, allowing SMT to be safely re-enabled to preserve
    throughput and cost-efficiency.
  common_mistake: Assuming software-level CPU mitigations have negligible impact, failing to account for
    the 25-40% throughput drop in heavily parallel text preprocessing when SMT is disabled, which leads
    to immediate SLA violations.
  napkin_math: 'Base capacity: 100 nodes * 256 vCPUs (SMT on) = 50k req/s. Disabling SMT drops peak parallel
    throughput by ~30%, yielding only 35k req/s. Restoring 50k req/s requires scaling to ~143 nodes (+43%
    compute cost). Additionally, IBPB adds ~1-2µs per context switch; at 10k switches/sec, that''s 1-2%
    direct overhead per core. Dedicated single-tenant nodes avoid the 43% hardware scale-out cost by eliminating
    the shared-process threat model entirely.'
