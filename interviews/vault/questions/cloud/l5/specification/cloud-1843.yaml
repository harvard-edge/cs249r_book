title: Evaluating Streaming Formats for VLM Training
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are training a vision-language model on a node with 8x H100 GPUs. Your dataset consists
  of 100 million image-text pairs (average 50KB per pair, totaling 5TB), currently stored as Parquet files
  on local NVMe SSDs capable of 12 GB/s sequential read bandwidth. However, your training loop is starving
  for data, only achieving 3 GB/s aggregate read bandwidth across all DataLoader workers. Profiling reveals
  high CPU utilization spent decoding Parquet footers, dictionaries, and column chunks. Evaluate the architectural
  trade-offs of migrating the entire 5TB dataset to a bespoke sequential streaming format like WebDataset
  (TAR archives) versus tuning the existing Parquet setup.
details:
  realistic_solution: Migrate to a row-based, metadata-free sequential format like WebDataset (TAR). This
    allows the data loader to execute zero-overhead, purely sequential I/O, bypassing CPU-heavy metadata
    decoding and fully saturating the 12 GB/s NVMe bandwidth.
  common_mistake: Suggesting throwing more CPU cores at the data loaders or upgrading the storage hardware,
    without realizing that Parquet's columnar layout and internal metadata inherently disrupt contiguous
    sequential reads required for row-based multimodal training.
  napkin_math: 'Parquet read overhead for a 50KB sample involves seeking and decoding multiple column
    chunks. With purely sequential TAR reads: 5TB / 12 GB/s NVMe bandwidth = ~416 seconds to read the
    dataset. Current Parquet bottleneck: 5TB / 3 GB/s = ~1666 seconds. A sequential format reclaims the
    lost 9 GB/s by eliminating seek and decode taxes.'
