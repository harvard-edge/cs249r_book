id: cloud-cell-11097
title: 'Feature Store: Specification — Define Feature Freshness SLA for Real-Time Fraud Detection'
topic: feature-store-management
status: published
provenance: imported
scenario: 'Write the feature freshness specification for a fraud detection system on H100s serving 50K
  transactions/second. Different features have different freshness requirements: real-time (last 5 min),
  near-real-time (last 1 hour), and batch (last 24 hours). Define quantitative SLAs for each tier, pipeline
  latency budgets, and monitoring requirements.'
details:
  realistic_solution: Freshness SLA = max allowed age of feature value at serving time. This includes
    computation lag + storage propagation + cache TTL. Each tier has different requirements and costs.
  common_mistake: Setting the same freshness SLA for all features regardless of how quickly they change;
    not accounting for pipeline latency adding to staleness.
  napkin_math: 'Tier 1 (real-time, last 5 min): features like ''transactions_last_5_min'', ''amount_last_5_min''.
    Max staleness: 30 seconds. Implementation: stream processing (Flink/Kafka) → Redis with 30s TTL. Computation
    latency: < 10 seconds. Features: 20 features. Tier 2 (near-real-time, 1 hour): ''ip_velocity_1h'',
    ''merchant_fraud_rate_1h''. Max staleness: 5 minutes. Implementation: micro-batch (5-minute Spark)
    → Redis. Features: 50 features. Tier 3 (batch, 24h): ''user_30day_avg_spend'', ''device_risk_score''.
    Max staleness: 2 hours. Implementation: nightly Spark → Redis (refreshed in 2h after midnight run).
    Features: 130 features. Monitoring SLAs: alert if Tier 1 staleness > 60s (2× SLA), Tier 2 > 10min,
    Tier 3 > 4h. Check: compute feature_max_age = max(now - feature_computed_at) across 1K sampled requests
    per minute. Total features: 200. Cost: Flink for Tier 1 (real-time) adds $50K/month infra cost vs
    all-batch = budget for high-impact features only.'
