id: cloud-1775
title: CPU Reactive Burst Scaling vs GPU Pre-provisioning
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You manage an NLP feature extraction service using a BERT-base model. Steady-state traffic is
  200 QPS, currently handled by 4 NVIDIA T4 GPUs. A product launch creates a sudden traffic spike to 5,000
  QPS in under 10 seconds. Your GPU auto-scaling group takes 4 minutes to spin up new nodes, pull the
  container, and load the model. To prevent timeouts, you can route the overflow to fast-booting CPU instances
  (e.g., AWS c6i.4xlarge) that are ready in 15 seconds, but they have a 5x higher cost-per-inference compared
  to the T4 GPUs. Evaluate the financial and architectural trade-offs of using this reactive CPU scaling
  strategy compared to maintaining sufficient pre-provisioned GPU headroom.
details:
  realistic_solution: Deploy a hybrid architecture where fast-starting CPU instances act as a temporary
    shock absorber. While the CPU cost-per-inference is 5x higher, this premium is only paid during the
    4-minute GPU provisioning window. Once the auto-scaled GPUs come online, traffic is shifted back.
    This avoids both dropped requests and the massive cost of keeping a 25x over-provisioned GPU cluster
    running 24/7.
  common_mistake: Candidates often assume GPU auto-scaling is fast enough for sudden bursts, or they reject
    the CPU option by looking only at the 5x worse cost-per-inference, failing to factor in the massive
    savings from eliminating 24/7 idle GPU headroom.
  napkin_math: 'Base T4 capacity: 200 QPS / 4 GPUs = 50 QPS/GPU. To handle 5,000 QPS needs 100 T4 GPUs.
    Pre-provisioning 100 T4s at $0.50/hr = $36,000/mo. CPU burst: 5000 QPS needs ~500 CPUs at $0.68/hr.
    Cost per 4-min spike = 500 * $0.68 * (4/60) = $22.66. For 100 spikes/mo ($2,266), reactive CPU scaling
    saves ~$33k/mo.'
