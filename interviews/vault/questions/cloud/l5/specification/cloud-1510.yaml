id: cloud-1510
title: Evaluating Cluster Concurrency Limits
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team is deploying an LLM inference service on a cluster of H100 GPUs. The business SLA
  requires sustaining a throughput of 500 requests per second (RPS) with an average end-to-end latency
  of 2.5 seconds per request. An engineer proposes configuring the inference engines such that the global
  maximum concurrent requests limit across the entire cluster is strictly capped at 200 to aggressively
  prevent KV-cache Out-Of-Memory (OOM) errors. Evaluate whether this configuration will meet the business
  SLA, and justify your architectural recommendation.
details:
  realistic_solution: The configuration will fail. According to Little's Law (Concurrency = Throughput
    × Latency), sustaining 500 RPS at 2.5s latency strictly requires 1,250 concurrent requests in flight.
    Capping concurrency at 200 means the system can either handle 500 RPS at 0.4s latency (impossible
    given the 2.5s expectation) or only 80 RPS at 2.5s latency. The team must provision enough hardware
    and KV cache memory to support a global concurrency of at least 1,250.
  common_mistake: Analyzing throughput and latency as independent constraints rather than linking them
    via Little's Law, failing to realize that the concurrency cap mathematically precludes hitting both
    SLAs simultaneously.
  napkin_math: L = λW => Required Concurrency = 500 req/sec * 2.5 sec/req = 1250. A cap of 200 supports
    a max throughput of λ = L / W = 200 / 2.5 = 80 req/sec, which is far below the 500 RPS SLA.
