id: cloud-2494
title: Extreme Power-Budgeted Federated Edge
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing an FL system for wildlife tracking collars (1000mAh battery, 3.7V, 2-year
  lifespan). The cloud orchestrates FL to adapt behavior classification models. Satellite radio transmission
  costs 2W and takes 30s to send weights. Local Cortex-M4 compute costs 10mW. You have a strict 36 Joules/day
  energy budget.
details:
  realistic_solution: Implement Gradient-based Early Stopping and Sparse Communication. The collar computes
    gradients locally using the 10mW processor. It calculates the gradient norm. If the norm is below
    a cloud-defined threshold (meaning the model already predicts the data well), the device skips the
    2W satellite transmission. The cloud only aggregates updates from devices experiencing high novelty/loss.
  common_mistake: Running FL rounds on a strict daily calendar schedule, which blindly incurs massive
    radio energy costs even if the local model hasn't learned anything new.
  napkin_math: Daily budget = 36 Joules. Transmission = 2W * 30s = 60 Joules! Local compute = 10mW * 60s
    = 0.6 Joules. A daily transmission (60.6J) exceeds the 36J budget. By evaluating gradients locally
    daily (0.6J) and only transmitting when novelty is high (e.g., once every 14 days), the average daily
    cost = 0.6J + (60J / 14) = 4.88 Joules. 4.88J is well within the 36J budget.
