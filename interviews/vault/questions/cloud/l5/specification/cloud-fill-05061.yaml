schema_version: 1
id: cloud-fill-05061
title: Prefill-Decode Disaggregation Architecture Specification for H100 Fleet
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Design a prefill-decode disaggregation system for serving Llama-3-70B at 1000 req/s with P50
  TTFT < 200ms and P50 TPOT < 50ms/token on an H100 fleet. Specify the number of prefill GPUs vs decode
  GPUs, KV cache transfer mechanism, and load balancing strategy.
details:
  realistic_solution: 'Prefill GPU requirement: avg prompt 512 tokens, 70B model, 50ms prefill per request
    at 1 GPU. Need 1000 req/s × 0.05s = 50 concurrent prefills → 50 H100s for prefill. Decode GPU requirement:
    avg 256 output tokens per response, 30 tok/s per GPU at batch=16. Throughput: 16 × 30 = 480 tok/s
    per GPU. Need 1000 × 256 / 480 = 533 decode GPU-seconds → ~18 decode GPUs at any instant but with
    queuing, need 30-40 GPUs. Ratio: ~50 prefill : 35 decode = 1.4:1. KV transfer: after prefill, transfer
    KV cache (2×32×32×64×512×2B = 536MB) from prefill GPU to decode GPU via RDMA over InfiniBand at 100
    GB/s: 5.4ms. Load balancer: route new requests to least-loaded prefill GPU; after prefill, schedule
    decode on GPU with most spare capacity.'
  common_mistake: Using the same GPU ratio as the compute ratio without accounting for the different memory
    bandwidth requirements of decode vs the compute requirements of prefill.
  napkin_math: 'Prefill GPUs: 1000 req/s × 50ms = 50 GPUs. Decode: 1000 req/s × 256 tokens avg = 256K
    tok/s needed. At 480 tok/s/GPU: 533 GPU equivalents but steady-state = 256K/480 = 534/16 batched =
    33 GPUs. Fleet: 50 prefill + 35 decode = 85 H100s. KV transfer: 536MB @ 100 GB/s = 5.4ms.'
