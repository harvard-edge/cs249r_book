title: Resolving Conflicting Fairness Metrics in Credit Scoring APIs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are the tech lead for a cloud-based credit scoring API handling 500 QPS. The product team
  mandates that the new risk model (AUC 0.85) must simultaneously satisfy Demographic Parity (DP), Equalized
  Odds (EO), and Calibration across two demographic segments. Historical data shows differing base default
  rates: 18% for Group A and 6% for Group B. How do you evaluate these constraints and architect a viable
  deployment strategy?'
details:
  realistic_solution: Invoke the Fairness Impossibility Theorem (Chouldechova, 2017) to show that Equalized
    Odds and Calibration are mutually exclusive when base rates differ on an imperfect predictor. With
    base rates p_A=0.18 and p_B=0.06 and AUC=0.85, satisfying both simultaneously is mathematically impossible.
    Propose prioritizing Calibration (essential for expected-value pricing in credit) and implementing
    relaxed Equalized Odds with a tolerance band, rather than wasting engineering cycles on an impossible
    simultaneous solution.
  common_mistake: Committing to multiple engineering iterations (e.g., adversarial debiasing, group-specific
    threshold tuning) trying to satisfy all three fairness metrics simultaneously, failing to recognize
    the mathematical impossibility theorem that proves this cannot be achieved.
  napkin_math: 'Assume Equalized Odds holds: TPR_A = TPR_B and FPR_A = FPR_B. By Bayes'' theorem, Precision
    (PPV) = (TPR * p) / (TPR * p + FPR * (1-p)). For Calibration to hold, PPV_A must equal PPV_B. Since
    base rate p_A (0.18) != p_B (0.06), PPV_A = PPV_B requires either perfect prediction (FPR=0, TPR=1)
    or equal base rates. With AUC=0.85 (imperfect predictor), satisfying both is mathematically impossible.'
