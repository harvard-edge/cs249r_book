schema_version: 1
id: cloud-sus-63013
title: Model Card Infrastructure for 50-Model Production Fleet
topic: responsible-ai
status: published
provenance: imported
scenario: 'Your ML platform team manages 50 production models. A new EU AI Act compliance requirement
  mandates that each model have an up-to-date model card covering: intended use, performance by subgroup,
  known limitations, and training data lineage. Model cards are currently hand-authored in Markdown and
  drift from actual model behavior within weeks of a retrain. Design a system to auto-generate and maintain
  living model cards.'
details:
  realistic_solution: 'Two-tier architecture: (1) Auto-generated sections (updated on every retrain):
    performance by subgroup (pulled from eval pipeline), training data statistics (from data lineage DAG),
    model architecture and hyperparameters (from MLflow/W&B), FLOP count and carbon estimate (computed
    post-training). (2) Human-reviewed sections (required sign-off before production deployment): intended
    use, out-of-scope uses, known limitations, ethical considerations. Implementation: embed model card
    generation in the CI/CD pipeline — training job emits a card_stub.yaml with auto-populated fields.
    A PR is auto-opened to the model owner requiring human completion of the reserved fields before the
    model can be promoted to production. Card stored in a git-tracked registry with version history tied
    to model versions in the artifact store.'
  common_mistake: Trying to auto-generate the 'intended use' and 'known limitations' sections — these
    require human judgment and cannot be reliably automated. Over-automating model card generation creates
    a false sense of compliance while producing inaccurate documentation.
  napkin_math: '50 models × average 4 retrains/year = 200 card updates/year. Auto-generation time: eval
    metrics from eval pipeline (already runs), lineage query to metadata store: ~5s per model. Total auto-gen
    overhead: 200 × 5s = 1,000s/year = 17 minutes/year. Human review time: 30 min per retrain × 200 =
    100 person-hours/year. Compliance benefit: EU AI Act fines up to €30M or 6% revenue for non-compliance
    — 100 person-hours/year is negligible insurance cost.'
