title: HBM3 vs HBM2e for LLM Serving Infrastructure
topic: vram-budgeting
status: published
provenance: imported
scenario: 'You are architecting the serving tier for a 70B parameter LLM (FP16). You must evaluate two
  cluster node configurations with identical total memory capacity: Node A with 8x A100 (40GB HBM2e, 1.55
  TB/s per GPU) and Node B with 4x H100 (80GB HBM3, 3.35 TB/s per GPU). Both provide 320GB total HBM.
  Evaluate the trade-offs between these configurations regarding Time-To-First-Token (TTFT) and decode
  throughput, and justify which architecture is optimal for a low-latency API.'
details:
  realistic_solution: Node A (8x A100) provides higher aggregate memory bandwidth (16.0 TB/s vs 13.4 TB/s),
    yielding faster per-token generation (8.75ms vs 10.4ms). However, Node B (4x H100) has lower synchronization
    overhead due to 4-way tensor parallelism versus 8-way, and each H100's larger per-GPU memory (80GB)
    eases KV-cache management. The optimal choice depends on whether per-token latency or synchronization
    overhead dominates the serving workload.
  common_mistake: Assuming both configurations perform similarly because they have the same total HBM
    capacity (320GB), failing to account for the per-GPU bandwidth advantage of H100 (3.35 TB/s vs 1.55
    TB/s) and the reduced communication overhead of 4-way vs 8-way tensor parallelism.
  napkin_math: '70B model in FP16 = 140GB. Node A aggregate BW: 8 * 2.0 TB/s = 16.0 TB/s. Node B aggregate
    BW: 4 * 3.35 TB/s = 13.4 TB/s. Decode memory read time per token: Node A = 140GB / 16.0 TB/s = 8.75ms;
    Node B = 140GB / 13.4 TB/s = 10.4ms. Node A achieves higher aggregate bandwidth despite lower per-GPU
    bandwidth, due to 2x the number of GPUs. However, Node B requires fewer All-Reduce operations per
    layer (4-way vs 8-way tensor parallelism), reducing synchronization overhead.'
