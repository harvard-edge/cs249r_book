id: cloud-1509
title: L4 vs L7 Load Balancing for gRPC Serving
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are serving a BERT-based ranking model on a cluster of 32 L4 GPUs. Each inference takes
  10ms at a maximum concurrency of 4 requests per GPU. During peak traffic of 9,600 QPS, average cluster
  utilization is 75%, yet P99 latency frequently spikes above 100ms. Clients are microservices communicating
  over long-lived gRPC connections, and your current ingress is a standard L4 (TCP) round-robin load balancer.
  Evaluate why tail latency is severely degrading despite 25% global headroom, and justify an architectural
  change to your load balancing strategy.
details:
  realistic_solution: Deploy an L7 proxy (like Envoy) or implement client-side lookaside load balancing
    (e.g., xDS) to distribute traffic on a per-request basis rather than per-connection, utilizing the
    'Least Request' routing algorithm.
  common_mistake: Recommending autoscaling to add more GPUs, which treats the symptom temporarily and
    wastes resources without addressing the fundamental connection-level load imbalance.
  napkin_math: Global Capacity = 32 GPUs * (4 req / 0.010s) = 12,800 QPS. Traffic = 9,600 QPS (75% utilization).
    L4 round-robin balances connections, not requests. If one long-lived connection multiplexes 1,000
    QPS, the assigned replica (capacity = 400 QPS) is overwhelmed by +600 req/sec. Requests queue locally;
    a queue depth of just 40 requests at 10ms/batch adds 100ms to tail latency.
