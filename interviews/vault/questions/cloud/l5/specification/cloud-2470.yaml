schema_version: 1
id: cloud-2470
title: Hybrid ASR Compute Offloading
topic: roofline-analysis
status: published
provenance: imported
scenario: A smart speaker handles 50M voice queries daily. Currently, a 2MB wake-word model runs on-device,
  and post-wake audio is streamed to a cloud ASR/NLU pipeline. Cloud processing takes 800ms and costs
  $0.005 per query ($250,000/day). Analytics show 60% of queries are basic home control ('turn on lights',
  'set timer'). The speaker has an ARM Cortex-M DSP with 16MB SRAM. Architect a solution to reduce cloud
  costs by at least 50% without increasing latency.
details:
  realistic_solution: Implement a Hybrid ASR/NLU architecture. Train a highly quantized (INT8) small-vocabulary
    intent classification model (e.g., a lightweight Conformer or Keyword Spotting extension) that fits
    in <10MB of SRAM. This edge model listens for the top 50 most common local commands immediately following
    the wake word. If the edge model confidence is >0.95, the command is executed locally (0ms network
    latency, $0 cloud cost). If confidence is low, or the utterance falls outside the small vocabulary,
    the audio buffer is seamlessly handed off to the cloud pipeline. This cuts cloud volume while massively
    improving perceived latency for common tasks.
  common_mistake: Trying to fit a full vocabulary ASR model like Whisper-tiny onto the 16MB SRAM, which
    will exceed memory limits and heavily drain power on the Cortex-M.
  napkin_math: "Total queries: 50M/day. \nBasic commands: 60% (30M queries). \nEdge model accuracy on\
    \ basic commands: 90% high-confidence. \nQueries handled locally: 30M * 0.9 = 27M queries. \nQueries\
    \ sent to cloud: 50M - 27M = 23M queries. \nNew cloud cost: 23M * $0.005 = $115,000/day. \nSavings:\
    \ $135,000/day (54% cost reduction). Latency for 27M queries drops from 800ms to <100ms."
