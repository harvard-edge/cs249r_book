id: cloud-1853
title: Evaluating 112G vs 224G SerDes Trade-offs
topic: collective-communication
status: published
provenance: imported
scenario: You are architecting the network fabric for a dense AI cluster using a 51.2T switch ASIC. You
  must evaluate whether to use 112G PAM4 SerDes or next-generation 224G PAM4 SerDes. The 224G SerDes cuts
  the lane count in half (from 512 to 256) but increases the power from 5 pJ/bit to 8 pJ/bit. More critically,
  the 224G signaling restricts the maximum passive copper twinax (DAC) cable length from 3 meters down
  to 1 meter due to severe signal integrity constraints. Your current intra-rack compute design requires
  up to 2.5 meters of reach from the Top-of-Rack (ToR) switch to the bottom nodes. Evaluate the system-level
  power and cost trade-offs of moving to 224G SerDes.
details:
  realistic_solution: For standard rack designs, sticking with 112G SerDes is the optimal system-level
    choice. While 112G requires twice as many lanes, it allows the use of 0W passive DACs for the entire
    2.5m intra-rack reach. Transitioning to 224G mandates optics or AECs (e.g., 10-15W per port) for any
    connection beyond 1m. Unless the physical architecture is completely redesigned into ultra-dense compute
    trays where all switch-to-GPU connections are strictly under 1 meter, the network power penalty of
    224G far outweighs its ASIC-level benefits.
  common_mistake: Candidates often conclude that halving the lane count makes 224G the obvious choice
    for dense AI fabrics, focusing only on ASIC pinout and PCB routing advantages, while completely ignoring
    that the reduced 1m copper reach forces the adoption of power-hungry optics or active electrical cables
    (AECs) for intra-rack connections.
  napkin_math: 'Switch capacity: 51.2 Tbps.

    112G SerDes ASIC power: 51.2e12 bps * 5e-12 J/bit = 256W. Uses 0W 3m passive DACs. Total intra-rack
    link power = 256W.

    224G SerDes ASIC power: 51.2e12 bps * 8e-12 J/bit = 410W. Requires optics for >1m reaches. If 50%
    of 256 ports need optics: 128 ports * 15W = 1,920W.

    Total 112G system power: 256W. Total 224G system power: 410W + 1920W = 2330W. 112G saves ~2kW per
    switch.'
