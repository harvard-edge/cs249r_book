schema_version: 1
id: cloud-1151
title: Evaluating Framework Execution Overhead
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are evaluating execution frameworks for a real-time anomaly detection pipeline running on
  NVIDIA A100 GPUs. The model, a deep MLP with 200 narrow layers, processes batch size 1 to meet a strict
  2ms latency SLA. Currently, the forward pass takes 4.5ms in PyTorch eager mode. Nsight Systems profiling
  reveals the GPU is only active for 0.5ms per pass, with massive gaps between kernel executions. Evaluate
  the architectural trade-offs between implementing custom monolithic CUDA kernels via C++ extensions
  versus using a JIT graph compiler (e.g., TorchDynamo) to eliminate the host-side dispatch tax, and justify
  your design decision.
details:
  realistic_solution: Identify that the CPU interpreter overhead is dominating execution. While a custom
    CUDA kernel eliminates dispatch tax entirely (reducing dispatch to 1 launch), it requires massive
    engineering effort to maintain. A JIT compiler (like torch.compile) automatically fuses operations
    into larger sub-graphs, reducing kernel launches significantly with minimal code changes, comfortably
    hitting the SLA while maintaining Pythonic flexibility.
  common_mistake: Candidates often misdiagnose the 4.5ms latency as a GPU memory bandwidth issue or suggest
    increasing the batch size (which violates the strict 1-batch 2ms SLA) instead of recognizing the CPU-bound
    dispatch tax bottleneck.
  napkin_math: 'Eager step = 4.5ms. GPU time = 0.5ms. Because GPU execution is asynchronous, the total
    time is max(CPU dispatch, GPU compute). CPU dispatch time is 4.5ms for 200 ops (avg 22.5us per op
    dispatch tax), dominating execution. Custom CUDA: 1 kernel launch = 22.5us dispatch, GPU = 0.5ms.
    Total = max(0.02, 0.5) = 0.5ms. Graph Compiler: Fuses to 10 kernels = 10 * 22.5us = 0.225ms dispatch.
    Total = max(0.225, 0.5) = 0.5ms. 0.5ms comfortably meets the 2.0ms SLA.'
