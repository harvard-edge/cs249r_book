id: cloud-1412
title: Evaluating Inductive Bias in Data-Constrained Satellite Imagery
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your cloud computer vision pipeline processes 50,000 high-resolution (1024x1024) satellite images
  per second across an A100 fleet to detect rare weather anomalies. You only have 200,000 labeled anomaly
  examples. Team A proposes a 2B parameter Vision Transformer (ViT) arguing for higher theoretical capacity.
  Team B proposes a 50M parameter Convolutional Neural Network (CNN) with strong spatial inductive biases
  (translation invariance, locality). Evaluate the trade-offs of using heavy inductive biases (CNN) versus
  minimal inductive biases (ViT) in the context of this data-constrained, high-throughput cloud environment.
details:
  realistic_solution: Select the CNN (or a hybrid architecture). The CNN's built-in translational invariance
    and locality act as strong regularizers, allowing it to learn efficiently from just 200k examples.
    While the ViT has higher absolute capacity, its lack of inductive bias means it typically requires
    10-100x more data (e.g., >14M images like JFT-300M or ImageNet-21k) to implicitly learn the spatial
    priors that the CNN gets for free.
  common_mistake: Assuming ViTs will automatically outperform CNNs simply due to their scale and capacity,
    ignoring the massive 'data hunger' caused by their lack of spatial inductive biases, which leads to
    severe overfitting on a small 200k dataset.
  napkin_math: For a 1024x1024 image with 16x16 patches, a ViT creates N = 4,096 tokens. Global self-attention
    scales at O(N^2) = 4096^2 ≈ 16.7M operations per head per layer. The ViT must learn from raw data
    that token `i` is spatially correlated with token `i+64`. A CNN uses a 3x3 kernel (9 parameters) convolved
    across the image, structurally enforcing locality O(N) and drastically shrinking the required hypothesis
    space and sample complexity.
