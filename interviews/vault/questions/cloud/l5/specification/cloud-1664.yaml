id: cloud-1664
title: Evaluating ONNX Runtime for Heterogeneous Fleet Serving
topic: model-format-conversion
status: draft
provenance: imported
scenario: You are designing a heterogeneous serving fleet for a suite of transformer models (e.g., BERT-Large,
  340M parameters) deployed across Intel Xeon CPUs, NVIDIA T4 GPUs, and AWS Inferentia instances. You
  must evaluate whether to maintain separate native deployment pipelines (PyTorch, TensorRT, Neuron SDK)
  or unify them under ONNX Runtime (ORT) using Execution Providers (EPs). Justify your design decision
  considering graph partitioning, memory copy overheads, and total deployment complexity.
details:
  realistic_solution: Unify under ORT to reduce deployment complexity, but strictly profile graph partitioning
    for each Execution Provider (e.g., TensorRT EP, OpenVINO EP). Ensure transformer blocks are entirely
    offloaded to the accelerator to prevent middle-of-graph CPU fallbacks, using custom ops or graph rewriting
    if necessary.
  common_mistake: Assuming ONNX Runtime automatically achieves peak native performance across all backends
    without realizing that unsupported operators fall back to the CPU provider, introducing severe device-to-host
    memory copy overheads.
  napkin_math: 'Pure TensorRT on T4: 2ms per transformer block = 48ms total (24 blocks). With CPU fallback
    for LayerNorm: 2ms (TRT) + 1ms (CPU compute) + 2ms (PCIe D2H/H2D transfers) = 5ms per block. Total
    latency = 5ms * 24 = 120ms (a 2.5x degradation compared to pure TRT).'
