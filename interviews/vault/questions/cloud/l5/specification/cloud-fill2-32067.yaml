title: 'Fine-Grained MoE: More Experts, Smaller Each'
topic: mixture-of-experts
status: published
provenance: imported
scenario: 'DeepSeek-V2 uses 160 fine-grained experts (top-6) instead of Mixtral''s 8 coarse experts (top-2).
  Both activate similar total FLOPS per token. Compare the two designs on: (1) expert specialization granularity,
  (2) All-to-All communication in expert parallelism, (3) load balancing difficulty, and (4) inference
  memory bandwidth requirements.'
details:
  realistic_solution: E[distinct experts] = 160 × (1 - (154/160)^(256×6)) ≈ 160 (virtually all experts
    activated at batch=256 with 6 experts each). The original calculation with batch × experts = 1536
    selections from 160 experts covers the pool nearly completely.
  common_mistake: Assuming more experts means more parameters. Fine-grained experts are proportionally
    smaller — 160 small experts can have the same total parameter count as 8 large experts.
  napkin_math: 'Expected distinct experts activated with batch=256 tokens, each routing to 6 experts,
    from pool of 160: probability expert i is NOT selected by any token = (1 - 6/160)^256 = (154/160)^256.
    E[distinct] = 160 × (1 - (154/160)^256) = 160 × (1 - 0.9625^256)... 0.9625^256: ln(0.9625) = -0.03825;
    ×256 = -9.792; e^(-9.792) ≈ 0.000056. E ≈ 160 × (1 - 0.000056) ≈ 160 × 0.999944 ≈ 159.99 ≈ 160. So
    at batch=256 with 6 experts each, essentially all 160 experts are activated.'
