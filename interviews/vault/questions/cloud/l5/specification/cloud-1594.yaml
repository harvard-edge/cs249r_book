id: cloud-1594
title: Evaluating Storage Backends for LLM Cold-Starts
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You are designing the autoscaling architecture for a 175B parameter LLM (350GB in FP16) deployed
  on an 8x H100 instance. To handle bursty traffic, new instances must be provisioned quickly. You are
  evaluating two options for loading the model weights into HBM: 1) Streaming directly from a regional
  Object Store over a 100 Gbps network interface, or 2) Pre-loading weights onto a local PCIe Gen4 NVMe
  SSD capable of 12 GB/s sequential read. Evaluate the cold-start latency tradeoffs between these two
  storage backends and justify which architecture you would choose to meet a strict 45-second weight-loading
  SLA.'
details:
  realistic_solution: Choose the Object Store streaming approach. At 100 Gbps (12.5 GB/s), loading 350GB
    takes ~28 seconds. The local NVMe at 12 GB/s takes ~29 seconds. Both comfortably meet the 45-second
    SLA, but streaming directly from the object store eliminates the massive operational overhead and
    cost of pre-baking or replicating 350GB of weights to the local disk of every ephemeral autoscaling
    node.
  common_mistake: Candidates often instinctively assume local NVMe SSDs are strictly faster than network
    storage, failing to convert Gbps to GB/s and realizing that a 100 Gbps network link (12.5 GB/s) can
    rival or exceed the sequential read throughput of a single high-end local NVMe drive.
  napkin_math: 'Object Store: 100 Gbps = 12.5 GB/s. Load time = 350 GB / 12.5 GB/s = 28.0 seconds. Local
    NVMe: 12 GB/s. Load time = 350 GB / 12 GB/s = 29.2 seconds.'
