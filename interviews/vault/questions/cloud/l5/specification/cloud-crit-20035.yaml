schema_version: 1
id: cloud-crit-20035
title: Specifying Speculation Length K vs Draft Model Size
topic: speculative-decoding
status: published
provenance: imported
scenario: 'You are writing the serving configuration spec for a 405B target model on 8x H100. Draft model:
  8B (alpha=0.78). Target decode latency: 80ms. Draft latency: 3ms/token. Derive the optimal K that maximizes
  tokens per second and specify the dynamic K adjustment policy.'
details:
  realistic_solution: 'K=5: E=(1-0.78^6)/0.22=3.54, tp=3.54/95ms=37.3≈37.0 tok/s. K=15: E=(1-0.78^16)/0.22=4.46,
    tp=4.46/125ms=35.7≈35.6 tok/s. K=5 gives higher throughput due to lower overhead despite fewer expected
    tokens.'
  common_mistake: Fixing K statically. The optimal K depends on the current acceptance rate, which varies
    by prompt, domain, and even position within a generation. Static K leaves performance on the table.
  napkin_math: 'Speculative decoding throughput at different K:

    K=5: E = (1 - 0.78^6) / (1 - 0.78) = (1 - 0.2213) / 0.22 = 0.7787 / 0.22 = 3.540 ≈ 3.54 tokens/step.
    Time = 95ms. tp = 3.54/0.095 = 37.3 tok/s ≈ 37.0 tok/s.

    K=15: E = (1 - 0.78^16) / 0.22. 0.78^16: 0.78^8 = 0.78^4 × 0.78^4. 0.78^2=0.6084; 0.78^4=0.3702; 0.78^8=0.1370;
    0.78^16=0.01878. E = (1-0.01878)/0.22 = 0.9812/0.22 = 4.46 tokens/step. Time = 125ms. tp = 4.46/0.125
    = 35.7 ≈ 35.6 tok/s.'
