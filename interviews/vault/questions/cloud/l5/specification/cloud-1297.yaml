id: cloud-1297
title: Evaluating FEC Trade-offs in 800G PAM4 Fabrics
topic: collective-communication
status: published
provenance: imported
scenario: You are architecting the network fabric for a 32,000 H100 GPU cluster used for training large
  Mixture of Experts (MoE) models. The leaf-spine topology uses 800G Ethernet based on 100G/lane PAM4
  signaling. The ML training team reports that synchronous AllReduce operations are missing tail latency
  targets. They notice that Forward Error Correction (FEC) adds fixed latency to every switch hop and
  propose disabling FEC on the short 2-meter Direct Attach Copper (DAC) cables within the racks to save
  100-150ns per hop. Evaluate the viability of this proposal.
details:
  realistic_solution: Reject the proposal. PAM4 signaling packs 4 voltage levels into the same eye diagram
    as NRZ, making it highly susceptible to noise. The pre-FEC Bit Error Rate (BER) for 100G PAM4 is typically
    around 1e-4, even on short DACs. Disabling FEC (like KP4 RS-FEC) would result in massive packet loss,
    triggering RoCEv2/TCP retransmission timeouts that add milliseconds of delay, vastly overshadowing
    the ~100ns saved by bypassing the FEC decoding block.
  common_mistake: Candidates often agree to disable FEC on short links, assuming the signal integrity
    on a 2-meter DAC is clean enough to avoid errors, falsely treating it like older 10G/25G NRZ signaling.
  napkin_math: Pre-FEC BER = 1e-4. Packet size = 4KB MTU (32,000 bits). Probability of a packet having
    at least one error = 1 - (1 - 1e-4)^32000 ≈ 96% packet drop rate without FEC. A single RoCE timeout/retransmission
    can cost >1ms (1,000,000ns), which is 10,000x worse than the deterministic 100ns FEC latency penalty.
