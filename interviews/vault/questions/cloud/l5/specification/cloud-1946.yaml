id: cloud-1946
title: Stateless vs Stateful LLM Serving Architecture
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are designing a high-availability serving layer for a Llama-3-70B chat application across
  a fleet of 8xH100 GPU nodes. Each user session averages 20 turns, reaching up to 8,000 tokens of context.
  You must evaluate whether to use a completely stateless architecture (clients send full history, any
  node handles any request, KV cache is recomputed) versus a stateful architecture (sticky routing, KV
  cache retained in GPU HBM per session). Justify your design choice by evaluating the trade-offs between
  compute overhead, memory utilization, and the recovery impact during a sudden node failure.
details:
  realistic_solution: Adopt a fundamentally stateless routing layer coupled with a prefix-caching KV backend
    (e.g., RadixAttention). This ensures requests can be routed anywhere for high availability and fault
    tolerance, while the compute penalty of full reprefills is mitigated opportunistically.
  common_mistake: Candidates often instinctively choose stateful serving to save compute, severely underestimating
    the complexity of load balancing and the devastating 'prefill storm' that occurs when a stateful node
    fails and thousands of dropped sessions simultaneously hit remaining nodes.
  napkin_math: 'Stateless penalty: Prefilling 8K tokens on 70B params is ~1.1 PFLOPs (2 * 70e9 * 8K),
    taking ~100ms on 8xH100. Stateful memory cost: 80 layers * 8 KV heads * 128 dim * 2 bytes * 8K tokens
    = ~1.3 GB per session. A stateful node storing 100 sessions risks losing 130 GB of state upon failure,
    forcing a synchronized 110 PFLOP prefill storm across the remaining fleet and causing massive tail
    latency spikes.'
