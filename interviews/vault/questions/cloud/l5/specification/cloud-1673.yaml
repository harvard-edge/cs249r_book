title: Evaluating Paged KV Cache Block Sizes
topic: kv-cache-management
status: published
provenance: imported
scenario: You are optimizing an inference engine for Llama-2-70B on 4x A100 (80GB) GPUs. The model uses
  GQA (8 KV heads, 128 head dim, 80 layers, FP16), resulting in ~327 KB of KV cache per token. Your traffic
  has highly variable sequence lengths (mean 512, max 4096). The current contiguous allocator reserves
  max length, limiting maximum batch size due to 80%+ fragmentation. You are migrating to a Paged KV Cache
  (PagedAttention) architecture and must evaluate the trade-offs between a block size of 16 tokens versus
  256 tokens. Evaluate the impact of both block sizes on memory fragmentation and memory bandwidth utilization,
  and justify your design decision.
details:
  realistic_solution: A block size of 16 tokens is optimal. It reduces internal fragmentation to negligible
    levels (max 15 wasted tokens per sequence) while ensuring each block (~5.2 MB) is large enough to
    saturate the A100 HBM memory bus per fetch, efficiently balancing density and bandwidth.
  common_mistake: Candidates often solely optimize for zero fragmentation by suggesting a block size of
    1, completely ignoring the overhead of page table lookups and the catastrophic drop in memory bandwidth
    utilization from non-contiguous, small-byte access requests.
  napkin_math: 'Contiguous (max 4096): 4096 * 327KB = 1.34GB reserved. Average usage: 512 * 327KB = 167MB
    (87.5% waste). Paged (block=16): Wasted memory per sequence is max 15 tokens * 327KB = 4.9MB (< 3%
    waste). Each block read is 16 * 327KB = 5.23MB, safely exceeding the transaction thresholds needed
    to saturate memory bandwidth.'
