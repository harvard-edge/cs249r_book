id: cloud-0982
title: Evaluating Network Upgrades vs ZeRO-3 for LLM Scaling
topic: collective-communication
status: published
provenance: imported
scenario: A team is scaling a 175B parameter LLM training job from 128 to 512 A100 GPUs (80GB, 312 TFLOPs
  FP16, 400 Gbps InfiniBand internode). At 128 GPUs (TP=8, DP=16), the Model Flop Utilization (MFU) is
  55%. Scaling to 512 GPUs (TP=8, DP=64) drops the MFU to 32% while batch size per GPU remains constant.
  The infrastructure team proposes upgrading to 800 Gbps NDR InfiniBand to fix the MFU drop, while the
  ML team suggests implementing ZeRO-3 on the existing 400 Gbps network to 'optimize distributed overhead'.
  Evaluate these two proposals based on their impact on the communication-computation ratio.
details:
  realistic_solution: Reject the ZeRO-3 proposal if memory isn't the bottleneck, as it will worsen the
    communication-computation ratio and further degrade MFU. Approve the network upgrade to 800 Gbps or
    implement gradient accumulation to increase arithmetic intensity. ZeRO-3 trades communication bandwidth
    for memory; on a 400 Gbps network, its higher communication overhead will exacerbate the existing
    bandwidth bottleneck.
  common_mistake: Candidates often assume that ZeRO-3 is a universal optimization that reduces communication
    time, failing to realize that ZeRO-3 actually increases total network communication volume by roughly
    1.5x compared to standard Data Parallelism.
  napkin_math: Standard DP All-Reduce communicates ~2 * P elements. For 175B params in FP16 (350GB), this
    is 700GB. At 400 Gbps (50 GB/s) effective per node, communication takes ~14s. ZeRO-3 requires All-Gather
    (Forward) + All-Gather (Backward) + Reduce-Scatter (Backward) = ~3 * P elements, or 1050GB total,
    taking 21s. Since compute time is constant, increasing communication time from 14s to 21s severely
    worsens the Comm/Comp ratio. Upgrading to 800Gbps halves the standard DP comm time to 7s, drastically
    improving the ratio and MFU.
