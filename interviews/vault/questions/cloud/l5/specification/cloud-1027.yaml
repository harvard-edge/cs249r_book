title: Evaluating 3D vs Factorized Convolutions for Video
topic: neural-architecture-search
status: published
provenance: imported
scenario: Your team is deploying a video action recognition model on NVIDIA T4 GPUs (16GB VRAM, 320 GB/s
  memory bandwidth) in the cloud. The input is 32 frames of 1080p video encoded in FP16. The research
  team proposes a 3D ResNet architecture utilizing standard 3x3x3 spatial-temporal convolutions. During
  initial load testing, the inference service frequently hits OOM errors and exhibits unacceptably high
  latency. Evaluate the architectural trade-offs between attempting to retain the standard 3D CNN (e.g.,
  via aggressive batch size reduction) versus replacing it with a factorized (2D spatial + 1D temporal)
  convolutional approach.
details:
  realistic_solution: Replace the standard 3x3x3 convolutions with a (2+1)D factorized architecture (a
    2D spatial convolution followed by a 1D temporal convolution). This algebraically reduces computational
    complexity and shrinks the size of intermediate feature maps that must be read/written to VRAM. This
    higher arithmetic intensity allows the model to comfortably fit within the 16GB T4 limit while enabling
    larger batch sizes to hide memory latency.
  common_mistake: Candidates often suggest generic techniques like quantization, pruning, or model parallelism
    to fit the model into VRAM, failing to evaluate how factorizing the convolution fundamentally improves
    the arithmetic intensity and drastically reduces the activation memory footprint required by 3D processing.
  napkin_math: 'Standard 3D Conv (3x3x3) computation per channel: 3 × 3 × 3 = 27 MACs. Factorized (2+1)D
    Conv computation per channel: (3 × 3 spatial) + (3 × 1 temporal) = 9 + 3 = 12 MACs. This 27/12 = 2.25x
    reduction directly translates to 2.25x fewer parameter fetches and intermediate activation writes,
    critically mitigating the T4''s 320 GB/s bandwidth bottleneck when processing the massive 32 × 1080
    × 1920 input volumes.'
