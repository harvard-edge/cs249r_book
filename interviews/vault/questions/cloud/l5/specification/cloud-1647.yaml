id: cloud-1647
title: Evaluating TP and PP Placement Across NVLink
topic: collective-communication
status: published
provenance: imported
scenario: You are architecting the parallel training strategy for a 175B parameter LLM on a cluster of
  H100 nodes. Each node has 8 GPUs connected via NVLink 4.0 (900 GB/s bidirectional), and the nodes are
  networked together using NDR InfiniBand (400 Gbps). Evaluate the trade-offs of placing Tensor Parallelism
  (TP) versus Pipeline Parallelism (PP) across nodes versus within a single node, and justify your design
  decision for rank placement to minimize communication bottlenecks.
details:
  realistic_solution: Tensor Parallelism (TP) must be constrained within a single node to exploit the
    900 GB/s NVLink bandwidth for its frequent, bandwidth-hungry all-reduce operations. Pipeline Parallelism
    (PP) should be placed across nodes via InfiniBand, as it only requires communicating point-to-point
    activations at layer boundaries.
  common_mistake: Candidates often underestimate the bandwidth disparity between NVLink and InfiniBand,
    mistakenly placing TP across nodes where the high communication volume of all-reduces will severely
    bottleneck the training loop.
  napkin_math: NVLink 4.0 bandwidth = 900 GB/s. NDR InfiniBand = 400 Gbps = 50 GB/s. The bandwidth ratio
    is 900 / 50 = 18x gap. TP requires 2x activation size communicated per layer for all-reduce, demanding
    near-TB/s bandwidth to hide latency. PP only communicates 1x activation size once per microbatch at
    the pipeline stage boundary, easily fitting within the 50 GB/s InfiniBand envelope.
