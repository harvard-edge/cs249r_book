id: cloud-fill-00364
title: Optimizing Real-time LLM Inference on NVIDIA H100s with Adaptive Batching
topic: batching-strategies
status: published
provenance: imported
scenario: You are tasked with designing an inference serving system for a large language model (LLM) that
  processes real-time user queries. The system is deployed on NVIDIA H100 GPUs, each featuring 80 GB HBM3,
  989 TFLOPS FP16 dense compute, and 3.35 TB/s memory bandwidth, drawing 700W. Your primary objective
  is to minimize end-to-end inference latency while maintaining a target P99 throughput of 1000 queries
  per second per H100. The arrival rate of queries is highly variable. Describe how you would design the
  batching strategy, considering static, dynamic, and continuous batching, to meet these conflicting latency
  and throughput requirements. Justify your choice of batching strategy and outline the scheduling policies.
details:
  realistic_solution: A realistic solution would involve a dynamic or, more ideally, a continuous batching
    strategy coupled with a robust request scheduler. Continuous batching (e.g., using technologies like
    vLLM) allows requests of varying lengths to be processed simultaneously within the same batch on the
    H100 without waiting for a full batch, maximizing the GPU's 989 TFLOPS FP16 compute and 3.35 TB/s
    memory bandwidth by minimizing idle time and memory fragmentation. The scheduler would prioritize
    latency-sensitive requests, potentially using techniques like speculative decoding or attention key-value
    cache sharing across requests. An adaptive mechanism could dynamically adjust the batching aggressiveness
    based on real-time load, query queue lengths, and observed H100 utilization, favoring smaller batches
    during low load for minimal latency and larger, yet dynamically constructed, batches during peak load
    for higher throughput, always respecting the 80 GB HBM3 limit to avoid costly memory offloads.
  common_mistake: A common mistake is to default to static batching with a fixed large batch size to maximize
    GPU utilization and throughput. While this might achieve high throughput under consistent load, it
    dramatically increases latency for individual requests, especially when the query arrival rate is
    low or bursty, as requests have to wait for the batch to fill. This approach also struggles with diverse
    request lengths, leading to significant padding waste or increased latency for longer sequences.
  napkin_math: Given a target P99 throughput of 1000 QPS per H100, if an average inference takes 50ms
    at batch size 1 (including communication overhead), then for static batching, a batch size `B` means
    each query experiences `B * 50ms` processing time if it's the first in the batch, plus queueing. For
    continuous batching, the effective throughput is `(1 / avg_token_process_time_per_token) * max_concurrent_tokens`.
    If an H100 can process `N` tokens/sec, and average query length is `L` tokens, then theoretical QPS
    is `N/L`. With 989 TFLOPS FP16, a single H100 can perform `495 * 10^12` operations/sec. If a single
    token generation requires `X` FLOPs, then `N = (495 * 10^12) / X`. The actual latency for a request
    of length `L` would be roughly `L * (time_per_token) + static_overhead`. The 80GB HBM3 sets a hard
    limit on the total model parameters and KV cache that can be concurrently held, influencing maximum
    effective batch size or concurrent users.
