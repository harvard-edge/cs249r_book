id: cloud-cell-11016
title: 'Dataset Curation: Specification — Design a Data Quality SLA for Continuous Pre-Training'
topic: dataset-curation
status: published
provenance: imported
scenario: You are writing the data quality specification for a continuous pre-training system on 256 H100s
  that ingests 100M new documents per week from production traffic. Define quantitative SLAs for data
  quality, freshness, deduplication, and pipeline throughput that must be enforced before any data reaches
  the training job.
details:
  realistic_solution: 'Define: (1) Perplexity SLA: P95 doc perplexity < 500 using 125M KenLM reference.
    (2) Dedup SLA: < 2% near-duplicate rate (MinHash 0.8 Jaccard). (3) Freshness SLA: data ingested within
    24h of production. (4) Throughput SLA: pipeline must sustain 16.7M docs/day. (5) PII SLA: < 0.01%
    docs contain email/SSN patterns.'
  common_mistake: Writing qualitative SLAs ('data must be high quality') without measurable thresholds
    and automated enforcement.
  napkin_math: '100M docs/week = 14.3M docs/day = 165 docs/sec. Pipeline must sustain: language detection
    165 docs/sec (trivial), perplexity scoring 165 docs/sec (need 0.017 CPU cores at 10K docs/sec/core),
    dedup requires accumulating 100M/week batch → weekly dedup run in < 4 hours: 100M / (512 cores × 10K/sec)
    = 19.5 seconds compute time, I/O dominated. Storage: 100M × 2KB = 200GB/week = 10.4TB/year. Weekly
    dedup batch processing budget: 4 hours compute.'
