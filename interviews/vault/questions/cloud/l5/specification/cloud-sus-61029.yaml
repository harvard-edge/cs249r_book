id: cloud-sus-61029
title: 'RLHF Infrastructure: PPO Training Pipeline Architecture'
topic: model-adaptation-systems
status: published
provenance: imported
scenario: Design the infrastructure for PPO-based RLHF on a 7B policy model. Specify the four required
  models, their roles, and how to schedule them efficiently across an 8×H100 node.
details:
  realistic_solution: 'PPO-RLHF requires: (1) policy model (trained), (2) reference model (frozen, for
    KL penalty), (3) reward model, (4) critic/value model. Strategy: colocate reference and policy on
    same GPUs (reference is frozen, no optimizer states); run reward model on separate GPU subset only
    during rollout phase; use frozen reference in inference mode to halve its memory. 8×H100: policy+optimizer
    on 4 GPUs (tensor parallel), reference on same 4 GPUs (frozen, no optimizer = 2x less memory), reward
    on 2 GPUs, critic on 2 GPUs.'
  common_mistake: Running all four PPO models (policy, reference, reward, critic) simultaneously on all
    GPUs. This 4x memory multiplication is the primary reason RLHF is prohibitively expensive when not
    architected carefully.
  napkin_math: '7B policy (BF16 + Adam FP32): 14 GB + 56 GB optimizer = 70 GB. 7B reference (BF16, frozen):
    14 GB. 1B reward model (BF16): 2 GB. 7B critic (BF16 + Adam): 70 GB. Total naive: 156 GB → 2 H100s
    for policy, 1 for reference, 0.5 for reward, 2 for critic. Tensor parallel over 8×H100: 156 GB / 8
    = 19.5 GB/GPU — fits with memory for KV cache.'
