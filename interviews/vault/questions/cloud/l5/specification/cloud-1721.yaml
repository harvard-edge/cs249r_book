id: cloud-1721
title: Evaluating H100 Cluster Power and Cooling Topologies
topic: power-budgeting
status: published
provenance: imported
scenario: 'You are architecting the physical deployment of a 1,024-GPU H100 cluster for LLM pre-training.
  Each 8-GPU HGX H100 node consumes 10.2 kW and occupies 4U. Your existing data center supports a maximum
  of 15 kW per rack with traditional air cooling. You must evaluate two options: 1) A ''sparse'' air-cooled
  deployment placing exactly one node per 42U rack. 2) A ''dense'' Direct-to-Chip Liquid Cooling (DLC)
  upgrade supporting 50 kW per rack, allowing four nodes per rack, but carrying a 25% OpEx facility premium
  and a 3-month retrofit delay. Evaluate the trade-offs between these two approaches, specifically focusing
  on the cascading effects of the power wall on cluster networking infrastructure, TCO, and training throughput.'
details:
  realistic_solution: The dense liquid-cooled setup is superior for large-scale synchronous training.
    While air-cooling avoids the 3-month facility delay, spreading 128 nodes across 128 racks to respect
    the 15kW power wall forces almost all inter-node GPU connections to use expensive Active Optical Cables
    (AOCs). The dense 32-rack DLC setup keeps the core GPU fabric localized, heavily utilizing copper
    DACs. The networking capital savings and the improved distributed scaling efficiency (due to localized
    spine-leaf hops) offset the facility premium and the 3-month delay over the multi-year lifecycle of
    the cluster.
  common_mistake: Focusing purely on the 3-month delay or physical rack U-space, while failing to analyze
    how a sparse 128-rack layout destroys the feasibility of using cheap, low-latency copper DAC cables,
    thereby drastically inflating optical networking costs and tail latency.
  napkin_math: 'Sparse setup: 128 nodes / 1 node/rack = 128 racks. Network requires ~512+ optical links
    for the first tier. At ~$1,000 per 400G/800G AOC -> $512k+ optics premium. Dense setup: 128 nodes
    / 4 nodes/rack = 32 racks. ~75% of first-tier connections stay intra-rack using $100 copper DACs.
    DAC savings + higher scaling efficiency > 25% facility power/cooling premium.'
