title: LLM Layered Defense Trade-offs
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are deploying a Llama-3 70B banking assistant on an 8x H100 node. Security mandates protection
  against prompt injection, PII leakage, and memory scraping. The P99 Time-to-First-Token (TTFT) budget
  is 400ms. You evaluate a layered defense architecture: NVIDIA Hopper Confidential Computing (adds 20ms
  to TTFT and reduces throughput by 15%), an 8B guardrail model for input/output filtering, and strict
  VPC boundaries. An engineer suggests running the 8B guardrail (taking 16GB VRAM) on the same 8x H100s
  to avoid network latency, rather than offloading it to a separate L4 node. Evaluate the trade-offs of
  co-locating vs. offloading the guardrail model in this layered architecture, specifically regarding
  TTFT and overall H100 utilization.'
details:
  realistic_solution: Offload the 8B guardrail to the L4 node. The network hop adds minimal latency (~5ms),
    and the L4 can process the guardrail in ~50ms, keeping total TTFT safely under the 400ms budget. This
    preserves 16GB of H100 VRAM, enabling larger batch sizes to offset the Confidential Computing throughput
    penalty.
  common_mistake: Assuming co-locating the guardrail on the H100s is optimal for latency, without realizing
    that sacrificing 16GB of H100 VRAM reduces KV cache capacity, which severely degrades the maximum
    batch size and throughput of the primary 70B model.
  napkin_math: 70B TTFT = 150ms. CC overhead = 20ms. L4 Guardrail = 50ms compute + 5ms network. Total
    TTFT = 150 + 20 + 50 + 5 = 225ms (well under 400ms budget). Saving 16GB VRAM on H100 allows +16 batch
    size (assuming 1GB/seq KV cache). For a base batch of 128, this boosts throughput by ~12.5%, largely
    offsetting the 15% CC throughput penalty.
