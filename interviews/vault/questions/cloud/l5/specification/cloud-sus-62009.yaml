schema_version: 1
id: cloud-sus-62009
title: Prefill-Decode Affinity and Context Caching
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'Your service adds prompt caching: if a request shares a prefix with a recently processed request,
  the KV-cache for that prefix is reused. Design the cache placement policy in a disaggregated architecture.
  Should prefix KV-caches be stored on prefill nodes, decode nodes, or a shared storage tier? Specify
  the invalidation policy and quantify expected TTFT savings at 60% prefix hit rate.'
details:
  realistic_solution: 'Optimal placement: store prefix KV-caches on decode nodes. On a cache hit, the
    request skips prefill entirely for the cached prefix, and decode can start immediately without any
    KV transfer. The prefill node only processes the new suffix tokens. Routing policy: hash the prefix
    to a consistent decode node (consistent hashing), so all requests with the same prefix land on the
    same decode node. Invalidation: LRU eviction when KV pool utilization > 85% watermark. TTFT savings:
    assume prefix = 2048 tokens of a 2560-token request. Prefill for 2048 tokens at 200k tok/s = 10.2
    ms; KV transfer for 2048 tokens (768 MB) at 50 GB/s = 15.4 ms. Cache hit saves ~25.6 ms. At 60% hit
    rate, E[TTFT savings] = 0.6 × 25.6 ms = 15.4 ms per request.'
  common_mistake: Storing prefix caches on prefill nodes — a cache hit still requires transferring the
    prefix KV to the decode node, paying the same network cost. Storing on decode nodes avoids this transfer
    but requires routing requests to the decode node holding the cache.
  napkin_math: 'Prefix KV cache size (2048 tokens, same GQA params): 2×8×128×2048×96×2B = 805,306,368
    bytes ≈ 768 MB (0.75 GiB). With 38 GB free KV pool on MI300X: 38,000 MB / 768 MB ≈ 49 cacheable prefixes
    per decode node. With consistent hashing across 10 decode nodes: ~490 total cached prefixes. At 1000
    RPS with 60% hit rate = 600 cache hits/s avoiding 768 MB transfers each. Bandwidth saved: 600 × 768
    MB/s = 461 GB/s of InfiniBand bandwidth freed.'
