id: cloud-1714
title: Mitigating Power Analysis in Multi-Tenant GPU Inference
topic: power-budgeting
status: published
provenance: imported
scenario: 'You are architecting a multi-tenant cloud ML inference platform using NVIDIA A100 GPUs. A security
  audit reveals that a malicious tenant can use fine-grained power telemetry (e.g., via RAPL or NVML at
  1ms resolution) to conduct a differential power analysis attack against a co-located VM, successfully
  leaking the proprietary Transformer model''s architectural hyperparameters (layer count, hidden dims).
  Evaluate the trade-offs between three mitigations: (1) injecting dummy matrix multiplications to mask
  the power signature, (2) enforcing a strict hardware power cap to flatten consumption, and (3) relying
  on CPU-level Confidential Computing (AMD SEV-SNP). Justify your selection considering isolation guarantees,
  inference throughput, and operational TCO.'
details:
  realistic_solution: The optimal solution restricts fine-grained power telemetry access at the hypervisor
    level (disabling NVML power queries for guest VMs) combined with hardware-level confidential compute
    (e.g., NVIDIA H100 CC with Architecture Power Management) that flattens power states. Injecting dummy
    workloads is a viable software fallback but severely degrades throughput (often 20-30% overhead) and
    increases cooling TCO.
  common_mistake: Assuming memory encryption (like AMD SEV-SNP) protects against power side-channels.
    Memory encryption secures data at rest and in transit, but does not mask the physical power drawn
    by the GPU during computation, which hypervisors or co-tenants might still sample.
  napkin_math: If a single Transformer layer (FFN + Attention) takes 3ms to execute (2ms FFN @ 250W, 1ms
    Attn @ 300W), a telemetry sampling rate of 1kHz (1ms resolution) yields 3 samples per layer. For a
    32-layer model, the attacker sees a repeating 3ms pattern over 96ms. By applying a Fast Fourier Transform
    (FFT) to the power trace, the 333Hz frequency spike clearly reveals the layer execution time, leaking
    the architecture.
