id: cloud-1360
title: Tensor Core Dimension Alignment
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are evaluating two model architecture proposals for a high-throughput cloud API running
  on A100 GPUs. Proposal A uses a hidden dimension of 1024 and vocabulary size of 32,768. Proposal B trims
  dimensions to 1000 and 30,000 to precisely match the domain, reducing theoretical FLOPs and parameters
  by ~11%. Evaluate the deployment trade-offs of Proposal B, focusing on the architectural interaction
  with NVIDIA Tensor Cores.
details:
  realistic_solution: Reject Proposal B. A100 Tensor Cores require matrix dimensions to be multiples of
    8 or 16 (for FP16) to operate efficiently. Unaligned dimensions force cuBLAS to dynamically pad matrices
    with zeros or fall back to significantly slower CUDA cores. The hardware executes the padded 1024/32768
    dimensions anyway, consuming the same memory bandwidth and compute, but adds kernel overhead.
  common_mistake: Evaluating purely on theoretical FLOPs and parameter counts, assuming that smaller matrix
    dimensions will linearly decrease execution time without considering hardware alignment constraints.
  napkin_math: 'Proposal B theoretical savings: 1 - ((1000^2) / (1024^2)) ≈ 4.6% for linear layers, and
    1 - (30000/32768) ≈ 8.4% for vocab. However, unaligned memory access and fallback from Tensor Cores
    (312 TFLOPS) to CUDA cores (19.5 TFLOPS FP32 or 78 TFLOPS FP16) can cause a 4x-16x latency regression.
    Padding mathematically eliminates the 11% savings entirely.'
