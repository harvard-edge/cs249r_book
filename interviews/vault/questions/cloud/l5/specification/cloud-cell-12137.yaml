id: cloud-cell-12137
title: 'Network Bandwidth Bottlenecks: Specify InfiniBand Fabric for 256-GPU LLM Training Cluster'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Specify the InfiniBand fabric topology for a 256-GPU H100 training cluster (32 DGX nodes ×
  8 H100s) optimized for training 70B+ models with 3D parallelism. Specify: IB switch tier, rail count,
  bandwidth per GPU, target AllReduce time for 70B model, and maximum cluster bisection bandwidth.'
details:
  realistic_solution: '256 GPUs across 32 nodes. Each node: 8 H100 × 400Gb/s (ConnectX-7) = 3.2Tb/s intra-node
    NVLink + 8 × 400Gb/s IB per node = 3.2Tb/s IB uplinks per node. 32 nodes × 8 IB ports = 256 ports.
    Non-blocking fat-tree: 2-tier with 512-port Quantum-2 switches or HDR 36-port leafs. Recommended:
    2-tier fat-tree with 256-port leaf switches (1:1 oversubscription). Bandwidth per GPU: 400Gb/s = 50GB/s.
    AllReduce 70B across 32 DP ranks: 2×31/32×140B/32 = 8.45GB per GPU. 8.45/50=169ms. Bisection BW: 256×400Gb/s/2=51.2Tb/s.'
  common_mistake: Specifying a single-tier fat-tree when 256 ports per switch isn't enough; 256 GPUs with
    32 NICs per node = 32 uplinks, requiring a 2-tier or 3-tier fat-tree for non-blocking.
  napkin_math: 'Per GPU IB: 400Gb/s=50GB/s. 32 DP nodes: AllReduce data per GPU (70B FP16, DP-32, TP-8):
    per GPU gradient = 17.5GB. Ring: 2×31/32×17.5=33.9GB moved. IB 50GB/s: 33.9/50=678ms. Still slow!
    With ZeRO-3 and 50% overlap: ~340ms overhead on 500ms step. GPU util: 500/(500+340)=59.5%. Needs 200Gb/s
    × 4 rails or 800Gb/s IB to achieve >85% util.'
