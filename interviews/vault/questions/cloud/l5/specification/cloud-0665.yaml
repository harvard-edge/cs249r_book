schema_version: 1
id: cloud-0665
title: The Attention Cost Explosion
topic: transformer-systems-cost
status: published
provenance: imported
scenario: We're deploying a model that supports 128k context. Users love it, but our serving costs are
  10× higher than the 4k-context version, and P99 latency is through the roof. The model has the same
  number of parameters. Why does 32× more context cost 10× more to serve, and what are our architectural
  options?
details:
  realistic_solution: 'Standard self-attention is $O(n^2)$ in both compute and memory with respect to
    sequence length. Going from 4k to 128k tokens is a 32× increase in $n$, which means a $32^2 = 1024\times$
    increase in attention FLOPs and memory. The attention matrix alone at 128k is enormous. Three architectural
    mitigations exist, each with different trade-offs: (1) **FlashAttention** — eliminates the $O(n^2)$
    memory by tiling to SRAM, but compute is still $O(n^2)$; it buys you memory headroom, not compute
    savings. (2) **Sliding window / local attention** — reduces to $O(n \times w)$ where $w$ is the window
    size, but sacrifices global context; tokens beyond the window are invisible. (3) **Sparse attention
    with global sentinel tokens** — most tokens attend locally, but a small set of global tokens attend
    to everything, preserving long-range dependencies at sub-quadratic cost.'
  common_mistake: '"Context length only affects KV-cache memory, so we just need more VRAM." Memory is
    part of it, but the compute cost of attention itself is the dominant factor at 128k.'
  napkin_math: 'Attention FLOPs per layer per head at 4k tokens: $2 \times 4096^2 \times 128$ = 4.3 GFLOPs.
    At 128k tokens: $2 \times 131072^2 \times 128$ = **4.4 TFLOPs** — a **1024× increase**. Attention
    matrix memory at 128k in FP16: $131072^2 \times 2$ = **32 GB per head per layer**. With 32 heads and
    80 layers: 32 × 80 × 32 GB = **81.9 TB** — obviously impossible without FlashAttention''s tiling.
    Sliding window with $w = 4096$: attention FLOPs drop back to $2 \times 131072 \times 4096 \times 128$
    = 137 GFLOPs per layer per head — a **32× reduction** from full attention.'
