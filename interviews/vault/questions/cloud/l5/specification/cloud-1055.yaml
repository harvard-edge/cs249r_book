title: Evaluating Unbounded Credit Assignment Strategies
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are designing the training pipeline for a 2B parameter continuous-learning temporal model
  on a cluster of 8x 80GB H100 GPUs. The model processes streaming user event sequences of up to 100,000
  steps. Exact credit assignment via standard Backpropagation Through Time (BPTT) requires retaining the
  full activation history, which catastrophically exceeds the 80GB VRAM limit. Evaluate the system-level
  and statistical trade-offs between using Truncated BPTT (TBPTT) with a 2,048-step window versus implementing
  gradient checkpointing (activation recomputation) over a 32,768-step window to solve this fundamental
  credit assignment problem.
details:
  realistic_solution: Implement gradient checkpointing with an optimal chunk size. This explicitly preserves
    exact long-range credit assignment up to 32k steps by trading a 30-40% compute overhead for a square-root
    reduction in activation memory, keeping peak memory well within the 80GB limit.
  common_mistake: Focusing solely on the computational overhead of activation recomputation without realizing
    that Truncated BPTT fundamentally breaks exact credit assignment for long-term dependencies (horizon
    > window size), essentially blinding the model to delayed rewards.
  napkin_math: 'For a 2B model, activations per step ≈ 4MB. For exact credit assignment over 32,768 steps:
    32,768 × 4MB = 131GB (OOM on 80GB H100). With gradient checkpointing over sqrt(32768) ≈ 181 chunks,
    memory drops to roughly 181 × 4MB (checkpoints) + 181 × 4MB (local activations) ≈ 1.45GB, easily fitting
    in VRAM at the cost of 1 extra forward pass per chunk.'
