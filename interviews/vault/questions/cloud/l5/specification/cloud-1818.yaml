title: Explainability Latency Trade-offs
topic: latency-decomposition
status: published
provenance: imported
scenario: A cloud-based ML service for medical image diagnosis (ResNet-50, input size 1024x1024) requires
  an explanation for each prediction to satisfy regulatory compliance. The SLA mandates a p99 latency
  of 150ms per request. The model forward pass takes 30ms on an NVIDIA L4 GPU. The engineering team is
  debating between standard Saliency Maps (Gradient * Input) and Integrated Gradients (using 50 interpolation
  steps) for the explanation generation. Evaluate the trade-offs and justify the architectural choice.
details:
  realistic_solution: Deploy standard Saliency Maps. It requires only a single forward and backward pass,
    fitting within the 150ms SLA, whereas Integrated Gradients requires 50x the compute and severely violates
    the latency budget.
  common_mistake: Candidates often advocate for Integrated Gradients due to its theoretical superiority
    (satisfying sensitivity and implementation invariance) while ignoring the multiplicative latency cost
    that breaks the production SLA.
  napkin_math: Saliency Map Latency = 1 Forward (30ms) + 1 Backward (~60ms) = 90ms (Under 150ms SLA).
    Integrated Gradients Latency = 50 steps * 90ms = 4500ms (30x over SLA budget).
