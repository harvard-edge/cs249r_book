schema_version: 1
id: cloud-1440
title: Evaluating IO-Aware Attention on A100
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your team is training a 7B parameter Transformer model on a cluster of NVIDIA A100 GPUs (40GB
  HBM2, 2.0 TB/s memory bandwidth, 312 TFLOPS BF16). Profiling the standard self-attention implementation
  reveals it is heavily memory-bound. For sequence length 4096, attention takes 10ms per layer. An engineer
  proposes a new attention algorithm that computes attention scores on-the-fly in SRAM (192KB per SM)
  without writing the N x N attention matrix to HBM. However, this algorithm requires recomputing values
  during the backward pass, increasing total FLOPs by 15%. Evaluate whether this proposed algorithm will
  speed up training and justify your decision.
details:
  realistic_solution: Accept the proposal. Standard attention writes an O(N^2) intermediate matrix to
    HBM. At N=4096 with batch=8 and 32 heads, this IO costs ~8.5GB per layer, taking ~4.25ms at 2.0 TB/s.
    The proposed IO-aware algorithm (FlashAttention) trades ~15% extra FLOPs for eliminating this HBM
    traffic entirely. Since the operation is heavily memory-bound (IO time >> compute time), the extra
    compute adds <0.5ms while saving >4ms of IO — a clear net win.
  common_mistake: Rejecting the proposal because it increases total FLOPs, failing to realize that for
    memory-bound operations, trading a small amount of extra compute for dramatically reduced HBM IO is
    always net positive.
  napkin_math: 'Standard Attention HBM IO: Writing and reading an N=4096 matrix (16.7M elements per head,
    ~33MB in BF16). Multiplied by batch size 8 and 32 heads, this is ~8.5GB per layer just for the attention
    matrix. At 2.0 TB/s, moving 8.5GB takes ~4.25ms of pure transfer time. Since A100 has 312 TFLOPS,
    an extra 15% FLOPs on a compute block that is highly underutilized adds negligible compute overhead
    (e.g., <0.5ms), which is heavily outweighed by saving >4ms of IO bottlenecks.'
