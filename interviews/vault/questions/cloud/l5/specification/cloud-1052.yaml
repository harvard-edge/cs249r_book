id: cloud-1052
title: Evaluating Fabrics via Critical Message Size
topic: collective-communication
status: published
provenance: imported
scenario: You are deciding between two network architectures for a synchronous parameter server training
  cluster. The workload requires frequent 1MB tensor updates. Fabric A has an alpha (latency) of 5μs and
  1000 GB/s bandwidth (beta = 1μs/MB). Fabric B has an alpha of 1μs and 250 GB/s bandwidth (beta = 4μs/MB).
  Evaluate which fabric minimizes communication overhead by determining the critical message size for
  each, and justify when you would recommend switching from Fabric B to Fabric A.
details:
  realistic_solution: Calculate the critical message size (M_c = alpha / beta) to find the inflection
    point where transfer becomes bandwidth-bound. For Fabric A, M_c = 5 / 1 = 5MB. For Fabric B, M_c =
    1 / 4 = 0.25MB. At a 1MB payload, Fabric A is heavily latency-bound (5μs latency > 1μs transfer time),
    taking 6μs total. Fabric B is bandwidth-bound (1μs latency < 4μs transfer time), taking 5μs total.
    Thus, Fabric B is optimal for 1MB payloads. The switch to Fabric A is justified when the payload exceeds
    1.33MB.
  common_mistake: Candidates look only at the peak bandwidth of Fabric A (1000 GB/s) and assume it will
    be faster for 1MB payloads, ignoring the critical message size and the impact of fixed latency overheads
    on small messages.
  napkin_math: 'Time = alpha + (beta * M). Fabric A (1MB): 5μs + (1 * 1) = 6μs. Fabric B (1MB): 1μs +
    (4 * 1) = 5μs. Crossover point calculation: 5 + 1*M = 1 + 4*M => 4 = 3*M => M = 1.33MB.'
