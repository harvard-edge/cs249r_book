id: cloud-1964
title: Evaluating L7 Sticky Routing for LLM Canary Rollouts
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are rolling out an updated 70B parameter LLM (v2) across 3 global regions serving 10,000
  concurrent conversational sessions, backed by 64 H100 GPUs per region. During a 10% canary rollout,
  users report abrupt context and persona shifts mid-chat. Evaluate the architectural trade-offs between
  implementing L7 sticky routing via consistent hashing on 'session_id' at the ingress gateway versus
  passing a pinned model version requirement in the client JWT payload.
details:
  realistic_solution: Implement Layer 7 routing at the ingress proxy using a consistent ring hash on a
    session cookie or header. This ensures multi-turn conversations stay pinned to the exact same model
    replica, while the consistent hash minimizes session rebalancing when the canary pool scales up or
    down.
  common_mistake: Relying on L4 (IP-based) sticky sessions, which fails when clients use NAT/VPNs, or
    assuming standard round-robin is acceptable during gradual model rollouts.
  napkin_math: In a 10% canary without sticky routing, a 10-turn conversation has only a (0.9)^10 = 34.8%
    chance of staying entirely on v1. Over 65% of canary users will experience a jarring mid-conversation
    model switch.
