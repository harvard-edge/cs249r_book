id: cloud-cell-13101
title: 'TCO Specification: Design Cost-Optimal Inference for SLO'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Specify the minimum-cost H100 inference configuration for LLaMA-65B (FP16: 4 H100s/pod, INT4:
  1 H100/pod) with SLO: P99 < 2s, P50 < 500ms, throughput ≥ 1000 tokens/s. Each FP16 pod delivers 500
  tok/s at $10/hr (4 GPUs). Each INT4 pod delivers 800 tok/s at $2.50/hr. Design the fleet mix meeting
  all SLOs at minimum cost, including fallback for peak load.'
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. Cost efficiency = 989 TFLOPS / $3/hr = 329.7 TFLOPS/$·hr.'
  common_mistake: Choosing purely on throughput-per-dollar without verifying that INT4 quantization meets
    the latency SLO (quantization adds dequantization overhead that can increase P99 latency).
  napkin_math: 'H100 at 989 TFLOPS FP16 (not 1979). Cost-efficiency: TFLOPS per dollar. H100 at $3/hr:
    989T TFLOPS / $3 = 329.7 TFLOPS per dollar per hour. At 40% MFU: 131.9 effective TFLOPS per dollar
    per hour.'
