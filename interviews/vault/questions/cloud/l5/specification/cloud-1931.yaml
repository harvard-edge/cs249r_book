id: cloud-1931
title: Mitigating Spurious Correlations in X-Ray Classification
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are evaluating the robustness of a ResNet-50 model trained on 250,000 chest X-rays to detect
  pneumonia. The model achieves 98% AUROC in validation but drops to 65% when deployed to a new hospital.
  Analysis reveals the model relies on spurious correlations: specific metal markers from scanner beds
  and ''portable'' text stamps. You must evaluate three mitigation strategies: 1) Heuristic image cropping
  and masking, 2) Group Distributionally Robust Optimization (Group DRO) using scanner metadata, and 3)
  Jointly training an adversarial domain classifier to penalize scanner-specific features (Domain Adversarial
  Neural Networks, DANN). How do you evaluate the trade-offs in compute overhead, metadata requirements,
  and generalization guarantees to select the optimal architecture?'
details:
  realistic_solution: Group DRO provides the best trade-off if subgroup metadata (scanner IDs) is available.
    It avoids the 2x forward/backward pass overhead and instability of DANNs while explicitly optimizing
    worst-group loss to force learning of causal pathology features rather than spurious markers.
  common_mistake: Candidates often choose heuristic cropping (which fails on systemic differences like
    scanner noise profiles) or underestimate the compute and stability costs of adversarial training (DANN)
    compared to Group DRO.
  napkin_math: Let Group 1 be 'Pneumonia + Marker' (N=100k) and Group 2 be 'Pneumonia + No Marker' (N=1k).
    Standard ERM minimizes weighted average loss, so 99% of the gradient comes from Group 1, allowing
    the model to learn the marker shortcut. Group DRO optimizes max(Loss_G1, Loss_G2). By dynamically
    upweighting Group 2's gradient by ~100x during training, it forces the model to learn invariant lung
    features, trading ~5% average training accuracy for a 20%+ gain in out-of-distribution performance.
