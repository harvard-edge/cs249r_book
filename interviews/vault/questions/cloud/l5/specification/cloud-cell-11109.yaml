id: cloud-cell-11109
title: 'Kernel Fusion: Specification — Define Fusion Requirements for Custom CUDA Kernel'
topic: kernel-fusion
status: published
provenance: imported
scenario: You are specifying requirements for a custom CUDA kernel to fuse RMSNorm + QKV Projection for
  a 70B model on H100 (80GB HBM3, 3.35 TB/s, 989 TFLOPS BF16). The unfused version takes 3.2ms. Define
  correctness requirements, performance targets, precision requirements, and validation methodology.
details:
  realistic_solution: 'Correctness: max absolute error < 1e-3 vs float32 reference (for bf16). Performance:
    >= 1.8ms (>= 1.78× speedup vs unfused). Memory: must not allocate any intermediate HBM buffers. Backward:
    must support gradient computation.'
  common_mistake: Not specifying numerical tolerance bounds; not requiring backward pass fusion for training
    use; not defining test coverage requirements.
  napkin_math: 'Unfused: 3.2ms for 70B layer × 80 layers. RMSNorm (3 passes → 1 pass): saves 2/3 of RMSNorm
    HBM. QKV projection: already a single GEMM (no fusion benefit for compute-bound matmul). Main fusion:
    eliminate RMSNorm output tensor write + QKV input tensor read = 2 × (seq × hidden × 2B). Batch=512,
    seq=2048, hidden=8192: 2 × (512 × 2048 × 8192 × 2B) = 34.4GB saved per layer. At 3.35 TB/s: 10.3ms
    per forward pass (80 layers × 0.13ms each). Performance target: unfused 3.2ms → fused 1.4ms → 2.3×
    speedup. Validation: test on 1K random inputs, compare vs float32 reference. Max error threshold:
    bf16 precision limit ≈ 1e-2 relative, 1e-3 absolute. Regression test: run daily on CI with performance
    threshold ±5%.'
