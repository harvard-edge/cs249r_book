id: cloud-1437
title: Intersectional Bias Mitigation in Identity APIs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud identity verification API processes 5M requests/day using a ResNet-101 model on NVIDIA
  T4 GPUs. The model achieves 99.2% overall accuracy and satisfies demographic parity across gender (99.0%
  vs 99.3%) and skin tone (98.9% vs 99.4%) independently. An audit reveals the false rejection rate (FRR)
  for darker-skinned females is 12.5%, compared to 0.5% for lighter-skinned males. You must evaluate remediation
  strategies, comparing the trade-offs between a 10x targeted data collection (delaying launch by 3 months)
  versus deploying a multi-headed Mixture of Experts architecture (increasing serving latency from 150ms
  to 280ms, violating the 200ms SLO, and requiring 2x T4 GPUs per node).
details:
  realistic_solution: Implement a Minimax optimization objective during fine-tuning to explicitly minimize
    the loss of the worst-performing intersectional subgroup, accepting a slight degradation in overall
    accuracy (e.g., to 98.7%) to reduce the worst-case FRR below 2%, which avoids architecture changes
    that violate the 200ms serving SLO.
  common_mistake: Assuming that achieving demographic parity on individual marginal distributions (e.g.,
    gender, race) mathematically guarantees fairness across their joint intersectional distributions.
  napkin_math: Assuming 1M training images with marginals P(Female)=0.5 and P(Dark)=0.5, independent probability
    P(Female ∩ Dark) = 0.25. If the actual joint distribution is skewed to P(Female ∩ Dark) = 0.04 (40k
    images), a batch size of 256 yields only ~10 samples/batch for this subgroup. Achieving the 50 samples/batch
    needed for stable gradients requires a 5x oversampling rate, introducing severe overfitting risk unless
    coupled with aggressive data augmentation or group-distributionally robust optimization (Group DRO).
