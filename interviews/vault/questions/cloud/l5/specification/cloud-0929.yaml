id: cloud-0929
title: Decoupling Shared Embeddings
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A large-scale recommender system serves 10,000 QPS across a cluster of 32 NVIDIA A100 (80GB)
  GPUs. The core 30GB user embedding model is shared by two downstream systems: Candidate Retrieval (Team
  A) and Ad CTR Ranking (Team B). Team A updates the embedding pipeline to improve recall by 5%, but this
  causes an implicit data distribution shift that silently degrades Team B''s CTR accuracy by 12%. Evaluate
  the architectural trade-offs between completely decoupling the models into separate deployments, implementing
  strict API versioning, or using representation alignment (adapter layers) to solve this boundary erosion,
  keeping in mind the strict 15ms latency SLA and hardware capacity.'
details:
  realistic_solution: Implement explicit data contracts and API versioning. Instead of full model duplication
    (which would consume 60GB per GPU, cutting replicas from 2 to 1 and halving cluster throughput), deploy
    the new embedding model (v2) alongside a lightweight adapter network (~2MB MLP) trained by Team B
    to project v2 embeddings into Team A's expected v1 space. This preserves the 2 replicas/GPU density
    while allowing independent iteration.
  common_mistake: Mandating synchronous retraining across both teams, creating organizational gridlock,
    or naively duplicating the embedding model for each team which halves per-GPU throughput capacity
    from 2 replicas to 1.
  napkin_math: A100 capacity is 80GB. Base 30GB model allows floor(80/30) = 2 replicas per GPU. Duplicating
    the model entirely (v1 and v2) requires 60GB, reducing replicas to 1 and cutting cluster throughput
    by 50%. An adapter layer (e.g., 2-layer MLP, 1024-dim) is ~2MB, adding negligible memory and <0.5ms
    latency, preserving the 2 replicas/GPU density and avoiding the QPS drop.
