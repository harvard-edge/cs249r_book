id: cloud-0854
title: Evaluating Adversarial Debiasing Dynamics in Credit Models
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are training a 50M parameter ranking model for a credit scoring system on a cluster of 8x
  A100 GPUs. To meet regulatory requirements, you implement adversarial debiasing using a Gradient Reversal
  Layer (GRL) to prevent the model from learning protected attributes via proxy variables (e.g., purchasing
  history). You attach a 5M parameter adversary network to the penultimate layer. During training, throughput
  drops by 40%, the main model's AUC degrades by 12%, and the adversary's loss quickly goes to zero. Evaluate
  the architectural and optimization dynamics causing this failure, and justify a redesign to balance
  the fairness-accuracy trade-off while recovering training throughput.
details:
  realistic_solution: Implement a warm-up schedule for the gradient reversal penalty, scaling it dynamically
    over the first 20% of epochs, and heavily restrict the adversary's capacity (e.g., 2-layer MLP, 0.5M
    params) to balance the minimax game and reduce FLOPs.
  common_mistake: Assuming the gradient reversal scaling factor should be static (e.g., 1.0) from the
    start or that the adversary needs massive capacity, failing to recognize that a too-strong adversary
    early in training destroys the main model's feature representations.
  napkin_math: 'Baseline throughput (no debiasing): ~2000 samples/s. Without debiasing: AUC=0.85, Demographic
    Parity Difference (DPD)=0.18. With strong adversary (capacity=5M, static penalty=1.0): AUC=0.73 (-12%),
    DPD=0.02, Throughput=1200 samples/s. With scheduled penalty and reduced adversary (capacity=0.5M):
    AUC=0.83 (-2%), DPD=0.04, Throughput=1900 samples/s. The optimized approach sacrifices only 2% AUC
    for a 77% relative improvement in fairness (DPD: 0.18 -> 0.04), meeting the <0.05 DPD constraint.
    Throughput recovery: lost = 2000 - 1200 = 800 samples/s, recovered = 1900 - 1200 = 700 samples/s,
    recovery rate = 700/800 = **87.5%** of the lost throughput.'
