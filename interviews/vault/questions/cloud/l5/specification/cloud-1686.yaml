id: cloud-1686
title: Evaluating PCIe Bottlenecks in ZeRO-Offload
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are evaluating a cost-saving architecture for training a 175B parameter model using ZeRO-3
  Offload. The design uses 8x H100 PCIe GPUs connected to a dual-socket CPU host via PCIe Gen5 x16 (64
  GB/s unidirectional). The optimizer states and FP32 weights are pinned in host RAM. For each optimizer
  step, the GPUs must stream 350 GB of FP16 gradients to the CPU, and the CPU streams 350 GB of updated
  FP16 weights back. You must evaluate the hard lower bound on the optimizer step time imposed by the
  PCIe interconnect and determine if this architecture is viable for a 5-second iteration budget.
details:
  realistic_solution: Divide the total 350 GB payload by 8 GPUs to find the per-link transfer size (43.75
    GB). Evaluate the transfer time using the unidirectional effective bandwidth (~60 GB/s) and full-duplex
    capabilities, concluding the 0.73s overhead is viable for the budget.
  common_mistake: Candidates often confuse the 128 GB/s bidirectional bandwidth as available for a single
    unidirectional transfer, or forget that the total 350GB payload is partitioned across the 8 parallel
    PCIe links of the individual GPUs.
  napkin_math: FP16 total size = 175B * 2 Bytes = 350 GB. Per GPU payload = 350 GB / 8 GPUs = 43.75 GB.
    PCIe Gen5 x16 unidirectional speed = 64 GB/s theoretical (~60 GB/s effective). Transfer time = 43.75
    GB / 60 GB/s = 0.73 seconds. Since PCIe is full-duplex, gradient upload and weight download can partially
    overlap. The 0.73s communication bound easily fits within the 5s iteration budget.
