id: cloud-1211
title: Evaluating Kernel Fusion Energy Trade-offs
topic: energy-per-operation
status: published
provenance: imported
scenario: You are optimizing a production LLM inference pipeline running on A100 GPUs (400W TDP, 1.5 TB/s
  HBM2 bandwidth). An engineer proposes replacing a standard multi-step activation pipeline (LayerNorm
  -> GELU -> Dropout) with a custom fused kernel. The fused kernel requires 20% more total FLOPs due to
  redundant thread-level recomputation, but it reduces DRAM reads and writes from 6 to 2 per element.
  Evaluate this architectural trade-off. Should you accept this proposal, and how does it impact the overall
  energy consumption per token?
details:
  realistic_solution: Accept the proposal. On modern hardware, moving data from HBM costs orders of magnitude
    more energy than performing a floating-point operation. Trading a 20% compute penalty for a 3x reduction
    in memory traffic substantially reduces the total energy consumed per byte, alleviating thermal constraints
    and improving memory-bound throughput.
  common_mistake: Candidates often reject the proposal by assuming that a 20% increase in computational
    FLOPs directly translates to 20% higher power consumption and latency, fundamentally ignoring the
    disproportionate energy cost of DRAM access.
  napkin_math: 'Assume FP16 (2 bytes/element). HBM access energy is roughly 15 pJ/bit (~120 pJ/byte),
    while an FP16 FLOP is ~1 pJ. Unfused DRAM energy: 6 accesses * 2 bytes * 120 pJ = 1440 pJ. Fused DRAM
    energy: 2 accesses * 2 bytes * 120 pJ = 480 pJ. The fused kernel saves 960 pJ per element in memory
    movement alone. Even if the base operation requires 10 FLOPs (10 pJ), adding 20% (2 pJ) is completely
    negligible compared to the 960 pJ saved. The system is heavily memory-bandwidth and energy-bound,
    making fusion strictly optimal.'
