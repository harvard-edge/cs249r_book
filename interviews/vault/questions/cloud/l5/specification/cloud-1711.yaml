id: cloud-1711
title: Liquid Cooling Trade-offs at the Power Density Wall
topic: power-budgeting
status: published
provenance: imported
scenario: You are architecting a 10,000-GPU training cluster using 1,000W accelerators. Each 8-GPU node
  consumes 10 kW. Your colocation provider offers a 20 MW facility with a standard air-cooling cap of
  15 kW per rack. You can either deploy 1 node per rack (air-cooled) or pay a $15M CAPEX premium to upgrade
  the facility to direct-to-chip liquid cooling (DLC), which unlocks 100 kW per rack. Evaluate the architectural
  and TCO trade-offs of these two approaches to justify your deployment strategy.
details:
  realistic_solution: Justify the $15M DLC upgrade. While air-cooling avoids the cooling premium, it forces
    a sprawl of 1,250 racks (1 node/rack). This requires expensive optical transceivers for almost all
    interconnects. The 100 kW/rack DLC approach shrinks the footprint to 125 racks (10 nodes/rack), allowing
    90% of connections to use cheap passive copper (DAC) within the rack, which more than offsets the
    cooling CAPEX.
  common_mistake: Evaluating the decision purely on the $15M cooling CAPEX without accounting for the
    massive explosion in networking costs (optical transceivers, extra spine switches) required to connect
    a low-density, sprawling cluster.
  napkin_math: "Air-cooled (15kW/rack): 1,250 racks. 10,000 GPUs need optical transceivers @ ~$2k each\
    \ = $20M in optics. \nDLC (100kW/rack): 125 racks. 90% of connections are intra-rack (DAC copper @\
    \ ~$200). 1,000 optical transceivers = $2M.\nOptics Savings ($18M) > DLC Upgrade Premium ($15M). Plus,\
    \ lower tail latency due to fewer network hops."
