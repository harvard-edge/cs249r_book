id: cloud-1449
title: Evaluating Iteration Tax in LLM Deployment
topic: federated-learning
status: published
provenance: imported
scenario: A cloud AI team is developing a 70B parameter LLM for real-time customer support using 8x H100
  (80GB) GPU nodes. The data science team trains for 4 weeks before handing off to the ML engineering
  team, who discovers the model requires 180 GB of KV cache memory for the target batch size of 256, exceeding
  the available memory when partitioned across 2 GPUs. They must redesign the architecture to use 4-way
  tensor parallelism and Grouped Query Attention (GQA), requiring a full retraining cycle. Evaluate the
  cost of this iteration tax and propose a rigorous workflow change to prevent it.
details:
  realistic_solution: Implement a 'shift-left' constraint propagation strategy. Before training, profile
    a dummy model with the target architecture (70B) and batch size (256) on the exact target hardware
    (H100) to validate KV cache and serving latency constraints.
  common_mistake: Treating training and deployment as isolated phases, assuming that if a model trains
    successfully, it can be served efficiently, ignoring the strict memory and latency constraints of
    the target production environment.
  napkin_math: Wasted compute = 4 weeks * 7 days * 24 hours * 8 GPUs * $3/hr = $16,128. Opportunity cost
    = 4 weeks of delayed launch. Total turnaround time becomes 4 (initial) + 1 (debug) + 4 (retrain) =
    9 weeks. A 1-day pre-training profiling step saves 4 weeks and $16k.
