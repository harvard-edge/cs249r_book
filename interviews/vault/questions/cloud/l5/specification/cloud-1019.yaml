id: cloud-1019
title: Mitigating Late-Stage Hardware Constraints
topic: federated-learning
status: published
provenance: imported
scenario: Your ML team spent $2M and 3 months training a 70B parameter model in FP16 for real-time fraud
  detection, optimizing entirely for accuracy. Upon handoff to the serving team, you discover the target
  production environment has a strict 50ms p99 latency budget and is constrained to single L4 GPUs (24GB
  VRAM) per instance to maintain profitable unit economics. The team proposes salvaging the project by
  applying post-training 4-bit quantization and aggressive layer pruning to fit the model into production.
  Evaluate this mitigation strategy.
details:
  realistic_solution: Reject the mitigation strategy. A 70B model even at 4-bit precision requires ~35GB
    just for weights, which fundamentally cannot fit on a 24GB L4 GPU. The project must be restarted with
    the L4 hardware and 50ms SLA defined as strict upstream interface contracts, likely targeting a 7B-14B
    parameter architecture.
  common_mistake: Evaluating the technical merits of the compression algorithms (like AWQ or GPTQ) while
    failing to realize the proposed mitigation is mathematically impossible, representing a massive constraint
    propagation failure.
  napkin_math: A 70B parameter model trained in FP16 requires 70B * 2 bytes = 140GB of VRAM just to store
    the weights. Even with aggressive INT4 quantization (0.5 bytes per parameter), the weights consume
    70B * 0.5 bytes = 35GB. The target inference hardware only has 24GB of VRAM available. 35GB > 24GB.
    The model physically cannot fit on a single GPU, completely violating the strict 50ms latency SLA.
