id: cloud-1184
title: Evaluating ECMP for RoCEv2 GPU Training Clusters
topic: collective-communication
status: published
provenance: imported
scenario: You are designing the network fabric for a 4,096 H100 GPU cluster dedicated to training a 175B
  parameter LLM over 400Gbps RoCEv2. The networking team proposes a standard non-blocking Clos topology
  relying solely on ECMP (Equal-Cost Multi-Path) for load balancing. Evaluate the risks of this design
  for synchronous distributed training workloads and justify an architectural alternative.
details:
  realistic_solution: Because ECMP pins flows based on 5-tuple hashes, a 400Gbps AllReduce transfer is
    restricted to a single path. To mitigate collisions, implement Adaptive Routing (AR) or packet-level
    spraying, which dynamically distributes packets across all available uplinks based on real-time link
    utilization, improving effective bandwidth from ~60% to >90%.
  common_mistake: Candidates often assume ECMP provides perfect load balancing by distributing traffic
    evenly. They fail to recognize that ML training generates massive 'elephant flows' with identical
    5-tuples, leading to hash collisions, stranded bandwidth, and severe tail latency.
  napkin_math: Under pure ECMP, flows are mapped via static hashing. With 4 possible 400Gbps uplinks and
    4 simultaneous heavy flows, the probability of at least one collision (two flows sharing an uplink)
    is 1 - (4! / 4^4) = 1 - (24 / 256) = 90.6%. When flows collide, they share the 400Gbps bandwidth (200Gbps
    each), doubling transfer times. This hash polarization drastically limits effective throughput for
    AI.
