id: cloud-1235
title: Evaluating Event-Driven Activation for Cloud Video Analytics
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing a cloud-based video analytics pipeline processing 10,000 live 1080p traffic
  camera streams. The baseline architecture uses continuous dense ResNet-50 inference at 30 FPS on NVIDIA
  T4 GPUs, resulting in massive power consumption (70W per GPU) even though the camera scenes are completely
  static 90% of the time. A proposal suggests implementing an event-driven activation paradigm using a
  lightweight spatial-temporal differencing filter to trigger the full dense matrix multiplications only
  on frames with active motion. Evaluate the energy vs. latency trade-offs of this design. Under what
  hardware and data conditions does the overhead of the event-generation logic negate the overall power
  savings?
details:
  realistic_solution: Deploy an ultra-lightweight INT8 sum-of-absolute-differences (SAD) filter as the
    event trigger. If the frame SAD exceeds a 15% threshold, it is pushed to a dynamic batching queue
    for the T4 GPU. While this adds ~10-15ms of jitter during sparse periods, it dramatically reduces
    cluster power consumption while accommodating bursts.
  common_mistake: Candidates often assume the event-triggering filter has zero compute/power overhead,
    and they fail to account for the P99 tail latency spikes caused by sudden bursts of concurrent frame
    activations across multiple streams during peak traffic events.
  napkin_math: 'Baseline power: 10,000 GPUs * 70W = 700kW. Event-driven state: Filter runs continuously
    at ~2W per stream. Active DNN runs 10% of the time at 70W. Total power = (10,000 * 2W) + (10,000 *
    10% * 70W) = 20kW + 70kW = 90kW. Total savings = 610kW (87% reduction). The filter must consume less
    than (70W * 90%) = 63W per stream to be net-positive on energy.'
