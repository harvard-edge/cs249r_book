id: cloud-1522
title: M/G/c/K Queue Sizing for LLM Inference
topic: latency-decomposition
status: published
provenance: imported
scenario: You are architecting an API gateway for a fleet of 8 vLLM instances (c=8) running Llama-3-70B
  on 8xH100 nodes. Inbound requests follow a Poisson process (M) at 120 req/s. Due to highly variable
  output token lengths, the service time distribution is heavily right-skewed with a mean of 50ms and
  a coefficient of variation (Cv) of 2.5 (G). To protect the backend during traffic bursts, you must configure
  the maximum queue depth (K). If the queue is full, new requests are dropped (HTTP 503). Evaluate the
  trade-off between the request drop rate and the P99 wait time when setting the queue capacity to 16
  versus 64.
details:
  realistic_solution: Model the system as an M/G/c/K queue. With service time CV=2.5, Kingman's approximation
    shows wait times are (1+6.25)/2 = 3.6x longer than an M/M/c model would predict. A queue depth of
    16 limits max queued per replica to 2, capping worst-case wait at ~100ms. A queue depth of 64 allows
    8 queued per replica, pushing worst-case wait to ~400ms — likely violating the 200ms P99 SLA during
    traffic bursts. Choose the smaller queue (16) and shed excess load via HTTP 429 responses.
  common_mistake: Candidates often use basic M/M/c formulas (assuming exponential service times, CV=1),
    which dramatically underestimates tail latency for LLM serving where output length variance drives
    high CV. They also evaluate queue depths using average-case analysis rather than worst-case P99 bounds.
  napkin_math: Utilization ρ = λ / (c * μ) = 120 / (8 * (1/0.050)) = 120 / 160 = 0.75. Kingman's variance
    multiplier is (1 + Cv^2)/2 = (1 + 6.25)/2 ≈ 3.6x longer wait times than M/M/c. With queue=16, max
    queued per replica is 2 (16/8). Average max wait = 2 * 50ms = 100ms. With queue=64, max queued per
    replica is 8, pushing average max wait to 8 * 50ms = 400ms, which will likely violate a 200ms P99
    SLA during bursts.
