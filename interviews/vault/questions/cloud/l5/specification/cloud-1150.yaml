id: cloud-1150
title: Mitigating Dispatch Overhead in Low-Latency Models
topic: latency-decomposition
status: published
provenance: imported
scenario: 'Your team is deploying a real-time autoregressive text-to-speech model on NVIDIA A100s. The
  model architecture features 2,000 sequential, lightweight operations per token generation step. Profiling
  reveals the GPU utilization is stuck at 15%, and the token latency is around 10ms. You are tasked with
  evaluating three options to reduce P99 latency: upgrading the hardware to H100 GPUs, implementing TorchInductor
  kernel fusion, or wrapping the step in CUDA Graphs. Evaluate these trade-offs and justify your design
  decision.'
details:
  realistic_solution: Implement CUDA Graphs or kernel fusion. CUDA Graphs captures the execution graph
    and replays it with a single CPU launch, while fusion merges operations into fewer kernels. Both eliminate
    the CPU bottleneck, but CUDA Graphs is often optimal for fixed-shape, small-op autoregressive steps.
  common_mistake: Assuming upgrading to an H100 GPU will reduce latency; a faster GPU executes operations
    quicker but does not accelerate the CPU's fixed kernel dispatch overhead, effectively worsening the
    hardware starvation ratio.
  napkin_math: For 2,000 operations, CPU dispatch overhead is roughly 5µs/op = 10ms. GPU compute is ~1µs/op
    = 2ms. Since kernel launches are asynchronous, total latency is max(CPU, GPU) = max(10ms, 2ms) = 10ms.
    Bottlenecked by the CPU at 10ms. Using CUDA Graphs drops dispatch overhead to a single ~5µs launch,
    reducing total latency from 10ms down to ~2ms (a 5x speedup) and maximizing actual GPU execution time.
