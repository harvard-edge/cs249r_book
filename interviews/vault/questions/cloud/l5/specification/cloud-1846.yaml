id: cloud-1846
title: Evaluating RNN Optimization Strategies on A100s
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team is training a sequence model on a cluster of NVIDIA A100 GPUs for sequences of length
  2048. Profiling reveals the legacy LSTM model achieves only ~15% GPU compute utilization, whereas a
  baseline Transformer reaches ~60%. A performance engineer proposes heavily investing in CUDA graphs
  and custom fused kernels for the LSTM to achieve Transformer-level GPU utilization and training throughput.
  Evaluate this proposal by analyzing the hardware execution model and algorithmic constraints.
details:
  realistic_solution: Reject the proposal. While kernel fusion reduces CPU-bound kernel launch overhead,
    it cannot resolve the inherent O(N) algorithmic sequential dependency of recurrent networks. Time
    step 't' strictly waits on the hidden state of 't-1'. Consequently, the massive parallel execution
    units (SMs) of the A100 will remain fundamentally underutilized because the computation cannot be
    parallelized across the sequence length dimension during training, a property Transformers inherently
    possess.
  common_mistake: Believing that software-level execution overheads (which CUDA graphs and fusion solve)
    are the primary cause of low GPU utilization, ignoring the algorithmic sequential dependencies.
  napkin_math: A single LSTM step (e.g., hidden size 1024) requires a matrix multiply of [1, 2048] x [2048,
    4096], yielding ~16M FLOPs. An A100 delivers 312 TFLOPs (FP16), meaning it can process ~300M FLOPs
    per microsecond. The GPU easily completes this small matrix multiply on a fraction of its 108 SMs,
    leaving the rest idle while waiting for the next sequential step to begin. Transformers compute QxK^T
    for all 2048 tokens simultaneously, exposing billions of parallelizable FLOPs to saturate the SMs.
