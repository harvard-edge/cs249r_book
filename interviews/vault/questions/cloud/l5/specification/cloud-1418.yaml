id: cloud-1418
title: Redesigning an End-to-End Vision Inference Pipeline
topic: latency-decomposition
status: published
provenance: imported
scenario: 'A cloud-based real-time video analytics service processes 1080p streams using an object detection
  model on NVIDIA T4 GPUs. The SLA requires end-to-end latency under 100ms per frame. Currently, the pipeline
  is CPU-bottlenecked: preprocessing (resizing, normalization) takes 45ms on CPU, GPU inference takes
  20ms, and post-processing (NMS, bounding box scaling) takes 40ms on CPU. Evaluate architectural approaches
  to redesign this pipeline to meet the SLA while maximizing overall throughput and GPU utilization. What
  are the quantitative trade-offs of your design?'
details:
  realistic_solution: Offload preprocessing and postprocessing to the GPU to eliminate CPU bottlenecks
    and reduce expensive CPU-GPU PCIe data transfers. Using NVIDIA DALI for GPU-accelerated decoding/resizing
    and CUDA kernels for NMS reduces the pipeline from 105ms (CPU-bound) to ~30ms. This frees enough latency
    headroom to batch 3 frames within the 100ms SLA, increasing throughput by 3x and pushing GPU utilization
    from 19% toward 100%.
  common_mistake: Focusing solely on optimizing the neural network weights (e.g., quantization or TensorRT)
    while ignoring the dominant CPU-bound pre- and post-processing stages that consume 85ms of the 105ms
    total pipeline latency.
  napkin_math: 'Baseline latency: Pre (45ms) + Inf (20ms) + Post (40ms) = 105ms (>100ms SLA). GPU Utilization
    = 20 / 105 = 19%. Optimized latency: GPU Pre (5ms) + Inf (20ms) + GPU Post (5ms) = 30ms. With a 30ms
    pipeline, we can process a batch size of 3 within the 100ms SLA (90ms total), increasing throughput
    by 3x and pushing GPU utilization towards 100%.'
