id: cloud-1997
title: Systolic Array Sizing and Padding Overhead
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are evaluating hardware for serving a dense LLM. The workload consists of requests with
  short sequence lengths (sequence length 64, embedding dimension 1024). You must compare a custom AI
  accelerator featuring a monolithic 256x256 systolic array against a GPU with distributed smaller 16x16
  matrix multiply units. Evaluate the compute utilization and efficiency trade-offs when executing the
  attention QKV projections (64x1024 multiplied by 1024x1024) on these two architectures without cross-request
  batching.
details:
  realistic_solution: The 256x256 systolic array requires padding the sequence length from 64 to 256,
    destroying utilization. The distributed 16x16 units perfectly tile the 64x1024 operation, yielding
    significantly higher effective utilization and minimizing wasted memory bandwidth.
  common_mistake: Assuming the 256x256 systolic array will inherently provide higher throughput due to
    a higher peak TFLOPS rating, while ignoring the severe padding penalties incurred when workload dimensions
    do not align with the array grid.
  napkin_math: On the 256x256 array, the 64x1024 input matrix must be padded to 256x1024. Utilization
    = (64 * 1024) / (256 * 1024) = 0.25. Therefore, 75% of the systolic array's compute cycles and SRAM
    reads are wasted on zero-padded tiles.
