id: cloud-1285
title: Evaluating Storage Architecture to Eliminate CV Training Feeding Tax
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are designing the storage architecture for a distributed computer vision training cluster.
  A single node with 8x A100 GPUs trains a Vision Transformer on a 50TB dataset of high-resolution images.
  Profiling shows GPU utilization is stuck at 35% with dataloader workers spending most of their time
  in I/O wait. The current pipeline fetches raw JPEGs (average 300KB) from a centralized NFS cluster over
  a shared 25 Gbps network link, decoding them on the CPU. Evaluate the trade-offs between upgrading the
  datacenter to a 100 Gbps network with a parallel file system (e.g., WekaFS) versus keeping the 25 Gbps
  link but implementing an epoch-ahead local NVMe caching tier with sequential container formats (e.g.,
  WebDataset). Justify your architectural choice based on scalability, cost, and the 'feeding tax' math.
details:
  realistic_solution: Implement local NVMe caching with WebDataset. The 25 Gbps link provides at most
    ~3 GB/s theoretical bandwidth, but random reads of 300KB files over NFS yield much less (~0.5 GB/s
    effective). Packing images into 100MB+ tarballs (WebDataset format) maximizes sequential read throughput.
    Local NVMe caching sustains >3 GB/s, fully eliminating the 1.5 GB/s feeding requirement without expensive
    networking upgrades.
  common_mistake: Relying on adding more dataloader CPU workers to mask latency, which fails because the
    physical network bandwidth is saturated, or ignoring the massive IOPS overhead of millions of small-file
    random reads over NFS.
  napkin_math: 'Demand: 8x A100 processing 5,000 imgs/sec total * 300KB/img = 1.5 GB/s required bandwidth.
    25 Gbps link = 3.125 GB/s max, but NFS overhead + random reads on small files drops effective throughput
    to ~0.5 GB/s (yielding 35% GPU util). Upgrading to 100 Gbps fixes the network pipe but not the random
    IOPS bottleneck unless containerization is also used. Local NVMe caching + WebDataset sustains >3
    GB/s, fully eliminating the 1.5 GB/s feeding tax without expensive networking upgrades.'
