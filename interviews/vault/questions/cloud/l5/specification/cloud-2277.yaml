id: cloud-2277
title: The Runtime Selection for Multi-Model Serving
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'Your ML platform team must serve five models in production: (1) a BERT classifier updated weekly,
  (2) a 70B LLM with continuous batching, (3) a real-time object detection model at 30 FPS, (4) a recommendation
  model with a 500M-row embedding table, and (5) a diffusion model for image generation. The team wants
  to standardize on a single inference runtime. You argue this is a mistake. Design a runtime selection
  strategy, explaining which runtime or serving framework best fits each model and why a single runtime
  cannot serve all five optimally.'
details:
  realistic_solution: 'Each model has a different bottleneck that favors a different runtime: (1) BERT
    classifier → TensorRT: static shapes, INT8 quantizable, layer fusion gives 3-5× over eager PyTorch.
    Rebuilt weekly via TensorRT build cache. (2) 70B LLM → vLLM/TensorRT-LLM: needs PagedAttention for
    KV-cache, continuous batching for throughput, tensor parallelism across GPUs. Generic runtimes lack
    these LLM-specific memory management features. (3) Object detection at 30 FPS → TensorRT with CUDA
    Graphs: hard real-time latency constraint means you cannot tolerate jitter from dynamic batching or
    Python dispatch. Pre-built engine with captured CUDA graph gives deterministic <33ms. (4) Recommendation
    model → custom serving (HugeCTR/TorchRec): 500M embedding rows cannot fit in GPU memory; needs CPU-GPU
    hybrid serving with embedding-specific sharding. Standard runtimes assume dense models that fit in
    VRAM. (5) Diffusion model → PyTorch with torch.compile or ONNX Runtime: iterative denoising loop (20-50
    steps) means the runtime must efficiently handle repeated kernel launches of the same graph. CUDA
    Graphs work well here. The principle: runtime selection is determined by the model''s dominant resource
    bottleneck (compute-bound → TensorRT, memory-bound → vLLM, latency-bound → CUDA Graphs, capacity-bound
    → hybrid serving).'
  common_mistake: Standardizing on TensorRT or ONNX Runtime for everything. Each runtime makes architectural
    assumptions (static shapes, dense compute, single-model-per-GPU) that break down for at least one
    of these workloads.
  napkin_math: 'BERT on TensorRT vs PyTorch eager: 1.2ms vs 5ms (4× faster). 70B LLM on vLLM vs naive
    PyTorch: 40 tokens/s vs 8 tokens/s per GPU (5× throughput from PagedAttention + continuous batching).
    Object detection: TensorRT + CUDA Graphs gives P99 < 15ms; PyTorch eager P99 = 45ms with jitter spikes
    to 100ms. RecSys: embedding lookup is 80% of latency — no amount of compute optimization helps if
    embeddings don''t fit in VRAM. Diffusion: 50 denoising steps × 20ms per step = 1s; CUDA Graphs eliminate
    50 × 15μs = 0.75ms dispatch overhead — small but compounds with batching.'
