schema_version: 1
id: cloud-r2-43023
title: Delta Lake vs Parquet for ML Versioning
topic: storage-format-selection
status: published
provenance: imported
scenario: 'Your ML platform stores training datasets as raw Parquet files on S3. Teams frequently complain
  about: (1) broken training runs from concurrent writes corrupting files, (2) inability to reproduce
  past experiments because data changed, (3) slow dataset updates requiring full rewrites. You''re evaluating
  Delta Lake as a replacement. What properties does it add over raw Parquet, and what are the performance
  costs?'
details:
  realistic_solution: 'Delta Lake adds three properties raw Parquet lacks: (1) ACID transactions — concurrent
    writers are serialized via optimistic concurrency control on the transaction log. No more corrupted
    partial writes. (2) Time travel — every write creates a new version. `SELECT * FROM table VERSION
    AS OF 42` reproduces exactly the dataset used for training run 42. Versions are retained for a configurable
    period (default 30 days). (3) Incremental updates — UPDATE/DELETE/MERGE operations rewrite only affected
    Parquet files, not the entire dataset. For a 10 TB dataset with 1% daily changes, this writes 100
    GB instead of 10 TB. Costs: transaction log overhead (~1 MB per 1,000 commits), listing _delta_log/
    adds 100-500ms to first read, and small file problem from frequent updates requires periodic OPTIMIZE
    (compaction).'
  common_mistake: Assuming Delta Lake replaces Parquet. Delta Lake is built ON TOP of Parquet — it adds
    a transaction log (JSON/Parquet files in _delta_log/) that provides ACID semantics, but the underlying
    data files remain Parquet. The overhead is in the metadata layer, not the data format.
  napkin_math: 'Raw Parquet update (1% change to 10 TB): rewrite 10 TB at 500 MB/s = 5.6 hours, cost:
    $45 in S3 PUT + compute. Delta Lake MERGE (1% change): rewrite affected files only ≈ 200 GB at 500
    MB/s = 6.7 minutes, cost: $1.80. Time travel storage: 30 days × 200 GB/day = 6 TB of versioned files
    (vs 10 TB base). S3 cost: $0.023/GB × 16 TB = $368/month vs $230/month for raw Parquet. 60% more storage
    for full reproducibility + ACID.'
