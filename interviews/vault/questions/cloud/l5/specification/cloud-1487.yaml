id: cloud-1487
title: Evaluating Compute vs. Network Hardware Upgrades
topic: collective-communication
status: published
provenance: imported
scenario: Your team is planning a hardware refresh for training a 100B parameter LLM using 3D parallelism.
  The current cluster uses 512 A100 GPUs (312 TFLOPs FP16) connected via 200 Gbps InfiniBand HDR. A vendor
  proposes upgrading the GPUs to H100s (989 TFLOPs FP16) to triple training throughput, but keeping the
  existing 200 Gbps network switches to stay within budget. Evaluate this proposal using the Law of Distributed
  Efficiency.
details:
  realistic_solution: Reject the proposal. Upgrading compute without scaling network bandwidth shifts
    the bottleneck entirely to the network. By the Law of Distributed Efficiency, the communication-to-computation
    ratio will skyrocket, leaving the expensive H100s idle while waiting on 200 Gbps AllReduce and pipeline
    operations. You must upgrade to 400+ Gbps NDR InfiniBand or similar to realize the compute gains.
  common_mistake: Assuming that a 3.1x increase in raw compute FLOPs will linearly translate to a similar
    increase in end-to-end training throughput, ignoring how the fixed network bandwidth will dominate
    the critical path.
  napkin_math: 'Assume an original step time of 100ms, evenly split (50ms compute, 50ms comms). With H100s,
    compute shrinks by ~3.1x: 50ms / 3.1 = 16ms. Comms remains fixed at 50ms. New step time = 16ms + 50ms
    = 66ms. Overall speedup = 100ms / 66ms = 1.5x (not 3.1x). GPU utilization drops from 50% to just 24%.'
