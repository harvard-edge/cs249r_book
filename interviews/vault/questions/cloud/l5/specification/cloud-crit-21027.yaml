id: cloud-crit-21027
title: MoE Serving Cost-per-Token Economics
topic: mixture-of-experts
status: published
provenance: imported
scenario: Compare the serving cost-per-token for a dense 70B model on 2×H100 versus an MoE 8x7B (47B total,
  13B active) on 2×H100. Both serve at 1000 requests/second with 512-token outputs. Factor in GPU utilization,
  memory efficiency, and throughput.
details:
  realistic_solution: 13B active params at FP16 = 13B × 2B = 26GB (not 28GB which requires 14B params).
  common_mistake: Comparing only per-token FLOPs without considering that the MoE model requires the same
    number of GPUs despite 5× fewer active FLOPs, because all expert weights must be memory-resident.
  napkin_math: 'Mixtral 8×7B active parameters: 13B active (7B shared + 2 experts × 3B FFN). Memory at
    FP16: 13B × 2B = 26GB (not 28GB which would require 14B params). Full model at FP16: 46.7B × 2B ≈
    93.4GB.'
