id: cloud-1805
title: Evaluating Centralized vs Decentralized RBAC in Distributed ML Data Lakes
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are architecting the access control layer for a healthcare ML platform storing 10 PB of
  patient data across hot feature serving (Redis), warm training data (Iceberg/S3), and cold archives.
  The system serves 500 ML engineers requiring column-level and row-level PII filtering. You must evaluate
  two RBAC architectures: a centralized proxy-based system that intercepts all queries (adding 15ms latency
  but guaranteeing unified audit logs) versus a decentralized token-based system (e.g., STS/IAM) that
  pushes policies to the native storage engines (<2ms latency but complex policy synchronization). Evaluate
  the trade-offs and propose a design that satisfies both strict compliance and a 5ms P99 latency SLA
  for feature serving.'
details:
  realistic_solution: 'Implement a hybrid control/data plane RBAC: use the centralized proxy for training
    and exploratory queries (where a 15ms penalty on a 10s query is a negligible 0.15% overhead) to ensure
    strict auditability, but use token-based short-lived JWTs with embedded data-plane claims for feature
    serving to meet the <5ms SLA.'
  common_mistake: Choosing decentralized tokens solely to meet the 5ms feature serving SLA, without recognizing
    that synchronizing fine-grained row-level permissions across disparate engines (Redis, Iceberg, S3)
    creates severe consistency issues and time-of-check to time-of-use (TOCTOU) vulnerabilities.
  napkin_math: 'Feature serving SLA: 5ms. Proxy overhead: 15ms (violates SLA by 3x). Training query duration:
    10,000ms. Proxy overhead: 15ms (0.15% impact). Hybrid approach bounds serving latency to token validation
    (~1ms) while keeping 99% of data volume access globally auditable.'
