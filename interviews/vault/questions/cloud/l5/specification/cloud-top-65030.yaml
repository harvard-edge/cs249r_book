schema_version: 1
id: cloud-top-65030
title: PEFT Strategy Selection for 100B+ Models at Cloud Scale
topic: model-adaptation-systems
status: published
provenance: imported
scenario: Your team must fine-tune a 140B parameter model on a 10K example dataset for a specialized enterprise
  task. Full fine-tune requires 48xH100. Compare LoRA, (IA)^3, and prefix tuning on memory efficiency,
  performance, and training time.
details:
  realistic_solution: 'Method comparison for 140B model with 10K examples: (1) LoRA (r=16): 140M adapter
    params. Memory: base model 280GB BF16 + 280MB adapters + 560MB optimizer = ~281GB. Requires 4xH100
    with TP=4. Training: 3-4 GPU-hours. Risk: may overfit with 10K examples; use r=4. (2) (IA)^3: ~1M
    adapter params (element-wise scaling). Memory: 280GB + 2MB adapters = ~280GB. Same GPU requirement.
    Training faster than LoRA. Better regularization for small datasets. (3) Prefix tuning: soft prompt
    tokens prepended to each layer. ~700K params but inference overhead: prefixes add to KV cache for
    every request, expensive at scale. Recommendation: (IA)^3 for 10K dataset with unknown task difficulty;
    LoRA r=4 if task requires structural knowledge; avoid prefix tuning for production serving.'
  common_mistake: Selecting LoRA by default without considering that (IA)^3 has 100x fewer parameters
    for similar or better performance on many tasks, especially when training data is small. For a 10K
    example dataset, overfitting risk with LoRA (millions of adapter params) is real.
  napkin_math: 'LoRA r=4, 140B model: trainable params = 2 * num_layers * d_model * r * 2. Llama-3 140B
    approx: 120 layers, d=8192. Params = 2*120*8192*4*2 = 15.7M. (IA)^3: 3 * num_layers * d = 3*120*8192
    = 2.95M params. 5x fewer than LoRA r=4. Adam optimizer states: LoRA r=4: 15.7M * 2 * 4B = 126MB. (IA)^3:
    2.95M * 2 * 4B = 23.6MB. Both negligible vs 280GB base. Training time difference: proportional to
    trainable params, so (IA)^3 is ~5x faster per step.'
