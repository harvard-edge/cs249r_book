schema_version: 1
id: cloud-r2-41018
title: TP for Cross-Attention in Encoder-Decoder Models
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: You are applying TP to a T5-style encoder-decoder model where the decoder's cross-attention
  keys and values come from the encoder output. With TP=4, the encoder output is already partitioned across
  4 GPUs. How do you handle the cross-attention KV projections without extra communication?
details:
  realistic_solution: 'With Megatron-style TP, the encoder output is column-parallel partitioned: each
    GPU holds encoder_output_i of shape [enc_seq, hidden/4]. The cross-attention KV projections (W_K and
    W_V) can be applied as row-parallel operations: W_K is split along the input dimension (rows), matching
    the encoder output partition. Each GPU computes K_i = encoder_output_i @ W_K_i, producing partial
    keys of shape [enc_seq, head_dim × num_heads/4]. This is exactly the same pattern as self-attention:
    each GPU owns num_heads/4 heads and computes complete attention for those heads using its local KV
    partition. No extra communication is needed beyond the standard row-parallel AllReduce after the output
    projection. The encoder and decoder TP groups must be identical (same GPUs in the same order) for
    this to work — a constraint that Megatron enforces by construction.'
  common_mistake: Inserting an AllGather to reconstruct the full encoder output before cross-attention
    KV projection. This adds unnecessary communication and memory overhead.
  napkin_math: 'Extra AllGather cost if not done correctly: enc_seq × hidden × 2B × (P-1)/P. For enc_seq=2048,
    hidden=4096, TP=4: 2048 × 4096 × 2 × 0.75 = 12.6 MB per layer. Avoided entirely with row-parallel
    KV projection.'
