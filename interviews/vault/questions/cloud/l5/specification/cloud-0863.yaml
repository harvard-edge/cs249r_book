id: cloud-0863
title: Evaluating Proxy Misalignment in E-Commerce Ranking
topic: federated-learning
status: published
provenance: imported
scenario: Your team deployed a new recommendation ranking model trained to maximize Click-Through Rate
  (CTR) on a cluster of 64 NVIDIA T4 GPUs. Offline evaluation showed a 15% increase in CTR, and the P99
  serving latency is well within the 50ms SLA at 38ms. However, two weeks post-deployment, the primary
  business metric, Gross Merchandise Value (GMV), has dropped by 8%. The model is heavily prioritizing
  low-cost, clickbait items. Evaluate the architectural and modeling trade-offs required to realign the
  system's objective with GMV without violating the strict 50ms latency constraint.
details:
  realistic_solution: Design a Multi-gate Mixture-of-Experts (MMoE) or multi-task architecture predicting
    both p(Click) and p(Conversion|Click). Combine them using an Expected Value formula (p(Click) * p(Conv|Click)
    * Price) during the final ranking stage. To maintain the 50ms P99 SLA on T4 GPUs, restrict the heavy
    cross-feature ranking to the top 500 candidate items (taking ~25ms) generated by a fast two-tower
    ANN retrieval step (~10ms).
  common_mistake: Candidates often propose completely replacing the target with GMV or Purchases, ignoring
    that purchase events are highly sparse (e.g., 100x less frequent than clicks), which leads to severe
    model variance and poor convergence. Others propose overly complex ensemble models that immediately
    violate the 50ms P99 latency SLA on T4 hardware.
  napkin_math: 'Let EV = p(Click) * p(Conversion|Click) * Price. Model A (Clickbait): p(Click)=0.10, p(Conv)=0.01,
    Price=$5 -> EV = $0.005. Model B (Aligned): p(Click)=0.04, p(Conv)=0.15, Price=$50 -> EV = $0.30.
    Model B yields 60x higher expected business value per impression despite having a 60% lower CTR proxy
    metric.'
