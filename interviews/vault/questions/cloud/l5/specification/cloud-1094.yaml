id: cloud-1094
title: Evaluating Storage Sharding vs Caching for Multimodal Training
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your team is training a large multimodal model on a cluster of 256 H100 GPUs. The dataset consists
  of 500 million image-text pairs averaging 250KB each, currently stored as individual files in S3. Profiling
  shows GPUs are 80% idle waiting for data. You must evaluate two proposals: Proposal A suggests keeping
  individual files but deploying a 125TB in-memory Redis distributed cache. Proposal B suggests converting
  the dataset into 1GB WebDataset shards stored directly on S3. Compare the architectural trade-offs,
  operational overhead, and throughput implications of both approaches, and justify your choice.'
details:
  realistic_solution: Choose Proposal B (Data Sharding). Grouping 250KB samples into 1GB shards (approx.
    4,000 samples per shard) amortizes the S3 Time-To-First-Byte latency. S3 provides immense aggregate
    bandwidth for large sequential reads, easily saturating 400Gbps node networks and eliminating GPU
    starvation without caching.
  common_mistake: Assuming an in-memory cache is automatically superior because RAM is faster than object
    storage, while ignoring the massive HTTP/network protocol overhead of reading millions of tiny files
    and the exorbitant cost of a 125TB memory cluster.
  napkin_math: 'Dataset size: 500M * 250KB = 125TB. Proposal A cache cost: 125TB of distributed RAM is
    prohibitively expensive. Proposal B: 1GB / 250KB = 4,000 samples per shard. S3 TTFB is ~20ms. The
    per-sample latency overhead drops from 20ms to (20ms / 4000) = 5 microseconds, enabling high-throughput
    sequential streaming.'
