schema_version: 1
id: cloud-2489
title: Power-Aware Cloud-Edge Fallback
topic: power-budgeting
status: published
provenance: imported
scenario: A wearable health monitor (50mAh battery at 3.7V) runs a 50KB TFLite Micro model for AFib detection
  at 10Hz. If confidence is <0.8, it triggers a BLE transmission to the cloud for a 20MB model check.
  BLE transmission costs 15mW for 100ms. Local compute costs 5mW for 10ms. You need to design the cloud-edge
  thresholding to guarantee a 14-day battery life.
details:
  realistic_solution: Design a dynamic cloud-controlled thresholding architecture. The cloud monitors
    fleet-wide BLE transmission rates and battery states. If a device is over-transmitting due to noisy
    data, the cloud dynamically lowers the confidence threshold (e.g., to 0.7) or pushes a localized model
    update to reduce the radio duty cycle. This strictly caps the energy spent on the radio.
  common_mistake: Setting a static confidence threshold without accounting for the massive power disparity
    between local compute and radio transmission, leading to rapid battery drain if the local model degrades.
  napkin_math: Battery capacity = 50mAh * 3.7V = 185mWh = 666 Joules. 14 days = 1.2M seconds. Total Power
    budget = 666J / 1.2M s = 555uW. Local compute at 10Hz = 5mW * 10ms * 10 = 0.5mW = 500uW. Remaining
    budget for BLE = 55uW. BLE cost per transmission = 15mW * 100ms = 1.5mJ. Max BLE transmissions per
    second = 55uW / 1.5mJ = 0.036 Hz (approx 1 transmission every 27 seconds).
