schema_version: 1
id: cloud-2103
title: Architecture Choice Drives Serving Cost
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You must serve 10,000 QPS of text generation at P99 < 500ms with equivalent quality. Compare
  the infrastructure cost of serving a dense 70B transformer vs a 47B-parameter MoE (8×7B, top-2) vs a
  70B-equivalent SSM. Which architecture minimizes $/query?
details:
  realistic_solution: 'Dense 70B: 140 GB (BF16) — needs 2× H100 (80GB each) for weights alone, plus KV
    cache. Per-token FLOPs: ~140 TFLOPs. Memory-bound during decode. MoE 8×7B (top-2): 94 GB weights —
    also 2× H100, but per-token FLOPs ~26 TFLOPs (13B active). Decode is 5× cheaper in compute, but same
    memory-bound decode bottleneck (weights still need to be in HBM). The catch: all 47B params must reside
    in HBM even though only 13B are active per token — poor HBM utilization. SSM 70B-equiv: 140 GB weights,
    but NO KV cache — fixed-size state (~MBs). Decode is still a weight-limited matmul-per-token, but
    can batch far more concurrent requests (no KV cache memory). Winner for throughput: SSM (highest batch
    size → best GPU utilization). Winner for $/query at moderate batch: MoE (fewer FLOPs per token). Dense
    is most expensive.'
  common_mistake: Only comparing parameter counts without considering per-token compute, memory requirements,
    and hardware utilization differences across architectures.
  napkin_math: 'Dense 70B: 2x H100, batch 16 (KV cache limited), ~320 tokens/s. Cost per hour = 2 * $3
    = $6/hr. Per M tokens: $6/hr / (320 * 3600) * 1e6 = $5.21/M tokens. | MoE 47B: 2x H100, batch 16 (weight
    memory limited), ~800 tokens/s (5x less compute/token). Per M tokens: $6 / (800 * 3600) * 1e6 = $2.08/M
    tokens. | SSM 70B-equiv: 2x H100, batch 256+ (no KV cache), ~2000+ tokens/s. Per M tokens: $6 / (2000
    * 3600) * 1e6 = $0.83/M tokens. | Ranking: SSM ($0.83/M) < MoE ($2.08/M) < Dense ($5.21/M). SSM wins
    on throughput (highest batch size from no KV cache), MoE wins on compute efficiency (fewer active
    FLOPs/token). Dense is most expensive due to full compute + KV cache memory pressure.'
