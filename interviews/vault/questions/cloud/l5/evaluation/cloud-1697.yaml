title: Optimizing Pipeline Bubble in 175B Model Training
topic: pipeline-parallelism
status: published
provenance: imported
scenario: 'Your team is training a 175B parameter LLM across 128 A100 (80GB) GPUs using 3D parallelism
  with Tensor Parallelism (TP=8) and Pipeline Parallelism (PP=16). Using a standard 1F1B schedule with
  M=64 microbatches per global batch, profiling reveals a pipeline bubble overhead of ~23.4%. To improve
  Model Flops Utilization (MFU), you must evaluate two proposals to reduce the bubble to <10%: Option
  A) Increase to M=256 microbatches by shrinking the microbatch size. Option B) Keep M=64 but adopt interleaved
  1F1B scheduling with v=4 virtual stages per GPU. Evaluate the trade-offs of both options and justify
  the optimal architectural choice.'
details:
  realistic_solution: Calculate that both options yield a ~5.8% bubble. Justify Option B (Interleaved
    1F1B) as the superior choice, provided the interconnect (e.g., NDR InfiniBand) can handle the 4x increase
    in cross-node point-to-point communication. Option B is preferred because it preserves the larger
    microbatch size needed to maintain high GPU compute efficiency.
  common_mistake: Focusing solely on the pipeline bubble equation and choosing Option A, without realizing
    that drastically shrinking the microbatch size ruins arithmetic intensity and matrix multiplication
    efficiency on GPU Tensor Cores.
  napkin_math: "Baseline Bubble = (P-1)/M = (16-1)/64 = 15/64 = 23.4%. \nOption A Bubble = (16-1)/256\
    \ = 15/256 = 5.8%. \nOption B Bubble = (P-1)/(v*M) = (16-1)/(4*64) = 15/256 = 5.8%. \nBoth reduce\
    \ the idle bubble equally, but Option A requires 4x smaller microbatches (hurting compute MFU), while\
    \ Option B requires 4x more pipeline stage communications (costing network bandwidth)."
