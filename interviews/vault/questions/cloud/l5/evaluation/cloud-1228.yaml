id: cloud-1228
title: Evaluating HBM3 ECC overhead at 24k GPU scale
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are architecting the memory reliability strategy for a new 24,576 H100 GPU cluster dedicated
  to training a 1-trillion parameter MoE model. The HBM3 memory supports different ECC modes. Disabling
  ECC provides a 5% increase in usable memory bandwidth and capacity. Standard SECDED (Single Error Correction,
  Double Error Detection) ECC incurs this 5% penalty. Evaluate the trade-off between enabling ECC versus
  disabling it to maximize training throughput, given the scale of the cluster and its impact on Mean
  Time Between Failures (MTBF).
details:
  realistic_solution: Enable SECDED ECC. At 24k GPU scale, uncorrectable memory errors and silent data
    corruptions become high-frequency events. The 5% performance overhead of ECC is far less than the
    massive throughput loss caused by constant job crashes and checkpoint-reloads, which can severely
    degrade cluster utilization.
  common_mistake: Prioritizing the 5% raw bandwidth and capacity gain by disabling ECC, assuming transient
    bit flips are rare enough that checkpoint-restarts will adequately handle the failure rate without
    realizing the cluster-wide MTBF drops to minutes.
  napkin_math: Assume an uncorrected HBM bit flip occurs once per year per GPU (8760 hours). For 24,576
    GPUs, cluster MTBF = 8760 / 24576 = 0.35 hours (21 minutes). If a checkpoint recovery takes 5 minutes,
    5 / 26 = 19.23% of training time is wasted on recovery. A 5% ECC bandwidth penalty is mathematically
    superior to a 19% recovery overhead.
