schema_version: 1
id: cloud-2504
title: LLM Serving Batch Size Energy
topic: energy-per-operation
status: published
provenance: imported
scenario: You are serving Llama-3-70B on 8xH100 instances. At batch size 1, Time-to-First-Token (TTFT)
  is 20ms, and the node draws 3.5 kW. At batch size 64, TTFT rises to 400ms, and the node draws 6.5 kW.
  The product team demands a strict 50ms TTFT SLA. Analyze the tradeoff between meeting this SLA and the
  serving cost per token, and propose a solution.
details:
  realistic_solution: Enforcing a strict 50ms TTFT by keeping batch sizes near 1 leads to severe underutilization
    of the GPU's compute capacity while still incurring massive static and memory-transfer power costs.
    At BS=1, the operation is heavily memory-bandwidth bound; you are paying to power the entire HBM stack
    and interconnect just to process a single sequence. This results in an extremely high energy cost
    per token and poor TCO. To balance the tradeoff, you should implement continuous batching and decouple
    the prefill phase from the decode phase (chunked prefill). By processing prefill chunks in parallel
    with decodes, you can maintain high compute density (pushing power draw up, but drastically increasing
    tokens/second) while keeping TTFT within SLA. The goal is to maximize the ratio of active compute
    power to fixed background power, minimizing the Joules per token.
  common_mistake: Optimizing solely for SLA by forcing batch size 1, ignoring that memory bandwidth dominates
    power draw at low batch sizes and destroys perf/watt.
  napkin_math: 'BS=1: 3.5 kW. Throughput = 50 tokens/sec. Energy/token = 3500 W / 50 tps = 70 Joules/token.
    BS=64: 6.5 kW. Throughput = 2000 tokens/sec. Energy/token = 6500 W / 2000 tps = 3.25 Joules/token.
    Operating at BS=64 is ~21.5x more energy efficient per token. If you charge per token, BS=1 ruins
    unit economics.'
