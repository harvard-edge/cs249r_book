schema_version: 1
id: cloud-crit-21007
title: MoE Expert-Choice vs Token-Choice Routing
topic: mixture-of-experts
status: published
provenance: imported
scenario: Your team is debating between token-choice routing (each token picks its top-k experts) and
  expert-choice routing (each expert picks its top-k tokens) for a new 64-expert MoE training run. The
  model will be used for both training and serving. Evaluate the tradeoffs.
details:
  realistic_solution: 'Token-choice (Mixtral/GShard style): Each token independently selects top-k experts.
    Pros: compatible with autoregressive decoding, simple serving. Cons: requires auxiliary loss for load
    balance, tokens can be dropped if experts overflow. Expert-choice (Zhou et al. 2022): Each expert
    selects its top-k tokens from the batch. Pros: perfect load balance by construction (CF=1.0), no token
    dropping, higher quality at same FLOP budget. Cons: routing depends on the full batch (not causal),
    so it cannot be used for autoregressive decoding without modification. For serving LLMs, token-choice
    is required. For encoder models or training-only objectives, expert-choice is superior. A hybrid approach:
    train with expert-choice for better quality, then distill or fine-tune with token-choice routing for
    serving.'
  common_mistake: Choosing expert-choice solely because it guarantees load balance, without considering
    that it breaks autoregressive inference. In expert-choice, an expert selects tokens from the full
    batch, meaning each token's routing depends on other tokens in the batch — incompatible with causal
    decoding.
  napkin_math: 'Token-choice with CF=1.25: 25% memory overhead for padding, 5-10% token drop rate. Expert-choice
    with CF=1.0: 0% overhead, 0% drops, but batch-dependent routing. Serving constraint forces token-choice
    for autoregressive LLMs.'
