id: cloud-2673
title: Choosing a Positional Encoding for Long-Context LLM
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are designing an LLM that must support 128K token context. Option A: Learned absolute positional
  embeddings (trained at 128K). Option B: RoPE with NTK-aware scaling (trained at 8K, extrapolated to
  128K). Option C: ALiBi (no explicit encoding, attention bias based on distance). Which approach and
  why?'
details:
  realistic_solution: 'Option B (RoPE + NTK scaling) is the current industry standard for long-context
    LLMs (used by LLaMA, Mistral, Qwen). Option A (learned absolute PE at 128K) requires training on 128K
    sequences, which is extremely expensive (quadratic attention cost: 128K² = 16.4B attention entries
    per layer vs 64M at 8K). It also cannot generalize beyond 128K. Option C (ALiBi) adds a linear distance
    bias to attention scores, theoretically enabling unlimited extrapolation. However, empirical results
    show ALiBi degrades quality for very long contexts (>32K) because the linear bias assumption doesn''t
    capture complex long-range dependencies. Option B trains efficiently at 8K (cheap) and uses NTK-aware
    frequency scaling to interpolate to 128K. This works because RoPE encodes position as rotation frequencies
    — scaling these frequencies (dividing by a factor) compresses the position representation to fit longer
    sequences into the trained frequency range. Quality at 128K is 90-95% of a model trained at full length,
    at 1/256th the attention training cost.'
  common_mistake: Choosing learned positional embeddings for long context because they seem 'more expressive.'
    The training cost and inability to extrapolate make them impractical beyond ~4K-8K positions.
  napkin_math: 'Training cost at 128K: O(128K²) = 256× cost of 8K. RoPE+scaling: train at 8K, extrapolate
    to 128K. 256x cheaper training with 5-10% quality trade-off.'
