title: Evaluating Pareto Optimal Models for Fraud Detection
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'Your team is deploying a real-time fraud detection service on a cluster of NVIDIA T4 GPUs (16GB
  VRAM). You have profiled four candidate architectures: Model W (F1: 0.94, Latency: 80ms, Throughput:
  150 req/s), Model X (F1: 0.92, Latency: 45ms, Throughput: 300 req/s), Model Y (F1: 0.90, Latency: 55ms,
  Throughput: 250 req/s), and Model Z (F1: 0.97, Latency: 200ms, Throughput: 60 req/s). The business SLA
  mandates a strict maximum latency of 100ms. Evaluate these options to identify the Pareto frontier,
  explain which models are strictly dominated, and justify your final selection based on the systemic
  trade-offs.'
details:
  realistic_solution: 'Identify the Pareto frontier as Models X, W, and Z. Model Y is strictly dominated
    by X (worse F1, worse latency, worse throughput). Apply the 100ms SLA constraint to eliminate Model
    Z. Evaluate the trade-off between the remaining Pareto-optimal candidates, X and W: moving from X
    to W yields a +0.02 F1 improvement but halves the throughput, requiring double the hardware footprint
    to serve the same traffic volume. The final selection depends on whether the business value of a 2%
    F1 gain outweighs the doubled inference compute cost.'
  common_mistake: Failing to recognize that Model Y is strictly dominated by Model X, or blindly selecting
    Model W because it has the highest F1 score under the latency budget without quantifying the massive
    throughput penalty.
  napkin_math: 'Comparing Model X to Model W: ∆F1 = +0.02 (+2.1%), ∆Latency = +35ms (+77%), ∆Throughput
    = -150 req/s (-50%). For a peak traffic of 1000 req/s, Model X requires ceil(1000/300) = 4 T4 GPUs.
    Model W requires ceil(1000/150) = 7 T4 GPUs. Selecting Model W requires 3 additional GPUs (+75% hardware
    cost) to achieve the 2% gain in F1 score.'
