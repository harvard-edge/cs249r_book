id: cloud-1485
title: Mitigating Tail Latency Jitter in Real-time LLM Serving
topic: latency-decomposition
status: published
provenance: imported
scenario: 'Your team is serving a real-time conversational voice AI model using a cluster of NVIDIA H100s.
  The strict latency SLA requires P99 response times under 250ms. Profiling shows that while median latency
  is a stable 120ms, the P99 latency frequently spikes to over 400ms. These spikes are not correlated
  with sudden bursts in request volume or garbage collection pauses in the application runtime. System-level
  tracing indicates that CPU context switching, NUMA boundary crossings, and OS interrupt handling are
  contributing to unpredictable variations in request processing times on the CPU before they even reach
  the GPU queue. Evaluate two different strategies to mitigate this operating system-induced latency jitter:
  (1) Implementing strict CPU core pinning with thread affinity and NUMA-aware memory allocation, versus
  (2) Adopting an OS-bypass network stack (like DPDK/RDMA) to handle incoming requests directly. Which
  approach provides a more cost-effective reduction in tail latency while minimizing engineering overhead
  for your existing Kubernetes deployment, and how would you justify this quantitatively?'
details:
  realistic_solution: Implementing strict CPU pinning, thread affinity, and NUMA-aware allocations. While
    OS-bypass (DPDK) offers lower absolute jitter, CPU isolation is far easier to deploy in standard Kubernetes
    without custom networking plugins. Pinning the inference server's network I/O and GPU launch threads
    to specific dedicated cores on the same NUMA node as the GPU prevents the Linux scheduler from migrating
    them, eliminating the costly context switch and remote memory access overhead.
  common_mistake: Assuming the GPU is the bottleneck for tail latency and trying to optimize the model
    inference speed (e.g., lower precision, smaller batch size) instead of addressing the host-side OS
    resource contention causing the jitter.
  napkin_math: A thread migration across NUMA nodes can add ~10-20µs per memory access. If a request processing
    pipeline requires 10,000 CPU memory accesses before hitting the GPU, cross-NUMA traffic can accumulate
    up to 200ms of delay. A standard context switch costs ~1-5µs, but cache invalidation after a switch
    costs much more (up to 100µs). By pinning threads and isolating cores, we remove these intermittent
    CPU penalties, dropping the P99 from 400ms down to near the base inference+network baseline (~150ms).
