id: cloud-2102
title: MoE Expert Parallelism vs Tensor Parallelism
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are deploying a 128-expert MoE model for inference across a cluster. Compare expert parallelism
  (each GPU holds a subset of experts, tokens routed via AllToAll) vs tensor parallelism (each expert
  is split across GPUs). Under what conditions does each strategy win?
details:
  realistic_solution: 'Expert parallelism (EP): each GPU holds $E/N$ complete experts. Pro: zero communication
    within expert computation — each GPU runs complete matmuls on its local experts. Con: requires AllToAll
    to dispatch tokens to the right GPU and collect results. Scales well when experts fit on single GPUs.
    Tensor parallelism (TP): each expert is split across GPUs. Pro: handles experts too large for one
    GPU. Con: requires AllReduce within each expert''s forward pass — much more frequent synchronization.
    EP wins when: individual experts fit on one GPU (common for MoE models where each expert is small),
    batch sizes are large (amortizes AllToAll overhead), and GPU count equals or divides expert count
    cleanly. TP wins when: individual experts are too large for one GPU, or when the model has very few
    but very large experts.'
  common_mistake: Defaulting to tensor parallelism because it's familiar from dense models. For MoE, expert
    parallelism is often superior because it avoids the AllReduce overhead within each expert's computation.
  napkin_math: '128-expert model, 16 GPUs: | EP: 8 experts/GPU, 1 AllToAll per MoE layer. AllToAll 4096
    tokens × 8KB = 32 MB. | TP-4 on each expert: 1 AllReduce per expert per layer × 8 experts = 8 AllReduces
    per layer (!). | EP communication: 32 MB/layer. TP: 8 × 32KB = 256 KB/layer but 8× higher latency
    from synchronization points.'
