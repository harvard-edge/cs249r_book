id: cloud-1930
title: Evaluating Spot Instance Cost vs Recovery Overhead
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are orchestrating a 14-day training run for a 13B parameter LLM on 64 A100 (80GB) GPUs (8
  nodes of 8 GPUs). On-demand instances cost $6,300/day total. Spot instances offer a 70% discount ($1,890/day)
  but average 3 preemptions per day per node. Any single preemption halts the entire synchronous training
  job, requiring a reload from the last checkpoint. Assume you checkpoint every 20 minutes, and a cluster
  restart takes 5 minutes. Evaluate the trade-off between the pure On-Demand and pure Spot architectures,
  specifically analyzing the impact on total cost and time-to-market.
details:
  realistic_solution: Calculate the exact cluster-wide overhead (lost work + recovery time) caused by
    node preemptions. Apply this efficiency penalty to the baseline duration, and weigh the definitive
    cost savings against the delayed time-to-market to justify the architectural decision.
  common_mistake: 'Candidates often calculate the 70% cost savings blindly without accounting for the
    cascading impact of global synchronization overhead: a single node preemption halts all 8 nodes, multiplying
    the effective downtime and lost work.'
  napkin_math: '8 nodes * 3 preemptions/day = 24 job interruptions/day. Overhead per interruption: ~10
    mins (avg lost work since 20m checkpoint) + 5 mins (restart) = 15 mins. Total daily overhead = 24
    * 15m = 360m (6 hours). Training efficiency = 18h/24h = 75%. New duration = 14 days / 0.75 = 18.6
    days. Total Spot cost = 18.6 days * $1,890/day = ~$35,154. Compared to On-Demand (14 days * $6,300
    = $88,200), you save $53,046 but delay delivery by 4.6 days.'
