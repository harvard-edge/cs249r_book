id: cloud-2764
title: Guardrail Strictness Trade-off
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Your LLM guardrails block 8% of user queries as potentially unsafe. User satisfaction surveys
  show frustration with false blocks. Options: (A) reduce guardrail sensitivity to block only 3%, (B)
  add a ''soft block'' path that rephrases the query instead of refusing, (C) implement a human-review
  queue for borderline cases. Evaluate.'
details:
  realistic_solution: 'First, analyze the 8% blocked: assume 5% are true policy violations, 3% are false
    positives. Option A (reduce to 3%): To block only 3%, you must let through 5% of currently-blocked
    queries. Some true policy violations (medical advice, data leaks) would reach users — regulatory and
    legal risk. Unacceptable if even 1% of let-throughs are genuine policy violations. Option B (soft
    block + rephrase): Instead of ''I cannot answer that,'' the system rephrases the query to be on-topic
    and explains why. E.g., ''I am not able to give medical advice, but I can help you find a doctor near
    you.'' Maintains safety (still does not give medical advice) while providing a helpful response. User
    satisfaction improves without compromising safety. Adds ~100ms for rephrase generation. Option C (human-review
    queue): Adds 5-30 minute latency for borderline cases. Unacceptable for real-time chat. Could work
    for non-urgent cases but creates a staffing requirement. Recommendation: B is clearly best — it maintains
    safety guarantees while dramatically improving user experience. Implement B for false positives and
    near-misses.'
  common_mistake: Reducing sensitivity (A) to improve user experience without analyzing which blocked
    queries were true positives vs false positives. If 6% were true policy violations and only 2% were
    false positives, reducing to 3% would let policy violations through.
  napkin_math: 'A: 8%→3% blocked, ~2% policy violations now reach users. B: 8% still caught, 3% get helpful
    rephrases, 5% properly blocked. C: minutes of latency for borderline cases.'
