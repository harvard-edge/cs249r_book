id: cloud-2782
title: Cooling Strategy for Water-Scarce Region
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: 'You are building an AI training datacenter in a water-scarce desert region with cheap solar
  power. Options: (A) evaporative cooling (WUE=1.8, PUE=1.2, cheapest), (B) closed-loop liquid cooling
  (WUE=0.1, PUE=1.1, 2x capex), (C) air cooling with heat exchangers (WUE=0, PUE=1.5, moderate cost).
  Evaluate for a 10MW IT load facility.'
details:
  realistic_solution: 'Annual IT energy at 10MW: 10,000 kW × 8,760h = 87,600 MWh. Option A (evaporative):
    Water: 87,600,000 × 1.8 = 157.7M liters/year (~42M gallons). In a water-scarce region, this competes
    with agriculture and residential use — likely faces permit denial or community opposition. Total power:
    10MW × 1.2 = 12MW. Energy cost at $0.05/kWh: $5.26M/yr. Option B (closed-loop liquid): Water: 87,600,000
    × 0.1 = 8.76M liters/year (95% reduction). Total power: 10MW × 1.1 = 11MW (most efficient). Energy
    cost: $4.82M/yr. Capex: 2x of A. Savings in energy: $440K/yr. Water savings: 149M liters/yr. Option
    C (air cooling): Water: 0 liters. Total power: 10MW × 1.5 = 15MW (50% more than B). Energy cost: $6.57M/yr.
    No water controversy but $1.75M/yr more in energy than B. Recommendation: B. The 2x capex is recovered
    through energy savings in ~5 years, water usage is minimal, and it avoids the existential risk of
    permit denial in a water-scarce region.'
  common_mistake: Choosing evaporative cooling (A) because it is cheapest. In a water-scarce region, the
    community and regulatory backlash from consuming millions of liters of water can shut down the project
    entirely.
  napkin_math: 'A: 158M L/yr water, $5.3M energy. B: 9M L/yr, $4.8M energy, 2x capex. C: 0 water, $6.6M
    energy. B best TCO and sustainability balance.'
