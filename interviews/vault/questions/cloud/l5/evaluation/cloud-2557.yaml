id: cloud-2557
title: Cloud Zero Optimizations L5 0
topic: vram-budgeting
status: published
provenance: imported
scenario: For training a 13B model on 32 A100 GPUs, ZeRO-2 suffices for memory but ZeRO-3 would free more
  memory for larger batch sizes. However, ZeRO-3 adds 50% more communication volume. Your training step
  is currently 60% compute, 40% communication. Evaluate whether ZeRO-3 is worth it.
details:
  realistic_solution: 'Current (ZeRO-2): step time = 1.0 (normalized). 60% compute + 40% communication.
    ZeRO-3: communication increases 50% → new communication = 40% × 1.5 = 60%. If compute stays same:
    new step = 60% + 60% = 120% → 1.2x slower per step. But ZeRO-3 frees memory for 2x larger micro-batch
    → 2x fewer gradient accumulation steps → effective throughput: 2x / 1.2x = 1.67x faster. If compute
    scales linearly with batch (often true for matmuls), compute portion also doubles: 120% + 60% = 180%
    per step, but 2x fewer steps → net 2/1.8 = 1.11x faster. ZeRO-3 is modestly beneficial if the freed
    memory enables meaningfully larger batches.'
  common_mistake: Assuming ZeRO-3 is always better because it uses less memory. The extra all-gather communication
    before every layer can significantly slow down training when the network is already a bottleneck.
  napkin_math: 'ZeRO-2: 1.0s step. ZeRO-3: comm +50% → 0.6 + 0.6 = 1.2s. With 2x batch: compute doubles
    → 1.2 + 0.6 = 1.8s, but half the steps. Throughput: 2 / 1.8 = 1.11x improvement. Marginal gain for
    50% more communication.'
