id: cloud-1695
title: GPipe vs 1F1B Schedule Trade-offs in LLM Training
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Your team is training a 175B parameter model on a 64-GPU cluster (8 nodes of 8x A100 80GB GPUs).
  You are using tensor parallelism (TP=8) within each node and pipeline parallelism (PP=8) across nodes.
  The global batch size is 1024 and the microbatch size is 2, yielding 512 microbatches per pipeline step.
  You must evaluate and justify the choice between a flush-based GPipe schedule and a steady-state 1F1B
  (One-Forward-One-Backward) schedule, balancing pipeline bubble overhead against GPU memory utilization.
details:
  realistic_solution: Select the 1F1B schedule. While both schedules yield a pipeline bubble fraction
    of (p-1)/m, GPipe requires storing activations for all 'm' microbatches (512) simultaneously before
    beginning backward passes, which will immediately OOM the 80GB GPUs. 1F1B limits the maximum inflight
    microbatches to 'p' (8), strictly bounding activation memory.
  common_mistake: Candidates evaluate the schedules solely on pipeline bubble size, failing to realize
    that both GPipe and 1F1B have the exact same theoretical bubble fraction, and miss the catastrophic
    memory scaling differences.
  napkin_math: 'Pipeline stages (p) = 8. Microbatches (m) = 1024 / 2 = 512. Bubble fraction = (p - 1)
    / m = (8 - 1) / 512 = 7 / 512 ≈ 1.3%. GPipe Activation Memory scaling: O(m) -> stores 512 microbatches.
    1F1B Activation Memory scaling: O(p) -> stores 8 microbatches. Savings in activation memory storage:
    98.4%.'
