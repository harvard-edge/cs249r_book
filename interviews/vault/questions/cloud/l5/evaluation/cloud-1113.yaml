id: cloud-1113
title: Evaluating DLQ Architectures for High-Throughput Streams
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'A high-throughput ML feature pipeline ingests 100,000 events/sec (2KB per event) from a Kafka
  topic. An upstream schema change caused a 0.5% serialization failure rate. Currently, the pipeline drops
  entire batches on partial failure, breaching the 5-second feature freshness SLA. You must evaluate three
  DLQ (Dead Letter Queue) strategies: (A) Synchronous writes to a PostgreSQL DLQ table, (B) Asynchronous
  writes to a secondary Kafka DLQ topic, or (C) Dropping failed events but logging them to stdout for
  an agent to scrape.'
details:
  realistic_solution: Routing failed events asynchronously to a secondary Kafka DLQ topic. This decouples
    failure handling from the critical path and easily sustains the required throughput without impacting
    the 5-second SLA.
  common_mistake: Choosing synchronous writes to a relational database for the DLQ, which introduces blocking
    I/O, creates massive backpressure, and halts the main ingestion pipeline.
  napkin_math: 100k events/sec * 0.5% failure = 500 failed events/sec. 500 * 2KB = 1MB/sec. Synchronous
    Postgres inserts at 5ms each would take 2.5s to process 1s of failures (500 * 5ms = 2500ms), bottlenecking
    the consumer and destroying the 5s SLA. Async Kafka writes handle 1MB/sec with sub-millisecond overhead.
