id: cloud-sus-61007
title: Chiplet vs Monolithic Roofline Model
topic: chiplet-architecture
status: published
provenance: imported
scenario: 'Construct a roofline model for MI300X that accounts for the NUMA bandwidth hierarchy: local
  XCD HBM, cross-XCD Infinity Fabric, and host DRAM. How does this affect kernel tuning versus H100?'
details:
  realistic_solution: 'MI300X needs a three-tier roofline: (1) local XCD HBM: 662 GB/s ceiling, (2) cross-XCD
    fabric: ~300 GB/s effective for random cross-die access, (3) host: ~500 GB/s via Infinity Fabric.
    Kernels should be tuned against the local-XCD roofline. H100''s single-tier 3.35 TB/s is more predictable
    — memory-bound kernels saturate a flat ceiling regardless of which SMs run them.'
  common_mistake: Using a single roofline with 5.3 TB/s as the memory bandwidth ceiling. This overstates
    achievable bandwidth for any single kernel because no single XCD can access the full aggregate bandwidth.
  napkin_math: 'MI300X compute ceiling: 1307 TFLOPS FP16 (peak). Local XCD BW ceiling: 662 GB/s. Arithmetic
    intensity crossover: 1307×10¹² / 662×10⁹ = 1974 FLOPs/byte. H100 crossover: 989×10¹² / 3350×10⁹ =
    295 FLOPs/byte. MI300X is far more compute-bound per XCD — memory-bound kernels are relatively more
    penalized.'
