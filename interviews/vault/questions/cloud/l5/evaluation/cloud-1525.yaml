id: cloud-1525
title: Evaluating LLM Unlearning Strategies
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team deployed a 7B parameter LLM trained on 1.5 trillion tokens using a 64-GPU H100 cluster.
  Following a major GDPR 'Right to be Forgotten' request, you must remove the statistical influence of
  100,000 documents (~100 million tokens) from the model weights. A complete retrain would cost ~$150,000
  and take nearly 3 weeks. You must evaluate and select an unlearning approach that guarantees compliance
  while minimizing utility degradation on the remaining dataset.
details:
  realistic_solution: Since the model wasn't pre-architected with exact unlearning (like SISA - Sharded,
    Isolated, Sliced, Aggregated), you must use approximate unlearning. The best approach is Gradient
    Ascent on the 'forget' set combined with KL-divergence regularization on a 'retain' set to maintain
    general utility, followed by empirical auditing using Membership Inference Attacks (MIA) to verify
    the unlearning efficacy.
  common_mistake: Assuming simple gradient ascent on the requested documents is sufficient. This aggressively
    degrades general model utility (catastrophic forgetting) and fails to rigorously guarantee the removal
    of the data's statistical influence.
  napkin_math: 'Retraining cost: 6 * 7B params * 1.5T tokens = ~6.3e22 FLOPs. On 64 H100s (assume 300
    TFLOP/s sustained), 6.3e22 / (64 * 300e12) = ~3.28e6 seconds (38 days). Approximate unlearning on
    100M forget tokens + 1B retain tokens = 6 * 7B * 1.1B = ~4.6e19 FLOPs. 4.6e19 / (64 * 300e12) = ~2,400
    seconds (40 minutes). This yields a 1,300x speedup at the cost of requiring rigorous MIA validation.'
