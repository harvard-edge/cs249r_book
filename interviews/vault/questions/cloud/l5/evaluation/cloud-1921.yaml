id: cloud-1921
title: Evaluating Spectral Signatures Computation
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are evaluating defenses against backdoor data poisoning attacks for a cloud-based vision
  API serving a ResNet-50 model. The dataset contains 1.2M images across 1,000 classes, and the model's
  penultimate embedding dimension is 2048. The security team proposes using Spectral Signatures to filter
  the training data by analyzing the covariance matrix of learned representations. The infrastructure
  team pushes back, claiming that computing the SVD over 1.2M high-dimensional vectors is computationally
  prohibitive for a daily retraining pipeline, and suggests using simple activation clipping instead.
  Evaluate the feasibility of the Spectral Signatures approach, identify the actual computational bottlenecks,
  and justify whether the infrastructure team's concern is mathematically valid.
details:
  realistic_solution: Spectral signatures are computed per-class. You center the representations for a
    single class ($N_c \times d$), compute the $d \times d$ covariance matrix, and extract its top right
    singular vector. The infrastructure team's concern is invalid; the computational cost is dominated
    by forming the $d \times d$ covariance matrices, which is highly parallelizable and computationally
    trivial on modern hardware.
  common_mistake: Candidates often agree with the infrastructure team by incorrectly assuming the SVD
    must be computed on the full $N \times d$ dataset matrix ($1.2M \times 2048$), leading to an $O(N
    d^2)$ bottleneck, or they fail to realize the algorithm processes data on a per-class basis.
  napkin_math: 'For 1 class: $N_c = 1,200$ samples, $d = 2048$.

    Forming covariance matrix $X^T X$: $\approx 2 \times N_c \times d^2 = 2 \times 1200 \times 2048^2
    \approx 10$ GFLOPs.

    SVD of $d \times d$ matrix: $\approx O(d^3) = 2048^3 \approx 8.5$ GFLOPs.

    Total compute per class $\approx 18.5$ GFLOPs.

    For 1,000 classes: $18.5$ TFLOPs.

    An NVIDIA T4 GPU delivers 8.1 TFLOPs (FP32), meaning the entire defense runs in $\sim 2.5$ seconds.
    The compute overhead is negligible.'
