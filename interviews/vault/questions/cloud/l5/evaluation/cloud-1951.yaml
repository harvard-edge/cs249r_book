id: cloud-1951
title: Evaluating Static Graphs for DLRM Inference
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team is deploying a massive Deep Learning Recommendation Model (DLRM) to serve 100,000
  QPS on a fleet of NVIDIA A100 GPUs. The model architecture is fixed, utilizing strict batch sizes (e.g.,
  batch 2048) and features numerous small, memory-bound MLP layers alongside massive embedding table lookups.
  The engineering team is debating whether to serve the model using dynamic execution (e.g., PyTorch eager
  mode) for flexibility or to ahead-of-time compile it into a static computation graph (e.g., using TensorRT
  or XLA). Evaluate the trade-offs and justify the architectural decision based on kernel launch overheads
  and memory allocation.
details:
  realistic_solution: Adopt a static computation graph approach. A static graph allows the compiler to
    perform aggressive kernel fusion (combining multiple MLP layers and activation functions into a single
    kernel) and ahead-of-time memory planning, completely eliminating Python execution overhead and minimizing
    expensive global memory round-trips.
  common_mistake: Candidates often assume that for large models, GPU compute dominates and framework overhead
    is negligible, failing to realize that DLRMs are bottlenecked by kernel dispatch overhead for small
    MLP layers and memory bandwidth.
  napkin_math: 'Dynamic execution: 10 small MLP operations each have ~5us kernel launch overhead (50us
    total overhead) + 20us total compute = 70us latency. Static execution (Fusion): Fused into 1 kernel
    = 5us launch + 15us compute (due to intermediate register reuse) = 20us latency. Speedup = 70us /
    20us = 3.5x reduction in MLP latency.'
