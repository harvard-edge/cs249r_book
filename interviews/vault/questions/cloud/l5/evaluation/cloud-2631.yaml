id: cloud-2631
title: Handling Low Agreement in Production Labeling
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your team measures κ=0.45 (moderate) for a 10-class intent classification task. Labeling 50K
  samples costs $200K. Option A: relabel disagreements with expert adjudicators (+$80K). Option B: accept
  noisy labels and train with label smoothing. Option C: reduce to 6 classes (merge confusable intents)
  expecting κ=0.75. Which strategy?'
details:
  realistic_solution: 'Option C is likely optimal. κ=0.45 on 10 classes means annotators fundamentally
    cannot distinguish certain intents — no amount of relabeling fixes an ambiguous taxonomy. Option A
    ($80K for adjudication) fixes surface disagreements but if the label schema itself is ambiguous, experts
    will also disagree. You spend $80K and may only reach κ=0.55. Option B (noisy labels + label smoothing)
    is cheap but trains the model on confused signal — the model inherits the annotators'' confusion,
    and label smoothing just prevents overconfidence without fixing the underlying issue. Option C addresses
    the root cause: merge intents that humans cannot distinguish (e.g., ''complaint'' vs ''negative feedback'').
    κ=0.75 means cleaner training signal, likely yielding better real-world accuracy with 6 reliable classes
    than 10 noisy ones.'
  common_mistake: Throwing more money at labeling when the root cause is an ambiguous taxonomy. If humans
    cannot agree on the label, the label categories need redesigning.
  napkin_math: 10 classes at κ=0.45 → ~55% reliable labels. 6 classes at κ=0.75 → ~80% reliable labels.
    Model accuracy roughly tracks label quality.
