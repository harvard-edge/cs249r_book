id: cloud-1716
title: Data Center PUE vs Grid Carbon Intensity
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: You are planning to deploy a continuous 10 MW AI training cluster and must choose between two
  colocation facilities. Facility A has a PUE of 1.5 but uses cheap, highly renewable energy ($0.05/kWh,
  50 gCO2/kWh). Facility B uses advanced free-air cooling to achieve a world-class PUE of 1.1, but relies
  on a standard mixed grid ($0.10/kWh, 300 gCO2/kWh). Evaluate the annual operational cost and carbon
  footprint to justify the optimal site selection for the deployment.
details:
  realistic_solution: Calculate the total facility power (Compute × PUE) to find the total annual energy
    consumption. Apply the local cost and carbon intensity rates. Facility A, despite worse PUE (higher
    energy waste on cooling), is significantly cheaper to run and emits a fraction of the carbon due to
    its extremely clean and cheap grid.
  common_mistake: Candidates often assume that a lower PUE automatically makes a data center more sustainable
    or cost-effective, ignoring the carbon intensity and unit cost of the underlying power grid.
  napkin_math: 'Compute Load = 10 MW. Annual hours = 8760.

    Facility A: Total Power = 10 * 1.5 = 15 MW. Annual Energy = 15 * 8760 = 131.4 GWh. Cost = 131.4M kWh
    * $0.05 = $6.57M. Carbon = 131.4M kWh * 50g = 6,570 tCO2.

    Facility B: Total Power = 10 * 1.1 = 11 MW. Annual Energy = 11 * 8760 = 96.36 GWh. Cost = 96.36M kWh
    * $0.10 = $9.64M. Carbon = 96.36M kWh * 300g = 28,908 tCO2.

    Facility A saves ~$3M and ~22,000 tons of CO2 annually compared to Facility B.'
