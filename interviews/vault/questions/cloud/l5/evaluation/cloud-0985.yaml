id: cloud-0985
title: Evaluating Spatial Placement for Fused Attention
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are mapping a Transformer layer onto an AI accelerator containing a 256x256 Matrix Multiply
  Unit (MXU) (100 TFLOPS peak) and a Vector Processing Unit (VPU) (2 TFLOPS peak for transcendentals).
  A forward pass requires 50 Tera-FLOPs for the dense FFN and 500 Giga-FLOPs for the Attention Softmax.
  Strategy A maps both sequentially on the MXU to avoid data movement, where Softmax runs at a degraded
  5 TFLOPS effective throughput. Strategy B spatially pipelines the execution: FFN on the MXU and Softmax
  on the VPU, requiring 50 MB of intermediate data transfer over a 500 GB/s internal SRAM bus. Evaluate
  the strategies and identify the optimal placement to minimize end-to-end execution time per block.'
details:
  realistic_solution: Strategy B (Spatial Pipelining) is optimal. By mapping the dense matmuls to the
    MXU and offloading Softmax to the VPU, the VPU execution time and the data transfer latency are completely
    hidden behind the MXU's longer execution time.
  common_mistake: Candidates often choose Strategy A, assuming that avoiding data movement over the internal
    bus is always optimal, failing to calculate the severe underutilization penalty of running scalar
    transcendental functions on a rigid systolic array.
  napkin_math: 'Strategy A: FFN = 50 TFLOPS / 100 TFLOPS = 500 ms. Softmax = 500 GFLOPS / 2 TFLOPS = 250
    ms. Total = 750 ms.

    Strategy B: FFN on MXU = 500 ms. Softmax on VPU = 500 GFLOPS / 2 TFLOPS = 250 ms. Data Transfer =
    50 MB / 500 GB/s = 0.10 ms. Total Pipelined Time = max(500 ms, 250 ms + 0.10 ms) = 500 ms. Strategy
    B saves 250 ms per layer (a 33% overall speedup).'
