title: Evaluating Optimal Checkpoint Frequency at Scale
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are evaluating the fault-tolerance strategy for a 16,384 GPU cluster (H100s) training a
  1T parameter model. The infrastructure consists of 2,048 nodes (8 GPUs each). The manufacturer states
  the Mean Time Between Failures (MTBF) per node is 40,000 hours. Writing a synchronous checkpoint to
  the distributed file system takes exactly 5 minutes. Evaluate the optimal checkpointing interval to
  maximize training goodput, and justify your design.
details:
  realistic_solution: 'Calculate system MTBF by dividing the node MTBF by the number of nodes: 40,000
    hours / 2,048 = 19.5 hours. Apply Young''s or Daly''s formula to balance checkpoint overhead against
    expected lost compute time. The optimal interval is approximately 1.8 hours.'
  common_mistake: Candidates calculate the checkpoint interval based on arbitrary heuristics (e.g., 'once
    an epoch') or fail to aggregate individual node MTBF to determine the system-level failure rate, vastly
    overestimating cluster reliability.
  napkin_math: 'System MTBF = 40,000 hrs / 2,048 nodes ≈ 19.5 hrs = 1,170 mins.

    Optimal Interval T = √(2 × Checkpoint_Time × System_MTBF)

    T = √(2 × 5 mins × 1,170 mins) = √11,700 ≈ 108 minutes (1.8 hours).'
