id: cloud-1700
title: Evaluating Drift Metrics for High-Volume Credit Scoring
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your fintech processes 10M credit card applications daily. The MLOps team wants to detect distribution
  shifts in categorical features (e.g., 'employment_sector') and binned continuous features (e.g., 'income_bracket')
  to trigger model retraining. A junior engineer proposes using the two-sample Kolmogorov-Smirnov (K-S)
  test for all features due to its rigorous statistical foundation. Evaluate this proposal against using
  the Population Stability Index (PSI), focusing on alert fatigue at this scale and the specific data
  types involved.
details:
  realistic_solution: Reject the K-S test for this scale and data type. Use PSI instead. PSI is mathematically
    independent of sample size and natively handles binned/categorical data. Standard industry thresholds
    (PSI < 0.1 means stable, > 0.2 means significant shift) provide robust, actionable alerts without
    hypersensitivity.
  common_mistake: Failing to realize that p-value based statistical tests like K-S become hypersensitive
    at massive sample sizes (N=10M), leading to constant false-positive alerts for operationally meaningless
    variations.
  napkin_math: For K-S with N=10M, the critical value at alpha=0.05 is ~1.36 * sqrt(2/N) = 1.36 * sqrt(2/10,000,000)
    ≈ 0.0006. A max CDF difference of > 0.06% triggers an alert! For PSI, a bin shifting from 20% to 21%
    contributes (0.21 - 0.20) * ln(0.21/0.20) ≈ 0.01 * 0.048 = 0.00048 to the index, keeping the total
    well below the standard 0.1 alert threshold.
