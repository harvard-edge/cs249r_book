id: cloud-1881
title: Evaluating Sharded Checkpointing for 70B LLMs
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 70B parameter model on a 1024-GPU H100 cluster (128 nodes, 400Gbps network).
  Checkpointing every 500 steps using global checkpointing (gathering state to rank 0) takes over 45 minutes
  and frequently causes CPU RAM out-of-memory errors on the head node. You are tasked with evaluating
  a migration to distributed sharded checkpointing. Justify the architectural shift by comparing network
  bottlenecks, storage IO latency, and the specific operational trade-offs involved when resuming training
  on a different cluster size.
details:
  realistic_solution: Implement PyTorch DCP (Distributed Checkpoint) or FSDP sharded state dicts. This
    distributes the 1.1TB total state (params, grads, optimizer) across 1024 workers, turning a single-node
    write bottleneck into 1024 parallel writes of ~1.1GB each directly to distributed storage.
  common_mistake: Focusing only on the head node's memory limits while failing to evaluate the aggregate
    parallel IO bandwidth benefits, or forgetting that pure sharded checkpoints cannot be trivially resumed
    on a different number of GPUs without an offline conversion step.
  napkin_math: 'Total state: 70B params * 16 bytes (FP32 Adam + FP16/BF16 weights) = ~1.12TB. Global write:
    Rank 0 writes 1.12TB to cloud storage at max 5GB/s = 224 seconds minimum (often heavily network/CPU
    bounded, taking 10+ mins). Sharded write: 1024 GPUs write ~1.1GB each. With parallel writes at a conservative
    200MB/s per GPU, total IO time drops to ~5.5 seconds.'
