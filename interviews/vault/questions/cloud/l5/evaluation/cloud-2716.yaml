id: cloud-2716
title: Fleet Refresh Timing
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Your 2,000-GPU cluster is 3 years old. Failure rate has doubled in the last quarter, suggesting
  entry into the wear-out phase. Options: (A) replace the full fleet now at $50M, (B) replace only failed
  units reactively, (C) replace in rolling batches of 500 over 12 months. Evaluate.'
details:
  realistic_solution: 'The doubled failure rate signals wear-out onset; it will only accelerate. (A) Full
    replacement ($50M upfront) gives a clean fleet but requires massive capital and a significant migration
    period where capacity drops. (B) Reactive replacement seems cheap but is the worst option: wear-out
    failures accelerate exponentially, each failure disrupts training (lost GPU-hours worth $3-10K each),
    and you end up replacing the same number of GPUs anyway — just with maximum disruption. (C) Rolling
    replacement is the best trade-off: replace the oldest/most-failing 500 first, keeping 75% capacity
    online. The new GPUs go through burn-in while old ones still run. Over 12 months, you spread the $50M
    capex and maintain continuous training capacity. This also lets you adopt newer GPU generations in
    later batches.'
  common_mistake: Waiting too long and replacing reactively. Once wear-out begins, failure rate accelerates
    — reactive replacement means constant disruption and cascading training failures.
  napkin_math: 'Accelerating failures at year 3+: maybe 5%→10%→20% quarterly. At 20%, that is 400 GPUs
    failing per quarter — reactive replacement becomes untenable. Rolling 500/quarter maintains uptime.'
