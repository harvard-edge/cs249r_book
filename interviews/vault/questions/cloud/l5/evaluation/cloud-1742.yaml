schema_version: 1
id: cloud-1742
title: Image Preprocessing Bottleneck in GPU Serving
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are deploying an image classification service on an AWS p4d.24xlarge instance (8x A100 GPUs,
  96 vCPUs). GPU inference takes 5ms per batch of 32 images, but end-to-end latency is 45ms. Profiling
  reveals that JPEG decoding and resizing via Python PIL take 35ms per batch on the CPU, with 5ms of network
  I/O. Your team proposes upgrading to H100 GPUs to meet a strict 15ms end-to-end latency Service Level
  Objective (SLO). Evaluate this hardware upgrade proposal and justify a more cost-effective architectural
  design to meet the SLO.
details:
  realistic_solution: Reject the H100 upgrade. The system is heavily CPU-bound with GPU utilization at
    only 11%. Instead, offload JPEG decoding and image resizing to the GPU using libraries like NVIDIA
    DALI or nvJPEG, or optimize the CPU pipeline using libjpeg-turbo and OpenCV. This shifts the 35ms
    CPU penalty to <5ms on the GPU or optimized CPU threads, comfortably meeting the 15ms SLO.
  common_mistake: Approving the GPU upgrade or focusing on model quantization, ignoring Amdahl's Law which
    dictates that optimizing the 5ms GPU execution will yield minimal end-to-end improvements when the
    CPU is the primary bottleneck.
  napkin_math: Current E2E = 5ms (net) + 35ms (CPU prep) + 5ms (GPU inf) = 45ms. GPU is idle 89% of the
    time. If H100 makes inference instantaneous (0ms), E2E is still 40ms. By offloading preprocessing
    to the GPU (taking ~3ms), E2E becomes 5ms (net) + 3ms (GPU prep) + 5ms (GPU inf) = 13ms, successfully
    meeting the 15ms SLO.
