id: cloud-1253
title: Evaluating Topologies for Cross-Rack Redundancy
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are designing the deployment topology for a distributed embedding lookup service spanning
  120 nodes (each with 1 TB RAM, 64-core CPUs). The service requires 99.99% availability. Your datacenter
  has 10 racks available, each with a top-of-rack (ToR) switch connected to the spine. Power is distributed
  such that racks 1-5 share Power Distribution Unit (PDU) A, and racks 6-10 share PDU B. You must decide
  between an active-active replica placement spreading replicas uniformly across all 10 racks or isolating
  primary/replica clusters strictly to specific PDU boundaries. How do you evaluate the trade-offs regarding
  failure domain isolation, cross-rack network traffic, and correlated failure risks when a PDU trips?
details:
  realistic_solution: Designate PDU A and PDU B as explicit failure domains. Ensure every data shard has
    at least one replica strictly in PDU A and one in PDU B, consciously trading higher cross-PDU write
    latency for a guarantee of data survival against correlated power failures.
  common_mistake: Placing replicas uniformly across all racks without considering the higher-level PDU
    failure boundary, leading to a correlated failure where losing PDU A instantly wipes out 50% of the
    nodes and makes roughly 25% of the shards completely unavailable.
  napkin_math: 'Uniform spread: 60 nodes in PDU A. If shards have 2 replicas placed randomly, Prob(both
    replicas in PDU A) = (60/120) * (59/119) = 24.7%. A single PDU failure causes ~25% data unavailability.
    Domain-aware spread: Replica 1 in PDU A, Replica 2 in PDU B. Prob(both replicas lost in single PDU
    failure) = 0%.'
