id: cloud-1276
title: Evaluating Fault Models for Large-Scale GPU Clusters
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your distributed training cluster of 4,096 H100 GPUs experiences roughly 100 hardware-related
  errors per day. The infrastructure team proposes a generic 'fail-stop' fault model for all errors, triggering
  a global checkpoint restart (which takes 5 minutes). However, profiling reveals 80% of these errors
  are transient single-bit ECC errors, 15% are NVLink lane degradations causing a 20% bandwidth drop,
  and only 5% are permanent GPU board failures. Evaluate the proposed fail-stop model versus a multi-tiered
  fault model, justifying your design in terms of training throughput for a 14-day run.
details:
  realistic_solution: 'Adopt a multi-tiered fault model: map transient faults (ECC) to hardware-level
    correction, degradation faults (NVLink) to dynamic topology routing or micro-batch adjustments, and
    reserve the fail-stop model (global restart) solely for the 5% permanent GPU failures.'
  common_mistake: Treating all faults as fail-stop events, which triggers expensive global rollbacks for
    minor, localized, or transient errors, drastically reducing effective cluster goodput.
  napkin_math: 'Fail-stop model downtime: 100 faults/day * 5 min = 500 min/day (34.7% of 1440 mins). Tiered
    model downtime: 5 permanent faults/day * 5 min = 25 min/day (1.7%). The tiered fault model improves
    daily goodput by 33%.'
