id: cloud-1915
title: Evaluating OS Page Cache for Stochastic ML Training
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are designing the data loading pipeline for a large-scale Vision Transformer (ViT-H) training
  job on a 100 TB image dataset. The training cluster uses 8x H100 GPU nodes, each equipped with 4x NVMe
  Gen5 SSDs capable of 12 GB/s sequential reads each (48 GB/s total node bandwidth). The infrastructure
  team proposes relying on standard POSIX file reads of individual image files and the Linux OS page cache,
  arguing the raw NVMe speed is more than sufficient to feed the GPUs, which require 8 GB/s of data throughput.
  Evaluate this proposal, specifically addressing the OS assumptions of spatial and temporal locality
  versus the stochastic nature of ML training.
details:
  realistic_solution: Reject the standard POSIX individual file approach. Implement a sequential container
    format (e.g., WebDataset or TFRecord) to restore spatial locality on disk, use Direct I/O (O_DIRECT)
    to bypass the OS page cache entirely, and perform shuffling locally in RAM.
  common_mistake: Assuming raw sequential NVMe bandwidth guarantees sufficient throughput, failing to
    recognize that SGD's completely random access defeats OS read-ahead heuristics (spatial locality)
    and eviction policies (temporal locality), causing severe I/O thrashing.
  napkin_math: Total raw NVMe bandwidth = 4 * 12 GB/s = 48 GB/s. With 1MB read-ahead for 150KB images,
    850KB is wasted (150KB / 1024KB = ~15% utilization). Useful throughput = 48 GB/s * 0.15 = 7.2 GB/s.
    This falls short of the required 8 GB/s to feed the 8x H100 GPUs, causing starvation despite 48 GB/s
    raw theoretical IO.
