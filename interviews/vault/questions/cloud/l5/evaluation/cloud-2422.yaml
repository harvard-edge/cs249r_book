id: cloud-2422
title: W8A8 PTQ Extreme Activation Outliers
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You deploy a 130B parameter LLM for cloud summarization. A naive INT8 PTQ (W8A8) reduces the
  memory footprint from 260GB to 130GB, fitting on 2x A100 80GB. However, perplexity spikes from 5.4 to
  18.2. You find that 0.1% of activation channels have values up to 120.0, while the rest are in [-2,
  2].
details:
  realistic_solution: Naive per-tensor or per-token activation quantization fails because massive outliers
    in specific channels force the quantization scale to be huge, crushing the precision of the remaining
    99.9% of channels into a single bucket. The architectural solution is to migrate the quantization
    difficulty from activations to weights (e.g., SmoothQuant). You mathematically scale down the outlier
    activation channels by a factor `s` and scale up the corresponding weight channels by `s`. Since weights
    are much easier to quantize (per-channel quantization is hardware-friendly), this preserves the INT8
    matrix multiplication pipeline without accuracy degradation.
  common_mistake: Clipping the activations dynamically at runtime, which completely destroys the semantic
    information in the outlier channels.
  napkin_math: Activation range [-120, 120]. INT8 range [-127, 127]. Scale = 120/127 = 0.94. A normal
    value of 1.5 becomes 1.5/0.94 = 1.59 -> rounded to 2. Error is ~25%. If we scale outliers by 1/10,
    new range is [-12, 12]. Scale = 12/127 = 0.094. Value 1.5 becomes 15.9 -> 16. 16 * 0.094 = 1.504.
    Error is < 0.3%.
