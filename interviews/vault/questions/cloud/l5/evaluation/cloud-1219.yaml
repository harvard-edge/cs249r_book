id: cloud-1219
title: Evaluating Post-Processing for Equalized Odds in Loan Approvals
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are evaluating an automated loan approval ML model deployed on a cloud inference cluster
  handling 10,000 requests/sec. An audit reveals disparities between demographic groups A and B. For Group
  A, the True Positive Rate (TPR) is 90% and False Positive Rate (FPR) is 10%. For Group B, TPR is 80%
  and FPR is 20%. Legal requires satisfying the 'Equalized Odds' fairness metric (equal TPR and equal
  FPR across groups) before the model can be scaled to 50,000 requests/sec. You must evaluate the trade-offs
  of achieving this via post-processing threshold adjustments versus retraining the model with adversarial
  fairness constraints.
details:
  realistic_solution: Calculate the ROC convex hull for both groups and find the intersection point that
    aligns TPR and FPR. Strictly matching Group B's rates via post-processing forces Group A's TPR from
    0.9 to 0.8 and FPR from 0.1 to 0.2, dropping overall accuracy from 85% to 80% — generating 500 incorrect
    loan decisions per 10,000 requests. If this exceeds an accuracy SLA, consider relaxed Equalized Odds
    with a tolerance band, or invest in model improvements that lift Group B's performance rather than
    degrading Group A's.
  common_mistake: Confusing Equalized Odds with Demographic Parity, or failing to realize that exact Equalized
    Odds via post-processing often requires degrading the performance of the better-performing group,
    which may violate business accuracy requirements.
  napkin_math: 'Assuming 50% base rate for both groups: Group A accuracy = 0.9*0.5 + (1-0.1)*0.5 = 0.90.
    Group B accuracy = 0.8*0.5 + (1-0.2)*0.5 = 0.80. Overall = 0.85. To strictly match Group B''s rates
    via post-processing, Group A''s TPR is artificially lowered to 0.8 and FPR raised to 0.2. Group A''s
    new accuracy = 0.8*0.5 + (1-0.2)*0.5 = 0.80. Overall system accuracy drops by 5% to 80%, representing
    500 incorrect loan decisions per 10,000 requests.'
