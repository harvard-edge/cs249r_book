schema_version: 1
id: cloud-2392
title: Decoupling Storage in High-Frequency Deployments
topic: model-size-estimation
status: published
provenance: imported
scenario: Your MLOps team supports 100 data scientists deploying 40 model updates daily. Currently, every
  deployment bakes the PyTorch runtime, CUDA libraries, and the 5GB model weights into a monolithic 15GB
  Docker image. CI/CD pipelines take 60 minutes to push to the registry, and Kubernetes cluster scale-outs
  take 15 minutes to pull the image.
details:
  realistic_solution: 'Decouple the infrastructure environment from the model artifacts. Architecture:
    1) Create standard base images (e.g., `pytorch-inference:v2`) containing CUDA and dependencies (10GB).
    Pre-pull (DaemonSet) or cache these base images on all K8s GPU nodes. 2) Store model weights (5GB)
    directly in a Model Registry backed by object storage (S3/GCS). 3) Modify the deployment pipeline
    to only update a lightweight YAML manifest pointing to the new S3 URI. 4) Use an init-container in
    the pod to download the weights from S3 at pod startup, or stream them via a CSI driver.'
  common_mistake: Using Docker layer caching in CI/CD, which only speeds up the build step but doesn't
    solve the massive network transfer bottleneck to the K8s nodes.
  napkin_math: 'Current state: 40 deployments * 15 GB = 600 GB transferred daily. K8s pull time over 1
    Gbps network: 15 GB * 8 bits / 1 Gbps = 120 seconds per node. If scaling across 10 nodes, registry
    bandwidth becomes a bottleneck. Decoupled state: Base image is cached (0 seconds). Weights download
    from S3 (highly parallel) at 5 Gbps = 5 GB * 8 / 5 = 8 seconds. Deployment time drops from 15 minutes
    to < 10 seconds.'
