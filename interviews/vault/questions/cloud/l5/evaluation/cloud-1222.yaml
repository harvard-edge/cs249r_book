title: Exabyte-Scale LLM Data Erasure Coding Migration
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your infrastructure team proposes migrating a 200 PB active ML training dataset (stored on HDDs
  for LLM pre-training) from 3-way replication to Reed-Solomon RS(10,4) erasure coding. The goal is to
  reduce storage costs while maintaining 11 nines of durability. As a Staff ML Engineer, evaluate the
  trade-offs of this migration on distributed training throughput, specifically analyzing the impact of
  read latency and network saturation during hardware failures.
details:
  realistic_solution: 'Reject the migration for the active training tier. Instead, use a tiered approach:
    keep active datasets on 3-way replication (or distributed NVMe caches) for high read throughput and
    predictable latency, and apply RS(10,4) only to cold tiers like archived checkpoints or raw, un-preprocessed
    logs.'
  common_mistake: Focusing solely on the storage footprint reduction and ignoring the massive network
    amplification and CPU decoding overhead required during disk failures, which can saturate the cluster
    network and starve active ML training jobs of data.
  napkin_math: 'Storage footprint for 200 PB: 3-way replication = 600 PB. RS(10,4) = 200 * (14/10) = 280
    PB (Savings: 320 PB). However, rebuild penalty for 1 lost RS(10,4) chunk: requires reading 10 chunks
    across the network, creating a 10x read amplification versus 1x for replication, easily saturating
    100Gbps links during a node failure.'
