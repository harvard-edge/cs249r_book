schema_version: 1
id: cloud-2502
title: Mixed-Precision Federated Aggregation
topic: federated-learning
status: published
provenance: imported
scenario: A cloud system aggregates weights for Federated Learning on Cortex-M0+ devices (no FPU). The
  edge model must be INT8 for inference speed and memory. However, computing gradients and updating weights
  strictly in INT8 leads to catastrophic catastrophic quantization error and training divergence. The
  cloud must orchestrate updates without requiring FP32 on the edge.
details:
  realistic_solution: The architecture must utilize mixed-precision co-design. The edge device uses INT8
    for the forward pass (inference), but uses 16-bit fixed-point (INT16) or block floating-point arithmetic
    exclusively for the trainable layer's gradients and weight updates. The edge transmits these INT16
    weight deltas to the cloud. The cloud, having abundant compute, receives the INT16 updates, casts
    them to FP32, performs the global aggregation (FedAvg), updates the global FP32 model, applies Post-Training
    Quantization (PTQ) to convert it back to INT8, and pushes the INT8 model back to the edge.
  common_mistake: Forcing the edge device to emulate FP32 in software for the backward pass, causing inference
    latency to spike by 50x and draining the battery.
  napkin_math: Software FP32 emulation on Cortex-M0+ takes ~100 cycles per instruction vs 1 cycle for
    INT8/INT16 ALU ops. If a backward pass requires 50,000 MACs, FP32 takes 5M cycles (100ms at 50MHz).
    INT16 takes 50k cycles (1ms). By using INT16 locally, we preserve accuracy (16 bits provides enough
    dynamic range for small gradients) while maintaining a 100x speedup over FP32 emulation. Cloud handles
    the heavy FP32 aggregation.
