schema_version: 1
id: cloud-r2-41030
title: GPU Preemption for Priority Inference
topic: scheduling-resource-management
status: published
provenance: imported
scenario: Your GPU cluster serves both latency-sensitive inference and batch training workloads. A high-priority
  inference model needs 8 MI300X GPUs immediately, but all GPUs are running training jobs. Design a preemption
  strategy that minimizes wasted compute while meeting the inference SLA.
details:
  realistic_solution: 'Tiered preemption strategy: (1) Check for checkpointable training jobs: use DMTCP
    or application-level checkpointing. Signal the 8 lowest-priority training processes to checkpoint
    (SIGUSR1). Give 2-minute deadline. Jobs write checkpoint to fast NVMe storage (MI300X nodes typically
    have local NVMe). After checkpoint, terminate and free GPUs. Total preemption time: ~2-3 minutes.
    (2) If inference SLA requires <1 minute: use NVIDIA MPS (Multi-Process Service) to temporarily share
    GPUs. The inference model loads onto GPUs already running training, gets priority SM scheduling. Training
    throughput drops ~40% but inference starts immediately. Once dedicated GPUs free up, migrate inference
    to dedicated allocation. (3) Prevention: reserve a small pool (8-16 GPUs) as ''burst capacity'' for
    high-priority inference, never allocated to training. These GPUs serve inference immediately with
    zero preemption. Cost: 8 idle GPUs × $3/hr = $24/hr — cheap insurance for SLA compliance. Production
    systems (Google Borg, Microsoft Philly) use priority classes: inference=highest, interactive training=medium,
    batch training=lowest (preemptible).'
  common_mistake: Killing training jobs immediately — this wastes all compute since the last checkpoint
    (potentially hours of training).
  napkin_math: '8 MI300X preemption: checkpoint 2 min + restart 1 min = 3 min SLA gap. Wasted training
    compute: 8 GPUs × 3 min = 24 GPU-min. Without checkpointing: 8 GPUs × 2 hr (since last checkpoint)
    = 16 GPU-hrs wasted.'
