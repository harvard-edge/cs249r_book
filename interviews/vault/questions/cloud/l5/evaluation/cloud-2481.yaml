schema_version: 1
id: cloud-2481
title: Edge-Cloud Hybrid Video Break-Even
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You manage 5,000 smart city traffic cameras (1080p, 30fps). Option A streams H.264 video to
  cloud GPUs for YOLOv8 object detection (requires 2Mbps per stream, cloud GPU costs $1.50/hr handling
  20 streams, bandwidth is $0.05/GB). Option B deploys edge NPUs ($150 each, 15 TOPS) running INT8 quantized
  YOLOv8, sending only metadata (10Kbps) to the cloud.
details:
  realistic_solution: Build a Total Cost of Ownership (TCO) model over 3 years, analyzing the tradeoff
    between Edge CapEx vs Cloud OpEx (Compute + Bandwidth). With Option B, the hardware-algorithm co-design
    requires evaluating whether an INT8 quantized model on a 15 TOPS NPU maintains the required mAP for
    traffic detection compared to the FP16 cloud model. If the accuracy drop is acceptable, the edge deployment
    dramatically reduces operational costs. The deployment pipeline must also handle remote OTA updates
    for the edge NPUs.
  common_mistake: Failing to account for the continuous cost of network egress/ingress bandwidth, which
    often dwarfs cloud compute costs for video streams.
  napkin_math: 'Option A (Cloud): Compute = 5,000/20 = 250 GPUs * $1.50/hr * 8760 = $3.28M/yr. Bandwidth
    = 5,000 * 2Mbps = 10Gbps = 1.25GB/s = 39.4 PB/yr * $0.05/GB = $1.97M/yr. Total Cloud OpEx = $5.25M/yr.
    Option B (Edge): CapEx = 5,000 * $150 = $750K (one-time). Edge ROI break-even is reached in less than
    2 months ($750K / ($5.25M/12)).'
