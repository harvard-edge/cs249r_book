id: cloud-2206
title: The Energy Roofline
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'Your data center team asks you to optimize inference not for throughput or latency, but for
  energy efficiency (tokens per joule). You have two configurations: Config A runs at 400W and produces
  2,000 tokens/sec. Config B runs at 250W and produces 1,400 tokens/sec. Config A has higher throughput
  and Config B has lower power. Which is more energy-efficient? Now extend the roofline model to include
  energy: how would you construct an ''energy roofline'' that reveals whether a workload is compute-limited,
  bandwidth-limited, or power-limited?'
details:
  realistic_solution: 'First, the comparison: Config A = 2000/400 = 5.0 tokens/joule. Config B = 1400/250
    = 5.6 tokens/joule. Config B is 12% more energy-efficient despite lower throughput. The energy roofline
    extends the classical roofline by adding a third ceiling: the power limit. The three ceilings are:
    (1) Compute ceiling: peak FLOPS (limited by ALU count x frequency), (2) Bandwidth ceiling: peak BW
    x arithmetic intensity, (3) Power ceiling: TDP / (energy per FLOP at current frequency). For low-AI
    workloads (memory-bound), energy is dominated by data movement (DRAM read = ~20 pJ/bit). For high-AI
    workloads (compute-bound), energy is dominated by computation (FP16 MAC = ~0.4 pJ). The energy roofline
    reveals a sweet spot: at moderate arithmetic intensity, there exists a frequency where the workload
    is balanced across all three ceilings. Operating at this point maximizes tokens/joule. DVFS (Dynamic
    Voltage and Frequency Scaling) is the mechanism: reducing frequency reduces compute power cubically
    (P ~ V^2 x f ~ f^3 at constant V/f ratio) but doesn''t affect memory bandwidth power, so memory-bound
    workloads should run at minimum frequency.'
  common_mistake: Optimizing for perf/watt by simply lowering clock frequency. This ignores that memory
    bandwidth doesn't scale with clock, so memory-bound workloads gain nothing from frequency reduction
    while compute-bound workloads degrade linearly.
  napkin_math: 'Config A: 400W at 2000 tok/s = 5.0 tok/J = 200mJ/token. Config B: 250W at 1400 tok/s =
    5.6 tok/J = 179mJ/token. Energy per DRAM read: 20 pJ/bit x 16 bits = 320 pJ/element. A memory-bound
    decode step reading 70B weights: 70B params x 2 bytes x 8 bits x 20 pJ = 22.4 J per decode step. Because
    memory bandwidth is fixed, increasing the power limit from 250W to 400W provides zero speedup for
    a purely memory-bound workload. Running at 400W for the same 90ms latency consumes 400W x 90ms = 36J,
    whereas 250W x 90ms = 22.5J. Memory-bound workloads are more efficient at lower compute power.'
