id: cloud-1473
title: Stateful Serving Fault Tolerance
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are architecting the fault tolerance strategy for a stateful serving fleet running Llama-3-70B
  for agentic workflows, where context lengths frequently reach 64K tokens. The fleet utilizes spot instances
  to reduce costs, leading to frequent preemptions. A single 64K token session's KV cache is approximately
  21 GB. Evaluate the trade-offs between continuous per-token checkpointing to a centralized Redis cluster,
  chunk-based periodic checkpointing to local NVMe with async cross-node replication, and relying solely
  on full recomputation. Justify your optimal checkpointing frequency and storage backend given 400Gbps
  network links and a strict Recovery Time Objective (RTO) of 2.0 seconds.
details:
  realistic_solution: Implement a chunk-based asynchronous checkpointing strategy (e.g., every 2K-4K tokens)
    to a distributed RAM store or NVMe with fast network replication. This amortizes IOPS while ensuring
    that upon failure, fetching the ~21GB cache and re-prefilling only the small uncheckpointed tail comfortably
    fits within the 2-second RTO.
  common_mistake: Candidates often propose continuous (per-token) checkpointing to minimize token loss,
    failing to account for the massive IOPS/RPC overhead that degrades generation throughput. Alternatively,
    they rely on full recomputation, underestimating the latency of a 64K token prefill.
  napkin_math: 'KV per token: 80 layers * 8 KV heads * 128 dim * 2 (K,V) * 2 bytes = 327KB/token. 64K
    tokens = ~21GB. Transferring 21GB over 400Gbps (50GB/s max, ~40GB/s practical) takes ~0.5s. Recomputing
    a lost 4K token chunk takes ~0.5s prefill. Total recovery time: 0.5s (fetch) + 0.5s (recompute) =
    1.0s, well under the 2s RTO. Full 64K recompute would take >5s.'
