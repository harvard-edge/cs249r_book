schema_version: 1
id: cloud-r2-42004
title: P999 Latency in Multi-Stage Pipelines
topic: tail-latency
status: published
provenance: imported
scenario: 'Your production RAG pipeline has 4 serial stages: embedding (H100), retrieval (CPU), reranking
  (A100), and generation (MI300X). Each stage individually meets a P99 of 50ms. A product manager asks
  why the end-to-end P99 is 380ms instead of 200ms. Explain the tail amplification and propose a budget
  allocation strategy.'
details:
  realistic_solution: 'For 4 independent stages each with P99 = 50ms, the probability of ALL stages being
    fast (below P99) is 0.99^4 = 0.96. So the end-to-end P99 corresponds roughly to P96 of the individual
    stages — the tail bleeds into the median. Worse, if any stage has a heavy-tailed distribution (common
    for GPU inference with variable batch sizes), the compound tail is dominated by the worst stage. The
    fix: allocate tighter per-stage budgets using a tail budget. If end-to-end P99 target is 250ms total,
    allocate each stage a P99.75 budget (50ms for P99.75 ≈ 35ms for P99). Use async prefetching to overlap
    retrieval with embedding, converting 2 serial stages into 1 parallel stage. Monitor per-stage P99.9
    independently.'
  common_mistake: Assuming end-to-end P99 equals the sum of per-stage P99s. Tail latency compounds non-linearly
    across serial stages — the probability of at least one stage hitting its tail grows with the number
    of stages.
  napkin_math: '4 stages, each P99=50ms. Naive sum: 4 × 50 = 200ms. Actual E2E P99: ~380ms because tail
    events correlate. P(all fast) = 0.99^4 = 96.06%, so E2E P96 ≈ sum of P50s = 4 × 30ms = 120ms, but
    E2E P99 ≈ 2-3 stages hitting tail = 380ms. With parallelization (2 stages overlapped): effective 3
    serial stages, P99 ≈ 280ms.'
