id: cloud-0176
title: The SLO Violation Cascade
topic: latency-decomposition
status: published
provenance: imported
scenario: 'Your team runs a multi-tenant LLM serving platform on H100 GPUs. It must handle two distinct
  workloads:

  1. **Interactive Chat:** High-priority requests with a strict P99 Time-To-First-Token (TTFT) SLO of
  150ms.

  2. **Batch Summarization:** Low-priority jobs that process 100k+ token documents, where overall throughput
  (TPOT) is the goal.'
details:
  realistic_solution: The playbook is wrong because simply adding more replicas will not solve the core
    problem; it will just create more GPUs that exhibit the same failure mode. The root cause is **Head-of-Line
    Blocking at the CUDA kernel level**.
  common_mistake: The most common incorrect diagnosis is simply 'the GPU is overloaded, so we need more
    of them.' This mistakes high utilization for productive work. Engineers often assume 100% utilization
    means the system is at its global throughput limit, failing to see that a single low-priority task
    can create a 'head-of-line blocking' scenario that starves high-priority tasks of their latency budget,
    even if the scheduler is 'prioritizing' them in software.
  napkin_math: Let's assess the duration of the blocking low-priority kernel. A 100k token batch prefill
    on a 70B model requires 2 * 70B * 100,000 = 14 PFLOPs. On an H100 (989 TFLOPS), this single monolithic
    CUDA kernel takes 14,000 / 989 = 14.16 seconds to execute. Because CUDA kernels are non-preemptible,
    a chat request arriving immediately after waits 14s, destroying the SLO.
