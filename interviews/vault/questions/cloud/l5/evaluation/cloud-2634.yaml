id: cloud-2634
title: Module Design for Serialization Robustness
topic: pruning-sparsity
status: published
provenance: imported
scenario: Team A stores model architecture in code and only serializes state_dict. Team B uses torch.save(model)
  to serialize the entire module including class definition. Six months later, Team B refactors their
  module class. Diagnose what breaks and recommend the better pattern.
details:
  realistic_solution: 'Team B''s approach breaks because torch.save(model) uses Python''s pickle, which
    stores a reference to the class''s module path. When they refactor (rename class, move file, change
    __init__ signature), unpickling fails with ImportError or AttributeError because pickle tries to import
    the original class at its original path. Team A''s state_dict approach is robust: the state_dict is
    a plain {name: tensor} dictionary that is architecture-agnostic. Loading requires reconstructing the
    model in code first (model = MyModel()), then loading weights (model.load_state_dict(dict)). This
    decouples architecture evolution from weight storage. The trade-off: Team A must maintain code to
    reconstruct every historical architecture version, but this is version-controllable. Team A''s pattern
    is the industry standard for production deployment.'
  common_mistake: Using torch.save(model) for production checkpoints. Pickle serializes the class reference,
    creating a fragile coupling between code structure and saved weights.
  napkin_math: 'Team B: 1 pickle file, breaks on any refactor. Team A: state_dict + versioned code, survives
    arbitrary refactoring.'
