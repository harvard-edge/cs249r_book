id: cloud-1359
title: Evaluating GPU Redundancy Trade-offs
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your team is building a high-reliability cloud inference service for a medical diagnostics application
  running on 500 H100 GPUs. The base silent data corruption (SDC) rate is 400 FIT per GPU. A recent SDC
  resulted in a misdiagnosis. You must evaluate between Double Modular Redundancy (DMR), which detects
  faults and halts/recomputes, and Triple Modular Redundancy (TMR), which masks faults via majority voting.
  The P99 latency SLA is 100ms, and a single inference takes 40ms. Evaluate the architectural, latency,
  and cost trade-offs between DMR and TMR to justify a system-level redundancy strategy.
details:
  realistic_solution: Select DMR. TMR requires 1500 GPUs (3x baseline cost), whereas DMR requires 1000
    GPUs (2x cost). Since inference takes 40ms, a DMR mismatch triggers a recompute taking another 40ms.
    The total 80ms execution time remains safely under the 100ms SLA, providing equivalent functional
    reliability at significantly lower cost.
  common_mistake: Automatically choosing TMR for maximum reliability without analyzing the massive 3x
    hardware cost overhead, or failing to realize that DMR's recompute latency still fits within the strict
    100ms P99 SLA.
  napkin_math: 1 FIT = 1 fault / 10^9 hours. Fleet FIT for 500 H100 GPUs = 500 * 400 FIT = 200,000 faults
    / 10^9 hours = 0.0002 faults/hr. Mean Time Between Failures (MTBF) = 1 / 0.0002 = 5,000 hours (~208
    days). Since SDC triggers recompute only once every 208 days, latency penalties have zero statistical
    impact on P99 latency. Dual Modular Redundancy (DMR) saves 500 GPUs vs TMR.
