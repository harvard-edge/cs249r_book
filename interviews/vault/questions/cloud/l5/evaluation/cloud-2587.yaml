id: cloud-2587
title: Cloud Rlhf Infrastructure L5 0
topic: vram-budgeting
status: published
provenance: imported
scenario: 'For RLHF on a 70B model, evaluate: (A) colocate all 4 models on the same GPU cluster with careful
  memory management, (B) use separate clusters for generation (policy inference) and training (PPO update),
  (C) use DPO instead, eliminating the reward and critic models entirely.'
details:
  realistic_solution: 'Option A (colocated): all models on same GPUs. Memory: 70B × (16+16+2+2) = 2,520
    GB → 32+ A100s. Advantage: low latency between generation and training. Disadvantage: complex memory
    management, GPU utilization is low during generation phase (training GPUs idle) and vice versa. Option
    B (separate clusters): generation cluster (policy inference, fast sampling) and training cluster (PPO
    update). Better utilization — each cluster optimized for its workload. But: must transfer generated
    samples between clusters, adding latency and complexity. Option C (DPO): only needs policy + reference
    = 70B × (16+2) = 1,260 GB → 16 A100s. Half the memory, simpler orchestration, no reward model training
    needed. Trade-off: DPO may be slightly less effective than PPO for complex preferences, but 50% cheaper
    and much simpler to implement.'
  common_mistake: Defaulting to PPO-based RLHF without considering DPO. DPO eliminates the reward and
    critic models entirely, halving infrastructure requirements. For many applications, the quality difference
    is negligible.
  napkin_math: 'A: 2,520 GB → 32 A100s × $2/hr = $64/hr. B: similar GPU count but better utilized. C:
    1,260 GB → 16 A100s × $2/hr = $32/hr. Cost savings of DPO: 50%. Training time similar. Quality: DPO
    ≈ 95-100% of PPO on most benchmarks.'
