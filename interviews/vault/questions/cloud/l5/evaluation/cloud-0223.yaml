id: cloud-0223
title: The Serverless Inference Trade-off
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'We''re choosing between AWS SageMaker Serverless (pay-per-invocation, scales to zero) and a
  dedicated `ml.g5.2xlarge` instance (1× A10G, $1.52/hr always-on) for serving a 7B model. Our traffic
  is bursty: 500 QPS during business hours (10 hrs/day), near-zero overnight. Find the break-even point
  and tell me which option wins.'
details:
  realistic_solution: 'The break-even depends on three factors: (1) the per-invocation cost of serverless
    (compute time × price per GB-second), (2) the cold-start penalty and its frequency, and (3) the utilization-adjusted
    cost of dedicated instances. At 500 QPS sustained during business hours, the dedicated approach with
    batching (BS=32, ~63 instances) costs ~$69K/month. Serverless at 540M requests/month costs ~$57K/month
    — comparable, but with 5% cold-start penalties degrading user experience. The break-even point is
    ~4 QPS sustained per instance: below that, serverless wins; above, dedicated wins. For this bursty
    workload (500 QPS for 10hr, near-zero for 14hr), the optimal strategy is a hybrid: 40 dedicated instances
    for base load ($43,776/month) plus serverless for overflow spikes, saving ~20% vs pure dedicated while
    avoiding cold-start penalties during steady state.'
  common_mistake: '"Serverless always wins for bursty traffic because you don''t pay for idle time." Serverless
    has per-invocation costs that scale linearly with QPS, while dedicated instances have fixed costs
    that become cheaper per-request at high utilization.'
  napkin_math: '- **Dedicated (ml.g5.2xlarge, 1× A10G):** $1.52/hr × 24 hr × 30 days = **$1,094/month**.
    Throughput: ~50 tokens/sec for 7B model. At 500 QPS with 100-token responses: need 500 × 100 / 50
    = 1,000 instances during peak. That''s $1,094 × 1,000 = **$1.09M/month**. Clearly need fewer instances
    with batching — at BS=32, throughput ≈ 800 tok/s per instance, need ~63 instances = **$68,922/month**.
    | - **Serverless (SageMaker Serverless):** ~$0.0001 per invocation + $0.00003/sec compute. Per request
    (200ms inference): $0.0001 + 0.2 × $0.00003 = **$0.000106/request**. At 500 QPS × 10 hr/day × 30 days:
    500 × 36,000 × 30 = 540M requests. Cost = 540M × $0.000106 = **$57,240/month**. Plus cold starts:
    ~5% of requests hit cold start (3s penalty), adding latency but no extra cost. | - **Break-even:**
    Serverless < dedicated when: $0.000106 × QPS × 3,600 < $1.52/hr per instance. Per instance: QPS <
    1.52 / (0.000106 × 3,600) = **~4 QPS per instance**. Above 4 QPS sustained per instance, dedicated
    wins. | - **Hybrid:** 40 dedicated instances for base load ($43,776/month) + serverless for overflow
    spikes. Saves ~20% vs pure dedicated during off-peak.'
