id: cloud-0969
title: Evaluating Defenses for Clean-Label Poisoning
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your team is training a 2B parameter Vision Transformer (ViT-G) on a cluster of 512 H100 GPUs
  using a 500M-image dataset, 20% of which is scraped from unverified public domains. Threat intel warns
  of a targeted clean-label poisoning attack: attackers have injected 50,000 images containing a hidden
  backdoor trigger. These images are correctly labeled and visually pristine, but their representations
  have been adversarially perturbed to collide with a target class. You must evaluate the operational
  trade-offs between two defenses: employing Differential Privacy (DP-SGD) during training, or running
  Activation-Space Clustering (k-NN outlier detection) on the dataset prior to training, given a strict
  cluster allocation limit of 72 hours.'
details:
  realistic_solution: Opt for Activation-Space Clustering as a pre-processing filter. Extracting penultimate
    layer embeddings and running FAISS clustering identifies feature-space collisions without disrupting
    the core training loop. DP-SGD, while theoretically resilient to poisoning via bounding influence,
    requires per-sample gradient clipping which heavily degrades throughput and model accuracy.
  common_mistake: Proposing pixel-space anomaly detection, perceptual hashing, or manual human review,
    failing to recognize that clean-label poisoned samples are visually identical to normal data and are
    explicitly correctly labeled.
  napkin_math: 'Embedding extraction overhead: 500M images / (512 H100s * 1000 img/sec/GPU forward-only)
    = ~976 seconds (<20 mins). DP-SGD penalty: Standard training takes (500M * 10 epochs) / (512 * 300
    img/sec) ≈ 9 hours. DP-SGD reduces throughput by ~4x (75 img/sec) due to per-sample microbatch clipping,
    pushing training to ~36 hours and wasting 13,000 H100-hours while degrading clean accuracy.'
