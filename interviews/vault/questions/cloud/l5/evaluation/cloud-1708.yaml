id: cloud-1708
title: Evaluating PTQ Strategies for 70B LLM Serving
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a 70B parameter LLM for a high-throughput text summarization API on cloud
  instances equipped with 80GB A100 GPUs. In FP16, the model weights alone consume 140GB, requiring model
  parallelism across two GPUs. You need to reduce the serving cost by fitting the model on a single GPU
  using Post-Training Quantization (PTQ). Evaluate the trade-offs between applying W8A8 (Weight-8 Activation-8)
  quantization (e.g., SmoothQuant) versus W4A16 (Weight-4 Activation-16) quantization (e.g., AWQ/GPTQ).
  Justify which PTQ approach is optimal for this specific workload, considering memory capacity, arithmetic
  intensity, and calibration dataset requirements.
details:
  realistic_solution: For LLM serving, W4A16 is generally superior. It compresses the 70B model to ~35GB,
    leaving ample room for the KV cache to support large batch sizes. While W8A8 provides higher compute
    throughput, the 70GB weight footprint severely limits the max batch size (due to OOM from KV cache),
    negating the compute advantage since the workload remains memory-bound.
  common_mistake: Candidates often assume W8A8 is strictly better because it accelerates both compute
    and memory access, failing to realize that autoregressive generation is heavily memory-bandwidth bound
    and KV-cache constrained.
  napkin_math: 'Weights footprint: FP16 = 140GB (Requires 2x 80GB GPUs). W8A8 = 70GB (Leaves 10GB for
    KV cache on a single 80GB GPU). W4A16 = 35GB (Leaves 45GB for KV cache). At roughly 1MB KV cache per
    token, W4A16 supports 4.5x larger batch sizes than W8A8, yielding much higher overall throughput despite
    unquantized activation math.'
