id: cloud-sus-62041
title: Serving Latency vs. Model Freshness Tradeoff
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: 'You can deploy one of two update strategies: (A) Synchronous online learning — every 1000 requests
  update the model and immediately swap it into serving (update latency: 2 seconds, serving latency increase:
  +20 ms during swap). (B) Asynchronous shadow updates — model updates accumulate in shadow weights, applied
  every 5 minutes via atomic weight swap (no serving latency impact). At 100k QPS, evaluate the CTR impact
  of each strategy, considering that recommendation quality decays 0.5% per minute of staleness.'
details:
  realistic_solution: 'Strategy A: Model updated every 1000 requests / 100k QPS = 0.01 seconds = every
    10 ms. At 2s update latency, during those 2s: 200k requests served on stale model. During swap: 20
    ms serving latency increase affects all in-flight requests. P99 latency during swap: baseline P99
    + 20 ms. Swaps happen every 10 ms — system is in ''swap'' state 2× → constant elevated latency. CTR:
    ~0.01 min staleness average = essentially fresh. Strategy B: max staleness = 5 minutes = 2.5% CTR
    decay on average. CTR loss = 0.05% absolute. Revenue impact: 0.05% × 100k QPS × $0.001/click × 86400s
    = $4,320/day. Verdict: Strategy A is unsustainable at 100k QPS. Fix: increase batch to 100k requests
    (1 second batch) and use zero-downtime weight swap (double-buffering). Then swap every 1s with atomic
    swap <1ms overhead. Or use Strategy B with 1-minute updates instead of 5-minute.'
  common_mistake: Choosing (A) purely because it's fresher, without accounting for the serving latency
    increase during swap and the P99 latency SLO violation risk at 100k QPS.
  napkin_math: 'CTR decay model: CTR(t) = CTR_0 × (1 - 0.005 × t_minutes). Strategy A avg staleness: 10ms
    → 0.000167 min → CTR loss: 0.0008%. Negligible. Strategy B avg staleness: 2.5 min → CTR loss: 1.25%.
    At 2% baseline CTR: loss = 0.025% absolute. Revenue: 0.025% × 100k QPS × $0.001/impression × 86400s
    = $2,160/day (not $2.16M). Strategy A swap overhead: 20 ms every 10 ms = 200% overhead → non-starter.
    Strategy A with 1s batch: swap every 1s, 0.02ms swap time → 2% overhead. Viable.'
