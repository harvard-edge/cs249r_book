id: cloud-0666
title: The TPU v5e vs H100 Trade-off
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your company is choosing between a Google Cloud TPU v5e pod (256 chips) and an equivalent NVIDIA
  H100 cluster for serving a 7B parameter model at 50,000 requests per second. The TPU v5e costs $1.20/chip-hour
  and the H100 costs $3.50/GPU-hour. The PM says 'TPU is obviously cheaper.' Walk me through why this
  isn't a simple price comparison.
details:
  realistic_solution: 'The correct metric is cost per token, not cost per chip. TPU v5e has 16 GB HBM
    — a 7B FP16 model (14 GB) barely fits, leaving ~2 GB for KV cache (~1 request). Must shard TP=2, using
    2 chips per replica with max batch ~8. H100 has 80 GB HBM — model fits trivially with 66 GB free,
    supporting batch ~61. This 7.6× batching advantage translates directly to cost-per-token advantage.
    At $3.50/GPU-hr, H100 achieves ~$0.067/M tokens. The 256-chip TPU v5e pod at $307.20/hr achieves ~$0.71/M
    tokens. H100 wins by ~10×. The lesson: per-chip price is meaningless — what matters is $/token at
    realistic batch sizes, determined by HBM capacity.'
  common_mistake: '"Just compare $/chip-hour — TPU is 3× cheaper per chip, so it wins." This ignores that
    the chips have fundamentally different architectures, memory capacities, and software ecosystems,
    making per-chip comparison meaningless.'
  napkin_math: '**H100 serving 7B model (FP16 = 14 GB):**

    H100: 80 GB HBM3, 3.35 TB/s, 989 TFLOPS FP16.

    Free HBM = 80 − 14 = 66 GB.

    KV cache per request (2048 tokens, 32 layers, 32 KV heads, head_dim=128, FP16): 2 × 32 × 32 × 128
    × 2048 × 2 = 1.07 GB.

    Max batch = 66 / 1.07 ≈ 61 concurrent requests.

    Decode throughput (bandwidth-bound): 3.35 TB/s / 14 GB = 239 steps/s. Each step = 1 token/request.

    At batch=61: 239 × 61 = 14,579 tokens/s. Latency = 30 tokens / 239 = 126ms.

    Throughput = 61 / 0.126 ≈ 484 req/s per GPU.

    Cost = $3.50/hr / (14,579 × 3600 tokens) = $0.067 per million tokens.


    **TPU v5e serving 7B model (FP16 = 14 GB):**

    16 GB HBM, ~819 GB/s bandwidth per chip.

    Free HBM = 16 − 14 = 2 GB → max batch ≈ 1 (cannot batch meaningfully).

    Must shard TP=2: 7 GB/chip, 9 GB free → max batch = 9 / 1.07 ≈ 8.

    Decode per step: 7 GB / 819 GB/s = 8.55 ms → 117 steps/s.

    At batch=8: 117 × 8 = 936 tokens/s per TP=2 replica.

    128 replicas on 256-chip pod: 128 × 936 = 119,808 tokens/s.

    Pod cost = 256 × $1.20 = $307.20/hr.

    $307.20 / (119,808 × 3600) = $0.71 per million tokens.


    **H100 wins ~10× on per-token cost** because 80 GB HBM fits the model with room for 61 concurrent
    requests. The TPU v5e''s 16 GB forces TP=2, doubling chip cost and limiting batch to 8.'
