id: cloud-1934
title: LLM Serving Stage Invariants
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are defining the Stage Interface Contract between the 'Model Optimization' and 'Serving'
  stages for a cloud-based LLM inference platform using an 8B parameter model. The Serving stage runs
  on NVIDIA L4 GPUs (24GB VRAM, 300 GB/s bandwidth) and guarantees a Time-Between-Tokens (TBT) < 50ms.
  The Optimization stage applies INT8 weight-only quantization. Evaluate the invariants that must be explicitly
  defined in this contract to guarantee the serving SLAs, and justify the trade-offs between using static
  artifact validation versus dynamic profiling.
details:
  realistic_solution: 'Implement a hybrid contract: static invariants assert that the INT8 artifact size
    allows enough remaining VRAM for the KV cache and that the memory bandwidth required for the TBT SLA
    does not exceed 70% of the L4''s peak bandwidth. Dynamic profiling is then used sparingly as a final
    validation.'
  common_mistake: Relying solely on accuracy metrics or expensive dynamic profiling, while failing to
    encode deterministic hardware constraints (like memory bandwidth limits) as strict pass/fail gates
    in the deployment pipeline.
  napkin_math: An 8B model in INT8 requires 8GB for weights. Generating 1 token requires loading all weights.
    TBT < 50ms means >20 tokens/sec. Minimum memory bandwidth = 8 GB * 20 = 160 GB/s. With L4 peak bandwidth
    of 300 GB/s, 160 / 300 = 53% utilization. The static invariant `(Model Size / TBT SLA) < (Peak BW
    * 0.7)` reliably passes, avoiding the need for continuous load testing.
