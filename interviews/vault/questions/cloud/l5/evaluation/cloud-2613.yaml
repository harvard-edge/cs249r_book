id: cloud-2613
title: Federated vs Centralized Training Decision
topic: federated-learning
status: published
provenance: imported
scenario: 'A retail company has 1,000 stores with local transaction data. Option A: centralize all data
  to a cloud GPU cluster for standard distributed training. Option B: federated learning across store
  servers. Data is not privacy-sensitive. Which approach yields better model quality and why?'
details:
  realistic_solution: 'When data is not privacy-sensitive, centralized training (Option A) almost always
    produces a better model. Federated learning introduces statistical heterogeneity (non-IID data across
    stores with different demographics), communication bottlenecks (WAN vs datacenter InfiniBand), and
    convergence challenges (FedAvg diverges with highly non-IID distributions). Centralized training with
    shuffled IID batches converges faster and to a better optimum. Federated learning''s value proposition
    is privacy and data sovereignty — without those constraints, its engineering complexity (handling
    stragglers, non-IID divergence, secure aggregation) adds cost without benefit. The exception: if data
    volume is so large that transfer costs exceed training costs, federated approaches may be justified
    economically.'
  common_mistake: Choosing federated learning as a default 'best practice.' Without a privacy or regulatory
    requirement, it adds complexity and degrades convergence.
  napkin_math: 'Centralized: 1 InfiniBand cluster, IID batches, converges in N steps. Federated: WAN latency
    100-1000x slower, non-IID adds 2-5x more rounds.'
