id: cloud-1313
title: Evaluating Extreme Gradient Accumulation Overhead
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team is pre-training a 13B parameter LLM on an 8x A100 (80GB) node using Distributed Data
  Parallel (DDP) or ZeRO. The optimization target requires a global batch size of 1024. Across 8 GPUs,
  the required per-GPU batch size is 128. However, with a 4096 sequence length, a micro-batch size of
  16 already consumes 75GB of VRAM due to activations. An engineer proposes using gradient accumulation
  with 8 steps (16 micro-batch * 8 steps = 128) per GPU. Evaluate the operational trade-offs of this design,
  specifically addressing compute utilization, memory overhead, and distributed communication costs.
details:
  realistic_solution: Wrap the first 7 micro-batches in PyTorch's `no_sync()` context manager to accumulate
    gradients locally in VRAM without triggering network communication, and only sync on the 8th step.
    Because the micro-batch size of 16 still processes 65,536 tokens per step, the arithmetic intensity
    remains high enough to keep the A100 compute-bound, making this an excellent choice over complex Tensor
    or Pipeline Parallelism.
  common_mistake: Failing to recognize that naive DDP will trigger an All-Reduce operation on every micro-batch
    backward pass, which destroys throughput. Candidates also often incorrectly assume gradient accumulation
    requires storing activations for all micro-batches simultaneously.
  napkin_math: 'Without no_sync: 8 All-Reduces per global step. 13B params = 26GB gradient payload (FP16).
    At ~200GB/s effective NVLink bandwidth, one All-Reduce takes ~260ms. 8 syncs = 2.08s comm overhead
    per update. With no_sync: 1 All-Reduce per step = 260ms. Comm time is reduced by 87.5% (saving ~1.82s
    per iteration). Memory-wise, it requires 1x model size for the accumulated FP32 gradients (52GB),
    which must be factored into the 80GB VRAM budget.'
