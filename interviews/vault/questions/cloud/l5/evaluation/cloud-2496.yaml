id: cloud-2496
title: Cloud NAS Hardware-in-the-Loop Optimization
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your cloud pipeline uses Neural Architecture Search (NAS) to generate keyword spotting models
  for Cortex-M0+ devices (128KB SRAM). The strict hardware constraint is <5mW active power during inference.
  NAS currently outputs a 50KB model with 20M MACs/sec that fits SRAM but draws 15mW on the physical hardware,
  draining the battery rapidly.
details:
  realistic_solution: The cloud NAS reward function must be updated to penalize specific memory access
    patterns, not just MACs or parameter counts. The 15mW power draw is likely caused by the model rapidly
    toggling activations between SRAM banks or missing CMSIS-NN optimizations, preventing the MCU from
    entering low-power sleep states between operations. The architecture should integrate a Hardware-in-the-Loop
    (HIL) power profiler into the NAS pipeline, or build a surrogate power model that accounts for SRAM
    read/write costs and CMSIS-NN specific instruction overheads (like depthwise convolutions which minimize
    memory fetching).
  common_mistake: Assuming that minimizing parameter count or theoretical MACs linearly correlates with
    actual physical power draw on the MCU.
  napkin_math: If standard conv requires fetching 3x3xIn_Channels per pixel, and memory access costs 50pJ/byte
    vs ALU cost of 5pJ/MAC. 20M MACs/sec purely in ALU = 100 uW. But fetching 20MB/s from SRAM = 1mW.
    If the NAS selects an architecture that thrashes SRAM (e.g., large intermediate tensors exceeding
    cache/buffer), memory power dominates. 15mW indicates extreme memory bandwidth utilization. Shifting
    to depthwise separable convolutions reduces memory fetches by a factor of ~In_Channels.
