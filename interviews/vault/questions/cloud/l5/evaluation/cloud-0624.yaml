schema_version: 1
id: cloud-0624
title: The GPU Memory Fragmentation
topic: vram-budgeting
status: published
provenance: imported
scenario: Our custom LLM inference server on an A100-80GB has been serving requests for 6 hours. `nvidia-smi`
  shows 16 GB used, 64 GB free. But the server rejects new requests with 'Cannot allocate KV-cache.' We
  have 80% free memory — where did it go?
details:
  realistic_solution: This is classic external fragmentation in GPU memory. Without PagedAttention, KV-cache
    is allocated as contiguous blocks sized for the maximum sequence length. As requests of varying lengths
    complete and free their blocks, the free memory becomes a patchwork of small non-contiguous holes.
    A new request needing a 2 GB contiguous block fails even though 64 GB is free — because no single
    contiguous 2 GB region exists. PagedAttention (used by vLLM) solves this by managing KV-cache as fixed-size
    pages (like OS virtual memory), mapping logical KV blocks to arbitrary physical memory locations.
    This eliminates external fragmentation entirely.
  common_mistake: '"There''s a memory leak — restart the server." The memory is genuinely free, but it''s
    fragmented into non-contiguous chunks that can''t satisfy a contiguous allocation request.'
  napkin_math: Suppose KV cache requires 1MB per token. Pre-allocating contiguous blocks for max seq length
    (8,192 tokens) = 8.19GB per request. Even if actual sequence is 100 tokens (100MB used), 8.09GB is
    trapped. With 64GB free, memory is fragmented into hundreds of small 100MB-8GB gaps. A new 8.19GB
    contiguous allocation fails despite 64GB total free.
