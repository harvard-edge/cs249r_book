id: cloud-fill-00956
title: H100 Transformer Inference Scheduling
topic: operator-scheduling
status: published
provenance: imported
scenario: 'You are tasked with deploying a large transformer model for real-time inference on an NVIDIA
  H100 GPU (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W TDP). The model has several
  attention heads and FFN layers. You have two proposed scheduling strategies:


  1.  **Strategy A (Naive):** Executes each layer sequentially, allocating and deallocating intermediate
  tensors as needed. Minimal layer fusion is applied.

  2.  **Strategy B (Optimized):** Employs aggressive layer fusion where possible (e.g., fusing consecutive
  element-wise operations, or matrix multiplications followed by non-linearities) and uses an execution
  order that prioritizes memory reuse by keeping frequently accessed tensors in HBM3 and minimizes recomputation
  or reloads.


  Evaluate these two strategies. How would you quantify the performance differences in terms of latency,
  throughput, and memory utilization? What specific aspects of the H100''s architecture (HBM3 capacity
  and bandwidth, FP16 TFLOPS) would most influence your analysis for each strategy?'
details:
  realistic_solution: 'A realistic solution would involve a dataflow graph representation of the model,
    where each node is an operator and edges represent data dependencies. Strategy B would employ a graph
    partitioning and reordering algorithm that considers:


    1.  **Layer Fusion:** Identify contiguous subgraphs that can be fused into a single kernel to reduce
    memory I/O and kernel launch overheads.

    2.  **Memory Reuse:** A topological sort of the graph, augmented with liveness analysis for tensors,
    to determine an execution order that maximizes the reuse of allocated memory and minimizes peak memory
    footprint. This might involve techniques like in-place operations or memory pooling.

    3.  **Parallelism:** Identify independent operations that can be executed concurrently on the H100''s
    SMs.


    For evaluation, benchmark both strategies on a representative workload, and use profiling tools (e.g.,
    NVIDIA Nsight Systems) to analyze kernel execution times, memory accesses, and HBM3 utilization.'
  common_mistake: Neglecting the significant impact of HBM3 memory bandwidth on intermediate tensor movement.
    Candidates often focus purely on FLOPs without considering the data transfer costs, especially for
    memory-bound operations or when layers cannot be fused efficiently, leading to sub-optimal scheduling
    decisions.
  napkin_math: 'Consider a sequence of two matrix multiplications (e.g., `Y = X @ W1`, `Z = Y @ W2`),
    where `X`, `W1`, `W2` are FP16 tensors. Let `Y` be a `10000x10000` FP16 tensor (2 bytes/element).


    *   **Naive (Strategy A):** `X @ W1` writes `Y` (200MB) to HBM3. Then `Y` is read from HBM3 for `Y
    @ W2` (200MB). Total intermediate data transfer = 400MB. Time taken for transfer ≈ 400MB / 3.35 TB/s
    = 400 * 10^6 bytes / (3.35 * 10^12 bytes/s) ≈ 0.12 milliseconds.

    *   **Fused (Strategy B):** If `Y` can be kept in registers/L1 cache or streamed directly between
    fused kernels, the memory transfer to/from HBM3 for `Y` could be significantly reduced or eliminated,
    saving bandwidth and latency. This simplification demonstrates the impact of intermediate data movement
    on the H100''s memory subsystem.'
