id: cloud-0742
title: The Congested Highway
topic: collective-communication
status: published
provenance: imported
scenario: 'You manage a large, multi-tenant GPU cluster. Users complain about unpredictable training times:
  sometimes jobs finish quickly, other times they take much longer, even when the cluster appears to have
  available GPU capacity. You suspect network congestion, but how do you verify this and implement a system-level
  solution to ensure more predictable network performance for critical ML workloads?'
details:
  realistic_solution: Unpredictable performance despite available GPU capacity strongly points to network
    contention or inadequate Quality of Service (QoS). Different ML workloads have vastly different network
    demands (e.g., Data Parallelism is highly bandwidth-intensive, Model Parallelism is latency-sensitive,
    hyperparameter sweeps are often network-light).
  common_mistake: '"Just upgrade all network hardware." This is expensive and doesn''t solve the core
    issue of dynamic resource contention without intelligent management.'
  napkin_math: A 400Gbps spine switch uplink shared by 4 racks, each with 100Gbps uplinks. If two highly
    network-intensive jobs (e.g., large-scale Data Parallelism) in different racks each demand 80Gbps
    of inter-rack traffic, they would contend for the 400Gbps spine. If a third job also demands 80Gbps,
    the spine link is 240Gbps/400Gbps = 60% utilized. This might seem fine, but if other management traffic
    or storage I/O also passes through, or if the traffic patterns are bursty, congestion can easily occur.
    The effective bandwidth experienced by each job could drop significantly, leading to unpredictable
    slowdowns.
