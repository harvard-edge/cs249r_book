id: cloud-0739
title: The Congestion Collapse
topic: interconnect-topology
status: published
provenance: imported
scenario: You scale your distributed training job from 64 to 256 GPUs across a standard RoCEv2 (RDMA over
  Converged Ethernet) network. Instead of getting a 4x speedup, your training step time actually increases.
  `nvidia-smi` shows GPU utilization dropping to 20%. What network physical phenomenon occurred?
details:
  realistic_solution: You hit Priority Flow Control (PFC) pause frames or severe packet loss due to incast
    congestion. In all-to-all communication (like AllReduce), many nodes simultaneously send data to a
    single switch port. Ethernet switches have shallow packet buffers. When the buffer fills, the switch
    drops packets (or sends PFC pause frames halting the entire upstream link). This causes severe head-of-line
    blocking. RDMA requires lossless networks; when packets drop, go-back-N retransmission triggers, completely
    stalling the GPU compute while it waits for delayed gradients.
  common_mistake: '"Assuming that because the switches have 400 Gbps bandwidth, the network scales linearly
    without considering packet loss and retransmission."'
  napkin_math: If a switch has a 32MB buffer shared across 32 ports at 400 Gbps, each port gets ~1MB.
    At 400 Gbps (50 GB/s), a 1MB buffer fills in `1MB / 50 GB/s = 20 microseconds`. If 4 nodes blast data
    to 1 node simultaneously, that 20 microsecond window is easily breached, leading to immediate packet
    drops if congestion control isn't perfectly tuned.
