id: cloud-top-65058
title: MI300X vs H100 Decode Pool Economics
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'Your team is choosing between H100 SXM5 (80GB, 3.35 TB/s) and MI300X (192GB, 5.3 TB/s) for
  the decode pool of a 70B disaggregated serving cluster. Cost: H100 ~$3/hr, MI300X ~$4/hr. Compare cost-per-token
  and memory capacity advantages.'
details:
  realistic_solution: 'Decode is memory-bandwidth bound: throughput proportional to HBM bandwidth. H100
    decode tokens/sec per GPU: bandwidth / model_bytes_per_token = 3.35TB/s / (70B*2B) = 3.35e12 / 140e9
    = 23.9 tok/sec at batch=1. MI300X: 5.3TB/s / 140GB = 37.9 tok/sec at batch=1. At large batches, both
    scale roughly proportionally with bandwidth. Cost comparison: H100 pair (TP=2) at $6/hr vs MI300X
    single at $4/hr. For single-GPU batch decode, MI300X 19% more cost-efficient. Memory capacity advantage:
    MI300X 192GB vs H100 80GB. 70B model weights: 140GB BF16. H100: needs 2×H100 (TP=2) for 70B decode.
    MI300X: fits on single GPU with 52GB KV headroom. H100 pair: $6/hr at TP=2. MI300X single: $4/hr.
    MI300X wins decisively for 70B decode.'
  common_mistake: Comparing only TFLOPS between H100 and MI300X for decode. Decode is memory-bandwidth
    bound at small batch sizes, not compute bound. The relevant comparison metric is GB/s per dollar,
    not TFLOPS per dollar.
  napkin_math: 'Cost per million output tokens: H100 single (can''t fit 70B alone). H100 TP=2: 2 GPUs
    * $3/hr = $6/hr. Decode at batch=128: H100 TP=2 gets ~2*3.35TB/s*0.93/140GB/token * 128 batch = 6,126
    tok/sec effective. MI300X single: 5.3TB/s/140GB*128 = 4,846 tok/sec at batch=128. H100 TP=2: $6/hr
    for 6,126 tok/sec = $0.000272/token. MI300X: $4/hr for 4,846 tok/sec = $0.000229/token. MI300X is
    16% cheaper per token for 70B decode. Definitive recommendation: MI300X for 70B decode pools.'
