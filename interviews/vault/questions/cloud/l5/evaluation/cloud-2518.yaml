id: cloud-2518
title: Cloud Torchdynamo L5 0
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team debates whether to invest 2 weeks refactoring a custom model with many graph breaks
  to be fully torch.compile-compatible, or to keep eager mode and buy 30% more GPUs. Current training
  takes 14 days on 64 A100s. Evaluate both options.
details:
  realistic_solution: 'Option A (refactor): 2 weeks dev time. If torch.compile gives 1.5-2x speedup on
    compiled regions and the model is ~60% compilable currently, eliminating breaks could yield 1.4x overall
    speedup. Training: 14 / 1.4 = 10 days. Option B (more GPUs): 30% more = 83 A100s. Linear scaling:
    14 / 1.3 = 10.8 days. Cost: 83 A100s × 10.8 days × 24h × $2/hr = $43,027. Option A is ~$12.3K cheaper
    per run and reduces absolute cluster size requirements. Option B avoids engineering time but permanently
    blocks larger hardware allocations.'
  common_mistake: Only considering the current training run. Compilation speedups persist for all future
    runs, making the refactoring investment amortize over time, while extra GPU costs recur.
  napkin_math: 'Baseline: 64 × 14 × 24h × $2 = $43,008. Refactor: 14 days / 1.4x = 10 days. Cost: 64 ×
    10 × 24 × $2 = $30,720. More GPUs (Linear scaling): 83 GPUs × 10.8 days × 24h × $2 = $43,027. Savings
    for refactoring: ~$12.3K per run + future runs. Adding GPUs doesn''t cost more overall compute money
    than baseline, but requires procuring 30% more hardware.'
