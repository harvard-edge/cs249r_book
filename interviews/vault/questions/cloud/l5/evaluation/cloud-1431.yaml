id: cloud-1431
title: Interrupt Shielding vs NIC Coalescing for P99 Latency
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a high-throughput inference service on nodes equipped with 8x NVIDIA A100
  GPUs, a 128-core CPU, and dual 200GbE NICs. While the average latency is 5ms, the P99 latency frequently
  spikes to 35ms, breaching the strict 20ms SLO. Profiling shows that CPU threads launching CUDA kernels
  are being unpredictably preempted by NIC hardware interrupts (SoftIRQs) distributed evenly across all
  cores by the OS. You must evaluate whether to implement strict CPU core isolation (interrupt shielding)
  or tune NIC interrupt coalescing to stabilize the P99 latency.
details:
  realistic_solution: Implement interrupt shielding by pinning CUDA launch threads to specific cores (e.g.,
    cores 16-127) using `taskset` or `cgroups`, and restricting NIC/NVMe interrupts to a disjoint set
    of dedicated non-inference cores (e.g., cores 0-15) using `/proc/irq/default_smp_affinity`.
  common_mistake: Candidates often suggest increasing NIC interrupt coalescing (batching packets before
    interrupting the CPU), failing to realize this directly increases the baseline average latency for
    all requests and doesn't solve the preemption of the CUDA launch threads.
  napkin_math: At 200,000 packets/sec spread across 16 NIC queues, a core handles ~12,500 interrupts/sec.
    Even if an interrupt handler only takes 3µs (37.5ms/sec total CPU time), preempting a CUDA launch
    thread precisely when the GPU is idle can stall the GPU for the entire duration of the context switch,
    causing cascading queue build-ups and massive P99 spikes (10ms+).
