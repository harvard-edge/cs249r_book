id: cloud-2599
title: Cloud Information Entropy L5 0
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You have 10 TB of training data. Deduplication removes 30% (reducing to 7 TB) and increases
  measured entropy by 15%. Your team debates whether to train on the deduplicated 7 TB or the full 10
  TB. Evaluate both options considering information theory and training efficiency.
details:
  realistic_solution: 'Information content: original 10 TB at entropy H → information = 10 × H. Deduplicated
    7 TB at 1.15H → information = 7 × 1.15H = 8.05H. The deduplicated set retains 80.5% of the information
    in 70% of the data. Per-byte information density: original = H, deduplicated = 1.15H (15% more informative
    per byte). Training on 7 TB: 30% fewer training steps, each step sees more diverse data, less memorization
    of duplicates. Training on 10 TB: 43% more steps, but 20% of steps reinforce already-learned patterns
    (wasted compute). Compute savings from dedup: 30% fewer steps × $1M training cost = $300K saved. Quality:
    deduplicated training typically produces equal or better models because the model doesn''t overfit
    to duplicated patterns.'
  common_mistake: Assuming more data is always better. Duplicate data increases training cost without
    proportionally increasing information content. The extra 3 TB (30% of data) contributed only 19.5%
    of total information — training on it has diminishing returns.
  napkin_math: '10 TB × H = 10H total info. 7 TB × 1.15H = 8.05H. Lost info: 19.5%. Saved compute: 30%.
    Info per FLOP: dedup is 1.15x more info-efficient per step. At $1M train cost: save $300K, lose <20%
    of (mostly redundant) information.'
