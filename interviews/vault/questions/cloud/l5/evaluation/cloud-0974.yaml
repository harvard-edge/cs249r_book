id: cloud-0974
title: Evaluating Cold Restart vs Warm Recovery
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You are architecting the fault tolerance strategy for a 2,048 A100 GPU cluster training a 100B
  parameter model. The cluster experiences roughly one node failure per day. Currently, the orchestrator
  handles this via a full ''Cold Restart'': killing all distributed processes, provisioning a replacement
  node, and reloading the 1.2TB global checkpoint state from S3 object storage, which takes 15 minutes.
  A senior engineer proposes building a complex ''Warm Restart'' system that keeps surviving processes
  alive and synchronously replicates state in CPU RAM to reduce recovery time to 2 minutes. Evaluate whether
  to approve this warm restart proposal or stick with the cold restart architecture.'
details:
  realistic_solution: Reject the warm restart proposal. The quantitative gain in daily Goodput is less
    than 1%. Instead, maintain the cold restart architecture but optimize its pipeline (e.g., using PyTorch
    Distributed Checkpointing to read directly from S3 in parallel or caching to node-local NVMe) to ensure
    architectural simplicity and avoid risking OOM errors.
  common_mistake: Candidates often assume that minimizing absolute downtime (RTO) is always the primary
    goal. They approve the warm restart without calculating the overall impact on cluster Goodput, ignoring
    the massive distributed systems engineering complexity and runtime memory overhead.
  napkin_math: Cluster MTBF = 24 hours (1,440 mins). Current Cold Restart penalty = 15 mins. Uptime =
    1,425 / 1,440 = 98.96%. Proposed Warm Restart penalty = 2 mins. Uptime = 1,438 / 1,440 = 99.86%. The
    net Goodput improvement is only ~0.9% (13 mins/day). The engineering cost and CPU RAM overhead of
    maintaining distributed in-memory replicas far outweigh a <1% efficiency gain.
