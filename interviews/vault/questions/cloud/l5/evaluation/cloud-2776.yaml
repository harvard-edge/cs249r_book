id: cloud-2776
title: Adversarial Defense Selection
topic: adversarial-robustness
status: published
provenance: imported
scenario: 'Your fraud detection model faces adversarial evasion attacks. Attackers modify transaction
  features (amount, timing, merchant category) within realistic bounds. Options: (A) PGD adversarial training
  (4x compute cost), (B) input feature anomaly detection, (C) ensemble of diverse model architectures
  with disagreement-based rejection. Evaluate for production fraud detection.'
details:
  realistic_solution: 'Option A (PGD adversarial training): Designed for continuous image perturbations.
    Transaction features are often discrete (merchant category) or constrained (amount must be positive,
    timing must be realistic). PGD-generated adversarial examples may not respect these constraints, training
    on unrealistic perturbations. Less effective for structured data. Cost: 4x compute. Option B (input
    anomaly detection): Flag transactions whose feature combinations are unusual, regardless of model
    prediction. Catches adversarial modifications that create unrealistic feature combinations (e.g.,
    $0.01 amount at a luxury retailer). Cheap to implement. But sophisticated attackers can stay within
    normal feature ranges. Option C (diverse ensemble + disagreement): Train models with different architectures
    (gradient boosting, neural network, logistic regression). Adversarial perturbations optimized against
    one architecture are less likely to transfer across diverse model families. High disagreement triggers
    rejection. Most robust for structured data because it does not assume specific attack geometry. Recommendation:
    C + B. Ensemble diversity provides the strongest defense for tabular data, and anomaly detection catches
    obvious out-of-distribution modifications. A is less suitable for structured data.'
  common_mistake: Choosing adversarial training (A) without considering that tabular/structured data adversarial
    attacks differ fundamentally from image attacks. PGD assumes continuous, dense perturbations — but
    transaction features are discrete and have semantic constraints.
  napkin_math: 'A: 4x cost, designed for images not tabular. B: ~1.1x cost, catches obvious attacks. C:
    ~3-5x cost but strongest for tabular. C+B: best coverage for fraud detection.'
