schema_version: 1
id: cloud-2003
title: Evaluating Telemetry Aggregation for LLM Inference Fleets
topic: collective-communication
status: published
provenance: imported
scenario: You operate a global fleet of 500 inference nodes (8xH100 each) serving an LLM at an aggregate
  50,000 requests per second. Each request generates 4KB of telemetry (token-by-token latencies, generation
  stats, GPU metrics). The centralized ingestion pipeline is dropping logs, and cross-AZ egress costs
  exceed $50,000/month. Evaluate the trade-offs between implementing 1% head-based random sampling at
  the API gateway versus deploying node-level telemetry sidecars to compute HDR histograms and pre-aggregate
  metrics.
details:
  realistic_solution: Deploy an OpenTelemetry Collector sidecar on each node to pre-aggregate latencies
    into exponential histograms (forwarded every 10s) and implement tail-based trace sampling. This forwards
    100% of errors and P99 traces, but only 0.1% of baseline traffic.
  common_mistake: Candidates often suggest blindly scaling up the Kafka ingestion cluster or using aggressive
    random sampling, failing to realize that random sampling destroys the statistical validity of P99
    tail latency monitoring and drops rare out-of-memory (OOM) traces.
  napkin_math: 'Raw throughput: 50,000 req/s * 4KB = 200 MB/s (~17 TB/day). With sidecar aggregation:
    500 nodes * (100 histogram buckets * 8 bytes) / 10s = 40 KB/s for metrics. Tail-based sampling (1%
    of traffic as errors/tails): 500 req/s * 4KB = 2 MB/s. Total reduction: 200 MB/s to 2.04 MB/s (99%
    reduction) while preserving 100% of critical diagnostic data.'
