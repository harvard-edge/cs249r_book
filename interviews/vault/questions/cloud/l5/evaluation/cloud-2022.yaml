id: cloud-2022
title: TensorRT Dynamic Shapes Trade-offs
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'Your team is deploying a BERT-Large model (340M parameters) on an NVIDIA A100 GPU for a real-time
  document classification service. Requests arrive with highly variable sequence lengths (from 16 to 512
  tokens). You are evaluating two TensorRT compilation strategies: 1) Padding all inputs to a static shape
  of 512 and compiling a single FP16 engine, or 2) Using TensorRT''s dynamic shapes with multiple optimization
  profiles (e.g., 64, 128, 256, 512) in INT8. Evaluate the trade-offs between compute waste from padding
  versus the kernel selection overhead, profile memory footprint, and calibration complexity, to justify
  your design decision for maximizing throughput under a strict 10ms P99 latency SLA.'
details:
  realistic_solution: Implement dynamic shapes with a minimal set of 2-3 optimization profiles (e.g.,
    128, 512) paired with request bucketing in the serving layer (e.g., Triton). This bounds the memory
    overhead while recovering most of the compute lost to padding.
  common_mistake: Assuming dynamic shapes with many profiles is always optimal without considering the
    massive increase in engine size, execution context memory overhead, and the potential for sub-optimal
    kernel selection at runtime.
  napkin_math: Processing a 32-token sequence with static length 512 wastes 93.7% of compute (480/512
    padded). With a dynamic profile bucketed at 128, the waste drops to 75% (96/128), delivering a 5x
    reduction in wasted FLOPs (or a 4x reduction in total compute) per short request while requiring only
    a marginal increase in execution context memory for the two profiles.
