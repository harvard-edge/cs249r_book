id: cloud-0834
title: The Spot Instance Training Economics
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your team needs 1,000 GPU-hours to fine-tune a model. On-demand H100 instances cost $3.00/GPU/hour.
  Spot instances cost $0.90/GPU/hour but have a 10% preemption rate per hour. Preemptions require rolling
  back to the last checkpoint (saving every 10 minutes) and restarting, adding roughly 15% overhead in
  total GPU-hours consumed. Evaluate whether spot instances are worth the operational complexity.
details:
  realistic_solution: 'On-demand: 1,000 hrs * $3.00 = $3,000. Spot with overhead: 1,000 hrs * 1.15 (overhead)
    * $0.90 = $1,035. Net savings = $1,965 (65.5%). The 15% overhead comes from checkpoint-restart cycles:
    with 10% preemption rate and 10-min checkpoint intervals, you lose ~5 min of work per preemption plus
    restart overhead. Spot is clearly worth it for fault-tolerant training workloads. The key requirement
    is robust checkpointing infrastructure — without it, preemptions cause full restarts and savings evaporate.'
  common_mistake: Either blindly choosing spot for the 70% discount without accounting for preemption
    overhead, or avoiding spot entirely because 'it is unreliable.' The correct answer requires quantitative
    analysis of the cost-reliability tradeoff.
  napkin_math: On-demand = 1000 * $3.00 = $3,000. Spot = 1000 * 1.15 * $0.90 = $1,035. Savings = $1,965
    = 65.5%. Break-even overhead = (3.00/0.90 - 1) = 233% — spot saves money even with 3.3x overhead.
