id: cloud-1170
title: Dynamic Batching for Strict Latency SLOs
topic: batching-strategies
status: published
provenance: imported
scenario: You are deploying a BERT-base classification model for real-time content moderation on an NVIDIA
  A10G GPU using Triton Inference Server. The strict P99 latency SLO is 100ms end-to-end. Network and
  tokenization consume 30ms, leaving a 70ms budget for the server. Profiling shows inference takes 12ms
  for batch 1, 18ms for batch 8, 28ms for batch 32, and 45ms for batch 64. Traffic varies erratically
  from 50 to 1,500 QPS. Evaluate the trade-offs of different dynamic batching configurations and justify
  your chosen max_batch_size and max_queue_delay.
details:
  realistic_solution: Cap max_batch_size at 32 and set max_queue_delay to 10ms. This ensures that even
    in the absolute worst-case scenario (arriving just as a batch starts processing), the total time spent
    in the system remains strictly under the 70ms budget, trading a slight peak throughput reduction for
    P99 SLO safety.
  common_mistake: Setting max_batch_size to 64 and max_queue_delay to 25ms (since 45ms + 25ms = 70ms).
    Candidates often fail to realize the maximum wait time is max(busy_GPU_wait, max_queue_delay), and
    worst-case latency for batch 64 would be 90ms, causing head-of-line blocking that exceeds the budget.
  napkin_math: 'Worst-case latency = max(busy_GPU_wait, max_queue_delay) + execution_time. For Batch 64:
    max(45ms, 25ms) + 45ms = 90ms (Fails 70ms budget). For Batch 32: max(28ms, 10ms) + 28ms = 56ms (Passes
    70ms budget securely).'
