schema_version: 1
id: cloud-1630
title: Evaluating Multicalibration in Risk Models
topic: pruning-sparsity
status: published
provenance: imported
scenario: A cloud-based clinical risk prediction model (deployed on 8x A100 instances, processing 10M
  queries/day) is well-calibrated on aggregate. However, audits reveal severe risk miscalibration for
  intersecting subgroups (e.g., 'diabetic women over 65'). Evaluate the computational and statistical
  trade-offs of implementing multicalibration via iterative post-processing (using an auditor model) versus
  training a Mixture-of-Experts (MoE) to explicitly model subgroups, given 20 binary demographic features
  and a strict P99 serving latency budget of 50ms.
details:
  realistic_solution: Implement multicalibration via post-processing. A lightweight auditor (e.g., gradient
    boosted trees) identifies miscalibrated computationally-identifiable subsets and applies additive
    scalar corrections to the base model logits. This avoids retraining the massive base model and limits
    latency overhead to <2ms.
  common_mistake: Assuming that explicitly modeling all subgroup combinations (e.g., MoE routing or separate
    models) is feasible, failing to account for the exponential explosion of subgroups and the resulting
    sample scarcity per group.
  napkin_math: 20 binary features yield 2^20 (~1.04M) intersecting subgroups. With a 10M sample dataset,
    the average samples per subgroup is <10, making explicit MoE training intractable due to data sparsity.
    A post-processing tree auditor (50 trees, depth 10) requires ~500 memory lookups (<1ms latency on
    CPU), comfortably fitting the 50ms budget alongside the ~40ms A100 base model inference.
