schema_version: 1
id: cloud-0755
title: The Straggler Mitigation Problem
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You're running synchronous data-parallel training of a 13B model across 1,024 H100 GPUs spanning
  128 nodes. Each GPU has a 0.1% chance of being 'slow' on any given step (thermal throttling, ECC correction,
  noisy neighbor on shared NVSwitch). What fraction of steps will have at least one straggler, and how
  do you mitigate this without switching to async SGD?
details:
  realistic_solution: 'The probability that *no* GPU is slow on a given step is $(1 - 0.001)^{1024} =
    0.999^{1024} \approx 0.359$. So **64.1% of all steps have at least one straggler**. Mitigation strategies
    without async SGD: (1) **Bounded staleness** — allow the AllReduce to proceed after 99.5% of GPUs
    report, using stale gradients for the remaining 0.5%. (2) **Redundant computation** — run 1028 GPUs,
    treat 4 as hot spares, drop the slowest 4 each step. (3) **Gradient compression** — reduce the communication
    volume so stragglers have less data to sync. (4) **Profiling and eviction** — continuously monitor
    per-GPU step times, evict consistently slow GPUs and remap shards.'
  common_mistake: '"0.1% per GPU is tiny — at 1024 GPUs that''s maybe 1 slow GPU per step, which barely
    matters." Candidates underestimate how probability compounds: 0.1% per GPU becomes near-certainty
    at scale.'
  napkin_math: '$P(\text{at least one straggler}) = 1 - (1 - 0.001)^{1024} = 1 - 0.359 = 0.641$. If a
    straggler adds 200 ms to a 500 ms step: effective step time = 0.359 × 500 + 0.641 × 700 = 628.2 ms.
    Throughput loss: $(628.2 - 500)/500 = 25.6\%$. Over a 30-day training run at $2/GPU-hr: 1024 GPUs
    × $2 × 720 hr × 0.256 = **$377,487 wasted** on straggler delays.'
