id: cloud-1040
title: Evaluating Covariate Shift Mitigation in CTR Prediction
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is running a large-scale Click-Through Rate (CTR) prediction model (DLRM) served on
  64x A100 instances for an e-commerce platform. Over the last 48 hours, a new ad campaign drastically
  shifted the distribution of user demographic features (e.g., age and location inputs) without changing
  the underlying click-through probability for those specific demographics. The Population Stability Index
  (PSI) for the 'age' feature spiked from 0.05 to 0.35. You are asked to evaluate whether to trigger a
  full retraining on the last 48 hours of data or employ Importance Weighting during an incremental update.
  Evaluate the trade-offs of these two approaches given the system handles 100K QPS and retraining from
  scratch costs $5,000 and takes 12 hours.
details:
  realistic_solution: Implement Importance Weighting (Density Ratio Estimation) to reweigh the loss function
    during an incremental update. Since P(Y|X) is unchanged, reweighting historical data to match the
    new P(X) avoids the 12-hour, $5,000 full retraining cost while adapting to the new demographic distribution.
  common_mistake: Assuming covariate shift automatically degrades model performance and necessitates immediate
    full retraining, ignoring the fact that P(Y|X) remains constant and importance weighting can efficiently
    adjust the decision boundary.
  napkin_math: Full Retraining Cost = $5,000 and 12h time-to-deploy. Importance Weighting incrementally
    updates the model by computing w(x) = P_new(x) / P_old(x). Applying these weights over a 1h fine-tuning
    job recovers performance at <10% the cost ($500) and time.
