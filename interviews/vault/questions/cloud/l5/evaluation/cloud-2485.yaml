schema_version: 1
id: cloud-2485
title: Depthwise Quantization Catastrophe
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your cloud pipeline automatically quantizes FP32 object detection models (MobileNetV2 backbone)
  to INT8 using Post-Training Quantization (PTQ) for edge deployment. The model size shrinks from 20MB
  to 5MB, but the evaluation pipeline shows mAP dropping severely from 42 to 18.
details:
  realistic_solution: 'Identify that depthwise separable convolutions (the core of MobileNet) have extreme
    variance in weight ranges across different channels. Applying standard per-tensor PTQ crushes the
    dynamic range of outlier channels. The co-design solution requires modifying the compiler/quantizer
    to use per-channel quantization for depthwise layers, or modifying the training algorithm to use Quantization-Aware
    Training (QAT) with fake-quantization nodes. Tradeoff: QAT requires more cloud compute and pipeline
    complexity, but preserves INT8 performance on the edge NPU.'
  common_mistake: Assuming PTQ is broken and switching entirely to FP16, which cuts the edge NPU throughput
    in half and doubles memory bandwidth requirements.
  napkin_math: Per-channel quantization adds 1 scale and zero-point (8 bytes total) per channel. For a
    depthwise layer with 512 channels, overhead is 512 * 8 = 4KB. Across 20 layers, overhead is 80KB,
    which is negligible compared to the 15MB saved by moving from FP32 to INT8, while recovering mAP from
    18 back to 40+.
