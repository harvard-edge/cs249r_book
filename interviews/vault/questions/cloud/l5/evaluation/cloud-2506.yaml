id: cloud-2506
title: Liquid Cooling Retrofit ROI
topic: thermal-management
status: published
provenance: imported
scenario: Your 5 MW (IT load) datacenter currently relies on air cooling, operating at a Power Usage Effectiveness
  (PUE) of 1.5. A proposal suggests retrofitting to Direct-to-Chip (D2C) liquid cooling, which would lower
  the PUE to 1.15 but costs $8,000,000 in CapEx. Electricity costs $0.12 per kWh. Evaluate the financial
  and operational tradeoffs of this retrofit.
details:
  realistic_solution: Power Usage Effectiveness (PUE) is the ratio of total facility power to IT equipment
    power. A PUE of 1.5 means for every 1 Watt of IT load, 0.5 Watts is spent on cooling and overhead.
    Retrofitting to liquid cooling drops the overhead from 50% to 15%. However, evaluating this tradeoff
    requires calculating the payback period against the CapEx. While liquid cooling vastly improves energy-efficiency
    metrics and allows for denser racks (reducing network cable lengths and latency), an $8M retrofit
    for a legacy facility might have a payback period that exceeds the remaining lifespan of the current
    hardware generation. The tradeoff is between long-term TCO/sustainability vs upfront CapEx and downtime
    during the retrofit. If the facility is slated for high-TDP next-gen GPUs (like B200s), the retrofit
    becomes mandatory due to thermal limits, overriding pure ROI calculations.
  common_mistake: Calculating savings based on the IT load (5 MW) rather than the overhead power saved
    via the PUE delta, or ignoring the payback period entirely.
  napkin_math: Current Total Power = 5 MW * 1.5 PUE = 7.5 MW. New Total Power = 5 MW * 1.15 PUE = 5.75
    MW. Power Savings = 1.75 MW. Annual Energy Savings = 1,750 kW * 8760 hours/yr = 15,330,000 kWh/yr.
    Financial Savings = 15,330,000 * $0.12 = $1,839,600 / year. Payback Period = $8,000,000 / $1,839,600
    ≈ 4.35 years.
