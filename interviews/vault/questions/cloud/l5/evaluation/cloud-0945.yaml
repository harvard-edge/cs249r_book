id: cloud-0945
title: Canary Traffic Sizing and Resource Allocation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying a new two-tower recommendation model serving 10,000 requests per second globally.
  The new model requires 4 NVIDIA A100 (40GB) GPUs per replica to meet a strict 50ms P99 latency SLA,
  with each replica capable of handling 250 RPS. Your total available provisioned capacity is 100 A100
  GPUs. You must evaluate a canary deployment strategy to validate the new model's latency and click-through
  rate (CTR). Compare the operational trade-offs of using a 1% versus a 10% initial canary traffic split,
  and justify your optimal allocation based on hardware constraints and time-to-statistical-significance.
details:
  realistic_solution: Implement a 5% to 10% canary split. A 10% split (1,000 RPS) requires 4 replicas
    (16 A100 GPUs), which fits comfortably within the 100 GPU cluster while leaving 84 GPUs for the baseline
    model. This accelerates the collection of statistically significant CTR data, allowing confidence
    in the new model within an hour.
  common_mistake: Selecting an arbitrarily small canary percentage (e.g., 1%) to minimize blast radius
    without calculating the time required to reach statistical significance for business metrics, which
    prolongs the release cycle unnecessarily.
  napkin_math: Total Traffic = 10k RPS. At 1% split = 100 RPS. At 10% split = 1,000 RPS. To detect a 1%
    relative drop in a 5% baseline CTR, you need ~3.6M impressions. Time to significance at 1% = 3,600,000
    / 100 = 36,000s (10 hours). Time to significance at 10% = 3,600,000 / 1,000 = 3,600s (1 hour). GPU
    cost at 10% = (1000/250) * 4 = 16 GPUs.
