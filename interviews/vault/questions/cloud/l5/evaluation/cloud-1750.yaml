id: cloud-1750
title: Process Group Topology for 3D Parallelism
topic: data-parallelism
status: published
provenance: imported
scenario: You are architecting the process group topology for training a 175B parameter model on 1024
  H100 GPUs using 3D parallelism (TP=8, PP=16, DP=8). Each node has 8 GPUs connected via NVLink (900 GB/s),
  and nodes are connected via 400 Gbps InfiniBand. Evaluate the communication overhead trade-offs if you
  were to map the Data Parallel (DP) process groups to intra-node NVLink and Tensor Parallel (TP) process
  groups to inter-node InfiniBand, versus the standard approach of TP intra-node and DP inter-node.
details:
  realistic_solution: Map the TP process group to intra-node NVLink because TP requires an AllReduce of
    activations for every transformer layer in every microbatch. Map the DP process group to inter-node
    InfiniBand, as DP only requires an AllReduce of gradients once per iteration, which can be heavily
    overlapped with the backward pass.
  common_mistake: Assuming DP synchronization (which syncs the entire model's gradients) demands the highest
    bandwidth and should thus use the intra-node NVLink process group.
  napkin_math: 'TP transfer per iteration: ~1.6 GB/layer * 96 layers * 8 microbatches ≈ 1.2 TB. On 400
    Gbps (50 GB/s) IB, this takes 24s. On 900 GB/s NVLink, it takes ~1.3s. DP transfer per iteration:
    350 GB (gradients for 175B params). On IB, this takes ~7s, but is overlapped with compute. Forcing
    TP onto IB increases iteration time by >20s.'
