id: cloud-1540
title: Activation Checkpointing vs CPU Offloading
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'You are training a large 3D medical vision model on a node with 8x A100 (80GB HBM2e) GPUs.
  Due to the massive high-resolution inputs, the total memory required per GPU for parameters, optimizer
  states, and forward activations is 120GB, exceeding the 80GB hardware limit. You must evaluate two memory
  allocation strategies to bridge this 40GB gap: Activation Checkpointing (recomputing intermediate activations
  during the backward pass) versus CPU Offloading (swapping activations to host RAM over a PCIe Gen4 x16
  bus). Justify your strategy with quantitative reasoning based on the hardware hierarchy.'
details:
  realistic_solution: Activation checkpointing is generally the optimal choice for modern dense architectures.
    Recomputing the activations directly on the GPU is significantly faster than paying the latency and
    bandwidth tax of moving tens of gigabytes back and forth over PCIe Gen4.
  common_mistake: Assuming that host RAM offloading is universally better because it avoids redundant
    computation, without calculating the severe latency penalty of the PCIe bus bottleneck compared to
    the GPU's teraflops.
  napkin_math: "A100 FP16 Compute: 312 TFLOPS. PCIe Gen4 x16 bandwidth: ~32 GB/s. \nRecomputation is faster\
    \ if: FLOPs / 312e12 < Bytes / 32e9, which simplifies to an Arithmetic Intensity < 9,750 FLOPs/Byte.\
    \ Since most neural network layers have an arithmetic intensity far below 9,750, recomputing on-die\
    \ is mathematically faster than transferring off-die."
