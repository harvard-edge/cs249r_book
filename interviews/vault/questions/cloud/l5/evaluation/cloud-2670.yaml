id: cloud-2670
title: Model Caching Strategy Under Cost Constraints
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'Your platform serves 100 models with 95% traffic going to the top 15. Option A: 2× A100-80GB
  ($30K/month) keeping top 20 models hot. Option B: 1× A100-80GB + 1TB NVMe SSD ($18K/month), using the
  SSD as a warm cache tier (1s load time). Option C: 4× A10-24GB ($16K/month, 96GB total VRAM) for more
  models but slower per-model inference. Which minimizes cost while maintaining p99 < 200ms?'
details:
  realistic_solution: 'Option A: 160GB VRAM, top 20 models fit. Traffic to top 15 = 95%, models 16-20
    ≈ 3%. Hit rate: ~98%. p99 depends on the 2% miss rate — cold loading from CPU RAM takes 2-5s, violating
    SLA. Need pre-warming. With pre-warming: p99 ≈ 50ms (GPU inference). Cost: $30K/month. Option B: 80GB
    VRAM (top 15) + SSD warm tier (next 30 models). VRAM hit rate: 95%. SSD hit rate for remaining: 30/85
    ≈ 35% of misses. SSD loads in 1s. p99 for SSD-cached: ~1.05s — violates SLA. Need SSD for pre-warming
    only, not serving. Option C: 96GB total but split across 4 GPUs — each holds ~24GB of models. With
    model replication overhead, ~20 models fit. Hit rate similar to A (~98%), but A10 inference is 3x
    slower than A100. p99 ≈ 150ms — within SLA. Cost: $16K/month. Option C wins on cost while meeting
    SLA, if slower inference is acceptable.'
  common_mistake: Optimizing for cache hit rate alone. The combination of hit rate, miss penalty, and
    inference latency determines whether the SLA is met. A high hit rate with an occasional 5s miss still
    violates a 200ms p99 SLA.
  napkin_math: 'A: $30K, p99~50ms. B: $18K, p99~1s (SLA fail for misses). C: $16K, p99~150ms (within SLA).
    C is cheapest viable option.'
