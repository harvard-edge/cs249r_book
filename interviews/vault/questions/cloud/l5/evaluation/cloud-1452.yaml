id: cloud-1452
title: Drift Detection Thresholds in High-Throughput Recommendation Systems
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are designing an automated drift detection pipeline for a recommendation system serving
  50,000 requests per second on a fleet of AWS g5.12xlarge instances. The system monitors the distribution
  of 256-dimensional user embeddings over 1-hour windows (approx 180M requests) against a reference training
  distribution. You must select a distance metric to trigger automated retraining pipelines. Evaluate
  the trade-offs between Kullback-Leibler (KL) Divergence and Jensen-Shannon (JS) Divergence for setting
  hard alerting thresholds in this high-throughput, dynamic environment.
details:
  realistic_solution: Adopt Jensen-Shannon Divergence (JSD) for automated alerting. JSD is symmetric and
    bounded between 0 and 1 (when using base-2 logarithms), making it vastly superior for setting stable,
    universal thresholds (e.g., triggering retraining at JSD > 0.15) without crashing or firing false
    positives when encountering out-of-vocabulary data.
  common_mistake: Selecting KL Divergence and attempting to handle its unboundedness and asymmetry with
    complex, heuristic clipping. Candidates often overlook that KL(P||Q) explodes to infinity if the production
    distribution (P) encounters novel feature values not present in the reference distribution (Q).
  napkin_math: If a novel categorical feature appears in prod with frequency 0.01, reference Q=0. KL(P||Q)
    = 0.01 * log(0.01 / 0) → ∞. For JSD, M = (P+Q)/2 = 0.005. JSD contributes 0.5 * 0.01 * log(0.01 /
    0.005) = 0.005 * 1 = 0.005 to the divergence score, remaining perfectly stable.
