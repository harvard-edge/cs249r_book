id: cloud-2457
title: System-Prompt Prefix Caching
topic: roofline-analysis
status: published
provenance: imported
scenario: Your B2B summarization service prepends a complex 1500-token system prompt (instructions and
  few-shot examples) to every 500-token user document. The cluster handles 200 QPS. Profiling shows that
  computing the prefill for the 1500-token prompt dominates the cluster's GPU time. You decide to implement
  RadixAttention (Prefix Caching) to reuse the KV cache of the system prompt.
details:
  realistic_solution: Prefix caching presents a tradeoff between prefill compute reduction and GPU memory
    capacity. By retaining the KV cache of the 1500-token system prompt in VRAM, you completely bypass
    the compute-heavy prefill phase for those tokens, massively reducing TTFT and freeing up TFLOPs across
    the cluster. However, this cached prefix permanently occupies VRAM on every replica. This reduces
    the available pool of free memory blocks for the dynamic KV cache of active decode requests, slightly
    lowering the maximum possible continuous batch size. Given the heavy compute cost of a 1500-token
    prefill, caching is highly optimal, but requires strict LRU eviction policies if multiple system prompts
    are used.
  common_mistake: Assuming prefix caching has no downsides, ignoring that persistent cache blocks consume
    VRAM that could otherwise be used for dynamic request batching.
  napkin_math: System prompt = 1500 tokens. KV cache size (70B model) = 320 KB/token. Memory consumed
    per replica = 1500 * 320 KB = 480 MB. Prefill compute saved per request = 1500 tokens * 70B params
    * 2 = 210 TFLOPs. At 200 QPS, this saves 42 PFLOPs of compute globally. The cost is 480 MB of VRAM
    per replica, which is roughly equivalent to losing the ability to batch 1-2 concurrent user generations,
    a highly favorable tradeoff.
