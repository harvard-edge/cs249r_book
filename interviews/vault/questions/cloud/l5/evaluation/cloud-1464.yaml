id: cloud-1464
title: Evaluating KL Divergence for High-Throughput Drift Detection
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team serves a DLRM model at 10,000 QPS on a cluster of AWS Inferentia2 instances. To detect
  data drift, an engineer proposes computing the KL Divergence between the daily serving feature distributions
  (P, 864M samples) and the training distribution (Q). The features include heavily skewed continuous
  variables like session duration. Evaluate the robustness of using pure KL Divergence for this automated
  retraining trigger, considering edge cases like unseen feature bins in production.
details:
  realistic_solution: Reject pure KL Divergence in favor of the symmetric Jensen-Shannon Divergence (JSD)
    or Population Stability Index (PSI), or apply Laplace smoothing to the reference distribution Q to
    guarantee bounded outputs.
  common_mistake: Failing to recognize that KL Divergence is asymmetric and diverges to infinity if the
    reference distribution Q has zero probability for a bin where P > 0, causing false positive drift
    alerts.
  napkin_math: If bin i has P(i) = 0.01 and Q(i) = 0, D_KL = P(i) * log(P(i)/Q(i)) -> infinity. With Laplace
    smoothing epsilon = 1e-6, the contribution bounds to 0.01 * log(0.01/1e-6) = 0.01 * 4 * ln(10) ≈ 0.092
    nats, avoiding system crashes.
