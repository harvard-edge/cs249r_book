id: cloud-r2-42057
title: CDNA vs CUDA SM Architecture Comparison
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: Compare the compute unit (CU) architecture of MI300X's CDNA3 with H100's Hopper SM for training
  a 70B model. MI300X has 304 CUs with 64-wide SIMD, H100 has 132 SMs with 32-wide warps. Both claim ~1000+
  TFLOPS FP16. What architectural differences explain why MI300X excels at large batch training while
  H100 excels at low-latency inference?
details:
  realistic_solution: H100 FP8 = 2 × FP16 = 2 × 989 = 1,978 TFLOPS. Time = 287T / 1,978T = 0.145s (not
    0.29s which uses FP16 rate for an FP8 workload).
  common_mistake: Comparing only TFLOPS numbers without understanding the microarchitectural tradeoffs.
    MI300X's wider SIMD (64 threads) is more efficient for regular, data-parallel workloads but less flexible
    for irregular, branch-heavy workloads like variable-length serving.
  napkin_math: 'H100 FP8 performance: 1,978 TFLOPS (2 × 989 TFLOPS FP16, since FP8 provides 2× over FP16
    on H100). Time = 287 TFLOPs needed / 1,978 TFLOPS = 287/1,978 = 0.145s (not 0.29s which uses 989 TFLOPS
    instead of FP8''s 1,978 TFLOPS).'
