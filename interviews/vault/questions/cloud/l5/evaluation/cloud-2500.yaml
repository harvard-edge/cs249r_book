schema_version: 1
id: cloud-2500
title: Memory Bottleneck in Edge Personalization
topic: federated-learning
status: published
provenance: imported
scenario: A cloud backend orchestrates on-device personalization for gesture recognition on smart rings
  (Cortex-M4F, 256KB SRAM). The base model is 100KB INT8. To train, standard backpropagation requires
  storing intermediate activations for 3 convolutional layers, which takes 150KB. The OS and BLE stack
  take 64KB, causing an Out-Of-Memory (OOM) crash during training.
details:
  realistic_solution: The cloud must orchestrate Partial Federated Learning (Transfer Learning). The architecture
    is modified so the cloud freezes the entire convolutional feature extractor. The edge device only
    computes gradients for a tiny fully connected head (e.g., 10 classes). Furthermore, the edge device
    runs a single forward pass over the local dataset to compute and cache the output vectors of the frozen
    feature extractor. During training, the edge only loads these cached 1D vectors and updates the final
    layer, completely bypassing the need to store massive 3D conv activations.
  common_mistake: Attempting to implement gradient checkpointing or moving activations to slow external
    flash memory during the backward pass.
  napkin_math: 'SRAM capacity: 256KB. Base model: 100KB. OS/BLE: 64KB. Available SRAM: 92KB. Full backprop
    activations: 150KB (OOM). Transfer learning approach: Feature extractor output vector is 1x256 INT8
    = 256 bytes per sample. Training a 256 -> 10 FC layer requires 2.5KB of weights + gradients. Caching
    a mini-batch of 32 vectors = 8KB. Total memory needed for training: 100KB + 64KB + 2.5KB + 8KB = 174.5KB.
    Leaves ~81KB of SRAM free.'
