id: cloud-0716
title: The Pipeline Stutter (1F1B)
topic: 3d-parallelism
status: published
provenance: imported
scenario: You implement Pipeline Parallelism with 8 stages. To minimize the 'bubble' (idle time), you
  use the 1F1B (One Forward, One Backward) scheduling strategy with 32 microbatches. It works perfectly
  for 100 steps. Then, suddenly, the entire pipeline stalls for 2 seconds. The computation is perfectly
  load-balanced. What non-compute operation broke the 1F1B rhythm?
details:
  realistic_solution: You hit the **Optimizer Step Barrier**. 1F1B Bubble Fraction = `(P - 1) / M`. For
    P=8 stages and M=32 microbatches, the bubble is `7 / 32 = ~22%`. That 22% of wasted time manifests
    entirely at the beginning and end of the global batch synch
  common_mistake: '"One of the GPUs must have thermal throttled." While true that throttling causes delays,
    a complete 2-second pipeline stall usually points to a synchronization barrier, not a slight clock
    speed reduction.'
  napkin_math: In 1F1B Pipeline Parallelism, the bubble fraction is (P - 1) / M. With P=8 stages and M=32
    microbatches, bubble = 7 / 32 = ~21.8%. For a step taking 10s, 2.18s is purely idle. But if the pipeline
    suddenly stalls completely, check the data loader! If microbatch 0 of step 101 blocks on CPU disk
    I/O, the entire 8-GPU pipeline sits frozen, compounding a 22% bubble into 0% MFU.
