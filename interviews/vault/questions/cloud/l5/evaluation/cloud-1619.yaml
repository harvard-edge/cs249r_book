id: cloud-1619
title: Evaluating LLM Watermark Sequence Requirements
topic: federated-learning
status: published
provenance: imported
scenario: Your team serves a proprietary 70B MoE model on 8x H100 GPUs for a short-form Q&A API. To deter
  IP theft, you implement a token-level watermarking scheme (Kirchenbauer et al.) partitioning the vocabulary
  into a green list (fraction $\gamma = 0.5$) and applying a bias $\delta$ that empirically results in
  80% green tokens. The legal team requires a statistical confidence of $p < 10^{-4}$ ($Z$-score $\ge
  4$) to prove theft. The average API response is 20 tokens. Evaluate why this watermarking scheme fails
  to provide actionable proof in its current state, and determine the minimum sequence length required
  to meet the legal threshold.
details:
  realistic_solution: The implementation fails because 20 tokens do not provide enough statistical significance
    to distinguish the watermark from random chance at a $Z \ge 4$ confidence level. The architectural
    solution is to either accumulate tokens across an entire user session before running the detection
    test, or drastically increase $\gamma$ (which severely degrades perplexity). The math proves 45 tokens
    are required.
  common_mistake: Focusing solely on the latency/compute overhead of the cryptographic hashing required
    for token routing, while completely ignoring the fundamental statistical limitations of the z-test
    on short generation sequences.
  napkin_math: 'Using the Z-score formula: $Z = \frac{|G| - \gamma T}{\sqrt{\gamma(1-\gamma)T}}$.

    We need $Z \ge 4$. With $\gamma = 0.5$ and empirical green token fraction $p = 0.8$, expected $|G|
    = 0.8T$.

    Substitute the values:

    $4 \le \frac{0.8T - 0.5T}{\sqrt{0.5 \times 0.5 \times T}}$

    $4 \le \frac{0.3T}{0.5\sqrt{T}}$

    $4 \le 0.6\sqrt{T}$

    $\sqrt{T} \ge 6.667$

    $T \ge 44.44$

    At least 45 contiguous tokens are required per verification attempt, but the API only averages 20.'
