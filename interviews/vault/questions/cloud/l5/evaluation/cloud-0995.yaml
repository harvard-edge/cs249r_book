schema_version: 1
id: cloud-0995
title: Evaluating MFU vs Network Upgrades
topic: roofline-analysis
status: published
provenance: imported
scenario: You are training a 70B parameter LLM on 2 trillion tokens using a cluster of 1,024 NVIDIA A100
  (80GB) GPUs. The theoretical peak FP16 throughput of an A100 is 312 TFLOPS. After a week of training,
  you observe an average Model FLOPs Utilization (MFU) of 45%. You must evaluate whether to allocate 6
  weeks of engineering effort into custom kernels and operator fusion to increase MFU to 55%, or to invest
  capital in upgrading the interconnect from 200Gbps to 400Gbps InfiniBand to reduce communication wait
  times.
details:
  realistic_solution: Calculate the total FLOPs required (6 * P * D) and compare the total training wall-clock
    time at both MFU levels. The total compute is ~8.4e23 FLOPs. A 10% absolute increase in MFU saves
    ~12-13 days of cluster time. Given the high cost of a 1,024-GPU cluster (hundreds of thousands of
    dollars per week), the engineering effort on custom compute kernels yields a massive, guaranteed ROI
    by increasing sustained computational intensity, whereas a network upgrade only helps if the 45% MFU
    is strictly bounded by communication latency rather than local kernel efficiency.
  common_mistake: Candidates often intuitively favor network upgrades because 'communication is always
    the bottleneck in distributed training', failing to quantify the massive absolute time and cost savings
    of sustained compute efficiency (MFU) at petaFLOPS scale.
  napkin_math: Total FLOPs = 6 * 70e9 (Params) * 2e12 (Tokens) = 8.4e23 FLOPs. Max Cluster Peak = 1024
    * 312e12 = 3.19e17 FLOPs/sec. Time @ 45% MFU = 8.4e23 / (3.19e17 * 0.45) ≈ 5.85e6 seconds (67.7 days).
    Time @ 55% MFU = 8.4e23 / (3.19e17 * 0.55) ≈ 4.78e6 seconds (55.4 days). Time saved = 12.3 days.
