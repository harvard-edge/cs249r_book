title: Training Compute Budget Allocation
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'You have a fixed compute budget of 1e22 FLOPs. Option A: train a 3B model on 560B tokens. Option
  B: train a 7B model on 240B tokens. Option C: train a 1B model on 1.67T tokens. All use the 6ND approximation.
  Which produces the best model, per Chinchilla scaling laws?'
details:
  realistic_solution: 'Verify budgets: A: 6 × 3B × 560B = 1.008e22 ✓. B: 6 × 7B × 240B = 1.008e22 ✓. C:
    6 × 1B × 1.67T = 1.002e22 ✓. Chinchilla scaling laws (Hoffmann et al., 2022) found that optimal training
    requires roughly 20 tokens per parameter. Check ratios: A: 560B/3B = 187 tokens/param. B: 240B/7B
    = 34 tokens/param. C: 1.67T/1B = 1,670 tokens/param. The Chinchilla-optimal point is ~20 tokens/param.
    None of these exactly matches, but: A (187 tok/param) is heavily over-trained — the model is too small
    for this many tokens, loss plateaus early. B (34 tok/param) is closest to the Chinchilla optimal (20),
    slightly over-trained but reasonable. C (1,670 tok/param) is massively over-trained — diminishing
    returns well before 1.67T tokens. Option B likely produces the best model because it is closest to
    the compute-optimal frontier. However, for inference cost, Option A may be preferred — a smaller model
    with more training data is cheaper to serve despite not being compute-optimal for training.'
  common_mistake: Maximizing model size within the budget without considering the tokens-per-parameter
    ratio. A larger model undertrained on too few tokens performs worse than a smaller model properly
    trained.
  napkin_math: 'Chinchilla optimal: ~20 tokens/param. A: 187 (over-trained). B: 34 (near optimal). C:
    1670 (way over-trained). B wins for model quality.'
