schema_version: 1
id: cloud-2493
title: Cloud-Edge Sensor Fusion Bandwidth Minimization
topic: collective-communication
status: published
provenance: imported
scenario: A factory floor has 10,000 Cortex-M4 sensors collecting 16kHz audio and 1kHz 3-axis IMU data.
  The cloud runs a massive transformer for predictive maintenance. Sending raw data takes 38KB/s per sensor.
  The factory WiFi is capped at 50MB/s total. Raw transmission requires 380MB/s, severely overloading
  the network.
details:
  realistic_solution: Implement Hardware-Algorithm co-design by partitioning the model. Deploy a TinyML
    feature extractor (e.g., MFCC computation + lightweight CNN autoencoder) on the Cortex-M4 to fuse
    the audio and IMU data into a latent representation. The edge sends small 128-byte embeddings at a
    low frequency (10Hz) to the cloud, where the heavy transformer processes the embeddings.
  common_mistake: Downsampling the audio to 1kHz to save bandwidth, which destroys the high-frequency
    acoustic anomalies critical for detecting early bearing failures.
  napkin_math: 'Raw data: 16kHz * 2 bytes (audio) + 1kHz * 3 axes * 2 bytes (IMU) = 32KB + 6KB = 38KB/s
    per device. Fleet = 10,000 * 38KB/s = 380MB/s. Edge extraction: 128-byte embedding at 10Hz = 1.28KB/s
    per device. Fleet = 10,000 * 1.28KB/s = 12.8MB/s. 12.8MB/s easily fits under the 50MB/s factory WiFi
    limit.'
