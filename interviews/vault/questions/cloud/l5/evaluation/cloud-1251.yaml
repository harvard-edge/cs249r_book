id: cloud-1251
title: Optimizing Fail-Stop Checkpoint Intervals
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are architecting the fault-tolerance layer for a 1,024-GPU H100 cluster training a 300B
  parameter model. Empirical data shows the cluster experiences a fail-stop failure (e.g., unrecoverable
  Xid errors causing node crashes) with a Mean Time To Failure (MTTF) of 48 hours. Saving a global synchronous
  checkpoint to the parallel file system takes exactly 6 minutes (0.1 hours). An engineer proposes a checkpoint
  interval of 12 hours to keep the checkpoint overhead under 1%. Evaluate this proposal and mathematically
  justify the optimal checkpointing strategy.
details:
  realistic_solution: Reject the 12-hour checkpoint interval. Using Daly's formula, the optimal interval
    is T ≈ sqrt(2 * MTTF * Checkpoint_Cost) = sqrt(2 * 48h * 0.1h) ≈ 3.1 hours. The proposed 12h interval
    loses ~6 hours of compute per failure (half the interval as expected rollback), while the 3.1h interval
    loses only ~1.55 hours. Over a 48-hour MTTF cycle, this saves ~4.45 hours of 1024-GPU compute time
    per failure event.
  common_mistake: Blindly minimizing checkpoint overhead without calculating the massive compute cost
    of rollback (half the checkpoint interval on average) when a fail-stop event occurs. The optimal interval
    must balance both costs.
  napkin_math: Let M = 48h (MTTF) and C = 0.1h (Checkpoint Cost). Using Daly's formula, the optimal interval
    T ≈ sqrt(2 * M * C) = sqrt(2 * 48 * 0.1) = sqrt(9.6) ≈ 3.1 hours. The proposed 12h interval loses
    ~6 hours of compute per failure. The 3.1h interval loses only ~1.55 hours per failure, saving ~4.45
    hours of 1,024-GPU time per 48h period.
