id: cloud-2205
title: The MLPerf Division Dilemma
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your company is preparing its first MLPerf Inference submission. The hardware team wants to
  submit in the Open division because they can use aggressive INT4 quantization and a custom model variant
  that runs 3x faster. The ML team wants to submit in the Closed division because it demonstrates competitive
  performance on the reference model. You must advise the VP of Engineering on which division to prioritize
  and why. Consider the technical tradeoffs, the perception by customers, and what each division actually
  proves about the hardware.
details:
  realistic_solution: 'Submit both, but prioritize Closed. Here''s the reasoning: The Closed division
    constrains the model architecture, preprocessing, and accuracy targets — everyone runs approximately
    the same model. This means the only variables are hardware, system software, and low-level optimizations.
    Closed results are directly comparable across vendors: if you''re 20% faster than the competition
    in Closed, the customer knows it''s the hardware. The Open division allows model changes (quantization,
    pruning, distillation, architecture swaps). A 3x speedup in Open doesn''t prove the hardware is 3x
    better — it might prove your ML team is better at quantization. Sophisticated customers (hyperscalers,
    large enterprises) discount Open results because they''ll use their own models anyway. However, Open
    has value for demonstrating what''s achievable with full-stack optimization on your platform — it
    shows the ceiling. The tradeoff: Closed requires investing in optimizing the reference model (expensive
    engineering for a specific workload), while Open lets you showcase your best work. But Closed is where
    procurement decisions are made.'
  common_mistake: Choosing Open because 'bigger numbers look better in the press release.' This misunderstands
    what sophisticated customers actually evaluate when reading MLPerf results.
  napkin_math: 'Engineering effort: Closed submission requires ~4-8 engineer-months of kernel optimization
    for reference models (ResNet, BERT, GPT-J). Open submission requires ~2-3 engineer-months of ML optimization
    (quantization, model surgery) + ~2-3 months of kernel work = similar total cost but different skill
    sets. Revenue impact: A top-3 Closed result generates ~$50-100M in accelerated sales pipeline (based
    on public statements from NVIDIA, Intel). Open results generate press coverage but weaker procurement
    signal.'
