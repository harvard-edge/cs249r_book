id: cloud-1299
title: Evaluating Gang Scheduling for LLM Training
topic: scheduling-resource-management
status: published
provenance: imported
scenario: You are orchestrating a distributed training job for a 70B parameter LLM across 128 A100 GPUs
  (16 nodes, 8 GPUs each) using PyTorch FSDP. The shared Kubernetes cluster has 256 nodes and runs at
  90% utilization with various workloads. Your 16-node jobs frequently hang indefinitely during NCCL initialization,
  holding onto the nodes they successfully acquired but failing to start because the remaining nodes are
  unavailable. Evaluate the architectural trade-offs between implementing an all-or-nothing Gang Scheduler
  (like Volcano) versus adding application-level exponential backoff and timeout logic. Justify your choice
  quantitatively in terms of cluster throughput and wasted compute.
details:
  realistic_solution: Implement an atomic Gang Scheduler (e.g., Volcano or Kube-batch). It queues the
    16-node job until all 128 GPUs are available simultaneously, leaving partially free nodes available
    for smaller workloads and entirely eliminating partial-allocation deadlocks.
  common_mistake: Relying on application-level timeouts (e.g., NCCL_TIMEOUT) which simply kills the job
    after a delay, meaning partially acquired nodes are locked and left idle for the entire timeout duration,
    causing severe resource fragmentation and deadlocks.
  napkin_math: 'Without Gang Scheduling: Job acquires 12 nodes, waits 30m for 4 more before timeout. Wasted
    compute = 12 nodes * 8 GPUs * 0.5h = 48 GPU-hours. At $2/hr, $96 wasted per attempt. With Gang Scheduling:
    0 GPU-hours wasted on partial allocation timeouts.'
