id: cloud-2515
title: Cloud Top Of Rack Switch L5 0
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your 1024-GPU training job experiences a ToR switch failure in one of 16 racks, killing 64 GPUs.
  You can either (A) restart from checkpoint on remaining 960 GPUs or (B) wait ~30 min for rack repair.
  Training processes 100 samples/s across 1024 GPUs. Evaluate the trade-off.
details:
  realistic_solution: 'Option A: 960 GPUs at ~93.75% original throughput = 93.75 samples/s. Checkpoint
    restore takes ~5 min. Net: training resumes in 5 min but 6.25% slower. Option B: wait 30 min idle,
    then resume at full 100 samples/s. Break-even calculation: (T - 5) × 93.75 = (T - 30) × 100. T = 405
    minutes (6.75 hours). If the remaining training time is longer than 405 minutes, option A (restarting
    immediately) will process more total samples. For most large training runs (days/weeks), restart immediately
    on 960 GPUs.'
  common_mistake: Always waiting for full repair. For long training runs, the opportunity cost of idle
    time far exceeds the small throughput penalty of running on fewer GPUs.
  napkin_math: 'Option A: 5 min restore + 93.75 samples/s ongoing. Option B: 30 min idle + 100 samples/s.
    Equation for breakeven time T: (T - 5) × 93.75 = (T - 30) × 100. -> 93.75T - 468.75 = 100T - 3000
    -> 6.25T = 2531.25 -> T = 405 minutes.'
