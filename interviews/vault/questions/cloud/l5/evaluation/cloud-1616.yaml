id: cloud-1616
title: LLM Inference Sharding Strategy
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: You are tasked with deploying a 175B parameter language model (FP16) for real-time inference
  on a single 8x A100 (80GB) node with NVLink. You must decide whether to use Tensor Parallelism (TP=8),
  Pipeline Parallelism (PP=8), or a combination. The primary SLA is a Time To First Token (TTFT) of under
  200ms with maximal throughput. Evaluate the trade-offs and justify your model sharding strategy.
details:
  realistic_solution: Use Tensor Parallelism (TP=8). TP distributes the matrix multiplications across
    all 8 GPUs, processing each layer collaboratively. This slashes the compute latency per layer. The
    frequent All-Reduce operations are easily absorbed by the 600GB/s intra-node NVLink, satisfying the
    strict 200ms TTFT SLA.
  common_mistake: Candidates often suggest Pipeline Parallelism (PP=8) to avoid frequent cross-GPU communication,
    failing to realize that PP inherently processes requests sequentially across stages, which drastically
    increases single-batch latency (TTFT) and introduces pipeline bubbles.
  napkin_math: 175B params @ FP16 = 350GB (requires at least 5x 80GB GPUs). With TP=8, each GPU holds
    ~44GB of weights. For a hidden size h=12288, an All-Reduce sends ~24KB per token per layer. Across
    96 layers, total communication is ~2.3MB per token. At 600GB/s NVLink, this takes microseconds, making
    TP compute-bound rather than communication-bound.
