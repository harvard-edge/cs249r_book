id: cloud-1774
title: Evaluating Storage Upgrades vs Data Serialization
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is training a large vision model on 8x H100 GPUs using a distributed dataset of 1
  billion 50KB images stored as individual files. You provisioned a cloud parallel file system with 50
  GB/s peak throughput, but GPU utilization is plateauing at 30%. Metrics show storage throughput is bottlenecked
  at 2 GB/s while hitting the volume's hard limit of 40,000 IOPS. The infrastructure team proposes upgrading
  to an 'Extreme NVMe' tier that provides 500,000 IOPS for 4x the hourly cost. Evaluate this hardware
  upgrade against migrating the dataset to a serialized format like WebDataset or TFRecord, justifying
  your decision with a quantitative throughput analysis.
details:
  realistic_solution: Reject the hardware upgrade and migrate to a serialized data format like WebDataset.
    By packing 50KB images into large 100MB tarballs, you convert hundreds of thousands of random IOPS
    into a few sequential reads per second. This trivially saturates the required training bandwidth using
    the existing storage volume while completely bypassing its 40,000 IOPS limit.
  common_mistake: Accepting the costly hardware upgrade without realizing that individual small file reads
    impose massive metadata and IOPS overhead, or failing to calculate that sequentializing the data completely
    eliminates the IOPS bottleneck on the cheaper storage tier.
  napkin_math: 'Target throughput needed for 8x H100s at 100,000 images/sec = 100k * 50KB = 5.0 GB/s.

    Current setup: 40,000 IOPS * 50KB = 2.0 GB/s max (Bottlenecked).

    Proposed upgrade: 500,000 IOPS * 50KB = 25 GB/s (Sufficient, but expensive).

    Serialized approach (WebDataset with 100MB shards): To achieve 5.0 GB/s, the system only needs (5000
    MB/s / 100 MB) = 50 IOPS. 50 IOPS is >99% below the current 40k IOPS limit, fully unlocking the 50
    GB/s volume throughput at no extra cost.'
