title: Evaluating Group DRO for Rare Medical Subgroups
topic: graph-compilation
status: published
provenance: imported
scenario: Your team is training a ViT-H disease classifier on 100M X-ray images using a cluster of 64x
  A100 (80GB) GPUs. The model achieves 98% overall accuracy via Empirical Risk Minimization (ERM), but
  degrades to 45% on a specific demographic subgroup that constitutes only 1% of the training data due
  to a spurious hospital watermark. An engineer proposes switching to Group Distributionally Robust Optimization
  (Group DRO) to minimize the worst-case group loss. Evaluate the feasibility of Group DRO given the current
  standard global batch size of 256, and justify the necessary systems-level adjustments to ensure stable
  convergence.
details:
  realistic_solution: Increase the global batch size significantly (e.g., to 4096) using gradient accumulation
    or implement stratified sampling to ensure a statistically significant number of minority samples
    per batch. Group DRO computes loss per group; if a group has negligible samples in a batch, its loss
    estimate is too noisy for stable worst-case optimization.
  common_mistake: Assuming Group DRO acts as a drop-in loss function replacement without realizing that
    standard batch sizes lead to extreme variance or missing samples for rare groups, destabilizing the
    min-max adversary.
  napkin_math: Minority prevalence = 1% (p=0.01). With current global Batch Size B=256, expected minority
    samples E = 256 * 0.01 = 2.56. Probability of 0 samples = (0.99)^256 ≈ 7.6%. This high variance causes
    Group DRO's exponentiated group weights to diverge. To ensure expected minority samples ≥ 32 for stable
    gradients, new minimum global B = 32 / 0.01 = 3200. Using B=4096 across 64 GPUs (B=64/GPU) yields
    ≈41 minority samples/batch.
