id: cloud-top-65007
title: Infinity Fabric vs NVLink for Scale-Up Topology
topic: chiplet-architecture
status: published
provenance: imported
scenario: You are choosing between an 8x H100 NVLink node and an 8x MI300X Infinity Fabric node for a
  70B parameter LLM training job with TP=8. Compare the all-reduce performance and memory capacity tradeoffs.
details:
  realistic_solution: 'For 70B LLM in BF16: model weights = 140GB. H100 8-GPU: 640GB total, 140GB fits
    with headroom for activations and optimizer states in mixed precision. MI300X 8-GPU: 1.536TB total,
    can hold full optimizer states in BF16 without offloading. All-reduce: both nodes have ~900 GB/s bandwidth.
    H100 NVLink topology: fully connected NVSwitch (6 switches), bisection bandwidth = 900 GB/s. MI300X:
    Infinity Fabric peer-to-peer bandwidth depends on system topology (PCIe vs dedicated fabric on OAM
    modules). AMD Instinct MI300X OAM: 7-link Infinity Fabric = 896 GB/s aggregate. Performance near-equivalent
    for all-reduce; MI300X wins on memory capacity and can eliminate gradient checkpointing.'
  common_mistake: Comparing peak bandwidth specs directly (NVLink 900 GB/s vs Infinity Fabric 896 GB/s)
    and concluding they are equivalent. The critical difference is memory capacity (80GB H100 vs 192GB
    MI300X) and compute throughput (989 vs ~1826 TFLOPS BF16), which changes the compute-to-communication
    ratio and whether the workload is compute or memory bound.
  napkin_math: '70B model, TP=8: each rank holds 70B/8 = 8.75B params = 17.5 GB BF16. All-reduce per step:
    2*(N-1)/N * 17.5GB = 30.6 GB. At 900 GB/s: 34ms all-reduce latency. Compute per step (forward+backward):
    ~6 × 70B FLOP (for F+B+optimizer) = 420 GFLOPs per token, or for a batch: depends on batch size. For
    a single forward pass: 2 × 70B = 140 GFLOPs — this is 0.14 TFLOPs (not 280 TFLOPs). With batch=512
    tokens: 2 × 2 × 70B × 512 = 143 TFLOPs. H100: 143T / 989T = 0.14s compute. Ratio: 34ms comm / 140ms
    compute = 24% overhead.'
