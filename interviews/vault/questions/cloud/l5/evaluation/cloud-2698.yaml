id: cloud-2698
title: Storage Architecture for Large-Scale Training
topic: roofline-analysis
status: published
provenance: imported
scenario: 'Training a foundation model on 100TB dataset. Option A: NFS over 100 Gbps Ethernet shared storage,
  prefetch to local SSD. Option B: GPUDirect Storage with 8 local NVMe SSDs per node (8TB per node, subset
  of data). Option C: Object storage (S3-compatible) with intelligent caching. Your cluster has 64 GPU
  nodes. Which storage architecture?'
details:
  realistic_solution: 'Option B is preferred for training throughput, but requires data sharding. 64 nodes
    × 8TB = 512TB local capacity, easily holds 100TB (each node stores a shard + overlap). GPUDirect from
    8 NVMe gives 8 × 5.5 GB/s = 44 GB/s per node to GPU, far exceeding the ~24 GB/s aggregate GPU demand
    (8 GPUs × 3 GB/s). Option A (NFS over 100GbE): 100 Gbps = 12.5 GB/s shared across 64 nodes = 195 MB/s
    per node. With 8 GPUs needing 24 GB/s per node, this is 123x bottlenecked. Prefetching to local SSD
    helps, but NFS is still the bottleneck for random access patterns. Option C (object storage): High
    latency (10-50ms per request), optimized for sequential reads. Works for streaming datasets but random
    access patterns (shuffled training) suffer. Caching helps but is complex to manage. Option B wins
    for throughput-critical training. The trade-off: data must be pre-sharded and shuffling across nodes
    requires periodic re-distribution.'
  common_mistake: Using shared network storage for training workloads. The per-node bandwidth from NFS/CIFS
    collapses at scale. Local NVMe with GPUDirect is the only architecture that scales I/O linearly with
    node count.
  napkin_math: 'A: 12.5 GB/s ÷ 64 nodes = 195 MB/s/node (123x too slow). B: 44 GB/s/node (2x headroom).
    C: latency-limited for random access. B wins decisively.'
