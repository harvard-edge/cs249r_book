id: cloud-0808
title: The Thermal Throttling Mystery
topic: power-budgeting
status: published
provenance: imported
scenario: 'We have two identical 1,000-GPU H100 clusters — same hardware, same software, same model. Cluster
  A in Phoenix, Arizona consistently trains 30% slower than Cluster B in The Dalles, Oregon. The ops team
  has checked everything: drivers, firmware, network config — all identical. What''s going on?'
details:
  realistic_solution: 'Thermal throttling. Phoenix ambient temperature in summer reaches 45°C (113°F).
    The Dalles averages 20°C (68°F). Data center cooling systems have finite capacity — they can only
    reject a certain number of watts of heat to the outside air. When ambient temperature rises, the temperature
    delta between the coolant and the outside air shrinks, reducing cooling effectiveness. When GPU junction
    temperatures exceed ~83°C, the hardware automatically reduces clock speeds and power draw (from 700W
    to ~500W) to prevent damage. This is thermal throttling, and it directly reduces training throughput.
    The 30% slowdown maps almost exactly to the power reduction: $500/700 = 71\%$ of peak performance.'
  common_mistake: '"There must be a software misconfiguration or a bad batch of GPUs" or "Network latency
    between racks is higher in Phoenix." Both ignore the physical environment the hardware sits in.'
  napkin_math: 'H100 TDP = 700W, throttle point = ~83°C junction. Phoenix data center: 45°C ambient →
    cooling struggles → GPU junction hits 83°C → throttles to 500W → **71% of peak throughput**. Oregon:
    20°C ambient → GPU junction stays at ~65°C → full 700W → **100% throughput**. The 29% gap matches
    the reported 30% slowdown. Fix options: (1) liquid cooling (removes ambient dependency), (2) schedule
    heavy training jobs at night (Phoenix drops to 25°C), (3) over-provision cooling capacity (expensive).
    This is why hyperscalers build in Oregon, Iowa, and the Nordics — not Phoenix.'
