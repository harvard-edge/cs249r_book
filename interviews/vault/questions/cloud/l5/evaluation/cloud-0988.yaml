title: Evaluating Operator Fusion in Computational Graphs
topic: graph-compilation
status: published
provenance: imported
scenario: You are optimizing a 15B parameter LLM for inference on a node with 8x A100 (80GB, 2.0 TB/s
  memory bandwidth) GPUs. Profiling shows GPU compute utilization is only 40%, and execution is heavily
  bound by memory bandwidth due to fragmented element-wise operations (LayerNorm, GeLU, and residual adds).
  You are evaluating whether to extract and compile the computational graph (e.g., via TorchInductor or
  XLA) to fuse these operations. Evaluate the trade-offs between dynamic eager execution and a statically
  compiled graph, specifically justifying the decision by calculating the memory bandwidth savings for
  a fused versus unfused sequence.
details:
  realistic_solution: Evaluate the graph for operator fusion of memory-bound operations. By compiling
    the computational graph, LayerNorm, GeLU, and Add can be fused into a single kernel. The intermediate
    activations are kept in on-chip SRAM instead of making round-trips to HBM, reducing memory traffic
    by a factor of 3 for those layers while sacrificing some dynamic shape flexibility.
  common_mistake: Assuming that computational graph compilation primarily accelerates compute (FLOPs)
    by reducing Python overhead, rather than fundamentally resolving memory bandwidth bottlenecks by eliminating
    intermediate tensor reads/writes to HBM.
  napkin_math: 'For a 16MB activation tensor:

    Unfused (3 separate ops): 3 * (16MB read + 16MB write) = 96MB total HBM traffic.

    Fused (1 compiled kernel): 16MB read (initial input) + 16MB write (final output) = 32MB total HBM
    traffic.

    Savings = 64MB per block per pass. At 2.0 TB/s HBM bandwidth, saving 64MB reduces memory-bound latency
    by 32 microseconds per operation, drastically improving throughput.'
