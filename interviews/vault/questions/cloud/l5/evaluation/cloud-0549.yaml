id: cloud-0549
title: 'The Power Efficiency Paradox: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: Your team is deploying a small, real-time 'routing' model onto the same server as a large inference
  model. This router model decides which expert in a Mixture-of-Experts (MoE) model to activate. Its latency
  is critical, but so is its power consumption, as every watt it uses is a watt the main LLM cannot. The
  router model is a small 50M parameter model processing a single feature vector per request (batch size
  1).
details:
  realistic_solution: The senior engineer is correct because this specific workload (a small model at
    batch size 1) is heavily **memory-bound**. Its performance is dictated not by the chip's peak compute
    power, but by the memory bandwidth. The job's Arithmetic Intensity (AI) is too low to saturate the
    compute units.
  common_mistake: Focusing solely on the peak TOPS/W (power efficiency) metric without considering the
    workload's Arithmetic Intensity. A chip's peak efficiency is irrelevant if the workload is memory-bound
    and can't even approach the performance peak where that efficiency is measured. The total energy equation
    (Energy = Power × Time) has two variables; ignoring time leads to the wrong conclusion.
  napkin_math: '50M params = 100MB weights. FLOPs = 1 GFLOP. Arithmetic Intensity = 1G / 100M = 10 FLOPs/byte.
    H100 ridge point = 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte. Since 10 << 295, the operation is heavily
    memory-bound. Memory time: 100MB / 3.35 TB/s = ~0.030ms. Compute time: 1 GFLOP / 989 TFLOPS = ~0.001ms.
    Power is wasted waiting on HBM.'
