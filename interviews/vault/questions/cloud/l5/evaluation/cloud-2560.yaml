id: cloud-2560
title: Cloud Fully Sharded Data Parallel L5 0
topic: data-parallelism
status: published
provenance: imported
scenario: 'For a 30B model on 64 GPUs, you can use: (A) FSDP across all 64 GPUs, (B) FSDP within each
  8-GPU node + DDP across 8 nodes, or (C) tensor parallelism within nodes + FSDP across nodes. Evaluate
  communication efficiency for each.'
details:
  realistic_solution: 'Option A (full FSDP): all-gathers across all 64 GPUs. Inter-node communication
    for every layer. Very high communication overhead (~40%). Option B (hybrid FSDP+DDP): FSDP within
    8-GPU node (fast NVLink), DDP gradient sync across 8 nodes. Intra-node all-gather is fast. Cross-node
    gradient AllReduce: 2*(8-1)/8 * 60 GB = 105 GB at 12.5 GB/s = 8.4s — still slow. Option C (TP+FSDP):
    tensor parallel within node (small activation all-reduces on NVLink), FSDP across nodes. Cross-node
    traffic: FSDP transfers 3x the per-node shard size (all-gather + reduce-scatter) = 3 * 7.5 GB = 22.5
    GB. Time = 1.8s. Best: C minimizes cross-node traffic by keeping heavy communication on fast NVLink.'
  common_mistake: Using FSDP uniformly across all GPUs regardless of network topology. The key insight
    is to match communication-heavy operations (all-gather, TP) to fast links (NVLink) and minimize traffic
    on slow inter-node links.
  napkin_math: 'Cross-node BW: 100 Gbps = 12.5 GB/s. A (full FSDP 64 GPUs): 3 × 60 GB × (63/64) ≈ 177
    GB cross-node → 14.2s. B (FSDP within 8-GPU node + DDP across 8 nodes): gradient AllReduce cross-node:
    2×(8-1)/8 × 60 GB = 105 GB → 8.4s. C (TP within node + FSDP across 8 nodes): intra-node TP uses NVLink;
    FSDP cross-node shard size = 60GB/8 = 7.5GB per node; 3 × 7.5GB = 22.5 GB cross-node → 1.8s. C minimizes
    cross-node traffic by keeping heavy tensor-parallel communication on fast NVLink.'
