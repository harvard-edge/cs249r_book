id: cloud-2707
title: Budget Allocation Near B_crit
topic: data-parallelism
status: published
provenance: imported
scenario: 'You have a $500K training budget at $3/GPU-hour. Your model''s B_crit is ~8K samples. Option
  A: 128 GPUs, B=32K for 2 weeks. Option B: 32 GPUs, B=8K for 6 weeks. Both reach the same final loss.
  Which is the better allocation and why?'
details:
  realistic_solution: 'Option A: 128 GPUs × 336h = 43,008 GPU-hours = $129K. But B=32K is 4x above B_crit,
    so compute efficiency is ~40%. Effective useful compute: ~$52K worth. Option B: 32 GPUs × 1008h =
    32,256 GPU-hours = $97K. At B=B_crit, compute efficiency is ~100%. Same final loss for $97K vs $129K.
    Option B saves $32K (25% less). The right choice depends on constraints: if the deadline is 2 weeks,
    you must pick A despite the waste. If you have 6 weeks, B is strictly better — you could even run
    B and use the $32K savings for hyperparameter sweeps, improving final quality.'
  common_mistake: Always choosing the faster wall-time option. In a budget-constrained setting, compute
    efficiency matters more than speed.
  napkin_math: 'A: 128 GPUs × 14d × 24h × $3 = $129K, 4x above B_crit. B: 32 GPUs × 42d × 24h × $3 = $97K,
    at B_crit. B saves $32K for same loss.'
