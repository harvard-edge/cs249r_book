id: cloud-1026
title: Continuous Fine-Tuning vs From-Scratch Retraining
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'You are evaluating a continuous training pipeline for an ad-CTR model generating $1M/day. The
  model suffers from concept drift, losing $5,000/day in revenue for each day it is not updated (Day 1:
  $0 loss, Day 2: $5k, Day 3: $10k, etc.). Currently, the model is retrained from scratch every 7 days
  on 32 A100 GPUs ($4/hr/GPU) for 24 hours. A proposed daily continuous fine-tuning (CFT) pipeline would
  update the model on the last 24 hours of data using 8 A100s for 4 hours. Evaluate the trade-offs of
  migrating to daily CFT. What architectural and modeling risks are introduced, and how do you quantitatively
  justify the decision?'
details:
  realistic_solution: Adopt the daily CFT pipeline to capture massive drift savings, but introduce a 'monthly
    anchor' from-scratch training run to reset the embedding space and mitigate catastrophic forgetting.
    Implement strong data validation gates before each daily CFT run to prevent model poisoning.
  common_mistake: Candidates often focus purely on the compute cost savings ($3k/wk vs $900/wk) and immediate
    drift mitigation, ignoring the long-term risks of catastrophic forgetting, vocabulary drift (new user/item
    embeddings), and negative feedback loops.
  napkin_math: "Weekly Retrain: Compute = 32 * $4 * 24 = $3,072. Drift loss = $0+$5k+$10k+$15k+$20k+$25k+$30k\
    \ = $105,000. Total = $108,072/wk. \nDaily CFT: Compute = 7 * (8 * $4 * 4) = $896/wk. Drift loss =\
    \ 7 * $5k (max 1 day stale) = $35,000. Total = $35,896/wk. \nSavings = ~$72,000/wk. The massive ROI\
    \ justifies the complexity of maintaining both CFT and monthly from-scratch pipelines."
