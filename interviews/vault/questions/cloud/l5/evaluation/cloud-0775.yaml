schema_version: 1
id: cloud-0775
title: The Reproducibility Paradox
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your research team trains a model that achieves state-of-the-art results. When the production
  team retrains with the 'same' code and data, accuracy is 3% lower. They try 5 more times — each run
  produces a different result, varying by up to 2%. The research team insists their code is deterministic.
  Where are the hidden sources of non-determinism, and what does it cost to eliminate them on a modern
  GPU cluster?
details:
  realistic_solution: 'There are at least five layers of non-determinism in GPU training: (1) **cuDNN
    autotuning** — cuDNN benchmarks multiple kernel implementations at startup and picks the fastest;
    different runs may select different kernels with different numerical properties. Fix: `torch.backends.cudnn.deterministic
    = True` (5-15% slower). (2) **Atomic floating-point reductions** — operations like `scatter_add`,
    batch norm, and attention use atomic adds on GPU, which are non-associative in floating point; the
    order depends on thread scheduling. Fix: use deterministic algorithms (`torch.use_deterministic_algorithms(True)`),
    which disables some fast kernels. (3) **Multi-GPU gradient reduction** — NCCL AllReduce order varies
    with network timing; FP16 gradient summation in different orders produces different results. Fix:
    enforce a fixed reduction tree (slower). (4) **Data loading order** — multi-worker DataLoader with
    `shuffle=True` produces different orderings even with the same seed if worker count or prefetch factor
    changes. Fix: use a deterministic sampler with explicit seed. (5) **Hardware variation** — different
    GPU silicon (even same model) has slightly different FP rounding behavior. Fix: impossible without
    emulation.'
  common_mistake: '"Set the random seed and it''s reproducible." Seeds control Python/NumPy/PyTorch RNG,
    but GPUs have hardware-level non-determinism that seeds cannot fix.'
  napkin_math: 'Performance cost of full determinism on 8× A100 training: cuDNN deterministic mode: -10%
    throughput. Deterministic algorithms: -15% (disables fast atomics). Fixed NCCL reduction: -5% (serialized
    communication). Total: ~30% slower training. For a 72-hour training run: 72 / 0.70 = 103 hours deterministic.
    Extra cost: 31 hrs × 8 GPUs × $2/hr = $496 per run. If you need 5 reproducible runs for a paper: $2,480
    in determinism tax. Most teams accept ±1% variance and run 3 seeds instead: 3 × 72 hrs × 8 × $2 =
    $3,456 — more expensive but gives confidence intervals rather than false precision.'
