id: cloud-1032
title: Mitigating Correlated Rack Failures in 2048-GPU Training
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are architecting the fault-tolerance strategy for training a 175B parameter LLM on a cluster
  of 2048 A100 GPUs. The GPUs are densely packed into 8 racks (256 GPUs per rack), with each rack sharing
  a single Top-of-Rack (ToR) switch and a chilled-water cooling manifold. Evaluate the trade-offs between
  node-local NVMe checkpointing and cross-rack asynchronous checkpointing, considering the impact of a
  correlated failure (e.g., a ToR switch crash or cooling leak) on training progress and cluster utilization.
details:
  realistic_solution: Implement a hierarchical fault-tolerance strategy. Utilize fast, high-frequency
    local checkpoints to NVMe arrays (~4.7s per node) for isolated GPU/software crashes, paired with periodic
    (e.g., hourly) cross-rack asynchronous checkpoints over the 400Gbps spine link (~56s) for correlated
    rack-level failures. The ~1.5% compute overhead for hourly remote checkpoints is ROI-positive given
    the $8,192 cost of losing 2 hours of work on 2048 GPUs.
  common_mistake: Assuming node failures are purely independent events and relying exclusively on high-frequency
    local NVMe checkpoints, which become completely inaccessible when the entire ToR switch or rack power
    fails — a correlated failure mode that destroys all local state simultaneously.
  napkin_math: A 175B model's training state (FP16 params + FP32 Adam optimizer) is ~2.8TB. Saving to
    local NVMe array (at 10GB/s) takes ~4.7s per node (chunked). Transferring 2.8TB cross-rack over a
    shared 400Gbps (50GB/s) spine link takes ~56 seconds. At $2/GPU/hr, losing 2 hours of work on 2048
    GPUs due to a ToR failure costs $8,192. Spending 56 seconds every hour on remote checkpoints wastes
    ~1.5% of compute but provides an ROI-positive insurance policy against highly correlated rack outages.
