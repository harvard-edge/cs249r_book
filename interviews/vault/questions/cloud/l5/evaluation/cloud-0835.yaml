id: cloud-0835
title: The Carbon-Aware Scheduling Tradeoff
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: Your organization has committed to reducing the carbon footprint of ML training. A 1,000 GPU-hour
  training job at 700W per GPU consumes 700 kWh. Your two datacenter regions have grid carbon intensities
  of 400 gCO2/kWh (coal-heavy) and 50 gCO2/kWh (renewable-heavy), but the renewable region has 20% less
  GPU capacity and 15% higher latency to your data lake. Evaluate whether carbon-aware scheduling is worth
  the performance tradeoff.
details:
  realistic_solution: 'Coal region: 700 kWh * 400 g/kWh = 280 kg CO2. Renewable region: 700 kWh * 50 g/kWh
    = 35 kg CO2. Carbon reduction = 87.5% (245 kg saved). The 20% capacity reduction means the job takes
    ~20% longer (1,200 GPU-hours effective), and data loading is 15% slower. For batch training, this
    adds a few hours to a multi-day job — negligible. For latency-sensitive inference, the tradeoff is
    harder to justify. The optimal strategy: route training and batch jobs to low-carbon regions, keep
    inference in the region closest to users.'
  common_mistake: Treating carbon reduction as a binary choice — either you care about carbon or you optimize
    for performance. In practice, carbon-aware scheduling can achieve 80-90% carbon reduction with modest
    performance impact by scheduling batch training (not latency-sensitive inference) to low-carbon regions.
  napkin_math: An A100 GPU pulls ~400W, plus PUE overhead = ~700W total per node-GPU slice. 1,000 GPU-hours
    = 700 kWh. In a coal-heavy region (400 gCO2/kWh), emissions = 700 * 400g = 280 kg CO2. In a renewable
    region (50 gCO2/kWh), emissions = 700 * 50g = 35 kg CO2. Relocating the job saves 245 kg of CO2 (an
    87.5% reduction), equivalent to the emissions of driving a gas car for 600 miles.
