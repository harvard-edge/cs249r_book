id: cloud-0544
title: The Multi-Modal Prefill Stall
topic: roofline-analysis
status: published
provenance: imported
scenario: 'You are deploying a multi-modal model (ViT + LLM) that analyzes high-resolution images (1024x1024)
  and text. Users report that prompts with images have an abysmal Time-To-First-Token (TTFT) of nearly
  4 seconds, while text-only prompts are fast. Your product manager suggests a quick fix: just downsample
  all images to 224x224. You argue this will unacceptably degrade accuracy for tasks requiring fine-grained
  detail. The PM challenges you to ''prove it''s worth the engineering effort'' to find another way. Justify
  your position by decomposing the TTFT and showing precisely where the latency is coming from. Why is
  the image so slow, and what is the fundamental trade-off the PM is missing?'
details:
  realistic_solution: The catastrophic TTFT is caused by the quadratic complexity of the self-attention
    mechanism within the Vision Transformer. The TTFT is the sum of `T_vision_encoder + T_llm_prefill`.
    The `T_vision_encoder` term is not constant; it scales with the square of the number of patches from
    the image. A high-resolution image creates a massive 'sequence' for the ViT, leading to a compute
    explosion before the LLM even sees a single token.
  common_mistake: Blaming the network transfer time for the high-resolution image, or assuming the entire
    slowdown happens inside the final LLM component. The key is to correctly identify that the Vision
    Transformer (ViT) pre-processor is itself a massive model whose compute scales non-linearly with input
    image resolution.
  napkin_math: At 1024x1024 resolution with 14x14 patches, the sequence length N = (1024/14)^2 = 5,329
    patches. Vision Transformer self-attention complexity is O(N^2), operations scale by 5,329^2 = 28.3M
    interactions. Compared to 224x224 (N=256), this is a 433x increase, monopolizing the GPU.
