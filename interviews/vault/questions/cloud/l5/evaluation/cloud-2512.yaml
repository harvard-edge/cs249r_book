title: Cloud Through Silicon Vias L5 0
topic: vram-budgeting
status: published
provenance: imported
scenario: Your team is choosing between an accelerator with 6 HBM3 stacks (expensive, 5 TB/s) and one
  with 4 HBM3 stacks (cheaper, 3.35 TB/s) for serving a memory-bandwidth-bound 70B LLM. How do you evaluate
  the trade-off?
details:
  realistic_solution: '70B model in FP16 = 140 GB. At batch=1 autoregressive decode, each token reads
    all weights once. With 3.35 TB/s: 140 GB / 3.35 TB/s = 41.8 ms/token ≈ 24 tok/s. With 5.0 TB/s: 140
    GB / 5.0 TB/s = 28 ms/token ≈ 36 tok/s. The 6-stack design gives 50% more tokens/s. If SLA requires
    >30 tok/s, the cheaper option fails. Cost per token: if 6-stack costs 40% more but serves 50% more
    tokens, it is more cost-efficient at high utilization.'
  common_mistake: Assuming compute (FLOPS) is the bottleneck for LLM decode. At batch=1, decode is purely
    memory-bandwidth-bound since each weight is used only once per token.
  napkin_math: '70B × 2B/param = 140 GB. 4-stack: 140/3.35 = 41.8 ms/tok → 24 tok/s. 6-stack: 140/5.0
    = 28 ms/tok → 36 tok/s. 50% throughput gain for ~40% cost increase.'
