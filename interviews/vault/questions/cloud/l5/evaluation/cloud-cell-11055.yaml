id: cloud-cell-11055
title: 'Fault Tolerance: Evaluate ZeRO vs Full Replica Checkpointing'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Your 70B model training uses ZeRO-3 across 256 H100s, sharding optimizer state, gradients,
  and parameters. Compare checkpointing strategies: (A) each node saves its ZeRO shard (distributed checkpoint),
  vs (B) rank 0 gathers full model and saves. Evaluate time, storage, and recovery complexity.'
details:
  realistic_solution: 'Strategy (A) distributed checkpoint is always correct for ZeRO-3. Each rank saves
    its shard. Recovery: all ranks restore their own shards. Partial failure: if 1 node fails and its
    shard is lost, must restore from previous checkpoint.'
  common_mistake: Using strategy (B) — gather to rank 0 — which serializes 280GB through rank 0's 80GB
    HBM, requiring offloading and creating a massive bottleneck.
  napkin_math: '70B model, ZeRO-3 across 256 GPUs. Per-rank shard: 280GB / 256 = 1.094GB. Strategy A:
    each rank writes 1.094GB in parallel. At 2 GB/s NVMe per node: 0.55 seconds. All 256 nodes write simultaneously
    → total 0.55 seconds. Strategy B: rank 0 collects 280GB. Across NVLink (900 GB/s): 280GB / 900 GB/s
    = 0.31 seconds collection. Rank 0 then writes 280GB: at 2 GB/s = 140 seconds. All other 255 ranks
    idle. Lost time: 255 × 140 seconds = 35,700 GPU-seconds. At $3/GPU-hr = $3/3600 × 35,700 = $29.75
    per checkpoint. 672 checkpoints in 2-week run = $20K waste. Strategy A wins decisively.'
