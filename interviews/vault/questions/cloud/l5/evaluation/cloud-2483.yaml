schema_version: 1
id: cloud-2483
title: The NPU Fallback Latency Trap
topic: latency-decomposition
status: published
provenance: imported
scenario: You deploy an INT8 quantized MobileViT via your cloud pipeline to edge devices. Theoretical
  NPU latency is 10ms. Actual P99 latency is 350ms. Profiling reveals the GeLU activation isn't supported
  in INT8 on the target NPU, causing a memory-copy back to the CPU for FP32 execution, then a copy back
  to the NPU.
details:
  realistic_solution: This requires algorithm-hardware co-design. You must replace the GeLU activations
    with hardware-friendly approximations (like ReLU6 or HardSwish) that the NPU's INT8 compiler natively
    supports. Retrain or finetune the model in the cloud to recover the 1-2% accuracy drop. The tradeoff
    is a slight decrease in model capacity versus a massive, deterministic improvement in latency and
    power consumption by keeping the entire execution graph on the NPU.
  common_mistake: Accepting the hybrid CPU/NPU execution graph without realizing that memory copy overhead
    across the PCIe/system bus completely negates the NPU's acceleration.
  napkin_math: 'NPU execution time: 8ms. CPU execution of GeLU: 20ms. Cross-processor memory copy overhead
    (NPU->CPU->NPU) + driver sync: 150ms + 150ms = 300ms. Total hybrid latency = 8 + 20 + 300 = 328ms.
    Removing the fallback eliminates the 300ms overhead and 20ms CPU time, dropping latency to ~10ms (a
    32x speedup).'
