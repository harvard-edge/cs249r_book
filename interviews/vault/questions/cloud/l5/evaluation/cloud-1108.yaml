id: cloud-1108
title: Evaluating Datasheet Overhead for Clinical LLMs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is preparing to train a 50B parameter clinical LLM on a 2TB corpus of electronic health
  records (EHR) and medical literature. The compliance team mandates the rigorous completion of 'Datasheets
  for Datasets' to document data provenance, collection methodology, and demographic composition before
  the $1M compute budget (using 512 H100 GPUs for 21 days) is approved. The engineering team argues this
  manual documentation process will delay the project by 6 weeks. Evaluate the trade-offs of skipping
  strict datasheet creation versus the downstream risks. What quantitative justification supports the
  compliance mandate?
details:
  realistic_solution: Justify the delay by framing Datasheets as a preventative quality assurance step
    for the dataset. Discovering a fatal demographic skew (e.g., 85% of records from a single demographic)
    post-training could ruin the entire $1M training run and expose the organization to regulatory liability.
    The $72K datasheet creation cost is merely 7% of the $1.03M compute cost, and catching a data issue
    even 10% of the time yields positive expected value.
  common_mistake: Candidates evaluate the cost purely in terms of engineering hours delayed, ignoring
    the massive financial risk of a ruined $1M training run or post-deployment regulatory penalties from
    deploying a biased clinical model.
  napkin_math: 'Compute risk: 512 H100s * $4/hr * 504 hours = $1,032,192. Datasheet creation cost: 3 data
    stewards * 240 hours (6 weeks) * $100/hr = $72,000. The datasheet cost is merely 7% of the compute
    cost. If completing the datasheet catches a fatal data bias that would ruin the model even 1 in 10
    times, the expected value of the delay is positive ($103k saved vs $72k spent).'
