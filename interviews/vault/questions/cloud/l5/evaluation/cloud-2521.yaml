id: cloud-2521
title: Cloud Train Serve Split L5 0
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A product manager asks why you don't just run inference in the cloud too, since you already
  have the GPU cluster. The edge deployment adds complexity (model export, quantization, OTA updates).
  Evaluate cloud-only vs. train-cloud/serve-edge.
details:
  realistic_solution: 'Cloud inference: simpler deployment, full-precision model, but adds 50-200 ms network
    latency per request, requires persistent connectivity, and costs ~$0.001-0.01 per query. For 10M daily
    queries: $10K-$100K/day ($300K-$3M/month). Edge inference: no network latency (local), works offline,
    privacy-preserving (data stays on device), but requires quantization pipeline and OTA updates. Cost:
    zero per-query marginal cost after device purchase. Choose edge when: latency-sensitive (<50 ms),
    offline required, privacy-critical, or high query volume makes cloud cost prohibitive.'
  common_mistake: Ignoring network latency and availability. Cloud inference adds 50-200 ms round-trip,
    which is unacceptable for real-time applications like speech recognition or autonomous driving.
  napkin_math: 'Cloud: 10M queries/day × $0.003/query = $30K/day = $900K/month. Edge: one-time quantization
    + OTA infra ≈ $50K/year. Edge is astronomically cheaper at scale.'
