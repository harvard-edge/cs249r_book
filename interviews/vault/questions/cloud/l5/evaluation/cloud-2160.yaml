id: cloud-2160
title: The Chinchilla Scaling Decision
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'You have a fixed GPU budget of 1M H100-hours. The Chinchilla scaling law says the compute-optimal
  70B model should be trained on ~1.4T tokens. But your team has only 500B tokens of high-quality data.
  Do you: (A) train a 70B model on 500B tokens (undertrained by Chinchilla), (B) train a smaller ~25B
  model on 500B tokens (Chinchilla-optimal for your data), or (C) train a 70B model and repeat the 500B
  tokens ~3 times? Justify quantitatively.'
details:
  realistic_solution: 'The answer depends on whether you are optimizing for **training cost** or **total
    cost of ownership (training + inference)**. Chinchilla-optimal (B) minimizes training loss per FLOP,
    but a 70B model trained on even 500B tokens will likely outperform a 25B model trained on the same
    data for downstream tasks. Option C (repeating data) shows diminishing returns after ~4 epochs on
    the same data — empirically, quality plateaus after 2-3 repeats. Best strategy: Option A with a twist
    — train the 70B model on 500B tokens (Chinchilla-undertrained), accept the training inefficiency,
    but win on inference: the 70B model at 500B tokens likely matches a 25B model at far higher token
    counts, and when served with quantization (INT4), the 70B model''s inference cost is only ~1.5× the
    25B model while being substantially more capable.'
  common_mistake: Blindly following Chinchilla to train a smaller model. Recent evidence (Llama, Mistral)
    shows that inference-optimal scaling prefers larger models trained beyond Chinchilla-optimal because
    inference cost dominates deployment cost.
  napkin_math: '1M H100-hours ≈ 3.56e24 peak FLOPS. Usable FLOPS ≈ 1.4e24 | Chinchilla-optimal: ~70B params,
    ~1.4T tokens | Your data constraint: 500B tokens | Option A (70B, 500B): uses ~15% of budget (2.1e23
    FLOPS), strong model, suboptimal training efficiency | Option B (25B, 500B): uses ~5% of budget, weaker
    model, Chinchilla-optimal | Inference cost: 70B-INT4 ≈ 35 GB, 25B-INT4 ≈ 12.5 GB — but 70B quality
    >> 25B quality | Choose A if inference-heavy, B if training-cost-constrained'
