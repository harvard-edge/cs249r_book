schema_version: 1
id: cloud-0817
title: The Parquet Row Group Chunking
topic: vram-budgeting
status: published
provenance: imported
scenario: Your data engineering team provides a 5 TB dataset stored in Parquet format in AWS S3. Your
  PyTorch dataloader only needs to read a single column (the text feature) to train an NLP model. Because
  Parquet is columnar, this should be incredibly fast and save bandwidth. However, your dataloader is
  downloading data at 10 GB/s, saturating the network, and reading almost the entire 5 TB. Why didn't
  the columnar format save you bandwidth?
details:
  realistic_solution: The Parquet file was written with a single massive Row Group (or very few, very
    large Row Groups). Parquet's columnar format only enables column-level reads within a Row Group via
    byte-range S3 requests. If the entire 5TB file is one Row Group, the column index says 'your text
    column starts at byte offset X', but the reader must still download contiguous chunks containing all
    columns interleaved within that Row Group. With proper Row Group sizing (64-256 MB), the reader issues
    small, targeted byte-range requests for only the text column's data in each Row Group, reducing network
    transfer from 5TB to ~500GB — a 10x savings.
  common_mistake: '"S3 doesn''t support columnar reads." S3 supports byte-range requests perfectly. The
    issue is how the Parquet file was internally structured.'
  napkin_math: 5 TB file with 10 columns. If correctly chunked, reading 1 column pulls ~500 GB over the
    network. If written as a single Row Group, naive readers will download the entire 5,000 GB, wasting
    4.5 TB of AWS egress and bandwidth.
