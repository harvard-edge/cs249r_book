id: cloud-1962
title: Evaluating Statistical Parity Trade-offs in Credit Scoring
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are evaluating two credit scoring models for a cloud deployment serving 15,000 daily applications
  (10k from Group P, 5k from Group U). Model A achieves 92% accuracy with positive selection rates of
  80% (Group P) and 40% (Group U). Model B achieves 87% accuracy with selection rates of 65% (Group P)
  and 55% (Group U). Regulations require the Statistical Parity Difference (SPD) to be strictly less than
  0.15 to avoid disparate impact litigation. Evaluate the models and justify the deployment choice considering
  the trade-offs.
details:
  realistic_solution: Deploy Model B. Calculate the SPD for Model A (|0.80 - 0.40| = 0.40) and Model B
    (|0.65 - 0.55| = 0.10). Model A severely violates the <0.15 threshold, exposing the business to legal
    risk. Model B is chosen because it meets the regulatory threshold, making the 5% accuracy drop a mandatory
    compliance cost.
  common_mistake: Candidates often prioritize Model A for its higher accuracy or calculate the disparate
    impact ratio (0.80/0.40 = 2.0) instead of the absolute difference, failing to verify against the strict
    0.15 SPD constraint.
  napkin_math: Model A SPD = |0.80 - 0.40| = 0.40 (> 0.15 threshold). Model B SPD = |0.65 - 0.55| = 0.10
    (< 0.15 threshold). Total approvals A = 8000 + 2000 = 10,000. Total approvals B = 6500 + 2750 = 9,250.
    The cost of fairness is 750 fewer daily approvals.
