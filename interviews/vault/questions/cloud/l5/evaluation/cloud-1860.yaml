id: cloud-1860
title: Evaluating Custom Serving Engine ROI
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your startup recently spent $2.5M training a custom 70B parameter LLM on a cluster of 1,024
  H100 GPUs. The business team wants to deploy the model immediately to serve a projected 1,000 queries
  per second (QPS) with an average output length of 1,024 tokens. The engineering team proposes delaying
  the launch by 3 months to develop a highly optimized inference engine leveraging custom speculative
  decoding, which they claim will double token throughput per node compared to the off-the-shelf vLLM
  baseline. Evaluate the financial trade-offs of this delay.
details:
  realistic_solution: Calculate the annual inference run-rate. At 1,000 QPS and 1K tokens, the system
    generates 1M tokens/sec. If an 8xH100 node provides 10K tokens/sec, you need 100 nodes. At ~$30/hr
    per node, the annual cost is >$26M. Doubling throughput reduces the node count by 50, saving ~$13M
    annually, vastly outweighing the opportunity cost of a 3-month delay.
  common_mistake: Focusing purely on the $2.5M training cost as the primary expense and arguing that time-to-market
    is paramount, completely missing that inference costs at 1,000 QPS will eclipse training costs within
    weeks.
  napkin_math: 'Demand: 1,000 QPS * 1,024 tokens = ~1M tokens/sec. Baseline Node Capacity: 8xH100 yields
    ~10,000 tokens/sec. Nodes needed: 1M / 10K = 100 nodes. Annual Cost: 100 nodes * $30/hr * 8760 hrs
    = $26.28M/year. Optimized Capacity: 20K tokens/sec -> 50 nodes. Savings: $13.14M/year. 3 months delay
    costs 25% of annual revenue, but structurally reduces OpEx by 50% permanently.'
