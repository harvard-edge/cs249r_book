id: cloud-cell-10110
title: Evaluate EfficientNet compound scaling coefficient impact on H100 memory bandwidth
topic: cnn-efficient-design
status: published
provenance: imported
scenario: EfficientNet compound scaling uses φ to jointly scale width (α^φ), depth (β^φ), and resolution
  (γ^φ) with constraint α·β²·γ²≈2. You are evaluating whether increasing φ from 1 (B1) to 4 (B4) provides
  proportional accuracy gains on H100 with HBM3 bandwidth of 3.35 TB/s. Evaluate the memory bandwidth
  utilization at each scaling level and identify the saturation point.
details:
  realistic_solution: 'B1→B4 accuracy gains: B1 79.1%, B2 80.1%, B3 81.6%, B4 82.9% — diminishing returns.
    Resolution scaling dominates memory: B1 240×240, B4 380×380. Feature map sizes scale as (380/240)²
    = 2.5× larger. At batch=32: B4 activation memory ~3.2GB vs B1 ~1.3GB. H100 HBM3 bandwidth: depthwise
    layers at B4 (380×380) become increasingly memory-bound. Saturation around B5/B6 where accuracy gain
    per FLOP drops below 0.1pp.'
  common_mistake: Assuming accuracy scales linearly with φ and that H100 HBM3 bandwidth eliminates memory
    bottlenecks for all EfficientNet variants; ignoring that resolution scaling (γ^φ) quadratically increases
    activation memory.
  napkin_math: 'B4 input: 380×380. Stage 7 feature map: 12×12×320. Depthwise 3×3: reads 12×12×320×2B =
    92KB, computes 2×320×9×144 = 829K FLOPs → intensity = 829K/92K = 9 FLOP/byte. H100 roofline: 3.35TB/s
    × 9 = 30 TFLOPS — far below 989 TFLOPS peak. All depthwise layers are memory-bound regardless of HBM3
    bandwidth. B4 total memory bandwidth per image: ~800MB/s needed. At batch=32: 32×800M = 25.6 GB/s
    — trivial for 3.35TB/s HBM3. Bandwidth not the bottleneck; it is kernel launch and low arithmetic
    intensity.'
