id: cloud-2758
title: NAS vs Manual Design
topic: neural-architecture-search
status: published
provenance: imported
scenario: 'Your team has 2 weeks and 1000 GPU-hours to find the best model for an edge device with 200ms
  latency constraint. Options: (A) run NAS with hardware-aware search, (B) manually adapt existing EfficientNet/MobileNet
  architectures, (C) use a pretrained model zoo and fine-tune. Evaluate.'
details:
  realistic_solution: 'Option A (hardware-aware NAS): needs ~200+ GPU-hours for supernet + search, leaving
    ~800 for final training and validation. But NAS setup time (defining search space, implementing hardware
    latency predictor, debugging) takes 3-5 days of engineering time. If done well, produces a custom
    architecture optimized for your exact hardware. Risk: poorly designed search space wastes the entire
    budget. Option B (adapt existing architectures): EfficientNet/MobileNet are already optimized for
    edge. Width multiplier and resolution scaling let you hit the 200ms target quickly. Takes 1-2 days
    to benchmark variants, leaving 10+ days for training and validation. Lower ceiling but much lower
    risk. Option C (model zoo + fine-tune): fastest to deploy (1-2 days). But pretrained models may not
    meet the 200ms constraint without pruning/quantization, and fine-tuning quality depends on task similarity.
    Recommendation: B for a 2-week deadline. The proven architecture families get you 90% of NAS quality
    at 20% of the engineering effort. Use NAS only if you have >1 month and dedicated ML infrastructure
    expertise.'
  common_mistake: Always choosing NAS because it sounds more rigorous. NAS requires significant expertise
    to set up correctly, and within tight budgets, manually adapting proven architectures often yields
    better results.
  napkin_math: 'A: 5d setup + 200 GPU-h NAS + 800 GPU-h training. High ceiling, high risk. B: 2d setup
    + 1000 GPU-h training/validation. 90% of A''s quality, 20% effort. B wins on tight timeline.'
