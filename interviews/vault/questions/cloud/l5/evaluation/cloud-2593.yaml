id: cloud-2593
title: Cloud Benchmark Harness L5 0
topic: roofline-analysis
status: published
provenance: imported
scenario: A hardware vendor claims their chip is 2x faster than H100 for LLM inference, showing benchmark
  results at batch=1, sequence=128. Your production workload is batch=32, sequence=2048. Evaluate the
  validity of their claim for your use case.
details:
  realistic_solution: 'The vendor''s benchmark (batch=1, seq=128) is memory-bandwidth-bound — each token
    reads all weights once, minimal KV cache. This favors chips with high memory bandwidth. Your workload
    (batch=32, seq=2048) is mixed: prefill is compute-bound, decode is still memory-bound but with 32x
    more KV cache. Key concerns: (1) Does the chip have enough memory capacity for batch=32 KV cache?
    (2) Is the compute sufficient? If the vendor achieves 2x speedup at batch=1, they likely have ~6.7
    TB/s bandwidth. However, if they compromised on compute (e.g., 500 TFLOPS vs H100''s 989 TFLOPS),
    the 2x advantage will invert to a 0.5x disadvantage during the compute-bound prefill phase of your
    workload.'
  common_mistake: Accepting vendor benchmarks at face value without matching the benchmark configuration
    to your production workload. Batch size, sequence length, and model architecture dramatically change
    which resource (compute, memory, bandwidth) is the bottleneck.
  napkin_math: 'Vendor at batch=1: 2x H100 (BW-bound, measures memory bandwidth). At batch=32: workload
    shifts toward compute-bound. If vendor has 6.7 TB/s BW (vs H100 3.35 TB/s) but only 500 TFLOPS (vs
    H100''s 989 TFLOPS), the BW advantage vanishes. Compute: 500 TFLOPS vs 989 → ~0.5x at compute-bound
    regime.'
