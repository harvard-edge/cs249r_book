title: Choosing Between Stateful and Functional Paradigms
topic: pruning-sparsity
status: published
provenance: imported
scenario: A research team is starting a new project involving novel architectures with heavy use of per-sample
  gradients, custom higher-order derivatives, and auto-vectorization. They currently use PyTorch. Should
  they switch to JAX? What are the trade-offs?
details:
  realistic_solution: 'JAX is likely the better fit for this specific project. Per-sample gradients (vmap(grad(f)))
    and higher-order derivatives (grad(grad(f))) compose naturally in JAX''s functional paradigm — they
    are first-class operations, not bolted-on features. In PyTorch, per-sample gradients require torch.func.vmap
    (still maturing) or manual tricks, and higher-order derivatives need create_graph=True with careful
    memory management. Trade-offs favoring JAX: mathematical composability, XLA compilation for custom
    ops, reproducibility (pure functions = deterministic). Trade-offs favoring PyTorch: larger ecosystem
    (HuggingFace, torchvision), easier debugging (eager mode by default), more hiring availability, mutable
    state is natural for standard training loops. The team should consider: if the project is research-focused
    with novel math, JAX wins. If it needs production deployment with existing infrastructure, PyTorch''s
    ecosystem advantage matters more.'
  common_mistake: Choosing a framework based on popularity rather than the specific workload requirements.
    JAX excels at mathematical transforms; PyTorch excels at ecosystem and deployment.
  napkin_math: 'Per-sample grads: JAX = 1 line (vmap(grad(f))). PyTorch = 10-20 lines with torch.func
    or manual loop. Higher-order: JAX = grad(grad(f)). PyTorch = create_graph=True + manual management.'
