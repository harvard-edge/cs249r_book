id: cloud-cell-11092
title: 'Feature Store: Evaluate Point-in-Time Correct Feature Joins for Training Data'
topic: feature-store-management
status: published
provenance: imported
scenario: 'Your training dataset for an H100-based fraud detection model uses user features from a feature
  store. Without point-in-time correctness, you join the latest feature values to historical labels. Compare:
  (A) latest-value join vs (B) point-in-time correct join. Evaluate data leakage risk and implementation
  complexity.'
details:
  realistic_solution: 'Without PIT-correctness: model sees features computed after the label timestamp
    (e.g., account balance after fraud occurred). Model learns from future information → inflated training
    AUC → production degradation. PIT-join: for each label timestamp T, use feature values as of T-ε (just
    before event).'
  common_mistake: Using latest-value joins and being surprised when model performs well in training but
    poorly in production — classic data leakage from future feature values.
  napkin_math: 'Training dataset: 10M labeled fraud events over 2 years. Without PIT: join current user_credit_score
    (computed today) to events from 2 years ago. Users who committed fraud may have different credit scores
    today vs at fraud time. Leakage magnitude: credit score at fraud time vs today can differ by 50-100
    points. Expected AUC inflation: 5-15% (from PIT-naive to PIT-correct). Production AUC drop: model
    achieves 0.94 AUC in training (leaky), 0.79 AUC in production. Cost: 10M events × 500 features × 4B
    = 20GB feature history. PIT join: for each event, binary search in feature history by timestamp →
    O(n log m) where m = history entries. At 10 events/user, 10M users: 100M binary searches in 20GB =
    ~10 seconds on Spark. Worth it: eliminates 15% AUC inflation.'
