title: Federated Learning ROI Under Regulatory Constraints
topic: federated-learning
status: published
provenance: imported
scenario: 'A healthcare company must comply with HIPAA. Option A: build a centralized data lake with full
  compliance infrastructure ($500K setup + $50K/month). Option B: federated learning ($100K setup + $20K/month)
  but model accuracy drops 3% due to non-IID data. The model generates $200K/month revenue. Which has
  better 2-year ROI?'
details:
  realistic_solution: 'Option A 2-year cost: $500K + 24 × $50K = $1.7M. Revenue: 24 × $200K = $4.8M. Profit:
    $3.1M. Option B 2-year cost: $100K + 24 × $20K = $580K. Revenue with 3% accuracy drop: assume 3% accuracy
    → ~5% revenue impact = $190K/month. Revenue: 24 × $190K = $4.56M. Profit: $3.98M. Option B yields
    $880K more profit despite lower accuracy, because the compliance infrastructure savings ($1.12M) far
    outweigh the revenue loss ($240K). However, this analysis is sensitive to the accuracy-revenue relationship
    — if the 3% accuracy drop maps to patient safety outcomes rather than just revenue, the calculation
    changes fundamentally.'
  common_mistake: Linearly mapping accuracy loss to revenue loss. In healthcare, a 3% accuracy drop may
    have nonlinear consequences (regulatory penalties, malpractice liability).
  napkin_math: 'A: $1.7M cost, $4.8M rev → $3.1M profit. B: $580K cost, $4.56M rev → $3.98M profit. B
    wins by $880K over 2 years.'
