schema_version: 1
id: cloud-2451
title: Speculative Decoding Draft Model Sizing
topic: speculative-decoding
status: published
provenance: imported
scenario: 'You are deploying a 70B parameter LLM for a code generation API. The strict latency budget
  is 20ms Time Per Output Token (TPOT). Currently, TPOT on 4x A100 80GB GPUs is 35ms at batch size 1.
  You propose speculative decoding and must choose between two draft models: a 1.5B model (acceptance
  rate 0.6, 5ms/token draft latency) and a 7B model (acceptance rate 0.85, 12ms/token draft latency).
  The 70B target model evaluation step takes 15ms for verifying up to 5 tokens.'
details:
  realistic_solution: The correct choice is the 1.5B draft model. Speculative decoding performance is
    a strict tradeoff between the computational overhead of the draft model and the acceptance rate of
    the target model. The goal is to minimize the expected time per generated token. A highly accurate
    draft model is useless if its latency overhead consumes the time saved by skipping target model autoregressive
    steps. By calculating the expected latency per generated token, the 1.5B model yields ~10.3ms/token,
    comfortably beating the 20ms budget. The 7B model yields ~14.3ms/token. While both meet the budget,
    the 1.5B model provides 28% lower latency and uses less VRAM, leaving more memory for the KV cache.
  common_mistake: Choosing the 7B model because its 85% acceptance rate seems vastly superior and will
    lead to fewer target model evaluations.
  napkin_math: 'Let gamma = 4 tokens drafted per step. Target evaluation = 15ms.

    1.5B Draft: Draft time = 4 * 5ms = 20ms. Total step time = 20ms + 15ms = 35ms. Expected tokens generated
    = 1 + (4 * 0.6) = 3.4 tokens. Expected TPOT = 35ms / 3.4 = 10.29 ms/token.

    7B Draft: Draft time = 4 * 12ms = 48ms. Total step time = 48ms + 15ms = 63ms. Expected tokens generated
    = 1 + (4 * 0.85) = 4.4 tokens. Expected TPOT = 63ms / 4.4 = 14.31 ms/token.'
