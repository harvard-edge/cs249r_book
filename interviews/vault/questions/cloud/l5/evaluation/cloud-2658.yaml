id: cloud-2658
title: Preventing Undeclared Dependencies at Scale
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Your organization has 50 ML models consuming features from 200+ upstream data sources. Option
  A: build a centralized feature store with versioned feature schemas ($500K, 6 months). Option B: add
  statistical monitoring on all model inputs ($100K, 2 months). Option C: require upstream teams to register
  all schema/logic changes in a shared catalog ($50K, 1 month). Which strategy best prevents silent failures?'
details:
  realistic_solution: 'The correct answer is A + C, with B as a safety net — but if forced to choose one,
    Option A (feature store) is most impactful. Option C (shared catalog) is cheapest but relies on human
    compliance — upstream teams must remember to register changes, which fails under time pressure. It
    catches ~60% of issues. Option B (statistical monitoring) detects problems after they occur but doesn''t
    prevent them. It''s reactive: by the time you detect a shift, predictions have already degraded. Detection-to-fix
    latency is typically days. Option A (feature store) is the only preventive solution. Versioned feature
    schemas mean the ML model pins to a specific feature version. When upstream changes the computation,
    it creates a new version — the ML model continues using the old version until explicitly migrated.
    This decouples upstream changes from downstream consumption. The $500K cost pays for itself after
    preventing 2-3 silent failures (each costing $100K-$500K in degraded recommendations or incorrect
    decisions).'
  common_mistake: Choosing monitoring (Option B) over prevention (Option A). Detecting a broken feature
    after predictions degrade is far more expensive than preventing the breakage via versioned schemas.
  napkin_math: '50 models × 4 features avg = 200 dependencies. At 5% silent breakage rate/year: 10 incidents
    × $200K avg impact = $2M/year. Feature store ($500K) = 3-month payback.'
