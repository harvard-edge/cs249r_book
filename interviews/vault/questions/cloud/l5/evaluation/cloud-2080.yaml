id: cloud-2080
title: The Retraining Trigger Strategy
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your production model serves 1M predictions/day. You must decide the retraining strategy: (A)
  Fixed schedule (retrain every 7 days regardless of performance), (B) Performance-triggered (retrain
  when online accuracy drops below threshold), or (C) Data-drift-triggered (retrain when input distribution
  shift exceeds threshold). Each strategy has different compute costs, staleness risk, and operational
  complexity. Evaluate all three strategies for a high-stakes medical diagnosis model where both freshness
  and reliability matter.'
details:
  realistic_solution: 'For a high-stakes medical model, the correct answer is a hybrid: use all three
    as layered defenses. (A) Fixed schedule as baseline: retrain every 14 days regardless. This bounds
    maximum staleness and catches gradual drift that falls below per-check thresholds. Cost: predictable,
    budgetable. Risk: retraining on bad data if quality checks are weak. (B) Performance-triggered as
    emergency brake: if rolling 24-hour accuracy drops > 2% from baseline, trigger immediate retraining
    on validated data. This catches acute failures (upstream data format changes, sudden population shift).
    Must use sequential monitoring (not fixed-window A/B test) for rapid detection. (C) Data-drift-triggered
    as early warning: compute PSI (Population Stability Index) or JSD on incoming feature distributions
    daily. If drift exceeds threshold (PSI > 0.1), flag for investigation — do NOT auto-retrain, because
    drift might indicate data corruption, not genuine population change. For medical models: investigation
    gate before retraining is mandatory (regulatory requirement). The key insight: triggers must be independent
    and defense-in-depth. No single trigger catches all failure modes.'
  common_mistake: Choosing a single strategy without considering the failure modes of each. Fixed schedule
    wastes compute when nothing changes. Performance-triggered reacts too late. Drift-triggered can false-alarm
    on benign distribution shifts.
  napkin_math: 'Fixed schedule: 52 retraining runs/year (one per week). At $2K/run = $104K/year, ~0 undetected
    staleness days (max 7). Performance-triggered alone: detects failures after ~24h of degraded predictions
    = 1M × degraded accuracy = potentially thousands of misdiagnoses before detection. Drift-triggered
    alone: catches 80% of distribution shifts but misses gradual concept drift. Hybrid: $104K base + ~4
    emergency retrains/year ($8K) + drift monitoring ($5K/year) = $117K/year for comprehensive coverage.'
