id: cloud-0647
title: The FP8 Training Frontier
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team successfully trained a 13B parameter LLM in FP8 on H100s with no accuracy loss. Encouraged,
  you try FP8 training on a 125M parameter BERT model. The loss diverges within 200 steps. Both use the
  same FP8 recipe with per-tensor scaling. Why does FP8 work for the large model but fail for the small
  one?
details:
  realistic_solution: 'Large models have a statistical advantage: with billions of parameters, the gradient
    distributions within each tensor are smooth and approximately Gaussian, making per-tensor scaling
    effective. A single scale factor can cover the dynamic range of the entire tensor. Small models have
    far fewer parameters per layer, leading to spiky, heavy-tailed gradient distributions where a few
    outlier values dominate. Per-tensor scaling must accommodate these outliers, crushing the majority
    of small gradients below FP8''s representable range. The fix for small models is per-channel or per-group
    scaling (finer granularity), or simply using BF16.'
  common_mistake: '"FP8 is FP8 — if it works for large models, it should work for small ones too." This
    ignores how model size affects gradient statistics.'
  napkin_math: '13B model FFN layer: weight matrix is $[5120, 20480]$ = 104M elements. Gradient distribution
    is smooth; 99.9th percentile is ~3× the median. A single scale factor wastes $\log_2(3) \approx 1.6$
    bits of range — acceptable with FP8''s 4 exponent bits. 125M BERT FFN layer: weight matrix is $[768,
    3072]$ = 2.4M elements. Gradient distribution has outliers at 100× the median. Per-tensor scale wastes
    $\log_2(100) \approx 6.6$ bits — more than FP8 E4M3''s entire 4-bit exponent range. Memory savings
    from FP8: model states drop from $16\Phi$ bytes (Adam FP32) to $\approx 10\Phi$ bytes — a 37% reduction.
    Throughput gain on H100: FP8 Tensor Cores deliver 1,979 TFLOPS vs 989 TFLOPS FP16 — a 2× compute boost,
    but only if the numerics converge.'
