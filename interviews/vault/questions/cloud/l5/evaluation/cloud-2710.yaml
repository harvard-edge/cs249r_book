id: cloud-2710
title: PS for Sparse Recommendation Models
topic: data-parallelism
status: published
provenance: imported
scenario: 'Your recommendation model has a 500GB embedding table with <1% of embeddings accessed per batch.
  The team debates: (A) AllReduce with model parallelism to shard embeddings, (B) parameter servers with
  sparse updates. Evaluate both approaches.'
details:
  realistic_solution: 'AllReduce with model parallelism: shards the 500GB table across nodes, but AllReduce
    still requires communicating dense gradient buffers for each shard. Even if gradients are sparse,
    most AllReduce implementations send dense tensors, wasting bandwidth. Parameter servers with sparse
    updates: workers send only the embedding IDs they accessed (~5GB, 1% of 500GB) and receive only those
    updated rows. Communication volume is ~100x less per step. The PS architecture naturally supports
    sparse pull/push operations. Recommendation: Use parameter servers. The <1% access pattern is the
    exact use case PS excels at. AllReduce''s strength (even bandwidth distribution) becomes a weakness
    when 99% of communicated data is zeros.'
  common_mistake: Defaulting to AllReduce because it is standard. For extremely sparse access patterns,
    AllReduce wastes bandwidth syncing the entire embedding table when only <1% changes per step.
  napkin_math: 'AllReduce: must sync ~500GB/N per shard as dense. PS sparse: sync ~5GB total (1% accessed).
    100x communication reduction with PS.'
