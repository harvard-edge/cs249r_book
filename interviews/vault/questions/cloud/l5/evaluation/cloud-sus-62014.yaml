schema_version: 1
id: cloud-sus-62014
title: TPU v5e as Prefill Accelerator
topic: disaggregated-serving
status: published
provenance: imported
scenario: Your team proposes using TPU v5e (197 TFLOPS BF16, 1600 GB/s HBM bandwidth, 16 GB HBM per chip,
  4 chips per node) exclusively for the prefill pool, with H100 for decode. For a 7B BF16 model, evaluate
  whether TPU v5e is a better prefill accelerator than H100 and identify the practical constraints that
  could make this combination operationally painful.
details:
  realistic_solution: '7B BF16 model = 14 GB. TPU v5e chip: 16 GB — fits with 2 GB spare (very tight for
    activations at long context). A 4-chip node has 64 GB total. Prefill compute: 197 TFLOPS BF16 per
    chip vs H100''s 989 TFLOPS. TPU v5e is 5× slower per chip in raw compute but much cheaper. For compute-bound
    prefill at S=1024: H100 latency = 2×7e9×1024/(989e12) = 14.5 ms. TPU v5e = 2×7e9×1024/(197e12) = 72.8
    ms — 5× slower. KV transfer cost from TPU to H100 decode: same InfiniBand cost. Operational constraints:
    (1) XLA requires static input shapes or re-compilation for each new shape — dynamic sequence lengths
    cause XLA retracing storms. (2) TPU→GPU KV transfer requires format conversion (BF16→FP16 or vice
    versa). (3) JAX/XLA ecosystem doesn''t integrate with vLLM serving stack natively. Not recommended
    unless cost is the primary driver and TTFT SLO > 500 ms.'
  common_mistake: Comparing raw TFLOPS directly without noting that TPU v5e's peak is for systolic array
    operations with specific matrix tile sizes, and that XLA compilation adds per-shape compilation latency
    that hurts dynamic input lengths.
  napkin_math: 'Cost comparison: TPU v5e ~$1.20/chip-hour vs H100 ~$3.50/GPU-hour. Prefill throughput
    ratio: H100/TPU = 989/197 = 5.02×. Cost efficiency: H100 costs 3.50/989 = $0.00354/TFLOPS-hour. TPU
    v5e: 1.20/197 = $0.00609/TFLOPS-hour. H100 is actually more cost-efficient per TFLOP. TPU v5e advantage
    only if workload perfectly fits systolic tile sizes and uses XLA fusion aggressively.'
