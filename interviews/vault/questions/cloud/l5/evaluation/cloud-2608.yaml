id: cloud-2608
title: Labeling Strategy Selection Under Budget Constraints
topic: dataset-curation
status: published
provenance: imported
scenario: 'You have $150K to label training data for an autonomous driving perception model. Option A:
  fully manual labeling at 30 imgs/hr. Option B: AI pre-annotation + human verification at 100 imgs/hr
  but requires $30K upfront for the pre-annotation model. Which strategy maximizes labeled data volume?'
details:
  realistic_solution: 'Option A: $150K ÷ $25/hr = 6,000 hrs × 30 imgs/hr = 180K images. Option B: ($150K
    - $30K) ÷ $25/hr = 4,800 hrs × 100 imgs/hr = 480K images. Option B yields 2.67x more labeled data
    despite the $30K upfront cost. However, you must evaluate whether the pre-annotation model''s domain
    matches your target (e.g., a COCO-trained detector may miss rare road objects). If pre-annotations
    are poor quality, human correctors spend more time fixing than verifying, degrading the 100 imgs/hr
    assumption. The right answer depends on domain overlap between the pre-annotation model and your target
    distribution.'
  common_mistake: Ignoring that pre-annotation quality varies by domain — a generic model pre-annotating
    specialized data may actually slow labelers down.
  napkin_math: 'A: 6K hrs × 30 = 180K imgs. B: 4.8K hrs × 100 = 480K imgs. B wins by 2.67x if pre-annotation
    quality holds.'
