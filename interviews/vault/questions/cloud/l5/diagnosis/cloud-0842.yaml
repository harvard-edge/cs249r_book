id: cloud-0842
title: Evaluating Activation Checkpointing Trade-offs for LLMs
topic: activation-memory
status: published
provenance: imported
scenario: You are pre-training a 13B parameter Transformer LLM on a cluster of 80GB A100 GPUs. With a
  micro-batch size of 2, sequence length of 4096, and tensor parallelism of 4, profiling shows your per-GPU
  memory usage hits 105GB (resulting in an OOM error). You must evaluate the trade-offs between applying
  full activation checkpointing (checkpointing every transformer layer boundary) versus selective activation
  checkpointing. Justify your architectural choice quantitatively.
details:
  realistic_solution: Implement selective activation checkpointing by targeting only the attention core
    or specific large operations. This retains inexpensive but large activations in memory, reducing the
    recomputation overhead from ~33% down to ~15% while safely keeping total memory usage around 65GB
    (well under the 80GB A100 limit).
  common_mistake: Assuming that full activation checkpointing is optimal simply because it minimizes the
    memory footprint to the absolute lowest bound, ignoring the disproportionate compute overhead from
    recomputing memory-heavy but compute-light operations like dropout, activations, and layernorms.
  napkin_math: Activations at b=2, s=4096, h=5120, L=40 = ~70GB without checkpointing. Total memory =
    105GB > 80GB. Full checkpointing drops activations to ~2GB but adds 1 extra forward pass per step
    (~33% total FLOP penalty). Selective checkpointing retains ~15GB of activation memory (Total memory
    ~50GB < 80GB limit) but skips recomputing O(N) bandwidth-bound operations, slashing the FLOP penalty
    to ~15%.
