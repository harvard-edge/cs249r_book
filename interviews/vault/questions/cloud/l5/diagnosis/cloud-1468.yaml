id: cloud-1468
title: Evaluating KV Cache Memory Constraints and PagedAttention
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a custom 30B parameter LLM (FP16, 64 layers, 64 heads, 128 head dimension)
  on a node with 4x 80GB A100 GPUs (320GB total memory). The model weights consume 60GB across the GPUs.
  The product manager wants to guarantee a concurrent batch size of 128 users, each generating up to 2048
  tokens. The serving team suggests using a naive static memory allocation for the KV cache to guarantee
  zero out-of-memory (OOM) errors during generation. Evaluate the feasibility of this proposal and justify
  a better architectural choice.
details:
  realistic_solution: Demonstrate that the maximum KV cache requires 512GB, heavily exceeding the 260GB
    available memory. Reject static allocation and propose PagedAttention (like vLLM) to dynamically manage
    memory in blocks, eliminating internal fragmentation and allowing for safe oversubscription or dynamic
    batching.
  common_mistake: Failing to calculate the exact memory footprint of the KV cache, assuming OOMs are mostly
    caused by model weights, and overlooking the severe memory fragmentation caused by static contiguous
    allocation.
  napkin_math: KV per token = 2 (K,V) * 2 bytes * 64 layers * 64 heads * 128 dim = 2MB. Max KV per user
    = 2MB * 2048 tokens = 4GB. Total KV for batch 128 = 128 * 4GB = 512GB. Available VRAM = 320GB - 60GB
    = 260GB. 512GB > 260GB.
