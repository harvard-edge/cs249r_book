id: cloud-0691
title: The Resource Contention Stutter
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Users of your LLM service complain that generation intermittently freezes for several seconds.
  You notice this happens whenever a new user submits a very long prompt. Based on the diagram, why can't
  your GPUs handle both tasks simultaneously?
details:
  realistic_solution: 'The single GPU pool is the problem. **Prefill** is compute-bound and monopolizes
    the ALUs, while **Decode** is memory-bandwidth bound. When a long prompt arrives, prefill seizes the
    compute units, causing concurrent decode requests to stall. The fix is **Disaggregated Serving**:
    split Prefill and Decode onto separate GPU clusters to isolate these different workload profiles.'
  common_mistake: '"Add more GPUs to the pool" or "Rate-limit long prompts." More hardware doesn''t fix
    resource contention, and rate-limiting punishes users instead of fixing the architecture.'
  napkin_math: Prefill compute scales with $O(N^2)$, Decode with $O(N)$. A 4k token prefill can take 200ms,
    during which 10 decode tokens *should* have been generated. The freeze is the cost of compute-lock.
