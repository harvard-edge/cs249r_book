id: cloud-cell-11090
title: 'Feature Store: Diagnose Feature Staleness Causing Model Accuracy Degradation'
topic: feature-store-management
status: published
provenance: imported
scenario: Your recommendation model on H100s starts degrading (CTR drops from 8.2% to 6.1%) one week after
  a feature store migration. The model and weights are unchanged. Diagnose the root cause. You observe
  that 'user_30day_purchase_history' features show 0 variance in the new store.
details:
  realistic_solution: Zero variance on a feature = all values are the same (likely default/null). This
    means the feature pipeline broke during migration and is serving stale or null values. The model learned
    to rely on this feature; with it nulled out, predictions default to global average, causing accuracy
    drop.
  common_mistake: Blaming the model or retraining before diagnosing the data pipeline; not checking feature
    distributions before vs after migration.
  napkin_math: 'CTR drop: 8.2% → 6.1% = 25.6% relative degradation. Feature importance: if user_30day_purchase_history
    explains 25% of CTR lift (common for collaborative features), nulling it explains the drop. Diagnosis:
    compute feature_i variance across 1K requests. Expected variance for purchase_history: σ² ≈ 0.15 (30-day
    window). Observed: σ² = 0. Root cause: feature computation job failed silently, serving all-zero vectors.
    Fix: add feature validation in pipeline: assert variance > 0.01 for each non-sparse feature. Alert
    if variance drops > 90% from baseline. Recovery: restore old feature computation job → features normalize
    in < 1 hour → CTR recovers within 2 hours (as real-time features update). Cost of outage: 1 week ×
    100K RPS × (8.2%-6.1%)/100% × $0.01/click = 7 × 86400 × 100K × 0.021 × $0.01 = $12.7M estimated revenue
    impact.'
