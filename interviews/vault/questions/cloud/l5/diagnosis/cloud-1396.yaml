id: cloud-1396
title: Evaluating Idempotency in LLM Data Pipelines
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'A data engineering team is building a pre-training pipeline for a 70B parameter LLM, processing
  50 TB of raw text daily using Apache Spark on preemptible cloud instances. The pipeline performs PII
  redaction. During task failures and retries, the current redaction logic (which appends a unique timestamp-based
  salt to anonymized IDs) generates mismatched duplicate records, poisoning the dataset. You must evaluate
  two proposals to make the pipeline resilient: 1) Implement a deterministic hashing scheme (e.g., HMAC
  with a static secret) to make the redaction idempotent, or 2) Introduce a centralized Redis state table
  to track processed record IDs and prevent double-processing. Justify your design decision quantitatively.'
details:
  realistic_solution: Adopt the deterministic hashing scheme (HMAC) to achieve stateless idempotency.
    When preemptions occur, Spark tasks simply re-execute and overwrite/re-emit the exact same deterministic
    output. This eliminates all external state synchronization and network overhead.
  common_mistake: Candidates often choose the Redis state table approach to 'guarantee exactly-once processing',
    failing to evaluate the catastrophic network bottleneck and cost of performing billions of point lookups
    per day in a distributed batch job.
  napkin_math: "Daily volume: 50 TB / 1 KB per record = 50 billion records. \nRedis approach: 50B network\
    \ calls * 1ms average latency = 50,000,000 seconds (~13,888 hours) of blocking I/O overhead.\nDeterministic\
    \ Hash: 50B operations * 1µs compute time = 50,000 seconds (~14 hours) of pure CPU compute.\nThe stateless\
    \ idempotent approach is ~1000x faster and vastly more robust to node failures."
