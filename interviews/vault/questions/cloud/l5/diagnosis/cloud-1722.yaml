id: cloud-1722
title: Evaluating KV Cache Pre-allocation Waste
topic: memory-pressure-management
status: published
provenance: imported
scenario: Your team is serving a 13B parameter LLM on a single A100 80GB GPU. The max sequence length
  limit is 4096 tokens, but the average request length (prompt + completion) is only 512 tokens. The legacy
  inference engine pre-allocates the KV cache for the maximum sequence length at admission time to guarantee
  completion and avoid OOMs. Evaluate the quantitative impact of this pre-allocation strategy on system
  throughput, and justify the architectural shift to a dynamic allocation scheme.
details:
  realistic_solution: Calculate the exact wasted memory per request. At ~1MB per token for KV cache, pre-allocating
    4096 tokens reserves ~4GB per request. With average usage at 512 tokens, 87.5% of the memory budget
    is wasted. Justify switching to a paged memory manager (e.g., PagedAttention) that dynamically allocates
    fixed-size memory blocks, allowing the system to multiplex the unused capacity and increase the effective
    batch size by up to 8x.
  common_mistake: Candidates often state that pre-allocation 'wastes memory' without quantifying the exact
    percentage of internal fragmentation or demonstrating how it artificially bottlenecks the maximum
    batch size.
  napkin_math: 'KV cache size ≈ 1 MB/token for a 13B model. Pre-allocation per request: 4096 tokens *
    1 MB = 4.0 GB. Actual average usage: 512 tokens * 1 MB = 0.5 GB. Wasted memory = 3.5 GB (87.5% internal
    fragmentation). If the GPU has 40 GB available for the KV cache: Static max batch size = 40 GB / 4.0
    GB = 10 requests. Dynamic average batch size = 40 GB / 0.5 GB = 80 requests (an 8x theoretical throughput
    improvement).'
