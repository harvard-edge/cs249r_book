id: cloud-1475
title: Evaluating KV Cache Quantization for Long-Context RAG
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your team is serving Llama-3 70B (80 layers, 8 KV heads, 128 head dim) on an 8x H100 80GB node
  for a RAG application with up to 32K token contexts. At peak load, you need to support a batch size
  of 64 concurrent requests. With an FP16 KV cache, you are encountering OOM errors during the decode
  phase. You propose quantizing the KV cache to INT8 to increase maximum concurrency. However, the NLP
  team is concerned about severe accuracy degradation in 'needle-in-a-haystack' retrieval tasks. Evaluate
  the memory savings of INT8 vs FP16 KV cache, explain the mechanism that causes accuracy drops when quantizing
  attention activations, and justify a specific quantization strategy to preserve long-context retrieval
  performance.
details:
  realistic_solution: 'Implement asymmetric quantization for the KV cache: use per-channel or per-group
    quantization for the Key cache (to preserve outlier features critical for attention) and per-token
    quantization for the Value cache. INT8 KV cache reduces the footprint from 687GB (FP16) to 343GB,
    fitting within the 500GB available memory. This enables the required BS=64 at 32K context without
    quality degradation, which FP16 cannot achieve due to OOM.'
  common_mistake: Assuming naive per-tensor linear quantization can be applied uniformly to both Keys
    and Values. Candidates often fail to recognize that Key caches contain extreme outlier channels that
    require finer-grained quantization to preserve attention pattern accuracy.
  napkin_math: 'Elements per token = 2 (K,V) * 80 (layers) * 8 (KV heads) * 128 (head dim) = 163,840.

    FP16 KV Cache (BS=64, 32K context): 64 * 32,768 * 163,840 * 2 bytes = 687 GB.

    Available Memory = 640 GB (8x80GB) - 140 GB (FP16 weights) = 500 GB. (FP16 OOMs!)

    INT8 KV Cache: 64 * 32,768 * 163,840 * 1 byte = 343 GB. (Fits comfortably with headroom for context
    variance).'
