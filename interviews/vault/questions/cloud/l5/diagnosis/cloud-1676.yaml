id: cloud-1676
title: Evaluating PagedAttention for LLM Serving
topic: vram-budgeting
status: published
provenance: imported
scenario: You are leading the deployment of a Llama-2-70B model on an 8x A100 (80GB) cluster. The current
  serving engine pre-allocates contiguous KV cache memory for the maximum sequence length (4096 tokens)
  per request. Because average requests only use 1500 tokens (1000 prompt + 500 generation), actual memory
  utilization is around 36% due to severe internal and external fragmentation, limiting your maximum batch
  size to 16 before hitting OOM. Evaluate the expected impact on memory utilization and maximum batch
  size if you migrate to a PagedAttention-based system (like vLLM) using a block size of 16 tokens.
details:
  realistic_solution: PagedAttention dynamically allocates non-contiguous memory pages (blocks of 16 tokens)
    as needed, instead of pre-allocating contiguous memory for the theoretical maximum sequence length.
    This virtually eliminates external fragmentation and restricts internal fragmentation to the final,
    partially filled block (at most 15 wasted tokens). This drives memory utilization up from ~36% to
    >99%, freeing up enough KV cache capacity to safely increase the batch size by a factor of ~2.7x.
  common_mistake: Assuming PagedAttention compresses the actual KV cache size per token, or failing to
    identify that while the batch size increases significantly, throughput scaling will eventually hit
    a ceiling as the system shifts from being memory-bandwidth-bound to compute-bound.
  napkin_math: 'Contiguous allocation: 4096 tokens per request. Actual usage: 1500 tokens (36.6% utilization).
    PagedAttention (block size=16): ceil(1500 / 16) = 94 blocks allocated. Total allocated memory per
    request = 94 * 16 = 1504 tokens. Utilization = 1500 / 1504 = 99.7%. Effective capacity multiplier
    = 4096 / 1504 = 2.72x. New max batch size = 16 * 2.72 ≈ 43.'
