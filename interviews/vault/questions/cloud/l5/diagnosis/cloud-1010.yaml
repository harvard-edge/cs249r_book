id: cloud-1010
title: RoCEv2 Fabric-Wide PFC Congestion Spreading
topic: congestion-control
status: published
provenance: imported
scenario: You are training a 175B parameter LLM on a 4,096-GPU cluster using A100s and ConnectX-6 200Gbps
  NICs connected over a 3-tier RoCEv2 fabric with 400Gbps spine links. To support lossless RDMA, Priority
  Flow Control (PFC) is enabled. During a large NCCL AllReduce phase, a transient many-to-one incast microburst
  occurs at a single Leaf switch. Within milliseconds, training throughput across the entire cluster drops
  to nearly zero. Telemetry shows a cascade of PFC pause frames propagating upstream to the Spine, freezing
  links that are completely uninvolved in the incast traffic. Evaluate the architectural mechanisms driving
  this failure and compare at least two distinct network-level mitigations.
details:
  realistic_solution: Implement DCQCN (Datacenter Quantized Congestion Notification). Tune the ECN marking
    threshold significantly lower than the PFC generation threshold. This ensures end-hosts throttle injection
    rates before switch buffers trigger PFC pause frames, containing congestion at the edge.
  common_mistake: Suggesting to simply increase switch buffer sizes (which only delays the onset of the
    pause storm) or disabling PFC without an end-to-end congestion control mechanism, which results in
    massive packet loss and Go-Back-N retransmissions that destroy RDMA performance.
  napkin_math: 'Switch Buffer: 32MB. Link: 400Gbps (50GB/s). ECN threshold = 15MB. PFC threshold = 25MB.
    Delta = 10MB. Time between ECN mark and PFC trigger = 10MB / 50GB/s = 200µs. With a network RTT of
    2µs, the sender has 100 RTTs to receive the CNP and throttle before PFC pauses the link.'
