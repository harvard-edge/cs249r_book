id: cloud-2001
title: LLM Control Plane Explainability Trade-offs
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are architecting the observability control plane for a 70B parameter LLM (80 layers, 8192
  hidden dimension) serving 5,000 QPS with an average of 100 generated tokens per request. The trust and
  safety team requires system explainability to debug model hallucinations in real-time. They propose
  logging the full layer activations for every token to fully reconstruct the model''s internal state
  offline. You must evaluate this proposal against an alternative approach: deploying lightweight linear
  probes at intermediate layers to predict hallucination risk and logging only these scalar scores. Justify
  your design decision quantitatively based on network bandwidth, compute overhead, and diagnostic utility.'
details:
  realistic_solution: Reject full activation logging due to its extreme network bottleneck. Implement
    intermediate linear probes that compress the massive internal state into low-dimensional semantic
    scores (e.g., hallucination risk) on the fly, reducing the telemetry payload by over 2000x while still
    giving human operators actionable, layer-wise debugging signals.
  common_mistake: Failing to calculate the massive network bandwidth required for logging full high-dimensional
    activations at scale, or proposing computationally heavy attribution methods like Integrated Gradients
    in the synchronous serving path.
  napkin_math: 'Full activations per token (FP16): 80 layers * 8192 dim * 2 bytes = ~1.3 MB/token. Total
    bandwidth = 5,000 QPS * 100 tokens * 1.3 MB = 650 GB/s (prohibitive for a logging plane). Probe scores
    per token: 80 layers * 1 float * 4 bytes = 320 bytes/token. Total bandwidth = 5,000 * 100 * 320 bytes
    = 160 MB/s (easily handled by standard telemetry queues).'
