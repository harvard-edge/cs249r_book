schema_version: 1
id: cloud-2429
title: The FP8 Autoregressive Decoding Fallacy
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team upgrades a Llama-3-70B inference service on 8x H100 GPUs (3.35 TB/s, 1979 TFLOPS FP8,
  989 TFLOPS FP16 per GPU) from FP16 to FP8 weight-and-activation quantization. You expect a 2x latency
  reduction for single-user autoregressive decoding (batch size 1) because FP8 TFLOPS are double FP16
  TFLOPS. However, Time Per Output Token (TPOT) only improves from 45ms to 24ms (~1.8x), while prefill
  latency improves by nearly 2x. Why did decoding not scale with the 2x compute increase?
details:
  realistic_solution: Autoregressive decoding at batch size 1 is strictly memory-bandwidth bound, meaning
    it operates on the sloped portion of the roofline model. The doubling of the compute ceiling (TFLOPS)
    from FP16 to FP8 is completely irrelevant because the GPUs are starved for data. The ~1.8x speedup
    observed in decoding comes entirely from halving the weight memory footprint (from ~140GB to ~70GB),
    which halves the memory load time across the HBM bandwidth. Prefill, however, uses large matrix multiplications
    (Q x K^T) and is compute-bound, so it fully benefits from the doubled TFLOPS ceiling.
  common_mistake: Assuming decoding latency is compute-bound and bottlenecked by the FP8 Tensor Core throughput
    ceiling.
  napkin_math: H100 Bandwidth = 3.35 TB/s per GPU x 8 = 26.8 TB/s total. FP16 weights = 140GB. Memory
    load time = 140GB / 26.8 TB/s = ~5.2ms per layer/operation overhead (ignoring NVLink overhead, practically
    ~45ms end-to-end). FP8 weights = 70GB. Memory load time = 70GB / 26.8 TB/s = ~2.6ms. Compute time
    for BS=1 is 140B MACs / (8 * 1979 TFLOPS) = ~0.008ms. Compute time (0.008ms) << Memory time (2.6ms).
