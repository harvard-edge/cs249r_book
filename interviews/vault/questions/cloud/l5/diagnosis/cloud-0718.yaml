schema_version: 1
id: cloud-0718
title: The Straggler Log Rotation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your 512-GPU training job occasionally stalls for exactly 60 seconds. The hardware is healthy,
  no preemptions occurred, and the network is uncongested. You eventually trace the stall to a cron job
  running on the Linux host OS of a single node. What is the cron job doing that halts the entire cluster?
details:
  realistic_solution: 'The cron job runs `logrotate` on one node, which calls `sync()` or `fsync()` to
    flush log files to disk. If the logging volume is large, this can stall the filesystem I/O for up
    to 60 seconds, blocking the NCCL daemon''s progress thread on that node. Since AllReduce is a collective
    operation requiring all 512 GPUs to participate, the other 511 GPUs reach the synchronization barrier
    and wait. The entire cluster is held hostage by one node''s disk I/O. The fix: move log rotation to
    a separate filesystem, use async I/O, or schedule logrotate outside training windows.'
  common_mistake: '"The cron job is using all the CPU cores, starving the data loader." CPU starvation
    causes a slowdown, but a strict 60-second complete halt is a synchronization deadlock.'
  napkin_math: A distributed training job operates at the speed of the slowest node. If a host CPU cron
    job stalls 1 GPU for 60 seconds, all 512 GPUs idle at the global all-reduce barrier. Compute lost
    = 512 GPUs * 60s = 30,720 GPU-seconds (8.5 GPU-hours). At $4.00/hr per H100, that 60-second cron job
    burns $34 of credits and wastes 8.5 * 989 TFLOPS = ~30 ExaFLOPs of potential compute.
