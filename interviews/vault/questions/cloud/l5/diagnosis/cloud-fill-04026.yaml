schema_version: 1
id: cloud-fill-04026
title: Feature Skew Between Training and Serving
topic: feature-store-management
status: published
provenance: imported
scenario: Your ad ranking model was trained on features computed from a Spark batch pipeline using a 1-hour
  aggregation window for user activity counts. In serving, the feature store computes the same aggregation
  over a rolling 1-hour window using a streaming Flink pipeline. Model performance in production is 8%
  lower AUC than offline evaluation. You suspect training-serving skew. How do you confirm and fix it?
details:
  realistic_solution: 'Log both training-time feature values and serving-time feature values for the same
    user-item pairs over a 48-hour shadow period. Compute feature distribution statistics (mean, p50,
    p99, Jensen-Shannon divergence) between training and serving distributions. Key fixes: (1) align watermark
    settings between Spark and Flink, (2) use point-in-time joins in training to match exactly the features
    available at serving time, (3) validate with a feature monitoring dashboard.'
  common_mistake: Assuming that 'same feature logic' means 'same feature values.' Batch pipelines and
    streaming pipelines handle late-arriving events, watermarks, and session boundaries differently. A
    1-hour window ending at 12:00 in batch might include events up to 12:05 (due to 5-minute late-data
    buffer), while the streaming window strictly cuts at 12:00.
  napkin_math: '8% AUC drop: significant for ad ranking. If baseline AUC=0.78, new AUC=0.718. Typical
    business impact: 1% AUC drop ≈ 1-2% revenue impact (from industry benchmarks). 8% AUC drop ≈ 8-16%
    revenue impact. Shadow logging overhead: if 1% of traffic is sampled, 50K RPS × 0.01 × 200 features
    × 4 bytes = 400 MB/s to a logging Kafka topic — manageable. Analysis: compare P(feature_train) vs
    P(feature_serve) using KS-test, flag features with KS statistic > 0.05.'
