schema_version: 1
id: cloud-0219
title: The Multi-Tenant GPU Sharing Problem
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You manage an inference platform serving 7 different small models (each <10GB). Your finance
  team wants to consolidate them onto a single A100-80GB using MIG (Multi-Instance GPU) to save costs.
  Each MIG slice gets 1/7th of the GPU: ~11 GB memory, ~45 TFLOPS. After deployment, two of the seven
  models have 3x worse tail latency than on dedicated GPUs. What went wrong?'
details:
  realistic_solution: MIG does not isolate the shared L2 cache or the memory bandwidth. The A100's 40
    MB L2 cache is shared across all MIG instances. Two of the seven models are memory-bandwidth-bound
    (low arithmetic intensity), and they're now competing for the same 2 TB/s of HBM bandwidth. With 7
    tenants, each effectively gets ~285 GB/s — far less than the 2 TB/s they had on a dedicated GPU. The
    compute-bound models are fine because their bottleneck (Tensor Cores) is properly partitioned.
  common_mistake: '"MIG provides perfect isolation, so each model should perform as if it has a dedicated
    1/7th GPU." MIG isolates compute and memory capacity, but not all resources.'
  napkin_math: '**A100-80GB specs:** 2 TB/s bandwidth, 312 TFLOPS FP16 | Ridge point = 312 TFLOPS / 2
    TB/s = 156 Ops/Byte | **MIG 1g.10gb slice:** ~45 TFLOPS (1/7 of compute, isolated) | Effective bandwidth:
    ~285 GB/s (2 TB/s shared across 7 instances) | Slice ridge point = 45 TFLOPS / 0.285 TB/s = 158 Ops/Byte
    (similar ratio) | **Memory-bound model (AI = 5 Ops/Byte):** | 5 < 156 → memory-bound on both dedicated
    and MIG | Dedicated throughput = 5 × 2,000 GB/s = 10 TFLOPS (memory-bound) | MIG throughput = 5 ×
    285 GB/s = 1.43 TFLOPS (memory-bound) | Slowdown = 10 / 1.43 = 7× — matches the 1/7 bandwidth share
    | **Compute-bound model (AI = 300 Ops/Byte):** | 300 > 156 → compute-bound | Dedicated: 312 TFLOPS
    | MIG: 45 TFLOPS | Slowdown = 312/45 = 6.9× — also ~7×, as expected from partitioning | **The catch:**
    Both types slow down ~7×, BUT memory-bound models may see worse TAIL latency because bandwidth is
    shared (not isolated). Under contention from 7 co-tenants all reading HBM simultaneously, effective
    bandwidth per slice can drop below the fair-share 285 GB/s, causing unpredictable latency spikes.
    Compute-bound models are unaffected by this contention because their bottleneck (Tensor Cores) IS
    isolated by MIG.'
