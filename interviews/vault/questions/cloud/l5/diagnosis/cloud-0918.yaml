id: cloud-0918
title: Evaluating Contamination in Code LLMs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are evaluating a 70B parameter code-generation model trained on 3TB of public GitHub repositories
  and StackOverflow. It achieves 82% Pass@1 on HumanEval, significantly outperforming the 65% baseline
  model. However, in live production A/B testing, the developer code acceptance rate drops from 45% to
  22%. Your current training data pipeline uses exact 8-gram string matching against the HumanEval test
  set to filter out contaminated examples. Evaluate why the model is failing in production despite this
  filtering, and justify a more robust strategy for measuring and preventing benchmark contamination.
details:
  realistic_solution: Implement an approximate semantic decontamination pipeline using MinHash LSH (e.g.,
    Jaccard similarity > 0.8 on 13-grams) to catch near-duplicate matches. Transition the primary evaluation
    to a private, dynamically updated holdout set (or live A/B testing) to establish a true baseline devoid
    of leakage.
  common_mistake: Relying solely on exact n-gram matching for decontamination, which fails to catch paraphrased,
    re-formatted, or conceptually identical benchmark questions that frequently appear in forum discussions,
    tutorial repositories, or synthesized training data.
  napkin_math: If 2% of the 3TB corpus (60GB) contains approximate discussions/variants of HumanEval,
    exact 8-gram matching might only flag 0.1% (exact verbatim snippets). The remaining 1.9% leaks into
    training, inflating the Pass@1 score artificially. Using MinHash LSH with 128 permutations on 13-grams
    across 3TB takes ~500 CPU-hours but catches >95% of these near-duplicates.
