schema_version: 1
id: cloud-crit-21040
title: KV-Cache Memory Fragmentation in Long-Running Services
topic: kv-cache-management
status: draft
provenance: imported
scenario: Your vLLM serving instance has been running for 6 hours. Nvidia-smi shows 30 GB free GPU memory,
  but the system rejects new requests claiming insufficient memory. The KV-cache pool reports 35 GB allocated
  but only 22 GB actively used. Diagnose the 13 GB gap.
details:
  realistic_solution: 'The 13 GB gap (35 GB allocated - 22 GB used) is internal fragmentation within the
    KV-cache block pool. Causes: (1) Block-level fragmentation: PagedAttention allocates in fixed-size
    blocks (e.g., 16 tokens). Completed requests free their blocks, but freed blocks may be scattered
    across the pool. A new request needing 100 contiguous blocks may fail even though 200 free blocks
    exist — if they are not contiguous. However, PagedAttention specifically uses non-contiguous block
    allocation (virtual memory style), so this should not happen. (2) More likely cause: reservation fragmentation
    — the system pre-reserves blocks for requests'' maximum possible length. A request at position 500/4096
    has reserved blocks for all 4096 tokens but only uses 500. The reserved-but-unused blocks appear allocated
    but are not active. (3) Prefix cache pollution: cached prefix KV blocks from previous requests are
    held speculatively but not actively used. Fix: (1) Enable aggressive prefix cache eviction under memory
    pressure. (2) Use speculative allocation — only reserve blocks for the next N tokens, not max_seq_len.
    (3) Set --max-num-seqs to limit concurrent reservations.'
  common_mistake: Blaming GPU memory fragmentation (which is rare with modern allocators). The issue is
    usually KV-cache pool fragmentation — free blocks are scattered across the block pool and cannot form
    contiguous allocations for new requests.
  napkin_math: '22 GB active KV, 13 GB reserved but unused. If avg request is at position 1K with max
    4K: reserved 4× actual → 75% waste on reservations. 50 requests × (4K-1K) × 320 KB = 50 × 960 KB ×
    1K = 48 GB reserved ahead — consistent with the gap.'
