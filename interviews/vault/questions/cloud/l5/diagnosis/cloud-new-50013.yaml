id: cloud-new-50013
title: Cross-Platform Model Numerics Divergence Debugging
topic: software-portability
status: published
provenance: imported
scenario: Your model produces identical outputs on A100 and H100 but gives slightly different logits on
  MI300X (max absolute difference of 0.003 in FP16). Quality metrics drop by 0.2% on MI300X. Determine
  whether this is a portability bug or acceptable numerical noise.
details:
  realistic_solution: 'Systematic debugging: (1) Run in FP32 on both platforms — if differences vanish,
    it is FP16 reduction-order sensitivity, not a bug. (2) Check if the difference is in specific layers
    (often softmax or LayerNorm, which are numerically sensitive). (3) MI300X''s MFMA instructions use
    different accumulation orders than NVIDIA''s Tensor Cores, causing legally different FP16 rounding.
    (4) The 0.2% quality drop may be within noise — run statistical significance tests over 1000+ samples.
    Typically, differences <10 epsilon with no statistically significant quality impact are acceptable
    numerical noise.'
  common_mistake: Declaring any numerical difference as a bug. FP16 has a machine epsilon of ~4.88e-4,
    so differences of 0.003 are ~6 epsilon — in the gray zone between acceptable rounding and a real issue.
  napkin_math: 'FP16 epsilon: 2^(-10) = 9.77e-4 (relative). Max diff 0.003 on logit values ~1.0 = 0.3%
    relative error = ~3 epsilon. This is within normal floating-point non-determinism for different hardware.'
