schema_version: 1
id: cloud-0163
title: The Black Friday Collapse
topic: latency-decomposition
status: published
provenance: imported
scenario: Our GPU serving cluster handles 1,000 QPS at 50ms latency. On Black Friday, traffic spiked 10x
  to 10,000 QPS. The system didn't just slow down 10x; it completely collapsed, with latencies hitting
  10 seconds and GPUs throwing Out Of Memory errors despite appearing to have free VRAM. Why did the system
  fail non-linearly, and how does continuous batching on GPUs shift this queueing knee point differently
  than traditional CPU-based web serving?
details:
  realistic_solution: The collapse is caused by the interaction of queueing theory and GPU memory fragmentation.
    In a CPU web server, as utilization ($\rho$) passes the "Knee" at ~70%, request queue lengths grow
    exponentially (per Little's Law). But in an LLM serving cluster, a traffic spike causes the batch
    scheduler to accept more concurrent requests. Without PagedAttention, each new request statically
    allocates maximum potential KV-cache in HBM. The VRAM rapidly fragments. The non-linear collapse happens
    because the GPU spends cycles swapping KV-cache blocks to CPU RAM or simply OOMs, rather than just
    queueing. Continuous batching shifts this knee point significantly higher (to $\rho \approx 0.85$)
    because it dynamically slots new requests into the batch at the token level, absorbing the burst into
    the GPU's compute capacity without requiring new static memory reservations.
  common_mistake: '"The system should degrade linearly — 10x traffic means 10x latency." Queueing systems
    don''t work that way, and GPU memory doesn''t degrade gracefully.'
  napkin_math: 'At $\rho = 0.5$ (50% util): avg requests in system ≈ 1. At $\rho = 0.9$ (90% util): avg
    requests in system ≈ 9. The relationship is $L = \rho/(1-\rho)$. On a CPU, this just means waiting.
    On an 80GB H100, if 9 concurrent requests each statically reserve 8GB for a max 8K context window,
    you need 72GB. You hit the memory wall before you hit the compute wall. Continuous batching + PagedAttention
    changes the denominator: instead of allocating 8GB per request upfront, it allocates 16MB blocks dynamically.
    This allows the GPU to sustain the queueing spike by keeping memory utilization proportional to actual
    tokens generated, not max potential tokens.'
