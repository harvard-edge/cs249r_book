schema_version: 1
id: cloud-0619
title: The Strided Memory Fetch
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are writing a custom CUDA kernel to perform a simple element-wise addition of two 1GB tensors.
  Version A reads the tensors sequentially (`A[i] + B[i]`). Version B reads the tensors with a stride
  of 1024 (`A[i*1024] + B[i*1024]`). Both perform the exact same number of floating-point operations.
  Why does Version B run 30x slower?
details:
  realistic_solution: You destroyed memory coalescing. GPUs do not fetch individual bytes from HBM; they
    fetch massive contiguous blocks called cache lines (typically 32 or 128 bytes at a time). In Version
    A, when thread 0 requests `A[0]`, the GPU pulls a 128-byte block into SRAM, meaning the next 31 threads
    get their data for 'free' from the ultra-fast cache. In Version B, thread 0 requests `A[0]`, pulling
    128 bytes. But thread 1 requests `A[1024]`, which is in a completely different cache line. The GPU
    must issue a brand new fetch to HBM for every single thread. You are forcing the memory bus to transfer
    128 bytes to utilize only 4 bytes, wasting 97% of your bandwidth.
  common_mistake: '"Thinking of memory as an array of independent bytes, ignoring the physical hardware
    of the memory bus and cache lines."'
  napkin_math: If HBM bandwidth is 2,000 GB/s. Version A utilizes 100% of the fetched bytes, achieving
    the full 2,000 GB/s effective bandwidth. Version B fetches 128 bytes to use a 4-byte float. `4 / 128
    = 0.031`. Your effective bandwidth plummets to `2,000 * 0.031 = 62 GB/s`. The kernel becomes disastrously
    memory-bound.
