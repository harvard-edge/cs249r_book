schema_version: 1
id: cloud-fill-04007
title: ECMP Hashing Imbalance in All-Reduce Traffic
topic: congestion-control
status: published
provenance: imported
scenario: You have a 256-GPU H100 cluster running ring all-reduce over 400 GbE. During training, you observe
  3× variance in step times across runs. Network telemetry shows some spine switches at 92% utilization
  while others sit at 15%. Your flows use ECMP load balancing. What is the root cause and how do you fix
  it?
details:
  realistic_solution: Switch to packet-spraying (per-packet ECMP or RoCEv2 with flow-level ECMP) combined
    with DCQCN for congestion control. Alternatively, use RDMA with explicit path selection (adaptive
    routing) available on modern Spectrum-3/Quantum-2 InfiniBand switches. Add flowlet switching with
    a 500µs idle timeout to break large flows into independently-routed sub-flows.
  common_mistake: Assuming ECMP distributes large elephant flows evenly. ECMP uses a hash of (src_ip,
    dst_ip, src_port, dst_port) — all-reduce flows from fixed GPU pairs hash to the same spine switch,
    creating persistent hotspots regardless of other paths being free.
  napkin_math: '256 GPUs × 400 Gbps = 102.4 Tbps aggregate. Ring all-reduce produces N/2 concurrent flows
    (128 flows). With 16 spine switches, ideal: 8 flows/spine. With ECMP hash collision (birthday problem
    at 128 flows, 16 bins): expected max load ≈ 128/16 × (1 + sqrt(ln(16)/2)) ≈ 17.4 flows/spine vs. expected
    8 = 118% overload.'
