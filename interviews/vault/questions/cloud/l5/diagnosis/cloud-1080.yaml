schema_version: 1
id: cloud-1080
title: Row-Level vs Partition-Level Lineage
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Your team trains a large language model on a 10TB text corpus spanning 50,000 parquet files.
  You need to design the data lineage tracking system to ensure compliance and support debugging. You
  are evaluating two designs: (A) Row-level lineage where a UUID is appended to every text sequence and
  logged to a distributed database during tokenization, or (B) Partition-level lineage where the cryptographic
  hash of the input parquet files, git hash of the transformation script, and output artifact URI are
  logged to a relational ML Metadata store. Evaluate these approaches for a training pipeline running
  on 512 A100 GPUs.'
details:
  realistic_solution: Implement partition-level lineage mapping immutable input data partitions to code
    versions and output artifacts, drastically reducing lineage metadata size while preserving reproducibility.
  common_mistake: Attempting to implement row-level lineage for massive datasets to achieve 'perfect'
    traceability, which introduces unacceptable storage bloat and I/O bottlenecks that stall expensive
    compute.
  napkin_math: 10TB corpus with 2KB per sequence = 5 billion sequences. Logging 5 billion events to a
    database at 10,000 writes/sec takes over 5 days, severely bottlenecking the 512 A100 GPUs which can
    collectively consume data at terabytes per hour.
