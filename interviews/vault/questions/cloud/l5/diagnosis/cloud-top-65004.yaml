id: cloud-top-65004
title: Coherency Protocol Overhead Across XCD Boundaries
topic: chiplet-architecture
status: published
provenance: imported
scenario: A JAX XLA operator fusion pass that works well on A100 causes 40% slowdown on MI300X. The fused
  kernel accesses tensors allocated on different XCDs. Diagnose the coherency overhead and recommend a
  fix.
details:
  realistic_solution: 'MI300X uses a cache-coherent NUMA model: each XCD has 4MB L2 per compute unit,
    and cross-XCD cache coherency is maintained via Infinity Fabric directory protocol. When a fused kernel
    reads a tensor allocated on XCD-A from a kernel running on XCD-B, the coherency protocol issues directory
    lookups adding ~300-500ns per cache miss. Fix: use HIP memory placement hints (hipMemAdvise with hipMemAdviseSetPreferredLocation)
    to co-locate tensors with the XCD executing the kernel. For XLA, use custom buffer assignment to constrain
    placement.'
  common_mistake: Blaming the XLA fusion pass itself rather than the data placement. Engineers disable
    operator fusion to eliminate the regression, losing the throughput benefits of fusion on the portions
    of the kernel that stay within a single XCD's memory domain.
  napkin_math: 'Fused kernel with 1000 cross-XCD cache misses at 400ns each = 400 us overhead per kernel
    launch. Kernel itself runs in 1ms → 40% overhead matches observation. Fixing placement: cross-XCD
    misses drop to ~50 (compulsory) → 20us → 2% overhead.'
