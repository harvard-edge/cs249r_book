schema_version: 1
id: cloud-crit-21003
title: MoE Routing Collapse During Training
topic: mixture-of-experts
status: published
provenance: imported
scenario: You are training a 128-expert MoE language model on 256 H100 GPUs. After 10K steps, you notice
  that the auxiliary load-balancing loss has converged but the router entropy has dropped to 2.1 bits
  (log2(128) = 7.0 bits would be uniform). Training loss improvement has stalled. Diagnose the root cause.
details:
  realistic_solution: 'Router entropy of 2.1 bits means the router effectively uses only ~4 of 128 experts
    (2^2.1 ≈ 4.3). This is classic routing collapse: the router learned to always select the same few
    experts, and the remaining 124 experts receive near-zero gradients, becoming dead weights. The aux
    loss converged because it measures per-batch balance — if 4 experts each get 25% of tokens, the batch
    is ''balanced'' among those 4. Fixes: (1) Use z-loss to penalize large router logits, preventing confident
    routing. (2) Switch to expert-choice routing (each expert picks its top-k tokens). (3) Add router
    jitter/noise during training. (4) Use a combination of load-balancing loss + router z-loss as in DeepSeek-V3.
    Monitor expert utilization histograms, not just aux loss.'
  common_mistake: Assuming the load-balancing loss is sufficient to prevent routing collapse. A low aux
    loss can still mask collapse if the loss only penalizes per-batch variance rather than long-term expert
    utilization.
  napkin_math: 'Uniform entropy: log2(128) = 7.0 bits. Observed: 2.1 bits → ~4 active experts. Dead experts:
    124/128 = 97%. Wasted parameters: 124 × expert_size. This is catastrophic for model capacity.'
