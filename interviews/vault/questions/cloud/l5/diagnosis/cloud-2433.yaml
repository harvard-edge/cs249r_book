schema_version: 1
id: cloud-2433
title: The GQA Prefill Illusion
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A cloud provider serves a 70B LLM. To improve throughput, they switch from Multi-Head Attention
  (MHA) to Grouped-Query Attention (GQA), reducing KV heads by 8x. They observe a 3x throughput increase
  in the decoding phase. However, for a prominent enterprise customer who sends massive 50k-token prompts
  and only generates 10 tokens per request, the end-to-end latency drops by a mere 2%.
details:
  realistic_solution: Decoding is heavily memory-bandwidth bound because the model must read the entire
    KV cache from HBM for every single generated token. GQA reduces this memory payload by 8x, directly
    speeding up decoding. Prefill (prompt processing), however, is compute-bound. It performs a dense
    matrix multiplication of Q x K^T. Even though the K matrix is smaller in GQA, the number of FLOPs
    required to compute the attention scores (N x N) remains dominated by the sequence length N and is
    bounded by the GPU's compute ceiling. Reducing memory traffic yields negligible latency benefits when
    the operation is bottlenecked by the MXUs.
  common_mistake: Assuming reducing KV cache size by 8x will uniformly speed up all attention operations
    by reducing memory traffic.
  napkin_math: 'Prefill attention FLOPs for N=50k, d=4096: 2 x 50k x 50k x 4096 = 20.4 TFLOPs. On H100
    (989 TFLOPS FP16), compute time = ~20ms. Memory to load MHA K, V for 50k tokens = 50k x 4096 x 2 x
    2 = ~800 MB. Loading 800 MB at 3.35 TB/s takes ~0.24 ms. GQA reduces the 0.24 ms to 0.03 ms. The operation
    is entirely dominated by the 20ms compute time, so saving 0.21 ms of memory transfer yields a ~1%
    speedup.'
