schema_version: 1
id: cloud-0233
title: The Speculative Memory Trade-off
topic: speculative-decoding
status: published
provenance: imported
scenario: You implement speculative decoding for a 70B parameter LLM using a 1.5B draft model. On a single
  A100 (80GB), generation speed increases by 2.5x. You deploy this to production, but under heavy concurrent
  load (batch size 64), the speculative decoding actually makes generation *slower* than standard autoregressive
  decoding. Why?
details:
  realistic_solution: Speculative decoding trades spare compute (ALU cycles) for memory bandwidth. At
    batch size 1, LLM inference is severely memory-bandwidth bound, so the A100's ALUs are mostly idle.
    Using those idle ALUs to run a small draft model and verify multiple tokens in one memory sweep of
    the 70B model is a massive win. However, at batch size 64, the arithmetic intensity of the workload
    increases significantly. The system becomes compute-bound. Now, running the draft model steals precious
    ALU cycles away from the main model's generation, and the overhead of verifying rejected tokens actually
    reduces overall throughput.
  common_mistake: '"Assuming speculative decoding always provides a speedup because it reduces the number
    of forward passes of the large model."'
  napkin_math: A 70B model at BS=1 has an arithmetic intensity of `~1 FLOP/byte`. The A100 is memory bound
    up to `156 FLOPs/byte`. But at BS=64, intensity jumps to `64 FLOPs/byte`, significantly increasing
    compute utilization. The draft model requires `1.5B * 2 = 3 GFLOPs` per token. At BS=64, that's 192
    GFLOPs of pure overhead per speculative step that is now eating into a heavily utilized compute pipeline.
