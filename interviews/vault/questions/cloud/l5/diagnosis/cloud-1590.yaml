id: cloud-1590
title: Benchmarking Quantization Degradation in Generative LLMs
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are evaluating a new INT8 SmoothQuant strategy for a production 70B LLM deployed on an 8x
  A100 80GB node. The offline benchmark suite (MMLU, TruthfulQA) shows a negligible 0.5% accuracy drop
  compared to the FP16 baseline. However, the initial canary deployment for a code-completion task results
  in a 15% increase in syntax errors and a 30% drop in user acceptance rate. Evaluate the trade-offs of
  the current benchmarking approach, diagnose why the offline metrics failed to predict production degradation,
  and design a rigorous benchmarking strategy to validate model quality under quantization.
details:
  realistic_solution: Transition from static multiple-choice tests to execution-based evaluations (e.g.,
    HumanEval) and generative benchmarks (e.g., MT-Bench). Additionally, measure the KL-divergence of
    the output logits between the FP16 teacher and INT8 model on a representative sample of production
    prompts to detect long-tail degradation.
  common_mistake: Assuming static, multiple-choice benchmarks like MMLU adequately measure the generative
    quality of a quantized LLM, failing to recognize that quantization errors compound autoregressively
    during long-context generation.
  napkin_math: 'Let baseline per-token error rate be e_fp16 = 0.001 and e_int8 = 0.005. For a 1-token
    MMLU answer, INT8 success is (1-0.005) = 99.5%. For a 200-token code snippet, sequence success is
    P = (1 - e)^200. FP16: 0.999^200 ≈ 81.8%. INT8: 0.995^200 ≈ 36.7%. A small per-token error increase
    causes an exponential drop in long-sequence accuracy.'
