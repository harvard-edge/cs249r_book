id: cloud-2409
title: QAT Gradient Oscillation
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are performing Quantization-Aware Training (QAT) to fine-tune an INT4 ResNet-50 variant
  for a high-throughput edge-cloud hybrid pipeline. You use the Straight-Through Estimator (STE) for the
  backward pass. Training loss oscillates wildly, and gradient norms spike from ~1.5 to >50 unexpectedly
  between consecutive batches. The learning rate is set to 1e-3. What is the mechanistic cause of this
  instability?
details:
  realistic_solution: The symptom is caused by an impedance mismatch between the Straight-Through Estimator
    (STE) and the learning rate relative to the quantization step size (delta). In INT4, the weight range
    is divided into 16 bins. If the weight update (learning rate * gradient) is larger than the distance
    to the next quantization boundary, the quantized weight jumps to a new bin. Because STE uses coarse
    approximations, the new bin causes a completely different forward pass, which generates a large opposing
    gradient in the next step, causing the weight to flip-flop across the boundary. The solution is to
    drastically lower the learning rate (e.g., to 1e-5), use a smoothed/soft STE, or use a cosine annealing
    schedule that allows the weights to settle into their quantized bins.
  common_mistake: Assuming the batch size is too small causing noisy gradients, and increasing it without
    fixing the underlying STE mismatch.
  napkin_math: For normalized weights [-1, 1] in INT4 (16 levels), the step size delta = 2 / 15 = 0.133.
    If LR = 1e-3 and gradient = 150, update = 0.15. Since 0.15 > 0.133, the weight changes bins in a single
    step, causing massive forward-pass variance.
