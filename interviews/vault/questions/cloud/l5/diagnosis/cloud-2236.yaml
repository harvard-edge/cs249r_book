schema_version: 1
id: cloud-2236
title: The I/O Jitter Amplification
topic: vram-budgeting
status: published
provenance: imported
scenario: 'A 16,000-GPU training job uses synchronous data parallelism. Each training step takes 2 seconds:
  1.5s of compute and 0.5s of AllReduce. The data pipeline prefetches 3 batches ahead on each worker.
  Occasionally, one or two workers experience an I/O ''hiccup'' where a Lustre read takes 500ms instead
  of the usual 50ms. When this happens, the entire training step — across all 16,000 GPUs — slows down
  by 450ms. Explain the amplification mechanism and propose a fix.'
details:
  realistic_solution: 'In synchronous data parallelism, every GPU must complete its forward + backward
    pass before the AllReduce can begin (or the next step can start, depending on the overlap strategy).
    When one worker''s data pipeline stalls for 500ms, its compute start is delayed by 500ms - 50ms =
    450ms (above normal). The prefetch buffer absorbs typical jitter — with 3 batches at 2s each, the
    buffer covers 6 seconds of I/O delay. But the buffer only helps if the stall is *isolated*. If the
    Lustre hiccup affects a busy OST that serves data to dozens of workers, multiple workers stall simultaneously,
    draining the prefetch buffer across all of them. Once any worker''s buffer empties, that worker''s
    compute start delays, and the synchronization barrier forces all 15,999 other GPUs to wait. The amplification
    is: one storage hiccup on one OST → multiple workers stall → barrier delays all GPUs → 16,000 × 450ms
    of wasted GPU-time per incident. Fix: increase prefetch depth to 5-8 batches, shard data across more
    OSTs to reduce per-OST hotspots, use local NVMe as an async staging tier so the data pipeline never
    reads from Lustre synchronously, and implement straggler detection that skips the slow worker''s gradient
    contribution rather than stalling the entire collective.'
  common_mistake: Thinking the I/O delay only affects the slow worker. 'It is just one worker out of 16,000
    — the impact should be negligible.' This ignores the synchronization barrier inherent in data-parallel
    training.
  napkin_math: 'Single I/O stall cost: 450ms $\times$ 16,000 GPUs = 7,200 GPU-seconds = 2 GPU-hours wasted
    per incident. At \$2/GPU-hour: \$4 per stall. If stalls occur 10 times per hour: \$40/hour = \$960/day
    = \$350K/year in wasted compute — from storage jitter alone. Increasing prefetch from 3→8 batches
    costs $5 \times 2\text{s} \times 100\text{ MB/s} = 1\text{ GB}$ additional DRAM per worker — trivial
    cost to eliminate \$350K/year waste.'
