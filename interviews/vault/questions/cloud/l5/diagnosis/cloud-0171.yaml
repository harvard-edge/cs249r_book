schema_version: 1
id: cloud-0171
title: The In-Flight Priority Queue Failure
topic: latency-decomposition
status: published
provenance: imported
scenario: You run a multi-tenant LLM API on a cluster of H100s. 'Premium' users have a strict P99 TTFT
  SLA of 200ms. To enforce this, you implemented a priority queue, ensuring premium requests always go
  to the front of the line. However, you are still paying SLA violation penalties. Digging into the logs,
  you confirm a premium request arrived, was immediately placed at the front of the queue, but its TTFT
  was still 500ms. The model, a 13B parameter LLM, has not changed. The system is busy but not overloaded.
  Evaluate the design of your priority queue. Why is it insufficient for guaranteeing the SLA, and what
  physical constraint of the hardware is it failing to account for?
details:
  realistic_solution: The priority queue is insufficient because it can only reorder the *waiting room*
    of requests; it cannot preempt a **batch already in-flight on the GPU**. LLM inference is not a continuously
    divisible process; it proceeds in discrete, atomic generation steps (iterations). Once the GPU begins
    a generation step for a batch, that computation must run to completion, which can take 50-100ms for
    a large batch. Your premium request is experiencing 'service time' blocking. It gets to the front
    of the line, but has to wait for the *current* batch of lower-priority users to finish its ongoing,
    non-interruptible computation step. The wait time is dominated not by queueing, but by waiting for
    the GPU to become available again. The priority queue design correctly addresses queueing delay but
    fails to account for the physical, non-preemptible service time of the hardware.
  common_mistake: The network latency is too high, or the server is overloaded. This ignores the explicit
    evidence that the queueing worked and the system isn't overloaded. It's an easy but incorrect excuse.
  napkin_math: Let's assume your system uses a continuous batcher that starts a new iteration every 50ms
    on a 13B model. The compute time for this batch iteration is 40ms. The GPU is therefore busy for 40ms
    out of every 50ms cycle.
