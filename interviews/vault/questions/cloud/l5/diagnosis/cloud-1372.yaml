id: cloud-1372
title: Evaluating Hedged Request Thresholds for Feature Store
topic: mlops-lifecycle
status: published
provenance: imported
scenario: A real-time recommendation system fetches user embeddings from a distributed NoSQL feature store
  (e.g., Cassandra). The P50 read latency is 5ms, but the P99 latency spikes to 150ms due to JVM garbage
  collection pauses and localized network congestion. The strict SLA for this fetch step is 20ms. You
  are evaluating the implementation of 'Hedged Requests' to mitigate this tail latency. How do you determine
  the optimal delay threshold for dispatching the secondary request, and what is the quantitative impact
  on the storage backend cluster?
details:
  realistic_solution: Set the hedge delay threshold at the P95 latency (e.g., 10ms). At this point, only
    5% of requests exceed the threshold and trigger a redundant read to a different replica. This successfully
    bounds the tail latency while keeping the load amplification negligible.
  common_mistake: Setting the hedge delay too aggressively (e.g., at the P50 of 5ms), which essentially
    doubles the cluster read load (100% amplification) and can cause cascading failures due to resource
    exhaustion.
  napkin_math: If hedge_delay = 10ms (P95), only 5% of requests are duplicated. Load increase = +5%. For
    those 5% of requests, the expected latency is delay + P50 of new replica = 10ms + 5ms = 15ms. The
    P99 latency drops from 150ms to ~15ms, easily meeting the 20ms SLA, for only a 5% penalty in cluster
    throughput.
