id: cloud-0177
title: The Continuous Batching Death Spiral
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'Your team runs a real-time translation service using a 70B parameter model on H100 GPUs. The
  business requires a strict P99 Time-To-First-Token (TTFT) of under 500ms. To improve cost-efficiency,
  you replace the simple static batching server with a state-of-the-art continuous batching engine. Under
  normal load, the results are fantastic: GPU utilization jumps from 40% to 85%, and P99 TTFT sits comfortably
  at ~250ms. However, during a traffic spike, P99 TTFT doesn''t just degrade—it explodes to over 8 seconds.
  Your dashboard shows the GPU is pegged at 99% utilization, which the team celebrates as a sign of peak
  efficiency. Evaluate this situation. Why did an optimization designed for high throughput result in
  a catastrophic latency failure, and what fundamental law of systems have your team forgotten?'
details:
  realistic_solution: This is a classic 'Queueing Death Spiral'. The team forgot that any service with
    a finite capacity is governed by Queueing Theory. The continuous batching engine, while efficient,
    has a maximum service rate (μ), measured in requests per second. Under normal load, the arrival rate
    (λ) is well below μ, so the queue of incoming requests is short, and wait times are minimal.
  common_mistake: The most common mistake is to focus only on the GPU's execution time. Engineers might
    say 'the batch became too large, increasing per-token latency' or 'the KV cache evicted and had to
    be recomputed'. While these can be factors, they don't explain a jump from milliseconds to multiple
    seconds. The core error is viewing the system as just a GPU, rather than as a complete queueing system,
    and misinterpreting high utilization as a universal good.
  napkin_math: A single H100 (3.35 TB/s) serving a 70B model (140GB) has memory-bound decode at approx
    41.8ms/token. If avg response is 100 tokens, service time is 4.18s. At max batch 64, max throughput
    is 15 req/s. If normal arrival = 10 req/s, queue is stable. If traffic spikes 50%, arrival = 15 req/s.
    Utilization = 1.0. Queueing theory dictates wait time approaches infinity.
