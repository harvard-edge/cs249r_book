schema_version: 1
id: cloud-2302
title: MoE Expert Parallelism Decode Bottleneck
topic: mixture-of-experts
status: published
provenance: imported
scenario: 'You deploy an 8x8B Mixture-of-Experts (MoE) LLM (top-2 routing, ~16B active parameters) on
  a single 8x A100 (80GB) node to serve 500 QPS of chat completions. While the 64B total parameters fit
  comfortably in the 640GB of HBM, you observe a severe failure: decode latency is stuck at 150ms/token
  with GPU SM utilization under 15%. A dense 13B model on the exact same hardware achieves 30ms/token.
  Why is the MoE model failing to achieve expected performance, and how do you redesign the deployment?'
details:
  realistic_solution: "The root cause is a severe hardware-algorithm mismatch caused by using Expert Parallelism\
    \ (EP) during the memory-bound decode phase. In EP, each GPU holds one expert. During decode, batch\
    \ sizes per token are small (often 1). The router must perform an all-to-all communication across\
    \ NVLink to send tokens to the correct GPU. Because the batch size hitting each expert is tiny, the\
    \ GPU must load 8B parameters (16GB in FP16) from HBM to compute just 1-2 tokens, making it catastrophically\
    \ memory-bandwidth bound. Furthermore, the all-to-all kernel launch and synchronization overheads\
    \ dominate the execution time. \n\nThe solution is to co-design the mapping by abandoning Expert Parallelism\
    \ for decode and switching to Tensor Parallelism (TP=8). In TP=8, the weights of ALL experts are sharded\
    \ across all 8 GPUs. When a token is routed to an expert, all 8 GPUs simultaneously compute a slice\
    \ of that expert's matrix multiplication. This eliminates the all-to-all token routing overhead entirely,\
    \ and divides the 16GB weight read by 8, allowing the system to fully saturate the aggregate memory\
    \ bandwidth of the node."
  common_mistake: Assuming the bottleneck is KV cache capacity and attempting to increase batch size or
    apply heavy quantization to the weights.
  napkin_math: "Expert Parallelism (1 GPU): Loading 8B params (16GB FP16) at 2 TB/s HBM bandwidth = 8ms\
    \ per layer. For 32 layers = 256ms theoretical minimum, plus NVLink all-to-all latency (typically\
    \ 10-20us per layer). \nTensor Parallelism (8 GPUs): 16GB is sharded to 2GB per GPU. 2GB at 2 TB/s\
    \ = 1ms per layer. For 32 layers = 32ms. This provides an 8x theoretical speedup in the memory-bound\
    \ decode phase and perfectly aligns with the 30ms/token baseline of the dense 13B model."
