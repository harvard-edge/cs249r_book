id: cloud-top-65033
title: 'Continual Adaptation: Catastrophic Forgetting in LoRA Updates'
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A production LLM is updated monthly with new LoRA adapters trained on fresh data. After 4 months,
  benchmark performance on original tasks has degraded 15% even though the base model weights are frozen.
  Diagnose the continual learning failure.
details:
  realistic_solution: 'Frozen base prevents catastrophic forgetting of base knowledge. But if the deployment
    pattern merges adapters into the base (for efficiency) and then trains new adapters on top of the
    merged base, the frozen base is different each month and gradually drifts. Fix A (no merge): maintain
    versioned separate adapters, serve them in ensemble. Fix B (merge with regularization): when merging
    adapter n, add EWC (Elastic Weight Consolidation) penalty for parameters important to previous tasks.
    Fix C (adapter capacity): train each monthly adapter to be orthogonal to previous adapters using Gram-Schmidt
    on the LoRA B matrices. Fix D (replay): include 5% of old task data in each monthly training run.
    Most practical: Fix D with 5% replay buffer sampled from each of the 4 previous months.'
  common_mistake: Assuming frozen base weights prevent catastrophic forgetting. The LoRA adapters themselves
    can accumulate task interference across monthly updates if each new adapter is merged additively into
    the base, causing the effective base to drift from the original.
  napkin_math: '4 months of updates, 15% degradation = ~3.75% per update. EWC regularization cost: compute
    Fisher information matrix of 15M LoRA params = 15M * 4B (FP32 FIM diagonal) = 60MB storage per checkpoint.
    Negligible. Replay 5% of 3 previous months: if monthly dataset = 10K examples, replay = 0.05 * 30K
    = 1500 examples. Adds ~15% to training time. Expected forgetting with replay: <0.5%/month empirically.'
