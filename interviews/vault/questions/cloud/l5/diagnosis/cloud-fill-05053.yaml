schema_version: 1
id: cloud-fill-05053
title: SLO Violation Root Cause Analysis for LLM Service on TPU v5e
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A TPU v5e deployment (197 TFLOPS BF16 per chip, 16 chips in a pod) serves Gemma-7B with P99
  TTFT SLA of 500ms. During business hours, P99 TTFT spikes to 2.1 seconds while P50 remains at 180ms.
  Diagnose the likely cause and propose a fix.
details:
  realistic_solution: 'P50=180ms, P99=2100ms: 11.7× P99/P50 ratio is diagnostic of queue buildup, not
    inference speed variance. Inference itself has low variance (P99/P50 typically <2×). Cause: request
    arrival bursts during business hours exceed service capacity. With 16 chips at ~100 req/s capacity:
    if 120 req/s arrive, queue builds → P99 grows by Little''s Law (L = λ×W). Fix options: (1) Autoscale:
    add TPU pod instances during business hours (dynamic provisioning). (2) Admission control: reject/redirect
    requests when queue depth > threshold. (3) Prefill-decode disaggregation: separate TPUs for prefill
    (high compute) vs decode (memory bandwidth), increasing throughput. (4) Request prioritization: apply
    strict deadline scheduling. Profile: check TPU utilization (if >95%, need more chips; if 70%, problem
    is batching or pipeline bubbles).'
  common_mistake: Blaming network latency or model complexity for P99 spikes; the gap between P50=180ms
    and P99=2100ms indicates a queuing problem, not an inference performance problem.
  napkin_math: 'P50=180ms = ~5.6 req/s capacity per chip. 16 chips: 89.6 req/s. Business hours load: if
    100+ req/s → utilization > 100% → queue grows. Little''s Law: E[wait] = (arrival_rate × service_time)
    / (1 - utilization). At 110% load, queue → infinite. Fix: scale to 18+ chips or rate-limit at 90 req/s.'
