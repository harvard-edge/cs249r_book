schema_version: 1
id: cloud-fill-02052
title: 'RDMA Transport over Lossy Networks: RoCEv2 Congestion Collapse'
topic: rdma-transport
status: published
provenance: imported
scenario: A RoCEv2 RDMA cluster experiences periodic throughput collapse to 2% of peak during AllReduce
  on 128 H100s. The collapse lasts 500ms and recovers. Packet captures show PFC PAUSE frames flooding
  the network. Diagnose the PFC storm mechanism and propose a configuration fix.
details:
  realistic_solution: 'PFC storm mechanism: Switch A sends PAUSE to Switch B because its buffer fills.
    Switch B, now paused, backs up traffic which fills its own buffers, causing it to PAUSE Switch C.
    Cascading pauses create a deadlock where no traffic moves. Root cause: PFC lossless domains too large,
    insufficient buffer per switch port. Fix: (1) Enable ECN (Explicit Congestion Notification) on all
    switches — DCQCN algorithm reduces sender rate before buffers fill, preventing PFC triggers. (2) Reduce
    PFC domain: separate ML training traffic (Class 3) from storage and general traffic with separate
    PFC classes. (3) Switch buffer tuning: dynamic threshold allocation (DT) pools allow temporary burst
    absorption. (4) RDMA CC: enable DCQCN with tuned Kmin=5%/Kmax=50% buffer thresholds. Result: PFC storms
    eliminated, throughput improves from periodic 2% to sustained 90%+.'
  common_mistake: Trying to fix PFC storms by disabling PFC entirely (causing packet drops and RDMA retransmits)
    rather than configuring ECN+DCQCN properly.
  napkin_math: 'PFC PAUSE duration: typically 65535 quanta × 512 bits / link_speed. At 200Gbps: 65535×512/200e9=168μs
    per PAUSE. Chain of 4 switches: 4×168=672μs storm. Cascading PAUSEs multiply. DCQCN reduces sender
    rate by 50% when ECN mark received → prevents buffer overflow before PFC threshold. Buffer threshold
    for ECN: 20% of port buffer → prevents 80% of PFC events.'
