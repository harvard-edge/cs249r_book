id: cloud-1782
title: Multi-Dimensional Resource Fragmentation and GPU Stranding
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You manage a Kubernetes cluster with 50 nodes, each featuring 8x A100 GPUs, 128 CPU cores,
  and 1024GB RAM. Your workloads consist of Job A (Distributed Training: 4 GPUs, 64 CPUs, 512GB RAM) and
  Job B (Batch Inference: 1 GPU, 24 CPUs, 150GB RAM). Currently, overall GPU utilization is stuck at 50%
  because pending Job A pods cannot schedule, despite 200+ idle GPUs across the cluster. Evaluate the
  root cause of this resource fragmentation and compare two mitigation strategies: adjusting the scheduler''s
  NodeResourcesFit plugin to prioritize bin-packing versus re-profiling the resource ratios of Job B.'
details:
  realistic_solution: 'The optimal solution requires re-profiling Job B to match the node''s natural resource
    ratio (1 GPU : 16 CPUs : 128GB RAM), combined with a MostAllocated (bin-packing) scheduler policy.
    Reducing Job B to 16 CPUs/128GB RAM prevents CPU exhaustion from stranding the remaining GPUs.'
  common_mistake: 'Candidates often suggest solving this purely through pod preemption, migration, or
    defragmentation algorithms without realizing the dimensional imbalance: Job B''s CPU/RAM requests
    are disproportionately high. Migration alone will just recreate the same stranded GPUs on different
    nodes.'
  napkin_math: 'Node capacity: 8 GPUs, 128 CPUs (Ratio 1:16). Job A ratio: 4:64 (1:16). Job B ratio: 1:24.
    If a node runs 4x Job B pods, it consumes 4 GPUs and 96 CPUs. Remaining on node: 4 GPUs and 32 CPUs.
    A pending Job A requires 4 GPUs and 64 CPUs. Because the node is short 32 CPUs, the remaining 4 GPUs
    cannot be used by Job A and become ''stranded''. Across 50 nodes, this strands up to 200 GPUs.'
