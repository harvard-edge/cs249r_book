id: cloud-fill2-32009
title: Measuring True Energy per Token in Training
topic: datacenter-efficiency
status: published
provenance: imported
scenario: Your team trains a 70B parameter model on 512 H100 GPUs for 2 weeks, processing 2 trillion tokens.
  The cluster draws 550 kW at the IT level with PUE 1.12. Calculate the energy per token and compare it
  against published benchmarks. What are the biggest levers to reduce energy per token?
details:
  realistic_solution: 'Total power = 550 kW × 1.12 PUE = 616 kW. Training duration = 14 days × 24 h =
    336 h. Total energy = 616 kW × 336 h = 206,976 kWh ≈ 207 MWh. Energy per token = 207 MWh / 2T tokens
    = 0.1035 Wh/token = 103.5 μWh/token or 0.373 J/token. Published benchmarks: Llama-2 70B used ~1.7M
    GPU-hours on A100, ~1000 MWh for 2T tokens = ~500 μWh/token. Your H100 efficiency is ~5× better due
    to hardware generation improvement (3× FLOPS, better memory bandwidth) and likely better MFU. Biggest
    levers: (1) Increase MFU from typical 40% to 55%+ via communication overlap, (2) use BF16 instead
    of FP32 master weights where possible, (3) improve data pipeline to eliminate GPU idle time, (4) use
    larger batch sizes to amortize communication.'
  common_mistake: Reporting only IT power and ignoring PUE overhead. Also confusing tokens processed with
    unique tokens — data repetition (multiple epochs) doesn't change the energy accounting per processed
    token.
  napkin_math: '550 kW × 1.12 = 616 kW total. 616 kW × 336h = 207 MWh. 207 MWh / 2T tokens = 103.5 μWh/token.
    Improving MFU from 40% to 55%: same work in 73% of time → 75 μWh/token.'
