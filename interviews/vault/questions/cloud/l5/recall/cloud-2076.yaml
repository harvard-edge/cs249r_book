id: cloud-2076
title: The End-to-End Iteration Tax Audit
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'You are a Staff engineer asked to reduce the team''s model development cycle time from 6 weeks
  to 2 weeks. The current breakdown: data collection (1 week), data cleaning and labeling (1 week), feature
  engineering (1 week), training and hyperparameter tuning (1.5 weeks), evaluation (0.5 weeks), deployment
  and testing (1 week). No single phase dominates. Where do you invest engineering effort, and how do
  you achieve a 3× speedup when every phase seems equally important?'
details:
  realistic_solution: 'The insight is that the 6-week timeline assumes a serial pipeline: each phase completes
    before the next begins. A 3× speedup requires parallelizing and overlapping phases, not just speeding
    them up. Strategy: (1) Parallelize independent phases: feature engineering and data cleaning can overlap.
    Data collection for the next iteration can start while the current model trains. This alone compresses
    6 serial weeks to ~3.5 weeks. (2) Incremental processing: instead of cleaning all data before training,
    use a streaming pipeline that cleans and feeds data continuously. Train on partial data and refine
    as more arrives. (3) Shift evaluation left: run fast proxy evaluations (subset benchmarks, smaller
    models) during training to kill bad experiments early. (4) Pre-validated deployment: build the serving
    infrastructure and integration tests once, then deploy is a config change (hours, not a week). (5)
    The key architectural change: move from a ''waterfall'' ML pipeline to a ''continuous'' pipeline where
    data, training, and evaluation flow concurrently. Target: data prep (continuous, 0 weeks blocking),
    training (1 week), evaluation (embedded in training, 0 extra weeks), deployment (2 days) = ~1.5 weeks.'
  common_mistake: Trying to optimize each phase equally (spreading effort thin) or optimizing only the
    longest phase (training). With no single dominant phase, local optimizations yield diminishing returns.
    The answer is to change the workflow topology, not speed up individual phases.
  napkin_math: 'Serial pipeline: 1 + 1 + 1 + 1.5 + 0.5 + 1 = 6 weeks. Overlap data phases: max(1, 1, 1)
    = 1 week (parallel). Training with embedded eval: 1.5 weeks. Automated deployment: 0.3 weeks. Parallel
    pipeline: 1 + 1.5 + 0.3 = 2.8 weeks ≈ 2 weeks with iteration. Speedup = 6/2.8 = 2.1×. Remaining gap:
    closed by fast proxy evaluation that kills 50% of experiments in hour 1 of training, reducing average
    training time from 1.5 to 1 week.'
