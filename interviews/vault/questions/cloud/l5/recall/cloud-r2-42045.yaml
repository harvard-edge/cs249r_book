schema_version: 1
id: cloud-r2-42045
title: NVLink Domain Size and Scaling Limits
topic: interconnect-topology
status: published
provenance: imported
scenario: NVIDIA's DGX B200 connects 8 GPUs via NVSwitch with 1.8 TB/s per GPU. The GB200 NVL72 extends
  this to 72 GPUs via NVSwitch fabric at 900 GB/s per GPU. Calculate the AllReduce speedup from scaling
  the NVLink domain from 8 to 72 GPUs for a 405B model, and explain the diminishing returns beyond 72
  GPUs.
details:
  realistic_solution: '405B model in FP16 = 810 GB. DGX B200 (8 GPUs): 810 / 8 = 101.25 GB per GPU. Tensor
    parallel AllReduce per layer: activation shard = ~200 MB / 8 = 25 MB. AllReduce time: 2 × 25 MB ×
    7/8 / 1800 GB/s = 0.024ms. GB200 NVL72 (72 GPUs): 810 / 72 = 11.25 GB per GPU — fits in each GPU''s
    HBM with room for KV cache. AllReduce: 200 MB / 72 = 2.78 MB per shard. Time: 2 × 2.78 × 71/72 / 900
    GB/s = 0.006ms. Speedup: 4× faster AllReduce + each GPU loads 9× fewer weights per step. Beyond 72:
    must cross to InfiniBand (50 GB/s). AllReduce for 128 GPUs: NVLink for intra-72 + IB for 2 domains.
    IB step: 2 × (200/72) MB × 1 / 50 = 0.11ms. IB adds 18× the latency of NVLink. Diminishing returns:
    going from 72→128 adds only 72/128 = 56% more GPUs but the IB boundary adds significant overhead per
    step.'
  common_mistake: Assuming NVLink domains can scale indefinitely. NVSwitch uses electrical signaling limited
    to ~1 meter of copper trace. Beyond 72 GPUs, you must cross to InfiniBand/Ethernet, which is 10-50×
    slower. The NVLink domain boundary is a hard architectural cliff.
  napkin_math: 'DGX B200 AllReduce: 0.024ms/layer × 120 layers = 2.88ms total. GB200 NVL72: 0.006ms ×
    120 = 0.72ms. Speedup: 4×. 128 GPUs (72+56): NVLink portion = 0.72ms + IB bridge = 0.11ms × 120 =
    13.2ms. Total = 13.9ms. Going from 72→128: AllReduce goes from 0.72ms to 13.9ms (19× worse) despite
    1.78× more GPUs. The NVLink boundary dominates.'
