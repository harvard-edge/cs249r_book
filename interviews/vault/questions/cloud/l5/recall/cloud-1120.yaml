id: cloud-1120
title: Evaluating Declarative Scheduling for GPU Fault Tolerance
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are orchestrating a 2,048 H100 GPU cluster for training a 100B parameter LLM. The infrastructure
  heavily utilizes spot instances with a 15% hourly churn rate and averages 4 hard node failures per day.
  You must evaluate replacing a legacy imperative orchestration system—where custom scripts detect failures
  and manually provision replacement nodes sequentially—with a declarative scheduling system (e.g., Kubernetes).
  Compare the two approaches, specifically quantifying the impact on Mean Time To Recovery (MTTR) and
  the architectural trade-offs regarding control plane overhead during massive churn.
details:
  realistic_solution: A declarative system shifts the burden of state management to continuous control
    loops. When 38 nodes (15% churn on 256 8-GPU nodes) are preempted, the controller detects the delta
    from the desired state and concurrently provisions replacements in ~5s via parallel API calls, compared
    to 38 * 15s = 570s of sequential imperative calls. Total MTTR drops from ~12.5 minutes to ~3.3 minutes,
    saving 314 GPU-hours of idle time per preemption event.
  common_mistake: Assuming declarative scheduling is just syntactic sugar, or failing to acknowledge the
    risk of control plane (etcd/API server) overload when continuously reconciling thousands of GPU pods
    during high churn events.
  napkin_math: 'Imperative MTTR for 38 nodes: (38 nodes × 15s sequential API calls) + 120s boot + 60s
    state restore = ~12.5 minutes downtime. Declarative MTTR: 15s (liveness probe timeout) + 5s (concurrent
    API requests) + 120s boot + 60s state restore = ~3.3 minutes downtime. Time saved per event = 9.2
    minutes. Idle cost avoided per event = 2,048 GPUs × 9.2 mins = 314 GPU-hours.'
