id: cloud-cell-11009
title: 'Dataset Curation: Mastery — Detect and Fix Systematic Labeling Bias'
topic: dataset-curation
status: published
provenance: imported
scenario: 'Your 7B instruction-tuned model on H100 shows demographic bias: it declines 40% of requests
  from users with non-Western names versus 12% for Western names. You suspect labeling bias in 500K RLHF
  preference pairs. Walk through the full diagnosis, measurement, and correction pipeline with concrete
  numbers.'
details:
  realistic_solution: '1) Audit: name-based demographic proxy labeling on 500K pairs. 2) Measure refusal
    rate correlation with demographics in training labels. 3) Rebalance: oversample underrepresented preference
    pairs. 4) Retrain reward model. 5) Re-run RLHF. 6) Evaluate on held-out demographic-stratified test
    set.'
  common_mistake: Retraining from scratch without first auditing and correcting the dataset; assuming
    model architecture is the problem.
  napkin_math: '500K pairs. Audit: 10 CPU hours for name classification. Found 60K pairs (12%) with non-Western
    names. Refusal rate in labels: 35% vs 8% for Western names → 4.4× disparity. Rebalancing: upsample
    non-Western pairs 3× to 180K, downsample Western from 440K to 320K. New total: 500K pairs, 36% non-Western.
    Expected bias reduction: from 40%/12% gap to ~18%/12% gap (3× reduction). Validate on 10K held-out
    pairs per demographic group.'
