title: 'Megablocks: Variable-Length Expert Computation'
topic: mixture-of-experts
status: published
provenance: imported
scenario: 'Standard MoE implementations pad each expert''s input to the capacity factor limit, wasting
  compute on zero-padded slots. Megablocks proposes using block-sparse matrix operations instead. Explain
  the mechanism: how does block-sparse GEMM eliminate the capacity factor entirely, and what GPU hardware
  features does it exploit?'
details:
  realistic_solution: 'Base capacity = 512/8 = 64. With C=1.5: limit = 64 × 1.5 = 96 tokens/expert. Padded
    = 8 × 96 = 768 (not 1536 which incorrectly computes 512×C=768 without dividing by num_experts).'
  common_mistake: Thinking block-sparse operations are inherently slower than dense operations. On modern
    GPUs with Tensor Cores, block-sparse GEMMs can achieve near-dense throughput for blocks aligned to
    the Tensor Core tile size (16×16 or 32×32).
  napkin_math: 'Expert capacity with capacity factor C=1.5, batch=512 tokens, 8 experts: base capacity
    = 512/8 = 64 tokens per expert. With C=1.5: capacity limit = 64 × 1.5 = 96 tokens (not 192 — 192 would
    require C=3.0). Padded tensor size: 8 experts × 96 capacity = 768 (not 1536 which uses limit=192).'
