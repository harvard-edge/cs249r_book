schema_version: 1
id: cloud-cell-11143
title: 'KV-Cache: Realize Cross-Request KV Cache Sharing for RAG Applications'
topic: kv-cache-management
status: published
provenance: imported
scenario: Realize a KV cache sharing architecture for a RAG (Retrieval-Augmented Generation) application
  on H100s (80GB HBM3) where 1000 documents (avg 512 tokens each) are frequently retrieved and included
  in prompts. 60% of requests use one of the top-50 most popular documents. Design the shared document
  KV cache.
details:
  realistic_solution: 'KV cache per token for GQA-8 model with 32 layers: 2 × 32 × 8 × 128 × 2B = 131KB
    per token.'
  common_mistake: Not accounting that shared KV cache pages must be read-only (copy-on-write) to prevent
    one request modifying another's cache; forgetting that attention is autoregressive and document KV
    depends on position in the prompt.
  napkin_math: 'KV per token: 32 layers × 2 (K and V) × 8 KV heads × 128 head_dim × 2B = 131KB (not 32KB).'
last_modified: '2026-04-01'
