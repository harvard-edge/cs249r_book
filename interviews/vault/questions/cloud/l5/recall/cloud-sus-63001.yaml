schema_version: 1
id: cloud-sus-63001
title: Privacy Amplification via Subsampling in Production
topic: differential-privacy
status: published
provenance: imported
scenario: Your DP training pipeline on 10M user records uses minibatch SGD with batch size 1,000. The
  privacy team says you can improve your ε by 10× 'for free' via subsampling amplification. A junior engineer
  proposes sampling without replacement instead of with replacement. Does this claim hold, and what are
  the implementation pitfalls in a distributed multi-GPU training context?
details:
  realistic_solution: 'Privacy amplification via Poisson subsampling gives ε_amplified ≈ q·ε_base where
    q = B/N = 1000/10M = 0.0001. So ε effectively reduces by ~10,000×, not 10×. The 10× claim is conservative.
    However, in distributed training across 8 GPUs, each GPU seeing a shard is NOT equivalent to Poisson
    sampling over the full dataset — it''s stratified sampling. You must implement global Poisson sampling
    before sharding, not per-GPU sampling. Implementation: use a cryptographically random inclusion mask
    over all N examples before each step, then distribute included examples across GPUs.'
  common_mistake: Assuming sampling without replacement gives the same amplification as Poisson subsampling.
    It does not — the moments accountant and Rényi DP amplification theorems are proven for Poisson sampling
    (each example included independently with probability q=B/N). Without-replacement sampling requires
    tighter analysis and gives weaker amplification bounds.
  napkin_math: 'Poisson subsampling: q = 1000/10M = 1e-4. Amplification factor: ε_eff ≈ q·ε = 1e-4 × 8
    = 8e-4 per step. After T=100K steps under moments accountant: ε_total ≈ q·σ⁻¹·√(2T·ln(1/δ)) ≈ 1e-4·(1/1.1)·√(2×100K×11.5)
    ≈ 1e-4·0.91·1517 ≈ 0.138. Without subsampling (q=1): ε ≈ 0.138 / 1e-4 = 1,380. That is the 10,000×
    gap subsampling buys.'
