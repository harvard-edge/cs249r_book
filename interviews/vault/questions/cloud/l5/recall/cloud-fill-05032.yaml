schema_version: 1
id: cloud-fill-05032
title: AllToAll Communication for Expert Parallelism in MoE on TPU v5e
topic: collective-communication
status: published
provenance: imported
scenario: TPU v5e pods have 256 chips connected via ICI at ~4 TB/s aggregate. A Mixture-of-Experts model
  routes tokens to 8 active experts out of 64 total across 64 TPU chips. Each token dispatch requires
  an AllToAll collective. For batch=512 with seq_len=2048, token_dim=1024 (BF16), calculate AllToAll volume
  and latency.
details:
  realistic_solution: 'Tokens per batch: 512 × 2048 = 1M tokens. Top-2 routing: each token goes to 2 experts.
    Token size: 1024 dims × 2B = 2KB. AllToAll: each of 64 chips sends/receives 1M/64 = 15,625 tokens
    per expert chip. But with top-2 routing: 2M token-dispatches total / 64 chips = 31,250 per chip. AllToAll
    volume per chip: 31,250 × 2KB = 62.5MB sent + 62.5MB received = 125MB per chip. Total network: 64
    × 62.5MB = 4GB. At 4 TB/s aggregate ICI: 4GB / 4TB/s = 1ms. Per-chip bandwidth: 4TB/s/64 = 62.5 GB/s
    per chip. 62.5MB / 62.5 GB/s = 1ms — bandwidth bound.'
  common_mistake: Calculating AllToAll as if all tokens go to all chips; in expert parallelism, each chip
    sends/receives only its portion of tokens to/from chips hosting the routed experts.
  napkin_math: 'Tokens: 512×2048 = 1M. Top-2 routing: 2M dispatches. Per chip: 31,250 tokens × 2KB = 62.5MB.
    ICI per chip: 62.5 GB/s. Latency: 62.5MB / 62.5 GB/s = 1ms AllToAll. Expert compute: 31,250 tokens
    × FFN FLOPs / 197 TOPS ≈ comparable → pipeline AllToAll with compute.'
