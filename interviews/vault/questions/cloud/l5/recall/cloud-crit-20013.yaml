schema_version: 1
id: cloud-crit-20013
title: FlashAttention-2 vs FlashAttention-1 Parallelism
topic: flash-attention
status: published
provenance: imported
scenario: 'FlashAttention-1 parallelizes over batch and heads (outer loop over K/V tiles). FlashAttention-2
  reverses this: outer loop over Q tiles, inner loop over K/V tiles. On an H100 with 132 SMs, for a batch=1,
  32 heads, seq_len=16384, head_dim=128 workload, explain why FA-2''s approach achieves higher occupancy
  and estimate the speedup.'
details:
  realistic_solution: 'FA-1: parallelism = batch x heads = 1 x 32 = 32 thread blocks. H100 has 132 SMs,
    so SM occupancy = 32/132 = 24.2%. 100 SMs idle. FA-2: parallelism = batch x heads x ceil(N/B_r) =
    1 x 32 x ceil(16384/128) = 1 x 32 x 128 = 4,096 thread blocks. SM occupancy: 4,096/132 = 31 blocks
    per SM in waves — 100% occupancy. Each thread block processes one Q tile against all K/V tiles sequentially.
    FA-2 also reduces non-matmul FLOPs by keeping Q in registers and iterating K/V through shared memory.
    Combined: ~1.7-2x speedup over FA-1 on this workload.'
  common_mistake: Thinking the loop reordering is a minor optimization. FA-1 with batch=1 has only 32
    thread blocks (one per head) for 132 SMs, wasting 100 SMs. FA-2 parallelizes over Q tiles too.
  napkin_math: 'FA-1 blocks: 32. FA-2 blocks: 4,096. Occupancy: 24% vs 100%. Expected speedup: ~1.7-2x
    from occupancy alone. FA-2 measured: 230 TFLOPS vs FA-1: 140 TFLOPS on H100.'
