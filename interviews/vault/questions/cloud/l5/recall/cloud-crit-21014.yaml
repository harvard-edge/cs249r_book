schema_version: 1
id: cloud-crit-21014
title: MoE Quantization Strategy for Serving
topic: mixture-of-experts
status: published
provenance: imported
scenario: You want to serve Mixtral 8x22B (141B total params) on a single 8×H100 node. In BF16 the weights
  need 282 GB, barely fitting in 640 GB HBM but leaving insufficient room for KV-cache at high batch sizes.
  Design a mixed-precision quantization strategy for the experts vs shared layers.
details:
  realistic_solution: 'Mixtral 8×7B has ~46.7B active params (not 141B). Using consistent 7B shared: BF16
    = 14GB. 8 expert FFNs (134B) at INT4 = 67GB. Total ≈ 81GB. The 42+88=130GB figure uses inconsistent
    param counts.'
  common_mistake: Quantizing everything uniformly to INT4. The shared attention layers (which process
    every token) are more sensitive to quantization than expert FFN layers (which each see only a fraction
    of tokens).
  napkin_math: 'Mixtral 8×7B: total params ≈ 46.7B (shared 7B + 8 experts each adding incremental FFN).
    But described as 141B: shared params = ~7B, expert FFN = 8 × (141-7)/8 = 8 × 16.75B = 134B expert
    FFN. Memory: shared (active) BF16 = 7B × 2B = 14GB. Expert FFN INT4: 134B × 0.5B = 67GB. Total: 81GB.
    Alternatively using stated 21B shared + 176B expert = 197B total: shared INT8 21B×1B = 21GB + expert
    INT4 176B×0.5B = 88GB. Total = 109GB. The issue is 42+88=130 doesn''t equal 141B params. Fix using
    consistent params: 7B shared × 2B + 8×16.75B × 0.5B = 14 + 67 = 81GB.'
