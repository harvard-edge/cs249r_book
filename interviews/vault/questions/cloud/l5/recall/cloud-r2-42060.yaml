schema_version: 1
id: cloud-r2-42060
title: Wave Quantization in Kernel Launch
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: Your H100 has 132 SMs. You launch a kernel with 140 thread blocks. The first wave fills all
  132 SMs, and the second wave uses only 8 SMs (6% utilization). This 'tail wave' wastes 94% of the GPU
  for the duration of those 8 blocks. Calculate the efficiency loss and determine the optimal number of
  thread blocks to avoid wave quantization.
details:
  realistic_solution: 'Correct wording: ''35% of work per block'' (each block handles 35% of total work)
    rather than ''35% less work'' (which implies 65% of optimal, a different meaning).'
  common_mistake: Launching a number of thread blocks that slightly exceeds a multiple of SM count. The
    last partial wave runs with most SMs idle, wasting expensive GPU time. This is especially harmful
    for small kernels where the tail wave dominates total runtime.
  napkin_math: 'Thread block occupancy: 35% of work per block (not ''35% less work''). The correct interpretation:
    each thread block processes 35% of the computation, not that it does 35% less work than a reference.
    ''Per block'' vs ''less than optimal'' are different framings.'
