id: cloud-0626
title: The PagedAttention Block Size Trap
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are using vLLM to serve an LLM. You configure the PagedAttention block size to 256 tokens
  per block to reduce the metadata overhead in the memory allocator. However, you notice that your system
  supports 50% fewer concurrent requests than expected before throwing OOMs, and time-to-first-token (TTFT)
  latency spikes under load. Why did a large block size destroy your capacity?
details:
  realistic_solution: Large block sizes cause massive internal fragmentation that wastes memory capacity.
    With 256-token blocks, a short 50-token response allocates a full 256-token block, wasting ~80% of
    the allocated HBM. Even for long sequences, the final block is half-empty on average. Because the
    GPU memory is artificially exhausted by padding, the system can support far fewer concurrent requests.
    Worse, incoming requests cannot start until a full 256-token block is available, causing allocation
    delays that spike TTFT under load. The optimal block size (typically 16 tokens) balances allocator
    metadata overhead against internal fragmentation, keeping memory waste under 5%.
  common_mistake: Assuming that larger blocks improve throughput by reducing memory allocation overhead,
    similar to CPU memory paging. PagedAttention's primary benefit is eliminating fragmentation; setting
    the block size too large reintroduces internal fragmentation, crippling the system's concurrency.
  napkin_math: Block size 256. Average sequence length is not perfectly divisible by 256. On average,
    the last block for every request is half empty (128 tokens wasted). If generating short responses
    (e.g., 50 tokens), a full 256-token block is allocated, wasting 206 tokens (80% waste). This internal
    fragmentation rapidly exhausts HBM capacity, leading to premature OOMs.
