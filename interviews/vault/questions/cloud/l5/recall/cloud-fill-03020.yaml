schema_version: 1
id: cloud-fill-03020
title: Flash Attention v2 vs v3 Block Size Selection on H100
topic: flash-attention
status: published
provenance: imported
scenario: Benchmarking Flash Attention v2 vs v3 on H100 (80GB HBM3, 3.35TB/s) for a 70B model with seq_len=8192
  and d_head=128. FA2 achieves 180 TFLOPS (52% MFU), FA3 claims up to 75% MFU on H100. You need to decide
  whether to adopt FA3 in production given it's newer and less battle-tested.
details:
  realistic_solution: Benchmark separately for prefill and decode. FA3 uses H100's wgmma instruction (Tensor
    Core v4) and pipelining to achieve higher MFU for prefill. For decode (batch=1, seq_len growing),
    both FA2 and FA3 are equally bandwidth-bound. Deploy FA3 for prefill-heavy workloads (batch processing,
    RAG) and evaluate risk vs 5-10% throughput gain for production serving.
  common_mistake: Benchmarking peak FLOP/s (compute-bound regime) without testing the memory-bound regime
    that occurs during decode. FA3's improvements are primarily for prefill (compute-bound); decode is
    still memory-bandwidth-bound and sees minimal improvement from FA3.
  napkin_math: 'H100 theoretical: 989 TFLOPS BF16. FA2 at 52% MFU = 514 TFLOPS effective. FA3 at 75% MFU
    = 742 TFLOPS effective. For prefill seq=8192, 70B model (40 layers, 40 heads, d=128): attention FLOPs
    = 40 × 2 × 8192² × 128 ≈ 687 GFLOP. At 742 TFLOPS: 687G/742T = 0.93ms prefill. At 514 TFLOPS: 687G/514T
    = 1.34ms. Decode: KV cache load = 40 * 2 * 8192 * 128 * 2 = 167MB/step. At 3.35TB/s: 50μs/step — bandwidth
    bound, same for FA2/FA3.'
