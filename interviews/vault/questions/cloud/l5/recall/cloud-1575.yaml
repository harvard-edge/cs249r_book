id: cloud-1575
title: Evaluating FP16 vs BF16 for LLM Pre-training Stability
topic: mixed-precision-training
status: published
provenance: imported
scenario: Your team is pre-training a 30B parameter LLM on a cluster of 512 NVIDIA A100 GPUs (80GB). Using
  standard FP16 mixed precision with dynamic loss scaling, the training frequently crashes with NaNs due
  to gradient overflow, leading to wasted compute. You are tasked with evaluating whether to switch to
  BF16 mixed precision or stick with FP16 and tune the loss scaler. Evaluate the memory bandwidth, compute
  throughput (both formats use 16-bit Tensor Cores on A100 delivering 312 TFLOPS), and numerical stability
  trade-offs to justify your architectural decision.
details:
  realistic_solution: Switch to BF16 for the forward and backward passes to eliminate gradient overflow,
    while maintaining FP32 master weights for the optimizer step. Since A100 Tensor Cores process both
    FP16 and BF16 at 312 TFLOPS and both consume 2 bytes per parameter, there is zero performance or memory
    bandwidth penalty for switching to BF16, while its 8-bit exponent entirely removes the need for dynamic
    loss scaling.
  common_mistake: Assuming BF16 is a strictly superior drop-in replacement without realizing that its
    7-bit mantissa requires strictly maintaining FP32 master weights to avoid losing small gradient updates
    during the optimizer step.
  napkin_math: 'FP16 max value = 65,504 (often exceeded in LLM training). BF16 max value = 3.4e38 (matches
    FP32). Performance: FP16 TFLOPS = BF16 TFLOPS = 312 on A100. Memory bandwidth: 2 bytes per parameter
    for both. However, BF16 machine epsilon is ~7.8e-3. An update of 1e-4 to a weight of 1.0 yields 1.0
    in BF16 (1.0 + 1e-4 < 1.0 + epsilon), proving the necessity of FP32 master weights for accumulation.'
