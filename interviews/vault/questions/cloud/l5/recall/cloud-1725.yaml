title: W8A8 vs W4A16 for LLM Decoding
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'Your team is deploying a 70B parameter autoregressive LLM on a multi-GPU node (e.g., 2x A100
  80GB, 4TB/s aggregate bandwidth). In FP16, the weights consume 140GB. For the token generation phase
  at a serving batch size of 16, the system is severely memory-bandwidth bound. You must evaluate two
  quantization strategies to maximize decoding throughput while preserving quality: W8A8 (8-bit weights
  and activations) and W4A16 (4-bit weights, 16-bit activations). Evaluate the trade-offs between these
  approaches regarding memory traffic, arithmetic intensity, and compute overhead, and justify your selection.'
details:
  realistic_solution: Select W4A16. Since autoregressive decoding at small batch sizes has very low arithmetic
    intensity, performance is bottlenecked entirely by the time it takes to stream weights from HBM to
    SRAM. W4A16 halves the weight memory traffic compared to W8A8, effectively doubling token generation
    throughput. Keeping activations in FP16 avoids the runtime compute overhead of dynamic activation
    quantization and preserves output quality.
  common_mistake: Candidates often assume W8A8 is superior because it accelerates compute using Tensor
    Cores for INT8 matrix multiplication, failing to recognize that autoregressive decoding is memory-bandwidth
    bound, making compute acceleration irrelevant.
  napkin_math: 'FP16 Weights: 140GB. W8 Weights: 70GB. W4 Weights: 35GB. At 4TB/s bandwidth, loading W8
    weights takes 70GB / 4TB/s = 17.5ms per token (57 tokens/sec). Loading W4 weights takes 35GB / 4TB/s
    = 8.75ms per token (114 tokens/sec). At batch size 16, activation data is negligible (~256KB per layer),
    so A16 vs A8 makes no difference to memory traffic.'
