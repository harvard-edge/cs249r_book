schema_version: 1
id: cloud-r2-40073
title: RDMA Performance Isolation with SR-IOV
topic: rdma-transport
status: published
provenance: imported
scenario: A cloud provider wants to offer bare-metal RDMA performance to multiple tenants sharing a physical
  MI300X server. SR-IOV (Single Root I/O Virtualization) creates virtual NIC functions (VFs) from a physical
  ConnectX-7 NIC. Quantify the performance overhead of SR-IOV for RDMA compared to bare-metal, and specify
  the maximum number of tenants that can share one 400G NIC without degrading AllReduce throughput below
  90% of bare-metal.
details:
  realistic_solution: 'SR-IOV overhead analysis for RDMA: (1) IOMMU translation: each DMA operation goes
    through IOMMU page table walk. Impact: +100ns per DMA transaction = +200ns per RDMA Write (read source
    + write destination). For 4KB packets: 200ns / 82ns (serialization at 400G) = 2.4× latency overhead
    per packet. Throughput impact: 100ns / (82ns + 100ns) = 55% of time spent on IOMMU → 45% throughput
    = 180 Gbps. With IOMMU IOTLB cache hit (64-entry TLB): overhead drops to ~10ns → 92% throughput =
    368 Gbps. (2) VF scheduling: the PF (Physical Function) arbitrates between VFs. With round-robin and
    N VFs: each VF gets 1/N of processing cycles. (3) Maximum tenants for 90% throughput: per VF bandwidth
    = 400Gbps × 0.92 (IOMMU) / N = target 360 Gbps (90%). Solving: N = 400 × 0.92 / 360 = 1.02 → N=1 only!
    This means a single VF achieves ~92% of bare-metal, and adding a second VF drops each to 46% — unacceptable.
    Solution: use separate physical NICs per tenant (possible on MI300X with 8 NICs), or use one NIC per
    tenant with dedicated VFs on dedicated PCIe virtual functions that have guaranteed bandwidth. With
    per-VF rate guarantees: 2 VFs × 200Gbps each = 400Gbps total, each achieving ~184 Gbps effective (92%
    × 200G) = 46% of bare-metal per VF.'
  common_mistake: Assuming SR-IOV has zero overhead because it is 'hardware virtualization.' SR-IOV adds
    IOMMU address translation (1-3% throughput overhead), VF scheduling latency (100-500ns), and shares
    the physical NIC's processing resources across all VFs.
  napkin_math: 'Bare-metal: 400 Gbps × 92% (IOMMU overhead) = 368 Gbps per NIC. SR-IOV with 2 VFs: 368/2
    = 184 Gbps per VF (46% of bare-metal). SR-IOV with 4 VFs: 368/4 = 92 Gbps per VF (23%). For AllReduce
    at 90% bare-metal: need dedicated NIC per tenant. 8 NICs per MI300X → maximum 8 tenants with full
    RDMA performance.'
