id: cloud-0738
title: The Oversubscription Choke
topic: collective-communication
status: published
provenance: imported
scenario: We placed half our GPUs in Rack A and half in Rack B. The intra-rack AllReduce is incredibly
  fast, but the global AllReduce crawls, even though we bought 400 Gbps InfiniBand. Where is the bottleneck?
details:
  realistic_solution: Oversubscribed spine switches. A true Fat-Tree (Clos) topology guarantees non-blocking,
    full bisection bandwidth across the entire cluster. However, if your data center uplinks are $3:1$
    oversubscribed (e.g., 3 downlinks for every 1 uplink to the spine), cross-rack traffic will instantly
    choke during global gradient synchronization.
  common_mistake: '"The InfiniBand NICs must be misconfigured." Configuration is fine — the problem is
    the switch topology.'
  napkin_math: 8 nodes per rack, each with 400 Gbps NIC = 3.2 Tbps aggregate demand per rack. If the spine
    uplink is only 1.6 Tbps (2:1 oversubscription), half the gradient data is queued, doubling AllReduce
    time. At 3:1 oversubscription, it triples.
