schema_version: 1
id: cloud-sus-63011
title: Multi-Metric Fairness Dashboard for Production LLM
topic: fairness-evaluation
status: published
provenance: imported
scenario: 'You are instrumenting a production text generation API serving 500K daily requests. The API
  generates job descriptions. A legal team requires you to monitor for four fairness metrics: (1) gendered
  pronoun usage parity, (2) salary recommendation gap by implied applicant gender, (3) leadership language
  disparity by race, (4) intersectional toxicity score disparity. Design the monitoring pipeline architecture
  and estimate its compute cost.'
details:
  realistic_solution: 'Async sampling pipeline: route 2% of traffic (10K req/day) to a Kafka topic for
    offline fairness evaluation. Batch process nightly with four lightweight classifiers: (1) pronoun
    classifier: regex + 3M BERT, ~0.5ms/req, (2) salary NER + regression: 20M model, ~2ms/req, (3) leadership
    language: sentence embedding + cosine similarity against curated lexicon, ~1ms/req, (4) toxicity:
    Perspective API or 100M classifier, ~5ms/req. Total: 10K × 8.5ms = 85 GPU-seconds/day ≈ 0.024 GPU-hours/day
    (≈0.71 GPU-hours/month). Statistical significance: at 10K samples/day, detect a 2pp disparity gap
    (from 5% to 7% baseline) with >80% power after ~3 days of data accumulation (30K samples).'
  common_mistake: Running all four fairness classifiers synchronously in the critical path — a classifier
    for each metric at 500K QPS would add 4 × 15ms = 60ms latency, violating typical SLAs.
  napkin_math: '2% sampling: 500K × 0.02 = 10K requests/day. Four classifiers at 8.5ms average: 10K ×
    8.5ms = 85s GPU time = 0.0236 GPU-hours/day. Monthly (30 days): 0.0236 × 30 = 0.708 GPU-hours/month
    at $2/GPU-hr = $1.42/month. Wall-time (batched at BS=64 on A100): 10K requests ÷ 64 per batch × 8.5ms
    × 4 classifiers ≈ 5.3 seconds/day. 30-day accumulation: 300K samples → detect 1pp salary gap with
    99% power. Alert threshold: >3σ deviation from 30-day rolling baseline.'
