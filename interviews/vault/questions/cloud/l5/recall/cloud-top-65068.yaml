schema_version: 1
id: cloud-top-65068
title: Request Migration Between Decode Nodes for Load Balancing
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'A decode pool has 8 nodes with unequal KV cache utilization: nodes 1-3 at 95%, nodes 4-8 at
  50%. You need to migrate live decode requests from nodes 1-3 to nodes 4-8 without dropping requests.
  Design the live migration protocol.'
details:
  realistic_solution: 'Incremental request migration protocol: (1) Identify migration candidates: select
    requests from overloaded nodes ordered by lowest token-position (recently arrived, least KV to migrate).
    (2) Per-request migration: for request R at token position T: (a) Pause R''s decode slot on source
    node (one step boundary); (b) Transfer KV cache: T tokens * kv_size_per_token to destination node
    over InfiniBand; (c) Register R with destination decode scheduler; (d) Resume R on destination. Migration
    time per request: for 512-token context in 8B model: 268MB at 50 GB/s InfiniBand = 5.4ms per request.
    (3) Throttled migration: migrate N requests per second where N is chosen to not saturate InfiniBand.
    At 10 requests/sec: InfiniBand load = 10 * 268MB = 2.68 GB/s (5% of 50 GB/s). Very manageable. (4)
    Drain and redirect: after migrating 30% of requests from overloaded nodes, re-route new requests to
    underloaded nodes. (5) Target: equalize utilization to 65-70% across all nodes.'
  common_mistake: Migrating all requests atomically by checkpointing all KV caches simultaneously. For
    a node at 95% KV utilization with batch=128 requests, migrating 128 * average_kv_size simultaneously
    can take 10+ seconds, causing a service interruption.
  napkin_math: 'Overloaded nodes: 3 nodes at 95% KV utilization. Batch per node: ~128 requests. Total
    to migrate to restore balance: migrate until 70% utilization. Migration needed: (95-70)% * 3 nodes
    = 75% of one node''s requests = ~96 requests. At 10 requests/sec: 9.6 seconds to complete migration.
    During migration: 96 requests experience 5.4ms pause each. Impact on user experience: 5.4ms interruption
    during ongoing decode = imperceptible (decode steps are typically 40ms anyway). TPOT blip: one step
    takes 45.4ms vs 40ms = 13.5% slower for migrated requests for one step.'
