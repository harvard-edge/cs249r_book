id: cloud-cell-11140
title: 'KV-Cache: Mastery — KV Cache Memory Budget Optimization for Long-Context Serving'
topic: kv-cache-management
status: published
provenance: imported
scenario: 'Your 13B LLM serving on H100 (80GB HBM3) needs to support 32K-token context windows for code
  generation. A single 32K-token KV cache requires: 40 layers × 2 × 8 KV heads × 128 head_dim × 32K tokens
  × 2B = 5.24GB. Design a memory budget that allows at least 10 concurrent 32K-context requests.'
details:
  realistic_solution: 'Tight budget: 26GB model + 52.4GB KV = 78.4GB. Add: 1GB CUDA overhead + 0.5GB fragmentation
    buffer. Total: 79.9GB — barely fits. Need optimization: use INT8 KV to halve KV cache.'
  common_mistake: Allocating 10 × 5.24GB = 52.4GB + 26GB model = 78.4GB and declaring it fits in 80GB
    without accounting for activation memory, CUDA overhead, and fragmentation.
  napkin_math: '13B model bf16: 26GB. 10 × 32K KV at FP16: 10 × 5.24GB = 52.4GB. Sum: 78.4GB. CUDA overhead
    (context, streams, PyTorch): 1.5GB. Fragmentation: 0.3GB. Total: 80.2GB > 80GB HBM. Doesn''t fit by
    200MB. Fix 1: INT8 KV cache: 52.4GB / 2 = 26.2GB KV. Total: 26 + 26.2 + 1.8 = 54GB. Fits! Now capacity:
    (80 - 26 - 1.8) / (5.24GB/2) = 52.2GB / 2.62GB = 19.9 → 19 concurrent 32K-context requests. Fix 2:
    INT4 KV: 13.1GB KV for 10 requests. Capacity: 52.2GB / 1.31GB = 39.8 → 39 concurrent. Quality: INT8
    KV perplexity < 0.3% increase, INT4 < 1.5%. For code generation: INT8 recommended (accuracy matters).
    Throughput: decode at 10 requests × 32K tokens (avg 16K attended): KV read per step = 10 × 16K × 40KB/token
    (INT8) = 6.4GB. At 3.35 TB/s: 1.9ms per decode step.'
