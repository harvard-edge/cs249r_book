schema_version: 1
id: cloud-fill-03010
title: Tail Latency SLO Decomposition Across Microservices
topic: tail-latency
status: published
provenance: imported
scenario: 'A multi-stage ML pipeline on H100 (80GB HBM3, 3.35TB/s) has 5 sequential microservices: preprocessing
  (P99=5ms), embedding (P99=12ms), retrieval (P99=8ms), reranking (P99=15ms), generation (P99=40ms). End-to-end
  P99 SLA is 100ms. The current end-to-end P99 is 160ms.'
details:
  realistic_solution: Model each stage as independent with its own latency distribution. For 5 independent
    stages, P(end-to-end > T) = 1 - Product(P(stage_i <= T_i)). Use correlated sampling to find the true
    end-to-end percentile. To hit P99 end-to-end, each stage must achieve approximately P99.8 (since 0.998^5
    ≈ 0.99). Tighten reranking and generation SLOs to P99.8.
  common_mistake: Assuming end-to-end P99 = sum of individual P99s. This is incorrect — percentiles don't
    add linearly. The actual end-to-end P99 is worse because multiple independent tail events can compound.
  napkin_math: '5 independent stages each at P99: probability all within budget = 0.99^5 = 0.951 → end-to-end
    is only P95.1, not P99. To achieve true P99 with 5 stages: each needs P(1 - 0.01/5) ≈ P99.8. Reranking:
    reduce P99.8 from ~30ms to 20ms. Generation: reduce P99.8 from ~80ms to 55ms on H100 — achievable
    with speculative decoding.'
