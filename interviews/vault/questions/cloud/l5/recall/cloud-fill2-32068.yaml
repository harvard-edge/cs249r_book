title: 'MoE on TPU: Pipelining All-to-All with ICI'
topic: mixture-of-experts
status: published
provenance: imported
scenario: Google's GShard trains MoE models on TPU v5e pods with 256 chips connected via ICI (Inter-Chip
  Interconnect). Each chip holds 2 experts (128 total). ICI provides ~1.6 TB/s bisection bandwidth per
  pod. Compare the All-to-All communication efficiency on TPU ICI vs a GPU cluster with InfiniBand (400
  Gbps per link, 8 links per switch = 3.2 Tbps). How does ICI's topology advantage benefit MoE?
details:
  realistic_solution: 4MB / 50 GB/s = 80 microseconds = 0.08ms (not 80ms — that is 1000× too slow, implying
    50 MB/s not 50 GB/s).
  common_mistake: Comparing per-link bandwidth. TPU ICI is a 3D torus directly connecting every chip to
    its neighbors, while InfiniBand uses a fat-tree through switches. The topological difference affects
    All-to-All latency significantly.
  napkin_math: 'Transfer time: 4MB at 50 GB/s = 4×10^-3 / 50 = 8×10^-5 s = 80 microseconds = 0.08ms (not
    80ms — 80ms would require 5 MB/s bandwidth or 4 GB data).'
