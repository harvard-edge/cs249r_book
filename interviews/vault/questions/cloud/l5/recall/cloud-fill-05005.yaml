schema_version: 1
id: cloud-fill-05005
title: Flash Attention Arithmetic Intensity Analysis on H100
topic: attention-scaling
status: published
provenance: imported
scenario: You're implementing FlashAttention-2 for a 70B LLM with 96 heads, head_dim=128, seq_len=8192.
  H100 has 80MB L2 cache and 50MB SRAM across all SMs. Standard attention would materialize a 96×8192×8192
  float16 attention matrix (12.8GB). Calculate the memory savings and bandwidth improvement from FlashAttention
  tiling.
details:
  realistic_solution: 'Standard attention HBM reads: Q+K+V = 3×96×8192×128×2 = 603MB. HBM writes: attention
    matrix = 96×8192×8192×2 = 12.8GB. Total standard = 603MB read + 12.8GB write + 12.8GB read (for softmax)
    + 603MB write (output) ≈ 26.8GB. FlashAttention: Q+K+V reads = 603MB, O write = 201MB. Total ≈ 804MB
    — 33× less HBM traffic. At 3.35 TB/s, standard attention memory time = 26.8GB/3.35TB/s = 8ms; FlashAttention
    = 804MB/3.35TB/s = 0.24ms.'
  common_mistake: Assuming FlashAttention eliminates all HBM reads/writes; it eliminates the attention
    matrix materialization but still reads Q, K, V once each.
  napkin_math: 'Standard: 12.8GB attn matrix × 2 (write+read) + 1.2GB QKV = ~26.8GB. FlashAttention: ~804MB.
    Speedup from bandwidth reduction alone: 26.8/0.804 = 33×. At 3.35 TB/s: 8ms → 0.24ms.'
