schema_version: 1
id: cloud-2296
title: High-Fanout Item Feature Retrieval
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Your recommendation serving system scores 1,000 candidate items per user request at 2,000 QPS.
  The end-to-end P99 latency is 320ms against a 150ms SLA. Profiling reveals: Candidate Generation takes
  20ms, User Feature Fetch takes 10ms, Item Feature Fetch takes 250ms, Cross-feature computation takes
  10ms, and Model Scoring takes 30ms. The 250ms item fetch is caused by 10 concurrent threads making 100
  sequential gRPC calls each to a Redis-backed feature store. Network RTT is 0.5ms.'
details:
  realistic_solution: 'The 250ms bottleneck is dominated by network RTT overhead due to an N+1 query anti-pattern
    in feature retrieval. We decompose the latency: 100 sequential calls per thread * (0.5ms RTT + 2.0ms
    DB processing) = 250ms. Optimization 1: Implement batched retrievals (MGET). Group the 1,000 item
    IDs into 5 parallel batches of 200 items. Optimization 2: Introduce an in-memory L1 cache (e.g., Caffeine)
    on the serving nodes for item features, as item features typically mutate slowly compared to user
    features. With an 80% cache hit rate, we only need to fetch 200 items over the network per request,
    further reducing network bandwidth and Redis CPU load.'
  common_mistake: Reducing the candidate pool from 1,000 to 200 to cut down fetch times, which severely
    degrades recommendation quality.
  napkin_math: 'Current Item Fetch: 100 sequential calls * 2.5ms = 250ms. Optimized Fetch with MGET: 1,000
    items split into 5 parallel gRPC calls. Network RTT (0.5ms) + Redis MGET processing for 200 keys (~4.5ms)
    = 5ms total latency. With 80% L1 cache hit rate, we only fetch 200 keys total, reducing Redis load
    and dropping fetch latency to ~2ms. New End-to-End P99: 20ms (Gen) + 10ms (User) + 5ms (Item Fetch)
    + 10ms (Cross) + 30ms (Model) = 75ms. This represents a 76% reduction in latency.'
