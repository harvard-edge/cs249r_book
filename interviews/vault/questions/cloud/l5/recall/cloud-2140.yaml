schema_version: 1
id: cloud-2140
title: The GPU Preprocessing Offload
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your training pipeline for a large recommendation model spends 60% of step time on CPU-based
  feature preprocessing (hashing, bucketing, normalization of 500 features) and only 40% on GPU forward/backward
  passes. The GPUs are idle 60% of the time. Adding more CPU workers doesn't help because the preprocessing
  is already distributed across 32 CPU cores. Design a system that moves feature preprocessing to the
  GPU and estimate the speedup.
details:
  realistic_solution: 'Classify preprocessing operations by GPU-friendliness: **GPU-native (80% of ops):**
    Numeric normalization (z-score, min-max), bucketing (searchsorted), embedding lookups (already on
    GPU), log transforms, polynomial features. These are embarrassingly parallel. **CPU-better (20% of
    ops):** String hashing (MurmurHash — can be GPU-ported but complex), regex feature extraction, JSON
    parsing, variable-length list features. **Architecture:** Use NVIDIA DALI or NVTabular to build a
    GPU-native preprocessing pipeline. Preprocessing and model forward pass share the same GPU memory,
    eliminating CPU→GPU data transfer for preprocessed features. Estimated speedup: if 80% of preprocessing
    moves to GPU and runs 50× faster (1000 features × batch of 65K = 65M operations, trivially parallel),
    effective preprocessing time drops from 60% to ~5% of step time. New bottleneck shifts to GPU compute
    at ~95% utilization.'
  common_mistake: Assuming all CPU preprocessing can trivially move to GPU. Operations like string hashing
    and dictionary lookups are not naturally parallel and may not benefit from GPU execution.
  napkin_math: 'Current: CPU preprocessing = 60ms, GPU compute = 40ms, step = 100ms. GPU preprocessing:
    80% of ops at 50× speedup = 60ms * 0.8 / 50 = 0.96ms. Remaining CPU ops: 60ms * 0.2 = 12ms (overlapped
    with GPU). New step time: ~max(12, 40+1) = 41ms. Speedup: 100/41 = 2.4x. GPU utilization: 40/41 =
    97%.'
