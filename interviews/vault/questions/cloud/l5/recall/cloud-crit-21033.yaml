schema_version: 1
id: cloud-crit-21033
title: Prefix Caching for Shared System Prompts
topic: kv-cache-management
status: published
provenance: imported
scenario: Your LLM serving platform handles 10,000 requests/min. 80% of requests share the same 2048-token
  system prompt. Each request's unique user prompt is 256 tokens. You are using Llama 3 70B with GQA (8
  KV heads, 80 layers). Calculate the memory savings from prefix caching the shared system prompt.
details:
  realistic_solution: 'Without prefix caching: Each request computes KV-cache for 2048 + 256 = 2304 tokens
    from scratch. KV per request: 2304 × 320 KB = 737 MB. For 100 concurrent requests: 73.7 GB. With prefix
    caching: Compute and store the 2048-token system prompt KV-cache once: 2048 × 320 KB = 655 MB (shared,
    read-only). Each request only computes KV for its 256 unique tokens: 256 × 320 KB = 82 MB, plus a
    reference to the shared prefix. For 100 concurrent: 655 MB (shared) + 100 × 82 MB = 8.85 GB. Memory
    savings: 73.7 - 8.85 = 64.85 GB (88% reduction). Latency improvement: Prefill of 2048 tokens on H100
    for 70B model takes ~200ms. With prefix caching: prefill only 256 tokens = ~25ms. TTFT reduction:
    175ms (8× faster for the prefill-dominated portion). Implementation: store shared prefix KV blocks
    in a content-addressed cache keyed by hash of the prefix token IDs. Reference-counted so blocks are
    freed when no active request uses them.'
  common_mistake: Only counting per-request memory savings without considering the TTFT (time-to-first-token)
    improvement. Prefix caching eliminates redundant prefill computation for the shared prefix, dramatically
    reducing latency.
  napkin_math: 'Shared prefix: 2048 × 320 KB = 655 MB (stored once). Per-request unique: 256 × 320 KB
    = 82 MB. 100 requests: 655 MB + 100 × 82 MB = 8.85 GB vs 100 × 737 MB = 73.7 GB. Savings: 88%. TTFT:
    25ms vs 200ms (8× faster prefill).'
