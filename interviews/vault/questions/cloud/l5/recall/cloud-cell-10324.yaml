schema_version: 1
id: cloud-cell-10324
title: 'Optimization: Reducing Stranded Power Through Dynamic GPU Power Capping'
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A 128-GPU A100 cluster (400 W TDP each) is constrained to 45 kW total IT power by the datacenter
  PDU. At full load (128 × 400 W = 51.2 kW), it exceeds budget. Currently, only 112 GPUs are powered on,
  leaving 16 GPUs stranded. Design a dynamic power capping strategy that enables all 128 GPUs to be powered
  and maximizes aggregate training throughput within the 45 kW budget.
details:
  realistic_solution: 'Implement heterogeneous power caps using GPU workload classification: (1) Profile
    each running job''s compute vs. memory boundedness using `nvml.nvmlDeviceGetUtilizationRates()` —
    jobs with memory utilization > compute utilization are memory-bound and tolerate deeper power caps.
    (2) Assign deeper caps (300 W) to memory-bound inference pods and lighter caps (380 W) to compute-bound
    training pods. (3) Implement a power budget controller (runs every 10 s) that reads current power
    draw from NVML and adjusts per-GPU caps to maintain total ≤ 45 kW. (4) Use NVML `nvmlDeviceSetPowerManagementLimit()`
    per device. This enables all 128 GPUs while respecting budget.'
  common_mistake: 'Applying a uniform power cap to all GPUs: 45,000 W / 128 = 351.6 W per GPU. This uniformly
    reduces all GPU clocks, but training jobs don''t all have the same sensitivity to power reduction
    — memory-bound operations (attention with large sequences) degrade less under capping than compute-bound
    operations (dense matrix multiplications).'
  napkin_math: 'Strategy: 64 training GPUs at 380 W = 24,320 W; 64 inference GPUs at 320 W = 20,480 W;
    total = 44,800 W < 45,000 W budget. Previously: 112 GPUs × 400 W = 44,800 W. New: 128 GPUs × avg 350
    W = same power, 14% more GPUs active. Training throughput: 64 × 312 TFLOPS × (380/400) = 18,969.6
    TFLOPS vs. prior 112 × 312 × 1 = 34,944 TFLOPS — training FLOPS actually decreased but more jobs can
    co-run. Optimize cap split based on job mix to maximize total system throughput.'
