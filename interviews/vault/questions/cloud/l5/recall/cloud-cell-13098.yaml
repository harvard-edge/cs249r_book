id: cloud-cell-13098
title: 'TCO Optimization: Training Efficiency vs Infrastructure Cost'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: A 30B parameter model is being trained on H100 (700W, $2.50/hr). Current MFU is 35%. The team
  is considering investing 2 engineer-months ($60K) to optimize the training stack and reach 55% MFU.
  Calculate the break-even training budget that justifies the engineering investment, and the ongoing
  savings for future training runs.
details:
  realistic_solution: 'H100 ridge point: 989/3350 = 295 FLOPs/byte. Decode becomes compute-bound when
    batch×seq exceeds 295.'
  common_mistake: Not recognizing that MFU improvement reduces total GPU-hours proportionally, and thus
    the dollar savings depend on total training budget, not just the hourly rate.
  napkin_math: 'H100 at 989 TFLOPS FP16 (not 1979). Batch size to hit compute bound: need AI > ridge_point
    = 989T/3.35TB = 295 FLOPs/byte. For decode: AI = batch_size × seq_len. Compute-bound when batch ×
    seq > 295.'
