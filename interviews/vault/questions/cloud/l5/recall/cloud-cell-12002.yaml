schema_version: 1
id: cloud-cell-12002
title: 'Latency Decomposition: Full-Stack E2E Latency Budget for LLM API on H100 Cluster'
topic: latency-decomposition
status: published
provenance: imported
scenario: You own latency SLA for a production LLM API backed by H100 (80GB HBM3, 3.35TB/s, 700W) nodes.
  The SLA is P99 < 2 seconds for a 512-token prompt generating 128 tokens. Break down all latency components
  — network, queue, prefill, decode, detokenization — assign budgets, identify the dominant term, and
  propose a concrete optimization if the SLA is being missed.
details:
  realistic_solution: 'Budget: network ingress 5ms, tokenization 1ms, queue wait P99 50ms, prefill (512
    tokens, 70B model) ≈ 512×2×70B×2/989TFLOPS ≈ 144ms, decode (128 tokens × 20ms/token) ≈ 2560ms — this
    alone blows the SLA. Fix: reduce model size to 13B (decode ≈ 4ms/token → 512ms total), or enable speculative
    decoding to cut decode latency 2–3×.'
  common_mistake: Candidates account only for model compute and ignore network RTT (50–100ms for cross-AZ),
    queue wait under load, and tokenization overhead.
  napkin_math: '70B model decode: 140GB weights / 3.35TB/s ≈ 41.8ms/token × 128 = 5.3s. 13B model: 26GB
    / 3.35TB/s ≈ 7.8ms/token × 128 = 998ms. With speculative decoding (3× speedup): ~333ms decode. Prefill
    13B at 512T: 512×2×13B×2 FLOPs = 26.6T FLOPs / 989TFLOPS ≈ 27ms. Total ≈ 416ms << 2s SLA.'
