id: cloud-r2-41009
title: 'TP Bubble: Synchronization Overhead in Practice'
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: Your TP=8 training job on H100 nodes shows 72% MFU (Model FLOP Utilization). Profiling reveals
  that AllReduce operations account for 15% of step time. Propose two concrete strategies to reduce TP
  communication overhead without changing the TP degree.
details:
  realistic_solution: 'Strategy 1: Overlap communication with computation using CUDA streams. While AllReduce
    runs for one sub-layer (e.g., attention output), the independent Dropout/LayerNorm of the next sub-layer
    can execute concurrently. Megatron-LM''s async TP does this, recovering 5-8% of the communication
    overhead. Strategy 2: Use FP8 for TP communication (available on H100 Transformer Engine). AllReduce
    message size drops by 2× vs BF16, halving communication time. The slight precision loss in the collective
    is acceptable because LayerNorm immediately follows, restoring numerical stability. Combined effect:
    15% overhead → ~6-7% overhead, pushing MFU from 72% to ~78-80%. Additional option: switch from ring
    AllReduce to tree AllReduce on NVSwitch-connected H100s, reducing latency from O(P) to O(log P) steps.'
  common_mistake: Suggesting to simply reduce TP degree without considering that the model may not fit
    in memory with fewer GPUs. Also suggesting async AllReduce without understanding that TP AllReduces
    are on the critical path — next layer depends on the result.
  napkin_math: 'Current comm time: 15% of step. FP8 comms: halve message size → ~7.5%. Overlap: recover
    ~3%. Net: ~4.5-6%. MFU improvement: 72% × (1 + 0.09) ≈ 78%.'
