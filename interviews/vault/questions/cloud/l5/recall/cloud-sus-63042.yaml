schema_version: 1
id: cloud-sus-63042
title: 'MI300X vs A100: VRAM Capacity Advantage for Long-Context Serving'
topic: vram-budgeting
status: published
provenance: imported
scenario: 'A legal AI application requires serving a 13B model with 128K context length. KV cache per
  token per layer: 2 × num_heads × head_dim × 2 bytes = 2 × 40 × 128 × 2 = 20.5KB per token. Calculate
  the KV cache size for a single 128K context request. Determine how many concurrent 128K requests an
  A100 80GB, H100 80GB, and MI300X 192GB can serve simultaneously (all hosting the same 13B model in FP16).'
details:
  realistic_solution: 'Per-token KV cache (all 40 layers): 40 layers × 20.5KB = 820KB per token. For 128K
    context: 820KB × 128,000 tokens = 105GB per request. Weight memory: 13B × 2 bytes = 26GB. Available
    KV cache memory: A100 (80GB): 80 - 26 = 54GB. Requests: floor(54GB / 105GB) = 0 — cannot serve a single
    128K request. H100 (80GB): same, 0 requests. MI300X (192GB): 192 - 26 = 166GB. floor(166 / 105) =
    1 request (with 61GB remaining). For 2 concurrent 128K requests: need 26 + 2×105 = 236GB — requires
    2× MI300X (TP=2 not needed for weight, but needed for KV cache). MI300X is the only single-card option
    that can serve 128K context at all — and even then, only 1 request at a time. This is a case where
    H100 and A100 are architecturally unsuitable regardless of compute performance.'
  common_mistake: Computing KV cache only for a single layer instead of all layers. The full KV cache
    memory = per_token_per_layer × num_layers × context_length. For a 40-layer model, this multiplies
    the per-layer figure by 40.
  napkin_math: 'KV per token all layers: 2 × 40 heads × 128 dim × 40 layers × 2 bytes (FP16) = 2×40×128×40×2
    = 819,200 bytes = 800KB/token. 128K tokens: 800KB × 128K = 102.4GB per request. Weights: 26GB. A100/H100
    (80GB): 80-26=54GB available < 102.4GB needed. Cannot serve. MI300X (192GB): 192-26=166GB. 1 request
    uses 102.4GB → 63.6GB left. 2nd request needs 102.4 > 63.6 → cannot fit 2. MI300X: 1 concurrent 128K
    request. Contrast: at 4K context: 800KB × 4K = 3.2GB per request. A100: (54GB / 3.2GB) = 16 concurrent.
    H100: 16. MI300X: 51 concurrent. MI300X advantage scales with context length.'
