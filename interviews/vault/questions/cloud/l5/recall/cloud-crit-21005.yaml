schema_version: 1
id: cloud-crit-21005
title: MoE Expert Replication for Hot Experts
topic: mixture-of-experts
status: published
provenance: imported
scenario: Your production MoE serving cluster shows P99 latency spikes of 45ms against a 30ms SLA. Profiling
  reveals that 2 of 8 experts receive 40% of all tokens while the remaining 6 share 60%. The overloaded
  expert GPUs are the bottleneck. Propose and quantify an optimization strategy.
details:
  realistic_solution: 'Replicate the 2 hot experts across additional GPUs. Currently: 8 GPUs with 1 expert
    each. Hot experts get 20% each (2.5× average load). Solution: replicate each hot expert onto 2 additional
    GPUs, total 12 GPUs. Each hot expert replica serves ~13.3% of tokens (40%/3 copies). Load per GPU
    drops from 20% to 13.3%, below the 12.5% uniform average. Cost: 4 extra GPUs (50% more hardware).
    Alternative: use expert parallelism to split hot experts across 2 GPUs each (EP=2 per hot expert),
    halving their compute time. This adds NVLink communication but avoids full GPU replication. DeepSeek-V3
    uses dynamic expert replication in their serving infrastructure for exactly this reason.'
  common_mistake: Trying to fix routing at serving time by adding noise. Inference routing must be deterministic
    — you cannot change which experts a token selects without degrading quality.
  napkin_math: 'Current hot expert load: 40%/2 = 20% per hot GPU vs 10% per cold GPU. 2× imbalance → ~2×
    latency for hot experts. Replicating to 3 copies: 40%/6 = 6.7% per replica. Total GPUs: 8 + 4 = 12.
    Cost increase: 50%. Latency improvement: ~2×.'
