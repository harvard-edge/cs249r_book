id: cloud-cell-13023
title: 'Queueing Theory Optimization: Reduce P99 by 3x Without Adding Hardware'
topic: queueing-theory
status: published
provenance: imported
scenario: An H100 inference cluster shows P99=6s at ρ=0.85 utilization (M/M/1 model, μ=20 req/s, λ=17
  req/s). The SLO is P99<2s and no additional hardware budget is available. Identify three operational
  changes (scheduling, batching, model optimization) and quantify the P99 improvement from each.
details:
  realistic_solution: '1) Request admission control at ρ=0.65: reduce λ to 0.65*20=13, Wq=0.65/(20*0.35)=92ms,
    P99=4.6*(92+50)=654ms. Achieves SLO but drops 24% throughput. 2) Priority queue for short requests:
    separate short (< 100 tok, service 30ms) and long (>500 tok, service 200ms). Short-request P99 drops
    from 6s to ~0.5s. 3) Continuous batching: increases μ to 40 req/s at same λ=17. ρ drops to 0.425,
    Wq=0.425/(40*0.575)=18ms, P99=4.6*43ms=198ms. Best option: continuous batching.'
  common_mistake: Proposing only one change and not quantifying each contribution, or proposing changes
    that require hardware (more GPUs) when the constraint says no new hardware.
  napkin_math: 'Baseline: ρ=0.85, μ=20, Wq=0.85/(20*0.15)=283ms, W=333ms, P99=4.6*333=1.53s. Wait, P99=6s
    implies W≈1.3s, so ρ must be higher. Recalculate: W=6/4.6=1.3s, Wq=1.25s, Wq=ρ/(μ(1-ρ))=1.25 → ρ/(20(1-ρ))=1.25
    → ρ=25(1-ρ) → ρ=25/26=0.962. More accurate ρ=0.96. Continuous batching doubles μ to 40: ρ=17/40=0.425,
    Wq=18ms, P99=4.6*43=198ms. 30x improvement.'
