id: cloud-0998
title: Evaluating Upgrades for High-Intensity GEMMs
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: You are serving a dense Matrix Multiplication (GEMM) workload on NVIDIA A100 GPUs (40GB, 1.5
  TB/s HBM2, 312 TFLOPs FP16). Profiling reveals an arithmetic intensity of 300 FLOPs/byte, and the pipeline
  is missing its 50ms latency SLA. Engineer A proposes migrating to A100 80GB (2.0 TB/s HBM2e) to increase
  memory bandwidth. Engineer B proposes implementing structured 2:4 sparsity to double the math throughput.
  Evaluate which proposal correctly addresses the bottleneck and calculate the expected theoretical speedup.
details:
  realistic_solution: Reject Engineer A's proposal. The workload is compute-bound, so increasing memory
    bandwidth yields 0% speedup. Accept Engineer B's proposal, but note the speedup will be ~1.44x, not
    2x, because doubling compute shifts the workload into the memory-bound regime.
  common_mistake: Assuming memory bandwidth upgrades will universally improve performance without checking
    the hardware ridge point, or incorrectly calculating the new speedup under sparsity by assuming a
    full 2x gain without realizing the workload hits the memory wall.
  napkin_math: 'A100 40GB Ridge Point = 312 TFLOPs / 1.5 TB/s = 208 FLOPs/byte. Workload AI = 300 > 208
    (Compute-Bound). Eng A: Compute remains 312 TFLOPs (0% speedup). Eng B (Sparsity): Peak math becomes
    624 TFLOPs. New Ridge Point = 624 / 1.5 = 416 FLOPs/byte. Since 300 < 416, it is now memory-bound.
    Max speedup = (FLOPs/312) / (Bytes/1.5) = (300/312) * 1.5 = 1.44x.'
