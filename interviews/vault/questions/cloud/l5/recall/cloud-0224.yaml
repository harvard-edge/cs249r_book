schema_version: 1
id: cloud-0224
title: The Continuous Batching Starvation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You implement Continuous Batching (iteration-level scheduling) for your LLM server. It successfully
  groups users together to maximize GPU utilization. However, you notice that users asking for very short,
  10-token answers are experiencing incredibly long wait times, even though their requests require very
  little compute. How did your batching algorithm starve the easy requests?
details:
  realistic_solution: 'Continuous batching with FCFS scheduling causes head-of-line blocking. When 32
    users each request 2,000 tokens, the batch is full for 32 x 2000 x 20ms/token = 40 seconds. User 33,
    needing only 10 tokens (0.2s of work), must wait 40 seconds because no slot opens until an existing
    request finishes. The fix is preemptive scheduling: prioritize short requests or implement shortest-job-first
    policies. Without this, your P99 latency is dominated by the longest request in the batch, not the
    work your user actually needs.'
  common_mistake: '"The GPU prioritizes larger matrix math." The GPU doesn''t prioritize anything; the
    software scheduler does.'
  napkin_math: 32 users request 2,000 tokens at 20ms/token = 40 seconds to finish. User 33 requests 10
    tokens (0.2 seconds of work). User 33 waits 40 seconds to get 0.2 seconds of compute. This ruins P99
    latency metrics.
