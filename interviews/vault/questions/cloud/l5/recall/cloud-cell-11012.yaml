id: cloud-cell-11012
title: 'Dataset Curation: Optimize Deduplication Pipeline Scalability'
topic: dataset-curation
status: published
provenance: imported
scenario: Your MinHash deduplication pipeline takes 72 hours for 5T tokens on a 32-node CPU cluster. Training
  starts in 48 hours. Identify the bottleneck and propose an optimized pipeline that completes in under
  24 hours without sacrificing dedup quality.
details:
  realistic_solution: 'Profile: MinHash signature generation is CPU-bound (parallelizable). LSH bucketing
    is memory-bound. Candidate pair comparison is the bottleneck: O(n²) worst case. Fix: use banding with
    b=20 bands, r=5 rows. Reduce false negative rate analysis. Shard by domain to avoid cross-shard comparison.
    Use Spark with hash partitioning.'
  common_mistake: Simply adding more nodes without understanding whether the bottleneck is compute, memory,
    or all-to-all communication in the Jaccard similarity computation.
  napkin_math: '5TB / 4 bytes/token = 1.25T tokens. At 100 tokens/document avg = 12.5B documents. MinHash
    generation: 32 nodes × 32 cores × 100K docs/sec = 102.4M docs/sec. Time = 12.5B / 102.4M = 122 seconds.
    Bottleneck is LSH candidate pairs: with 20 bands, ~0.1% false positive rate → 12.5B × 0.001 = 12.5M
    pairs to compare. At 1M pairs/sec per node × 32 nodes = 32M pairs/sec → 0.4 seconds. Real bottleneck
    is shuffle/sort across nodes: 12.5B × 200 bytes/sig = 2.5TB shuffle. At 100Gbps network = 200 seconds.
    Optimize: pre-filter by domain (10 domains) → 10× less cross-domain shuffle → 20 seconds. Total <
    24 hours achievable.'
