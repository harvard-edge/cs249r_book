id: cloud-cell-11014
title: 'Dataset Curation: Realize Multi-Modal Dataset Storage and Access Architecture'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You are building the data infrastructure for training a 20B vision-language model on 128 H100s.
  The dataset contains 1B image-text pairs: images average 200KB (JPEG), text average 500 bytes. Realize
  the storage architecture, indexing strategy, and DataLoader design to sustain training throughput.'
details:
  realistic_solution: 'Pre-process: resize images to 224×224, store as uint8 tensors in WebDataset tar
    shards. Each shard = 10K samples. Pre-compute image features if using frozen vision encoder. Use DALI
    for GPU-accelerated decoding if needed.'
  common_mistake: Storing raw JPEGs and decoding on-the-fly without pre-resizing; not accounting for decoder
    CPU overhead eating into DataLoader capacity.
  napkin_math: '1B images × 200KB = 200TB raw. Pre-process to 224×224×3 uint8 = 150KB/image. 1B × 150KB
    = 150TB processed. WebDataset: 10K samples/shard = 1.5GB/shard → 100K shards. Training throughput:
    128 H100s, batch=512, time/batch=0.5sec → 1024 samples/sec. Data rate: 1024 × (150KB + 500B) = 153MB/sec.
    Need distributed storage delivering 153MB/s read. S3/GCS can do this easily. DataLoader: 16 workers
    × 8 node = 128 workers decoding 1024 samples/sec = 8 samples/worker/sec. CPU decode at 50 img/sec/core
    → 0.16 cores/worker needed. Very manageable.'
