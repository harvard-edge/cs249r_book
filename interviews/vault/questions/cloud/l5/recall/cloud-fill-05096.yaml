schema_version: 1
id: cloud-fill-05096
title: Activation Checkpointing Granularity Trade-off for 405B Model Training on H100
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Training Llama-3-405B on 512 H100s. Without activation checkpointing, peak activation memory
  per GPU exceeds 80GB. With full checkpointing (checkpoint every layer), recomputation overhead is 33%.
  With selective checkpointing (checkpoint only attention, not MLP), recomputation is 15%. Analyze the
  memory-compute trade-off.
details:
  realistic_solution: 'Full checkpointing: save only layer inputs, recompute all activations in backward.
    Saves: all intermediate activations per layer (~4GB × 128 layers / 512 GPUs = 1GB). Cost: 33% more
    FLOPs. Selective checkpointing (checkpoint only attention): attention activations are large (seq²×heads)
    and expensive to recompute. MLP activations are small and cheap. Strategy: checkpoint attention (save
    softmax output), don''t checkpoint MLP. Memory savings: attention activations: 32 heads × 8192² ×
    2B = 4GB per layer → with checkpointing saves 4GB per layer. MLP activations: 8192×32768×2B = 536MB
    per layer — recompute. Per GPU: 128 layers / 512 GPUs = 0.25 layers, but activation memory scales
    with batch. Selective saves attention activation (60% of savings) at 15% recomputation cost vs full
    checkpointing 100% savings at 33% cost. Efficiency: 0.6/0.15 vs 1.0/0.33 = 4 vs 3. Selective is 33%
    more compute-efficient per memory saved.'
  common_mistake: Applying uniform full checkpointing without recognizing that MLP activations are cheaper
    to recompute (simple matrix multiplications) while attention activations are expensive to recompute
    (O(n²) softmax).
  napkin_math: 'Full checkpoint: 33% FLOPs overhead, saves 100% intermediate activations. Selective (attention
    only): 15% FLOPs overhead, saves ~60% of activation memory. Efficiency ratio: selective = 60%/15%
    = 4.0 memory/compute; full = 100%/33% = 3.0. Selective is 33% more efficient. Use selective checkpointing.'
