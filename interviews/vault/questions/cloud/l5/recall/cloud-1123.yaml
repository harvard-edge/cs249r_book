title: Multi-Core Power Trade-offs Post-Dennard Scaling
topic: power-budgeting
status: published
provenance: imported
scenario: 'You are evaluating next-generation cloud compute infrastructure for massive ML workloads. The
  CPU vendor offers two options for the same TDP (300W): Option A features 32 cores running at 4.0 GHz,
  while Option B features 128 cores running at 2.0 GHz. Assuming power roughly scales with the cube of
  frequency (P ∝ f³) in this voltage regime, evaluate the theoretical throughput and power trade-offs.
  Justify why modern cloud infrastructure overwhelmingly favors architectures like Option B for parallel
  ML tasks such as embedding lookups.'
details:
  realistic_solution: Option B is vastly superior for parallelizable workloads. Because power scales as
    the cube of frequency (P ∝ f³), halving the frequency reduces power per core by a factor of 8. This
    massive power savings allows packing 4x as many cores into the same 300W TDP, yielding 2x the theoretical
    aggregate throughput (128 × 2.0 GHz vs 32 × 4.0 GHz) for parallel tasks.
  common_mistake: Candidates often assume single-core performance scales linearly with power, failing
    to recognize the cubic relationship between power and frequency, leading them to incorrectly favor
    the high-frequency option for overall throughput.
  napkin_math: 'P ∝ f³. Let Option A core f = 4.0, power ∝ 4³ = 64. Option B core f = 2.0, power ∝ 2³
    = 8. Power ratio = 8x. Option B has 4x cores at 1/8th the power per core, using only half the total
    power of A''s cores (or allowing even more cores). Aggregate throughput = Cores × f. Option A: 32
    × 4.0 = 128 GHz-cores. Option B: 128 × 2.0 = 256 GHz-cores (2x throughput).'
