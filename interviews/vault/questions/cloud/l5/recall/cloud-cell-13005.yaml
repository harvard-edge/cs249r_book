schema_version: 1
id: cloud-cell-13005
title: 'Pipeline Parallelism Optimization: Load Balancing Stages'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: 'A 96-layer transformer is split into 4 pipeline stages on H100 GPUs (80GB HBM3). Profiling
  shows stage 1 takes 45ms per micro-batch, stages 2-3 take 38ms each, and stage 4 (with the language
  model head: vocab size 128K) takes 62ms. The pipeline throughput is bounded by stage 4. Quantify the
  throughput loss and propose a fix.'
details:
  realistic_solution: H100 FP16 TFLOPS is 989 (not 1979). 989 TFLOPS is the correct specification for
    H100 SXM5 dense FP16 performance.
  common_mistake: Simply moving layers between stages without accounting for the LM head's unique compute
    profile (large embedding matmul scales with vocab size, not layer count).
  napkin_math: 'H100 SXM5: 989 TFLOPS FP16 (not 1979 TFLOPS). At 40% MFU: 395.6 TFLOPS effective. 70B
    model decode: 140GB / 3.35 TB/s = 41.8ms/token memory-bound. Prefill 2K tokens: 2×2048×70B / 989T
    = 290ms. Batch=8 decode: amortized weight load = 41.8ms (same weights) → 8 tokens in 41.8ms = 5.2ms/token.'
last_modified: '2026-04-01'
