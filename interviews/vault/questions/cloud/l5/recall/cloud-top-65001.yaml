id: cloud-top-65001
title: MI300X NUMA-Aware Tensor Parallel Rank Placement
topic: chiplet-architecture
status: published
provenance: imported
scenario: A team running TP=8 on MI300X sees 18% higher all-reduce latency than expected from peak Infinity
  Fabric bandwidth. ROCm NUMA topology shows ranks are spread across all 8 XCDs. How do you fix the rank
  placement?
details:
  realistic_solution: 'Use ROCR_VISIBLE_DEVICES and numactl to pin TP ranks to XCDs sharing the same Infinity
    Fabric sub-ring. On MI300X, XCDs are organized in pairs sharing a fabric sub-domain. For TP=8 spanning
    all 8 XCDs, use hierarchical all-reduce: reduce within each 4-XCD group first, then across groups.
    Set HSA_OVERRIDE_GFX_VERSION for kernel compatibility and NUMA_BALANCING=0 to prevent OS page migration
    during training.'
  common_mistake: Assuming ROCm assigns TP ranks to XCDs in a NUMA-optimal order by default. By default,
    rank 0-7 may be assigned round-robin or in hardware enumeration order, which does not minimize fabric
    hops for the all-reduce communication pattern.
  napkin_math: 'MI300X Infinity Fabric: 896 GB/s aggregate. Single-hop XCD pair latency ~200ns, cross-group
    hop adds ~150ns. For 1GB all-reduce across 8 ranks: ring all-reduce = 2*(N-1)/N * message = 1.75 GB
    transferred. At 896 GB/s, ideal = 1.95ms. With NUMA penalty: +18% = 2.3ms. Fixing placement recovers
    ~280us per all-reduce.'
