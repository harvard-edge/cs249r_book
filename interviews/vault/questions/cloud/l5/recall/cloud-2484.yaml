schema_version: 1
id: cloud-2484
title: Dynamic Edge-Cloud Serving Threshold
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A visual search app uses a 5MB local edge model (20ms latency, 85% accuracy) and a 2GB cloud-based
  ViT-L model (250ms latency including network, 99% accuracy). System throughput is 1000 QPS. Cloud API
  costs $0.01 per 10 requests. You need to achieve an overall P95 latency of <100ms and >95% accuracy
  while minimizing cloud spend.
details:
  realistic_solution: 'Implement a dynamic cascading confidence threshold. The edge device runs the lightweight
    model first and extracts a confidence score (e.g., max softmax probability or entropy). If the confidence
    exceeds a tuned threshold, the device returns the local prediction immediately. If it falls below
    the threshold, the query is routed to the cloud. The critical constraint: to meet the P95 < 100ms
    SLA, the cloud routing rate must stay at or below 5%, since any cloud-routed request exceeds 100ms.
    This means the confidence threshold must be set to reject only the bottom ~5% of predictions. The
    co-design challenge is calibrating the edge model''s uncertainty estimates so that the 5% routed to
    the cloud captures the most error-prone queries, maximizing the accuracy uplift per cloud dollar spent.'
  common_mistake: Running both models concurrently (shadowing) and waiting for the cloud response, which
    violates the latency SLA and maximizes cloud costs.
  napkin_math: '1000 QPS = 86.4M req/day. Cloud-only cost = 86,400/day. To meet P95 < 100ms, at most 5%
    of requests can be routed to the cloud (since cloud latency = 270ms > 100ms). At 5% cloud routing:
    cloud traffic = 50 QPS, cost = 4,320/day (saving $82,080/day). Average latency = 0.95 × 20ms + 0.05
    × 270ms = 19 + 13.5 = 32.5ms. P95 = 20ms (since only 5% go to cloud, the 95th percentile still hits
    the local path). For accuracy: the edge model at 85% overall can achieve ~96% accuracy on its top-95%
    most confident predictions (confidence-based routing selects the hardest 5% for the cloud). Overall
    accuracy = 0.95 × 96% + 0.05 × 99% = 91.2% + 5.0% = 96.1%, meeting the >95% target.'
