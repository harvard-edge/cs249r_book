id: cloud-1208
title: Evaluating Edge vs Centralized Processing for Telemetry Data
topic: energy-per-operation
status: published
provenance: imported
scenario: Your team needs to train a model on 5 PB of raw telemetry data generated across 50 regional
  data centers. The current proposal is to transfer all 5 PB to a central cloud region (us-east-1) to
  leverage an H100 cluster, taking advantage of the centralized data center's low Power Usage Effectiveness
  (PUE = 1.1). As a Staff ML Engineer, evaluate this architecture against a federated approach where A100
  nodes at each regional center compute gradients locally and only transmit model updates.
details:
  realistic_solution: Justify the federated approach using the Energy-Movement Invariant. The energy required
    to move 5 PB over the internet drastically outweighs any PUE efficiency gains from centralized compute.
    Recommend moving the compute to the data (federated training) and only transferring the relatively
    tiny gradient updates.
  common_mistake: Assuming that the centralized cloud approach is more energy-efficient and cost-effective
    due to economies of scale and better data center PUE, entirely ignoring the massive energy overhead
    of moving petabytes of data across the Wide Area Network (WAN).
  napkin_math: WAN transfer energy is ~0.01 kWh/GB. Moving 5 PB (5,000,000 GB) costs ~50,000 kWh. Training
    on 5 PB might take 10,000 H100 GPU hours (~700W TDP = 7,000 kWh). The data movement consumes 7x more
    energy than the actual compute, proving the invariant.
