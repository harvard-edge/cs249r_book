schema_version: 1
id: cloud-r2-41016
title: TP + DP Hybrid Parallelism Layout
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: 'You have 32 H100 GPUs across 4 nodes (8 GPUs per node). You want to train a 70B model with
  TP=8 and DP=4. Draw the process group layout: which GPUs form TP groups, which form DP groups, and where
  does each type of communication occur?'
details:
  realistic_solution: 'Layout: Node 0: GPUs [0-7] = TP group 0 (data-parallel rank 0). Node 1: GPUs [8-15]
    = TP group 1 (DP rank 1). Node 2: GPUs [16-23] = TP group 2 (DP rank 2). Node 3: GPUs [24-31] = TP
    group 3 (DP rank 3). TP communication (AllReduce per layer): happens within each node over NVLink
    (900 GB/s per GPU). DP communication (gradient AllReduce): GPU 0 communicates with GPUs 8, 16, 24;
    GPU 1 with GPUs 9, 17, 25; etc. This crosses nodes over InfiniBand (400 Gbps per node). DP gradient
    AllReduce happens once per training step, sending each GPU''s local gradient shard. With TP=8, each
    GPU holds 1/8 of the model, so DP AllReduce message size = total_params/8 × 2B = 70B/8 × 2 = 17.5
    GB. At 50 GB/s effective InfiniBand: 17.5 GB × 2 × (3/4) / 50 = 525 ms without overlap. With gradient
    bucketing and compute overlap, this is hidden behind the backward pass.'
  common_mistake: Placing TP groups across nodes. TP groups must be intra-node (using NVLink) because
    TP requires frequent synchronization. DP groups span across nodes (using InfiniBand) because gradient
    AllReduce is infrequent (once per step).
  napkin_math: 'TP groups: 4 groups of 8 (intra-node). DP groups: 8 groups of 4 (inter-node). DP AllReduce:
    17.5 GB × 2 × 0.75 / 50 GB/s = 525 ms (overlapped with backward).'
