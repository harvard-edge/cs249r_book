schema_version: 1
id: cloud-fill-05039
title: Structured Pruning 50% of MLP Layers in 70B LLM — MI300X Impact
topic: pruning-sparsity
status: published
provenance: imported
scenario: A team applies structured pruning to a 70B LLM (80 layers, MLP intermediate_size=28,672 per
  layer) targeting 30% weight reduction. They prune 30% of neurons from each MLP layer on MI300X (192GB
  HBM3, 5.3 TB/s). Calculate the parameter reduction, memory savings, and expected throughput improvement
  for decode-phase inference.
details:
  realistic_solution: 'Original MLP per layer: 2 × d_model × intermediate = 2 × 8192 × 28672 = 469M params.
    80 layers: 80 × 469M = 37.5B MLP params. Non-MLP (attention QKV, O): remaining ~32.5B. Total: 70B.
    After 30% MLP pruning: MLP = 37.5B × 0.7 = 26.3B. Total model: 26.3B + 32.5B = 58.8B params. Memory:
    58.8B × 2B (BF16) = 117.6GB (vs 140GB). At 5.3 TB/s: decode latency = 117.6GB/5.3TB/s = 22.2ms/token
    = 45 tok/s vs original 37.9 tok/s. Improvement: 18.7%. Note: accuracy impact requires 2-5 PPL points
    recovery via fine-tuning.'
  common_mistake: Expecting throughput to scale linearly with parameter reduction; for decode-phase inference
    (memory-bandwidth bound), throughput scales with memory reduction, not compute reduction.
  napkin_math: 'Original: 140GB. Pruned MLP 30%: 37.5B×0.3×2B = 22.5GB saved → 117.5GB. Decode: 117.5GB/5.3TB/s
    = 22.2ms = 45 tok/s. Speedup: 45/37.9 = 1.19×. Memory bandwidth bound — speedup proportional to model
    size reduction.'
