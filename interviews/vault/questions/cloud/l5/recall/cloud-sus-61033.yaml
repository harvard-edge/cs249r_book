id: cloud-sus-61033
title: Adapter-Aware KV Cache Management
topic: model-adaptation-systems
status: published
provenance: imported
scenario: Your multi-adapter serving system uses PagedAttention. Explain why KV cache pages cannot be
  shared across different LoRA adapters and quantify the memory overhead.
details:
  realistic_solution: 'KV cache values are computed as K = xW_K + x(A_K B_K) where A_K, B_K are adapter
    matrices. Different adapters produce different K, V values for identical inputs — prefix sharing is
    only valid within the same adapter. In a 50-adapter system, prefix cache hit rate drops from ~70%
    (single adapter) to ~1-2% (random adapter assignment). Mitigation: adapter-aware request routing to
    maximize same-adapter batching and restore prefix cache hits.'
  common_mistake: Assuming prefix KV cache sharing works across adapters with the same system prompt.
    The same input produces different KV values when processed through different LoRA adapters because
    the adapted attention projection weights change the key/value computation.
  napkin_math: 'KV cache per sequence (13B, rank-16, seq=2048): 40 layers × 2 × 5120 × 2048 × 2B = 1.67
    GB. Without prefix sharing: 50 users × 1.67 GB = 83.5 GB — exceeds H100. With prefix sharing (1000-token
    shared prefix): shared portion = 40 × 2 × 5120 × 1000 × 2B = 0.82 GB × 50 = 41 GB without sharing
    vs 0.82 GB with perfect sharing. Multi-adapter kills this sharing.'
