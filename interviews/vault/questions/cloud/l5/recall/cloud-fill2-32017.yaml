id: cloud-fill2-32017
title: Pipeline Parallelism Activation Checkpointing Interaction
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are training a 70B model with PP=8, TP=8, and 32 micro-batches on 64 H100 GPUs using 1F1B
  scheduling. Each pipeline stage holds ~8.75B parameters. Without activation checkpointing, peak activation
  memory per stage is 24 GB (P=8 stored micro-batches × 3 GB each). With selective activation checkpointing
  (recompute attention but store MLP activations), how much memory do you save per stage, and what is
  the recomputation cost?
details:
  realistic_solution: 'In a transformer layer, attention activations (Q, K, V projections, attention scores
    if not using FlashAttention) dominate: ~60-70% of activation memory. MLP activations (up-projection,
    activation, down-projection intermediates) are ~30-40%. With selective checkpointing — recompute attention,
    store MLP — per micro-batch activation drops from 3 GB to ~1.2 GB (store only MLP intermediates).
    Peak with 1F1B = 8 × 1.2 GB = 9.6 GB, saving 14.4 GB (60% reduction). Recomputation cost: attention
    is ~40% of layer FLOPS but is fast to recompute with FlashAttention (fused kernel, no HBM reads for
    intermediates). Effective training slowdown: ~8-12% from recomputation. With FlashAttention-2, the
    recomputation is nearly free because it was already IO-optimized.'
  common_mistake: Applying full activation checkpointing uniformly. Attention activations are large (O(N²)
    for standard attention) but cheap to recompute, while MLP activations are smaller but expensive to
    recompute (large GEMMs). Selective checkpointing is optimal.
  napkin_math: 'Without checkpointing: 8 × 3 GB = 24 GB activations. Selective (recompute attn): 8 × 1.2
    GB = 9.6 GB. Savings: 14.4 GB (60%). Recompute overhead: ~10% training time. Full checkpoint: 8 ×
    0.5 GB = 4 GB but ~33% slower.'
