id: cloud-cell-10203
title: Mastering KV Cache Sharing Across Agents in Multi-Model Orchestration
topic: compound-ai-systems
status: published
provenance: imported
scenario: An orchestration system on H100 (80GB HBM3) runs 8 parallel agents, each with a 4096-token system
  prompt and 2048-token working context. Each agent independently prefills its system prompt on every
  request. The system prompt is shared across all agents. At bf16, each token's KV cache consumes 2 *
  2 * num_layers * head_dim bytes. For a 70B model with 80 layers and head_dim=128, calculate the waste
  from redundant system prompt prefill and design a prefix caching strategy.
details:
  realistic_solution: If optimized cost is 42% of original, savings = 58% (not 37%). 37% is the reduction
    from a different baseline calculation.
  common_mistake: Treating KV cache as per-request rather than per-prefix. Teams rebuild the system prompt
    KV cache on every request even when the prefix is identical, wasting both compute and memory bandwidth.
  napkin_math: 'True savings from optimization. Before: 100% baseline cost. After optimization: 42% of
    baseline. True savings: (100-42)/100 = 58% cost reduction (not 37% — 37% would imply after-cost is
    63% of baseline, not 42%).'
