id: cloud-cell-12083
title: 'Model Size Estimation: Master Attention KV-Cache Scaling Laws on H100'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Derive and apply the KV-cache scaling law for LLM inference on H100 (80GB HBM3). For a 13B
  LLaMA model (40 layers, hidden_dim=5120, 40 KV heads, head_dim=128), compute: (1) KV-cache memory per
  token per request, (2) maximum batch size × context length product at FP16 given 80GB - 26GB weights
  = 54GB available, (3) how GQA (8 KV heads) changes this.'
details:
  realistic_solution: 'KV per token per layer: 2 (K+V) × n_KV_heads × head_dim × 2B = 2×40×128×2 = 20,480
    bytes = 20KB per layer. Per request, per token (all layers): 40×20KB = 800KB/token. Available: 54GB.
    Max tokens (batch × seq): 54GB/800KB = 67,500 tokens (e.g., batch=16 × seq=4096 = 65,536 tokens ✓).
    With GQA (8 KV heads): 2×8×128×2B = 4,096 bytes per layer. Per token all layers: 40×4KB = 160KB. Max
    tokens: 54GB/160KB = 337,500 tokens (batch=32 × seq=10K or batch=64 × seq=5K). GQA gives 5× more capacity.'
  common_mistake: Using hidden_dim instead of KV head count × head_dim for KV-cache calculation; in multi-head
    attention, only the KV projections contribute to cache, not the full hidden dimension.
  napkin_math: 'KV per token per layer: 2×n_kv×head_dim×2B. MHA (n_kv=40): 2×40×128×2=20,480B=20KB. 40
    layers: 800KB/token. GQA (n_kv=8): 2×8×128×2=4096B=4KB. 40 layers: 160KB/token. Available HBM: 54GB.
    MHA max tokens: 54×10^9/800×10^3=67,500. GQA max: 54×10^9/160×10^3=337,500. GQA: 5× more context capacity.'
