schema_version: 1
id: cloud-r2-42019
title: Speculative Decoding as Tail Latency Reducer
topic: tail-latency
status: published
provenance: imported
scenario: Your 70B model on MI300X has decode P99 of 18ms/token. You implement speculative decoding with
  a 1.5B draft model that proposes 5 tokens per step with 72% acceptance rate. Calculate the new effective
  tokens/step, the P99 latency per accepted token, and the memory overhead of running both models simultaneously
  on the MI300X's 192 GB HBM3.
details:
  realistic_solution: 'E[tokens] = (1-0.72^6)/(1-0.72) = 0.8607/0.28 = 3.07 (not 3.15). Effective latency:
    14ms/3.07 = 4.56ms/token, speedup ≈ 3.95×.'
  common_mistake: Assuming speculative decoding always improves latency proportionally to acceptance rate.
    The verification step runs the full 70B model on all draft tokens simultaneously, which is compute-bound
    (like prefill) rather than memory-bound (like single-token decode). If the draft model's latency is
    non-negligible, the benefit diminishes.
  napkin_math: 'Draft: 5 × 1.2ms = 6ms. Verify: 5 tokens parallel = 8ms. Acceptance: E[accepted tokens]
    = (1 - 0.72^6) / (1 - 0.72) = (1 - 0.0722) / 0.28 = 0.9278 / 0.28 = 3.314... let me recalc: 0.72^2=0.5184;
    0.72^3=0.3732; 0.72^4=0.2687; 0.72^5=0.1935; 0.72^6=0.1393. E = (1-0.1393)/0.28 = 0.8607/0.28 = 3.074
    ≈ 3.07 tokens/step (not 3.15). Total time: 14ms / 3.07 = 4.56ms/token. Speedup: 18/4.56 = 3.95×.'
