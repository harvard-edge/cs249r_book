id: cloud-1053
title: CUDA Graphs vs Kernel Fusion for LLM Serving
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'Your team is serving a real-time LLM on an H100 PCIe node at batch size 1 to meet a strict
  50ms P99 latency SLA. Profiling reveals the model executes 2,000 distinct kernels per forward pass.
  The average GPU execution time per kernel is only 2µs, but the end-to-end latency is missing the SLA.
  The team is debating two approaches to optimize the deployment: wrapping the entire forward pass in
  a CUDA Graph versus investing a month of engineering time to write custom fused Triton kernels for the
  bottleneck blocks. How do you evaluate these options?'
details:
  realistic_solution: CUDA Graphs are the correct immediate solution to eliminate the CPU-bound dispatch
    bottleneck, but kernel fusion is required to reduce memory bandwidth pressure. You should deploy CUDA
    Graphs immediately to remove launch overhead, then selectively fuse memory-bound operations to further
    reduce GPU execution time.
  common_mistake: Believing CUDA Graphs will speed up the GPU execution time by optimizing memory access,
    or failing to realize that CUDA Graphs only eliminate CPU-side dispatch overhead without reducing
    HBM round-trips for intermediate activations.
  napkin_math: Average CPU dispatch overhead per CUDA kernel is ~5µs. For 2,000 separate kernels, total
    dispatch time = 2,000 * 5µs = 10ms. Actual H100 GPU execution time = 2,000 * 2µs = 4ms. Since 10ms
    > 4ms, the model is entirely CPU-bound and starved for work. Using CUDA Graphs captures the 2,000
    launches into a single node (~10µs overhead), dropping total inference latency from 14ms down to just
    ~4ms.
