id: cloud-1789
title: Monolithic vs. Chiplet Accelerator Evaluation
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A new monolithic AI accelerator design requires 840 mm² of silicon, dangerously close to the
  photolithographic reticle limit (approx 858 mm²). Defect density models estimate a low yield of 25%.
  An alternative design splits the architecture into four 220 mm² chiplets, each with an 85% yield, connected
  via a silicon interposer. The interposer introduces a 20ns latency penalty for cross-chiplet memory
  accesses and requires an additional 40W of power per package. Evaluate the trade-offs between the monolithic
  and chiplet designs for training a 500B parameter LLM, and justify which path you would recommend for
  mass production.
details:
  realistic_solution: Recommend the chiplet approach. Known Good Dies (KGD) can be tested before packaging,
    decoupling the yield of individual chiplets from the final package yield. Even ignoring KGD, the probability
    of 4 good chiplets (0.85^4 = 52%) is double the monolithic yield (25%). Furthermore, 40W is a minor
    overhead in a typical 500W+ TDP envelope, and 20ns latency is easily hidden by the massive parallelism
    and pipelining of bulk matrix multiplications in LLM training.
  common_mistake: Overestimating the impact of the 20ns interconnect latency on highly pipelined training
    workloads, or failing to understand how exponentially worse defect density affects the economics of
    dies approaching the reticle limit.
  napkin_math: Monolithic yield = 25%. Chiplet yield = 85%. Combined probability of 4 good chiplets =
    0.85^4 = 52.2%. Yield is effectively doubled, more than offsetting packaging costs. Power overhead
    = 40W (likely <10% of total TDP).
