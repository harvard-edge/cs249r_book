id: cloud-new-50011
title: Triton's IR Compilation Pipeline for Multi-Backend Targeting
topic: software-portability
status: published
provenance: imported
scenario: Triton compiles a Python-like DSL to GPU machine code via multiple IR stages. Explain how Triton's
  compilation pipeline enables portability across NVIDIA PTX and AMD AMDGPU targets, and where backend-specific
  decisions are made.
details:
  realistic_solution: 'Triton''s pipeline: (1) Python AST -> Triton IR (high-level, hardware-agnostic).
    (2) Triton IR -> TTGIR (Triton GPU IR, adds GPU concepts like shared memory, barriers). (3) TTGIR
    -> LLVM IR (lowering to LLVM''s machine-independent representation). (4) LLVM IR -> PTX (NVIDIA) or
    AMDGPU ISA (AMD) via LLVM''s target-specific backends. Backend-specific decisions (register allocation,
    instruction selection, memory coalescing patterns) happen at step 4. Auto-tuning parameters (tile
    sizes, num_warps) affect step 2. This is why the same Triton source can target both backends but may
    need different tuning configs.'
  common_mistake: Thinking Triton directly generates PTX or AMDGPU assembly from Python. It actually goes
    through Triton IR -> TTIR -> TTGIR -> LLVM IR -> backend-specific assembly, with the split happening
    at the LLVM IR level.
  napkin_math: 'Compilation time: ~0.5-2s per kernel on NVIDIA (PTX), ~1-4s per kernel on AMD (AMDGPU)
    due to less mature backend. Cache across runs eliminates recompilation. Typical model: 50-200 kernels
    -> 25-400s cold start if uncached.'
