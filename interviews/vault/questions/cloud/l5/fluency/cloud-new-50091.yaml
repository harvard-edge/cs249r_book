schema_version: 1
id: cloud-new-50091
title: H100 TMA (Tensor Memory Accelerator) for Async Memory Loads
topic: communication-computation-overlap
status: published
provenance: imported
scenario: H100 introduces the Tensor Memory Accelerator (TMA), a hardware unit that asynchronously loads
  multi-dimensional tensor tiles from HBM to shared memory without occupying compute threads. Explain
  how TMA improves compute-memory overlap compared to A100's cooperative load pattern.
details:
  realistic_solution: 'A100 shared memory load: (1) Each thread in a warp computes its load address (index
    calculations). (2) Threads issue individual load instructions. (3) __syncthreads() to ensure all loads
    complete. (4) Compute on shared memory data. This burns SM registers and cycles on address computation
    and synchronization. H100 TMA: (1) Program a TMA descriptor (base pointer, shape, stride) once. (2)
    Issue a single tma.load instruction that loads an entire 2D/3D/4D tile asynchronously. (3) TMA hardware
    handles address generation, coalescing, and barrier signaling. (4) Threads are free to compute on
    previously loaded data while TMA loads the next tile. Result: TMA achieves near-perfect overlap because
    no thread resources are consumed during loads. In practice, TMA-enabled GEMM kernels achieve 85-95%
    of peak TFLOPS vs 70-85% without TMA.'
  common_mistake: Treating TMA as just a faster DMA engine. TMA's key innovation is not speed but the
    elimination of address computation and thread synchronization overhead that A100 requires for shared
    memory loads.
  napkin_math: 'A100: 30% of SM cycles spent on load address computation + sync. H100 with TMA: ~5% overhead
    (TMA descriptor setup). Net compute efficiency gain: 25 percentage points. H100 989 TFLOPS x 0.90
    = 890 effective vs A100 312 TFLOPS x 0.75 = 234 effective. H100 is 3.8x faster in real kernels (vs
    3.17x raw peak ratio).'
