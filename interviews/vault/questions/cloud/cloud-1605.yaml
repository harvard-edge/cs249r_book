title: Cloud API Model Inversion Vulnerability
scenario: A cloud-hosted biometric authentication API serves a 50M parameter Vision Transformer on NVIDIA
  T4 GPUs at 1,000 QPS. The API returns the predicted identity along with an FP32 confidence score for
  the top-5 matches. A security audit reveals that an attacker is reconstructing recognizable faces of
  private users by querying the API roughly 50,000 times per target identity. Analyze the API design to
  identify the root cause enabling this reconstruction and propose a mitigation that does not require
  retraining the model.
question: "What API design flaw enables the 50,000-query face reconstruction attack, and how would you mitigate it without retraining?"
details:
  realistic_solution: The root cause is the high-precision (FP32) confidence scores returned by the API,
    which provide a smooth continuous loss surface for the attacker to perform numerical gradient estimation.
    The solution is to truncate or round the confidence scores (e.g., to 1 decimal place or coarse intervals
    like 'High/Medium/Low') to create step functions that zero out the attacker's numerical gradients.
  common_mistake: Assuming the attack is membership inference, or believing that limiting to top-5 outputs
    (instead of the full softmax distribution) is sufficient to prevent gradient-based optimization.
  napkin_math: 'An attacker optimizing a 512-dimensional GAN latent space to reconstruct a face needs
    ~1,024 queries per gradient step via finite differences: (f(z+eps) - f(z)) / eps. For 50 steps, this
    is ~51,200 queries. If FP32 outputs are rounded to 2 decimal places (100 bins), f(z+eps) - f(z) evaluates
    to 0 for small eps, causing the gradient approximation to vanish and stalling the inversion attack.'
