title: Cloud API Model Inversion Vulnerability
scenario: A cloud-hosted biometric authentication API serves a 50M parameter Vision Transformer at 1,000 QPS. The API returns the predicted identity along with an FP32 confidence score for the top-5 matches. A security audit reveals that an attacker is reconstructing recognizable faces of private users by querying the API roughly 50,000 times per target identity.
question: What API design flaw enables the 50,000-query face reconstruction attack, and how would you mitigate it without retraining?
details:
  realistic_solution: 'The root cause is the high-precision (FP32) confidence scores returned by the API, which provide a smooth continuous loss surface for the attacker to perform numerical gradient estimation. The solution is to truncate or round the confidence scores (e.g., to 1 decimal place or coarse intervals like High/Medium/Low) to create step functions that zero out the attacker''s numerical gradients.'
  common_mistake: |
    **The Pitfall:** Assuming the attack is membership inference or that limiting to top-5 outputs is safe.
    **The Rationale:** Engineers overlook that high-precision continuous confidence scores allow for numerical gradient estimation.
    **The Consequence:** Attackers can reverse-engineer private data using optimization algorithms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Finite differences require ~1,024 queries per gradient step.
       - Attack requires ~50 optimization steps.
    2. **Calculations:**
       - 1,024 queries/step * 50 steps = 51,200 queries.
       - Truncating FP32 creates step functions where f(z+eps) - f(z) = 0 for small eps.
    3. **Conclusion & Interpretation:**
       - **Result: Rounding output zeroes the numerical gradient, preventing the attack.**
