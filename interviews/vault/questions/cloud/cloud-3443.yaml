title: 'Google TPU v5e: Multi-Tenant Scheduling and Resource Contention'
scenario: Imagine you are managing a shared cluster of Google TPU v5e devices. Two critical machine learning workloads are submitted. Job A (Reinforcement Learning Agent Training) is a latency-sensitive task requiring frequent, small model updates and low-latency communication between compute units. Job B (Large Language Model Pre-training) is a throughput-intensive task demanding sustained, high-FLOPs computation and high memory bandwidth for large batch processing. Both jobs are launched concurrently and are experiencing severe performance degradation, including unexpected preemption of Job A and fluctuating throughput for Job B.
question: Why are the RL and LLM jobs interfering on shared TPU v5e devices, and how should the scheduler prevent preemption and throughput instability?
details:
  realistic_solution: |
    A realistic solution involves implementing an intelligent, hierarchical scheduling system that incorporates workload profiling and QoS (Quality of Service) levels.

    1. **Workload Classification:** Profile Job A (RL) as 'latency-sensitive, communication-bound' and Job B (LLM) as 'throughput-intensive, compute/memory-bound'.
    2. **Prioritized Queues & Preemption Policies:** Assign higher preemption resistance or dedicated slices for Job A, potentially using a gang scheduling approach to ensure all required TPU cores for a step are available simultaneously. For Job B, implement a more flexible preemption policy that allows preemption only at safe checkpoints.
    3. **Resource Partitioning/Isolation (Software-Defined):** While TPUs don't have direct MIG/MPS, explore software-defined resource partitioning or allocation schemes. This might involve assigning dedicated TPU cores or virtual slices of resources to different jobs to minimize interference, especially for HBM bandwidth (1.6 TB/s) and shared network interfaces.
    4. **Dynamic Scaling & Backfilling:** Use a scheduler capable of dynamically adjusting allocated resources based on job progress and cluster load. Implement backfilling for lower-priority jobs when higher-priority resources are temporarily idle.
  common_mistake: |
    **The Pitfall:** Implementing a simple FIFO or priority queue scheduler.
    **The Rationale:** Candidates fail to account for workload-specific resource requirements (e.g., latency vs. throughput sensitivity).
    **The Consequence:** Leads to 'noisy neighbor' problems, where latency-sensitive jobs are preempted or high-throughput jobs suffer from fragmented allocation.
  napkin_math: |
    - 1 PFLOPS = 1000 TFLOPS.
    - Required TPUs = 1500 TFLOPS / 197 TFLOPS/TPU = 7.61 TPUs.
    - **At least 8 full TPU v5e devices are needed to meet the demand.**
