title: The All-Reduce Bottleneck
scenario: In a synchronous DDP setup, the training step cannot complete until all GPUs have exchanged
  their gradients. If one GPU is slightly slower (a straggler), what happens to the rest of the cluster?
question: "If one GPU is slightly slower (a straggler), what happens to the rest of the cluster?"
details:
  realistic_solution: The entire cluster stalls. The All-Reduce operation acts as a global barrier; the
    fastest GPU must wait completely idle for the slowest GPU to finish its backward pass before the gradients
    can be synchronized and the optimizer can step.
  common_mistake: Assuming the fast GPUs just move on to the next batch or that the slow GPU is automatically
    dropped.
  napkin_math: In a synchronous DDP 8-GPU cluster, a normal step takes 100ms. If one thermal-throttled
    GPU takes 150ms, the 7 fast GPUs idle at the barrier for 50ms each. Wasted compute per step = 7 GPUs
    * 50ms = 350ms. Over 1,000,000 steps, this wastes 350,000 GPU-seconds (97.2 GPU-hours). A single node
    running 50% slower degrades overall cluster throughput by 33% (100ms / 150ms).
  options:
  - The fast GPUs proceed and calculate asynchronous gradients.
  - The PyTorch dispatcher automatically re-assigns the batch to a faster node.
  - The entire cluster stalls at the synchronization barrier, wasting compute time.
  - The cluster drops the straggler's gradients to maintain high throughput.
  correct_index: 2
