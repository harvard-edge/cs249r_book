title: The All-Reduce Bottleneck
scenario: In a synchronous DDP setup, the training step cannot complete until all GPUs have exchanged their gradients.
question: If one GPU is slightly slower (a straggler), what happens to the rest of the cluster?
details:
  realistic_solution: The entire cluster stalls. The All-Reduce operation acts as a global barrier; the fastest GPU must wait completely idle for the slowest GPU to finish its backward pass before the gradients can be synchronized and the optimizer can step.
  common_mistake: |
    **The Pitfall:** Assuming the PyTorch dispatcher handles slow nodes automatically.
    **The Rationale:** Treating distributed training like microservice load balancing, expecting fast nodes to just grab the next batch.
    **The Consequence:** Ignoring hardware health metrics, allowing one silently throttling GPU to cripple the throughput of a multi-million dollar cluster.
  napkin_math: |
    - **Normal Step**: 100ms.
    - **Straggler Step**: 150ms (due to thermal throttling).
    - **Wasted Time**: 7 fast GPUs idle for 50ms = 350ms wasted per step.
    - **Long-Term Waste**: Over 1,000,000 steps, this wastes 97.2 GPU-hours.
    - **Result**: A single node running 50% slower degrades overall cluster throughput by **33%**.
  options:
  - The fast GPUs proceed and calculate asynchronous gradients.
  - The PyTorch dispatcher automatically re-assigns the batch to a faster node.
  - The entire cluster stalls at the synchronization barrier, wasting compute time.
  - The cluster drops the straggler's gradients to maintain high throughput.
  correct_index: 2
