title: MI300X Rail-Optimized MoE
scenario: A cluster of 64x MI300X GPUs (8 nodes, 8 GPUs per node) runs a Sparse Mixture
  of Experts. Inter-node bandwidth is 400 GB/s per rail via Infiniband.
question: Design the grouping for Expert Parallelism to minimize inter-node traffic
  bottlenecks.
visual:
  kind: svg
  path: cloud-4523.svg
  alt: Topology placement showing 8 nodes connected vertically by rail switches.
  caption: Rail-optimized topology mapping for 8 nodes.
details:
  realistic_solution: In a rail-optimized setup, GPUs with the same local rank across
    different nodes share a dedicated Infiniband switch. Expert Parallelism involves
    all-to-all communication, which is most efficient over these dedicated rails.
    Experts should be sharded across the rail groups (inter-node), leaving Data/Tensor
    parallelism inside the high-bandwidth 5.3 TB/s intra-node NVLink/xGMI domain.
  common_mistake: Placing Expert Parallelism intra-node, which forces Tensor Parallelism
    out to the slow inter-node links, destroying throughput.
  napkin_math: Intra-node ~5.3TB/s > Inter-node 400GB/s. Map EP to 400GB/s rails.
