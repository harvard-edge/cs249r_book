title: 'KV-Cache: Evaluate PagedAttention vs Continuous Batching Scheduling'
scenario: 'You are comparing two KV cache management strategies for a 7B LLM on an H100: (A) static batching with pre-allocated KV cache (max seq 2048), vs (B) PagedAttention with continuous batching. The workload has 50% short requests (< 256 tokens) and 50% long requests (1024-2048 tokens).'
question: 'Evaluate GPU utilization, memory waste, and throughput for static preallocation versus PagedAttention continuous batching for this mixed workload.'
details:
  realistic_solution: 'Static batching: allocate 2048-token KV for every request. Short requests waste 2048-256 = 1792 tokens (87.5%) of their KV allocation. GPU utilization tanks on mixed workloads. PagedAttention: allocate only needed pages, pad-free, much higher throughput.'
  common_mistake: |
    **The Pitfall:** Assuming static batching is simpler and therefore faster.
    **The Rationale:** Candidates ignore the severe padding waste and KV memory fragmentation caused by allocating max sequence length for variable-length workloads.
    **The Consequence:** The GPU hits an artificial memory wall, resulting in drastically lower throughput and poor utilization despite available compute.
  napkin_math: |
    * 7B model weights: 14GB. Available HBM: 80 - 14 = 66GB.
    * Static batching KV per request (max 2048): 268MB. Max concurrent: 66GB / 268MB = 246 requests.
    * Short requests waste: 246 × 50% × (2048-256) tokens = 28.8GB wasted.
    * Effective concurrent slots if using exact memory: 66GB / (0.5 × 268MB + 0.5 × 33.5MB) = 437 slots.
    * **PagedAttention allocates exactly what is needed, achieving 437 concurrent requests (a ~1.78× throughput increase over static).**
