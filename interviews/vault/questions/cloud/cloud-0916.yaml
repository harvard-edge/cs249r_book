title: Calculating Maximum Batching Window
scenario: 'You are deploying an embedding model on an NVIDIA A10G using Triton Inference Server. The strict end-to-end latency SLA is 100ms. Network transfer and tokenization overhead take a fixed 15ms. The model execution time scales with batch size (N) according to the profile: T_exec = 20ms + (N * 2ms).'
question: "What maximum Triton max_queue_delay can safely meet the 100ms SLA at max batch size 16?"
details:
  realistic_solution: Configure the maximum batching window to 33ms to ensure the worst-case request does not violate the SLA.
  common_mistake: |
    **The Pitfall:** Calculating the window based on the average execution time.
    
    **The Rationale:** Candidates forget that the SLA applies to the worst-case request, which occurs exactly when a new batching window opens, meaning they must use the maximum execution time at peak batch size.
    
    **The Consequence:** Sporadic SLA violations whenever the server hits peak load and processes maximum batch sizes.
  napkin_math: |
    * **Max Execution Time (T_exec):** 20ms + (16 × 2ms) = 52ms
    * **Fixed Overhead:** 15ms
    * **Worst-Case Latency Equation:** SLA (100ms) = Window + Overhead + T_exec
    * **Window Calculation:** Window = 100ms - 15ms - 52ms
    * **Result:** **The maximum safe batching window is 33ms.**
