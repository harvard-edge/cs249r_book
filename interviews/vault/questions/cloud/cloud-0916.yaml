title: Calculating Maximum Batching Window
scenario: 'You are deploying an embedding model on an NVIDIA A10G using Triton Inference Server. The strict
  end-to-end latency SLA is 100ms. Network transfer and tokenization overhead take a fixed 15ms. The model
  execution time scales with batch size (N) according to the profile: T_exec = 20ms + (N * 2ms). If you
  configure the maximum batch size to 16, calculate the maximum dynamic batching window (`max_queue_delay`)
  you can safely configure so that the worst-case request (which arrives exactly when a new window opens)
  still meets the 100ms SLA.'
question: "What maximum Triton max_queue_delay can safely meet the 100ms SLA at max batch size 16?"
details:
  realistic_solution: Configure the maximum batching window to 33ms to ensure the worst-case request does
    not violate the SLA.
  common_mistake: Calculating the window based on the average execution time rather than the maximum execution
    time (at max batch size), or forgetting to subtract the fixed network/preprocessing overhead.
  napkin_math: 'Worst-case latency = Window + Overhead + T_exec(Max_N)

    100ms = Window + 15ms + (20ms + 16 * 2ms)

    100ms = Window + 15ms + 52ms

    Window = 100ms - 67ms = 33ms'
