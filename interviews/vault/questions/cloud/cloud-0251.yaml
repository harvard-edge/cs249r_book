title: The Energy Cost of Solitude
scenario: You are optimizing an inference serving stack on an H100 GPU which has a 700W TDP. For your model, you've measured that latency for a single request (batch size 1) is 10ms. By creating micro-batches of 32 requests, the latency for the entire batch only increases to 60ms.
question: How much more energy per request does batch size 1 use than batch size 32 on a 700W H100 with 10ms vs 60ms batch latency?
details:
  realistic_solution: The key is to calculate the total energy (Power × Time) for each scenario and then divide by the number of requests to find the per-request energy. For batch size 1, the GPU is active for a short time for just one request. For batch size 32, the GPU is active for a slightly longer time, but that energy cost is amortized across 32 requests, leading to a dramatic reduction in per-request energy consumption.
  common_mistake: |
    **The Pitfall:** Confusing power (Watts) with total energy (Joules).
    **The Rationale:** Engineers assume that since the GPU power draw is capped at 700W in both cases, the energy consumption is the same, or assume latency scales linearly.
    **The Consequence:** Failing to realize that batching massively reduces the per-request carbon footprint and energy cost.
  napkin_math: |
    * **Batch size 1:**
      * Power: 700 W, Latency: 10 ms = 0.01 s
      * Energy per batch = 700 × 0.01 = 7.0 Joules
      * Energy per request = 7.0 / 1 = 7.0 J/request
    * **Batch size 32:**
      * Power: 700 W, Latency: 60 ms = 0.06 s
      * Energy per batch = 700 × 0.06 = 42.0 Joules
      * Energy per request = 42.0 / 32 = 1.3125 J/request
    * Ratio = 7.0 / 1.3125 = 5.33×
    * **Conclusion: Batch size 1 consumes 5.33× more energy per request than batch size 32.**
  options:
  - It's about the same, since power is the same.
  - It's about 2x more energy per request.
  - It's over 5x more energy per request.
  - It's over 30x more energy per request.
  correct_index: 2
