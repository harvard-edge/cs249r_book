title: Diagnose Load Imbalance Across Pipeline Stages on H100
scenario: 'A 4-stage pipeline of a 32-layer transformer on H100 GPUs shows stage latencies: Stage 0: 12ms (embedding + layers 1-8), Stage 1: 8ms (layers 9-16), Stage 2: 8ms (layers 17-24), Stage 3: 14ms (layers 25-32 + LM head). Pipeline throughput is limited to 14ms per stage cycle. The theoretical bubble-free throughput at perfectly uniform stages would be much higher. Diagnose and fix the stage imbalance.'
question: What is causing the 4-stage pipeline imbalance, and how would you rebalance the stages to recover throughput?
details:
  realistic_solution: 'Stage 0 slow: embedding lookup (128K×8192 table, FP16) = 2GB; load time = 2GB/2000GB/s (H100 HBM) = 1ms + compute = 2ms. Main issue: first 8 layers include self-attention with KV cache allocation overhead. Stage 3 slow: LM head projection (8192→128K) = 8192×128K×2B = 2GB → 4ms + layer 32. Fix: (1) Move embedding to Stage 0 but parallelize vocab dimension. (2) Move LM head to Stage 1 and pipeline embedding lookup. (3) Rebalance: Stage 0: emb + layers 1-6; Stage 1: layers 7-16; Stage 2: layers 17-26; Stage 3: layers 27-32 + LM head. Test new latencies targeting <=10ms per stage.'
  common_mistake: Rebalancing layers by count alone (8 layers each); the embedding lookup and LM head are O(vocab×dim) operations that dominate when vocabulary is large (e.g., 128K tokens).
  napkin_math: 'Current bottleneck: 14ms (Stage 3). At M=8 microbatches, pipeline bubble ratio is (4-1)/(8+4-1) = 3/11 = 27.3%. Effective efficiency compares ideal 10.5ms perfectly balanced stages (42ms total compute / 4) to actual: (10.5/14) * (1 - 3/11) = 75.0% * 72.7% = 54.5%. Rebalanced to 11ms: efficiency = (10.5/11) * (1 - 3/11) = 95.4% * 72.7% = 69.4%. Throughput gain: 69.4 / 54.5 = 1.27x improvement.'
