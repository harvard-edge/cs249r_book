title: 'Spatial Carbon Arbitrage: Multi-Region Training Routing'
scenario: 'Your organization has GPU clusters in three regions: US-West (30 gCO2e/kWh, 500 H100s), EU-North
  (15 gCO2e/kWh, 300 H100s), US-East (380 gCO2e/kWh, 800 H100s). A 1,000 GPU-day training job needs to
  be scheduled. You can split the job across regions using pipeline or data parallelism. Analyze the carbon
  and performance tradeoffs of three routing strategies: (A) all US-East (lowest cost), (B) all EU-North
  (greenest available), (C) split across US-West + EU-North using data parallelism.'
details:
  realistic_solution: 'Strategy A (US-East, 1,000 GPUs): carbon = 1,000 × 700W × 24hr × PUE 1.2 × 380gCO2e/kWh
    = 1000 × 0.7 × 24 × 1.2 × 0.38 = 7,661 kgCO2e/day × days. Strategy B (EU-North, 300 GPUs): same job
    takes 1000/300 = 3.33× longer. Carbon = 300 × 0.7 × 24 × 1.2 × 0.015 × 3.33 = 301.7 × 3.33 = 1,005
    kgCO2e total (87% reduction). Strategy C (500 US-West + 300 EU-North = 800 GPUs): cross-region AllReduce
    over Atlantic WAN: RTT ≈ 100ms, gradient sync every step. For a 70B model: 140GB gradients per AllReduce.
    At 10 Gbps cross-region: 140GB/10Gbps = 112 seconds per AllReduce. Step time (compute) ≈ 0.5s → communication
    overhead = 224×. Data parallelism across regions is impractical without gradient compression (1000×
    via 1-bit Adam) or asynchronous SGD. Recommendation: all EU-North with longer wall time minimizes
    carbon by 87%.'
  common_mistake: Assuming cross-region data parallelism has zero communication overhead. Cross-region
    AllReduce over WAN (100-400ms RTT vs 1µs NVLink) imposes a severe communication bottleneck that can
    increase wall-clock training time by 5-20×, erasing carbon savings from green routing.
  napkin_math: 'US-East per day: 1000×0.7kW×24h×1.2×0.38kg/kWh = 7,661 kgCO2e/day. EU-North (1 day equiv):
    300×0.7×24×1.2×0.015 = 90.7 kgCO2e/day × 3.33 days = 302 kgCO2e. Savings: 7,661 - 302 = 7,359 kgCO2e
    per training run (96% reduction). US-West only: 500×0.7×24×1.2×0.030 = 302.4 kgCO2e/day × 2 days =
    605 kgCO2e. Best single-region green option: EU-North (302 kg) < US-West (605 kg) < US-East (7,661
    kg).'
