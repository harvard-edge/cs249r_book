title: Drift Detection with Extreme Label Delay
scenario: You operate a credit risk classification model processing 100 transactions per second. Fraud labels (chargebacks) take 45 days to mature. A new fraud ring exploits a vulnerability, but your traditional performance monitoring (Precision/Recall) won't trigger an alert for 45 days.
question: "How would you detect the new fraud ring before 45-day chargeback labels mature?"
details:
  realistic_solution: Design a multivariate proxy-monitoring architecture. Track secondary business metrics (failed logins, password resets) as proxy labels. Implement a multivariate drift detector (e.g., Autoencoder reconstruction error) on the joint distribution of input features to detect novel attack vectors. If proxy metrics spike AND multivariate drift exceeds a threshold, automatically route suspicious traffic to a slower, high-friction verification path.
  common_mistake: |
    **The Pitfall:** Relying strictly on univariate feature drift alerts (like KS-tests on individual features).
    **The Rationale:** Candidates use out-of-the-box monitoring tools without understanding correlation structures.
    **The Consequence:** Univariate alerts trigger too many false positives to be actionable, causing alert fatigue while coordinated fraud rings slip through.
  napkin_math: |
    1. **Transaction volume:** 100 TPS = 8.64 million transactions/day.
    2. **Unlabelled backlog:** 45 days * 8.64M = 388 million unlabelled records.
    3. **Fraud cost:** If false negatives increase by 0.5% with an average $100 loss: 8.64M * 0.005 * $100 = $4.32 million/day.
    4. **Total undetected loss:** $4.32M * 45 days = **$194 million** before the first label arrives.
    5. **Solution:** Anomaly score computation drops this detection window from 45 days to hours.
