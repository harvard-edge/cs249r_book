title: RoCE v2 vs InfiniBand for ML Training
scenario: Your team must choose between InfiniBand NDR (400Gbps) and RoCE v2 (400Gbps) for a new 1024-MI300X
  training cluster. Both offer the same line rate but use fundamentally different transport mechanisms.
  Analyze the tradeoffs in terms of congestion control, multi-tenancy, operational complexity, and failure
  recovery.
question: "For a 1024-MI300X cluster, how do InfiniBand NDR and RoCE v2 compare in congestion control, multi-tenancy, operations, and recovery?"
details:
  realistic_solution: 'InfiniBand NDR advantages: (1) Credit-based flow control eliminates PFC deadlock
    risk entirely. Each sender maintains a credit counter per VL and only sends when credits are available
    — no pause storms. (2) Adaptive routing built into Quantum-2 switches with per-packet granularity.
    (3) Subnet Manager provides centralized routing with guaranteed deadlock-free paths. (4) SHARP in-network
    AllReduce capability. (5) Lower latency: 1.3μs end-to-end vs 2.5μs for RoCE. Disadvantages: vendor
    lock-in (NVIDIA only), higher switch cost (~2× vs Ethernet), separate management plane. RoCE v2 advantages:
    (1) Uses standard Ethernet switches (Broadcom, etc.) — multi-vendor sourcing. (2) Familiar operational
    model for network teams. (3) Large existing Ethernet infrastructure can be reused. (4) Cost: ~40%
    lower per-port. Disadvantages: requires PFC (deadlock risk), ECN/DCQCN tuning complexity, no in-network
    computation. For 1024 MI300X: IB is recommended. At this scale, PFC deadlock probability is non-trivial
    (1-2 events/day), and each event can stall training for 30+ seconds. The 2× switch cost premium is
    <5% of total cluster cost but eliminates days of congestion-related debugging.'
  common_mistake: 'Choosing based solely on line rate, which is identical. The real differences are in
    the transport layer: IB uses credit-based flow control (lossless by design) while RoCE v2 uses PFC
    over Ethernet (lossless by retrofitting). This fundamental difference cascades into every operational
    aspect.'
  napkin_math: '1024 MI300X cluster cost: ~$300M (GPUs) + $15M (IB switches) or $9M (Ethernet switches).
    IB premium: $6M = 2% of cluster cost. PFC deadlock impact: 1 event/day × 30s stall × 1024 GPUs = 8.5
    GPU-hours per event. At $3/GPU-hr: $25.5/day. Over 3-year lifecycle: $28K — negligible, but the real
    cost is lost training progress and debugging time (engineer-weeks).'
