title: 'The KV-Cache VRAM Budget: VRAM Budgeting'
scenario: 'You''re deploying a Llama-1 65B model for a high-throughput inference service. The model uses FP16 precision. To correctly provision your GPUs, you need to calculate the memory budget.'
question: How much VRAM is consumed solely by the FP16 KV-cache for a 128,000-token Llama-1 65B context?
details:
  realistic_solution: 'The KV-cache stores the Key and Value vectors for every token in the sequence at each decoder layer. For a model like Llama-1 65B, which has 80 layers and a hidden dimension of 8192, the calculation for a 128k token sequence in FP16 is straightforward. The total size is approximately 335.5 GB, which immediately shows that the cache for a single user''s long context request will not fit on a single 80 GB GPU, highlighting the critical need for tensor parallelism even for inference.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for Key and Value tensors.
    **The Rationale:** The KV-cache must store both the Key and Value vectors for every token at each decoder layer.
    **The Consequence:** Underestimating the cache size by exactly half, resulting in severe out-of-memory errors during long context requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-1 65B: 80 layers, hidden dimension of 8192.
    - Precision: FP16 (2 bytes per element).
    - Context length: 128,000 tokens.
    - KV cache stores both Key and Value vectors for each token.

    **Calculations:**
    - KV elements per token per layer: 2 (K+V) * 8192 = 16,384 elements.
    - KV bytes per token per layer: 16,384 * 2 bytes = 32,768 bytes.
    - Total bytes per token across all layers: 32,768 * 80 = 2,621,440 bytes (~2.62 MB).
    - Total KV cache size for 128,000 tokens: 128,000 * 2,621,440 bytes = 335,544,320,000 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~335.5 GB (Memory-Bound)**. The KV cache alone for a long context far exceeds the capacity of a single 80GB GPU, necessitating tensor or sequence parallelism.
  options:
  - ~168 GB
  - 140 GB
  - ~335 GB
  - ~671 GB
