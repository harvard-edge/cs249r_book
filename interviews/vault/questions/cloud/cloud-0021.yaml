title: 'The KV-Cache VRAM Budget: VRAM Budgeting'
scenario: You're deploying a Llama-70B model for a high-throughput inference service. The model uses FP16
  precision. To correctly provision your H100 GPUs, you need to calculate the memory budget. Explain how
  much VRAM will be consumed *solely by the KV-cache* if you need to support a maximum context length
  of 128,000 tokens.
details:
  realistic_solution: The KV-cache stores the Key and Value vectors for every token in the sequence at
    each decoder layer. For a model like Llama-70B, which has 80 layers and a hidden dimension of 8192,
    the calculation for a 128k token sequence in FP16 is straightforward. The total size is approximately
    335.5 GB, which immediately shows that the cache for a single user's long context request will not
    fit on a single 80 GB H100 GPU, highlighting the critical need for tensor parallelism even for inference.
  common_mistake: 'Engineers often forget one of two key multipliers in the KV-cache formula: either they
    forget the factor of 2 for the Key and Value tensors, underestimating the cache size by half; or they
    confuse the dynamic KV-cache size, which scales with sequence length, with the static model weight
    size.'
  napkin_math: 'KV cache per token = 2 (K+V) * 80 layers * 8192 (hidden dim) * 2 bytes (FP16) = 2,621,440
    bytes (~2.62 MB). For a max context of 128,000 tokens: Total KV cache = 128,000 * 2.62 MB = 335,544
    MB, or ~335.5 GB. This vastly exceeds a single 80GB VRAM pool on an H100, requiring at least 5 GPUs
    just to hold the cache for one user.'
  options:
  - ~168 GB
  - 140 GB
  - ~335 GB
  - ~671 GB
  correct_index: 2
