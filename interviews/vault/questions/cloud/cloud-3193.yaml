title: MoE Serving with Offloaded Experts
scenario: You need to serve a 256-expert MoE model (each expert 2B params, 671B total) on a single node with 640 GB total HBM. The model does not fit entirely in GPU memory.
question: "How can you offload experts for a 671B, 256-expert MoE on one 8x H100 node, and what latency does PCIe fetching add?"
details:
  realistic_solution: Keep the shared attention layers + top-16 most frequently accessed experts in GPU HBM, offload the remaining 240 experts to CPU DRAM. Predict expert routing for the next batch and prefetch experts asynchronously. Quantize offloaded experts to INT4 to minimize PCIe fetch time.
  common_mistake: |
    **The Pitfall:** Assuming all experts must be GPU-resident.
    **The Rationale:** Candidates are used to dense models where the entire parameter set must be in HBM for every forward pass.
    **The Consequence:** They wrongly conclude the model cannot be served on a single node. With top-2 routing, only 2 experts are active per token, so idle experts can reside in CPU DRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total weights: 671B * 2 bytes = 1.34 TB.
       - HBM capacity: 640 GB.
       - Expert size: 2B * 2 bytes = 4 GB (BF16), or 1 GB (INT4).
       - PCIe Gen5 bandwidth: 64 GB/s per GPU.
    2. **Calculations:**
       - PCIe fetch time (BF16): 4 GB / 64 GB/s = 62.5 ms.
       - PCIe fetch time (INT4): 1 GB / 64 GB/s = 15.6 ms.
       - Amortized latency (with 90% cache hit rate): 0.1 * 15.6 ms = 1.56 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound Fetch.** Offloading works if idle experts reside in CPU DRAM and are fetched via PCIe. Quantizing offloaded experts to INT4 reduces fetch time to 15.6ms, yielding a viable 1.56ms amortized penalty per token.
