title: FlashAttention Kernel Fusion Benefits
scenario: 'Standard attention in PyTorch involves 5 separate CUDA kernel launches:
  (1) Q×K^T matmul, (2) scaling by 1/sqrt(d), (3) mask application, (4) softmax, (5)
  attn×V matmul. Each kernel reads from and writes to HBM. How does FlashAttention''s
  kernel fusion reduce overhead, and what are the two types of overhead eliminated?'
question: How does FlashAttention kernel fusion reduce overhead versus five PyTorch
  attention kernels, and what two overhead types are eliminated?
details:
  realistic_solution: 'Two types of overhead eliminated: (1) Kernel launch overhead:
    5 launches × ~5μs = 25μs. This is minor. (2) Intermediate HBM traffic: between
    each kernel, results are written to HBM and read back by the next kernel. Q×K^T
    produces N×N × 2B output written to HBM. Scaling reads and writes N×N × 2B. Mask
    reads and writes N×N × 2B. Softmax reads N×N × 2B, writes N×N × 2B. Final matmul
    reads N×N × 2B + N×d × 2B. Total intermediate HBM traffic: ~10 × N² × 2 bytes.
    For N=4096: 10 × 4096² × 2 = 336 MB per head × 64 heads = 21.5 GB. At 3.35 TB/s
    (H100): 6.4ms just for intermediate traffic. FlashAttention fuses everything into
    one kernel: no intermediate writes to HBM. All intermediates stay in SRAM. Savings:
    the entire 21.5 GB of intermediate HBM traffic is eliminated.'
  common_mistake: Only counting the kernel launch overhead (typically ~5-10 μs per
    launch). The bigger savings come from eliminating intermediate HBM reads and writes
    between kernels — each round-trip to HBM costs GB of bandwidth.
  napkin_math: '5 kernels, N=4096, 64 heads. Intermediate HBM: ~10 × N² × 2B × 64
    = 21.5 GB. At 3.35 TB/s: 6.4ms wasted. Kernel launch: 5 × 5μs = 25μs (negligible).
    FlashAttention: 1 kernel, 0 intermediate HBM. Savings: 6.4ms per forward pass.'
