title: M/M/c Queue Design for TPU v5e Serving Pool
scenario: You manage a pool of TPU v5e chips (197 TFLOPS BF16, 16GB HBM each) for a batch inference service.
  Arrival rate is 800 req/s, each request takes 5ms mean service time. You must achieve p99 latency <25ms.
  How many TPU servers (c) do you need, and what utilization target should you set?
question: "How many TPU servers (c) do you need, and what utilization target should you set?"
details:
  realistic_solution: 'Minimum servers for stability: c > λ/μ = 800×0.005 = 4. For p99<25ms with M/M/c,
    need ρ_per_server = λ/(c·μ) ≤ 0.7. At c=6: ρ=800/(6×200)=0.667. p99 ≈ mean_service + queue_wait. With
    ρ=0.67 and P(wait)≈28.5%, mean queue wait ≈ P(wait)×mean_service/(c×(1-ρ)) = 0.285×5/(6×0.333) ≈ 0.7ms;
    queue contribution is small, total p99≈10ms. Use c=6 TPUs, target 65-70% utilization per chip.'
  common_mistake: Sizing for mean load only (800×0.005=4 servers at 100% utilization) without headroom
    for queuing variance.
  napkin_math: λ=800/s, μ=200/s per TPU. Min c=5 for stability. c=6 gives ρ=0.667. Erlang-C P(wait)≈28.5%,
    mean wait≈0.5ms → p99 well under 25ms.
