title: The Code Assistant's Latency Crisis
scenario: You are leading the ML Systems team for a new AI code assistant. The product requirement is a P99 Time-To-First-Token (TTFT) of under 200ms to feel 'real-time'. The service runs a 13B parameter model on H100 GPUs.
question: "What queueing failure causes the 13B code assistant to miss its 200ms P99 TTFT SLO despite fast per-request inference?"
details:
  realistic_solution: 'The root cause is a queueing theory concept: the system''s traffic intensity is greater than 1 during micro-bursts, leading to an unstable queue. Although individual prefill (TTFT) takes 55ms, when multiple requests arrive concurrently, the GPU can only process them sequentially or in batches that increase the per-request prefill time. If arrival rate exceeds service rate, queueing delay dominates TTFT.'
  common_mistake: Engineers often assume that if the individual components are fast (55ms pre-fill, 8ms decode), the system should also be fast. They might incorrectly blame network latency or suggest simply using more GPUs. Another common mistake is to believe all phases of LLM inference are compute-bound on modern accelerators, failing to distinguish the critical difference between pre-fill and decode.
  napkin_math: '1. **Service Rate:** Single request prefill takes 55ms. Max service rate = 1 / 0.055s = 18.1 req/s per GPU. 2. **Arrival Rate:** If peak traffic hits 20 req/s, traffic intensity ρ = 20 / 18.1 = 1.1 (queue grows infinitely). 3. **Queueing Delay:** Even at ρ = 0.9 (16.3 req/s), an M/M/1 queue yields Average Time = 55ms / (1 - 0.9) = 550ms. P99 delay will be much higher, easily violating the 200ms TTFT SLO.'
