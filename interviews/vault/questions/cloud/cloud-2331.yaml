title: MoE Interconnect Bottleneck on TPU Pods
scenario: 'You are training a 1.2T parameter Mixture of Experts (MoE) model (64 experts) on a TPU v5e
  Pod (256 chips). Symptom: Model Flop Utilization (MFU) is stuck at 15%. Profiling shows 65% of step
  time is spent in `all-to-all` communication. The batch size per chip is 16, sequence length is 2048,
  and hidden dimension is 8192.'
details:
  realistic_solution: 'The cause is a severe hardware-algorithm mismatch: the all-to-all communication
    required for MoE token routing is bottlenecked by the TPU''s Inter-Core Interconnect (ICI) bandwidth
    and the small batch size per expert. With 64 experts and a global batch size of 4096 (256*16), each
    expert only receives ~64 sequences per step. The small payload size fails to saturate the ICI bandwidth,
    dominated instead by latency and packet headers. The solution is co-design: 1) Increase the global
    batch size using gradient accumulation or sequence parallelism to increase tokens-per-expert. 2) Implement
    Expert Parallelism combined with Tensor Parallelism to keep expert routing localized within high-bandwidth
    torus links (e.g., 4-way TP, 16-way EP). 3) Introduce capacity factors to drop tokens and cap the
    maximum all-to-all payload size, making communication time deterministic.'
  common_mistake: Assuming the issue is memory bandwidth and trying to implement FlashAttention or ZeRO-3
    offloading, which doesn't address the MoE routing overhead.
  napkin_math: Tokens per chip = 16 * 2048 = 32,768. Tokens routed to each expert (assuming uniform routing)
    = 32,768 / 64 = 512. Payload per expert connection = 512 * 8192 (dim) * 2 bytes (BF16) = ~8.38 MB.
    Each chip makes 64 peer-to-peer connections of 8.38 MB (total 536 MB sent). TPU v5e ICI bandwidth
    is ~400 GB/s. Theoretical transfer time = 536 MB / 400 GB/s = 1.34 ms. However, 64 concurrent multi-hop
    connections of 8.3 MB on the torus network cause contention and routing overhead, reducing effective
    bandwidth. Actual time spikes to >3ms per layer, heavily dominating the ~0.5ms compute time.
  options:
  - 'Multi-cluster federated training distributes training across geographically separate clusters. Architecture:
    each cluster performs local DP training with intra-cluster AllReduce, then periodically synchronizes
    gradients across clusters. The cross-cluster link (typically 10-50 Gbps WAN vs 400 Gbps IB intra-cluster)
    is the bottleneck. Mitigation: reduce cross-cluster sync frequency (local SGD: sync every K steps),
    compress cross-cluster gradients (10-100× via top-k + quantization).'
  - Multi-cluster training uses the same AllReduce algorithm across clusters as within a cluster; NCCL
    handles the WAN transparently with no performance difference from intra-cluster communication
  - Federated training means each cluster trains on a different model and the models are merged at the
    end; this is equivalent to ensemble learning and does not produce a single unified model
  - Cross-cluster gradient synchronization is unnecessary because local SGD within each cluster converges
    to the same solution independently; global synchronization only wastes bandwidth
