title: Absorbing Traffic Spikes with CPU Reactive Scaling
scenario: A viral event spikes your recommendation API traffic from 100 QPS to 2,500 QPS within 2 minutes.
  Your baseline NVIDIA T4 GPU auto-scaling group takes 5 minutes to provision and load the 5GB model weights.
  To avoid dropping requests, you trigger a reactive scaling policy using fast-booting CPU instances (8
  vCPUs, $0.34/hour). The model takes 200ms per inference on a single vCPU. Calculate the number of CPU
  instances required to absorb the 2,400 QPS surge and compare the CPU cost-per-inference against the
  GPU (which handles 400 QPS at $0.52/hour).
details:
  realistic_solution: Provision 60 CPU instances to act as a fast-booting 'shock absorber' for 5 minutes.
    While the CPU cost-per-inference is higher, it successfully mitigates the 5-minute GPU provisioning
    delay.
  common_mistake: Relying solely on GPU auto-scaling without accounting for the 5-minute cold start time,
    resulting in massive request dropping and latency spikes during the burst window.
  napkin_math: CPU Throughput = 8 vCPUs / 0.2s = 40 QPS per instance. CPU Instances Needed = 2400 QPS
    / 40 = 60 instances. CPU Cost-per-inference = ($0.34 / 3600s) / 40 QPS = $0.00000236. GPU Cost-per-inference
    = ($0.52 / 3600s) / 400 QPS = $0.00000036. CPU inference is ~6.5x more expensive but boots in seconds
    instead of minutes.
