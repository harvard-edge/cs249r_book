title: Absorbing Traffic Spikes with CPU Reactive Scaling
scenario: A viral event spikes your recommendation API traffic from 100 QPS to 2,500 QPS within 2 minutes. Your baseline NVIDIA T4 GPU auto-scaling group takes 5 minutes to provision and load the 5GB model weights. To avoid dropping requests, you trigger a reactive scaling policy using fast-booting CPU instances (8 vCPUs, $0.34/hour). The model takes 200ms per inference on a single vCPU.
question: How many 8-vCPU CPU instances are needed for the 2,400 QPS surge, and how does their cost per inference compare with the T4 GPU?
details:
  realistic_solution: Provision 60 CPU instances to act as a fast-booting 'shock absorber' for 5 minutes. While the CPU cost-per-inference is higher, it successfully mitigates the 5-minute GPU provisioning delay.
  common_mistake: |
    **The Pitfall:** Relying purely on GPU auto-scaling without an intermediate CPU buffer strategy.
    **The Rationale:** Candidates strictly focus on the compute efficiency of the T4 and completely ignore the 5-minute cold start wall-clock time required to boot and load 5GB weights into VRAM.
    **The Consequence:** Massive request dropping and API failures occur precisely during the peak burst window, degrading the user experience when it matters most.
  napkin_math: |
    1. **CPU Throughput:** 8 vCPUs / 0.2s latency = 40 QPS per CPU instance.
    2. **Instances Needed:** 2,400 QPS / 40 QPS = **60 CPU instances**.
    3. **CPU Cost/Inference:** ($0.34 / 3600s) / 40 QPS = **$0.00000236**.
    4. **GPU Cost/Inference:** ($0.52 / 3600s) / 400 QPS = **$0.00000036**.
    5. **Conclusion:** CPU inference is **~6.5× more expensive**, but perfectly absorbs the 5-minute GPU cold-start window.
