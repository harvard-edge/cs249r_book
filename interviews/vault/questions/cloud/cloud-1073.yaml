title: Evaluating Data-Centric Upgrades vs Model Scaling
scenario: Your team is building a cloud-based visual inspection API. The baseline ResNet-50 model achieves
  88% mAP, but the business requirement is 95%. The model currently runs at 15ms per image on an NVIDIA
  T4 GPU, well under the strict 50ms latency SLA. The ML engineering team proposes upgrading the architecture
  to a 300M-parameter Vision Transformer (ViT-Large) to brute-force the accuracy gap. Testing shows the
  ViT reaches 91% mAP but increases inference latency to 85ms on the same hardware. Evaluate the trade-offs
  of this model-centric architecture upgrade versus a data-centric strategy that instead mines a 10-million-image
  unlabeled data lake for hard negatives to retrain the ResNet-50.
question: "Should you upgrade to ViT-Large or mine hard negatives to retrain ResNet-50, given the 50ms SLA?"
details:
  realistic_solution: 'Reject the ViT-Large upgrade due to SLA violations (85ms > 50ms). Instead, implement
    an active learning pipeline to surface the highest-entropy predictions from the 10M unlabelled images.
    Spending the compute budget on expertly curating 50,000 hard-negative labels for the ResNet-50 avoids
    the inference latency penalty entirely while addressing the actual bottleneck: data quality and representation
    in the tail distribution.'
  common_mistake: Defaulting to model architecture scaling (like moving from CNNs to massive Transformers)
    to solve performance plateaus, completely ignoring the resulting SLA violations and compounding infrastructure
    costs.
  napkin_math: ViT-Large latency = 85ms (fails 50ms SLA). At 100 peak QPS, ViT-L requires 9 T4 GPUs (100
    * 0.085s = 8.5 active compute seconds/sec). ResNet-50 requires only 2 T4 GPUs (100 * 0.015s = 1.5).
    The model-centric approach adds 7 GPUs, continuously costing ~$25,000/year in infrastructure overhead.
    A data-centric approach of labeling 50,000 hard negatives at $0.20 each is a one-time $10,000 cost,
    yielding vastly superior long-term ROI while actually meeting the latency SLA.
