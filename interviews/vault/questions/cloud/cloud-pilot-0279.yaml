title: Serving SLA Hardware Synthesis
scenario: A SaaS product requires P99 time-to-first-token under 150 ms for prompts up to 2,000 tokens on a 13B model. Prefill takes 70 ms at batch 1 on one L4 GPU, queueing adds 50 ms at 70% utilization, and network adds 25 ms. Specify the serving architecture change needed to keep P99 below target with 30 ms headroom.
question: What serving architecture change keeps P99 TTFT under 150 ms with 30 ms headroom when prefill is 70 ms, queueing 50 ms, and network 25 ms?
details:
  realistic_solution: The current path totals 145 ms, leaving only 5 ms headroom, not the required 30 ms. The easiest architecture change is reducing queueing by adding replicas or admission control. To reach 120 ms, queueing must fall from 50 ms to at most 25 ms if prefill and network stay fixed.
  common_mistake: Optimizing model prefill first when queueing is the largest flexible component and the system is already near the P99 cliff.
  napkin_math: Target with headroom = 150 - 30 = 120 ms. Current = 70 + 50 + 25 = 145 ms. Required queueing <= 120 - 70 - 25 = 25 ms.
