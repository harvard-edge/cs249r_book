title: mmap for Zero-Copy Model Loading
scenario: 'You serve a 7B model (14 GB in FP16) on an H100 with 80 GB HBM. The model is stored on a local NVMe SSD (7 GB/s sequential read).'
question: 'What are the cold-start times and memory implications for malloc+read versus mmap, and when does each loading strategy win?'
details:
  realistic_solution: 'Strategy 1 (malloc + read): Allocates 14 GB in RAM, then sequentially reads the file. Time = 14 GB / 7 GB/s = 2.0 seconds. Memory: 14 GB resident immediately. Then cudaMemcpy to GPU: 14 GB / 64 GB/s (PCIe 5.0) = 0.22s. Total cold start: ~2.2s. Strategy 2 (mmap): Maps the file into virtual address space instantly (~0ms). Pages are loaded on demand via page faults. If you then copy to GPU, each page fault triggers a 4KB read — thousands of faults. Cold start can be slower (3-5s) due to fault overhead. However, mmap wins for: (1) warm restarts — pages stay in kernel page cache, no re-read needed, (2) multi-process serving — N processes share the same physical pages via copy-on-write, using 14 GB total instead of N × 14 GB, (3) partial model loading — only accessed layers are paged in. For inference serving with multiple replicas, mmap saves (N-1) × 14 GB of host RAM.'
  common_mistake: |
    **The Pitfall:** Thinking `mmap` is universally faster for file loading under all conditions.
    **The Rationale:** Engineers assume mapping a file directly to memory bypasses all I/O overhead.
    **The Consequence:** Using `mmap` for single-shot, cold-start model loading, which actually performs slower than bulk sequential reads due to severe page-fault latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 14 GB.
    - Sequential read: NVMe speed 7 GB/s, plus PCIe transfer.
    - mmap warm start: <0.1s.

    **Calculations:**
    - Sequential read: 14 GB / 7 GB/s = 2.0s + 0.22s PCIe transfer = ~2.2s cold start.
    - mmap cold start: ~3-5s due to thousands of 4KB page fault overheads.
    - Multi-process serving with 4 replicas: malloc uses 56 GB RAM.

    **Conclusion & Interpretation:**
    - **Result: 14 GB Shared RAM (mmap winner for replicas)**. For multi-process serving with 4 replicas, malloc uses 56 GB RAM, while mmap shares 14 GB, making it the clear winner for local sharing.
