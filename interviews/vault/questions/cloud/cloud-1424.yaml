title: Architectural Trade-offs in Data Integration
scenario: Your team is evaluating two custom AI accelerator architectures for a massive DLRM (Deep Learning Recommendation Model) inference fleet processing terabytes of sparse embeddings. Option A features 2 PFLOPS of peak compute with a standard 2 TB/s HBM2e memory subsystem. Option B provides only 500 TFLOPS of peak compute but utilizes a novel 3D-stacked packaging approach delivering 10 TB/s of memory integration bandwidth at 5x lower energy-per-bit for data movement.
question: Which accelerator option better minimizes TCO and tail latency for DLRM inference, and why?
details:
  realistic_solution: "Select Option B. DLRMs are fundamentally memory-bandwidth bound due to extremely low arithmetic intensity (~1-2 FLOPs/byte). The energy and latency costs of moving massive embedding tables to parallel compute units dictate performance, making Option B's superior bandwidth and lower data-movement energy the optimal TCO choice."
  common_mistake: |
    **The Pitfall:** Overvaluing peak compute (PFLOPS) and assuming Option A will yield higher throughput.
    **The Rationale:** Ignoring the fundamentally memory-bandwidth bound nature of DLRMs due to their extremely low arithmetic intensity.
    **The Consequence:** Selecting an accelerator that will sit mostly idle, wasting power and failing to meet latency targets.
  napkin_math: |
    - **Arithmetic Intensity:** Assume DLRM is ~2 FLOPs/Byte.
    - **Option A Throughput Limit:** 2 TB/s * 2 FLOPs/Byte = 4 TFLOPS (utilizing just 0.2% of its 2 PFLOPS).
    - **Option B Throughput Limit:** 10 TB/s * 2 FLOPs/Byte = 20 TFLOPS.
    - **Throughput Advantage:** Option B delivers 5x the real-world throughput.
    - **Result: Energy Efficiency: Off-chip memory access costs ~15-20 pJ/bit vs <0.1 pJ/bit for compute. Option B's 5x lower energy-per-bit dramatically reduces the primary power draw, optimizing TCO.**
