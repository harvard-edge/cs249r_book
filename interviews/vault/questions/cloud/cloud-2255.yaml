title: The Dialect Hierarchy Lowering
scenario: 'MLIR uses a hierarchy of dialects — from high-level ML operations down to hardware-specific instructions.'
question: "Why does an ML compiler need multiple IR levels instead of compiling directly from the computation graph to machine code?"
details:
  realistic_solution: 'Multi-level IRs enable optimizations at the right abstraction level. At the highest level (e.g., MLIR''s `linalg` dialect), the compiler reasons about entire tensor operations — fusing a matmul with its subsequent bias add and ReLU. At the mid level (e.g., `affine` or `scf` dialects), the compiler reasons about loop structures — tiling, unrolling, vectorization. At the lowest level (e.g., `llvm` or `gpu` dialects), the compiler reasons about register allocation and instruction scheduling. A direct single-pass compilation would either lose the high-level semantic information needed for operator fusion (if it lowers too early) or fail to exploit hardware-specific features like Tensor Cores (if it stays too abstract). The progressive lowering also enables retargetability: the same high-level optimizations apply whether the target is an NVIDIA GPU, AMD GPU, or TPU — only the final lowering pass changes.'
  common_mistake: |
    **The Pitfall:** Believing multiple levels add unnecessary complexity.
    **The Rationale:** Candidates assume a single-pass compiler would be simpler and faster, missing the importance of abstraction-specific optimizations.
    **The Consequence:** Failing to exploit hardware-specific features or losing high-level semantic information needed for operator fusion.
  napkin_math: |
    1. `torch` dialect (semantic ops).
    2. `linalg` dialect (tensor algebra, ~5 fusion passes).
    3. `affine` dialect (loop nests, ~8 tiling/vectorization passes).
    4. `gpu` dialect (thread mapping, ~3 passes).
    5. `nvvm` or `llvm` (codegen).
    6. **Result:** ~4 dialect levels and ~20 passes, each operating on the representation where its optimization is most natural.
