title: Diagnosing Depthwise Conv Underutilization
scenario: Your team is migrating a MobileNet-style CNN pipeline to run high-throughput batch inference on cloud NVIDIA A100 GPUs (312 TFLOPs FP16, 2.0 TB/s HBM bandwidth). The profiler reveals that despite using a massive batch size of 256, the GPU's Streaming Multiprocessors (SMs) show <20% utilization during the depthwise convolution layers.
question: Why do MobileNet depthwise convolutions show under 20% SM utilization on A100 even at batch size 256?
details:
  realistic_solution: Diagnose that depthwise convolutions have a fixed, extremely low arithmetic intensity that does not scale with channel count or batch size. Compare this intensity to the A100's roofline ridge point to prove the operation is severely memory-bandwidth bound, inevitably leaving compute units idle.
  common_mistake: |
    **The Pitfall:** Assuming low utilization is caused by CPU data-loading bottlenecks or kernel launch overheads.
    **The Rationale:** These are common traditional bottlenecks, so candidates default to them when debugging utilization drops.
    **The Consequence:** They miss the fundamental mathematical properties of the depthwise convolution, wasting time trying to optimize I/O instead of the algorithm.
  napkin_math: |
    - Depthwise conv FLOPs = 2 × H × W × C × K² × B.
    - Memory Bytes (FP16) = Read (2 × H × W × C × B) + Write (2 × H × W × C × B) = 4 × H × W × C × B.
    - Arithmetic Intensity (AI) = FLOPs / Bytes = (2 × K²) / 4 = K² / 2.
    - For a 3x3 kernel, AI = 9 / 2 = 4.5 FLOPs/Byte.
    - A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
    - **Conclusion:** Since 4.5 ≪ 156, the operation is severely memory-bandwidth bound, capping compute utilization.
