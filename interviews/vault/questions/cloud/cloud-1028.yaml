title: 'Diagnosing Depthwise Conv Underutilization'
scenario: 'Your team is migrating a MobileNet-style CNN pipeline to run high-throughput batch inference on cloud NVIDIA A100 GPUs. The profiler reveals that despite using a massive batch size of 256, the GPU SMs show <20% utilization during the depthwise convolution layers.'
question: 'Why do MobileNet depthwise convolutions show under 20% SM utilization on A100 even at batch size 256?'
details:
  realistic_solution: 'Diagnose that depthwise convolutions have a fixed, extremely low arithmetic intensity that does not scale with channel count or batch size. Compare this to the A100 roofline ridge point to prove it is severely memory-bandwidth bound.'
  common_mistake: |
    **The Pitfall:** Assuming low utilization is caused by CPU data-loading bottlenecks or kernel launch overheads.
    **The Rationale:** These are common traditional bottlenecks, so candidates default to them when debugging utilization drops.
    **The Consequence:** They miss the fundamental mathematical properties of the depthwise convolution, wasting time trying to optimize I/O instead of the algorithm.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 Ridge Point: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
       - 3x3 depthwise convolution.
    2. **Calculations:**
       - FLOPs: 2 × H × W × C × K² × B.
       - Bytes: 4 × H × W × C × B.
       - Arithmetic Intensity: FLOPs / Bytes = (2 × K²) / 4 = K² / 2.
       - For K=3, AI = 9 / 2 = 4.5 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 4.5 FLOPs/Byte ≪ 156 FLOPs/Byte. The operation is severely Memory-Bandwidth-Bound, leaving SMs idle.**
