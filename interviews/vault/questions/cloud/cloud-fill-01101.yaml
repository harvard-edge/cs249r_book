title: Optimizing Inference Routing for High-Throughput TPU v5e Farms
scenario: Imagine you're managing a large-scale inference service deployed on a fleet of Google TPU v5e
  accelerators. Each TPU v5e has 16 GB HBM, delivers 197 TFLOPS BF16, and offers 1.6 TB/s memory bandwidth.
  Your service handles millions of diverse inference requests per second, some of which are latency-sensitive,
  others throughput-sensitive. Currently, you're observing inconsistent latency and underutilized TPUs,
  especially when traffic patterns change rapidly or when certain models become more popular. The existing
  request routing mechanism uses a simple round-robin approach. Your task is to diagnose the bottlenecks
  and propose an optimized request routing strategy that maximizes TPU utilization and minimizes inference
  latency, particularly under fluctuating load. You need to quantify the potential improvements.
question: "How would you replace round-robin with adaptive routing for TPU v5e inference to improve utilization and latency under fluctuating load?"
details:
  realistic_solution: Implement a dynamic, intelligent request routing strategy leveraging consistent
    hashing combined with a least-loaded or weighted round-robin approach. Utilize consistent hashing
    to map specific model requests or user sessions to a subset of TPUs, improving data locality (e.g.,
    model weights in HBM) and reducing reloads. Introduce a feedback mechanism where the load balancer
    continuously monitors real-time TPU metrics (e.g., queue depth, inference latency, HBM utilization,
    accelerator idle cycles). Dynamically adjust routing weights or directly route new requests to the
    least-loaded TPU within the consistent hashing bucket. Implement quality-of-service (QoS) differentiation,
    allowing critical, latency-sensitive inference requests to be prioritized or routed to TPUs with guaranteed
    capacity, possibly through dedicated queues or dynamic preemption. This adaptive strategy minimizes
    rebalancing costs, distributes load more evenly across heterogeneous workloads, and responds effectively
    to traffic fluctuations and individual TPU performance characteristics.
  common_mistake: Applying a naive load balancing strategy (like simple round-robin) without considering
    the heterogeneity of requests (e.g., varying model sizes, computational complexity, memory access
    patterns) or the dynamic load and state of individual TPUs. This often leads to hot-spotting, queueing
    delays for certain instances, and underutilization of available accelerators, despite overall system
    capacity appearing sufficient. Another mistake is overlooking the overhead introduced by the load
    balancing mechanism itself.
  napkin_math: If 20% of your 100 TPU v5e instances are consistently overloaded at 50% throughput capacity
    (due to queueing/bottlenecks) while the remaining 80% are only 70% utilized due to uneven distribution,
    the effective overall utilization is (0.2 * 0.5 + 0.8 * 0.7) = 0.1 + 0.56 = 0.66 (66%). By implementing
    an optimized routing strategy that achieves an average 90% utilization across all TPUs, you could
    increase effective throughput by (0.90 / 0.66) - 1 ≈ 36%. For a model requiring 50 GB of data transfer
    per inference, a single TPU v5e (1.6 TB/s HBM bandwidth) could theoretically sustain 1.6 TB/s / 50
    GB/inference = 32 inferences/second based on memory bandwidth alone. If a naive load balancer bottlenecks
    traffic to 5 TPUs for this model when 20 are suitable, total throughput is 5 * 32 = 160 inferences/second.
    An optimized router distributing this evenly across 20 TPUs could achieve 20 * 32 = 640 inferences/second
    for this workload type, assuming compute (197 TFLOPS BF16) is also available.
