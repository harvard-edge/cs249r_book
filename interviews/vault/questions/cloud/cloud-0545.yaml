title: The Multi-Tenant Priority Inversion
scenario: 'Your platform serves two customer tiers from a single H100 cluster: ''Premium'' customers running
  latency-sensitive dialogue agents (P99 TTFT < 200ms) and ''Standard'' customers running large, asynchronous
  document analysis jobs. The system uses a single global FIFO queue to feed the continuous batcher. During
  a product launch for a Standard-tier customer, your Premium-tier customers report catastrophic timeouts,
  with latencies exceeding 30 seconds. The on-call playbook suggests adding more GPUs to handle the load.
  Critique this playbook action. Justify why it''s wrong and propose a more robust architectural solution.'
details:
  realistic_solution: 'The playbook is wrong because this is a scheduling problem, not a capacity problem.
    The FIFO queue causes Head-of-Line blocking: Premium requests (200ms) queue behind Standard jobs (30s
    each). With 50 queued Standard jobs and 8 GPUs, Premium waits 187.5 seconds (937× SLA). Adding GPUs
    reduces transient wait but doesn''t fix the priority inversion — Premium still queues behind Standard
    in FIFO order. The fix: multi-level priority queue where Premium always preempts Standard, achieving
    sub-200ms wait with zero additional hardware.'
  common_mistake: Following the playbook. Adding more GPUs (scaling out) will increase the system's total
    throughput but it will *not* solve the priority inversion problem. The new GPUs will simply pick up
    more work from the front of the FIFO queue, which is still clogged with low-priority Standard jobs.
    The Premium requests are still stuck at the back of the line.
  napkin_math: '**Assumptions:** H100 cluster, 8 GPUs, single FIFO queue. Standard jobs: 30s processing
    each, arriving at 20 jobs/min during launch surge. Premium jobs: 200ms processing, P99 TTFT < 200ms.


    **During surge:** Arrival rate = 20 jobs/min = 0.33 jobs/s. Service rate = 8 GPUs / 30s = 0.267 jobs/s.
    Queue grows unboundedly (arrival > service). After ~25 min: ~50 Standard jobs queued.


    **Premium wait with 50 queued Standard jobs:** Wait = (50 jobs / 8 GPUs) × 30s/job = 187.5 seconds
    = 937× the 200ms SLA.


    **Adding 8 more GPUs (playbook action):** Service rate = 16/30s = 0.533 > 0.33 → queue drains eventually.
    But transient wait: 50 × 30 / 16 = 93.75s — still 468× SLA. And even in steady state, FIFO ordering
    means Premium sits behind Standard. With 10 Standard jobs ahead: 10 × 30 / 16 = 18.75s = 93× SLA.


    **With priority queuing:** Premium jumps to front. Wait ≈ 0 Standard jobs ahead, processing = 200ms.
    Within SLA with zero additional hardware.'
