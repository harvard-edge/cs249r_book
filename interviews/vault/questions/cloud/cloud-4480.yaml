title: Sequence Model for Session-Based Recommendation Serving Latency
scenario: A session-based recommendation system uses a 4-layer Transformer on session
  histories (up to 200 items). Average session length is 50 items. Session encoding
  adds 15ms to serving latency (vs 2ms for simpler session features). Analyze whether
  Transformer session encoding is justified.
question: Is a 15ms Transformer session encoder justified over 2ms session features,
  and what serving architecture would you choose?
details:
  realistic_solution: 'Latency-quality tradeoff analysis: (1) Quality uplift: Transformer
    session encoder typically improves ranking NDCG by 1-3% vs MLP on session features
    in production. (2) Serving latency cost: 15ms for Transformer vs 2ms for MLP on
    session. Additional 13ms = 13% of a 100ms SLO. (3) Throughput impact: at 5K QPS,
    with batching, serving node processes requests with ~75 GPU-seconds/sec demand.
    Cost: 75 GPUs × $3/hr = $225/hr = $5,400/day.
    (4) Alternative: pre-compute Transformer session encoding offline for each active
    session. Update every 30 seconds (rolling). At serving: 2ms lookup (pre-computed
    session embedding). Quality: 30-second staleness vs 13ms latency savings. For
    most sessions (>30 sec intervals between requests), pre-compute is equivalent
    to online. (5) Decision: use pre-computed session embeddings. Same quality, 15ms
    → 2ms serving latency. Only compute online for first request of new session.'
  common_mistake: Evaluating the Transformer session encoder in isolation on offline
    metrics without accounting for serving latency cost and the opportunity cost of
    the 13ms latency budget reallocation.
  napkin_math: '5K QPS, online Transformer: 5K × 15ms / 1000 = 75 GPU-seconds/sec
    needed. Transformer session encoder: 4 layers, 50 tokens, d=256. FLOPs ≈ (24×seq×d² + 4×seq²×d) × layers
    = (78.6M + 2.56M) × 4 ≈ 324.6M FLOP. H100: 324.6M / 989T = 0.00033ms. Wait — 15ms overhead
    is not compute. It is: tokenization (1ms) + embedding lookup (5ms) + attention
    (0.33ms) + Python overhead (~9ms). Pre-compute: eliminates tokenization + attention
    + Python overhead = saves ~10ms. Serving latency: 2ms lookup. 13ms savings.'
