title: Continuous Batching and Tail Latency Reduction
scenario: Compare static batching vs continuous batching (Orca-style iteration-level scheduling) for an
  MI300X serving a 70B model. With static batching of 32 requests, a short 50-token generation must wait
  for a 500-token generation to complete before the batch releases. Quantify the latency waste and design
  the continuous batching scheduler, including memory management for variable-length KV caches using Infinity
  Fabric-connected HBM3.
details:
  realistic_solution: 'Page size = tokens × layers × KV_heads × head_dim × bytes × 2(K+V). With 16 KV
    heads: 16 × 80 × 16 × 128 × 2B × 2 = 10.4 MB (not 5.2 MB which uses 8 KV heads and misses ×2 for K+V).'
  common_mistake: Implementing continuous batching without PagedAttention. Naive continuous batching still
    fragments GPU memory because KV caches have variable lengths, leading to OOM at high concurrency despite
    having enough total memory.
  napkin_math: 'PagedAttention page size: 16 tokens × 80 layers × 8 KV heads (GQA) × 128 dim × 2 bytes
    × 2 (K AND V) = 16 × 80 × 8 × 128 × 2B × 2 = 16 × 80 × 8 × 128 × 4 = 52,428,800 bytes ≈ 50MB... Let
    me recalculate: 16 × 80 × 8 × 128 × 2 × 2 = 16×80=1280; ×8=10,240; ×128=1,310,720; ×2(bytes)=2,621,440;
    ×2(K and V)=5,242,880 bytes = 5MB. But Gemini says 10.4 MB. Missing the ×2 for K+V: original calculates
    16 × 80 × 8 × 128 × 2B = 2,621,440 bytes = 2.5 MB (per K or V). Full K+V: ×2 = 5.24 MB ≈ 5.2 MB. Hmm,
    Gemini says 10.4 MB which doubles again... 10.4MB = 5.2MB × 2: perhaps the original used 5.2MB and
    Gemini says it should be 10.4MB with a different calculation. Using 16 × 80 × 8 × 128 × 2B × 2(K+V)
    = 5.24 MB. Or with 16 KV heads (not 8): 16 × 80 × 16 × 128 × 2B × 2 = 10.49 MB ≈ 10.4 MB. Fix: use
    16 KV heads: page size = 16 × 80 × 16 × 128 × 2B × 2 = 10.4 MB.'
