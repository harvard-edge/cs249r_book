title: 'Kernel Fusion: Mastery — Fusion Impact Analysis for Autoregressive Decode'
scenario: You are analyzing kernel fusion impact for 7B LLM autoregressive decode
  on H100 (80GB HBM3, 3.35 TB/s). Decode is batch=1, seq=1 (single token generation).
  Profile shows 60% of decode time is in elementwise ops (LayerNorm, GELU, residuals,
  rotary embeddings). Design and quantify a fusion strategy for decode mode.
question: For 7B batch=1 decode on H100, what fusion strategy is useful, and are the
  gains from bandwidth reduction or kernel-launch overhead?
details:
  realistic_solution: 'Decode bottleneck: loading 7B × 2B = 14GB model weights per
    forward pass. At H100 3.35 TB/s: 14GB / 3.35TB/s = 4.2ms minimum. Elementwise
    ops run on the tiny (1 × hidden_dim) activation tensors — their memory bandwidth
    is negligible. However, they execute so fast that the GPU starves waiting for the CPU
    to launch the next kernel. Fusion helps by eliminating exposed kernel launch overhead,
    allowing the system to approach the 4.2ms bandwidth limit.'
  common_mistake: Applying prefill-optimized fusion strategies to decode — different
    bottleneck structure. Decode is dominated by weight loading (memory-bound), not
    compute.
  napkin_math: '7B model decode, batch=1. Weight memory: 14GB loaded per token. At
    3.35 TB/s: 4.2ms/token hardware minimum limit. Linear layers (224 kernels) take
    18.6µs each, so CPU launch (3µs) is hidden. Elementwise ops on 1 × 4096 activations: 4096 × 2B = 8KB.
    Actual elementwise HBM traffic: 32 layers × 6 ops × 8KB = 1.5MB → 1.5MB / 3.35TB/s = 0.45µs.
    But CPU kernel launch takes 3µs. Since 0.002µs < 3µs, GPU waits for CPU.
    Elementwise ops add 32×6 = 192 kernel launches × 3µs = 576µs = 0.58ms of exposed overhead.
    Current decode time: 4.2ms (weights) + 0.58ms (overhead) = 4.78ms → 209 tokens/sec.
    Fusion benefit: fuse elementwise ops into adjacent linear kernels to eliminate 192 launches.
    New decode: 4.78ms - 0.58ms = 4.2ms → 238 tokens/sec. 14% throughput improvement purely from reduced kernel launch overhead.'
