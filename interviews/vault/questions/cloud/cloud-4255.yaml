title: 'Gradient accumulation correctness with DDP and autograd on MI300X'
scenario: You are using PyTorch DDP across 8 MI300X GPUs with gradient accumulation over 4 micro-batches. Effective batch size should be 2048. But validation loss is worse than the 8-GPU baseline without accumulation, suggesting gradients are not being averaged correctly.
question: If each of 8 MI300X GPUs has a 2 GB gradient, how much total network traffic does one ring AllReduce move?
details:
  realistic_solution: '8 GPUs x 2GB gradient each = 16GB total gradient data transferred. Total network bytes in ring AllReduce = 2 x (N-1)/N x D per GPU x N GPUs = 2 x 7/8 x 2GB x 8 GPUs = 28GB network traffic.'
  common_mistake: |
    **The Pitfall:** Not using `ddp_model.no_sync()` during micro-batch accumulation steps.
    **The Rationale:** Without `no_sync()`, DDP triggers an AllReduce after every backward call, averaging gradients over the wrong effective batch size.
    **The Consequence:** Gradient averaging is applied 4 times instead of once, fundamentally altering the math and degrading convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs, 2 GB gradient per GPU.
    
    **Calculations:**
    - Total Gradient Transferred: 8 GPUs * 2 GB = 16 GB unique data.
    - Ring AllReduce Traffic: 2 * (7/8) * 2 GB * 8 GPUs = 28 GB total network bytes.
    
    **Conclusion & Interpretation:**
    - **Result: 28 GB traffic (Network-Bound)**. One ring AllReduce moves 28 GB of traffic across the network.
