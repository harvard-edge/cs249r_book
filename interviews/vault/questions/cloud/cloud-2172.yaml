title: The Kernel Launch Overhead Wall
scenario: You are profiling a transformer inference pipeline and notice that the GPU is idle 60% of the time despite running a compute-heavy model. The Nsight Systems trace shows hundreds of tiny kernels each taking 5-20 microseconds of GPU time, but separated by 10-15 microsecond gaps. The total kernel launch overhead exceeds the total kernel compute time.
question: "How do you eliminate kernel launch overhead, and what are the tradeoffs of each approach?"
details:
  realistic_solution: 'There are three complementary approaches: (1) Kernel fusion: Merge sequential element-wise operations into a single kernel, eliminating intermediate HBM writes and launch gaps. Tradeoff: custom kernel development cost, harder to debug. (2) CUDA Graphs: Capture the entire sequence of kernel launches once, then replay with a single CPU dispatch. This reduces CPU-side overhead from ~10µs to ~0.5µs. Tradeoff: the graph is static — you cannot change tensor shapes or batch size without recapturing. (3) Persistent kernels: launch one large kernel that loops internally, avoiding returning to the CPU scheduler entirely. Tradeoff: requires careful SM workload balancing. Optimal solution: fuse where possible, use CUDA Graphs for the static prefill phase, and persistent kernels for the dynamic decode phase.'
  common_mistake: |
    **The Pitfall:** Throwing more hardware at the problem (scaling up the GPU).
    **The Rationale:** Assuming idle time means the current GPU isn't fast enough.
    **The Consequence:** A bigger GPU makes each kernel execute even faster, worsening the ratio of launch overhead to compute time and further dropping utilization.
  napkin_math: |
    1. **Assumptions & Constraints:** 200 kernels, 10μs compute, 12μs launch gap vs 0.5μs CUDA graph overhead.
    2. **Calculations:** Baseline = (200*12μs gap) + (200*10μs compute) = 4.4ms (45% util). Fusion (50 kernels) = (50*12μs) + 2.0ms = 2.6ms (77% util). Fusion + Graphs = (50*0.5μs) + 2.0ms = 2.025ms (99% util).
    3. **Conclusion & Interpretation:** **Result: CPU-Bound.** Eliminating launch overhead drives GPU utilization from 45% to 99%.
