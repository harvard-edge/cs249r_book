title: P99 vs P999 Tradeoffs in Batching Strategy
scenario: An ML serving system on MI300X (192GB HBM3, 5.3TB/s) uses dynamic batching with a 20ms timeout
  and max batch size 64. P50 latency is 35ms, P99 is 95ms. A product team requests P999 < 200ms. The current
  P999 is 450ms, caused by requests that wait the full 20ms timeout but end up in a large batch.
details:
  realistic_solution: 'Implement adaptive batching: use a short timeout (5ms) for small batches (<=8 requests)
    but allow larger batches to form when queue depth exceeds 32. Add a per-request max-wait SLA of 15ms.
    Monitor queue depth as a leading indicator. MI300X''s 5.3TB/s bandwidth means small batches are not
    significantly penalized.'
  common_mistake: Reducing batch timeout to 5ms improves P999 but reduces GPU utilization from 80% to
    45%, increasing cost by ~78% with only marginal P50 improvement.
  napkin_math: 'MI300X 5.3TB/s bandwidth: loading a 7B model (14GB BF16) takes 14GB/5.3TB/s = 2.6ms. Batching
    8 vs 64 requests: compute scales linearly, bandwidth cost is amortized. Batch-8 at 5ms timeout: total
    latency = 5ms wait + 2.6ms load + compute. Batch-64: 20ms wait + same load + 8x compute. For latency-sensitive
    workloads, batch-8 wins.'
