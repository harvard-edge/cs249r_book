title: TP and Attention Head Partitioning
scenario: A model has 32 attention heads. Your cluster has 8 GPUs per node.
question: "With 32 attention heads on 8-GPU nodes, can you use TP=8 or TP=6, and what head-divisibility constraint governs TP degree?"
details:
  realistic_solution: TP=8 works perfectly (32/8 = 4 heads per GPU). TP=6 is invalid because 32/6 = 5.33. You cannot split an individual attention head across GPUs without fundamentally changing the computation, as each head's projections are tightly coupled. Therefore, the TP degree must evenly divide the total number of attention heads. Practically, TP is always a power of 2.
  common_mistake: |
    **The Pitfall:** Assuming any arbitrary TP degree can be used.
    **The Rationale:** Candidates view Tensor Parallelism as simple block-matrix slicing and forget that Attention heads enforce strict logical boundaries.
    **The Consequence:** Attempting to run TP=6 results in immediate framework crashes during model initialization because tensors cannot be partitioned evenly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attention Heads: 32.
    - Hardware: 8 GPUs/node.
    - Tensor Parallelism (TP) divisibility rule.

    **Calculations:**
    - TP=8 validation: 32 heads / 8 GPUs = 4 heads/GPU (Integer, valid).
    - TP=6 validation: 32 heads / 6 GPUs = 5.33 heads/GPU (Fractional, invalid).
    - An individual attention head projection cannot be sharded across GPUs without entirely changing the fundamental mathematical architecture.

    **Conclusion & Interpretation:**
    - **Result: TP=6 invalid (Topology-Bound)**. TP=6 triggers an immediate crash. TP degree MUST be an integer factor of total heads (1, 2, 4, 8, 16, 32).
