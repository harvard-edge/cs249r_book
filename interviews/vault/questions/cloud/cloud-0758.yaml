title: The Checkpoint Serialization Freeze
scenario: Your infrastructure team requires saving a checkpoint every 30 minutes to an AWS S3 bucket.
  Your 70B model checkpoint is 140 GB. When the checkpoint function is called, GPU utilization drops to
  0% for almost 3 minutes. Your team suggests upgrading to a faster S3 tier. Why won't faster S3 fix the
  3-minute stall?
question: "Why won't faster S3 fix the 3-minute stall?"
details:
  realistic_solution: 'The 3-minute stall is caused by single-threaded Python pickle serialization on
    the CPU, not network upload speed. Before any data reaches S3, PyTorch must serialize 140GB of GPU
    tensors: copy from GPU to CPU RAM (fast, ~5 seconds), then pickle the CPU tensors into a byte stream
    (slow, ~175 seconds at 800 MB/s single-threaded). The GPU sits idle during this entire process because
    the training loop is synchronous. The fix: use async checkpointing (serialize in a background thread),
    use `torch.save` with `safetensors` format (faster serialization), or pipeline GPU-to-CPU copy with
    serialization.'
  common_mistake: '"S3 upload bandwidth is the bottleneck." S3 can easily handle massive parallel throughput.
    The bottleneck is the CPU serialization process.'
  napkin_math: 'Single-threaded `pickle` serialization speed: ~800 MB/s. 140,000 MB / 800 MB/s = 175 seconds
    (nearly 3 minutes) of pure CPU bottleneck before the data even hits the network interface.'
