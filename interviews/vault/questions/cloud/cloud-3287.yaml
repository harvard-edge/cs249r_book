title: 'TPU v5e Memory Management: Diagnosing OOMs in Large Model Training'
scenario: You are training a large language model on a Google TPU v5e pod, with each TPU offering 16 GB of HBM and 197 TFLOPS BF16 compute. Your model's BF16 checkpoint size is 40GB, and activations for a global batch size of 2048 consume 10GB on each TPU core. You've implemented an optimizer that offloads its states to host memory, yet you frequently encounter Out-Of-Memory (OOM) errors during training.
question: Why do OOMs still occur on 16 GB TPU v5e HBM despite optimizer offload, and how would you reduce the peak memory footprint?
details:
  realistic_solution: Implement gradient accumulation with a reduced per-step batch size (e.g., 512) to significantly lower the peak activation memory footprint on HBM. Utilize activation checkpointing/re-materialization strategies to trade re-computation for memory savings. Employ TPU-specific memory profiling tools (like `tf.profiler`) to precisely identify memory hotspots, temporary allocations, and potential fragmentation. Investigate model architecture for opportunities to reduce activation size or re-shard model parameters more aggressively.
  common_mistake: |
    **The Pitfall:** Overlooking the combined peak memory requirements of activations and sharded weights.
    **The Rationale:** Engineers assume offloading optimizer states is sufficient to fit within device HBM, underestimating temporary allocations and activation memory.
    **The Consequence:** Unexpected OOM errors during training due to insufficient device memory capacity.
  napkin_math: |
    1. Calculate weight memory per core (40GB sharded across 4 cores): 10 GB.
    2. Calculate activation memory (batch size 2048): 10 GB.
    3. Total memory without accumulation: 10 GB + 10 GB = 20 GB (> 16 GB limit).
    4. Calculate memory with accumulation (count = 4, batch = 512): Activation memory = 2.5 GB.
    5. Total memory with accumulation: 10 GB + 2.5 GB = 12.5 GB.
    **Final Result: Gradient accumulation reduces peak memory to 12.5 GB, fitting the 16 GB limit.**
