title: The Tensor Parallelism Choke Point
scenario: 'You are diagnosing a performance issue in a large-scale LLM training job using 8-way tensor parallelism. The job runs across two servers, each with four H100 GPUs. Profiling shows that an `All-Reduce` operation on a 4 GB tensor is a major bottleneck. Your servers use NVLink 4.0 for intra-node GPU communication and InfiniBand NDR for inter-node communication.'
question: 'How long should the 4GB all-reduce take with all 8 GPUs on NVLink versus split across two servers, and what bottleneck does this reveal?'
details:
  realistic_solution: 'The primary bottleneck is the dramatic drop in bandwidth when communication must leave the server and traverse the InfiniBand network. Intra-node communication happens over the ultra-high-bandwidth NVLink fabric, while inter-node communication is limited by the speed of the network interface cards and switches, which is an order of magnitude slower. The `All-Reduce` operation becomes bound by the slowest link in the chain, which is the inter-node InfiniBand connection.'
  common_mistake: |
    **The Pitfall:** Underestimating the bandwidth gap between on-node and off-node interconnects.
    **The Rationale:** Engineers assume standard network cards are "fast enough" or blame software overhead (NCCL).
    **The Consequence:** Splitting Tensor Parallelism domains across physical nodes, totally crippling MFU.
  napkin_math: |
    - **Data Size:** 4 GB tensor. Ring All-Reduce transfers 2 × (N-1)/N × Size per link.
    - **Effective Volume (N=8):** 2 × 7/8 × 4 GB = 7 GB per link.
    - **Case A (NVLink 4.0):** 7 GB / 900 GB/s = ~7.8 ms.
    - **Case B (InfiniBand NDR):** The cross-node IB link capacity is 400 Gbps (50 GB/s unidirectional).
    - **Inter-Node Transfer Time:** 7 GB / 50 GB/s = 140 ms.
    - **Slowdown:** 140 ms / 7.8 ms = ~18× slower when crossing the server boundary.
  options:
  - The bottleneck is PCIe Gen5 bandwidth, as the data must cross the PCIe bus to reach the network card, adding ~20ms of latency.
  - Software overhead in the NCCL communication library is the primary issue; the hardware difference between NVLink and InfiniBand is negligible for large transfers.
  - The bottleneck is the InfiniBand NDR link, which has ~18x less bandwidth (50 GB/s vs 900 GB/s). The inter-node transfer takes ~140ms vs ~7.8ms for the all-NVLink case, making inter-node communication dominant.
  - The bottleneck is HBM memory access latency; reading the 4 GB tensor from HBM on each GPU is slower than the network transfer itself.
  correct_index: 2
