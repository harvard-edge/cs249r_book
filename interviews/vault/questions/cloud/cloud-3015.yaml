title: 'Latency Decomposition: Compare KV-Cache vs. No-Cache Decode Latency on H100'
scenario: A serving team debates whether to enable KV-cache for a 7B-parameter model
  on H100 (80GB HBM3, 3.35TB/s). With KV-cache, each decode step reads model weights
  (14GB at FP16) plus KV entries for past tokens. Without KV-cache, the full attention
  recomputes over the sequence. Compare the per-token decode latency for both approaches
  at sequence length 1024.
question: At sequence length 1024, how does per-token decode latency compare with
  and without a KV cache for the 7B model?
details:
  realistic_solution: 'With KV-cache: each decode step reads 14GB weights + 2×(1024
    tokens)×(4096 dim)×2 bytes×32 layers ≈ 14GB + 0.54GB = 14.54GB → 14.54GB/3.35TB/s
    ≈ 4.3ms/token. Without cache: full attention over 1024 tokens adds O(n²) ops.
    At 1024 tokens, attention FLOPs ≈ 2×1024²×4096×32 ≈ 275B FLOPs → 0.28ms on H100
    at 989 TFLOPS, but memory for Q/K/V reads grows. KV-cache wins on latency at long
    sequences.'
  common_mistake: Forgetting that without KV-cache, attention cost scales quadratically
    with sequence length, making recomputation increasingly expensive at long contexts.
  napkin_math: 'KV per layer per token: 2 × 4096 × 2 bytes = 16KB. 32 layers × 1024
    tokens = 512K entries × 16KB = ~524MB KV. Weights: 7B × 2 = 14GB. Total read:
    ~14.5GB. 14.5GB / 3.35TB/s ≈ 4.3ms/token.'
