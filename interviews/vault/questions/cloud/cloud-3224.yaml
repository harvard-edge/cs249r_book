title: KV-Cache Impact on Decode Memory Bandwidth
scenario: During autoregressive decode of Llama 3 70B on 2xH100, each new token must attend to all previous KV-cache entries.
question: At position 4096, how much bandwidth is spent loading KV-cache versus 70B model weights during decode, and which dominates?
details:
  realistic_solution: 'Per decode step at position 4096: (1) Model weight loading: 70B \times 2B = 140 GB per token (must load all weights for one token). (2) KV-cache loading for attention: 4096 tokens \times 8 KV heads \times 128 dim \times 2B \times 2 (K+V) \times 80 layers = 4096 \times 320 KB = 1.31 GB. Total bandwidth per decode step: 140 GB (weights) + 1.31 GB (KV) = 141.31 GB. KV-cache is only 0.93% of bandwidth at 4K — weights dominate. At 128K context: KV-cache = 128K \times 320 KB = 40.96 GB. Total: 140 + 41 = 181 GB. KV is now 22.6% of bandwidth. At 512K context (if supported): KV = 163.8 GB, exceeding weights (140 GB). KV becomes the bandwidth bottleneck. The crossover point: when KV-cache per token \times context_length > weight_size. For 70B: 320 KB \times N > 140 GB \rightarrow N > 437,500 tokens. Below 437K tokens, weights dominate; above, KV-cache bandwidth dominates.'
  common_mistake: |
    **The Pitfall:** Ignoring KV-cache memory bandwidth consumption.
    **The Rationale:** Candidates focus solely on the massive parameter count of the model weights, forgetting that the KV cache grows linearly with sequence length.
    **The Consequence:** Severely underestimating decode latency for long-context requests, as KV-cache loading becomes the dominant memory bandwidth bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model (140GB weights).
    2. **Calculations:**
       - KV bandwidth at 4K: 4096 * 8 heads * 128 dim * 2B * 2 * 80 = 1.31 GB.
       - KV bandwidth at 128K: 128K * 320 KB = 41 GB.
       - Crossover point: 140 GB / 320 KB = 437,500 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Weights dominate at 4K. KV-cache dominates past 437K context.**
