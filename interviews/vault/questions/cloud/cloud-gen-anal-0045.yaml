title: MoE Capacity Factor Communication Overhead
scenario: You are training an 8-expert MoE model on an 8x A100 node (80 GB HBM2e, 2.0 TB/s bandwidth,
  NVLink 900 GB/s), with 1 expert per GPU using expert parallelism. The global batch size is 16 and sequence
  length is 2048 (total 32,768 tokens). To reduce token dropping, the team increases the capacity factor
  from 1.0 to 1.5. However, profiling shows that the latency of the All-To-All communication step increases
  by exactly 50%, even though the total number of valid tokens routed among the GPUs remains exactly the
  same. Given that NVLink bandwidth is constant, why does this system behavior occur?
question: "Why does raising the MoE capacity factor from 1.0 to 1.5 increase All-To-All latency by 50% even though valid routed tokens are unchanged?"
details:
  realistic_solution: 'In standard expert parallelism, collective communication operations (like All-To-All)
    require statically sized buffers to avoid dynamic allocation and synchronization overheads. The buffer
    size for each expert is determined by the capacity factor: Capacity = (Total Tokens / Num Experts)
    * Capacity Factor. When the capacity factor increases from 1.0 to 1.5, the allocated buffer size increases
    proportionally. Because the system must transmit the entire buffer, including padding tokens used
    when an expert doesn''t reach full capacity, the total communication volume and latency increase by
    50% regardless of the actual valid token distribution.'
  common_mistake: Candidates often assume that only the valid, routed tokens are transmitted over the
    network. They might incorrectly attribute the slowdown to computation imbalance (load balancing) or
    NVLink congestion rather than the fixed-size buffer allocations required for collective communication.
  napkin_math: Total tokens = 16 * 2048 = 32,768. Base capacity per expert (CF=1.0) = 32,768 / 8 = 4,096
    tokens. With CF=1.5, capacity = 4,096 * 1.5 = 6,144 tokens. Assuming a hidden size of 4096 (FP16 =
    8192 Bytes/token), the All-To-All buffer sent per GPU at CF=1.0 is 8 experts * 4096 tokens * 8192
    B = 268.4 MB. At CF=1.5, it is 8 * 6144 * 8192 B = 402.6 MB. 402.6 MB / 268.4 MB = 1.5x increase in
    communication volume, directly explaining the 50% latency increase over NVLink.
