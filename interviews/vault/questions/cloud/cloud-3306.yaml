title: H100 LLM Training Latency Bottleneck
scenario: 'A machine learning team is training a large language model on a cluster utilizing NVIDIA H100 GPUs. Each H100 boasts 80 GB of HBM3 memory, 989 TFLOPS of FP16 dense compute performance, and a memory bandwidth of 3.35 TB/s. The team observes that their training throughput is significantly below expectations, with individual H100 GPU utilization metrics consistently hovering around 40-50%, despite the theoretical compute capacity being more than sufficient for the model architecture.'
question: 'What are the initial steps to diagnose this latency issue, and what specific H100 hardware characteristics should be considered during the analysis?'
details:
  realistic_solution: 'The team should leverage profiling tools specifically designed for NVIDIA GPUs, such as NVIDIA Nsight Systems or PyTorch Profiler with CUDA tracing enabled. The profiling should focus on capturing detailed timelines of kernel execution, data transfers, and memory access patterns on the HBM3. Analysis should look for compute stalls, memory bottlenecks, I/O delays, and inter-GPU communication overhead. Flame graphs generated from Nsight Systems can help visualize the hottest code paths.'
  common_mistake: |
    **The Pitfall:** Immediately assuming underutilization is due to insufficient batch size.
    **The Rationale:** Engineers apply standard heuristics without profiling kernel execution times.
    **The Consequence:** Prematurely increasing batch sizes or adding GPUs, which escalates operational costs without resolving the fundamental performance bottleneck.
  napkin_math: |
    - **Compute Utilization:** 50% of the H100's 989 TFLOPS dense performance is ~494.5 TFLOPS. This implies the workload isn't compute-bound or compute units are stalled.
    - **Memory Bandwidth Check:** If a specific HBM3-bound kernel theoretically requires 1TB of data to be processed in 0.5s, its target bandwidth is 2 TB/s.
    - **Bottleneck Identification:** If it actually takes 2 seconds, the effective bandwidth is 500GB/s (1TB / 2s), which is far below the peak 3.35 TB/s. This gap indicates severe memory contention or uncoalesced memory access.
