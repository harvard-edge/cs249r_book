title: H100 LLM Training Latency Bottleneck
scenario: A machine learning team is training a large language model on a cluster utilizing NVIDIA H100 GPUs. The team observes that their training throughput is significantly below expectations, with individual H100 GPU utilization metrics consistently hovering around 40-50%, despite the theoretical compute capacity being more than sufficient for the model architecture.
question: What are the initial steps to diagnose this latency issue, and what specific H100 hardware characteristics should be considered during the analysis?
details:
  realistic_solution: Leverage profiling tools specifically designed for NVIDIA GPUs, such as NVIDIA Nsight Systems (nsys profiling) or PyTorch Profiler with CUDA tracing enabled. The profiling should focus on capturing detailed timelines of kernel execution, data transfers, and memory access patterns on the HBM3. Analysis should look for compute stalls, memory bottlenecks, I/O delays, and inter-GPU communication overhead.
  common_mistake: |
    **The Pitfall:** Prematurely increasing batch sizes or adding GPUs to solve underutilization.
    **The Rationale:** Relying on basic heuristics instead of rigorous kernel profiling.
    **The Consequence:** Escalating operational costs dramatically without resolving the fundamental memory or communication bottlenecks stalling the compute units.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 Peak Compute: 989 TFLOPS. Peak Bandwidth: 3.35 TB/s.
       - Utilization: ~50% (494.5 TFLOPS).
    2. **Calculations:**
       - Target Bandwidth for Kernel (e.g., 1TB in 0.5s): 2 TB/s.
       - Actual Exec Time (e.g., 1TB in 2s): 500 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Contention Bound.** A gap of 500 GB/s actual vs 3.35 TB/s peak bandwidth explicitly indicates severe uncoalesced memory access or stalls, not a lack of available compute FLOPs.
