title: H100 LLM Training Latency Bottleneck
scenario: A machine learning team is training a large language model on a cluster
  utilizing NVIDIA H100 GPUs. Each H100 boasts 80 GB of HBM3 memory, 989 TFLOPS of
  FP16 dense compute performance, and a memory bandwidth of 3.35 TB/s. The team observes
  that their training throughput is significantly below expectations, with individual
  H100 GPU utilization metrics consistently hovering around 40-50%, despite the theoretical
  compute capacity being more than sufficient for the model's architecture. The primary
  business concern is the high training latency per batch, leading to slower iteration
  cycles. What are the initial steps to diagnose this latency issue, and what specific
  H100 hardware characteristics should be considered during the analysis?
question: What are the initial steps to diagnose this latency issue, and what specific
  H100 hardware characteristics should be considered during the analysis?
details:
  realistic_solution: "The team should leverage profiling tools specifically designed\
    \ for NVIDIA GPUs, such as NVIDIA Nsight Systems or PyTorch Profiler with CUDA\
    \ tracing enabled. The profiling should focus on capturing detailed timelines\
    \ of kernel execution, data transfers (PCIe between host and device, or NVLink\
    \ between GPUs), and memory access patterns on the HBM3. Analysis should look\
    \ for: \n1. **Compute Stalls:** Gaps in GPU kernel execution indicating waiting\
    \ on data or CPU. \n2. **Memory Bottlenecks:** Low HBM3 bandwidth utilization\
    \ or high memory latency, potentially due to uncoalesced memory accesses or excessive\
    \ cache misses. \n3. **I/O Bottlenecks:** Delays in loading data from storage\
    \ to host memory, then transferring to HBM3. \n4. **Inter-GPU Communication:**\
    \ Overhead from NCCL/MPI operations if using multi-GPU or multi-node training.\
    \ \nFlame graphs generated from Nsight Systems can help visualize the hottest\
    \ code paths and identify where time is being disproportionately spent. Solutions\
    \ might involve optimizing data loaders, kernel fusion, reducing communication\
    \ overhead, or adjusting memory access patterns."
  common_mistake: A common mistake is to immediately assume the H100 GPUs are underutilized
    due to insufficient batch size or inefficient model parallelization, leading to
    premature increases in batch size, more GPUs, or complex distributed training
    setups without first identifying the root cause. This often escalates operational
    costs without resolving the fundamental performance bottleneck.
  napkin_math: Given the H100's 989 TFLOPS FP16 dense performance, if GPU utilization
    is 50%, the effective compute is only ~494.5 TFLOPS. This implies either the workload
    isn't compute-bound or the compute units are frequently stalled. For memory, if
    a specific HBM3-bound kernel theoretically requires X GB/s and the observed bandwidth
    is significantly lower than the H100's 3.35 TB/s, it points to a memory bottleneck.
    For example, if a kernel is expected to process 1TB of data from HBM3 in 0.5 seconds,
    but it's taking 2 seconds, the effective bandwidth is 500GB/s (1TB / 2s), far
    below 3.35 TB/s. This gap indicates contention or inefficient memory access. Analyzing
    operations per second vs. theoretical maximum can highlight whether the issue
    is compute (FLOPs) or memory (bandwidth) bound.
