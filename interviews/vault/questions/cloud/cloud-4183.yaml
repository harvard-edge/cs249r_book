title: Adaptive Routing in Dragonfly Under Adversarial Traffic
scenario: Your 2048-GPU dragonfly cluster runs a mixture of training jobs. A large 1024-GPU AllReduce creates adversarial traffic that saturates global links, degrading a separate 256-GPU job sharing the same dragonfly groups.
question: "How much traffic does the 1024-GPU 4 GB AllReduce put on each global link, and why can minimal routing cause interference?"
details:
  realistic_solution: Total traffic is 1024 GPUs × 4GB = 4,096 GB. Minimal routing directly maps traffic via the shortest path, forcing massive data streams onto a small subset of shared global links and causing severe congestion. Non-minimal (Valiant) routing spreads the load randomly across all paths, avoiding hot spots at the cost of higher latency.
  common_mistake: |
    **The Pitfall:** Relying on minimal routing (direct path) in a dragonfly topology under heavy load.
    **The Rationale:** Candidates assume the shortest path is always optimal, ignoring the fact that AllReduce patterns create massive incasts.
    **The Consequence:** Traffic is concentrated on a few global links, causing microbursts and severe cross-job interference.
  napkin_math: |
    1. **Total gradient traffic:** Each GPU sends a 4GB gradient.
    2. **Total network volume:** 1024 GPUs * 4GB = 4,096 GB.
    3. **Global links:** Dragonfly topology has ~240 global links.
    4. **Per-link traffic:** 4,096 GB / 240 links = **17.1 GB per global link** (not MB).
