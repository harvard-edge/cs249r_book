title: 'NVIDIA H100 LLM Inference: Achieving P99 Latency SLAs'
scenario: You are leading the design of a real-time, high-throughput inference service for a large language
  model. The model is deployed across a cluster of NVIDIA H100 GPUs, each boasting 80 GB HBM3 memory,
  989 TFLOPS FP16 dense performance, 3.35 TB/s memory bandwidth, and a 700W power draw. Your primary challenge
  is to consistently meet a strict Service Level Agreement (SLA) of 100ms for P99 inference latency, meaning
  99% of all requests must complete within 100ms. Describe your end-to-end strategy for designing this
  system, focusing specifically on identifying, analyzing, and mitigating tail latency issues. How would
  you leverage techniques like straggler detection, hedged requests, and SLA-driven resource management
  to ensure this critical P99 target is always met?
question: "How would you leverage techniques like straggler detection, hedged requests, and SLA-driven resource management to ensure this critical P99 target is always met?"
details:
  realistic_solution: Implement a hierarchical monitoring system tracking latency at every stage (request
    queueing, data transfer, H100 kernel execution, post-processing, network egress). Utilize adaptive
    batching and dynamic load balancing informed by real-time H100 utilization and memory bandwidth metrics.
    Employ an intelligent hedged request strategy where a secondary request is issued if the primary doesn't
    receive a response within a P90/P95 threshold. Design for effective backpressure and graceful degradation.
    Proactively scale resources based on predictive analytics of traffic patterns and historical straggler
    rates. Fine-tune H100 kernel optimizations, tensor parallelism, and efficient data pipelining to minimize
    individual inference times and variability, ensuring optimal use of the 3.35 TB/s HBM3 bandwidth.
  common_mistake: A common mistake is to optimize solely for average (P50) latency or throughput without
    a deep understanding of tail latency characteristics, workload variability, and the specific performance
    profile of the NVIDIA H100 under varying load conditions. Overlooking non-GPU bottlenecks (e.g., network,
    CPU overhead, data transfer to HBM3) or implementing generic straggler mitigation strategies without
    fine-tuning can also lead to SLA breaches.
  napkin_math: If your P90 latency without mitigation is 80ms, and your P99 latency is 300ms, how many
    requests per second (RPS) can a single H100 handle before needing hedged requests to meet a P99 <
    100ms target? Assume that a hedged request consumes 1.5x resources on average for 5% of all requests.
    Given the 989 TFLOPS FP16 performance, if a single token generation takes X TFLOPS, how many H100s
    are minimally required to serve Y RPS at P99 < 100ms, factoring in data transfer bottlenecks to HBM3
    (3.35 TB/s) and a typical model size that uses Z GB of the 80 GB HBM3?
