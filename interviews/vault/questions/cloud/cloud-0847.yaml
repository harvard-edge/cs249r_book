title: Cascading Failures in Active-Active Inference APIs
scenario: A machine learning serving system uses an active-active replication strategy across three availability zones (AZs). The system processes 15,000 requests per second (RPS) with each AZ handling 5,000 RPS. Each AZ is provisioned to handle a maximum of 6,500 RPS before latency degrades. During a regional issue, one AZ suddenly goes offline. Shortly after, the remaining two AZs begin to experience massive request queueing, OOM errors, and cascading timeouts, taking the entire API offline.
question: Why did losing one AZ take down the whole API, and what capacity-planning flaw caused the cascade?
details:
  realistic_solution: The system was not provisioned for true N-1 redundancy. When one AZ failed, its 5,000 RPS load was redistributed to the remaining two AZs. The new load per AZ became 7,500 RPS, which exceeded their maximum provisioned capacity of 6,500 RPS, triggering a cascading failure.
  common_mistake: |
    **The Pitfall:** Assuming the OOMs and timeouts are caused by a software bug or memory leak.
    **The Rationale:** Failing to model the post-failover traffic distribution across remaining availability zones.
    **The Consequence:** The remaining servers are DDoS'd by legitimate traffic, destroying the entire API while engineers waste time debugging load balancer configurations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total traffic: 15,000 RPS across 3 AZs (5,000 RPS/AZ).
       - Hard limit: 6,500 RPS maximum provisioned capacity per AZ.
    2. **Calculations:**
       - After 1 AZ fails, 15,000 RPS is routed to the 2 surviving AZs.
       - New load per surviving AZ: 15,000 / 2 = 7,500 RPS.
       - Deficit: 7,500 RPS (Load) - 6,500 RPS (Capacity) = 1,000 RPS overload.
    3. **Conclusion & Interpretation:** **Result: Throughput-Bound.** The 7,500 RPS load significantly exceeds the 6,500 RPS provisioned ceiling, triggering a hard cascading failure.
