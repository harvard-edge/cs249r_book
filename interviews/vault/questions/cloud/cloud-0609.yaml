title: The Activation Recomputation Trade-off
scenario: You're training a 30B model on 8× A100-80GB GPUs. With full activation storage, you OOM at batch
  size 2. Your colleague suggests gradient checkpointing, claiming it 'trades a little compute for a lot
  of memory.' After enabling it, you can fit batch size 8. But your training time per step increased by
  40%, not the 33% your colleague promised. Why is the overhead higher than expected?
details:
  realistic_solution: 'The theoretical 33% overhead assumes the recomputed forward pass runs at the same
    speed as the original. In practice, the recomputed activations must be regenerated from the checkpoint
    boundaries, and these recomputations compete with the backward pass for GPU resources — HBM bandwidth,
    L2 cache, and Tensor Core scheduling. The larger batch size (8 vs 2) also increases the memory pressure:
    the KV-cache and optimizer states for batch=8 consume more HBM, reducing the effective bandwidth available
    for activation recomputation. Additionally, each checkpoint segment must reload its input activations
    from HBM, adding memory traffic that didn''t exist in the non-checkpointed version.'
  common_mistake: '"Gradient checkpointing adds exactly one extra forward pass, so overhead is always
    33%." This assumes the recomputed forward pass is free of memory-system effects.'
  napkin_math: 'Without checkpointing: activation memory for 30B model ≈ $S \times B \times H \times L
    \times \text{bytes\_per\_elem}$. For sequence=2048, batch=2, hidden=7168, 60 layers in FP16 (2 bytes):
    $2048 \times 2 \times 7168 \times 60 \times 2 \approx 3.5\text{ GB}$ for the main hidden-state activations.
    Including attention scores and FFN intermediates roughly doubles this to ~7 GB. With checkpointing
    (every 5 layers): store only 12 checkpoints instead of 60 layers of activations. Memory drops to $\approx
    7 \times 12/60 = 1.4\text{ GB}$ for activations, freeing ~5.6 GB. This allows batch=8 ($4\times$ more),
    but recomputation adds 48 extra layer forward passes. Theoretical overhead: $48/60 \times 50\% = 40\%$
    of total step time (forward is ~50% of forward+backward). The 40% matches — the "33% rule" only applies
    when checkpointing every single layer.'
