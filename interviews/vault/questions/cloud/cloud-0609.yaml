title: The Activation Recomputation Trade-off
scenario: You're training a 30B model on 8× A100-80GB GPUs. With full activation storage, you OOM at batch size 2. Your colleague suggests gradient checkpointing, claiming it 'trades a little compute for a lot of memory.' After enabling it, you can fit batch size 8. But your training time per step increased by 40%, not the 33% your colleague promised.
question: Why is the overhead higher than expected?
details:
  realistic_solution: 'The theoretical 33% overhead assumes the recomputed forward pass runs at the same speed as the original. In practice, the recomputed activations must be regenerated from the checkpoint boundaries, and these recomputations compete with the backward pass for GPU resources — HBM bandwidth, L2 cache, and Tensor Core scheduling. The larger batch size (8 vs 2) also increases the memory pressure: the KV-cache and optimizer states for batch=8 consume more HBM, reducing the effective bandwidth available for activation recomputation. Additionally, each checkpoint segment must reload its input activations from HBM, adding memory traffic that didn''t exist in the non-checkpointed version.'
  common_mistake: |
    **The Pitfall:** Believing the "gradient checkpointing adds exactly one extra forward pass, so overhead is always 33%" rule.
    **The Rationale:** Developers calculate theoretical FLOP overhead without accounting for memory bandwidth contention, L2 cache evictions, or the specific checkpoint interval.
    **The Consequence:** Experiencing much higher step time increases than planned because recomputations compete with the backward pass for HBM and Tensor Cores.
  napkin_math: |
    1. Without checkpointing memory (30B model, FP16, sequence=2048, batch=2): ~3.5 GB for main activations, ~7 GB including attention/FFN intermediates.
    2. With checkpointing (every 5 layers out of 60): Store 12 checkpoints. Memory drops to ~1.4 GB.
    3. Frees ~5.6 GB, allowing batch=8 (4x larger).
    4. Recomputation adds 48 extra layer forward passes.
    5. **Theoretical overhead: 48 / 60 * 50% = 40% of total step time, completely matching the observed regression.**
