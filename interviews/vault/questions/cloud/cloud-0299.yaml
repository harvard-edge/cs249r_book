title: The Interconnect Latency Ladder (cloud-0299)
scenario: When optimizing a large-scale training job, you're analyzing communication latency.
question: Which of the following operations introduces the *most* latency?
details:
  realistic_solution: A transfer between servers over InfiniBand. At ~5,000 ns, its latency is 5-10x higher than on-server interconnects. NVLink is the fastest GPU-to-GPU interconnect on the node at ~500 ns, followed by the more general-purpose PCIe bus at ~1,000 ns. The physical distance and network switching required for cross-rack communication dominate the latency budget.
  common_mistake: |
    **The Pitfall:** Confusing bandwidth with latency.
    **The Rationale:** Engineers incorrectly assume that a high-bandwidth network fabric like InfiniBand has latency comparable to on-server interconnects like PCIe or NVLink.
    **The Consequence:** They design cross-node architectures for latency-sensitive operations, resulting in massive synchronization stalls.
  napkin_math: |
    - **NVLink Latency (On-board):** ~500 ns.
    - **PCIe Latency (On-server):** ~1,000 ns.
    - **InfiniBand Latency (Cross-server):** ~5,000 ns.
    - **Conclusion:** **Crossing the server boundary over InfiniBand introduces 5-10x more latency than on-node interconnects.**
  options:
  - A transfer between two GPUs in the same server over NVLink 4.0
  - A transfer between two GPUs in the same server over PCIe Gen5
  - A transfer between two servers in different racks over InfiniBand NDR
  - A read from a GPU's local HBM3 memory
  correct_index: 2
