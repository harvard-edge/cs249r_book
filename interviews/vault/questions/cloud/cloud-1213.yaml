title: Diagnosing High TDP in Low-Util Inference
scenario: A deep learning inference cluster running large language models on A100 GPUs is unexpectedly
  hitting its 20kW per-rack power limit. Profiling shows that the tensor core ALUs are executing FP16
  operations at only 20% of peak theoretical throughput (TFLOPS), yet the GPUs are persistently operating
  at their maximum 400W TDP. The workload is currently configured for interactive chat with a batch size
  of 1. Diagnose the root cause of the power draw when compute utilization is so low, focusing on the
  system's energy per operation breakdown.
details:
  realistic_solution: The root cause is the massive energy cost of memory access compared to computation.
    An FP16 multiply-accumulate (MAC) operation consumes ~0.5-1 pJ, whereas fetching the corresponding
    parameters from High Bandwidth Memory (HBM) consumes tens of picojoules. In a memory-bound decoding
    workload (batch size 1), the system must fetch a weight from HBM for exactly one ALU operation. Consequently,
    the memory controllers, interconnect fabric, and caches run at maximum bandwidth and dominate the
    400W TDP, while the ALUs sit mostly idle waiting for data. To resolve this, you must increase the
    batch size (to amortize the HBM read energy across multiple operations) or apply weight quantization
    (e.g., INT8/INT4) to reduce the memory fetch payload and energy per parameter.
  common_mistake: Candidates often incorrectly assume that power consumption correlates strictly with
    ALU utilization. They might suggest the ALUs have a static power bug or propose undervolting the compute
    units, failing to recognize that data movement dominates the energy budget at low batch sizes.
  napkin_math: 'Let E_MAC ≈ 1 pJ (FP16 compute). Let E_HBM ≈ 2 pJ/bit (Data transfer).

    For batch size 1, every MAC requires loading one FP16 weight (16 bits).

    Memory energy per MAC = 16 bits * 2 pJ/bit = 32 pJ.

    Total operation energy = 32 pJ (Data) + 1 pJ (Compute) = 33 pJ.

    Ratio: 32/33 = ~97% of the power budget is spent moving data from memory rather than computing. The
    GPUs are power-capped by the memory interface.'
