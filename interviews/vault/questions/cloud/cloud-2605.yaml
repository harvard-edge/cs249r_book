title: Cloud Label Consensus L5 0
scenario: 'For a medical imaging dataset (tumor classification), you must choose between: (A) 5 general radiologists per image with majority vote, (B) 3 general radiologists + 1 specialist with specialist-as-tiebreaker, or (C) 1 specialist per image. Budget is $500K for 50K images.'
question: Within the $500K budget for 50K tumor images, which labeling strategy gives the best quality and coverage trade-off?
details:
  realistic_solution: 'Cost per label: general radiologist $2, specialist $8. Option A: 50K \times 5 \times $2 = $500K. High agreement reliability but general expertise may miss subtle findings. Option B: 50K \times (3\times$2 + 1\times$8) = 50K \times $14 = $700K — over budget. Reduce to 35K images: 35K \times $14 = $490K. Higher quality on covered images but 30% less data. Option C: 50K \times 1 \times $8 = $400K. Fits budget with $100K spare. Expert quality per image but no redundancy — specialist errors are undetectable. Single-annotator has no agreement metric. For medical imaging: B is gold standard (specialist resolves ambiguity) but dataset size trade-off is real. Best compromise: C for 50K images + use $100K to double-annotate the hardest 20% (10K images) with a second specialist for quality audit.'
  common_mistake: |
    **The Pitfall:** Valuing annotator quantity over annotator expertise in specialized domains.
    **The Rationale:** Assuming that majority voting among non-experts can synthesize expert-level accuracy.
    **The Consequence:** Five general radiologists disagreeing about a subtle tumor is less informative than one specialist's confident diagnosis, resulting in a noisy dataset.
  napkin_math: |
    1. **Option A:** 50K * 5 * $2 = **$500K** (50K images, no specialist input).
    2. **Option B:** 35K * (3 * $2 + 1 * $8) = 35K * $14 = **$490K** (only 35K images, specialist per image).
    3. **Option C:** 50K * 1 * $8 = $400K. Use remaining $100K to audit 10K images (10K * $8 = $80K). Total = **$480K**.
    4. **Result: Option C gives the most data with quality assurance on the hardest cases.**
