title: Cloud Label Consensus L5 0
scenario: 'For a medical imaging dataset (tumor classification), you must choose between: (A) 5 general
  radiologists per image with majority vote, (B) 3 general radiologists + 1 specialist with specialist-as-tiebreaker,
  (C) 1 specialist per image. Budget is $500K for 50K images. Evaluate quality and coverage trade-offs.'
details:
  realistic_solution: 'Cost per label: general radiologist $2, specialist $8. Option A: 50K × 5 × $2 =
    $500K. High agreement reliability but general expertise may miss subtle findings. Option B: 50K ×
    (3×$2 + 1×$8) = 50K × $14 = $700K — over budget. Reduce to 35K images: 35K × $14 = $490K. Higher quality
    on covered images but 30% less data. Option C: 50K × 1 × $8 = $400K. Fits budget with $100K spare.
    Expert quality per image but no redundancy — specialist errors are undetectable. Single-annotator
    has no agreement metric. For medical imaging: B is gold standard (specialist resolves ambiguity) but
    dataset size trade-off is real. Best compromise: C for 50K images + use $100K to double-annotate the
    hardest 20% (10K images) with a second specialist for quality audit.'
  common_mistake: Valuing annotator quantity over annotator expertise in specialized domains. Five general
    radiologists disagreeing about a subtle tumor is less informative than one specialist's confident
    diagnosis. Domain expertise matters more than redundancy for specialized tasks.
  napkin_math: 'A: 50K × 5 × $2 = $500K, 50K images, no specialist input. B: 35K × $14 = $490K, 35K images,
    specialist per image. C: 50K × $8 = $400K + 10K × $8 audit = $480K, 50K images with 20% audited. C
    gives most data with quality assurance on hardest cases.'
