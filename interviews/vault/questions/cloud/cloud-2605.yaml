title: Cloud Label Consensus L5 0
scenario: 'For a medical imaging dataset, you must choose between: (A) 5 general radiologists per image with majority vote, (B) 3 generalists + 1 specialist as tiebreaker, or (C) 1 specialist per image. Budget is $500K for 50K images.'
question: 'Within the $500K budget for 50K tumor images, which labeling strategy gives the best quality and coverage trade-off?'
details:
  realistic_solution: 'Option C is optimal. Medical imaging requires domain expertise; majority voting among generalists cannot synthesize specialist-level accuracy. Option B is the gold standard but breaks the budget ($700K). Option C leverages single-annotator specialist precision at $400K, fitting the budget. To mitigate the lack of agreement metrics in C, utilize the remaining $100K to double-annotate the hardest 20% (10K images) with a second specialist, providing a rigorous quality audit.'
  common_mistake: |
    **The Pitfall:** Valuing annotator quantity over annotator expertise in specialized domains.
    **The Rationale:** Candidates assume that majority voting among non-experts can synthesize expert-level accuracy via wisdom-of-the-crowds.
    **The Consequence:** The model trains on heavily degraded, noisy datasets, compromising diagnostic safety.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: $500K for 50K images.
       - Generalist: $2. Specialist: $8.
    2. **Calculations:**
       - Option A: 50K * 5 * $2 = $500K (No expert).
       - Option B: 50K * (3 * $2 + 1 * $8) = $700K (Over budget).
       - Option C: 50K * 1 * $8 = $400K. Remaining: $100K.
    3. **Conclusion & Interpretation:**
       - **Result: Option C delivers specialist precision and leverages the remaining $100K to double-annotate 10K hard cases (Budget-Bound).**
