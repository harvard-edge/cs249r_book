title: Skip Connection Gradient and Memory Cost
scenario: You are migrating a 50-layer visual inspection model to A100 GPUs for a cloud-based service.
  In the baseline plain CNN, gradients are attenuated by 15% (a multiplier of 0.85) at each layer, leading
  to stalled training. You propose adding skip connections to create a ResNet-style architecture. Calculate
  the expected gradient magnitude at the first layer (relative to a loss gradient of 1.0) for both the
  plain network and the unattenuated skip-connection pathway. Additionally, calculate the exact FP16 activation
  memory required to keep the bypass tensor alive for a single residual block with input dimensions [Batch=64,
  Channels=512, Height=28, Width=28].
details:
  realistic_solution: The plain CNN gradient vanishes to approximately 0.0003, whereas the skip connection
    provides a direct O(1) path maintaining a gradient of 1.0. To support this, the bypass tensor must
    be preserved, consuming exactly 51.38 MB of activation memory per block.
  common_mistake: Candidates often understand that skip connections solve vanishing gradients, but incorrectly
    assume they have zero memory cost, forgetting that the bypass tensor must be kept alive in GPU memory
    until the element-wise addition at the end of the block.
  napkin_math: 'Plain CNN gradient magnitude at layer 1 = 1.0 * (0.85)^50 ≈ 0.00029 (vanishing gradient).
    Skip connections provide a direct gradient pathway of 1.0. Bypass memory for FP16 activations: 64
    batch * 512 channels * 28 * 28 * 2 bytes = 51,380,224 bytes (~51.38 MB). This minimal VRAM cost fixes
    the training stall.'
