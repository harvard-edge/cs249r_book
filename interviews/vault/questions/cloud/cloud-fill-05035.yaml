title: PagedAttention Memory Fragmentation Reduction for H100 LLM Serving
scenario: A vLLM deployment on H100 80GB serves a 13B model (26GB) leaving 54GB for KV cache. With standard
  contiguous KV allocation, average memory fragmentation is 35% (sequences reserved max_length but use
  avg 40% of tokens). With PagedAttention (16-token pages), fragmentation drops to <4%. Calculate the
  throughput improvement from increased effective batch size.
question: "How much throughput improvement should PagedAttention provide by reducing KV-cache fragmentation from 35% to under 4%?"
details:
  realistic_solution: 'KV cache per token: 2 (K+V) × 40 layers × 20 heads × 128 head_dim × 2B = 2×40×20×128×2
    = 409.6KB wait — recalculate: per token per layer = 2×n_heads×head_dim×2B = 2×40×128×2 = 20.5KB. Per
    token all layers = 20.5KB × 40 = ... let me use: 13B has 40 layers, 40 heads, head_dim=128. Per token:
    2×40×40×128×2B = 819.2KB/40 = 20.48KB × 40 layers total = 819KB/token across all layers. Wait: per
    token = 2 (KV) × n_layers × n_heads × head_dim × dtype = 2×40×40×128×2 = 819,200 bytes ≈ 819KB. Available
    for KV: 54GB. Contiguous (35% frag): usable = 54×0.65 = 35.1GB. Sequences: 35.1GB / (819KB × avg_len).
    At avg 1000 tokens: 35.1GB/819MB = 42 sequences. PagedAttention (4% frag): 54×0.96 = 51.8GB → 63 sequences.
    Throughput: 63/42 = 1.5× improvement.'
  common_mistake: Calculating KV cache per sequence using only the model's context length without accounting
    for the number of layers and head dimensions.
  napkin_math: 'KV per token: 2×40 layers×40 heads×128 dim×2B = 819KB. Contiguous (35% frag): 54GB×0.65/819KB/token
    = 42.8K tokens in flight. Paged (4% frag): 54GB×0.96/819KB = 63.3K tokens. Gain: 63.3/42.8 = 1.48×.
    Batch size increases proportionally.'
