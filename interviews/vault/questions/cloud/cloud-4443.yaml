title: Prefill-Decode Ratio Optimization for LLM Serving Fleet
scenario: A disaggregated serving fleet runs a 70B model. Traffic analysis shows average
  prompt length 256 tokens and average output length 512 tokens. Determine the optimal
  prefill:decode GPU ratio to maximize GPU utilization.
question: What prefill:decode GPU ratio would you choose for a 70B model with 256-token
  prompts and 512-token outputs?
details:
  realistic_solution: 'Prefill compute (TTFT phase): FLOP for 256-token prompt on
    70B = 2 * 256 * 70B = 35.8T FLOP. Prefill is compute-bound on H100 (arithmetic
    intensity > 295 FLOP/byte). Prefill throughput: 35.8T / 989T = 36ms per request.
    Decode compute per token: 2 * 70B = 140B FLOP per token. Decode is memory-bound
    (arithmetic intensity ~2 FLOP/byte at batch=1). Decode throughput per token: 70B
    * 2B / 3.35TB/s = 41.8ms. For 512 output tokens: 512 * 41.8ms = 21.4 seconds total
    decode time (single stream). In continuous batching at batch=64: decode throughput
    scales: 64 requests share 41.8ms per token step = 64 tok/step / 41.8ms = 1531
    tok/sec per H100. Per request at 512 tokens: 512/1531 = 0.33 seconds. Ratio: prefill
    36ms vs decode 334ms per request = 1:9.3. Prefill:decode ratio should be approximately
    1:9 (1 prefill GPU per 9 decode GPUs). In practice: 1:4 to 1:8 due to variable
    traffic and batching efficiency.'
  common_mistake: Setting prefill:decode ratio based on prompt:output token counts
    alone (256:512 = 1:2). Prefill compute scales as O(seq_len^2) due to attention,
    while decode is O(1) per token. The compute imbalance is not 1:2 — it requires
    roofline analysis of each phase.
  napkin_math: 'Prefill H100 capacity: 36ms/request = 27.8 req/sec. Decode H100 capacity
    (batch=64, 512 output tokens): 64 requests * 512 tokens / 1531 tok/sec = 21.4
    sec per batch. So each decode H100 handles 64/21.4 = 3 req/sec (serial). But pipelining:
    64 requests complete at 0.33s each = 194 req/sec per decode H100 in continuous
    batching. So decode:prefill capacity ratio = 194/27.8 = 7. Optimal ratio: 1 prefill
    : 7 decode H100s. Rounding: 1:6 or 1:8 in 2x increments.'
