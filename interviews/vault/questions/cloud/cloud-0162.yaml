title: The Real-Time Voice Assistant Stutter
scenario: You are the lead ML Systems Engineer for a new real-time voice assistant powered by a 7B parameter
  LLM, hosted on H100 GPUs. The product mandate is a P99 Time-To-First-Token (TTFT) of under 500ms to
  feel responsive. Your operations team reports that GPU utilization is stuck at a mediocre 40%, and they
  are proposing to increase the static batch size from 8 to 32 to improve throughput and cost-efficiency.
  However, user feedback indicates the assistant already feels sluggish to start talking. Your Grafana
  dashboard shows the arrival rate (λ) is about 20 requests/second.
question: "Why is increasing static batch size from 8 to 32 the wrong fix for 40% GPU utilization, and what batching change should you make?"
details:
  realistic_solution: The core conflict is head-of-line blocking imposed by static batching. To achieve
    high GPU utilization, the system must wait for a large batch to assemble, but this waiting time directly
    contributes to TTFT, violating the SLO.
  common_mistake: The most common L3-level mistake is to focus only on the compute time and suggest simply
    using a smaller static batch size. While this reduces the compute portion of latency for a single
    batch, it craters throughput, causing the request queue to grow infinitely as the arrival rate exceeds
    the service rate (λ > μ). This leads to catastrophic P99 latency due to unbounded queueing delays,
    even though individual requests are processed 'fast'. The L4 insight is to change the batching *algorithm*
    itself to decouple queueing from batch formation.
  napkin_math: Let's analyze the latency for a user under static batching.
