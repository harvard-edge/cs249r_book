title: The Real-Time Voice Assistant Stutter
scenario: You are the lead ML Systems Engineer for a new real-time voice assistant powered by a 7B parameter LLM, hosted on H100 GPUs. The product mandate is a P99 Time-To-First-Token (TTFT) of under 500ms to feel responsive. Your operations team reports that GPU utilization is stuck at a mediocre 40%, and they are proposing to increase the static batch size from 8 to 32 to improve throughput and cost-efficiency. However, user feedback indicates the assistant already feels sluggish to start talking. Your Grafana dashboard shows the arrival rate is about 20 requests/second.
question: Why is increasing static batch size from 8 to 32 the wrong fix for 40% GPU utilization, and what batching change should you make?
details:
  realistic_solution: The core conflict is head-of-line blocking imposed by static batching. To achieve high GPU utilization, the system must wait for a large batch to assemble, but this waiting time directly contributes to TTFT, violating the SLO.
  common_mistake: |
    **The Pitfall:** Focusing only on compute time and suggesting a smaller static batch size.
    **The Rationale:** Candidates correctly identify that smaller batches reduce latency, but fail to realize that if the smaller batch lowers throughput below the arrival rate, the queue explodes infinitely.
    **The Consequence:** Catastrophic P99 latency caused by unbounded queueing delays, even though individual requests compute "fast".
  napkin_math: |
    - **Arrival Rate:** λ = 20 req/s (1 request every 50ms).
    - **Batch Assembly Wait:** Waiting for a static batch of 32 to form requires up to 31 × 50ms = **1.55 seconds**.
    - **Result:** A new request waits >1.5 seconds in the queue before compute even begins, completely violating the 500ms TTFT SLO.
