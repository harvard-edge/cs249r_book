title: The HealthTech TCO Dilemma
scenario: 'You are the ML Systems Engineer for a HealthTech company launching a ''smart reply'' feature
  in a patient-doctor messaging app. You must choose between two strategies:'
question: "Which smart-reply strategy has lower annual TCO after adding HIPAA breach ALE: centralized cloud training or federated learning?"
details:
  realistic_solution: The Federated Learning approach has a lower Total Cost of Ownership. The key is
    to incorporate the financial risk of a data breach into the TCO calculation.
  common_mistake: Engineers often focus purely on direct costs like cloud compute and engineering salaries.
    They completely ignore the statistical financial risk, or Annual Loss Expectancy (ALE), associated
    with handling sensitive data. In regulated industries like healthcare or finance, the ALE is often
    the single largest component of the Total Cost of Ownership (TCO).
  napkin_math: 'We calculate TCO = Annual Compute Cost + Annual Engineering Cost + Annual Loss Expectancy
    (ALE).


    **Strategy A: Centralized Cloud Training.**

    Compute: fine-tune on 4× A100s for 2 weeks/quarter.

    4 GPUs × $2.20/hr/GPU × 336 hr/quarter × 4 quarters = $11,827/year.

    Engineering: 1 ML engineer at $200K/year (half-time) = $100K/year.

    ALE: probability of a HIPAA breach × cost.

    With PHI centralized, assume 5% annual breach probability × $10M average cost = $500K ALE.

    **Strategy A TCO ≈ $11,827 + $100,000 + $500,000 = $611,827/year.**


    **Strategy B: Federated Learning.**

    Compute: 10 hospital edge nodes at $500/month each + 1 aggregation server at $1,000/month.

    Total = (10 × $500 + $1,000) × 12 = $72,000/year.

    Engineering: 2 ML engineers (FL is harder) at $200K each (half-time) = $200K/year.

    ALE: PHI never leaves hospitals, breach probability drops to 0.5% × $2M (smaller blast radius) = $10K
    ALE.

    **Strategy B TCO ≈ $72,000 + $200,000 + $10,000 = $282,000/year.**


    **3-Year TCO:**

    Strategy A: $611,827 × 3 = **$1,835,481**.

    Strategy B: $282,000 × 3 = **$846,000**.


    The FL approach saves ~$330K/year, driven by the 50× reduction in ALE ($500K → $10K). Engineering
    costs are higher for FL, but the risk-adjusted TCO is decisively lower.'
  options:
  - Centralized, because the $288k compute cost is far less than the extra $500k in engineering salaries
    for FL.
  - Federated, because data egress costs to upload petabytes of data from 100 hospitals would exceed the
    engineering overhead.
  - Federated, because the Annual Loss Expectancy from a potential data breach in the centralized model
    makes it significantly more expensive.
  - Centralized, because FL models converge slower and have lower accuracy, leading to hidden opportunity
    costs in product quality that outweigh the breach risk.
  correct_index: 2
