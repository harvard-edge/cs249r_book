title: The HealthTech TCO Dilemma
scenario: You are the ML Systems Engineer for a HealthTech company launching a 'smart reply' feature in a patient-doctor messaging app. You must choose between two strategies: Strategy A (Centralized Cloud Training: 4x A100s at $2.20/hr/GPU for 2 weeks/quarter, 0.5 FTE engineer at $200K/yr, 5% risk of $10M breach) and Strategy B (Federated Learning: 10 edge nodes at $500/mo each + $1,000/mo aggregation server, 1.0 FTE total engineering at $200K/yr, 0.5% risk of $2M breach).
question: Which smart-reply strategy has lower annual TCO after adding HIPAA breach ALE: centralized cloud training or federated learning?
details:
  realistic_solution: The Federated Learning approach has a lower Total Cost of Ownership. The key is to incorporate the financial risk of a data breach into the TCO calculation.
  common_mistake: |
    **The Pitfall:** Calculating TCO purely based on compute and engineering salaries.
    **The Rationale:** Engineers default to direct operational expenses, ignoring statistical security risks and compliance liabilities.
    **The Consequence:** They incorrectly recommend the centralized strategy, vastly underestimating the financial reality of handling sensitive PHI.
  napkin_math: |
    - **Strategy A (Centralized):**
      - Compute: 4 GPUs × $2.20/hr × 336 hr × 4 = $11,827/yr.
      - Engineering: $100,000/yr.
      - ALE (Breach Risk): 5% of $10M = $500,000/yr.
      - Total A: ~$611,827/year.
    - **Strategy B (Federated Learning):**
      - Compute: (10 × $500 + $1000) × 12 = $72,000/yr.
      - Engineering: $200,000/yr.
      - ALE (Breach Risk): 0.5% of $2M = $10,000/yr.
      - Total B: ~$282,000/year.
    - **Conclusion:** Strategy B is much cheaper despite higher compute and engineering costs, driven by a 50x drop in Annual Loss Expectancy.
  options:
  - Centralized, because the $288k compute cost is far less than the extra $500k in engineering salaries for FL.
  - Federated, because data egress costs to upload petabytes of data from 100 hospitals would exceed the engineering overhead.
  - Federated, because the Annual Loss Expectancy from a potential data breach in the centralized model makes it significantly more expensive.
  - Centralized, because FL models converge slower and have lower accuracy, leading to hidden opportunity costs in product quality that outweigh the breach risk.
  correct_index: 2
