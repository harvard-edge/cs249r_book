title: RDMA Write Throughput Saturation in MI300X AllReduce Rings
scenario: You are tuning AllReduce performance for a 64-node MI300X cluster connected with 400 Gbps InfiniBand
  HDR2. Each node has 8 MI300X GPUs. A ring-AllReduce of a 4GB gradient tensor across all 512 GPUs achieves
  only 140 Gbps per rail, while the theoretical per-link throughput is 400 Gbps. Profiling shows 35% of
  RDMA operations are completing with retransmit counters incrementing. Diagnose the performance gap,
  identify why retransmits are occurring, and propose tuning parameters.
details:
  realistic_solution: 'Root cause: RoCEv2 congestion feedback loop. At 400 Gbps line rate with 512 GPU
    ring-AllReduce, the 64-node fat-tree switch fabric has 3:1 oversubscription at spine layer. During
    synchronized AllReduce phases, all nodes inject traffic simultaneously, causing head-of-line blocking
    and PFC storms. PFC storms trigger RDMA retransmits because paused senders time out. Diagnosis: check
    switch port PFC TX/RX counters (should be near zero for well-tuned networks). Fix: (1) Tune DCQCN:
    reduce initial rate (IR) from 1 Gbps to 400 Mbps, increase Alpha (ECN marking sensitivity). (2) Enable
    SHARP in-network computing to reduce AllReduce traffic by 2×. (3) Use tree-AllReduce instead of ring
    for fat-tree topology. Expected throughput: 140 → 280-320 Gbps (70-80% of line rate) with proper DCQCN
    tuning.'
  common_mistake: Assuming retransmits indicate faulty hardware and raising a datacenter ticket. In high-performance
    RDMA clusters, retransmits often indicate RoCEv2 congestion due to misconfigured ECN (Explicit Congestion
    Notification) thresholds or DCQCN parameters, not hardware failures.
  napkin_math: 'Theoretical AllReduce: 4GB × (2×(N-1)/N) / BW = 4GB × 2 × 511/512 / 50GB/s (400Gbps =
    50GB/s) = 7.984GB / 50 = 159.7ms ideal. Measured: 140 Gbps → 17.5 GB/s → 4GB × 2 × 511/512 / 17.5
    = 456ms. Slowdown: 456/160 = 2.85×. 35% retransmit rate means ~1.35× average packet delivery. Effective
    BW = 400 Gbps / 1.35 = 296 Gbps. Gap from 296 to 140 Gbps: additional 53% loss from PFC-induced stalls.'
