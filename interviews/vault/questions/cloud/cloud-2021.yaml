title: TensorRT Fusion and Quantization Latency
scenario: 'You are deploying a BERT-Large model on an NVIDIA T4 GPU for real-time inference. The native
  PyTorch FP32 implementation takes 40ms per batch (batch size 8). Profiling shows the time is evenly
  split: 20ms in CPU-bound kernel launch overheads (due to executing 2,000 separate kernels) and 20ms
  in memory-bound GPU execution. You optimize the model using TensorRT, which performs operator fusion
  (reducing the number of kernels by a factor of 5) and INT8 quantization (reducing data movement by a
  factor of 4). Calculate the expected optimized latency per batch.'
question: "What is the expected TensorRT-optimized batch latency after 5x kernel fusion and 4x INT8 data-movement reduction?"
details:
  realistic_solution: Decouple the latency components. Apply the 5x fusion reduction strictly to the kernel
    overhead, and the 4x quantization reduction strictly to the memory-bound GPU execution time.
  common_mistake: Candidates often apply the 4x INT8 speedup to the entire 40ms latency, falsely estimating
    10ms, while ignoring the distinct impact of operator fusion on kernel launch overheads.
  napkin_math: Overhead = 20ms / 5 (fusion reduction) = 4ms. Execution = 20ms / 4 (INT8 quantization)
    = 5ms. Total Optimized Latency = 4ms + 5ms = 9ms.
