title: Optimizing LLM Inference Energy on AMD MI300X
scenario: You are optimizing an LLM inference workload on an AMD MI300X. Despite 1,307 TFLOPS FP16 dense compute, tokens/second are low and Joules/inference are high.
question: Why might MI300X LLM inference have low tokens/s and high energy cost despite massive TFLOPS, and how do energy-aware operators help?
details:
  realistic_solution: |
    To address this, one should first analyze the roofline model for the workload on the MI300X to determine if it's compute-bound or memory-bound. Implement techniques like operator fusion (e.g., fusing element-wise operations with matrix multiplications) to reduce HBM3 accesses. Furthermore, employ energy-aware operator selection by profiling different kernel implementations (e.g., varying tiling strategies, sparse vs. dense kernels) and quantization levels (e.g., FP8, INT8) to minimize data movement and utilize the sparse compute capabilities more effectively. Prioritize reducing data movement even if it means slightly more compute, as the energy cost of HBM3 access often dwarfs that of on-chip arithmetic.
  common_mistake: |
    **The Pitfall:** Focusing solely on dense FLOP maximization without analyzing data movement costs.
    **The Rationale:** Developers optimize for raw compute utilization, ignoring the Horowitz table rule that memory access energy dwarfs arithmetic energy by orders of magnitude.
    **The Consequence:** Inference deployments burn excessive power on HBM thrashing, running hot, slow, and expensive.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X with 5.3 TB/s HBM3 and 1,307 TFLOPS.
    - Compute Energy: ~0.2 pJ per 8-bit MAC.
    - Memory Energy: ~5-10 pJ per bit from HBM3.

    **Calculations:**
    - Example Operation: 1,000 FLOPs (500 pJ) needing 100 bytes from HBM3 (4,000 pJ).
    - Memory Bandwidth Limit: 5.3 TB/s limits FP16 read+write to ~2.65 TB/s, deeply starvation-bound against 1,307 TFLOPS.

    **Conclusion & Interpretation:**
    - **Result: Memory energy dominates (Memory-Bandwidth-Bound)**. HBM memory access dominates power consumption, making the system energy-inefficient unless data movement is drastically minimized.
