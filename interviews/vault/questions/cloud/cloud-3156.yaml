title: Ring Attention Communication-Computation Overlap Budget
scenario: 'You are designing Ring Attention for a 70B model across 16 GPUs (2 nodes, 8 NVLink GPUs/node, 400 Gb/s InfiniBand between nodes). Sequence length: 256K tokens split evenly (16K/GPU). Head_dim=128, 8 GQA KV heads. Analyze whether the inter-node InfiniBand link is the bottleneck and propose a topology-aware ring ordering.'
question: "Is the 400 Gb/s InfiniBand link a bottleneck for Ring Attention across 16 GPUs at 256K context, and what ring ordering should you use?"
details:
  realistic_solution: 'KV block per GPU: 16K tokens x 8 KV_heads x 128 dim x 2B x 2(K+V) = 64MB per layer. Per ring step, send 64MB. NVLink intra-node: 900 GB/s, transfer: 0.07ms. InfiniBand inter-node: 400 Gb/s = 50 GB/s, transfer: 1.28ms. Compute per ring step (FlashAttention-2 on 16Kx16K): ~2ms. Naive ring: 2 cross-node transfers per revolution. Since 1.28ms transfer < 2ms compute, it is compute-bound. Topology-aware ring: order GPUs 0-7 (node1), then 8-15 (node2), so only step 7->8 and 15->0 are cross-node.'
  common_mistake: |
    **The Pitfall:** Using a naive ring order (GPU 0,1,2,...,15) without considering the physical node boundaries.
    **The Rationale:** Candidates treat all network links as homogeneous, ignoring the massive bandwidth disparity between NVLink (900 GB/s) and InfiniBand (50 GB/s).
    **The Consequence:** Unnecessary cross-node transfers that saturate the InfiniBand link, severely bottlenecking the Ring Attention pipeline on shorter sequences.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16K tokens/GPU, 8 KV heads, 128 dim, 2 Bytes.
       - NVLink: 900 GB/s. InfiniBand: 400 Gb/s (50 GB/s).
    2. **Calculations:**
       - Block size = 16K * 8 * 128 * 2B * 2(K+V) = 64 MB.
       - NVLink transfer step: 64 MB / 900 GB/s = 0.07 ms.
       - InfiniBand transfer step: 64 MB / 50 GB/s = 1.28 ms.
       - Compute step (16Kx16K): ~2.0 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Transfer (1.28ms) overlaps with compute (2.0ms), so InfiniBand is not the bottleneck.** (Compute-Bound Overlap).
