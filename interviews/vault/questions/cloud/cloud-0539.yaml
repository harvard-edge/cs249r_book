title: The FlashAttention Shift
scenario: We enabled FlashAttention on our Transformer and the profiler shows the same number of FLOPs,
  but throughput jumped 3×. The team is confused — how can you get faster without doing less math?
question: "The team is confused — how can you get faster without doing less math?"
details:
  realistic_solution: 'FlashAttention doesn''t reduce FLOPs — it reduces *bytes moved*. Standard attention
    materializes the full $N \times N$ attention matrix to HBM: for a 4096-token sequence, that''s $4096^2
    \times 2$ bytes = 32 MB written and read per head per layer. FlashAttention tiles the computation
    into SRAM-sized blocks, computing softmax incrementally and never writing the full attention matrix
    to HBM. The FLOPs are identical, but HBM traffic drops by 4–10×. On the Roofline, this shifts the
    workload''s effective arithmetic intensity from ~50 Ops/Byte to ~200 Ops/Byte, moving it from the
    memory-bound regime toward the compute-bound regime.'
  common_mistake: '"FlashAttention must use some approximation that reduces FLOPs" or "It''s just better
    CUDA kernels." FlashAttention computes mathematically identical attention — no approximation. And
    the speedup is too large to explain by kernel micro-optimization alone.'
  napkin_math: 'Standard attention at seq_len=4096, 32 heads, 80 layers: HBM traffic for attention matrices
    alone = $32 \times 80 \times 4096^2 \times 2 \times 3$ (Q·K, softmax, attn·V) ≈ **258 GB**. FlashAttention
    keeps intermediates in 20 MB of SRAM per SM — HBM traffic drops to ~30 GB. Same FLOPs, ~8× fewer bytes
    moved. Effective arithmetic intensity jumps from ~50 to ~400 Ops/Byte, crossing the H100''s ridge
    point of 295.'
