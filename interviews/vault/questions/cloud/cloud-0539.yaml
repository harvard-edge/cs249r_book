title: The FlashAttention Shift
scenario: We enabled FlashAttention on our Transformer and the profiler shows the same number of FLOPs, but throughput jumped 3×.
question: How can you get faster without doing less math?
details:
  realistic_solution: 'FlashAttention doesn''t reduce FLOPs — it reduces *bytes moved*. Standard attention materializes the full $N \times N$ attention matrix to HBM: for a 4096-token sequence, that''s $4096^2 \times 2$ bytes = 32 MB written and read per head per layer. FlashAttention tiles the computation into SRAM-sized blocks, computing softmax incrementally and never writing the full attention matrix to HBM. The FLOPs are identical, but HBM traffic drops by 4–10×. On the Roofline, this shifts the workload''s effective arithmetic intensity from ~50 Ops/Byte to ~200 Ops/Byte, moving it from the memory-bound regime toward the compute-bound regime.'
  common_mistake: |
    **The Pitfall:** Believing FlashAttention reduces the mathematical FLOPs or uses approximations.
    **The Rationale:** Candidates conflate runtime speedups with a reduction in arithmetic operations, ignoring memory bandwidth limits.
    **The Consequence:** Failing to understand how roofline models shift under memory-access optimization.
  napkin_math: |
    1. **Standard Attention HBM Traffic:** 32 heads × 80 layers × 4096^2 × 2 bytes × 3 matrices ≈ 258 GB.
    2. **FlashAttention SRAM:** Keeps intermediates in ~20 MB of SRAM per SM.
    3. **New HBM Traffic:** Drops to ~30 GB.
    4. **Result:** Same FLOPs, but **~8x fewer bytes moved**, shifting the arithmetic intensity to the compute-bound regime.
