title: AWQ on A100 Deployment
scenario: 'A deployment team needs to serve a Mixtral-8x22B-class sparse MoE model on exactly two 80GB GPUs. The model has 141B total parameters but activates only 39B per token. The team wants mixed-precision quantization: 4-bit for MoE expert weights and 8-bit for the always-active router and shared layers.'
question: "Explain how mixed-precision quantization allows this deployment, compute the expected compressed footprint, and identify whether it fits in 160 GB VRAM with room for KV cache."
details:
  realistic_solution: MoE models isolate the vast majority of their parameters in sparsely activated experts. By compressing the ~125B expert weights to 4-bit (INT4/AWQ), we slash the bulk of the footprint. However, the router and shared attention layers (~16B) are heavily utilized and highly sensitive to precision degradation; keeping them in 8-bit (INT8/FP8) preserves model accuracy. This mixed precision strategy fits the massive model within 160GB while leaving ample overhead for KV cache and context windows.
  common_mistake: |
    **The Pitfall:** Applying uniform 4-bit quantization across all parameters.
    **The Rationale:** Engineers treat MoE models identically to dense models, failing to recognize that router networks are accuracy-critical and require higher precision.
    **The Consequence:** Severe degradation in routing accuracy, causing the model to select incorrect experts and hallucinate, rendering the deployment useless.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 141B total, ~125B experts, ~16B shared/router.
       - Precision: 4-bit (0.5 bytes) experts, 8-bit (1 byte) shared.
       - Hardware: 2x 80GB GPUs = 160 GB VRAM.
    2. **Calculations:**
       - 4-bit expert weights: 125B * 0.5 bytes = 62.5 GB.
       - 8-bit shared/router weights: 16B * 1 byte = 16.0 GB.
       - Total mixed-precision footprint: 62.5 + 16 = 78.5 GB.
       - Uniform 4-bit footprint (for comparison): 141B * 0.5 = 70.5 GB.
       - Available VRAM for KV cache: 160 GB - 78.5 GB = 81.5 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 78.5 GB footprint, 81.5 GB free.** The strategy successfully navigates the **Memory-Capacity-Bound** constraint, costing only 8GB vs uniform 4-bit but saving the routing accuracy.
