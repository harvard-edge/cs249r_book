title: AWQ on A100 Deployment
scenario: A deployment team needs to serve Llama-3-70B on exactly two A100 80GB GPUs.
  The raw FP16 weights require 140GB, leaving no room for KV cache.
question: Explain how 4-bit Activation-aware Weight Quantization (AWQ) allows this
  deployment and calculate the compressed weight footprint.
details:
  realistic_solution: At 4-bits per parameter, the 70B model requires 0.5 bytes per
    weight. This compresses the total weight footprint to 35GB. AWQ preserves model
    accuracy by observing activation distributions during calibration and protecting
    the most salient weights, allowing the model to easily fit within the combined
    160GB VRAM with ample room for KV cache.
  common_mistake: Confusing weight quantization with activation quantization, which
    does not shrink the static memory footprint of the weights.
  napkin_math: 70B * 0.5 bytes = 35 GB footprint.
