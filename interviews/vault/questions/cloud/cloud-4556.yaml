title: AWQ on A100 Deployment
scenario: 'A deployment team needs to serve a Mixtral-8x22B-class sparse MoE model
  on exactly two A100 80GB GPUs. The model has 141B total parameters but activates
  only 39B per token. The team wants mixed-precision quantization - 4-bit for MoE
  expert weights (the dominant footprint, rarely active) and 8-bit for the always-active
  router and shared layers.'
question: Explain how mixed-precision quantization (4-bit experts + 8-bit router/shared)
  allows this deployment, computing the expected compressed footprint and identifying
  whether it fits in 160 GB VRAM with room for KV cache.
details:
  realistic_solution: 'Mixtral-8x22B has ~125B in expert weights and ~16B in router/shared
    layers. 4-bit experts: 125B * 0.5 B = 62.5 GB. 8-bit router/shared: 16B * 1
    B = 16 GB. Total weights = 78.5 GB across 160 GB available -> 81.5 GB free for
    KV cache. The 4-bit-uniform alternative would be 141B * 0.5 = 70.5 GB but lose
    8-bit precision on the routing path, hurting accuracy. Mixed precision adds
    8 GB overhead for measurable accuracy preservation - a worthwhile trade.'
  common_mistake: Treating MoE models like dense models and applying uniform 4-bit
    to all parameters, missing that the router and shared layers are accuracy-critical
    and benefit from 8-bit.
  napkin_math: 'Mixed: 125*0.5 + 16*1 = 78.5 GB. Uniform 4-bit: 70.5 GB. Available:
    160 GB; KV cache headroom = 81 GB.'
