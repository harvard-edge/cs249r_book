title: The FP8 Autoregressive Decoding Fallacy
scenario: Your team upgrades a Llama-3-70B inference service from FP16 to FP8. You expect a 2x latency reduction for batch size 1 decoding because FP8 TFLOPS are double FP16. However, Time Per Output Token (TPOT) only improves from 45ms to 24ms (~1.8x).
question: Why did decoding not scale directly with the 2x compute increase, and what explains the ~1.8x speedup?
details:
  realistic_solution: |
    Autoregressive decoding at batch size 1 is memory-bandwidth bound. The doubling of the compute ceiling (TFLOPS) is irrelevant because GPUs are starved for data. The ~1.8x speedup comes entirely from halving the weight memory footprint (from ~140GB to ~70GB), which halves the memory load time across the HBM bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming decoding latency is compute-bound.
    **The Rationale:** Engineers associate quantization primarily with faster Tensor Cores rather than reduced memory transfer times.
    **The Consequence:** Mispredicting performance gains and optimizing the wrong parts of the inference stack.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster bandwidth: 26.8 TB/s.
       - FP16 weights: 140GB. FP8 weights: 70GB.
       - FP16 Compute: 140B FLOPs / (8 * 989 TFLOPS).
    2. **Calculations:**
       - FP16 memory load time = 140GB / 26.8 TB/s = ~5.2ms.
       - FP8 memory load time = 70GB / 26.8 TB/s = ~2.6ms.
       - Compute time = 140B / ~15,800 TFLOPS = ~0.008ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. Compute time (0.008ms) is orders of magnitude smaller than memory load time (2.6ms), proving the speedup is entirely from bandwidth savings, not TFLOPS.
