title: Generation Arithmetic Intensity
scenario: You are serving a 7B parameter (14GB) FP16 language model on a single A100
  80GB SXM with a batch size of 1. You are profiling the token generation phase.
question: Calculate the arithmetic intensity of token generation and determine whether
  this workload is compute-bound or memory-bandwidth-bound.
details:
  realistic_solution: In the token generation phase, generating a single token requires
    reading all 14GB of model weights to perform matrix-vector multiplications, resulting
    in ~14 GFLOPs of compute. The arithmetic intensity is therefore ~1 FLOP/byte.
    The A100's machine balance is 312 TFLOP/s / 2.0 TB/s = 156 FLOPs/byte. Since 1
    << 156, the workload is overwhelmingly memory-bandwidth-bound.
  common_mistake: Candidates often attempt to divide the 312 TFLOP/s compute peak
    by the model FLOPs to find the latency, completely ignoring the memory bandwidth
    bottleneck.
  napkin_math: Machine balance = 312 / 2 = 156 FLOPs/byte. Arithmetic intensity =
    1 FLOP/byte. 2.0 TB/s / 14 GB = ~142 tokens/s limit.
