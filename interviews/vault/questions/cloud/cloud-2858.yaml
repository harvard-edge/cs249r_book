title: Generation Arithmetic Intensity
scenario: You are serving a 7B parameter (14GB) FP16 language model on a single A100 SXM with a batch size of 1. You are profiling the token generation phase.
question: Calculate the arithmetic intensity of token generation and determine whether this workload is compute-bound or memory-bandwidth-bound.
details:
  realistic_solution: In the token generation phase, generating a single token requires reading all 14GB of model weights to perform matrix-vector multiplications, resulting in ~14 GFLOPs of compute. The arithmetic intensity is therefore ~1 FLOP/byte. The A100's machine balance is 312 TFLOP/s / 2.0 TB/s = 156 FLOPs/byte. Since 1 << 156, the workload is overwhelmingly memory-bandwidth-bound.
  common_mistake: |
    **The Pitfall:** Attempting to determine generation latency entirely based on peak GPU TFLOPS.
    **The Rationale:** Candidates memorize the impressive 312 TFLOPS stat of the A100 and divide it directly by the model's FLOPs, ignoring the reality of weight streaming.
    **The Consequence:** The calculation predicts wildly fast generation speeds (e.g., thousands of tokens per second for batch size 1) that physically violate the memory bus limits, leading to drastically under-provisioned infrastructure.
  napkin_math: |
    1. Compute: Generating 1 token requires reading 14 GB of weights to execute ~14 GFLOPs of matrix-vector multiplication.
    2. Arithmetic Intensity: 14 GFLOPs / 14 GB = 1 FLOP/byte.
    3. Hardware Balance: A100 has 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte.
    4. **Result: Since 1 << 156, the workload is severely Memory-Bandwidth-Bound (max speed ~142 tokens/sec).**
