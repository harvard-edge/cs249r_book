title: Static Memory Planning Buffer Reuse
scenario: You are deploying a sequential neural network block for inference on an NVIDIA T4 GPU. The block consists of three operations producing intermediate activation tensors: Op1 produces Tensor X (150MB), Op2 takes X and produces Tensor Y (300MB), and Op3 takes Y and produces Tensor Z (150MB). A naive runtime dynamically allocates all tensors simultaneously. A static memory planner uses liveness analysis to calculate exact memory offsets and reuse buffers.
question: What peak activation memory does static liveness-based planning require, and how much memory is saved compared to naive allocation?
details:
  realistic_solution: Use liveness analysis to find overlapping tensor lifetimes. Tensor X and Y coexist during Op2. Tensor Y and Z coexist during Op3. Tensor Z can reuse the memory address space of Tensor X. Peak memory is determined by the maximum sum of coexisting tensors.
  common_mistake: |
    **The Pitfall:** Simply summing the sizes of all intermediate tensors.
    **The Rationale:** Candidates forget that sequential operations mean earlier inputs can be freed once the output is fully computed.
    **The Consequence:** Drastically overestimating memory requirements, leading to OOM errors or underutilizing the GPU by running smaller batch sizes than necessary.
  napkin_math: |
    *   **Naive Footprint:** X + Y + Z = 150 + 300 + 150 = 600 MB.
    *   **Liveness Analysis (Op2):** Tensors X and Y coexist. Footprint = 150 + 300 = 450 MB.
    *   **Liveness Analysis (Op3):** Tensor X is freed. Tensors Y and Z coexist. Footprint = 300 + 150 = 450 MB.
    *   **Peak Memory:** max(450, 450) = 450 MB.
    *   **Memory Saved:** Naive (600 MB) - Peak (450 MB) = 150 MB saved.
    *   **Result: Static planning limits peak memory to 450 MB, saving 150 MB compared to naive allocation.**
