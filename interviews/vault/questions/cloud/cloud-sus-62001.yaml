title: KV-Cache Transfer Bandwidth Budget
scenario: After prefill finishes on a prefill GPU, the KV-cache for a 4096-token request (using a 70B
  model with 96 layers, GQA with 8 KV heads, head dim 128, FP16) must be transferred to a decode GPU over
  400 Gbps InfiniBand HDR. Calculate the transfer size and the resulting transfer latency. Is this on
  the critical path for TTFT?
details:
  realistic_solution: 'KV-cache size = 2 (K+V) × num_kv_heads × head_dim × seq_len × num_layers × bytes_per_element.
    With GQA: 2 × 8 × 128 × 4096 × 96 × 2 bytes = 1.61 GB. At 400 Gbps (50 GB/s effective): 1.61 GB /
    50 GB/s = ~32ms. Yes, this is on the critical path for TTFT since decode cannot start until the KV-cache
    arrives.'
  common_mistake: Forgetting GQA reduces KV heads from 96 to 8, causing a 12x overcount of transfer size.
    Also forgetting the factor-of-2 for key AND value tensors.
  napkin_math: 2 × 8 × 128 × 4096 × 96 × 2 = 1,610,612,736 bytes ≈ 1.5 GiB (1.61 GB). 400 Gbps = 50 GB/s.
    1.61 GB / 50 GB/s ≈ 32ms. For a 1k-token prompt the prefill itself on H100 takes ~10ms, so KV transfer
    adds ~3× overhead — a significant TTFT penalty at this network speed.
