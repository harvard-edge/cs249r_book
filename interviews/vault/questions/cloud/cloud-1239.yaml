title: Evaluating Confidential Computing for Exact Model Theft
scenario: You are the security architect for a cloud AI provider deploying a proprietary 70B parameter
  LLM (140GB in FP16) on an auto-scaling cluster of instances with 8x H100 GPUs. An internal red team
  demonstrated they can extract the raw `model.safetensors` files by escaping the inference container
  and dumping host RAM/VRAM. Evaluate the architectural trade-offs between implementing strict network
  egress filtering, heavily restricted RBAC with host intrusion detection, and hardware-based Confidential
  Computing to prevent exact model extraction by an insider threat.
details:
  realistic_solution: Deploying hardware-based Confidential Computing (e.g., NVIDIA Hopper CC paired with
    AMD SEV-SNP). The 140GB model is decrypted only within the hardware-protected memory enclave. While
    this introduces a ~5-10% performance overhead and limits profiling tools, it cryptographically isolates
    the weights from the host OS, hypervisor, and other tenants, making memory dumping mathematically
    infeasible.
  common_mistake: Relying solely on disk encryption (KMS/LUKS) and strict RBAC, assuming the host OS is
    secure. Candidates often fail to recognize that once weights are loaded into host RAM or GPU VRAM
    for inference, a compromised hypervisor or root-level container escape can simply dump the plaintext
    memory.
  napkin_math: Dumping 140GB from VRAM to host memory at PCIe Gen5 x16 speeds (~64 GB/s) takes ~2.2 seconds.
    Exfiltrating 140GB over a stealthy 100 Mbps connection takes ~3.2 hours. Because the local dump is
    nearly instantaneous, relying purely on network monitoring is insufficient; prevention must occur
    at the memory level (encryption in-use).
