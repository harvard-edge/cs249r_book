title: Resource Quota and GPU Memory Oversubscription in Kubernetes
scenario: 'A multi-tenant Kubernetes cluster with MI300X (192GB HBM3) GPUs has 5 teams sharing 10 GPUs.
  Each team requests limits.nvidia.com/gpu: 1 but actual models range from 7B (14GB) to 70B (140GB). Teams
  with 70B models frequently OOM-kill other tenants'' pods sharing the same GPU device.'
details:
  realistic_solution: Use NVIDIA's GPU Memory Manager or MPS (Multi-Process Service) with memory limits.
    For MI300X with 192GB, use MIG where supported, or implement memory-aware scheduling via extended
    resources (nvidia.com/gpu.memory). Create separate node pools per model size tier and use namespace
    resource quotas with node affinity to isolate tenants by GPU memory requirement.
  common_mistake: Trusting GPU memory limits in Kubernetes resource requests. Standard Kubernetes GPU
    resource accounting tracks GPU device count, not GPU memory. Two pods can both be assigned the same
    GPU (if memory-based scheduling isn't used), leading to OOM conflicts.
  napkin_math: 'MI300X 192GB HBM3. 70B model at FP16 = 140GB — uses 73% of one GPU. 7B model = 14GB =
    7.3%. Two 70B models: 280GB > 192GB → OOM inevitable. Correct tenant isolation: tier-1 (>100GB) →
    dedicated GPU. tier-2 (10-100GB) → MIG 3g.64gb (64GB slice). tier-3 (<10GB) → MIG 1g.24gb. MI300X
    MIG support: 8 slices of 1g.24gb or 3 slices of 3g.64gb per GPU. Reduces OOM conflicts to zero with
    proper tiering.'
