title: RDMA Error Recovery in Long-Running Training Jobs
scenario: 'A 90-day training run on 1024 H100s will inevitably experience RDMA transport errors: QP failures, path migration events, HCA resets, and cable disconnections.'
question: What RDMA error recovery architecture allows a 90-day, 1024-H100 training run to continue with minimal interruption during QP failures?
details:
  realistic_solution: 'Multi-tier error recovery specification: Tier 1 — Transient errors: Reset the affected QP and retry the failed AllReduce without checkpoint rollback. Tier 2 — Path failures: Activate alternate path via APM on InfiniBand. Tier 3 — Node failure: Exclude failed node, load checkpoint on a spare node, re-establish all QP connections.'
  common_mistake: |
    **The Pitfall:** Treating all RDMA errors as fatal and aggressively restarting the entire job from the last checkpoint.
    **The Rationale:** It's the simplest recovery method logically and avoids complex transport state management.
    **The Consequence:** At scale, the mean time between failures drops significantly; restarting on every error spends more time recovering than actually training.
  napkin_math: |
    1. **Assumptions & Constraints:** 90-day run on 1024 GPUs. Estimated events: ~900 Tier 1 (transient), ~90 Tier 2 (path), ~13 Tier 3 (node). Restart penalty = 10 mins.
    2. **Calculations:** Tiered Recovery Time = (900 × 0.1s) + (90 × 5s) + (13 × 600s) = 90s + 450s + 7800s = 8340s (~139 minutes). Restart Recovery Time = (900 + 90 + 13) × 10 mins = 10,030 mins (~167 hours).
    3. **Conclusion & Interpretation:** **Result: Tiered recovery drops downtime from 167 hours to 139 minutes. Cluster-Availability-Bound.**
