title: Centralized Checkpointing Network Bottleneck
scenario: You are training a large language model using optimizer state partitioning across 64 nodes,
  each with 8 GPUs (512 GPUs total). The partitioned state amounts to 1.5 GB per GPU. You are currently
  using a centralized checkpointing strategy where all workers send their state synchronously to a single
  coordinator node. The coordinator node is equipped with a 200 Gbps Ethernet NIC to receive the data
  before writing to cloud storage. Calculate the absolute minimum time required just to transfer the checkpoint
  data from the workers to the coordinator.
question: "What is the absolute minimum time to transfer the 512 GPUs' 1.5GB state shards to the 200Gbps coordinator?"
details:
  realistic_solution: Recognize that all 512 workers are funnelling data into one node. The bottleneck
    is the coordinator's 200 Gbps (25 GB/s) receive bandwidth. Calculate the total payload (768 GB) and
    divide by the coordinator's bandwidth to find a theoretical minimum transfer time of ~30.7 seconds.
  common_mistake: Assuming the checkpoint time is bounded by the aggregate network bandwidth of the 64
    nodes or the cloud storage write speed, rather than recognizing the network incast bottleneck at the
    single coordinator's NIC.
  napkin_math: Total Data = 512 GPUs * 1.5 GB/GPU = 768 GB. Coordinator NIC = 200 Gbps / 8 = 25 GB/s.
    Minimum Transfer Time = 768 GB / 25 GB/s = 30.72 seconds.
