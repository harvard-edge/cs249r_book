title: Evaluating Multi-Dimensional Bin Packing for Stranded Capacity
scenario: You manage a fleet of 500 nodes, each equipped with 8x H100 GPUs, 2TB RAM, and 192 CPU cores.
  The workload consists of LLM fine-tuning jobs (requesting 4 GPUs, 400GB RAM, 48 CPUs) and CPU-heavy
  data preprocessing jobs (requesting 0 GPUs, 200GB RAM, 64 CPUs). The current scheduler uses a Best-Fit
  heuristic based solely on GPU count. You observe that overall cluster GPU utilization is capped at 65%
  because nodes run out of CPU and RAM before their GPUs are fully allocated. Evaluate an alternative
  multi-dimensional bin-packing heuristic that balances resource utilization and justify how it mitigates
  this 'stranded capacity' problem.
question: "What multi-dimensional scheduling heuristic would reduce stranded H100 capacity, and how does it improve packing over GPU-only Best-Fit?"
details:
  realistic_solution: Implement a multi-dimensional scoring heuristic (such as dot-product or cosine similarity
    between the requested resource vector and the node's available resource vector) to pack complementary
    workloads together. This explicitly favors scheduling CPU-heavy preprocessing jobs onto nodes that
    have already been allocated to GPU-heavy fine-tuning jobs.
  common_mistake: Relying on single-dimensional scheduling (e.g., GPU-only First-Fit or Best-Fit), which
    ignores asymmetric resource requirements and inevitably leads to stranded, unusable resources on nodes
    when auxiliary resources like CPU or memory are exhausted.
  napkin_math: 'Node capacity: [8 GPUs, 192 CPUs, 2000GB]. 2x Fine-tuning jobs consume [8 GPUs, 96 CPUs,
    800GB]. Remaining node capacity: [0 GPUs, 96 CPUs, 1200GB]. Under a multi-dimensional packer, the
    scheduler evaluates the remaining [0, 96, 1200] and fits 1x Preprocessing job [0, 64, 200]. Final
    node usage: 100% GPU, 83% CPU (160/192), 50% RAM (1000/2000), eliminating stranded GPUs.'
