title: Evaluating Multi-Dimensional Bin Packing for Stranded Capacity
scenario: You manage a fleet of 500 nodes. The workload consists of LLM fine-tuning jobs (requesting 4 GPUs, 400GB RAM, 48 CPUs) and CPU-heavy data preprocessing jobs (requesting 0 GPUs, 200GB RAM, 64 CPUs). The current scheduler uses a Best-Fit heuristic based solely on GPU count. You observe that overall cluster GPU utilization is capped at 65% because nodes run out of CPU and RAM before their GPUs are fully allocated.
question: What multi-dimensional scheduling heuristic would reduce stranded capacity, and how does it improve packing over GPU-only Best-Fit?
details:
  realistic_solution: Implement a multi-dimensional scoring heuristic (such as dot-product or cosine similarity between the requested resource vector and the node's available resource vector) to pack complementary workloads together. This explicitly favors scheduling CPU-heavy preprocessing jobs onto nodes that have already been allocated to GPU-heavy fine-tuning jobs.
  common_mistake: |
    **The Pitfall:** Relying exclusively on single-dimensional scheduling limits.
    **The Rationale:** Candidates often assume that because GPUs are the most expensive resource, scheduling should only optimize for GPU block allocation, ignoring the auxiliary resources.
    **The Consequence:** This guarantees that asymmetric workloads exhaust the CPU or Memory first, stranding highly expensive GPUs on the node completely unusable until the job finishes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Node: 8 GPUs, 192 CPUs, 2000 GB.
       - Best-Fit GPUs (2x Fine-Tuning): 8 GPUs, 96 CPUs, 800 GB.
    2. **Calculations:**
       - Stranded Capacity: 0 GPUs, 96 CPUs, 1200 GB remaining.
       - Multi-Dimensional Pack adds 1x Preprocessing: 0 GPUs, 64 CPUs, 200 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Final Node Usage is 100% GPU, 83% CPU, 50% RAM. Eliminates stranded waste.**
