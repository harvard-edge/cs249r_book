title: Evaluating Proxy Metrics for Delayed-Label Drift Detection
scenario: 'A real-time fraud detection model deployed on an EKS cluster with 20 `inf2.xlarge` instances
  processes 5,000 transactions per second. Operational metrics (p99 latency 15ms, 0 HTTP 5xx errors, 55%
  NPU utilization) are perfectly healthy. However, a new synthetic identity fraud vector has emerged,
  causing a silent 12% drop in precision over 3 weeks. Ground truth labels (chargebacks) are delayed by
  30-45 days. Evaluate three proxy metric strategies to detect this silent failure within 24 hours: (A)
  embedding distance drift from training baseline, (B) output prediction distribution shift (KL divergence),
  or (C) automated slice-based data validation on input features. Justify your choice with quantitative
  trade-offs.'
details:
  realistic_solution: Implementing multivariate drift detection on the penultimate embedding layer (Strategy
    A). Using a fast two-sample test (like Maximum Mean Discrepancy) on a sample of embeddings isolates
    the new synthetic fraud cluster from natural, benign data drift.
  common_mistake: Relying solely on output prediction distribution shift (KL divergence), which is highly
    sensitive to natural seasonal traffic volume changes and leads to high false-positive alert fatigue.
  napkin_math: At 5,000 TPS (4.32e8 daily transactions), a 12% precision drop on a 1% fraud rate alters
    output probability mass by only ~0.12%, easily buried in daily ±2% volume variance. Conversely, in
    a 256D embedding space, a novel fraud cluster shifts the MMD distance by >3x the baseline variance,
    reliably triggering an alert on just a 10,000 transaction sample.
