title: Cloud Transformation Lineage L5 0
scenario: You can implement lineage at two granularities: (A) dataset-level (hash entire output of each step) or (B) record-level (track provenance of each individual record). Your pipeline processes 100M records across 8 steps.
question: "Should you use dataset-level or record-level lineage for 100M records across 8 steps, and what are the trade-offs?"
details:
  realistic_solution: 'Dataset-level (A): 8 hashes per run, ~5 KB metadata, 160s hashing overhead. Simple, low cost. Can tell you which step changed but not which records were affected. Record-level (B): 100M records × 8 steps × ~100 bytes lineage = 80 GB metadata per run. Can trace any output record to its exact inputs. Useful for debugging individual predictions but 10,000x more storage. Choose A for most training pipelines (sufficient for regression debugging). Choose B only for regulated domains (healthcare, finance) where per-prediction audit trails are legally required.'
  common_mistake: |
    **The Pitfall:** Defaulting to record-level lineage for all pipelines without considering the cost.
    **The Rationale:** Engineers want maximum visibility and traceability, assuming more data is always better for debugging.
    **The Consequence:** Bloating the system with thousands of times more metadata than needed, dramatically increasing storage costs for debugging capabilities that are rarely used outside of regulated domains.
  napkin_math: |
    - Dataset-level storage: 8 steps * 600B hash = 4.8 KB.
    - Record-level storage: 100M records * 8 steps * 100B lineage = 80 GB.
    - Storage ratio: 80 GB / 4.8 KB ≈ 17 million times more data.
    - **Record-level lineage requires 80 GB of metadata per run and indexed DB queries, while dataset-level requires only 4.8 KB.**
