title: Cloud Transformation Lineage L5 0
scenario: 'You can implement lineage at two granularities: (A) dataset-level (hash entire output of each
  step) or (B) record-level (track provenance of each individual record). Your pipeline processes 100M
  records across 8 steps. Evaluate both approaches.'
question: "Should you use dataset-level or record-level lineage for 100M records across 8 steps, and what are the trade-offs?"
details:
  realistic_solution: 'Dataset-level (A): 8 hashes per run, ~5 KB metadata, 160s hashing overhead. Simple,
    low cost. Can tell you which step changed but not which records were affected. Record-level (B): 100M
    records × 8 steps × ~100 bytes lineage = 80 GB metadata per run. Can trace any output record to its
    exact inputs. Useful for debugging individual predictions but 10,000x more storage. Choose A for most
    training pipelines (sufficient for regression debugging). Choose B only for regulated domains (healthcare,
    finance) where per-prediction audit trails are legally required.'
  common_mistake: Defaulting to record-level lineage without considering the cost. Most ML debugging needs
    only dataset-level lineage to identify which pipeline step caused a regression.
  napkin_math: 'Dataset-level: 8 × 600B = 4.8 KB. Record-level: 100M × 8 × 100B = 80 GB. Storage ratio:
    80 GB / 4.8 KB ≈ 17 million × more. Query: dataset-level is O(1); record-level needs indexed DB.'
