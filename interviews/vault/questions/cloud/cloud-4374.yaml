title: 'MI300X Prefill Throughput: Compute-Bound vs H100 for Long Prompts'
scenario: During prefill (processing a 32K-token prompt), attention computes QK^T
  of shape [H, N, N] where H=40 heads and N=32K tokens. The arithmetic intensity of
  this operation is 2N/(2×d_head + 2×N) ≈ N/d_head for large N. With d_head=128, AI
  ≈ 250 FLOP/byte at N=32K. A100 SXM4 (312 TFLOPS FP16, 2TB/s), H100 SXM5 (989 TFLOPS,
  3.35 TB/s), MI300X (1,307 TFLOPS, 5.3 TB/s). Which accelerator is compute-bound
  for prefill at this AI, and what are the expected FLOP efficiencies?
question: Which accelerator is compute-bound for prefill at this AI, and what are
  the expected FLOP efficiencies?
details:
  realistic_solution: 'Ridge points: A100: 312 TFLOPS / 2,000 GB/s = 156 FLOP/byte.
    H100: 989 / 3,350 = 295.2 FLOP/byte. MI300X: 1,307 / 5,300 = 246.6 FLOP/byte.
    At AI=250: A100: AI=250 > ridge=156 → compute-bound. Effective throughput = 312
    TFLOPS (full compute). H100: AI=250 < ridge=295 → memory-bound. Effective: 3,350
    GB/s × 250 = 838 TFLOPS. MI300X: AI=250 > ridge=247 → compute-bound (barely).
    Effective: 1,307 TFLOPS (full compute). Throughput ranking at AI=250: A100 (312)
    < MI300X (1,307) ≈ H100 (838). Wait — H100 effective is 838 (memory-bound) vs
    MI300X 1,307 (compute-bound). MI300X wins prefill by 1,307/838 = 1.56×. A100 is
    far behind at 312. Key insight: MI300X''s higher TFLOPS makes it compute-bound
    (good for prefill) while H100 remains memory-bound at this AI. For very long contexts
    (N→∞, AI→∞), all accelerators become compute-bound and MI300X dominates by raw
    TFLOPS.'
  common_mistake: Assuming prefill is always memory-bound like decode. For long sequences,
    attention's AI scales with sequence length, eventually crossing the roofline ridge
    point and becoming compute-bound. At N=32K with d_head=128, AI≈250 is above H100's
    ridge (295) but below, and above A100's ridge (156) — the crossover behavior differs
    per accelerator.
  napkin_math: 'AI for attention at N=32K, d_head=128: FLOPs = 2×H×N²×d = 2×40×32K²×128
    = 2×40×1024M×128 = 10.5T. Memory = 2×H×N×d×2bytes (Q,K matrices) + H×N²×2bytes
    (attention map) = 2×40×32K×128×2 + 40×32K²×2 = 655MB + 83.9GB ≈ 84.6GB. AI = 10.5T/84.6G
    = 124 FLOP/byte (not 250 — the simplified formula overestimates). At AI=124: all
    below H100 ridge (295) and MI300X ridge (247): all memory-bound. Effective: A100:
    2000×124 = 248 TFLOPS. H100: 3350×124 = 415 TFLOPS. MI300X: 5300×124 = 657 TFLOPS.
    MI300X still wins by 1.58× over H100 — bandwidth advantage persists.'
