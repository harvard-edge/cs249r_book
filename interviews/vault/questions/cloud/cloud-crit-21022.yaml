title: MoE Expert Specialization Analysis
scenario: After training a 16-expert MoE language model, you analyze routing patterns and discover that
  expert 3 processes 90% of code tokens but only 5% of natural language tokens, while expert 7 is the
  opposite. Is this specialization desirable or a sign of poor routing? How does this affect serving?
question: "Is this specialization desirable or a sign of poor routing, and how does this affect serving?"
details:
  realistic_solution: 'Expert specialization is desirable for model quality — it means each expert develops
    distinct capabilities rather than being redundant copies. Expert 3 becoming a ''code expert'' and
    expert 7 a ''language expert'' is the intended behavior of MoE. However, this creates serving challenges:
    (1) Traffic composition determines load balance. A code-heavy workload will overload expert 3 and
    underutilize expert 7. (2) Request routing must be traffic-aware: if your service handles mixed code+language,
    balance is natural. If you serve separate code and language endpoints, each will have different expert
    utilization patterns. (3) Consider workload-aware expert placement: replicate expert 3 on the code-serving
    cluster and expert 7 on the language cluster. (4) Monitor expert hit rates per traffic type and auto-scale
    expert replicas based on demand. The routing is healthy — the serving infrastructure must adapt to
    it.'
  common_mistake: Treating any non-uniform routing as a problem. Domain specialization is a feature, not
    a bug — it means experts have learned distinct competencies. The problem arises only when specialization
    creates load imbalance at serving time.
  napkin_math: 'Code traffic at 50% of requests: expert 3 gets 50% × 90% + 50% × 5% = 47.5% of its capacity
    from code alone. If code traffic spikes to 80%: expert 3 load = 80% × 90% + 20% × 5% = 73% — needs
    replication. Expert 7 load: 80% × 5% + 20% × 90% = 22% — underutilized.'
