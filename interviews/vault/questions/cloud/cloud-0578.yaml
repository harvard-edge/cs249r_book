title: 'The Blackwell Bet: A $100M GPU Upgrade Decision'
scenario: You are the technical lead for the ML training platform at a leading autonomous vehicle company.
  Your cluster currently consists of thousands of H100 GPUs. The finance department has asked you to evaluate
  a $100M+ proposal to upgrade the entire fleet to the new B200 architecture.
details:
  realistic_solution: The correct L6+ approach is to design a decision framework grounded in the GPU roofline
    model and power efficiency (TOPS/W).
  common_mistake: 'The most common mistake is to create a simplistic cost-benefit analysis based only
    on the headline TFLOPS number. For example: ''The B200 has 2.27x the TFLOPS of the H100, so our jobs
    will be 2.27x faster, justifying the cost.'' This thinking completely ignores memory bandwidth and
    the workload''s arithmetic intensity, which dictates whether the extra compute can even be used. It
    mistakes peak theoretical performance for realized performance.'
  napkin_math: 'For H100: Ridge point = 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte. Workload A (Training
    LLM, large batch, AI ~1000) is compute-bound, scaling with TFLOPS. Workload B (Inference, batch=1,
    AI ~5) is memory-bound, scaling with memory bandwidth (3.35 TB/s). An upgrade must be evaluated on
    TFLOPS/W and BW/W based on the specific workload''s AI.'
