title: 'The Blackwell Bet: A $100M GPU Upgrade Decision'
scenario: You are the technical lead for the ML training platform at a leading autonomous vehicle company. Your cluster currently consists of thousands of H100 GPUs. The finance department has asked you to evaluate a $100M+ proposal to upgrade the entire fleet to the new B200 architecture.
question: How would you evaluate the $100M fleet upgrade beyond headline TFLOPS?
details:
  realistic_solution: The correct L6+ approach is to design a decision framework grounded in the GPU roofline model and power efficiency (TOPS/W).
  common_mistake: |
    **The Pitfall:** Basing the ROI strictly on peak TFLOPS ratios.
    **The Rationale:** Candidates think "2.27x more TFLOPS means 2.27x faster," completely ignoring memory bandwidth and arithmetic intensity.
    **The Consequence:** Spending $100M on hardware that provides zero speedup if the workload is actually memory-bandwidth-bound.
  napkin_math: |
    * H100 Ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.
    * Compute-bound workload (e.g., Training LLM, large batch, AI ~1000): Scales with **TFLOPS/W**.
    * Memory-bound workload (e.g., Inference, batch=1, AI ~5): Scales with **Bandwidth/W**.
    * **Result:** An upgrade must be evaluated based on the specific workload's Arithmetic Intensity and how it aligns with the hardware's Roofline curve, not just peak theoretical TFLOPS.
