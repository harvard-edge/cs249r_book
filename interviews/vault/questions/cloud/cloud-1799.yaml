title: Diagnosing Gradient Explosions from Corrupted Cloud Data
scenario: You are training a distributed recommender system model on 256 GPUs using a global batch size of 32,768. The dataset consists of 50TB of continuous click logs. An upstream data pipeline issue corrupted roughly 1% of the labels, replacing them with extreme outlier values. Training with Mean Squared Error (MSE) loss repeatedly crashes due to NaN gradients, even with global gradient clipping set to 0.5. A full dataset sweep to filter the corrupted data would delay the critical deployment by 48 hours.
question: What is causing the NaN gradient crashes, and how would you modify the objective to stabilize training without filtering the 50 TB dataset?
details:
  realistic_solution: Replace the MSE loss function with a robust alternative like Huber Loss or implement loss truncation. Huber loss acts as L2 loss for small errors but transitions to L1 loss for errors larger than a hyperparameter delta, inherently bounding the maximum gradient contribution from any single outlier.
  common_mistake: |
    **The Pitfall:** Relying solely on tighter gradient clipping or learning rate decay.
    **The Rationale:** Engineers assume standard regularization can suppress extreme outliers without changing the fundamental loss formulation.
    **The Consequence:** Masks the problem but heavily slows down convergence on clean data, or forces a complex data-filtering pipeline that is too slow to execute.
  napkin_math: |
    1. With MSE, an outlier with error E=100 generates a gradient proportional to 100.
    2. In a batch of 32,768 with 1% outliers (~327 outliers), the outlier gradient sum is 327 * 100 = 32,700.
    3. With Huber loss (delta=1), the gradient is bounded to 1.
    4. The outlier gradient sum becomes 327 * 1 = 327.
    5. **Conclusion: Huber loss provides a 100x reduction in the destructive gradient magnitude, preventing NaN spikes.**
