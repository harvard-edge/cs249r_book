title: SLO Allocation in Multi-Stage Serving
scenario: 'You are designing the serving architecture for a real-time personalized recommendation feed.
  The business requirement dictates a global end-to-end P99 latency SLO of 250ms. The system consists
  of three sequential microservices: a retrieval stage (Approximate Nearest Neighbors), a ranking stage
  (heavy deep learning ranking model on GPUs), and an assembly stage (business logic). Network routing
  and client overhead take a fixed 50ms. You are evaluating whether to allocate a P99 latency budget of
  100ms to retrieval, 75ms to ranking, and 25ms to assembly, or to implement dynamic timeouts where the
  ranking stage consumes whatever budget is left over after retrieval.'
details:
  realistic_solution: Establish strict, static latency budgets for each component and enforce graceful
    degradation (e.g., ranking fewer retrieved items if retrieval is slow). Because tail percentiles do
    not aggregate linearly, individual service SLOs must be strictly higher (e.g., P99.6) than the global
    P99 target to guarantee the 250ms end-to-end SLO.
  common_mistake: Assuming that P99 latencies of sequential microservices simply add up to the end-to-end
    P99 latency, and favoring dynamic cascading timeouts without realizing they destroy the predictability
    and efficiency of hardware batching in the ranking stage.
  napkin_math: If 3 independent sequential services each have a P99 latency of X, the probability that
    a request is 'fast' through all three is 0.99 * 0.99 * 0.99 = 0.970299. Therefore, summing the individual
    P99s gives you the end-to-end P97 latency, not the P99. To hit an end-to-end P99 of 200ms (250ms -
    50ms network), the individual microservices need approximately a P99.67 SLO for their respective time
    budgets.
