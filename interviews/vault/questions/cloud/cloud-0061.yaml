title: 'The RAG Update Bottleneck'
scenario: 'You are an engineer at an automotive company responsible for a customer support chatbot. The bot uses a RAG model with its knowledge base stored in a 200 GB vector index. To add information about a new car model, you must roll out an updated index to the serving cluster over the datacenter''s 400 Gbps InfiniBand network.'
question: 'Assuming you have to ship the entire 200 GB file, how long would it take to transfer the index to a single serving pod over 400 Gbps InfiniBand?'
details:
  realistic_solution: 'The transfer time is surprisingly short. A 400 Gbps InfiniBand network provides approximately 50 GB/s of bandwidth. Transferring a 200 GB index takes only 4 seconds. This calculation reveals that for most RAG updates, the network transfer itself is not the dominant latency. The real engineering challenge is what happens *after* the transfer: safely loading the new index into the serving process without dropping requests, handling the memory pressure, and warming up the index.'
  common_mistake: |
    **The Pitfall:** Overestimating datacenter transfer times by mentally anchoring on consumer internet speeds.
    **The Rationale:** Engineers fail to internalize the massive 50 GB/s bandwidth of modern interconnects like InfiniBand.
    **The Consequence:** Teams misidentify network transfer as the primary update bottleneck, rather than focusing on the real challenges: memory mapping, cache warming, and safe atomic reloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 GB vector index.
    - 400 Gbps InfiniBand network.

    **Calculations:**
    - Convert network speed: 400 Gbps / 8 = 50 GB/s.
    - Calculate transfer time: 200 GB / 50 GB/s = 4 seconds.

    **Conclusion & Interpretation:**
    - **Result: 4 seconds (Network-Bound)**. The transfer takes exactly 4 seconds, showing network transfer is not the dominant latency.
  options:
    - '32 seconds'
    - '2.7 minutes'
    - '4 seconds'
    - '0.5 seconds'
