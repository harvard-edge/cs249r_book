title: Little's Law Throughput Bound on H100 Inference Cluster
scenario: You are staffing an H100 inference cluster for a text-generation service. Average requests in-flight
  (L) is measured at 480. Mean service time per request is 120ms. A PM asks what the maximum sustainable
  throughput is before queuing effects dominate. Apply Little's Law to answer.
question: "Using Little's Law, what steady-state throughput corresponds to 480 requests in flight and 120 ms mean service time?"
details:
  realistic_solution: 'Little''s Law: L = λ·W. Rearrange: λ = L/W = 480 / 0.12s = 4000 req/s. This is
    the throughput the system is sustaining at steady state — it does not indicate saturation by itself.'
  common_mistake: Confusing L (mean number in system) with queue depth only; forgetting that L includes
    requests currently being served.
  napkin_math: L=480, W=120ms=0.12s → λ = 480/0.12 = 4000 req/s. At 8 H100s each handling ~500 req/s,
    this is plausible for small-model inference.
