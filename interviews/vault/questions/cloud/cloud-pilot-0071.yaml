title: DP Training Cluster Budget
scenario: A healthcare model trains for 48 hours on 64 H100 GPUs without privacy. Enabling DP-SGD is expected to add a 3x per-step compute multiplier from per-sample clipping/noise and reduce the maximum stable batch size by 2x, requiring twice as many optimizer steps. Size the new GPU-hour budget and explain the dominant cost driver.
question: How many GPU-hours should you budget if DP-SGD adds 3x compute and 2x more optimizer steps to a 64-H100, 48-hour run?
details:
  realistic_solution: The original run costs 64 x 48 = 3,072 GPU-hours. The per-step DP-SGD overhead is estimated at 3x, and the smaller stable batch doubles the number of steps, so the independent planning multipliers combine to 6x. The new budget is 18,432 GPU-hours. The dominant driver is the combined effect of per-sample clipping overhead and more optimizer steps.
  common_mistake: Accounting for the 3x DP overhead but missing the extra optimizer steps caused by the smaller stable batch size.
  napkin_math: Base = 64 x 48 = 3,072 GPU-h. Multiplier = 3 x 2 = 6. New = 18,432 GPU-h.
