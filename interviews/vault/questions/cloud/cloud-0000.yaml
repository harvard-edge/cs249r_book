title: The Per-Token KV-Cache Cost
scenario: You are calculating the memory requirements for serving a large language model. The model has
  40 layers, 64 attention heads per layer, and a head dimension of 128. If you are using FP16 precision,
  calculate the amount of memory the KV-cache consumes for *each single token* added to the sequence.
details:
  realistic_solution: For each token in the input sequence, every attention layer must store a Key and
    a Value vector. The size of these vectors is determined by the number of heads and the head dimension.
    The total memory per token is the sum of the sizes of these K and V vectors across all layers.
  common_mistake: The most common errors are forgetting to account for both the Key (K) and the Value
    (V) tensors (an off-by-2x error) or using the wrong precision (e.g., 4 bytes for FP32 instead of 2
    for FP16). Another mistake is calculating for just one layer instead of all of them.
  napkin_math: '1. **Identify dimensions:** 40 layers, 64 heads, 128 head dimension.

    2. **KV vector size per layer:** Each layer stores a K and a V vector, each of size num_heads × head_dim
    = 64 × 128 = 8,192 elements.

    3. **Bytes per layer:** 2 vectors × 8,192 elements × 2 bytes (FP16) = 32,768 bytes.

    4. **Total across all layers:** 40 × 32,768 = 1,310,720 bytes ≈ **1.31 MB per token**.'
  options:
  - About 655 KB
  - About 2.62 MB
  - About 32.7 KB
  - About 1.31 MB
  correct_index: 3
