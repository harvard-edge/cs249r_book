title: Mitigating Late-Stage Hardware Constraints
scenario: Your ML team spent $2M and 3 months training a 70B parameter model in FP16 for real-time fraud detection. Upon handoff, you discover the target production environment has a strict 50ms p99 latency budget and is constrained to single GPUs with 24GB VRAM to maintain profitable unit economics. The team proposes salvaging the project by applying post-training 4-bit quantization and aggressive layer pruning to fit the model into production.
question: Is post-training 4-bit quantization and pruning a viable salvage strategy for the 70B FP16 fraud model on a single 24GB GPU?
details:
  realistic_solution: Reject the mitigation strategy. A 70B model even at 4-bit precision requires ~35GB just for weights, which fundamentally cannot fit on a 24GB L4 GPU. The project must be restarted with the L4 hardware and 50ms SLA defined as strict upstream interface contracts, likely targeting a 7B-14B parameter architecture.
  common_mistake: |
    **The Pitfall:** Evaluating the technical merits of compression algorithms without checking physical feasibility.
    **The Rationale:** Engineers jump to advanced optimization techniques (like AWQ or GPTQ) assuming that "compression" will inherently solve deployment constraints.
    **The Consequence:** Teams waste weeks attempting a mitigation strategy that is mathematically impossible, representing a massive constraint propagation failure.
  napkin_math: |
    - **Uncompressed Weights:** 70B * 2 bytes (FP16) = 140 GB.
    - **Compressed Weights:** 70B * 0.5 bytes (4-bit INT4) = 35 GB.
    - **Hardware Constraint:** Target GPU has only 24 GB VRAM available.
    - **Conclusion:** **35 GB > 24 GB. The model physically cannot fit on a single GPU, even at 4-bit precision.**
