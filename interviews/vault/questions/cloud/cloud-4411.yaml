title: Chiplet Yield Model and Cost per Compute Die
scenario: A fab offers N5 (5nm) compute dies at $0.10/mm² cost and 0.1 defects/cm² defect density. Your monolithic design is 600mm² (H100-class). A chiplet alternative uses 6x100mm² dies.
question: For the 600 mm² monolithic die versus six 100 mm² chiplets, what are the yield and cost differences, and where is the crossover?
details:
  realistic_solution: 'Use Murphy''s yield model: Y = ((1 - e^(-D0*A)) / (D0*A))^2. At D0=0.1 defects/cm², 600mm²=6cm²: Y_mono = ((1-e^(-0.6))/0.6)^2 ≈ 0.565. For 100mm²=1cm²: Y_small = ((1-e^(-0.1))/0.1)^2 ≈ 0.905. Effective chiplet yield = 0.905^6 ≈ 0.55 (needing all 6), plus assembly yield ~0.99 per die = 0.99^6 ≈ 0.94 → net 0.52. But chiplet approach allows binning: one bad die scraps only 1/6 vs whole chip. With bin selling, chiplet cost advantage grows.'
  common_mistake: |
    **The Pitfall:** Using a linear yield model instead of an exponential/Poisson model.
    **The Rationale:** Engineers incorrectly assume that dividing defect density by area scales yield proportionally.
    **The Consequence:** Vastly underestimating the economic advantage of chiplets, as yield degrades super-linearly with large die areas.
  napkin_math: |
    - 1. Calculate monolithic yield (6cm²): Y = ((1 - e^(-0.6)) / 0.6)² ≈ 56.5%.
    - 2. Calculate monolithic cost per good die: (600 mm² * $0.10) / 0.565 = $106.
    - 3. Calculate chiplet yield (1cm²): Y = ((1 - e^(-0.1)) / 0.1)² ≈ 90.5%.
    - 4. Calculate chiplet cost per good die: (100 mm² * $0.10) / 0.905 = $11.05.
    - 5. Calculate total chiplet package cost: (6 * $11.05) + $10 assembly = $76.30.
    - 6. Conclusion: The chiplet approach saves **~$30 per package** (~28% cheaper).
