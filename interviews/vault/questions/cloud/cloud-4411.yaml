title: Chiplet Yield Model and Cost per Compute Die
scenario: A fab offers N5 (5nm) compute dies at $0.10/mm² cost and 0.1 defects/cm² defect density. Your monolithic design is 600mm² (H100-class). A chiplet alternative uses 6x100mm² dies. Calculate the yield difference and cost crossover.
question: For the 600 mm² monolithic die versus six 100 mm² chiplets, what are the yield and cost differences, and where is the crossover?
details:
  realistic_solution: 'Use Murphy''s yield model: Y = ((1 - e^(-D0*A)) / (D0*A))^2.
    At D0=0.1 defects/cm², 600mm²=6cm²: Y_mono = ((1-e^(-0.6))/0.6)^2 ≈ 0.565. For 100mm²=1cm²:
    Y_small = ((1-e^(-0.1))/0.1)^2 ≈ 0.905. Effective chiplet yield = 0.905^6 ≈ 0.55 (needing
    all 6), plus assembly yield ~0.99 per die = 0.99^6 ≈ 0.94 → net 0.52. But chiplet
    approach allows binning: one bad die scraps only 1/6 vs whole chip. With bin selling,
    chiplet cost advantage grows.'
  common_mistake: Using a linear yield model. Engineers divide the defect density
    by area and assume yield scales proportionally. The Poisson/Murphy yield model
    shows yield degrades super-linearly with die area because a single defect anywhere
    on the die causes full die loss.
  napkin_math: 'Monolithic: 600mm² at $0.10/mm² = $60 wafer cost, yield 56.5% → $106
    per good die. Chiplet (6x100mm²): $10 each, yield 90.5% → $11.05 per good die, $66.30
    for 6. Assembly overhead $5–15 per package → total $71–81. Chiplet saves ~23–33%
    at scale.'
