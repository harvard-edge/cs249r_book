title: Dataloader Thread Blocking
scenario: A PyTorch training script on a cloud instance sets num_workers=0 in the DataLoader. The GPU utilization hovers at 45%.
question: Explain the mechanical reason for the GPU underutilization and how changing this parameter fixes it.
details:
  realistic_solution: With num_workers=0, reading and augmenting the data happens sequentially on the main Python thread, forcing the GPU to idle while the next batch is prepared. Increasing num_workers spawns background processes to prefetch data concurrently, keeping the GPU saturated.
  common_mistake: |
    **The Pitfall:** Blaming the batch size or GPU memory capacity.
    **The Rationale:** Engineers assume low utilization simply means the GPU could handle a larger batch.
    **The Consequence:** Increasing the batch size might marginally boost utilization during the compute spike, but fails entirely to fix the fundamental I/O deadlock stalling the run.
  napkin_math: |
    1. Assumptions & Constraints: 0 workers means 1 synchronous thread handles both data parsing and GPU feeding.
    2. Calculations: Total time = Dataloader parse time + GPU compute time. GPU idles completely during parse time.
    3. Conclusion & Interpretation: **Result: The GPU effectively idles for the entire duration of the I/O read. Bottleneck: I/O Bound.**
