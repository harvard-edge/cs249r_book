title: Dataloader Thread Blocking
scenario: A PyTorch training script on a cloud instance sets num_workers=0 in the
  DataLoader. The A100 GPU utilization hovers at 45%.
question: Explain the mechanical reason for the GPU underutilization and how changing
  this parameter fixes it.
details:
  realistic_solution: With num_workers=0, reading and augmenting the data happens
    sequentially on the main Python thread, forcing the GPU to idle while the next
    batch is prepared. Increasing num_workers spawns background processes to prefetch
    data concurrently, keeping the GPU saturated.
  common_mistake: Blaming batch size or GPU memory rather than the synchronous I/O
    blocking.
  napkin_math: 0 workers = 1 synchronous thread
