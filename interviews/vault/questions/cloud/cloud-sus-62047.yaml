title: Embedding Table Hot Row Replication for Serving
scenario: Your recommendation serving cluster has 16 A100 serving nodes, each with an embedding table
  shard. Profiling shows that the top-10k rows (out of 50M total) in the user-ID embedding table receive
  80% of all lookups. These 10k rows create a hotspot on 2 nodes (they share a row range). Design a dynamic
  hot-row replication scheme and compute the read throughput improvement.
details:
  realistic_solution: 'Dynamic hot-row replication: (1) Monitor per-row access frequency on a sliding
    10-minute window. Rows exceeding 100 lookups/minute are promoted to ''hot'' status. (2) Hot rows are
    replicated to all serving nodes asynchronously (gossip-based or central coordinator push). Replication
    lag: <5 seconds for hot rows (small data). (3) Routing: a consistent hash ring normally assigns rows
    to nodes. For replicated hot rows, the router uses load-aware routing — send to the least-loaded node
    among all nodes holding that row. (4) Invalidation: on embedding update (online learning), broadcast
    updates for hot rows to all replicas before marking the update complete. Read throughput improvement:
    currently 2 nodes serve 80% of lookups (10k hot rows on 2 nodes). Each A100 can serve 200k lookups/s
    (random HBM access at 2 TB/s / 256 bytes per row). 2 nodes: 400k lookups/s at 80% load = 320k effective.
    After replication to all 16 nodes: 16 × 200k × 0.8 = 2.56M lookups/s. Improvement: 2.56M / 320k =
    8× for hot rows.'
  common_mistake: Proposing static replication of all top-10k rows on all 16 nodes upfront — this works
    but doesn't adapt to changes in access patterns (popularity changes over time as new users become
    active).
  napkin_math: 'Hot row lookup rate: assume 2M QPS × 500 sparse features = 1B lookups/s total. 80% = 800M
    lookups/s to 10k hot rows. 2 nodes at 200k lookup/s each: 400k/s capacity — 2000× under-provisioned!
    Even with 16 nodes: 3.2M/s — still 250× under. Real fix: a single ''hot row'' must be cached in L2/L3
    GPU cache across all nodes. At 256 bytes/row × 10k rows = 2.56 MB — fits in L2 cache (A100 L2 = 40
    MB). Cached hot row lookup latency = L2 hit time (~50 ns vs ~250 ns HBM). Effective throughput: 16
    nodes × (40 MB L2 / 256 bytes × 1B lookups/s) = 16 × 156M = 2.5B lookups/s. Sufficient for 800M hot
    lookups/s with 3× headroom.'
