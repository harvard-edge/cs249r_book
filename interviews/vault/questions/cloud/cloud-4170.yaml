title: Torus Topology and Nearest-Neighbor Communication
scenario: Google's TPU v5e pods use a 3D torus topology connecting 256 chips (arranged as an 8x8x4 grid). Each inter-chip link is 200 Gbps.
question: How do you compute the 3D torus bisection bandwidth for the 256-chip TPU pod, and why is it 12.8 Tbps rather than 6.4 Tbps?
details:
  realistic_solution: 'Torus bisection bandwidth: each ring contributes 2 cut links (the ring is cut at 2 points). 64 links × 200 Gbps = 12.8 Tbps (not 6.4 Tbps which only counts one cut per ring).'
  common_mistake: |
    **The Pitfall:** Assuming a torus is always inferior to a fat-tree due to lower bisection bandwidth.
    **The Rationale:** Torus excels when communication is predominantly nearest-neighbor (as in pipeline parallelism and 2D-sharded matrix multiplications), which is exactly how TPUs operate.
    **The Consequence:** Designing overly complex and expensive network topologies for workloads that don't need them.
  napkin_math: |
    - 3D torus bisection bandwidth: a cut through an 8x8x4 torus cuts 64 links (each of the 32 rings is cut twice due to wraparound).
    - 64 links * 200 Gbps = **12.8 Tbps bisection bandwidth**.
    - (Not 6.4 Tbps — the torus bisection cuts through each ring twice, doubling the count vs a simple cut).
