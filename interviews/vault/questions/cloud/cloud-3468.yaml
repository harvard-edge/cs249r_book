title: Optimizing LLM Inference Routing on AMD MI300X Cluster
scenario: You are optimizing load balancing for an LLM on a cluster of AMD MI300X accelerators (192 GB HBM3, 1,307 TFLOPS FP16 sparse, 5.3 TB/s). The current round-robin balancer yields increased tail latency and uneven utilization due to highly variable input sizes and generation lengths.
question: How would you replace round-robin with dynamic, load-aware routing to reduce tail latency and balance utilization across the MI300X servers?
details:
  realistic_solution: Employ consistent hashing augmented with real-time feedback. Each accelerator reports metrics like GPU utilization, HBM usage, and queue depth. The load balancer routes requests intelligently to instances with lower queues or higher available capacity, preventing any single MI300X from overloading.
  common_mistake: |
    **The Pitfall:** Applying naive load balancing methods like simple round-robin for LLMs.
    **The Rationale:** Candidates overlook the immense variability in inference request processing times driven by varying prompt and generation lengths.
    **The Consequence:** "Hot" accelerators become bottlenecks, leading to increased queueing, higher tail latencies, and cluster underutilization.
  napkin_math: |
    - **Cluster Size:** 10 AMD MI300X units.
    - **Baseline:** Average request = 150ms. Max ideal throughput = 10 / 0.15s = 66.67 QPS.
    - **Imbalance Scenario:** One overloaded unit's average time increases to 180ms.
    - **New Throughput:** 9 units at 150ms (1 / 0.15 = 6.66 QPS each, total 60 QPS) + 1 unit at 180ms (1 / 0.18 = 5.55 QPS). Total = 65.55 QPS.
    - **Result:** The overall cluster's maximum sustainable QPS decreases by **~1.7%** ((66.67 - 65.55) / 66.67).
