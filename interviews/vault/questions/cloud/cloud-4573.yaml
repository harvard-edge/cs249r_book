title: A100 Hardware NVDEC Offloading
scenario: A multimodal pipeline on an 8xA100 node processes 4K video. Decoding on
  CPU stalls GPUs at 30% utilization due to PCIe Gen4 bandwidth limits when transferring
  uncompressed RGB frames.
question: Analyze the quantitative bandwidth impact of shifting video decoding from
  CPU to the GPU's hardware NVDEC engines.
details:
  realistic_solution: When decoded on the CPU, uncompressed 4K video (3840x2160x3
    bytes) requires roughly 24MB per frame to cross the PCIe bus. At 60 FPS, this
    is ~1.44 GB/s per stream. Shifting decoding to NVDEC means only the highly compressed
    H.264/HEVC stream (e.g., 20-50 Mbps) traverses the PCIe bus. This reduces PCIe
    traffic by a factor of over 200x, entirely eliminating the interconnect bottleneck
    and allowing the A100 tensors to hit maximum utilization.
  common_mistake: Discussing CUDA core utilization instead of recognizing that NVDEC
    is dedicated ASIC silicon on the GPU that offloads decoding without consuming
    GPU tensor cores.
  napkin_math: 'Uncompressed: 24MB * 60FPS = 1.44 GB/s per stream. Compressed H.265:
    ~5 MB/s. PCIe savings = 1.435 GB/s per stream.'
