title: Hardware NVDEC Offloading
scenario: A multimodal pipeline on an 8-GPU node processes 4K video. Decoding on CPU stalls GPUs at 30% utilization due to PCIe Gen4 bandwidth limits when transferring uncompressed RGB frames.
question: "Analyze the quantitative bandwidth impact of shifting video decoding from CPU to the GPU's hardware NVDEC engines."
details:
  realistic_solution: When decoded on the CPU, uncompressed 4K video (3840x2160x3 bytes) requires roughly 24.88MB per frame to cross the PCIe bus. At 60 FPS, this is ~1.49 GB/s per stream. Shifting decoding to NVDEC means only the highly compressed H.264/HEVC stream (e.g., 20-50 Mbps) traverses the PCIe bus. This reduces PCIe traffic by a factor of over 200x, entirely eliminating the interconnect bottleneck and allowing the tensors to hit maximum utilization.
  common_mistake: |
    **The Pitfall:** Discussing CUDA core utilization instead of hardware decoding engines.
    **The Rationale:** Assuming that video decoding on a GPU necessarily consumes the same tensor cores needed for ML inference.
    **The Consequence:** Hesitancy to offload decoding to the GPU, leaving the system permanently bottlenecked by the PCIe bus.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Uncompressed 4K Frame: 3840 x 2160 x 3 bytes ≈ 24.88 MB.
       - Framerate: 60 FPS.
       - Compressed Stream: H.265/HEVC uses ~5 MB/s.
    2. **Calculations:**
       - Uncompressed Stream (CPU Decode) = 24.88 MB * 60 = ~1.49 GB/s per stream over PCIe.
       - Compressed Stream (GPU NVDEC) = ~0.005 GB/s over PCIe.
       - Bandwidth Savings = 1.49 GB/s - 0.005 GB/s = ~1.485 GB/s per stream.
    3. **Conclusion & Interpretation:**
       - **Result: >200x PCIe Bandwidth Reduction (I/O-Bound).** Offloading decoding to NVDEC completely eliminates the PCIe bottleneck, unblocking GPU utilization.
