title: Sensitivity Roofline Diagnosis
scenario: A kernel performs 2 TFLOPs and reads 200 GB from HBM per request. Measured latency is 55 ms.
question: Is a kernel with 2 TFLOPs and 200 GB HBM traffic compute-bound or memory-bound on a 1,000 TFLOP/s, 4 TB/s GPU?
details:
  realistic_solution: Construct a Roofline model analysis. Calculate the theoretical lower bounds for both compute execution time and memory transfer time based on hardware peak capabilities. The hardware metric that dominates (takes longer) defines the operational bound. Since the memory time lower bound is 50 ms and the measured 55 ms is extremely close, the kernel is definitively memory-bandwidth bound.
  common_mistake: |
    **The Pitfall:** Focusing on 2 TFLOPs as a large number and assuming the kernel is compute-bound.
    **The Rationale:** Trillions of floating point operations subjectively sounds like a massive compute workload.
    **The Consequence:** Failing to compare compute against the memory traffic and hardware ridge point, leading to misdirected optimization efforts (tuning math ops instead of data access patterns).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload Compute: 2 TFLOPs.
       - Workload Memory: 200 GB.
       - GPU Peak Compute: 1,000 TFLOP/s.
       - GPU Peak Bandwidth: 4 TB/s.
    2. **Calculations:**
       - Compute Time Lower Bound: $T_{compute}$ = 2 TFLOPs / 1,000 TFLOP/s = 0.002 s = 2 ms.
       - Memory Time Lower Bound: $T_{memory}$ = 200 GB / 4 TB/s = 0.05 s = 50 ms.
    3. **Conclusion & Interpretation:**
       - **The measured 55 ms is highly correlated with the 50 ms memory bound. Result: Memory-Bandwidth Bound.**
