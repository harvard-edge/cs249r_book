title: Sensitivity Roofline Diagnosis
scenario: A kernel performs 2 TFLOPs and reads 200 GB from HBM per request. The GPU has 1,000 TFLOP/s peak and 4 TB/s HBM bandwidth. Measured latency is 55 ms.
question: Is a kernel with 2 TFLOPs and 200 GB HBM traffic compute-bound or memory-bound on a 1,000 TFLOP/s, 4 TB/s GPU?
details:
  realistic_solution: Compute time lower bound is 2 TFLOPs / 1,000 TFLOP/s = 2 ms. Memory time lower bound is 200 GB / 4 TB/s = 50 ms. The measured 55 ms is close to the memory lower bound, so the kernel is memory-bound.
  common_mistake: |
    **The Pitfall:** Focusing on 2 TFLOPs as a large number and assuming the kernel is compute-bound.
    **The Rationale:** Trillions of floating point operations sounds like a massive compute workload.
    **The Consequence:** Failing to compare compute against the memory traffic and hardware ridge point, leading to misdirected optimization efforts (e.g. tuning math ops instead of data access).
  napkin_math: |
    - **Compute Time Lower Bound:** $T_{compute}$ = 2 TFLOPs / 1,000 TFLOP/s = 0.002 s = 2 ms.
    - **Memory Time Lower Bound:** $T_{memory}$ = 200 GB / 4 TB/s = 0.05 s = 50 ms.
    - **Analysis:** Max lower bound is memory (50 ms).
    - **Conclusion:** The measured 55 ms is very close to the memory bound, confirming the kernel is **memory-bound**.
