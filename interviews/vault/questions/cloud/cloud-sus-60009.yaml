title: Differentiating through a sort operation for learning-to-rank on TPU
scenario: You are implementing a differentiable ranking loss for a recommendation system on TPU v4. Standard
  torch.sort() is not differentiable (the backward pass produces zero gradients). Your loss function needs
  to rank items by predicted score and compute NDCG, which requires gradients to flow back to the scoring
  model.
details:
  realistic_solution: 'Use a soft-sort approximation: NeuralSort (parameterized softmax of pairwise comparisons)
    or SoftRank. Implement via a custom autograd Function: forward computes the permutation matrix (differentiable),
    backward uses the chain rule through the soft permutation. Alternatively, use ListNet loss which converts
    rankings to probability distributions over permutations, which is naturally differentiable.'
  common_mistake: Using torch.argsort() and indexing with it, expecting gradients to flow. Since argsort
    returns integer indices, PyTorch cannot propagate gradients through the indexing operation. The model
    trains but the ranking loss gradient is always zero, silently.
  napkin_math: 'NeuralSort for N=100 items: O(N²) comparisons = 10,000 ops. On TPU v4 at ~275 TFLOPS,
    this is negligible. The pairwise comparison matrix (100×100×batch_size×4 bytes) = 100×100×512×4 =
    20MB per batch — fits in TPU HBM easily.'
