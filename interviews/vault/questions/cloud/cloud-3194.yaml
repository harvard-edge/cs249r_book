title: MoE Auxiliary Loss Coefficient Tuning
scenario: You are training a 16-expert MoE language model. With an auxiliary load-balancing loss coefficient α=0.01, you see good perplexity but 3 dead experts. With α=0.1, all experts are utilized but perplexity degrades by 5%.
question: How should you tune MoE routing when α=0.01 leaves dead experts but α=0.1 hurts perplexity?
details:
  realistic_solution: 'The optimal approach combines multiple techniques rather than relying solely on α. (1) Use a moderate α=0.03-0.05 to provide gentle balance pressure. (2) Add a router z-loss (DeepSeek-V3 uses this) with coefficient 0.001 to prevent router logit explosion without directly forcing uniform routing. (3) Apply per-expert learning rate scaling — dead experts get higher learning rates to ''catch up.'' (4) Use Sinkhorn-based routing (soft assignment) during early training, then anneal to hard top-k routing. The DeepSeek-V3 recipe: α=0.003 for balance loss + z-loss, achieving both balance and specialization. Monitor expert utilization entropy — target entropy of log2(16)−1 = 3.0 bits (not maximum entropy, which prevents specialization).'
  common_mistake: |
    **The Pitfall:** Treating the auxiliary loss coefficient as a simple, single-dimensional hyperparameter to grid-search.
    **The Rationale:** Engineers overlook the fundamental tension: strong balance loss forces uniform routing, which actively fights the model's capacity to build specialized experts.
    **The Consequence:** The model either wastes compute on dead experts or suffers severe perplexity degradation from forced generalization.
  napkin_math: |
    * **Ideal Expert Entropy:** ~3.0 bits (equivalent to 8 effective experts out of 16, allowing beneficial specialization).
    * **Scenario A (α=0.01):** 3 dead experts (utilization < 0.5%). High specialization, poor hardware balance.
    * **Scenario B (α=0.1):** 0 dead experts. Forced uniform routing degrades quality by 5%.
    * **Conclusion:** Using α=0.03 combined with a z-loss of 0.001 achieves **0 dead experts with <1% quality loss**.
