title: Cloud New 0016
scenario: Architect a distributed telemetry and testing system for a 10,000 H100 GPU cluster to detect
  Silent Data Corruption (SDC) and hardware degradation without interrupting long-running training jobs.
details:
  realistic_solution: Architect an interleaved deterministic test-vector framework. Inject a lightweight,
    deterministic matrix multiplication kernel at the end of every epoch (or every N hours) across all
    H100s simultaneously. The test inputs are identical globally. Monitor the outputs via a high-speed
    reduction over the IB network to a telemetry server. If an H100 produces a result deviating from the
    known deterministic checksum, automatically isolate the node, drain its tasks, and trigger a cluster
    repair cycle.
  common_mistake: Relying solely on ECC memory error logs or loss curve divergence, which only catch catastrophic
    failures and miss subtle silent ALU bit-flips.
  napkin_math: 10,000 H100s at 989 TFLOPS. A quick 4096x4096x4096 FP16 matmul requires ~137 GFLOPS. On
    an H100, this runs in <1 millisecond. Telemetry overhead over 400Gbps IB is negligible. Impact on
    training throughput is strictly less than 0.01%.
