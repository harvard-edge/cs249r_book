title: Cloud New 0016
scenario: A 10,000 H100 GPU cluster requires a distributed telemetry and testing system to detect Silent Data Corruption (SDC) and hardware degradation without interrupting long-running training jobs.
question: How would you detect silent data corruption and hardware degradation across 10,000 H100s without interrupting training?
details:
  realistic_solution: Architect an interleaved deterministic test-vector framework. Inject a lightweight, deterministic matrix multiplication kernel at the end of every epoch (or every N hours) across all H100s simultaneously. The test inputs are identical globally. Monitor the outputs via a high-speed reduction over the IB network to a telemetry server. If an H100 produces a result deviating from the known deterministic checksum, automatically isolate the node, drain its tasks, and trigger a cluster repair cycle.
  common_mistake: |
    **The Pitfall:** Relying solely on ECC memory error logs or loss curve divergence.
    **The Rationale:** These methods only catch catastrophic failures.
    **The Consequence:** They miss subtle silent ALU bit-flips, leading to corrupted model weights and wasted training time.
  napkin_math: |
    - **Compute Capacity:** 10,000 H100s at 989 TFLOPS.
    - **Test Workload:** 4096x4096x4096 FP16 matmul requires ~137 GFLOPS.
    - **Execution Time:** On an H100, this runs in <1 millisecond.
    - **Final Result:** **Impact on training throughput is strictly less than 0.01%.**
