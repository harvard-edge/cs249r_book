title: Bisection Bandwidth Requirement
scenario: A 128-GPU training job has a modeled per-GPU gradient exchange volume of
  2 GB per step. The target exposed communication budget is 40 ms. Estimate the effective
  per-GPU bandwidth needed and explain what this implies for topology.
question: What effective per-GPU communication bandwidth is needed to move 2 GB within
  a 40 ms budget?
details:
  realistic_solution: Each GPU needs about 2 GB / 0.04 s = 50 GB/s effective bandwidth.
    The topology must provide that bandwidth at the collective level, not merely as
    a headline NIC speed. Oversubscription or poor placement can violate the budget
    even with fast links.
  common_mistake: Comparing required bandwidth to raw NIC line rate without accounting
    for collective efficiency and bisection.
  napkin_math: Required effective bandwidth = 2 GB / 40 ms = 50 GB/s per GPU.
