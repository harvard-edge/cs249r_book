title: TP Weight Sharding Memory Layout
scenario: When loading a 70B model checkpoint for TP=8 inference, each GPU needs only
  its shard of the weights. Describe how Megatron-style checkpoints store TP-sharded
  weights and the two approaches for loading them.
question: For TP=8 inference, how are Megatron-style TP-sharded checkpoints stored
  and what are the two ways to load each GPU's shard?
details:
  realistic_solution: 'Two approaches: (1) Pre-sharded checkpoints (Megatron default):
    During training with TP=8, each rank saves its own shard as a separate file (e.g.,
    model_tp0.pt through model_tp7.pt). Each file is ~17.5 GB. At inference, each
    GPU loads only its file — fast, memory-efficient, but checkpoint is TP-degree-specific.
    Changing TP requires a resharding script. (2) Consolidated checkpoint with lazy
    loading: Store one full checkpoint. Use torch.load with mmap=True (PyTorch 2.1+)
    or safetensors memory mapping. Each GPU memory-maps the full file but only materializes
    its shard into GPU memory by slicing the relevant rows/columns. OS page cache
    means only accessed pages are loaded from disk. Memory efficient but requires
    the filesystem to handle random reads well. Modern practice: store consolidated
    safetensors checkpoints (compatible with any TP degree) and shard on-the-fly using
    tensor_parallel metadata that records split dimensions.'
  common_mistake: Loading the full checkpoint on every GPU and then slicing — this
    requires 140 GB of CPU memory per process and is extremely slow for large models.
  napkin_math: 'Full load approach: 140 GB × 8 processes = 1.12 TB CPU RAM. Pre-sharded:
    17.5 GB × 1 process = 17.5 GB per GPU. Loading time at PCIe 5.0 (64 GB/s): 17.5/64
    = 0.27 s vs 140/64 = 2.2 s.'
