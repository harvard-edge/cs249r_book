title: Diagnosing Non-Linear Power Drops in GPU DVFS
scenario: Your MLOps team is managing a cluster of A100 GPUs (400W TDP) training a Large Language Model.
  To meet a strict 300W facility power cap per GPU, an engineer manually reduced the SM clock frequency
  by 25% (from 1410 MHz to 1057 MHz). They projected that power would drop linearly by 25% to exactly
  300W. However, telemetry shows the dynamic power consumption plummeted by nearly 58% down to ~168W,
  leaving a massive portion of the power budget unutilized and unnecessarily degrading training throughput.
  Diagnose why the power drop was drastically larger than the team's linear projection.
details:
  realistic_solution: Analyze the GPU's DVFS (Dynamic Voltage and Frequency Scaling) curve. Dynamic power
    is defined by P = αCV²f. When the driver reduces frequency by 25%, it also drops the operating voltage
    (e.g., from 1.0V to 0.75V) to maintain stability at the lower clock without wasting energy. This combined
    reduction causes a cubic-like drop in power. To fix this, the team should avoid manual frequency pinning
    and instead use explicit hardware power limits (e.g., `nvidia-smi -pl 300`), allowing the GPU firmware
    to dynamically optimize the V-f curve to maximize throughput at exactly 300W.
  common_mistake: Assuming dynamic power scales only linearly with clock frequency (P ∝ f) and ignoring
    the automatic voltage reduction (DVFS) enforced by the GPU's power management controller.
  napkin_math: P_initial = C * (1.0V)² * f = 1.0 P_max. If frequency drops 25% (f_new = 0.75f) and DVFS
    scales voltage down 25% proportionally (V_new = 0.75V), then P_new = C * (0.75V)² * (0.75f) = C *
    0.5625 * 0.75 = 0.4218 * P_max. 100% - 42.18% = 57.82% reduction in dynamic power.
