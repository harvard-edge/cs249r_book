title: Disaggregated Serving Graceful Degradation Under Partial Failure
scenario: A disaggregated serving cluster loses 30% of its decode pool due to a network
  partition. The remaining 70% of decode capacity cannot serve all requests. Design
  a graceful degradation strategy that maintains service for as many users as possible.
question: How would you gracefully degrade service after losing 30% of decode capacity
  while serving as many users as possible?
details:
  realistic_solution: 'Graceful degradation protocol: (1) Immediate detection: decode
    pool health monitor detects 30% node loss within 10 seconds. (2) Capacity recomputation:
    new capacity = 70% of baseline. If baseline handles 500 RPS, new capacity = 350 RPS.
    (3) Triage by SLA tier: (a) Premium tier (typically 20% of requests): serve at full
    SLA — 100 RPS if premium is 20% of 500. Within 350 RPS capacity. (b) Standard tier:
    rate-limit to available capacity after premium: 350 - 100 = 250 RPS for standard
    (reduced from 400 RPS baseline). Return HTTP 429 with Retry-After: 5s for excess
    standard requests. (4) Model fallback: if 70B is under pressure, route low-priority
    requests to a smaller model (8B) running on the same nodes. 8B decode is 5x faster,
    increasing effective capacity.'
  common_mistake: 'Treating partial failure as binary (system works or fails) and
    attempting to maintain full functionality for all requests, resulting in all requests
    being degraded. A better approach: triage requests by SLA tier and maintain full
    service for high-priority users while gracefully degrading for low-priority.'
  napkin_math: 'Normal capacity: 500 RPS. After 30% failure: 350 RPS. Demand: 100 RPS
    premium (20%), 400 RPS standard (80%). Allocate 100 RPS to premium -> 250 RPS
    capacity remaining for standard. Standard without fallback: 250/400 = 62.5% served.
    With 8B fallback (5x faster): Route 150 standard RPS to 8B, consuming 150/5 = 30
    RPS-equivalents of 70B capacity. Remaining capacity: 250 - 30 = 220 RPS for 70B
    standard. Total standard served = 220 (70B) + 150 (8B) = 370 RPS (92.5% of standard
    demand).'
