title: Disaggregated Serving Graceful Degradation Under Partial Failure
scenario: A disaggregated serving cluster loses 30% of its decode pool due to a network partition. The remaining 70% of decode capacity cannot serve all requests.
question: How would you gracefully degrade service after losing 30% of decode capacity while serving as many users as possible?
details:
  realistic_solution: 'Graceful degradation protocol: (1) Immediate detection: decode pool health monitor detects 30% node loss within 10 seconds. (2) Capacity recomputation: new capacity = 70% of baseline. If baseline handles 500 RPS, new capacity = 350 RPS. (3) Triage by SLA tier: (a) Premium tier (typically 20% of requests): serve at full SLA — 100 RPS if premium is 20% of 500. Within 350 RPS capacity. (b) Standard tier: rate-limit to available capacity after premium: 350 - 100 = 250 RPS for standard (reduced from 400 RPS baseline). Return HTTP 429 with Retry-After: 5s for excess standard requests. (4) Model fallback: if 70B is under pressure, route low-priority requests to a smaller model (8B) running on the same nodes. 8B decode is 5x faster, increasing effective capacity.'
  common_mistake: |
    **The Pitfall:** Treating partial failure as binary and indiscriminately routing all requests until the surviving shards collapse under the unmanaged load.
    **The Rationale:** Engineers lean into naive load-balancing algorithms (like round-robin) that blindly push traffic without dynamically capping admission based on survived capacity limits and tier priority.
    **The Consequence:** The remaining 70% of the cluster completely OOMs or queues to infinity, cascading a 30% localized failure into a 100% global catastrophic outage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline capacity: 500 RPS. Premium: 100 RPS (20%), Standard: 400 RPS (80%).
       - 30% capacity lost (70% remaining).
       - Fallback 8B model is 5x faster than 70B model.
    2. **Calculations:**
       - Post-Failure Capacity: 500 RPS * 0.70 = 350 RPS.
       - Triage Allocation: 350 RPS - 100 RPS (Premium) = 250 RPS for Standard.
       - Model Fallback: Route 150 standard RPS to 8B model. Consumes 150 / 5 = 30 RPS-equivalents of 70B capacity.
       - Remaining 70B Standard Capacity: 250 - 30 = 220 RPS.
       - Total standard served: 220 (70B) + 150 (8B) = 370 RPS.
    3. **Conclusion & Interpretation:**
       - **Result: 370 RPS (92.5% of standard demand) gracefully served via Compute-Tier-Bound model fallback.**
