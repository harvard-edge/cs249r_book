title: Transformer Layer FLOP Decomposition
scenario: For a single transformer layer with hidden dimension d = 4096, h = 32 heads, head dimension 128, FFN inner dimension 4d = 16384, and sequence length S = 2048, decompose the total FLOPs into attention and FFN components.
question: How do the attention and FFN FLOPs break down for this layer, and which component dominates?
details:
  realistic_solution: The FFN component accounts for roughly 2/3 of total FLOPs due to its two large matrix multiplications with 4x expansion.
  common_mistake: |
    **The Pitfall:** Assuming attention dominates because it's the novel part of the transformer architecture.
    **The Rationale:** Engineers focus heavily on attention mechanisms while overlooking the massive fully connected layers.
    **The Consequence:** Misallocating optimization efforts toward attention when the FFN is the actual compute bottleneck.
  napkin_math: |
    1. **Calculate Attention FLOPs:** Projections = 8Sd^2 = 8 × 2048 × 4096^2 ≈ 275B. Scores = 4S^2d = 4 × 2048^2 × 4096 ≈ 69B. Total ≈ 344B.
    2. **Calculate FFN FLOPs:** 16Sd^2 = 16 × 2048 × 4096^2 ≈ 550B.
    3. **Calculate Total and Dominance:** Total = 894B FLOPs. FFN is ~61% of total.
    **Final Result: The FFN dominates the computation, accounting for ~61% (550B) of the 894B total FLOPs.**
