title: Transformer Layer FLOP Decomposition
scenario: For a single transformer layer with hidden dimension $d = 4096$, $h = 32$ heads, head dimension
  128, FFN inner dimension $4d = 16384$, and sequence length $S = 2048$, decompose the total FLOPs into
  attention and FFN components. Which dominates?
question: "How do the attention and FFN FLOPs break down for this layer, and which component dominates?"
details:
  realistic_solution: 'Attention: Q/K/V projections = $3 \times 2Sd^2 = 6Sd^2$. Score computation = $4S^2
    d$. Output projection = $2Sd^2$. Total: $8Sd^2 + 4S^2 d$. FFN: Two linear layers ($d \to 4d$ and $4d
    \to d$): $2 \times 2S \cdot d \cdot 4d = 16Sd^2$. For $S=2048, d=4096$: Attention ≈ $8 \times 2048
    \times 4096^2 + 4 \times 2048^2 \times 4096 \approx 275$B + 69B = 344B FLOPs. FFN ≈ $16 \times 2048
    \times 4096^2 \approx 550$B FLOPs. FFN is ~61% of total.'
  common_mistake: Assuming attention dominates because it's the 'novel' part of the transformer. For typical
    models, the FFN (two large matmuls with 4× expansion) accounts for roughly 2/3 of total FLOPs.
  napkin_math: 'Attention projections: $8Sd^2 = 8 \times 2K \times 16M \approx 275B$. | Attention scores:
    $4S^2d = 4 \times 4M \times 4K \approx 69B$. | FFN: $16Sd^2 \approx 550B$. | Total per layer: ~894B
    FLOPs. | FFN dominates at ~61%.'
