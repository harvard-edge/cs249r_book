title: The Collective Primitive Confusion
scenario: 'A junior engineer is debugging a distributed training job using FSDP (Fully Sharded Data Parallel). They see three different NCCL collective calls in the profiler trace: AllGather before the forward pass, ReduceScatter after the backward pass, and occasionally AllReduce.'
question: What are the semantic differences between AllGather, ReduceScatter, and AllReduce, and why does FSDP use them at different points?
details:
  realistic_solution: 'Each collective has a distinct contract. **AllGather**: each GPU contributes a shard; every GPU ends up with the full tensor. **ReduceScatter**: each GPU contributes a full tensor; the tensors are element-wise reduced (summed), and each GPU receives only its shard. **AllReduce** = ReduceScatter + AllGather. FSDP avoids AllReduce because it doesn''t need the full gradient on every GPU, saving memory.'
  common_mistake: |
    **The Pitfall:** Treating all collectives as interchangeable "sync" operations.
    **The Rationale:** Engineers often view distributed training as just "communication" without understanding primitive contracts.
    **The Consequence:** Sub-optimal distributed communication resulting in massive network overhead and reduced training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1 GB tensor on 8 GPUs.
    2. **Calculations:**
       - AllGather: each GPU sends 125 MB, receives 1 GB total -> 875 MB transferred per GPU.
       - ReduceScatter: each GPU sends 875 MB, receives 125 MB reduced shard.
       - AllReduce: 1.75 GB per GPU (equivalent to ReduceScatter + AllGather).
    3. **Conclusion & Interpretation:**
       - **Result: FSDP saves ~50% communication vs DDP by using ReduceScatter instead of AllReduce.**
