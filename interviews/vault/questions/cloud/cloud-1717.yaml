title: Diagnosing PUE Degradation in Liquid Cooling
scenario: You manage an AI training cluster of 100 8-GPU nodes. Originally, each node consumed 10 kW (1.0
  MW total IT load), and the facility's total power draw was 1.2 MW, yielding a Power Usage Effectiveness
  (PUE) of 1.20. To improve efficiency, you retrofit the cluster with direct-to-chip liquid cooling. This
  allows you to remove the high-RPM server fans, reducing each node's IT power to 9 kW (0.9 MW total IT
  load). However, the new facility-level cooling pumps and heat exchangers add 250 kW of overhead, bringing
  the total facility power draw to 1.15 MW. Diagnose the impact on the PUE metric, explain the root cause
  of this shift, and determine whether the system is practically more or less sustainable.
question: "What is the new PUE after the liquid-cooling retrofit, why does it worsen, and is the cluster actually more sustainable?"
details:
  realistic_solution: 'The new PUE is 1.15 MW / 0.9 MW = 1.27. Despite the PUE worsening from 1.20 to
    1.27, the cluster is objectively more sustainable because the absolute total power draw dropped from
    1.20 MW to 1.15 MW (saving 50 kW). The root cause of the degraded PUE is definitional: server fans
    are classified as IT equipment (increasing the denominator), while liquid cooling pumps are classified
    as facility infrastructure (increasing the numerator). Shifting the cooling burden from the server
    chassis to the facility inflates the PUE ratio, even when the overall system becomes more efficient.'
  common_mistake: Calculating the higher PUE and incorrectly concluding that the upgrade was a failure
    or reduced sustainability, failing to realize that total energy consumption actually decreased and
    that PUE has definitional blind spots.
  napkin_math: 'Old PUE = 1.2 MW / 1.0 MW = 1.20.

    New IT Load = 100 nodes * 9 kW = 0.9 MW.

    New Total Power = 0.9 MW (IT) + 0.25 MW (Cooling overhead) = 1.15 MW.

    New PUE = 1.15 MW / 0.9 MW = 1.27.

    Absolute Power Savings = 1.20 MW - 1.15 MW = 0.05 MW (50 kW).'
