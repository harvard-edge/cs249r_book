title: Diagnosing PUE Degradation in Liquid Cooling
scenario: You manage an AI training cluster of 100 8-GPU nodes. Originally, each node consumed 10 kW, and the facility's total power draw was 1.2 MW. You retrofit the cluster with direct-to-chip liquid cooling, reducing each node's IT power to 9 kW. The new facility-level cooling pumps and heat exchangers add 250 kW of overhead, bringing the total facility power draw to 1.15 MW.
question: What is the new PUE after the liquid-cooling retrofit, why does it worsen, and is the cluster actually more sustainable?
details:
  realistic_solution: 'The new PUE is 1.15 MW / 0.9 MW = 1.28. Despite the PUE worsening from 1.20 to 1.28, the cluster is objectively more sustainable because the absolute total power draw dropped from 1.20 MW to 1.15 MW (saving 50 kW). The root cause of the degraded PUE is definitional: server fans are classified as IT equipment (increasing the denominator), while liquid cooling pumps are classified as facility infrastructure (increasing the numerator). Shifting the cooling burden from the server chassis to the facility inflates the PUE ratio, even when the overall system becomes more efficient.'
  common_mistake: |
    **The Pitfall:** Concluding that the liquid-cooling upgrade was a failure because PUE increased.
    **The Rationale:** Engineers are trained that a lower PUE implies better datacenter efficiency.
    **The Consequence:** Rejecting a system that objectively saves total energy simply because of a definitional blind spot in the PUE metric regarding fan vs pump classification.
  napkin_math: |
    1. Assumptions & Constraints: 100 nodes. Old IT Load = 1.0 MW, Old Total = 1.2 MW. New IT Load = 100 * 9 kW = 0.9 MW. New Total Power = 0.9 MW (IT) + 0.25 MW (Cooling) = 1.15 MW.
    2. Calculations: Old PUE = 1.2 MW / 1.0 MW = 1.20. New PUE = 1.15 MW / 0.9 MW = 1.28. Absolute Savings = 1.20 MW - 1.15 MW = 0.05 MW (50 kW).
    3. Conclusion & Interpretation: **Result: PUE degrades to 1.28 but saves 50 kW absolute power. Bottleneck: Metric Definition Blindspot.**
