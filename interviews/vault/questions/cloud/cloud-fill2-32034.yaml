title: 'FlashAttention Backward Pass: The Recomputation Trade'
scenario: FlashAttention does not store the N×N attention matrix during the forward pass — it computes
  attention in SRAM tiles and discards intermediate results. During the backward pass for training, the
  attention matrix is needed to compute gradients. How does FlashAttention handle this, and what is the
  extra compute cost?
details:
  realistic_solution: 'During the forward pass, FlashAttention stores: (1) the output O (N×d per head),
    and (2) the log-sum-exp (logsumexp) statistics per row (N values per head) — these are the softmax
    normalization constants needed for numerically stable recomputation. Total extra storage: O(N×d) instead
    of O(N²). During the backward pass, for each tile, FlashAttention recomputes the local attention scores
    S = Q_tile × K_tile^T in SRAM, applies softmax using the stored logsumexp, and computes gradients
    — all in SRAM without HBM writes. The recomputation costs one extra matrix multiply per tile (the
    Q×K^T recomputation). Total extra FLOPS: approximately equal to one forward pass worth of attention
    computation. For the full transformer, attention is ~1/3 of FLOPS, so the backward recomputation adds
    ~33% to the backward attention compute. But since FlashAttention-2 achieves 70% peak FLOPS (vs <30%
    for standard attention), the wall-clock time is still 2-3× faster despite the extra computation.'
  common_mistake: Thinking FlashAttention stores the attention matrix somewhere compressed or approximated.
    It stores only the output O and the log-sum-exp statistics (row-wise) from the forward pass — enough
    to exactly recompute any tile of the attention matrix on the fly during backward.
  napkin_math: 'Stored: O (N×d×2B per head) + logsumexp (N×4B per head). For N=8192, d=128, 64 heads:
    O = 128 MB, logsumexp = 2 MB. Standard: attention matrix = N² × 64 × 2B = 8 GB. Memory savings: 62×.
    Extra backward FLOPS: ~1 forward pass = 2×N²×d per head = negligible vs HBM savings.'
