title: Diagnosing High Iteration Tax in RTB Models
scenario: A cloud ML team is developing a real-time bidding model. The model trains for 72 hours on A100 GPUs and is then deployed to T4 instances for staging validation. Over the past three months, 60% of models that completed training failed staging because their p99 latency exceeded the strict 15ms budget on the target T4s. The team then prunes the architecture and retrains. Each failed iteration wastes 4 days of wall-clock time and substantial compute budget.
question: "What is causing the staging failure iteration tax, and what structural pipeline change would prevent 15ms T4 latency failures after training?"
details:
  realistic_solution: Shift the constraint verification left. Compile the randomly initialized model architecture for the target T4 hardware and profile its latency before training begins. Abort the pipeline immediately if the 15ms budget is exceeded.
  common_mistake: |
    **The Pitfall:** Focusing on accelerating the training job by scaling to more GPUs or relaxing inference constraints.
    **The Rationale:** Teams treat the symptom (slow iterations) with more compute rather than fixing the delayed feedback loop.
    **The Consequence:** Wasting massive compute budgets training model architectures that are physically impossible to serve within target SLAs.
  napkin_math: |
    1. Current Iteration Tax: 72h (train) + 24h (deploy) = 96h per failure.
    2. With a 60% failure rate, an average of 57.6h is wasted per attempt.
    3. Pre-training latency profiling takes ~5 mins (0.08h).
    4. **Shifting constraint verification left saves 95.9 hours of wall-clock time per architecture failure.**
