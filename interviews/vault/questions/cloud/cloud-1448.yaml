title: Diagnosing High Iteration Tax in RTB Models
scenario: A cloud ML team is developing a real-time bidding model. The model trains for 72 hours on A100
  GPUs and is then deployed to T4 instances for staging validation. Over the past three months, 60% of
  models that completed training failed staging because their p99 latency exceeded the strict 15ms budget
  on the target T4s. The team then prunes the architecture and retrains. Each failed iteration wastes
  4 days of wall-clock time and substantial compute budget. Analyze the root cause of this pipeline inefficiency
  and propose a structural fix.
details:
  realistic_solution: Shift the constraint verification left. Compile the randomly initialized model architecture
    for the target T4 hardware and profile its latency before training begins. Abort the pipeline immediately
    if the 15ms budget is exceeded.
  common_mistake: Focusing on accelerating the 72-hour training job by scaling to more GPUs, or relaxing
    inference constraints by upgrading staging to A100s, which treats the symptom rather than the delayed
    feedback loop.
  napkin_math: Current Iteration Tax = 72h (train) + 24h (deploy) = 96h per failure. With a 60% failure
    rate, an average of 57.6h is wasted per attempt. Pre-training latency profiling takes ~5 mins (0.08h).
    Time saved per architecture failure = 95.9 hours.
