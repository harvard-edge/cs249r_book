title: Diagnosing High Iteration Tax in RTB Models
scenario: A cloud ML team is developing a real-time bidding model. The model trains for 72 hours and is then deployed to staging validation. Over the past three months, 60% of models that completed training failed staging because their p99 latency exceeded the strict 15ms budget. The team then prunes the architecture and retrains. Each failed iteration wastes 4 days of wall-clock time and substantial compute budget.
question: "What is causing the staging failure iteration tax, and what structural pipeline change would prevent 15ms latency failures after training?"
details:
  realistic_solution: Shift the constraint verification left. Compile the randomly initialized model architecture for the target hardware and profile its latency before training begins. Abort the pipeline immediately if the 15ms budget is exceeded.
  common_mistake: |
    **The Pitfall:** Focusing on accelerating the training job by scaling to more GPUs or relaxing inference constraints.
    **The Rationale:** Teams treat the symptom (slow iterations) with more compute rather than fixing the delayed feedback loop.
    **The Consequence:** Wasting massive compute budgets training model architectures that are physically impossible to serve within target SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Iteration Tax: 72h (train) + 24h (deploy) = 96h per failure.
       - 60% failure rate.
    2. **Calculations:**
       - Average wasted time per attempt: 96h * 0.6 = 57.6h.
       - Pre-training latency profiling takes ~5 mins (0.08h).
    3. **Conclusion & Interpretation:** **Result: Process-Bound**. Shifting constraint verification left saves 95.9 hours of wall-clock time per architecture failure.
