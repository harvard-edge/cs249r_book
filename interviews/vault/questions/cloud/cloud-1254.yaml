title: Correlated Rack-Level Training Failure
scenario: You are operating a 128-node LLM training cluster (8x H100 GPUs per node). The training job
  strictly requires 120 nodes to run, so you provisioned an 8-node redundancy buffer to handle individual
  node failures. The infrastructure is densely packed across 4 racks, each containing 32 nodes and a single
  Top-of-Rack (ToR) switch. When one ToR switch experiences a power fault, the entire training job crashes
  with unrecoverable NCCL timeout errors. Analyze why the job failed despite the 8-node redundancy buffer
  and diagnose the architectural flaw.
details:
  realistic_solution: The architectural flaw is misaligning the redundancy buffer with the failure domain.
    A ToR switch failure causes a correlated loss of 32 nodes. Since the buffer was only 8 nodes, the
    cluster cannot recover. The solution is to distribute the 128 nodes across 16 racks (8 nodes per rack)
    so a single rack failure drops at most 8 nodes, matching the redundancy buffer capacity.
  common_mistake: Candidates often assume that provisioning standby nodes provides universal fault tolerance,
    failing to analyze the physical topology and realize that a ToR switch acts as a single point of failure
    (correlated failure) for an entire rack.
  napkin_math: Nodes lost per rack failure = 32. Maximum surviving nodes = 128 - 32 = 96 nodes. The job
    requires 120 nodes to proceed. 96 nodes < 120 nodes, leaving a strict deficit of at least 24 nodes,
    which causes NCCL collective communicators to hang and crash the job.
