title: Correlated Rack-Level Training Failure
scenario: 'You are operating a 128-node LLM training cluster (8x H100 GPUs per node). The training job strictly requires 120 nodes to run, so you provisioned an 8-node redundancy buffer to handle individual node failures. The infrastructure is densely packed across 4 racks, each containing 32 nodes and a single Top-of-Rack (ToR) switch. When one ToR switch experiences a power fault, the entire training job crashes with unrecoverable NCCL timeout errors.'
question: "Why did the 128-node training job fail despite an 8-node redundancy buffer, and what topology flaw caused it?"
details:
  realistic_solution: The architectural flaw is misaligning the redundancy buffer with the failure domain. A ToR switch failure causes a correlated loss of 32 nodes. Since the buffer was only 8 nodes, the cluster cannot recover. The solution is to distribute the 128 nodes across 16 racks (8 nodes per rack) so a single rack failure drops at most 8 nodes, matching the redundancy buffer capacity.
  common_mistake: |
    **The Pitfall:** Assuming that provisioning standby nodes provides universal fault tolerance.
    
    **The Rationale:** Failing to analyze the physical topology leads candidates to ignore that a ToR switch acts as a single point of failure (correlated failure) for an entire rack.
    
    **The Consequence:** Catastrophic job failure despite paying for redundant compute capacity.
  napkin_math: |
    * **Nodes per Rack:** 128 nodes / 4 racks = 32 nodes/rack
    * **Nodes Lost in Fault:** 32 nodes
    * **Surviving Nodes:** 128 - 32 = 96 nodes
    * **Required Nodes:** 120 nodes
    * **Result:** **96 nodes < 120 nodes, leaving a deficit of 24 nodes and causing the job to crash.**
