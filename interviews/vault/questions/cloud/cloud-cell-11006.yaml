title: 'Dataset Curation: Napkin Math for Data Mixing Budget'
scenario: You are curating training data for a 65B model to be trained on 256 H100s. Chinchilla-optimal
  compute says train on ~1.3T tokens. You have web data (5T tokens), books (200B tokens), code (100B tokens),
  and papers (30B tokens). Compute the token budget for each domain assuming proportional mixing with
  a quality multiplier of 2× for books.
details:
  realistic_solution: 'Apply quality multiplier to books: effective weight = 200B × 2 = 400B. Total effective
    pool = 5T + 400B + 100B + 30B = 5.53T. Normalize to 1.3T target.'
  common_mistake: Forgetting to apply quality multipliers before normalizing; treating all domains as
    equal quality.
  napkin_math: 'Effective weights: web=5000B, books=400B, code=100B, papers=30B. Total=5530B. Fractions:
    web=90.4%, books=7.2%, code=1.8%, papers=0.54%. Allocations out of 1.3T: web=1175B, books=94B, code=24B,
    papers=7B tokens. Books contributes 47B unique tokens sampled 2× each.'
