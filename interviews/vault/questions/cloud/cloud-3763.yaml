title: Pipeline Bubble in Zero-Bubble Scheduling
scenario: 'Recent work on zero-bubble pipeline parallelism (ZB-H1, ZB-H2) claims to eliminate pipeline bubbles by splitting the backward pass into two parts: backward-for-input (B) and backward-for-weights (W), then scheduling W during what would have been bubble time.'
question: "How does zero-bubble pipeline scheduling work, what memory cost does it add, and does it truly achieve zero bubble?"
details:
  realistic_solution: 'In standard 1F1B, the backward pass computes both dL/dx (input gradient) and dL/dW (weight gradient) together. Zero-bubble scheduling splits these: B runs during the normal schedule to maintain pipeline flow, while W is deferred to fill bubble slots. This works because dL/dW doesn''t block the pipeline — no other stage depends on it. The result: the pipeline bubble (P-1 slots) is filled with W computations. Memory cost: each deferred W must store the activations needed for the weight gradient, requiring ~(P-1) additional micro-batches of activation storage. It is not truly zero-bubble — it trades memory for bubble elimination and requires enough deferred W work to fill the bubble slots exactly.'
  common_mistake: |
    **The Pitfall:** Assuming zero-bubble means zero overhead without tradeoffs.
    **The Rationale:** Taking the marketing name "zero-bubble" completely literally.
    **The Consequence:** Running out of memory because the deferred W passes require storing an extra set of activations per micro-batch.
  napkin_math: |
    1. **Standard 1F1B Bubble:** Bubble = (P-1)/(M+P-1). For Pipeline stages P=8, Micro-batches M=24:
       - Bubble = 7/31 = 22.6%.
    2. **Zero-bubble execution:** Fills 7 bubble slots with W passes.
    3. **Memory Tradeoff:** Requires 7 extra activation copies.
       - If activations per microbatch = 2 GB, it requires 14 GB of extra memory.
       
    **Final Result: Zero-bubble drives utilization to ~97-99% but costs ~14 GB of extra activation memory.**
