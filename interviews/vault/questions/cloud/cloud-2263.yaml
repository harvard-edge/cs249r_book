title: The Auto-Tuning Transfer Problem
scenario: Your team auto-tuned a set of transformer kernels for batch_size=32, seq_len=2048 on H100. When
  serving traffic arrives with variable sequence lengths (128-8192) and batch sizes (1-64), the auto-tuned
  kernels perform 40% worse than the default configurations for many input shapes. Analyze why tuning
  for one shape fails to generalize, and design a strategy that covers the dynamic shape space without
  requiring exhaustive per-shape tuning.
details:
  realistic_solution: 'The auto-tuned configuration fails to generalize because the optimal tiling parameters
    are a function of the problem shape. For batch_size=32, seq_len=2048, the matmuls are large and compute-bound
    — the auto-tuner picks large tiles (128×128) to maximize Tensor Core utilization. For batch_size=1,
    seq_len=128, the same matmul is small and memory-bound — large tiles waste shared memory and leave
    most Tensor Cores idle, while small tiles (32×32) better match the problem size. The solution is a
    multi-configuration dispatch table: (1) Partition the shape space into ~8-12 buckets based on arithmetic
    intensity boundaries (memory-bound, transitional, compute-bound). (2) Auto-tune one representative
    shape per bucket. (3) At runtime, compute the arithmetic intensity of the incoming shape and dispatch
    to the nearest tuned configuration. (4) For Triton kernels, use `torch.compile`''s `dynamic=True`
    mode with specialized re-compilation for frequently-seen shapes (the JIT will cache compiled versions).
    This gives near-optimal performance across the full shape range with 8-12× less tuning effort than
    per-shape tuning.'
  common_mistake: '"Just tune for the most common shape — it will work well enough for others." Optimal
    tile sizes depend critically on the ratio of compute to memory traffic, which shifts with every shape
    change.'
  napkin_math: 'Shape space: 6 batch sizes × 8 seq lengths = 48 shape combinations. Exhaustive tuning:
    48 × 4,096 configs × 5ms = 983s ≈ 16 min. Bucketed approach: 10 buckets × 4,096 configs × 5ms = 205s
    ≈ 3.4 min (with guided search: 10 × 100 × 5ms = 5s). Performance: exhaustive achieves optimal per-shape;
    bucketed achieves <3% gap for 97% of shapes, with outliers at bucket boundaries.'
  options:
  - Model sharding for inference replicates the model across GPUs and uses data parallelism; each GPU
    processes a different request in the batch, then results are gathered on GPU 0
  - Model sharding splits the vocabulary embedding across GPUs so each GPU handles a subset of tokens;
    the transformer layers fit on a single GPU since they are much smaller than the embedding table
  - Model sharding is unnecessary for 70B models because they fit in a single GPU after INT4 quantization
    (35 GB); sharding should only be used for models above 200B parameters
  - 'Model sharding for inference distributes a model too large for one GPU across multiple GPUs. For
    a 70B model (140 GB FP16) on 2 A100-80 GB GPUs: each GPU holds 35 layers (70 GB). Inference is sequential
    (pipeline): GPU 0 processes layers 0-34, sends activation tensor to GPU 1, which processes layers
    35-69. Inter-GPU communication per token: activation tensor ≈ batch × seq_len × d_model × 2 bytes.
    Latency increases by the pipeline depth.'
  correct_index: 3
