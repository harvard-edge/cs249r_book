title: Evaluating H100 Upgrades for Hybrid Recommendation Models
scenario: Your team is considering upgrading your training cluster from 8x A100 GPUs to 8x H100 GPUs to
  speed up the training of a hybrid recommendation model. The current training loop takes 100 hours. Profiling
  shows that 70% of the time is spent on GPU matrix multiplications (which the H100 accelerates by 3x
  over the A100), 20% on CPU-bound data preprocessing that cannot be easily parallelized further, and
  10% on network communication (which remains unchanged). The H100 instance costs 4x more per hour. Evaluate
  whether this hardware upgrade is justified based on the expected overall speedup and cost-efficiency.
details:
  realistic_solution: Apply Amdahl's Law. The accelerated fraction (GPU) is 0.7 with a 3x speedup. The
    unaccelerated fraction is 0.3. The new time is 100 * (0.7/3 + 0.3) = 53.3 hours. The overall speedup
    is 1.87x. Since the new cluster costs 4x more per hour, the total training cost increases by 2.13x.
    The upgrade is not justified without optimizing the data and network pipelines first.
  common_mistake: Assuming the 3x GPU speedup translates directly to a 3x overall training speedup, ignoring
    the unaccelerated CPU and network components, and thus overestimating the ROI of the hardware upgrade.
  napkin_math: Overall Speedup = 1 / ((1 - 0.7) + (0.7 / 3)) = 1 / (0.3 + 0.233) = 1 / 0.533 = 1.87x.
    Total Cost Multiplier = (4x hourly cost) / (1.87x speedup) = 2.13x total cost.
