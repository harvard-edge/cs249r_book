title: Multi-Node Training Job Orchestration in K8s
scenario: 'You need to run a 64-GPU PyTorch DDP training job across 8 Kubernetes nodes (8 GPUs each) using MI300X GPUs. You must evaluate three orchestration approaches: (A) raw Kubernetes Deployment, (B) Kubeflow PyTorchJob, (C) LeaderWorkerSet.'
question: 'Which orchestration approach is most appropriate for the multi-node PyTorch job and why?'
details:
  realistic_solution: '(B) Kubeflow PyTorchJob (recommended): creates a CRD with master and worker specs. It automatically sets MASTER_ADDR, MASTER_PORT, WORLD_SIZE, RANK for each pod. Uses a headless Service for DNS-based discovery. Handles restart semantics: if one worker fails, all workers are restarted. (C) LeaderWorkerSet is lighter-weight but less ML-specific. For MI300X, ensure ROCm container images are used and the PyTorchJob spec requests amd.com/gpu: 8 per pod.'
  common_mistake: |
    **The Pitfall:** Using a raw Kubernetes Deployment.
    **The Rationale:** Familiarity with standard microservice deployments leads to treating ML jobs like generic web servers.
    **The Consequence:** Deployments assign random pod names, provide no master-worker coordination, and fail to handle distributed failure semantics properly (e.g., if one pod dies, the job hangs).
  napkin_math: |
    - **Pods:** 1 master + 7 workers = 8 pods.
    - **GPUs:** 8 pods × 8 GPUs/pod = 64 total GPUs.
    - **Environment Variables Injected by PyTorchJob:**
      - MASTER_ADDR=worker-0.svc
      - WORLD_SIZE=64
      - RANK=auto-assigned 0-63
