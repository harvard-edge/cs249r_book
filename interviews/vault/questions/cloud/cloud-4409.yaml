title: UCIe Bandwidth Scaling for Multi-Chiplet AI Accelerators
scenario: You are designing a next-generation AI accelerator using UCIe 2.0 die-to-die interconnect. The system needs 4 TB/s aggregate compute-to-HBM bandwidth but the UCIe links are becoming the bottleneck.
question: What UCIe bandwidth constraint prevents 4 TB/s compute-to-HBM bandwidth, and what chiplet floorplan would you choose?
details:
  realistic_solution: UCIe 2.0 SR achieves ~256 Gbps/mm of die edge at 4 µm bump pitch. Arrange compute dies centrally with HBM memory dies on all four sides rather than one. Use a 2.5D interposer with active silicon bridge segments. Place high-bandwidth-demand compute tiles closest to HBM stacks to minimize hop distance. At this bandwidth requirement, a multi-chiplet design with 4+ HBM stacks is necessary.
  common_mistake: |
    **The Pitfall:** Assuming UCIe bandwidth scales linearly with die count.
    **The Rationale:** Engineers add more compute dies without accounting for the interposer routing congestion and the fact that UCIe bandwidth per mm of die edge is fixed.
    **The Consequence:** The design becomes physically impossible to route, failing to meet the bandwidth target despite having enough compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target bandwidth: 4 TB/s (4,000 GB/s = 32,000 Gbps).
       - UCIe 2.0 SR density: 256 Gbps/mm at 4 µm bump pitch.
       - Large compute die size: ~26mm x 26mm.
    2. **Calculations:**
       - Required die edge: 32,000 Gbps / 256 Gbps/mm = 125 mm.
       - Max perimeter of a single large die: 4 * 26 mm = 104 mm.
    3. **Conclusion & Interpretation:**
       - **Result: Perimeter-Bound. Since 125 mm > 104 mm, a single monolithic compute die cannot physically fit enough UCIe links, necessitating a multi-chiplet architecture.**
