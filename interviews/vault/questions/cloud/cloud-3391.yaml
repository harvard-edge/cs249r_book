title: 'H100 LLM Inference Optimization: Kernel Fusion for Memory-Bound Operations'
scenario: 'You are optimizing LLM inference latency. Profiling reveals significant latency comes from frequent small kernel launches and excessive global memory transfers between consecutive element-wise operations (e.g., GELU, Dropout) and layer normalization.'
question: 'How would you identify, implement, and validate operator fusion for these memory-bound LLM ops to reduce kernel launches and global memory traffic?'
details:
  realistic_solution: 'The solution involves identifying critical paths with sequential memory-bound operations that can be fused. This typically includes combining element-wise activations (e.g., ReLU, GELU, Dropout) with other element-wise operations or even layer normalization into a single CUDA kernel. Implementation would involve using custom CUDA C++ or frameworks like Triton to write the fused kernel. Key steps: (1) Profile extensively with NVIDIA Nsight Compute to pinpoint memory-bound operations and kernel launch overheads. (2) Design fused kernels to minimize global memory reads/writes by keeping intermediate results in registers or shared memory. (3) Optimize shared memory usage and register allocation to avoid spilling, considering the H100''s SM architecture and increased shared memory capacity (up to 200KB per SM). (4) Carefully manage thread block and grid dimensions to fully utilize SMs and maximize occupancy. (5) Validate performance through rigorous benchmarking against the unfused baseline, focusing on memory traffic, kernel launch count, and overall inference latency/throughput.'
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOP optimization and ignoring memory bandwidth limitations.
    **The Rationale:** Candidates try to rewrite the math of element-wise ops rather than realizing the true cost is the round-trip read/write to HBM.
    **The Consequence:** Over-fused kernels that spill to global memory, negating the performance benefits of fusion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 10 GB.
       - H100 bandwidth: 3.35 TB/s.
       - Kernel launch overhead: ~10 µs.
    2. **Calculations:**
       - Unfused (3 ops) = 3 reads, 3 writes = 6 * 10 GB = 60 GB traffic.
       - Fused (1 op) = 1 read, 1 write = 2 * 10 GB = 20 GB traffic.
       - Savings = 40 GB.
       - IO Time Saved = 40 GB / 3.35 TB/s = ~11.9 ms.
       - Kernel Time Saved = 2 launches * 10 µs = ~20 µs.
    3. **Conclusion & Interpretation:** **Result: IO-Bound**. The primary gain is the ~11.9 ms saved in HBM data movement, which massively outweighs the 20 µs kernel launch overhead savings.
