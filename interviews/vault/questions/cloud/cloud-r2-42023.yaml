title: Request Coalescing vs Tail Latency Tradeoff
scenario: Your H100 inference server coalesces semantically similar requests (e.g., same prompt prefix)
  to share prefill computation. This reduces GPU cost by 40% but increases P99 from 50ms to 120ms because
  requests wait for similar siblings. At what request rate does coalescing become net-negative for goodput?
details:
  realistic_solution: 'Coalescing waits up to T_wait for similar requests. At low arrival rates, requests
    wait the full T_wait without finding siblings — all cost, no benefit. At high rates, siblings arrive
    quickly and the amortized compute savings dominate. Break-even analysis: compute saved per coalesced
    group = 40% × prefill_cost. Latency cost = wait_time × requests_affected. At 100 req/s with 70ms mean
    wait: 7 requests coalesce in a window, saving 6 × 20ms prefill = 120ms GPU time. But 7 requests each
    waited 35ms average = 245ms total wait. If SLA = 150ms: at 100 req/s, coalescing causes 15% SLA violations.
    At 500 req/s: siblings arrive in 5ms, saving 24 × 20ms = 480ms GPU, wait = 2.5ms × 25 = 62.5ms. Net
    positive above ~300 req/s.'
  common_mistake: Evaluating coalescing purely on GPU cost savings without accounting for the latency
    penalty. Coalescing improves throughput efficiency but degrades tail latency, which matters for SLA-bound
    serving.
  napkin_math: '100 req/s: wait 70ms → 7 siblings. Compute saved: 6 × 20ms = 120ms. Wait cost: 7 × 35ms
    = 245ms. Net: -125ms (bad). 300 req/s: wait 20ms → 6 siblings in 20ms. Saved: 5 × 20ms = 100ms. Wait:
    6 × 10ms = 60ms. Net: +40ms (break-even). 500 req/s: wait 10ms → 5 siblings. Saved: 4 × 20ms = 80ms.
    Wait: 5 × 5ms = 25ms. Net: +55ms (good). Break-even: ~300 req/s.'
