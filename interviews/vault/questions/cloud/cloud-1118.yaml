title: Control Loop Reconciliations for Gang Scheduling
scenario: You submit a declarative PyTorchJob custom resource requesting 64 A100 GPUs (8 nodes x 8 GPUs) with strict gang scheduling. The cluster currently has only 40 A100 GPUs available across 5 nodes. The declarative controller triggers a cluster autoscaler scale-up for 3 nodes, which takes 240 seconds to provision in parallel. The controller evaluates the resource state every 15 seconds.
question: How many reconciliation cycles will observe drift before the 3 autoscaled nodes are ready after 240 seconds?
details:
  realistic_solution: |
    The controller continuously compares the actual state (5 nodes) to the desired state (8 nodes) every 15 seconds. It will observe a drift 16 times before the 3 missing nodes become ready after 240 seconds. Gang scheduling controllers rely on this continuous polling loop.
  common_mistake: |
    **The Pitfall:** Assuming the declarative controller queues the request and sleeps.
    **The Rationale:** Developers accustomed to imperative programming paradigms often assume task-based pausing (like thread sleep), failing to recognize that declarative orchestration controllers continuously poll and attempt to reconcile state at every tick.
    **The Consequence:** A misunderstanding of how the control plane operates under the hood, leading to incorrect assumptions about API server load and controller throughput constraints during massive scale-ups.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Desired state: 8 nodes.
       - Actual state: 5 nodes.
       - Autoscaler provisioning time: 240 seconds.
       - Controller sync period: 15 seconds.
    2. **Calculations:**
       - Total time waiting: 240 seconds.
       - Number of polling cycles: 240s / 15s = 16 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: Control-Plane-Bound.** The declarative controller will wake up, observe state drift, and attempt to reconcile exactly 16 times before the autoscaler finally makes the nodes available.
