title: Debugging Accuracy Plateau in Defect Detection
scenario: 'Your team is running a ResNet-50 defect detection model for a high-speed manufacturing line. The validation accuracy has plateaued at 92%, but the business target is 98%. You tried scaling to a Vision Transformer (ViT-L/16), which increased latency from 12ms to 85ms per image, but validation accuracy only budged to 92.5%. The core training dataset consists of 1.2M images collected over 3 years. Recent telemetry shows the model specifically fails on a new reflective alloy type introduced 6 weeks ago. This new material represents only 10% of production volume but accounts for 75% of all misclassifications.'
question: 'How should you allocate your ML engineering resources to unblock the 98% target?'
details:
  realistic_solution: 'Adopt a data-centric approach. Revert to the faster ResNet-50 (12ms latency). Systematically curate, upsample, and hard-mine examples of the new reflective alloy. Implement targeted data augmentations (e.g., specular noise) to simulate the new material, and slice the validation set to track alloy-specific metrics.'
  common_mistake: |
    **The Pitfall:** Recommending further architectural search or hyperparameter sweeps.
    **The Rationale:** Assuming that accuracy plateaus are inherently model capacity limitations.
    **The Consequence:** Wasting massive compute budgets on larger models while completely ignoring the fundamental distribution shift in the underlying data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target accuracy: 98%.
       - Current absolute error: 8% (92% accuracy).
       - New alloy represents 10% volume but 75% of total errors.
    2. **Calculations:**
       - ViT-L (300M params) vs ResNet-50 (25M params) = 12x compute increase for +0.5% accuracy.
       - Absolute error derived from the new material = 8% * 0.75 = 6%.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Bound. Fixing the dataset for this specific slice mathematically recovers up to 6% absolute accuracy, hitting 98% while keeping the 12ms latency.**
