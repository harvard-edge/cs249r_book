title: Debugging Accuracy Plateau in Defect Detection
scenario: 'Your team is running a ResNet-50 defect detection model on an A100 GPU (40GB VRAM) for a high-speed manufacturing line. The validation accuracy has plateaued at 92%, but the business target is 98%. You tried scaling to a Vision Transformer (ViT-L/16), which increased latency from 12ms to 85ms per image, but validation accuracy only budged to 92.5%. The core training dataset consists of 1.2M images collected over 3 years. Recent telemetry shows the model specifically fails on a new reflective alloy type introduced 6 weeks ago. This new material represents only 10% of production volume but accounts for 75% of all misclassifications.'
question: 'How should you allocate your ML engineering resources to unblock the 98% target?'
details:
  realistic_solution: 'Adopt a data-centric approach. Revert to the faster ResNet-50 (12ms latency). Systematically curate, upsample, and hard-mine examples of the new reflective alloy. Implement targeted data augmentations (e.g., specular noise, brightness adjustments) to simulate the new material, and slice the validation set to track alloy-specific metrics.'
  common_mistake: |
    **The Pitfall:** Recommending further architectural search or hyperparameter sweeps.
    **The Rationale:** Assuming that accuracy plateaus are inherently model capacity limitations.
    **The Consequence:** Wasting massive compute budgets on larger models while completely ignoring the fundamental distribution shift in the underlying data.
  napkin_math: |
    * ViT-L (300M params) vs ResNet-50 (25M params) = 12x compute increase for only +0.5% accuracy.
    * If the new alloy represents 10% of production volume but accounts for 75% of all misclassifications (8% total error rate * 0.75).
    * 8% * 0.75 = 6% absolute error from the new material.
    * **Result: Fixing the dataset for this specific slice mathematically recovers up to 6% absolute accuracy, pushing total accuracy to 98% while keeping the 12ms latency.**
