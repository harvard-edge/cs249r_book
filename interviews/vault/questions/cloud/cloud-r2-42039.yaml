math_issues:
- In a flat ring, each step transfers V/N data (14 GB / 64 = 0.218 GB), not 1.53 GB. The math incorrectly
  uses the total inter-rack data of a hierarchical reduce (7/64 * 14 GB = 1.53 GB) as the per-step data
  for a flat ring, then multiplies by 126 steps.
