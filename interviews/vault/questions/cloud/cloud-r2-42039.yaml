title: Cross-Rack Bandwidth Planning for Data Parallelism
scenario: You have 8 racks of 8 MI300X GPUs each (64 total). Each rack has one 400 Gbps uplink to the
  spine. You want to run 64-way data-parallel training with a 7B model. The gradient size is 14 GB (FP16).
  Will the cross-rack bandwidth support AllReduce, and if not, how do you fix it without adding spine
  bandwidth?
question: "Will the cross-rack bandwidth support AllReduce, and if not, how do you fix it without adding spine bandwidth?"
details:
  realistic_solution: 'Ring AllReduce on 64 GPUs: each GPU sends 14 GB × 63/64 ≈ 13.78 GB total, in 63
    steps of 14/64 = 218.75 MB each. Each step, 7/8 of GPUs send cross-rack. Per rack uplink demand: 8
    GPUs × (7/8) × 218.75 MB = 1531.25 MB per step, but the uplink handles 50 GB/s (400 Gbps). Step time
    bottleneck: 1531.25 MB / 50 GB/s = 30.6ms per step. Total: 63 × 2 × 30.6ms = 3858ms — completely infeasible
    for training. Fix without adding spine BW: (1) Use hierarchical AllReduce — intra-rack reduce on Infinity
    Fabric first, then inter-rack AllReduce of 1/8-sized gradients. Inter-rack data: 14 GB / 8 = 1.75
    GB. Ring across 8 racks: 2 × 1.75 × 7/8 / 50 GB/s = 61.25ms. (2) Gradient compression (TopK at 0.1%):
    1.75 GB × 0.001 = 1.75 MB, ring = 0.06ms. Total hierarchical + compression: <2ms.'
  common_mistake: Calculating bandwidth as if AllReduce traffic is evenly distributed. In a ring AllReduce,
    each GPU sends the full gradient divided by N across the ring. With 8 racks, 7/8 of the ring hops
    are cross-rack, each competing for the rack's single 400 Gbps uplink.
  napkin_math: 'Flat ring: 14 GB gradient, 64 GPUs, 8 racks × 1 uplink at 50 GB/s. Bottleneck: 1.53 GB
    cross-rack per step / 50 GB/s = 30.6ms × 126 steps = 3.86s. Hierarchical: intra-rack reduce (Infinity
    Fabric 896 GB/s): 14 GB × 7/8 / 896 = 13.7ms. Inter-rack ring (8 ranks, 1.75 GB): 2 × 1.75 × 7/8 /
    50 = 61ms. Total: 74.7ms. Speedup: 51.6×.'
