title: Real-Time Aggregates Latency Tradeoff
scenario: 'Your fraud detection system has a strict 50ms p99 latency SLA, leaving 15ms for Feature Retrieval. You must add a "user transaction amount z-score over the last 30 days" feature. Users average 1,000 transactions/month (~50KB of raw data). You evaluate: (A) On-the-fly computation from Redis, or (B) Streaming updates via Flink.'
question: How do the on-the-fly and streaming designs compare for the 30-day z-score, and what architecture would you choose?
details:
  realistic_solution: |
    Approach A (On-the-fly) decomposes latency into: Redis lookup (1-2ms) + Network transfer of 50KB (approx 4-8ms at p99 depending on network topology and Redis serialization) + CPU JSON parsing and math (5-10ms). Total feature latency approaches 10-20ms, frequently violating the 15ms budget at p99. However, it requires no streaming infrastructure and avoids write-amplification. Approach B (Streaming) decomposes latency into: Redis lookup of a single pre-computed float (1ms) + Network transfer of 8 bytes (<1ms) + CPU parsing (<1ms). Total latency is ~2ms, safely within budget. The systemic tradeoff is architectural complexity: Flink must maintain massive state (30-day windows for millions of users) and write to Redis on every transaction. The optimal tradeoff is often a Hybrid (Lambda) architecture: Pre-compute daily batch rollups (sum, count, sum_squares) stored in Redis, and only fetch today's raw events (average ~33 events, <2KB) on-the-fly to compute the final delta, yielding 3-4ms latency while eliminating Flink state.
  common_mistake: |
    **The Pitfall:** Assuming on-the-fly compute only adds CPU latency.
    **The Rationale:** Modern CPUs parse JSON fast, so engineers assume the math is cheap.
    **The Consequence:** Ignoring the P99 network I/O cost and TCP overhead of fetching 50KB payloads per request, resulting in constant SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA budget: 15ms limit.
       - On-the-fly fetch size: 50 KB. Network: 10 Gbps.
       - Userbase: 10M active users. Data per user: 50 KB.
    2. **Calculations:**
       - Network Transfer Time: 50 KB / (1.25 GB/s) ≈ 0.04 ms (Ideal) + TCP Overhead = ~5 ms.
       - CPU Parse Time: ~8 ms for 1000 JSON events.
       - Total On-the-Fly Latency: 5 ms + 8 ms = 13 ms.
       - Total Streaming State Size: 10,000,000 users * 50 KB = 500,000,000 KB = 500 GB.
    3. **Conclusion & Interpretation:** **13ms latency vs 500GB state (Network/CPU-Bound vs Memory-Bound).**
