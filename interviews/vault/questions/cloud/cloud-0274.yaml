title: The Data Loading Bottleneck
scenario: Your team is training a vision model on a 10 TB dataset of raw images stored on a local NVMe SSD. For each training epoch, the dataloader must read the raw images from disk. Your team is debating whether this 'on-the-fly' loading is a bottleneck starving the H100 GPUs.
question: How long will one epoch's 10 TB read from a ~7 GB/s NVMe SSD take, and what bottleneck does that create for the H100s?
details:
  realistic_solution: 'The primary bottleneck is the I/O required to read data from the NVMe SSD. While 7 GB/s is fast, reading 10 TB sequentially takes nearly 24 minutes. Without deep prefetching or optimized data formats (like WebDataset), the H100 GPUs will be chronically starved for data (I/O-bound).'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on GPU compute (TFLOPS) while ignoring the data storage critical path.
    **The Rationale:** SSDs feel "instant" in daily use, so engineers assume I/O is negligible compared to heavy matrix multiplication.
    **The Consequence:** Spending immense budgets on H100 GPUs only to have them sit idle at 15% utilization while waiting for images to load.
  napkin_math: |
    1. A high-end PCIe Gen4 NVMe SSD has a peak read throughput of $\sim 7\text{ GB/s}$.
    2. Dataset size: $10\text{ TB} = 10,000\text{ GB}$.
    3. Time to read one epoch = $10,000\text{ GB} / 7\text{ GB/s} = 1,428.5\text{ seconds}$.
    4. $1,428.5\text{ seconds} \approx 23.8\text{ minutes}$.
    5. **Spending 24 minutes purely on disk I/O means expensive H100s will sit idle if data loading is not heavily pipelined.**
  options:
  - ~19 hours
  - ~3.4 minutes
  - ~24 minutes
  - ~3.25 hours
  correct_index: 2
