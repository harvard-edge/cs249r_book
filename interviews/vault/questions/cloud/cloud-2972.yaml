title: 'Fault Tolerance: Evaluate Full vs Incremental Checkpointing for LLM Training'
scenario: For a 30B model training on 256 H100s, compare (A) full checkpoint every 30 minutes (120GB per checkpoint, 60 second write) vs (B) incremental checkpoint every 10 minutes using optimizer state delta (2GB per checkpoint, 4 second write). The training run lasts 2 weeks.
question: For the 2-week 30B run, how do full 30-minute checkpoints compare with 10-minute incremental checkpoints, and what strategy should you use?
details:
  realistic_solution: 'Hybrid: full checkpoint daily + incremental every 10 minutes. Recovery: latest full + replay incremental deltas. Delta chain length: 24h / 10min = 144 deltas max. If any delta is corrupted, roll back to last full checkpoint.'
  common_mistake: |
    **The Pitfall:** Choosing purely incremental checkpoints without a full backup strategy.
    **The Rationale:** Incremental checkpoints offer drastically lower storage costs and overhead.
    **The Consequence:** If any single delta in the chain corrupts, you must fall back to the very beginning (or the last full checkpoint), potentially losing hours or days of costly training progress.
  napkin_math: |
    * Training duration: 2 weeks = 20,160 minutes.
    * **(A) Full only:** 672 checkpoints × 120 GB = 80.6 TB ($1,854/mo). Overhead = 60s/30min = 3.3%.
    * **(B) Incremental only:** 2,016 checkpoints × 2 GB = 4.0 TB ($92/mo). Overhead = 4s/10min = 0.67%.
    * **(C) Hybrid (1 full/day + 10min inc):** 14 full × 120 GB (1.68 TB) + 2,016 deltas × 2 GB (4.03 TB) = 5.71 TB ($131/mo).
    * **The Hybrid approach limits recovery risk to a max of 144 deltas, drops overhead to 0.74%, and cuts storage costs by 93% compared to full checkpoints.**
