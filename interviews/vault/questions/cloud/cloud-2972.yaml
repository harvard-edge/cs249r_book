title: 'Fault Tolerance: Evaluate Full vs Incremental Checkpointing for LLM Training'
scenario: For a 30B model training on 256 H100s, compare (A) full checkpoint every
  30 minutes (120GB per checkpoint, 60 second write) vs (B) incremental checkpoint
  every 10 minutes using optimizer state delta (2GB per checkpoint, 4 second write).
  The training run lasts 2 weeks. Evaluate storage cost, recovery completeness, and
  overhead.
question: For the 2-week 30B run, how do full 30-minute checkpoints compare with 10-minute
  incremental checkpoints, and what strategy should you use?
details:
  realistic_solution: 'Hybrid: full checkpoint daily + incremental every 10 minutes.
    Recovery: latest full + replay incremental deltas. Delta chain length: 24h / 10min
    = 144 deltas max. If any delta is corrupted, roll back to last full checkpoint.'
  common_mistake: Choosing incremental without considering that a broken delta chain
    requires full recovery from last full checkpoint — losing potentially hours of
    work.
  napkin_math: '(A) Full only: 2 weeks = 20,160 minutes. Checkpoints: 20,160/30 =
    672 full checkpoints × 120GB = 80.6TB storage at $0.023/GB-month = $1,854/month.
    Overhead: 60s/30min = 3.3% training time. (B) Incremental only: 20,160/10 = 2,016
    checkpoints × 2GB = 4TB storage = $92/month. Overhead: 4s/10min = 0.67% training
    time. Recovery risk: delta chain failure (realistic 2% chain corruption rate)
    → full retrain from last good point. (C) Hybrid: 1 full/day × 14 = 14 full × 120GB
    = 1.68TB + 2,016 deltas × 2GB = 4TB. Total: 5.68TB = $131/month. Recovery: max
    144 deltas to replay. Overhead: 0.67% + 60s/24h = 0.67% + 0.069% = 0.74%. Winner:
    Hybrid (C).'
