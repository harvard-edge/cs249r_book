title: Optimizing Fail-Stop Checkpoint Intervals
scenario: 'A 1,024-GPU cluster experiences fail-stop failures with an MTTF of 48 hours. Saving a global checkpoint takes 6 minutes (0.1 hours). An engineer proposes a 12-hour checkpoint interval.'
question: 'Is the proposed 12-hour interval sound, and what optimal interval is justified by Daly''s formula?'
details:
  realistic_solution: 'Reject the 12-hour interval. Daly''s formula dictates an optimal interval of ~3.1 hours. The 12-hour interval loses ~6 hours of compute per failure via rollback, while 3.1 hours loses only ~1.55 hours.'
  common_mistake: |
    **The Pitfall:** Blindly minimizing checkpoint write overhead.
    **The Rationale:** Candidates focus solely on the time spent writing, ignoring the massive rollback cost.
    **The Consequence:** The cluster wastes hundreds of GPU-hours recomputing lost work per failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - MTTF (M) = 48 hours. Checkpoint Cost (C) = 0.1 hours.
    
    **Calculations:**
    - Optimal Interval (T) = sqrt(2 * M * C) = sqrt(2 * 48 * 0.1) = ~3.1 hours.
    - 12h Proposal Rollback: 12 / 2 = 6 hours lost.
    - 3.1h Proposal Rollback: 3.1 / 2 = 1.55 hours lost.
    
    **Conclusion & Interpretation:**
    - **Result: 3.1h interval saves 4.45 hours per failure (Uptime-Bound)**. Daly's formula properly balances write-cost vs rollback-cost.
