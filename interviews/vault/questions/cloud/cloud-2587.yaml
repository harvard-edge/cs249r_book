title: Cloud Rlhf Infrastructure L5 0
scenario: You are setting up infrastructure for RLHF on a 70B model.
question: For 70B RLHF, which setup should you choose among colocated PPO, separate generation/training clusters, and DPO, and why?
details:
  realistic_solution: 'DPO only needs policy + reference. Half the memory, simpler orchestration, no reward model training needed. Trade-off: DPO may be slightly less effective than PPO for complex preferences, but it is 50% cheaper and much simpler to implement.'
  common_mistake: |
    **The Pitfall:** Defaulting to PPO-based RLHF without considering DPO alternatives.
    **The Rationale:** Teams follow the original PPO paradigm because it's well-known, assuming it's strictly necessary for alignment.
    **The Consequence:** This requires hosting reward and critic models, doubling the memory footprint and introducing massive orchestration complexity for negligible quality gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 70B parameters.
       - PPO requires 4 models (Policy, Reference, Reward, Critic).
       - DPO requires 2 models (Policy, Reference).
       - State memory footprint relies on standard Adam FP32/FP16 mixed precision states (~16 bytes per param for training, 2 bytes for frozen).
    2. **Calculations:**
       - PPO Memory (Colocated): 70B * (16 [Policy train] + 16 [Critic train] + 2 [Ref frozen] + 2 [Reward frozen]) bytes = 70B * 36 = 2,520 GB.
       - PPO Hardware: 2,520 GB / 80 GB = 31.5 -> ~32 A100s.
       - DPO Memory: 70B * (16 [Policy train] + 2 [Ref frozen]) bytes = 70B * 18 = 1,260 GB.
       - DPO Hardware: 1,260 GB / 80 GB = 15.75 -> ~16 A100s.
    3. **Conclusion & Interpretation:** **DPO cuts memory overhead by 50%, shifting from a 32-GPU cluster to a 16-GPU cluster.**
