title: H100 Mixed-Precision Performance Considerations
scenario: You are optimizing the training of a large model on a GPU with 989 TFLOPS FP16 dense compute and 3.35 TB/s memory bandwidth. The team is adopting mixed-precision training.
question: How would you implement mixed-precision training on the GPU and verify it benefits from Tensor Cores and HBM bandwidth?
details:
  realistic_solution: Implement NVIDIA's Automatic Mixed Precision (AMP) utilities (e.g., `torch.cuda.amp`) with dynamic loss scaling. Profile the application to ensure Tensor Cores are effectively utilized by structuring operations with compatible dimensions and data types. Analyze the model's sensitivity to precision and choose between FP16 and BF16 based on numerical stability and convergence characteristics.
  common_mistake: |
    **The Pitfall:** Assuming direct FP16 speedup without verifying Tensor Core utilization.
    **The Rationale:** Using FP16 natively should automatically accelerate ops.
    **The Consequence:** Memory bandwidth bottlenecks overshadow Tensor Core gains, resulting in negligible speedups despite massive theoretical compute availability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute: 989 TFLOPS (FP16).
       - Bandwidth: 3.35 TB/s.
       - Workload step: 100 TFLOPs of math, 0.5 TB of memory transfer.
    2. **Calculations:**
       - Time to compute = 100 TFLOPs / 989 TFLOPS ≈ 0.101 seconds.
       - Time to transfer = 0.5 TB / 3.35 TB/s ≈ 0.149 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Because data transfer (149ms) exceeds compute time (101ms), the step is limited by HBM bandwidth despite the massive Tensor Core TFLOPS available.
