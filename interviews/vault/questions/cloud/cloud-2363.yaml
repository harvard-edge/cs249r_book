title: Root Causing H2D Serialization in CUDA Streams
scenario: A vision transformer processing 4K images operates at 20 QPS. Profiling shows the GPU is completely
  idle 40% of the time. The application uses `cudaMemcpyAsync` to transfer the 500MB input batch to the
  GPU, followed immediately by the forward pass kernel invocation.
details:
  realistic_solution: The root cause is stream serialization. Although `cudaMemcpyAsync` is non-blocking
    to the host CPU, if it is placed on the same default CUDA stream (Stream 0) as the compute kernel,
    the GPU strictly serializes the operations. The GPU waits for the entire 500MB transfer over PCIe
    to finish before launching the compute kernel, resulting in idle compute units during the transfer.
    The solution is to use dual CUDA streams (a dedicated copy stream and a compute stream) and implement
    double-buffering. Transfer batch N+1 on the copy stream while batch N is computing on the compute
    stream, synchronizing them via `cudaEventRecord` and `cudaStreamWaitEvent`.
  common_mistake: Assuming that using `cudaMemcpyAsync` automatically guarantees overlap with compute,
    ignoring stream semantics.
  napkin_math: 500MB input batch. PCIe Gen4 x16 effective bandwidth = 32 GB/s. Transfer time = 500MB /
    32 GB/s = 15.6ms. Compute time = 30ms. Since they are serialized, total time per batch = 15.6ms +
    30ms = 45.6ms (equivalent to 21.9 QPS). If successfully overlapped via separate streams, total time
    per batch = max(15.6ms, 30ms) = 30ms (equivalent to 33 QPS).
