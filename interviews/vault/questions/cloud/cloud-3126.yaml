title: Implement Cost Allocation Per Training Run on Shared H100 Cluster
scenario: You must implement a cost accounting system for a shared 64-GPU cluster ($1.80/GPU/h fully-loaded). A 175B GPT training run uses 32 GPUs for 14 days. A 7B fine-tuning run uses 8 GPUs for 3 days and overlaps with the large run. Storage checkpoint writes cost an additional overhead of $0.10/GPU/h.
question: "How would you calculate per-job costs, allocate shared overhead, and attribute idle time on the 64-GPU cluster?"
details:
  realistic_solution: '(1) 175B job: 32 GPUs × 14×24h × $1.80 = 32×336×1.80 = $19,353.60. (2) 7B job: 8 GPUs × 3×24h × $1.80 = 8×72×1.80 = $1,036.80. (3) Shared infra overhead: storage ($0.10/GPU/h for checkpoint writes): 175B job adds $0.10×32×336=$1,075; 7B adds $0.10×8×72=$57.60. Networking overhead: AllReduce at 900 GB/s NVLink — cost included in GPU rate. Idle attribution: if 24 GPUs idle for 14 days: cost = 24×336×1.80=$14,515 — charged to cluster ops budget (not jobs), unless idle is due to job scheduling gap (then charged to team that held reservation). Final: 175B=$20,429; 7B=$1,094.'
  common_mistake: |
    **The Pitfall:** Charging teams only for raw GPU-hours without allocating shared infrastructure overhead.
    **The Rationale:** Accounting systems are often built naively based on cloud provider instance pricing, ignoring the massive shared costs of high-performance storage and idle cluster time.
    **The Consequence:** The central platform team ends up subsidizing massive hidden storage and idle costs, destroying the financial viability of the internal AI platform.
  napkin_math: |
    - 175B Job: 32 GPUs × 336 hrs × $1.80 = $19,353.60.
    - Storage Overhead: 32 GPUs × 336 hrs × $0.10 = $1,075.20.
    - Total 175B Cost = $20,428.80.
    - 7B Job: 8 GPUs × 72 hrs × $1.80 = $1,036.80.
    - Storage Overhead: 8 GPUs × 72 hrs × $0.10 = $57.60.
    - Total 7B Cost = $1,094.40.
    - **Unused/Idle Cluster (24 GPUs for 14 days): 24 × 336 × $1.80 = $14,515.20 (charged to ops budget, not the users).**
