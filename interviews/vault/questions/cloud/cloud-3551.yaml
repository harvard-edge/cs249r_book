title: 'Optimizing Data Storage for NVIDIA A100 Training: Parquet vs. TFRecord'
scenario: 'You are designing a data pipeline for a large-scale recommendation model. The dataset consists of billions of records, with a mix of numerical, categorical, and embedded features. Data scientists frequently perform ad-hoc queries on subsets of features, but the primary workload is sequential reading of all features for training.'
question: 'Which storage format strategy—Parquet, TFRecord, or hybrid—would maximize training throughput for this recommendation dataset?'
details:
  realistic_solution: |
    Given sequential training and ad-hoc queries, Parquet is a strong contender due to columnar query efficiency and compression. However, to leverage high GPU memory bandwidth, the Parquet reader must be highly optimized for batching and prefetching. Alternatively, store a primary training dataset in an optimized TFRecord and a secondary analytical Parquet version, leveraging `tf.data` pipelines with `interleave`, `map`, and `prefetch` to maximize GPU utilization.
  common_mistake: |
    **The Pitfall:** Choosing a storage format solely based on popularity without considering hardware capabilities.
    **The Rationale:** Candidates fail to match the data access pattern (random vs. sequential) and schema with the specific hardware bandwidth profile.
    **The Consequence:** CPU decompression bottlenecks that starve the GPU, wasting its memory bandwidth and compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Average record size: 1KB.
    - Training data size: 10TB (10^10 records).
    - CPU decompression time per record: 1 microsecond.

    **Calculations:**
    - CPU decompression total time: 10^10 * 10^-6 = 10^4 seconds (approx 2.7 hours).
    - Dictionary encoding and Zstd compression in Parquet reduces storage by 5x (2TB).

    **Conclusion & Interpretation:**
    - **Result: 2.7 hours (CPU-Bound)**. Naive row-oriented loading shifts the bottleneck to the CPU.
