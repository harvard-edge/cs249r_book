title: The RAG Rollout Memory Budget
scenario: Your team is adding a Retrieval-Augmented Generation (RAG) capability via an OTA update using a 7-billion parameter language model in FP16 precision.
question: How much memory will this new model consume just for the model weights?
details:
  realistic_solution: A 7-billion parameter model has 7e9 parameters. In FP16 (half-precision floating point), each parameter requires 16 bits, which is exactly 2 bytes. Therefore, the total memory required for the weights is 7 billion parameters multiplied by 2 bytes per parameter, resulting in 14 billion bytes, or 14 GB.
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for training with those for inference.
    **The Rationale:** Engineers recall that training requires optimizer states and gradients, often assuming standard FP32 representation.
    **The Consequence:** Over-provisioning hardware dramatically, increasing operational costs for edge deployments where only FP16 inference memory is required.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7-billion parameters.
       - Precision: FP16 (2 bytes per parameter).
    2. **Calculations:**
       - Total weights memory = 7,000,000,000 × 2 bytes = 14,000,000,000 bytes.
       - 14 billion bytes = 14 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The model requires exactly 14 GB of memory just to store the weights for inference.
  options:
  - 7 GB
  - 56 GB
  - 14 GB
  - 28 GB
  correct_index: 2
