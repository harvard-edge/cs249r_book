title: The RAG Rollout Memory Budget
scenario: Your team manages the software stack for a fleet of autonomous delivery robots. You're planning
  an Over-the-Air (OTA) update to add a Retrieval-Augmented Generation (RAG) capability. This requires
  deploying a new 7-billion parameter language model to each robot's compute module as part of a new container.
  For inference, the model will use FP16 precision. How much memory will this new model consume just for
  the model weights?
question: "How much memory will this new model consume just for the model weights?"
details:
  realistic_solution: A 7-billion parameter model has 7e9 parameters. In FP16 (half-precision floating
    point), each parameter requires 16 bits, which is exactly 2 bytes. Therefore, the total memory required
    for the weights is 7 billion parameters multiplied by 2 bytes per parameter, resulting in 14 billion
    bytes, or 14 GB.
  common_mistake: Engineers often confuse the memory requirements for *training* with *inference*. During
    training with optimizers like Adam, memory usage is much higher (e.g., 16 bytes per parameter) to
    store gradients and optimizer states. For simple inference, you only need to store the model weights.
    Another common error is using the wrong number of bytes for the given precision, for instance, using
    the 1 byte/parameter rule for INT8 or the 4 bytes/parameter rule for FP32.
  napkin_math: 7B params × 2 bytes/param (for FP16) = 14B bytes = 14 GB.
  options:
  - 7 GB
  - 112 GB
  - 14 GB
  - 28 GB
  correct_index: 2
