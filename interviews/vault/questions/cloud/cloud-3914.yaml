title: 'Multi-Backend Distributed Training: Network Bandwidth Trap'
scenario: 'Your distributed training job spans 32 H100 nodes and 16 MI300X nodes, connected by an inter-cluster 900 Gbps Ethernet link. PyTorch''s distributed backend only supports one communication library per process group (NCCL for NVIDIA, RCCL for AMD).'
question: 'How do you architect multi-vendor distributed training, and why does a 14 GB transfer take 124 ms instead of 15 ms?'
details:
  realistic_solution: 'You must use a unified communication backend like UCC or Gloo for the global process group across all nodes, while using device-specific backends (NCCL and RCCL) for intra-cluster subgroups. For the network transfer: 14GB at 900 Gbps = 14GB x 8 bits/byte / 900 Gbps = 112 Gb / 900 Gbps = 0.124s = 124ms. A common error is treating 900 Gbps as 900 GB/s, which would yield 14 GB / 900 GB/s = 0.0155s ≈ 15ms. In heterogeneous clusters, miscalculating cross-vendor link speeds (which are Ethernet Gbps, not NVLink GB/s) leads to drastically underestimated communication overhead.'
  common_mistake: |
    **The Pitfall:** Trying to use NCCL for both NVIDIA and AMD GPUs, or confusing Gbps with GB/s when estimating heterogeneous network bottlenecks.
    **The Rationale:** NCCL only works with CUDA, and RCCL with ROCm. Network link speeds are denoted in Gigabits (Gbps), not Gigabytes (GB/s).
    **The Consequence:** The training job will fail to initialize, or performance estimations will be completely inaccurate, leading to poor network scaling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inter-cluster Link: 900 Gbps (Gigabits per second).
    - Transfer Size: 14 GB.

    **Calculations:**
    - Data Size in bits: 14 GB * 8 bits/byte = 112 Gbits.
    - Transfer Time: 112 Gb / 900 Gbps = 0.1244s.
    - Incorrect GB/s logic: 14 / 900 = ~0.015s.

    **Conclusion & Interpretation:**
    - **Result: 124 ms (Network-Bound)**. Confusing Gbps with GB/s leads to drastically underestimated network transfer overheads in heterogeneous clusters.
