title: 'Multi-Backend Distributed Training: Network Bandwidth Trap'
scenario: Your distributed training job spans 32 H100 nodes and 16 MI300X nodes,
  connected by an inter-cluster 900 Gbps Ethernet link. PyTorch's distributed backend
  only supports one communication library per process group (NCCL for NVIDIA, RCCL for AMD).
  How do you architect heterogeneous multi-vendor distributed training, and what is the correct
  expected time to transfer a 14 GB gradient bucket over the inter-cluster link?
question: How do you architect the multi-backend training, and why is the 14 GB transfer time 124 ms instead of 15 ms?
details:
  realistic_solution: 'You must use a unified communication backend like UCC or Gloo for the global process group across all nodes, while using device-specific backends (NCCL and RCCL) for intra-cluster subgroups. For the network transfer: 14GB at 900 Gbps = 14GB × 8 bits/byte / 900 Gbps = 112 Gb / 900 Gbps = 0.124s = 124ms. A common error is treating 900 Gbps as 900 GB/s, which would yield 14 GB / 900 GB/s = 0.0155s ≈ 15ms. In heterogeneous clusters, miscalculating cross-vendor link speeds (which are Ethernet Gbps, not NVLink GB/s) leads to drastically underestimated communication overhead.'
  common_mistake: 'Trying to use NCCL for both NVIDIA and AMD GPUs, or confusing Gbps with GB/s when estimating heterogeneous network bottlenecks. NCCL only works with CUDA; RCCL with ROCm.'
  napkin_math: '14GB model transfer at 900 Gbps: 14GB × 8 bits/byte = 112 Gbits. Time = 112 Gb / 900 Gbps = 0.1244s = 124ms. If the link were 900 GB/s (like NVLink), time would be 14 / 900 = 0.0155s ≈ 15ms. Calculating 112 Gb / 0.015s = 7,466 Gbps, showing that 15ms requires vastly more bandwidth than available.'
