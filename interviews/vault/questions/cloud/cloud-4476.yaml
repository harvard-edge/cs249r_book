title: 'RecSys Cold Start: New Item Embedding Initialization'
scenario: A recommendation system adds 10K new items per day to a catalog of 10M items. New items have no interaction history and their embeddings are randomly initialized. Consequently, new items receive 3x fewer recommendations than comparable established items for the first 7 days.
question: "How would you fix the cold-start embedding initialization to prevent new items from losing 3x impressions during their first 7 days?"
details:
  realistic_solution: 'Content-based cold start embedding: (1) Item content features: each item has metadata (category, title, description, tags). Encode via a pre-trained text/image encoder (BERT or CLIP). Map content embedding to the recommendation embedding space via a trained projection MLP: content_emb → item_emb_space. Train the projection on warm items where both content and learned embeddings are available (minimizes L2 distance). (2) Category-based init: if content encoder is unavailable, initialize new item embedding as the centroid of its category''s item embeddings. Better than global average for capturing category-specific features. (3) Meta-learning: train a few-shot adapter that quickly updates the initial embedding from the first N interactions (N=5-10). After 10 interactions, embedding quality approaches a week-old embedding. (4) Popularity boost: apply a configurable exploration bonus to new items during the cold-start period (days 1-7). Softmax temperature adjustment increases new item appearance rate by 2x without retraining.'
  common_mistake: |
    **The Pitfall:** Warming up new item embeddings using the global average of all items.
    **The Rationale:** Candidates assume placing the item in the "center" of the embedding space is a safe neutral ground.
    **The Consequence:** The new item embedding lacks any meaningful semantic features, leading to poor nearest-neighbor matches and terrible early recommendations.
  napkin_math: |
    - New items in 7-day window: 70K items (0.7% of 10M catalog).
    - Expected fair share of impressions: 0.7%.
    - Actual impressions (3x penalty): 0.7% / 3 ≈ 0.233%.
    - Loss fraction: 0.7% - 0.233% = 0.467%.
    - Missed impressions per day (assuming 10M total/day): 46.7K.
    - **Result: Content-based initialization cuts the cold-start period from 7 to 2 days, recovering ~233.5K impressions per week.**
