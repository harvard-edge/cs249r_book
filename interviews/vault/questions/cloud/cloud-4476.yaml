title: 'RecSys Cold Start: New Item Embedding Initialization'
scenario: A recommendation system adds 10K new items per day to a catalog of 10M items.
  New items have no interaction history. Their embeddings are randomly initialized.
  New items receive 3x fewer recommendations than comparable established items for
  the first 7 days. Fix the cold-start problem.
question: How would you fix cold-start embeddings for 10K new catalog items per day
  that get 3x fewer recommendations for 7 days?
details:
  realistic_solution: 'Content-based cold start embedding: (1) Item content features:
    each item has metadata (category, title, description, tags). Encode via a pre-trained
    text/image encoder (BERT or CLIP). Map content embedding to the recommendation
    embedding space via a trained projection MLP: content_emb → item_emb_space. Train
    the projection on warm items where both content and learned embeddings are available
    (minimizes L2 distance). (2) Category-based init: if content encoder is unavailable,
    initialize new item embedding as the centroid of its category''s item embeddings.
    Better than global average for capturing category-specific features. (3) Meta-learning:
    train a few-shot adapter that quickly updates the initial embedding from the first
    N interactions (N=5-10). After 10 interactions, embedding quality approaches a
    week-old embedding. (4) Popularity boost: apply a configurable exploration bonus
    to new items during the cold-start period (days 1-7). Softmax temperature adjustment
    increases new item appearance rate by 2x without retraining.'
  common_mistake: Warming up new item embeddings using global average initialization
    (average of all item embeddings). The global average creates a vector in the center
    of the embedding space that does not meaningfully represent the new item's content,
    leading to low-quality nearest neighbors and poor early recommendations.
  napkin_math: '10K new items per day, 7-day cold start period: at any time, 70K cold-start
    items in catalog. As fraction of 10M: 0.7%. With 3x fewer impressions: new items
    get 0.7%/4 = 0.175% of traffic vs 0.7%/4*4 = 0.7% fair share. Loss: (0.7% - 0.175%)
    * 10M impressions/day = 52.5K missed impressions per day for new items. Content-based
    init reduces cold-start period from 7 days to 2 days (3.5x fewer interactions
    needed to reach quality threshold): recovers 5 * 52.5K = 262.5K impressions per
    week. At $1 CPM and 1% CTR: $262.5 * 0.01 = $2.6/day revenue impact. Small but
    directionally important for content freshness.'
