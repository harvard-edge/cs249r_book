title: Optimal Checkpoint Interval Scaling Tradeoffs
scenario: 'A cloud AI team scales a distributed training job from 1,024 to 2,048 GPUs. Each 8-GPU node saves 640 GB of state to network storage using 4 network ports (50 GB/s per port). They notice that after doubling the cluster size, their automated fault-tolerance system significantly decreases the time between checkpoints, even though the checkpoint write time per node remains exactly the same.'
question: 'Why does doubling the GPU count reduce the optimal checkpoint interval when checkpoint write time is unchanged?'
details:
  realistic_solution: 'The system dynamically adjusts based on the Young-Daly formula (Tc = sqrt(2CF)). When the number of GPUs doubles, the cluster''s overall MTBF (F) halves because there are twice as many hardware components that can independently fail. To minimize the expected compute time lost to these more frequent failures, the system must checkpoint more often. The system trades off spending more time actively writing checkpoints to avoid massive recalculation penalties when a failure occurs.'
  common_mistake: |
    **The Pitfall:** Assuming the interval decreased because network writes became slower due to congestion.
    **The Rationale:** Candidates often default to network congestion as the primary issue at scale, ignoring the explicit prompt constraint that the write time remains unchanged.
    **The Consequence:** They miss the fundamental reliability principle that increasing component count proportionally decreases the cluster-wide Mean Time Between Failures (MTBF), which necessitates more frequent checkpointing.
  napkin_math: |
    - **Young-Daly Formula:** Tc = sqrt(2 * C * F), where C is write time and F is MTBF.
    - **Single GPU MTBF:** Assume 40,000 hours.
    - **Cluster 1 MTBF (1,024 GPUs):** F1 = 40,000 / 1024 = 39.06 hours.
    - **Cluster 2 MTBF (2,048 GPUs):** F2 = 40,000 / 2048 = 19.53 hours (halved).
    - **Node Write Time (C):** 640 GB / (4 * 50 GB/s) = 3.2 seconds = 0.00089 hours.
    - **Optimal Interval (1,024 GPUs):** sqrt(2 * 0.00089 * 39.06) = 0.263 hours = **15.8 minutes.**
    - **Optimal Interval (2,048 GPUs):** sqrt(2 * 0.00089 * 19.53) = 0.186 hours = **11.2 minutes.**
