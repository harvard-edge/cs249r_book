title: Autograd Activation Memory vs Recomputation
scenario: 'You are training an LLM on an A100 (80GB) GPU using FP16. The FFN layer uses a SwiGLU variant:
  y = (xW_1 ⊙ σ(xW_1))W_2, where W_1 projects from dimension D=4096 to 4D=16384. For a batch size B=16
  and sequence length L=4096, the standard automatic differentiation engine stores the intermediate activation
  H = xW_1 to compute the backward pass. Calculate the exact memory footprint of storing H per layer,
  and evaluate the memory saved if a custom autograd function recomputes H during the backward pass instead
  of storing it.'
question: "How much memory does storing H consume per layer, and how much would recomputing H in a custom backward save?"
details:
  realistic_solution: Implement a custom PyTorch `torch.autograd.Function` that only saves the input tensor
    x and the weight W_1. During the `backward()` pass, recompute H = xW_1 before calculating the gradients.
    This trades a small amount of extra computation (one matrix multiplication) for a massive reduction
    in activation memory, allowing for larger batch sizes.
  common_mistake: Candidates often forget to multiply by 2 bytes for FP16 precision, or calculate the
    memory for the input tensor x (dimension D) instead of the expanded intermediate tensor H (dimension
    4D).
  napkin_math: Elements in H = B × L × 4D = 16 × 4096 × 16384 = 2^4 × 2^12 × 2^14 = 2^30 elements (1 Billion).
    At FP16 (2 bytes/element), memory for H = 2^30 × 2 bytes = 2 GB per layer. Recomputing saves 2 GB/layer.
    For a 32-layer model, this frees up 64 GB of GPU HBM.
