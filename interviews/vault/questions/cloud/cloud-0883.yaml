title: Autograd Activation Memory vs Recomputation
scenario: You are training an LLM using FP16. The FFN layer uses a SwiGLU variant y = (xW_1 * sigmoid(xW_1))W_2, where W_1 projects from dimension D=4096 to 4D=16384. For a batch size B=16 and sequence length L=4096, the standard automatic differentiation engine stores the intermediate activation H = xW_1 to compute the backward pass.
question: How much memory does storing H consume per layer, and how much would recomputing H in a custom backward save?
details:
  realistic_solution: 'Implement a custom PyTorch `torch.autograd.Function` that only saves the input tensor x and the weight W_1. During the `backward()` pass, recompute H = xW_1 before calculating the gradients. This leverages Gradient Checkpointing principles, trading one matrix multiplication for a massive reduction in activation memory.'
  common_mistake: |
    **The Pitfall:** Forgetting the byte multiplier or using the unexpanded dimension.
    **The Rationale:** Candidates calculate the element count for the input tensor x (dimension D) instead of the intermediate tensor H (dimension 4D), or forget FP16 is 2 bytes.
    **The Consequence:** They severely underestimate the memory footprint of the activations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size B=16, sequence L=4096, 32 layers.
    - FFN expands dimension D=4096 to 4D=16384.
    - Precision: FP16 (2 bytes/element).

    **Calculations:**
    - Elements in intermediate H = B * L * 4D = 16 * 4096 * 16384 = 1,073,741,824.
    - Memory for H per layer = 1,073,741,824 * 2 bytes = ~2.15 GB.
    - Total memory saved across 32 layers = 2.15 GB * 32 = 68.8 GB.

    **Conclusion & Interpretation:**
    - **Result: 68.8 GB saved (Memory-Capacity-Bound)**. Making recomputation essential for large batches.
