title: 'Queueing Theory Realization: Size an H100 Inference Queue for Black Friday Traffic'
scenario: 'Concretely size an H100 inference cluster for a retail AI assistant expected to handle Black
  Friday peak: 2000 req/s with 30-minute burst, P99<2s SLO. Normal load is 200 req/s. Each request: 1500
  input + 300 output tokens on LLaMA-3-70B. Calculate fleet size for peak, cost for the 30-min burst,
  and whether pre-warming is needed.'
question: "How many H100s are needed for the 2000 req/s Black Friday burst, what does the 30-minute burst cost, and should you pre-warm capacity?"
details:
  realistic_solution: 'Service time: prefill 1500 tok + decode 300 tok. On H100: prefill throughput ~10K
    tok/s (compute bound), decode ~2K tok/s (memory bound per batch). For batch 32: prefill = 1500/10000
    = 0.15s, decode = 300 tok * (1/2000*32) = 4.8s. W = 5s. μ_per_H100 = 1/5 = 0.2 req/s. At ρ=0.7: capacity
    per H100 = 0.14 req/s. For 2000 req/s: 2000/0.14 = 14,286 H100s. Even at 2000 req/s this is enormous
    — real systems use speculative decoding and higher batching. More realistically with batch=256: decode
    time = 1.2s, μ=0.6/s, ρ=0.7 → need 2000/(0.7*0.6) = 4762 H100s.'
  common_mistake: Sizing only for average load and not accounting for autoscaling lag, or forgetting that
    pre-warming H100 instances takes 3-5 minutes (can't scale fast enough for sudden burst).
  napkin_math: 'H100 decode bandwidth: 3.35TB/s. 70B params at BF16 = 140GB. Bandwidth per token per batch:
    140GB / (batch * 3350GB/s) per sequence. At batch=64: 140/3350 = 0.042s/tok. Decode 300 tok: 300*0.042/64...
    no: 140GB/3350GB/s = 41.8ms to load all weights per decode step. Each step generates 64 tokens (one
    per sequence in batch). Time per token per sequence = 41.8ms/64 = 0.65ms/tok. 300 output tokens: 195ms
    decode. Prefill 1500 tok: ~150ms. W = 345ms. μ = 2.9 req/s per H100 at batch=64. Fleet: 2000/(0.7*2.9)
    = 984 H100s peak.'
