title: The Token Throughput Estimate
scenario: You're deploying a 70B-parameter LLM on a single H100 (80 GB HBM3, 3.35 TB/s bandwidth). During
  autoregressive decoding, roughly how many tokens per second can you generate for a single request? Show
  why this is a memory-bandwidth problem, not a compute problem.
details:
  realistic_solution: During autoregressive decoding, each token requires reading the entire model weights
    from HBM once (the batch size is 1, so there's no reuse). The arithmetic intensity is ~1 Op/Byte —
    deep in the memory-bandwidth-bound regime. Throughput is dictated entirely by how fast you can stream
    weights through the memory bus, not by how many FLOPS the tensor cores can do.
  common_mistake: '"The H100 has 989 TFLOPS, so we can do a lot of compute per token — throughput should
    be thousands of tokens per second." This confuses compute capacity with the actual bottleneck.'
  napkin_math: '70B params in FP16 = 140 GB. Each decode step reads all weights once. H100 bandwidth =
    3.35 TB/s. Time per token = 140 GB / 3,350 GB/s ≈ 42 ms. Throughput ≈ 1000 / 42 ≈ **24 tokens/sec**
    for a single request. The tensor cores are doing 2 × 70B = 140 GFLOPS per token. At 24 tokens/sec,
    that''s 3.36 TFLOPS — that''s ~0.34% utilization of 989 TFLOPS. The GPU is >99% idle on compute, 100%
    saturated on bandwidth. Batching helps: with batch=8, you read weights once and reuse across 8 requests,
    pushing effective throughput to ~190 tokens/sec total.'
