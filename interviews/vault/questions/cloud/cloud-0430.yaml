title: The Token Throughput Estimate
scenario: 'You''re deploying a 70B-parameter LLM on a single GPU with 80 GB HBM3 and 3.35 TB/s bandwidth.'
question: 'During autoregressive decoding at batch=1, roughly how many tokens/sec can a 70B LLM generate, and why is it memory-bandwidth bound?'
details:
  realistic_solution: 'During autoregressive decoding at batch=1, every token requires reading the full model weights. The arithmetic intensity is extremely low, making it purely memory-bandwidth bound. Throughput is dictated by how fast you stream weights, not peak TFLOPS.'
  common_mistake: |
    **The Pitfall:** Believing that model throughput depends primarily on the GPU's TFLOPS capability.
    **The Rationale:** Candidates see the peak TFLOPS spec of the hardware and assume thousands of tokens can be generated per second.
    **The Consequence:** Failing to realize the fundamental difference between compute-bound prefill and memory-bandwidth-bound autoregressive decoding, leading to drastically over-optimistic latency estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters, FP16 (140 GB).
    - Memory Bandwidth: 3.35 TB/s (3350 GB/s).

    **Calculations:**
    - Transfer Time: 140 GB / 3350 GB/s ≈ 41.8 ms per token.
    - Throughput: 1000 ms / 41.8 ms ≈ 23.9 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. The GPU is strictly limited to ~24 tokens/sec by the memory bus, utilizing <1% of its Tensor Core TFLOPS.
