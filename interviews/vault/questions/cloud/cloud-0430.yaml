title: The Token Throughput Estimate
scenario: 'You''re deploying a 70B-parameter LLM on a single H100 (80 GB HBM3, 3.35 TB/s bandwidth).'
question: "During autoregressive decoding at batch=1, roughly how many tokens/sec can a 70B LLM generate on an H100, and why is it memory-bandwidth bound?"
details:
  realistic_solution: During autoregressive decoding, each token requires reading the entire model weights from HBM once (the batch size is 1, so there's no reuse). The arithmetic intensity is ~1 Op/Byte — deep in the memory-bandwidth-bound regime. Throughput is dictated entirely by how fast you can stream weights through the memory bus, not by how many FLOPS the tensor cores can do.
  common_mistake: |
    **The Pitfall:** Believing that model throughput depends primarily on the GPU's TFLOPS capability.
    **The Rationale:** Candidates see the "989 TFLOPS" spec of the H100 and assume thousands of tokens can be generated per second.
    **The Consequence:** Failing to realize the fundamental difference between compute-bound prefill and memory-bandwidth-bound autoregressive decoding, leading to drastically over-optimistic latency estimates.
  napkin_math: |
    1. **Model Size:** 70B params in FP16 = 140 GB.
    2. **Memory Transfer:** Each decode step reads all weights once. At 3.35 TB/s (3,350 GB/s), time per token = 140 GB / 3,350 GB/s ≈ 41.8 ms.
    3. **Throughput:** 1000 ms / 41.8 ms ≈ **24 tokens/sec**.
    4. **Compute Utilization:** Tensor cores do 140 GFLOPS per token. At 24 tokens/sec, that's 3.36 TFLOPS (≈ **0.34% utilization** of the 989 TFLOPS).
