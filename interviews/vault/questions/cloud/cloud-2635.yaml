title: 'Why model.eval() Matters for Inference'
scenario: 'A developer deploys a model without calling model.eval() and notices prediction quality varies between identical inputs.'
question: 'Why do predictions vary between identical inputs when a deployed model is left in training mode, and which layers cause it?'
details:
  realistic_solution: 'Two layer types behave differently in training vs eval mode: (1) Dropout: In training mode, randomly zeroes activations with probability p and scales remaining by 1/(1-p). In eval mode, dropout is disabled — all activations pass through unchanged. Without eval(), identical inputs produce different outputs each forward pass due to random dropout masks. (2) BatchNorm: In training mode, normalizes using the current batch''s mean and variance (noisy, batch-dependent). In eval mode, uses the stored running mean and running variance accumulated during training (deterministic). Without eval(), predictions depend on the batch composition. The fix is calling model.eval() before inference, which sets self.training=False for all submodules, changing these layers'' behavior to their deterministic inference variants.'
  common_mistake: |
    **The Pitfall:** Forgetting to call `model.eval()` before running inference.
    **The Rationale:** It is easy to overlook framework state toggles when moving code from a training script to an inference wrapper.
    **The Consequence:** Predictions become non-deterministic (due to Dropout) and highly batch-dependent (due to BatchNorm), ruining the model's reliability in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model left in training mode during inference.
    - Dropout p=0.5.
    
    **Calculations:**
    - Dropout in Train Mode: 50% of features randomly zeroed out per forward pass.
    - Dropout in Eval Mode: All features remain active deterministically.
    
    **Conclusion & Interpretation:**
    - **Result: >10% variance per prediction (Compute-Bound)**. Leaving stochastically driven layers active causes silent prediction instability on identical inputs.
