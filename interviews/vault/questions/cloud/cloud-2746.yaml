title: Continuous Training Safety
scenario: 'Your continuous training pipeline auto-deploys retrained models 3x/week. Last month, a poisoned
  data batch caused the auto-retrained model to produce biased recommendations for 6 hours before manual
  detection. Evaluate: (A) add shadow testing before auto-deploy, (B) human-in-the-loop approval for every
  deployment, (C) automated canary deployment with rollback triggers.'
question: "How would you evaluate shadow testing, human approval, and automated canaries for this 3x/week auto-deploy pipeline?"
details:
  realistic_solution: 'Option A (shadow testing): Run the new model in parallel on live traffic without
    serving results. Compare outputs to the production model and flag significant divergences. Catches
    data poisoning because the poisoned model produces different output distributions. Cost: doubles serving
    compute during shadow period (~hours). Delay: adds 2-4 hours before deployment. Good at catching subtle
    issues. Option B (human approval): Adds 1-24 hours latency depending on reviewer availability. At
    3x/week, reviewers develop approval fatigue and rubber-stamp — the 6-hour incident could still happen.
    Does not scale. Canary deployment: Deploy to 5% of traffic, monitor business metrics for 30 minutes.
    If CTR drops >10%, auto-rollback. Fast (30 min) and automated. Catches issues that manifest in business
    metrics but may miss subtle biases that do not immediately affect CTR. Recommendation: Canary + shadow
    testing combined. Canary catches gross failures fast (30 min), shadow testing catches subtle distribution
    shifts (2-4 hours). Human review only for flagged anomalies.'
  common_mistake: Adding human approval (B) for every deployment. At 3x/week this quickly becomes a bottleneck
    and defeats the purpose of continuous training — approvals get rubber-stamped.
  napkin_math: 'Shadow testing (A): 2-4h delay, catches subtle drift. Canary deployment (B): 30 min, catches
    gross failures. A+B combined: 4h delay, catches both. Human approval alone: 1-24h delay, approval
    fatigue.'
