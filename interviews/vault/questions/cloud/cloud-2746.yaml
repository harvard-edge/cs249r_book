title: Continuous Training Safety
scenario: Your continuous training pipeline auto-deploys retrained models 3x/week. Last month, a poisoned data batch caused the auto-retrained model to produce biased recommendations for 6 hours before manual detection.
question: How would you evaluate shadow testing, human approval, and automated canaries for this 3x/week auto-deploy pipeline?
details:
  realistic_solution: 'Option A (shadow testing): Run the new model in parallel on live traffic without serving results. Compare outputs to the production model and flag significant divergences. Catches data poisoning because the poisoned model produces different output distributions. Cost: doubles serving compute during shadow period (~hours). Delay: adds 2-4 hours before deployment. Good at catching subtle issues. Option B (human approval): Adds 1-24 hours latency depending on reviewer availability. At 3x/week, reviewers develop approval fatigue and rubber-stamp — the 6-hour incident could still happen. Does not scale. Canary deployment: Deploy to 5% of traffic, monitor business metrics for 30 minutes. If CTR drops >10%, auto-rollback. Fast (30 min) and automated. Catches issues that manifest in business metrics but may miss subtle biases that do not immediately affect CTR. Recommendation: A+C combined. Canary catches gross failures fast (30 min), shadow testing catches subtle distribution shifts (2-4 hours). Human review only for flagged anomalies.'
  common_mistake: |
    **The Pitfall:** Adding human approval for every deployment.
    **The Rationale:** Assuming human review is a scalable safeguard for high-frequency deployment pipelines.
    **The Consequence:** Reviewers develop approval fatigue, rubber-stamp deployments, and the pipeline becomes bottlenecked while still failing to prevent incidents.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shadow testing (A): 2-4 hour delay, effectively catches subtle data drift.
       - Human approval (B): 1-24 hour delay, prone to approval fatigue.
       - Canary deployment (C): 30 minute delay, effectively catches gross failures impacting business metrics.
    2. **Calculations:**
       - Option B fails due to human fatigue.
       - Combining A + C delay: max(30 min, 2-4 hours) = 4 hours.
    3. **Conclusion & Interpretation:** **Combining A + C adds a ~4 hour delay but catches both gross and subtle failures**. Result: **Reliability-Bound**.
