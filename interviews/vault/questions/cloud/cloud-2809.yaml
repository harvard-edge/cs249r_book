title: Cloud New 0027
scenario: Architect a shared KV-cache architecture for an AI NPC engine. 1000s of users interact with a 13B model on A100s. Contexts share a massive world state prompt but branch into unique multi-turn user dialogues.
question: "How would you design a shared KV-cache for 1000s of AI NPC users who share a world-state prompt but branch into unique dialogues?"
details:
  realistic_solution: Design a hierarchical, copy-on-write KV-cache using PagedAttention. Pre-compute the KV-blocks for the massive world state and lock them in A100 HBM2e as read-only. Assign a unique logical block table to each active user session. Map the first N logical blocks of every user to the shared physical world state blocks. As users chat, uniquely allocate new physical blocks for their individual dialogues. Only evict user-specific blocks via LRU when sessions end or VRAM fills up.
  common_mistake: |
    **The Pitfall:** Duplicating the massive world state KV-cache for every single user session.
    **The Rationale:** Treating each user conversation as a completely independent request from token zero without utilizing prefix caching or PagedAttention sharing.
    **The Consequence:** Instantly triggering OOM errors on the A100 instances, as 1000 users * 1.6GB = 1.6TB of redundant memory.
  napkin_math: |
    * **Model weights:** 13B params = 26GB.
    * **A100 capacity:** 80GB leaves 54GB for KV cache.
    * **World state (shared):** 10k tokens takes ~1.6GB.
    * **User histories (unique):** 1000 users * 500 tokens = 1000 * 80MB = 80GB (OOM without sharing, or with full duplication).
    * **VRAM savings:** Sharing the 1.6GB base saves 1.6TB of VRAM logically across 1000 users.
    * **Conclusion:** **Multi-node or offloading is still required, but sharing drastically reduces the footprint.**
