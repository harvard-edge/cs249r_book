title: Cloud Rlhf Infrastructure L2 0
scenario: Your team plans to add RLHF to a 7B language model. The engineer estimates needing 'about the same resources as regular fine-tuning.'
question: Why can PPO-style RLHF require up to 4x the GPU memory of standard fine-tuning for a 7B model?
details:
  realistic_solution: RLHF with PPO requires four concurrent models in memory. (1) Policy model (being trained), (2) Reference model (frozen copy for KL penalty), (3) Reward model, and (4) Critic/value model. Standard fine-tuning only requires the policy model and its optimizer states.
  common_mistake: |
    **The Pitfall:** Forgetting the reference, reward, and critic models in the memory budget.
    **The Rationale:** Engineers assume training a 7B model is a static cost, ignoring the multi-model architecture required by PPO.
    **The Consequence:** Immediate OOM errors during initialization and severe under-provisioning of the training cluster.
  napkin_math: |
    - Policy Model (training): 7B * 16 bytes/param = 112 GB.
    - Reference Model (inference): 7B * 2 bytes = 14 GB.
    - Reward Model (inference): 7B * 2 bytes = 14 GB.
    - Critic Model (training): 7B * 16 bytes = 112 GB.
    - Total Memory (with weight sharing) = 112 + 14 + 14 + 112 = 252 GB.
    - Total Memory (without sharing) = 4 * 112 = 448 GB.
    - **Conclusion: RLHF requires ~2.25x to 4x the memory of standard SFT (112 GB).**
