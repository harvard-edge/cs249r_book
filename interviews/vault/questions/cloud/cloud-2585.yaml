title: Cloud Rlhf Infrastructure L2 0
scenario: Your team plans to add RLHF to a 7B language model. The engineer estimates needing 'about the
  same resources as regular fine-tuning.' Explain why RLHF requires approximately 4x the GPU memory of
  standard training.
question: "Why can PPO-style RLHF require up to 4x the GPU memory of standard fine-tuning for a 7B model?"
details:
  realistic_solution: 'RLHF with PPO requires four concurrent models: (1) Policy model (the model being
    trained) — 7B params with full optimizer state, (2) Reference model (frozen copy of pre-RLHF policy)
    — 7B params inference-only, used to compute KL divergence penalty, (3) Reward model (evaluates response
    quality) — typically same size as policy, and (4) Critic/value model (estimates advantage) — often
    shares architecture with reward model. Each model needs GPU memory. Standard fine-tuning: 1 model
    with optimizer ≈ 16 bytes/param × 7B = 112 GB. RLHF: policy (112 GB) + reference (14 GB) + reward
    (14 GB) + critic (112 GB) = 252 GB. Roughly 2.25x with weight sharing, up to 4x without. Plus generation
    phase needs KV cache for policy sampling.'
  common_mistake: Forgetting the reference model. It seems redundant (it is the same architecture) but
    is essential — without the KL penalty from the reference, the policy quickly degenerates and produces
    nonsensical but high-reward text (reward hacking).
  napkin_math: '7B × 16 B/param (training) = 112 GB for policy. Reference (inference): 14 GB. Reward (inference):
    14 GB. Critic (training): 112 GB. Total: 252 GB ≈ 2.25x standard. Without sharing: 4 × 112 = 448 GB
    ≈ 4x. Need 4-8 A100s vs. 2 for standard SFT.'
