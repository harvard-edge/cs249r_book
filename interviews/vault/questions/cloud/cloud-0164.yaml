title: The Input Chunking Pipeline Bubble
scenario: Users submit 100,000-token documents to your summarization model. To avoid OOMing during the
  prefill phase, you implement 'Chunked Prefill' (breaking the document into 4,000-token blocks). The
  prefill now succeeds. But users notice that the Time-To-First-Token (TTFT) actually *increased* compared
  to when you ran the 100k prompt all at once on a bigger GPU. Why does chunking the prompt slow down
  the time to first token?
details:
  realistic_solution: Chunking destroys arithmetic intensity. A single 100k-token prefill is one enormous
    matrix multiply with astronomical data reuse — each weight element is multiplied against 100k tokens,
    so the weights are loaded from HBM once and reused extensively. With 4k-token chunks, you run 25 separate
    smaller matmuls, each loading the full 140GB weight matrix from HBM. You've turned 1 weight load into
    25 weight loads — roughly 25x more memory traffic for the same compute. The GPU shifts from compute-bound
    to memory-bound, and TTFT increases proportionally.
  common_mistake: '"Chunking adds Python looping overhead." Python overhead is microseconds; the slowdown
    is seconds.'
  napkin_math: 'Single 100k pass: Total compute = `2 × 70e9 × 100,000` = 14 PFLOPs. At ~989 TFLOPS (peak,
    because 100k-token matmuls have astronomical arithmetic intensity), time ≈ 14.15s. Weights (140 GB)
    are streamed from HBM once per layer.'
