title: 'The Multi-Node Scaling Cliff: Data Parallelism'
scenario: You are diagnosing a customer's distributed training job for a 70B parameter model using standard FSDP across two H100 nodes (16 GPUs total). Single-node training on 8 GPUs is fast, but scaling to two nodes causes a massive slowdown. Profiling shows that All-Reduce latency has spiked.
question: What bottleneck causes All-Reduce latency to spike when scaling the 70B FSDP job from one 8-GPU node to two nodes?
details:
  realistic_solution: 'The bottleneck is the inter-node InfiniBand network. The bandwidth of the link between the two servers is an order of magnitude smaller than the aggregate bandwidth of the NVLink fabric within a single server. During an All-Reduce operation, the gradients for the 70B parameters must be synchronized across all 16 GPUs. The portion of this communication that must traverse the inter-node link is limited by InfiniBand''s much lower bandwidth compared to NVLink.'
  common_mistake: |
    **The Pitfall:** Underestimating the staggering difference between on-node and off-node interconnect bandwidths.
    **The Rationale:** Engineers often blame complex software bugs (e.g., NCCL) without performing a simple hardware bandwidth calculation.
    **The Consequence:** Time is wasted debugging framework implementations instead of acknowledging the physical network limitation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B FP32 parameters, 16 GPUs across 2 nodes.
    - NVLink: 900 GB/s. InfiniBand: 50 GB/s.
    
    **Calculations:**
    - Gradients Size: 70B * 4 bytes = 280 GB.
    - Inter-node Transfer Size: 2 * (15/16) * 280 GB = 525 GB.
    - Inter-node Time: 525 GB / 50 GB/s = 10.5 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: 18x bandwidth drop (Network-Bound)**. Causes the scaling bottleneck.
  options:
  - 'The PCIe Gen5 bus is saturated; 280GB transfer at 128 GB/s takes 2.2 seconds.'
  - 'The NVLink 4.0 fabric is overloaded; transferring 525 GB at 900 GB/s takes 0.58 seconds.'
  - 'The InfiniBand NDR network is the bottleneck; 525 GB transfer at 50 GB/s takes 10.5 seconds, choking the All-Reduce.'
  - 'FP16 Gradients Size is 140 GB, taking 2.8 seconds over InfiniBand.'
  correct_index: 2
