title: The KV-Cache Network Wall
scenario: You implement Disaggregated Serving to separate Prefill and Decode tasks for a 70B LLM. However, for users with long prompts (32k tokens), the Time-to-First-Token (TTFT) increases by over 8 seconds.
question: Based on the diagram, what physical link is destroying your latency gain?
details:
  realistic_solution: 'The bottleneck is the 10 GbE Network. Disaggregated serving requires InfiniBand/RoCE (200-400 Gbps) and GPUDirect RDMA to move the massive KV-cache directly between GPU HBMs, bypassing the slow CPU RAM and standard Ethernet.'
  common_mistake: |
    **The Pitfall:** Assuming disaggregated serving is always faster by blindly isolating compute from memory bandwidth.
    **The Rationale:** Engineers forget that transferring the massive intermediate KV-cache state over standard networks is extremely slow.
    **The Consequence:** Severe degradation of Time-to-First-Token (TTFT) due to network transfer bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B Model params: 80 layers, 8 KV heads, 128 dim.
       - Context: 32,000 tokens.
       - Network link: 10 GbE.
    2. **Calculations:**
       - KV-Cache size: 2 (K,V) * 80 * 8 * 128 * 32,000 * 2 bytes = 10,485,760,000 bytes = 10.48 GB.
       - 10 GbE speed: ~1.25 GB/s.
       - Transfer latency: 10.48 GB / 1.25 GB/s ≈ 8.4 seconds.
    3. **Conclusion & Interpretation:**
       **Result: 8.4 Second TTFT Penalty (Network-Bound).** Transferring the 10.5 GB KV-cache over a generic 10 GbE network annihilates any latency gains from disaggregated serving.
