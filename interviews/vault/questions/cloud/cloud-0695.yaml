title: The KV-Cache Network Wall
scenario: You implement Disaggregated Serving to separate Prefill and Decode tasks
  for a 70B LLM. However, for users with long prompts (32k tokens), the Time-to-First-Token
  (TTFT) increases by over 8 seconds. Based on the diagram, what physical link is
  destroying your latency gain?
question: Based on the diagram, what physical link is destroying your latency gain?
details:
  realistic_solution: The bottleneck is the **10 GbE Network**. For a 70B model with
    a 32k token prompt, the KV-cache is massive (~10.5 GB). Over a 1.25 GB/s link,
    transferring this state takes ~8.4 seconds. Disaggregated serving requires **InfiniBand/RoCE
    (200-400 Gbps)** and **GPUDirect RDMA** to move the KV-cache directly between
    GPU HBMs, bypassing the slow CPU RAM and standard Ethernet.
  common_mistake: '"Disaggregated serving is always faster because it isolates compute
    from memory bandwidth." This assumes the transfer of the intermediate state (the
    KV-cache) is free.'
  napkin_math: 'In disaggregated serving, the prefill node must send the KV-cache
    to the decode node. For a 70B model with 8 KV-heads, 128 head dim, 80 layers,
    and 32,000 tokens: 2 (K&V) * 80 * 8 * 128 * 32,000 * 2 bytes = 10.48GB of KV-cache.
    Transferring 10.5GB over a 10 GbE network (yielding ~1.25 GB/s) adds 10.5 / 1.25 = 8.4 seconds of TTFT latency!'
