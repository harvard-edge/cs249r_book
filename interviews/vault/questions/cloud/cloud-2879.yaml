title: Designing a Gradient Checkpointing Segment Strategy for a 70B Model on A100
scenario: Your team is fine-tuning a 70B parameter dense Transformer (96 layers, H=8192, FFN=4×H) on 8x A100 GPUs using tensor parallelism degree 8. With fp16 weights and 8-bit Adam optimizer, model and optimizer states (including gradients) consume approximately 52 GB per GPU. You have roughly 28 GB remaining per GPU for activations.
question: What gradient checkpointing strategy keeps activations under 28 GB per A100 while minimizing recomputation for this 70B TP=8 fine-tune?
details:
  realistic_solution: 'Use selective checkpointing: checkpoint attention score tensors (the O(S²) terms) at every layer while retaining MLP activations. For S=2048, H=8192, B=2: attention scores across all heads are 2×64×2048²×2 bytes ≈ 1 GB per layer. With TP=8, each GPU stores 1/8th of the heads, taking ~134 MB per layer. Discarding and recomputing these across 96 layers saves ~12.8 GB per GPU while the single-attention recompute adds only ~5% extra FLOPs per backward pass. Combine with activation offloading for the residual stream to PCIe host memory during the forward pass for layers not in the current backward window.'
  common_mistake: |
    **The Pitfall:** Applying uniform layer-level checkpointing.
    **The Rationale:** Candidates fail to recognize that attention score tensors scale as O(S²) and dominate memory at long sequences, whereas MLP layers scale as O(S) and checkpoint much more cheaply per byte saved.
    **The Consequence:** Unnecessary recomputation overhead by checkpointing layers that contribute relatively little to memory savings.
  napkin_math: |
    1. Calculate base memory footprint: 17.5 GB (weights) + 17.5 GB (gradients) + 17.5 GB (optimizer) = 52.5 GB.
    2. Identify remaining memory: 80 GB - 52.5 GB = 27.5 GB free.
    3. Calculate attention score size per layer (B=2, 8 local heads, S=2048): 2 * 8 * 2048^2 * 2 bytes = 134.2 MB.
    4. Calculate total attention memory across 96 layers: 134.2 MB * 96 = 12.88 GB saved.
    5. **Result: Discarding and recomputing attention scores across 96 layers saves ~12.88 GB, keeping activations within budget.**
