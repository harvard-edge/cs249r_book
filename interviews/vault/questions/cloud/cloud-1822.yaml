title: Evaluating GPU Allocation Limits via Scaling Efficiency
scenario: 'You are configuring an elastic training scheduler for a cluster of 512 A100 (80GB) GPUs connected
  via 200Gbps InfiniBand. A team submits a distributed training job requesting up to 128 GPUs. Profiling
  reveals its Scaling Efficiency Curve: at 32 GPUs throughput is 10,000 imgs/sec, at 64 GPUs it is 16,000
  imgs/sec, and at 128 GPUs it is 20,000 imgs/sec. With the cluster at 90% utilization and a growing job
  queue, how do you evaluate allocating the requested 128 GPUs versus capping the job at a lower GPU count?'
details:
  realistic_solution: Cap the allocation at 64 (or 32) GPUs depending on queue depth. By evaluating the
    marginal throughput, the scheduler recognizes that allocating the additional 64 GPUs (from 64 to 128)
    yields severely diminishing returns. Those same GPUs should be allocated to new jobs operating in
    their linear scaling regime to maximize global cluster goodput.
  common_mistake: Allocating the maximum requested GPUs to minimize the individual job's latency, ignoring
    the severe drop in marginal scaling efficiency and the opportunity cost to overall cluster throughput.
  napkin_math: 'Marginal gain 64->128 GPUs: (20,000 - 16,000) / 64 = 62.5 imgs/sec per GPU. Base efficiency
    at 32 GPUs: 10,000 / 32 = 312.5 imgs/sec per GPU. The marginal GPUs are exactly 5x less efficient
    than assigning them to a new 32-GPU job.'
