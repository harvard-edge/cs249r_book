title: The Arithmetic Intensity Litmus Test
scenario: You're profiling a new model layer on an NVIDIA H100 GPU. To predict whether this layer will
  be limited by the GPU's computational speed or its memory bandwidth, what is the single most important
  metric you would calculate for that layer?
question: "To predict whether this layer will be limited by the GPU's computational speed or its memory bandwidth, what is the single most important metric you would calculate for that layer?"
details:
  realistic_solution: The key metric is **Arithmetic Intensity (AI)**. It is the ratio of the total floating-point
    operations (FLOPs) performed to the total bytes of data moved to and from memory. By comparing the
    workload's AI to the hardware's 'ridge point', you can determine if it's compute-bound or memory-bound.
    For an H100, the ridge point is around 295 Ops/Byte. If your layer's AI is > 295, it's compute-bound;
    if it's < 295, it's memory-bound.
  common_mistake: Engineers often focus on absolute metrics like the total GFLOPs of a model or its size
    in gigabytes. However, these numbers in isolation don't tell you how the workload interacts with the
    hardware. A model can have massive compute requirements but be memory-bound if it needs to fetch a
    correspondingly massive amount of data for each calculation.
  napkin_math: '1. Identify the layer''s total computational work: Total FLOPs.

    2. Identify the layer''s data movement: Total Bytes transferred from HBM.

    3. Calculate Arithmetic Intensity (AI) = Total FLOPs / Total Bytes.

    4. Compare AI to the H100''s ridge point (~295 Ops/Byte).

    If AI < 295, the layer is memory-bound. If AI > 295, the layer is compute-bound. This single metric
    dictates optimization strategy.'
  options:
  - Total GFLOPs of the layer
  - The layer's parameter size in MB
  - Arithmetic Intensity (Ops/Byte)
  - The GPU's peak TOPS/Watt
  correct_index: 2
