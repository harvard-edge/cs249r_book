title: The Arithmetic Intensity Litmus Test
scenario: You're profiling a new model layer on a GPU. You need to predict whether this layer will be limited by the GPU's computational speed or its memory bandwidth.
question: What is the single most important metric you would calculate for that layer?
details:
  realistic_solution: 'The key metric is **Arithmetic Intensity (AI)**. It is the ratio of the total floating-point operations (FLOPs) performed to the total bytes of data moved to and from memory. By comparing the workload''s AI to the hardware''s ridge point, you can determine if it''s compute-bound or memory-bound.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on total GFLOPs or total parameter size.
    **The Rationale:** Engineers rely on absolute metrics, ignoring how the workload interacts with the specific hardware's memory bus.
    **The Consequence:** Optimization efforts are misdirected (e.g., trying to speed up compute on a layer that is heavily memory-bound).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware ridge point is known (~295 Ops/Byte).
    2. **Calculations:**
       - Arithmetic Intensity (AI) = Total FLOPs / Total Bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound or Memory-Bound identified. If AI < 295, it's memory-bound. If AI > 295, it's compute-bound.**
  options:
  - Total GFLOPs of the layer
  - The layer's parameter size in MB
  - Arithmetic Intensity (Ops/Byte)
  - The GPU's peak TOPS/Watt
  correct_index: 2
