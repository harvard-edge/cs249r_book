title: TPU v5e AllReduce over ICI Torus
scenario: A TPU v5e pod slice has 256 chips arranged in a 16×16 2D torus, each with 1.6 Tbps ICI bandwidth.
  Compare the AllReduce time for a 1GB gradient on this torus versus 256 H100s connected via 400Gbps switched
  Ethernet. Analyze why the torus topology affects algorithm selection differently than a Clos network.
question: "How does 1GB AllReduce time on a 16×16 TPU v5e torus compare with 256 H100s on 400Gbps Ethernet, and why does topology matter?"
details:
  realistic_solution: 'TPU v5e torus AllReduce (dimension-ordered): Phase 1 — reduce along X-axis (16
    chips per row, ring AllReduce): T_x = 2 × 15/16 × 1GB / 200GB/s = 9.38ms (ICI at 200 GB/s per direction).
    Phase 2 — reduce along Y-axis (16 chips per column): T_y = 2 × 15/16 × 1GB/16 / 200GB/s = 0.59ms (data
    is 16× smaller after X reduction for reduce-scatter, but need to be careful — actually in dimension-ordered
    AllReduce, each dimension does a full AllReduce on 1/16th of the data). Corrected: each chip has 1GB/16
    = 64MB after X-axis reduce-scatter. Y-axis AllReduce on 64MB: T_y = 2 × 15/16 × 64MB / 200GB/s = 0.6ms.
    Total: 9.38 + 0.6 = 9.98ms. H100 Clos (ring AllReduce): T = 2 × 255/256 × 1GB / 50GB/s = 39.8ms. T
    (8-rail): 39.8/8 = 4.97ms. TPU torus is 2× slower than 8-rail H100! But: torus has zero contention
    (dedicated links), while Clos shares switches. Under congestion, H100 performance degrades while TPU
    torus remains constant. The torus advantage is deterministic, predictable performance — not peak throughput.'
  common_mistake: Using the ring AllReduce formula directly for a torus. A 2D torus enables dimension-ordered
    AllReduce that reduces along each axis independently, achieving better scaling than a single flat
    ring.
  napkin_math: 'TPU torus: 2D ring AllReduce = 10ms for 1GB. H100 8-rail Clos: 5ms for 1GB. But TPU achieves
    100% of theoretical (dedicated links), while H100 typically achieves 70-85% due to congestion, giving
    real-world parity at ~7ms for both.'
