title: Online Learning Embedding Staleness and Cache Invalidation
scenario: A recommendation system updates item embeddings every 5 minutes via online learning. The serving
  system caches embeddings in L2 cache (128MB per serving replica). After an update cycle, 15% of requests
  use stale embeddings for 3-8 minutes. Diagnose and fix.
details:
  realistic_solution: 'Selective cache invalidation: (1) Track which embedding rows were updated in each
    training cycle. Online learning typically updates <1% of rows per cycle (sparse gradient updates).
    Tag updated rows with a version number. (2) Lazy invalidation: serving replicas check embedding version
    on cache hit. If cached version < current_version, re-fetch from parameter server. Version check:
    O(1) hash lookup in a ''dirty set'' (bloom filter of updated row IDs). Bloom filter for 1% of 2B rows
    = 20M updated rows: ~20MB at 1% false positive rate. (3) Version broadcast: parameter server broadcasts
    a compact dirty-set (bloom filter) to all serving replicas after each update cycle. Serving replicas
    load the bloom filter (20MB) atomically: <1ms to apply. (4) Eviction-aware update: prioritize updating
    cache entries for rows in the dirty set. Background thread checks dirty set and evicts stale entries
    asynchronously.'
  common_mistake: Flushing the entire embedding cache on every update cycle. With 128MB L2 cache and updates
    every 5 minutes, full cache flush every 5 minutes eliminates the cache hit rate benefit entirely,
    causing 100% cache miss rate after each update and spiking embedding lookup latency.
  napkin_math: 'L2 cache: 128MB, 64-dim float32 embeddings = 256B each. Cache capacity: 128MB / 256B =
    500K rows. With 2B total rows: cache holds 500K/2B = 0.025% of table. Cache hit rate for popular items:
    following Zipf distribution, top 0.025% items receive ~15% of traffic — so cache hit rate ~15% at
    steady state. With 1% update rate per cycle: 20M updated rows. Probability that a cached row is updated:
    20M updated / 2B total * 500K cached = 5K stale rows per cache. Bloom filter check: 5K stale hits
    per cycle / 500K cache = 1% cache entries are stale. This matches observed 15% * 10% stale served
    = 1.5% if hot rows are more likely updated (biased toward high-traffic items).'
