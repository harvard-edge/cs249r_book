title: 'MoE vs Dense: Cost-per-Token Comparison for Training'
scenario: You must choose between training a dense 70B model or an MoE 8×70B model (560B total, 140B active
  with top-2). Both target the same final quality. The MoE model reaches target quality in 40% fewer training
  tokens (scaling law advantage). Compare the total GPU-hours and cost on H100 at $2/GPU-hour.
details:
  realistic_solution: 'Dense 70B: FLOP per token = 6 × 70B = 420 GFLOP. Training tokens = 2T. Total FLOP
    = 420 × 10⁹ × 2 × 10¹² = 8.4 × 10²³. H100 at 989 TFLOPS, 45% MFU = 445 TFLOPS effective. GPU-hours
    = 8.4 × 10²³ / (445 × 10¹² × 3600) = 524K GPU-hours. Cost = $1.05M. MoE 8×70B: FLOP per token = 6
    × 140B = 840 GFLOP (2× due to top-2). Training tokens = 1.2T (40% fewer). Total FLOP = 840 × 10⁹ ×
    1.2 × 10¹² = 1.008 × 10²⁴. But MFU is lower due to All-to-All overhead: ~35%. GPU-hours = 1.008 ×
    10²⁴ / (989 × 10¹² × 0.35 × 3600) = 809K GPU-hours. Plus needs 4× more GPUs (memory for 560B params).
    Cost = $1.62M. MoE is 54% more expensive despite 40% fewer tokens, because: (1) 2× active FLOPS per
    token, (2) lower MFU from communication, (3) more GPUs for memory. The MoE advantage is in inference
    — 140B active FLOPS vs a hypothetical 560B dense model would be 4× cheaper per query.'
  common_mistake: Only comparing FLOPS without accounting for the MoE model's higher memory requirement
    (needing more GPUs) and the All-to-All communication overhead that reduces per-GPU efficiency.
  napkin_math: 'Dense 70B: 524K GPU-hours × $2 = $1.05M. MoE 8×70B: 809K GPU-hours × $2 = $1.62M. MoE
    training is 54% more expensive. But MoE inference: 140B FLOPS vs equivalent quality dense of ~250B
    = 1.8× cheaper per query. Break-even: ~3M inference queries.'
