title: The Oversubscription Choke
scenario: We placed half our GPUs in Rack A and half in Rack B. The intra-rack AllReduce is incredibly fast, but the global AllReduce crawls, even though we bought 400 Gbps InfiniBand.
question: Where is the bottleneck?
details:
  realistic_solution: Oversubscribed spine switches. A true Fat-Tree (Clos) topology guarantees non-blocking, full bisection bandwidth across the entire cluster. However, if your data center uplinks are $3:1$ oversubscribed (e.g., 3 downlinks for every 1 uplink to the spine), cross-rack traffic will instantly choke during global gradient synchronization.
  common_mistake: |
    **The Pitfall:** Assuming the InfiniBand NICs must be misconfigured.
    **The Rationale:** Intra-rack is fast, so engineers blame the specific hardware configuration of the cross-rack links.
    **The Consequence:** Wasting time debugging NIC settings when the fundamental issue is an oversubscribed switch topology that physically cannot handle the bandwidth.
  napkin_math: |
    - **Aggregate Demand:** 8 nodes per rack, each with 400 Gbps NIC = 3.2 Tbps aggregate demand per rack.
    - **Uplink Capacity (2:1 Oversubscription):** If the spine uplink is only 1.6 Tbps, half the gradient data is queued.
    - **Impact:** This doubles the AllReduce time. At 3:1 oversubscription, it triples.
    - **Conclusion:** Cross-rack traffic chokes during global gradient synchronization due to the network topology.
