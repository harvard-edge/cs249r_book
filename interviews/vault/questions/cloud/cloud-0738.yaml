title: The Oversubscription Choke
scenario: We placed half our GPUs in Rack A and half in Rack B. The intra-rack AllReduce is incredibly fast, but the global AllReduce crawls, even though we bought 400 Gbps InfiniBand.
question: Where is the bottleneck?
details:
  realistic_solution: Oversubscribed spine switches. A true Clos topology guarantees non-blocking bandwidth. If data center uplinks are oversubscribed (e.g., 3:1), cross-rack traffic chokes during synchronization.
  common_mistake: |
    **The Pitfall:** Assuming the InfiniBand NICs must be misconfigured.
    **The Rationale:** Because intra-rack is fast, engineers blame the hardware configuration of the cross-rack links.
    **The Consequence:** Wasting time debugging NIC settings instead of acknowledging physical topology limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 nodes per rack, 400 Gbps NIC = 3.2 Tbps demand per rack.
    2. **Calculations:**
       - Uplink at 2:1 oversubscription = 1.6 Tbps.
       - Half the data is queued, doubling AllReduce time.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. Topology oversubscription physically chokes the data.**
