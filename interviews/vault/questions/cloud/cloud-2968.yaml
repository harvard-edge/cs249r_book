title: 'Dataset Curation: Recall — What is Perplexity-Based Data Filtering?'
scenario: 'In the context of LLM pre-training data curation on H100 clusters, a perplexity-based filtering method is proposed to classify document quality.'
question: 'What is perplexity-based filtering, and what threshold range is commonly used to classify low-quality versus high-quality documents?'
details:
  realistic_solution: 'A small N-gram LM (e.g., KenLM 5-gram) or small neural LM scores each document. Low perplexity = document resembles training distribution of the reference LM. Thresholds: perplexity < 100-300 = high quality; > 1000 = noise/gibberish.'
  common_mistake: |
    **The Pitfall:** Confusing model perplexity (evaluation) with document perplexity (filtering).
    **The Rationale:** Assuming the filtering requires running the massive LLM being trained, rather than a tiny reference model like a 5-gram KenLM.
    **The Consequence:** Drastically overestimating the compute required for data filtering, or misunderstanding how out-of-distribution "gibberish" is detected.
  napkin_math: |
    **Assumptions & Constraints:**
    - KenLM Scoring Speed: ~10K docs/sec/CPU core.
    - 1B documents processed on 512 cores.

    **Calculations:**
    - Compute Time: 1B / (512 * 10K) = 195 seconds.
    - 195 seconds ≈ 3.3 minutes.

    **Conclusion & Interpretation:**
    - **Result: 3.3 minutes (Compute-Bound)**. Using a small N-gram reference model allows processing massive datasets extremely quickly without requiring heavy GPU inference.
