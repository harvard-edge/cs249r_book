title: Micro-Burst Detection for ML Traffic
scenario: Your monitoring system samples switch counters every 5 seconds, showing 30% average link utilization
  on your H100 cluster's spine switches. But training jobs report intermittent 10ms stalls. You suspect
  micro-bursts are saturating links at sub-second timescales. Calculate what burst size at 400Gbps can
  occur within a 5-second sampling blind spot and propose a detection method.
details:
  realistic_solution: 'At 400Gbps, in a 5-second window: maximum data transfer = 400 Gbps × 5s = 250 GB.
    With 30% average utilization = 75 GB transferred. This 75 GB could arrive as a uniform 30% load OR
    as a 250ms burst at line rate followed by 4.75s of silence — both show 30% average. A 250ms burst
    generates 12.5 GB of instantaneous queuing pressure (showing 5% average over the 5s window). Detection
    methods: (1) Enable per-port histogram counters (available on Spectrum-4 and Tomahawk-5) that record
    buffer occupancy distribution at µs granularity. (2) Use INT (In-band Network Telemetry) to piggyback
    queue depth on every data packet — each AllReduce packet reports the queue depth it observed. (3)
    Reduce polling interval to 100ms using streaming telemetry (gNMI). (4) Deploy ECN counters: count
    ECN-marked packets per second. A spike in ECN marks without a spike in average utilization confirms
    micro-bursts.'
  common_mistake: Trusting 5-second averaged counters to represent instantaneous load. A link can be idle
    for 4.9 seconds and fully saturated for 100ms, showing 2% average utilization while causing significant
    congestion.
  napkin_math: 400Gbps × 250ms burst = 12.5 GB data in 250ms, showing 5% average over 5s (12.5 GB × 8
    / 5s = 20 Gbps = 5% of 400Gbps link) but 100% instantaneous utilization. Switch buffer = 64MB. 12.5
    GB / 64MB = 195× oversubscription relative to buffer. Even with dynamic thresholds, this guarantees
    ECN marks and potential PFC pauses.
