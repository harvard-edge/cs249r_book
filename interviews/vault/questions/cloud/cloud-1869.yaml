title: Evaluating Microservice Serving Tax for ML Pipelines
scenario: You are migrating a monolithic recommendation pipeline (Embedding -> Ranker -> LLM Generator)
  to a distributed microservices architecture to scale each component independently. The monolithic pipeline
  currently has an end-to-end latency of 120ms. The new microservices will be hosted on separate gRPC
  containers over a 10 Gbps cloud network. The intermediate payload passed between models is approximately
  2MB of dense float32 tensors. Evaluate the impact of the 'serving tax' (serialization, network transfer,
  deserialization) on the p99 latency, and justify whether independent scalability outweighs this penalty
  given a strict 200ms p99 end-to-end SLO.
details:
  realistic_solution: The serialization serving tax will likely violate the 200ms SLO. Instead of network
    microservices, use an inference server (like Triton) with 'Ensemble Models' to execute the pipeline
    in a single process using shared memory, achieving independent model scaling without the network/serialization
    tax.
  common_mistake: Candidates often only calculate the theoretical network transmission time (e.g., 1.6ms)
    and ignore the much larger CPU-bound serialization and deserialization tax of standard RPC frameworks,
    as well as the p99 network jitter.
  napkin_math: 'Network transfer: 2MB / (10 Gbps / 8 bytes) = 1.6ms per hop. Protobuf serialization/deserialization
    for 2MB floats on CPU: ~10ms each = 20ms per hop. Total tax per hop = 21.6ms. Two hops = 43.2ms average.
    At p99 (assuming 2x variance for RPC/network queues): ~86ms tax. 120ms (base) + 86ms = 206ms, which
    exceeds the 200ms SLO.'
