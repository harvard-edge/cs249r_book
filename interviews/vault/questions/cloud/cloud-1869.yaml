title: Evaluating Microservice Serving Tax for ML Pipelines
scenario: You are migrating a monolithic recommendation pipeline (Embedding -> Ranker -> LLM Generator) to a distributed microservices architecture to scale each component independently. The monolithic pipeline currently has an end-to-end latency of 120ms. The intermediate payload passed between models is approximately 2MB of dense float32 tensors.
question: Should you split the 120ms monolithic recommender into gRPC microservices with 2MB tensor payloads under a 200ms p99 SLO?
details:
  realistic_solution: 'The serialization serving tax will likely violate the 200ms SLO. Instead of network microservices, use an inference server (like Triton) with ''Ensemble Models'' to execute the pipeline in a single process using shared memory, achieving independent model scaling without the network/serialization tax.'
  common_mistake: |
    **The Pitfall:** Only calculating theoretical network transmission time and ignoring serialization overhead.
    **The Rationale:** Candidates assume network latency is the only penalty in a microservices architecture.
    **The Consequence:** Drastically underestimating the "serving tax," leading to severe SLO violations in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Monolithic latency: 120ms.
       - SLO: 200ms p99.
       - Payload: 2 MB of dense float32 tensors.
       - Network: 10 Gbps (1.25 GB/s).
    2. **Calculations:**
       - Network transfer time: 2 MB / 1.25 GB/s = 1.6 ms per hop.
       - Serialization/deserialization tax: ~10 ms each for 2MB protobuf floats on CPU = 20 ms per hop.
       - Total tax per hop: 21.6 ms.
       - Total tax for two hops (Embedding -> Ranker -> LLM): 43.2 ms average.
       - Estimate p99 latency (assume 2x variance): ~86 ms tax.
       - Total P99 latency: 120 ms + 86 ms = 206 ms.
    3. **Conclusion & Interpretation:** **Base 120ms + 86ms tax = 206 ms, which exceeds the 200ms SLO**. Result: **Serialization-Bound**.
