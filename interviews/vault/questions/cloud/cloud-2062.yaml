title: The Hyperparameter Search Efficiency Gap
scenario: An engineer plans a grid search over 5 hyperparameters with 10 values each, requesting 100,000 GPU-hours. A senior engineer proposes an alternative to drastically reduce the compute budget.
question: What is wrong with the grid search approach, and how do you reduce the budget while maintaining similar coverage?
details:
  realistic_solution: Grid search over 5 parameters with 10 values each requires 10^5 = 100,000 experiments. But research (Bergstra & Bengio, 2012) shows that for most ML workloads, only 2-3 hyperparameters materially affect performance. Random search with 100 experiments covers the important dimensions nearly as well because each trial samples a unique value for every parameter. Bayesian optimization (e.g., Optuna with TPE) can further reduce this to ~50 trials by learning which regions of the space are promising. Budget drops from 100,000 to 50-100 trials — a 1,000-2,000× reduction.
  common_mistake: |
    **The Pitfall:** Treating grid search as a "slow but thorough" default.
    **The Rationale:** Failing to recognize that in high-dimensional spaces, only 2-3 hyperparameters typically matter, making grid search highly inefficient.
    **The Consequence:** Wasting massive amounts of compute evaluating irrelevant interactions between unimpactful hyperparameters.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 hyperparameters, 10 values each.
    2. **Calculations:**
       - Grid search: 10^5 = 100,000 trials.
       - Bayesian optimization (TPE): Learns promising regions and converges in ~50 trials.
    3. **Conclusion & Interpretation:**
       **Result: Search-Space Bound.** By switching from Grid Search to Bayesian Optimization, a 100,000 GPU-hour budget drops to ~50 hours (a 2,000x reduction).
