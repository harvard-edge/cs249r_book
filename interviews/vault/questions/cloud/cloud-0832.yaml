title: The Datacenter PUE Cooling Budget
scenario: You are designing the power budget for a new AI training cluster with 10,000 H100 GPUs (700W
  TDP each). The facility targets a PUE of 1.10. Your CFO asks for the annual electricity cost and wants
  to understand where the non-GPU power goes. Wholesale electricity is $0.05/kWh. Analyze the total power
  budget and cost structure.
details:
  realistic_solution: GPU power = 10,000 * 700W = 7 MW. Total facility power at PUE 1.10 = 7.7 MW. The
    700 kW overhead covers cooling (CRAC units, chilled water), networking switches, storage, and lighting.
    Annual energy = 7,700 kW * 8,760 hours = 67.5 GWh. Annual cost = 67.5M kWh * $0.05 = $3.4M. The cooling
    overhead alone costs $306K/year. At higher PUE (1.4 for average datacenter), overhead would be 2.8
    MW and $1.2M/year.
  common_mistake: Only counting GPU power and ignoring PUE overhead. Even a best-in-class PUE of 1.10
    means 10% overhead for cooling, networking, and storage — which at this scale is 700 kW of 'invisible'
    power draw.
  napkin_math: GPU power = 10,000 * 700W = 7,000 kW = 7 MW. Facility = 7 MW * 1.10 = 7.7 MW. Cooling overhead
    = 700 kW. Annual = 7,700 * 8,760 = 67.45 GWh. Cost = 67.5M * $0.05 = $3.4M/year.
