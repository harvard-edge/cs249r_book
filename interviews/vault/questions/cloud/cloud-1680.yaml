title: KV Cache Fragmentation Bottleneck
scenario: You are deploying a 30B parameter LLM (FP16, ~60GB weights and workspace) on a single 80GB A100
  GPU. The current serving engine uses static contiguous memory allocation for the KV cache, reserving
  memory for the maximum sequence length (8192 tokens) upfront for every request. You observe that the
  server OOMs when concurrent requests exceed 4, even though the average actual request sequence length
  (prompt + completion) is only 512 tokens. Assume the KV cache requires 0.5MB per token. Diagnose the
  root cause of this memory bottleneck and analyze the expected concurrent request capacity if you migrate
  to a serving engine using Paged Memory Management (e.g., PagedAttention) with 16-token blocks.
details:
  realistic_solution: Diagnose the issue as internal memory fragmentation (over-allocation) and external
    fragmentation. Static allocation wastes memory on unused tokens up to the max length. Paged Memory
    Management dynamically allocates memory in non-contiguous fixed-size blocks (pages), perfectly fitting
    the actual sequence length and eliminating fragmentation, which dramatically increases max batch size.
  common_mistake: Failing to distinguish between model weights memory and dynamic KV cache memory, or
    proposing model compression techniques (like quantization) rather than addressing the massive internal
    fragmentation caused by max-length pre-allocation.
  napkin_math: 'Available memory for KV cache = 80GB - 60GB = 20GB. Static allocation per request = 8192
    tokens * 0.5MB = 4GB. Max static requests = 20GB / 4GB = 5 requests (often OOMs at 5 due to external
    fragmentation). With Paged Memory Management for avg 512 tokens: Actual KV memory per request = 512
    * 0.5MB = 256MB. New theoretical capacity = 20GB / 256MB = 80 concurrent requests.'
