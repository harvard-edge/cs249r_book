title: FlashAttention-2 Warp Partitioning Strategy
scenario: FlashAttention-1 splits work across warps by partitioning the K/V sequence dimension (each warp computes a partial sum for the same Q tokens). FlashAttention-2 changes to partitioning across the Q sequence dimension.
question: What synchronization overhead does FlashAttention-2 eliminate by partitioning across the Q sequence dimension, and what is the correct latency-savings range?
details:
  realistic_solution: 'Savings = baseline - optimized = 64μs - 5μs = 59μs lower bound (not 30μs). Range: 59-155μs.'
  common_mistake: |
    **The Pitfall:** Thinking warp partitioning is purely about load balancing compute.
    **The Rationale:** Partitioning over the K/V dimension requires a cross-warp reduction (shared memory atomics or syncthreads) to combine partial attention outputs.
    **The Consequence:** This creates a strict serialization bottleneck that prevents independent forward progress among warps on the GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline latency: 64 to 160 μs.
       - Optimized overhead: 5 μs.
    2. **Calculations:**
       - Lower bound savings: 64 - 5 = 59 μs.
       - Upper bound savings: 160 - 5 = 155 μs.
    3. **Conclusion & Interpretation:**
       - **Result: Serialization Bottleneck Avoided.** Net savings range is 59-155 μs, correcting the simple subtraction error logic.
