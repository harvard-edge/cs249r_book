title: GPipe Pipeline Bubble Fraction Analysis
scenario: A large transformer model is partitioned across 4 H100 SXM GPUs using simple
  GPipe pipeline parallelism with 4 microbatches. The team is also considering interleaved
  1F1B (One-Forward-One-Backward) scheduling and wants a head-to-head comparison
  for the same P=4, M=4 configuration.
question: Analyze the GPipe pipeline schedule and bubble fraction, then compare against
  interleaved 1F1B at the same P=4, M=4 configuration. Identify which scheduling
  policy improves bubble fraction (if any) and by how much.
visual:
  kind: svg
  path: cloud-4517.svg
  alt: A Gantt chart showing 4 GPUs processing 4 microbatches, illustrating the empty
    bubble gaps.
  caption: GPipe pipeline bubbles for 4 stages and 4 microbatches.
details:
  realistic_solution: 'GPipe bubble fraction = (P-1)/(M+P-1) = 3/7 = 42.8% with P=M=4.
    Interleaved 1F1B at the same P=4, M=4 has the same bubble fraction (P-1)/(M+P-1)
    because both must pay (P-1) stage delays at fill and at drain - 1F1B does NOT
    reduce bubble in the equal-microbatch case; it reduces ACTIVATION MEMORY (bounded
    by P instead of M). Interleaved 1F1B (Megatron-LM v2 style) further splits each
    stage into v interleaved chunks, dropping bubble to (P-1)/(v*M + P - 1). For
    v=2: 3/11 = 27.2% bubble - a significant reduction at the cost of 2x more pipeline bubbles
    per microbatch but smaller bubbles each.'
  common_mistake: Believing 1F1B reduces bubble fraction (it does not, in the equal-microbatch
    setting); only interleaved 1F1B with multiple chunks per stage reduces bubble,
    and at the cost of more pipeline communication.
  napkin_math: 'GPipe and 1F1B: 3/7 = 42.8% bubble; Interleaved 1F1B v=2: 3/11 =
    27.2% bubble; v=4: 3/19 = 15.8% bubble.'
