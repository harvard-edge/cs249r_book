title: GPipe Pipeline Bubble Fraction Analysis
scenario: A large transformer model is partitioned across 4 H100 SXM GPUs using simple
  GPipe pipeline parallelism with 4 microbatches.
question: Analyze the pipeline schedule and calculate the exact pipeline bubble fraction.
visual:
  kind: svg
  path: cloud-4517.svg
  alt: A Gantt chart showing 4 GPUs processing 4 microbatches, illustrating the empty
    bubble gaps.
  caption: GPipe pipeline bubbles for 4 stages and 4 microbatches.
details:
  realistic_solution: In GPipe, the pipeline must flush after the final microbatch
    completes. The bubble fraction is determined by the formula (P-1) / (M + P - 1)
    where P is the number of pipeline stages and M is the number of microbatches.
    Substituting P=4 and M=4 gives 3/7, meaning roughly 42.8% of compute capacity
    is wasted as bubble overhead.
  common_mistake: Confusing the pipeline efficiency formula M/(M+P-1) with the bubble
    fraction formula.
  napkin_math: Bubble = (4 - 1) / (4 + 4 - 1) = 3 / 7 = 42.8%
