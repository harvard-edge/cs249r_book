title: GPipe Pipeline Bubble Fraction Analysis
scenario: A large transformer model is partitioned across 4 GPUs using simple GPipe pipeline parallelism with 4 microbatches. The team is also considering interleaved 1F1B (One-Forward-One-Backward) scheduling and wants a head-to-head comparison for the same P=4, M=4 configuration.
question: Analyze the GPipe pipeline schedule and compare against interleaved 1F1B at P=4, M=4. Identify which scheduling policy improves bubble fraction and by how much.
visual:
  kind: svg
  path: cloud-4517.svg
  alt: A Gantt chart showing 4 GPUs processing 4 microbatches, illustrating the empty bubble gaps.
  caption: GPipe pipeline bubbles for 4 stages and 4 microbatches.
details:
  realistic_solution: 'Calculate the mathematical bubble fraction. For GPipe and default 1F1B, the bubble fraction is identically (P-1)/(M+P-1), proving 1F1B does not reduce pipeline idle time (it only reduces activation memory). To shrink the bubble, deploy Interleaved 1F1B (Megatron-LM style). By assigning multiple (v) smaller pipeline stage chunks to each GPU, the bubble fraction drops to (P-1)/(v*M + P - 1), significantly increasing hardware utilization at the cost of more frequent point-to-point network syncs.'
  common_mistake: |
    **The Pitfall:** Believing standard 1F1B reduces the pipeline bubble fraction compared to GPipe.
    **The Rationale:** 1F1B is famous in literature for being significantly more memory-efficient, leading to the false assumption that it is computationally more efficient as well.
    **The Consequence:** Misunderstanding that standard 1F1B merely bounds activation memory to P instead of M; the execution time remains identical unless *interleaved* chunks are applied.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Pipeline Stages (P) = 4.
       - Microbatches (M) = 4.
       - GPipe / Default 1F1B Eq: (P-1) / (M+P-1).
       - Interleaved Eq: (P-1) / (v*M + P - 1).
    2. **Calculations:**
       - GPipe & 1F1B Bubble: (4-1) / (4+4-1) = 3/7 = ~42.8% bubble.
       - Interleaved 1F1B (v=2 chunks): (4-1) / (2*4 + 4 - 1) = 3/11 = ~27.2% bubble.
       - Interleaved 1F1B (v=4 chunks): (4-1) / (4*4 + 4 - 1) = 3/19 = ~15.8% bubble.
    3. **Conclusion & Interpretation:**
       - **Interleaved 1F1B drops the bubble fraction from 42% to 27% (or lower), massively boosting utilization. Result: Pipeline-Bubble Bound.**
