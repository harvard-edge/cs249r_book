title: GPipe Pipeline Bubble Fraction Analysis
scenario: A large transformer model is partitioned across 4 H100 SXM GPUs using simple GPipe pipeline parallelism with 4 microbatches. The team is also considering interleaved 1F1B (One-Forward-One-Backward) scheduling and wants a head-to-head comparison for the same P=4, M=4 configuration.
question: Analyze the GPipe pipeline schedule and bubble fraction, then compare against interleaved 1F1B at the same P=4, M=4 configuration. Identify which scheduling policy improves bubble fraction (if any) and by how much.
visual:
  kind: svg
  path: cloud-4517.svg
  alt: A Gantt chart showing 4 GPUs processing 4 microbatches, illustrating the empty bubble gaps.
  caption: GPipe pipeline bubbles for 4 stages and 4 microbatches.
details:
  realistic_solution: 'GPipe bubble fraction = (P-1)/(M+P-1) = 3/7 = 42.8% with P=M=4. Interleaved 1F1B at the same P=4, M=4 has the same bubble fraction (P-1)/(M+P-1) because both must pay (P-1) stage delays at fill and at drain - 1F1B does NOT reduce bubble in the equal-microbatch case; it reduces ACTIVATION MEMORY (bounded by P instead of M). Interleaved 1F1B (Megatron-LM v2 style) further splits each stage into v interleaved chunks, dropping bubble to (P-1)/(v*M + P - 1). For v=2: 3/11 = 27.2% bubble - a significant reduction at the cost of 2x more pipeline bubbles per microbatch but smaller bubbles each.'
  common_mistake: |
    **The Pitfall:** Believing standard 1F1B reduces the pipeline bubble fraction compared to GPipe.
    **The Rationale:** 1F1B is famous for being more memory-efficient, leading to the false assumption that it also reduces idle time.
    **The Consequence:** Misunderstanding that 1F1B only reduces activation memory, whereas *interleaved* 1F1B is required to actually shrink the pipeline bubble fraction.
  napkin_math: |
    - **GPipe & Default 1F1B:** Bubble fraction = (P-1)/(M+P-1). For P=4, M=4: 3/7 = 42.8% bubble.
    - **Interleaved 1F1B (v=2):** Bubble fraction = (P-1)/(v*M + P - 1). For v=2: 3/11 = 27.2% bubble.
    - **Interleaved 1F1B (v=4):** For v=4: 3/19 = 15.8% bubble.
    - **Conclusion:** Interleaved 1F1B significantly reduces the bubble fraction at the cost of more frequent, smaller communication syncs.
