title: Flash Attention Backward Pass Memory Recomputation
scenario: During training a 13B model on H100 (80GB HBM3) with seq_len=16384, you notice that Flash Attention uses more FLOPs than standard attention during the backward pass. A colleague suggests reverting to standard attention for training to reduce compute.
question: Should you revert from Flash Attention to standard attention to reduce backward-pass FLOPs at seq_len=16384, and why?
details:
  realistic_solution: Flash Attention backward recomputes the attention matrix (2x FLOPs for backward vs forward), but this is the only way to train with long sequences. The FLOP overhead is ~1.1-1.3x vs standard attention backward, but the memory saving enables training at all. Use gradient checkpointing at layer boundaries to further reduce peak memory.
  common_mistake: |
    **The Pitfall:** Comparing only FLOPs without accounting for memory capacity constraints.
    **The Rationale:** Standard attention has fewer FLOPs in the backward pass, making it seem computationally cheaper on paper.
    **The Consequence:** At seq_len=16384, the N&times;N matrix is massive. Attempting standard attention will immediately result in an Out-Of-Memory (OOM) error, making training physically impossible.
  napkin_math: |
    - **Standard Attention Memory:** Stores softmax(QK^T) for backward = 16384^2 &times; 2 bytes = 536.8 MB (approx 512 MB per head).
    - **Total Standard Memory:** 13B model has 40 layers &times; 40 heads = 1600 heads. 1600 heads &times; 512 MB = **819,200 MB (&approx;819 GB)**.
    - **Conclusion for Standard:** 819 GB > 80 GB H100 capacity. Impossible.
    - **Flash Attention Memory:** Stores only Q, K, V, O. Each is 16384 &times; 128 &times; 2 bytes = 4 MB per head. Total per head = 16 MB.
    - **Total Flash Memory:** 1600 heads &times; 16 MB = **25,600 MB (&approx;25 GB)**. Fits within 80GB.
