title: Drift Alert Requirements For Embeddings
scenario: A team wants to monitor a retrieval model after moving from 256-dimensional to 384-dimensional embeddings. The service sees 2 million queries/day and has 12 traffic segments.
question: What drift-alert specification would distinguish a 256-to-384 embedding mismatch from normal seasonal traffic shifts across 12 segments?
details:
  realistic_solution: The spec should require segment-level embedding distribution metrics, retrieval-quality sentinels, and an index-version consistency check. A sudden similarity collapse immediately after deployment, especially with query vectors from v2 searched against a v1 index, indicates embedding-space mismatch. Seasonal shifts should move segment distributions gradually and should not correlate perfectly with index-version boundaries.
  common_mistake: |
    **The Pitfall:** Monitoring only aggregate metrics like Click-Through Rate (CTR).
    **The Rationale:** Teams rely on downstream business metrics rather than mechanistic ML metrics, missing the silent retrieval collapse caused by dimension mismatch.
    **The Consequence:** An embedding version mismatch between the query and index can silently destroy relevance for hours before aggregate business metrics trigger an alarm.
  napkin_math: |
    1. Total volume: 2,000,000 queries/day.
    2. Segments: 12 traffic segments.
    3. Average volume per segment: 2,000,000 / 12 ≈ 167,000 queries/segment/day.
    **167K queries is easily large enough to provide statistical significance for daily, segment-level distribution checks.**
