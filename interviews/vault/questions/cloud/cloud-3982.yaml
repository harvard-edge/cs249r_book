title: Drift Alert Requirements For Embeddings
scenario: A team wants to monitor a retrieval model after moving from 256-dimensional
  to 384-dimensional embeddings. The service sees 2 million queries/day and has 12
  traffic segments. Specify a drift alert that distinguishes embedding-space mismatch
  from normal seasonal traffic shifts.
question: What drift-alert specification would distinguish a 256-to-384 embedding
  mismatch from normal seasonal traffic shifts across 12 segments?
details:
  realistic_solution: The spec should require segment-level embedding distribution
    metrics, retrieval-quality sentinels, and an index-version consistency check.
    A sudden similarity collapse immediately after deployment, especially with query
    vectors from v2 searched against a v1 index, indicates embedding-space mismatch.
    Seasonal shifts should move segment distributions gradually and should not correlate
    perfectly with index-version boundaries.
  common_mistake: Monitoring only aggregate CTR and missing the mechanical mismatch
    between query embedding version and index embedding version.
  napkin_math: With 2M queries/day across 12 segments, average volume is about 167K
    queries/segment/day, enough for daily segment-level drift and retrieval-quality
    checks.
