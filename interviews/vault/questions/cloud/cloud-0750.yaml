title: The Spot Instance Checkpoint Strategy
scenario: You're training a 7B model on 8x H100 spot instances on AWS. Spot instances cost $8/hr (vs $25/hr on-demand) but can be preempted with a 2-minute warning. Your training run takes 72 hours. Checkpointing takes 3 minutes and pauses training.
question: How often should you checkpoint to minimize wasted time, and what's the expected cost savings?
details:
  realistic_solution: 'This is a classic cost-optimization problem. The optimal checkpoint interval balances the cost of checkpointing (paused training) against the expected cost of lost work (time since last checkpoint when preemption occurs). AWS spot interruption rate for GPU instances is roughly 5-10% per hour. The optimal interval minimizes: $\text{checkpoint overhead} + \text{expected lost work}$.'
  common_mistake: |
    **The Pitfall:** "Checkpoint every step" or "Checkpoint every hour like on-demand."
    **The Rationale:** Candidates often apply arbitrary thresholds without optimizing for the specific statistical likelihood of interruption.
    **The Consequence:** Too frequent checkpointing wastes expensive compute on I/O; too infrequent risks losing hours of work, destroying the economic advantage of spot instances.
  napkin_math: |
    - **Spot interruption probability:** ~5%/hr.
    - **Checkpoint cost (C):** 3 min = 0.05 hr.
    - **Interval (T):** Checkpoints per 72 hr = 72/T. Total overhead = 72/T × 0.05 hr = 3.6/T.
    - **Expected preemptions:** 72 hr × 0.05 = 3.6 events.
    - **Expected lost work per preemption:** T/2 hours (uniform distribution). Total lost work = 3.6 × T/2 = 1.8T.
    - **Minimize wasted time:** f(T) = 3.6/T + 1.8T. Derivative f'(T) = -3.6/T² + 1.8 = 0.
    - **Optimal Interval (T):** T² = 2, so T = √2 ≈ 1.41 hours (~85 minutes).
    - **Cost comparison:** On-demand: 72 × $25 = $1,800.
    - **Spot effective time:** 72 + (72/1.41 × 0.05) + (1.8 × 1.41) ≈ 77.1 hours.
    - **Spot cost: 77.1 × $8 = $617 (66% savings).**
