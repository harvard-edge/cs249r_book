title: The Spot Instance Checkpoint Strategy
scenario: You're training a 7B model on 8× H100 spot instances on AWS. Spot instances cost \$8/hr (vs
  \$25/hr on-demand) but can be preempted with a 2-minute warning. Your training run takes 72 hours. Checkpointing
  takes 3 minutes and pauses training. How often should you checkpoint, and what's the expected cost savings?
details:
  realistic_solution: 'This is a classic cost-optimization problem. The optimal checkpoint interval balances
    the cost of checkpointing (paused training) against the expected cost of lost work (time since last
    checkpoint when preemption occurs). AWS spot interruption rate for GPU instances is roughly 5-10%
    per hour. The optimal interval minimizes: $\text{checkpoint overhead} + \text{expected lost work}$.'
  common_mistake: '"Checkpoint every step to minimize lost work" or "Checkpoint every hour like on-demand."
    Too frequent checkpointing wastes compute on I/O; too infrequent risks losing hours of work.'
  napkin_math: 'Spot interruption probability: ~5%/hr. Checkpoint cost: 3 min pause = 0.05 hr. If checkpoint
    interval = $T$ hours: checkpoints per 72 hr = $72/T$. Total checkpoint overhead = $72/T \times 0.05\text{
    hr}$. Expected preemptions in 72 hr: $72 \times 0.05 = 3.6$ events. Expected lost work per preemption:
    $T/2$ hours (uniform distribution). Total expected lost work: $3.6 \times T/2 = 1.8T$ hours. Total
    wasted time: $f(T) = 3.6/T + 1.8T$. Minimize: $f''(T) = -3.6/T^2 + 1.8 = 0 \Rightarrow T = \sqrt{2}
    \approx 1.4$ hours. Optimal: checkpoint every ~85 minutes. Cost comparison: On-demand: $72 \times
    \$25 = \$1,800$. Spot with optimal checkpointing: effective training time = $72 + 72/1.4 \times 0.05
    + 1.8 \times 1.4 \approx 77.1$ hours. Cost = $77.1 \times \$8 = \$617$. Savings: 66%.'
