title: 'Kernel Fusion: Design a Fused Attention Kernel for H100'
scenario: You are designing a custom fused attention kernel. The attention layer for a 70B model processes sequences of length 4096 with 64 heads and head dimension 128.
question: For the 4096x64x128 attention layer, how large are Q, K, V and the full score matrix, and why is FlashAttention tiling mandatory?
details:
  realistic_solution: "Q,K,V tensor sizes depend on sequence length, number of heads, and head dimension. For typical LLM configurations, Q,K,V are in the MB range per layer per batch element."
  common_mistake: |
    **The Pitfall:** Ignoring the O(n\u00b2) attention matrix memory footprint.
    **The Rationale:** Assuming that if Q, K, and V fit, the computation can just proceed directly without tiling.
    **The Consequence:** The $S \times S$ intermediate matrix massively overflows the GPU SRAM, severely degrading performance by forcing trips to HBM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length: 4096. Heads: 64. Head dimension: 128.
    - Precision: FP16/BF16 (2 bytes per element).
    - SRAM cache is highly constrained (e.g., ~50 MB L2, much smaller shared memory).

    **Calculations:**
    - Q, K, V Tensors: 4096 \times 64 \times 128 \times 2 Bytes = 67.1 MB (64 MiB) each.
    - Full Attention Matrix (per head): 4096 \times 4096 \times 2 Bytes = 33.5 MB.
    - Total Attention Matrix (all heads): 33.5 MB \times 64 heads = 2.14 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.14 GB matrix (SRAM-Capacity-Bound)**. A 2.14 GB matrix cannot fit in SRAM. Tiling is mandatory to execute within fast memory without catastrophic HBM spilling.
