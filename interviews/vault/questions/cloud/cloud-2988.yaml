title: 'Kernel Fusion: Design a Fused Attention Kernel for H100'
scenario: You are designing a custom fused attention kernel for H100 (80GB HBM3, 3.35 TB/s, 989 TFLOPS BF16). The attention layer for a 70B model processes sequences of length 4096 with 64 heads and head dimension 128.
question: For the 4096x64x128 attention layer, how large are Q, K, V and the full score matrix, and why is FlashAttention tiling mandatory?
details:
  realistic_solution: "Q,K,V tensor sizes depend on sequence length, number of heads, and head dimension. For typical LLM configurations, Q,K,V are in the MB range per layer per batch element."
  common_mistake: |
    **The Pitfall:** Ignoring the O(n²) attention matrix memory footprint.
    **The Rationale:** Assuming that if Q, K, and V fit, the computation can just proceed directly without tiling.
    **The Consequence:** The $S \times S$ intermediate matrix massively overflows the GPU SRAM, severely degrading performance by forcing trips to HBM.
  napkin_math: |
    *   **Q, K, V Tensors:** Each requires seq_len × heads × head_dim × 2B = 4096 × 64 × 128 × 2 Bytes = 67.1 MB (64 MiB).
    *   **Full Attention Matrix (per head):** $S \times S$ = $4096 \times 4096 \times 2B$ = 33.5 MB per head.
    *   **Total Attention Matrix:** 33.5 MB × 64 heads = **2.14 GB**.
    *   **SRAM Capacity:** H100 has 50 MB of L2 cache and much smaller shared memory per SM.
    *   **Conclusion:** A 2.14 GB matrix fundamentally cannot fit in SRAM. **Tiling is mandatory** to execute the operation within fast memory.
