title: 'DiLoCo: Distributed Low-Communication Training'
scenario: Google's DiLoCo protocol trains LLMs with extremely infrequent synchronization where each worker trains independently for H=500 inner steps, then workers synchronize by communicating pseudo-gradients.
question: How does DiLoCo with H=500 compare with synchronous AllReduce for a 70B model on 256 GPUs in communication, time, and convergence?
details:
  realistic_solution: 'DiLoCo uses 500x less communication bandwidth by amortizing the AllReduce cost. Sync every H=500 steps using an outer optimizer on pseudo-gradients. Synchronous AllReduce is communication-bound, while DiLoCo is compute-bound. Even though DiLoCo requires 15% more steps to reach target loss, the faster step time yields a 2x wall-clock speedup.'
  common_mistake: |
    **The Pitfall:** Assuming DiLoCo is just gradient accumulation with K=500.
    **The Rationale:** Engineers conflate it with Local SGD, missing that DiLoCo uses an outer optimizer on pseudo-gradients.
    **The Consequence:** Underestimating convergence capabilities and misconfiguring optimization steps.
  napkin_math: |
    **Assumptions & Constraints:**
    - AllReduce comm time per step: 700ms.
    - DiLoCo amortizes comm over H=500 steps.
    - DiLoCo requires 15% more steps for convergence.

    **Calculations:**
    - DiLoCo amortized comm time: 700ms / 500 = 1.4ms.
    - AllReduce total time (100K steps): 100K * 700ms = 19.4 hours.
    - DiLoCo total time (115K steps, ~301ms/step): 115K * 301.4ms = 9.6 hours.

    **Conclusion & Interpretation:**
    - **Result: DiLoCo provides ~2x wall-clock speedup by removing the communication bottleneck.**
