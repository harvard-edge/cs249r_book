title: 'DiLoCo: Distributed Low-Communication Training'
scenario: Google's DiLoCo protocol trains LLMs with extremely infrequent synchronization where each worker trains independently for H=500 inner steps, then workers synchronize by communicating pseudo-gradients (the difference between current and initial weights).
question: How does DiLoCo with H=500 compare with synchronous AllReduce for a 70B model on 256 MI300X GPUs in communication, time, and convergence?
details:
  realistic_solution: 'DiLoCo communication analysis: Sync every H=500 steps. Per sync: pseudo-gradient = w_current - w_initial = 70B params × 2 bytes FP16 = 140GB AllReduce. Time per sync: 2 × 255/256 × 140GB / (50GB/s × 8 rails) = 700ms. Amortized per step: 700ms/500 = 1.4ms. Synchronous AllReduce (every step): gradient = 70B × 2 bytes = 140GB. Time per step: 2 × 255/256 × 140GB / 400GB/s = 700ms. Communication ratio: DiLoCo uses 500× less communication bandwidth. Wall-clock per step: AllReduce (with overlap): max(300ms compute, 700ms comm) = 700ms — communication-bound. DiLoCo: 300ms compute + 1.4ms amortized sync = 301.4ms — compute-bound. Speedup: 700/301.4 = 2.32× faster per step. Convergence: DiLoCo papers show 1.0-1.3× more total steps to reach the same loss compared to synchronous SGD for 70B-class models. Effective speedup: 2.32/1.15 = 2.02× faster wall-clock to target loss. DiLoCo is transformative for clusters with slow interconnects (cloud spot instances, cross-datacenter training) where communication cost dominates.'
  common_mistake: |
    **The Pitfall:** Assuming DiLoCo is just gradient accumulation with K=500.
    **The Rationale:** Engineers conflate it with Local SGD, missing that DiLoCo uses an outer optimizer on pseudo-gradients.
    **The Consequence:** Underestimating the convergence capabilities and misconfiguring the optimization steps.
  napkin_math: |
    1. AllReduce comm time per step: 700ms.
    2. DiLoCo amortized comm time (H=500): 700ms / 500 = 1.4ms (500x reduction).
    3. Total training time (AllReduce to 100K steps): 100K * 700ms = 19.4 hours.
    4. Total training time (DiLoCo to 115K steps): 115K * 301.4ms = 9.6 hours.
    **Final Result: DiLoCo yields a ~2x wall-clock speedup despite requiring 15% more steps.**
