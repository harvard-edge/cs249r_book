title: The 70B Parameter Litmus Test
scenario: A team wants to serve a 70 billion parameter language model for inference. Explain how you would
  calculate its memory footprint in FP16 precision and determine if it fits onto a single NVIDIA H100
  GPU.
details:
  realistic_solution: Each parameter in FP16 precision requires 2 bytes of storage. To calculate the total
    memory required for the model weights, you multiply the number of parameters by the size of each parameter.
    This calculation does not include the KV cache or temporary activation memory, but it's the baseline
    for just loading the model. In this case, 70 billion parameters multiplied by 2 bytes/parameter equals
    140 GB. This exceeds the 80 GB of HBM3 memory available on a single H100 GPU, so the model will not
    fit without being sharded or compressed.
  common_mistake: Engineers often forget the bytes-per-parameter for a given precision. A common error
    is to assume 1 byte per parameter (like INT8), or to confuse the inference memory footprint with the
    much larger training memory footprint which includes optimizer states.
  napkin_math: 70,000,000,000 parameters × 2 bytes/parameter = 140,000,000,000 bytes = 140 GB. Since 140
    GB > 80 GB, it will not fit.
  options:
  - 70 GB, so it fits with 10 GB to spare.
  - 1120 GB, so it does not fit.
  - 140 GB, so it does not fit.
  - 280 GB, so it does not fit.
  correct_index: 2
