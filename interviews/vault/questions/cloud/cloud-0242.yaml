title: The 70B Parameter Litmus Test
scenario: A team wants to serve a 70 billion parameter language model for inference.
question: How much memory do the FP16 weights of a 70B parameter model require, and does it fit on a single 80 GB NVIDIA H100?
details:
  realistic_solution: Each parameter in FP16 precision requires 2 bytes of storage. To calculate the total memory required for the model weights, you multiply the number of parameters by the size of each parameter. This calculation does not include the KV cache or temporary activation memory, but it's the baseline for just loading the model. In this case, 70 billion parameters multiplied by 2 bytes/parameter equals 140 GB. This exceeds the 80 GB of HBM3 memory available on a single H100 GPU, so the model will not fit without being sharded or compressed.
  common_mistake: |
    **The Pitfall:** Miscalculating the bytes-per-parameter for a given precision.
    **The Rationale:** Candidates mistakenly assume 1 byte per parameter (confusing FP16 with INT8) or fail to separate training memory (optimizer states) from inference memory.
    **The Consequence:** Models are deployed to undersized hardware, resulting in immediate Out-of-Memory (OOM) failures.
  napkin_math: |
    * **Parameter Count:** 70,000,000,000 parameters.
    * **Precision:** FP16 requires 2 bytes per parameter.
    * **Total Memory:** 70 billion × 2 bytes = 140 billion bytes = 140 GB.
    * **Conclusion:** 140 GB is greater than 80 GB, so it **will not fit** on a single H100.
  options:
  - 70 GB, so it fits with 10 GB to spare.
  - 1120 GB, so it does not fit.
  - 140 GB, so it does not fit.
  - 280 GB, so it does not fit.
  correct_index: 2
