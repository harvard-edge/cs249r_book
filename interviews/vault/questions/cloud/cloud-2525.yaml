title: Cloud Transient Failures L2 0
scenario: During a large-scale training run on 512 GPUs, one GPU produces an NaN gradient in iteration 4,721 but works fine on retry.
question: What are transient failures, and why do they become routine in a 512-GPU training run?
details:
  realistic_solution: Transient failures are temporary hardware errors like cosmic rays flipping bits. At massive scale, the sheer volume of FLOPs makes these probabilistically routine.
  common_mistake: |
    **The Pitfall:** Assuming ECC protects against all transient errors.
    **The Rationale:** Candidates know ECC covers DRAM but forget it does not cover ALUs or tensor cores.
    **The Consequence:** Silent gradient corruption due to bit flips during matrix multiplication.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 512 GPUs at 989 TFLOPS. Error rate 1e-21.
    2. **Calculations:**
       - Single GPU MTBF = 1e21 / 9.89e14 = 11.7 days.
       - Cluster MTBF = 11.7 days / 512 = 33 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: At scale, transient errors occur every ~33 minutes.**
