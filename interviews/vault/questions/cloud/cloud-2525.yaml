title: Cloud Transient Failures L2 0
scenario: During a large-scale training run on 512 GPUs, one GPU produces an NaN gradient in iteration
  4,721 but works fine on retry. Your interviewer asks you to explain transient failures and why they
  matter more at scale.
details:
  realistic_solution: 'Transient failures are temporary hardware errors — cosmic rays flipping bits (single-event
    upsets), voltage fluctuations, or thermal noise causing incorrect computation without permanent damage.
    They differ from hard failures (dead GPU) because the hardware still works. At scale they matter due
    to probability: if one GPU has a transient error rate of 1 per 1e21 FLOPs, across 512 GPUs running
    at peak, you expect an error every ~32 minutes. ECC memory catches most, but compute errors in tensor
    cores are often unprotected, silently corrupting gradients.'
  common_mistake: Assuming ECC protects against all transient errors. ECC covers memory (DRAM) but not
    compute units (ALUs, tensor cores). A bit flip during matrix multiplication produces a silently wrong
    result.
  napkin_math: 'Single GPU transient rate: ~1 error per 1e21 FLOPs. H100 at 989 TFLOPS (9.89e14 FLOPs/sec):
    1e21 / 9.89e14 ≈ 1e6 seconds ≈ 11.5 days. With 512 GPUs: 1 error per 11.5/512 days ≈ 32 minutes. At
    scale, transient errors are routine, not rare.'
