title: TP + DP Hybrid Parallelism Layout
scenario: 'You have 32 H100 GPUs across 4 nodes (8 GPUs per node). You want to train a 70B model with TP=8 and DP=4.'
question: 'How should TP and DP process groups be laid out, and where does each type of communication occur?'
details:
  realistic_solution: 'Layout: Node 0: GPUs [0-7] = TP group 0 (data-parallel rank 0). Node 1: GPUs [8-15] = TP group 1 (DP rank 1). Node 2: GPUs [16-23] = TP group 2 (DP rank 2). Node 3: GPUs [24-31] = TP group 3 (DP rank 3). TP communication (AllReduce per layer): happens within each node over NVLink (900 GB/s per GPU). DP communication (gradient AllReduce): GPU 0 communicates with GPUs 8, 16, 24; GPU 1 with GPUs 9, 17, 25; etc. This crosses nodes over InfiniBand (400 Gbps per node). DP gradient AllReduce happens once per training step, sending each GPU''s local gradient shard.'
  common_mistake: |
    **The Pitfall:** Placing TP groups across nodes instead of intra-node.
    **The Rationale:** Candidates fail to realize that TP requires frequent synchronization (every layer), whereas DP requires infrequent synchronization (once per step).
    **The Consequence:** Communication bottleneck over slower inter-node interconnects, drastically reducing training throughput.
  napkin_math: |
    - **TP Groups:** 4 groups of 8 GPUs (intra-node).
    - **DP Groups:** 8 groups of 4 GPUs (inter-node).
    - **Message Size:** Total parameters / 8 × 2 bytes = 70B / 8 × 2 = 17.5 GB.
    - **AllReduce Time:** 17.5 GB × 2 × 0.75 / 50 GB/s = **525 ms (overlapped with backward pass)**.
