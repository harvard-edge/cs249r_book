title: Evaluating Gang Scheduling vs. Elastic Training Tradeoffs
scenario: Your team must choose between strict gang scheduling (Volcano) and elastic
  distributed training (PyTorch Elastic / torchrun with `--nnodes=4:8`) for a shared
  H100 cluster running week-long LLM fine-tunes. The cluster has 128 H100 GPUs across
  16 nodes and experiences 5% node failure rate per week. Evaluate which approach
  yields higher cluster utilization and training throughput under these conditions.
question: For week-long fine-tunes on the 128-H100 cluster with a 5% weekly node failure
  rate, should you use Volcano gang scheduling or elastic training, and why?
details:
  realistic_solution: With 5% weekly failure rate across 16 nodes, the probability
    of at least one failure during a 7-day run is 1 − (0.95)^16 ≈ 56%. Gang scheduling
    means a coin-flip chance of full restart. Elastic training with `--nnodes=4:8`
    lets the job continue on 7 nodes after a failure, accepting a ~12.5% throughput
    drop. For long runs, elastic training amortizes checkpoint overhead and maintains
    forward progress. Prefer elastic for week-long jobs; reserve gang scheduling for
    short (<4 hr) jobs where setup overhead dominates.
  common_mistake: Defaulting to gang scheduling because it is simpler to configure;
    failing to account for the compounding effect of node failures on gang jobs —
    a single node failure in a 16-node gang causes full job restart, wasting all accumulated
    gradient steps.
  napkin_math: 'Gang restart cost: checkpoint save at 70 GB/s NVMe × 140 GB model
    = 2 s write + 10 s barrier + relaunch = ~60 s overhead per restart. With 56% restart
    probability over 7 days, expected wasted time = 0.56 × 60 s = 33.6 s — negligible.
    But if a restart causes 30 min of re-computation before next checkpoint, expected
    waste = 0.56 × 30 min = 16.8 min/week, vs. elastic''s 0-restart, 12.5% throughput
    loss = 12.5% × 7 days = 21 hr of equivalent lost compute. Gang wins on short jobs;
    elastic wins on long ones.'
