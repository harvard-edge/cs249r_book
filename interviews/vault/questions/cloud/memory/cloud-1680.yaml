title: KV Cache Fragmentation Bottleneck
scenario: You are deploying a 30B parameter LLM on a single GPU. The current serving engine uses static contiguous memory allocation for the KV cache, reserving memory for the maximum sequence length (8192 tokens) upfront for every request. You observe that the server OOMs when concurrent requests exceed 4, even though the average actual request sequence length is only 512 tokens. Assume the KV cache requires 0.5MB per token.
question: "What is causing the OOMs above 4 requests, and what concurrency should 16-token paged KV allocation support?"
details:
  realistic_solution: Diagnose the issue as internal memory fragmentation caused by over-allocation. Static allocation wastes memory on unused tokens up to the max length. Paged Memory Management (e.g. vLLM) dynamically allocates memory in non-contiguous blocks, perfectly fitting the actual sequence length and eliminating fragmentation, dramatically increasing max batch size.
  common_mistake: |
    **The Pitfall:** Proposing model compression techniques (like quantization) instead of fixing memory management.
    **The Rationale:** Candidates assume the OOM is due to raw model weight size, completely missing the catastrophic internal fragmentation caused by static pre-allocation.
    **The Consequence:** The team wastes time degrading model quality via quantization, only to gain a marginal bump of 1 or 2 batch slots.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total GPU memory: 80 GB.
       - Model weights: ~60 GB.
       - Static allocation: 8192 tokens/request.
       - Average actual sequence: 512 tokens/request.
       - KV cache size: 0.5 MB/token.
    2. **Calculations:**
       - Available memory for KV cache: 80 GB - 60 GB = 20 GB.
       - Static allocation cost per request: 8192 * 0.5 MB = 4 GB.
       - Max static requests: 20 GB / 4 GB = 5 requests.
       - Paged Memory cost for average sequence: 512 * 0.5 MB = 256 MB.
       - New theoretical concurrency limit: 20 GB / 256 MB = 80 requests.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Fragmentation.** Paged KV cache allocation dynamically fits actual sequence lengths, dramatically increasing serving capacity from 5 concurrent requests to 80.
