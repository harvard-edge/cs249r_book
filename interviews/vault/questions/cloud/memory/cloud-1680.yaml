title: KV Cache Fragmentation Bottleneck
scenario: You are deploying a 30B parameter LLM on a single 80GB GPU. Model weights use about 60GB, leaving about 20GB for KV cache. The current serving engine uses static contiguous memory allocation for the KV cache, reserving memory for the maximum sequence length (8192 tokens) upfront for every request. You observe that the server OOMs when trying to serve a 5th concurrent request, even though the average actual request sequence length is only 512 tokens. Assume the KV cache requires 0.5MB per token.
question: What is causing the OOMs above 4 requests, and what concurrency should 16-token paged KV allocation support?
details:
  realistic_solution: Diagnose the issue as internal memory fragmentation caused by over-allocation. Static allocation reserves 8192 tokens, or 4GB, per request, so a 20GB KV budget is exhausted at the 5th request. With 16-token paged KV allocation and 512-token average sequences, each request uses 32 pages, or 256MB, so the same KV budget supports about 80 concurrent average-length requests before other overheads or compute limits dominate.
  common_mistake: |
    **The Pitfall:** Proposing model compression techniques (like quantization) instead of fixing memory management.
    **The Rationale:** Candidates assume the OOM is due to raw model weight size, completely missing the catastrophic internal fragmentation caused by static pre-allocation.
    **The Consequence:** The team wastes time degrading model quality via quantization, only to gain a marginal bump of 1 or 2 batch slots.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total GPU memory: 80 GB.
       - Model weights: ~60 GB.
       - Static allocation: 8192 tokens/request.
       - Average actual sequence: 512 tokens/request.
       - KV cache size: 0.5 MB/token.
    2. **Calculations:**
       - Available memory for KV cache: 80 GB - 60 GB = 20 GB.
       - Static allocation cost per request: 8192 * 0.5 MB = 4 GB.
       - Max static requests: 20 GB / 4 GB = 5 requests.
       - 16-token pages per average request: ceil(512 / 16) = 32 pages.
       - Paged Memory cost for average sequence: 32 * 16 tokens * 0.5 MB = 256 MB.
       - New theoretical concurrency limit: 20 GB / 256 MB = 80 requests.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Fragmentation.** Static allocation explains OOM on the 5th request; 16-token paged KV allocation raises the average-length concurrency limit to about 80 requests.
