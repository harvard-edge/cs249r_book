title: 'HBM3 vs DDR5 Bandwidth Comparison'
scenario: 'You are comparing an HBM3-based accelerator (1024-bit bus, 4 stacks, 6.4 Gbps/pin) against a hypothetical design using DDR5 (64-bit bus, 6.4 Gbps/pin).'
question: 'How many DDR5 channels would be required to match the total memory bandwidth of the HBM3 design?'
details:
  realistic_solution: 'HBM3 total bandwidth: 1024 bits × 6.4 Gbps / 8 = 819.2 GB/s per stack × 4 stacks = 3276.8 GB/s ≈ 3.35 TB/s. DDR5 per channel: 64 bits × 6.4 Gbps / 8 = 51.2 GB/s. Channels needed: 3276.8 / 51.2 = 64 DDR5 channels. This is physically impractical — each channel needs its own traces, pins, and DIMM slots, illustrating why TSVs are essential for AI accelerators.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by the number of HBM stacks or confusing bits with bytes.
    **The Rationale:** Candidates calculate the bandwidth of a single HBM stack or forget to divide by 8 when moving from Gbps to GB/s.
    **The Consequence:** Underestimating the massive bandwidth advantage of HBM and failing to articulate why Through Silicon Vias (TSVs) are physically necessary for modern AI accelerators.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM3: 1024-bit bus, 4 stacks, 6.4 Gbps/pin.
    - DDR5: 64-bit bus, 6.4 Gbps/pin.

    **Calculations:**
    - HBM3 Bandwidth per stack: 1024 * 6.4 / 8 = 819.2 GB/s.
    - Total HBM3: 819.2 * 4 = 3,276.8 GB/s.
    - DDR5 per Channel: 64 * 6.4 / 8 = 51.2 GB/s.
    - Channels Needed: 3276.8 / 51.2 = 64.

    **Conclusion & Interpretation:**
    - **Result: 64 DDR5 channels (Memory-Bound)**. 64 DDR5 channels are required to match HBM3.
