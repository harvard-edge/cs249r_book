title: PagedAttention vs GQA for KV Bottlenecks
scenario: You are deploying a 70B parameter Multi-Head Attention (MHA) LLM (80 layers, 8192 hidden size) on an 8x A100 80GB node. FP16 weights consume ~140GB, leaving ~500GB for the KV cache. The target context length is 4096 tokens.
question: Should you prioritize PagedAttention or an 8x-KV-head GQA model to maximize 4096-token decoding throughput, and why?
details:
  realistic_solution: Prioritize migrating to a GQA architecture if model changes are available. PagedAttention is still valuable for reducing fragmentation and improving realized concurrency, but it does not change the bytes of KV state per token. Under a memory-limited 4096-token serving assumption, MHA fits about 46 sequences in the 500GB KV budget, while 8x-KV-head GQA fits about 372. Treat that as a memory-capacity proxy for throughput, not a guaranteed end-to-end speedup, because decode compute and attention bandwidth can still become limiting.
  common_mistake: |
    **The Pitfall:** Assuming that advanced memory management like PagedAttention solves the core decoding bottleneck.
    **The Rationale:** Engineers focus on fragmentation rather than the massive memory bandwidth and capacity footprint of an MHA KV cache.
    **The Consequence:** Missing out on the structural 8x improvement provided by GQA, leading to sub-optimal serving throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory budget for KV Cache: 500 GB.
    - Context length: 4096 tokens.
    - MHA KV Cache size: 8192 hidden * 80 layers * 2 (K,V) * 2 bytes = 2,621,440 bytes/token ≈ 2.62 MB decimal.
    - GQA reduction factor: 8x.

    **Calculations:**
    - MHA KV per sequence: 2,621,440 bytes/token * 4096 tokens = 10,737,418,240 bytes ≈ 10.74 GB.
    - Max MHA batch size with ideal packing: 500 GB / 10.74 GB ≈ 46 sequences.
    - PagedAttention mainly recovers allocator fragmentation; if fragmentation wastes 30% of KV memory, it can move realized MHA capacity from about 32 sequences (350 GB / 10.74 GB) toward the 46-sequence ideal, but it does not multiply throughput by 1.3 by itself.
    - GQA KV per sequence: 10.74 GB / 8 ≈ 1.34 GB.
    - Max GQA batch size: 500 GB / 1.34 GB ≈ 372 sequences.

    **Conclusion & Interpretation:**
    - **Result: Prefer GQA for memory-limited concurrency.** PagedAttention improves packing efficiency, while GQA structurally shrinks KV cache bytes by 8x; the batch-capacity gain is large, but end-to-end throughput depends on whether serving remains KV-memory-bound.
