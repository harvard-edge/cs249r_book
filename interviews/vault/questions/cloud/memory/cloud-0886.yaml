title: PagedAttention vs GQA for KV Bottlenecks
scenario: 'You are deploying a 70B parameter Multi-Head Attention (MHA) LLM (80 layers, 8192 hidden size) on an 8x A100 80GB node. FP16 weights consume ~140GB, leaving ~500GB for the KV cache. The target context length is 4096 tokens.'
question: Should you prioritize PagedAttention or an 8x-KV-head GQA model to maximize 4096-token decoding throughput, and why?
details:
  realistic_solution: 'Prioritize migrating to a GQA architecture. While PagedAttention reclaims ~30% fragmented memory (raising max MHA batch size from 48 to 63), GQA fundamentally shrinks the KV cache footprint by 8x, unlocking batch sizes up to ~390 — a 6x improvement over PagedAttention alone. GQA delivers massively higher total serving throughput.'
  common_mistake: 'Assuming that advanced memory management like PagedAttention solves the core decoding bottleneck, without realizing it only addresses fragmentation (a constant-factor improvement) rather than the massive memory bandwidth and capacity footprint of an MHA KV cache (a structural 8x improvement with GQA).'
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory budget for KV Cache: 500 GB.
    - Context length: 4096 tokens.
    - MHA KV Cache size: 8192 hidden * 80 layers * 2 (K,V) * 2 bytes = 2.62 MB/token.
    - GQA reduction factor: 8x.
    
    **Calculations:**
    - MHA KV per sequence: 2.62 MB * 4096 = 10.7 GB.
    - Max MHA batch size: 500 GB / 10.7 GB ≈ 46.
    - Max MHA batch with PagedAttention (+30% efficiency): 46 * 1.3 ≈ 60.
    - GQA KV per sequence: 10.7 GB / 8 = 1.34 GB.
    - Max GQA batch size: 500 GB / 1.34 GB ≈ 373.
    
    **Conclusion & Interpretation:**
    - **Result: >6x Throughput via GQA (Memory-Capacity Bound)**. While PagedAttention reclaims constant-factor fragmented memory, shifting to GQA structurally shrinks the footprint by 8x, unlocking massive batch sizes.
