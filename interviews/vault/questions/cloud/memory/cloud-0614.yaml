title: The Prompt Caching Optimization
scenario: Every request to our customer-support 70B LLM starts with the same 2,000-token system prompt. We are serving 1,000 requests/minute on 4x H100 GPUs. An engineer suggests prefix caching the system prompt's KV-cache.
question: Quantify the compute and memory savings of caching the system prompt, and justify if it is worth the engineering effort.
details:
  realistic_solution: 'Caching the system prompt''s KV-cache provides two savings: compute (skip the 2,000-token prefill) and memory (store one copy instead of one per concurrent request). The compute savings overwhelmingly dominate at high QPS, freeing up massive GPU capacity.'
  common_mistake: |
    **The Pitfall:** Dismissing prompt caching because it "only saves a little memory."
    **The Rationale:** Candidates fail to realize that the system prompt prefill is the most compute-heavy phase and its KV-cache is duplicated across all concurrent requests.
    **The Consequence:** Wasting massive amounts of compute and memory, forcing unnecessary GPU scaling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B parameters (80 layers, 8 kv_heads, 128 head_dim, FP16).
       - Prompt: 2,000 tokens.
       - Load: 1,000 req/min (~16.7 req/s), roughly 33 concurrent requests.
    2. **Calculations:**
       - KV Cache per Token = 2 (K+V) * 80 (layers) * 8 (kv_heads) * 128 (head_dim) * 2 bytes = 327,680 bytes ≈ 320 KiB.
       - System Prompt KV Cache = 2,000 * 320 KiB = 640 MiB.
       - Memory duplicated without cache = 33 concurrent * 640 MiB ≈ 21.1 GiB.
       - Compute load without cache = 16.7 req/s * 280 TFLOPs = ~4,676 TFLOPS.
    3. **Conclusion & Interpretation:** **Prompt caching frees 20.5 GiB of memory and saves ~4,676 TFLOPS of compute, effectively freeing ~4.7 H100s worth of prefill capacity.**
