title: INT8 KV Cache Per-Tensor Quantization Failure
scenario: 'To reduce serving costs, you implement INT8 KV cache quantization on a 13B LLM, cutting KV cache memory from 40GB to 20GB. You use standard per-tensor symmetric quantization. The model''s perplexity degrades drastically, and it begins repeating phrases endlessly. The weights remain in FP16.'
question: 'Why does per-tensor INT8 KV cache quantization break the 13B LLM, and what quantization scheme would preserve quality?'
details:
  realistic_solution: |
    The degradation is caused by massive outlier activations in specific hidden channels of the LLM. In large language models, a few feature dimensions consistently exhibit magnitudes up to 100x larger than the rest. With per-tensor symmetric quantization, the quantization scale factor is determined by the absolute maximum value in the entire tensor. The outliers force a very large scale factor, which crushes the normal activations (which are close to zero) into a single INT8 bin (zero). This destroys the representational capacity of the attention keys/values. The architectural fix is to use per-channel (or per-token) quantization, or apply techniques like SmoothQuant to migrate the quantization difficulty from activations to weights.
  common_mistake: |
    **The Pitfall:** Assuming INT8 simply lacks the precision for the attention mechanism and moving to a 16-bit format is strictly required.
    **The Rationale:** When a quantized model outputs gibberish, the immediate assumption is that the data type is too small.
    **The Consequence:** Giving up on highly efficient INT8 quantization rather than implementing per-channel quantization or SmoothQuant to handle outlier activations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Let max outlier = 127.0. INT8 range is [-127, 127].
    - Normal activation value = 0.4.

    **Calculations:**
    - Scale factor S = 127 / 127 = 1.0.
    - Quantized normal value = round(0.4 / 1.0) = 0.

    **Conclusion & Interpretation:**
    - **Result: Zeroed Normal Features (Outlier Saturation)**. All normal features are effectively erased, leaving only the outlier channels to drive attention, which completely breaks the LLM.
