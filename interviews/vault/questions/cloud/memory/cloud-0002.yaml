title: The KV-Cache Memory Hog
scenario: 'An LLM with 80 layers is processing a single inference request with a context (sequence length) of 100,000 tokens. Each token''s state is represented by Key and Value vectors totaling 32KB per layer.'
question: 'What is the approximate VRAM consumed by the KV cache for this single request?'
details:
  realistic_solution: 'The KV-cache stores the Key and Value vectors for every token in the sequence at every layer of the model. This allows the model to attend to previous tokens without re-computing their states. The total size is the memory per token per layer, multiplied by the number of layers and the number of tokens.'
  common_mistake: |
    **The Pitfall:** Order-of-magnitude errors or forgetting to multiply by the number of layers.
    **The Rationale:** Candidates often calculate the memory for a single layer or misplace the decimal when converting from KB to GB.
    **The Consequence:** Grossly underestimating memory requirements, leading to OOM errors during deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers.
    - 100,000 tokens context length.
    - KV cache size: 32 KB (32,768 bytes) per token per layer.

    **Calculations:**
    - Memory per token across all layers: 32,768 bytes/layer * 80 layers = 2,621,440 bytes (~2.5 GiB per 1,000 tokens).
    - Total KV cache size: 2,621,440 bytes/token * 100,000 tokens = 262,144,000,000 bytes.
    - Convert to GiB: 262,144,000,000 / (1024^3) = 244.14 GiB.

    **Conclusion & Interpretation:**
    - **Result: Total KV cache requires ~244 GiB (Memory-Bound)**.
  options:
  - '~2.56 GiB'
  - '~32 GiB'
  - '~244 GiB'
  - '~2.56 MiB'
