title: Estimating Prefix Caching Savings
scenario: 'You are serving Llama-3-70B (80 layers, 8 KV heads, 128 head dimension, FP16 precision) on a cluster. You are processing a batch of 256 concurrent requests, all of which share the exact same 2048-token system prompt.'
question: 'How much KV cache memory is saved when 256 requests share the same 2048-token system prompt via prefix caching?'
details:
  realistic_solution: 'Calculate the per-token KV cache size, multiply by the system prompt length to find the size per request, and then multiply by (Batch Size - 1) to find the redundant memory that is saved. This drastically reduces VRAM requirements.'
  common_mistake: |
    **The Pitfall:** Using the number of Query heads instead of KV heads, forgetting to multiply by the number of layers, or failing to subtract the 1 copy of the prompt that must be kept.
    **The Rationale:** Group Query Attention (GQA) means KV heads != Query heads. Caching calculations require precise accounting of all dimensions.
    **The Consequence:** Drastically overestimating or underestimating the memory savings from prefix caching, leading to incorrect batch size configurations and OOMs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers, 8 KV heads, 128 head dim, FP16 (2 bytes).
    - 256 requests, 2048-token shared prompt.

    **Calculations:**
    - Bytes per Token (per layer): 2 (K+V) * 8 heads * 128 dim * 2 bytes = 4,096 bytes (4 KiB).
    - Total per Token: 4 KiB * 80 layers = 320 KiB.
    - Prompt Size: 320 KiB * 2048 tokens = 640 MiB.
    - Redundant Copies: 256 requests - 1 kept copy = 255 copies.
    - Total Savings: 255 * 640 MiB = 163,200 MiB ≈ 159.3 GiB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Prefix caching saves ~159 GiB of VRAM across the cluster.
