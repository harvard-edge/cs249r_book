title: CPU Offload vs Gradient Accumulation
scenario: You are training a 5B parameter model on a single A100 and experiencing OOM due to memory pressure from Adam optimizer states and activations. You must evaluate two architectures to resolve this. Architecture A offloads 40GB of Adam optimizer states to the host CPU over PCIe Gen5 x16, maintaining a large micro-batch size. Architecture B keeps all states on the GPU but uses Gradient Accumulation (4 micro-batches) to reduce activation memory by 30GB, which drops arithmetic intensity below the A100's ridge point of 156 FLOPs/Byte and adds a 300ms compute penalty per global step.
question: Which architecture provides higher training throughput?
details:
  realistic_solution: Architecture B (Gradient Accumulation) is the better choice. CPU offloading requires transferring FP16 gradients to the CPU and updated FP16 weights back to the GPU every step. Even with PCIe Gen5, this data movement creates a transfer bottleneck that is strictly slower than the compute degradation penalty incurred by running smaller micro-batches in Architecture B.
  common_mistake: |
    **The Pitfall:** Blindly choosing CPU offloading to preserve GPU arithmetic intensity.
    **The Rationale:** Believing that maintaining high GPU utilization supersedes all other bottlenecks.
    **The Consequence:** Severe training slowdowns because the PCIe transfer latency completely overshadows the compute gains from higher arithmetic intensity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 5B parameters.
       - PCIe Gen5 x16 bidirectional bandwidth: 32 GB/s.
       - Gradients (FP16): 10GB. Updated weights (FP16): 10GB.
       - Arch B compute penalty: 0.3s per step.
    2. **Calculations:**
       - Arch A (CPU Offload) transfer time: (10 GB / 32 GB/s) + (10 GB / 32 GB/s) = 0.3125s + 0.3125s = 0.625 seconds.
       - Arch B (Gradient Accumulation) penalty: 0.3 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: PCIe-Bound (Arch A).** Gradient accumulation (Arch B) is strictly faster because the 0.625s PCIe transfer bottleneck is significantly worse than the 0.3s compute degradation.
