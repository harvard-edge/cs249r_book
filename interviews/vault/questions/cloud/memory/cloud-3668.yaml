title: Tensor Parallelism Activation Memory and Recomputation
scenario: 'Training a 30B model with TP=4 runs OOM at batch_size=16 with seq_len=2048. Memory profiling at batch_size=8 shows 60GB used per GPU: 15GB for model weights plus 45GB for activations.'
question: How would you fit batch_size=32 for the 30B TP=4 training run when activation memory is causing OOM?
details:
  realistic_solution: |
    Enable Sequence Parallelism (SP) alongside TP. SP splits activations along the sequence dimension across TP ranks, reducing activation memory by the TP factor. At TP=SP=4, activation memory for batch=8 drops from 45GB to 11.25GB. For batch_size=32, activation memory scales to 45GB. Total memory: 15GB weights + 45GB activations = 60GB, safely fitting within the 80GB limit.
  common_mistake: |
    **The Pitfall:** Increasing TP degree to TP=8 to reduce memory.
    **The Rationale:** Engineers assume TP inherently reduces activation memory proportionally, ignoring that standard TP duplicates activations on all ranks.
    **The Consequence:** The model still OOMs while incurring massive communication overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B model, TP=4.
       - Weights = 15GB per GPU.
       - Activations without SP (batch=8) = 45GB.
    2. **Calculations:**
       - With Sequence Parallelism (SP=4), activations per GPU = 45GB / 4 = 11.25GB.
       - Scale to batch=32 (4x increase): Activations = 11.25GB * 4 = 45GB.
       - Total memory at batch=32 = 15GB (weights) + 45GB (activations) = 60GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound**. The total memory footprint of 60GB safely fits within the 80GB limit when using Sequence Parallelism.
