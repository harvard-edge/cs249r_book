title: Sequence Parallelism for Tensor-Parallel Activation Memory
scenario: 'Training a 30B model with TP=4 targets batch_size=32 at seq_len=2048, but standard TP would OOM because activations are replicated. Memory profiling at batch_size=8 shows 60GB used per GPU: 15GB for model weights plus 45GB for activations.'
question: How would you fit batch_size=32 for the 30B TP=4 training run when activation memory is causing OOM?
details:
  realistic_solution: |
    Enable Sequence Parallelism (SP) alongside TP. The 45GB activation profile is for batch_size=8 without SP; assume activation memory scales linearly with batch for this estimate. SP splits the sequence-parallel activations across the 4 TP ranks, so batch=8 activation memory drops from 45GB to about 11.25GB per GPU. Scaling from batch=8 to batch=32 then raises the SP-reduced activation footprint to 45GB per GPU. Total memory is 15GB weights + 45GB activations = 60GB, leaving about 20GB on an 80GB GPU for optimizer/runtime overhead, attention/KV workspaces, fragmentation, and any recomputation buffers. Validate the margin with activation checkpointing settings enabled.
  common_mistake: |
    **The Pitfall:** Increasing TP degree to TP=8 to reduce memory.
    **The Rationale:** Engineers assume TP inherently reduces activation memory proportionally, ignoring that standard TP duplicates activations on all ranks.
    **The Consequence:** The model still OOMs while incurring massive communication overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B model, TP=4.
       - Weights = 15GB per GPU.
       - Activations without SP at batch=8 = 45GB per GPU.
       - Activation memory scales approximately linearly with batch size, and SP reduces sequence-parallel activation tensors by TP=4.
    2. **Calculations:**
       - With Sequence Parallelism (SP=4), batch=8 activations per GPU = 45GB / 4 = 11.25GB.
       - Scale to batch=32 (4x increase): Activations = 11.25GB * 4 = 45GB.
       - Total memory at batch=32 = 15GB (weights) + 45GB (activations) = 60GB.
       - Remaining margin on an 80GB GPU = 80GB - 60GB = 20GB for non-sharded activations, attention/KV workspaces, optimizer/runtime buffers, and fragmentation.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound**. The estimated 60GB footprint fits within the 80GB limit when using Sequence Parallelism, with a 20GB margin that should be preserved for overhead and checkpointing choices.
