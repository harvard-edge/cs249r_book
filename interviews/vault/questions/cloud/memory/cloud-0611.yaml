title: The Cache Line Waste
scenario: You have a tensor of shape `[1024, 3]` stored in row-major (C-contiguous) FP32 format. You iterate over it column-by-column (reading all 1024 elements of column 0, then column 1, etc.). The CPU cache line is 64 bytes.
question: 'What fraction of each cache line fetch is wasted, and how does this compare to row-major iteration?'
details:
  realistic_solution: 'In row-major layout, consecutive elements of a row are contiguous in memory. The entire tensor spans 192 cache lines. When you iterate column-wise, you sweep through the memory 3 separate times (once for each column). This means you fetch each of the 192 cache lines 3 times, transferring a total of 36 KB. By contrast, row-major iteration sweeps through the memory exactly once, fetching each cache line 1 time for a total of 12 KB. Therefore, column iteration wastes 66.7% of the fetched memory bandwidth, downloading exactly 3 times more data.'
  common_mistake: |
    **The Pitfall:** Thinking cache lines don't matter or miscalculating the waste by assuming lines are skipped.
    **The Rationale:** Because the row size (12 bytes) is smaller than the cache line (64 bytes), every single cache line is loaded into memory exactly 3 times.
    **The Consequence:** Underestimating the devastating memory bandwidth penalty of non-contiguous access patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor Size: 1024 * 3 * 4 bytes = 12,288 bytes = 192 cache lines.
    - CPU cache line is 64 bytes.

    **Calculations:**
    - Row-Major Read: Iterating sequentially reads each of the 192 cache lines exactly once (12 KB total).
    - Column-Major Read: Iterating 3 columns touches every cache line 3 times. 192 * 3 = 576 cache lines fetched (36 KB total).
    - Comparison: Column-wise reads exactly 3.0x more data from memory.
    - Waste Fraction: (36 KB - 12 KB) / 36 KB = 66.7%.

    **Conclusion & Interpretation:**
    - **Result: 66.7% (Memory-Bandwidth-Bound)**. 66.7% of fetched bytes are wasted.
