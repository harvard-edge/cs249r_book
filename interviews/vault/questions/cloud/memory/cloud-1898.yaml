title: Evaluating Memory Costs of Skip Connections
scenario: 'Your team is fine-tuning a 152-layer ResNet-style visual encoder on GPUs (24GB VRAM) using a batch size of 128. Standard feed-forward networks of similar parameter count fit, but this model throws OOM errors during the backward pass.'
question: "Why do dense skip connections cause OOM during the backward pass on 24GB GPUs, and how would you preserve gradient flow?"
details:
  realistic_solution: 'Implement activation checkpointing (gradient checkpointing) across segments of residual blocks. This discards intermediate activations and recomputes them during the backward pass, trading ~20-30% extra compute for a drastic reduction in peak memory.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the computational overhead of the addition operation in skip connections.
    **The Rationale:** Candidates fail to recognize that the identity path forces initial input activations to stay alive in memory.
    **The Consequence:** Missing the primary driver of peak memory usage and failing to recommend gradient checkpointing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - VRAM available: 24 GB.
       - Feature map: 64x64x256 FP16. Batch size 128. 50 blocks.
    2. **Calculations:**
       - Memory per feature map: 128 × 64 × 64 × 256 × 2 bytes = 268 MB.
       - Skip connection behavior: The 268 MB input is pinned in VRAM until the addition at the end of the block.
       - Pinned activations total: 50 blocks × 268 MB = 13.4 GB.
    3. **Conclusion & Interpretation:**
       **Result: Memory Bound. Across 50 blocks, pinned activations alone consume >13 GB of VRAM, causing the OOM.**
