title: Evaluating Memory Costs of Skip Connections
scenario: Your team is fine-tuning a 152-layer ResNet-style visual encoder on GPUs (24GB VRAM) using a batch size of 128. Standard feed-forward networks of similar parameter count fit, but this model throws OOM errors during the backward pass.
question: Why can residual blocks cause OOM during the backward pass on 24GB GPUs, and how would you preserve gradient flow?
details:
  realistic_solution: Residual connections preserve gradient flow by providing an identity path around each block, so gradients can propagate even when the learned branch is poorly conditioned. The OOM comes from retaining large activations needed by backward, not from the addition itself. Use activation checkpointing across residual segments, smaller batches, or other activation-memory reductions so the identity-path benefit remains while fewer intermediate tensors are kept live.
  common_mistake: |
    **The Pitfall:** Focusing solely on the computational overhead of the addition operation in skip connections.
    **The Rationale:** Candidates recognize that residual paths help gradients, but miss that backward still needs saved activations from many large blocks.
    **The Consequence:** Missing the primary driver of peak memory usage and failing to combine residual connections with checkpointing or smaller activation footprints.
  napkin_math: |
    **Assumptions & Constraints:**
    - VRAM available: 24 GB.
    - Representative activation: 64x64x256 FP16, batch size 128.
    - Many residual blocks require saved tensors for backward unless checkpointed.

    **Calculations:**
    - One activation tensor: 128 × 64 × 64 × 256 × 2 bytes = 268,435,456 bytes ≈ 256 MiB.
    - Retaining tens of such activations can consume many GiB before parameters, gradients, optimizer state, workspaces, and dataloader buffers.
    - Checkpointing stores only segment boundaries and recomputes interiors, trading extra compute for much lower peak activation memory.

    **Conclusion & Interpretation:**
    - **Result: Residual connections preserve gradient flow, while activation retention drives OOM (Memory-Capacity Bound)**. Use checkpointing or smaller batches to keep the gradient path without keeping every large intermediate live.
