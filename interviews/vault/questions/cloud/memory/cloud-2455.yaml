title: KV Cache PCIe Offloading
scenario: To support long-context chat sessions (up to 100K tokens) on an 8x GPU node, you frequently hit KV cache OOM errors. You propose offloading inactive KV cache blocks to the host CPU's DDR5 RAM over PCIe Gen5 x16, fetching them back to the GPU only when the user sends a follow-up message.
question: How would you design CPU KV-cache offload for 100K-token sessions, and what latency tradeoff must you manage?
details:
  realistic_solution: |
    The tradeoff here is between GPU memory capacity (supporting larger context/more users) and the latency penalty of PCIe bandwidth limits. PCIe Gen5 x16 is roughly 64 GB/s theoretical, but practical sustained transfer bandwidth is often closer to 50 GB/s after overheads and contention. Fetching a large KV cache from CPU to GPU will bottleneck prefill/decode if the needed blocks are not hidden via asynchronous prefetching. The solution requires block-granular offload and predictive swap-in: when a request arrives at the router, the system should trigger asynchronous DMA for the needed KV blocks before scheduling compute. If the entire cache is fetched synchronously, TTFT will be dominated by PCIe transfer time rather than compute.
  common_mistake: |
    **The Pitfall:** Offloading synchronously during the attention computation phase.
    **The Rationale:** Candidates often assume PCIe bandwidth is fast enough to not impact the decode latency and fail to architect an asynchronous prefetcher.
    **The Consequence:** Severe degradation of Time To First Token (TTFT) due to blocking data transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV cache size for 100K tokens (70B model, FP16): 327,680 bytes/token ≈ 320 KiB/token (2 K/V tensors * 8 KV heads * 128 head_dim * 80 layers * 2 bytes).
    - PCIe Gen5 x16 practical bandwidth = ~50 GB/s.

    **Calculations:**
    - Total size = 327,680 bytes * 100,000 = ~32.77 GB.
    - Synchronous full-cache transfer time = 32.77 GB / 50 GB/s = 655 ms.
    - Using the 64 GB/s theoretical link rate would still be ~512 ms, so the conclusion is unchanged.

    **Conclusion & Interpretation:**
    - **Result: PCIe Bandwidth Bottleneck for Synchronous Full-Cache Fetch.** A full 100K-token cache fetch costs about 655ms at practical bandwidth. Block-level async prefetch can hide or avoid part of that cost when only the active working set is needed.
