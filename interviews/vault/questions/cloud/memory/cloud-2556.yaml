title: Cloud Zero Optimizations L3 0
scenario: You want to train a 30B parameter model using AdamW on 8 GPUs, each with 80GB of memory.
question: "For a 30B AdamW model on 8 GPUs, what is per-GPU memory under ZeRO Stages 1, 2, and 3, and which stage is the minimum needed to fit?"
details:
  realistic_solution: '30B params. Per-param memory FP16 params = 2B, FP16 gradients = 2B, AdamW optimizer states (FP32 copy + momentum + variance) = 12B. Total = 16 bytes/param * 30B = 480 GB. ZeRO-1 (partition OS): params 60 GB + grads 60 GB + OS 360/8 = 165 GB per GPU. Too large. ZeRO-2 (partition OS+G): params 60 GB + (grads+OS)/8 = 112.5 GB. Too large. ZeRO-3 (partition all): 480/8 = 60 GB per GPU. Fits in 80 GB with 20 GB for activations. Need ZeRO-3 minimum.'
  common_mistake: |
    **The Pitfall:** Forgetting that optimizer states dominate memory consumption during training.
    **The Rationale:** Candidates calculate memory purely based on model weights (2 bytes/param for FP16), missing the massive overhead of AdamW momentum and variance.
    **The Consequence:** The training job OOMs instantly because the cluster is drastically under-provisioned for the required 12 bytes/param optimizer footprint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 30B parameters.
       - Memory per parameter: FP16 Weight (2B) + FP16 Grad (2B) + AdamW States (12B) = 16 bytes/param.
       - GPU memory: 80GB per GPU.
    2. **Calculations:**
       - Total memory needed: 30B * 16 bytes = 480 GB.
       - ZeRO-1 (Partitions OS): Weights (60) + Grads (60) + OS (360 / 8) = 165 GB/GPU (OOM).
       - ZeRO-2 (Partitions OS + Grads): Weights (60) + Grads (60 / 8) + OS (360 / 8) = 112.5 GB/GPU (OOM).
       - ZeRO-3 (Partitions All): Total (480 / 8) = 60 GB/GPU.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Distribution.** ZeRO-3 requires 60 GB per GPU, easily fitting into the 80 GB limit with 20 GB remaining for activations.
