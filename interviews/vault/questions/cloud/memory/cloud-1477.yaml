title: Diagnosing Output Degradation in INT8 KV Cache
scenario: You deploy a Llama-2-70B model on an 8x A100 cluster using vLLM. To double your concurrent request capacity from 64 to 128, you enable naive INT8 per-tensor KV cache quantization. While the memory savings are realized, users report that after generating ~500 tokens, the model's output abruptly degrades into infinite repetitive loops and gibberish. The FP16 baseline does not exhibit this.
question: "What is the root cause of this failure?"
details:
  realistic_solution: 'Diagnose that large LLMs exhibit massive, systematic outlier channels in their Key vectors. Naive per-tensor INT8 quantization clips these outliers, destroying the attention score distribution and causing the model to attend to wrong tokens. The fix is mixed-precision KV cache: keep the top 1% outlier Key channels in FP16 while quantizing the remaining 99% to INT8. This restores full FP16 accuracy while retaining ~99% of the memory savings.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing KV cache degradation as a context window or scaling bug.
    **The Rationale:** Output loops usually implicate RoPE scaling or temperature misconfigurations.
    **The Consequence:** Wasting time tuning sampling parameters without profiling the underlying quantized KV cache value distributions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-2-70B KV cache footprint, naive INT8 vs Mixed-Precision (1% FP16).

    **Calculations:**
    - FP16 cache per sequence = 2.68 GB. INT8 cache = 1.34 GB.
    - Top 1% in FP16 = 0.01 * 1.34 GB = ~13.4 MB overhead per request.

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound.** Keeping outlier channels in FP16 restores quality for a negligible 13.4 MB cost per request.
