title: 'MI300X vs A100: VRAM Capacity Advantage for Long-Context Serving'
scenario: 'A legal AI application requires serving a 13B FP16 model with 128K context length. KV cache per token per layer is: 2 x num_heads x head_dim x 2 bytes = 2 x 40 x 128 x 2 = 20.5KB per token per layer. The model has 40 layers.'
question: For the 13B model at 128K context, how large is one request's KV cache, and how many requests fit on 80GB vs 192GB GPUs?
details:
  realistic_solution: |
    The 20.5KB figure is per token per layer. Across 40 layers, KV cache is 20.5KB * 40 = 820KB per token, or about 0.801MiB. For a 128K-token context, one request needs 820KB * 128,000 = 104,960,000KB, which is about 105GB in decimal units or about 100GiB. The 13B FP16 weights require about 26GB. An 80GB GPU has about 54GB left for KV cache, so it cannot fit one full 128K request. A 192GB GPU has about 166GB left, so it fits floor(166 / 105) = 1 full request, with limited headroom for runtime overhead.
  common_mistake: |
    **The Pitfall:** Calculating KV cache for a single layer.
    **The Rationale:** Candidates forget that the KV cache must be stored across all Transformer layers, not just one.
    **The Consequence:** The candidate underestimates memory requirements by 40x and promises the client that a standard 80GB GPU can serve the 128K context.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model weights size: 26 GB.
    - KV cache per token: 20.5 KB per layer.

    **Calculations:**
    - Total KV per token across all layers: 20.5 KB/layer * 40 layers = 820 KB/token.
    - Total KV per 128K request: 820 KB/token * 128,000 tokens = 104,960,000 KB = 104.96 GB decimal, about 100.1 GiB.
    - 80GB GPU: 80 GB - 26 GB = 54 GB available (< 105 GB).
    - 192GB GPU: 192 GB - 26 GB = 166 GB available.

    **Conclusion & Interpretation:**
    - **Result: 1 full 128K request on the 192GB GPU and 0 on the 80GB GPU.** The key is keeping per-layer KB, all-layer KB/token, and per-request GB units separate.
