title: Dataflow Trade-offs for Cloud Accelerators
scenario: 'You are evaluating the dataflow mapping for a new cloud AI accelerator featuring a 128x128 systolic array and 32MB of global SRAM, targeting high-resolution vision and generative models. External HBM access costs 200pJ per word, while SRAM access costs 5pJ, and a local MAC operation costs 1pJ. You must choose between Output Stationary (OS) or Weight Stationary (WS) dataflow for layers generating massive numbers of partial sums.'
question: 'Should the accelerator use Output Stationary or Weight Stationary dataflow for layers with many partial sums, and why?'
details:
  realistic_solution: 'Adopt an Output Stationary dataflow for layers with high partial sum counts. Pining the accumulator locally eliminates the expensive read-modify-write cycles to HBM, drastically outperforming Weight Stationary.'
  common_mistake: |
    **The Pitfall:** Assuming Weight Stationary is universally optimal for inference simply because weights are static.
    **The Rationale:** Loading weights is expensive, so keeping them in the systolic array seems obvious.
    **The Consequence:** A severe energy penalty and thermal bottleneck from repeatedly transferring intermediate partial sums to and from off-chip HBM memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM access: 200pJ/word.
    - SRAM access: 5pJ/word.
    - Partial sums target: 1,000,000 operations.

    **Calculations:**
    - Weight Stationary (spilling to HBM): 200pJ (write) + 200pJ (read) = 400pJ/sum. Total = 400 μJ.
    - Output Stationary (SRAM local): 5pJ (read) + 5pJ (write) = 10pJ/sum. Total = 10 μJ.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound**. Output Stationary yields a 40x reduction in accumulation energy for high-partial-sum layers.
