title: Evaluating KV Cache Allocators for Variable Sequences
scenario: You are designing the inference engine for a multi-tenant LLM API using 4x H100 80GB GPUs (320GB total HBM). The workload features highly variable sequence lengths, ranging from 100-token chat replies to 8,000-token document summaries. Your current contiguous memory allocator reports 30% free KV cache capacity (approx. 45GB), yet new requests requiring only 2GB of KV cache are being rejected with OOM errors.
question: "Should you use compacting garbage collection or PagedAttention-style allocation to fix KV cache fragmentation, and why?"
details:
  realistic_solution: Adopt a paged allocation strategy using fixed-size blocks (e.g., 16 or 32 tokens). This completely eliminates external fragmentation by allowing non-contiguous physical blocks to back logically contiguous sequences, replacing large external fragmentation with minimal internal fragmentation.
  common_mistake: |
    **The Pitfall:** Proposing memory compaction (like in standard OS heaps).
    **The Rationale:** Candidates apply general-purpose OS memory management concepts to GPUs without realizing that moving KV cache tensors synchronously blocks the GPU compute stream.
    **The Consequence:** Severe latency spikes and jitter added to active generations, violating SLAs.
  napkin_math: |
    - With a contiguous allocator, a 30% external fragmentation rate on a 150GB KV cache pool wastes 45GB.
    - With PagedAttention (block size = 16 tokens), external fragmentation is 0%.
    - Internal fragmentation is at most 15 tokens per request.
    - For 256 concurrent requests, $256 \times 15$ tokens = 3,840 tokens wasted.
    - Assuming 1 token KV = ~1MB, total waste is ~3.8GB.
    - **PagedAttention reduces wasted memory from 45GB (30%) to ~3.8GB (2.5%).**
