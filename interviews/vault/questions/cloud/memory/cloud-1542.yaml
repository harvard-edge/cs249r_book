title: Diagnosing Low Compute Utilization in Autoregressive Generation
scenario: You are profiling a 1.5B parameter language model performing autoregressive generation (batch size 1) on a single GPU. The profiler shows GPU compute utilization hovering around 5%, but memory bandwidth utilization is consistently near 90%.
question: 'How do you analyze this bottleneck and what should be the actual optimization strategy?'
details:
  realistic_solution: 'Diagnose the workload as strictly memory-bandwidth bound due to the low arithmetic intensity of batch=1 generation. TFLOP upgrades will provide zero benefit. The correct strategy is to reduce memory traffic via weight quantization (e.g., INT8/INT4) or increase arithmetic intensity by processing larger batch sizes concurrently.'
  common_mistake: |
    **The Pitfall:** Assuming low compute utilization implies a CPU bottleneck or inefficient kernels.
    **The Rationale:** Engineers mistakenly recommend increased compute capacity (e.g., upgrading to an H100) or structural sparsity to reduce FLOPs.
    **The Consequence:** Capital is wasted on hardware upgrades that provide zero performance benefit because the workload is memory-bandwidth bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1.5B FP16 parameters = 3 GB.
    - GPU bandwidth 2000 GB/s, compute 312 TFLOP/s.

    **Calculations:**
    - Memory Time: 3 GB / 2000 GB/s = 1.5 ms per token.
    - Compute Needed: ~3 GFLOPs.
    - Compute Time: 3 GFLOPs / 312,000 GFLOP/s = 0.0096 ms.
    - Arithmetic Intensity: 1 FLOP/byte.

    **Conclusion & Interpretation:**
    - **Result: 1 FLOP/byte (Memory-Bandwidth-Bound)**. At 1 FLOP/byte, the workload is heavily memory-bound, optimizations must target memory traffic or batch size.
