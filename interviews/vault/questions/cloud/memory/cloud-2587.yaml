title: RLHF VRAM Budgeting for PPO Versus DPO on a 70B Model
scenario: You are setting up infrastructure for RLHF on a 70B model.
question: For 70B RLHF, which setup should you choose among colocated PPO, separate generation/training clusters, and DPO, and why?
details:
  realistic_solution: Colocated PPO keeps policy, critic, reference, and reward models in the same serving/training footprint. Counting model state before sharding, policy and critic each need training state while reference and reward are frozen, for about 2,520 GB total. Separate generation and training clusters do not eliminate that total model-state budget, but they let the frozen reference/reward rollout capacity and the policy/critic training capacity scale independently, which usually improves utilization and isolation. DPO needs only a trainable policy and frozen reference, about 1,260 GB before sharding, and avoids the critic and reward-model serving path. Choose DPO when its objective is acceptable; choose separate PPO clusters when PPO is required for quality or online preference optimization; avoid colocated PPO unless operational simplicity matters more than utilization.
  common_mistake: |
    **The Pitfall:** Defaulting to PPO-based RLHF without considering DPO alternatives.
    **The Rationale:** Teams follow the original PPO paradigm because it's well-known, assuming it's strictly necessary for alignment.
    **The Consequence:** This requires hosting reward and critic models, doubling the memory footprint and introducing massive orchestration complexity for negligible quality gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 70B parameters.
    - PPO colocated footprint counts 4 models: trainable Policy and Critic, frozen Reference and Reward.
    - Separate PPO clusters split rollout and training capacity but still need the same model families.
    - DPO footprint counts 2 models: trainable Policy and frozen Reference.
    - Model-state memory before sharding: ~16 bytes/param for trainable Adam-style state, 2 bytes/param for frozen FP16 weights.

    **Calculations:**
    - PPO colocated model state: 70B * (16 [Policy train] + 16 [Critic train] + 2 [Ref frozen] + 2 [Reward frozen]) bytes = 70B * 36 = 2,520 GB.
    - PPO separate clusters: training cluster holds Policy + Critic = 70B * 32 = 2,240 GB; rollout/eval cluster holds Reference + Reward = 70B * 4 = 280 GB.
    - DPO model state: 70B * (16 [Policy train] + 2 [Ref frozen]) bytes = 70B * 18 = 1,260 GB.
    - Raw 80GB-GPU equivalents before activation/KV overhead: PPO colocated 2,520/80 = 31.5; DPO 1,260/80 = 15.75.

    **Conclusion & Interpretation:**
    - **Result: Memory and Orchestration Tradeoff**. DPO cuts the raw model-state footprint by 50% versus colocated PPO, but final GPU counts require sharding plus activation, KV-cache, optimizer, and throughput headroom.
