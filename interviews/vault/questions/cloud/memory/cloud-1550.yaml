title: Sizing GPU Clusters for DLRM Embeddings
scenario: 'You are designing the inference infrastructure for a Deep Learning Recommendation Model (DLRM). The model''s embedding tables contain 10 billion entries, with each entry mapped to a 128-dimensional FP16 vector. Dense layers and activations require a fixed 50GB combined.'
question: 'How many A100 80GB GPUs are minimally required to serve the 10B-entry DLRM embeddings plus the 50GB overhead?'
details:
  realistic_solution: 'Calculate the raw size of the embedding tables by multiplying the number of entries, vector dimension, and bytes per element. Add the baseline overhead, then divide the total required memory by the per-GPU VRAM capacity to determine the distributed tensor parallelism width.'
  common_mistake: |
    **The Pitfall:** Failing to account for the byte size of the data type (FP16 = 2 bytes) or over-indexing on FLOPs instead of memory.
    **The Rationale:** Habitual focus on compute rather than pure capacity scaling for recommender systems.
    **The Consequence:** Provisioning exactly half the required VRAM, causing catastrophic Out-Of-Memory errors on deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Embeddings: 10B entries, 128 dimensions, FP16 (2 bytes).
       - Overhead: 50GB fixed.
       - Hardware: A100 80GB VRAM.
    2. **Calculations:**
       - Embedding Elements: 10e9 × 128 = 1.28 trillion elements.
       - Embedding Size: 1.28e12 × 2 bytes = 2.56 TB (2,560 GB).
       - Total VRAM Needed: 2,560 GB + 50 GB = 2,610 GB.
       - Min GPUs Required: ceil(2,610 GB / 80 GB) = 33 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. The model requires exactly 33 A100 80GB GPUs to fit the embedding tables in memory.**
