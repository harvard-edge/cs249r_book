title: TPU v5e Activation Checkpointing Strategy for Large Language Models
scenario: You are designing the training pipeline for a massive Mixture-of-Experts (MoE) Large Language Model with 100 billion parameters on Google TPU v5e pods. Each TPU v5e chip has 16 GB HBM and delivers 197 TFLOPS BF16. The model's forward pass memory consumption for activations alone exceeds the 16 GB HBM capacity per chip.
question: How would you incorporate activation checkpointing for a 100B-parameter MoE on TPU v5e when activations exceed 16 GB HBM per chip?
details:
  realistic_solution: A realistic solution involves a layered approach. First, profile per-chip activation peaks by attention block, router, all-to-all, and expert FFN. Apply selective activation checkpointing to the groups that push a chip over 16 GB HBM, especially boundaries before and after sparse expert layers, while keeping cheap boundary tensors and routing metadata resident. For MoE models, checkpoint expert inputs/outputs rather than every expert intermediate when possible, because only the active experts for each token need replay. Combine this with tensor/expert/data parallel sharding for weights, optimizer state, and communication buffers, and tune the checkpoint schedule from measured recompute cost instead of using a uniform policy.
  common_mistake: |
    **The Pitfall:** Applying a naive, uniform checkpointing strategy across all layers.
    **The Rationale:** Candidates often forget that different activation types (attention vs. FFN) have varying memory footprints and re-computation costs.
    **The Consequence:** Unnecessary slowdowns during training caused by suboptimal checkpoint-restore overheads that degrade training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e has 16 GB HBM per chip, shared by activations, local weight shards, optimizer/gradient shards, and communication buffers.
    - Let an MoE layer group retain A GB of activations without checkpointing and B GB of boundary tensors with checkpointing.
    - Checkpointing is useful only where B plus non-activation state fits under the per-chip budget.
    - During backward, the checkpointed group replays its forward computation once for the active token routes.

    **Calculations:**
    - Activation memory saved for one checkpointed group = A - B.
    - If profiling shows a group would retain A = 20 GB and its boundary tensors are B = 8 GB, checkpointing saves 12 GB for that group.
    - The group then fits only if 8 GB plus local shards and buffers is below 16 GB; otherwise more aggressive sharding/offload is still required.
    - Runtime overhead is roughly one extra forward replay for each checkpointed group during backward, weighted by the active MoE routes rather than all experts.

    **Conclusion & Interpretation:**
    - **Result: checkpoint groups where A - B is large enough to bring the per-chip peak under 16 GB after local shards and buffers.** Checkpointing can reduce activation peaks, but the full MoE training plan still needs sharding or parallelism for weights, optimizer state, gradients, and collectives.
