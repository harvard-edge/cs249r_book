title: TPU v5e Activation Checkpointing Strategy for Large Language Models
scenario: You are designing the training pipeline for a massive Mixture-of-Experts (MoE) Large Language Model with 100 billion parameters on Google TPU v5e pods. Each TPU v5e chip has 16 GB HBM and delivers 197 TFLOPS BF16. The model's forward pass memory consumption for activations alone exceeds the 16 GB HBM capacity per chip.
question: How would you incorporate activation checkpointing for a 100B-parameter MoE on TPU v5e when activations exceed 16 GB HBM per chip?
details:
  realistic_solution: A realistic solution involves a layered approach. First, analyze the model's activation memory profile to identify critical layers contributing most to memory usage. Implement selective activation checkpointing, prioritizing layers with high memory footprints and lower re-computation costs. For MoE models, consider checkpointing before and after the sparse expert layers. Utilize a dynamic schedule to balance memory savings against re-computation overhead.
  common_mistake: |
    **The Pitfall:** Applying a naive, uniform checkpointing strategy across all layers.
    **The Rationale:** Candidates often forget that different activation types (attention vs. FFN) have varying memory footprints and re-computation costs.
    **The Consequence:** Unnecessary slowdowns during training caused by suboptimal checkpoint-restore overheads that degrade training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - A layer group takes 10ms in the forward pass and would retain 20GB of activations.
    - Checkpointing stores only boundary tensors, reducing retained activations to 8GB for that group.
    - During backward, the forward computation for that checkpointed group is replayed once, adding 10ms for that group.
    - Other model state and buffers must fit in the remaining 8GB on the chip.

    **Calculations:**
    - Activation memory saved for the group = 20GB - 8GB = 12GB.
    - Peak retained activation memory becomes 8GB, below the 16GB HBM limit for activations.
    - Runtime overhead for each checkpointed group is one extra forward replay: +10ms for that group during the backward pass.

    **Conclusion & Interpretation:**
    - **Result: 8GB retained activations with +10ms per checkpointed group**. Checkpointing can bring the activation portion below 16GB, but the full training plan still needs sharding or parallelism for weights, optimizer state, and buffers.
