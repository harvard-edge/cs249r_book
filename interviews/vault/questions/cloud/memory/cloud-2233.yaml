title: The Erasure Coding Overhead
scenario: Your storage team proposes switching checkpoint storage from 3-way replication (3x storage overhead)
  to Reed-Solomon erasure coding (8+3, meaning 8 data chunks + 3 parity chunks). This would reduce storage
  overhead from 200% to 37.5%. However, the training team reports that after the switch, checkpoint write
  latency increased by 60% and they are missing their checkpoint time budget. Why does erasure coding
  hurt write performance, and when is the tradeoff worth it?
question: "Why does erasure coding hurt write performance, and when is the tradeoff worth it?"
details:
  realistic_solution: 'With 3-way replication, a write is simply: send the same data to 3 storage targets
    in parallel. The write latency is determined by the slowest of the 3 targets — no computation required.
    With 8+3 erasure coding, the client must: (1) accumulate 8 chunks of data, (2) compute 3 parity chunks
    using Galois field arithmetic (CPU-intensive), (3) write all 11 chunks to 11 different storage targets,
    (4) wait for acknowledgment from all 11. The 60% latency increase comes from three sources: the encoding
    CPU cost (~10-15% of total), the need to coordinate writes to 11 targets instead of 3 (higher tail
    latency from the slowest target), and the requirement to accumulate a full stripe before writing (buffering
    delay). The tradeoff is worth it for cold/archival checkpoints where capacity matters more than write
    speed. For hot checkpoints in the critical path, replication (or DRAM→NVMe staging) is better.'
  common_mistake: Thinking erasure coding is 'strictly better' than replication because it uses less storage.
    Engineers often forget that storage efficiency trades off directly against write performance and CPU
    overhead.
  napkin_math: '3-way replication: write 2 TB to 3 targets in parallel. Latency $\approx \max(T_1, T_2,
    T_3) \approx$ 5s. Storage cost: $2 \times 3 = 6$ TB. 8+3 EC: compute parity (CPU: ~1s for 2 TB), write
    2.75 TB across 11 targets. Latency $\approx$ encoding + $\max(T_1, \ldots, T_{11}) \approx$ 1 + 7
    = 8s. Storage cost: $2 \times 1.375 = 2.75$ TB. Latency increase: $(8 - 5)/5 = 60\%$. Storage savings:
    $(6 - 2.75)/6 = 54\%$.'
