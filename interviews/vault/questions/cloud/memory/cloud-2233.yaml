title: The Erasure Coding Overhead
scenario: Your storage team proposes switching checkpoint storage from 3-way replication (3x storage overhead) to Reed-Solomon erasure coding (8+3, meaning 8 data chunks + 3 parity chunks). This would reduce storage overhead from 200% to 37.5%. However, the training team reports that after the switch, checkpoint write latency increased by 60% and they are missing their checkpoint time budget. Why does erasure coding hurt write performance, and when is the tradeoff worth it?
question: Why does erasure coding hurt write performance, and when is the tradeoff worth it?
details:
  realistic_solution: With 3-way replication, a write sends the same payload to three storage targets in parallel and usually completes when the required replica acknowledgments arrive. There is no parity computation. With 8+3 erasure coding, the writer forms an 8-data-chunk stripe from the checkpoint payload, computes 3 parity chunks, and fans the write out across 11 targets. The write does not inherently need acknowledgments from all 11 targets, but it still touches more devices and has more tail-latency exposure than replication; small or partial-stripe writes can also require buffering or read-modify-write work. The latency increase comes from parity computation, more network/storage targets per stripe, and higher sensitivity to stragglers. The tradeoff is worth it for cold or archival checkpoints where capacity efficiency matters more than write latency. For hot checkpoints in the critical path, replication or DRAM-to-NVMe staging is usually better.
  common_mistake: |
    **The Pitfall:** Thinking erasure coding is 'strictly better' than replication because it uses less storage.
    **The Rationale:** Engineers often forget that storage efficiency trades off directly against write performance and CPU overhead.
    **The Consequence:** Missing checkpoint time budgets due to unexpected write latency increases.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-way replication vs 8+3 EC for a 2 TB logical checkpoint.
    - 8+3 EC stores 11 chunks for every 8 chunks of logical data, so raw storage multiplier is 11 / 8 = 1.375×.
    **Calculations:**
    - 3-way replication raw storage: 2 TB * 3 = 6 TB.
    - 8+3 EC raw storage: 2 TB * 11 / 8 = 2.75 TB.
    - EC storage overhead above logical data: (2.75 - 2) / 2 = 37.5%.
    - EC saves (6 - 2.75) / 6 = 54% of raw capacity compared with 3-way replication.
    - Write-latency risk is qualitative here: EC adds parity CPU work and fans each stripe out to 11 targets, so tail latency can rise even with quorum-style acknowledgments.
    **Conclusion & Interpretation:**
    - **Result: Capacity-efficient but latency-sensitive (Tradeoff-Bound)**. 8+3 EC cuts raw storage from 6 TB to 2.75 TB for a 2 TB checkpoint, but the parity and fan-out costs make it a poor fit for synchronous hot checkpoints.
