title: Autograd Tape Memory Footprint in Dynamic RNNs
scenario: You are debugging an Out-Of-Memory (OOM) error on an NVIDIA A100 GPU during the training of a custom dynamic RNN built with PyTorch eager execution. For a specific extreme input, the forward pass dynamically unrolls for 15,000 time steps. At each step, the autograd tape saves a `[batch_size=64, hidden_dim=4096]` FP32 tensor required for reverse-mode backpropagation. The activation memory budget is strictly 10GB.
question: How much autograd-tape memory do the 15,000 saved FP32 RNN tensors consume, and does it exceed the 10GB activation budget?
details:
  realistic_solution: Calculate the exact memory footprint of the saved tensors (14.65 GB) and implement gradient checkpointing or truncated backpropagation through time (TBPTT) to constrain the tape size below 10GB.
  common_mistake: |
    **The Pitfall:** Failing to account for dynamic graph unrolling accumulating memory linearly.
    **The Rationale:** Candidates forget to multiply the tensor size by 4 bytes (FP32) or ignore the time dimension of the RNN.
    **The Consequence:** Inability to diagnose the exact source of the OOM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Steps: 15,000.
       - Tensor size: [64, 4096] in FP32.
       - Activation memory budget: 10GB.
    2. **Calculations:**
       - Single Tensor Size = 64 * 4096 * 4 bytes = 1,048,576 bytes = 1 MiB.
       - Total Memory = 15,000 steps * 1 MiB = 15,000 MiB ≈ 14.65 GiB.
    3. **Conclusion & Interpretation:** **14.65 GiB > 10 GB budget, causing the OOM. Truncated backpropagation through time (TBPTT) with a 1,000-step window would cap memory at ~1 GB, safely resolving the OOM.**
