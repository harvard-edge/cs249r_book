title: HBM Bandwidth Savings with FlashAttention
scenario: You are training a transformer model on NVIDIA A100 GPUs (192KB SRAM per SM, 2.0 TB/s HBM) with sequence length N = 8192 and head dimension d = 128. Standard attention materializes S = QK^T and P = softmax(S) in HBM.
question: How much HBM traffic do S and P cause for one FP16 head at N=8192, and how much does FlashAttention reduce it?
details:
  realistic_solution: With N=8192, the N x N matrix has 67.1M elements. In FP16, this is 134.2 MB. Standard attention writes S (134.2 MB), reads S and writes P (268.4 MB), and reads P for the final matrix multiplication (134.2 MB), totaling 536.8 MB of HBM traffic per head just for intermediate matrices. FlashAttention uses tiling and online softmax to load blocks of Q, K, and V into the 192KB SM shared memory, computing the output O directly without materializing S and P in HBM.
  common_mistake: |
    **The Pitfall:** Focusing purely on FLOPs and assuming attention is compute-bound.
    **The Rationale:** Because matrix multiplication has $O(N^2 d)$ FLOPs, engineers assume compute is the bottleneck, ignoring the massive $O(N^2)$ memory traffic required to read and write intermediate matrices S and P.
    **The Consequence:** Optimization efforts are directed at raw compute speed (like mixed precision) rather than memory tiling, leaving massive performance on the table.
  napkin_math: |
    - **Standard Attention Memory:** For $N=8192$, S matrix has $8192^2 = 67.1\text{M elements}$.
    - **Size in FP16:** $67.1\text{M} \times 2\text{ bytes} = 134.2\text{ MB}$.
    - **Standard HBM Traffic:** Write S ($134.2\text{MB}$), Read S/Write P ($268.4\text{MB}$), Read P ($134.2\text{MB}$) $\rightarrow \sim 536.8\text{ MB}$ total.
    - **FlashAttention HBM Traffic:** Keeps S in 192KB SRAM. Only reads Q, K, V and writes output O.
    - **FlashAttention Total Traffic:** $4 \text{ matrices} \times (8192 \times 128) \times 2\text{ bytes} \approx 8.4\text{ MB}$.
    - **Conclusion:** **FlashAttention reduces HBM traffic by ~64x ($536.8 / 8.4$).**
