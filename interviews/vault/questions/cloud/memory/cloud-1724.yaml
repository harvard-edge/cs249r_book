title: Diagnosing LLM KV Cache Pre-allocation Waste
scenario: You are deploying a 70B parameter LLM on an 8xA100 node. The serving engine uses a pre-allocated memory manager that statically reserves KV cache space for the maximum sequence length of 32,768 tokens for every request at admission. Users complain about high queue times, and metrics show only 16 concurrent requests are being processed, despite average actual sequence lengths being under 500 tokens.
question: What memory bottleneck limits the 70B service to 16 concurrent requests, and how large is the KV cache utilization gap?
details:
  realistic_solution: Analyze the KV cache memory footprint. Identify that statically allocating for the max sequence length causes massive memory waste per request. Recommend migrating to a dynamically paged memory management system (like PagedAttention/vLLM) to allocate memory on-demand.
  common_mistake: |
    **The Pitfall:** Misdiagnosing low concurrency as a pure compute bottleneck or network bandwidth issue.
    **The Rationale:** Engineers accustomed to CNNs or stateless inference lack an intuition for how aggressively autoregressive KV caches grow, blindly trusting that 'low concurrency' must mean the GPUs are mathematically saturated.
    **The Consequence:** The team spends months attempting to prune or quantize the model without realizing that 98% of the VRAM bottleneck is simply empty, reserved tensor space.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter LLM on an 8xA100 40GB node (320GB total VRAM).
    - Max sequence length: 32,768 tokens; Average: 500 tokens.

    **Calculations:**
    - KV Cache per token: 80 layers * 8 heads * 128 dim * 2 (K+V) * 2 bytes = 327.68 KB.
    - Max Allocation: 32,768 tokens * 327.68 KB = 10.73 GB/request.
    - Available VRAM: 320 GB - 140 GB weights = 180 GB.
    - Max Concurrency: 180 GB / 10.73 GB ≈ 16 requests.
    - Actual Usage: 500 tokens * 327.68 KB = 163.8 MB/req.
    - Waste: 10.73 GB - 0.16 GB = 10.57 GB/req.

    **Conclusion & Interpretation:**
    - **Result: 10.57 GB/req (Memory-Bound)**. 98.5% waste due to static allocation bottleneck.
