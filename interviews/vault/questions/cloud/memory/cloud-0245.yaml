title: The Optimizer's Tax
scenario: You need to train a 70 billion parameter LLM using the standard Adam optimizer.
question: "How much VRAM is needed just for Adam optimizer states and gradients for a 70B-parameter LLM, excluding model weights?"
details:
  realistic_solution: For Adam optimizer states and gradients, each parameter requires 2 bytes for the FP16 gradient, 4 bytes for the FP32 first moment (momentum), and 4 bytes for the FP32 second moment (variance) — totaling 10 bytes per parameter. This scales significantly beyond standard inference deployment sizing.
  common_mistake: |
    **The Pitfall:** Underestimating training memory by only calculating model weight size.
    **The Rationale:** Engineers often memorize the FP16 inference size (2 bytes/param) and assume training is roughly equivalent.
    **The Consequence:** They fail to account for the FP32 momentum and variance estimates required by Adam, severely under-provisioning hardware and causing instant OOMs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 70B parameters.
       - Gradients: 2 bytes (FP16).
       - Adam Momentum: 4 bytes (FP32).
       - Adam Variance: 4 bytes (FP32).
    2. **Calculations:**
       - Total overhead per parameter: 2 + 4 + 4 = 10 bytes/param.
       - Total VRAM for states + gradients: 70B * 10 bytes = 700 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Training.** The optimizer states and gradients consume 700 GB, which is 5x the size of the FP16 model weights alone, necessitating massive model parallelism or ZeRO offloading.
  options:
  - 140 GB
  - 280 GB
  - 700 GB
  - 1120 GB
  correct_index: 2
