title: Flash Attention Tiling Strategy for H100 SRAM Constraints
scenario: You're implementing Flash Attention v2 for a 4096-token context Llama-2 model on an accelerator with 256KB shared memory per SM. The attention matrix (Q, K, V in BF16) for a single head at seq_len=4096 is 32MB, scaling to 1GB for 32 heads in standard attention.
question: "What Flash Attention tile sizes would you choose for seq_len=4096 and d_head=128, and why?"
details:
  realistic_solution: For Flash Attention, choose a tile size B_r x B_c x d_head in BF16 that fits comfortably within the 256KB shared memory while leaving room for multiple warps. Setting B_r=64, B_c=64, and d=128 requires 48KB for the Q,K,V blocks and 8KB for scores, totaling 56KB. This fits perfectly, prevents register spilling, and ensures high SM occupancy.
  common_mistake: |
    **The Pitfall:** Choosing the largest possible block size (e.g., 256x256) to maximize SRAM occupancy.
    **The Rationale:** Candidates only look at the SRAM size and try to fill it entirely with one massive tile.
    **The Consequence:** This ignores register file pressure from multiple warps. Oversubscribing registers causes spilling to local HBM memory, completely destroying the speedup of Flash Attention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dimensions: seq_len=4096, d_head=128.
    - Precision: BF16 (2 bytes).
    - Hardware limit: 256 KB shared memory per SM.

    **Calculations:**
    - Test Block Size: B_r = 64, B_c = 64.
    - Q block: 64 * 128 * 2 bytes = 16 KB.
    - K block: 64 * 128 * 2 bytes = 16 KB.
    - V block: 64 * 128 * 2 bytes = 16 KB.
    - Score block: 64 * 64 * 2 bytes = 8 KB.
    - Total footprint: 16 + 16 + 16 + 8 = 56 KB per tile.

    **Conclusion & Interpretation:**
    - **Result: 56 KB per tile (Memory-Capacity Bound)**. This footprint uses ~22% of SRAM, preventing register spills while allowing high SM occupancy.
