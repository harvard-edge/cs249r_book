title: Calculate Activation Checkpointing Memory Savings
scenario: 'You are training a 2B parameter Transformer on a single 80GB A100 GPU using mixed precision (FP16). The model state (weights, gradients, Adam optimizer) consumes 32GB. Your batch size is 32, sequence length is 2048, and the model has 24 layers. Without checkpointing, the forward pass stores 4.5GB of activations per layer. You apply activation checkpointing at every layer boundary, where the boundary tensor size is 256MB.'
question: 'What is the peak activation memory with layer-boundary checkpointing, and will the 2B model OOM on an 80GB A100?'
details:
  realistic_solution: |
    Calculate the stored checkpoint memory and add the peak memory required to recompute a single layer during the backward pass.
  common_mistake: |
    **The Pitfall:** Forgetting to add the memory of the currently executing layer.
    **The Rationale:** Candidates assume only the stored checkpoints consume memory during the backward pass.
    **The Consequence:** Underestimating peak memory, leading to unexpected OOMs during recomputation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model state: 32GB. 80GB A100 GPU.
    - 24 layers, 4.5GB activations per layer (without checkpointing).
    - Checkpointing at layer boundaries (256MB boundary tensor).

    **Calculations:**
    - Stored checkpoints = 24 layers * 0.25GB = 6.0GB.
    - Recomputation peak = 4.5GB.
    - Total activation memory = 6.0GB + 4.5GB = 10.5GB.
    - Total GPU memory = 32GB (model) + 10.5GB (activations) = 42.5GB.

    **Conclusion & Interpretation:**
    - **Result: The model will comfortably fit in the 80GB A100 without OOMing (42.5GB total). (Memory-Capacity-Bound Computation)**. Activation checkpointing solves the forward pass bloat.
