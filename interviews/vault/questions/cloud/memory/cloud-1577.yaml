title: MoE Active Parameter Bandwidth
scenario: You are deploying a 160B parameter Mixture of Experts (MoE) LLM on a node with 8x A100 GPUs. The architecture consists of 40B shared parameters and 8 experts sharing the remaining 120B parameters equally. The router selects the top-2 experts per token.
question: Assuming FP16 precision and a batch size of 1, how much GPU memory is needed for weights and how much memory bandwidth is consumed to decode a single token?
details:
  realistic_solution: |
    The full model still needs 160B FP16 weights resident, so the weight memory footprint is 160B * 2 bytes = 320 GB. For one decoded token, only the active weights are read: 40B shared parameters plus two 15B experts, or 70B parameters total. That is 70B * 2 bytes = 140 GB of weight-read bandwidth per token. The key distinction is persistent weight capacity versus per-token read volume.
  common_mistake: |
    **The Pitfall:** Calculating memory bandwidth using the total parameter count.
    **The Rationale:** In dense models, every parameter is read during every forward pass, leading engineers to apply the same formula to MoEs.
    **The Consequence:** Drastically overestimating latency and memory bandwidth requirements, potentially concluding the hardware cannot support real-time generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 160B params (40B shared + 8x 15B experts).
    - Top-2 routing. FP16 (2 bytes). Batch=1.

    **Calculations:**
    - Memory Footprint = 160B * 2 bytes = 320 GB.
    - Active Params = 40B (shared) + 2 * 15B (experts) = 70B.
    - Decoding Bandwidth = 70B * 2 bytes = 140 GB.

    **Conclusion & Interpretation:**
    - **Result: 320GB total FP16 weight memory and 140GB of weight reads per decoded token.** MoEs decouple persistent model capacity from active inference bandwidth.
