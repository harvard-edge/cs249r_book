title: 'mmap and NUMA: The Hidden Latency Trap'
scenario: You have a dual-socket server with 2 CPUs, each with its own memory controller and PCIe root complex. GPU 0 is on NUMA node 0, GPU 1 on NUMA node 1. You mmap a 14 GB model file and notice that cudaMemcpy to GPU 1 is 60% slower than to GPU 0.
question: Why is cudaMemcpy to GPU 1 60% slower after mmap, and how would you design NUMA-aware multi-GPU model loading?
details:
  realistic_solution: 'The 60% slowdown is because mmap''d pages reside on NUMA node 0 (first-touch policy). cudaMemcpy to GPU 1 must: (1) read pages from NUMA 0''s DRAM, (2) traverse the UPI link, (3) cross PCIe to GPU 1. Solutions: (1) Use mbind() or numactl to explicitly bind mmap pages to the target NUMA node before accessing them. (2) Use NUMA-interleaved allocation (MPOL_INTERLEAVE). (3) Use CUDA unified memory with cudaMemAdvise.'
  common_mistake: |
    **The Pitfall:** Ignoring NUMA topology entirely.
    **The Rationale:** Candidates assume mmap allocates memory dynamically where it's needed, forgetting the OS first-touch policy pins the pages to the NUMA node of the faulting thread.
    **The Consequence:** Massive inter-socket UPI traffic bottlenecks GPU memory transfers, ruining multi-GPU load times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local NUMA DMA bandwidth: ~200 GB/s.
    - Cross-NUMA UPI Link bandwidth: ~40 GB/s.
    - PCIe limit: 64 GB/s.

    **Calculations:**
    - Transfer 14 GB Locally: 14 GB / 64 GB/s = 0.22s.
    - Transfer 14 GB Cross-NUMA: 14 GB / 40 GB/s = 0.35s.

    **Conclusion & Interpretation:**
    - **Result: 0.35s (Interconnect-Bound)**. Cross-NUMA transfer takes 0.35s vs 0.22s, ~60% slower.
