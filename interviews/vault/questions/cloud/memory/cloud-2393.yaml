title: Production Debugging of Tensor Memory Leaks
scenario: A PyTorch-based NLP serving API handles 500 QPS. The Kubernetes pods have a 16GB memory limit. Over time, memory usage grows linearly by 50MB per hour per pod. Every ~12 days, pods are OOMKilled by the kernel, causing brief 502 Bad Gateway errors.
question: How would you stop the PyTorch serving pods from OOMKilling every ~12 days while debugging the underlying memory leak?
details:
  realistic_solution: Use `max-requests` worker recycling in the WSGI/ASGI server (for example Gunicorn or Uvicorn workers) as a temporary mitigation while debugging the real leak. Restart workers gracefully before their leaked memory approaches the pod headroom, with jitter so all workers do not recycle at once, and rely on Kubernetes readiness/draining so client traffic is not dropped. In parallel, deploy `tracemalloc`, object-growth profiling, and PyTorch memory tooling such as `torch.cuda.memory_summary` where relevant. A common root cause is accumulating tensors for metrics or losses without detaching or calling `.item()`, which can keep computation graphs alive, but the fix still requires proving the leak source.
  common_mistake: |
    **The Pitfall:** Blindly increasing the pod memory limit to 32GB.
    **The Rationale:** Treating the symptom (running out of RAM) instead of mitigating the actual underlying application leak.
    **The Consequence:** The OOMKills are merely delayed (e.g., to every 24 days), providing a false sense of security without solving the fundamental reliability risk.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic: 500 QPS across 10 pods (50 QPS/pod).
       - Pod Limit: 16 GB. Base Memory: 4 GB. Headroom: 12 GB.
       - Leak Rate: 50 MB/hour.
    2. **Calculations:**
       - Time to OOM: 12,000 MB / 50 MB/hr = 240 hours = 10 days.
       - Throughput per Pod: 50 QPS * 3600s = 180,000 requests/hour.
       - Mitigation Restart Cycle (max_requests=100k): 100,000 / 50 QPS = 2,000s ≈ 33 minutes.
       - Memory leaked in 33 minutes at 50 MB/hour: 50 * (33/60) ≈ 28 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Controlled Restart.** A `max_requests` limit can keep leaked memory far below the 12 GB headroom if the leak rate remains near 50 MB/hour and workers recycle cleanly, but it is a mitigation while the underlying leak is found and fixed, not a proof that OOMKills are impossible.
