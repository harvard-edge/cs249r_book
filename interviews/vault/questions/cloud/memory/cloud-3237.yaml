title: KV-Cache Deduplication Across Requests
scenario: 'Your serving platform handles 3 types of requests: customer support (60% traffic, 2K system prompt with 99% overlap), code completion (20% traffic, 0% overlap), and document Q&A (20% traffic, 29% overlap).'
question: "What fraction of total traffic can reuse KV-cache entries under content-aware deduplication?"
details:
  realistic_solution: 'Calculate the weighted availability based on exact prefix overlap prior to dynamic token generation. 60% * 99% + 20% * 29% provides the total savings.'
  common_mistake: |
    **The Pitfall:** Implementing deduplication based strictly on exact string matching of inputs.
    **The Rationale:** Candidates forget that KV-cache content depends on model weights and attention computation.
    **The Consequence:** Attempting to reuse KV caches across different models or checkpoints, resulting in corrupted generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Customer support: 60% traffic, 99% overlap.
       - Code completion: 20% traffic, 0% overlap.
       - Document Q&A: 20% traffic, 29% overlap.
    2. **Calculations:**
       - CS Reuse: 0.60 × 0.99 = 0.594 (59.4%).
       - Code Reuse: 0.20 × 0.0 = 0.0 (0.0%).
       - Q&A Reuse: 0.20 × 0.29 = 0.058 (5.8%).
       - Total: 59.4% + 0.0% + 5.8% = 65.2%.
    3. **Conclusion & Interpretation:**
       **Result: Memory Bound. 65.2% total traffic can reuse KV-cache.**
