title: Diagnosing Influence Function OOM
scenario: 'Your team is deploying a toxicity classifier based on RoBERTa-base (125M parameters) on a cloud GPU instance. To debug a high-profile false positive, an engineer implements classical influence functions to find the training data most responsible. The job instantly crashes with a CUDA Out of Memory (OOM) error before completing even one training data evaluation step.'
question: 'Why does the RoBERTa influence-function job OOM before one training-data evaluation step?'
details:
  realistic_solution: 'Identify that computing the full Hessian matrix for 125M parameters fundamentally exceeds hardware capacity. Resolve the issue by restricting the influence function computation to the final projection layer or by using implicit Inverse Hessian-Vector Product (IHVP) approximations like LiSSA.'
  common_mistake: |
    **The Pitfall:** Assuming the OOM is caused by large batch sizes or activation memory.
    **The Rationale:** Engineers default to standard training optimizations like gradient checkpointing or micro-batching.
    **The Consequence:** Failing to address the fundamental quadratic memory complexity of the Hessian matrix, meaning no amount of micro-batching will fix the OOM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: RoBERTa-base (125M parameters).
    - Goal: Full Hessian matrix computation.

    **Calculations:**
    - Hessian matrix elements: P^2 = (125 * 10^6)^2 = 1.56 * 10^16 elements.
    - At FP32 (4 bytes per element): 1.56 * 10^16 * 4 = 6.25 * 10^16 bytes.
    - 6.25 * 10^16 bytes = 62.5 Petabytes.

    **Conclusion & Interpretation:**
    - **Result: 62.5 Petabytes (Memory-Capacity-Bound)**. 62.5 Petabytes required, which is exponentially larger than any single node's total GPU memory.
