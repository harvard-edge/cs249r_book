title: Diagnosing KV-Cache Pressure from 8,000-Token CoT Scratchpads
scenario: Your inference cluster serves a reasoning-heavy 70B model on 8 GPUs. To implement 'Test-Time Compute Scaling', you prompt the model to generate extensive Chain-of-Thought (CoT) scratchpads (up to 8,000 reasoning tokens). During load testing, GPU SM utilization collapses to < 30%, P99 latency skyrockets, and the cluster throws Out-Of-Memory (OOM) errors, despite input prompts being very short.
question: Why do 8,000-token CoT scratchpads cause low SM utilization and OOMs, and how would you control KV-cache pressure?
details:
  realistic_solution: |
    The root cause is KV-cache growth during decode: an 8,000-token scratchpad consumes about 20GB of KV cache per request, so concurrency collapses long before the GPUs run out of arithmetic work. Control the pressure with admission control and sequence-length caps, per-tenant token budgets, KV-cache quantization such as FP8, and paged KV allocation to reduce fragmentation and spill only as a last resort. The scheduler should reserve KV capacity before admitting a request and reduce batch/concurrency targets when long scratchpads are in flight.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a compute bottleneck because the model is "thinking longer".
    **The Rationale:** Candidates often suggest faster GPUs or more Tensor Parallelism, failing to realize that massive KV cache accumulation forces tiny batch sizes and destroys compute utilization.
    **The Consequence:** Over-provisioning compute hardware without resolving the fundamental memory bandwidth and capacity issues.
  napkin_math: |
    **Assumptions & Constraints:**
    - Approximate 70B decoder shape: 80 layers, hidden size about 8192, FP16 KV cache.
    - KV bytes per token = 2 (K,V) * 80 layers * 8192 values * 2 bytes = 2,621,440 bytes, about 2.5 MiB.
    - Memory layout: 8x80GB (640GB total), ~140GB weights, leaving at most ~500GB before non-KV reserves.
    - CoT token load: up to 8,000 generated reasoning tokens per request.
    - Available memory also has to cover fragmentation, allocator reserve, temporary buffers, and concurrent prompt/decode state.

    **Calculations:**
    - KV cache per long request = about 2.5 MiB/token * 8,000 tokens = about 20,000 MiB, or 19.5 GiB.
    - Absolute upper bound if all ~500GB after weights were usable KV cache = ~500GB / ~20GB = about 25 long-running requests.
    - Real concurrency is lower because that ~500GB must also cover fragmentation, allocator reserve, temporary buffers, short-prompt KV, and scheduler headroom.
    - FP8 KV cache can roughly halve the per-token footprint, changing the long-request KV from about 20GB to about 10GB before overhead.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound.** Long CoT generation turns short prompts into 20GB-per-request KV allocations, which forces low concurrency, paging/fragmentation, OOMs, and poor SM utilization. Bound the generated sequence length, reserve KV capacity before admission, quantize KV, and use paged allocation to keep concurrency predictable.
