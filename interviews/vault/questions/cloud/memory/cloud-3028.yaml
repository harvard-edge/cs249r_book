title: 'Model Size Estimation: Design Sharding Strategy for 405B Model on H100 Cluster'
scenario: Design the GPU sharding strategy for serving a 405B-parameter LLaMA model (FP8 precision) on H100 nodes (80GB HBM3 per GPU, up to 900GB/s aggregate bidirectional NVLink bandwidth per GPU intra-node, InfiniBand 200Gb/s inter-node). Minimize end-to-end latency for interactive generation while maximizing throughput. Specify tensor parallelism degree, pipeline parallelism degree, and number of nodes.
question: What H100 NVLink bandwidth should the 405B sharding analysis use, and why is 600GB/s the wrong value?
details:
  realistic_solution: H100 NVLink bandwidth should be modeled as up to 900 GB/s aggregate bidirectional bandwidth per GPU on SXM systems. The 600 GB/s value is the A100-generation rule of thumb, so using it for H100 underestimates peak intra-node bandwidth by one third and overstates all-reduce latency by about 50% relative to the 900 GB/s denominator.
  common_mistake: |
    **The Pitfall:** Choosing maximum parallelism blindly without evaluating cross-node communication.
    **The Rationale:** Candidates default to TP-64 without realizing that all-reduce communication across 64 GPUs over InfiniBand becomes the dominant latency term, much worse than pipeline bubbles.
    **The Consequence:** An architecture with devastatingly slow decoding speeds.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 NVLink 4.0 peak aggregate bidirectional bandwidth is 900 GB/s per GPU (A100 is commonly modeled at 600 GB/s).
    - For an 8-way intra-node tensor-parallel group, all-reduce volume per GPU is approximately 2 * (8 - 1) / 8 * tensor_size.

    **Calculations:**
    - H100 peak all-reduce lower bound = (2 * 7/8 * tensor_size) / 900 GB/s.
    - A100-style estimate = (2 * 7/8 * tensor_size) / 600 GB/s.
    - 600 GB/s is 33% less bandwidth than 900 GB/s, so the latency estimate is 900/600 = 1.5x too high.

    **Conclusion & Interpretation:**
    - **Result: Correct H100 Denominator (Network-Bound)**. Use 900 GB/s as the H100 peak bandwidth convention, then apply an effective-bandwidth factor for the collective; 600 GB/s is the wrong generation's spec.
