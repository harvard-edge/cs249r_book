title: Flash Attention v2 vs v3 Block Size Selection on H100
scenario: You are benchmarking Flash Attention v2 vs v3 on an H100 for a 70B model with seq_len=8192. FA2 achieves 514 TFLOPS (52% MFU), while FA3 claims up to 75% MFU. You need to decide whether to adopt FA3 in production.
question: Would you adopt Flash Attention v3 over v2 on H100 for the 70B model, and for which workloads?
details:
  realistic_solution: Benchmark separately for prefill and decode. FA3 uses H100's wgmma instruction (Tensor Core v4) and pipelining to achieve higher MFU for prefill. For decode (batch=1, seq_len growing), both FA2 and FA3 are equally bandwidth-bound. Deploy FA3 for prefill-heavy workloads (batch processing, RAG) and evaluate risk vs 5-10% throughput gain for production serving.
  common_mistake: |
    **The Pitfall:** Benchmarking peak FLOP/s and expecting it to improve decode latency.
    **The Rationale:** Newer attention kernels advertise massive TFLOPS increases.
    **The Consequence:** Adopting riskier, cutting-edge kernels for serving workloads that are entirely memory-bandwidth-bound during decode, yielding zero latency improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B parameters, 40 layers, 40 heads, dim=128, seq_len=8192.
       - FA2 throughput: 514 TFLOPS. FA3 throughput: 742 TFLOPS.
       - H100 bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Prefill Compute: 40 layers * 40 heads * 4 * (8192)^2 * 128 = 54.97 TFLOPs ≈ 55 TFLOPs.
       - Prefill Time (FA3): 55 TFLOPs / 742 TFLOPS = 74 ms.
       - Prefill Time (FA2): 55 TFLOPs / 514 TFLOPS = 107 ms.
       - Decode KV Cache Size: 40 layers * 2 (K,V) * 8192 tokens * 40 heads * 128 dim * 2 bytes = 6.7 GB.
       - Decode Step Time: 6.7 GB / 3.35 TB/s = 2 ms.
    3. **Conclusion & Interpretation:** **Decode is exactly 2ms for both FA2 and FA3 (Memory Bandwidth-Bound).**
