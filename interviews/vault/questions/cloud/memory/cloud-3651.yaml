title: Flash Attention v2 vs v3 Block Size Selection on H100
scenario: You are benchmarking Flash Attention v2 vs v3 on an H100 for a 70B model with seq_len=8192. FA2 achieves 514 TFLOPS (52% MFU), while FA3 claims up to 75% MFU. You need to decide whether to adopt FA3 in production.
question: Would you adopt Flash Attention v3 over v2 on H100 for the 70B model, and for which workloads?
details:
  realistic_solution: Benchmark separately for prefill and decode. FA3 uses H100's wgmma instruction and better pipelining to raise MFU for prefill, where the attention kernel has enough work to use tensor cores efficiently. For decode, especially batch=1, both FA2 and FA3 are dominated by KV-cache reads and should have similar latency. Adopt FA3 for prefill-heavy or high-throughput batch workloads after compatibility testing; for interactive decode-heavy serving, require measured latency wins before taking on the kernel risk.
  common_mistake: |
    **The Pitfall:** Benchmarking peak FLOP/s and expecting it to improve decode latency.
    **The Rationale:** Newer attention kernels advertise massive TFLOPS increases.
    **The Consequence:** Adopting riskier, cutting-edge kernels for serving workloads that are entirely memory-bandwidth-bound during decode, yielding zero latency improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Example attention stack: 40 layers, 40 heads, d_head=128, seq_len=8192, BF16 KV cache.
    - FA2 prefill throughput: 514 TFLOPS. FA3 prefill throughput: 742 TFLOPS.
    - H100 HBM bandwidth: 3.35 TB/s.

    **Calculations:**
    - Prefill attention compute estimate: 40 layers * 40 heads * 4 * 8192^2 * 128 ≈ 55 TFLOPs.
    - Prefill time with FA2: 55 / 514 = 0.107s, or 107ms.
    - Prefill time with FA3: 55 / 742 = 0.074s, or 74ms.
    - For one decode step at 8192 context, the kernel reads the existing K and V cache: 40 * 2 * 8192 * 40 * 128 * 2 bytes = 6.7 GB.
    - Decode bandwidth lower bound: 6.7 GB / 3.35 TB/s ≈ 2.0ms per generated token, before overhead.

    **Conclusion & Interpretation:**
    - **Result: Workload-dependent adoption.** FA3 can reduce prefill time in this estimate from 107ms to 74ms, but decode remains KV-cache-bandwidth-bound, so FA3 should not be expected to materially improve batch-1 decode latency.
