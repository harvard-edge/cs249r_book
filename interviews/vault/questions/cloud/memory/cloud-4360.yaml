title: 'MI300X 192GB vs H100 80GB: Multi-Model Serving Density'
scenario: A serving team needs to host 8 concurrent model replicas of a 13B LLM (FP16 weights) alongside KV cache for 512 concurrent requests at sequence length 10. Each KV cache entry requires 2 × num_layers × num_heads × head_dim × sequence_length × 2 bytes.
question: "Can a single 192GB or 80GB accelerator host 8 concurrent 13B FP16 replicas plus KV cache for 512 requests, and what is the replica density advantage?"
details:
  realistic_solution: 'Weight memory per 13B model (FP16): 13B × 2 bytes = 26GB. For 8 replicas: 8 × 26GB = 208GB — this does not fit on either accelerator alone. However, evaluating per-replica density: 1 replica = 26GB weights. KV cache for 512 concurrent requests ≈ 4.2GB. Overhead ≈ 2GB. Total per replica = 32.2GB. MI300X (192GB): floor(192/32.2) = 5 replicas per card. H100 (80GB): floor(80/32.2) = 2 replicas per card. MI300X serves 2.5× more concurrent model instances.'
  common_mistake: |
    **The Pitfall:** Calculating only weight memory and ignoring KV cache memory.
    **The Rationale:** Engineers assume models are purely static artifacts.
    **The Consequence:** Severe underprovisioning of memory for multi-request serving, causing Out-Of-Memory errors during traffic spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model (FP16), 512 KV cache requests (4.2GB), 192GB vs 80GB accelerators.

    **Calculations:**
    - Weights = 13B * 2 bytes = 26GB.
    - Total per replica = 26GB + 4.2GB (KV) + 2GB overhead = 32.2GB.
    - 192GB card = floor(192/32.2) = 5 replicas. 80GB card = floor(80/32.2) = 2 replicas.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** The 192GB card yields a 2.5x density advantage over the 80GB card.
