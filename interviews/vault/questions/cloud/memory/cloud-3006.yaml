title: 'KV-Cache: Optimize KV Cache Eviction Policy for LLM Serving'
scenario: 'Your 80GB LLM serving system (7B model) serves requests with a bimodal length distribution: 20% of requests are 4096 tokens (long), and 80% are 256 tokens (short). The KV cache fills up within 100ms under peak load.'
question: "What KV-cache memory per token should you use when designing the eviction policy for this 7B GQA-8 workload, and how does it inform the eviction strategy?"
details:
  realistic_solution: Calculate the exact KV-cache footprint per token utilizing the Grouped Query Attention (GQA) parameters. For a 32-layer model with 8 KV heads and a head dimension of 128 in FP16, each token consumes 128 KB. Implement a generation-aware eviction policy (like vLLM's PagedAttention or chunk-based preemptive eviction) that avoids evicting the active, massive 4096-token requests. A naive LRU policy would evict the in-progress long requests to service the flood of short requests, causing catastrophic recomputation penalties.
  common_mistake: |
    **The Pitfall:** Implementing a standard Least Recently Used (LRU) eviction policy.
    **The Rationale:** Engineers default to standard OS/cache algorithms without understanding the devastating compute penalty of re-running the prefill phase for a 4000-token sequence.
    **The Consequence:** The system thrashes, continuously evicting and recomputing the long requests, dropping throughput to near zero.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 32 layers, GQA (8 KV heads), 128 head dim.
       - Precision: FP16 (2 bytes).
    2. **Calculations:**
       - Elements per token per layer: 2 (K+V) * 8 heads * 128 dim = 2,048 elements.
       - Bytes per token per layer: 2,048 * 2 bytes = 4,096 bytes.
       - Total bytes per token: 4,096 * 32 layers = 131,072 bytes (128 KB).
       - Long request footprint: 4096 tokens * 128 KB = 524 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 128 KB per token.** The system is heavily **Memory-Capacity-Bound**. Evicting a single long request costs 524MB of carefully computed state, mandating generation-aware cache pinning.
