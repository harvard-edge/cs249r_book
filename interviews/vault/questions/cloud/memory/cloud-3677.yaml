title: MoE vs Dense Model Memory Tradeoff at Scale
scenario: A team is deciding between a 70B dense model and a 140B MoE model with top-2 routing for serving on A100 80GB clusters. Both models have the same active parameter count per token (70B).
question: What are the memory and compute tradeoffs of the 140B top-2 MoE versus the 70B dense model, and when would you prefer the MoE?
details:
  realistic_solution: Use the MoE when you can afford higher weight residency and want more total model capacity at roughly the same active-parameter compute as the dense baseline. The 140B MoE needs about 280 GB of BF16 weights resident versus 140 GB for the 70B dense model, so it takes more GPUs and expert placement work. Per token, only the shared weights and routed experts are executed; the MoE does not read all 140B weights for every token, but serving can still be harder because batches may not reuse experts evenly.
  common_mistake: |
    **The Pitfall:** Assuming the MoE model has the same VRAM memory footprint and memory-bandwidth serving costs as the equivalent dense model.
    **The Rationale:** Candidates focus entirely on the "active parameters per token" (FLOPs constraint), forgetting that the entirety of the 140B model weights must be permanently resident in GPU HBM.
    **The Consequence:** The MoE model is fundamentally mis-provisioned, leading to immediate Out-Of-Memory errors on deployment or severely degraded batch-size capacity due to massive weight loading overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: NVIDIA A100 80GB GPUs.
    - Dense Model: 70B parameters.
    - MoE Model: 140B total parameters (Top-2 routing, 70B active).
    - Precision: BF16 (2 bytes/param).

    **Calculations:**
    - Dense Memory = 70B × 2 bytes = 140 GB (requires minimum 2x A100s).
    - MoE Memory = 140B × 2 bytes = 280 GB (requires minimum 4x A100s).
    - Per-token compute is based on the active routed path: the stated 70B active parameters, not all 140B resident parameters.
    - Serving bandwidth depends on the shared weights plus the selected experts for each token; poor batching can reduce expert reuse, but it does not require reading every expert for every token.

    **Conclusion & Interpretation:**
    - **Result: VRAM Capacity Bound**. The MoE doubles resident weight memory while keeping the assumed active compute similar to the dense model, trading hardware capacity and routing complexity for potentially better quality.
