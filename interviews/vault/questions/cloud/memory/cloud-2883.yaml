title: Custom MoE Checkpointing by Recomputing Router Logits
scenario: You are implementing a custom Mixture-of-Experts (MoE) layer for a 30B sparse model on H100 with hidden size 8192. The MoE layer has a routing sub-layer followed by 64 expert FFNs. PyTorch's `torch.utils.checkpoint.checkpoint()` wraps the entire layer, but profiling shows it is saving intermediate gating logits (B×S×64 float32 tensors) unnecessarily before the checkpoint boundary.
question: How would you implement fine-grained MoE checkpointing so gating logits are discarded and only routing is recomputed in backward?
details:
  realistic_solution: Implement a custom `torch.autograd.Function` with `forward()` saving only the routing assignment indices needed for backward, using the framework's normal int32 or int64 index dtype unless a packed custom representation is implemented. In `backward()`, recompute the router logits from the saved input and rerun the top-k routing operation. Expert FFN activations can then be checkpointed independently using `torch.utils.checkpoint.checkpoint()` per expert group. For B=8 and S=2048, this reduces saved router state from about 4.19 MB of float32 logits to about 64 KB with int32 top-1 indices, or 128 KB with int64 indices, with small recompute overhead because the router is a single H×E linear layer.
  common_mistake: |
    **The Pitfall:** Using `torch.utils.checkpoint.checkpoint()` at the coarse layer level.
    **The Rationale:** It's the simplest API to wrap an entire MoE block for memory savings.
    **The Consequence:** Wastes recompute budget on cheap routing operations and saves unnecessarily large float32 intermediate tensors.
  napkin_math: |
    **Assumptions & Constraints:**
    - B=8, S=2048, hidden size H=8192, experts E=64.
    - Router logits shape is [B, S, E] stored as float32 before the checkpoint boundary.
    - Save top-1 expert indices as int32 by default; int64 would double this storage.
    - Router recompute is one dense linear projection from H to E.

    **Calculations:**
    - Logit memory = B * S * E * 4 bytes = 8 * 2048 * 64 * 4 = 4,194,304 bytes ≈ 4.19 MB.
    - Top-1 int32 index memory = B * S * 4 bytes = 8 * 2048 * 4 = 65,536 bytes = 64 KiB.
    - Top-1 int64 index memory = B * S * 8 bytes = 131,072 bytes = 128 KiB.
    - Router linear recompute FLOPs = 2 * B * S * H * E = 2 * 8 * 2048 * 8192 * 64 = 17.18 GFLOPs.
    - Ideal H100 compute time at 989 TFLOP/s = 17.18e9 / 989e12 ≈ 0.017 ms, before kernel and memory overheads.

    **Conclusion & Interpretation:**
    - **Result:** Saving int32 routing indices instead of float32 logits reduces router state from about 4.19 MB to 64 KiB per layer for this batch and sequence length. Recomputing the router in backward is cheap relative to expert FFN compute, but the implementation should not assume int8 index storage unless it explicitly packs the indices.
