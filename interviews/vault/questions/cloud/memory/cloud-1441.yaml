title: Diagnosing Activation Function Memory Bottlenecks
scenario: A custom activation function y = x1 * torch.sigmoid(x2) is applied to two FP16 tensors x1 and x2, each with 100 million elements (200MB each). Profiling on an A100 GPU (2 TB/s memory bandwidth) shows this simple operation takes ~500 microseconds. The compute required is less than 1 GFLOP.
question: Why does the FP16 activation take ~500 µs on an A100 despite using under 1 GFLOP, and how should it be optimized?
details:
  realistic_solution: Identify that the operation is severely memory-bound (arithmetic intensity ~0.8 FLOPs/byte vs A100 ridge point of 156 FLOPs/byte). The naive implementation creates an intermediate sigmoid tensor, requiring 1.0GB of HBM I/O vs 600MB for a fused kernel. Implement kernel fusion using Triton or torch.compile to load x1 and x2 into SRAM once, compute sigmoid and multiplication in registers, and write only the final output y. This reduces HBM traffic by 40%, yielding a 1.67x speedup (500us to 300us).
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute or Python-level overhead.
    **The Rationale:** Candidates see a slow operation and try to optimize the math, forgetting that element-wise operations on large tensors are strictly limited by memory bandwidth.
    **The Consequence:** Wasting time simplifying math operations that provide zero speedup because the memory I/O bottleneck remains unchanged.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 tensors x1 and x2, 100 million elements (200MB each).
       - A100 GPU (2.0 TB/s memory bandwidth).
    2. **Calculations:**
       - Naive execution creates an intermediate tensor: temp = torch.sigmoid(x2). (Read 200MB x2, Write 200MB temp).
       - Second step: y = x1 * temp. (Read 200MB x1, Read 200MB temp, Write 200MB y).
       - Total HBM I/O = 200 + 200 + 200 + 200 + 200 = 1.0 GB.
       - Time at 2.0 TB/s = 1.0 GB / 2000 GB/s = 500 µs.
       - Fused execution (e.g., via Triton): Read x1 (200MB) + Read x2 (200MB) + Write y (200MB) = 600 MB total I/O.
       - Fused time at 2.0 TB/s = 600 MB / 2000 GB/s = 300 µs.
    3. **Conclusion & Interpretation:**
       - **Kernel fusion reduces HBM traffic by 40%, dropping execution time from 500 µs to 300 µs.**
       - **Result: Memory-Bandwidth-Bound**
