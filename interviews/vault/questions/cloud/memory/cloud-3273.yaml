title: NVIDIA A100 Memory Hierarchy Bottlenecks for Large Models
scenario: You are deploying a large language model (LLM) with 150 billion parameters, requiring approximately 300 GB of memory. You have access to a single NVIDIA A100 GPU (80 GB HBM2e). The model's active working set during inference is approximately 50 GB.
question: Why is a 150B FP16 LLM problematic on a single 80 GB A100 despite a 50 GB active working set, and what memory-hierarchy trade-offs result?
details:
  realistic_solution: A realistic solution involves model parallelism (e.g., pipeline parallelism or tensor parallelism) across multiple A100 GPUs, or offloading less frequently accessed layers/parameters to host DRAM (CPU memory) or NVMe storage. Strategies like 'model sharding' or 'layer offloading' must be implemented, carefully balancing the overhead of data transfer between memory tiers (HBM2e, DRAM, NVMe) with the computational benefits. Techniques like quantization (e.g., FP8) can also reduce the model size, potentially allowing it to fit into HBM2e or reduce offloading frequency.
  common_mistake: |
    **The Pitfall:** Assuming high computational throughput (TFLOPS) directly translates to high performance regardless of model size.
    **The Rationale:** Candidates focus on the active working set (50 GB) fitting in memory, forgetting the horrific latency penalties of swapping the inactive 250 GB from host DRAM or NVMe.
    **The Consequence:** Severe performance degradation as the GPU spends its entire time waiting for PCIe transfers instead of doing math.
  napkin_math: |
    - Model footprint: 150B FP16 = 300 GB.
    - HBM Capacity: 80 GB (meaning 220 GB must reside off-device).
    - Data transfer limit (PCIe Gen4 x16): ~32 GB/s.
    - Swap penalty: Fetching the 220 GB excess takes 220 GB / 32 GB/s ≈ 6.8 seconds.
    - Compute speed (HBM): 312 TFLOPS at 2.0 TB/s = 156 FLOPs/Byte.
    - **Conclusion: The system crashes into the memory wall; moving data across the PCIe bus takes seconds, completely starving the high-speed Tensor Cores.**
