title: When Can KV Cache Exceed Training Activations?
scenario: You are transitioning a 7B model from fine-tuning to inference serving. During fine-tuning, all layer activations are stored for the backward pass. During inference, no backward pass occurs, but KV cache grows with sequence length.
question: Is inference always lower-memory than training at the same batch and sequence length, and when can KV cache exceed training activations?
details:
  realistic_solution: 'Training activation memory with checkpointing every layer can be approximated by the saved residual stream: 32 layers × 2 × B × S × H × dtype_bytes. For a 7B model with 32 layers, H=4096, S=2048, B=4, and FP16/BF16 activations, this is 32 × 2 × 4 × 2048 × 4096 × 2 bytes = 4.0 GiB, about 4.3 GB. Inference has no backward activations, but the KV cache grows with batch and context: 2 × layers × heads × head_dim × S × B × dtype_bytes. At S=32K and B=64, the KV cache is 2 × 32 × 32 × 128 × 32768 × 64 × 2 bytes = 1.0 TiB, about 1.1 TB. Long-context, high-concurrency inference can therefore exceed fine-tuning activation memory.'
  common_mistake: |
    **The Pitfall:** Conflating forward-pass activation memory with KV cache memory.
    **The Rationale:** Engineers assume inference is memory-light because it lacks a backward pass.
    **The Consequence:** Underprovisioning inference infrastructure, leading to immediate OOMs when sequence lengths scale.
  napkin_math: |
    **Assumptions & Constraints:**
       - 7B model: 32 layers, H=4096, B=4, S=2048 for training.
       - Inference KV cache: B=64, context S=32K, 32 heads, head_dim=128.
    **Calculations:**
       - Training Activations: 32 layers × 2 × 4 × 2048 × 4096 × 2 bytes = 4,294,967,296 bytes = 4.0 GiB (4.3 GB).
       - KV Cache: 2 × 32 layers × 32 heads × 128 dim × 32768 tokens × 64 batch × 2 bytes = 1,099,511,627,776 bytes = 1.0 TiB (1.1 TB).
    **Conclusion & Interpretation:**
       **Result: Memory Bound. Inference memory (1.0 TiB KV cache) can vastly exceed checkpointed training activation memory (4.0 GiB) at large batch and sequence lengths.**
