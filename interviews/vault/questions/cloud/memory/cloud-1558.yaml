title: Evaluating Static Memory Planning vs Dynamic Allocation
scenario: Your team is deploying a 13B parameter Transformer model for an API serving highly variable sequence lengths (10 to 4096 tokens) with a maximum batch size of 16. The current serving engine uses dynamic memory allocation for activations, which leads to 30% memory fragmentation and causes unexpected OOM errors during peak load.
question: How should you choose between dynamic allocation, static max-shape planning, and bucketed static planning for serving this variable-length 13B LLM?
details:
  realistic_solution: Use power-of-2 bucketed static planning if the workload has enough repeated lengths to justify the padding cost. Bucketing reduces allocator overhead and fragmentation while bounding sequence-buffer padding waste to under 50% for non-exact bucket hits. Keep dynamic allocation when utilization is better for short, sparse traffic, and avoid a single max-shape plan because it wastes almost all sequence-scaled memory on very short requests.
  common_mistake: |
    **The Pitfall:** Assuming static memory planning for the maximum possible sequence length is strictly superior to dynamic allocation.
    **The Rationale:** Static planning eliminates fragmentation and allocation overhead, which seems ideal.
    **The Consequence:** Catastrophic memory bloat that destroys concurrency, as a 10-token request reserves memory for 4096 tokens, wasting 99.7% of the allocation and leading to massive underutilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 13B parameters (26GB FP16 weights).
    - Hardware: 80GB HBM GPU.
    - Sequence length: 10 to 4096 tokens, Max Batch Size: 16.
    - Dynamic allocation fragmentation overhead: 30%.
    - Let A be the useful sequence-scaled activation memory for a given workload shape.

    **Calculations:**
    - Dynamic Allocation: useful activation memory A becomes 1.3A with fragmentation. If peak useful activations are 40GB, fragmented activations are 52GB and total memory is 26GB + 52GB = 78GB, leaving little headroom on an 80GB GPU.
    - Static Max-Shape: a 10-token request pre-allocates a 4096-token sequence buffer, wasting (4096 - 10) / 4096 = 99.76% of that sequence-scaled buffer.
    - Bucketing (Power-of-2): a request of 2049 tokens uses a 4096-token bucket, wasting (4096 - 2049) / 4096 ≈ 49.98%. Requests just above each lower bucket are the worst case.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Tradeoff**. Bucketed static planning reduces fragmentation and bounds padding waste, but it does not eliminate all inefficiency; choose it when lower allocator churn and fewer OOMs outweigh bucket padding.
