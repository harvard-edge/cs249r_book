title: 'The Inference Memory Footprint: Activation Memory & Checkpointing'
scenario: Your team at a self-driving car company is deploying a new 7-billion parameter vision-language
  model to the cloud for log re-simulation. Before you can configure the Kubernetes cluster, you need
  to state the basic memory requirement. What is the minimum memory in gigabytes required to simply load
  this model for inference using 16-bit precision (FP16)?
question: "What is the minimum memory in gigabytes required to simply load this model for inference using 16-bit precision (FP16)?"
details:
  realistic_solution: The correct answer is **14 GB**. For inference with 16-bit floating-point precision
    (FP16), each parameter requires 2 bytes of memory. Therefore, a 7-billion parameter model requires
    7 billion × 2 bytes, which is 14 billion bytes or 14 GB.
  common_mistake: Engineers often confuse the memory requirements for *training* with *inference*. Training
    with the Adam optimizer requires storing parameters, gradients, and optimizer states, leading to a
    much larger footprint (~16 bytes per parameter). Inference only requires the model weights, which
    is significantly smaller.
  napkin_math: Parameters = 7,000,000,000 | Bytes per Parameter (FP16) = 2
  options:
  - 7 GB
  - 112 GB
  - 14 GB
  - 28 GB
  correct_index: 2
