title: Evaluating Activation Checkpointing Trade-offs for LLMs
scenario: 'You are pre-training a 13B parameter Transformer LLM on a cluster of GPUs. With a micro-batch size of 2, sequence length of 4096, and TP=4, profiling shows per-GPU memory usage hits 105GB (causing an OOM). You must evaluate full versus selective activation checkpointing.'
question: 'Should you use full or selective activation checkpointing to reduce the 105GB per-GPU footprint, and why?'
details:
  realistic_solution: 'Implement selective activation checkpointing by targeting only the self-attention core and highly memory-intensive operations. This retains inexpensive but voluminous activations in memory, reducing the recomputation overhead from ~33% (full checkpointing) down to ~15%, while safely maintaining total memory usage well below the HBM limit.'
  common_mistake: |
    **The Pitfall:** Assuming full activation checkpointing is optimal because it minimizes memory footprint to the absolute lowest bound.
    **The Rationale:** Candidates ignore the disproportionate compute overhead incurred by recomputing memory-heavy but compute-light operations like dropout and layernorms.
    **The Consequence:** Training runs significantly slower due to a ~33% FLOP penalty instead of an optimized ~15% penalty.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base activation memory: ~70GB. Total memory = 105GB (>80GB limit).
    - Hardware: A100 80GB.

    **Calculations:**
    - Full checkpointing drops activations to ~2GB but adds 1 extra forward pass (~33% total FLOP penalty).
    - Selective checkpointing retains ~15GB of activation memory (Total ~50GB < 80GB limit).

    **Conclusion & Interpretation:**
    - **Result: Selective checkpointing safely fits the 80GB budget while slashing the FLOP penalty to ~15% (Compute-Bound).**
