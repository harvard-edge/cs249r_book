title: 13B FP16 LLM Batch-1 Token Rate from Memory Bandwidth
scenario: You are deploying a 13-billion parameter LLM using FP16 precision on a single GPU with 2 TB/s of memory bandwidth. You need to estimate the maximum theoretical autoregressive token generation rate for a single user (batch size of 1). Assume compute latency is zero and ignore the KV cache overhead.
question: What is the maximum theoretical batch-1 autoregressive generation rate for the 13B FP16 model?
details:
  realistic_solution: Under the simplified batch-1 decoding model, each generated token requires one full pass over the model weights. Calculate the total weight size in bytes, then divide GPU memory bandwidth by that size. This gives an upper bound on tokens/second assuming one full weight read per token and ignoring compute latency, KV-cache traffic, and kernel overhead.
  common_mistake: |
    **The Pitfall:** Attempting to calculate generation rate using compute FLOPs instead of memory bandwidth.
    **The Rationale:** Candidates fail to realize that batch-1 autoregressive generation is strictly memory-bandwidth bound because the entire model weight matrix must be loaded from HBM to SRAM for every single token.
    **The Consequence:** Wildly overestimating token generation speed based on TFLOPS, leading to severe SLA violations in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameters in FP16 (2 bytes/parameter).
    - GPU memory bandwidth: 2,000 GB/s.
    - Batch size 1, one full model-weight read per generated token.
    - Zero compute latency; ignore KV-cache traffic and kernel overhead.

    **Calculations:**
    - Model size: 13,000,000,000 * 2 bytes = 26 GB.
    - Max full model passes per second: 2,000 GB/s / 26 GB = ~76.9 passes/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound.** Under the one-full-weight-read-per-token simplification, the maximum theoretical batch-1 generation rate is about 77 tokens/second.
