title: Optimizing KV-Cache on AMD MI300X for High-Throughput LLM Inference
scenario: You are the lead ML Systems engineer responsible for deploying a large language model with a 128k context window on an AMD MI300X accelerator, featuring 192 GB HBM3 memory and 5.3 TB/s memory bandwidth. Each token's KV-cache entry (key and value vectors across all layers for a single token) requires approximately 64 KB of memory (e.g., for a large Llama-like model using FP16). Your objective is to maximize the number of concurrent active contexts while adhering to strict latency targets.
question: How would you design KV-cache paging and eviction on MI300X to maximize concurrent 128k-token contexts with 64 KB of KV per token?
details:
  realistic_solution: |
    A realistic solution would use paged attention with blocks sized in tokens, for example 16-token pages. At 64 KB per token, each page is about 1 MB, which is large enough for efficient HBM transfers while avoiding a contiguous 8 GB allocation per full 128k context. Reserve HBM for weights and runtime buffers first, then admit only the number of full-length contexts whose KV pages fit in the remaining pool. Eviction should operate at prefix/page granularity: keep active decode tails resident, evict reusable but idle prefixes by recency and priority, and avoid evicting pages needed by currently decoding requests. Batching should group requests with resident pages to use MI300X bandwidth efficiently.
  common_mistake: |
    **The Pitfall:** Allocating contiguous memory for the entire context window.

    **The Rationale:** Naively treating KV caches like static tensors leads to severe memory fragmentation and underutilization when dealing with highly variable real-world context lengths.

    **The Consequence:** Dramatically reduced concurrency, frequent OOMs, and the inability to fully utilize the MI300X's massive 192 GB HBM.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Cache per Token: 64 KB (for K and V across all layers).
    - HBM Capacity: 192 GB.

    **Calculations:**
    - Max Context Memory: 128,000 tokens * 64 KB = 8.19 GB per full context.
    - Theoretical Max Contexts (Full): 192 GB HBM / 8.19 GB = ~23 contexts.
    - Example 16-token page: 16 * 64 KB = 1 MB per page.
    - Pages per 128k context: 128,000 / 16 = 8,000 pages.
    - Practical capacity is below 23 after reserving memory for weights, runtime buffers, and allocator slack.

    **Conclusion & Interpretation:**
    - **Result: ~23 full 128k contexts before overhead (Memory-Bound)**. Paging does not change the full-context lower bound; it improves usable concurrency by reducing fragmentation and by letting the scheduler mix shorter or partially resident contexts safely.
