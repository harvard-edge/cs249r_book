title: Diagnosing OOM in Reverse Mode Differentiation
scenario: Your team is fine-tuning a 7B parameter LLM on a single A100 GPU. The forward pass completes successfully, with `nvidia-smi` showing ~68GB of VRAM utilized. However, the system throws an Out-Of-Memory (OOM) error the exact moment `loss.backward()` is invoked.
question: Why does VRAM spike and OOM at loss.backward() after the forward pass, and how can training fit without reducing batch size?
details:
  realistic_solution: Identify that the OOM is caused by the activation memory footprint required for reverse-mode AD combined with gradient allocation. Implement gradient checkpointing (activation recomputation) to trade compute for memory, selectively discarding activations during the forward pass and recomputing them during the backward pass.
  common_mistake: |
    **The Pitfall:** Assuming the OOM is solely due to optimizer states.
    **The Rationale:** Candidates know Adam states are large, but forget how reverse-mode automatic differentiation mathematically works and allocates gradients.
    **The Consequence:** They misdiagnose the problem and fail to realize that AD requires caching massive intermediate activation tensors from the forward pass, pushing VRAM right to the limit before gradients even allocate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B parameters in BF16 (2 bytes).
       - Forward pass VRAM usage: 68 GB.
       - A100 VRAM capacity: 80 GB.
    2. **Calculations:**
       - Weights (BF16): 7B × 2 bytes = 14 GB.
       - Forward Pass Cache: Activations consume 68 GB - 14 GB = 54 GB.
       - Backward Pass Allocation: `loss.backward()` allocates gradients for 7B parameters.
       - Gradients (BF16): 7B × 2 bytes = 14 GB.
       - Total Memory at Backward: 68 GB (Forward) + 14 GB (Gradients) = 82 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. 82 GB > 80 GB capacity, causing an OOM. Gradient checkpointing is required to drop activation memory.**
