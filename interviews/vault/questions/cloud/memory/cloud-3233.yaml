title: Disaggregated KV-Cache Storage Architecture
scenario: You are architecting a next-generation LLM serving system where KV-cache is stored in a shared distributed memory pool (RDMA-accessible) via CXL-attached memory providing 100 GB/s per GPU link, instead of solely on local memory.
question: How would you architect a 100 GB/s CXL-backed distributed KV-cache for Llama 3 70B, and when does it outperform local memory KV-cache?
details:
  realistic_solution: 'Architect a Disaggregated KV-cache (DKV) pool with CXL memory as a backing store, not a replacement. GPU memory holds the "hot" working set, while the CXL pool holds "warm" KV-cache (prefix caches, paused conversations). Access pattern: Prefill writes to both; Decode reads locally. Benefits emerge during request migration (pulling KV from the pool is faster than recomputing prefill), prefix deduplication for shared prompts, and elastic scaling.'
  common_mistake: |
    **The Pitfall:** Assuming CXL memory bandwidth is sufficient for real-time KV-cache access during the autoregressive decode step.
    **The Rationale:** 100 GB/s sounds fast enough for general memory access.
    **The Consequence:** At 100 GB/s (vs 3.35 TB/s local memory), remote KV access is 33x slower, completely destroying token generation latency if placed on the critical path.
  napkin_math: |
    **Assumptions & Constraints:**
    - High Bandwidth Memory: 3.35 TB/s.
    - CXL bandwidth: 100 GB/s (33x slower).
    - Llama 3 70B KV load for 8K context: ~2.62 GB.
    - Recompute prefill time: ~200 ms.

    **Calculations:**
    - Memory read time: 2.62 GB / 3.35 TB/s = 0.78 ms.
    - CXL read time: 2.62 GB / 100 GB/s = 26 ms.
    - Migration via CXL: 26 ms.
    - Migration via Recompute: 200 ms.

    **Conclusion & Interpretation:**
    - **Result: 26 ms (Bandwidth-Bound)**. DKV is roughly 7.7x faster for request migration, but strictly limited to asynchronous or block transfers due to unacceptable per-token decode overhead.
