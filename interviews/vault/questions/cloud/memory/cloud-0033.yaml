title: The Runaway KV-Cache
scenario: You are serving a 70B parameter LLM, quantized to INT4. The model weights occupy 35 GB. A user running a summarization task on a long document (64,000 tokens) gets a CUDA out-of-memory error. The model has 80 layers, 64 attention heads, and a head dimension of 128. Calculate the FP16 KV-cache size for this request and explain why it causes the OOM.
question: "How large is the FP16 KV-cache for the 64,000-token request, and why does it OOM an 80 GB GPU?"
details:
  realistic_solution: |
    The out-of-memory error is caused by the KV-cache. While the 35 GB of weights fit, the memory required for the KV-cache grows with each token in the sequence. For a 64,000 token sequence, the cache requires approximately 168 GB of VRAM. The total required memory is the sum of the weights and the KV-cache (35 GB + 168 GB = 203 GB), which far exceeds the GPU capacity.
  common_mistake: |
    **The Pitfall:** Focusing only on the static memory cost of the model weights.
    **The Rationale:** Engineers assume KV-cache is small and static, forgetting that it scales linearly with the input sequence length.
    **The Consequence:** The prefill phase crashes with an OOM error on long-context requests, reducing system reliability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B INT4 weights = 35GB. GPU limit = 80GB.
       - Sequence = 64,000 tokens. 80 layers, 64 heads, 128 dim, FP16 (2 bytes).
    2. **Calculations:**
       - Per token KV cache = 2 * 80 * 64 * 128 * 2 bytes = 2.62 MB.
       - Total KV cache for 64k tokens = 64,000 * 2.62 MB = 167.68 GB.
       - Total memory required = 35 GB (weights) + 167.68 GB = 202.68 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound**. The 167 GB KV cache far exceeds the remaining 45 GB of VRAM, causing an instant OOM during prefill.
  options:
  - ~84 GB. This exceeds the available memory.
  - ~2.6 MB. This is negligible and shouldn't cause an OOM.
  - ~168 GB. The cache size far exceeds the remaining VRAM.
  - 35 GB. The memory is determined by the weights, so the error must be from fragmentation.
  correct_index: 2
