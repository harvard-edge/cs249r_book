title: Diagnosing Low Utilization in 100B DLRM
scenario: You are deploying a Deep Learning Recommendation Model (DLRM) with 100 billion FP16 parameters in its embedding tables to an instance with 8x A100 80GB GPUs. During load testing, P99 latency is unacceptably high, and GPU SM compute utilization remains persistently under 15%. Profiling indicates the bottleneck is not the dense MLP layers.
question: What is causing low SM utilization and high P99 latency in the DLRM embedding workload, and what limits it?
details:
  realistic_solution: Diagnose the system as a memory-capacity-bound workload. The 200GB embeddings require model parallelism across multiple GPUs. The low compute utilization occurs because embedding lookups are memory-bandwidth and capacity bound (fetching sparse rows with very low arithmetic intensity), not compute bound. The solution involves optimizing the embedding sharding (e.g., table-wise or row-wise) and using high-bandwidth NVLink for the necessary All-to-All communication.
  common_mistake: |
    **The Pitfall:** Assuming low compute utilization is due to a small batch size or unoptimized dense layers.
    **The Rationale:** Engineers used to CNNs or dense Transformers assume compute utilization is the primary metric of health, missing that sparse embedding lookups have fundamentally different arithmetic profiles.
    **The Consequence:** Teams try to increase the batch size, only to exacerbate the underlying memory bandwidth bottleneck and crash the P99 latency further.
  napkin_math: |
    *   **Memory Capacity:** 100B params × 2 bytes/param = 200 GB. (Requires at least 3x 80GB GPUs).
    *   **Arithmetic Intensity:** An embedding lookup is roughly 1 FLOP per 2 Bytes read = 0.5 FLOPs/Byte.
    *   **Ridge Point Comparison:** The A100's compute-to-memory ridge point is ~150 FLOPs/Byte.
    *   **Result: At 0.5 FLOPs/Byte, the workload is fundamentally memory-bandwidth bound, drastically underutilizing compute.**
