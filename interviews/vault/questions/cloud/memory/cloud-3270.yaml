title: A100 KV-Cache Management for Long Context LLMs
scenario: You are deploying a large language model (LLM) with 32 layers, 32 attention heads, and a head dimension of 128 for inference on an NVIDIA A100 GPU (80 GB HBM2e memory, 2.0 TB/s bandwidth). The model needs to support a maximum context length of 32,768 tokens, and all weights are loaded in FP16. You're observing frequent Out-Of-Memory (OOM) errors when trying to serve concurrent requests.
question: Where is the memory pressure for 32k-context LLM inference on an 80 GB A100, and how would you prevent OOMs while maximizing throughput?
details:
  realistic_solution: 'A realistic solution involves: \n1.  **Quantifying KV-Cache Needs**: Calculate the memory required for the KV-cache per sequence and subtract model weights, CUDA/runtime buffers, and fragmentation slack before admitting requests. \n2.  **Identifying the Pressure**: For inference, incremental memory pressure is dominated by KV-cache growth with batch size and context length; weights are mostly fixed once loaded.\n3.  **Implementing Paged Attention**: Adopt paged attention mechanisms (like those in vLLM or HuggingFace TGI) to store KV-cache in non-contiguous pages and reduce fragmentation.\n4.  **Continuous Batching and Admission Control**: Use an adaptive scheduler that tracks expected KV bytes per request, reserves decode headroom, and limits concurrency before OOM.\n5.  **Offloading/Tiering**: For extremely long contexts, consider CPU or host-memory tiering only for lower-priority pages because host-device transfers add latency.'
  common_mistake: |
    **The Pitfall:** Focusing only on model weights or batch size, while overlooking the KV-cache scaling.
    **The Rationale:** Engineers accustomed to CNNs or short-context NLP models often underestimate the memory footprint of the attention mechanism.
    **The Consequence:** Scaling sequence length quadratically increases the KV-cache, leading to severe fragmentation and instant OOM errors without paged attention.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV-cache per token, per layer: 2 (K,V) * 32 heads * 128 dim * 2 bytes = 16 KB.
    - 32 layers total.
    - FP16 weights and runtime buffers must be reserved before KV allocation; use 60 GB as an example KV budget after those reservations.

    **Calculations:**
    - Total KV-cache size per token across all 32 layers = 512 KB/token.
    - For a single 32,768-token sequence: 512 KB/token * 32,768 tokens ≈ 16.7 GB.
    - With a 60 GB KV budget: 60 GB / 16.7 GB per full-length sequence ≈ 3 full 32k sequences before allocator slack.

    **Conclusion & Interpretation:**
    - **Result: about 3 full 32k sequences with a 60 GB KV budget**. The OOM risk comes from KV-cache growth and fragmentation, so paged attention plus admission-controlled continuous batching is the primary mitigation.
