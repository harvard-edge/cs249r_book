title: The Activation Memory Bubble
scenario: You are analyzing memory consumption patterns across different deep learning architectures and deployment phases.
question: In what scenario are model activations most likely to exceed model weights in memory usage?
details:
  realistic_solution: During training, every layer's output (its activation) must be saved in memory to compute gradients during backpropagation. For a CNN processing high-resolution images (e.g., 1024x1024) with a large batch size, the size of these activation tensors (`Batch x Channels x Height x Width`) can easily exceed the memory required for the model's parameters. This is especially true in the early layers of a CNN where the spatial dimensions (Height, Width) are still large.
  common_mistake: |
    **The Pitfall:** Believing model weights always consume the most VRAM.
    **The Rationale:** This is true for LLMs, but not for architectures processing high-dimensional inputs like high-res CNNs.
    **The Consequence:** Incorrectly sizing hardware or ignoring activation checkpointing strategies during training.
  napkin_math: |
    - **CNN Activations**: 32 (batch) * 256 (channels) * 1024 (H) * 1024 (W) * 2 bytes = 17.1 GB.
    - **Model Weights**: 50M * 2 bytes = 100 MB.
    - **Result**: **Activations are 170x larger!**
  options:
  - Serving a 13B LLM with a short context length.
  - Training a large CNN on high-resolution images with a large batch size.
  - Fine-tuning a 1B parameter model with a small batch size.
  - Running inference with a quantized MobileNet on a single image.
  correct_index: 1
