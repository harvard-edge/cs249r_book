title: Evaluating DLRM Sparse Embedding Placement
scenario: You are designing the inference architecture for a 500GB Deep Learning Recommendation Model (DLRM) with highly skewed, sparse embedding lookups. Your cloud instances feature dual-socket CPUs and 8x A100 GPUs connected via NVLink and PCIe Gen4 to the host. The sparse lookups follow a power-law distribution where 5% of the embeddings account for 90% of the accesses.
question: Should the 500GB DLRM embeddings live entirely in CPU DRAM or use a hybrid GPU-HBM cache, and why?
details:
  realistic_solution: Implement a hybrid, software-managed cache strategy. Pin the 'hot' 5% of embeddings (25GB) in GPU HBM and keep the remaining 475GB 'cold' embeddings in CPU DRAM. Because sparse gather operations are latency-bound, lookups for cold embeddings over PCIe Gen4 must be aggressively pipelined and batched using asynchronous DMA streams to hide the interconnect latency.
  common_mistake: |
    **The Pitfall:** Sharding the 500GB table across all 8 GPUs to maximize memory bandwidth.
    **The Rationale:** Engineers assume that placing everything in HBM will yield the lowest latency.
    **The Consequence:** Consuming nearly 80% of the expensive HBM capacity just for embeddings, leaving insufficient memory for dense components and KV caches, while wasting 1TB of CPU DRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU HBM access latency: ~300ns.
       - PCIe Gen4 + CPU DRAM access latency: ~3,000ns.
    2. **Calculations:**
       - Hybrid approach (90% hot in HBM): Avg Latency = (0.90 * 300ns) + (0.10 * 3000ns) = 270ns + 300ns = 570ns.
       - CPU-only approach: 100% * 3000ns = 3000ns.
       - Latency improvement = 3000 / 570 ≈ 5.2x.
    3. **Conclusion & Interpretation:**
       - **Result: ~5.2x Latency Improvement. The hybrid approach is vastly superior while only using 25GB of HBM capacity.**
