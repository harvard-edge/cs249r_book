title: Diagnosing PyTorch OOM with Dynamic Sequence Lengths
scenario: You are training a transformer model. The job suddenly crashes with a PyTorch CUDA out of memory error:`Tried to allocate 2.00 GiB... Of the allocated memory 45.00 GiB is allocated by tensors, and 25.00 GiB is reserved by PyTorch but unallocated.` Your dataloader samples highly dynamic sequence lengths randomly.
question: "Why can the 2GB allocation fail with 25GB reserved but unallocated, and what production fix handles dynamic sequence lengths?"
details:
  realistic_solution: Diagnose the issue as memory fragmentation within PyTorch's caching allocator, where the 25GB of free cache is split into smaller non-contiguous blocks. The fix involves stabilizing tensor allocation sizes by using sequence length bucketing in the dataloader, and setting `PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True` to allow the allocator to map memory virtually and defragment implicitly.
  common_mistake: |
    **The Pitfall:** Indiscriminately calling `torch.cuda.empty_cache()` or diagnosing a memory leak.
    **The Rationale:** It's easier to brute-force a cache dump rather than understand memory fragmentation from dynamic tensor shapes.
    **The Consequence:** Severely degrades throughput by forcing expensive system-level `cudaMalloc` calls on the critical path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 25GB free cache.
       * Requested contiguous block: 2GB.
       * Fragmented due to dynamic sequences into <512MB chunks.
    2. **Calculations:**
       * Available Reserved = Total (70GB) - Allocated (45GB) = 25GB.
       * Max contiguous block = 512MB.
       * 2GB Request > 512MB.
    3. **Conclusion & Interpretation:** **Result: 0 Contiguous Blocks (Memory-Bound)**. The OOM triggers because no single 2GB block exists, despite 25GB total free.
