title: DLRM Embedding Table Sizing
scenario: Your team is training a Deep Learning Recommendation Model (DLRM). The largest categorical embedding table has a vocabulary size of 1 billion items and an embedding dimension of 128. You are training in FP32 using the standard Adam optimizer.
question: How much memory does the 1B-by-128 FP32 Adam embedding table require, and how many 80GB GPUs are minimally needed?
details:
  realistic_solution: 'Calculate the total model parameters (128B) and apply the 12-byte per parameter rule for FP32 Adam optimizer states (4B weight + 8B moments). Total capacity needed is ~1.53 TB. Distribute via Tensor Parallelism or specialized embedding sharding across a minimum of 20 80GB GPUs.'
  common_mistake: |
    **The Pitfall:** Calculating only the memory required for the model weights (4 bytes per parameter).
    **The Rationale:** Focusing purely on the model payload size and forgetting the training state overhead.
    **The Consequence:** Forgetting the Adam optimizer requires an additional 8 bytes per parameter leads to a massive 3x underestimation of VRAM, causing an immediate OOM at step 0.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding table: 1B rows * 128 dim = 128B parameters.
    - Precision: FP32 (4 bytes/param).
    - Optimizer: Adam (8 bytes/param for moments).

    **Calculations:**
    - Memory per Parameter: 4B (weight) + 8B (Adam states) = 12 Bytes.
    - Total Memory Footprint: 128e9 params * 12 Bytes = 1,536e9 Bytes = ~1,536 GB.
    - GPU Requirement (80GB): ceil(1536 GB / 80 GB) = 20 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 20 GPUs (Memory-Capacity Bound)**. A minimum of 20 80GB GPUs is required just to hold the table state.
