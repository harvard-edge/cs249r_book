title: LLM Memory Pressure Management on NVIDIA H100 Cluster
scenario: You are tasked with designing a system to train a 175B parameter LLM on a cluster of NVIDIA H100 GPUs. The model FP16 weights alone occupy approximately 350 GB. During a typical training step, the combined memory footprint of weights, activations, and optimizer states significantly exceeds the 80 GB HBM3 capacity of a single H100.
question: How would you design a distributed training strategy to prevent OOM errors, minimize fragmentation, and optimize gradient accumulation for a 175B LLM on H100s?
details:
  realistic_solution: |
    A multi-pronged approach: 1) Data Parallelism with Model/Optimizer Sharding (DeepSpeed ZeRO-3) to distribute massive optimizer states and gradients. 2) Activation Checkpointing to drop intermediate activations and trade compute for memory. 3) Offloading Strategies for less frequently accessed tensors. 4) Efficient Gradient Accumulation, ensuring activations are released after each micro-batch. 5) Profiling tools to track memory hotspots. 6) OS-level mitigations like pinned GPU memory and HugePages.
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint of optimizer states and activations.
    **The Rationale:** Candidates focus only on the model weights and naive data parallelism.
    **The Consequence:** Frequent OOMs or the necessity to use extremely small, inefficient global batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 175B parameter LLM on H100 (80 GB) cluster.
    - DP with ZeRO-3 on 64 GPUs.

    **Calculations:**
    - FP16 weights: 175B * 2 bytes = 350 GB.
    - FP16 gradients: 175B * 2 bytes = 350 GB.
    - Adam moments (m,v in FP32): 175B * 2 * 4 bytes = 1400 GB.
    - FP32 master weights: 175B * 4 bytes = 700 GB.
    - Sharded ZeRO-3 model state over 64 GPUs: (350 + 350 + 1400 + 700) / 64 = 43.75 GB/GPU.
    - Remaining HBM for activations, communication buffers, fragmentation, and CUDA runtime: 80 - 43.75 = 36.25 GB/GPU.

    **Conclusion & Interpretation:**
    - **Result: ~43.75 GB/GPU for sharded model state before activations**. ZeRO-3 can make the state budget plausible on 64 H100s, but fitting depends on activation checkpointing, microbatch size, accumulation schedule, and buffer/fragmentation overheads.
