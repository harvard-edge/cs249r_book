title: The Voracious KV-Cache
scenario: When serving an LLM, a significant portion of VRAM is consumed by the KV-cache.
question: What is the primary driver of KV-cache memory size when serving an LLM?
details:
  realistic_solution: The KV-cache stores the key (K) and value (V) vectors for every token processed so far. Its size is a direct function of the sequence length. The formula is `Memory_KV = 2 × sequence_length × num_layers × hidden_dim`. As `sequence_length` increases, the memory usage scales linearly and can become enormous, far exceeding the static memory cost of the weights.
  common_mistake: |
    **The Pitfall:** Assuming the model's parameter count is the dominant factor for all memory components.
    **The Rationale:** Parameter count defines the model size, so it intuitively feels like the main constraint.
    **The Consequence:** Engineers underestimate memory needs for long-context requests, leading to Out-Of-Memory errors during production serving.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 80 layers, 8192 hidden dimension size.
       - FP16/BF16 precision (2 bytes).
       - Sequence length: 8192 tokens.
    2. **Calculations:**
       - Memory per Token: 2 (K,V) * 80 layers * 8192 dim * 2 bytes = 2,621,440 bytes = ~2.62 MB.
       - Total KV Cache Size: 2.62144 MB * 8192 tokens = 21,474.8 MB = ~21.5 GB.
    3. **Conclusion & Interpretation:** **~21.5 GB memory for one request (Memory Capacity-Bound).**
  options:
  - The number of model parameters (P)
  - The batch size (B)
  - The input sequence length (S)
  - The GPU's memory bandwidth
  correct_index: 2
