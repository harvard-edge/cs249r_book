title: Long-Context INT4 KV Cache Degradation
scenario: Serving a 7B LLM with a 128k context window. At FP16, the KV cache heavily limits concurrency. You implement INT4 per-channel KV cache quantization. Throughput jumps from 5 QPS to 18 QPS, but "needle in a haystack" retrieval accuracy drops from 99% to 45%.
question: Why did INT4 KV cache quantization hurt needle-in-haystack accuracy, and how would you preserve long-context retrieval?
details:
  realistic_solution: |
    Per-channel INT4 quantization of the KV cache destroys attention precision because it cannot capture outlier activations critical for "needle" tokens. INT4 limits representation to 16 discrete values, causing dot-product blur across the sequence. The fix is to preserve the high-importance KV values rather than merely reduce cache size: use finer-grained or asymmetric groupwise quantization, keep attention sinks/recent tokens and outlier channels in FP16 or INT8, and validate retrieval-specific calibration. Grouped-Query Attention can reduce KV cache size, but it does not by itself recover precision lost by INT4 quantization.
  common_mistake: |
    **The Pitfall:** Increasing calibration dataset size to fix the accuracy drop.
    **The Rationale:** Engineers assume poor quantization accuracy is just an artifact of bad calibration data during the post-training quantization phase.
    **The Consequence:** They fail to address the fundamental representational limit of 4 bits for capturing the highly precise outlier key/value pairs needed for long-sequence dot products.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model with 128K context, 32 layers, 32 heads, 128 dim.
    - KV cache stores both K and V in FP16: 2 bytes per scalar.
    - INT4 groupwise quantization uses 4 bits per scalar plus 4 bytes metadata (scale+zero) per 128-value group.

    **Calculations:**
    - FP16 KV cache: 2 * 32 layers * 32 heads * 128 dim * 128,000 tokens * 2 bytes = 67.1 GB.
    - INT4 payload: 67.1 GB * (4 bits / 16 bits) = 16.8 GB.
    - Metadata groups: (2 * 32 * 32 * 128 * 128,000 values) / 128 values per group = 262.1M groups.
    - Metadata bytes: 262.1M * 4 bytes = 1.05 GB.
    - Effective fully-INT4 groupwise cache: 16.8 + 1.05 = 17.85 GB before any FP16/INT8 exceptions.

    **Conclusion & Interpretation:**
    - **Result: 17.85 GB baseline compressed cache, about 73% smaller than FP16.** Retrieval quality may still fail unless recent/sink tokens or outlier channels are kept at higher precision; that mixed-precision reserve trades some memory back for accurate long-context attention.
