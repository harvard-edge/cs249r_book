title: The Gradient Memory Tax
scenario: You are training a large model with a parameter count 'P'. After the forward pass, you have a certain peak memory usage.
question: "When you initiate the backward pass, how much additional memory must be allocated specifically for the gradients, assuming FP16 precision?"
details:
  realistic_solution: The backward pass will allocate additional memory equal in size to the model's parameters. Since the model has 'P' parameters and is being trained in FP16 (2 bytes per parameter), the model weights themselves consume `P × 2` bytes.
  common_mistake: |
    **The Pitfall:** Thinking that gradients are just temporary, insignificantly small values.
    **The Rationale:** Overlooking the mathematical requirement that for every single parameter in a neural network, a corresponding gradient of the exact same size must be stored.
    **The Consequence:** Consistently under-provisioning GPU memory, leading to unexpected OOM errors during the backward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Parameters: P parameters.
       - Precision: FP16 (2 bytes per parameter).
    2. **Calculations:**
       - Weights Memory = P * 2 bytes = 2P bytes.
       - Gradients Shape = Identical to weights (P parameters).
       - Gradients Memory = P * 2 bytes = 2P bytes.
    3. **Conclusion & Interpretation:**
       - **Result: 2P bytes (Memory-Capacity-Bound).** The backward pass allocates an amount of memory exactly equal to the size of the model parameters.
  options:
  - 4P bytes (Assuming FP32 gradients for FP16 weights)
  - 2P bytes (An amount equal to the memory size of the model parameters)
  - P bytes (Assuming 1 byte per parameter or half the size)
  - Fixed 16 MB (Assuming gradients are just scalar metrics)
  correct_index: 1
