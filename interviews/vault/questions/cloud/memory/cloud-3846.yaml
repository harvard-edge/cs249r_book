title: Gradient Accumulation Memory Reduction Discrepancy
scenario: 'Fine-tuning a 3B model at batch size 64 OOMs because it requires 88 GB of memory. Applying gradient accumulation with a micro-batch of 16 (4 steps) drops memory usage to 58 GB, not the expected 22 GB.'
question: 'Why does gradient accumulation reduce memory to 58 GB instead of 22 GB?'
details:
  realistic_solution: 'Gradient accumulation only shrinks dynamic activation memory. Static memory (weights, accumulated gradients, Adam optimizer states) remains completely fixed regardless of micro-batch size.'
  common_mistake: |
    **The Pitfall:** Assuming total GPU memory usage scales linearly with batch size.
    **The Rationale:** Candidates fail to separate static state from dynamic activations.
    **The Consequence:** Miscalculating memory budgets and failing to resolve OOMs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B model, FP16 weights/grads, FP32 Adam.
    - Total memory at BS=64 is 88 GB.
    
    **Calculations:**
    - Static: Weights(6 GB) + Gradients(6 GB) + Adam(36 GB) = 48 GB.
    - Activations at BS=64: 88 - 48 = 40 GB.
    - Activations at BS=16: 40 / 4 = 10 GB.
    - Total at BS=16: 48 + 10 = 58 GB.
    
    **Conclusion & Interpretation:**
    - **Result: 58 GB Total Memory (Memory-Bound)**. Static state dominates, making linear scaling assumptions invalid.
