title: KV-Cache Growth in RAG Pipelines
scenario: 'Your RAG system retrieves 10 document chunks (each 512 tokens) and prepends them to the user query (256 tokens) before sending to Llama 3 70B. Total prompt: 5376 tokens. Users send follow-up questions that add another retrieval round. By turn 3, the context is 16,128 tokens.'
question: How does the RAG context growth to 16,128 tokens scale KV-cache memory, and what does that imply for serving cost?
details:
  realistic_solution: 'KV-cache growth per turn: Turn 1: 5,376 tokens × 320 KB = 1.72 GB. Turn 2: 10,752 tokens × 320 KB = 3.44 GB. Turn 3: 16,128 tokens × 320 KB = 5.16 GB. At turn 3, each conversation consumes 5.16 GB — a single GPU supports only ~1-2 concurrent conversations. Optimizations: (1) Prefix caching: if multiple users query the same documents, cache those documents'' KV entries (shared across users). If 70% of retrieved chunks are from a popular corpus, save 70% × 5120 tokens = 3584 tokens of redundant KV computation.'
  common_mistake: |
    **The Pitfall:** Treating RAG retrieval context identically to unique user-generated text.
    **The Rationale:** Candidates assume all context requires unique KV-cache allocations, ignoring that retrieved documents are often shared across many users.
    **The Consequence:** Grossly overestimating HBM requirements and missing the opportunity to use prefix caching to slash costs by 3x.
  napkin_math: |
    **Assumptions & Constraints:**
    - Turn 1: 5,376 tokens.
    - Turn 3: 16,128 tokens.
    - KV Cache size: 320 KB per token.
    - Available HBM per GPU: ~10 GB.

    **Calculations:**
    - Turn 3 KV size: 16,128 * 320 KB = 5.16 GB per user.
    - Concurrent users per GPU: 10 GB / 5.16 GB = ~1-2 users.
    - With 70% shared prefix caching: 1.72 GB - (0.7 * 1.64 GB) = 0.57 GB marginal growth.

    **Conclusion & Interpretation:**
    - **Result: 0.57 GB Marginal Growth (Memory-Capacity-Bound)**. Without prefix caching, a single GPU supports only 1-2 concurrent users at Turn 3. Prefix caching reduces the marginal KV footprint by nearly 3x, rescuing the unit economics.
