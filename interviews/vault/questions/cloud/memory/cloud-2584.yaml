title: Cost Speed and Quality Tradeoffs for 70B QLoRA Full Fine-Tuning and LoRA
scenario: 'You are evaluating fine-tuning a 70B model with: (A) QLoRA on 1 GPU ($2/hr, 3 days), (B) full fine-tuning on 16 GPUs with FSDP ($32/hr, 1 day), (C) LoRA without quantization on 4 GPUs ($8/hr, 2 days).'
question: 'Which 70B fine-tuning option is best across quality, cost, and speed: QLoRA, full fine-tuning, or unquantized LoRA?'
details:
  realistic_solution: 'Option A (QLoRA, 1 GPU): cost = 72h * $2/hr = $144. It is cheapest, but also slowest at 3 days and may lose some quality from quantized base weights. Good for prototyping and budget-constrained experiments. Option B (full fine-tune, 16 GPUs): cost = 24h * $32/hr = $768. It is fastest and usually the highest-quality option, but costs 5.3x more than QLoRA and 2x more than unquantized LoRA. Option C (LoRA, 4 GPUs): cost = 48h * $8/hr = $384. It is the middle option on cost and speed, avoids QLoRA quantization noise, and is often the best default balance when the prompt does not provide measured quality scores. Recommendation: choose C as the balanced production path, use A for cheap iteration, and reserve B for cases where evaluation shows the full fine-tune quality gain is business-critical.'
  common_mistake: |
    **The Pitfall:** Blindly choosing full fine-tuning simply because it delivers the absolute maximum quality.
    **The Rationale:** Engineers optimize for raw model performance without factoring in the massive infrastructure cost required.
    **The Consequence:** Spending 5.3x the budget for a marginal 3-5% performance improvement that is statistically indistinguishable in many downstream tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - (A) 1 GPU @ $2/hr for 72h.
    - (B) 16 GPUs @ $32/hr for 24h.
    - (C) 4 GPUs @ $8/hr for 48h.

    **Calculations:**
    - Option A (QLoRA): $2 * 72 = $144.
    - Option B (Full): $32 * 24 = $768.
    - Option C (LoRA): $8 * 48 = $384.
    - Relative cost: Full is 5.3x QLoRA and 2x LoRA; LoRA is 2.7x QLoRA.
    - Relative speed: Full takes 24h, LoRA takes 48h, QLoRA takes 72h.

    **Conclusion & Interpretation:**
    - **Result: Three-Way Tradeoff**. QLoRA wins cost, full fine-tuning wins speed and likely quality, and unquantized LoRA is the best balanced choice unless measured quality requires full fine-tuning.
