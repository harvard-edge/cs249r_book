title: KV Cache Memory Bandwidth Bottleneck
scenario: You are deploying a 70B parameter standard transformer model on a single node with 4x A100 80GB GPUs. During profiling of the autoregressive generation phase, you observe that GPU compute utilization is under 5%, but HBM memory bandwidth utilization is pegged at 98%. As you increase the batch size from 8 to 64 with a sequence length of 2048, the latency per generated token increases linearly, and overall throughput plateaus.
question: What is causing memory bandwidth saturation during 70B autoregressive decoding, and which component should you redesign?
details:
  realistic_solution: The root cause is the autoregressive KV cache. During decoding, every generated token attends over the previous tokens for all active sequences, so KV-cache reads grow with batch size and sequence length and can saturate HBM bandwidth while compute units sit idle. GQA reduces KV heads by 8x, shrinking the 2048-token cache from about 5.37GB to about 0.67GB per sequence, raising the memory-limited batch capacity from about 33 to about 268 sequences under the stated 180GB KV budget.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is model weight loading or self-attention compute.
    **The Rationale:** Candidates overlook that generation latency is heavily dominated by repeatedly fetching the growing KV cache from memory.
    **The Consequence:** Attempting to optimize compute kernels rather than shrinking the cache via GQA.
  napkin_math: |
    **Assumptions & Constraints:**
    - MHA KV Cache/Token: 2 (K,V) * 2 bytes * 8192 hidden * 80 layers = 2,621,440 bytes ≈ 2.62 MB decimal.
    - Context Size: 2048 tokens.
    - Available VRAM: 320 GB - 140 GB = 180 GB.

    **Calculations:**
    - MHA Cache per seq: 2,621,440 bytes/token * 2048 tokens = 5,368,709,120 bytes ≈ 5.37 GB.
    - Max MHA Batch Size: 180 GB / 5.37 GB ≈ 33 sequences.
    - GQA (8x reduction) Cache per seq: 5.37 GB / 8 ≈ 0.67 GB.
    - Max GQA Batch Size: 180 GB / 0.67 GB ≈ 268 sequences.

    **Conclusion & Interpretation:**
    - **Result: Batch Size ~268 (Memory-Bandwidth-Bound)**. GQA reduces the KV cache by 8x, increasing memory-limited concurrency and reducing the HBM traffic that drives the decoding plateau.
