title: KV Cache Memory Bandwidth Bottleneck
scenario: You are deploying a 70B parameter standard transformer model on a single node with 4x A100 80GB GPUs. During profiling of the autoregressive generation phase, you observe that GPU compute utilization is under 5%, but HBM memory bandwidth utilization is pegged at 98%. As you increase the batch size from 8 to 64 with a sequence length of 2048, the latency per generated token increases linearly, and overall throughput plateaus.
question: What is causing memory bandwidth saturation during 70B autoregressive decoding, and which component should you redesign?
details:
  realistic_solution: The root cause is the autoregressive KV cache, not model weights or dense matmul compute. During decoding, every new token repeatedly reads K/V tensors for all prior tokens across all active sequences, so HBM traffic grows with batch size and sequence length while compute utilization stays low. On a 4xA100 node the KV cache is sharded or paged across GPUs alongside tensor-parallel weights, so batch capacity is a placement-dependent estimate rather than one contiguous 180GB pool. Redesign the attention/KV component with GQA or MQA, plus paged attention and cache layout improvements, because reducing KV heads directly shrinks the bandwidth-heavy cache reads.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is model weight loading or self-attention compute.
    **The Rationale:** Candidates overlook that generation latency is heavily dominated by repeatedly fetching the growing KV cache from memory.
    **The Consequence:** Attempting to optimize compute kernels rather than shrinking the cache via GQA.
  napkin_math: |
    **Assumptions & Constraints:**
    - MHA KV cache/token for the full model: 2 (K,V) * 2 bytes * 8192 hidden * 80 layers = 2,621,440 bytes ≈ 2.62 MB decimal.
    - Context Size: 2048 tokens.
    - Node memory: 4 * 80GB = 320GB total, but weights, runtime buffers, tensor-parallel shards, and cache placement consume per-GPU memory; there is no single contiguous 180GB KV pool.
    - Use the 180GB residual only as an optimistic node-level envelope, then treat concurrency as layout-dependent.

    **Calculations:**
    - Full-model MHA cache per sequence: 2,621,440 bytes/token * 2048 tokens = 5,368,709,120 bytes ≈ 5.37 GB before sharding/paging overhead.
    - Optimistic node-level MHA envelope: 180GB / 5.37GB ≈ 33 sequences, but real capacity depends on per-GPU shard balance, fragmentation, attention kernel workspace, and interconnect costs.
    - GQA (8x reduction) Cache per seq: 5.37 GB / 8 ≈ 0.67 GB.
    - Optimistic node-level GQA envelope: 180GB / 0.67GB ≈ 268 sequences, again not an exact batch-size guarantee.
    - Bandwidth scales with bytes read from the KV cache each generated token, so the 8x KV reduction is the relevant redesign lever even when exact capacity is lower.

    **Conclusion & Interpretation:**
    - **Result: KV-cache reads are the memory-bandwidth bottleneck.** GQA/MQA and paged cache layout reduce the repeated KV traffic; the 33-to-268 sequence estimate is only an optimistic node-level envelope, not an exact physical batch limit for a 4xA100 layout.
