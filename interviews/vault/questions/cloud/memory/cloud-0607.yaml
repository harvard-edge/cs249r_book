title: The HBM3e Bandwidth Ceiling
scenario: Your team just got a cluster of H200 GPUs. Your manager expects a 43% speedup across all workloads based on the bandwidth increase over the H100. After benchmarking, some models got the full speedup while others saw zero improvement.
question: Which workloads actually benefit from the extra bandwidth, and which don't?
details:
  realistic_solution: Only memory-bound workloads benefit. The key is the arithmetic intensity relative to the roofline ridge point. Any workload with arithmetic intensity below 206 Ops/Byte remains deep in the bandwidth-limited regime and sees the full 43% gain. Workloads already above 295 Ops/Byte are purely compute-bound and see no improvement.
  common_mistake: |
    **The Pitfall:** Assuming more bandwidth means everything runs faster.
    **The Rationale:** Candidates confuse memory-bound regimes with compute-bound regimes and treat hardware upgrades as universal multipliers.
    **The Consequence:** Hardware upgrades are deployed for workloads that cannot utilize them, resulting in wasted capital and zero latency improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 memory bandwidth: 3.35 TB/s, compute: 989 TFLOPS.
    - H200 memory bandwidth: 4.8 TB/s, compute: 989 TFLOPS.

    **Calculations:**
    - H100 Ridge Point = 989 TFLOPS / 3.35 TB/s = 295 Ops/Byte.
    - H200 Ridge Point = 989 TFLOPS / 4.8 TB/s = 206 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound.** Workloads with arithmetic intensity < 206 Ops/Byte see the full 43% speedup, while those > 295 Ops/Byte see zero improvement.
