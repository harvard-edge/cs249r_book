title: The KV-Cache VRAM Budget (cloud-0042)
scenario: You are scoping the VRAM requirements for serving a 70B model with a 128,000 token context window. The model has 80 layers, a head dimension of 128, and uses Grouped-Query Attention (GQA) with 8 KV-heads. Assume a single user request with a batch size of 1.
question: "How much VRAM is needed just for the FP16 KV-cache for one 128,000-token request?"
details:
  realistic_solution: The calculation accounts for sequence length, the number of layers, the number of KV heads, the dimension of each head, and the data type. The cache stores a Key and a Value vector for each token, requiring a 2x multiplier, and 2 bytes per element for FP16 precision.
  common_mistake: |
    **The Pitfall:** Using the wrong number of heads or forgetting the 2x factor for Keys and Values.
    **The Rationale:** Candidates conflate standard Multi-Head Attention query heads with Grouped-Query Attention KV heads, or miscalculate data type sizes.
    **The Consequence:** Drastically overestimating or underestimating memory requirements, leading to incorrect hardware provisioning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Sequence (S) = 128,000.
       * Layers (L) = 80.
       * KV Heads (H_kv) = 8.
       * Head Dimension (D_h) = 128.
       * FP16 Bytes (B) = 2.
    2. **Calculations:**
       * KV Cache Size = 2 (Key + Value) * L * H_kv * D_h * S * B.
       * Size = 2 * 80 * 8 * 128 * 128,000 * 2 = 41,943,040,000 bytes.
    3. **Conclusion & Interpretation:** **Result: 41.9 GB (Memory-Bound)**. The KV cache alone demands significant VRAM.
  options:
  - '~20 GB. (Calculated trap: Forgets 2x factor for Key and Value)'
  - '~140 GB. (Calculated trap: Forgets GQA, uses standard 64 MHA heads instead of 8 KV heads)'
  - '~42 GB. (Correct: 2 * 80 * 8 * 128 * 128,000 * 2 bytes)'
  - '~335 GB. (Calculated trap: Assumes FP32 precision and MHA instead of FP16 and GQA)'
  correct_index: 2
