title: The Adam Optimizer Memory Footprint
scenario: A team wants to fine-tune an 8 billion parameter model using the Adam optimizer with mixed precision on an 80 GB GPU.
question: Will the model and optimizer states fit into the 80 GB memory if you ignore activations and KV-cache?
details:
  realistic_solution: It will not fit. A reliable rule of thumb for mixed-precision training with Adam is that it requires approximately 16 bytes per model parameter. This accounts for FP16 parameters (2 bytes), FP16 gradients (2 bytes), and two 32-bit (4-byte) optimizer states (momentum and variance) plus a 32-bit master copy of the parameters, which are often maintained in FP32 for stable updates.
  common_mistake: |
    **The Pitfall:** Only accounting for the memory size of the FP16 model parameters on disk.
    **The Rationale:** Forgetting the substantial memory required for gradients and the Adam optimizer's FP32 master weights, momentum, and variance.
    **The Consequence:** Planning single-GPU fine-tuning runs that immediately crash with Out-Of-Memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8B parameters.
    - Mixed-precision AdamW (FP16 weights/grads, FP32 master/momentum/variance).

    **Calculations:**
    - Storage per parameter: 2 + 2 + 4 + 4 + 4 = 16 bytes.
    - Total state memory: 8B * 16 bytes = 128 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound.** The 128 GB requirement vastly exceeds the 80 GB GPU limit; ZeRO-offload or quantization is strictly necessary.
  options:
  - Yes, it fits. It only needs ~16 GB. (Weights Only Trap)
  - Yes, it fits. It needs ~64 GB. (Missing Gradients Trap)
  - No, it does not fit. It needs ~128 GB.
  - Yes, it fits. It needs ~32 GB. (Missing Adam State Trap)
  correct_index: 2
