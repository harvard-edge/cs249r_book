title: Long-Context Attention with Ring Attention on H100 Multi-Node
scenario: You are implementing Ring Attention for a 1M token context across 64 GPUs. Each GPU holds a sequence chunk of 15,625 tokens with head_dim=128 in BF16.
question: What is the KV communication volume per ring step and sequential non-overlapped total ring communication time?
details:
  realistic_solution: 'Ring Attention: each GPU holds a 15,625-token chunk and sends K,V chunks to the next GPU. Using decimal units, one K chunk is 15,625 × 128 × 2 bytes = 4,000,000 bytes = 4 MB, and V is another 4 MB, so each ring step transfers 8 MB per GPU. With 64 GPUs, each GPU performs 63 point-to-point steps. If the first 7 are intra-node NVLink steps and the remaining 56 are inter-node InfiniBand steps, sequential non-overlapped communication time is 7 × 8MB / 450GB/s = 0.124ms plus 56 × 8MB / 25GB/s = 17.92ms, or about 18.0ms total. This answers communication volume and time only; compute overlap is an implementation optimization, not required for the requested estimate.'
  common_mistake: |
    **The Pitfall:** Treating Ring Attention communication as equivalent to standard attention memory cost.
    **The Rationale:** Failing to recognize that Ring Attention replaces massive $N^2$ memory materialization with pipelined, point-to-point KV block passing.
    **The Consequence:** Incorrectly concluding that extreme long-context attention is fundamentally bound by interconnect bandwidth rather than compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Chunk size: 15,625 tokens, head_dim=128, BF16.
    - Decimal units: MB = 10^6 bytes, GB/s = 10^9 bytes/s.
    - 64 GPUs, so each GPU receives 63 remote KV chunks.
    - Total time assumes sequential, non-overlapped point-to-point transfers.

    **Calculations:**
    - K_chunk size = 15,625 * 128 * 2B = 4,000,000 bytes = 4 MB.
    - V_chunk size = 4 MB.
    - KV sent per ring step per GPU = 8 MB.
    - Intra-node traffic: 7 * 8 MB = 56 MB; 56 MB / 450 GB/s = 0.124 ms.
    - Inter-node traffic: 56 * 8 MB = 448 MB; 448 MB / 25 GB/s = 17.92 ms.
    - Total sequential communication time: 0.124 + 17.92 = 18.04 ms.

    **Conclusion & Interpretation:**
    - **Result: 8 MB per Step and About 18.0 ms Sequential Communication.** The communication estimate is dominated by the 56 inter-node steps; any compute overlap should be analyzed separately.
