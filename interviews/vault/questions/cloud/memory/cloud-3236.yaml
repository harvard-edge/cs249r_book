title: KV-Cache Pool Sizing for Throughput Optimization
scenario: You are configuring a vLLM deployment of Llama 3 70B on 4×A100-80GB (TP=4). Model weights take 35 GB per GPU (70B BF16 / 4).
question: How much memory per GPU should be allocated to the KV-cache pool in the 4×A100 TP=4 deployment, and what throughput does it enable?
details:
  realistic_solution: 'Per GPU: 80 GB total - 35 GB weights = 45 GB available. Reserve about 2 GB for prefill activations, 2 GB for CUDA/Triton workspace, 1 GB for OS/driver overhead, and 2 GB safety margin, leaving 45 - 2 - 2 - 1 - 2 = 38 GB per GPU for the KV-cache pool. For Llama 3 70B with 8 total KV heads under TP=4, each rank stores 2 KV heads: 2 (K+V) × 2 heads × 128 dim × 2B × 80 layers = 81,920 B = 80 KiB per token per GPU. Using decimal GB, 38 GB / 80 KiB ≈ 464K resident tokens. Because TP ranks serve the same requests, this is global sequence capacity, not 464K tokens multiplied by 4. At a 2K average context, that enables about 232 concurrent decode requests; at 8K, about 58. This is a concrete concurrency/decode-batch capacity metric. Actual tokens/s still depends on measured decode latency, but the KV pool is large enough to keep hundreds of 2K-context requests resident without stealing workspace memory. A vLLM memory utilization target around 0.91-0.92 matches this budget.'
  common_mistake: |
    **The Pitfall:** Allocating all remaining memory to KV-cache.
    **The Rationale:** Candidates forget that CUDA kernels need workspace memory for intermediate computations.
    **The Consequence:** Over-allocating to KV-cache causes CUDA Out-Of-Memory (OOM) errors during kernel execution, crashing the server.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4×A100-80GB (TP=4) running Llama 3 70B.
    - Weights take 35 GB per GPU (70B BF16 / 4).

    **Calculations:**
    - Available Memory: 80 GB - 35 GB (weights) - 2 GB (activations) - 2 GB (CUDA workspace) - 1 GB (OS) - 2 GB (Safety) = 38 GB available for KV.
    - KV per token (TP=4): 2 KV heads per GPU * 128 dim * 2 (K+V) * 2B * 80 layers = 80 KB per token per GPU.
    - Capacity: 38 GB decimal / 80 KiB ≈ 464,000 resident tokens per GPU/rank.
    - TP concurrency is global across ranks: at 2K avg context -> 464,000 / 2000 ≈ 232 concurrent requests; at 8K -> about 58.

    **Conclusion & Interpretation:**
    - **Result: Allocate about 38 GB per GPU to KV, enabling roughly 232 concurrent 2K-context requests.** Proper allocation avoids CUDA OOM while maximizing resident decode batch capacity.
