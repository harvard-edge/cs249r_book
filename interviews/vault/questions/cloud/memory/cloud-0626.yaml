title: The PagedAttention Block Size Trap
scenario: You are using vLLM to serve an LLM. You configure the PagedAttention block size to 256 tokens per block to reduce the metadata overhead in the memory allocator. However, you notice that your system supports 50% fewer concurrent requests than expected before throwing OOMs, and time-to-first-token (TTFT) latency spikes under load.
question: Why did a large block size destroy your capacity?
details:
  realistic_solution: Large block sizes increase internal fragmentation in the KV cache. Short or uneven-length sequences can leave much of their last block unused, so the same physical KV-cache budget holds fewer active tokens and supports fewer concurrent requests. Under load, that reduced effective cache capacity creates more admission pressure and can raise TTFT. The right block size is workload- and implementation-dependent; it balances allocator metadata overhead against fragmentation rather than following a fixed universal value.
  common_mistake: |
    **The Pitfall:** Assuming larger blocks uniformly improve throughput.
    **The Rationale:** Candidates incorrectly map CPU memory paging intuition to PagedAttention, where reducing allocation overhead is prioritized over internal fragmentation.
    **The Consequence:** The system suffers severe memory waste, crippling concurrency and spiking tail latencies.
  napkin_math: |
    **Assumptions & Constraints:**
    - PagedAttention block size: 256 tokens.
    - Illustrative single-block sequence tail: 50 live tokens in the final allocated block.

    **Calculations:**
    - Final block capacity: 256 tokens.
    - Unused slots in that block: 256 - 50 = 206 tokens.
    - Internal fragmentation for this block: 206 / 256 = 80.47%.

    **Conclusion & Interpretation:**
    - **Result: High Tail-Block Fragmentation (Memory-Bound)**. In this short-sequence example, the last block is ~80% unused. System-wide waste depends on the prompt and generation length distribution, but large blocks reduce effective KV-cache utilization for workloads with many short or uneven sequences.
