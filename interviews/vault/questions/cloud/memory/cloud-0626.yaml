title: The PagedAttention Block Size Trap
scenario: You are using vLLM to serve an LLM. You configure the PagedAttention block size to 256 tokens per block to reduce the metadata overhead in the memory allocator. However, you notice that your system supports 50% fewer concurrent requests than expected before throwing OOMs, and time-to-first-token (TTFT) latency spikes under load.
question: Why did a large block size destroy your capacity?
details:
  realistic_solution: 'Large block sizes cause massive internal fragmentation that wastes memory capacity. Because the GPU memory is artificially exhausted by padding, the system can support far fewer concurrent requests. Worse, incoming requests cannot start until a full 256-token block is available, causing allocation delays that spike TTFT under load. The optimal block size (typically 16 tokens) balances allocator metadata overhead against internal fragmentation.'
  common_mistake: |
    **The Pitfall:** Assuming larger blocks uniformly improve throughput.
    **The Rationale:** Candidates incorrectly map CPU memory paging intuition to PagedAttention, where reducing allocation overhead is prioritized over internal fragmentation.
    **The Consequence:** The system suffers severe memory waste, crippling concurrency and spiking tail latencies.
  napkin_math: |
    **Assumptions & Constraints:**
    - PagedAttention block size: 256 tokens.
    - Short response generation length: 50 tokens.

    **Calculations:**
    - Allocation: 1 full block (256 tokens).
    - Unused tokens in block: 256 - 50 = 206 tokens.
    - Waste percentage: 206 / 256 = 80.47%.

    **Conclusion & Interpretation:**
    - **Result: 80.47% Waste (Memory-Bound)**. A 256-token block size causes ~80% internal fragmentation for short responses, wasting VRAM and crippling system concurrency.
