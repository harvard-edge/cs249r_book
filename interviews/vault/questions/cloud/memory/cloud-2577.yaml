title: Cloud Deepspeed Zero L3 0
scenario: You are training a 65B model with AdamW in mixed precision on 32 GPUs. You have reserved 15 GB per GPU for activations.
question: What is the per-GPU memory footprint for ZeRO-1, ZeRO-2, and ZeRO-3, and which stage fits?
details:
  realistic_solution: '65B params. FP16 params: 130 GB. FP16 gradients: 130 GB. AdamW optimizer states (FP32 copy + m + v): 65B × 12B = 780 GB. Total: 1,040 GB. Budget per GPU: 80 - 15 = 65 GB. ZeRO-1 (shard OS): 130 + 130 + 780/32 = 284.4 GB per GPU. No. ZeRO-2 (shard OS+G): 130 + (130+780)/32 = 130 + 28.4 = 158.4 GB. No. ZeRO-3 (shard all): 1040/32 = 32.5 GB per GPU. Fits with 32.5 GB headroom! Alternative: ZeRO-2 + tensor parallelism (TP=4 within node): params/4 = 32.5 GB + 28.4 = 60.9 GB. Barely fits. ZeRO-3 is simpler and has more headroom.'
  common_mistake: |
    **The Pitfall:** Forgetting that ZeRO-2 still replicates full parameters on every GPU.
    **The Rationale:** Assuming ZeRO-2 solves memory issues for models larger than single-GPU capacity.
    **The Consequence:** OOM crashes immediately upon model initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - 65B Parameters. GPU memory budget: 80 GB - 15 GB = 65 GB.
    - FP16 Params: 130 GB. FP16 Gradients: 130 GB.
    - AdamW FP32 Optimizer States: 65B * 12 bytes = 780 GB.
    - Total Memory: 1040 GB.

    **Calculations:**
    - ZeRO-1 (shard OS): 130 + 130 + (780/32) = 284 GB/GPU.
    - ZeRO-2 (shard OS+G): 130 + (910/32) = 158 GB/GPU.
    - ZeRO-3 (shard all): 1040 / 32 = 32.5 GB/GPU.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound.** Only ZeRO-3 fits within the 65 GB VRAM budget (using 32.5 GB/GPU).
