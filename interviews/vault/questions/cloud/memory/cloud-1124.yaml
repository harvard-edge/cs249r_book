title: Memory Scaling of Widened Dense Layers
scenario: A cloud ML team is upgrading a massive recommendation system. A critical fully connected (dense) layer currently has an input and output dimension of 8,192, storing its weights in FP32 precision. To capture more complex user-item interactions, the research team proposes increasing both the input and output dimensions by a factor of 4, to 32,768.
question: How much additional FP32 GPU memory is needed when the dense layer grows from 8192x8192 to 32768x32768 weights?
details:
  realistic_solution: 'Recognize the quadratic relationship in dense connections. Calculate the new weight memory as 4.29 GB (1.07 billion parameters), resulting in an exact increase of 4,026.5 MB over the original 268.4 MB footprint.'
  common_mistake: |
    **The Pitfall:** Assuming that memory requirements scale linearly with layer width.
    **The Rationale:** When a dimension increases by 4x, it's a common mental shortcut to multiply the total parameter count by 4x.
    **The Consequence:** Erroneously predicting a 4x memory increase instead of the correct 16x quadratic increase, leading to severe out-of-memory (OOM) crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original dimensions: 8,192 x 8,192.
    - New dimensions: 32,768 x 32,768.
    - Precision: FP32 (4 bytes per parameter).

    **Calculations:**
    - Original memory: (8,192 * 8,192) * 4 = 268.4 MB.
    - New memory: (32,768 * 32,768) * 4 = 4,295.0 MB (~4.29 GB).
    - Scaling factor: (32,768 / 8,192)^2 = 4^2 = 16x.
    - Additional memory: 4,295.0 MB - 268.4 MB = 4,026.6 MB.

    **Conclusion & Interpretation:**
    - **Result: ~4 GB Additional Memory (Memory-Bound)**. Expanding dimensions by 4x results in a 16x quadratic increase in memory footprint, requiring an additional ~4 GB.
