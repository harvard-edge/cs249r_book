title: Cloud Through Silicon Vias L2 0
scenario: A hardware architect explains that HBM3 achieves massive bandwidth by stacking DRAM dies vertically.
question: Why can't traditional wire-bonding between stacked DRAM dies achieve HBM3's bandwidth density?
details:
  realistic_solution: TSVs are microscopic copper pillars etched directly through silicon dies, providing thousands of parallel vertical connections in the area where wire bonds would only fit dozens. Each TSV is ~5-10 micrometers in diameter vs. ~25 micrometers for wire bonds, enabling 1024+ simultaneous data paths per stack. This massive parallelism is how HBM achieves 1024-bit bus width vs. DDR5's 64-bit bus, yielding ~16x more bandwidth per pin.
  common_mistake: |
    **The Pitfall:** Confusing TSVs with interposers.
    **The Rationale:** Candidates mistakenly assume the interposer is what goes through the die, rather than recognizing it as the lateral silicon substrate that connects the stacks to the GPU.
    **The Consequence:** Fundamental misunderstanding of 3D IC packaging.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM3: 1024-bit bus * 6.4 Gbps = 819.2 GB/s per stack. 4 stacks = 3276.8 GB/s.
    - DDR5: 64-bit bus * 6.4 Gbps = 51.2 GB/s per channel.

    **Calculations:**
    - Equivalent DDR5 channels = 3276.8 GB/s / 51.2 GB/s = 64.

    **Conclusion & Interpretation:**
    - **Result: 64 independent DDR5 channels required (Memory-Bound)**. TSVs provide parallel vertical connections that wire-bonding cannot match.
