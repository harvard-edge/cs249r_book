title: The Long-Context Attention Bottleneck
scenario: You are serving a 13B LLM with a 64k token context window on an A100. Profiling the prefill phase shows the standard Multi-Head Attention (MHA) layers take 800ms per request, with ALU utilization at a dismal 12%. The tech lead suggests upgrading to an H100 to get a 3x speedup on the prefill phase.
question: Would upgrading to H100 deliver a 3x speedup for 64k-token MHA prefill, or what should you change instead?
details:
  realistic_solution: Standard MHA materializes the $N \times N$ attention scores in HBM. For N=64k, this causes massive HBM read/write traffic, dragging the arithmetic intensity far below the roofline ridge point. Upgrading to H100 only provides a ~1.67x bandwidth increase, so you won't get a 3x speedup, and you are wasting expensive ALUs. Instead of new hardware, the architecture needs FlashAttention, which tiles the computation in SRAM, eliminating the $O(N^2)$ HBM accesses and shifting the workload back to the compute-bound regime.
  common_mistake: |
    **The Pitfall:** Assuming the H100's 3x compute will proportionally speed up the workload.
    **The Rationale:** Engineers look at ALU utilization and assume more ALUs are the answer.
    **The Consequence:** They upgrade hardware without addressing the algorithmic memory bandwidth bottleneck, wasting expensive compute resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard MHA HBM traffic: O(N^2).
    - Sequence length (N): 64,000.

    **Calculations:**
    - QK^T size: 64,000 * 64,000 * 2 bytes ≈ 8 GB per attention head.
    - FlashAttention HBM traffic: Drops to O(N * d).
    - Arithmetic Intensity: Increases from ~1 FLOP/byte to >200 FLOPs/byte.
    - H100 Memory Bandwidth improvement over A100: ~1.6x.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Standard MHA is memory-bound. Upgrading hardware yields only ~1.6x speedup, but FlashAttention shifts it to compute-bound.
