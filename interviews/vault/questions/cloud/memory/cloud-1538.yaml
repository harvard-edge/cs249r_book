title: Attention Matrix Allocation
scenario: You are profiling a Transformer model's inference step on an NVIDIA A100 GPU. A specific attention layer materializes a query-key attention score matrix of size B x H x S x S.
question: What is the FP16 memory footprint of the B=16, H=16, S=4096 attention score matrix, and will it fit in the 40MB L2 cache?
details:
  realistic_solution: 'The full attention matrix requires ~8.58 GB of memory, which far exceeds the 40MB L2 cache and must spill to HBM. To avoid this massive memory bandwidth bottleneck, IO-aware algorithms like FlashAttention-2 are used to tile the computation and keep intermediate blocks strictly in SRAM.'
  common_mistake: |
    **The Pitfall:** Only calculating the size of a single sequence or head.
    **The Rationale:** Candidates forget that the materialized attention matrix scales quadratically with sequence length across all heads and batches.
    **The Consequence:** Assuming the standard attention matrix fits in SRAM, completely missing the massive memory bandwidth bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - B=16, H=16, S=4096, FP16 (2 bytes), 40MB L2 Cache

    **Calculations:**
    - Memory = B * H * S^2 * 2 bytes = 16 * 16 * (4096)^2 * 2 = 256 * 16,777,216 * 2 = 8,589,934,592 bytes (~8.58 GB)

    **Conclusion & Interpretation:**
    - **Result: ~8.58 GB (Memory-Bandwidth-Bound)**. 8.58 GB >> 40 MB L2 cache; it must spill to HBM, necessitating IO-aware FlashAttention-2.
