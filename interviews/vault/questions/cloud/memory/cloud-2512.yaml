title: Cloud Through Silicon Vias L5 0
scenario: Your team is choosing between an accelerator with 6 HBM3 stacks (5 TB/s) and one with 4 HBM3 stacks (3.35 TB/s) for serving a memory-bandwidth-bound 70B LLM.
question: How do you evaluate the cost-performance trade-off between the 6-stack and 4-stack HBM3 accelerators for serving a 70B LLM?
details:
  realistic_solution: '70B model in FP16 = 140 GB. At batch=1 autoregressive decode, each token reads all weights once. With 3.35 TB/s: 140 GB / 3.35 TB/s = 41.8 ms/token ≈ 24 tok/s. With 5.0 TB/s: 140 GB / 5.0 TB/s = 28 ms/token ≈ 36 tok/s. The 6-stack design gives 50% more tokens/s. Cost per token: if 6-stack costs 40% more but serves 50% more tokens, it is more cost-efficient at high utilization.'
  common_mistake: |
    **The Pitfall:** Assuming compute (TFLOPS) is the bottleneck for LLM decode generation.
    **The Rationale:** Candidates often look at the peak TFLOPS specifications as the primary driver of performance.
    **The Consequence:** They select sub-optimal hardware because at batch=1, decode is purely memory-bandwidth-bound since each weight is read exactly once per generated token.
  napkin_math: |
    1. **Assumptions & Constraints:** 70B parameters, FP16 (140 GB). Batch=1 autoregressive decoding. Accelerator 1 = 5.0 TB/s, Accelerator 2 = 3.35 TB/s.
    2. **Calculations:** 4-stack throughput = 140 GB / 3.35 TB/s = 41.8 ms/token (~24 tokens/s). 6-stack throughput = 140 GB / 5.0 TB/s = 28 ms/token (~36 tokens/s). Performance gain = 36 / 24 = 1.5x (50%).
    3. **Conclusion & Interpretation:** **Result: 50% higher decode throughput on 6-stack. Memory-Bandwidth-Bound.**
