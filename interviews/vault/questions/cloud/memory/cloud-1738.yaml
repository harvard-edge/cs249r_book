title: Prefix Caching Trade-offs in Agentic LLM Serving
scenario: You are designing an LLM serving infrastructure using 8x H100 GPUs to serve a 70B parameter model with Grouped Query Attention. Your application is an agentic workflow where 90% of requests share a common 4,000-token system prompt, while the user input averages 500 tokens.
question: Should you add global prefix caching for the 90% shared 4,000-token prompt, and when would cache overhead outweigh its benefits?
details:
  realistic_solution: |
    Implement prefix caching for the 90% hit rate scenario, as it saves substantial memory and prefill work. For the shared 4,000-token prompt, cache one KV copy for the 90 matching requests instead of 90 separate copies. Add measured guardrails: disable or bypass prefix lookup when hit rate, lookup latency, eviction churn, or fragmentation make cache management cost more than the avoided prefill and KV allocation.
  common_mistake: |
    **The Pitfall:** Assuming prefix caching universally improves performance.
    **The Rationale:** This ignores radix tree lookup latency, cache eviction costs, and memory fragmentation overhead.
    **The Consequence:** Implementing caching for highly dynamic prompts or low hit rates degrades system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B GQA model: 80 layers, 8 KV heads, 128 dim, FP16 (2 bytes).
    - System Prompt: 4000 tokens. 100 concurrent requests, 90 of which share the exact prefix.

    **Calculations:**
    - KV Cache per Token: 2(K,V) * 80 layers * 8 KV heads * 128 dim * 2 bytes = 327,680 bytes (312.5 KiB).
    - Shared system prompt KV: 4000 * 327,680 bytes = 1.31 GB (about 1.22 GiB).
    - 90 matching requests without cache: 90 * 1.22 GiB = 109.8 GiB.
    - 90 matching requests with cache: 1.22 GiB shared.
    - Approximate savings for the shared cohort: 89 * 1.22 GiB = 108.6 GiB.

    **Conclusion & Interpretation:**
    - **Result: ~109 GiB saved for the shared-prefix cohort (Memory-Bound)**. Prefix caching is worthwhile while measured lookup and eviction overhead stays below the prefill compute and KV memory it avoids.
