title: 'Prefix Caching Trade-offs in Agentic LLM Serving'
scenario: You are designing an LLM serving infrastructure using 8x H100 GPUs to serve a 70B parameter model with Grouped Query Attention. Your application is an agentic workflow where 90% of requests share a common 4,000-token system prompt, while the user input averages 500 tokens.
question: Should you add global prefix caching for the 90% shared 4,000-token prompt, and when would cache overhead outweigh its benefits?
details:
  realistic_solution: 'Implement prefix caching for the 90% hit rate scenario, as it saves massive memory. Justify the design by showing that 100 concurrent requests without caching would consume ~125 GB of KV cache just for the system prompt, limiting batch size. With caching, the system prompt takes ~1.25 GB. The system should include a dynamic fallback or eviction policy that disables caching lookups if the hit rate drops below a threshold (e.g., 20%) where the CPU-side radix tree management latency exceeds the time saved by avoiding KV recomputation.'
  common_mistake: |
    **The Pitfall:** Assuming prefix caching universally improves performance.
    **The Rationale:** This ignores radix tree lookup latency, cache eviction costs, and memory fragmentation overhead.
    **The Consequence:** Implementing caching for highly dynamic prompts or low hit rates degrades system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Grouped Query Attention, 8 heads, 128 dim, 80 layers, FP16 (2B).
    - System Prompt: 4000 tokens. 100 concurrent requests.
    
    **Calculations:**
    - KV Cache per Token: 2 * 2B * 8 heads * 128 dim * 80 layers = 327,680 bytes (320 KB).
    - System Prompt: 4000 * 320 KB = ~1.25 GB.
    - 100 Requests without Cache: 100 * 1.25 GB = 125 GB.
    - 100 Requests with Cache: 1.25 GB shared.
    
    **Conclusion & Interpretation:**
    - **Result: ~123.75 GB saved (Memory-Bound)**. Prefix caching saves ~123.75 GB of VRAM, massively increasing batch capacity.
