title: The Gradient Checkpoint Trade-off
scenario: You're training a 32-layer transformer and running out of memory. Your colleague suggests gradient checkpointing.
question: For a 32-layer transformer, how much memory does gradient checkpointing every k layers save, and what compute overhead does it add?
details:
  realistic_solution: |
    Without checkpointing, training stores activations for all 32 layers. With checkpointing every k layers, a simple segment model stores about ceil(32/k) checkpoint activations plus a working buffer for up to k layers during recomputation, so activation memory scales as ceil(32/k) + k layer-activation units rather than 32. The extra compute is the non-checkpointed forward work that must be replayed during backward: about 32 - ceil(32/k) layer-forwards. Under a common assumption that backward costs about two forward passes, the wall-time overhead is roughly (32 - ceil(32/k)) / (3 × 32). The best k depends on the memory target and accepted recompute; k=4, 5, 6, and 8 all land near the same 12-layer activation footprint in this simplified model, with k=4 having the least recompute among that group.
  common_mistake: |
    **The Pitfall:** Believing gradient checkpointing eliminates all activation memory.
    **The Rationale:** Candidates don't understand that checkpointing trades recomputation for memory by storing activations only at specific boundaries.
    **The Consequence:** They miscalculate memory requirements and fail to optimize the checkpointing interval $k$, leading to excessive recomputation overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32-layer transformer.
       - Activation memory baseline: 128 MB/layer.
    2. **Calculations:**
       - Baseline (No Checkpointing): 32 layers * 128 MB = 4,096 MB (4 GB) activations. Recompute overhead: 0%.
       - Simplified checkpoint memory: (ceil(32/k) + k) * 128 MB.
       - k=4: (8 + 4) * 128 MB = 1,536 MB. Savings = 1 - 1,536/4,096 = 62.5%. Extra replay = 32 - 8 = 24 layer-forwards, or ~24/(3*32) = 25% training-step overhead if backward is ~2x forward cost.
       - k=6: (6 + 6) * 128 MB = 1,536 MB. Savings = 62.5%. Extra replay = 32 - 6 = 26 layer-forwards, or ~27% training-step overhead under the same assumption.
       - k=8: (4 + 8) * 128 MB = 1,536 MB. Savings = 62.5%. Extra replay = 28 layer-forwards, or ~29% training-step overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Memory/Compute Trade-off.** For this 32-layer, 128 MB/layer example, k=4 reduces activation memory from 4.0 GB to 1.5 GB and adds about 25% training-step overhead under the stated cost model. Other k values can have similar memory but more recompute, so "optimal" must be tied to the chosen memory target and compute budget.
