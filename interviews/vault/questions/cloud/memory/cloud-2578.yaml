title: Flat Versus Hierarchical ZeRO Communication for a 30B Model on 64 GPUs
scenario: For a 30B model on 64 GPUs across 8 nodes (NVLink intra-node, 100 Gbps inter-node), you must select a parallelism strategy.
question: 'Which is more communication-efficient for the 30B model: flat ZeRO-3 across 64 GPUs or hierarchical ZeRO, and why?'
details:
  realistic_solution: 'Option A (flat ZeRO-3): parameters are sharded across all 64 GPUs, so parameter all-gathers for forward and backward cross node boundaries, and gradient reduce-scatter also crosses nodes. With a 60 GB FP16 model, a simple per-step accounting is 60 GB * 3 communication phases * 7/8 cross-node fraction = 157.5 GB over the 100 Gbps fabric, or 157.5 / 12.5 = 12.6s before overlap. Option B (hierarchical ZeRO): shard parameters within each 8-GPU NVLink node and replicate the node-level shard group across the 8 nodes. Parameter all-gathers stay on NVLink; the main cross-node exchange is data-parallel gradient synchronization, about 2 * 60 GB * 7/8 = 105 GB, or 8.4s before overlap. Option B is more communication-efficient because it keeps latency-sensitive parameter gathers off the slow inter-node link, at the cost of more replicated state across nodes.'
  common_mistake: |
    **The Pitfall:** Applying ZeRO-3 uniformly across all nodes without considering network topology.
    **The Rationale:** Engineers fail to realize that inter-node Ethernet/InfiniBand is an order of magnitude slower than intra-node NVLink.
    **The Consequence:** Massive network bottlenecks during the forward/backward passes as parameters are fetched across slow inter-node links.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30B model (60GB at FP16).
    - 64 GPUs across 8 nodes.
    - Network: NVLink intra-node, 100 Gbps (12.5 GB/s) inter-node.

    **Calculations:**
    - Flat ZeRO-3 (Option A): cross-node traffic = 60GB * 3 phases * (7/8 cross-node factor) = 157.5 GB. Time = 157.5 / 12.5 = 12.6s.
    - Hierarchical ZeRO (Option B): parameter gathers stay within each NVLink node; cross-node gradient synchronization = 60GB * 2 * (7/8) = 105 GB. Time = 105 / 12.5 = 8.4s.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound by Inter-Node Links.** Hierarchical ZeRO reduces estimated cross-node traffic by 52.5 GB per step, saving about 4.2s before overlap by keeping parameter all-gathers on NVLink.
