title: GPU Sizing for 70B Model Sharding
scenario: You are deploying a 70-billion parameter LLM in FP16 precision for inference on a cluster featuring A10G GPUs. Your target batch size and context length require an additional 20 GiB of total VRAM combined across the deployment for the KV cache and intermediate activations.
question: How many A10G GPUs are required to tensor-shard the 70B FP16 LLM with 20 GiB total KV cache and activation memory?
details:
  realistic_solution: Calculate the total required memory footprint (160 GiB) and divide by the GPU capacity (24 GiB) to find the absolute capacity minimum (7 GPUs). In practice, an 8-GPU tensor-parallel configuration may be preferred for communication topology and headroom, but 7 GPUs is the strict memory-capacity answer.
  common_mistake: |
    **The Pitfall:** Only dividing weight memory by GPU capacity, or treating topology recommendations as capacity requirements.
    **The Rationale:** Candidates forget KV cache overhead, or confuse a convenient tensor-parallel topology with a strict memory requirement.
    **The Consequence:** Deploying on 6 GPUs causes OOM, while calling 8 GPUs strictly required overstates the capacity need.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter LLM in FP16.
    - 20 GiB additional VRAM for KV cache and activations.
    - A10G GPU capacity: 24 GiB.

    **Calculations:**
    - Weight memory: 70B parameters * 2 bytes/param (FP16) = 140 GiB.
    - Total memory needed: 140 GiB (weights) + 20 GiB (KV/activations) = 160 GiB.
    - Minimum GPUs by capacity: 160 GiB / 24 GiB/GPU = 6.66 GPUs, so capacity requires 7 GPUs.
    - An 8-GPU deployment may be chosen for topology or headroom, but it is not required by this memory calculation.

    **Conclusion & Interpretation:**
    - **Result: 7 GPUs are required by memory capacity (Memory-Bound)**. An 8-GPU deployment is a performance and headroom recommendation, not the minimum capacity requirement.
