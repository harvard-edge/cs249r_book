title: Designing a Gradient Checkpointing Segment Strategy for a 70B Model on A100
scenario: You are fine-tuning a 70B dense Transformer on 8x A100 GPUs (Tensor Parallelism = 8). Model/optimizer states consume 52 GB per GPU, leaving ~28 GB for activations.
question: What gradient checkpointing strategy keeps activations under 28 GB per GPU while minimizing recomputation for this fine-tune?
details:
  realistic_solution: 'Use selective checkpointing: discard and recompute only the attention score tensors, which scale as O(S^2), while keeping MLP activations that scale linearly. This slashes activation memory at long sequences with minimal FLOPs overhead.'
  common_mistake: |
    **The Pitfall:** Applying uniform layer-level checkpointing.
    **The Rationale:** Candidates fail to recognize that O(S^2) attention tensors dominate memory, while O(S) MLP layers checkpoint much more cheaply.
    **The Consequence:** Unnecessary massive recomputation overhead by throwing away MLP activations.
  napkin_math: |
    **Assumptions & Constraints:**
    - VRAM budget = 80 - 52.5 = 27.5 GB.
    - B=2, S=2048, 8 local heads (TP=8), 96 layers.

    **Calculations:**
    - Attention tensor/layer = 2 * 8 * (2048^2) * 2 bytes = 134.2 MB.
    - Total saved (96 layers) = 134.2 MB * 96 = ~12.88 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Mitigation (Recomputing attention saves 12.88 GB, meeting the 28 GB limit).**
