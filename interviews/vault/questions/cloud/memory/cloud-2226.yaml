title: The Checkpoint Bandwidth Bottleneck
scenario: You are training a 175B parameter model across 4,096 GPUs using FSDP (Fully Sharded Data Parallel). A full checkpoint must save all optimizer states plus the model weights. The parallel filesystem provides 200 GB/s aggregate write bandwidth.
question: "How long does a synchronous checkpoint take, and what fraction of training time is lost if you checkpoint every 30 minutes?"
details:
  realistic_solution: 'Total checkpoint size: 175B params × 2 bytes (FP16 weights) + 175B × 4 bytes (FP32 master weights) + 175B × 4 bytes (first moment) + 175B × 4 bytes (second moment) = 2.45 TB. At 200 GB/s aggregate write bandwidth: 2,450 GB / 200 GB/s = 12.25 seconds. In practice, metadata overhead inflates this to ~30 seconds. At 30-minute intervals, a 30-second checkpoint costs 1.7% of training time.'
  common_mistake: |
    **The Pitfall:** Only counting the model weight size (350 GB for FP16) and forgetting optimizer states.
    **The Rationale:** Candidates forget that the Adam optimizer stores first and second moment estimates, tripling the required storage size.
    **The Consequence:** Severely under-provisioning storage bandwidth and completely miscalculating the training time lost to checkpointing.
  napkin_math: |
    **Assumptions & Constraints:**
    - 175B parameters.
    - Adam optimizer states + master weights.
    - 200 GB/s write bandwidth.

    **Calculations:**
    - Total checkpoint size = 175B (FP16 weights) + 175B (FP32 master) + 175B (FP32 momentum) + 175B (FP32 variance).
    - 350 GB + 700 GB + 700 GB + 700 GB = 2.45 TB.
    - Ideal write time = 2,450 GB / 200 GB/s = 12.25 seconds.
    - Real-world time with contention = ~30 seconds.
    - Time lost per 30 minutes = 30s / 1800s = 1.7%.

    **Conclusion & Interpretation:**
    - **Result: 1.7% overhead (I/O-Bound)**. At $2/GPU-hour, 1.7% overhead costs ~$3,342/day wasted on stalls.
