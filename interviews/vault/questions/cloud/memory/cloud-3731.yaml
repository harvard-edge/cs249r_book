title: Multi-Level Memory Hierarchy Specification for 405B LLM Inference
scenario: You are designing a tiered memory hierarchy system for serving Llama-3-405B (FP8 = 405GB) on a production cluster with H100s, NVMe SSDs, and DRAM. The model must serve 500 concurrent users with an 8192 token context.
question: What tiered memory strategy or limits are required to serve 500 concurrent 8192-token users for Llama-3-405B FP8 on H100s?
details:
  realistic_solution: 'Model weights require 405GB FP8, so an 8x H100 node provides enough aggregate HBM for the model: 640GB total, leaving about 235GB for KV and runtime overhead. Assume the KV cache is also stored in FP8 at 1 byte per element. KV cache per token is 2 tensors × 126 layers × 8 KV heads × 128 dim × 1 byte = 258,048 bytes. Per 8192-token user, that is 8192 × 258,048 bytes = 2.11GB. For 500 users, KV alone is about 1057GB, so one 8x H100 node cannot serve the stated requirement fully in HBM. Use a tier policy: keep active decode pages and recent attention windows in HBM, move idle or long-context pages to host DRAM, spill only cold sessions to NVMe, and enforce an HBM hot cap around 100 users per 8x H100 node before overhead. Serving all 500 users needs more GPU nodes, shorter contexts, lower concurrency, or explicit DRAM/NVMe offload with latency-aware admission limits.'
  common_mistake: |
    **The Pitfall:** Trying to fit the full model and all KV caches in GPU HBM without concurrency limits or CPU offload.
    **The Rationale:** Candidates size the cluster purely based on model weights and underestimate the massive KV cache required for 500 users at 8K context.
    **The Consequence:** Out-of-memory errors in production or severe thrashing as the system attempts to page massive KV caches to slow storage.
  napkin_math: |
    **Assumptions & Constraints:**
    - 405GB FP8 model, 126 layers, 8 KV heads, 128 dim.
    - KV cache is stored in FP8 at 1 byte per element.
    - 8x H100 node has 640GB HBM total, leaving about 235GB after model weights before overhead.

    **Calculations:**
    - Per-token KV cache: 2 * 126 * 8 * 128 * 1B = 258,048 bytes.
    - Per-user KV at 8192 tokens: 8192 * 258,048 bytes = 2,113,929,216 bytes = about 2.11GB.
    - 500 users * 2.11GB/user = about 1057GB KV cache.
    - Total for 500 users = 405GB model + 1057GB KV = 1462GB, which exceeds the 640GB HBM in one 8x H100 node.
    - HBM-only concurrency cap before overhead: 235GB available KV / 2.11GB per user = about 111 users.
    - Practical safety cap: 100 users gives 405GB + 211GB KV = 616GB, leaving about 24GB for runtime overhead and fragmentation.
    - Tier policy: HBM for active decode pages, DRAM for warm inactive or long-context pages, NVMe only for cold sessions that can tolerate paging latency.

    **Conclusion & Interpretation:**
    - **Result: 500 Concurrent 8K Users Do Not Fit in One 8x H100 HBM Tier.** Use a lower hot-concurrency cap, shorter contexts, more GPU nodes, or KV offload. The 100-user case is only an example of an HBM-feasible limit.
