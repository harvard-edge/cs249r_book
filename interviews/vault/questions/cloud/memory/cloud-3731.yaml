title: Multi-Level Memory Hierarchy Specification for 405B LLM Inference
scenario: You are designing a tiered memory hierarchy system for serving Llama-3-405B (FP8 = 405GB) on a production cluster with H100s, NVMe SSDs, and DRAM. The model must serve 500 concurrent users with an 8192 token context.
question: What tiered memory strategy or limits are required to serve 500 concurrent 8192-token users for Llama-3-405B FP8 on H100s?
details:
  realistic_solution: 'Model: 405GB FP8. Single H100: 80GB — only 20% of model fits. Strategy: tensor parallelism across 8 H100s = 640GB HBM total > 405GB. Full model in HBM. KV cache: per token per layer KV (GQA with 8 KV heads) = 2\times8\times128\times1B = 2048 bytes. 126 layers: 258,048 bytes/token. 500 users \times 8192 tokens = 4,096,000 tokens \times 258,048 bytes \approx 1057GB — impossible on 8 GPUs. Fix: must limit concurrency or context, or use CPU offload. Realistic limit: 100 concurrent, 8192 context, FP8 KV. KV: 100\times8192\times258,048 bytes \approx 211GB. Total memory needed: 405GB (model) + 211GB (KV) = 616GB. This requires 8\timesH100s (640GB) to fit entirely in HBM.'
  common_mistake: |
    **The Pitfall:** Trying to fit the full model and all KV caches in GPU HBM without concurrency limits or CPU offload.
    **The Rationale:** Candidates size the cluster purely based on model weights and underestimate the massive KV cache required for 500 users at 8K context.
    **The Consequence:** Out-of-memory errors in production or severe thrashing as the system attempts to page massive KV caches to slow storage.
  napkin_math: |
    **Assumptions & Constraints:**
    - 405GB FP8 model, 126 layers, 8 heads, 128 dim.

    **Calculations:**
    - Per-token KV cache: 2 * 126 * 8 * 128 * 1B = 258,048 bytes.
    - 500 users * 8192 tokens * 258,048 = ~1057GB KV cache.
    - Total (500 users) = 1462GB (Exceeds 8x H100 640GB limit).
    - Total (100 users) = 405GB + 211GB KV = 616GB.

    **Conclusion & Interpretation:**
    - **Result: 100 concurrent users at 8K context fits exactly in 616GB across an 8x H100 node**.
