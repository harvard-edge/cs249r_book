title: The Per-Token KV-Cache Cost
scenario: You are calculating the memory requirements for serving a large language model. The model has 40 layers, 64 attention heads per layer, and a head dimension of 128. If you are using FP16 precision.
question: "How much FP16 KV-cache memory does one added token consume for this 40-layer, 64-head, 128-dim-head model?"
details:
  realistic_solution: For each token in the sequence, every attention layer must store a Key (K) and a Value (V) tensor. The memory footprint is the product of the number of layers, the two tensors (K and V), the number of attention heads, the head dimension, and the byte size of the precision format (FP16).
  common_mistake: |
    **The Pitfall:** Forgetting to account for both Key and Value tensors (off-by-2x) or calculating for only a single layer.
    **The Rationale:** Candidates remember the `num_heads * head_dim` shape but forget the architectural reality of the Transformer block maintaining distinct K and V matrices across depth.
    **The Consequence:** Under-provisioning GPU memory for inference by 2x to 80x, resulting in catastrophic Out-of-Memory (OOM) errors in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layers: 40.
       - Heads: 64.
       - Head Dimension: 128.
       - Precision: FP16 (2 bytes per element).
    2. **Calculations:**
       - Elements per K/V tensor: 64 * 128 = 8,192 elements.
       - Bytes per layer: 2 tensors (K + V) * 8,192 elements * 2 bytes = 32,768 bytes.
       - Total bytes per token: 40 layers * 32,768 bytes/layer = 1,310,720 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: 1.31 MB per token.** The KV-cache scales linearly, acting as a massive **Memory-Capacity-Bound** constraint for long contexts.
  options:
  - About 655 KB
  - About 2.62 MB
  - About 32.7 KB
  - About 1.31 MB
  correct_index: 3
