title: Evaluating IO-Aware Attention Tiling on A100 Caches
scenario: Your team is deploying a custom LLM on NVIDIA A100 GPUs. You are designing an IO-aware fused attention kernel for 8K sequence lengths. Engineer A proposes sizing the Q, K, and V matrix tiles to fit optimally within the shared 40MB L2 cache to minimize expensive HBM reads. Engineer B argues for sizing the tiles strictly to fit within the 192KB Shared Memory of a single SM.
question: Which tiling strategy provides better utilization of the Tensor Cores, and why?
details:
  realistic_solution: Engineer B is correct. Tiling must target the 192KB Shared Memory (SRAM) per SM. While L2 is larger (40MB), its bandwidth (~4.1 TB/s) is shared across all 108 SMs. Shared Memory provides ~19 TB/s aggregate bandwidth, enough to sustain the 312 TFLOPS FP16 peak. By keeping attention tiles entirely in SRAM, the kernel achieves the roofline-predicted compute throughput.
  common_mistake: |
    **The Pitfall:** Focusing solely on minimizing HBM reads by maximizing L2 hit rates.
    **The Rationale:** Assuming the massive 40MB L2 cache is fast enough to feed the Tensor Cores continuously.
    **The Consequence:** Failing to realize that L2 bandwidth is shared across all SMs and is fundamentally insufficient to saturate local compute units.
  napkin_math: |
    1. **Assumptions & Constraints:** A100 GPU (312 TFLOPS peak). L2 Bandwidth = ~4.1 TB/s. SRAM Bandwidth = ~19 TB/s. Arithmetic Intensity = 50 FLOPs/Byte.
    2. **Calculations:** Max compute sustained by L2 = 4.1 TB/s × 50 FLOPs/Byte = 205 TFLOPS (Limits performance). Max compute sustained by SRAM = 19 TB/s × 50 FLOPs/Byte = 950 TFLOPS (Exceeds peak, fully satiates).
    3. **Conclusion & Interpretation:** **Result: SRAM tiling is required to reach 312 TFLOPS. Memory-Bandwidth-Bound.**
