title: The Checkpoint Cascade Failure
scenario: A 50,000-GPU training run checkpoints every 15 minutes using asynchronous checkpoint-to-NVMe followed by a background flush to Lustre. The Lustre filesystem has 1 TB/s aggregate write bandwidth. After 3 days of stable training, checkpoint writes suddenly start failing. NVMe drives on hundreds of nodes report 'no space left on device,' yet each drive is 3.84 TB and each checkpoint shard is only 200 MB. No other jobs are running on these nodes.
question: "What caused this cascade, and how do you prevent it?"
details:
  realistic_solution: 'This is a classic producer-consumer imbalance in the storage pipeline. Each checkpoint produces 200 MB per GPU on NVMe. With 8 GPUs per node, each checkpoint deposits 1.6 GB on the local NVMe. At 15-minute intervals, that is 6.4 GB/hour accumulating on NVMe. The background flush to Lustre must drain this at least as fast. The total cluster checkpoint size is 50,000 × 200 MB = 10 TB. At 1 TB/s Lustre write bandwidth, draining takes 10 seconds — easy. But the failure mode is subtle: Lustre bandwidth is shared. If any other I/O load (data loading, logging, other jobs'' checkpoints) consumes even 30% of Lustre bandwidth, the drain rate drops. Over 3 days (288 checkpoints), the NVMe accumulation grows: 288 × 1.6 GB = 461 GB produced per node. If the drain rate lags by even 5% per checkpoint (flushing 1.52 GB instead of 1.6 GB), the deficit is 288 × 0.08 = 23.04 GB, plus the unflushed checkpoints themselves. Once NVMe fills, the synchronous DRAM→NVMe phase blocks, training stalls, and the backpressure cascades. Prevention: monitor NVMe free space and checkpoint drain lag as a first-class metric, implement checkpoint garbage collection (keep only the 3 most recent on NVMe), and reserve dedicated Lustre bandwidth for checkpoint traffic.'
  common_mistake: |
    **The Pitfall:** Assuming a single checkpoint is the problem because it is small (200 MB).
    **The Rationale:** Engineers look at the static size of a checkpoint shard and conclude it cannot fill a massive 3.84 TB drive.
    **The Consequence:** They fail to account for the accumulation rate versus the drain rate over time, allowing unflushed shards to pile up silently and crash the job.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Node: 8 GPUs, NVMe Drive = 3.84 TB.
       - Checkpoint Shard = 200 MB/GPU.
       - Interval = 15 mins (4/hour).
       - Storage Drain Lag = 5%.
    2. **Calculations:**
       - Per-Node Accumulation Rate: 8 * 200 MB = 1.6 GB / checkpoint = 6.4 GB/hour.
       - Drain Deficit (5% lag): 0.05 * 6.4 GB/hour = 0.32 GB/hour.
       - Buildup over 72 hours: 72 * 0.32 = 23.04 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Cascade Failure from Shared Storage Contention.** A slight drop in shared Lustre bandwidth causes an irreversible NVMe fill-up over days.
