title: The Checkpoint Cascade Failure
scenario: A 50,000-GPU training run checkpoints every 15 minutes using asynchronous checkpoint-to-NVMe followed by a background flush to Lustre. The Lustre filesystem has 1 TB/s aggregate write bandwidth. Each 3.84 TB NVMe drive already uses about 3.4 TB for cached training data, leaving about 440 GB for checkpoint staging. After 3 days of stable training, checkpoint writes suddenly start failing. NVMe drives on hundreds of nodes report 'no space left on device,' yet each checkpoint shard is only 200 MB. No other jobs are running on these nodes.
question: What caused this cascade, and how do you prevent it?
details:
  realistic_solution: 'This is a producer-consumer imbalance in the checkpoint pipeline. Each checkpoint produces 200 MB per GPU on NVMe. With 8 GPUs per node, each checkpoint deposits 1.6 GB on the local NVMe; at 15-minute intervals that is 6.4 GB/hour per node. The background flush must drain at least that rate and must delete local staging files only after durable completion on Lustre. The full cluster checkpoint is 50,000 × 200 MB = 10 TB, so the aggregate filesystem can drain one checkpoint in about 10 seconds if the checkpoint pipeline actually receives that bandwidth. The failure occurs when the async flusher, namespace operations, retries, or per-node throttles fall behind the producer rate; backlog then grows silently. With only about 440 GB of staging headroom, three days of unflushed per-node checkpoint shards is enough to fill NVMe. Prevention: monitor free staging headroom and oldest-unflushed-checkpoint age, enforce backpressure before the drive is full, reserve checkpoint
    flush bandwidth, and garbage-collect staged checkpoints immediately after durable Lustre completion.'
  common_mistake: |
    **The Pitfall:** Assuming a single checkpoint is the problem because it is small (200 MB).
    **The Rationale:** Engineers look at the static size of a checkpoint shard and conclude it cannot fill a massive 3.84 TB drive.
    **The Consequence:** They fail to account for the accumulation rate versus the drain rate over time, allowing unflushed shards to pile up silently and crash the job.
  napkin_math: |
    **Assumptions & Constraints:**
    - Node: 8 GPUs, 3.84 TB NVMe, about 440 GB free for checkpoint staging after cached training data.
    - Checkpoint shard: 200 MB/GPU.
    - Interval: 15 minutes = 4 checkpoints/hour.
    - Failure case: async flush/delete makes no net progress for affected nodes.

    **Calculations:**
    - Per-node checkpoint production: 8 * 200 MB = 1.6 GB/checkpoint.
    - Per-node production rate: 1.6 GB * 4/hour = 6.4 GB/hour.
    - Three-day production: 6.4 GB/hour * 72 hours = 460.8 GB per node.
    - Full-cluster checkpoint size: 50,000 * 200 MB = 10 TB; at 1 TB/s, the aggregate write takes about 10s if the flush path gets scheduled and completes cleanly.

    **Conclusion & Interpretation:**
    - **Result: Producer-consumer backlog (Capacity-Bound)**. With only about 440 GB of staging headroom, a stalled or persistently lagging async flush can fill local NVMe in roughly three days even though each shard is small.
