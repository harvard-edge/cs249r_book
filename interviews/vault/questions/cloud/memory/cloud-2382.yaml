title: Federated Personalization of Wake Words
scenario: Smart earbuds (Cortex-M4, 256KB SRAM) must personalize a 50KB TFLite Micro keyword spotting model to a user's voice without sending audio to the cloud. The companion phone app orchestrates Federated Learning. A standard backprop pass for a 50KB model requires ~150KB of memory for activations.
question: How would you personalize the 50KB keyword model on 256KB earbuds without sending audio or exceeding SRAM?
details:
  realistic_solution: |
    Personalize on the earbuds by freezing the keyword model's feature extractor and training only a tiny classifier or bias/adaptation head with batch size 1. The firmware should keep optimizer state minimal, for example SGD or a small quantized accumulator for the final layer only, so it does not need to retain full-model activations for backpropagation. The companion phone can orchestrate rounds, charging/network policy, and secure upload, but raw audio stays on the earbuds. If federated learning is used, only encrypted model deltas or final-layer updates are sent through the phone to the cloud aggregator for FedAvg; the personalized head can also remain local when the goal is purely per-user adaptation.
  common_mistake: |
    **The Pitfall:** Attempting to run full backpropagation on the MCU for the entire model.
    **The Rationale:** Engineers apply standard deep learning techniques without calculating the strict SRAM limitations of embedded devices.
    **The Consequence:** The training process immediately OOMs the microcontroller, making on-device personalization impossible.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 with 256KB SRAM.
    - Base OS + model = ~150KB, leaving 100KB available.
    - Model maps 64-dim embedding to 12 classes.
    - Only the final classifier is trained; the feature extractor is frozen.

    **Calculations:**
    - Fine-tuning final layer only: 64 * 12 = 768 weights.
    - At 8-bit precision, trainable weights = 768 bytes.
    - FP16 gradients for the final layer = 768 * 2 bytes = 1.5KB.
    - SGD has no second-moment optimizer state; even one FP16 accumulator adds another ~1.5KB.
    - Batch size 1 retained activations/logits are tiny: 64 + 12 values, well under 1KB even with scratch buffers.
    - Total incremental training state is roughly 4-6KB, far below the ~100KB available SRAM budget.

    **Conclusion & Interpretation:**
    - **Result: final-layer-only training fits in SRAM (Memory-Capacity-Bound)**. Freezing the feature extractor keeps weights, gradients, optimizer state, and activations safely within the 256KB SRAM limit.
