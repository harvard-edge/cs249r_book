title: The KV-Cache Fragmentation
scenario: You are serving a 13B model on a single 80GB GPU. You know the weights take 26GB, leaving 54GB for KV-cache. A single user request takes exactly 1GB of KV-cache. Therefore, you configure the server to accept 54 concurrent requests. However, after an hour of operation, the server OOMs and crashes when serving only 35 concurrent requests.
question: Where did the missing 19GB of VRAM go?
details:
  realistic_solution: 'The missing 19GB was lost to KV-cache memory fragmentation. Without PagedAttention, each request pre-allocates a contiguous VRAM block for the maximum possible sequence length. The fix is PagedAttention, which allocates KV-cache in small, non-contiguous blocks.'
  common_mistake: |
    **The Pitfall:** Assuming a Python memory leak.
    **The Rationale:** Candidates see missing memory over time and immediately assume standard garbage collection failures, confusing CPU RAM leaks with GPU VRAM layout.
    **The Consequence:** The candidate wastes weeks profiling Python code while the server continues to crash from lack of PagedAttention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Usable VRAM: 80GB - 26GB = 54GB.
    - Single request KV size: 1GB.

    **Calculations:**
    - Theoretical Concurrency: 54GB / 1GB = 54.
    - Fragmentation Waste: Static allocation wastes ~60% space.
    - Effective Capacity: 54GB x 40% = ~21.6GB.

    **Conclusion & Interpretation:**
    - **Result: 19 GB (Memory-Fragmentation-Bound)**. The missing 19GB is wasted VRAM solved by PagedAttention.
