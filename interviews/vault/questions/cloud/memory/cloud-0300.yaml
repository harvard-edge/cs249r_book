title: The 7B Inference Memory Check
scenario: You're planning the deployment of a 7-billion parameter LLM for a new RAG feature. As a first step, you need to select a GPU.
question: "What is the minimum VRAM required to simply load the model's weights in FP16 precision?"
details:
  realistic_solution: Approximately 14 GB. Each parameter in FP16 (half-precision floating-point) requires 2 bytes of storage. This is the baseline just for the model weights; a production deployment would also need to account for the KV cache, operating system overhead, and the CUDA runtime.
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for inference with those for training, or using INT8 rules.
    **The Rationale:** Candidates mix up different deployment modes (training vs inference) or quantization levels.
    **The Consequence:** They drastically overestimate memory (assuming optimizer states are needed) or underestimate it (assuming 1 byte/param), leading to poor GPU selection.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 7 Billion.
       - Precision: FP16.
    2. **Calculations:**
       - Bytes per parameter (FP16): 2 bytes.
       - Total VRAM: 7,000,000,000 * 2 bytes = 14,000,000,000 bytes = 14 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Loading the weights alone strictly requires 14 GB of VRAM, ignoring KV cache and CUDA runtime overhead.
  options:
  - 7 GB
  - 14 GB
  - 28 GB
  - 112 GB
  correct_index: 1
