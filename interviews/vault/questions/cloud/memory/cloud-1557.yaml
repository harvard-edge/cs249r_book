title: Diagnosing p99 Latency Spikes from Dynamic Allocation
scenario: You are deploying a ResNet-152 model for high-throughput batch inference (batch size 128) on an NVIDIA GPU. During profiling, you notice that the 99th percentile (p99) latency spikes unpredictably from 45ms to over 150ms, despite average GPU utilization remaining around 65%. A timeline trace reveals frequent host-side stalls between kernel launches, specifically during the creation of intermediate activation tensors where the caching allocator falls back to synchronous `cudaMalloc` calls due to fragmentation.
question: 'How can graph compilation and memory planning eliminate this bottleneck?'
details:
  realistic_solution: 'Use a compiler like TensorRT or TorchInductor to perform ahead-of-time memory planning. The compiler analyzes the model''s graph and pre-calculates a single, contiguous memory workspace (e.g., a 3GB arena for all batch 128 activations). It assigns exact static byte offsets to every intermediate tensor based on their lifespan, completely bypassing the dynamic allocator and stabilizing p99 latency.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing host-side allocator overhead as a compute bottleneck.
    **The Rationale:** Candidates often assume latency spikes are caused by thermal throttling, PCIe transfer issues, or slow compute kernels rather than addressing dynamic memory allocation overhead.
    **The Consequence:** Wasting time suggesting smaller batch sizes or faster GPUs instead of applying graph compilation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dynamic allocation overhead: ~20-50 µs per layer.
    - ~400 operations in ResNet-152.

    **Calculations:**
    - Host overhead = 400 * 50 µs = 20ms.
    - If the allocator fragments and hits `cudaMalloc`, sync overhead adds >50ms.

    **Conclusion & Interpretation:**
    - **Result: >50ms host overhead eliminated (Memory Allocation Bottleneck)**. Static planning allocates one contiguous memory workspace at startup, completely eliminating runtime `cudaMalloc` overhead and resolving the latency spikes.
