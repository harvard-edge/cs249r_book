title: 'The Lustre Stripe Throughput'
scenario: 'A Lustre parallel filesystem has 100 Object Storage Targets (OSTs), each capable of 1 GB/s sequential read throughput. A training job reads a single large file that has been striped across 50 of these OSTs.'
question: 'What aggregate read throughput can the 50-OST-striped file achieve, and what happens if it is stored on only 1 OST?'
details:
  realistic_solution: 'Maximum throughput is 50 GB/s, because the file is striped across 50 OSTs, each contributing up to 1 GB/s. If the file were stored on a single OST, throughput would be limited to 1 GB/s — a 50x reduction. This is why parallel filesystems stripe large files across many targets: it converts a sequential I/O bottleneck into a parallel one. Conversely, millions of small files that each land on a single OST create a metadata and throughput bottleneck, which is the ''small file problem'' in ML data pipelines.'
  common_mistake: |
    **The Pitfall:** Assuming the job gets the full 100 GB/s aggregate bandwidth regardless of striping.
    **The Rationale:** Candidates confuse total cluster throughput with per-file throughput, forgetting that a single file can only read in parallel from the specific OSTs it actually spans.
    **The Consequence:** Massively overestimating data pipeline speed and starving the GPUs of data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 OSTs total, 1 GB/s per OST
    - File striped across 50 OSTs
    - Cluster requirement: 1,000 GPUs * 50 MB/s = 50 GB/s

    **Calculations:**
    - Striped Throughput = 50 OSTs * 1 GB/s = 50 GB/s aggregate
    - Unstriped Throughput = 1 OST * 1 GB/s = 1 GB/s aggregate

    **Conclusion & Interpretation:**
    - **Result: 50 GB/s (I/O-Bound)**. The 50-OST stripe exactly matches the cluster's requirement; an unstriped file would severely starve the GPUs.
