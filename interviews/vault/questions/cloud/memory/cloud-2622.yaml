title: Memory Reduction Strategy Selection
scenario: 'A 7B model needs fine-tuning on a single A100. Full fine-tuning needs ~154GB. Option A: Gradient checkpointing (saves 60% activation memory, 30% slower). Option B: LoRA (r=16, trains only 0.1% of params, may lose 1-2% accuracy). Option C: Use 2 GPUs with ZeRO Stage 3.'
question: Which memory reduction approach should be used for 7B fine-tuning on a single 80GB GPU, and why?
details:
  realistic_solution: 'The 154GB breaks down as: ~14GB weights + ~14GB gradients + ~84GB optimizer + ~42GB activations. Option A: Gradient checkpointing reduces activations from ~42GB to ~17GB. New total: 14+14+84+17 = 129GB. Still exceeds 80GB. Option C: 2 GPUs with ZeRO-3 splits optimizer+gradients+weights, giving ~(14+14+84)/2 + 42 = 98GB/GPU — still OOM on 80GB without CPU offloading! Option B: LoRA with r=16 trains ~7M params. Optimizer states: 7M \times 12 = 84MB. Gradients: 7M \times 2 = 14MB. Total: 14GB weights + 0.1GB LoRA overhead + ~42GB activations = ~56GB. Fits on one GPU. Best choice if 1-2% accuracy trade-off is acceptable.'
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing is a magic bullet that fixes all OOM errors.
    **The Rationale:** Candidates know that gradient checkpointing drastically reduces activation memory, but fail to realize that for 7B models, optimizer states (not activations) often dominate the footprint.
    **The Consequence:** Checkpointing only drops memory to 129GB, meaning the job still crashes instantly despite the optimization effort.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model, 80GB GPU. Baseline Full FT: 154 GB.

    **Calculations:**
    - Checkpointing: reduces activations to 17 GB. Total = 129 GB (Fails).
    - ZeRO-3 (2 GPUs): Splits states. Total = 98 GB/GPU (Fails).
    - LoRA (r=16): 7M params. Optimizer = 84 MB. Total = 14 GB + 0.1 GB + 42 GB = 56 GB.

    **Conclusion & Interpretation:**
    - **Result: LoRA is the only viable single-GPU option at 56 GB**.
