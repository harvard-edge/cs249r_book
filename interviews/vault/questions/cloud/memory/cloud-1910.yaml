title: DLRM Embedding Sparse Scatter Bottleneck
scenario: You are profiling a Deep Learning Recommendation Model (DLRM) on an Nvidia A100 GPU (2 TB/s
  memory bandwidth). The embedding lookup phase executes 10 million random sparse memory accesses per
  second, fetching a 128-byte embedding vector each time. Calculate the total data transferred per second
  and the effective memory bandwidth utilization. Identify the structural bottleneck causing this poor
  utilization.
question: "What data transfer rate and bandwidth utilization do 10 million 128-byte sparse accesses produce, and what bottleneck causes it?"
details:
  realistic_solution: The effective bandwidth is merely 1.28 GB/s (0.064% of 2 TB/s). The system is bottlenecked
    by the memory controller's maximum transaction rate and HBM access latency (~100ns) for uncoalesced
    reads. Solutions involve caching hot embeddings, batching requests, or using techniques like hash-based
    aggregations to improve locality.
  common_mistake: Candidates calculate the 1.28 GB/s throughput but incorrectly assume the operation is
    compute-bound because bandwidth utilization is so low (<0.1%), missing the memory latency and transaction
    bottlenecks inherent to irregular sparse access.
  napkin_math: Data Transfer = 10,000,000 lookups/s * 128 bytes/lookup = 1,280,000,000 bytes/s (~1.28
    GB/s). Bandwidth Utilization = 1.28 GB/s / 2000 GB/s = 0.064%.
