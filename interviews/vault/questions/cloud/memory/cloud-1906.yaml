title: DLRM Embedding Lookup Bandwidth Calculation
scenario: You are profiling the embedding lookup stage of a Deep Learning Recommendation Model (DLRM) on an A100 GPU (2000 GB/s bandwidth). The model uses a batch size of 2048, with 200 sparse lookups per item. Embeddings are 256-dimensional FP16 vectors. Assume perfectly random access with zero cache hits.
question: What is the memory read volume per batch, and what is the theoretical bandwidth-bound maximum batches per second for the lookup stage?
details:
  realistic_solution: Recognize that sparse lookups have zero arithmetic intensity and are entirely memory-bandwidth bound. Calculate the exact read volume per batch based on batch size, feature count, vector dimension, and data type size, then divide the GPU's memory bandwidth by this volume.
  common_mistake: |
    **The Pitfall:** Attempting to calculate FLOPs for the lookup operation or incorrectly sizing the batch bandwidth.
    **The Rationale:** Candidates forget that sparse lookups have zero arithmetic intensity and fail to multiply the dimension by the FP16 byte size.
    **The Consequence:** Drastically miscalculating the hardware throughput limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 Memory Bandwidth: 2,000 GB/s (2,000,000 MB/s).
       - Batch size: 2048 items.
       - Lookups: 200 per item.
       - Vector: 256-dimensional FP16 (2 bytes per element).
    2. **Calculations:**
       - Read Volume = 2048 (items) * 200 (lookups) * 256 (dim) * 2 bytes = 209,715,200 bytes.
       - Data Transfer = 209.7 MB per batch.
       - Throughput = 2,000,000 MB/s / 209.7 MB/batch ≈ 9,537 batches/sec.
    3. **Conclusion & Interpretation:** **The lookup stage has zero arithmetic intensity and is strictly Memory-Bound, achieving a maximum theoretical throughput of ~9,537 batches/sec.**
