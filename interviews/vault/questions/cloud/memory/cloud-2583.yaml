title: Cloud Qlora L3 0
scenario: You are fine-tuning a 70B model with QLoRA. Calculate the total memory footprint including optimizer states.
question: "What is the total QLoRA memory footprint for the 70B model, including adapters, gradients, optimizer states, and activations?"
details:
  realistic_solution: |
    Base model NF4: 70B × 0.5 bytes = 35 GB. LoRA adapter params per layer: 4 projections × 2 matrices (A: dim×rank + B: rank×dim) = 4 × (8192×32 + 32×8192) × 2 bytes = 4 × 2 × 8192 × 32 × 2 = 4.19 MB per layer. 80 layers: 4.19 × 80 = 335 MB. AdamW optimizer on adapters: 335 MB × 6 (FP32 copy + momentum + variance, each 2x FP16 size) = 2.01 GB. Gradients: 335 MB. Activations (with gradient checkpointing): ~8 GB. Total: 35 + 0.335 + 2.01 + 0.335 + 8 = 45.7 GB. Fits on a single 48 GB GPU.
  common_mistake: |
    **The Pitfall:** Forgetting optimizer states for the LoRA adapters.
    **The Rationale:** Engineers assume that because adapters are small (~335 MB), their optimizer overhead is negligible.
    **The Consequence:** The model fails with an OOM error because AdamW optimizer states require 6x the adapter parameter size (~2 GB), pushing it over the 48 GB limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B base model in NF4 (0.5 bytes/param).
       - 80 layers, 4 proj/layer, rank 32, dim 8192, FP16.
    2. **Calculations:**
       - Base NF4 = 70B * 0.5 bytes = 35 GB.
       - LoRA params = 80 * 4 * 2 * 8192 * 32 * 2 bytes = 335 MB.
       - AdamW states = 335 MB * 6 = 2.01 GB.
       - Activations = ~8 GB.
       - Total = 35 + 0.335 + 2.01 + 8 = ~45.3 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound**. The total footprint is ~45.7 GB, which barely fits on a 48 GB GPU.
