title: Specifying Gradient Checkpointing Requirements in a Model Training SLA
scenario: You are writing the training infrastructure specification for a new 30B production model. The training SLA requires (1) memory utilization no more than 90% of HBM capacity, (2) training throughput at least 350 tokens/sec/GPU, and (3) training must complete 500B tokens within 60 days on 256 GPUs.
question: What checkpointing and sharding configuration satisfies the 90% HBM, 350 tokens/sec/GPU, and 500B-token-in-60-days constraints?
details:
  realistic_solution: |
    A viable specification is ZeRO-3 for parameters, gradients, and optimizer state plus selective activation checkpointing every 2 transformer layers. For a 30B FP16/BF16 model with FP32 Adam states, ZeRO-3 shards roughly 60 GB of weights, 60 GB of gradients, and 240 GB of optimizer state across 256 GPUs, or about 1.4 GB/GPU before communication buckets and framework overhead. If checkpointing every 2 layers keeps activations near 11.5 GB/GPU and a 20 GB runtime/bucket reserve is included, the job remains well under the 72 GB/GPU HBM budget.

    Throughput must use a consistent recompute assumption: with a 25% measured overhead, 520 tok/s/GPU becomes 390 tok/s/GPU, satisfying the 350 tok/s/GPU SLA and producing about 518B total tokens across the 256-GPU cluster in 60 days.
  common_mistake: |
    **The Pitfall:** Specifying checkpointing granularity without verifying the resulting recompute overhead.
    **The Rationale:** Candidates over-checkpoint (e.g., every layer) to maximize memory headroom, failing to check the math against the throughput SLA.
    **The Consequence:** The memory constraint is passed, but throughput drops below 350 tokens/sec, causing the 60-day deadline to be missed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 90% of 80GB HBM = 72 GB budget.
    - 30B model in FP16/BF16 weights = 60 GB.
    - Gradients = 60 GB; FP32 Adam states = 240 GB; total sharded training state = 360 GB.
    - 256 GPUs; token target is total cluster tokens over 60 days.
    - Baseline measured throughput before checkpoint recompute = 520 tok/s/GPU.

    **Calculations:**
    - ZeRO-3 sharded state memory: (60 GB weights + 60 GB gradients + 240 GB optimizer) / 256 = 1.41 GB/GPU.
    - Add a conservative 20 GB/GPU reserve for communication buckets, CUDA/runtime overhead, temporary buffers, and allocator fragmentation.
    - Checkpoint every 2 layers: stored activations and active recompute segment ≈ 11.5 GB/GPU.
    - Estimated peak: 1.41 GB + 20 GB + 11.5 GB = 32.9 GB/GPU < 72 GB/GPU.
    - Throughput with 25% recompute overhead: 520 tok/s * 0.75 = 390 tok/s/GPU.
    - Total tokens: 256 GPUs * 390 tok/s * 60 days * 86400 s = 518B tokens.

    **Conclusion & Interpretation:**
    - **Result: All Constraints Satisfied**. ZeRO-3 plus checkpointing every 2 layers stays under the 90% HBM limit, exceeds 350 tok/s/GPU, and reaches about 518B total cluster tokens in 60 days.
