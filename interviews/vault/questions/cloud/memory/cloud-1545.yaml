title: Batch-1 Llama-2 70B A100-to-H100 Decode Speedup
scenario: Your team is evaluating a fleet upgrade from A100 to H100 GPUs to serve Llama-2 70B for a real-time chatbot application. The application strictly operates at batch size 1 to minimize time-to-first-token (TTFT). Leadership expects a 3.1x generation speedup based on the raw compute (TFLOPS) improvement.
question: Will H100s give the expected 3.1x speedup for batch-1 Llama-2 70B decoding, and what speedup should leadership expect?
details:
  realistic_solution: Recognize that autoregressive generation at batch size 1 is dominated by streaming model weights through HBM, so the relevant first-order limit is memory bandwidth rather than peak TFLOPs. Under the same model, sharding, and serving plan, the expected speedup is about 1.67x from the bandwidth ratio (3.35 TB/s / 2.0 TB/s), not the 3.1x compute ratio. To better utilize compute capacity, use techniques that increase reuse or reduce memory traffic, such as continuous batching, KV-aware scheduling, or speculative decoding.
  common_mistake: |
    **The Pitfall:** Assuming inference generation speed scales linearly with compute capability (TFLOPS).
    **The Rationale:** Non-specialists look at headline TFLOPS multipliers and assume they dictate bottom-line system speed.
    **The Consequence:** Promising a 3.1x speedup to leadership but only delivering 1.67x, leading to failed project expectations and wasted infrastructure spend.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: autoregressive decoding at batch size 1.
    - Batch-1 decoding is memory-bandwidth bound because each token step streams the same resident model weights through the GPU memory hierarchy.
    - Bandwidth: A100 = 2.0 TB/s, H100 = 3.35 TB/s.

    **Calculations:**
    - Let bytes moved per token step be W on A100 and approximately W on H100 for the same model and serving plan.
    - Tokens/sec_A100 ≈ 2.0 TB/s / W.
    - Tokens/sec_H100 ≈ 3.35 TB/s / W.
    - Speedup ≈ (3.35 TB/s / W) / (2.0 TB/s / W) = 3.35 / 2.0 = 1.675x.

    **Conclusion & Interpretation:**
    - **Result: About 1.7x speedup (Memory Bandwidth-Bound)**. Leadership should not expect the 3.1x TFLOPS ratio for batch-1 decoding; the relevant roofline limit is the bandwidth ratio.
