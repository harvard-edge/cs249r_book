title: KV-Cache Memory Fragmentation in Long-Running Services
scenario: Your vLLM serving instance has been running for 6 hours. Nvidia-smi shows 30 GB free GPU memory, but the system rejects new requests claiming insufficient memory. The KV-cache pool reports 35 GB allocated but only 22 GB actively used.
question: Why does vLLM reject new requests despite 30 GB free GPU memory and only 22 GB of 35 GB allocated KV-cache actively used?
details:
  realistic_solution: vLLM admits requests against its configured KV-cache block pool, not against raw free bytes reported by nvidia-smi. The 30 GB free GPU memory may be outside the KV pool or reserved for weights, activations, CUDA workspaces, and allocator headroom, so it cannot automatically satisfy a request that needs more KV blocks. The 13 GB gap between 35 GB allocated and 22 GB actively used can include prefix-cache blocks retained for reuse, partially filled PagedAttention blocks, and allocator bookkeeping, but the data given is not enough to attribute the gap mostly to one cause. The rejection means the scheduler cannot find enough evictable/free KV blocks under the pool limits or block-table constraints. Fix by increasing or resizing the KV pool if safe, tuning/disabling prefix caching for low-overlap workloads, lowering max sequence/batch limits, and checking eviction metrics rather than treating raw GPU free memory as available KV capacity.
  common_mistake: |
    **The Pitfall:** Blaming GPU memory fragmentation (which is rare with modern allocators).
    **The Rationale:** Misunderstanding the difference between raw GPU memory and the internally managed vLLM KV-cache block pool.
    **The Consequence:** Wasting time restarting the service or trying to defragment GPU memory instead of tuning the prefix caching eviction policies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Pool: 35 GB. Active: 22 GB. Gap: 13 GB.
    - 1000 concurrent requests. Average internal waste: 8 tokens/request.
    - Token size: 320 KB.

    **Calculations:**
    - Illustrative internal waste upper bound: 1000 requests * 8 tokens * 320 KB = 2,560,000 KB ≈ 2.56 GB decimal (about 2.44 GiB).
    - Remaining gap: 13 GB - 2.56 GB ≈ 10.44 GB, but this cannot be assigned to prefix caching from the given data alone.
    - Raw free GPU memory: 30 GB outside or beyond the configured KV-pool accounting does not imply 30 GB of allocatable KV blocks.

    **Conclusion & Interpretation:**
    - **Result: KV-pool capacity/block availability, not raw GPU free memory, controls admission.** Treat the 13 GB gap as diagnostic evidence to inspect prefix cache, fragmentation, and eviction behavior, not as a derived prefix-cache amount.
