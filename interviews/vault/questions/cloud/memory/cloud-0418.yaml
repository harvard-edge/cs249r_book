title: 'The 70B Inference Footprint'
scenario: 'You are deploying a 70 billion parameter Large Language Model for a new Retrieval-Augmented Generation (RAG) service. To select the right GPU instance, you first need to estimate the basic memory requirement.'
question: 'What is the approximate memory needed just to load the model weights for inference in half-precision (FP16)?'
details:
  realistic_solution: 'The correct answer is approximately 140 GB. For inference, the primary memory cost is storing the model parameters. With 70 billion parameters and using half-precision (FP16), each parameter requires 2 bytes.'
  common_mistake: |
    **The Pitfall:** Confusing training memory requirements with inference, or using the wrong byte multiplier.
    **The Rationale:** Engineers either allocate space for Adam optimizer states (which are 0 during inference) or erroneously assume FP16 uses 1 byte per parameter.
    **The Consequence:** Drastically over-provisioning (and overpaying for) cloud GPUs, or facing immediate OOM crashes on boot.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70 Billion parameters.
    - Precision: Half-precision (FP16).
    - FP16 bytes per parameter: 2 bytes.

    **Calculations:**
    - Memory for weights: 70,000,000,000 parameters * 2 bytes/parameter.
    - Total bytes: 140,000,000,000 bytes.
    - Conversion to GB: ~140 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound**. The base model weights require 140 GB of VRAM, mandating either multi-GPU tensor parallelism (e.g., 2x 80GB A100s) or INT8 quantization.
options:
- '70 GB'
- '14 GB'
- '140 GB'
- '1120 GB'
