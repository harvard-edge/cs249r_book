title: Bare-Metal MCU Memory Allocation Calculation
scenario: You are deploying an INT8 predictive maintenance CNN to a bare-metal Cortex-M4 microcontroller monitoring data center cooling fans. The MCU has 256KB of SRAM and 1MB of Flash. The bare-metal firmware and I/O drivers consume 80KB of SRAM. The model's weights are 150KB, and its maximum per-layer intermediate activation size is 90KB. Assuming 20KB of SRAM is strictly reserved for the call stack and interrupts, you must calculate the peak SRAM utilization during inference and determine if the model fits.
question: What is the peak SRAM utilization during Cortex-M4 inference, and does the 150KB-weight INT8 CNN fit?
details:
  realistic_solution: 'In bare-metal environments, model weights are stored in read-only Flash and accessed directly via Execute-in-Place (XIP) memory mapping. SRAM is only provisioned for mutable state: firmware variables, the tensor arena (intermediate activations), and the stack.'
  common_mistake: |
    **The Pitfall:** Assuming model weights must be fully loaded into SRAM alongside activations.
    **The Rationale:** Forgetting that bare-metal environments allow Execute-in-Place (XIP) memory mapping from Flash.
    **The Consequence:** Leading to an incorrect peak SRAM calculation of 340KB and falsely concluding the model will cause an Out-Of-Memory (OOM) error.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM available: 256 KB. Flash available: 1 MB.
    - Firmware footprint: 80 KB. Stack/Interrupts: 20 KB.
    - Model activations (Tensor Arena): 90 KB. Model weights: 150 KB.

    **Calculations:**
    - SRAM utilized by state: 80 KB (firmware) + 90 KB (activations) + 20 KB (stack) = 190 KB.
    - SRAM remaining: 256 KB - 190 KB = 66 KB.
    - Weights (150 KB) execute directly from Flash via XIP.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Pass)**. The INT8 weights do not consume SRAM, resulting in a peak SRAM utilization of 190 KB, leaving 66 KB free. The model comfortably fits.
