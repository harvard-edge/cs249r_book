title: 'Model Size Estimation: Realize Full Training Memory Budget for 7B Model on 4×H100'
scenario: You are sizing the per-GPU memory budget for fine-tuning a 7B model on 4 GPUs with ZeRO-2. You are using mixed precision (BF16 weights and activations, FP32 optimizer states) with a batch size of 8 per GPU, sequence length of 2048, and gradient checkpointing every 4 layers (10 checkpoints for 40 layers).
question: What is the per-GPU memory budget for fine-tuning a 7B model on 4 GPUs with ZeRO-2, and does it fit in 80GB?
details:
  realistic_solution: 'ZeRO-2: weights replicated (not sharded). Gradients + optimizer states sharded. Per GPU: Weights BF16: 7B×2B=14GB (replicated). Gradients BF16: 14GB/4=3.5GB (sharded). Adam FP32 (m+v): 7B×4B×2/4=14GB (sharded). Activations (batch=8, seq=2048, gradient checkpoint every 4 layers, 40 layers → 10 checkpoints): 10×8×2048×4096×2B=1.34GB. Total: 14+3.5+14+1.34=32.84GB < 80GB ✓. Utilization: 32.84/80=41.1%.'
  common_mistake: |
    **The Pitfall:** Incorrectly sharding the base parameters under ZeRO-2.
    **The Rationale:** Candidates often confuse ZeRO-2 with ZeRO-3, assuming everything is equally divided by the number of GPUs.
    **The Consequence:** Severe underestimation of the model memory footprint, potentially selecting instances with insufficient RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model, 4 GPUs.
    - ZeRO-2.
    - BF16 weights, FP32 optimizer.
    - Batch=8, Seq=2048.
    - 10 checkpoints.

    **Calculations:**
    - Weights (BF16, Replicated) = 7B * 2B = 14 GB.
    - Gradients (BF16, Sharded) = 14 GB / 4 = 3.5 GB.
    - Optimizer (FP32, Sharded) = (7B * 4B * 2) / 4 = 14 GB.
    - Activations = 10 * 8 * 2048 * 4096 * 2B = 1.34 GB.
    - Total = 14 + 3.5 + 14 + 1.34 = 32.84 GB.

    **Conclusion & Interpretation:**
    - **Result: Total per-GPU memory is 32.84 GB (ZeRO-2 Memory Footprint)**. Bottleneck: ZeRO-2 Memory Footprint.
