title: Evaluating KV Cache Memory Constraints and PagedAttention
scenario: 'You are deploying a custom 30B parameter LLM (FP16, 64 layers, 64 heads, 128 head dimension) on a node with 4x 80GB A100 GPUs (320GB total memory). The model weights consume 60GB across the GPUs. The product manager wants to guarantee a concurrent batch size of 128 users, each generating up to 2048 tokens. The serving team suggests using a naive static memory allocation for the KV cache to guarantee zero out-of-memory (OOM) errors during generation.'
question: Can static KV-cache allocation support batch 128 at 2048 tokens on 4×80GB A100s, and what serving architecture should replace it?
details:
  realistic_solution: |
    Demonstrate that the maximum KV cache requires 512GB, heavily exceeding the 260GB available memory. Reject static allocation and propose PagedAttention (like vLLM) to dynamically manage memory in blocks, eliminating internal fragmentation and allowing for safe oversubscription or dynamic batching.
  common_mistake: |
    **The Pitfall:** Failing to calculate the exact memory footprint of the KV cache.
    
    **The Rationale:** Candidates often assume OOMs are mostly caused by model weights, overlooking the severe memory footprint and fragmentation caused by static contiguous allocation of large context windows.
    
    **The Consequence:** Deploying a system that crashes reliably under peak load due to static memory exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 layers, 64 heads, 128 dim, 2 bytes/param.
    - Max KV per User: 2048 tokens. Batch size: 128.
    - Available VRAM: 320 GB (Total) - 60 GB (Weights) = 260 GB.

    **Calculations:**
    - KV per Token: 2 (K,V) * 2 bytes * 64 layers * 64 heads * 128 dim = 2 MB.
    - Max KV per User: 2 MB * 2,048 tokens = 4 GB.
    - Total KV for Batch 128: 128 * 4 GB = 512 GB.

    **Conclusion & Interpretation:**
    - **Result: 512 GB > 260 GB (Memory-Bound)**. The KV cache requires 512 GB, exceeding available VRAM by 252 GB, causing OOM.
