title: 'Model Size Estimation: Realize Full Memory Layout for 13B Model Serving on H100'
scenario: 'Concretely size every memory component for serving a 13B LLaMA-2 model on a single H100 in FP16 inference mode. Include: model weights, KV-cache pool (allocated at startup for max concurrency), activation buffers (forward pass), and framework overhead.'
question: How would you size the H100 memory budget for 13B LLaMA-2 FP16 serving and compute max concurrency at 1024 tokens?
details:
  realistic_solution: |
    Implement static allocation using an engine like vLLM (PagedAttention). Weights: 13B * 2B = 26 GB. Framework overhead (PyTorch CUDA context, allocator): ~2 GB. Activation buffers for 1 forward pass are negligible (~20 MB). KV-cache pool: 80 GB - 26 GB - 2 GB = 52 GB available. KV per token (MHA, 40 heads, 128 dim, 40 layers): 40 * 2 * 40 * 128 * 2B = ~800 KB/token. Pool capacity: 52 GB / 800 KB = 65,000 tokens. At avg seq length 1024 tokens: 65,000 / 1024 = 63 concurrent requests.
  common_mistake: |
    **The Pitfall:** Not pre-allocating the KV-cache pool at startup via a system like PagedAttention.
    **The Rationale:** Candidates assume memory can be dynamically allocated per request just like standard PyTorch training, leading to massive memory fragmentation.
    **The Consequence:** The system runs out of contiguous memory blocks rapidly, causing unexpected OOM crashes and failing to reach peak theoretical concurrency.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU capacity: 80 GB (H100).
    - Model: 13B parameters in FP16 (2 bytes/param).
    - Architecture: 40 layers, 40 heads, 128 dim.
    - Framework/Activations overhead: ~2 GB.

    **Calculations:**
    - Weights Budget: 13B * 2 bytes = 26 GB.
    - Available KV Pool: 80 GB - 26 GB - 2 GB = 52 GB.
    - KV per Token: 2 (K+V) * 40 heads * 128 dim * 2 bytes * 40 layers = 819,200 bytes (~800 KB/token).
    - Total Pool Tokens: 52 GB / 800 KB = 65,000 tokens.
    - Max Concurrency (at 1024 tokens avg): 65,000 / 1024 = 63.4 requests.

    **Conclusion & Interpretation:**
    - **Result: Memory Capacity-Bound.** The H100 can sustain a maximum of 63 concurrent requests at 1024 sequence length before OOM, heavily bottlenecked by KV cache capacity rather than compute.
