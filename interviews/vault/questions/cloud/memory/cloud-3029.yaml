title: 'Model Size Estimation: Design Quantization Strategy for Fitting 70B on Single H100'
scenario: You need to fit a 70B LLaMA model on a single GPU for low-latency single-request inference. Potential options include weight-only quantization, activation quantization, and mixed precision.
question: What quantization and memory layout would fit a 70B LLaMA model on one 80GB GPU for low-latency inference?
details:
  realistic_solution: Use weight-only quantization (W4A16) for the dense linear layers, keep activations in FP16/BF16, and consider keeping sensitive layers such as embeddings, output head, and normalization in higher precision. The 70B weights are roughly 35GB at pure INT4, but practical formats add scale/zero-point metadata and alignment overhead, so budget about 38-42GB for quantized weights. The LLaMA-70B KV cache at batch 1, sequence 4096, 80 layers, 8 KV heads, and head dim 128 is about 1.34GB in FP16. With runtime workspace and allocator headroom, a realistic single-GPU budget is roughly 45-55GB, leaving usable context and batching margin on an 80GB H100. INT4 weight fetch often improves memory bandwidth pressure during decode, but performance still depends on kernels, dequantization overhead, and batch/context shape.
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 quantization to all layers.
    **The Rationale:** Candidates often blindly apply a single quantization scheme across the entire model for simplicity.
    **The Consequence:** Quantizing highly sensitive layers like the embedding table and LM head causes catastrophic accuracy degradation compared to a mixed-precision approach.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single 80GB GPU. Batch = 1, Seq = 4096.
    - 70B parameters.

    **Calculations:**
    - Pure INT4 weights: 70B * 0.5 bytes = 35 GB.
    - Quantization metadata/alignment overhead at 10%: 35 GB * 0.10 = 3.5 GB.
    - Tied embedding/output table in FP16: 32K vocab * 8192 hidden * 2 bytes ≈ 0.52 GB. Untied heads would be about 1.05 GB.
    - KV cache (GQA): 1 batch * 4096 seq * 80 layers * 2(K,V) * 8 KV heads * 128 head_dim * 2 bytes = 1.34 GB.
    - Runtime workspace and allocator headroom: budget 5-10 GB.
    - Total planning budget: 35 + 3.5 + 0.5 to 1.0 + 1.34 + 5 to 10 ≈ 45-51 GB.

    **Conclusion & Interpretation:**
    - **Result: ~45-55 GB Planning Budget (Memory-Capacity-Bound)**. W4A16 can fit a 70B model on an 80GB GPU with practical headroom, but it is not a perfect 37GB fit once metadata, FP16-sensitive layers, KV cache, and runtime overhead are included.
