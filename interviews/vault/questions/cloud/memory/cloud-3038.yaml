title: 'Model Size Estimation: Realize FP8 vs. FP16 Memory Comparison for 70B on H100'
scenario: You are comparing the memory layout of a 70B LLaMA model in FP16 versus FP8 (E4M3) on an 80GB H100 GPU cluster.
question: How much H100 memory does a 70B LLaMA model need in FP16 vs FP8, and what KV-cache budget remains on 1, 2, and 4 H100s?
details:
  realistic_solution: 'FP16 requires 140GB, requiring at least 2 H100s. FP8 requires 70GB plus ~1% scaling factor overhead (70.7GB), barely fitting on a single H100. KV-cache is typically kept in FP16.'
  common_mistake: |
    **The Pitfall:** Assuming FP8 activation quantization is exactly half the memory of FP16 without overhead.
    **The Rationale:** Candidates forget that FP8 requires scaling factors (adding overhead) and that KV-cache is usually kept in FP16 for numerical stability.
    **The Consequence:** Overestimating available KV-cache budget and causing unexpected OOMs during long context generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Memory: 80GB H100.
       - Model: 70B parameters.
       - FP16 layout: 2 bytes per parameter (140GB).
       - FP8 layout: 1 byte per parameter + ~1% scaling factor overhead (70.7GB).
       - KV Cache: FP16 (800KB/token).
    2. **Calculations:**
       - FP16 on 2 H100s: 70GB/GPU. KV Budget = (80-70) * 2 = 20GB. Tokens = 20GB / 800KB = 25,000 tokens.
       - FP16 on 4 H100s: 35GB/GPU. KV Budget = 45GB/GPU. Total = 180GB = 225,000 tokens.
       - FP8 on 1 H100: 70.7GB < 80GB (barely fits). KV Budget = 9.3GB = ~11,625 tokens.
       - FP8 on 2 H100s: 35.35GB/GPU. KV Budget = 44.65GB/GPU. Total = 89.3GB = ~111,000 tokens.
    3. **Conclusion & Interpretation:** **FP8 barely fits on 1 H100 with a tiny 11K token budget. Shifting to 4 H100s in FP16 unlocks a massive 225K context window.**
