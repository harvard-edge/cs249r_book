title: MI300X Unified Memory for CPU-GPU Tensor Offloading vs H100 PCIe
scenario: A 180GB model with a 50GB working set and 130GB KV cache needs to be served using either CPU DRAM via PCIe 5.0 or unified memory on modern accelerators.
question: For a 180GB model with a 50GB working set and 130GB KV cache, how does PCIe offload compare with unified memory for cold cache fetch latency?
details:
  realistic_solution: |
    Compare the cold miss path, not vendor-specific memory capacity claims. If a 1GB cold KV block is offloaded to host DRAM over PCIe 5.0, the transfer floor is about 1GB / 64GB/s = 15.6ms before driver, page-fault, and scheduling overhead. A unified-memory system can avoid explicit copies and simplify placement, but a cold page resident in host memory is still limited by the CPU-GPU/NUMA path, not by GPU-local HBM bandwidth. At a plausible 100GB/s effective cold-fetch path, the same 1GB miss is about 10ms. For p99, if cold misses occur in the slowest 1% of requests, add one cold-miss penalty to those requests; do not multiply by 10 misses from a 200-request batch. Unified memory reduces software overhead and may lower the cold-miss penalty, but it does not make host-resident cold KV behave like local HBM.
  common_mistake: |
    **The Pitfall:** Assuming unified memory provides uniform bandwidth to all components.
    **The Rationale:** The term "unified pool" leads engineers to ignore NUMA distances and driver-level access overheads.
    **The Consequence:** Placing critical hot parameters in CPU-pinned pages accessed by the GPU, incurring high latency through the IOMMU path and crashing inference speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe 5.0 offload bandwidth: about 64 GB/s per direction.
    - Unified-memory cold host-page bandwidth assumption: about 100 GB/s effective over the CPU-GPU/NUMA path.
    - Fetch block: 1GB.
    - p99 is a request-latency percentile; if cold misses land in the slowest 1%, add one cold-fetch penalty to those requests.

    **Calculations:**
    - PCIe 1GB fetch: 1GB / 64 GB/s = 15.6ms.
    - Unified-memory cold 1GB fetch: 1GB / 100 GB/s = 10ms.
    - p99 cold-miss request: baseline serving latency + one cold-fetch penalty, so PCIe adds at least 15.6ms and unified memory adds about 10ms under these assumptions.

    **Conclusion & Interpretation:**
    - **Result: cold-fetch bandwidth and placement bound.** Unified memory can reduce copy overhead and improve placement ergonomics, but cold host-resident KV is still much slower than local HBM and does not justify an 11ms p99 claim from a 900GB/s assumption.
