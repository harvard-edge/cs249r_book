title: MI300X Unified Memory for CPU-GPU Tensor Offloading vs H100 PCIe
scenario: A 180GB model with a 50GB working set and 130GB KV cache needs to be served using either CPU
  DRAM via PCIe 5.0 or unified memory on modern accelerators.
question: For a 180GB model with a 50GB working set and 130GB KV cache, how does PCIe offload compare
  with unified memory for cold cache fetch latency?
details:
  realistic_solution: 'H100 PCIe offloading: 80GB VRAM holds model weights. Keep hot KV cache (50GB) on
    GPU, offload cold KV (130GB) to CPU DRAM via PCIe 5.0. Fetch latency: 1GB KV block / 64 GB/s = 15.6ms
    per fetch. At 200 concurrent requests (assuming 5% cache miss rate, i.e., 10 fetches): 10 × 15.6ms
    = 156ms latency spike for p99. MI300X: 192GB unified pool. 180GB model weight in GPU-local HBM, 12GB
    for hot KV. Cold KV (130GB) in CPU-accessible pages of the unified pool — accessed via NUMA-local
    path with ~900 GB/s effective bandwidth. Fetch latency: 1GB / 900 GB/s = 1.1ms vs 15.6ms on H100 PCIe.
    The unified memory path bounds the p99 latency spike to 11ms, meeting strict serving SLAs.'
  common_mistake: '**The Pitfall:** Assuming unified memory provides uniform bandwidth to all components.

    **The Rationale:** The term "unified pool" leads engineers to ignore NUMA distances and driver-level
    access overheads.

    **The Consequence:** Placing critical hot parameters in CPU-pinned pages accessed by the GPU, incurring
    high latency through the IOMMU path and crashing inference speed.

    '
  napkin_math: '**Assumptions & Constraints:**

    - PCIe 5.0 offload bandwidth: ~64 GB/s per direction.

    - Unified memory NUMA bandwidth: ~900 GB/s.

    - Fetch block: 1GB.

    - Concurrent requests: 200 (5% miss rate = 10 misses for p99).


    **Calculations:**

    - PCIe 1GB fetch: 1GB / 64 GB/s = 15.6ms.

    - Unified memory 1GB fetch: 1GB / 900 GB/s = 1.1ms.

    - For p99: PCIe adds 10 * 15.6ms = 156ms.

    - For p99: Unified memory adds 10 * 1.1ms = 11ms.


    **Conclusion & Interpretation:**

    - **Result: Bandwidth-Bound.** PCIe severely blows the p99 latency budget. Unified memory''s faster
    access maintains sub-20ms cold-cache overhead.'
