title: 'Model Size Estimation: Diagnose KV-Cache Memory Leak on H100 Serving System'
scenario: A production LLM serving system (13B model, H100 80GB) shows memory usage growing from 35GB to 78GB over 4 hours under constant load (100 req/min, avg 512 token context, 128 token output). No OOM yet but the team expects failure.
question: What is causing memory to grow from 35GB to 78GB over 4 hours, and how long until the 80GB H100 OOMs?
details:
  realistic_solution: 'Root cause: KV-cache memory leak. If KV blocks were freed correctly, memory would stay roughly constant after requests finish. The observed growth is 78GB - 35GB = 43GB over 4 hours = 10.75GB/hr. At 100 req/min, that is 6000 req/hr, so the leak is 10.75GB / 6000 = about 1.8MB per request. A full request touches (512+128) tokens x 800KB/token = 512MB of KV-cache, so only a small fraction of each request is being retained. At the current 78GB, an 80GB H100 has about 2GB left: 2GB / 10.75GB/hr = 0.186 hr, or about 11 minutes until OOM if load and leak rate stay constant. Fix: audit KV-cache eviction and reference counting; some small KV blocks or metadata-backed allocations are likely not returned to the pool.'
  common_mistake: |
    **The Pitfall:** Blaming model weight memory for the steady growth.
    **The Rationale:** Engineers may be unfamiliar with the dynamic memory footprint of autoregressive decoding.
    **The Consequence:** Debugging focuses on the static model footprint (constant at 26GB) rather than the KV-cache blocks that are not being freed after request completion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model KV per token is 800KB.
    - Load: 100 req/min.

    **Calculations:**
    - Leak Rate: Growth is $78 - 35 = 43\text{GB}$ over 4 hours, which is $10.75 \text{ GB/hr}$.
    - Per Request: At 100 req/min (6000 req/hr), leak is $10.75 \text{ GB} / 6000 \text{ reqs} \approx 1.8 \text{ MB leaked per request}$.
    - Full Request KV Touched: $(512 + 128) \times 800\text{KB} = 512{,}000\text{KB} \approx 500\text{MB}$ per request.
    - Tokens Leaked Equivalent: $1.8\text{MB} / 800\text{KB} \approx 2.3$ tokens of KV-cache.
    - Time to OOM: Current headroom is $80 - 78 = 2\text{GB}$. At $10.75\text{GB/hr}$, time remaining is $2 / 10.75 = 0.186\text{hr} \approx 11$ minutes.

    **Conclusion & Interpretation:**
    - **Result: ~11 Minutes to OOM (Memory-Leak)**. The leak is small per request compared with the full KV-cache touched, which points to an eviction or reference-counting bug rather than intentional context accumulation.
