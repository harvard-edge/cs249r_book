title: 'LLM Fine-tuning OOM on NVIDIA H100: Diagnosing and Mitigating Memory Pressure'
scenario: You are fine-tuning a 100B parameter LLM on a distributed cluster. Each GPU boasts 80 GB of HBM3 memory. Despite using mixed-precision training (FP16), you consistently encounter Out-Of-Memory (OOM) errors during the forward and backward passes, even with a small batch size.
question: "How would you diagnose and mitigate OOMs for a 100B distributed LLM, including fragmentation, gradient accumulation, offload, and OS eviction effects?"
details:
  realistic_solution: The model states (weights, optimizer, gradients) vastly exceed an 80GB GPU. Implement ZeRO-Stage 3 (Fully Sharded Data Parallel) to shard parameters, gradients, and optimizer states across the cluster. Use gradient checkpointing (activation recomputation) to slash the activation memory footprint. Implement CPU offloading for optimizer states if HBM remains tight, and use Gradient Accumulation to simulate large batch sizes without inflating per-step activation memory. Monitor PyTorch's memory allocator to rule out fragmentation.
  common_mistake: |
    **The Pitfall:** Underestimating the FP32 AdamW optimizer state footprint.
    **The Rationale:** Candidates calculate the memory for FP16 weights (200GB) but forget that AdamW requires storing 32-bit master weights, momentum, and variance (12 bytes/param).
    **The Consequence:** OOMs persist because the engineer fails to shard the massive 1.2TB optimizer state, chasing minor activation optimizations instead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100B parameters.
       - Precision: FP16 weights/gradients, FP32 AdamW optimizer.
       - GPU: 80 GB HBM3.
    2. **Calculations:**
       - Weights (FP16): 100B * 2 bytes = 200 GB.
       - Gradients (FP16): 100B * 2 bytes = 200 GB.
       - Optimizer (FP32 master + 2 moments): 100B * 12 bytes = 1,200 GB.
       - Baseline memory: 1,600 GB (1.6 TB).
       - Per-GPU footprint (ZeRO-3 over 16 GPUs): 1,600 GB / 16 = 100 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 1.6 TB Total State.** The training is structurally **Memory-Capacity-Bound**. Even perfectly sharded across 16 GPUs, it requires 100GB/GPU, mandating a larger cluster (e.g., 32 GPUs) or aggressive CPU offloading.
