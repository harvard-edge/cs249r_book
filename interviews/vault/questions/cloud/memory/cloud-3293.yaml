title: 'LLM Fine-tuning OOM on NVIDIA H100: Diagnosing and Mitigating Memory Pressure'
scenario: You are fine-tuning a 100B parameter LLM on a distributed cluster. Each GPU boasts 80 GB of HBM3 memory. Despite using mixed-precision training (FP16), you consistently encounter Out-Of-Memory (OOM) errors during the forward and backward passes, even with a small batch size.
question: How would you diagnose and mitigate OOMs for a 100B distributed LLM, including fragmentation, gradient accumulation, offload, and OS eviction effects?
details:
  realistic_solution: The model states (weights, optimizer, gradients) vastly exceed an 80GB GPU, and fine-tuning adds activation spikes during forward/backward. Implement ZeRO-Stage 3 or FSDP to shard parameters, gradients, and optimizer states across the cluster. Use activation checkpointing, smaller microbatches, and gradient accumulation so the global batch stays large without increasing per-step activation memory. Diagnose fragmentation with allocator snapshots, reserved-versus-allocated metrics, max split size tuning, and periodic memory summaries; reduce fragmentation with static shapes, preallocation, and fewer variable-size temporary buffers. If HBM remains tight, offload optimizer state or parameters to CPU/NVMe with pinned memory and overlap prefetch, but monitor host RAM, cgroup limits, swap, and OOM-killer or page-cache eviction behavior because OS-level eviction can turn offload into stalls or process kills.
  common_mistake: |
    **The Pitfall:** Underestimating the FP32 AdamW optimizer state footprint.
    **The Rationale:** Candidates calculate the memory for FP16 weights (200GB) but forget that AdamW requires storing 32-bit master weights, momentum, and variance (12 bytes/param).
    **The Consequence:** OOMs persist because the engineer fails to shard the massive 1.2TB optimizer state, chasing minor activation optimizations instead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100B parameters.
       - Precision: FP16 weights/gradients, FP32 AdamW optimizer.
       - GPU: 80 GB HBM3.
    2. **Calculations:**
       - Weights (FP16): 100B * 2 bytes = 200 GB.
       - Gradients (FP16): 100B * 2 bytes = 200 GB.
       - Optimizer (FP32 master + 2 moments): 100B * 12 bytes = 1,200 GB.
       - Model-state lower bound: 1,600 GB (1.6 TB), before activations, communication buffers, fragmentation, and allocator slack.
       - Per-GPU model-state lower bound (ZeRO-3 over 16 GPUs): 1,600 GB / 16 = 100 GB.
       - Additional memory from activations and temporary buffers makes the true per-GPU requirement higher than 100 GB unless checkpointing, smaller microbatches, or offload reduce it.
    3. **Conclusion & Interpretation:**
       - **Result: 1.6 TB model-state lower bound.** The training is structurally **Memory-Capacity-Bound**. Even perfectly sharded across 16 GPUs, model state alone requires 100GB/GPU, so an 80GB cluster needs more GPUs, more aggressive sharding/offload, smaller microbatches, and checkpointing to cover activations and fragmentation.
