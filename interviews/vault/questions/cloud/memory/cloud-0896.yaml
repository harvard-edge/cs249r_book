title: Diagnosing Low SM Utilization in LLM Decoding
scenario: Your team deploys a 7B parameter LLM in FP16 on a single NVIDIA A100 for real-time chatbot inference at batch size 1. Telemetry shows an average token generation latency of ~7ms, but the GPU SM compute utilization is stubbornly stuck under 1%. An engineer proposes upgrading to an H100 to solve the 'compute inefficiency' and lower the latency to 2ms.
question: Is upgrading the batch-1 7B LLM service to an H100 a good way to cut latency to 2ms, and what should you do instead?
details:
  realistic_solution: Diagnose the decoding step as a 'bandwidth hog' due to its extremely low arithmetic intensity. Reject the H100 compute upgrade as it will only scale with the memory bandwidth increase (~1.5x), not compute. Instead, increase arithmetic intensity via continuous batching, or reduce memory traffic using weight quantization (e.g., AWQ/GPTQ) and speculative decoding.
  common_mistake: |
    **The Pitfall:** Upgrading compute hardware (TFLOPS) to solve low SM utilization.
    **The Rationale:** Assuming that low SM utilization implies a CPU bottleneck or that a faster GPU will linearly scale batch-1 performance.
    **The Consequence:** Wasting massive budget on an H100 upgrade that yields minimal latency improvements because the workload remains fundamentally starved by memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters in FP16 (14 GB).
       - Hardware: A100 (312 TFLOPS, 2 TB/s bandwidth).
       - Workload: Batch size 1, auto-regressive decoding.
    2. **Calculations:**
       - Token Time (Memory): 14 GB / 2 TB/s = 7 ms.
       - Arithmetic Intensity: 14 GFLOPs / 14 GB = 1 FLOP/byte.
       - A100 Ridge Point: 312 TFLOPS / 2 TB/s = 156 FLOPs/byte.
       - Max Achievable Compute: 2 TB/s * 1 FLOP/byte = 2 TFLOPs (0.6% of peak).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The decoding step operates at an arithmetic intensity vastly lower than the ridge point. To lower latency, weight quantization (e.g., AWQ/GPTQ) or speculative decoding is required, not more TFLOPS.
