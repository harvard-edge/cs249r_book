title: Diagnosing Flash Attention Regression After Library Upgrade
scenario: After upgrading flash-attn from 2.3 to 2.6 on an A100 (80GB HBM2e, 2TB/s) training cluster,
  training throughput drops from 95 TFLOPS to 71 TFLOPS for a seq_len=4096 model. No code changes were
  made. The upgrade notes mention improved support for dropout in attention.
question: How would you investigate and fix the 25% throughput regression after upgrading flash-attn from
  2.3 to 2.6?
details:
  realistic_solution: Profile with Nsight to compare kernel execution between versions. Check if dropout_p=0.0
    is being passed to the attention function — in newer versions, explicitly passing dropout_p=0.0 may
    trigger a different kernel path than not passing it. Set dropout_p=0.0 and deterministic=False to
    use the fastest kernel path. Verify with flash_attn.utils.benchmark.
  common_mistake: '**The Pitfall:** Assuming the library regression is a core bug and rolling back immediately.

    **The Rationale:** Engineers often overlook default behavior changes in minor library updates.

    **The Consequence:** The team misses out on bug fixes in the newer version and fails to realize that
    passing dropout_p=0.0 now inadvertently triggers mask materialization.

    '
  napkin_math: '**Assumptions & Constraints:**

    - A100 peak is 312 TFLOPS BF16. 95 TFLOPS vs 71 TFLOPS = 25% regression.

    - seq=4096, d=128, 32 heads: attention FLOPs per layer = 2 * 4096^2 * 128 * 32 = 137 GFLOP.

    - Mask materialization for dropout at seq=4096: 4096^2 * 1 byte = 16MB per head, so 512MB total per
    layer.


    **Calculations:**

    - At 95T: 137 GFLOP / 95 TFLOPS = 1.44ms/layer.

    - At 71T: 137 GFLOP / 71 TFLOPS = 1.93ms/layer.

    - Regression = 40 * (1.93 - 1.44) = 19.6ms per forward pass.


    **Conclusion & Interpretation:**

    - **Result: Memory Bandwidth Saturation.** The materialization overhead of 512MB per layer saturates
    memory bandwidth, pulling compute down from 95 TFLOPS to 71 TFLOPS.'
