title: Diagnosing Flash Attention Regression After Library Upgrade
scenario: After upgrading flash-attn from 2.3 to 2.6 on an A100 (80GB HBM2e, 2TB/s) training cluster, training throughput drops from 95 TFLOPS to 71 TFLOPS for a seq_len=4096 model. No code changes were made. The upgrade notes mention improved support for dropout in attention.
question: How would you investigate and fix the 25% throughput regression after upgrading flash-attn from 2.3 to 2.6?
details:
  realistic_solution: Profile with Nsight to compare kernel execution between flash-attn 2.3 and 2.6. Check whether arguments such as dropout_p, deterministic, causal, window size, head dimension, or mask layout changed the selected kernel path. In particular, benchmark both omitting dropout in eval and passing dropout_p=0.0, because a minor-version dispatch change can select a slower dropout-capable path. Pin the fast path or adjust the call signature, then verify with flash_attn.utils.benchmark and an end-to-end training step.
  common_mistake: |
    **The Pitfall:** Assuming the library regression is a core bug and rolling back immediately.
    **The Rationale:** Engineers often overlook default behavior changes in minor library updates.
    **The Consequence:** The team misses out on bug fixes in the newer version and fails to realize that passing dropout_p=0.0 now inadvertently triggers mask materialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 peak is 312 TFLOPS BF16.
    - Observed throughput changed from 95 TFLOPS to 71 TFLOPS after the library upgrade.
    - No model code changed, so first suspect kernel dispatch, masking, dropout, or determinism behavior.

    **Calculations:**
    - Throughput ratio: 71 / 95 = 0.747.
    - Regression magnitude: 1 - 0.747 = 25.3%.
    - If the 2.6 trace shows extra mask/dropout kernels, lower occupancy, or more HBM traffic than 2.3 for the same shapes, the regression is dispatch-path related rather than explained by theoretical attention FLOPs.
    - Minimal benchmark matrix: 2.3 vs 2.6 crossed with dropout omitted vs dropout_p=0.0 and deterministic=False vs True.

    **Conclusion & Interpretation:**
    - **Result: Kernel-path regression until proven otherwise.** The correct fix is to identify the slower 2.6 dispatch path with profiling and restore the fast no-dropout kernel, not to rely on fabricated per-layer FLOP or mask-memory estimates.
