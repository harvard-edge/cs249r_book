title: Validation Loop Memory Leak
scenario: During a validation loop on a 16GB GPU, an engineer forgets to use the `torch.no_grad()` context manager. They accumulate the validation loss across batches using `val_loss += loss` to compute the epoch average. The model's forward pass generates 100MB of intermediate activations per batch.
question: How much memory will the retained validation graph consume over 200 batches, and what failure or fix should you expect?
details:
  realistic_solution: Recognize that the `val_loss += loss` operation links the current batch's computational graph to the overall `val_loss` tensor. This prevents the Python garbage collector from freeing the 100MB of intermediate activations per batch. The accumulated reverse-linked graph will eventually cause an Out Of Memory (OOM) error. The fix is to use `torch.no_grad()` to prevent graph construction or accumulate using `val_loss += loss.item()`.
  common_mistake: |
    **The Pitfall:** Assuming the memory footprint of `val_loss += loss` is negligible.
    **The Rationale:** Candidates think only the scalar float value (4 bytes) is stored, failing to realize that without `torch.no_grad()`, each tensor retains a reference to its entire computational graph and activations.
    **The Consequence:** The system will inevitably hit an Out Of Memory (OOM) error during validation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Per Batch: 100 MB of intermediate activations.
    - Target: 200 batches.
    - VRAM limit: 16 GB.

    **Calculations:**
    - Accumulated Graph: `val_loss += loss` links the current batch graph to the master tensor.
    - Total Retained Memory: 200 batches × 100 MB/batch = 20,000 MB = 20 GB.
    - Capacity Check: 20 GB > 16 GB VRAM.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. The graph retention leak accumulates 20 GB of activations, causing the GPU to OOM around batch 160.
