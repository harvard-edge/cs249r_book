title: KV Cache Pre-allocation OOM on A100 GPU
scenario: An inference service runs a 13B parameter model (26 GB FP16 weights) on a single GPU. The system is configured for a maximum sequence length of 4096 tokens and uses standard contiguous KV cache allocation. The service receives 24 concurrent requests, where each request processes a 50-token prompt and generates exactly 50 tokens. The system rejects a 25th request due to an Out-Of-Memory (OOM) error.
question: Why does the service OOM on the 25th request when each active request uses only 100 tokens of context, and the maximum KV cache for 4096 tokens is exactly 2 GB?
details:
  realistic_solution: Because standard contiguous KV cache allocation reserves the maximum possible context length for every active request, each request immediately commits the full 2 GB KV slot for 4096 tokens. The fact that each request will use only 100 tokens does not reduce the reserved memory. With 24 active requests, KV reservations consume 24 * 2 GB = 48 GB. Adding 26 GB of model weights brings committed memory to 74 GB before activations and runtime overhead, so there is no room to admit a 25th 2 GB KV slot.
  common_mistake: |
    **The Pitfall:** Assuming KV cache is allocated dynamically token-by-token.
    **The Rationale:** Candidates incorrectly attribute the OOM to memory fragmentation, context switching, or activation memory spikes instead of recognizing the pre-allocation requirements of standard contiguous KV cache.
    **The Consequence:** Failure to identify the need for PagedAttention or continuous batching, resulting in massive memory waste and low concurrency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard contiguous KV cache reserves the full maximum slot per request.
    - Reserved KV cache per request = 2 GB for 4096 tokens.
    - Active requests: 24. Model weights: 26 GB.

    **Calculations:**
    - Reserved KV for 24 requests = 24 * 2 GB = 48 GB.
    - Committed memory before the 25th request = 48 GB KV + 26 GB weights = 74 GB.
    - The 25th request would require another reserved 2 GB KV slot.
    - Although each active request uses only 100 / 4096 of its slot, the allocator still commits the full 2 GB reservation.

    **Conclusion & Interpretation:**
    - **Result: capacity exhaustion from KV over-reservation**. The OOM is caused by reserving full contiguous KV slots, not by actual token usage or fragmentation.
