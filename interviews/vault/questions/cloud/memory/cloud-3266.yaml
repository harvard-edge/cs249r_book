title: Optimizing LLM KV-Cache on NVIDIA A100 for Long Contexts
scenario: You are designing a low-latency inference system for a large language model (LLM) that frequently processes long input contexts. The system will be deployed on NVIDIA GPUs. Your primary challenge is efficient KV-cache management to maximize throughput and minimize memory-related OOM errors, especially under varying user loads and context lengths.
question: What KV-cache architecture would you use on A100s to handle 32k-64k contexts without OOMs while maximizing throughput?
details:
  realistic_solution: 'Implement PagedAttention to manage KV-cache memory efficiently by breaking the cache into fixed-size blocks. Dynamically allocate/deallocate these blocks based on sequence needs, preventing fragmentation and enabling sharing. Employ a robust cache eviction policy (e.g., LRU) when memory pressure is high. Pre-allocate a certain percentage of HBM for KV-cache blocks, leaving room for model weights, activations, and other CUDA overheads. Implement a request scheduler that monitors available memory and prioritizes requests based on predicted KV-cache usage and latency targets. Leverage FlashAttention-2 to optimize memory access patterns and eliminate HBM bottlenecks.'
  common_mistake: |
    **The Pitfall:** Overlooking the quadratic memory growth of KV-cache with sequence length.
    **The Rationale:** Engineers rely on fixed-size contiguous cache allocations, not accounting for the fragmentation caused by varying long sequences.
    **The Consequence:** Frequent Out-Of-Memory (OOM) errors and drastically reduced serving concurrency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B LLM with 32 layers, 32 attention heads, 128 head dimension.
    - A100 80GB GPU.

    **Calculations:**
    - KV-cache entry per token: 2 (K,V) * (32 * 32 * 128 * 2 bytes) = 524,288 bytes (~512 KiB).
    - Single 64k sequence (65,536 tokens): 65,536 * 512 KiB = 32 GiB.
    - A100 capacity left after weights (~14 GiB): 80 - 14 = 66 GiB.

    **Conclusion & Interpretation:**
    - **Result: 32 GiB (Memory-Bound)**. This leaves room for only one contiguous 64k sequence (32 GiB), making PagedAttention essential for sharing and concurrency.
