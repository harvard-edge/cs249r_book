title: Optimizing LLM KV-Cache on NVIDIA A100 for Long Contexts
scenario: You are designing a low-latency inference system for a large language model (LLM) that frequently processes long input contexts. The system will be deployed on NVIDIA GPUs. Your primary challenge is efficient KV-cache management to maximize throughput and minimize memory-related OOM errors, especially under varying user loads and context lengths.
question: What KV-cache architecture would you use on A100s to handle 32k-64k contexts without OOMs while maximizing throughput?
details:
  realistic_solution: Implement PagedAttention to manage KV-cache memory efficiently by breaking the cache into fixed-size token blocks. Dynamically allocate and free blocks as sequences grow or finish, reducing fragmentation for mixed 32k-64k requests. Reserve an explicit HBM pool for KV blocks after weights, runtime buffers, and CUDA overheads, then use admission control and continuous batching based on predicted KV bytes per request. Evict or recompute only lower-priority cached prefixes under memory pressure; FlashAttention-style kernels can improve attention compute efficiency, but they do not remove the need to store resident KV-cache.
  common_mistake: |
    **The Pitfall:** Treating the KV-cache as a small per-request buffer.
    **The Rationale:** KV memory grows linearly with tokens, layers, heads, and concurrent sequences; long requests plus allocator fragmentation can overcommit HBM even when average context length looks safe.
    **The Consequence:** The scheduler admits too many long contexts, causing OOMs, request drops, or low throughput from emergency eviction.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B LLM with 32 layers, 32 attention heads, 128 head dimension.
    - A100 80GB GPU.

    **Calculations:**
    - KV-cache entry per token: 2 (K,V) * (32 * 32 * 128 * 2 bytes) = 524,288 bytes (~512 KiB).
    - Single 64k sequence (65,536 tokens): 65,536 * 512 KiB = 32 GiB.
    - A100 capacity left after weights (~14 GiB): 80 - 14 = 66 GiB before runtime overhead.
    - Two full 64k contexts need ~64 GiB of KV-cache, leaving little practical room for overhead; one 64k plus one 32k context needs ~48 GiB.

    **Conclusion & Interpretation:**
    - **Result: 32 GiB per 64k context (Memory-Bound)**. An 80 GB A100 can hold at most about two idealized full 64k KV-caches after weights, fewer after overhead, so paging and admission control are needed for variable-length concurrency.
