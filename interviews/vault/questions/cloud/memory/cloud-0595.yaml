title: The CPU-GPU Data Transfer Tax
scenario: You're deploying a Llama 70B model for inference. The model weights are loaded into CPU RAM. Your server has PCIe 5.0 x16 connecting the CPU to an H100 GPU. A user sends the first request and waits 45 seconds before getting any response. Subsequent requests take only 200ms.
question: What happened during that first request, and how do you fix it?
details:
  realistic_solution: |
    The 70B model must be physically transferred from CPU DRAM to GPU HBM over the PCIe bus before any computation can begin. PCIe 5.0 x16 has a theoretical peak of 64 GB/s, but real-world sustained throughput is typically 50-55 GB/s due to protocol overhead and TLP (Transaction Layer Packet) framing. A 70B model in FP16 is ~140 GB. That transfer dominates the cold-start latency.
  common_mistake: |
    **The Pitfall:** Blaming JIT compilation or software "warmup" for tens of seconds of delay.
    **The Rationale:** Developers accustomed to small models assume that the GPU is just compiling kernels on the first pass.
    **The Consequence:** The team wastes days profiling PyTorch internals while the fundamental bottleneck is the physical speed of the PCIe bus transferring 140 GB of data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B FP16 model = 140 GB.
    - PCIe 5.0 x16 effective throughput = ~50 GB/s.
    - NVMe disk throughput = 7 GB/s.

    **Calculations:**
    - Disk to RAM: 140 GB / 7 GB/s = 20 seconds.
    - RAM to GPU: 140 GB / 50 GB/s = 2.8 seconds.
    - Total cold start: ~23 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~23 seconds initialization delay (I/O-Bound)**. The massive cold-start latency is heavily dominated by the physical data movement of 140 GB of weights over PCIe and NVMe.
