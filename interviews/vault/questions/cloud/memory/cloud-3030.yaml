title: Comparing GPT-3 and LLaMA-2 Memory Footprints on H100
scenario: Compare the memory footprints of GPT-3 (175B params, dense attention) vs. LLaMA-2-70B (70B params,
  GQA with 8 KV heads vs. 64 query heads) at inference time on H100s. Assume a batch of 16 requests with
  sequence length 2048.
question: How do GPT-3 175B and LLaMA-2-70B compare in inference memory for weights, KV cache, and activations
  at batch 16 and seq 2048?
details:
  realistic_solution: 'GPT-3 175B FP16: weights 350GB (needs 5 H100s). KV-cache: 16x2048x2x12288x2Bx96
    layers = 155GB. Total: 505GB — needs 7 H100s. LLaMA-2 70B FP16: weights 140GB (needs 2 H100s). KV-cache
    GQA: 16x2048x2x1024x2Bx80 layers = 10.7GB. Total: 150.7GB — 2 H100s. GQA reduces KV-cache by over
    14x.'
  common_mistake: '**The Pitfall:** Treating the KV cache size calculation as identical for both architectures,
    missing the drastic reduction factor.

    **The Rationale:** Candidates often apply standard Multi-Head Attention formulas to modern LLMs, failing
    to account for the architectural leap of Grouped Query Attention (GQA).

    **The Consequence:** The serving infrastructure is wildly over-provisioned with unnecessary GPUs to
    hold a KV cache that is actually an order of magnitude smaller than projected.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Batch: 16. Seq length: 2048. Format: FP16 (2 Bytes).\n\
    \   - GPT-3: 175B params, 96 layers, 96 KV heads, 128 head dim.\n   - LLaMA-2-70B: 70B params, 80\
    \ layers, 8 KV heads, 128 head dim.\n2. **Calculations:**\n   - LLaMA-2 KV cache: 16 × 2048 × 2 (K,V)\
    \ × 8 KV heads × 128 dim × 2 bytes × 80 layers ≈ 10.7 GB.\n   - GPT-3 KV cache: 16 × 2048 × 2 (K,V)\
    \ × 96 KV heads × 128 dim × 2 bytes × 96 layers ≈ 154.6 GB.\n   - Memory ratio: 154.6 GB / 10.7 GB\
    \ ≈ 14.4x smaller cache.\n3. **Conclusion & Interpretation:**\n   - **Result: 14.4x KV Cache Reduction\
    \ (Memory-Capacity Bound)**. LLaMA-2's Grouped Query Attention completely changes the serving bottleneck,\
    \ fitting the 70B model's context easily into the headroom of 2x H100s."
