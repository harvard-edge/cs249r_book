title: Diagnosing Sequence Length OOM
scenario: You are debugging an Out of Memory (OOM) error while fine-tuning a 13B parameter LLM on a single 8x A100 (80GB HBM) node. You are using ZeRO-1 to partition optimizer states. At a sequence length of 2048 (batch size 2), training is stable. However, when increasing the sequence length to 8192 (batch size 1), the job crashes with a CUDA OOM error during the forward pass. Profiling shows parameter memory is stable, but attention activation memory spikes quadratically.
question: Why does increasing sequence length to 8192 cause forward-pass OOM under ZeRO-1, and what attention implementation fixes it?
details:
  realistic_solution: Diagnose that the OOM is caused by standard attention materializing O(S^2) score or probability tensors in HBM while ZeRO-1 only shards optimizer state. Implement FlashAttention or another memory-efficient tiled attention kernel that computes attention in SRAM/register tiles and avoids writing the full attention matrix to HBM.
  common_mistake: |
    **The Pitfall:** Assuming the OOM is due to model parameters and unnecessarily applying ZeRO-3.
    **The Rationale:** Misunderstanding the quadratic memory scaling of standard self-attention activations.
    **The Consequence:** Wasting engineering time migrating to ZeRO-3 when the true cause is the O(S²) attention matrix materializing in HBM during the forward pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameters = 26GB (FP16). Gradients = 26GB.
    - Optimizer states (FP32 master + momentum + variance) = 156GB.
    - ZeRO-1 shards states across 8 GPUs: 19.5GB per GPU.
    - S=8192, 40 heads, 40 layers.
    - Standard attention may save attention probabilities or related S x S tensors for backward; exact memory depends on kernel, checkpointing, and framework.

    **Calculations:**
    - Total static per GPU = 26 + 26 + 19.5 = 71.5GB. Remaining HBM ≈ 8.5GB.
    - One layer of attention probabilities at S=8192: 8192 * 8192 * 40 heads * 2 bytes ≈ 5.36GB.
    - This is 16x larger than the same tensor at S=2048 because attention memory scales with S^2.
    - A few saved activation tensors, workspace buffers, or non-checkpointed layers can exceed the remaining 8.5GB even though parameter memory is unchanged.

    **Conclusion & Interpretation:**
    - **Result: Quadratic attention activation growth (Memory-Bound)**. The O(S^2) attention tensors, not optimizer state, explain the forward OOM; FlashAttention reduces HBM traffic and storage by using tiled SRAM/register computation.
