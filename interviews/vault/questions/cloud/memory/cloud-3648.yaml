title: Flash Attention Backward Pass Memory Recomputation
scenario: During training a 13B model with seq_len=16384, you notice that Flash Attention uses more FLOPs than standard attention during the backward pass. A colleague suggests reverting to standard attention for training to reduce compute.
question: Should you revert from Flash Attention to standard attention to reduce backward-pass FLOPs at seq_len=16384, and why?
details:
  realistic_solution: Flash Attention backward recomputes the attention matrix (2x FLOPs for backward vs forward), but this is the only way to train with long sequences. The FLOP overhead is ~1.1-1.3x vs standard attention backward, but the memory saving enables training at all. Use gradient checkpointing at layer boundaries to further reduce peak memory.
  common_mistake: |
    **The Pitfall:** Comparing only FLOPs without accounting for memory capacity constraints.
    **The Rationale:** Standard attention has fewer FLOPs in the backward pass, making it seem computationally cheaper on paper.
    **The Consequence:** At seq_len=16384, the N×N matrix is massive, resulting in an immediate Out-Of-Memory (OOM) error that makes training physically impossible.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence Length (N) = 16,384.
       - 13B model: 40 layers, 40 heads = 1,600 total heads.
       - Data format: 2 bytes (FP16/BF16).
       - Available Capacity = 80 GB.
    2. **Calculations:**
       - Standard Attention Memory (softmax QK^T): 16384^2 * 2 bytes = 536.8 MB per head.
       - Total Standard Memory: 1,600 heads * 536.8 MB = 858,880 MB (~858 GB).
       - Flash Attention Memory (Q, K, V, O only, 128 dim): 16384 * 128 * 2 bytes * 4 tensors = 16.7 MB per head.
       - Total Flash Memory: 1,600 heads * 16.7 MB = 26,720 MB (~26 GB).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (OOM without Flash Attention).** 858 GB heavily exceeds the 80 GB HBM capacity, making FLOP considerations secondary.
