title: The Fragmentation Crisis
scenario: We are serving a chatbot. Even though we have 40GB of free VRAM, our inference server refuses to accept new concurrent requests, citing an 'Out of Memory' error.
question: What is consuming our VRAM invisibly, and how do we fix it?
details:
  realistic_solution: KV-cache memory is being consumed by active requests as prompts and generated tokens accumulate, and inefficient allocators can strand capacity through contiguous allocation requirements or block fragmentation. The server may report OOM even when the workload appears small because each live token needs KV-cache bytes in every layer, and fragmented free regions may not be usable for the next allocation. Fix it with paged or block-based KV-cache management, request admission based on token budgets, prefix/cache eviction policies, and tighter max-token limits rather than assuming a simple memory leak.
  common_mistake: |
    **The Pitfall:** Assuming a memory leak in the serving framework.
    **The Rationale:** Candidates miss that KV-cache memory grows with active tokens and can be limited by allocator fragmentation or block-level waste.
    **The Consequence:** They chase leaks while the real fix is token-budget admission control and paged/block-based KV-cache allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Free VRAM available for KV cache: 40 GB.
    - Per-token KV cache footprint for the served model: 5 MB per token across all layers.
    - Average active sequence length: 500 tokens.
    - Contiguous or coarse-block allocation wastes 25% of the KV-cache budget under this workload.

    **Calculations:**
    - KV cache per average request: 500 tokens * 5 MB/token = 2500 MB = 2.5 GB.
    - Ideal token capacity: 40 GB / 5 MB per token = 8000 active tokens.
    - Ideal concurrency at 500 active tokens/request: 8000 / 500 = 16 requests.
    - Effective budget with 25% fragmentation: 40 GB * 0.75 = 30 GB.
    - Effective concurrency: 30 GB / 2.5 GB per request = 12 requests.

    **Conclusion & Interpretation:**
    - **Result: Fragmented KV-Cache Capacity (Memory-Bound)**. The invisible consumer is per-token KV cache plus allocator waste. PagedAttention-style allocation cannot remove the real bytes needed for live tokens, but it can recover stranded capacity and raise concurrency by making the token budget usable.
