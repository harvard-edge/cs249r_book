title: 'Wasted Activation VRAM from Dying ReLUs'
scenario: 'You are training a large recommendation model''s MLP tower on an 8x A100 (80GB) node using PyTorch in FP16. The tower has 4 dense layers, each with 16,384 neurons and ReLU activations. After an aggressive learning rate schedule, profiling shows 60% of the neurons have ''died'' and permanently output zero. The micro-batch size is 4096.'
question: 'How much VRAM (in MB) is wasted storing zero activations for the backward pass across all 4 ReLU layers?'
details:
  realistic_solution: 'Calculate the total activation memory needed for the backward pass and multiply by the dead neuron percentage. A standard dense tensor allocates memory for all elements, so 322 MB is wasted just holding zeros.'
  common_mistake: |
    **The Pitfall:** Calculating parameter memory instead of activation memory.
    **The Rationale:** Engineers often forget that activations typically consume far more memory than weights during training.
    **The Consequence:** Incorrectly assuming that standard deep learning frameworks automatically compress zero-valued activations to save VRAM, failing to identify the memory leak.
  napkin_math: |
    **Assumptions & Constraints:**
    - Elements per layer = 4,096 (batch) * 16,384 (neurons) = 67,108,864.
    - Memory per layer (FP16) = 67.1M * 2 bytes ~ 134.2 MB.
    - Total activation memory (4 layers) = 134.2 MB * 4 = 536.8 MB.

    **Calculations:**
    - Wasted VRAM (60% dead) = 536.8 MB * 0.6.
    - Result: 322.1 MB.

    **Conclusion & Interpretation:**
    - **Result: 322.1 MB wasted VRAM (Memory-Capacity-Bound)**. Dead ReLUs leak activation memory because dense tensors allocate memory for all elements.
