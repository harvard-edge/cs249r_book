title: 'Multi-Tenant Serving: LoRA vs KD'
scenario: You are designing a multi-tenant cloud API for 100 enterprise customers, each requiring a customized version of an 8B parameter LLM for text classification. Traffic per customer averages 5 QPS, spiking to 50 QPS. Target latency is <200ms TTFT. You have an autoscaling GPU cluster.
question: "Which strategy should you choose for 100 customized 8B LLM tenants—100 distilled 1B models or one 8B base with LoRA adapters—and why?"
details:
  realistic_solution: |
    Option B (LoRA) is the superior architectural choice for this high-variance, multi-tenant cloud workload due to VRAM constraints and cross-tenant batching capabilities.

    Option A (KD to 1B) generates 100 distinct models. Even though individual inference is fast, storing 100 models at 2GB each requires 200GB of VRAM. This forces the system to either over-provision at least three GPUs just to hold inactive weights, or aggressively swap models in and out of GPU memory over PCIe, which introduces massive cold-start latency (seconds per swap) and entirely violates the 200ms TTFT SLA during traffic spikes.

    Option B (Base 8B + LoRA) requires only 16GB for the base model weights. Each Rank=32 LoRA adapter takes roughly 30MB, meaning all 100 adapters consume just 3GB. The total weight memory is 19GB, easily fitting on a single GPU. Furthermore, by using multi-LoRA kernels (like Punica or S-LoRA), requests from different tenants can be batched together through the shared base model, applying the specific LoRA A and B matrices to individual sequence hidden states on the fly. This maximizes GPU compute utilization and entirely eliminates cold-start swapping latency.
  common_mistake: |
    **The Pitfall:** Choosing to distill 100 separate 1B models because they compute faster individually.
    **The Rationale:** Engineers focus purely on isolated model inference speed, ignoring the systemic VRAM cost of multi-tenancy.
    **The Consequence:** Storing 100 models causes severe memory fragmentation, prevents cross-tenant batching, and introduces massive cold-start swapping latency during traffic spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 tenants, 80GB GPU limit, 8B base model (16GB), 1B KD model (2GB), LoRA adapter (30MB).

    **Calculations:**
    - Option A (1B KD): 100 models * 2GB = 200GB (requires 3+ GPUs).
    - Option B (8B + LoRA): 16GB base + (100 * 0.03GB adapters) = 19GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** A single GPU easily fits the LoRA approach, leaving 61GB available for KV cache to comfortably handle traffic spikes.
