title: Evaluating KV Cache Pre-allocation Waste
scenario: 'Your team is serving a 13B parameter LLM on a single 80GB GPU. The max sequence length limit is 4096 tokens, but the average request length (prompt + completion) is only 512 tokens. The legacy inference engine pre-allocates the KV cache for the maximum sequence length at admission time to guarantee completion and avoid OOMs.'
question: How much KV cache memory does 4096-token pre-allocation waste per request, and why should the 13B serving engine use dynamic allocation?
details:
  realistic_solution: 'Calculate the exact wasted memory per request. At ~1MB per token for KV cache, pre-allocating 4096 tokens reserves ~4GB per request. With average usage at 512 tokens, 87.5% of the memory budget is wasted. Justify switching to a paged memory manager (e.g., PagedAttention) that dynamically allocates fixed-size memory blocks, allowing the system to multiplex the unused capacity and increase the effective batch size by up to 8x.'
  common_mistake: |
    **The Pitfall:** Stating that pre-allocation 'wastes memory' without quantifying the fragmentation.
    **The Rationale:** Pre-allocation creates massive internal fragmentation, artificially bottlenecking the maximum batch size long before compute is saturated.
    **The Consequence:** Running clusters at a fraction of their theoretical throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameter model.
    - KV Cache sizing: ~1 MB per token.
    - Pre-allocation per request: 4096 tokens.
    - Actual average usage: 512 tokens.
    - Available GPU VRAM for KV Cache: 40 GB.

    **Calculations:**
    - Static allocation per request: 4096 * 1 MB = 4.0 GB.
    - Actual average memory used: 512 * 1 MB = 0.5 GB.
    - Memory wasted per request: 4.0 GB - 0.5 GB = 3.5 GB (87.5% internal fragmentation).
    - Static max batch size: 40 GB / 4.0 GB = 10 requests.
    - Dynamic max average batch size (PagedAttention): 40 GB / 0.5 GB = 80 requests.

    **Conclusion & Interpretation:**
    - **Result: 8x Batch Size Increase (Memory-Bound)**. Pre-allocating to the maximum sequence length creates massive internal fragmentation, capping throughput. Paged memory managers eliminate this waste, multiplying system capacity.
