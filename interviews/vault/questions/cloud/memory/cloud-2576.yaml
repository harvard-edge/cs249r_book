title: Why ZeRO-3 Is Overkill for a 7B Model on 4 GPUs
scenario: Your colleague proposes using DeepSpeed ZeRO-3 for a 7B model on 4 GPUs, but training is much slower than expected.
question: What are ZeRO-1, ZeRO-2, and ZeRO-3, and why might ZeRO-3 be overkill for a 7B model on 4 GPUs?
details:
  realistic_solution: ZeRO-1 partitions only optimizer states across GPUs. For AdamW with 7B params, optimizer state is about 84 GB total, sharded to 21 GB per GPU, with minimal extra communication. ZeRO-2 also partitions gradients after reduction, so gradients do not remain fully replicated on every GPU. ZeRO-3 partitions parameters as well; each GPU stores only 1/N of weights but must all-gather parameter shards layer by layer during forward and backward passes. For 7B on 4 GPUs, ZeRO-1 gives each GPU 14 + 14 + 21 = 49 GB, which fits easily in 80 GB before activations. ZeRO-3 reduces the model-state footprint to about 28 GB per GPU, but that memory saving is unnecessary here and the extra per-layer all-gathers can dominate runtime.
  common_mistake: |
    **The Pitfall:** Always using the highest ZeRO stage for maximum memory savings.
    **The Rationale:** Candidates assume more memory savings is universally better, without considering the nonlinear communication overhead.
    **The Consequence:** Unnecessary all-gather operations for every layer drastically slow down training when a lower stage already perfectly fits in memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters. Memory capacity: 80GB per GPU.
       - Weights = 14 GB, Gradients = 14 GB, Optimizer States (OS) = 84 GB.
    2. **Calculations:**
       - ZeRO-1 Memory = 14 (W) + 14 (G) + 84/4 (OS) = 49 GB per GPU.
       - ZeRO-3 Memory = (14+14+84)/4 = 28 GB per GPU.
       - ZeRO-3 saves 21 GB/GPU versus ZeRO-1, but it requires parameter all-gathers for each layer in forward and backward.
       - The communication cost depends on layer sizes, network bandwidth, overlap, and activation/gradient traffic; it cannot be estimated as 2 * full model size per layer.
    3. **Conclusion & Interpretation:**
       - **Result: ZeRO-1 Fits (Communication-Bound).** ZeRO-1 comfortably fits within the 80GB budget. Using ZeRO-3 introduces completely unnecessary communication overhead, drastically slowing down training.
