title: KV-Cache Memory vs Compute Roofline During Decode
scenario: For Llama 3 8B serving, you need to compute the arithmetic intensity of the attention operation during decode at sequence position 2048 to determine if it is compute-bound or memory-bound.
question: How much KV-cache data must be streamed per layer for one Llama 3 8B decode token at sequence position 2048?
details:
  realistic_solution: |
    KV streaming load per layer per decode step is calculated by taking the sequence length and multiplying it by the size of the K and V tensors for all heads in that layer.
  common_mistake: |
    **The Pitfall:** Computing arithmetic intensity using total model FLOPs instead of attention-specific FLOPs.
    **The Rationale:** Engineers assume the model's overall FLOPs apply uniformly, forgetting that attention during decode is memory-bound due to loading the entire KV-cache for a single query.
    **The Consequence:** Misidentifying the bottleneck and failing to apply memory-bandwidth optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Llama 3 8B parameters: 8 KV heads, head_dim = 128.
       - Data type: BF16 (2 bytes per element).
       - Sequence position: 2048.
    2. **Calculations:**
       - KV cache load per layer = seq_len * 2 (K+V) * num_kv_heads * head_dim * bytes.
       - Load = 2048 * 2 * 8 * 128 * 2 bytes = 8,388,608 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. The KV streaming load per layer is 8.39 MB per token generation step.
