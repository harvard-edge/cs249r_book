title: MI300X XCD Architecture and Memory Locality
scenario: >-
  The MI300X has 8 XCDs (Compute Dies) sharing a unified 192GB HBM3 pool.
  A kernel achieves 4.2 TB/s measured bandwidth — 79% of the 5.3 TB/s peak. A developer
  then splits the workload across all 8 XCDs using hip-aware thread block placement
  and measures 3.1 TB/s. They expected 8× improvement from parallelism.
question: >-
  Why does splitting the kernel across all 8 MI300X XCDs reduce bandwidth
  from 4.2 TB/s to 3.1 TB/s, and how should memory locality be handled?
details:
  realistic_solution: 'The MI300X is a multi-die chiplet design: 8 Compute Dies (XCDs) connected via AMD''s Infinity Fabric on an interposer. Each XCD has direct high-bandwidth access to its nearest HBM3 stacks, but accessing HBM3 stacks attached to a remote XCD requires crossing the Infinity Fabric — adding 100-200ns latency (vs 50ns local). The bandwidth regression from 4.2 TB/s to 3.1 TB/s when using all 8 XCDs indicates the workload has cross-XCD memory access patterns that are bottlenecked by Infinity Fabric bandwidth rather than HBM3 bandwidth. Fix: use HIP''s device-locality hints or ROCm''s NUMA-aware memory allocation (hipMemAdvise) to bind each XCD''s thread blocks to memory pages in its local HBM3 partition. For uniform workloads (transformer matmuls), AMD''s hardware prefetcher and the unified memory controller typically handle this transparently — the regression suggests irregular access patterns or incorrect thread affinity.'
  common_mistake: |
    **The Pitfall:** Assuming all 8 XCDs have equal-latency access to all 192GB of HBM3.
    **The Rationale:** Candidates miss that the MI300X has NUMA-like memory locality; crossing the Infinity Fabric for remote HBM3 access bottlenecks bandwidth.
    **The Consequence:** Suboptimal thread placement causing unexpected bandwidth regressions on multi-die accelerators.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X Peak HBM BW = 5.3 TB/s across 8 XCDs.
    - Local XCD bandwidth = 5.3 TB/s / 8 ≈ 662.5 GB/s.
    - Cross-XCD Infinity Fabric = 896 GB/s total (112 GB/s per XCD).
    - Workload has 50% remote memory accesses without NUMA binding.

    **Calculations:**
    - Effective BW per XCD (50% remote) = (0.5 × 662.5) + (0.5 × 112) = 387 GB/s.
    - Total 8 XCDs BW = 8 × 387 = 3,096 GB/s ≈ 3.1 TB/s.
    - Fix (NUMA binding, <5% remote) = 8 × 662.5 × 0.95 ≈ 5.0 TB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.1 TB/s (Memory-Bound)**. NUMA-ignorant thread placement causes Infinity Fabric bottlenecks; explicit device-locality hints restore near-peak bandwidth.
