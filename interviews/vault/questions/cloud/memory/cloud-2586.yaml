title: PPO RLHF VRAM Sizing for a 13B Model on 80 GB GPUs
scenario: You need to set up RLHF for a 13B model using PPO. The policy and critic need full training state (16 B/param), reference and reward models are inference-only (2 B/param FP16).
question: How much GPU memory does PPO RLHF for the 13B model require, and what is the theoretical minimum versus a deployment-safe number of 80 GB GPUs?
details:
  realistic_solution: |
    Configure ZeRO-3 across the cluster to shard the massively heavy policy and critic training states. Calculate the total footprint of all 4 concurrent RLHF models (Policy, Critic, Reference, Reward): 468 GB. The theoretical floor is 6 80 GB GPUs because 468 / 80 = 5.85, but that leaves only about 2 GB per GPU for activations, KV cache, fragmentation, and PPO rollout buffers. A deployment-safe plan uses 8 GPUs, which shards the model payload to 58.5 GB/GPU and leaves about 21.5 GB/GPU for runtime overhead.
  common_mistake: |
    **The Pitfall:** Sizing memory strictly for the policy model being trained.
    **The Rationale:** Forgetting the architectural reality that RLHF PPO requires 4 co-existing model instances in VRAM to function.
    **The Consequence:** Discovering at runtime that the critic model alone requires as much memory as the policy, causing an immediate OOM cluster crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 13B parameters.
    - Training State (Policy & Critic): 16 bytes/param.
    - Inference State (Reference & Reward): 2 bytes/param (FP16).
    - Hardware: 80 GB GPUs.

    **Calculations:**
    - Training Footprint: 2 models * 13B params * 16 Bytes = 416 GB.
    - Inference Footprint: 2 models * 13B params * 2 Bytes = 52 GB.
    - Total Model Footprint: 416 GB + 52 GB = 468 GB.
    - Theoretical minimum GPU count: ceil(468 GB / 80 GB) = 6 GPUs.
    - Six-GPU payload: 468 GB / 6 = 78 GB/GPU, leaving only 2 GB/GPU for activations, KV cache, fragmentation, and rollout buffers.
    - Practical deployment: ZeRO-3 sharding across 8 GPUs provides 468 GB / 8 = 58.5 GB/GPU, leaving 21.5 GB/GPU headroom.

    **Conclusion & Interpretation:**
    - **Result: 6 GPUs theoretical minimum; 8 GPUs deployment-safe (Memory-Capacity Bound).** Six GPUs barely fit the model states, while eight 80GB GPUs provide a practical safety margin for PPO runtime memory.
