title: KV-Cache Recomputation vs Storage Tradeoff
scenario: 'A user sends a 4096-token prompt and then asks 5 follow-up questions (each 100 tokens) spaced over 30 seconds. Option A: store the KV-cache for the 4096-token prefix between follow-ups. Option B: recompute the prefix KV-cache for each follow-up.'
question: 'For Llama 3 70B on 2×H100, which is more economical: storing the KV-cache or recomputing it?'
details:
  realistic_solution: Option A (store) keeps about 1.31 GB of KV-cache for the 4096-token prefix resident for roughly 30 seconds. If the 2×H100 deployment is already reserved, that does not create a direct per-GB rental charge; the real cost is opportunity cost if the retained KV blocks reduce admission capacity for other requests. Option B (recompute) repeats the 4096-token prefill for each of 5 follow-ups. With the stated 200 ms estimate on 2×H100, recomputation consumes 5 × 200 ms = 1.0 second of extra two-GPU time and adds about 1 second of user-visible latency. At $2/GPU-hour, that extra compute time is 1.0 s × 2 GPUs × $2/3600 ≈ $0.0011. Therefore storing is usually more economical when the KV pool has enough headroom, because it avoids repeated prefill compute and latency. Recompute can be more economical only when the 1.31 GB retained KV-cache has a higher opportunity cost than the extra prefill time, which requires a separate capacity/revenue assumption.
  common_mistake: |
    **The Pitfall:** Always choosing to recompute because 'memory is expensive'.
    **The Rationale:** For long prefixes with many follow-ups, the cumulative recomputation cost far exceeds the one-time memory cost of caching, not to mention the impact on user latency.
    **The Consequence:** Massively inflated compute costs and high user-facing latency for multi-turn conversations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prefix: 4096 tokens. KV-cache size: about 1.31 GB.
    - Follow-ups: 5. Recompute latency: ~200 ms per 4096-token prefill on 2x H100.
    - GPU rental: $2/hr per H100, charged for reserved GPU time rather than per GB of VRAM.

    **Calculations:**
    - Store: direct incremental rental cost is $0 if the GPUs are already reserved; opportunity cost depends on whether 1.31 GB blocks other work.
    - Recompute: 5 * 200 ms = 1.0 s of extra two-GPU time.
    - Recompute GPU-time cost: 1.0 s * 2 GPUs * ($2 / 3600 s) ≈ $0.0011, plus about 1.0 s added latency.

    **Conclusion & Interpretation:**
    - **Result: Store unless KV memory is the binding capacity constraint.** The prompt supports a qualitative opportunity-cost tradeoff, not a per-GB-seconds storage bill.
