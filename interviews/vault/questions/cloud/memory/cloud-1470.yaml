title: Llama-2-70B Serving OOM from Static KV-Cache Allocation
scenario: You are serving Llama-2-70B on an 8x 40GiB GPU node (320GiB total). The serving engine pre-allocates the KV cache for a max sequence length of 4096 and batch size of 128. Load testing triggers an instant OutOfMemory error.
question: What exact KV-cache memory bottleneck causes OOM for 128 concurrent 4096-token Llama-2-70B requests on 320GB VRAM?
details:
  realistic_solution: |
    Calculate the static KV-cache reservation and identify it as the bottleneck: 128 requests at 4096 tokens require 160 GiB of KV cache. With ~140 GiB of weights plus roughly 16 GiB of CUDA/runtime overhead, the node has only about 4 GiB left for activation workspace, so prefill can OOM even though the KV allocation itself is the root cause. The solution is to implement PagedAttention (e.g., vLLM) for dynamic block allocation, or to lower the maximum batch size.
  common_mistake: |
    **The Pitfall:** Blaming the OOM on forward-pass activation memory or intermediate tensor states.
    **The Rationale:** Activation footprints cause OOMs during standard model training, a familiar failure mode.
    **The Consequence:** Missing the fact that standard serving engines statically allocate massive VRAM for KV cache based purely on max sequence length, causing instant failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 320 GiB total VRAM. Llama-2-70B: 80 layers, 8 KV heads under grouped-query attention, head dim 128, FP16 (2 bytes).
    - Batch: 128, Seq: 4096.

    **Calculations:**
    - KV bytes per token across all layers = 2 (K and V) * 8 KV heads * 128 head dim * 80 layers * 2 bytes/FP16 = 327,680 bytes = 320 KiB.
    - KV bytes per 4096-token sequence = 320 KiB/token * 4096 tokens = 1,310,720 KiB = 1.25 GiB.
    - KV bytes for batch 128 = 1.25 GiB/sequence * 128 sequences = 160 GiB.
    - Model + static KV = 140 GiB weights + 160 GiB KV = 300 GiB.
    - Runtime overhead of ~16 GiB leaves only ~4 GiB for activation workspace on a 320 GiB node.

    **Conclusion & Interpretation:**
    - **Result: Static KV-Cache Memory-Bound.** Reserving 160 GiB for the max batch and sequence length leaves too little working memory for prefill. PagedAttention dynamically allocates KV blocks and avoids this upfront reservation.
