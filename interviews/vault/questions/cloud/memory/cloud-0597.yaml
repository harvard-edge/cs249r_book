title: The Adam Memory Multiplier
scenario: You want to fine-tune a 7B model using Adam optimizer with mixed-precision training (BF16 forward/backward, FP32 optimizer). Your GPU has 80 GB of memory.
question: How much memory does the optimizer alone consume, and what fraction of VRAM does it take?
details:
  realistic_solution: 'The optimizer alone is the FP32 Adam state: (1) FP32 master copy of weights for numerical stability, (2) FP32 first moment, and (3) FP32 second moment. For 7B parameters, that is 7B × (4 + 4 + 4) bytes = 84 GB. On an 80 GB GPU, the optimizer alone consumes 84/80 = 1.05× VRAM, or 105%, before counting BF16 weights, gradients, activations, or temporary buffers.'
  common_mistake: |
    **The Pitfall:** Assuming the optimizer just stores gradients.
    **The Rationale:** Candidates forget that Adam requires three full-precision (FP32) copies of the model parameters for master weights, momentum, and variance.
    **The Consequence:** Completely misjudging memory constraints, leading to immediate OOM errors and an inability to train without techniques like ZeRO or 8-bit Adam.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters.
    - BF16 weights and gradients (2 bytes each).
    - FP32 optimizer states: Master Weights, First Moment, Second Moment (4 bytes each).
    - Total VRAM: 80 GB.

    **Calculations:**
    - FP32 Master Weights: 7B * 4 bytes = 28 GB.
    - FP32 First Moment: 7B * 4 bytes = 28 GB.
    - FP32 Second Moment: 7B * 4 bytes = 28 GB.
    - Optimizer states alone: 28 + 28 + 28 = 84 GB.
    - Fraction of 80 GB VRAM: 84 GB / 80 GB = 1.05 = 105%.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound.** The optimizer alone consumes 84 GB, or 105% of an 80 GB GPU, guaranteeing an OOM without sharding, offload, or lower-precision optimizer states.
