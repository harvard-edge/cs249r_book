title: The 100K-GPU Storage Architecture
scenario: You are the Principal Storage Architect for a new 100,000-GPU training cluster that will train frontier models (1T+ parameters). The cluster will run continuous pre-training jobs lasting 3-6 months. Your requirements are (1) feed 100K GPUs at 200 MB/s each = 20 TB/s aggregate read bandwidth for training data, (2) checkpoint 20 TB every 10 minutes with <5 seconds of GPU idle time, (3) survive up to 50 simultaneous node failures without losing more than 30 seconds of training progress, (4) total storage budget is $15M for 3 years.
question: What storage hierarchy meets the 100K-GPU cluster's 20 TB/s reads, 20 TB checkpoints, failure tolerance, and $15M budget?
details:
  realistic_solution: 'Use a tiered design rather than one giant POSIX filesystem. Tier 0 is host DRAM for the synchronous checkpoint handoff: each GPU copies its shard to host memory and training resumes after the barrier. Tier 1 is one local 3.84 TB NVMe per 8-GPU node, about 48 PB raw across 12,500 nodes, used for warm training-data cache and short-lived checkpoint staging. The read target is only 20 TB/s / 12,500 nodes = 1.6 GB/s per node, so a single local NVMe per node has enough bandwidth without buying 192 PB of flash. Tier 2 is a 6 PB high-bandwidth parallel filesystem with about 2 TB/s aggregate write/read bandwidth for durable checkpoints and recovery. A 20 TB checkpoint drains from local NVMe to the filesystem in about 10 seconds, so the durable copy finishes within the 30-second progress-loss budget. Tier 3 is lower-cost object storage, about 30 PB, for older checkpoints, datasets, and logs. For 50 simultaneous node failures, the latest checkpoint shards are already on the parallel
    filesystem within the 30-second durability window; recovery reads the 20 TB checkpoint from the filesystem in about 10 seconds, while object storage is only the archive tier. A plausible 3-year storage bill is roughly: local NVMe 48 PB at $100/TB = $4.8M, high-bandwidth filesystem 6 PB at $600/TB = $3.6M, object tier 30 PB at $80/TB = $2.4M, plus about $3M for storage servers, spares, and fabric ports, totaling about $13.8M.'
  common_mistake: |
    **The Pitfall:** Designing a single, monolithic, ultra-fast storage tier (like a massive Lustre cluster) hoping to hit all numbers with brute force.
    **The Rationale:** Engineers who lack distributed systems scale intuition forget that maintaining a single massive 20 TB/s filesystem capable of handling instantaneous synchronized 20 TB writes is technologically nearly impossible, and certainly shatters the $15M limit.
    **The Consequence:** The $15M budget is violently depleted trying to scale an enterprise NAS to petabyte capacities at 20 TB/s, forcing GPU downtime every 10 minutes because the system stalls waiting on synchronous POSIX writes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100K GPUs = 12,500 nodes at 8 GPUs/node.
    - Read requirement: 20 TB/s aggregate.
    - Checkpoint: 20 TB every 10 minutes, <5s GPU idle, durable within 30s.
    - Budget target: $15M over 3 years.

    **Calculations:**
    - Per-node read need: 20 TB/s / 12,500 = 1.6 GB/s per node, below one local NVMe's read bandwidth.
    - Per-node checkpoint shard: 20 TB / 12,500 = 1.6 GB/node.
    - Synchronous GPU->DRAM copy at 32 GB/s: 1.6 GB/node / 8 GPUs = 200 MB/GPU; 200 MB / 32 GB/s = ~6ms plus barrier overhead, so <5s idle is achievable.
    - Async durable flush: 20 TB / 2 TB/s filesystem bandwidth = 10s, inside the 30s progress-loss window.
    - Recovery read: 20 TB / 2 TB/s = 10s from the durable filesystem tier.
    - Capacity/cost: 48 PB NVMe * $100/TB = $4.8M; 6 PB filesystem * $600/TB = $3.6M; 30 PB object * $80/TB = $2.4M; infrastructure allowance = ~$3M; total = ~$13.8M.

    **Conclusion & Interpretation:**
    - **Result: Tiered storage within budget (Architecture-Bound)**. Local NVMe supplies low-jitter reads and staging, the parallel filesystem makes checkpoints durable within 30s, and object storage handles cheap retention.
