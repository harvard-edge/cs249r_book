title: LLM Batch Size Memory Limit
scenario: You are deploying a 7B parameter LLM for inference using FP16 precision. The static model weights consume 14GB of VRAM. Profiling shows that the KV cache and intermediate activation memory for your target sequence length requires exactly 1GB per request. To maximize hardware utilization, an engineer proposes configuring the server with a maximum concurrent batch size of 32.
question: "What peak VRAM is required for batch size 32, and what maximum feasible batch size should be configured?"
details:
  realistic_solution: 'Calculate the total memory as Weights + (Batch Size × Activation Memory per Request). For a batch size of 32, the required memory is 14GB + 32GB = 46GB, which exceeds the 40GB limit. To avoid OOM errors, the server must be capped at a maximum batch size of 26.'
  common_mistake: |
    **The Pitfall:** Focusing primarily on the static model weight footprint.
    **The Rationale:** Engineers accustomed to CNNs or stateless models assume that if the weights fit, inference will easily fit.
    **The Consequence:** Neglecting the linear O(N) scaling of activation and KV cache memory leads to unexpected out-of-memory (OOM) crashes under production load.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40GB GPU VRAM limit, 14GB weights, 1GB activation/KV per request.

    **Calculations:**
    - Proposed VRAM = 14GB + (32 * 1GB) = 46GB (exceeds 40GB).
    - Max feasible batch = floor((40GB - 14GB) / 1GB) = 26.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Batch size of 32 causes OOM; maximum safe batch is 26.
