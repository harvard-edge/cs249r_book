title: The Decode Bandwidth Demand
scenario: During LLM decoding, every output token requires reading the full KV-cache in addition to the
  model weights. For a 13B model serving a single request at 8k context length, calculate the total memory
  bandwidth consumed per token and the resulting tokens-per-second on an A100 (2 TB/s).
question: For a 13B FP16 model at 8k context on an A100, how many bytes are read per decode token and
  what tokens/sec does that imply?
details:
  realistic_solution: 'Each decode step reads: (1) all model weights (for the linear projections), and
    (2) the full KV-cache (for attention computation). Both are streamed from HBM. The total bandwidth
    demand per token is the sum of both.'
  common_mistake: '**The Pitfall:** Assuming only the model weights need to be read.

    **The Rationale:** Candidates assume the KV-cache is small and negligible.

    **The Consequence:** At 8k context, ignoring the KV-cache leads to underestimating bandwidth demand
    and overestimating tokens/sec.'
  napkin_math: '**Assumptions & Constraints:**

    - 13B model in FP16: 26 GB weights.

    - KV-cache at 8k context: 40 layers, 40 heads, dim 128, FP16.

    - A100 bandwidth: 2 TB/s.

    **Calculations:**

    - KV-cache size: 2 * 40 * 40 * 128 * 8192 * 2 = 6.7 GB.

    - Total bytes read per token: 26 + 6.7 = 32.7 GB.

    - Time per token: 32.7 / 2000 = 16.4 ms.

    - Tokens/sec: ~61 tokens/sec.

    **Conclusion & Interpretation:**

    - The KV-cache adds 26% latency at 8k context, and without it throughput would be 77 tokens/sec.'
