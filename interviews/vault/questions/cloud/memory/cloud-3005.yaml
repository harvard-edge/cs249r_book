title: Long-Context KV Cache Budget for 13B Serving
scenario: 'Your 13B LLM serving endpoint needs to support 32K-token context windows for code generation. A single 32K-token KV cache requires: 40 layers * 2 * 8 KV heads * 128 head_dim * 32K tokens * 2B = 5.24GB.'
question: How would you budget HBM to support at least 10 concurrent 32K-context requests for the 13B model?
details:
  realistic_solution: |
    The unoptimized bf16 KV-cache budget does not fit safely on an 80GB H100: 26GB model + 52.4GB KV + 1.8GB CUDA/fragmentation overhead = 80.2GB. To support at least 10 concurrent 32K-context requests, require an optimization such as INT8 KV cache. INT8 halves the KV footprint to 26.2GB, so the total becomes 26GB + 26.2GB + 1.8GB = 54GB, leaving enough HBM headroom for the concurrency target.
  common_mistake: |
    **The Pitfall:** Allocating exactly the sum of model and KV cache sizes without overhead.
    **The Rationale:** Candidates forget CUDA context overhead, PyTorch memory fragmentation, and activation memory.
    **The Consequence:** The server immediately OOMs when trying to hit its theoretical concurrency limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model (bf16): 26 GB.
    - One 32K-token FP16 KV cache: 5.24 GB.
    - Required concurrency: 10 simultaneous 32K-context requests.
    - Overhead (CUDA + fragmentation): ~1.8 GB.
    - HBM capacity: 80 GB.

    **Calculations:**
    - FP16 KV for 10 requests: 10 × 5.24 GB/request = 52.4 GB.
    - Sum at FP16: 26 GB model + 52.4 GB KV + 1.8 GB overhead = 80.2 GB (exceeds 80 GB HBM).
    - Fix: INT8 KV Cache halves KV size to 26.2 GB.
    - Total with INT8: 26 GB + 26.2 GB + 1.8 GB = 54 GB.

    **Conclusion & Interpretation:**
    - **Result: 54 GB (Memory-Bound)**. Using INT8 KV cache drops the footprint to 54 GB, safely allowing 10 concurrent 32K-context requests without OOMing.
