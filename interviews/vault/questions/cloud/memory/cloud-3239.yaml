title: Managing Multi-Modal KV-Cache Memory for Mixed Image and Text Batches
scenario: A multi-modal LLM processes a 1080p image that produces 1600 visual tokens plus 512 text tokens. The visual tokens' KV-cache is 10x denser. A batch of 8 requests arrives with mixed text-only and image+text queries.
question: How would you manage KV-cache memory for 8 mixed text-only and image+text requests with 1600 visual tokens and 512 text tokens?
details:
  realistic_solution: 'KV-cache design for multi-modal serving must account for heterogeneous token cost. Text KV is 320 KiB/token, while the prompt states visual-token KV is 10x denser, so visual KV is 3200 KiB/token. For an image+text request, 1600 visual tokens cost 1600 × 3200 KiB = 5000 MiB and 512 text tokens cost 512 × 320 KiB = 160 MiB, for 5160 MiB total. For a mixed batch with 4 image+text and 4 text-only requests, FP16/BF16 KV is 4 × (5000 + 160) MiB + 4 × 160 MiB = 21,280 MiB, about 20.8 GiB. Visual KV is immutable after prefill, so optimize it differently: quantize visual KV to INT4 when quality allows, share visual KV blocks for repeated images, and prioritize cached visual blocks by reuse and recomputation cost. With 4x INT4 compression for visual KV, each image uses 1250 MiB, and the mixed batch becomes 4 × (1250 + 160) + 640 = 6280 MiB, about 6.13 GiB, a roughly 70% memory reduction.'
  common_mistake: |
    **The Pitfall:** Treating visual and text tokens identically in the KV-cache.
    **The Rationale:** Candidates ignore that visual token KV-caches are computed during prefill and never change (images are static), allowing for aggressive, asymmetric optimizations.
    **The Consequence:** Wasting massive amounts of VRAM, severely limiting the maximum concurrent batch size for multi-modal inference workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Text KV: 320 KiB/token.
    - Visual KV: 10x text = 3200 KiB/token.
    - Visual Tokens (FP16/BF16): 1600 * 3200 KiB = 5000 MiB.
    - Text Tokens (FP16/BF16): 512 * 320 KiB = 160 MiB.
    - Mixed Batch: 4 Img+Txt, 4 Text.

    **Calculations:**
    - FP16/BF16 Total: 4 * (5000 MiB + 160 MiB) + 4 * 160 MiB = 21,280 MiB = 20.78 GiB.
    - INT4 Visual (4x compression): 5000 MiB / 4 = 1250 MiB per image.
    - INT4 Visual Total: 4 * (1250 MiB + 160 MiB) + 640 MiB = 6280 MiB = 6.13 GiB.
    - Savings: 1 - 6.13 / 20.78 ≈ 70.5%.

    **Conclusion & Interpretation:**
    - **Result: About 70% memory savings under the stated 10x visual-KV assumption.** Visual KV dominates the batch, so quantization and sharing should target visual blocks first.
