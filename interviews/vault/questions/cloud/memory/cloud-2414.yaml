title: MoE Routing Bandwidth Starvation
scenario: You deploy a 128-expert Mixture of Experts (MoE) transformer on a custom 8-NPU cloud node. Each NPU has 1 TB/s of HBM bandwidth. Using standard top-2 token routing, compute utilization is stuck at 12%. Profiling reveals NPUs spend 85% of their time stalled on HBM reads.
question: Why is the 128-expert MoE only 12% utilized, and what hardware-aware routing or placement change would restore compute efficiency?
details:
  realistic_solution: 'The problem requires hardware-algorithm co-design. Standard top-2 routing causes unstructured, all-to-all memory traffic. Because tokens can be routed to any of the 128 experts, the NPU must constantly page different expert weights in and out of its local SRAM from HBM. The tradeoff is model capacity utilization versus memory bandwidth efficiency. The solution is Expert Parallelism combined with routing constraints: pin 16 specific experts to each of the 8 NPUs and keep their weights stationary in SRAM/HBM. Modify the routing algorithm to penalize cross-NPU routing or enforce ''Expert Choice'' routing, which guarantees balanced expert assignment. This trades a slight drop in theoretical model perplexity for a massive reduction in HBM thrashing, converting the workload from memory-bound back to compute-bound.'
  common_mistake: |
    **The Pitfall:** Attempting to increase NPU clock speed or loop unrolling to fix the low utilization.
    **The Rationale:** Engineers see low compute utilization and attempt to optimize the math kernels, ignoring that standard MoE routing causes unstructured all-to-all memory thrashing.
    **The Consequence:** The workload remains fundamentally memory-bound, and compute optimizations yield zero actual speedup.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128-expert MoE, Top-2 token routing.
       - 8 NPUs, 1 TB/s HBM bandwidth per NPU.
       - 128 GB total expert weights.
    2. **Calculations:**
       - Standard Routing: Each NPU must randomly load all 128 experts (128 GB) per microbatch. 128 GB / 1 TB/s = 128 ms load time. If compute takes 15 ms, utilization = 15 / (128 + 15) = 10.4%.
       - Pinned Routing Solution: Pin 16 specific experts to each NPU. Load drops to 16 GB (16 ms).
       - New Utilization = 15 / (16 + 15) ≈ 48%.
    3. **Conclusion & Interpretation:**
       - Pinned routing heavily reduces HBM thrashing, vastly improving throughput.
       - **Result: Memory-Bound (HBM Thrashing)**
