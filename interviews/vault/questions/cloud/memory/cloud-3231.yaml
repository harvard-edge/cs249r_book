title: KV-Cache Scaling with Context Length Doubling
scenario: GPT-4 extended its context from 8K to 128K tokens. You have a model with 96 layers, 8 GQA KV heads, and head dimension 128.
question: How does doubling context length affect KV-cache memory, decode latency, and maximum batch size for the 96-layer GQA model?
details:
  realistic_solution: 'Doubling context length (e.g., 64K → 128K): (1) KV-cache memory: doubles linearly. Per token: 2 × 8 × 128 × 2B × 96 = 384 KB. At 64K: 24.6 GB. At 128K: 49.2 GB. On H100 (80 GB - 30 GB weights = 50 GB for KV): 64K barely fits (24.6 GB), 128K needs 49.2 GB — only 1 concurrent request. (2) Decode latency: each new token must attend to all previous KV entries. Attention computation per layer: loading KV-cache of 128K × 8 × 128 × 2B = 256 MB per layer. At 3.35 TB/s: 256 MB / 3.35 TB/s = 76 µs per layer × 96 layers = 7.3 ms just for KV-cache loading. At 64K: 3.65 ms. Doubles. (3) Maximum batch size: halves. If 50 GB supports 2 requests at 64K, it supports only 1 at 128K. (4) Prefill compute: quadratic — attention for 128K tokens is 4× more FLOPs than 64K (O(n²) attention). All three costs — memory, decode bandwidth, prefill compute — argue for efficient attention mechanisms at long contexts.'
  common_mistake: |
    **The Pitfall:** Only considering the memory scaling of the KV cache.
    **The Rationale:** Engineers focus on VRAM limits but forget that attention computation time scales linearly for decode and quadratically for prefill.
    **The Consequence:** The system doesn't OOM, but inference latency spikes massively, violating SLAs at long contexts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 96 layers, 8 GQA KV heads, 128 head dimension.
    - Context lengths: 64K and 128K.
    - HBM bandwidth: 3.35 TB/s.

    **Calculations:**
    - KV Memory per Token: 2 (K,V) * 8 heads * 128 dim * 2 bytes * 96 layers = 393,216 bytes (384 KB).
    - Memory at 64K Context: 64,000 tokens * 384 KB = 24.57 GB.
    - Memory at 128K Context: 128,000 tokens * 384 KB = 49.15 GB (2x memory).
    - Decode Bandwidth Cost (128K): Loading 49.15 GB KV cache at 3.35 TB/s memory bandwidth.
    - Decode Latency (KV only): 49.15 GB / 3.35 TB/s = 14.67 ms per decode step.

    **Conclusion & Interpretation:**
    - **Result: 14.67 ms (Memory-Bound)**. Doubling the context length doubles memory footprint and decode latency per step.
