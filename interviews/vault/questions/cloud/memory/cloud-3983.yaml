title: Pinned Buffer Sizing For Embedding DMA
scenario: A recommender inference job must stream 24 GB of cold embedding rows from host memory to an MI300X during each minute of peak traffic. PCIe Gen5 x16 provides about 64 GB/s theoretical bandwidth, but effective DMA throughput with pinned buffers is 50 GB/s.
question: What DMA transfer time and double-buffer size are needed for 24 GB/min of embeddings at 50 GB/s with 200 ms compute chunks?
details:
  realistic_solution: The minute-level transfer time is 24 GB / 50 GB/s = 0.48 seconds, so bandwidth is sufficient on average. For 200 ms compute chunks, the stream rate is 24 GB / 60 s = 0.4 GB/s, so each 200 ms chunk needs about 80 MB of data. A double buffer needs at least 160 MB plus padding.
  common_mistake: |
    **The Pitfall:** Using theoretical PCIe bandwidth or forgetting to double buffer.
    **The Rationale:** Candidates read the Gen5 spec sheet without discounting protocol overhead and assume contiguous buffer overwrites don't block compute.
    **The Consequence:** The system experiences severe stalls as computation threads block waiting for DMA transfers to complete, preventing pipeline overlap.
  napkin_math: |
    - Stream Rate = 24 GB / 60 s = 0.4 GB/s.
    - Chunk data for 200ms = 0.4 GB/s × 0.2 s = 0.08 GB = 80 MB.
    - Double buffer size requirement = 80 MB × 2 = 160 MB.
    - **Total transfer time per minute = 24 GB / 50 GB/s = 0.48 seconds.**
