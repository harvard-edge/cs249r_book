title: 'Model Size Estimation: Master Full Memory Budget for LLM Training on H100'
scenario: You are training a 13B parameter model on H100s with batch size 4, sequence length 2048, using AdamW in BF16 with FP32 optimizer states. You use gradient checkpointing.
question: What is the full GPU memory budget including weights, gradients, optimizer states, and activations, and does it fit on a single H100?
details:
  realistic_solution: 'Weights BF16: 13B \times 2B = 26GB. Gradients BF16: 13B \times 2B = 26GB. Optimizer states FP32 (m + v): 13B \times 4B \times 2 = 104GB. Shardable model states total 26+26+104 = 156GB, so a single 80GB H100 cannot hold full AdamW training state. With ZeRO-3 across 4 data-parallel GPUs, weights, gradients, and optimizer states shard to 156/4 = 39GB per GPU. Activations are not sharded by ZeRO data parallelism; with gradient checkpointing, add the local per-rank activation budget, about 1.2GB for batch 4 and sequence 2048 under this estimate. Total per GPU: 39 + 1.2 = 40.2GB, before framework workspace and fragmentation headroom.'
  common_mistake: |
    **The Pitfall:** Forgetting the optimizer states and completely missing the FP32 inflation multiplier.
    **The Rationale:** Candidates often equate model size (13B) directly with memory (26GB), ignoring that AdamW retains historical momentum and variance for every parameter, typically in FP32 to preserve precision.
    **The Consequence:** Underestimating the true memory footprint by an astronomical 104GB, guaranteeing an instant OOM exception and a completely unworkable training plan.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B params, batch 4, seq 2048, BF16, AdamW FP32.

    **Calculations:**
    - Weights & Gradients: 13B * 2 * 2 = 52 GB.
    - Optimizer (FP32): 13B * 8 = 104 GB.
    - Shardable model states on a single GPU: 156 GB (OOM).
    - Activations with checkpointing on the local rank: ~1.17 GB, not sharded by ZeRO data parallelism.
    - ZeRO-3 over 4 GPUs shards weights, gradients, and optimizer states only: 156 / 4 = 39 GB.
    - Per-GPU total with ZeRO-3: 39 + 1.17 = 40.17 GB, plus framework workspace/headroom.

    **Conclusion & Interpretation:**
    - **Result: Total 40.17 GB with ZeRO-3**. Full single-GPU AdamW training does not fit; ZeRO-3 over 4 GPUs fits the estimated model states plus local checkpointed activations with practical headroom still required.
