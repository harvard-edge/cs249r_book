title: Activation Checkpointing vs CPU Offloading
scenario: You are training a large 3D medical vision model on a node with 8x A100 GPUs. Due to the massive high-resolution inputs, the total memory required per GPU for parameters, optimizer states, and forward activations is 120GB, exceeding the 80GB hardware limit.
question: Should you bridge the 40GB gap using Activation Checkpointing or CPU Offloading over PCIe Gen4?
details:
  realistic_solution: Activation checkpointing is generally the optimal choice for modern dense architectures. Recomputing the activations directly on the GPU is significantly faster than paying the latency and bandwidth tax of moving tens of gigabytes back and forth over PCIe Gen4.
  common_mistake: |
    **The Pitfall:** Assuming that host RAM offloading is universally better because it avoids redundant computation.
    **The Rationale:** Without calculating the severe latency penalty of the PCIe bus bottleneck compared to the GPU's teraflops.
    **The Consequence:** Slower training times due to PCIe bus saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 FP16 Compute: 312 TFLOPS.
    - PCIe Gen4 x16 bandwidth: ~32 GB/s.

    **Calculations:**
    - Recomputation is faster if: FLOPs / 312e12 < Bytes / 32e9.
    - Simplifies to an Arithmetic Intensity < 9,750 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: < 9,750 FLOPs/Byte (Bandwidth-Bound)**. Most neural network layers have an Arithmetic Intensity far below 9,750 FLOPs/Byte, making recomputation on the GPU significantly faster than PCIe offloading.
