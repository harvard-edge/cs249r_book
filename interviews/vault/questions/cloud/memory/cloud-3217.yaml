title: KV-Cache Quantization to INT8
scenario: Your Llama 3 70B serving deployment on 4 GPUs can handle 64 concurrent requests at 4K context with BF16 KV-cache. Your PM wants to double concurrency to 128 without adding GPUs. You propose quantizing the KV-cache from BF16 to INT8. Analyze the memory savings and quality impact.
question: Can INT8 KV-cache quantization double concurrency from 64 to 128 at 4K context, and what quality impact should you expect?
details:
  realistic_solution: 'Memory analysis: BF16 KV-cache per request at 4K context = 4096 x 320 KB = 1,310,720 KB = 1.31 GB. For 64 requests, that is about 83.9 GB. INT8 halves the bytes per token to 160 KB, so one 4K request uses about 655 MB and 128 requests use about 83.9 GB. Thus INT8 can double concurrency if KV cache dominates the memory budget and scheduler/block overheads do not consume the saved memory. Quality impact: INT8 KV-cache is lossy, but per-head or per-channel dynamic scales usually keep 4K-context degradation small. Long-context workloads are more exposed to accumulated quantization error, so validate quality before enabling it globally.'
  common_mistake: |
    **The Pitfall:** Assuming KV-cache quantization is entirely lossless for all sequence lengths.
    **The Rationale:** Candidates equate KV-cache INT8 quantization with standard weight-only quantization techniques, overlooking the autoregressive accumulation of error.
    **The Consequence:** Degrading model perplexity on long-context tasks (>16K tokens) where the quantization noise accumulates through many attention steps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Context: 4096 tokens.
       - BF16 Cost: 320 KB/token. INT8 Cost: 160 KB/token.
       - KV cache is assumed to dominate the incremental memory budget.
    2. **Calculations:**
       - BF16 per request: 4096 * 320 KB = 1,310,720 KB = 1.31 GB.
       - BF16 memory for 64 requests: 1.31 GB * 64 = 83.9 GB.
       - INT8 per request: 4096 * 160 KB = 655,360 KB = 0.655 GB.
       - INT8 memory for 128 requests: 0.655 GB * 128 = 83.9 GB.
    3. **Conclusion & Interpretation:**
       - **Result: KV-cache-capacity-bound.** INT8 halves KV-cache memory and can double concurrency under the stated memory-dominance assumption, with small but workload-dependent quality risk at 4K context.
