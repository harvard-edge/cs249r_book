title: Layer Normalization Memory Cost
scenario: You are deploying a large Transformer model on a single GPU (2039 GB/s memory bandwidth) and profiling Layer Normalization. The batch has 8 sequences of length 1024, with hidden dimension 4096 in FP16 precision. A naive implementation reads the input tensor to compute mean, reads it again for variance, and reads it a third time to apply normalization and write the output.
question: What are the naive LayerNorm memory traffic and theoretical time, and how do they compare with a fused implementation?
details:
  realistic_solution: 'Calculate memory traffic for LayerNorm. A fused kernel requires only 1 read and 1 write, drastically cutting execution time by halving HBM traffic.'
  common_mistake: |
    **The Pitfall:** Focusing on FLOPs instead of memory bandwidth.
    **The Rationale:** Engineers optimize for compute efficiency, forgetting that operations with low arithmetic intensity (like LayerNorm) are strictly memory-bound.
    **The Consequence:** Wasted optimization efforts on math rather than reducing HBM traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size = 8 * 1024 * 4096 * 2 bytes = 67.1 MB.
    - Bandwidth = 2039 GB/s.

    **Calculations:**
    - Naive (3 reads, 1 write) traffic = 4 * 67.1 MB = 268.4 MB.
    - Naive time = 268.4 MB / 2039 GB/s = 0.131 ms.
    - Fused (1 read, 1 write) traffic = 2 * 67.1 MB = 134.2 MB.
    - Fused time = 134.2 MB / 2039 GB/s = 0.065 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Kernel fusion cuts memory traffic and latency by ~50%).**
