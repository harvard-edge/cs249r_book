title: MI300X GraphSAGE Bandwidth
scenario: An MI300X runs a GraphSAGE model heavily bottlenecked by random memory access. Total HBM bandwidth is 5.3 TB/s, but cache misses force 64-byte fetches per 4-byte node feature.
question: Calculate the effective feature processing bandwidth considering the hardware fetch amplification.
details:
  realistic_solution: The hardware fetches a full 64-byte cache line for every 4-byte feature read, resulting in a 16x amplification factor. Effective bandwidth = 5.3 TB/s / 16 = 0.33125 TB/s (~331 GB/s). Standard nsys profiling reveals massive HBM read amplification.
  common_mistake: |
    **The Pitfall:** Ignoring cache line granularity and assuming all HBM bandwidth translates to payload throughput.
    **The Rationale:** Theoretical peak metrics do not account for the hardware fetching full 64-byte cache lines for scattered 4-byte random accesses.
    **The Consequence:** Expected model performance is overestimated by a factor of 16x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Theoretical HBM Bandwidth: 5.3 TB/s.
       - Cache line size: 64 bytes.
       - Feature size: 4 bytes.
    2. **Calculations:**
       - Fetch Amplification = 64 bytes / 4 bytes = 16x.
       - Effective Bandwidth = 5.3 TB/s / 16 = 0.33125 TB/s.
    3. **Conclusion & Interpretation:**
       - **Result: ~331 GB/s effective bandwidth.** (Memory-Bound)
