title: 'Diagnosing Low SM Utilization in LLM Decoding: Memory Hierarchy Design'
scenario: Your team deployed a 7B parameter LLM (14GB in BF16 weights) on a single A100 GPU for real-time chat. During the auto-regressive decoding phase at batch size 1, the infrastructure dashboard shows GPU compute utilization (SM active) is hovering under 5%, with latency sitting at 7ms per token (~142 tokens/sec). The platform team assumes the model code is inefficient and proposes upgrading to H100 GPUs expecting a proportional 3.1x speedup.
question: Why is the 7B BF16 model under 5% SM utilization at 7ms/token, and what H100 speedup should the team actually expect?
details:
  realistic_solution: |
    The decoding phase is strictly memory bandwidth bound. Auto-regressive generation requires loading the entire 14GB weight tensor for a single token's matrix-vector multiplication, executing very little math per byte fetched. Upgrading to an H100 will only yield a speedup proportional to its memory bandwidth increase (1.67x), completely ignoring its massive compute (TFLOPS) advantages.
  common_mistake: |
    **The Pitfall:** Assuming low SM utilization implies unoptimized compute logic and expecting performance to scale linearly with the jump in peak TFLOPs.
    **The Rationale:** Developers accustomed to training or high-batch inference look primarily at TFLOPs as the metric of performance, entirely missing the Roofline Model's implication for low-arithmetic-intensity workloads.
    **The Consequence:** Millions of dollars might be spent on H100 upgrades anticipating a >3x latency improvement, only to realize a mere 1.67x bump because the bottleneck was memory bandwidth, not compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters in BF16 (14 GB weights).
    - A100: 312 TFLOPS, 2.0 TB/s memory bandwidth.
    - H100: 989 TFLOPS, 3.35 TB/s memory bandwidth.
    - Phase: Autoregressive decoding at batch size 1.

    **Calculations:**
    - Arithmetic Intensity: 14 GFLOPs / 14 GB = 1 FLOP/byte.
    - A100 Decode Latency: 14 GB / 2.0 TB/s = 7.0 ms/token.
    - H100 Decode Latency: 14 GB / 3.35 TB/s = 4.18 ms/token.
    - Expected Speedup: 7.0 ms / 4.18 ms = 1.67x.

    **Conclusion & Interpretation:**
    - **Result: Memory Bandwidth-Bound.** Decoding is strictly limited by how fast weights can be read from HBM. Upgrading to H100 yields only a 1.67x speedup (proportional to bandwidth), not a 3.1x speedup (proportional to TFLOPS).
