title: Mixed Precision Optimizer State Underflow
scenario: You are pre-training a 10B parameter model. To fit the training job onto your GPUs, you aggressively cast the Adam optimizer states and the master weights from FP32 to FP16, saving ~80GB of memory. After 5,000 steps, the training loss plateaus completely.
question: "Why does casting Adam states and master weights to FP16 cause the 10B model's loss to plateau after 5,000 steps?"
details:
  realistic_solution: The training has stalled due to weight update underflow (swamping). Optimizer weight updates become extremely small as training progresses. When adding a tiny update to a relatively large weight in FP16, the update falls below the precision gap (machine epsilon), resulting in an effective update of zero. Master weights must be FP32 to accumulate tiny updates.
  common_mistake: |
    **The Pitfall:** Believing the learning rate is too high.
    **The Rationale:** Misdiagnosing the plateau as an FP16 gradient overflow or explosion.
    **The Consequence:** Unnecessary hyperparameter tuning that fails to resolve the underlying precision loss.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 has 10 explicit mantissa bits.

    **Calculations:**
    - For a weight W ≈ 1.0, precision gap is 2^-10 ≈ 0.000976.
    - A typical late-stage update of 0.0001 is smaller than this gap.

    **Conclusion & Interpretation:**
    - **Result: 1.0 + 0.0001 in FP16 evaluates to exactly 1.0 (Precision-Bound)**. Stalling training completely.
