title: OOM During Optimizer Initialization on A100
scenario: You are setting up mixed-precision training for a 7B parameter model on a single A100 GPU (80 GB HBM2e). The model weights are loaded in FP16, taking up 14 GB. You initialize the AdamW optimizer to begin training. However, the script crashes with a CUDA Out of Memory (OOM) error during optimizer initialization, before the first forward pass even starts.
question: Why does AdamW initialization OOM on an 80 GB A100 after loading only 14 GB of FP16 weights for a 7B model?
details:
  realistic_solution: The OOM occurs because standard mixed-precision AdamW keeps the loaded FP16 model weights and also allocates FP32 training state. The usual state at optimizer setup is an FP32 master copy of the weights plus FP32 first-moment and second-moment buffers. Those three FP32 arrays require 12 bytes per parameter, or 84 GB for 7B parameters, in addition to the 14 GB FP16 model weights already loaded. That is 98 GB before activations, gradient buffers, fragmentation, or framework overhead, so an 80 GB A100 OOMs before the first forward pass.
  common_mistake: |
    **The Pitfall:** Assuming activations or KV cache are the primary culprits for OOM errors.
    **The Rationale:** Engineers calculate VRAM usage based only on the FP16 weights (14 GB) and underestimate the massive memory footprint of optimizer states in mixed-precision.
    **The Consequence:** Wasting time optimizing batch size or sequence length when the failure occurs before the forward pass even begins.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Weights (FP16): 7B params * 2 bytes = 14 GB.
    - AdamW mixed-precision state at initialization: FP32 master weights, FP32 first moment, FP32 second moment.
    - Gradient buffers and activations are not included.
    - GPU VRAM: 80 GB.

    **Calculations:**
    - Loaded FP16 weights = 7B * 2 bytes = 14 GB.
    - FP32 master weights = 7B * 4 bytes = 28 GB.
    - AdamW first moment = 7B * 4 bytes = 28 GB.
    - AdamW second moment = 7B * 4 bytes = 28 GB.
    - Total before gradients/activations = 14 + 28 + 28 + 28 = 98 GB.

    **Conclusion & Interpretation:**
    - **Result: 98 GB before gradients or activations**. The FP16 weights fit, but AdamW's FP32 master weights and moment buffers push the setup beyond 80 GB.
