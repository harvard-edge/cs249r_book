title: Paged Attention Block Size Fragmentation
scenario: You are serving a 13B model on a single A100 40GB GPU. Max context is 8192 tokens. You implemented
  Paged Attention to manage the KV cache. Initially, you set the block size to 256 tokens to maximize
  memory-fetch efficiency. However, you hit OOM limits at a batch size of 32, despite average request
  lengths being only 300 tokens.
question: Why does a 256-token Paged Attention block size cause OOM at batch size 32, and what block-size
  tradeoff should you make?
details:
  realistic_solution: The root cause is massive internal memory fragmentation due to an oversized block
    size. In Paged Attention, memory is allocated in fixed-size blocks. A request of 300 tokens requires
    two 256-token blocks (512 tokens capacity), wasting 212 tokens worth of KV cache memory. The tradeoff
    in block size selection is internal fragmentation versus page table lookup overhead. Large blocks
    reduce page table size and kernel launch overhead but waste memory for unfilled blocks. Small blocks
    (e.g., 16 tokens) virtually eliminate internal fragmentation, allowing much higher batch sizes, but
    slightly increase the time spent traversing the block table during the attention computation.
  common_mistake: '**The Pitfall:** Decreasing the maximum context length or reducing the batch size to
    avoid OOM.

    **The Rationale:** Engineers treat OOM purely as a hard capacity limit instead of diagnosing internal
    fragmentation.

    **The Consequence:** They artificially constrain the model''s throughput and capabilities without
    addressing the underlying wasted memory.'
  napkin_math: '**Assumptions & Constraints:**

    - Block size = 256 vs 16. Request = 300 tokens.

    - Batch size = 32. KV size per token = 100KB.

    **Calculations:**

    - At block size 256: 2 blocks = 512 tokens. Wasted = 212. Fragmentation = 41.4%.

    - Wasted memory at batch 32 = 32 * 212 * 100KB = ~678 MB.

    - At block size 16: 19 blocks = 304 tokens. Wasted = 4 tokens (1.3% fragmentation).

    **Conclusion & Interpretation:**

    - **Result: Reducing block size to 16 saves ~670 MB and allows the batch size to increase.**'
