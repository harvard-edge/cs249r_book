title: The Embedding Hotspot
scenario: Your recommendation system has a 500 GB embedding table sharded across 32
  GPUs. During a flash sale event, GPU 14 OOMs while all other GPUs sit at 40% memory
  utilization. The embedding table hasn't changed size.
question: What happened on GPU 14?
details:
  realistic_solution: 'The flash sale created a massive traffic spike for a small
    set of product IDs. With hash-based sharding, the hot product embeddings happen
    to cluster on GPU 14''s shard. GPU 14 receives 50x more lookup requests, and its
    gradient accumulation buffer for frequently accessed entries grows because the
    optimizer step hasn''t run yet. Meanwhile, the forward pass allocates massive
    activation memory. Fix: use consistent hashing with virtual nodes, replicate hot
    embeddings, or implement a memory-aware request router.

    '
  common_mistake: '**The Pitfall:** Blaming uneven table sharding or a hardware defect.

    **The Rationale:** Candidates confuse perfectly uniform storage distribution with
    dynamic access distribution.

    **The Consequence:** Rebalancing the table does nothing because the problem is
    traffic-driven memory allocation for hot keys.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Embeddings per GPU: 500 GB / 32 = 15.6 GB.

    - GPU 14 receives 19,660 hot entries lookups per micro-batch.

    - 100 queued micro-batches.


    **Calculations:**

    - Gradient buffer for 19,660 hot entries: 19,660 * 128 dims * 4 bytes = 10 MB.

    - Activation memory for 19,660 lookups: 19,660 * 2 KB = 38 MB per micro-batch.

    - Queued activations (100 micro-batches): 100 * 38 MB = 3.8 GB.

    - Optimizer state (Adam m, v): 250B params * 12 bytes / 32 GPUs = 93.75 GB.


    **Conclusion & Interpretation:**

    - **Result: 93.75 GB Optimizer State (Memory-Bound)**. The OOM occurs because
    the static optimizer state (93.75 GB) already exceeds the GPU budget, forcing
    CPU offloading which then bottlenecks on PCIe bandwidth.

    '
