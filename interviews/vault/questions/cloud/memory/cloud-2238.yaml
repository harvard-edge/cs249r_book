title: The Storage Disaggregation Dilemma
scenario: 'You are advising a hyperscaler on their next-generation AI training cluster architecture. The current design uses ''converged'' nodes where each GPU server has local NVMe SSDs for data caching and checkpoint staging. The infrastructure team proposes ''disaggregated storage'': removing local SSDs entirely and replacing them with a high-bandwidth network-attached NVMe-oF (NVMe over Fabric) storage pool. Their argument: better utilization (shared pool vs stranded per-node capacity), easier replacement of failed drives, and simpler node design. The training platform team pushes back, arguing this will destroy checkpoint performance and introduce a new single point of failure. Evaluate both architectures. Under what conditions is disaggregated storage the right choice, and when does converged storage win?'
question: Under what conditions is disaggregated storage the right choice, and when does converged storage win?
details:
  realistic_solution: 'The tradeoff hinges on two ratios: (1) the network bandwidth per node relative to local NVMe bandwidth, and (2) the I/O latency sensitivity of the workload. Converged wins when: (a) Checkpoint writes are in the critical path. Local NVMe at 6-25 GB/s per node with ~50us latency is materially faster and lower-jitter than NVMe-oF at 3-6 GB/s with ~300-500us latency over a 200 Gbps fabric. (b) The training data pipeline requires low-jitter random reads. Local NVMe provides deterministic latency; network-attached storage introduces tail latency from fabric congestion, competing traffic, and switch hops. (c) The cluster runs a single large training job — storage is not ''stranded'' because every node is active. Disaggregated wins when: (a) The cluster is multi-tenant with heterogeneous workloads. Some jobs are I/O-heavy, others are not. A shared pool avoids 80% of NVMe sitting idle on compute-heavy nodes. (b) Drive replacement and capacity scaling are operationally expensive.
    A JBOF (Just a Bunch of Flash) rack can be hot-swapped without affecting GPU nodes. (c) The network fabric is overprovisioned (400-800 Gbps per node with RDMA), narrowing the bandwidth gap to <2×. The hybrid approach most hyperscalers adopt: small local NVMe (1-2 drives) for checkpoint staging and data pipeline buffering, plus a disaggregated pool for capacity-tier storage. This gives latency-sensitive operations local speed while sharing bulk capacity.'
  common_mistake: |
    **The Pitfall:** Choosing storage architecture from utilization alone, without checking checkpoint criticality and I/O tail latency.
    **The Rationale:** Disaggregation improves pooling and operations, but it moves cache misses and checkpoint staging onto a shared network path where congestion and tail latency matter.
    **The Consequence:** The cluster either strands expensive local flash on compute-heavy jobs or centralizes latency-sensitive training I/O on a shared pool that cannot meet checkpoint and data-loader jitter requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - 12,500 nodes.
    - Converged: 4 * 3.84 TB NVMe per node = 15.36 TB/node, about 25 GB/s local read bandwidth, ~50us device latency.
    - Disaggregated: shared NVMe-oF pool over RDMA; bandwidth can be provisioned, but tail latency and fabric contention are higher than local flash.
    - Average usable local-cache capacity requirement across mixed jobs: about 15% of installed converged capacity.

    **Calculations:**
    - Per-node checkpoint write to local NVMe: 1.6 GB / 6 GB/s = 0.27s before background replication.
    - Converged raw NVMe capacity: 12,500 * 15.36 TB = 192,000 TB = 192 PB.
    - If average useful cache/staging occupancy is 15%, required pooled capacity is 0.15 * 192 PB = 28.8 PB.
    - Stranded converged capacity is about 192 PB - 28.8 PB = 163.2 PB.
    - At $50/TB, stranded converged flash represents 163,200 TB * $50/TB = $8.16M of underused hardware.
    - A 30 PB disaggregated pool at $80/TB costs 30,000 TB * $80/TB = $2.4M, before fabric and controller costs.

    **Conclusion & Interpretation:**
    - **Result: Utilization versus latency tradeoff (Architecture-Bound)**. Pooling can save several million dollars when workloads are mixed and latency-tolerant, but converged local NVMe wins when checkpoint staging or random-read jitter is on the training critical path.
  options:
    - Disaggregated storage is always the right answer because pooling NVMe automatically removes checkpoint bottlenecks and tail latency does not matter.
    - Converged storage is always the right answer because local NVMe is always faster and shared pools are never worth the complexity.
    - Disaggregated storage is a good choice when the cluster is multi-tenant or capacity-bound and the workload can tolerate some extra storage latency. Converged local NVMe wins when checkpoint writes and random reads are in the critical path, or when low-jitter bandwidth is more important than utilization.
    - Storage architecture should be chosen primarily from GPU FLOPS and model parameter count; checkpoint I/O is secondary.
