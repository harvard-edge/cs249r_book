title: Roofline Analysis of LLM Decoding on A100
scenario: You are running inference for a 30-billion parameter LLM in FP16 on an NVIDIA A100 GPU (2.0 TB/s memory bandwidth, 312 TFLOPS FP16). During the auto-regressive generation phase at batch size 1, the system achieves exactly 33 tokens/second. To hit a strict latency target of 66 tokens/second, a colleague proposes upgrading to a newer accelerator that offers 600 TFLOPS of FP16 compute but retains the same 2.0 TB/s HBM bandwidth.
question: What arithmetic intensity and throughput should you expect from upgrading to 600 TFLOPS but the same 2.0 TB/s bandwidth?
details:
  realistic_solution: 'Calculate the arithmetic intensity (AI) to prove the workload is memory-bound. Reject the compute upgrade since it provides 0% speedup. Instead, propose solutions that alleviate the memory bottleneck: quantizing the weights to INT8 to halve memory traffic, upgrading to hardware with higher memory bandwidth, or using speculative decoding.'
  common_mistake: |
    **The Pitfall:** Assuming that doubling the peak compute capability (TFLOPS) will proportionally increase throughput.
    **The Rationale:** Engineers equate better GPUs solely with higher compute power.
    **The Consequence:** They invest in massive compute upgrades that yield exactly 0% speedup because batch size 1 generation is completely memory-bandwidth bound.
  napkin_math: |
    *   Weights = 30B params × 2 bytes/param (FP16) = 60 GB per forward pass.
    *   Compute per token = 2 × 30B = 60 GFLOPs.
    *   Arithmetic Intensity (AI) = 60 GFLOPs / 60 GB = 1 FLOP/byte.
    *   A100 ridge point is 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte.
    *   Since 1 << 156, the workload is heavily memory-bound.
    *   Max throughput = Memory Bandwidth × AI = 2.0 TB/s × 1 FLOP/byte = 2.0 TFLOPs/s.
    *   Tokens/sec = 2.0 TFLOPs/s / 60 GFLOPs/token = 33 tokens/sec.
    *   New accelerator max throughput = 2.0 TB/s × 1 FLOP/byte = 2.0 TFLOPs/s (33 tokens/sec).
    *   **Result: The upgrade yields exactly 0% speedup because the workload is entirely memory-bandwidth bound at 1 FLOP/byte.**
