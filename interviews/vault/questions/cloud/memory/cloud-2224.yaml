title: The Storage Tier Latency Gap
scenario: 'A training cluster has four storage tiers: HBM on the GPU, host DRAM, local NVMe SSDs, and a parallel filesystem (Lustre) over the network.'
question: How many orders of magnitude separate HBM access latency from Lustre, and why does that gap matter for ML training?
details:
  realistic_solution: 'The gap spans roughly 5-6 orders of magnitude. HBM access latency is ~300ns, host DRAM is ~100ns but accessed via PCIe at ~1-2us effective, local NVMe is ~10-100us, and a Lustre read over the network is ~1-10ms. From HBM (~300ns) to Lustre (~3ms), that is approximately 10,000x or ~4 orders of magnitude. This matters because any training step that stalls on a remote filesystem read pays a latency penalty thousands of times larger than a local memory access, making storage tiering essential.'
  common_mistake: |
    **The Pitfall:** Underestimating the latency penalty of remote filesystem reads.
    **The Rationale:** Extrapolating single-machine NVMe latency intuition to distributed network filesystems.
    **The Consequence:** Designing data loaders that stall accelerators, causing massive training bottlenecks and poor cluster utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM Latency: ~300ns.
    - Host DRAM via PCIe: ~2µs.
    - NVMe SSD: ~50µs.
    - Lustre over network: ~3ms.

    **Calculations:**
    - Ratio of Lustre to HBM: 3ms / 300ns.
    - 3,000,000ns / 300ns = 10,000x.
    - Orders of magnitude: log10(10,000) = 4.
    - If comparing L1 cache (1ns) to Lustre (3ms): 3,000,000x = 6 orders of magnitude.

    **Conclusion & Interpretation:**
    - **Result: 4-6 orders of magnitude (I/O-Bound starvation risk)**. Distributed network filesystem reads incur massive latency penalties, demanding tiered storage.
