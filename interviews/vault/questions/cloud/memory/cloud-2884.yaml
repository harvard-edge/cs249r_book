title: Deriving Optimal Checkpoint Intervals
scenario: 'You are training a 100B Transformer (128 layers). Forward pass takes 8ms per layer. Activation memory is 3GB per layer. You have an 80GB HBM budget.'
question: 'What checkpoint interval k minimizes training time under an 80GB HBM budget?'
details:
  realistic_solution: 'Peak activation memory is k * M. Constraint: k * M <= B. To minimize time, maximize k subject to the budget. Optimal k = floor(80/3) = 26 layers.'
  common_mistake: |
    **The Pitfall:** Choosing k based solely on a generalized heuristic like sqrt(N).
    **The Rationale:** Candidates fail to model exact recompute overhead and bandwidth boundaries.
    **The Consequence:** Selecting an interval that either violates the memory budget or introduces massive unnecessary recompute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget (B) = 80 GB. Layer Mem (M) = 3 GB.
    - Layers (N) = 128. Forward Time = 8ms.
    
    **Calculations:**
    - Constraint: k <= B / M.
    - Optimal k = floor(80 / 3) = 26.
    - Peak Memory = 26 * 3 = 78 GB.
    - Overhead = 128 * 8ms = 1.024s.
    
    **Conclusion & Interpretation:**
    - **Result: Optimal k=26 yields 1.024s overhead (Memory-Bound)**. Max safe interval minimizes bandwidth and recompute penalties.
