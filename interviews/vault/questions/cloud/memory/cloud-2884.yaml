title: Deriving Optimal Checkpoint Intervals
scenario: You are training a 100B Transformer (128 layers). Forward pass takes 8ms per layer. Activation memory is 3GB per layer. You have an 80GB HBM budget.
question: What is the largest feasible checkpoint interval k under an 80GB HBM budget, assuming peak activation memory within a checkpoint segment is k layers times 3GB per layer?
details:
  realistic_solution: With the stated simplified segment model, peak activation memory is k * M. The feasibility constraint is k * 3GB <= 80GB, so k <= 26.67. The largest feasible interval is therefore k = 26 layers, with peak segment activation memory of 78GB. The 8ms per-layer forward time is useful for estimating recompute cost once a checkpointing algorithm is specified, but it is not itself an extra overhead from choosing k.
  common_mistake: |
    **The Pitfall:** Choosing k based solely on a generalized heuristic like sqrt(N).
    **The Rationale:** Candidates fail to model exact recompute overhead and bandwidth boundaries.
    **The Consequence:** Selecting an interval that either violates the memory budget or introduces massive unnecessary recompute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget (B) = 80 GB. Layer Mem (M) = 3 GB.
    - Layers (N) = 128. Forward time = 8ms per layer.
    - Simplified segment model: peak activation memory inside one checkpoint segment is k * M.

    **Calculations:**
    - Feasibility constraint: k * M <= B.
    - k <= B / M = 80 / 3 = 26.67.
    - Optimal k = floor(80 / 3) = 26.
    - Peak Memory = 26 * 3 = 78 GB.
    - Full forward compute for reference = 128 * 8ms = 1024ms = 1.024s; this is not the checkpoint overhead by itself.

    **Conclusion & Interpretation:**
    - **Result:** The largest feasible interval under this memory model is k=26, leaving 2 GB of activation headroom. A true training-time optimum would require an explicit recompute schedule; the provided numbers only justify the memory-feasible interval.
