title: The VRAM Cost of Context
scenario: 'You are deploying a chatbot service using an architecture with a hidden dimension of 8192 (`d_model`) and 80 layers. The product team wants to guarantee support for a 4096-token context window.'
question: 'How would you calculate the FP16 KV-cache VRAM for one 4,096-token request on this 80-layer, d_model=8192 model?'
details:
  realistic_solution: 'The KV-cache stores Key and Value vectors for every token across all layers. The formula is 2 * layers * (num_heads * head_dim) * seq_len * bytes_per_param. Using d_model directly substitutes (num_heads * head_dim). For FP16 precision, we multiply by 2 bytes per parameter.'
  common_mistake: |
    **The Pitfall:** Only accounting for model weights or miscalculating the cache size formula.
    **The Rationale:** Candidates frequently forget the x2 factor for storing both Keys and Values, or forget the 2 bytes per parameter conversion for FP16.
    **The Consequence:** Under-provisioning GPU memory, leading to unexpected Out-Of-Memory (OOM) errors during extended chat sessions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layers: 80, d_model: 8192, Context: 4096 tokens.
    - Precision: FP16 (2 bytes per parameter).

    **Calculations:**
    - Formula: 2 (K+V) * 80 * 8192 * 4096 * 2 bytes.
    - 2 * 80 * 8192 * 4096 * 2 = 10,737,418,240 bytes.

    **Conclusion & Interpretation:**
    - **Result: The KV cache requires exactly 10 GiB for a single 4096-token request (Memory-Bound).**
