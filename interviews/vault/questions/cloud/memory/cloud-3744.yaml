title: Activation Checkpointing Granularity Trade-off for 405B Model Training on H100
scenario: Training Llama-3-405B on 512 GPUs. Without activation checkpointing, peak activation memory per GPU exceeds 80GB. With full checkpointing, recomputation overhead is 33%. With selective checkpointing, recomputation is 15%.
question: Analyze the memory-compute trade-off and determine whether you should use full or selective activation checkpointing?
details:
  realistic_solution: Use selective activation checkpointing if the memory target can be met, because it buys most of the activation-memory relief at much lower recomputation cost. Full checkpointing saves the full intermediate activation set but costs 33% extra compute. Selective checkpointing saves about 60% of the activation memory at 15% extra compute by checkpointing the high-memory components and avoiding unnecessary recomputation of cheaper components. The efficiency ratio is 100/33 = 3.03 units of memory saved per compute-overhead point for full checkpointing versus 60/15 = 4.0 for selective checkpointing. Selective is therefore 4.0/3.03 = 1.32x, or about 32%, more compute-efficient per unit of activation memory saved. If selective does not fit within 80GB, then fall back to full checkpointing; otherwise selective is the clear recommendation.
  common_mistake: |
    **The Pitfall:** Applying uniform full checkpointing without recognizing component differences.
    **The Rationale:** Candidates assume all layers or components have similar recomputation costs and memory footprints.
    **The Consequence:** Over-penalizing compute with full checkpointing when MLP activations are cheap to recompute but attention is expensive, missing a 33% efficiency gain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full checkpointing: 33% FLOPs overhead, saves 100% of intermediate activation memory.
    - Selective checkpointing (attention only): 15% FLOPs overhead, saves ~60% of activation memory.

    **Calculations:**
    - Full Efficiency Ratio: 100 units saved / 33 overhead points = 3.03 memory-saved units per overhead point.
    - Selective Efficiency Ratio: 60 units saved / 15 overhead points = 4.0 memory-saved units per overhead point.
    - Efficiency Gain: 4.0 / 3.03 = 1.32 (32% more efficient).

    **Conclusion & Interpretation:**
    - **Result: Selective checkpointing is preferred when it fits**. It is about 32% more compute-efficient per unit of activation memory saved; use full checkpointing only if selective checkpointing still exceeds the per-GPU memory budget.
