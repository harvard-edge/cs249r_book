title: The KV-Cache VRAM Budget (cloud-0025)
scenario: You are tasked with serving a Llama 70B model on H100 GPUs. A single user request arrives with a large context window of 128,000 tokens.
question: "Can this request be handled by a single H100?"
details:
  realistic_solution: The request cannot be handled by a single H100 GPU. The model weights alone (140 GB in FP16) already exceed the 80 GB VRAM capacity. Adding the KV-cache for 128k tokens (~42 GB with GQA) brings the total to ~182 GB. This necessitates multi-GPU inference using tensor parallelism — at minimum 3 H100s, practically 4 for headroom. The KV-cache, while not exceeding the weight memory in this GQA model, is still a major dynamic memory consumer that scales linearly with sequence length.
  common_mistake: |
    **The Pitfall:** Only considering the memory required for model weights and ignoring the KV-cache.
    **The Rationale:** Treating the LLM as a static memory footprint and failing to account for dynamic state that scales linearly with sequence length.
    **The Consequence:** Severe Out-Of-Memory (OOM) errors in production when users submit long-context queries.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B params (FP16).
       - KV Cache: 80 layers, 8 KV heads, 128 head dim, 128,000 tokens.
    2. **Calculations:**
       - Model Weights: 70B * 2 bytes = 140 GB.
       - KV Cache Size: 2 (K/V) * 80 * 8 * 128 * 128,000 * 2 bytes = ~42 GB.
       - Total VRAM: 140 GB + 42 GB = 182 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Capacity.** At 182 GB, a single request requires at least 3x 80GB H100 GPUs using tensor parallelism.
  options:
  - ~140 GB. It will not fit, as this is larger than the H100's 80GB VRAM.
  - ~84 GB. It will just fit, but leaves no room for the model weights.
  - ~335 GB. It will not fit, as this is over 4x the H100's 80GB VRAM.
  - ~42 GB. It will require at least half of an H100's 80GB VRAM for a single request's KV-cache alone.
