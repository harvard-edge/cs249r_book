title: Shared Memory Tile Sizing for CUDA Matmul
scenario: A custom CUDA matrix multiplication kernel reads FP16 tiles for tensor core matmul. You are considering a 128x128 tile of A and a 128x128 tile of B on an A100-class GPU.
question: Given a 164KB shared-memory limit per SM, would two 128x128 FP16 tiles fit, and where should they be staged?
details:
  realistic_solution: Stage the working A and B tiles in the SM's shared memory / L1 region, then feed tensor cores from registers. Two 128x128 FP16 input tiles require 128 * 128 * 2B * 2 = 65,536B, or 64KB, so they fit under a 164KB per-SM shared-memory limit before padding, double buffering, and other scratch space. Larger tiles or double buffering must be checked against the same per-SM capacity.
  common_mistake: |
    **The Pitfall:** Stating L2 cache instead of L1/Shared Memory, or assuming GB-scale SRAM.
    **The Rationale:** Developers accustomed to CPU hierarchies overestimate the size and role of caches on GPUs, missing the explicit developer-managed nature of Shared Memory tiling.
    **The Consequence:** Designing kernels that thrash L2 and fail to feed the Tensor Cores at line rate.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100-class shared memory limit: 164KB per SM.
    - FP16 element size: 2B.
    - Candidate tile: one 128x128 tile of A and one 128x128 tile of B.

    **Calculations:**
    - One tile: 128 * 128 * 2B = 32,768B = 32KB.
    - Two input tiles: 2 * 32KB = 64KB.
    - Remaining shared memory: 164KB - 64KB = 100KB before padding, staging buffers, and occupancy tradeoffs.

    **Conclusion & Interpretation:**
    - **Result: Fits in Shared Memory.** The tile should be staged in SM shared memory, and this specific two-tile footprint fits within the 164KB limit.
