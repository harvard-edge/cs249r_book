title: 'Calculating Paged KV Cache Capacity'
scenario: 'You are deploying a Llama-2 7B model (FP16) on a 24GB GPU. The model weights consume 14GB, and 10GB is reserved for the KV cache. The model has 32 layers, 32 KV heads, and a head dimension of 128. You evaluate PagedAttention (block size 16 tokens) vs static allocation (pre-allocated max length of 2048 tokens) for an average request size of 512 tokens.'
question: 'How many concurrent requests can PagedAttention support with 512-token average sequences versus static 2048-token KV allocation?'
details:
  realistic_solution: 'First, calculate the per-token KV size: 2 (K and V) * 32 layers * 32 heads * 128 dimension * 2 bytes (FP16) = 524,288 bytes (exactly 0.5MB). The total KV cache available is 10GB (10,240MB). Standard static allocation reserves 2048 tokens * 0.5MB = 1024MB per request upfront, supporting exactly 10 concurrent requests. PagedAttention allocates dynamically in 8MB blocks. For an average of 512 tokens, it allocates 256MB per request. Thus, it can support 40 concurrent requests.'
  common_mistake: |
    **The Pitfall:** Failing to calculate the KV size accurately or assuming static allocation reclaims memory.
    **The Rationale:** Engineers frequently forget to multiply by 2 for both K and V, or by 2 bytes for FP16.
    **The Consequence:** Memory capacity is misjudged, leading to Out-of-Memory crashes or severely restricted batch sizes that destroy model serving economics.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10GB KV cache available.
    - 32 layers, 32 KV heads, 128 dimension, FP16.
    - 2048 max tokens vs 512 average tokens.

    **Calculations:**
    - Per-token KV size: 2 (K,V) * 32 * 32 * 128 * 2 bytes = 524,288 bytes (0.5 MB).
    - Static Allocation batch: 2048 tokens * 0.5 MB = 1024 MB. Max batch = 10,240 / 1024 = 10 concurrent requests.
    - Paged Allocation batch: 512 tokens * 0.5 MB = 256 MB.

    **Conclusion & Interpretation:**
    - **Result: 40 concurrent requests (Memory-Bound)**. Max batch is 10,240 / 256 = 40 concurrent requests, a 4x increase over static.
