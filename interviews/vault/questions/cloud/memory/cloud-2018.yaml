title: Calculating NCHW Tensor Memory Offsets
scenario: You are optimizing a custom PyTorch C++ extension for a vision model. The input tensor has shape `[N=8, C=256, H=64, W=64]` and is stored in contiguous NCHW format in FP32.
question: "What is the linear element offset for index [2,128,32,16] in the contiguous NCHW [8,256,64,64] FP32 tensor?"
details:
  realistic_solution: 'In PyTorch''s default contiguous NCHW layout, the tensor is row-major. The strides are calculated from right to left: `[C*H*W, H*W, W, 1]`. Multiply each index by its corresponding stride to find the linear offset.'
  common_mistake: |
    **The Pitfall:** Assuming column-major (Fortran) memory order instead of row-major (C) order.
    **The Rationale:** Misunderstanding how multidimensional arrays map to linear memory in standard PyTorch/C++ conventions.
    **The Consequence:** Fetching completely incorrect data elements, leading to silent calculation errors and corrupted model outputs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shape: N=8, C=256, H=64, W=64.
       - Target Index: [2, 128, 32, 16].
       - Row-major contiguous NCHW format.
    2. **Calculations:**
       - S_W: 1
       - S_H: 64
       - S_C: 64 * 64 = 4096
       - S_N: 256 * 4096 = 1,048,576
       - Offset: 2*(1,048,576) + 128*(4096) + 32*(64) + 16*(1)
       - Summation: 2,097,152 + 524,288 + 2,048 + 16 = 2,623,504.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Address Bound.** The linear offset for the target element is exactly 2,623,504.
