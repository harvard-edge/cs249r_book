title: 'H100 Memory Optimization for Large Language Models: Checkpointing vs. Parallelism'
scenario: Your team is training a Mixture-of-Experts (MoE) LLM with 1 trillion parameters. Initial profiling indicates forward-pass activation storage alone exceeds the available HBM3. You must evaluate aggressive gradient checkpointing on a single accelerator versus pipeline parallelism across multiple devices.
question: How would you choose between aggressive checkpointing on one accelerator and pipeline parallelism across accelerators for a 1T-parameter MoE model?
details:
  realistic_solution: |
    For a 1T-parameter MoE, pipeline or other model parallelism is required because checkpointing only reduces retained activations; it does not make the model weights, optimizer state, and required activations fit on one accelerator. Use pipeline/tensor/expert parallelism to partition the model across accelerators, then add selective checkpointing inside each stage to trade extra forward recomputation for lower activation memory. The design choice is not checkpointing versus parallelism as substitutes: parallelism solves capacity, while checkpointing reduces each stage's activation peak and may allow larger microbatches.
  common_mistake: |
    **The Pitfall:** Overlooking the quadratic increase in recomputation cost or underestimating communication overhead.
    **The Rationale:** Candidates fail to weigh the accelerator's compute-to-memory ratio (FLOPs/Byte) to dictate whether recomputing or communicating is cheaper.
    **The Consequence:** Selecting a strategy that either cripples training speed due to recomputation bottlenecks or pipeline stall bubbles.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1T parameters in BF16 require about 2 TB for weights alone.
    - Optimizer states, gradients, and activations add more memory.
    - Single-accelerator HBM3 capacity is far below the model-state lower bound.

    **Calculations:**
    - Weight lower bound: 1T * 2 bytes = 2 TB before optimizer state or activations.
    - If one accelerator has 80 GB HBM, weights alone require at least 2 TB / 80 GB = 25 accelerators before overhead.
    - Checkpointing can reduce activation storage within each parallel stage, but it does not reduce the 2 TB weight lower bound.

    **Conclusion & Interpretation:**
    - **Result: pipeline/model parallelism is required for capacity**. Checkpointing is complementary: it lowers per-stage activation memory at the cost of extra recomputation, but it is not a single-accelerator solution for a trillion-parameter model.
