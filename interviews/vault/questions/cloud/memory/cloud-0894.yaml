title: Evaluating Compute Upgrades for LLM Decoding
scenario: You are designing an inference service for a 30B parameter LLM (FP16, 60GB
  weights) running on a single NVIDIA A100. The product manager wants to minimize
  latency for single-user queries (batch size = 1). An engineer proposes upgrading
  to a hypothetical next-gen GPU with 624 TFLOPs but the same 2.0 TB/s memory bandwidth
  to halve the token generation latency.
question: Will doubling TFLOPs while keeping 2.0TB/s bandwidth halve batch-1 token
  latency, and what should you do instead?
details:
  realistic_solution: Reject the proposal; it will yield almost zero latency improvement.
    At batch size 1, decoding requires loading all 60GB of weights from HBM for every
    token, resulting in an arithmetic intensity of ~2 FLOPs/byte. Since the A100's
    ridge point is 156 FLOPs/byte, the workload is a classic 'bandwidth hog'. To actually
    improve latency and throughput, implement weight quantization (e.g., INT8 or INT4)
    to reduce bytes loaded per token, use speculative decoding, or increase batch
    size (via continuous batching) to improve arithmetic intensity.
  common_mistake: '**The Pitfall:** Assuming that token generation latency is compute-bound
    and will scale proportionally with raw TFLOPs.

    **The Rationale:** Engineers often fail to recognize the severely low arithmetic
    intensity of auto-regressive decoding at batch size 1.

    **The Consequence:** Recommending expensive hardware upgrades that yield zero
    practical latency improvement.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 30B parameter LLM (FP16, 60GB\
    \ weights).\n   - A100 memory bandwidth: 2.0 TB/s; Compute: 312 TFLOPS.\n   -\
    \ Hypothetical GPU: 2.0 TB/s; Compute: 624 TFLOPS.\n2. **Calculations:**\n   -\
    \ Memory fetching time: 60GB / 2.0 TB/s = 30ms per token.\n   - Compute time on\
    \ A100: (2 * 30B FLOPs) / 312 TFLOPS = 0.19ms.\n   - Total time on A100 = 30.19ms.\n\
    \   - On hypothetical GPU (624 TFLOPS): Compute drops to 0.09ms, memory time remains\
    \ 30ms.\n3. **Conclusion & Interpretation:**\n   - **Result: Memory-Bandwidth-Bound.\
    \ Doubling TFLOPS provides negligible speedup because batch=1 generation is dominated\
    \ by memory bandwidth.**\n"
