title: '70B Decode Throughput: Continuous Batching vs INT8 Matmul'
scenario: You are evaluating optimization strategies for serving a 70B parameter autoregressive model (140GB in BF16 weights) on an 8x A100 GPU cluster (80GB HBM, 2 TB/s bandwidth per GPU). The product requires maximizing throughput for concurrent users while maintaining a strict 50ms time-between-tokens (TBT).
question: For 70B decoding on 8x A100s with a 50ms TBT target, should you prioritize INT8 matmul or continuous batching with PagedAttention?
details:
  realistic_solution: Prioritize continuous batching and memory management with PagedAttention. In decode, the weights are resident in HBM and the serving bottleneck is usually memory traffic plus KV-cache capacity and fragmentation, not raw INT8 matmul throughput. PagedAttention reduces KV-cache waste and lets the system maintain larger active batches, improving throughput while preserving the 50ms TBT target.
  common_mistake: |
    **The Pitfall:** Prioritizing compute optimizations like INT8 matrix multiplication over advanced memory management.
    **The Rationale:** Candidates observe the model's massive FLOPs-to-Bytes ratio and incorrectly assume generation is compute-bound, missing that token-by-token decoding is memory-bandwidth bound.
    **The Consequence:** Engineering time is wasted writing custom INT8 kernels while throughput remains crippled by KV cache fragmentation and tiny batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B (140GB BF16), sharded over 8 GPUs = 17.5GB resident weights per GPU.
    - Hardware: A100 with 80GB HBM and 2 TB/s bandwidth per GPU.
    - Target TBT SLA: 50ms.
    - Approximate 70B-class shape: 80 layers, hidden size 8192, BF16 KV cache.

    **Calculations:**
    - Resident weights leave about 80GB - 17.5GB = 62.5GB per GPU before KV cache, activations, and runtime overhead.
    - KV cache per generated token per request across the model is about 2 * 80 * 8192 * 2 bytes = 2.62MB.
    - At a 4096-token context, KV cache is about 2.62MB * 4096 = 10.7GB per request across the 8-GPU shard, or about 1.34GB per GPU.
    - A 30% fragmentation overhead wastes about 0.4GB per request per GPU at that context; at high concurrency this directly reduces usable batch capacity.
    - The 50ms window provides about 2 TB/s * 0.05s = 100GB of bandwidth per GPU, so a batch-size limit cannot be derived from 17.5GB / 2 TB/s alone.

    **Conclusion & Interpretation:**
    - **Result: KV-cache efficiency and batching dominate the serving decision (Memory-Bound)**. Continuous batching with PagedAttention reduces fragmentation and keeps larger batches active; INT8 matmul is secondary unless profiling shows compute saturation.
