title: Diagnosing Hidden Memory Costs in Convolution
scenario: You are debugging a custom cloud inference engine. When processing batches (N=16) of high-resolution images (1024x1024) through an early 3x3 convolutional layer with 64 input channels, the engine throws an Out-Of-Memory (OOM) error. The theoretical sizes for the input and output tensors in FP16 are only around 2.15 GB each.
question: What transformation causes the OOM in this convolution layer, and how should it be implemented instead?
details:
  realistic_solution: |
    The engine is explicitly materializing the im2col transformation in global memory to leverage standard BLAS matrix multiplication. This process duplicates overlapping sliding windows into a massive 2D matrix. The solution is to rewrite the kernel to use an Implicit GEMM formulation, which computes the im2col tiles on-the-fly in shared memory (SRAM) without fully materializing the expanded matrix in VRAM.
  common_mistake: |
    **The Pitfall:** Assuming the convolution memory footprint is strictly the sum of input, output, and weight tensors.
    **The Rationale:** Candidates overlook the intermediate workspace memory required by the explicit im2col transformation used to map convolutions to GEMM operations.
    **The Consequence:** The memory requirement is drastically underestimated, leading to unexpected OOM errors on large spatial inputs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input tensor: N=16, C=64, H=1024, W=1024 in FP16 (2 bytes).
       - Filter K=3x3.
    2. **Calculations:**
       - Input size: 16 * 64 * 1024^2 * 2 bytes ≈ 2.15 GB.
       - Filter size K=3x3 expands spatial data by K^2 (9) during explicit im2col.
       - Im2col matrix elements: (N * H * W) * (C * K^2) = 16,777,216 * 576 = 9.66 billion elements.
       - Im2col workspace: 9.66 billion * 2 bytes ≈ 19.3 GB.
       - Total layer memory: 19.3 GB (im2col) + 2.15 GB (input) + ~2.15 GB (output) = 23.6 GB.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound.** The explicit im2col step requires a 19.3 GB workspace, inflating total memory to 23.6 GB and causing the OOM.
