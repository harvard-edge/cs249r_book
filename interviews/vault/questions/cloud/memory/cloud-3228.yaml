title: KV-Cache Memory Planning for Multi-Turn Chat
scenario: Your chat service uses Llama 3 8B (32 layers, 4 GQA KV heads, head_dim=128) with an 8K context window. Users average 6 turns per conversation, each turn adding 500 tokens (300 user + 200 assistant).
question: How does KV-cache grow over 6 turns for Llama 3 8B, and how many concurrent conversations fit on one A100-80GB?
details:
  realistic_solution: |
    KV per token per layer: 2 × 4 × 128 × 2B = 2,048 B = 2 KB. Per token across 32 layers: 2 KB × 32 = 64 KB. The conversation adds 500 tokens per turn, so KV grows linearly: turn 1 is 500 tokens × 64 KB = 32 MB, turn 2 is 64 MB, turn 3 is 96 MB, and turn 6 is 3000 tokens × 64 KB = 192 MB per conversation. Model weights take about 16 GB, leaving 64 GB before runtime overhead; assuming about 60 GB is usable for KV after activations, allocator metadata, and safety headroom, turn-6 capacity is 60 GB / 192 MB ≈ 312 concurrent conversations. This estimate is conditional on the 60 GB usable-KV budget; a smaller runtime headroom reduces concurrency proportionally.
  common_mistake: |
    **The Pitfall:** Forgetting that multi-turn conversations accumulate KV-cache across all turns.
    **The Rationale:** Candidates calculate the KV cache only for the current turn's newly generated tokens rather than the entire context history.
    **The Consequence:** Turn 6 memory requirements are severely underestimated because it must attend to all previous turns' tokens, leading to out-of-memory errors in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama 3 8B: 32 layers, 4 GQA heads, 128 head_dim.
    - 6 turns, 500 tokens/turn.
    - A100-80GB budget: 16 GB weights leaves 64 GB before overhead; assume ~60 GB usable for KV.

    **Calculations:**
    - KV/token: 2 * 4 * 128 * 2B * 32 = 64 KB.
    - Turn 1: 500 * 64 KB = 32 MB.
    - Turn 6 (3K tokens): 3000 * 64 KB = 192 MB/conversation.
    - Concurrency at 3K: 60 GB / 192 MB = 312 conversations.

    **Conclusion & Interpretation:**
    - **Result: About 312 concurrent turn-6 conversations under a ~60 GB usable-KV assumption.** Capacity planning must reserve overhead and use expected accumulated context length, not just the latest turn.
