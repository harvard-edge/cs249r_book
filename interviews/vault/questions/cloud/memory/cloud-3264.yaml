title: VRAM Budgeting for 70B LLM on AMD MI300X
scenario: You are deploying a 70-billion parameter LLM on an accelerator. Inference anticipates a max sequence length of 4096 tokens and a batch size of 8. Model weights are stored in FP16.
question: How would you account for VRAM used by FP16 weights, AdamW state, activations, and KV-cache for 70B training and batch-8 inference?
details:
  realistic_solution: Separate the training and inference budgets. Training must account for FP16 weights, FP32 AdamW states, gradients, and peak activations; that state is far beyond one 192 GB accelerator without sharding, checkpointing, and/or offload. Batch-8 inference uses the FP16 weights plus the KV-cache, about 42.95 GB for the stated 4096-token context, so it also needs quantization, tensor parallelism, or careful paging depending on how much HBM remains after weights and runtime overheads.
  common_mistake: |
    **The Pitfall:** Underestimating the VRAM impact of optimizer states and the dynamic KV-cache.
    **The Rationale:** Developers often focus solely on the size of the model weights and ignore the fact that complex optimizers like Adam require per-parameter FP32 states, and that KV-cache scales dynamically.
    **The Consequence:** Severe out-of-memory errors during training or inference, requiring painful architectural overhauls mid-project.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Weights (FP16): 70B * 2 bytes = 140 GB.
    - Optimizer State (AdamW, FP32): 70B * 2 states * 4 bytes = 560 GB.
    - KV-cache shape for inference: 80 layers, 2 tensors (K,V), batch=8, seq=4096, 32 heads, head_dim=128, FP16 (2 bytes).

    **Calculations:**
    - Inference KV-cache = 80 layers * 2 (K,V) * 8 batch * 4096 tokens * 32 heads * 128 dim * 2 bytes = 42.95 GB.
    - Inference lower bound = weights + KV-cache = 140 GB + 42.95 GB = 182.95 GB before runtime overhead.
    - Training lower bound = weights + AdamW states + peak activations = 140 GB + 560 GB + ~40 GB = ~740 GB, before gradients and fragmentation.

    **Conclusion & Interpretation:**
    - **Result: inference ~182.95 GB before overhead; training at least ~740 GB before gradients**. The KV-cache is an inference budget item, while AdamW state and activations dominate training memory, so both modes need different mitigation plans.
