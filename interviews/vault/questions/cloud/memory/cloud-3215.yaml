title: KV-Cache Size Calculation for GQA Models
scenario: Llama 3 70B uses grouped-query attention with 64 attention heads and 8 KV heads, head dimension 128, across 80 layers. Calculate per-layer, per-token-total, and total KV-cache size for batch 32 at 4096 context length in BF16.
question: What are the per-layer, per-token-total, and batch-32 BF16 KV-cache sizes at 4096 context with 8 KV heads?
details:
  realistic_solution: 'KV-cache per token per layer: 2 (K+V) x 8 (KV heads) x 128 (head dim) x 2B (BF16) = 4,096 bytes = 4 KB. Per token across all 80 layers: 4 KB x 80 = 320 KB. For batch 32 at 4096 context: 32 x 4096 x 320 KB = 40 GB. For comparison, full MHA with 64 KV heads would be 8x larger: 2.56 MB per token across all layers and 320 GB for the same batch/context.'
  common_mistake: |
    **The Pitfall:** Using the full 64 attention heads to compute KV-cache size.
    **The Rationale:** Candidates forget that Grouped-Query Attention (GQA) inherently reduces the number of KV heads.
    **The Consequence:** Drastically overestimating the memory footprint, missing that only 8 KV heads need caching, not 64.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 KV heads, 128 head dim, 80 layers, BF16 (2 bytes).
    - Batch 32, 4096 context.

    **Calculations:**
    - KV per token per layer: 2 × 8 × 128 × 2B = 4 KB.
    - Per token (80 layers): 4 KB × 80 = 320 KB.
    - Batch 32 × 4K context: 32 × 4096 × 320 KB = 40 GB.
    - MHA equivalent: 8× larger = 320 GB.

    **Conclusion & Interpretation:**
    - **Result:** GQA caching requires 4 KB per token per layer, 320 KB per token across the model, and 40 GB for batch 32 at 4096 context.
