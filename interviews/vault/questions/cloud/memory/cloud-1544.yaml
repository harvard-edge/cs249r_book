title: Calculate Autoregressive Token Generation Throughput
scenario: You are serving a 7 billion parameter LLM (14GB in FP16) for inference on an NVIDIA A10G GPU,
  which has 24GB of GDDR6 memory and a peak memory bandwidth of 600 GB/s. During the autoregressive token
  generation phase, the workload is strictly memory-bandwidth bound. Assuming each generation step requires
  reading the entire model weights once, calculate the maximum theoretical token generation rate (tokens/sec)
  for a batch size of 1, and evaluate the total system throughput (tokens/sec) if the batch size is increased
  to 4 (assuming KV cache memory is sufficient and compute remains unbottlenecked).
question: "What are the maximum theoretical token rates for the 7B FP16 model on the A10G at batch size 1 and batch size 4?"
details:
  realistic_solution: In a memory-bandwidth bound regime, the latency of a forward pass is dominated by
    loading the model weights. The time to load weights is 14 GB / 600 GB/s ≈ 23.3 ms. For batch size
    1, throughput is ~42 tokens/sec. For batch size 4, the same 14 GB of weights are loaded once to generate
    4 tokens simultaneously. Thus, latency stays roughly 23.3 ms, but throughput quadruples to ~171 tokens/sec.
  common_mistake: Assuming throughput scales linearly with compute FLOPs or assuming that increasing the
    batch size linearly increases the latency of a single generation step.
  napkin_math: Latency = 14 GB / 600 GB/s = 0.0233 seconds (23.3 ms). Throughput (BS=1) = 1 / 0.0233 =
    42.9 tokens/s. Throughput (BS=4) = 4 / 0.0233 = 171.6 tokens/s.
