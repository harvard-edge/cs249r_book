title: Estimating Activation Memory for a Transformer Layer on H100
scenario: 'You are profiling a 72-layer GPT-style Transformer with hidden size 8192, sequence length 4096, and batch size 8.'
question: 'How much activation memory will the forward pass consume across all 72 layers, and will it fit alongside fp16 70B weights?'
details:
  realistic_solution: |
    Per layer: calculate the size of the residual stream, attention QKV projections, softmax scores, and MLP intermediate tensors. The full activation budget across 72 layers exceeds available memory, forcing gradient checkpointing.
  common_mistake: |
    **The Pitfall:** Counting only the attention weight matrix activations.
    **The Rationale:** Candidates ignore MLP intermediate tensors, layer-norm inputs, and residual stream copies.
    **The Consequence:** Drastically underestimating activation memory (often missing 60-70% of the true footprint), leading to catastrophic OOMs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 72 layers, hidden size 8192, seq len 4096, batch 8.
    - FP16 precision.

    **Calculations:**
    - Single layer residual: 2 * 8 * 4096 * 8192 * 2 Bytes = 1.07 GB.
    - MLP intermediate: 2 * 8 * 4096 * (4 * 8192) * 2 Bytes = 4.29 GB.
    - Attention scores: 8 * (8192/128=64) * 4096^2 * 2 Bytes = 17.18 GB.
    - Total per layer exact sum is 22.54 GB.
    - Total for 72 layers: 22.54 GB * 72 = 1,622.8 GB raw.

    **Conclusion & Interpretation:**
    - **Result: 1,622.8 GB raw activations; segment-level checkpointing is strictly required to fit. (Memory-Capacity-Bound Activations)**. Pure forward pass storage is massively prohibitive without aggressive checkpointing.
