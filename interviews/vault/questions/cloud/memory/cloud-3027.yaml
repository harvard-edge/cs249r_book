title: H100 NVLink Bandwidth for Tensor Parallel Inference
scenario: You are designing a tensor parallel inference system on an H100 node and need to estimate the all-reduce communication overhead.
question: For H100 tensor parallel inference, what NVLink bandwidth should you use when estimating all-reduce communication overhead?
details:
  realistic_solution: H100 SXM systems are commonly modeled with up to 900 GB/s aggregate bidirectional NVLink bandwidth per GPU. Use 900 GB/s as the peak hardware number, then apply an effective-bandwidth factor for the collective implementation and topology. For a ring all-reduce over 8 tensor-parallel ranks, a 1GB per-rank tensor moves 2 × (8-1)/8 × 1GB = 1.75GB per GPU, so the peak lower bound is about 1.9ms; at 60-80% effective bandwidth, plan for roughly 2.4-3.2ms.
  common_mistake: |
    **The Pitfall:** Assuming models can be evenly split without considering communication overhead, or using the wrong NVLink bandwidth.
    **The Rationale:** Candidates often confuse A100 NVLink 3.0 bandwidth (600 GB/s) with H100 NVLink 4.0 bandwidth (900 GB/s), or forget that tensor parallelism introduces all-reduce overhead.
    **The Consequence:** This leads to inaccurate latency estimations and incorrect performance models for inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: NVIDIA H100 (NVLink 4.0).
    - Topology: 8-way tensor parallel.
    - Activation tensor to all-reduce: 1GB per rank.
    - Effective collective bandwidth is lower than peak; use 60-80% as a planning range.

    **Calculations:**
    - Peak bandwidth: H100 NVLink 4.0 provides up to 900 GB/s aggregate bidirectional bandwidth per GPU.
    - Ring all-reduce volume per GPU: 2 * (8 - 1) / 8 * 1GB = 1.75 GB.
    - Peak lower-bound latency: 1.75 GB / 900 GB/s = 1.94 ms.
    - Effective latency range: 1.75 GB / (900 * 0.8) to 1.75 GB / (900 * 0.6) = 2.4-3.2 ms.

    **Conclusion & Interpretation:**
    - **Result: Communication-Bound**. Use 900 GB/s only as the H100 peak denominator; realistic all-reduce estimates should report an effective-bandwidth range around 2.4-3.2 ms for this 1GB tensor.
