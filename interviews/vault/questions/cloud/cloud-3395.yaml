title: Optimizing LLM Inference on NVIDIA A100 with Custom AOT Graph Compiler
scenario: Your team is deploying a 70B LLM for real-time inference on a cloud GPU cluster. Initial deployment shows suboptimal throughput and high memory pressure from dynamic graph construction.
question: How would you design an AOT graph compiler for an LLM to remove dynamic dispatch overhead and improve HBM utilization?
details:
  realistic_solution: 'Implement a multi-stage AOT compilation pipeline: 1. Graph Representation: Convert the LLM''s computational graph into a hardware-agnostic intermediate representation (IR). 2. High-Level Optimizations: Perform framework-level optimizations like constant folding, dead code elimination, and operation fusion (e.g., fusing attention layers or multi-head attention kernels). 3. Operator Lowering & Targeting: Lower high-level operations to A100-specific primitives, explicitly mapping to Tensor Cores for FP16 operations where possible. This involves custom kernel generation or highly optimized library calls (e.g., cuBLAS, cuDNN with specific tuning for A100). 4. Memory Optimization: Implement sophisticated memory allocation strategies (e.g., static memory planning, avoiding device-host transfers, HBM2e bandwidth awareness) to maximize the 2.0 TB/s bandwidth and minimize data movement. 5. Scheduling & Execution: Generate an optimized execution schedule, potentially using static scheduling or stream-based execution to overlap computation and communication. 6. Tooling: Leverage profiling tools (e.g., NVIDIA Nsight Systems) to identify bottlenecks post-compilation and iteratively refine the optimization passes.'
  common_mistake: |
    **The Pitfall:** Over-reliance on generic compiler optimizations without deep hardware awareness.
    **The Rationale:** Engineers apply broad JIT or AOT flags without understanding memory locality, Tensor Core alignment, or compute vs. bandwidth bottlenecks.
    **The Consequence:** Failing to account for host-device transfer overheads and failing to fuse operations, leaving the compute units stranded by memory bandwidth.
  napkin_math: |
    1. Assumptions & Constraints: HBM bandwidth = 2.0 TB/s. Intermediate data for complex attention = 100 GB.
    2. Calculations: Minimum data movement time = 100 GB / 2000 GB/s = 50ms.
    3. Conclusion & Interpretation: **Result: Memory access latency vastly overshadows compute latency unless memory-aware operator fusion is enforced. Bottleneck: HBM Memory Bandwidth.**
