title: 'MI300X MIG vs H100 MIG: Multi-Tenant Serving Partitioning'
scenario: H100 supports Multi-Instance GPU (MIG) partitioning into up to 7 GPU instances (each with 10GB
  memory slice). AMD MI300X does not natively support MIG-equivalent hardware partitioning. A cloud operator
  needs to serve 14 concurrent small (7GB) models to different tenants. Compare the H100 MIG vs MI300X
  software-based partitioning approach, and design the MI300X multi-tenant architecture.
question: "How would you serve 14 tenant-isolated 7GB models on H100 MIG versus MI300X, and what MI300X multi-tenant design would you use?"
details:
  realistic_solution: 'H100 MIG approach: 2 H100s × 7 MIG instances each = 14 instances × 10GB each. Hardware
    memory isolation: one tenant''s OOM cannot affect others. Throughput per instance: ~140 GFLOPS and
    ~480 GB/s bandwidth slice. Fixed partitioning: a 7GB model uses 10GB instance, wasting 3GB per instance
    = 42GB waste across 14 instances. MI300X software approach: 1 MI300X × 192GB unified pool. KV cache
    and model weights co-located. ROCM compute partition modes (CPX mode): 8 XCDs can be assigned to processes,
    giving 8 compute domains. For 14 models, use 1 MI300X with MPS (Multi-Process Service equivalent in
    ROCm) + memory protection via IOMMU. Memory: 14 × 7GB = 98GB < 192GB, fits with 94GB KV cache headroom.
    Throughput: full 5,300 GB/s shared across models with fair-scheduling. Hardware isolation: weaker
    than MIG — software isolation only. For regulated tenants: use 2× MI300X with compute partitioning
    (7 models each). MI300X advantage: 3× better memory utilization, 1.58× higher aggregate decode throughput,
    but weaker isolation guarantees.'
  common_mistake: Assuming hardware MIG (H100) is always superior to software partitioning (MI300X). For
    small model serving with strong isolation requirements, MIG provides better fault isolation. But for
    flexible multi-model serving with variable model sizes, software scheduling on a large unified memory
    pool can be more efficient.
  napkin_math: 'H100 MIG: 2 GPUs × 7 instances = 14 instances. Memory: 14 × 10GB = 140GB allocated, 14
    × 7GB = 98GB used → 30% waste. Bandwidth per instance: 3350/7 = 479 GB/s. Decode throughput per model:
    479 × 0.8 / 14 GFLOP = 27.4 tok/sec/model. MI300X: 192GB for 14 × 7GB = 98GB used, 94GB free. Bandwidth:
    5300 GB/s shared. Per model bandwidth (fair share): 5300/14 = 379 GB/s → 379 × 0.8 / 14 = 21.7 tok/sec/model.
    H100 MIG wins per-model throughput (27.4 vs 21.7) due to 2× more GPUs and dedicated slices, but at
    2× hardware cost. Single MI300X total: 5300/7×0.8/1 GFLOP = decode for 14 models at 21.7 vs H100 2-GPU
    MIG at 27.4 — but MI300X uses 1 GPU vs 2 H100s.'
