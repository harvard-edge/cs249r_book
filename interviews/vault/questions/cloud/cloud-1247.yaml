title: Diagnosing KV Cache External Fragmentation
scenario: You are serving a 70B parameter LLM on an 8x A100 (80GB) node using Tensor Parallelism. Each
  GPU holds ~17.5GB of model weights and 2.5GB of static workspace, leaving a 60GB pool for the KV cache.
  Your monitoring dashboard shows 50% (30GB) of this KV cache memory is theoretically 'free'. However,
  as the inference service processes a mix of short chat interactions and long document summarizations
  (sequence lengths varying from 50 to 8000 tokens), the system begins rejecting new requests with Out-Of-Memory
  (OOM) errors. How do you diagnose this discrepancy between reported free memory and the OOM failures?
question: "How do you diagnose this discrepancy between reported free memory and the OOM failures?"
details:
  realistic_solution: Diagnose the root cause as external fragmentation. Traditional attention mechanisms
    allocate contiguous memory for a sequence's KV cache. The constant allocation and deallocation of
    highly variable sequence lengths creates small, unusable gaps of free memory between active blocks.
    The architectural fix is to implement PagedAttention (like in vLLM), which decouples logical memory
    from physical memory by paging the KV cache into fixed-size, non-contiguous blocks, effectively eliminating
    external fragmentation.
  common_mistake: Candidates often misdiagnose this as a memory leak in the application or confuse it
    with internal fragmentation (wasted space inside a fixed-size pre-allocation), failing to recognize
    the specific memory access patterns of traditional KV caches.
  napkin_math: KV cache pool = 60GB. Free memory = 30GB. If this 30GB of free memory is heavily fragmented
    into 150 non-contiguous gaps averaging 200MB each across the memory space, a single new request requiring
    a contiguous 1GB block for an 8000-token KV cache will fail to allocate, triggering an OOM despite
    the 30GB of total available space.
