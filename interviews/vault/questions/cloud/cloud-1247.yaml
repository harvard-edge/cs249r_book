title: Diagnosing KV Cache External Fragmentation
scenario: "You are serving a 70B parameter LLM on an 8x A100 (80GB) node. Each GPU holds ~17.5GB of model weights and 2.5GB of static workspace, leaving a 60GB pool for the KV cache. Your dashboard shows 50% (30GB) of this KV cache memory is theoretically 'free'. However, as the service processes a mix of short chats and long documents, the system begins rejecting new requests with Out-Of-Memory (OOM) errors."
question: "How do you diagnose this discrepancy between reported free memory and the OOM failures, and how do you resolve it?"
details:
  realistic_solution: "Diagnose the root cause as external fragmentation. Traditional attention mechanisms allocate contiguous memory for a sequence's KV cache. The constant allocation and deallocation of highly variable sequence lengths creates small, unusable gaps of free memory between active blocks. The architectural fix is to implement PagedAttention (like in vLLM), which decouples logical memory from physical memory by paging the KV cache into fixed-size, non-contiguous blocks, effectively eliminating external fragmentation."
  common_mistake: |
    **The Pitfall:** Misdiagnosing external fragmentation as a memory leak.
    **The Rationale:** Seeing available memory but getting OOMs confuses engineers unfamiliar with how traditional continuous attention allocates KV caches.
    **The Consequence:** Restarting the service to clear "leaks" instead of adopting PagedAttention architectures (like vLLM) that decouple logical from physical memory.
  napkin_math: |
    *   **KV Cache Pool:** 60GB total.
    *   **Free Memory:** 30GB.
    *   **Fragmentation State:** The 30GB is fragmented into 150 gaps averaging 200MB each.
    *   **Incoming Request:** Needs a contiguous 1GB block for an 8000-token sequence.
    *   **Result:** **The allocation fails (OOM) despite having 30GB free, because no single gap is large enough. PagedAttention fixes this by paging non-contiguous blocks.**
