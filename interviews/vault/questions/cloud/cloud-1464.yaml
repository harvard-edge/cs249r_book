title: Evaluating KL Divergence for High-Throughput Drift Detection
scenario: Your team serves a DLRM model at 10,000 QPS on a cluster of AWS Inferentia2 instances. To detect data drift, an engineer proposes computing the KL Divergence between the daily serving feature distributions (P, 864M samples) and the training distribution (Q). The features include heavily skewed continuous variables like session duration.
question: Is pure KL divergence robust enough for the 864M-sample daily drift trigger, and how would you handle unseen production bins?
details:
  realistic_solution: Reject pure KL Divergence in favor of the symmetric Jensen-Shannon Divergence (JSD) or Population Stability Index (PSI), or apply Laplace smoothing to the reference distribution Q to guarantee bounded outputs.
  common_mistake: |
    **The Pitfall:** Using pure KL divergence on continuous production data.
    **The Rationale:** Candidates treat KL divergence as a generic distance metric, forgetting it is asymmetric and mathematically unbounded if $Q$ goes to zero.
    **The Consequence:** The drift detection pipeline crashes or throws infinite false positive alerts the moment an unseen continuous value appears.
  napkin_math: |
    *   **KL Divergence Formula:** $D_{KL}(P || Q) = \sum P(i) \log(P(i)/Q(i))$
    *   **Unseen Bin Edge Case:** If bin $i$ has $P(i) = 0.01$ and $Q(i) = 0$, $D_{KL} \rightarrow \infty$.
    *   **Laplace Smoothing:** Add $\epsilon = 10^{-6}$ to $Q$.
    *   **Bounded Contribution:** $0.01 \times \log(0.01 / 10^{-6}) = 0.01 \times 4 \times \ln(10) \approx 0.092$ nats.
    *   **Result:** Applying Laplace smoothing or using the symmetric Jensen-Shannon Divergence prevents the alert metric from blowing up to infinity.
