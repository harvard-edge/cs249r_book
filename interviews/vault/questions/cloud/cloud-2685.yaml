title: Estimating Total Training FLOPs
scenario: A 7B parameter Transformer model trains for 1T tokens with batch size 2048 and sequence length
  2048. Using the 6ND approximation (total FLOPs ≈ 6 × N × D where N=parameters, D=tokens), calculate
  total training FLOPs and estimate training time on 256 A100s at 50% MFU.
question: "Using 6ND, what are the total training FLOPs for a 7B model on 1T tokens and the training time on 256 A100s at 50% MFU?"
details:
  realistic_solution: 'The 6ND formula comes from the 3× multiplier: each token requires ~2N FLOPs in
    the forward pass (2 FLOPs per parameter for matmul), and 3× for the full training step gives 6N FLOPs
    per token. Total FLOPs = 6 × 7×10^9 × 1×10^12 = 4.2 × 10^22 FLOPs. Cluster throughput: 256 A100s ×
    312 TFLOPS × 0.50 MFU = 39,936 TFLOPS = 3.99 × 10^16 FLOPS. Training time = 4.2×10^22 / 3.99×10^16
    = 1.05 × 10^6 seconds = 12.2 days. This matches real-world observations: LLaMA 7B trained on 1T tokens
    took ~21 days on 2048 A100s (our estimate of 12.2 days on 256 A100s × 8 = would be ~1.5 days on 2048
    A100s, suggesting the 6ND approximation underestimates overhead by ~14x, mostly from communication
    and lower real MFU).'
  common_mistake: Using 2ND instead of 6ND. The factor of 6 accounts for forward (2N) + backward (4N)
    FLOPs per token. Using 2N gives only the forward pass cost.
  napkin_math: 6 × 7B × 1T = 4.2e22 FLOPs. 256 A100s × 312T × 0.5 = 40 PFLOPS. Time = 4.2e22/4e16 ≈ 1.05M
    seconds ≈ 12 days.
