title: Diagnosing OOM from Retained Graphs
scenario: You are training a 1.5B parameter transformer using PyTorch on an instance with 8 GPUs (80GB VRAM). The training uses FP32 precision, and processes batches of 32 sequences (sequence length 2048) per GPU. The forward and backward passes execute normally initially, but the allocated GPU memory steadily increases by roughly 2.5GB per iteration. This eventually causes a CUDA Out of Memory (OOM) error around step 25. For logging purposes, the training loop appends the training loss directly to a Python list at the end of each step (`epoch_losses.append(loss)`) to compute the epoch average later.
question: What is causing GPU memory to grow by 2.5GB per iteration, and how should the loss logging code be fixed?
details:
  realistic_solution: The OOM is caused by appending the `loss` tensor to a persistent list, which inadvertently keeps the entire computational graph (and all intermediate activations required for backpropagation) alive in memory for every past iteration. The solution is to detach the scalar value from the graph by calling `.item()` or `.detach()` before storing it (e.g., `epoch_losses.append(loss.item())`).
  common_mistake: |
    **The Pitfall:** Misdiagnosing the OOM as a standard batch size or model capacity issue.
    **The Rationale:** Candidates see memory saturation and immediately suggest heavy systems workarounds (gradient accumulation, activation checkpointing) without tracing the leak.
    **The Consequence:** The leak persists, and the job will still OOM eventually, regardless of how small the batch size or model becomes.
  napkin_math: |
    - **Baseline memory:** For a 1.5B FP32 model: 1.5B * (4 bytes weights + 4 bytes grads + 8 bytes Adam states) = ~24 GB.
    - **Available memory:** For activations/workspace: 80 GB - 24 GB = 56 GB.
    - **Graph retention:** If the un-detached loss tensor retains the full 2.5 GB computational graph per step.
    - **Max steps before saturation:** 56 GB / 2.5 GB per step = ~22.4 steps.
    - **Conclusion:** **This perfectly predicts the CUDA OOM error observed around step 25.**
