title: Diagnosing OOM from Retained Graphs
scenario: You are training a 1.5B parameter transformer using PyTorch on an instance with 8x A100 80GB
  GPUs. The training uses FP32 precision, and processes batches of 32 sequences (sequence length 2048)
  per GPU. The forward and backward passes execute normally initially, but the allocated GPU memory steadily
  increases by roughly 2.5GB per iteration. This eventually causes a CUDA Out of Memory (OOM) error around
  step 25. For logging purposes, the training loop appends the training loss directly to a Python list
  at the end of each step (`epoch_losses.append(loss)`) to compute the epoch average later.
question: "What is causing GPU memory to grow by 2.5GB per iteration, and how should the loss logging code be fixed?"
details:
  realistic_solution: The OOM is caused by appending the `loss` tensor to a persistent list, which inadvertently
    keeps the entire computational graph (and all intermediate activations required for backpropagation)
    alive in memory for every past iteration. The solution is to detach the scalar value from the graph
    by calling `.item()` or `.detach()` before storing it (e.g., `epoch_losses.append(loss.item())`).
  common_mistake: Candidates often misdiagnose this as a general batch size or model capacity issue, suggesting
    workarounds like activation checkpointing, gradient accumulation, or reducing the batch size without
    addressing the iteration-over-iteration memory growth.
  napkin_math: 'Baseline FP32 memory for 1.5B params: 1.5B * (4B weights + 4B grads + 8B Adam states)
    = ~24GB. This leaves 80GB - 24GB = 56GB for activations and workspace. If each step''s computational
    graph retains ~2.5GB of activations, the memory will saturate after 56GB / 2.5GB/step = ~22.4 steps,
    which aligns perfectly with the OOM observed around step 25.'
