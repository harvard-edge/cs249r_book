title: Membership Inference Attack Resistance Under DP
scenario: A red team mounts a membership inference attack (MIA) against your DP-trained model, achieving 61% attack AUC despite a claimed ε=4 guarantee. The privacy engineer insists this is theoretically impossible, but the red team insists their attack is valid.
question: Is a 61% MIA AUC theoretically possible under an ε=4 DP guarantee, and what vulnerabilities allow it?
details:
  realistic_solution: 'Both sides are partially right. The ε-DP guarantee bounds per-record distinguishability: for any single record, the adversary''s advantage is bounded by (e^ε - 1)/(e^ε + 1) ≈ 0.96 for ε=4 — this allows AUC up to ~0.96. The 61% AUC is within the theoretical bound. The red team''s attack is likely exploiting: (1) overfitting on high-frequency records (records appearing many times in the dataset inflate effective exposure), (2) output confidence calibration leaking aggregate membership signals across correlated records, (3) clipping norm C set too high, effectively not clipping many gradients and leaving large members'' influence intact. Mitigations: reduce ε to ≤1 for strong MIA resistance, audit per-record exposure using Feldman''s memorization metric, lower clipping norm.'
  common_mistake: |
    **The Pitfall:** Assuming ε-DP directly caps MIA AUC near 0.5 for moderate values of ε.
    **The Rationale:** Practitioners misunderstand the formal bound, which limits per-example distinguishability but still allows significant memorization at ε=4.
    **The Consequence:** Organizations falsely believe their models are immune to privacy attacks, leaving user data vulnerable to practical extraction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DP guarantee: ε=4.
       - Red team MIA AUC: 61% (0.61).
    2. **Calculations:**
       - Theoretical Bound: Under ε-DP, MIA AUC ≤ 1/2 + (e^ε - 1)/(2(e^ε + 1)).
       - For ε=4: (e^4 - 1)/(2(e^4 + 1)) = (54.6 - 1) / (2 * 55.6) ≈ 0.482. Max AUC ≤ 0.5 + 0.482 = 0.982.
       - For ε=1: (e^1 - 1)/(2(e^1 + 1)) = 1.718 / 7.436 ≈ 0.231. Max AUC ≤ 0.5 + 0.231 = 0.731.
    3. **Conclusion & Interpretation:**
       - A 61% AUC is well within the ε=4 theoretical upper bound of 98.2%.
       - **Result: Legitimate MIA within Theoretical Bounds**
