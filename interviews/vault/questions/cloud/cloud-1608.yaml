title: Diagnosing Inter-Node TP Bottlenecks
scenario: You are diagnosing a severe performance degradation during the pre-training of a 70B parameter
  dense transformer on two 8-GPU A100 (80GB) nodes connected via 400 Gbps InfiniBand. To fit the model
  and optimizer states, the team configured Megatron-style Tensor Parallelism (TP) to 16. Profiling reveals
  a Model Flop Utilization (MFU) of less than 15%, with GPUs spending the majority of their time stalled
  on synchronous NCCL All-Reduce kernels.
question: "How should you place tensor and pipeline parallelism across the two 8-GPU A100 nodes to eliminate the cross-node all-reduce bottleneck?"
details:
  realistic_solution: Restrict Tensor Parallelism to the intra-node NVLink domain (TP=8) to keep synchronous
    All-Reduces on high-bandwidth links. Distribute the rest of the model across the two nodes using Pipeline
    Parallelism (PP=2), which only sends activation boundaries over the slower inter-node link.
  common_mistake: Attempting to hide the communication latency by increasing gradient accumulation steps
    or micro-batch sizes, not realizing that Tensor Parallelism requires synchronous communication within
    every transformer block's forward and backward pass.
  napkin_math: Intra-node NVLink provides ~600 GB/s of bandwidth, whereas 400 Gbps InfiniBand provides
    only ~50 GB/s (a 12x drop). A TP=16 configuration forces 2 massive All-Reduce operations per transformer
    layer to cross the 50 GB/s inter-node boundary, creating an insurmountable synchronous bottleneck.
