title: Diagnosing Inter-Node TP Bottlenecks
scenario: You are diagnosing a severe performance degradation during the pre-training of a 70B parameter dense transformer on two 8-GPU nodes connected via 400 Gbps InfiniBand. To fit the model and optimizer states, the team configured Megatron-style Tensor Parallelism (TP) to 16. Profiling reveals a Model Flop Utilization (MFU) of less than 15%, with GPUs spending the majority of their time stalled on synchronous NCCL All-Reduce kernels.
question: How should you place tensor and pipeline parallelism across the two nodes to eliminate the cross-node all-reduce bottleneck?
details:
  realistic_solution: 'Restrict Tensor Parallelism to the intra-node NVLink domain (TP=8) to keep synchronous All-Reduces on high-bandwidth links. Distribute the rest of the model across the two nodes using Pipeline Parallelism (PP=2), which only sends activation boundaries over the slower inter-node link.'
  common_mistake: |
    **The Pitfall:** Increasing gradient accumulation steps to hide latency.
    **The Rationale:** Candidates apply standard data-parallel optimizations, not realizing Tensor Parallelism requires synchronous communication within every forward and backward pass.
    **The Consequence:** The system remains hopelessly bottlenecked on inter-node communication, and training speed remains crippled.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intra-node Bandwidth (NVLink): ~600 GB/s.
       - Inter-node Bandwidth (InfiniBand): 400 Gbps = 50 GB/s.
    2. **Calculations:**
       - Bandwidth Drop: 600 / 50 = 12x drop.
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bound. TP=16 forces massive synchronous operations across the slow 50 GB/s boundary. Restricting TP=8 to NVLink and using PP=2 eliminates this bottleneck.**
