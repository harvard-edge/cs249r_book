title: Real-time Observability for H100-powered ML Inference Service
scenario: You are leading the reliability engineering efforts for a critical, real-time ML inference service deployed on a cluster of NVIDIA H100 GPUs. The service experiences highly variable load patterns, from sustained high throughput to intermittent bursts.
question: "How would you build telemetry, alerts, dashboards, MTBF/MTTR tracking, and straggler detection for the H100 inference cluster?"
details:
  realistic_solution: "A realistic solution involves a multi-tiered approach: \n1.\
    \  **Telemetry:** Implement robust instrumentation for both infrastructure and\
    \ application layers. For H100s, use NVIDIA DCGM (Data Center GPU Manager) or\
    \ NVML (NVIDIA Management Library) to collect detailed GPU metrics: utilization,\
    \ memory usage (HBM3), temperature, power draw (700W), and PCIe bandwidth. For\
    \ the application, instrument the inference service to emit custom metrics for\
    \ request latency (p99, p99.9), throughput, error rates, model-specific metrics\
    \ (e.g., inference correctness, data drift), and internal queue lengths. Leverage\
    \ distributed tracing (e.g., OpenTelemetry) to track individual requests across\
    \ the H100 cluster and identify latency bottlenecks.\n2.  **Collection & Storage:**\
    \ Use a high-performance metrics pipeline (e.g., Prometheus with Cortex/Thanos\
    \ for long-term storage) and a centralized logging system (e.g., Elastic Stack,\
    \ Loki, or a commercial solution) capable of handling the high data ingress from\
    \ hundreds of H100s.\n3.  **Alerting:** Define clear SLOs for latency, throughput,\
    \ and error rates. Configure alerts based on these SLIs, triggered by deviations\
    \ from baselines or predefined thresholds. Implement multi-severity alerts (warning,\
    \ critical) and use anomaly detection to catch subtle issues. For stragglers,\
    \ trace data can identify requests exceeding a certain latency threshold (e.g.,\
    \ 50ms) within specific GPU operations.\n4.  **Dashboards:** Create comprehensive\
    \ Grafana dashboards. Key views would include: system-wide health overview, per-H100\
    \ GPU performance statistics, model inference performance trends, and a 'Reliability\
    \ Scorecard' displaying MTBF (Mean Time Between Failures) and MTTR (Mean Time\
    \ To Recovery) calculated from incident management data. Visualizations should\
    \ highlight stragglers and their root causes (e.g., specific H100, particular\
    \ model, or input data characteristics)."
  common_mistake: |
    **The Pitfall:** Relying solely on generic infrastructure metrics without application-level or GPU-specific telemetry.
    **The Rationale:** Engineers port standard microservice monitoring paradigms without accounting for the massive scale and specific failure modes of GPU workloads.
    **The Consequence:** The team suffers from blind spots regarding model performance degradation and subtle GPU resource contention, leading to reactive instead of proactive debugging.
  napkin_math: |
    *   **Data Volume:** 500 GPUs $\times$ 2 MB/s/GPU = 1 GB/s data ingestion rate.
    *   **Daily Storage:** $1 \text{ GB/s} \times 86,400 \text{ s/day} \approx 86.4 \text{ TB/day}$.
    *   **Monthly Retention:** 30 days requires $\approx 2.5 \text{ PB}$ of storage.
    *   **Result:** **The massive scale necessitates a highly distributed monitoring backend capable of processing traces within milliseconds to detect stragglers (e.g., >50ms latency).**
