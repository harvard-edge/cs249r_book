title: 'FlashAttention on MI300X: HBM3 Bandwidth Advantage'
scenario: The MI300X has 5.3 TB/s HBM bandwidth (vs H100's 3.35 TB/s) and 1307 TFLOPS FP16 (vs 989 TFLOPS).
  For standard attention (memory-bound), the MI300X should be 1.58× faster due to bandwidth. For FlashAttention
  (compute-bound), how does the comparison change? Which GPU benefits more from FlashAttention?
details:
  realistic_solution: 'Standard attention (memory-bound): performance ∝ bandwidth. MI300X / H100 = 5.3
    / 3.35 = 1.58× faster on MI300X. FlashAttention (compute-bound): performance ∝ TFLOPS. MI300X / H100
    = 1307 / 989 = 1.32× faster on MI300X. The H100 benefits more from FlashAttention relative to its
    own baseline. Without FlashAttention, the H100 is 1.58× slower. With FlashAttention, it is only 1.32×
    slower. The H100''s higher compute-to-bandwidth ratio (295 FLOPS/byte vs 247 for MI300X) means FlashAttention''s
    transition to compute-bound regime favors it relatively more. However, the MI300X''s 192 GB HBM (vs
    80 GB) is still critical for KV cache capacity in inference — FlashAttention reduces compute overhead
    but doesn''t change the KV cache storage requirement. The MI300X can serve 2.4× more concurrent requests
    purely due to memory capacity.'
  common_mistake: Assuming that higher bandwidth always wins. FlashAttention converts attention from memory-bound
    to compute-bound, so the comparison shifts from bandwidth ratio to FLOPS ratio.
  napkin_math: 'Standard attention speedup MI300X/H100: 5.3/3.35 = 1.58×. FlashAttention speedup MI300X/H100:
    1307/989 = 1.32×. H100 ridge point: 295 FLOPS/byte. MI300X ridge point: 247 FLOPS/byte. FlashAttention
    AI: ~N/2 = 2048 for N=4096. Both GPUs are compute-bound with FlashAttention.'
