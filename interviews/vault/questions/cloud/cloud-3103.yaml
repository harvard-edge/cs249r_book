title: 'TCO Optimization: Rightsize GPU Fleet for Inference Workload'
scenario: An inference fleet running LLaMA-7B shows average GPU utilization of 23% because the team provisioned 150 GPUs 24/7 to handle a 2-hour daily peak. Steady-state load only requires 50 GPUs.
question: How much annual GPU spend is wasted by keeping 150 GPUs on 24/7, and what autoscaling plan would you propose?
details:
  realistic_solution: 'Current fleet: 150 GPUs 24/7 (sized for peak). Cost: 150 * $2.50 * 8760 = $3.285M/yr. Optimal: 50 GPUs base + autoscale 100 more for 2hr/day. Cost: 50*$2.50*8760 + 100*$2.50*365*2hr = $1.095M + $182.5K = $1.277M/yr. Savings: $3.285M - $1.277M = $2.008M/yr. Warm-up risk: 3-5min provisioning. Add 10 pre-warmed buffer: 60 base GPUs. Cost: 60*$2.50*8760 + 90*$2.50*365*2 = $1.314M + $164.25K = $1.478M/yr. Savings: $1.807M/yr (55% reduction). GPU util improvement: from 23% (150 GPUs avg) to ~45% (60 GPUs).'
  common_mistake: |
    **The Pitfall:** Not accounting for autoscaling warm-up time (3-5 minutes for GPU provisioning).
    **The Rationale:** Assuming cloud GPU scaling is instantaneous like lambda functions.
    **The Consequence:** Designing an aggressive autoscaling policy that causes massive queue buildups and SLO violations every time a traffic spike triggers a scale-out.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current fleet: 150 GPUs 24/7 at $2.50/hr.
       - Steady-state: 50 GPUs for 22 hours/day. Peak: 150 GPUs for 2 hours/day.
       - Provisioning warm-up time: 3-5 minutes (requires a 10-GPU buffer).
    2. **Calculations:**
       - Current Annual Cost: 150 × $2.50 × 8760 hrs = $3.285M/yr.
       - Optimal Compute Needed: (50 × 22hr) + (150 × 2hr) = 1400 GPU-hrs/day. At $2.50 = $1.277M/yr.
       - Theoretical Waste: $3.285M - $1.277M = ~$2.0M/yr.
       - Realistic Autoscaling (60 base + 90 autoscale): (60 × 24) + (90 × 2) = 1620 GPU-hrs/day. At $2.50 = $1.478M/yr.
    3. **Conclusion & Interpretation:** **A 60-base autoscaling plan saves $1.8M/yr (55%) while protecting SLOs from warm-up latency. Result: Cost-Bound.**
