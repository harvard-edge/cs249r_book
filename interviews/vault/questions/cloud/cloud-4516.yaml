title: LLM Queueing Wait Time
scenario: An 8x H100 node serving LLM requests has Poisson arrivals and an average service time of 2s. The utilization factor rho is 0.9.
question: Construct the M/M/1 wait time estimate and demonstrate how reducing service time variance via iteration-level scheduling lowers it.
visual:
  kind: svg
  path: cloud-4516.svg
  alt: Hockey-stick curves comparing M/M/1 and M/D/1 wait times as utilization approaches 1.0.
  caption: Queue wait times spike non-linearly at high utilization.
details:
  realistic_solution: 'For M/M/1, wait time W = service_time * (rho / (1-rho)). At rho=0.9, W = 2s * 9 = 18s. By moving to M/D/1 via iteration-level scheduling (deterministic service time), wait time roughly halves to 9s.'
  common_mistake: |
    **The Pitfall:** Applying M/D/1 formulas to high-variance M/M/1 scenarios.
    **The Rationale:** Engineers assume standard queueing math applies without analyzing the variance in generation lengths.
    **The Consequence:** This severely underestimates the long tail of queue wait times, leading to SLA violations during traffic bursts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Average service time: 2s.
       - Utilization factor (rho): 0.9.
       - Arrival process: Poisson.
    2. **Calculations:**
       - M/M/1 Wait Time: W = service_time * (rho / (1 - rho)) = 2s * (0.9 / 0.1) = 18s.
       - M/D/1 Wait Time (Iteration-level scheduling): W = service_time * 0.5 * (rho / (1 - rho)) = 2s * 0.5 * 9 = 9s.
       - Latency reduction: 18s - 9s = 9s improvement.
    3. **Conclusion & Interpretation:** **Iteration-level scheduling eliminates generation variance, cutting the Queueing Delay Bottleneck in half.**
