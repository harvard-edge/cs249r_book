title: The GPU Power Budget
scenario: You're running a 72-hour training job on 8× H100 GPUs (700W TDP each). Your data center charges
  \$0.12/kWh for electricity. Estimate the energy cost of this single training run. How does this compare
  to the cloud compute cost at \$3.50/GPU-hour?
details:
  realistic_solution: GPUs under sustained training load typically draw 80–90% of TDP. Data centers have
    PUE overhead (cooling, networking, power conversion) that multiplies the IT power draw. The electricity
    cost is a small fraction of cloud pricing — the rest is amortized hardware, networking, staff, and
    profit margin.
  common_mistake: '"8 × 700W × 72 hours × $0.12 = $48.38. Electricity is negligible." This forgets PUE
    and that GPUs don''t run at exactly TDP.'
  napkin_math: 'GPU power: 8 × 700W × 85% utilization = 4,760W. PUE of 1.2: total facility power = 4,760
    × 1.2 = 5,712W = 5.71 kW. Energy: 5.71 kW × 72 hrs = **411 kWh**. Electricity cost: 411 × \$0.12 =
    **\$49.34**. Cloud compute cost: 8 GPUs × 72 hrs × \$3.50 = **\$2,016**. Electricity is only **2.4%**
    of the cloud bill. The other 97.6% covers: GPU depreciation (~40%), networking/storage (~15%), data
    center lease (~10%), staff (~10%), and profit margin (~22%). This is why on-premise makes financial
    sense at scale: if you own the GPUs, your marginal cost per training run is ~\$50 instead of ~\$2,000.'
