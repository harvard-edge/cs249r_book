title: The GPU Power Budget
scenario: You're running a 72-hour training job on 8 GPUs (700W TDP each). Your data center charges $0.12/kWh for electricity.
question: What is the energy cost for this training run, and how does it compare to a cloud compute cost of $3.50/GPU-hour?
details:
  realistic_solution: |
    GPUs under sustained training load typically draw 80–90% of TDP. Data centers have PUE overhead (cooling, networking, power conversion) that multiplies the IT power draw. The electricity cost is a small fraction of cloud pricing — the rest is amortized hardware, networking, staff, and profit margin.
  common_mistake: |
    **The Pitfall:** Forgetting data center PUE and actual GPU utilization.
    **The Rationale:** Candidates multiply TDP by time, ignoring the cooling overhead (PUE) and the fact that GPUs don't constantly run at max TDP.
    **The Consequence:** Minor miscalculations in power, but a fundamental misunderstanding of cloud pricing margins.
  napkin_math: |
    - GPU power: 8 * 700W * 85% utilization = 4,760W.
    - Facility power (PUE 1.2): 4,760W * 1.2 = 5.71 kW.
    - Energy: 5.71 kW * 72 hrs = 411 kWh.
    - Electricity cost: 411 kWh * $0.12 = $49.32.
    - Cloud compute cost: 8 GPUs * 72 hrs * $3.50 = $2,016.
    - **Electricity is only ~2.4% of the cloud bill, demonstrating why on-premise hardware has a vastly lower marginal cost at scale.**
