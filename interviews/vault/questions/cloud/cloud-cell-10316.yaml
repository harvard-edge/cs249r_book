title: 'Realizing Carbon-Aware Scheduling: When to Shift GPU Workloads'
scenario: 'An ML Ops team runs large batch training jobs on H100 clusters in two regions: US-West (California,
  grid intensity ~200 gCO₂/kWh, high solar penetration) and US-East (Virginia, grid intensity ~350 gCO₂/kWh,
  coal/gas mix). A 70B model pre-training run requires 7 days on 512 GPUs. Explain how carbon-aware scheduling
  would route this job and what infrastructure is needed to act on grid signals.'
details:
  realistic_solution: 'Carbon-aware scheduling has two axes: temporal (run during low-intensity hours,
    e.g., midday solar surplus in California) and spatial (route to lower-intensity region). For a 7-day
    job: California''s grid intensity drops to ~80 gCO₂/kWh during peak solar hours (11am–3pm) vs. 250
    gCO₂/kWh overnight. If data is already in US-West, run there and schedule job start at solar peak.
    Use the Carbon Aware SDK or WattTime API for real-time marginal emissions data. Integrate with Kubernetes
    via a custom scheduler plugin or KEDA scaler that checks the carbon intensity forecast before approving
    new job submissions. For flexible batch jobs, set a `carbon_budget` annotation and the scheduler defers
    launch until intensity is below threshold.'
  common_mistake: Treating carbon-aware scheduling as a purely time-shifting problem (run at night when
    grid is greener) without considering cross-region workload migration; also ignoring the data gravity
    problem — moving a large dataset to a lower-carbon region has its own carbon cost.
  napkin_math: '512 H100 × 700 W = 358.4 kW. 7 days = 168 hr. Total energy = 358.4 × 168 = 60,211 kWh.
    At US-East 350 gCO₂/kWh: 60,211 × 350 g = 21,074 kg CO₂ ≈ 21 tonnes. At US-West solar peak 80 gCO₂/kWh:
    60,211 × 80 g = 4,817 kg ≈ 4.8 tonnes. Carbon savings from spatial shift: 16.2 tonnes CO₂ — equivalent
    to ~35,000 miles of driving.'
