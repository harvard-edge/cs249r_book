title: Memory-Bound vs Compute-Bound Classification for Attention on A100
scenario: A team runs multi-head attention with sequence length 2048, 32 heads, head_dim=128 on A100 80GB.
  The QK^T matmul produces a 2048×2048 attention matrix per head. A100 has 312 TFLOPS BF16 and 2 TB/s
  HBM2e bandwidth. The observed throughput is 45 TFLOPS. Classify the bottleneck.
question: "Is the 2048-token, 32-head QK^T attention operation on A100 compute- or memory-bound, and what should you use to improve it?"
details:
  realistic_solution: 'For QK^T: ops = 2*32*2048*2048*128 = 34.4B FLOPs. Memory = 32*(2048*128 + 2048*128
    + 2048*2048)*2 bytes ≈ 32*(0.5MB + 0.5MB + 8MB) = 288MB. AI = 34.4B/288MB ≈ 119 FLOPs/byte. Ridge
    point = 312e12/2e12 = 156 FLOPs/byte. AI < ridge point → memory-bound. Use FlashAttention to avoid
    materializing the attention matrix and improve AI to ~500 FLOPs/byte.'
  common_mistake: Treating the full attention operation as one GEMM without accounting for the softmax
    and bandwidth cost of materializing the attention matrix.
  napkin_math: Ridge point = 312/2 = 156 FLOPs/byte. QK^T AI ≈ 119 FLOPs/byte < 156 → memory-bound. FlashAttention
    fuses ops, boosts AI by ~4x, moves to compute-bound regime.
