title: Ring-AllReduce Bandwidth Calculation for H100 NVLink Cluster
scenario: An 8-GPU H100 node uses NVLink (900GB/s bidirectional, 450GB/s per direction)
  to synchronize gradients after each backward pass. The model has 7B parameters in
  FP32. Using ring-AllReduce, calculate the total data transmitted per GPU and the
  minimum synchronization time.
question: For 7B FP32 gradients on 8 H100s over NVLink, how much data does ring-AllReduce
  transmit per GPU and what is the minimum sync time?
details:
  realistic_solution: 'Gradient size: 7B × 4 bytes = 28GB. Ring-AllReduce transmits
    2×(N-1)/N × data_size per GPU = 2×7/8×28GB = 49GB per GPU. Time = 49GB / 450GB/s
    = 109ms. Note: ring-AllReduce bandwidth efficiency = (N-1)/N = 7/8 = 87.5%, so
    effective bandwidth used = 450×0.875=394GB/s per link direction. For FP16/BF16
    gradients: 14GB → 24.5GB transmitted → 54ms.'
  common_mistake: Using AllReduce time = model_size / bandwidth without accounting
    for the 2×(N-1)/N efficiency factor of ring-AllReduce.
  napkin_math: '7B params × 4B = 28GB. Ring-AllReduce per-GPU transfer = 2×(8-1)/8
    × 28GB = 2×0.875×28=49GB. Time=49GB/450GB/s=109ms. With BF16: 28GB×0.5=14GB gradients
    → 54ms. BF16 halves sync time with no accuracy loss for most models.'
