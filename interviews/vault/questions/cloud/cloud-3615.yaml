title: Ring-AllReduce Bandwidth Calculation for H100 NVLink Cluster
scenario: An 8-GPU node uses NVLink (900GB/s bidirectional, 450GB/s per direction) to synchronize gradients after each backward pass. The model has 7B parameters in FP32.
question: For 7B FP32 gradients on 8 H100s over NVLink, how much data does ring-AllReduce transmit per GPU and what is the minimum sync time?
details:
  realistic_solution: 'Gradient size: 7B × 4 bytes = 28GB. Ring-AllReduce transmits 2×(N-1)/N × data_size per GPU = 2×7/8×28GB = 49GB per GPU. Time = 49GB / 450GB/s = 109ms. Note: ring-AllReduce bandwidth efficiency = (N-1)/N = 7/8 = 87.5%, so effective bandwidth used = 450×0.875=394GB/s per link direction. For FP16/BF16 gradients: 14GB → 24.5GB transmitted → 54ms.'
  common_mistake: |
    **The Pitfall:** Calculating AllReduce time as simply `model_size / bandwidth`.
    **The Rationale:** Candidates forget the algorithmic mechanics of ring-AllReduce, which involves scatter-reduce and all-gather phases.
    **The Consequence:** Failing to account for the efficiency factor, resulting in inaccurate network profiling and synchronization time estimates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 7B params (FP32 = 4 bytes).
       - GPUs (N): 8.
       - Unidirectional NVLink bandwidth: 450 GB/s.
    2. **Calculations:**
       - Gradient Size: 7B * 4 bytes = 28 GB.
       - Ring-AllReduce Transfer (per GPU): 2 * (7/8) * 28 GB = 49 GB.
       - Minimum Sync Time: 49 GB / 450 GB/s = 109 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. Sync takes 109 ms per step.**
