title: Overlap-Aware Job Scheduling on Shared GPU Clusters
scenario: Your GPU cluster runs multiple DDP training jobs. Job A (8 GPUs, 200ms backward,
  100ms AllReduce) and Job B (8 GPUs, 50ms backward, 100ms AllReduce) share the same
  InfiniBand fabric. When both run simultaneously, Job A's AllReduce time jumps to
  180ms because of fabric contention. Job A's overlap breaks. Evaluate cluster scheduling
  policies to protect overlap efficiency.
question: Which cluster scheduling policies would protect Job A's overlap when Job
  B causes InfiniBand contention?
details:
  realistic_solution: 'Network-aware scheduling: (1) Topology-aware placement: assign
    jobs to GPU groups that share dedicated IB switches (locality). Job A on switches
    1-2, Job B on switches 3-4. No contention. (2) Time-division multiplexing: schedule
    communication-heavy jobs to stagger their AllReduce phases. If Job A''s AllReduce
    is at t=200ms and Job B''s at t=50ms, they naturally stagger. (3) Network isolation:
    use IB partitioning (PKeys) to guarantee bandwidth per job. (4) Priority-based
    QoS: mark Job A''s NCCL traffic as high-priority in IB''s SL-to-VL mapping. (5)
    Evaluation: topology-aware placement is simplest and most effective — it eliminates
    contention with zero runtime overhead. Modern schedulers (Slurm + topology plugin,
    Kubernetes + network topology awareness) support this.'
  common_mistake: Scheduling jobs purely based on GPU availability without considering
    network topology. Two communication-heavy jobs sharing the same IB switches destroy
    each other's overlap efficiency.
  napkin_math: 'Job A with contention: 200 ms backward — but only the *latter* 100
    ms of backward overlaps cleanly with AllReduce because DDP buckets gradients in
    reverse-layer order: the first ~100 ms of backward is dominated by activation
    gradient computation that produces the bucket boundaries, and AllReduce can only
    start once a bucket is full. With 100 ms of usable overlap window and a 180 ms
    contended AllReduce, exposed AllReduce = 180 - 100 = 80 ms. Step time = 200 +
    80 = 280 ms/step (vs 200 ms uncontended). Contention cost: 80 ms/step = 40% throughput
    loss. Over a 24-hour job: 9.6 hours wasted on network contention.'
