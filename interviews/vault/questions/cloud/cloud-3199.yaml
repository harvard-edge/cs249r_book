title: MoE Quantization Strategy for Serving
scenario: You want to serve Mixtral 8x22B (141B total params, 39B active per token) on as few 80GB GPUs as possible to minimize costs. In BF16 the weights need 282 GB, requiring 4x 80GB GPUs. Design a mixed-precision quantization strategy (BF16 for shared layers, INT4 for experts) to reduce the GPU requirement.
question: Using consistent parameter counts for Mixtral 8x22B, how much memory does a BF16-shared, INT4-expert quantization plan need, and how many 80GB GPUs are required?
details:
  realistic_solution: 'First, solve for the shared vs expert parameter counts. Total params = Shared + 8 * Expert = 141B. Active params = Shared + 2 * Expert = 39B. Subtracting the two gives 6 * Expert = 102B, so Expert = 17B. Shared = 39B - 34B = 5B. A mixed-precision plan keeps the highly sensitive shared attention layers in BF16 and quantizes the large expert FFNs to INT4. Memory required: Shared BF16 (5B params) = 10 GB. Experts INT4 (8 * 17B = 136B params) = 68 GB. Total weight memory = 78 GB. This allows the entire 141B parameter model to fit on a single 80GB GPU, though in practice 2 GPUs might be used to leave sufficient room for KV-cache and activations.'
  common_mistake: 'Applying a uniform quantization (like INT4 for everything) degrades performance because the shared attention layers process every token and are highly sensitive to quantization errors. Conversely, assuming 141B params requires 141GB even at INT8 ignores the opportunity for mixed precision.'
  napkin_math: 'System of equations: S + 8E = 141B. S + 2E = 39B. 6E = 102B -> E = 17B. S = 5B. Shared BF16: 5B * 2B/param = 10 GB. Experts INT4: 136B * 0.5B/param = 68 GB. Total = 78 GB. 78 GB fits on a single 80GB GPU (e.g., A100/H100 80GB), saving 3 GPUs compared to a pure BF16 deployment.'
