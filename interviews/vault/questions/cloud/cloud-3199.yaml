title: MoE Quantization Strategy for Serving
scenario: You want to serve Mixtral 8x22B (141B total params, 39B active per token) on as few 80GB GPUs as possible to minimize costs. In BF16 the weights need 282 GB, requiring 4x 80GB GPUs.
question: Using consistent parameter counts for Mixtral 8x22B, how much memory does a BF16-shared, INT4-expert quantization plan need, and how many 80GB GPUs are required?
details:
  realistic_solution: 'First, solve for the shared vs expert parameter counts. Total params = Shared + 8 * Expert = 141B. Active params = Shared + 2 * Expert = 39B. Subtracting the two gives 6 * Expert = 102B, so Expert = 17B. Shared = 39B - 34B = 5B. A mixed-precision plan keeps the highly sensitive shared attention layers in BF16 and quantizes the large expert FFNs to INT4. Memory required: Shared BF16 (5B params) = 10 GB. Experts INT4 (8 * 17B = 136B params) = 68 GB. Total weight memory = 78 GB. This allows the entire 141B parameter model to fit on a single 80GB GPU, though in practice 2 GPUs might be used to leave sufficient room for KV-cache and activations.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 quantization across the entire architecture.
    **The Rationale:** Engineers assume that to save the most memory, every layer should be uniformly quantized to the lowest precision format.
    **The Consequence:** Quantizing the shared attention layers degrades the global context modeling severely, ruining the model's accuracy, while failing to realize mixed-precision offers a safe path to fitting inside a single GPU.
  napkin_math: |
    1. **Parameter Equations:** Shared + 8 × Expert = 141B. Shared + 2 × Expert = 39B (active).
    2. **Parameter Counts:** Subtracting equations yields 6 × Expert = 102B $\rightarrow$ **Expert = 17B**. Therefore, **Shared = 5B**.
    3. **Shared BF16 Memory:** 5B params × 2 bytes = 10 GB.
    4. **Expert INT4 Memory:** (8 × 17B) = 136B params × 0.5 bytes = 68 GB.
    5. **Total Weight Memory:** 10 GB + 68 GB = **78 GB**.
    6. **Conclusion:** The entire 141B model fits on a **single 80GB GPU**, saving 3 GPUs compared to pure BF16.
