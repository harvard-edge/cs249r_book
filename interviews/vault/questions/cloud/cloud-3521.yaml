title: TPU v5e Adversarial Defense Throughput Impact for Real-time Fraud Detection
scenario: You are overseeing a critical real-time fraud detection system. A large
  Transformer model, crucial for flagging suspicious transactions, is deployed across
  a fleet of Google TPU v5e devices. Each TPU v5e boasts 16 GB HBM, 197 TFLOPS BF16
  peak performance, and 1.6 TB/s memory bandwidth. Recently, your team identified
  a sophisticated adversarial evasion attack causing a noticeable rise in false negatives.
  To counter this, you propose an inline, lightweight input sanitization step that
  adds approximately 1 GFLOP (BF16) of computation per inference. The core model inference
  currently requires 100 GFLOPs (BF16). Your goal is to maintain the reliability of
  the system under attack. Explain the immediate impact this defense has.
question: What overhead does a 1 GFLOP sanitization step add to a 100 GFLOP TPU v5e
  inference, and how would you manage it?
details:
  realistic_solution: A realistic solution would involve clearly quantifying the performance
    overhead, considering options like offloading the sanitization to a CPU pre-processing
    step if latency allows, or exploring hardware-accelerated sanitization on the
    TPU itself (e.g., using specific ops efficiently). It also involves establishing
    clear Service Level Objectives (SLOs) for reliability and throughput that must
    be met even with defense mechanisms in place, and continuous monitoring of both
    attack efficacy and defense performance.
  common_mistake: Candidates might overlook the performance overhead of security measures
    or miscalculate the relative throughput reduction, underestimating the impact
    of even small overheads at high scale. Another common mistake is proposing overly
    complex defense mechanisms without considering their practical deployment and
    resource implications.
  napkin_math: Given the core model inference is 100 GFLOPs and the defense adds 1
    GFLOP, the total computation per inference becomes 101 GFLOPs. Assuming compute
    is the primary bottleneck, this represents a (101 - 100) / 100 = 1% increase in
    computation per inference. Therefore, the effective maximum inference throughput
    would approximately decrease by 1%.
