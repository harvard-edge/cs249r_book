title: TPU v5e Adversarial Defense Throughput Impact for Real-time Fraud Detection
scenario: You are overseeing a critical real-time fraud detection system. A large Transformer model is deployed across a fleet of TPU devices. Recently, your team identified a sophisticated adversarial evasion attack causing a noticeable rise in false negatives. To counter this, you propose an inline, lightweight input sanitization step that adds approximately 1 GFLOP (BF16) of computation per inference. The core model inference currently requires 100 GFLOPs (BF16).
question: "What overhead does a 1 GFLOP sanitization step add to a 100 GFLOP TPU inference, and how would you manage its impact?"
details:
  realistic_solution: A realistic solution would involve clearly quantifying the performance overhead, considering options like offloading the sanitization to a CPU pre-processing step if latency allows, or exploring hardware-accelerated sanitization on the TPU itself (e.g., using specific ops efficiently). It also involves establishing clear Service Level Objectives (SLOs) for reliability and throughput that must be met even with defense mechanisms in place, and continuous monitoring of both attack efficacy and defense performance.
  common_mistake: |
    **The Pitfall:** Overlooking the performance overhead of security measures or miscalculating the relative throughput reduction.
    **The Rationale:** Engineers often focus solely on the security benefit, forgetting that even small relative overheads at high scale can violate strict latency SLAs.
    **The Consequence:** Deploying a defense that causes the system to miss real-time deadlines, potentially failing to process transactions during peak load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Core model inference = 100 GFLOPs.
       - Defense sanitization step adds = 1 GFLOP.
    2. **Calculations:**
       - Total computation per inference = 101 GFLOPs.
       - Compute increase = (101 - 100) / 100 = 1%.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. Assuming compute is the primary bottleneck, the effective maximum inference throughput decreases by approximately 1%.
