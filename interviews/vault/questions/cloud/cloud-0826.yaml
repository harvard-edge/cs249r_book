title: The MoE Sparse Activation Ratio
scenario: 'You are evaluating a Mixture-of-Experts model with 47B total parameters: a 7B shared backbone
  and 8 expert FFN blocks of 5B parameters each, using top-2 routing. The interviewer asks you to explain
  the effective compute cost per token compared to a dense 47B model.'
details:
  realistic_solution: Only 36% of parameters are active per token. The backbone (7B) always runs, plus
    top-2 of 8 experts (2 * 5B = 10B), giving 17B active parameters. FLOPs per token ~ 2 * 17B = 34 GFLOPS,
    versus 2 * 47B = 94 GFLOPS for a dense 47B model. You get the representational capacity of 47B at
    the compute cost of 17B.
  common_mistake: Thinking MoE models are 'just bigger' and require proportionally more compute. The key
    insight is that only a subset of experts activate per token, so compute scales with active parameters,
    not total parameters.
  napkin_math: 'In a 47B Mixture-of-Experts model (7B shared backbone + 8x 5B experts), top-2 routing
    means each token only activates the backbone and 2 experts. Active parameters = 7B + (2 * 5B) = 17B.
    The dense equivalent has 47B active params. Forward pass compute (2 * active params): MoE takes 34
    GFLOPs/token, while a 47B dense model takes 94 GFLOPs/token. You save 64% on compute!'
  options:
  - A) 100% — all experts must process every token
  - B) ~36% — only backbone + top-2 experts activate
  - C) ~12.5% — only 1 of 8 experts activates
  - D) ~50% — half the experts activate on average
  correct_index: 1
