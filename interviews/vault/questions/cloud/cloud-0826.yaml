title: The MoE Sparse Activation Ratio
scenario: 'You are evaluating a Mixture-of-Experts model with 47B total parameters: a 7B shared backbone and 8 expert FFN blocks of 5B parameters each, using top-2 routing.'
question: 'What is the effective compute cost per token of this top-2 MoE compared with a dense 47B model?'
details:
  realistic_solution: 'Only ~36% of parameters are active per token. The backbone (7B) always runs, plus top-2 of 8 experts (2 * 5B = 10B), giving 17B active parameters. FLOPs per token ~ 34 GFLOPS vs 94 GFLOPS for dense 47B.'
  common_mistake: |
    **The Pitfall:** Thinking MoE models require proportionally more compute based on their total parameter count.
    **The Rationale:** Engineers are used to dense models where FLOPs ≈ 2 * Parameters.
    **The Consequence:** Overprovisioning compute resources for MoE inference or unfairly dismissing MoE models during architecture selection due to perceived cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shared Backbone: 7B parameters.
       - Experts: 8 blocks of 5B parameters each.
       - Routing: Top-2.
    2. **Calculations:**
       - Active Parameters: 7B (backbone) + 2 * 5B (experts) = 17B parameters.
       - MoE Compute: Forward pass takes ≈ 2 * 17B = 34 GFLOPs/token.
       - Dense Compute: A dense 47B model takes ≈ 2 * 47B = 94 GFLOPs/token.
       - Savings: 34 / 94 ≈ 36.1%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. The top-2 MoE delivers the representational capacity of a 47B model while consuming only ~36% of the compute.**
  options:
  - '100% (94 GFLOPs) - Assuming all parameters are active for every token.'
  - '~36% (34 GFLOPs) - Only backbone + top-2 experts activate.'
  - '~21% (20 GFLOPs) - Forgetting to include the 7B shared backbone.'
  - '~25% (24 GFLOPs) - Assuming top-2 routing without multiplying the 5B expert size by 2.'
  correct_index: 1
