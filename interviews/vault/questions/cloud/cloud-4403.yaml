title: Carbon Intensity Time-Shifting for Large-Scale H100 Pretraining
scenario: 'You are designing a carbon-aware scheduling system for a 4,096-GPU H100 cluster. The grid carbon intensity is highly variable: 80 gCO2/kWh at night (10 hours) and 420 gCO2/kWh during peak day (14 hours). Each GPU draws 700W at full load. You want to minimize carbon by only computing at night. You can either (1) pause the job (cluster draws 0W, but resuming requires a 2-hour warmup at full 700W power that makes no training progress) or (2) keep the job alive in a warm-idle state during the day at 70W per GPU (makes 0 progress, but resumes instantly at night).'
question: 'Which night-only computing strategy (pause vs warm-idle) minimizes daily carbon footprint, and what are the daily savings versus a 24/7 baseline?'
details:
  realistic_solution: 'Calculate the carbon footprint for 24/7 baseline, pause strategy, and warm-idle strategy. The warm-idle strategy is the most carbon-efficient, saving ~18,208 kgCO2/day (79% reduction) compared to 24/7, because avoiding the 2-hour full-power warmup penalty at high day-time carbon intensity uses less energy than the 14-hour 70W idle.'
  common_mistake: |
    **The Pitfall:** Assuming pausing training entirely is always the most carbon-efficient method.
    **The Rationale:** Candidates forget that a 4,096-GPU job takes massive overhead to restart (checkpointing + warmup), drawing megawatts of power without making progress.
    **The Consequence:** Proposing a "green" scheduling system that actually creates a massive carbon penalty from 2 hours of wasted warmup during peak daytime grid intensity.
  napkin_math: |
    - **Total kW Capacity:** 4,096 GPUs × 0.7 kW × 1.2 PUE = 3,440.64 kW.
    - **Baseline 24/7:** (10h × 80g + 14h × 420g) × 3,440.64 kW = (800 + 5880) × 3440.64 = 22,983 kgCO2/day.
    - **Pause Strategy:** Night compute (10h × 80g × 3440.64) = 2,752.5 kg. Day warmup (2h × 420g × 3440.64) = 2,890.1 kg. Total = 5,642.6 kg/day.
    - **Warm-Idle Strategy:** Night compute = 2,752.5 kg. Day idle (4096 GPUs × 0.07 kW × 1.2 PUE × 14h × 420g) = 2,023.1 kg. Total = 4,775.6 kg/day.
    - **Result:** **Warm-idle beats pausing**, saving ~18,208 kgCO2/day (79% reduction over baseline).
