title: Carbon Intensity Time-Shifting for Large-Scale H100 Pretraining
scenario: 'You are designing a carbon-aware scheduling system for a 4,096-GPU H100 cluster. The grid carbon intensity is highly variable: 80 gCO2/kWh at night (10 hours) and 420 gCO2/kWh during peak day (14 hours). Each GPU draws 700W at full load. You want to minimize carbon by only computing at night. You can either (1) pause the job (cluster draws 0W, but resuming requires a 2-hour warmup at full 700W power that makes no training progress) or (2) keep the job alive in a warm-idle state during the day at 70W per GPU (makes 0 progress, but resumes instantly at night). Calculate the daily carbon footprint of both strategies and determine the best approach.'
question: Which night-only computing strategy (pause vs warm-idle) minimizes daily carbon footprint, and what are the daily savings versus a 24/7 baseline?
details:
  realistic_solution: 'Baseline 24/7 carbon: (10h × 80g + 14h × 420g) × 4096 GPUs × 0.7 kW × 1.2 PUE = (800 + 5880) × 3440.64 = 22,983 kgCO2/day.
    Strategy 1 (Pause): 10h night compute + 2h day warmup at 700W. Carbon = (10h × 80g × 3440.64) + (2h × 420g × 3440.64) = 2,752.5 + 2,890.1 = 5,642.6 kgCO2/day.
    Strategy 2 (Warm-idle): 10h night compute at 700W + 14h day warm-idle at 70W. Carbon = (10h × 80g × 3440.64) + (14h × 420g × 4096 × 0.07 × 1.2) = 2,752.5 + 2,023.1 = 4,775.6 kgCO2/day.
    The warm-idle strategy is the most carbon-efficient, saving ~18,208 kgCO2/day (79% reduction) compared to 24/7, because avoiding the 2-hour full-power warmup penalty at high day-time carbon intensity uses less energy than the 14-hour 70W idle.'
  common_mistake: Assuming you can simply pause training during high-carbon periods.
    A 4,096-GPU job at 700W draws 2.87 MW. Idle GPUs during a pause still draw ~150W
    each = 614 kW of wasted power. The 2-hour restart overhead (checkpointing + warmup)
    consumes additional energy. Carbon-aware scheduling must account for these overheads.
  napkin_math: 'Baseline: 3440.64 kW_total × (800 + 5880)g = 22,983.5 kg/day.
    Pause: Night compute = 3440.64 × 10 × 80 = 2,752.5 kg. Day warmup = 3440.64 × 2 × 420 = 2,890.1 kg. Total = 5,642.6 kg/day.
    Warm-idle: Night compute = 2,752.5 kg. Day idle = 4096 × 0.07 × 1.2 × 14 × 420 = 2,023.1 kg. Total = 4,775.6 kg/day.
    Warm-idle beats pausing and saves 79% over baseline.'
