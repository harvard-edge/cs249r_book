title: Carbon Intensity Time-Shifting for Large-Scale H100 Pretraining
scenario: 'You are designing a carbon-aware scheduling system for a 6-week, 4,096-GPU
  H100 pretraining run. The datacenter is in a region with highly variable grid carbon
  intensity: 80 gCO2/kWh at night (20:00-06:00, 10 hours) and 420 gCO2/kWh during
  peak day (06:00-20:00, 14 hours). Each GPU draws 700W. The training job cannot be
  paused without 2-hour restart overhead. Design a system that minimizes total carbon
  footprint while guaranteeing the job completes within 6 weeks, and calculate the
  carbon savings versus a non-carbon-aware baseline.'
question: How would you schedule the 4,096-GPU H100 pretraining run to minimize carbon
  while finishing within 6 weeks, and what savings result versus 24/7?
details:
  realistic_solution: 'Non-carbon-aware baseline: Total GPU-hours = 6 × 7 × 24 × 4,096
    = 4,128,768 GPU-h. Actual average carbon intensity = (10h × 80 + 14h × 420) /
    24 = 278.3 g/kWh. Baseline carbon = 4,128,768 × 0.7 kWh × 1.2 × 278.3 g/kWh =
    965,000 kgCO2. Optimized: schedule 10 night hours, pause 14 day hours. Night throughput:
    same. But pause requires warmup — net effective compute loss. Best tradeoff: run
    24/7 but during day hours reduce batch size to 10% load (70W/GPU warm idle). Day
    carbon: 14h × 4,096 × 0.070 × 1.2 × 420 = 2,025 kgCO2/day. Night carbon: 10h ×
    4,096 × 0.700 × 1.2 × 80 = 275 kgCO2/day. Total/day: 2,300 kgCO2. Baseline/day:
    ≈22,981 kgCO2. Savings: ~20,681 kgCO2/day × 42 days = 868,602 kgCO2 (90% reduction
    at cost of slower throughput). Requires extending the job duration to compensate
    for lost daytime compute.'
  common_mistake: Assuming you can simply pause training during high-carbon periods.
    A 4,096-GPU job at 700W draws 2.87 MW. Idle GPUs during a pause still draw ~150W
    each = 614 kW of wasted power. The 2-hour restart overhead (checkpointing + warmup)
    consumes additional energy. Carbon-aware scheduling must account for these overheads.
  napkin_math: 'Total GPU-hours needed: 6 weeks × 7 × 24 × 4,096 = 4,128,768. Baseline:
    avg intensity = (10×80 + 14×420)/24 = (800 + 5880)/24 = 6680/24 = 278.3 g/kWh.
    Energy = 4,128,768 × 0.70 × 1.2 = 3,468,165 kWh. Carbon = 3,468,165 × 0.2783 =
    965,213 kgCO2. Optimized (run only at night, 10h/day): GPU-h/day = 10 × 4,096
    = 40,960. Days needed: 4,128,768 / 40,960 = 100.8 days (vs 42 days baseline).
    Not viable—too long. Carbon at night (10h): 10 × 4,096 × 0.7 × 1.2 × 0.080 = 2,753
    kgCO2. Day (14h): 14 × 4,096 × 0.7 × 1.2 × 0.420 = 20,239 kgCO2/day. Total/day
    = 22,992 kg. Baseline/day: 24 × 4,096 × 0.7 × 1.2 × 0.2783 = 22,981 kg/day. Key
    insight: day-only carbon (420 g/kWh) dominates the blended average; to save 30%,
    reduce day load by ~43%.'
