title: Evaluating Idempotency in LLM Data Pipelines
scenario: A data engineering team is building a pre-training pipeline for a 70B parameter LLM, processing 50 TB of raw text daily using Apache Spark on preemptible instances. The pipeline performs PII redaction. During task failures, the current redaction logic generates mismatched duplicate records. You must evaluate two proposals: 1) deterministic hashing (HMAC), or 2) a centralized Redis state table to track processed records.
question: Which resilience design should you choose for the 50 TB/day PII redaction pipeline, and why?
details:
  realistic_solution: Adopt the deterministic hashing scheme (HMAC) to achieve stateless idempotency. When preemptions occur, Spark tasks simply re-execute and overwrite/re-emit the exact same deterministic output. This eliminates all external state synchronization and network overhead.
  common_mistake: |
    **The Pitfall:** Choosing a Redis state table to guarantee exactly-once processing.
    **The Rationale:** Centralized state tracking is a common pattern in microservices to ensure idempotency.
    **The Consequence:** Introducing a catastrophic network bottleneck that cannot scale to massive batch data volumes, causing the pipeline to grind to a halt.
  napkin_math: |
    - **Daily Volume**: 50 TB / 1 KB per record = 50 billion records.
    - **Redis Approach**: 50B network calls × 1ms latency = 50,000,000 seconds (**~13,888 hours**) of blocking I/O overhead.
    - **Deterministic Hash**: 50B operations × 1μs compute = 50,000 seconds (**~14 hours**) of CPU compute.
    - **Conclusion**: The stateless approach is ~1000× faster.
