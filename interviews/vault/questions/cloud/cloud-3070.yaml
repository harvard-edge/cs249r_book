title: 'Queueing Theory Evaluation: FCFS vs Priority Queuing for Mixed Workloads'
scenario: 'An inference cluster handles two workload classes: short requests (mean 200ms, 80% of traffic) and long requests (mean 4s, 20% of traffic). Total utilization is 75%.'
question: 'Compare FCFS queuing versus preemptive priority queuing (short requests preempt long) for P99 latency, and show which achieves better aggregate SLO compliance.'
details:
  realistic_solution: 'FCFS queuing causes short requests to suffer disproportionately from rare long requests, blowing up overall P99. With preemptive priority queuing, short requests see only their specific load, dropping their wait time significantly. Long requests see combined load. Priority queuing wins if the short SLO is strict (P99 < 500ms) and long SLO is flexible.'
  common_mistake: |
    **The Pitfall:** Assuming priority queuing universally improves overall system performance.
    **The Rationale:** Priority queuing radically drops the latency for the high-priority class, which is highly visible.
    **The Consequence:** Starving the low-priority class (long requests), causing massive tail latency regressions that violate their specific SLOs if not carefully modeled.
  napkin_math: |
    **Assumptions & Constraints:**
    - Short: 200ms (80%). Long: 4.0s (20%).
    - Total utilization (ρ) = 75%.
    - Queue type: M/M/1.

    **Calculations:**
    - FCFS Baseline: Mean service = (0.8 * 0.2s) + (0.2 * 4.0s) = 0.96s. W_q = ρ * service / (1-ρ) = 0.75 * 0.96 / 0.25 = 2.88s. P99 ≈ 4.6 * (2.88 + 0.96) ≈ 17.7s.
    - Priority (Short): ρ_short = 0.8 * 0.75 = 0.6. W_q,short = 0.6 * 0.2 / (1-0.6) = 0.3s. P99_short ≈ 4.6 * 0.5 = 2.3s.
    - Priority (Long): Long requests see combined load. W_q,long ≈ 2.88s + preemption delays ≈ 12s.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. Priority improves short P99 by ~7.7x at the severe cost of long P99.
