title: 'Queueing Theory Evaluation: FCFS vs Priority Queuing for Mixed Workloads'
scenario: 'An H100 inference cluster handles two workload classes: short requests (mean 200ms, 80% of traffic) and long requests (mean 4s, 20% of traffic). Total utilization is 75%.'
question: "Compare FCFS queuing versus preemptive priority queuing (short requests preempt long) for P99 latency, and show which achieves better aggregate SLO compliance."
details:
  realistic_solution: 'FCFS M/M/1 mean wait: ρ=0.75, mean service = 0.8*0.2 + 0.2*4.0 = 0.96s. Wq = 0.75*0.96/(1-0.75) = 2.88s. Short requests suffer disproportionately from rare long requests. With preemptive priority: short requests see only short-request load (80% * λ), their effective ρ=0.6, Wq_short ≈ 0.6*0.2/(1-0.6) = 0.3s — 10x improvement. Long requests see combined ρ=0.75, Wq_long ≈ 12s. If long SLO is flexible (30s), this is fine. Priority wins if short SLO is strict (P99 < 500ms).'
  common_mistake: |
    **The Pitfall:** Assuming priority queuing universally improves overall system performance.
    **The Rationale:** Priority queuing radically drops the latency for the high-priority class, which is highly visible.
    **The Consequence:** Starving the low-priority class (long requests), causing massive tail latency regressions that violate their specific SLOs if not carefully modeled.
  napkin_math: |
    1. **FCFS Baseline:** Mean service = (0.8 * 0.2s) + (0.2 * 4.0s) = 0.96s. M/M/1 Queue Wait (W_q) = ρ * μ / (1-ρ) = 0.75 * 0.96 / 0.25 = 2.88s. P99 ≈ 4.6 * (2.88 + 0.96) ≈ **17.7s** for all requests.
    2. **Priority (Short):** Short requests only see short traffic. ρ_{short} = 0.8 * 0.75 = 0.6. W_{q,short} = 0.6 * 0.2 / 0.4 = 0.3s. P99_{short} ≈ 4.6 * 0.5 = **2.3s**.
    3. **Priority (Long):** Long requests see combined load. W_{q,long} ≈ 2.88s + preemption delays ≈ **12s**.
    4. **Conclusion:** Priority improves short P99 by ~7.7x at the severe cost of long P99.
