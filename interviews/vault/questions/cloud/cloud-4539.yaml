title: W8A16 KV Cache Expansion
scenario: A 14B parameter LLM is being prepared for serving on a single A100 80GB
  SXM. The weights in FP16 take 28GB.
question: Calculate the memory footprint of the weights after W8A16 quantization and
  determine the increase in available memory for the KV cache.
details:
  realistic_solution: With 14B parameters, W8 requires 1 byte per parameter, reducing
    the weight footprint from 28GB (FP16) to 14GB (INT8). This frees up exactly 14GB
    of HBM, directly increasing the memory available for the KV cache and batch size.
  common_mistake: Thinking W8A16 also halves the KV cache size, which remains in 16-bit
    precision.
  napkin_math: 28GB - 14GB = 14GB freed
