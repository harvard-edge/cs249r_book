title: W8A16 KV Cache Expansion
scenario: A 14B parameter LLM is being prepared for serving on a single A100 80GB
  SXM. The weights in FP16 take 28 GB. The serving target is a concurrent batch
  of 32 users, each at 4096 max-context tokens. Llama-2-13B-class architecture (40
  layers, 40 KV heads, head_dim=128) keeps KV at FP16.
question: Calculate the W8A16 weight footprint, then compute the maximum sustainable
  batch size given the 32-user, 4096-token KV cache requirement. Determine whether
  W8A16 quantization is sufficient to hit the target batch size.
details:
  realistic_solution: 'W8 weights: 14B * 1 B = 14 GB. Saves 14 GB versus FP16. KV
    per token: 2 * 40 * 40 * 128 * 2 B = 800 KB. Per-user max-context KV: 800 KB
    * 4096 = 3.13 GB. Available HBM after weights: 80 - 14 = 66 GB. Max users =
    floor(66 / 3.13) = 21 - falls short of the 32-user target by 11 users. To reach
    32 users, need to (a) also quantize KV to INT8 (cuts to 1.56 GB/user, fits 42
    users), or (b) cap context at 2048 tokens (1.56 GB/user FP16, fits 42), or (c)
    add PagedAttention to reclaim partial-context fragmentation.'
  common_mistake: Reporting only the 14 GB savings without computing the user-batch-feasibility
    that the savings actually buys.
  napkin_math: 'Weights: 14 GB. KV: 32 users * 4096 tokens * 800 KB = 100 GB needed
    -> exceeds 66 GB free; max users at 4k context = 21. With INT8 KV: 42 users
    feasible.'
