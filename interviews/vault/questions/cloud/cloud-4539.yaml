title: W8A16 KV Cache Expansion
scenario: A 14B parameter LLM is being prepared for serving on a single A100 80GB SXM. The weights in FP16 take 28 GB. The serving target is a concurrent batch of 32 users, each at 4096 max-context tokens. Llama-2-13B-class architecture (40 layers, 40 KV heads, head_dim=128) keeps KV at FP16.
question: Calculate the W8A16 weight footprint, then compute the maximum sustainable batch size given the 32-user, 4096-token KV cache requirement, and determine if W8A16 is sufficient.
details:
  realistic_solution: W8A16 quantization compresses weights but leaves the massive KV cache footprint untouched. To hit the 32-user target, W8A16 is insufficient on its own. The team must additionally quantize the KV cache to INT8, cap the maximum context length, or implement PagedAttention to reduce fragmentation.
  common_mistake: |
    **The Pitfall:** Reporting the 14 GB weight savings without calculating the corresponding KV cache requirements.
    **The Rationale:** Candidates often assume that if the model weights fit, the system is ready for production serving.
    **The Consequence:** The deployed model experiences immediate Out-Of-Memory (OOM) errors as concurrent users fill up the KV cache.
  napkin_math: |
    1. **W8 Weights:** $14\text{B} \times 1 \text{ byte} = 14 \text{ GB}$ (saves 14 GB over FP16).
    2. **Available HBM:** $80 \text{ GB} - 14 \text{ GB} = 66 \text{ GB}$.
    3. **KV Cache per Token:** $2 \text{ (K,V)} \times 40 \text{ layers} \times 40 \text{ heads} \times 128 \text{ dim} \times 2 \text{ bytes} = 819,200 \text{ bytes} \approx 800 \text{ KB}$.
    4. **KV Cache per User:** $819,200 \text{ bytes} \times 4096 \text{ tokens} = 3,355,443,200 \text{ bytes} \approx \mathbf{3.125 \text{ GB}}$.
    5. **Max Users Supported:** $\lfloor 66 \text{ GB} / 3.125 \text{ GB} \rfloor = \mathbf{21 \text{ users}}$.
    6. **Conclusion:** Falls short of the 32-user target by 11 users.
