title: Diagnosing LLM Decode Inefficiency
scenario: A team is optimizing an LLM serving engine on a GPU (312 TFLOPS BF16 peak compute, 2.0 TB/s memory bandwidth). Profiling reveals the prompt prefill phase achieves 65% of peak compute utilization, but the token decoding phase achieves less than 1% of peak TFLOPS. To fix the decoding phase, engineers rewrite the MLP and Attention layers using custom Triton kernels to squeeze out more compute efficiency. However, the token generation latency barely improves.
question: Why did the Triton compute optimization fail for token decoding, and what is the fundamental Roofline bottleneck?
details:
  realistic_solution: The Roofline model shows the decode phase is severely memory-bandwidth bound, not compute-bound. For a single token generation, each 2-byte weight (BF16) is loaded once to perform 1 Multiply-Accumulate (2 FLOPs), resulting in an arithmetic intensity of 1 FLOP/Byte. Because this is far below the A100's ridge point of 156 FLOPs/Byte, the workload sits deep in the memory-bound region of the Roofline plot. Optimizing compute kernels only raises the compute roof, which the decode phase isn't hitting. The correct approach is to increase arithmetic intensity via continuous batching or reduce memory traffic via weight quantization.
  common_mistake: |
    **The Pitfall:** Assuming low compute utilization implies poorly optimized kernels.
    **The Rationale:** Candidates see <1% TFLOPS and immediately jump to deep kernel-level tuning, not realizing the hardware is mathematically bottlenecked by memory bandwidth.
    **The Consequence:** Wasting weeks writing custom Triton/CUDA kernels that yield zero latency improvement during generation.
  napkin_math: |
    * GPU Ridge Point: 312e12 FLOPs/sec / 2e12 Bytes/sec = 156 FLOPs/Byte.
    * LLM Decode Arithmetic Intensity (batch size 1): 2 FLOPs (MAC) / 2 Bytes (BF16 weight) = 1 FLOP/Byte.
    * Max Decode Throughput = AI * Bandwidth = 1 * 2e12 = 2 TFLOPS.
    * Theoretical Max Utilization: 2 TFLOPS / 312 TFLOPS = **~0.64%**.
    * **Result:** The workload is deep in the memory-bound region; raising the compute roof does nothing.
