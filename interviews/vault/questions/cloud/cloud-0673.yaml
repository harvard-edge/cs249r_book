title: The PCIe Switch Starvation
scenario: You build an 8-GPU server using 8x H100 GPUs and a dual-socket CPU motherboard. You plug 4 GPUs into the PCIe slots wired to CPU 0, and 4 GPUs into slots wired to CPU 1. When running NCCL AllReduce to sync gradients, training is 3x slower than a DGX system, and `nvidia-smi` shows GPUs are mostly idle.
question: Where is the specific hardware bottleneck starving the GPUs?
details:
  realistic_solution: 'You forced GPU-to-GPU traffic over the slow CPU interconnect. GPU 0 (on CPU 0) can talk to GPU 3 (on CPU 0) directly via a PCIe switch. But to send data to GPU 4 (on CPU 1), it must travel from GPU 0, into CPU 0, across the QPI/UPI bridge to CPU 1, and down to GPU 4. The UPI bridge becomes an extreme choke point for ring or tree AllReduce topologies.'
  common_mistake: |
    **The Pitfall:** Assuming all GPUs on the same motherboard share a unified, high-speed backplane.
    **The Rationale:** Standard motherboard layouts obscure the physical NUMA topology and PCIe lane distribution.
    **The Consequence:** Assembling extremely expensive "frankenstein" servers that achieve catastrophic interconnect speeds because critical traffic crosses the CPU bridge.
  napkin_math: |
    1. Standard PCIe Gen 5 x16 provides ~128 GB/s bidirectional (~64 GB/s unidirectional).
    2. Nvidia NVLink switch (DGX) provides 900 GB/s GPU-to-GPU bandwidth.
    3. The Intel UPI link connecting two CPU sockets provides only ~20-40 GB/s of practical throughput, shared with system traffic.
    4. **Result:** **Your cross-CPU collective communication is hard-capped at <40 GB/s, starving the H100s.**
