title: The Silent Failure Cascade
scenario: You are training a 175B parameter LLM on a cluster of 4,096 H100 GPUs. The training job is expected
  to take 25 days. Three days into the run, the job crashes with no obvious error log, losing all progress.
  Team members suggest different checkpointing strategies. Given the known GPU Mean Time To Failure (MTTF),
  diagnose the most effective checkpointing interval to balance progress against overhead.
question: "What checkpoint interval minimizes wasted time for the 4,096-GPU, 25-day 175B LLM training run?"
details:
  realistic_solution: 'The problem is to find the statistically optimal checkpoint interval that minimizes
    time lost to both checkpointing overhead and failure recovery. At this scale, individual component
    MTTF translates into a continuous cluster-level failure rate. The optimal interval is a function of
    the cluster''s aggregate MTTF and the time it takes to save a checkpoint. We must first calculate
    the failure rate for the entire 4,096-GPU cluster and the time required to save the model''s state.
    With a cluster MTTF of ~12.2 hours, we expect roughly 2 failures per day over the 25-day run (~50
    failures total). The optimal checkpoint interval minimizes total wasted time = checkpoint overhead
    + expected re-computation after failure. Using the classic formula: optimal interval ≈ sqrt(2 * MTTF
    * T_checkpoint). For a 175B model, the full checkpoint size (including FP32 master weights and Adam
    states) is ~2.5 TB. With a parallel filesystem write speed of ~166 GB/s, T_checkpoint ≈ 15 seconds.
    Optimal interval = sqrt(2 * 12.2 * 3600s * 15s) = sqrt(1,317,600) ≈ 1,147 seconds ≈ 19 minutes.'
  common_mistake: Engineers often choose arbitrary checkpoint intervals like 'every epoch' or 'every hour'.
    This ignores the statistical reality of large-scale hardware failure. Checkpointing too often introduces
    significant overhead, while checkpointing too infrequently risks catastrophic work loss.
  napkin_math: '1. **Calculate Cluster MTTF:** A single GPU has an MTTF of ~50,000 hours. For a cluster
    of 4,096 GPUs, the effective MTTF is `50,000 hours / 4,096 GPUs ≈ 12.2 hours`. This means we can expect
    a hardware failure roughly every 12 hours. 2. **Checkpoint size:** 175B params × 2 bytes (BF16) =
    350 GB. Plus optimizer state (FP32 master weights and Adam states = 12 bytes/param) = 2.1 TB. Total
    checkpoint size ≈ 2.5 TB. 3. **Checkpoint write time:** At ~166 GB/s parallel write to distributed
    filesystem: T_ckpt ≈ 2.5 TB / 166 GB/s ≈ 15 seconds. 4. **Optimal checkpoint interval** (Young''s
    formula): T_opt = sqrt(2 × MTTF × T_ckpt) = sqrt(2 × 43,920s × 15s) = sqrt(1,317,600) ≈ **1,147 seconds
    ≈ 19 minutes**. 5. **Checkpointing overhead:** Over 25 days (2,160,000s), number of checkpoints =
    2,160,000 / 1,147 ≈ 1,883. Total checkpoint time = 1,883 × 15s ≈ 28,245s ≈ 7.8 hours (< 1.5% overhead).
    6. **Expected rework per failure:** Average loss = T_opt / 2 ≈ 9.5 minutes. Over ~50 expected failures:
    50 × 9.5min = 475 minutes ≈ 8 hours of rework.'
  options:
  - Checkpoint every 5 minutes to be safe.
  - Checkpoint roughly every 18-20 minutes.
  - Checkpoint once per day to minimize overhead.
  - The job failed after 3 days, so checkpointing every 48 hours is sufficient.
  correct_index: 1
