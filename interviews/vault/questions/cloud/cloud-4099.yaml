title: TP Load Imbalance from Uneven Head Counts
scenario: A custom model architecture uses 48 attention heads. Your team deploys with TP=8 on MI300X GPUs. Each GPU gets 6 heads, which works. But profiling shows that the MLP layers have slightly uneven execution times across TP ranks.
question: If TP=8 partitions the 48-head model correctly, what can cause slight MLP execution-time imbalance across MI300X ranks?
details:
  realistic_solution: 'Even with perfect weight partitioning (each GPU holds exactly H_out/8 columns), several factors cause micro-imbalance: (1) Thermal throttling: MI300X GPUs in different physical positions experience different cooling, causing 2-5% clock frequency variation. The hottest GPU becomes the straggler in every AllReduce. (2) Memory alignment: depending on partition sizes, some GPU shards may have dimensions that align better with the memory controller''s interleaving (e.g., multiples of 256 bytes), giving slightly better memory throughput. (3) NCCL ring ordering: the AllReduce ring topology means some GPUs start sending/receiving earlier. (4) OS jitter: interrupts and context switches on one GPU''s host thread cause microsecond delays that compound over thousands of layers. Mitigation: ensure adequate cooling, use CUDA MPS to reduce context-switching, pin NCCL to optimal ring topologies with NCCL_RINGS environment variable.'
  common_mistake: |
    **The Pitfall:** Assuming that equal partition sizes guarantee equal execution time.
    **The Rationale:** Candidates abstract away physical realities, forgetting that hardware is analog.
    **The Consequence:** Wasting time debugging 'incorrect' partition logic when the real issue is GPU clock throttling, memory access patterns, or NCCL ring ordering.
  napkin_math: |
    1. 5% clock throttle on one MI300X: if MLP GEMM takes 0.5 ms, the straggler takes 0.525 ms.
    2. Wasted time per layer: 0.025 ms per MLP.
    3. Over 80 layers * 2 MLPs per layer: 160 * 0.025 ms = 4 ms wasted per step.
    4. **At a 100 ms step time, this accounts for a 4% throughput loss.**
