title: TP Load Imbalance from Uneven Head Counts
scenario: A custom model architecture uses 48 attention heads. Your team deploys with
  TP=8 on MI300X GPUs. Each GPU gets 6 heads, which works. But profiling shows that
  the MLP layers have slightly uneven execution times across TP ranks. What could
  cause this imbalance in a correctly partitioned TP setup?
question: If TP=8 partitions the 48-head model correctly, what can cause slight MLP
  execution-time imbalance across MI300X ranks?
details:
  realistic_solution: 'Even with perfect weight partitioning (each GPU holds exactly
    H_out/8 columns), several factors cause micro-imbalance: (1) Thermal throttling:
    MI300X GPUs in different physical positions experience different cooling, causing
    2-5% clock frequency variation. The hottest GPU becomes the straggler in every
    AllReduce. (2) Memory alignment: depending on partition sizes, some GPU shards
    may have dimensions that align better with the memory controller''s interleaving
    (e.g., multiples of 256 bytes), giving slightly better memory throughput. (3)
    NCCL ring ordering: the AllReduce ring topology means some GPUs start sending/receiving
    earlier. (4) OS jitter: interrupts and context switches on one GPU''s host thread
    cause microsecond delays that compound over thousands of layers. Mitigation: ensure
    adequate cooling, use CUDA MPS to reduce context-switching, pin NCCL to optimal
    ring topologies with NCCL_RINGS environment variable.'
  common_mistake: Assuming that equal partition sizes guarantee equal execution time.
    In practice, GPU clock throttling, memory access patterns, and NCCL ring ordering
    create micro-imbalances.
  napkin_math: '5% clock throttle on one MI300X: if MLP GEMM takes 0.5 ms, straggler
    takes 0.525 ms. Over 80 layers × 2 MLPs: 80 × 2 × 0.025 = 4 ms wasted per step.
    At 100 ms step time: 4% throughput loss.'
