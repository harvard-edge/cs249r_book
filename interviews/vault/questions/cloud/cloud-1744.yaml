title: Diagnosing P0 Inference Starvation
scenario: You are debugging a K8s fleet of 64x H100 nodes. A critical P0 LLM scaling event times out after
  60s waiting for a Redis-backed model weights lock. Logs show the lock is currently held by a P2 background
  data-compaction pod. However, the P2 pod has not made progress for 45 minutes because a steady influx
  of P1 exploratory training workloads are continuously preempting its CPU cycles. Why is the P0 job starved,
  and how do you resolve this at a system level?
question: "Why is the P0 job starved, and how do you resolve this at a system level?"
details:
  realistic_solution: 'Diagnose this as priority inversion. Implement Priority Inheritance in the lock
    manager: temporarily boost the priority of the P2 job holding the lock to P0, allowing it to acquire
    K8s CPU time, complete its critical section, and release the lock.'
  common_mistake: Killing the P1 jobs manually or simply increasing the P0 pod's priority, which fails
    to address the underlying lock-holding dependency mechanism.
  napkin_math: 'Without inheritance: Wait time = P2 lock hold + ∞ (continuous P1 preemptions). With inheritance:
    P0 wait time = P2 critical section execution (e.g., 200ms) + context switch overhead (<10ms).'
