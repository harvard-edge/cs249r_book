title: Mixed-Precision Gradient Synchronization Pipeline
scenario: 'Your 128-MI300X training job computes gradients in BF16 but the optimizer (Adam) requires FP32 master weights, momentum, and variance. Currently, the pipeline is: compute BF16 gradients → cast to FP32 → AllReduce FP32 → optimizer step. This AllReduces 4GB instead of 2GB.'
question: 'How would you redesign the BF16-gradient Adam pipeline to minimize AllReduce communication while preserving FP32 optimizer precision?'
details:
  realistic_solution: 'Redesigned pipeline: (1) Compute BF16 gradients (2GB). (2) AllReduce in BF16 (2GB instead of 4GB) — saves 50% communication. (3) Cast reduced gradients to FP32 locally on each GPU. (4) Optimizer step in FP32. The precision risk: summing 128 BF16 values can lose up to log₂(128) = 7 bits of mantissa, but BF16 has 8 mantissa bits (7 stored + 1 implicit). With block-wise summation in the ring (each GPU adds one BF16 value at a time, accumulating into the ring buffer), the maximum intermediate sum is 128 × max_gradient. As long as the ratio of largest to smallest gradient is < 2^7 = 128 (which is typical), BF16 AllReduce introduces < 1% relative error. For MI300X with native BF16 support at 1.3 PFLOPS: the BF16 AllReduce also benefits from faster NIC processing (some NICs have BF16 reduction engines). Communication savings: 2GB vs 4GB over 400Gbps: 40ms vs 80ms = 40ms saved per iteration. Over a 300ms iteration, this is a 13.3% speedup.'
  common_mistake: |
    **The Pitfall:** Casting gradients to FP32 before AllReduce.
    **The Rationale:** Candidates assume that because the optimizer requires FP32, the collective communication must also happen in FP32.
    **The Consequence:** The system unnecessarily transmits double the data over the network, wasting significant iteration time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network BW: 50GB/s per rail (8 rails = 400GB/s aggregate).
       - Gradients: 4GB FP32 vs 2GB BF16.
    2. **Calculations:**
       - FP32 AllReduce: 4GB * 2 * (127/128) / 50GB/s = 158ms.
       - BF16 AllReduce: 2GB * 2 * (127/128) / 50GB/s = 79ms.
       - Savings per step: 79ms (single rail calculation).
       - Aggregate cluster time: FP32 = 19.75ms, BF16 = 9.9ms.
    3. **Conclusion & Interpretation:**
       - **Result: Communication Bound.** Saves 9.9ms per iteration with < 1% relative error on gradients.
