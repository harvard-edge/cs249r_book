title: The Silent Utilization Collapse
scenario: You are serving a 70B parameter LLM on a fleet of H100s. For months, the service was cost-effective, handling long document summarization tasks. To meet latency SLOs, you use a serving system that processes incoming requests in statically-sized batches. The workload recently shifted from long document summarization to short conversational queries.
question: Why did the 70B service become cost-inefficient after shifting from long document summarization to short conversational queries?
details:
  realistic_solution: The root cause is a collapse in arithmetic intensity due to the shift in workload, which turns a compute-bound system into a memory-bound one. The autoregressive decoding phase of LLMs, where tokens are generated one by one, has intrinsically low arithmetic intensity. When serving long documents, the high-AI 'prefill' phase amortized the low-AI decoding phase. With short conversational queries, the workload is now dominated by the memory-bound decoding phase. The static batching system is unable to pack enough requests together to raise the batch dimension ('B') high enough to overcome this. The GPU spends almost all its time waiting for data from HBM (memory-bound), achieving only a fraction of its peak performance, even though it's drawing full power. Since we pay for the GPU-hour, this low utilization translates directly into wasted money.
  common_mistake: |
    **The Pitfall:** Attributing the problem to Python overhead or network latency.
    **The Rationale:** When throughput drops unexpectedly, engineers often suspect software bottlenecks rather than fundamental hardware physics.
    **The Consequence:** Time is wasted micro-optimizing code when the real issue is a collapse in arithmetic intensity due to workload changes.
  napkin_math: |
    1. **H100 Ridge Point:** 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte.
    2. **Decode-phase Arithmetic Intensity (Batch B):** (2 × 70B × B) FLOPs / (140 GB weights) = B FLOPs/Byte.
    3. **With B=1:** AI = 1 FLOP/Byte. GPU utilization = 1 / 295 ≈ 0.34%.
    4. **With B=32:** AI = 32 FLOPs/Byte. GPU utilization = 32 / 295 ≈ 10.8%.
    5. **With B=256:** AI = 256 FLOPs/Byte. GPU utilization ≈ 87%.
    6. **Conclusion: Short queries are dominated by decoding (low AI). With static small batches, the GPU is memory-bound and sits mostly idle, increasing $/token by up to 16x.**
