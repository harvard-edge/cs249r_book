title: The Silent Utilization Collapse
scenario: You are the Principal Engineer for the AI Platform serving a 70B parameter LLM on a fleet of
  H100s. For months, the service was cost-effective, handling long document summarization tasks. To meet
  latency SLOs, you use a serving system that processes incoming requests in statically-sized batches.
details:
  realistic_solution: The root cause is a collapse in arithmetic intensity due to the shift in workload,
    which turns a compute-bound system into a memory-bound one. The autoregressive decoding phase of LLMs,
    where tokens are generated one by one, has intrinsically low arithmetic intensity. When serving long
    documents, the high-AI 'prefill' phase amortized the low-AI decoding phase. With short conversational
    queries, the workload is now dominated by the memory-bound decoding phase. The static batching system
    is unable to pack enough requests together to raise the batch dimension ('B') high enough to overcome
    this. The GPU spends almost all its time waiting for data from HBM (memory-bound), achieving only
    a fraction of its peak performance, even though it's drawing full power. Since we pay for the GPU-hour,
    this low utilization translates directly into wasted money.
  common_mistake: Attributing the problem to 'Python overhead' or 'network latency' between services.
    These are minor effects. The core mistake is failing to connect the change in workload (request pattern)
    to the fundamental physics of the GPU's memory hierarchy and its impact on hardware utilization.
  napkin_math: '**H100 specs:** 989 TFLOPS FP16, 3.35 TB/s bandwidth | Ridge point = 989 TFLOPS / 3.35
    TB/s ≈ 295 Ops/Byte | **Decode-phase arithmetic intensity (batch size B):** | FLOPs per step ≈ 2 ×
    70B × B = 140B × B FLOPs | Data loaded ≈ 140 GB (model weights, read every step) | AI = (140B × B)
    / (140 × 10⁹) = B Ops/Byte | For B=1: AI = 1 Op/Byte → deeply memory-bound (need 295 to be compute-bound)
    | GPU utilization = AI / ridge_point = 1/295 ≈ 0.34% | For B=32: AI = 32 Ops/Byte → still memory-bound,
    but 32/295 ≈ 10.8% utilization | For B=256: AI = 256 Ops/Byte → approaching ridge point, ~87% utilization
    | **Before (long docs):** Prefill phase has AI ≈ seq_len Ops/Byte → compute-bound, high utilization
    | **After (short chat):** Workload dominated by decode with small batches → memory-bound | Cost impact:
    If utilization drops from 80% to 5%, effective $/token increases 16×.'
