title: The Exploding Data Lake Bill
scenario: Your organization's data lake, primarily on S3, has grown to 500 PB of raw and processed data, leading to an astronomical monthly storage bill. Much of this data is historical and accessed infrequently (e.g., for compliance audits, long-tail research, or rare model re-trainings).
question: How would you cut storage costs for a 500 PB S3 data lake while preserving availability for ML workloads and compliance?
details:
  realistic_solution: |
    The strategy revolves around intelligent data tiering, lifecycle management, and optimizing storage formats.
    1. Classify data based on access frequency.
    2. Apply S3 Intelligent-Tiering to unpredictable data.
    3. Use S3 Lifecycle Policies to transition data rarely accessed after 90-180 days to S3 Glacier Deep Archive.
    4. Optimize storage formats using compression and columnar formats (Parquet).
  common_mistake: |
    **The Pitfall:** Suggesting to just delete old data or move everything to Glacier.
    **The Rationale:** Candidates fail to balance cost optimization with data availability and compliance requirements.
    **The Consequence:** Violating compliance laws or incurring massive retrieval costs and latency penalties when data is inevitably needed.
  napkin_math: |
    - S3 Standard: ~$0.023/GB/month | S3 Glacier Deep Archive: ~$0.00099/GB/month
    - Current cost (Standard): $0.023 * 500 * 10^6 GB = $11.5M/month
    - Assuming 70% (350 PB) can move to Deep Archive and 30% (150 PB) stays Standard.
    - Optimized cost: (150 * 10^6 * 0.023) + (350 * 10^6 * 0.00099) = $3.45M + $0.3465M = ~$3.8M/month.
    - **Conclusion: This yields a potential savings of ~$7.7M/month.**
