title: The Exploding Data Lake Bill
scenario: Your organization's data lake, primarily on S3, has grown to 500 PB of raw and processed data.
  The monthly storage bill is astronomical and constantly increasing. Much of this data is historical,
  accessed infrequently (e.g., for compliance audits, long-tail research, or rare model re-trainings).
  As a Principal ML Systems Engineer, you're tasked with drastically reducing this cost without compromising
  data availability for critical ML workloads or compliance. Detail your strategy, including specific
  AWS services and architectural considerations.
details:
  realistic_solution: "The strategy revolves around **intelligent data tiering, lifecycle management,\
    \ and optimizing storage formats**, recognizing that not all data has the same access patterns or\
    \ value over time.\n  1.  **Data Classification & Tagging:** First, classify data based on its access\
    \ frequency, retention requirements (compliance, legal), and business value. Tag S3 objects with metadata\
    \ like `access_frequency` (hot, warm, cold), `retention_policy`, `data_domain`, `owner`.\n  2.  **S3\
    \ Intelligent-Tiering:** This is the first line of defense. Apply S3 Intelligent-Tiering to data that\
    \ has unpredictable or changing access patterns. It automatically moves objects between S3 Standard,\
    \ Standard-IA, and One Zone-IA based on access, optimizing costs without performance impact. This\
    \ is ideal for most active-but-not-hot ML datasets.\n  3.  **S3 Lifecycle Policies:** For data with\
    \ clearly defined access patterns and retention periods:\n    *   **Transition to Infrequent Access\
    \ (IA):** Data frequently accessed initially but rarely after 30-60 days (e.g., raw logs, intermediate\
    \ features) can be transitioned to S3 Standard-IA or One Zone-IA.\n    *   **Transition to Glacier/Deep\
    \ Archive:** Data rarely accessed after 90-180 days (e.g., very old raw logs, archived model artifacts,\
    \ audit trails) should be transitioned to S3 Glacier Flexible Retrieval (for retrievals in minutes\
    \ to hours) or S3 Glacier Deep Archive (for retrievals in hours, lowest cost).\n    *   **Expiration:**\
    \ Implement expiration policies for data that has no long-term value or legal retention requirements\
    \ (e.g., temporary processing outputs, old experiment logs).\n  4.  **Optimize Storage Formats:**\n\
    \    *   **Compression:** Ensure data is compressed (e.g., Snappy, Gzip, Zstd) before storing in S3.\n\
    \    *   **Columnar Formats:** Use columnar formats like Parquet or ORC for analytical data. These\
    \ formats offer better compression and allow for predicate pushdown, reducing data scanned and stored.\n\
    \    *   **Compaction:** For small files, compact them into larger files (e.g., 128MB-1GB) to reduce\
    \ S3 object overhead and improve query performance.\n  5.  **Cost Monitoring & Governance:** Implement\
    \ detailed cost monitoring (AWS Cost Explorer, custom dashboards) broken down by S3 storage class,\
    \ bucket, and tags. Regularly review and enforce data retention policies across teams. Use S3 Storage\
    \ Lens for insights.\n  6.  **Data Archiving Strategy:** For data moved to Glacier/Deep Archive, ensure\
    \ there's a clear process for retrieval, considering the time and cost implications. For critical\
    \ ML retraining, data might need to be rehydrated to S3 Standard for faster access."
  common_mistake: '"Just delete old data" or "Move everything to Glacier." Deleting data can violate compliance
    or hinder future research. Moving everything to Glacier without careful analysis can lead to high
    retrieval costs and latency for necessary access.'
  napkin_math: '- S3 Standard: ~$0.023/GB/month | - S3 Standard-IA: ~$0.0125/GB/month (plus retrieval
    fees) | - S3 Glacier Deep Archive: ~$0.00099/GB/month (plus retrieval fees) | If 70% of 500 PB (350
    PB) can move from S3 Standard to Deep Archive: | Current cost (Standard): $0.023 * 500 PB = $11.5M/month
    | Optimized cost: (0.023 * 150 PB) + (0.00099 * 350 PB) = $3.45M + $0.3465M = ~$3.8M/month. | This
    is a potential savings of ~$7.7M/month. | Retrieval costs for Glacier Deep Archive can be high (e.g.,
    $0.0025/GB for bulk retrieval, taking 12+ hours). Retrieving 100TB would cost $250, but take significant
    time.'
