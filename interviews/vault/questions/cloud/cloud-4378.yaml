title: 'Vendor Lock-In Analysis: TPU v5e vs MI300X vs H100 for a 5-Year Infrastructure Plan'
scenario: 'A large ML platform team must choose a primary accelerator for a 5-year infrastructure commitment. They will train and serve models from 7B to 100B parameters at 1B tokens/day. Candidates: H100/H200 (CUDA ecosystem, wide software support), MI300X (ROCm, AMD), TPU v5e (XLA/JAX only, GCP-locked).'
question: 'Which accelerator should be the primary platform for a 5-year 7B–100B training and serving commitment considering software ecosystem, hardware upgrades, and TCO, and what is your hedge strategy?'
details:
  realistic_solution: 'H100/H200 (CUDA): Ecosystem: 95%+ of open-source ML frameworks support CUDA natively. PyTorch, TensorFlow, JAX all run on CUDA without modification. Software risk: LOW. Upgrade path: H200 (141GB HBM3e, 4.8 TB/s) is backward-compatible. B200 planned. Hardware risk: LOW. Portability: code runs on any NVIDIA GPU from A10 to H200. Lock-in: NVIDIA-only, but CUDA runs on cloud (AWS, GCP, Azure) — cloud portability HIGH. MI300X (ROCm): Ecosystem: ROCm supports most PyTorch ops but with occasional fallbacks to CPU for unsupported kernels. vLLM, DeepSpeed have ROCm ports at ~3-6 month lag from CUDA releases. Software risk: MEDIUM (improving rapidly). Hardware risk: LOW (AMD roadmap: MI400X). Cloud availability: Azure + Oracle, not GCP. TPU v5e (XLA): Ecosystem: JAX-first, PyTorch-XLA requires significant code adaptation. Most HuggingFace models require porting. Software risk: HIGH for non-JAX codebases. Lock-in: GCP-only, no on-prem option. Portability: near-zero without rewrite. Recommendation: Primary H100/H200 (low risk, maximum optionality). Hedge 20% of workload on MI300X (price pressure on NVIDIA, improving ROCm). Avoid TPU as primary unless already JAX-native.'
  common_mistake: |
    **The Pitfall:** Making the decision purely on TFLOPS/dollar or memory bandwidth.
    **The Rationale:** Evaluators ignore that for a 5-year commitment, ecosystem lock-in, software compatibility, and upgrade path risk often dominate pure hardware metrics.
    **The Consequence:** Choosing a cheaper platform that requires 18+ months of engineering effort to port the entire model training stack, negating any cost savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5-year TCO calculation.
    - Equivalent throughput capacity needs: 1000 H100s, 633 MI300Xs, or 5000 TPU v5e chips.

    **Calculations:**
    - H100 cloud TCO: 1000 * $3.50/hr * 8760 * 5 = $153M (Migration: $0).
    - MI300X cloud TCO: 633 * $5.50/hr * 8760 * 5 = $152M (Migration: $2-5M).
    - TPU v5e TCO: 5000 * $1.20/hr * 8760 * 5 = $263M (Migration: $10-20M).

    **Conclusion & Interpretation:**
    - **Result: Total Cost of Ownership (TCO)**. Risk-adjusted TCO heavily favors H100 as primary, with a 20% hedge on MI300X.
