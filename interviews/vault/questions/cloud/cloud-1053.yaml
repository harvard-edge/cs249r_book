title: CUDA Graphs vs Kernel Fusion for LLM Serving
scenario: 'Your team is serving a real-time LLM on a PCIe node at batch size 1 to meet a strict 50ms P99 latency SLA. Profiling reveals the model executes 2,000 distinct kernels per forward pass. The average GPU execution time per kernel is only 2µs, and assume a standard CPU kernel launch overhead of 5µs. The end-to-end latency is missing the SLA. The team is debating two approaches: wrapping the entire forward pass in a CUDA Graph versus investing a month of engineering time to write custom fused Triton kernels for the bottleneck blocks.'
question: "How do you evaluate these two optimization options to hit the 50ms SLA?"
details:
  realistic_solution: CUDA Graphs are the correct immediate solution to eliminate the CPU-bound dispatch bottleneck, but kernel fusion is required to reduce memory bandwidth pressure. You should deploy CUDA Graphs immediately to remove launch overhead, then selectively fuse memory-bound operations to further reduce GPU execution time.
  common_mistake: |
    **The Pitfall:** Believing CUDA Graphs directly accelerate GPU memory access or ALU operations.
    **The Rationale:** Candidates conflate the reduction of CPU launch overhead with actual GPU kernel optimization (like operator fusion).
    **The Consequence:** Teams might skip necessary kernel fusion later, leaving the model heavily memory-bandwidth bound after the initial CPU dispatch bottleneck is removed.
  napkin_math: |
    1. Calculate total CPU dispatch time: 2,000 kernels * 5µs launch overhead = 10ms.
    2. Calculate total GPU execution time: 2,000 kernels * 2µs execution = 4ms.
    3. Since 10ms > 4ms, the execution is entirely CPU-bound; the GPU sits idle waiting for instructions.
    4. CUDA Graphs reduce the 2,000 launches to a single graph launch (~10µs overhead).
    **Inference latency drops from 14ms (10ms + 4ms) to ~4ms, easily meeting the 50ms SLA without writing custom kernels.**
