title: The FP16 Inference Memory Rule
scenario: You're scoping the infrastructure for a new RAG-based chatbot that uses a Llama-3-8B model.
  As a first-pass capacity check before worrying about container orchestration or KV cache, what is the
  absolute minimum memory (RAM or HBM) you must provision on a server just to load the model's weights
  in its standard FP16 precision?
details:
  realistic_solution: 'The standard rule of thumb for loading a model''s weights for inference using 16-bit
    floating-point precision (FP16 or BFloat16) is 2 bytes per parameter. Therefore, for an 8 billion
    parameter model, the calculation is straightforward: 8 billion parameters multiplied by 2 bytes per
    parameter equals 16 billion bytes, or 16 GB. This is the non-negotiable floor for the hardware before
    considering KV cache, activations, or OS overhead.'
  common_mistake: The most common mistake is to confuse the memory requirements for inference with those
    for training. Training requires storing gradients and optimizer states (like Adam), which dramatically
    increases the footprint to ~16 bytes per parameter. Another frequent error is to assume 1 byte per
    parameter, which is only correct for INT8-quantized models, not the standard FP16.
  napkin_math: 8 Billion Parameters × 2 bytes/parameter = 16 GB
  options:
  - 8 GB
  - 128 GB
  - 16 GB
  - 2 GB
  correct_index: 2
