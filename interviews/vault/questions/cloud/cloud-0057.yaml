title: The FP16 Inference Memory Rule
scenario: You're scoping the infrastructure for a new RAG-based chatbot that uses a Llama-3-8B model.
question: What is the minimum RAM or HBM needed just to load Llama-3-8B weights in standard FP16 precision?
details:
  realistic_solution: 'The standard rule of thumb for loading a model''s weights for inference using 16-bit floating-point precision (FP16 or BFloat16) is 2 bytes per parameter. Therefore, for an 8 billion parameter model, the calculation is straightforward: 8 billion parameters multiplied by 2 bytes per parameter equals 16 billion bytes, or 16 GB. This is the non-negotiable floor for the hardware before considering KV cache, activations, or OS overhead.'
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for inference with those for training or 8-bit quantization.
    **The Rationale:** Candidates assume 1 byte per parameter, which is only valid for INT8, or include Adam optimizer states unnecessarily.
    **The Consequence:** Drastically under-provisioning or over-provisioning the server memory needed for standard serving.
  napkin_math: |
    1. Parameter Count: 8 Billion.
    2. Precision: FP16 = 2 bytes per parameter.
    3. **Total: 8 Billion × 2 bytes = 16 GB.**
  options:
  - 8 GB
  - 128 GB
  - 16 GB
  - 2 GB
  correct_index: 2
