title: 'Gradient Synchronization Mastery: Pipeline Parallelism + AllReduce Co-Design'
scenario: You are designing a 1024-H100 training system for a 175B parameter model
  using 3D parallelism (tensor-parallel=8, pipeline-parallel=16, data-parallel=8).
  Each H100 has NVLink (900GB/s) intra-node and 400Gbps IB inter-node. Analyze the
  gradient synchronization requirements for each parallelism dimension and design
  the communication schedule.
question: How would you schedule tensor, pipeline, and data-parallel communication
  for the 1024-H100 3D-parallel 175B training system?
details:
  realistic_solution: 'TP (tensor parallel, 8 GPUs): AllReduce within node for each
    attention/MLP layer. Volume: activation size per layer ≈ batch×seq×d_model = 4×2048×12288×2B
    = 200MB. Time on NVLink: 200MB × 1.75 / 450GB/s = 0.77ms per layer × 96 layers
    = 74ms total TP comm. PP (pipeline, 16 stages): P2P activation passing ≈ 200MB
    per micro-batch forward + backward. Time: 200MB/50GB/s (IB) = 4ms per hop. DP (data parallel, DP=8): 
    Each GPU holds 1/(TP×PP) of the model = 1/128 = 1.37B params (2.74GB gradients). 
    AllReduce 2.74GB over 8 GPUs (1 per node) using 400Gbps IB. Time: 2×(7/8)×2.74GB/50GB/s = 96ms. 
    No compression strictly needed. Total: TP=74ms, PP comms are small but pipeline bubble dominates. 
    Schedule: overlap DP AllReduce with the PP flush phase and next step compute.'
  common_mistake: Applying a single AllReduce across all 1024 GPUs; not recognizing
    that each parallelism dimension has different communication patterns and bandwidth
    requirements. Another mistake is assuming the full 350GB model is all-reduced by each GPU, forgetting that TP and PP shard the model parameters.
  napkin_math: '175B params, BF16: 350GB. Per GPU (TP=8, PP=16) = 2.74GB. DP AllReduce over 8 nodes (400Gbps=50GB/s per GPU): 2×(7/8)×2.74/50 = 96ms uncompressed. TP per layer: 200MB over NVLink 450GB/s with AllReduce (1.75x): 1.75×200/450000=0.78ms × 96 layers=75ms. Schedule: overlap DP AllReduce with PP flush phase.'
