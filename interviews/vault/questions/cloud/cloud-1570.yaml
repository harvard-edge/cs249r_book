title: Optimizing Arithmetic Intensity with Mini-Batching
scenario: 'You are training a dense neural network layer with an input dimension of 4096 and an output
  dimension of 4096 on an NVIDIA A100 GPU (memory bandwidth: 2039 GB/s, peak compute: 312 TFLOPs in FP16).
  The training loop currently processes one sample at a time (batch size = 1), resulting in severe underutilization.
  Calculate the required minimum mini-batch size to transition this layer from being memory-bound to compute-bound.
  Assume FP16 data types and ignore the memory bandwidth cost of activations for simplicity.'
details:
  realistic_solution: Calculate the A100's machine balance (FLOPs/Byte) and find the batch size where
    the arithmetic intensity of the matrix-matrix multiplication exceeds this threshold. A batch size
    of at least 154 (typically rounded to 256) is required.
  common_mistake: Focusing solely on FLOP utilization without analyzing the arithmetic intensity and memory
    bandwidth constraints of the matrix-vector multiplication.
  napkin_math: 'A100 Machine Balance = 312e12 FLOPs / 2039e9 Bytes/s ≈ 153 FLOPs/Byte.

    For batch size B, Weight Memory (FP16) = 4096 * 4096 * 2 bytes = 33.55 MB.

    FLOPs (Forward Pass) = 2 * 4096 * 4096 * B = 33.55M * B FLOPs.

    Arithmetic Intensity ≈ (33.55M * B) / 33.55MB = B FLOPs/Byte.

    To become compute-bound: Arithmetic Intensity > Machine Balance.

    B > 153. A mini-batch size of 256 is recommended to fully utilize the hardware.'
