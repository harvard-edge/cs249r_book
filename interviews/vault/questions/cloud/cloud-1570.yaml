title: Optimizing Arithmetic Intensity with Mini-Batching
scenario: You are training a dense neural network layer with an input dimension of 4096 and an output dimension of 4096 on an NVIDIA A100 GPU. The training loop currently processes one sample at a time (batch size = 1) in FP16, resulting in severe underutilization. Assume we can ignore the memory bandwidth cost of activations for simplicity.
question: What minimum mini-batch size makes the 4096x4096 FP16 layer compute-bound on an A100?
details:
  realistic_solution: Calculate the A100's machine balance (FLOPs/Byte) and find the batch size where the arithmetic intensity of the matrix-matrix multiplication exceeds this threshold. A batch size of at least 154 (typically rounded to 256 for optimal hardware alignment) is required.
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOP utilization without analyzing the arithmetic intensity.
    **The Rationale:** Engineers often try to optimize CUDA kernels for batch size 1 instead of realizing the fundamental limit is memory bandwidth.
    **The Consequence:** Wasted effort on kernel optimization when simply increasing the batch size would shift the operation into the compute-bound regime.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 specs: 312 TFLOPs (FP16), 2039 GB/s memory bandwidth.
       - Layer: 4096 x 4096, FP16 (2 bytes per weight).
    2. **Calculations:**
       - A100 Machine Balance = 312e12 FLOPs / 2039e9 Bytes/s ≈ 153 FLOPs/Byte.
       - Weight Memory = 4096 * 4096 * 2 bytes = 33.55 MB.
       - FLOPs (Forward Pass) for batch size B = 2 * 4096 * 4096 * B = 33.55M * B FLOPs.
       - Arithmetic Intensity ≈ (33.55M * B) / 33.55MB = B FLOPs/Byte.
       - To be compute-bound: Arithmetic Intensity > Machine Balance, so B > 153.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Transition.** A mini-batch size of at least 154 (practically 256 for alignment) is required to saturate the compute units.
