title: Hierarchical Parallelism Placement on NVSwitch
scenario: Training a 175B model on 8x H100 SXM nodes (8 GPUs per node). NVSwitch provides
  900 GB/s bidirectional intra-node bandwidth, while InfiniBand provides 400 Gb/s
  inter-node.
question: Map an 8-way Tensor Parallelism (TP) and 8-way Data Parallelism (DP) strategy
  to the hardware topology to minimize slow inter-node transfers.
visual:
  kind: svg
  path: cloud-4495.svg
  alt: Topology diagram showing dense intra-node connections and sparse inter-node
    connections.
  caption: NVSwitch vs IB Topology
details:
  realistic_solution: Tensor Parallelism requires high-frequency, high-bandwidth AllReduce
    operations (every layer). Therefore, the 8-way TP must be mapped strictly within
    the 8 GPUs of a single node connected via NVSwitch. Data Parallelism requires
    AllReduce only on gradients at the end of the backward pass; it is mapped across
    the 8 distinct nodes over InfiniBand.
  common_mistake: Placing TP across nodes, which instantly bottlenecks the layer-by-layer
    forward and backward passes on the slow InfiniBand link.
  napkin_math: 8 TP x 1 node = 8 GPUs per node
