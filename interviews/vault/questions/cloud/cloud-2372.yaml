title: PFC Deadlock Recovery Latency Tradeoff
scenario: Your RoCEv2 network experiences cyclic buffer dependencies resulting in PFC deadlocks during intensive All-to-All communication. The switches support a deadlock recovery mechanism that drops packets after a timeout, allowing the network to unfreeze. You must configure the PFC deadlock timeout interval. The options are 100 microseconds or 50 milliseconds.
question: How should you choose between 100us and 50ms PFC deadlock timeouts, and what are the performance and stability tradeoffs?
details:
  realistic_solution: |
    Priority Flow Control (PFC) pauses traffic to prevent buffer overflow, but complex routing can create a cycle of paused switches (a deadlock). Deadlock recovery breaks the cycle by ignoring the pause frame and intentionally dropping packets, relying on RoCEv2's Go-Back-N or Selective Repeat to recover. If the timeout is set to 100 microseconds: The network recovers from true deadlocks almost instantly. However, during normal heavy microbursts, a port might legitimately be paused for 200us while downstream buffers drain. A 100us timeout will falsely identify this as a deadlock and drop packets. Dropped packets force RDMA connections into expensive timeout-and-retransmit cycles, severely degrading throughput. If the timeout is set to 50 milliseconds: False positives are completely eliminated; normal congestion will safely resolve via PFC. However, if a *true* deadlock occurs, the involved switches completely freeze for 50ms. In high-performance ML, a 50ms pause on 400 Gbps links wastes immense bandwidth and stalls the entire synchronized training step. The Tradeoff is between aggressive recovery (causing spurious packet loss and retransmission overhead) versus conservative recovery (causing massive tail latency spikes). Typically, cloud ML networks tune this to an intermediate value (e.g., 2-5ms) based on the maximum theoretically possible drain time.
  common_mistake: |
    **The Pitfall:** Automatically setting the timeout to the lowest threshold (100us) assuming it provides the fastest possible recovery.
    **The Rationale:** Novice operators falsely equate "faster timeouts" with "higher performance," ignoring the mechanics of RoCEv2 and normal port queuing microbursts.
    **The Consequence:** Spurious packet drops are constantly triggered during standard congestion spikes, plunging the entire network into catastrophic, continuous TCP-like retransmission storms that wreck training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 400 Gbps network bandwidth per link.
       - Choices: 100us (aggressive) or 50ms (conservative).
    2. **Calculations:**
       - Bandwidth Conversion: 400 Gbps = 50 GB/s.
       - 50ms Penalty: A 50ms freeze wastes 50 GB/s * 0.05s = 2.5 GB of transfer opportunity.
       - Relative Slowdown: If an All-to-All step normally takes 10ms, a 50ms pause adds 500% overhead.
    3. **Conclusion & Interpretation:**
       - **Result: 50ms timeout strictly bounds throughput in latency-sensitive ML flows via Buffer-Stall-Bound pauses.**
