title: Scaling Randomized Smoothing Certification
scenario: You are deploying an ML-based transaction fraud detection service on AWS EC2 (p4d.24xlarge,
  8x A100 40GB) to process high-value financial transfers. You must implement randomized smoothing to
  provide certified robustness against L2-norm adversarial perturbations (radius R=0.5). Your base ResNet-50-equivalent
  model has an unbatched inference latency of 15ms. To achieve the required 99.9% certification confidence
  bound, the smoothing algorithm demands N=10,000 Gaussian-perturbed inferences per request. Evaluate
  the architectural trade-offs between system throughput, latency, and robustness guarantees, and justify
  a deployment strategy to meet a strict synchronous SLA of 250ms P99 latency.
question: "How should you serve N=10,000 randomized-smoothing inferences under a 250ms P99 synchronous SLA?"
details:
  realistic_solution: Implement aggressive dynamic batching and leverage the massive parallel capacity
    of the 8x A100s. A single request's 10,000 samples can be split into large batches (e.g., batch size
    1024 or 2048) distributed across the GPUs. Alternatively, decouple the base prediction (served immediately)
    from the robustness certification (computed asynchronously).
  common_mistake: Candidates often assume certified robustness is purely a training-time mathematical
    proof and fail to account for the massive 10,000x inference multiplier required at runtime, leading
    to proposed solutions that catastrophically violate the 250ms latency SLA.
  napkin_math: 'Naive sequential execution: 15ms * 10,000 = 150 seconds (fails SLA). With 8x A100s, we
    can process 8 concurrent batches. If we use a batch size of 1250 per GPU, we process all 10,000 samples
    in 1 step. Assuming ResNet-50 batch=1250 takes ~150ms on an A100, the total latency is 150ms + network/framework
    overhead (~20ms) = 170ms, safely under the 250ms SLA.'
