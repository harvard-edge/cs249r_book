title: Diagnosing PCIe Host-to-Device Bottlenecks
scenario: You are fine-tuning a recommendation system with massive embedding tables residing in host CPU
  memory. In each training step, 8 GB of sparse embedding vectors must be fetched from host memory to
  a single H100 GPU over a PCIe Gen5 x16 interconnect. Your target total step time is 100ms. However,
  profiling reveals the GPU is constantly stalled waiting for data, and you cannot achieve the target
  step time even when completely commenting out the forward and backward passes. Analyze why the target
  step time is impossible to achieve on this hardware configuration.
details:
  realistic_solution: Recognize that PCIe Gen5 x16 provides 64 GB/s of unidirectional bandwidth (host-to-device).
    Transferring 8 GB takes at least 125ms, making a 100ms step time physically impossible. The solution
    requires reducing transfer volume by caching hot embeddings on the HBM, increasing the batch size
    to hide latency, or partitioning the embedding table across multiple GPUs.
  common_mistake: Candidates often confuse bidirectional and unidirectional bandwidth, assuming PCIe Gen5
    x16 provides 128 GB/s for host-to-device transfers. This leads them to calculate a 62.5ms transfer
    time and incorrectly blame software overhead, driver issues, or CPU memory speeds instead of the physical
    interconnect.
  napkin_math: Unidirectional PCIe Gen5 x16 BW = 64 GB/s. Minimum transfer time = 8 GB / 64 GB/s = 0.125
    seconds = 125ms. 125ms (transfer) > 100ms (target step time).
