title: AMD MI300X Accelerator Selection for Large Language Model Inference
scenario: Your team is tasked with deploying a new large language model (LLM) for real-time inference, which requires extremely low latency and high throughput. You are considering various accelerator options, and the AMD MI300X has been proposed as a primary candidate.
question: How would you design an MI300X-based LLM inference architecture and justify it against GPUs, TPUs, and custom ASICs?
details:
  realistic_solution: A realistic solution would involve a detailed breakdown of the LLM's memory footprint (model weights, activations, key-value cache), estimated computational requirements for a given batch size and sequence length, and a comparative analysis of the MI300X's specifications against those of competing hardware. This should include discussing the benefits of the MI300X's 192 GB HBM3 for large models that don't fit on typical GPUs, its high memory bandwidth for efficient data movement, and the potential for sparse computation. Furthermore, the solution should address the software ecosystem (ROCm vs. CUDA, compilers, inference engines) and the effort required for optimization, especially when integrating with existing cloud infrastructure.
  common_mistake: |
    **The Pitfall:** Overemphasizing raw TFLOPS.
    **The Rationale:** Peak compute numbers are highly marketed and easy to compare.
    **The Consequence:** Failing to analyze the trade-offs between memory capacity, bandwidth, and compute often leads to HBM capacity/bandwidth bottlenecks or underestimating the software stack integration complexity for LLM inference.
  napkin_math: |
    - If an LLM has 100B parameters (FP16), it requires 200GB of memory. The MI300X's 192GB HBM3 is nearly sufficient for a single instance.
    - If an inference operation involves 100 TFLOPs of FP16 computation, and the MI300X offers 1300 TFLOPs, the theoretical peak throughput is 13 inferences/sec.
    - Memory bandwidth is crucial: loading 200GB of weights at 5.3 TB/s yields ~26 inferences/sec theoretically.
    - **The bottleneck often shifts between compute and memory bandwidth depending on the model and batch size.**
