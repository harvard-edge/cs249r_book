title: Dynamic Voltage and Frequency Scaling for H100 Training Efficiency
scenario: 'You are designing a power-aware training scheduler for a 256-node H100
  cluster operating under a 25 MW facility power budget. The cluster''s measured power
  draw follows a bimodal distribution: 700W/GPU during GEMM-heavy forward/backward
  passes and 450W/GPU during all-reduce communication phases. Each training job uses
  4-way tensor parallelism and 16-way pipeline parallelism. Design a cluster-level
  DVFS (Dynamic Voltage and Frequency Scaling) policy that exploits the communication-compute
  overlap to smooth power consumption and maximize GPUs under budget.'
question: What cluster-level DVFS policy would smooth H100 training power under the
  25 MW budget while exploiting GEMM and all-reduce phase differences?
details:
  realistic_solution: 'Design a two-level policy: (1) Cluster scheduler annotates jobs with topology metadata (TP degree, PP stages, AllReduce frequency). (2) Power controller subscribes to NCCL collective events and preemptively shifts power caps. During communication phases where compute is idle, the GPU does not need 700W; capping it at 450W reclaims 250W. Policy target: smooth the cluster power to a constant 600W average by staggering job phases or applying strict node-level power caps during AllReduce. This allows oversubscribing the facility budget based on average power rather than peak power.'
  common_mistake: 'Treating DVFS as a per-GPU control loop rather than a cluster-level policy. Individual GPU DVFS reacts too slowly (10-100ms) to catch AllReduce windows (often 5-50ms). The scheduler must operate at the job level, using job topology information to predict AllReduce phases and coordinate caps.'
  napkin_math: '256 nodes × 8 GPUs = 2,048 GPUs. Compute phase: 2,048 × 700W = 1,434 kW. Comm phase: 2,048 × 450W = 921 kW. Average if 60% compute / 40% comm: 0.6×700 + 0.4×450 = 420 + 180 = 600W. 25 MW facility budget → provisioning by peak (700W): 25,000,000 / 700 = 35,714 GPUs. Provisioning by average (600W) with proactive power smoothing: 25,000,000 / 600 = 41,666 GPUs. DVFS scheduling enables safely deploying ~5,950 more GPUs under the same 25 MW budget.'
