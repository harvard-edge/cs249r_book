title: 'KV-Cache: Specification — Define KV Cache SLAs for Production LLM API'
scenario: A production LLM API serves a 7B model (32 layers, GQA-8, 128 head dim) on H100s. The API guarantees support for 4K context requests. You need to provision the hardware for 500 concurrent users.
question: What KV-cache size per token and per 4K-context request should the production 7B API budget to meet these requirements?
details:
  realistic_solution: KV cache per token for 32-layer GQA-8 model = 128KB. At 4K context, each request occupies 512MB of KV cache.
  common_mistake: |
    **The Pitfall:** Specifying requirements without calculating cache limits.
    **The Rationale:** Candidates list generic policies like "use LRU" without doing the math to realize that 500 users at 4K context demands a massive 256 GB of pure KV cache VRAM.
    **The Consequence:** The deployed system crashes under OOMs the moment concurrent users reach peak load.
  napkin_math: |
    *   **KV per token:** 2 (K+V) × 8 heads × 128 dim × 2 bytes × 32 layers = 131,072 bytes (128 KB).
    *   **KV cache per request:** 128 KB × 4,096 tokens = 512 MB.
    *   **Total KV cache for 500 users:** 500 × 512 MB = 256 GB.
    *   **Result:** Since 256 GB exceeds a single H100's capacity, multiple GPUs or strict eviction policies are required.
