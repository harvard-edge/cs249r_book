title: Progressive Rollout of a Large Language Model on Google TPU v5e
scenario: You are leading the deployment of a new, significantly improved Large Language Model (LLM) targeting TPU v5e instances for inference. This LLM processes critical user queries and must maintain extremely high availability and low latency. Your team needs to replace the existing production LLM without any user-perceivable downtime or performance degradation.
question: How would you design a progressive rollout strategy—incorporating shadow, canary, traffic splitting, and automated rollbacks—optimized for TPU v5e constraints?
details:
  realistic_solution: 'A multi-stage progressive rollout strategy: 1. Shadow Deployment: mirror a small percentage of production traffic to separate TPUs without affecting user responses. 2. Canary Release: route 1-5% of live traffic to the new LLM, monitoring latency, TPU resource utilization, and error rates with automated alerts. 3. Traffic Splitting: Gradually increase traffic (10%, 25%, 50%, 100%). 4. Leveraging TPU v5e: Monitor HBM utilization (16 GB per TPU) to prevent out-of-memory errors for large models or batch sizes, and observe memory bandwidth (819 GB/s). 5. Automated Rollback: Define strict thresholds that automatically trigger a revert.'
  common_mistake: |
    **The Pitfall:** Performing a "big-bang" deployment or ignoring TPU-specific memory limitations.
    **The Rationale:** Teams accustomed to stateless microservices often assume simple traffic shifting is enough, without realizing LLMs have rigid HBM limits and warmup times.
    **The Consequence:** The new model crashes on rollout due to OOM errors under production batch sizes, leading to immediate user-visible outages.
  napkin_math: |
    1. Establish baseline: Existing LLM handles 10,000 QPS at 50ms latency.
    2. Evaluate capacity: A 7B model (~14GB in BF16) fits in the 16 GB HBM of a single TPU v5e.
    3. Calculate throughput: Assuming batch size 16 in 50ms (0.05s) yields 16 / 0.05 = 320 inferences per second per TPU.
    4. Calculate canary resources (1%): 100 QPS requires Ceiling(100 / 320) = **1 TPU v5e**.
    5. Calculate full rollout resources (100%): 10,000 QPS requires Ceiling(10,000 / 320) = **32 TPU v5e instances**.
