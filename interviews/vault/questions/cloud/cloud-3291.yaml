title: 'LLM Training on AMD MI300X: Memory Pressure Management'
scenario: You are tasked with training a 100B parameter LLM on a cluster equipped with MI300X accelerators (192 GB HBM3 each). During initial runs, you encounter OOM errors even with a modest global batch size.
question: How would you diagnose and mitigate OOMs on MI300X training runs, including fragmentation, gradient accumulation, and OS-level eviction effects?
details:
  realistic_solution: 'Utilize ROCm profilers to pinpoint fragmentation. The 100B weights alone exceed a single GPU, so model parallelism (TP or Pipeline) or ZeRO sharding is mandatory. Implement gradient accumulation and mixed-precision (FP16/BF16) to reduce pressure.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on reducing the batch size.
    **The Rationale:** Candidates overlook that base model weights can exceed VRAM before activations are even considered.
    **The Consequence:** Suboptimal resource utilization or abandoning a feasible training architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 100B parameters.
       - MI300X HBM3 = 192 GB.
    2. **Calculations:**
       - Weight memory (FP16) = 100B * 2 bytes = 200 GB.
       - 200 GB > 192 GB capacity.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound (Model weights alone guarantee OOM without sharding).**
