title: 'LLM Training on AMD MI300X: Memory Pressure Management'
scenario: You are tasked with training a multi-billion parameter Large Language Model (LLM) on a cluster equipped with AMD MI300X accelerators. Each MI300X features 192 GB HBM3 memory. During initial training runs, you frequently encounter Out-Of-Memory (OOM) errors even when using a seemingly modest global batch size. You must diagnose these issues and formulate a strategy to mitigate them.
question: How would you diagnose and mitigate OOMs on MI300X training runs, including fragmentation, gradient accumulation, and OS-level eviction effects?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1) Utilize profiling tools (e.g., ROCm profilers, custom memory allocators) to identify exact memory consumption at different stages and pinpoint fragmentation issues. 2) Implement gradient accumulation to achieve a larger effective batch size while keeping individual micro-batches within the 192 GB HBM3 limits. 3) Employ mixed-precision training (FP16/BF16) to halve the memory footprint of weights, activations, and gradients. 4) Consider custom memory allocation strategies or adjust system-level memory configurations (e.g., huge pages, memory cgroups) to minimize OS-level interference or eviction for critical tensors on the MI300X.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on reducing the batch size or immediately resorting to model parallelism.
    **The Rationale:** Candidates often overlook deeper analysis of memory usage patterns, fragmentation overheads, or mixed-precision optimizations tailored to the architecture.
    **The Consequence:** Suboptimal resource utilization and potentially abandoning a feasible training strategy.
  napkin_math: |
    - 1. Calculate weight memory: 100B parameters * 2 bytes/param (FP16) = 200 GB.
    - 2. Compare to capacity: 200 GB > 192 GB (MI300X HBM3 capacity).
    - 3. Conclusion: **The model weights alone exceed a single GPU's memory, necessitating model parallelism or sharding before considering activations or optimizer states.**
