title: The Static Batching Penalty
scenario: An LLM inference service uses static batching to serve a 7B parameter model. The static batching
  configuration has a timeout of 100ms and a batch size of 8. A user sends a single request to an idle
  server. Explain the minimum time the user must wait for the *first* token, considering only the delay
  introduced by the batching strategy itself.
details:
  realistic_solution: The minimum wait time is determined by the static batching timeout. When a single
    request arrives, the server doesn't have a full batch (1 of 8). It will therefore wait, hoping more
    requests arrive to fill the batch. If no other requests come, it will wait for the entire 100ms timeout
    period before dispatching the incomplete batch to the GPU. Therefore, the batching strategy itself
    introduces a minimum of 100ms of latency before the model even begins processing the request (prefill).
  common_mistake: Engineers often forget the 'timeout' component of static batching. They might assume
    that if a batch isn't full, the request waits indefinitely, or conversely, that a single request is
    processed immediately. They might also incorrectly calculate the per-token processing time instead
    of identifying the queueing delay, which is the dominant factor for TTFT in this scenario.
  napkin_math: 1. Request arrives at T=0 into an empty queue.
  options:
  - 0ms, because the server is idle and can process the request immediately.
  - ~5ms, the approximate time to generate a single token on an H100.
  - 100ms, because the server waits for the batching timeout to expire.
  - 800ms, calculated by multiplying the batch size by the timeout.
  correct_index: 2
