title: The Static Batching Penalty
scenario: An LLM inference service uses static batching to serve a 7B parameter model. The static batching configuration has a timeout of 100ms and a batch size of 8. A user sends a single request to an idle server.
question: What minimum TTFT delay does static batching add for a single request to an idle server with batch size 8 and a 100ms timeout?
details:
  realistic_solution: The minimum wait time is determined by the static batching timeout. When a single request arrives, the server doesn't have a full batch (1 of 8). It will therefore wait, hoping more requests arrive to fill the batch. If no other requests come, it will wait for the entire 100ms timeout period before dispatching the incomplete batch to the GPU. Therefore, the batching strategy itself introduces a minimum of 100ms of latency before the model even begins processing the request (prefill).
  common_mistake: |
    **The Pitfall:** Forgetting the timeout component of static batching.
    **The Rationale:** Candidates might assume that if a batch isn't full, the request waits indefinitely, or conversely, that a single request is processed immediately.
    **The Consequence:** Inaccurate latency expectations and misunderstanding of queueing delays, which dominate Time-to-First-Token in this scenario.
  napkin_math: |
    1. Request arrives at T=0 into an empty queue.
    2. Server waits for batch to fill up to size 8.
    3. No other requests arrive.
    4. Server waits until the 100ms timeout expires before processing the incomplete batch.
    **The batching strategy introduces a strict 100ms minimum queueing delay.**
  options:
  - 0ms, because the server is idle and can process the request immediately.
  - ~5ms, the approximate time to generate a single token.
  - 100ms, because the server waits for the batching timeout to expire.
  - 800ms, calculated by multiplying the batch size by the timeout.
  correct_index: 2
