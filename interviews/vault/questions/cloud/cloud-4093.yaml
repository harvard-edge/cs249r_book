title: 'TP Bubble: Synchronization Overhead in Practice'
scenario: Your TP=8 training job on H100 nodes shows 72% MFU (Model FLOP Utilization). Profiling reveals that AllReduce operations account for 15% of step time.
question: What two concrete strategies would you use to reduce the 15% TP AllReduce overhead without changing TP=8?
details:
  realistic_solution: 'Strategy 1: Overlap communication with computation using CUDA streams. While AllReduce runs for one sub-layer, the independent Dropout/LayerNorm of the next sub-layer can execute concurrently (Megatron-LM async TP). Strategy 2: Use FP8 for TP communication (available on H100 Transformer Engine). AllReduce message size drops by 2x vs BF16, halving communication time. The combined effect pushes MFU from 72% to ~78-80%.'
  common_mistake: |
    **The Pitfall:** Blindly reducing the Tensor Parallel (TP) degree to minimize AllReduce overhead.
    **The Rationale:** Assuming TP degree is completely flexible and the simplest way to reduce communication.
    **The Consequence:** Immediate Out-Of-Memory (OOM) errors during training because reducing TP drastically increases the per-GPU memory burden for activations and weights.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current MFU: 72%.
       - AllReduce Overhead: 15% of step time.
    2. **Calculations:**
       - FP8 Comms Strategy: Halving message size (FP16 -> FP8) drops comm time to ~7.5%.
       - CUDA Stream Overlap Strategy: Recovers ~3% by overlapping independent ops.
       - Net Communication Overhead: ~4.5% to 6%.
       - MFU Improvement: 72% * (1 + 0.09) ≈ 78.5% MFU.
    3. **Conclusion & Interpretation:**
       - **Result: ~78.5% MFU Achieved.** Using FP8 communication and asynchronous overlap recovers the majority of the AllReduce penalty without altering the TP=8 requirement.
