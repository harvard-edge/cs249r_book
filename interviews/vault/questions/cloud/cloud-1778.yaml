title: RDMA vs TCP/IP Kernel Overhead Calculation
scenario: You are building a distributed parameter synchronization layer for a 10B parameter model (FP32, 40GB). You have a 400Gbps network with an MTU of 1500 bytes. Your legacy TCP/IP stack introduces 50µs of kernel processing overhead per packet, while an RDMA (RoCEv2) setup reduces this to 2µs per packet by bypassing the OS. Standard TCP sliding windows require 1 ACK for every 10 data packets.
question: How much CPU processing time is saved by using RDMA instead of TCP/IP to transfer the 40 GB FP32 gradient tensor?
details:
  realistic_solution: First find the total number of packets required for 40GB, add the ACK packets, and multiply by the per-packet CPU overhead savings (48µs) to find the total time saved.
  common_mistake: |
    **The Pitfall:** Calculating theoretical bandwidth limits but completely ignoring the per-packet kernel processing overhead.
    **The Rationale:** Candidates often focus purely on the network link speed (400Gbps) and forget that CPU overhead per packet becomes the bottleneck at small MTU sizes.
    **The Consequence:** Completely missing the value proposition of RDMA, which is host CPU offloading, not just line rate.
  napkin_math: |
    1. **Data Size:** 40 GB = 40e9 bytes.
    2. **Data Packets:** 40e9 / 1500 = 26.67 million packets.
    3. **ACK Packets:** 26.67M / 10 = 2.67 million packets.
    4. **Total Packets:** 26.67M + 2.67M = 29.34 million packets.
    5. **Time Saved per Packet:** 50µs - 2µs = 48µs.
    6. **Total CPU Time Saved:** 29.34e6 × 48e-6 = **1,408 seconds (~23.5 minutes)** per sync step.
