title: Distributed Sensor Fusion over LoRaWAN
scenario: 1,000 agricultural soil sensors (Cortex-M0+, 32KB SRAM) must transmit data to a global irrigation model. LoRaWAN payload is max 51 bytes per message, duty cycle allows 1 message/hour. The cloud needs 1-minute resolution soil moisture data (16-bit float).
question: How would you split 1-minute soil moisture processing between the Cortex-M0+ sensors and cloud within the 51-byte LoRaWAN limit?
details:
  realistic_solution: |
    Shift compute to the edge. The MCU samples every minute, but runs a local statistical aggregation or a tiny decision tree (1KB model) to extract features (mean, variance, trend slope) over the hour. The sensor sends a highly compressed 10-byte feature vector to the cloud gateway, which aggregates all 1000 nodes for the global model.
  common_mistake: |
    **The Pitfall:** Attempting to buffer 60 minutes of raw 16-bit data and send it over LoRaWAN.
    **The Rationale:** 60 samples of 16-bit floats exceed the hard transmission limits of the protocol.
    **The Consequence:** Messages fail to transmit, causing complete data loss for the hour.
  napkin_math: |
    - **Raw Data Required:** 60 samples * 2 bytes = 120 bytes.
    - **Constraint:** 120 bytes > 51-byte LoRaWAN limit.
    - **Edge Feature Extraction:** Mean (2B), Variance (2B), Min (2B), Max (2B), Trend slope (2B) = 10 bytes total.
    - **Conclusion: 10B < 51B limit, enabling reliable hourly transmission.**
