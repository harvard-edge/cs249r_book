title: Calculating Latency Overhead of PyTorch Graph Breaks
scenario: Your team is optimizing a recommendation model on an NVIDIA A100 GPU using PyTorch 2.0 `torch.compile`. Pure eager mode takes 20ms per batch. A fully compiled graph without breaks takes 10ms. Developers added a data-dependent `if x.max() > threshold:` check and some dynamic logging, resulting in 3 graph breaks per forward pass. The execution is now split into 4 compiled fragments taking 11ms total, plus 3 eager fallback operations taking 2ms total.
question: "With 3 graph breaks adding 3ms each, what is the new batch latency and how does it compare to the 20ms eager baseline?"
details:
  realistic_solution: 'Calculate total latency including the context switch penalty: 22ms total. The model is now slower than eager mode. Fix by removing data-dependent control flow, using `torch.cond`, or enforcing `torch.compile(fullgraph=True)`.'
  common_mistake: |
    **The Pitfall:** Assuming that partially compiled code will always be faster than pure eager execution.
    **The Rationale:** Developers often focus on the speedup of compiled fragments without accounting for the fixed C++/Python context switch overhead.
    **The Consequence:** Introducing graph breaks via dynamic logging or control flow that ultimately makes the model slower than not compiling at all.
  napkin_math: |
    1. Compiled fragments = 11ms.
    2. Eager fallbacks = 2ms.
    3. Graph break overhead = 3 breaks * 3ms/break = 9ms.
    4. Total Latency = 11 + 2 + 9 = 22ms.
    5. **The compiled model with breaks (22ms) is actually 10% (2ms) slower than the pure eager baseline (20ms).**
