title: Transformer FFN FLOPs Calculation
scenario: You are implementing a large Transformer feed-forward network (FFN) layer utilizing dense matrix
  multiplication. The layer takes an input activation matrix of size [Batch=2048, Hidden=8192] and multiplies
  it with a weight matrix of size [Hidden=8192, Intermediate=32768]. Calculate the total number of floating-point
  operations (FLOPs) required for this forward pass, and estimate the theoretical minimum execution time
  on a single NVIDIA A100 GPU, assuming 100% utilization of its 312 TFLOPS FP16 peak compute.
details:
  realistic_solution: 'Use the standard dense matrix multiplication FLOPs formula: 2 * M * N * K. Calculate
    the total operations and divide by the hardware''s peak throughput to find the absolute minimum latency
    bound.'
  common_mistake: Forgetting the factor of 2 for multiply-accumulate (MAC) operations, which leads to
    calculating exactly half of the actual required FLOPs.
  napkin_math: For the first linear layer in the FFN (M=2048, N=32768, K=8192), total FLOPs = 2 * M *
    N * K. Compute = 2 * 2048 * 32768 * 8192 = 1,099,511,627,776 FLOPs (~1.10 TFLOPs). On an NVIDIA A100
    delivering 312 TFLOPS of peak FP16 compute, the theoretical minimum execution time is 1.10 TFLOPs
    / 312 TFLOPS = 0.00352 seconds, or 3.52 ms. Actual time will be slightly higher due to memory and
    scheduling overhead.
