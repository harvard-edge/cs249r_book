title: Transformer FFN FLOPs Calculation
scenario: You are implementing a large Transformer feed-forward network (FFN) layer utilizing dense matrix multiplication. The layer takes an input activation matrix of size [Batch=2048, Hidden=8192] and multiplies it with a weight matrix of size [Hidden=8192, Intermediate=32768].
question: How many FLOPs does the [2048,8192] x [8192,32768] FFN forward pass require, and what is its FP16 lower-bound latency?
details:
  realistic_solution: "Use the standard dense matrix multiplication FLOPs formula: 2 * M * N * K (the factor of 2 accounts for the multiply-accumulate operations). Calculate the total operations and divide by the hardware's peak throughput to find the absolute minimum latency bound."
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for multiply-accumulate (MAC) operations.
    **The Rationale:** Candidates often just multiply the dimensions together, counting only the multiplications or the additions, rather than both.
    **The Consequence:** Calculating exactly half of the actual required FLOPs, leading to an overly optimistic latency estimate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dimensions: M=2048, N=32768, K=8192.
       - Peak compute: 312 TFLOPS.
    2. **Calculations:**
       - Total FLOPs = 2 * M * N * K = 2 * 2048 * 32768 * 8192 = ~1.10 TFLOPs.
       - Min execution time = 1.10 TFLOPs / 312 TFLOPS = 0.00352 seconds (3.52ms).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The theoretical minimum execution time is 3.52 ms.
