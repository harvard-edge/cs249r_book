title: The Quantization Memory Dividend
scenario: 'A large language model is stored in FP16 format. To reduce its memory footprint for inference, you are considering quantizing the model weights to INT8.'
question: 'After quantizing FP16 model weights to INT8 for inference, what is the approximate reduction factor in memory usage?'
details:
  realistic_solution: 'The reduction factor is exactly 2x. FP16 (half-precision floating-point) uses 16 bits, or 2 bytes, to store each parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte. By changing the data type from FP16 to INT8, you halve the storage requirement for each parameter.'
  common_mistake: |
    **The Pitfall:** Confusing memory reduction ratios between different formats.
    **The Rationale:** Engineers mistake the FP16-to-INT8 reduction with the FP32-to-INT8 reduction.
    **The Consequence:** Underestimating or overestimating the memory savings when planning infrastructure requirements.
  napkin_math: |
    * FP16 memory: 16 bits = 2 bytes per parameter.
    * INT8 memory: 8 bits = 1 byte per parameter.
    * Reduction Factor = 2 bytes / 1 byte.
    * **Result: 2x memory reduction.**
  options:
  - ~4x reduction
  - ~1.5x reduction
  - ~2x reduction
  - ~8x reduction
  correct_index: 2
