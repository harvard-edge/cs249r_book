title: Dynamic Loop Compilation Latency
scenario: You are deploying a custom auto-regressive fraud detection model using PyTorch. The model processes variable-length sequences using a `while` loop, halting early if fraud is detected. On average, the loop halts after 20 steps, but inputs are padded to a max sequence length of 150. Each iteration takes 1.5ms. An engineer uses `torch.jit.trace` with the padded input to compile the model.
question: What is the average latency difference between the traced max-length model and a scripted model that preserves early exits?
details:
  realistic_solution: Use `torch.jit.script` to statically analyze the source code AST. This preserves the dynamic `while` loop and early exit logic in the compiled intermediate representation, preventing wasteful computation.
  common_mistake: |
    **The Pitfall:** Assuming `torch.jit.trace` captures dynamic control flow like if/else and while loops.
    **The Rationale:** Engineers think "tracing" records the logic of the code, rather than just the static execution path of a specific tensor size.
    **The Consequence:** The compiled model completely unrolls loops and ignores early exits, leading to massive, wasteful computation and ruined latency SLAs in production.
  napkin_math: |
    1. **Traced Latency:** `torch.jit.trace` unrolls the loop statically based on input size. 150 iterations * 1.5ms = 225ms.
    2. **Scripted Latency:** `torch.jit.script` preserves dynamic control flow. 20 iterations (average) * 1.5ms = 30ms.
    3. **Difference:** 225ms - 30ms = **195ms**. Graph scripting saves 195ms per inference on average.
