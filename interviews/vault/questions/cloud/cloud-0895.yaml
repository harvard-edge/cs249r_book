title: LLM Decoding Throughput on A100
scenario: You are serving a 7B parameter Transformer model in FP16 on a single GPU with 2.0 TB/s memory bandwidth and 312 TFLOPS compute. At batch size 1, token generation latency is around 7ms per token. A colleague suggests migrating to a newer GPU that doubles the compute (624 TFLOPS) but retains the exact same 2.0 TB/s memory bandwidth.
question: What speedup should you expect from doubling TFLOPS but keeping 2.0 TB/s bandwidth for batch-1 7B decoding, and why?
details:
  realistic_solution: The expected speedup is ~0%. At batch size 1, generating a token requires reading all 14GB of model weights from HBM to SRAM. This takes 14GB / 2TB/s = 7ms. The actual computation is minimal, so the workload is strictly a 'bandwidth hog'. Upgrading compute without increasing bandwidth provides zero benefit here.
  common_mistake: |
    **The Pitfall:** Assuming doubling the FLOPs halves the latency.
    **The Rationale:** Candidates ignore the arithmetic intensity and roofline model constraints for autoregressive decoding.
    **The Consequence:** Wasting budget migrating to expensive compute-optimized GPUs for a memory-bound workload, yielding zero performance gain.
  napkin_math: |
    1. Model weights size = 7B parameters × 2 bytes (FP16) = 14 GB.
    2. Memory Load Time = 14 GB / 2.0 TB/s = 0.007 seconds (7 ms).
    3. Compute required = 2 × 7B = 14 GFLOPs.
    4. Compute Time on baseline (312 TFLOPS) = 14 GFLOPs / 312,000 GFLOPs/s ≈ 0.045 ms.
    5. Total Time ≈ max(7 ms, 0.045 ms) = 7 ms.
    6. Upgrading compute to 624 TFLOPS reduces compute time to 0.022 ms.
    7. **The memory load time remains 7 ms. Doubling TFLOPS provides 0% speedup because the workload is strictly memory-bandwidth bound.**
