title: LLM Decoding Throughput on A100
scenario: You are serving a 7B parameter Transformer model in FP16 on a single NVIDIA A100 80GB SXM GPU
  (2.0 TB/s memory bandwidth, 312 TFLOPs BF16 compute). At batch size 1, token generation latency is around
  7ms per token. A colleague suggests migrating to a newer compute-optimized GPU that doubles the TFLOPs
  (624 TFLOPs) but retains the exact same 2.0 TB/s memory bandwidth. Calculate the expected speedup for
  batch size 1 generation and explain why this workload behaves this way.
details:
  realistic_solution: The expected speedup is ~0%. At batch size 1, generating a token requires reading
    all 14GB of model weights from HBM to SRAM. This takes 14GB / 2TB/s = 7ms. The actual computation
    is minimal, so the workload is strictly a 'bandwidth hog'. Upgrading compute without increasing bandwidth
    provides zero benefit here.
  common_mistake: Assuming that doubling the FLOPs will halve the latency, ignoring the arithmetic intensity
    and the roofline model constraints for autoregressive decoding.
  napkin_math: Weights = 7B * 2B = 14 GB. Memory Load Time = 14 GB / 2000 GB/s = 0.007s (7 ms). Compute
    = 2 * 7B = 14 GFLOPs. Compute Time = 14 GFLOPs / 312,000 GFLOPs/s = 0.045 ms. Total Time ≈ max(7 ms,
    0.045 ms) = 7 ms. Doubling TFLOPs changes compute time to 0.022 ms, leaving the 7 ms memory bottleneck
    completely untouched.
