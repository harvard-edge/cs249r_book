title: Evaluating Stationarity Violations in Cloud ML
scenario: Your AWS ML pipeline processes 5,000 loan applications per minute using a model trained on 2018-2022 data. Due to rapid interest rate hikes, borrower default patterns have fundamentally shifted, violating the stationarity assumption and dropping model precision by 15%.
question: Would you use weekly sliding-window retraining ($1,200/week) or real-time online learning to adapt to this shifted loan model, and why?
details:
  realistic_solution: 'Reject online learning due to massively delayed feedback loops. Implement weekly sliding-window batch retraining augmented with an unsupervised feature-space drift detection proxy (e.g., monitoring debt-to-income distribution shifts) to trigger manual interventions.'
  common_mistake: |
    **The Pitfall:** Recommending online learning for applications with delayed ground truth.
    **The Rationale:** Online learning sounds like the ultimate technical solution to rapidly shifting distributions.
    **The Consequence:** Building an incredibly complex real-time system that provides zero actual benefit because it takes 90+ days to observe the "default" label required for the gradient update.
  napkin_math: |
    **Assumptions & Constraints:**
    - Loan feedback delay = 90 days.
    - Traffic = 5,000 apps/min = 7.2M/day. 5% approval = 360,000 loans/day.
    - 15% precision drop on 360k loans.

    **Calculations:**
    - Misclassified loans = 360,000 * 0.15 = 54,000 per day.
    - Online learning updates on 90-day-old labels, offering 0-day advantage.

    **Conclusion & Interpretation:**
    - **Result: Delayed Ground Truth nullifies Online Learning (Data-Bound)**. A 90-day label delay means sliding-window batching with proxy drift alerts is vastly superior.
