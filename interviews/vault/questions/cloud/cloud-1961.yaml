title: Evaluating Stationarity Violations in Cloud ML
scenario: Your cloud-hosted ML pipeline on AWS processes 5,000 loan applications per minute using a model
  trained on 2018-2022 data. Due to rapid interest rate hikes, borrower default patterns have fundamentally
  shifted, violating the stationarity assumption and dropping model precision by 15%. Evaluate the architectural
  trade-offs between implementing weekly sliding-window retraining (costing $1,200/week on p4d instances)
  versus deploying a real-time online learning system to continuously adapt to the shifting distribution.
details:
  realistic_solution: Reject online learning due to delayed feedback loops. Implement weekly sliding-window
    batch retraining augmented with an unsupervised feature-space drift detection proxy (e.g., monitoring
    debt-to-income distribution shifts) to trigger manual interventions.
  common_mistake: Recommending online learning without accounting for the lack of real-time ground truth
    labels (defaults take months to observe), rendering immediate real-time gradient updates impossible.
  napkin_math: Feedback delay = 90 days. Online learning updates on 90-day old ground truth, offering
    0 day advantage over weekly batching for sudden shifts. Meanwhile, 15% precision drop on 7.2M apps/day
    * 5% approval rate = 54,000 misclassified loans daily, meaning the $1,200/week retraining compute
    cost is negligible compared to the business impact.
