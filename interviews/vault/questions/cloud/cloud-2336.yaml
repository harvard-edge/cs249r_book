title: FPGA Routing Congestion and Clock Collapse
scenario: Deploying a Deep Learning Recommendation Model (DLRM) on an AWS F1 FPGA instance. The baseline
  model achieves a 250MHz clock frequency (fMAX). You add a single 256x256 feature-crossing MLP layer.
  Suddenly, the synthesis tool reports an fMAX of 110MHz, missing timing constraints, and the power draw
  increases by 40%.
details:
  realistic_solution: 'The symptom (catastrophic fMAX drop and power spike after adding a dense compute
    layer) indicates DSP (Digital Signal Processor) slice exhaustion. FPGAs have a fixed number of hardened
    DSP blocks (e.g., ~6800 on UltraScale+). A 256x256 dense layer requires massive parallel MAC operations.
    Once the DSP blocks are fully utilized, the FPGA synthesizer falls back to implementing multipliers
    using distributed logic (LUTs - Look-Up Tables). LUT-based multipliers require thousands of gates,
    creating immense routing congestion. The long, tangled physical routing paths across the FPGA fabric
    drastically increase the critical path delay, forcing the clock frequency down from 250MHz to 110MHz.
    The co-design solution requires temporal multiplexing (folding): redesign the RTL/HLS to use a smaller
    systolic array (e.g., 32x32) that fits entirely within the remaining DSP budget, and iterate over
    the 256x256 matrix over multiple clock cycles, preserving the 250MHz fMAX.'
  common_mistake: Trying to aggressively pipeline the design by adding registers everywhere, which increases
    latency without solving the underlying resource exhaustion.
  napkin_math: 256x256 matrix-vector multiply = 65,536 MACs. AWS F1 has ~6,840 DSP slices. You are short
    ~58,000 MACs. Implementing an 8-bit multiplier in LUTs takes ~60 LUTs. 58,000 * 60 = 3.48 million
    LUTs. The fabric only has 1.1 million LUTs. The design is unroutable or barely routable with extreme
    delay. By using a 32x32 systolic array (1,024 MACs/DSPs), it consumes 15% of DSPs. It takes (256/32)^2
    = 64 clock cycles to compute the layer, but maintains 250MHz (4ns cycle time). Total time = 64 * 4ns
    = 256ns, vastly outperforming a 110MHz (9ns) congested design.
