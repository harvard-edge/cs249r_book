title: Profiling Linear Layer Arithmetic Intensity
scenario: 'You are profiling a linear projection layer mapping a batch of 2048 tokens from an embedding dimension of 8192 to an output dimension of 32768 on an NVIDIA A100 GPU (312 TFLOPS FP16 peak, 2.0 TB/s memory bandwidth). The FP16 matrix multiplication takes exactly 4.5 milliseconds.'
question: 'What are the arithmetic intensity, bottleneck type, and achieved compute utilization for the 4.5 ms A100 projection layer?'
details:
  realistic_solution: 'The arithmetic intensity is ~1560 FLOPs/byte, vastly exceeding the A100''s ridge point of 156 FLOPs/byte, meaning the layer is solidly compute-bound. The achieved compute utilization is approximately 78.3% of the theoretical peak.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for Multiply-Accumulate (MAC) operations.
    **The Rationale:** Candidates miscalculate the FLOPs or miscalculate the memory read/write volumes for the matrix.
    **The Consequence:** Incorrectly classifying a highly dense, compute-bound layer as memory-bound, leading to flawed optimization strategies.
  napkin_math: |
    - **Compute (FLOPs):** 2 × M × N × K = 2 × 2048 × 32768 × 8192 = 1.099 × 10^12 FLOPs (~1.10 TFLOPS).
    - **Memory (Bytes):** 2 bytes (FP16) × (M×K + K×N + M×N) = 2 × (16.7M + 268.4M + 67.1M) = 704 MB.
    - **Arithmetic Intensity:** 1.10 TFLOPs / 704 MB = **1,562 FLOPs/byte**.
    - **A100 Ridge Point:** 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte. Since 1562 > 156, it is solidly **compute-bound**.
    - **Compute Utilization:** (1.10 TFLOPs / 0.0045 s) / 312 TFLOPS = 244.4 / 312 = **78.3% of peak**.
