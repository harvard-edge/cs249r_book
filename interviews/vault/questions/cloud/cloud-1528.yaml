title: Profiling Linear Layer Arithmetic Intensity
scenario: 'You are profiling a linear projection layer mapping a batch of 2048 tokens from an embedding dimension of 8192 to an output dimension of 32768 on an NVIDIA GPU (312 TFLOPS FP16 peak, 2.0 TB/s bandwidth). The FP16 matrix multiplication takes exactly 4.5 milliseconds.'
question: 'What are the arithmetic intensity, bottleneck type, and achieved compute utilization?'
details:
  realistic_solution: 'The arithmetic intensity is ~1560 FLOPs/byte, vastly exceeding the 156 FLOPs/byte ridge point. The layer is solidly compute-bound. The achieved compute utilization is approximately 78.3%.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for Multiply-Accumulate (MAC) operations.
    **The Rationale:** Candidates miscalculate FLOPs or memory read/write volumes.
    **The Consequence:** Incorrectly classifying a highly dense compute-bound layer as memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M=2048, N=32768, K=8192.
       - FP16 precision (2 bytes per element).
       - Peak TFLOPS = 312, Bandwidth = 2.0 TB/s.
    2. **Calculations:**
       - FLOPs: 2 * M * N * K = 1.099e12 FLOPs (1.10 TFLOPS).
       - Bytes: 2 * (M*K + K*N + M*N) = 704.6 MB.
       - Intensity: 1.10 TFLOPs / 704.6 MB = 1561 FLOPs/byte.
       - Ridge Point: 312 / 2.0 = 156 FLOPs/byte.
       - Utilization: (1.10 / 0.0045s) / 312 = 78.3%.
    3. **Conclusion & Interpretation:**
       - **Result: 1561 FLOPs/byte, 78.3% utilization.**
       - **Conclusion: Compute-Bound; arithmetic intensity far exceeds the ridge point.**