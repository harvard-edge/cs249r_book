title: 'Model Size Estimation: Compare MoE vs. Dense Memory Footprint on H100'
scenario: 'Compare the inference memory footprint of a Mixture-of-Experts (MoE) model (Mixtral-8×7B: 46.7B
  total params, 12.9B active per token) vs. a dense 13B model (LLaMA-2-13B) on H100 (80GB HBM3). Both
  serve at batch size 32, sequence length 1024.'
question: "How does Mixtral-8×7B inference memory compare with dense LLaMA-2-13B at batch 32 and sequence length 1024?"
details:
  realistic_solution: 'Mixtral-8×7B FP16: all 46.7B params must be in HBM = 93.4GB. Exceeds single H100!
    Need 2 H100s. Active compute: 12.9B params per token = 25.8GB accessed per decode step. LLaMA-2-13B
    FP16: 26GB. Fits in single H100 with KV cache. KV-cache LLaMA-2-13B at batch=32, seq=1024: 32×1024×2×5120×2B×40
    layers = 26.8GB. Total LLaMA-2-13B: 26+26.8=52.8GB < 80GB ✓. Mixtral: 93.4GB + KV-cache → 2×H100.'
  common_mistake: Assuming MoE memory = active params × dtype_bytes; the full weight tensor for all experts
    must reside in HBM even though only 2 of 8 experts activate per token.
  napkin_math: 'Mixtral-8×7B: 46.7B × 2B = 93.4GB. Single H100: 80GB. Need TP-2. KV-cache Mixtral (32×1024
    seq, 32 KV heads, 128 dim, 32 layers): 32×1024×2×32×128×2×32 = 8.6GB. Per H100 (TP-2): 93.4/2+8.6/2=51.0GB
    ✓. Decode: each step reads active experts (2/8 × 46.7B=11.7B × 2B=23.4GB) + 93.4 total loaded in HBM.
    BW: 23.4/3.35T=7ms/token (active params only, 2 experts per GPU in TP-2). LLaMA-13B: 26/3.35T=7.76ms/token.
    Similar!'
