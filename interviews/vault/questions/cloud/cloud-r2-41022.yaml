title: TP Degree for Inference Latency SLA
scenario: You must serve a 70B BF16 model with a p99 time-to-first-token (TTFT) under 200ms for 2048-token
  prompts. H100 GPUs provide 3.35 TB/s HBM3 bandwidth and 900 GB/s NVLink. What is the minimum TP degree
  needed to meet this SLA?
details:
  realistic_solution: 'Prefill is compute-bound. FLOPs for prefill ≈ 2 × 70B × 2048 = 287 TFLOPS per request.
    H100 BF16 peak = 989 TFLOPS. Achievable utilization for prefill ≈ 70% → effective = 693 TFLOPS per
    GPU. Time with TP=1: 287T / 693T = 414 ms → exceeds 200 ms SLA. TP=2: 287T / (2 × 693T) = 207 ms.
    Close but p99 needs margin. TP=4: 287T / (4 × 693T) = 103 ms + TP overhead. TP overhead at TP=4: 2
    AllReduces × 80 layers × (2048 × 8192 × 2B) / 900 GB/s ≈ 2 × 80 × 32MB / 900GB/s ≈ 5.7 ms. Total ≈
    109 ms — well within 200 ms. For p99 reliability (add 30% margin for tail latency from GC, scheduling,
    etc.): TP=4 at ~142 ms p99 meets the SLA. TP=2 at ~270 ms p99 fails. Minimum TP degree = 4.'
  common_mistake: Only counting weight-loading time and ignoring attention compute. For 2048-token prefill,
    the operation is compute-bound, not memory-bound, so you need to estimate FLOP requirements.
  napkin_math: 'Prefill FLOPs: 2 × 70B × 2048 = 287 TFLOPS. H100 effective: 693 TFLOPS. TP=4: 287/(4×693)
    = 103 ms compute + 6 ms comms = 109 ms. p99 with 30% margin: 142 ms < 200 ms.'
