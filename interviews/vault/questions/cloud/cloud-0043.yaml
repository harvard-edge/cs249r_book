title: The Chatbot's Response Time
scenario: You are operating a chatbot service backed by a 7B parameter LLM. The system has two main latency phases: a 'prefill' phase to process the user's prompt, which takes a fixed 150ms, and a 'decode' phase where it generates tokens one by one. The time per output token (TPOT) is 30ms.
question: How long until the user receives the 20th output token with 150ms prefill and 30ms TPOT?
details:
  realistic_solution: TTFT (Time To First Token) is the total latency to generate the very first token, including both prompt processing (prefill) and the first decode step. TPOT (Time Per Output Token), also called inter-token latency, is the time to generate each subsequent token. The total time for the Nth token is the prefill time plus N decode steps.
  common_mistake: |
    **The Pitfall:** Calculating token times without acknowledging prefill, or missing the boundary condition.
    **The Rationale:** Engineers compute just the generation loop (20 * 30ms) completely ignoring the mandatory prompt processing step upfront.
    **The Consequence:** Providing drastically optimistic latency estimates that fail immediately upon deployment.
  napkin_math: |
    1. Calculate Time to First Token (TTFT): 150ms (prefill) + 30ms (first decode step) = 180ms.
    2. Calculate remaining tokens: 20 desired tokens - 1 first token = 19 remaining decode steps.
    3. Decode time for remaining: 19 tokens * 30ms/token = 570ms.
    4. **Result: Total Latency = 180ms + 570ms = 750ms.** (Equivalently: 150ms + 20 * 30ms = 750ms).
  options:
  - 600ms
  - 180ms
  - 750ms
  - 780ms
  correct_index: 2
