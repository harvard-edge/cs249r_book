title: The True Cost of an A/B Test
scenario: You are designing an A/B experiment to evaluate a new, larger recommendation model. The current production model (Group A) is 1 billion parameters. The new experimental model (Group B) is 7 billion parameters. Both models use FP16 precision.
question: "What is the FP16 memory footprint difference between the 1B and 7B models, and what is the serving cost implication?"
details:
  realistic_solution: The analysis requires calculating the memory for each model and then finding the difference. The economic implication is key.
  common_mistake: |
    **The Pitfall:** Calculating memory in isolation without comparing it to the baseline, or using incorrect bytes-per-parameter (e.g., 4 bytes for FP32 instead of 2 bytes for FP16).
    **The Rationale:** Engineers often forget that A/B testing costs are relative, and misremember precision sizes.
    **The Consequence:** Failing to connect the memory increase to the direct economic impact of fitting fewer model replicas per GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Group A: 1B parameters, FP16 (2 bytes per parameter).
    - Group B: 7B parameters, FP16 (2 bytes per parameter).

    **Calculations:**
    - Group A memory: 1B * 2 bytes = 2 GB.
    - Group B memory: 7B * 2 bytes = 14 GB.
    - Difference: 14 GB - 2 GB = 12 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. The 7B model requires 12 GB more memory, significantly reducing the number of replicas per GPU and increasing serving cost.
  options:
  - 24 GB. The experiment will have a higher memory cost due to using 4 bytes per parameter.
  - 6 GB. The memory increase is manageable as it only requires 1 byte per parameter.
  - 12 GB. The experimental model requires 7x more memory, significantly increasing the serving cost per user in the A/B test.
  - 14 GB. The experimental model needs 14 GB, which is the primary cost driver.
