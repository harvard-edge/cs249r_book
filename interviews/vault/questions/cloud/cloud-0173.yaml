title: The TTFT vs. TPOT Tug-of-War
scenario: You are designing the inference engine for a new AI code completion product. The product manager's primary requirement is 'instantaneous suggestions that stream out quickly.' You are serving a 70B parameter model on H100s. Initial tests show low Time-To-First-Token (TTFT) at batch size 1 but poor Time-Per-Output-Token (TPOT). Conversely, a large batch size yields excellent TPOT but unacceptable TTFT due to queueing delays.
question: Why can't the 70B code assistant get both low TTFT at batch size 1 and excellent TPOT at large batch size, and what design can satisfy both?
details:
  realistic_solution: The trade-off is rooted in the Roofline Model and the changing arithmetic intensity of the workload. TTFT is dominated by the prefill step, which for a single request (batch size 1) is latency-bound. However, the subsequent decode step (TPOT) becomes memory-bandwidth-bound at batch size 1. A large batch size makes the decode step compute-bound, leading to excellent TPOT but introduces queueing delays which kills TTFT. The design solution is continuous batching.
  common_mistake: |
    **The Pitfall:** Suggesting a hardware-only solution like using a B200 or simply using a smaller model.
    **The Rationale:** Engineers often default to scaling up hardware or scaling down the model rather than addressing the core systems trade-off.
    **The Consequence:** The fundamental physics of the Roofline Model remain unaddressed, leading to inefficient resource utilization or compromised product requirements.
  napkin_math: |
    1. Analyze batch size 1 decode step: A 70B model (140GB weights) requires `2 * 70B = 140 GFLOPs` of compute but must read `140 GB` of weights.
    2. Calculate arithmetic intensity: `140e9 FLOPs / 140e9 Bytes = 1 FLOP/Byte`.
    3. Compare to hardware limit: 1 FLOP/Byte is far below the H100's ridge point (~295 Ops/Byte), making it severely memory-bound.
    4. Calculate read time: `140 GB / 3.35 TB/s ≈ 42 ms` per token.
    5. Analyze batch size 64: Compute becomes `64 * 140 GFLOPs` for the same `140 GB` weight read.
    6. Calculate new arithmetic intensity: `64 FLOPs/Byte`, pushing the operation towards being compute-bound and achieving a **lower per-token generation time (better TPOT)**.
