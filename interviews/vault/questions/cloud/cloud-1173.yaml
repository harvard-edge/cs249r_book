title: Dynamic Batching Wait Window Calculation
scenario: A cloud-based translation API processes user requests dynamically. The strict P99 latency SLA
  is 200ms. Network and preprocessing overhead take a fixed 20ms. The model execution time on an NVIDIA
  T4 GPU scales with batch size (B) as T(B) = 30ms + 10ms * B. Requests arrive uniformly at a rate of
  50 requests per second (1 request every 20ms). Calculate the maximum dynamic batching wait window you
  can safely configure, and the resulting batch size, to maximize throughput while strictly adhering to
  the 200ms SLA.
question: "What max dynamic batching wait window and batch size keep the translation API within the 200ms P99 SLA?"
details:
  realistic_solution: Configure a maximum wait window of 100ms. Formulate the end-to-end latency as the
    sum of overhead, wait time, and batch execution time to find the maximum wait time that respects the
    SLA.
  common_mistake: Candidates often maximize batch size based solely on hardware limits or fail to include
    the time spent waiting in the queue as part of the total end-to-end latency budget.
  napkin_math: 'SLA = Overhead + Wait (W) + Compute(B). Since arrival is 1 req/20ms, B = W / 20. Equation:
    200ms = 20ms + W + (30ms + 10ms * (W / 20)). 150 = W + 0.5W -> 150 = 1.5W -> W = 100ms. Batch size
    B = 100 / 20 = 5. Check: 20 + 100 + (30 + 50) = 200ms.'
