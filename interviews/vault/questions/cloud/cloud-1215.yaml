title: Calculating Arithmetic Power for LLM Inference
scenario: You are sizing the power requirements for a new LLM inference cluster serving a 7B parameter
  model. Based on the model architecture, the forward pass requires 14 GFLOPs (7 GigaMACs) per generated
  token. Hardware profiling indicates that the BF16 tensor cores consume exactly 1.5 picojoules (pJ) per
  MAC operation. If your cluster must sustain a peak throughput of 1,000,000 tokens per second, calculate
  the theoretical minimum active compute power required strictly for the arithmetic operations, ignoring
  memory access and static system leakage.
details:
  realistic_solution: 'Calculate the energy per token by multiplying the number of MAC operations by the
    energy per MAC: 7,000,000,000 MACs * 1.5 pJ/MAC = 10.5 millijoules (mJ) per token. Then, multiply
    by the throughput to find the continuous power draw: 1,000,000 tokens/sec * 10.5 mJ/token = 10,500
    Joules/sec, or 10.5 kilowatts (kW) of theoretical minimum arithmetic compute power.'
  common_mistake: Candidates often use the GPU's total Nameplate TDP (e.g., 400W) to estimate energy,
    failing to isolate the specific energy-per-operation cost (pJ/MAC) which separates raw arithmetic
    power from data-movement (HBM access) and static overhead.
  napkin_math: '1 MAC = 1.5 pJ = 1.5e-12 J

    Compute energy per token = 7e9 MACs * 1.5e-12 J/MAC = 10.5e-3 J = 10.5 mJ

    Total Arithmetic Power = 1e6 tokens/s * 10.5 mJ/token = 10,500 W = 10.5 kW'
