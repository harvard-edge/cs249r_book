title: A100 Multi-Node Scaling Efficiency
scenario: You are managing a fleet of A100 GPUs. An elastic training job using static batching reports
  15,000 samples/sec on 1 node (8 GPUs). The scheduler allocates a second node, bringing the total to
  16 GPUs, but throughput only reaches 21,000 samples/sec due to 100Gbps inter-node network bottlenecks.
  Calculate the scaling efficiency of the cluster and determine the cost penalty per 1M samples trained,
  assuming each GPU costs $2/hr.
question: "What is the two-node scaling efficiency, and how does it change the cost per 1M samples versus one 8-GPU node?"
details:
  realistic_solution: 'Calculate actual vs ideal throughput to find 70% scaling efficiency. Translate
    throughput to cost-per-sample: the second node adds only 6k samples/sec (40% of baseline capability)
    but doubles the hourly burn rate. The scheduler should downscale the job back to 8 GPUs to optimize
    cluster-wide efficiency.'
  common_mistake: Failing to evaluate the marginal contribution of the second node, and ignoring the per-sample
    cost inflation caused by allocating GPUs in the diminishing returns regime.
  napkin_math: '1 node (8 GPUs): 15k samples/s. Ideal 2 nodes: 30k samples/s. Actual 2 nodes: 21k samples/s.
    Scaling efficiency = 21k / 30k = 70%. Cost/hr: 8 GPUs = $16, 16 GPUs = $32. Time per 1M samples @
    8 GPUs: 1,000,000 / 15,000 = 66.67s. Cost = (66.67/3600) * $16 = $0.296. Time per 1M @ 16 GPUs: 1,000,000
    / 21,000 = 47.62s. Cost = (47.62/3600) * $32 = $0.423. Cost penalty = +43%.'
