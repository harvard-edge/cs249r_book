title: LoRA Rank Sensitivity Analysis
scenario: You are tuning the LoRA rank for a code generation task on a 34B model to balance adapter size and task performance.
question: How would you select the optimal LoRA rank for the 34B code model, and why do returns diminish beyond rank-64?
details:
  realistic_solution: 'Use spectral analysis: train with rank-256, then analyze singular value decomposition of the learned AB matrix. The number of singular values above a threshold gives the effective rank. For most NLP tasks, effective rank is 4-32. Beyond rank-64, performance gains are <0.5% on standard benchmarks but memory and compute scale linearly. Use rank-16 for production, rank-64 for maximum quality.'
  common_mistake: |
    **The Pitfall:** Setting the LoRA rank as high as GPU memory allows (e.g., rank-256 or higher).
    **The Rationale:** Practitioners intuitively assume that a higher rank captures more information and strictly yields better performance.
    **The Consequence:** Drastically increased memory footprint and training compute with <0.5% marginal performance gain, wasting resources for low-intrinsic-dimension tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 34B model: d_model=8192, 48 layers.
       - LoRA applied to W_q and W_v.
    2. **Calculations:**
       - Adapter size (Rank-4): 2 matrices * 2 (A+B) * 4 (rank) * 8192 (dim) * 48 (layers) * 2 bytes = 12.58 MB.
       - Rank-16 size: 12.58 * 4 = 50.3 MB. (+8% performance).
       - Rank-64 size: 12.58 * 16 = 201.3 MB. (+2% performance over Rank-16).
       - Rank-256 size: 12.58 * 64 = 805.3 MB. (+0.3% performance over Rank-64).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Performance gains diminish exponentially after rank-32; rank-64 is the optimal ceiling for quality, while rank-16 maximizes efficiency.
