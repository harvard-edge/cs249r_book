title: LoRA Rank Sensitivity Analysis
scenario: You are tuning LoRA rank for a code generation task on a 34B model. Describe
  the methodology for selecting optimal rank and the diminishing returns beyond rank-64.
question: How would you select the optimal LoRA rank for the 34B code model, and why
  do returns diminish beyond rank-64?
details:
  realistic_solution: 'Use spectral analysis: train with rank-256, then analyze singular
    value decomposition of the learned AB matrix. The number of singular values above
    a threshold (e.g., 5% of max) gives the effective rank. For most NLP tasks, effective
    rank is 4-32. Beyond rank-64, performance gains are <0.5% on standard benchmarks
    but memory and compute scale linearly. Use rank-16 for production, rank-64 for
    maximum quality, rank-4 for resource-constrained fine-tuning.'
  common_mistake: Setting rank as high as memory allows (rank-256 or higher) assuming
    more rank = better performance. The intrinsic dimensionality of fine-tuning tasks
    is typically low (rank 8-32 captures 90%+ of task-specific signal).
  napkin_math: '34B model adapter sizes (d_model=8192, 48 layers). Rank-4 applied to W_q and W_v:
    2 weight matrices × 2 (A+B) × 4 (rank) × 8192 (dim) × 48 (layers) × 2 bytes = 12.58 MB.
    Rank-16: 50.3 MB. Rank-64: 201.3 MB. Rank-256: 805.3 MB. Performance
    on HumanEval code: rank-4→rank-16: +8% pass@1. rank-16→rank-64: +2%. rank-64→rank-256:
    +0.3%. Marginal gain per doubling drops exponentially after rank-32 for most tasks.'
