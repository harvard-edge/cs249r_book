title: Multi-Query Attention vs GQA with FlashAttention
scenario: You are choosing between MQA (1 KV head) and GQA-8 (8 KV heads) for a new 30B model deployed
  on 4x H100. Both use FlashAttention. For inference at batch=64, seq_len=4096, 48 query heads, head_dim=128,
  compare decode throughput, KV cache size, and quality implications.
question: "How do MQA and GQA-8 compare for decode throughput, KV cache size, and quality at batch=64 and seq_len=4096?"
details:
  realistic_solution: 'KV cache at seq_len=4096 per request: MQA (1 KV head): 60 layers x 2 x 1 x 128
    x 4096 x 2B = 120MB. GQA-8: 60 x 2 x 8 x 128 x 4096 x 2B = 960MB. 8x difference. For 64 concurrent:
    MQA = 7.5GB/GPU, GQA-8 = 60GB/GPU. GQA-8 barely fits (80-15GB model = 65GB). Decode bandwidth: MQA
    loads KV once = 120MB x 64 batch / 3.35 TB/s = 2.3ms. GQA-8: 960MB x 64 / 3.35 = 18.3ms. MQA is 8x
    faster decode. But quality: MQA-30B shows 2-3 perplexity points worse than GQA-8-30B on long-context
    benchmarks. Recommendation: GQA-4 as compromise — 4 KV heads, 480MB/request, 4x faster than full MHA,
    minimal quality loss.'
  common_mistake: Thinking MQA is strictly better because it minimizes KV cache. MQA with a single KV
    head can create a bandwidth bottleneck where all 48 query heads compete for the same KV data, and
    it reduces model quality more than GQA.
  napkin_math: 'MQA KV: 120MB/req. GQA-8: 960MB/req. Batch 64 total: 7.5GB vs 60GB. Decode IO: 2.3ms vs
    18.3ms. Quality: MQA loses 2-3 PPL. GQA-4 sweet spot: 480MB, 9.2ms decode, <0.5 PPL loss.'
