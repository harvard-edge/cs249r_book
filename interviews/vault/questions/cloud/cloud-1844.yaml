title: Diagnosing Object Store API Bottlenecks
scenario: Your team is training a multi-modal model on a 500TB dataset consisting of 500 million 1MB sample
  pairs (image + JSON). The data is hosted on a cloud object store with a 100 Gbps network link to your
  8-GPU training node. Despite the massive bandwidth, GPU utilization is stuck at 25% and dataloaders
  are blocked on I/O. The node is only pulling 1.5 GB/s, but the storage backend metrics reveal you are
  hitting a hard API limit of 5,000 GET requests per second.
details:
  realistic_solution: Repack the individual 1MB files into 1GB to 2GB sequential streaming archives (like
    WebDataset tarballs or TFRecords) to eliminate per-sample metadata overhead and convert random file
    access into bulk sequential reads.
  common_mistake: Attempting to fix the I/O bottleneck by adding more dataloader workers, increasing prefetch
    buffer sizes, or upgrading the network interface card, which actually exacerbates the API rate limit
    and metadata bottleneck.
  napkin_math: 8 GPUs processing 300 samples/sec each = 2,400 samples/sec. At 2 files per sample, this
    requires 4,800 GET requests/sec, constantly hitting the 5,000 req/sec limit. By packing 1,000 samples
    into a 1GB shard, the dataloader only needs to make ~2.4 GET requests/sec to sustain the same 2.4
    GB/s throughput, completely bypassing the API bottleneck.
