title: 'Defining Arithmetic Intensity: Roofline Analysis'
scenario: The GPU roofline model is a visual performance model used to provide bounds on the performance of compute kernels based on hardware limits.
question: "What is the definition of Arithmetic Intensity in the context of a GPU roofline model?"
details:
  realistic_solution: Arithmetic Intensity is the ratio of floating-point operations performed to bytes of data moved from memory. Its unit is FLOPs/Byte. It is the key metric that determines whether a given workload running on specific hardware will be compute-bound or memory-bound.
  common_mistake: |
    **The Pitfall:** Confusing Arithmetic Intensity with raw performance (FLOPs/sec) or power efficiency (FLOPs/Watt).
    **The Rationale:** Engineers often focus intensely on peak FLOPs to judge hardware speed.
    **The Consequence:** Overlooking memory bandwidth as the primary bottleneck for many modern workloads, leading to poor optimizations.
  napkin_math: |
    * H100 GPU Ridge Point: ~295 FLOPs/Byte.
    * **Compute-Bound Workload:** AI = 350 FLOPs/Byte. Performance is capped by the H100's 989 TFLOPS.
    * **Memory-Bound Workload:** AI = 50 FLOPs/Byte. Performance is capped by the H100's 3.35 TB/s memory bandwidth.
  options:
  - The number of operations per second (FLOPs/sec)
  - The number of operations per Watt (FLOPs/Watt)
  - The ratio of operations to data movement (FLOPs/Byte)
  - The total memory bandwidth (GB/s)
  correct_index: 2
