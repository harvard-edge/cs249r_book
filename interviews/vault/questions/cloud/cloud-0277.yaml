title: 'Defining Arithmetic Intensity: Roofline Analysis'
scenario: What is the definition of Arithmetic Intensity in the context of a GPU roofline model?
question: "What is the definition of Arithmetic Intensity in the context of a GPU roofline model?"
details:
  realistic_solution: Arithmetic Intensity is the ratio of floating-point operations performed to bytes
    of data moved from memory. Its unit is FLOPs/Byte. It is the key metric that determines whether a
    given workload running on specific hardware will be compute-bound or memory-bound.
  common_mistake: Confusing Arithmetic Intensity with raw performance (FLOPs/sec) or power efficiency
    (FLOPs/Watt). Engineers often focus on peak FLOPs and forget that memory bandwidth is frequently the
    real bottleneck.
  napkin_math: A model with an Arithmetic Intensity of 350 Ops/Byte running on an NVIDIA H100 (which has
    a roofline 'ridge point' of ~295 Ops/Byte) would be compute-bound. Its performance is limited by the
    GPU's 989 TFLOPS of compute. In contrast, a model with an AI of 50 Ops/Byte would be memory-bound,
    limited by the H100's 3.35 TB/s of HBM3 memory bandwidth.
  options:
  - The number of operations per second (FLOPs/sec)
  - The number of operations per Watt (FLOPs/Watt)
  - The ratio of operations to data movement (FLOPs/Byte)
  - The total memory bandwidth (GB/s)
  correct_index: 2
