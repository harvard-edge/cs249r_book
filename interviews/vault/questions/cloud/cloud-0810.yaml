title: The Energy Bill
scenario: Your team just completed a 30-day training run on 256 H100 GPUs. The cloud bill shows $650,000 in compute charges.
question: What were the energy consumption and carbon footprint of the 30-day 256× H100 training run in a US data center?
details:
  realistic_solution: GPU power is only part of the picture. Data centers have a PUE (Power Usage Effectiveness) that captures total facility power divided by IT equipment power. A modern hyperscaler PUE is 1.1–1.2; an older facility might be 1.4–1.6. You must also account for the fact that GPUs don't always run at TDP — average utilization-weighted power is typically 60–80% of TDP.
  common_mistake: |
    **The Pitfall:** Multiplying GPU TDP directly by hours, ignoring PUE and utilization.
    **The Rationale:** Forgetting the massive facility overhead required to power and cool the hardware (Power Usage Effectiveness).
    **The Consequence:** Underestimating the total energy footprint by 20-40%, leading to inaccurate sustainability reporting and misguided TCO models.
  napkin_math: |
    - **IT Load**: 256 H100s × 700W TDP = 179.2 kW.
    - **Actual Utilization**: Weighted power is ~80% of TDP = 143.3 kW.
    - **Facility Power**: With a PUE of 1.2, total power = 143.3 × 1.2 = 172 kW.
    - **Total Energy**: 172 kW × 720 hours (30 days) = 123,840 kWh ≈ **124 MWh**.
    - **Carbon Footprint**: 124 MWh × 390 kg CO2/MWh (US average) = **48.3 metric tons CO2**.
    - **Cost Perspective**: At $0.08/kWh, energy cost is $9,920 (only ~1.5% of the $650k cloud bill).
