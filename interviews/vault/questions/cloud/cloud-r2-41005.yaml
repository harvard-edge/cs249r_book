title: TP Degree Selection for Inference
scenario: You are deploying a 70B parameter model (BF16) for inference. You have access to MI300X GPUs
  (192 GB HBM3 each). The model weights alone are 140 GB. Should you use TP=1 with a single MI300X or
  TP=2 across two MI300X GPUs? Analyze the tradeoff.
details:
  realistic_solution: 'Single MI300X (TP=1): 140 GB weights leave 52 GB for KV cache and activations.
    With long context (32K tokens, 80 layers, 64 KV heads, head_dim=128), KV cache = 2 × 32768 × 80 ×
    64 × 128 × 2B = 84 GB — exceeds remaining memory. So TP=1 fails for long context. TP=2 on MI300X:
    384 GB total, 140 GB weights split = 70 GB per GPU, leaving 122 GB per GPU for KV cache. KV cache
    is also split across TP ranks, so each GPU holds 42 GB. Memory bandwidth doubles from 5.3 to 10.6
    TB/s, nearly doubling decode throughput since decode is memory-bandwidth bound. The cost: each transformer
    block now needs 2 AllReduces over the inter-GPU link. On MI300X with Infinity Fabric at ~400 GB/s
    between GPUs, this adds ~0.1 ms per block × 80 blocks = 8 ms — modest vs the ~25 ms decode latency
    at TP=1.'
  common_mistake: Only considering whether the model fits in memory. A single MI300X has 192 GB, so 140
    GB weights fit, but you also need KV cache and activation memory. Also ignoring that TP=2 doubles
    available memory bandwidth.
  napkin_math: 'TP=1: 5.3 TB/s, 140 GB weights → decode step = 140/5300 = 26 ms. TP=2: 10.6 TB/s, 70 GB/GPU
    → decode step ≈ 70/5300 + comms ≈ 13 + 8 = 21 ms. ~20% faster.'
