title: The Warp Size Thread Count
scenario: A junior engineer writes a CUDA kernel launching 100 threads per block to process a 100-element
  vector. They notice that GPU utilization is low even though every thread has work. How many threads
  actually execute per scheduling unit on an NVIDIA GPU, and why does launching 100 threads per block
  waste resources?
question: "How many threads actually execute per scheduling unit on an NVIDIA GPU, and why does launching 100 threads per block waste resources?"
details:
  realistic_solution: 'NVIDIA GPUs execute threads in groups of 32 called warps. A block of 100 threads
    creates 4 warps: three full warps (32 threads each = 96 threads) and one partial warp with only 4
    active threads. That last warp wastes 28/32 = 87.5% of its execution slots. The SM must still schedule
    and execute the full warp, but 28 lanes sit idle. Rounding block size up to 128 (4 full warps) eliminates
    the partial warp entirely.'
  common_mistake: Thinking that every thread maps to an independent execution unit, like CPU cores. Engineers
    unfamiliar with SIMT assume all 100 threads run independently and efficiently.
  napkin_math: '100 threads / 32 threads per warp = 3 full warps + 1 partial warp (4 threads). Utilization
    of partial warp: 4/32 = 12.5%. Overall thread utilization: 100/128 = 78.1%. With 128 threads: 128/128
    = 100% warp utilization.'
