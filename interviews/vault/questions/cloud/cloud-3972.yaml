title: 'Overlap in Heterogeneous Pipeline: Different GPU Types per Stage'
scenario: 'Your pipeline-parallel training uses 4 stages: stages 0-1 on A100s and stages 2-3 on H100s. The H100 stages finish 3x faster than A100 stages, creating massive bubbles.'
question: Can communication overlap mitigate the 3x A100/H100 pipeline-stage imbalance, and what should you do instead?
details:
  realistic_solution: 'Communication overlap cannot fix compute imbalance. The H100 stages idle for 2/3 of the time waiting for A100 stages, regardless of how well communication is overlapped. Solutions must address the imbalance: (1) Assign more layers to H100 stages (75% of layers on H100, 25% on A100) to equalize per-stage compute time. (2) Increase micro-batch count to reduce bubble ratio (doesn''t fix imbalance but reduces its impact). (3) Use A100 stages for compute-light operations (embedding, final linear) and H100 for transformer layers. (4) Communication overlap helps at the margins: overlapping the A100->H100 activation transfer with H100''s idle time (trivially hidden since H100 is already waiting). Overlap efficiency: near 100% for communication, but the real problem is 0% compute efficiency on H100 during wait periods.'
  common_mistake: |
    **The Pitfall:** Trying to solve heterogeneous pipeline imbalance with communication overlap.
    **The Rationale:** Candidates conflate communication bottlenecks with compute imbalances, hoping that hiding network transfers will somehow speed up the slower compute stage.
    **The Consequence:** Implementing complex asynchronous communication schemes that yield zero throughput improvement because the fundamental compute bubble remains untouched.
  napkin_math: |
    - Assume A100 per-layer compute = 10ms, H100 per-layer compute = 3.3ms.
    - With 20 layers per stage: A100 stage = 200ms, H100 stage = 66ms.
    - Pipeline efficiency = min(200, 66) / max(200, 66) = 33%.
    - Max throughput = **33%** of H100 potential, regardless of perfect communication overlap.
    - Rebalancing to 10 layers on A100 and 30 layers on H100: A100 stage = 100ms, H100 stage = 99ms.
    - New pipeline efficiency = **~99%**.
