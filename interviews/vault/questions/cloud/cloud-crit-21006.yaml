title: MoE Gating Network Overhead
scenario: A DeepSeek-V3-style MoE layer uses a gating network that takes a 7168-dim hidden state and produces
  logits over 256 experts. The gating network is a single linear layer. What is the parameter count of
  the router, and what fraction of total layer parameters does it represent?
details:
  realistic_solution: 'Router parameters: 7168 × 256 = 1,835,008 (~1.84M). Each expert FFN has approximately
    7168 × 2 × 18432 = 264M parameters (up/gate/down projections). With 256 experts: 256 × 264M = 67.6B.
    The shared attention layers add more. Router fraction: 1.84M / 67.6B = 0.0027%, negligible. The router
    is deliberately tiny because it sits on the critical path — every token must pass through it before
    dispatch. A 2-layer MLP router would add latency for marginal routing quality improvement. The real
    computational cost of routing is not the router itself but the all-to-all communication it triggers.'
  common_mistake: Overcomplicating the router architecture. MoE routers are intentionally simple — a single
    linear projection — to minimize overhead. Complex multi-layer routers add latency on the critical
    path.
  napkin_math: 'Router: 7168 × 256 = 1.84M params. Expert FFN: ~264M params each. 256 experts: 67.6B.
    Router/total: 1.84M/67.6B = 0.003%.'
