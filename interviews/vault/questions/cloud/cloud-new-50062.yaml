title: Overlapping AllReduce with Optimizer Step via Gradient Sharding
scenario: In standard DDP, the optimizer step waits for AllReduce to complete on all gradients. With ZeRO-1,
  each GPU owns a shard of optimizer states. Can we overlap the optimizer step with ongoing AllReduce
  by processing shards as their gradients are reduced?
details:
  realistic_solution: 'Yes — ReduceScatter + local optimizer step + AllGather pattern: (1) Replace AllReduce
    with ReduceScatter (each GPU gets its shard of reduced gradients). (2) As soon as a GPU receives its
    gradient shard from ReduceScatter, it can run the optimizer step for that shard immediately, even
    while other ReduceScatter operations are in progress. (3) After the optimizer updates the parameter
    shard, AllGather distributes the updated parameters. This pipeline: ReduceScatter(shard_i) -> Optimizer(shard_i)
    -> AllGather(shard_i) can run concurrently for different shards. DeepSpeed and FSDP implement this
    pattern, overlapping optimizer compute with communication.'
  common_mistake: Running the optimizer step as a single operation after all AllReduce completes. This
    wastes the time between the first gradient bucket's AllReduce completion and the last bucket's completion.
  napkin_math: '100 gradient shards. ReduceScatter per shard: 1ms. Optimizer step per shard: 0.5ms. AllGather
    per shard: 1ms. Serial: 100 x (1+0.5+1) = 250ms. Pipelined: 100ms (RS pipeline) + 0.5ms (last optimizer)
    + 1ms (last AG) = 101.5ms. 2.5x speedup.'
