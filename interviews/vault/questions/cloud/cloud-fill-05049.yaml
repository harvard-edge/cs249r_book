title: GPTQ vs AWQ Quantization Quality on H100 for 70B LLM
scenario: A production team quantizes Llama-3-70B to 4-bit using both GPTQ (block-wise OBQ) and AWQ (activation-aware)
  on H100 80GB. GPTQ achieves 4.2 perplexity (PPL) vs FP16 baseline 3.8. AWQ achieves 3.9 PPL. Both run
  at approximately the same inference speed. The team must choose one for production. Analyze the trade-offs
  beyond accuracy.
details:
  realistic_solution: 'AWQ advantage: 3.9 vs 4.2 PPL = 0.3 PPL better. Calibration: AWQ uses per-channel
    activation scales from 128 samples (faster, less sensitive). GPTQ: reconstructs weights via Hessian
    inverse (slower, depends on calibration distribution). AWQ tends to be more robust to distribution
    shift. GPTQ requires 2-4 hours quantization time for 70B; AWQ ~30 minutes. Deployment: both produce
    static INT4 weights — identical inference speed on H100 with AutoAWQ/ExLlamaV2. Key decision factors:
    (1) if production data matches calibration → GPTQ sometimes better; (2) AWQ more robust OOD; (3) AWQ
    faster to requantize for model updates. Recommendation: AWQ for production due to robustness + speed.'
  common_mistake: Selecting the method with best PPL without evaluating calibration dataset sensitivity;
    AWQ uses a small 128-sample calibration set while GPTQ uses 128 sequences of 2048 tokens — different
    OOD robustness profiles.
  napkin_math: 'AWQ PPL: 3.9 vs FP16 3.8 = +0.1 degradation. GPTQ: +0.4 degradation. AWQ wins accuracy.
    Throughput: both W4A16 → same decode speed. Quantization time: GPTQ 3h vs AWQ 30min for 70B. Production:
    AWQ.'
