title: Diagnosing Jacobian Bottlenecks in Many-Output Models
scenario: A research team is deploying a neural fluid dynamics simulator on A100 (80GB) GPUs. The model
  takes a small vector of N=25 fluid parameters (viscosity, density, etc.) as input and outputs a high-resolution
  velocity field of M=65,536 (256x256) grid points. They need to compute the full M x N Jacobian for an
  implicit solver. Their initial implementation uses reverse-mode automatic differentiation (vectorized
  `vjp`), but it results in crippling out-of-memory (OOM) errors and takes over 10 seconds per step. Analyze
  the root cause of this memory and latency bottleneck and determine the optimal autodiff strategy.
question: "Why do reverse-mode VJPs OOM for a 65,536x25 Jacobian, and which autodiff strategy should replace them?"
details:
  realistic_solution: Replace the reverse-mode AD (`vjp`) with forward-mode AD (`jvp`). Forward-mode AD
    computes the derivative concurrently with the forward pass using dual numbers, scaling efficiently
    with outputs but requiring multiple passes for multiple inputs.
  common_mistake: Candidates often suggest activation checkpointing, CPU offloading, or chunking the outputs
    to avoid OOM, failing to recognize that reverse-mode AD is fundamentally the wrong mathematical tool
    when the output dimension vastly exceeds the input dimension.
  napkin_math: 'Reverse-mode requires M=65,536 backward passes (vector-Jacobian products), caching intermediate
    activations for the entire graph. Forward-mode requires N=25 dual-number forward passes. Speedup:
    M/N = 65,536 / 25 ≈ 2,621x fewer passes. Peak memory drops from O(depth * width) for backprop to O(1)
    overhead via dual numbers.'
