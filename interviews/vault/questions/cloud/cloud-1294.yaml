title: Diagnosing Jacobian Bottlenecks in Many-Output Models
scenario: A research team is deploying a neural fluid dynamics simulator on A100 (80GB) GPUs. The model takes a small vector of N=25 fluid parameters as input and outputs a high-resolution velocity field of M=65,536 (256x256) grid points. They need to compute the full M x N Jacobian for an implicit solver. Their initial implementation uses reverse-mode automatic differentiation (vectorized `vjp`), but it results in crippling out-of-memory (OOM) errors and takes over 10 seconds per step.
question: Why do reverse-mode VJPs OOM for a 65,536x25 Jacobian, and which autodiff strategy should replace them?
details:
  realistic_solution: Replace the reverse-mode AD (`vjp`) with forward-mode AD (`jvp`). Forward-mode AD computes the derivative concurrently with the forward pass using dual numbers, scaling efficiently with outputs but requiring multiple passes for multiple inputs.
  common_mistake: |
    **The Pitfall:** Suggesting activation checkpointing, CPU offloading, or chunking the outputs to avoid OOM.
    **The Rationale:** Candidates rely on standard deep learning memory tricks.
    **The Consequence:** They fail to recognize that reverse-mode AD is fundamentally the wrong mathematical tool when the output dimension vastly exceeds the input dimension.
  napkin_math: |
    - 1. **Reverse-mode (vjp):** Requires M=65,536 backward passes, caching intermediate activations for the entire graph (O(depth × width) memory).
    - 2. **Forward-mode (jvp):** Requires N=25 dual-number forward passes (O(1) memory overhead).
    - 3. **Speedup:** 65,536 / 25 ≈ **2,621x fewer passes**.
