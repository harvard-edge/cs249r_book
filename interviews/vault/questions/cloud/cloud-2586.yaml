title: Cloud Rlhf Infrastructure L3 0
scenario: You need to set up RLHF for a 13B model using PPO. The policy and critic need full training state (16 B/param), reference and reward models are inference-only (2 B/param FP16).
question: How much GPU memory does PPO RLHF for the 13B model require, and how many 80 GB GPUs are minimally needed?
details:
  realistic_solution: 'Configure ZeRO-3 across the cluster to shard the massively heavy policy and critic training states. Calculate the total footprint of all 4 concurrent RLHF models (Policy, Critic, Reference, Reward). Distribute the resulting 468 GB payload across 80 GB GPUs, ensuring ~10-15 GB of overhead per GPU remains available for KV cache generation and activation checkpoints during the PPO rollout phase.'
  common_mistake: |
    **The Pitfall:** Sizing memory strictly for the policy model being trained.
    **The Rationale:** Forgetting the architectural reality that RLHF PPO requires 4 co-existing model instances in VRAM to function.
    **The Consequence:** Discovering at runtime that the critic model alone requires as much memory as the policy, causing an immediate OOM cluster crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 13B parameters.
    - Training State (Policy & Critic): 16 bytes/param.
    - Inference State (Reference & Reward): 2 bytes/param (FP16).
    - Hardware: 80 GB GPUs.

    **Calculations:**
    - Training Footprint: 2 models * 13B params * 16 Bytes = 416 GB.
    - Inference Footprint: 2 models * 13B params * 2 Bytes = 52 GB.
    - Total Model Footprint: 416 GB + 52 GB = 468 GB.
    - Raw GPU Count: 468 GB / 80 GB = 5.85 (requires 6 minimum).
    - Practical Deployment: ZeRO-3 sharding across 8 GPUs provides 58.5 GB load per GPU, leaving 21.5 GB headroom for activations/KV cache.

    **Conclusion & Interpretation:**
    - **Result: 8 GPUs (Memory-Capacity Bound)**. A minimum of 8 80GB GPUs is required to safely hold the 468 GB multi-model footprint plus activation headroom.
