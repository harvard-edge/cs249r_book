title: Cloud Rlhf Infrastructure L3 0
scenario: You need to set up RLHF for a 13B model using PPO. The policy and critic need full training
  state (16 B/param), reference and reward models are inference-only (2 B/param FP16). Calculate total
  GPU memory and minimum A100 80 GB GPUs needed.
details:
  realistic_solution: 'Policy model (training): 13B × 16 B/param = 208 GB. Critic model (training): 13B
    × 16 B/param = 208 GB. Reference model (inference): 13B × 2 B/param = 26 GB. Reward model (inference):
    13B × 2 B/param = 26 GB. Total: 208 + 208 + 26 + 26 = 468 GB. Minimum A100s: 468 / 80 = 5.85 → 6 GPUs
    minimum. But need headroom for activations, KV cache during generation (~10-20 GB), and batch data.
    Practical minimum: 8 A100s. With FSDP on policy and critic: each sharded across 4 GPUs = 52 GB each.
    Reference and reward on remaining GPUs. Alternatively: use ZeRO-3 across all 8 GPUs = 468/8 = 58.5
    GB per GPU — fits with headroom.'
  common_mistake: Sizing for policy model only and discovering at runtime that 4 models must coexist.
    The critic model alone (with optimizer states) requires as much memory as the policy — it is a full
    training workload, not a lightweight addition.
  napkin_math: 'Training: 2 × 13B × 16B = 416 GB. Inference: 2 × 13B × 2B = 52 GB. Total: 468 GB. A100s:
    468/80 = 5.85 → 8 GPUs practical. Per-GPU with ZeRO-3: 468/8 = 58.5 GB + ~15 GB activations = 73.5
    GB. Fits in 80 GB.'
