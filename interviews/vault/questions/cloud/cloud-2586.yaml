title: Cloud Rlhf Infrastructure L3 0
scenario: You need to set up RLHF for a 13B model using PPO. The policy and critic need full training state (16 B/param), reference and reward models are inference-only (2 B/param FP16).
question: How much GPU memory does PPO RLHF for the 13B model require, and how many A100 80 GB GPUs are needed?
details:
  realistic_solution: 'Policy model (training): 13B × 16 B/param = 208 GB. Critic model (training): 13B × 16 B/param = 208 GB. Reference model (inference): 13B × 2 B/param = 26 GB. Reward model (inference): 13B × 2 B/param = 26 GB. Total: 208 + 208 + 26 + 26 = 468 GB. Minimum A100s: 468 / 80 = 5.85 → 6 GPUs minimum. But need headroom for activations, KV cache during generation (~10-20 GB), and batch data. Practical minimum: 8 A100s. With FSDP on policy and critic: each sharded across 4 GPUs = 52 GB each. Reference and reward on remaining GPUs. Alternatively: use ZeRO-3 across all 8 GPUs = 468/8 = 58.5 GB per GPU — fits with headroom.'
  common_mistake: |
    **The Pitfall:** Sizing memory for the policy model only.
    **The Rationale:** Forgetting that RLHF requires 4 co-existing models to function.
    **The Consequence:** Discovering at runtime that the critic model alone requires as much memory as the policy, causing an immediate OOM and failed deployment.
  napkin_math: |
    - **Training Models (Policy & Critic):** 2 × 13B × 16 Bytes = 416 GB.
    - **Inference Models (Reference & Reward):** 2 × 13B × 2 Bytes = 52 GB.
    - **Total Model Memory:** 416 GB + 52 GB = **468 GB**.
    - **Raw GPU Count:** 468 / 80 = 5.85 -> 6 GPUs minimum.
    - **Practical Setup:** Need ~15 GB per GPU for activations and KV cache. With ZeRO-3 across 8 GPUs: 468/8 = 58.5 GB per GPU. 58.5 + 15 = 73.5 GB, which fits safely in an 80 GB A100.
    - **Conclusion:** A practical minimum of **8 A100 GPUs** is required.
