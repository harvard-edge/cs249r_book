title: The NCCL Topology Misconfiguration
scenario: 'You have a cluster of 8 DGX nodes. Each node has 8 GPUs connected via NVLink, and 8 dedicated
  Mellanox InfiniBand NICs. You launch a PyTorch distributed training job. The job runs, but cross-node
  communication is bizarrely slow. You check `nvidia-smi topo -m` and see all hardware is physically connected
  correctly. You check the NCCL logs and see `NCCL INFO: Using PCIe for cross-node communication`. Why
  is NCCL ignoring your expensive InfiniBand network?'
details:
  realistic_solution: 'NCCL defaulted to the wrong network interface. NCCL uses environment variables
    (NCCL_SOCKET_IFNAME, NCCL_IB_HCA) to discover which network interfaces to use for cross-node communication.
    Without explicit configuration, NCCL may bind to the Ethernet management interface (1 Gbps) instead
    of the InfiniBand NICs (400 Gbps). The fix: set `NCCL_SOCKET_IFNAME=ib0` and `NCCL_IB_HCA=mlx5` to
    force NCCL to use the InfiniBand HCAs. Also verify that `ibstat` shows the ports as Active and that
    the InfiniBand subnet manager is running. This misconfiguration silently degrades performance by 400x.'
  common_mistake: '"The InfiniBand cables are broken." If they were broken, it would fail to route entirely.
    PCIe means it''s routing through the host CPU.'
  napkin_math: InfiniBand NDR = 400 Gbps (50 GB/s). Standard Ethernet Management = 1 Gbps (125 MB/s).
    An incorrect environment variable silently downgraded your trillion-parameter training network speed
    by a factor of 400x.
