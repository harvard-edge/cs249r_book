title: 'Network Bandwidth Bottlenecks: Design NVLink vs. PCIe Topology for 8×H100 Training'
scenario: An 8×H100 DGX node (NVLink 900GB/s bidirectional, PCIe 5.0 ×16 at 64GB/s per GPU to CPU) is used for training a 13B model with data-parallel + tensor-parallel (TP-2, DP-4).
question: For TP-2 and DP-4 training on an 8×H100 DGX, which traffic uses NVLink versus PCIe, and how much bandwidth does each consume?
details:
  realistic_solution: '8×H100 on DGX: NVLink 900GB/s (DGX H100 spec). Within TP-2 pair: use NVLink for activation all-reduce (inter-GPU): ~4MB/layer × 2 all-reduces × 40 layers = 320MB. NVLink BW: 320MB/900GB/s = 0.36ms per step. DP-4 gradient AllReduce (after backward): 13B/2 params (per TP shard) × 2B = 13GB gradient. Ring-AllReduce across 4 DP groups: 2×(4-1)/4 × 13GB = 19.5GB per GPU. Over NVLink 900GB/s: 21.7ms per step. PCIe: only for CPU-GPU data loading (not in critical path if NVMe prefetching). NVLink dominates performance.'
  common_mistake: |
    **The Pitfall:** Assuming all GPU-GPU communication uses NVLink.
    **The Rationale:** Candidates overlook how models are sharded across different network domains.
    **The Consequence:** They fail to realize that gradient AllReduce in data-parallel training may cross PCIe to CPU/InfiniBand when GPUs are in different NVLink domains.
  napkin_math: |
    - TP-2 all-reduce: per layer, 2 all-reduces of hidden_dim=5120 activations × seq_len × batch × 2B.
    - Batch=4, seq=2048: 4 × 2048 × 5120 × 2 = 84MB per all-reduce.
    - 84MB × 2 per layer × 40 layers = 6720MB per step.
    - NVLink at 900GB/s: 6.72GB / 900GB/s = 7.5ms per step for TP all-reduces.
    - DP grad sync: 13GB / 900GB/s = 14.4ms.
    - Total comm: **~22ms**.
