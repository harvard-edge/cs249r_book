title: Chaos Testing Distributed Training Recovery
scenario: You are configuring a fault injection validation test for a 1,024-GPU training cluster (128 nodes). Historical telemetry indicates a single node has a Mean Time Between Failures (MTBF) of 1,280 hours. To stress-test the recovery system, you run a 100-hour training job and deliberately inject node failures at exactly 3x the expected natural cluster failure rate. The automated recovery mechanism takes exactly 6 minutes to resume training per failure.
question: How many faults should you inject, and what is the overall cluster availability percentage during this 100-hour test?
details:
  realistic_solution: First calculate the cluster MTBF (10 hours), then find the expected natural failures (10) to determine the 3x injected fault count (30). Finally, calculate the total downtime (3 hours) to compute the 97% availability.
  common_mistake: |
    **The Pitfall:** Calculating the failure rate based on the single node MTBF instead of aggregating across the entire 128-node cluster.
    **The Rationale:** Candidates confuse individual component reliability with distributed system reliability, forgetting that any single node failure halts the entire synchronous cluster.
    **The Consequence:** The fault injection test vastly under-stresses the recovery mechanism, providing a false sense of security before deploying production jobs.
  napkin_math: |
    1. **Cluster MTBF:** 1,280 hours / 128 nodes = 10 hours.
    2. **Natural Failures:** 100 hours / 10 hours = 10 failures.
    3. **Injected Faults:** 10 failures * 3x rate = 30 injected faults.
    4. **Downtime:** 30 faults * 6 minutes = 180 minutes = 3 hours.
    5. **Availability:** (100 hours - 3 hours) / 100 hours = **97.0%**.
