title: Chaos Testing Distributed Training Recovery
scenario: You are configuring a fault injection validation test for a 1,024-GPU training cluster (128
  nodes). Historical telemetry indicates a single node has a Mean Time Between Failures (MTBF) of 1,280
  hours. To stress-test the automated recovery system, you run a 100-hour validation training job and
  deliberately inject node failures at exactly 3x the expected natural cluster failure rate. If the automated
  recovery mechanism takes exactly 6 minutes to resume training per failure, calculate the total number
  of injected faults and the overall cluster availability percentage during this 100-hour test.
details:
  realistic_solution: First calculate the cluster MTBF (10 hours), then find the expected natural failures
    (10) to determine the 3x injected fault count (30). Finally, calculate the total downtime (3 hours)
    to compute the 97% availability.
  common_mistake: Calculating the failure rate based on the single node MTBF instead of aggregating across
    the 128-node cluster, leading to vastly under-stressing the recovery mechanism.
  napkin_math: 'Cluster MTBF = 1,280 hours / 128 nodes = 10 hours.

    Natural failures in 100 hours = 100 / 10 = 10 failures.

    Injected faults (3x rate) = 10 * 3 = 30 faults.

    Total downtime = 30 faults * 6 minutes = 180 minutes = 3 hours.

    Availability = (100 hours - 3 hours) / 100 hours = 97.0%.'
