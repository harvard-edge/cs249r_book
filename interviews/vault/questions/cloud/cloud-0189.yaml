title: The Copilot Latency Paradox
scenario: 'You are the new Staff ML Systems Engineer at a startup building a real-time AI coding assistant to compete with GitHub Copilot. The key feature is streaming multi-line code suggestions. The product team has a strict user experience mandate: when a developer pauses typing for 500ms, a suggestion must *begin* to appear (Time-To-First-Token) within a P99 deadline of 200ms, and then stream at 15 tokens/second.'
question: Why does static batching miss the 200 ms P99 TTFT while leaving GPUs underutilized?
details:
  realistic_solution: The problem is Head-of-Line (HOL) blocking from static batching. A single long-running request (e.g., generating a full function) forces all other quick, interactive requests in the same batch to wait, killing TTFT. The low utilization comes from the GPU being idle while waiting for a full static batch to assemble.
  common_mistake: |
    **The Pitfall:** Assuming that high latency requires provisioning more GPUs.
    **The Rationale:** Candidates think linearly: 'high latency means we need more GPUs' or 'low utilization means we can't afford this model,' failing to identify the core systems-level queueing bottleneck.
    **The Consequence:** Adding more machines will not solve Head-of-Line (HOL) blocking, ultimately worsening cloud costs without fixing the user experience.
  napkin_math: |
    1. **Short Request:** Generation takes 50 ms.
    2. **Long Request:** Full function generation takes 1,000 ms.
    3. **Static Batching Impact:** If both are batched together, the short request must wait for the 1,000 ms request to finish before the batch completes.
    4. **Result:** The short request experiences a TTFT of **>1,000 ms**, severely violating the 200 ms P99 SLA due to Head-of-Line (HOL) blocking.
