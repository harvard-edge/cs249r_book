title: Evaluating Activation Memory Profiler Output for Silent Memory Fragmentation
scenario: A PyTorch memory snapshot on an H100 shows peak allocated memory of 68 GB during training a
  30B model, but the job crashes with an OOM at step 47 despite peak allocation appearing stable. The
  memory timeline shows reserved memory is consistently 74 GB. You must evaluate whether activation memory
  fragmentation is the cause and determine a remediation path.
question: "Is activation-memory fragmentation causing the step-47 OOM despite 68 GB allocated and 74 GB reserved, and how would you remediate it?"
details:
  realistic_solution: Inspect the memory snapshot with `torch.cuda.memory_snapshot()` to identify large
    fragmented blocks. Enable `PYTORCH_NO_CUDA_MEMORY_CACHING=1` temporarily to confirm the OOM disappears
    (proving fragmentation). Then set `torch.cuda.memory.set_per_process_memory_fraction(0.90)` to trigger
    earlier GC, or call `torch.cuda.empty_cache()` at a fixed interval (e.g., every 10 steps). Additionally,
    sort gradient checkpointed segments so that the largest activation tensors are allocated and freed
    in LIFO order, reducing fragmentation.
  common_mistake: 'Confusing PyTorch''s ''allocated'' metric (memory actively holding live tensors) with
    ''reserved'' metric (memory held by the CUDA caching allocator but not necessarily in use). The 6
    GB gap between allocated (68 GB) and reserved (74 GB) points to fragmentation: the allocator has reserved
    pages that cannot satisfy a new large contiguous allocation request.'
  napkin_math: Reserved 74 GB - Allocated 68 GB = 6 GB fragmented. An incoming activation tensor for batch
    size 8, S=4096, H=8192 = 8×4096×8192×2 B = 512 MB contiguous block. If the largest free contiguous
    fragment is 400 MB (due to fragmentation), this single allocation triggers OOM despite 6 GB nominally
    free.
