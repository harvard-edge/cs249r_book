title: The Intra-Node Scaling Failure
scenario: You are a Staff ML Engineer trying to scale up training for a 70B parameter LLM on a single server with 8 H100 GPUs. You observe that moving from 4 GPUs to 8 GPUs only results in a 1.3x speedup, far from the expected near-linear 2x. Your profiling tools show that the `all-reduce` operation for gradient synchronization is taking an unexpectedly long time.
question: "Why does scaling from 4 to 8 H100s in one server yield only a 1.3x speedup when all-reduce is slow?"
details:
  realistic_solution: |
    The most probable cause is that the GPUs are communicating over the slower PCIe bus instead of the high-speed NVLink fabric. In a server with 8 H100s, all GPUs should be interconnected via NVLink for maximum bandwidth. A misconfiguration, faulty NVLink bridge, or a motherboard that doesn't provide full all-to-all NVLink connectivity can force the communication library (NCCL) to fall back to PCIe. The bandwidth difference is over an order of magnitude, which perfectly explains the scaling bottleneck during the communication-heavy `all-reduce` step.
  common_mistake: |
    **The Pitfall:** Confusing inter-node and intra-node interconnects.
    **The Rationale:** Engineers blame InfiniBand or algorithmic inefficiency (e.g., ring vs tree) rather than checking the physical layer connection inside the chassis.
    **The Consequence:** The server's high-speed NVLink capability is completely wasted due to a software fallback or misconfiguration.
  napkin_math: |
    - **Model Size:** 70B FP16 = 140GB gradients. Ring all-reduce transfers ~2 * 140GB = 280GB.
    - **NVLink Speed:** Connected via NVLink (900 GB/s), transfer takes 280 / 900 = **0.31 seconds**.
    - **PCIe Fallback:** If misconfigured to PCIe Gen4 (32 GB/s), transfer takes 280 / 32 = **8.75 seconds**. This drastically destroys multi-GPU scaling.
  options:
  - The InfiniBand network connecting the server to storage is saturated.
  - The GPUs are communicating over the PCIe bus instead of the NVLink fabric.
  - The HBM3 memory on each GPU doesn't have enough bandwidth to handle the gradients.
  - The `ring all-reduce` algorithm is inefficient and should be replaced with a `tree all-reduce`.
  correct_index: 1
