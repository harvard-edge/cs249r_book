title: The Intra-Node Scaling Failure
scenario: You are a Staff ML Engineer trying to scale up training for a 70B parameter LLM on a single,
  powerful server with 8 H100 GPUs. You observe that moving from 4 GPUs to 8 GPUs only results in a 1.3x
  speedup, far from the expected near-linear 2x. Your profiling tools show that the `all-reduce` operation
  for gradient synchronization is taking an unexpectedly long time. Given that all 8 GPUs are in the same
  physical machine, diagnose the most likely hardware bottleneck causing this poor scaling.
details:
  realistic_solution: The most probable cause is that the GPUs are communicating over the slower PCIe
    bus instead of the high-speed NVLink fabric. In a server with 8 H100s, all GPUs should be interconnected
    via NVLink for maximum bandwidth. A misconfiguration, faulty NVLink bridge, or a motherboard that
    doesn't provide full all-to-all NVLink connectivity can force the communication library (NCCL) to
    fall back to PCIe. The bandwidth difference is over an order of magnitude, which perfectly explains
    the scaling bottleneck during the communication-heavy `all-reduce` step.
  common_mistake: Engineers often confuse inter-node and intra-node interconnects. They might blame InfiniBand,
    which connects separate machines, or misinterpret the bottleneck as being algorithmic (e.g., 'ring
    all-reduce is slow') rather than a physical-layer bandwidth issue within the server itself.
  napkin_math: 70B FP16 model = 140GB of gradients. Ring all-reduce transfers ~2 * 140GB = 280GB. Connected
    via NVLink (900 GB/s), communication takes 280 / 900 = 0.31 seconds. If misconfigured to use PCIe
    Gen4 (32 GB/s), communication takes 280 / 32 = 8.75 seconds, destroying multi-GPU scaling.
  options:
  - The InfiniBand network connecting the server to storage is saturated.
  - The GPUs are communicating over the PCIe bus instead of the NVLink fabric.
  - The HBM3 memory on each GPU doesn't have enough bandwidth to handle the gradients.
  - The `ring all-reduce` algorithm is inefficient and should be replaced with a `tree all-reduce`.
  correct_index: 1
