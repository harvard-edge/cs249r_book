title: Diagnosing Tensor Core Underutilization
scenario: A team reports that their mixed-precision ResNet-50 training on an NVIDIA A100 GPU is unexpectedly
  slow. Despite setting `fp16=True` in PyTorch, `nvidia-smi` shows GPU utilization at 98%, but profiling
  with Nsight Compute reveals that Tensor Core utilization is below 15%. The batch size is 256, and the
  hidden layer dimensions are mostly powers of 2, except for the final classification layer which was
  modified to predict 105 classes instead of 1000. How do you analyze and resolve the bottleneck preventing
  high Tensor Core utilization?
question: "How do you analyze and resolve the bottleneck preventing high Tensor Core utilization?"
details:
  realistic_solution: Identify that the final layer dimension (105) is not a multiple of 8, which is required
    for Tensor Core alignment in FP16 on A100. Pad the classification layer output to 112 or 128 and ignore
    the dummy classes in the loss calculation to fully engage Tensor Cores.
  common_mistake: Assuming that simply enabling FP16 guarantees Tensor Core usage, or incorrectly blaming
    the data loader since overall GPU utilization is high.
  napkin_math: A100 Tensor Cores require matrix dimensions (M, N, K) to be multiples of 8 for FP16. If
    N=105, the operation falls back to standard CUDA cores. Padding N to 128 allows Tensor Core execution,
    bypassing the 19.5 TFLOPS (FP32) limit and utilizing the 312 TFLOPS (FP16 TC) peak.
