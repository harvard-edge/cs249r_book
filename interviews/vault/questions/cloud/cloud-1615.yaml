title: Diagnosing Asymmetric OOM in Tensor Parallel Inference
scenario: 'You are deploying a 70B Llama-2 model (BF16) on an 8x A100 (80GB) node using Tensor Parallelism (TP=8). Weights consume ~140GB (17.5GB/GPU). During a load test with batch size 128 and sequence length 2048, the system crashes with a CUDA OutOfMemoryError specifically on GPU 0. GPUs 1-7 report only ~40GB utilization.'
question: 'Why does the 8-way tensor-parallel 70B model OOM only on GPU 0 during batch-128, sequence-2048 inference?'
details:
  realistic_solution: 'The final unembedding layer produces logits for the entire vocabulary. If all logits are gathered on GPU 0 for sampling, it creates a massive temporary memory spike. The fix is to compute the argmax or sample locally within the vocab-parallel shards, communicating only the final selected token IDs.'
  common_mistake: |
    **The Pitfall:** Blaming the KV cache size or weight imbalance.
    **The Rationale:** Candidates fail to analyze the final layer memory profile, missing that full-vocabulary logits are often gathered on a single device for token sampling.
    **The Consequence:** Wasting time tuning TP degrees or KV cache parameters while the actual bottleneck remains unaddressed.
  napkin_math: |
    * Logits shape: [batch=128, seq=2048, vocab=32000].
    * Memory = 128 * 2048 * 32,000 * 2 bytes (BF16) = 16.77 GB.
    * FP32 upcasting for softmax doubles this.
    * **The logits spike to 33.5 GB on GPU 0 alone, pushing it past the 80GB limit.**
