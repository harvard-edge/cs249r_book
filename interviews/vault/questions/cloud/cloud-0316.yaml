title: 'The Roofline Litmus Test: Roofline Analysis'
scenario: You've calculated the Arithmetic Intensity (AI) of a new GPU kernel, measured in FLOPs per Byte.
question: To determine if this kernel will be compute-bound or memory-bound on a specific GPU like the NVIDIA H100, what hardware metric do you compare your kernel's AI against?
details:
  realistic_solution: The metric is called the Ridge Point (or machine balance point). For the H100, it equals peak FLOPS divided by peak memory bandwidth. If your kernel's arithmetic intensity exceeds this FLOPs/Byte threshold, it is compute-bound. If it is below, it is memory-bound. This single ratio is the fulcrum of the roofline model and determines which hardware resource limits your kernel's performance.
  common_mistake: |
    **The Pitfall:** Evaluating raw TFLOPS or Memory Bandwidth specs in isolation.
    **The Rationale:** Assuming that high peak TFLOPS guarantees compute-bound performance regardless of memory access patterns.
    **The Consequence:** Optimizing the wrong bottleneck, wasting effort on compute optimizations for a kernel that is fundamentally starved for memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: NVIDIA H100.
       - Peak Compute: 989 TFLOPS.
       - Peak Memory Bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Ridge Point = Peak Compute / Memory Bandwidth.
       - Ridge Point = 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Ridge Point is ~295 FLOPs/Byte.** If AI > 295, the kernel is compute-bound; if AI < 295, it is memory-bound.
  options:
  - The GPU's peak TFLOPS.
  - The HBM memory bandwidth (TB/s).
  - The GPU's Ridge Point.
  - The GPU's TOPS/Watt rating.
