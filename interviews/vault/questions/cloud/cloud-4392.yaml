title: Server Power Supply Efficiency Curves and 80 PLUS Certification Impact
scenario: A procurement engineer asks you to compare power supply unit (PSU) efficiency tiers for GPU server deployments.
question: "What are the 80 PLUS Gold, Platinum, and Titanium efficiencies at 50% load, and how much does Titanium save versus Gold for one 8×H100 server drawing 8 kW IT load at 50% utilization?"
details:
  realistic_solution: '80 PLUS efficiency at 50% load: Gold ≥ 92%, Platinum ≥ 94%, Titanium ≥ 96%. For 8 kW IT load at 50% utilization = 4 kW average IT output. Gold PSU input: 4 kW / 0.92 = 4.348 kW. Titanium PSU input: 4 kW / 0.96 = 4.167 kW. Difference: 181 W per server. Annual: 181W × 8,760h = 1,585 kWh/year. At $0.10/kWh = $158.50/server/year. For a 1,000-server cluster: $158,500/year saved by choosing Titanium over Gold, often paying back the PSU premium in 1-2 years.'
  common_mistake: |
    **The Pitfall:** Confusing input power efficiency with output power delivered.
    **The Rationale:** Misunderstanding how the 80 PLUS rating applies to the wall draw vs the IT load.
    **The Consequence:** Failing to realize that upgrading the PSU directly translates to reduced wall power and cooling loads.
  napkin_math: |
    1. IT output at 50% load: 8 kW × 0.5 = 4 kW.
    2. Gold PSU (92%): 4 / 0.92 = 4,348 W wall input.
    3. Titanium PSU (96%): 4 / 0.96 = 4,167 W wall input.
    4. Delta: 181 W per server.
    5. Annual Savings: 0.181 kW × 8,760h × $0.10/kWh = **$158.56 per server**.
