title: The TensorRT Incompatibility
scenario: Friday evening, the ops team updates the NVIDIA driver from 535.104 to 545.23 across your serving fleet for a security patch. Monday morning, all TensorRT inference engines fail to load with `INVALID_CONFIG` errors. The model files haven't changed. Rolling back the driver fixes it.
question: How can a driver update break a model file, and what's the correct deployment practice?
details:
  realistic_solution: 'TensorRT engines are *not* portable across driver versions. When you build a TensorRT engine, the builder selects specific kernel implementations (called "tactics") from cuDNN and cuBLAS based on the current GPU architecture *and* the installed library versions. These tactics are compiled into the serialized engine file as binary GPU code (SASS). A driver update changes the cuDNN/cuBLAS libraries bundled with the driver, which may deprecate or rename tactics that the engine references. When the engine tries to load a tactic that no longer exists in the new driver''s library, it fails with `INVALID_CONFIG`. This is by design — TensorRT trades portability for performance by baking in hardware-specific optimizations. The correct practice: (1) pin the driver version in your container image, not the host; (2) store TensorRT engines with metadata (driver version, CUDA version, GPU architecture) and rebuild automatically when any component changes; (3) maintain a CI pipeline that rebuilds engines on driver update and validates accuracy before fleet rollout.'
  common_mistake: |
    **The Pitfall:** Believing TensorRT models are hardware-independent or simply needing to "rebuild" without understanding why.
    **The Rationale:** Thinking a driver update shouldn't affect model weights.
    **The Consequence:** Repeated serving outages because the root cause (library dependency and CI gaps) is not addressed.
  napkin_math: |
    1. TensorRT engine build time for a 13B model: 15–45 minutes.
    2. Engine file size: ~28 GB.
    3. Friday update without rebuild caused ~60 hours of downtime.
    4. **Result: At $0.50/request and 1000 req/s: lost revenue = $0.50 × 1000 × 60 × 3600 = $108M.**
