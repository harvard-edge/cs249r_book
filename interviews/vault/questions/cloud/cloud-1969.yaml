title: Edge-to-Cloud Telemetry Ingestion Architecture
scenario: A fleet of 5,000 edge ML devices generates 2GB of inference telemetry per device daily. They have an unreliable 256 kbps cellular link during the day, and a stable 50 Mbps satellite uplink for 2 hours at night.
question: Should the edge devices use synchronous daytime streaming or store-and-forward over the 2-hour satellite window, and why?
details:
  realistic_solution: Deploy a store-and-forward architecture where telemetry is batched locally to Flash storage. The edge device flushes the 2GB payload sequentially during the 2-hour, 50 Mbps satellite connectivity window.
  common_mistake: |
    **The Pitfall:** Prioritizing daytime synchronous streaming over the unreliable 256 kbps link.
    **The Rationale:** System designers often prefer real-time streaming telemetry, assuming that "continuous is better."
    **The Consequence:** This leads to TCP timeout cascades, high power consumption, and ultimately incomplete telemetry ingestion due to insufficient daytime bandwidth.
  napkin_math: |
    1. **Payload:** 2 GB = 16,000 Mb.
    2. **Daytime streaming limit:** 256 kbps × 12 hrs × 3600 s/hr = 11,059,200 kb ≈ 11,059 Mb (~1.38 GB).
    3. **Nightly store-and-forward limit:** 50 Mbps × 2 hrs × 3600 s/hr = 360,000 Mb (45 GB).
    **Conclusion:** Daytime cellular capacity (1.38 GB) mathematically cannot handle the 2GB daily payload, whereas the 2-hour satellite window (45 GB capacity) clears it with a >20x safety margin.
