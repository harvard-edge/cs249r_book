title: Edge-to-Cloud Telemetry Ingestion Architecture
scenario: Your fleet of 5,000 edge ML devices in remote agricultural sites generates 2GB of inference
  telemetry daily. During the day, they have an unreliable 256 kbps cellular link, but at night they connect
  to a stable 50 Mbps satellite uplink for 2 hours. You must evaluate the architecture for ingesting this
  data into your cloud data lake. Compare a synchronous daytime streaming approach with aggressive retries
  against a store-and-forward architecture utilizing local flash storage.
details:
  realistic_solution: Deploy a store-and-forward architecture where telemetry is batched locally to Flash
    storage. The edge device flushes the 2GB payload sequentially during the 2-hour, 50 Mbps satellite
    connectivity window.
  common_mistake: Prioritizing daytime synchronous streaming over the unreliable 256 kbps link, leading
    to TCP timeout cascades, high power consumption, and incomplete telemetry ingestion.
  napkin_math: 'Daytime streaming limit: 256 kbps * 12 hrs = 3,072 kbits/s * 3600s = 11,059 Mb = 1.38
    GB (< 2 GB payload). Nightly store-and-forward limit: 50 Mbps * 2 hrs * 3600s = 360,000 Mb = 45 GB.
    The 2-hour satellite window easily clears the 2 GB daily queue with a >20x safety margin, avoiding
    cellular bottlenecks.'
