title: 'Kernel Fusion: Mastery — Design Fusion Strategy for High-Throughput LLM Prefill'
scenario: You are optimizing throughput for 70B LLM prefill on 8 GPUs processing batches of 512 sequences x 2048 tokens. Current MFU is 38%.
question: What are the top fusion opportunities to improve the 38% MFU for 70B LLM prefill on 8 GPUs, and what is the expected MFU improvement?
details:
  realistic_solution: 'For a 70B model with a large prefill batch (512 × 2048 = 1M tokens), the large matrix multiplications are compute-bound, but the element-wise operations (SwiGLU, RMSNorm, RoPE) are severely memory-bound. The top fusion opportunities are: 1) fusing RMSNorm with the subsequent linear layer or attention projection, 2) fusing RoPE embeddings directly into the attention kernel (e.g., via FlashAttention-2), and 3) vertical fusion of the SwiGLU activation with the FFN''s up/gate projections. By fusing these memory-bound operators, we eliminate redundant HBM read/writes that stall the Tensor Cores. This can elevate MFU from 38% to ~55%, drastically reducing the prefill latency.'
  common_mistake: |
    **The Pitfall:** Applying fusion uniformly to compute-bound matmuls.
    **The Rationale:** Candidates incorrectly assume "fuse everything" is the standard approach without profiling.
    **The Consequence:** Fusing dense, compute-bound matrix multiplications adds register overhead and disrupts Tensor Core optimization without yielding any actual memory bandwidth savings.
  napkin_math: |
    1. Assumptions & Constraints: 70B model, batch 512 x 2048 (1,048,576 tokens). Peak compute for 8 GPUs = 7,912 TFLOPS.
    2. Calculations: Total FLOPs = 2 x 70B x 1.048M = 146.8 PFLOPs. Current throughput (38% MFU) = 3,006 TFLOPS. Current time = 146.8 / 3.006 = 48.8s. Fused throughput (55% MFU) = 4,351 TFLOPS. Fused time = 146.8 / 4.351 = 33.7s.
    3. Conclusion & Interpretation: **Result: Fusing memory-bound ops increases MFU to ~55%, reducing batch time from 48.8s to 33.7s. Bottleneck: Memory-Bound Element-wise Ops.**
