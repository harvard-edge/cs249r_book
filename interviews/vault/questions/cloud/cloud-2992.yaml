title: 'Kernel Fusion: Mastery — Design Fusion Strategy for High-Throughput LLM Prefill'
scenario: You are optimizing throughput for 70B LLM prefill on 8 H100s (80GB HBM3,
  3.35 TB/s, 989 TFLOPS BF16) processing batches of 512 sequences × 2048 tokens. Current
  MFU is 38%. Identify the top fusion opportunities, implement a fusion roadmap, and
  quantify the expected MFU improvement.
question: What are the top fusion opportunities to improve the 38% MFU for 70B LLM
  prefill on 8 H100s, and what is the expected MFU improvement?
details:
  realistic_solution: 'For a 70B model with a large prefill batch (512 × 2048 = 1M
    tokens), the large matrix multiplications are compute-bound, but the element-wise
    operations (SwiGLU, RMSNorm, RoPE) are severely memory-bound. The top fusion opportunities
    are: 1) fusing RMSNorm with the subsequent linear layer or attention projection,
    2) fusing RoPE embeddings directly into the attention kernel (e.g., via FlashAttention-2),
    and 3) vertical fusion of the SwiGLU activation with the FFN''s up/gate projections.
    By fusing these memory-bound operators, we eliminate redundant HBM read/writes
    that stall the Tensor Cores. This can elevate MFU from 38% to ~55%, drastically
    reducing the prefill latency.'
  common_mistake: Applying fusion uniformly without first profiling which kernels
    are memory-bound vs compute-bound; applying fusion to compute-bound matmuls where
    it adds overhead without benefit.
  napkin_math: 'Total prefill tokens = 512 × 2048 = 1,048,576 tokens. Total FLOPs
    ≈ 2 × 70B × 1.048M ≈ 146.8 PFLOPs. 8 H100s peak compute = 8 × 989 = 7,912 TFLOPS.
    At 38% MFU, effective throughput is ~3,006 TFLOPS, taking 146.8 / 3.006 ≈ 48.8s
    per batch. Without fusion, reading and writing intermediate tensors for RMSNorm
    and SwiGLU consumes a massive portion of the 3.35 TB/s HBM bandwidth, starving
    the compute units. Fusing these operations removes the memory bottleneck. Achieving
    55% MFU would increase throughput to ~4,351 TFLOPS, reducing the prefill batch
    time to 33.7s.'
