title: Sizing Edge Buffers for Satellite ML Pipelines
scenario: You are designing a data ingestion pipeline for remote agricultural ML sensors that connect to a central cloud. Each edge site generates 15 GB of sensor telemetry and imagery per hour during a 12-hour active daily window. Connectivity is limited to a 5-hour nightly satellite pass offering a consistent 120 Mbps uplink.
question: What is the nightly transfer capacity, is it enough for 180GB/day, and how large an SSD buffer is needed for 4 blackout days?
details:
  realistic_solution: Convert 120 Mbps to 15 MB/s to calculate the 5-hour window capacity, confirm it exceeds the daily generation, and size the local buffer for the blackout period.
  common_mistake: |
    **The Pitfall:** Failing to convert between megabits (Mbps) and megabytes (MB/s).
    **The Rationale:** Engineers often mix up network bandwidth units with storage capacity units.
    **The Consequence:** An 8x overestimation of transfer capacity, leading to chronic data backlog and lost telemetry at the edge.
  napkin_math: |
    1. **Calculate Daily Data:** 15 GB/hr × 12 hrs = 180 GB/day.
    2. **Calculate Uplink Speed:** 120 Mbps / 8 = 15 MB/s.
    3. **Calculate Nightly Capacity:** 15 MB/s × 3600 sec/hr × 5 hrs = 270,000 MB = 270 GB.
    4. **Calculate Blackout Buffer:** 4 days × 180 GB/day = 720 GB.
    **Final Result: The 270 GB nightly capacity easily clears the 180 GB daily generation, and a minimum 720 GB SSD buffer is required for blackouts.**
