title: Sizing Edge Buffers for Satellite ML Pipelines
scenario: You are designing a data ingestion pipeline for remote agricultural ML sensors that connect
  to a central cloud. Each edge site generates 15 GB of sensor telemetry and imagery per hour during a
  12-hour active daily window. Connectivity is limited to a 5-hour nightly satellite pass offering a consistent
  120 Mbps uplink. Calculate the daily data transfer capacity, determine if the nightly window is sufficient
  to offload the daily data, and size the local SSD buffer required to safely store-and-forward data if
  the site experiences up to 4 consecutive days of satellite weather blackouts.
details:
  realistic_solution: Convert 120 Mbps to 15 MB/s to calculate the 5-hour window capacity of 270 GB. Confirm
    this exceeds the 180 GB daily generation, then multiply the daily generation by the 4-day blackout
    period to size the minimum local buffer at 720 GB.
  common_mistake: Failing to convert between megabits (Mbps) and megabytes (MB/s) when calculating transfer
    windows, leading to an 8x overestimation of transfer capacity.
  napkin_math: 'Daily data generated: 15 GB/hr * 12 hrs = 180 GB/day. Uplink speed: 120 Mbps / 8 = 15
    MB/s. Nightly transfer capacity: 15 MB/s * 3600 sec/hr * 5 hrs = 270,000 MB = 270 GB. Since 270 GB
    > 180 GB, the daily transfer clears the queue. Blackout buffer sizing: 4 days * 180 GB/day = 720 GB
    minimum local storage required.'
