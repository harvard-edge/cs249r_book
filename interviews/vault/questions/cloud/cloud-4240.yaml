title: Quantifying activation checkpointing trade-off for LLM pretraining on MI300X
scenario: You are pretraining a 70B parameter model on MI300X (192GB, 5.3TB/s) with
  pipeline parallelism across 8 nodes. Without activation checkpointing, peak activation
  memory is 130GB per device, exceeding the 192GB limit when accounting for parameters
  and optimizer states. You need to determine the compute overhead of checkpointing
  every other transformer block.
question: How much memory does checkpointing every other transformer block save, and
  what compute overhead does it add on MI300X?
details:
  realistic_solution: 'Checkpoint every other transformer block: saves ~50% of activation
    memory (130GB → 65GB), reducing total device memory from 252.5GB to ~187.5GB, which
    fits within the 192GB limit (65GB activations alongside 122.5GB of parameters + optimizer states:
    70B × 2 bytes params + 70B × 12 bytes Adam states = 980GB distributed across 8 devices = 122.5GB/device).
    The recompute cost is ~17% extra forward FLOPs.'
  common_mistake: Assuming activation checkpointing is 'free' because MI300X has high
    bandwidth. The cost is a full extra forward pass per checkpointed segment, adding
    ~33% to total training FLOPs. Teams often checkpoint every block when checkpointing
    every other block is sufficient.
  napkin_math: '70B params FP16 = 140GB total / 8 devices = 17.5GB params. Adam states
    (FP32 params + m + v) = 3 × 70B × 4B / 8 = 105GB/device. Activations without checkpoint
    = 130GB. With every-other-block checkpoint ≈ 65GB. Total: 17.5 + 105
    + 65 ≈ 187.5GB — fits just within MI300X.'
