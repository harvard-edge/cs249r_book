title: 'Systolic Array Fluency: Arithmetic Intensity from Memory'
scenario: 'Without a calculator, estimate the arithmetic intensity for: (1) GEMM on
  4096x4096 square matrices in BF16, (2) element-wise ReLU on a 1M-element tensor,
  (3) multi-head attention QK^T where Q and K are (1024, 64). State which is compute-bound
  vs memory-bound on TPU v5e (ridge point ≈ 240 FLOPs/byte).'
question: What are the arithmetic intensities for the GEMM, ReLU, and QKᵀ cases, and
  which are compute- or memory-bound on TPU v5e?
details:
  realistic_solution: '(1) GEMM 4096x4096: FLOPs = 2*4096^3 = 137G. Bytes = 3 * 4096^2
    * 2 = 100.7MB. AI = 137G / 100.7M = 1361 FLOPs/byte. Compute bound (>>240). (2)
    ReLU on 1M elements: FLOPs = 1M. Bytes = 2 * 1M * 2 = 4MB. AI = 1M/4M = 0.25 FLOPs/byte.
    Memory bound (<<240). (3) QK^T: Q=(1024,64), K=(1024,64). FLOPs = 2*1024*1024*64
    = 134M. Bytes = (1024*64 + 1024*64 + 1024*1024)*2 = 2.36MB. AI = 134M/2.36M = 57
    FLOPs/byte. Memory bound.'
  common_mistake: Computing FLOPs correctly but forgetting that bandwidth includes
    BOTH reads and writes (input reads + output writes), so the denominator includes
    all memory traffic, not just inputs.
  napkin_math: '(1) AI = 2*N^3 / (3*N^2*2) = N/3 = 4096/3 = 1365. Compute bound. (2)
    AI = 1/(2*2) = 0.25 FLOPs/byte. Memory bound by 960x. (3) FLOPs: 2*1024*1024*64=134M.
    BW: (1024*64*2)*2 + 1024^2*2 = 262KB + 2.1MB = 2.36MB. AI = 134M/2.36M = 57. Memory
    bound (57<<240). Rule: attention is almost always memory bound at sequence lengths
    << batch size; only compute bound at very large batch*seq.'
