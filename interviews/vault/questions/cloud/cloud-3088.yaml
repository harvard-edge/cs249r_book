title: 'Systolic Array Fluency: Arithmetic Intensity from Memory'
scenario: 'You need to estimate the arithmetic intensity to determine if operations are compute-bound or memory-bound on an accelerator (ridge point ≈ 240 FLOPs/byte). The operations are: (1) GEMM on 4096x4096 matrices in BF16, (2) element-wise ReLU on a 1M-element tensor, (3) multi-head attention QK^T where Q and K are (1024, 64).'
question: "What are the arithmetic intensities for the GEMM, ReLU, and QK^T cases, and which are compute- or memory-bound?"
details:
  realistic_solution: '(1) GEMM 4096x4096: FLOPs = 2*4096^3. Bytes = 3 * 4096^2 * 2. Compute bound. (2) ReLU on 1M elements: FLOPs = 1M. Bytes = 2 * 1M * 2. Memory bound. (3) QK^T: Q=(1024,64), K=(1024,64). FLOPs = 2*1024*1024*64. Bytes = (1024*64 + 1024*64 + 1024*1024)*2. Memory bound.'
  common_mistake: |
    **The Pitfall:** Computing FLOPs correctly but dividing only by the input read size.
    **The Rationale:** Candidates forget that memory bandwidth constraints apply to both reading inputs AND writing outputs back to HBM.
    **The Consequence:** Incorrectly classifying memory-bound operations as compute-bound, leading to misdirected optimization efforts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ridge point ≈ 240 FLOPs/byte.
       - BF16 (2 bytes).
    2. **Calculations:**
       - GEMM: AI = 2*N^3 / (3*N^2*2 bytes) = N/3 = 4096/3 = 1365 FLOPs/byte.
       - ReLU: AI = 1 FLOP / (2 bytes in + 2 bytes out) = 0.25 FLOPs/byte.
       - QK^T: FLOPs = 2*1024*1024*64 = 134M. BW = (1024*64*2)*2 + 1024^2*2 = 2.36 MB. AI = 134M / 2.36M = 57 FLOPs/byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Attention)**. Attention is almost always memory bound at sequence lengths << batch size.
