title: 'Thermal Throttling: When GPUs Self-Protect'
scenario: Your 8x MI300X training node shows inconsistent step times: most steps complete in 2.1 seconds, but every few minutes a step takes 3.5 seconds. nvidia-smi shows GPU temperatures cycling between 78°C and 91°C, with clock speeds dropping from 2100 MHz to 1500 MHz when temperatures spike.
question: What causes the periodic step time increase to 3.5 seconds, and how do you resolve it?
details:
  realistic_solution: 'The MI300X is thermal throttling. When junction temperature exceeds ~90°C, the GPU firmware reduces clock speed to prevent damage, dropping from 2100 MHz to 1500 MHz (a 29% reduction). This causes the periodic 67% slowdown in step time (2.1s → 3.5s). Root causes: (1) insufficient airflow — check for blocked vents, failed fans, or hot aisle containment breaches, (2) dried/insufficient thermal interface material (TIM) between GPU die and heatsink, (3) ambient temperature too high (intake > 35°C), (4) neighboring GPUs creating thermal cross-talk. Fixes: clean air filters, verify fan speeds, check coolant flow rates if using DLC, reduce GPU power limit to 700W (nvidia-smi -pl 700) as a temporary measure. Long-term: upgrade to direct liquid cooling which maintains junction temps at 60-70°C with zero throttling.'
  common_mistake: |
    **The Pitfall:** Blaming the software stack (NCCL, dataloader) for intermittent slowdowns.
    **The Rationale:** Candidates often look for complex distributed system bugs without checking baseline hardware telemetry like temperature and clock frequencies.
    **The Consequence:** Wasting engineering time profiling code while the GPUs silently self-throttle to prevent physical damage.
  napkin_math: |
    1. At 91°C, the GPU thermally throttles, dropping clocks from 2100 MHz to 1500 MHz.
    2. Clock reduction: (2100 - 1500) / 2100 = 28.6% reduction in compute frequency.
    3. Expected compute slowdown: 2.1s / (1500 / 2100) = 2.94s.
    4. The actual 3.5s duration suggests high-bandwidth memory (HBM) is also being thermally throttled.
    5. **The GPUs are thermal throttling; fixing airflow, repasting TIM, or limiting power to 700W will stabilize step times.**
