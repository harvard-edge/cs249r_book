title: Designing a Hardware-Agnostic Kernel Dispatch Layer
scenario: You are architecting an ML inference framework that must run the same model on H100 (CUDA),
  MI300X (ROCm), and TPU v5e (XLA) with <10% performance penalty vs native on each target. Design the
  kernel dispatch architecture.
details:
  realistic_solution: 'Use a three-tier architecture: (1) Frontend: hardware-agnostic operator graph (like
    ONNX or MLIR). (2) Middle-tier: per-backend kernel libraries with auto-tuned implementations (cuBLAS/CUTLASS
    for CUDA, rocBLAS/composable_kernel for ROCm, XLA HLO for TPU). (3) Dispatch layer: runtime selects
    the best kernel variant per-op based on shape, dtype, and backend. Key insight: the abstraction lives
    at the operator boundary, not inside the kernel. Each backend gets native kernels; only the dispatch
    logic is shared.'
  common_mistake: Building a single abstraction layer that maps to the lowest common denominator of all
    three backends, sacrificing hardware-specific optimizations like NVIDIA's TMA (Tensor Memory Accelerator)
    or AMD's MFMA instructions.
  napkin_math: 'Dispatch overhead per operator: ~1-5 microseconds (function pointer + shape lookup). For
    a model with 500 operators: 0.5-2.5ms total dispatch overhead. At 50ms total inference time, that
    is 1-5% overhead — well within the 10% budget.'
