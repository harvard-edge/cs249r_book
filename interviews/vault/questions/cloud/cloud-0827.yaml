title: The Cross-Node AllReduce Cost
scenario: You are training a 13B parameter model across 4 nodes (8 GPUs each, 32 total) connected by InfiniBand NDR (400 Gb/s = 50 GB/s per link). Gradients are in FP32.
question: What is the estimated ring AllReduce time, assuming cross-node InfiniBand is the bottleneck?
details:
  realistic_solution: 'About 2 seconds. Gradient size = 13B * 4 bytes = 52 GB. Ring AllReduce factor = 2*(32-1)/32 = 1.94. Total traffic per GPU = 1.94 * 52 = 100.8 GB. At 50 GB/s IB bandwidth: 100.8 / 50 = 2.0 seconds. This is why gradient compression and overlap with compute are critical at scale.'
  common_mistake: |
    **The Pitfall:** Using intra-node NVLink bandwidth instead of cross-node InfiniBand for the calculation.
    **The Rationale:** Engineers often default to the fastest interconnect listed on the spec sheet without mapping the communication pattern to the physical topology.
    **The Consequence:** The training step time is severely underestimated, leading to poorly tuned gradient accumulation bounds.
  napkin_math: |
    1. Calculate gradient size: 13B parameters * 4 bytes/param = 52 GB.
    2. Calculate Ring AllReduce volume multiplier: 2 * (N-1)/N = 2 * (31/32) ≈ 1.94.
    3. Calculate total traffic per GPU: 1.94 * 52 GB = 100.8 GB.
    4. Calculate transfer time: 100.8 GB / 50 GB/s bandwidth = **~2.02 seconds**.
  options:
  - A) ~50 ms
  - B) ~200 ms
  - C) ~2,000 ms
  - D) ~20,000 ms
  correct_index: 2
