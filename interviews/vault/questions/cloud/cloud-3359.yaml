title: Optimizing MoE Routing on NVIDIA H100 for Latency-Sensitive Inference
scenario: 'You are deploying a large Mixture of Experts (MoE) model (64 experts, top-2 routing) for a real-time inference service on H100 GPUs. While the H100s offer immense compute, the overall system throughput is not scaling linearly with the number of experts, and latency spikes occur under moderate load.'
question: "Why are H100 MoE throughput and latency scaling poorly, and how would you mitigate routing, capacity, and memory-bandwidth bottlenecks?"
details:
  realistic_solution: To mitigate this, implement a dynamic capacity factor mechanism that adapts to real-time load, preventing expert drops during peak traffic while optimizing resource usage during off-peak times. Employ expert parallelism strategies like 'expert-level data parallelism' or 'pipeline parallelism' to distribute experts efficiently across H100 GPUs. For instance, co-locate frequently accessed expert pairs on the same GPU or within the same NVLink domain to minimize inter-GPU communication. Utilize H100's Transformer Engine for FP8/FP16 acceleration. For memory-bound operations, optimize kernel fusion and data layouts. Consider a hierarchical routing strategy where a small, always-resident router on each H100 quickly identifies a subset of potential experts, with a secondary, more global router coordinating across nodes. Aggressively cache expert activations or sparse weights if memory allows, leveraging the HBM3's 3.35 TB/s bandwidth for fast access.
  common_mistake: |
    **The Pitfall:** Assuming that raw TFLOPs directly translate to MoE throughput, and statically setting expert capacity factors.
    **The Rationale:** Engineers treat MoE inference like dense inference, overlooking the network latency for inter-GPU expert communication and the memory-FLOPs decoupling.
    **The Consequence:** Frequent 'expert drops' (tokens skipped due to saturation) leading to severe generation degradation, or massive underutilization of compute due to memory bottlenecks.
  napkin_math: |
    1. **Memory-FLOPs Balance:** An H100 has 3.35 TB/s bandwidth. If an expert requires 5 GB of weights to be dynamically fetched, fetching for 2 experts takes (5 GB * 2) / 3.35 TB/s ≈ 2.98 ms.
    2. **Compute Comparison:** The 989 TFLOPS FP16 compute can perform ~3 Trillion operations in that same 2.98 ms window.
    3. **Conclusion:** If compute takes less than **~3 ms**, the system is bottlenecked by memory bandwidth, not compute FLOPs.
