title: Diagnosing HBM Underutilization in Sparse Feature Training on MI300X
scenario: You are optimizing a large-scale recommendation model's training pipeline on MI300X accelerators (192 GB HBM3, 5.3 TB/s bandwidth). Terabytes of sparse feature data are stored in S3 as row-partitioned zstd-compressed Parquet files. You observe high I/O wait times and 35% HBM3 underutilization.
question: Why is the MI300X training pipeline I/O-bound with zstd Parquet on S3, and what storage format strategy would fix it?
details:
  realistic_solution: '1. **Profile Data Access Patterns:** Confirm if the model truly accesses data in a columnar fashion (e.g., few specific features per training step) or if it effectively reconstructs full, sparse feature vectors (row-wise). 2. **Optimize Parquet Configuration:** If staying with Parquet, experiment with `row_group_size` and `page_size` to optimize for sparse data reads. Ensure predicate pushdown is being effectively utilized if filtering is common. Explore dictionary encoding for sparse categorical features. 3. **Re-evaluate Compression:** Given the HBM bandwidth, `zstd` (high compression, slower decompression) might be CPU-bound. Consider `lz4` (lower compression, faster decompression) or even uncompressed for features frequently accessed, if network bandwidth to S3 allows, shifting the bottleneck away from CPU. 4. **Consider ML-Optimized Formats:** For highly sparse, variable-length feature vectors, specialized formats like TFRecord (especially with sequence examples) or Apache Arrow Feather/IPC, which are designed for efficient serialization/deserialization into ML framework tensors and can leverage direct memory mapping, might offer better performance. These often reduce CPU overhead per record. 5. **Batching and Prefetching:** Optimize data loading pipelines to prefetch and batch data aggressively to keep the MI300X busy, potentially offloading some preprocessing to dedicated data loader workers.'
  common_mistake: |
    **The Pitfall:** Immediately suggesting a hardware upgrade (more S3 bandwidth or local NVMe).
    **The Rationale:** Seeing an "I/O wait" error and assuming the disk or network is too slow.
    **The Consequence:** Wasting time migrating data to faster storage mediums when the true bottleneck is single-thread host CPU decompression choking the pipeline.
  napkin_math: |
    - **HBM Target**: 5.3 TB/s × 35% util = **~1855 GB/s** effective data throughput needed.
    - **Decompression Bottleneck**: A single CPU core handles zstd decompression at ~0.5-1.5 GB/s.
    - **Host Limit**: Even a massive 64-core host CPU caps out at ~96 GB/s decompression.
    - **Result**: The CPU is completely bottlenecked trying to decompress 1855 GB/s of data using 96 GB/s of host capacity.
    - **Solution**: Switch to lz4 (faster decompression), uncompressed formats, or memory-mapped TFRecord/Arrow formats to bypass CPU overhead.
