title: Incomplete GPU Power Capacity Request
scenario: A research team requests 512 H100 GPUs for a 30-day run. Each GPU has 700 W TDP, but the team has not specified expected MFU, CPU/network power, cooling PUE, rack density, power caps, or whether the run can be shifted to lower-carbon hours.
question: What information is missing before approving power capacity for 512 H100s, and what minimum IT power can you compute?
details:
  realistic_solution: The minimum GPU IT power at TDP is 512 x 700 W = 358.4 kW before CPUs, networking, storage, and cooling overhead. Approval needs expected utilization, non-GPU node power, PUE, rack/cooling limits, power caps, and scheduling flexibility. Without those, both facility load and energy cost are under-specified.
  common_mistake: |
    **The Pitfall:** Reporting only the raw GPU TDP number as the final datacenter power requirement.
    **The Rationale:** ML researchers ignore the reality of PUE and non-GPU IT loads (CPUs, storage, networking fabrics).
    **The Consequence:** Severe facility under-provisioning, causing power trip breakers and datacenter-wide outages when the cluster comes online.
  napkin_math: |
    *   **Fleet:** 512 GPUs.
    *   **GPU TDP:** 700 W (0.7 kW).
    *   **Lower Bound Calculation:** 512 * 0.7 kW = 358.4 kW.
    *   **Facility Impact:** At PUE 1.2, power = 430 kW (excluding CPU/Network IT load).
    *   **Final Result:** **A minimum of 358.4 kW IT power is strictly required.**
