title: The Blue-Green Memory Tax (cloud-0083)
scenario: You are rolling out a new 7B parameter LLM for a customer support bot using a blue-green deployment strategy to ensure zero downtime. Both the old (blue) and new (green) model containers must run simultaneously in the Kubernetes cluster.
question: What minimum total FP16 weight memory is needed to run both 7B blue and green generator models during the overlap?
details:
  realistic_solution: A blue-green deployment requires running two full, independent copies of the service concurrently to allow for a seamless traffic switch. Therefore, we must calculate the memory for one model and then double it.
  common_mistake: |
    **The Pitfall:** Calculating the memory requirement for only a single model.
    **The Rationale:** A blue-green deployment by definition duplicates the entire service, doubling resource needs during switchover.
    **The Consequence:** The cluster runs out of VRAM and OOMs immediately upon deploying the green containers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B parameters. FP16 (2 bytes/param). Blue-Green strategy.
    2. **Calculations:**
       - Single Model Size: 7B * 2 bytes = 14 GB.
       - Total VRAM: 14 GB (Blue) + 14 GB (Green) = 28 GB.
    3. **Conclusion & Interpretation:**
       - **At least 28 GB of VRAM is required, necessitating a 32GB or larger GPU. Result: Memory-Bound.**
  options:
  - 14 GB (Calculates single model, forgets Blue-Green overlap)
  - 56 GB (Calculates 4 bytes/param for FP32 and doubles it)
  - 28 GB (Calculates 2 bytes/param for FP16 and doubles for Blue-Green)
  - 7 GB (Calculates 1 byte/param and forgets to double)
  correct_index: 2
