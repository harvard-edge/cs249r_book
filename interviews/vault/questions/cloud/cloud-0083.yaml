title: The Blue-Green Memory Tax (cloud-0083)
scenario: You are the ML Systems Engineer for a popular RAG-based customer support bot. The bot's generator
  is a 7B parameter LLM. Your team is rolling out an updated version of this model using a blue-green
  deployment strategy to ensure zero downtime and instant rollback capabilities. To do this, you must
  run both the old (blue) and new (green) model containers simultaneously in your Kubernetes cluster during
  the transition. Explain the memory implications of this strategy and calculate the minimum total memory
  required just for these two generator models during the deployment overlap, assuming they are both served
  in FP16 precision.
details:
  realistic_solution: A blue-green deployment requires running two full, independent copies of the service
    concurrently to allow for a seamless traffic switch. Therefore, we must calculate the memory for one
    model and then double it.
  common_mistake: The most common mistake is to calculate the memory requirement for only a single model,
    forgetting that a blue-green deployment by definition duplicates the entire service, doubling the
    peak resource requirement during the switchover. Another frequent error is using the wrong number
    of bytes per parameter, such as 4 for FP32 or 1 for INT8, instead of the correct 2 for FP16.
  napkin_math: Each 7B model in FP16 requires 7 billion * 2 bytes = 14 GB. A blue-green deployment means
    running both the v1 and v2 models concurrently on the same hardware during the switchover. Total VRAM
    for weights = 14 GB (Blue) + 14 GB (Green) = 28 GB. To support this on a single node, you need a GPU
    with >28GB VRAM, such as an A100 or V100 32GB.
  options:
  - 14 GB (Forgets to double for blue-green deployment)
  - 56 GB (Incorrectly uses 4 bytes/param for FP32 precision)
  - 28 GB
  - 7 GB (Incorrectly uses 1 byte/param and forgets to double)
  correct_index: 2
