title: Hierarchical Secure Aggregation Trade-offs
scenario: You are architecting the aggregation layer for a global Federated Learning pipeline training a 100M parameter NLP model. To prevent gradient inversion attacks, the system requires Secure Aggregation (SecAgg) using pairwise additive masking. You are evaluating two server-side architectures: Design A uses a single global SecAgg group of 5,000 clients per round. Design B partitions clients into 10 independent SecAgg subgroups of 500 clients each, followed by a final server-side plaintext aggregation. The edge devices have a historical 5% dropout rate during the 3-minute payload upload window.
question: Should the global FL aggregator use one 5,000-client SecAgg group or 10 groups of 500, and why?
details:
  realistic_solution: Design B is the optimal choice. By sharding into groups of 500, you reduce the server-side cryptographic reconstruction compute by a factor of 10x, preventing round timeouts, while maintaining an anonymity set (500) that remains cryptographically robust against the server or malicious clients.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on payload transfer bandwidth.
    **The Rationale:** Candidates immediately look at the 400MB gradient size and ignore the underlying cryptography.
    **The Consequence:** Completely failing to account for the quadratic O(U^2) server-side CPU cost of Shamir's Secret Sharing reconstruction needed to unmask dropped clients, leading to catastrophic server bottlenecks.
  napkin_math: |
    1. Design A (5000 clients, 5% drop = 250 drops): Computations scale as U_drop * U_survive = 250 × 4,750 = 1,187,500 operations.
    2. Design B (10 groups of 500, 5% drop = 25 drops per group): Each group requires 25 × 475 = 11,875 operations.
    3. Total across 10 groups = 10 * 11,875 = 118,750 operations.
    4. **Result: Server compute is reduced by exactly 10x, turning a potential 20-minute CPU bottleneck into a fast 2-minute recovery.**
