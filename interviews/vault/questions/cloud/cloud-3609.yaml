title: WUE and Water Efficiency Trade-off for Evaporative Cooling
scenario: A datacenter in an arid region uses evaporative cooling, achieving PUE=1.15
  but WUE (Water Usage Effectiveness) of 2.5 L/kWh. The datacenter consumes 10MW of
  IT load. Regulators cap water usage at 50,000 L/day. Analyze the constraint and
  determine the maximum allowable IT load given both PUE and WUE limits.
question: With WUE=2.5 L/kWh and a 50,000 L/day cap, what maximum IT load is allowed
  and what constraint dominates?
details:
  realistic_solution: 'Current water use: 10,000kW × 2.5 L/kWh = 25,000 L/hr = 600,000
    L/day >> 50,000 L/day cap. Constraint is WUE-limited. Max IT load: 50,000 L/day
    / 24hr / 2.5 L/kWh = 833 kW IT. Must reduce IT load from 10MW to 833kW (92% reduction)
    OR switch to mechanical cooling (higher PUE ~1.5 but WUE near zero). Mechanical
    cooling at 1.5 PUE: facility power=1.25MW, but no water constraint. Trade-off:
    pay 35% more in electricity to eliminate water constraint.'
  common_mistake: Optimizing only PUE as the efficiency metric; ignoring WUE constraints
    that may be more binding in water-scarce regions.
  napkin_math: 'WUE=2.5 L/kWh at 10MW IT → 25,000 L/hr × 24=600k L/day. Cap=50k L/day
    → max IT=10MW×(50k/600k)=833kW. Mechanical cooling: 0 L/day water, PUE=1.5 → 5MW
    overhead power. Total=15MW vs 11.5MW evaporative. +3.5MW extra power cost = 3500kW×$0.10/hr=$8.4k/day
    extra.'
