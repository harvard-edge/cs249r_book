title: WUE and Water Efficiency Trade-off for Evaporative Cooling
scenario: A datacenter in an arid region uses evaporative cooling, achieving PUE=1.15 but WUE (Water Usage Effectiveness) of 2.5 L/kWh. The datacenter consumes 10MW of IT load. Regulators cap water usage at 50,000 L/day.
question: With WUE=2.5 L/kWh and a 50,000 L/day cap, what maximum IT load is allowed and what constraint dominates?
details:
  realistic_solution: 'Current water use: 10,000kW × 2.5 L/kWh = 25,000 L/hr = 600,000 L/day >> 50,000 L/day cap. Constraint is WUE-limited. Max IT load: 50,000 L/day / 24hr / 2.5 L/kWh = 833 kW IT. Must reduce IT load from 10MW to 833kW (92% reduction) OR switch to mechanical cooling (higher PUE ~1.5 but WUE near zero). Mechanical cooling at 1.5 PUE: facility power=1.25MW, but no water constraint. Trade-off: pay 35% more in electricity to eliminate water constraint.'
  common_mistake: |
    **The Pitfall:** Optimizing exclusively for Power Usage Effectiveness (PUE) while ignoring Water Usage Effectiveness (WUE).
    **The Rationale:** Viewing electricity cost as the sole operational constraint and ignoring physical or regulatory resource limits.
    **The Consequence:** Violating strict water usage caps in arid regions, forcing mandatory, drastic reductions in IT compute load.
  napkin_math: |
    * **Current Water Use:** 10,000 kW * 2.5 L/kWh = 25,000 L/hr = 600,000 L/day.
    * **Regulatory Constraint:** Cap is 50,000 L/day (Current usage is 12x the limit).
    * **Max Allowed IT Load (Evaporative):** 50,000 L / 24 hr / 2.5 L/kWh = 833 kW.
    * **Alternative (Mechanical Cooling):** PUE=1.5, WUE=0 L/kWh. IT Load can remain 10MW, but total facility power increases from 11.5MW to 15MW.
    * **Conclusion:** **The WUE constraint dominates; you must pay for 3.5MW of extra power (mechanical cooling) to bypass the water limit.**
