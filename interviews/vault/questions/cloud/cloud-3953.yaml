title: NCCL Graph Capture for Reducing Communication Launch Overhead
scenario: Your training step has 200 small NCCL AllReduce calls (one per gradient bucket) with 50 microseconds launch overhead each. Total launch overhead is 10ms per step. CUDA Graphs can theoretically capture the training step including NCCL calls.
question: "What benefit does CUDA Graph capture provide for 200 small NCCL AllReduce calls, and what limitations must you handle?"
details:
  realistic_solution: 'CUDA Graph capture of NCCL calls: (1) Benefit: reduces per-call launch overhead from ~50us to ~5us (10x reduction). For 200 calls: 10ms -> 1ms. (2) Requirements: fixed tensor shapes (no dynamic batching), fixed process group (no elastic training), NCCL >= 2.18 with NCCL_COMM_NONBLOCKING=1. (3) Capture pattern: cudaStreamBeginCapture -> run forward + backward + AllReduce -> cudaStreamEndCapture -> replay. (4) Limitation: if batch size changes, the graph must be recaptured (100ms+ recapture cost). Strategy: capture graphs for your 2-3 most common batch sizes and switch at runtime. (5) Additional overlap benefit: CUDA Graphs eliminate CPU-side scheduling, making overlap more deterministic — GPU never waits for CPU to issue the next operation.'
  common_mistake: |
    **The Pitfall:** Assuming CUDA Graph capture works seamlessly with all NCCL calls.
    **The Rationale:** Developers often try to wrap PyTorch loops in CUDA Graphs without checking library compatibility.
    **The Consequence:** Failing to realize NCCL graphs require fixed shapes and communication patterns, leading to runtime crashes when dynamic batching occurs.
  napkin_math: |
    1. Without graphs: 200 × 50us = 10ms launch overhead per step.
    2. With graphs: 200 × 5us = 1ms.
    3. Savings: 9ms/step. At 300ms step time, this is a **3% throughput improvement**.
    4. Over 1000 steps: 9 seconds saved against a one-time capture cost of ~200ms.
