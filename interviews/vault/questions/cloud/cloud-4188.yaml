math_issues:
- The memory stall calculation (300 - 10*10) / 310 computes an idle time of 200 cycles,
  but the active time for 10 wavefronts is 100 cycles, leaving 210 idle cycles (310
  - 100). The stall should be 210 / 310 = 67.7%, not 64.5%.
