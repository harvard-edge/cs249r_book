title: Warp Scheduling and Latency Hiding
scenario: An MI300X CDNA3 SM has 4 SIMD units, each processing a 64-thread wavefront.
  A memory-bound kernel issues a global memory load (300 cycle latency) every 10 instructions.
  How many active wavefronts per SIMD unit are needed to fully hide the memory latency,
  and what limits achieving this in practice?
question: With 100 active cycles in a 310-cycle interval, what memory-stall fraction
  does the MI300X kernel experience?
details:
  realistic_solution: Stall fraction = (total - active) / total = (310 - 100) / 310
    = 210/310 = 67.7% (not 64.5%).
  common_mistake: Calculating the theoretical number of wavefronts needed but ignoring
    that wavefront count is limited by register file size, shared memory, and thread
    block size. You often cannot achieve the theoretical occupancy needed for full
    latency hiding.
  napkin_math: 'Memory stall calculation: active cycles = 100, total cycles = 310.
    Idle (stall) cycles = 310 - 100 = 210. Stall fraction = 210/310 = 67.7% (not 64.5%
    which uses 200 idle / 310 total = 64.5%, implying active=110 not 100).'
