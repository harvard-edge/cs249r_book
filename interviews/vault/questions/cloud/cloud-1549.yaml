title: Diagnosing Low Utilization in 100B DLRM
scenario: You are deploying a Deep Learning Recommendation Model (DLRM) with 100 billion parameters in
  its embedding tables (using FP16) to an instance with 8x A100 80GB GPUs. During load testing, P99 latency
  is unacceptably high, and GPU compute utilization (SM utilization) remains persistently under 15%. Profiling
  indicates the bottleneck is not the dense MLP layers. Analyze the root cause of the low utilization
  and excessive latency, and identify the limiting factor.
details:
  realistic_solution: Diagnose the system as a memory-capacity-bound workload. The 200GB embeddings require
    model parallelism across multiple GPUs. The low compute utilization occurs because embedding lookups
    are memory-bandwidth and capacity bound (fetching sparse rows with very low arithmetic intensity),
    not compute bound. The solution involves optimizing the embedding sharding (e.g., table-wise or row-wise)
    and using high-bandwidth NVLink for the necessary All-to-All communication.
  common_mistake: Assuming the low utilization is due to small batch sizes and attempting to increase
    batch size, or trying to optimize the dense MLP layers which are compute-intensive but not the actual
    bottleneck.
  napkin_math: 100B params * 2 bytes/param (FP16) = 200 GB memory required. 200 GB > 80 GB (single A100
    capacity), requiring at least 3 GPUs for weights. Arithmetic intensity of an embedding lookup is ~1
    FLOP / 2 Bytes = 0.5 FLOPs/Byte, which is far below the A100's ridge point of ~150 FLOPs/Byte, making
    the workload fundamentally memory-bound.
