title: Optimizing Cost-Performance on Google TPU v5e for LLM Inference
scenario: Your team is deploying a large language model (LLM) for real-time inference, and you've been tasked with evaluating the cost-performance trade-offs on Google TPU v5e. Each TPU v5e device has 16 GB HBM with 1.6 TB/s bandwidth and delivers 197 TFLOPS (BF16). You need to serve a model with 70 billion parameters, where each parameter is stored in BF16 format. The target is to achieve a P99 latency of 200 ms and a throughput of 1000 requests per second.
question: How would you estimate TPU v5e device count, device-hours, and cost to serve a 70B BF16 model at 200 ms P99 and 1000 QPS?
details:
  realistic_solution: "A realistic solution would involve: \n1. **Memory Capacity Check:** Calculate total model size (70B params * 2 bytes/param = 140 GB). Since each TPU v5e has 16 GB HBM, the model must be sharded across at least ceil(140/16) = 9 devices. \n2. **Bandwidth Consideration:** Evaluate if the 1.6 TB/s HBM bandwidth per device is sufficient for loading model weights during inference, considering activation sizes and KV cache. The total required bandwidth will increase with model parallelism. \n3. **FLOPs Estimation:** Estimate FLOPs per inference request (e.g., 2 * num_tokens * num_params for transformer-based LLMs). Factor in the 197 TFLOPS (BF16) per device. \n4. **Batching Strategy:** Determine an optimal batch size that maximizes TPU utilization without violating latency constraints. \n5. **Device Count & Cost:** Combine memory, bandwidth, and FLOPs requirements to determine the minimum number of devices. Multiply device count by expected runtime to get GPU-hours, then by the TPU v5e hourly cost (research current Google Cloud pricing for TPU v5e). Account for overheads and potential underutilization."
  common_mistake: |
    **The Pitfall:** Considering only FLOPs and ignoring memory capacity and bandwidth.
    **The Rationale:** Candidates focus entirely on the 197 TFLOPS compute metric, completely forgetting that large models are bottlenecked by HBM limits and model sharding requirements.
    **The Consequence:** Drastically underestimating the number of devices required, leading to budget failure and inability to load the model.
  napkin_math: |
    - **Memory Capacity:** 70B params * 2 bytes = 140 GB. TPU v5e has 16 GB HBM.
    - **Min Devices (Memory):** 140 GB / 16 GB = 8.75 → **9 devices.**
    - **FLOPs per Request:** 2 * 70B * 1000 tokens = 140 TFLOPs.
    - **Required Throughput:** 140 TFLOPs * 1000 QPS = 140,000 TFLOPS.
    - **Min Devices (Compute):** 140,000 / 197 TFLOPS/device = **~711 devices.**
    - **Result:** **Compute is the bottleneck. 711 devices are required to hit the 1000 QPS target.**
