title: Optimizing Cost-Performance on Google TPU v5e for LLM Inference
scenario: Your team is deploying a large language model (LLM) for real-time inference,
  and you've been tasked with evaluating the cost-performance trade-offs on Google
  TPU v5e. Each TPU v5e device has 16 GB HBM with 1.6 TB/s bandwidth and delivers
  197 TFLOPS (BF16). You need to serve a model with 70 billion parameters, where each
  parameter is stored in BF16 format. The target is to achieve a P99 latency of 200
  ms and a throughput of 1000 requests per second. Given the constraints of HBM capacity
  and bandwidth, how would you estimate the number of TPU v5e devices required and
  the associated GPU-hours and dollar cost, considering both model loading and inference
  FLOPs?
question: How would you estimate TPU v5e device count, device-hours, and cost to serve
  a 70B BF16 model at 200 ms P99 and 1000 QPS?
details:
  realistic_solution: "A realistic solution would involve: \n1. **Memory Capacity\
    \ Check:** Calculate total model size (70B params * 2 bytes/param = 140 GB). Since\
    \ each TPU v5e has 16 GB HBM, the model must be sharded across at least ceil(140/16)\
    \ = 9 devices. \n2. **Bandwidth Consideration:** Evaluate if the 1.6 TB/s HBM\
    \ bandwidth per device is sufficient for loading model weights during inference,\
    \ considering activation sizes and KV cache. The total required bandwidth will\
    \ increase with model parallelism. \n3. **FLOPs Estimation:** Estimate FLOPs per\
    \ inference request (e.g., 2 * num_tokens * num_params for transformer-based LLMs).\
    \ Factor in the 197 TFLOPS (BF16) per device. \n4. **Batching Strategy:** Determine\
    \ an optimal batch size that maximizes TPU utilization without violating latency\
    \ constraints. \n5. **Device Count & Cost:** Combine memory, bandwidth, and FLOPs\
    \ requirements to determine the minimum number of devices. Multiply device count\
    \ by expected runtime to get GPU-hours, then by the TPU v5e hourly cost (research\
    \ current Google Cloud pricing for TPU v5e). Account for overheads and potential\
    \ underutilization."
  common_mistake: A common mistake is to only consider FLOPs for computation and ignore
    the impact of memory bandwidth and capacity, especially for large models. Overlooking
    the need for model sharding across devices due to HBM limits, or underestimating
    the I/O cost of loading model weights, can lead to significant cost overruns or
    missed performance targets. Another error is not accounting for idle time due
    to data transfer or batching strategies.
  napkin_math: Assuming a 70B parameter model in BF16 (2 bytes/param), total model
    size is 140 GB. Each TPU v5e has 16 GB HBM. So, minimum devices for model storage
    = 140 GB / 16 GB/device = 8.75. Therefore, at least 9 TPU v5e devices are needed
    just for memory capacity. If each inference requires, say, 200 FLOPs per parameter
    per token (simplified), and 1000 tokens are generated per request, then each request
    is ~2 * 70B * 1000 = 140T FLOPs. With 1000 requests/second, total FLOPs = 140,000
    TFLOPs/s. Each v5e provides 197 TFLOPS. Total devices for compute = 140,000 /
    197 ≈ 710 devices. This huge discrepancy highlights the need for careful optimization,
    potentially using techniques like sparsity, quantization, and efficient batching,
    or a different hardware configuration. The highest number of devices (710) would
    be the bottleneck, therefore, we would need 710 devices. Total GPU-hours = 710
    devices * (desired uptime in hours). Cost = GPU-hours * hourly_rate_v5e.
