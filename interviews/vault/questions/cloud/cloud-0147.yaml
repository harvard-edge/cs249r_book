title: 'The Throttling Dilemma: Per-User vs. Global Queueing'
scenario: You are designing the queueing and rate-limiting architecture for a new multi-tenant LLM API. The system must provide fair service and prevent a single 'power user' from degrading performance for others. You need to analyze the latency implications of two different designs under a 'thundering herd' scenario where one user submits a large burst of requests.
question: How do global FIFO and per-user fair queuing differ under a burst from one power user in a multi-tenant LLM API?
details:
  realistic_solution: 'Under a global FIFO queue, a single user bursting 100 requests monopolizes the system for 100/100 = 1 second. All other users experience up to 1 second of added latency. With per-user fair queuing (e.g., weighted fair queuing with token buckets), each user gets a proportional share. A burst from one user fills only their queue; other users'' requests are served from their own queues at the normal rate. The key insight: per-user queuing bounds the worst-case impact of any single user to their own queue, converting a systemic latency spike into a localized one.'
  common_mistake: |
    **The Pitfall:** Relying solely on a global queue to maximize total throughput.
    **The Rationale:** Candidates assume that overall system throughput is the only metric, ignoring variance in wait times and fairness.
    **The Consequence:** A single power user can easily saturate the system, causing extreme tail latency and service degradation for all other users.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival rate λ = 20 req/s.
       - Service rate μ = 100 req/s.
       - Burst of 500 requests from one user.
    2. **Calculations:**
       - Baseline queue wait time: W = (λ/μ) / (μ - λ) = 0.2 / 80 = 2.5ms.
       - Processing time for burst: 500 requests / 100 req/s = 5 seconds.
    3. **Conclusion & Interpretation:** **In a global FIFO, other users face up to 5 seconds of queue delay**. Result: **Queue-Bound**.
