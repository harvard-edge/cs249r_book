title: Recall Systolic Array Weight-Stationary Dataflow
scenario: 'You are analyzing dataflow in a weight-stationary systolic array like the original TPU v1 (256x256 MAC array). A 256x256 weight matrix W is applied to a batch of 64 input vectors x.'
question: In a weight-stationary 256x256 systolic array, what data stays stationary, how many times are weights read for a batch of 64 inputs, and how does this compare to naive execution?
details:
  realistic_solution: 'In a weight-stationary dataflow, the weight matrix is loaded once and stays stationary in the array''s registers. The inputs flow across the array, and partial sums accumulate through it. For a batch of 64, each weight element is read from memory exactly once. A naive GEMM would read the weights 64 times (once per input vector), so the systolic array reduces weight memory traffic by 64x.'
  common_mistake: |
    **The Pitfall:** Confusing weight-stationary with output-stationary dataflow.
    **The Rationale:** In weight-stationary, weights are loaded once and held in register files while inputs flow through, but outputs accumulate across multiple input vectors.
    **The Consequence:** Miscalculating the memory bandwidth requirements for different matrix operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weight-stationary systolic array (256x256 MACs).
    - Weight matrix W is 256x256.
    - Batch size = 64 input vectors.

    **Calculations:**
    - Weight matrix size: 256 * 256 = 65,536 elements.
    - Weight-stationary total weight memory reads: 65,536 elements (loaded exactly once into registers).
    - Naive execution total weight memory reads: 65,536 * 64 = 4,194,304 elements (read once per input vector).
    - Traffic reduction ratio: 4,194,304 / 65,536 = 64.

    **Conclusion & Interpretation:**
    - **Result: 64x Reduction (Memory-Bound)**. Weight-stationary architectures drastically reduce off-chip memory traffic by keeping weights pinned in spatial registers, scaling linearly with batch size.
