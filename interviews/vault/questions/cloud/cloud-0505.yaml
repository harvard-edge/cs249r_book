title: The Profiling Crisis
scenario: 'You''ve deployed a custom recommendation model. The profiling dashboard shows you are achieving 120 TFLOPS out of a possible 989 TFLOPS on your H100 GPU. Your tech lead suggests buying a faster GPU to fix the latency.'
question: 'Why is your tech lead wrong to suggest buying a faster GPU when achieving 120 TFLOPS out of 989 peak?'
details:
  realistic_solution: 'The tech lead hasn''t checked the Arithmetic Intensity (Ops/Bytes). The model achieves 120 TFLOPS on an H100 with 989 TFLOPS peak — only 12% utilization. This implies the workload''s arithmetic intensity ≈ 120 / 3.35 = 36 Ops/Byte, which is far below the H100''s ridge point of 295 Ops/Byte. The workload is memory-bandwidth-bound. A faster GPU with 1,500 TFLOPS peak but the same 3.35 TB/s bandwidth would still cap at 36 × 3.35 = 120 TFLOPS — identical performance. The correct fix is either: (1) increase memory bandwidth (e.g., upgrade to a GPU with more HBM bandwidth), (2) reduce bytes moved per operation (quantize weights), or (3) increase arithmetic intensity by batching more requests.'
  common_mistake: |
    **The Pitfall:** Assuming the GPU isn't fully utilized because it's starved for compute.
    **The Rationale:** Candidates see low TFLOPS utilization and blindly assume throwing more ALUs at the problem will help.
    **The Consequence:** Purchasing incredibly expensive compute upgrades that yield exactly zero latency improvements because the workload is memory-bound.
  napkin_math: |
    - **H100 Ridge Point:** 989 TFLOPS / 3.35 TB/s = 295 Ops/Byte.
    - **Observed Utilization:** 120 TFLOPS / 989 = 12% compute utilized.
    - **Estimated Intensity:** 120 TFLOPS / 3.35 TB/s = 36 Ops/Byte.
    - **Analysis:** 36 << 295, meaning the workload is heavily memory-bound.
    - **Result:** A faster 1,500 TFLOPS GPU with the same memory bandwidth **will still cap at 120 TFLOPS**.
