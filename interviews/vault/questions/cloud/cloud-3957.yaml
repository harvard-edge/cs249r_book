title: Weight Update Sharding with Overlapped AllGather in FSDP2
scenario: PyTorch FSDP2 (Fully Sharded Data Parallel v2) uses a ReduceScatter-then-AllGather pattern instead of AllReduce. After backward, gradients are reduce-scattered, each GPU updates its parameter shard locally, then AllGather broadcasts updated parameters.
question: "What overlap opportunities exist in FSDP2's ReduceScatter, local optimizer, and AllGather pipeline?"
details:
  realistic_solution: 'FSDP2 overlap pipeline per layer: (1) ReduceScatter(layer L gradients) -> each GPU has its gradient shard. (2) Optimizer step on shard (local, no communication). (3) AllGather(layer L updated params) -> all GPUs have full updated layer. Overlap opportunities: (a) ReduceScatter(L) overlaps with backward compute for layer L-1. (b) Optimizer step for layer L overlaps with ReduceScatter(L-1). (c) AllGather(L) overlaps with optimizer step for L-1 and ReduceScatter(L-2).'
  common_mistake: |
    **The Pitfall:** Thinking ReduceScatter and AllGather are equivalent in overlap opportunity.
    **The Rationale:** Candidates lump all collective communication together without tracking data dependencies.
    **The Consequence:** They fail to pipeline operations correctly, leading to serialization and poor scaling efficiency.
  napkin_math: |
    1. Per layer: RS 1.5 ms, optimizer 0.5 ms, AG 1.5 ms, backward 5 ms. Serial = 8.5 ms.
    2. Pipelined depth: RS(L) || optimizer(L+1) || AG(L+2) || backward(L-1).
    3. Pipelined step time approaches max(1.5, 0.5, 1.5, 5) = 5 ms.
    4. **For 80 layers: serial takes 680 ms, pipelined takes 400 ms, yielding a 1.7x speedup.**
