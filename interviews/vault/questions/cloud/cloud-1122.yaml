title: Evaluating Demographic Parity Trade-offs in Cloud Resume Screening
scenario: 'You are designing a cloud-based automated resume screening ML service processing 500,000 applications
  monthly. The historical data shows differing base qualification rates: the majority demographic (Group
  M, 400k applicants) has a 25% qualification rate, while the minority demographic (Group N, 100k applicants)
  has a 10% qualification rate. Legal and compliance teams mandate enforcing strictly equal Demographic
  Parity (approving the exact same percentage of applicants from both groups) to avoid disparate impact.
  Evaluate the systemic trade-offs of post-processing the model outputs to achieve Demographic Parity,
  specifically focusing on the impact on the system''s Precision and Equal Opportunity metrics.'
details:
  realistic_solution: Explain that Demographic Parity requires equal positive prediction rates $P(\hat{Y}=1
    | A=a) = P(\hat{Y}=1 | A=b)$ regardless of the ground truth $Y$. If base rates differ fundamentally
    (25% vs 10%), enforcing parity requires drastically lowering the decision threshold for Group N. Justify
    that while this satisfies compliance, it irreparably harms Precision for Group N and violates Equal
    Opportunity (since the True Positive Rates will diverge). Recommend shifting the metric to Equal Opportunity
    (equal True Positive Rates) to ensure equally qualified candidates have the same chance of being hired,
    while pushing the business to fix the pipeline sourcing disparity rather than masking it algorithmically.
  common_mistake: Assuming that enforcing Demographic Parity will simultaneously improve fairness and
    precision for the minority group, without realizing it mathematically forces the model to accept unqualified
    candidates if the underlying base rates of qualification differ.
  napkin_math: Assume the system enforces a 20% approval rate across both groups. For Group M (400k),
    80k are approved; since there are 100k (25%) truly qualified, the system can achieve up to 100% precision
    (80k/80k). For Group N (100k), 20k must be approved; however, there are only 10k (10%) truly qualified
    candidates. The system MUST accept at least 10k unqualified candidates to meet the quota. Max precision
    for Group N plummets to 50% (10k/20k), actively degrading the utility of the screening for that demographic.
