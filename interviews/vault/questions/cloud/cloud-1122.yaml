title: Evaluating Demographic Parity Trade-offs in Cloud Resume Screening
scenario: You are designing a cloud-based automated resume screening ML service processing 500,000 applications monthly. The historical data shows differing base qualification rates: the majority demographic (Group M, 400k applicants) has a 25% qualification rate, while the minority demographic (Group N, 100k applicants) has a 10% qualification rate. Legal and compliance teams mandate enforcing strictly equal Demographic Parity (approving the exact same percentage of applicants from both groups) to avoid disparate impact.
question: What happens to Precision and Equal Opportunity if you enforce strict Demographic Parity despite Group M and Group N having 25% vs 10% base rates?
details:
  realistic_solution: Explain that Demographic Parity requires equal positive prediction rates $P(\hat{Y}=1 | A=a) = P(\hat{Y}=1 | A=b)$ regardless of the ground truth $Y$. If base rates differ fundamentally (25% vs 10%), enforcing parity requires drastically lowering the decision threshold for Group N. Justify that while this satisfies compliance, it irreparably harms Precision for Group N and violates Equal Opportunity (since the True Positive Rates will diverge). Recommend shifting the metric to Equal Opportunity (equal True Positive Rates) to ensure equally qualified candidates have the same chance of being hired, while pushing the business to fix the pipeline sourcing disparity rather than masking it algorithmically.
  common_mistake: |
    **The Pitfall:** Assuming that enforcing Demographic Parity will simultaneously improve fairness and precision for the minority group.
    **The Rationale:** Stakeholders conflate equal outcomes (Demographic Parity) with equal accuracy, not realizing that fixed base rate differences force the model to behave irrationally.
    **The Consequence:** The model is mathematically forced to accept unqualified candidates from the minority group, tanking precision and setting those candidates up for failure.
  napkin_math: |
    1. **Parity Enforced:** System enforces a 20% approval rate across both groups.
    2. **Group M (400k):** 80k approved. 100k (25%) are truly qualified. Max precision = 80k/80k = 100%.
    3. **Group N (100k):** 20k approved. Only 10k (10%) are truly qualified.
    4. **False Positives:** System MUST accept at least 10k unqualified Group N candidates. Max precision for Group N: 10k/20k = 50%.
    5. **Conclusion:** **Enforcing Demographic Parity on skewed base rates actively degrades the utility and precision of the screening for the minority group.**
