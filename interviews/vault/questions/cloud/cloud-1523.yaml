title: Analyzing Catastrophic Forgetting in LLM Unlearning
scenario: Your team maintains a 70B parameter LLM. A legal compliance request requires unlearning a 5GB text corpus (~1.2B tokens). Retraining from scratch on your 512 H100 cluster would cost $1.5M and take 30 days. The ML team attempted an approximate unlearning pipeline by applying gradient ascent on the forgotten dataset for 1,500 steps. The model successfully 'forgot' the data, but regression tests show the general MMLU score collapsed from 72% to 47%.
question: Why did gradient-ascent unlearning collapse MMLU from 72% to 47%, and what loss term is missing?
details:
  realistic_solution: Diagnose the failure as missing a 'retain' anchor. Modify the unlearning loss function to include a regularization term (e.g., KL divergence or standard descent) computed over a 'retain set' of the original training data to constrain weight updates.
  common_mistake: |
    **The Pitfall:** Believing that gradient ascent on a specific subset only removes features unique to that subset.
    **The Rationale:** It seems intuitive that simply moving in the opposite gradient direction unlearns only that exact data.
    **The Consequence:** Unbounded gradient ascent causes destructive interference with entangled network representations, catastrophically destroying the model's general capabilities (MMLU collapse).
  napkin_math: |
    *   Fixing this requires a joint loss: L = Ascent(D_forget) + Descent(D_retain).
    *   Processing 1.2B forget tokens + 1.2B retain tokens = 2.4B total tokens.
    *   Compute: 6 × 70B params × 2.4B tokens ≈ 1.008e21 FLOPs.
    *   512 H100s at 150 TFLOPs effective: 1.008e21 / (512 × 150e12) = 13,125 seconds (~3.6 hours).
    *   **Result: This 3.6-hour anchored unlearning avoids the $1.5M, 30-day full retrain while rescuing model performance.**
