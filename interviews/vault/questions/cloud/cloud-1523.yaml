title: Analyzing Catastrophic Forgetting in LLM Unlearning
scenario: Your team maintains a 70B parameter LLM. A legal compliance request requires unlearning a 5GB
  text corpus (~1.2B tokens). Retraining from scratch on your 512 H100 cluster would cost $1.5M and take
  30 days. The ML team attempted an approximate unlearning pipeline by applying gradient ascent on the
  forgotten dataset for 1,500 steps. The model successfully 'forgot' the data, but regression tests show
  the general MMLU score collapsed from 72% to 47%. Analyze the root cause of this failure and identify
  the missing mechanism in the unlearning loss formulation.
details:
  realistic_solution: Diagnose the failure as missing a 'retain' anchor. Modify the unlearning loss function
    to include a regularization term (e.g., KL divergence or standard descent) computed over a 'retain
    set' of the original training data to constrain weight updates.
  common_mistake: Believing that gradient ascent on a specific subset only removes features unique to
    that subset, without realizing that dense parameter updates destructively interfere with entangled
    representations essential for general capabilities.
  napkin_math: 'Compute overhead for joint loss: L = Ascent(D_forget) + Descent(D_retain). Processing
    1.2B forget + 1.2B retain tokens (2.4B total) requires 6 * 70B * 2.4B = ~1.008e21 FLOPs. On 64 H100s
    achieving 150 TFLOPs/sec: 1.008e21 / (64 * 150e12) = 105,000 seconds (~29 hours). This avoids the
    30-day full retraining while rescuing MMLU.'
