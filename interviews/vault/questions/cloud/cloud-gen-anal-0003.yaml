title: Analyzing Training Time Overhead of Gradient Checkpointing
scenario: You are monitoring a model training job on a single A100 GPU (80 GB HBM2e, 312 TFLOPS FP16).
  Without gradient checkpointing, a single training step takes 300ms, divided into 100ms for the forward
  pass and 200ms for the backward pass. When the team enables full gradient checkpointing to reduce memory
  usage, the activation memory footprint drops drastically, but the total time for a single training step
  increases to exactly 400ms. Explain why the total step time increases by exactly 100ms, and describe
  the specific compute-memory tradeoff that causes this behavior.
question: "Why does full gradient checkpointing add exactly 100 ms to the training step, and what compute-memory tradeoff causes it?"
details:
  realistic_solution: The exact 100ms increase occurs because full gradient checkpointing discards intermediate
    activations during the initial forward pass to save memory. During the backward pass, these activations
    are required to compute gradients, so the GPU must recompute the forward pass from the saved checkpoints.
    Since the original forward pass takes 100ms, recomputing it adds exactly 100ms of pure compute time.
    The tradeoff is burning additional compute cycles to significantly reduce peak HBM capacity requirements.
  common_mistake: Candidates often assume the 100ms overhead comes from PCIe data transfer, CPU-GPU synchronization,
    or memory allocation overhead. They may fail to understand that gradient checkpointing explicitly
    drops activations and must re-run the forward pass math during the backward phase to recreate them.
  napkin_math: Original Step Time = Forward_Time + Backward_Time = 100ms + 200ms = 300ms. Checkpointed
    Step Time = Forward_Time + (Recompute_Forward_Time + Backward_Time) = 100ms + (100ms + 200ms) = 400ms.
    Total Overhead = Checkpointed_Step_Time - Original_Step_Time = 400ms - 300ms = 100ms (which equals
    exactly 1x Forward_Time).
