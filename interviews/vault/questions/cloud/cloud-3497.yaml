title: 'A100 Model Deployment: Canary Release with Latency Budget'
scenario: You are managing the deployment of a critical LLM inference service currently served by a fleet of NVIDIA A100 GPUs handling 1,000,000 QPS. Each A100 handles 500 QPS with a P99 latency of 50ms. A new optimized LLM achieves a 20% latency reduction on the same hardware. You employ a canary deployment directing 5% of traffic to the new model, with a strict P99 latency budget of 55ms.
question: How many NVIDIA A100 GPUs would you need to provision for the canary cluster to handle its allocated traffic while respecting the performance improvements and latency budget?
details:
  realistic_solution: 'Determine the traffic directed to the canary, then determine the improved QPS handling capacity of each A100. By correctly modeling latency reduction as a throughput multiplier (1 / (1 - reduction)), you can accurately size the canary cluster without violating SLAs or over-provisioning.'
  common_mistake: |
    **The Pitfall:** Equating a 20% latency reduction to a linear 20% throughput increase.
    **The Rationale:** It is an intuitive arithmetic error to apply the reduction percentage directly to the inverse metric.
    **The Consequence:** Miscalculating GPU requirements, leading to either under-provisioning (which violates the latency SLA) or over-provisioning (which wastes expensive hardware).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 500 QPS/A100.
       - Canary traffic: 5% of 1,000,000 = 50,000 QPS.
       - Latency reduction: 20%.
    2. **Calculations:**
       - Throughput multiplier = 1 / (1 - 0.20) = 1.25x.
       - New QPS per A100 = 500 * 1.25 = 625 QPS.
       - GPUs required = 50,000 / 625 = 80 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: 80 GPUs needed.** A 20% latency drop equals a 25% throughput increase, altering provisioning math.
