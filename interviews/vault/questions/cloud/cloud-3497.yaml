title: 'A100 Model Deployment: Canary Release with Latency Budget'
scenario: You are managing the deployment of a critical Large Language Model (LLM)
  inference service. The current model is served by a large fleet of NVIDIA A100 GPUs
  (80 GB HBM2e memory, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth, 400W TDP) and handles
  a total production load of 1,000,000 queries per second (QPS). Each individual A100
  GPU in the existing fleet can handle 500 QPS for the current model, with a 99th
  percentile latency of 50ms. A new, optimized version of the LLM is ready for deployment.
  Benchmarks suggest this new version can achieve a 20% reduction in inference latency
  compared to the old model when running on the same A100 hardware at equivalent QPS.
  You decide to employ a canary deployment strategy, directing 5% of the total production
  traffic to the new model, while maintaining a strict overall system 99th percentile
  latency budget of 55ms. How many NVIDIA A100 GPUs would you need to provision for
  the canary cluster to handle its allocated traffic while respecting the performance
  improvements and latency budget? Provide the calculation and the final number.
question: How many NVIDIA A100 GPUs would you need to provision for the canary cluster
  to handle its allocated traffic while respecting the performance improvements and
  latency budget?
details:
  realistic_solution: "To determine the number of A100 GPUs for the canary cluster,\
    \ we first calculate the traffic directed to the canary. Then, we determine the\
    \ improved QPS handling capacity of each A100 with the new model.\n\n1.  **Calculate\
    \ Canary Traffic:**\n    Total Production QPS = 1,000,000 QPS\n    Canary Traffic\
    \ Percentage = 5%\n    Canary QPS = Total Production QPS * Canary Traffic Percentage\
    \ = 1,000,000 * 0.05 = 50,000 QPS\n\n2.  **Calculate New Model QPS per A100 (considering\
    \ latency reduction as throughput gain):**\n    Original QPS per A100 = 500 QPS\n\
    \    Latency Reduction = 20% (or 0.2)\n    The throughput increase factor due\
    \ to latency reduction is `1 / (1 - Latency Reduction)`.\n    Throughput Increase\
    \ Factor = 1 / (1 - 0.20) = 1 / 0.8 = 1.25\n    New Model QPS per A100 = Original\
    \ QPS per A100 * Throughput Increase Factor = 500 QPS * 1.25 = 625 QPS/A100\n\n\
    3.  **Calculate Number of Canary A100 GPUs:**\n    Number of Canary A100s = Canary\
    \ QPS / New Model QPS per A100\n    Number of Canary A100s = 50,000 QPS / 625\
    \ QPS/A100 = 80 GPUs\n\nTherefore, 80 NVIDIA A100 GPUs would be needed for the\
    \ canary cluster to handle its allocated traffic while leveraging the 20% latency\
    \ improvement."
  common_mistake: A common mistake is to only consider QPS capacity without accounting
    for the latency distribution (e.g., 99th percentile) which is crucial for real-time
    services. Another pitfall is neglecting the potential increased throughput of
    the new model due to latency optimizations, or miscalculating how latency reduction
    translates to increased QPS capacity per GPU. Simply equating 20% latency reduction
    to 20% throughput increase is inaccurate, as throughput scales with 1/(1-latency_reduction).
  napkin_math: '1.  Canary traffic: 5% of 1,000,000 QPS = 50,000 QPS.

    2.  New model throughput per A100: 20% latency reduction means each A100 can handle
    1 / (1 - 0.2) = 1.25x the traffic. So, 500 QPS/A100 * 1.25 = 625 QPS/A100.

    3.  Canary A100s needed: 50,000 QPS / 625 QPS/A100 = 80 GPUs.'
