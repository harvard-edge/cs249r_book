title: Graceful Decode Node Failure During Generation
scenario: A decode GPU fails mid-generation for 200 in-flight sequences. You want to recover without dropping requests and with minimal TPOT disruption. The KV-cache for all 200 sequences was only on the failed GPU's HBM.
question: How would you recover 200 in-flight sequences after a decode GPU failure, and what state should be checkpointed at what frequency?
details:
  realistic_solution: 'KV-cache is decomposable: prompt KV + generation KV. Prompt KV can always be regenerated by re-running prefill on the original prompt (which is stored in the request router). Generation KV for tokens already emitted can be regenerated by re-running decode on those tokens deterministically (temperature=0) or stored as compressed token IDs. Checkpoint strategy: store generated token IDs (not KV-cache) to a low-latency key-value store (e.g., Redis on the same rack) every 10 tokens.'
  common_mistake: |
    **The Pitfall:** Checkpointing the full KV-cache every N tokens.
    **The Rationale:** It's the simplest way to resume generation.
    **The Consequence:** Writing GBs of data per second floods the network; it's much smarter to recognize that prefill can be replayed cheaply and only token IDs need checkpointing.
  napkin_math: |
    - 1. **Token ID Checkpointing:** 200 seqs × 100 generated tokens × 2 bytes = 40 KB state.
    - 2. **Incremental Bandwidth:** Checkpointing every 10 tokens at 50 tok/s = 5 checkpoints/s. 200 seqs × 50 tok/s × 2 bytes/tok = **20 KB/s total bandwidth**.
    - 3. **KV Cache Checkpointing (Alternative):** 200 seqs × 192 MB = 38.4 GB. At 5 checkpoints/s = **192 GB/s (saturates network)**.
