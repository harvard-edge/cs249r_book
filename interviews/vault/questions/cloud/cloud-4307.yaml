title: Graceful Decode Node Failure During Generation
scenario: A decode GPU fails mid-generation for 200 in-flight sequences. You want
  to recover without dropping requests and with minimal TPOT disruption. The KV-cache
  for all 200 sequences was only on the failed GPU's HBM. Design a fault-tolerance
  architecture for decode nodes that allows recovery, specifying what state must be
  checkpointed, at what frequency, and what the recovery latency looks like.
question: How would you recover 200 in-flight sequences after a decode GPU failure,
  and what state should be checkpointed at what frequency?
details:
  realistic_solution: 'KV-cache is decomposable: prompt KV + generation KV. Prompt
    KV can always be regenerated by re-running prefill on the original prompt (which
    is stored in the request router). Generation KV for tokens already emitted can
    be regenerated by re-running decode on those tokens deterministically (temperature=0)
    or stored as compressed token IDs. Checkpoint strategy: store generated token
    IDs (not KV-cache) to a low-latency key-value store (e.g., Redis on the same rack)
    every 10 tokens. Token IDs for 200 sequences × max 2000 tokens × 2 bytes = 800
    KB — trivially small. On failure: (1) Router detects decode node down via heartbeat
    (<1 s). (2) Recovery node loads model weights (90 s cold start, or 0 s if warm
    standby). (3) Re-runs prefill for all 200 prompts on prefill nodes (parallel,
    200 × ~10 ms = 10 ms if batched). (4) Re-runs decode for checkpointed tokens (deterministic,
    fast — same as normal decode). Total recovery: 90 s cold / 5 s warm (prefill replay)
    + decode replay time. Warm standby decode node reduces to ~15 s recovery.'
  common_mistake: Checkpointing the full KV-cache every N tokens — this floods the
    network. The smarter approach is to recognize that prefill can be replayed cheaply
    and only the incremental generated tokens need checkpointing.
  napkin_math: '200 sequences, avg 100 generated tokens each at checkpoint: 200 ×
    100 tokens × 2 bytes = 40 KB checkpoint. Checkpointing every 10 tokens at 50 tok/s
    per sequence: 5 checkpoints/s per sequence × 200 sequences = 1000 checkpoint writes/s.
    At 40 KB each cumulative: steady-state checkpoint write rate = 200 seq × 10 tokens
    × 2 bytes / 10 steps = 400 bytes/s per sequence — negligible. Full KV checkpoint
    (alternative): 200 × 192 MB = 38.4 GB every 10 tokens — 38.4 GB / 10 tokens ×
    50 tok/s = 192 GB/s — saturates all available bandwidth. Token ID checkpoint:
    4000× cheaper. On MI300X with 192 GB HBM: KV pool ≈ 52 GB per GPU → 52 GB / 192
    MB per request = 270 concurrent sequences before any preemption is needed — 10×
    more than H100 before swap pressure occurs.'
