title: The Latency Budget Breach
scenario: Our new recommendation model is performing well in terms of accuracy, but when deployed to a
  resource-constrained environment (e.g., mobile device, edge IoT gateway, or a serverless function with
  strict cold-start latency), it consistently breaches our 50ms inference latency budget. The model is
  a standard ResNet-like architecture. How would you approach optimizing it for this strict latency constraint
  without a complete re-architecture?
details:
  realistic_solution: "For strict latency budgets on resource-constrained environments, **model quantization**\
    \ is a highly effective technique to reduce model size and inference time with minimal accuracy loss.\n\
    \    1.  **Post-Training Quantization (PTQ):** Convert the trained FP32 model weights and activations\
    \ to lower precision (e.g., INT8) without retraining. This is typically the fastest to implement.\n\
    \        *   **Dynamic Range Quantization:** Quantize only weights to INT8, activations remain FP32\
    \ and are quantized on the fly. Good for CPU.\n        *   **Static Quantization:** Requires a calibration\
    \ dataset to determine activation ranges for INT8 conversion. Offers better performance than dynamic,\
    \ suitable for specialized hardware (TPUs, mobile NPUs).\n    2.  **Quantization-Aware Training (QAT):**\
    \ Simulate the effects of quantization during training. This often yields higher accuracy than PTQ\
    \ but requires modifying the training pipeline.\n    3.  **Model Pruning:** Remove redundant connections\
    \ or neurons.\n    4.  **Knowledge Distillation:** Train a smaller \"student\" model to mimic the\
    \ behavior of the larger \"teacher\" model.\n    5.  **Optimized Runtimes:** Utilize inference runtimes\
    \ like ONNX Runtime, OpenVINO, or TensorFlow Lite, which are optimized for quantized models and specific\
    \ hardware."
  common_mistake: '"We need to use a more powerful CPU/GPU." This might be true if the current hardware
    is severely underpowered, but often the solution lies in optimizing the model itself or its runtime
    rather than throwing more expensive hardware at the problem, especially in resource-constrained or
    serverless environments where costs scale.'
  napkin_math: A typical FP32 model might require `4 bytes` per parameter, while an INT8 model needs only
    `1 byte`. This reduces memory footprint by 4x and can offer significant speedups (2-4x) on hardware
    with INT8 support.
