title: Diagnosing Attribution Collapse in Interleaved RecSys
scenario: An e-commerce platform is evaluating a new embedding-based retrieval model against a legacy
  BM25 model. In standard A/B testing (100k users), the neural model shows a +1.5% conversion lift. However,
  in a Team Draft Interleaving experiment combining both models' top-10 results into a single 20-item
  list, the neural model's attribution drops by 12% relative to BM25. Both models share 60% of their top-10
  items. The interleaving API runs on a fleet of 50 c6i.2xlarge instances with a strict 40ms P99 latency
  budget. What is causing the discrepancy between the A/B test and the interleaving results?
details:
  realistic_solution: Identify that the naive Team Draft Interleaving algorithm's deduplication logic
    is arbitrarily assigning credit for shared items to the BM25 model (if it drafts first or via coin-flip
    bias), starving the neural model of its highest-confidence predictions. The fix is to implement shared-credit
    attribution or use Probabilistic Interleaving.
  common_mistake: Assuming the neural model suffers from latency degradation in production, or that the
    A/B test lacked statistical significance, missing the deduplication bias in the interleaving algorithm.
  napkin_math: 'In a Top-10 list with 60% overlap, there are 6 shared items and 4 unique items per model.
    Team Draft Interleaving alternates picks between models, so each model drafts exactly 5 items. BM25
    and the Neural model each select 5 items: the 4 unique items + 1 from the 6 shared items in their
    first pick, with the remaining shared items claimed by whichever model selects them next. Credit for
    a shared item is assigned to whichever model drafted it first. If BM25 drafts first, it can claim
    at most 5 items (not 10), but it preferentially picks its highest-confidence shared items, effectively
    ''front-loading'' shared credit.'
