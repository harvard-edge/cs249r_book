title: The ML Platform Architecture Decision
scenario: 'Your company has 50 ML engineers across 8 teams (search, recommendations, ads, fraud, content
  moderation, NLP, vision, speech). Each team has built their own training and deployment pipeline. The
  CTO asks you to design a shared ML platform. The requirements: (1) standardize experiment tracking,
  (2) provide shared GPU cluster management, (3) enable reproducible training, and (4) support deployment
  to heterogeneous targets (cloud GPU, edge, mobile). How do you design the platform architecture, and
  what is the hardest technical challenge?'
question: "How do you design the platform architecture, and what is the hardest technical challenge?"
details:
  realistic_solution: 'Design a layered platform with strong opinions on interfaces but flexibility on
    implementations. Layer 1 (Infrastructure): Shared GPU cluster with Kubernetes + custom scheduler (Volcano/Kueue).
    Unified storage (S3 + cache layer). This is non-negotiable — everyone shares compute. Layer 2 (Workflow):
    Standardized experiment tracking (MLflow or W&B) with mandatory metadata schema. This captures the
    lineage graph across all teams. Standardized but flexible pipeline orchestration (Kubeflow/Airflow).
    Layer 3 (Toolkits): Framework-agnostic — teams use PyTorch, JAX, or TensorFlow. The platform provides
    container images, distributed training launchers, and deployment exporters but does not dictate the
    training code. Layer 4 (Deployment): Unified model registry with versioning. Standard serving infrastructure
    (Triton/vLLM) with multiple backends. Target-specific export pipelines (ONNX → TensorRT for GPU, CoreML
    for mobile). The hardest challenge: the metadata schema in Layer 2. Defining a schema that captures
    enough context for cross-team reproducibility without being so rigid that teams cannot express their
    specific needs. This is a sociotechnical problem, not a technical one.'
  common_mistake: Designing a monolithic platform that forces all teams to use the same framework, data
    format, and model architecture. This creates adoption resistance and eventually gets abandoned.
  napkin_math: '50 engineers × 8 weeks/engineer/year building custom infra = 400 person-weeks/year of
    redundant infra work. Platform team of 5 engineers: 5 × 52 = 260 person-weeks/year. Net savings: 140
    person-weeks/year + consistency benefits. GPU utilization improvement from shared scheduling: 35%
    → 60% (typical). On a 256-GPU cluster at $3/GPU-hr: 256 × 0.25 × $3 × 8760 = $1.68M/year in recovered
    compute.'
