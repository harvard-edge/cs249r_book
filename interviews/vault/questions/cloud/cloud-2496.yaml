title: Cloud NAS Hardware-in-the-Loop Optimization
scenario: Your cloud pipeline uses Neural Architecture Search (NAS) to generate keyword spotting models for Cortex-M0+ devices (128KB SRAM). The strict hardware constraint is <5mW active power during inference. NAS currently outputs a 50KB model with 20M MACs/sec that fits SRAM but draws 15mW on the physical hardware.
question: Why does the NAS model draw 15mW despite fitting in SRAM, and how should the NAS pipeline change to meet the <5mW target?
details:
  realistic_solution: The cloud NAS reward function must be updated to penalize specific memory access patterns, not just MACs or parameter counts. The 15mW power draw is likely caused by the model rapidly toggling activations between SRAM banks or missing CMSIS-NN optimizations, preventing the MCU from entering low-power sleep states between operations. The architecture should integrate a Hardware-in-the-Loop (HIL) power profiler into the NAS pipeline, or build a surrogate power model that accounts for SRAM read/write costs and CMSIS-NN specific instruction overheads (like depthwise convolutions which minimize memory fetching).
  common_mistake: |
    **The Pitfall:** Assuming parameter count or MACs linearly correlates with physical power draw.
    **The Rationale:** Engineers focus on theoretical metrics rather than physical memory fetch costs, which dominate power consumption.
    **The Consequence:** NAS produces models that fit constraints on paper but fail power limits in deployment.
  napkin_math: |
    1. Assumptions & Constraints: 20M MACs/sec. 15mW power draw. ALU power is minimal (100 μW). Memory access is expensive (50 pJ/byte).
    2. Calculations: Fetching 20 MB/s from SRAM = 20e6 * 50 pJ = 1 mW. Extreme thrashing causes 15mW.
    3. Conclusion & Interpretation: **Result: Memory fetches dominate power; optimize memory access patterns. Bottleneck: Memory Bandwidth Thrashing.**
