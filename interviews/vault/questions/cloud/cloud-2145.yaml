validation_issues_pro:
- The total read bandwidth calculation is wrong by a factor of 1000; it should be 25.6 GB/s, not 25.6
  TB/s.
- The check against NIC capacity is also incorrect; 306 GB/s per node is far beyond even a 400 Gbps (50
  GB/s) NIC, not 'within 10 Gbps NIC capacity'.
