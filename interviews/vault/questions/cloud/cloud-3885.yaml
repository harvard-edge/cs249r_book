title: Calculate KV-Cache Memory for 7B Model Inference
scenario: You are deploying a 7B parameter Transformer model on a single GPU for batched text generation. The model has 32 layers, a hidden dimension of 4096, and uses FP16 precision.
question: How much KV-cache memory in GB is required for a batch size of 16 at 1024 tokens for a 7B FP16 Transformer?
details:
  realistic_solution: 'The correct approach is to apply the KV-cache memory formula: Memory = 2 (for K and V) * 2 bytes (for FP16) * num_layers * hidden_size * sequence_length * batch_size. By plugging in the provided model specifications, we can calculate the per-token memory footprint and then scale it by the context length and batch size to find the total memory consumed by the KV-cache.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for both Keys and Values, or forgetting to multiply by the total number of layers.
    **The Rationale:** Candidates often calculate the size of just the keys or just one layer, overlooking the full architectural footprint of the cache.
    **The Consequence:** Underestimating VRAM requirements by a factor of 2x to 32x, leading to immediate Out-of-Memory errors during production scaling.
  napkin_math: |
    1. Bytes per token per layer = 2 (for K and V) × 2 bytes (FP16) × 4096 (hidden dim) = 16,384 bytes.
    2. Bytes per token across all layers = 16,384 bytes × 32 layers = 524,288 bytes (512 KB).
    3. Total KV-cache for 1 sequence (1024 tokens) = 524,288 × 1024 = 536,870,912 bytes (512 MB).
    4. Total KV-cache for batch of 16 = 512 MB × 16 = 8,192 MB = 8 GB.
    5. **The required KV-cache memory is 8 GB.**
