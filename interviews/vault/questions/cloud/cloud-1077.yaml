title: Diagnosing Pipeline Drops via Data Lineage
scenario: A cloud-based fraud detection model processing 10,000 requests/sec suddenly exhibits a 12% drop in recall. The model is retrained hourly using a continuous 7-day lookback window (approx. 6 billion rows, 2.5TB of Parquet files). The feature store monitoring alerts you to a significant distribution shift in the `user_agent_hash` feature starting 3 hours ago.
question: How do you utilize data lineage tracking to analyze the provenance of this feature and root-cause the regression across the distributed ingestion pipeline?
details:
  realistic_solution: Query the data lineage metadata graph to trace the `user_agent_hash` feature back to its raw ingestion source. By inspecting execution logs and artifact lineage, you discover that one of the 50 Kafka partitions feeding the raw logs had a stalled consumer for 4 hours. This caused a non-random omission of traffic from a specific geographic region, skewing the feature distribution and corrupting the hourly retraining window.
  common_mistake: |
    **The Pitfall:** Focusing purely on statistical drift metrics or immediately retraining.
    **The Rationale:** Engineers often react to the symptom (drift) rather than investigating the data provenance.
    **The Consequence:** Retraining without tracing the execution graph fails to fix the upstream data loss or silent ETL failure, baking the corruption into the next model version.
  napkin_math: |
    - **Total traffic:** 10,000 req/sec across 50 partitions = 200 req/sec per partition.
    - **Stall duration:** 4 hours = 14,400 seconds.
    - **Dropped events:** 200 req/sec * 14,400 seconds = 2.88 million dropped events.
    - **Global impact:** 2.88M / 6B total rows = ~0.048% of the dataset.
    - **Conclusion:** While globally small, it represents a **100% loss of signal** for the affected partition's segment, skewing localized predictions and dropping overall recall.
