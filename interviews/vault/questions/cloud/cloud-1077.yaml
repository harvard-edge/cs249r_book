title: Diagnosing Pipeline Drops via Data Lineage
scenario: A fraud detection model exhibits a sudden 12% drop in recall. The feature store alerts you to a distribution shift in a critical feature starting 3 hours ago.
question: How do you utilize data lineage tracking to analyze the provenance of this feature and root-cause the regression?
details:
  realistic_solution: Trace the feature back to raw ingestion. A stalled Kafka consumer partition causes a non-random omission of traffic, skewing distributions.
  common_mistake: |
    **The Pitfall:** Focusing purely on statistical drift and immediately retraining.
    **The Rationale:** Reacting to the symptom rather than investigating data provenance.
    **The Consequence:** Baking silent ETL failures into the next model version.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10k req/s, 50 partitions. Stall = 4 hours.
    2. **Calculations:**
       - 200 req/s * 14,400s = 2.88 million dropped events.
    3. **Conclusion & Interpretation:**
       - **Result: Globally small (0.048%), but represents 100% loss of signal for the affected partition's geographic segment.**
