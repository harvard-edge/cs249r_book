title: Diagnosing Pipeline Drops via Data Lineage
scenario: A cloud-based fraud detection model processing 10,000 requests/sec suddenly exhibits a 12% drop
  in recall. The model is retrained hourly using a continuous 7-day lookback window (approx. 6 billion
  rows, 2.5TB of Parquet files on S3). The feature store monitoring alerts you to a significant distribution
  shift in the `user_agent_hash` feature starting 3 hours ago. How do you utilize data lineage tracking
  to analyze the provenance of this feature and root-cause the regression across the distributed ingestion
  pipeline?
details:
  realistic_solution: Query the data lineage metadata graph to trace the `user_agent_hash` feature back
    to its raw ingestion source. By inspecting execution logs and artifact lineage, you discover that
    one of the 50 Kafka partitions feeding the raw logs had a stalled consumer for 4 hours. This caused
    a non-random omission of traffic from a specific geographic region, skewing the feature distribution
    and corrupting the hourly retraining window.
  common_mistake: Focusing purely on statistical drift metrics or immediately triggering a model retraining
    without tracing the exact pipeline execution graph to identify upstream data loss or silent ETL failures.
  napkin_math: 10,000 total req/sec ÷ 50 partitions = 200 req/sec per partition. 200 req/sec × 3600 seconds
    × 4 hours = 2.88 million dropped events. 2.88M ÷ 6B total rows = ~0.048% of the dataset. While globally
    small, it represents a 100% loss of signal for the affected partition's segment, heavily skewing localized
    predictions and dropping overall recall.
