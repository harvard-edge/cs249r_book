title: The Deceptive Addition
scenario: 'You are profiling a PyTorch model and find that a simple element-wise addition of two large FP16 tensors C = A + B is surprisingly slow.'
question: 'What is the arithmetic intensity of C = A + B for FP16 tensors, and is it memory-bound or compute-bound?'
details:
  realistic_solution: 'The kernel is heavily memory-bound. For every element in the tensors, you perform 1 floating-point operation (the addition). To perform this single operation, you must read 2 elements from memory (one from A, one from B) and write 1 element back (to C). In FP16, each element is 2 bytes. Therefore, the ratio of operations to bytes transferred is extremely low, meaning the GPU spends most of its time waiting for data from HBM, not performing calculations.'
  common_mistake: |
    **The Pitfall:** Miscalculating the number of bytes transferred or misinterpreting the roofline model.
    **The Rationale:** Engineers often forget to account for the write operation (C) or one of the read operations (A or B), and incorrectly assume any low AI operation is somehow compute-bound.
    **The Consequence:** Wasting time trying to optimize kernel compute instructions (e.g., loop unrolling) when the kernel is strictly memory-bandwidth limited.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operation: C = A + B (element-wise addition).
    - Data type: FP16 (2 bytes per element).

    **Calculations:**
    - Calculate FLOPs: For a tensor with N elements, A + B performs exactly N floating-point operations.
    - Calculate Memory Moved: Read 2 elements (A, B) and write 1 element (C) = 3 * N elements. In FP16, this is 6 * N bytes.
    - Arithmetic Intensity: N FLOPs / (6 * N) Bytes = 1/6 ≈ 0.167 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. At 0.167 FLOPs/Byte, the operation sits far to the left of the hardware ridge point.
  options:
  - 'AI is ~0.5 FLOPs/Byte, making it compute-bound. (Forgetting to include the read bytes for B and write bytes for C).'
  - 'AI is ~0.5 FLOPs/Byte, making it memory-bound. (Forgetting to include the write bytes for C).'
  - 'AI is ~0.25 FLOPs/Byte, making it memory-bound. (Calculating 1 FLOP / 4 Bytes by forgetting FP16 size for C).'
  - 'AI is ~0.167 FLOPs/Byte, making it memory-bound.'
  correct_index: 3
