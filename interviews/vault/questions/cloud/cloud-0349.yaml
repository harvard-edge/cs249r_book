title: The Deceptive Addition
scenario: You are profiling a PyTorch model on an NVIDIA H100 and find that a simple element-wise addition
  of two large FP16 tensors is surprisingly slow. The kernel implements `C = A + B`. To understand the
  bottleneck, you must calculate the Arithmetic Intensity (AI) of this operation. Compare this AI to the
  H100's ridge point (~295 Ops/Byte) to determine if the operation is memory-bound or compute-bound.
question: "What is the arithmetic intensity of C = A + B for FP16 tensors, and is it memory-bound or compute-bound on an H100?"
details:
  realistic_solution: The kernel is heavily memory-bound. For every element in the tensors, you perform
    1 floating-point operation (the addition). To perform this single operation, you must read 2 elements
    from memory (one from A, one from B) and write 1 element back (to C). In FP16, each element is 2 bytes.
    Therefore, the ratio of operations to bytes transferred is extremely low, meaning the GPU spends most
    of its time waiting for data from HBM, not performing calculations.
  common_mistake: Engineers often miscalculate the number of bytes transferred. For an operation `C =
    A + B`, you must account for *two* reads (A and B) and *one* write (C). A common error is to forget
    the write operation or one of the reads. Another mistake is to correctly calculate the low AI value
    but still conclude the kernel is compute-bound, misinterpreting what 'bound' means in the roofline
    model.
  napkin_math: '1. **Calculate FLOPs**: For a tensor with N elements, an element-wise addition `A + B`
    performs N floating-point operations.

    2. **Calculate Memory Moved**: Read 2 elements (A, B) and write 1 element (C). Total = 3 × N elements.
    At FP16 (2 bytes/element), memory = 6 × N bytes.

    3. **Arithmetic Intensity**: FLOPs / Bytes = N / (6 × N) = 1/6 ≈ 0.167 FLOPs/Byte. This is extremely
    memory-bound.'
  options:
  - AI is ~0.167 FLOPs/Byte, making it compute-bound.
  - AI is ~0.5 FLOPs/Byte, making it memory-bound.
  - AI is ~1.0 FLOPs/Byte, making it compute-bound.
  - AI is ~0.167 FLOPs/Byte, making it memory-bound.
  correct_index: 3
