title: Cloud Benchmark Harness L2 0
scenario: Your team built a custom ML benchmark but gets inconsistent results across runs — sometimes 20% variance.
question: What must a proper ML benchmark harness control to avoid 20% run-to-run variance?
details:
  realistic_solution: 'A benchmark harness standardizes all variables that affect measurement: (1) Warmup — first iterations are slow due to JIT compilation, cache warming, and GPU clock ramp-up. Must discard warmup iterations. (2) Timing — use CUDA events for GPU timing, not wall-clock (which includes CPU overhead). (3) Data injection — deterministic data loading with fixed seeds, no random I/O delays. (4) System state — GPU clock locked to base (not boost), power management disabled, no background processes. (5) Statistical rigor — multiple runs, report median and confidence intervals, not single-run results. 20% variance likely comes from GPU boost clock fluctuations, background processes, or measuring warmup iterations.'
  common_mistake: |
    **The Pitfall:** Using Python `time.time()` to benchmark GPU operations.
    **The Rationale:** Treating GPU code like standard CPU code without realizing kernel launches are asynchronous.
    **The Consequence:** Measuring only the CPU dispatch time instead of actual GPU execution, resulting in completely meaningless benchmark numbers.
  napkin_math: |
    - **GPU Boost Clock Variance**: H100 base is 1095 MHz, boost up to 1835 MHz (a 1.68x variation).
    - **Thermal Throttling**: Hitting thermal limits can cause a 15% performance drop.
    - **Warmup Overhead**: The first 10 iterations are 2-5x slower due to JIT compilation and cache warming.
    - **Result**: Discarding warmup and locking clocks reduces run-to-run variance from 20% down to **<2%**.
