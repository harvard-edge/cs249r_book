title: The AllReduce Bottleneck
scenario: You are scaling a DDP (Distributed Data Parallel) training job from 8 to 128 H100 GPUs. As you add more workers, you notice that the time per training step is no longer decreasing linearly.
question: Which communication primitive is the most common scaling bottleneck when moving DDP from 8 to 128 H100 GPUs?
details:
  realistic_solution: 'The primary bottleneck is the `AllReduce` operation. In data-parallel training, each GPU computes gradients based on its local batch of data. Before the optimizer can update the weights, all these gradients must be averaged across all GPUs. The `AllReduce` primitive handles this: it sums (Reduces) the gradients from all workers and then distributes the final result back to all of them. The communication volume and synchronization requirements of this step grow with the number of GPUs and typically become the limiting factor for training throughput.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the compute (FLOPs) performed by each GPU.
    **The Rationale:** Engineers mistakenly assume that if each GPU has less data, the process will speed up linearly, forgetting the necessary gradient synchronization overhead.
    **The Consequence:** Failing to anticipate that communication overhead becomes the dominant bottleneck at scale.
  napkin_math: |
    1. **Compute Time:** A single H100 GPU can execute about 1 Trillion FP16 operations in roughly 1 millisecond (1 TFLOP / 989 TFLOPS $\approx$ 1 ms).
    2. **Network Latency:** A cross-rack network hop over InfiniBand takes about 5 microseconds of latency per hop.
    3. **AllReduce Latency:** The AllReduce must transfer large gradient buffers across all 128 GPUs, involving multiple hops and data transfers.
    4. **Result:** **Communication latency quickly far exceeds the 1 ms compute time it's synchronizing.**
  options:
  - The data loading (ETL) pipeline
  - The optimizer step (e.g., AdamW)
  - The AllReduce operation
  - The forward pass computation
  correct_index: 2
