title: The AllReduce Bottleneck
scenario: You are scaling a DDP (Distributed Data Parallel) training job from 8 to 128 GPUs. As you add more workers, you notice that the time per training step is no longer decreasing linearly.
question: Which communication primitive is the most common scaling bottleneck when moving DDP from 8 to 128 GPUs?
details:
  realistic_solution: The primary bottleneck is the `AllReduce` operation. In data-parallel training, each GPU computes gradients based on its local batch of data. Before the optimizer can update the weights, all these gradients must be averaged across all GPUs using `AllReduce`.
  common_mistake: |
    **The Pitfall:** Focusing solely on the compute (FLOPs) performed by each GPU.
    **The Rationale:** Engineers mistakenly assume that if each GPU has less data, the process will speed up linearly, forgetting the necessary gradient synchronization overhead.
    **The Consequence:** Failing to anticipate that communication overhead becomes the dominant bottleneck at scale.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Single GPU compute: ~1 ms (1 Trillion FP16 ops).
       - Network latency: ~5 μs per hop over InfiniBand.
    2. **Calculations:**
       - AllReduce transfers large gradient buffers across 128 GPUs via multiple hops.
       - Accumulated network latency and bandwidth limits push communication time well above 1 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Communication latency quickly far exceeds the 1 ms compute time it synchronizes. Bottleneck: Communication Latency-Bound.**
  options:
  - The data loading (ETL) pipeline
  - The optimizer step (e.g., AdamW)
  - The AllReduce operation
  - The forward pass computation
  correct_index: 2
