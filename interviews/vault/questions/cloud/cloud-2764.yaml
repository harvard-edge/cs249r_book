title: Guardrail Strictness Trade-off
scenario: 'Your LLM guardrails block 8% of user queries as potentially unsafe. User satisfaction surveys show frustration with false blocks. Options: (A) reduce guardrail sensitivity to block only 3%, (B) add a "soft block" path that rephrases the query instead of refusing, (C) implement a human-review queue for borderline cases.'
question: 'How should you reduce user frustration from the 8% LLM guardrail block rate without letting unsafe queries through?'
details:
  realistic_solution: 'First, analyze the 8% blocked: assume 5% are true policy violations, 3% are false positives. Option A (reduce to 3%): To block only 3%, you must let through 5% of currently-blocked queries. Some true policy violations would reach users — unacceptable regulatory and legal risk. Option B (soft block + rephrase): Instead of outright refusal, the system rephrases the query to be on-topic and explains why. Maintains safety while providing a helpful response. User satisfaction improves without compromising safety. Option C (human-review queue): Adds 5-30 minute latency, unacceptable for real-time chat. Recommendation: B is clearly best — it maintains safety guarantees while dramatically improving user experience.'
  common_mistake: |
    **The Pitfall:** Blindly reducing the guardrail sensitivity threshold (Option A) to hit a target block rate without quantifying true vs. false positive distributions.
    **The Rationale:** Product managers optimize solely for user retention and UX metrics, ignoring the non-linear increase in catastrophic safety violations that occurs when sensitivity is globally lowered.
    **The Consequence:** Severe regulatory, legal, and PR risks materialize as genuine policy violations (e.g., generating medical advice or hate speech) leak directly to the user base.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total blocked rate: 8%.
    - Estimated true policy violations: 5%.
    - Estimated false positives: 3%.

    **Calculations:**
    - Option A (reduce to 3% block): Must allow 5% of currently-blocked queries through. At least 2% of total traffic becomes unmitigated policy violations.
    - Option B (rephrase): Adds ~100ms inference latency but intercepts 100% of policy violations while satisfying the 3% false positive users.
    - Option C (human queue): Adds 5–30 minutes latency; breaks real-time SLA.

    **Conclusion & Interpretation:**
    - **Result: Architectural mitigation over threshold tuning (Safety-Bound)**. Option B completely preserves safety invariants while solving the UX friction, cleanly breaking the false trade-off between strictness and helpfulness.
