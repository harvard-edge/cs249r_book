title: 'Pipeline Parallelism Specification: Design for <10% Bubble with Memory Constraint'
scenario: Specify a pipeline parallelism configuration for a 175B GPT-3 scale model on H100 (80GB HBM3)
  that achieves bubble overhead below 10% while keeping per-GPU peak memory under 70GB. The training uses
  BF16 weights with ZeRO-2 optimizer sharding. Provide exact p (stages), m (micro-batches), and DP degree
  with justification.
details:
  realistic_solution: '175B params, BF16 = 350GB model weight. With TP=8 (NVLink within node) and PP=8
    stages: effective params/device = 175B/(8*8) = 2.73B. Weights: 5.5GB. ZeRO-2 shards gradients (not
    weights/optimizer): gradients = 5.5GB / DP replicas. With DP=8: grad shard = 0.69GB. Optimizer (FP32
    Adam, ZeRO-3): 175B*12/512 = 4.1GB. Activations (checkpointed): ~3GB. Total: ~13.3GB — well under
    70GB. Bubble with m=72: (8-1)/(72+7) = 8.9% < 10%. Spec: p=8, TP=8, DP=8, m=72.'
  common_mistake: Not accounting for ZeRO-2 optimizer state distribution and assuming all optimizer states
    fit per GPU without sharding.
  napkin_math: '175B * 2 bytes = 350GB total BF16 weights. With TP=8, PP=8: 350/(8*8) = 5.47GB weights/device.
    Gradients (ZeRO-2 sharded over DP=8): 5.47/8 = 0.68GB. Optimizer (ZeRO-3 sharded over all 512 GPUs):
    175B*12/512 = 4.1GB. Activations (checkpointed): ~3GB. Peak: 5.47+0.68+4.1+3 = 13.25GB. Bubble: 7/79
    = 8.9% < 10%. Total GPUs: 8*8*8 = 512.'
