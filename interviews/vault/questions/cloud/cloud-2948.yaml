title: Evaluating Free Cooling Feasibility for H100 Liquid-Cooled Deployments
scenario: 'A facilities team evaluates whether they can use free cooling (dry coolers with no mechanical refrigeration) for a DLC-equipped H100 cluster in Austin, Texas. H100 DLC cold plates require water supply at <= 45°C inlet temperature. Austin''s wet-bulb temperature exceeds 25°C for ~1,200 hours per year.'
question: Is year-round free cooling viable for a DLC-equipped H100 cluster in Austin with <= 45°C inlet water, and how many hours need mechanical assist?
details:
  realistic_solution: 'Dry cooler outlet temperature ≈ wet-bulb temperature + 5–8°C approach temperature. For a 45°C supply temperature limit: max allowable wet-bulb = 45 − 7 = 38°C. Austin''s maximum wet-bulb is ~26°C in peak summer, well below 38°C. However, evaluation must use 99th percentile wet-bulb to ensure reliability. ASHRAE data for Austin: 1% wet-bulb design = 24.6°C, giving cooler outlet = 24.6 + 7 = 31.6°C — acceptable. Full free cooling is viable year-round in Austin for 45°C supply. Hours where mechanical assist needed: <50 hr/yr at extreme peaks. This enables PUE ≈ 1.1–1.15 vs. 1.3–1.4 for compressor-based chilled water.'
  common_mistake: |
    **The Pitfall:** Using dry-bulb ambient temperature for free cooling feasibility analysis.
    **The Rationale:** Engineers default to standard weather reports (dry-bulb), not realizing that cooling tower and dry cooler performance is strictly governed by wet-bulb temperature.
    **The Consequence:** Grossly overestimating the required cooling infrastructure in humid climates, leading to millions in wasted capital expenditure and higher PUE.
  napkin_math: |
    1. **Cooling Math:** Dry cooler outlet ≈ wet-bulb + 7°C approach. For 45°C supply, max wet-bulb is 38°C.
    2. **Climate Check:** Austin's 1% design wet-bulb is 24.6°C. Outlet = 24.6 + 7 = 31.6°C <= 45°C limit.
    3. **Mechanical Hours:** Practically **< 50 hours/year** require mechanical assist at extreme peaks.
    4. **PUE Calculation:** Fan power overhead ≈ 23 kW on 358 kW load -> PUE ≈ 1.064. Total facility PUE is **~1.14**.
