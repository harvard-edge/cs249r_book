title: The Real-Time Translation Bottleneck
scenario: You are designing an LLM serving system for a real-time translation application on a single
  H100 GPU. The service has a P99 Time-To-First-Token (TTFT) SLO of 500ms. The model is a 40B parameter
  model, quantized to INT8 (40 GB total size). Your system uses continuous batching. To understand the
  system's limits, first calculate the baseline Time Per Output Token (TPOT) for a single, isolated user.
  Assume this is dominated by reading the model weights from High Bandwidth Memory. Given the H100's HBM
  bandwidth of 3.35 TB/s, what is the theoretical minimum TPOT?
details:
  realistic_solution: The process is memory-bound. We can prove this by comparing the time for memory
    access vs. compute. The time to read the 40GB of weights is the dominant factor. The theoretical minimum
    time per output token (TPOT) is determined by dividing the model size by the memory bandwidth.
  common_mistake: Engineers often assume that a GPU's performance is defined purely by its TFLOPS. They
    calculate the time based on compute operations and get a sub-millisecond result, ignoring that the
    arithmetic intensity of LLM inference is often too low to saturate the compute units. The real bottleneck
    is the time it takes to shuttle the model's massive weights from HBM to the cores for every single
    token generated.
  napkin_math: Autoregressive generation at batch size 1 is memory-bandwidth bound. To generate one token,
    the GPU must read the entire 40 GB model from HBM. Minimum TPOT = Total Model Size / Memory Bandwidth.
    TPOT = 40 GB / 3.35 TB/s = 40 GB / 3350 GB/s = 0.0119 seconds, or ~11.9 ms per token. This represents
    the theoretical physical speed limit.
  options:
  - Less than 1 ms. The operation is compute-bound, limited by the H100's PetaFLOP-scale compute.
  - Approximately 95 ms. The 3.35 TB/s bandwidth is measured in Terabits, not TeraBytes, reducing effective
    bandwidth.
  - Approximately 12 ms. The operation is memory-bound by the time it takes to read 40 GB of weights over
    the 3.35 TB/s HBM interface.
  - Around 300 ns. This is the fundamental latency of a single HBM3 memory access.
  correct_index: 2
