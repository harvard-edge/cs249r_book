title: REST Serialization Bottleneck in Inference
scenario: A fraud detection ML service on AWS receives batches of 500 transaction embeddings (1024-dim FP32) via a REST API in JSON format. The service is severely CPU-bottlenecked at 98% utilization, while the T4 GPU idles at 15% utilization. GPU inference takes only 5ms per batch, but the end-to-end API latency is 85ms.
question: What architectural bottleneck causes 98% CPU utilization and 15% T4 utilization for 500 JSON-encoded 1024-dim embeddings per request?
details:
  realistic_solution: Analyze the CPU profile to identify that JSON parsing of massive float arrays is the bottleneck. Migrate the REST API to gRPC/Protobuf or switch to raw binary HTTP payloads to eliminate text serialization overhead.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute or framework overhead.
    **The Rationale:** Engineers often blame the ML framework or look to scale up the GPU instances, missing the massive inefficiency of text-based serialization for dense numerical data.
    **The Consequence:** Unnecessarily scaling up to larger, more expensive GPU instances which only exacerbates the CPU saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch of 500 embeddings, 1024-dim FP32.
       - 4 vCPUs parsing JSON.
    2. **Calculations:**
       - Payload size: 500 * 1024 floats = 512,000 floats.
       - JSON representation: A float string averages 10 bytes, total ≈ 5.12 MB.
       - JSON parsing time: At ~150 MB/s parsing speed, it takes ~34ms CPU time per request.
       - Throughput limit: With 4 vCPUs, max parsing throughput is ~117 req/s.
       - GPU limit: Inference takes 5ms (max 200 req/s).
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound. The system is artificially CPU-capped by REST text serialization overhead, starving the GPU.**
