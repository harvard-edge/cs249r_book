title: Feature Store Consistency Guarantees
scenario: Your feature store uses a dual-write pattern: the batch pipeline writes to both the offline store (S3/Delta Lake) and online store (Redis) simultaneously. A production incident reveals that 2% of feature values diverge between stores.
question: Why does the dual-write feature store diverge, and what architecture provides eventual consistency with bounded staleness?
details:
  realistic_solution: 'The dual-write divergence occurs because writes to S3 and Redis are not atomic — a failure between the two creates inconsistency. Replace dual-write with a CDC (Change Data Capture) pattern: (1) batch pipeline writes to the offline store (Delta Lake) as the single source of truth; (2) Delta Lake''s change feed streams new/updated records to Kafka; (3) a Kafka consumer materializes records into Redis. This guarantees eventual consistency — Redis always converges to the offline store''s state. Bounded divergence: Kafka consumer lag determines the maximum staleness. Monitor consumer lag and alert if it exceeds the staleness budget (e.g., 5 minutes). For features requiring stronger consistency, add a version vector: each feature value carries a monotonic version number. Serving layer compares versions and rejects stale reads.'
  common_mistake: |
    **The Pitfall:** Implementing strong consistency via distributed transactions (2PC) across S3 and Redis.
    **The Rationale:** Engineers try to fix the symptom (divergence) by forcing atomicity, ignoring the operational reality of heterogeneous storage systems.
    **The Consequence:** Adding 50-100ms latency to every write and creating a fragile pipeline where one unavailable system crashes all writes.
  napkin_math: |
    1. Dual-write failure rate: 2% divergence arises from independent network/write failures to two separate systems without atomic guarantees.
    2. CDC Architecture: Delta Lake (offline) streams to Kafka, materializing in Redis.
    3. Steady-state CDC lag: If Kafka throughput is 100K records/s and batch produces 50K records, lag = 0.5 seconds.
    4. Worst-case lag (e.g., 1-hour consumer restart): 3M backlog records / 100K records/s = 30 seconds catch-up time.
    5. **A CDC (Change Data Capture) pattern bounds staleness to <30 seconds worst-case and guarantees ultimate convergence.**
