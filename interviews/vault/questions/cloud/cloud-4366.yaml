title: TPU v5e BF16 Accumulation and Training Stability vs H100
scenario: A team migrates transformer training from H100 (FP16 with FP32 accumulation
  via Tensor Cores) to TPU v5e (BF16 with BF16 accumulation). After 50K training steps,
  the TPU run shows 1.8% higher loss than the H100 baseline at the same number of
  steps. Diagnose the root cause and propose a fix without switching back to H100.
question: Why is the TPU v5e BF16 run 1.8% higher loss after 50K steps than the H100
  FP16 baseline, and how would you fix it on TPU?
details:
  realistic_solution: 'The root cause is BF16 accumulation in MXU (TPU''s matrix unit).
    H100 Tensor Cores accumulate in FP32 even when inputs are FP16 — this is critical
    for gradient accumulation across large batch sizes and long sequences where small
    gradient signals would otherwise be rounded to zero in lower precision accumulators.
    TPU v5e MXU can be configured for BF16 accumulation (fast) or FP32 accumulation
    (slower but numerically accurate). If the team used BF16 matmul with BF16 accumulation,
    gradient updates for small learning rates are systematically rounded, causing
    the loss divergence. Fix: enable FP32 accumulation in JAX/XLA via `jax.lax.Precision.HIGHEST`
    or `tf.matmul(..., use_32bit_accumulation=True)`. Expected performance cost: ~15-25%
    throughput reduction. Alternatively, use stochastic rounding (available on TPU
    v5e) which provides unbiased accumulation in BF16 with minimal throughput cost.'
  common_mistake: Attributing the loss divergence to BF16's lower precision mantissa
    (7 bits vs FP16's 10 bits). BF16 actually has better dynamic range than FP16 (8
    exponent bits vs 5), making it more numerically stable for gradient training.
    The problem is accumulation precision, not weight precision.
  napkin_math: 'BF16 precision: 1 sign + 8 exponent + 7 mantissa = 16 bits. FP32 accumulator:
    1+8+23 = 32 bits. Gradient magnitude at LR=1e-4 and batch=512: typical gradient
    ≈ 1e-4 to 1e-3. BF16 representable step at magnitude 1e-3: epsilon = 2^-7 × 1e-3
    ≈ 7.8e-6. FP32 epsilon at 1e-3: 2^-23 × 1e-3 ≈ 1.2e-10. Rounding error in BF16
    accumulation: 7.8e-6 per multiply-add. Over 1B accumulations in a large matmul:
    drift ≈ √(1e9) × 7.8e-6 = 0.25. FP32 drift: √(1e9) × 1.2e-10 = 3.8e-3. BF16 accumulation
    introduces 66× larger numerical drift — explains 1.8% loss gap.'
