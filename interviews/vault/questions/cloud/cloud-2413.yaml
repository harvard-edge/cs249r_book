title: TPU Systolic Array Underutilization
scenario: You are migrating a latency-sensitive 7B parameter LLM inference service from A100 GPUs to TPU
  v4 instances. On A100, at a batch size of 1, the latency is 35ms per token. On TPU v4, the latency spikes
  to 90ms per token at batch size 1, despite the TPU having higher peak theoretical TFLOPS. Profiling
  shows TPU Matrix eXecution Unit (MXU) utilization is below 5%.
question: "Why is TPU v4 slower than A100 at batch size 1, and how would you co-design the serving stack to fix it?"
details:
  realistic_solution: The issue is a fundamental mismatch between the algorithm's batch size and the hardware's
    dataflow architecture. TPUs use a massive 128x128 systolic array (MXU) for matrix multiplications,
    optimized for high-throughput pipeline execution. At batch size 1, the matrix-vector multiplication
    cannot physically fill the spatial dimensions of the systolic array, leading to massive underutilization.
    The tradeoff here is latency versus throughput. To fix this through co-design, you must implement
    continuous batching (iteration-level scheduling) to force the effective batch size higher (e.g., >32),
    amortizing the MXU fill time. If strict single-batch latency is required, the algorithm should be
    mapped to smaller sub-arrays if supported, or routed back to SIMT architectures (GPUs) which are better
    suited for latency-sensitive, memory-bandwidth-bound vector operations.
  common_mistake: Assuming the TPU compiler (XLA) failed to fuse operations and manually writing low-level
    custom kernels.
  napkin_math: TPU v4 MXU is 128x128. A batch size of 1 means you are multiplying a 1xN vector by an NxM
    matrix. Only 1 row of the 128x128 array does useful work per cycle. Utilization = 1 / 128 = 0.78%.
    To hit >50% utilization, you need a batch size of at least 64.
