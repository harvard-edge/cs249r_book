title: 'Dataset Curation: Implement a Data Quality Scoring Function'
scenario: You need to score 1B text documents for quality before LLM pre-training on H100s. Design and
  quantify a perplexity-based quality scorer using a small 125M KenLM model. The scorer must process the
  full 1B documents within 6 hours on a 16-node CPU cluster.
question: "How would you design and size a KenLM perplexity scorer to process 1B documents within 6 hours on a 16-node CPU cluster?"
details:
  realistic_solution: KenLM 5-gram model at 125M parameters. Each CPU can score ~10K documents/second.
    Distribute across 16 nodes × 32 cores = 512 cores. Set quality threshold at perplexity < 200 (tuned
    on held-out human ratings). Flag and discard documents scoring > 500 perplexity.
  common_mistake: Using a GPU-based neural LM scorer for all 1B documents — too slow. KenLM on CPU is
    100× faster for this use case.
  napkin_math: '1B documents / 6 hours = 166.7M docs/hour = 46,300 docs/second needed. 512 cores × 10K
    docs/core/sec = 5.12M docs/second. Way more than enough — could process in 1B / 5.12M = 195 seconds
    ≈ 3.3 minutes. Real bottleneck is I/O: 1B docs × 2KB avg = 2TB data. At 10GB/s network = 200 seconds
    read time. Total wall time dominated by I/O ≈ 10-20 minutes.'
