title: 'KV-Cache: Design Prefix Sharing KV Cache for System Prompt Optimization'
scenario: You serve a 7B LLM on H100s (80GB HBM3) where 80% of requests share the same 1024-token system
  prompt. Currently you recompute the KV cache for the system prompt on every request. Design a prefix
  KV cache that shares this computation, and quantify the TTFT reduction and compute savings.
details:
  realistic_solution: Store the KV cache for the 1024-token system prompt in HBM. All requests sharing
    this prefix skip prefill for the first 1024 tokens. Only compute KV for the user-specific suffix.
  common_mistake: Not accounting that prefix caching only helps TTFT (prefill), not decode latency. Also
    forgetting that cached prefixes must be invalidated when the model is updated.
  napkin_math: '7B model, 32 layers, GQA 8 KV heads, head_dim=128. KV per token: 32 × 2 × 8 × 128 × 2B
    = 131KB per token. 1024-token system prompt KV: 1024 × 131KB = 134MB. At 80 GB H100: 134MB/80GB =
    0.17% of HBM for one cached prefix. TTFT without prefix caching: prefill 1024 system + 256 user suffix
    = 1280 tokens. Prefill throughput at 40% MFU: 7B × 6 FLOPs × 1280 / (989T × 0.4) = 53.76T / 395.6T
    = 0.136 seconds. With prefix caching: only prefill 256 tokens: 53.76T × 256/1280 = 10.75T / 395.6T
    = 0.027 seconds. TTFT reduction: 0.136s → 0.027s = 5× faster. For 80% of requests. Compute savings:
    80% × (1024/1280) = 64% compute reduction for prefill. At 10K req/sec: saves 0.64 × (0.109s prefill)
    × 10K = 697 H100-seconds/second = significant.'
