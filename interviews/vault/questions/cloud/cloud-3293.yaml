title: 'LLM Fine-tuning OOM on NVIDIA H100: Diagnosing and Mitigating Memory Pressure'
scenario: You are fine-tuning a 100B parameter Large Language Model (LLM) using a
  distributed training setup on a cluster of NVIDIA H100 GPUs. Each H100 GPU boasts
  80 GB of HBM3 memory with a peak bandwidth of 3.35 TB/s. Despite optimizing your
  model architecture and using mixed-precision training (FP16), you consistently encounter
  Out-Of-Memory (OOM) errors during the forward and backward passes, even with a small
  batch size per GPU. The model's state (weights, gradients, optimizer states) combined
  with activations from intermediate layers clearly exceeds the available 80 GB HBM3.
  Describe your approach to diagnose and mitigate these memory pressure issues, considering
  OOM handling, potential memory fragmentation, and techniques like gradient accumulation.
  How would OS-level eviction policies on the host machine interact with the GPU memory
  management, and what strategies would you employ to ensure efficient utilization
  of the H100's high-bandwidth memory?
question: How would you diagnose and mitigate H100 OOMs for a 100B distributed LLM,
  including fragmentation, gradient accumulation, offload, and OS eviction effects?
details:
  realistic_solution: 'A multi-pronged approach is essential: 1. **Memory Profiling:**
    Utilize tools like `nvidia-smi`, PyTorch''s `torch.cuda.memory_summary()`, or
    DeepSpeed''s memory profiler to pinpoint where memory is being consumed. 2. **Optimizer
    Sharding:** Implement techniques like ZeRO (Zero Redundancy Optimizer) stages
    (e.g., ZeRO-Stage 2 for sharding optimizer states and gradients, or ZeRO-Stage
    3 for sharding parameters, gradients, and optimizer states) across GPUs. 3. **Gradient
    Checkpointing:** Reduce activation memory footprint by recomputing activations
    during the backward pass at the cost of additional computation. 4. **CPU Offloading:**
    Strategically offload less frequently accessed parts of the model (e.g., optimizer
    states or unused layers) to CPU host memory. 5. **Gradient Accumulation:** Increase
    the effective batch size without increasing the per-step memory footprint by accumulating
    gradients over several mini-batches before performing an optimizer step. 6. **Dynamic
    Memory Management:** Investigate PyTorch''s memory allocator configuration for
    fragmentation issues, though often large-model OOMs are due to absolute memory
    requirements. 7. **OS-level Interaction:** Be aware that OS-level swap space can
    act as an emergency valve for CPU-offloaded data, but frequent paging to disk
    will be a significant bottleneck. Optimize offloading to minimize CPU-GPU transfers
    and avoid disk I/O.'
  common_mistake: Underestimating the total memory footprint of a large model, particularly
    overlooking the memory consumed by optimizer states (e.g., AdamW requires 2x parameters
    for moments and often stores them in FP32) and intermediate activations. Another
    mistake is relying solely on increasing host memory/swap without properly offloading
    data or optimizing GPU memory usage, leading to significant performance degradation
    due to PCIe bandwidth limitations and CPU-GPU data transfer overhead.
  napkin_math: 'For a 100B parameter model:

    - FP16 parameters: 100B params * 2 bytes/param = 200 GB.

    - AdamW optimizer states (FP32): 100B params * 2 (moments) * 4 bytes/param = 800
    GB.

    - Gradients (FP16): 100B params * 2 bytes/param = 200 GB.

    Total baseline memory (excluding activations): ~1.2 TB.

    This vastly exceeds a single H100''s 80 GB HBM3. Even with ZeRO-Stage 3 distributed
    across 16 H100 GPUs, the model''s core states would consume ~75 GB/GPU, leaving
    little room for activations. Gradient accumulation effectively multiplies the
    batch size by N without increasing activation memory per step. For instance, if
    a micro-batch needs 10GB of activations, accumulating 8 micro-batches still only
    needs ~10GB of activation memory but results in a batch size 8x larger.'
