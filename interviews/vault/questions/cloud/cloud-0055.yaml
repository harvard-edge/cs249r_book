title: The Concurrent User Limit
scenario: Your team is deploying a new 13B parameter LLM for a real-time coding assistant on a single NVIDIA H100 GPU. The service level objective (SLO) requires an average generation speed of at least 64 tokens per second for each user. Assume the serving stack is well-optimized with continuous batching and achieves 50% of the H100's peak FP16 compute throughput.
question: How many concurrent users can one H100 support for a 13B FP16 model at 50% peak if each needs 64 tokens/s?
details:
  realistic_solution: The correct approach is to first determine the GPU's effective throughput in FLOPs by applying the utilization factor to its peak performance. Second, calculate the FLOPs required to generate a single token for the 13B model. Dividing the GPU's effective throughput by the per-token cost gives the total number of tokens the system can generate per second. Finally, dividing this total token capacity by the per-user requirement yields the maximum number of concurrent users.
  common_mistake: |
    **The Pitfall:** Calculating throughput using the GPU's theoretical peak TFLOPS without applying a realistic utilization factor (MFU).
    **The Rationale:** Peak numbers are unattainable in practice due to memory bandwidth bottlenecks and other system overheads. Ignoring continuous batching would also leave the GPU latency-bound.
    **The Consequence:** Drastically overestimating server capacity, leading to under-provisioning and failed SLAs in production.
  napkin_math: |
    1. H100 provides 989 TFLOPS (FP16). At 50% utilization, effective throughput is 494.5 TFLOPS.
    2. Compute per Token: 2 * 13B parameters = 26 GFLOPs/token.
    3. Total Throughput: 494,500 GFLOPs / 26 GFLOPs/token = ~19,019 tokens/s.
    4. Concurrent Users: 19,019 tokens/s / 64 tokens/s/user ≈ 297 users.
    5. **The server can support approximately 297 concurrent users.**
  options:
  - About 60 users
  - About 300 users
  - About 600 users
  - About 19,000 users
  correct_index: 1
