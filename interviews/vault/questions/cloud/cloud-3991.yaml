title: Pipeline Bubble Regression
scenario: A 16-stage pipeline-parallel model trains with 64 microbatches and 80% MFU. A memory-saving change reduces the number of microbatches to 8. Compute per stage is unchanged, but MFU drops sharply.
question: Why does reducing a 16-stage pipeline from 64 to 8 microbatches sharply reduce Model FLOPs Utilization (MFU)?
details:
  realistic_solution: The pipeline bubble grows because fewer microbatches are available to fill the pipeline. Approximate bubble fraction is (P-1)/(M+P-1). With P=16 and M=64, bubble is 15/79 = 19%. With M=8, bubble is 15/23 = 65%. The regression is pipeline underfill, not slower layer compute.
  common_mistake: |
    **The Pitfall:** Blaming kernels or communication overhead for the MFU drop.
    **The Rationale:** Engineers assume compute got slower.
    **The Consequence:** Wasting time profiling kernels when the real issue is pipeline underfill / bubble fraction.
  napkin_math: |
    - 1. **Bubble Formula:** Pipeline bubble fraction is approximately (P-1) / (M + P - 1).
    - 2. **Before (M=64):** Bubble = 15 / (64 + 15) = 15 / 79 = **19%**.
    - 3. **After (M=8):** Bubble = 15 / (8 + 15) = 15 / 23 = **65%**.
