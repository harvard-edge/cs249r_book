title: Pipeline Bubble Regression
scenario: A 16-stage pipeline-parallel model trains with 64 microbatches and 80% MFU. A memory-saving change reduces the number of microbatches to 8. Compute per stage is unchanged, but MFU drops sharply.
question: Why does reducing a 16-stage pipeline from 64 to 8 microbatches sharply reduce Model FLOPs Utilization (MFU)?
details:
  realistic_solution: The pipeline bubble grows because fewer microbatches are available to fill the pipeline. Approximate bubble fraction is (P-1)/(M+P-1). With P=16 and M=64, bubble is 15/79 = 19%. With M=8, bubble is 15/23 = 65%. The regression is pipeline underfill, not slower layer compute.
  common_mistake: |
    **The Pitfall:** Blaming computational kernels or inter-node communication overhead for the MFU drop.
    **The Rationale:** Engineers routinely assume changes to memory footprint cause kernel slowdowns or spilling.
    **The Consequence:** Wasting extensive time profiling Tensor Cores when the real issue is purely structural pipeline underfill.
  napkin_math: |
    1. **Assumptions & Constraints:** Pipeline stages P=16. Microbatches M=64 reduced to M=8. Bubble fraction ≈ (P-1) / (M + P - 1).
    2. **Calculations:** Before (M=64): Bubble = 15 / (64 + 15) = 15 / 79 = 19.0%. After (M=8): Bubble = 15 / (8 + 15) = 15 / 23 = 65.2%.
    3. **Conclusion & Interpretation:** **Result: Pipeline bubble fraction spikes from 19% to 65%. Pipeline-Utilization-Bound.**
