title: Pipeline Bubble Regression
scenario: A 16-stage pipeline-parallel model trains with 64 microbatches and 80% MFU.
  A memory-saving change reduces the number of microbatches to 8. Compute per stage
  is unchanged, but MFU drops sharply. Diagnose the cause and estimate the pipeline
  bubble fraction before and after.
question: Why does reducing a 16-stage pipeline from 64 to 8 microbatches sharply
  reduce MFU?
details:
  realistic_solution: The pipeline bubble grows because fewer microbatches are available
    to fill the pipeline. Approximate bubble fraction is (P-1)/(M+P-1). With P=16
    and M=64, bubble is 15/79 = 19%. With M=8, bubble is 15/23 = 65%. The regression
    is pipeline underfill, not slower layer compute.
  common_mistake: Blaming kernels or communication when the schedule changed the amount
    of pipeline fill/drain overhead.
  napkin_math: Bubble before = 15/(64+15)=19%. Bubble after = 15/(8+15)=65%.
