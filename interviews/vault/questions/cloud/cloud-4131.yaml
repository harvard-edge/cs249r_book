title: GPU Lease Duration and Scheduling Efficiency
scenario: Your MI300X cluster allows job wall times from 1 hour to 7 days. You observe that jobs with 7-day wall times have 15% actual runtime utilization (they finish early but reserved GPUs remain idle).
question: What wall-time policy would improve efficiency when 7-day MI300X jobs only use 15% of their reserved runtime?
details:
  realistic_solution: 'Multi-pronged approach: (1) Adaptive wall time: allow users to request up to 7 days but implement ''wall time right-sizing.'' Track actual runtime distributions per user/job-type. If a user consistently finishes in 6 hours but requests 7 days, suggest (and eventually enforce) a 12-hour wall time with automatic requeue. (2) Shrink-to-fit: when a job completes early, immediately release GPUs. This sounds obvious but requires proper job exit detection - many frameworks leave zombie processes. Use job epilog scripts with nvidia-smi to verify GPU release. (3) Backfill with short wall times: Slurm''s backfill scheduler can start short jobs in the ''shadow'' of long reservations. To help backfill work, require runtime estimates (Slurm --time flag) and penalize inaccurate estimates (if a job runs 2x longer than estimated, lower the user''s priority). (4) Time-boxing: Tier 1 (0-1h, highest priority, for inference/debugging), Tier 2 (1-8h, medium priority, for experiments), Tier 3 (8h-7d, lowest priority, preemptible). Tier 3 jobs must checkpoint every hour or risk being preempted without recovery.'
  common_mistake: |
    **The Pitfall:** Simply capping wall times at a short duration.
    **The Rationale:** Administrators think a hard limit will enforce efficiency.
    **The Consequence:** This forces users to implement complex checkpointing and restart logic, increasing job failure rates and reducing user satisfaction.
  napkin_math: |
    - **Identify waste:** 15% utilization on 7-day jobs means **85% of reserved time is wasted**.
    - **Calculate cluster-wide waste:** If 30% of the cluster runs 7-day jobs, the total waste is 0.30 * 0.85 = **25.5%**.
    - **Right-size analysis:** Achieving 85% utilization means reserved time becomes 15% / 0.85 = 17.6% of the original request.
    - **Calculate recovered capacity:** The recovered time per job is 100% - 17.6% = 82.4%. For the cluster, recovered capacity is 0.30 * 82.4% = **24.7%**.
