schema_version: 1
id: cloud-fill-03028
title: Container Image Size and Model Loading Latency on GPU Pods
topic: container-orchestration
status: published
provenance: imported
scenario: 'A Kubernetes deployment for a 13B model (26GB FP16 checkpoint) on A100 (80GB HBM2e, 2TB/s)
  takes 8 minutes to start a new pod: 5 minutes to pull the container image (45GB image with model weights
  baked in) and 3 minutes to load weights. Target is <2 minute cold start.'
details:
  realistic_solution: Separate model weights from container image. Use a 2GB base image (runtime + dependencies
    only) and mount model weights from a shared NFS/EFS volume or object storage (S3/GCS) at pod startup.
    With a 10Gbps NFS mount, 26GB loads in 26GB/1.25GB/s = 21 seconds. Use init containers to pre-fetch
    weights to node-local NVMe SSD, reducing repeated loads.
  common_mistake: Baking model weights into the container image. This creates a 45GB image that must be
    pulled from registry on every new node, consuming network bandwidth and delaying cold start. Registry
    pull speeds are typically 100-500Mbps in most cloud environments.
  napkin_math: 'Container image pull at 200Mbps (25MB/s): 45GB / 25MB/s = 1800s = 30 minutes (not 5 —
    implies dedicated pull at ~150MB/s). Model weight load from NVMe SSD (3.5GB/s): 26GB / 3.5GB/s = 7.4s.
    Model transfer to GPU HBM at PCIe 4.0 (64GB/s): 26GB / 64GB/s = 0.4s. Total optimized: 2GB image pull
    at 150MB/s = 13s + 7.4s SSD load + 0.4s GPU transfer = 21s. Under 2-minute target by 5.7x.'
