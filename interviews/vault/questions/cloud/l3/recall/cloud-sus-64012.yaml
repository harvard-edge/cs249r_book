id: cloud-sus-64012
title: Server Power Supply Efficiency Curves and 80 PLUS Certification Impact
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A procurement engineer asks you to compare power supply unit (PSU) efficiency tiers for GPU
  server deployments. Name the 80 PLUS efficiency tiers relevant to datacenter servers (Titanium, Platinum,
  Gold), state their minimum efficiency at 50% load, and calculate the difference in annual electricity
  cost between a Gold and Titanium PSU powering a single 8×H100 server drawing 8 kW IT load at 50% average
  utilization.
details:
  realistic_solution: '80 PLUS efficiency at 50% load: Gold ≥ 92%, Platinum ≥ 94%, Titanium ≥ 96%. For
    8 kW IT load at 50% utilization = 4 kW average IT output. Gold PSU input: 4 kW / 0.92 = 4.348 kW.
    Titanium PSU input: 4 kW / 0.96 = 4.167 kW. Difference: 181 W per server. Annual: 181W × 8,760h =
    1,585 kWh/year. At $0.10/kWh = $158.50/server/year. For a 1,000-server cluster: $158,500/year saved
    by choosing Titanium over Gold, often paying back the PSU premium in 1-2 years.'
  common_mistake: Candidates confuse input power efficiency with output power delivered. The 8 kW IT load
    is the output the server needs; the PSU draws more from the wall due to conversion losses. Titanium
    PSUs draw less from the wall for the same output—the difference is the wasted heat.
  napkin_math: 'IT output at 50% load: 8 kW × 0.5 = 4 kW. Gold: 4 / 0.92 = 4,348W wall input. Titanium:
    4 / 0.96 = 4,167W. Delta: 181W. Annual kWh: 0.181 kW × 8,760h = 1,585.6 kWh. Annual $: 1,585.6 × $0.10
    = $158.56. 1,000 servers: $158,560/yr. Titanium PSU premium over Gold: ~$50-100/unit = $50,000-100,000
    fleet. Payback: 0.3-0.6 years.'
