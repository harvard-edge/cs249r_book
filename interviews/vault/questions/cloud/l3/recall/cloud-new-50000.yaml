schema_version: 1
id: cloud-new-50000
title: CUDA-to-HIP Translation Overhead for a Custom GEMM Kernel
topic: software-portability
status: published
provenance: imported
scenario: Your team has 15,000 lines of custom CUDA kernels for a recommendation model. Management wants
  to also deploy on MI300X clusters. You propose using hipify-perl for automated translation. A colleague
  warns that translation is not 1:1.
details:
  realistic_solution: Run hipify-perl for the mechanical 85-95% translation (cuda* -> hip* renames), then
    audit the remaining calls. Texture references must become HIP texture objects, cooperative_groups
    need hipCG equivalents, and any __shfl_sync intrinsics need careful lane-mask verification on CDNA's
    64-wide wavefronts vs CUDA's 32-wide warps. Budget 2-4 engineer-weeks for a 15K-line codebase, not
    2 days.
  common_mistake: Assuming hipify-perl produces drop-in HIP code with zero manual intervention. In practice,
    about 5-15% of CUDA API calls (especially texture memory, cooperative groups, and warp-level intrinsics)
    require manual porting.
  napkin_math: 15K lines x 5-15% manual = 750-2250 lines needing manual porting. At ~50 lines/hour for
    tricky intrinsics = 15-45 engineer-hours minimum.
