title: 'Water Usage Effectiveness: The Hidden Cost of Evaporative Cooling'
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: A hyperscaler reports their datacenter has PUE of 1.1 and WUE (Water Usage Effectiveness) of
  1.8 L/kWh. The facility draws 50 MW for its H100 GPU training clusters. How much water does this datacenter
  consume daily, and why is WUE becoming a critical metric for AI infrastructure?
details:
  realistic_solution: 'Daily water consumption = WUE × Total Power × Hours = 1.8 L/kWh × 50,000 kW × 24
    h = 2.16 million liters/day (~571,000 gallons). This is equivalent to the daily water needs of ~18,000
    average households. WUE matters because: (1) AI training is driving explosive growth in datacenter
    power, (2) many datacenters are in water-stressed regions (Arizona, Texas), (3) regulatory pressure
    is increasing, and (4) evaporative cooling is the cheapest way to achieve low PUE but creates water
    dependency. Alternatives: dry coolers (higher PUE ~1.2 but zero water), DLC (minimal evaporative needs),
    or locating in cold climates with free air cooling.'
  common_mistake: Thinking water use is negligible or only relevant for evaporative cooling. Even closed-loop
    cooling towers consume significant water for makeup due to evaporation, blowdown, and drift.
  napkin_math: 'WUE 1.8 × 50 MW × 24h = 2.16M liters/day = 788M liters/year. At $0.005/liter: $3.94M/year
    water cost. Microsoft reported 6.4B liters water use in 2022 for all DCs.'
