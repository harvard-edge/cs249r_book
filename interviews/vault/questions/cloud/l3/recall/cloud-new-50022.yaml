schema_version: 1
id: cloud-new-50022
title: 'Memory Layout Portability: NCHW vs NHWC Across Accelerators'
topic: software-portability
status: published
provenance: imported
scenario: Your CNN model uses NCHW layout (PyTorch default). When deployed on TPU v5e (which prefers NHWC)
  and MI300X (which also prefers NHWC for convolutions), performance drops 20-30% compared to H100. Why?
details:
  realistic_solution: 'The 20-30% drop comes from implicit layout transpositions inserted by the framework.
    On TPU, XLA auto-converts NCHW to NHWC but each conversion costs a full tensor copy. On MI300X, MIOpen
    prefers NHWC for convolutions and inserts transposes at conv boundaries. Fix: use torch.channels_last
    memory format throughout the model (model.to(memory_format=torch.channels_last)). This avoids transposes
    on TPU and AMD, and is also faster on NVIDIA with cuDNN''s NHWC kernels (which are now as fast or
    faster than NCHW on Ampere+).'
  common_mistake: Ignoring memory layout as a performance-critical portability concern. NVIDIA GPUs historically
    optimized for NCHW (cuDNN's default), while TPU, AMD, and mobile accelerators prefer NHWC.
  napkin_math: 'For a ResNet-50 feature map at batch 32, 64 channels, 56x56: NCHW->NHWC transpose = 32x64x56x56x2
    bytes = 12.8MB memcpy. If 50 conv layers each trigger a transpose: 640MB of unnecessary data movement
    per forward pass.'
