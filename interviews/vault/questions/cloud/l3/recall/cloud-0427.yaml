id: cloud-0427
title: The Small Batch Anomaly
topic: accelerator-comparison
status: published
provenance: imported
scenario: You're running inference for a small convolutional neural network (CNN) with a batch size of
  1. To your surprise, you find that a powerful CPU completes the inference faster than a high-end GPU.
  Explain why this counter-intuitive result might occur.
details:
  realistic_solution: "GPUs are designed for **massive parallel throughput** (SIMT - Single Instruction,\
    \ Multiple Thread) and achieve efficiency by hiding memory and compute latency with a large number\
    \ of concurrent threads. For very small workloads, like a batch size of 1 inference:\n  1.  **Overhead:**\
    \ There's a significant overhead associated with using a GPU: data transfer from CPU RAM to GPU VRAM\
    \ (via PCIe), kernel launch overhead, and context switching. For tiny tasks, this overhead can easily\
    \ outweigh the GPU's raw computational speed.\n  2.  **Latency vs. Throughput:** GPUs are optimized\
    \ for throughput, not necessarily single-task latency. CPUs, with their sophisticated branch prediction,\
    \ larger caches per core, and strong single-thread performance, can process small, latency-critical\
    \ tasks very efficiently.\n  3.  **Underutilization:** A batch size of 1 doesn't provide enough work\
    \ to fully saturate the GPU's thousands of cores, leaving most of them idle. The benefits of parallel\
    \ execution are minimal, while the overhead remains.\n  For small batch sizes, the CPU's lower overhead\
    \ and higher single-core performance often make it the faster choice."
  common_mistake: '"The GPU isn''t being utilized enough" or "The GPU drivers are not optimized for small
    models." While true that utilization is low, the core reason for the CPU''s advantage is architectural.'
  napkin_math: '- PCIe transfer overhead: ~10-100 microseconds. | - GPU kernel launch overhead: ~10-100
    microseconds. | - If a small CNN inference takes 5 microseconds on a CPU, the GPU''s total time would
    be $5 \text{ us (kernel)} + 10 \text{ us (transfer)} + 10 \text{ us (launch)} = 25 \text{ us}$, making
    the CPU 5x faster.'
