schema_version: 1
id: cloud-new-50010
title: ONNX Model Compatibility Matrix Across Runtime Versions
topic: software-portability
status: published
provenance: imported
scenario: You export a model as ONNX opset 18 from PyTorch 2.1. A production system runs ONNX Runtime
  1.14, which supports up to opset 17. The model uses the new GroupNormalization op introduced in opset
  18. What happens at load time?
details:
  realistic_solution: 'Three options: (1) Re-export with opset 17 using torch.onnx.export(opset_version=17),
    which will decompose GroupNorm into supported primitives (InstanceNorm + reshape). (2) Upgrade ONNX
    Runtime to 1.16+ which supports opset 18. (3) Register a custom op implementation. Option 1 is safest
    for production — always export with the opset version matching your target runtime. Maintain a compatibility
    matrix: ORT 1.14 -> opset 17, ORT 1.16 -> opset 18, ORT 1.17 -> opset 20.'
  common_mistake: 'Expecting ONNX Runtime to gracefully degrade or emulate the unsupported op. Instead,
    it raises an immediate error: ''No Op registered for GroupNormalization with domain_version of 18''.'
  napkin_math: 'Decomposed GroupNorm (opset 17) vs native (opset 18): ~5-10% slower due to extra reshape
    and InstanceNorm overhead. For a model where GroupNorm is 2% of total compute, net impact: <0.2% latency
    increase.'
