id: cloud-fill-04006
title: MoE vs Dense Model Memory Tradeoff at Scale
topic: mixture-of-experts
status: published
provenance: imported
scenario: A team is deciding between a 70B dense model and a 140B MoE model with top-2 routing (70B active
  parameters per token) for serving on A100 80GB clusters. Both models have the same active parameter
  count per token. Explain the memory and compute implications of the MoE approach and when it is preferable.
details:
  realistic_solution: Use MoE when you have memory capacity to spare but want to increase model capacity
    without increasing per-token compute. The 140B MoE needs 280 GB BF16 (140B × 2) vs 140 GB for the
    70B dense model — you need 4 A100 80GB for MoE vs 2 for dense. The payoff is higher quality at the
    same per-token FLOPs.
  common_mistake: Assuming MoE and the equivalent dense model have the same memory footprint because active
    params are equal. MoE requires all 140B parameters to be loaded into memory even though only 70B are
    active per token. This doubles the GPU memory requirement.
  napkin_math: '70B dense model: 70B × 2 bytes = 140 GB; needs 2× A100 80GB. 140B MoE model: 140B × 2
    bytes = 280 GB; needs 4× A100 80GB. Per-token active compute: both ~70B params. Memory bandwidth cost:
    MoE loads 4× more weights from HBM per token if experts are not batched, causing 4× lower throughput
    at batch size 1.'
