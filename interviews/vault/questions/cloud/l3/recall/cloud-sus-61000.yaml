id: cloud-sus-61000
title: MI300X XCD Count and Die Topology
topic: chiplet-architecture
status: published
provenance: imported
scenario: A colleague claims the MI300X is a monolithic die with a large HBM pool. Correct their mental
  model and describe the actual physical topology.
details:
  realistic_solution: MI300X is composed of 8 XCDs (Compute Dies) plus 4 MCD (Memory Cache Dies) connected
    via AMD Infinity Fabric on an interposer. Each XCD has its own L2 cache and direct HBM attachment
    through the MCDs. The OS and runtime see 192 GB unified but NUMA distance between XCDs varies by fabric
    hop count.
  common_mistake: Treating MI300X as a single homogeneous compute die. Engineers assume uniform memory
    latency across all 192 GB because the HBM pool is presented as a flat address space.
  napkin_math: 8 XCDs x 24 GB HBM3 = 192 GB total. Die-to-die Infinity Fabric bandwidth ~896 GB/s aggregate.
    Local XCD HBM access ~5.3 TB/s peak / 8 XCDs = ~660 GB/s per XCD local; cross-XCD adds 1-2 fabric
    hops.
