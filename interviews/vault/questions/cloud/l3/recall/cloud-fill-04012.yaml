schema_version: 1
id: cloud-fill-04012
title: Flow Completion Time vs Bandwidth Tradeoff in Gradient Sync
topic: congestion-control
status: published
provenance: imported
scenario: Two ML engineers debate congestion control strategies for a 64-GPU A100 (80GB HBM2e, 2 TB/s)
  training cluster. Engineer A wants to maximize aggregate bandwidth for large gradient all-reduce. Engineer
  B wants to minimize flow completion time (FCT) for the parameter server's many small control messages.
  Explain why these goals conflict and how to address both.
details:
  realistic_solution: 'Implement two traffic classes: (1) a high-priority low-latency queue for control
    messages (<32 KB) with strict priority scheduling, and (2) a best-effort weighted fair queue for gradient
    transfers (>1 MB). Use DSCP marking at the sender to classify traffic. This ensures FCT for small
    flows stays under 100 µs while large flows share bandwidth fairly.'
  common_mistake: Using a single QoS class for all ML traffic. Large gradient transfers and small control-plane
    messages compete for the same buffers and scheduler slots. Large flows cause head-of-line blocking
    of small flows, increasing FCT for critical heartbeats and barrier synchronization.
  napkin_math: 'Control message FCT (no queueing): 32 KB / (100 Gbps / 8) = 2.56 µs. With head-of-line
    behind a 1 GB gradient transfer: 1 GB / (100 Gbps / 8) = 80 ms delay — 31,000× worse. With strict
    priority for small flows: FCT ≈ 2.56 µs + serialization = ~5 µs. Acceptable for heartbeat intervals
    of 1-10 ms.'
