schema_version: 1
id: cloud-sus-64000
title: MI300X HBM3 Bandwidth as a Power Efficiency Lever
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A new ML infrastructure engineer is onboarding and asks you to compare the memory bandwidth
  of the MI300X versus the H100 SXM5. State the peak HBM3 bandwidth for each accelerator, then explain
  why higher memory bandwidth can reduce the number of accelerators needed to serve a given inference
  throughput target—and how this affects rack power draw.
details:
  realistic_solution: MI300X delivers 5.3 TB/s of HBM3 bandwidth versus H100 SXM5 at 3.35 TB/s—a 1.58×
    advantage. For a memory-bandwidth-bound LLM decode workload, this means roughly 1.58× more tokens/second
    per chip. If a serving SLA requires 100K tokens/s, you need ceil(100K / T_mi300x) MI300X chips versus
    ceil(100K / T_h100) H100 chips. Fewer chips means fewer nodes, lower aggregate TDP, and reduced cooling
    load per rack.
  common_mistake: Candidates conflate compute FLOPS with memory bandwidth, assuming the higher-FLOPS chip
    always wins on throughput. Memory-bandwidth-bound workloads (most transformer inference) are governed
    by bandwidth, not FLOPS.
  napkin_math: 'Assume 1 token/s ≈ 1.5 GB/s of model weight streaming (70B model, 2 bytes/param). H100:
    3,350 GB/s / 1.5 = ~2,233 tokens/s per chip. MI300X: 5,300 GB/s / 1.5 = ~3,533 tokens/s per chip.
    For 100K tokens/s: H100 needs ceil(100,000 / 2,233) = 45 chips = ~6 nodes × 700W×8 = 33.6 kW. MI300X
    needs ceil(100,000 / 3,533) = 29 chips = ~4 nodes × 750W×8 = 24 kW. MI300X saves ~9.6 kW (29% power
    reduction) for the same workload.'
