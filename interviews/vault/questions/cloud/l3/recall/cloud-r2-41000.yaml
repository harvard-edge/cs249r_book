id: cloud-r2-41000
title: Column-Parallel Linear Layer Communication Pattern
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: In Megatron-LM's column-parallel linear layer running on an 8×MI300X node, after each GPU computes
  its local partial output, what collective operation is required before the result can be used by the
  next layer, and why?
details:
  realistic_solution: No collective is needed between the column-parallel layer and a subsequent row-parallel
    layer in Megatron's fused design. The column-parallel layer splits weights along columns (output dim),
    producing independent partial activations on each GPU. These feed directly into the row-parallel layer,
    which splits along rows (input dim). Only after the row-parallel layer is an AllReduce needed to sum
    the partial results. This fused column→row design eliminates one communication step per transformer
    block. If used standalone, a column-parallel layer would need an AllGather to reconstruct the full
    output tensor.
  common_mistake: Confusing AllReduce (which sums partial results) with AllGather (which concatenates
    shards). Column-parallel splits the weight matrix along the output dimension, so each GPU produces
    a complete partial output that must be summed, not concatenated.
  napkin_math: 'For a 4-way TP MLP with hidden_dim=16384: each GPU holds a [16384, 4096] column shard
    (W shape is [H_in, H_out]; column-parallel splits H_out, so each shard is [H_in, H_out/4] = [16384,
    4096]). Output per GPU is [batch, seq, 4096]. AllGather across 4 GPUs reconstructs [batch, seq, 16384].'
