id: cloud-r2-40050
title: InfiniBand Architecture Fundamentals
topic: rdma-transport
status: published
provenance: imported
scenario: 'InfiniBand is the dominant interconnect for large-scale ML training clusters. Describe the
  key architectural components of an InfiniBand network: Host Channel Adapters (HCAs), subnet managers,
  Queue Pairs (QPs), and virtual lanes. Explain how each enables RDMA for ML workloads on a 256-H100 cluster.'
details:
  realistic_solution: 'Key components: (1) HCA (Host Channel Adapter): the IB equivalent of a NIC. On
    H100 systems, ConnectX-7 HCAs provide 400Gbps (NDR) with hardware RDMA engines that handle send/receive
    without CPU involvement. Each H100 node has 8 HCAs (8-rail). (2) Subnet Manager (SM): a centralized
    controller that discovers the fabric topology, computes routes (LID-based forwarding tables), and
    programs every switch. Unlike Ethernet''s distributed spanning-tree, IB routing is deterministic and
    centrally planned. For 256 H100s: SM manages 256×8 = 2048 HCA ports + switch ports. (3) Queue Pairs
    (QPs): the fundamental communication abstraction. Each connection between two GPUs uses a QP pair
    (Send Queue + Receive Queue). NCCL creates one QP per peer per rail. For 256 GPUs: each GPU has 255
    QPs per rail × 8 rails = 2040 QPs — these are hardware resources on the HCA. (4) Virtual Lanes (VLs):
    IB supports up to 16 VLs per port for traffic isolation and deadlock avoidance. ML traffic uses VL0,
    management uses VL15. Multiple VLs prevent PFC-like deadlocks without needing PFC at all — IB uses
    credit-based flow control per VL.'
  common_mistake: 'Treating InfiniBand as ''just a fast Ethernet.'' IB has a fundamentally different architecture:
    it is a channel-based fabric with hardware-enforced flow control, not a packet-switched best-effort
    network. The subnet manager actively routes every connection.'
  napkin_math: '256 H100s × 8 HCAs = 2048 HCA ports. Each at 400Gbps = 819 Tbps total fabric bandwidth.
    QPs per node: 255 peers × 8 rails = 2040 QPs. QP memory footprint on HCA: ~1KB per QP context = 2040
    × 1KB = 2MB of HCA memory for QP contexts (out of ~256MB on ConnectX-7). Subnet Manager routing table:
    2048 × 2048 = 4M entries (LID pairs).'
