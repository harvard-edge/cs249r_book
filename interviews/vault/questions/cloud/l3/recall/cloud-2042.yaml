schema_version: 1
id: cloud-2042
title: The Product Quantization Memory Tradeoff
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your 100M-vector index (768-dim, FP32) requires 306 GB of RAM. The infrastructure team says
  you can have at most 64 GB. A colleague suggests Product Quantization (PQ) with 96 subquantizers and
  256 centroids each. How much memory does the PQ-compressed index require, and what is the recall cost?
details:
  realistic_solution: 'PQ with 96 subquantizers (each covering 768/96 = 8 dimensions) and 256 centroids
    per subquantizer encodes each vector as 96 bytes (one uint8 centroid ID per subquantizer). Memory:
    100M × 96 bytes = 9.6 GB — a 32× compression from the original 306 GB. This easily fits in 64 GB with
    room for HNSW graph overhead and IVF lists. The recall cost: typical recall@10 drops from ~0.95 (HNSW
    on raw vectors) to ~0.80-0.85 with PQ alone. Mitigation: use IVF-PQ with HNSW on centroids, and add
    a reranking step that re-scores the top-100 PQ results against the original vectors (stored on SSD).
    This gets recall back to ~0.93 at the cost of ~5ms additional SSD reads.'
  common_mistake: Confusing PQ with simple scalar quantization. PQ doesn't just reduce precision — it
    replaces each subvector with a centroid ID, achieving much higher compression at the cost of approximate
    distance computation.
  napkin_math: 'Original: 100M × 768 × 4B = 307.2 GB. PQ-96: 100M × 96B = 9.6 GB (32× compression). Codebook
    memory: 96 subquantizers × 256 centroids × 8 dims × 4B = 768 KB — negligible. IVF with 16K lists +
    PQ + HNSW: ~12 GB total. Rerank SSD read: top-100 × 3 KB/vector = 300 KB ≈ 1ms on NVMe.'
