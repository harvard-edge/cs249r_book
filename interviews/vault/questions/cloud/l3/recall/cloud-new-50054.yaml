schema_version: 1
id: cloud-new-50054
title: Double Buffering for Data Loading Overlap with GPU Compute
topic: communication-computation-overlap
status: published
provenance: imported
scenario: Your training loop on a single H100 spends 15ms per batch on GPU computation but 20ms waiting
  for the next batch to transfer from CPU to GPU. The GPU is idle 57% of the time. Explain the double-buffering
  technique to hide data transfer latency.
details:
  realistic_solution: 'Double buffering: allocate two pinned memory buffers (A and B). While the GPU computes
    on batch N (from buffer A), asynchronously transfer batch N+1 from CPU to GPU (into buffer B) on a
    separate CUDA stream. When batch N finishes, immediately start computing on buffer B while transferring
    batch N+2 into buffer A. Implementation: use non_blocking=True in tensor.to(device) and PyTorch DataLoader
    with pin_memory=True, num_workers>0, prefetch_factor=2. Effective batch time: max(compute, transfer)
    = max(15, 20) = 20ms instead of 35ms. To fully hide transfer: either reduce batch size (less data
    to transfer) or use faster PCIe (Gen5: 64 GB/s vs Gen4: 32 GB/s).'
  common_mistake: Using a single pinned memory buffer and synchronous H2D transfer. This serializes transfer
    and compute, making total batch time = compute + transfer = 35ms.
  napkin_math: 'Without overlap: 15 + 20 = 35ms per batch, GPU util = 15/35 = 43%. With double buffer:
    max(15, 20) = 20ms per batch, GPU util = 15/20 = 75%. Speedup: 35/20 = 1.75x throughput improvement
    from just overlapping data loading.'
