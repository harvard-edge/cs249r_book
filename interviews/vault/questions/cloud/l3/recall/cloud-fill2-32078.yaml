schema_version: 1
id: cloud-fill2-32078
title: 'MoE Architecture: Router Network Design and Placement'
topic: mixture-of-experts
status: published
provenance: imported
scenario: In a standard MoE transformer, which layers are replaced with MoE layers, and how does the router
  network work? Describe the router's architecture, its input/output, and how it interacts with the expert
  MLP layers. Use Mixtral 8×7B as a concrete example.
details:
  realistic_solution: 'In Mixtral 8×7B: each transformer block has (1) a standard multi-head attention
    layer (shared, no routing), followed by (2) an MoE layer replacing the standard MLP. The MoE layer
    contains 8 independent expert MLPs (each identical in architecture to the standard MLP: two linear
    layers with SiLU activation, dimension 14336) plus a router network. Router architecture: a single
    linear layer W_router ∈ R^{d_model × n_experts} = R^{4096 × 8}. Input: the hidden state x ∈ R^{d_model}
    for each token. Output: softmax(W_router × x) ∈ R^8 — a probability distribution over 8 experts. Top-2
    experts are selected. The token is processed by both selected experts independently: y_1 = Expert_i(x),
    y_2 = Expert_j(x). Final output: g_i × y_1 + g_j × y_2 where g_i, g_j are the router softmax weights
    for the selected experts (renormalized to sum to 1). This weighted sum is added via the residual connection.
    The router adds only 4096 × 8 = 32K parameters per layer — negligible.'
  common_mistake: Thinking the entire transformer block is replaced with MoE. Only the MLP (Feed-Forward
    Network) portion is replaced. The attention mechanism remains shared and identical across all tokens
    — there are no 'attention experts.'
  napkin_math: 'Router per layer: 4096 × 8 = 32K params. vs MLP per expert: 2 × 4096 × 14336 = 117M params.
    Total router: 32 layers × 32K = 1M params. Total experts: 32 × 8 × 117M = 30B params. Router is 0.003%
    of MoE parameters.'
