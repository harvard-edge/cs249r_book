schema_version: 1
id: cloud-sus-60011
title: Understanding the autograd graph lifecycle and preventing memory leaks
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: A junior engineer runs a training loop on A100 (80GB) and observes GPU memory growing by ~200MB
  per step. After 400 steps the process crashes with OOM. The loss is computed correctly and backward()
  is called each step. The engineer cannot identify the leak.
details:
  realistic_solution: 'Always detach tensors before storing for logging: losses.append(loss.item()) or
    losses.append(loss.detach().cpu()). Use torch.cuda.memory_summary() to identify the leak source. Profile
    with torch.cuda.memory_snapshot(). The fundamental rule: once backward() is called, the graph is freed.
    If you store a tensor before backward(), you keep the graph alive.'
  common_mistake: Storing references to loss tensors or intermediate activations in a Python list (e.g.,
    losses.append(loss) for logging) without detaching them first. Each loss tensor holds a reference
    to the entire computational graph for that step, preventing garbage collection.
  napkin_math: 'A single forward pass for a 1B param model creates ~4GB of activation nodes in the graph.
    If stored in a list and not freed, after 400 steps: 400 × 4GB = 1.6TB of cumulative references to
    graphs, with only the actual live memory of ~4GB visible — but the gc cannot collect until references
    drop, so effective peak is much higher.'
