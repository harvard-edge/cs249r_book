id: cloud-fill2-32062
title: 'MoE FLOP Efficiency: Why Sparse Models Train Faster'
topic: mixture-of-experts
status: published
provenance: imported
scenario: A dense 175B model requires 3.5 × 10^23 FLOP to train (Chinchilla scaling). An MoE model with
  1.6T total parameters but 175B active per token achieves similar quality. How many FLOP does the MoE
  model use, and what is the FLOP savings ratio?
details:
  realistic_solution: 'The key MoE insight: FLOP per token ∝ active parameters, not total parameters.
    Dense 175B: FLOP per token (forward + backward) = 6 × 175B = 1.05 TFLOP. MoE with 175B active: FLOP
    per token ≈ 6 × 175B = 1.05 TFLOP (same active FLOPS). Training FLOP for same number of tokens: identical!
    But the MoE model achieves better quality for the same FLOP because it has 1.6T total parameters —
    more knowledge capacity (more experts store more specialized patterns) while paying the same compute
    cost per token. Equivalently: to match the dense 175B model''s quality, the MoE model needs fewer
    tokens/FLOP because the extra parameters provide more capacity. Empirically, MoE achieves the same
    quality with 2-4× fewer training FLOP. So the MoE uses ~0.87-1.75 × 10^23 FLOP for the same quality.
    The tradeoff: more memory (all parameters stored) and more communication (All-to-All) for fewer FLOP.'
  common_mistake: Computing FLOP based on total parameters (1.6T) instead of active parameters (175B).
    In MoE, each token only activates top-k experts, so the FLOP per token scales with active parameters,
    not total parameters.
  napkin_math: 'Dense 175B: 6 × 175B = 1.05 TFLOP/token. MoE 1.6T (175B active): 1.05 TFLOP/token (same).
    But MoE reaches same quality in 2-4× fewer tokens → 2-4× fewer total FLOP. Dense: 3.5×10²³ FLOP. MoE:
    ~1-1.75×10²³ FLOP. Savings: 2-3.5×.'
