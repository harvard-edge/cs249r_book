schema_version: 1
id: cloud-fill-02015
title: PUE Calculation for H100 Datacenter Power Budget
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A datacenter runs 1000 H100 GPUs at 700W each. The facility draws 1.4MW of total power including
  cooling and infrastructure. Calculate the PUE and explain what it means for effective compute cost per
  useful watt.
details:
  realistic_solution: 'IT load = 1000 × 700W = 700kW. PUE = total facility power / IT power = 1400kW /
    700kW = 2.0. This means for every watt of compute, 1 additional watt is spent on cooling/overhead.
    Hyperscale datacenters target PUE 1.1-1.2; PUE=2.0 is legacy/poor. Effective GPU compute cost: if
    electricity is $0.10/kWh, useful compute at PUE=2.0 costs twice as much per useful watt versus PUE=1.0.'
  common_mistake: Confusing PUE=total/IT with PUE=IT/total; reporting PUE<1 which is physically impossible.
  napkin_math: 'IT=700kW, Total=1400kW → PUE=2.0. Overhead=700kW wasted on cooling. At $0.10/kWh: $140/hr
    total vs $70/hr useful compute. PUE=1.2 would save $56/hr = $490k/year for this cluster.'
