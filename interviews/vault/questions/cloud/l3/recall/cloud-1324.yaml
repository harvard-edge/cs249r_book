id: cloud-1324
title: Ride-Sharing Dispatch Network Effects
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A new ML dispatch algorithm for a ride-sharing app with 1M users and 100K drivers in a major
  city claims to reduce wait times by 10%. The city is divided into 500 geohashes. If you randomize drivers
  individually, control drivers will service the overflow from treated drivers, masking the true effect.
  How do you design the A/B test clustering to achieve a valid measurement with less than 5% leakage?
details:
  realistic_solution: Construct a spatial-temporal graph of trip flows and apply a graph clustering algorithm
    to identify dense sub-graphs. Randomize these macro-clusters, merging them iteratively until the ratio
    of cross-cluster trips to total trips drops below the 5% threshold.
  common_mistake: Using individual-level or simple geographic randomization without analyzing trip flow,
    leading to massive SUTVA violations from drivers crossing borders.
  napkin_math: 'Initial geohash A: 10,000 internal trips, 2,000 cross-cluster. Leakage = 2,000 / 12,000
    = 16.67%. Merge with geohash B (5,000 internal, 1,000 cross to A, 500 cross to C). New cluster A+B:
    10,000 + 5,000 + 1,000(now internal) = 16,000 internal. External = 2,000(from A) - 1,000(A to B) +
    500(from B) = 1,500. New leakage = 1,500 / 17,500 = 8.57%. Repeat until leakage < 5%.'
