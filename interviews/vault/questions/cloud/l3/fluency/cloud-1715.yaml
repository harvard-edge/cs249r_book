id: cloud-1715
title: Calculating Total Facility Energy for H100 Cluster
topic: power-budgeting
status: published
provenance: imported
scenario: You are provisioning a new cluster of 1,024 NVIDIA H100 GPUs to train a foundation model. The
  cluster consists of 128 servers, with each 8-GPU node drawing 10.2 kW at peak load. The InfiniBand networking
  fabric adds an additional 150 kW of IT load. The target data center operates with a Power Usage Effectiveness
  (PUE) of 1.35. If the training run takes exactly 30 days (720 hours) at peak utilization, calculate
  the total energy consumed by the data center facility for this specific workload in Megawatt-hours (MWh).
details:
  realistic_solution: First, sum the total IT load (servers + networking). Then, multiply by the facility
    PUE to find the gross facility power required to support that IT load. Finally, multiply by the duration
    in hours to find the energy in MWh.
  common_mistake: Calculating energy consumption using only the IT equipment power (GPUs and networking)
    while forgetting to multiply by the PUE to account for the facility's cooling and power delivery overhead.
  napkin_math: IT Power = (128 servers * 10.2 kW) + 150 kW = 1,305.6 kW + 150 kW = 1,455.6 kW (or ~1.45
    MW). Total Facility Power = IT Power * PUE = 1.4556 MW * 1.35 = 1.965 MW. Total Energy = 1.965 MW
    * 720 hours = 1,414.8 MWh.
