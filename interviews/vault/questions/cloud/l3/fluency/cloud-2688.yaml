id: cloud-2688
title: Calculating Communication-Compute Overlap Ceiling
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'A training step takes 80ms of compute on a single GPU. AllReduce for a 10B parameter model
  (gradient size: 20GB in FP16) across 1024 GPUs using ring AllReduce over 200 Gb/s InfiniBand takes 2×(N-1)/N
  × 20GB / 200 Gb/s. Calculate AllReduce time and training efficiency.'
details:
  realistic_solution: 'Ring AllReduce time: 2 × (N-1)/N × message_size / bandwidth. N=1024, message=20GB=160Gb,
    bandwidth=200 Gb/s. Time = 2 × (1023/1024) × 160Gb / 200Gb/s = 2 × 0.999 × 0.8s = 1.598s ≈ 1.6s. Compute
    time: 80ms. AllReduce time: 1,600ms. Without overlap: step time = 80 + 1600 = 1680ms. Training efficiency
    = 80/1680 = 4.8%. With perfect overlap (overlap AllReduce with next forward pass): step time = max(80,
    1600) = 1600ms. Efficiency = 80/1600 = 5.0%. The cluster is 95% communication-bound — a physical ceiling.
    Solutions: (1) gradient compression (reduce 20GB to 2GB → 160ms AllReduce), (2) pipeline parallelism
    (reduce data-parallel degree), (3) overlap gradients layer-by-layer instead of all at once.'
  common_mistake: 'Forgetting the factor of 2 in ring AllReduce (2 phases: reduce-scatter + all-gather).
    Also: confusing Gb/s (gigabits) with GB/s (gigabytes) — 200 Gb/s = 25 GB/s.'
  napkin_math: 'AllReduce: 2×20GB/200Gbps ≈ 1.6s. Compute: 80ms. Efficiency: 80/1680 = 4.8%. The cluster
    is 95% waiting for communication.'
