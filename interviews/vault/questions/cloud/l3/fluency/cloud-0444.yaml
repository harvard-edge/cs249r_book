schema_version: 1
id: cloud-0444
title: The Scaling Cliff
topic: collective-communication
status: draft
provenance: imported
scenario: You are training a 175B LLM across multiple H100 nodes connected by InfiniBand NDR. You observe
  that scaling from a single node (8 GPUs) to 4 nodes (32 GPUs) gives you a 3x speedup, but scaling further
  to 8 nodes (64 GPUs) only provides a 3.5x total speedup over a single node. Your GPU utilization remains
  high (>90%) across all experiments. What is the most likely cause for these diminishing returns?
details:
  realistic_solution: The bottleneck is the inter-node communication over InfiniBand. Within a node, the
    8 H100s communicate over the ultra-fast 900 GB/s NVLink. When scaling across nodes, the gradients
    and activations must be synchronized using collective operations (like All-Reduce) over the much slower
    50 GB/s InfiniBand network. As more nodes are added, the communication overhead from this network-bound
    All-Reduce operation starts to dominate the total step time, leading to a sharp drop in scaling efficiency,
    even though the GPUs are 'busy' participating in the communication.
  common_mistake: Engineers often assume that if GPU utilization is high, the bottleneck must be the computation
    itself or the model architecture. They fail to recognize that 'high utilization' can also mean 'busy
    waiting' for data from a slow interconnect, which is common in large-scale collective communication.
  napkin_math: 'NVLink 4.0 (intra-node): 900 GB/s bidirectional. InfiniBand NDR (inter-node): 400 Gbps
    = 50 GB/s unidirectional. Bandwidth ratio: 900/50 = 18x. For a 175B model with FP16 gradients: gradient
    size = 175B × 2 bytes = 350 GB. Ring all-reduce data transfer = 2 × (N-1)/N × 350 GB. Intra-node (8
    GPUs, NVLink): 2 × 7/8 × 350 = 612.5 GB. Time = 612.5 / 900 = 0.68s. Inter-node all-reduce for 4 nodes:
    each node must exchange ~262 GB across IB. Cross-node transfer time = 262 GB / 50 GB/s = 5.24s. Total
    step time at 1 node: compute + 0.68s comm. At 4 nodes: compute/4 + ~2.5s cross-node comm (with overlap).
    At 8 nodes: compute/8 + ~5s cross-node comm. Scaling efficiency: 1→4 nodes = 4 / (1 + 4×2.5/compute)
    ≈ 3x. 1→8 nodes = 8 / (1 + 8×5/compute) ≈ 3.5x. Matches observed behavior.'
