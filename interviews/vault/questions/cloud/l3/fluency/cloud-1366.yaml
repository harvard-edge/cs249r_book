id: cloud-1366
title: LLM Inference Memory Bandwidth Calculation
topic: vram-budgeting
status: draft
provenance: imported
scenario: You are deploying a 30 billion parameter LLM in FP16 precision on a single NVIDIA A100 (80GB)
  GPU. The A100 has a peak compute of 312 TFLOPS (FP16 tensor core) and a peak HBM2e memory bandwidth
  of 2.0 TB/s. Assuming a batch size of 1 for auto-regressive token generation, calculate the theoretical
  minimum time required to generate a single token and the maximum tokens/second achievable.
details:
  realistic_solution: Identify that every model parameter must be loaded from HBM into the compute units
    for each generated token. Calculate the total size of the model weights in memory, then divide by
    the total HBM bandwidth to find the bottleneck time per token.
  common_mistake: Calculating token generation speed using peak compute TFLOPS instead of recognizing
    that auto-regressive inference at batch size 1 is strictly memory bandwidth bound.
  napkin_math: 1B params = 2GB in FP16. 30B model size = 60GB. Auto-regressive decoding at batch size
    1 is memory-bandwidth bound. A100 HBM2e bandwidth = 2.0 TB/s (2000 GB/s). Time to load weights per
    token = 60GB / 2000 GB/s = 0.03 seconds (30 ms). Compute time (60 GFLOPs / 312 TFLOPS) is negligible
    (<0.001 ms). Max throughput = 1 / 0.03s = 33.3 tokens/sec.
