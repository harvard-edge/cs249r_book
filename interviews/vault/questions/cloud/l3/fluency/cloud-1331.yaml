id: cloud-1331
title: Calculating Latency Overhead of PyTorch Graph Breaks
topic: graph-compilation
status: published
provenance: imported
scenario: Your team is optimizing a recommendation model on an NVIDIA A100 GPU using PyTorch 2.0 `torch.compile`.
  Pure eager mode takes 20ms per batch. A fully compiled graph without breaks takes 10ms. Developers added
  a data-dependent `if x.max() > threshold:` check and some dynamic logging, resulting in 3 graph breaks
  per forward pass. The execution is now split into 4 compiled fragments taking 11ms total, plus 3 eager
  fallback operations taking 2ms total. If each graph break incurs a fixed 3ms context switch overhead
  between C++ and Python, calculate the new end-to-end latency per batch and compare it to the pure eager
  baseline.
details:
  realistic_solution: 'Calculate total latency including the context switch penalty: 22ms total. The model
    is now slower than eager mode. Fix by removing data-dependent control flow, using `torch.cond`, or
    enforcing `torch.compile(fullgraph=True)`.'
  common_mistake: Failing to account for the fixed C++/Python context switch overhead introduced by each
    graph break, and incorrectly assuming that partially compiled code will always be faster than pure
    eager execution.
  napkin_math: 'Compiled fragments = 11ms

    Eager fallbacks = 2ms

    Graph break overhead = 3 breaks * 3ms/break = 9ms

    Total Latency = 11 + 2 + 9 = 22ms.

    Pure eager baseline = 20ms. The compiled model with breaks is actually 10% (2ms) slower than not compiling
    at all.'
