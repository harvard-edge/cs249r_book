schema_version: 1
id: cloud-0956
title: Certified Radius Calculation for Biometric API
topic: adversarial-robustness
status: published
provenance: imported
scenario: A cloud-based ML API for biometric authentication uses Randomized Smoothing to provide L2 certified
  robustness against adversarial evasion attacks. To comply with security SLAs, the system must guarantee
  predictions will not change within an L2 perturbation radius of R = 0.5. The system injects isotropic
  Gaussian noise with standard deviation σ = 0.5 during the smoothing process. Calculate the minimum probability
  threshold (p_A) required for the top class under this noise to mathematically certify the prediction
  for the given radius.
details:
  realistic_solution: The system must sample the input with Gaussian noise (σ=0.5) and ensure the majority
    class probability p_A ≥ Φ(R/σ). For R=0.5 and σ=0.5, this requires p_A ≥ Φ(1) ≈ 0.841.
  common_mistake: Confusing the base classifier's confidence score with the smoothed classifier's Monte
    Carlo probability estimate, or assuming a linear relationship instead of using the Gaussian inverse
    CDF.
  napkin_math: 'R = σ * Φ⁻¹(p_A)

    0.5 = 0.5 * Φ⁻¹(p_A)

    Φ⁻¹(p_A) = 1.0

    p_A = Φ(1.0) ≈ 84.1%

    The Monte Carlo sampling must yield the top class at least 84.1% of the time.'
