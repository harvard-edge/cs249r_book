schema_version: 1
id: cloud-1564
title: Prometheus Cardinality Explosion
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You are configuring Prometheus monitoring for a centralized LLM routing gateway serving multiple
  B2B clients across 5 global regions. You define a counter metric `llm_requests_total` with the following
  labels to track usage: `model_version` (10 active versions), `region` (5 regions), `gpu_type` (3 types),
  `http_status` (5 codes), and `customer_tenant_id` (10,000 enterprise tenants). Assuming each active
  time series consumes approximately 4 KB of RAM in the Prometheus TSDB, calculate the memory footprint
  of this single metric. How would you redesign the observability stack to support tenant-level billing
  without crashing the metrics server?'
details:
  realistic_solution: Remove the unbounded `customer_tenant_id` label from the Prometheus metric. High-cardinality
    data should be recorded via structured event logs (e.g., using FluentBit or OpenTelemetry) and sent
    to an OLAP database like ClickHouse or BigQuery for ad-hoc billing queries, leaving Prometheus to
    handle aggregate system health.
  common_mistake: Candidates often assume time series memory grows additively with new labels or rely
    on TSDB compression for active RAM, failing to recognize the multiplicative combinatorial explosion
    (cardinality) that high-entropy labels like `customer_tenant_id` cause.
  napkin_math: Cardinality = 10 (versions) × 5 (regions) × 3 (GPUs) × 5 (statuses) × 10,000 (tenants)
    = 7,500,000 unique time series. Memory Footprint = 7,500,000 × 4 KB = 30,000,000 KB = 30 GB of RAM
    for just ONE metric. Removing the tenant label drops cardinality to 750 series (3 MB).
