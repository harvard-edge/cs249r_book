id: cloud-1179
title: Eager Execution Dispatch Overhead
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are profiling a dynamic Graph Neural Network (GNN) model training on an NVIDIA A100 (80GB)
  using PyTorch eager mode. The model issues 50,000 small, independent matrix multiplications (shape 32x32)
  per forward pass due to dynamic control flow. Profiling shows that each PyTorch kernel dispatch from
  Python takes 4 μs, while the actual GPU execution for each 32x32 matmul takes only 0.5 μs. Calculate
  the total CPU dispatch time versus GPU compute time per forward pass, and determine the maximum theoretical
  GPU utilization under these conditions.
details:
  realistic_solution: Recognize that eager execution creates a CPU bottleneck. Resolve this by using torch.compile
    to trace and fuse operations into larger kernels, or using CUDA Graphs to capture the launch overhead
    and replay it directly on the GPU.
  common_mistake: Focusing on GPU-side optimizations like Tensor Cores or memory bandwidth without realizing
    the workload is entirely CPU-bound by the Python dispatch overhead.
  napkin_math: Total Dispatch Time = 50,000 ops * 4 μs/op = 200,000 μs = 200 ms. Total GPU Compute Time
    = 50,000 ops * 0.5 μs/op = 25,000 μs = 25 ms. Since the GPU must wait for the CPU to dispatch kernels
    sequentially, the total step time is bounded by the 200 ms dispatch. Max GPU utilization = GPU Compute
    / Total Time = 25 ms / 200 ms = 12.5%.
