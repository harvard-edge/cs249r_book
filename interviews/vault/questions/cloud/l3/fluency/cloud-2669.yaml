id: cloud-2669
title: Model Cache Hit Rate and Latency Impact
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'A serving platform has 80GB GPU VRAM. Model sizes: 50 small models (500MB each), 10 medium
  models (4GB each), 2 large models (20GB each). Traffic: 60% to small, 30% to medium, 10% to large. With
  LRU caching, how many models of each size fit, and what is the approximate cache hit rate?'
details:
  realistic_solution: 'Strategy 1 (proportional to traffic): Allocate 60% VRAM to small, 30% to medium,
    10% to large. Small: 48GB / 500MB = 96, but only 50 exist → 50 models, 25GB used. Medium: 24GB / 4GB
    = 6 of 10 models. Large: 8GB for 20GB models → 0 fit. Remaining: 80 - 25 - 24 = 31GB. Use remaining
    for 1 large (20GB) + 2 more medium (8GB) + 6 more small (3GB but all already loaded). Final: 50 small
    (all), 8 medium, 1 large. Hit rate: 60% × 100% + 30% × 80% + 10% × 50% = 60% + 24% + 5% = 89% hit
    rate. Miss rate 11%. If miss penalty = 5s and hit latency = 20ms: avg latency = 0.89 × 20ms + 0.11
    × 5000ms = 17.8ms + 550ms = 567.8ms. The 11% miss rate dominates average latency despite 89% hit rate.'
  common_mistake: Celebrating a 89% hit rate. With high miss penalties (seconds), even 11% misses make
    average latency unacceptable. Model serving needs 99%+ hit rates.
  napkin_math: '50 small (25GB) + 8 medium (32GB) + 1 large (20GB) = 77GB of 80GB. Hit rate: 89%. Avg
    latency: 0.89×20ms + 0.11×5s ≈ 568ms. Misses dominate.'
