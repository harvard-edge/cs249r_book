schema_version: 1
id: cloud-1620
title: MIG Profile Packing and Resource Fragmentation
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: You are configuring a single NVIDIA A100 40GB GPU for multi-tenant inference using Multi-Instance
  GPU (MIG) to provide strict hardware-level isolation. Tenant A is assigned a `4g.20gb` profile for a
  latency-sensitive LLM. Tenant B is assigned a `2g.10gb` profile for batch processing. How many `1g.5gb`
  profiles can you provision for Tenant C in the remaining capacity, and which resource (compute or memory)
  becomes the limiting factor preventing further allocations?
details:
  realistic_solution: An A100 GPU supports a maximum of 7 compute slices and 8 memory slices (5GB each
    for the 40GB model). The `4g.20gb` profile consumes 4 compute and 4 memory slices. The `2g.10gb` profile
    consumes 2 compute and 2 memory slices. This leaves 1 compute slice and 2 memory slices (10GB). Therefore,
    you can provision exactly ONE `1g.5gb` instance. Compute slices are exhausted first, stranding the
    final 5GB of memory.
  common_mistake: Assuming memory is the only limiting factor. Since 30GB (20GB + 10GB) is used out of
    40GB, candidates wrongly conclude that two 5GB instances can be created, ignoring the hardware compute
    slice limits.
  napkin_math: 'Total Capacity: 7 Compute (C), 8 Memory (M)

    Tenant A (4g.20gb): -4C, -4M -> Remaining: 3C, 4M

    Tenant B (2g.10gb): -2C, -2M -> Remaining: 1C, 2M

    Tenant C (1g.5gb): -1C, -1M -> Remaining: 0C, 1M (5GB stranded)'
