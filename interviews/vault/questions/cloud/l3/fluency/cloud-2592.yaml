title: Cloud Benchmark Harness L3 0
topic: roofline-analysis
status: published
provenance: imported
scenario: You benchmark a model inference on an H100. Without warmup, the first 5 iterations average 45
  ms. After warmup, the next 100 iterations average 12 ms with std dev 0.8 ms. The harness reports the
  overall mean of all 105 iterations. Calculate the bias and corrected result.
details:
  realistic_solution: 'Biased overall mean: (5 × 45 + 100 × 12) / 105 = (225 + 1200) / 105 = 1425 / 105
    = 13.57 ms. Corrected mean (warmup excluded): 12.0 ms. Bias: 13.57 - 12.0 = 1.57 ms = 13.1% overestimate.
    95% confidence interval: 12.0 ± 1.96 × 0.8 / √100 = 12.0 ± 0.157 ms = [11.84, 12.16]. The warmup inflates
    the reported latency by 13% — significant for benchmark comparisons where 5% differences are meaningful.
    Proper harness: discard first N iterations (until steady-state), report median of remaining, plus
    percentiles.'
  common_mistake: Including warmup iterations in the benchmark average. The first few iterations include
    JIT compilation (torch.compile), CUDA context initialization, and memory allocation that will never
    occur in steady-state serving.
  napkin_math: 'Warmup: 5 × 45 = 225 ms. Steady: 100 × 12 = 1200 ms. Biased mean: 1425/105 = 13.57 ms.
    True mean: 12.0 ms. Bias: 13.1%. 95% CI: ±0.157 ms (1.3%). Warmup bias is 10x larger than measurement
    noise.'
