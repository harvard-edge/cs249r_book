id: cloud-1492
title: Latency Overhead in Layered Defense
topic: latency-decomposition
status: published
provenance: imported
scenario: 'A cloud healthcare ML serving platform implements a 3-layer defense architecture: 1) Hardware
  TEE (Confidential Computing) that encrypts memory, reducing effective memory bandwidth by 20%; 2) API
  input sanitization (adds 5ms flat latency); and 3) Output differential privacy noise (adds 3ms flat
  latency). The served model is a Transformer with a 100ms baseline latency (60ms memory transfer, 40ms
  compute). Calculate the new end-to-end latency to determine if it meets a strict 125ms latency SLO.'
details:
  realistic_solution: Recalculate the memory transfer time by dividing the baseline memory latency by
    the new effective bandwidth ratio (0.8). Then add the unchanged compute time and the constant API/DP
    overheads to find the total latency. The result is 123ms, which passes the 125ms SLO.
  common_mistake: Applying the 20% bandwidth reduction as a flat 20% penalty to total latency (100 * 1.2
    = 120ms) or multiplying memory time by 1.2 (60 * 1.2 = 72ms) instead of dividing by the new bandwidth
    ratio (60 / 0.8 = 75ms).
  napkin_math: 'New Memory Time = 60ms / (1 - 0.20) = 60ms / 0.8 = 75ms.

    New Inference Time = 75ms (memory) + 40ms (compute) = 115ms.

    Total Latency = 115ms (inference) + 5ms (API) + 3ms (DP) = 123ms.

    123ms < 125ms SLO (Passes).'
