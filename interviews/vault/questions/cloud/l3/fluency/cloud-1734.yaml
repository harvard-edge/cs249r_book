schema_version: 1
id: cloud-1734
title: Estimating Prefix Caching Savings
topic: vram-budgeting
status: published
provenance: imported
scenario: You are serving Llama-3-70B (80 layers, 8 KV heads, 128 head dimension, FP16 precision) on an
  8x H100 cluster. You are processing a batch of 256 concurrent requests, all of which share the exact
  same 2048-token system prompt. Calculate the total KV cache memory savings across the cluster achieved
  by enabling automatic prefix caching.
details:
  realistic_solution: Calculate the per-token KV cache size, multiply by the system prompt length to find
    the size per request, and then multiply by (Batch Size - 1) to find the redundant memory that is saved.
  common_mistake: Using the number of Query heads instead of KV heads for the calculation, forgetting
    to multiply by the number of layers, or failing to subtract the 1 copy of the prompt that must still
    be kept in memory.
  napkin_math: Bytes per token per layer = 2 (K, V) * 8 (KV heads) * 128 (head dim) * 2 bytes (FP16) =
    4,096 bytes (4 KB). Total per token = 4 KB * 80 layers = 320 KB. Size of 2048-token prompt = 320 KB
    * 2048 = 655,360 KB (640 MB). Savings for 256 requests = (256 - 1) * 640 MB = 255 * 640 MB = 163,200
    MB, or approximately 159.3 GB saved.
