id: cloud-1773
title: NVMe Random IOPS Bottleneck in Data Loading
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training a multi-modal model where the data loader must randomly fetch 400,000 small
  audio clips per second from a local PCIe Gen4 NVMe SSD to prevent GPU starvation. Each audio clip is
  exactly 4 KB in size. The SSD's spec sheet lists a maximum of 7,000 MB/s sequential read bandwidth and
  250,000 random read IOPS. Calculate the actual data throughput the SSD can provide in this random access
  pattern, and determine if it meets the training loop's requirements.
details:
  realistic_solution: Calculate the maximum random throughput by multiplying the Random IOPS limit by
    the file size. Identify that the system is IOPS-bound, not bandwidth-bound, and will cap out at 1.0
    GB/s. The solution is to either pack the 4 KB files into larger sequential formats (e.g., WebDataset,
    TFRecords) or stripe across multiple SSDs.
  common_mistake: Comparing the required 1.6 GB/s throughput only against the 7,000 MB/s sequential read
    bandwidth and incorrectly concluding the SSD is more than sufficient.
  napkin_math: Required Throughput = 400,000 clips/s * 4 KB = 1,600,000 KB/s (1.6 GB/s). Max Random Throughput
    = 250,000 IOPS * 4 KB/IO = 1,000,000 KB/s (1.0 GB/s). 1.0 GB/s < 1.6 GB/s, so the storage subsystem
    will bottleneck training.
