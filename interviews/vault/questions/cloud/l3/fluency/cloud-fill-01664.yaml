title: 'DP-SGD Scaling on NVIDIA H100: Balancing Privacy and Performance'
topic: differential-privacy
status: published
provenance: imported
scenario: You are leading the development of a privacy-preserving machine learning service. Your current
  task is to train a large language model using DP-SGD on a dataset of 1 billion sensitive records. The
  training is performed on a single NVIDIA H100 GPU (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory
  bandwidth, 700W TDP). You need to achieve an (ε, δ)-privacy guarantee of (8, 1e-7) over one year of
  continuous training. The current proposed training setup uses a microbatch size of 16 and a global batch
  size of 4096. Your challenge is to determine the appropriate noise scale, evaluate its impact on model
  utility, and assess the system-level implications for throughput and resource utilization on the H100,
  ensuring the privacy budget is met efficiently.
details:
  realistic_solution: To address this, implement a moments accountant for precise ε tracking. Optimize
    the DP-SGD algorithm by leveraging the H100's FP16 dense capabilities for gradient accumulation and
    noise generation where possible, maximizing the 989 TFLOPS throughput. Carefully tune the microbatch
    and global batch sizes to balance memory access patterns with the 3.35 TB/s HBM3 bandwidth. Explore
    advanced techniques like adaptive clipping or hierarchical noise addition to minimize utility loss.
    Profiling the H100 to identify bottlenecks in gradient aggregation and noise injection is crucial
    for maximizing device utilization.
  common_mistake: A common mistake is to either apply an overly conservative noise scale, severely degrading
    model utility, or an insufficient one, violating the privacy budget. Another pitfall is neglecting
    the significant computational overhead of gradient clipping and noise addition in DP-SGD, which can
    bottleneck performance on powerful hardware like the H100 if not efficiently parallelized or optimized,
    especially regarding memory bandwidth for gradient access.
  napkin_math: Given a global batch size of 4096 and a microbatch size of 16, you have 256 microbatches
    per global step. If the gradients for each microbatch require X MB of HBM3 and Y FP16 operations for
    clipping and noise addition, estimate the total memory traffic and computational load per global step.
    Compare this to the H100's 3.35 TB/s memory bandwidth and 989 TFLOPS FP16 dense compute. Roughly calculate
    how many global steps can be executed per second, and then estimate the total training time for 1
    billion records. How many standard deviations of Gaussian noise (σ) would be roughly required for
    ε=8 given your microbatch sampling rate and total steps, and what is the approximate signal-to-noise
    ratio?
