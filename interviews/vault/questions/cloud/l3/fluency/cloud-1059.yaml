schema_version: 1
id: cloud-1059
title: Overlapping Data Transfers with CUDA Streams
topic: data-parallelism
status: published
provenance: imported
scenario: You are deploying an inference pipeline on a T4 GPU (PCIe Gen3 x16, 12 GB/s). For each batch,
  the host-to-device (H2D) transfer takes 5 ms, the inference kernel takes 10 ms, and the device-to-host
  (D2H) transfer takes 3 ms. You need to process 100 consecutive batches. Calculate the total execution
  time if you process batches synchronously in the default stream versus pipelining them across 3 concurrent
  CUDA streams.
details:
  realistic_solution: 'In synchronous mode, each batch takes 5 + 10 + 3 = 13 ms sequentially, totaling
    1800 ms for 100 batches. With CUDA streams overlapping H2D, compute, and D2H, the steady-state throughput
    is bottlenecked by the 10 ms compute kernel. The total time is the latency of the first batch plus
    the bottleneck time for the remaining 99 batches: 18 ms + (99 * 10 ms) = 1008 ms.'
  common_mistake: Candidates often assume total execution time with streams is simply divided by the number
    of pipeline stages, ignoring that the longest pipeline stage (compute at 10 ms) strictly dictates
    the maximum overall throughput.
  napkin_math: 'Synchronous = 100 batches * (5 ms H2D + 10 ms Compute + 3 ms D2H) = 1800 ms.

    Pipelined (Streams) = T_first_batch + (N-1) * max(T_stages) = (5 + 10 + 3) + 99 * 10 = 18 + 990 =
    1008 ms.

    Speedup = 1800 / 1008 ≈ 1.78x.'
