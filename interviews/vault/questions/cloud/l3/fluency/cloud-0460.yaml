schema_version: 1
id: cloud-0460
title: The Real-Time Voice Deadline
topic: latency-decomposition
status: published
provenance: imported
scenario: You're designing a real-time voice assistant where the product requirement is a Time-To-First-Token
  (TTFT) under 350ms to feel 'instant'. Your pipeline involves transcribing audio to a 200-token prompt,
  which is sent to a 7B parameter LLM on an H100 GPU. The inference server uses continuous batching. Assuming
  10ms for network round-trip and 40ms for scheduler/queueing overhead, use napkin math to solve whether
  the H100 can meet the deadline by calculating the prefill and first decode time.
details:
  realistic_solution: 'Yes, the deadline can be easily met. The total TTFT is the sum of all serial latencies:
    `T_network + T_queue + T_prefill + T_decode_1`. The critical part is the `T_prefill`, the time it
    takes the GPU to process the 200-token prompt. For short prompts, this phase is typically bound by
    memory bandwidth—the time it takes to read the model weights. The subsequent single-token decode step
    is also memory-bound but involves reading the much smaller KV cache. On an H100, both operations are
    incredibly fast.'
  common_mistake: Assuming that a 7B parameter model is inherently too 'big' for any real-time deadline,
    or getting confused between the compute-bound prefill phase and the memory-bound decode phase. Another
    mistake is to ignore overheads and only calculate the raw compute time.
  napkin_math: 'Deadline = 350ms. Network/queue = 50ms, leaving 300ms. Prefill is compute-bound: 7B params
    * 200 tokens * 2 FLOPs = 2.8 TFLOPs. On H100 (989 TFLOPS), prefill takes 2.8 / 989 = 2.8ms. First
    decode is memory-bound: 14GB weights / 3.35TB/s = 4.1ms. Total GPU time = 2.8ms + 4.1ms = 6.9ms. This
    easily beats the 300ms budget, proving the 7B model is excessively fast here.'
