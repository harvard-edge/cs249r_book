id: cloud-1635
title: Dynamic Batching Network Latency
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying an NLP model as a microservice. Single-batch inference takes 15ms on the GPU.
  JSON over HTTP adds 10ms of serialization overhead per request. Network RTT is 5ms. To increase throughput,
  you implement dynamic batching (max batch size 16, timeout 10ms), where GPU inference takes 40ms. You
  also migrate to gRPC/Protobuf, dropping serialization overhead to 2ms per request. Calculate the max
  theoretical throughput (assuming GPU is the bottleneck) and the end-to-end latency for a request that
  waits the full timeout.
details:
  realistic_solution: Optimize network serialization by using gRPC/Protobuf and implement dynamic batching.
    The GPU can process 25 batches of 16 per second, yielding 400 req/sec. The maximum latency includes
    the timeout, serialization, inference, and network RTT.
  common_mistake: Candidates often assume batching provides linear throughput scaling without considering
    the latency penalty of waiting for the batch to fill, or ignore the CPU serialization overhead which
    can become the bottleneck.
  napkin_math: Max Throughput = (1000ms / 40ms) * 16 = 400 req/sec. Max E2E Latency = 5ms (RTT) + 2ms
    (SerDes) + 10ms (Wait) + 40ms (Inference) = 57ms.
