id: cloud-top-65039
title: 'LoRA Training Data Efficiency: Minimum Viable Dataset Size'
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A team wants to fine-tune Llama-3 8B for pharmaceutical regulatory documents. They have 500
  examples. A colleague argues they need at least 10K examples for LoRA to be effective. Who is right?
details:
  realistic_solution: 'LoRA data efficiency: since LoRA r=8 trains ~6M parameters (vs 8B base), the effective
    parameter-to-data ratio is 6M/500 = 12K params/example. For full fine-tune: 8B/500 = 16M params/example
    — severe overfitting risk. LoRA is fine with 500 examples if: (1) Examples are representative of the
    target distribution; (2) Regularization is applied (weight decay 0.01, dropout 0.05 on LoRA layers);
    (3) Evaluate on a held-out set (80/20 split = 400 train, 100 eval). Expected performance: 500 high-quality
    examples typically suffices for style transfer and domain terminology adaptation. Insufficient for:
    entirely new factual knowledge not in pretraining data. For pharmaceutical regs: most factual content
    exists in pretraining; LoRA helps with format and style. 500 examples is viable.'
  common_mistake: Applying rules of thumb about full fine-tuning data requirements to LoRA. Full fine-tuning
    of 8B parameters requires thousands of examples to avoid overfitting. LoRA adapts only millions of
    parameters, dramatically lowering the data requirement.
  napkin_math: 'LoRA r=8 on Llama-3 8B (d=4096, 32 layers, Q+V): trainable params = 2 * 32 * 2 * 4096
    * 8 = 4.2M. Data-to-params ratio with 500 examples at avg 512 tokens: 500 * 512 = 256K training tokens.
    Tokens per trainable param: 256K / 4.2M = 0.061. This appears low, but LoRA overfit risk is buffered
    by the frozen pretrained weights providing implicit regularization. Practical threshold: 50K tokens
    (100 examples at 512 tokens) is empirically sufficient for style adaptation.'
