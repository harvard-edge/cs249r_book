id: cloud-1469
title: Calculate Maximum Batch Size for LLM KV Cache
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a 13B parameter LLM (FP16 precision) on a single 80 GiB A100 GPU. The model
  has 40 layers, 40 attention heads, and a head dimension of 128. You need to support a maximum sequence
  length of 2048 tokens. After reserving 26 GiB for model weights and 4 GiB for forward-pass activations
  and workspace overheads, what is the maximum concurrent batch size you can serve before encountering
  out-of-memory (OOM) errors due to the KV cache bottleneck?
details:
  realistic_solution: Calculate the exact memory footprint of the KV cache per token per layer, multiply
    by the total number of layers and sequence length, and divide the available GPU memory by this per-sequence
    footprint.
  common_mistake: Ignoring the layer count or forgetting that both Keys and Values must be cached for
    every token, leading to a significant overestimation of the maximum batch size.
  napkin_math: 13B FP16 model = 26GB. A100 total VRAM = 80GB. Usable VRAM = 80GB - 26GB (weights) - 4GB
    (context/workspace) = 50GB. KV cache per token = 2 (K,V) * 40 layers * 40 heads * 128 dim * 2 bytes
    = 1,638,400 bytes (~1.64 MB). KV cache per 2048-token sequence = 1.64 MB * 2048 = 3.35 GB. Max concurrent
    batch size = floor(50 GB / 3.35 GB) = 14 sequences.
