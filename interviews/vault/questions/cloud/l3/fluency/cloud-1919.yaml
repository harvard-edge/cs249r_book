id: cloud-1919
title: Profiling SFU vs Memory Bottlenecks in GeLU
topic: roofline-analysis
status: published
provenance: imported
scenario: You are profiling a large language model's training step on an NVIDIA A100 GPU (2.0 TB/s memory
  bandwidth, 108 SMs, 16 SFUs per SM running at 1.4 GHz). The profiling shows a bottleneck in the GeLU
  activation function applied to a 8192 x 32768 activation tensor in FP16. Given that an accurate GeLU
  approximation requires roughly 5 Special Function Unit (SFU) instructions per element, calculate whether
  the GeLU layer is bottlenecked by SFU compute throughput or HBM memory bandwidth, assuming the kernel
  is standalone (not fused with the preceding linear layer).
details:
  realistic_solution: Calculate both the theoretical SFU processing time and the memory transfer time.
    The theoretical SFU throughput is 108 SMs * 16 SFUs/SM * 1.4 GHz = 2.42 TOPS. For 268.4M elements
    requiring 5 SFU ops each, the compute time is 554 µs. The memory traffic for reading and writing the
    FP16 tensor is 1.07 GB, taking 535 µs at 2.0 TB/s. Since the compute time exceeds the memory transfer
    time (554 µs > 535 µs), the standalone kernel is compute-bound (SFU-limited). Fusing it with the preceding
    layer removes the memory round-trip entirely, keeping the bottleneck strictly on the SFU compute limit
    of 554 µs.
  common_mistake: Candidates often assume non-linear activations are always strictly memory-bound without
    calculating the specific SFU instruction throughput constraint, or they incorrectly use Tensor Core
    FLOPS to evaluate activation performance.
  napkin_math: 'Elements = 8192 × 32768 = 268,435,456

    SFU Throughput = 108 * 16 * 1.4e9 = 2.42 TOPS

    SFU Time = (268.4M * 5) / 2.42e12 = 554 µs

    Memory Traffic (Read+Write FP16) = 268.4M * 2 × 2 = 1.07 GB

    Memory Time = 1.07 GB / 2000 GB/s = 535 µs

    554 µs (SFU) > 535 µs (Mem), so the operation is compute-bound (SFU-limited).'
