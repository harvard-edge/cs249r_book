schema_version: 1
id: cloud-1061
title: Sizing an NER-based PII Redaction Fleet
topic: roofline-analysis
status: published
provenance: imported
scenario: A cloud-based API gateway implements a Data Anonymization Layer using a lightweight NER model
  (DistilBERT, 66M parameters) to detect and redact PII from user prompts before forwarding them to an
  upstream LLM. The gateway must process 10,000 requests per second with an average prompt length of 256
  tokens. Calculate the minimum number of A10G GPUs (125 TFLOPS FP16 theoretical peak) required to provision
  this anonymization fleet, assuming you can achieve 50% hardware utilization for the NER inference.
details:
  realistic_solution: Calculate the inference FLOPs per request using the $2PN$ approximation, scale it
    by the requests per second to find total throughput requirements, and divide by the effective GPU
    compute capacity.
  common_mistake: Candidates often use the theoretical peak TFLOPS without applying the 50% utilization
    penalty, leading to severe under-provisioning, or they incorrectly estimate transformer FLOPs by omitting
    the 2x multiply-accumulate factor.
  napkin_math: FLOPs/req = 2 * 66M params * 256 tokens ≈ 33.8 GFLOPs. Total throughput = 10,000 req/s
    * 33.8 GFLOPs = 338 TFLOPS. Effective GPU compute = 125 TFLOPS * 0.50 = 62.5 TFLOPS. Total GPUs required
    = ceil(338 / 62.5) = 6 GPUs.
