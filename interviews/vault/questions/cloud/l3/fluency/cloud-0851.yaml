schema_version: 1
id: cloud-0851
title: Adversarial Training Compute Overhead
topic: roofline-analysis
status: published
provenance: imported
scenario: A cloud ML team is defending a production ResNet-50 image classifier against Fast Gradient Sign
  Method (FGSM) attacks. They plan to implement adversarial training by generating one adversarial example
  for every clean image in their 5-million image dataset. On an NVIDIA A100 GPU, a standard forward-backward
  pass takes 120ms per batch of 64. Generating an FGSM example requires computing the gradient of the
  loss with respect to the input pixels. Calculate the total additional compute time required per epoch
  for this defense.
details:
  realistic_solution: To calculate the total overhead, account for the original training pass, the FGSM
    generation pass (which requires backpropagation to the input layer), and the training pass on the
    generated adversarial examples. The time per batch increases from 120ms to 360ms.
  common_mistake: Candidates often assume generating adversarial examples is a lightweight inference step,
    forgetting that FGSM requires a full forward-backward pass to compute gradients with respect to the
    input, effectively tripling the total training time when added to the original pipeline.
  napkin_math: 'Total batches = 5,000,000 / 64 = 78,125 batches.

    Standard training time = 78,125 * 0.12s = 9,375s = 2.6 hours.

    New pipeline per batch: 120ms (train clean) + 120ms (FGSM generation) + 120ms (train adversarial)
    = 360ms.

    New total time = 78,125 * 0.36s = 28,125s = 7.8 hours.

    Additional overhead = 7.8 hours - 2.6 hours = 5.2 additional GPU hours per epoch.'
