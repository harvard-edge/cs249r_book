schema_version: 1
id: cloud-1520
title: Delay Scheduling Break-even Calculation
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are configuring a batch scheduler for a computer vision training job that requires downloading
  a 500GB dataset before execution begins. The cluster uses a 10 Gbps Ethernet fabric (1.25 GB/s effective
  bandwidth). The compute nodes have local NVMe SSDs capable of 5 GB/s sequential reads. A node with the
  dataset already cached on its local NVMe is currently busy but will free up in T seconds. All other
  nodes are completely idle but have cold caches. Calculate the maximum wait time T (in seconds) the scheduler
  should tolerate before falling back to scheduling the job on an idle node and pulling the dataset over
  the network.
details:
  realistic_solution: The optimal scheduling decision compares the total time-to-start for both options.
    You must calculate the time to pull over the network and subtract the time to read from the local
    NVMe cache to find the break-even wait time.
  common_mistake: Ignoring the time required to read from the local NVMe cache (assuming the cached dataset
    is instantly available in memory) and mistakenly equating the max wait time to the full network transfer
    time.
  napkin_math: Network Pull Time = 500 GB / 1.25 GB/s = 400 seconds. Local NVMe Read Time = 500 GB / 5.0
    GB/s = 100 seconds. Break-even Wait Time (T) = 400s - 100s = 300 seconds.
