title: Copper vs Optical Cost Break-even
topic: collective-communication
status: published
provenance: imported
scenario: You need 200 links at 400G. Within a rack (1m), passive copper DAC costs $50/cable. Between
  racks (10m), you need optical transceivers at $400/pair + $20/fiber. Calculate total cabling cost if
  150 links are intra-rack and 50 are inter-rack.
details:
  realistic_solution: 'Intra-rack (150 links, 1m passive copper): 150 × $50 = $7,500. Inter-rack (50 links,
    10m optical): 50 × ($400 + $20) = 50 × $420 = $21,000. Total mixed: $28,500. If all optical: 200 ×
    $420 = $84,000. Savings from mixed approach: $84,000 - $28,500 = $55,500 (66% savings). If you tried
    passive copper for inter-rack (10m): link budget would fail at 400G — the signal cannot survive 10m
    of copper attenuation at PAM4 frequencies. You would get link errors and retransmissions, effectively
    reducing bandwidth. The link budget forces the technology choice: copper within rack, optical between
    racks.'
  common_mistake: Using optical for everything to simplify. At short distances, passive copper is 8x cheaper
    and has lower latency — mixing cable types based on distance optimizes cost.
  napkin_math: 'Intra-rack copper: 150 × $50 = $7.5K. Inter-rack optical: 50 × $420 = $21K. Total: $28.5K.
    All-optical: $84K. Mixed saves $55.5K.'
