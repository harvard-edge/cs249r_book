schema_version: 1
id: cloud-1309
title: SLA Budgets Under Network Stress
topic: graceful-degradation
status: published
provenance: imported
scenario: A cloud recommendation API has a strict 100ms latency SLA. The standard pipeline features a
  DLRM that takes 80ms to compute. Pre- and post-processing take 15ms total, and nominal network latency
  is 2ms. During a regional outage, network latency jumps to 30ms. To maintain the 100ms SLA, the system
  gracefully degrades by falling back to a lightweight heuristic model. Calculate the maximum allowable
  compute time for the heuristic model, and determine how many CPU instances are needed to handle a degraded
  load of 10,000 requests per second if one instance can process 200 heuristic requests per second.
details:
  realistic_solution: 'Dynamically recalculate the strict compute latency budget: 100ms (SLA) - 30ms (network)
    - 15ms (processing) = 55ms max compute time. For capacity planning, divide the degraded load of 10,000
    RPS by the instance throughput (200 RPS) to provision 50 instances.'
  common_mistake: Failing to account for the dynamically increased network latency in the end-to-end latency
    budget, leading to SLA violations even after falling back to a simpler model.
  napkin_math: Max_Compute = SLA - Network_Spike - Processing = 100 - 30 - 15 = 55ms. Instances = Total_Load
    / Instance_Capacity = 10000 / 200 = 50 instances.
