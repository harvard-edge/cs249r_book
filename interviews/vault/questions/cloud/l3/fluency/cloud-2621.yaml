id: cloud-2621
title: Will This Model Fit in GPU Memory?
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You need to fine-tune a 13B parameter model with Adam optimizer in mixed precision on A100-80GB
  GPUs. Weights in FP16, optimizer in FP32. Calculate total parameter-related memory and determine the
  minimum number of GPUs needed (ignoring activations).
details:
  realistic_solution: 'Per-parameter memory in mixed-precision Adam: FP16 weights = 2B, FP16 gradients
    = 2B, FP32 master weights = 4B, FP32 momentum = 4B, FP32 variance = 4B. Total = 16 bytes/param. 13B
    × 16 = 208 GB for parameters alone. Each A100 has 80 GB. Minimum GPUs = ⌈208/80⌉ = 3 GPUs. But in
    practice, activations for a 13B model with reasonable batch size add 20-40 GB, and framework overhead
    takes 2-5 GB. So realistically you need 4 GPUs minimum with model parallelism (ZeRO Stage 3 or tensor
    parallelism) to shard optimizer states across devices.'
  common_mistake: Only counting FP16 weights (13B × 2 = 26GB) and concluding it fits on one GPU. The optimizer
    states alone are 12 bytes/param = 156 GB.
  napkin_math: '13B × 16 bytes/param = 208 GB. A100 = 80GB. 208/80 = 2.6 → 3 GPUs minimum. With activations:
    4 GPUs realistic.'
