id: cloud-1926
title: Spot Instance Preemption TCO
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are provisioning 8 `p4d.24xlarge` (8x A100) nodes for a 100-hour distributed training run.
  On-Demand price is $32.77/hr per node; Spot price is $9.83/hr (70% discount). Your cloud provider averages
  1 preemption per node every 20 hours. You synchronously checkpoint every 2 hours to external storage.
  If a node is preempted, the cluster pauses, a new node is provisioned, and state is restored. This recovery
  takes 15 minutes. Calculate the expected total training cost and wall-clock time on Spot instances versus
  On-Demand.
details:
  realistic_solution: Calculate total expected preemptions across the cluster, multiply by the average
    time lost per preemption (lost compute + recovery), add these extra hours to the base time, and multiply
    by the Spot rate.
  common_mistake: Assuming a straight 70% cost reduction without factoring in the wasted compute (up to
    2 hours per preemption) and the cluster-wide idle time during recovery, which extends the billing
    duration.
  napkin_math: 'On-Demand Cost: 8 nodes * $32.77 * 100h = $26,216. Spot Preemptions: (100h / 20h) * 8
    nodes = 40 interruptions. Lost time per interruption: ~1h (avg lost since 2h checkpoint) + 0.25h (recovery)
    = 1.25h. Total extra time = 40 * 1.25h = 50h. Total Spot Time = 150h. Spot Cost: 8 nodes * $9.83 *
    150h = $11,796. You save $14,420 (55% savings, not 70%), but wall-clock time extends by 50%.'
