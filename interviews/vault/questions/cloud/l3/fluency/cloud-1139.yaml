id: cloud-1139
title: Subgroup Accuracy Disparities
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a cloud biometric authentication system on a fleet of AWS p4d.24xlarge instances
  processing 1M requests/day. The model achieves an aggregate validation accuracy of 98.5%. The user dataset
  has a majority demographic group (95% of traffic) and a minority group (5% of traffic). Calculate the
  accuracy for the minority group if the majority group achieves 99.5% accuracy, and quantify the disparity.
details:
  realistic_solution: Perform disaggregated evaluation by calculating performance metrics for every demographic
    slice independently. Implement deployment gates that block releases if any single subgroup falls below
    a minimum viable threshold (e.g., 90%).
  common_mistake: Relying solely on the high aggregate accuracy (98.5%) and failing to calculate slice-based
    metrics, thereby deploying a system that severely fails for minority subgroups.
  napkin_math: 'Overall = (Majority Fraction * Majority Acc) + (Minority Fraction * Minority Acc)

    0.985 = (0.95 * 0.995) + (0.05 * X)

    0.985 = 0.94525 + 0.05X

    0.05X = 0.03975

    X = 0.795 (79.5%)

    Minority error rate is 20.5%. Majority error rate is 0.5%. The minority group experiences a 41x higher
    error rate despite the 98.5% aggregate metric.'
