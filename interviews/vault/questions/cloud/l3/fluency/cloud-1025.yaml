id: cloud-1025
title: CNN Layer Compute and Memory Sizing
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying a satellite imagery CNN inference pipeline on an NVIDIA L4 GPU. The model
  ingests high-resolution 1024x1024x3 RGB tiles. The very first layer is a 7x7 spatial convolution with
  a stride of 2 and 64 output channels (similar to a standard ResNet stem). To estimate compute utilization
  and memory bandwidth requirements for a single tile (batch size 1), calculate the total number of Multiply-Accumulate
  (MAC) operations and the memory footprint of the resulting output feature map in FP16 precision.
details:
  realistic_solution: 'First, calculate the output spatial dimensions: 1024 / 2 = 512. The output tensor
    is 512x512x64. In FP16 (2 bytes per element), this activation tensor consumes roughly 33.5 MB of memory.
    For compute, multiply the output volume by the inner product of the convolution (K^2 * C_in): 512
    * 512 * 64 * 7 * 7 * 3, which equals approximately 2.46 billion MAC operations.'
  common_mistake: Failing to account for the spatial reduction caused by the stride of 2 (assuming a 1024x1024
    output), or calculating the parameter size (which is only ~9.4 KB) instead of the output activation
    tensor size to estimate memory requirements.
  napkin_math: 'Input: 1024x1024x3. Stride 2 reduces spatial dimensions to 512x512. Output volume = 512
    * 512 * 64 channels = 16,777,216 elements. Memory footprint in FP16 (2 bytes) = 16.77M * 2 = 33.55
    MB. Multiplier-Accumulates (MACs) = Output elements * (K_h * K_w * C_in) = 16,777,216 * (7 * 7 * 3)
    = 16,777,216 * 147 = 2.46 GMACs. Total FLOPs = 4.92 GFLOPs. This is easily handled by modern GPU throughput.'
