schema_version: 1
id: cloud-1234
title: Energy Savings with Event-Driven Activation
topic: power-budgeting
status: published
provenance: imported
scenario: Your cloud platform processes 5,000 continuous security camera streams (30 FPS) for anomaly
  detection. Currently, a dense Vision Transformer (ViT) processes every frame, requiring 50 GFLOPs per
  frame. To meet strict sustainability targets, you propose an event-driven activation architecture. The
  new system uses a lightweight frame-differencing filter (0.5 GFLOPs per frame) that only triggers the
  ViT when significant motion is detected. Historical data shows cameras capture significant motion only
  5% of the time. Assuming cloud GPUs deliver 100 GFLOPS per Watt and energy costs $0.15 per kWh, calculate
  the daily energy savings in kWh and dollars.
details:
  realistic_solution: 'Calculate the original dense compute power (7.5 PFLOPS at 75kW consuming 1,800
    kWh/day = $270/day), then calculate the event-driven compute power with the lightweight motion filter
    (75 TFLOPS always-on) plus the ViT processing only the 5% of frames with detected motion (375 TFLOPS).
    Total new compute is 450 TFLOPS at 4.5kW consuming 108 kWh/day ($16.20/day). Net savings: 1,692 kWh/day
    or $253.80/day — a 16.7x energy reduction.'
  common_mistake: Calculating savings based only on the 95% reduction in ViT executions, failing to account
    for the continuous always-on compute cost of the lightweight motion filter that runs on every frame
    from all 5,000 streams.
  napkin_math: 'Original Compute: 5,000 streams * 30 FPS * 50 GFLOPs = 7,500,000 GFLOPS (75 kW at 100
    GFLOPS/W). Daily Energy: 75 kW * 24h = 1,800 kWh/day ($270/day).

    New Compute: Filter (5,000 * 30 * 0.5 = 75,000 GFLOPS) + Event-ViT (5,000 * 1.5 * 50 = 375,000 GFLOPS)
    = 450,000 GFLOPS (4.5 kW). Daily Energy: 4.5 kW * 24h = 108 kWh/day ($16.20/day).

    Savings: 1,800 - 108 = 1,692 kWh/day or $253.80/day.'
