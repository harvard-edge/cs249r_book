schema_version: 1
id: cloud-1087
title: Gradient Clipping vs Data Poisoning
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A computer vision model is trained on 32 A100 GPUs with a 50 million image dataset. An attacker
  injects 100,000 poisoned images with a backdoor trigger. The global batch size is 8192. Clean samples
  produce an average gradient norm of 0.5, while poisoned samples (designed to maximize impact) produce
  an average unclipped gradient norm of 50.0. Calculate the expected number of poisoned images per global
  batch and their relative contribution to the total unclipped gradient norm versus their contribution
  if per-sample gradient clipping is applied at C=1.0.
details:
  realistic_solution: Implement per-sample gradient clipping at C=1.0. This restricts the anomalous gradient
    updates and reduces the poisoned samples' contribution from 16.7% of the batch gradient magnitude
    to just 0.4%, effectively neutralizing the backdoor injection.
  common_mistake: Assuming the low overall poisoning rate (0.2%) makes the attack ineffective, failing
    to account for the massive gradient magnitude disparity that allows a few targeted samples to dominate
    the batch update.
  napkin_math: Poison rate = 100k / 50M = 0.2%. Poisoned samples per batch = 8192 * 0.002 = 16.4. Unclipped
    impact = (16.4 * 50) / ((16.4 * 50) + (8175.6 * 0.5)) = 820 / 4907.8 = 16.7%. Clipped impact (C=1.0)
    = (16.4 * 1.0) / ((16.4 * 1.0) + (8175.6 * 0.5)) = 16.4 / 4104.2 = 0.40%.
