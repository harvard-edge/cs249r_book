title: The Hospital TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are a Staff ML Engineer at a major cloud provider, consulting for a large hospital network.
  They want to train a state-of-the-art medical imaging model four times a year to keep it updated. They
  have two options:'
details:
  realistic_solution: The correct answer is that Federated Learning (Path B) has a dramatically lower
    3-year TCO. While the initial CapEx for on-prem servers is high, the recurring operational costs of
    renting a large-scale H100 cluster for centralized training are far higher over the 3-year period.
    The calculation demonstrates that avoiding massive, quarterly GPU rental fees makes the on-premise
    investment pay for itself quickly.
  common_mistake: Engineers often focus only on the initial capital cost (CapEx) or the hourly GPU price,
    ignoring the compounding operational costs (OpEx) like power, cooling, and maintenance over the system's
    lifecycle. A common error is to see the zero CapEx of the cloud option and assume it's cheaper, without
    calculating the massive rental fees. Another is to see the high CapEx of the on-prem option and dismiss
    it without considering the long-term savings.
  napkin_math: '**Path A: Centralized Cloud TCO**'
