title: The Drifting Recommender
topic: monitoring-observability
status: published
provenance: imported
scenario: You are responsible for a large-scale recommendation model that suggests products to users.
  Over the last quarter, the model's click-through rate (CTR) has degraded by 15%. A dashboard shows that
  the mean age of users has shifted from 38.5 to 31.2. Your PM wants to immediately trigger a full retraining
  run. Use your monitoring data and system knowledge to diagnose whether this is the correct first step.
details:
  realistic_solution: 'The correct approach is to treat this as a hypothesis to be validated with data
    before committing expensive resources. First, use a statistical test (like the two-sample K-S test)
    to confirm that the change in the user age distribution is statistically significant and not just
    random noise. Second, calculate the cost of a full retraining run to provide a concrete cost/benefit
    trade-off to the product manager. This turns a vague ''let''s retrain'' into a data-driven decision:
    ''We have 99.9% confidence the user base has changed, and we estimate a cost of X to adapt the model.'''
  common_mistake: The most common mistake is to immediately jump to retraining without quantifying the
    problem. Retraining is expensive and may not even solve the issue if the drift is transient, seasonal,
    or caused by an upstream data bug. A systems engineer must first prove the statistical significance
    of the drift and estimate the cost of the proposed solution.
  napkin_math: A shift in mean user age from 38.5 to 31.2 indicates severe covariate shift. If the model
    was trained on millions of embeddings representing older demographics, the internal dot products for
    recommendations will fail. To quantify, compute the Population Stability Index (PSI). If PSI > 0.2,
    the distributions are significantly different, proving the model is operating out-of-distribution.
