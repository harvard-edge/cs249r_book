id: cloud-1655
title: LLM-Automated Spear Phishing Scale
topic: roofline-analysis
status: published
provenance: imported
scenario: An attacker weaponizes a quantized 7B parameter LLM to automate targeted spear-phishing against
  your organization. They deploy the model across a botnet of 50 compromised cloud nodes, each equipped
  with a single T4 GPU. The model consistently generates 20 tokens per second per node. If each highly
  personalized phishing payload requires generating exactly 200 tokens, calculate the total number of
  unique phishing emails the botnet can generate per 24-hour period.
details:
  realistic_solution: 'Determine the payload generation rate per node: 20 tokens/sec ÷ 200 tokens/payload
    = 0.1 payloads/sec. Scale by the botnet size: 0.1 × 50 nodes = 5 payloads/sec. Calculate daily throughput:
    5 payloads/sec × 86,400 seconds/day = 432,000 personalized emails per day.'
  common_mistake: Failing to convert tokens per second into payloads per second, or forgetting to multiply
    by the total seconds in a day (86,400) and the number of compromised nodes.
  napkin_math: Rate per node = 20 / 200 = 0.1 emails/sec. Total rate = 0.1 * 50 = 5 emails/sec. Daily
    volume = 5 * 86,400 = 432,000 emails/day.
