schema_version: 1
id: cloud-1660
title: Estimating ONNX Runtime INT8 Latency
topic: pruning-sparsity
status: published
provenance: imported
scenario: You deploy a 150M parameter BERT model on a cloud CPU instance with 50 GB/s memory bandwidth
  using ONNX Runtime. The FP32 model requires 600MB of memory. At batch size 1, the workload is memory-bound,
  taking 20ms total per request (12ms for weight loading from memory, 8ms for compute). If you enable
  the DNNL Execution Provider and apply ONNX Runtime's dynamic INT8 quantization, estimate the new inference
  latency.
details:
  realistic_solution: 'Calculate the separate reductions: memory transfer time drops by 4x due to 8-bit
    weights, and compute time drops by roughly 2x depending on VNNI instruction efficiency. The new expected
    latency is 7ms.'
  common_mistake: Applying a flat 4x speedup assuming compute and memory scale perfectly together, ignoring
    the breakdown between memory bandwidth time and compute time.
  napkin_math: FP32 Latency = T_mem (12ms) + T_comp (8ms) = 20ms. INT8 T_mem = 600MB / 4 / 50GB/s = 3ms.
    INT8 T_comp = 8ms / 2 (assuming 2x VNNI speedup) = 4ms. Total INT8 Latency = 3ms + 4ms = 7ms.
