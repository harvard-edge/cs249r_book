id: cloud-2256
title: The Tiling Factor Search Space
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are auto-tuning a matrix multiply kernel for an H100 GPU. The kernel has 4 tunable tiling
  parameters (M_tile, N_tile, K_tile, and number of pipeline stages), each with 8 possible values. How
  large is the search space, and why does this make exhaustive search impractical for a full model compilation?
details:
  realistic_solution: The search space is $8^4 = 4{,}096$ configurations per kernel. But a transformer
    model typically has 50-100 distinct kernel shapes (different attention heads, FFN layers, varying
    sequence lengths). The total search space for the full model is $4{,}096 \times 80 \approx 327{,}680$
    kernel configurations. Each configuration requires a benchmark run (~5ms for a single kernel trial),
    making exhaustive search for one kernel feasible ($4{,}096 \times 5\text{ms} \approx 20\text{s}$)
    but exhaustive search for the whole model expensive ($327{,}680 \times 5\text{ms} \approx 27\text{
    minutes}$). This is why ML compilers use cost models and guided search (genetic algorithms, simulated
    annealing, or learned cost models) to prune the space to ~100 trials per kernel, cutting total tuning
    from 27 minutes to ~40 seconds.
  common_mistake: '"The search space is 4 × 8 = 32 configurations." This confuses additive and multiplicative
    combinatorics. Each parameter is independent, so the configurations multiply.'
  napkin_math: '$8^4 = 4{,}096$ configs/kernel × 80 unique kernels = 327,680 total. At 5ms/trial: exhaustive
    = $327{,}680 \times 0.005 = 1{,}638\text{s} \approx 27\text{ min}$. With guided search (100 trials/kernel):
    $100 \times 80 \times 0.005 = 40\text{s}$. Speedup = $41\times$, with typically <5% performance gap
    vs exhaustive optimum.'
