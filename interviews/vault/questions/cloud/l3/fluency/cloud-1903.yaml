id: cloud-1903
title: Metadata IOPS Bottleneck
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are scaling a distributed CV model training job across 64 A100 GPUs. The dataset contains
  100 million individual 50KB JPEG images on a parallel file system. Each GPU processes 500 images per
  second. The storage metadata server handles a maximum of 20,000 file 'open' IOPS, while the object storage
  servers provide up to 50 GB/s of aggregate read bandwidth. Calculate the required metadata IOPS and
  data bandwidth to keep all GPUs fully fed. Identify the bottleneck, calculate the resulting GPU utilization,
  and estimate the IOPS reduction if you pack the dataset into 100MB WebDataset tar archives.
details:
  realistic_solution: Pack the individual 50KB images into larger sequential formats like WebDataset (.tar)
    or TFRecords. Packing into 100MB chunks reduces the metadata operations drastically, eliminating the
    bottleneck.
  common_mistake: Candidates often calculate only the data bandwidth (1.6 GB/s) and conclude the 50 GB/s
    storage system is more than sufficient, completely ignoring the metadata IOPS limit which causes the
    'Small File Problem'.
  napkin_math: Required BW = 64 GPUs * 500 img/s * 50KB = 1.6 GB/s (Safe, well under 50 GB/s). Required
    IOPS = 64 × 500 = 32,000 ops/sec. Bottleneck = Metadata Server (20,000 limit). Max GPU Util = 20,000
    / 32,000 = 62.5%. Packed IOPS = 32,000 / (100MB / 50KB) = 16 ops/sec.
