id: cloud-2595
title: Cloud Benchmark Run Rules L3 0
topic: roofline-analysis
status: published
provenance: imported
scenario: MLPerf Training requires ResNet-50 to reach 75.9% top-1 accuracy on ImageNet. Team A trains
  to 75.9% in 30 seconds on 1024 GPUs. Team B reaches 76.5% in 25 seconds on 1024 GPUs but uses a modified
  augmentation pipeline not in the allowed rules. Who wins and why? Calculate the cost difference.
details:
  realistic_solution: 'Team A wins because Team B violated run rules by using unauthorized augmentation.
    Benchmark validity requires strict adherence to allowed modifications. Team B''s result would be flagged
    during the review process and rejected. Even if Team B''s augmentation is legitimately better, the
    comparison is unfair because the improvement may come from the augmentation rather than the hardware/system
    optimization being measured. Cost comparison (if both were valid): Team A: 1024 GPUs × 30s = 8.53
    GPU-hours × $2 = $17.07. Team B: 1024 × 25s = 7.11 GPU-hours × $2 = $14.22. Difference: $2.85 (17%).
    But this is irrelevant since B''s result is invalid.'
  common_mistake: Comparing raw training speed without verifying that both teams followed the same run
    rules. A faster convergence could come from a better optimizer/augmentation rather than better hardware,
    which defeats the purpose of a systems benchmark.
  napkin_math: 'Team A: 1024 × 30s / 3600 = 8.53 GPU-hrs × $2 = $17.07. Team B: 1024 × 25s / 3600 = 7.11
    GPU-hrs × $2 = $14.22. Savings: 17%. But B is disqualified. Valid comparison requires same allowed
    tuning space.'
