id: cloud-2061
title: Shift-Left Validation for Serving Constraints
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your team trains image classification models for a mobile app with strict constraints: model
  must be < 20 MB and inference latency < 10ms on a Pixel phone. Over the past 6 months, 70% of trained
  models fail these constraints and must be retrained with smaller architectures. Each training run takes
  24 hours on 4× A100s at $12/GPU/hr. Calculate the cost savings of validating model size and latency
  before training begins.'
details:
  realistic_solution: 'Implement a ''shift-left'' constraint check: export the randomly initialized model
    to ONNX, measure its parameter count (size), and benchmark inference latency on the target device
    simulator before training. This takes ~5 minutes and costs nearly nothing.'
  common_mistake: Calculating savings only for the current month rather than understanding the systemic
    cost of late-stage constraint discovery.
  napkin_math: 'Assume 10 models/month. Cost per training run: 4 GPUs × $12/hr × 24h = $1,152. Failed
    runs: 10 × 0.7 = 7/month. Wasted cost: 7 × $1,152 = $8,064/month. Pre-training validation cost: ~$0.
    Annual savings: $8,064 × 12 = $96,768. Plus: 7 × 24h = 168 hours/month of recovered engineer waiting
    time.'
