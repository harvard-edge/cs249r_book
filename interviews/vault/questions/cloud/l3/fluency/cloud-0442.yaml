schema_version: 1
id: cloud-0442
title: The Long-Context OOM Failure
topic: flash-attention
status: published
provenance: imported
scenario: You are fine-tuning a 70B parameter LLM on an H100 GPU (80GB HBM3). The training runs fine with
  a sequence length of 2048. However, when you increase the sequence length to 8192 to handle longer documents,
  you immediately get a CUDA Out-of-Memory (OOM) error during the first forward pass. Given that the model
  parameters (140GB in FP16, distributed via Tensor Parallelism) and optimizer states fit in memory, what
  is the most likely cause of this sudden OOM error?
details:
  realistic_solution: The standard attention mechanism materializes the full (N, N) attention score matrix
    in HBM for each layer and head. The memory required for this matrix scales quadratically with the
    sequence length (N). While manageable at N=2048, at N=8192 this single matrix becomes enormous and
    causes the OOM. The solution is to use an optimized attention implementation like FlashAttention,
    which computes attention in tiles. It avoids materializing the full matrix in HBM by using fast on-chip
    SRAM for intermediate calculations, changing the memory complexity from O(N²) to O(N).
  common_mistake: Blaming the KV-cache. The KV-cache is a major memory consumer during *inference*, but
    it is not materialized during a training forward pass. Another common mistake is to simply say 'activations
    are too big' without identifying the specific activation that grows quadratically with sequence length.
  napkin_math: 'Attn matrix size = B * num_heads * N^2 * 2 bytes. For N=8192, B=1, 64 heads: 1 * 64 *
    (8192^2) * 2B = 8.58GB per layer. For a 70B model with ~80 layers, total activation memory for attention
    = 80 * 8.58GB = 687GB, vastly exceeding the H100''s 80GB HBM3. At N=2048, it was only 42.9GB.'
