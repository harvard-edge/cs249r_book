id: cloud-0726
title: The Collective Communication Primitives
topic: collective-communication
status: published
provenance: imported
scenario: You're onboarding onto a distributed training team. Your tech lead mentions AllReduce, AllGather,
  ReduceScatter, and All-to-All in a meeting. For each of these four collectives, name one distributed
  training strategy that relies on it, and estimate the communication volume for 8 GPUs synchronizing
  a 1 GB tensor.
details:
  realistic_solution: '(1) **AllReduce** → Data Parallelism (DDP): sum gradients across all GPUs. (2)
    **AllGather** → FSDP forward pass: each GPU holds a shard, AllGather reconstructs the full parameters.
    (3) **ReduceScatter** → FSDP backward pass: reduce gradients and scatter so each GPU gets its shard''s
    gradient. (4) **All-to-All** → Expert Parallelism (MoE): route tokens to the correct expert GPU. For
    a ring implementation with $N$ GPUs and message size $M$: each GPU sends $M \times (N-1)/N$ in both
    AllReduce (as ReduceScatter + AllGather) and AllGather.'
  common_mistake: '"AllReduce sends the full tensor to every GPU, so the total communication is N × tensor_size
    = 8 GB." This confuses the total data moved with the per-GPU send volume, and ignores that ring-based
    AllReduce is bandwidth-optimal.'
  napkin_math: '1 GB tensor, 8 GPUs, ring algorithm. **AllReduce** = ReduceScatter + AllGather: each GPU
    sends $2 \times 1\text{GB} \times 7/8 = 1.75\text{ GB}$. **AllGather** alone: each GPU sends $1\text{GB}
    \times 7/8 = 0.875\text{ GB}$ (its shard to 7 peers). **ReduceScatter**: each GPU sends $1\text{GB}
    \times 7/8 = 0.875\text{ GB}$. **All-to-All**: each GPU sends $(N-1)/N$ of its data = $0.875\text{
    GB}$. At 900 GB/s NVLink bisection: AllReduce takes $1.75\text{GB} / 900\text{GB/s} \approx 1.9\text{
    ms}$.'
