id: cloud-1943
title: Stateful KV Cache Recovery Tradeoffs
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You operate a stateful LLM serving cluster for a 70B parameter model where KV caches are pinned
  to specific 8xH100 nodes for long multi-turn chats. A node holding 400 active sessions crashes. Each
  session averages 8,000 tokens of context history. The KV cache size is 320 KB per token. The cluster''s
  fallback prefill throughput is 500,000 tokens/sec distributed across the remaining healthy nodes. You
  must choose between two fault-tolerance recovery strategies: sequentially restoring the KV cache state
  from a remote Redis snapshot over a 100 Gbps network link, or dynamically recomputing the state (prefill)
  on the healthy nodes from the raw chat history. Calculate the recovery time for both approaches to select
  the optimal strategy.'
details:
  realistic_solution: Dynamically recomputing the state (prefilling) takes approximately 6.4 seconds,
    whereas transferring the 1 TB of state over a 100 Gbps network takes nearly 82 seconds. In stateful
    LLM serving, compute is often cheaper and faster than network transfer for fault recovery.
  common_mistake: Candidates often assume that restoring serialized state from a fast in-memory database
    like Redis is strictly faster than recomputing from scratch (the classic database mindset), failing
    to account for the massive multi-gigabyte scale of LLM KV caches and the resulting network bottlenecks.
  napkin_math: '1. Total State Size: 400 sessions * 8,000 tokens/session * 320 KB/token = 1,024,000,000
    KB ≈ 1,024 GB (1 TB).

    2. Network Transfer Strategy: 100 Gbps network = 12.5 GB/s theoretical max. Time = 1024 GB / 12.5
    GB/s = 81.9 seconds.

    3. Recompute Strategy: Total tokens = 400 * 8,000 = 3,200,000 tokens. Time = 3,200,000 tokens / 500,000
    tokens/sec = 6.4 seconds.

    Recomputing is ~13x faster than network restoration.'
