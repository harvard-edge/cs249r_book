id: cloud-0681
title: The Training Time Estimate
topic: 3d-parallelism
status: published
provenance: imported
scenario: You have a 500 GB dataset of image-text pairs (100M samples). You're training a CLIP-style model
  on 8× A100 GPUs. Each GPU processes 256 samples/sec. How long will one epoch take? What if the data
  pipeline can only deliver 1,500 samples/sec?
details:
  realistic_solution: The compute math gives a lower bound, but the actual throughput is $\min(\text{GPU
    throughput}, \text{data pipeline throughput})$. If your data loading, decoding, and preprocessing
    pipeline is bottlenecked at 1,500 samples/sec, the 8 GPUs are starved 27% of the time. The effective
    throughput is 1,500, not 2,048.
  common_mistake: '"8 GPUs × 256 samples/sec = 2,048 samples/sec. 100M / 2,048 = ~13.5 hours per epoch."
    This assumes the data pipeline can keep up — it often can''t.'
  napkin_math: 'Compute-limited: 100M / 2,048 = 48,828 sec ≈ **13.6 hours**. Data-pipeline-limited: 100M
    / 1,500 = 66,667 sec ≈ **18.5 hours**. That''s 5 extra hours per epoch — for a 10-epoch run, 50 wasted
    hours × 8 GPUs × \$2/hr = **\$800 wasted** on idle GPUs. Fixes: NVIDIA DALI for GPU-accelerated decoding,
    NVMe staging instead of NFS, WebDataset sharded format for parallel I/O. A \$200/month NVMe cache
    can save \$800/run.'
