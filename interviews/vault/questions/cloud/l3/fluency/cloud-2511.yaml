title: Cloud Through Silicon Vias L3 0
topic: vram-budgeting
status: published
provenance: imported
scenario: You are comparing an HBM3-based accelerator (1024-bit bus, 4 stacks, 6.4 Gbps/pin) against a
  hypothetical design using DDR5 (64-bit bus, 6.4 Gbps/pin). How many DDR5 channels would match the HBM3
  bandwidth?
details:
  realistic_solution: 'HBM3 total bandwidth: 1024 bits × 6.4 Gbps / 8 = 819.2 GB/s per stack × 4 stacks
    = 3276.8 GB/s ≈ 3.35 TB/s. DDR5 per channel: 64 bits × 6.4 Gbps / 8 = 51.2 GB/s. Channels needed:
    3276.8 / 51.2 = 64 DDR5 channels. This is physically impractical — each channel needs its own traces,
    pins, and DIMM slots, illustrating why TSVs are essential for AI accelerators.'
  common_mistake: Forgetting to multiply by 4 stacks for total HBM bandwidth, or confusing Gbps (bits)
    with GB/s (bytes).
  napkin_math: 'HBM3: 4 stacks × 1024-bit × 6.4 Gbps ÷ 8 = 3,276 GB/s. DDR5: 64-bit × 6.4 Gbps ÷ 8 = 51.2
    GB/s. Need 3,276 / 51.2 ≈ 64 channels.'
