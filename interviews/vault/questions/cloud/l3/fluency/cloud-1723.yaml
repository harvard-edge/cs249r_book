title: LLM Decode Speedup via Weight Quantization
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are optimizing a 70B parameter LLM for inference on an 8x NVIDIA A100 (80GB) node. To increase
  the decode token generation rate at batch size 1, you evaluate FP16, INT8 (W8A16), and INT4 (W4A16)
  weight-only quantization. Assuming the aggregate memory bandwidth across the 8 GPUs is 16 TB/s, calculate
  the theoretical maximum token generation rate for each precision format.
details:
  realistic_solution: Calculate the tokens per second by dividing the aggregate memory bandwidth by the
    total weight size. Weight-only quantization proportionally reduces memory traffic, yielding linear
    speedups in the memory-bound regime.
  common_mistake: Candidates often try to calculate compute throughput (FLOPs) rather than recognizing
    that autoregressive decode at batch size 1 is strictly memory bandwidth-bound by the time taken to
    load the model weights from HBM to SRAM.
  napkin_math: '8x A100 aggregate HBM bandwidth = 8 * 2.0 TB/s = 16,000 GB/s. Weight memory: FP16 = 70B
    * 2B = 140GB. INT8 = 70B * 1B = 70GB. INT4 = 70B * 0.5B = 35GB. At batch size 1, decode generation
    is memory-bandwidth bound. Max tokens/sec = Bandwidth / Weight_Size. FP16 = 16,000 / 140 = 114 tok/s.
    INT8 = 16,000 / 70 = 228 tok/s. INT4 = 16,000 / 35 = 457 tok/s. Quantization yields a 4x decode speedup.'
