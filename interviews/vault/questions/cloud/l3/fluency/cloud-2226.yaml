schema_version: 1
id: cloud-2226
title: The Checkpoint Bandwidth Bottleneck
topic: vram-budgeting
status: published
provenance: imported
scenario: You are training a 175B parameter model across 4,096 GPUs using FSDP (Fully Sharded Data Parallel).
  Each GPU holds a shard of approximately 43M parameters. A full checkpoint must save all optimizer states
  (2x the model size for Adam) plus the model weights, totaling roughly 1 TB. The parallel filesystem
  provides 200 GB/s aggregate write bandwidth. How long does a synchronous checkpoint take, and what fraction
  of training time is lost if you checkpoint every 30 minutes?
details:
  realistic_solution: 'Total checkpoint size: 175B params × 2 bytes (FP16 weights) + 175B × 4 bytes (FP32
    master weights) + 175B × 4 bytes (first moment) + 175B × 4 bytes (second moment) = 350 GB + 700 GB
    + 700 GB + 700 GB = 2.45 TB. At 200 GB/s aggregate write bandwidth: $2{,}450 \text{ GB} / 200 \text{
    GB/s} = 12.25$ seconds — but only if all 4,096 GPUs can write concurrently without contention. In
    practice, metadata overhead and lock contention inflate this to 20-30 seconds. At 30-minute intervals,
    a 30-second checkpoint costs $30/1800 = 1.7\%$ of training time. This seems small, but at \$2/GPU-hour
    across 4,096 GPUs, 1.7% overhead costs $\$2 \times 4{,}096 \times 24 \times 0.017 \approx \$3{,}342$/day.'
  common_mistake: Only counting model weight size (350 GB for FP16) and forgetting optimizer states. Adam
    stores first and second moment estimates, tripling the checkpoint size. Another mistake is assuming
    each GPU writes independently without considering aggregate filesystem bandwidth as the binding constraint.
  napkin_math: 'Checkpoint size $\approx 2.45$ TB. PFS write BW = 200 GB/s. Time = $2{,}450/200 \approx
    12.25$s (ideal). Real-world with contention: ~30s. Fraction lost = $30/1800 \approx 1.7\%$. Cost at
    \$2/GPU-hr, 4096 GPUs: \$2 $\times$ 4096 $\times$ 24 $\times$ 0.017 = \$3,342/day wasted on checkpoint
    stalls.'
