id: cloud-1663
title: Online Softmax Memory Footprint Calculation
topic: vram-budgeting
status: published
provenance: imported
scenario: You are developing a custom CUDA attention kernel for an LLM on an A100 GPU. The model uses
  a sequence length of 65,536 and head dimension of 128 in FP16. A naive softmax computation requires
  materializing the full N x N attention logits matrix in HBM. Instead, you process queries in blocks
  of 128. Calculate the exact memory required to store the fully materialized attention matrix for a single
  head, and calculate the amount of on-chip SRAM needed to store the running statistics (max and sum in
  FP32) required by the online softmax algorithm for one block of queries.
details:
  realistic_solution: A fully materialized 65,536 x 65,536 matrix in FP16 requires approximately 8.59
    GB of HBM per head. Using online softmax with a query block size of 128, we only need to store a running
    max and a running sum (both in FP32) per query in the block. This consumes exactly 1,024 bytes (1
    KB) of SRAM, completely eliminating the 8.59 GB HBM allocation.
  common_mistake: Candidates often miscalculate the quadratic HBM footprint or forget that online softmax
    requires FP32 precision for running statistics to prevent underflow, leading to incorrect SRAM sizing.
  napkin_math: 'Naive attention materializes the N x N logits matrix in HBM: 65,536 * 65,536 * 2 bytes
    (FP16) = 8.59 GB. This massively bottlenecks the A100''s 2 TB/s HBM bandwidth. Fused FlashAttention
    keeps N x N in SRAM. Online softmax statistics for a typical 128-query block require only 128 * 2
    stats (max, sum) * 4 bytes (FP32) = 1 KB in SRAM, completely eliminating the 8.59 GB HBM footprint.'
