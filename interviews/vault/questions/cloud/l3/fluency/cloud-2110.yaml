schema_version: 1
id: cloud-2110
title: Arithmetic Intensity of a Linear Layer
topic: roofline-analysis
status: published
provenance: imported
scenario: A linear layer performs Y = XW where X is [B, 4096] and W is [4096, 4096], both in FP16. Calculate
  the arithmetic intensity of this operation. Is it compute-bound or memory-bound on an A100 GPU (312
  TFLOPS FP16, 2 TB/s HBM bandwidth)?
details:
  realistic_solution: 'FLOPs = 2 * B * 4096 * 4096. Bytes loaded = B*4096*2 (input) + 4096*4096*2 (weights)
    + B*4096*2 (output). For B=1: FLOPs = 33.6M, Bytes = 33.6M + 8K + 8K = ~33.6MB. AI = 33.6M / 33.6M
    = ~1 FLOP/byte (memory-bound). For B=1024: FLOPs = 34.35G, Bytes = 33.55M (weights) + 16.7M (in/out)
    = ~50.3MB. AI = 34.35G / 50.3M = ~682 FLOPs/byte (compute-bound). The ridge point on A100 is 312T/2T
    = 156 FLOPs/byte. Setting AI=156 and solving for B gives the crossover at approximately B=169. Batch
    size drives the transition.'
  common_mistake: Only counting the weight matrix bytes and forgetting the input and output tensors. Also
    confusing batch-size-dependent arithmetic intensity with the single-sample case.
  napkin_math: 'Ridge point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte. FLOPs = 2 * B * 4096^2. Bytes =
    (4096^2 * 2) + 2*(B * 4096 * 2). For B=1: FLOPs = 33.6M, Bytes = 33.6M (W) + 16K (X,Y) = 33.6MB. AI
    = 1 (memory-bound). For B=1024: FLOPs = 34.3G, Bytes = 33.6M (W) + 16.8M (X,Y) = 50.4MB. AI = 34.3G
    / 50.4M = 680 FLOPs/byte (compute-bound, 680 > 156).'
