id: cloud-1076
title: Cost of Noisy Data Scaling
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team trains a computer vision model for defect detection using a cloud GPU cluster. The
  current dataset has 1 million images with 30% label noise, yielding 88% mAP. To reach the production
  target of 92% mAP, empirical scaling laws indicate you need either 50 million noisy images or just 5
  million rigorously cleaned images. Scraping and auto-labeling noisy images costs $0.01 per image, while
  expert manual curation for clean images costs $0.10 per image. Cloud compute for training costs $0.02
  per image (cumulative across all epochs). Calculate the total cost (data + compute) for both approaches
  and determine the most cost-effective path.
details:
  realistic_solution: The data-centric approach is highly optimal. While per-sample labeling is 10x more
    expensive, requiring 10x fewer samples equalizes the raw data cost. The data-centric approach then
    yields a massive $900k reduction in compute costs while achieving the exact same target accuracy.
  common_mistake: Candidates often only compare the raw per-sample data costs ($0.01 vs $0.10) and incorrectly
    assume the noisy data approach is cheaper, failing to account for the total dataset volume multiplier
    and the corresponding explosion in compute costs.
  napkin_math: 'Brute-force (Noisy Approach):

    Data Cost = 50,000,000 * $0.01 = $500,000

    Compute Cost = 50,000,000 * $0.02 = $1,000,000

    Total = $1,500,000


    Data-Centric (Clean Approach):

    Data Cost = 5,000,000 * $0.10 = $500,000

    Compute Cost = 5,000,000 * $0.02 = $100,000

    Total = $600,000


    Savings = $1,500,000 - $600,000 = $900,000 (2.5x cheaper overall).'
