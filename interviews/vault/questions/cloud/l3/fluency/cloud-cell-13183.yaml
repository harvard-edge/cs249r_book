id: cloud-cell-13183
title: 'Transformer Cost Fluency: FLOPs Estimation from Memory'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Without a calculator, estimate: (1) training FLOPs for GPT-3 (175B params, 300B tokens) using
  the 6ND approximation, (2) inference FLOPs per token for a 70B model at batch=1, (3) how many H100-days
  to train GPT-3 at 40% MFU. Express in scientific notation.'
details:
  realistic_solution: '(1) GPT-3 training: 6 * 175B * 300B = 6 * 1.75e11 * 3e11 = 3.15e23 FLOPs. (2) 70B
    inference per token, batch=1: 2 * 70B = 140B FLOPs = 1.4e11 FLOPs/token. At 100 tokens: 1.4e13 FLOPs.
    (3) GPT-3 H100-days at 40% MFU: effective TFLOPS = 1979e12*0.4=792e12 FLOPs/s. Total time (1 H100):
    3.15e23/792e12=3.98e8 seconds. H100-days: 3.98e8/86400=4,608 days. Cost: 4608 H100-days * $2.50/hr
    * 24 = $276.5M. At 1000 H100s: 4.608 days. Cost: 1000*$2.50*24*4.608=$276.5K.'
  common_mistake: Not knowing the 6ND training FLOPs approximation (6 for forward+backward+optimizer steps
    multiplier) or the 2N inference FLOPs approximation (2 multiply-accumulates per parameter per token).
  napkin_math: '(1) 6*175e9*300e9=3.15e23 FLOPs. (2) 2*70e9=1.4e11 FLOPs/token. (3) 3.15e23/(1979e12*0.4)=3.15e23/7.92e14=3.977e8
    seconds per H100=4608 H100-days. Cost at 1000 H100s: 4608days/1000=4.608 days. $: 1000*$2.50*24*4.608=$276,480.
    Rule of thumb: 6ND FLOPs for training, 2N for inference per token. GPT-3 at Chinchilla-optimal would
    use 175B*20=3.5T tokens → 6*175B*3.5T=3.675e24 FLOPs → 3.2M H100-days!'
