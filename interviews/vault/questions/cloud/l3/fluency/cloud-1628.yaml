id: cloud-1628
title: A/B Testing FWER Correction
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your ML serving platform handles 10,000 req/sec. You are evaluating 20 new candidate ranking
  models concurrently against the baseline production model using A/B testing. For each candidate, you
  test 4 different metrics (CTR, conversion, latency, and revenue). You are using a standard significance
  level of α = 0.05 for each individual hypothesis test. Calculate the expected number of false discoveries
  if all candidate models are actually no better than baseline, and determine the Bonferroni-adjusted
  α required to maintain a Family-Wise Error Rate (FWER) of 0.05.
details:
  realistic_solution: Recognize that m = 20 models * 4 metrics = 80 independent tests. Without correction,
    you will likely deploy 4 false positive models. Apply the Bonferroni correction to strictly bound
    the FWER to 5% by dividing the target α by m. In practice, due to Bonferroni's strictness reducing
    statistical power, controlling the False Discovery Rate (FDR) via the Benjamini-Hochberg procedure
    is often preferred for ML experiment platforms.
  common_mistake: Failing to account for the multiplicative effect of checking both multiple models and
    multiple metrics (m=80 tests), and wrongly assuming the overall false positive rate remains at 5%.
  napkin_math: Running A/B tests on 20 candidates across 4 metrics equals m = 80 independent hypotheses.
    At a standard significance level α = 0.05, expected false positives = 80 * 0.05 = 4. The Family-Wise
    Error Rate (FWER) without correction is 1 - (1 - 0.05)^80 = 1 - 0.016 = 98.4% chance of at least one
    false positive. To control FWER at 5%, use Bonferroni adjusted α = 0.05 / 80 = 0.000625.
