id: cloud-0936
title: Bulk Synchronous Parallel Straggler Impact
topic: data-parallelism
status: published
provenance: imported
scenario: You are training a distributed ML model across a 64-GPU cluster (8 nodes of 8x A100s) using
  standard Data Parallelism. The execution follows a strict Bulk Synchronous Parallel (BSP) model. Normally,
  the forward/backward pass takes 120ms per step, and the gradient AllReduce takes 40ms. However, one
  GPU undergoes thermal throttling, increasing its compute time to 180ms. Calculate the new total step
  time and the compute utilization of the 63 healthy GPUs.
details:
  realistic_solution: In a BSP model, the entire cluster must wait for the slowest worker to reach the
    synchronization barrier before the communication phase can begin. Therefore, the total step time is
    dictated by the maximum compute time plus the communication time. The 63 healthy GPUs will sit idle
    waiting for the straggler, significantly degrading their utilization.
  common_mistake: Candidates often average the compute times across all GPUs or assume that communication
    can overlap with the straggler's delayed computation, failing to account for the strict global synchronization
    barrier that characterizes BSP.
  napkin_math: 'Normal step time: 120ms + 40ms = 160ms (75% utilization).

    Straggler step time: max(120ms, 180ms) + 40ms = 220ms.

    Healthy GPU idle time at barrier: 180ms - 120ms = 60ms.

    Healthy GPU utilization: 120ms (active compute) / 220ms (total step) = ~54.5%.'
