id: cloud-2730
title: Bisection Bandwidth at Each Level
topic: collective-communication
status: published
provenance: imported
scenario: 'A 3-tier fat-tree network has 400 Gbps links. Each leaf switch has 32 ports: 16 down to nodes,
  16 up to spine. You have 256 nodes across 16 leaf switches. Calculate the bisection bandwidth and the
  per-node bandwidth available for an AllReduce that splits the cluster in half.'
details:
  realistic_solution: 'Each leaf switch has 16 uplinks at 400 Gbps = 6.4 Tbps uplink capacity per leaf.
    With 16 leaf switches, half the cluster (8 leaves, 128 nodes) must communicate with the other half.
    The bisection bandwidth is determined by the spine layer: in a full-bisection fat-tree, the spine
    provides enough paths that the bisection bandwidth equals the aggregate host bandwidth. 16 leaves
    × 16 uplinks × 400 Gbps = 102.4 Tbps total spine capacity. Bisection bandwidth = 102.4/2 = 51.2 Tbps.
    Per-node bisection bandwidth: 51.2 Tbps / 128 nodes = 400 Gbps per node — exactly one link''s worth,
    confirming full bisection bandwidth. For an AllReduce splitting the cluster: each node gets the full
    400 Gbps for cross-half communication.'
  common_mistake: Confusing total uplink bandwidth with bisection bandwidth. Bisection bandwidth is the
    minimum bandwidth across any cut that divides the network in half.
  napkin_math: '16 leaves × 16 uplinks × 400G = 102.4 Tbps spine. Bisection: 51.2 Tbps. Per node: 51.2T/128
    = 400 Gbps. Full bisection confirmed.'
