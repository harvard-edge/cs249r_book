schema_version: 1
id: cloud-1041
title: Calculating Latency Impact of CPU Affinity
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a latency-sensitive BERT inference service on a dual-socket Intel Xeon server
  (64 cores, 2 NUMA nodes). The model uses 4 threads per request. Currently, the OS schedules threads
  freely, resulting in a P99 latency of 28ms, which violates the strict 15ms SLA. Profiling shows high
  L3 cache miss rates and significant cross-NUMA memory traffic.
details:
  realistic_solution: Use `taskset` or framework environment variables (like `KMP_AFFINITY=granularity=fine,compact,1,0`)
    to pin the 4 inference threads to adjacent physical cores on the same NUMA node, ensuring they share
    the same L3 cache and avoid cross-socket memory requests.
  common_mistake: Assuming the OS scheduler will automatically group inference threads optimally without
    explicit core pinning and NUMA node binding.
  napkin_math: 'Thread migration forces a warm 20MB model working set to be fetched from main DRAM (100ns)
    instead of L3 cache (15ns). For 64-byte cache lines: (20MB / 64B) * (100ns - 15ns) = 312,500 * 85ns
    = ~26.5ms penalty. CPU affinity avoids this cold-cache penalty, reducing P99 latency back under 15ms.'
