id: cloud-1732
title: LLM Inference Phase Bottlenecks
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are serving a 70B parameter LLM (140 GB in FP16) on a node with Nvidia H100 GPUs. The system
  processes an incoming request with a 2048-token prompt (the prefill phase) and generates 128 subsequent
  tokens (the decode phase) at a batch size of 1. Ignoring the KV cache size for this specific calculation,
  calculate the arithmetic intensity (FLOPs/byte) for both the complete prefill phase and a single token
  generation step of the decode phase. Based on these numbers, identify which hardware limit (compute
  vs. memory bandwidth) bounds each phase.
details:
  realistic_solution: Calculate FLOPs using the 2*N*T approximation. Prefill has an arithmetic intensity
    of ~2048 FLOPs/byte, sitting high on the roofline and making it compute-bound. Decode has an intensity
    of 1 FLOP/byte, making it purely memory bandwidth-bound. The optimal architectural solution is phase
    disaggregation (e.g., Splitwise), where prefill and decode are scheduled on different pools of hardware
    to maximize utilization.
  common_mistake: Candidates often average the FLOPs across the entire request or fail to realize that
    the entire 140GB model must be loaded from HBM into SRAM to compute just a single token during the
    decode phase.
  napkin_math: Prefill FLOPs = 2 * 70B * 2048 = ~286 TFLOPs. Prefill Bytes = 140 GB (weights). Prefill
    Intensity = 286e12 / 140e9 ≈ 2048 FLOPs/Byte (Compute Bound). Decode FLOPs (1 token) = 2 * 70B * 1
    = 140 GFLOPs. Decode Bytes = 140 GB. Decode Intensity = 140e9 / 140e9 = 1 FLOP/Byte (Memory Bound).
