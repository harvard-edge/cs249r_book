title: Optimizing Retraining Interval for E-Commerce
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'An e-commerce recommendation model generates $50,000 in daily revenue. The model''s accuracy
  degrades over time, causing a revenue drop of $200 per day for each day the model is stale (Day 1: $0
  loss, Day 2: $200 loss, Day 3: $400 loss, etc.). Retraining the model requires 20 hours on a 4x A100
  instance, costing exactly $1,000. Calculate the optimal retraining interval (in days) to minimize the
  combined average daily cost of compute and staleness.'
details:
  realistic_solution: Model the total cost as the sum of the fixed retraining cost and the cumulative
    quadratic staleness cost, then find the interval that minimizes the average daily cost.
  common_mistake: Candidates often suggest retraining daily to maximize accuracy, completely ignoring
    that the $1,000 compute cost far outweighs the early staleness penalty.
  napkin_math: 'Cumulative staleness over T days ≈ 0.5 * $200 * T^2 = 100 * T^2. Average daily cost =
    (Retraining Cost + Cumulative Staleness) / T = ($1000 + 100 * T^2) / T = 1000/T + 100T. Minimum cost
    occurs when the derivative is zero: -1000/T^2 + 100 = 0 -> T^2 = 10 -> T ≈ 3.16 days. The optimal
    retraining interval is approximately 3 days.'
