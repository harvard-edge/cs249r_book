id: cloud-1790
title: Compute Cost of Forward vs. Reverse Mode Autodiff
topic: roofline-analysis
status: published
provenance: imported
scenario: You are training a neural network with 100 million (10^8) parameters that outputs a single scalar
  loss value. A single forward evaluation of the model takes 10ms on an NVIDIA A100 GPU. To reduce VRAM
  usage during training, a junior engineer proposes replacing standard reverse-mode differentiation (backpropagation)
  with forward-mode automatic differentiation, correctly noting that forward-mode does not require caching
  intermediate activations. Calculate the wall-clock time required to compute the full parameter gradient
  for a single batch using both methods to evaluate this proposal.
details:
  realistic_solution: Demonstrate that while forward-mode saves memory, its compute cost is O(N) forward
    passes. Reverse-mode computes all gradients in a single backward pass (roughly 2x the cost of a forward
    pass), making it the only feasible choice for training large parameter models.
  common_mistake: Assuming forward and reverse mode have similar compute complexities, or forgetting that
    forward mode compute scales linearly with the number of input parameters (N) rather than the number
    of outputs.
  napkin_math: Forward pass time (T_fwd) = 10ms. Standard reverse mode AD time = T_fwd + T_bwd ≈ 3 * 10ms
    = 30ms. Forward mode AD computes derivatives per parameter. Time = N * T_fwd = 10^8 * 10ms = 1,000,000
    seconds ≈ 11.5 days. The memory savings from dropping activations are negated by an unacceptable 10^8x
    compute penalty.
