id: cloud-0892
title: Multi-AZ Link Buffer Exhaustion
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: To secure enough power for a 10,000-GPU training cluster, your infrastructure team proposes
  splitting the 400Gbps RoCEv2 network across two availability zones (AZs) connected by 50km of dark fiber.
  You need to calculate the in-flight data required to saturate a single cross-AZ link and determine if
  standard Top-of-Rack switches (e.g., with a 64MB shared packet buffer) can support line-rate collective
  communications over this distance.
details:
  realistic_solution: Tightly-coupled synchronous operations (like Tensor Parallelism or Ring All-Reduce)
    must be restricted to a single AZ. The 50km distance dictates a 25MB buffer requirement per port just
    to maintain line rate. Because this consumes an untenable percentage of standard switch memory, cross-AZ
    links should only be used for less sensitive asynchronous traffic or pipeline parallelism.
  common_mistake: Candidates often assume that installing 400Gbps dark fiber automatically guarantees
    400Gbps of actual throughput, failing to realize that long physical distances drastically increase
    the Bandwidth-Delay Product (BDP). This exhausts switch buffers, leading to packet drops, PFC (Priority
    Flow Control) storms, and throughput collapse.
  napkin_math: '1. Light speed in fiber ≈ 200 km/ms. Distance = 50 km, so one-way latency = 0.25 ms. Round
    Trip Time (RTT) = 500 µs.

    2. Bandwidth = 400 Gbps = 50 GB/s.

    3. Bandwidth-Delay Product (BDP) = Bandwidth × RTT = 50 GB/s × 500 µs = 25 MB per port.

    4. A single cross-AZ connection would consume almost 40% of the switch''s entire 64MB shared buffer,
    making multi-port line-rate impossible.'
