id: cloud-2727
title: Checkpoint Storm I/O Bottleneck
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A 512-GPU job trains a 70B parameter model with FSDP (each GPU holds a ~280MB shard). The shared
  Lustre filesystem provides 200 GB/s aggregate write bandwidth. Estimate the checkpoint write time with
  and without staggered writes (8 groups of 64, 2-second gaps).
details:
  realistic_solution: 'Total checkpoint size: 512 × 280MB = 140GB. At 200 GB/s bandwidth: 140GB / 200GB/s
    = 0.7 seconds ideal. But with 512 simultaneous file creates, metadata operations dominate: each file
    create takes ~50ms under contention, and the metadata server handles ~100 ops/sec under load. So 512
    creates take ~5 seconds for metadata alone. With I/O contention and TCP incast, actual bandwidth drops
    to ~50 GB/s, so writes take 140/50 = 2.8 seconds. Total: ~8 seconds. Staggered (8 groups of 64): each
    group writes 64 × 280MB = 17.5GB. At close to full bandwidth (~180GB/s with less contention): 0.1s
    per group. With 2s gaps: 8 × 2s = 16s total. Paradoxically slower in wall time but much less disruptive
    to other filesystem users. Actual benefit: avoids filesystem brownout that affects other jobs.'
  common_mistake: Ignoring that metadata operations (file create, directory lookup) often bottleneck before
    raw bandwidth. Even if bandwidth is sufficient, creating 512 files simultaneously can take minutes.
  napkin_math: 'Simultaneous: 140GB but ~8s (metadata + contention). Staggered 8 groups: ~16s wall time
    but no FS brownout. Trade-off: wall time vs shared resource health.'
