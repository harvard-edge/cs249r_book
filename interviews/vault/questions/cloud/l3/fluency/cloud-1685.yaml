title: PCIe Gen5 Transfer Latency
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are optimizing a hybrid CPU-GPU training pipeline for an embedding-heavy DLRM. The GPU needs
  to fetch 8 GB of sparse embeddings from host CPU memory per training step. The system uses PCIe Gen5
  x16 interconnects. Calculate the theoretical minimum time spent on data transfer per step, and state
  why the effective transfer time is typically higher.
details:
  realistic_solution: Calculate using the unidirectional PCIe Gen5 x16 bandwidth (64 GB/s). Recognize
    that the actual transfer time will be higher than the theoretical minimum due to 128b/130b encoding
    overhead, packet headers, and host memory read speeds.
  common_mistake: Mistakenly using the marketed 128 GB/s bidirectional bandwidth for a purely unidirectional
    CPU-to-GPU transfer, which leads to an incorrectly halved 62.5 ms latency estimate.
  napkin_math: "Theoretical Unidirectional BW = 64 GB/s. \nMinimum Transfer Time = Data Size / BW \nMinimum\
    \ Transfer Time = 8 GB / 64 GB/s = 0.125 seconds = 125 ms."
