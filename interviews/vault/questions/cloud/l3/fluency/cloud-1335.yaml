id: cloud-1335
title: Dynamic Loop Compilation Latency
topic: graph-compilation
status: published
provenance: imported
scenario: You are deploying a custom auto-regressive fraud detection model on an NVIDIA T4 GPU using PyTorch.
  The model processes variable-length transaction sequences using a `while` loop, halting early if a clear
  fraud signal is detected. On average, the loop halts after 20 steps, but inputs are padded to a maximum
  sequence length of 150 to handle worst-case scenarios. Each loop iteration takes 1.5ms to compute. An
  engineer uses `torch.jit.trace` with the padded max-length input to compile the model for production.
  Calculate the expected average latency difference between this traced model and a model compiled correctly
  using Graph Scripting (`torch.jit.script`).
details:
  realistic_solution: Use `torch.jit.script` to statically analyze the source code AST. This preserves
    the dynamic `while` loop and early exit logic in the compiled intermediate representation, preventing
    wasteful computation.
  common_mistake: Candidates often assume `torch.jit.trace` captures dynamic control flow (like if/else
    and while loops). They fail to realize tracing completely unrolls the loop based solely on the static
    trace input dimensions.
  napkin_math: Traced latency = 150 iterations (unrolled) * 1.5ms = 225ms. Scripted average latency =
    20 iterations (dynamic early exit) * 1.5ms = 30ms. Graph scripting saves 195ms per inference on average.
