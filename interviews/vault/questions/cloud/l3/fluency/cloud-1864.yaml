id: cloud-1864
title: Batching Limits Under Strict Latency SLAs
topic: latency-decomposition
status: published
provenance: imported
scenario: You are transitioning an object detection model from offline bulk processing to a real-time
  cloud API on an NVIDIA L4 GPU. During training, throughput was maximized using a large batch size of
  B=256. For inference, the execution time per batch is empirically modeled as T(B) = 12ms + B * 3ms,
  where 12ms represents fixed PCIe transfer and kernel launch overheads. If the product requirements dictate
  a strict latency SLA of 60ms per request, calculate the maximum permissible dynamic batch size and the
  resulting maximum serving throughput.
details:
  realistic_solution: 'Set the latency equation to the SLA boundary to solve for B: 12ms + 3ms * B <=
    60ms. This yields a max batch size of B = 16. The serving throughput is then 16 requests per 60ms,
    yielding 266.6 requests per second. This illustrates ''serving inversion'', where we deliberately
    limit batch size (and thus peak hardware utilization) to guarantee response times.'
  common_mistake: Candidates often attempt to maximize throughput by ignoring the strict latency SLA,
    or they incorrectly calculate throughput without factoring in how the fixed overhead disproportionately
    penalizes the small batch sizes required for real-time serving.
  napkin_math: 'Max Latency SLA = 60ms. Equation: 12 + 3B <= 60 => 3B <= 48 => B = 16. Serving throughput
    at B=16 is 16 requests / 0.060 seconds = 266.6 req/sec. For context, theoretical peak throughput (as
    B approaches infinity) is 1 / 0.003s = 333.3 req/sec. The system sacrifices ~20% of its theoretical
    peak throughput to satisfy the latency constraint.'
