id: cloud-2712
title: All-to-All Communication Volume in Expert Parallelism
topic: data-parallelism
status: published
provenance: imported
scenario: An MoE model has 64 experts across 64 GPUs (1 expert/GPU). Each batch has 4096 tokens, each
  token is 2KB (FP16 hidden dim 1024). Top-2 routing means each token goes to 2 experts. Estimate the
  all-to-all communication volume per step.
details:
  realistic_solution: 'Each token (2KB) is routed to 2 experts, generating 4096 × 2 = 8192 token-expert
    assignments. With uniform routing, each GPU sends ~8192/64 = 128 token activations to other GPUs and
    receives ~128 back. Dispatch volume per GPU: 128 × 2KB = 256KB sent. Total dispatch across all GPUs:
    64 × 256KB = 16MB. The combine phase (returning results) is the same volume: 16MB. Total all-to-all
    per step: ~32MB. This is modest compared to AllReduce on dense models, which is why MoE can scale
    efficiently — the communication is proportional to activated parameters (2/64 = 3%), not total parameters.'
  common_mistake: Only counting one direction. All-to-all requires both dispatching tokens to experts
    AND returning results, doubling the volume.
  napkin_math: '8192 assignments × 2KB = 16MB dispatch + 16MB combine = 32MB total all-to-all. Compare
    to AllReduce on equivalent dense model: 64 × 1B × 2 bytes = 128GB.'
