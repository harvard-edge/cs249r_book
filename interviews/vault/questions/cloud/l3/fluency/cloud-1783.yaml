id: cloud-1783
title: REST API Serialization Overhead
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a vector embedding service on AWS using a standard FastAPI REST endpoint returning
  JSON. The service processes a batch of 64 user queries and returns 64 embeddings, each a 1024-dimensional
  float32 vector. Profiling shows the actual model inference on an NVIDIA T4 GPU takes exactly 12.0 ms.
  Assuming Python's standard `json` module parses and serializes text at roughly 50 MB/s and an average
  float32 formatted in JSON takes 10 characters (bytes), calculate the payload size and the serialization
  overhead to determine the primary bottleneck.
details:
  realistic_solution: Calculate the JSON serialization overhead to prove it is the bottleneck (12.5 ms
    vs 12.0 ms inference). Resolve this by either migrating to a binary protocol like gRPC/Protobuf or
    replacing the native JSON library with a fast C-extension like `orjson`.
  common_mistake: Focusing purely on optimizing the model weights or upgrading the GPU (e.g., migrating
    to an A10G) without realizing that text-based JSON serialization of large dense float arrays incurs
    an O(N) CPU penalty that exceeds the inference time.
  napkin_math: Total floats per batch = 64 vectors * 1024 dimensions = 65,536 floats. JSON payload size
    = 65,536 floats * 10 bytes/float = 655,360 bytes (~0.625 MB). Serialization time = 0.625 MB / 50 MB/s
    = 0.0125 seconds = 12.5 ms. Because 12.5 ms (Serialization) > 12.0 ms (Compute), the REST protocol
    overhead is the primary latency bottleneck.
