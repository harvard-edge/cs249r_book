id: cloud-1097
title: Checkpoint Loading via Data Striping
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are initializing a distributed LLM training job on 1024 GPUs. The job needs to load a massive
  2.5 TB model checkpoint from a distributed parallel file system. Your target load time is 20 seconds
  to minimize idle GPU time. Each storage node in your parallel file system is equipped with a 200 Gbps
  network interface (approximately 25 GB/s effective bandwidth). Assuming perfect linear scaling and no
  network congestion, calculate the minimum stripe count (number of storage nodes the file must be striped
  across) to achieve the required aggregate read bandwidth.
details:
  realistic_solution: Calculate the required aggregate read bandwidth (2.5 TB / 20s = 125 GB/s) and divide
    it by the single-node network capacity (25 GB/s) to find the stripe count. The file must be striped
    across at least 5 storage nodes.
  common_mistake: Failing to convert bits to bytes (200 Gbps vs GB/s) or ignoring the aggregate bandwidth
    requirement, mistakenly assuming a single high-performance NVMe server can serve thousands of clients
    simultaneously without network bottlenecks.
  napkin_math: Target Bandwidth = 2500 GB / 20 s = 125 GB/s. Single Node Bandwidth = 200 Gbps / 8 = 25
    GB/s. Minimum Stripe Count = 125 GB/s / 25 GB/s = 5 storage nodes.
