schema_version: 1
id: cloud-1709
title: Cloud RAPL Power Side-Channel Analysis
topic: power-budgeting
status: published
provenance: imported
scenario: A multi-tenant cloud host runs a confidential proprietary LLM inference service on an NVIDIA
  H100 GPU alongside an attacker-controlled VM. The attacker monitors the shared server power consumption
  via software interfaces like Intel RAPL and NVML at 1ms resolution. By observing the power fluctuating
  between a 300W memory-bound baseline and 650W compute-bound spikes, the attacker aims to reverse-engineer
  the victim's model architecture (layer sizes) and input sequence lengths.
details:
  realistic_solution: Disable unprivileged access to hardware power monitoring interfaces (e.g., restricting
    RAPL and NVML read permissions to root) and introduce power obfuscation by executing random dummy
    GEMM operations to maintain a constant power draw.
  common_mistake: Assuming power analysis attacks strictly require physical access with an oscilloscope,
    failing to recognize that cloud environments often inadvertently expose high-resolution software power
    metrics to guest VMs.
  napkin_math: Decoding 1 token takes ~15ms. Sampling RAPL at 1kHz yields 15 samples/token. If memory
    ops draw 350W (5ms) and FP8 GEMMs draw 650W (10ms), the energy signature per token is E = (350W *
    0.005s) + (650W * 0.010s) = 1.75J + 6.5J = 8.25J. Correlating these specific 8.25J windows allows
    attackers to accurately map internal layer execution boundaries.
