id: cloud-1719
title: LLM KV Cache Waste with Static Pre-allocation
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are serving a 7B parameter LLM (FP16 weights taking 14GB) on a 24GB RTX 3090. Your serving
  framework uses static pre-allocated memory management, reserving contiguous memory for the maximum sequence
  length of 2048 tokens for every incoming request. If a single token's KV cache requires exactly 1MB
  of memory, and the average request generates only 256 tokens before hitting EOS, calculate the wasted
  memory per batch and determine the maximum possible batch size.
details:
  realistic_solution: 'First, calculate available memory: 24GB (Total) - 14GB (Weights) = 10GB. Next,
    calculate the pre-allocated memory required per request: 2048 tokens * 1MB/token = 2.048GB. The maximum
    batch size is floor(10GB / 2.048GB) = 4. The average utilized memory per request is 256 tokens * 1MB
    = 256MB. Therefore, the wasted memory per request is 2048MB - 256MB = 1792MB. For a full batch of
    4, the total wasted memory is 4 * 1792MB = 7.168GB.'
  common_mistake: Calculating the maximum batch size based on the average expected sequence length (256
    tokens) or forgetting to account for the model weight memory overhead before calculating KV cache
    capacity.
  napkin_math: Available VRAM = 24GB - 14GB = 10GB. Pre-allocation per request = 2048 * 1MB = 2.048GB.
    Max Batch Size = floor(10 / 2.048) = 4. Waste per request = (2048 - 256) * 1MB = 1.792GB. Total batch
    waste = 4 * 1.792GB = 7.168GB.
