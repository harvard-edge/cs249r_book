id: cloud-2703
title: LR Warmup Duration Calculation
topic: data-parallelism
status: published
provenance: imported
scenario: You scale from batch size 256 on 1 GPU to batch size 8192 on 32 GPUs. Base LR is 0.1. The warmup
  heuristic recommends linearly ramping from base LR to target LR over 5 epochs. Dataset has 1.28M samples.
  Calculate the target LR and warmup steps.
details:
  realistic_solution: 'Batch size scales 8192/256 = 32x. By the linear scaling rule, target LR = 0.1 ×
    32 = 3.2. Steps per epoch at batch size 8192: 1,280,000 / 8,192 ≈ 156 steps/epoch. Warmup over 5 epochs
    = 5 × 156 = 780 steps. During warmup, LR ramps linearly from 0.1 to 3.2 over 780 steps. Each warmup
    step increases LR by (3.2 - 0.1) / 780 ≈ 0.004 per step. The gradual warmup prevents the large LR
    from destabilizing early training when the loss landscape is sharp.'
  common_mistake: Forgetting to calculate warmup in steps (not epochs). Steps per epoch changes with batch
    size, so the warmup duration in steps is different from what you might expect.
  napkin_math: 'Scale factor: 8192/256 = 32. Target LR: 0.1 × 32 = 3.2. Steps/epoch: 1.28M/8192 ≈ 156.
    Warmup steps: 5 × 156 = 780.'
