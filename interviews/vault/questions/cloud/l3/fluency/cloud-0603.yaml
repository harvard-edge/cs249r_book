schema_version: 1
id: cloud-0603
title: The PCIe Bottleneck
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You need to load a 7B model (14 GB in FP16) from CPU RAM to GPU VRAM over PCIe Gen4 x16. How
  long does the transfer take? Your serving SLA requires cold-start latency under 5 seconds. Will you
  meet it?
details:
  realistic_solution: PCIe Gen4 x16 has a theoretical unidirectional bandwidth of ~32 GB/s, but effective
    throughput for large DMA transfers is typically 24–26 GB/s due to protocol overhead, TLP framing,
    and IOMMU translation. Additionally, model loading involves deserialization (unpacking safetensors/pickle),
    memory allocation on GPU, and CUDA context initialization — none of which are pure DMA.
  common_mistake: '"PCIe Gen4 x16 is 32 GB/s, so 14 GB / 32 = 0.44 seconds — easily under 5 seconds."
    This uses the theoretical peak and ignores real-world overheads.'
  napkin_math: 'Pure DMA at 25 GB/s effective: 14 GB / 25 = 0.56 sec. But real model loading: deserialization
    from disk to CPU RAM (~2 sec for NVMe, ~8 sec for HDD), CPU→GPU DMA (0.56 sec), CUDA context + kernel
    warmup (0.5–1 sec). **Total cold start: ~3–4 sec from NVMe, ~10 sec from HDD.** NVMe meets the 5-sec
    SLA; HDD doesn''t. PCIe Gen5 doubles bandwidth to ~50 GB/s effective, cutting the DMA portion to 0.28
    sec — but the disk read and deserialization dominate anyway.'
