id: cloud-1681
title: Calculating PagedAttention Memory Savings
topic: vram-budgeting
status: published
provenance: imported
scenario: You are optimizing an inference server running a 70B parameter LLM on an 8x A100 (80GB) node.
  The KV cache consumes exactly 512 KB per token. The server handles a batch of 64 requests, with a maximum
  supported sequence length of 4096 tokens per request. However, the actual average sequence length at
  runtime is only 1024 tokens. Calculate the GPU memory wasted to internal fragmentation under a traditional
  contiguous allocation strategy, and the actual memory consumed using PagedAttention with 16-token blocks.
details:
  realistic_solution: Identify that contiguous allocation pre-reserves memory for the maximum possible
    sequence length (4096 tokens) for every request. Calculate the max allocation, then calculate the
    actual usage based on the average length (1024 tokens) which PagedAttention dynamically allocates.
    The difference is the waste eliminated.
  common_mistake: Failing to account for the fact that traditional KV cache systems pre-allocate memory
    based on the maximum sequence length, leading candidates to vastly underestimate the baseline memory
    consumption.
  napkin_math: Max Allocation = 64 requests * 4096 tokens * 0.5 MB/token = 128 GB. Actual Usage (PagedAttention)
    = 64 requests * 1024 tokens * 0.5 MB/token = 32 GB. Waste Eliminated = 128 GB - 32 GB = 96 GB. PagedAttention
    allocates 16-token pages (8 MB each) on demand, eliminating 75% of the memory footprint.
