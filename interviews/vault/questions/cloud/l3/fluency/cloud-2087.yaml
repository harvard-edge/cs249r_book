schema_version: 1
id: cloud-2087
title: KV Cache Memory Per Token
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A 70B parameter transformer LLM has 80 layers, 64 attention heads, and a head dimension of 128.
  Using GQA with 8 KV heads, compute the KV cache memory per token in BF16. Then estimate the total KV
  cache for a 4096-token context.
details:
  realistic_solution: 'Per token per layer: 2 (K+V) × 8 KV heads × 128 dims × 2 bytes = 4,096 bytes =
    4 KB. Across 80 layers: 4 KB × 80 = 320 KB per token. For 4096 tokens: 320 KB × 4096 = 1.28 GB.'
  common_mistake: Using the full 64 attention heads instead of the 8 GQA KV heads. GQA specifically reduces
    KV cache size by sharing KV heads across query groups.
  napkin_math: Per token KV size (GQA) = 2 (K,V) * 8 KV heads * 128 dim * 2 bytes (BF16) * 80 layers =
    327.68 KB/token. Total KV cache for 4,096 tokens = 327.68 KB * 4,096 = 1.34 GB per sequence. Standard
    Multi-Head Attention (64 KV heads) would be 8x larger (10.7 GB). GQA saves massive HBM capacity during
    serving.
