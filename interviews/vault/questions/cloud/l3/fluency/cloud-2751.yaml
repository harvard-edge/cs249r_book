id: cloud-2751
title: Monitoring Cardinality at Scale
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You monitor 100 models, each with 4 business metrics, 6 model metrics, 10 data quality metrics,
  and 8 system metrics. Metrics are collected every 60 seconds and retained for 30 days. Estimate the
  total number of time series and storage requirement (assume 8 bytes per data point).
details:
  realistic_solution: 'Metrics per model: 4 + 6 + 10 + 8 = 28 metrics. Total time series: 100 models ×
    28 = 2,800 base series. But with dimensional cardinality (e.g., accuracy per 5 demographic slices,
    latency per 3 endpoints): assume 3x multiplier = 8,400 time series. Data points per series per day:
    24h × 60 = 1,440 points. Points for 30 days: 1,440 × 30 = 43,200 per series. Total data points: 8,400
    × 43,200 = 362.9 million. Storage: 362.9M × 8 bytes = 2.9 GB raw. With indexes and overhead (~3x):
    ~8.7 GB. This is manageable for a time-series DB like Prometheus or InfluxDB. The real challenge is
    not storage but query performance and alert evaluation — 8,400 series each checked every 60 seconds
    means 140 alert evaluations per second.'
  common_mistake: Forgetting that each metric may have multiple dimensions (per-model, per-feature, per-slice),
    causing cardinality explosion far beyond the base metric count.
  napkin_math: '2,800 base × 3x cardinality = 8,400 series. 8,400 × 43,200 points × 8 bytes = ~2.9 GB
    raw. Alert evals: 8,400/60s = 140/s.'
