id: cloud-2018
title: Calculating NCHW Tensor Memory Offsets
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are optimizing a custom PyTorch C++ extension for a vision model. The input tensor has shape
  `[N=8, C=256, H=64, W=64]` and is stored in contiguous NCHW format in FP32. To implement a custom spatial
  pooling operator, you need to calculate the exact memory address of the element at index `[n=2, c=128,
  h=32, w=16]`. Calculate the linear offset in elements from the base pointer.
details:
  realistic_solution: 'In PyTorch''s default contiguous NCHW layout, the tensor is row-major. The strides
    are calculated from right to left: `[C*H*W, H*W, W, 1]`. Multiply each index by its corresponding
    stride to find the linear offset.'
  common_mistake: Assuming column-major (Fortran) order where the first dimension has stride 1, instead
    of row-major (C) order where the last dimension has stride 1, or miscalculating the cumulative products
    for the higher dimensions.
  napkin_math: 'Strides: S_W=1, S_H=64, S_C=64*64=4096, S_N=256 × 4096 = 1,048,576. For index [2, 128,
    32, 16], Offset = 2*(1048576) + 128*(4096) + 32*(64) + 16*(1) = 2,097,152 + 524,288 + 2,048 + 16 =
    2,623,504 elements.'
