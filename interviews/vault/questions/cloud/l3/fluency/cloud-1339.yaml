id: cloud-1339
title: Group DRO Weight Update Calculation
topic: graph-compilation
status: published
provenance: imported
scenario: You are training a ResNet-50 model on a cluster of 8x A100 80GB GPUs to classify wildlife images.
  The dataset suffers from severe spurious correlations, so you partition it into 4 disjoint groups (e.g.,
  waterbirds on water, landbirds on land, etc.) and implement Group Distributionally Robust Optimization
  (Group DRO). At iteration t, the group weights are uniformly initialized at q = [0.25, 0.25, 0.25, 0.25].
  The current average losses for the 4 groups evaluated on the current batch are L1=0.1, L2=0.2, L3=1.5,
  and L4=1.2. Using exponentiated gradient ascent for the group weights with a step size of η_q = 1.0,
  calculate the new normalized weight for the worst-performing group (Group 3) for the next iteration.
details:
  realistic_solution: Calculate the unnormalized weight for each group using w_g = q_g * exp(η_q * L_g),
    then divide by the sum of all unnormalized weights to find the new normalized q_g. The worst-performing
    group's weight will sharply increase to force the optimizer to prioritize it.
  common_mistake: Updating weights linearly (q + η_q * L) instead of multiplicatively, or failing to normalize
    the new weights across all groups to sum to 1, which causes the overall loss magnitude to explode
    and destabilizes the learning rate.
  napkin_math: 'Initial q = [0.25, 0.25, 0.25, 0.25]. Unnormalized weights:

    w1 = 0.25 * e^(1.0 * 0.1) ≈ 0.25 * 1.105 = 0.276

    w2 = 0.25 * e^(1.0 * 0.2) ≈ 0.25 * 1.221 = 0.305

    w3 = 0.25 * e^(1.0 * 1.5) ≈ 0.25 * 4.481 = 1.120

    w4 = 0.25 * e^(1.0 * 1.2) ≈ 0.25 * 3.320 = 0.830

    Sum of w = 0.276 + 0.305 + 1.120 + 0.830 = 2.531

    New q3 = w3 / Sum = 1.120 / 2.531 ≈ 0.442 (weight increases from 25% to 44.2% to penalize the worst-case
    group).'
