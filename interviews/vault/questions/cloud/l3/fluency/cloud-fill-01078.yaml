schema_version: 1
id: cloud-fill-01078
title: Optimizing Network-Bound LLM Training on AMD MI300X Cluster
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: You are deploying a large language model with 70 billion parameters (FP16 precision) on a distributed
  cluster utilizing AMD MI300X accelerators. Each MI300X unit is equipped with 192 GB HBM3 memory, offering
  5.3 TB/s memory bandwidth, and can sustain 1,307 TFLOPS for FP16 sparse operations. Your team observes
  that training throughput is significantly hampered, and profiling data indicates that gradient synchronization
  using all-reduce operations is the primary bottleneck, leading to substantial accelerator idle time.
  The effective network bandwidth per MI300X for inter-node communication is measured at 100 GB/s. This
  performance degradation prompts a critical re-evaluation of the communication-computation ratio. Considering
  potential network-bound training and the overarching need for effective bandwidth cost modeling, how
  would you diagnose and address this situation?
details:
  realistic_solution: '1. **Topology Optimization**: Analyze the cluster''s network topology to identify
    and improve bisection bandwidth for efficient inter-node communication. 2. **Gradient Compression/Sparsification**:
    Implement techniques like FP8 gradient quantization or gradient sparsification to reduce the volume
    of data transmitted. 3. **Overlapping Communication & Computation**: Utilize frameworks that enable
    overlapping gradient computation with communication (e.g., PyTorch''s `DDP` with `find_unused_parameters=False`
    and `bucket_cap_mb` tuning, or NCCL''s capabilities). 4. **Parameter Sharding**: Employ data parallelism
    techniques such as Fully Sharded Data Parallel (FSDP) or ZeRO-Stages to shard model states, gradients,
    and optimizer states across devices, significantly reducing the data volume per device during all-reduce.
    5. **Communication Algorithm Selection**: Experiment with different all-reduce algorithms (e.g., ring,
    tree) or hierarchical approaches to find the most efficient one for the given cluster size and network
    characteristics. 6. **Bandwidth Cost Modeling**: Develop and continuously refine a bandwidth cost
    model that integrates the cluster''s network topology, effective link speeds, and the chosen communication
    algorithms to predict and proactively mitigate bottlenecks.'
  common_mistake: A common mistake is to focus solely on the theoretical peak network bandwidth or local
    memory bandwidth (like HBM3) without accurately modeling the effective network throughput and contention
    during collective operations across multiple nodes. Overlooking the communication-computation ratio,
    assuming that higher raw FLOPS always translate to proportional training speedup, is another frequent
    error.
  napkin_math: 'Given a 70-billion parameter LLM (FP16) and an effective network bandwidth of 100 GB/s
    per MI300X:

    1.  **Gradient Size (G)**: 70 * 10^9 parameters * 2 bytes/parameter (FP16) = 140 * 10^9 bytes = 140
    GB.

    2.  **Minimum Communication Time for All-reduce (T_comm)**: For an all-reduce, roughly G bytes are
    effectively transferred/received by each participant from a bottleneck perspective. So, T_comm = 140
    GB / 100 GB/s = 1.4 seconds.

    3.  **Compute Time (T_compute)**: Given as 500 milliseconds = 0.5 seconds.

    4.  **Communication-Computation Ratio**: T_comm / T_compute = 1.4 s / 0.5 s = 2.8.

    5.  **Conclusion**: Since the ratio (2.8) is significantly greater than 1, the training run is strongly
    **network-bound**, indicating that the MI300X accelerators are spending more time waiting for data
    than computing. Understanding the bisection bandwidth of the cluster''s network fabric would allow
    for more accurate bandwidth cost modeling, as it directly impacts the achievable effective bandwidth
    during collective operations.'
