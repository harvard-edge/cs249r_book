id: cloud-1143
title: Calculating Disparate Impact in Cloud Loan APIs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud-based loan approval API processes 100,000 applications daily. Monitoring metrics show
  60,000 applicants are from a privileged demographic (Group A) and 40,000 from an unprivileged demographic
  (Group B). The model approves 18,000 applications from Group A and 8,000 from Group B. You need to calculate
  the Disparate Impact Ratio (DIR) to determine if the model violates the standard 'four-fifths' (80%)
  fairness rule.
details:
  realistic_solution: First, calculate the specific approval rate for each group independently. Group
    A has a 30% approval rate, while Group B has a 20% approval rate. Then, divide the unprivileged rate
    by the privileged rate. The resulting DIR is approximately 0.667, which falls below the 0.8 threshold,
    indicating disparate impact.
  common_mistake: Calculating the ratio of total approved applications between groups (8,000 / 18,000
    = 0.44) or the absolute risk difference, rather than the ratio of their respective approval rates.
  napkin_math: 'Rate_A = 18,000 / 60,000 = 0.30 (30%)

    Rate_B = 8,000 / 40,000 = 0.20 (20%)

    DIR = Rate_B / Rate_A = 0.20 / 0.30 = 0.667

    0.667 < 0.80 (Violates the four-fifths rule)'
