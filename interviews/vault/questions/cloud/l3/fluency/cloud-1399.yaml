schema_version: 1
id: cloud-1399
title: im2col Memory Expansion Overhead
topic: vram-budgeting
status: published
provenance: imported
scenario: You are profiling a CNN inference workload on a 16GB NVIDIA T4 GPU. A custom ML framework you
  are using naively applies the `im2col` transformation to map convolutions to highly optimized cuBLAS
  dense matrix multiplications. You are examining a specific convolution layer that receives an FP8 (1
  byte per element) activation tensor of shape (Batch=64, Channels=256, Height=256, Width=256) and applies
  a 3x3 kernel with stride 1 and padding 1. Calculate the intermediate memory footprint created by the
  `im2col` operation and determine why this layer might be the root cause of Out-Of-Memory (OOM) exceptions.
details:
  realistic_solution: The `im2col` transformation flattens each C x K x K receptive field into a matrix
    column. For a stride of 1, each pixel is duplicated approximately K^2 times in the intermediate representation.
    The input per sample is 256 x 256 x 256 = 16.77 MB. The `im2col` matrix per sample is (256 x 3 x 3)
    x (256 x 256) ≈ 151 MB. Across a batch of 64, this intermediate tensor alone consumes 151 MB x 64
    ≈ 9.66 GB. On a 16GB T4 GPU, this massive 9x memory expansion for a single layer's intermediate state
    leaves very little VRAM for weights, inputs, or workspace memory, easily leading to an OOM.
  common_mistake: Candidates often assume the `im2col` intermediate matrix is the same size as the input
    tensor, forgetting that overlapping patches are duplicated. They miss the K^2 memory expansion factor
    for stride-1 convolutions.
  napkin_math: Input per sample = 256 * 256 * 256 * 1 byte ≈ 16.77 MB. im2col matrix size = (C * K * K)
    * (H_out * W_out) = (256 * 3 * 3) * (256 * 256) = 2,304 * 65,536 = 150,994,944 bytes ≈ 151 MB. Expansion
    factor = 151 / 16.77 = 9 (which equals K^2). Total memory for batch 64 = 151 MB * 64 = 9,664 MB ≈
    9.66 GB.
