id: cloud-0491
title: 'The Hospital AI Rollout: Centralized vs. Federated TCO'
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML Systems Engineer advising a consortium of 500 hospitals on training a new diagnostic
  AI model. They need to refresh the model annually with 10 TB of imaging data from each hospital. They
  are evaluating two strategies and have asked you to use your ML systems expertise to diagnose the most
  economical path forward over a 3-year period.
details:
  realistic_solution: The correct approach is to calculate the 3-year TCO for both options. The Federated
    Learning approach is significantly more economical.
  common_mistake: Engineers often focus exclusively on the visible compute costs ($500k for the GPU cluster)
    and ignore the 'hidden' costs of data movement, which can dominate TCO at scale. Another common mistake
    is to be scared by the large upfront CapEx of the federated option without amortizing it over the
    project's lifetime.
  napkin_math: 'Centralized approach: Transferring 5PB costs $100k. Storing 5PB at $0.02/GB/mo costs $1.2M/year.
    Add $500k compute = $1.8M/year. Federated approach: Edge compute at 500 hospitals = 500 * $2k = $1M/year.
    FL avoids the $1.2M/yr central storage fee, lowering the 3-year TCO.'
