id: cloud-1104
title: Weight-Stationary Tiling DRAM Bandwidth
topic: vram-budgeting
status: published
provenance: imported
scenario: You are optimizing the dataflow mapping for an LLM projection layer on a custom cloud TPU. The
  activation matrix A has shape [16384, 8192] and the weight matrix B has shape [8192, 16384]. Both matrices
  use BF16 precision (2 bytes/element). The TPU uses a strict Weight-Stationary dataflow, pinning weight
  tiles into a dedicated 32MB weight SRAM. Since B is larger than 32MB, it must be tiled along the output
  dimension N. Calculate the total DRAM reads (in GB) required just for the activation matrix A to compute
  the full matrix multiplication.
details:
  realistic_solution: The correct total is 2.0 GB. First, calculate the size of the weight matrix B (256
    MB). Divide this by the 32 MB SRAM capacity to determine there are 8 sequential weight tiles. Since
    each pinned weight tile requires a full pass over the 256 MB activation matrix A, A is read from DRAM
    8 times.
  common_mistake: Candidates calculate the size of A (0.25 GB) and assume it is read exactly once, forgetting
    that in a tiled Weight-Stationary dataflow, the activations must be re-streamed from DRAM for every
    newly pinned weight tile.
  napkin_math: 'Size_B = 8192 * 16384 * 2B = 268,435,456 B = 256 MB.

    Weight_Tiles = 256 MB / 32 MB = 8 tiles.

    Size_A = 16384 * 8192 * 2B = 256 MB.

    Total_A_Reads = Size_A * Weight_Tiles = 256 MB * 8 = 2048 MB = 2.0 GB.'
