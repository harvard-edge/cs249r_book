id: cloud-1876
title: 70B LLM FSDP Checkpoint Time Calculation
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 70B parameter LLM on an 8-node cluster (64x A100 80GB GPUs) using Fully Sharded
  Data Parallel (FSDP) and AdamW. The total training state (parameters, gradients, and optimizer states)
  is 16 bytes per parameter. You need to checkpoint to a Lustre parallel file system that has a 50 GB/s
  aggregate write bandwidth limit. A single GPU rank can write to Lustre at a maximum of 2 GB/s. Calculate
  the write time for a rank-0 monolithic checkpoint versus a distributed sharded checkpoint, and identify
  the limiting bottleneck for each.
details:
  realistic_solution: Calculate the total state size (1.12 TB) and divide by the respective bottleneck.
    Monolithic is bottlenecked by single-node write speed (2 GB/s), while sharded is bottlenecked by the
    file system's aggregate limit (50 GB/s), taking 22.4 seconds.
  common_mistake: Candidates often calculate the sharded checkpoint time based purely on the single-rank
    write speed (17.5 GB per GPU / 2 GB/s = 8.75s), failing to account for the shared Lustre file system's
    aggregate bandwidth limit.
  napkin_math: 'Total State = 70B params * 16 bytes/param = 1120 GB (1.12 TB). Monolithic time = 1120
    GB / 2 GB/s = 560s. For sharded: 64 GPUs * 2 GB/s = 128 GB/s (exceeds 50 GB/s Lustre limit). Sharded
    time = 1120 GB / 50 GB/s = 22.4s. Speedup = 560 / 22.4 = 25x.'
