id: cloud-2769
title: Prompt Injection Defense Coverage
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You deploy 3 defense layers against prompt injection: (1) input regex filter catching 60% of
  known injection patterns, (2) a classifier model catching 80% of remaining injections, (3) output validation
  catching 70% of what passes through. If you receive 1000 injection attempts per day, how many succeed?'
details:
  realistic_solution: 'Layer 1 (regex): catches 60%, passes 40%. Remaining: 1000 × 0.40 = 400. Layer 2
    (classifier): catches 80% of remaining, passes 20%. Remaining: 400 × 0.20 = 80. Layer 3 (output validation):
    catches 70% of remaining, passes 30%. Remaining: 80 × 0.30 = 24. So 24 out of 1000 injection attempts
    succeed (2.4% overall success rate). Combined catch rate: 97.6%. To get below 1% success rate (< 10
    per day), you need to improve any one layer. If classifier improves to 90%: 1000 × 0.40 × 0.10 × 0.30
    = 12. If output validation improves to 85%: 1000 × 0.40 × 0.20 × 0.15 = 12. Either improvement gets
    you close to the 1% target.'
  common_mistake: Adding the percentages (60+80+70=210%) instead of computing the sequential pass-through
    rate. Each layer only sees what the previous layer missed.
  napkin_math: 'Pass-through: 1000 × 0.40 × 0.20 × 0.30 = 24 successful injections (2.4%). Need <10 for
    1% target. Improve any layer by ~10-15pp to hit target.'
