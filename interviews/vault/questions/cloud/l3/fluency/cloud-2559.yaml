id: cloud-2559
title: Cloud Fully Sharded Data Parallel L3 0
topic: data-parallelism
status: published
provenance: imported
scenario: You are training a 20B parameter model using FSDP on 16 A100 80 GB GPUs with NVLink (450 GB/s
  bisection). Each training step requires an all-gather of full parameters for forward+backward. Estimate
  the communication overhead per step.
details:
  realistic_solution: 'Model size in FP16: 20B × 2 bytes = 40 GB. FSDP all-gather: each GPU sends its
    40/16 = 2.5 GB shard to all others. Total data moved per all-gather = 40 × (N-1)/N ≈ 40 GB. Two all-gathers
    per step (forward + backward) + one reduce-scatter for gradients (40 GB). Total communication: ~120
    GB. NVLink bisection bandwidth: 450 GB/s. Time: 120 GB / 450 GB/s = 0.27 seconds. If compute per step
    (matmuls) takes ~2 seconds, communication overhead is 0.27 / (2 + 0.27) = 11.9%. With overlap (prefetching
    next layer''s all-gather during compute), effective overhead drops to ~3-5%.'
  common_mistake: Forgetting that FSDP requires communication for BOTH forward and backward passes. Unlike
    DDP which only communicates gradients in backward, FSDP must all-gather parameters before each layer
    in both forward and backward.
  napkin_math: 'Params: 40 GB. All-gather × 2 + reduce-scatter × 1 = 3 × 40 GB = 120 GB comm. NVLink:
    450 GB/s. Time: 120/450 = 0.27s. Compute: ~2s. Overhead: 0.27/2.27 = 11.9%. With overlap: ~4%.'
