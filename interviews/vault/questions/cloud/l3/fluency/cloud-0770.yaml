schema_version: 1
id: cloud-0770
title: The DataLoader Deadlock
topic: 3d-parallelism
status: published
provenance: imported
scenario: Your training job on 8 A100 GPUs hangs at step 1 and never progresses. GPU utilization is 0%.
  CPU utilization is 100% across all cores. `htop` shows 128 Python processes in `D` (uninterruptible
  sleep) state. You set `num_workers=16` per GPU in the DataLoader. What happened, and what's the maximum
  safe value for `num_workers`?
details:
  realistic_solution: 'You''ve created 128 worker processes (16 per GPU × 8 GPUs) that are all competing
    for shared resources and deadlocking. The `D` state means they''re waiting on I/O or kernel locks.
    Three mechanisms cause this: (1) **Shared memory exhaustion** — each DataLoader worker uses shared
    memory (`/dev/shm`) to pass tensors to the main process. Default `/dev/shm` in Docker is 64 MB. With
    128 workers each trying to write a batch (e.g., 32 images × 224×224×3 × 4 bytes = 19 MB per batch):
    total demand = $128 \times 19\text{ MB} = 2.4\text{ GB}$ — far exceeding 64 MB. Workers block on `shm_open()`.
    (2) **File descriptor exhaustion** — each worker opens dataset files. At 128 workers with 10 FDs each:
    1,280 FDs, potentially exceeding the process limit (default 1024). (3) **CPU oversubscription** —
    128 CPU-bound workers on a 64-core machine means 2× oversubscription, causing context-switch thrashing.
    Fix: set `num_workers = min(cpu_cores / num_gpus, 4)` as a starting point. For 64 cores and 8 GPUs:
    `num_workers=8`. Increase `/dev/shm` to 16 GB in Docker (`--shm-size=16g`).'
  common_mistake: '"More workers means faster data loading — set it as high as possible" or "The dataset
    is too large to fit in memory." The first ignores system resource limits, and the second is unrelated
    to the deadlock.'
  napkin_math: 'Server: 64 CPU cores, 512 GB RAM, 8 GPUs. `num_workers=16` per GPU × 8 GPUs = **128 workers**.
    CPU oversubscription: $128 / 64 = 2\times$ — each worker gets only 50% of a core, and context-switching
    overhead wastes ~30% of that. Effective CPU per worker: **35%**. Shared memory: 128 workers × 19 MB/batch
    = **2.4 GB** needed. Docker default `/dev/shm` = 64 MB → **37× oversubscribed** → deadlock. File descriptors:
    128 × 10 = 1,280 FDs. `ulimit -n` default = 1024 → **exceeded** → workers fail on `open()`. Safe configuration:
    `num_workers=4` per GPU × 8 GPUs = 32 workers. CPU utilization: $32/64 = 50\%$ — leaves headroom for
    the main process and system tasks. Shared memory: $32 \times 19 = 608\text{ MB}$ — set `--shm-size=2g`
    for safety. Data loading throughput at 4 workers: ~**3,200 images/s** per GPU (sufficient for most
    training at batch_size=32 with augmentation).'
