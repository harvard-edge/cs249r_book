id: cloud-1121
title: Calculating Demographic Parity for Resume Screening
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a cloud-based automated resume screening API that processes 100,000 applications
  daily. The applicant pool consists of 80,000 candidates from Group X (historical qualification rate
  of 30%) and 20,000 from Group Y (historical qualification rate of 15%). The current baseline model perfectly
  predicts these historical qualifications. If business rules mandate strict Demographic Parity while
  maintaining the exact same total number of daily accepted resumes, how many candidates from Group Y
  must be accepted daily, and how many of those will be 'unqualified' according to the historical labels?
details:
  realistic_solution: Calculate the global average acceptance rate across all groups, then apply this
    rate uniformly. For Group Y, you must accept 27% of their pool (5,400 candidates), meaning 2,400 historically
    unqualified candidates will be advanced.
  common_mistake: Confusing Demographic Parity with Equal Opportunity (equal true positive rates) or trying
    to equalize the raw count of accepted candidates rather than the acceptance proportions.
  napkin_math: '1. Current total accepted = (80,000 * 0.30) + (20,000 * 0.15) = 24,000 + 3,000 = 27,000.

    2. Global acceptance rate = 27,000 / 100,000 = 27%.

    3. Parity requirement for Group Y = 20,000 * 0.27 = 5,400 accepted.

    4. ''Unqualified'' accepted = 5,400 - 3,000 = 2,400.'
