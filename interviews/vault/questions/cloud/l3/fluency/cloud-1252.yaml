schema_version: 1
id: cloud-1252
title: Rack-Aware Capacity Provisioning
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are deploying an LLM serving fleet that requires a strictly enforced baseline capacity of
  48 H100 GPUs (packaged as 6 physical 8-GPU nodes) to meet peak SLA throughput requirements. Your datacenter's
  primary failure domain is the rack, as nodes within a rack share Top-of-Rack (ToR) switches and PDUs.
  You must guarantee the 6-node baseline capacity remains available even if an entire rack experiences
  a catastrophic failure. Calculate and compare the total number of nodes you must provision to minimize
  hardware costs if you distribute your fleet evenly across 3 racks versus 4 racks.
details:
  realistic_solution: You must treat the rack itself as the unit of redundancy. If you have R racks, the
    remaining (R-1) racks must be able to support the entire 6-node baseline. Distributing across 4 racks
    requires fewer total nodes (8) than distributing across 3 racks (9).
  common_mistake: Simply applying standard N+1 node redundancy (provisioning 7 total nodes) without accounting
    for the failure domain boundary, which would result in dropping below baseline if a rack containing
    multiple nodes fails.
  napkin_math: 'Required nodes = 6.

    Formula: Nodes_per_rack = ceil(Baseline_Nodes / (Total_Racks - 1))


    For 3 Racks:

    Nodes_per_rack = ceil(6 / (3 - 1)) = 3

    Total provisioned = 3 racks * 3 nodes = 9 nodes (50% overhead).


    For 4 Racks:

    Nodes_per_rack = ceil(6 / (4 - 1)) = 2

    Total provisioned = 4 racks * 2 nodes = 8 nodes (33% overhead).'
