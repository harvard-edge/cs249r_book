schema_version: 1
id: cloud-0465
title: The Privacy Premium
topic: federated-learning
status: published
provenance: imported
scenario: You are the lead ML Systems Engineer at a health-tech startup building a cancer detection model.
  You have partnerships with 10 hospitals, each holding 10TB of valuable image data. The CTO asks you
  to solve for the 3-year Total Cost of Ownership (TCO) for two training strategies and recommend one.
details:
  realistic_solution: The correct answer requires calculating the 3-year TCO for both strategies and then
    reasoning about the non-quantifiable risks.
  common_mistake: Focusing only on the hourly cloud instance cost ($100/hr is high!) and ignoring the
    massive, one-time data acquisition fee in the centralized approach or the recurring engineering salary
    cost in the federated approach. Another common mistake is miscalculating the data transfer costs by
    an order of magnitude, making it seem like the dominant factor.
  napkin_math: '**Strategy A: Centralized Training (3-year TCO).**

    Data acquisition: 10 hospitals × $50K licensing fee = $500K one-time.

    Data transfer: 10 hospitals × 10 TB × 1,024 GB/TB × $0.09/GB = $9,216 ≈ $9,000.

    Central storage: 100 TB × 1,024 GB/TB × $0.023/GB/month × 36 months = $84,971 ≈ $85,000.

    Compute: 8× A100 cluster. At typical cloud pricing, an 8× A100 node costs ~$25/hr.

    $25/hr × 672 hr (4 weeks) × 3 years = $50,400.

    Engineering: 1 ML engineer (half-time) × $200K × 3 years = $300,000.

    **Strategy A 3-year TCO ≈ $500K + $9K + $85K + $50K + $300K = $944K.**


    **Strategy B: Federated Learning (3-year TCO).**

    Data acquisition fee: $0 (data stays on-premise).

    Data transfer: only gradient updates, negligible (~500 MB × 10 hospitals × 52 rounds/yr × 3 yr = 780
    GB × $0.09 ≈ $70).

    On-prem GPU nodes: 10 × $15K amortized over 3 years = $150K.

    Aggregation server: $2,000/month × 36 = $72K.

    Engineering: 2 ML engineers (FL expertise) × $200K × 3 = $1.2M.

    **Strategy B 3-year TCO ≈ $0 + $0.07K + $150K + $72K + $1,200K = $1,422K.**


    Strategy B costs ~$478K more in direct costs. However, the non-quantifiable risk of centralizing 100
    TB of medical imaging data (HIPAA fines up to $1.8M per violation category, plus reputational damage)
    makes Strategy B the safer long-term bet. A single breach could exceed the entire 3-year cost difference.


    Note: The $100/hr rate in the original was ambiguous. Using $25/hr for an 8×A100 node (typical cloud
    pricing for reserved instances).'
