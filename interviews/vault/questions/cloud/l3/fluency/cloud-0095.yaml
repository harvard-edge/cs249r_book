schema_version: 1
id: cloud-0095
title: The Throughput Trap
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team has optimized an LLM inference server for maximum throughput, achieving 5,000 tokens/sec
  aggregate on a single H100. The deployment uses large static batches to maximize GPU utilization. However,
  user feedback is poor, with complaints that the chatbot feels 'laggy' and 'unresponsive' on the first
  response. You profile the system and find that while the per-user Time Per Output Token (TPOT) is reasonable
  (~12ms at batch=64, since 64 tokens are generated in parallel each step), the Time To First Token (TTFT)
  can be very high due to queuing. Apply your knowledge of serving latency to explain this phenomenon.
details:
  realistic_solution: This is a classic trade-off between throughput and latency. Large static batches
    are excellent for throughput because they maximize the arithmetic intensity of the computation, keeping
    the GPU cores busy. However, this comes at the cost of high TTFT. A request arriving at the server
    may have to wait a significant amount of time for the batch to fill before it is even processed. While
    the subsequent tokens (TPOT) are generated quickly as part of the efficient batch, the initial wait
    time dominates the user's perception of latency. The system is optimized for batch processing, not
    for single-user responsiveness. To fix this, one would need to switch to a system like continuous
    batching that can start processing requests immediately, improving TTFT at the potential cost of slightly
    lower overall throughput.
  common_mistake: Focusing only on throughput as the primary success metric. Engineers often equate high
    tokens/second with a good user experience. They fail to distinguish between the system's overall processing
    rate (TPOT-driven throughput) and the perceived responsiveness for an individual user (TTFT).
  napkin_math: To achieve 5,000 tokens/sec, the server uses large static batches. If a batch window is
    80ms, a request waits up to 80ms before processing starts. Furthermore, a massive batch size (e.g.,
    64) means the prefill computation takes significantly longer (e.g., 150ms) to process 64 prompts at
    once. TTFT = Wait (80ms) + Big Prefill (150ms) = 230ms.
