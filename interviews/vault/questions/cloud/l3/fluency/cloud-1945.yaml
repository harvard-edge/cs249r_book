id: cloud-1945
title: Calculating Maximum Static Batch Size for Strict SLA
topic: batching-strategies
status: published
provenance: imported
scenario: You are deploying a BERT-base text classification model on an NVIDIA T4 GPU. Incoming requests
  arrive at a steady, deterministic rate of 200 requests per second (exactly 1 request every 5ms). The
  execution time for a batch of size N is modeled as 8ms + (N-1) * 1ms. You use strict static batching,
  meaning the system waits until exactly N requests are accumulated in the queue before dispatching the
  batch to the GPU. If your strict P99 latency SLA is 50ms, what is the maximum static batch size you
  can configure to ensure the first request in any batch meets the SLA limit?
details:
  realistic_solution: 'The maximum static batch size is 8. The first request in the batch waits the longest:
    it must wait for the remaining N-1 requests to arrive before the batch is dispatched, taking (N-1)
    * 5ms. Then, the entire batch executes in 8 + (N-1) * 1ms. Setting N=8 yields a total latency of 35ms
    wait time plus 15ms execution time, perfectly hitting the 50ms SLA.'
  common_mistake: Candidates often forget to account for the queueing delay (wait time) of the first request
    in the batch, only calculating the GPU execution time. Alternatively, they may calculate the wait
    time as N * 5ms instead of (N-1) * 5ms.
  napkin_math: 'Wait Time = (N-1) * 5ms

    Execution Time = 8 + (N-1) * 1ms

    Total Latency = Wait + Exec = 8 + 6*(N-1) ms

    SLA Constraint: 8 + 6*(N-1) <= 50

    6*(N-1) <= 42

    N-1 <= 7

    N <= 8'
