id: cloud-1391
title: Diagnosing the I/O Wall in Vision Training
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training a large Vision Transformer on a single node equipped with 8x H100 GPUs. Each
  GPU is capable of processing 2,500 images per second at peak compute. Your training dataset consists
  of JPEG images with an average size of 200 KB, stored on a centralized Network Attached Storage (NAS)
  volume that is provisioned for a maximum of 2 GB/s read throughput. Calculate the data consumption rate
  of the training loop and determine if the system will hit an I/O wall.
details:
  realistic_solution: 'First, calculate the aggregate image consumption: 8 GPUs * 2,500 images/sec = 20,000
    images/sec. Then, calculate the required bandwidth: 20,000 images/sec * 200 KB/image = 4 GB/s. Since
    the required 4 GB/s throughput exceeds the NAS provisioned limit of 2 GB/s, the GPUs will starve for
    data (the I/O wall). The solution is to either cache the dataset on the node''s local NVMe drives
    or upgrade to a high-performance parallel file system.'
  common_mistake: Candidates often assume that the bottleneck will be GPU compute or inter-GPU communication,
    neglecting to calculate the aggregate storage bandwidth required to feed the accelerators at full
    utilization.
  napkin_math: Required BW = 8 GPUs * 2,500 img/s * 200 KB/img = 4,000,000 KB/s = 4.0 GB/s. Available
    BW = 2.0 GB/s. 4.0 GB/s > 2.0 GB/s -> System is heavily I/O bound.
