schema_version: 1
id: cloud-r2-40040
title: AllReduce Bandwidth Efficiency on NVLink vs RoCE
topic: gradient-synchronization
status: published
provenance: imported
scenario: An 8-GPU H100 node uses NVLink at 900 GB/s bisection bandwidth for intra-node AllReduce and
  400Gbps (50 GB/s) RoCE for inter-node. Calculate the AllReduce time for a 2GB gradient at each level
  and determine the crossover message size where NVLink's advantage diminishes relative to the α (latency)
  overhead.
details:
  realistic_solution: 'Intra-node (8 GPUs, NVLink 900 GB/s): T_nvlink = 2 × 7/8 × 2GB / 900GB/s = 3.89ms.
    Per-step overhead: 2×7 steps × 1µs = 14µs. Total: 3.9ms. Inter-node (8 nodes, RoCE 50 GB/s): T_roce
    = 2 × 7/8 × 2GB / 50GB/s = 70ms. Per-step overhead: 2×7 steps × 5µs = 70µs. Total: 70.07ms. NVLink
    is 18× faster for 2GB messages (dominated by bandwidth ratio: 900/50 = 18×). Crossover where α matters:
    when message size D satisfies 2(N-1)/N × D/B ≈ 2(N-1) × α. Solving for D: D ≈ N × B × α. NVLink: D
    = 8 × 900GB/s × 1µs = 7.2KB. RoCE: D = 8 × 50GB/s × 5µs = 2MB. For messages < 7.2KB, NVLink AllReduce
    is latency-bound. For messages < 2MB, RoCE AllReduce is latency-bound. For small parameter server
    updates (<1MB), NVLink is ~5× faster (latency ratio) rather than 18× (bandwidth ratio).'
  common_mistake: Comparing only bandwidth and ignoring that NVLink and RoCE have different latency characteristics.
    NVLink α ≈ 1μs (direct GPU-to-GPU), RoCE α ≈ 5μs (NIC + switch + NIC). For small messages, this 5×
    latency difference dominates.
  napkin_math: 'NVLink α-dominated region: < 7.2KB. RoCE α-dominated region: < 2MB. For a 64KB gradient
    tensor: NVLink = 2×7×1µs + 2×7/8×64KB/900GB/s = 14µs + 0.124µs = 14.12µs. RoCE = 2×7×5µs + 2×7/8×64KB/50GB/s
    = 70µs + 1.12µs = 71.12µs. Ratio: 71/14 ≈ 5× (closer to latency ratio than bandwidth ratio).'
