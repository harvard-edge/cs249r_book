id: cloud-2657
title: Detecting Undeclared Dependencies via Feature Statistics
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You monitor 50 features with daily distribution checks (mean, std, min, max). A feature's mean
  shifts from 0.42 to 0.38 (a 9.5% change) overnight. Your alert threshold is a 2-sigma deviation. Historical
  daily mean variation has std=0.015. Does this trigger an alert?
details:
  realistic_solution: 'Z-score = |observed_mean - expected_mean| / historical_std = |0.38 - 0.42| / 0.015
    = 0.04 / 0.015 = 2.67. Alert threshold is 2-sigma (z > 2.0). Since 2.67 > 2.0, YES, this triggers
    an alert. But with 50 features monitored daily, you expect false alarms: at 2-sigma threshold (2-tailed),
    ~4.55% of checks are false positives = 50 × 0.0455 = 2.27 false alarms/day. To reduce alert fatigue,
    use Bonferroni correction: adjusted threshold = 2-sigma for 50 tests ≈ 3.29-sigma. At this corrected
    threshold: 2.67 < 3.29, so this would NOT trigger with correction. The tension: Bonferroni reduces
    false alarms but may miss real distribution shifts. A practical compromise: use 2.5-sigma threshold
    and investigate any feature with persistent multi-day shifts.'
  common_mistake: Setting alert thresholds without accounting for multiple comparisons. Monitoring 50
    features at 2-sigma generates ~1 false alarm per day, causing alert fatigue.
  napkin_math: 'Z = (0.42-0.38)/0.015 = 2.67. Raw threshold 2σ: triggers. Bonferroni-corrected for 50
    tests (3.29σ): does not trigger. Practical: alert but lower priority.'
