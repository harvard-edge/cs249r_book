id: cloud-0942
title: Capacity Planning for Canary Deployments
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying a new recommendation model (v2) on an EKS cluster currently running 50 g5.xlarge
  instances. The existing model (v1) handles 10,000 requests per second (RPS) with a strict p99 latency
  SLA of 200ms. Each v1 instance safely processes 250 RPS to meet this SLA. You plan to route 5% of live
  production traffic to a canary v2 deployment. Assuming v2 is computationally heavier and has a 10% lower
  throughput per instance than v1, calculate the exact number of dedicated g5.xlarge instances required
  for the canary to guarantee the 200ms SLA.
details:
  realistic_solution: Calculate the actual absolute traffic the canary must handle, determine the safe
    throughput capacity for a single v2 instance, and divide the two to find the required node count.
    Since partial nodes cannot be provisioned, you must ceil() the result to guarantee the SLA.
  common_mistake: Candidates often simply allocate 5% of the total existing instances for the canary without
    factoring in the new model's degraded throughput profile, leading to immediate latency spikes in the
    canary group.
  napkin_math: 'Canary Traffic = 10,000 RPS * 0.05 = 500 RPS.

    v2 Instance Throughput = 250 RPS * 0.90 = 225 RPS.

    Required Canary Nodes = 500 RPS / 225 RPS/node = 2.22 nodes -> round up to 3 nodes.'
