id: cloud-0200
title: The Warm-up Request Strategy
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: We just deployed a new model version. The first inference request takes 12 seconds, but subsequent
  requests take 200ms. Our health check passed (model loaded successfully), so why is the first real request
  60× slower? And how many warm-up requests do we need before routing production traffic?
details:
  realistic_solution: 'The first-request penalty comes from three sources: (1) **CUDA kernel JIT compilation:**
    PyTorch/TensorRT compiles and caches GPU kernels on first use. Different input shapes trigger different
    kernels. (2) **CUDA context and memory pool initialization:** The first `cudaMalloc` initializes the
    memory allocator, and the first kernel launch initializes the CUDA context on each GPU. (3) **cuBLAS
    handle and workspace allocation:** The first GEMM operation allocates cuBLAS workspace buffers. After
    the first request, all of these are cached. You need warm-up requests that cover all expected input
    shapes (different sequence lengths, batch sizes) to trigger compilation of all kernel variants.'
  common_mistake: '"The model needs to ''warm up'' its internal caches like a CPU cache." GPU inference
    doesn''t have the same cache-warming semantics as CPU workloads. The slowdown is from one-time initialization
    costs that happen on the first forward pass, not cache misses.'
