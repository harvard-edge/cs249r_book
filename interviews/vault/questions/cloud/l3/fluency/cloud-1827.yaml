id: cloud-1827
title: Confidential VM Cold Start Overheads
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying a proprietary 14GB (7B parameter, FP16) model to an NVIDIA A10G GPU inside
  a Confidential VM. The weights are AES-256-GCM encrypted in S3. Your instance has 10 Gbps network bandwidth,
  CPU decryption throughput of 14 GB/s using AES-NI, and PCIe Gen4 x16 (25 GB/s effective) to the GPU.
  Calculate the total time required to securely load the model into GPU memory during a cold start, assuming
  a streaming, pipelined implementation.
details:
  realistic_solution: Implement a chunked streaming pipeline where data is decrypted and transferred to
    the GPU as it arrives, bounding the operation by the slowest stage.
  common_mistake: Calculating the total time by summing the steps sequentially (11.2s + 7s + 0.6s = 18.8s)
    instead of identifying the pipeline bottleneck.
  napkin_math: 'Bandwidths: Network = 1.25 GB/s, Decrypt = 2 GB/s, PCIe = 25 GB/s. Pipeline Bottleneck
    = 1.25 GB/s. Total Time = 14 GB / 1.25 GB/s = 11.2 seconds.'
