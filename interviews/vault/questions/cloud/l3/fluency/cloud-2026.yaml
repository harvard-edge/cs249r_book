id: cloud-2026
title: Cloud Loan Approval Fairness Adjustment
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a cloud-based automated loan approval model processing 100,000 applications
  daily. The model outputs an approval probability score. For the majority demographic (Group A), a standard
  decision threshold of 0.5 yields a True Positive Rate (TPR) of 85%. For the minority demographic (Group
  B), the same 0.5 threshold yields a TPR of only 60%. Calculate and apply the necessary post-hoc threshold
  adjustment to satisfy the Equal Opportunity fairness criterion.
details:
  realistic_solution: Implement group-specific decision boundaries during the serving layer's post-processing.
    Keep Group A's threshold at 0.5 and lower Group B's threshold (e.g., to 0.35) until its TPR reaches
    the 85% target.
  common_mistake: Applying a single global threshold and assuming the model's calibrated probabilities
    naturally result in equalized group outcomes without verifying group-wise True Positive Rates.
  napkin_math: Initial TPR Gap = 85% (Group A) - 60% (Group B) = 25%. By evaluating the ROC curve for
    Group B, we map threshold=0.35 to TPR=85%. Adjusted TPR Gap = 85% - 85% = 0%, satisfying Equal Opportunity.
