id: cloud-2610
title: Computing Energy per Inference from Arithmetic Intensity
topic: roofline-analysis
status: published
provenance: imported
scenario: A matrix multiplication kernel performs 2M FLOPs and transfers 64KB from HBM. DRAM access costs
  20 pJ/byte, each FP16 FLOP costs 0.4 pJ. Calculate total energy and the fraction spent on data movement.
details:
  realistic_solution: Arithmetic intensity = 2M FLOPs / 64KB = 2,000,000 / 65,536 ≈ 30.5 FLOPs/byte. Compute
    energy = 2M × 0.4 pJ = 800,000 pJ = 0.8 μJ. Memory energy = 65,536 bytes × 20 pJ = 1,310,720 pJ =
    1.31 μJ. Total = 0.8 + 1.31 = 2.11 μJ. Data movement fraction = 1.31/2.11 = 62%. At arithmetic intensity
    30.5, this workload sits below the ridge point (~50 FLOPs/byte), confirming it is memory-energy-bound.
    To reduce energy, you should optimize data reuse (tiling, fusion) rather than reduce FLOPs.
  common_mistake: Using 64K = 64,000 instead of 65,536 (64 × 1024). Also forgetting that being below the
    ridge point means memory energy dominates.
  napkin_math: 'AI = 2M/64K ≈ 30 FLOPs/byte. Compute: 2M×0.4pJ = 0.8μJ. Memory: 64K×20pJ = 1.3μJ. Total
    ≈ 2.1μJ, 62% from memory.'
