title: Pipeline Bubble Fraction Calculation
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are configuring a 1D Pipeline Parallel (PP) training run for a large language model across
  8 GPUs using the GPipe schedule (1 stage per GPU, p=8). Your microbatch size is fixed to 4 due to activation
  memory constraints. You need to ensure that the pipeline bubble overhead is exactly 10% or less of the
  total step time. Calculate the minimum global batch size required to achieve this pipeline efficiency.
details:
  realistic_solution: The GPipe pipeline bubble fraction is calculated as (p - 1) / m, where p is the
    number of stages and m is the number of microbatches. To keep the bubble under 10% with 8 stages,
    we need 70 microbatches, leading to a global batch size of 280.
  common_mistake: Candidates often calculate the correct number of microbatches but forget to multiply
    by the microbatch size to find the global batch size, or they incorrectly assume 1F1B schedules eliminate
    the steady-state pipeline bubble entirely.
  napkin_math: 'Bubble Fraction = (p - 1) / m

    0.10 >= (8 - 1) / m

    0.10 * m >= 7

    m >= 70 microbatches

    Global Batch Size = m * microbatch_size = 70 * 4 = 280'
