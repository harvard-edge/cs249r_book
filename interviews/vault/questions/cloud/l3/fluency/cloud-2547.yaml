id: cloud-2547
title: Cloud Weight Stationary L3 0
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A weight-stationary accelerator has 256 PEs, each with 2 KB local SRAM. You want to run a 2048×2048
  FP16 weight matrix through it. Calculate how many times weights must be tiled (reloaded) and the total
  weight traffic.
details:
  realistic_solution: 'Total weight size: 2048 × 2048 × 2 bytes = 8 MB. Per-PE SRAM: 2 KB. Total on-chip
    weight capacity: 256 PEs × 2 KB = 512 KB. Tiles needed: 8 MB / 512 KB = 16 tiles. Each tile loads
    512 KB of weights, processes all inputs against that tile, then loads the next. Total weight traffic:
    16 tiles × 512 KB = 8 MB (each weight loaded exactly once across all tiles). If batch size is B, inputs
    stream B times per tile: total input traffic = 16 × B × 2048 × 2B / 16 = B × 8 KB per tile × 16...
    Simplifying: weights loaded once (8 MB), inputs loaded once per tile pass.'
  common_mistake: Thinking weight-stationary means weights are never reloaded. When the weight matrix
    exceeds on-chip capacity, it must be tiled — but each weight is still loaded minimally (once per forward
    pass), unlike inputs which may be re-streamed per tile.
  napkin_math: 'Weights: 2048² × 2B = 8 MB. On-chip: 256 × 2 KB = 512 KB. Tiles: 8 MB / 512 KB = 16. Weight
    traffic: 8 MB total (weight-stationary loads each weight once). Input traffic per batch element: 2048
    × 2B × 16 tiles = 64 KB (inputs re-streamed per tile).'
