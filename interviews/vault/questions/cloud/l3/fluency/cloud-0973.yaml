schema_version: 1
id: cloud-0973
title: Cold Restart Recovery Time Calculation
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A 1024-GPU cluster training a 200B parameter model experiences a catastrophic switch failure,
  requiring a full cluster cold restart. The globally consolidated checkpoint size is 4000 GB. It takes
  20 seconds for the orchestrator to detect the failure, 5 minutes (300 seconds) to provision replacement
  nodes, and 130 seconds to rebuild NCCL communicators and re-compile execution graphs. The cluster's
  parallel file system provides a guaranteed aggregate read bandwidth of 80 GB/s. Calculate the total
  Time to Recovery (TTR) from the moment of failure until the cluster can resume the next training step.
details:
  realistic_solution: The total Time to Recovery (TTR) is 500 seconds. A robust system design must account
    for the full end-to-end penalty, as collective initialization and provisioning often dominate the
    raw I/O time in a cold restart.
  common_mistake: Candidates often only calculate the I/O transfer time of the checkpoint from storage,
    forgetting to account for the substantial orchestrator detection time, node provisioning, and network
    communicator initialization overheads.
  napkin_math: T_load = Checkpoint Size / Storage Bandwidth = 4000 GB / 80 GB/s = 50 seconds. Total TTR
    = T_detect (20s) + T_provision (300s) + T_load (50s) + T_init (130s) = 500 seconds (8.33 minutes).
