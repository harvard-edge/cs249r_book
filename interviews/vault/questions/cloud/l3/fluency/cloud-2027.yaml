id: cloud-2027
title: Batched Test-Time Scaling Latency
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are implementing Best-of-16 test-time compute scaling for a 70B reasoning model deployed
  on an 8xA100 node. A request has a 1,000-token prompt and requires generating 16 distinct reasoning
  paths, each exactly 200 tokens long. You leverage KV prefix caching so the prompt is prefilled only
  once. Your system's prefill speed is 4,000 tokens/sec. During decode, a batch size of 1 yields a Time
  Per Output Token (TPOT) of 10ms. However, running all 16 paths concurrently in a single batch increases
  TPOT to 15ms due to memory bandwidth contention. Calculate the total end-to-end latency for this Best-of-16
  request and compare it to a standard single-pass (Best-of-1) request.
details:
  realistic_solution: Process the 1000-token prompt once via prefix caching (250ms). Then, batch the 16
    concurrent decode generations together. The decode latency becomes 200 tokens * 15ms = 3,000ms. Total
    latency is 3.25 seconds.
  common_mistake: Candidates often multiply the single-pass total latency by 16, failing to account for
    the amortized prefill cost via prefix caching and the latency hiding achieved by batched decode.
  napkin_math: 'Best-of-1: Prefill = 1000 / 4000 = 0.25s. Decode = 200 * 0.010s = 2.0s. Total = 2.25s.

    Best-of-16: Prefill = 1000 / 4000 = 0.25s. Decode = 200 * 0.015s = 3.0s. Total = 3.25s.

    Result: You achieve 16x more reasoning paths (3,200 generated tokens) for only a 1.44x increase in
    end-to-end latency (3.25s vs 2.25s).'
