schema_version: 1
id: cloud-2580
title: Cloud Megatron Parallelism L3 0
topic: data-parallelism
status: published
provenance: imported
scenario: You use Megatron TP=8 on 8 H100 GPUs (NVLink 450 GB/s per GPU) for a model with 80 Transformer
  layers, hidden dim 8192, and micro-batch size 4. Calculate the all-reduce communication volume per training
  step.
details:
  realistic_solution: 'Per Transformer block: 2 all-reduces (1 FFN + 1 attention) in forward, 2 in backward
    = 4 all-reduces total. Each all-reduce transfers an activation tensor: batch × seq_len × hidden_dim
    × 2 bytes. Assume seq_len = 2048. Volume per all-reduce: 4 × 2048 × 8192 × 2 = 128 MB. But ring all-reduce
    sends 2×(N-1)/N × data ≈ 2 × 128 MB = 256 MB per all-reduce. Per block: 4 × 256 MB = 1,024 MB. 80
    layers: 80 × 1,024 MB = 80 GB. NVLink time: 80 GB / 450 GB/s = 0.178 seconds. With overlap of compute
    and communication, effective overhead is much smaller.'
  common_mistake: Forgetting to count backward pass all-reduces. The backward pass requires the same all-reduces
    as forward (to reconstruct activations for gradient computation), doubling the communication volume.
  napkin_math: 'Per all-reduce: 4 × 2048 × 8192 × 2B = 128 MB data. Ring AR overhead: ~2 × 128 = 256 MB.
    4 ARs/layer × 80 layers = 320 all-reduces. Total: 320 × 256 MB = 80 GB. Time: 80/450 = 178 ms.'
