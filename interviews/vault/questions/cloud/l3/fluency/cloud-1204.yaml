id: cloud-1204
title: GPU Energy Efficiency for Embedding Extraction
topic: energy-per-operation
status: published
provenance: imported
scenario: A team is evaluating two GPU architectures for a daily batch pipeline processing 100 million
  text documents into embeddings. Setup A uses an A100 GPU (400W TDP, 5,000 docs/sec throughput). Setup
  B uses an H100 GPU (700W TDP, 12,000 docs/sec throughput). Assuming both GPUs run at full TDP during
  processing and idle power is negligible, calculate the total daily energy consumption in kWh for each
  setup to identify the most energy-efficient option.
details:
  realistic_solution: Calculate total energy as Power multiplied by Time (where Time equals Total Workload
    divided by Throughput). The H100 completes the workload so much faster that its total energy consumed
    per batch is significantly lower.
  common_mistake: Looking only at the peak power draw (700W vs 400W) and concluding the H100 is less energy-efficient,
    failing to account for the 'race to sleep' principle and reduced total execution time.
  napkin_math: 'Setup A (A100): Time = 100M / 5,000 = 20,000 seconds. Energy = 400W * 20,000s = 8,000,000
    Joules = 2.22 kWh. Setup B (H100): Time = 100M / 12,000 = 8,333 seconds. Energy = 700W * 8,333s =
    5,833,100 Joules = 1.62 kWh. The H100 is ~27% more energy efficient.'
