schema_version: 1
id: cloud-1118
title: Control Loop Reconciliations for Gang Scheduling
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You submit a declarative PyTorchJob custom resource requesting 64 A100 GPUs (8 nodes × 8 GPUs)
  with strict gang scheduling. The cluster currently has only 40 A100 GPUs available across 5 nodes. The
  declarative controller triggers a cluster autoscaler scale-up for 3 nodes, which takes 240 seconds to
  provision in parallel. The controller evaluates the resource state every 15 seconds. Calculate how many
  times the control loop will observe a state mismatch (drift) before the job can begin execution.
details:
  realistic_solution: The controller continuously compares the actual state (5 nodes) to the desired state
    (8 nodes) every 15 seconds. It will observe a drift 16 times before the 3 missing nodes become ready
    after 240 seconds.
  common_mistake: Assuming the declarative controller queues the request and sleeps, rather than continuously
    polling and attempting to reconcile the actual state with the desired state at every tick.
  napkin_math: Desired capacity = 8 nodes. Actual capacity = 5 nodes. Autoscaler delay = 240s. Controller
    sync period = 15s. Cycles observing drift = 240s / 15s = 16 cycles.
