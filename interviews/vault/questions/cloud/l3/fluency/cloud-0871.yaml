id: cloud-0871
title: Hardware Upgrade Speedup Estimation
topic: data-parallelism
status: published
provenance: imported
scenario: We are profiling a Transformer training job on an 8x A100 node. One training step takes 500ms.
  Profiling shows that 400ms is spent on parallelizable GPU compute (forward and backward pass), while
  100ms is strictly sequential, spent on CPU-bound data loading and host-side dispatch overhead that cannot
  be overlapped. We are considering an upgrade to H100 GPUs, which benchmarks show will provide exactly
  4x the compute throughput for our specific model architecture. Assuming the sequential host-side overhead
  remains unchanged, calculate the new step time and the overall system speedup.
details:
  realistic_solution: According to Amdahl's Law, the speedup only applies to the parallelizable portion
    of the workload. The 400ms GPU compute time is reduced to 100ms, but the 100ms sequential CPU time
    remains. The new step time is 200ms, yielding an overall system speedup of 2.5x.
  common_mistake: Candidates often assume the 4x hardware compute upgrade yields a 4x overall system speedup
    (estimating a 125ms step time), failing to account for the unaccelerated sequential fraction.
  napkin_math: 'Original T = 500ms

    Parallelizable (T_p) = 400ms

    Sequential (T_s) = 100ms

    Compute Speedup (S) = 4

    New T_p = 400 / 4 = 100ms

    New T_total = New T_p + T_s = 100 + 100 = 200ms

    Overall Speedup = Original T / New T_total = 500 / 200 = 2.5x'
