schema_version: 1
id: cloud-1953
title: Scaling DLRM Static Inference Caching
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing an ad-ranking system for 50 million daily active users (DAUs). Dynamic inference
  using an advanced DLRM model takes 120ms per user request, violating the strict 30ms ad-load SLA. A
  single NVIDIA A10G can process 5,000 users/sec in offline batch mode. To meet the SLA, you design a
  static inference architecture that pre-computes recommendations and stores them in Redis. Calculate
  the total offline compute time required to refresh the cache daily using a cluster of 8 A10G GPUs, and
  estimate the raw Redis memory footprint if each user's top-50 recommended item IDs (64-bit integers)
  are stored.
details:
  realistic_solution: Execute a scheduled batch job over the 8-GPU cluster to generate recommendations
    offline, and push the results to Redis. This transforms a 120ms ML inference bottleneck into a <5ms
    O(1) database lookup, easily satisfying the 30ms SLA while utilizing ~20GB of cache memory.
  common_mistake: Attempting to heavily optimize the dynamic inference path (e.g., pruning, quantization)
    to squeeze 120ms under the 30ms SLA, rather than circumventing the latency entirely via offline pre-computation,
    or incorrectly calculating the memory footprint of the resulting cache.
  napkin_math: Compute Time = 50,000,000 DAU / (5,000 users/sec/GPU * 8 GPUs) = 50,000,000 / 40,000 =
    1,250 seconds (~20.8 minutes). Raw Memory Footprint = 50,000,000 users * 50 items/user * 8 bytes/item
    = 20,000,000,000 bytes = 20 GB.
