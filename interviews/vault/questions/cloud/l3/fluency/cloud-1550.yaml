id: cloud-1550
title: Sizing GPU Clusters for DLRM Embeddings
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are designing the inference infrastructure for a Deep Learning Recommendation Model (DLRM).
  The model's embedding tables contain 10 billion entries, with each entry mapped to a 128-dimensional
  FP16 vector. Assuming the dense layers and activations require a fixed 50GB combined across the entire
  distributed setup, calculate the minimum number of NVIDIA A100 (80GB) GPUs required to shard and serve
  this memory-capacity-bound workload.
details:
  realistic_solution: Calculate the raw size of the embedding tables by multiplying the number of entries,
    vector dimension, and bytes per element. Add the baseline overhead, then divide the total required
    memory by the per-GPU VRAM capacity to find the minimum number of GPUs.
  common_mistake: Failing to account for the byte size of the data type (FP16 = 2 bytes) or attempting
    to calculate computational FLOPs instead of recognizing that DLRMs are fundamentally constrained by
    raw VRAM capacity.
  napkin_math: Embedding Size = 10,000,000,000 * 128 * 2 bytes = 2.56 TB (2,560 GB). Total VRAM Needed
    = 2,560 GB + 50 GB = 2,610 GB. Min GPUs = ceil(2,610 GB / 80 GB) = 33 GPUs.
