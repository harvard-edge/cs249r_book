id: cloud-1415
title: Multi-Stage Inference Pipeline Bottleneck Calculation
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are deploying an object detection service on an AWS g4dn.xlarge instance (1 NVIDIA T4 GPU,
  4 vCPUs). The inference pipeline has three stages: CPU preprocessing (JPEG decoding and resizing) takes
  15ms per image, GPU neural network execution takes 10ms per image, and CPU post-processing (Non-Maximum
  Suppression) takes 5ms per image. Calculate the maximum system throughput in images per second (FPS)
  for a fully synchronous pipeline versus an asynchronous pipeline, and determine how many parallel CPU
  preprocessing threads are required to fully saturate the GPU.'
details:
  realistic_solution: Implement an asynchronous pipeline using queues and multi-threading. The pipeline
    throughput becomes bottlenecked by the slowest stage (15ms CPU preprocessing), capping it at 66.7
    FPS. To achieve the GPU's theoretical limit of 100 FPS, run at least 2 parallel CPU preprocessing
    threads across the available vCPUs.
  common_mistake: Calculating throughput strictly by summing the latencies (1000ms / 30ms = 33.3 FPS)
    or incorrectly assuming the GPU execution time alone dictates the entire system throughput (100 FPS)
    without addressing the CPU preprocessing bottleneck.
  napkin_math: 'Synchronous Latency = 15ms + 10ms + 5ms = 30ms -> Max Throughput: 1000ms / 30ms = 33.3
    FPS.

    Asynchronous Bottleneck = max(15ms, 10ms, 5ms) = 15ms -> Max Throughput: 1000ms / 15ms = 66.7 FPS.

    GPU Max Throughput = 1000ms / 10ms = 100 FPS.

    Required CPU Preprocessing Threads = ceil(Preprocessing Time / GPU Time) = ceil(15 / 10) = 2 threads.'
