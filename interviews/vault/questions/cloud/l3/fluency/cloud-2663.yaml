id: cloud-2663
title: Pipeline Throughput with Unbalanced Stages
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'A 4-stage inference pipeline: tokenization (2ms), embedding lookup (3ms), transformer inference
  (15ms), detokenization (1ms). With 100 concurrent requests arriving, calculate the steady-state throughput
  and identify the bottleneck.'
details:
  realistic_solution: 'In a pipelined system, steady-state throughput = 1 / max_stage_latency. Bottleneck
    stage: transformer inference at 15ms. Throughput = 1/15ms = 66.7 requests/second. Stage utilizations:
    tokenization = 2/15 = 13.3%, embedding = 3/15 = 20%, transformer = 15/15 = 100%, detokenization =
    1/15 = 6.7%. The transformer stage is fully utilized while all other stages are idle most of the time.
    Pipeline efficiency = sum_of_stages / (num_stages × max_stage) = 21 / (4 × 15) = 35%. To improve:
    split the transformer into 3 micro-stages of 5ms each (tensor parallelism across 3 GPUs), making the
    new bottleneck the embedding lookup at 3ms. New throughput: 1/5ms = 200 req/s if transformer splits
    perfectly, or 1/3ms = 333 req/s if transformer stages are < 3ms each.'
  common_mistake: Calculating throughput as 1/(sum of all stages). In a pipeline, throughput is determined
    by the SLOWEST stage, not the total latency.
  napkin_math: 'Bottleneck: 15ms transformer. Throughput: 1/15ms = 66.7 req/s. Pipeline efficiency: 21ms
    total / 60ms pipeline slots = 35%. Splitting GPU stage 3-way → 200 req/s.'
