title: GPU Voltage Scaling Dynamic Power Reduction
topic: power-budgeting
status: published
provenance: imported
scenario: Your fleet of 10,000 H100 GPUs is hitting the datacenter's strict power cap of 7 MW during peak
  LLM training runs. The operations team proposes underclocking the GPUs to stay within the power budget
  by reducing the supply voltage (V) by 15% and the clock frequency (f) by 10% via NVML. Calculate the
  expected percentage reduction in dynamic power for the compute cores, assuming the workload activity
  factor and capacitance remain constant.
details:
  realistic_solution: 'Apply the CMOS dynamic power formula: P = α * C * V^2 * f. Since voltage (V) is
    squared, a small reduction in voltage yields a disproportionately large reduction in power. Calculate
    the new power ratio: (0.85)^2 * 0.90 = 1.80. This results in a 35% reduction in dynamic power.'
  common_mistake: Candidates often assume power scales linearly with voltage (calculating 0.85 * 0.9 =
    76.5%, or a 23.5% reduction), forgetting the quadratic relationship of voltage in the CMOS power equation.
  napkin_math: "P_new = P_old * (V_new / V_old)^2 * (f_new / f_old) \nP_new = P_old * (0.85)^2 * (0.90)\
    \ \nP_new = P_old * 0.7225 * 0.90 = 0.65025 * P_old \nReduction = 100% - 65% = 35%"
