schema_version: 1
id: cloud-1867
title: Calculating LLM Microservice Serving Tax
topic: latency-decomposition
status: published
provenance: imported
scenario: 'An LLM inference service is split into three microservices: an API Gateway, a Tokenizer, and
  a Model Worker. For a single request, the API Gateway takes 2ms to parse JSON. It makes a gRPC call
  to the Tokenizer (1ms network delay + 1.5ms serialization/deserialization). The Tokenizer takes 3ms
  to process the text, then makes a gRPC call to the Model Worker (1ms network + 1.5ms SerDes). The Model
  Worker takes 20ms for the actual LLM forward pass to generate the first token. The response is sent
  directly back to the Gateway (1ms network + 1ms SerDes) where it is formatted (1ms) and returned. Calculate
  the absolute "Serving Tax" (total latency NOT spent on tokenization or model compute) and the final
  Time-To-First-Token (TTFT) observed by the user.'
details:
  realistic_solution: Map out and sum every overhead step. Compute time is 23ms (3ms tokenization + 20ms
    model). The serving tax includes JSON parsing, formatting, and three gRPC network/SerDes hops, totaling
    10ms. This results in a 33ms TTFT.
  common_mistake: Only benchmarking the raw PyTorch model forward pass (20ms) and ignoring serialization,
    API gateway processing, and internal RPC network hops when committing to an SLA.
  napkin_math: Model Compute = 3ms (Tokenization) + 20ms (LLM forward pass) = 23ms. Serving Tax = 2ms
    (JSON parsing) + 2.5ms (Hop 1 network/ser) + 2.5ms (Hop 2 network/ser) + 2.0ms (Hop 3 network/ser)
    + 1ms (Formatting) = 10ms. Total Time to First Token (TTFT) = 23ms + 10ms = 33ms. Serving overhead
    is ~30% of total latency.
