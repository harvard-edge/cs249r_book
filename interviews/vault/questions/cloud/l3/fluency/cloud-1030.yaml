id: cloud-1030
title: Hidden Correction Cascades in Bidding Pipelines
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A Kubernetes-orchestrated cloud ad-bidding pipeline uses a CTR Predictor (Model A) feeding into
  a downstream Bidding Agent (Model B). Historically, Model A under-predicted desktop CTR by 20% (outputting
  0.8x the true probability). To compensate without retraining Model A, engineers added a 'correction
  cascade' heuristic in Model B that multiplies the incoming CTR by 1.25. Six months later, Model A is
  upgraded to a well-calibrated Transformer model running on T4 GPUs, but the undocumented heuristic in
  Model B remains active. If the true desktop CTR is 4.0%, and the Bidding Agent computes its bid as `Predicted_CTR
  * $50`, calculate the over-bid amount per impression and the total daily financial loss assuming 2 million
  desktop impressions.
details:
  realistic_solution: Calculate the financial impact to justify an immediate rollback. Afterwards, establish
    strict API contracts (e.g., passing uncalibrated logits and explicit calibration metrics) to prevent
    cross-component boundary erosion, and remove the hardcoded 1.25x heuristic. Deploy Model A and B tested
    jointly.
  common_mistake: Candidates often assume the solution is to add yet another downstream patch to negate
    the first heuristic, which deepens the correction cascade instead of addressing the eroded boundary
    between components.
  napkin_math: True CTR = 0.04. Expected bid (if correctly calibrated) = 0.04 * $50 = $2.00. Actual cascaded
    bid with legacy heuristic = (0.04 * 1.25) * $50 = 0.05 * $50 = $2.50. Over-bid per impression = $2.50
    - $2.00 = $0.50. Daily Financial Loss = 2,000,000 * $0.50 = $1,000,000.
