id: cloud-1920
title: Covariance Pruning for Backdoors
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training a ResNet-50 on an 8x A100 GPU cluster using a dataset of 10 million images.
  You suspect a backdoor trigger affects up to 0.5% of the data. To deploy the spectral signature defense
  on a suspicious class of 50,000 examples, you extract the 2048-dimensional representations from the
  penultimate layer and project them to find the poisoned samples. Calculate how many examples to prune
  if your safety margin dictates removing 1.5x the expected poison rate.
details:
  realistic_solution: Extract the 2048-dimensional features specifically for the N=50,000 examples in
    the target class, compute the 2048x2048 covariance matrix, project all features onto the top eigenvector,
    and remove the top 375 examples based on projection magnitude.
  common_mistake: Calculating the covariance matrix across the entire dataset instead of independently
    for each class, which causes the top eigenvector to capture natural inter-class variance rather than
    the anomalous poison signature.
  napkin_math: Target class size N = 50,000. Expected poison rate = 0.5%. Pruning threshold = 1.5 * 0.5%
    = 0.75%. Number of examples to prune = 50,000 * 0.0075 = 375 examples.
