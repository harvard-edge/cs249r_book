title: 'Network Bandwidth Bottlenecks: Fluency — AllReduce Bandwidth in 60 Seconds'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Without reference, in 60 seconds: ''You have 8 H100 GPUs with NVLink (900GB/s). You''re doing
  data-parallel training with a 7B FP16 model (14GB gradients). How long does the AllReduce take?'''
details:
  realistic_solution: 'Per GPU: 14GB / 8 = 1.75GB gradients. Ring-AllReduce: each GPU sends/receives 2×(8-1)/8
    × 1.75GB = 3.0625GB. NVLink per-direction BW: 900GB/s / 2 = 450GB/s. Time: 3.0625GB / 450GB/s = 6.8ms.
    With NVSwitch (all-to-all): (N-1)/N × data_per_GPU / BW × 2 = 7/8 × 1.75 / 450 × 2 = 3.06GB / 450
    = 6.8ms.'
  common_mistake: Dividing 14GB by 900GB/s directly; the ring-AllReduce moves 2×(N-1)/N × data_per_GPU,
    not the full tensor size.
  napkin_math: '7B FP16 grads: 14GB. Per GPU: 1.75GB. Ring data per GPU: 2×7/8×1.75=3.0625GB. NVLink 450GB/s
    uni: 3.0625/450=6.8ms. Compute step (7B, 4096 tokens, 8 GPUs): ~100ms. AllReduce: 6.8ms = 6.4% of
    step. Compute-bound. GPU efficiency: 100/(100+6.8)=93.6%.'
