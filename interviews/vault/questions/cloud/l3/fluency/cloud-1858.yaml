id: cloud-1858
title: Autoscaling Ramp-up and Boot Time Lag Calculation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are serving a BERT-base model on a fleet of AWS g4dn.xlarge instances (NVIDIA T4). Each
  node has a strict capacity of 50 RPS to maintain a P99 latency SLA of <200ms. Traffic is currently stable
  at 500 RPS (10 nodes active, utilization is 100% of target). A sudden traffic spike hits, increasing
  traffic linearly by 300 RPS per minute. Your reactive autoscaler adds nodes when utilization exceeds
  80%, but new nodes take 3 minutes to boot, load the 2GB model, and become healthy. Calculate the required
  buffer capacity (headroom) in RPS and nodes to ensure zero SLA violations during this 3-minute boot
  window.
details:
  realistic_solution: Calculate the total traffic increase during the system's reaction time (boot time)
    and maintain that as a continuous capacity buffer. For a 3-minute boot time and 300 RPS/min ramp rate,
    the system must continuously maintain a buffer of 900 RPS (18 idle nodes).
  common_mistake: Assuming reactive target-tracking scaling is sufficient for spiky traffic, forgetting
    to account for the capacity 'blind spot' introduced by node boot and model loading times. Candidates
    often calculate capacity based on average utilization without factoring in the derivative of traffic
    (ramp rate).
  napkin_math: 'Boot Time (T_boot) = 3 minutes

    Traffic Ramp Rate (R) = 300 RPS / minute

    Required Headroom = T_boot * R = 3 mins * 300 RPS/min = 900 RPS

    Node Capacity = 50 RPS / node

    Required Buffer Nodes = 900 RPS / 50 RPS/node = 18 extra nodes required to absorb the spike while
    new nodes boot.'
