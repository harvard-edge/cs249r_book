schema_version: 1
id: cloud-0461
title: The Two-Node Scaling Disappointment
topic: collective-communication
status: published
provenance: imported
scenario: You are a Staff ML Engineer scaling up training for a 70B parameter LLM. On a single 8xH100
  node, you observe near-linear scaling (e.g., going from 1 to 8 GPUs). When you scale to a second identical
  node, connected via InfiniBand NDR, your overall throughput increases by only 2x, not the 8x you saw
  on the first node. Your CTO asks why the scaling efficiency dropped off a cliff. You use a profiler
  and find the vast majority of time is spent in the All-Reduce communication step. What is the most likely
  physical bottleneck?
details:
  realistic_solution: 'The bottleneck is the physical InfiniBand interconnect between the two nodes. Inside
    a single DGX H100 node, the 8 GPUs are connected by NVLink 4.0, which provides 900 GB/s of all-to-all
    bandwidth per GPU. In contrast, the InfiniBand NDR connection between the two nodes provides only
    50 GB/s (400 Gbps). This ~18x drop in communication bandwidth means that as soon as the model''s gradient
    synchronization (All-Reduce) has to cross the node boundary, the entire training step must slow down
    to the speed of the weakest link: the inter-node network.'
  common_mistake: Engineers often blame the software stack, such as an inefficient All-Reduce algorithm
    in PyTorch FSDP or NCCL, or suspect a misconfigured network switch. While these can be issues, they
    are secondary to the fundamental physics of the hardware. The primary bottleneck is the massive, unavoidable
    bandwidth gap between intra-node and inter-node communication.
  napkin_math: Intra-node communication utilizes NVLink 4.0 at 900 GB/s per H100 GPU. Inter-node communication
    relies on InfiniBand NDR, capped at 50 GB/s (400 Gbps). Bandwidth drops by a factor of 900 / 50 =
    18x when crossing the node boundary, stalling collective operations like All-Reduce.
