id: cloud-1767
title: Sizing Leaf Switches for Rail-Optimized Clusters
topic: interconnect-topology
status: published
provenance: imported
scenario: You are architecting a non-blocking rail-optimized InfiniBand network for 128 DGX H100 nodes
  (1,024 GPUs total, 8 GPUs and 8x 400Gbps NICs per node). To maximize Tensor Parallelism and AllReduce
  efficiency, each GPU index (0-7) is wired to a completely isolated 'rail' network. If you are using
  64-port 400Gbps NDR Quantum-2 switches, calculate the minimum number of leaf switches required across
  the entire cluster to ensure full non-blocking bandwidth (1:1 oversubscription) within each rail.
details:
  realistic_solution: In a 1:1 non-blocking leaf-spine design, a 64-port switch provides 32 downlinks
    to compute nodes. Since each of the 8 rails connects 128 NICs (one from each of the 128 nodes), each
    rail needs 128 / 32 = 4 leaf switches. Totaling all 8 rails yields 32 leaf switches.
  common_mistake: Dividing the total number of GPUs (1,024) by the total ports per switch (64) to get
    16 switches, failing to reserve half of the switch ports for uplinks in a non-blocking fat-tree architecture.
  napkin_math: Nodes = 128. NICs per rail = 128. Downlinks per non-blocking 64-port switch = 32. Leaf
    switches per rail = 128 / 32 = 4. Total leaf switches = 4 * 8 rails = 32.
