id: cloud-2532
title: Cloud Ultra Ethernet L3 0
topic: collective-communication
status: published
provenance: imported
scenario: A 256-GPU cluster uses a fat-tree topology with 400 Gbps links and 4 equal-cost paths between
  any two racks. With standard ECMP, a ring AllReduce creates 32 large flows that hash to paths. Estimate
  effective bandwidth under ECMP vs. packet spraying.
details:
  realistic_solution: 'With ECMP: 32 flows hash to 4 paths. By birthday paradox, distribution is uneven.
    Expected max-loaded path: ~32/4 + sqrt(32×3/16) ≈ 8 + 2.4 ≈ 10.4 flows. Bottleneck path has 10.4 flows
    sharing 400 Gbps = 38.5 Gbps per flow. With packet spraying: all 32 flows spread evenly across all
    4 paths. Each path carries 32/4 = 8 flow-equivalents. Per-flow bandwidth: 400/8 = 50 Gbps. Improvement:
    50/38.5 = 1.3x better bandwidth utilization. At scale with more flows, the ECMP imbalance worsens
    further.'
  common_mistake: Assuming ECMP distributes flows perfectly evenly. Hash collisions cause load imbalance,
    and with large AllReduce transfers, a single overloaded path becomes the bottleneck for the entire
    collective.
  napkin_math: 'ECMP: 32 flows, 4 paths. Worst path: ~10 flows × 400 Gbps / 10 = 40 Gbps/flow. Packet
    spray: 32/4 = 8 per path → 400/8 = 50 Gbps/flow. Gain: 50/40 = 1.25x. At 256 flows: ECMP worst path
    ~80 flows, spray = 64 → 1.25x.'
