id: cloud-2571
title: Cloud Red Teaming L3 0
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You plan automated red teaming for a chat model. You have 10,000 adversarial prompt templates
  and the model generates 50 tokens per response at 40 tok/s on one A100. Estimate the time and cost to
  run a full red team evaluation.
details:
  realistic_solution: 'Per adversarial prompt: ~50 input tokens + 50 output tokens = 100 total tokens.
    Generation: 50 output tokens at 40 tok/s = 1.25 seconds per prompt. Total prompts: 10,000. Sequential
    time: 10,000 × 1.25s = 12,500s = 3.47 hours on 1 A100. With batching (batch=32): throughput scales
    ~20x (not 32x due to memory) → 12,500 / 20 = 625s ≈ 10.4 minutes. A100 cost: $2/hr. Total: 10.4 min
    × $2/60 = $0.35. Plus classifier cost to evaluate safety of each response: 10,000 × 0.5s = 5,000s
    / 20 (batch) = 250s on CPU. Total cost under $1. Red teaming compute cost is negligible — the bottleneck
    is designing good adversarial templates.'
  common_mistake: Spending months designing adversarial prompts manually when automated generation (using
    another LLM to generate attacks) can produce 10,000+ diverse adversarial prompts in minutes. The compute
    cost of running them is trivial.
  napkin_math: '10K prompts × 50 tokens @ 40 tok/s = 12,500s sequential. Batch=32 speedup ~20x: 625s ≈
    10 min. 1 A100 @ $2/hr × 10 min = $0.33. Safety classifier: ~$0.50 on CPU. Total: <$1 per full sweep.'
