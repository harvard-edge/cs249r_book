id: cloud-1400
title: Immutable Audit Trail Storage Scaling
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A financial ML platform processes 5,000 fraud detection inference requests per second. To meet
  SEC compliance, every inference event requires an immutable audit log containing input features, model
  version, and authorization tokens, averaging 2 KB per entry. The logs must be stored in an append-only
  WORM (Write Once Read Many) object storage system with a 7-year retention policy. Calculate the continuous
  write throughput required and the total storage capacity needed after 7 years of constant traffic.
details:
  realistic_solution: Decouple logging using an asynchronous message queue that batches logs and flushes
    them to WORM object storage (like S3 Object Lock). The required write throughput is 10 MB/s, and the
    7-year storage footprint is approximately 2.2 PB.
  common_mistake: Attempting to write every 2 KB log synchronously to a relational database, bottlenecking
    inference latency, and failing to calculate the multi-petabyte long-term storage requirements.
  napkin_math: 'Throughput = 5,000 req/s * 2 KB/req = 10,000 KB/s = 10 MB/s.

    Daily storage = 10 MB/s * 86,400 s/day = 864 GB/day.

    Yearly storage = 864 GB/day * 365 days = 315,360 GB/year (~315 TB/year).

    7-year retention = 315 TB/year * 7 years = 2,205 TB = ~2.2 PB.'
