schema_version: 1
id: cloud-0108
title: The Live Caption Deadline
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are designing a service that provides live audio transcriptions for video calls. The system
  has a hard real-time deadline: 99% of 10-second audio chunks must be transcribed and returned in under
  500ms. Your model, running on a single H100, can process one 10s chunk in 250ms (service time). The
  service receives an average of 3 requests per second (arrival rate), following a Poisson process. Using
  M/M/c queuing theory, solve for the minimum number of H100 servers (c) needed to meet the P99 500ms
  deadline.'
details:
  realistic_solution: 'This is a capacity planning problem that can be modeled with M/M/c queues. We need
    to find the number of servers ''c'' that keeps the tail of the response time distribution within our
    SLA.

    1. **Define Rates:** Arrival Rate λ = 3 req/s. Service Rate per server μ = 1 / 0.250s = 4 req/s.

    2. **Analyze c=1 Server:** The load ρ = λ / μ = 3/4 = 75%. For an M/M/1 queue, the average time a
    request spends in the system (wait + service) is W = 1 / (μ - λ) = 1 / (4-3) = 1 second (1000ms).
    Since the *average* response time already fails the 500ms P99 deadline, one server is not enough.

    3. **Analyze c=2 Servers:** The total system service rate is cμ = 2 * 4 = 8 req/s. The load ρ = λ
    / (cμ) = 3 / 8 = 0.375. At this much lower load, the probability of a request having to wait in the
    queue drops dramatically. The response time will be dominated by the 250ms service time, and the long
    tail of queuing delay will be short enough to meet the 500ms P99 SLA.'
  common_mistake: Only looking at the average utilization. Average utilization (ρ = λ / (cμ)) might look
    safe, but queuing theory shows that tail latency can be very high even at 50-70% utilization due to
    the random nature of request arrivals. Engineers often under-provision because they don't account
    for this variance.
  napkin_math: 1. **Establish Rates:** Arrival Rate (λ) = 3 req/s. Service Time = 250ms, so Service Rate
    per server (μ) = 1/0.25s = 4 req/s.
