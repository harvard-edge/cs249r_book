schema_version: 1
id: cloud-0096
title: The Memory Wall of Long Contexts
topic: vram-budgeting
status: published
provenance: imported
scenario: You are running a multi-tenant LLM serving system on H100 GPUs (80 GB HBM3). The system uses
  continuous batching and performs well with short user prompts. However, when a few users start engaging
  in very long conversations (e.g., summarizing a document with 16k tokens), you receive out-of-memory
  (OOM) errors and the entire batch fails. Your manager asks why the system, which can handle 64 concurrent
  users with short prompts, is failing with just a few users with long contexts. Using the scaling rules,
  diagnose the problem.
details:
  realistic_solution: The problem is the massive memory consumption of the KV cache for long sequences.
    In a transformer, the key-value (KV) states for every token in the context window must be stored in
    GPU memory to generate the next token. This memory usage scales linearly with sequence length and
    batch size. While continuous batching is efficient, it doesn't eliminate the fundamental memory requirement
    of the KV cache. A few users with very long contexts can quickly exhaust the 80 GB of HBM on an H100,
    causing an OOM that kills the entire batch of users currently being processed. The system needs KV
    cache compression (like quantization), paged attention mechanisms, or a stricter limit on the maximum
    sequence length per user to manage this.
  common_mistake: Assuming memory usage is only for model weights. Many engineers calculate the memory
    required for the model parameters (e.g., Llama-70B FP16 ≈ 140GB) and forget that the KV cache for
    the context window is often a much larger and more dynamic consumer of memory during inference.
  napkin_math: '**Model:** Llama-70B class (80 layers, 8 KV heads via GQA, 128 head_dim, FP16) | **KV-cache
    per token per layer:** 2 × 8 × 128 × 2 bytes = 4,096 bytes ≈ 4 KB | **KV-cache per token (all layers):**
    4,096 × 80 = 327,680 bytes ≈ 320 KB/token | **Short prompt (512 tokens):** 320 KB × 512 = 163.8 MB
    per user | 64 concurrent users × 163.8 MB = 10.5 GB KV-cache total | **Long prompt (16k tokens):**
    320 KB × 16,384 = 5.24 GB per user | 64 concurrent users × 5.24 GB = 335 GB → far exceeds 80 GB VRAM
    | Even 12 users at 16k: 12 × 5.24 GB = 62.9 GB KV-cache alone | Add model weights (~140 GB across
    TP shards) → OOM | **Diagnosis:** KV-cache scales linearly with seq_len. Going from 512 → 16k tokens
    is a 32× increase in per-user KV memory. The system was provisioned for short-context memory budgets;
    a few long-context users blow the VRAM budget.'
