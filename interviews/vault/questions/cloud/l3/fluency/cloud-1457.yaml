id: cloud-1457
title: Mitigating Dispatch Bottlenecks with CUDA Graphs
topic: latency-decomposition
status: published
provenance: imported
scenario: You are profiling a real-time recommendation model running on an NVIDIA A100. The model executes
  a sequence of 400 small, independent multi-layer perceptrons (MLPs) per request. Profiling shows that
  each MLP takes only 2 µs to execute on the device, but the GPU utilization is hovering around 28%. Given
  a typical CUDA kernel launch overhead of 5 µs per kernel, calculate the total execution time for these
  400 MLPs and demonstrate how to optimize this dispatch bottleneck.
details:
  realistic_solution: Identify that the system is CPU dispatch-bound. Implement CUDA Graphs to capture
    the entire sequence of 400 kernel launches into a single executable graph, amortizing the launch overhead.
  common_mistake: Candidates calculate the theoretical compute time (400 * 2 µs = 0.8 ms) and assume the
    GPU is underpowered or memory-bound, attempting to optimize the math kernels rather than recognizing
    the CPU dispatch overhead.
  napkin_math: 'Standard dispatch: 400 kernels * (5 µs launch + 2 µs compute) = 2.8 ms total latency (GPU
    is active for 0.8 ms, yielding ~28% utilization). CUDA Graphs dispatch: 1 graph launch (~3 µs) + (400
    * 2 µs compute) = 0.803 ms total latency. Speedup: ~3.5x.'
