id: cloud-fill-02051
title: 'RDMA Transport Fluency: IB Verbs API Key Operations'
topic: rdma-transport
status: published
provenance: imported
scenario: A junior distributed systems engineer needs to implement a simple RDMA message passing system
  using InfiniBand Verbs API. Explain the key setup steps (PD, MR, QP creation, connection), post-send/receive
  operations, and completion queue polling. What does 'zero-copy' mean in this context?
details:
  realistic_solution: 'Setup: (1) ibv_alloc_pd() → Protection Domain (security isolation). (2) ibv_reg_mr(pd,
    buffer, size, flags) → Memory Registration (pins pages, gets lkey/rkey). (3) ibv_create_qp(pd, &attr)
    → Queue Pair (send/recv engines). (4) Exchange QPN+rkey out-of-band (TCP). (5) ibv_modify_qp() → INIT→RTR→RTS
    state transitions. Operation: ibv_post_send() posts WR (Work Request) to HCA. HCA asynchronously DMAs
    data to remote. ibv_poll_cq() polls Completion Queue for completion. Zero-copy: data goes directly
    from registered buffer to NIC without intermediate kernel buffer copy. CPU is not in the data path
    after posting the WR.'
  common_mistake: Confusing ibv_post_send (posting a send request) with actually sending data; not understanding
    that data movement is asynchronous from the post_send call.
  napkin_math: 'RDMA Write throughput: 25GB/s (200Gbps IB). TCP throughput same link: ~20GB/s but with
    2× memory copies (kernel buffer). CPU cycles saved: 2 × 25GB/s / 16B/cycle / 3GHz CPU = 1.04 CPU cores
    continuously just for copies. Zero-copy frees that core. At 100Gbps: 0.52 CPU cores freed. Significant
    for high-bandwidth links.'
