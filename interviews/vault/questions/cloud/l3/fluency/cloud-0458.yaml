id: cloud-0458
title: The Mysterious Multi-Node Slowdown
topic: rdma-transport
status: published
provenance: imported
scenario: You are training a large model using data parallelism across two separate server nodes, each
  containing 8 H100 GPUs. The nodes are connected with a 400 Gbps InfiniBand NDR switch. You notice that
  your overall training throughput is less than 25% of the theoretical peak, and profiling reveals that
  the gradient synchronization step *between the two nodes* is the primary bottleneck. What is the most
  likely cause for this severe inter-node communication slowdown?
details:
  realistic_solution: The most likely culprit is a failure of RDMA (Remote Direct Memory Access) to function
    correctly over the InfiniBand fabric. When RDMA is disabled or misconfigured, communication libraries
    like NCCL fall back to a much slower protocol, typically IPoIB (IP over InfiniBand). This fallback
    path forces all communication through the hosts' CPUs and kernel network stacks, adding enormous latency
    and overhead. The CPU becomes a bottleneck, unable to saturate the 400 Gbps link, and the direct,
    low-latency GPU-to-remote-GPU communication path is lost. This explains the drastic drop in effective
    bandwidth and the resulting training slowdown.
  common_mistake: A common mistake is to blame the raw bandwidth of the interconnect itself ('InfiniBand
    is too slow') without considering the protocol being used. Another is to misdiagnose the problem as
    being inside the node (NVLink/PCIe) when the symptom is clearly between nodes.
  napkin_math: Assume during the `all-reduce`, a total of 100 GB of gradient data must be exchanged between
    the two nodes.
