id: cloud-top-65026
title: QLoRA Double Quantization Memory Accounting
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A team wants to fine-tune a 70B model on a single 80GB H100 using QLoRA. They plan to use NF4
  base weights with double quantization. Calculate the total memory usage and verify feasibility.
details:
  realistic_solution: 'QLoRA memory breakdown: (1) Base model NF4: 70B params * 0.5 bytes = 35GB. (2)
    Double quantization saves ~0.37 bits/param additionally: 70B * 0.37/8 = 3.2GB savings = 31.8GB. (3)
    LoRA adapters (r=16): ~83MB in BF16 (negligible). (4) LoRA optimizer states (Adam): 2 * 83MB = 166MB.
    (5) Activation memory per layer during backward: depends on batch size and sequence length. For batch=1,
    seq=2048, Llama-3 70B: ~256MB activations with gradient checkpointing. (6) CUDA kernels + overhead:
    ~2GB. Total: 31.8 + 0.17 + 0.26 + 2 = 34.2GB. Fits in 80GB with room for batch size 2-4.'
  common_mistake: Only accounting for the quantized base model weights and forgetting optimizer states,
    gradients, and activation memory during backward pass. QLoRA only quantizes the frozen base model;
    LoRA adapters and their optimizer states are in full precision.
  napkin_math: 'NF4 quantization: 4 bits/param = 0.5 bytes. 70B * 0.5 = 35GB. Double quant: quantize the
    quantization constants (FP32 to 8-bit) for 256-element blocks. Savings: (32-8)/256 bits/param = 0.09375
    bits/param. 70B * 0.09375/8 = 820MB savings. Total base model: 35 - 0.82 = 34.2GB. Plus LoRA: +0.25GB.
    Plus activations (gradient checkpoint): +0.5GB. Total: ~35GB. Fits in 80GB with 45GB headroom for
    batching.'
