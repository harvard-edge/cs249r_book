id: cloud-2636
title: BatchNorm Statistics Divergence
topic: pruning-sparsity
status: published
provenance: imported
scenario: A BatchNorm layer has running_mean=2.0 (accumulated over 100K training steps, momentum=0.1).
  A single eval batch has batch mean=5.0. What value does BatchNorm use for normalization in train mode
  vs eval mode?
details:
  realistic_solution: 'In eval mode: Uses running_mean = 2.0. The batch mean (5.0) is irrelevant — eval
    mode always uses the stored running statistics for deterministic behavior. In train mode: Uses the
    current batch mean = 5.0 for normalization. Additionally, it updates the running statistics: new_running_mean
    = (1 - momentum) × running_mean + momentum × batch_mean = 0.9 × 2.0 + 0.1 × 5.0 = 1.8 + 0.5 = 2.3.
    So training mode both uses batch statistics (noisy) AND updates the running statistics as a side effect.
    This is why running BatchNorm in training mode during inference is doubly wrong: predictions are batch-dependent,
    AND it corrupts the stored statistics that were carefully accumulated during training.'
  common_mistake: 'Thinking momentum=0.1 means 10% of the running average is kept. PyTorch convention:
    new = (1-momentum)×old + momentum×batch. So 0.1 means 10% NEW, 90% old.'
  napkin_math: 'Eval: uses 2.0 (stored). Train: uses 5.0 (batch), updates running to 0.9×2.0 + 0.1×5.0
    = 2.3. A 2.5x difference in normalization!'
