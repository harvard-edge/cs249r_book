id: cloud-1870
title: Sizing Cloud Shadow Deployments
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is setting up a 100% shadow deployment for a new PyTorch-based fraud detection model
  to run alongside a legacy XGBoost model. Production traffic averages 12,000 requests per second (RPS).
  The new model, deployed on AWS g4dn.xlarge instances (1x NVIDIA T4), maxes out at 400 RPS per instance
  before latency SLA violations occur. Calculate the minimum number of g4dn.xlarge instances required
  to shadow deploy the new model across 100% of the traffic, ensuring the shadow cluster operates at a
  maximum of 75% utilization to handle natural traffic micro-bursts.
details:
  realistic_solution: Provision 40 instances. First, calculate the safe operational throughput per instance
    by applying the 75% utilization target (400 RPS * 0.75 = 300 RPS per instance). Then divide the total
    production traffic by this safe throughput to find the required instances.
  common_mistake: Calculating capacity using 100% utilization (12,000 / 400 = 30 instances), which causes
    the shadow model to drop requests or lag severely behind production during micro-bursts, invalidating
    the shadow evaluation.
  napkin_math: Safe RPS per instance = 400 * 0.75 = 300 RPS. Total instances = 12,000 RPS / 300 RPS/instance
    = 40 instances.
