id: cloud-1432
title: Intersectional FRR Disparity in Facial Auth
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are auditing a cloud-based facial authentication API that processes 1M requests/day. The
  system reports an overall False Rejection Rate (FRR) of 1.2%. When evaluating demographic parity independently,
  the FRR for the 'Female' subgroup is 2.5%, and the FRR for the 'Darker Skin' subgroup is 3.1%. A customer
  complains about high failure rates for a specific demographic. Upon auditing a sample of 10,000 authentication
  attempts for the intersectional subgroup 'Darker-Skinned Females' (where 9,500 are legitimate users
  who should be accepted), you observe 3,296 false rejections. Calculate the intersectional FRR and compare
  its disparity multiplier against the overall baseline.
details:
  realistic_solution: Evaluate error metrics across all overlapping identity combinations. For this system,
    the intersectional FRR is 34.7%, revealing a massive vulnerability that requires targeted intersectional
    data collection and loss function re-weighting.
  common_mistake: Evaluating fairness only on independent axes (e.g., gender alone or skin tone alone)
    and assuming intersectional error rates are merely additive, completely missing compounded exponential
    bias.
  napkin_math: Intersectional FRR = False Rejections / Expected Positives = 3,296 / 9,500 = 0.3469 (34.7%).
    Disparity Multiplier = Intersectional FRR / Overall FRR = 34.7% / 1.2% = 28.9x disparity.
