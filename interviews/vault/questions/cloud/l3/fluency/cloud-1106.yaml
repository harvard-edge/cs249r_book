id: cloud-1106
title: Demographic Data Scaling Shortfall
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are filling out the ''Composition'' section of a Datasheet for Datasets for a cloud facial
  recognition API''s training corpus (100M images). The datasheet reveals a severe skew: Demographic A
  comprises 0.1% of the dataset (100k images). To meet your strict 99.9% accuracy SLA across all subgroups,
  empirical scaling laws dictate you need at least 500,000 images per demographic. If you rely on naive
  random data collection from a pipeline where Demographic A has a 1% true occurrence rate, calculate
  the total volume of raw data you must ingest to close the gap.'
details:
  realistic_solution: Calculate the shortfall (400,000 images) and divide by the pipeline occurrence rate
    (0.01) to find the total ingestion requirement (40M images). Document this in the Datasheet to justify
    shifting from random sampling to targeted collection.
  common_mistake: Calculating the requirement based solely on the raw shortfall (400,000 images) without
    accounting for the pipeline's 1% occurrence rate, or using the original dataset's 0.1% skew rate instead
    of the new pipeline's rate.
  napkin_math: 'Current: 100,000,000 * 0.001 = 100,000. Shortfall: 500,000 - 100,000 = 400,000. Required
    raw ingestion: 400,000 / 0.01 = 40,000,000 images.'
