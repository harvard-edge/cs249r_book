schema_version: 1
id: cloud-1116
title: DCQCN Incast Buffer Sizing
topic: collective-communication
status: published
provenance: imported
scenario: A 400Gbps RoCEv2 fabric is experiencing incast congestion during an All-to-All communication
  phase. Ten senders are transmitting at a full 400Gbps line rate to a single receiver port. The switch's
  ECN marking threshold for DCQCN is configured at 150KB. The end-to-end round-trip time (RTT), including
  switch processing and Congestion Notification Packet (CNP) generation, is 2 microseconds. Calculate
  the peak buffer occupancy reached before the senders process the CNP and begin reducing their transmission
  rates, and determine the minimum buffer size required to prevent triggering PFC (Priority Flow Control)
  pauses.
details:
  realistic_solution: Calculate the net buffer accumulation rate as total incoming bandwidth minus outgoing
    bandwidth (4000 Gbps - 400 Gbps = 3600 Gbps). During the 2µs RTT before the CNP reaches senders, 900KB
    of data accumulates. Adding this to the 150KB ECN threshold, the peak buffer occupancy is 1.05MB.
    The switch buffer must be at least this large to avoid triggering Priority Flow Control (PFC).
  common_mistake: Failing to account for the draining rate of the receiver port when calculating buffer
    accumulation, or forgetting that the switch buffer continues to fill during the entire RTT window
    before the CNP takes effect at the senders.
  napkin_math: 'Total Input = 10 * 400 Gbps = 4000 Gbps

    Output (Drain Rate) = 400 Gbps

    Net Accumulation Rate = 4000 - 400 = 3600 Gbps = 450 GB/s

    Accumulation during 1 RTT = 450 GB/s * 2µs = 900 KB

    Peak Buffer Occupancy = ECN Threshold + Accumulation = 150 KB + 900 KB = 1.05 MB'
