id: cloud-1291
title: Latency Overhead of RS-FEC in PAM4 Fabrics
topic: collective-communication
status: published
provenance: imported
scenario: You are debugging tail latency in a distributed training cluster using 400G Ethernet with PAM4
  signaling. The typical path between two GPU nodes traverses 3 optical links and 2 intermediate switches.
  The propagation delay is 500ns per link, and switch processing takes 400ns per switch. To achieve an
  acceptable Bit Error Rate, Reed-Solomon RS(544, 514) FEC is active on every link, adding 120ns of latency
  for each encode or decode operation (occurring at both ends of every link). Calculate the total one-way
  end-to-end latency and the percentage of this latency introduced solely by FEC.
details:
  realistic_solution: First, calculate the base propagation and switch processing latency (1500ns + 800ns
    = 2300ns). Next, recognize that each of the 3 links requires both FEC encoding at the transmitter
    and decoding at the receiver (6 total operations). Calculate the FEC overhead (6 * 120ns = 720ns).
    The total one-way latency is 3020ns, with FEC accounting for roughly 23.8% of the total delay.
  common_mistake: Candidates often assume FEC is applied only end-to-end at the host NICs, forgetting
    that FEC encoding and decoding occurs at every single physical link hop, which drastically underestimates
    the total latency penalty.
  napkin_math: 'Propagation = 3 links * 500ns = 1500ns

    Switch Delay = 2 switches * 400ns = 800ns

    FEC Delay = 3 links * 2 ops (encode+decode) * 120ns = 720ns

    Total Latency = 1500 + 800 + 720 = 3,020ns

    FEC Percentage = (720 / 3020) * 100 = 23.8%'
