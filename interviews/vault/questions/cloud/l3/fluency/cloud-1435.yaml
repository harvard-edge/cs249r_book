id: cloud-1435
title: Invariance Testing Compute Cost
topic: federated-learning
status: published
provenance: imported
scenario: 'You are deploying an automated loan approval model (latency: 100ms per request) processing
  50,000 applications daily. To ensure fairness, you implement an invariance testing pipeline by substituting
  applicant names with 10 different demographic equivalents (as names act as proxy variables). If 2,500
  applications change their final approval decision across any of their 10 permutations, calculate the
  total daily compute time added by this testing suite and the application-level invariance violation
  rate.'
details:
  realistic_solution: 'The pipeline adds 500,000 additional inferences, requiring 13.89 hours of sequential
    compute time (which should be batched). The invariance violation rate is calculated at the application
    level: 5%.'
  common_mistake: Calculating the violation rate based on the total number of permutations instead of
    the original applications, and ignoring the linear scaling of compute costs for perturbation tests.
  napkin_math: Additional inferences = 50,000 apps * 10 permutations = 500,000. Compute time = 500,000
    * 100ms = 50,000 seconds = ~13.89 hours. Violation rate = 2,500 apps with flipped decisions / 50,000
    total apps = 5%.
