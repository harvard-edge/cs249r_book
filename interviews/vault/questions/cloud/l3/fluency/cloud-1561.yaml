schema_version: 1
id: cloud-1561
title: Small File Metadata Overhead in Object Storage
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team is training a vision model on a cloud GPU cluster using a dataset of 10 million 50KB
  images stored individually in a cloud object storage bucket (e.g., S3). The training pipeline is heavily
  IO-bound. The EC2 instance has a 25 Gbps network interface, but the object storage has an average metadata
  latency (Time-To-First-Byte) of 20ms per GET request. Calculate the theoretical maximum throughput (images/sec)
  achievable by a single sequential data loader thread, and estimate the total time spent on metadata
  overhead for one full epoch compared to the actual data transfer time.
details:
  realistic_solution: Consolidate the small image files into larger sequential formats (like TFRecords,
    Parquet, or WebDataset tar archives) sized around 100MB to 1GB each. This amortizes the 20ms metadata
    overhead across thousands of images, allowing the pipeline to utilize the full network bandwidth.
  common_mistake: Calculating theoretical throughput based solely on the 25 Gbps network bandwidth (3.125
    GB/s / 50KB = 62,500 images/sec), completely ignoring the per-file metadata latency which makes the
    pipeline IOPS-bound rather than bandwidth-bound.
  napkin_math: Single thread throughput = 1 request / (20ms TTFB + (50KB / 3.125GB/s transfer)) = 1 /
    ~0.020s = 50 images/sec. Total metadata time for 1 epoch (10M images) = 10,000,000 * 0.020s = 200,000
    seconds (~55.5 hours). Actual data transfer time = (10,000,000 * 50KB) / 3.125GB/s = 500GB / 3.125GB/s
    = 160 seconds. Metadata overhead is >1200x the transfer time.
