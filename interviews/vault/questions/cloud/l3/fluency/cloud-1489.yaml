schema_version: 1
id: cloud-1489
title: Applying the Law of Distributed Efficiency
topic: collective-communication
status: published
provenance: imported
scenario: A team is training a transformer model across 16 nodes using Data Parallelism. Each training
  step currently takes 50ms of computation per node. During the backward pass, 4GB of gradients must be
  synchronized using Ring All-Reduce over a 100 GB/s network fabric. Management proposes upgrading to
  next-generation GPUs that will halve the computation time to 25ms per step, while keeping the network
  fabric identical. Calculate the communication time and determine the impact on the communication-to-computation
  ratio to evaluate the true speedup.
details:
  realistic_solution: 'Calculate Ring AllReduce volume: ~2 * 4GB = 8GB. Communication time = 8GB / 100
    GB/s = 80ms. Before the upgrade, total step = 50ms (compute) + 80ms (comm) = 130ms, with comm/compute
    ratio of 1.6. After the upgrade, total step = 25ms + 80ms = 105ms, with comm/compute ratio of 3.2.
    The 2x compute upgrade yields only 24% overall speedup (130/105) because the network is the dominant
    bottleneck. Upgrading the network to 200 GB/s would cut comm to 40ms, making total step = 65ms (2x
    improvement).'
  common_mistake: Candidates often assume that doubling compute speed will roughly halve total step time,
    ignoring the fixed network communication overhead that remains constant regardless of compute upgrades
    — a direct application of Amdahl's Law.
  napkin_math: 'Ring All-Reduce volume ≈ 2 * S (for large N). Comm Time = (2 * 4 GB) / 100 GB/s = 80ms.
    Before upgrade: Comm/Comp ratio = 80ms / 50ms = 1.6 (Total step = 130ms). After upgrade: Comm/Comp
    ratio = 80ms / 25ms = 3.2 (Total step = 105ms). A 2x compute upgrade only yields a 24% overall speedup
    because efficiency is dictated by the network.'
