schema_version: 1
id: cloud-1241
title: Overlapping Transfer and Compute via Streams
topic: data-parallelism
status: published
provenance: imported
scenario: You are deploying a custom inference pipeline on a single NVIDIA A100 PCIe Gen4 GPU. Each request
  requires moving 160MB of input data from the host CPU to the GPU, running a neural network forward pass
  that takes exactly 12ms, and returning a negligible amount of output data. Assume the effective Host-to-Device
  (H2D) transfer bandwidth over PCIe Gen4 is exactly 32MB/ms. Calculate the total pipeline latency for
  processing 1,000 independent requests sequentially, comparing a naive synchronous implementation to
  a fully pipelined implementation utilizing pinned memory and independent CUDA execution streams.
details:
  realistic_solution: Allocate host input buffers using pinned memory and dispatch H2D transfers onto
    a dedicated CUDA stream while the compute kernel runs concurrently, hiding the transfer latency completely
    and dropping total execution time to ~12 seconds.
  common_mistake: Failing to allocate host buffers as pinned (page-locked) memory, which silently forces
    the GPU driver to serialize transfers and compute even when using separate CUDA streams, resulting
    in the naive 17-second execution time.
  napkin_math: 'H2D Transfer Time = 160MB / (32MB/ms) = 5ms. Compute Time = 12ms. Synchronous (Naive)
    total = 1000 * (5ms + 12ms) = 17,000ms. Asynchronous (Streams + Pinned Memory) total: The 5ms transfer
    of request N+1 overlaps with the 12ms compute of request N. Total Time = Initial transfer + 1000 *
    max(Transfer, Compute) = 5ms + 1000 * max(5ms, 12ms) = 5ms + 12,000ms = 12,005ms.'
