title: Calculating the Efficiency Frontier Trade-off
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are mapping the efficiency frontier for a computer vision model deployed on an NVIDIA T4
  GPU. The strict latency SLA is 100ms per inference batch. The baseline FP32 model has a latency profile
  of `Latency = 10ms + 10ms * BatchSize`. An optimized INT8 model has a profile of `Latency = 20ms + 4ms
  * BatchSize` but drops the mean Average Precision (mAP) by 1.5%. Calculate the maximum batch sizes for
  both models that meet the 100ms SLA, calculate their respective throughputs (images/second), and quantify
  the efficiency frontier trade-off between throughput and mAP.
details:
  realistic_solution: 'First, solve for the maximum batch size (BS) where Latency <= 100ms for both models.
    For FP32: 10 + 10*BS = 100 -> BS = 9. The throughput at the SLA limit is 9 / 0.1s = 90 images/sec.
    For INT8: 20 + 4*BS = 100 -> BS = 20. The throughput at the SLA limit is 20 / 0.1s = 200 images/sec.
    The efficiency frontier trade-off demonstrates that we can gain 122% more throughput (200 vs 90 images/sec)
    in exchange for a 1.5% degradation in mAP.'
  common_mistake: Candidates incorrectly assume the model with lower per-item compute (INT8) is universally
    better, failing to calculate the intersection point where the higher fixed overhead (20ms vs 10ms)
    makes INT8 slower for small batch sizes, or they fail to correctly calculate throughput under the
    SLA constraint.
  napkin_math: 'FP32 max BS: 100 = 10 + 10 * B => 10 * B = 90 => B = 9. FP32 Throughput = 9 imgs / 0.100s
    = 90 imgs/s.

    INT8 max BS: 100 = 20 + 4 * B => 4 * B = 80 => B = 20. INT8 Throughput = 20 imgs / 0.100s = 200 imgs/s.

    Efficiency Frontier delta: +110 imgs/s (+122% throughput) for -1.5% mAP.'
