id: cloud-1826
title: SecAgg Mask Generation Compute Overhead
topic: roofline-analysis
status: published
provenance: imported
scenario: You are designing the cloud aggregator for a cross-device federated learning system using the
  Bonawitz et al. Secure Aggregation (SecAgg) protocol. Each round includes 500 clients, and the model
  has 20 million parameters (FP32). To ensure the server only sees the sum of the updates, each client
  generates a pairwise random mask with every other client using a Pseudo-Random Generator (PRG). If a
  client's mobile SoC has a hardware-accelerated PRG throughput of 2.0 GB/s, calculate the added latency
  per client purely for generating the PRG masks.
details:
  realistic_solution: Calculate the total mask volume generated per client and divide by PRG throughput.
    The 20-second latency highlights the need for sparse communication graphs (like SecAgg+) where clients
    only pair with a logarithmic number of peers.
  common_mistake: Focusing purely on the O(N^2) communication cost of secret sharing and neglecting the
    O(N * d) compute cost of generating pairwise masks for the d-dimensional parameter vector.
  napkin_math: Model Size = 20M params * 4 bytes/param = 80 MB. Peers per client = 500 - 1 = 499. Total
    Mask Data = 499 * 80 MB = 39.92 GB. PRG Compute Latency = 39.92 GB / 2.0 GB/s = ~20 seconds added
    per client per round.
