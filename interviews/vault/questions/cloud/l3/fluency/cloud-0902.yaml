id: cloud-0902
title: Bare-Metal MCU Memory Allocation Calculation
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying an INT8 predictive maintenance CNN to a bare-metal Cortex-M4 microcontroller
  monitoring data center cooling fans. The MCU has 256KB of SRAM and 1MB of Flash. The bare-metal firmware
  and I/O drivers consume 80KB of SRAM. The model's weights are 150KB, and its maximum per-layer intermediate
  activation size is 90KB. Assuming 20KB of SRAM is strictly reserved for the call stack and interrupts,
  calculate the peak SRAM utilization during inference and determine if the model fits.
details:
  realistic_solution: 'In bare-metal environments, model weights are stored in read-only Flash and accessed
    directly via Execute-in-Place (XIP) memory mapping. SRAM is only provisioned for mutable state: firmware
    variables, the tensor arena (intermediate activations), and the stack.'
  common_mistake: Assuming model weights must be fully loaded into SRAM alongside activations, leading
    to an incorrect peak SRAM calculation of 340KB and falsely concluding the model will cause an out-of-memory
    (OOM) error.
  napkin_math: A Cortex-M4 provides 256KB of SRAM. Bare-metal firmware requires 80KB, leaving 176KB. An
    INT8 CNN requires memory for peak intermediate activations (the 'Tensor Arena')—say 90KB. The call
    stack and interrupts need 20KB. Total SRAM used = 80 + 90 + 20 = 190KB. This leaves 66KB free. The
    static INT8 weights (150KB) don't use SRAM; they live in the 1MB Flash storage. It fits!
