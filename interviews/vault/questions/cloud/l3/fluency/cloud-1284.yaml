id: cloud-1284
title: Calculating HBM Traffic in Flash Attention
topic: flash-attention
status: published
provenance: imported
scenario: You are optimizing a Transformer model for an Nvidia A100 GPU (2.0 TB/s HBM bandwidth, 192KB
  SRAM per SM). The model uses a sequence length of N = 8192, a head dimension of d = 128, and FP16 precision.
  Calculate the total HBM memory traffic saved per attention head by using Flash Attention instead of
  standard materialized attention, focusing specifically on the intermediate N x N attention scores (S)
  and probabilities (P).
details:
  realistic_solution: Standard attention materializes the S (QK^T) and P (softmax(S)) matrices to HBM.
    Each N x N matrix in FP16 is ~134MB for N=8192. Standard PyTorch attention performs 4 HBM transfers
    of this matrix (write S, read S for softmax, write P, read P for V multiply), totaling 536MB per head
    per layer. Flash Attention keeps S and P entirely in SRAM using tiled computation, saving exactly
    536MB of HBM traffic per head — a purely IO-driven speedup with identical mathematical results.
  common_mistake: Assuming the speedup of Flash Attention comes from reducing FLOPs (it actually slightly
    increases them due to recomputation) rather than realizing it is an exact IO-aware algorithm that
    eliminates O(N^2) intermediate HBM transfers.
  napkin_math: 'Matrix size: N x N = 8192 x 8192 = 67.1M elements. At FP16 (2 bytes/element), one N x
    N matrix is ~134.2 MB. Standard PyTorch attention writes S to HBM (134 MB), reads S to compute softmax
    (134 MB), writes P to HBM (134 MB), and reads P to multiply with V (134 MB). Total intermediate HBM
    traffic = 4 x 134 MB = 536 MB per head. Flash Attention keeps S and P in SRAM, saving exactly 536
    MB of HBM traffic per head per layer.'
