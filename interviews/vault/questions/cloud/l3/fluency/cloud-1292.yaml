id: cloud-1292
title: Jacobian Computation for Low-Dimensional Inputs
topic: roofline-analysis
status: published
provenance: imported
scenario: A differentiable physics engine running on a cloud GPU maps a 10-dimensional vector of control
  parameters to a 50,000-dimensional simulated state output. At each simulation step, the system must
  compute the full 50,000 x 10 Jacobian matrix to optimize the control parameters. Which automatic differentiation
  mode should be used, and how many passes will it require?
details:
  realistic_solution: Applying forward-mode AD (using dual numbers). Forward mode computes the derivative
    with respect to one input across all outputs simultaneously in a single pass.
  common_mistake: Defaulting to reverse-mode AD (standard backpropagation), which requires executing a
    backward pass for every single output dimension.
  napkin_math: Reverse mode passes = M (outputs) = 50,000 passes. Forward mode passes = N (inputs) = 10
    passes. Using forward mode requires 5,000x fewer AD passes.
