schema_version: 1
id: cloud-1552
title: Mitigating Latency Jitter with Memory Locking
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a 10GB embedding model on a cloud CPU instance with 32GB RAM alongside monitoring
  sidecars. The SLA requires P99 latency <50ms (median is 30ms). Intermittently, P99 spikes to >250ms.
  Monitoring shows memory pressure causing the OS to swap inactive model pages to an NVMe SSD (100µs random
  read latency). Calculate the latency impact if just 10MB of scattered model weights are swapped out
  during an inference request, and propose an application-level fix.
details:
  realistic_solution: Invoke `mlock()` or `mlockall(MCL_CURRENT | MCL_FUTURE)` within the serving application
    to pin the 10GB of weights directly in physical RAM, requiring CAP_IPC_LOCK privileges.
  common_mistake: Assuming that merely over-provisioning instance RAM prevents swapping, or relying on
    system-wide 'swapoff' which DevOps teams often restrict for stability reasons.
  napkin_math: OS swapping to local NVMe causes page faults. An inference needs 10MB of scattered weights.
    Page size = 4KB. 10MB / 4KB = 2,500 page faults. At 100µs latency per NVMe random read, sequential
    synchronous loading blocks for 2,500 * 100µs = 250ms. Total latency = 30ms base + 250ms IO penalty
    = 280ms. This severely violates the 50ms P99 SLA, requiring disabling swap or memory pinning.
