schema_version: 1
id: cloud-1976
title: Streaming Inference Batch Size Limits
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing a streaming pipeline for a live audio transcription model on an NVIDIA T4
  GPU. Audio arrives in 20ms chunks. The service-level agreement (SLA) requires end-to-end latency to
  be under 200ms. Network I/O overhead is 30ms. Model compute time is fixed at 15ms per batch (for any
  batch size up to 16). If you buffer chunks from a *single* audio stream to increase throughput, what
  is the maximum batch size you can accumulate without violating the SLA for the first chunk in the batch?
details:
  realistic_solution: Limit single-stream batch size to 8 (140ms buffering wait time) or multiplex multiple
    independent audio streams so the dynamic batcher can build a full batch of 16 from different concurrent
    users without waiting for future sequential chunks.
  common_mistake: Using the hardware maximum batch size of 16 to optimize throughput, forgetting that
    accumulating 16 sequential chunks takes 320ms, which instantly violates the 200ms SLA before computation
    even begins.
  napkin_math: Total Latency = Network + Buffering Wait + Compute. 200ms = 30ms + (N-1) * 20ms + 15ms.
    155ms = (N-1) * 20ms. N-1 = 7.75. Max N = 8 chunks. The first chunk waits 7 * 20ms = 140ms for the
    batch to fill.
