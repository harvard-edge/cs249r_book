schema_version: 1
id: cloud-0598
title: The Decode Bandwidth Demand
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: During LLM decoding, every output token requires reading the full KV-cache in addition to the
  model weights. For a 13B model serving a single request at 8k context length, calculate the total memory
  bandwidth consumed per token and the resulting tokens-per-second on an A100 (2 TB/s).
details:
  realistic_solution: 'Each decode step reads: (1) all model weights (for the linear projections), and
    (2) the full KV-cache (for attention computation). Both are streamed from HBM. The total bandwidth
    demand per token is the sum of both.'
  common_mistake: '"Only the model weights need to be read — the KV-cache is small." At 8k context, the
    KV-cache is no longer negligible and adds significant bandwidth demand per token.'
  napkin_math: '13B model in FP16: 26 GB weights. KV-cache at 8k context (40 layers, 40 heads, dim 128,
    FP16): $2 \times 40 \times 40 \times 128 \times 8192 \times 2 = 6.7$ GB. Total bytes read per token:
    26 + 6.7 = **32.7 GB**. A100 bandwidth: 2 TB/s. Time per token: 32.7 / 2,000 = **16.4 ms**. Tokens/sec:
    **~61 tokens/sec**. Without KV-cache overhead (weights only): 26 / 2,000 = 13 ms → 77 tokens/sec.
    The KV-cache adds **26% latency** at 8k context. At 32k context: KV-cache = 26.8 GB, total = 52.8
    GB, time = 26.4 ms → 38 tokens/sec. The KV-cache overhead doubles, cutting throughput by 38%.'
