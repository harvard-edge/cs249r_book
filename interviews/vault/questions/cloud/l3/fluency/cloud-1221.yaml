id: cloud-1221
title: Erasure Coding Storage Footprint
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are designing a cold storage tier for a massive 10 PB training dataset using commodity HDDs.
  To achieve high durability without the massive overhead of 3-way replication (which would require 30
  PB of raw storage), you implement Reed-Solomon Erasure Coding with an RS(10, 4) scheme, splitting data
  into 10 data chunks and 4 parity chunks per stripe. Calculate the total raw storage footprint required
  for the 10 PB dataset and determine the maximum number of simultaneous drive failures this configuration
  can tolerate per stripe.
details:
  realistic_solution: The storage overhead for an RS(k, m) scheme is defined as (k + m) / k. For RS(10,
    4), the multiplier is (10 + 4) / 10 = 1.4x. Therefore, the 10 PB dataset requires exactly 14 PB of
    raw storage. By definition of Reed-Solomon coding, the system can tolerate up to m simultaneous chunk
    (drive) failures per stripe, which means it can survive 4 simultaneous drive failures.
  common_mistake: Candidates often confuse erasure coding overhead with simple replication, or incorrectly
    assume the system can tolerate (k+m)/2 failures instead of exactly m failures.
  napkin_math: 'Storage Overhead = (k + m) / k = 14 / 10 = 1.4

    Raw Storage = 10 PB * 1.4 = 14 PB

    Tolerable Failures = m = 4 failures'
