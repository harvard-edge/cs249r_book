id: cloud-1237
title: Model Weight Exfiltration Timing
topic: collective-communication
status: published
provenance: imported
scenario: A proprietary 7B parameter LLM deployed in FP16 precision on a cloud VM is targeted by an attacker
  who gained read access to the mounted volume. To evade the cloud provider's egress anomaly detection,
  which flags sustained outbound traffic above 10 GB per 10-minute window, the attacker throttles their
  exfiltration script to 100 Mbps. Calculate the total payload size and the minimum time required for
  a complete exact model theft, and determine if this strategy successfully evades the 10 GB/10-min alarm.
details:
  realistic_solution: The transfer takes ~18.6 minutes, moving 7.5 GB per 10-minute window, thereby evading
    the alarm. Effective mitigation requires confidential computing (encrypted memory/storage) and stricter
    identity-based egress controls.
  common_mistake: Failing to correctly calculate the model size (7B * 2 bytes = 14 GB) or confusing Mbps
    with MBps (100 Mbps = 12.5 MB/s), incorrectly concluding the transfer volume exceeds the alarm threshold.
  napkin_math: 'Model Size: 7e9 params * 2 bytes/param = 14 GB. Speed: 100 Mbps / 8 = 12.5 MB/s. Total
    time: 14,000 MB / 12.5 MB/s = 1,120 seconds = 18.67 minutes. Data per 10-min window: 12.5 MB/s * 600
    s = 7,500 MB = 7.5 GB. Since 7.5 GB < 10 GB threshold, the alarm is evaded.'
