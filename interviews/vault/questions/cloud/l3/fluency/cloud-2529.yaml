id: cloud-2529
title: Cloud Transient Loads L3 0
topic: power-budgeting
status: published
provenance: imported
scenario: A training cluster has 4,096 H100 GPUs (700W TDP each). During synchronized AllReduce, GPUs
  drop to 40% utilization for 200 ms, then spike back to 95%. Calculate the transient power swing and
  the energy buffer needed to smooth it.
details:
  realistic_solution: 'Full power at 95% utilization: 4096 × 700W × 0.95 = 2,723,840W ≈ 2.72 MW. During
    AllReduce at 40%: 4096 × 700W × 0.40 = 1,146,880W ≈ 1.15 MW. Power swing: 2.72 - 1.15 = 1.57 MW in
    <1 ms transition. To smooth this with a capacitor bank: Energy = Power × Time = 1.57 MW × 0.2s = 314
    kJ. Using supercapacitors at ~5 Wh/kg, need 314 kJ / 3600 × 1000 ≈ 87 Wh ≈ 17.4 kg of supercapacitors.
    Alternatively, stagger AllReduce across groups to spread the transient.'
  common_mistake: Provisioning power infrastructure for average utilization instead of peak. The transient
    spike, not the average, determines the required capacity of power distribution units and UPS systems.
  napkin_math: 'Peak: 4096 × 700W × 0.95 = 2.72 MW. Trough: 4096 × 700W × 0.40 = 1.15 MW. Swing: 1.57
    MW. Buffer: 1.57 MW × 0.2s = 314 kJ. At 48V: C = 2E/V² = 2×314000/48² = 272 Farads.'
