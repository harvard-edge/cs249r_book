schema_version: 1
id: cloud-2520
title: Cloud Train Serve Split L3 0
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You train a 3B model in the cloud on 8 A100s, then deploy on a Jetson Orin (32 GB, 275 TOPS
  INT8). Estimate the memory footprint and throughput at inference for both FP16 and INT8 deployments.
details:
  realistic_solution: 'FP16 deployment: 3B × 2 bytes = 6 GB model weights + KV cache. Fits on Orin''s
    32 GB. Throughput limited by memory bandwidth (Orin: 204.8 GB/s). Decode: 6 GB / 204.8 GB/s = 29.3
    ms/token ≈ 34 tok/s. INT8 deployment: 3B × 1 byte = 3 GB weights. Decode: 3 GB / 204.8 GB/s = 14.6
    ms/token ≈ 68 tok/s. INT8 halves memory and doubles decode throughput. Both fit comfortably; INT8
    is preferred for edge latency targets.'
  common_mistake: Forgetting that training memory (optimizer states, gradients, activations) is 10-20x
    larger than inference memory. A model that needs 8 A100s to train can often serve on a single edge
    device.
  napkin_math: 'FP16: 3B × 2B = 6 GB. Orin BW: 204.8 GB/s. Decode: 6/204.8 = 29 ms → 34 tok/s. INT8: 3
    GB. Decode: 3/204.8 = 14.6 ms → 68 tok/s. 2x speedup from quantization.'
