title: 'PUE Reality Check: Cooling Overhead in a Hyperscale Cluster'
topic: datacenter-efficiency
status: published
provenance: imported
scenario: 'Your company operates a 10 MW IT-load datacenter training large language models on H100 GPUs.
  The facility reports a PUE (Power Usage Effectiveness) of 1.3. Your CFO asks: how much total power does
  the facility draw, and how many megawatts are consumed purely by cooling, lighting, and power distribution
  overhead? Show your napkin math.'
details:
  realistic_solution: PUE = Total Power / IT Power. So Total Power = 10 MW × 1.3 = 13 MW. Overhead = 13
    MW − 10 MW = 3 MW. That 3 MW goes to cooling (CRAC units, chillers, cooling towers), power distribution
    losses (UPS, PDU conversion), and lighting/security. At ~$0.06/kWh, the 3 MW overhead costs $0.06
    × 3000 kW × 8760 h = ~$1.58M/year. Google's best facilities achieve PUE 1.10, which would reduce overhead
    to 1 MW and save over $1M/year. This is why liquid cooling (which can push PUE below 1.1) is a strategic
    investment for GPU-dense clusters.
  common_mistake: Confusing PUE as a multiplier on overhead only. PUE = Total Facility Power / IT Equipment
    Power, so PUE 1.3 means 30% overhead, not 130%.
  napkin_math: PUE 1.3 × 10 MW IT = 13 MW total. Overhead = 3 MW = 30% of IT load. Annual overhead cost
    at $0.06/kWh = 3000 kW × 8760 h × $0.06 = ~$1.58M/year.
