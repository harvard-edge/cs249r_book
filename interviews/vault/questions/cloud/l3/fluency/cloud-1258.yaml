id: cloud-1258
title: Calculating Historical Fair-Share Priority
topic: roofline-analysis
status: published
provenance: imported
scenario: 'A shared AI cluster with 256 A100 GPUs uses a historical fair-share scheduler. The dynamic
  priority score for a job is calculated using the simplified decay formula: `P = 1000 * 2^(-Usage / Target)`.
  Team Vision has a target allocation of 10,000 GPU-hours and has historically consumed 20,000 GPU-hours.
  Team NLP has a target of 5,000 GPU-hours and has consumed 2,500 GPU-hours. Both teams submit identical
  jobs requiring 32 GPUs. Calculate the dynamic priority scores for both teams and determine which team
  will be granted the next available resources.'
details:
  realistic_solution: Calculate the priority by normalizing the consumed usage against the target allocation.
    Team NLP's usage-to-target ratio is 0.5, yielding a priority of ~707. Team Vision's ratio is 2.0,
    yielding a priority of 250. Team NLP has the higher priority and is scheduled first.
  common_mistake: Focusing solely on absolute historical usage (Vision used 20k vs NLP's 2.5k) instead
    of normalizing usage against each team's assigned target allocation.
  napkin_math: 'Vision Ratio = 20,000 / 10,000 = 2.0

    Vision Priority = 1000 * 2^(-2.0) = 250

    NLP Ratio = 2,500 / 5,000 = 0.5

    NLP Priority = 1000 * 2^(-0.5) ≈ 707

    707 > 250 -> NLP gets the GPUs.'
