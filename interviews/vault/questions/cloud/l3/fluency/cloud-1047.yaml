id: cloud-1047
title: Calculating Credit Assignment Compute Requirements
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team is training a 1.5-billion parameter Transformer on an 8x NVIDIA A100 node. A researcher
  proposes solving the credit assignment problem by avoiding backpropagation and instead using parallel
  finite differences (perturbing each weight slightly and measuring the loss change) to 'perfectly isolate'
  each weight's contribution. If a single forward pass takes 15ms on this node, calculate the time required
  for a single optimization step using this proposed method versus standard reverse-mode automatic differentiation.
details:
  realistic_solution: Reject the proposal by calculating the exact time difference. Show that finite differences
    require N+1 forward passes for N parameters, whereas reverse-mode autodiff solves the credit assignment
    problem for all parameters simultaneously in a single backward pass requiring roughly 2x the compute
    of the forward pass.
  common_mistake: Failing to recognize that finite difference calculation scales linearly with the number
    of parameters, falsely assuming distributing the workload across 8 GPUs makes the approach practical.
  napkin_math: Finite Difference Time = (1.5e9 parameters * 15ms) / 8 GPUs = 2,812,500 seconds (~32.5
    days) per single step. Reverse-mode Autodiff Time = ~2 * Forward Pass = 30ms per step. Backprop is
    roughly 100 million times faster.
