schema_version: 1
id: cloud-1296
title: Distributed LLM Training Deadlock and Gang Scheduling
topic: scheduling-resource-management
status: published
provenance: imported
scenario: A distributed training job for a 70B parameter LLM requires 64 A100 GPUs across 8 nodes (8 GPUs
  per node). The cluster scheduler currently uses greedy provisioning, allocating nodes as they become
  available. Nodes 1-7 acquire their GPUs and initialize the NCCL communicator, but Node 8 is pending
  due to lack of resources. The NCCL initialization timeout is set to 30 minutes, and Node 8 takes 45
  minutes to become available. Calculate the wasted GPU compute hours before the job fails, and identify
  the scheduling paradigm needed to fix this.
details:
  realistic_solution: Implement Gang Scheduling (atomic all-or-nothing allocation) using a custom batch
    scheduler like Volcano or YuniKorn. This ensures 0 GPUs are allocated to the job until all 64 are
    available simultaneously.
  common_mistake: Calculating only the total wall-clock time delayed without quantifying the wasted GPU-hours
    from the partially allocated resources holding the cluster hostage.
  napkin_math: Partial allocation = 7 nodes * 8 GPUs/node = 56 GPUs. Time held until NCCL timeout = 30
    mins = 0.5 hours. Wasted compute = 56 GPUs * 0.5 hours = 28 GPU-hours. At a typical $2/hr/A100 cloud
    rate, that's $56 wasted compute per failed launch attempt.
