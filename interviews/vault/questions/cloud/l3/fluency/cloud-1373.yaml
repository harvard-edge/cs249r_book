id: cloud-1373
title: Edge-Cloud Hierarchical Bandwidth Filtering
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You manage a fleet of 5,000 autonomous delivery robots. Each robot is equipped with 4 high-definition
  cameras, each generating 5 MB/s of compressed video data. Streaming all raw data to the cloud for hazard
  analysis is prohibitively expensive and introduces high latency. You design a hierarchical processing
  architecture: a local edge accelerator (Jetson Orin Nano) runs a lightweight MobileNet-based filter
  model. This edge model only forwards 10-second video clips to the heavy cloud model (running on A100s)
  when a rare safety-critical event is detected. Assuming each robot averages 12 safety events per hour,
  calculate the total daily data uploaded to the cloud per robot and compare it to the continuous streaming
  baseline.'
details:
  realistic_solution: The baseline continuous streaming generates approximately 1.73 TB/day per robot.
    The hierarchical architecture's edge filter reduces the active transmission time to a 1/30 duty cycle,
    dropping the daily upload to just 57.6 GB/day per robot, yielding a 96.6% bandwidth saving.
  common_mistake: Candidates often miscalculate the baseline by forgetting to aggregate the bandwidth
    of all 4 cameras, or they calculate the hourly active time but fail to translate it into a daily duty
    cycle reduction percentage.
  napkin_math: 'Raw Baseline = 4 cameras * 5 MB/s = 20 MB/s.

    Daily Baseline = 20 MB/s * 3600 s/hr * 24 hr/day = 1,728,000 MB/day = 1.728 TB/day.

    Active Upload Time = 12 events/hr * 10 s/event = 120 s/hr.

    Duty Cycle = 120 active seconds / 3600 total seconds = 1/30.

    Hierarchical Upload Volume = 1.728 TB/day * (1/30) = 57.6 GB/day.'
