id: cloud-2666
title: Hedged Request Latency Improvement
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'A service has p50=5ms, p95=20ms, p99=80ms. You implement hedged requests: after 15ms with no
  response, send a duplicate request to a different server. Assuming independent latency distributions,
  calculate the new p99.'
details:
  realistic_solution: 'Without hedging: p99 = 80ms. With hedging at 15ms threshold: a request is slow
    (>15ms) with probability ~8% (between p90 and p95). When hedged, the user gets min(original_latency,
    hedge_latency + 15ms). For a request that would have been slow (say 80ms for p99): the hedge fires
    at 15ms and independently has a p50 of 5ms completion time. So hedge completes at 15 + 5 = 20ms. P(both
    exceed 80ms) = P(original > 80ms) × P(hedge > 65ms). P(original > 80ms) = 0.01. P(hedge > 65ms) ≈
    0.02 (well past p95=20ms for the hedge). New p99: P(slow) = 0.01 × 0.02 = 0.0002 = p99.98 equivalent.
    Effective new p99 ≈ 20-25ms (the hedge''s p95 + 15ms offset). Hedging cut p99 from 80ms to ~25ms at
    the cost of ~8% extra backend load.'
  common_mistake: Setting the hedge threshold too low (e.g., at p50). This doubles backend load while
    providing minimal latency improvement. Hedge at p90-p95 for best cost/benefit ratio.
  napkin_math: Hedging at 15ms fires ~8% of the time (1.08x backend load). New p99 ≈ max(15ms + p50, typical)
    = ~20ms. 4x improvement from 80ms to 20ms.
