id: cloud-0597
title: The Adam Memory Multiplier
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You want to fine-tune a 7B model using Adam optimizer with mixed-precision training (BF16 forward/backward,
  FP32 optimizer). Your GPU has 80 GB of VRAM. How much memory does the optimizer alone consume, and what
  fraction of VRAM does it take?
details:
  realistic_solution: 'Mixed-precision Adam maintains: (1) FP32 master copy of weights (for numerical
    stability), (2) FP32 first moment (running mean of gradients), (3) FP32 second moment (running mean
    of squared gradients). That''s 3 copies of the model in FP32, plus the BF16 working copy and BF16
    gradients.'
  common_mistake: '"The optimizer just stores gradients — same size as the model." Adam stores far more
    than gradients.'
  napkin_math: 'BF16 weights: 7B × 2 = 14 GB. BF16 gradients: 7B × 2 = 14 GB. FP32 master weights: 7B
    × 4 = 28 GB. FP32 first moment: 7B × 4 = 28 GB. FP32 second moment: 7B × 4 = 28 GB. **Optimizer states
    alone: 84 GB.** Total: 14 + 14 + 84 = **112 GB** — 1.4× the VRAM of an 80 GB GPU. The optimizer is
    75% of total memory. Solutions: AdaFactor (no second moment → saves 28 GB), 8-bit Adam (moments in
    INT8 → saves 42 GB), or ZeRO Stage 2 (shard optimizer across GPUs).'
