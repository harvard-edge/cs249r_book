id: cloud-1153
title: Centralized vs. Distributed Checkpointing Bottlenecks
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 175B parameter LLM using FSDP across 16 nodes (128 A100 GPUs). The total
  training state (parameters and AdamW optimizer states) is 2.1 TB. You initially configured checkpointing
  to gather all state to Rank 0 before saving. Rank 0 has a single 200 Gbps (25 GB/s) NIC connecting to
  the parallel file system, which has an aggregate write bandwidth of 400 GB/s. Calculate the theoretical
  minimum time required for a centralized checkpoint versus a distributed checkpoint where each worker
  writes directly to storage.
details:
  realistic_solution: Use a distributed checkpointing format (like PyTorch Distributed Checkpoint). Each
    of the 128 ranks writes its ~16.4 GB state shard directly to storage in parallel, fully utilizing
    the 400 GB/s aggregate bandwidth and bypassing the single-node NIC bottleneck.
  common_mistake: Candidates often assume centralized checkpointing is bounded by the shared storage aggregate
    bandwidth, forgetting that gathering to Rank 0 funnels all 2.1 TB through a single 25 GB/s NIC bottleneck.
  napkin_math: 'Centralized Checkpoint: 2.1 TB (2100 GB) / 25 GB/s (Rank 0 NIC limit) = 84 seconds.

    Distributed Checkpoint: 2100 GB / 400 GB/s (Aggregate storage limit) = 5.25 seconds.

    Switching to distributed checkpointing yields a 16x speedup.'
