id: cloud-1506
title: LLM Fleet Capacity via Little's Law
topic: latency-decomposition
status: published
provenance: imported
scenario: You are sizing the inference fleet for an LLM API service. The business requires a sustained
  throughput of 2,000 requests per second with an average end-to-end latency of 1.5 seconds per request.
  Each concurrent request consumes 50MB of KV cache memory on average. Calculate the minimum total KV
  cache memory required across the fleet to sustain this workload.
details:
  realistic_solution: Apply Little's Law (Concurrency = Throughput * Latency) to determine the number
    of active requests in flight. With 2,000 req/s and a 1.5s average latency, the system holds 3,000
    concurrent requests. Multiply by 50MB/request to find the total KV cache requirement of 150GB.
  common_mistake: Calculating memory based solely on throughput (e.g., 2,000 * 50MB = 100GB) without accounting
    for the duration each request spends holding resources in the system.
  napkin_math: 'Concurrency = 2,000 req/s * 1.5 s = 3,000 active requests.

    Total KV Cache = 3,000 * 50 MB = 150,000 MB = 150 GB.'
