schema_version: 1
id: cloud-1050
title: Gradient Synchronization Critical Message Size
topic: collective-communication
status: published
provenance: imported
scenario: Your team is tuning the gradient synchronization bucket size for a distributed training cluster.
  The nodes are connected via a 400 Gbps RoCEv2 network, and the measured MPI point-to-point startup latency
  (alpha) is 2 microseconds. To ensure the all-reduce operation is bandwidth-bound rather than latency-bound,
  you need to calculate the critical message size where the payload transmission time exactly equals the
  startup latency overhead.
details:
  realistic_solution: Using the alpha-beta performance model, the critical message size (Lc) is the product
    of startup latency (alpha) and network bandwidth (BW). First, convert 400 Gbps to 50 GB/s. Then, multiply
    2 microseconds by 50 GB/s. The critical message size is 100 KB. Gradient buckets should be sized significantly
    larger than 100 KB (e.g., in the MB range) to fully amortize the latency cost and achieve near-peak
    bandwidth utilization.
  common_mistake: Confusing bits and bytes when converting 400 Gbps to GB/s, or dividing bandwidth by
    latency instead of multiplying them to find the threshold capacity.
  napkin_math: BW = 400 Gbps / 8 = 50 GB/s = 50 * 10^9 Bytes/sec. alpha = 2 * 10^-6 sec. Lc = alpha *
    BW = (2 * 10^-6) * (50 * 10^9) = 100,000 Bytes = 100 KB.
