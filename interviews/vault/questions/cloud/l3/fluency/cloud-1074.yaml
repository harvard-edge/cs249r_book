schema_version: 1
id: cloud-1074
title: Data Lineage Overhead at Scale
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A global financial institution processes 50,000 transactions per second (TPS) through a fraud
  detection model. Regulatory compliance requires full data lineage tracking for every inference, capturing
  the origin and transformation steps of all 150 features. The raw transaction payload is 2KB, but the
  lineage metadata graph adds an additional 8KB per event. If the system runs 24/7, calculate the daily
  storage overhead for this lineage data and determine the required network bandwidth to ingest it into
  a centralized metadata registry.
details:
  realistic_solution: Batch and compress the lineage events at the edge of the inference service before
    shipping to the metadata store. Highly structured lineage graphs compress exceptionally well (often
    10x using Parquet/Snappy), reducing network ingress to 40 MB/s and daily storage to ~3.5 TB.
  common_mistake: Assuming metadata is negligible compared to raw data and failing to account for the
    network bottleneck (400 MB/s) required to stream uncompressed lineage events to a central registry.
  napkin_math: Raw Lineage Bandwidth = 50,000 TPS * 8 KB = 400 MB/s. Daily Raw Storage = 400 MB/s * 86,400
    sec/day = 34.56 TB/day. Compressed Storage (10x ratio) = 34.56 TB / 10 = 3.45 TB/day.
