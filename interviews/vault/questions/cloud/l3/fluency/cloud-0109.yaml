schema_version: 1
id: cloud-0109
title: The TPOT Trade-off
topic: batching-strategies
status: published
provenance: imported
scenario: You're optimizing an LLM inference service that handles requests with highly variable output
  lengths. You need to decide whether to stick with a simple static batching implementation (batch size
  64) or invest in building a continuous batching system. For a representative workload, the static batch
  must pad all 64 requests to the longest sequence in the batch (512 tokens), while the average sequence
  length is only 100 tokens. Using a 70B parameter model on an H100, calculate the wasted computation
  in the static batching case and determine the approximate throughput improvement (in tokens/sec) of
  moving to continuous batching.
details:
  realistic_solution: 'The core of the problem is calculating the total FLOPs used vs. the useful FLOPs.
    The ratio reveals the efficiency and the potential for improvement.

    1. **Static Batching:** All 64 requests are padded to 512 tokens, meaning the GPU processes 64 * 512
    = 32,768 tokens. However, only 64 * 100 = 6,400 tokens were ''useful''. The computational waste is
    (32,768 - 6,400) / 32,768 ≈ 80.5%.

    2. **Continuous Batching:** This method avoids padding, so the GPU only processes the 6,400 useful
    tokens to achieve the same work.

    3. **Throughput Gain:** Since continuous batching does the same useful work with ~1/5th of the computation,
    it results in an approximately 5x increase in useful throughput (TPOT).'
  common_mistake: Underestimating the cost of padding. Engineers often look at batch size and model FLOPs
    but forget that in static batching, every token—real or padding—consumes compute. The waste can be
    enormous with variable-length sequences.
  napkin_math: '1. **Establish Specs:** Model: 70B params. Inference FLOPs: ~2 FLOPs/param/token. Total
    FLOPs per token: 2 * 70e9 = 140 GFLOPs. GPU: H100 @ 989 TFLOPS.'
