id: cloud-fill2-32011
title: 'GPipe Bubble Overhead: The Pipeline Efficiency Tax'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You partition a 40-layer transformer across 4 GPUs (10 layers each) using GPipe-style pipeline
  parallelism with 8 micro-batches. Calculate the pipeline bubble fraction — the percentage of total GPU-time
  wasted waiting in the pipeline startup and teardown phases.
details:
  realistic_solution: 'In GPipe, the pipeline bubble fraction = (P - 1) / (P - 1 + M) where P is the number
    of pipeline stages and M is the number of micro-batches. With P=4 and M=8: bubble = (4-1) / (4-1+8)
    = 3/11 = 27.3%. This means 27.3% of aggregate GPU-time is wasted in pipeline bubbles. Each GPU sits
    idle for 3 micro-batch durations during the forward pass fill and drain, and similarly during the
    backward pass. To reduce this, increase M (more micro-batches, but increases memory for activations)
    or decrease P (fewer stages, but larger per-stage memory). The 1F1B schedule improves memory by interleaving
    forward and backward micro-batches, but doesn''t reduce the bubble fraction itself.'
  common_mistake: Forgetting that the bubble exists in both the forward and backward passes. The total
    bubble is (P-1) micro-batch slots in a pipeline of P stages with M micro-batches.
  napkin_math: 'P=4, M=8. Bubble fraction = (P-1)/(M+P-1) = 3/11 = 27.3%. To get bubble < 10%: need M
    > 9(P-1) = 27 micro-batches. With M=32: bubble = 3/35 = 8.6%.'
