id: cloud-1555
title: Calculating Baseline Training Memory Pressure
topic: memory-pressure-management
status: published
provenance: imported
scenario: Your team is planning to pre-train a 7-billion parameter LLM. You are using standard mixed-precision
  training (BF16 for forward/backward passes) and the AdamW optimizer. Before factoring in sequence length,
  batch size, or activation memory, you need to calculate the absolute minimum baseline memory footprint
  required per accelerator just to store the weights, gradients, and optimizer states.
details:
  realistic_solution: The baseline memory requirement is exactly 16 bytes per parameter, totaling 112
    GB. Because this exceeds the capacity of a standard 80GB A100 GPU, you must implement state sharding
    (e.g., DeepSpeed ZeRO-1/2 or PyTorch FSDP) to distribute the optimizer states across multiple GPUs.
  common_mistake: Calculating everything in BF16 and forgetting that Adam requires FP32 for master weights,
    momentum, and variance, which adds a massive 12 bytes per parameter overhead.
  napkin_math: 'Memory per parameter for mixed-precision AdamW training: BF16 Weights = 2 bytes. BF16
    Gradients = 2 bytes. AdamW Optimizer States: FP32 Master Weights (4B) + FP32 Momentum (4B) + FP32
    Variance (4B) = 12 bytes. Total strictly for model state = 2 + 2 + 12 = 16 bytes/parameter. For a
    7B parameter LLM: 7 * 10^9 * 16 bytes = 112 GB of VRAM required before adding any activation memory.'
