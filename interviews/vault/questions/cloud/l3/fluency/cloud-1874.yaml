id: cloud-1874
title: Sizing Cloud Shard Shuffle Buffers
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are training a multimodal model on a 10 TB dataset stored in an S3 bucket. The data is
  pre-processed into 500 MB shards. Each training node has a 10 Gbps network link and 64 GB of CPU RAM
  available for the data loading pipeline. Individual samples average 1 MB in size. Global shuffling by
  requesting random individual samples drops throughput to <50 MB/s due to S3''s 80ms time-to-first-byte
  latency. You implement shard-level shuffling: reading a pool of K shards concurrently and maintaining
  a local sample buffer of size B. Calculate a highly optimized configuration for K and B to maximize
  randomness while strictly staying within the 64 GB memory budget and ensuring the 10 Gbps network is
  saturated.'
details:
  realistic_solution: Configure K=20 concurrent shard streams to hide latency and a local sample buffer
    B of 40,000 samples (40 GB), leaving a safe margin for OS overhead and data loading workers while
    fully saturating the network.
  common_mistake: Candidates often attempt pure global shuffling, resulting in latency-bound IOPS, or
    they allocate the entire 64 GB to the sample buffer B, forgetting that concurrent shard streams also
    consume substantial memory.
  napkin_math: '10 Gbps network = 1.25 GB/s. A single S3 sequential stream yields ~100 MB/s. To saturate
    1.25 GB/s, we need K=13 streams minimum; using K=20 provides reliable saturation. 20 streams * 500
    MB/shard = 10 GB memory for active shard downloads. Available RAM for buffering: 64 GB - 10 GB = 54
    GB. Allocating 40 GB for the shuffle buffer B (40,000 samples at 1 MB each) leaves a safe 14 GB margin
    for OS and PyTorch multiprocessing overhead.'
