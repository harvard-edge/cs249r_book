schema_version: 1
id: cloud-0446
title: The Silent GPU Killer
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are an ML Systems Engineer training a large language model on a 1,024-GPU H100 cluster.
  The training job, which is scheduled to run for 72 hours, keeps failing after about 4-5 hours. The cluster
  scheduler (e.g., Slurm) terminates the job with a 'watchdog timer expired' error. Your application logs
  show normal training steps right up until the termination, with no exceptions. However, digging into
  the kernel logs (`dmesg`) on one of the failed nodes reveals a GPU-related 'Xid' error message that
  occurred just before the job was killed. What is the most likely cause of this failure, and what should
  be your immediate action?
details:
  realistic_solution: 'The `dmesg` log showing a GPU ''Xid'' error is the smoking gun for a transient,
    non-recoverable GPU hardware or driver fault. At this scale, hardware failures are not exceptions;
    they are routine operational occurrences. The watchdog timer expired because the faulty GPU became
    unresponsive, which in turn froze the user-space training process and prevented it from signaling
    its liveness. The correct immediate action is to ensure the cluster''s fault-tolerance system is working
    as designed: automatically detect the failed node, quarantine it for diagnostics, and reschedule the
    training job to restart from its most recent checkpoint on a healthy replacement node.'
  common_mistake: Engineers from smaller-scale environments often assume software bugs (like an infinite
    loop) are the primary cause of hangs, underestimating the statistical certainty of hardware faults
    in large fleets. They incorrectly begin debugging the Python application code instead of treating
    the failure as an infrastructure-level, routine event and hardening the system's fault tolerance.
  napkin_math: 'We can use the ''Fleet Math'' numbers to prove that this is an expected event. The Mean
    Time To Failure (MTTF) for a single high-end GPU is roughly 50,000 hours. For a fleet of 1,024 GPUs,
    the *entire fleet''s* MTTF is drastically lower. **Cluster MTTF = Single GPU MTTF / Number of GPUs
    = 50,000 / 1,024 ≈ 48.8 hours ≈ ~2 days.** The scenario states failures occur every 4-5 hours, which
    is more frequent than the calculated 49-hour MTTF. This suggests either: (a) some GPUs have degraded
    MTTF due to thermal stress or manufacturing variance, (b) the failure is a recurring issue on the
    same node (not independent random failures), or (c) a systematic issue like a bad NVLink or PCIe connection
    on one node. **Immediate action:** Check if the Xid errors always originate from the same node. If
    so, quarantine that node and replace it. If failures are distributed across nodes, the 49-hour MTTF
    is the baseline — implement checkpointing every ~30 minutes to limit rework to <15 minutes per failure.'
