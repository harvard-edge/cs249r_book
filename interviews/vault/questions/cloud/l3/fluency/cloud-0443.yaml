schema_version: 1
id: cloud-0443
title: 'The Chatbot Latency Crisis: Speculative Decoding'
topic: speculative-decoding
status: draft
provenance: imported
scenario: You are leading an interactive chatbot service built on a 7B LLM running on H100 GPUs. The service
  is memory-bandwidth bound; each token generation is limited by the time it takes to read the 14GB of
  model weights from HBM. Autoregressive generation is too slow, and users are complaining about latency.
  You cannot change the model or hardware. How can you apply speculative decoding to decrease the perceived
  latency and increase the tokens/second for your users?
details:
  realistic_solution: Speculative decoding can significantly improve throughput in memory-bandwidth-bound
    scenarios. It works by using a much smaller, faster 'draft' model to generate a chunk of K candidate
    tokens. Then, the large, accurate 7B model validates all K tokens in a single, parallel forward pass.
    Since the time for this pass is dominated by reading the 14GB of weights (one time), and this cost
    is similar to generating just one token autoregressively, you effectively get multiple tokens for
    the price of one. If the draft model is coherent and an average of γ tokens are accepted per step,
    you can achieve a speedup of up to γ.
  common_mistake: Suggesting larger batch sizes. While batching increases aggregate throughput (total
    tokens/sec across all users), it *increases* the latency for any single user's request, which is the
    opposite of what's needed for an interactive application. Another mistake is suggesting techniques
    that don't address the memory-bandwidth bottleneck, like simple model pruning.
  napkin_math: 7B model in FP16 = 14GB. H100 HBM3 bandwidth = 3.35 TB/s. Autoregressive decode takes 14GB
    / 3.35TB/s = 4.17ms per token (239 tok/s). With speculative decoding (k=5), we generate 5 draft tokens
    and verify them in one 14GB memory load (4.17ms) + overhead, yielding ~1.0ms per token.
