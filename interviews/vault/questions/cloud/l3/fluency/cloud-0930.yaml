schema_version: 1
id: cloud-0930
title: Revenue Impact of Implicit Data Dependency Erosion
topic: mlops-lifecycle
status: published
provenance: imported
scenario: A cloud-based CTR prediction model for an ad network runs on 16 L4 GPUs, serving 20,000 requests
  per second. It implicitly relies on a `user_click_history` feature produced by a separate telemetry
  team. To save S3 storage costs, the telemetry team truncates the history from 90 days to 7 days without
  notifying the ML team, an example of boundary erosion. If this truncation reduces the model's effective
  click yield by 1.5%, and the network averages 1,000 clicks per second with an average revenue of $0.50
  per click, calculate the total revenue lost over a 72-hour weekend before the ML team's weekly performance
  dashboard alerts them.
details:
  realistic_solution: Implement explicit data contracts and strict schema validation (e.g., using Great
    Expectations) at the feature store boundary. The calculated $1.94M loss easily justifies the engineering
    effort to enforce these interfaces.
  common_mistake: Candidates often propose complex model retraining strategies or infrastructure alerts,
    missing that the root cause is a lack of explicit data contracts, and failing to quantify the severe
    business cost of silent data erosion.
  napkin_math: 'Missed clicks = 1,000 clicks/sec * 0.015 = 15 clicks/sec.

    Revenue loss rate = 15 clicks/sec * $0.50/click = $7.50/sec.

    Total loss = $7.50/sec * 3,600 sec/hr * 72 hrs = $1,944,000.'
