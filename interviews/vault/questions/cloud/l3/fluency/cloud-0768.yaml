id: cloud-0768
title: The DDP Bucket Straggler
topic: 3d-parallelism
status: published
provenance: imported
scenario: You are using PyTorch DistributedDataParallel (DDP) across 4 GPUs. GPU 3 is slightly slower
  than the others due to thermal throttling. You notice that GPU 0, 1, and 2 are sitting idle for 200ms
  at the end of every backward pass. You know DDP overlaps communication with computation. Why isn't the
  overlap hiding the delay of GPU 3?
details:
  realistic_solution: 'DDP overlaps AllReduce with backward computation by splitting gradients into buckets.
    As each bucket fills during backprop, its AllReduce begins immediately. This works well when all GPUs
    progress at the same rate. But GPU 3 is 200ms slower due to thermal throttling, so it reaches the
    final gradient bucket 200ms late. All other GPUs have finished their backward pass and final AllReduce,
    but the collective requires all participants. GPUs 0-2 sit idle waiting for GPU 3''s final bucket.
    The overlap only hides communication latency, not compute imbalance. The fix: identify and fix the
    thermal issue, or use asynchronous gradient methods.'
  common_mistake: '"DDP waits until the entire backward pass is finished before communicating." This is
    exactly what DDP *doesn''t* do. DDP uses gradient bucketing.'
  napkin_math: PyTorch DDP overlaps gradient all-reduce with the backward pass. But if 3 A100s finish
    the pass in 800ms and 1 throttled A100 takes 1000ms, the fast GPUs stall at the global synchronization
    barrier. Waste per step = 3 GPUs * 200ms = 600ms. If training runs for 2 million steps, you waste
    1.2M GPU-seconds (333 GPU-hours). At $3/hr, the slow chip costs you an extra $1,000!
