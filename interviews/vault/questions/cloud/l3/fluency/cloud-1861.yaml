id: cloud-1861
title: Calculating the Training vs. Inference Cost Crossover
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are the platform lead for a new 70B parameter LLM API. The model was trained from scratch
  over 30 days on a 1024-GPU H100 cluster at $3/GPU-hour. To meet the expected global traffic of 50,000
  requests per minute, the serving infrastructure requires an active fleet of 500 8-GPU H100 nodes. Calculate
  the 'crossover point' in days where the ongoing inference costs exceed the total initial training capital
  expenditure, assuming the same hourly cost per GPU.
details:
  realistic_solution: Calculate total training cost ($2.21M) and hourly inference cost ($12k/hour), dividing
    to find that inference costs exceed training costs in just over a week (7.6 days), prioritizing serving
    optimizations.
  common_mistake: Focusing solely on optimizing the training phase, mistakenly assuming it is the primary
    cost driver over the product's lifecycle.
  napkin_math: Training Cost = 1024 GPUs * $3/hr * 24h * 30 days = $2,211,840. Serving Cost/Hour = 500
    nodes * 8 GPUs * $3/hr = $12,000/hr. Crossover = $2,211,840 / $12,000/hr = 184.32 hours = 7.68 days.
