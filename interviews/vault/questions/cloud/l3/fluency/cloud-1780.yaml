id: cloud-1780
title: Calculating GPU Cluster Resource Fragmentation
topic: pruning-sparsity
status: published
provenance: imported
scenario: You manage a dedicated compute cluster of 20 nodes, each equipped with 8x A100 (80GB) GPUs.
  The cluster scheduler first places 15 separate distributed training jobs. Each training job requires
  exactly 6 GPUs and is placed on a distinct node due to CPU-affinity rules. Shortly after, a queue of
  12 evaluation jobs arrives. Each evaluation job requires exactly 4 GPUs residing on a single node to
  leverage NVLink. Calculate how many evaluation jobs can be scheduled immediately and determine the total
  number of perfectly stranded (unusable) GPUs left in the cluster.
details:
  realistic_solution: Only 10 evaluation jobs can be scheduled. They will be placed on the 5 completely
    free nodes (2 jobs per node). The 15 partially utilized nodes cannot host any evaluation jobs, leaving
    30 GPUs permanently stranded until the training jobs complete.
  common_mistake: Candidates often sum the total available GPUs across the entire cluster (160 total -
    90 used = 70 available) and divide by the job requirement (70 / 4 = 17 jobs), ignoring strict node
    boundaries and intra-node communication constraints.
  napkin_math: 'Initial capacity: 20 nodes * 8 GPUs = 160 GPUs. After 15 training jobs: 15 nodes have
    2 GPUs available, 5 nodes have 8 GPUs available. Evaluation jobs fit: 5 free nodes * (8 // 4) = 10
    jobs. Fragmented capacity: 15 nodes * (2 // 4) = 0 jobs. Stranded GPUs = 15 nodes * 2 GPUs = 30 GPUs.'
