schema_version: 1
id: cloud-fill-01588
title: 'H100 Data Ingestion: Optimizing Storage for Large-Scale ML'
topic: storage-format-selection
status: published
provenance: imported
scenario: You're responsible for optimizing the data pipeline for a massive deep learning model training
  on an NVIDIA H100 GPU cluster. Each H100 GPU features 80 GB HBM3 memory and 3.35 TB/s memory bandwidth.
  Your dataset, comprising billions of high-resolution image feature vectors, totals 10 PB and is currently
  stored in a generic row-oriented format on a shared network file system. You've observed significant
  GPU idle time, indicating an I/O bottleneck. Describe your strategy for redesigning the data storage
  and ingestion pipeline to maximize H100 utilization. This should include considerations for columnar
  vs. row formats, compression tradeoffs, and storage tier selection.
details:
  realistic_solution: The ideal solution involves several coordinated steps. First, re-encode the data
    into a columnar format like Apache Parquet or a specialized ML format like TFRecord (using `SequenceExample`
    for complex structures), which allows for efficient column pruning and predicate pushdown, reducing
    the amount of data read. Implement high-performance compression (e.g., ZSTD, LZ4) that balances compression
    ratio with decompression speed, potentially leveraging GPU-accelerated decompression if available
    (e.g., via NVIDIA RAPIDS). For storage, critical hot data should be moved to high-throughput, low-latency
    NVMe SSDs, ideally local to the H100 servers. Employ GPUDirect Storage to enable direct data transfer
    from NVMe to HBM3, bypassing CPU and host memory, thus fully utilizing the 3.35 TB/s HBM3 bandwidth.
    Less frequently accessed data can reside on a cheaper, high-capacity object storage tier (e.g., S3-compatible
    storage), with intelligent caching layers for frequently accessed subsets. Finally, implement smart
    pre-fetching and batching strategies to keep the H100's compute units continuously fed.
  common_mistake: A common mistake is to only focus on the raw GPU compute power (989 TFLOPS FP16 dense)
    and neglect the I/O subsystem. Candidates might propose solutions that improve CPU-side processing
    but fail to address the fundamental bottleneck of data delivery to the HBM3, or they might choose
    compression algorithms that are too CPU-intensive, shifting the bottleneck rather than eliminating
    it. Another pitfall is not considering the random access patterns often required for mini-batch sampling,
    which can severely impact performance on formats not optimized for it.
  napkin_math: If an H100 can process a training batch in 100ms, and your current pipeline delivers data
    at 5 GB/s, but the H100 needs 20 GB of data per batch (uncompressed) every 100ms, it implies a required
    throughput of 200 GB/s. A 5x compression ratio would reduce this to 40 GB/s. To achieve 40 GB/s, you'd
    need roughly 8 NVMe drives, each capable of 5 GB/s read. Considering a 10 PB dataset with a 5x compression,
    you are dealing with 2 PB of 'effective' data. If you aim to iterate through this dataset once per
    week, that's approximately 2 PB / 7 days ≈ 285 TB/day, which is roughly 3.3 GB/s average sustained
    read. However, peak demands for random access during training can be much higher, necessitating a
    system capable of bursting to tens or hundreds of GB/s to feed the 700W H100s efficiently and prevent
    GPU underutilization.
