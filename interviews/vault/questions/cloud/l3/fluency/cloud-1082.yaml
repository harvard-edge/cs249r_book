schema_version: 1
id: cloud-1082
title: Local vs Cloud Inference Offloading
topic: collective-communication
status: published
provenance: imported
scenario: An on-premise manufacturing facility generates 50 GB of high-resolution video frames per inspection
  batch. You have local servers equipped with NVIDIA T4 GPUs that can process this data at 500 MB/s. Alternatively,
  you can upload the batch to a cloud environment with NVIDIA H100 GPUs capable of processing at 25 GB/s.
  The facility has a dedicated 1 Gbps (125 MB/s) uplink to the cloud. Calculate the total time for both
  local and cloud processing, and determine where the inference should run based on the Data Locality
  Invariant.
details:
  realistic_solution: Process the data locally. Local processing takes 100 seconds, while cloud processing
    takes 402 seconds due to the 400-second network transmission penalty, proving the Data Locality Invariant.
  common_mistake: Assuming that a 50x increase in compute throughput automatically makes cloud processing
    faster, ignoring the massive network transmission bottleneck for large batch sizes.
  napkin_math: 'Local Compute: 50,000 MB / 500 MB/s = 100s. Cloud Compute Time: 50,000 MB / 25,000 MB/s
    = 2s. Network Transmission: 50,000 MB / 125 MB/s = 400s. Total Cloud Time = 400s + 2s = 402s. 100s
    (Local) < 402s (Cloud).'
