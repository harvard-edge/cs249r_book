id: cloud-1375
title: Incremental Allocation Deadlock Math
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A fleet orchestration system manages a shared cluster of 128 A100 GPUs. Four distributed PyTorch
  training jobs are submitted simultaneously, each requiring exactly 40 GPUs to initiate training. The
  cluster lacks strict gang-scheduling and instead provisions GPUs incrementally using a round-robin strategy
  (1 GPU per pending job per cycle). Calculate the exact number of GPUs held by each job when the cluster
  experiences a hold-and-wait deadlock, and determine the minimum number of GPUs that must be preempted
  to break the deadlock.
details:
  realistic_solution: The system deadlocks when all 128 GPUs are allocated evenly across the 4 jobs, leaving
    each job with 32 GPUs. To break the deadlock, you only need to preempt 8 GPUs from one of the jobs
    to fulfill another job's requirement.
  common_mistake: Candidates often assume that an entire job must be preempted (freeing 32 GPUs) to resolve
    the state, missing that you only need to preempt the exact deficit required to unblock a single workload.
  napkin_math: "1. Total available GPUs = 128. \n2. Round-robin allocation = 128 / 4 jobs = 32 GPUs per\
    \ job. \n3. Target required per job = 40 GPUs. \n4. Deadlock state: [32, 32, 32, 32] (Hold-and-wait).\
    \ \n5. Deficit for one job = 40 - 32 = 8 GPUs. \n6. Preempting 8 GPUs from Job 4 gives Job 1 40 GPUs\
    \ [40, 32, 32, 24]. Job 1 completes, freeing 40 GPUs, unblocking the rest."
