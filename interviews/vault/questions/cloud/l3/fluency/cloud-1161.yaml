id: cloud-1161
title: Scaling Past the Interpolation Threshold
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team is training a custom vision model on a cloud instance with 4x A100 (80GB) GPUs for
  a specialized inspection task using a dataset of 500,000 labeled images. The current architecture has
  480,000 parameters and is exhibiting a massive spike in test error, even though the training error is
  nearly zero. You have a production inference compute budget of 2 GFLOPs per image. Calculate the target
  parameter count needed to confidently push the model into the modern overparameterized regime (targeting
  10x the interpolation threshold) and verify if it satisfies your inference budget, assuming 2 FLOPs
  per parameter.
details:
  realistic_solution: Recognize that the model is at the peak of the double descent curve where parameters
    roughly equal the number of samples. Increase the parameter count well beyond the interpolation threshold
    to allow the network's inductive bias to find smoother, better-generalizing functions.
  common_mistake: Assuming the test error spike indicates irrecoverable overfitting and drastically reducing
    the model size back to a classical underparameterized regime, which permanently limits the model's
    ultimate accuracy.
  napkin_math: Interpolation threshold occurs at P ≈ N = 500,000. Target parameter count = 10 × 500,000
    = 5,000,000 (5M) parameters. Compute per forward pass = 2 FLOPs/parameter × 5M parameters = 10 MFLOPs
    (0.01 GFLOPs). 0.01 GFLOPs << 2 GFLOPs budget, so the scaled model easily fits within the production
    constraints.
