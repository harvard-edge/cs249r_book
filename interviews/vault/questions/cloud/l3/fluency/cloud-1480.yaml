id: cloud-1480
title: Real-Time Fraud Label Shift Adaptation
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud-based fraud detection API processes 100,000 transactions per second. During a holiday
  weekend, the true fraud rate P(Y) spikes, while the underlying transaction patterns for both fraudulent
  and legitimate transactions P(X|Y) remain unchanged (Label Shift). You cannot retrain the heavy XGBoost
  ensemble in real-time. On the training/validation set, the model has a True Positive Rate (TPR) of 0.80
  and a False Positive Rate (FPR) of 0.05. In the current production batch, the model flags 27.5% of all
  transactions as fraud. Calculate the estimated true fraud rate in the current batch and explain how
  to adjust the model's outputs.
details:
  realistic_solution: Apply Black Box Shift Estimation (BBSE) to estimate the target label distribution
    by solving a linear system using the validation confusion matrix and the observed prediction frequencies.
    Then, apply importance weights P_target(Y) / P_train(Y) to adjust the output probabilities via Bayes'
    theorem.
  common_mistake: Assuming the 27.5% predicted fraud rate is the true actual fraud rate, ignoring the
    model's confusion matrix, or attempting to trigger an expensive full retraining pipeline instead of
    using mathematical post-hoc corrections.
  napkin_math: 'Let p be the true fraud rate. The observed fraction of positive predictions P(Y_hat=1)
    is the sum of true positives and false positives:

    P(Y_hat=1) = TPR * p + FPR * (1 - p)

    0.275 = 0.80 * p + 0.05 * (1 - p)

    0.275 = 0.80p + 0.05 - 0.05p

    0.225 = 0.75p

    p = 0.225 / 0.75 = 0.30

    The true fraud rate is actually 30%, even though the model only flagged 27.5%.'
