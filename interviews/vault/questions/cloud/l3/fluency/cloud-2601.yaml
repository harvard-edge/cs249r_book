id: cloud-2601
title: Cloud Data Quality As Code L3 0
topic: data-quality-validation
status: published
provenance: imported
scenario: 'Your training pipeline ingests 500 GB of data daily. You want to add data quality checks: schema
  validation, null detection, statistical distribution tests, and referential integrity checks. Estimate
  the time and compute overhead for each check.'
details:
  realistic_solution: 'Schema validation (type + value range per field): single scan at ~2 GB/s (Spark/Dask
    on 8 cores). Time: 500 GB / 2 GB/s = 250s ≈ 4.2 min. Null detection: same scan, essentially free if
    combined with schema check. Statistical distribution (per-column histogram comparison vs. reference):
    requires reading all values, computing histograms, KL-divergence. Time: ~500s for 500 GB with ~20
    columns. Referential integrity (join against reference tables): depends on reference table size. For
    100 MB reference table, broadcast join: ~300s for 500 GB. Total pipeline overhead: ~4.2 + 0 + 8.3
    + 5 = 17.5 minutes. As percentage of 24h pipeline: 17.5 / 1440 = 1.2% overhead.'
  common_mistake: Running each check as a separate scan over the entire dataset. Combine schema, null,
    and statistical checks into a single pass to reduce I/O from 3x to 1x, cutting overhead from ~17 min
    to ~8 min.
  napkin_math: '500 GB data, 8-core machine at 2 GB/s. Schema + null: 4.2 min (single pass). Stats: 8.3
    min (compute histograms). Referential: 5 min (hash join). Total: 17.5 min = 1.2% of daily pipeline.
    Cost: ~$3 in compute vs. $9K+ for a bad training run.'
