id: cloud-0914
title: Quantifying LLM Benchmark Contamination
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team trained a 34B parameter LLM on a 2T token corpus. Evaluation on a standard 500-question
  benchmark yields a reported accuracy of 65%. Suspecting benchmark contamination, you run a 13-gram exact
  match filter between the benchmark and the training corpus, identifying exactly 100 contaminated questions.
  Further analysis shows the model achieved 97% accuracy on this contaminated subset. Calculate the model's
  true accuracy on the clean subset, and determine the absolute accuracy inflation caused by the memorized
  data.
details:
  realistic_solution: Calculate the total correct answers (325) and subtract the correct contaminated
    answers (97) to find the clean correct answers (228). Divide by the clean question count (400) to
    get the true accuracy (57%), revealing an 8% absolute inflation.
  common_mistake: Candidates often assume the reported accuracy applies uniformly, failing to isolate
    the raw number of correct answers in the clean subset, or they calculate relative rather than absolute
    inflation.
  napkin_math: 'Total correct = 500 * 0.65 = 325

    Contaminated correct = 100 * 0.97 = 97

    Clean correct = 325 - 97 = 228

    Clean accuracy = 228 / 400 = 0.57 (57%)

    Absolute inflation = 65% - 57% = 8%'
