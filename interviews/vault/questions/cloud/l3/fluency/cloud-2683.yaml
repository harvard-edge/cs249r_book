id: cloud-2683
title: Fallback Availability Impact on SLA
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'Primary model availability: 99.5%. Fallback model availability: 99.9%. Heuristic fallback:
  99.99%. The system uses the primary model when available, otherwise falls back. Calculate overall system
  availability assuming independent failures.'
details:
  realistic_solution: 'System fails only when ALL levels fail simultaneously. P(primary fails) = 1 - 0.995
    = 0.005. P(fallback fails) = 1 - 0.999 = 0.001. P(heuristic fails) = 1 - 0.9999 = 0.0001. P(all fail)
    = 0.005 × 0.001 × 0.0001 = 5 × 10^-10. System availability = 1 - 5×10^-10 = 0.9999999995 ≈ 9.7 nines.
    Annual downtime: 5×10^-10 × 365.25 × 24 × 3600 = 0.016 seconds/year. Without fallbacks: 0.005 × 365.25
    × 24 = 43.8 hours/year downtime. With 3-level fallback: 0.016 seconds/year. However, this assumes
    independent failures. Correlated failures (e.g., network outage affecting all GPU models) mean the
    heuristic (CPU-based) becomes critical. True availability depends on failure correlation.'
  common_mistake: Assuming fallback failures are independent. In practice, cloud outages, network issues,
    or resource exhaustion can take down multiple levels simultaneously. The heuristic fallback should
    run on separate infrastructure.
  napkin_math: 'No fallback: 99.5% = 43.8 hrs/yr downtime. 3-level fallback: ~10 nines = 0.016s/yr. Improvement:
    10-million-fold. But correlated failures reduce this significantly.'
