schema_version: 1
id: cloud-r2-42048
title: Tensor Core Utilization vs CUDA Core Fallback
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: An H100 has 989 TFLOPS FP16 Tensor Core throughput but only 67 TFLOPS FP16 on CUDA cores. Your
  kernel performs a 4096×4096 matrix multiplication followed by a GELU activation. Calculate the time
  for each operation and explain why the activation function is the bottleneck despite being computationally
  simpler.
details:
  realistic_solution: 'Unfused total: matmul 0.139ms + GELU 0.0025ms (compute-light) + HBM round-trip
    0.019ms = 0.161ms (not 0.167ms which uses 0.0095ms for GELU).'
  common_mistake: Assuming GELU is negligible because it's element-wise. While GELU has far fewer FLOPs
    than matmul, it runs on CUDA cores at 67 TFLOPS instead of Tensor Cores at 989 TFLOPS — a 14.8× throughput
    disadvantage. Worse, GELU is memory-bound, not compute-bound.
  napkin_math: 'Unfused kernel time: matmul 0.139ms + GELU compute 0.0025ms (not 0.0095ms — GELU is compute-cheap)
    + HBM round-trip for intermediate result 0.019ms = 0.139 + 0.0025 + 0.019 = 0.1605ms ≈ 0.161ms (not
    0.167ms which uses 0.0095ms for GELU, implying expensive memory-bound GELU implementation).'
