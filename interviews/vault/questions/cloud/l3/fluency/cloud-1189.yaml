id: cloud-1189
title: Spot Instance Preemption and Batch Scaling
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a vision model on a spot-instance cluster using TorchElastic. The job starts
  with 64 A100 GPUs (8 nodes) with a global batch size of 2048 (local batch size of 32) and a base learning
  rate of 0.1. A preemption event suddenly reduces your cluster to 48 GPUs (6 nodes). Since the A100 GPU
  memory is already maximized at a local batch size of 32, you cannot increase the per-device batch size.
  Calculate the new global batch size, the adjusted learning rate required to maintain statistical equivalence
  (using the linear scaling rule), and the new number of steps required to complete a full training epoch
  of 1,228,800 images.
details:
  realistic_solution: Cap the local batch size at 32 to avoid OOM, resulting in a proportionally reduced
    global batch size of 1536. Scale the learning rate down linearly to 0.075 to preserve the variance
    of the gradient updates and maintain training stability.
  common_mistake: Leaving the learning rate at 0.1 despite the reduced global batch size, which alters
    the noise scale of SGD and degrades convergence, or attempting to keep the global batch size constant
    by increasing the local batch size, leading to an Out of Memory (OOM) error.
  napkin_math: New Global Batch Size = 48 GPUs * 32 = 1536. Linear LR Scaling = 0.1 * (1536 / 2048) =
    0.075. Original steps/epoch = 1,228,800 / 2048 = 600 steps. New steps/epoch = 1,228,800 / 1536 = 800
    steps.
