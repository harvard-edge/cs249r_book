schema_version: 1
id: cloud-1495
title: Exploiting Debug Headers in Shared LLM Caches
topic: federated-learning
status: published
provenance: imported
scenario: A multi-tenant LLM API hosted on 8x H100 GPUs inadvertently leaves `X-Request-Duration-Us` and
  `X-Cache-Status` HTTP headers enabled in production. The system uses cross-tenant prefix caching to
  save memory. An attacker probes the API with exact text from a leaked 2000-token financial document
  to verify if a competitor recently analyzed it. Uncached prefill latency is 4ms/token, while a prefix
  cache hit is 0.1ms/token.
details:
  realistic_solution: Strip all debug headers at the API Gateway layer. Architecturally, partition the
    KV prefix cache namespace by tenant ID to prevent cross-tenant hit/miss side channels, even if timings
    are observed over the network.
  common_mistake: Focusing solely on sanitizing the model's text output (e.g., prompt injection defenses)
    while ignoring metadata headers, which leak critical infrastructure state and enable cross-tenant
    timing attacks.
  napkin_math: Cache Miss TTFT = 2000 tokens * 4 ms/token = 8000 ms (8.0s). Cache Hit TTFT = 2000 tokens
    * 0.1 ms/token = 200 ms (0.2s). The 7.8-second timing delta, explicitly confirmed by the leaked headers,
    allows the attacker to deterministically prove the document's presence in the cache.
