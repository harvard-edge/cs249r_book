id: cloud-2757
title: NAS Compute Budget
topic: neural-architecture-search
status: published
provenance: imported
scenario: You run a weight-sharing NAS for an edge vision model. The supernet trains for 200 epochs on
  8 A100s (takes 24 hours). The evolutionary search evaluates 500 sub-networks (each evaluation takes
  2 minutes on 1 A100). Calculate the total NAS cost in GPU-hours and dollars at $3/GPU-hour.
details:
  realistic_solution: 'Supernet training: 8 A100s × 24 hours = 192 GPU-hours. Architecture search: 500
    evaluations × 2 min = 1000 min ≈ 16.7 hours on 1 A100 = 16.7 GPU-hours. If parallelized across 8 GPUs:
    16.7/8 ≈ 2.1 hours wall time. Total GPU-hours: 192 + 16.7 = 208.7 GPU-hours. Cost: 208.7 × $3 = $626.
    For comparison, training a single architecture manually: ~24 GPU-hours ($72). NAS costs ~8.7x more
    than a single training run but explores 500 architectures. If the NAS-found architecture is even 10%
    more efficient at inference, it saves far more than $626 over the model''s deployment lifetime. The
    192 GPU-hours for supernet training dominates (92% of total cost).'
  common_mistake: Forgetting that supernet training is the dominant cost. The architecture search phase
    is cheap compared to training the shared weights.
  napkin_math: 'Supernet: 192 GPU-h (92%). Search: 16.7 GPU-h (8%). Total: 209 GPU-h = $626. vs single
    model (24 GPU-h): $72. NAS overhead: ~8.7x one-time for better architecture.'
