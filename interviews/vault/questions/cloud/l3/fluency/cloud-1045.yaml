id: cloud-1045
title: Calculate AVX-512 INT8 Peak Throughput
topic: roofline-analysis
status: published
provenance: imported
scenario: You are optimizing an inference microservice running on an AWS C6i instance (Intel Xeon Ice
  Lake). The service executes a heavily quantized INT8 Transformer model. To establish a compute upper-bound
  for a single core, calculate the theoretical peak INT8 MAC (Multiply-Accumulate) throughput per clock
  cycle, assuming the core uses AVX-512 VNNI instructions and has 2 FMA (Fused Multiply-Add) units.
details:
  realistic_solution: Divide the vector register width (512 bits) by the datatype size (8 bits) to find
    the number of operations per instruction. Multiply by the number of execution ports (FMA units) available
    per cycle.
  common_mistake: Calculating throughput using FP32 element sizing (16 elements per 512-bit vector) instead
    of INT8, or neglecting to multiply by the number of parallel FMA units per core.
  napkin_math: 'Register width: 512 bits. INT8 size: 8 bits. Operations per FMA: 512 / 8 = 64 MACs. Total
    peak per cycle: 64 MACs * 2 FMA units = 128 MACs per clock cycle (256 operations/cycle).'
