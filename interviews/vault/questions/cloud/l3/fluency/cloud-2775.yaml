title: 'Adversarial Training Compute Overhead: Adversarial Robustness & Security'
topic: adversarial-robustness
status: published
provenance: imported
scenario: You add PGD adversarial training (10-step PGD) to your image classifier. Standard training takes
  24 hours on 8 A100s. PGD requires 10 additional forward+backward passes per training step for adversarial
  example generation. Estimate the new training time and cost.
details:
  realistic_solution: 'Standard training step breakdown (approximate): data loading: 10%, forward pass:
    25%, backward pass: 35%, optimizer update: 10%, other: 20%. Forward + backward = 60% of step time.
    PGD adds 10 additional forward+backward passes for input perturbation (no optimizer update needed).
    Additional compute per step: 10 × 60% = 600% of step time for adversarial generation. But PGD forward/backward
    is only with respect to the input (not weights), so it is slightly cheaper — roughly 50% of a full
    forward+backward. Adjusted: 10 × 30% = 300% additional. New step time: 100% + 300% = 400% of original
    = 4x. New training time: 24h × 4 = 96 hours. Cost: 8 A100s × 96h × $3 = $2,304 (vs $576 for standard).
    4x cost is the price of robustness.'
  common_mistake: Assuming 10x overhead for 10 PGD steps. The adversarial generation only involves the
    forward/backward pass for the input, not the full training step (which includes optimizer updates,
    data loading, etc.).
  napkin_math: 'PGD-10: ~10 × 30% = 300% overhead. Total: 4x training time. 24h → 96h. Cost: $576 → $2,304.
    Robustness costs ~4x compute.'
