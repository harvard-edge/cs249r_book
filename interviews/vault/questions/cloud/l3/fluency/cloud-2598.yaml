schema_version: 1
id: cloud-2598
title: Cloud Information Entropy L3 0
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You have a text dataset with vocabulary frequency following Zipf''s law: the k-th most common
  token has frequency proportional to 1/k. With a 50K vocabulary, calculate the entropy and the theoretical
  minimum bits per token for lossless compression.'
details:
  realistic_solution: 'Zipf''s law: p(k) = 1/(k × H_N) where H_N = Σ(1/k) for k=1..N is the harmonic number.
    H_50000 ≈ ln(50000) + 0.577 ≈ 10.82 + 0.577 = 11.40. Entropy: H = -Σ p(k) log₂ p(k) = -Σ (1/(k×11.40))
    × log₂(1/(k×11.40)). This equals (1/11.40) × Σ (1/k) × (log₂(k) + log₂(11.40)) = (1/11.40) × [Σ log₂(k)/k
    + log₂(11.40) × H_N]. Numerically: H ≈ 10.9 bits/token. Uniform distribution would be log₂(50000)
    = 15.6 bits. Compression ratio: 10.9/15.6 = 70%. So Zipfian text can theoretically be compressed to
    70% of naive encoding.'
  common_mistake: Using uniform entropy (log₂ of vocab size) as the compression bound. Natural language
    follows Zipf's law with much lower entropy — frequent tokens carry less information. The true compression
    bound is the Shannon entropy, not log₂(N).
  napkin_math: 'Uniform 50K vocab: 15.6 bits/token. Zipf entropy: ~10.9 bits/token. Compression bound:
    10.9/15.6 = 70%. For 1 GB corpus: min compressed size = 0.70 GB. Practical compression (gzip): ~0.70-0.75
    GB (close to Shannon limit).'
