id: cloud-1243
title: Calculating Expected Calibration Error
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are deploying a ResNet-50 medical imaging classifier on AWS p4d.24xlarge instances. Across
  a test set of 10,000 samples, predictions are partitioned into two bins based on confidence scores.
  8,000 samples fall into the high-confidence bin (average predicted confidence is 0.95, but actual accuracy
  is 0.80). The remaining 2,000 samples fall into the low-confidence bin (average predicted confidence
  is 0.60, and actual accuracy is 0.55). Calculate the Expected Calibration Error (ECE).
details:
  realistic_solution: Calculate the weighted sum of the absolute differences between accuracy and confidence
    for each bin. The high-confidence bin contributes an error of 0.15 weighted by 0.8, and the low-confidence
    bin contributes an error of 0.05 weighted by 0.2. The total ECE is 0.13 (or 13%).
  common_mistake: Calculating the unweighted average of the bin errors ((0.15 + 0.05) / 2 = 0.10) instead
    of weighting them by the proportion of samples in each bin.
  napkin_math: ECE = (8,000 / 10,000) * |0.80 - 0.95| + (2,000 / 10,000) * |0.55 - 0.60| = 0.8 * 0.15
    + 0.2 * 0.05 = 0.12 + 0.01 = 0.13
