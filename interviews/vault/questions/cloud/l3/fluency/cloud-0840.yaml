id: cloud-0840
title: Sizing Deployments Across the Accelerator Spectrum
topic: accelerator-comparison
status: published
provenance: imported
scenario: You are deploying a 1B parameter NLP model requiring 2 TFLOPs per request at a target throughput
  of 1,500 requests per second. You must choose between an NVIDIA A10G GPU (312 TFLOPs peak FP16, 150W
  TDP) and a custom inference ASIC (380 TFLOPs peak FP16, 90W TDP). Due to dynamic sequence lengths in
  production traffic, the GPU achieves 60% utilization using dynamic batching, while the rigid static-shape
  requirements of the specialized ASIC drop its effective utilization to 30%. Calculate the required number
  of chips and the total power consumption for both hardware options to meet the throughput demand.
details:
  realistic_solution: First calculate effective throughput by multiplying peak TFLOPs by expected utilization.
    Divide total required TFLOPs by the effective throughput per chip, round up to the nearest integer,
    and multiply by the TDP. The GPU option requires 17 chips (2550W), while the ASIC requires 27 chips
    (2430W).
  common_mistake: Dividing the total required compute directly by the peak theoretical TFLOPs, ignoring
    the severe utilization penalties that highly specialized ASICs often suffer when handling dynamic
    workloads.
  napkin_math: 'Compute Demand = 1500 req/s * 2 TFLOPs/req = 3000 TFLOPs/s.

    GPU Effective = 312 TFLOPs * 0.60 = 187.2 TFLOPs/chip.

    GPUs needed = ceil(3000 / 187.2) = 17 GPUs. GPU Power = 17 * 150W = 2550W.

    ASIC Effective = 380 TFLOPs * 0.30 = 114 TFLOPs/chip.

    ASICs needed = ceil(3000 / 114) = 27 ASICs. ASIC Power = 27 * 90W = 2430W.'
