id: cloud-1149
title: CPU Dispatch Overhead in Eager Execution
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are training a custom Graph Neural Network (GNN) using PyTorch eager mode on a single NVIDIA
  A100 80GB GPU. The forward pass consists of a sequential loop of 1,000 small matrix operations per batch.
  Theoretical GPU execution time for these 1,000 operations is 0.5 milliseconds (500 ns per op). However,
  Nsight Systems profiling shows the forward pass takes 5.5 milliseconds with the GPU sitting idle between
  operations. Calculate the per-operation dispatch tax and propose a native optimization to eliminate
  it.
details:
  realistic_solution: Identify the 5.5us per-op overhead as the Python/C++ PyTorch dispatch tax. Use torch.compile
    (with mode='reduce-overhead') or CUDA Graphs to trace and collapse the 1,000 kernel launches into
    a single graph launch.
  common_mistake: Assuming the model is memory-bandwidth bound or failing to calculate the CPU-side overhead
    gap, leading to misguided suggestions like using mixed precision.
  napkin_math: Total time (5.5 ms) is dictated by CPU dispatch, as GPU execution (0.5 ms) is fully hidden.
    Dispatch tax per op = 5,500 μs / 1,000 ops = 5.5 μs/op. Using CUDA graphs collapses 1,000 launches
    to 1 launch (~5 μs overhead), dropping total time from 5.5 ms to ~0.505 ms (a ~10.8x speedup).
