id: cloud-1051
title: CUDA Graphs for Low-Latency Inference
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are deploying a fast, low-latency transformer model for real-time bidding on a single NVIDIA
  A100. Profiling shows that a single inference pass consists of 250 individual CUDA kernel launches.
  The actual GPU execution time for each kernel averages just 4 µs, but the CPU-side kernel launch overhead
  is 5 µs per kernel. Calculate the expected end-to-end inference latency before and after implementing
  CUDA Graphs, assuming all kernels can be captured in a single graph.
details:
  realistic_solution: CUDA graphs eliminate the per-kernel CPU launch overhead by launching the entire
    graph with a single overhead penalty, while GPU execution time remains identical.
  common_mistake: Assuming CUDA graphs optimize the actual GPU kernel execution time rather than just
    removing the CPU-bound launch overheads.
  napkin_math: 'Before CUDA Graphs: 250 kernels * (4 µs execution + 5 µs launch) = 2,250 µs (2.25 ms).
    After CUDA Graphs: 1 graph launch (5 µs) + 250 * 4 µs execution = 1,005 µs (~1.0 ms). Speedup: 2.25
    / 1.005 ≈ 2.24x.'
