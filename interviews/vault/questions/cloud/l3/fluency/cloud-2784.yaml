id: cloud-2784
title: Fleet Lifecycle Carbon Calculation
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: 'Your cluster has 1,000 A100 GPUs. Each has 175 kg CO2e embodied carbon. Operational: each GPU
  runs at 400W average, grid carbon intensity is 0.4 kg CO2e/kWh. Compare the annualized total carbon
  for a 3-year vs 5-year replacement cycle.'
details:
  realistic_solution: 'Embodied carbon per GPU: 175 kg CO2e. Fleet: 1,000 GPUs. Total embodied: 175,000
    kg = 175 tonnes CO2e. Operational carbon per GPU per year: 400W × 8,760h × 0.4 kg/kWh = 1,401.6 kg
    CO2e/year = 1.4 tonnes/year. Fleet operational: 1,000 × 1.4 = 1,400 tonnes/year. 3-year cycle: Annualized
    embodied: 175/3 = 58.3 tonnes/year. Total annual: 1,400 + 58.3 = 1,458.3 tonnes/year. 5-year cycle:
    Annualized embodied: 175/5 = 35 tonnes/year. Total annual: 1,400 + 35 = 1,435 tonnes/year. Carbon
    savings: 23.3 tonnes/year (1.6% reduction). The savings seem small because operational carbon (1,400t)
    dominates embodied (35-58t). In a green grid (0.05 kg/kWh), operational drops to 175t/year, and embodied
    becomes 17-25% of total — lifecycle extension matters much more.'
  common_mistake: Ignoring that older GPUs are less efficient. A 5-year-old GPU may use more power per
    FLOP than a new one, partially offsetting the embodied carbon savings.
  napkin_math: '3yr cycle: 1,458 t/yr total. 5yr cycle: 1,435 t/yr. Savings: 23 t/yr (1.6%). On green
    grid (0.05): savings = 23/210 = 11% — much more significant.'
