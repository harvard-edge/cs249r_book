id: cloud-0850
title: AOC Power and Latency Overhead Calculation
topic: collective-communication
status: published
provenance: imported
scenario: 'You are provisioning a distributed training cluster. Intra-rack connections use Direct Attach
  Copper (DAC), but inter-rack spine connections require 45-meter runs, mandating 400G Active Optical
  Cables (AOCs). You are deploying 128 inter-rack AOC links. Each 400G AOC transceiver consumes 12W per
  end for electro-optical conversion, and the onboard DSP/FEC (Forward Error Correction) adds 100ns of
  latency per end. Calculate the total continuous power overhead of the AOC fabric and the one-way latency
  penalty for a cross-rack GPU-to-GPU message (traversing two AOC links: Leaf->Spine->Leaf) compared to
  a local DAC-only route.'
details:
  realistic_solution: Account for both ends of every cable. For 128 links, there are 256 transceivers
    drawing power. For a cross-rack traversal (Leaf to Spine, Spine to Leaf), the signal undergoes 4 electro-optical
    conversions (2 per cable).
  common_mistake: Candidates often forget that AOCs have active transceivers on both ends that draw power,
    and they fail to multiply the FEC latency across all electro-optical conversion steps in the multi-hop
    path.
  napkin_math: 400G Active Optical Cables (AOCs) require optical transceivers, drawing ~12W per end. For
    128 links, that's 256 transceivers * 12W = 3,072W (3.1 kW) just for network lasers! Additionally,
    optical-electrical conversion adds ~100ns latency per end. Across a spine switch (2 links, 4 conversions),
    AOCs add 400ns to the one-way latency compared to passive Direct Attach Copper.
