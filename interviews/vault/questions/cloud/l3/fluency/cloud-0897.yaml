id: cloud-0897
title: Bandwidth Taper in DLRM Embeddings
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are deploying an embedding-heavy DLRM model on an NVIDIA A100 GPU (80GB HBM2e, 2039 GB/s
  bandwidth). The total embedding tables are 250GB, exceeding GPU memory, so they are stored in system
  DRAM. The GPU is connected to the host via a PCIe Gen4 x16 link (32 GB/s unidirectional bandwidth).
  For a specific batch, the GPU needs to fetch 1.6 GB of embedding vectors from the CPU DRAM. Calculate
  the minimum transfer time and compare it to the time it would take if the data were already resident
  in HBM2e.
details:
  realistic_solution: Recognize that data must travel down the bandwidth taper from system DRAM across
    the PCIe bus to the GPU. The effective transfer speed is limited by the slowest link in the path,
    which is the unidirectional PCIe Gen4 x16 connection.
  common_mistake: Using the bidirectional PCIe bandwidth (64 GB/s) instead of unidirectional (32 GB/s)
    for a one-way fetch, or confusing the bottleneck link with the target memory's internal bandwidth.
  napkin_math: 'PCIe Transfer Time = 1.6 GB / 32 GB/s = 0.05 seconds (50 ms).

    HBM2e Transfer Time = 1.6 GB / 2000 GB/s = ~0.0008 seconds (0.8 ms).

    The bandwidth taper penalty is 50 ms / 0.8 ms = ~62.5x slower transfer.'
