id: cloud-2514
title: Cloud Top Of Rack Switch L3 0
topic: collective-communication
status: published
provenance: imported
scenario: You have a 512-GPU training cluster spread across 8 racks with 400 Gbps ToR uplinks. Each rack
  has 64 GPUs performing AllReduce. Estimate the maximum cross-rack AllReduce bandwidth per GPU.
details:
  realistic_solution: 'Each rack has 64 GPUs. ToR uplink to spine: 400 Gbps = 50 GB/s. During ring AllReduce
    across racks, data must traverse the ToR uplink. With 64 GPUs in a rack all needing cross-rack bandwidth:
    50 GB/s / 64 GPUs = 0.78 GB/s per GPU cross-rack. Compare to intra-rack NVLink at 600 GB/s per GPU
    (for A100) — cross-rack is ~769x slower. This is why AllReduce topology must minimize cross-rack traffic.'
  common_mistake: Forgetting that all GPUs in the rack share the same ToR uplink bandwidth. The per-GPU
    cross-rack bandwidth is the uplink divided by the number of GPUs, not the raw link speed.
  napkin_math: 'ToR uplink: 400 Gbps = 50 GB/s. 64 GPUs per rack sharing uplink. Per-GPU cross-rack BW:
    50/64 = 0.78 GB/s. NVLink intra-node: 600 GB/s (A100). Ratio: 600/0.78 ≈ 769x slower cross-rack.'
