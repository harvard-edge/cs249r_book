id: cloud-1730
title: Calculating Optimal Prefetch Buffer Depth for I/O Jitter
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training a large vision model on an 8x H100 node reading images from a parallel networked
  filesystem. The GPUs compute one global batch every 150ms. Normally, the data loading pipeline fetches
  and preprocesses a batch in 100ms, easily keeping up. However, due to noisy neighbor network congestion,
  the p99 latency (worst-case I/O jitter) for fetching a batch occasionally spikes to 1.2 seconds. Calculate
  the minimum prefetch buffer depth required in host DRAM to ensure the GPUs never stall during these
  p99 network latency spikes.
details:
  realistic_solution: Size the prefetch buffer to cover the entire duration of the worst-case I/O latency
    spike. Since the GPU consumes batches at a fixed rate, the buffer must hold enough batches to continuously
    feed the GPU while the I/O pipeline is temporarily stalled.
  common_mistake: Calculating buffer size based purely on average throughput ratios or relying on PyTorch's
    default prefetch_factor=2, which fails to absorb long-tail I/O latencies and leads to intermittent
    GPU starvation.
  napkin_math: Max I/O Latency = 1200ms. GPU Step Time = 150ms. Required Buffer Depth = ceil(Max I/O Latency
    / GPU Step Time) = ceil(1200ms / 150ms) = 8 batches. A prefetch buffer of at least 8 batches is required
    per worker.
