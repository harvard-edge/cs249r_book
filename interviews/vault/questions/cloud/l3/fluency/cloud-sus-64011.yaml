schema_version: 1
id: cloud-sus-64011
title: Cooling Fluid Routing for Hot-Aisle Containment in H100 Deployments
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A datacenter architect is explaining hot-aisle containment (HAC) to a new ML infrastructure
  engineer. The facility houses 8×H100 nodes generating 8 kW IT load each, deployed in rows with HAC.
  Explain how HAC improves PUE compared to an open-floor layout, name the key thermodynamic mechanism
  that makes it effective for GPU-dense rows, and state the typical PUE improvement achievable.
details:
  realistic_solution: 'HAC prevents hot exhaust air (50-55°C from H100 nodes) from mixing with cold supply
    air (18-22°C) in the open floor. Without containment, hot/cold air mixing raises the average CRAC
    inlet temperature, forcing chillers to work harder (each 1°C rise in chiller inlet ≈ 2-3% more chiller
    energy). With HAC, CRAC units see only hot return air at a consistent 50°C, enabling delta-T optimization.
    Typical PUE improvement: 0.1-0.15 PUE points (e.g., 1.5 → 1.35) from containment alone. Combined with
    economizer cooling (free cooling when outdoor temp < 18°C), HAC-equipped facilities regularly achieve
    PUE 1.1-1.15.'
  common_mistake: Confusing hot-aisle containment with cold-aisle containment, or thinking they are equivalent.
    HAC traps the hot exhaust and routes it directly to CRAC return, preventing recirculation. CAC keeps
    cold supply contained. For GPU-dense rows, HAC is often preferred because the high exhaust temperature
    (50-60°C for H100s) can be used for economizer cooling if the building design permits.
  napkin_math: '1°C chiller inlet rise → 2.5% more chiller power. Without HAC: hot exhaust recirculation
    raises inlet by 5-8°C. Chiller overhead increase: 5°C × 2.5%/°C = 12.5% more chiller power. For a
    10 MW IT cluster at PUE 1.5: cooling overhead = 5 MW. 12.5% extra = 625 kW wasted. With HAC eliminating
    recirculation: 625 kW saved = reduces PUE overhead by 625/10,000 = 0.0625 PUE points on 1.5 baseline
    → PUE 1.44. Additional economizer effect: another 0.05-0.10 PUE. Total: PUE 1.35-1.40.'
