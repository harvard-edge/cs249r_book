schema_version: 1
id: cloud-1970
title: Federated Learning Over-selection for Stragglers
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A cloud parameter server orchestrates a synchronous federated learning round for a 50MB model,
  requiring 1,000 successful updates per round. Client compute time is 2 seconds. 80% of the fleet has
  50 Mbps upload speeds, while 20% are stragglers with 5 Mbps upload speeds. Calculate the required client
  selection size (N) to avoid waiting for stragglers and the resulting latency reduction per round.
details:
  realistic_solution: Implement an over-selection strategy by sampling 1,250 clients per round and aggregating
    only the first 1,000 responses, effectively pruning the slow-network tail.
  common_mistake: Selecting exactly 1,000 clients and waiting for 100% completion, which allows the slowest
    20% of network connections to bottleneck the entire global training round.
  napkin_math: Model size = 50MB = 400Mb. Fast upload = 400Mb / 50Mbps = 8s. Slow upload = 400Mb / 5Mbps
    = 80s. Fast round time = 8s + 2s compute = 10s. Slow round time = 80s + 2s = 82s. To guarantee 1000
    fast clients from an 80% fast population, select 1000 / 0.8 = 1250 clients. Round time is reduced
    from 82s to 10s.
