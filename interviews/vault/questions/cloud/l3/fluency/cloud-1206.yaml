id: cloud-1206
title: Energy-Movement Invariant in Feature Pipelines
topic: energy-per-operation
status: published
provenance: imported
scenario: A cloud ML team is redesigning a recommendation system's feature pipeline. They can either stream
  250 MB of raw user history data per inference request from a centralized feature store across the datacenter
  network, or transmit a 10 KB compressed user embedding and compute the 5 GFLOP feature expansion locally
  on the inference node. Given that datacenter network data transfer costs roughly 10 nJ/bit and local
  FP16 compute costs ~0.1 pJ/FLOP, which approach is more energy-efficient and what is the approximate
  energy difference per request?
details:
  realistic_solution: Transmit the 10 KB embedding and compute locally. The physical energy required to
    move data across a datacenter network vastly exceeds the energy required to switch transistors locally
    to compute the representation.
  common_mistake: Candidates often assume that because 5 GFLOPs sounds computationally intensive, it must
    consume more power than simply moving 'passive' raw data over the network, fundamentally misunderstanding
    the massive energy penalty of long-distance data movement.
  napkin_math: 'Option A (Network): 250 MB = 2e9 bits. 2e9 bits * 10 nJ/bit = 20 Joules. Option B (Compute):
    Network = 10 KB = 8e4 bits * 10 nJ/bit = 0.8 mJ. Compute = 5e9 FLOPs * 0.1 pJ/FLOP = 0.5 mJ. Total
    Option B = 1.3 mJ. Option A consumes over 15,000x more energy (20 J vs 1.3 mJ).'
