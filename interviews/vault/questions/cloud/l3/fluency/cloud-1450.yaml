id: cloud-1450
title: Calculating JSD for Disjoint Distributions
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are deploying an automated drift detection system for a categorical feature with two states:
  ''A'' and ''B''. The reference training distribution P is entirely ''A'' (P = [1.0, 0.0]). Due to a
  downstream pipeline bug, the incoming production distribution Q shifts entirely to ''B'' (Q = [0.0,
  1.0]). A junior engineer attempts to use Kullback-Leibler (KL) divergence to trigger an alert, but the
  metric calculation crashes the monitoring service. Explain why it crashes, and calculate the exact Jensen-Shannon
  Divergence (JSD) using base-2 logarithms to determine the proper bounded metric value.'
details:
  realistic_solution: Use Jensen-Shannon Divergence, which creates a smoothed midpoint distribution M
    = (P+Q)/2. This ensures no division by zero and bounds the drift metric between 0 and 1 (when using
    base-2 logs), making it ideal for absolute alerting thresholds.
  common_mistake: Failing to realize that KL divergence is asymmetric and undefined when Q(i) = 0 and
    P(i) > 0, leading to a division by zero error in production.
  napkin_math: '1. P = [1, 0], Q = [0, 1]

    2. Mixture M = (P+Q)/2 = [0.5, 0.5]

    3. KL(P||M) = 1 * log2(1/0.5) + 0 = 1.0

    4. KL(Q||M) = 0 + 1 * log2(1/0.5) = 1.0

    5. JSD(P||Q) = 0.5 * KL(P||M) + 0.5 * KL(Q||M) = 0.5(1.0) + 0.5(1.0) = 1.0'
