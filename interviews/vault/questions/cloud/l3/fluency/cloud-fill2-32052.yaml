title: 'FlashAttention Training Throughput: Tokens per Second per GPU'
topic: flash-attention
status: published
provenance: imported
scenario: 'You benchmark a 7B model training on a single TPU v5e (197 TFLOPS BF16) with and without FlashAttention-equivalent
  tiled attention (Pallas). Without: 2100 tokens/second. With: 4800 tokens/second. Calculate the MFU (Model
  FLOPS Utilization) for both configurations. The model requires ~6 × 7B × 2 = 84 GFLOP per token (forward
  + backward).'
details:
  realistic_solution: 'MFU = actual throughput / peak throughput. At 2100 tok/s with 84 GFLOP/token: 176.4
    TFLOPS / 1307 TFLOPS = 13.5% MFU on MI300X. If using H100 (989 TFLOPS): 176.4/989 = 17.8% MFU.'
  common_mistake: Computing MFU using peak FLOPS without accounting for the fact that MFU measures actual
    useful FLOPS (model FLOPS) as a fraction of hardware peak, including all overheads.
  napkin_math: 'MFU calculation: if 6×7B=42 GFLOP/token (counting only linear ops): 2100 tok/s × 42G =
    88.2 TFLOPs. MFU = 88.2/1307 = 6.7%? But if using 84 GFLOP/token (2× for fwd+bwd consideration): 2100
    × 84G = 176.4 TFLOPs. MFU = 176.4/1307 = 13.5%. For inference MFU: use 2×N per token = 14B×2=28 GFLOPs.
    But 42 GFLOP = 2×21B... The Gemini fix: if question uses 84 GFLOP/tok throughout: 2100×84G=176.4 TFLOPs
    → MFU=89.5%? at 1307×0.15=196T... No: 176.4/1307=13.5%, not 89.5%. MFU=89.5% would require 2100×84G/989T=89.5%×...
    using H100 not MI300X.'
