id: cloud-0888
title: Estimating Backdoor Poisoning Rate
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training a ViT-B/16 content moderation model on a cluster of 64 A100 GPUs using a crowdsourced
  dataset of 10 million images. A malicious worker group is attempting a backdoor attack by injecting
  a hidden 5x5 pixel trigger. To successfully embed the backdoor, empirical studies suggest the model
  needs to see the trigger in at least 50% of its training batches. With a global batch size of 8192,
  calculate the minimum number of poisoned images they must inject.
details:
  realistic_solution: Calculate the required poisoning rate based on the batch size and desired batch
    probability. An adversary only needs to poison roughly 846 images (about 0.0085% of the dataset) to
    ensure a 50% chance of the trigger appearing in any given batch.
  common_mistake: Assuming that a large percentage of the dataset (e.g., >1%) must be poisoned, failing
    to account for how large global batch sizes amplify the frequency of rare poisoned samples during
    stochastic gradient updates.
  napkin_math: Let p be the poisoning rate. P(no poison in batch) = (1 - p)^B = 0.5. For small p, (1 -
    p)^B ≈ e^(-pB). Therefore, e^(-pB) = 0.5 => p * B = ln(2) ≈ 0.693. p = 0.693 / 8192 ≈ 0.0000846. Total
    poisoned images required = p * 10,000,000 ≈ 846.
