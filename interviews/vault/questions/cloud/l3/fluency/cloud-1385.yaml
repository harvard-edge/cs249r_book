id: cloud-1385
title: Sizing Host DRAM for Decoded Tensor Staging
topic: vram-budgeting
status: published
provenance: imported
scenario: You are configuring a data pipeline for a Vision Transformer training job on a node with 8x
  H100 GPUs. The model consumes 12,000 images/second globally. The CPU decodes 200KB JPEGs from NVMe into
  3MB float32 tensors before transfer to the GPUs. To completely hide CPU decoding and PCIe Gen5 transfer
  latency, you need to stage exactly 4 full global batches of decoded tensors in the host DRAM buffer.
  If the global batch size is 4,096, calculate the required host DRAM capacity for this staging buffer
  and the sustained PCIe transfer bandwidth needed.
details:
  realistic_solution: Allocate approximately 50GB of host DRAM for the prefetch buffer. The buffer must
    store fully decoded tensors (4096 * 4 batches * 3MB = 49.15 GB) to enable direct DMA transfers over
    PCIe to the GPUs. The pipeline also requires a sustained 36 GB/s of PCIe bandwidth (12,000 imgs/s
    * 3MB), which necessitates strict NUMA node pinning to avoid cross-socket bottlenecks.
  common_mistake: Calculating the DRAM buffer capacity using the compressed 200KB JPEG footprint instead
    of the fully uncompressed 3MB float32 tensor size, leading to severe GPU starvation.
  napkin_math: 1 Batch = 4,096 images * 3 MB/image = 12.288 GB. 4 Batches in DRAM = 4 * 12.288 = 49.15
    GB. PCIe Bandwidth = 12,000 imgs/sec * 3 MB = 36,000 MB/s = 36 GB/s.
