id: cloud-0962
title: Preventing Cascading Failures with Circuit Breakers
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: An ML API Gateway handles traffic for multiple microservices, receiving 400 RPS specifically
  for a heavy text embedding service. The Gateway operates on a node with 16 CPU cores and a fixed connection
  pool of 2,000 concurrent threads for all inbound traffic. Normally, embeddings take 50ms. A sudden backend
  outage causes the embedding service to hang, relying on the Gateway's default 10-second hard timeout.
  Calculate the time to connection pool exhaustion without a circuit breaker, and the maximum concurrent
  threads consumed by the failing service if a circuit breaker with a 500ms timeout is implemented.
details:
  realistic_solution: Use Little's Law (Concurrency = Arrival Rate × Latency) to model thread consumption.
    Implement a circuit breaker with a short fast-fail timeout (e.g., 500ms) to cap the maximum concurrency
    required by the failing route, preserving the connection pool for healthy services.
  common_mistake: Candidates often assume the primary benefit of a circuit breaker is saving compute on
    the failing upstream service, neglecting the critical role it plays in preventing local thread pool
    exhaustion via Little's Law.
  napkin_math: 'Without CB: At 400 RPS and a 10s timeout, required concurrency is 400 * 10 = 4,000 threads.
    The 2,000-thread pool is exhausted in exactly 2,000 / 400 = 5 seconds, crashing the entire Gateway.
    With CB (500ms timeout): Maximum concurrency before tripping is 400 * 0.5 = 200 threads, leaving 1,800
    threads safely available for other services.'
