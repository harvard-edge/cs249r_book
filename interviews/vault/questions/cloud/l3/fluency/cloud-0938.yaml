id: cloud-0938
title: GPU L1 Cache Tiling for Attention
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are optimizing a custom self-attention kernel for an NVIDIA A100 GPU, which features 192KB
  of L1/Shared Memory per Streaming Multiprocessor (SM) and a global 40MB L2 cache. Your sequence length
  is 2048 and head dimension is 128 (using FP16, 2 bytes per element). To minimize L2 and HBM round-trips,
  you must tile the Query, Key, and Value matrices into the L1 Shared Memory. If you reserve 32KB of Shared
  Memory for softmax statistics and intermediate accumulators, what is the largest power-of-two square
  tile size (block size B for both sequence dimensions) you can fit for Q, K, and V simultaneously?
details:
  realistic_solution: 'First, calculate the available shared memory: 192KB - 32KB = 160KB. Each block
    of Q, K, and V has dimensions [B, 128]. In FP16, each row is 128 * 2 = 256 bytes. Therefore, each
    block requires B * 256 bytes. Since we need to load Q, K, and V, the total memory required is 3 *
    (B * 256) = 768 * B bytes. Setting 768 * B <= 160 * 1024 (163,840 bytes) gives B <= 213.3. The largest
    power-of-two size is B = 128. Using B=128 consumes 96KB of shared memory, easily fitting within the
    remaining 160KB limit.'
  common_mistake: Failing to account for the 2-byte size of FP16 elements, or forgetting that all three
    matrices (Q, K, V) must reside in shared memory concurrently during the inner loop.
  napkin_math: 'Available SMEM: 192KB - 32KB = 160KB = 163,840 bytes.

    Memory per tile row (FP16): 128 cols * 2 bytes = 256 bytes.

    Total SMEM for Q, K, V tiles: 3 * B * 256 = 768 * B bytes.

    Max size constraint: 768 * B <= 163,840.

    B <= 213.3.

    Largest power of 2: B = 128.

    Verification: 3 * 128 * 256 = 98,304 bytes (96KB).'
