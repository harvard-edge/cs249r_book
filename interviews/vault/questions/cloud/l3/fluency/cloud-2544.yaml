id: cloud-2544
title: Cloud Warp Divergence L3 0
topic: roofline-analysis
status: published
provenance: imported
scenario: You have a custom CUDA kernel where each thread processes one token. 25% of tokens take a 'short
  path' (10 cycles) and 75% take a 'long path' (40 cycles). Threads are randomly assigned to warps of
  32. Calculate the expected warp execution time and efficiency loss.
details:
  realistic_solution: 'A warp diverges if any thread takes a different path. Probability all 32 threads
    take the same path: P(all short) = 0.25^32 ≈ 0 or P(all long) = 0.75^32 ≈ 0.0001. So nearly every
    warp diverges. Divergent warp time: short path + long path = 10 + 40 = 50 cycles. Non-divergent average:
    0.25×10 + 0.75×40 = 32.5 cycles. Efficiency: ideal throughput per cycle = 32 threads / 32.5 cycles
    = 0.985 threads/cycle. Actual: 32 threads / 50 cycles = 0.64 threads/cycle. Efficiency loss: 1 - 0.64/0.985
    = 35%.'
  common_mistake: Computing average per-thread time (32.5 cycles) as the warp time. In SIMT, the warp
    time is the sum of all distinct branch durations (50 cycles), not the average, because both paths
    execute sequentially.
  napkin_math: 'P(divergent warp) ≈ 99.99%. Divergent time: 10 + 40 = 50 cycles. Ideal average: 0.25×10
    + 0.75×40 = 32.5 cycles. Overhead: 50/32.5 = 1.54x → 35% efficiency loss.'
