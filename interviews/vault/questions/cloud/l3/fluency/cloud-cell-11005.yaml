schema_version: 1
id: cloud-cell-11005
title: 'Dataset Curation: Napkin Math for Tokenizer Coverage on Multilingual Data'
topic: dataset-curation
status: published
provenance: imported
scenario: You are preparing a multilingual dataset for a 30B model on H100 (80GB HBM3). Your 32K-vocab
  tokenizer was trained on English-only data. You add 20% non-English content (10 languages). Estimate
  tokenizer fertility (tokens per word) for the new data and its effect on effective sequence length and
  memory.
details:
  realistic_solution: English fertility ≈ 1.3 tokens/word. Non-English with English-only tokenizer ≈ 3-5
    tokens/word (byte fallback). Measure actual fertility per language, then compute effective sequence
    length inflation.
  common_mistake: Ignoring that a mismatched tokenizer increases sequence length, inflating memory and
    compute costs.
  napkin_math: 'English-only: 512 tokens/seq at fertility 1.3 = 394 words. With 20% non-English at fertility
    4.0: effective fertility = 0.8×1.3 + 0.2×4.0 = 1.04 + 0.8 = 1.84. Same 512-token context now fits
    only 512/1.84 = 278 words. Sequence length budget effectively cuts 29%. Attention memory scales O(n²):
    (278/394)² = 0.498, so attention memory roughly halves — but you process fewer words per batch.'
