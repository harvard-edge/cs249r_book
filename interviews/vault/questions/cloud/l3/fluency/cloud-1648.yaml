id: cloud-1648
title: NVLink 4.0 Activation Transfer Time
topic: collective-communication
status: published
provenance: imported
scenario: You are profiling a pipeline parallel transformer model on an 8x H100 SXM node. A single 45
  GB activation tensor must be passed sequentially from GPU 0 to GPU 1 over NVLink 4.0. Assuming zero
  software or protocol overhead, calculate the theoretical minimum transmission time.
details:
  realistic_solution: A one-way tensor transfer between two GPUs only utilizes the unidirectional bandwidth
    of the NVLink interconnect. NVLink 4.0 provides 900 GB/s total bidirectional bandwidth per GPU, meaning
    450 GB/s is available in a single direction. The theoretical minimum time is the tensor size divided
    by the unidirectional bandwidth.
  common_mistake: Using the advertised 900 GB/s bidirectional bandwidth for the calculation instead of
    the 450 GB/s unidirectional bandwidth required for a one-way transfer.
  napkin_math: "Unidirectional Bandwidth = 900 GB/s / 2 = 450 GB/s. \nTransfer Time = 45 GB / 450 GB/s\
    \ = 0.1 seconds = 100 milliseconds."
