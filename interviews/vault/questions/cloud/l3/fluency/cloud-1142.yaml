schema_version: 1
id: cloud-1142
title: KV Cache Transfer in Disaggregated Serving
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are migrating a 70B parameter LLM to a disaggregated serving architecture. The prefill nodes
  process 2048-token prompts, creating a 2GB KV cache in 300ms. The KV cache is then transferred over
  a 200 Gbps network to dedicated decode nodes. The decode nodes have a Time-Per-Output-Token (TPOT) of
  15ms. Calculate the end-to-end Time-To-First-Token (TTFT) perceived by the user, assuming network overhead
  is limited to the raw transfer time.
details:
  realistic_solution: 'To find the TTFT in a disaggregated setup, you must add the prefill compute time,
    the KV cache transfer time, and the duration of the first decode step. Convert network bandwidth to
    bytes: 200 Gbps / 8 = 25 GB/s. Transferring the 2GB KV cache takes 80ms. The total TTFT is 300ms (prefill)
    + 80ms (transfer) + 15ms (first token decode) = 395ms.'
  common_mistake: Failing to account for the KV cache network transfer time between the prefill and decode
    nodes, or incorrectly converting between bits and bytes when calculating the network transfer duration
    (e.g., dividing by 200 instead of 25).
  napkin_math: KV Transfer Time = 2GB / (200 Gbps / 8 bits/byte) = 2GB / 25GB/s = 0.08s = 80ms. End-to-End
    TTFT = Prefill (300ms) + KV Transfer (80ms) + First Decode Step (15ms) = 395ms.
