id: cloud-2680
title: Quantifying Feedback Loop Amplification
topic: federated-learning
status: published
provenance: imported
scenario: A predictive policing model initially assigns equal patrol probability (1%) to 100 neighborhoods.
  After 6 months of deployment, patrol allocation correlates 0.95 with arrest data from patrols (more
  patrols → more arrests → more predicted crime → more patrols). If patrols increase observed crime rates
  by 20% from the baseline for patrolled areas, and decrease them by 20% for unpatrolled areas, calculate
  the predicted crime amplification for the top-10 neighborhoods after 3 retraining cycles.
details:
  realistic_solution: 'Initial crime probability: uniform 1% per neighborhood. Cycle 1: Top 10 neighborhoods
    get 3x patrols → 20% more arrests → model sees 1.2% crime rate. Bottom 90 neighborhoods with 0.5x
    patrols → fewer observed crimes → model sees 0.8%. Cycle 2: Top 10 now get even more patrols (model
    predicts them as high-crime). Crime rate: 1.2% × 1.2 = 1.44%. Bottom 90: 0.8% × 0.8 = 0.64%. Cycle
    3: Top 10: 1.44% × 1.2 = 1.73%. Bottom 90: 0.64% × 0.8 = 0.51%. After 3 cycles: top 10 predicted crime
    = 1.73% vs initial 1.0% = 73% amplification. Bottom 90 predicted crime = 0.51% vs initial 1.0% = 49%
    suppression. The model now ''believes'' top neighborhoods have 3.4x more crime than bottom ones —
    entirely from observation bias, not actual crime differences.'
  common_mistake: Assuming the model is 'learning real patterns.' The correlation between patrols and
    arrests is manufactured by the deployment itself — it is observation bias, not ground truth.
  napkin_math: '3 cycles of 20% amplification: 1.0 × 1.2³ = 1.73× for over-policed areas. 1.0 × 0.8³ =
    0.51× for under-policed areas. Ratio: 1.73/0.51 = 3.4× artificial disparity.'
