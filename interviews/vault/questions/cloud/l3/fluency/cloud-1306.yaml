id: cloud-1306
title: GPU DALI Preprocessing Latency
topic: latency-decomposition
status: published
provenance: imported
scenario: You are serving a vision model on an NVIDIA T4 GPU. The API receives 1080p JPEG images (~500KB).
  Currently, the CPU decodes the JPEG into a 1920x1080x3 FP32 tensor and transfers this uncompressed tensor
  over PCIe Gen3 x16 (16 GB/s) to the GPU for dynamic cropping and inference. CPU decoding takes 20ms
  per image; GPU resizing and inference takes 8ms. You propose moving JPEG decoding directly to the GPU
  using NVIDIA DALI. Assume GPU decoding takes 4ms. Calculate the new end-to-end latency per image and
  the reduction in PCIe data transfer volume per image.
details:
  realistic_solution: Transfer the 500KB compressed JPEG directly to the GPU instead of the uncompressed
    tensor. This eliminates the CPU decoding bottleneck and drastically reduces the PCIe payload.
  common_mistake: Failing to account for the massive difference in PCIe transfer size between a compressed
    JPEG and an uncompressed high-resolution FP32 tensor, focusing only on the CPU vs GPU compute time.
  napkin_math: 'Original payload: 1920 * 1080 * 3 channels * 4 bytes (FP32) ≈ 24.88 MB. New payload: 0.5
    MB. PCIe volume saved = ~24.38 MB per image. Original Latency: 20ms (CPU) + 24.88MB / 16GB/s (~1.55ms)
    + 8ms (GPU) = 29.55ms. New Latency: 0.5MB / 16GB/s (~0.03ms) + 4ms (GPU Decode) + 8ms (GPU Inf) ≈
    12.03ms. Latency drops by ~60%.'
