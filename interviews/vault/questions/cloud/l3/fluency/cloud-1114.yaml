id: cloud-1114
title: Declarative Autoscaling Calculation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You define a KServe `InferenceService` CRD for an embedding model running on NVIDIA L4 GPUs.
  The declarative deployment spec sets `containerConcurrency: 16` and `targetUtilization: 75%`. During
  peak load, the API gateway registers a steady arrival rate of 2,500 requests per second. Monitoring
  shows each request takes exactly 60ms to process. Calculate the exact number of L4 GPU replicas the
  orchestration engine will provision to satisfy this declarative state.'
details:
  realistic_solution: Calculate total system concurrency using Little's Law (Arrival Rate x Latency),
    then divide by the effective concurrency threshold per replica as defined in the declarative spec.
  common_mistake: Calculating capacity strictly by throughput per replica without applying Little's Law
    to find the true system-wide concurrency, or neglecting the 75% target utilization buffer.
  napkin_math: '1. Total System Concurrency = Arrival Rate * Processing Latency

    2. Total Concurrency = 2500 req/sec * 0.060 sec = 150 concurrent requests in flight.

    3. Effective Concurrency per Replica = containerConcurrency * targetUtilization

    4. Effective Concurrency = 16 * 0.75 = 12 requests per replica.

    5. Required Replicas = ceil(Total Concurrency / Effective Concurrency) = ceil(150 / 12) = 13 L4 GPU
    replicas.'
