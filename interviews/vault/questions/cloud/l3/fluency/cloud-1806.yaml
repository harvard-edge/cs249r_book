id: cloud-1806
title: RBAC Policy Binding Compression Factor
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud ML infrastructure manages 10,000 proprietary training datasets and supports 5,000 data
  scientists. Currently, permissions are assigned directly, with each dataset having an average of 500
  explicit user permissions. The security team is migrating to Role-Based Access Control (RBAC) across
  the distributed storage tier by consolidating access into 50 distinct roles. On average, each dataset
  requires permissions mapped to 5 roles, and each user is assigned to 2 roles. Calculate the reduction
  factor in the total number of IAM policy bindings required.
details:
  realistic_solution: Compute the total original bindings, then compute the sum of User-to-Role and Role-to-Resource
    bindings for RBAC, and divide the former by the latter to find the compression factor.
  common_mistake: Calculating only the role-to-resource bindings (50,000) while forgetting to account
    for the user-to-role assignments (10,000) in the final RBAC state.
  napkin_math: Direct Bindings = 10,000 datasets * 500 users = 5,000,000. RBAC Bindings = (5,000 users
    * 2 roles) + (10,000 datasets * 5 roles) = 10,000 + 50,000 = 60,000 bindings. Reduction Factor = 5,000,000
    / 60,000 ≈ 83.3x reduction.
