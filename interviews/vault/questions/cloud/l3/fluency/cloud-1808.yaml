id: cloud-1808
title: Roofline Model Analysis on A100
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying a custom Transformer model on an NVIDIA A100 GPU, which provides 312 TFLOPs
  of FP16 compute and 2.0 TB/s of HBM memory bandwidth. Profiling shows your workload has an arithmetic
  intensity of 150 FLOPs/byte. Calculate the expected theoretical maximum throughput and determine if
  the workload is compute-bound or memory-bound.
details:
  realistic_solution: 'First, calculate the hardware ridge point: 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte.
    Because the workload''s arithmetic intensity of 150 FLOPs/byte is less than the ridge point (150 <
    156), the workload is memory-bound. The theoretical maximum throughput is limited by memory bandwidth:
    150 FLOPs/byte * 2.0 TB/s = 300 TFLOPs.'
  common_mistake: Assuming the workload is compute-bound because 150 FLOPs/byte seems high, and mistakenly
    estimating the performance to be the peak 312 TFLOPs.
  napkin_math: Ridge Point = 312e12 FLOPs / 2.0e12 bytes = 156 FLOPs/byte. AI (150) < Ridge (156) -> Memory-Bound.
    Max Throughput = 150 FLOPs/byte * 2.0 TB/s = 300 TFLOPs.
