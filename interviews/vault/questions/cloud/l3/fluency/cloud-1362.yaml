title: FlashAttention SRAM Tiling Calculation
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are implementing a FlashAttention-style fused kernel on an NVIDIA A100 GPU. The hardware
  constraint is the 192 KB SRAM per Streaming Multiprocessor (SM). Your algorithm must load blocks of
  Query (Q), Key (K), Value (V), and Output (O) matrices into SRAM. Each block has dimensions B × d, where
  the head dimension d = 128 in FP16 (2 bytes/element). Assuming you allocate up to 128 KB of SRAM strictly
  for these four tensor blocks, calculate the maximum symmetric sequence block size (B) that fits.
details:
  realistic_solution: Co-design the algorithmic loop tiling parameter (B) to perfectly match the physical
    128 KB SRAM capacity by calculating the combined byte footprint of the Q, K, V, and O blocks.
  common_mistake: Choosing arbitrary algorithmic block sizes without calculating the physical byte footprint,
    leading to SRAM spilling into HBM and destroying the performance benefits of kernel fusion.
  napkin_math: '1 FP16 element = 2 bytes.

    Block size for Q, K, V, O = B * 128 * 2 = 256*B bytes each.

    Total memory for 4 blocks = 4 * 256*B = 1024*B bytes.

    Target SRAM = 128 KB = 131,072 bytes.

    1024*B = 131,072 => B = 128 tokens.'
