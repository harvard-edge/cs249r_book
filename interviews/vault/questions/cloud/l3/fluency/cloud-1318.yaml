id: cloud-1318
title: Analytical Gradient Inversion Complexity
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud federated learning aggregator receives unencrypted FP32 gradients from a mobile client
  training a neural network for financial profile classification. The first layer computes $y = Wx + b$,
  where the input $x$ is a user's private financial feature vector of size 4,096. A rogue server admin
  attempts an analytical gradient inversion attack on a client update where the batch size $B=1$. The
  received gradient $\nabla W$ has shape [1024, 4096] and $\nabla b$ has shape [1024]. Calculate the computational
  complexity (in FLOPs) required to perfectly reconstruct the client's private input $x$.
details:
  realistic_solution: Recognize that for a dense layer with $B=1$, the weight gradient is simply the outer
    product of the bias gradient (which equals the activation gradient) and the input vector. Reconstructing
    $x$ requires only a single vector-scalar division across the input dimension.
  common_mistake: Assuming gradient inversion always requires an expensive, iterative optimization process
    (e.g., using L-BFGS to match dummy gradients over thousands of steps) taking millions of FLOPs, while
    missing the closed-form vulnerability of the first dense layer.
  napkin_math: By chain rule, $\nabla W = \nabla b \otimes x^T$. Element-wise, $\nabla W_{i,j} = \nabla
    b_i \cdot x_j$. Therefore, the raw input features are exactly $x_j = \nabla W_{i,j} / \nabla b_i$.
    The attacker just picks any index $i$ where $\nabla b_i \neq 0$ and divides the $i$-th row of $\nabla
    W$ by that scalar. For an input size of 4,096, this requires exactly 4,096 floating-point divisions
    (~4 KFLOPs).
