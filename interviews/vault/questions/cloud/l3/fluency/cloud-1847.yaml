title: Data Pipeline Throughput Calculation for NVMe SSDs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'A cloud ML training node uses 8x A100 GPUs that collectively consume training data at a rate
  of 4 GB/s. The dataset is currently stored on a local PCIe Gen4 NVMe SSD as 500 million individual 4KB
  JSON files. The SSD specs are: 7.0 GB/s peak sequential read throughput, and 500K IOPS for 4KB random
  reads. Calculate the current read throughput, determine if it starves the GPUs, and propose a data format
  strategy to maximize throughput.'
details:
  realistic_solution: Repack the 4KB JSON files into large (e.g., 100MB+) contiguous archives using a
    format like WebDataset (tar) or TFRecord. This converts the I/O pattern from IOPS-bound random reads
    to bandwidth-bound sequential reads, unlocking the full 7.0 GB/s throughput.
  common_mistake: Assuming the advertised 7.0 GB/s sequential throughput applies to small files, and failing
    to calculate the IOPS-bound random read throughput which starves the GPUs.
  napkin_math: 'Current Random Read Throughput = 500,000 IOPS * 4 KB/IO = 2,000,000 KB/s = 2.0 GB/s. GPU
    Consumption = 4.0 GB/s. Since 2.0 GB/s < 4.0 GB/s, the GPUs are 50% starved for data. After repacking:
    Sequential Read Throughput = 7.0 GB/s, which exceeds the 4.0 GB/s requirement, eliminating the bottleneck.'
