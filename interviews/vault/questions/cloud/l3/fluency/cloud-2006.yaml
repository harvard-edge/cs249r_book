id: cloud-2006
title: Tensor Core Bottlenecks in GEMM
topic: roofline-analysis
status: published
provenance: imported
scenario: You are optimizing a custom dense layer on an NVIDIA A100 GPU (312 TFLOPS peak FP16 Tensor Core,
  2.0 TB/s memory bandwidth). The layer performs an FP16 matrix multiplication (GEMM) with dimensions
  M=8192, K=8192, N=8192. Calculate the arithmetic intensity, determine if the operation is compute-bound
  or memory-bound, and estimate the absolute minimum execution time.
details:
  realistic_solution: 'The operation requires 2 * 8192^3 = 1.1 TFLOPs. Total memory traffic involves reading
    two inputs and writing one output: 3 * (8192^2) * 2 bytes = 402 MB. The arithmetic intensity is 1.1
    TFLOPs / 402 MB = 2736 FLOPs/byte. The A100''s ridge point is 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte.
    Since 2736 >> 156, the operation is heavily compute-bound by the Tensor Cores. The minimum execution
    time is the theoretical compute time: 1.1 TFLOPs / 312 TFLOPS = 3.52 milliseconds.'
  common_mistake: Calculating arithmetic intensity without accounting for the output matrix write, assuming
    1 byte per element instead of 2 for FP16, or mixing up MACs (1 MAC = 2 FLOPs) with FLOPs.
  napkin_math: 'FLOPs = 2 * M * N * K = 2 * (8192^3) = 1.1e12.

    Bytes = 3 * (8192^2) * 2 = 402e6.

    Intensity = 1.1e12 / 402e6 = 2736 FLOPs/B.

    Ridge Point = 312e12 / 2.0e12 = 156 FLOPs/B.

    Min Time = 1.1 TFLOPs / 312 TFLOPS = 3.52 ms.'
