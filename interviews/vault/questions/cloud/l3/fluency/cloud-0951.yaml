schema_version: 1
id: cloud-0951
title: Carbon-Aware Workload Shifting
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: You are scheduling a 50-hour offline data preprocessing job for a foundation model on a cluster
  of 250 nodes (each node draws 4 kW). The data center has a PUE of 1.2. The local grid's carbon intensity
  will average 400 gCO2/kWh if started immediately, but will average 100 gCO2/kWh if delayed by 12 hours
  to align with renewable energy production. Calculate the total carbon emissions saved in metric tons
  by delaying the job.
details:
  realistic_solution: 'First, calculate total facility power including PUE: 250 nodes * 4 kW/node * 1.2
    = 1.2 MW. Then find total energy consumed: 1.2 MW * 50 hours = 60 MWh (or 60,000 kWh). Finally, multiply
    the energy by the difference in carbon intensity (400 - 100 = 300 gCO2/kWh, which is equivalent to
    0.3 metric tons/MWh) to get 18 metric tons of CO2 saved.'
  common_mistake: Forgetting to multiply the IT equipment power by the PUE (Power Usage Effectiveness)
    when calculating total energy consumption, which underestimates the total emissions saved.
  napkin_math: Power = 250 * 4kW * 1.2 PUE = 1.2 MW. Energy = 1.2 MW * 50h = 60 MWh. Carbon diff = 400g
    - 100g = 300 gCO2/kWh = 0.3 tCO2/MWh. Savings = 60 MWh * 0.3 tCO2/MWh = 18 tons CO2.
