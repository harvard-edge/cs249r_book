id: cloud-1167
title: Rolling Window Dynamic Benchmarking Cost
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are designing a dynamic benchmarking system for a cloud-based LLM to prevent test set saturation.
  The system generates 500 fresh evaluation prompts daily using an Oracle model (generation cost: $0.03/prompt).
  Your candidate model is then evaluated once daily on a rolling window of the last N days of prompts.
  Evaluating the candidate model costs $0.002 per prompt. If your strict 30-day monthly budget for this
  dynamic benchmarking pipeline is $1,500, calculate the maximum rolling window size (N days) you can
  afford.'
details:
  realistic_solution: Deduct the fixed monthly prompt generation cost from the total budget, then divide
    the remaining daily budget by the candidate model's cost to evaluate one day's worth of prompts to
    find the maximum window size N.
  common_mistake: Failing to account for the cumulative daily inference costs of the candidate model on
    the entire rolling window, and only considering the flat rate of generating new prompts.
  napkin_math: 'Monthly Oracle generation: 30 days * 500 prompts * $0.03 = $450. Remaining monthly budget:
    $1500 - $450 = $1050. Daily eval budget: $1050 / 30 = $35/day. Cost to evaluate one day''s batch:
    500 * $0.002 = $1.00. Therefore, N = $35 / $1.00 = 35 days.'
