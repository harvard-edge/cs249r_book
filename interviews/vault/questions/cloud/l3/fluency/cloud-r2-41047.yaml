schema_version: 1
id: cloud-r2-41047
title: GPU Lease Duration and Scheduling Efficiency
topic: scheduling-resource-management
status: published
provenance: imported
scenario: Your MI300X cluster allows job wall times from 1 hour to 7 days. You observe that jobs with
  7-day wall times have 15% actual runtime utilization (they finish early but reserved GPUs remain idle).
  Propose a wall time policy that improves cluster efficiency.
details:
  realistic_solution: 'Multi-pronged approach: (1) Adaptive wall time: allow users to request up to 7
    days but implement ''wall time right-sizing.'' Track actual runtime distributions per user/job-type.
    If a user consistently finishes in 6 hours but requests 7 days, suggest (and eventually enforce) a
    12-hour wall time with automatic requeue. (2) Shrink-to-fit: when a job completes early, immediately
    release GPUs. This sounds obvious but requires proper job exit detection — many frameworks leave zombie
    processes. Use job epilog scripts with nvidia-smi to verify GPU release. (3) Backfill with short wall
    times: Slurm''s backfill scheduler can start short jobs in the ''shadow'' of long reservations. To
    help backfill work, require runtime estimates (Slurm --time flag) and penalize inaccurate estimates
    (if a job runs 2× longer than estimated, lower the user''s priority). (4) Time-boxing: Tier 1 (0-1h,
    highest priority, for inference/debugging), Tier 2 (1-8h, medium priority, for experiments), Tier
    3 (8h-7d, lowest priority, preemptible). Tier 3 jobs must checkpoint every hour or risk being preempted
    without recovery.'
  common_mistake: Simply capping wall times at a short duration. This forces users to implement checkpointing
    and restart logic, increasing complexity and reducing user satisfaction.
  napkin_math: '15% utilization on 7-day jobs: 85% waste. If 30% of cluster runs 7-day jobs: 0.3 × 0.85
    = 25.5% cluster-wide waste. Right-sizing to 85% utilization recovers 0.30 × (0.85 - 0.15) = 0.30 ×
    0.70 = 21% cluster capacity.'
