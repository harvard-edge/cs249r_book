id: cloud-1199
title: Carbon Footprint Calculation for GPU Clusters
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: You are deploying a cluster of 1,024 H100 GPUs in a region powered largely by renewable energy,
  with a grid carbon intensity of 50 g CO2e/kWh. Each GPU and its proportional share of the server chassis
  consumes 1.0 kW of continuous power and has an embodied carbon footprint of 2,500 kg CO2e. The datacenter
  operates at a PUE of 1.2. Assuming 100% utilization over a 3-year hardware lifecycle, calculate the
  total lifecycle carbon footprint and determine what percentage of it is embodied carbon.
details:
  realistic_solution: Calculate the total carbon by summing operational emissions and hardware manufacturing
    emissions. In a green grid, embodied carbon becomes the dominant factor, often exceeding operational
    carbon over a 3-year hardware refresh cycle.
  common_mistake: Focusing solely on operational carbon (PUE and grid intensity) and assuming running
    on renewable energy makes the cluster 'zero carbon', while completely ignoring the massive manufacturing
    emissions.
  napkin_math: Embodied Carbon = 1,024 * 2.5 tCO2e = 2,560 tCO2e. Operational Energy = 1,024 kW * 1.2
    PUE * 8,760 hours/yr * 3 yrs = 32,292,864 kWh. Operational Carbon = 32,292,864 kWh * 0.05 kg/kWh =
    1,614 tCO2e. Total Footprint = 2,560 + 1,614 = 4,174 tCO2e. Embodied Carbon % = 2,560 / 4,174 ≈ 61.3%.
