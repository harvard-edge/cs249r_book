id: cloud-r2-41008
title: TP Memory Savings Calculation
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: A 30B parameter model uses BF16 weights (60 GB total). You apply TP=4 across four A100-80GB
  GPUs. How much weight memory does each GPU hold? What about optimizer states during training with AdamW
  in mixed precision?
details:
  realistic_solution: 'Weight memory per GPU: ~60 GB / 4 = 15 GB (BF16 weights split across TP ranks).
    Small components like positional embeddings and final LayerNorm are replicated but negligible (<100
    MB). For AdamW mixed-precision training, per-parameter overhead is: FP32 master weight (4B) + FP32
    momentum (4B) + FP32 variance (4B) + BF16 gradient (2B) = 14B per parameter, plus the 2B BF16 weight
    = 16B total. With 30B/4 = 7.5B params per GPU: 7.5B × 16B = 120 GB per GPU. This exceeds A100-80GB!
    Solutions: add ZeRO Stage 1 (partition optimizer states across DP ranks) or use activation checkpointing
    to reclaim memory from activations.'
  common_mistake: Assuming TP=4 means each GPU holds exactly 1/4 of everything. While weights are split
    4 ways, some parameters like embedding tables and final LayerNorms may be replicated, and optimizer
    states scale with the local parameter count.
  napkin_math: 'TP=4: 30B/4 = 7.5B params per GPU. Weight only: 7.5B × 2B = 15 GB. Training total: 7.5B
    × 16B = 120 GB → exceeds A100-80GB.'
