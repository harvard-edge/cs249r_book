id: cloud-1987
title: Synchronous Checkpoint Overhead Calculation
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 300B parameter language model using mixed-precision Adam. The training state
  checkpoint must include FP16 parameters, FP32 master weights, and FP32 Adam moments (momentum and variance).
  The cluster uses synchronous checkpointing, pausing all workers to write to a parallel file system with
  an effective aggregate write bandwidth of 600 GB/s. If you trigger a checkpoint every 20 minutes of
  active compute time, calculate the exact duration of the training pause per checkpoint and the resulting
  checkpointing overhead as a percentage of total runtime.
details:
  realistic_solution: Determine the full state size per parameter (14 bytes), calculate the total checkpoint
    footprint (4.2 TB), divide by the storage bandwidth to find the pause duration (7 seconds), and calculate
    overhead as pause time over total cycle time (0.58%).
  common_mistake: Calculating the checkpoint size based solely on the FP16 model weights (600 GB) instead
    of the full training state, which drastically underestimates the pause time and operational overhead.
  napkin_math: 'State per parameter: 2B (FP16 weights) + 4B (FP32 master weights) + 8B (FP32 Adam moments)
    = 14 Bytes.

    Total state size: 300,000,000,000 * 14 = 4.2 TB (4200 GB).

    Pause duration: 4200 GB / 600 GB/s = 7 seconds.

    Total cycle time: 1200s (compute) + 7s (pause) = 1207 seconds.

    Overhead: 7 / 1207 ≈ 0.58%.'
