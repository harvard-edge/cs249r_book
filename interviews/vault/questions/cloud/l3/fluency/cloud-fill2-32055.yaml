id: cloud-fill2-32055
title: 'MoE Memory Footprint: Why Sparse Models Need More VRAM'
topic: mixture-of-experts
status: published
provenance: imported
scenario: Mixtral 8×7B has 46.7B total parameters but only activates ~13B per token (top-2 of 8 experts).
  Compare its VRAM requirement against a dense 13B model for inference on an MI300X (192 GB HBM3). Why
  can't you just load the 'active' 13B parameters?
details:
  realistic_solution: 'Dense 13B in FP16: 13B × 2B = 26 GB. Mixtral 8×7B in FP16: 46.7B × 2B = 93.4 GB.
    Despite activating only 13B parameters per token, all 46.7B must be loaded because: (1) the router
    dynamically selects experts per token — different tokens in the same batch may use different experts,
    (2) across a batch, all 8 experts are statistically likely to be activated (probability that any expert
    is unused with 256 tokens × top-2: (7/8)^512 ≈ 10^-29), (3) swapping experts between GPU and CPU memory
    per-token is impractical (PCIe bandwidth bottleneck). On MI300X with 192 GB: 93.4 GB weights fit comfortably,
    leaving 98.6 GB for KV cache and activations. On H100 with 80 GB: need INT4 quantization (93.4 / 4
    = 23.4 GB) or tensor parallelism across 2 GPUs. This is the fundamental MoE tradeoff: better compute
    efficiency (only 13B FLOPS) but worse memory efficiency (all 46.7B stored).'
  common_mistake: Thinking you only need to load the active parameters. All 46.7B parameters must reside
    in GPU memory because any token might route to any expert — you cannot predict which experts will
    be needed for the next token.
  napkin_math: 'Dense 13B FP16: 26 GB VRAM. Mixtral 8×7B FP16: 93.4 GB. Memory ratio: 3.6× more for MoE
    despite same active FLOPS. INT4 Mixtral: 23.4 GB. On H100 (80 GB): dense 13B fits easily, MoE needs
    quantization. MI300X (192 GB): MoE fits in FP16.'
