schema_version: 1
id: cloud-1444
title: Calculating Single-Token Latency on A100
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a 7 billion parameter LLM for single-token generation (batch size 1) on a
  single NVIDIA A100 80GB GPU. The A100 provides a peak BF16 compute throughput of 312 TFLOPS and an HBM2e
  memory bandwidth of 2039 GB/s. Both weights and activations use BF16 precision. Assume the system has
  a fixed kernel launch and framework overhead of 1.5 ms per forward pass. Calculate the expected latency
  for generating a single token and identify the primary bottleneck using the Iron Law of ML Systems.
details:
  realistic_solution: 'Apply the Iron Law of ML Systems: Total Latency = (Data Volume / Bandwidth) + (Operations
    / Peak Compute) + Fixed Overhead. First, calculate the data volume: 7B params * 2 bytes = 14 GB. Memory
    time = 14 GB / 2039 GB/s ≈ 6.86 ms. Next, calculate compute time: 2 Ops/param * 7B = 14 GFLOPs. Compute
    time = 14 GFLOPs / 312,000 GFLOPs ≈ 0.04 ms. Finally, add the 1.5 ms overhead. The total latency is
    ~8.4 ms, and the generation process is profoundly memory bandwidth bound.'
  common_mistake: Calculating only the compute time (Ops / Peak FLOPs) while ignoring the time required
    to load the model weights from HBM into the SM registers, leading to a massive underestimation of
    latency.
  napkin_math: 'Time = T_memory + T_compute + T_overhead

    T_memory = (7e9 * 2 bytes) / (2039e9 bytes/s) = 6.86 ms

    T_compute = (7e9 * 2 FLOPs) / (312e12 FLOPs/s) = 0.04 ms

    T_overhead = 1.5 ms

    Total T = 6.86 + 0.04 + 1.5 = 8.4 ms'
