id: cloud-2523
title: Cloud Transformation Lineage L3 0
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your data pipeline has 8 transformation steps. Each step reads its input, processes it, and
  writes output. You want to add lineage metadata (hash, timestamp, code version, params) to each step.
  Estimate the storage and latency overhead.
details:
  realistic_solution: 'Per-step lineage metadata: SHA-256 hash of input (32 bytes) + output hash (32 bytes)
    + timestamp (8 bytes) + code git SHA (20 bytes) + params JSON (~500 bytes) ≈ 600 bytes per step. 8
    steps = 4.8 KB per pipeline run. If you run 1000 pipeline runs/day: 4.8 MB/day = ~1.75 GB/year. Latency:
    computing SHA-256 on a 10 GB dataset at ~1 GB/s = 10s per hash, 2 hashes per step = 20s, 8 steps =
    160s total. This is the main cost — hashing large intermediate datasets.'
  common_mistake: Storing full copies of intermediate datasets for lineage instead of just hashes. This
    explodes storage costs — a hash is 32 bytes vs. gigabytes for the actual data.
  napkin_math: 'Metadata: 600 bytes × 8 steps = 4.8 KB/run. 1000 runs/day = 4.8 MB/day. Hashing: 10 GB
    dataset at 1 GB/s = 10s. 8 steps × 2 hashes × 10s = 160s overhead per run.'
