schema_version: 1
id: cloud-1999
title: Fan-out Tail Latency Probability
topic: tail-latency
status: published
provenance: imported
scenario: Your e-commerce recommendation system fans out each user request to 50 independent ML ranking
  microservices running on NVIDIA T4 GPUs. Each service evaluates a subset of the catalog. The median
  latency of a single service is 20ms, but the 99th percentile (p99) latency is 200ms due to occasional
  garbage collection and varying batch sizes. Calculate the percentage of overall user requests that will
  experience a latency of 200ms or higher, assuming the system must wait for all 50 responses (scatter-gather).
details:
  realistic_solution: Calculate the probability that at least one of the 50 services hits the p99 latency.
    The correct approach yields ~39.5%. Mitigate this by implementing hedged requests (sending a duplicate
    request if the first takes too long) or enforcing a strict 50ms timeout and returning partial results.
  common_mistake: Assuming overall system latency remains close to the median, or linearly scaling the
    1% probability (0.01 * 50 = 50%) instead of correctly calculating the joint probability of independent
    events.
  napkin_math: 'P(1 node < 200ms) = 0.99

    P(all 50 nodes < 200ms) = 0.99^50 ≈ 0.605

    P(system >= 200ms) = 1 - 0.605 = 0.395 (39.5% of user requests hit the tail)'
