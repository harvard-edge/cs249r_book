id: cloud-0705
title: 'The Tensor Parallelism Scaling Trap: Collective Communication'
topic: collective-communication
status: published
provenance: imported
scenario: You are a Staff ML Systems Engineer diagnosing a customer's multi-node training job. They are
  training a 70B parameter LLM and have scaled from an 8-GPU H100 node (using 8-way tensor parallelism)
  to a 16-GPU setup across two identical nodes connected by InfiniBand NDR. They report that their training
  throughput only improved by 1.2x, not the near-linear scaling they expected, and they suspect a faulty
  InfiniBand link is to blame. You are asked to diagnose whether this performance is expected or anomalous.
  Using the provided hardware specs, what is the most likely cause of the poor scaling?
details:
  realistic_solution: The performance is expected, and the InfiniBand link is not faulty. The bottleneck
    is the fundamental bandwidth difference between the intra-node NVLink fabric and the inter-node InfiniBand
    network. Tensor parallelism requires frequent all-reduce operations on large activation tensors. While
    these are extremely fast on the 900 GB/s NVLink fabric within a single node, forcing this communication
    over the much slower 50 GB/s InfiniBand link creates a massive communication bottleneck that dominates
    the total step time, leading to poor scaling efficiency.
  common_mistake: Engineers often blame a specific hardware component for being 'faulty' or misconfigured
    when they see poor scaling. They underestimate the fundamental, architectural gap between intra-node
    (NVLink) and inter-node (InfiniBand) bandwidth, failing to see that the system is behaving exactly
    as the laws of physics dictate. They might chase down software or configuration issues when the bottleneck
    is physical.
  napkin_math: 8-way Tensor Parallelism inside a node uses H100 NVLink (900GB/s). Expanding TP to 16 across
    two nodes forces communications over InfiniBand NDR (50GB/s). For a 70B model (hidden dim 8192, batch
    4, seq 2048), an activation tensor is 4 * 2048 * 8192 * 2B = 134MB. Over NVLink, an all-reduce takes
    ~0.15ms. Over IB, it takes 134MB / 50GB/s = 2.68ms (18x slower per layer).
