title: Minimizing Pipeline Bubble Overhead
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are configuring a 1F1B (One-Forward-One-Backward) pipeline parallel training job for an
  LLM across an 8-GPU node (pipeline stages p=8, data parallelism dp=1). Your optimizer requires a global
  batch size of exactly 1024. To maximize GPU utilization, you must keep the pipeline bubble idle time
  strictly below 10% of the total step time. Calculate the minimum valid number of micro-batches (m) needed,
  and determine the maximum possible micro-batch size.
details:
  realistic_solution: 'Apply the bubble fraction formula: (p - 1) / (m + p - 1) < 0.10. For 8 stages,
    m > 63. Since m must divide the global batch size of 1024, the smallest valid m is 64. This yields
    a micro-batch size of 16.'
  common_mistake: Candidates often forget the 1F1B bubble formula (p-1)/(m+p-1) or fail to enforce that
    the number of micro-batches must perfectly divide the global batch size, leading to invalid fractional
    micro-batch sizes.
  napkin_math: 'Bubble Fraction = (p - 1) / (m + p - 1)

    (8 - 1) / (m + 8 - 1) < 0.10

    7 / (m + 7) < 0.10 => m > 63

    Next valid integer dividing 1024: m = 64

    Micro-batch size = 1024 / 64 = 16'
