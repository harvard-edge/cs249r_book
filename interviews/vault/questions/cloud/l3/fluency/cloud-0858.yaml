schema_version: 1
id: cloud-0858
title: E-commerce Recommendation Alignment Gap
topic: federated-learning
status: published
provenance: imported
scenario: You deploy a DLRM recommendation model on a cluster of AWS p4d.24xlarge instances. The model
  was trained to maximize Click-Through Rate (CTR) and achieved a 12% relative increase in offline evaluations.
  In production, serving latency is well within the 20ms P99 budget and throughput is stable. However,
  daily revenue has unexpectedly dropped by 83%. Upon investigation, the model is predominantly recommending
  cheap, high-click probability items (e.g., $2 phone cases) instead of high-margin core products (e.g.,
  $500 electronics).
details:
  realistic_solution: Redefine the model's objective function from pure CTR to Expected Value (e.g., CTR
    * Conversion Rate * Margin). Implement a multi-task learning architecture (like MMOE) to jointly predict
    both the probability of a click and the expected purchase value.
  common_mistake: Assuming the performance drop is due to concept drift or serving infrastructure issues,
    and attempting to fix it by retraining with more recent data or deploying a larger, more complex architecture
    to further improve CTR.
  napkin_math: 'Offline, the model increased Click-Through Rate (CTR) by 12% (e.g., 2.0% -> 2.24%). But
    clicks don''t equal purchases! If the old model yielded 2% CTR, 5% conversion, and $40 margin/item
    on 1M impressions: 1M * 0.02 * 0.05 * $40 = $40k. If the new model predicts cheap clickbait: 2.24%
    CTR, 3% conversion, $10 margin: 1M * 0.0224 * 0.03 * $10 = $6.7k. A $33k revenue collapse!'
