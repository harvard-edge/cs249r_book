id: cloud-0864
title: Ring-AllReduce Transfer Time Calculation
topic: collective-communication
status: published
provenance: imported
scenario: You are training a 10 billion parameter language model in FP16 precision across a single node
  containing 8 GPUs. The GPUs are connected via a ring topology with a unidirectional link bandwidth of
  50 GB/s between adjacent GPUs. Calculate the theoretical minimum time required to synchronize the gradients
  across all GPUs using the standard Ring-AllReduce algorithm.
details:
  realistic_solution: 'Ring-AllReduce operates in two phases: scatter-reduce and all-gather. Each phase
    transfers `((N-1)/N) * Total Size` per node. For 8 GPUs and 20 GB of gradients (FP16), the total data
    transmitted by each GPU is `2 * (7/8) * 20 GB = 35 GB`. Given the 50 GB/s bandwidth, the synchronization
    takes 0.7 seconds.'
  common_mistake: Candidates often assume the total data transferred per node is simply 2x the model size
    (40 GB) or exactly the model size (20 GB), forgetting the `(N-1)/N` efficiency factor inherent to
    the chunked scatter-reduce and all-gather phases.
  napkin_math: 'Gradient Size = 10B params * 2 bytes/param (FP16) = 20 GB

    Data Transferred = 2 * ((N-1) / N) * Size

    Data Transferred = 2 * (7 / 8) * 20 GB = 1.75 * 20 GB = 35 GB

    Time = Data / Bandwidth = 35 GB / 50 GB/s = 0.7 seconds'
