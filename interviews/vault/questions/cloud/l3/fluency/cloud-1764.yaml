id: cloud-1764
title: Symmetric INT8 Scale and Error Simulation
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are deploying a 1.2B parameter transformer model for real-time translation on NVIDIA T4
  GPUs. Post-Training Quantization (PTQ) drops the BLEU score by 4 points due to outlier activations in
  the feed-forward layers. You switch to Quantization-Aware Training (QAT) using symmetric INT8 quantization
  for activations. During the forward pass of QAT, a specific FFN layer activation tensor has an observed
  maximum magnitude of 12.7. For an incoming FP32 activation value of 3.55, calculate the quantization
  scale factor S, its quantized INT8 integer representation, and the simulated quantization error injected
  into the forward pass.
details:
  realistic_solution: For symmetric INT8 quantization mapped to the range [-127, 127], the scale factor
    is S = max(|v|) / 127. The FP32 value is divided by S, rounded to the nearest integer, and then multiplied
    back by S to simulate the quantization noise. The network learns to adapt to this rounding error during
    backpropagation via the Straight-Through Estimator.
  common_mistake: Calculating the scale factor using the full asymmetric [-128, 127] range which breaks
    perfect symmetry, or failing to de-quantize the integer back to FP32 during the forward pass to compute
    the simulated quantization error.
  napkin_math: Scale S = 12.7 / 127 = 0.1. Quantized integer q = round(x / S) = round(3.55 / 0.1) = 36.
    Fake-quantized FP32 value x' = q * S = 36 * 0.1 = 3.6. Simulated quantization error = x' - x = 3.6
    - 3.55 = +0.05.
