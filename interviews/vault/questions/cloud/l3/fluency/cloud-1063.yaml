id: cloud-1063
title: ASIC TCO Break-Even Analysis
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are evaluating whether to build a custom ASIC for an internal recommendation model. The
  Non-Recurring Engineering (NRE) cost for the ASIC is $50M. Over a 3-year lifespan, a standard GPU has
  a TCO (CAPEX + OPEX) of $10,000 and processes 10,000 queries per second (QPS). The custom ASIC has a
  3-year TCO of $1,000 and processes 5,000 QPS. Calculate the break-even deployment scale (in terms of
  ASICs) required to justify the $50M NRE cost.
details:
  realistic_solution: Normalize the TCO to a common throughput unit. It takes 2 ASICs to match the throughput
    of 1 GPU. Calculate the savings per GPU-equivalent throughput, and divide the NRE by this savings
    to find the break-even scale.
  common_mistake: Comparing the TCO per chip directly without normalizing for throughput, leading candidates
    to falsely conclude the savings is $9,000 per chip instead of calculating cost per unit of throughput.
  napkin_math: 2 ASICs = 1 GPU throughput (10k QPS). 2 ASIC TCO = $2,000. 1 GPU TCO = $10,000. Savings
    per 10k QPS = $8,000. Break-even points = $50,000,000 / $8,000 = 6,250 GPU-equivalents. Break-even
    ASICs = 6,250 * 2 = 12,500 ASICs.
