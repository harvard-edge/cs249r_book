id: cloud-2642
title: Determining Bottleneck from Hardware Balance
topic: roofline-analysis
status: published
provenance: imported
scenario: 'A self-attention layer with sequence length 2048 and head dimension 64 computes Q×K^T: a (2048×64)
  × (64×2048) matmul. It performs 2×2048×2048×64 FLOPs and loads 2×2048×64×2=524,288 bytes. Is this compute-bound
  or memory-bound on A100?'
details:
  realistic_solution: 'FLOPs = 2 × 2048 × 2048 × 64 = 536,870,912 ≈ 537M FLOPs. Data loaded: input matrices
    Q and K, each 2048×64 in FP16 = 2048×64×2 = 262,144 bytes each. Total = 524,288 bytes. Arithmetic
    intensity = 537M / 524,288 = 1,024 FLOPs/byte. A100 ridge point = 156 FLOPs/byte. Since 1,024 >> 156,
    this matmul is compute-bound on A100. Expected throughput is limited by peak FLOPS (312 TFLOPS), not
    bandwidth. Time estimate: 537M FLOPs / 312e12 FLOPS = 1.72 μs. However, this is a single attention
    head; with 16 heads the total is 16× larger. The attention softmax and value multiplication that follow
    have much lower arithmetic intensity and may be memory-bound.'
  common_mistake: Forgetting that Q×K^T is compute-bound but the softmax that follows is memory-bound.
    The overall attention block is a mix of both regimes.
  napkin_math: AI = 537M FLOPs / 0.5MB = 1,024 FLOPs/byte >> 156 ridge point. Compute-bound. Time ≈ 537M/312T
    = 1.7μs per head.
