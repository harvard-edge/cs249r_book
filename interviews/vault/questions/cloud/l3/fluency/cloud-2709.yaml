schema_version: 1
id: cloud-2709
title: PS Bandwidth Bottleneck
topic: data-parallelism
status: published
provenance: imported
scenario: You have 32 workers and 4 parameter servers connected via 100 Gbps Ethernet. Each worker pushes
  2GB of gradients per step. Estimate the minimum gradient push time and identify the bottleneck.
details:
  realistic_solution: 'Total gradient volume: 32 workers × 2 GB = 64 GB per step. With 4 PS shards, each
    server receives 64/4 = 16 GB of gradients. Each server has a 100 Gbps (12.5 GB/s) link. Time to receive
    16 GB: 16/12.5 = 1.28 seconds just for the push phase. The pull phase is similar: each server sends
    16 GB of updated weights back. Total PS communication: ~2.56 seconds per step. With ring-AllReduce
    on the same network, each node would send/receive ~2×(31/32)×2 ≈ 3.9 GB, taking 3.9/12.5 ≈ 0.31 seconds.
    The PS approach is ~8x slower because all traffic funnels through 4 servers.'
  common_mistake: Dividing total data by total network bandwidth without considering that each server
    only has one 100 Gbps link, creating a per-server bottleneck.
  napkin_math: 'Per PS: 16 GB / 12.5 GB/s = 1.28s push + 1.28s pull = 2.56s. Ring AllReduce: ~3.9 GB /
    12.5 GB/s ≈ 0.31s. PS is ~8x slower.'
