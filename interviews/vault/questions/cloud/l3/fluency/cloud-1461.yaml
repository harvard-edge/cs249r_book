schema_version: 1
id: cloud-1461
title: Calculating KL Divergence for Feature Drift
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'A cloud recommender system expects an age group feature distribution of P = {18-25: 0.5, 26-35:
  0.3, 36+: 0.2}. Recent production traffic Q has shifted to {18-25: 0.2, 26-35: 0.5, 36+: 0.3}. The monitoring
  system is configured to fire a severity-1 alert if the drift distance exceeds 0.20 nats. Calculate the
  KL Divergence D_KL(P||Q) to determine if the alert should fire.'
details:
  realistic_solution: Compute the asymmetric D_KL(P||Q) by summing P(x) * ln(P(x)/Q(x)) over all bins,
    yielding 0.224 nats, which correctly triggers the drift alert.
  common_mistake: Calculating D_KL(Q||P) instead of D_KL(P||Q), or assuming the divergence is symmetric,
    which would yield ~0.193 nats and incorrectly bypass the alert threshold.
  napkin_math: 'D_KL(P||Q) = 0.5 * ln(0.5/0.2) + 0.3 * ln(0.3/0.5) + 0.2 * ln(0.2/0.3)

    = 0.5 * ln(2.5) + 0.3 * ln(0.6) + 0.2 * ln(0.667)

    ≈ 0.5 * 0.916 + 0.3 * (-0.511) + 0.2 * (-0.405)

    ≈ 0.458 - 0.153 - 0.081 = 0.224 nats (> 0.20 threshold).'
