schema_version: 1
id: cloud-new-50019
title: Evaluating torch.compile Backend Portability Across Accelerators
topic: software-portability
status: published
provenance: imported
scenario: 'PyTorch 2.x''s torch.compile offers multiple backends: ''inductor'' (default, CUDA/CPU), ''openxla''
  (TPU), and experimental AMD support. You want to write model code that torch.compile can optimize for
  any backend. What are the portability constraints?'
details:
  realistic_solution: 'For maximum portability: (1) Avoid torch.autograd.Function custom ops (cause graph
    breaks on all backends). (2) Use only standard torch ops from the core aten operator set. (3) Avoid
    data-dependent control flow (breaks XLA backend). (4) Avoid in-place ops on views (breaks inductor
    fusion). (5) Test with TORCH_COMPILE_DEBUG=1 on each backend to identify backend-specific graph breaks.
    The inductor backend for CUDA generates Triton kernels; the AMD path generates similar Triton but
    with ROCm-specific tuning; the XLA path generates HLO graphs.'
  common_mistake: Assuming torch.compile makes any PyTorch code automatically portable. In practice, each
    backend has different graph break triggers, and inductor's CUDA codegen is far more mature than the
    AMD or XLA backends.
  napkin_math: 'Typical torch.compile speedup on CUDA inductor: 1.3-2x over eager mode. On AMD via inductor:
    1.1-1.5x (less tuned). On TPU via openxla: 1.5-3x (XLA benefits most from whole-graph compilation).
    The variance is the portability tax.'
