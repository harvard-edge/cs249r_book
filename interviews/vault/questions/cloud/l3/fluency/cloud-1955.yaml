id: cloud-1955
title: Datacenter Idle GPU Static Power Scaling
topic: power-budgeting
status: published
provenance: imported
scenario: A cloud provider operates a cluster of 1,000 modern GPUs. During off-peak hours, 800 GPUs sit
  idle but remain powered on. To save facility cooling costs, the datacenter allows the ambient temperature
  to rise, increasing the idle chip temperature from 40°C to 70°C. Given a base static power (leakage)
  of 75W per GPU at 40°C, and knowing that static power doubles for every 15°C increase in temperature,
  calculate the total power wasted by these idle GPUs, including a datacenter PUE of 1.2.
details:
  realistic_solution: Apply the exponential scaling factor based on the temperature delta to the base
    static power. Then, multiply the resulting static power by the number of idle GPUs and the PUE to
    find the true facility-level power waste.
  common_mistake: Assuming idle GPUs consume zero power (focusing only on dynamic power) or assuming static
    power scales linearly rather than exponentially with temperature.
  napkin_math: 'Temperature delta = 70°C - 40°C = 30°C.

    Leakage scaling factor = 2^(30 / 15) = 2^2 = 4x.

    Static power per GPU at 70°C = 75W * 4 = 300W.

    Total IT power waste (800 GPUs) = 800 * 300W = 240 kW.

    Total facility waste (PUE 1.2) = 240 kW * 1.2 = 288 kW.'
