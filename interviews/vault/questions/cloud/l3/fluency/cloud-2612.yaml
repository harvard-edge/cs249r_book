id: cloud-2612
title: Federated Learning Communication Cost
topic: federated-learning
status: published
provenance: imported
scenario: 'A federated network has 100 edge devices training a 50M parameter model in FP32. Each round:
  devices download the global model, train locally, upload updated weights. Calculate bandwidth per round
  and for 500 rounds.'
details:
  realistic_solution: 'Model size = 50M params × 4 bytes (FP32) = 200 MB. Per round per device: download
    200 MB + upload 200 MB = 400 MB. Total per round across 100 devices: 100 × 400 MB = 40 GB of network
    traffic. For 500 rounds: 500 × 40 GB = 20 TB total bandwidth. In practice, gradient compression (top-k
    sparsification, quantization to INT8) can reduce upload size by 10-100x. With 10x compression on uploads
    only: 100 × (200 + 20) MB × 500 = 11 TB. This communication overhead is why federated learning favors
    more local epochs per round to reduce the number of communication rounds needed.'
  common_mistake: Forgetting that communication is bidirectional — devices must both download the global
    model and upload their updates each round.
  napkin_math: '50M × 4B = 200MB model. Per round: 100 devices × 400MB = 40GB. 500 rounds = 20TB total.
    With 10x compression: ~11TB.'
