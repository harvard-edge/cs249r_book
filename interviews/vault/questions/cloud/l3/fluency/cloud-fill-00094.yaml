id: cloud-fill-00094
title: Optimizing Dense GEMM on AMD MI300X with Weight-Stationary Dataflow
topic: systolic-dataflow
status: published
provenance: imported
scenario: You're tasked with optimizing a critical dense matrix multiplication (GEMM) `C = A * B` for
  a large AI model on the AMD MI300X. Matrix `A` is `65536x512` (FP16) and `B` is `512x65536` (FP16).
  The MI300X features 192 GB HBM3, 1,307 TFLOPS FP16 sparse peak, and 5.3 TB/s HBM3 bandwidth. Your team
  is exploring a weight-stationary dataflow on the MI300X's accelerator. Describe this dataflow and perform
  napkin math to analyze its performance implications.
details:
  realistic_solution: For a weight-stationary dataflow, the 'weight' matrix (often the smaller dimension
    matrix, B in this case) is loaded into on-chip memory (e.g., systolic array buffers) and reused across
    many computations. Input activations (rows/tiles of A) stream in, and partial sums accumulate on-chip
    before being written out. Tiling strategies are crucial for managing the memory footprint of the large
    output matrix C and minimizing costly HBM3 accesses, ensuring that computation is maximized per data
    transfer.
  common_mistake: Overlooking the specific 'sparse' designation for the peak TFLOPS and directly applying
    it to dense operations, or miscalculating the total data movement required for the large output matrix
    C, especially in a tiled, weight-stationary scenario.
  napkin_math: "1. **Total FLOPs:** For a 65536x512 * 512x65536 FP16 GEMM, total FLOPs = 2 * M * K * N\
    \ = 2 * 65536 * 512 * 65536 ≈ 4.4 TFLOPS.\n2. **Minimum HBM3 Data Transfer:** Assuming optimal weight-stationary\
    \ tiling, matrices A (65536x512 FP16 = 64 MB) and B (512x65536 FP16 = 64 MB) are fetched, and output\
    \ C (65536x65536 FP16 = 8 GB) is written. Total minimum HBM3 transfer = 64 MB + 64 MB + 8 GB = 8.125\
    \ GB.\n3. **Operational Intensity:** OI = FLOPs / Bytes = (4.4 * 10^12 FLOPs) / (8.125 * 10^9 Bytes)\
    \ ≈ 541 FLOPs/Byte.\n4. **Compute vs. Memory Bound Analysis:**\n   - Minimum time due to compute (1,307\
    \ TFLOPS FP16 sparse): 4.4 TFLOPS / 1,307 TFLOPS/s ≈ 0.0034 seconds.\n   - Minimum time due to memory\
    \ (5.3 TB/s): 8.125 GB / 5.3 TB/s ≈ 0.0015 seconds.\n   Since the minimum time required for memory\
    \ transfer (0.0015s) is less than the minimum time for computation (0.0034s), the operation is likely\
    \ **compute-bound** on the MI300X, assuming the 1,307 TFLOPS FP16 sparse peak can be effectively utilized\
    \ for this dense GEMM. If the effective dense FP16 TFLOPS are significantly lower, it could become\
    \ memory-bound."
