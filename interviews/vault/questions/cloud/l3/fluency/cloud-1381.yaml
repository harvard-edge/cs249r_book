id: cloud-1381
title: End-to-End Latency of HE Inference
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a privacy-preserving ML service for financial embeddings using the CKKS Homomorphic
  Encryption scheme. The unencrypted client input vector is 100 KB. The HE scheme has a ciphertext expansion
  factor of 1,000x. The client's mobile network has a 100 Mbps upstream bandwidth. The cloud server takes
  5 ms to compute an unencrypted forward pass, but HE multiplications introduce a 10,000x compute overhead.
  Calculate the total end-to-end latency (upload + compute) for a single inference request, ignoring the
  small download time.
details:
  realistic_solution: Calculate both the expanded payload upload time (8 seconds) and the HE compute time
    (50 seconds) to find the total 58-second latency.
  common_mistake: Failing to account for the massive ciphertext expansion inflating network upload time,
    and only focusing on the compute overhead.
  napkin_math: Encrypted payload = 100 KB * 1,000 = 100,000 KB = 100 MB. Upload throughput = 100 Mbps
    / 8 = 12.5 MB/s. Upload time = 100 MB / 12.5 MB/s = 8 seconds. HE Compute time = 5 ms * 10,000 = 50,000
    ms = 50 seconds. Total Latency = 8s + 50s = 58 seconds.
