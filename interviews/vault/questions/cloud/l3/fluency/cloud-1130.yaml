id: cloud-1130
title: Versioned Embedding Cache Sizing
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are upgrading a core embedding model from V1 (768-dim) to V2 (1024-dim). Five downstream
  ranking models consume these embeddings. To avoid breaking downstream dependencies, you implement a
  versioned dual-serving transition where an intermediate Redis cache stores both V1 and V2 embeddings
  for a 100M item working set. Assuming embeddings are stored in FP16 precision and Redis has a 20% metadata
  memory overhead per item, calculate the peak Redis cache memory required during the transition period.
details:
  realistic_solution: Adopt a dependency-aware deployment strategy using versioned feature endpoints.
    Calculate the 430 GB concurrent memory requirement for dual-serving, scale the Redis cluster accordingly,
    and allow downstream consumers to independently migrate from the V1 to V2 namespace.
  common_mistake: Forgetting to account for the simultaneous caching of BOTH model versions during the
    migration window, or neglecting the caching overhead, resulting in Redis OOM evictions that degrade
    V1 consumer performance.
  napkin_math: 'V1 size: 768 dims * 2 bytes/FP16 = 1.536 KB. V2 size: 1024 dims * 2 bytes/FP16 = 2.048
    KB. Total per cached entity = 3.584 KB. For 100M items: 100M * 3.584 KB = 358.4 GB. Adding 20% Redis
    overhead: 358.4 GB * 1.2 = 430.08 GB peak memory required.'
