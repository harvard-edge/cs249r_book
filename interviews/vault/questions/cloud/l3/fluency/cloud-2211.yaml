id: cloud-2211
title: The Backfill Scheduling Gap
topic: scheduling-resource-management
status: published
provenance: imported
scenario: Your 256-GPU cluster uses strict FIFO scheduling. A 128-GPU training job is queued behind a
  256-GPU job that won't start for another 2 hours (waiting for a preempted job to checkpoint). Meanwhile,
  128 GPUs sit completely idle. Cluster utilization has dropped to 50%. Your SRE team proposes backfill
  scheduling. Explain the mechanism and calculate how much wasted compute this recovers.
details:
  realistic_solution: 'Backfill scheduling allows smaller jobs to jump ahead in the queue IF they can
    complete before the resources are needed by the head-of-queue job. The scheduler uses the user-provided
    walltime estimate: if the 128-GPU job estimates a 1-hour runtime, and the 256-GPU job needs GPUs in
    2 hours, the 128-GPU job can safely backfill. This requires accurate walltime estimates — overestimates
    prevent backfill, underestimates risk preemption.'
  common_mistake: Assuming backfill means simply reordering the queue by job size. Backfill is more nuanced
    — it requires runtime estimates to guarantee the large job's start time is not delayed.
  napkin_math: 'Without backfill: 128 GPUs idle for 2 hours = 256 GPU-hours wasted. At $2/GPU-hr = $512
    waste. With backfill: 128-GPU job runs for 1 hour, consuming 128 GPU-hours. Recovered utilization
    = 128/256 = 50% of the idle capacity. Cluster utilization rises from 50% to 75% during the gap. Annual
    impact on a 1000-GPU cluster with 15% idle gaps: ~15% × 1000 × 8760 hours × 50% recovery × $2/hr =
    $1.3M/year saved.'
