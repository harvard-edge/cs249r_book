id: cloud-1835
title: SMPC Communication Bottlenecks
topic: collective-communication
status: published
provenance: imported
scenario: Two financial institutions use Secure Multiparty Computation (SMPC) to evaluate a shared risk
  model with D = 100 sequential layers. Each layer contains batched non-linear activations requiring secure
  comparison protocols. A single layer requires R = 10 sequential communication rounds to evaluate. The
  total amount of data exchanged per inference across all layers is V = 500 MB. The two servers are connected
  by a B = 10 Gbps link with a round-trip time (RTT) of L = 5 ms. Calculate the total communication time
  required for a single inference request.
details:
  realistic_solution: 'The total communication time is the sum of the transmission delay (bandwidth bound)
    and the propagation delay (latency bound). First, calculate the rounds: 100 layers * 10 rounds/layer
    = 1000 sequential rounds. The latency delay is 1000 * 5ms = 5.0 seconds. The transmission delay for
    500 MB is (500 * 8) Mb / 10,000 Mbps = 0.4 seconds. Total communication time is 5.4 seconds.'
  common_mistake: Calculating only the payload transmission time based on bandwidth while ignoring the
    severe sequential round-trip time (RTT) penalty incurred by the protocol's multiplicative depth.
  napkin_math: 'Latency Cost = D * R * RTT = 100 * 10 * 5ms = 5000ms = 5.0s.

    Bandwidth Cost = V / B = 500MB / 10Gbps = 4000Mb / 10000Mbps = 0.4s.

    Total Time = 5.0s + 0.4s = 5.4s.'
