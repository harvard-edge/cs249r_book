title: Cloud Wafer Scale Engine L3 0
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A WSE-2 has 40 GB of on-chip SRAM and 850K cores. You want to run a 13B parameter model in FP16.
  Calculate whether the model fits on-chip and estimate the compute advantage of SRAM-speed access vs.
  HBM.
details:
  realistic_solution: '13B parameters in FP16: 13B × 2 bytes = 26 GB. WSE-2 has 40 GB SRAM → model fits
    with 14 GB remaining for activations. SRAM bandwidth: ~27.5 PB/s across all cores (each core has local
    SRAM at register-file speeds). Effective per-weight access: ~1 ns. Compare H100 HBM: 3.35 TB/s, access
    latency ~100 ns. For decode (memory-bound): WSE reads 26 GB from SRAM at ~27.5 PB/s → 0.95 μs per
    token. H100 reads 26 GB from HBM at 3.35 TB/s → 7.76 ms per token. WSE is ~8000x faster for pure memory-bound
    decode.'
  common_mistake: Assuming the WSE advantage applies to all workloads. For compute-bound operations (large
    batch matmuls), traditional GPUs with tensor cores can match or exceed WSE because raw FLOPS, not
    memory bandwidth, is the bottleneck.
  napkin_math: 'Model: 13B × 2B = 26 GB, fits in 40 GB SRAM. WSE decode: 26 GB / 27.5 PB/s ≈ 0.95 μs.
    H100 decode: 26 GB / 3.35 TB/s = 7.76 ms. Ratio: ~8,000x. Caveat: WSE''s 850K cores have lower per-core
    FLOPS than GPU tensor cores.'
