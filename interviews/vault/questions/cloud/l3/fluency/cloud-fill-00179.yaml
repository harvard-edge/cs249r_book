schema_version: 1
id: cloud-fill-00179
title: A100 KV-Cache Management for Long Context LLMs
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying a large language model (LLM) with 32 layers, 32 attention heads, and a head
  dimension of 128 for inference on an NVIDIA A100 GPU (80 GB HBM2e memory, 2.0 TB/s bandwidth). The model
  needs to support a maximum context length of 32,768 tokens, and all weights are loaded in FP16. You're
  observing frequent Out-Of-Memory (OOM) errors when trying to serve concurrent requests. Describe the
  memory pressure points and propose strategies to maximize throughput while preventing OOMs.
details:
  realistic_solution: "A realistic solution involves: \n1.  **Quantifying KV-Cache Needs**: Calculate\
    \ the memory required for the KV-cache per sequence. \n2.  **Implementing Paged Attention**: Adopt\
    \ paged attention mechanisms (like those in vLLM or HuggingFace TGI) which allow for non-contiguous\
    \ memory allocation and sharing of KV-cache pages across requests, significantly improving memory\
    \ utilization.\n3.  **Dynamic Batching**: Use dynamic batching with an adaptive scheduler that monitors\
    \ GPU memory usage and adjusts the number of concurrent sequences based on available memory and their\
    \ varying context lengths.\n4.  **Eviction Policies**: Implement (or leverage existing) KV-cache eviction\
    \ policies (e.g., Least Recently Used) for paged attention, although this is more relevant when physical\
    \ memory is truly exhausted and older cache entries need to be dropped to make room for new tokens.\n\
    5.  **Offloading/Tiering**: For extremely long contexts that exceed even optimized GPU memory, consider\
    \ offloading less critical or older KV-cache pages to CPU memory, though this impacts latency due\
    \ to PCIe bandwidth (2.0 TB/s on A100 refers to HBM2e, PCIe is significantly slower)."
  common_mistake: Candidates might initially focus only on model weights or batch size, overlooking the
    quadratic growth of the KV-cache with sequence length. They might also forget to factor in the total
    number of layers for KV-cache size or the 2x factor for Key and Value. Another mistake is not immediately
    thinking about paged attention or simple eviction policies.
  napkin_math: "For FP16 (2 bytes per value):\n-   KV-cache size per token, per layer: `2 * num_heads\
    \ * head_dim * 2 bytes = 2 * 32 * 128 * 2 = 16,384 bytes = 16 KB`.\n-   Total KV-cache size per token\
    \ across all layers: `16 KB/token * 32 layers = 512 KB/token`.\n-   For a single 32,768-token sequence:\
    \ `512 KB/token * 32,768 tokens ≈ 16 GB`.\n\nAn NVIDIA A100 (80 GB) might have ~15-20 GB occupied\
    \ by model weights (e.g., a 7B parameter FP16 model is ~14 GB). This leaves roughly `80 GB - 20 GB\
    \ (for weights) = 60 GB` for the KV-cache. \n\nNumber of concurrent 32k token sequences without paged\
    \ attention: `60 GB / 16 GB/sequence ≈ 3-4 concurrent sequences`.\n\nThis simple math highlights the\
    \ severe memory constraint and motivates the need for efficient KV-cache management like paged attention,\
    \ which can share memory pages and handle fragmented sequences, substantially increasing the effective\
    \ number of concurrent users."
