id: cloud-1265
title: Impossibility of Simultaneous Fairness Metrics
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your team deploys a cloud-based automated loan approval model processing 100,000 applications
  per day. Group A has a historical default rate of 15% (base rate 0.85 positive outcome), while Group
  B has a historical default rate of 30% (base rate 0.70 positive outcome). The compliance team demands
  that the system satisfies three conditions simultaneously: Demographic Parity, Equalized Odds, and Perfect
  Calibration. Calculate the demographic parity gap assuming equalized odds (TPR=0.9, FPR=0.1) to mathematically
  prove why this request is structurally impossible.'
details:
  realistic_solution: Prove via the Fairness Impossibility Theorem that Demographic Parity and Equalized
    Odds cannot be simultaneously satisfied when base rates differ (unless the classifier is random, i.e.,
    TPR=FPR). With base rates 0.85 and 0.70, perfect Equalized Odds (TPR=0.9, FPR=0.1) yields a 12% gap
    in positive prediction rates (78% vs 66%), violating Demographic Parity. Recommend relaxing Demographic
    Parity in favor of Calibration and Equal Opportunity for risk-appropriate lending decisions.
  common_mistake: Attempting to satisfy all three fairness metrics by applying complex adversarial debiasing
    or data reweighting techniques, failing to recognize that these constraints are provably incompatible
    when base rates differ between groups.
  napkin_math: 'Assume Equalized Odds holds with TPR = 0.9 and FPR = 0.1 for both groups.

    Group A positive prediction rate: P(Y^=1) = p_A*TPR + (1-p_A)*FPR = 0.85*0.9 + 0.15*0.1 = 0.78 (78%).

    Group B positive prediction rate: P(Y^=1) = p_B*TPR + (1-p_B)*FPR = 0.70*0.9 + 0.30*0.1 = 0.66 (66%).

    Gap = 78% - 66% = 12%. Demographic Parity is violated by 12% despite perfect Equalized Odds. The only
    mathematical way to achieve Demographic Parity while maintaining Equalized Odds when base rates differ
    is if TPR = FPR (a completely random classifier).'
