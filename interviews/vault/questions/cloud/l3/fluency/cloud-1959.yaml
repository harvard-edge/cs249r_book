id: cloud-1959
title: Cloud API Loan Approval Parity Calculation
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud-based automated loan approval API processes 50,000 requests per day. During a fairness
  audit of the latest model deployment, you find that from a sample of 20,000 applications from the privileged
  demographic, 6,000 were approved. From 30,000 applications from the unprivileged demographic, 7,500
  were approved. Calculate the Statistical Parity Difference (SPD) for this deployment.
details:
  realistic_solution: Compute the positive outcome selection rate for each group independently, then calculate
    the absolute difference between these rates to find the Statistical Parity Difference.
  common_mistake: 'Calculating the Disparate Impact (ratio of rates: 0.25/0.30 = 0.83) instead of the
    absolute difference, or comparing the raw approval counts (7,500 vs 6,000) rather than the proportions.'
  napkin_math: Rate_Privileged = 6,000 / 20,000 = 0.30 (30%). Rate_Unprivileged = 7,500 / 30,000 = 0.25
    (25%). SPD = |0.30 - 0.25| = 0.05 (or 5%).
