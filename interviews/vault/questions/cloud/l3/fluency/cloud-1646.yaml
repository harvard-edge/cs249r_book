id: cloud-1646
title: Optimizing Dual-Socket Memory Bandwidth
topic: memory-mapped-inference
status: published
provenance: imported
scenario: You are deploying a compute-heavy PyTorch model on a dual-socket Intel Xeon server (2 NUMA nodes).
  The local DDR5 memory bandwidth is 300 GB/s per socket, while the cross-socket interconnect (UPI) provides
  a maximum of 64 GB/s. Your current deployment launches 2 worker processes that share a single model
  instance in memory (defaulting to Node 0) and schedules threads randomly across all 112 cores on both
  sockets. Calculate the impact on effective memory bandwidth and describe how to reconfigure the deployment
  to maximize throughput.
details:
  realistic_solution: Duplicate the model weights so a copy exists in each NUMA node's memory. Launch
    independent worker processes using `numactl --cpunodebind=N --membind=N` to ensure each worker only
    uses local cores and local memory.
  common_mistake: Only pinning CPU threads to specific cores using taskset, while leaving the model weights
    allocated in a single NUMA node's memory, which still forces cross-socket traffic.
  napkin_math: 'Naive shared model: Node 0 threads get 300 GB/s, but Node 1 threads are bottlenecked by
    the 64 GB/s UPI link. Total effective bandwidth < 364 GB/s. NUMA-isolated deployment: Node 0 gets
    300 GB/s AND Node 1 gets 300 GB/s. Total effective bandwidth = 600 GB/s (~1.6x+ improvement).'
