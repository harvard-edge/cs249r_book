id: cloud-1601
title: TensorRT Format Optimization Latency Calculation
topic: graph-compilation
status: published
provenance: imported
scenario: You have a BERT-base PyTorch model deployed on an NVIDIA A10G GPU in AWS. Native PyTorch FP32
  inference takes 18ms per request (batch size 1). You need to optimize the format using TensorRT with
  FP16 precision. Assume FP16 provides a 2x compute speedup due to Tensor Cores, and TensorRT layer fusion
  reduces memory bandwidth overhead by 30%. If the original 18ms latency was split into 10ms for compute
  and 8ms for memory overhead, calculate the expected inference latency after converting the model to
  an optimized TensorRT engine.
details:
  realistic_solution: Apply the speedup factors independently to the compute and memory portions of the
    latency before summing them for the final result.
  common_mistake: Applying a single flat speedup multiplier (like 2x for FP16) to the total latency, failing
    to separate compute-bound time from memory-bound time.
  napkin_math: Compute latency = 10ms / 2 = 5ms. Memory latency = 8ms * 0.70 = 5.6ms. Total expected latency
    = 5.0ms + 5.6ms = 10.6ms.
