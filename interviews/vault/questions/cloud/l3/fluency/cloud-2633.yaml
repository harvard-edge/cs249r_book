id: cloud-2633
title: Counting Parameters in a Module Hierarchy
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'A model has: Embedding(50000, 512), 6× TransformerBlock each containing [Linear(512,2048),
  Linear(2048,512), LayerNorm(512), LayerNorm(512)], and a final Linear(512,50000). Count total parameters
  (include biases).'
details:
  realistic_solution: 'Embedding: 50,000 × 512 = 25,600,000 (no bias). Per TransformerBlock: Linear(512,2048)
    = 512×2048 + 2048 = 1,050,624. Linear(2048,512) = 2048×512 + 512 = 1,049,088. LayerNorm(512) = 512
    + 512 = 1,024 (scale + shift). LayerNorm(512) = 1,024. Block total = 1,050,624 + 1,049,088 + 1,024
    + 1,024 = 2,101,760. 6 blocks = 12,610,560. Final Linear(512,50000) = 512×50,000 + 50,000 = 25,650,000.
    Total = 25,600,000 + 12,610,560 + 25,650,000 = 63,860,560 ≈ 64M parameters. Memory in FP16: 64M ×
    2 = 128 MB.'
  common_mistake: Forgetting bias terms in Linear layers or the two learnable parameters (scale, shift)
    in each LayerNorm. These add up in deep models.
  napkin_math: 'Embedding: 25.6M. 6 blocks: ~2.1M × 6 = 12.6M. Final linear: 25.65M. Total ≈ 64M params
    = 128MB in FP16.'
