id: cloud-1800
title: RoCEv2 Goodput for Small Tensor Parallel Messages
topic: collective-communication
status: published
provenance: imported
scenario: You are evaluating a 400 Gbps RoCEv2 network for distributed ML training. A specific tensor
  parallel operation relies heavily on transmitting small 256-byte payload messages. Assuming the network
  uses IPv4 with standard RoCEv2 encapsulation (which adds exactly 80 bytes of combined Ethernet, IP,
  UDP, and InfiniBand header/CRC overhead per packet), calculate the maximum theoretical goodput (payload
  throughput in Gbps) of this link for this specific workload.
details:
  realistic_solution: Determine the total packet size by adding the payload to the header overhead. Calculate
    the efficiency ratio (payload / total packet size) and multiply this fraction by the raw physical
    link speed.
  common_mistake: Calculating throughput based on the maximum transmission unit (MTU) or raw line rate,
    failing to account for the heavy header tax that drastically reduces efficiency for small message
    sizes.
  napkin_math: 'Total Packet Size = 256 bytes (payload) + 80 bytes (headers) = 336 bytes.

    Efficiency Ratio = 256 / 336 ≈ 0.7619 (76.19%).

    Theoretical Max Goodput = 400 Gbps * 0.7619 = 304.76 Gbps.

    (Equivalent to ~38.1 GB/s, representing nearly a 25% loss in theoretical bandwidth due to UDP/IP encapsulation
    overhead).'
