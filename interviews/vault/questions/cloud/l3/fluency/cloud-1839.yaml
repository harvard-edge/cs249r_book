id: cloud-1839
title: Masked Autoencoder Pre-training Compute Optimization
topic: roofline-analysis
status: published
provenance: imported
scenario: You are pre-training a Vision Transformer (ViT-L) using the Masked Autoencoder (MAE) self-supervised
  learning paradigm on a cloud cluster of A100 GPUs. The dataset consists of 1.2 million unlabelled images.
  A standard contrastive SSL approach processes 100% of the image patches, requiring 30 TFLOPs per image
  per training step. MAE uses an asymmetric encoder-decoder architecture with a 75% masking ratio. If
  the encoder compute scales linearly with the number of unmasked patches and the lightweight decoder
  requires a fixed 2 TFLOPs per image, calculate the total compute (in ExaFLOPs) saved per epoch compared
  to the standard full-patch approach.
details:
  realistic_solution: Calculate the MAE compute per image by scaling the encoder FLOPs to 25% of the baseline
    (30 * 0.25 = 7.5 TFLOPs) and adding the decoder overhead (2 TFLOPs), totaling 9.5 TFLOPs. Subtract
    this from the baseline to find the per-image savings, then multiply by the dataset size.
  common_mistake: Candidates often assume a 75% masking ratio yields exactly a 75% compute reduction,
    neglecting to factor in the decoder's computational overhead which must be added back.
  napkin_math: 'Standard compute = 30 TFLOPs/img

    MAE compute = (30 * 0.25) + 2 = 9.5 TFLOPs/img

    Savings per image = 30 - 9.5 = 20.5 TFLOPs

    Total savings per epoch = 20.5e12 FLOPs/img * 1.2e6 imgs = 24.6e18 FLOPs = 24.6 ExaFLOPs'
