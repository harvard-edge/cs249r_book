id: cloud-0119
title: The Chatbot Latency Crisis
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: 'You are the lead ML Systems Engineer for a new AI chatbot startup. The service is built on
  a fleet of H100 GPUs and uses a simple static batching strategy with a batch size of 32. During a load
  test, you observe that GPU utilization is consistently high at ~95%, but user complaints about slow
  initial response times are flooding in. Monitoring reveals that the P99 Time to First Token (TTFT) is
  over 4 seconds, far exceeding the 500ms target. Your request workload is a mix: 90% are short Q&A prompts
  requiring ~50 new tokens, and 10% are long-form generation prompts requiring ~800 new tokens. What is
  the most likely cause of high TTFT despite the high GPU utilization?'
details:
  realistic_solution: The root cause is head-of-line blocking due to the static batching strategy. In
    static batching, the entire batch of 32 requests must wait for the longest request to complete before
    the next batch can be processed. When a long request (800 tokens) enters a batch, it forces all other
    requests, including the short Q&A ones, to wait for its entire generation, catastrophically increasing
    their latency. The GPU remains 95% utilized because it's busy processing the long request, but this
    work isn't helping the 31 other users in the batch who are waiting. The correct solution is to implement
    continuous batching (or 'in-flight' batching), where the server iterates on a token-by-token basis
    across all active requests in the batch. Once a request finishes, its slot is immediately filled by
    a new request from the queue, eliminating head-of-line blocking and dramatically reducing average
    TTFT.
  common_mistake: Engineers often see high GPU utilization and assume the GPU itself is the bottleneck,
    leading them to request more powerful hardware. They fail to see that high utilization can be 'bad'
    utilization, where hardware is busy but not making progress on the most critical user-facing metrics
    due to inefficient scheduling.
  napkin_math: 'Let''s model a static batch of 32: 1 long (800 tokens), 31 short (50 tokens). In static
    batching, all requests wait for the longest one to finish. The short requests finish their 50 tokens
    but are held for another 750 tokens. Ratio of waiting: 800 / 50 = 16x latency increase. Wasted token
    generations: 31 requests * 750 tokens = 23,250 empty slot-tokens wasting time.'
