id: cloud-new-50070
title: Micro-Batch Size Impact on Pipeline Parallelism Bubble Ratio
topic: communication-computation-overlap
status: published
provenance: imported
scenario: Your 8-stage pipeline trains a 175B model. With 4 micro-batches, the bubble ratio is (8-1)/4
  = 175% overhead (more bubble than compute). With 32 micro-batches, it drops to (8-1)/32 = 21.9%. But
  increasing micro-batches requires reducing per-micro-batch size, which may hurt GPU compute efficiency.
  Find the optimal tradeoff.
details:
  realistic_solution: 'The optimal micro-batch count balances bubble ratio against per-micro-batch GPU
    efficiency. (1) GPU efficiency vs micro-batch size: H100 Tensor Cores need batch >= 64 for >80% utilization
    on typical matmuls. Below batch 32, utilization drops rapidly. (2) If global batch = 1024, and k=8
    stages: m micro-batches of size 1024/m each. At m=4: batch 256 per micro-batch (high GPU efficiency
    ~95%), bubble 175%. At m=32: batch 32 per micro-batch (moderate GPU efficiency ~75%), bubble 21.9%.
    At m=64: batch 16 (low efficiency ~50%), bubble 10.9%. (3) Effective throughput = GPU_efficiency x
    (1 - bubble_fraction). m=4: 0.95 x 0.36 = 0.34. m=32: 0.75 x 0.82 = 0.62. m=64: 0.50 x 0.90 = 0.45.
    Optimal: m=32.'
  common_mistake: Maximizing micro-batch count without considering that smaller micro-batches reduce GPU
    utilization (lower arithmetic intensity, more kernel launch overhead).
  napkin_math: m=32 wins. Effective throughput 0.62 vs m=4's 0.34 = 1.82x faster. Further increasing m
    to 64 hurts because GPU utilization drop outweighs bubble reduction. The knee is where d(GPU_eff)/dm
    = d(bubble_reduction)/dm.
