title: CPO Power Savings Calculation
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing the next-generation network fabric for an AI cluster using 51.2 Tbps switch
  ASICs. Currently, using standard 800G pluggable optics, the optical interconnects consume about 15 pJ/bit.
  Your team is evaluating a move to Co-Packaged Optics (CPO) which reduces the optical interface power
  to 5 pJ/bit. Calculate the total peak power savings per switch and estimate the annual energy savings
  for a cluster with 500 such switches, assuming they run at 80% average utilization year-round (8760
  hours/year).
details:
  realistic_solution: Calculate the per-switch power delta using the pJ/bit metric and total switching
    capacity. Apply the average utilization factor and cluster scale to find the total annual energy reduction,
    which translates to massive OPEX savings.
  common_mistake: Candidates often calculate only the peak power savings per switch but forget to account
    for average network utilization or ignore the scale of the cluster when evaluating total energy reduction.
  napkin_math: Delta = 15 - 5 = 10 pJ/bit. Peak savings/switch = 51.2 Tbps * 10 pJ/bit = 51.2e12 * 10e-12
    J/bit = 512 W. Average savings/switch = 512 W * 0.8 = 409.6 W. Total cluster savings = 409.6 W * 500
    = 204.8 kW. Annual energy savings = 204.8 kW * 8760 hours = 1,794,048 kWh (~1.79 GWh/year).
