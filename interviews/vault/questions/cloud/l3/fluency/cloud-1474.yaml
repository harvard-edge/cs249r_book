schema_version: 1
id: cloud-1474
title: Calculating INT8 KV Cache Memory Savings
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a 7B parameter LLM (32 layers, 32 KV heads, 128 head dimension) on a single
  80GB A100 GPU. The model weights are loaded in FP16. You need to support a concurrent batch size of
  64 requests, each with a maximum sequence length of 4096 tokens. During load testing, the system throws
  an Out Of Memory (OOM) error. Calculate the exact memory required for the KV cache in FP16, and determine
  if quantizing the KV cache to INT8 will allow the workload to fit within the 80GB limit.
details:
  realistic_solution: 'First, calculate the FP16 KV cache size per token: 2 (K and V) * 32 layers * 32
    heads * 128 head dimension * 2 bytes = 524,288 bytes (0.5 MiB). For a batch size of 64 and sequence
    length of 4096 tokens, the KV cache requires exactly 128 GiB. Adding ~14 GiB for the model weights
    gives a total of 142 GiB, which causes the OOM on an 80GB A100. By applying INT8 KV cache quantization,
    the size per element drops from 2 bytes to 1 byte, halving the KV cache footprint to 64 GiB. The new
    total memory required becomes 14 GiB (weights) + 64 GiB (KV cache) = 78 GiB, successfully fitting
    on the 80GB A100.'
  common_mistake: Forgetting the factor of 2 for both Keys and Values, or forgetting to add the 14GB required
    for the FP16 model weights when checking against the 80GB limit.
  napkin_math: FP16 KV Cache = 64 (batch) * 4096 (seq) * 2 (K,V) * 32 (layers) * 32 (heads) * 128 (dim)
    * 2 (bytes) = 128 GiB. Weights = 7B * 2 bytes ≈ 14 GiB. Total = 142 GiB > 80 GiB. INT8 KV Cache =
    128 GiB / 2 = 64 GiB. Total = 14 + 64 = 78 GiB < 80 GiB.
