id: cloud-2763
title: Guardrail Latency Budget
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your LLM chatbot has a 2-second total latency budget. The LLM inference takes 1.2 seconds. You
  need to add an input classifier (150ms), output classifier (200ms), and regex filter (5ms). Calculate
  whether the guardrails fit within the latency budget and propose optimizations if they do not.
details:
  realistic_solution: 'Sequential pipeline: input classifier (150ms) + LLM (1200ms) + output classifier
    (200ms) + regex (5ms) = 1555ms. This fits within the 2000ms budget with 445ms margin. However, if
    we need to add more guardrails later, consider optimizations: (1) The regex filter (5ms) can run in
    parallel with the output classifier — saves 5ms. (2) With streaming output, the output classifier
    can process tokens as they are generated, overlapping with LLM inference. If the output classifier
    processes each chunk in 20ms and there are 10 chunks: the classifier finishes ~20ms after the last
    token, not 200ms after. Total with streaming: 150ms + 1200ms + 20ms = 1370ms. (3) Input classifier
    can be a distilled model running on CPU to free GPU for the LLM. Final optimized pipeline: 1370ms,
    leaving 630ms budget for future guardrails.'
  common_mistake: Assuming all guardrails must run sequentially. Input guardrails must run before the
    LLM, but output guardrails can be overlapped with token streaming.
  napkin_math: 'Sequential: 150+1200+200+5 = 1555ms (fits in 2s). Optimized with streaming: 150+1200+20
    = 1370ms. Saves 185ms for future guardrails.'
