schema_version: 1
id: cloud-r2-40032
title: Gradient Quantization to INT8
topic: gradient-synchronization
status: published
provenance: imported
scenario: To reduce communication time, you quantize FP16 gradients to INT8 before AllReduce and dequantize
  after. For a 2GB gradient buffer on a 64-A100 cluster with 200Gbps NICs, calculate the communication
  time savings and the quantization error introduced.
details:
  realistic_solution: 'FP16 gradient: 2GB. INT8 compressed: 1GB (2× compression). Plus scale factors:
    one per tensor block (typically 128 elements per block). For 2GB FP16 = 1B elements, need 1B/128 =
    7.8M scale factors × 4 bytes (FP32) = 31.25MB overhead. Total INT8 payload: 1GB + 31.25MB ≈ 1.03GB.
    AllReduce time: FP16: 2 × 63/64 × 2GB / (200Gbps/8) = 157.5ms. INT8: 2 × 63/64 × 1.03GB / 25GB/s =
    81.1ms. Savings: 76.4ms (48.5% reduction). Quantization error: INT8 has 256 levels covering the FP16
    gradient range. With per-block quantization (128 elements), the relative error ≈ 1/(2×256) = 0.2%
    per element. However, this error is biased — small gradients near zero are quantized to exactly zero,
    creating a dead zone. Stochastic rounding mitigates this: instead of rounding to nearest INT8, round
    randomly proportional to the fractional value, making the quantization error unbiased in expectation.'
  common_mistake: Forgetting that quantization from FP16 to INT8 requires sending scale factors alongside
    the quantized values. Also, ignoring that AllReduce of INT8 values requires special handling — summing
    INT8 values can overflow, so the reduction must happen in higher precision.
  napkin_math: 'Communication savings: 2GB → 1.03GB = 48.5% less data. Time: 157.5ms → 81.1ms = 76.4ms
    saved. Over 1000 iterations: 76.4 seconds saved. INT8 quantization error: ~0.2% per element, which
    adds noise equivalent to ~2% learning rate perturbation — tolerable for most training jobs.'
