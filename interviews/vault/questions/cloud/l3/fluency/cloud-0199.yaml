title: The Embedding Model Serving
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: We're deploying a 335M parameter embedding model (like BGE-large) for our search engine. Unlike
  LLMs, there's no autoregressive decode — it's a single forward pass. The team sized the GPU as if it
  were an LLM workload and provisioned an H100. Is that the right hardware? What's the optimal batch size?
details:
  realistic_solution: 'Embedding inference is a single forward pass with no autoregressive loop. The workload
    is compute-bound at moderate batch sizes because the full sequence is processed in parallel (like
    LLM prefill, not decode). This means: (1) batch size directly increases throughput with near-linear
    scaling until you hit compute saturation, (2) an A10G ($0.75/hr) at high batch sizes can match H100
    throughput-per-dollar because you''re not paying for unused HBM bandwidth, and (3) CPU inference (with
    ONNX Runtime) is viable for low-QPS workloads.'
  common_mistake: '"Embedding models are small, so any GPU works — just use the cheapest one." Embedding
    models are compute-bound (not memory-bandwidth bound like LLM decode), so the optimization strategy
    is completely different. An H100 is overkill for a single replica but the wrong framing — you should
    be asking about throughput per dollar.'
