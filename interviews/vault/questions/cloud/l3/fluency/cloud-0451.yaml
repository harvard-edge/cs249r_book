id: cloud-0451
title: The Privacy-TCO Trade-off
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the lead ML Systems Architect for a consortium of 10 hospitals building a shared AI
  model for cancer detection from medical scans. Each hospital has 50 TB of patient data. You must advise
  the board on the most cost-effective training strategy over a 3-year project lifecycle: centralized
  or federated. Your goal is to apply your knowledge of system costs to calculate the 3-year Total Cost
  of Ownership (TCO) for each option and make a recommendation.'
details:
  realistic_solution: The Federated Learning approach has a significantly lower 3-year TCO. The decision
    is driven by the massive operational expense of the specialized compliance team required for the centralized
    approach. While the federated option has a high initial hardware investment (CapEx), it avoids the
    recurring, multi-million dollar personnel and large-scale data storage costs, making it the more economical
    choice over the 3-year horizon.
  common_mistake: Engineers often focus on the most visible technical cost (like on-demand compute hours
    or data transfer volume) while underestimating or ignoring the 'hidden' but dominant costs of a system.
    In this case, that means ignoring the massive operational expense of personnel required for security
    and compliance, or failing to annualize costs over the full project term.
  napkin_math: '**Centralized 3-Year TCO:** | 1.  **Data Ingress (One-time CapEx):** 500 TB * 1000 GB/TB
    * $0.01/GB = $5,000 | 2.  **Training Compute (One-time OpEx):** 20,000 H100-hours * $4.00/hr = $80,000
    | 3.  **Data Storage (Recurring OpEx):** 500 TB * $25/TB/month * 36 months = $450,000 | 4.  **Compliance
    Team (Recurring OpEx):** $1,000,000/year * 3 years = $3,000,000 | 5.  **Total:** $5k + $80k + $450k
    + $3,000k = **$3,535,000**'
