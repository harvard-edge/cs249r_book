id: cloud-1111
title: DLQ Storage and Reprocessing Provisioning
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A real-time ML feature ingestion pipeline processes 100,000 events per second, with each event
  payload averaging 2KB. A strict schema validation step rejects 0.5% of incoming events due to schema
  versioning mismatches, routing them to a Dead Letter Queue (DLQ). Calculate the total storage required
  for the DLQ per 24-hour period, and determine the minimum processing throughput (in events/second) a
  repair job must achieve to drain a full 24-hour accumulated DLQ backlog within a strict 4-hour maintenance
  window.
details:
  realistic_solution: Calculate the daily rejected event count (43.2 million), multiply by the event payload
    size to find the total daily storage (86.4 GB), and divide the total accumulated events by the maintenance
    window in seconds to find the required drain throughput (3,000 events/sec).
  common_mistake: Failing to accurately calculate the daily event accumulation rate, mixing up base-2
    and base-10 storage conversions, or incorrectly sizing the repair job's throughput by forgetting to
    convert the 4-hour drain window into seconds.
  napkin_math: Total daily events = 100,000 events/sec * 86,400 sec/day = 8.64 billion. Rejected events
    routed to DLQ = 8.64B * 0.5% = 43.2 million events/day. Storage required = 43.2M * 2KB = 86.4 GB/day.
    To drain the accumulated DLQ events during a 4-hour (14,400 seconds) maintenance window, the required
    reprocessing throughput is 43.2M / 14,400 = 3,000 events/sec. This helps size the fallback cluster.
