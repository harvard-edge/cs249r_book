schema_version: 1
id: cloud-0727
title: The All-Reduce Stalemate
topic: data-parallelism
status: published
provenance: imported
scenario: You're scaling out a new model. When you train a small 100M parameter model with Data Parallelism
  on 8 nodes, the epoch time is dominated by communication. However, when you switch to a very large 100B
  parameter model on the same 8 nodes, the communication still dominates, but the performance profile
  looks different. Explain why communication dominates in both cases but with different underlying reasons.
details:
  realistic_solution: For small models (e.g., 100M parameters, FP16 gradients ~200MB), the All-Reduce
    operation is often **latency-bound**. The startup overhead (`alpha`) for initiating communication
    and traversing network hops dominates the actual data transfer time. Even with high bandwidth, the
    time taken to set up connections and propagate messages across nodes (due to fixed latency per hop)
    becomes the bottleneck.
  common_mistake: '"Communication is always slow, it''s just a bandwidth issue." This overlooks the fundamental
    difference between latency-bound and bandwidth-bound operations.'
  napkin_math: 'Consider an All-Reduce on 8 nodes with 100Gbps (12.5 GB/s) interconnect and 100µs effective
    latency per operation.


    **Small model (100M params, 200 MB FP16 gradients):**

    Ring AllReduce data volume = 2 × (N-1)/N × 200 MB = 2 × 7/8 × 200 = 350 MB.

    Transfer time = 350 MB / 12.5 GB/s = **28 ms**.

    Latency overhead = 2 × (N-1) × 100µs = 14 × 100µs = **1.4 ms**.

    Total AllReduce = 28 + 1.4 = **29.4 ms**.

    Compute time for 100M model forward+backward ≈ **5 ms** (tiny model, fast compute).

    Comm/Compute ratio = 29.4 / 5 = **5.9x** — communication dominates because the model is too small
    to amortize the fixed network costs. The ratio of data to compute is unfavorable.


    **Large model (100B params, 200 GB FP16 gradients):**

    Ring AllReduce data volume = 2 × 7/8 × 200 GB = 350 GB.

    Transfer time = 350 GB / 12.5 GB/s = **28,000 ms (28 seconds)**.

    Latency overhead = 1.4 ms (same, negligible now).

    Compute time for 100B model ≈ **15,000 ms (15 seconds)** on 8 GPUs.

    Comm/Compute ratio = 28,000 / 15,000 = **1.87x** — communication still dominates, but now it is purely
    **bandwidth-bound**. The latency term is negligible (0.005%).


    **The insight:** For the small model, both latency and bandwidth matter (latency is 5% of comm time).
    For the large model, it is purely a bandwidth problem. The fix for small models is gradient compression
    or reducing AllReduce frequency. The fix for large models is higher bisection bandwidth (InfiniBand
    400G, rail-optimized topologies) or overlapping communication with computation via gradient bucketing.'
