id: cloud-1003
title: Financial Impact of Drift Mitigation
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your e-commerce recommendation system runs on 100 AWS g5.2xlarge instances, serving 10,000 predictions/sec.
  Due to sudden fashion trends, the functional relationship between user demographics and item preference
  shifts (concept drift), causing the click-through rate (CTR) to decay from 5.0% to 3.0%. Business metrics
  show that every 1.0% drop in CTR results in a $50,000/day revenue loss. You propose mitigating this
  by moving from weekly to daily retraining. Daily retraining requires a 32-node p4d.24xlarge cluster
  running for 4 hours at $32.77/hour per node. If daily retraining recovers the CTR to 4.5%, calculate
  the net daily financial impact of this MLOps strategy.
details:
  realistic_solution: Formulate a cost-benefit analysis by subtracting the cloud compute cost of the new
    daily retraining pipeline from the recovered revenue generated by the 1.5% CTR improvement.
  common_mistake: Candidates often focus purely on the model accuracy or CTR metrics, failing to quantify
    the infrastructure cost of increased retraining frequency against the recovered business revenue.
  napkin_math: 'Recovered Revenue: (4.5% - 3.0%) = 1.5% improvement. 1.5 * $50,000 = $75,000/day. Retraining
    Cost: 32 nodes * 4 hours * $32.77/hr = $4,194.56/day. Net Impact: $75,000 - $4,194.56 = +$70,805.44/day.'
