schema_version: 1
id: cloud-cell-10307
title: 'Fluency: Translating a PyTorch DDP Job into a Kubernetes Manifest'
topic: container-orchestration
status: published
provenance: imported
scenario: A researcher hands you a `torchrun --nproc_per_node=8 --nnodes=4 --rdzv_backend=c10d train.py`
  launch command. They need it translated into a production Kubernetes manifest using the Training Operator's
  `PyTorchJob` CRD on an H100 cluster. They have a prebuilt image and need the job to use node affinity
  for H100 nodes and request 8 GPUs per worker pod.
details:
  realistic_solution: 'Use `kind: PyTorchJob` with `replicaSpecs.Worker.replicas: 4`, `replicaSpecs.Worker.template.spec.containers[0].resources.limits[''nvidia.com/gpu'']:
    8`, and `pytorchReplicaSpecs.Worker.restartPolicy: OnFailure`. Set `rdzvBackend: c10d` in the container
    env. Add `nodeAffinity` under `template.spec.affinity` with `matchExpressions: [{key: accelerator,
    operator: In, values: [h100]}]`. The operator automatically sets `MASTER_ADDR`, `MASTER_PORT`, `RANK`,
    and `WORLD_SIZE` env vars.'
  common_mistake: Manually constructing a `StatefulSet` with custom init containers to handle rendezvous;
    not knowing the Training Operator CRD exists or how its `masterPort` and `replicaSpecs` fields map
    to `torchrun` arguments.
  napkin_math: '4 nodes × 8 H100 GPUs = 32 GPUs total. NVLink intra-node bandwidth: 900 GB/s (NVSwitch).
    Inter-node IB: 400 Gb/s = 50 GB/s. For a 70B model with 140 GB BF16 gradients, AllReduce over 4 nodes
    via IB takes 140 GB / 50 GB/s × 2 = 5.6 s per step at theoretical peak.'
