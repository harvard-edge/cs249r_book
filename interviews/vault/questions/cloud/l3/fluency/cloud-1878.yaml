id: cloud-1878
title: SDC Rate and Optimal Checkpointing
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are orchestrating a 30-day training run on a cluster of 8,192 GPUs. Your telemetry shows
  that Silent Data Corruptions (SDCs)—such as undetected ALU calculation errors—occur at a rate of 1 event
  per 50,000 GPU-hours. Your training loop uses a heuristic to detect SDC-induced loss spikes, triggering
  a rollback to the last checkpoint. If a checkpoint takes 6 minutes (0.1 hours) to save to object storage,
  calculate the system-level MTBF and the optimal checkpoint interval.
details:
  realistic_solution: First compute the system-level MTBF by dividing the per-GPU MTBF by the cluster
    size. Then use Daly's formula balancing the cost of checkpointing against the cost of lost work to
    find the optimal interval.
  common_mistake: Candidates often use the per-GPU MTBF (50,000 hours) instead of the system-level MTBF
    (6.1 hours) in their calculations, resulting in a massively overestimated checkpoint interval.
  napkin_math: System MTBF = 50,000 GPU-hrs / 8,192 GPUs = 6.1 hours. Optimal Interval (T) = sqrt(2 *
    MTBF * Checkpoint_Time) = sqrt(2 * 6.1 * 0.1) = sqrt(1.22) = ~1.1 hours (or 66 minutes).
