id: cloud-1528
title: Profiling Linear Layer Arithmetic Intensity
topic: roofline-analysis
status: published
provenance: imported
scenario: You are profiling a linear projection layer mapping a batch of 2048 tokens from an embedding
  dimension of 8192 to an output dimension of 32768 on an NVIDIA A100 GPU (312 TFLOPS FP16 peak, 2.0 TB/s
  memory bandwidth). The FP16 matrix multiplication takes exactly 4.5 milliseconds. Determine the arithmetic
  intensity, whether the operation is compute-bound or memory-bound, and calculate the achieved compute
  utilization.
details:
  realistic_solution: The arithmetic intensity is ~1560 FLOPs/byte, vastly exceeding the A100's ridge
    point of 156 FLOPs/byte, meaning the layer is solidly compute-bound. The achieved compute utilization
    is approximately 78.3% of the theoretical peak.
  common_mistake: Candidates often forget the factor of 2 for Multiply-Accumulate (MAC) operations when
    calculating FLOPs, or they miscalculate the memory read/write volumes, incorrectly classifying the
    dense layer as memory-bound.
  napkin_math: FLOPs = 2 * M * N * K = 2 * 2048 * 32768 * 8192 ≈ 1.10 TFLOPS. Memory Bytes (FP16) = 2
    * (M*K + K*N + M*N) = 2 * (16.7M + 268.4M + 67.1M) ≈ 704 MB. Arithmetic Intensity = 1.10e12 / 704e6
    ≈ 1560 FLOPs/B. A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/B (1560 > 156 -> compute-bound).
    Utilization = (1.10 TFLOPS / 0.0045s) / 312 TFLOPS = 244.4 / 312 ≈ 78.3%.
