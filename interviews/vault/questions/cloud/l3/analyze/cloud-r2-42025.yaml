schema_version: 1
id: cloud-r2-42025
title: Fat-Tree Bisection Bandwidth for AllReduce
topic: interconnect-topology
status: published
provenance: imported
scenario: A 256-GPU H100 cluster uses a 3-tier fat-tree topology with 400 Gbps InfiniBand links. Calculate
  the bisection bandwidth and explain why a 2:1 oversubscribed fat-tree degrades AllReduce performance
  more than it degrades point-to-point communication.
details:
  realistic_solution: 'Ring AllReduce: 2 × 255/256 × 1GB / 50GB/s = 39.8ms (not 10.2ms — 10.2ms would
    require 4× higher bandwidth or 4× smaller gradient).'
  common_mistake: Assuming oversubscription uniformly degrades all traffic patterns. AllReduce is an all-to-all
    communication pattern that saturates every link in the network simultaneously, making it uniquely
    sensitive to bisection bandwidth reductions.
  napkin_math: 'Ring AllReduce on 256 GPUs, 1 GB gradient: time = 2 × (N-1)/N × D / BW = 2 × 255/256 ×
    1GB / 50GB/s = 2 × 0.996 × 0.02s = 2 × 255/256 / 50 = 510/12800 = 0.03984s = 39.8ms (not 10.2ms —
    10.2ms would require BW=195 GB/s or D=255MB).'
