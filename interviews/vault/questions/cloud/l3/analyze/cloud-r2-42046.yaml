schema_version: 1
id: cloud-r2-42046
title: SM Occupancy vs Achieved Throughput
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: Your H100 CUDA kernel achieves 75% occupancy but only 40% of peak TFLOPS. A colleague's kernel
  achieves 50% occupancy but 85% of peak TFLOPS. Explain why higher occupancy does not guarantee higher
  throughput and what the colleague's kernel is doing differently.
details:
  realistic_solution: 'Your kernel (75% occupancy, 40% TFLOPS): high occupancy means many warps are resident,
    but if each warp frequently stalls on memory loads (low arithmetic intensity), the SM spends most
    cycles waiting. The warps are present but not productive — they''re all blocked on the same memory
    bank or L2 cache miss. Colleague''s kernel (50% occupancy, 85% TFLOPS): fewer warps, but each warp
    has high instruction-level parallelism (ILP) — loop unrolling, fused multiply-adds, and data reuse
    from registers and shared memory. The SM pipeline stays full with fewer warps because each warp issues
    multiple independent instructions per cycle. Key insight: H100 SMs can issue 4 warp instructions per
    cycle. With high ILP, 50% occupancy provides enough warps to keep all 4 issue slots busy. With low
    ILP, even 100% occupancy has idle issue slots because every warp stalls simultaneously.'
  common_mistake: Optimizing for occupancy as a proxy for performance. Occupancy measures how many warps
    are resident on an SM, not how efficiently those warps execute. A kernel can have maximum occupancy
    but poor instruction-level parallelism, register spilling, or shared memory bank conflicts.
  napkin_math: 'H100 SM: 2048 max threads = 64 warps. 75% occupancy = 48 warps. If each warp stalls 60%
    of time on memory: effective active warps = 48 × 0.4 = 19.2. 50% occupancy = 32 warps. If each stalls
    10%: effective = 32 × 0.9 = 28.8 warps. SM needs ~24 active warps to saturate 4 issue slots. 19.2
    < 24 → underutilized. 28.8 > 24 → fully utilized. Throughput ratio: 28.8/19.2 = 1.5× → matches 85%/40%
    = 2.1× (plus Tensor Core utilization difference).'
