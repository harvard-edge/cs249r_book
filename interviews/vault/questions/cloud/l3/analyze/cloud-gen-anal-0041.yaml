schema_version: 1
id: cloud-gen-anal-0041
title: H100 Vector Addition Utilization Collapse
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'You are profiling a simple element-wise addition of two large 1 billion element FP16 tensors
  on an H100 GPU in the cloud. The H100 specifications are provided as: 80 GB HBM3, 3.35 TB/s memory bandwidth,
  989 TFLOPS FP16 compute, and a ridge point of ~295 FLOPs/Byte. Despite the massive compute capabilities,
  the profiler shows the compute utilization is less than 0.1% of the peak TFLOPS. Using the provided
  hardware specs, analyze why the compute utilization collapses for this specific workload.'
details:
  realistic_solution: The root cause is that vector addition is completely memory-bandwidth bound, operating
    at an arithmetic intensity drastically lower than the GPU's ridge point of 295 FLOPs/Byte. According
    to the roofline model, the maximum theoretical performance is strictly dictated by how fast data can
    be moved across the HBM3 interface, rendering the vast majority of the 989 TFLOPS ALUs idle.
  common_mistake: Candidates often assume the low utilization is due to kernel launch overhead, PCIe transfer
    bottlenecks, or unoptimized thread blocking, ignoring the fundamental arithmetic intensity. They might
    also incorrectly calculate the bytes transferred by forgetting that FP16 requires 2 bytes per element,
    or forgetting to account for the memory write operation.
  napkin_math: 1. A single element-wise addition (C = A + B) performs 1 FLOP. 2. It requires reading from
    A (2 bytes for FP16), reading from B (2 bytes), and writing to C (2 bytes), totaling 6 bytes of memory
    traffic. 3. Arithmetic Intensity = 1 FLOP / 6 Bytes ≈ 0.166 FLOPs/Byte. 4. Max achievable compute
    = Memory Bandwidth * Arithmetic Intensity = 3.35 TB/s * 0.166 FLOPs/Byte = 0.558 TFLOPS. 5. Utilization
    = 0.558 TFLOPS / 989 TFLOPS = 0.00056, or ~0.056%, which perfectly explains the utilization collapse.
