schema_version: 1
id: cloud-gen-anal-0029
title: FlashAttention Arithmetic Intensity Shift
topic: flash-attention
status: published
provenance: imported
scenario: Your team profiles standard attention on an A100 GPU (2.0 TB/s bandwidth, 312 TFLOPS FP16, ridge
  point ~156 FLOPs/Byte). For sequence length N=4096 and head dimension d=128, standard attention executes
  8.59 GFLOPs but transfers ~137 MB of data to and from HBM due to intermediate NxN attention matrices.
  FlashAttention, using SRAM tiling and online softmax, drops the total HBM data transfer to ~4.2 MB while
  executing the exact same 8.59 GFLOPs. Given these metrics and the hardware specs, explain why standard
  attention severely underutilizes the A100's compute capacity and why FlashAttention is able to maximize
  it.
details:
  realistic_solution: Standard attention generates high memory traffic from writing and reading the O(N^2)
    intermediate attention score matrix to HBM, resulting in an arithmetic intensity lower than the A100's
    ridge point. This makes it memory bandwidth bound. FlashAttention fuses the operation and keeps intermediates
    in SRAM, vastly reducing HBM reads/writes. This skyrockets the arithmetic intensity well past the
    hardware's ridge point, shifting the bottleneck from memory bandwidth to the GPU's FP16 tensor cores.
  common_mistake: Candidates often assume FlashAttention speeds up the model by reducing the total number
    of FLOPs or simply state that it 'uses less memory'. They fail to connect the reduction in memory
    traffic to the hardware's arithmetic intensity ridge point, which dictates whether the kernel is memory-bound
    or compute-bound.
  napkin_math: Standard Attention Intensity = 8.59 GFLOPs / 137 MB = ~62.7 FLOPs/Byte. Since 62.7 < 156
    (A100 Ridge Point), it is memory bound. Max theoretical throughput = 62.7 FLOPs/Byte * 2.0 TB/s =
    ~125.4 TFLOPS (underutilizing the 312 TFLOPS peak). FlashAttention Intensity = 8.59 GFLOPs / 4.2 MB
    = ~2045 FLOPs/Byte. Since 2045 > 156, it is completely compute-bound and can theoretically reach the
    full 312 TFLOPS capability of the A100.
