schema_version: 1
id: cloud-gen-anal-0071
title: H100 Throughput Drop at Constant Power Limit
topic: thermal-management
status: published
provenance: imported
scenario: A cloud instance features an H100 GPU (700W TDP, 989 TFLOPS FP16 peak). When running a sustained
  compute-bound GEMM kernel, telemetry shows the GPU initially achieving ~950 TFLOPS. After 2 minutes,
  the throughput drops to ~800 TFLOPS, and the GPU clock speed decreases. However, the power draw remains
  pegged at the 700W limit the entire time. Given that the workload hasn't changed, analyze why the clock
  speed and throughput decrease even though the GPU is still consuming the maximum allowed 700W.
details:
  realistic_solution: As the GPU heats up under sustained load, the silicon temperature rises, which significantly
    increases static power dissipation (leakage current). Because the total power is strictly capped at
    700W, the increased leakage power leaves less power available for dynamic switching. To remain within
    the 700W envelope while dissipating more power as leakage, the GPU's control loop must lower the voltage
    and clock frequency, directly reducing the FP16 throughput.
  common_mistake: Candidates might mistakenly state that the GPU is power throttling by reducing its power
    draw, but the prompt specifies it remains at 700W. They may overlook the relationship between temperature,
    leakage current, and the fixed power budget.
  napkin_math: 'Total Power (700W) = Dynamic Power + Leakage Power. Assume at 40°C: Leakage = 50W, Dynamic
    = 650W (yielding 950 TFLOPS). At 80°C, leakage current increases non-linearly, let''s say to 150W.
    Available Dynamic Power = 700W - 150W = 550W. Assuming throughput scales roughly with dynamic power
    budget: New Throughput = 950 TFLOPS * (550W / 650W) = 803.8 TFLOPS, which perfectly matches the observed
    drop to ~800 TFLOPS.'
