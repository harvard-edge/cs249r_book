schema_version: 1
id: cloud-gen-anal-0032
title: Ring-AllReduce Cross-Node Bottleneck
topic: gradient-synchronization
status: published
provenance: imported
scenario: You are training a large language model with 80 GB of gradients per iteration. On a single node
  with 8 H100 GPUs connected via NVLink 4.0 (900 GB/s per GPU), gradient synchronization using a naive
  Ring-AllReduce takes approximately 0.155 seconds. When you scale to 16 GPUs across two nodes connected
  by InfiniBand NDR (50 GB/s per port), the synchronization time suddenly spikes to 3.0 seconds. Explain
  why this massive performance degradation occurs despite only doubling the number of GPUs, and identify
  the specific system bottleneck in the communication topology.
details:
  realistic_solution: The degradation happens because a flat Ring-AllReduce over the 16 GPUs forces the
    logical ring to cross the much slower inter-node InfiniBand links. Since every step in the ring must
    wait for the slowest connection, the effective bandwidth drops from NVLink speeds (900 GB/s) to InfiniBand
    speeds (50 GB/s). The total data transferred per GPU remains relatively constant (approaching 2x the
    gradient size), making bandwidth the primary factor.
  common_mistake: Candidates often assume the time increases proportionally to the number of GPUs, failing
    to recognize that a flat Ring-AllReduce topology is strictly bottlenecked by its slowest link. They
    may also incorrectly assume the data volume transferred per GPU scales linearly with GPU count.
  napkin_math: 'Ring-AllReduce transfers 2 * ((N-1)/N) * S data per GPU.

    For N=8 (1 node): Data = 2 * (7/8) * 80 GB = 140 GB. Time = 140 GB / 900 GB/s (NVLink) = 0.155 seconds.

    For N=16 (2 nodes): Data = 2 * (15/16) * 80 GB = 150 GB. Since the ring crosses nodes, the bandwidth
    bottleneck is InfiniBand. Time = 150 GB / 50 GB/s (InfiniBand NDR) = 3.0 seconds.'
