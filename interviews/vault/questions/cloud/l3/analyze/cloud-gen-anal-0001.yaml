schema_version: 1
id: cloud-gen-anal-0001
title: Shadow Deployment PCIe Bottleneck
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: A cloud recommendation service is serving a model on a single H100 GPU. The application sends
  20 GB/s of user context data from the CPU to the GPU over PCIe Gen5 x16 (which provides 32 GB/s unidirectional
  bandwidth). To safely evaluate a new model version, the team uses a shadow deployment strategy where
  the application duplicates the incoming traffic on the CPU and sends a second copy of the 20 GB/s context
  data to the shadow model co-located on the same H100. Upon enabling 100% shadow traffic, the primary
  model's latency doubles and throughput drops, despite the H100's 989 TFLOPS FP16 being only 30% utilized
  and its 3.35 TB/s HBM3 bandwidth being mostly free. Explain why the system performance degrades during
  this rollout.
details:
  realistic_solution: The degradation occurs because the shadow deployment architecture creates a PCIe
    bandwidth bottleneck. By duplicating the traffic on the CPU, the system attempts to push 40 GB/s across
    a bus that only supports 32 GB/s in one direction. The architecture should be modified to send a single
    copy of the data over PCIe and duplicate it within the GPU's high-bandwidth HBM3 memory.
  common_mistake: Candidates often assume the bottleneck must be compute or memory capacity, ignoring
    the data transfer pathway. They might also incorrectly assume PCIe Gen5 x16 has 64 GB/s available
    in a single direction, failing to realize the bidirectional spec doesn't apply to CPU-to-GPU only
    transfers.
  napkin_math: Primary data transfer = 20 GB/s. Shadow data transfer = 20 GB/s. Total required CPU-to-GPU
    bandwidth = 20 + 20 = 40 GB/s. Available PCIe Gen5 x16 unidirectional bandwidth = 32 GB/s. Bandwidth
    deficit = 40 GB/s - 32 GB/s = 8 GB/s, causing requests to queue and latency to spike.
