schema_version: 1
id: cloud-r2-41002
title: Why TP Stays Within a Node
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: Your team proposes using TP=16 across two 8-GPU nodes (one H100 node, one MI300X node) connected
  by 400 Gbps InfiniBand to train a 175B parameter model. Why is this almost certainly a bad idea, and
  what would you recommend instead?
details:
  realistic_solution: TP requires AllReduce after every attention and MLP block — 2 AllReduces per layer,
    executed synchronously. With 96 layers in a 175B model, that is 192 AllReduces per forward pass. Intra-node
    NVLink on H100 provides 900 GB/s bidirectional per GPU. Cross-node InfiniBand provides only 50 GB/s
    — an 18× slowdown on every collective. Each AllReduce that took 0.05 ms intra-node would take ~0.9
    ms cross-node, adding ~170 ms of pure communication overhead per forward pass. Instead, use TP=8 within
    each node and PP=2 across nodes. Pipeline parallelism only communicates activations between stages
    (one send per microbatch boundary), which is far less frequent and tolerates higher latency.
  common_mistake: Thinking that InfiniBand bandwidth (400 Gbps = 50 GB/s) is comparable to intra-node
    NVLink (900 GB/s bidirectional per GPU on H100). The 18× bandwidth gap makes cross-node TP devastating
    for throughput.
  napkin_math: 'NVLink: 900 GB/s. InfiniBand: 50 GB/s. Ratio: 18×. 192 AllReduces × 0.85 ms extra latency
    = 163 ms wasted per forward pass.'
