schema_version: 1
id: cloud-cell-10000
title: Estimating Activation Memory for a Transformer Layer on H100
topic: activation-memory
status: published
provenance: imported
scenario: You are profiling a 72-layer GPT-style Transformer with hidden size 8192, sequence length 4096,
  and batch size 8 running on an H100 (80 GB HBM3). Before enabling gradient checkpointing, you need to
  know how much activation memory the forward pass will consume across all layers so you can decide whether
  it fits alongside a 70B parameter model in fp16.
details:
  realistic_solution: 'Per layer: residual stream 2×B×S×H bytes (fp16), attention QKV projections 3×2×B×S×H,
    softmax scores 2×B×H×S×S (with H_heads heads), MLP intermediate 2×2×B×S×4H. For 72 layers at B=8,
    S=4096, H=8192: residual alone is 2×8×4096×8192×2≈1 GB per layer. Full activation budget across 72
    layers is roughly 150-200 GB, forcing at minimum 4× gradient checkpointing to fit in 80 GB alongside
    model weights.'
  common_mistake: Counting only the attention weight matrix activations and ignoring MLP intermediate
    tensors, layer-norm inputs, and residual stream copies, which together often account for 60-70% of
    activation memory.
  napkin_math: 'Single layer residual: 2 × 8 × 4096 × 8192 × 2 B = 1.07 GB. MLP intermediate: 2 × 8 ×
    4096 × 32768 × 2 B = 4.29 GB. Attention scores: 8 × 64 × 4096² × 2 B = 16.0 GB. Total per layer ≈
    22 GB × 72 layers ≈ 1584 GB raw; checkpointing every 4 layers drops stored activations to ~22 GB ×
    72/4 = 396 GB, still exceeding 80 GB, meaning segment-level checkpointing is required.'
last_modified: '2026-04-01'
tags:
- scope:Single-node, single-GPU activation budget estimation for large Transformer; excludes optimizer
  state and gradient memory.
