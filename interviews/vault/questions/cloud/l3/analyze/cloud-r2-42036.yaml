schema_version: 1
id: cloud-r2-42036
title: InfiniBand vs RoCE v2 for ML Training
topic: interconnect-topology
status: published
provenance: imported
scenario: Your team must choose between InfiniBand NDR (400 Gbps) and RoCE v2 (400 GbE) for a 256-GPU
  MI300X training cluster. Both offer the same raw bandwidth. What are the critical differences in congestion
  control, RDMA reliability, and multi-tenancy that affect AllReduce performance at scale?
details:
  realistic_solution: 'Ring AllReduce 1GB on 256 GPUs at 50 GB/s: 2 × (255/256) × 1GB / 50GB/s = 39.8ms
    (not 10.2ms).'
  common_mistake: Treating IB and RoCE as equivalent because they have the same RDMA verbs API and similar
    bandwidth. The congestion control and lossless fabric requirements are fundamentally different, and
    these differences dominate at scale.
  napkin_math: 'AllReduce time: 2 × 1GB × 255/256 / 50GB/s = 2 × 255/256/50 = 510/12800 = 0.03984s = 39.8ms
    (not 10.2ms — same calculation as cloud-r2-42025).'
