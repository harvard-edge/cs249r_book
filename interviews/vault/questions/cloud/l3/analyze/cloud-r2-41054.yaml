schema_version: 1
id: cloud-r2-41054
title: K8s Resource Limits vs Requests for GPU Workloads
topic: container-orchestration
status: published
provenance: imported
scenario: In Kubernetes, CPU and memory support both 'requests' (scheduling guarantee) and 'limits' (hard
  cap). GPU resources only support 'limits.' Why this asymmetry, and what does it mean for GPU scheduling?
details:
  realistic_solution: 'GPUs are fundamentally different from CPU/memory: (1) Non-compressible: CPU can
    be time-shared (a pod using ''less than requested'' still allows other pods to use the slack). GPU
    contexts are exclusive — a GPU assigned to a pod is fully reserved even if utilization is 0%. (2)
    No overcommit: CPU allows requests < limits, enabling oversubscription (schedule more pods than physical
    cores). GPU device plugin allocates whole devices, so requests = limits is enforced by design. If
    you request 2 GPUs, you get exactly 2 physical GPUs (or MIG instances). (3) No fractional allocation:
    CPU supports milliCPU (e.g., 500m = 0.5 cores). GPU has no equivalent — you get 0 or 1+ whole GPUs.
    Implications: (a) GPU bin-packing is coarser than CPU — you cannot request 0.5 GPU natively. (b) GPU
    utilization waste is harder to reclaim — an idle GPU in a running pod cannot be lent to another pod.
    (c) Solutions for fractional GPU: use MIG for hardware partitioning, or NVIDIA''s MPS with time-slicing
    device plugin (beta) for software partitioning. The time-slicing plugin allows nvidia.com/gpu: 1 to
    map to a shared GPU slice.'
  common_mistake: Setting nvidia.com/gpu in resources.requests but not limits. For GPUs, requests and
    limits must be equal — there is no oversubscription. Setting only requests without limits has no effect.
  napkin_math: '8-GPU node serving pods requesting 1 GPU each: max 8 pods regardless of utilization. With
    MIG 1g.10gb: max 56 pods (7 per GPU). With time-slicing (10 replicas per GPU): max 80 pods (but shared
    performance).'
