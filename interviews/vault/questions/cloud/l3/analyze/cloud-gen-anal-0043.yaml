schema_version: 1
id: cloud-gen-anal-0043
title: Gradient Accumulation Memory Reduction Discrepancy
topic: memory-pressure-management
status: published
provenance: imported
scenario: An ML engineer is fine-tuning a 3B parameter model using mixed precision (FP16) and the Adam
  optimizer on a single H100 GPU (80 GB HBM3). At a batch size of 64, training crashes with an Out-of-Memory
  (OOM) error because the system requires 88 GB of memory. To resolve this, the engineer applies gradient
  accumulation with a micro-batch size of 16 (4 accumulation steps), expecting the total memory usage
  to drop by roughly 75% to around 22 GB. Instead, training successfully runs but consumes 58 GB of memory.
  Explain why the memory footprint only decreased by 30 GB rather than the expected 66 GB.
details:
  realistic_solution: Total memory is the sum of model weights, gradients, optimizer states, and forward
    activations. Gradient accumulation only reduces the activation memory by shrinking the micro-batch
    size. The model weights, accumulated gradients, and optimizer states remain fixed regardless of the
    micro-batch size. Therefore, only the activation memory portion was reduced by a factor of 4, while
    the substantial static memory overhead remained constant.
  common_mistake: Candidates often assume that total GPU memory usage scales linearly with batch size.
    They fail to separate memory into static components (model weights, optimizer states, gradients) which
    are independent of batch size, and dynamic components (activations) which scale with batch size.
  napkin_math: '1. Static memory for 3B params: Weights (FP16) = 3B * 2 bytes = 6 GB. Gradients (FP16)
    = 3B * 2 bytes = 6 GB. Adam Optimizer (FP32 master weights, momentum, variance) = 3B * 12 bytes =
    36 GB. Total static memory = 6 + 6 + 36 = 48 GB. 2. Activation memory at BS=64: Total needed (88 GB)
    - Static (48 GB) = 40 GB. 3. Activation memory at BS=16: 40 GB / 4 = 10 GB. 4. Total memory at BS=16:
    48 GB (static) + 10 GB (activations) = 58 GB.'
