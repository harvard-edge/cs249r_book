schema_version: 1
id: cloud-gen-anal-0009
title: LLM Inference Utilization at Batch Size 1
topic: compute-cost-estimation
status: published
provenance: imported
scenario: A team estimated the cloud compute cost of serving an LLM by assuming their A100 GPUs (312 TFLOPS
  FP16, 2.0 TB/s memory bandwidth) would operate near 100% compute utilization. However, during live inference
  at batch size 1, the cost per token is drastically higher because the GPUs are achieving less than 1%
  of peak TFLOPS. Given the A100's ridge point of ~156 FLOPs/Byte, explain why the compute utilization
  collapses at batch size 1, and why estimating cost based purely on peak TFLOPS is flawed for this workload.
details:
  realistic_solution: At batch size 1, generating a single token requires loading the entire model's weight
    matrices from HBM into SRAM to perform matrix-vector multiplications. The arithmetic intensity (FLOPs
    performed per byte of memory read) is extremely low. Because this intensity is far below the A100's
    ridge point of 156 FLOPs/Byte, the workload operates in the memory-bound regime. The execution time
    is strictly bottlenecked by the 2.0 TB/s memory bandwidth, leaving the massive 312 TFLOPS compute
    engines severely underutilized.
  common_mistake: Candidates often incorrectly attribute the low utilization to CPU overhead, Python framework
    inefficiencies, or PCIe data transfer latency. They fail to recognize the fundamental arithmetic intensity
    of the workload and the concept of memory bandwidth bottlenecks.
  napkin_math: For a dense weight matrix of size NxN, there are N^2 parameters taking 2*(N^2) bytes in
    FP16. A matrix-vector multiplication (batch size 1) performs 2*(N^2) FLOPs. Arithmetic intensity =
    (2*(N^2) FLOPs) / (2*(N^2) Bytes) = 1 FLOP/Byte. Max achievable performance = 1 FLOP/Byte * 2.0 TB/s
    = 2.0 TFLOPS. Max Compute Utilization = 2.0 TFLOPS / 312 TFLOPS = 0.64%.
