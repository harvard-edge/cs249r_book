schema_version: 1
id: cloud-fill-02001
title: M/M/1 Queue Utilization and Mean Wait on A100 Serving Node
topic: queueing-theory
status: published
provenance: imported
scenario: A single A100 (80GB HBM2e, 2TB/s) is serving LLM decode requests. Arrival rate λ=90 req/s, mean
  service rate μ=100 req/s. An SRE claims the system is fine because utilization is under 100%. Calculate
  mean wait time in queue and explain why utilization near 90% is dangerous for tail latency.
details:
  realistic_solution: 'M/M/1: ρ=λ/μ=90/100=0.9. Mean wait in queue Wq = ρ/(μ(1-ρ)) = 0.9/(100×0.1) = 90ms.
    Mean time in system W = 1/(μ(1-ρ)) = 100ms. P99 wait ≈ 4.6/(μ(1-ρ)) = 4.6/(100×0.1) = 460ms — 5× the
    mean W=100ms. Systems targeting p99<200ms must keep ρ<0.7.'
  common_mistake: Reporting only utilization ρ=0.9 as the metric; ignoring the nonlinear explosion of
    Wq as ρ→1.
  napkin_math: ρ=0.9, μ=100/s → Wq=9ms×10=90ms wait. p99≈4.6×100ms=460ms. Target ρ≤0.7 for p99≤230ms.
