schema_version: 1
id: cloud-r2-41007
title: TP and Attention Head Partitioning
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: A model has 32 attention heads. Your cluster has 8 GPUs per node. Can you use TP=8? What about
  TP=6? Explain the constraint that attention heads place on TP degree.
details:
  realistic_solution: 'TP=8 with 32 heads: 32/8 = 4 heads per GPU. This works perfectly. TP=6 with 32
    heads: 32/6 = 5.33 — not an integer. You cannot split an attention head across GPUs without fundamentally
    changing the computation (each head''s Q, K, V projections and attention computation are tightly coupled).
    So TP must divide the head count evenly. Practically, TP is always a power of 2 (1, 2, 4, 8) because:
    (a) GPU counts per node are powers of 2, (b) NVLink topologies are optimized for power-of-2 groups,
    (c) head counts in modern models are always powers of 2 or multiples of common TP degrees. For GQA
    models with fewer KV heads (e.g., 8 KV heads), this further constrains TP to divide the KV head count,
    limiting TP to at most 8.'
  common_mistake: Assuming any TP degree works. Since each GPU must get an equal number of complete attention
    heads, TP must evenly divide the number of heads.
  napkin_math: '32 heads ÷ TP=8 = 4 heads/GPU. 32 heads ÷ TP=6 = 5.33 → invalid. Valid TP values for 32
    heads: 1, 2, 4, 8, 16, 32.'
