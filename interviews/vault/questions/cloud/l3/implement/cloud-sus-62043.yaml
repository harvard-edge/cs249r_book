id: cloud-sus-62043
title: Embedding Dimension Selection and Capacity
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: 'You have a catalog of 100M items and must choose an embedding dimension (options: 16, 32, 64,
  128, 256) for the item embedding table. The table must fit in 512 GB of GPU HBM across a cluster. Compute
  the maximum embedding dimension that fits, and explain the relationship between embedding dimension
  and model capacity using the intrinsic dimensionality argument.'
details:
  realistic_solution: 'Storage: 100M items × dim × 4 bytes (FP32) = dim × 400 MB. At 512 GB: max dim =
    512 GB / 400 MB = 1280. But in practice, use 20% headroom: 512 × 0.8 = 409.6 GB / 400 MB = 1024-dim
    would be the absolute max. Practical recommendation: 256-dim uses 100 GB (20% of cluster HBM). Capacity
    argument: for a catalog of N items, the minimum dimension needed to represent all pairwise relationships
    is O(log N) — the intrinsic dimensionality. For 100M items: log₂(100M) ≈ 27 dimensions would theoretically
    suffice for perfect orthogonal separation. In practice, embedding dimensions of 64-128 are sufficient
    for most recommendation tasks; going beyond 256 shows diminishing returns unless interaction features
    are extremely high-dimensional. Choice: 64-dim (uses 25 GB) is often optimal by the information-theoretic
    argument, leaving 487 GB for other model components.'
  common_mistake: Choosing the largest dimension that fits without considering that embedding capacity
    scales logarithmically with dimension — going from 128 to 256 dims doubles storage but provides far
    less than 2× improvement in representational capacity for a fixed catalog size.
  napkin_math: 'Storage per dim: 100M × 4 bytes = 400 MB. Dim choices: 16→6.4 GB, 32→12.8 GB, 64→25.6
    GB, 128→51.2 GB, 256→102.4 GB. 512 GB budget: any of these fit easily. Max dim in budget: 512 GB /
    400 MB = 1280 (ignore dims > 256 due to diminishing returns). Representational capacity: dim=64 gives
    64-dimensional space for 100M items → avg angle between random vectors ≈ 90° (orthogonal) for up to
    ~2^64 items — more than sufficient. Going to dim=256: marginal capacity gain ≈ 0, but 4× storage cost.'
