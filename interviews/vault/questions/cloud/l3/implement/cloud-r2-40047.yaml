schema_version: 1
id: cloud-r2-40047
title: Gradient Clipping Interaction with AllReduce
topic: gradient-synchronization
status: published
provenance: imported
scenario: Global gradient norm clipping requires computing the total gradient norm across all GPUs before
  clipping. This means an extra AllReduce of a single scalar (the local gradient norm) before the main
  gradient AllReduce. For a 256-MI300X cluster, calculate the overhead of this extra AllReduce and determine
  if it can be overlapped with other operations.
details:
  realistic_solution: 'Scalar AllReduce: D = 4 bytes (FP32 norm squared). Using recursive halving-doubling
    (optimal for small messages): T = 2 × log₂(256) × α = 2 × 8 × 5μs = 80μs. This is fast in absolute
    terms but it sits on the critical path: compute_backward → compute_local_norm → scalar_AllReduce →
    clip_gradients → gradient_AllReduce. The scalar AllReduce cannot overlap with gradient AllReduce because
    clipping requires the global norm first. Optimization: (1) Compute local norms per-bucket as gradients
    become available (during backward pass). (2) Start scalar AllReduce for the global norm while the
    last layers are still computing backward. (3) Pipeline: local_norm_bucket_1 is ready before backward
    completes. AllReduce scalar for bucket_1, clip bucket_1, start gradient AllReduce for bucket_1 — all
    while bucket_2 is still being computed. This converts the sequential dependency into a pipelined flow.
    Per-bucket overhead: 80μs scalar AllReduce + 5μs clip computation = 85μs. With 32 buckets and pipelining:
    only one 85μs delay on the critical path (the last bucket), not 32 sequential delays.'
  common_mistake: Ignoring the scalar AllReduce overhead because 'it is just one number.' At 256 GPUs,
    even a single-scalar AllReduce takes multiple μs due to the per-step latency, and it creates a synchronization
    barrier that prevents gradient AllReduce from starting.
  napkin_math: 'Sequential (no overlap): 256-GPU backward = 200ms. Norm compute = 2ms. Scalar AllReduce
    = 80μs. Clip = 5μs. Gradient AllReduce = 80ms. Total: 282ms. With bucket pipelining: 200ms (backward,
    overlapped with everything) + 80ms (gradient AllReduce, overlapped with backward) + 85μs (last bucket''s
    norm AllReduce + clip) = ~200.1ms. Savings: 82ms or 29% of iteration time.'
