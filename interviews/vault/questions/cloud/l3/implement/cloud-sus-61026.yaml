id: cloud-sus-61026
title: LoRA Rank Selection and Memory Budget
topic: model-adaptation-systems
status: published
provenance: imported
scenario: You need to fine-tune a 7B parameter base model using LoRA on a single H100 (80 GB). Calculate
  the memory budget for rank-16 LoRA vs full fine-tuning.
details:
  realistic_solution: 'Full fine-tune 7B (FP32): 7B × 4 bytes = 28 GB weights + 56 GB optimizer (Adam:
    2 moments × 28 GB) + activations = ~120 GB — exceeds H100. LoRA rank-16: trainable params = 2 × rank
    × d_model × num_layers = 2 × 16 × 4096 × 32 = 4.19M params. Adapter memory: 4.19M × 4B = 16.8 MB weights
    + 33.6 MB optimizer. Frozen base (BF16): 7B × 2B = 14 GB. Total: ~14.05 GB — easily fits.'
  common_mistake: Calculating LoRA memory as just the adapter parameters. Engineers forget that the frozen
    base model weights must still reside in GPU memory, and optimizer states are needed for the trainable
    adapter parameters.
  napkin_math: 'LoRA trainable params: 2 × 16 × 4096 × 32 layers = 4,194,304 ≈ 4.19M. Adapter memory:
    4.19M × 4 bytes (FP32) = 16.8 MB. Base model BF16: 14 GB. Adapter Adam states: 33.6 MB. Activations
    (batch=4, seq=2048): ~2 GB. Total: 14 + 0.017 + 0.034 + 2 ≈ 16.1 GB. H100 has 80 GB — 5× headroom
    for larger batches.'
