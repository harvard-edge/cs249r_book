schema_version: 1
id: cloud-r2-42006
title: Prefill-Decode Latency Decomposition
topic: tail-latency
status: draft
provenance: imported
scenario: A 70B model on an MI300X processes a 4096-token prompt followed by 256-token generation. The
  prefill takes 180ms and each decode step takes 12ms. Calculate the total latency, the time-to-first-token,
  and explain why optimizing prefill vs decode requires fundamentally different strategies.
details:
  realistic_solution: 'TTFT = prefill = 180ms. Total latency = 180ms + 256 × 12ms = 180 + 3072 = 3252ms.
    Prefill optimization: increase compute utilization — use FlashAttention, fuse operations, maximize
    Tensor Core occupancy. MI300X has 1307 TFLOPS FP16; prefill of 4096 tokens at 70B params ≈ 2 × 70B
    × 4096 = 574 TFLOPS needed, achievable at ~44% MFU. Decode optimization: maximize memory bandwidth
    utilization — MI300X has 5.3 TB/s; loading 70B × 2 bytes = 140 GB per step at 5.3 TB/s = 26ms theoretical
    minimum per step. Actual 12ms per step uses batched decoding (multiple requests sharing weight loads).
    These are fundamentally different optimization axes.'
  common_mistake: Treating prefill and decode as the same workload. Prefill is compute-bound (large matrix
    multiplications over all input tokens), while decode is memory-bandwidth-bound (loading full model
    weights for a single token output).
  napkin_math: 'TTFT = 180ms. Total = 180 + 256 × 12 = 3252ms. Prefill FLOPs: 2 × 70B × 4096 = 574 TFLOPS.
    MI300X at 1307 TFLOPS: 574/1307 = 0.44s → 440ms theoretical, 180ms achieved means batching across
    layers. Decode: 140 GB / 5.3 TB/s = 26ms per token (single request). Batched at 8: amortized weight
    load, 12ms per token.'
