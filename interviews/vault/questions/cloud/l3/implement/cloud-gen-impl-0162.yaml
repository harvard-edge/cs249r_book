schema_version: 1
id: cloud-gen-impl-0162
title: Calculate Logit Memory in LLM Knowledge Distillation
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are implementing knowledge distillation for a language model on a single A100 GPU (80 GB
  HBM2e). To compute the KL-divergence loss, both the teacher's and student's unnormalized logits must
  be in memory simultaneously. Given a batch size of 16, a sequence length of 4096, a vocabulary size
  of 65,536, and requiring FP32 for numerical stability in the softmax calculation, calculate the total
  memory required in GiB just to store the logits for both models.
details:
  realistic_solution: The correct approach is to calculate the total number of elements in the logit tensor
    by multiplying the batch size, sequence length, and vocabulary size. Next, multiply this element count
    by 4 bytes to account for the FP32 precision required for numerical stability. Finally, multiply the
    result by 2 to account for both the teacher and student models, and convert the total bytes into GiB
    by dividing by 2^30. This reveals a 32 GiB memory footprint just for logits, consuming 40 percent
    of the A100's 80 GB HBM2e capacity.
  common_mistake: Candidates often assume logits are stored in FP16 (2 bytes) matching the model weights,
    rather than FP32 (4 bytes) required for stable softmax and KL-divergence operations. They may also
    forget to account for both the teacher and student tensors simultaneously.
  napkin_math: 'Elements per model = 16 (batch) * 4096 (seq) * 65536 (vocab) = 4,294,967,296 elements
    (2^32).

    Memory per model = 2^32 elements * 4 bytes (FP32) = 17,179,869,184 bytes = 16 GiB.

    Total memory (Teacher + Student) = 16 GiB * 2 = 32 GiB.'
