id: cloud-fill2-32039
title: FlashAttention Memory Savings Enable Longer Training Contexts
topic: flash-attention
status: published
provenance: imported
scenario: You train a 13B model on an A100 (80 GB HBM2e). Weights in BF16 = 26 GB. Optimizer states (AdamW,
  mixed precision) = 52 GB. Remaining HBM for activations = 2 GB. With standard attention (stores N×N
  matrix), what is the maximum sequence length? With FlashAttention, how does this change?
details:
  realistic_solution: 'Standard attention activation per layer per micro-batch for the attention matrix
    alone: N² × num_heads × 2 bytes = N² × 40 × 2 = 80N² bytes (assuming 40 heads for 13B). For the largest
    single-layer allocation (dominating term): 80N² ≤ 2 GB = 2,147,483,648 bytes. N² ≤ 26,843,545. N ≤
    5181 tokens. Accounting for other activations (MLP, etc.), practical max ≈ 3000-4000 tokens. With
    FlashAttention: no attention matrix stored in HBM. Activation memory per layer becomes O(N×d) = N
    × 128 × 40 × 2 = 10,240N bytes. For 2 GB: N ≤ 209,715 tokens. However, gradient checkpointing is needed
    to avoid storing all layers simultaneously. With checkpointing + FlashAttention: practical max sequence
    length = 16K-32K tokens with the same 2 GB activation budget. FlashAttention enables 4-8× longer contexts
    in the same memory.'
  common_mistake: Forgetting that activation memory includes more than just the attention matrix — there
    are also MLP activations, layer norm intermediates, and residual connections. But the attention matrix
    is the quadratic bottleneck.
  napkin_math: 'Standard: attention matrix = 80N² bytes. 2 GB → N ≤ 5181. FlashAttention: O(N) memory
    = 10,240N bytes. 2 GB → N ≤ 209K. With gradient checkpointing (sqrt(L) stored layers out of 40): 2
    GB / 7 checkpoints ≈ 290 MB per checkpoint → supports N=28K per layer.'
