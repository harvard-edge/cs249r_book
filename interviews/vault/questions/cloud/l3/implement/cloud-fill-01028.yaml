schema_version: 1
id: cloud-fill-01028
title: Optimizing LLM Inference on H100 with Pipeline Parallelism
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are deploying a large language model with 10 sequential layers on a cluster of NVIDIA H100
  GPUs. Each H100 has 80 GB HBM3 memory, 989 TFLOPS FP16 dense compute, and 3.35 TB/s memory bandwidth.
  You decide to use pipeline parallelism across 4 H100 GPUs, assigning 2-3 layers per GPU. Assume each
  stage (GPU) takes approximately 200ms to process any micro-batch (up to the full batch size) and the
  communication overhead between GPUs is 5ms per micro-batch. Analyze the 'bubble' overhead and propose
  an optimal micro-batch size to maximize throughput for a total batch size of 64.
details:
  realistic_solution: To maximize throughput, the optimal strategy is to minimize the total time required
    to process the full batch. Given that GPU processing time (Tp) for a micro-batch is assumed constant
    (200ms) up to the full batch size, increasing the micro-batch size (Mb) reduces the number of micro-batches
    (N_mb) that need to be processed sequentially through the pipeline. The formula for total time T_total
    = (S + N_mb - 1) * (Tp + Tc) shows that T_total decreases as N_mb decreases. Therefore, the optimal
    micro-batch size for maximum throughput is Mb = 64 (the full batch size), effectively running the
    pipeline with one 'micro-batch' which is the entire batch. However, in practice, smaller micro-batches
    might be chosen to reduce the 'time to first token' (latency) or if the full batch cannot fit into
    a single GPU's memory.
  common_mistake: A common mistake is incorrectly assuming processing time scales linearly with micro-batch
    size when GPU parallelism allows for concurrent processing of samples within a micro-batch. Another
    mistake is miscalculating the bubble overhead or overlooking the trade-offs between throughput and
    latency (first token out) when choosing micro-batch size.
  napkin_math: 'Given:

    - Number of stages (S) = 4

    - Processing time per micro-batch per stage (Tp) = 200ms

    - Communication overhead per micro-batch per stage (Tc) = 5ms

    - Total batch size (B) = 64


    Time per pipeline step (Tp + Tc) = 200ms + 5ms = 205ms.


    The ''bubble'' overhead (time until the pipeline is full and producing steady output) is:

    Bubble_time = (S - 1) * (Tp + Tc) = (4 - 1) * 205ms = 3 * 205ms = 615ms.


    The total time to process the full batch (T_total) with N_mb micro-batches is:

    T_total = (S + N_mb - 1) * (Tp + Tc)


    To maximize throughput, we need to minimize T_total. This occurs when N_mb is minimized, which means
    Mb is maximized.

    Optimal Micro-batch size (Mb) = Total batch size (B) = 64.


    With Mb = 64, N_mb = 1.

    T_total = (4 + 1 - 1) * 205ms = 4 * 205ms = 820ms.

    Throughput = 64 samples / 0.820s = 78.05 samples/s.


    If Mb = 1 (for comparison), N_mb = 64.

    T_total = (4 + 64 - 1) * 205ms = 67 * 205ms = 13735ms = 13.735s.

    Throughput = 64 samples / 13.735s = 4.66 samples/s.


    Thus, an optimal micro-batch size of 64 maximizes throughput in this scenario, yielding a total time
    of 820ms and a throughput of 78.05 samples/s.'
