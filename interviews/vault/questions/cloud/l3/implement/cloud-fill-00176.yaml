id: cloud-fill-00176
title: NVIDIA H100 KV-Cache Capacity Planning
topic: kv-cache-management
status: published
provenance: imported
scenario: 'You are tasked with optimizing KV-cache management for a large language model deployed on an
  NVIDIA H100 GPU (80 GB HBM3, 3.35 TB/s memory bandwidth). The model uses paged attention, and each attention
  head has a dimension of 128, with a total of 96 attention heads. The KV-cache stores keys and values
  as `bfloat16` (2 bytes per value).


  Considering the entire 80 GB HBM3 is dedicated solely to KV-cache storage (ignoring model weights, activations,
  and other overheads for this theoretical exercise), what is the maximum theoretical total number of
  tokens that the H100''s HBM3 can store in its KV-cache across all concurrent requests? Provide the formula
  and the resulting number.'
details:
  realistic_solution: In a real-world scenario with paged attention, the KV-cache is managed in fixed-size
    blocks, which reduces fragmentation and allows for efficient sharing of memory across requests. However,
    the fundamental calculation for the total theoretical capacity based on memory density remains the
    same. Memory pressure from long contexts is typically managed by intelligent eviction policies (like
    Least Recently Used for cache blocks) or by techniques such as windowed attention or summarization
    to keep context length manageable within the physical memory limits. The calculation derived provides
    an upper bound; actual usable capacity might be lower due to fragmentation and system overheads.
  common_mistake: A common mistake is underestimating the memory footprint per token, often by forgetting
    to account for both Key (K) and Value (V) states, or miscalculating the `dtype` size. Another pitfall
    is to ignore the cumulative effect of `num_attention_heads` across all layers when considering total
    model KV-cache, though this question simplifies to a per-token basis.
  napkin_math: "1. Calculate KV-cache size per token:\n   `KV_size_per_token = num_attention_heads * head_dim\
    \ * 2 (for K and V) * sizeof(bfloat16)`\n   `KV_size_per_token = 96 * 128 * 2 * 2 bytes/value`\n \
    \  `KV_size_per_token = 49152 bytes/token`\n\n2. Calculate total theoretical tokens:\n   `HBM3_capacity\
    \ = 80 GB = 80 * 1024 * 1024 * 1024 bytes`\n   `Max_total_tokens = HBM3_capacity / KV_size_per_token`\n\
    \   `Max_total_tokens = (80 * 1073741824) / 49152`\n   `Max_total_tokens = 85899345920 / 49152`\n\
    \   `Max_total_tokens ≈ 1,747,600 tokens`"
