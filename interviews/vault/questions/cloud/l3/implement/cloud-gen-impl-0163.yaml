id: cloud-gen-impl-0163
title: Calculate KV-Cache Memory for 7B Model Inference
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying a 7B parameter Transformer model on a single A100 GPU (80 GB HBM2e) for batched
  text generation. The model has 32 layers, a hidden dimension of 4096, and uses FP16 precision. Calculate
  the exact memory required in Gigabytes (GB) to store the KV-cache for a batch size of 16, assuming all
  sequences in the batch have reached a context length of 1024 tokens.
details:
  realistic_solution: 'The correct approach is to apply the KV-cache memory formula: Memory = 2 (for K
    and V) * 2 bytes (for FP16) * num_layers * hidden_size * sequence_length * batch_size. By plugging
    in the provided model specifications, we can calculate the per-token memory footprint and then scale
    it by the context length and batch size to find the total memory consumed by the KV-cache.'
  common_mistake: Candidates often forget to account for both the Key and Value tensors (missing a factor
    of 2) or forget to multiply by the byte size of the data type (FP16 = 2 bytes). Another common error
    is only calculating the size for a single layer instead of multiplying by the total number of layers.
  napkin_math: '1. Bytes per token per layer = 2 (K & V) * 2 bytes (FP16) * 4096 (hidden dim) = 16,384
    bytes.

    2. Bytes per token across all layers = 16,384 bytes * 32 layers = 524,288 bytes (~0.5 MB).

    3. KV-cache per sequence (1024 tokens) = 524,288 bytes * 1024 = 536,870,912 bytes (512 MiB).

    4. Total KV-cache for batch of 16 = 512 MiB * 16 = 8,192 MiB = 8 GiB.'
