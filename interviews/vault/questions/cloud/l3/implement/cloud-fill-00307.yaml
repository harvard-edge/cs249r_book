schema_version: 1
id: cloud-fill-00307
title: 'Optimizing LLM Deployment on A100: Mitigating Memory Fragmentation and OOM'
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are deploying a large language model (LLM) for inference on an NVIDIA A100 GPU (80 GB HBM2e
  memory, 2.0 TB/s bandwidth). During peak load, you observe frequent Out-Of-Memory (OOM) errors and degraded
  performance, despite the model nominally fitting within the 80 GB. Investigations reveal that dynamic
  memory allocations for intermediate activations, caching, and background OS processes are causing memory
  fragmentation, leading to OOM even when total free memory theoretically exists. The model's batch size
  is already optimized to the maximum possible. How would you diagnose and implement mitigation strategies
  for these memory pressure issues, specifically addressing fragmentation and potential OS-level eviction,
  to ensure stable and efficient operation?
details:
  realistic_solution: '1.  **Deep Memory Profiling**: Use tools like `nvidia-smi` and framework-specific
    profilers (e.g., PyTorch''s `cuda.memory_summary()`, Nsight Systems) to identify peak memory usage,
    allocation patterns, and fragmentation hot-spots. 2.  **Custom Memory Allocators**: Implement or tune
    custom CUDA memory allocators (e.g., PyTorch''s caching allocator settings, or potentially custom
    C++ CUDA allocators) to better manage memory chunks, coalesce free blocks, and reduce fragmentation.
    3.  **OS-level Tuning**: Investigate and tune Linux kernel parameters related to memory management
    (e.g., `vm.swappiness`, `transparent_hugepages` configuration, OOM killer thresholds) if the OS is
    aggressively swapping, evicting GPU-related memory pages, or contributing to fragmentation. Ensure
    proper container resource limits to constrain background processes. 4.  **Activation Offloading/Eviction
    Policies**: Strategically offload less critical data or activations to host memory (CPU) when under
    extreme pressure, or implement custom eviction policies if the framework allows, although this might
    introduce latency.'
  common_mistake: Candidates often focus solely on the model's static memory footprint and neglect dynamic
    memory allocations, system overhead, or the critical impact of memory fragmentation where sufficient
    total memory exists but not in contiguous blocks large enough for new allocations.
  napkin_math: "Consider an NVIDIA A100 with 80 GB HBM2e. If an LLM and its immediate working set (activations,\
    \ buffers) consume 70 GB, leaving 10 GB free. If this 10 GB is fragmented into, for example, five\
    \ 1.5 GB blocks and several smaller ones, while a crucial intermediate tensor for the next operation\
    \ requires a contiguous 2 GB block, an OOM error will occur. \n\n**Calculation Example**:\n*   Total\
    \ HBM2e: 80 GB\n*   Model + Peak Activations + Buffers: 70 GB\n*   Total Free Memory: 10 GB\n*   Required\
    \ Contiguous Block for new allocation: 2 GB\n*   Largest Actual Contiguous Free Block (due to fragmentation):\
    \ 1.5 GB\n*   Result: OOM Error, despite 10 GB of total free memory being reported by simple `cuda.memory_allocated()`\
    \ checks. This illustrates that `Total Free Memory != Max Allocatable Contiguous Block`."
