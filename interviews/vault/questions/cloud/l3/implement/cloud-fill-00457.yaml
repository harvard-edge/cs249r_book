id: cloud-fill-00457
title: Memory Optimization for LLMs on TPU v5e with Mixed-Precision Quantization
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'You are developing a strategy to deploy large language models (LLMs) on Google TPU v5e, which
  is equipped with 16 GB of HBM and 197 TFLOPS (BF16). A critical challenge is fitting models with up
  to 10 billion parameters into this limited memory. All weights and activations are initially in BF16.
  Your team is exploring mixed-precision quantization, selectively converting some layers to INT8 while
  others remain in BF16, using post-training static quantization (PTQ) techniques.


  **Question:** For a 10-billion parameter model, if you need to load it entirely into the TPU v5e''s
  16 GB HBM, and knowing that BF16 parameters consume 2 bytes each while INT8 parameters consume 1 byte
  each, calculate the minimum number of parameters (in billions) that *must* be quantized to INT8 to fit
  the entire 10-billion parameter model into the available HBM.'
details:
  realistic_solution: Utilize a memory profiling tool to accurately measure the BF16 memory consumption
    of various layers. Implement an iterative post-training static quantization (PTQ) strategy, starting
    with less sensitive layers or those with the largest memory footprints, and quantizing them to INT8.
    Validate the model's accuracy on a representative dataset after each iteration. For per-tensor quantization,
    ensure that scales and zero-points are stored efficiently (e.g., in BF16 or FP16). If accuracy degrades
    significantly, consider more advanced calibration strategies or switch to quantization-aware training
    (QAT).
  common_mistake: A common mistake is failing to account for *both* weights and activations when calculating
    memory footprint, or neglecting the overhead of storing quantization parameters (scales and zero-points)
    for per-tensor/per-channel quantization, which slightly reduces the theoretical memory gain. Another
    pitfall is overlooking the impact of activation distributions on quantization quality.
  napkin_math: 'Let ''x'' be the number of parameters in BF16 and ''y'' be the number of parameters in
    INT8.

    Total parameters: x + y = 10 billion

    Memory constraint: 2x + 1y <= 16 GB (since BF16 is 2 bytes/param and INT8 is 1 byte/param)

    From the first equation, y = 10 - x. Substitute into the second equation:

    2x + (10 - x) <= 16

    x + 10 <= 16

    x <= 6

    This means a maximum of 6 billion parameters can remain in BF16. Consequently, a minimum of y = 10
    - 6 = 4 billion parameters *must* be quantized to INT8.'
