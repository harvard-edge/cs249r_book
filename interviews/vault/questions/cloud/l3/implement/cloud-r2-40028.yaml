schema_version: 1
id: cloud-r2-40028
title: Bucket Fusion in NCCL AllReduce
topic: gradient-synchronization
status: published
provenance: imported
scenario: A ResNet-152 model has 232 gradient tensors ranging from 4KB (bias terms) to 64MB (large conv
  layers). Without fusion, NCCL launches 232 separate AllReduce operations. With NCCL_BUFFSIZE=4MB bucket
  fusion, calculate how many AllReduce operations are needed and the expected speedup from reduced kernel
  launch overhead.
details:
  realistic_solution: 'Total gradient size for ResNet-152: ~232MB (60M parameters × 4 bytes FP32, though
    gradients are often FP16 = ~120MB). With 4MB buckets: 120MB / 4MB = 30 buckets. Instead of 232 AllReduce
    launches, we now have 30. Each AllReduce launch has fixed overhead: CUDA kernel launch (~5μs) + NCCL
    initialization (~20μs) + network RTT (~5μs) = ~30μs per launch. Saved overhead: (232 - 30) × 30μs
    = 6.06ms. For a 100ms training iteration, this is a 6% speedup just from reducing launch overhead.
    Additionally, larger messages (4MB vs average 517KB) achieve better bandwidth utilization — small
    messages are latency-bound. NCCL fusion bucket fills bottom-up from the last layer''s gradients, enabling
    overlap: the first bucket (last layers'' gradients) starts AllReduce while earlier layers are still
    computing their backward pass.'
  common_mistake: Thinking bucket fusion simply concatenates tensors. It must respect backward-pass ordering
    — tensors are fused in reverse computation order so that AllReduce can start as soon as the first
    bucket fills, overlapping communication with the remaining backward pass.
  napkin_math: 'Without fusion: 232 launches × 30μs = 6.96ms overhead + bandwidth time. With fusion (30
    buckets): 30 × 30μs = 0.9ms overhead. Bandwidth at 400Gbps for 120MB: 120MB / 50GB/s = 2.4ms. Total
    without fusion: 6.96 + 2.4 = 9.36ms. With fusion: 0.9 + 2.4 = 3.3ms. Speedup: 2.8×.'
