id: cloud-fill-01459
title: Real-time Feature Freshness and Throughput for A100 Inference
topic: feature-store-management
status: published
provenance: imported
scenario: You are designing a real-time recommendation system that serves billions of requests daily.
  The inference models are deployed on a cluster of NVIDIA A100 GPUs. Each A100 has 80 GB HBM2e memory,
  delivers 312 TFLOPS (FP16), and boasts 2.0 TB/s memory bandwidth. For optimal recommendation quality,
  features must be as fresh as possible, ideally within 500ms of an event occurring. Your system generates
  a new set of 256 features (each feature is a 32-bit float) for each user interaction, which needs to
  be available in the online feature store within the freshness SLA. The A100-powered models can process
  a batch of 1024 requests in 5ms if features are readily available in GPU memory. Design the feature
  pipeline and online feature store interaction, paying close attention to the implications of feature
  freshness and point-in-time correctness.
details:
  realistic_solution: 'Implement a two-tier feature store architecture: an ultra-low-latency online store
    (e.g., Redis, Cassandra, DynamoDB) for real-time serving and a robust offline store (e.g., Snowflake,
    BigQuery, Apache Hudi) for training, backfilling, and batch processing. Utilize stream processing
    frameworks (e.g., Apache Flink, Spark Streaming, Kafka Streams) for real-time feature computation
    and ingestion into the online store, employing a push-based mechanism for minimal latency. Ensure
    versioning and accurate timestamps are used for point-in-time correctness, allowing for historical
    feature retrieval consistent with training data. Leverage distributed caching mechanisms and pre-fetching
    strategies to keep hot features in memory or close to the A100 GPUs, minimizing data transfer overheads
    and maximizing the utilization of the A100''s 2.0 TB/s memory bandwidth for model inference. Implement
    robust monitoring and alerting for feature freshness and data pipeline health.'
  common_mistake: Failing to account for data staleness between online and offline feature stores, leading
    to training-serving skew. Another common pitfall is underestimating the latency introduced by feature
    computation and retrieval from the online store, causing the feature pipeline to become the bottleneck
    for high-throughput A100 inference, rather than the model itself.
  napkin_math: Given a single NVIDIA A100 can process a batch of 1024 requests in 5ms, what is the minimum
    sustained throughput (in MB/s) required from the online feature store to deliver feature vectors to
    the GPU, assuming each feature vector is 256 32-bit floats and features are loaded in batches? Additionally,
    if the end-to-end latency from an event occurring to its corresponding feature vector being available
    for inference must not exceed 500ms, and the feature computation pipeline itself takes 400ms, what
    is the maximum allowable latency (in ms) for the online feature store to retrieve a batch of features?
