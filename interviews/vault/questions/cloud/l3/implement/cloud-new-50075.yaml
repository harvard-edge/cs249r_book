schema_version: 1
id: cloud-new-50075
title: Overlapping Gradient Accumulation Steps with Next Batch Loading
topic: communication-computation-overlap
status: published
provenance: imported
scenario: You use gradient accumulation with 4 micro-steps before each AllReduce (to simulate a larger
  batch size without more GPUs). During the 3 intermediate micro-steps, no AllReduce happens — the GPU
  does only computation. You notice that data loading for the next micro-batch is not overlapped with
  compute. Fix this.
details:
  realistic_solution: 'Use PyTorch DataLoader with prefetch_factor=2 and num_workers >= 4 to ensure the
    next batch is ready before the current one finishes. For gradient accumulation: (1) While micro-step
    i is computing on GPU, DataLoader workers prepare micro-step i+1 on CPU, and the DMA engine transfers
    it to GPU memory. (2) Use pin_memory=True and non_blocking transfers. (3) For 4 micro-steps: overlap
    chain is compute(i) || load(i+1) || prepare(i+2). (4) Additionally, during the AllReduce step (micro-step
    4), overlap three things: AllReduce, next batch loading, AND gradient accumulation bookkeeping. This
    ensures zero idle time across all 4 micro-steps.'
  common_mistake: Only prefetching the next micro-batch during AllReduce steps. The 3 intermediate micro-steps
    also need data prefetching, but since there is no communication to wait on, the GPU finishes compute
    and stalls waiting for the next batch from CPU.
  napkin_math: 'Without overlap: 4 x (50ms compute + 8ms load) = 232ms + 20ms AllReduce = 252ms per global
    step. With overlap: 4 x max(50, 8) + 20ms = 220ms. Savings: 32ms (12.7%). For 1000 steps: 32 seconds
    saved.'
