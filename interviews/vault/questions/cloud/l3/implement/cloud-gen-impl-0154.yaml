schema_version: 1
id: cloud-gen-impl-0154
title: 'KV Cache Footprint: Decoder vs Encoder-Decoder'
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: You are evaluating models for a summarization service on an A100 (80 GB HBM2e) GPU. You must
  choose between a 24-layer Decoder-only model and an Encoder-Decoder model with 12 encoder layers and
  12 decoder layers. Both models use a hidden dimension of 4096 and FP16 precision (2 bytes). For a batch
  size of 32 and an input prompt of 1024 tokens, calculate the exact KV cache memory footprint in bytes
  required just after processing the prompt (before generating the first output token) for both architectures.
details:
  realistic_solution: 'The Decoder-only model must cache keys and values for all prompt tokens across
    all 24 layers to avoid recomputing them during generation. The Encoder-Decoder model processes the
    prompt in the encoder without caching, and only stores the final encoder hidden states in the cross-attention
    KV cache of its 12 decoder layers. The general formula is: 2 (for K and V) * 2 bytes * layers * hidden_dim
    * seq_len * batch_size.'
  common_mistake: Candidates often assume the encoder-decoder model caches keys and values across all
    24 layers, forgetting that encoder layers do not maintain an autoregressive KV cache and only the
    12 decoder layers store the cross-attention cache.
  napkin_math: 'Formula: 2 * 2 * L * h * S * B

    Decoder-only KV Cache = 4 * 24 * 4096 * 1024 * 32 = 12,884,901,888 bytes (approx 12.88 GB).

    Encoder-Decoder KV Cache = 4 * 12 * 4096 * 1024 * 32 = 6,442,450,944 bytes (approx 6.44 GB).

    The Encoder-Decoder architecture requires exactly half the KV cache memory for the prompt state compared
    to the Decoder-only model.'
