schema_version: 1
id: cloud-r2-42018
title: Little's Law Under Variable Service Times
topic: tail-latency
status: published
provenance: imported
scenario: 'Your A100 inference server processes a mix of requests: 70% are short (20ms) and 30% are long
  (200ms). The arrival rate is 100 req/s. Use Little''s Law to calculate the average concurrency, and
  explain why the variance in service time makes the actual P99 queue depth much worse than the average
  suggests.'
details:
  realistic_solution: 'Mean service time W = 0.7 × 20ms + 0.3 × 200ms = 74ms. Little''s Law: L = λ × W
    = 100 × 0.074 = 7.4 concurrent requests on average. But the Pollaczek-Khinchine formula shows that
    variance matters enormously. Variance = 0.7 × (20-74)² + 0.3 × (200-74)² = 0.7 × 2916 + 0.3 × 15876
    = 2041 + 4763 = 6804. CV² = 6804/74² = 1.24. For M/G/1 queue, mean waiting time = (ρ × W × (1 + CV²))
    / (2 × (1-ρ)). With utilization ρ = 0.74: mean wait = (0.74 × 74 × 2.24) / (2 × 0.26) = 236ms. P99
    wait ≈ 3× mean wait ≈ 708ms. The high variance makes P99 queueing 10× the mean service time.'
  common_mistake: Using just the mean service time in Little's Law and assuming the system behaves as
    if all requests were average. High variance in service time (coefficient of variation > 1) causes
    queueing delays that are much worse than the mean predicts.
  napkin_math: 'Mean service: 74ms. Little''s Law: L = 100 × 0.074 = 7.4 concurrent. Utilization: ρ =
    100 × 0.074 = 0.74. CV² = 6804/5476 = 1.24. M/G/1 mean wait: 236ms. P99 wait: ~708ms. If all requests
    were 74ms (CV=0): mean wait = 0.74 × 74 / (2 × 0.26) = 105ms. Variance penalty: 236/105 = 2.25×.'
