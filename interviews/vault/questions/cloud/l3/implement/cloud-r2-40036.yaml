schema_version: 1
id: cloud-r2-40036
title: Gradient Accumulation as Communication Reduction
topic: gradient-synchronization
status: published
provenance: imported
scenario: Your 64-A100 cluster trains a 7B model with micro-batch size 4 per GPU. AllReduce of 14GB gradients
  (FP32) takes 280ms per iteration. Compute (forward + backward) takes 150ms per micro-batch. By accumulating
  gradients over 4 micro-batches before AllReducing, calculate the effective batch size, communication
  overhead reduction, and memory cost.
details:
  realistic_solution: 'Without accumulation: Effective batch size = 64 GPUs × 4 = 256. Iteration time:
    150ms compute + 280ms AllReduce = 430ms. Throughput: 256 samples / 430ms = 595 samples/sec. With 4×
    accumulation: Effective batch size = 64 × 4 × 4 = 1024. Iteration time: 4 × 150ms compute + 1 × 280ms
    AllReduce = 880ms. Throughput: 1024 samples / 880ms = 1163 samples/sec (1.95× improvement). Communication
    fraction: from 280/430 = 65.1% down to 280/880 = 31.8%. Memory cost: need persistent FP32 gradient
    buffer = 7B × 4 bytes = 28GB. This is in addition to the optimizer states (28GB for Adam momentum
    + 28GB for Adam variance) and the model weights (14GB FP16). Total per-GPU memory: 14 + 28 + 28 +
    28 = 98GB — fits on A100-80GB only if activations are checkpointed. On MI300X with 192GB, this fits
    comfortably with room for large activation buffers.'
  common_mistake: Not accounting for the memory overhead of gradient accumulation. Accumulated gradients
    must be stored in FP32 to avoid precision loss from repeated FP16 additions, requiring a persistent
    FP32 gradient buffer equal to the model size.
  napkin_math: 'Communication reduction: 4× accumulation means AllReduce happens 4× less often. From 65%
    overhead to 32%. Throughput gain: 1.95× more samples/sec. Tradeoff: 4× larger effective batch size
    may require learning rate warmup adjustment (linear scaling rule: LR × 4).'
