id: cloud-fill-01135
title: A100 Large Model Deployment Throughput
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team is deploying a large language model (LLM) for real-time inference. The model consumes
  60 GB of GPU memory when loaded. You're using NVIDIA A100 GPUs, each with 80 GB HBM2e memory and a peak
  memory bandwidth of 2.0 TB/s. Due to the model's size and inference patterns, each forward pass requires
  approximately 15 GB of data to be moved from HBM2e to streaming multiprocessors. Your MLOps pipeline
  emphasizes reproducibility and training-serving consistency, and you need to optimize the serving infrastructure.
  Assuming memory bandwidth is the primary bottleneck for data movement during inference, calculate the
  theoretical maximum number of inferences per second a single NVIDIA A100 GPU can sustain, purely based
  on its memory bandwidth capabilities.
details:
  realistic_solution: A realistic solution involves optimizing model serving using frameworks like NVIDIA
    Triton Inference Server, which can manage batching and concurrent model execution efficiently. Techniques
    such as model quantization (e.g., to FP8 or INT8) would significantly reduce the model's memory footprint
    and data movement per inference. Leveraging A100's Multi-Instance GPU (MIG) could also be considered
    for smaller, multiple models or concurrent tasks if appropriate. Continuous monitoring of GPU metrics
    within the MLOps CI/CD pipeline is crucial to identify and address bottlenecks, ensuring consistent
    performance from training to deployment.
  common_mistake: Candidates often ignore memory bandwidth constraints, focusing solely on FLOPs or assuming
    sufficient memory capacity is enough. They might also overlook the practical overhead of dynamic model
    loading or intermediate activation transfers in real-world serving.
  napkin_math: 'NVIDIA A100 memory bandwidth (BW) = 2.0 TB/s = 2000 GB/s.

    Data movement per inference (DM) = 15 GB.

    Time per memory-bound inference (T_mem) = DM / BW = 15 GB / 2000 GB/s = 0.0075 seconds.

    Maximum memory-bound throughput = 1 / T_mem = 1 / 0.0075 s ≈ 133.33 inferences/second.'
