id: cloud-cell-13002
title: Implement Pipeline Parallelism Bubble Fraction Formula
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Your team is running a 64B parameter model on 8 H100s (80GB HBM3 each) using pipeline parallelism
  with p=8 stages and m micro-batches. The target is to keep bubble overhead below 5%. What is the minimum
  number of micro-batches required, and what is the resulting per-device memory pressure from stored activations
  during a GPipe synchronous pass?
details:
  realistic_solution: 'Bubble fraction = (p-1)/(m+p-1) < 0.05. Solve: (8-1)/(m+8-1) < 0.05 => 7/(m+7)
    < 0.05 => m+7 > 140 => m > 133. So m >= 134 micro-batches. In GPipe, all m forward activations are
    held simultaneously. 64B model hidden dim ~8192, activation per layer ~8192*seq*2bytes. With 80 layers
    / 8 stages = 10 layers/stage, activation per micro-batch per stage = 10 * 8192 * 2048 * 2 = 335MB.
    Storing 134 micro-batches = 44.9GB on top of 8GB weights/stage — tight on 80GB H100.'
  common_mistake: Using the wrong bubble formula or forgetting to account for activation memory scaling
    with micro-batch count in GPipe vs 1F1B scheduling.
  napkin_math: 'm_min = ceil(7/0.05) - 7 = 140 - 7 = 133, so m=134. Weights per stage: 64B/8 stages *
    2 bytes = 16GB. Activations (GPipe): 134 * 10 layers * 8192 * 2048 * 2 bytes = 134 * 335MB = 44.9GB.
    Total: 16 + 44.9 = 60.9GB — just under 80GB H100 limit.'
