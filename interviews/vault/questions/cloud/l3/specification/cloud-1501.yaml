id: cloud-1501
title: Trans-Pacific ML Fraud Detection Latency
topic: latency-decomposition
status: published
provenance: imported
scenario: A FinTech company needs to evaluate real-time credit card transactions for fraud. The business
  demands a strict 50ms end-to-end latency SLA. The ML model is highly optimized, taking only 10ms for
  inference on an NVIDIA T4 GPU. However, the centralized inference service is hosted in the us-east-1
  (Virginia) region, while a significant portion of the user base is located in Sydney, Australia (roughly
  15,000 km away). Evaluate if the current architecture can meet the SLA.
details:
  realistic_solution: Recognize that the speed of light in fiber optic cables strictly bounds the minimum
    latency. The SLA is physically impossible with a single us-east-1 deployment. The solution requires
    a multi-region active-active deployment (e.g., adding a Sydney region) to bypass the light barrier.
  common_mistake: Focusing solely on further model optimizations (e.g., quantization, TensorRT) to reduce
    the 10ms inference time without accounting for the physical network distance.
  napkin_math: Speed of light in fiber ≈ 200,000 km/s (200 km/ms). One-way transit time = 15,000 km /
    200 km/ms = 75ms. Round-trip time (RTT) = 75ms * 2 = 150ms. Total Latency = RTT + Inference = 150ms
    + 10ms = 160ms. 160ms is strictly greater than the 50ms SLA.
