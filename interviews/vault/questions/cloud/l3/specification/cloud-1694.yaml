id: cloud-1694
title: Accelerator Pipeline Throughput Calculation
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are evaluating a custom ML accelerator for LLM inference. Processing a single computational
  tile requires three sequential stages: loading weights and activations from SRAM to registers (15 cycles),
  executing the matrix multiplication on the systolic array (50 cycles), and writing the accumulated results
  back to SRAM (20 cycles). The accelerator features a decoupled access/execute architecture, allowing
  all three units to operate concurrently on different tiles (pipelining). What is the steady-state throughput
  in tiles per 100,000 clock cycles, and what is the utilization of the memory load unit?'
details:
  realistic_solution: 'In a decoupled pipeline, the stages overlap. The steady-state time per tile (Initiation
    Interval) is determined by the slowest stage: max(15, 50, 20) = 50 cycles. The steady-state throughput
    is 100,000 / 50 = 2,000 tiles. The memory load unit is active for 15 cycles every 50-cycle interval,
    resulting in a utilization of 15 / 50 = 30%.'
  common_mistake: Candidates often sum the cycle counts (85 cycles) and calculate throughput as 100,000
    / 85, failing to recognize that in a pipelined steady state, throughput is dictated strictly by the
    longest stage.
  napkin_math: 'Processing is pipelined across Load (15 cycles), Compute (50 cycles), and Store (20 cycles)
    stages. The pipeline interval is dictated by the slowest stage (bottleneck): max(15, 50, 20) = 50
    cycles/tile. Throughput per 100,000 cycles = 100,000 / 50 = 2,000 tiles. The Load unit is only active
    15 out of 50 cycles (30% utilization), and Store is active 20/50 (40%), waiting on Compute.'
