id: cloud-0093
title: The Serving Inversion
topic: latency-decomposition
status: published
provenance: imported
scenario: We took our highly-optimized training architecture (large batches, deep pipelines) and deployed
  it directly to serving. Now, user requests are timing out. What fundamental priority did we fail to
  invert?
details:
  realistic_solution: The shift from maximizing throughput ($T$) to minimizing latency ($L_{lat}$). Training
    maximizes throughput by using massive batches to keep the GPUs at 100% utilization. Serving minimizes
    latency because a slow response is a broken product. The batch-heavy architectures that saturate accelerators
    during training are fundamentally ill-suited for the bursty, latency-critical reality of production
    traffic.
  common_mistake: '"We need to scale up the serving cluster." More hardware won''t fix a design that optimizes
    for the wrong metric.'
  napkin_math: 'Training batch=256 on H100: 70B model, FP16 weights = 140 GB. At BS=256, arithmetic intensity
    = 256 FLOPs/byte — near the ridge point (295 Ops/Byte). GPU runs at ~85% MFU = 840 TFLOPS effective.
    Throughput = 256 tokens per step / (140 GB / 3.35 TB/s) = 256 / 42ms ≈ 6,100 tokens/sec. Serving batch=1
    on same H100: arithmetic intensity = 1 FLOP/byte — deeply memory-bound. Each decode step reads 140
    GB at 3.35 TB/s = 42ms/token. Throughput = 1/42ms = ~24 tokens/sec. Latency = 42ms/token. The same
    GPU achieves ~250x higher throughput at training batch sizes because the optimization target flipped
    from throughput to latency.'
