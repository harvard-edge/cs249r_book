id: cloud-1556
title: Static Memory Planning Buffer Reuse
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'You are deploying a sequential neural network block for inference on an NVIDIA T4 GPU. The
  block consists of three operations producing intermediate activation tensors: Op1 produces Tensor X
  (150MB), Op2 takes X and produces Tensor Y (300MB), and Op3 takes Y and produces Tensor Z (150MB). A
  naive runtime dynamically allocates all tensors simultaneously. A static memory planner uses liveness
  analysis to calculate exact memory offsets and reuse buffers. Calculate the peak memory required with
  static memory planning and the total memory saved compared to naive dynamic allocation.'
details:
  realistic_solution: Use liveness analysis to find overlapping tensor lifetimes. Tensor X and Y coexist
    during Op2. Tensor Y and Z coexist during Op3. Tensor Z can reuse the memory address space of Tensor
    X. Peak memory is determined by the maximum sum of coexisting tensors.
  common_mistake: Simply summing the sizes of all intermediate tensors (600MB) without accounting for
    the fact that Tensor X's memory can be freed and reused by Tensor Z once Op2 completes.
  napkin_math: 'Naive allocation footprint = X + Y + Z = 150 + 300 + 150 = 600MB.

    With memory planning (liveness analysis):

    Footprint during Op2 = X + Y = 150 + 300 = 450MB.

    Footprint during Op3 = Y + Z = 300 + 150 = 450MB.

    Peak memory = max(450, 450) = 450MB.

    Total memory saved = Naive (600MB) - Peak (450MB) = 150MB.'
