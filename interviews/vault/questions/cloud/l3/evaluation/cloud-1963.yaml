id: cloud-1963
title: KV-Cache Affinity in Canary Rollouts
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are rolling out a new conversational LLM version across a multi-region cluster currently
  running on 200 inference nodes. The system heavily relies on KV-cache affinity to minimize latency for
  multi-turn chats. You add 10 new nodes running the canary version. Calculate the impact on session continuity
  (cache misses) if the load balancer uses naive modulo hashing versus a consistent hashing ring for sticky
  routing.
details:
  realistic_solution: Implement a consistent hashing ring. This ensures that adding new model nodes only
    disrupts the sessions mapped to the specific ring segments they take over, preserving the KV-cache
    for the vast majority of ongoing multi-turn conversations.
  common_mistake: Using naive modulo hashing (hash(user_id) % num_nodes) for session affinity, which causes
    catastrophic cache invalidation when the node count changes during deployments.
  napkin_math: 'Naive Modulo: Changing from N=200 to N=210 means roughly 200/210 (95.2%) of users map
    to a different node, causing a massive KV-cache miss spike. Consistent Hashing: Adding 10 nodes to
    200 existing nodes only reassigns roughly 10/210 (4.7%) of the key space, preserving 95.3% of the
    KV-cache affinity.'
