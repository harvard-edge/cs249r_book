id: cloud-0859
title: Scaling Adversarial Debiasing Penalties
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are training a credit decision model on 4x A100 GPUs using Adversarial Debiasing to remove
  geographical proxy variables (which correlate with protected classes). The architecture has a shared
  encoder (512-d embeddings), a loan default predictor, and an adversary predicting zip code clusters.
  The encoder minimizes L_primary - λ L_adversary. Currently, the primary BCE loss is 0.60. The adversary's
  BCE loss has fallen to 0.15, indicating geographical data is heavily encoded. To aggressively debias,
  you want the adversarial penalty magnitude to be exactly twice the primary task loss. What must λ be
  set to, and what is the primary risk during training?
details:
  realistic_solution: Set λ = 8.0 to achieve the target penalty magnitude. Implement dynamic λ scaling
    or early stopping, as a multiplier this high risks 'catastrophic forgetting' where legitimate credit-risk
    features are erased alongside the proxy variables.
  common_mistake: Candidates often incorrectly invert the ratio (setting λ=0.25) or fail to identify that
    an overpowering adversarial penalty will destroy the encoder's ability to extract any useful predictive
    features, causing primary task failure.
  napkin_math: 'Target Penalty = 2 × L_primary = 2 × 0.60 = 1.20. Equation: λ × L_adversary = 1.20 → λ
    × 0.15 = 1.20 → λ = 1.20 / 0.15 = 8.0. The adversary''s gradients applied to the encoder will be heavily
    amplified.'
