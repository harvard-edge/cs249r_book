id: cloud-1134
title: Intra-Rack 400G Cabling Power and Cost
topic: collective-communication
status: published
provenance: imported
scenario: You are designing the intra-rack networking for a dense AI training rack containing 8 GPU servers.
  Each server requires four 400G Ethernet connections to a Top-of-Rack (ToR) switch. The longest cable
  run required is 2.5 meters. Compare the deployment cost and power overhead of using Direct Attach Copper
  (DAC) versus Active Optical Cables (AOC). Assume a passive DAC cable costs $150 and uses negligible
  active power. An AOC costs $400 and its optical transceivers consume 8W per end.
details:
  realistic_solution: Use passive DAC for all intra-rack connections under 3 meters. This eliminates transceiver
    conversion latency and significantly reduces rack power density and CapEx.
  common_mistake: Defaulting to optical cables for all high-bandwidth (400G+) links, ignoring the massive
    aggregate power and cost overhead of electro-optical conversion within a single rack.
  napkin_math: 'Total connections = 8 servers * 4 NICs = 32 links. Cost difference (AOC at $400 vs DAC
    at $150) saves 32 * $250 = $8,000 per rack. Active Optical Cables (AOCs) require transceiver power:
    8W per end * 2 ends = 16W per link. Direct Attach Copper (DAC) uses ~0W. Total power saved = 32 links
    * 16W = 512W per rack. Over a cluster, DAC dramatically lowers upfront CapEx and continuous cooling
    costs.'
