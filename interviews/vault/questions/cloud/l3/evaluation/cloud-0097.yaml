id: cloud-0097
title: The Continuous Batching Paradox
topic: batching-strategies
status: draft
provenance: imported
scenario: 'Your team is deciding whether to switch from static batching to continuous batching for your
  LLM service. A junior engineer argues against it, stating: ''Continuous batching is less efficient.
  By processing requests one-by-one as they arrive instead of in large, optimized batches, we will lower
  our GPU utilization and reduce our total throughput (tokens/sec).'' You are the tech lead. Solve this
  dispute by demonstrating how continuous batching can actually *increase* system throughput.'
details:
  realistic_solution: 'The junior engineer''s concern is valid but misses a key point: GPU idle time.
    With static batching, the GPU is often idle, waiting for a batch to fill. This is especially true
    with a wide distribution of request arrival times. Continuous batching (or ''dynamic batching'') eliminates
    this idle time. When a sequence in the current batch finishes, a new waiting sequence is immediately
    swapped in. This keeps the total number of users being processed by the GPU (the ''batch size'') consistently
    high, leading to higher overall utilization. While a single ''iteration'' of the batch may not be
    at the *maximum theoretical* size, the GPU is performing useful work more of the time. This reduction
    in idle time often outweighs the slightly lower efficiency of not *always* running a full batch, leading
    to higher effective throughput.'
  common_mistake: Misunderstanding how GPU time is spent. The misconception is that continuous batching
    means processing one request at a time (batch size of 1). It's also easy to think that if you aren't
    running max-size batches, you are wasting GPU potential. This ignores the time the GPU spends *idle*.
  napkin_math: In a 200ms static batch window, if only 2 requests arrive, the GPU runs a batch size of
    2, wasting parallel compute. Continuous batching dynamically injects new requests into the running
    batch at every token step (e.g., every 10ms). While prefill and decode are intermixed, average batch
    size stays much higher, maximizing FLOP utilization.
