title: The Pipeline Bubble
topic: interconnect-topology
status: draft
provenance: imported
scenario: 'You are designing a large-scale training cluster for a 1-trillion parameter MoE model that
  requires a hybrid of data, tensor, and pipeline parallelism. You must decide between two topologies:'
details:
  realistic_solution: Option B, the NVLink 'super-node' topology, is superior. Pipeline parallelism requires
    passing large activation tensors between stages (e.g., from the GPUs in stage `i` to the GPUs in stage
    `i+1`). If these stages reside on different standard servers, the activation transfer must traverse
    the relatively slow InfiniBand network (~50 GB/s). If the stages are within a single NVLink 'super-node',
    the transfer happens over the ultra-fast NVLink fabric (~900 GB/s). By co-locating pipeline stages
    within a single NVLink domain, you dramatically reduce the transfer time, which directly minimizes
    the pipeline bubble and increases overall training efficiency.
  common_mistake: Engineers may incorrectly assume that all network traffic is equal. They might focus
    on the data parallelism `All-Reduce` pattern and conclude that a standard fat-tree is sufficient.
    This misses the critical insight that pipeline parallelism is extremely sensitive to the point-to-point
    bandwidth between the specific GPUs that hold adjacent model stages.
  napkin_math: 'Passing a 32GB activation tensor between pipeline stages: Over InfiniBand NDR (50 GB/s),
    transfer takes 32GB / 50 GB/s = 640ms. Over a topology with NVLink (900 GB/s) between stages, transfer
    takes 32GB / 900 GB/s = 35ms. Saving 605ms per micro-batch prevents massive pipeline bubbles.'
