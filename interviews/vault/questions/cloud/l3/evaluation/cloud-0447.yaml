title: 'The CISO vs. The CFO: Federated TCO'
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the lead ML Systems Engineer at a major bank, tasked with developing a next-generation
  fraud detection model. Two proposals are on the table:'
details:
  realistic_solution: The correct approach is to quantify the cost of risk using the Annualized Loss Expectancy
    (ALE) formula. While a $650k training bill is substantial, the change in annualized risk exposure
    is an order of magnitude larger. The TCO is dominated by the increased financial risk from centralizing
    sensitive data, making the federated learning approach, despite its complexities, far more attractive
    from a financial risk perspective.
  common_mistake: Engineers often focus purely on tangible, immediate costs like the cloud compute bill
    (OpEx) or hardware purchases (CapEx). They may treat security and privacy as abstract principles rather
    than quantifiable financial risks that must be included in a TCO analysis. A 2% chance of a $1B disaster
    isn't a vague 'risk'; it's a $20M annualized line item.
  napkin_math: Compare compute to Annualized Loss Expectancy (ALE). Training 70B model = $650k. If centralizing
    data increases a $100M breach probability from 1% to 5%, the change in ALE is (0.05 - 0.01) * $100M
    = $4M/year. The $4M annual risk dominates the $650k one-time compute cost.
