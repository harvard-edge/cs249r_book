schema_version: 1
id: cloud-0983
title: Calculating Gradient Bucketing Overlap
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are optimizing a distributed data-parallel training loop for a 1.2 GB parameter vision model
  across 16 GPUs connected via a 10 GB/s effective bandwidth network. Profiling shows the backward pass
  computation takes 150 ms. Currently, the system waits for the entire backward pass to finish before
  calling Ring-AllReduce on the 1.2 GB gradients (which takes 240 ms). If you partition the gradients
  into 4 equal-sized buckets to overlap the communication with the backward pass computation using CUDA
  streams, what is the new total time for the backward pass and synchronization, assuming perfect overlap
  and no scheduling overhead?
details:
  realistic_solution: Launch communication kernels on a separate CUDA stream. Since communication per
    bucket (60 ms) takes longer than computation (37.5 ms), the network dictates the critical path after
    the initial compute delay.
  common_mistake: Assuming perfect overlap means the time is simply max(compute, comm) = 240 ms, failing
    to account for the sequential dependency of the first bucket's computation before any communication
    can begin.
  napkin_math: 'Model weights in FP16: 1.2B params * 2B = 2.4GB. Total communication time = 2.4GB / 10
    GB/s = 240ms. Backward compute takes 150ms. Partitioning into 4 buckets: Compute per bucket = 150ms
    / 4 = 37.5ms. Comm per bucket = 240ms / 4 = 60ms. Pipelining overlap: Network is idle only during
    the first bucket''s compute (37.5ms), then fully saturated (240ms). Total time = 37.5ms + 240ms =
    277.5ms.'
