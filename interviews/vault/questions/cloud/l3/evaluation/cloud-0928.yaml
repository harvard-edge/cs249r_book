id: cloud-0928
title: Multi-Dimensional Bin Packing and Stranded GPUs
topic: pruning-sparsity
status: published
provenance: imported
scenario: A cluster has identical nodes with 8 GPUs, 64 CPUs, and 256GB RAM. You need to schedule a batch
  of 5 fine-tuning jobs (4 GPUs, 16 CPUs, 128GB RAM each) and 10 serving jobs (1 GPU, 16 CPUs, 64GB RAM
  each). Using a First-Fit Decreasing (FFD) scheduler sorted strictly by GPU demand (largest first), how
  many nodes are required, and how many total GPUs will be left stranded across the provisioned nodes
  due to multi-dimensional fragmentation?
details:
  realistic_solution: 'Nodes 1 and 2 pack two 4-GPU fine-tuning jobs each, fully utilizing all 8 GPUs
    and 256GB RAM per node. Node 3 packs the final 4-GPU job plus two 1-GPU serving jobs (6 GPUs, 48 CPUs,
    256GB — RAM-bound, 2 GPUs stranded). Nodes 4 and 5 each pack four 1-GPU serving jobs (4 GPUs, 64 CPUs,
    256GB — CPU/RAM-bound, 4 GPUs stranded). Total: 5 nodes needed, 10 GPUs stranded due to multi-dimensional
    resource constraints.'
  common_mistake: Calculating only the 1D GPU requirement (30 total GPUs / 8 = 4 nodes) without tracking
    CPU and RAM limits during the packing process, ignoring the multi-dimensional bin-packing nature of
    cloud scheduling that leads to stranded resources.
  napkin_math: 'Total Jobs: 5x(4G,16C,128R) + 10x(1G,16C,64R).

    Node limits: (8G, 64C, 256R).

    Nodes 1-2: 2x(4G,16C,128R) = (8G,32C,256R) -> 0 stranded GPUs.

    Node 3: 1x(4G,16C,128R) + 2x(1G,16C,64R) = (6G,48C,256R) -> RAM bound, 2 stranded GPUs.

    Node 4: 4x(1G,16C,64R) = (4G,64C,256R) -> CPU/RAM bound, 4 stranded GPUs.

    Node 5: 4x(1G,16C,64R) = (4G,64C,256R) -> CPU/RAM bound, 4 stranded GPUs.

    Total Stranded GPUs = 2 + 4 + 4 = 10 GPUs.'
