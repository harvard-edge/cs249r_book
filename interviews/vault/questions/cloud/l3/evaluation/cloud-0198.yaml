title: The Streaming vs Batch Inference
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Our chatbot returns the full response only after all tokens are generated. Users say it feels
  'broken' — they stare at a blank screen for 8 seconds. A colleague suggests streaming tokens as they're
  generated. Walk me through the latency math and when streaming actually helps vs. hurts.
details:
  realistic_solution: 'Streaming decouples perceived latency from total latency. The user sees the first
    token after TTFT (prefill time), then each subsequent token arrives at TPOT intervals. The *perceived*
    wait is TTFT (~200ms), not the total generation time. But streaming adds: (1) SSE/WebSocket framing
    overhead (~0.5ms/token), (2) client-side rendering cost, and (3) inability to retry or filter the
    full response before sending. For short responses, the total time with streaming overhead can exceed
    the non-streaming total time.'
  common_mistake: '"Streaming always improves the user experience." Streaming improves *perceived* latency
    for long responses but adds per-token SSE/WebSocket overhead and complicates error handling. For short
    responses (<20 tokens), the overhead can make streaming slower than batch.'
