scenario: 'You are the ML Systems Lead for a popular keyboard app with 10 million daily active users (DAU).
  Your team has A/B tested two new next-word prediction models against the current baseline, with the
  following results:'
details:
  realistic_solution: The correct decision involves calculating the tangible and intangible costs of both
    options. The cloud option has a clear, high operational cost and a massive, unquantifiable privacy
    risk. The federated option has a high *indirect* cost due to user churn.
  common_mistake: Focusing solely on the top-line engagement metric ('15% lift is best') while ignoring
    the second-order effects of cost and user trust. A common failure mode is to miscalculate or completely
    ignore indirect costs (like user churn from battery drain) or unquantifiable risks (like brand damage
    from a privacy scandal), leading to a decision that is locally optimal but globally catastrophic.
