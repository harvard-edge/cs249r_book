id: cloud-2062
title: The Hyperparameter Search Efficiency Gap
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A junior ML engineer runs 100 experiments using grid search over 5 hyperparameters with 10 values
  each (learning rate, batch size, weight decay, dropout, hidden dim). They request 100,000 GPU-hours.
  A senior engineer says this is absurdly wasteful and proposes an alternative. What is wrong with the
  grid search approach, and how would you reduce the compute budget by 10× while maintaining similar coverage?
details:
  realistic_solution: Grid search over 5 parameters with 10 values each requires 10^5 = 100,000 experiments.
    But research (Bergstra & Bengio, 2012) shows that for most ML workloads, only 2-3 hyperparameters
    materially affect performance. Random search with 100 experiments covers the important dimensions
    nearly as well because each trial samples a unique value for every parameter. Bayesian optimization
    (e.g., Optuna with TPE) can further reduce this to ~50 trials by learning which regions of the space
    are promising. Budget drops from 100,000 to 50-100 trials — a 1,000-2,000× reduction.
  common_mistake: Thinking grid search is just 'slow but thorough.' The actual problem is that grid search
    wastes most of its budget testing irrelevant hyperparameter interactions.
  napkin_math: 'Grid search: 10^5 = 100,000 trials. Random search (equivalent coverage): ~100 trials (1,000×
    fewer). Bayesian optimization: ~50 trials (2,000× fewer). At 1 GPU-hour per trial: grid = 100,000
    GPU-hours, random = 100 GPU-hours, Bayesian = 50 GPU-hours. Cost at $3/GPU-hr: $300K vs $300 vs $150.'
