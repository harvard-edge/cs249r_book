id: cloud-cell-12079
title: 'Model Size Estimation: Compare GPT-3 vs. LLaMA-2 Memory Footprint on H100'
topic: model-size-estimation
status: published
provenance: imported
scenario: Compare the memory footprints of GPT-3 (175B params, dense attention) vs. LLaMA-2-70B (70B params,
  GQA with 8 KV heads vs. 64 query heads) at inference time on H100 (80GB HBM3). For a batch of 16 requests
  with sequence length 2048, compute weights memory, KV-cache memory, and activations memory for both
  models.
details:
  realistic_solution: 'GPT-3 175B FP16: weights 350GB (needs 5 H100s). KV-cache: 16×2048×2×12288×2B×96
    layers = 16×2048×2×12288×2×96 = 155GB. Total: 505GB — needs 7 H100s. LLaMA-2 70B FP16: weights 140GB
    (needs 2 H100s). KV-cache GQA: 16×2048×2×4096×2B×80 layers × (8 KV heads/64 query heads) = 16×2048×2×512×2×80
    = 4.3GB. Total: 144.3GB — 2 H100s. GQA reduces KV-cache 8×.'
  common_mistake: Forgetting that LLaMA-2 uses Grouped Query Attention (GQA) with 8 KV heads instead of
    64, dramatically reducing KV-cache size — this is the primary memory efficiency advantage.
  napkin_math: 'LLaMA-2 70B GQA KV cache: KV heads=8, head_dim=128. Per token per layer: 2×8×128×2B =
    4096B. 80 layers × 2048 tokens × 16 batch = 80×2048×16×4096B = 10.7GB. GPT-3 KV: KV heads=96, head_dim=128.
    Per token: 2×96×128×2=49,152B. 96×2048×16×49152=156GB. GQA advantage: 156/10.7 = 14.6× less KV memory.'
