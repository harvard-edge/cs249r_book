id: cloud-0130
title: The Chatbot Latency Spike
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are an MLE on the AI Chatbot team, responsible for a real-time LLM inference service using
  a 7B parameter model on H100 GPUs. Users are complaining about 'laggy' responses. Your monitoring dashboard
  shows that while average Time-To-First-Token (TTFT) is acceptable at ~30ms, the P99 TTFT is over 200ms.
  Furthermore, `nvidia-smi` shows GPU utilization is spiky and averages only 40%, well below your 90%
  target.
details:
  realistic_solution: The root cause is head-of-line blocking introduced by the static batching strategy.
    This approach forces requests that arrive early in the 50ms window to wait unnecessarily, directly
    causing high tail latency (P99). This fixed wait also leads to inefficient, small batches when the
    request rate is low or bursty, causing the low GPU utilization. The combination of high latency and
    low utilization is a classic symptom of a poorly designed scheduling/batching system that fails to
    adapt to a variable workload.
  common_mistake: Engineers often focus only on the raw model execution time (prefill and decode) and
    forget the queueing and scheduling time, which often dominates the end-to-end latency in a live service.
    They mistakenly blame the hardware's speed (e.g., 'we need faster GPUs') instead of the system's scheduling
    logic, which is the actual source of the bottleneck.
  napkin_math: 7B model weights = 14GB FP16. H100 HBM3 is 3.35TB/s. Theoretical Time Per Output Token
    (TPOT) = 14GB / 3.35TB/s = 4.17ms. If actual TPOT is 30ms, you are only achieving 14% memory bandwidth
    utilization. The bottleneck is likely small batch sizes (low arithmetic intensity) or CPU-GPU overhead.
    Increasing batch size via continuous batching will hide this latency.
