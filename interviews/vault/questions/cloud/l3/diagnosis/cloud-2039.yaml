id: cloud-2039
title: The Embedding Cache Hit Rate Cliff
topic: compound-ai-systems
status: published
provenance: imported
scenario: You add an embedding cache (Redis, 64 GB) to avoid re-computing embeddings for repeated queries.
  Initially the hit rate is 72%, saving significant GPU cost. After expanding to 10× more users, the hit
  rate drops to 8% even though total query volume increased 10×. The cache size hasn't changed. Why did
  scaling users destroy your cache economics?
details:
  realistic_solution: 'The cache worked when a small user base had a Zipfian query distribution — a few
    hundred popular queries accounted for 72% of traffic. With 10× more users, the query distribution
    becomes much flatter (higher entropy): more unique queries, fewer repeats. The working set size grew
    superlinearly with user count because diverse users ask diverse questions. At 64 GB, the cache can
    hold ~10.7M cached embeddings (1536-dim FP32 ≈ 6KB each + key overhead). With 10× users generating
    33M unique queries per hour (out of 36M total), the effective working set vastly exceeds cache capacity
    and eviction rate skyrockets. Fix: (1) cache at the semantic level — cluster similar queries and cache
    cluster centroids, (2) use locality-sensitive hashing to map similar queries to the same cache key,
    (3) implement tiered caching — hot queries in Redis, warm queries on SSD-backed cache, (4) accept
    that embedding compute ($0.0001/query on a shared GPU) may be cheaper than cache infrastructure at
    this scale.'
  common_mistake: Thinking the cache is too small. A naive fix is '10× users = 10× cache.' But that doesn't
    address the fundamental distribution shift.
  napkin_math: '64 GB cache / 6 KB per embedding ≈ 10.7M entries. At 1K QPS with 72% hit rate: 720 cache
    hits/s, 280 misses/s. At 10K QPS with Zipf alpha dropping from 1.2 to 0.6: unique queries/hour goes
    from 1M to 33M. Since 33M > 10.7M capacity, cache churn is extreme. With 33M unique queries out of
    36M total, we get at most 3M hits. Effective hit rate drops to ~8%.'
