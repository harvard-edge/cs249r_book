schema_version: 1
id: cloud-new-50086
title: GradScaler Synchronization as a Hidden Overlap Barrier
topic: communication-computation-overlap
status: published
provenance: imported
scenario: Your DDP training with mixed-precision (FP16) and GradScaler runs 20% slower than expected despite
  good overlap. Profiling shows a synchronization point between the backward pass and optimizer step where
  all GPUs wait. This sync does not appear in FP32 training. What causes it?
details:
  realistic_solution: 'GradScaler workflow: (1) After backward: unscale_() divides all gradients by the
    loss scale. (2) Check for inf/nan in any gradient on any GPU — this requires an AllReduce of a single
    float (found_inf). (3) If any GPU has inf/nan, skip the optimizer step and reduce the scale. (4) This
    AllReduce is BLOCKING because the optimizer step cannot proceed until all GPUs agree on whether to
    skip. Fix: (a) Use BF16 instead of FP16 to eliminate GradScaler entirely (BF16 has FP32''s range,
    no overflow). (b) If FP16 is required, batch the inf check with the gradient norm AllReduce — one
    AllReduce instead of two. (c) Use NVIDIA Transformer Engine''s FP8 which has built-in scale management
    without per-step AllReduce.'
  common_mistake: Not realizing that GradScaler's unscale_() and step() perform an all-GPU check for inf/nan
    gradients. This requires an AllReduce of a boolean flag, which forces synchronization before the optimizer
    can run.
  napkin_math: 'GradScaler inf check AllReduce: 0.05ms per step (tiny message). But the synchronization
    barrier adds 1-5ms because GPUs finish backward at different times (straggler effect). 5ms/25ms step
    overhead = 20% — matches the observed slowdown.'
