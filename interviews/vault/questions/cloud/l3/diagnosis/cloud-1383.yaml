id: cloud-1383
title: HPCC Rate Adjustment with INT
topic: collective-communication
status: published
provenance: imported
scenario: Your training cluster uses a 400Gbps RoCEv2 fabric with a base RTT of 2 microseconds between
  racks. During a hybrid parallel training job, incast traffic causes congestion at a Top-of-Rack (ToR)
  switch port. You are implementing HPCC (High Precision Congestion Control) utilizing In-Band Network
  Telemetry (INT). An INT packet arrives at a sender reporting the bottleneck link capacity is 400Gbps
  and the current switch queue length is 50KB. Calculate the flow's new transmission rate if its current
  rate is 200Gbps, assuming the goal is to fully utilize the link while draining the queue.
details:
  realistic_solution: Use the INT metadata to calculate the exact total inflight bytes (BDP + Queue Depth),
    and scale the current sending rate by the ratio of the target inflight bytes (the base BDP) to the
    actual inflight bytes to drain the queue in precisely one RTT.
  common_mistake: Using reactive heuristics like AIMD (e.g., halving the rate on ECN marks) or ignoring
    the base Bandwidth-Delay Product (BDP) when calculating the inflight data.
  napkin_math: Link Bandwidth = 400 Gbps = 50 GB/s. Base BDP = 50 GB/s * 2µs = 100 KB. Total Inflight
    Bytes (I) = BDP + Queue Depth = 100 KB + 50 KB = 150 KB. Target Inflight = 100 KB. Rate Multiplier
    = Target / I = 100 / 150 = 2/3. New Rate = 200 Gbps * (2/3) = 133.3 Gbps.
