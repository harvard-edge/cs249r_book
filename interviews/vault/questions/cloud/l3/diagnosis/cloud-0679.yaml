id: cloud-0679
title: The Stalled Data Pipeline
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You've set up a distributed training job with 16 GPUs across 4 nodes. You notice that GPU utilization
  is consistently low (e.g., 40-50%), even though your CPU is not maxed out, and local SSDs are very fast.
  The logs indicate `data_loader` is the bottleneck. What's the likely culprit, and how would you diagnose
  and mitigate it?
details:
  realistic_solution: Given that local SSDs are fast and CPU isn't maxed, the likely culprit is a **network
    I/O bottleneck when fetching data from a shared network file system (NFS) or object storage (S3/GCS)**.
    In a distributed setting, all 16 GPUs (via their respective nodes) are concurrently trying to read
    data from a centralized storage system over the network. Even if individual local disk reads are fast,
    the aggregate network bandwidth to the shared storage, or the I/O capacity of the storage system itself,
    can become saturated.
  common_mistake: '"It must be a CPU bottleneck in data preprocessing, or the local disk isn''t fast enough."
    This ignores the distributed nature and potential network I/O issues.'
  napkin_math: Each of 4 nodes needs to feed 4 GPUs. If each GPU requires 1GB/s of data (e.g., for a large
    batch size and high throughput), then each node needs 4GB/s. For 4 nodes, this is an aggregate of
    16GB/s. A 10Gbps Ethernet link provides ~1.25GB/s. Even a 100Gbps link (12.5GB/s) could be a bottleneck
    if not configured optimally or if shared. If your shared storage is on a single 100Gbps link, it can
    easily be saturated by 4 nodes each pulling 4GB/s.
