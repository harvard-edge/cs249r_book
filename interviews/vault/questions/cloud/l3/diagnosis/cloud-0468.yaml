id: cloud-0468
title: 'The Multi-Node Scaling Cliff: Collective Communication'
topic: collective-communication
status: published
provenance: imported
scenario: You are a Staff ML Systems Engineer diagnosing a severe scaling issue. Your team is training
  a 70B parameter model using FSDP (Fully Sharded Data Parallel) across 16 nodes, each with 8 H100 GPUs.
  When training on a single node, GPU utilization is >90%, but at 16 nodes, scaling efficiency plummets
  to 45%, and `top` shows GPUs frequently waiting. `nccl-tests` confirm intra-node bandwidth is near the
  theoretical maximum, but inter-node bandwidth is dramatically lower. Given that FSDP requires an All-Reduce
  collective communication step for gradients after each backward pass, diagnose the primary bottleneck
  limiting your multi-node performance.
details:
  realistic_solution: The primary bottleneck is the inter-node InfiniBand fabric. In FSDP, the All-Reduce
    operation sums and distributes gradients across all GPUs in the training job. While communication
    within a node (8 GPUs) happens over the ultra-fast 900 GB/s NVLink, communication between the 16 nodes
    must cross the significantly slower 50 GB/s (400 Gbps) InfiniBand network. This disparity creates
    a massive communication bottleneck as the model scales out, leaving GPUs waiting for gradient updates
    from other nodes. The system is communication-bound by the inter-node network.
  common_mistake: Engineers often conflate different system interconnects. A common mistake is to blame
    the PCIe bus for all GPU communication issues, forgetting that NVLink creates a direct, high-speed
    bridge between GPUs within a node, bypassing PCIe for GPU-to-GPU traffic. Another is to assume all
    network is the same, not realizing the orders-of-magnitude difference between on-server and across-server
    bandwidth.
  napkin_math: 1. **Calculate Gradient Size:** A 70B parameter model using FP16 for gradients requires
    70 billion * 2 bytes/param = 140 GB of data to be communicated during the All-Reduce step.
