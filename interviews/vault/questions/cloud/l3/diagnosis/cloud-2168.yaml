id: cloud-2168
title: The Warp Divergence Tax
topic: roofline-analysis
status: published
provenance: imported
scenario: You profile a sparse attention kernel that uses an `if-else` branch to skip zero-valued elements.
  The kernel's arithmetic intensity should place it in the compute-bound region of the roofline, yet the
  profiler shows it achieves only 15% of peak FLOPS. The profiler also reports 'branch divergence' at
  65%. Explain the performance gap and estimate the throughput loss from this divergence pattern.
details:
  realistic_solution: 'In SIMT execution, all 32 threads in a warp must execute the same instruction at
    the same time. When threads within a warp take different branches (diverge), the GPU serializes execution:
    first all threads taking the `if` path execute while the others are masked, then the `else` path executes.
    With 65% divergence, most warps execute both paths, reducing the warp execution efficiency to ~45%.
    Furthermore, only 35% of the total threads actually perform the useful compute. The compound effect
    of only 35% of threads doing useful work multiplied by the ~45% instruction efficiency of the divergent
    warps results in the observed ~15% of peak FLOPS.'
  common_mistake: Thinking branch divergence causes random thread stalls like on a CPU. On a GPU, the
    penalty is not random delays but serialized execution of both paths within the same warp.
  napkin_math: 'If 35% of threads do compute and 65% skip, the theoretical maximum useful work is 35%.
    However, due to 65% warp divergence, these warps must serialize the `if` and `else` paths. This serialization
    reduces the execution efficiency of the instructions themselves to ~45%. The compound effect: 35%
    useful threads × 45% warp execution efficiency ≈ 15.7% (roughly 15%) of peak FLOPS observed.'
