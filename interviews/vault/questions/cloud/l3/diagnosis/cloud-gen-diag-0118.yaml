schema_version: 1
id: cloud-gen-diag-0118
title: Toxicity Classifier Bandwidth Saturation
topic: responsible-ai
status: published
provenance: imported
scenario: To comply with organizational guardrails, a toxicity classifier is deployed alongside a production
  LLM on the same H100 GPU (80 GB HBM3, 3.35 TB/s bandwidth, 989 TFLOPS FP16). The governance SLA requires
  the classifier to sustain 5 TFLOPS of continuous compute to evaluate generated tokens in real-time.
  The classifier model has an arithmetic intensity of 0.5 FLOPs/Byte. Upon enabling this guardrail, the
  LLM's decode throughput plummets, and the classifier fails to meet its latency SLA despite the H100
  having 989 TFLOPS of compute available. Diagnose the root cause.
details:
  realistic_solution: The root cause is complete memory bandwidth saturation. While the compute requirement
    is negligible for an H100, the classifier's low arithmetic intensity makes it heavily memory-bound.
    It attempts to pull more bandwidth than the hardware can support, saturating the HBM3 bus and completely
    starving the LLM's decode phase, which is also memory-bandwidth bound.
  common_mistake: Candidates often assume that since 5 TFLOPS is less than 1% of the H100's 989 TFLOPS
    capacity, the bottleneck must be CPU-GPU transfer overhead or a software locking issue. They fail
    to consider the memory bandwidth demands of a model with low arithmetic intensity.
  napkin_math: Required Bandwidth = Target Compute / Arithmetic Intensity. Required Bandwidth = 5 TFLOPS
    / 0.5 FLOPs/Byte = 10 TB/s. The H100's maximum HBM3 bandwidth is 3.35 TB/s. Because 10 TB/s > 3.35
    TB/s, the guardrail classifier hits the memory wall and throttles the entire GPU.
