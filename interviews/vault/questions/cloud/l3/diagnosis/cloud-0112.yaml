schema_version: 1
id: cloud-0112
title: The Prefill-Decode Collision
topic: batching-strategies
status: published
provenance: imported
scenario: 'Your team has successfully implemented continuous batching for your LLM inference service on
  H100s. Average latency has dropped dramatically. However, you notice a troubling pattern in your P99
  TTFT metrics: sometimes, a very short user prompt (e.g., ''Hello'') gets a TTFT of over 800ms. The system
  is not overloaded, and this happens when the short prompt arrives just after a request with a very long
  prompt (e.g., a 32k token document) begins processing. Why would a short prompt be forced to wait so
  long in a continuous batching system?'
details:
  realistic_solution: The problem is the non-preemptive nature of the prompt processing (prefill) stage.
    When the 32k token document begins processing, the GPU is occupied with a single, large compute kernel
    to calculate its initial KV cache. This operation is compute-intensive and cannot be interrupted.
    The short prompt, despite being in a 'continuous' system, must wait in a queue for this long-running
    prefill to complete before its own (very fast) prefill can start. The subsequent decode steps are
    short and iterative, allowing for easy interleaving of different requests, but the initial prefill
    of a very long context is a major source of P99 latency.
  common_mistake: Thinking that 'continuous batching' magically allows all operations to be perfectly
    interleaved. Engineers often underestimate the duration and monolithic nature of the initial prefill/prompt
    processing stage for very long sequences, which can introduce a transient, but significant, head-of-line
    blocking effect even in advanced schedulers.
  napkin_math: 'In continuous batching, a new short prompt (10 tokens) arrives while a 32k token prompt
    is prefilling. 13B model (26GB FP16) prefill FLOPs = 2 * 13B * 32k = 832 TFLOPs. On H100 (989 TFLOPS),
    this prefill blocks the GPU for 832/989 = 0.84 seconds. The short prompt must wait 840ms, violating
    SLA. Solution: Chunked prefill to yield the GPU every ~50ms.'
