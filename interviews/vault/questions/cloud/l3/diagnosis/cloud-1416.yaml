id: cloud-1416
title: Calculating Influence Functions for Model Debugging
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are debugging a confidently incorrect prediction from a 50-million parameter ResNet model
  trained on a 1-million image dataset. To identify which training samples most heavily caused this prediction,
  you plan to use influence functions. You have a cluster of 100 A100 GPUs (each delivering ~19.5 TFLOPS
  in FP32). Calculate the computational time and memory required to exactly compute the inverse Hessian,
  and apply the appropriate approximation technique to solve this.
details:
  realistic_solution: Instead of forming the Hessian, apply the Linear time Stochastic Second-Order Algorithm
    (LiSSA) or Conjugate Gradient to compute an implicit Inverse Hessian-Vector Product (IHVP), reducing
    both time and memory complexity to $O(p)$.
  common_mistake: Attempting to explicitly materialize the full Hessian matrix ($O(p^2)$ memory) or computing
    its exact inverse ($O(p^3)$ compute), which is practically impossible for modern deep neural networks.
  napkin_math: 'Full Hessian memory: (50 x 10^6)^2 x 4 bytes = 10 PB. Exact inverse compute: (50 x 10^6)^3
    = 1.25 x 10^23 FLOPs. On 100 A100s at 19.5 TFLOPS FP32 each (1.95 x 10^15 FLOP/s total), time = 1.25
    x 10^23 / 1.95 x 10^15 = 6.4 x 10^7 seconds (~742 days, over 2 years). IHVP approximation (LiSSA/CG)
    reduces compute to O(p) per influence query, taking minutes instead of years on a single GPU.'
