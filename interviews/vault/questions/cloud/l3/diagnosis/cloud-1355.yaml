id: cloud-1355
title: Triple Modular Redundancy Calculation
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are operating a cloud-based inference service for critical healthcare diagnostics using
  H100 GPUs. To protect against silent data corruption (SDC) and transient hardware faults, you implement
  Triple Modular Redundancy (TMR) across 3 independent GPU instances with a majority voting circuit. Historically,
  a single GPU instance has a 1% probability of producing a faulty output under sustained load during
  a 30-day window (p = 0.01). Assuming the voting circuit is perfectly reliable and GPU failures are independent,
  calculate the probability of the entire TMR system producing an incorrect agreed-upon output within
  that 30-day window.
details:
  realistic_solution: Use the binomial probability formula for 2 or more failures. The system fails if
    exactly 2 or exactly 3 instances fail. P(system fails) = 3 * p^2 * (1-p) + p^3. With p = 0.01, the
    failure probability is exactly 0.000298.
  common_mistake: Calculating only the probability of all three GPUs failing (p^3 = 0.000001) and ignoring
    the fact that a majority voting system fails if any TWO components fail.
  napkin_math: P(2 fail) = 3 * (0.01)^2 * (0.99) = 3 * 0.0001 * 0.99 = 0.000297. P(3 fail) = (0.01)^3
    = 0.000001. Total failure probability = 0.000297 + 0.000001 = 0.000298 (approx 0.03%).
