id: cloud-2152
title: The FP16 Loss Scaling Dance
topic: pruning-sparsity
status: published
provenance: imported
scenario: You switch a training run from BF16 to FP16 to use Tensor Core optimizations on older V100 GPUs.
  Training appears to work for 1,000 steps, then the loss flatlines and stops decreasing. Gradient norms
  show zero. What happened, and what mechanism should have prevented this?
details:
  realistic_solution: 'FP16 has a much smaller dynamic range than BF16 (max ~65K, min ~6×10⁻⁸). Small
    gradient values — common in later training stages — underflow to zero in FP16. Dynamic loss scaling
    should prevent this: it multiplies the loss by a large factor (e.g., 2¹⁶ = 65536) before the backward
    pass, keeping gradients in FP16''s representable range. After backward, gradients are unscaled before
    the optimizer step. If loss scaling fails (e.g., the scale becomes too small after repeated overflows),
    gradients silently underflow. Check: is the loss scaler''s current scale very small? Has it been reducing
    after repeated Inf/NaN detection?'
  common_mistake: Assuming gradients are actually zero because the model converged. In reality, small
    gradients underflow to zero in FP16's limited dynamic range.
  napkin_math: 'FP16 smallest normal: ~6e-8 | Typical late-training gradient: ~1e-7 | Without scaling:
    gradients at 1e-7 barely survive in FP16 | With loss scale 65536: gradient becomes 1e-7 × 65536 ≈
    6.5e-3 — safely representable | BF16 range: ~1e-38 to ~3e38 — underflow is essentially never a problem'
