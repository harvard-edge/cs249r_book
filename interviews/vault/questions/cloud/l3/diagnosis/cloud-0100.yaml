id: cloud-0100
title: The Unstable Translation Queue
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are designing a real-time translation service with a hard deadline: Time To First Token
  (TTFT) must be under 200ms. The system uses a 7B parameter model on an H100, which takes 20ms for prefill
  and 8ms per generated token. At peak, the service receives requests at an average rate (λ) of 10 requests/second.
  The average request needs 15 tokens. The current design uses a simple FIFO queue feeding a single inference
  worker. Use queueing theory to diagnose if this system can meet its deadline.'
details:
  realistic_solution: The system is unstable and cannot meet its deadline. The critical issue is that
    the arrival rate (λ) is higher than the service rate (μ), which guarantees that the queue will grow
    infinitely long over time, causing unbounded latency.
  common_mistake: 'Engineers often calculate the average service time and, if it''s less than the deadline,
    assume the system is fine. This completely ignores queueing delay, which becomes non-linear and explosive
    as system utilization approaches 100%. They fail to check the fundamental stability condition: arrival
    rate must be less than service rate.'
  napkin_math: 1. **Calculate Service Time (W_s):**
