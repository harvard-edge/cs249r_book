id: cloud-2227
title: The NVMe Warm Cache Miss
topic: vram-budgeting
status: published
provenance: imported
scenario: 'Your training cluster uses a two-tier storage architecture: a local NVMe SSD cache (3.84 TB
  per node, 6 GB/s read) and a shared Lustre parallel filesystem (500 GB/s aggregate). The training dataset
  is 50 TB. Each node processes a random shard of the data each epoch. During the first epoch, training
  throughput drops by 40% compared to subsequent epochs. Why?'
details:
  realistic_solution: 'During the first epoch, none of the training data is cached on local NVMe. Every
    data access must be served from the remote Lustre filesystem at network speed. Even at 500 GB/s aggregate,
    each node''s share of that bandwidth is limited by its network link (typically 100-200 Gbps = 12.5-25
    GB/s). After the first epoch, the most recently accessed shards are cached on local NVMe, and subsequent
    reads hit the 6 GB/s local SSD instead of the remote filesystem. The 40% throughput drop in epoch
    1 reflects the latency difference between NVMe (~50us) and Lustre over network (~3ms), which stalls
    the data pipeline and starves the GPU. The fix: pre-populate the NVMe cache before training starts
    (''warm the cache''), or use a caching layer like Alluxio that prefetches data based on the training
    schedule.'
  common_mistake: Blaming the GPU or the data loading library. The throughput drop is not a compute problem
    — it is a cold cache problem in the storage hierarchy.
  napkin_math: 'Per node: local NVMe read = 6 GB/s at ~50us latency. Remote Lustre via 200 Gbps link =
    25 GB/s peak, but ~3ms latency per access. If the data loader issues 1,000 random reads/sec, NVMe:
    $1{,}000 \times 50\mu s = 50$ms of total I/O wait. Lustre: $1{,}000 \times 3$ms = 3s of I/O wait per
    second — the pipeline is I/O-bound 100% of the time. Effective GPU utilization drops from ~85% to
    ~50%, explaining the 40% throughput loss.'
