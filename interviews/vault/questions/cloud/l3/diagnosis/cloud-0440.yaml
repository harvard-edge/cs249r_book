schema_version: 1
id: cloud-0440
title: The Vision Transformer Resolution Trap
topic: roofline-analysis
status: published
provenance: imported
scenario: You are a Staff ML Systems Engineer at a cloud provider. A customer is migrating their image
  classification service from a standard CNN (ResNet-50) to a Vision Transformer (ViT-Base). Both models
  initially meet the 10ms latency budget on an H100 GPU using 224x224 resolution images. To improve accuracy,
  they increase the input resolution to 448x448. The ResNet-50 latency increases to ~3ms, still well within
  budget. However, the ViT's latency explodes to over 20ms. The data loading pipeline has been optimized
  and is not the bottleneck. Using your knowledge of model architecture, diagnose the most likely cause
  of this disproportionate latency increase for the Vision Transformer.
details:
  realistic_solution: The root cause is the difference in computational scaling between CNNs and Transformers.
    A CNN's computation scales linearly with the number of pixels (O(H*W)). Doubling the image height
    and width results in a 4x increase in pixels, and thus a ~4x increase in FLOPs. A Vision Transformer's
    self-attention mechanism, however, scales quadratically with the number of input patches (O(N^2)).
    Doubling the image resolution quadruples the number of patches (N), leading to a 16x (4^2) increase
    in the FLOPs required for the attention layers. This quadratic explosion in compute is the reason
    for the severe latency degradation.
  common_mistake: Engineers often assume that if two models have similar FLOPs at one resolution, they
    will scale similarly. They forget that the computational complexity function itself is different.
    They might blame memory bandwidth or other system factors, when the root cause is the algorithm's
    scaling law (e.g., linear vs. quadratic).
  napkin_math: '**CNN (ResNet-50) scaling with resolution:** | Patch count: N/A (convolutions operate
    on spatial dims) | FLOPs scale as O(H × W) — linear in pixel count | 224→448: pixel count increases
    4× (448²/224² = 4) | Expected latency: ~1 ms × 4 = ~4 ms (observed: ~3 ms ✓) | **ViT-Base scaling
    with resolution:** | Patch size: 16×16 | Patches at 224×224: (224/16)² = 14² = 196 patches | Patches
    at 448×448: (448/16)² = 28² = 784 patches | Patch count increase: 784/196 = 4× | **Self-attention
    FLOPs scale as O(N²):** | Attention cost ratio: (784)² / (196)² = 614,656 / 38,416 = 16× | **MLP layers
    scale as O(N):** | MLP cost ratio: 784/196 = 4× | **Combined:** Attention dominates in ViT, so overall
    ≈ 10-16× increase | If base ViT latency at 224 was ~1.5 ms: | Expected at 448: ~1.5 × 10-16 = 15-24
    ms (observed: >20 ms ✓) | **Root cause:** CNN FLOPs grow linearly with pixels (4×), but ViT attention
    grows quadratically with patch count (16×). This quadratic scaling makes ViTs extremely sensitive
    to resolution increases.'
