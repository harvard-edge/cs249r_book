id: cloud-0126
title: The Chatbot SLO Catastrophe
topic: batching-strategies
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer for a new LLM chat service running on H100s. Your P99 TTFT (Time
  To First Token) SLO is 500ms. Users are reporting slow initial responses, and your SLO is being breached.
  You check your dashboards and see the following:'
details:
  realistic_solution: The core problem is head-of-line blocking caused by the static batching strategy.
    While the GPU is busy, it's working on a batch that may contain a single, very long generation request.
    This forces dozens of other short, quick requests to wait in the queue until the *entire* batch completes.
    This unnecessarily inflates the TTFT for the queued requests, causing the SLO breach.
  common_mistake: Seeing high GPU utilization and assuming the system is efficient. High utilization can
    be 'bad' if the work being done is blocking higher-priority or faster tasks. Another common mistake
    is to blame the hardware's raw performance instead of the scheduling and batching logic that feeds
    it.
  napkin_math: Using Little's Law (L = λW). Assume arrival rate λ = 20 req/s. H100 handles a batch of
    10 every 0.4s (service rate μ = 25 req/s). Utilization ρ = 20/25 = 80%. M/M/1 queue wait time W_q
    = ρ / (μ - λ) = 0.8 / 5 = 160ms average. But at 99th percentile, W_q ≈ W_avg * ln(100) = 160 * 4.6
    = 736ms. Adding 100ms service time, P99 TTFT > 830ms, breaching 500ms SLO.
