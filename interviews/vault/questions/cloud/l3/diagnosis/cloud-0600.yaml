id: cloud-0600
title: The Stuttering Training Loop
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're training a small neural network on a GPU, but you notice the GPU utilization is low (e.g.,
  30-40%), and the training progress seems to 'stutter' periodically, despite using a small dataset that
  easily fits into GPU memory. What's a common, non-obvious reason for this behavior?
details:
  realistic_solution: The problem is likely due to frequent cache misses and poor data locality, leading
    to "data thrashing." Even if the entire dataset fits in GPU HBM, specific parts of the model (e.g.,
    large embedding tables or activation maps) might not fit into the GPU's faster, smaller on-chip caches
    (L1/L2). When the GPU repeatedly accesses data that isn't in cache, it incurs the higher latency of
    fetching from HBM. The "stuttering" occurs when the GPU's compute units frequently stall, waiting
    for data to be loaded from slower memory, leading to low utilization. Optimizing data access patterns
    or restructuring the model to improve cache locality can mitigate this.
  common_mistake: '"The GPU drivers are bad" or "The CPU is bottlenecking data loading." While possible,
    for a small dataset fitting GPU memory, these are less likely primary causes than memory hierarchy
    issues.'
  napkin_math: A typical GPU L2 cache might be 6-12MB. If an embedding table for a small model has 100,000
    embeddings, each 128 floats (FP32), its size is $100,000 \times 128 \times 4 \text{ bytes} = 51.2
    \text{ MB}$. This clearly exceeds L2 cache, forcing frequent HBM fetches.
