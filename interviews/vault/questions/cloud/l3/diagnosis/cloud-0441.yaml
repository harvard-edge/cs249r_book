schema_version: 1
id: cloud-0441
title: The GPU-Bound Inference Stall
topic: kernel-fusion
status: published
provenance: imported
scenario: You are tasked with optimizing a small but critical DLRM-style recommendation model for production
  inference. The model has hundreds of tiny, sequential layers (embeddings, MLPs). When you profile it
  on an H100 GPU, `nvidia-smi` shows less than 15% Tensor Core utilization, yet latency is much higher
  than expected for the model's low FLOP count. A deep profiler reveals thousands of tiny CUDA kernel
  launches, each taking only a few microseconds. What is the most likely cause of this poor performance?
details:
  realistic_solution: The model is 'dispatch-bound' or 'launch-bound'. The GPU spends more time launching
    the thousands of tiny kernels than it spends on actual computation. Each kernel launch has a fixed
    overhead (~5 µs), and each tiny kernel must read from and write back to slow HBM3 memory (~300 ns).
    The solution is to apply operator fusion, compiling sequences of small layers into a single, larger
    CUDA kernel. This pays the launch overhead only once and allows intermediate results to stay in fast
    on-chip SRAM/registers, avoiding round trips to HBM.
  common_mistake: Blaming the model size ('it's too small to saturate the GPU') or data transfer ('PCIe
    is the bottleneck'). While the model is small, that doesn't explain why it's slow. The issue isn't
    the total compute, but how it's structured. Blaming PCIe is also common, but in this scenario, the
    issue persists even after data is on the GPU.
  napkin_math: Assume the model has 100 small layers, each taking 2µs of compute.
