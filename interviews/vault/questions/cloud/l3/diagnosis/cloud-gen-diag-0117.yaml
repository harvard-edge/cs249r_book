schema_version: 1
id: cloud-gen-diag-0117
title: Diagnosing High Inference Latency on A100
topic: queueing-theory
status: published
provenance: imported
scenario: A cloud-based classification model is deployed on a single A100 GPU (312 TFLOPS FP16, 80 GB
  HBM2e, 400W TDP). Hardware profiling shows the average inference execution time is exactly 40ms per
  request. The API gateway routes an average of 20 requests per second to this GPU node. The team is investigating
  a symptom where the observed average end-to-end latency is consistently around 200ms, which is 5x higher
  than the raw execution time, despite the GPU not being fully saturated. Assuming Poisson arrivals and
  exponentially distributed service times, diagnose the root cause of this severe latency inflation.
details:
  realistic_solution: The root cause of the symptom is purely mathematical queueing delay driven by high
    utilization (80%). In stochastic systems modeled as an M/M/1 queue, as utilization gets closer to
    100%, the wait time in the queue increases non-linearly. The 'unexplained' 160ms is actually the expected
    time requests spend waiting in the queue before the A100 can process them. To reduce latency, the
    system must scale out to reduce arrival rate per GPU, or optimize the model to reduce the 40ms service
    time.
  common_mistake: Candidates often calculate the utilization (20 req/s * 40ms = 80%) and incorrectly conclude
    that because the GPU has 20% idle headroom, the 160ms of extra latency must be caused by network overhead,
    CPU bottlenecks, or PCIe transfers rather than standard queueing behavior.
  napkin_math: '1. Calculate Service Rate (μ): 1 / 0.040 seconds = 25 requests/sec.

    2. Identify Arrival Rate (λ): 20 requests/sec.

    3. Calculate Utilization (ρ): λ / μ = 20 / 25 = 0.8 (80%).

    4. Calculate Average Time in System (W) using M/M/1 formula: W = 1 / (μ - λ) = 1 / (25 - 20) = 1 /
    5 = 0.200 seconds (200ms).

    5. The expected total latency is exactly 200ms, perfectly matching the observed symptom without needing
    to blame external network overhead.'
