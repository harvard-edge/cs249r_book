schema_version: 1
id: cloud-gen-diag-0106
title: Pod Placement Bandwidth Bottleneck
topic: container-orchestration
status: published
provenance: imported
scenario: A developer submits a Kubernetes distributed training job with two worker Pods, each requesting
  4x H100 GPUs (989 TFLOPS FP16, 80 GB HBM3), to a cluster of 8-GPU nodes. The nodes are connected via
  InfiniBand NDR (50 GB/s per port). During profiling, the GPUs exhibit low MFU and spend significant
  time idle during communication phases. NCCL logs reveal that transferring a 4 GB activation tensor between
  the two Pods takes exactly 80 milliseconds. Diagnose the cluster scheduling behavior responsible for
  this symptom.
details:
  realistic_solution: The Kubernetes scheduler placed the two 4-GPU Pods on separate nodes due to default
    resource spreading or lack of pod affinity rules. This forces inter-pod communication over the 50
    GB/s InfiniBand network instead of utilizing the 900 GB/s NVLink 4.0 interconnect within a single
    node. The fix is to apply strict pod affinity to co-locate them or request a single 8-GPU Pod.
  common_mistake: Candidates often assume a faulty PCIe Gen5 x16 connection (which would bottleneck at
    32 GB/s unidirectional) or a missing NCCL plugin. They fail to calculate the theoretical network transfer
    time to realize the Kubernetes scheduler placed the Pods on different nodes.
  napkin_math: 'InfiniBand NDR transfer time: 4 GB / 50 GB/s = 0.08 seconds (80 ms). Intra-node NVLink
    4.0 transfer time: 4 GB / 900 GB/s = ~0.0044 seconds (4.4 ms). The observed 80 ms exactly matches
    the InfiniBand bandwidth limit, confirming the Pods were scheduled across the network.'
