id: cloud-2090
title: MoE Expert Load Imbalance Stall
topic: mixture-of-experts
status: published
provenance: imported
scenario: You are training a 16-expert MoE model across 16 GPUs. The profiler shows that 14 GPUs finish
  their expert computation in 2ms, but 2 GPUs consistently take 8ms, creating a 6ms stall at every MoE
  layer's synchronization barrier. What is the most likely root cause, and what is the throughput impact?
details:
  realistic_solution: 'Expert load imbalance from the routing function. The gating network is routing
    disproportionately many tokens to 2 ''popular'' experts, overloading those GPUs. With 16 experts and
    uniform routing, each GPU should process 1/16 of tokens. If 2 experts receive 4× their fair share,
    they take 4× longer. The throughput impact: effective MoE layer time is 8ms (max of all GPUs) instead
    of 2ms — a 4× slowdown on this layer. Overall step slows down by 2.2x. Mitigation: add a load-balancing
    auxiliary loss, or use capacity factors to cap per-expert token count.'
  common_mistake: Blaming hardware heterogeneity or slow interconnect. The key insight is that expert
    routing is learned and can become highly skewed, concentrating tokens on a few experts.
  napkin_math: Ideally, 4,096 tokens split evenly means 256 tokens per expert (2ms compute). Skewed routing
    dumps ~1,024 tokens to 2 'hot' experts (8ms compute). Since all 16 GPUs must wait at the all-to-all
    sync barrier, the slowest 8ms expert dictates step time. This 4x stall causes massive A100 underutilization.
