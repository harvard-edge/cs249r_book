id: cloud-2151
title: The Warmup Necessity
topic: pruning-sparsity
status: published
provenance: imported
scenario: A junior engineer removes the learning rate warmup from your LLM pre-training recipe, arguing
  that 2,000 warmup steps waste compute on a 300,000-step run. Training diverges within the first 100
  steps. Why is warmup critical for large models with Adam, and how do you calculate a reasonable warmup
  duration?
details:
  realistic_solution: 'At step 0, Adam''s second moment (v_t) estimates are initialized to zero and biased
    low. This causes the effective learning rate (LR / sqrt(v_t + eps)) to be astronomically large in
    early steps — potentially 100-1000× the intended LR. Warmup gradually increases the nominal LR, giving
    the second moment estimates time to accumulate meaningful statistics. Rule of thumb for LLM pre-training:
    warmup steps = 0.5-1% of total steps, or until the gradient statistics stabilize (monitor gradient
    norm variance). For a 300K step run, 2,000 steps (0.67%) is reasonable.'
  common_mistake: Thinking warmup is just a hyperparameter tuning hack. It addresses a fundamental numerical
    issue with adaptive optimizers at initialization.
  napkin_math: 'Step 1 without warmup: v_1 ≈ (1-β₂) × g₁² ≈ 0.001 × g₁² (very small) | Effective LR ≈
    LR / sqrt(0.001 × g₁²) = LR / (0.032 × |g₁|) — can be 30× higher than intended | With warmup: nominal
    LR at step 1 is LR × (1/2000) = 0.0005× LR — safely small'
