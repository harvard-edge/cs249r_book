id: cloud-0116
title: The Reinforcement Learning Latency Stall
topic: collective-communication
status: published
provenance: imported
scenario: You are designing a large-scale RL system. A CPU-based simulator generates 20,000 small observation
  tensors per second, which must be sent to a single GPU for a policy update. Your profiling shows that
  while the total data volume is very low (a few MB/s), end-to-end latency is unexpectedly high and GPU
  utilization is poor. A junior engineer suggests the GPU is too slow. Diagnose the most likely bottleneck
  by applying your knowledge of bus protocols.
details:
  realistic_solution: The bottleneck is the cumulative latency overhead from thousands of individual PCIe
    transfers. While PCIe Gen5 has high bandwidth, each individual transfer has a base latency of ~1,000
    nanoseconds (1 microsecond). When the CPU sends 20,000 separate tensors, it's initiating 20,000 separate
    transfers. The total time wasted just on the latency of these transfers is 20,000 * 1µs = 20ms. This
    means 20ms of every second is pure communication overhead before any useful data is even moved or
    computed. The correct solution is to batch the small tensors on the CPU into a single, larger tensor
    before sending it to the GPU. This amortizes the fixed per-transfer cost over a much larger data payload,
    paying the 1µs tax only once per batch instead of 20,000 times.
  common_mistake: The most common mistake is to be 'bandwidth-blind'. Because the total size of the data
    is small, engineers often assume data movement cannot be the problem. They fail to account for the
    high *per-transaction* latency cost of a bus like PCIe. Every individual transfer, no matter how small,
    pays a fixed latency tax. When you have tens of thousands of tiny transfers, that tax adds up and
    dominates the timeline.
  napkin_math: 1. **Identify Per-Transfer Latency:** From the ML Latency Hierarchy, a single PCIe Gen5
    transfer has a latency of ~1,000 ns (1 µs).
