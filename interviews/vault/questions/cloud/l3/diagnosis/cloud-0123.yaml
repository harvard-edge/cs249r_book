schema_version: 1
id: cloud-0123
title: The Chatbot's Silent Wait
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are an ML Systems Engineer optimizing a real-time LLM chatbot service built on an H100 GPU.
  The service has a strict P99 Time-To-First-Token (TTFT) SLO of 500ms. Under a moderate, spiky load averaging
  20 RPS, you observe that the P99 TTFT is spiking to ~800ms, yet `nvidia-smi` shows the GPU is only 60%
  utilized on average. Your serving stack uses a static batching strategy with a fixed batching timeout
  of 200ms. Given this data, use the provided metrics to diagnose the most likely cause of the SLO miss.
details:
  realistic_solution: 'The primary bottleneck is queueing delay introduced by the static batching scheduler.
    The fixed 200ms timeout forces requests that arrive early in the window to sit idle, accumulating
    latency before computation even begins. The 60% average GPU utilization is the key signal: the GPU
    is spending a significant fraction of its time waiting for the next batch window to close. The P99
    latency spike to 800ms can be explained by a cascade of these delays under load. The correct architectural
    solution is to replace the static batcher with a continuous batching scheduler (as used in systems
    like vLLM or TGI), which dispatches a new batch as soon as the GPU is free, minimizing idle time and
    drastically reducing queueing latency.'
  common_mistake: Blaming the GPU hardware or the model itself. Engineers often default to thinking 'high
    latency means the GPU is too slow' or 'the model is too big.' This leads them to suggest expensive
    hardware upgrades or premature optimization (like quantization) while ignoring the clear signal from
    the low GPU utilization metric that the bottleneck is elsewhere. They fail to see latency as a system-wide
    property, much of which can be pure wait time.
  napkin_math: We can diagnose this by working backwards. Average GPU utilization is 60%, meaning the
    GPU is idle 400ms every second. A fixed batching timeout of 200ms means a request arriving early waits
    up to 200ms doing nothing. TTFT = T_wait + T_compute. If P99 TTFT = 800ms, and max batch wait is 200ms,
    queueing delay plus compute is 600ms. The artificial 200ms delay ruins the SLO.
