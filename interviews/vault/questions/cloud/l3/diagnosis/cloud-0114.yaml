schema_version: 1
id: cloud-0114
title: The Throughput Collapse
topic: latency-decomposition
status: published
provenance: imported
scenario: You are managing an LLM serving endpoint that uses a 13B model on an H100 for document summarization.
  Your goal is to maximize throughput (summaries per minute). You observe that as you increase the server's
  batch size, throughput increases, but at a batch size of 64, P99 latency skyrockets and the effective
  throughput starts to *decrease*. An engineer suggests the GPU is running out of VRAM. Using queueing
  theory, demonstrate a more likely cause for this throughput collapse.
details:
  realistic_solution: This is a classic case of head-of-line blocking explained by queueing theory. Throughput
    is the number of requests completed over time. As the batch size increases, the time to process one
    batch (`T_batch`) also increases. A new request arriving just after a large batch has started must
    wait in the queue for the entire `T_batch` to finish before it can even be processed. When the request
    arrival rate (`λ`) approaches the batch service rate (`1/T_batch`), the queue length and wait times
    grow exponentially. The P99 latency skyrockets because some requests get very unlucky, and the 'goodput'
    (useful work) of the system collapses as it spends more time managing a massive queue.
  common_mistake: Immediately assuming a hardware limit like VRAM capacity (OOM) or memory bandwidth has
    been hit. While these are physical limits, a throughput collapse often happens before a hard OOM due
    to queueing dynamics. Blaming VRAM doesn't explain why a *lower* batch size worked better.
  napkin_math: Memory bandwidth bounds decode throughput. 13B weights = 26GB. H100 bandwidth = 3.35TB/s.
    Max theoretical passes = 3.35TB / 26GB = 128 tokens/sec. With batch size 1, throughput is 128 tok/s.
    With batch size 32, we still read 26GB once per step, generating 32 tokens in ~10ms (3.2k tok/s).
    But eventually compute (989 TFLOPS) bottlenecks, and throughput flattens.
