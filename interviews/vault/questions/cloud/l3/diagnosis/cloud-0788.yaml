id: cloud-0788
title: The Thermal Memory Wall
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your H200 cluster is processing a massive batch inference job. `nvidia-smi` shows the GPU core
  temperature is a very safe 68°C. However, your memory bandwidth benchmark shows you are only achieving
  2.8 TB/s instead of the rated 4.8 TB/s. What thermal component are you failing to monitor?
details:
  realistic_solution: You are monitoring the GPU Core temperature, but ignoring the **HBM Junction Temperature**.
    HBM3e is stacked 8 to 12 layers high directly adjacent to the GPU die. Because it is a dense 3D stack,
    it is incredibly difficult to cool. HBM modules have a strict maximum operating temperature (~95°C).
    While the GPU die is at 68°C, a heavy memory-bound workload generates massive heat within the memory
    stacks. If the HBM hits its limit, the memory controller downclocks the frequency, silently tanking
    your bandwidth.
  common_mistake: '"The memory bandwidth must be bottlenecked by the PCIe bus." PCIe is irrelevant for
    internal HBM bandwidth.'
  napkin_math: Theoretical HBM3e bandwidth = 4.8 TB/s. If the HBM hits 95°C, the controller may drop the
    clock from 6 GHz to 3.5 GHz. Effective bandwidth = $4.8 \times (3.5/6.0) = \sim 2.8 \text{ TB/s}$.
    You lose 40% of performance with no error message.
