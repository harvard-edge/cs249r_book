title: LLM Decoding on A100 Roofline
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your team is deploying a Transformer-based LLM on an NVIDIA A100 GPU (312 TFLOPS FP16 compute,
  2.0 TB/s HBM bandwidth). During the autoregressive decoding phase with a batch size of 1, profiling
  reveals that the GPU compute utilization is well under 1%. Calculate the arithmetic intensity required
  to reach peak compute, compare it to the current workload, and determine the architectural adjustment
  needed to bridge this gap.
details:
  realistic_solution: Implement continuous or dynamic batching to increase the batch size. By serving
    multiple requests concurrently (e.g., batch size 128), you reuse the loaded weights across multiple
    tokens, dramatically increasing arithmetic intensity and overcoming the memory bandwidth bottleneck.
  common_mistake: Assuming the low utilization is due to unoptimized CUDA kernels, CPU launch overhead,
    or PyTorch overhead, rather than recognizing the fundamental mathematical limit imposed by the hardware's
    ridge point for matrix-vector multiplications.
  napkin_math: A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte. At batch size 1, loading one
    2-byte FP16 weight produces one MAC (2 FLOPs), yielding an intensity of 1 FLOP/Byte. Max performance
    = 1 FLOP/Byte * 2.0 TB/s = 2 TFLOPS (0.64% of 312 TFLOPS peak).
