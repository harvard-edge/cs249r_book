id: cloud-2115
title: The LayerNorm Bandwidth Tax
topic: roofline-analysis
status: published
provenance: imported
scenario: A profiler trace of your transformer training shows that LayerNorm operations consume only 0.1%
  of total FLOPs but account for 8% of wall-clock time. Explain why LayerNorm is so slow relative to its
  FLOP count, and describe what makes kernel fusion critical here.
details:
  realistic_solution: 'LayerNorm computes mean and variance (reductions), then normalizes and scales (element-wise).
    For a [B, S, H] tensor, it performs ~5H FLOPs per element but must read the entire tensor from HBM,
    compute statistics, write back, then read again for normalization. Arithmetic intensity: ~5 FLOPs
    / (2 * 2 bytes read + 2 bytes write) = ~0.8 FLOPs/byte. At ridge point ~156 FLOPs/byte on A100, this
    is ~200x below compute-bound. Without fusion, each sub-operation (mean, variance, normalize, scale)
    is a separate kernel launch with its own HBM round trip: 4 reads + 4 writes. Fusing into one kernel:
    1 read + 1 write. Fusion reduces memory traffic by ~4x, which directly translates to ~4x speedup for
    this operation.'
  common_mistake: Looking only at FLOP count and concluding LayerNorm should be negligible. LayerNorm
    has extremely low arithmetic intensity, making it purely memory-bandwidth-bound.
  napkin_math: 'Unfused: 4 HBM round trips * [B*S*H] * 2 bytes. Fused: 1 round trip. For B=32, S=2048,
    H=4096 in FP16: unfused reads ~2 GB, fused reads ~0.5 GB. At 2 TB/s: 1ms unfused vs 0.25ms fused.'
