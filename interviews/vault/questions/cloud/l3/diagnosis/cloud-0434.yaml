id: cloud-0434
title: The Mid-Afternoon Throttling
topic: power-budgeting
status: published
provenance: imported
scenario: You are training a large model on a cluster of H100 GPUs. The job starts with full performance,
  but you notice that every afternoon, around 2 PM, the training throughput drops by ~15-20%. Using `nvidia-smi`,
  you observe that the GPU power draw is consistently capped at ~560W, well below the 700W TDP limit,
  during these slowdowns. Diagnose the most likely cause of this recurring performance degradation.
details:
  realistic_solution: The most likely cause is thermal throttling due to an increase in the datacenter's
    ambient temperature. The afternoon is often the hottest part of the day, which can strain the facility's
    cooling infrastructure, raising the temperature of the 'cold aisle' air supplied to the servers. A
    GPU's ability to dissipate heat is relative to this ambient temperature. If the incoming air is hotter,
    the GPU must reduce its power consumption to keep its internal silicon temperature below the safety
    limit (e.g., 95°C), causing the observed throttling and performance drop.
  common_mistake: 'Engineers often jump to complex software or hardware fault explanations. They might
    blame the training script, the scheduler, or a failing power supply unit. However, the most fundamental
    principle is often the cause: a system''s ability to perform is limited by its ability to cool itself.
    The symptoms—a power cap below TDP correlated with a specific time of day—are classic signs of environmental
    thermal issues.'
  napkin_math: 1. **Thermal Headroom:** A GPU's cooling system is designed to dissipate max power (700W)
    at a certain ambient temperature (e.g., design temp of 20°C) to stay below a thermal limit (e.g.,
    95°C).
