id: cloud-1642
title: Dual-Socket NUMA Dataloader Bandwidth
topic: vram-budgeting
status: published
provenance: imported
scenario: You are optimizing a distributed training job on a dual-socket AMD EPYC server with 8 NVIDIA
  H100 GPUs (4 GPUs per socket). The PyTorch dataloader fetches, decodes, and pushes batches of images
  to the GPUs. You notice GPUs 4-7 (attached to Socket 1) are starved for data with < 50% utilization,
  while GPUs 0-3 (attached to Socket 0) are at 95%. Each GPU processes a batch size of 256 images (3MB
  per decoded image) every 50ms. If all dataloader threads accidentally allocate staging memory on Socket
  0's NUMA node, calculate the cross-socket bandwidth required and compare it to a typical 64 GB/s inter-socket
  link.
details:
  realistic_solution: Pin dataloader processes for GPUs 4-7 to the CPU cores on Socket 1 and restrict
    their memory allocations to Socket 1's local DRAM (e.g., using `numactl` or framework-specific NUMA
    affinity settings).
  common_mistake: Ignoring NUMA topology and allowing the OS to allocate data staging memory on a remote
    NUMA node, assuming cross-socket interconnects have sufficient bandwidth for modern GPU ingestion
    rates.
  napkin_math: Each GPU consumes batches at a rate of 1 / 0.05s = 20 iter/s. Batch size = 256 images *
    3 MB = 768 MB. Bandwidth per GPU = 768 MB * 20 = 15.36 GB/s. GPUs 4-7 are on Socket 1 but Dataloader
    is on Socket 0. Traffic crossing the CPU interconnect (e.g., xGMI/UPI) = 4 * 15.36 = 61.44 GB/s. This
    saturates the typical ~64 GB/s cross-socket link bandwidth, starving remote GPUs.
