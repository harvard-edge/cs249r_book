schema_version: 1
id: cloud-1007
title: Incast-Driven PFC Congestion Spreading Time
topic: congestion-control
status: published
provenance: imported
scenario: You are managing a lossless RoCEv2 AI fabric using 400Gbps links and Top-of-Rack (ToR) switches
  with a 32MB shared buffer. During an All-to-All collective operation, a microburst causes a 4:1 incast
  scenario on a ToR switch (four 400Gbps ingress links sending to one 400Gbps egress link). The switch
  is configured to issue a Priority Flow Control (PFC) PAUSE frame to upstream Spine switches when an
  ingress port's buffer utilization hits a 4MB threshold. Calculate the time it takes for this microburst
  to trigger the PAUSE frame, and explain how this impacts unrelated tenant traffic on the upstream Spine.
details:
  realistic_solution: The net buffer accumulation rate is 1.2 Tbps (150 GB/s). It takes just 26.6 microseconds
    to hit the 4MB threshold. The ToR switch then transmits a PFC PAUSE upstream to the Spine. The Spine
    stops transmitting all packets for that priority class down to the ToR, meaning any unrelated workloads
    routed through that same Spine-ToR link will be stalled (Congestion Spreading).
  common_mistake: Candidates often assume that network buffers can absorb microbursts for milliseconds,
    and fail to recognize that a PFC PAUSE acts as a hop-by-hop hard stop that creates head-of-line blocking
    for unrelated traffic sharing the same priority class upstream.
  napkin_math: 'Total Ingress = 4 * 400 Gbps = 1600 Gbps

    Egress = 400 Gbps

    Accumulation Rate = 1600 - 400 = 1200 Gbps

    Convert to Bytes: 1200 Gbps / 8 = 150 GB/s = 150 MB/ms = 150,000 MB/s

    Time to 4MB threshold = 4 MB / (150,000 MB/s) = 0.0000266 seconds = 26.6 microseconds.'
