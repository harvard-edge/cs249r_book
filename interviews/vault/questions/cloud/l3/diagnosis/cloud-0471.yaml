schema_version: 1
id: cloud-0471
title: The Tensor Parallelism Traffic Jam
topic: collective-communication
status: published
provenance: imported
scenario: You are an MLE training a 70B parameter model with 8-way tensor parallelism on a single server
  equipped with 8 H100 GPUs. The theoretical step time should be ~3 seconds, but you are observing ~7.5
  seconds. A profiler shows that `ncclAllReduce` operations are taking up 60% of the actual step time
  (~4.5 seconds). You know the server is an HGX H100 platform, which should have all-to-all NVLink connectivity.
  What is the most likely diagnosis for this performance issue?
details:
  realistic_solution: The most likely cause is a misconfiguration forcing GPU-to-GPU communication over
    the much slower PCIe bus instead of the dedicated NVLink bridges. This is a common real-world issue
    that can stem from driver problems, an incorrect CUDA-aware MPI setup, or even a physical hardware
    fault in the server's NVLink bridges. The first diagnostic step is to run `nvidia-smi topo -m` to
    verify the GPU connectivity matrix. A healthy system shows `NV#` for all GPU-to-GPU links. Seeing
    `PIX` or `PHB` indicates a fallback to PCIe, confirming the diagnosis.
  common_mistake: Blaming a higher-level component (like the network for a single-node job) or a software
    component (the NCCL algorithm choice) without first verifying the physical transport layer. Engineers
    often assume the hardware and drivers are perfectly configured and that the bottleneck must be in
    their own code or algorithm choice.
  napkin_math: The core of the diagnosis is comparing the expected transfer times over NVLink vs. PCIe.
