schema_version: 1
id: cloud-0197
title: The Serverless Freeze
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: Our serverless inference endpoint scales down to 0 replicas to save money. However, the first
  user request after scaling back up takes 30 seconds to process. What is causing this delay?
details:
  realistic_solution: Cold Start Latency. The system must provision the container and load the Python
    runtime, but most importantly, it must transfer the massive model weights (gigabytes of data) from
    network storage into the GPU's HBM *before* the first forward pass can execute. You must use persistent
    warm replicas or optimized weight loading strategies to fix this.
  common_mistake: '"The model needs to warm up its caches." There''s no cache warm-up — the delay is purely
    about data movement.'
  napkin_math: 70B model in FP16 = 140GB. To load weights into H100 VRAM over PCIe Gen4 (32GB/s), transfer
    takes 140GB / 32GB/s = 4.3s. However, downloading 140GB from cloud storage (e.g., S3 at 5GB/s) takes
    140GB / 5GB/s = 28 seconds. Adding container startup and CUDA initialization overheads, the total
    cold start perfectly matches the observed 30-second delay for the first request.
