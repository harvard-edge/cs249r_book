id: cloud-0476
title: The Multi-Node Scaling Cliff (cloud-0476)
topic: collective-communication
status: draft
provenance: imported
scenario: You are an ML Systems Engineer at a large cloud provider, tasked with scaling a distributed
  training job for a large recommendation model. Your training cluster consists of multi-GPU nodes, where
  each node contains 8 H100 GPUs connected via NVLink 4.0. The nodes themselves are connected using InfiniBand
  NDR.
details:
  realistic_solution: 'The primary bottleneck is the bandwidth cliff between the intra-node NVLink and
    the inter-node InfiniBand fabric. Within a single node, the 8 H100s communicate over the NVLink 4.0
    bus, which has a massive aggregate bandwidth. When the All-Reduce operation scales to two nodes, the
    cross-node communication must traverse the InfiniBand network, which is an order of magnitude slower.
    The collective operation is now gated by the speed of the weakest link: the inter-node network.'
  common_mistake: Engineers often underestimate the massive performance gap between intra-node and inter-node
    interconnects. They might blame software overhead (e.g., NCCL), the CPU, or the wrong bus (like PCIe),
    without calculating the raw bandwidth difference between the super-fast on-node fabric and the (still
    fast, but relatively much slower) inter-node network.
  napkin_math: Within a node, 8 H100s use NVLink 4.0, sharing data at 900 GB/s per GPU. Between nodes,
    communication relies on InfiniBand NDR, limited to 50 GB/s (400 Gbps). This represents an 18x bandwidth
    cliff (900 / 50 = 18). Expanding All-Reduce beyond one node stalls GPUs on network I/O.
