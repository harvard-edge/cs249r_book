id: cloud-0432
title: The Arithmetic Intensity Question
topic: roofline-analysis
status: published
provenance: imported
scenario: A junior engineer on your team is frustrated. They just deployed a model on an H100 and the
  profiler reports only 15% of peak TFLOPS. They want to file a bug against NVIDIA. Before they embarrass
  themselves, explain why their GPU isn't broken.
details:
  realistic_solution: 'The GPU is not broken — the workload is memory-bound. The metric that determines
    whether you hit peak TFLOPS is Arithmetic Intensity: the ratio of compute operations to bytes moved
    from memory. Every workload lives on a Roofline: below the ridge point, memory bandwidth is the ceiling;
    above it, compute is the ceiling. If your model''s arithmetic intensity is below the GPU''s ridge
    point, no amount of kernel tuning will help — you''re waiting on HBM, not ALUs.'
  common_mistake: '"The CUDA kernels aren''t optimized" or "We need to increase the batch size to saturate
    the ALUs." Both assume the workload is compute-bound without checking.'
  napkin_math: H100 peak = 989 TFLOPS FP16, HBM bandwidth = 3.35 TB/s. Ridge point = $989 \times 10^{12}
    / 3.35 \times 10^{12}$ = **295 Ops/Byte**. If the model's arithmetic intensity is 50 Ops/Byte, the
    bandwidth ceiling is $50 \times 3.35$ = 167.5 TFLOPS, or $167.5 / 989$ = **17% of peak**. The engineer's
    15% is actually *very close* to the theoretical bandwidth ceiling for their workload — the kernels
    are fine.
