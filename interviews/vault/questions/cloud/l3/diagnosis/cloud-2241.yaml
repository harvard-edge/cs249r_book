schema_version: 1
id: cloud-2241
title: The Skewed Join Straggler Problem
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are joining a 5 TB click-event table with a 200 GB merchant table on merchant_id. The job
  has 1,000 partitions and usually finishes in 8 minutes, but the last 3 partitions take 2 hours. Profiling
  shows these 3 partitions each contain 200 GB of data while the other 997 partitions average 4.5 GB.
  The 3 slow partitions correspond to Amazon, Walmart, and Target — merchants with billions of clicks.
  How do you fix this without changing the data model?
details:
  realistic_solution: Use salted keys for the hot merchants. Append a random suffix (0-99) to the merchant_id
    for the 3 hot keys in the click table, creating 100 sub-partitions per hot merchant. Replicate the
    corresponding 3 rows in the merchant table 100 times with matching salted keys. Now the 200 GB per
    hot merchant distributes across 100 partitions (2 GB each), matching the other partitions. The merchant
    table grows from 200 GB to 200 GB + (3 rows × 100 copies) — negligible. Alternatively, use Spark's
    Adaptive Query Execution (AQE) which detects skew at runtime and automatically splits oversized partitions.
  common_mistake: '"Just increase the number of partitions to 10,000." This redistributes uniformly, but
    the skewed keys still land on the same partitions — the problem is key skew, not partition count.'
  napkin_math: 'Before salting: 3 partitions × 200 GB = 600 GB on 3 tasks. At 50 MB/s disk merge speed
    per task, each takes 200 GB / 50 MB/s = 4,000s ≈ 67 minutes. After salting: 300 partitions × 2 GB
    = 600 GB spread across 300 tasks. Each takes 2 GB / 50 MB/s = 40 seconds. Job completion time drops
    from 67 minutes (straggler-bound) to ~8 minutes (matching the non-skewed partitions).'
