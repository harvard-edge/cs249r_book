title: Dynamic Batching Network Latency
scenario: You are deploying an NLP model as a microservice. Single-batch inference takes 15ms on the GPU. JSON over HTTP adds 10ms of serialization overhead per request. Network RTT is 5ms. To increase throughput, you implement dynamic batching (max batch size 16, timeout 10ms), where GPU inference takes 40ms. You also migrate to gRPC/Protobuf, dropping serialization overhead to 2ms per request.
question: What are the max theoretical throughput and end-to-end latency for a request that waits the full 10ms batch timeout?
details:
  realistic_solution: Optimize network serialization by using gRPC/Protobuf and implement dynamic batching. The GPU can process 25 batches of 16 per second, yielding 400 req/sec. The maximum latency includes the timeout, serialization, inference, and network RTT.
  common_mistake: |
    **The Pitfall:** Assuming dynamic batching provides linear throughput scaling without latency penalties.
    **The Rationale:** Engineers often focus solely on GPU throughput, forgetting that requests must artificially wait in a queue until the batch fills or the timeout hits.
    **The Consequence:** Deploying a batching strategy that increases throughput but severely violates end-to-end latency SLAs for individual users.
  napkin_math: |
    - GPU can process batches of 16 in 40ms.
    - Batches per second = 1000ms / 40ms = 25 batches/sec.
    - Max Throughput = 25 batches/sec × 16 reqs/batch = 400 req/sec.
    - Max E2E Latency = 5ms (RTT) + 2ms (SerDes) + 10ms (Wait Timeout) + 40ms (Inference).
    - **Max Theoretical Throughput is 400 req/sec with a Max E2E Latency of 57ms.**
