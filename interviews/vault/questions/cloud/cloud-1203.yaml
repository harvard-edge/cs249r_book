title: Lifecycle Carbon Analysis of Hardware Refresh
scenario: Your company operates a cluster of 1,024 NVIDIA A100 GPUs for ML training, powered by a grid with a carbon intensity of 400 gCO2/kWh. You are evaluating a proposal to replace the entire cluster with 512 NVIDIA H100 GPUs, which provides equivalent training throughput while cutting operational power consumption by 50 kW overall. The vendor claims this is a major sustainability win. However, each of the 64 new 8x H100 servers has an embodied carbon footprint of roughly 3,500 kg CO2e.
question: How do you evaluate the true carbon impact of this hardware refresh over a 3-year depreciation cycle?
details:
  realistic_solution: Perform a full Life Cycle Assessment (LCA). Calculate the operational carbon saved over 3 years, and compare it against the amortized embodied carbon of the new H100 servers. You must prove that the operational savings exceed the manufacturing emissions before approving the refresh.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the reduction in operational carbon emissions.
    **The Rationale:** Engineers often look only at PUE and grid intensity while completely ignoring the massive embodied carbon required to manufacture new servers.
    **The Consequence:** Approving hardware refreshes that inadvertently increase the overall carbon footprint of the organization.
  napkin_math: |
    - Operational energy saved: 50 kW * 24h * 365d * 3 years = 1,314,000 kWh.
    - Operational carbon saved: 1,314,000 kWh * 400 gCO2/kWh = 525,600 kg CO2.
    - Embodied carbon of new hardware: 64 servers * 3,500 kg CO2/server = 224,000 kg CO2.
    - **Conclusion: Net Carbon Impact = 525,600 - 224,000 = 301,600 kg CO2 saved.**
