title: The Multi-Tenant Noisy Neighbor
scenario: Your shared GPU cluster serves both a latency-sensitive recommendation inference service and
  GPU-intensive LLM training jobs. Both are scheduled on the same physical nodes (different GPUs). After
  training jobs start, inference P99 latency spikes by 60% even though inference has dedicated GPUs. GPU
  metrics for the inference GPUs look normal. What shared resource is the training job contending for?
question: "What shared resource is the training job contending for?"
details:
  realistic_solution: 'The contention is on shared host resources — most likely PCIe bandwidth and/or
    host memory bandwidth. Training jobs perform massive data loading (reading batches from disk/network
    → host memory → GPU via PCIe). Even though inference GPUs are separate, they share the same PCIe root
    complex and the same host memory controllers. When training saturates the PCIe bus and memory controllers
    with data transfers, inference jobs experience increased latency on their own CPU-GPU data paths (preprocessing,
    tokenization results, response retrieval). The fix requires either: (1) Physical isolation — dedicate
    entire nodes to workload types. (2) Bandwidth partitioning — use Intel RDT or cgroup v2 memory bandwidth
    controls. (3) Workload-aware scheduling — never co-locate bandwidth-intensive training with latency-sensitive
    inference on the same node.'
  common_mistake: Assuming GPU isolation means full isolation. Pinning inference and training to separate
    GPUs does NOT isolate shared resources like PCIe bandwidth, CPU memory bandwidth, host CPU cores,
    and NIC bandwidth.
  napkin_math: 'PCIe Gen4 root complex: ~256 GB/s shared across all devices. Training data loading: 4
    GPUs × 8 GB/s each = 32 GB/s. Inference data path: 4 GPUs × 2 GB/s each = 8 GB/s. Total demand: 40
    GB/s — well within the 256 GB/s budget. BUT: training also saturates host DRAM bandwidth (DDR5: ~200
    GB/s per socket). Training preprocessing: ~120 GB/s. Inference preprocessing: ~30 GB/s. Total: 150
    GB/s — within 200 GB/s budget but at 75% utilization. Queueing at DRAM controllers: 60% latency increase
    is consistent with memory controller congestion at high utilization.'
