title: The Multi-Tenant Noisy Neighbor
scenario: Your shared GPU cluster serves both a latency-sensitive recommendation inference service and GPU-intensive LLM training jobs. Both are scheduled on the same physical nodes (different GPUs). After training jobs start, inference P99 latency spikes by 60% even though inference has dedicated GPUs.
question: What shared resource is the training job contending for?
details:
  realistic_solution: 'The contention is on shared host resources, specifically host memory bandwidth. Training jobs perform massive data loading. Even though inference GPUs are separate, they share the same host memory controllers, leading to congestion.'
  common_mistake: |
    **The Pitfall:** Assuming GPU isolation means full node isolation.
    **The Rationale:** Engineers believe that pinning processes to separate GPUs prevents all interference, forgetting about shared host resources like PCIe and DRAM.
    **The Consequence:** Severe noisy neighbor problems that degrade latency-sensitive services co-located with heavy training jobs.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe Gen4 root complex max: ~256 GB/s.
    - DDR5 host DRAM max: ~200 GB/s.

    **Calculations:**
    - PCIe demand (inference + training): 32 + 8 = 40 GB/s (safe).
    - Host DRAM demand (inference + training): 120 + 30 = 150 GB/s.
    - Host DRAM utilization: 150 GB/s / 200 GB/s = 75%.

    **Conclusion & Interpretation:**
    - **Result: 75% DDR5 Utilization (Memory-Bound)**. High utilization at the shared host memory controllers creates queueing delays, causing the 60% inference latency spike despite dedicated GPUs.
