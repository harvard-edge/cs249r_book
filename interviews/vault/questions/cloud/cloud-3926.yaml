title: NCCL Async Operations and CUDA Stream Orchestration for Overlap
scenario: 'You are implementing a custom training loop (not using PyTorch DDP) for a mixture-of-experts model. You need to manually overlap AllReduce with backward computation using NCCL async operations on separate CUDA streams. The model has expert parameters and shared parameters that need different AllReduce groups.'
question: 'If 4GB of gradients are sent over a 50 GB/s link, what is the serial communication time before any overlap?'
details:
  realistic_solution: '4GB / 50 GB/s = 80ms serial time (not 40ms which requires either 2GB data or 100 GB/s bandwidth).'
  common_mistake: |
    **The Pitfall:** Issuing NCCL calls on the default CUDA stream.
    **The Rationale:** Developers might assume NCCL calls are automatically asynchronous and parallel to computation.
    **The Consequence:** Serializing all operations because the default stream blocks computation, preventing any overlap of communication and compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data size: 4GB.
    - Link bandwidth: 50 GB/s.

    **Calculations:**
    - Serial transfer time: 4GB / 50 GB/s = 0.08s = 80ms.

    **Conclusion & Interpretation:**
    - **Result: 80ms Communication Bound** (Serial transfer time is 80ms before any overlap with compute can be achieved).
