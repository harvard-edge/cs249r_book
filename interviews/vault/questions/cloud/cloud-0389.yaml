title: The RAG Rollout Bandwidth Bill
scenario: Your Kubernetes cluster has 500 nodes. You package a 7B parameter model in FP16 precision inside a container image with an additional 1 GB of base layers. To validate the new model, you perform a 10% canary rollout.
question: How much total data must be pulled from the container registry to the nodes for this initial canary deployment?
details:
  realistic_solution: 'Calculate total container size (weights + overhead), then multiply by the exact number of nodes receiving the canary slice.'
  common_mistake: |
    **The Pitfall:** Miscalculating model storage or calculating transfer for the entire fleet.
    **The Rationale:** Engineers forget FP16 requires 2 bytes per parameter, or they forget the canary only targets a fraction of the fleet.
    **The Consequence:** A 10x overestimation of initial deployment costs, or deploying images that blow out node disk space.
  napkin_math: |
    1. **Model Size:** 7 billion parameters $\times$ 2 bytes (FP16) = 14 GB.
    2. **Total Image Size:** 14 GB + 1 GB (overhead) = 15 GB per image.
    3. **Canary Fleet:** 10% of 500 nodes = 50 nodes.
    4. **Total Data Transfer:** 15 GB/node $\times$ 50 nodes = **750 GB of data pulled.**
  options:
  - 400 GB
  - 7.5 TB
  - 750 GB
  - 700 GB
  correct_index: 2
