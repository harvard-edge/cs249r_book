title: The RAG Rollout Bandwidth Bill
scenario: You're a Staff Engineer at an autonomous vehicle company. The developer productivity team maintains
  a large-scale RAG system that allows engineers to query petabytes of simulation logs. The current retrieval
  model is a 7B parameter model, served in FP16 precision. Your team has a new version of the model ready
  for deployment. The entire model is packaged in a container image that has an additional 1 GB of base
  layers and dependencies. Your Kubernetes cluster has 500 nodes. To validate the new model, you decide
  to perform a 10% canary rollout. Explain how you would calculate the total amount of data that needs
  to be pulled from the container registry to the nodes for this initial canary deployment.
details:
  realistic_solution: The correct approach is to first calculate the total size of the container image,
    then multiply that by the number of nodes in the canary deployment. The 7B model at FP16 precision
    requires 14 GB of storage. Adding the 1 GB of overhead brings the image size to 15 GB. A 10% canary
    on a 500-node cluster means 50 nodes will pull the image. The total data transfer is therefore 15
    GB multiplied by 50.
  common_mistake: Engineers often miscalculate the model's storage footprint by using the wrong precision
    (e.g., INT8 instead of FP16), or they forget that a container image includes significant overhead
    beyond just the model weights. Another common error is calculating the data transfer for the entire
    fleet instead of just the canary slice, leading to a 10x overestimation of the initial cost.
  napkin_math: 1. **Calculate Model Size:** A 7B parameter model at FP16 precision uses 2 bytes per parameter.
  options:
  - 400 GB. This assumes the 7B model uses INT8 (1 byte/param) instead of FP16.
  - 7.5 TB. This calculates the bandwidth for a full 100% rollout, not the 10% canary.
  - 750 GB. This correctly calculates the model size in FP16, adds the overhead, and applies it to the
    10% canary fleet.
  - 700 GB. This correctly calculates the model size but forgets to include the 1 GB of container overhead
    per node.
  correct_index: 2
