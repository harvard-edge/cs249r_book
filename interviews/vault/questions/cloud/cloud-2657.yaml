title: Detecting Undeclared Dependencies via Feature Statistics
scenario: You monitor 50 features with daily distribution checks. A feature's mean shifts from 0.42 to 0.38. Historical daily mean variation has std=0.015. Your alert threshold is a 2-sigma deviation.
question: Does this 0.04 shift trigger a 2-sigma alert, and how should you adjust for monitoring 50 features?
details:
  realistic_solution: 'Z-score = |observed_mean - expected_mean| / historical_std = |0.38 - 0.42| / 0.015 = 0.04 / 0.015 = 2.67. Alert threshold is 2-sigma (z > 2.0). Since 2.67 > 2.0, YES, this triggers an alert. But with 50 features monitored daily, you expect false alarms: at 2-sigma threshold (2-tailed), ~4.55% of checks are false positives = 50 × 0.0455 = 2.27 false alarms/day. To reduce alert fatigue, use Bonferroni correction: adjusted threshold = 2-sigma for 50 tests ≈ 3.29-sigma. At this corrected threshold: 2.67 < 3.29, so this would NOT trigger with correction. The tension: Bonferroni reduces false alarms but may miss real distribution shifts. A practical compromise: use 2.5-sigma threshold and investigate any feature with persistent multi-day shifts.'
  common_mistake: |
    **The Pitfall:** Setting statistical alert thresholds without accounting for multiple comparisons.
    **The Rationale:** Using standard 2-sigma "rule of thumb" stats on a single metric and naively applying it across dozens of features.
    **The Consequence:** Generating multiple false alarms every single day, leading to severe alert fatigue and the eventual ignoring of actual feature drift.
  napkin_math: |
    - **Z-Score Calculation**: `|0.38 - 0.42| / 0.015` = 2.67.
    - **Raw Alert**: 2.67 > 2.0 (2-sigma threshold), so YES, it triggers.
    - **False Alarm Rate**: At 2-sigma (2-tailed), ~4.55% are false positives. 50 features × 0.0455 = **2.27 false alarms/day**.
    - **Bonferroni Correction**: Adjusted threshold for 50 tests is ~3.29-sigma. Since 2.67 < 3.29, it would NOT trigger.
    - **Result**: A raw 2-sigma threshold causes daily alert fatigue. A corrected threshold suppresses it.
