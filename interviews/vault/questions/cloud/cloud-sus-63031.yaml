title: MI300X XCD Architecture and Memory Locality
scenario: The MI300X has 8 XCDs (Compute Dies) sharing a unified 192GB HBM3 pool. A kernel achieves 4.2
  TB/s measured bandwidth — 79% of the 5.3 TB/s peak. A developer then splits the workload across all
  8 XCDs using hip-aware thread block placement and measures 3.1 TB/s. They expected 8× improvement from
  parallelism. Diagnose the architectural reason for the bandwidth regression and explain the MI300X memory
  topology.
details:
  realistic_solution: 'The MI300X is a multi-die chiplet design: 8 Compute Dies (XCDs) connected via AMD''s
    Infinity Fabric on an interposer. Each XCD has direct high-bandwidth access to its nearest HBM3 stacks,
    but accessing HBM3 stacks attached to a remote XCD requires crossing the Infinity Fabric — adding
    100-200ns latency (vs 50ns local). The bandwidth regression from 4.2 TB/s to 3.1 TB/s when using all
    8 XCDs indicates the workload has cross-XCD memory access patterns that are bottlenecked by Infinity
    Fabric bandwidth rather than HBM3 bandwidth. Fix: use HIP''s device-locality hints or ROCm''s NUMA-aware
    memory allocation (hipMemAdvise) to bind each XCD''s thread blocks to memory pages in its local HBM3
    partition. For uniform workloads (transformer matmuls), AMD''s hardware prefetcher and the unified
    memory controller typically handle this transparently — the regression suggests irregular access patterns
    or incorrect thread affinity.'
  common_mistake: Assuming all 8 XCDs have equal-latency access to all 192GB of HBM3. The MI300X has NUMA-like
    memory locality — each XCD has lower latency and higher bandwidth to the HBM3 stacks physically adjacent
    to it. Random cross-XCD memory access has higher latency and lower effective bandwidth.
  napkin_math: 'Peak: 5.3 TB/s. Local XCD bandwidth per XCD: 5.3/8 ≈ 662.5 GB/s per XCD to local HBM.
    Cross-XCD Infinity Fabric bandwidth: ~896 GB/s total (bidirectional). 8 XCDs competing for Infinity
    Fabric: 896/8 = 112 GB/s per XCD for remote accesses. If 50% of accesses are remote: effective per-XCD
    BW = 0.5×662.5 + 0.5×112 = 387 GB/s. Total 8 XCDs: 8×387 = 3,096 GB/s ≈ 3.1 TB/s — matches observed
    regression. Fix: <5% remote access via NUMA binding → 8×662.5×0.95 = 5,035 GB/s ≈ 5.0 TB/s (94% of
    peak).'
