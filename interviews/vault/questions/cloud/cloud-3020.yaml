title: 'MLOps Lifecycle: Design a CI/CD Pipeline for LLM Fine-Tuning on H100 Cluster'
scenario: 'Design a CI/CD pipeline for continuous fine-tuning of a 7B LLaMA model
  on an H100 cluster (8× H100, 80GB HBM3, NVLink). The pipeline must support: nightly
  fine-tuning runs on new data, automated evaluation against 5 benchmark suites, canary
  deployment (5% traffic), and rollback in < 5 minutes. Quantify storage requirements
  and pipeline execution time.'
question: What CI/CD pipeline would support nightly 7B fine-tuning, benchmark evaluation,
  5% canaries, rollback under 5 minutes, and what are its storage and runtime budgets?
details:
  realistic_solution: 'Pipeline stages: (1) Data validation (5min, CPU), (2) Fine-tuning
    (LoRA rank 64, 1 epoch, 100K examples, 8×H100, ~2hrs), (3) Checkpoint to S3 (14GB
    × 3 checkpoints = 42GB, at 10GB/s = 4.2s), (4) Benchmark eval (5 suites, parallel
    on 2×H100, 30min), (5) Canary deploy via shadow traffic (automated), (6) Promote
    or rollback. Total pipeline: ~3.5hrs. Storage: 14GB × 30 daily checkpoints = 420GB/month.
    Rollback: swap model pointer in registry < 1min.'
  common_mistake: 'Designing a generic software CI/CD pipeline without accounting
    for ML-specific concerns: checkpoint storage size (7B FP16 = 14GB per checkpoint),
    GPU reservation overhead, and non-deterministic eval scores.'
  napkin_math: '7B FP16: 14GB. LoRA adapters: rank 64 × 2 matrices × 80 layers × 4096
    × 64 × 2 bytes = 80×2×4096×64×2 = 84MB (tiny). Checkpoint: base 14GB + adapter
    84MB = ~14GB. Training 100K examples, batch 16, 8 GPUs: 100K/(16×8)×1 epoch =
    781 steps. At 3s/step: 2344s ≈ 39min. Eval: 5 suites × 1000 examples each = 5000,
    at 7.8ms/token × 100 tokens = 780ms/example → 65min on 1 H100. 2×H100 parallel:
    32.5min.'
