title: 'MLOps Lifecycle: Design a CI/CD Pipeline for LLM Fine-Tuning on H100 Cluster'
scenario: Design a CI/CD pipeline for continuous fine-tuning of a 7B LLaMA model on an H100 cluster (8x H100, NVLink). The pipeline must support: nightly fine-tuning runs on new data, automated evaluation against 5 benchmark suites, canary deployment (5% traffic), and rollback in < 5 minutes.
question: What CI/CD pipeline would support nightly 7B fine-tuning, benchmark evaluation, 5% canaries, rollback under 5 minutes, and what are its storage and runtime budgets?
details:
  realistic_solution: 'Pipeline stages: (1) Data validation (5min, CPU), (2) Fine-tuning (LoRA rank 64, 1 epoch, 100K examples, 8×H100, ~2hrs), (3) Checkpoint to S3 (14GB × 3 checkpoints = 42GB, at 10GB/s = 4.2s), (4) Benchmark eval (5 suites, parallel on 2×H100, 30min), (5) Canary deploy via shadow traffic (automated), (6) Promote or rollback. Total pipeline: ~3.5hrs. Storage: 14GB × 30 daily checkpoints = 420GB/month. Rollback: swap model pointer in registry < 1min.'
  common_mistake: |
    **The Pitfall:** Designing a generic software CI/CD pipeline.
    **The Rationale:** Engineers apply standard software engineering practices without accounting for ML-specific resource constraints.
    **The Consequence:** The pipeline fails to handle massive checkpoint storage sizes, GPU reservation overhead, and non-deterministic evaluation scores, leading to fragile and excessively expensive deployments.
  napkin_math: |
    1. **Checkpoint Storage:** A 7B FP16 model is 14GB. LoRA adapters (rank 64, 80 layers) are tiny (~84MB). Checkpoints are roughly 14GB. 30 daily checkpoints = 420GB/month.
    2. **Fine-Tuning Runtime:** 100K examples, batch 16, 8 GPUs = 781 steps. At 3s/step, this takes ~39 minutes.
    3. **Evaluation Runtime:** 5 suites × 1000 examples = 5000. At 780ms/example → 65 mins on 1 H100. Parallelized on 2x H100 = 32.5 minutes.
    4. **Conclusion:** **Total pipeline time is roughly 1.5 to 2 hours**, fitting well within a nightly batch window.
