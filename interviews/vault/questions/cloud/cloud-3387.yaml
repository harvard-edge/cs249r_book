title: Optimizing Transformer Inference on Google TPU v5e via Kernel Fusion
scenario: Your team is deploying a large transformer model for real-time inference on Google TPU v5e. Initial profiling reveals that despite the TPU's significant compute capabilities (197 TFLOPS BF16), the inference pipeline is bottlenecked by a sequence of memory-bound element-wise operations (e.g., GELU, LayerNorm, Add) and frequent, small kernel launches. This leads to suboptimal utilization of the TPU's 1.6 TB/s HBM bandwidth. The objective is to achieve sub-millisecond latency and maximize throughput.
question: How would you use operator fusion on TPU v5e to cut memory-bound element-wise latency, and how would you identify, implement, and validate it?
details:
  realistic_solution: 'A realistic solution involves a deep dive into the computational graph and strategic application of operator fusion. First, use profiling tools like TensorBoard''s HBM utilization charts and operation traces to identify sequences of element-wise or small matrix operations that are memory-bound and executed consecutively (e.g., `LayerNorm -> GELU -> Add`). These are prime candidates for fusion. The implementation strategy involves: 1. **Leveraging XLA''s Automatic Fusion:** For many standard operations, XLA''s compiler will automatically fuse compatible operations. Verify if the desired sequences are already fused. 2. **XLA Custom Calls:** For more complex or non-standard sequences where automatic fusion is insufficient, design and implement custom TPU kernels using XLA custom calls. This involves writing a C++ or other supported language function that performs the fused operations efficiently on the TPU''s hardware, minimizing intermediate memory writes to HBM and reducing kernel launch overhead. For example, a custom kernel could take the input to LayerNorm and produce the output of Add, keeping all intermediate values on-chip. 3. **Data Layout Optimization:** Ensure data layouts (e.g., channel-last) are optimal for TPU memory access patterns. By performing these fusions, intermediate results remain in the high-speed on-chip memory, drastically reducing HBM traffic and kernel launch overhead, thereby better utilizing the 1.6 TB/s HBM bandwidth and approaching the 197 TFLOPS BF16 peak.'
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing individual operations or relying purely on automatic compiler fusions.
    **The Rationale:** Candidates neglect to analyze the specific data movement patterns and XLA compilation limits for memory-bound workloads.
    **The Consequence:** They fail to implement custom XLA fusions, leaving intermediate results passing through HBM and missing the latency target.
  napkin_math: |
    - Sequence of 3 memory-bound BF16 ops (OpA -> OpB -> OpC) on tensor size N.
    - Without Fusion: Each op reads N, writes N (4N bytes). Total HBM traffic = 12N bytes.
    - With Fusion (custom kernel): Reads N, writes N. Intermediates stay on-chip. Total HBM traffic = 4N bytes.
    - Savings: Reduces traffic by 3x. For N = 10^7 elements, saves 80 MB per sequence.
    - TPU v5e HBM bandwidth is 1.6 TB/s. Non-fused takes ~75µs for data movement.
    - Fused takes ~25µs, saving **50µs per sequence**, plus eliminating two kernel launches.
