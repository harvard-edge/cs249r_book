title: PagedAttention Memory Fragmentation Reduction for H100 LLM Serving
scenario: A vLLM deployment serves a 13B model (26GB), leaving 54GB for the KV cache. With standard contiguous KV allocation, average memory fragmentation is 35%. With PagedAttention, fragmentation drops to 4%. The 13B model has 40 layers, 40 attention heads, and a head dimension of 128.
question: How much throughput improvement should PagedAttention provide by reducing KV-cache fragmentation from 35% to under 4%?
details:
  realistic_solution: 'KV cache per token: 2 (K+V) * 40 layers * 40 heads * 128 head_dim * 2 bytes = 819.2KB. Available for KV: 54GB. Contiguous (35% frag): usable = 54 * 0.65 = 35.1GB. Sequences: 35.1GB / (819.2KB * avg_len). At avg 1000 tokens: 35.1GB / 819.2MB = 42 sequences. PagedAttention (4% frag): 54 * 0.96 = 51.84GB -> 63 sequences. Throughput: 63/42 = 1.48x improvement.'
  common_mistake: |
    **The Pitfall:** Calculating KV cache per sequence using only context length.
    **The Rationale:** It's a common oversight to forget that the KV cache must store keys and values across all layers and attention heads, not just a single token embedding.
    **The Consequence:** Available concurrency and maximum batch sizes are vastly overestimated.
  napkin_math: |
    - **KV per token:** $2 \text{ (K+V)} \times 40\text{ layers} \times 40\text{ heads} \times 128\text{ dim} \times 2\text{ bytes} = 819.2\text{ KB}$.
    - **Contiguous Usable Cache:** $54\text{ GB} \times (1 - 0.35) = 35.1\text{ GB}$.
    - **Contiguous Token Capacity:** $35.1\text{ GB} / 819.2\text{ KB} \approx 42,846\text{ tokens}$.
    - **Paged Usable Cache:** $54\text{ GB} \times (1 - 0.04) = 51.84\text{ GB}$.
    - **Paged Token Capacity:** $51.84\text{ GB} / 819.2\text{ KB} \approx 63,281\text{ tokens}$.
    - **Throughput Gain:** $63,281 / 42,846 = 1.476$.
    - **Conclusion:** **Throughput increases by ~1.48x** due to larger effective batch sizes.
