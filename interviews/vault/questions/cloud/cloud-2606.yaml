title: Active Learning vs Random Sampling
scenario: Your team needs to label 100K images for a medical imaging classifier. A junior engineer proposes
  randomly sampling from the unlabeled pool. Explain why active learning with uncertainty sampling would
  be more efficient.
details:
  realistic_solution: Active learning selects the most informative samples — those near the model's decision
    boundary where uncertainty is highest. By labeling these ambiguous cases first, the model learns discriminative
    features faster than from random samples, many of which are 'easy' and redundant. Empirically, active
    learning often reaches the same accuracy with 2-5x fewer labeled samples. For medical imaging at $5-10/label
    (expert radiologists), labeling 30K informative samples instead of 100K random ones saves $350K-$700K
    while reaching equivalent model quality.
  common_mistake: Assuming all unlabeled samples are equally valuable. Most random samples fall in regions
    the model already handles well.
  napkin_math: '100K labels × $7/label = $700K random. Active learning needs ~30K labels = $210K. Savings:
    ~$490K (70% reduction).'
