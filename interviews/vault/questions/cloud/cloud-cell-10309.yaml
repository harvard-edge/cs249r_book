title: Realizing Why GPU Jobs Hang After Node Preemption
scenario: A distributed training job running 8× H100 nodes hangs indefinitely after one node is preempted
  by a higher-priority workload. The surviving 7 nodes' pods are still Running, GPU utilization drops
  to 0%, and no error appears in pod logs. The job has been hung for 45 minutes. Explain what is happening
  and how to detect this class of failure proactively.
details:
  realistic_solution: 'PyTorch DDP/NCCL collective operations (AllReduce) block until all ranks respond.
    When rank N is evicted, the remaining ranks block inside the NCCL barrier indefinitely — no timeout
    by default. The pods appear Running because the process is alive but blocked in a CUDA kernel call.
    Detection: emit a `step_timestamp` metric from each rank every N seconds; alert if any rank''s timestamp
    is stale for >5 min. Fix: set `NCCL_ASYNC_ERROR_HANDLING=1` (raises exception after timeout) and implement
    a heartbeat watchdog thread that calls `dist.monitored_barrier(timeout=300s)` to surface the failure.'
  common_mistake: Assuming pod status `Running` means the training process is making progress; not setting
    `NCCL_ASYNC_ERROR_HANDLING=1` or a watchdog timeout in the training loop.
  napkin_math: 8 nodes × 8 H100 GPUs = 64 GPUs × 700 W = 44.8 kW idle burn. 45 min hang = 0.75 hr × 44.8
    kW = 33.6 kWh wasted. At $0.12/kWh = $4 in electricity + 64 × $0.75/GPU-hr (cloud pricing) × 0.75
    hr = $36 in compute credits lost from a single undetected hang.
