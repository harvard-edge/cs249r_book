title: Diagnosing LLM Latency Spikes with KV Cache Offloading
scenario: You are deploying a 70B parameter LLM (140GB in FP16) on a node with 4x A100 40GB GPUs (160GB
  total HBM2). To support high concurrency, you configure your serving engine to offload the KV cache
  to the host's CPU RAM (1TB DDR4) over PCIe Gen4 x16. Under normal load, Time Per Output Token (TPOT)
  is 50ms. However, during peak traffic, TPOT suddenly degrades to >800ms while GPU compute utilization
  drops below 30% and PCIe TX/RX traffic saturates. Diagnose the root cause of this latency cliff.
details:
  realistic_solution: The root cause is PCIe Gen4 bandwidth saturation due to KV cache thrashing. The
    model weights consume 140GB, leaving only 20GB of HBM for the active KV cache. Once concurrency exceeds
    this 20GB threshold, the system must constantly swap active KV blocks between slower CPU RAM and fast
    HBM for every generated token. The solution is to strictly cap maximum concurrency so the active KV
    cache fits within the 20GB HBM, implement PagedAttention to eliminate memory fragmentation, or upgrade
    to 80GB A100s.
  common_mistake: Candidates often blame CPU RAM capacity exhaustion, CPU throttling, or compute-bound
    self-attention, failing to analyze the bandwidth chasm between HBM (1.5 TB/s per GPU) and PCIe Gen4
    (32 GB/s) when the active memory working set thrashes.
  napkin_math: "Available HBM for KV cache: 160GB - 140GB = 20GB. \nPCIe Gen4 x16 bandwidth: ~32 GB/s.\n\
    If concurrent requests require 40GB of active KV cache, 20GB must be swapped in from system RAM per\
    \ token generation step.\nTime to transfer 20GB over PCIe: 20 GB / 32 GB/s = 625ms.\nBase TPOT (50ms)\
    \ + Swap latency (625ms) + Engine overhead ≈ 800ms latency spike."
