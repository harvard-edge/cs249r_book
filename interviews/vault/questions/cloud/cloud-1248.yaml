title: Evaluating KV Cache Allocators for Variable Sequences
scenario: You are designing the inference engine for a multi-tenant LLM API using 4x H100 80GB GPUs (320GB
  total HBM). The workload features highly variable sequence lengths, ranging from 100-token chat replies
  to 8,000-token document summaries. Your current contiguous memory allocator reports 30% free KV cache
  capacity (approx. 45GB), yet new requests requiring only 2GB of KV cache are being rejected with OOM
  errors. Evaluate the trade-offs between implementing a compacting garbage collector versus migrating
  to a paged memory allocation scheme (like PagedAttention) to resolve this fragmentation.
question: "Should you use compacting garbage collection or PagedAttention-style allocation to fix KV cache fragmentation, and why?"
details:
  realistic_solution: Adopt a paged allocation strategy using fixed-size blocks (e.g., 16 or 32 tokens).
    This completely eliminates external fragmentation by allowing non-contiguous physical blocks to back
    logically contiguous sequences, replacing large external fragmentation with minimal internal fragmentation.
  common_mistake: Proposing memory compaction (like in standard OS heaps), failing to realize that moving
    KV cache tensors synchronously blocks the GPU compute stream and adds severe latency spikes to active
    generations.
  napkin_math: With a contiguous allocator, a 30% external fragmentation rate on a 150GB KV cache pool
    wastes 45GB. With PagedAttention (block size = 16 tokens), external fragmentation is 0%. Internal
    fragmentation is at most 15 tokens per request. For 256 concurrent requests, 256 * 15 tokens = 3,840
    tokens wasted. If 1 token KV = ~1MB, that's only ~3.8GB wasted (2.5% vs 30%).
