title: MoE Routing Bandwidth Starvation
scenario: You deploy a 128-expert Mixture of Experts (MoE) transformer on a custom 8-NPU cloud node. Each
  NPU has 1 TB/s of HBM bandwidth. Standard top-2 token routing is used. Compute utilization is stuck
  at 12%. Profiling reveals the NPUs spend 85% of their time stalled on HBM reads, even though the dense
  compute equivalent runs at 70% utilization.
question: "Why is the 128-expert MoE only 12% utilized on 8 NPUs, and what hardware-aware routing or placement change would you make?"
details:
  realistic_solution: 'The problem requires hardware-algorithm co-design. Standard top-2 routing causes
    unstructured, all-to-all memory traffic. Because tokens can be routed to any of the 128 experts, the
    NPU must constantly page different expert weights in and out of its local SRAM from HBM. The tradeoff
    is model capacity utilization versus memory bandwidth efficiency. The solution is Expert Parallelism
    combined with routing constraints: pin 16 specific experts to each of the 8 NPUs and keep their weights
    stationary in SRAM/HBM. Modify the routing algorithm to penalize cross-NPU routing or enforce ''Expert
    Choice'' routing, which guarantees balanced expert assignment. This trades a slight drop in theoretical
    model perplexity for a massive reduction in HBM thrashing, converting the workload from memory-bound
    back to compute-bound.'
  common_mistake: Attempting to increase the NPU clock speed or loop unrolling to process the compute
    faster.
  napkin_math: 128 experts, each 1GB = 128GB total weights. If every NPU needs to load 128GB from HBM
    at 1 TB/s for a microbatch, memory load takes 128ms. If compute takes 15ms, utilization is 15 / (128
    + 15) = 10.4%. Pinning experts reduces loads to 16GB per NPU (16ms), raising utilization to 15 / (16
    + 15) = 48%.
