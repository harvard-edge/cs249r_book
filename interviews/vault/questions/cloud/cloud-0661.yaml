title: The PCIe ACS Block
scenario: You rent a bare-metal server with 4x GPUs. They do not have NVLink; they communicate over the
  motherboard's PCIe bus. You run an NCCL test, and the GPU-to-GPU bandwidth is only 12 GB/s, instead
  of the expected 24 GB/s for PCIe Gen4 x16. You notice the host CPU utilization is spiking during the
  transfer. Why is the CPU getting involved in a direct GPU-to-GPU transfer?
details:
  realistic_solution: 'PCIe Access Control Services (ACS) is enabled in the BIOS/IOMMU, forcing all GPU-to-GPU
    PCIe transfers to route through the CPU root complex instead of using direct peer-to-peer DMA. With
    P2P, data crosses the PCIe bus once (GPU A to GPU B) at 24 GB/s. With ACS, data goes GPU A to CPU
    RAM (trip 1), then CPU RAM to GPU B (trip 2), doubling the bus traversals and halving effective bandwidth
    to 12 GB/s. The CPU spikes because it''s actively managing the memory copies. The fix: disable ACS
    in BIOS and enable IOMMU passthrough for the GPU PCIe devices.'
  common_mistake: '"The PCIe bus is too slow." PCIe Gen4 x16 supports ~25 GB/s. The issue is the routing
    of the traffic.'
  napkin_math: Direct P2P = 1 trip over PCIe (24 GB/s). CPU routing = GPU to RAM (Trip 1), RAM to GPU
    (Trip 2). The data crosses the bus twice, mathematically halving the maximum throughput to 12 GB/s.
