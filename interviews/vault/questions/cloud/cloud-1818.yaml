title: Explainability Latency Trade-offs
scenario: A cloud-based ML service for medical image diagnosis (ResNet-50) requires an explanation for each prediction to satisfy regulatory compliance. The SLA mandates a p99 latency of 150ms per request. The model forward pass takes 30ms on an NVIDIA L4 GPU. The engineering team is debating between standard Saliency Maps and Integrated Gradients (using 50 interpolation steps) for the explanation generation.
question: "Should the medical image service use Saliency Maps or 50-step Integrated Gradients to satisfy the 150ms p99 explanation SLA?"
details:
  realistic_solution: Deploy standard Saliency Maps. It requires only a single forward and backward pass, fitting within the 150ms SLA, whereas Integrated Gradients requires 50x the compute and severely violates the latency budget.
  common_mistake: |
    **The Pitfall:** Blindly choosing Integrated Gradients for its theoretical superiority.
    **The Rationale:** ML researchers favor Integrated Gradients because it satisfies axiomatic properties (like implementation invariance), ignoring the multiplicative latency cost.
    **The Consequence:** Deploying an explanation method that requires 50x more compute, entirely blowing past the strict 150ms SLA and rendering the real-time service unusable.
  napkin_math: |
    - Saliency Map Latency = 1 Forward (30ms) + 1 Backward (~60ms) = 90ms. (Easily meets 150ms SLA).
    - Integrated Gradients Latency = 50 steps × 90ms (Forward+Backward) = 4,500ms.
    - **Conclusion: Integrated Gradients takes 4.5 seconds, failing the 150ms SLA by 30x.**
