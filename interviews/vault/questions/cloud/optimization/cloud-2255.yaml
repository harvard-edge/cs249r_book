title: The Dialect Hierarchy Lowering
scenario: 'MLIR uses a hierarchy of dialects from high-level ML operations down to hardware-specific instructions.'
question: 'Why does an ML compiler need multiple IR levels instead of compiling directly from the computation graph to machine code?'
details:
  realistic_solution: 'Multi-level IRs enable applying optimizations at their mathematically natural abstraction boundary. High-level dialects (e.g., linalg) excel at operator fusion (matmul + ReLU) where semantic graph intent is clear. Mid-level dialects (affine) handle loop unrolling and tiling. Low-level dialects (gpu or llvm) optimize register allocation. Progressive lowering ensures hardware-agnostic optimizations are maximized before introducing target-specific machine code constraints.'
  common_mistake: |
    **The Pitfall:** Believing multiple levels add unnecessary software complexity.
    **The Rationale:** Candidates assume a single-pass compiler is faster and simpler, missing the vital importance of abstraction-specific optimizations.
    **The Consequence:** Failing to exploit hardware-specific features like Tensor Cores or losing the high-level semantic intent required for operator fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compiler pipeline: Graph -> Math -> Loops -> Machine Code.

    **Calculations:**
    - Level 1: Semantic ops (torch).
    - Level 2: Tensor algebra (linalg, ~5 fusion passes).
    - Level 3: Loop nests (affine, ~8 tiling passes).
    - Level 4: Codegen (llvm/nvvm).

    **Conclusion & Interpretation:**
    - **Result: ~4 progressive dialect levels isolate complexity, enabling mathematically natural optimization passes (Abstraction-Bound).**
