title: 'Optimizing LLM Deployment on NVIDIA A100: Structured vs. Unstructured Pruning for Latency and Throughput'
scenario: You are tasked with deploying a large transformer-based language model on a GPU. The primary objective is to minimize inference latency and maximize throughput while ensuring the model's accuracy degrades by no more than 1% relative to the unpruned baseline.
question: Which pruning approach and sparsity patterns would you use to keep accuracy within 1% while improving latency?
details:
  realistic_solution: Prioritize 2:4 structured sparsity if profiling shows the transformer is GEMM-heavy and the deployment stack uses Sparse Tensor Core kernels for the relevant shapes. Use gradual sparsity-aware fine-tuning to keep accuracy within 1%, then compile with TensorRT or an equivalent inference stack and benchmark dense versus sparse latency. Combine the pruning with fusion and quantization only after confirming the bottleneck is compute rather than memory or launch overhead.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning and expecting proportional speedups.
    **The Rationale:** Candidates overlook that modern hardware relies on dense matrix multiplications and cannot efficiently accelerate random sparse memory accesses.
    **The Consequence:** They fail to leverage Sparse Tensor Cores and ignore memory bounds.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU supports 2:4 structured sparsity.

    **Calculations:**
    - Sparse Tensor Cores can provide up to 2x theoretical FP16/BF16 GEMM throughput for supported 2:4 patterns.
    - Realized latency gain = fraction of runtime in supported sparse GEMMs × sparse-GEMM speedup, plus overheads.
    - If 70% of latency is eligible GEMM work and those GEMMs run 1.7x faster, end-to-end speedup is approximately 1 / (0.30 + 0.70 / 1.7) = 1.41x.

    **Conclusion & Interpretation:**
    - **Result: Conditional latency gain.** 2:4 structured sparsity is the right candidate pattern, but the 2x number is a theoretical kernel ceiling; accuracy and end-to-end latency must be validated with the deployed model and batch sizes.
