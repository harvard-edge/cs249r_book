title: Evaluating Multicalibration in Risk Models
scenario: 'A cloud-based clinical risk prediction model is well-calibrated on aggregate. However, audits reveal severe risk miscalibration for intersecting subgroups (e.g., ''diabetic women over 65''). The model is deployed on 8 instances, processing 10M queries/day, given 20 binary demographic features and a strict P99 serving latency budget of 50ms.'
question: Should you use iterative multicalibration post-processing or a subgroup MoE for the clinical model under a 50ms P99 budget, and why?
details:
  realistic_solution: 'Implement multicalibration via post-processing. A lightweight auditor (e.g., gradient boosted trees) identifies miscalibrated computationally-identifiable subsets and applies additive scalar corrections to the base model logits. This avoids retraining the massive base model and limits latency overhead to <2ms.'
  common_mistake: |
    **The Pitfall:** Assuming that explicitly modeling all subgroup combinations (e.g., MoE routing or separate models) is feasible.
    **The Rationale:** This fails to account for the exponential explosion of subgroups and the resulting sample scarcity per group.
    **The Consequence:** Wasting time building intractable architectures that fail due to data sparsity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 binary demographic features.
    - Dataset size: 10M queries/day.
    - Latency budget: 50ms P99, with base model taking ~40ms.
    - Post-processing tree auditor: 50 trees, depth 10.

    **Calculations:**
    - Total intersecting subgroups = 2^20 ≈ 1.04M.
    - Average samples per subgroup = 10,000,000 / 1,048,576 < 10.
    - Tree auditor memory lookups = 50 * 10 = 500 lookups.
    - 500 memory lookups on CPU take <1ms.

    **Conclusion & Interpretation:**
    - **Result: <1ms overhead (Sparsity-Bound)**. Explicit MoE fails due to extreme data sparsity (<10 samples/group), while multicalibration trees fit well within the 10ms remaining latency budget.
