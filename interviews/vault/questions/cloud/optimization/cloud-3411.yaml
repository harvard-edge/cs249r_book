title: Optimizing LLM Inference Latency with Speculative Decoding on NVIDIA H100
scenario: Your team is optimizing the inference latency of a large autoregressive language model deployed on NVIDIA H100 GPUs using speculative decoding.
question: How does draft-verify speculative decoding use H100 bandwidth and FP16 compute, and how would you choose the draft model?
details:
  realistic_solution: 'Select a lightweight, highly optimized draft model that leverages the H100''s FP16 dense TFLOPS for rapid generation. The main model leverages the 3.35 TB/s HBM bandwidth to perform parallel verification. Continuously monitor and iterate on the draft model to maintain high acceptance rates.'
  common_mistake: |
    **The Pitfall:** Choosing a draft model that is either too large or too inaccurate.
    **The Rationale:** Candidates fail to balance the overhead of draft generation against the acceptance rate.
    **The Consequence:** The overhead negates latency benefits, or low acceptance rates cause frequent fallbacks to the slower main model, effectively increasing perceived latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline time per token: 100ms.
    - Speculative draft step: 20ms. Verify step: 30ms.
    - Acceptance rate: 75% (0.75). Draft tokens generated: 4.

    **Calculations:**
    - Expected accepted tokens per step: (1 - 0.75^5) / (1 - 0.75) = 3.05 tokens.
    - Speculative total step time: 20ms + 30ms = 50ms.
    - Effective time per token: 50ms / 3.05 = 16.4ms.
    - Speedup: 100ms / 16.4ms = 6.1x.

    **Conclusion & Interpretation:**
    - **Result: 6.1x latency speedup (Latency-Bound)**. Optimizes decoding by trading excess compute for fewer memory-bound steps.
