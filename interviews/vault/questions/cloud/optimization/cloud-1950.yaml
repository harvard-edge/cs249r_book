title: Memory Traffic Savings via Operator Fusion
scenario: 'You are optimizing a custom Transformer block for cloud inference on an A100 GPU (1.93 TB/s HBM bandwidth). The block contains a sequence of memory-bound pointwise operations: x = input + bias, y = GELU(x), and z = y * scale. The input tensor contains exactly 1 billion FP16 elements (2.0 GB).'
question: 'How much HBM traffic do eager versus fused static execution use for the three FP16 pointwise ops, and how long should the fused kernel take?'
details:
  realistic_solution: 'In eager mode, each operation acts as a separate kernel that must read from and write back to HBM. By defining the graph statically, the compiler fuses all three pointwise operations into a single GPU kernel. This keeps intermediate tensors entirely within the GPU''s on-chip SRAM (registers), drastically reducing HBM round-trips.'
  common_mistake: |
    **The Pitfall:** Assuming static graphs primarily accelerate computation by increasing FLOPs or just reducing Python overhead.
    **The Rationale:** Candidates fail to recognize that pointwise operations are heavily memory-bound; the true bottleneck is the HBM read/write traffic, not the ALU compute cycles.
    **The Consequence:** Optimization efforts might be misdirected toward instruction-level ALU tuning rather than memory-access reduction (fusion).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 1 billion FP16 elements (2.0 GB).
       - Hardware: A100 (1.93 TB/s HBM bandwidth).
       - Ops: 3 pointwise operations.
    2. **Calculations:**
       - Eager Mode HBM Traffic: 3 ops × (2 GB read + 2 GB write) = 12 GB.
       - Fused Kernel HBM Traffic: 1 read (2 GB input) + 1 write (2 GB output) = 4 GB.
       - Fused Compute Time: 4 GB / 1.93 TB/s = 2.07 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Operator fusion reduces HBM round-trips by 3x, dropping total execution time to 2.07 ms.**
