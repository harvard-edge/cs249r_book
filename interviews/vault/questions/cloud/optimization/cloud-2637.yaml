title: 'Diagnosing Train-Eval Performance Gap'
scenario: 'A model achieves 92% accuracy during training but drops to 78% when deployed, even though `model.eval()` is correctly called. The model architecture uses BatchNorm and Dropout(0.3).'
question: 'With `model.eval()` correctly called, what is the likely cause of the 92% training to 78% deployment accuracy drop and how would you fix it?'
details:
  realistic_solution: 'A 14-point train->eval drop with correct eval() usage points to BatchNorm running statistics divergence, not Dropout (which should improve or maintain accuracy in eval). Common cause: the training data distribution shifted during training, so the running_mean and running_var accumulated early in training don''t match the final distribution. Fix: after training completes, run a calibration pass over a representative dataset with model.train() but torch.no_grad() to recompute fresh running statistics. Another possibility: very small training batches (e.g., 4-8) cause high-variance batch statistics during training that the model exploits.'
  common_mistake: |
    **The Pitfall:** Blaming Dropout for the train-eval gap and attempting to tweak dropout rates.
    **The Rationale:** Engineers know Dropout behaves differently in `train` vs `eval` and immediately point to it as the culprit for deployment drops.
    **The Consequence:** The true cause—BatchNorm running statistics diverging from the final training distribution—remains unfixed, leaving the model broken in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training batch size = 4.
    - Smooth average running statistics over 100K batches.

    **Calculations:**
    - With batch size = 4, batch statistics variance is extremely high.
    - The running_mean and running_var become a smooth average over 100K batches.

    **Conclusion & Interpretation:**
    - **Result: 10-15% accuracy drop (Distribution-Bound)**. Replacing high-variance batch-specific noise with the smooth average at eval time causes a significant accuracy drop.
