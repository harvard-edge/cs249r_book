title: The Long-Context OOM Failure
scenario: You are fine-tuning a 70B parameter LLM on an H100 GPU. The training runs fine with a sequence length of 2048. However, when you increase the sequence length to 8192 to handle longer documents, you immediately get a CUDA Out-of-Memory (OOM) error during the first forward pass.
question: Given that the model parameters (140GB in FP16, distributed via Tensor Parallelism) and optimizer states fit in memory, what is the most likely cause of this sudden OOM error?
details:
  realistic_solution: The standard attention mechanism can materialize the full (N, N) attention score matrix in HBM for each layer and head. The memory required for those attention activations scales quadratically with sequence length. Moving from N=2048 to N=8192 makes the score tensors 16x larger, which can trigger OOM even when parameters and optimizer state fit. FlashAttention addresses this by computing attention in tiles and avoiding materialization of the full attention matrix in HBM. It reduces HBM activation memory for attention while the attention compute itself remains quadratic in sequence length.
  common_mistake: |
    **The Pitfall:** Blaming the KV-cache for the Out-Of-Memory error during a training forward pass.
    **The Rationale:** The KV-cache is famously memory-hungry during autoregressive *inference*, leading engineers to assume it applies universally.
    **The Consequence:** Time is wasted attempting to implement inference-specific KV-cache optimizations (like PagedAttention) that do absolutely nothing to solve the quadratic attention bottleneck in training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attention score storage, if materialized, is approximately Batch * num_heads * N^2 * bytes_per_score.
    - B=1, 64 heads, fp16/bf16 scores at 2 bytes each.

    **Calculations:**
    - Per head at N=8192: 8192^2 * 2 bytes = 134,217,728 bytes ≈ 134 MB.
    - Across 64 heads in one layer: 64 * 134 MB ≈ 8.6 GB of attention scores.
    - Per head at N=2048: 2048^2 * 2 bytes ≈ 8.4 MB.
    - Across 64 heads at N=2048: ≈ 0.54 GB per layer.
    - Increasing context from 2048 to 8192 therefore increases materialized attention-score memory by 16x.

    **Conclusion & Interpretation:**
    - **Result: Memory Capacity Bound**. The sudden OOM is explained by quadratic attention activation storage, not parameter size. FlashAttention avoids storing the full N by N score matrix in HBM, reducing attention activation memory while preserving O(N^2) attention compute.
  options:
    - The Adam optimizer states have doubled in size due to the longer sequence.
    - The full (N, N) attention score matrix is being materialized in HBM, which scales quadratically.
    - The KV-cache for the 8192-length context is too large to fit in memory.
    - The gradient checkpointing buffer is overflowing with the larger activation sizes.
  correct_index: 1
