title: Custom Activation Host-Device Bottleneck
scenario: You are deploying a large language model (LLM) on an accelerator. The model uses a custom activation function that requires a complex operator. After initial compilation and execution, you observe that the actual throughput is significantly lower than expected, even though the on-device memory utilization is low. The profiler indicates a bottleneck related to frequent host-device communication and unexpected stalls in the execution pipeline, despite the graph compiler attempting operator fusion and constant folding.
question: Why might a custom activation underperform on this accelerator despite low HBM use, and how should operator lowering be fixed?
details:
  realistic_solution: Inspect the lowered graph and profiler trace to see whether the custom activation became many small kernels, inserted host callbacks, or forced data-dependent control flow that the compiler cannot keep on device. Low HBM use can coexist with poor throughput when execution is dominated by launch overhead, host synchronization, or non-fused scalar work. Fix the lowering by expressing the activation in compiler-native ops that fuse, or by providing a device kernel/custom call with correct dtype support and layout so inputs stay on the accelerator and adjacent ops can fuse around it.
  common_mistake: |
    **The Pitfall:** Assuming the compiler will always perfectly optimize custom operations automatically.
    **The Rationale:** Unoptimized operator lowering can result in non-contiguous memory access patterns and frequent fallback calls to the host CPU.
    **The Consequence:** The model suffers from severe host-device communication bottlenecks, wasting accelerator compute potential and severely degrading throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Profiler reports frequent host-device communication and pipeline stalls.
    - The accelerator interconnect and bytes per fallback are not specified.
    - Low HBM utilization means capacity is not the limiting resource; it does not prove a specific transfer bandwidth.

    **Calculations:**
    - If a custom activation falls back to the host, each invocation adds at least a synchronization boundary plus transfer/dispatch overhead.
    - Total stall time per second is approximately fallback_count_per_sec * average_fallback_latency.
    - Example: 1000 fallbacks/sec at only 100 microseconds of average synchronization and dispatch overhead would consume 100 ms/sec, a 10% wall-time loss before any actual compute or transfer cost.
    - If lowering expands into many small device kernels, launch overhead and lost fusion can dominate even when HBM bandwidth counters are low.

    **Conclusion & Interpretation:**
    - **Result: host fallback or poor lowering is the likely bottleneck, not HBM capacity.** Do not claim a PCIe bandwidth limit unless the interconnect and transfer volume are measured; fix the operator so it lowers to fused on-device work.
