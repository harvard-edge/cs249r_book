title: LLM Distillation for High-Throughput Inference on AMD MI300X
scenario: You are leading the ML engineering team deploying a critical LLM inference service. The current production model is a massive 70B parameter transformer. Through extensive R&D, you've successfully trained a smaller 7B parameter student model using knowledge distillation, achieving 98% quality parity with the 70B teacher. Your mandate is to deploy this student model on an AMD MI300X accelerator.
question: How would you serve the 7B distilled LLM on MI300X using quantization, sparse compute, and hardware-tailored distillation, and when would it beat pruning?
details:
  realistic_solution: |
    Serve the 7B student as a separate inference artifact from the training distillation pipeline. Quantize weights and KV cache with MI300X-supported inference formats only after calibration confirms the 98% quality target holds, and benchmark the chosen ROCm/serving kernels rather than assuming every low-precision format accelerates every op. Use structured sparsity only if the trained student has a supported pattern and the deployed GEMMs actually take the sparse path. Distillation beats pruning when a purpose-built 7B architecture preserves quality better than a compressed 70B, has tensor shapes that run efficiently on MI300X, and can use quantization or structured sparsity without quality loss. Pruning can win when the original model needs only modest compression and its sparse pattern is stable, supported, and faster in the serving stack.
  common_mistake: |
    **The Pitfall:** Overlooking the specific advantages of the AMD MI300X.
    **The Rationale:** Applying generic LLM optimization techniques without adapting distillation to make the student model more hardware-friendly for sparse operations.
    **The Consequence:** Leaving hundreds of TFLOPS of sparse compute and massive memory bandwidth underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 model = ~14 GB.
    - MI300X Bandwidth = 5.3 TB/s.
    - MI300X Peak FP16 Sparse Compute = 1,307 TFLOPS.
    - Example dense compute estimate: 200 GFLOPs per generated token.

    **Calculations:**
    - Lower-bound time to stream 14 GB once: 14 GB / 5.3 TB/s ≈ 2.6 ms, but token generation is not one ideal bulk weight load.
    - Dense compute lower bound for 200 GFLOPs on 1,307 TFLOPS peak would be 200 / 1,307,000 ≈ 0.15 ms if sparse peak fully applied.
    - Sparse peak applies only when the model has the required structured sparsity and the inference kernels support it; otherwise use dense or quantized measured throughput.
    - Real token latency also includes KV-cache traffic, attention, non-GEMM ops, batching effects, and runtime overhead.

    **Conclusion & Interpretation:**
    - **Result: Serving benefit must be measured.** The 7B student has a small enough weight footprint for MI300X, but quantization and sparse compute beat pruning only when the deployed kernels preserve quality and reduce measured p99 latency.
