title: LLM Distillation for High-Throughput Inference on AMD MI300X
scenario: 'You are leading the ML engineering team deploying a critical LLM inference service. The current production model is a massive 70B parameter transformer. Through extensive R&D, you''ve successfully trained a smaller 7B parameter student model using knowledge distillation, achieving 98% quality parity with the 70B teacher. Your mandate is to deploy this student model on an AMD MI300X accelerator.'
question: "How would you serve the 7B distilled LLM on MI300X using quantization, sparse compute, and hardware-tailored distillation, and when would it beat pruning?"
details:
  realistic_solution: 'A robust solution involves a multi-pronged approach: 1. Tailored Distillation: During student model training, employ techniques like logit matching with carefully tuned temperature schedules, and feature distillation from strategically chosen intermediate layers of the teacher. The goal is to imbue the student with knowledge that makes it inherently amenable to quantization and sparsity, rather than just raw accuracy. 2. Aggressive Quantization: Post-distillation, apply advanced quantization techniques (e.g., FP8, INT8) to the 7B student model, leveraging the MI300X''s native support for these low-precision formats. This reduces memory footprint and increases effective throughput. 3. Sparse Compute Utilization: Design the student model''s architecture or fine-tune its sparse patterns to exploit the 1,307 TFLOPS FP16 sparse compute. 4. HBM3 Memory Management: Utilize the 192 GB HBM3 for large batching, KV cache optimization, and efficient multi-model serving. Optimize data transfer to maximize the 5.3 TB/s memory bandwidth, ensuring compute units are not starved. 5. Distillation vs. Pruning: Distillation excels here because it learns to reproduce teacher behavior, often resulting in better performance at smaller model sizes than pruning. For the MI300X, distillation can teach the student *how* to operate efficiently in a quantized or sparse manner, leveraging the hardware''s strengths.'
  common_mistake: |
    **The Pitfall:** Overlooking the specific advantages of the AMD MI300X.
    **The Rationale:** Applying generic LLM optimization techniques without adapting distillation to make the student model more hardware-friendly for sparse operations.
    **The Consequence:** Leaving hundreds of TFLOPS of sparse compute and massive memory bandwidth underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 model = ~14 GB.
    - MI300X Bandwidth = 5.3 TB/s.
    - MI300X Peak FP16 Sparse Compute = 1,307 TFLOPS.
    - 100 GMACs (200 GFLOPs) per token inference.

    **Calculations:**
    - Memory load time: 14 GB / 5.3 TB/s = 2.6 ms.
    - Max compute-bound throughput = 1,307 TFLOPS / 200 GFLOPs = 6,535 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory load takes 2.6ms per token (Memory-Bandwidth-Bound).**
