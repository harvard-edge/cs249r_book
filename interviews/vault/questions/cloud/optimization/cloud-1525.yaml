title: Evaluating LLM Unlearning Strategies
scenario: 'Your team deployed a 7B parameter LLM trained on 1.5 trillion tokens using a 64-GPU H100 cluster. Following a major GDPR ''Right to be Forgotten'' request, you must remove the statistical influence of 100,000 documents (~100 million tokens) from the model weights. A complete retrain would cost ~$150,000 and take over a month.'
question: 'Which unlearning approach should you use for the 100M-token GDPR deletion on the 7B LLM, and how would you validate compliance?'
details:
  realistic_solution: 'Since the model wasn''t pre-architected with exact unlearning (like SISA - Sharded, Isolated, Sliced, Aggregated), you must use approximate unlearning. The best approach is Gradient Ascent on the ''forget'' set combined with KL-divergence regularization on a ''retain'' set to maintain general utility, followed by empirical auditing using Membership Inference Attacks (MIA) to verify the unlearning efficacy.'
  common_mistake: |
    **The Pitfall:** Assuming simple gradient ascent on the requested documents is sufficient.
    **The Rationale:** Candidates assume reversing the training step is all that is needed, ignoring that this aggressively degrades general model utility (catastrophic forgetting).
    **The Consequence:** Creating a model that "forgets" the PII but also loses its general language capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters.
    - Retraining: 1.5T tokens, 64 H100s (300 TFLOPS).
    - Unlearning: 100M forget + 1B retain tokens.

    **Calculations:**
    - Retraining Cost: 6 * 7B params * 1.5T tokens = ~6.3e22 FLOPs.
    - Retraining Time: 6.3e22 / (64 H100s * 300 TFLOPS) = ~3.28e6 seconds = ~38 days.
    - Unlearning Cost: 6 * 7B * 1.1B = ~4.6e19 FLOPs.
    - Unlearning Time: 4.6e19 / (64 * 300 TFLOPS) = ~2,400 seconds = 40 minutes.

    **Conclusion & Interpretation:**
    - **Result: 1,300x speedup (Compute-Bound)**. 40 mins vs 38 days at the cost of requiring rigorous MIA validation.
