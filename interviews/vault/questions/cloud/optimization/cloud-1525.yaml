title: Evaluating LLM Unlearning Strategies
scenario: Your team deployed a 7B parameter LLM trained on 1.5 trillion tokens using a 64-GPU H100 cluster. Following a major GDPR 'Right to be Forgotten' request, you must remove the statistical influence of 100,000 documents (~100 million tokens) from the model weights. A complete retrain is estimated at about $150,000 and over a month under your sustained-throughput assumptions.
question: Which unlearning approach should you use for the 100M-token GDPR deletion on the 7B LLM, and how would you validate compliance?
details:
  realistic_solution: Since the model wasn't pre-architected with exact unlearning (like SISA - Sharded, Isolated, Sliced, Aggregated), you must use approximate unlearning. The best approach is Gradient Ascent on the 'forget' set combined with KL-divergence regularization on a 'retain' set to maintain general utility, followed by empirical auditing using Membership Inference Attacks (MIA) to verify the unlearning efficacy.
  common_mistake: |
    **The Pitfall:** Assuming simple gradient ascent on the requested documents is sufficient.
    **The Rationale:** Candidates assume reversing the training step is all that is needed, ignoring that this aggressively degrades general model utility (catastrophic forgetting).
    **The Consequence:** Creating a model that "forgets" the PII but also loses its general language capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters.
    - Retraining: 1.5T tokens, 64 H100s at an assumed sustained 300 TFLOPS/GPU.
    - Dense transformer training rule of thumb: about 6 FLOPs per parameter per token.
    - Unlearning pass: 100M forget tokens plus a sampled 1B-token retain set for KL regularization, for 1.1B effective tokens.

    **Calculations:**
    - Retraining FLOPs: 6 × 7e9 params × 1.5e12 tokens = 6.3e22 FLOPs.
    - Aggregate sustained throughput: 64 × 300e12 FLOPs/s = 1.92e16 FLOPs/s.
    - Retraining Time: 6.3e22 / 1.92e16 = ~3.28e6 seconds = ~38 days.
    - Approximate unlearning FLOPs: 6 × 7e9 × 1.1e9 = 4.62e19 FLOPs.
    - Approximate unlearning Time: 4.62e19 / 1.92e16 = 2,406 seconds = ~40 minutes.
    - Speedup: 3.28e6 seconds / 2,406 seconds = ~1,360x.

    **Conclusion & Interpretation:**
    - **Result: ~1,360x speedup (Compute-Bound Approximation).** Approximate unlearning is far cheaper than full retraining under the stated sustained-throughput assumptions, but the compliance claim still depends on empirical MIA and retain-set validation.
