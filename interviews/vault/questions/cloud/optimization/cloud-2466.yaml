title: 'Cost-Aware Hybrid LLM Routing'
scenario: 'A mobile email client with 5M DAU introduces a "Summarize Thread" feature. Usage averages 4 requests/day per user. The cloud LLM (Llama-3-70B) API costs $0.50 per 1M tokens (avg 1000 tokens/request). Total cloud cost is reaching $10,000/day. You want to shift to an on-device Llama-3-8B (INT4) on mobile NPUs. However, only 30% of the user base has devices capable of running it.'
question: 'How would you route summarization between on-device Llama-3-8B and cloud models to cut cost while keeping latency under 2s for all users?'
details:
  realistic_solution: 'Design a capability-aware dynamic routing architecture. On app initialization, run a device profiling script to check RAM, SoC tier, and OS version. Capable devices download the INT4 Llama-3-8B model (approx 4.5GB) over Wi-Fi. For these 30% of users, inference runs locally via NNAPI/CoreML, bringing cloud costs down instantly. For the remaining 70%, route requests to the cloud API. Further optimize cloud costs by implementing a semantic cache in the cloud for viral/company-wide email threads, and use a smaller, cheaper cloud model (e.g., 8B) for simple threads, reserving the 70B model only as a fallback for complex/long contexts.'
  common_mistake: |
    **The Pitfall:** Forcing the model onto all phones or keeping it entirely in the cloud.
    **The Rationale:** Viewing deployment as a binary choice to avoid maintaining fragmented deployment paths.
    **The Consequence:** Resulting in OOM crashes for 70% of users, or missing out on massive cost savings by keeping everything in the cloud.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original cost: 5M DAU * 4 req * 1000 tokens = 20B tokens/day. Cloud API costs $0.50 per 1M tokens.

    **Calculations:**
    - Baseline: (20B / 1M) * $0.50 = $10,000/day.
    - Edge routing saves 30%: $3,000/day saved. Remaining cloud traffic: 14B tokens/day.
    - Semantic cache (20% hit rate): handles 2.8B tokens, saves $1,400/day. Remaining: 11.2B tokens.
    - Route 80% to 8B ($0.10/1M): (8.96B * $0.10/1M) = $896.
    - Route 20% to 70B ($0.50/1M): (2.24B * $0.50/1M) = $1,120.
    - New Daily Cost: $896 + $1,120 = $2,016.

    **Conclusion & Interpretation:**
    - **Result: $2,016/day (Cost-Bound)**. An 80% reduction in cost by strategically routing.
