title: Cost-Aware Hybrid LLM Routing
scenario: A mobile email client with 5M DAU introduces a "Summarize Thread" feature. Usage averages 4 requests/day per user. The cloud LLM (Llama-3-70B) API costs $0.50 per 1M tokens (avg 1000 tokens/request). Total cloud cost is reaching $10,000/day. You want to shift to an on-device Llama-3-8B (INT4) on mobile NPUs. However, only 30% of the user base has devices capable of running it.
question: How would you route summarization between on-device Llama-3-8B and cloud models to cut cost while keeping latency under 2s for all users?
details:
  realistic_solution: |
    Design a capability-aware dynamic routing architecture with latency guardrails. On app initialization, run a device profiling script to check RAM, SoC tier, thermal state, OS version, and model-runtime support. Only the validated 30% of devices are eligible for the on-device path, and even those devices should use context limits, Wi-Fi-only model download, and a local latency probe before serving real requests. Devices that cannot meet a conservative local budget, such as 1.5 seconds for a bounded summary prompt, route directly to the cloud.

    For capable devices, run the INT4 local model only on short or medium threads and enforce prompt truncation/summarization before inference. If local generation times out, thermal throttles, or exceeds the quality confidence threshold, escalate to cloud. For the remaining users and for long/complex threads, keep the cloud path but reduce cost with request admission controls, context limits, caching for identical enterprise threads, and a cheaper cloud summarizer where quality is sufficient, reserving the 70B model for fallback. This policy cuts cost without pretending that a 4.5GB 8B model is broadly deployable on all phones.
  common_mistake: |
    **The Pitfall:** Forcing the model onto all phones or keeping it entirely in the cloud.
    **The Rationale:** Viewing deployment as a binary choice to avoid maintaining fragmented deployment paths.
    **The Consequence:** Resulting in OOM crashes for 70% of users, or missing out on massive cost savings by keeping everything in the cloud.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original cost: 5M DAU * 4 req * 1000 tokens = 20B tokens/day. Cloud API costs $0.50 per 1M tokens.
    - Only 30% of requests are eligible for on-device execution, and the routing policy sends them locally only when the device can finish under the local latency budget.
    - Remaining cloud traffic uses a 20% semantic-cache hit rate for repeated threads.
    - Of the uncached cloud traffic, 80% can use a cheaper cloud summarizer at $0.10/1M tokens, while 20% still requires the 70B model at $0.50/1M tokens.

    **Calculations:**
    - Baseline: (20B / 1M) * $0.50 = $10,000/day.
    - On-device eligible traffic: 20B * 30% = 6B tokens/day shifted off cloud when the latency probe passes.
    - Remaining cloud traffic: 20B - 6B = 14B tokens/day.
    - Semantic cache hit traffic: 14B * 20% = 2.8B tokens/day. Uncached cloud traffic: 14B - 2.8B = 11.2B tokens/day.
    - Cheaper cloud summarizer: 11.2B * 80% = 8.96B tokens/day; cost = (8.96B / 1M) * $0.10 = $896/day.
    - 70B fallback: 11.2B * 20% = 2.24B tokens/day; cost = (2.24B / 1M) * $0.50 = $1,120/day.
    - New Daily Cost: $896 + $1,120 = $2,016.
    - Cost reduction: ($10,000 - $2,016) / $10,000 = 79.8%.

    **Conclusion & Interpretation:**
    - **Result: $2,016/day with Latency Guardrails (Cost-Bound)**. The cost reduction is only valid if on-device requests are capability-gated and bounded by context, timeout, thermal, and fallback rules so every user still has a cloud path that can meet the 2s latency target.
