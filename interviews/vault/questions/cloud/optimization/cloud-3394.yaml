title: MI300X Operator Fusion for LLM Memory Bandwidth Optimization
scenario: You are tasked with optimizing a large transformer model for deployment on an accelerator. Profiling identifies a custom element-wise FP16 operation as a memory-bound bottleneck, consuming an effective 500 GB/s of bandwidth. Your graph compiler team proposes an operator fusion pass that would eliminate an intermediate tensor allocation, leading to a 30% reduction in memory traffic for this specific operation.
question: "If fusion cuts memory traffic by 30% for a strictly memory-bound operator, what theoretical execution-time reduction should you expect?"
details:
  realistic_solution: For a memory-bound operation, execution time is directly proportional to the amount of data transferred. A 30% reduction in memory traffic (data transferred) directly translates to a 30% reduction in execution time, assuming the operation remains memory-bound within the available bandwidth.
  common_mistake: |
    **The Pitfall:** Focusing on FLOPS or peak theoretical bandwidth rather than the effective bandwidth bottleneck.
    **The Rationale:** Candidates often assume that because the accelerator has massive compute, optimization requires utilizing those peak numbers, missing the fundamental definition of a memory-bound workload.
    **The Consequence:** Overcomplicating the analysis and failing to accurately translate a simple data reduction into an execution time reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Operation is strictly memory-bound.
       * 30% reduction in memory traffic.
    2. **Calculations:**
       * T_old ∝ D (Data Transferred).
       * D_new = D * (1 - 0.30) = 0.70 * D.
       * T_new = T_old * (D_new / D) = T_old * 0.70.
    3. **Conclusion & Interpretation:** **Result: 30% Time Reduction (Memory-Bound)**. Execution time strictly follows memory volume.
