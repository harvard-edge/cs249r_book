title: Continuous Batching Arithmetic Shift
scenario: An API serves a 15B parameter LLM. With a static batch size of 2, decoding latency is 35ms per token. They upgrade to continuous batching, increasing average batch size to 16. A PM is concerned that processing 16 tokens simultaneously will increase the per-token generation latency to roughly 280ms, violating SLA.
question: Will continuous batching raise decode-step latency to 280ms, and what can still affect request latency?
details:
  realistic_solution: |
    No, not as decode-step service time. Continuous batching does not turn 16 parallel decode tokens into 16 serial token steps; it forms a larger matrix operation for the current step, so the step can remain near the memory-bound weight-streaming floor while serving more requests. The PM's 280ms estimate is a serial-processing estimate. However, this does not guarantee unchanged end-to-end request latency: queueing delay, admission policy, and batch formation delay can increase if the scheduler waits too long or overloads the batch.
  common_mistake: |
    **The Pitfall:** Assuming decode latency scales linearly with batch size.
    **The Rationale:** Candidates misunderstand that auto-regressive decoding at low batch sizes is entirely memory-bound, not compute-bound.
    **The Consequence:** Incorrectly rejecting a throughput optimization under the false assumption that it will degrade latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 15B parameter LLM (FP16, 30GB weights).
    - Hardware: 864 GB/s HBM, 362 TFLOPS compute.
    - Decode step uses one weight pass for the active microbatch.
    - Latency metric here is kernel/decode-step service time; request latency also includes queueing and scheduler delay.

    **Calculations:**
    - GPU Ridge Point: 362 TFLOPS / 864 GB/s = 418 FLOPs/Byte.
    - Work per token ≈ 2 FLOPs/parameter * 15B parameters = 30 GFLOPs/token.
    - Weight traffic per decode step ≈ 30 GB, shared by the tokens in the microbatch.
    - Arithmetic intensity (BS=2): (2 tokens * 30 GFLOPs/token) / 30 GB = 2 FLOPs/Byte.
    - Arithmetic intensity (BS=16): (16 tokens * 30 GFLOPs/token) / 30 GB = 16 FLOPs/Byte.
    - Memory Bound Check: Both 2 ≪ 418 and 16 ≪ 418.
    - Memory floor for the decode step: 30 GB / 864 GB/s = 34.7 ms, before scheduler and queueing effects.

    **Conclusion & Interpretation:**
    - **Result: Step latency does not become 280ms.** The larger batch shares the weight-streaming pass, so the decode step can remain near the 35ms memory floor while producing up to 8x more tokens than batch size 2. End-to-end request latency can still rise if batching introduces queueing or admission delay.
