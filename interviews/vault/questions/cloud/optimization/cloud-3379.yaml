title: Optimizing Real-time Inference with Knowledge Distillation on NVIDIA A100
scenario: Your team developed a highly accurate, computationally intensive deep learning model (teacher) for real-time image segmentation. You must deploy a smaller, faster student model to handle 10,000 requests per second with a p99 latency target of 50ms on a cluster of NVIDIA A100 GPUs.
question: How would you distill the image segmentation teacher into an A100-friendly student for 10,000 RPS at 50 ms p99, and why choose distillation over pruning?
details:
  realistic_solution: 'Start with logit matching, using a high-temperature softmax. Simultaneously, investigate feature distillation, where the student''s intermediate feature maps are trained to mimic those of the teacher (crucial for segmentation). Distillation is preferred over pruning because it allows the student to learn from the teacher''s nuanced decision boundaries.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on logit matching or simply using a smaller model without considering the hardware.
    **The Rationale:** Candidates view distillation purely as a software-level teacher-student mimicking process.
    **The Consequence:** They miss out on feature distillation (crucial for spatial tasks like segmentation) and fail to optimize the student architecture for the A100's specific FP16 and memory bandwidth constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 10,000 RPS, p99 latency < 50ms.
    - Hardware: A100 (312 TFLOPS FP16, 2.0 TB/s HBM2e).

    **Calculations:**
    - Compute budget per request (single A100): 312 TFLOPS / 10,000 RPS = 31.2 GFLOPS.
    - Bandwidth limit per request: 2.0 TB/s / 10,000 RPS = 200 MB/request.
    - Batching for 50ms latency: To process 10,000 req/sec, processing a batch of 500 images in 50ms meets throughput while staying well within the 80GB VRAM.

    **Conclusion & Interpretation:**
    - **Result: 31.2 GFLOPS compute budget (Latency SLA Bottleneck)**. Distillation shrinks the model to fit within the strict compute budget.
