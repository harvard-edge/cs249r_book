title: TPU v5e Speculative Decoding Performance Analysis
scenario: You are optimizing inference latency for a large autoregressive LLM deployed on a Google TPU v5e pod. You have implemented speculative decoding using smaller, faster draft models to achieve lower end-to-end latency for streaming generation.
question: How would you evaluate TPU v5e draft model choices for speculative decoding to minimize streaming generation latency?
details:
  realistic_solution: |
    Evaluate each draft model by measured end-to-end latency on TPU v5e, not by draft speed alone. For each candidate, measure draft block latency, target-model verification latency for K tokens, accepted-prefix distribution, fallback cost after rejection, and throughput under the intended batch and sequence lengths. Prefer the model with the lowest latency per emitted token or highest emitted tokens per second after verification and fallback are included. A larger draft model can win if its higher acceptance rate reduces target passes enough to offset its cost; a tiny draft model can lose if rejection forces frequent fallback decoding.
  common_mistake: |
    **The Pitfall:** Selecting a draft model purely based on its speed without considering its accuracy or acceptance rate.
    **The Rationale:** Candidates focus on raw token generation speed, ignoring that an inaccurate draft model forces frequent main model verifications.
    **The Consequence:** The verification overhead negates latency benefits and increases overall compute cycles, leading to higher end-to-end latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Main model generates 1 token in `T_main`.
       - Draft model generates `K` tokens in `T_draft`.
       - Main model verifies `K` tokens in `T_verify`.
       - `p` is the per-token acceptance probability.
       - A rejection requires one fallback main-model token costing `T_fallback`.
    2. **Calculations:**
       - Expected accepted draft tokens per block: `E_accept = p + p^2 + ... + p^K`.
       - Approximate expected emitted tokens per block: `E_emit = E_accept + (1 - p^K)` if one fallback token is emitted after a rejection.
       - Expected block time: `T_block = T_draft + T_verify + (1 - p^K) * T_fallback`.
       - Effective latency: `T_block / E_emit`; compare this measured value for every draft candidate.
    3. **Conclusion & Interpretation:**
       - **Result: End-to-End Latency Tradeoff. Choose the draft model that minimizes verified latency per emitted token after acceptance rate, draft cost, verification cost, and fallback cost are all included.**
