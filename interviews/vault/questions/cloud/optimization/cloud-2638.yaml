title: Pure Functions Enable Composable Transforms
scenario: 'JAX imposes a functional programming paradigm requiring pure functions for its operations.'
question: 'Why does JAX require pure functions, and how does that enable transformations like vmap, jit, and grad?'
details:
  realistic_solution: 'Pure functions guarantee that output depends only on input — no hidden state, no randomness, no mutation. This mathematical property enables: (1) jit — the compiler can safely cache and reuse compiled kernels because the function always produces the same output for the same input. (2) grad — automatic differentiation can trace through the function knowing there are no side effects that could invalidate the gradient tape. (3) vmap — the compiler can automatically vectorize a function over a batch dimension because each element is independent. JAX trades ergonomic mutability for composable, mathematically sound transformations via XLA.'
  common_mistake: |
    **The Pitfall:** Thinking pure functions are just a stylistic coding preference.
    **The Rationale:** PyTorch users are accustomed to stateful `nn.Module` classes and view pure functions as an unnecessary syntactic burden.
    **The Consequence:** They fail to understand that strict purity is the mathematical prerequisite enabling JAX's powerful, composable compiler transformations.
  napkin_math: |
    **Assumptions & Constraints:**
    - JAX relies heavily on the XLA compiler.
    - Transforms (jit, grad, vmap) must be safely composable.

    **Calculations:**
    - JAX composition: `jit(grad(vmap(f)))` natively leverages purity to avoid complex state tracking mechanisms.
    - PyTorch equivalent requires heavy manual state handling when composing transformations.

    **Conclusion & Interpretation:**
    - **Result: Safely Composable (Compiler-Bound)**. Strict mathematical purity enables flawless multi-stage XLA compilation and auto-differentiation.
