title: CUDA Graphs vs Kernel Fusion for LLM Serving
scenario: 'Your team is serving a real-time LLM on a PCIe node at batch size 1 to meet a strict 50ms P99 latency SLA. Profiling reveals the model executes 2,000 distinct kernels per forward pass. The average GPU execution time per kernel is only 2μs, and a standard CPU kernel launch overhead is 5μs. The end-to-end latency is missing the SLA. The team is debating wrapping the forward pass in a CUDA Graph versus writing custom fused Triton kernels.'
question: 'How do you evaluate these two optimization options to hit the 50ms SLA?'
details:
  realistic_solution: 'CUDA Graphs are the correct immediate solution to eliminate the CPU-bound dispatch bottleneck. You should deploy CUDA Graphs immediately to collapse the dispatch overhead, then selectively fuse memory-bound operations to further reduce GPU execution time.'
  common_mistake: |
    **The Pitfall:** Believing CUDA Graphs directly accelerate GPU memory access or ALU operations.
    **The Rationale:** Candidates conflate the reduction of CPU launch overhead with actual GPU kernel optimization (like operator fusion).
    **The Consequence:** Teams might skip necessary kernel fusion later, leaving the model heavily memory-bandwidth bound after the initial CPU dispatch bottleneck is removed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA: 50ms P99.
       - Kernels: 2,000.
       - GPU execution: 2μs/kernel. CPU launch overhead: 5μs/kernel.
    2. **Calculations:**
       - CPU Dispatch Time: 2000 × 5μs = 10ms.
       - GPU Execution Time: 2000 × 2μs = 4ms.
       - Since 10ms > 4ms, the execution is entirely CPU-bound.
       - CUDA Graphs reduce 2,000 launches to a single launch (~10μs overhead).
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Dispatch-Bound. The workload is bottlenecked by the 10ms CPU launch overhead. CUDA Graphs collapse this to ~10μs, dropping total latency to ~4ms.**
