title: Specifying KV Cache Budget for PagedAttention
scenario: You are writing the deployment spec for a Llama-3 70B model on 4x H100. The model has 80 layers and uses GQA with 8 KV heads per GPU after tensor-parallel partitioning, head_dim=128. The target is 512 concurrent requests with max_seq_len=8192.
question: What per-GPU PagedAttention block size, block budget, and KV memory reservation are required, and does the 512-request target fit?
details:
  realistic_solution: |
    Use a 16-token PagedAttention block. With 8 KV heads per GPU, the KV cache per token per GPU is 80 layers x 2 (K+V) x 8 heads x 128 dim x 2B = 327,680 bytes, or 320 KiB. One 16-token block is 5 MiB per GPU. At max_seq_len=8192, each request needs 8192 / 16 = 512 blocks. For 512 concurrent requests, the block budget is 512 x 512 = 262,144 blocks per GPU. The KV reservation for that stated max-length target is 262,144 x 5 MiB = 1,280 GiB per GPU, before model weights. On 4x H100-80GB this target is infeasible as stated; the deployment spec should record block_size=16, required budget=262,144 blocks/GPU, required KV reservation=1.25 TiB/GPU, and fail capacity validation rather than silently sizing for an average length.
  common_mistake: |
    **The Pitfall:** Overestimating the KV cache size by using the total number of attention heads instead of KV heads.
    **The Rationale:** Candidates often forget that Grouped-Query Attention (GQA) dramatically reduces the number of KV heads per GPU compared to standard Multi-Head Attention.
    **The Consequence:** An 8x overestimation of memory requirements, leading to incorrect capacity planning or unnecessarily reducing concurrent request targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers, 8 KV heads/GPU, 128 head_dim, FP16 (2 bytes).
    - Block size = 16 tokens.
    - 512 concurrent requests, max_seq_len=8192.

    **Calculations:**
    - KV/token/GPU = 80 * 2 * 8 * 128 * 2 bytes = 327,680 bytes = 320 KiB.
    - KV/block/GPU = 16 * 320 KiB = 5 MiB.
    - Blocks/request at max length = 8192 / 16 = 512.
    - Block budget/GPU for 512 requests = 512 * 512 = 262,144 blocks.
    - KV reservation/GPU = 262,144 * 5 MiB = 1,310,720 MiB = 1,280 GiB.
    - FP16 weights alone are about 70B * 2B / 4 = 35 GB/GPU, so the max-length KV target cannot fit on 80 GB H100s.

    **Conclusion & Interpretation:**
    - **Result: VRAM-Capacity-Bound.** The direct max_seq_len=8192 sizing requires 262,144 blocks and about 1.25 TiB of KV memory per GPU, so the requested 512-request target is infeasible without changing the capacity target or assumptions.
