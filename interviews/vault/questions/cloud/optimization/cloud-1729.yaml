title: KV Cache Preemption Swap Latency
scenario: A low-priority batch of 32 requests (2,000 tokens each) is preempted on an A100 node running a smaller GQA model. The system swaps their KV cache (80 KB per token) from GPU HBM to CPU RAM over a PCIe Gen4 bus, and will swap it back when resuming.
question: What total PCIe latency penalty does swapping out and back the KV cache for 32 requests at 2,000 tokens incur?
details:
  realistic_solution: Calculate the batch KV cache volume as 32 * 2,000 * 80 KB = 5,120,000 KB, or about 5.12 decimal GB. Treat the 25 GB/s PCIe figure as effective one-way throughput for each transfer. Because the swap-out to CPU RAM and later swap-in to GPU HBM are sequential recovery costs rather than overlapped work, each direction takes 5.12 / 25 = 0.2048 seconds, for a total penalty of about 0.41 seconds.
  common_mistake: |
    **The Pitfall:** Counting only one transfer direction or mixing KB/KiB and GB conversions without stating the bandwidth convention.
    **The Rationale:** Preemption feels like a single eviction, so engineers forget that resumption requires a second sequential transfer over the same effective one-way PCIe path.
    **The Consequence:** Underestimating the total latency penalty by about 50%, or producing inconsistent numbers that misstate the impact of preemptive scheduling on tail latencies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size: 32 requests.
       - Sequence length: 2,000 tokens per request.
       - KV Cache size: 80 KB per token.
       - Effective PCIe Gen4 bandwidth: 25 GB/s one-way for each transfer direction.
       - Swap-out and swap-in are modeled as sequential, non-overlapped transfers.
    2. **Calculations:**
       - KV Cache Volume: 32 requests * 2,000 tokens * 80 KB/token = 5,120,000 KB ≈ 5.12 GB.
       - Single Transfer Time: 5.12 GB / 25 GB/s = 0.2048 seconds.
       - Total Swap Penalty (Out + In): 0.2048s + 0.2048s = 0.4096 seconds.
    3. **Conclusion & Interpretation:** **~0.41 seconds (PCIe Bandwidth-Bound).**
