title: Diagnosing Gradient Explosions from Corrupted Cloud Data
scenario: You are training a distributed recommender system model on 256 GPUs using a global batch size of 32,768. The dataset consists of 50TB of continuous click logs. An upstream data pipeline issue corrupted roughly 1% of the labels, replacing them with extreme outlier values. Training with Mean Squared Error (MSE) loss repeatedly crashes due to NaN gradients, even with global gradient clipping set to 0.5.
question: What is causing the NaN gradient crashes, and how would you modify the objective to stabilize training without filtering the 50 TB dataset?
details:
  realistic_solution: "Replace the MSE loss function with a robust alternative like Huber Loss or implement loss truncation. Huber loss acts as L2 loss for small errors but transitions to L1 loss for errors larger than a hyperparameter delta, inherently bounding the maximum gradient contribution from any single outlier."
  common_mistake: |
    **The Pitfall:** Relying solely on tighter gradient clipping or learning rate decay.
    **The Rationale:** Engineers assume standard regularization can suppress extreme outliers without changing the fundamental loss formulation.
    **The Consequence:** Masks the problem but heavily slows down convergence on clean data, or forces a complex data-filtering pipeline that is too slow to execute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size: 32,768. Outliers: 1% (~327 per batch).
    - MSE Gradient scales linearly with error size.

    **Calculations:**
    - MSE Gradient Spike: An error of 100 yields a gradient of 100. 327 \times 100 = 32,700 total gradient magnitude per batch from outliers alone.
    - Huber Loss Bounding: With delta=1, maximum gradient per outlier is 1.
    - Robust Gradient Sum: 327 \times 1 = 327.

    **Conclusion & Interpretation:**
    - **Result: 100x reduction (Loss-Function-Bound)**. Switching to Huber loss yields a 100x reduction in outlier gradient magnitude, stabilizing the training instantly without a 50TB data sweep.
