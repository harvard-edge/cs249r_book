title: Pruning a Vision Model to Fit a 2 GFLOP Budget
scenario: Your team is training a custom vision model on a cloud instance with 4x GPUs for a specialized inspection task. The current dense architecture has 5,000,000 parameters and costs about 10 MFLOPs per image using the team's estimate of 2 FLOPs per parameter. Profiling shows 80% of weights can be pruned with negligible validation loss after sparse fine-tuning. You have a production inference compute budget of 2 GFLOPs per image.
question: After pruning 80% of weights, what effective parameter count and forward-pass compute remain, and does the model fit the 2 GFLOP inference budget?
details:
  realistic_solution: Apply pruning only after validating that sparse fine-tuning preserves accuracy, then estimate the effective inference compute from the remaining nonzero weights. Keeping 20% of a 5M-parameter model leaves about 1M active parameters, which costs about 2 MFLOPs per image under the team's 2 FLOPs-per-parameter estimate, far below the 2 GFLOP budget.
  common_mistake: |
    **The Pitfall:** Counting dense parameter storage but ignoring the effective nonzero weights used by the sparse inference path.
    **The Rationale:** Candidates often discuss pruning qualitatively without translating sparsity into compute and latency budget checks.
    **The Consequence:** Teams either reject a viable sparse model or deploy a nominally pruned model on kernels that do not actually realize the expected compute savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense model: 5,000,000 parameters.
    - Pruning removes 80% of weights, leaving 20% nonzero.
    - Estimate: 2 FLOPs per active parameter.
    **Calculations:**
    - **Remaining active parameters:** 5,000,000 × 0.20 = 1,000,000.
    - **Compute per forward pass:** 2 FLOPs/parameter × 1,000,000 parameters = 2,000,000 FLOPs = 2 MFLOPs = 0.002 GFLOPs.
    - **Conclusion:** **0.002 GFLOPs << 2 GFLOPs budget**, so the pruned model fits if the serving stack uses sparse kernels that realize the pruning.

    **Conclusion & Interpretation:**
    - See calculations above.
