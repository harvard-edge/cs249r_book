title: Scaling Past the Interpolation Threshold
scenario: Your team is training a custom vision model on a cloud instance with 4x GPUs for a specialized inspection task using a dataset of 500,000 labeled images. The current architecture has 480,000 parameters and is exhibiting a massive spike in test error, even though the training error is nearly zero. You have a production inference compute budget of 2 GFLOPs per image.
question: "What target parameter count reaches 10x the interpolation threshold, and does it fit the 2 GFLOP inference budget?"
details:
  realistic_solution: Recognize that the model is at the peak of the double descent curve where parameters roughly equal the number of samples. Increase the parameter count well beyond the interpolation threshold to allow the network's inductive bias to find smoother, better-generalizing functions.
  common_mistake: |
    **The Pitfall:** Assuming the test error spike indicates irrecoverable overfitting and drastically reducing the model size.
    **The Rationale:** Candidates apply classical statistical learning theory (bias-variance tradeoff) without understanding the double descent phenomenon in deep learning.
    **The Consequence:** Permanently limiting the model's ultimate accuracy by keeping it in the underparameterized regime.
  napkin_math: |
    - **Interpolation threshold:** Occurs at $P \approx N = 500,000$.
    - **Target parameter count:** $10 \times 500,000 = 5,000,000$ (5M) parameters.
    - **Compute per forward pass:** 2 FLOPs/parameter $\times$ 5M parameters = 10 MFLOPs (0.01 GFLOPs).
    - **Conclusion:** **0.01 GFLOPs << 2 GFLOPs budget**, so the scaled model easily fits.
