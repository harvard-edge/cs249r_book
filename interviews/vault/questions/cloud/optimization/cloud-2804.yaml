title: Cloud New 0020
scenario: Architect an auto-tuning compilation pass for custom Mixture of Experts (MoE) routing layers on H100s to maximize the utilization of the 3.35TB/s HBM3 by optimizing unpredictable sparse memory access patterns.
question: How would you auto-tune custom MoE routing kernels on H100s to maximize HBM3 bandwidth for sparse accesses?
details:
  realistic_solution: Design an AOT compiler with an integrated offline profile-guided optimization (PGO) loop. The compiler generates multiple kernel variants for the MoE router with different tile sizes, unrolling factors, and L2 cache prefetching strategies. Deploy a tuning harness that runs these variants on the H100 using representative routing distributions. The harness measures HBM3 bandwidth utilization via hardware performance counters and locks in the optimal kernel configuration for production deployment.
  common_mistake: |
    **The Pitfall:** Relying on generic cuBLAS kernels for MoE routing.
    **The Rationale:** Engineers assume standard vendor libraries are universally optimal for all matrix multiplications.
    **The Consequence:** These libraries are designed for dense, contiguous matrices and perform abysmally on scattered sparse memory reads, starving the GPU of data.
  napkin_math: |
    - H100 provides 3.35TB/s HBM3.
    - Unoptimized sparse reads might only achieve 500GB/s due to cache misses.
    - **Tuning the tile size to fit the 50MB L2 cache ensures that expert weights and routed tokens maximize the >3TB/s theoretical limit.**
