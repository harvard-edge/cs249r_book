title: TorchDynamo Speedup and Graph Break Overhead
scenario: You profile a Transformer model with torch.compile(). TorchDynamo reports 3 graph breaks. The compiled regions take 12 ms total, and the eager fallback regions take 8 ms. Without compilation, the full model takes 35 ms.
question: Calculate the speedup achieved, and estimate the potential speedup if graph breaks were eliminated so the entire model could be compiled?
details:
  realistic_solution: The achieved speedup is 35 ms / (12 ms + 8 ms) = 1.75x. If graph breaks are eliminated and the 8 ms eager fallback is removed, the compiled end-to-end time is 12 ms, giving a potential speedup of 35 ms / 12 ms = 2.92x. In practice, you would pursue this by removing dynamic control flow or unsupported tensor operations so Dynamo can keep the model in one compiled graph.
  common_mistake: |
    **The Pitfall:** Assuming graph breaks have zero overhead.
    **The Rationale:** Focusing solely on the execution speed of successfully compiled regions.
    **The Consequence:** Ignoring the massive overhead of Python interpreter re-entry and guard checks, leaving substantial speedups (cross-region fusions) completely unoptimized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline Eager Time: 35 ms.
       - Current Time: 12 ms (compiled) + 8 ms (eager) = 20 ms.
    2. **Calculations:**
       - Current Speedup: 35 / 20 = 1.75x.
       - If graph breaks are eliminated, assume the 8 ms eager fallback disappears into the compiled graph.
       - Potential Total Time: 12 ms.
       - Potential Speedup: 35 / 12 = 2.92x.
    3. **Conclusion & Interpretation:**
       - **Result: 1.75x achieved speedup; up to 2.92x potential speedup.** Eliminating graph breaks would reduce runtime from 20 ms to 12 ms under the stated assumption.
