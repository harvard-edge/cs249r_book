title: The Caching Allocator Fragmentation Trap
scenario: Your serving system runs a 13B model. System tools report 45GB used, and PyTorch telemetry shows 30GB allocated. Yet when you try to allocate a 20GB KV-cache buffer, PyTorch throws an OOM error despite 50GB appearing 'free' on the device.
question: "Why does the allocation fail, and what is the role of PyTorch's caching allocator in this failure?"
details:
  realistic_solution: 'PyTorch''s caching allocator (CUDACachingAllocator) never returns memory to the CUDA driver by default. When tensors are freed, their CUDA blocks go into a free list, fragmented by size. The 15GB in the cache is split across many small blocks (e.g., thousands of 2MB and 8MB fragments from previous forward passes). The 20GB KV-cache needs a single contiguous allocation that no combination of cached fragments can satisfy. Diagnosis: `torch.cuda.memory_stats()` shows `allocated_bytes`, `reserved_bytes`, and `num_alloc_retries`. Fix: (1) `torch.cuda.empty_cache()` returns all cached blocks to the CUDA driver (but causes re-allocation overhead), (2) Pre-allocate the KV-cache at startup before fragmentation occurs, (3) Use `max_split_size_mb` environment variable to limit block splitting, (4) Use memory-pool-aware allocation like vLLM''s PagedAttention which manages KV-cache in fixed-size blocks.'
  common_mistake: |
    **The Pitfall:** Confusing system 'used memory' with PyTorch's actual allocated memory.
    **The Rationale:** Failing to understand that PyTorch uses a caching memory allocator that holds onto freed CUDA blocks instead of returning them to the driver.
    **The Consequence:** Spending hours debugging phantom OOM errors caused by memory fragmentation within PyTorch's own cache.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System Used Memory: 45GB.
       - PyTorch Allocated Memory: 30GB.
       - Free List (Caching Allocator): 15GB, highly fragmented.
       - Requested Allocation: 20GB contiguous.
    2. **Calculations:**
       - Largest contiguous block available ≈ 50MB.
       - Deficit = 20GB requested / 50MB available = 400x shortfall for a single contiguous block.
    3. **Conclusion & Interpretation:**
       - **Result: OOM Error (Fragmentation-Bound).** The 20GB allocation fails because PyTorch's 15GB cache is heavily fragmented, meaning no single contiguous block is large enough.
