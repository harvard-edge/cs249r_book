title: Forward vs. Reverse Mode AD
scenario: An ML systems team is deploying a neural surrogate model that predicts 1,000 output sensor readings from 10 input control parameters. They need to compute the full 1000x10 Jacobian matrix for a downstream constrained optimizer. Currently, they use standard reverse-mode automatic differentiation, which requires 500ms per batch and completely misses their strict 20ms SLA.
question: Should you switch the Jacobian computation to forward-mode AD, and what latency should you expect?
details:
  realistic_solution: Evaluate the dimensional asymmetry. Reverse-mode computes Vector-Jacobian Products (VJPs), requiring one pass per output dimension (1,000 passes). Forward-mode computes Jacobian-Vector Products (JVPs), requiring one pass per input dimension (10 passes). Switch to forward-mode AD for a 100x theoretical reduction in compute passes.
  common_mistake: |
    **The Pitfall:** Assuming reverse-mode AD (backpropagation) is always the most efficient way to compute gradients.
    **The Rationale:** Candidates ignore the mathematical structure of the Jacobian, missing that forward-mode AD (JVPs) is vastly superior for "tall" matrices where Outputs ≫ Inputs.
    **The Consequence:** Missing a 100x speedup and failing the strict latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inputs (N) = 10. Outputs (M) = 1000.
    - Reverse-mode latency: 500ms (based on 1000 passes).
    - Strict SLA: 20ms.

    **Calculations:**
    - Reverse-mode passes: 1 pass per output dimension = 1000 passes.
    - Forward-mode passes: 1 pass per input dimension = 10 passes.
    - Compute Reduction Ratio: 1000 / 10 = 100x fewer passes.
    - Expected Latency: 500ms / 100 = 5ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Switching to forward-mode AD drops latency to 5ms, comfortably beating the 20ms SLA.
