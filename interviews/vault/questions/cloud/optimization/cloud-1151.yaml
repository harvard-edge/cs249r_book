title: Choosing JIT Graph Compilation over Custom CUDA for 2ms GPU Latency
scenario: You are evaluating execution frameworks for a real-time anomaly detection pipeline on GPUs. The deep MLP model with 200 narrow layers processes batch size 1 to meet a strict 2ms latency SLA. The forward pass takes 4.5ms in PyTorch eager mode. Profiling reveals the GPU is only active for 0.5ms per pass, with massive gaps between kernel executions.
question: Should you build a custom monolithic CUDA kernel or use a JIT graph compiler to meet the SLA, and why?
details:
  realistic_solution: Identify that CPU launch and interpreter overhead is dominating execution, not GPU math. Use a JIT graph compiler first because it can fuse the 200 tiny layer launches into a much smaller captured graph with minimal code change and likely enough headroom for the 2ms SLA. A custom monolithic CUDA kernel is justified only if the graph compiler cannot fuse the dynamic pieces, leaves too many launches, or profiling after compilation still misses the SLA.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency as a GPU memory bandwidth issue.
    **The Rationale:** Because large MLPs are typically memory-bound, candidates assume the GPU is struggling to fetch weights fast enough.
    **The Consequence:** They might suggest increasing the batch size (which violates the strict SLA) instead of recognizing the actual bottleneck is the CPU-bound Python dispatch tax.
  napkin_math: |
    **Assumptions & Constraints:**
    - Eager execution: 4.5ms total. GPU active time: 0.5ms.
    - Approximate eager launch count: 200 tiny layer kernels.

    **Calculations:**
    - Exposed CPU dispatch/launch tax: 4.5ms - 0.5ms = 4.0ms.
    - Approximate launch overhead: 4.0ms / 200 launches = 20µs per launch.
    - If JIT fusion/capture reduces execution to about 10 launches, residual launch overhead is about 10 * 20µs = 0.2ms.
    - Lower-bound compiled latency, assuming GPU active time is not made worse by fusion: 0.5ms + 0.2ms = 0.7ms.
    - SLA headroom for fusion overhead or imperfect scheduling: 2.0ms - 0.7ms = 1.3ms.

    **Conclusion & Interpretation:**
    - **Result: JIT-first recommendation.** The 0.7ms figure is a lower-bound estimate, not a guarantee; it shows that reducing launch count is the highest-leverage fix and should be attempted before committing to custom CUDA.
