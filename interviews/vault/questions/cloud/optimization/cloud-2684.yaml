title: Why Backward Pass is 2x Forward
scenario: During a neural network training step, the backward pass requires approximately twice the FLOPs of the forward pass.
question: Why does the backward pass require about twice the FLOPs of the forward pass?
details:
  realistic_solution: 'In the forward pass, each dense layer computes output = weights * input (a single matrix multiplication). In the backward pass, each layer must compute TWO main matrix multiplications: (1) gradient w.r.t. input = weights^T * upstream_gradient, and (2) gradient w.r.t. weights = upstream_gradient * input^T. For the same batch and layer dimensions, these backward multiplications are comparable in cost to the forward multiplication, while bias, activation, and reduction costs are usually smaller.'
  common_mistake: |
    **The Pitfall:** Stating that the backward pass is 3x the forward pass.
    **The Rationale:** Candidates confuse the ratio of backward-to-forward (2:1) with the ratio of total-step-to-forward (3:1).
    **The Consequence:** Hardware capacity planning and compute time estimations are fundamentally skewed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operation: Dense linear layer.
    - Forward pass: Y = X * W (1 matmul).

    **Calculations:**
    - Backward gradient w.r.t input: dX = dY * W^T (1 matmul).
    - Backward gradient w.r.t weights: dW = X^T * dY (1 matmul).
    - Total backward matmuls: 2, each comparable to the forward matmul for matching dense-layer dimensions.
    - Approximate ratio: about 2x backward FLOPs : 1x forward FLOPs, ignoring smaller bias, activation, and optimizer terms.
    - Total training step: about 1x + 2x = 3x a forward pass.

    **Conclusion & Interpretation:**
    - **Result: the backward pass is about 2x the forward FLOPs.** The full training step is about 3x a forward pass because it includes 1x forward FLOPs plus 2x backward FLOPs.
