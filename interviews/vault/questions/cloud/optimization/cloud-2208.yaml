title: The Silent Performance Regression
scenario: Your LLM inference fleet's P50 latency has crept up 15% over 6 weeks, but
  no single deployment caused a visible regression. Each weekly deploy passed the
  performance gate (< 5% regression on the canary).
question: How would you design an observability and benchmarking system to detect,
  attribute, and prevent a gradual 15% LLM P50 latency regression?
details:
  realistic_solution: 'This requires a three-layer observability system: (1) Continuous
    performance benchmarking: Run a fixed benchmark workload (synthetic, deterministic)
    on a dedicated canary instance every hour. Store results in a time-series database.
    Use CUSUM (Cumulative Sum) or Bayesian change-point detection instead of simple
    threshold comparison — CUSUM accumulates small deviations and triggers when the
    cumulative drift exceeds a significance bound, catching compound regressions that
    no single-deploy gate would flag. (2) Differential profiling with attribution:
    When CUSUM triggers, automatically run a differential profile comparing the current
    build against the last-known-good build (stored as a reference nsys trace). Diff
    the kernel-level timings to identify which specific operations regressed. Attribution
    example: ''FFN GEMM +3ms (new cuBLAS version), LayerNorm +1.5ms (shape change
    from new tokenizer), Attention +2ms (KV-cache management change).'' Each is below
    5% individually but sum to 15%. (3) Performance budget system: Assign each team
    a ''latency budget'' — the attention team owns 40ms, the serving team owns 15ms,
    the data preprocessing team owns 5ms. Track actual vs budget continuously. When
    a team exceeds budget, they must either optimize or justify. This transforms a
    global ''latency crept up'' into a local ''team X is 8ms over budget.'' Prevention:
    add a cumulative regression gate to the release train — not just per-deploy, but
    a rolling 4-week comparison against the baseline.'
  common_mistake: '**The Pitfall:** Adding more aggressive per-deploy gates (e.g.,
    2% threshold instead of 5%).

    **The Rationale:** Assuming that tightening the threshold will catch the small
    regressions.

    **The Consequence:** This dramatically increases false positives and halts deployments
    without solving the fundamental problem: individual changes are genuinely below
    the noise floor, but they compound.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Six weekly deploys, each potentially adding up to a 5% latency regression.

    - Base latency metrics: P50 = 200ms. Noise sigma = 10ms.


    **Calculations:**

    - Compound Regression: Six deploys, each adding 2.5% latency: 1.025^6 = 1.16 (a
    16% compound regression from passing deploys).

    - CUSUM Detection: If each deploy adds 5ms to a 200ms P50, cumulative drift after
    6 deploys is 30ms.

    - Thresholds: With a noise sigma = 10ms, a CUSUM threshold of h = 4 \times \sigma
    = 40ms triggers after 8 deploys. Setting h = 3 \times \sigma = 30ms triggers after
    6 deploys.


    **Conclusion & Interpretation:**

    - **Result: 2 weeks earlier (Statistical-Detection-Bound)**. Setting tighter thresholds
    catches compound drift 2 weeks earlier.

    '
