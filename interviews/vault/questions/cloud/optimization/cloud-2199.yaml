title: The Right Profiler for the Job
scenario: Your training job on 8 GPUs is 40% slower than expected. You have access to PyTorch Profiler, NVIDIA Nsight Systems (nsys), and NVIDIA Nsight Compute (ncu).
question: In what order do you use these tools, and what does each one tell you that the others cannot?
details:
  realistic_solution: 'Use a top-down profiling methodology: (1) PyTorch Profiler first — it gives you the application-level view: which Python operations dominate wall-clock time, where data loading stalls exist, and how much time is spent in backward vs forward vs optimizer steps. (2) Nsight Systems (nsys) second — once you know which phase is slow, nsys gives you the GPU timeline: kernel launch gaps, NCCL communication bubbles, host-device synchronization stalls, and CPU-GPU overlap. (3) Nsight Compute (ncu) last and only on the specific kernels identified by nsys — ncu gives you per-kernel roofline position, occupancy, memory throughput, and warp stall reasons.'
  common_mistake: |
    **The Pitfall:** Jumping straight to Nsight Compute (ncu) to profile individual kernels.
    **The Rationale:** Engineers assume the bottleneck is always raw compute math, diving into micro-optimizations before verifying if the GPU is even being fed data.
    **The Consequence:** Wasting hours profiling the wrong thing with an extremely high-overhead tool, missing glaring pipeline stalls like network waiting or data loading.
  napkin_math: |
    **Assumptions & Constraints:**
    - PyTorch Profiler: 2-5% overhead.
    - nsys: 5-10% overhead.
    - ncu: 10-100x slowdown.

    **Calculations:**
    - Profiling a full 500ms step with ncu takes 5-50 seconds per step.
    - 1000 steps with ncu = 1.4 to 14 hours.

    **Conclusion & Interpretation:**
    - **Result: 1.4 to 14 hours (Tool Overhead-Bound)**. Using ncu indiscriminately wastes hours; tools must be applied top-down.
