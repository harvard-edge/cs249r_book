title: Evaluating Topologies via the Iron Law
scenario: You are planning to train a 70B parameter dense LLM on 1.4 trillion tokens using a cluster of 512 GPUs. Your infrastructure team presents two cluster leasing options. Option A uses standard RoCEv2 Ethernet networking, projecting a Model FLOPs Utilization (MFU) of 35% at a cost of $2.00/GPU-hour. Option B uses non-blocking InfiniBand networking, projecting an MFU of 50% at a cost of $2.80/GPU-hour.
question: Which cluster option is more cost-effective for the 70B training run, and what MFU would Option B need to break even?
details:
  realistic_solution: 'Recognize that Total Cost is proportional to Training Time * GPU_Hourly_Cost. According to the Iron Law of Training, Time = Total_FLOPs / (System_Peak_FLOPs * MFU). Since Total_FLOPs and System_Peak_FLOPs are identical for both options, Time is strictly proportional to 1/MFU. We can compare the cost effectiveness by calculating the ratio: (GPU_Hourly_Cost / MFU). Option B has a lower ratio (5.60 vs 5.71), making it cheaper overall despite the higher hourly rate.'
  common_mistake: |
    **The Pitfall:** Attempting to calculate the absolute training time in seconds.
    **The Rationale:** Candidates often compute the total FLOPs (6PD = 5.88e23) and the system's peak throughput (512 * TFLOPs), introducing massive arithmetic errors rather than realizing that workload and peak hardware are constants that can be factored out.
    **The Consequence:** Getting lost in the weeds of arbitrary large numbers and failing to cleanly compare the ratios.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A: 35% MFU, $2.00/hr.
    - Option B (InfiniBand): 50% MFU, $2.80/hr.
    - Time is proportional to 1/MFU. Total cost is proportional to Cost/MFU.

    **Calculations:**
    - Cost Factor A = $2.00 / 0.35 = 5.71.
    - Cost Factor B = $2.80 / 0.50 = 5.60.
    - Breakeven MFU for B = $2.80 / ($2.00 / 0.35) = 49%.

    **Conclusion & Interpretation:**
    - **Result: Option B is cheaper (Cost-Bound)**. Comparing ratio factors proves InfiniBand is cost-effective even with a higher hourly rate.
