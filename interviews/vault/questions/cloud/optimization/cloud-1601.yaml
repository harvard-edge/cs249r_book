title: TensorRT Format Optimization Latency Calculation
scenario: 'A PyTorch model takes 18ms per request (10ms compute, 8ms memory overhead). You apply FP16 precision (2x compute speedup) and TensorRT layer fusion (30% memory bandwidth reduction).'
question: 'What is the expected latency after applying FP16 and TensorRT fusion?'
details:
  realistic_solution: 'Apply speedup factors independently to the compute and memory portions. Compute = 10ms / 2 = 5ms. Memory = 8ms * 0.7 = 5.6ms. Total = 10.6ms.'
  common_mistake: |
    **The Pitfall:** Applying a single flat speedup multiplier to the total latency.
    **The Rationale:** Candidates combine optimizations into one generalized factor, ignoring execution components.
    **The Consequence:** Inaccurate performance projections that fundamentally misunderstand GPU roofline bounds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Latency: 10 ms (2x speedup).
    - Memory Latency: 8 ms (30% reduction).
    
    **Calculations:**
    - New Compute: 10 / 2 = 5.0 ms.
    - New Memory: 8 * (1 - 0.3) = 5.6 ms.
    - Total Latency: 5.0 + 5.6 = 10.6 ms.
    
    **Conclusion & Interpretation:**
    - **Result: 10.6 ms total latency (Amdahl's Law)**. Distinct bottlenecks scale independently.
