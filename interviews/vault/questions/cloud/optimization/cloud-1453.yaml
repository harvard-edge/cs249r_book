title: JIT Recompilation Spikes in Dynamic Inference
scenario: You are running a production NLP inference service on NVIDIA A100 GPUs. After enabling JIT compilation (e.g., `torch.compile`), median latency improved by 30%, but P99 latency spiked from 45ms to over 2.5 seconds. API requests have variable sequence lengths ranging from 10 to 1024 tokens.
question: How do you root-cause and resolve these P99 latency spikes associated with JIT compilation?
details:
  realistic_solution: Diagnose that the JIT compiler generates a new execution graph for every unique sequence length, causing cache misses and 2.5s recompilations during inference. Fix this by padding inputs to power-of-two buckets (e.g., 128, 256, 512, 1024) to constrain the shape space, or by explicitly enabling dynamic shapes in the JIT compiler.
  common_mistake: |
    **The Pitfall:** Failing to recognize that dynamic input shapes trigger continuous JIT recompilation.
    **The Rationale:** Candidates assume compilation happens strictly once during startup and incorrectly blame network I/O or garbage collection for random latency spikes.
    **The Consequence:** P99 latency SLAs are severely violated because the GPU is constantly stalled waiting for the CPU to recompile computation graphs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline P99: 45ms.
       - JIT compilation time: ~2.5s (2,500ms).
       - JIT cache hit time: 30ms.
    2. **Calculations:**
       - If just 2% of requests have unseen sequence lengths, P99 is dominated by the 2,500ms penalty.
       - Bucketing Solution: Restricting shapes to 4 buckets (e.g., 128, 256, 512, 1024) limits cache misses to exactly 4 times per worker.
    3. **Conclusion & Interpretation:**
       - After initial warm-up, the cache hit rate hits 100%, stabilizing P99 at ~35ms.
       - **Result: JIT Recompilation Overhead (Compute Bound)**
