title: Constant Folding Dense Normalization
scenario: You are deploying a DLRM-style recommendation model to Triton Inference Server on an NVIDIA L4 GPU. The ONNX graph contains a dense feature normalization subgraph processing 1 million FP32 features per request out = (x - mean) / sqrt(var + eps). The mean, var, and eps are static dataset statistics.
question: How much memory traffic does constant folding save for the 1M-feature normalization subgraph on an NVIDIA L4?
details:
  realistic_solution: Constant folding pre-computes scale = 1/sqrt(var+eps) and shift = -mean*scale at compile time, transforming the graph into a single Fused Multiply-Add (FMA) operation (x * scale + shift). On memory-bound GPUs, this eliminates multiple HBM roundtrips for intermediate tensors.
  common_mistake: |
    **The Pitfall:** Assuming the primary benefit is saving ALU compute cycles (FLOPs).
    **The Rationale:** Candidates focus on the computational cost of square root and division operations over simple arithmetic.
    **The Consequence:** They fail to recognize that the critical bottleneck for element-wise ops is HBM memory bandwidth and intermediate tensor materialization, misprioritizing optimization efforts.
  napkin_math: |
    1. **Assumptions & Constraints:** 1M FP32 features (4 MB total). Mean and variance statistics are static. The unfused runtime graph materializes two full-size intermediate tensors: t1 = var + eps and t2 = sqrt(t1), then computes out = (x - mean) / t2. Constant folding precomputes scale = 1/sqrt(var + eps) and shift = -mean * scale, leaving out = x * scale + shift.
    2. **Calculations:** Unoptimized materialized intermediate traffic = 2 intermediates * (4 MB write + 4 MB reread) = 16 MB. The optimized FMA avoids those intermediate HBM roundtrips while still reading x and writing out. Savings = 16 MB per inference.
    3. **Conclusion & Interpretation:** **Result: 16 MB memory traffic saved per inference.** The savings come from eliminating materialized intermediate tensors, not from the small scalar-statistic constant computations.
