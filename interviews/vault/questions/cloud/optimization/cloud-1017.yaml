title: Constant Folding Dense Normalization
scenario: You are deploying a DLRM-style recommendation model to Triton Inference Server on an NVIDIA L4 GPU. The ONNX graph contains a dense feature normalization subgraph processing 1 million FP32 features per request out = (x - mean) / sqrt(var + eps). The mean, var, and eps are static dataset statistics.
question: What memory-traffic benefit should you expect from constant folding the 1M-feature normalization subgraph on an L4?
details:
  realistic_solution: Constant folding pre-computes scale = 1/sqrt(var+eps) and shift = -mean*scale at compile time, transforming the graph into a single Fused Multiply-Add (FMA) operation (x * scale + shift). On memory-bound GPUs, the reliable benefit is avoiding materialized intermediate HBM roundtrips; the exact byte savings depends on which temporaries the runtime would otherwise fuse or materialize.
  common_mistake: |
    **The Pitfall:** Assuming the primary benefit is saving ALU compute cycles (FLOPs).
    **The Rationale:** Candidates focus on the computational cost of square root and division operations over simple arithmetic.
    **The Consequence:** They fail to recognize that the critical bottleneck for element-wise ops is HBM memory bandwidth and intermediate tensor materialization, misprioritizing optimization efforts.
  napkin_math: |
    1. **Assumptions & Constraints:** 1M FP32 features = 4 MB per full tensor. Mean, variance, and epsilon are static. Compare only extra runtime traffic from materialized temporaries; both versions still read inputs/constants needed by the final affine transform and write the output.
    2. **Calculations:** If the unfused graph materializes one full-size normalization temporary, that path costs one 4 MB write plus one 4 MB reread = about 8 MB of avoidable HBM traffic. Additional unfused temporaries could add more, while an execution engine that already fuses elementwise ops could save less. The prior 16 MB claim is not a guaranteed lower bound because it assumes two independent full-tensor temporaries are materialized and reread.
    3. **Conclusion & Interpretation:** **Result: qualitative memory-traffic reduction, roughly 8 MB per avoided full-tensor temporary.** The robust answer is that constant folding removes runtime intermediate materialization for static normalization constants; do not claim a fixed 16 MB saving without profiling the actual graph executor.
