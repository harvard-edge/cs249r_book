title: Diagnosing Jacobian Bottlenecks in Many-Output Models
scenario: A research team is deploying a neural fluid dynamics simulator on A100 GPUs. The model takes a small vector of N=25 fluid parameters as input and outputs a high-resolution velocity field of M=65,536 (256x256) grid points. They need to compute the full M x N Jacobian for an implicit solver. Their initial implementation uses reverse-mode automatic differentiation (vectorized `vjp`), but it results in crippling out-of-memory (OOM) errors and takes over 10 seconds per step.
question: Why do reverse-mode VJPs OOM for a 65,536x25 Jacobian, and which autodiff strategy should replace them?
details:
  realistic_solution: Replace the reverse-mode AD (`vjp`) with forward-mode AD (`jvp`). Forward-mode AD computes the derivative concurrently with the forward pass using dual numbers, scaling efficiently with outputs but requiring multiple passes for multiple inputs.
  common_mistake: |
    **The Pitfall:** Suggesting activation checkpointing, CPU offloading, or chunking the outputs to avoid OOM.
    **The Rationale:** Candidates reflexively rely on standard deep learning memory tricks for massive models.
    **The Consequence:** They fail to recognize that reverse-mode AD is fundamentally the wrong mathematical tool when output dimension vastly exceeds input dimension, leaving performance fundamentally crippled.
  napkin_math: |
    1. **Assumptions & Constraints:** N=25 inputs, M=65,536 outputs. Computing full M × N Jacobian matrix.
    2. **Calculations:** Reverse-mode AD (`vjp`) requires M=65,536 backward passes, caching enormous activation graphs. Forward-mode AD (`jvp`) computes derivatives alongside the forward pass, requiring only N=25 forward passes. Speedup = 65,536 / 25 = ~2,621x.
    3. **Conclusion & Interpretation:** **Result: ~2,621x reduction in AD passes. Algorithmically Compute-Bound.**
