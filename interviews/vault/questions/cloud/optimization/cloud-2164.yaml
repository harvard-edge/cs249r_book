title: Sparse Continual Pre-Training for a 70B Medical LLM
scenario: Your company has a general-purpose 70B LLM that cost $4M to pre-train. You need a domain-specific medical version using 100B medical tokens, and the team wants sparse or adapter-based updates to reduce forgetting risk.
question: How would you use sparse or adapter-based continual pre-training on 100B medical tokens without benchmark regressions?
details:
  realistic_solution: 'Use a sparse continual-pretraining recipe: freeze most dense weights initially, train LoRA/adapters or a small unfrozen subset with 10-20% of the original peak LR, and mix medical data with a replay buffer of general data. Evaluate concurrently on medical and general benchmarks, then selectively unfreeze more layers only if medical quality plateaus without general regression. The compute win comes from avoiding dense backward and optimizer updates for most of the 70B base model: dense training is roughly 6P FLOPs/token, while frozen-base adapter or 1-5% sparse updates are closer to 2.0-2.2P FLOPs/token plus adapter overhead, with much lower optimizer memory. Full dense continual pre-training is possible, but it has the highest forgetting risk and highest compute cost.'
  common_mistake: |
    **The Pitfall:** Continuing training on medical data at the original pre-training learning rate.
    **The Rationale:** Candidates often treat continual pre-training exactly like initial pre-training.
    **The Consequence:** Catastrophic forgetting occurs, rapidly overwriting the model's general knowledge with domain-specific patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B base model, 100B medical tokens.
    - Dense full-model training baseline: ~6 FLOPs per parameter-token.
    - Frozen-base adapter or sparse update recipe still pays the dense forward pass, about ~2 FLOPs per parameter-token, but avoids most dense-weight backward and optimizer updates.
    - Illustrative sparse update fraction: 5% of base parameters, approximated as 2P forward + 4 * 0.05P trainable backward/update = 2.2P FLOPs/token.
    - 64 H100 GPUs, 989 TFLOPS peak each, 40% MFU. Cost is $3 per GPU-hour.

    **Calculations:**
    - Dense baseline: 6 * 70B params * 100B tokens = 4.2e22 FLOPs.
    - 5% sparse/adapters estimate: 2.2 * 70B params * 100B tokens = 1.54e22 FLOPs, about 37% of dense compute.
    - Throughput: 64 * 989 TFLOPS * 0.40 = 25.3 PFLOPS.
    - Dense time: 4.2e22 / 2.53e16 = 1.66e6 seconds = ~19 days; rental cost ~= 19 * 24 * 64 * $3 = ~$88K.
    - Sparse/adapters time: 1.54e22 / 2.53e16 = 6.09e5 seconds = ~7 days; rental cost ~= 7 * 24 * 64 * $3 = ~$32K.

    **Conclusion & Interpretation:**
    - **Result: Adapter/Sparse Updates Reduce Compute and Forgetting Risk.** A sparse or adapter recipe still requires a full base-model forward pass, but can cut training compute by roughly 2-3x versus dense continual pre-training while reducing optimizer memory and limiting destructive updates to general capabilities.
