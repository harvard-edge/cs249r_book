title: Sparse Continual Pre-Training for a 70B Medical LLM
scenario: Your company has a general-purpose 70B LLM that cost $4M to pre-train. You need a domain-specific medical version using 100B medical tokens, and the team wants sparse or adapter-based updates to reduce forgetting risk.
question: How would you use sparse or adapter-based continual pre-training on 100B medical tokens without benchmark regressions?
details:
  realistic_solution: 'Use a sparse continual-pretraining recipe: freeze most dense weights initially, train LoRA/adapters or a small unfrozen subset with 10-20% of the original peak LR, and mix medical data with a replay buffer of general data. Evaluate concurrently on medical and general benchmarks, then selectively unfreeze more layers only if medical quality plateaus without general regression. Full dense continual pre-training is possible, but it needs the same conservative LR, replay mix, and regression gates because it has the highest forgetting risk.'
  common_mistake: |
    **The Pitfall:** Continuing training on medical data at the original pre-training learning rate.
    **The Rationale:** Candidates often treat continual pre-training exactly like initial pre-training.
    **The Consequence:** Catastrophic forgetting occurs, rapidly overwriting the model's general knowledge with domain-specific patterns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B params, 100B tokens.
       - Training FLOPs use the standard dense-transformer estimate of ~6 FLOPs per parameter-token.
       - 64 H100 GPUs, 989 TFLOPS peak each, 40% MFU. Cost is $3 per GPU-hour.
    2. **Calculations:**
       - Total FLOPS needed: 6 × 70B params × 100B tokens = 4.2e22 FLOPS.
       - Throughput: 64 × 989 TFLOPS × 0.40 = 25.3 PFLOPS.
       - Time required: 4.2e22 FLOPS / 2.53e16 FLOPS/s ≈ 1.66e6 seconds = ~19 days.
       - Cost: 19 days × 24 hours × 64 GPUs × $3/hr = ~$87,552.
    3. **Conclusion & Interpretation:**
       **Result: Continual pre-training is a large but feasible run: about 19 days and $88K in GPU rental before data, evaluation, and iteration costs. This supports using a conservative LR, replay mix, and frequent regression checks because the main risk is forgetting/general benchmark loss, not just raw compute.**
