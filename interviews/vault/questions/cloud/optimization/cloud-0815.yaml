title: The Model Distillation Economics
scenario: We are spending $180,000/month serving a 70B model on 8x H100 GPUs in one production region. An engineer proposes distilling it into a 7B student model that can handle the same workload on a single A10G ($0.75/hr), plus about $2,000/month of serving overhead. The distillation job itself will require 2 weeks on 32x A100 GPUs.
question: Should we do the 2-week 32x A100 distillation to replace the $180k/month 70B service with a 7B A10G student?
details:
  realistic_solution: 'Distillation is a capital investment with a payback period. The 2-week 32x A100 job costs about $23.7k, while the student costs about $2.5k/month to serve versus $180k/month today, so the compute payback is under one week if quality is acceptable. The decision then hinges on quality loss and update cadence: this is attractive for a stable teacher, but repeated teacher updates can erase the savings if each update requires another full distillation cycle.'
  common_mistake: |
    **The Pitfall:** Thinking that a 10x smaller model means 10x cheaper serving and is obviously worth it.
    **The Rationale:** Ignoring the upfront distillation cost, quality regression, and ongoing retraining costs.
    **The Consequence:** Wasting expensive A100 compute on a distillation process that may not pay off if the model changes frequently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Distillation: 32x A100, 14 days, $2.20/hr.
    - Current serving (70B): $180,000/month.
    - Student serving (7B): 1x A10G, $0.75/hr, plus ~$2,000/month serving overhead.
    - Teacher update cadence is not specified, so treat re-distillation as a sensitivity rather than a fixed annual cost.

    **Calculations:**
    - Distillation Cost: 32 * $2.20 * 24 * 14 = $23,654.
    - Student Serving: 1 * $0.75 * 730 + $2,000 = $2,548/month.
    - Monthly Savings: $180,000 - $2,548 = $177,452/month.
    - Payback period: $23,654 / $177,452 = 0.13 months, or about 4 days.
    - Annual savings before any re-distillation: $177,452 * 12 - $23,654 = ~$2.11M.
    - Each additional full re-distillation costs another ~$23.7k, so frequent teacher updates should be evaluated explicitly.

    **Conclusion & Interpretation:**
    - **Result: ~$2.11M first-year savings before extra re-distillation (Update-Cadence-Bound).**
