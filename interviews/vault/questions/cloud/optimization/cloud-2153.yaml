title: The Activation Checkpointing Tradeoff
scenario: You are training a 30B model and cannot fit a single sample through the forward+backward pass due to activation memory. Your colleague suggests activation checkpointing (gradient checkpointing).
question: What is the memory-compute tradeoff, and how do you decide which layers to checkpoint?
details:
  realistic_solution: 'Activation checkpointing discards selected intermediate activations during the forward pass and recomputes them during backward. The exact memory savings depend on the checkpoint schedule and layer structure: checkpointing every transformer block stores only block boundaries, while more aggressive schemes store fewer activations but recompute more work. Selective checkpointing is usually best: checkpoint the memory-expensive attention and MLP activations while keeping cheap operations such as LayerNorm and residual adds. For a 30B transformer with 48 layers and ~60 GB of uncheckpointed activations, a practical schedule should target enough savings to fit the GPU while measuring recompute overhead, commonly on the order of tens of percent rather than a universal constant.'
  common_mistake: |
    **The Pitfall:** Thinking activation checkpointing is free, or that it always saves exactly sqrt(N) memory.
    **The Rationale:** Candidates fail to realize that checkpointing trades memory for a full extra forward pass compute cost, and its efficiency depends on the checkpointing strategy.
    **The Consequence:** Unnecessarily slowing down training by 33% by checkpointing cheap layers, or still OOMing by not checkpointing enough.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B transformer with 48 layers.
       - Activation memory without checkpointing: 48 layers * ~1.25 GB/layer = ~60 GB.
       - Recompute overhead depends on how many forward activations are discarded.
    2. **Calculations:**
       - No checkpointing stores roughly all 48 layer activations: ~60 GB.
       - Checkpointing block outputs stores far fewer large intermediates and recomputes discarded attention/MLP activations during backward.
       - If most of the forward activations are recomputed once, the upper-bound overhead is about one extra forward pass; since training is roughly forward + backward, this is commonly around 25-35% depending on the model.
       - Selective checkpointing should be chosen by profiling memory saved per recomputed FLOP, not by assuming a universal sqrt(L) memory formula.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Compute Bound.** Checkpoint the highest-activation-cost layers until the run fits, then stop; exact GB saved and slowdown must be measured for the chosen schedule.
