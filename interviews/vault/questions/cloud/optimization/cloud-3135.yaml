title: PagedAttention Memory Fragmentation
scenario: You serve a 70B model with tensor parallelism. Without PagedAttention, KV cache is pre-allocated for max_seq_len=4096, but the average actual length is 512. The system must support 256 concurrent requests.
question: How much KV-cache VRAM is wasted per GPU by preallocating 4096 tokens when the average length is 512, and how does PagedAttention eliminate it?
details:
  realistic_solution: |
    Assuming the tensor-parallel shard owns 8 KV heads per GPU, the preallocated KV cache per request per GPU is 80 layers x 2 (K+V) x 8 heads x 128 dim x 4096 tokens x 2B = 1.25 GiB. For the stated 256 concurrent requests, preallocation reserves 256 x 1.25 GiB = 320 GiB per GPU. At the average actual length of 512 tokens, useful KV cache is one eighth of that, or 0.156 GiB per request and 40 GiB per GPU for 256 requests. The waste is therefore about 1.09 GiB/request, or 280 GiB per GPU across 256 requests. PagedAttention eliminates this padding waste by allocating KV blocks on demand and mapping logical token positions through a block table, so memory tracks actual generated tokens plus small block-level slack rather than max_seq_len for every request.
  common_mistake: |
    **The Pitfall:** Assuming pre-allocation memory waste is modest and can be brute-forced with more hardware.
    **The Rationale:** Standard PyTorch/Transformers implementations historically pad to max length, making developers blind to the true cost of variable-length generations.
    **The Consequence:** Wasting up to 87.5% of KV cache memory, causing capacity planning to fail even when the actual live tokens would fit.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers, 8 KV heads/GPU, 128 dim, FP16 (2 bytes).
    - Pre-allocation max length: 4096 tokens.
    - Average actual length: 512 tokens.

    **Calculations:**
    - Pre-allocation per request per GPU: 80 * 2 * 8 * 128 * 4096 * 2 bytes = 1.25 GiB.
    - Pre-allocation for 256 requests: 256 * 1.25 GiB = 320 GiB per GPU.
    - Actual average usage per request: 1.25 GiB * (512 / 4096) = 0.156 GiB = 160 MiB.
    - Actual usage for 256 requests: 256 * 0.156 GiB = 40 GiB per GPU.
    - Wasted memory: 320 GiB - 40 GiB = 280 GiB per GPU, or 87.5% of the preallocated KV cache.
    - PagedAttention: allocate blocks for actual tokens, reducing the reservation toward 40 GiB per GPU plus block slack.

    **Conclusion & Interpretation:**
    - **Result: Memory-Fragmentation-Bound.** Preallocation wastes about 280 GiB per GPU for the stated 256 requests; PagedAttention removes the max-length padding waste with demand-allocated KV blocks.
