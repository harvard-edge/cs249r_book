title: Understanding why torch.compile retraces after dynamic batch size changes
scenario: A team trains a model on an accelerator (312 TFLOPS, 2TB/s) with variable batch sizes from a data loader that pads batches differently each step. After enabling `torch.compile`, they notice periodic 3-5 second stalls every few hundred steps, during which GPU utilization drops to 0%.
question: What causes the 3-5 second torch.compile stalls with variable padded batch sizes, and how would you eliminate them?
details:
  realistic_solution: The stalls are caused by TorchDynamo/Inductor missing the compiled graph cache and synchronously tracing or compiling a new variant. Novel padded shapes are a common trigger, and graph breaks or shape-specialized guards can make the problem worse. The most reliable fix is to bucket or pad batches into a small set of fixed shapes and warm up those buckets before measuring. Dynamic-shape or shape-polymorphic compilation can help on supported PyTorch versions and model patterns, but it should be treated as an option to validate rather than a single guaranteed flag.
  common_mistake: |
    **The Pitfall:** Assuming `torch.compile` is a "free" JIT that universally handles dynamic Python logic seamlessly.
    **The Rationale:** Engineers miss that novel padded shapes can miss the graph cache or trigger graph breaks, forcing TorchDynamo and Inductor to trace and compile a new variant synchronously.
    **The Consequence:** GPU work pauses during those cache misses, so utilization drops to zero until the host-side compile finishes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stalls occur every few hundred steps.
    - Each stall takes about 3-5 seconds.
    - Total training run: 10,000 steps.
    - Base step time: 50 ms.

    **Calculations:**
    - If "every few hundred" is roughly every 200-400 steps, recompiles are about 10,000 / 400 to 10,000 / 200 = 25-50.
    - Compile overhead range: 25-50 stalls * 3-5 seconds = 75-250 seconds.
    - Baseline training time: 10,000 × 0.05 seconds = 500 seconds.
    - Overhead fraction range: 75/500 to 250/500 = 15%-50%, depending on distinct shapes and compile duration.

    **Conclusion & Interpretation:**
    - **Result: Host compile stalls.** Shape bucketing and warmup can cap the number of compiled variants; dynamic-shape compilation may reduce retraces when the target PyTorch version and model support it.
