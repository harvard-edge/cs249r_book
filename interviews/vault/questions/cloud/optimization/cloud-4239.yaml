title: Understanding why torch.compile retraces after dynamic batch size changes
scenario: A team trains a model on an accelerator (312 TFLOPS, 2TB/s) with variable batch sizes from a data loader that pads batches differently each step. After enabling `torch.compile`, they notice periodic 3-5 second stalls every few hundred steps, during which GPU utilization drops to 0%.
question: What causes the 3-5 second torch.compile stalls with variable padded batch sizes, and how would you eliminate them?
details:
  realistic_solution: The stalls are caused by TorchDynamo recompiling the computation graph. `torch.compile` defaults to static shapes; every time the data loader yields a novel padded batch size, it triggers a cache miss and forces a synchronous re-tracing and recompilation of the execution graph via Triton/Inductor. Fix this by explicitly setting `torch.compile(model, dynamic=True)` to generate shape-agnostic symbolic kernels, or deliberately bucket/pad the data loader into 2-3 discrete fixed sizes to cap the total number of compilations.
  common_mistake: |
    **The Pitfall:** Assuming `torch.compile` is a "free" JIT that universally handles dynamic Python logic seamlessly.
    **The Rationale:** Engineers miss that novel padded shapes can miss the graph cache or trigger graph breaks, forcing TorchDynamo and Inductor to trace and compile a new variant synchronously.
    **The Consequence:** GPU work pauses during those cache misses, so utilization drops to zero until the host-side compile finishes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stalls occur about every 250 steps, consistent with "every few hundred steps."
    - Each stall is a novel padded shape that takes 4 seconds to compile.
    - Total training run: 10,000 steps.
    - Base step time: 50 ms.

    **Calculations:**
    - Approximate recompiles: 10,000 / 250 = 40.
    - Compile overhead: 40 × 4 seconds = 160 seconds.
    - Baseline training time: 10,000 × 0.05 seconds = 500 seconds.
    - Overhead fraction: 160 / 500 = 32%.

    **Conclusion & Interpretation:**
    - **Result: Host compile stalls.** Shape bucketing or dynamic shapes can remove roughly minutes of synchronous compile overhead in this run; the exact percentage depends on how many distinct padded shapes are encountered.
