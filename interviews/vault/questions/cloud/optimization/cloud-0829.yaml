title: The Flash Attention Memory Cliff
scenario: You are serving a model with 32 attention heads and sequence length 8192 in FP16.
question: How much HBM does standard attention need to materialize the attention-probability matrix, versus the extra score-tile workspace FlashAttention-2 needs when using 128-token tiles?
details:
  realistic_solution: 'Standard attention materializes a full sequence-by-sequence attention matrix for each head: 32 * 8192 * 8192 FP16 elements, or 4.29 GB (4.00 GiB). FlashAttention-2 does not write that matrix to HBM; with 128-token score tiles, the extra score workspace is roughly 32 * 128 * 128 FP16 elements, about 1 MiB, plus small Q/K/V/O tiles whose size depends on head dimension. The key comparison is materialized quadratic HBM storage versus tiled streaming workspace.'
  common_mistake: |
    **The Pitfall:** Believing FlashAttention is purely a computation speedup trick.
    **The Rationale:** Candidates often focus on the "Flash" naming and ignore that the primary bottleneck in standard attention is memory bandwidth and HBM capacity.
    **The Consequence:** Engineers fail to apply SRAM tiling concepts to other memory-bound custom kernels.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 heads, sequence length 8192, FP16 (2 bytes).
    - Compare the materialized standard-attention probability matrix to FlashAttention-2's extra score-tile workspace.
    - FlashAttention score tile size: 128 x 128 tokens per head.

    **Calculations:**
    - Standard Attention Matrix: 32 * 8192 * 8192 * 2 bytes = 4,294,967,296 bytes = 4.29 GB = 4.00 GiB.
    - FlashAttention Score-Tile Workspace: 32 * 128 * 128 * 2 bytes = 1,048,576 bytes = 1.0 MiB.
    - Q/K/V/O tile storage also exists, but it depends on head dimension, which the prompt does not specify.

    **Conclusion & Interpretation:**
    - **Result: 4.29 GB materialized matrix vs ~1 MiB score-tile workspace (Memory Capacity)**. The exact full kernel workspace depends on head dimension, but FlashAttention avoids writing the quadratic attention matrix to HBM.
