title: The Flash Attention Memory Cliff
scenario: You are serving a model with 32 attention heads and sequence length 8192 in FP16.
question: 'How much memory does standard attention need for the attention matrix versus FlashAttention-2''s working memory?'
details:
  realistic_solution: 'Standard attention materializes a full N x N matrix per head in HBM, which scales quadratically. FlashAttention-2 tiles the computation in SRAM and never writes the full matrix to HBM, reducing working memory significantly and avoiding the OOM cliff.'
  common_mistake: |
    **The Pitfall:** Believing FlashAttention is purely a computation speedup trick.
    **The Rationale:** Candidates often focus on the "Flash" naming and ignore that the primary bottleneck in standard attention is memory bandwidth and HBM capacity.
    **The Consequence:** Engineers fail to apply SRAM tiling concepts to other memory-bound custom kernels.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 heads, sequence length 8192, FP16 (2 bytes).
    - FlashAttention tile size 128.

    **Calculations:**
    - Standard Attention: 32 * 8192 * 8192 * 2 bytes = ~4.29 GB.
    - FlashAttention Working Memory: 32 * 8192 * 128 * 2 bytes * 3 (Q,K,V tiles) = ~0.20 GB.

    **Conclusion & Interpretation:**
    - **Result: ~21x Memory Reduction (Memory Capacity)**. Standard attention is severely memory-capacity bound, whereas FlashAttention heavily reduces HBM footprint via SRAM tiling.
