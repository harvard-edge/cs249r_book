title: The Power Measurement Trap
scenario: Your team measures inference power consumption by reading nvidia-smi power draw during a 60-second benchmark run. They report 350W average for an H100 running Llama-70B inference. The data center team uses this to plan cooling capacity for a 1,000-GPU deployment. Three months after deployment, the cooling system is overwhelmed during peak load.
question: What went wrong with the power measurement methodology?
details:
  realistic_solution: 'Diagnose that nvidia-smi averages mask sub-second prefill bursts and ignore system-level overheads. Employ external power analyzers (e.g., Yokogawa WT310E) at the wall with high-frequency sampling (>=1 kHz) to capture sustained peak power over rolling 10-second windows.'
  common_mistake: |
    **The Pitfall:** Trusting `nvidia-smi` as an accurate power measurement tool and using average power for capacity planning.
    **The Rationale:** Candidates assume software-reported average GPU power represents the true thermal load of the system.
    **The Consequence:** They miss sub-second power spikes, ignore system-level overhead, and under-provision cooling for sustained peak loads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Measured GPU power: 350W average. 1,000 GPUs.
    - System overhead multiplier is ~1.4x (CPU, networking, fans).
    - Peak sustained multiplier (due to prefill bursts) is ~1.5x over rolling 10s windows.

    **Calculations:**
    - Planned cooling: 350W * 1,000 = 350 kW.
    - Actual average system power: 350W * 1.4 = 490W.
    - Actual sustained peak power: 490W * 1.5 = 735W.
    - Total actual peak load: 735W * 1,000 = 735 kW (2.1x the planned capacity).
    - Deficit: 735 kW - 350 kW = 385 kW.

    **Conclusion & Interpretation:**
    - **Result: 385 kW cooling deficit (Thermal-Bound)**. Due to unmeasured sustained peak loads and system overheads.
  options:
  - 'The measurement estimated 350 kW, but thermal mass smoothing reduces the actual required cooling to 200 kW.'
  - 'The measurement accurately captured 350 kW of GPU power, requiring 350 kW of cooling.'
  - 'The measurement missed sustained prefill bursts and system overheads, severely underestimating the true peak load of 735 kW.'
  - 'The measurement incorrectly included PUE, meaning the actual required capacity is only 250 kW.'
  correct_index: 2
