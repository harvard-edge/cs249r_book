title: Evaluating Stream Overlap for H2D Transfers
scenario: 'You are optimizing a computer vision training pipeline on an NVIDIA A100 GPU. The forward and backward pass computation takes 40ms per batch. The data loader reads images, decodes them on the CPU, and transfers the 256MB batch to the GPU, taking 10ms over PCIe Gen4. Currently, the GPU stalls waiting for the next batch, resulting in a 50ms total step time.'
question: 'What speedup does overlapping the 10ms H2D transfer with 40ms compute provide, and what are the associated memory costs?'
details:
  realistic_solution: |
    Allocate pinned memory on the host for the data loader outputs and use double buffering with a dedicated CUDA stream for the H2D transfer. Use CUDA events to synchronize the compute and transfer streams safely.
  common_mistake: |
    **The Pitfall:** Assuming placing the transfer in a separate stream automatically overlaps it with compute.
    **The Rationale:** Candidates fail to realize that asynchronous DMA transfers require pinned (page-locked) host memory.
    **The Consequence:** The transfer silently defaults to synchronous execution, providing zero speedup, or causes memory overhead issues if double-buffering is forgotten.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40ms compute, 10ms H2D transfer over PCIe Gen4.
    - 256MB batch size.

    **Calculations:**
    - Sequential step time: 40ms compute + 10ms H2D = 50ms.
    - Overlapped step time: max(40ms, 10ms) = 40ms.
    - Throughput increase: 50ms / 40ms = 1.25x.
    - Pinned memory footprint: 2 buffers * 256 MB = 512 MB.

    **Conclusion & Interpretation:**
    - **Result: Overlapping provides a 25% speedup but requires 512 MB of pinned host memory. (Compute-Bound Overlap)**. Data pipelines must trade host memory to keep accelerators saturated.
