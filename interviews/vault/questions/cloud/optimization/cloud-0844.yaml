title: Diagnosing Latency Spikes after GELU Replacement
scenario: A production CPU inference fleet serves a 7B LLM optimized for dynamic activation sparsity. With ReLU, the engine skips loading downstream weights if activation is zero. After replacing ReLU with GELU, latency spikes from 75ms to 140ms, and server power draw increases 40%.
question: Why did replacing ReLU with GELU spike token latency from 75ms to 140ms and increase server power by 40%?
details:
  realistic_solution: 'GELU rarely outputs exact zeros, entirely destroying activation sparsity. The engine can no longer skip memory loads, forcing dense execution. The massive increase in DRAM reads bottlenecks bandwidth and drives up energy usage.'
  common_mistake: |
    **The Pitfall:** Attributing the latency spike purely to the arithmetic complexity of the GELU function.
    **The Rationale:** Candidates see a more complex math formula and assume compute is the bottleneck, forgetting LLM inference is memory-bound.
    **The Consequence:** Misdiagnosing the bottleneck leads to useless compute optimization instead of fixing memory traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B params = 14 GB FP16 (9.5 GB FFN, 4.5 GB Attn).
    - ReLU sparsity = 70% in FFN.
    - Bandwidth = 100 GB/s.

    **Calculations:**
    - ReLU traffic = 4.5 GB + (9.5 GB * 0.3) = 7.35 GB.
    - ReLU Latency = 7.35 GB / 100 GB/s = 73.5 ms.
    - GELU traffic (dense) = 14 GB.
    - GELU Latency = 14 GB / 100 GB/s = 140 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound (Loss of sparsity doubles DRAM reads).**
