title: Evaluating Ring Attention vs FlashAttention for 128K Context
scenario: Your team is deploying a 70B model with 128K context on 8x H100s. Option A is FlashAttention-2 on each GPU with sequence parallelism (Ulysses). Option B is Ring Attention across 8 GPUs.
question: For 128K context on 8 H100s, how do FlashAttention-2 with Ulysses and Ring Attention compare in communication, memory, and latency?
details:
  realistic_solution: |
    For one layer, one K or V tensor for one head over 128K tokens is 128K x 128 x 2B = 32 MiB. K+V for 64 heads is therefore 2 x 32 MiB x 64 = 4 GiB per layer. Ring Attention shards the sequence, so each of 8 GPUs owns 16K tokens and a 4 GiB / 8 = 512 MiB K+V block per layer. Each rank sends that block around the ring for 7 neighbor steps, for about 7 x 512 MiB = 3.5 GiB communicated per rank per layer. A 512 MiB transfer at 900 GB/s is about 0.57 ms per step; if the local attention compute per step is about 0.8 ms, much of the transfer can be hidden, but the communication is still real. Ulysses uses all-to-all style sequence/head exchanges rather than neighbor ring sends; it can have comparable byte volume but different synchronization, memory layout, and overlap behavior. Ring Attention is attractive for very long context because its communication pattern pipelines naturally with blockwise attention compute.
    Ulysses first redistributes sequence/head partitions with all-to-all collectives so each GPU can run FlashAttention-2 over its assigned heads; this is efficient when the collective is fast, but it introduces global synchronization and may materialize exchanged Q/K/V shards around the attention call. Ring Attention keeps the 16K-token sequence shard resident and streams remote K/V blocks through nearest-neighbor sends, trading simpler memory residency for 7 pipelined communication steps. For 128K context, both schemes move GiB-scale tensors per layer; the main decision is whether collective all-to-all latency or ring pipeline overlap is better on the target interconnect.
  common_mistake: |
    **The Pitfall:** Thinking Ring Attention fundamentally eliminates communication volume.
    **The Rationale:** Candidates misunderstand that Ring Attention merely shifts communication to perfectly overlap with compute.
    **The Consequence:** Failing to accurately model the required NVLink bandwidth, leading to unexpected communication stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - One K or V tensor for 128K context per head: 128K * 128 * 2 bytes = 32 MiB.
    - 64 heads, 8 GPUs.
    - NVLink transfer: 900 GB/s.
    - Sequence is split evenly: 128K / 8 = 16K tokens per GPU.

    **Calculations:**
    - Full K+V per layer across 64 heads: 2 * 32 MiB * 64 = 4 GiB.
    - Ring shard per rank: 4 GiB / 8 = 512 MiB.
    - Ring per-rank communication over 7 peer steps: 512 MiB * 7 = 3.5 GiB per layer.
    - Per-step NVLink transfer: 512 MiB / 900 GB/s = about 0.57 ms.
    - Compute per step (FlashAttention 16K x 16K): ~0.8ms.
    - Ulysses communication: all-to-all redistributes sequence/head shards before and after local FA-2, with comparable GiB-scale per-layer traffic but global collective synchronization.
    - Ulysses memory: exchanged Q/K/V shards may be materialized around the local FA-2 call; Ring memory stays closer to one resident 512 MiB local K+V shard plus streamed remote blocks.
    - Ring latency: 7 neighbor steps can pipeline 0.57 ms transfers under local block attention; Ulysses latency depends on all-to-all scheduling and is harder to hide completely.

    **Conclusion & Interpretation:**
    - **Result: Communication-Overlap Tradeoff.** Ring Attention still communicates about 3.5 GiB per rank per layer, but its 0.57 ms transfer steps can be mostly hidden under ~0.8 ms compute steps; Ulysses uses collective all-to-all exchanges with comparable memory traffic but more global synchronization.
