title: Evaluating Ring Attention vs FlashAttention for 128K Context
scenario: Your team is deploying a 70B model with 128K context on 8x H100s. Option A is FlashAttention-2 on each GPU with sequence parallelism (Ulysses). Option B is Ring Attention across 8 GPUs.
question: For 128K context on 8 H100s, how do FlashAttention-2 with Ulysses and Ring Attention compare in communication, memory, and latency?
details:
  realistic_solution: |
    For one layer, one K or V tensor for one head over 128K tokens is 128K x 128 x 2B = 32 MiB. A K+V pair for 64 heads is therefore 2 x 32 MiB x 64 = 4 GiB per layer across the full sequence and all heads. With Ring Attention sequence-sharded over 8 GPUs, each GPU owns 16K tokens, so its local K+V shard is 4 GiB / 8 = 512 MiB per layer. Each rank streams the other 7 shards around the ring, for 7 x 512 MiB = 3.5 GiB communicated per rank per layer. At 900 GB/s, a single 512 MiB neighbor transfer has a bandwidth lower bound of about 0.57 ms, before protocol overhead and contention.
    Ulysses instead uses all-to-all sequence/head redistribution so each GPU can run FlashAttention-2 on its local partition. From the stated numbers alone, both approaches move GiB-scale tensors per layer; the difference is communication structure. Ulysses pays collective synchronization and layout-exchange costs, while Ring Attention pays 7 ordered neighbor-exchange steps that may overlap with blockwise attention compute depending on the kernel and interconnect. The safer conclusion is not that one is universally lower latency, but that Ring Attention gives a pipeline-friendly communication pattern for very long contexts, while Ulysses can be preferable when all-to-all collectives are highly optimized on the target cluster.
  common_mistake: |
    **The Pitfall:** Thinking Ring Attention fundamentally eliminates communication volume.
    **The Rationale:** Candidates misunderstand that Ring Attention merely shifts communication to perfectly overlap with compute.
    **The Consequence:** Failing to accurately model the required NVLink bandwidth, leading to unexpected communication stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - One K or V tensor for 128K context per head: 128K * 128 * 2 bytes = 32 MiB.
    - 64 heads, 8 GPUs.
    - NVLink transfer: 900 GB/s.
    - Sequence is split evenly: 128K / 8 = 16K tokens per GPU.

    **Calculations:**
    - Full K+V per layer across 64 heads: 2 * 32 MiB * 64 = 4 GiB.
    - Ring shard per rank: 4 GiB / 8 = 512 MiB.
    - Ring per-rank communication over 7 peer steps: 512 MiB * 7 = 3.5 GiB per layer.
    - Per-step NVLink bandwidth lower bound: 512 MiB / 900 GB/s = about 0.57 ms before overhead.
    - Ring latency model: 7 ordered neighbor steps per layer; whether 0.57 ms/step is hidden depends on local block-attention compute and kernel overlap.
    - Ulysses communication model: all-to-all redistributes sequence/head shards before and after local FA-2; the exact byte volume and temporary buffers depend on the implementation's partition layout.
    - Memory comparison: Ring keeps one local 512 MiB K+V shard resident and streams remote shards; Ulysses may need temporary exchange buffers for redistributed Q/K/V shards, but this cannot be quantified further from the prompt.

    **Conclusion & Interpretation:**
    - **Result: Communication-Overlap Tradeoff.** Ring Attention still communicates about 3.5 GiB per rank per layer, with a 0.57 ms bandwidth lower bound per neighbor step; Ulysses uses collective all-to-all exchanges with implementation-dependent temporary memory and latency.
