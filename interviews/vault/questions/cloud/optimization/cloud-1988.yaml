title: Roofline Benchmarking of Custom Layers
scenario: You are benchmarking a custom dense retrieval model on an NVIDIA A100 GPU. During profiling, you isolate a critical custom layer that executes 500 GFLOPs of computation while reading and writing a total of 10 GB of data to HBM per forward pass.
question: What are the layer's arithmetic intensity, Roofline-limited throughput, and bound type on the A100?
details:
  realistic_solution: 'First, calculate the Arithmetic Intensity (AI) of the layer: AI = Total FLOPs / Total Bytes = 500 GFLOPs / 10 GB = 50 FLOPs/Byte. Next, determine the hardware''s ridge point, which dictates the transition from memory-bound to compute-bound: Ridge Point = Peak FLOPs / Memory Bandwidth = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte. Since the workload''s AI (50) is significantly lower than the Ridge Point (156), the layer is strictly memory-bound. The maximum achievable throughput is dictated by the memory wall: AI * Memory Bandwidth = 50 FLOPs/Byte * 2.0 TB/s = 100 TFLOPS.'
  common_mistake: |
    **The Pitfall:** Assuming the model can achieve peak TFLOPS by ignoring memory bandwidth constraints.
    **The Rationale:** Engineers incorrectly calculate AI by only accounting for read traffic instead of total memory traffic, or they completely misunderstand the Roofline model.
    **The Consequence:** Vastly overestimating the achievable throughput of memory-intensive custom layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 Peak FLOPs: 312 TFLOPS (FP16).
    - A100 Memory Bandwidth: 2.0 TB/s.
    - Layer compute: 500 GFLOPs.
    - Layer memory traffic: 10 GB.

    **Calculations:**
    - Arithmetic Intensity (AI) = 500 GFLOPs / 10 GB = 50 FLOPs/Byte.
    - Hardware Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
    - Max Throughput = min(Peak_FLOPs, AI * Mem_BW) = min(312, 50 * 2.0) = 100 TFLOPS.

    **Conclusion & Interpretation:**
    - **Result: 100 TFLOPS (Memory-Bound)**. The workload's AI (50) is significantly lower than the hardware ridge point (156), capping maximum theoretical throughput at 100 TFLOPS instead of 312.
