title: 'FlashAttention Backward Pass: The Recomputation Trade'
scenario: 'FlashAttention does not store the NxN attention matrix during the forward pass — it computes attention in SRAM tiles and discards intermediate results. During the backward pass for training, the attention matrix is needed to compute gradients.'
question: 'How does FlashAttention handle the missing attention matrix during backward, and what extra compute cost does recomputation add?'
details:
  realistic_solution: 'During the forward pass, FlashAttention stores: (1) the output O (N×d per head), and (2) the log-sum-exp (logsumexp) statistics per row (N values per head) — these are the softmax normalization constants needed for numerically stable recomputation. Total extra storage: O(N×d) instead of O(N²). During the backward pass, for each tile, FlashAttention recomputes the local attention scores S = Q_tile × K_tile^T in SRAM, applies softmax using the stored logsumexp, and computes gradients — all in SRAM without HBM writes. The recomputation costs one extra matrix multiply per tile (the Q×K^T recomputation). Total extra FLOPS: approximately equal to one forward pass worth of attention computation. For the full transformer, attention is ~1/3 of FLOPS, so the backward recomputation adds ~33% to the backward attention compute. But since FlashAttention-2 achieves 70% peak FLOPS (vs <30% for standard attention), the wall-clock time is still 2-3× faster despite the extra computation.'
  common_mistake: |
    **The Pitfall:** Thinking FlashAttention stores the attention matrix somewhere compressed or approximated.
    **The Rationale:** Candidates assume that reconstructing the exact matrix requires some form of the original data beyond just the output.
    **The Consequence:** Failing to understand that storing only the output O and row-wise log-sum-exp statistics is mathematically sufficient to exactly recompute any tile on the fly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Example dimensions: N=8192, d=128, 64 heads, 2 bytes/param.
       - FlashAttention stores only output O and logsumexp.
    2. **Calculations:**
       - Standard attention matrix memory = N^2 * 64 * 2B = 8.59 GB.
       - FlashAttention storage (O + logsumexp) = (8192 * 128 * 2B * 64) + (8192 * 4B * 64) = 134 MB + 2 MB = 136 MB.
       - Memory savings = 8.59 GB / 136 MB = ~63x.
       - Extra backward compute = 1 forward pass = 2 * N^2 * d per head.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. The extra ~33% compute is negligible compared to the massive 63x HBM capacity savings and avoidance of IO bottlenecks.
