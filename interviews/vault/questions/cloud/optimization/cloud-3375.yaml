title: Optimizing LLM Deployment with Structured Sparsity on Google TPU v5e
scenario: Your team is deploying a 25 GB LLM for real-time inference on a single TPU v5e, but it exceeds HBM capacity and exhibits unacceptable latency. Unstructured pruning reduces the model to 8 GB with minimal accuracy drop, but profiling shows negligible latency reduction due to poor systolic array utilization.
question: How would you change from unstructured to structured pruning on TPU v5e to reach 2x speedup, and what utilization gains would you target?
details:
  realistic_solution: Move from random unstructured pruning to TPU-friendly structured pruning that produces smaller dense matmuls, such as channel, head, filter, or compiler-supported block pruning. Retrain with the chosen structure and profile the resulting XLA graph to confirm the sparse model is lowered into efficient dense or block-structured execution paths on TPU v5e. A 2x wall-clock target requires roughly halving effective FLOPs while keeping achieved throughput near the dense baseline; if pruning also lowers utilization, the realized speedup will be less than 2x.
  common_mistake: |
    **The Pitfall:** Naively applying unstructured pruning without understanding the hardware's preference for dense matrix multiplication.
    **The Rationale:** It's assumed that fewer parameters automatically equals less compute and faster execution.
    **The Consequence:** Creating a "sparse but slow" model where scattered memory accesses destroy systolic array utilization, yielding no wall-clock speedup.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense model work: F FLOPs.
    - Dense achieved throughput: 19.7 TFLOPS, about 10% of peak.
    - Unstructured pruning removes 50% of mathematical FLOPs but lowers effective throughput because the pattern does not map well to TPU systolic execution.

    **Calculations:**
    - Dense time = F / 19.7T.
    - If unstructured pruning halves FLOPs but achieved throughput falls to 9.85 TFLOPS, time = 0.5F / 9.85T = F / 19.7T, so speedup is about 1x.
    - For a 2x target after halving effective FLOPs, structured pruning must keep achieved throughput near 19.7 TFLOPS: time = 0.5F / 19.7T = 0.5 × dense time.
    - If structured pruning achieves only 15 TFLOPS, speedup = (F / 19.7T) / (0.5F / 15T) = 1.52x, not 2x.

    **Conclusion & Interpretation:**
    - **Result: Hardware-friendly structured pruning is required.** Target a 50% reduction in effective dense work while preserving approximately the original achieved TPU throughput; otherwise the speedup scales down with the utilization loss.
