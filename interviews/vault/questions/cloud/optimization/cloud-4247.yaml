title: Understanding the autograd graph lifecycle and preventing memory leaks
scenario: A junior engineer runs a training loop on A100 (80GB) and observes GPU memory growing by ~200MB per step. After 400 steps the process crashes with OOM. The loss is computed correctly and backward() is called each step. The engineer cannot identify the leak.
question: What is the most likely cause of the ~200 MB per-step GPU memory growth, and how would you fix it?
details:
  realistic_solution: Always detach tensors before storing for logging by using `losses.append(loss.item())` or `losses.append(loss.detach().cpu())`. The fundamental rule of PyTorch autograd is that once `backward()` is called, the graph is freed. If you store a tensor before `backward()`, you keep the entire computational graph alive in memory.
  common_mistake: |
    **The Pitfall:** Storing references to loss tensors directly without calling `.item()` or `.detach()`.
    **The Rationale:** Naturally treating PyTorch tensors like standard Python floats in logging lists.
    **The Consequence:** Each appended loss tensor preserves a reference to the entire computational graph for that step, completely breaking garbage collection and causing catastrophic OOM crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Graph Size: ~4GB of activation nodes per forward pass.
       - Steps to failure: 400.
    2. **Calculations:**
       - Cumulative Reference Size: 400 steps * 4 GB = 1.6 TB of un-collectable memory.
    3. **Conclusion & Interpretation:**
       - **Result: Graph Reference Leak.** The actual peak memory bounds rapidly exceed the 80GB HBM limit because the garbage collector cannot evict the massive computation graphs tied to the tiny scalar loss logs.
