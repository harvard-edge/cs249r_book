title: Understanding the autograd graph lifecycle and preventing memory leaks
scenario: A junior engineer runs a training loop on A100 (80GB) and observes GPU memory growing by ~200MB per step. After 400 steps the process crashes with OOM. The loss is computed correctly and backward() is called each step. The engineer cannot identify the leak.
question: What is the most likely cause of the ~200 MB per-step GPU memory growth, and how would you fix it?
details:
  realistic_solution: 'Always detach tensors before storing them for logging: use `losses.append(loss.item())` for scalar logs, or `losses.append(loss.detach().cpu())` if a tensor must be kept. By default, backward frees saved tensors needed for gradient computation, but any live reference to a tensor with grad history can keep parts of the graph reachable. Storing the loss tensor itself each step is enough to retain graph memory and cause the observed growth.'
  common_mistake: |
    **The Pitfall:** Storing references to loss tensors directly without calling `.item()` or `.detach()`.
    **The Rationale:** Naturally treating PyTorch tensors like standard Python floats in logging lists.
    **The Consequence:** Each appended loss tensor can preserve references into that step's computation graph, preventing autograd memory from being released and eventually causing OOM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Observed memory growth: about 200MB per step.
    - Steps to failure: 400.
    - Device memory: 80GB.

    **Calculations:**
    - Retained memory after 400 steps: 400 × 200MB = 80,000MB, or about 80GB.
    - That is enough by itself to exhaust an 80GB GPU, before accounting for normal model, optimizer, and activation memory.

    **Conclusion & Interpretation:**
    - **Result: Graph reference leak.** The observed 200MB/step growth is consistent with retaining tensors that still point into each step's autograd graph; detached scalar logging removes that retained memory.
