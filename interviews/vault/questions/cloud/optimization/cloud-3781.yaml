title: 'IO-Awareness: Roofline Model for Attention Kernels'
scenario: 'You are analyzing the arithmetic intensity (FLOPS/byte) of standard attention on an H100 GPU to understand why it is memory-bound despite massive matrix multiplications.'
question: 'Why is standard attention memory-bound on an H100, what arithmetic intensity is needed to be compute-bound, and what is standard attention''s AI?'
details:
  realistic_solution: |
    The H100's compute-to-bandwidth ratio (the 'ridge point' on the roofline) = 989 TFLOPS / 3.35 TB/s = 295 FLOPS/byte. Any kernel with arithmetic intensity < 295 is memory-bound. Standard attention per head: FLOPS = 2 x N^2 x d (QxK^T) + 2 x N^2 x d (attnxV) = 4N^2d. HBM bytes = 3Nd x 2 (read Q,K,V) + N^2 x 2 (write S) + N^2 x 2 (read S) + Nd x 2 (write O) = 8Nd + 4N^2. Arithmetic intensity = 4N^2d / (8Nd + 4N^2) = 4Nd / (8d + 4N). For N=4096, d=128: AI = 4x4096x128 / (8x128 + 4x4096) = 2,097,152 / 17,408 = 120 FLOPS/byte. This is well below the 295 ridge point — memory-bound. FlashAttention eliminates the N^2 HBM terms: bytes ≈ 8Nd. AI = 4N^2d / 8Nd = N/2 = 2048 FLOPS/byte. Far above the ridge — compute-bound.
  common_mistake: |
    **The Pitfall:** Thinking that any operation involving large matrix multiplies must be compute-bound.
    **The Rationale:** Candidates ignore that standard attention must read and write the massive N x N intermediate matrix to/from HBM.
    **The Consequence:** AI stays artificially low, and hardware compute utilization plummets.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 FLOPS/byte.
    - Sequence Length (N): 4096, Head Dimension (d): 128.

    **Calculations:**
    - Standard Attention AI: AI is roughly 120 FLOPS/byte.
    - FlashAttention AI: Eliminates NxN HBM read/writes. AI = N/2 = 2048 FLOPS/byte.

    **Conclusion & Interpretation:**
    - **Result: 120 FLOPS/byte (Memory-Bound)**. Standard attention is far below the 295 FLOPS/byte ridge point, requiring kernel fusion to become compute-bound.
