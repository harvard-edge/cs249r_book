title: 'IO-Awareness: Roofline Model for Attention Kernels'
scenario: You are analyzing the arithmetic intensity (FLOPS/byte) of standard attention on an H100 GPU to understand why it is memory-bound despite massive matrix multiplications.
question: Why is standard attention memory-bound on an H100, what arithmetic intensity is needed to be compute-bound, and what is standard attention's AI?
details:
  realistic_solution: |
    The H100's compute-to-bandwidth ratio (the 'ridge point' on the roofline) = 989 TFLOPS / 3.35 TB/s = 295 FLOPS/byte. Any kernel with arithmetic intensity < 295 is memory-bound. Standard attention per head: FLOPS = 2 x N^2 x d (QxK^T) + 2 x N^2 x d (attnxV) = 4N^2d. HBM bytes = 3Nd x 2 (read Q,K,V) + N^2 x 2 (write S) + N^2 x 2 (read S) + Nd x 2 (write O) = 8Nd + 4N^2. For N=4096, d=128: FLOPS = 8,589,934,592 and bytes = 201,326,592, so AI = 42.7 FLOPS/byte. This is well below the 295 ridge point, so standard attention is memory-bound. FlashAttention eliminates the N^2 HBM terms in this simplified model: bytes ≈ 8Nd = 4,194,304 bytes. AI = 4N^2d / 8Nd = N/2 = 2048 FLOPS/byte, far above the ridge, so the tiled kernel can become compute-bound.
  common_mistake: |
    **The Pitfall:** Thinking that any operation involving large matrix multiplies must be compute-bound.
    **The Rationale:** Candidates ignore that standard attention must read and write the massive N x N intermediate matrix to/from HBM.
    **The Consequence:** AI stays artificially low, and hardware compute utilization plummets.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 FLOPS/byte.
    - Sequence Length (N): 4096, Head Dimension (d): 128.

    **Calculations:**
    - Standard attention FLOPs: 4 * 4096^2 * 128 = 8,589,934,592.
    - Standard attention bytes: 8 * 4096 * 128 + 4 * 4096^2 = 201,326,592.
    - Standard attention AI: 8,589,934,592 / 201,326,592 = 42.7 FLOPS/byte.
    - FlashAttention bytes in the same simplified model: 8Nd = 4,194,304.
    - FlashAttention AI: 8,589,934,592 / 4,194,304 = 2048 FLOPS/byte.

    **Conclusion & Interpretation:**
    - **Result: 42.7 FLOPS/byte (Memory-Bound)**. Standard attention is far below the 295 FLOPS/byte ridge point; FlashAttention's reduced HBM traffic can move the kernel above the ridge.
