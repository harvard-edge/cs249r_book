title: Evaluating Fusion Strategies for Custom Layers
scenario: 'Your team is optimizing a custom Transformer layer. The layer includes a sequence of memory-bound operations: an element-wise activation, a custom normalization, and a masking step. Unfused, these operations process a 50MB tensor and take 150us.'
question: "Which option would you choose for the 50MB memory-bound operation chain, and how do memory traffic, latency, and engineering cost compare?"
details:
  realistic_solution: Use a JIT compiler like Triton (e.g., via torch.compile) to automatically fuse the three memory-bound operations. Unfused execution requires 300MB of HBM traffic (3 ops * 2 * 50MB), while fused execution requires only 100MB (1 read + 1 write of 50MB). At 2 TB/s HBM bandwidth, this reduces latency from 150us to 50us — a 3x speedup purely from bandwidth savings, with no custom CUDA required.
  common_mistake: |
    **The Pitfall:** Assuming a hand-written CUDA kernel is always necessary for optimal fusion performance.
    **The Rationale:** Engineers often underestimate the capabilities of modern JIT compilers like Triton and overestimate their own ability to beat them, ignoring engineering debt.
    **The Consequence:** Wasting weeks of engineering time on complex CUDA code when a simple `torch.compile` could achieve near-optimal bandwidth utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size: 50MB.
    - Unfused: 3 operations (activation, norm, masking) read and write the tensor sequentially.
    - GPU HBM bandwidth: 2 TB/s (2000 GB/s).

    **Calculations:**
    - Unfused traffic: 3 ops * 2 transfers (read+write) * 50MB = 300MB.
    - Unfused latency: 300MB / 2000GB/s = 150us.
    - Fused traffic: 1 read + 1 write * 50MB = 100MB.
    - Fused latency: 100MB / 2000GB/s = 50us.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound**. Using a JIT compiler yields a 3x speedup purely from eliminating intermediate HBM reads/writes.
