title: Multi-Query vs Grouped-Query Attention Memory Savings
scenario: A 70B model uses 64 attention heads with head_dim=128.
question: What KV-cache memory does 4096-token context require for MHA, GQA, and MQA in the 70B model, and how does this affect FlashAttention-2 tiling?
details:
  realistic_solution: 'KV cache per token per layer = num_kv_heads × head_dim × 2 (K+V) × 2 bytes (BF16). MHA (64 KV heads): 64 × 128 × 2 × 2 = 32 KB/token/layer. Total for 4096 tokens × 80 layers: 32 KB × 4096 × 80 = 10.7 GB. GQA (8 KV groups): 8 × 128 × 2 × 2 = 4 KB/token/layer. Total: 4 KB × 4096 × 80 = 1.34 GB. MQA (1 KV head): 1 × 128 × 2 × 2 = 0.5 KB/token/layer. Total: 0.5 KB × 4096 × 80 = 167 MB. For FlashAttention-2 tiling: with GQA/MQA, multiple query heads share the same K,V tiles. When processing a tile of K,V, FlashAttention can compute attention for all 8 query heads in the group simultaneously, improving data reuse. The K,V tile is loaded once from HBM but used 8× (GQA) or 64× (MQA), boosting arithmetic intensity further.'
  common_mistake: |
    **The Pitfall:** Believing that GQA or MQA reduces the number of query heads.
    **The Rationale:** Candidates see "Grouped-Query" and assume the queries themselves are collapsed or eliminated.
    **The Consequence:** They misunderstand how FlashAttention tiling works, not realizing that each query head still operates independently, merely sharing K and V tiles.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, 64 attention heads, head_dim=128, 80 layers.
    - Context: 4096 tokens. Precision: BF16 (2 bytes).

    **Calculations:**
    - MHA (64 KV heads): 64 × 128 × 2 (K,V) × 2 bytes × 4096 tokens × 80 layers = 10.7 GB.
    - GQA (8 KV heads): 8/64 × 10.7 GB = 1.34 GB (8x reduction).
    - MQA (1 KV head): 1/64 × 10.7 GB = 167 MB (64x reduction).

    **Conclusion & Interpretation:**
    - **Result: GQA takes 1.34 GB vs MHA's 10.7 GB (Memory-Capacity Bound)**.
