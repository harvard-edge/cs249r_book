title: DLRM Iteration Loop Optimization
scenario: 'Your team develops a 50GB DLRM model. The current ML workflow takes 48 hours per experiment: 12h data preprocessing (CPU), 24h training on 1xA100, and 12h offline evaluation on 500M historical records. With 10 engineers each running 3 experiments per week, iteration speed is slow and cloud compute budgets are exceeded.'
question: "How would you redesign the experiment pipeline to get iteration time under 10 hours without exceeding the current 720 A100-hours per week budget?"
details:
  realistic_solution: Architect a 3-stage optimized workflow. Move from on-the-fly CPU processing to a materialized feature store with GPU-accelerated ETL (e.g., NVTabular). Scale from 1xA100 to 4xA100 using hybrid parallelism. Implement a tiered evaluation funnel tied to experiment tracking to early-stop training if validation AUC degrades.
  common_mistake: |
    **The Pitfall:** Scaling to 8xA100s for training without addressing data prep and evaluation.
    **The Rationale:** Candidates often throw more GPUs at the training phase to reduce wall-clock time.
    **The Consequence:** The 24 hours spent in CPU-bound data preprocessing and exhaustive offline evaluation remain untouched, meaning the 10-hour target is still missed while costs skyrocket.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current budget: 10 eng * 3 exp * 24h = 720 A100-hours/week.
       - New workflow: 1h data (GPU ETL) + 7h train (4xA100) + 1.5h eval (fast-eval set) = 9.5 hours wall-clock.
    2. **Calculations:**
       - Compute per full experiment: 4xA100 * 7h = 28 A100-hours.
       - Weekly compute for 30 runs without early stopping: 30 * 28 = 840 A100-hours (exceeds budget).
       - Early stopping: Terminate bottom 30% (9 runs) after 1 hour (4 A100-hours each).
       - Final weekly compute: (21 full runs * 28h) + (9 stopped runs * 4h) = 588 + 36 = 624 A100-hours/week.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Pipeline.** Accelerating ETL and Evaluation drops wall-clock time under 10h, and combining it with early stopping keeps total compute (624h) safely under the 720h weekly budget.
