title: DLRM Iteration Loop Optimization
scenario: 'Your team develops a 50GB DLRM model. The current ML workflow takes 48 hours per experiment:
  12h data preprocessing (CPU), 24h training on 1xA100, and 12h offline evaluation on 500M historical
  records. With 10 engineers each running 3 experiments per week, iteration speed is slow and cloud compute
  budgets are exceeded.'
question: How would you redesign the experiment pipeline to get iteration time under 10 hours without
  exceeding the current 720 A100-hours per week budget?
details:
  realistic_solution: Architect a 3-stage optimized workflow. Move from on-the-fly CPU processing to a
    materialized feature store with GPU-accelerated ETL on 1xA100. Scale training from 1xA100 to 4xA100
    using hybrid parallelism, and run fast-eval on 1xA100. Implement a tiered evaluation funnel tied to
    experiment tracking to early-stop training if validation AUC degrades.
  common_mistake: '**The Pitfall:** Scaling to 8xA100s for training without addressing data prep and evaluation.

    **The Rationale:** Candidates often throw more GPUs at the training phase to reduce wall-clock time.

    **The Consequence:** The 24 hours spent in CPU-bound data preprocessing and exhaustive offline evaluation
    remain untouched, meaning the 10-hour target is still missed while costs skyrocket.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Current budget: 10 eng * 3 exp * 24h = 720 A100-hours/week.

    - New workflow: 1h data (GPU ETL) + 7h train + 1.5h eval = 9.5 hours wall-clock on 4xA100.


    **Calculations:**

    - Compute per full experiment: 4xA100 * 9.5h = 38 A100-hours.

    - Weekly compute for 30 runs without early stopping: 30 * 38 = 1140 A100-hours (exceeds budget).

    - Early stopping: Terminate bottom 30% (9 runs) after 1 hour of training (plus 1h ETL = 2h total =
    8 A100-hours each).

    - Final weekly compute: (21 full runs * 38h) + (9 stopped runs * 8h) = 798 + 72 = 870 A100-hours/week.
    Wait, still exceeds. Let''s optimize to 1xA100 for ETL/eval and 4xA100 for training.

    - Let''s say: 1h ETL (1xA100) + 7h train (4xA100) + 1.5h eval (1xA100).

    - Compute per run: 1 + 28 + 1.5 = 30.5 A100-hours.

    - 30 runs = 915 A100-hours.

    - Early stop 9 runs after ETL (1h) + 1h train (4h) = 5 A100-hours.

    - Compute = 21 * 30.5 + 9 * 5 = 640.5 + 45 = 685.5 A100-hours.


    **Conclusion & Interpretation:**

    - **Result: Compute-Bound Pipeline.** By running ETL and Eval on 1xA100 and Training on 4xA100, combined
    with early stopping, total compute (685.5h) stays safely under the 720h weekly budget.

    '
