title: DLRM Iteration Loop Optimization
scenario: 'Your team develops a 50GB DLRM model. The current ML workflow takes 48 hours per experiment: 12h data preprocessing (CPU), 24h training on 1xA100, and 12h offline evaluation on 500M historical records. With 10 engineers each running 3 experiments per week, iteration speed is slow and cloud compute budgets are exceeded.'
question: How would you redesign the experiment pipeline to get iteration time under 10 hours without exceeding the current 720 A100-hours per week budget?
details:
  realistic_solution: Architect a 3-stage optimized workflow that attacks all three parts of the 48-hour baseline. Move the 12h CPU preprocessing path to a materialized feature store with incremental GPU-accelerated ETL on 1xA100. Scale the 24h single-GPU training phase to 4xA100 with hybrid parallelism and checkpoint-aware experiment tracking. Replace the 12h exhaustive offline evaluation with a fast-eval funnel on 1xA100, then run full historical evaluation only for promoted candidates. Add early stopping after the first validation window so weak experiments stop before consuming the full 4-GPU training budget.
  common_mistake: |
    **The Pitfall:** Scaling to 8xA100s for training without addressing data prep and evaluation.
    **The Rationale:** Candidates often throw more GPUs at the training phase to reduce wall-clock time.
    **The Consequence:** The 24 hours spent in CPU-bound data preprocessing and exhaustive offline evaluation remain untouched, meaning the 10-hour target is still missed while costs skyrocket.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current experiment load: 10 engineers * 3 experiments/week = 30 experiments/week.
    - Current GPU budget comes from the training phase: 30 experiments * 24h * 1 A100 = 720 A100-hours/week.
    - Current wall-clock baseline: 12h CPU preprocessing + 24h training + 12h offline evaluation = 48h.
    - New workflow uses 1xA100 for ETL/eval and 4xA100 for training.
    - Redesign target: 1h incremental ETL + 7h 4xA100 training + 1.5h fast evaluation = 9.5h.
    - Early-stop policy: stop the bottom 30% of runs after 1h ETL + 1h training.

    **Calculations:**
    - Wall-clock reduction: 48h baseline -> 9.5h redesigned full run, meeting the under-10h target.
    - Full run compute: 1h * 1 + 7h * 4 + 1.5h * 1 = 30.5 A100-hours.
    - Stopped run compute: 1h * 1 + 1h * 4 = 5 A100-hours.
    - Weekly plan: 21 full runs and 9 stopped runs.
    - Weekly compute: 21 * 30.5 + 9 * 5 = 640.5 + 45 = 685.5 A100-hours.
    - Constraint checks: 9.5h wall-clock < 10h target; 685.5 A100-hours/week <= 720 budget.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Pipeline.** A materialized feature store, 4xA100 training, 1xA100 ETL/eval, and early stopping meet both the iteration-time and weekly-budget constraints.
