title: 'MMD Penalty Overhead in Fairness Training'
scenario: 'You are training a credit scoring model on an A100 GPU and want to enforce demographic parity using an in-processing Maximum Mean Discrepancy (MMD) fairness penalty. The MMD calculation requires computing the pairwise squared Euclidean distance matrix between all sample embeddings in a mini-batch. Your mini-batch size is N=8192 and the embedding dimension is D=512.'
question: 'How much FP32 memory and how many FLOPs does the 8192x8192 MMD distance matrix add per batch?'
details:
  realistic_solution: 'Using the algebraic expansion ||x_i - x_j||^2 = ||x_i||^2 + ||x_j||^2 - 2(x_i)(x_j)^T, the computation is dominated by the matrix multiplication XX^T, requiring 2*N^2*D FLOPs. The memory for the N x N FP32 matrix scales quadratically. This O(N^2) complexity bottlenecks large-batch training, often requiring kernel approximations or sub-sampling for the fairness penalty.'
  common_mistake: |
    **The Pitfall:** Treating fairness penalties identically to standard BCE losses.
    **The Rationale:** Candidates assume the fairness penalty only adds a negligible \mathcal{O}(N) computation and memory overhead without checking the mathematical formulation of MMD.
    **The Consequence:** The pairwise \mathcal{O}(N^2) operations completely bottleneck the training loop and consume unexpectedly massive amounts of VRAM, halting production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mini-batch size (N) = 8192
    - Embedding dimension (D) = 512
    - Precision = FP32 (4 bytes)

    **Calculations:**
    - Memory for Matrix = N^2 * 4 bytes = 8192^2 * 4 = 268,435,456 bytes (~268 MB)
    - Compute for Distance (XX^T) = 2 * N^2 * D = 2 * 8192^2 * 512 = ~68.7 GFLOPs

    **Conclusion & Interpretation:**
    - **Result: ~68.7 GFLOPs (Compute-Bound)**. The \mathcal{O}(N^2) complexity creates a severe computational bottleneck for large-batch training.
