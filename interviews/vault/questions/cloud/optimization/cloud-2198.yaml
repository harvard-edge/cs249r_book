title: The Benchmark Gaming Red Flags
scenario: A hardware vendor claims their new accelerator achieves 2x higher MLPerf Training throughput than the competition on ResNet-50. You notice their submission uses a batch size of 128K with a custom learning rate schedule, and they report 'time to quality' at 75.9% top-1 accuracy (the MLPerf threshold is 75.9%).
question: What benchmark gaming techniques should you suspect, and how does MLPerf's compliance framework attempt to prevent them?
details:
  realistic_solution: 'Three gaming red flags: (1) Accuracy cliff-hanging: stopping as soon as the run reaches the required 75.9% MLPerf ResNet-50 target can optimize the benchmark timer rather than provide a margin above the target. This can be benchmark-valid, but it should not be confused with a broader production quality claim. (2) Unrealistic batch size: 128K batch is feasible only on very large clusters and requires careful batch-size/LR scaling that may not transfer to smaller production runs. (3) Hyperparameter overfitting: the custom LR schedule may be tuned specifically for the benchmark target and validation behavior. MLPerf does not ban all tuning; in closed division it constrains the benchmark problem, model, dataset, optimizer family, quality target, allowed implementation changes, logging, auditing, and submission rules, while open division reports larger deviations separately. The compliance framework prevents hidden gaming by standardizing what must be trained and measured,
    requiring submitter logs and review, and separating results whose methods are not comparable.'
  common_mistake: |
    **The Pitfall:** Taking benchmark numbers at face value because they are labeled "MLPerf".
    **The Rationale:** Candidates assume standard benchmarks map 1-to-1 to production utility, without realizing the intense hyperparameter optimizations vendors employ just to pass the threshold.
    **The Consequence:** Purchasing expensive hardware that looks great on paper but fails to converge correctly under real-world training conditions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Scaling extreme: 128K batch size is 32x larger than a 4K batch.
    - Larger batches reduce steps per epoch but usually require LR scaling, warmup, and optimizer tuning to preserve accuracy.

    **Calculations:**
    - A 128K batch can make synchronization overhead a smaller fraction of each step because each step contains much more local work.
    - The benchmark metric is time to reach the fixed 75.9% target, so tuning for the earliest threshold crossing can differ from tuning for robustness or accuracy margin.
    - Closed-division compliance narrows the benchmark definition, requires auditable run logs and rule-conforming submissions, and separates open-division deviations, but it does not prove the chosen batch size and LR schedule are production-optimal.

    **Conclusion & Interpretation:**
    - **Conclusion: Treat the 128K batch and custom LR schedule as benchmark-specific tuning signals.** They may be compliant, but the result should be evaluated separately from production convergence and generalization needs.
  options:
    - The red flags are valid benchmark-specific optimizations, but MLPerf compliance means the result is automatically representative of production training cost and convergence behavior.
    - 'Three gaming red flags: accuracy cliff-hanging, unrealistic 128K batch size, and hyperparameter overfitting with a custom LR schedule. MLPerf compliance mitigates this by defining closed-division benchmark rules for the model, dataset, optimizer family, quality target, and reporting requirements while separating open-division submissions.'
    - The main red flag is the custom learning-rate schedule; MLPerf compliance primarily solves this by banning schedule tuning and requiring vendors to use one reference hyperparameter file.
    - The main issue is that the submission belongs in open division, because closed division allows no batch-size scaling or implementation tuning beyond the reference system.
