title: Mitigating the Learnability Gap in Massive MLPs
scenario: Your team is training a massive Multi-Layer Perceptron (MLP) to approximate a complex fluid dynamics simulation. Based on the Universal Approximation Theorem, they scaled the hidden layers to 500 million parameters. However, after 100 epochs on a high-fidelity dataset of 50,000 simulation frames, the model achieves near-zero training error but fails catastrophically on validation data.
question: "Should the team double the MLP to 1B parameters, or use structural inductive biases to close the learnability gap?"
details:
  realistic_solution: 'Reject doubling the parameters. Instead, close the learnability gap by injecting structural inductive biases (e.g., using a 5M parameter 3D CNN or Graph Neural Network). This restricts the search space to physically plausible functions, allowing the optimizer to find a generalizable solution using the limited 50,000 samples.'
  common_mistake: |
    **The Pitfall:** Confusing theoretical representational capacity with optimizability.
    **The Rationale:** Engineers assume that if a network is "theoretically" large enough to approximate any function, it will automatically learn the correct one.
    **The Consequence:** Wasting massive compute budgets on unstructured hypothesis spaces that pure memorization inevitably overfits.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500M params, 50,000 samples.

    **Calculations:**
    - 500,000,000 / 50,000 = 10,000 parameters per sample.

    **Conclusion & Interpretation:**
    - **Result: Optimizability-Bound.** The system is massively underdetermined, causing pure memorization rather than generalization.
