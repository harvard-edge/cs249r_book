title: Evaluating JIT Compilation for Dynamic Shapes
scenario: Your team is deploying a Transformer-based NLP inference service on GPUs. The model handles highly dynamic user queries with sequence lengths ranging from 10 to 512 tokens. In eager mode, the average inference latency is 15ms per request. To meet a strict 5ms P99 latency SLA, an engineer proposes wrapping the model in a JIT compiler (e.g., `torch.compile`). However, during load testing, the service experiences severe latency spikes of up to 500ms for almost every new request.
question: How should you use JIT compilation for 10-to-512-token dynamic queries to meet the 5ms P99 SLA without 500ms recompilation spikes?
details:
  realistic_solution: Bucket and pad sequence lengths before JIT compilation, for example to 16, 32, 64, 128, 256, and 512 tokens. This limits the service to six cached compiled graphs instead of recompiling for many unique lengths. Pre-warm those six buckets before serving traffic; after warmup, requests hit cached graphs at about 4ms and can meet the 5ms P99 SLA. Without warmup, the first request in each bucket still pays a 500ms compile and violates P99.
  common_mistake: |
    **The Pitfall:** Assuming JIT compilation unconditionally speeds up inference without accounting for graph recompilation overhead.
    **The Rationale:** Failing to understand that tracing JITs recompile the graph from scratch every time a novel dynamic input shape is encountered.
    **The Consequence:** Severe P99 latency spikes (500ms+) for every unique token length, completely violating SLA constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target SLA: 5ms P99 latency.
       - Compilation Time: 500ms per unique shape.
       - Inference Time (JIT): 4ms per request.
       - Workload: 1,000 requests, potentially 500 unique lengths.
    2. **Calculations:**
       - Naive JIT Time = (500 compiles * 500ms) + (1,000 * 4ms) = 254,000ms.
       - Bucketized JIT (6 powers-of-2 buckets) = (6 compiles * 500ms) + (1,000 * 4ms) = 7,000ms.
       - If the six buckets are pre-warmed before taking production traffic, steady-state request latency is the cached JIT latency: 4ms.
       - If warmup is not done, the first request per bucket sees ~500ms + 4ms, so cold-start P99 still violates the SLA.
    3. **Conclusion & Interpretation:**
       - **Result: 4ms steady-state P99 after warmup (Compilation-Overhead-Bound).** Bucketization bounds compile count, but SLA compliance requires precompiling or otherwise shielding cold compiles from live traffic.
