title: 'FlashAttention IO Complexity vs Standard Attention'
scenario: 'Standard attention on a GPU (2 TB/s HBM bandwidth) materializes the full N x N attention matrix to HBM. You are given a sequence length N=8192, head_dim=128, and 32 heads in FP16.'
question: 'Compare the HBM IO bytes of standard attention vs FlashAttention, and estimate the wall-clock difference on a 2 TB/s GPU.'
details:
  realistic_solution: 'Standard attention materializes S = Q @ K^T, writes it, reads it back for softmax, writes softmax output, reads it for V multiply. FlashAttention never materializes S; it streams Q, K, V tiles through SRAM.'
  common_mistake: |
    **The Pitfall:** Only counting the single attention matrix write and forgetting the sequential read/write round-trips.
    **The Rationale:** It's easy to calculate the size of the N x N matrix but easy to forget the steps of the standard attention algorithm (softmax and V multiply).
    **The Consequence:** The IO penalty of standard attention is severely underestimated, hiding the true magnitude of FlashAttention's performance gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length N=8192, head_dim=128, 32 heads in FP16.
    - 2 TB/s HBM bandwidth.

    **Calculations:**
    - Standard IO: Attention matrix S is 8192 * 8192 * 2B = 128MB per head. Across 32 heads = 4GB.
    - Standard IO round-trips: Write S, read S, write P, read P = 4 trips. Total = 16GB.
    - FlashAttention IO: 3(Q,K,V) * (8192 * 128 * 2B) * 32 heads = 192MB.
    - Speedup ratio: 16GB / 192MB ≈ 83x reduction in IO.
    - Wall-clock time: Standard takes 16GB / 2TB/s = 8ms. Flash takes 192MB / 2TB/s ≈ 0.1ms.

    **Conclusion & Interpretation:**
    - **Result: 0.1ms wall-clock time (Memory-Bound)**. FlashAttention drastically reduces memory traffic leading to an 83x IO reduction.
