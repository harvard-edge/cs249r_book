title: FlashAttention IO Complexity vs Standard Attention
scenario: Standard attention on a GPU (2 TB/s HBM bandwidth) materializes the full N x N attention matrix to HBM. You are given a sequence length N=8192, head_dim=128, and 32 heads in FP16.
question: Compare the HBM IO bytes of standard attention vs FlashAttention, and estimate the wall-clock difference on a 2 TB/s GPU?
details:
  realistic_solution: |
    Standard attention materializes the N x N score matrix S and usually the softmax probability matrix P in HBM. For N=8192 and 32 FP16 heads, each materialized N x N matrix is 8192 x 8192 x 2B x 32 = about 4 GB total. Writing S, reading S, writing P, and reading P is therefore about 16 GB of HBM traffic just for the materialized attention matrices. FlashAttention avoids those N x N HBM round trips; in the ideal IO model it reads Q, K, and V and writes O, each about 64 MB across all heads, for roughly 256 MB plus tile rereads and metadata. At 2 TB/s, the materialized standard-attention traffic is about 8 ms, while the FlashAttention tensor traffic is about 0.13 ms, an IO reduction of about 64x for this simplified accounting.
  common_mistake: |
    **The Pitfall:** Only counting the single attention matrix write and forgetting the sequential read/write round-trips.
    **The Rationale:** It's easy to calculate the size of the N x N matrix but easy to forget the steps of the standard attention algorithm (softmax and V multiply).
    **The Consequence:** The IO penalty of standard attention is severely underestimated, hiding the true magnitude of FlashAttention's performance gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length N=8192, head_dim=128, 32 heads in FP16.
    - 2 TB/s HBM bandwidth.

    **Calculations:**
    - One N x N FP16 matrix per head: 8192 * 8192 * 2B = 134,217,728 bytes = 128 MiB.
    - Across 32 heads: 128 MiB * 32 = 4 GiB for S, and another 4 GiB for P.
    - Standard materialization traffic: write S + read S + write P + read P = 4 * 4 GiB = 16 GiB.
    - One Q, K, V, or O tensor across all heads: 8192 * 32 * 128 * 2B = 64 MiB.
    - FlashAttention ideal tensor traffic: read Q + read K + read V + write O = 4 * 64 MiB = 256 MiB, plus smaller metadata/tile overhead.
    - IO reduction: 16 GiB / 256 MiB = 64x.
    - Wall-clock estimate: standard 16 GB / 2 TB/s = about 8 ms; FlashAttention 256 MB / 2 TB/s = about 0.13 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-IO-Bound.** FlashAttention avoids the dominant N x N HBM round trips, reducing this simplified IO estimate from about 16 GiB to about 256 MiB.
