title: Evaluating Graph Scripting vs Tracing for Dynamic Control Flow
scenario: You are deploying an Adaptive Compute Transformer with highly data-dependent control flow (iterations vary per token). A prototype using a trace-based JIT compiler achieved 15,000 tokens/sec in benchmarks, but experiences severe latency spikes (<500 tokens/sec) and silent correctness errors in staging with variable sequence lengths.
question: Should the Adaptive Compute Transformer use trace-based JIT or graph scripting for data-dependent refinement loops, and why?
details:
  realistic_solution: Justify the switch to graph scripting. Unlike tracing, scripting parses the Python Abstract Syntax Tree (AST) to preserve actual `while`/`if` branches within the compiled Intermediate Representation (IR). This guarantees logical correctness for data-dependent loops and completely eliminates the recompilation penalty.
  common_mistake: |
    **The Pitfall:** Assuming a trace-based JIT compiler correctly captures all dynamic control flow.
    **The Rationale:** Engineers see the performance boost on static benchmarks and assume the JIT compiler inferred the loop logic.
    **The Consequence:** Tracing simply unrolls the execution path of the dummy input. In production, this causes silent logical errors on differing branches or catastrophic recompilation cascades for every unique input length.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Variable sequence lengths and dynamic `while`/`if` loops.
       - Trace JIT penalty: 500ms recompilation per cache miss.
    2. **Calculations:**
       - If tracing hits 100 unique sequence lengths per minute: Overhead = 100 * 0.5s = 50 seconds of stall time.
       - Graph scripting parses the AST, compiling dynamic control flow into the IR once (O(1) cost).
    3. **Conclusion & Interpretation:**
       - **Result: Compile-Bound.** Graph scripting must be used to preserve logical correctness and eliminate the O(N) recompilation stalls caused by tracing dynamic paths.
