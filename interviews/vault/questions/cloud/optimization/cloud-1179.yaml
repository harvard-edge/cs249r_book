title: Eager Execution Dispatch Overhead
scenario: You are profiling a dynamic Graph Neural Network (GNN) model training on a GPU using PyTorch eager mode. The model issues 50,000 small, independent matrix multiplications (shape 32x32) per forward pass due to dynamic control flow. Profiling shows that each PyTorch kernel dispatch from Python takes 4 μs, while the actual GPU execution for each 32x32 matmul takes only 0.5 μs.
question: What are the CPU dispatch time, GPU compute time, maximum GPU utilization, and best fix for the 50,000 tiny matmuls per forward pass?
details:
  realistic_solution: |
    Recognize that eager execution creates a CPU bottleneck. Resolve this by using torch.compile to trace and fuse operations into larger kernels, or using CUDA Graphs to capture the launch overhead and replay it directly on the GPU.
  common_mistake: |
    **The Pitfall:** Focusing on GPU-side optimizations like Tensor Cores or memory bandwidth.
    **The Rationale:** Candidates fail to realize that eager execution overhead from Python creates a severe CPU bottleneck for tiny operations.
    **The Consequence:** Time is wasted tuning GPU kernels while the GPU sits idle waiting for the CPU to issue commands.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50,000 ops/pass.
    - Python dispatch: 4 μs/op.
    - GPU execution: 0.5 μs/op.

    **Calculations:**
    - Dispatch Time: 50,000 × 4 μs = 200 ms.
    - Compute Time: 50,000 × 0.5 μs = 25 ms.
    - Max Utilization: 25 ms / 200 ms = 12.5%.

    **Conclusion & Interpretation:**
    - **Result: CPU-Dispatch-Bound**. With 12.5% GPU utilization, the Python CPU thread limits speed.
