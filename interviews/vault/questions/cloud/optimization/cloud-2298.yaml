title: 'RAG Pipeline Evaluation Architecture'
scenario: 'You manage the ML workflow for a RAG system consisting of document chunking, an embedding model, a Vector DB, and a GPT-4 LLM. A full experiment evaluates a 10,000-query golden dataset to measure retrieval recall and generation accuracy. Currently, each experiment takes 8 hours and costs $300 in LLM API calls. Engineers are bottlenecked when tweaking just the chunking strategy or prompts.'
question: 'How would you redesign the RAG experiment workflow to cut average iteration time below 1 hour and cost below $50 per run?'
details:
  realistic_solution: 'Architect a component-aware Directed Acyclic Graph (DAG) for experiment tracking. 1) Decouple Retrieval Evaluation from Generation Evaluation. If an engineer changes chunking/embeddings, evaluate *only* the retriever (Recall@K against golden contexts) without invoking the LLM. 2) Implement a caching layer using experiment artifact hashing. Unchanged steps (e.g., embeddings when only the prompt changes) are skipped. 3) For Generation Evaluation (prompt tweaks), introduce subset testing. Evaluate on a stratified subset of 1,000 difficult queries first (Tier 1). The full 10k dataset (Tier 2) is only triggered via CI/CD before staging deployment. 4) Execute independent API calls asynchronously to maximize throughput up to the API rate limits.'
  common_mistake: |
    **The Pitfall:** Running the full 10k query pipeline concurrently to solve the latency bottleneck.
    **The Rationale:** Engineers assume that simply throwing more concurrency at the problem solves the iteration speed issue.
    **The Consequence:** The $300 per-run API cost constraint is completely ignored, leading to massive cost overruns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 10,000 queries * $0.03 = $300 and 8 hours (0.35 QPS).
    
    **Calculations:**
    - Retriever Optimization: 0 LLM calls ($0), runs locally in 5 mins.
    - Prompt Optimization: 1k subset costs 1,000 * $0.03 = $30. At 20 QPS (async), it takes ~50 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: <10 Minutes (API-Cost-Bound)**. Assuming a 50/50 split of retriever vs. prompt experiments, average cost drops to $15 and iteration time plummets to under 10 minutes.
