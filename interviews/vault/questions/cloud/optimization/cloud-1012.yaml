title: Diagnosing Loss Spikes During Elastic Training Scaling
scenario: Your training job for a 13B parameter LLM is configured for elastic scaling on AWS EC2 P4d (8x
  A100 40GB) instances. The job starts with 16 nodes (128 GPUs). When spot instances become available,
  the orchestrator scales the cluster up to 32 nodes (256 GPUs). Immediately after scaling, the training
  loss spikes drastically and the model diverges. The optimizer is AdamW with a learning rate of 1e-4,
  and the per-GPU micro-batch size is hardcoded to 8.
question: Why did elastic scaling from 128 to 256 GPUs cause divergence, and how should you adjust per-GPU
  batch size to keep GBS constant?
details:
  realistic_solution: 'Diagnose that the effective global batch size inadvertently doubled from 1024 to
    2048 because the per-GPU batch size was hardcoded. The correct fix is to implement constant batch
    size scaling: dynamically reduce the per-GPU micro-batch size to 4 or decrease gradient accumulation
    steps proportionally so the global batch size remains exactly 1024.'
  common_mistake: '**The Pitfall:** Blaming the loss spike on external factors rather than effective batch
    size.

    **The Rationale:** Candidates often blame the loss spike on stale gradients, network congestion, or
    optimizer state corruption, failing to realize the effective batch size doubled.

    **The Consequence:** Proposing complex infrastructure fixes instead of correctly adjusting the micro-batch
    size to maintain optimization dynamics.'
  napkin_math: '**Assumptions & Constraints:**

    - Initial cluster: 128 GPUs, per-GPU micro-batch = 8.

    - Scaled cluster: 256 GPUs.

    **Calculations:**

    - Total Global Batch Size (GBS) before scaling: 128 GPUs * 8 = 1024 samples.

    - GBS after scaling (if unchanged): 256 GPUs * 8 = 2048 samples.

    - Adjusted per-GPU batch size for GBS 1024: 1024 / 256 GPUs = 4 samples per GPU.

    **Conclusion & Interpretation:**

    - **Result: 4 samples per GPU (Batch-Size-Bound)**. To maintain strict mathematical equivalence with
    a constant GBS of 1024, the per-GPU batch size must be reduced to 4.'
