title: Unstructured Sparsity Without Sparse Kernels
scenario: Your team prunes a 13B parameter LLM to 50% unstructured sparsity before fine-tuning on AWS EC2 P4d instances with A100 GPUs. The dense model trains at 120 TFLOP/s per GPU. After masking half the weights, throughput only improves to 125 TFLOP/s and memory use barely changes because the tensors remain stored in dense format.
question: Why did 50% unstructured pruning fail to speed training, and what should you change to get real sparsity benefits?
details:
  realistic_solution: The mask removed model capacity but did not change the executed kernels or tensor layout. Dense GEMM still touches the same dense matrices, so zero-valued weights consume bandwidth and FLOPs almost like ordinary weights. To get a real speedup, use a hardware-supported sparsity pattern such as 2:4 structured sparsity with compatible kernels, or switch to sparse tensor formats and kernels whose overhead is justified by the achieved sparsity.
  common_mistake: |
    **The Pitfall:** Assuming that zero weights automatically halve training compute.
    **The Rationale:** Dense GPU kernels do not skip arbitrary zero entries unless the sparsity pattern and kernel implementation explicitly support that behavior.
    **The Consequence:** The team loses accuracy or capacity from pruning while seeing little or no throughput, memory, or cost benefit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense training throughput: 120 TFLOP/s per GPU.
    - Measured masked-model throughput: 125 TFLOP/s per GPU.
    - The mask is 50% unstructured, but tensors and kernels remain dense.

    **Calculations:**
    - Ideal skip-zero speedup from perfect 50% sparsity would be about 2x.
    - Measured speedup = 125 / 120 = 1.04x, or only about 4%.
    - Because dense kernels still issue dense matrix multiplies, most FLOPs and memory traffic remain.

    **Conclusion & Interpretation:**
    - **Result: sparsity-format-bound.** Unstructured masking alone does not deliver the expected 2x gain; use supported structured sparsity or sparse kernels before counting pruning as a systems speedup.
