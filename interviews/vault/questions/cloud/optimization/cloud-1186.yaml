title: 'Calculating the Efficiency Frontier Trade-off'
scenario: 'You are mapping the efficiency frontier for a computer vision model deployed on an NVIDIA T4 GPU. The strict latency SLA is 100ms per inference batch. The baseline FP32 model has a latency profile of Latency = 10ms + 10ms * BatchSize. An optimized INT8 model has a profile of Latency = 20ms + 4ms * BatchSize but drops the mean Average Precision (mAP) by 1.5%.'
question: 'What maximum batch size and throughput does each model achieve under the 100ms SLA, and what throughput-mAP trade-off results?'
details:
  realistic_solution: 'First, solve for the maximum batch size (BS) where Latency <= 100ms for both models. For FP32: 10 + 10*BS = 100 -> BS = 9. The throughput at the SLA limit is 9 / 0.1s = 90 images/sec. For INT8: 20 + 4*BS = 100 -> BS = 20. The throughput at the SLA limit is 20 / 0.1s = 200 images/sec. The efficiency frontier trade-off demonstrates that we can gain 122% more throughput (200 vs 90 images/sec) in exchange for a 1.5% degradation in mAP.'
  common_mistake: |
    **The Pitfall:** Assuming the INT8 model is universally faster across all batch sizes.
    **The Rationale:** Focusing only on the per-item compute cost while ignoring the higher fixed overhead (20ms vs 10ms).
    **The Consequence:** Failing to calculate the intersection point where INT8 is actually slower for small batch sizes, leading to incorrect throughput estimates under strict SLA constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Strict latency SLA of 100ms.
    - FP32 latency = 10ms + 10ms * BatchSize.
    - INT8 latency = 20ms + 4ms * BatchSize.

    **Calculations:**
    - FP32 Limit: 100 = 10 + 10 * B -> B = 9. Throughput: 9 / 0.100s = 90 images/sec.
    - INT8 Limit: 100 = 20 + 4 * B -> B = 20. Throughput: 20 / 0.100s = 200 images/sec.
    - Efficiency frontier delta: 200 - 90 = +110 images/sec.

    **Conclusion & Interpretation:**
    - **Result: +122% throughput (Latency-Bound)**. The throughput increases significantly in exchange for a 1.5% drop in mAP.
