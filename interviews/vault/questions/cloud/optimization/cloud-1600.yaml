title: Diagnosing TensorRT Dynamic Shape Spikes
scenario: You are optimizing a PyTorch-based Transformer model for inference. You
  export the model to ONNX and compile it to a TensorRT engine using `trtexec` with
  dynamic axes enabled for sequence length. While latency improves for a fixed sequence
  length of 128, production traffic with varying sequence lengths (32 to 512) causes
  massive latency spikes up to 200ms and occasional OOM errors.
question: Why does the TensorRT engine spike to 200ms and OOM on sequence lengths
  32–512, and how should the dynamic shapes be configured?
details:
  realistic_solution: TensorRT requires explicit Optimization Profiles (Min, Opt,
    Max shapes) at compile time to handle dynamic axes efficiently. The fix is compiling
    the engine with explicit bounds (e.g., `--minShapes=input:1x32`, `--optShapes=input:1x128`,
    `--maxShapes=input:1x512`) to ensure proper ahead-of-time kernel selection and
    memory pre-allocation.
  common_mistake: '**The Pitfall:** Assuming TensorRT handles dynamic shapes natively
    at runtime exactly like PyTorch.

    **The Rationale:** Engineers often deploy TensorRT engines without configuring
    explicit Optimization Profiles, failing to pre-allocate memory boundaries.

    **The Consequence:** Severe latency spikes and runtime OOM errors as TensorRT
    triggers expensive memory reallocations and falls back to unoptimized kernels.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Unconfigured dynamic shapes trigger reallocation.

    - Max sequence length: 512.


    **Calculations:**

    - Latency Without Profile: >100ms (reallocation) + suboptimal kernel ≈ 200ms.

    - Latency With Max=512 Profile: Pre-allocated workspace eliminates overhead, optimal
    kernel ≈ 40ms.


    **Conclusion & Interpretation:**

    - **Result: Memory-Allocation-Bound**. Explicit shape bounds eliminate 100ms+
    reallocation spikes and prevent OOMs.

    '
