title: H100 Memory Optimization for Knowledge Distillation Logit Matching
scenario: You are tasked with distilling a 175B parameter teacher LLM into a 7B parameter student LLM for deployment on NVIDIA H100 GPUs. During logit matching, you need to capture teacher logits (vocabulary size 50,000, sequence length 2048) and store them for each training step. The student model's parameters, optimizer states, and activations consume 60GB of the HBM3.
question: What maximum batch size fits for logit matching with 20 GB free HBM3, sequence length 2048, vocab 50,000, and what logit precision would you use?
details:
  realistic_solution: With 20 GB free HBM3, FP32 teacher logits require about 390.6 MB per sequence, so the maximum physical batch is about 52 sequences. INT8 storage would require about 97.7 MB per sequence and fit about 209 sequences, but standard logit matching usually keeps logits in FP16/FP32 or recomputes the teacher to preserve probability information. I would use FP16 or BF16 logits if the loss tolerates it, reserve INT8 for calibrated cached logits after quality validation, and use gradient accumulation for larger logical batches.
  common_mistake: |
    **The Pitfall:** Attempting to store full-precision (FP32) logits for matching.
    **The Rationale:** Assuming distillation requires perfect floating-point representations of the teacher's distribution.
    **The Consequence:** Quickly exhausting the remaining 20GB of HBM3, forcing tiny batch sizes or catastrophic CPU-GPU memory thrashing that cripples the H100.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total HBM3: 80 GB. Remaining HBM3: 20 GB (20,480 MB).
    - Teacher logit dims: 50,000 vocab * 2048 seq length.

    **Calculations:**
    - Logit size per sequence (FP32): 2048 * 50,000 * 4 bytes = ~390.6 MB.
    - Max FP32 batch size: 20,480 MB / 390.6 MB = ~52 sequences.
    - Logit size per sequence (INT8): 2048 * 50,000 * 1 byte = ~97.66 MB.
    - Max INT8 cached-logit batch size: 20,480 MB / 97.66 MB = ~209 sequences.

    **Conclusion & Interpretation:**
    - **Result: 52 FP32 sequences or 209 INT8 cached sequences.** Use FP16/BF16 or recomputation by default for distillation fidelity; use INT8 only if calibration shows the loss and accuracy are preserved.
