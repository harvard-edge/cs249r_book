title: Auto-Tuning Budget vs Dynamic Batching
scenario: 'You are deploying a dense retrieval model with 100 unique MatMul shapes on L4 GPUs. Auto-tuning a single batch size takes 20 minutes. You need to support 64 dynamic batch sizes (1 to 64). Full auto-tuning takes 1280 mins. Your CI/CD enforces a 180-minute compilation budget. Eager mode yields 10ms latency, failing the 5ms SLA.'
question: 'How do you meet the 5ms latency SLA and the 180-minute compilation budget?'
details:
  realistic_solution: |
    Implement sequence bucketization in the compiler frontend. Group the 64 batch sizes into 8 buckets (e.g., 1, 2, 4, 8, 16, 32, 48, 64). Configure the auto-tuner (like TVM Ansor or XLA) to only search and compile optimized kernels for these 8 specific shapes. At runtime, pad incoming requests to the nearest bucket size. The compute overhead from padding is completely eclipsed by the speedup of running heavily optimized, auto-tuned kernels, while fitting comfortably within the CI/CD pipeline's time constraints.
  common_mistake: |
    **The Pitfall:** Falling back to eager mode or unoptimized heuristic compilation for all batch sizes.
    **The Rationale:** Engineers assume that since exhaustive tuning takes too long, tuning must be abandoned completely for dynamic shapes.
    **The Consequence:** The deployment fails the strict 5ms SLA because eager mode kernel execution overhead is too high.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full Tuning Time: 64 sizes * 20 min = 1,280 mins.
    - CI/CD Budget: 180 minutes.
    - Bucket Tuning: 8 buckets.

    **Calculations:**
    - Bucket Tuning Time: 8 * 20 min = 160 mins.
    - Latency: Exact-match is ~3ms, padding adds ~33% overhead = ~4ms average.

    **Conclusion & Interpretation:**
    - **Result: ~4ms Latency (Compute-Bound)**. Padding incoming requests to a small set of highly-tuned buckets comfortably meets both the 5ms SLA and the 180-minute pipeline budget.
