title: Diagnosing Static Preprocessing Latency
scenario: 'You are profiling a PyTorch vision pipeline deployed on a GPU via TorchScript. The model graph includes an extensive preprocessing block containing normalization operations using static parameters loaded from a configuration file, followed by deterministic affine transformations. The profiler shows these preprocessing operations consume 2.5ms out of the 15ms total inference latency.'
question: 'Why are these operations burning GPU cycles at runtime, and how do you eliminate this overhead without altering the numerical output?'
details:
  realistic_solution: 'Diagnose the issue as missing constant folding. Because the model parameters weren''t explicitly frozen, the JIT compiler treats the static configuration tensors as dynamic variables. By applying `torch.jit.freeze()` to the scripted model, the compiler aggressively constant-folds the static normalization and affine parameters into pre-computed constants at compile time, eliminating the runtime overhead.'
  common_mistake: |
    **The Pitfall:** Assuming standard TorchScript automatically optimizes out static configuration tensors.
    **The Rationale:** Engineers trust the JIT tracer to perfectly resolve all constants implicitly, not realizing that unfrozen parameters are treated as dynamic variables.
    **The Consequence:** They might write complex custom fused CUDA kernels to speed up preprocessing, wasting engineering effort on a problem solvable by simple constant folding.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15ms total inference latency.
    - 2.5ms overhead from 5 sequential operations with static tensors.

    **Calculations:**
    - Applying `torch.jit.freeze()` constant-folds the static normalization into pre-computed constants at compile time.
    - Post-folding latency drops to ~0.1ms.
    - Savings: 2.4ms.

    **Conclusion & Interpretation:**
    - **Result: 2.4ms saved (Compute-Bound)**. 2.4ms saved, representing a 16% reduction in total latency.
