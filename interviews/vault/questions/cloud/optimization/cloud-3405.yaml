title: Optimizing IO-Aware Attention on AMD MI300X for Large Sequence Models
scenario: You are tasked with deploying a large language model with extremely long sequence lengths on a GPU. Standard attention mechanisms are quickly bottlenecked by memory I/O and on-chip SRAM capacity.
question: How would you adapt FlashAttention-style tiling and online softmax to a GPU for long-sequence LLM inference?
details:
  realistic_solution: 'The solution involves a multi-pronged approach: (1) **IO-Aware Tiling:** Break the attention computation into smaller blocks (tiles) that fit within the fast on-chip SRAM. This minimizes costly transfers between HBM3 and SRAM. (2) **Online Softmax:** Instead of computing the entire attention matrix and then applying softmax, the softmax normalization factors are updated incrementally ''online''. This avoids materializing the full attention matrix in HBM3. (3) **Hardware-Specific Optimization:** The tiling strategy must be tuned to the SRAM size and HBM3 bandwidth to ensure that data fetches are efficiently pipelined and that the compute units are continuously fed, maximizing the use of the link.'
  common_mistake: |
    **The Pitfall:** Focusing primarily on the FP16 compute capacity without adequately addressing memory bandwidth and on-chip memory constraints.
    **The Rationale:** Naive attention implementations become memory-bound long before they become compute-bound, especially with large sequence lengths.
    **The Consequence:** Significant underutilization of the GPU's potential and out-of-memory errors due to materialized intermediate attention scores.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate attention scores size: N x N matrix.
    - For FP16, this is 2 * N^2 bytes.
    - Sequence length N=65536.
    - Example tile uses 256 query rows, 2048 key/value rows, head dimension d=128, FP16.
    - MI300X-class HBM3 bandwidth is about 5.3 TB/s peak; bandwidth estimates below are only for scoped tensor movement.

    **Calculations:**
    - Full attention matrix: 2 * (65536)^2 = 8,589,934,592 bytes = 8.0 GiB, or 8.59 GB decimal.
    - FlashAttention avoids storing that N^2 matrix; it streams Q, K, V tiles and keeps softmax state and accumulators on chip.
    - One K/V tile footprint is roughly 2 tensors * 2048 * 128 * 2 bytes = 1.0 MiB; a 256-row query tile adds 256 * 128 * 2 bytes = 64 KiB plus accumulator/state buffers.
    - Streaming only that 1.0 MiB K/V tile at 5.3 TB/s takes about 0.20 microseconds, but a full attention step includes many such tile reads plus output writes.

    **Conclusion & Interpretation:**
    - **Result: IO-Aware Tiling**. The win is avoiding the 8.0 GiB per-head score matrix and keeping each tile's working set SRAM-sized; the single-tile bandwidth time is illustrative, not the total attention latency.
