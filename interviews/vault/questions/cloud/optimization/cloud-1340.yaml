title: Debugging Group DRO Training Instability
scenario: A team is training a toxicity detection model on an 8-GPU cluster using a 50M sample dataset. The baseline model achieves 95% overall accuracy but exhibits a 45% false positive rate on texts mentioning minority identities, which constitute only 1.5% of the training data. To mitigate this spurious correlation, they implement Group Distributionally Robust Optimization (Group DRO) with 4 predefined groups. They maintain their global batch size of 1024. However, during training, the worst-case group loss oscillates violently and the exponentiated group weights diverge, causing training to crash.
question: "What is the root cause of this instability?"
details:
  realistic_solution: 'Identify that the effective batch size for the minority group is critically low. Implement stratified sampling to guarantee a minimum number of samples per group in every batch, or drastically reduce the learning rate specifically for the Group DRO weight updates.'
  common_mistake: |
    **The Pitfall:** Assuming the global model learning rate is simply too high, or that gradient clipping alone will fix the divergence.
    **The Rationale:** Candidates fail to analyze the variance of the group-specific loss estimates under extreme class imbalance.
    **The Consequence:** Hyperparameters are continuously tuned without solving the fundamental sample starvation of the minority group in each batch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Global batch size = 1024.
       - Minority group frequency = 1.5%.
       - Distributed training across 8 GPUs.
    2. **Calculations:**
       - Expected minority samples per global batch = 1024 × 0.015 = 15.3 samples.
       - Samples per GPU per step = 15.3 / 8 ≈ 1.9 samples.
    3. **Conclusion & Interpretation:** **<2 samples per GPU yields extreme high-variance loss estimates for the minority group, destabilizing Group DRO. Result: Statistical-Sample-Bound.**
