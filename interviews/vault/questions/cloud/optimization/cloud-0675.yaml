title: The Compilation Overhead
scenario: You move a PyTorch training loop from a CPU to a GPU. The first few batches take 500ms each, but suddenly the latency drops to 10ms per batch.
question: What happened inside the framework to cause this latency drop?
details:
  realistic_solution: Just-In-Time (JIT) compilation overhead. The framework spends the first few iterations tracing the computation graph and compiling optimized CUDA kernels for the specific tensor shapes you provided. Once cached, the dispatch overhead disappears.
  common_mistake: |
    **The Pitfall:** Attributing the initial slowdown to GPU hardware "warm-up" or cold caches.
    **The Rationale:** Candidates rely on CPU-centric performance intuition, failing to recognize the software-level JIT compilation step in modern deep learning frameworks.
    **The Consequence:** Misconfiguring profiling tools or disabling necessary JIT optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial batch time: 500 ms.
    - Steady-state batch time: 10 ms.

    **Calculations:**
    - `torch.compile` tracing + Triton kernel generation: ~1.5 seconds.
    - Spread over first 3 batches: 500 ms * 3 = 1.5 seconds.
    - Kernel dispatch overhead pre-compilation: ~50 μs.
    - Kernel dispatch post-compilation: ~5 μs.

    **Conclusion & Interpretation:**
    - **Result: 1.5 Seconds (Compilation-Bound)**. The 1.5-second overhead is exclusively Just-In-Time (JIT) tracing and kernel generation, after which the framework dispatches highly optimized cached CUDA kernels.
