title: The Training Memory Budget Decomposition
scenario: You have a single 80GB GPU and want to train the largest model possible from scratch. You will train with Adam in mixed precision, batch size 1, sequence length 2048.
question: What parameter ceiling can the memory budget support, and what activation profiling is still needed?
details:
  realistic_solution: 'Memory budget: using vendor decimal GB, 80 GB total minus ~2 GB for CUDA context and ~3 GB for fragmentation/temporary buffers leaves ~75 GB for parameters, optimizer state, gradients, activations, and temporary tensors; binary GiB accounting is about 7% tighter. Per-parameter costs: BF16 weights (2B) + FP32 master weights (4B) + FP32 Adam m (4B) + FP32 Adam v (4B) + BF16 gradients (2B) = 16 bytes/param. If activations were zero, the upper bound would be 75e9 / 16 = ~4.7B parameters. That is only a ceiling, not a trainable model size. The real maximum requires architecture-specific activation profiling for batch=1, sequence length 2048, checkpointing policy, attention implementation, and temporary buffers; subtract that measured activation/headroom budget before dividing by 16.'
  common_mistake: |
    **The Pitfall:** Only accounting for weights and optimizer states.
    **The Rationale:** Candidates forget that activation memory grows with sequence length and model width, and that CUDA context/fragmentation consume baseline memory.
    **The Consequence:** Estimating a model size that will immediately Out Of Memory (OOM) during the first forward pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU VRAM: 80 GB using vendor decimal GB; binary GiB accounting is about 7% tighter.
    - CUDA context: ~2 GB.
    - Fragmentation and temporary buffers: ~3 GB.
    - Precision: BF16 weights/grads, FP32 master weights/optimizer states.
    - Batch size 1 and sequence length 2048.

    **Calculations:**
    - Per-Parameter Cost: 2B (BF16 weights) + 4B (FP32 master) + 4B (FP32 Adam m) + 4B (FP32 Adam v) + 2B (BF16 grads) = 16 bytes/parameter.
    - Decimal zero-activation upper bound: (80e9 bytes - 2e9 bytes - 3e9 bytes) / 16 bytes/param = 4.69B parameters.
    - Binary GiB equivalent: 75e9 bytes is about 69.8 GiB. Keep the calculation in decimal bytes here; if using GiB labels, convert all terms before subtracting.
    - Let measured activation plus temporary headroom be A bytes for batch=1, sequence length 2048, the model architecture, and checkpointing policy.
    - Trainable parameter ceiling after profiling: (75e9 - A) / 16 parameters.
    - Example only: if profiling shows A=10e9 bytes, ceiling is (75e9 - 10e9) / 16 = 4.06B parameters before extra safety margin.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. The prompt supports a zero-activation ceiling of ~4.7B parameters under decimal GB accounting; the practical maximum is lower and must subtract measured activation and temporary memory before choosing a model size.
