title: The Training Memory Budget Decomposition
scenario: You have a single 80GB GPU and want to train the largest model possible from scratch. You will train with Adam in mixed precision, batch size 1, sequence length 2048.
question: Walk through the complete memory budget decomposition and determine the maximum model size (in parameters) you can train?
details:
  realistic_solution: 'Memory budget: 80 GB total, ~2 GB for CUDA context and ~3 GB for fragmentation/temporary buffers leaves ~75 GB usable for parameters plus activations. Per-parameter costs: BF16 weights (2B) + FP32 master weights (4B) + FP32 Adam m (4B) + FP32 Adam v (4B) + BF16 gradients (2B) = 16 bytes/param. At 75 GB for parameters, the absolute upper bound is ~4.7B params if activations were zero. For batch=1 and seq_len=2048, reserve ~10-15 GB activations without checkpointing or ~3-5 GB with checkpointing. So a defensible maximum is ~4B params with checkpointing and ~3.5B without, subject to architecture-specific activation profiling.'
  common_mistake: |
    **The Pitfall:** Only accounting for weights and optimizer states.
    **The Rationale:** Candidates forget that activation memory grows with sequence length and model width, and that CUDA context/fragmentation consume baseline memory.
    **The Consequence:** Estimating a model size that will immediately Out Of Memory (OOM) during the first forward pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU VRAM: 80 GB. CUDA context: ~2 GB.
    - Fragmentation and temporary buffers: ~3 GB.
    - Precision: BF16 weights/grads, FP32 master weights/optimizer states.
    - Batch size 1 and sequence length 2048.

    **Calculations:**
    - Per-Parameter Cost: 2B (BF16 weights) + 4B (FP32 master) + 4B (FP32 Adam m) + 4B (FP32 Adam v) + 2B (BF16 grads) = 16 bytes/parameter.
    - Zero-activation upper bound: (80 GB - 2 GB - 3 GB) / 16 bytes/param = ~4.7B parameters.
    - Reserve activations for seq_len=2048: ~3-5 GB with checkpointing, or ~10-15 GB without checkpointing.
    - With checkpointing: (80 - 2 - 3 - 5) GB / 16 bytes ≈ 4.4B parameters before safety margin, so target ~4B.
    - Without checkpointing: (80 - 2 - 3 - 15) GB / 16 bytes ≈ 3.75B parameters before safety margin, so target ~3.5B.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. Accounting for optimizer states, activations, temporary buffers, and headroom, the practical maximum is ~4B parameters with activation checkpointing and ~3.5B without.
