title: 'FlashAttention-3: Asynchronous Tiling on Hopper'
scenario: FlashAttention-3 exploits hardware features like TMA (Tensor Memory Accelerator) for asynchronous HBM-to-SRAM loads, and warp specialization.
question: How do TMA and warp specialization let FlashAttention-3 outperform FlashAttention-2, and what peak TFLOPS percentage does it reach?
details:
  realistic_solution: 'FlashAttention-2 on H100 achieves roughly 70% of peak TFLOPS for some FP16/BF16 attention shapes. The remaining gap comes from stalls around data movement, softmax work between QK^T and PV phases, and scheduling overhead. FlashAttention-3 addresses these with Hopper-specific features: (1) TMA, a dedicated copy engine that moves tiles from HBM to shared memory asynchronously while MMA work continues; (2) warp specialization, where producer warps manage data movement and consumer warps execute matrix operations; and (3) better overlap of softmax and GEMM work. The direct answer is that FlashAttention-3 reaches about 75-80% of peak FP16/BF16 TFLOPS on H100-class Hopper workloads, depending on shape. FP8 can raise absolute TFLOPS because the hardware peak is higher, but that is a separate metric from the FP16 peak-utilization percentage.'
  common_mistake: |
    **The Pitfall:** Believing FlashAttention-3 introduces a fundamentally new mathematical algorithm.
    **The Rationale:** Candidates often mistake hardware-aware optimization for algorithmic breakthroughs, failing to recognize that the math is identical to FlashAttention-2.
    **The Consequence:** Misunderstanding how software and hardware co-design yields massive speedups through asynchronous data movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - FlashAttention-2: ~70% peak (692 TFLOPS).
    - FlashAttention-3: ~75-80% peak, e.g. 791 TFLOPS on the same peak scale.

    **Calculations:**
    - FA-2 utilization example: 692 / 989 = 70.0% of peak.
    - FA-3 utilization example: 791 / 989 = 80.0% of peak.
    - Relative FP16/BF16 speedup from these example throughputs: 791 / 692 = 1.14x.

    **Conclusion & Interpretation:**
    - **Result: about 75-80% of peak FP16/BF16 TFLOPS**. The supported comparison here is roughly 1.14x over the FA-2 example, while FP8 absolute throughput should be reported separately.
