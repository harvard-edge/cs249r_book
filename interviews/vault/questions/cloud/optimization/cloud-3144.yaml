title: Sliding Window Attention Memory Savings
scenario: Mistral 7B uses sliding window attention with window_size=4096 on some layers while keeping
  full attention on others. On an 80GB GPU, for a 32K context request with 32 layers (16 sliding, 16 full),
  head_dim=128, 8 KV heads.
question: How much KV cache does 32K context use with 16 sliding-window and 16 full-attention layers versus
  full attention on all 32 layers?
details:
  realistic_solution: 'Full attention KV per layer: 32K x 2 x 8 x 128 x 2B = 128MiB. Full model (32 layers):
    32 x 128MiB = 4GiB. With sliding window: 16 full layers x 128MiB = 2GiB. 16 sliding layers x (4096/32768)
    x 128MiB = 16 x 16MiB = 256MiB. Total: 2.25GiB. Savings: 4GiB - 2.25GiB = 1.75GiB per request = 43.75%
    reduction. This allows ~1.77x more concurrent requests.

    '
  common_mistake: '**The Pitfall:** Assuming sliding window attention computes over the full context and
    just masks the attention matrix.

    **The Rationale:** The real memory benefit is that you only store the last W tokens in the physical
    KV cache for sliding layers, fully freeing older memory.

    **The Consequence:** Overestimating memory requirements and serving fewer concurrent requests than
    the hardware can actually support.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 32K tokens, 32 layers (16 full, 16 sliding), window=4096.

    - FP16 (2 bytes), 8 KV heads, 128 dim.


    **Calculations:**

    - Layer Memory: 32768 × 2 × 8 × 128 × 2 = 128 MiB/layer.

    - Full Model: 32 × 128 MiB = 4096 MiB = 4 GiB.

    - Sliding Layers: 16 × (4096 / 32768) × 128 MiB = 256 MiB.

    - Total Sliding: (16 × 128 MiB) + 256 MiB = 2304 MiB = 2.25 GiB.


    **Conclusion & Interpretation:**

    - **Result: Memory-Capacity-Bound**. Sliding window yields a 43.75% memory reduction (1.75 GiB saved).

    '
