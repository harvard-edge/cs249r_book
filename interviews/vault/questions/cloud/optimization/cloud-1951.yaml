title: Evaluating Static Graphs for DLRM Inference
scenario: Your team is deploying a massive Deep Learning Recommendation Model (DLRM) to serve 100,000 QPS on a fleet of NVIDIA A100 GPUs. The model architecture is fixed, utilizing strict batch sizes (e.g., batch 2048) and features numerous small, memory-bound MLP layers alongside massive embedding table lookups. The engineering team is debating whether to serve the model using dynamic execution (e.g., PyTorch eager mode) for flexibility or to ahead-of-time compile it into a static computation graph (e.g., using TensorRT or XLA).
question: Should the DLRM serving stack use PyTorch eager mode or an ahead-of-time static graph, and why?
details:
  realistic_solution: Adopt a static computation graph approach. A static graph allows the compiler to perform aggressive kernel fusion (combining multiple MLP layers and activation functions into a single kernel) and ahead-of-time memory planning, completely eliminating Python execution overhead and minimizing expensive global memory round-trips.
  common_mistake: |
    **The Pitfall:** Assuming dynamic execution framework overhead is negligible for large models.
    **The Rationale:** Engineers equate large models purely with massive compute requirements, ignoring that DLRMs consist of many tiny MLPs.
    **The Consequence:** The workload becomes completely bottlenecked by PyTorch kernel dispatch overhead rather than GPU compute, destroying latency targets.
  napkin_math: |
    - Dynamic execution: 10 small MLP operations each have ~5us kernel launch overhead (50us total) + 20us compute = 70us latency.
    - Static execution (Fusion): Fused into 1 kernel = 5us launch + 15us compute (due to intermediate register reuse) = 20us latency.
    - **Speedup = 70us / 20us = 3.5x reduction in MLP latency.**
