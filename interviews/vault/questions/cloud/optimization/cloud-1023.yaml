title: Continuous Training Frequency Optimization
scenario: You are designing a continuous training pipeline for an e-commerce recommendation model. The model generates $100,000 in baseline daily revenue when fresh. Daily revenue degrades by $1,000 for each day the model ages. Retraining the model requires 8x GPUs for 15 hours, costing exactly $4,500 per run.
question: To maximize net profit, how many days should you wait between retraining runs?
details:
  realistic_solution: Formulate an optimization problem to minimize the average daily cost (amortized compute cost plus accumulated drift loss). Taking the derivative and solving, or evaluating discrete values, reveals the optimal retraining schedule is every 3 days, balancing the $4,500 compute cost against the $1,000/day drift penalty.
  common_mistake: |
    **The Pitfall:** Defaulting to "retrain daily" to maximize raw accuracy.
    **The Rationale:** Candidates prioritize model freshness without quantitatively balancing the high compute cost against the marginal revenue loss from drift.
    **The Consequence:** Daily retraining costs $4,500/day, drastically eating into the profit margins that optimal scheduling would preserve.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute cost: $4,500/run.
    - Drift loss: $1,000/day cumulative.

    **Calculations:**
    - Average daily cost (T days) = [$1,000 * T*(T-1)/2 + $4,500] / T.
    - T=1: $4,500/day.
    - T=2: ($1,000 + $4,500) / 2 = $2,750/day.
    - T=3: ($3,000 + $4,500) / 3 = $2,500/day.
    - T=4: ($6,000 + $4,500) / 4 = $2,625/day.

    **Conclusion & Interpretation:**
    - **Result: 3 days (Cost-Bound)**. Waiting 3 days between retrains minimizes the average daily cost at $2,500/day.
