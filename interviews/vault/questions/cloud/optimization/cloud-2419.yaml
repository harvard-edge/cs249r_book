title: 'Unstructured vs Structured Sparsity'
scenario: 'You prune a ResNet-50 model to 60% unstructured sparsity to reduce inference costs. You deploy it on an A100 GPU using cuSPARSE. Profiling shows absolutely 0% improvement in latency; both the dense and sparse models take 12ms per batch of 32. Total FLOPs processed by the hardware remain identical.'
question: 'Why did 60% unstructured pruning fail to speed up ResNet-50 on A100, and what sparsity pattern would actually accelerate it?'
details:
  realistic_solution: 'Standard GPUs and their Tensor Cores compute dense matrix blocks. Unstructured sparsity means the zeros are randomly distributed. The GPU must still load the full dense memory blocks from HBM and execute the dense MMA instructions; multiplying by zero takes the same time as multiplying by one. The tradeoff is pruning flexibility versus hardware mapping. To achieve acceleration, you must co-design the pruning algorithm with the Ampere architecture. A100 features Sparse Tensor Cores that explicitly support 2:4 structured sparsity (exactly 2 zeros in every block of 4 elements). By retraining the model with a 2:4 sparsity constraint, the hardware multiplexers can physically skip fetching the zero values, doubling the compute throughput.'
  common_mistake: 'Increasing the sparsity level to 80%, hoping the zero-skipping finally kicks in on the GPU.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Unstructured 60% sparsity: hardware processes 100% of the dense matrix
    - Structured 2:4 sparsity: 50% sparse constraint

    **Calculations:**
    - Unstructured throughput = 1x
    - Structured throughput (with Sparse Tensor Cores) = 2x

    **Conclusion & Interpretation:**
    - **Result: 2x Throughput (Compute-Bound)**. You trade 10% theoretical sparsity for 100% actual hardware acceleration.
