title: 'PagedAttention: Virtual Memory for KV Cache'
scenario: You serve a 13B model. Each request's KV cache for a 4096-token context consumes 2 GB. With contiguous memory allocation, you can serve 20 concurrent requests. Many requests use less than 4096 tokens, wasting allocated but unused memory.
question: How does PagedAttention improve KV-cache utilization, and what approximate throughput gain follows?
details:
  realistic_solution: 'Without PagedAttention, each request pre-allocates a contiguous 2 GB buffer for max context length (4096 tokens), even if the actual context averages about 0.5 GB of KV data. With a 40 GB KV pool, that caps the server at 20 concurrent requests and uses only about 10 GB for live KV entries. PagedAttention divides KV cache into fixed-size blocks (e.g., 16 tokens per block). Blocks are allocated on demand as the sequence grows, stored non-contiguously in GPU memory. A block table maps logical positions to physical blocks. Benefits: (1) No internal fragmentation beyond the last block. (2) No external fragmentation because any free block can serve any request. (3) Memory sharing for common prefixes using copy-on-write. Under the stated average-use assumption, the memory-limited concurrency rises from 20 to roughly 40 GB / 0.5 GB = 80 requests, so the upper-bound throughput gain is about 4x if request throughput scales with concurrent batch capacity. In practice it is workload-dependent
    because block size, scheduler policy, decode/prefill mix, and compute saturation reduce the realized gain.'
  common_mistake: |
    **The Pitfall:** Thinking PagedAttention changes the underlying attention computation algorithm.
    **The Rationale:** The name sounds like an algorithmic change (like FlashAttention), but it is actually a memory management technique applying OS virtual memory paging to tensors.
    **The Consequence:** Failing to recognize that PagedAttention's primary benefit is allowing drastically larger batch sizes by eliminating memory fragmentation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max concurrent requests (contiguous): 20.
    - KV cache per max request: 2 GB (4096 tokens).
    - Total KV pool: 40 GB.
    - Average actual context use per request: 0.5 GB.

    **Calculations:**
    - Contiguous allocated waste: 20 requests * 0.5 GB actual use = 10 GB used out of 40 GB (75% waste).
    - Contiguous capacity: 40 GB pool / 2 GB allocation per request = 20 concurrent requests.
    - PagedAttention ideal capacity: 40 GB pool / 0.5 GB actual average use = 80 concurrent requests.
    - Ideal memory-limited concurrency gain: 80 / 20 = 4x.

    **Conclusion & Interpretation:**
    - **Result: up to about 4x higher memory-limited concurrency**. Treat this as an upper-bound throughput estimate, not an exact serving gain, because compute saturation and scheduling overhead can lower realized throughput.
