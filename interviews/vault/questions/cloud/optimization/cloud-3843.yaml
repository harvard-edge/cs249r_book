title: Offline Distillation PCIe Bandwidth Bottleneck
scenario: 'A team is performing offline knowledge distillation to train a 100M parameter student model on a single A100 GPU. The teacher''s full vocabulary logits (FP16) are pre-computed and loaded from CPU RAM over a PCIe Gen4 x16 bus (32 GB/s unidirectional). The training uses a batch size of 16, a sequence length of 2048, and a vocabulary size of 128,000.'
question: Why does offline distillation with full-vocabulary teacher logits collapse A100 utilization despite a small 100M student model?
details:
  realistic_solution: |
    The utilization collapse occurs because the system becomes completely IO-bound by the PCIe Gen4 bandwidth. Transferring the dense teacher logits for the full vocabulary from the CPU takes substantially longer than the actual forward and backward pass computations on the A100. To resolve this, teams typically use online distillation (running the teacher on the same GPU/node) or distill only the top-K logits to compress the data transfer.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck lies in HBM bandwidth or KL divergence compute overhead.
    **The Rationale:** Candidates overlook the massive data movement requirement of transferring dense logits across the PCIe bus.
    **The Consequence:** Attempting to optimize the student model's layers while the GPU remains completely starved for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tokens per batch: 16 * 2048 = 32,768.
    - Vocab size: 128,000.
    - PCIe Gen4 x16 unidirectional bandwidth: 32 GB/s.
    - A100 Compute: 312 TFLOPS.

    **Calculations:**
    - Logits data size: 128,000 vocab * 2 bytes * 32,768 tokens = 8.39 GB.
    - PCIe Gen4 transfer time: 8.39 GB / 32 GB/s = ~262 ms per batch.
    - Student compute required: 6 * 100M params * 32,768 tokens = ~19.6 TFLOPs.
    - Compute time on A100: 19.6 TFLOPs / 312 TFLOPS = ~63 ms.

    **Conclusion & Interpretation:**
    - **Result: 262 ms I/O vs 63 ms Compute (PCIe-Bound)**. The GPU waits 262 ms for data to perform only 63 ms of work, making it completely I/O bound.
