title: Diagnosing Low MFU Despite High GPU Utilization
scenario: You are training a 10B parameter transformer model on 1 Trillion tokens using a cluster of 256 GPUs. The infrastructure team reports that the training run will take 35 days and notes that `nvidia-smi` consistently shows 95% GPU utilization, concluding that the cluster is highly optimized. Use the Iron Law of Training to analyze the true efficiency.
question: What does the low MFU reveal despite 95% GPU utilization?
details:
  realistic_solution: Calculate the true MFU using the Iron Law of Training. The 25% MFU shows that 95% `nvidia-smi` utilization is not evidence of efficient training; the GPUs are active but spending most cycles stalled on data movement and synchronization rather than useful model FLOPs. With only the provided numbers, call it a memory/communication efficiency bottleneck rather than claiming a single counter-proven root cause.
  common_mistake: |
    **The Pitfall:** Conflating `nvidia-smi` GPU utilization with Model FLOPs Utilization (MFU).
    **The Rationale:** Candidates assume that if the SM is active 95% of the time, it must be doing useful mathematical operations.
    **The Consequence:** The cluster is deemed highly optimized when it is actually stalled on memory bandwidth, doubling training costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters (N): 10B, Tokens (D): 1T.
    - A100 Peak BF16 Compute: 312 TFLOPs.
    - Cluster size: 256 GPUs, Time: 35 days (3.024M seconds).

    **Calculations:**
    - Total FLOPs = 6ND = 6 * 10^10 * 10^12 = 60 ZFLOPs.
    - Peak Cluster Compute = 256 * 312 TFLOPs = 79.8 PFLOPs.
    - Actual Throughput = 60 ZFLOPs / 3.024M sec = 19.8 PFLOPs.
    - True MFU = 19.8 PFLOPs / 79.8 PFLOPs = ~25%.

    **Conclusion & Interpretation:**
    - **Result: Memory/Communication Efficiency Bottleneck.** The cluster is running at only 25% MFU, so high SM utilization is masking stalls from data movement, unfused kernels, or communication rather than showing highly optimized training.
