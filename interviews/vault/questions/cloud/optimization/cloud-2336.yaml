title: FPGA Routing Congestion and Clock Collapse
scenario: Deploying a Deep Learning Recommendation Model (DLRM) on an FPGA instance. The baseline model achieves a 250MHz clock frequency. You add a single 256x256 feature-crossing MLP layer. Suddenly, the synthesis tool reports an fMAX of 110MHz, missing timing constraints, and the power draw increases by 40%.
question: Why did adding the 256x256 MLP layer drop FPGA fMAX from 250MHz to 110MHz, and what RTL/HLS change would you make?
details:
  realistic_solution: |
    The symptom (catastrophic fMAX drop and power spike after adding a dense compute layer) indicates DSP (Digital Signal Processor) slice exhaustion. FPGAs have a fixed number of hardened DSP blocks (e.g., ~6800 on UltraScale+). A 256x256 dense layer requires massive parallel MAC operations. Once the DSP blocks are fully utilized, the FPGA synthesizer falls back to implementing multipliers using distributed logic (LUTs - Look-Up Tables). LUT-based multipliers require thousands of gates, creating immense routing congestion. The long, tangled physical routing paths across the FPGA fabric drastically increase the critical path delay, forcing the clock frequency down from 250MHz to 110MHz. The co-design solution requires temporal multiplexing (folding): redesign the RTL/HLS to use a smaller systolic array (e.g., 32x32) that fits entirely within the remaining DSP budget, and iterate over the 256x256 matrix over multiple clock cycles, preserving the 250MHz fMAX.
  common_mistake: |
    **The Pitfall:** Trying to aggressively pipeline the design by adding registers everywhere.
    **The Rationale:** Relying on standard CPU/GPU pipelining techniques without understanding FPGA spatial routing limits.
    **The Consequence:** Increasing latency and register count without solving the underlying DSP resource exhaustion, leading to a still-broken design.
  napkin_math: |
    **Assumptions & Constraints:**
    - A fully spatial 256x256 matrix-vector layer uses 65,536 parallel multipliers/MAC lanes if every weight is computed in one cycle.
    - Typical FPGA DSP budget is about 6,840 slices.
    - LUT fallback for an 8-bit multiplier is roughly 60 LUTs, and fabric budget is about 1.1M LUTs.
    - Baseline clock target is 250MHz, or 4ns per cycle.

    **Calculations:**
    - Fully spatial design needs 65,536 DSP-backed lanes, which is 65,536 / 6,840 = 9.6x the DSP budget.
    - Excess lanes mapped to LUT multipliers would be roughly (65,536 - 6,840) * 60 = 3.52M LUTs, far above a 1.1M LUT budget and likely unroutable.
    - Folded design: a 32x32 compute tile uses 1,024 DSPs, or 1,024 / 6,840 = 15% of the DSP budget.
    - Covering the 256x256 layer with a 32x32 tile requires (256 / 32) * (256 / 32) = 64 scheduled tiles.
    - At the original 250MHz target, tile issue latency is 64 cycles * 4ns = 256ns, plus pipeline and memory movement overhead.

    **Conclusion & Interpretation:**
    - **Result: Routing-Congestion Clock Collapse**. The 110MHz symptom comes from oversubscribing DSPs and forcing multiplier logic into congested LUT fabric. Folding the layer onto a smaller DSP-resident tile trades cycles for routability and can preserve the original 250MHz timing target.
