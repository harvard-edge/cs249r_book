title: H100 Transformer Inference Scheduling
scenario: 'You are tasked with deploying a large transformer model for real-time inference on a GPU. The model has several attention heads and FFN layers. You have two proposed scheduling strategies: 1. Strategy A (Naive): Executes each layer sequentially, allocating and deallocating intermediate tensors as needed. Minimal layer fusion is applied. 2. Strategy B (Optimized): Employs aggressive layer fusion where possible and uses an execution order that prioritizes memory reuse.'
question: How would you compare Strategies A and B on the GPU for latency, throughput, and memory use, and which hardware limits matter most?
details:
  realistic_solution: |
    Strategy A is simpler but usually worse for real-time inference: each layer boundary writes intermediates to HBM, rereads them for the next kernel, pays more kernel-launch overhead, and keeps more temporary tensors live, increasing latency and reducing throughput. Strategy B should lower latency by fusing compatible operations and reusing buffers, improve throughput by reducing HBM traffic and launch overhead, and reduce peak memory use through tighter tensor liveness. The key hardware limits are HBM bandwidth for intermediate movement, HBM capacity for live tensors and KV cache, kernel launch overhead for many small ops, and whether each fused region is compute-bound or memory-bound given SM/Tensor Core utilization.
  common_mistake: |
    **The Pitfall:** Neglecting the significant impact of HBM memory bandwidth on intermediate tensor movement.
    **The Rationale:** Candidates focus purely on FLOPs to measure performance, assuming compute is the only bottleneck.
    **The Consequence:** Leading to sub-optimal scheduling decisions, particularly for memory-bound operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Y = 10000x10000 FP16 tensor = 200MB.
    - Bandwidth = 3.35 TB/s.

    **Calculations:**
    - Naive (Strategy A): Write Y (200MB) + Read Y (200MB) = 400MB transfer.
    - Decimal bandwidth lower bound: 400 MB / 3.35 TB/s = 0.4 GB / 3350 GB/s ≈ 0.000119 s = 0.12 ms.
    - Optimized (Strategy B): if fusion keeps Y in registers/shared memory or reuses the same HBM buffer, it can remove most of that 400 MB round trip and reduce peak live intermediates by about 200 MB for this tensor.
    - Real latency also includes kernel launch overhead, compute time, cache behavior, and any extra reads/writes for neighboring tensors, so 0.12 ms is a lower bound for one intermediate, not the full strategy gap.

    **Conclusion & Interpretation:**
    - **Result: Strategy B should reduce latency, improve throughput, and lower peak memory when intermediate HBM traffic is the bottleneck.** The 0.12 ms figure is only a bandwidth lower bound for one 400 MB round trip; profiles must include launch overhead and compute utilization.
