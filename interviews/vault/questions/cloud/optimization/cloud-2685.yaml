title: Estimating Total Training FLOPs
scenario: A 7B parameter Transformer model trains for 1T tokens with batch size 2048 and sequence length 2048.
question: Using 6ND, what are the total training FLOPs for a 7B model on 1T tokens and the training time on 256 A100s at 50% MFU?
details:
  realistic_solution: 'The 6ND formula comes from the 3x multiplier: each token requires ~2N FLOPs in the forward pass, and 3x for the full training step gives 6N FLOPs per token. Total FLOPs = 6 * 7e9 * 1e12 = 4.2e22 FLOPs. Cluster throughput: 256 A100s * 312 TFLOPS * 0.50 MFU = 39,936 TFLOPS. Training time = 1.05e6 seconds = 12.2 days.'
  common_mistake: |
    **The Pitfall:** Using 2ND instead of 6ND for total FLOPs.
    **The Rationale:** Candidates remember the forward pass cost (2N FLOPs per token) but forget that training requires a backward pass, which is roughly twice as expensive.
    **The Consequence:** Underestimating the total training compute and time by a factor of 3.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size (N): 7 billion parameters.
    - Dataset size (D): 1 trillion tokens.
    - Cluster: 256 A100s, 312 TFLOPS each, 50% MFU.

    **Calculations:**
    - Total FLOPs (6ND): 6 * 7e9 * 1e12 = 4.2e22 FLOPs.
    - Cluster Throughput: 256 A100s * 312e12 FLOPS/sec * 0.5 MFU = 39.9e15 FLOPS/sec ≈ 4e16 FLOPS/sec.
    - Training Time = 4.2e22 FLOPs / 3.99e16 FLOPS/sec = 1.05e6 seconds.
    - Total Time in days = 1.05e6 / 86400 ≈ 12.15 days.

    **Conclusion & Interpretation:**
    - **Result: 12.15 days (Compute-Bound)**. The 6ND approximation accurately estimates total training compute, leading to a ~12-day training time at 50% MFU.
