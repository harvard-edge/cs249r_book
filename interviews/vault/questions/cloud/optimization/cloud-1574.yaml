title: Diagnosing Low GPU Utilization for a 350M Transformer on A100
scenario: A team is training a 350M parameter transformer model on a single GPU. They are processing sequences of length 512 with a micro-batch size of 2. Despite having plenty of free VRAM, they observe low GPU utilization (~30%) and poor training throughput. They suspect a PyTorch dataloader bottleneck, but profiling shows data loading is instantaneous.
question: How would you analyze the root cause of this underutilization?
details:
  realistic_solution: Use profiling to separate host starvation, underfilled kernels, memory traffic, and compute saturation. With sequence length 512 and micro-batch size 2, many GEMMs and attention kernels may be too small to fill the A100, and repeated activation/gradient/optimizer traffic can keep utilization low even when VRAM is free. Increasing the micro-batch size is a likely fix, but also check sequence packing, kernel efficiency, activation recomputation, mixed precision, and data/compute overlap rather than treating batch size as the only cause.
  common_mistake: |
    **The Pitfall:** Focusing solely on dataloader issues, CPU bottlenecks, or suggesting gradient accumulation without checking arithmetic intensity.
    **The Rationale:** Low GPU utilization often points to host-side data starvation.
    **The Consequence:** Wasting time tuning data pipelines when the fundamental issue is that the workload is memory-bandwidth bound due to a tiny batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 350M parameters.
    - Sequence length: 512; micro-batch size: 2, so only 1,024 tokens per step before gradient accumulation.
    - Transformer training step includes forward, backward, activation reads/writes, gradients, and optimizer-state traffic.
    - Low utilization after a fast dataloader points to GPU-side inefficiency, but profiling must identify whether the limit is bandwidth, launch overhead, small GEMMs, or communication/overlap.

    **Calculations:**
    - Tokens per micro-step = 2 * 512 = 1,024 tokens.
    - A 350M transformer has many matrix multiplies whose M dimension is tied to batch * sequence; with only 1,024 tokens, several kernels may be too small to reach peak A100 occupancy.
    - Training also moves activations, gradients, and optimizer state, so free VRAM alone does not imply high arithmetic intensity.
    - If increasing micro-batch size or packing more tokens improves achieved FLOPs without increasing dataloader time, the bottleneck is GPU workload shape rather than input loading.

    **Conclusion & Interpretation:**
    - **Result: likely underfilled GPU kernels and memory traffic from a tiny micro-batch, not a dataloader bottleneck.** Increase tokens per step where memory allows, then verify with profiler counters for achieved FLOPs, HBM bandwidth, kernel occupancy, and overlap.
