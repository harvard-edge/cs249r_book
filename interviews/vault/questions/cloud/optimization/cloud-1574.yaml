title: Diagnosing A100 Underutilization in NLP Training
scenario: A team is training a 350M parameter transformer model on a single GPU. They are processing sequences of length 512 with a micro-batch size of 2. Despite having plenty of free VRAM, they observe low GPU utilization (~30%) and poor training throughput. They suspect a PyTorch dataloader bottleneck, but profiling shows data loading is instantaneous.
question: How would you analyze the root cause of this underutilization?
details:
  realistic_solution: 'Analyze the arithmetic intensity. A batch size of 2 results in operations that are heavily memory-bandwidth bound. The GPU spends most of its time loading weight matrices from HBM rather than performing calculations. Increase the mini-batch size until VRAM is fully utilized to shift to compute-bound operations.'
  common_mistake: |
    **The Pitfall:** Focusing solely on dataloader issues, CPU bottlenecks, or suggesting gradient accumulation without checking arithmetic intensity.
    **The Rationale:** Low GPU utilization often points to host-side data starvation.
    **The Consequence:** Wasting time tuning data pipelines when the fundamental issue is that the workload is memory-bandwidth bound due to a tiny batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Micro-batch size (B): 2.
    - Hardware Ridge Point: ~10 FLOPs/byte.
    - FP32 Weight Load: 4 bytes/parameter.
    - Compute: 2 * B * Parameters (FLOPs).

    **Calculations:**
    - Arithmetic Intensity (AI) ≈ (2 * B * Params) / (4 * Params) = B / 2 FLOPs/byte.
    - With B = 2, AI = 2 / 2 = 1 FLOP/byte.
    - AI (1) is far below the hardware Ridge Point (10).

    **Conclusion & Interpretation:**
    - **Result: AI = 1 FLOP/byte (Memory-Bandwidth Bound)**. The batch size is too small, starving the compute cores by spending all time loading weights. B must exceed 20 to become compute-bound.
