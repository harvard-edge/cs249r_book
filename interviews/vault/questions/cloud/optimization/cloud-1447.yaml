title: Shift-Left Constraint Validation Savings
scenario: Your ML team trains a recommendation model on a node with 8x A100 GPUs. Full training takes 50 hours. Currently, latency and memory constraints for the target serving environment are only evaluated after training completes. Historically, 50% of trained models fail these late-stage checks and are discarded.
question: You propose a 'shift-left' validation step that tests constraints on a randomly initialized dummy model before training begins, taking just 0.5 hours. How many A100 GPU-hours does this save per successfully deployed model?
details:
  realistic_solution: With a 50% failure rate, every successful deployment is accompanied by exactly 1 failed run on average. By catching the failure in 0.5 hours instead of 50 hours, you save 49.5 node hours of cluster time per failed run.
  common_mistake: |
    **The Pitfall:** Calculating savings for a single run instead of per successful deployment.
    **The Rationale:** Candidates forget that a 50% failure rate implies a statistical average of 2 runs per 1 success.
    **The Consequence:** The expected resource savings are drastically underestimated, potentially failing to justify the engineering effort for the shift-left CI/CD pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:** 8x A100 node. 50 hours full training, 0.5 hours dummy check. 50% historical failure rate.
    2. **Calculations:** 50% failure rate = 2 runs per success (1 fail, 1 succeed). Current wasted time = 1 failure × 50 hours × 8 GPUs = 400 GPU-hours. New wasted time = 1 failure × 0.5 hours × 8 GPUs = 4 GPU-hours. Savings = 400 - 4 = 396 GPU-hours.
    3. **Conclusion & Interpretation:** **Result: 396 A100 GPU-hours saved per successful deployment. Compute-Efficiency-Bound.**
