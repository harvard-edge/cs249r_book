title: Evaluating Distillation Trade-offs for Cloud LLM Deployment
scenario: You need to deploy a real-time summarization model in the cloud. You currently have a 70B teacher model that requires at least two 80GB GPUs. To reduce serving costs, you propose distilling it into a 7B student model.
question: Should the 70B-to-7B summarizer use logit distillation, intermediate-state distillation, or both, given the capacity gap and temperature trade-offs?
details:
  realistic_solution: Evaluate the 10x capacity gap between teacher (70B) and student (7B). Standard logit distillation might force the 7B student to mimic noise in the teacher's distribution. Recommend combining task-specific hard labels with teacher soft labels at a moderate temperature (T=3-5), using layer-wise intermediate feature matching to transfer structural knowledge. The teacher-side distillation pass is a one-time offline cost on the order of 9,700 A100 GPU-hours for 10B tokens, which can still be justified separately by the ongoing serving cost reduction.
  common_mistake: |
    **The Pitfall:** Assuming higher temperature always transfers more knowledge without acknowledging the capacity gap.
    **The Rationale:** High temperature softens the logits, supposedly revealing the rich "dark knowledge" of the teacher across all classes.
    **The Consequence:** Forcing a 7B student to mimic the full noise/tail distribution of a 70B teacher exceeds its representational power, degrading performance on core tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model (FP16) requires ~140 GB (2x 80GB GPUs).
    - 7B model (FP16) requires ~14 GB (1x 24GB GPU).
    - A100 throughput ≈ 120 TFLOP/s.

    **Calculations:**
    - Use a dense transformer training/distillation estimate of ~6 FLOPs per parameter-token for the teacher-side pass.
    - FLOPs = 6 × 70e9 parameters × 10e9 tokens = 4.2e21 FLOPs.
    - Time on one A100-equivalent = 4.2e21 / 120e12 = 3.5e7 seconds ≈ 9,720 GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Offline).** The offline distillation pass is expensive and should be budgeted separately from serving, but a 7B student can still be worthwhile if the recurring online GPU savings dominate this one-time cost.
