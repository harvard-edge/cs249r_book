title: 'PagedAttention Copy-on-Write for Beam Search'
scenario: 'You run beam search with beam_width=4 on a 70B model (H100, 8 KV heads/GPU, 80 layers, head_dim=128). Without copy-on-write, each beam duplicates the entire KV cache at every branch point. You must calculate the memory waste at context 2048 tokens and explain how PagedAttention''s CoW mechanism avoids it.'
question: 'How much KV cache memory does naive beam_width=4 waste at 2048 tokens, and how does PagedAttention copy-on-write avoid it?'
details:
  realistic_solution: 'KV per beam at 2048 tokens per GPU: 80 x 2 x 8 x 128 x 2048 x 2B = 640MB. 4 beams naive: 4 x 640MB = 2.56GB/GPU. But beams share ~95% of tokens (diverging only at recent positions). CoW: all 4 beams reference the same physical blocks via block table. When beam i generates a new token into block j, only block j is copied (16 tokens x 80 x 2 x 8 x 128 x 2B = 5.12MB). Physical memory: 640MB (shared) + 4 x 5.12MB (diverged) = 660MB vs 2.56GB. Savings: 74%. This is exactly like Unix fork() with CoW pages. At block_size=16, reference counts track sharing. When ref_count drops to 1, the block becomes exclusively owned and in-place writable.'
  common_mistake: |
    **The Pitfall:** Thinking beam search only creates copies at the final step.
    **The Rationale:** Not realizing that each decode step can cause beams to diverge.
    **The Consequence:** Without CoW, the system eagerly copies all shared KV blocks, consuming 4x memory for mostly identical data and severely bottlenecking concurrency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers, 8 heads, 128 dim, 2048 tokens, FP16 (2 bytes).
    - Beam width of 4.

    **Calculations:**
    - KV per beam at 2048 tokens per GPU: 80 * 2 (K,V) * 8 * 128 * 2048 * 2B = 640MB.
    - Naive 4 beams: 4 * 640MB = 2.56GB per GPU.
    - CoW physical memory used: 640MB (shared) + 4 * 5.12MB (diverged block of 16 tokens) = 660MB.

    **Conclusion & Interpretation:**
    - **Result: ~74% memory reduction (Memory-Bound)**. CoW drastically reduces memory footprint from 2.56GB to 660MB by sharing physical blocks across diverging beams.
