title: Managing gradient accumulation with mixed precision and autocast on MI300X
scenario: You are training a 13B model on MI300X (192GB, 5.3TB/s) with gradient accumulation over 8 micro-batches
  to simulate an effective batch size of 512. You use torch.cuda.amp.autocast() for BF16 training. Gradients
  are exploding and loss is NaN after ~1000 steps.
question: How should you structure BF16 autocast and gradient accumulation over 8 micro-batches on MI300X
  to avoid NaNs?
details:
  realistic_solution: 'For BF16 on MI300X/ROCm: do not use GradScaler — BF16 has 8 exponent bits and doesn''t
    need dynamic loss scaling. For gradient accumulation: call optimizer.step() only after all micro-batches,
    use with autocast(device_type=''cuda'', dtype=torch.bfloat16). Check if MI300X ROCm driver requires
    autocast(device_type=''hip''). Clip gradients with torch.nn.utils.clip_grad_norm_(model.parameters(),
    max_norm=1.0) before optimizer.step().'
  common_mistake: '**The Pitfall:** Calling scaler.step() and scaler.update() after every micro-batch
    instead of after the full accumulation.

    **The Rationale:** With BF16 (unlike FP16), dynamic loss scaling isn''t needed, but teams blindly
    copy legacy FP16 accumulation code.

    **The Consequence:** Gradients explode and loss hits NaN after a few hundred steps due to inappropriate
    scaling artifacts.'
  napkin_math: '**Assumptions & Constraints:**

    - MI300X using BF16 autocast.

    - Gradient accumulation over 8 steps.

    **Calculations:**

    - BF16 range: +-3.4e38 (same as FP32). FP16 range: +-65504.

    - Gradient accumulation over 8 steps scales gradients by 8x.

    - With legacy FP16 loss scaling of 65536, effective scale = 65536 x 8 = 524288.

    **Conclusion & Interpretation:**

    - BF16 does not require scaling to avoid underflow; applying FP16-style scaling logic causes massive
    overflow during accumulation.'
