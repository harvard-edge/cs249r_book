title: Managing gradient accumulation with mixed precision and autocast on MI300X
scenario: You are training a 13B model on MI300X (192GB, 5.3TB/s) with gradient accumulation over 8 micro-batches to simulate an effective batch size of 512. You use torch.cuda.amp.autocast() for BF16 training. Gradients are exploding and loss is NaN after ~1000 steps.
question: How should you structure BF16 autocast and gradient accumulation over 8 micro-batches on MI300X to avoid NaNs?
details:
  realistic_solution: For BF16 on MI300X/ROCm, use torch.autocast(device_type='cuda', dtype=torch.bfloat16) in PyTorch ROCm builds if CUDA is the exposed device API, or the ROCm-supported autocast device type for that environment. Do not use GradScaler for BF16. For accumulation, divide the loss by 8 or otherwise average gradients consistently, call backward() on each micro-batch, call optimizer.step() once after the eighth backward, then zero gradients. Clip gradients before the optimizer step and check model-specific instability sources if NaNs persist.
  common_mistake: |
    **The Pitfall:** Calling scaler.step() and scaler.update() after every micro-batch instead of after the full accumulation.
    **The Rationale:** With BF16 (unlike FP16), dynamic loss scaling isn't needed, but teams blindly copy legacy FP16 accumulation code.
    **The Consequence:** Gradients explode and loss hits NaN after a few hundred steps due to inappropriate scaling artifacts.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X using BF16 autocast.
    - Gradient accumulation over 8 steps.

    **Calculations:**
    - BF16 range: +-3.4e38 (same as FP32). FP16 range: +-65504.
    - If the loss is averaged by dividing each micro-batch loss by 8, the accumulated gradient matches the intended effective batch gradient.
    - If the loss is not divided, the gradient is the sum over 8 micro-batches, equivalent to using an 8x larger learning-rate scale for that step.
    - BF16 does not require dynamic loss scaling; GradScaler is an FP16 underflow workaround, not the right fix here.

    **Conclusion & Interpretation:**
    - Correct accumulation semantics and optimizer-step placement matter more than BF16 range. Use BF16 autocast without GradScaler, average or tune the gradient scale intentionally, clip before the single optimizer step, and debug remaining NaNs as model/optimizer instability.
