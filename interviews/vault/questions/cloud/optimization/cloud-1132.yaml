title: Evaluating GPU Upgrades vs Software Batching for MLPs
scenario: You are evaluating a batch-1 dense 8192x8192 FP16 MLP pipeline. A proposal suggests upgrading from A100 to H100 GPUs for a >3x latency reduction.
question: Will upgrading from A100 to H100 deliver a >3x latency reduction for batch-1 FP16 inference, or should you implement continuous batching?
details:
  realistic_solution: Reject the upgrade. At batch=1, the operation is purely memory-bound, providing only a 1.67x speedup matching the bandwidth ratio. Implement continuous batching to scale throughput instead.
  common_mistake: |
    **The Pitfall:** Evaluating expected speedup using the peak TFLOPS ratio.
    **The Rationale:** Failing to calculate arithmetic intensity.
    **The Consequence:** Recommending a multi-million dollar hardware upgrade that fails to deliver expected latency reductions.
  napkin_math: |
    **Assumptions & Constraints:**
    - One batch-1 dense layer: y = W x, with W sized 8192 x 8192 in FP16.
    - Weight bytes dominate: 8192 * 8192 * 2 bytes = 134.2 MB.
    - FLOPs: 2 * 8192 * 8192 = 134.2 MFLOPs.
    - A100 memory bandwidth ≈ 2.0 TB/s; H100 memory bandwidth ≈ 3.35 TB/s.

    **Calculations:**
    - Arithmetic intensity ≈ 134.2M FLOPs / 134.2M bytes = 1 FLOP/Byte.
    - A100 compute roofline crossover is far above 1 FLOP/Byte, so batch-1 inference is memory-bandwidth-bound.
    - Memory-bound latency floor on A100: 134.2 MB / 2.0 TB/s ≈ 67µs per layer.
    - Memory-bound latency floor on H100: 134.2 MB / 3.35 TB/s ≈ 40µs per layer.
    - H100 latency speedup ceiling: 67µs / 40µs ≈ 1.67x, not >3x.

    **Conclusion & Interpretation:**
    - **Result: 1.67x Latency Ceiling (Memory-Bandwidth-Bound)**. The hardware upgrade will not deliver >3x batch-1 latency reduction. Continuous batching is a separate throughput optimization, not the batch-1 latency answer.
