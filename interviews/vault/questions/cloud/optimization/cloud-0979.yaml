title: Evaluating Gradient Bucketing for Overlap
scenario: You are optimizing the distributed training of a 30B parameter LLM across 64 GPUs using PyTorch FSDP. Profiling reveals that GPU SMs stall frequently during the backward pass waiting for gradient reductions, and network utilization is bursty. The measured effective per-GPU communication bandwidth for gradient reductions is 400 GB/s, and each backward block has about 1.0 ms of compute that can potentially hide communication.
question: Which gradient bucket size and CUDA stream configuration should you use for FSDP on 64 GPUs to maximize communication-computation overlap?
details:
  realistic_solution: The bucket size should be tuned against the measured per-layer compute/communication ratio, not treated as a universal constant. With decimal units for the stated bandwidth, a 100 MB bucket at 400 GB/s takes about 0.25 ms and can fit under the 1.0 ms compute window, while a 1 GB bucket takes about 2.5 ms and would expose roughly 1.5 ms if it starts after the compute window. Use the default compute stream for backward kernels plus a dedicated high-priority communication stream for FSDP reductions; record an event when a bucket becomes ready, make the comm stream wait on that event, launch the reduce-scatter/all-reduce immediately, and make later consumers wait only when they need the reduced shard. Sweep medium bucket sizes such as 25-100 MB under profiler validation.
  common_mistake: |
    **The Pitfall:** Assuming that the largest possible bucket size (e.g., 1GB) is always optimal.
    **The Rationale:** Candidates think it maximizes network bandwidth utilization per transfer, forgetting it delays the start of communication.
    **The Consequence:** This prevents overlap with the backward pass and exposes the full transfer latency, stalling the pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Backward Compute Time: 1.0 ms per block.
    - Effective gradient-reduction bandwidth: 400 GB/s per GPU for this measured setup.
    - Use decimal units for consistency: 1 GB = 1000 MB.
    - Assume the bucket's transfer starts after its producing block and can overlap with the next 1.0 ms compute window.

    **Calculations:**
    - Network Transfer Time (100MB): 100 MB / 400,000 MB/s = 0.00025s = 0.25 ms.
    - Network Transfer Time (1GB): 1000 MB / 400,000 MB/s = 0.0025s = 2.5 ms.
    - Exposed stall for 100MB bucket: max(0, 0.25 ms - 1.0 ms) = 0 ms.
    - Exposed stall for 1GB bucket: max(0, 2.5 ms - 1.0 ms) = 1.5 ms.

    **Conclusion & Interpretation:**
    - **Result: conditional 1.5 ms stall for 1GB buckets (Communication-Bound)**. In this measured setup, medium buckets are more likely to overlap cleanly, but the exact optimum must be validated with the model's layer sizes, fabric behavior, and FSDP implementation.
