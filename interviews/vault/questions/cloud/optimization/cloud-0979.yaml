title: Evaluating Gradient Bucketing for Overlap
scenario: You are optimizing the distributed training of a 30B parameter LLM across 64 GPUs using PyTorch FSDP. Profiling reveals that GPU SMs stall frequently during the backward pass waiting for gradient reductions, and network utilization is bursty.
question: 'Which gradient bucket size and CUDA stream configuration should you use for FSDP on 64 GPUs to maximize communication-computation overlap?'
details:
  realistic_solution: 'The optimal bucket size balances kernel launch/network latency overhead with the ability to overlap communication with computation. A medium bucket size (~25MB to 100MB) is usually optimal. Using separate CUDA streams for AllReduce and compute, a 100MB bucket transfers in 0.25ms — fully hidden behind the 1.0ms backward compute per block. A 1GB bucket takes 2.5ms, stalling the next block by 1.5ms.'
  common_mistake: |
    **The Pitfall:** Assuming that the largest possible bucket size (e.g., 1GB) is always optimal.
    **The Rationale:** Candidates think it maximizes network bandwidth utilization per transfer, forgetting it delays the start of communication.
    **The Consequence:** This prevents overlap with the backward pass and exposes the full transfer latency, stalling the pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Backward Compute Time: 1.0 ms per block.

    **Calculations:**
    - Network Transfer Time (100MB): 100 MB / 400 GB/s = 0.25 ms.
    - Network Transfer Time (1GB): 1000 MB / 400 GB/s = 2.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 1.5 ms stall (Communication-Bound)**. A 100MB bucket completely hides communication, while a 1GB bucket stalls computation by 1.5 ms.
