title: Evaluating Overparameterization and Double Descent in Vision Models
scenario: Your ML team is training a custom vision model for medical anomaly detection using a dataset of 500,000 labeled images across 100 classes. A baseline model with 10M parameters shows the test error initially dropping but then increasing as training loss approaches zero (classic overfitting). One engineer suggests applying heavy dropout and early stopping for your strict 50ms P99 inference latency budget on T4 GPUs. Another engineer proposes scaling the architecture aggressively to 150M parameters and training well past the point of zero training error.
question: Under what conditions is scaling to 150M parameters theoretically justified, and how do you reconcile it with the 50ms inference latency budget?
details:
  realistic_solution: Treat the 150M parameter model as an empirical candidate, not as a theory-guaranteed fix. Scaling past the interpolation region is justified only if held-out medical validation, calibration, and subgroup metrics improve versus the 10M baseline and the deployment path can still meet the 50ms P99 budget. For serving, measure the actual architecture on T4 GPUs at the target batch size; INT8 quantization, pruning, or distillation may help, but only a benchmarked P99 latency result should decide whether the 150M model ships directly or becomes a teacher for a smaller student.
  common_mistake: |
    **The Pitfall:** Assuming the classic U-shaped bias-variance curve holds indefinitely.
    **The Rationale:** Many engineers are trained strictly on classical ML theory and believe that adding capacity beyond the point of zero training error will permanently ruin generalization.
    **The Consequence:** Teams artificially constrain model capacity (getting stuck at the critical peak of double descent) and leave significant accuracy on the table.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 500k samples, 100 classes.
    - T4 GPU latency budget: 50ms P99.
    - Candidate model: 150M parameters; architecture, image size, batch size, activation sizes, preprocessing, and kernel efficiency determine latency.

    **Calculations:**
    - Parameter storage (FP32): 150M × 4 bytes = 600MB.
    - Parameter storage (INT8): 150M × 1 byte = 150MB, before scales, metadata, activations, and framework overhead.
    - Latency decision: benchmark P99 end-to-end latency on the T4 with the intended batch size and input resolution, including activation memory, data movement, preprocessing, and postprocessing.
    - Deployment constraint: ship the 150M model only if measured P99 ≤ 50ms; otherwise distill or compress it and re-measure.

    **Conclusion & Interpretation:**
    - **Result: Benchmark-Gated**. Overparameterization is a hypothesis to validate, and INT8 reduces parameter storage but does not guarantee the 50ms P99 latency budget.
