title: FlashAttention for Cross-Attention in Multimodal Models
scenario: You build a multimodal model where a 2048-token text sequence cross-attends to 16384 image patch tokens on a GPU. The Q comes from text (2048 tokens) and K,V come from image patches (16384 tokens). Standard cross-attention materializes a 2048x16384 matrix.
question: Is this cross-attention operation memory-bound or compute-bound with standard attention, and how does FlashAttention-2 change this?
details:
  realistic_solution: Standard cross-attention requires massive HBM read/write volume for the rectangular attention matrix, bottlenecking on memory bandwidth. FlashAttention-2 avoids materializing this matrix to HBM, drastically increasing the arithmetic intensity and making it compute-bound.
  common_mistake: |
    **The Pitfall:** Treating cross-attention identically to self-attention for FlashAttention analysis.
    **The Rationale:** Engineers assume a square NxN attention matrix, forgetting that cross-attention produces a rectangular MxN matrix, which alters the tiling and IO arithmetic intensity.
    **The Consequence:** Incorrect IO bandwidth and speedup estimations for multimodal workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2048 text tokens, 16384 image tokens, 64 heads, 1.1 TFLOPs compute.

    **Calculations:**
    - Q = 0.5MB, K = 4MB, V = 4MB.
    - Standard Matrix S: 2048 × 16384 × 2 bytes ≈ 67.1MB.
    - Standard IO per head: 0.5 + 4 + 4 + (2 × 67.1) + 0.5 = 143.2MB. Total = 64 × 143.2MB ≈ 9.16GB.
    - Standard Intensity: 1.1 TFLOPs / 9.16GB ≈ 120 FLOPs/Byte.
    - Flash IO: Drops matrix S. Total = 64 × 9MB = 576MB.
    - Flash Intensity: 1.1 TFLOPs / 576MB ≈ 1910 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. FlashAttention-2 transforms the operation from memory-bound (~120 FLOPs/Byte) to compute-bound (~1910 FLOPs/Byte).
