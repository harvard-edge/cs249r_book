title: Gradient accumulation correctness with DDP and autograd on MI300X
scenario: You are using PyTorch DDP across 8 MI300X GPUs with gradient accumulation over 4 micro-batches. Each GPU has a 2 GB gradient tensor per micro-batch. Effective batch size should be 2048, but validation loss is worse than the 8-GPU baseline without accumulation.
question: How should DDP synchronize 4 micro-batches, and how much AllReduce traffic is avoided per optimizer step?
details:
  realistic_solution: Use `ddp_model.no_sync()` for the first 3 micro-batches and allow DDP to AllReduce only on the 4th backward pass before the optimizer step. One ring AllReduce over 8 GPUs with a 2 GB gradient moves 2 x (N-1)/N x D x N = 28 GB. Synchronizing every micro-batch would move 112 GB, so correct accumulation avoids 84 GB per optimizer step and preserves the intended gradient averaging.
  common_mistake: |
    **The Pitfall:** Not using `ddp_model.no_sync()` during micro-batch accumulation steps.
    **The Rationale:** Without `no_sync()`, DDP triggers an AllReduce after every backward call, averaging gradients over the wrong effective batch size.
    **The Consequence:** Gradient averaging is applied 4 times instead of once, fundamentally altering the math and degrading convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs, 2 GB gradient per GPU per micro-batch.
    - 4 micro-batches are accumulated before one optimizer step.

    **Calculations:**
    - One ring AllReduce traffic = 2 * (8 - 1) / 8 * 2 GB * 8 GPUs = 28 GB.
    - Incorrect synchronization on every micro-batch = 4 * 28 GB = 112 GB.
    - Correct `no_sync()` accumulation synchronizes once = 28 GB.
    - Avoided traffic = 112 GB - 28 GB = 84 GB.

    **Conclusion & Interpretation:**
    - **Result: use `no_sync()` for 3 of 4 backwards and avoid 84 GB per optimizer step.** The single final AllReduce preserves the intended effective batch gradient.
