title: Evaluating Unbounded Credit Assignment Strategies
scenario: You are designing the training pipeline for a 2B parameter continuous-learning temporal model. The model processes streaming user event sequences of up to 100,000 steps. Exact credit assignment via standard Backpropagation Through Time (BPTT) requires retaining the full activation history (roughly 4MB per step), which catastrophically exceeds the 80GB VRAM limit.
question: If exact credit assignment over a 32,768-step training horizon is required, should you use TBPTT with a 2,048-step window or full BPTT with gradient checkpointing, and why?
details:
  realistic_solution: Use full BPTT over the required 32,768-step horizon, with gradient checkpointing only as a memory optimization. TBPTT with a 2,048-step window changes the training objective by cutting gradients beyond 2,048 steps, so it cannot provide exact 32k-step credit assignment. Checkpointing does not create longer-range gradients by itself; it reduces saved activation memory inside the chosen unroll by recomputing activations during backward.
  common_mistake: |
    **The Pitfall:** Focusing solely on the computational overhead of activation recomputation.
    **The Rationale:** Failing to realize that Truncated BPTT fundamentally breaks exact credit assignment for long-term dependencies (horizon > window size).
    **The Consequence:** Essentially blinding the model to delayed rewards.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2B parameters, ~4 MB activations per step
    - History: 32,768 steps

    **Calculations:**
    - Standard BPTT: 32,768 * 4 MB = 131 GB (OOM on 80GB limits)
    - TBPTT with a 2,048-step window: 2,048 * 4 MB = 8.2 GB of activations, but gradients stop at the window boundary
    - Example checkpointed full-horizon unroll with 16 segments of 2,048 steps: saved checkpoints are about 16 * 4 MB = 64 MB, while recomputing one active segment needs about 2,048 * 4 MB = 8.2 GB

    **Conclusion & Interpretation:**
    - **Result: Memory vs objective tradeoff.** TBPTT fits memory but loses exact long-range credit assignment; checkpointed full BPTT keeps the 32,768-step objective and trades extra recompute for much lower activation storage than saving all 131 GB.
