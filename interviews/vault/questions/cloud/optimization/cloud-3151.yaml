title: FlashAttention Backward Pass Memory Savings for Training
scenario: You are training a 13B model on 8 GPUs with seq_len=8192, micro_batch=2, 40 layers, 40 heads, head_dim=128. Standard attention stores the full N x N attention matrix for the backward pass.
question: How much activation memory does FlashAttention save by recomputing attention for seq_len=8192, and does it enable a larger batch size?
details:
  realistic_solution: |
    Standard attention stores the massive S = softmax(QK^T) matrix for backward. For seq_len=8192, micro_batch=2, and 40 heads, that is about 10 GiB per layer, or about 400 GiB across 40 layers before sharding. FlashAttention avoids materializing S; it keeps the attention output and per-row softmax statistics needed for recomputation, so the incremental attention-state memory is hundreds of MB per layer rather than 10 GiB. The direct saving is roughly the full 400 GiB of attention-score storage. This can enable a larger microbatch because it removes the dominant activation tensor, but the exact larger batch size depends on the remaining model activations, optimizer state, checkpointing, and sharding; do not claim an unsupported guaranteed 2x batch increase.
  common_mistake: |
    **The Pitfall:** Thinking FlashAttention's recomputation slows training significantly.
    **The Rationale:** Candidates assume recomputation is heavily compute-bound, ignoring that attention is extremely memory-bandwidth-bound, so recomputing on-chip is fast.
    **The Consequence:** Avoiding FlashAttention or larger batch sizes out of an unfounded fear of recomputation latency overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - seq_len=8192, batch=2, 40 heads, 40 layers.
    - Precision: FP16 (2 bytes).

    **Calculations:**
    - Standard attention score memory per layer: 8192^2 * 2B * 40 heads * 2 batch = 10,737,418,240 bytes ≈ 10 GiB.
    - Across 40 layers: about 400 GiB of stored attention scores.
    - FlashAttention does not materialize the N x N score matrix; it keeps O plus row-wise softmax statistics for recomputation.
    - O per layer: 2 batch * 8192 tokens * 40 heads * 128 dim * 2B ≈ 160 MiB.
    - Log-sum-exp stats per layer: 2 * 40 * 8192 * 4B ≈ 2.5 MiB.
    - Attention-score memory saved: approximately 400 GiB, with recomputation trading extra attention work for much lower HBM traffic.

    **Conclusion & Interpretation:**
    - **Result: Large Activation-Memory Saving**. FlashAttention removes about 400 GiB of attention-score storage for this setup; it can enable a larger batch, but the exact increase requires a full memory budget.
