title: 'Federated Learning Edge-Cloud Energy'
scenario: 'You are deploying a 20MB Federated Learning (FL) model for mobile devices (100,000 daily participants). Transmitting the 20MB payload (Tx/Rx) costs 40 Joules of edge battery. Executing one local training epoch costs 10 Joules. To reach target convergence, you can choose Configuration A: 100 global rounds, 1 local epoch per round. Or Configuration B: 20 global rounds, 10 local epochs per round. Cloud aggregation costs $2.00 per global round. Edge devices have a strict battery limit of max 2% drain on a 36,000 Joule battery.'
question: 'How do Configurations A and B compare on edge energy and cloud cost, and can either meet the 2% battery limit?'
details:
  realistic_solution: 'In Federated Learning systems, communication is vastly more energy-intensive than computation. By analyzing the energy cost per round, we see that transmitting the model takes 4x more energy than running a local epoch. Configuration A minimizes local compute but requires 100 communication rounds, heavily penalizing the edge device''s radio and draining 13.8% of the battery—far exceeding the 2% user-acceptable limit. Configuration B shifts the burden to local compute (10 epochs per round) but drastically reduces communication to 20 rounds. This drops battery drain to 7.7%—still above the 2% limit, but 1.8× better than Config A and vastly cheaper on the cloud side ($40 vs $200). Critically, neither configuration meets the 2% battery constraint as stated. This reveals that the real architectural solution requires a third lever: **model compression**. To hit the 2% target (720J budget), compress the model payload. Using top-k sparsification or quantization reduces the 20MB payload to ~2MB, cutting communication energy to 4J/round.'
  common_mistake: |
    **The Pitfall:** Minimizing local epochs to save edge compute power while ignoring communication costs.
    **The Rationale:** It's a common misconception that deep learning compute is the primary power drain on mobile devices, ignoring the fact that radio transmission (Tx/Rx) vastly outweighs local compute energy.
    **The Consequence:** Selecting a configuration with too many communication rounds quickly drains the user's battery, leading to user complaints, uninstalls, and failure to meet the 2% battery constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Battery Budget: 2% of 36,000J = 720J.
    - Config A Energy: 100 rounds * (40J comm + 10J compute) = 5,000J.
    - Config B Energy: 20 rounds * (40J comm + 100J compute) = 2,800J.
    
    **Calculations:**
    - Compression: 10x reduces 20MB payload to 2MB, reducing comm to 4J.
    - Compressed Energy: 7 rounds * (4J + 100J) = 728J.
    
    **Conclusion & Interpretation:**
    - **Result: 728J (Communication-Bound)**. Extreme model compression is the only viable path to meet the strict 2% battery limit.
  options:
  - 'Config A drains 13.8% battery and costs $200; Config B drains 7.7% and costs $40. Neither meets the 2% battery limit without model compression.'
  - 'Config A meets the 2% battery limit because it only runs 1 local epoch, whereas Config B drains 7.7% battery due to the high compute cost of 10 epochs.'
  - 'Config B meets the 2% battery limit because it reduces communication rounds from 100 to 20, saving massive amounts of Tx/Rx energy.'
  - 'Both configurations meet the 2% battery limit, but Config B is preferred because it reduces cloud costs from $200 to $40.'
