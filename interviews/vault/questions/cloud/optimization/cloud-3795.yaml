title: FlashAttention Roofline Crossover on MI300X
scenario: FlashAttention reduces attention HBM traffic from O(N²) to O(N), but prefill compute remains O(N²d). On an MI300X, use a roofline estimate with 1,307 TFLOPS compute, 5.3 TB/s bandwidth, 2048N² attention FLOPs, and 320 KB of KV memory traffic per token.
question: At what sequence length does FlashAttention prefill become compute-bound on an MI300X?
details:
  realistic_solution: 'The MI300X roofline ridge point is compute divided by bandwidth: 1,307 TFLOPS / 5.3 TB/s = 246.6 FLOPS/byte. With the provided model, FlashAttention prefill arithmetic intensity is (2048N² FLOPs) / (320,000N bytes) = 0.0064N FLOPS/byte. Setting 0.0064N = 246.6 gives N ≈ 38,531 tokens. Below roughly 38.5K tokens this simplified model is memory-bandwidth-bound; above it the attention prefill becomes compute-bound. This answer classifies the bottleneck only. It does not prove a latency target or require switching to a linear-attention architecture.'
  common_mistake: |
    **The Pitfall:** Claiming linear attention is universally better.
    **The Rationale:** Candidates see O(N) compute complexity and assume it's a strict upgrade over O(N^2) FlashAttention.
    **The Consequence:** Deploying linear attention causes quality degradation for tasks requiring precise long-range token-to-token retrieval.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X specs: 1,307 TFLOPS compute, 5.3 TB/s memory bandwidth.
    - Prefill Attention FLOPs: 2048 * seq_len^2.
    - Prefill KV Memory: 320 KB * seq_len.

    **Calculations:**
    - Hardware Ridge Point (FLOPs/byte) = 1,307 TFLOPS / 5.3 TB/s = 246.6 FLOPs/byte.
    - Arithmetic Intensity = (2048 * seq_len^2) / (320,000 * seq_len) = 0.0064 * seq_len FLOPs/byte.
    - Crossover point: 0.0064 * seq_len = 246.6 FLOPs/byte -> seq_len ≈ 38,531 tokens.

    **Conclusion & Interpretation:** At ~38.5K tokens, the arithmetic intensity surpasses the hardware ridge point. Result: compute-bound above this point and memory-bandwidth-bound below it under the stated model.
