title: CPU Transform Wall Hidden By GPU Metrics
scenario: A training dashboard reports GPU utilization at only 55%. Kernel traces show the model kernels are efficient when they run. The input pipeline performs random resize, JPEG decode, and tokenization on CPU workers. Increasing the cluster size from 8 to 16 GPUs does not improve throughput.
question: Why does adding GPUs fail to improve throughput when model kernels are efficient but CPU transforms feed the pipeline?
details:
  realistic_solution: The binding wall is the transformation/input pipeline. GPU kernels are efficient, but they are starved by CPU preprocessing. Adding GPUs increases demand on the same CPU transform pipeline, so throughput does not improve. The fix is more preprocessing capacity, GPU-accelerated transforms, caching, or preprocessed shards.
  common_mistake: |
    **The Pitfall:** Interpreting low GPU utilization as a reason to add more GPUs.
    **The Rationale:** Engineers assume that if GPUs aren't at 100%, throwing more hardware at the problem will scale throughput.
    **The Consequence:** Expensive GPUs are added to the cluster but sit idle, burning budget without increasing the number of samples processed per second.
  napkin_math: |
    - 8 GPUs at 55% utilization implies they process data faster than the CPU workers can supply it.
    - Adding 8 more GPUs doubles the demand but leaves the CPU preprocessing supply completely unchanged.
    - New utilization: (Previous Supply) / (16 GPUs) ≈ 27.5% per GPU.
    - **Result: Total throughput remains flat because the CPU pipeline is a hard ceiling; per-GPU utilization just drops in half.**
