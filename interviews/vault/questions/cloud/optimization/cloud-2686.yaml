title: Training Compute Budget Allocation
scenario: 'You have a fixed compute budget of 1e22 FLOPs. Option A: train a 3B model
  on 560B tokens. Option B: train a 7B model on 240B tokens. Option C: train a 1B
  model on 1.67T tokens. All use the 6ND approximation.'
question: Which option produces the best model according to Chinchilla scaling laws,
  and why?
details:
  realistic_solution: 'Verify budgets using the 6ND approximation: A: 6 × 3B × 560B
    = 1.008e22. B: 6 × 7B × 240B = 1.008e22. C: 6 × 1B × 1.67T = 1.002e22. Chinchilla
    scaling laws identify the compute-optimal frontier at roughly 20 tokens per parameter.
    Checking ratios: A: 187 tokens/param. B: 34 tokens/param. C: 1,670 tokens/param.
    Option B is closest to the compute-optimal frontier and yields the highest quality
    weights.'
  common_mistake: '**The Pitfall:** Maximizing token count (Option C) or model size
    without verifying the token-to-parameter ratio.

    **The Rationale:** Assuming more data or more parameters always linearly correlates
    with a better model.

    **The Consequence:** Wasting massive compute budgets undertraining a large model
    or pushing a small model far past its plateau of diminishing returns.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Compute budget: ~1e22 FLOPs\
    \ (6ND approximation).\n   - Chinchilla compute-optimal ratio: ~20 tokens/parameter.\n\
    2. **Calculations:**\n   - Option A: 560B / 3B = 187 tokens/param.\n   - Option\
    \ B: 240B / 7B = 34 tokens/param.\n   - Option C: 1.67T / 1B = 1670 tokens/param.\n\
    3. **Conclusion & Interpretation:**\n   - **Result: Compute-Bound Optimal Allocation.\
    \ Option B (34 tokens/param) is closest to the optimal 20 tokens/param, producing\
    \ the highest quality model for the FLOP budget.**\n"
