title: Physical Limits on Training Cluster Scale
scenario: Explain why you cannot simply double the number of GPUs indefinitely to halve training time, and identify the three physical ceilings that bound cluster scaling.
question: Why can't you keep halving training time by doubling GPUs, and what three physical ceilings limit cluster scaling?
details:
  realistic_solution: 'Three physical ceilings prevent infinite scaling: (1) Communication bottleneck — synchronous training requires AllReduce to average gradients across all GPUs every step. Ring AllReduce usually has O(N) communication steps but efficient bandwidth use; tree-based collectives are the ones associated with O(log N) latency depth. In either case, per-GPU communication is bounded by link rate, topology, and network bisection bandwidth. At 10,000+ GPUs, gradient exchange can consume a material fraction of each training step. (2) Power density — each GPU draws 300-700W. A 10,000 GPU cluster requires 3-7 MW just for GPUs, plus server, networking, conversion, and cooling overhead. Few facilities can deliver >10MW to a single compute floor. The power infrastructure takes 18-24 months to build. (3) Batch-size scaling limits — doubling data-parallel GPUs usually doubles global batch size unless the workload is repartitioned. Beyond the task critical batch size, higher step throughput
    no longer translates linearly into faster convergence, so scaling efficiency falls. These ceilings interact: model parallelism can relieve batch-size pressure, but it usually increases communication pressure.'
  common_mistake: |
    **The Pitfall:** Believing that adding more GPUs always speeds up training linearly.
    **The Rationale:** Beyond the critical batch size, scaling efficiency drops below 50%.
    **The Consequence:** Meaning half the GPUs are wasted.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 GPUs.
    - Per-GPU power draw: 400W for the accelerator alone.
    - Synchronous data-parallel training requires collective communication each step.
    - Increasing data-parallel GPU count usually increases global batch size unless the workload is repartitioned.

    **Calculations:**
    - Power floor: 10,000 * 400W = 4MW for GPUs alone. With servers, networking, power conversion loss, and cooling, facility demand can approach or exceed 8-10MW.
    - Communication ceiling: ring AllReduce has roughly 2(N-1) pipeline steps and a bandwidth term near 2(N-1)/N times the gradient size per GPU; tree collectives reduce latency depth to O(log N) but still depend on topology and bisection bandwidth. At large N, each step can spend a material fraction of time waiting on gradient exchange instead of compute.
    - Batch-size ceiling: if per-GPU batch is fixed, doubling data-parallel GPUs doubles global batch. Past the task's critical batch size, step throughput improves but optimization needs more or lower-quality steps, reducing scaling efficiency.

    **Conclusion & Interpretation:**
    - **Result: scaling hits communication, power/cooling, and optimization ceilings.** Doubling GPUs cannot keep halving wall-clock time once any one of these ceilings dominates.
