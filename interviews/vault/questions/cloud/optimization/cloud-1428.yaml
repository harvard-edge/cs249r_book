title: Diagnosing Attribution Collapse in Interleaved RecSys
scenario: An e-commerce platform is evaluating a new embedding-based retrieval model against a legacy BM25 model. In standard A/B testing, the neural model shows a +1.5% conversion lift. However, in a Team Draft Interleaving experiment, the neural model's attribution drops by 12% relative to BM25. Both models share 60% of their top-10 items.
question: What is causing the discrepancy between the A/B test and the interleaving results?
details:
  realistic_solution: Identify that the naive Team Draft Interleaving algorithm's deduplication logic is arbitrarily assigning credit for shared items to the BM25 model (if it drafts first or via coin-flip bias), starving the neural model of its highest-confidence predictions. The fix is to implement shared-credit attribution or use Probabilistic Interleaving.
  common_mistake: |
    **The Pitfall:** Assuming the neural model suffers from latency degradation in production, or that the A/B test lacked statistical significance.
    **The Rationale:** This misses the deduplication bias inherent in the naive Team Draft Interleaving algorithm when models have high overlap.
    **The Consequence:** Unfairly penalizing the superior neural model and rolling back a feature that actually increases conversion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Top-K items: 10 per model.
       - Overlap: 60% (6 items shared).
    2. **Calculations:**
       - Total unique items pool: (10 + 10) - 6 = 14 items.
       - If BM25 drafts first, it selects shared item #1.
       - Neural model tries to select item #1, fails (deduplicated), selects item #2.
       - Credit assignment heavily skews toward the model that drafts first.
    3. **Conclusion & Interpretation:** **Naive deduplication inherently penalizes overlapping outputs. Attribution-Logic-Bound.**
