title: Team Draft Interleaving Attribution Bias in RecSys
scenario: An e-commerce platform is evaluating a new embedding-based retrieval model against a legacy BM25 model. In standard A/B testing, the neural model shows a +1.5% conversion lift. However, in a Team Draft Interleaving experiment, the neural model's attribution drops by 12% relative to BM25. Both models share 60% of their top-10 items, and the implementation assigns each deduplicated shared item to the ranker that first drafted it.
question: What is causing the discrepancy between the A/B test and the interleaving results?
details:
  realistic_solution: Identify that the naive Team Draft Interleaving algorithm's deduplication logic is arbitrarily assigning credit for shared items to the BM25 model (if it drafts first or via coin-flip bias), starving the neural model of its highest-confidence predictions. The fix is to implement shared-credit attribution or use Probabilistic Interleaving.
  common_mistake: |
    **The Pitfall:** Assuming the neural model suffers from latency degradation in production, or that the A/B test lacked statistical significance.
    **The Rationale:** This misses the deduplication bias inherent in the naive Team Draft Interleaving algorithm when models have high overlap.
    **The Consequence:** Unfairly penalizing the superior neural model and rolling back a feature that actually increases conversion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Top-K items: 10 per model.
    - Overlap: 60%, so 6 items are shared and only 4 are unique to each model.
    - Team Draft Interleaving must deduplicate shared items before showing a single ranked list.

    **Calculations:**
    - Total unique candidate pool: 10 + 10 - 6 = 14 items.
    - With 6 shared items, much of the click opportunity comes from items both rankers wanted.
    - If the implementation assigns shared-item ownership to whichever ranker drafted first, or to a deterministic tie-breaker, clicks on those shared items can be credited systematically to BM25 even when the neural model also ranked them highly.
    - The attribution gap can therefore reflect credit-assignment bias rather than true user preference.

    **Conclusion & Interpretation:**
    - **Result:** High overlap makes naive Team Draft Interleaving sensitive to shared-item ownership. Use shared-credit attribution, randomized tie-breaking with audit checks, or Probabilistic Interleaving to avoid penalizing the neural ranker.
