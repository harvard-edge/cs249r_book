title: Diagnosing Explainability Control Plane Latency
scenario: A trust-and-safety API serves a 70B parameter LLM. The control plane captures per-layer attention entropy and MoE routing probabilities for real-time explainability dashboards. At peak load, P99 latency spikes from 55ms/token to over 400ms/token. Profiling shows GPU utilization drops from 85% to 30%, while CPU utilization on the control plane node remains under 40%. The system extracts 2GB of internal state tensors at each of 9 instrumented sync points per token via standard Device-to-Host PCIe transfers.
question: What is causing the 400ms/token P99 spike, and how would you extract the 2GB of state without starving the GPUs?
details:
  realistic_solution: |
    Synchronous PCIe transfers are blocking the main CUDA compute stream. Allocate pinned host buffers, issue `cudaMemcpyAsync` on a separate non-default copy stream, and use explicit CUDA events so only the observability consumer waits on the copied state. Avoid default-stream synchronization or device-wide barriers in the serving path.
  common_mistake: |
    **The Pitfall:** Assuming the control plane CPU is the bottleneck.
    **The Rationale:** Candidates see low GPU utilization and assume the CPU is too slow to process the 2GB payload, missing the synchronous PCIe blocking issue.
    **The Consequence:** Unnecessary hardware upgrades or heavy downsampling of explainability state, completely missing the true stream synchronization overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2GB state extracted at each of 9 instrumented sync points per token.
    - PCIe Gen5 x16 effective bandwidth: ~50 GB/s.
    - Baseline token generation time: 55ms.

    **Calculations:**
    - PCIe transfer time per extraction: 2GB / 50 GB/s = 0.04s = 40ms.
    - Serialized synchronous transfer overhead: 9 * 40ms = 360ms.
    - Observed P99 token time: 55ms baseline + 360ms transfer stalls = 415ms/token.

    **Conclusion & Interpretation:**
    - **Result: ~415ms/token if synchronized (PCIe/Stream-Bound)**. The 40ms copies must be placed on a separate copy stream and overlapped with compute to avoid starving the GPUs.
