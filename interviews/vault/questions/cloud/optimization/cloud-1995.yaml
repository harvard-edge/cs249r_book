title: Diagnosing Explainability Control Plane Latency
scenario: 'A trust-and-safety API serves a 70B parameter LLM. The control plane captures per-layer attention entropy and MoE routing probabilities for real-time explainability dashboards. At peak load, P99 latency spikes from 55ms/token to over 400ms/token. Profiling shows GPU utilization drops from 85% to 30%, while CPU utilization on the control plane node remains under 40%. The system extracts 2GB of internal state tensors per forward pass via standard Device-to-Host PCIe transfers.'
question: 'What is causing the 400ms/token P99 spike, and how would you extract the 2GB of state without starving the GPUs?'
details:
  realistic_solution: |
    Synchronous PCIe transfers are blocking the main CUDA compute stream. The solution is to allocate pinned host memory and use `cudaMemcpyAsync` on a secondary CUDA stream to extract the state asynchronously without blocking the forward pass.
  common_mistake: |
    **The Pitfall:** Assuming the control plane CPU is the bottleneck.
    **The Rationale:** Candidates see low GPU utilization and assume the CPU is too slow to process the 2GB payload, missing the synchronous PCIe blocking issue.
    **The Consequence:** Unnecessary hardware upgrades or heavy downsampling of explainability state, completely missing the true stream synchronization overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2GB state extracted per forward pass.
    - PCIe Gen5 x16 effective bandwidth: ~50 GB/s.
    - Baseline token generation time: 55ms.

    **Calculations:**
    - PCIe transfer time: 2GB / 50 GB/s = 0.04s = 40ms.
    - If synchronous, total time = 55ms + 40ms = 95ms per layer sync, compounding dramatically across layers to 400ms.

    **Conclusion & Interpretation:**
    - **Result: 40ms transfer latency (PCIe/Stream-Bound)**. Asynchronous transfers are required to hide the latency behind the 55ms compute time.
