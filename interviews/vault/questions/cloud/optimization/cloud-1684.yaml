title: Evaluating Pareto Optimal Models for Fraud Detection
scenario: 'Your team is deploying a real-time fraud detection service on a cluster of GPUs. You have profiled four candidate architectures: Model W (F1: 0.94, Latency: 80ms, Throughput: 150 req/s), Model X (F1: 0.92, Latency: 45ms, Throughput: 300 req/s), Model Y (F1: 0.90, Latency: 55ms, Throughput: 250 req/s), and Model Z (F1: 0.97, Latency: 200ms, Throughput: 60 req/s). The business SLA mandates a strict maximum latency of 100ms.'
question: Which models are Pareto-optimal, which are dominated, and how should the 100ms SLA affect the final choice?
details:
  realistic_solution: 'Identify the global Pareto frontier as Models X, W, and Z. Model Y is strictly dominated by X because X has higher F1, lower latency, and higher throughput. Then apply the 100ms SLA as a hard feasibility filter: Model Z is Pareto-optimal globally but infeasible for this service. The final SLA-feasible choice is between X and W. Moving from X to W yields a +0.02 F1 improvement but increases latency by 35ms and halves throughput, so the final selection depends on whether the business value of the F1 gain outweighs the extra serving capacity.'
  common_mistake: |
    **The Pitfall:** Blindly selecting Model W because it has the highest F1 score under the latency budget.
    **The Rationale:** Candidates focus solely on accuracy and latency limits, failing to quantify the massive throughput penalty.
    **The Consequence:** Doubling the infrastructure hardware cost for a marginal 2% accuracy gain.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: 100ms.

    **Calculations:**
    - Objective directions: maximize F1 and throughput, minimize latency.
    - Dominance check: Y is dominated by X because X has higher F1 (0.92 vs 0.90), lower latency (45ms vs 55ms), and higher throughput (300 vs 250 req/s).
    - Global Pareto frontier: X, W, and Z. Z is not globally dominated because it has the best F1, despite worse latency and throughput.
    - SLA filter: Z violates the 100ms maximum latency, leaving X and W as the SLA-feasible Pareto candidates.
    - X to W trade-off: F1 +0.02, latency +35ms, throughput -150 req/s.
    - Example capacity at 1000 req/s: X needs ceil(1000 / 300) = 4 serving units; W needs ceil(1000 / 150) = 7 serving units.

    **Conclusion & Interpretation:**
    - **Result: X or W after SLA filtering (Throughput-Bound)**. W buys a 0.02 F1 gain at about 75% more serving capacity in the example; choose it only if that accuracy gain justifies the cost.
