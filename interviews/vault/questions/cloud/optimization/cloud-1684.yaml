title: Evaluating Pareto Optimal Models for Fraud Detection
scenario: 'Your team is deploying a real-time fraud detection service on a cluster of GPUs. You have profiled four candidate architectures: Model W (F1: 0.94, Latency: 80ms, Throughput: 150 req/s), Model X (F1: 0.92, Latency: 45ms, Throughput: 300 req/s), Model Y (F1: 0.90, Latency: 55ms, Throughput: 250 req/s), and Model Z (F1: 0.97, Latency: 200ms, Throughput: 60 req/s). The business SLA mandates a strict maximum latency of 100ms.'
question: 'Which models are Pareto-optimal, which are dominated, and how should the 100ms SLA affect the final choice?'
details:
  realistic_solution: 'Identify the Pareto frontier as Models X, W, and Z. Model Y is strictly dominated by X (worse F1, worse latency, worse throughput). Apply the 100ms SLA constraint to eliminate Model Z. Evaluate the trade-off between the remaining Pareto-optimal candidates, X and W: moving from X to W yields a +0.02 F1 improvement but halves the throughput, requiring double the hardware footprint to serve the same traffic volume. The final selection depends on whether the business value of a 2% F1 gain outweighs the doubled inference compute cost.'
  common_mistake: |
    **The Pitfall:** Blindly selecting Model W because it has the highest F1 score under the latency budget.
    **The Rationale:** Candidates focus solely on accuracy and latency limits, failing to quantify the massive throughput penalty.
    **The Consequence:** Doubling the infrastructure hardware cost for a marginal 2% accuracy gain.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: 100ms.

    **Calculations:**
    - Eliminations: Model Z violates 100ms SLA. Model Y is strictly dominated by X.
    - Pareto Frontier: X and W remain.
    - Trade-off Analysis: X to W yields F1 +0.02, Latency +35ms, Throughput -150 req/s (half).
    - Hardware Cost (at 1000 req/s): Model X requires ceil(1000/300) = 4 GPUs. Model W requires ceil(1000/150) = 7 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 7 GPUs (Throughput-Bound)**. Model W requires 75% more hardware for a 2% F1 gain.
