title: The Statistically Invalid Benchmark
scenario: A colleague runs their new inference optimization 3 times, gets throughput numbers of 1,050, 1,120, and 980 tokens/sec, and reports a '5% improvement' over the 1,000 tokens/sec baseline. You suspect the result is noise.
question: "How do you determine whether this improvement is statistically significant, and what is the minimum number of runs needed?"
details:
  realistic_solution: Compute the sample statistics and run a one-sample t-test. With a mean of 1,050 and std dev of ~70, the coefficient of variation (6.7%) exceeds the claimed 5% effect size. The p-value is > 0.30, meaning the result is statistically insignificant. To achieve a statistical power of 0.8 at alpha = 0.05 for a 5% effect size, perform a power analysis to calculate the required minimum sample size (~15 runs), ensuring proper controls for GPU warm-up and DVFS frequency settling.
  common_mistake: |
    **The Pitfall:** Accepting the median or mean of 3 runs as proof of an architectural improvement.
    **The Rationale:** Engineers often lack rigorous statistical training, assuming that because the mean is higher, the optimization "worked," ignoring massive variance from background system noise.
    **The Consequence:** Merging "phantom optimizations" that increase code complexity without delivering real performance gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Samples: 1050, 1120, 980 (n=3).
       - Baseline: 1000 tokens/sec.
       - Claimed effect: 50 tokens/sec (5%).
       - Target Power (1-beta): 0.8, Alpha: 0.05.
    2. **Calculations:**
       - Mean = 1050, StdDev (sigma) = 70.
       - CoV = 70 / 1050 = 6.7% (Noise > Signal).
       - t-statistic = 50 / (70 / sqrt(3)) = 1.24 (p = 0.34, fail to reject null).
       - Required n = (Z_alpha + Z_beta)^2 * sigma^2 / delta^2
       - Required n = (1.96 + 0.84)^2 * 70^2 / 50^2 = 7.84 * 4900 / 2500 = 15.3.
    3. **Conclusion & Interpretation:**
       - **Result: Not Significant; n=16 required.** The measurement is **Variance-Bound**. At least 16 measured runs (plus discarded warm-ups) are required to prove a 5% gain.
