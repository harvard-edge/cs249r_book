title: Computational Graph Node Fusion
scenario: You are analyzing the execution of a framework's computational graph on an NVIDIA GPU. A specific model sub-layer consists of 5 sequential element-wise operations. The framework incurs a fixed CPU dispatch overhead of 15 µs for every node in the computational graph. The actual GPU computation takes 5 µs per node. An optimization pass fuses these 5 nodes into a single composite node in the graph. Assume the total GPU compute time remains purely additive (25 µs).
question: What are the total execution times before and after fusing the 5 element-wise graph nodes, and what speedup does fusion provide?
details:
  realistic_solution: Calculate the time spent on dispatch vs computation. Before fusion, the 5 separate nodes each incur the 15 µs overhead and 5 µs compute, taking 100 µs total. After fusion, the graph contains 1 node, incurring a single 15 µs overhead for all 25 µs of compute. This reduces total execution time to 40 µs, achieving a 2.5x speedup.
  common_mistake: |
    **The Pitfall:** Assuming computational graphs only optimize memory bandwidth or FLOPs.
    **The Rationale:** Candidates focus entirely on device-side metrics (GPU utilization) and ignore host-side dispatch mechanics.
    **The Consequence:** Missing the significant latency reduction gained by eliminating repeated framework dispatch overheads for small, fast operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Unfused: 5 nodes, 15 µs dispatch + 5 µs compute per node.
       - Fused: 1 node, 15 µs dispatch + 25 µs compute.
    2. **Calculations:**
       - Unfused Execution Time: 5 nodes * (15 µs + 5 µs) = 100 µs.
       - Fused Execution Time: 1 node * 15 µs + 25 µs = 40 µs.
       - Speedup: 100 µs / 40 µs = 2.5x.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Dispatch Bound.** Fusion yields a 2.5x speedup strictly by eliminating redundant host-to-device kernel launch overheads.
