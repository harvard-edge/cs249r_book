title: Evaluating Payload-to-Tensor Transformation Architectures
scenario: 'Your team is deploying a vision model on NVIDIA A100 GPUs via Triton Inference Server. The TensorRT engine requires an NCHW memory layout in FP16. Currently, clients send base64-encoded JPEGs via REST. The server''s CPU decodes the JPEG (yielding an NHWC array), transposes the layout to NCHW, casts the payload to FP16, and copies it to the GPU. At 500 QPS, the CPU is at 100% utilization, GPU utilization is bottlenecked at 30%, and p99 latency exceeds 250ms.'
question: Should clients send uncompressed FP16 NCHW tensors, or should Triton accept JPEGs and use DALI for GPU preprocessing, and why?
details:
  realistic_solution: 'Maintain small network payloads by accepting compressed JPEGs over gRPC to minimize transmission latency, and offload the JPEG decoding, NHWC-to-NCHW memory layout transformation, and FP16 casting to the GPU using a Triton DALI backend ensemble.'
  common_mistake: 'Recommending that clients send uncompressed NCHW tensors to bypass server-side processing entirely, failing to evaluate the massive network bandwidth explosion and the resulting client-side transmission latency penalty.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 224x224 RGB.
    - Client request rate: 500 QPS.
    - Compressed JPEG size: ~20 KB.
    - Uncompressed NCHW FP16 size: 224 * 224 * 3 * 2 bytes = ~301 KB.
    
    **Calculations:**
    - JPEG Inbound bandwidth: 500 QPS * 20 KB = 10 MB/s.
    - NCHW Inbound bandwidth: 500 QPS * 301 KB = 150.5 MB/s.
    - Payload expansion factor: 301 KB / 20 KB ≈ 15x.
    
    **Conclusion & Interpretation:**
    - **Result: 15x Bandwidth Explosion (Network-Bandwidth Bound)**. Forcing clients to send uncompressed NCHW arrays inflates the payload 15x, shifting the bottleneck from GPU decoding to severe network transmission latency.
