title: 'Datacenter Efficiency Mastery: Full-Stack TCO Optimization for H100 Training Facility'
scenario: You are designing a greenfield 10MW IT load GPU datacenter optimized for LLM training on H100 clusters. You must minimize 5-year TCO while meeting PUE<1.15, carbon intensity <100gCO2/kWh, and p99 cooling headroom of 20% for burst workloads.
question: What cooling, power, and location architecture would minimize 5-year TCO for a 10 MW H100 training datacenter under the efficiency constraints?
details:
  realistic_solution: 'Location: Nordic region (Iceland/Norway) — geothermal/hydro power at <20gCO2/kWh, 0-10°C ambient enables free-air cooling 95% of year. Cooling: direct liquid cooling (rear-door heat exchangers + cold plates on H100s) enables PUE=1.06. Power: 480V three-phase direct to rack PDUs (skip transformer tier), 99.9% efficient lithium UPS (vs 94% lead-acid). Facility: 10MW IT load, PUE=1.06 -> 10.6MW total. H100 at 700W: 10MW/700W=14,286 H100s. 20% burst headroom: size cooling for 12MW IT. Annual electricity is 10,600kW×8760h×$0.04/kWh=$3.7M. A consistent 5-year TCO comparison should weigh the Nordic site premium against lower PUE, lower power price, and much lower carbon intensity.'
  common_mistake: |
    **The Pitfall:** Optimizing each subsystem independently.
    **The Rationale:** Candidates often select locations based only on land/power cost without considering cooling climate suitability, or they fail to co-design cooling, power, and network.
    **The Consequence:** Failing to meet PUE targets or significantly increasing OpEx through inefficient synergies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nordic design: 10MW IT, PUE=1.06, power price $0.04/kWh, carbon intensity 20gCO2/kWh.
    - US baseline: 10MW IT, PUE=1.20, power price $0.09/kWh, carbon intensity 300gCO2/kWh.
    - Nordic site CapEx premium: $20M.

    **Calculations:**
    - Nordic annual energy: 10,000kW * 1.06 * 8760h = 92,856,000 kWh.
    - Nordic annual electricity cost: 92,856,000 * $0.04 = $3.71M/year.
    - Nordic annual carbon: 92,856,000 * 20g/kWh = 1,857,120,000g = 1,857 tCO2/year.
    - US baseline annual energy: 10,000kW * 1.20 * 8760h = 105,120,000 kWh.
    - US baseline annual electricity cost: 105,120,000 * $0.09 = $9.46M/year.
    - US baseline annual carbon: 105,120,000 * 300g/kWh = 31,536 tCO2/year.
    - Annual electricity savings: $9.46M - $3.71M = $5.75M/year.
    - Five-year electricity savings: $5.75M * 5 = $28.75M.
    - Five-year net after $20M site premium: $28.75M - $20M = $8.75M.

    **Conclusion & Interpretation:**
    - **Result: ROI positive in about 3.5 years (TCO & Carbon Optimization)**. The Nordic liquid-cooled design saves about $5.75M/year in electricity versus the US baseline and cuts carbon from 31,536 to 1,857 tCO2/year, making the 5-year net positive after a $20M site premium.
