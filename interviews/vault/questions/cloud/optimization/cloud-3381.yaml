title: Diagnosing ResNet-50 Student Inference Latency on TPU v5e
scenario: Your team has applied knowledge distillation to train a ResNet-50 student model (25M parameters) from a ResNet-152 teacher (60M parameters). During deployment, the student model's end-to-end inference latency is consistently 20% higher than expected even with an optimal batch size of 64.
question: How would you diagnose why the ResNet-50 student is 20% slower than expected on TPU v5e at batch size 64?
details:
  realistic_solution: Profile the deployed inference graph on TPU v5e, not the training-time distillation loop. Check step time, BF16 matrix-unit utilization, HBM bandwidth, host input stalls, recompilations, and unsupported ops. Inspect the XLA/HLO graph for missed fusion, layout conversions, dynamic shapes, small convolutions, or extra preprocessing/postprocessing introduced by the student export. Compare batch sizes around 64 because the nominal optimum may not match TPU tiling or p99 latency. If distillation changed the student graph, validate that auxiliary heads, feature taps, or training-only ops were removed before serving.
  common_mistake: |
    **The Pitfall:** Focusing purely on generic code optimization without analyzing the specific distillation technique.
    **The Rationale:** Candidates ignore how intermediate feature maps in knowledge distillation can thrash the TPU's HBM.
    **The Consequence:** Misdiagnosing memory bandwidth or capacity limits as pure compute deficiencies.
  napkin_math: |
    **Assumptions & Constraints:**
    - 25M parameter BF16 student model on TPU v5e.
    - Weight footprint is about 25M × 2 bytes = 50 MB.
    - TPU v5e has far more HBM than the model weights require, so capacity alone is unlikely to explain 20% extra inference latency.

    **Calculations:**
    - If measured matrix-unit utilization is low while HBM traffic and layout-conversion time are high, suspect memory/layout or fusion problems.
    - If HLO shows repeated transpose, reshape, padding, or unfused Conv-BN-ReLU blocks, the latency gap can come from extra HBM round trips rather than model size.
    - If input pipeline or host callbacks appear in the trace, the p99 issue may be serving overhead rather than TPU compute.

    **Conclusion & Interpretation:**
    - **Result: Inference profiling problem.** Diagnose with TPU traces and HLO inspection; likely causes are fusion, layout, unsupported ops, batching, or serving overhead, not distillation temperature or oversized training feature maps.
