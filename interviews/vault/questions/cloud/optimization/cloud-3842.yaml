title: Analyzing Memory Bounds in Unfused Operations
scenario: You are profiling a sequence of three element-wise operations (GeLU, Dropout, Scale) on a tensor of 50 million FP16 elements (100 MB total size) on a GPU with 2.0 TB/s memory bandwidth. The GPU compute utilization is near zero.
question: Why are separate GeLU, Dropout, and Scale kernels memory-bound, and how does fusing them change HBM traffic?
details:
  realistic_solution: |
    GeLU, Dropout, and Scale do little arithmetic per FP16 element, so their arithmetic intensity is far below what is needed to keep GPU compute units busy. With separate kernels, each operation reads the 100 MB tensor from HBM and writes a 100 MB intermediate back to HBM, so three kernels move about 600 MB. Fusing keeps intermediate values in registers or on-chip storage inside one kernel: read the tensor once, apply all three operations, and write the final tensor once. That cuts HBM traffic to about 200 MB, a 3x reduction, which is why fusion helps when the sequence is memory-bound rather than compute-bound.
  common_mistake: |
    **The Pitfall:** Attributing the slowness purely to kernel launch overhead.
    **The Rationale:** Engineers overlook that writing intermediate results to HBM is the primary cost for operations with low arithmetic intensity.
    **The Consequence:** Missing massive performance gains from reducing memory traffic through fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor = 100 MB. Bandwidth = 2.0 TB/s.
    - Decimal units: 1 MB = 10^6 bytes, 1 TB/s = 10^12 bytes/s.
    - Each separate elementwise kernel reads the full tensor once and writes the full tensor once.

    **Calculations:**
    - Unfused traffic = 3 kernels * (100 MB read + 100 MB write) = 600 MB.
    - Unfused time = 600e6 bytes / 2.0e12 bytes/s = 300 µs.
    - Fused traffic = 1 kernel * (100 MB read + 100 MB write) = 200 MB.
    - Fused time = 200e6 bytes / 2.0e12 bytes/s = 100 µs.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Separate kernels move about 600 MB through HBM, while fusion moves about 200 MB, so the traffic drops by 3x and the bandwidth-bound time falls from roughly 300 µs to 100 µs.
