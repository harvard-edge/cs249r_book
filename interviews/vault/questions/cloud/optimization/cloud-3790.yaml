title: 'Online Softmax: The Numerical Foundation of FlashAttention'
scenario: 'Standard softmax requires two passes over the data: one to find the max (for numerical stability), one to compute exp and normalize. FlashAttention processes tiles in a single pass using the online softmax trick.'
question: How are the running max and running sum maintained across tiles, and why is this critical for correctness?
details:
  realistic_solution: 'The online softmax algorithm maintains running max `m_i` and sum `l_i` as it processes tiles. When updating with a new local max, it rescales the previous sum: `l_updated = l_i * exp(m_i - m_updated) + sum(exp(s_new - m_updated))`. This mathematically exact rescaling avoids storing the full NxN matrix.'
  common_mistake: |
    **The Pitfall:** Thinking you can simply compute softmax independently per tile and concatenate results.
    **The Rationale:** Treating block processing naively without accounting for the global normalization factor.
    **The Consequence:** Generating numerically incorrect attention scores, breaking the model's predictive capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - N elements.
    - Standard softmax needs 3N memory ops.
    
    **Calculations:**
    - Standard softmax: N reads (pass 1) + N reads + N writes (pass 2) = 3N ops.
    - Online softmax: N reads + N writes = 2N ops.
    
    **Conclusion & Interpretation:**
    - **Result: 2N ops (Memory-Bound)**. 1.5x fewer HBM accesses by utilizing a single-pass approach.
