title: Adam Warmup for LLM Pretraining
scenario: A junior engineer removes the learning rate warmup from your LLM pre-training recipe, arguing that 2,000 warmup steps waste compute on a 300,000-step run. Training diverges within the first 100 steps.
question: Why is warmup critical for large models with Adam, and how do you calculate a reasonable warmup duration?
details:
  realistic_solution: 'At the start of Adam training, first- and second-moment estimates are still settling, gradients can be unusually noisy, and a full peak learning rate can destabilize a large model before the optimizer statistics are reliable. Warmup ramps the base learning rate gradually while those statistics stabilize. Rule of thumb for LLM pre-training: warmup steps = 0.5-1% of total steps, or until the gradient statistics stabilize (monitor gradient norm variance). For a 300K step run, 2,000 steps (0.67%) is reasonable.'
  common_mistake: |
    **The Pitfall:** Thinking warmup is just a hyperparameter tuning hack or an arbitrary tradition.
    **The Rationale:** Many frameworks apply warmup by default, so practitioners never learn the underlying numerical instability it solves.
    **The Consequence:** Removing it to "save compute" results in instant catastrophic divergence and wasted training runs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Adam optimizer, pre-training run of 300K steps.
       - Warmup should be long enough for early gradient statistics to stabilize but short relative to the full run.
    2. **Calculations:**
       - Rule of thumb: warmup = 0.5-1% of total training steps.
       - 0.5% * 300,000 = 1,500 steps.
       - 1.0% * 300,000 = 3,000 steps.
       - A 2,000-step warmup is 2,000 / 300,000 = 0.67%, inside the rule-of-thumb range.
    3. **Conclusion & Interpretation:**
       - **Result: Instability-Bound.** A 2,000-step warmup is a reasonable ramp for a 300K-step LLM run; it reduces early-step instability without consuming meaningful training budget.
