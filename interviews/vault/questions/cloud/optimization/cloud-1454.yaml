title: Quantifying Element-wise Kernel Fusion Speedup
scenario: You are profiling a custom activation layer applied to 1GB FP16 tensors on a GPU with 2 TB/s memory bandwidth. The layer runs in PyTorch eager mode without torch.compile.
question: "What theoretical speedup would a fused custom CUDA kernel achieve for this 1GB FP16 activation layer, and why?"
details:
  realistic_solution: Count total memory traffic for both approaches. Element-wise ops are deeply memory-bound, so execution time is proportional to HBM bytes transferred. Fusing the operations keeps intermediates in registers, dramatically dropping HBM traffic.
  common_mistake: |
    **The Pitfall:** Focusing on FLOP reductions or assuming speedup is proportional to the number of fused operations.
    **The Rationale:** Candidates often equate operation count with execution time, forgetting that element-wise operations are deeply memory-bound.
    **The Consequence:** They estimate a 3x speedup without tallying the exact HBM reads and writes for intermediate tensors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 1GB (FP16).
       - HBM Bandwidth: 2 TB/s.
       - Operation: y = x * torch.sigmoid(x) + bias.
    2. **Calculations:**
       - Eager unfused traffic (t1 = sigmoid(x)): Read x (1GB) + Write t1 (1GB) = 2GB.
       - Eager unfused traffic (t2 = x * t1): Read x (1GB) + Read t1 (1GB) + Write t2 (1GB) = 3GB.
       - Eager unfused traffic (y = t2 + bias): Read t2 (1GB) + Read bias (1GB) + Write y (1GB) = 3GB.
       - Total unfused traffic: 2GB + 3GB + 3GB = 8GB.
       - Fused traffic: Read x (1GB) + Read bias (1GB) + Write y (1GB) = 3GB.
       - Speedup: 8GB / 3GB = ~2.67x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** Fusing the operations keeps intermediates in registers, dropping HBM traffic from 8GB to 3GB and yielding a theoretical 2.67x speedup.
