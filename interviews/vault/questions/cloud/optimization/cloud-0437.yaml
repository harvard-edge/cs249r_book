title: The Tale of Two Latencies
scenario: You are serving a 70B LLM. Users have two main complaints. 1) When submitting a long document (8k tokens) for summarization, it takes many seconds before the first word appears. 2) When using the chatbot for conversation, the time between each generated word is too long.
question: Which optimizations address the 8k-token prefill latency and the chatbot time-per-token latency for the 70B LLM?
details:
  realistic_solution: |
    The two problems map directly to the two main phases of LLM inference.
    1. **Prefill Latency:** Processing the initial long prompt is bottlenecked by the attention mechanism's $O(N^2)$ complexity with respect to sequence length. This involves reading and writing the massive attention matrix to/from slow HBM. FlashAttention is designed specifically for this; it's an I/O-aware algorithm that fuses attention calculations in fast on-chip SRAM, avoiding the HBM bottleneck. It directly addresses the long document summarization problem.
    2. **Time-per-token:** Generating subsequent tokens is an auto-regressive process where the bottleneck is memory bandwidth—reading the entire 140GB of model weights from HBM for every single token generated. Speculative Decoding addresses this by using a small, fast 'draft' model to generate several candidate tokens, and then using the large, slow model to verify them in a single forward pass. This amortizes the high cost of the large model's memory-bound pass over multiple tokens, increasing tokens/second and reducing perceived latency.
  common_mistake: |
    **The Pitfall:** Confusing the specific bottlenecks of the prefill and decode phases.
    **The Rationale:** Engineers assume an optimization like FlashAttention speeds up the entire model, or that Speculative Decoding helps process initial prompts.
    **The Consequence:** They apply the wrong architectural fix, failing to resolve the user's specific latency complaint because decoding remains memory-bound and prefill remains compute/IO-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - N=8192 sequence length for summarization prefill.
    - Memory bandwidth is ~3.35 TB/s.
    - 70B model requires 140GB of weights read per token.
    - Draft model predicts 4 candidate tokens in 2.4ms; the large model accepts about 3 of them on average.

    **Calculations:**
    - Prefill attention work scales with N^2: 8192^2 = 67M score elements per head, so the long summarization prompt is dominated by attention I/O and tiling efficiency. FlashAttention avoids writing and rereading the full attention matrix from HBM.
    - Decode baseline: 140 GB / 3.35 TB/s = 41.8ms per generated token just to stream weights.
    - Speculative Decoding: draft 4 tokens in 2.4ms, then verify the candidates with one large-model pass that streams weights once: 41.8ms + 2.4ms = 44.2ms for about 3 accepted tokens.
    - Amortized decode latency: 44.2ms / 3 = 14.7ms/token.

    **Conclusion & Interpretation:**
    - **Result: Phase-Specific Optimizations**. FlashAttention targets the long-context prefill attention I/O problem, while Speculative Decoding reduces chatbot decode latency by amortizing one large-model verification pass across multiple accepted tokens, roughly 41.8 / 14.7 ≈ 2.8x in this estimate.
  options:
    - Apply FlashAttention to the chatbot to reduce per-token time, and Speculative Decoding to the summarizer to handle the long context.
    - Apply FlashAttention to the summarizer to fix prefill latency, and Speculative Decoding to the chatbot to reduce per-token latency.
    - Apply FlashAttention to both; it speeds up all attention calculations, which will fix both prefill and decoding latency.
    - Neither. The issue is network latency for the chatbot and an insufficient batch size for the summarizer, not the model's architecture.
  correct_index: 1
