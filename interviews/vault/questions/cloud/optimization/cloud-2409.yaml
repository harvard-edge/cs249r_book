title: INT4 QAT STE Boundary Oscillation
scenario: You are performing Quantization-Aware Training (QAT) to fine-tune an INT4 ResNet-50 variant for a high-throughput edge-cloud hybrid pipeline. You use the Straight-Through Estimator (STE) for the backward pass. Training loss oscillates wildly, and gradient norms spike from ~1.5 to >50 unexpectedly between consecutive batches. The learning rate is set to 1e-3.
question: What is the mechanistic cause of this training instability during INT4 QAT?
details:
  realistic_solution: The symptom is caused by a mismatch between the Straight-Through Estimator (STE), the quantization scale, and the learning-rate schedule. INT4 has coarse levels, so a modest FP32 master-weight update can move a weight across one or more quantization thresholds or into a clipped region. The forward pass then sees a discrete bin change or saturation, while the backward pass still uses the STE's coarse surrogate gradient as if the quantizer were locally smooth. That mismatch can create alternating gradients and sudden norm spikes between batches. The solution is to reduce or warm up the learning rate, calibrate and freeze scales carefully, use gradient clipping, and consider smoother STE or fake-quantization schedules that let weights settle before hard INT4 behavior dominates.
  common_mistake: |
    **The Pitfall:** Assuming the batch size is too small, causing noisy gradients.
    **The Rationale:** Wildly oscillating loss and gradient spikes are classic symptoms of a small batch size in standard FP32 training.
    **The Consequence:** Increasing the batch size wastes compute and memory without fixing the underlying STE impedance mismatch, and training continues to diverge.
  napkin_math: |
    **Assumptions & Constraints:**
    - Symmetric INT4 fake quantization over an approximate [-1, 1] range.
    - INT4 has 16 codes, so the rough level spacing is 2 / 15 ≈ 0.133.
    - Learning rate = 1e-3, and a gradient spike can reach 150.

    **Calculations:**
    - FP32 master-weight update during the spike: 1e-3 * 150 = 0.15.
    - 0.15 is slightly larger than one INT4 level spacing, so a single optimizer step can cross a quantization threshold or push a value into clipping.
    - The forward pass observes the new discrete code or clipped value, but the STE backward pass passes an approximate gradient through the quantizer instead of the true zero-or-discontinuous derivative.
    - This STE/scale mismatch can reverse or amplify the next gradient, producing oscillation and large norm spikes.

    **Conclusion & Interpretation:**
    - **Result: STE and quantization-scale mismatch, not ordinary batch noise.** The bin-crossing estimate is evidence that the learning-rate schedule is too aggressive for the INT4 quantizer, but the mechanism is the discrete forward pass combined with the surrogate STE gradient.
