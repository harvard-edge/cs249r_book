title: 'The Speculative Decoding Backfire: Speculative Decoding'
scenario: Your team is serving a 70B parameter summarization model. To improve throughput, you implement speculative decoding using a 1.3B distilled drafter model to generate 5-token drafts, which the 70B verifier checks in parallel. On out-of-domain inputs (like source code), the total time to generate the first token is more than double the latency of using the 70B model alone.
question: Why does an optimization that helps the average case cause a non-linear latency explosion for the worst case?
details:
  realistic_solution: 'The system is experiencing a ''Verification Failure Tax''. Speculative decoding is a probabilistic bet: you gamble that the cheap draft is correct to avoid expensive autoregressive generation. The problem is not the speed of the draft model, but its *accuracy* on out-of-domain inputs. When the distilled model''s knowledge doesn''t cover the input (e.g., code), its draft is consistently wrong, causing the acceptance rate to plummet. The system then pays the latency of: 1) generating the useless draft, 2) running the expensive verification pass only for it to fail, and 3) falling back to a standard autoregressive step with the large model. This fallback makes the process significantly slower than just using the large model from the start. The result is a bimodal latency distribution: a fast mode for high-acceptance inputs and a catastrophically slow mode for low-acceptance inputs, which destroys the P99 latency.'
  common_mistake: |
    **The Pitfall:** Blaming the raw speed of the draft model or the Python control logic for the slowdown.
    **The Rationale:** Candidates fail to realize that speculative decoding is a probabilistic gamble; when the draft model consistently produces wrong tokens (low acceptance rate), the system pays a massive "Verification Failure Tax."
    **The Consequence:** Deploying speculative decoding across diverse workloads and suffering severe P99 latency regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Draft Step Time: 5 tokens * (2.6GB weights / 3.35 TB/s) = 3.9ms.
    - Verify Step Time: 140GB weights / 6.7 TB/s = 20.9ms.
    - Standard Cycle Time (No Speculation): 20.9ms per token.

    **Calculations:**
    - Total Speculative Cycle Time: 3.9ms + 20.9ms = 24.8ms.

    **Conclusion & Interpretation:**
    - **Result: Verification Failure Tax (Latency-Bound)**. If all 5 drafts are rejected, yielding only 1 token, the cycle takes 24.8ms vs 20.9ms natively, a pure 3.9ms penalty per token.
