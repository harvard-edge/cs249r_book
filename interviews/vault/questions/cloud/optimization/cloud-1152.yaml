title: Diagnosing Low GPU Utilization in Eager Mode GNNs
scenario: You are profiling a novel Graph Neural Network (GNN) training step implemented in PyTorch eager mode on an NVIDIA A100 GPU. The model consists of thousands of small tensor operations per forward pass. nvidia-smi shows GPU Volatile GPU-Util at consistently around 20%, while top shows one CPU core pegged at 100%. Nsight Systems shows large gaps between kernel executions on the GPU timeline.
question: Why is the GPU utilization so low, and how would you resolve this?
details:
  realistic_solution: Identify the Python dispatch tax as the bottleneck. The CPU takes ~5µs to dispatch each small op, while the A100 executes them in ~1µs. Fix by using operator fusion (e.g., torch.compile) or custom CUDA kernels to reduce dispatch frequency.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is PCIe data transfer bandwidth or GPU memory bandwidth.
    **The Rationale:** Engineers often jump to data loading or mixed precision as solutions for low GPU utilization.
    **The Consequence:** They waste time optimizing the wrong components without addressing the underlying Python dispatch overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU dispatch per op: 5µs.
    - GPU execution per op: 1µs.

    **Calculations:**
    - Effective time: max(5µs, 1µs) = 5µs.
    - Utilization: 1µs GPU active / 5µs total = 20%.

    **Conclusion & Interpretation:**
    - **Result: 20% Utilization (CPU-Bound)**. Fusing operations completely hides the dispatch latency.
