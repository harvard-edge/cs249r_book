title: Optimizing Large Language Model Attention on AMD MI300X with IO-Aware Tiling
scenario: You are deploying a massive Transformer LLM for real-time inference on an AMD MI300X accelerator. The attention mechanism is a significant bottleneck due to its quadratic complexity with sequence length, leading to frequent HBM read/write operations that saturate bandwidth.
question: How would you design FlashAttention-style tiled attention with online softmax on MI300X, and quantify the memory and throughput benefits?
details:
  realistic_solution: "The solution involves a FlashAttention-2 approach where the attention calculation is broken down into smaller blocks or 'tiles' that fit into the MI300X's fast on-chip SRAM/cache, minimizing expensive HBM access. Online Softmax incrementally computes softmax for each block, crucially avoiding the need to store the entire `S` matrix in HBM."
  common_mistake: |
    **The Pitfall:** Ignoring memory bandwidth constraints and focusing solely on compute (FLOPS).
    **The Rationale:** Engineers assume that a large HBM capacity (e.g., 192GB) negates the need for careful intermediate tensor management.
    **The Consequence:** The attention mechanism repeatedly loads and stores large matrices (Q, K, V, S, P, O) from HBM, resulting in massive IO bottlenecks rather than compute limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence length N = 8192, Hidden dim D = 2048.
       - Naive attention stores an N x N score matrix.
       - MI300X HBM bandwidth: 5.3 TB/s. Peak compute: ~1,307 TFLOPS.
    2. **Calculations:**
       - Naive S matrix memory (FP16) = 8192 * 8192 * 2 bytes ≈ 134.2 MB per head.
       - For N = 65536, S matrix memory = 65536 * 65536 * 2 bytes ≈ 8.5 GB per head.
       - FlashAttention-2 tiling reduces intermediate memory from O(N²) to O(N*B + D*B).
       - FLOP-to-Byte ratio for Q*K^T tile: (2 * B² * D) FLOPs / ((2 * B * D) bytes).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (IO).** Without IO-aware tiling, the quadratic memory footprint saturates HBM bandwidth. Tiling keeps data resident in SRAM, shifting the operation toward being compute-bound.
