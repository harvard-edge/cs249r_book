title: The Autograd Overhead in Serving
scenario: A production inference service running a 7B model in PyTorch shows that `torch.cuda.memory_allocated()` reports 28GB, but the model weights are only 14GB in FP16. The serving code uses a simple `model(input)` call. No optimizer or gradient accumulation is present.
question: Where is the extra 14GB coming from, and how do you reclaim it?
details:
  realistic_solution: |
    The extra memory is from autograd-tracked activations retained during the forward pass. PyTorch's define-by-run autograd defaults to recording intermediate tensors for the backward pass when grad tracking is enabled, and this workload happens to retain about 14GB beyond the FP16 weights. Fix: wrap the inference execution in `torch.inference_mode()` (preferred over `torch.no_grad()` as it also skips version counting and view tracking). This prevents PyTorch from retaining backward activations for inference. Also ensure `model.eval()` is set to disable Dropout/BatchNorm train behaviors.
  common_mistake: |
    **The Pitfall:** Assuming PyTorch automatically skips gradient tracking during forward-only inference without explicit context managers.
    **The Rationale:** Candidates forget that PyTorch dynamically builds the computational graph unless explicitly told otherwise via `inference_mode`.
    **The Consequence:** The server wastes 50% of its HBM storing intermediate activations for a backward pass that will never happen, halving the maximum potential batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters.
    - Precision: FP16 (2 bytes/param).
    - Serving environment: PyTorch forward pass with grad tracking still enabled.
    - Activation memory depends on batch size, sequence length, hidden size, layers, and retained intermediates.

    **Calculations:**
    - Weight Memory: 7B * 2 bytes = 14 GB.
    - Observed total allocated memory: 28 GB.
    - Non-weight allocation: 28 GB - 14 GB = 14 GB.
    - Because no optimizer state or gradient accumulation is present, the main inference-specific mistake is retaining autograd activations and graph metadata for a backward pass that will not run.

    **Conclusion & Interpretation:**
    - **Result: Memory Capacity-Bound by Autograd.** Wrapping the forward pass in `torch.inference_mode()` should remove the unnecessary autograd-retained activations for this workload, with the exact GB savings determined by the request shape.
