title: Diagnosing the Interpolation Threshold Error Spike
scenario: You are debugging a training run for a transformer-based binary fraud detection model on a cluster of 8x A100 80GB GPUs. The training dataset consists of exactly 1.2 million labeled transaction records. The team initially deployed a 250K parameter model with a 12% validation error. They recently scaled the architecture to 1.2M parameters to capture more complex fraud patterns, but the validation error paradoxically spiked to 28%, while training error hit exactly zero. The ML engineering lead halts the run, diagnosing terminal overfitting, and orders the team to revert to the 250K parameter model and double the dropout rate.
question: How should the team diagnose the 1.2M-parameter validation spike before deciding whether to shrink, regularize, or scale?
details:
  realistic_solution: |
    Treat the spike as evidence that the new run is generalizing poorly, not as proof of a single cause. Zero training error plus worse validation can come from overfitting, data leakage or split drift, optimization instability, insufficient regularization, or a double-descent-like capacity transition. Keep the 250K model as the production fallback, then run controlled experiments: verify the validation split, compare seeds and learning-rate schedules, tune regularization, and test a small size sweep on both sides of 1.2M parameters before deciding whether to shrink or scale.
  common_mistake: |
    **The Pitfall:** Treating the spike as a complete diagnosis from one training run.
    **The Rationale:** Candidates either apply only classical overfitting logic or invoke double descent from P ≈ N without ruling out split, optimization, and regularization causes.
    **The Consequence:** The team may ship an underpowered fallback, over-regularize the larger model, or waste compute scaling up before proving the failure mode.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset size (N) = 1.2 million samples.
    - Current parameters (P) = 1.2 million.
    - Training error is zero while validation error rose from 12% to 28%.

    **Calculations:**
    - Capacity ratio: P/N = 1.0, which is consistent with an interpolation-threshold hypothesis but does not prove it.
    - Validation gap: 28% validation error - 0% training error = 28 percentage points.
    - Decision test: compare controlled runs around 1.2M parameters with fixed data splits, seeds, learning-rate schedules, and regularization. A double-descent explanation requires validation error to improve again at larger capacity; ordinary overfitting or optimization problems require regularization, data, or training-procedure fixes.

    **Conclusion & Interpretation:**
    - **Result: diagnosis-bound.** Do not automatically revert or jump to 12M parameters; use the smaller model as a safe baseline while experiments determine whether the fix is regularization, training stability, data correction, or controlled scaling.
