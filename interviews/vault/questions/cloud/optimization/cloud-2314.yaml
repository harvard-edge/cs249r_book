title: Evaluating MLIR Fusion for Bandwidth
scenario: 'Optimizing a custom Transformer on A100 GPUs. Profiling reveals a bottleneck in a custom gating network: Out = Tanh(X) * Sigmoid(Y). X and Y are large activations, each 400M FP16 elements (800MB each). The current ML compiler lowers this to 3 sequential kernels (Tanh, Sigmoid, Multiply), taking ~2.8ms total.'
question: You propose an MLIR lowering pass to fuse these element-wise operations. What is the expected speedup?
details:
  realistic_solution: The bottleneck is not compute, but memory bandwidth due to materializing intermediate tensors to HBM. By introducing a custom fusion pass at the MLIR linalg/tensor level, the compiler can lower the entire block into a single GPU kernel that reads X and Y once, computes Tanh(X), Sigmoid(Y), and the multiply in one pass, and writes Out once. The key benefit is eliminating HBM reads and writes for the intermediate Tanh(X) and Sigmoid(Y) tensors; the implementation may use registers, shared memory, or compiler temporaries, but the speedup should be anchored on reduced HBM traffic. Under ideal bandwidth-bound assumptions, that traffic reduction gives about a 2.33x speedup.
  common_mistake: |
    **The Pitfall:** Assuming compute is the bottleneck and attempting to optimize the FP16 math instructions.
    **The Rationale:** Candidates fail to profile the system and realize that element-wise operations are entirely bottlenecked by intermediate HBM reads/writes.
    **The Consequence:** Wasting time on lower-level PTX/SASS instruction tuning when the architecture desperately needs memory fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400M FP16 elements; each tensor is 400M * 2 bytes = 800,000,000 bytes = 0.8 decimal GB.
    - Unfused = 3 elementwise kernels that materialize Tanh(X) and Sigmoid(Y).
    - Fused = 1 kernel that reads X and Y once and writes Out once.
    - Assume the kernels are bandwidth-bound, saturate the same effective HBM bandwidth, and launch overhead is small relative to memory traffic.

    **Calculations:**
    - Tanh kernel: read X (0.8GB) + write Tanh(X) (0.8GB) = 1.6GB.
    - Sigmoid kernel: read Y (0.8GB) + write Sigmoid(Y) (0.8GB) = 1.6GB.
    - Multiply kernel: read both intermediates (1.6GB) + write Out (0.8GB) = 2.4GB.
    - Total unfused traffic = 1.6GB + 1.6GB + 2.4GB = 5.6GB.
    - Total fused traffic = read X (0.8GB) + read Y (0.8GB) + write Out (0.8GB) = 2.4GB.
    - Ideal bandwidth-bound speedup = 5.6GB / 2.4GB = 2.33x.

    **Conclusion & Interpretation:**
    - **Result: up to ~2.33x (Ideal Memory-Bandwidth-Bound)**. Fusing the MLIR tensor operations drops memory traffic by 3.2GB; the realized latency gain will be lower if launch overhead, math throughput, or imperfect HBM saturation contributes materially.
