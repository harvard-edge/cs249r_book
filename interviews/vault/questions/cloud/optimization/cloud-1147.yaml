title: Diagnosing Dispatch Overhead in Narrow Models
scenario: Your team is running a deep, narrow multi-layer perceptron (MLP) with thousands of sequential small layers on an NVIDIA A100 GPU using standard eager-mode PyTorch. Monitoring tools show GPU SM utilization at roughly 16%, while a single CPU core is pegged at 100%. Profiling reveals that each layer takes about 2µs to execute on the GPU, but the model throughput falls drastically short of the A100's theoretical TFLOPS. The team proposes aggressively rewriting the CUDA kernels to run faster, but performance remains unchanged.
question: What is the root cause of the 16% GPU utilization, and what optimization should you use instead of rewriting kernels?
details:
  realistic_solution: Diagnose that the workload is CPU-bound due to the Dispatch Overhead Law. Use torch.compile or CUDA Graphs to fuse operations, paying the Python dispatch tax once per graph rather than once per micro-operation.
  common_mistake: |
    **The Pitfall:** Assuming the model is memory-bandwidth bound due to low arithmetic intensity.
    **The Rationale:** Focusing entirely on optimizing the GPU kernels without measuring CPU-side launch times ignores dispatch overhead.
    **The Consequence:** Performance remains unchanged despite kernel optimization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Python dispatch overhead: ~10µs per operation.
    - GPU kernel execution time: ~2µs per operation.

    **Calculations:**
    - Eager mode execution time = 10µs dispatch + 2µs GPU execution = 12µs per op.
    - Eager mode GPU utilization = 2µs / 12µs ≈ 16.7%, matching the observed ~16%.
    - Eager mode for 100 ops = 100 * 12µs = 1200µs.
    - Fused CUDA Graph for 100 ops: 10µs dispatch + (100 * 2µs execution) = 210µs total.
    - Speedup from dispatch amortization = 1200µs / 210µs ≈ 5.7x.
    - Fused-mode busy fraction = 200µs / 210µs ≈ 95%, before accounting for memory stalls or dependency gaps.

    **Conclusion & Interpretation:**
    - **Result: ~5.7x Throughput Speedup (CPU-Dispatch Bound)**. Fusing operations with CUDA Graphs amortizes the Python dispatch overhead and can raise utilization substantially, but the given numbers do not prove exactly 100% SM utilization.
