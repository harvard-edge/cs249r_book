title: The Tiling Factor Search Space
scenario: You are auto-tuning the matrix multiply and attention kernels for a transformer model on H100 GPUs. The model has 80 unique kernel shapes, and each kernel has 4 tunable tiling parameters (M_tile, N_tile, K_tile, and number of pipeline stages), each with 8 possible values.
question: How many exhaustive tuning trials are needed across 80 unique kernels, and why is guided search used?
details:
  realistic_solution: Each kernel has 8^4 = 4,096 configurations. If kernels are tuned independently, the exhaustive tuning workload across 80 unique kernel shapes is 4,096 * 80 ≈ 327,680 benchmark trials; the mathematical joint assignment space would be 4,096^80, which is infeasible and not what practical autotuners enumerate. Each configuration requires a benchmark run (~5ms for a single kernel trial), making exhaustive search for one kernel feasible (4,096 * 5ms ≈ 20s) but exhaustive search across the whole model expensive (327,680 * 5ms ≈ 27 minutes). This is why ML compilers use cost models and guided search (genetic algorithms, simulated annealing, or learned cost models) to prune the workload to ~100 trials per kernel, cutting total tuning from 27 minutes to ~40 seconds.
  common_mistake: |
    **The Pitfall:** Calculating the search space as additive (4 * 8 = 32 configurations).
    **The Rationale:** Engineers confuse additive and multiplicative combinatorics. Each parameter is independent, so the configurations multiply.
    **The Consequence:** Drastically underestimating the time required for auto-tuning, leading to CI/CD pipeline timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Configurations per kernel: 8^4 = 4,096 configs.
    - Full model: 80 unique kernels.
    - Time per trial: 5ms.

    **Calculations:**
    - Exhaustive trials when tuning kernels independently: 4,096 * 80 = 327,680 trials.
    - Fully joint assignment space across all 80 kernels would be 4,096^80, so practical systems do not enumerate it.
    - Exhaustive search time: 327,680 * 0.005s = 1,638s ≈ 27 minutes.
    - Guided search time: 100 trials/kernel * 80 * 0.005s = 40 seconds.
    - Speedup: 1,638s / 40s = 40.95x, about 40.5x if the 27-minute rounded time is used.

    **Conclusion & Interpretation:**
    - **Result: ~40.5x speedup (Compute-Bound)**. Guided search radically cuts auto-tuning time from about 27 minutes to 40 seconds with a minimal performance gap.
