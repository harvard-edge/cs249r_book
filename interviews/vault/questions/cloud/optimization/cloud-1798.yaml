title: 'Mitigating Outliers with Robust Loss'
scenario: 'Your team is training a robotics kinematics model on 64 A100 GPUs using FP16 mixed precision. The dataset contains 5% corrupted sensor readings acting as extreme outliers. When using standard Mean Squared Error (MSE) loss, an outlier with an error magnitude of 500 units produces a squared loss of 250,000 and a gradient of 1,000.'
question: 'How should you change the loss to prevent FP16 overflows from 5% extreme outliers without giving up mixed precision?'
details:
  realistic_solution: 'Apply a robust training objective like Huber Loss (Smooth L1 Loss) with a threshold parameter (delta=1.0). This modifies the loss function to be linear for errors larger than delta, strictly bounding the gradient magnitude.'
  common_mistake: |
    **The Pitfall:** Disabling mixed precision and falling back to pure FP32 training.
    **The Rationale:** Candidates see an FP16 overflow and immediately blame the precision constraint rather than fixing the underlying sensitivity of the quadratic loss landscape.
    **The Consequence:** Falling back to FP32 completely halves the Tensor Core throughput, unnecessarily doubling the training time just to accommodate 5% bad data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size: 4096
    - Outlier fraction: 5% (204 outliers)
    - Outlier error magnitude: e = 500
    - FP16 maximum value: 65,504

    **Calculations:**
    - MSE Gradient = 2e = 1000
    - Sum of outlier gradients = 204 * 1000 = 204,000
    - Check FP16 limit: 204,000 \gg 65,504 (Overflow)
    - Huber Loss Gradient (with \delta=1.0) = \delta * \text{sign}(e) = 1.0
    - Sum of Huber outlier gradients = 204 * 1.0 = 204

    **Conclusion & Interpretation:**
    - **Result: 204 (Precision-Bound)**. The sum of Huber gradients is well within FP16 limits, preventing precision overflow.
