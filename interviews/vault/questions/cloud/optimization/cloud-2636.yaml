title: BatchNorm Statistics Divergence
scenario: 'A BatchNorm layer has running_mean=2.0 (accumulated over 100K training steps, momentum=0.1). A single eval batch has batch mean=5.0.'
question: 'What value does BatchNorm use for normalization in train mode vs eval mode?'
details:
  realistic_solution: 'In eval mode: Uses running_mean = 2.0. In train mode: Uses the current batch mean = 5.0 for normalization. Additionally, it updates the running statistics: new_running_mean = (1 - momentum) * running_mean + momentum * batch_mean. Running BatchNorm in training mode during inference corrupts stored statistics.'
  common_mistake: |
    **The Pitfall:** Misunderstanding the PyTorch momentum convention for BatchNorm.
    **The Rationale:** Candidates often think momentum=0.1 means 10% of the running average is kept, instead of the actual formula new = (1-momentum) * old + momentum * batch.
    **The Consequence:** Incorrect calculation of the running statistics and a misunderstanding of how training mode affects accumulated statistics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Running Mean: 2.0.
    - Eval Batch Mean: 5.0.
    - Momentum: 0.1.

    **Calculations:**
    - Eval Mode Normalization: Uses exactly 2.0.
    - Train Mode Normalization: Uses exactly 5.0.
    - Train Mode Running Update: new_running_mean = (1 - 0.1) * 2.0 + 0.1 * 5.0 = 1.8 + 0.5 = 2.3.

    **Conclusion & Interpretation:**
    - **Result: State-Bound**. Training mode overwrites the mean to 2.3, completely corrupting the carefully accumulated 2.0 statistic.
