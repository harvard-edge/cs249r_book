title: SRAM Calculation for FlashAttention Tiling
scenario: You are implementing a FlashAttention kernel for an A100 GPU. To bypass HBM bandwidth limits, you must tile the attention computation so the active blocks fit entirely within the A100's shared memory (SRAM) limit.
question: Given a head dimension d=128, a query block size B_r=64, and key/value block sizes B_c=128, how much SRAM in bytes is needed for the FP16 Q, K, V, and O tiles, and does it fit within the 192 KB limit?
details:
  realistic_solution: To find the SRAM footprint, we calculate the number of elements in each required block and multiply by 2 bytes (since FP16 is 16 bits). The essential blocks held in SRAM during the inner loop are the Query block, the Key block, the Value block, and the Output accumulator block. We then compare this total to the 192,000 bytes (or 196,608 bytes depending on KiB vs KB definitions, but strictly 192 KB) available on the A100 SM.
  common_mistake: |
    **The Pitfall:** Forgetting to account for the output block or the byte size of the data type.
    **The Rationale:** Candidates often calculate the number of elements correctly but forget to multiply by 2 for FP16, or they omit the Output accumulator block `O` from the active SRAM allocation.
    **The Consequence:** This results in an underestimation of memory requirements, leading to runtime OOMs in shared memory and kernel launch failures.
  napkin_math: |
    1. **Assumptions & Constraints:** FP16 (2 bytes/element). Head dimension d=128, Query block B_r=64, Key/Value blocks B_c=128. A100 limit is 192 KB.
    2. **Calculations:** Q block (B_r × d) = 64 × 128 = 8,192 elements. K block (B_c × d) = 128 × 128 = 16,384 elements. V block (B_c × d) = 128 × 128 = 16,384 elements. O block (B_r × d) = 64 × 128 = 8,192 elements. Total elements = 49,152. Total bytes = 49,152 × 2 = 98,304 bytes.
    3. **Conclusion & Interpretation:** **Result: 98,304 bytes (96 KiB) required. SRAM-Capacity-Bound (Fits comfortably within 192 KB).**
