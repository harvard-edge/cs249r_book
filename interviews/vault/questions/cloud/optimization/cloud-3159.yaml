title: FlashAttention Numerical Stability in Mixed Precision Training
scenario: 'FlashAttention computes attention in FP16/BF16 but maintains softmax statistics (row max and log-sum-exp) in FP32 on H100.'
question: 'Why must FlashAttention keep row max and log-sum-exp in FP32 on H100, and what fails if they are kept in FP16?'
details:
  realistic_solution: 'FP16 has 10-bit mantissa = 3.3 decimal digits of precision. The online softmax maintains a running log-sum-exp value l_i that accumulates across N/B_c tiles. For seq_len=32K with B_c=128: 256 accumulations. Each accumulation involves exp(m_old - m_new) which can produce very small values (e.g., exp(-10) = 4.5e-5). In FP16, values below 6e-8 underflow to zero. After 256 tiles, if the max shifts significantly, earlier contributions are zeroed out, causing attention to only attend to recent tiles — a catastrophic failure for long-context tasks. FP32 maintains these statistics with 23-bit mantissa (7 decimal digits), handling exp values down to 1.2e-38. The matmuls (Q @tools/validate_playbook.py, attn @iterative_audit.sh) can safely use FP16 because they''re computed per-tile and immediately consumed.'
  common_mistake: |
    **The Pitfall:** Thinking FP16 is completely safe because the final attention output is FP16 anyway.
    **The Rationale:** Engineers assume that if the inputs and outputs are half-precision, the intermediate state can safely be half-precision as well.
    **The Consequence:** Causing catastrophic failure in long-context tasks because accumulated numerical error in the online softmax zeroes out earlier tiles.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 min subnormal: 6e-8.
    - FP32 min: 1.2e-38.
    - seq_len=32K with B_c=128 requires 256 accumulations.

    **Calculations:**
    - exp(-17) = 4.1e-8 (underflows to zero in FP16).
    - At 256 tiles, the max can easily shift by >17.
    - FP32 softmax stats overhead: 8 bytes per row x 128 rows = 1KB per tile.

    **Conclusion & Interpretation:**
    - **Result: 1KB Overhead (Catastrophic Underflow Prevention)**. Maintaining statistics in FP32 is a negligible 1KB overhead but prevents catastrophic underflow during cross-tile log-sum-exp accumulation.
