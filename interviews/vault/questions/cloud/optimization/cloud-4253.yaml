title: Comparing forward-mode vs reverse-mode AD for Jacobian computation on H100
scenario: You are training a physics-informed neural network (PINN) that requires computing the full Jacobian
  of a 10-output model with respect to 3 spatial inputs (∂u/∂x, ∂u/∂y, ∂u/∂z) at every training step on
  H100. The model has 10M parameters. You need to choose between torch.func.jacfwd (forward-mode) and
  torch.func.jacrev (reverse-mode).
question: For a 10-output, 3-input PINN Jacobian on H100, should you use jacfwd or jacrev, and why?
details:
  realistic_solution: 'For Jacobian of shape (m outputs × n inputs): use jacfwd if n < m (forward-mode:
    n passes), use jacrev if m < n (reverse-mode: m passes). Here n=3 spatial inputs, m=10 outputs: use
    jacfwd with 3 tangent vectors. torch.func.jacfwd computes the full 10×3 Jacobian in 3 JVP (Jacobian-vector
    product) calls. jacrev would require 10 VJP calls. Speedup: 3/10 = 3× fewer passes.'
  common_mistake: '**The Pitfall:** Defaulting to reverse-mode AD (jacrev) even when output dimension
    is smaller than input dimension.

    **The Rationale:** For Jacobian of shape (10 outputs x 3 inputs), forward-mode (jacfwd) with 3 tangent
    vectors is more efficient than 10 reverse passes.

    **The Consequence:** Unnecessary computation overhead during the backward passes.'
  napkin_math: '**Assumptions & Constraints:**

    - PINN training step: 10K collocation points.

    **Calculations:**

    - jacrev (10 passes): 10 * 5ms/pass = 50ms.

    - jacfwd (3 passes): 3 * 5ms/pass = 15ms.

    - At 10K steps: (50-15)ms * 10K = 350 seconds saved.

    **Conclusion & Interpretation:**

    On H100, full Jacobian computation with jacfwd saves significant time.'
