title: SimCLR Small-Batch Negative Collapse on A100s
scenario: You are training a self-supervised SimCLR model (ResNet-50) on an 8x GPU cluster to learn robust visual representations from 50M unlabeled images. During training, the contrastive loss drops rapidly, but downstream linear probing accuracy plateaus at 45%. You observe the global batch size is set to 256 (32 per GPU) and GPU memory utilization is only ~15%.
question: What is causing the SimCLR plateau at 45% linear-probe accuracy and 15% GPU memory utilization, and how would you fix it?
details:
  realistic_solution: |
    The small global batch is a likely cause of weak contrastive learning and underfilled GPUs, but it is not a guaranteed sole explanation for the 45% plateau. Increase the effective batch size with larger per-GPU batches, gradient accumulation, or distributed negatives, while validating the rest of the SimCLR recipe: projection head, augmentation strength, learning-rate scaling, optimizer settings, and training duration. A target such as 4096 global batch is a reasonable starting point only if memory and scaling behavior support it.
  common_mistake: |
    **The Pitfall:** Suggesting changes to the learning rate scheduler, adding dropout, or switching to a larger backbone.
    **The Rationale:** Failing to recognize that contrastive SSL methods structurally depend on massive batch sizes for negative mining.
    **The Consequence:** Wasted compute runs with poor representation quality because the model finds trivial shortcuts.
  napkin_math: |
    **Assumptions & Constraints:**
    - SimCLR uses in-batch negatives: 2N - 2 per image.
    - Current global batch (N) = 256.
    - Proposed global batch (N) = 4096.

    **Calculations:**
    - Negatives at N=256: 2(256) - 2 = 510.
    - Negatives at N=4096: 2(4096) - 2 = 8190.

    **Conclusion & Interpretation:**
    - **Result: 8190 negatives drastically increase task difficulty and utilization (Batch-Size-Bound).**
