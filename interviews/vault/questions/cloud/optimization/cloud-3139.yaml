title: 'FlashAttention Arithmetic Intensity Calculation'
scenario: You are analyzing standard attention versus FlashAttention on an H100 GPU for seq_len=4096, head_dim=128, batch=1, and 32 heads.
question: What is the arithmetic intensity of standard attention versus FlashAttention, and does FlashAttention shift it to being compute-bound?
details:
  realistic_solution: 'H100 ridge point is 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte. Attention FLOPs = 4 * batch * heads * seq² * head_dim = 4 * 1 * 32 * 4096² * 128 = 274.8 GFLOPs. For standard attention, the NxN attention scores S and P must be written and read from HBM. S matrix = 1 x 32 x 4096² x 2B = 1.07 GB. Reading and writing S and P generates >4GB of HBM traffic. Standard AI = 274.8 GFLOPs / 4.4 GB \u2248 62.5 FLOPs/byte. FlashAttention fuses the operation using tiling, keeping S and P in SRAM. HBM traffic is just reading Q, K, V and writing O. FlashAttention AI = 274.8 GFLOPs / 134 MB \u2248 2050 FLOPs/byte.'
  common_mistake: |
    **The Pitfall:** Computing arithmetic intensity of the full fused kernel without acknowledging the inner loop.
    **The Rationale:** Candidates look at the macro FLOPs vs macro I/O without understanding how tiling changes the I/O bounds.
    **The Consequence:** They fail to explain why FlashAttention is compute-bound, missing that tiling keeps S and P in SRAM to eliminate massive O(N²) HBM trips.
  napkin_math: |
    **Assumptions & Constraints:**
    - Seq=4096, dim=128, heads=32, batch=1. H100 Ridge: 295 FLOPs/B.
    
    **Calculations:**
    - Attention FLOPs: 4 * 1 * 32 * 4096^2 * 128 = 274.8 GFLOPs.
    - Standard I/O (HBM): Q+K+V + 2*S + 2*P + O \u2248 4.4 GB.
    - Standard AI: 274.8 / 4.4 \u2248 62.5 FLOPs/B.
    - FlashAttention I/O: Q+K+V+O \u2248 134 MB.
    - FA AI: 274.8 / 0.134 \u2248 2052 FLOPs/B.
    
    **Conclusion & Interpretation:**
    - **Result: 2052 FLOPs/B (Compute-Bound)**. FlashAttention AI (2052) >> Ridge Point (295), eliminating the HBM bottleneck.
