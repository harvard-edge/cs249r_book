title: Vectorization Speedup via vmap
scenario: Computing per-sample gradients for 256 samples using a loop takes 3.2 seconds. Using vmap(grad(loss_fn)) vectorizes this into a single batched operation.
question: If vmap(grad(loss_fn)) vectorizes 256 per-sample gradients and the GPU has enough parallelism, what speedup and time should you expect?
details:
  realistic_solution: 'A Python loop over 256 samples incurs: 256 individual kernel launches, 256 separate backward passes, and Python interpreter overhead between each. vmap transforms this into a single batched kernel call. Theoretical speedup: 256x (perfect vectorization). Practical speedup: typically 50-150x due to memory overhead (storing all 256 computation graphs simultaneously) and diminishing GPU parallelism at high batch sizes. At 100x speedup: 3.2s / 100 = 32ms. The key bottleneck in the loop version is not compute but kernel launch overhead (~10μs per launch × 256 × multiple kernels per backward pass). vmap eliminates this by fusing everything into one launch. Memory cost: vmap materializes all per-sample gradients simultaneously, requiring 256x more memory than a single gradient.'
  common_mistake: |
    **The Pitfall:** Expecting exactly a 256x mathematical speedup.
    **The Rationale:** Candidates forget that perfect vectorization is limited by memory constraints and maximum GPU occupancy.
    **The Consequence:** Overpromising performance gains that hit memory walls in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Loop: 256 samples * 12.5ms = 3.2s.
    - vmap theoretical = 256x, practical = ~100x (due to occupancy/memory limits).

    **Calculations:**
    - Vectorized time = 3.2s / 100 = 32ms.

    **Conclusion & Interpretation:**
    - **Result: ~32ms runtime (Compute-Bound)**. vmap eliminates massive CPU/CUDA kernel launch overhead.
