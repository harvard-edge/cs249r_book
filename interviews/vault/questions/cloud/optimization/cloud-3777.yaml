title: Ring Attention for Million-Token Contexts
scenario: You need to process a 1M token context on 8 MI300X GPUs (192 GB HBM3 each). The model has 80 attention layers, 96 KV heads per layer, head_dim=128, and BF16 K/V tensors. The total KV cache across all layers is about 3.9 TB.
question: Is Ring Attention feasible for this 1M-token KV cache on 8 MI300X GPUs, and what pattern does it use?
details:
  realistic_solution: Ring Attention partitions the sequence into chunks. Each GPU holds Q for its chunk and computes attention against K,V blocks that rotate around a ring, typically using send/receive communication overlapped with attention compute. For the stated model, the total KV cache across all 80 attention layers is about 1,000,000 × 128 × 96 × 80 × 2 × 2 bytes = 3.93 TB. Sharding that evenly over 8 GPUs leaves about 491 GB of KV cache per GPU before accounting for Q, O, temporary buffers, or double-buffered communication. Since an MI300X has 192 GB of HBM3, this deployment is not feasible as specified. Ring Attention describes the communication/computation pattern, but it does not by itself make this KV cache fit; the system would need more GPUs, fewer KV heads/layers, KV quantization, offload, or a different attention/cache strategy.
  common_mistake: |
    **The Pitfall:** Thinking Ring Attention simply shards the KV cache and does a standard AllReduce.
    **The Rationale:** Candidates miss the ring topology mechanism where each GPU holds a sequence chunk and rotates KV blocks, overlapping communication with computation to fit within memory.
    **The Consequence:** Proposing impossible KV cache allocations or suffering massive communication bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1M token context on 8 MI300X GPUs (192 GB HBM3 each).
    - Model: 80 attention layers, 96 KV heads per layer, head_dim=128.
    - BF16 KV cache: 2 tensors (K and V) * 2 bytes/value.
    - Ring Attention shards sequence blocks across 8 GPUs and rotates KV blocks around the ring.
    **Calculations:**
    - Total KV bytes = 1,000,000 * 128 * 96 * 80 * 2 * 2 = 3,932,160,000,000 bytes = 3.93 TB.
    - Ideal per-GPU shard = 3.93 TB / 8 = 491.5 GB.
    - 491.5 GB > 192 GB before temporary buffers or double-buffering.
    **Conclusion & Interpretation:**
    - **Result: OOM (Memory-Capacity-Bound)**. Ring Attention would use a ring rotation of KV blocks, but this specific 80-layer KV cache cannot fit on only 8 MI300X GPUs.
