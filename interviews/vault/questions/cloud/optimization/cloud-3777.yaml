title: Ring Attention for Million-Token Contexts
scenario: You need to process a 1M token context on 8 MI300X GPUs (192 GB HBM3 each). Even with FlashAttention,
  the KV cache for 1M tokens at 128 head_dim × 96 heads × 80 layers × 2 (K+V) × 2 bytes = ~3.9 TB, far
  exceeding any single GPU.
question: How does Ring Attention distribute 1M-token attention across 8 MI300X GPUs, and what communication
  pattern does it use?
details:
  realistic_solution: Ring Attention partitions the sequence into chunks. Each GPU holds Q for its chunk
    and computes attention against K,V blocks rotating through the ring. However, for a 1M token sequence
    with 128 head_dim, 96 heads, and 80 layers, the total KV cache is ~3.9 TB. Ring Attention requires
    each GPU to store its own 1/8th chunk of Q, plus at least two chunks of KV (current and receiving)
    at any time. A single 1/8th chunk of the KV cache is ~490 GB. Since an MI300X only has 192 GB of HBM3,
    even a single chunk exceeds the GPU's memory capacity. Therefore, distributing this 1M-token context
    across only 8 MI300X GPUs is physically impossible without additional techniques like KV cache quantization,
    offloading, or using more GPUs.
  common_mistake: '**The Pitfall:** Thinking Ring Attention simply shards the KV cache and does a standard
    AllReduce.

    **The Rationale:** Candidates miss the ring topology mechanism where each GPU holds a sequence chunk
    and rotates KV blocks, overlapping communication with computation to fit within memory.

    **The Consequence:** Proposing impossible KV cache allocations or suffering massive communication
    bottlenecks.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 1M token context on 8 MI300X GPUs (192 GB HBM3 each).

    - Total KV cache for 1M tokens is ~3.9 TB.

    - Ring Attention stores at least 2 KV chunks per GPU at a time.

    **Calculations:**

    - Per GPU chunk size = 3.9 TB / 8 = 487.5 GB.

    - Minimum memory required for 2 KV chunks = 2 * 487.5 GB = 975 GB.

    - 975 GB > 192 GB available HBM3.

    **Conclusion & Interpretation:**

    - **Result: OOM (Memory-Capacity-Bound)**. The total KV cache is too large to be partitioned across
    only 8 GPUs, making the scenario physically impossible as specified.

    '
