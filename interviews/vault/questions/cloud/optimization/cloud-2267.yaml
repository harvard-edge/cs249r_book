title: 'The New Accelerator Compiler Stack'
scenario: 'Your company is designing a custom AI accelerator with a novel dataflow architecture. It features a 2D array of processing elements (PEs), each with 256KB of local SRAM, connected by a configurable on-chip network. Unlike GPUs or TPUs, your PEs execute independent instruction streams and communicate via explicit message passing.'
question: 'How would you design the MLIR compiler stack for this message-passing PE accelerator, including dialects, lowering passes, and auto-tuning?'
details:
  realistic_solution: 'The compiler stack requires 4 dialect levels with custom lowering passes: **Level 1 — Reuse `torch`/`linalg` dialects**: The top of the stack is hardware-independent. **Level 2 — Create a `dataflow` dialect**: This represents computation as a DAG of tiles mapped to PEs, with explicit communication edges. The critical lowering pass here partitions the computation graph into subgraphs that fit within each PE''s 256KB SRAM. **Level 3 — Create a `pe_isa` dialect**: Lower the dataflow operations to per-PE instruction streams. The key optimization pass is communication-computation overlap. **Level 4 — Target codegen**: Emit the binary instruction stream for each PE. Auto-tuning integrates at Level 2, using a cycle-accurate simulator as the cost function with Bayesian optimization.'
  common_mistake: |
    **The Pitfall:** Forking the NVIDIA GPU backend and attempting to hack it to fit the novel hardware.
    **The Rationale:** Compilers are hard, so teams try to reuse mature backends to save time.
    **The Consequence:** GPU compilers rigidly assume SIMT execution, shared memory, and warp-level synchronization—none of which apply. The compiler fails to express explicit message passing, leading to a complete project rewrite.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model matmul on a 16x16 PE array.
    - 256KB SRAM per PE.
    - 100ms/eval auto-tuning.

    **Calculations:**
    - Basic tile footprint: 256x4096x2B = 2MB (exceeds 256KB).
    - K-tiling (K=128): A tile = 256x128x2B = 64KB. B tile = 128x512x2B = 128KB. Output = 256x512x2B = 256KB. Total = 448KB.
    - Further tiling: Reduce output to 128x256 (64KB). A tile (128x128) = 32KB. B tile (128x256) = 64KB. Final footprint = 32 + 64 + 64 = 160KB.
    - Auto-tuning time: 5 M_tile * 5 N_tile * 5 K_tile * 3 comm schedules = 375 configs. Tuning takes 375 * 100ms = 37.5s per kernel.

    **Conclusion & Interpretation:**
    - **Result: 160KB memory footprint (Memory-Bound)**. The final memory footprint fits within the 256KB limit and tuning takes 37.5s per kernel.
