title: Choosing Temperature Scaling to Reduce ECE Under a 2ms SLA
scenario: Your team is deploying a fraud detection model handling 10,000 requests/sec. The model achieves 96% accuracy, but the downstream action threshold is 0.95 confidence. Many >0.95 confidence predictions are false positives. You need to reduce the Expected Calibration Error (ECE) from 0.15 to below 0.05. The SLA allows only 2ms of post-processing latency.
question: Which low-latency calibration method should you try to reduce ECE within the 2ms SLA, and how does ECE guide the choice?
details:
  realistic_solution: Start with temperature scaling. It optimizes a single positive scalar parameter (T) on the validation set to soften logits before the softmax. For a fixed logit vector, dividing by a positive scalar preserves the top-1 ordering, so it usually keeps accuracy unchanged while addressing overconfidence. It adds negligible inference latency, but it does not guarantee ECE below 0.05; accept it only if validation ECE meets the target, otherwise consider richer calibration and measure the SLA impact.
  common_mistake: |
    **The Pitfall:** Assuming Isotonic Regression is always better because it is non-parametric.
    **The Rationale:** Candidates ignore that Isotonic Regression adds significant inference latency and can alter class predictions in multi-class settings.
    **The Consequence:** The calibration succeeds but the pipeline violates the strict 2ms latency SLA, breaking the production service.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target ECE: < 0.05. Latency SLA: 2ms.
    - Current ECE bin [0.9, 1.0]: avg conf = 0.98, actual acc = 0.60. Bin weight = 20%.

    **Calculations:**
    - Bin ECE contribution = |0.60 - 0.98| * 0.20 = 0.076.
    - Temperature scaling (T > 1) can shift the bin's average confidence downward; validation determines whether the new bin gap is small enough.

    **Conclusion & Interpretation:**
    - **Result: Temperature scaling is the latency-safe first choice, not a guarantee.** It preserves top-1 ordering for positive T and adds about zero latency, but the ECE target is satisfied only if held-out calibration metrics fall below 0.05.
