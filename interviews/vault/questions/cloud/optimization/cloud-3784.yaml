title: FlashAttention Memory Savings Enable Longer Training Contexts
scenario: You train a 13B model on a GPU. Weights in BF16 = 26 GiB. Optimizer states (AdamW, mixed precision) = 52 GiB. Remaining HBM for activations = 2 GiB.
question: With only 2 GiB left for activations, what max sequence length can standard attention support, and how does FlashAttention change it?
details:
  realistic_solution: 'Standard attention activation per layer per micro-batch for the attention matrix alone is N² × num_heads × 2 bytes = N² × 40 × 2 = 80N² bytes, assuming 40 heads for the 13B model. For that largest single-layer allocation: 80N² ≤ 2 GiB = 2,147,483,648 bytes, so N² ≤ 26,843,545 and N ≤ 5181 tokens. Accounting for other activations, the practical standard-attention limit is lower, around 3000-4000 tokens under this simplified budget. FlashAttention does not store the full N² attention matrix, so it removes this quadratic activation term. A lower-bound linear term for attention input/output tensors is Q,K,V,O = 4 × N × 40 × 128 × 2 = 40,960N bytes per layer, which gives N ≤ 52,428 for that term alone within 2 GiB. That is not an end-to-end maximum context length, because MLP activations, layer count, checkpointing policy, micro-batch size, dropout, framework workspaces, and backward-pass saved tensors also consume memory. The exact FlashAttention limit is therefore implementation-dependent;
    the defensible conclusion from the given data is that FlashAttention removes the N² attention-matrix bottleneck and can support much longer contexts, while the exact 16K-32K range requires additional assumptions.'
  common_mistake: |
    **The Pitfall:** Forgetting that activation memory includes more than just the attention matrix.
    **The Rationale:** Candidates focus solely on the O(N²) attention bottleneck and ignore MLP and layer norm activations.
    **The Consequence:** Overestimating the maximum possible sequence length even with standard attention.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model (approx. 40 heads, 128 head dim).
    - 2 GiB available for activations.

    **Calculations:**
    - Standard attention memory (1 layer): N^2 * 40 heads * 2 bytes = 80N^2 bytes.
    - Solve for N with 2 GiB limit: 80N^2 <= 2,147,483,648 bytes -> N^2 <= 26,843,545 -> N <= 5,181 tokens.
    - FlashAttention removes the stored N^2 attention matrix.
    - A simple linear attention-tensor lower bound is Q,K,V,O: 4 * N * 128 * 40 * 2 = 40,960N bytes.
    - Solve for that lower bound with 2 GiB: 40,960N <= 2,147,483,648 bytes -> N <= 52,428 tokens.

    **Conclusion & Interpretation:**
    - **Result: standard attention supports at most 5,181 tokens for the attention matrix alone**. FlashAttention removes the quadratic term, but the exact maximum context length is implementation-dependent and cannot be derived from the 2 GiB budget without the remaining activation model.
