title: FlashAttention Memory Savings Enable Longer Training Contexts
scenario: You train a 13B model on a GPU. Weights in BF16 = 26 GiB. Optimizer states (AdamW, mixed precision) = 52 GiB. Remaining HBM for activations = 2 GiB.
question: With only 2 GiB left for activations, what max sequence length can standard attention support, and how does FlashAttention change it?
details:
  realistic_solution: 'From the given data, you can derive only an attention-matrix-only bound, not the practical end-to-end max sequence length. Standard attention stores an N² score/probability matrix per layer per micro-batch: N² × 40 heads × 2 bytes = 80N² bytes. If the entire 2 GiB activation budget were spent on that one allocation, 80N² ≤ 2,147,483,648 bytes, so N ≤ 5181 tokens. The real standard-attention maximum is lower because activations also include Q/K/V, output projections, MLPs, layer norms, residuals, backward-saved tensors, checkpointing choices, micro-batch size, and framework workspaces. FlashAttention changes the scaling by avoiding materialization of the full N² attention matrix, so it removes this quadratic bottleneck and makes longer contexts feasible. However, the exact FlashAttention maximum cannot be determined from the given information; it depends on the missing activation model and implementation details.'
  common_mistake: |
    **The Pitfall:** Forgetting that activation memory includes more than just the attention matrix.
    **The Rationale:** Candidates focus solely on the O(N²) attention bottleneck and ignore MLP and layer norm activations.
    **The Consequence:** Overestimating the maximum possible sequence length even with standard attention.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model (approx. 40 heads, 128 head dim).
    - 2 GiB available for activations.

    **Calculations:**
    - Standard attention matrix memory for one layer: N^2 * 40 heads * 2 bytes = 80N^2 bytes.
    - Attention-matrix-only bound with 2 GiB: 80N^2 <= 2,147,483,648 bytes -> N^2 <= 26,843,545 -> N <= 5,181 tokens.
    - This is not a practical max sequence length because it spends the full activation budget on one layer's attention matrix and ignores Q/K/V, MLP, layernorm, residual, backward-saved tensors, micro-batch size, checkpointing, and workspaces.
    - FlashAttention removes the stored N^2 attention matrix.
    - A simple Q,K,V,O tensor term, 4 * N * 128 * 40 * 2 = 40,960N bytes, is only one omitted linear component and is insufficient to determine the end-to-end limit.

    **Conclusion & Interpretation:**
    - **Result: 5,181 tokens is only a one-layer attention-matrix-only upper bound.** The practical standard-attention limit is lower, and the exact FlashAttention limit cannot be derived from the 2 GiB budget without the full activation assumptions.
