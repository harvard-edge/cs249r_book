title: LLM Concurrency and KV Cache Thrashing
scenario: You are mapping the efficiency frontier (throughput vs. latency) for a Llama-3 70B model served on an 8x80GB H100 node. To maximize throughput and lower cost-per-token, the infrastructure team increases the max concurrent requests from 64 to 256. They expect a sub-linear latency increase while moving along the Pareto curve. Instead, p99 Time-To-First-Token (TTFT) spikes from 0.8s to over 12s, and total system throughput decreases by 20% compared to the 64-request baseline.
question: Why did raising max concurrency from 64 to 256 spike p99 TTFT and reduce throughput on the 8xH100 70B service?
details:
  realistic_solution: 'The regression is caused by KV cache thrashing. At 256 concurrent requests, the required KV cache exceeds the available GPU HBM. Instead of crashing, modern inference engines (like vLLM) preempt active decode requests, swapping their KV caches to CPU RAM to make room. The solution is to strictly profile memory usage and cap max concurrency below the HBM threshold, keeping the system on the true efficiency frontier without falling into swapping degradation.'
  common_mistake: |
    **The Pitfall:** Assuming the performance drop is due to an Out-Of-Memory (OOM) crash or hitting pure compute FLOP limits.
    **The Rationale:** Candidates fail to identify the hidden penalties of memory paging, request preemption, and PCIe bottlenecking in modern inference engines (like vLLM).
    **The Consequence:** Pushing the system into severe swapping degradation rather than operating safely on the efficiency frontier.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3 70B, 8x80GB H100 (640GB total), 256 requests, 8K context, PCIe max 64GB/s

    **Calculations:**
    - KV Cache per token = 2 bytes * 2 * 80 layers * 8 heads * 128 dim = 320 KB
    - 256 reqs * 8K = 2M tokens
    - KV memory = 2M * 320 KB = ~640 GB. Model weights = 140 GB. Total = 780 GB

    **Conclusion & Interpretation:**
    - **Result: 780 GB (PCIe-Bandwidth-Bound)**. Exceeding the 640GB HBM limit forces KV swapping over the 64GB/s PCIe bus, thrashing throughput.
