title: Evaluate GPU Preprocessing for Video Analytics
scenario: 'You are designing a high-throughput video analytics pipeline on a server with 8x NVIDIA A100 GPUs (PCIe Gen4 x16). The current system extracts 1080p frames, decodes them on the CPU to raw RGB (6.2MB/frame), and transfers them to the GPUs for batched inference. GPU utilization is stuck at 15% while the CPUs are fully saturated.'
question: 'Should the video pipeline send 200KB compressed frames to the GPUs and decode with DALI instead of transferring 6.2MB raw frames, and why?'
details:
  realistic_solution: 'Shift decoding and resizing to the GPU. While this consumes some GPU compute and memory, it drastically reduces the PCIe payload size from 6.2MB to 200KB per frame, lifting the interconnect bottleneck and allowing the A100 to reach high utilization.'
  common_mistake: |
    **The Pitfall:** Assuming CPU thread counts alone are the primary limit, or assuming GPU preprocessing is "free".
    **The Rationale:** Engineers often fail to calculate the exact PCIe bandwidth bottleneck and don't realize how quickly raw video frames saturate the bus.
    **The Consequence:** Designing a pipeline that leaves GPUs starved for data at 15% utilization because the system is choked by PCIe transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 ResNet-50 throughput is ~5,000 fps.
    - Raw 1080p frame: 1920x1080x3 bytes = 6.2MB.
    - Compressed frame: 200KB.

    **Calculations:**
    - Transferring raw 1080p frames: 5,000 fps * 6.2 MB = 31 GB/s per GPU.
    - For 8 GPUs, this demands 248 GB/s (bottleneck).
    - Transferring compressed frames: 5,000 fps * 200 KB = 1 GB/s per GPU.

    **Conclusion & Interpretation:**
    - **Result: 1 GB/s vs 31 GB/s (PCIe Bottleneck Lifted)**. Transferring 200KB compressed frames completely lifts the PCIe bottleneck, allowing the GPUs to reach high utilization.
