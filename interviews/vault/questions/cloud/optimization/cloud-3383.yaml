title: Optimizing Large Language Model Deployment on H100 via Knowledge Distillation
scenario: Your team developed a massive transformer-based language model. For a new low-latency inference service, you need to deploy a smaller, more efficient student model on a single GPU using Knowledge Distillation to achieve near-teacher performance while minimizing latency.
question: How would you size the student model and choose logit or feature distillation to balance near-teacher accuracy, latency, and cost?
details:
  realistic_solution: Employ a multi-stage distillation approach. First, use logit matching with temperature scaling to transfer general knowledge. Then, incorporate feature distillation (e.g., attention map matching, intermediate hidden state matching) at critical layers to capture architectural nuances. For sizing, systematically explore student architectures with fewer layers and smaller hidden dimensions. Estimate the student model's memory footprint to ensure it comfortably fits within the 80 GB HBM3, prioritizing memory bandwidth efficiency for key operations. Utilize mixed-precision training (FP16) for distillation to leverage the hardware's 989 TFLOPS FP16 dense performance. Benchmark different student configurations to find the optimal trade-off between latency, throughput, and accuracy, ensuring the design can fully exploit the 3.35 TB/s memory bandwidth for data transfer.
  common_mistake: |
    **The Pitfall:** Overfitting the student to the teacher's outputs on the training data without considering generalization or hardware bottlenecks.
    **The Rationale:** Neglecting the architectural differences between teacher and student leads to suboptimal transfer. Furthermore, not accounting for the specific memory bandwidth and compute characteristics of the target GPU results in underutilization or bottlenecks.
    **The Consequence:** A student model that performs poorly on unseen data and fails to meet latency targets despite its smaller size.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Teacher model: 10B parameters, FP16 (20GB footprint).
       - Student model: 1B parameters, FP16 (2GB footprint).
       - Target hardware: H100 (3.35 TB/s bandwidth, 989 TFLOPS FP16 compute).
       - Profile: Batch size 1 inference.
    2. **Calculations:**
       - Memory-bound token generation rate: 3.35 TB/s / 2 GB = 1,675 tokens/sec.
       - Compute-bound limit (2 GFLOPs/token): 989,000 GFLOPs / 2 = 494,500 tokens/sec.
    3. **Conclusion & Interpretation:** **1,675 << 494,500. The student is heavily Memory-Bandwidth-Bound. Optimize for footprint, not FLOPS.**
