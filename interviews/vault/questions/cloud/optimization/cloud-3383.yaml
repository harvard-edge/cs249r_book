title: Optimizing Large Language Model Deployment on H100 via Knowledge Distillation
scenario: Your team developed a massive transformer-based language model. For a new low-latency inference service, you need to deploy a smaller, more efficient student model on a single GPU using Knowledge Distillation to achieve near-teacher performance while minimizing latency.
question: How would you size the student model and choose logit or feature distillation to balance near-teacher accuracy, latency, and cost?
details:
  realistic_solution: |
    Use logit matching first to train several smaller student candidates, then add feature or attention-map distillation only at layers that recover measurable quality. Size the student by profiling token latency, not just by fitting weights in HBM. Vary layer count, hidden width, attention heads, and MLP size to find the smallest model that keeps near-teacher accuracy. For H100 inference, estimate parameter bytes, KV-cache growth, activation traffic, and Tensor Core utilization, then benchmark batch-1 and target-batch latency before choosing the final architecture.
  common_mistake: |
    **The Pitfall:** Overfitting the student to the teacher's outputs on the training data without considering generalization or hardware bottlenecks.
    **The Rationale:** Neglecting the architectural differences between teacher and student leads to suboptimal transfer. Furthermore, not accounting for the specific memory bandwidth and compute characteristics of the target GPU results in underutilization or bottlenecks.
    **The Consequence:** A student model that performs poorly on unseen data and fails to meet latency targets despite its smaller size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher model: 10B parameters, FP16 weights ≈ 20 GB.
    - Candidate student: 1B parameters, FP16 weights ≈ 2 GB.
    - Target hardware: H100 with high HBM bandwidth and Tensor Core throughput.
    - Profile target: autoregressive inference, batch size 1 and target serving batch.

    **Calculations:**
    - A lower bound for streaming 2 GB of weights once is 2 GB / 3.35 TB/s ≈ 0.6 ms, but a token step is not a single ideal bulk transfer.
    - Actual token latency includes layer-by-layer weight movement, KV-cache reads/writes, attention/MLP compute, kernel overhead, and achievable memory bandwidth.
    - If profiling shows most time in GEMMs, reduce width/layers or improve Tensor Core utilization; if time is dominated by weight or KV movement, reduce parameter count, KV size, and memory traffic.

    **Conclusion & Interpretation:**
    - **Result: Profile before classifying the bottleneck.** A 1B FP16 student fits easily in 80 GB HBM, but bandwidth division alone does not prove tokens/sec or memory-bound behavior; choose the student size from measured token latency and quality.
