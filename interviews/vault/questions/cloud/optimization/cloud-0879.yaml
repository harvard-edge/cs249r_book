title: Evaluating Async Prefetching for H100 Starvation
scenario: You are training a large vision model on an 8x H100 node. Profiling shows that a forward/backward pass takes 45ms per batch. However, fetching and augmenting a batch of 1024 high-resolution images from network storage takes 110ms on the CPU. The current sequential pipeline yields ~29% GPU utilization.
question: Evaluate the trade-offs between CPU workers, offline preprocessing, and async GPU decoding (DALI) to stop H100 starvation?
details:
  realistic_solution: Simple async prefetching overlaps I/O but is bounded by `max(T_data, T_compute)`. Since 110ms > 45ms, standard CPU prefetching only improves utilization to about 41%. Offline augmentation can reduce CPU pressure but creates large storage overhead and limits training flexibility. DALI or GPU-side decoding is the right direction only if it reduces the input pipeline below the GPU compute window; for example, a 30ms input stage hidden under a 50ms GPU-side step would make the GPU the bottleneck. If the input path remains above about 45-50ms, H100 starvation remains.
  common_mistake: |
    **The Pitfall:** Assuming infinite scaling with more CPU workers and `prefetch_factor`.
    **The Rationale:** Believing adding CPU threads will linearly eliminate I/O limits.
    **The Consequence:** Hitting hard CPU thread contention and memory bandwidth limits, leaving the H100 GPUs severely starved because CPU processing time still strictly exceeds GPU compute time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Compute Time: 45ms.
       - CPU Fetch/Augment Time: 110ms.
    2. **Calculations:**
       - Sequential Baseline: 110ms + 45ms = 155ms. GPU Util = 45 / 155 = 29%.
       - Async CPU Prefetch: Step Time = max(110, 45) = 110ms. GPU Util = 45 / 110 = 41%.
       - DALI/GPU Offload Condition: input pipeline time must drop below the compute window to stop starvation.
       - Example DALI Case: CPU-visible input work drops to 30ms, GPU-side step becomes 50ms. Step Time = max(30, 50) = 50ms, so the GPU is compute-bound under that new measured profile.
    3. **Conclusion & Interpretation:**
       - **Result: DALI is conditional, not automatic.** Prefetching alone raises utilization only to about 41%; DALI reaches near-full saturation only if it reduces end-to-end input time below the GPU compute time.
