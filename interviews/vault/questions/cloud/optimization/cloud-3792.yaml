title: Attention Sink Tokens and KV Cache Eviction
scenario: You serve a streaming chatbot with a 128K context window but only 80 GB HBM. The full KV cache at 128K tokens is 40 GB, leaving only 14 GB for weights and activations after the 26 GB model.
question: What is the attention sink phenomenon, and what KV-cache eviction policy preserves quality for 128K-context streaming on an 80 GB GPU?
details:
  realistic_solution: 'The attention sink phenomenon: in autoregressive models, the first 2-4 tokens in the sequence consistently receive very high attention weights from all subsequent tokens. Eviction policy (StreamingLLM approach): (1) Always retain the first K_sink = 4 tokens (attention sinks). (2) Retain the most recent W tokens (sliding window). (3) Evict everything in between. Memory: (K_sink + W) * per-token KV size. With K_sink=4 and W=4096: 4100/128000 * 40 GB = ~1.3 GB.'
  common_mistake: |
    **The Pitfall:** Using simple FIFO eviction (dropping the oldest tokens).
    **The Rationale:** Engineers assume old tokens are least relevant, ignoring that early tokens act as 'attention sinks' crucial for model stability.
    **The Consequence:** Evicting sink tokens causes immediate quality collapse and high perplexity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full KV cache (128K tokens) = 40 GB.
    - Eviction retains 4 sink tokens + 4096 window tokens = 4100 tokens.

    **Calculations:**
    - Retained cache size = (4100 / 128000) * 40 GB = 1.28 GB.
    - Memory saved = 40 GB - 1.28 GB = 38.72 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Mitigation (97% KV memory reduction preserving quality).**
