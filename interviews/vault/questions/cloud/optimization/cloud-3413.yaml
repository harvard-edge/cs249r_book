title: High-Throughput Speculative Decoding on AMD MI300X for Low-Latency LLM Inference
scenario: You are designing a high-performance speculative decoding system on an accelerator focusing on low-latency text generation utilizing draft and verify models.
question: How would you architect speculative decoding on MI300X to co-locate draft and verify models, select drafts dynamically, and maximize acceptance?
details:
  realistic_solution: Keep the verify model and a small pool of draft models resident in MI300X HBM rather than loading them on demand. Use a router based on prompt domain, recent token entropy, and rolling acceptance statistics to pick the draft model and draft length per request. Verify proposed token blocks in batches on the target model, record accepted-token rates by context bucket, and fall back to shorter drafts or greedy target-model decoding when acceptance drops. The key hardware fit is high HBM capacity and bandwidth for resident weights and KV/state movement, not model swapping or sparse-FP16 tuning.
  common_mistake: |
    **The Pitfall:** Failing to account for the interplay between memory bandwidth, HBM capacity, and sparse compute capabilities.
    **The Rationale:** Candidates often treat draft model selection independently of hardware constraints, leading to suboptimal data movement.
    **The Consequence:** The overhead of speculative decoding negates its benefits, worsening overall generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target model alone generates at 5 ms/token.
    - Draft cost for a 4-token proposal is 0.4 ms total.
    - Batched target verification of the 4 proposed tokens costs 5 ms.
    - Acceptance rate is 80%, so expected accepted tokens per proposal = 4 * 0.8 = 3.2.

    **Calculations:**
    - Expected block latency = draft latency + verify latency = 0.4 ms + 5 ms = 5.4 ms.
    - Effective latency per accepted token = 5.4 ms / 3.2 = 1.69 ms/token.
    - Baseline latency for the same 3.2 tokens = 3.2 * 5 ms = 16 ms.
    - Expected speedup = 16 ms / 5.4 ms = 2.96x before scheduler and KV-cache overhead.

    **Conclusion & Interpretation:**
    - **Result: about 1.7 ms/token, roughly 3x faster than baseline under these assumptions.** Dynamic draft routing is useful only if it keeps acceptance high enough to amortize the extra draft and verification work.
