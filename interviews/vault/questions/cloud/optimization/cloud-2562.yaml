title: Cloud Learning Rate Scheduling L3 0
scenario: 'You scale a training run from 8 to 64 GPUs using data parallelism, increasing the effective batch size 8x (from 256 to 2048).'
question: 'Using the linear scaling rule, what peak learning rate and warmup steps should you use if the original used LR=3e-4 with 1000 warmup steps?'
details:
  realistic_solution: 'Linear scaling rule: when batch size increases by k, scale LR by k. New LR: 3e-4 × 8 = 2.4e-3. However, large LR requires longer warmup to avoid early training instability. If we kept warmup samples constant, we would use 125 steps (256,000 samples / 2048). But a higher peak learning rate requires a more gradual warmup. A common rule of thumb is to keep the number of warmup steps constant (1000 steps) or even slightly increase them, which means the total warmup samples will increase by 8x. Practical approach: 1000-2000 warmup steps at the new batch size, with LR = 2.4e-3.'
  common_mistake: |
    **The Pitfall:** Scaling the Learning Rate (LR) linearly without adjusting the warmup duration.
    **The Rationale:** Candidates mechanically apply the linear scaling rule (Goyal et al.) but forget that a sudden high LR at initialization causes gradient explosion.
    **The Consequence:** Early training instability and potential divergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original: BS=256, LR=3e-4, 1000 warmup steps = 256K warmup samples.
    - Scaled: BS=2048.

    **Calculations:**
    - Scaled LR = 3e-4 * 8 = 2.4e-3.
    - Matching Samples: 256K / 2048 = 125 steps.
    - Adjustment: Higher LR needs a more gradual warmup (3-5x the sample-matched duration).

    **Conclusion & Interpretation:**
    - **Result: 500-1000 steps with LR 2.4e-3 (Stability-Bound)**. A sudden high LR at initialization causes gradient explosion if warmup is not scaled appropriately.
