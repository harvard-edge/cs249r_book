title: The Compilation Latency Wall in Serving
scenario: 'Your serving fleet uses torch.compile to optimize inference kernels. When deploying a model update, the first request takes 45 seconds because the compiler recompiles all kernels from scratch, violating your 5-second cold-start SLA. The team proposes three solutions: (A) cache compiled kernels and reuse across weight updates, (B) AOT-compile during CI/CD and ship pre-compiled artifacts, (C) serve un-compiled for the first 10 seconds while compilation happens in the background.'
question: How would you evaluate kernel caching, AOT compilation, and background compilation against the 5-second cold-start SLA?
details:
  realistic_solution: 'Option B (AOT compilation in CI/CD) is the most robust approach. Compile the model with representative input shapes during the build pipeline, serialize the TorchInductor artifacts (.so files), and deploy them alongside the weights. For LLM serving with variable sequence lengths, this requires compiling for multiple shape buckets.'
  common_mistake: |
    **The Pitfall:** Suggesting to simply increase the cold-start SLA instead of addressing the technical bottleneck.
    **The Rationale:** Candidates may not understand the performance characteristics and tradeoffs of different compilation strategies.
    **The Consequence:** This is a product cop-out that fails to evaluate valid technical solutions for a real production issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model has 80 unique kernel shapes.
    - JIT compilation time per shape: ~0.5s.
    - S3 cache load time per shape: 25ms.
    - AOT pre-compiled load time from disk per shape: 12ms.
    - Eager mode throughput: 60% of compiled throughput.

    **Calculations:**
    - JIT cold start: 80 * 0.5s = 40s (violates 5s SLA).
    - Option A (Kernel caching) cold start: 80 * 25ms = 2s.
    - Option B (AOT compilation) cold start: 80 * 12ms = 0.96s (~1s).
    - Option C (Background compilation) eager penalty: 40s at 60% throughput requires ~67% more GPUs to handle the same load.

    **Conclusion & Interpretation:**
    - **Result: ~1s (AOT Compilation Optimization)**. Option B is the most robust and predictable way to meet the 5-second SLA.
