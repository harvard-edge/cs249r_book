title: Diagnosing Optimal Retraining Frequency for Ad CTR Models
scenario: An e-commerce platform relies on an Ad CTR prediction model running on a fleet of 50 GPUs. The model's AUC decays steadily without retraining, resulting in an estimated linear revenue loss of $10,000 per day of staleness. Running a full distributed retrain costs $4,000 per job. Currently, the ML Ops team has scheduled retraining every 12 hours to maximize freshness, but infrastructure costs are ballooning.
question: "Is retraining every 12 hours optimal for the CTR model, or what retraining interval minimizes compute plus staleness cost?"
details:
  realistic_solution: The current 12-hour schedule is suboptimal because it over-indexes on freshness. By formulating a total cost function `Cost(T) = StalenessCost(T) + ComputeCost(T)`, you can balance the amortized cost of retraining against the average daily revenue lost. Taking the derivative of this function reveals that the global minimum cost occurs at roughly a 21.4-hour retraining interval. Moving to a 24-hour schedule saves thousands of dollars daily while barely impacting effective AUC.
  common_mistake: |
    **The Pitfall:** Assuming maximizing model freshness is the ultimate, unquestionable goal.
    **The Rationale:** ML engineers focus entirely on maintaining peak AUC/Accuracy metrics, ignoring the non-linear relationship between fixed infrastructure costs and marginal revenue.
    **The Consequence:** Burning vast amounts of compute budget to prevent microscopic drops in staleness that don't justify the hardware spend.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Revenue loss: $10,000 / day of staleness.
       - Retrain cost: $4,000 / job.
       - Let T = Retrain interval (in days).
       - Average staleness = T / 2.
    2. **Calculations:**
       - Daily staleness cost = $10,000 * (T/2) = 5000*T.
       - Daily compute cost = $4,000 / T.
       - Total Cost(T) = 5000*T + 4000/T.
       - Current 12h (T=0.5): 5000(0.5) + 4000/(0.5) = $2,500 + $8,000 = $10,500/day.
       - Derivative: 5000 - 4000/T^2 = 0 -> T^2 = 0.8 -> T ≈ 0.89 days (21.4 hours).
       - Minimum Cost (T=0.89): 5000(0.89) + 4000/(0.89) = $4,450 + $4,494 = $8,944/day.
    3. **Conclusion & Interpretation:**
       - **Result: 21.4 Hours is Optimal.** The system is **Cost-Bound**, and shifting from 12 hours to 24 hours saves over $1,500 per day by eliminating redundant compute.
