title: 'Implementing FlashAttention''s Online Softmax'
scenario: 'You are implementing FlashAttention''s online softmax for head_dim=128 on a GPU. Softmax requires the global row maximum, but you process K in tiles of B_c=128 tokens.'
question: 'What online-softmax rescaling rule should FlashAttention use when a new K tile raises the row max, and what FLOP overhead does it add?'
details:
  realistic_solution: 'When processing tile j, compute local max m_j over S_ij = Q_i @ K_j^T. If m_j > m_{j-1} (running max), rescale: O_i *= exp(m_{j-1} - m_j), l_i *= exp(m_{j-1} - m_j), then accumulate O_i += exp(S_ij - m_j) @ V_j and l_i += rowsum(exp(S_ij - m_j)). The rescaling costs 2*B_r*d = 2*128*128 = 32K FLOPs per tile update. Total matmul FLOPs per tile: 2*B_r*B_c*d = 2*128*128*128 = 4M FLOPs. Overhead: 32K/4M = 0.8%. Negligible.'
  common_mistake: |
    **The Pitfall:** Believing that online softmax adds significant computational overhead.
    **The Rationale:** Because rescaling touches every element in the output accumulator when a new maximum is found, candidates assume this constitutes a massive performance hit.
    **The Consequence:** They might incorrectly avoid online softmax or seek more complex approximations, failing to realize the rescaling cost is asymptotically negligible compared to the matrix multiplications.
  napkin_math: |
    **Assumptions & Constraints:**
    - Block dimensions: B_r = 128, B_c = 128, head_dim = 128.
    - Online softmax rescale triggers on a new max.
    
    **Calculations:**
    - Rescaling FLOPs per tile: 2 * B_r * head_dim = 32K FLOPs.
    - Matmul FLOPs per tile: 2 * B_r * B_c * head_dim = 4.2M FLOPs.
    - Overhead Calculation: 32K / 4.2M = 0.76%.
    
    **Conclusion & Interpretation:**
    - **Result: 0.76% (Compute-Bound)**. The computational overhead of continuous softmax rescaling is completely amortized by matrix multiplication FLOPs.
