title: Cloud Learning Rate Scheduling L5 0
scenario: At 70% through a 30-day LLM pretraining run on 1,024 GPUs ($2/hr), you notice the loss curve has flattened significantly. Options are to restart with a higher peak LR, apply a mid-training LR warm restart, or continue with the current schedule.
question: At 70% through a 30-day LLM pretraining run with flattened loss, should you restart, apply an LR warm restart, or continue?
details:
  realistic_solution: Option C (continue) is best. Plateaus are natural as easy patterns are learned. Restarting is too expensive, and warm restarts carry destabilization risk. If the loss truly stagnates after a few more days, a mild warm restart might be justified.
  common_mistake: |
    **The Pitfall:** Panicking at a loss plateau and immediately restarting training from scratch.
    **The Rationale:** Candidates misinterpret natural plateaus (where the optimizer learns harder patterns) as a failed run.
    **The Consequence:** Wasting hundreds of thousands of dollars in GPU time for no guaranteed improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30-day LLM pretraining run on 1,024 GPUs at $2/hr.
       - 70% completion.
    2. **Calculations:**
       - Total cost: 30 days * 1,024 GPUs * $2/hr * 24 hrs = $1.47M.
       - Sunk cost (70%): 0.70 * $1.47M = $1.03M.
       - Option A (Restart): Wastes the entire $1.03M sunk cost.
       - Option B (Warm Restart): Risks ~1 day of compute if rollback needed ($49K).
       - Option C (Continue): Costs $0 extra.
    3. **Conclusion & Interpretation:**
       - **Option C is mathematically and empirically optimal; a restart (A) requires >30% better final loss to break even.**
       - **Result: Cost-Bound**
