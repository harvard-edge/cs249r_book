title: CPU Dispatch Overhead in Eager Execution
scenario: You are training a GNN using PyTorch eager mode on a single GPU. The forward pass has a sequential loop of 1,000 small matrix operations per batch. Theoretical GPU execution time is 0.5ms (500ns per op). However, profiling shows the forward pass takes 5.5ms with the GPU sitting idle between operations.
question: What per-operation dispatch tax does the profile imply, and what native PyTorch optimization would eliminate it?
details:
  realistic_solution: Identify the 5.5us per-op overhead as the Python/C++ PyTorch dispatch tax. Use torch.compile (with mode='reduce-overhead') or CUDA Graphs to trace and collapse the 1,000 kernel launches into a single graph launch.
  common_mistake: |
    **The Pitfall:** Assuming the model is memory-bandwidth bound.
    **The Rationale:** Engineers look at slow small operations and assume the GPU memory is the bottleneck.
    **The Consequence:** They implement misguided suggestions like mixed precision, which fails to fix the CPU-side Python overhead gap.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total operations: 1,000 per batch.
    - Total time (eager): 5.5 ms.
    - Pure GPU execution time: 0.5 ms.

    **Calculations:**
    - Dispatch tax per op: (5,500 µs - 500 µs) / 1,000 ops = 5 µs/op.
    - Optimized overhead (CUDA Graphs): 1 launch = ~5 µs overhead.
    - Optimized time: 0.5 ms + 0.005 ms = 0.505 ms.
    - Speedup: 5.5 ms / 0.505 ms = ~10.9x.

    **Conclusion & Interpretation:**
    - **Result: CPU-Dispatch Bound**. Eager mode execution is bottlenecked by a 5 µs Python/C++ dispatch tax per operation, fixed by graph tracing.
