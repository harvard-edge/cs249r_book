title: 'Kernel Fusion: Realize Kernel Fusion Gains for 70B LLM Inference'
scenario: A junior engineer calculates the per-layer attention FLOPs for a 70B LLM (hidden size 8192,
  64 heads, head_dim 128) serving 32 concurrent users in decode mode at seq=8192, and claims it requires
  8.59 TFLOPs.
question: What is the correct per-layer attention FLOP count, and why is the 8.59 TFLOPs estimate fundamentally
  flawed?
details:
  realistic_solution: 'Attention FLOPs for a single layer at seq=8192 in DECODE mode (batch=32): QK^T
    scores = 2 × batch × seq × hidden = 2 × 32 × 8192 × 8192 = 4.29 GFLOPs. Attention over values (SV)
    adds another 4.29 GFLOPs. Full attention is heavily memory-bound, not compute-bound. 8.59 TFLOPs per
    layer assumes prefill seq² math, which is incorrect for decode.'
  common_mistake: '**The Pitfall:** Confusing the arithmetic intensity of prefill mode with decode mode.

    **The Rationale:** Candidates apply the seq² math used in training/prefill to autoregressive decoding,
    failing to recognize that decode attention is a matrix-vector operation, not matrix-matrix.

    **The Consequence:** Grossly overestimating decode compute requirements by a factor of 1000x.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Sequence length: 8192. Batch size: 32. Hidden\
    \ dim: 8192.\n   - Operation: Autoregressive decode (matrix-vector multiplication).\n2. **Calculations:**\n\
    \   - QK^T Scores (Decode) = 2 * batch * seq * hidden = 2 * 32 * 8192 * 8192 = 4.29 GFLOPs.\n   -\
    \ Attention over Values = 2 * batch * seq * hidden = 4.29 GFLOPs.\n   - Total = ~8.59 GFLOPs.\n3.\
    \ **Conclusion & Interpretation:** **Result: Compute-Bound (Estimation Error)**. The 8.59 TFLOPs estimate\
    \ is exactly 1000x too high due to fundamentally misapplying prefill O(N^2) arithmetic to decode O(N)\
    \ autoregressive token generation.\n"
