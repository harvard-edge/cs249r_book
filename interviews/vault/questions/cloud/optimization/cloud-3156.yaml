title: Ring Attention Communication-Computation Overlap Budget
scenario: 'You are designing Ring Attention for a 70B model across 16 GPUs (2 nodes, 8 NVLink GPUs/node, 400 Gb/s InfiniBand between nodes). Sequence length: 256K tokens split evenly (16K/GPU). Head_dim=128, 8 GQA KV heads.'
question: Is the 400 Gb/s InfiniBand link a bottleneck for Ring Attention across 16 GPUs at 256K context, and what ring ordering should you use?
details:
  realistic_solution: |
    KV block per GPU per layer is 16K tokens x 8 KV heads x 128 dim x 2B x 2(K+V) = 67,108,864 bytes = 64 MiB. Each ring step sends that block for the current layer. NVLink intra-node transfer is about 64 MiB / 900 GB/s = 0.07 ms. InfiniBand is 400 Gb/s = 50 GB/s, so a cross-node step is about 64 MiB / 50 GB/s = 1.3 ms. The 400 Gb/s link is therefore not automatically disqualifying, but it is the slow step that must be hidden under local attention compute; if the compute slice is shorter than about 1.3 ms or overlap is poor, cross-node steps become the bottleneck. Use a topology-aware ring with each node as a contiguous segment, for example 0-1-...-7-8-9-...-15, so only the 7->8 edge and the 15->0 wraparound cross InfiniBand. An interleaved order would create many unnecessary cross-node steps and make the link the dominant bottleneck.
  common_mistake: |
    **The Pitfall:** Using an interleaved ring order such as 0,8,1,9,... without considering the physical node boundaries.
    **The Rationale:** Candidates treat all network links as homogeneous, ignoring the massive bandwidth disparity between NVLink (900 GB/s) and InfiniBand (50 GB/s).
    **The Consequence:** Unnecessary cross-node transfers that saturate the InfiniBand link, severely bottlenecking the Ring Attention pipeline on shorter sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16K tokens/GPU, 8 KV heads, 128 dim, 2 Bytes.
    - NVLink: 900 GB/s. InfiniBand: 400 Gb/s (50 GB/s).

    **Calculations:**
    - Block size = 16K * 8 * 128 * 2B * 2(K+V) = 67,108,864 bytes = 64 MiB.
    - NVLink transfer step: 64 MiB / 900 GB/s ≈ 0.07 ms.
    - InfiniBand transfer step: 64 MiB / 50 GB/s ≈ 1.3 ms.
    - The cross-node transfer can be hidden only if local attention compute per ring step is at least about 1.3 ms and the implementation overlaps send/receive with compute.
    - Contiguous node ordering gives two unavoidable cross-node edges per ring revolution: node0->node1 and the wraparound.
    - Interleaving GPUs across nodes would turn most ring edges into 1.3 ms InfiniBand steps instead of 0.07 ms NVLink steps.

    **Conclusion & Interpretation:**
    - **Result: Topology- and Overlap-Dependent**. The 400 Gb/s link is bandwidth-sufficient only if the 1.3 ms cross-node step is overlapped with enough local attention compute; order GPUs contiguously by node to limit cross-node hops to the two unavoidable ring boundaries.
