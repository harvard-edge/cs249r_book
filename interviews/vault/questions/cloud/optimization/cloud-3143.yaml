title: Full-Stack FlashAttention Deployment Decision
scenario: 'You are the Staff ML engineer deciding the attention implementation for a new 405B model served on 64x H100 (8 nodes, NVLink + InfiniBand 400 Gb/s). Context window: 32K. Requirements: P99 TTFT < 2s, 1000 req/s throughput.'
question: What is the complete attention stack, KV cache management, sequence parallelism, and prefix caching strategy, and why is 810 TFLOPs per token a unit error?
details:
  realistic_solution: Use FlashAttention-2/FlashInfer-style decode kernels integrated with PagedAttention so KV pages can be gathered without copying into contiguous buffers. Keep KV cache in paged blocks with prefix-aware block sharing, eviction, and admission control; at 32K context, prefix caching is required for repeated system prompts because uncached prefill dominates TTFT. Use tensor parallelism for model weights and sequence/context parallelism for long prefill so the 32K attention work is split across the 64 H100s, then use paged KV for decode. A 405B dense model costs about 2 x 405B = 810 GFLOPs/token, not 810 TFLOPs/token; the unit error is a 1000x overestimate. At 64 H100s, peak compute is about 63 PFLOP/s, so an uncached token lower bound is ~13 us before utilization, communication, attention IO, and batching overheads. The design decision is therefore not "one request takes 0.5s"; it is to combine efficient attention kernels, paged KV, sequence-parallel prefill, and prefix
    reuse to keep P99 TTFT under 2s while batching decode for throughput.
  common_mistake: |
    **The Pitfall:** Treating attention kernel, KV cache manager, and caching layer as independent choices.
    **The Rationale:** Engineers often evaluate optimizations in isolation without considering architectural interplay.
    **The Consequence:** Designing an incompatible stack leading to sub-optimal throughput or implementation failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 405B model parameters.
    - 64 H100s, each with 989 TFLOPS peak FP16/BF16 tensor compute.
    - P99 TTFT < 2s, 1000 req/s.
    - 32K context requires long-prefill and long-decode attention support.

    **Calculations:**
    - FLOPs per token: 2 * 405B = 810 GFLOPs/token (not 810 TFLOPs).
    - Cluster peak: 64 * 989 TFLOPS = 63,296 TFLOPS = 63.3 PFLOP/s.
    - Ideal compute lower bound per generated token: 810 GFLOPs / 63.3 PFLOP/s = 0.0128 ms if one token used the whole cluster.
    - In practice, tensor/pipeline communication, KV reads, batching limits, and prefill attention dominate the gap to the 2s P99 TTFT target.
    - Required stack: FA-2-class attention kernels, paged KV cache, sequence-parallel prefill for 32K contexts, and prefix caching for shared prompts.

    **Conclusion & Interpretation:**
    - **Result: Full-Stack Serving Decision**. The unit correction is 810 GFLOPs/token, and meeting 1000 req/s with 32K contexts depends on the attention/KV/cache architecture, not a standalone per-token FLOP estimate.
