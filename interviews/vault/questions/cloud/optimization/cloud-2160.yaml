title: The Chinchilla Scaling Decision
scenario: You have a fixed GPU budget of 1M GPU-hours. The Chinchilla scaling law says the compute-optimal 70B model should be trained on ~1.4T tokens. But your team has only 500B tokens of high-quality data.
question: 'Which option should you choose: 70B on 500B tokens, 25B on 500B tokens, or repeating the 500B tokens about 3 times, and why?'
details:
  realistic_solution: 'Choose the 70B model on the 500B high-quality tokens if the product objective is best downstream capability under a fixed data budget and inference/TCO is acceptable. A 25B model on 500B tokens is closer to Chinchilla-optimal for training loss per FLOP, so it is the right choice only if training efficiency or serving cost dominates. Repeating the same 500B tokens about 3 times can spend the 70B Chinchilla token budget, but repeated epochs have diminishing returns and higher overfitting risk than adding fresh data. The key is to state the objective: for this question, select the larger undertrained model for capability, while documenting that it is not compute-optimal by Chinchilla.'
  common_mistake: |
    **The Pitfall:** Blindly following Chinchilla scaling laws to train a smaller model.
    **The Rationale:** Candidates often optimize purely for training efficiency without considering the total cost of ownership (TCO), where inference cost dominates.
    **The Consequence:** Deploying a smaller, weaker model that fails to achieve the downstream capabilities possible with a larger, undertrained model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Chinchilla-optimal: ~70B params (~1.4T tokens), ~25B params (~500B tokens).
    - Available high-quality data: 500B tokens.

    **Calculations:**
    - Option A (70B, 500B): uses only 500B / 1.4T ≈ 36% of the Chinchilla-optimal tokens for a 70B model, so it is undertrained but larger-capacity.
    - Option B (25B, 500B): matches the stated Chinchilla token target, so it is training-FLOP efficient but likely less capable than a 70B model on many downstream tasks.
    - Option C (70B, repeated to ~1.5T): matches the token count numerically, but those are repeated tokens; quality gains are not equivalent to 1.5T fresh high-quality tokens.

    **Conclusion & Interpretation:**
    - **Result: Objective-Dependent Scaling Decision.** Choose Option A for maximum capability under the 500B-data constraint; choose Option B only when training efficiency or serving cost is the dominant objective.
  options:
    - Train a 25B model on 500B tokens to be Chinchilla-optimal; this maximizes training loss per FLOP and produces the best model possible within the data constraint
    - Train the 70B model on 500B tokens (Chinchilla-undertrained) because inference cost dominates TCO — the 70B model at 500B tokens likely outperforms a 25B Chinchilla-optimal model on downstream tasks, and with INT4 quantization the serving cost premium is only ~1.5x
    - Train the 70B model and repeat the 500B tokens 3x (1.5T tokens) to match the Chinchilla-optimal token count; data repetition has no diminishing returns for high-quality data
    - 'Split the budget: train a 70B model on 500B tokens, then distill it into a 7B model for serving; this gives both quality and inference efficiency without wasting compute'
