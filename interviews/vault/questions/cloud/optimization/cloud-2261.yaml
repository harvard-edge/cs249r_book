title: The XLA vs TorchInductor Decision
scenario: Your infrastructure team must choose a compiler backend for a large-scale transformer training job. XLA (used via JAX) and TorchInductor (used via torch.compile) are the two candidates. Both produce fused kernels from high-level operations.
question: What are the architectural differences between XLA and TorchInductor, and when does each have a structural advantage?
details:
  realistic_solution: 'The fundamental architectural difference is whole-program vs per-operator compilation scope. XLA performs whole-program compilation: it captures the entire computation graph ahead of time, runs global optimization passes (cross-layer fusion, memory planning across the full model, buffer donation), and produces a single optimized executable. This gives XLA a structural advantage for static, regular workloads (standard transformer training with fixed shapes) because it can make globally optimal decisions — e.g., fusing the layer-norm at the end of one layer with the linear projection at the start of the next. TorchInductor uses graph-fragment compilation: TorchDynamo traces subgraphs between graph breaks and compiles them independently. This gives TorchInductor a structural advantage for dynamic workloads (variable sequence lengths, data-dependent control flow, custom Python logic) because it preserves Python''s flexibility while compiling the hot paths. The tradeoff is compilation scope vs dynamism: XLA''s global view enables better optimization but requires static shapes; TorchInductor''s local view misses cross-fragment optimizations but handles dynamism gracefully.'
  common_mistake: |
    **The Pitfall:** Choosing the compiler based purely on hardware target.
    **The Rationale:** Engineers assume "XLA is for TPUs and TorchInductor is for GPUs."
    **The Consequence:** Engineers miss the real architectural difference (compilation strategy: whole-program vs fragment), leading to suboptimal choices for highly dynamic workloads on either hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Static Workloads (e.g., Standard 70B Transformer).
    - Dynamic Workloads (e.g., MoE models).

    **Calculations:**
    - Static: XLA achieves 55-60% MFU via global fusion. TorchInductor achieves 50-55% MFU.
    - Dynamic: XLA requires padding all experts to max capacity, wasting 20-40% compute. TorchInductor compiles dynamic dispatch natively.

    **Conclusion & Interpretation:**
    - **Result: 15-25% win for TorchInductor (Compiler-Bound)**. TorchInductor wins by 15-25% on dynamic workloads, while XLA leads on static workloads.
