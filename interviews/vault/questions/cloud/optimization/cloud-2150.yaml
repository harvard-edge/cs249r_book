title: The Loss Spike at Step 50K
scenario: Your 13B LLM pre-training run has been progressing smoothly for 50,000 steps. Suddenly, the training loss spikes from 2.8 to 15.0 and does not recover after 500 steps during the cosine decay phase.
question: What are the three most likely root causes of the loss spike, ordered from most to least common?
details:
  realistic_solution: '1. Gradient explosion from a bad data batch: Look for NaN/Inf in gradients. 2. Learning rate too high for this loss landscape region: The model entered a sharper region. 3. Numerical instability in mixed precision: BF16 underflow or loss scaling failures in FP16 training.'
  common_mistake: |
    **The Pitfall:** Immediately blaming hardware failure or data corruption for the loss spike.
    **The Rationale:** Candidates fail to recognize that gradient-related numerical instabilities are far more common at scale.
    **The Consequence:** Wasting hours running hardware diagnostics instead of inspecting gradient norms or loss scalers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Step: 50,000 (cosine decay phase).
       - Loss Spike: 2.8 to 15.0 (unrecoverable).
    2. **Calculations:**
       - Healthy Gradient Norm: ~0.1 - 10.0. Spike > 100 indicates explosion.
       - Healthy Loss Scaler Skip Rate: < 1%. Spike > 50% indicates precision instability.
    3. **Conclusion & Interpretation:** **Metrics thresholds immediately isolate the root cause to data batch gradient explosion, learning rate scheduling errors, or numerical precision instability.**
