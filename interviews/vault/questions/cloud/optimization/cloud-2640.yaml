title: Choosing Between Stateful and Functional Paradigms
scenario: 'A research team is starting a new project involving novel architectures with heavy use of per-sample gradients, custom higher-order derivatives, and auto-vectorization. They currently use PyTorch.'
question: Should the team switch to JAX for per-sample gradients, higher-order derivatives, and auto-vectorization, and what are the trade-offs?
details:
  realistic_solution: 'JAX is likely the better fit for this specific project. Per-sample gradients (`vmap(grad(f))`) and higher-order derivatives (`grad(grad(f))`) compose naturally in JAX''s functional paradigm. PyTorch requires `create_graph=True` with careful memory management.'
  common_mistake: |
    **The Pitfall:** Choosing a framework based on popularity rather than specific workload requirements.
    **The Rationale:** PyTorch is the dominant framework in the industry, making it the default choice.
    **The Consequence:** The team ends up fighting the framework to implement mathematical transforms, leading to complex, bug-prone code.
  napkin_math: |
    **Assumptions & Constraints:**
    - Functional transforms vs imperative ops.
    
    **Calculations:**
    - JAX per-sample = 1 line.
    - PyTorch per-sample = 10-20 lines or experimental features.
    
    **Conclusion & Interpretation:**
    - **Result: 1 line vs 10-20 lines (Complexity-Bound)**. JAX requires significantly less code and mental overhead for these specific transforms.
