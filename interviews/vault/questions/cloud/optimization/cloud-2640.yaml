title: JAX vs PyTorch for Per-Sample Gradients and Higher-Order Derivatives
scenario: A research team is starting a new project involving novel architectures with heavy use of per-sample gradients, custom higher-order derivatives, and auto-vectorization. They currently use PyTorch.
question: Should the team switch to JAX for per-sample gradients, higher-order derivatives, and auto-vectorization, and what are the trade-offs?
details:
  realistic_solution: |
    JAX is a strong fit if transform composition, per-sample gradients, higher-order derivatives, and auto-vectorization are central to the research agenda. Per-sample gradients (`vmap(grad(f))`) and higher-order derivatives (`grad(grad(f))`) compose naturally in JAX's functional style. PyTorch can also support these workflows through `torch.func`, `vmap`, and `create_graph=True`, and may be preferable when the team values the PyTorch ecosystem, debugging workflow, libraries, or existing codebase continuity. The trade-off is therefore not a blanket switch: choose JAX when composable transforms are the bottleneck, but stay with PyTorch if ecosystem maturity and developer productivity dominate. In either stack, fully materialized per-sample or higher-order gradients require careful memory management.
  common_mistake: |
    **The Pitfall:** Underestimating the engineering complexity of composing per-sample gradients, higher-order derivatives, and automatic vectorization in an imperative autograd workflow.
    **The Rationale:** A prototype may work for ordinary batch gradients, but `create_graph=True`, manual loops over examples, and custom vectorization can quickly multiply memory use and edge cases.
    **The Consequence:** The team spends research time debugging gradient-shape, graph-retention, and batching bugs instead of testing the architecture itself.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size B=128.
    - Model has P=100M trainable parameters.
    - One fp32 gradient value uses 4 bytes.

    **Calculations:**
    - Ordinary aggregate gradient storage: P * 4 bytes = 100M * 4 = 400MB.
    - Fully materialized per-sample gradients: B * P * 4 bytes = 128 * 100M * 4 = 51.2GB.
    - Higher-order derivatives require retaining differentiable gradient computations, so careless implementations can exceed memory before optimizer state or activations are counted.

    **Conclusion & Interpretation:**
    - **Result:** The choice is not about line count. JAX is attractive because `grad`, `vmap`, and higher-order transforms compose directly, but the team still must manage the real memory/runtime scaling of per-sample and higher-order gradients.
