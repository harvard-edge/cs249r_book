title: Speculative Decoding Draft Model Sizing
scenario: 'You are deploying a 70B parameter LLM for a code generation API with a strict Time Per Output Token (TPOT) budget of 20ms. Baseline TPOT is 35ms. You evaluate speculative decoding with two draft models: a 1.5B model (0.6 acceptance rate, 5ms/token) and a 7B model (0.85 acceptance rate, 12ms/token). The 70B target model evaluation step takes 15ms for verifying up to 5 tokens.'
question: Which draft model should you choose for speculative decoding, the 1.5B or 7B, to meet the 20ms TPOT budget?
details:
  realistic_solution: The correct choice is the 1.5B draft model. Speculative decoding performance is a tradeoff between draft-model overhead and target-model acceptance rate. Using the scenario's 5-token verification step, the 1.5B draft model yields about 16.8ms per output token, while the 7B draft model yields about 18.1ms per output token. Both meet the 20ms TPOT budget, but the smaller draft model is faster because its lower acceptance rate is more than offset by its much lower draft latency.
  common_mistake: |
    **The Pitfall:** Blindly choosing the draft model with the highest acceptance rate.
    **The Rationale:** Candidates assume a higher acceptance rate always leads to better performance, ignoring the latency overhead of running a larger draft model.
    **The Consequence:** Deploying a speculative decoding setup that is slower than autoregressive decoding or fails to meet strict latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 tokens drafted per step. Target evaluation takes 15ms to verify up to 5 tokens.
    - 1.5B Draft: 5ms/token, 0.6 acceptance rate.
    - 7B Draft: 12ms/token, 0.85 acceptance rate.
    - Expected emitted tokens per speculative step ≈ 1 + p + p² + p³ + p⁴ + p⁵.

    **Calculations:**
    - 1.5B Draft Model:
      - Draft time = 5 * 5ms = 25ms.
      - Total step time = 25ms + 15ms = 40ms.
      - Expected generated tokens = 1 + 0.6 + 0.6² + 0.6³ + 0.6⁴ + 0.6⁵ = 2.38 tokens.
      - Expected TPOT = 40ms / 2.38 = 16.8 ms/token.
    - 7B Draft Model:
      - Draft time = 5 * 12ms = 60ms.
      - Total step time = 60ms + 15ms = 75ms.
      - Expected generated tokens = 1 + 0.85 + 0.85² + 0.85³ + 0.85⁴ + 0.85⁵ = 4.15 tokens.
      - Expected TPOT = 75ms / 4.15 = 18.1 ms/token.

    **Conclusion & Interpretation:**
    - **Result: Choose the 1.5B draft model.** It meets the 20ms TPOT budget with more margin and outperforms the 7B draft model because lower draft latency matters more than the acceptance-rate gain in this setup.
