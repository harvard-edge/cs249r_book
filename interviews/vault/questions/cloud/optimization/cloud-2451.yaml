title: Speculative Decoding Draft Model Sizing
scenario: 'You are deploying a 70B parameter LLM for a code generation API with a strict Time Per Output Token (TPOT) budget of 20ms. Baseline TPOT is 35ms. You evaluate speculative decoding with two draft models: a 1.5B model (0.6 acceptance rate, 5ms/token) and a 7B model (0.85 acceptance rate, 12ms/token). The 70B target model evaluation step takes 15ms for verifying up to 5 tokens.'
question: Which draft model should you choose for speculative decoding, the 1.5B or 7B, to meet the 20ms TPOT budget?
details:
  realistic_solution: The correct choice is the 1.5B draft model under the standard speculative-decoding assumption that verification emits accepted draft tokens and, on the first rejection, emits one replacement target token. With 5 drafted tokens per target verification step, the 1.5B draft model yields about 17.4ms per emitted token, while the 7B draft model yields about 20.2ms per emitted token. The smaller draft model is the only one that clearly meets the 20ms TPOT budget because its lower draft latency more than offsets its lower acceptance rate.
  common_mistake: |
    **The Pitfall:** Blindly choosing the draft model with the highest acceptance rate.
    **The Rationale:** Candidates assume a higher acceptance rate always leads to better performance, ignoring the latency overhead of running a larger draft model.
    **The Consequence:** Deploying a speculative decoding setup that is slower than autoregressive decoding or fails to meet strict latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 tokens drafted per step. Target evaluation takes 15ms to verify up to 5 tokens.
    - 1.5B Draft: 5ms/token, 0.6 acceptance rate.
    - 7B Draft: 12ms/token, 0.85 acceptance rate.
    - Use the standard speculative-decoding emitted-token model: accepted draft tokens plus one target replacement token at the first rejection, capped at 5 drafted positions.
    - Expected emitted tokens per speculative step for 5 drafted tokens = 1 + p + p² + p³ + p⁴.

    **Calculations:**
    - 1.5B Draft Model:
      - Draft time = 5 * 5ms = 25ms.
      - Total step time = 25ms + 15ms = 40ms.
      - Expected emitted tokens = 1 + 0.6 + 0.6² + 0.6³ + 0.6⁴ = 2.31 tokens.
      - Expected TPOT = 40ms / 2.31 = 17.4 ms/token.
    - 7B Draft Model:
      - Draft time = 5 * 12ms = 60ms.
      - Total step time = 60ms + 15ms = 75ms.
      - Expected emitted tokens = 1 + 0.85 + 0.85² + 0.85³ + 0.85⁴ = 3.71 tokens.
      - Expected TPOT = 75ms / 3.71 = 20.2 ms/token.

    **Conclusion & Interpretation:**
    - **Result: Choose the 1.5B draft model.** It meets the 20ms TPOT budget, while the 7B draft model is slightly over budget under this model because higher acceptance does not compensate for the larger draft latency.
