title: 'FlashAttention on MI300X: HBM3 Bandwidth Advantage'
scenario: For standard memory-bound attention, an accelerator with 5.3 TB/s HBM bandwidth will natively outperform one with 3.35 TB/s. We are evaluating these two architectures for a workload utilizing FlashAttention-2.
question: "For compute-bound FlashAttention-2, how does the comparative performance shift, and which architecture benefits more relative to its standard attention baseline?"
details:
  realistic_solution: FlashAttention-2 transforms the attention mechanism from memory-bandwidth-bound to compute-bound through aggressive tiling and recomputation. Consequently, performance scales with TFLOPS rather than memory bandwidth. The architecture with a higher compute-to-bandwidth ratio (e.g., 295 FLOPS/byte vs 247 FLOPS/byte) realizes a more dramatic relative speedup from FlashAttention, as its previously starved ALUs are now fully saturated.
  common_mistake: |
    **The Pitfall:** Assuming high-bandwidth memory (HBM) superiority dictates performance for all attention operations.
    **The Rationale:** Engineers anchor on the fact that standard attention is heavily memory-bound, failing to understand that FlashAttention explicitly alters the arithmetic intensity to become compute-bound.
    **The Consequence:** Over-provisioning costly high-bandwidth SKUs for workloads that are actually bottlenecked by ALU/TFLOPS limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System A: 5.3 TB/s bandwidth, 1307 TFLOPS.
       - System B: 3.35 TB/s bandwidth, 989 TFLOPS.
       - Workload: FlashAttention-2 (compute-bound).
    2. **Calculations:**
       - Standard Attention (Memory-Bound) Speedup (A over B): 5.3 / 3.35 = 1.58x.
       - FlashAttention (Compute-Bound) Speedup (A over B): 1307 / 989 = 1.32x.
       - System B Compute-to-Bandwidth: 989e12 / 3.35e12 = 295 FLOPS/byte.
       - System A Compute-to-Bandwidth: 1307e12 / 5.3e12 = 247 FLOPS/byte.
    3. **Conclusion & Interpretation:**
       - **Result: System B benefits more relative to its baseline.** FlashAttention shifts the bottleneck, making the workload **Compute-Bound** and reducing System A's advantage from 1.58x to 1.32x.
