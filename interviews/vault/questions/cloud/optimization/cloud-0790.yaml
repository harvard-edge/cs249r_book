title: The Compilation Wall
scenario: You migrate a PyTorch model to a custom AI accelerator. The hardware is cheaper per TFLOPS than a GPU, but the first epoch takes 48 hours to start, and training is 3x slower. Your sequence lengths vary slightly per batch.
question: What is killing your performance and causing the 48-hour start time?
details:
  realistic_solution: 'You hit the Graph Compilation Wall. Unlike GPUs which execute eagerly, accelerators like Trainium/TPU rely on compilers (XLA/Neuron) to map code into static graphs for systolic arrays. The 48-hour startup is the compiler building thousands of shape-specialized graphs before the first epoch can run. The 3x steady-state slowdown comes from recurring recompiles or cache misses as slightly different sequence lengths appear. The fix is shape discipline: bucket lengths into a small number of static shapes, pad within each bucket, precompile those graphs, and reject accidental dynamic dimensions in the input pipeline.'
  common_mistake: |
    **The Pitfall:** Assuming custom silicon just has slower interconnects or poor drivers compared to NVIDIA.
    **The Rationale:** Engineers are used to eager execution on GPUs and don't realize XLA/Neuron compiles static graphs.
    **The Consequence:** Abandoning cost-effective accelerators entirely because they fail to pad inputs to static shapes, triggering endless JIT recompilations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - XLA Compile Time: ~30s.
       - Execution Time: ~0.5s.
       - Dynamic sequence lengths can create thousands of distinct graph shapes before epoch 1 starts.
       - During training, remaining shape misses cause a 5% compilation cache miss rate.
    2. **Calculations:**
       - Startup compile wall: 5,760 distinct shape-specialized graphs * 30s/compile = 172,800s = 48 hours.
       - Cache-hit step: 0.5s.
       - Cache-miss step: 30s compile + 0.5s execution = 30.5s.
       - Average Step (5% recompile): (0.95 * 0.5s) + (0.05 * 30.5s) = 1.95s.
       - Slowdown vs static shapes: 1.95s / 0.5s = 3.9x slower.
       - Throughput retained: 0.5s / 1.95s = 26%; throughput loss is ~74%.
    3. **Conclusion & Interpretation:**
       **Result: Shape-Compilation-Bound.** Thousands of initial shape compilations explain the 48-hour start, and even a 5% dynamic-shape cache miss rate can cut steady-state throughput by about 74%; length bucketing and static padding prevent both symptoms.
