title: The Compilation Wall
scenario: "You migrate a PyTorch model to a custom AI accelerator. The hardware is cheaper per TFLOPS than a GPU, but the first epoch takes 48 hours to start, and training is 3x slower. Your sequence lengths vary slightly per batch."
question: "What is killing your performance and causing the 48-hour start time?"
details:
  realistic_solution: "You hit the Graph Compilation Wall. Unlike GPUs which execute eagerly, accelerators like Trainium/TPU rely on compilers (XLA/Neuron) to map code into static graphs for systolic arrays. The '48 hours' was the initial compilation. Because your sequence lengths vary, the compiler triggers a Re-compile (JIT Thrashing) on every batch, destroying throughput. The fix is to use Static Padding: pad all sequences to a fixed power-of-two length to reuse the same compiled graph."
  common_mistake: |
    **The Pitfall:** Assuming custom silicon just has slower interconnects or poor drivers compared to NVIDIA.
    **The Rationale:** Engineers are used to eager execution on GPUs and don't realize XLA/Neuron compiles static graphs.
    **The Consequence:** Abandoning cost-effective accelerators entirely because they fail to pad inputs to static shapes, triggering endless JIT recompilations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - XLA Compile Time: ~30s.
       - Execution Time: ~0.5s.
       - Dynamic shapes cause a 5% cache miss rate for compilation.
    2. **Calculations:**
       - Recompile Overhead: 30s / 0.5s = 60x overhead per step.
       - Average Step (5% recompile): (0.95 * 0.5s) + (0.05 * 30.5s) = 2.0s.
    3. **Conclusion & Interpretation:**
       **Even a 5% dynamic shape variance cuts throughput by 75%. Result: JIT-Overhead-Bound.**
