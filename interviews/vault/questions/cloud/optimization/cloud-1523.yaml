title: Analyzing Catastrophic Forgetting in LLM Unlearning
scenario: Your team maintains a 70B LLM. Retraining from scratch to unlearn a 5GB corpus (1.2B tokens) would cost $1.5M. The team applied gradient ascent on the forgotten dataset for 1,500 steps, but general MMLU score collapsed from 72% to 47%.
question: What additional objective should the unlearning loss include to preserve MMLU while removing the 5GB corpus?
details:
  realistic_solution: Diagnose the failure as missing a 'retain' anchor. Modify the unlearning loss function to include a regularization term (e.g., KL divergence or standard descent) computed over a 'retain set' of the original training data to constrain weight updates.
  common_mistake: |
    **The Pitfall:** Believing that gradient ascent on a specific subset only removes features unique to that subset.
    **The Rationale:** It seems intuitive that simply moving in the opposite gradient direction unlearns only that exact data.
    **The Consequence:** Unbounded gradient ascent causes destructive interference with entangled network representations, catastrophically destroying the model's general capabilities (MMLU collapse).
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient ascent is applied only to the forget corpus.
    - The model's general abilities are represented by a separate retain distribution.

    **Calculations:**
    - Forget-only objective: maximize loss on D_forget, with no penalty for moving away from useful pretrained behavior.
    - Corrected objective: L_total = L_forget_ascent + beta * KL(model || reference) on D_retain, or an equivalent retain-set descent term.
    - The retain term anchors shared representations, so updates that erase broad language ability are penalized even if they increase forget-set loss.

    **Conclusion & Interpretation:**
    - **Result: Retain-Regularization-Bound.** The missing retain objective explains the MMLU collapse; unlearning must optimize forgetting and preservation jointly rather than running unconstrained gradient ascent.
