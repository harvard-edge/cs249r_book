title: H100 Graph Optimization Strategies for LLMs
scenario: You are deploying an LLM on an NVIDIA GPU. During profiling, you notice certain operations are not fully utilizing the compute capabilities, leading to suboptimal latency.
question: How do AOT compilation, operator lowering, and constant folding improve LLM inference on an H100?
details:
  realistic_solution: |
    AOT compilation fixes shapes and emits an optimized executable ahead of serving time, removing runtime graph interpretation, dynamic dispatch, and repeated autotuning from the hot path. Operator lowering maps high-level matmuls, attention, normalization, and elementwise expressions to H100-friendly Tensor Core kernels or fused CUDA/Triton kernels, which reduces intermediate HBM reads and writes for the same graph. Constant folding precomputes static masks, position tables, scale factors, and shape-dependent expressions so those operations do not consume launch slots, bandwidth, or compute during inference.
  common_mistake: |
    **The Pitfall:** Overlooking the interplay between the H100's high compute and finite memory bandwidth.
    **The Rationale:** Engineers assume general compiler optimizations suffice without addressing specific memory-bound bottlenecks.
    **The Consequence:** Operations become memory-bound, stranding the massive TFLOPS capacity of the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - The prompt gives no measured FLOPs, bytes moved, kernel times, or shape distributions.
    - H100 benefits depend on whether the profiled operations are launch-bound, memory-bound, or Tensor-Core compute-bound.
    - Static shapes and stable sequence lengths make AOT compilation and lowering more effective.

    **Calculations:**
    - AOT compilation removes runtime graph interpretation, repeated dispatch decisions, and repeated autotuning from the serving path.
    - Operator lowering maps high-level graph operations to H100-friendly Tensor Core kernels or fused CUDA/Triton kernels, reducing launches and intermediate HBM traffic.
    - Constant folding precomputes static masks, positional tables, shape expressions, and scale constants, so those operations consume no per-request kernel launch, memory bandwidth, or compute.
    - The expected win should be verified by comparing kernel count, HBM bytes, Tensor Core utilization, and end-to-end latency before and after compilation.

    **Conclusion & Interpretation:**
    - **Result: qualitative compiler optimization answer.** AOT reduces runtime overhead, lowering improves kernel selection and fusion, and constant folding removes static work; numeric speedup requires profile measurements not supplied in the scenario.
