title: H100 Graph Optimization Strategies for LLMs
scenario: You are deploying an LLM on an NVIDIA GPU. During profiling, you notice certain operations are not fully utilizing the compute capabilities, leading to suboptimal latency.
question: How do AOT compilation, operator lowering, and constant folding improve LLM inference on an H100?
details:
  realistic_solution: |
    An ML framework compiler performs deep transformations: AOT compilation eliminates runtime interpretation and optimizes for SMs/Tensor Cores. Operator lowering maps math to highly efficient H100-specific intrinsic functions or fused CUDA kernels, maximizing the 989 TFLOPS compute and reducing redundant memory transfers. Constant folding evaluates constant expressions at compile time, freeing up compute resources.
  common_mistake: |
    **The Pitfall:** Overlooking the interplay between the H100's high compute and finite memory bandwidth.
    **The Rationale:** Engineers assume general compiler optimizations suffice without addressing specific memory-bound bottlenecks.
    **The Consequence:** Operations become memory-bound, stranding the massive TFLOPS capacity of the hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Subgraph compute: 100 TFLOPs.
       - Unfused subgraph memory access: 0.5 TB across repeated reads/writes of intermediates.
       - Fused subgraph memory access: 0.2 TB after keeping intermediates on chip.
       - Hardware: 989 TFLOPS, 3.35 TB/s bandwidth.
    2. **Calculations:**
       - Theoretical Compute Time = 100 TFLOPs / 989 TFLOPS = 0.101 seconds.
       - Unfused Memory Time = 0.5 TB / 3.35 TB/s = 0.149 seconds, so the baseline is memory-bound.
       - Fused Memory Time (0.2 TB) = 0.2 TB / 3.35 TB/s = 0.060 seconds.
       - Post-fusion runtime is bounded by max(0.101 s compute, 0.060 s memory) = 0.101 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Baseline Memory-Bound, Post-Fusion Compute-Bound**. Operator fusion removes enough HBM traffic that memory time falls below compute time, reducing the estimated bottleneck from 0.149 s to 0.101 s.
