title: Graph Compilation for Variable X-ray Inference
scenario: Your team serves a ViT-H disease classifier for hospital X-ray images. The model receives variable image sizes and occasionally changes preprocessing branches by scanner type. An engineer proposes enabling graph compilation for every request to reduce inference latency, but first-request compile time is several seconds and the SLA is 200ms.
question: Can per-request graph compilation meet the 200ms SLA, and what serving changes make it viable?
details:
  realistic_solution: Do not compile on the request path. Make graph compilation viable by bucketing inputs into a small set of static shapes, freezing scanner-specific preprocessing branches into separate compiled variants, warming those variants before traffic, and routing requests to the cached executable. Requests that miss a bucket should use an eager fallback or an async compile path outside the SLA.
  common_mistake: |
    **The Pitfall:** Enabling graph compilation directly on live variable-shape requests.
    **The Rationale:** Engineers focus on faster compiled kernels and overlook compile latency, shape specialization, and cache misses.
    **The Consequence:** Tail latency spikes when a new shape or branch triggers compilation on the serving path, violating the SLA despite faster steady-state kernels.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA = 200ms.
    - Eager inference = 140ms.
    - Compiled inference = 80ms after warmup.
    - New-shape compile time = 3s.

    **Calculations:**
    - Per-request compile path = 3,000ms + 80ms = 3,080ms, far above the 200ms SLA.
    - Warm cached compiled path = 80ms, leaving 120ms of SLA headroom.
    - A cache miss should fall back to eager execution at 140ms or compile asynchronously for future requests.

    **Conclusion & Interpretation:**
    - **Result: Compile-Latency Bound.** Graph compilation helps only when static-shape variants are precompiled and cached; compiling on the request path cannot meet the SLA.
