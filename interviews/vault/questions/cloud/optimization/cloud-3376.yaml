title: Optimizing Large Language Model Deployment on AMD MI300X with Structured Sparsity
scenario: You are tasked with deploying a large language model for real-time inference on an accelerator. The model exceeds memory capacity and latency targets.
question: How would you approach structured versus unstructured pruning, and what sparsity patterns would best exploit sparse compute hardware?
details:
  realistic_solution: Prioritize structured pruning only when the target accelerator, compiler, and inference kernels can execute that exact sparsity pattern efficiently. Unstructured pruning can shrink checkpoint size but often gives little latency gain because irregular accesses and sparse metadata overhead dominate. For MI300X-class deployment, verify the supported sparse and quantized GEMM paths, account for metadata and alignment overhead, and treat sparse peak throughput as an upper bound rather than an expected end-to-end result.
  common_mistake: |
    **The Pitfall:** Applying aggressive unstructured pruning to achieve a high sparsity percentage.
    **The Rationale:** Engineers chase theoretical parameter reduction without considering how matrix multiplication hardware actually functions.
    **The Consequence:** A highly sparse model that is fundamentally slower to execute than the dense baseline due to disorganized memory access patterns and failure to utilize sparse tensor cores.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline dense model: 200 GB of FP16 weights.
    - Accelerator memory limit: 192 GB.
    - Candidate sparsity: 2:4 structured sparsity, if supported by the deployed kernels.
    - Sparse format requires metadata and alignment overhead.

    **Calculations:**
    - Dense memory footprint: 200 GB (OOM).
    - Ideal 50% sparse weight payload: 200 GB / 2 = 100 GB.
    - With metadata and padding, deployed footprint is greater than 100 GB but should still fit under 192 GB if overhead is less than 92 GB.
    - Theoretical sparse math can approach 2x dense math throughput only for supported GEMM shapes and kernels; end-to-end speedup is lower when memory traffic, decompression, non-GEMM ops, or batching dominate.

    **Conclusion & Interpretation:**
    - **Result: Conditional sparse benefit.** Structured sparsity can make the model fit and may improve latency, but the expected performance must be validated against MI300X-supported kernels rather than assumed from an exact doubled peak number.
