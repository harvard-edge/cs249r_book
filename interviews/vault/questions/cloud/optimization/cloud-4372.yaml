title: TPU v5e vs H100 for Fine-Tuning LoRA at Scale
scenario: A team runs LoRA fine-tuning (rank=16) on a 7B base model using 1M samples, batch size 64, for 3 epochs. The LoRA adapter has 40M trainable parameters. TPU v5e (16 chips) achieves 197 TFLOPS BF16 per chip at MFU 55%; standard GPUs (8 GPUs) achieve 989 TFLOPS FP16 per GPU at MFU 50%.
question: Which configuration finishes faster, and what is the per-dollar cost comparison assuming $1.2/chip-hr for TPU v5e and $3.5/GPU-hr for H100?
details:
  realistic_solution: 'Calculate effective FLOPs. LoRA computation is uniquely lightweight: the frozen backbone runs purely in inference mode, meaning backprop only computes gradients for the tiny 40M adapter matrices. The total required FLOPs are vastly lower than full fine-tuning. H100 achieves the workload faster and cheaper due to raw performance dominance at this specific, smaller hardware scale.'
  common_mistake: |
    **The Pitfall:** Using theoretical TFLOPS multipliers without adjusting for LoRA's unique computation profile.
    **The Rationale:** Engineers default to the standard formula for full fine-tuning (forward + full backward), overestimating total FLOPs.
    **The Consequence:** Mismodeling training durations and potentially making incorrect hardware purchasing decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - LoRA parameters: 40M trainable on a 7B base model.
    - Batch size: 64, Tokens: 512, Steps: 46,875 (3 epochs, 1M samples).
    - TPU v5e (16 chips): 197 TFLOPS/chip at 55% MFU, $1.2/chip-hr.
    - GPUs (8 GPUs): 989 TFLOPS/GPU at 50% MFU, $3.5/GPU-hr.

    **Calculations:**
    - Total step FLOPs = Forward (7B) + backward (7B + 40M) = 4 * 7B * 64 * 512 = 9.17e14.
    - Total Training FLOPs = 46,875 * 9.17e14 = 4.3e19.
    - TPU v5e speed = 16 * 197e12 * 0.55 = 1.73e15 FLOPS/sec. Time = 6.9 hours. Cost = 6.9 * 16 * $1.20 = $132.
    - GPU speed = 8 * 989e12 * 0.50 = 3.95e15 FLOPS/sec. Time = 3.0 hours. Cost = 3.0 * 8 * $3.50 = $84.

    **Conclusion & Interpretation:**
    - **Result: 3.0 hours (Compute-Bound)**. The GPU cluster wins on both time (2.3x faster) and cost (36% cheaper) for this specific small-scale workload.
