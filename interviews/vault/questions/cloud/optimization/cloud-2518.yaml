title: Cloud Torchdynamo L5 0
scenario: Your team debates whether to invest 2 weeks refactoring a custom model to eliminate graph breaks for `torch.compile` compatibility, or to keep eager mode and provision 30% more GPUs. Current training takes 14 days on 64 A100s.
question: Should you spend 2 weeks eliminating graph breaks or buy 30% more GPUs for the 14-day, 64-A100 training run?
details:
  realistic_solution: 'Option A (refactor): 2 weeks dev time. If torch.compile gives 1.5-2x speedup on compiled regions, eliminating breaks could yield 1.4x overall speedup. Option A is significantly cheaper per run and avoids the significant TCO of 30% more hardware.'
  common_mistake: |
    **The Pitfall:** Only considering the cost of the current training run.
    **The Rationale:** Teams compare the immediate engineering time against a one-off hardware purchase, ignoring future iterations.
    **The Consequence:** The project incurs high recurring operational costs (TCO) and permanently blocks larger hardware allocations, rather than paying a one-time engineering cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 64 GPUs * 14 days. GPU cost = $2/hr.
       - Refactor: 1.4x speedup, 2 weeks dev time.
       - Buy GPUs: 30% more GPUs (83 total).
    2. **Calculations:**
       - Baseline run cost: 64 * 14 * 24 * $2 = $43,008.
       - Refactor run cost: 14 days / 1.4 = 10 days. 64 * 10 * 24 * $2 = $30,720.
       - Buy GPUs run cost: 83 * 10.8 days * 24 * $2 = $43,027.
       - Savings per run via refactoring: $43,008 - $30,720 = $12,288.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Refactoring saves ~$12.3K per run and scales efficiently, whereas adding hardware increases ongoing TCO and offers no architectural improvement.
