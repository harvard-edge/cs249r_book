title: Torch Compile Graph Break Refactor vs 30 Percent More GPUs
scenario: Your team debates whether to invest 2 weeks refactoring a custom model to eliminate graph breaks for `torch.compile` compatibility, or to keep eager mode and provision 30% more GPUs. Current training takes 14 days on 64 A100s.
question: Should you spend 2 weeks eliminating graph breaks or buy 30% more GPUs for the 14-day, 64-A100 training run?
details:
  realistic_solution: 'Option A (refactor): 2 weeks dev time. If eliminating graph breaks yields a 1.4x overall speedup, the 64-GPU run falls from 14 days to 10 days and saves about $12.3K per run at $2/GPU-hour. Option B (30% more GPUs): if scaling is near-linear, 83 GPUs also reduce runtime to about 10.8 days, but the larger allocation keeps the per-run GPU cost about the same as baseline. Refactoring is the better long-term choice when the model will be trained repeatedly; buying GPUs is only attractive for a one-off deadline where engineering time is the bottleneck.'
  common_mistake: |
    **The Pitfall:** Only considering the cost of the current training run.
    **The Rationale:** Teams compare the immediate engineering time against a one-off hardware purchase, ignoring future iterations.
    **The Consequence:** The project incurs high recurring operational costs (TCO) and permanently blocks larger hardware allocations, rather than paying a one-time engineering cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 64 GPUs * 14 days. GPU cost = $2/hr.
       - Refactor: 1.4x speedup on the same 64 GPUs, plus 2 weeks dev time.
       - Buy GPUs: 30% more GPUs (83 total), assume near-linear scaling.
    2. **Calculations:**
       - Baseline run cost: 64 * 14 * 24 * $2 = $43,008.
       - Refactor runtime: 14 days / 1.4 = 10 days.
       - Refactor run cost: 64 * 10 * 24 * $2 = $30,720.
       - Buy-GPU runtime: 14 days / 1.3 = 10.77 days.
       - Buy-GPU run cost: 83 * 10.77 days * 24 * $2 ≈ $42,902.
       - Savings per run via refactoring: $43,008 - $30,720 = $12,288.
    3. **Conclusion & Interpretation:**
       - **Result: Refactor for recurring runs.** Refactoring saves ~$12.3K per run after the one-time engineering cost, whereas adding GPUs mainly buys schedule time without lowering recurring GPU spend.
