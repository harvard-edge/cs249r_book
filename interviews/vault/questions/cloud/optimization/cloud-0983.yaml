title: Calculating Gradient Bucketing Overlap
scenario: You are optimizing a distributed data-parallel training loop for a 1.2 GB parameter vision model across 16 GPUs connected via a 10 GB/s effective bandwidth network. Profiling shows the backward pass computation takes 150 ms. Currently, the system waits for the entire backward pass to finish before calling Ring-AllReduce on the 1.2 GB gradients (which takes 240 ms).
question: With 4 gradient buckets, perfect CUDA-stream overlap, and no scheduling overhead, what is the new backward-plus-sync time?
details:
  realistic_solution: Launch communication kernels on a separate CUDA stream as each gradient bucket becomes ready. With 4 equal-sized buckets and communication cost proportional to bucket size, each bucket has 37.5 ms of backward compute and 60 ms of communication because the stated full Ring-AllReduce takes 240 ms. Since communication per bucket is longer than compute per bucket, the critical path is the first bucket's compute delay plus the full 240 ms communication pipeline, for a new backward-plus-sync time of 277.5 ms.
  common_mistake: |
    **The Pitfall:** Assuming perfect overlap means the total time is simply max(compute, comm).
    **The Rationale:** Failing to account for the sequential dependency of the first bucket's computation before any communication can begin.
    **The Consequence:** Underestimating the critical path and incorrectly projecting scaling efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1.2 GB gradients (FP16 weights), 10 GB/s network.
    - Backward compute = 150 ms. 4 buckets.
    - The scenario states the full Ring-AllReduce takes 240 ms.
    - Buckets are equal-sized, and all-reduce time is proportional to bucket payload with no launch overhead.

    **Calculations:**
    - Compute per bucket = 150 ms / 4 = 37.5 ms.
    - Comm per bucket = 240 ms / 4 = 60 ms.
    - Network is idle during the first bucket's compute (37.5 ms), then fully saturated by communication (240 ms).
    - Total time = 37.5 ms + 240 ms = 277.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 277.5 ms Total Time (Communication-Bound)**. The workload is communication-bound after the initial compute delay.
