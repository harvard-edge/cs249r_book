title: The Gaudi 3 Compiler Bet
scenario: Intel pitches Gaudi 3 accelerators for a training cluster using a graph compiler that automatically fuses and schedules operations. Your CUDA team is skeptical.
question: What are the real systems trade-offs between hand-written CUDA kernels and Gaudi's graph compiler?
details:
  realistic_solution: The trade-off is between peak performance and development velocity. While CUDA extracts 80-90% of peak, graph compilers achieve 70-85% automatically. Compilers drastically reduce engineering costs and time-to-market for novel architectures, though they struggle with irregular memory access.
  common_mistake: |
    **The Pitfall:** Asserting that a compiler can never match hand-tuned CUDA kernels, making Gaudi inherently inferior.
    **The Rationale:** Candidates focus entirely on peak theoretical kernel speed and ignore engineering velocity and MFU.
    **The Consequence:** Rejecting a viable, cost-effective hardware solution and committing to massive engineering overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 specs: 989 TFLOPS BF16. Typical MFU with optimized CUDA = 60%.
       - Gaudi 3 specs: 1835 TFLOPS BF16. Typical MFU with compiler = 50%.
    2. **Calculations:**
       - Effective H100 throughput: 989 * 0.60 = 593 TFLOPS.
       - Effective Gaudi 3 throughput: 1835 * 0.50 = 918 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Gaudi 3 yields higher effective throughput due to raw silicon advantage, completely offsetting its lower compiler efficiency.**
       - **Result: Compute-Bound**
