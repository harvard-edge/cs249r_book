title: CUDA Graphs for Low-Latency Inference
scenario: You are deploying a fast, low-latency transformer model for real-time bidding on a single NVIDIA
  A100. Profiling shows that a single inference pass consists of 250 individual CUDA kernel launches.
  The actual GPU execution time for each kernel averages just 4 µs, but the CPU-side kernel launch overhead
  is 5 µs per kernel. Calculate the expected end-to-end inference latency before and after implementing
  CUDA Graphs, assuming all kernels can be captured in a single graph.
question: What is the end-to-end latency before and after CUDA Graphs for 250 kernels with 4µs GPU time
  and 5µs launch overhead?
details:
  realistic_solution: CUDA graphs eliminate the per-kernel CPU launch overhead by launching the entire
    graph with a single overhead penalty, while GPU execution time remains identical.
  common_mistake: '**The Pitfall:** Assuming CUDA graphs optimize the actual GPU kernel execution time.

    **The Rationale:** Engineers mistakenly believe graphs speed up the GPU computation itself.

    **The Consequence:** Misunderstanding the performance benefits, which come entirely from removing
    the CPU-bound launch overheads.'
  napkin_math: '**Assumptions & Constraints:**

    - 250 kernels, 4us execution, 5us launch overhead.

    **Calculations:**

    - Before CUDA Graphs: 250 * (4us + 5us) = 2250 us.

    - After CUDA Graphs: 1 graph launch (5us) + 250 * 4us = 1005 us.

    - Speedup: 2250 / 1005 = ~2.24x.

    **Conclusion & Interpretation:**

    - CUDA Graphs eliminate per-kernel launch overhead, resulting in a ~2.24x speedup.'
