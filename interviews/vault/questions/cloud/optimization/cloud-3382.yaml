title: Optimizing Large Language Models with Knowledge Distillation on AMD MI300X
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on an AMD MI300X accelerator, which offers 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth. The original teacher model is a 70B parameter model that fits within the MI300X's memory. However, the current inference latency is unacceptable for your application, and you need to achieve sub-50ms token generation latency while maintaining 95% of the teacher model's accuracy.
question: How would you choose between logit matching and feature distillation, and when is distillation preferable to pruning on MI300X for sub-50ms latency?
details:
  realistic_solution: |
    Start with logit matching because it transfers teacher behavior without storing large intermediate activations. Add feature distillation only for a few projected layers if accuracy is below the 95% target and profiling shows the extra activation traffic still keeps token latency under 50 ms. Distillation is preferable to pruning when the teacher architecture is too large or inefficient for the latency target and a smaller student can use MI300X-friendly dense, quantized, or supported structured-sparse kernels. Pruning is preferable when the original model already meets most quality goals, only needs modest compression, and the chosen sparsity pattern is stable and accelerated by the deployed kernels.
  common_mistake: |
    **The Pitfall:** Overlooking the impact of data transfer rates (5.3 TB/s HBM3 bandwidth) on feature distillation.
    **The Rationale:** Not considering the sparsity capabilities (1,307 TFLOPS FP16 sparse) for the student model architecture.
    **The Consequence:** Applying standard distillation without adapting leads to inefficient memory patterns or underutilizing sparse compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 student model size: 14 GB.
    - MI300X: 192 GB HBM3, 5.3 TB/s bandwidth, 1,307 TFLOPS.

    **Calculations:**
    - A 7B FP16 student has about 14 GB of weights, leaving substantial HBM for KV cache and workspaces, but sub-50 ms latency must be verified with measured tokens/sec and p99 latency.
    - A 70B FP16 teacher has about 140 GB of weights and fits in 192 GB HBM, but leaves much less room for KV cache, batching, and workspaces.
    - A smaller dense or structured-sparse student reduces per-token weight traffic and KV pressure; feature distillation adds training-time activation traffic, not serving-time latency benefit by itself.
    - Feature distillation increases training traffic; it does not automatically improve serving latency unless it enables a smaller or better-shaped student.

    **Conclusion & Interpretation:**
    - **Result: Decision by measured latency and quality.** Use logit matching first, selective feature distillation only if needed for quality, and choose distillation over pruning when architecture changes beat sparse pruning on the MI300X serving profile.
