title: Optimizing Large Language Models with Knowledge Distillation on AMD MI300X
scenario: 'You are tasked with deploying a large language model (LLM) for real-time inference on an AMD MI300X accelerator, which offers 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth. The original teacher model is a 70B parameter model that fits within the MI300X''s memory. However, the current inference latency is unacceptable for your application, and you need to achieve sub-50ms token generation latency while maintaining 95% of the teacher model''s accuracy.'
question: 'How would you choose between logit matching and feature distillation, and when is distillation preferable to pruning on MI300X for sub-50ms latency?'
details:
  realistic_solution: |
    A realistic solution would involve a multi-stage distillation approach. First, train a smaller student model (e.g., 7B or 13B parameters) using logit matching for initial performance gains, which is less sensitive to memory bandwidth. Then, for further optimization, explore feature distillation, paying close attention to the intermediate feature sizes and how they align with the 5.3 TB/s HBM3 bandwidth. If the student model supports sparsity, tailor its architecture to leverage the 1,307 TFLOPS FP16 sparse compute. Distillation is preferred over pruning here because it allows for architectural changes in the student model that can better exploit the MI300X's unique features (like sparse compute or efficient HBM3 access for specific tensor shapes) while retaining knowledge from the large teacher model, which aggressive pruning might discard.
  common_mistake: |
    Overlooking the impact of data transfer rates (5.3 TB/s HBM3 bandwidth) on feature distillation, or not considering the sparsity capabilities (1,307 TFLOPS FP16 sparse) for the student model architecture. Another common mistake is directly applying standard distillation techniques without adapting them to the specific memory and compute profile of the MI300X, potentially leading to inefficient memory access patterns or underutilizing sparse compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 student model size: 14 GB.
    - MI300X: 192 GB HBM3, 5.3 TB/s bandwidth, 1,307 TFLOPS.

    **Calculations:**
    - Memory transfer time (50GB): 50GB / 5.3 TB/s ≈ 9.4ms per token.
    - Compute potential: 1.307e15 FLOPS handles billions of ops easily within 50ms.

    **Conclusion & Interpretation:**
    - **Result: 9.4ms transfer (Memory-Bound)**. Feature distillation may introduce memory pressure, but architecture changes via distillation leverage sparse compute better than pruning.
