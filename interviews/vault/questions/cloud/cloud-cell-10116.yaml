title: Implement channel pruning for EfficientNet-B3 to reduce serving costs
scenario: You need to reduce EfficientNet-B3 (12M params, 1.8 GFLOPs) serving costs on A100 by 40% while
  retaining 81% top-1 accuracy on your product dataset (originally 81.6%). Implement a structured channel
  pruning pipeline using L1-norm filter importance scoring, fine-tuning schedule, and verify the result
  with TensorRT profiling.
details:
  realistic_solution: 'Use layer-sensitivity analysis: prune each layer independently to 50% and measure
    accuracy drop. First and last layers are typically sensitive; middle MBConv blocks are robust. Apply
    higher pruning ratios (50–60%) to middle stages and lower (20–30%) to first/last stages. Implementation:
    (1) forward hook to collect L1-norm of each filter; (2) rank filters globally by importance; (3) zero
    out bottom-p% filters; (4) fine-tune 30 epochs with cosine LR schedule; (5) export to ONNX, convert
    with TRT INT8. Target: 40% FLOP reduction → ~1.08 GFLOPs.'
  common_mistake: Applying uniform pruning ratios across all layers, which over-prunes the first layers
    (critical for feature extraction) and under-prunes the last expansion stages (which dominate FLOPs).
  napkin_math: 'EfficientNet-B3: 1.8 GFLOPs baseline. 40% reduction target: 1.08 GFLOPs. Channel pruning
    at 40% of channels: FLOPs scale as (C_out × C_in), so pruning 37% of channels → 0.63² = 40% FLOP reduction.
    Need ~37% average channel sparsity. Memory: 12M params × 0.63² ≈ 4.8M params (for conv layers, roughly).
    Model size: 4.8M × 4B = 19.2MB (FP32) or 4.8MB (INT8). A100 serving: 1.08G FLOPs at batch=64 = 69
    GFLOPs, at 50% INT8 utilization (312 TOPS) → 0.22ms/batch, ~290K img/sec/GPU.'
