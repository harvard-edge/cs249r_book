title: KV Cache Network Topology for High-Bandwidth Transfer
scenario: A disaggregated serving cluster has prefill nodes and decode nodes in separate racks, connected via 400 Gbps InfiniBand HDR. KV cache transfer adds 4ms P99 latency. The network team proposes moving to InfiniBand NDR (800 Gbps).
question: How much P99 latency would 800 Gbps NDR save over 400 Gbps HDR for KV transfer, and what alternative would you propose?
details:
  realistic_solution: 'KV cache size analysis: for 70B model (MHA), 512-token prompt: 1.34GB. At 400 Gbps = 50 GB/s: transfer = 1.34/50 = 26.8ms. At 800 Gbps: 13.4ms. Both much larger than stated 4ms. Stated 4ms suggests smaller model (7B) or GQA. 7B model, 512 tokens (16 KV heads): 2*32*16*128*512*2B = 134MB. At 400 Gbps: 134MB/50GB/s = 2.68ms + fabric latency ~1.5ms = 4.18ms — matches! NDR upgrade: 134MB / 100 GB/s = 1.34ms + 1.5ms = 2.84ms. Saves 1.34ms. Cost of NDR upgrade: ~$30K per port. Benefit: 1.34ms reduction. If P99 TTFT target is 100ms, this is 1.3% improvement — marginal. Alternative: co-locate prefill and decode on same DGX node using NVLink (600 GB/s bidirectional per GPU pair): 134MB / 600 GB/s = 0.22ms. Zero network cost, 18x faster than HDR.'
  common_mistake: |
    **The Pitfall:** Assuming doubling link bandwidth directly halves the total transfer time.
    **The Rationale:** Focusing purely on serialization delay while ignoring the fixed fabric latency (1-3us per hop across multiple switches).
    **The Consequence:** Spending millions on network upgrades for a trivial 1-2ms improvement when the workload is latency-bound, not just bandwidth-bound.
  napkin_math: |
    - **Model Sizing**: Stated 4ms latency suggests a 7B model or GQA. For 7B (16 KV heads), 512 tokens: 2 * 32 * 16 * 128 * 512 * 2B = 134MB.
    - **HDR (400 Gbps / 50 GB/s)**: Transfer is 134MB / 50GB/s = 2.68ms + fabric latency (~1.5ms) = 4.18ms. Matches the 4ms stated!
    - **NDR (800 Gbps / 100 GB/s)**: Transfer is 134MB / 100GB/s = 1.34ms + 1.5ms = 2.84ms.
    - **Result**: Upgrading to NDR saves **~1.34ms**. If target TTFT is 100ms, this is marginal.
    - **Alternative (NVLink)**: Co-locate prefill and decode on the same DGX. NVLink is 900 GB/s. 134MB / 900 GB/s = 0.15ms. Zero network cost, 18x faster than HDR.
