title: Quantifying Late-Stage Constraint Costs
scenario: A cloud ML team trains a 15B parameter transformer using 500 A100-GPU-hours at $4/hour. At deployment,
  they find the target inference instance (NVIDIA T4, 16GB VRAM) cannot serve the 30GB FP16 model. They
  spend 50 GPU-hours attempting INT8 post-training quantization, which fails to meet the accuracy SLA.
  They must redesign the architecture and retrain from scratch (500 GPU-hours). Calculate the monetary
  cost of this late constraint discovery compared to simulating the T4 constraint before initial training
  (adding 10 GPU-hours of profiling).
question: "What is the cost of discovering the T4 16GB constraint after training versus profiling it upfront, and what process change prevents it?"
details:
  realistic_solution: Implement a shift-left strategy by strictly defining inference hardware constraints
    (memory, latency) as prerequisite contracts before the training stage begins.
  common_mistake: Focusing purely on the technical rescue attempts (like PTQ or distillation) without
    calculating the compounding financial and temporal costs of violating stage-interface contracts.
  napkin_math: 'Late discovery cost: (500 train + 50 PTQ + 500 retrain) * $4 = $4,200. Early constraint
    cost: (10 profile + 500 train) * $4 = $2,040. Waste: $4,200 - $2,040 = $2,160 (106% cost overrun).'
