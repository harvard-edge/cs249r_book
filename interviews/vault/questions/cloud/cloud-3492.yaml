title: Kubernetes Orchestration for LLM Training with AMD MI300X
scenario: You are tasked with designing a Kubernetes-based ML training platform optimized for large language models (LLMs) using a cluster primarily composed of nodes each equipped with multiple AMD MI300X GPUs. Each MI300X provides 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth. The platform must efficiently schedule and manage diverse training workloads, ranging from fine-tuning smaller 7B parameter models to pre-training massive 100B+ parameter models.
question: How would you build a Kubernetes training platform for MI300X LLM workloads with ROCm devices, topology-aware affinity, fair scheduling, and low fragmentation?
details:
  realistic_solution: A robust solution would involve leveraging custom Kubernetes schedulers or extensions (e.g., Volcano, Kueue) alongside standard GPU device plugins (like AMD's ROCm device plugin) to expose detailed GPU metrics and capabilities. Implement node labeling and taints/tolerations or node affinity rules based on node hardware (e.g., number of MI300X, HBM capacity, network topology) and workload requirements. For job scheduling, a multi-queue system with priority, preemption, and resource quotas should be established. Implement gang scheduling for distributed training jobs to prevent deadlocks and ensure all required resources are available simultaneously. Consider dynamic GPU allocation strategies and techniques like MIG (Multi-Instance GPU, if a similar feature becomes available for AMD GPUs) or partitioning at the software level to optimize resource sharing and reduce fragmentation.
  common_mistake: |
    **The Pitfall:** Treating all GPUs uniformly without considering their specific characteristics or topology.
    **The Rationale:** Using default Kubernetes schedulers fails to account for HBM capacity, interconnect topology, or the varying demands of different ML workloads.
    **The Consequence:** Inefficient scheduling, poor resource utilization, and potential GPU memory exhaustion or severe network bottlenecks for distributed jobs.
  napkin_math: |
    * 100B parameter LLM in FP16 = 200 GB model size.
    * AMD MI300X capacity = 192 GB HBM3.
    * Result: A single MI300X cannot hold the entire model; requires multi-GPU partitioning.
    * Gradient synchronization per step: 200 GB.
    * With a standard 100 Gbps (12.5 GB/s) network link between nodes, transfer takes 200 GB / 12.5 GB/s = 16 seconds.
    * **Conclusion: Inter-node network bandwidth is a massive bottleneck compared to the MI300X's internal 5.3 TB/s bandwidth, necessitating topology-aware scheduling.**
