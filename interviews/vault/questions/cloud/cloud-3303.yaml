title: Designing a Low-Latency Inference Service on NVIDIA A100 with Strict SLAs
scenario: You are designing an inference service for a critical real-time ML model. This model is computationally intensive and requires deployment on NVIDIA A100 GPUs. Your service must adhere to stringent Service Level Agreements (SLAs): P99 latency must be under 100ms and P999 latency under 250ms, even during peak load. The service experiences highly variable traffic patterns, often resulting in 'straggler' requests.
question: How would you design the inference service to consistently meet the <100ms P99 and <250ms P999 tail latency SLA given variable traffic?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. Hedged Requests: Implement dual-send or hedged requests where a second identical request is sent to another available A100 instance if the first request doesn''t receive a response within a predefined timeout. 2. Adaptive Batching: Implement dynamic batching strategies that adjust batch size based on real-time queue depth. 3. Dedicated Instance Pools: Isolate critical workloads. 4. Smart Load Balancing: Route requests to the least loaded instances.'
  common_mistake: |
    **The Pitfall:** Focusing solely on average (P50) latency or raw throughput benchmarks.
    **The Rationale:** Teams often neglect hedging mechanisms, assuming fast individual inference times automatically translate to good tail latency.
    **The Consequence:** Network/system noise disproportionately affects tail latencies, causing P99 and P999 SLA breaches.
  napkin_math: |
    - 1. **SLA Constraint:** At 10,000 RPS, a 100ms P99 latency means only 100 requests per second can exceed 100ms.
    - 2. **Straggler Impact:** If 1% of requests take 500ms and average inference is 20ms, 1:1 request mapping fails the SLA.
    - 3. **Hedging Benefit:** If the primary request takes 20ms (P50) and a hedged request is sent at 50ms (P90 timeout), the secondary responds in 20ms.
    - 4. **Effective latency:** **Max latency for a straggler drops from 500ms to 70ms (50ms + 20ms)**.
