title: MoE AllToAll Communication Cost
scenario: 'You are training a Mixture-of-Experts (MoE) model with 8 experts distributed across 8 GPUs (one expert per GPU). Each token is routed to top-2 experts. With a batch of 4096 tokens and hidden dimension 4096 in BF16, estimate the AllToAll communication volume per MoE layer.'
question: 'What is the AllToAll communication volume per MoE layer for 4096 top-2-routed BF16 tokens across 8 GPUs?'
details:
  realistic_solution: |
    Each token: 4096 dims * 2 bytes (BF16) = 8 KB. With top-2 routing, each token is sent to 2 experts. Forward AllToAll: 4096 tokens * 2 routes * 8 KB = 64 MB total dispatched. Return AllToAll: same 64 MB back. Total: 128 MB per MoE layer (both directions). Per-GPU view: each GPU holds 4096/8 = 512 local tokens. Each token routed to 2 experts; with uniform routing, 1/8 of routes stay local, 7/8 go remote. Per-GPU send volume: 512 * 2 * (7/8) * 8 KB = 7 MB. All 8 GPUs send in parallel, so the network must handle 7 MB per GPU concurrently.
  common_mistake: |
    Forgetting that AllToAll is bidirectional — tokens must be sent TO experts and results sent BACK. Also forgetting the top-2 routing doubles the volume vs top-1.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tokens: 4096.
    - Hidden dimension: 4096.
    - BF16: 2 bytes per parameter.
    - Routing: Top-2 experts.

    **Calculations:**
    - Per token size: 4096 * 2B = 8 KB.
    - Top-2 * 4096 tokens = 8192 token-expert pairs.
    - Forward dispatch total: 8192 * 8 KB = 64 MB.
    - Return combine: 64 MB.
    - Grand total: ~128 MB per layer.
    - Per-GPU send: 512 tokens * 2 * (7/8) * 8 KB = 7 MB.
    - At 200 GB/s NVLink per GPU: 7 MB / 200 GB/s = ~0.035 ms per layer.

    **Conclusion & Interpretation:**
    - **Result: 128 MB (Bandwidth-Bound)**. 128 MB per MoE layer across 8 GPUs, with 7 MB sent per GPU.
  options:
  - '~8 MB — each GPU only sends tokens it can''t process locally.'
  - '~64 MB — tokens dispatched once to the selected experts.'
  - '~128 MB — tokens dispatched to top-2 experts and results returned.'
  - '~512 MB — all tokens are broadcast to all 8 GPUs.'
  correct_index: 2
