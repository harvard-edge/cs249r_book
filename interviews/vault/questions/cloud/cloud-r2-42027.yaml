title: Dragonfly Topology for Large-Scale Training
scenario: Your 4096-GPU training cluster needs a new network topology. Compare a 3-tier fat-tree with
  a 2-level dragonfly topology for training a 175B model with 3D parallelism (TP=8, PP=16, DP=32). Which
  topology better matches the hierarchical communication pattern, and what is the cost difference in switch
  ports?
details:
  realistic_solution: '3D parallelism creates hierarchical communication: TP (8 GPUs, highest bandwidth)
    → PP (16 GPUs, medium) → DP (32 groups, lowest). Fat-tree: treats all traffic equally — 4096 GPUs
    need 3 tiers of 64-port switches. Leaf: 128 switches, spine: 128, core: 64. Total: 320 switches ×
    64 ports = 20,480 ports. Dragonfly: group 8 GPUs (TP) within a local group connected by NVLink. 16
    groups (PP) form a dragonfly group with full-mesh local links. 32 dragonfly groups (DP) connected
    by global links. Local: 16 × 15/2 = 120 links (PP, high bandwidth). Global: 32 × 31/2 = 496 links
    (DP, lower bandwidth needed). Total switches: 32 groups × 4 switches = 128 switches + 32 global switches
    = 160. Port savings: 50%. Dragonfly matches the 3D hierarchy naturally.'
  common_mistake: Choosing fat-tree by default because it is well-understood. Dragonfly topologies can
    provide full bisection bandwidth with fewer switches when the communication pattern is hierarchically
    structured — exactly the case for 3D parallelism.
  napkin_math: 'Fat-tree: 320 switches × 64 ports = 20,480 ports. At $15K/switch: $4.8M. Dragonfly: 160
    switches × 64 ports = 10,240 ports. At $15K: $2.4M. Savings: $2.4M (50%). DP AllReduce bandwidth:
    fat-tree = 400 Gbps/link, dragonfly global = 200 Gbps but DP only needs 1 GB gradient / 32 = 32 MB
    per rank. At 200 Gbps: 32 MB / 25 GB/s = 1.3ms — sufficient.'
