title: Mitigating Power Analysis in Multi-Tenant GPU Inference
scenario: You are architecting a multi-tenant cloud ML inference platform using NVIDIA A100 GPUs. A security audit reveals that a malicious tenant can use fine-grained power telemetry (e.g., via RAPL or NVML at 1ms resolution) to conduct a differential power analysis attack against a co-located VM, successfully leaking the proprietary Transformer model's architectural hyperparameters.
question: How would you mitigate 1ms GPU power-telemetry leakage, and how do dummy work, power caps, and SEV-SNP compare?
details:
  realistic_solution: The optimal solution restricts fine-grained power telemetry access at the hypervisor level (disabling NVML power queries for guest VMs) combined with hardware-level confidential compute (e.g., NVIDIA H100 CC with Architecture Power Management) that flattens power states. Injecting dummy workloads is a viable software fallback but severely degrades throughput (often 20-30% overhead) and increases cooling TCO.
  common_mistake: |
    **The Pitfall:** Assuming memory encryption (like AMD SEV-SNP) protects against power side-channels.
    **The Rationale:** Engineers rely heavily on marketing terms for Confidential Computing, equating "encryption" with total security.
    **The Consequence:** Memory encryption secures data at rest and transit, but fails to mask the physical power drawn by the GPU during computation, leaving the system completely vulnerable to telemetry side-channels.
  napkin_math: |
    - **Analyze execution time:** If a single Transformer layer (FFN + Attention) takes 3ms to execute (2ms FFN @ 250W, 1ms Attn @ 300W).
    - **Analyze sampling rate:** A telemetry sampling rate of 1kHz (1ms resolution) yields exactly 3 samples per layer.
    - **Analyze the leak:** For a 32-layer model, the attacker sees a repeating 3ms pattern over 96ms.
    - **Conclusion:** **Applying a Fast Fourier Transform (FFT) reveals a 333Hz frequency spike, perfectly leaking the layer execution time and model architecture.**
