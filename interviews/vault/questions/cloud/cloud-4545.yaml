title: Memory Bandwidth Limits of Large Model Generation
scenario: An engineering team is serving a 50B parameter dense model on a single H100
  SXM (80GB HBM3, 3.35 TB/s), reserving 10GB for KV cache.
question: Analyze the minimum quantization bit-width required to fit the model, and
  calculate the theoretical minimum token generation latency for a batch size of 1.
details:
  realistic_solution: With 10GB reserved, 70GB is available. A 50B parameter model
    in FP16 needs 100GB, which OOMs. In INT8, it needs 50GB, which fits. During generation
    (batch=1), latency is memory-bandwidth bound. We read 50GB of weights + 10GB KV
    cache = 60GB per token. At 3.35 TB/s, latency is 60GB / 3350 GB/s = ~17.9ms per
    token.
  common_mistake: Using computational TFLOPs rather than memory bandwidth to calculate
    generation latency at low batch sizes.
  napkin_math: 60 / 3350 = 0.0179s
