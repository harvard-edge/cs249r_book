title: Memory Bandwidth Limits of Large Model Generation
scenario: An engineering team is serving a 50B parameter dense model on a single H100 SXM, reserving 10GB for KV cache.
question: "Analyze the minimum quantization bit-width required to fit the model, and calculate the theoretical minimum token generation latency for a batch size of 1."
details:
  realistic_solution: With 10GB reserved, 70GB is available. A 50B parameter model in FP16 needs 100GB, which OOMs. In INT8, it needs 50GB, which fits. During generation (batch=1), latency is memory-bandwidth bound.
  common_mistake: |
    **The Pitfall:** Using computational TFLOPs rather than memory bandwidth to calculate generation latency.
    **The Rationale:** Engineers often conflate compute-bound prefill with memory-bandwidth-bound autoregressive decoding.
    **The Consequence:** The resulting latency calculation is wildly optimistic and technically impossible on the hardware.
  napkin_math: |
    1. A 50B parameter model requires 50 GB in INT8 precision.
    2. Available memory: 80 GB total - 10 GB KV cache = 70 GB (INT8 fits, FP16 at 100 GB OOMs).
    3. Reading weights and KV cache per token: 50 GB + 10 GB = 60 GB.
    4. H100 bandwidth is 3.35 TB/s (3350 GB/s).
    5. **Latency per token: 60 GB / 3350 GB/s = ~17.9 ms per token.**
