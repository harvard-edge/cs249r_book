title: The Annual Energy Cost of an Inference Cluster
scenario: A small inference cluster runs 10 H100 GPUs 24/7. The data center has a Power Usage Effectiveness (PUE) of 1.1, and electricity costs $0.10 per kWh.
question: What is the approximate annual energy cost for the 10 H100 GPUs?
details:
  realistic_solution: The correct approach is to calculate the total power consumption for the entire cluster, including the PUE overhead. First, multiply the number of GPUs by the power consumption of a single H100. Then, multiply this by the PUE factor to get the true power draw from the wall. Finally, multiply this total power (in kW) by the number of hours in a year and the cost per kilowatt-hour.
  common_mistake: |
    **The Pitfall:** Considering only the GPU's rated power (TDP) and ignoring PUE overhead.
    **The Rationale:** Candidates treat servers in isolation and forget that data center cooling and power infrastructure consumes significant additional electricity.
    **The Consequence:** Underestimating operational expenses (OpEx) by 10% to 50%, throwing off TCO calculations.
  napkin_math: |
    1. **GPU Power:** 10 × 700W = 7kW.
    2. **Total Wall Draw (with PUE):** 7kW × 1.1 = 7.7kW.
    3. **Annual Energy:** 7.7kW × 8760 hrs/year = 67,452 kWh.
    4. **Annual Cost:** 67,452 kWh × $0.10/kWh = $6,745.20.
    **Conclusion:** The annual energy cost is approximately $6,750.
  options:
  - '~$6,130 (Mistake: Ignores the 1.1 PUE for cooling overhead)'
  - '~$15,000 (Mistake: Calculates 5% annual maintenance on CapEx, not energy cost)'
  - ~$6,750 (Correct)
  - '~$67,450 (Mistake: Arithmetic error, assumes $1.00/kWh instead of $0.10/kWh)'
  correct_index: 2
