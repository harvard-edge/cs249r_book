title: The Annual Energy Cost of an Inference Cluster
scenario: Your team runs a small inference cluster of 10 NVIDIA H100 GPUs, which operate 24/7. Your data
  center has an excellent Power Usage Effectiveness (PUE) of 1.1, and the commercial electricity cost
  is $0.10 per kWh. Using the provided hardware constants, calculate the approximate total annual *energy
  cost* for running this cluster. Which of the following is closest?
details:
  realistic_solution: The correct approach is to calculate the total power consumption for the entire
    cluster, including the PUE overhead. First, multiply the number of GPUs by the power consumption of
    a single H100. Then, multiply this by the PUE factor to get the true power draw from the wall. Finally,
    multiply this total power (in kW) by the number of hours in a year and the cost per kilowatt-hour.
  common_mistake: The most common mistake is to only consider the GPU's rated power (TDP) and forget to
    include the overhead from the data center's cooling and power infrastructure. The PUE factor models
    this additional power draw, and forgetting it leads to a significant underestimation of the true operational
    cost.
  napkin_math: 'Power per H100 = 700W. Total GPU power = 10 * 700W = 7kW. Factoring in PUE: 7kW * 1.1
    = 7.7kW total draw. Hours in a year = 24 * 365 = 8760 hrs. Total annual energy = 7.7kW * 8760 hrs
    = 67,452 kWh. Annual cost = 67,452 kWh * $0.10/kWh = $6,745.20. (Excludes host CPU/RAM power).'
  options:
  - '~$6,130 (Mistake: Ignores the 1.1 PUE for cooling overhead)'
  - '~$15,000 (Mistake: Calculates 5% annual maintenance on CapEx, not energy cost)'
  - ~$6,750 (Correct)
  - '~$67,450 (Mistake: Arithmetic error, assumes $1.00/kWh instead of $0.10/kWh)'
  correct_index: 2
