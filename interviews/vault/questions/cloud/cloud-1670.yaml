title: Calculating Paged KV Cache Capacity
scenario: You are deploying a Llama-2 7B model (FP16) on an NVIDIA A10G (24GB VRAM). The model weights
  consume 14GB, and 10GB is reserved for the KV cache. The model has 32 layers, 32 KV heads, and a head
  dimension of 128. If you use PagedAttention with a block size of 16 tokens, and the average request
  generates 512 tokens (including prompt), calculate how many concurrent requests the system can support
  compared to static allocation which pre-allocates for a max sequence length of 2048 tokens.
details:
  realistic_solution: 'First, calculate the per-token KV size: 2 (K and V) * 32 layers * 32 heads * 128
    dimension * 2 bytes (FP16) = 524,288 bytes (exactly 0.5MB). The total KV cache available is 10GB (10,240MB).
    Standard static allocation reserves 2048 tokens * 0.5MB = 1024MB per request upfront, supporting exactly
    10 concurrent requests (10,240 / 1024). PagedAttention allocates dynamically in 8MB blocks (16 tokens).
    For an average of 512 tokens, it allocates 512 * 0.5MB = 256MB per request. Thus, it can support 10,240MB
    / 256MB = 40 concurrent requests, yielding a 4x increase in effective batch size.'
  common_mistake: Failing to calculate the per-token KV cache size correctly (forgetting the factor of
    2 for both K and V matrices or the 2 bytes for FP16), and incorrectly assuming static allocation can
    dynamically reclaim unused memory during generation.
  napkin_math: 'Per-token KV = 2(K,V) * 32(L) * 32(H) * 128(D) * 2(B) = 524,288 B = 0.5 MB

    Total KV Memory = 10 GB = 10,240 MB

    Static Alloc (Max 2048) = 2048 * 0.5 MB = 1024 MB/req -> Max Batch = 10

    Paged Alloc (Avg 512) = 512 * 0.5 MB = 256 MB/req -> Max Batch = 10,240 / 256 = 40'
