title: Priority-Based GPU Scheduling for Mixed Training and Inference
scenario: 'Your organization runs both latency-sensitive inference (SLO: p99 < 100ms) and throughput-optimized training on a shared 256-GPU cluster. Inference load follows a bimodal pattern: 60% daytime utilization, 20% overnight. Training jobs have elastic GPU requirements (can run on 8-256 GPUs).'
question: 'How would you schedule inference and elastic training on the 256-GPU cluster to use overnight capacity without violating the p99 < 100ms SLO?'
details:
  realistic_solution: 'Implement elastic resource partitioning with a priority preemption ladder. Inference has preemptive priority over training. Training jobs register with a min (8 GPU) and max (256 GPU) allocation. The scheduler dynamically expands training during low-inference periods and preempts training GPUs within 30 seconds when inference load spikes, leveraging DCGM metrics for predictive autoscaling.'
  common_mistake: |
    **The Pitfall:** Recommending static resource partitioning (e.g., permanently dedicating 154 GPUs for inference and 102 for training).
    **The Rationale:** Candidates default to simple, safe isolation to guarantee inference SLOs, fearing the complexity of dynamic preemption.
    **The Consequence:** Overnight inference only uses 51 GPUs, leaving over 100 GPUs completely idle and wasting massive compute capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 256 GPUs at ~$3/GPU-hour.
       - Daytime Inference: 60% of 256 = 154 GPUs.
       - Overnight Inference: 20% of 256 = 51 GPUs.
    2. **Calculations:**
       - Idle Overnight GPUs: 154 - 51 = 103 GPUs.
       - Elastic Expansion: Reclaim 103 GPUs for 12 hours every night.
       - Annual Compute Recovered: 103 GPUs × 12 hrs × 365 days = 451,140 GPU-hours.
       - Financial Savings: 451,140 × $3 = $1,353,420/year.
    3. **Conclusion & Interpretation:**
       - **Result: Utilization-Bound. Elastic preemption scheduling recovers 103 idle GPUs overnight, saving >$1.3M annually while strictly preserving the P99 inference SLO.**
