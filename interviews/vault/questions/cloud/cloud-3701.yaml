title: Priority-Based GPU Scheduling for Mixed Training and Inference
scenario: 'Your organization runs both latency-sensitive inference (SLO: p99 < 100ms) and throughput-optimized training on a shared 256-GPU cluster. Inference load follows a bimodal pattern: 60% daytime utilization, 20% overnight. Training jobs have elastic GPU requirements (can run on 8-256 GPUs).'
question: "How would you schedule inference and elastic training on the 256-GPU cluster to use overnight capacity without violating the p99 < 100ms SLO?"
details:
  realistic_solution: 'Implement elastic resource partitioning with a priority preemption ladder. Inference has preemptive priority over training. Training jobs are classified as elastic: they register with a minimum (8 GPU) and maximum (256 GPU) allocation. The scheduler expands training during low-inference periods and preempts training GPUs within 30 seconds (one checkpoint interval) when inference load rises. Use DCGM metrics to predict inference demand 5 minutes ahead and begin graceful training preemption early.'
  common_mistake: |
    **The Pitfall:** Recommending static resource partitioning (e.g., 154 GPUs for inference, 102 for training).
    **The Rationale:** Candidates default to simple, safe isolation to guarantee inference SLOs, avoiding the complexity of dynamic preemption.
    **The Consequence:** Overnight inference only uses 51 GPUs, leaving 103 GPUs completely idle and wasting **massive compute capacity**.
  napkin_math: |
    1. Daytime inference: 60% * 256 = 154 GPUs. Training receives 102 GPUs.
    2. Overnight inference: 20% * 256 = 51 GPUs.
    3. With elastic scheduling, training expands to use the remaining 205 GPUs (a 2x overnight throughput increase).
    4. Annual savings from recovering 103 idle GPUs for 12 hours a night: 103 * 12 * 365 = 451,140 GPU-hours.
    **At $3/GPU-hour, elastic scheduling recovers $1.35M/year in compute.**
