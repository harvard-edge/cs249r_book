title: Optimizing LLM Inference on AMD MI300X via Operator Scheduling
scenario: You are deploying a large language model with 70 billion parameters for real-time inference on an accelerator. Initial deployment shows suboptimal throughput and high memory pressure.
question: How would you optimize operator execution order for the 70B LLM to reduce memory pressure and improve throughput?
details:
  realistic_solution: Implement a dynamic operator scheduler that leverages profiling data to prioritize memory-bound operations for fusion (e.g., vertical fusion of element-wise ops, horizontal fusion of identical ops) to reduce intermediate memory footprint. Reorder compute-bound operations to maximize data reuse within HBM3 and exploit asynchronous execution to hide memory latency. This involves using graph optimization techniques in a compiler like TVM or MLIR to identify and apply these transformations, tailoring the schedule to the MI300X's specific memory hierarchy and compute capabilities.
  common_mistake: |
    **The Pitfall:** Blindly scheduling operations without modeling the intermediate tensor lifetimes.
    **The Rationale:** Developers often rely strictly on standard layer-by-layer eager execution because it matches the model architecture conceptually.
    **The Consequence:** Extreme cache misses and redundant data transfers across the bus, effectively starving the massive compute core and crashing throughput.
  napkin_math: |
    1. Assumptions & Constraints: HBM bandwidth = 5.3 TB/s. Intermediate tensor = 50 GB. 100 layers.
    2. Calculations: Data transfer time per layer = (50+50) GB / 5300 GB/s ≈ 0.019s. Total time saved across 100 layers = 0.019s * 100 = 1.9s.
    3. Conclusion & Interpretation: **Result: Operator fusion shaves 1.9 seconds off latency by deleting redundant HBM sweeps. Bottleneck: Memory Bandwidth.**
