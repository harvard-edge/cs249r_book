title: Identifying the Bottleneck
scenario: A workload running on an H100 GPU has an arithmetic intensity of 40 FLOPs/Byte.
question: With arithmetic intensity 40 FLOPs/Byte on an H100 ridge point of 295 FLOPs/Byte, is the workload compute-bound or memory-bound?
details:
  realistic_solution: The workload is **memory-bound**. Its arithmetic intensity (40 FLOPs/Byte) is significantly lower than the H100's ridge point (295 FLOPs/Byte). This places it on the left side of the roofline model, where the performance is dictated by the sloped line representing memory bandwidth limitations. The GPU's powerful compute cores are starved for data and cannot run at their full potential.
  common_mistake: |
    **The Pitfall:** Inverting the logic: thinking that a low arithmetic intensity means the workload isn't doing much compute, so it must be compute-bound.
    **The Rationale:** The term compute-bound sounds like restricted by low compute, causing semantic confusion.
    **The Consequence:** Applying compute-heavy optimizations (like Tensor Core tuning) to a workload that is actually starving for data from memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload AI: 40 FLOPs/Byte.
       - H100 Ridge Point: 295 FLOPs/Byte.
       - H100 Peak Bandwidth: 3.35 TB/s.
       - H100 Peak Compute: 989 TFLOPS.
    2. **Calculations:**
       - Achievable Compute: 3.35 TB/s * 40 FLOPs/Byte = 134 TFLOPS.
       - Peak Compute Check: 134 TFLOPS < 989 TFLOPS.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound.** Because the arithmetic intensity is below the ridge point, the workload is strictly memory-bound.
  options:
  - Compute-bound, because 134 TFLOPS is lower than 989 TFLOPS.
  - Memory-bound, because its arithmetic intensity is below the ridge point.
  - Compute-bound, because it utilizes less than 15% of peak compute.
  - Memory-bound, because 40 FLOPs/Byte exceeds the PCI-e bandwidth limit.
  correct_index: 1
