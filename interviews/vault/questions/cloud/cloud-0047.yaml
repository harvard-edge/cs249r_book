title: The Static Batching Latency Tax
scenario: You are designing an LLM serving system on a single H100 GPU. The team has decided to use a
  simple, time-based static batching strategy to improve throughput. The system collects all incoming
  requests for a fixed window of **50ms** and then dispatches them as a single batch.
question: "For a request arriving just after the 50ms static batching window opens, what components make up its worst-case TTFT?"
details:
  realistic_solution: 'The total Time-To-First-Token (TTFT) is the sum of three distinct periods: the
    time waiting for the batch window to fill, the fixed overhead to process the batch, and the time to
    compute the first token.'
  common_mistake: Engineers often conflate system throughput with user-perceived latency. They might only
    calculate the GPU processing time (25ms) and forget that for a user who arrives early, the largest
    component of their wait time is the time spent in the queue waiting for the batch window to close.
    The total latency is the sum of queueing time and processing time.
  napkin_math: '# 1. Time spent waiting for the batch window to close (worst case)'
  options:
  - 25ms
  - 55ms
  - 75ms
  - 50ms
  correct_index: 2
