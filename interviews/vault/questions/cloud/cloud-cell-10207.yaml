title: Implementing Semantic Caching for RAG on H100 to Reduce LLM Calls
scenario: A RAG system on H100 processes 50,000 queries/day. LLM generation costs $0.03/query = $1,500/day.
  Query analysis shows 35% of queries are semantically near-duplicate (cosine similarity > 0.95 with a
  prior query within 24 hours). Implement a semantic cache layer using a 384-dim embedding model (5ms
  lookup) to intercept these duplicate queries before LLM invocation. Design the cache invalidation strategy
  for a dynamic knowledge base updated every 6 hours.
details:
  realistic_solution: 'Deploy a Redis vector store with HNSW index for sub-millisecond similarity search.
    Cache key: query embedding (384-dim float32 = 1.5KB). Cache value: full response + retrieval metadata
    + timestamp + knowledge_base_version. Invalidation: tag each cached response with KB version hash;
    on 6-hour KB update, batch-invalidate all responses tagged with prior version. Warm the cache by pre-embedding
    the top-1000 most frequent query clusters. Hit rate target: 35% semantic hits → $0.03 * 50,000 * 0.35
    = $525/day savings.'
  common_mistake: Using exact-match string caching instead of semantic caching, catching only 2-3% of
    duplicate queries instead of 35%. Also failing to invalidate cached responses when the underlying
    knowledge base updates, serving stale answers.
  napkin_math: 'Daily queries: 50,000. Semantic hit rate: 35% = 17,500 queries served from cache. LLM
    savings: 17,500 * $0.03 = $525/day = $15,750/month. Cache infrastructure cost: Redis cluster with
    100GB RAM (for 1M cached embeddings * 1.5KB + responses * 5KB avg) = ~$200/month. Net savings: $15,550/month.
    Cache lookup adds 5ms (embedding) + 2ms (HNSW search) = 7ms vs 300ms LLM call. Latency improvement
    for cache hits: 97.7%.'
