title: Cloud Benchmark Harness L3 0
scenario: You benchmark a model inference on an H100. Without warmup, the first 5 iterations average 45 ms. After warmup, the next 100 iterations average 12 ms with std dev 0.8 ms. The harness reports the overall mean of all 105 iterations.
question: What bias does including the 5 warmup iterations introduce, and what latency should the benchmark report instead?
details:
  realistic_solution: 'Biased overall mean: (5 × 45 + 100 × 12) / 105 = (225 + 1200) / 105 = 1425 / 105 = 13.57 ms. Corrected mean (warmup excluded): 12.0 ms. Bias: 13.57 - 12.0 = 1.57 ms = 13.1% overestimate. 95% confidence interval: 12.0 ± 1.96 × 0.8 / √100 = 12.0 ± 0.157 ms = [11.84, 12.16]. The warmup inflates the reported latency by 13% — significant for benchmark comparisons where 5% differences are meaningful. Proper harness: discard first N iterations (until steady-state), report median of remaining, plus percentiles.'
  common_mistake: |
    **The Pitfall:** Including warmup iterations in the benchmark average.
    **The Rationale:** The first few iterations include JIT compilation (torch.compile), CUDA context initialization, and memory allocation that will never occur in steady-state serving.
    **The Consequence:** Inflated reported latencies that obscure true steady-state performance and mislead hardware/model comparisons.
  napkin_math: |
    - Warmup time: 5 × 45 ms = 225 ms.
    - Steady-state time: 100 × 12 ms = 1200 ms.
    - Biased mean: (225 + 1200) / 105 = 1425 / 105 = 13.57 ms.
    - True mean: 12.0 ms.
    - Bias: (13.57 - 12.0) / 12.0 = 13.1%.
    - 95% CI: ± 1.96 × (0.8 / √100) = ± 0.157 ms (1.3%).
    - **Warmup bias (13.1%) is 10x larger than measurement noise.**
