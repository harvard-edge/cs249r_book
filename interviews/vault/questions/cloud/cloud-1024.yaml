title: Seasonality-Induced Drift Triggers
scenario: A fraud detection continuous training pipeline triggers a full retraining job (costing $128
  on an 8x A100 cluster) whenever the KS-statistic of incoming transaction features drifts by >0.05 against
  the daily baseline. Recently, the pipeline started triggering 8 times per day, inflating monthly compute
  costs to over $30,000. Despite frequent retraining, production AUC remains completely flat at 0.89.
  The data engineering team confirms no pipeline bugs or schema changes. What is the likely root cause
  of the hyper-active retraining, and how do you prove it?
question: "What is the likely root cause of the hyper-active retraining, and how do you prove it?"
details:
  realistic_solution: The root cause is computing drift on a sliding window (e.g., 1 hour) that captures
    natural intra-day seasonality (daytime vs. nighttime transaction behavior) rather than true distribution
    shift. Diagnose by plotting the KS-statistic over a 72-hour period to observe cyclic peaks. Fix by
    expanding the drift detection window to a full 24-hour cycle or comparing against the same hour from
    the previous day.
  common_mistake: Blindly raising the KS-statistic threshold or switching to schedule-based retraining
    without diagnosing the underlying data pattern causing the alerts.
  napkin_math: 'Current retraining cost: 8 A100 GPUs * 4 hours * $4/hr = $128 per run. At 8 triggers per
    day due to intraday KS-statistic drift, daily cost = 8 * $128 = $1,024 ($30,720/month). By expanding
    the drift baseline window to 24 hours to absorb natural diurnal seasonality, triggers reduce to 1
    per day. New cost = $128/day. Savings = 7 runs * $128 = $896/day, or $26,880/month for zero AUC impact.'
