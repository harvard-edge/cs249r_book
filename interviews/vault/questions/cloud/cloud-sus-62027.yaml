title: Multi-Stage Ranking Latency Budget
scenario: 'A social platform''s recommendation pipeline has 4 stages: (1) Retrieval: 1B candidates → 10k,
  (2) Pre-ranking: 10k → 1k, (3) Ranking: 1k → 100, (4) Re-ranking: 100 → 10 final results. Total end-to-end
  SLO is 150 ms. Allocate latency budgets across stages and identify which stage most benefits from GPU
  acceleration vs. CPU/approximate methods.'
question: "How would you allocate the 150 ms SLO across the 4-stage recommendation pipeline, and which stages benefit most from GPU acceleration?"
details:
  realistic_solution: 'Latency budget allocation (principles): Retrieval must scan 1B candidates in minimal
    time → use approximate nearest-neighbor (ANN) search (e.g., FAISS, ScaNN) on vector embeddings. Budget:
    20 ms. Pre-ranking: 10k candidates, simple model (2-layer MLP, no embedding lookups). GPU batch scoring.
    Budget: 15 ms. Ranking: 1k candidates, full DLRM with all embedding lookups and deep MLP. Most expensive
    per-candidate. Budget: 80 ms (dominant stage). Re-ranking: 100 candidates, rule-based + light contextual
    model. CPU. Budget: 20 ms. Overhead (network, feature fetch): 15 ms. Total: 150 ms. GPU acceleration
    most valuable at Ranking: 1k × full DLRM forward pass. Pre-ranking can run on CPU at 10k candidates
    if model is small enough. Retrieval: GPU-accelerated FAISS/HNSW for ANN — critical for 1B-scale.'
  common_mistake: Allocating equal latency budgets to each stage. Retrieval operates on 100,000× more
    candidates than re-ranking; its per-candidate budget must be 100,000× smaller, pushing it toward approximate
    methods (ANN search, hashing).
  napkin_math: 'Ranking stage (1k candidates, DLRM): each candidate requires ~1 GFLOP + 128 KB embedding
    lookups. 1k candidates: 1 TFLOP compute + 128 MB embedding reads. A100 at 312 TFLOPS: compute = 1e12/312e12
    = 3.2 ms. Embedding reads at 2 TB/s: 128 MB/2000 = 0.064 ms. Total: ~5 ms per batch of 1k — well within
    80 ms budget. Pre-ranking on CPU (10k, small 2-layer MLP ~10 MFLOP/candidate): 10k × 10 MFLOPs = 100
    GFLOPs. CPU at 2 TFLOPS: 50 ms — over budget. Need GPU for pre-ranking too: 100 GFLOPs / 312 TFLOPS
    = 0.32 ms.'
