title: Diagnosing Production Accuracy Collapse in Cloud CV
scenario: You deploy a ResNet-152 model on AWS G5 instances to classify user-uploaded real estate images. On a clean offline test benchmark, top-1 accuracy is 94%. In production, user feedback indicates true accuracy is only 72%. System monitoring shows no bottlenecks, and latency is stable. Telemetry reveals that 80% of production traffic consists of highly compressed mobile uploads. On a separate test, this compression degrades the model's accuracy to 66.5%.
question: Why is production accuracy 72% despite 94% offline accuracy, and how would you recover it?
details:
  realistic_solution: Audit the production data distribution to discover users are uploading heavily compressed JPEGs. Create a 'production-realistic' benchmark and augment the training pipeline with variable JPEG compression and aspect-ratio jitter.
  common_mistake: |
    **The Pitfall:** Assuming the model architecture lacks capacity and switching to a larger model like ViT-L.
    **The Rationale:** Candidates immediately blame the model rather than investigating data distribution shifts between test and production.
    **The Consequence:** Increasing inference costs substantially without fixing the underlying degradation caused by image compression artifacts.
  napkin_math: |
    - **Offline Accuracy**: Clean data = 94%.
    - **Degraded Accuracy**: Corrupted data = 66.5%.
    - **Production Shift**: If 80% of traffic is highly compressed mobile uploads (45KB vs 2MB).
    - **Expected Accuracy**: (0.20 * 94%) + (0.80 * 66.5%) = 18.8% + 53.2%.
    - **Conclusion**: **Total production accuracy is 72%, exactly matching the observed metric due to data corruption.**
