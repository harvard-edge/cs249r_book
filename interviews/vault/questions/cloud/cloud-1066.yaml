title: Diagnosing Production Accuracy Collapse in Cloud CV
scenario: You deploy a ResNet-152 model on AWS G5 instances (A10G GPUs) to classify user-uploaded real
  estate images. On your clean 100K-image offline test benchmark, top-1 accuracy is 94%. However, in production
  serving 500 requests/sec, user feedback metrics indicate the true accuracy is only 72%. System monitoring
  shows no CPU/GPU bottlenecks, and P99 latency is stable at 45ms.
details:
  realistic_solution: Audit the production data distribution to discover users are uploading heavily compressed
    JPEGs (averaging 45KB vs the 2MB training images). Create a 'production-realistic' benchmark set,
    and augment the training pipeline with variable JPEG compression (Q=30-60) and aspect-ratio jitter
    to recover the lost accuracy.
  common_mistake: Assuming the architecture lacks capacity and recommending a switch to a larger model
    like ViT-L, or blindly tweaking learning rates without auditing the distribution shift between the
    offline benchmark and production data.
  napkin_math: Clean data accuracy = 94%. Corrupted data accuracy = 66.5%. If 80% of production traffic
    consists of highly compressed mobile uploads (45KB vs 2MB, a 44x compression ratio), expected production
    accuracy = (0.20 * 94%) + (0.80 * 66.5%) = 18.8% + 53.2% = 72.0%.
