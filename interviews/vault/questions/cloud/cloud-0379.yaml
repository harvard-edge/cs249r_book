title: The H100 Ridge Point (cloud-0379)
scenario: An H100 GPU is specified with a peak FP16 performance of 989 TFLOPS and a memory bandwidth of
  3.35 TB/s. To understand its performance characteristics for different workloads, you need to calculate
  its 'ridge point' from these two specifications. What is the approximate arithmetic intensity of the
  H100's ridge point, and what does it signify?
details:
  realistic_solution: The ridge point is the minimum arithmetic intensity (AI) a workload must have to
    be compute-bound. It's calculated by dividing the peak compute performance by the peak memory bandwidth.
    For the H100, this determines the exact threshold where performance becomes limited by computation
    rather than the speed of memory access. Workloads with an AI below this value are memory-bound; workloads
    with an AI above it are compute-bound.
  common_mistake: A common mistake is to confuse the ridge point with general power efficiency (TFLOPS/W),
    or to calculate the inverse ratio (Bytes/Op). The key is remembering that the ridge point specifically
    defines the boundary between memory-bound and compute-bound workloads, and its units must be Operations
    per Byte.
  napkin_math: To find the ridge point, divide peak FP16 compute by peak memory bandwidth. H100 Peak Compute
    = 989 TFLOPS = 989e12 FLOPs/sec. H100 Peak Bandwidth = 3.35 TB/s = 3.35e12 Bytes/sec. Ridge Point
    = 989 / 3.35 = 295 FLOPs/Byte. This means you must do 295 math operations for every byte fetched from
    HBM3 to fully utilize the H100's tensor cores.
  options:
  - ~1.41 Ops/Byte. This is the GPU's power efficiency in TFLOPS/W.
  - ~0.0034 Bytes/Op. This is the memory required per FLOP.
  - ~295 Ops/Byte. It's the threshold where workloads become compute-bound instead of memory-bound.
  - ~37 Ops/Byte. This would be the ridge point if bandwidth were incorrectly measured in Terabits/s.
  correct_index: 2
