title: The H100 Ridge Point (cloud-0379)
scenario: An H100 GPU is specified with a peak FP16 performance of 989 TFLOPS and a memory bandwidth of 3.35 TB/s. To understand its performance characteristics for different workloads, you need to calculate its 'ridge point' from these two specifications.
question: What is the approximate arithmetic intensity of the H100's ridge point, and what does it signify?
details:
  realistic_solution: The ridge point is the minimum arithmetic intensity (AI) a workload must have to be compute-bound. It's calculated by dividing the peak compute performance by the peak memory bandwidth. For the H100, this determines the exact threshold where performance becomes limited by computation rather than the speed of memory access. Workloads with an AI below this value are memory-bound; workloads with an AI above it are compute-bound.
  common_mistake: |
    **The Pitfall:** Confusing the ridge point with general power efficiency (TFLOPS/W) or inverting the ratio (Bytes/Op).
    **The Rationale:** Candidates memorize the term but forget that it defines the boundary between memory-bound and compute-bound workloads based on operations per byte.
    **The Consequence:** Misidentifying a memory-bound workload as compute-bound, leading to wasted optimization efforts on kernel math instead of memory access patterns.
  napkin_math: |
    - Peak FP16 compute: 989 TFLOPS = 989 * 10^12 FLOPs/sec.
    - Peak Memory Bandwidth: 3.35 TB/s = 3.35 * 10^12 Bytes/sec.
    - Ridge Point: 989 / 3.35 = 295.2 FLOPs/Byte.
    - **You must perform ~295 math operations for every byte fetched from HBM3 to fully utilize the H100 tensor cores.**
  options:
  - ~1.41 Ops/Byte. This is the GPU's power efficiency in TFLOPS/W.
  - ~0.0034 Bytes/Op. This is the memory required per FLOP.
  - ~295 Ops/Byte. It's the threshold where workloads become compute-bound instead of memory-bound.
  - ~37 Ops/Byte. This would be the ridge point if bandwidth were incorrectly measured in Terabits/s.
  correct_index: 2
