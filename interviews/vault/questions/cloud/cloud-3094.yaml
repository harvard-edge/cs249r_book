title: 'Systolic Array Realization: Memory Layout for TPU Batch Inference'
scenario: Concretely determine the optimal memory layout (row-major vs column-major vs tiled) for weight matrices on a TPU v5e for batched inference of a feed-forward layer (in_features=8192, out_features=32768, batch=256, seq=128).
question: Which weight layout should TPU v5e use for the 8192x32768 feed-forward layer, and how much does layout affect bandwidth and performance?
details:
  realistic_solution: 'Weight matrix W: (8192, 32768) BF16 = 512MB. For C = X * W^T where X is (256*128, 8192) = (32768, 8192). Row-major stores contiguous in-features per output neuron: layout matches systolic array access pattern for output-stationary. Column-major: transposing access pattern → strided loads → poor cache utilization. TPU XLA uses tiled layouts automatically. Recommendation: use XLA default (major-to-minor dimension ordering for XLA tiles).'
  common_mistake: |
    **The Pitfall:** Applying CPU-centric row-major reasoning to TPU hardware.
    **The Rationale:** Candidates often default to CPU memory layout patterns, assuming simple row-major or column-major is best.
    **The Consequence:** Failing to realize that TPUs use XLA-managed HBM with 128-byte cache lines optimized for systolic array access patterns (NCHW-like tiled layouts), and that the workload is compute-bound anyway.
  napkin_math: |
    - **Weight Matrix (W):** 8192 * 32768 * 2 bytes = 512 MB.
    - **Input Matrix (X):** (256 * 128) * 8192 * 2 bytes = 32768 * 8192 * 2 bytes = 512 MB.
    - **Output Matrix (C):** 32768 * 32768 * 2 bytes = 2 GB.
    - **Total Memory Bandwidth Needed:** 512 MB + 512 MB + 2048 MB = 3 GB.
    - **Bandwidth Time:** 3 GB / 819 GB/s = 3.66 ms.
    - **FLOPs:** 2 * 32768 * 8192 * 32768 = 17.6 TFLOPs.
    - **Compute Time:** 17.6 TFLOPs / 197 TFLOPs = 89 ms.
    - **Conclusion:** 89 ms >> 3.66 ms, so the operation is highly compute-bound (AI = 17.6T / 3GB = 5867 FLOPs/byte >> 240 ridge).
    - **Impact:** Layout choice has minimal impact when highly compute-bound; the system will achieve **~89% MFU** regardless of minor memory inefficiencies.
