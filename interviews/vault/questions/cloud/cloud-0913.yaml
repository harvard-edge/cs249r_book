title: Optimizing Dynamic Batching Windows
scenario: 'A dynamic batching scheduler targets a 50ms P99 SLO. Network/prep takes 10ms. Model exec is 7ms + 1ms per batch item. At peak, requests arrive at 250 req/sec (1 every 4ms).'
question: 'Which batching window (2ms, 12ms, or 30ms) guarantees stability under the 50ms SLO?'
details:
  realistic_solution: 'Set the window to 12ms. This accumulates 3-4 requests per batch, providing 363 req/sec throughput (handling the 250 req/sec load) while worst-case latency is 33ms (10ms prep + 12ms wait + 11ms exec), safely under 50ms.'
  common_mistake: |
    **The Pitfall:** Greedily minimizing latency by selecting the lowest window (2ms).
    **The Rationale:** Candidates optimize a single request's speed without considering throughput ceilings.
    **The Consequence:** Batch size caps at 1, capping throughput at 125 req/sec, causing infinite queue growth and SLA failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLO < 50ms. Arrival: 250 req/s.
    - Max Throughput = B / (7 + B) ms.
    
    **Calculations:**
    - 2ms Window (B=1): 1 req / 8ms = 125 req/s (Fails).
    - 12ms Window (B=4): 4 req / 11ms = 363 req/s (Passes).
    - Worst Latency (12ms): 10ms + 12ms + 11ms = 33ms.
    
    **Conclusion & Interpretation:**
    - **Result: 12ms window provides 363 req/s at 33ms latency (Queue-Bound)**. Throughput must strictly exceed arrival rate to prevent infinite delay.
