title: Optimizing Dynamic Batching Windows
scenario: You are configuring a dynamic batching scheduler for a fraud detection API on a T4 GPU. The
  strict P99 latency SLO is 50ms. Network and preprocessing consume 10ms. Model execution takes 7ms for
  a single request, plus 1ms for each additional request in the batch (E(b) = 7 + b ms). At peak load,
  requests arrive uniformly at 250 req/sec (1 every 4ms). Evaluate the trade-offs of using a 2ms, 12ms,
  and 30ms batching window, and justify the optimal configuration.
question: "Which batching window—2ms, 12ms, or 30ms—should you choose at 250 req/s under the 50ms P99 SLO, and why?"
details:
  realistic_solution: Set the batching window to 12ms. This accumulates ~3-4 requests per batch at peak
    load (250 req/s arrival rate with 4ms inter-arrival time), providing a maximum throughput of 363 req/sec
    (safely exceeding the 250 req/sec load) while keeping the worst-case request latency strictly bounded
    at 33ms (10ms prep + 12ms max wait + 11ms exec), well under the 50ms P99 SLO.
  common_mistake: Candidates often select the lowest window (2ms) to greedily minimize latency, failing
    to realize this restricts batch sizes to 1, which caps throughput at 125 req/sec — well below the
    250 req/sec peak load, causing infinite queue growth and severe SLO violations.
  napkin_math: 'Required Throughput > 250 req/s. Max Throughput = b / (7 + b) ms.

    b=1 (2ms window): 1/8ms = 125 req/s (Fails, queues infinitely).

    b=2 (6ms window): 2/9ms = 222 req/s (Fails, system overloaded).

    b=4 (12ms window): 4/11ms = 363 req/s (Passes, handles 250 req/s easily).

    Worst-case Latency at 12ms window = 10ms (prep) + 12ms (max wait) + 11ms (exec) = 33ms < 50ms SLO.'
