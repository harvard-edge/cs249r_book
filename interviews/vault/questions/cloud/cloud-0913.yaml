title: Optimizing Dynamic Batching Windows
scenario: 'You are configuring a dynamic batching scheduler for a fraud detection API on a T4 GPU. The strict P99 latency SLO is 50ms. Network and preprocessing consume 10ms. Model execution takes 7ms for a single request, plus 1ms for each additional request in the batch (E(B) = 7 + B ms). At peak load, requests arrive uniformly at 250 req/sec (1 every 4ms).'
question: 'Which batching window—2ms, 12ms, or 30ms—should you choose at 250 req/s under the 50ms P99 SLO, and why?'
details:
  realistic_solution: 'Set the batching window to 12ms. This accumulates ~3-4 requests per batch at peak load (250 req/s arrival rate with 4ms inter-arrival time), providing a maximum throughput of 363 req/sec (safely exceeding the 250 req/sec load) while keeping the worst-case request latency strictly bounded at 33ms (10ms prep + 12ms max wait + 11ms exec), well under the 50ms P99 SLO.'
  common_mistake: |
    **The Pitfall:** Greedily minimizing latency by selecting the lowest window (2ms).
    **The Rationale:** Candidates optimize for a single request's speed without considering throughput ceilings and queueing theory.
    **The Consequence:** The batch size is capped at 1, capping total throughput at 125 req/sec — well below the 250 req/sec peak load, causing infinite queue growth and severe SLO violations.
  napkin_math: |
    - **Required Throughput:** > 250 req/s. Max Throughput = B / (7 + B) ms.
    - **2ms Window (B=1):** 1 request / 8 ms = 125 req/s (**Fails**, queues infinitely).
    - **6ms Window (B=2):** 2 requests / 9 ms = 222 req/s (**Fails**, system overloaded).
    - **12ms Window (B=4):** 4 requests / 11 ms = 363 req/s (**Passes**, handles 250 req/s easily).
    - **Worst-case Latency at 12ms:** 10 ms (prep) + 12 ms (max wait) + 11 ms (exec) = **33 ms** (Under 50ms SLO).
