title: Evaluating Bare-Metal SmartNIC Serving
scenario: 'You are designing an inline packet-level anomaly detection system for a cloud infrastructure
  provider. The model must score incoming network packets within a strict 5-microsecond p99 latency budget
  to avoid dropping traffic. You are evaluating two deployment options: 1) A highly optimized C++ microservice
  running on a standard cloud Linux host (3.0GHz Xeon CPU), or 2) Bare-metal execution directly on the
  SmartNIC''s embedded ARM Cortex-M7 core (2MB SRAM, 400MHz, no OS). Evaluate the architectural trade-offs,
  specifically addressing latency determinism and memory constraints.'
details:
  realistic_solution: Deploy on the bare-metal SmartNIC Cortex-M7. Removing the operating system eliminates
    context switch jitter and kernel network stack overhead, guaranteeing deterministic sub-microsecond
    latency (~0.125us). To compensate for the 2MB SRAM constraint, the model must be a lightweight decision
    tree deeply quantized to INT8 and compiled directly to C code, with all memory statically allocated
    at compile time (zero dynamic heap allocation) to fit within the embedded constraints.
  common_mistake: Candidates often assume the 3.0GHz Xeon CPU is the obvious choice due to raw clock speed
    and abundant RAM, completely ignoring the catastrophic and non-deterministic latency jitter (2.5-5.0us)
    introduced by the Linux kernel network stack, context switches, and PCIe transfer overhead.
  napkin_math: 'Linux Xeon overhead: PCIe transfer (~1.5us) + OS Context Switch/Jitter (~2.5-5.0us) =
    ~4.0-6.5us latency before compute starts (Violates 5us SLA). Bare-metal M7 overhead: 0us context switch.
    At 400MHz (400 cycles/us), evaluating a 1000-node tree takes ~50 cycles (0.125us). Total bare-metal
    latency = ~0.125us, easily meeting the deterministic 5us SLA.'
