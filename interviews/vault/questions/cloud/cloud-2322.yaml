title: Mitigating W8A8 Activation Outliers via Mathematical Migration
scenario: You are deploying a 100B parameter model in W8A8 format to achieve 2,000 tokens/s throughput
  on an L40S cluster. Standard INT8 quantization causes a 10% drop in accuracy due to extreme activation
  outliers (magnitude ~100) in specific channels, while weights in the same layers have a maximum magnitude
  of ~0.5. How do you re-architect the quantization pipeline to preserve accuracy without dropping to
  16-bit?
details:
  realistic_solution: Clipping outliers destroys critical features in LLMs. Instead, you must implement
    a mathematical equivalent transformation like SmoothQuant. Because the linear operation Y = X * W
    is equivalent to Y = (X / S) * (W * S) for any diagonal matrix S, you can migrate the quantization
    difficulty from the activations to the weights. By calculating a per-channel scale factor S based
    on the ratio of activation maximums to weight maximums (typically S_i = max(|X_i|)^0.5 / max(|W_i|)^0.5),
    you divide the activation outliers by S and multiply the corresponding weights by S. This smooths
    the activation distribution, allowing both X and W to fit comfortably within INT8 ranges without severe
    quantization error.
  common_mistake: Clipping the activation outliers to a lower maximum to preserve the resolution of the
    smaller, normal activations.
  napkin_math: Act max = 100. Weight max = 0.5. Choose S = sqrt(100 / 0.5) = sqrt(200) = 14.14. New act
    max = 100 / 14.14 = 7.07. New weight max = 0.5 * 14.14 = 7.07. Both tensors now have a well-behaved
    range of ~7.0, easily captured by 8-bit integers.
