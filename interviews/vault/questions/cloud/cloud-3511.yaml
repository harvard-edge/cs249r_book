title: Graceful Degradation Anomaly on TPU v5e
scenario: Your critical real-time ML inference service, responsible for high-volume recommendations, is deployed on a fleet of Google TPU v5e instances, each featuring 16 GB HBM, 197 TFLOPS BF16 performance, and 1.6 TB/s memory bandwidth. The service incorporates a robust graceful degradation strategy, including a degradation ladder with multiple model fallbacks, quality-of-service (QoS) shedding, and fail-operational modes. During a moderately high traffic period, your monitoring systems show a consistent 15% increase in end-to-end inference latency and a 2% drop in recommendation relevance (accuracy), yet the system reports all primary health checks as 'green', and the most aggressive degradation steps have not been triggered.
question: What likely explains the 15% latency increase and 2% relevance drop despite green health checks, and how would you diagnose it?
details:
  realistic_solution: "The problem likely lies within the degradation trigger mechanisms or the model monitoring. A realistic solution involves examining the thresholds for each degradation step. It's possible that the current latency or accuracy degradation, while significant for user experience, falls just below the configured thresholds for triggering more aggressive fallbacks or QoS shedding. The diagnostic approach would include: \n1. **Reviewing Degradation Logic:** Analyze the configuration of the degradation ladder, specifically the metrics and thresholds that trigger model fallbacks and QoS shedding. \n2. **Granular Monitoring:** Implement more granular monitoring for the service, including user-perceived latency, specific model accuracy metrics on recent data, and potentially a 'degradation pressure' score that combines multiple soft signals. \n3. **A/B Testing Thresholds:** Experiment with slightly more sensitive degradation thresholds in a canary deployment or A/B test to see if earlier intervention alleviates the issues. \n4. **Model Performance Drift Detection:** Investigate if the 2% accuracy drop is a symptom of model drift or performance regression on specific types of input data that the degradation system wasn't designed to detect at this severity level."
  common_mistake: |
    **The Pitfall:** Immediately suspecting hardware issues or network saturation.
    **The Rationale:** Engineers trust the health checks blindly and assume infrastructure failures, overlooking the subtle configuration of the graceful degradation logic itself.
    **The Consequence:** Chasing ghost hardware bugs instead of tuning the service's degradation thresholds.
  napkin_math: |
    1. Evaluate HBM bandwidth: 10,000 inferences/sec * 100MB/inference = 1 TB/s.
    2. Analyze latency increase: A 15% latency jump reduces throughput to ~8,700 inferences/sec.
    3. Identify bottleneck: Utilization is below the 1.6 TB/s limit, indicating poor HBM access patterns or contention, not raw bandwidth limits.
    4. Assess degradation trigger: The 2% accuracy drop and 15% latency increase fall just short of triggering the next fallback stage.
    **Final Result: The degradation logic thresholds are set too high to catch the subtle performance shift.**
