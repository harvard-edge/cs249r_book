title: Calculating Baseline Training Memory Pressure
scenario: Your team is planning to pre-train a 7-billion parameter LLM. You are using standard mixed-precision training (BF16 for forward/backward passes) and the AdamW optimizer.
question: What is the absolute minimum baseline memory footprint required per accelerator just to store the weights, gradients, and optimizer states?
details:
  realistic_solution: The baseline memory requirement is exactly 16 bytes per parameter, totaling 112 GB. Because this exceeds the capacity of a standard 80GB A100 GPU, you must implement state sharding (e.g., DeepSpeed ZeRO-1/2 or PyTorch FSDP) to distribute the optimizer states across multiple GPUs.
  common_mistake: |
    **The Pitfall:** Calculating everything in BF16 and forgetting the Adam optimizer's FP32 requirements.
    **The Rationale:** Candidates often remember the 2 bytes/parameter rule for mixed precision but forget that Adam requires full-precision copies for master weights, momentum, and variance.
    **The Consequence:** Underestimating memory needs by a massive 12 bytes per parameter, leading to immediate Out-Of-Memory (OOM) errors during training initialization.
  napkin_math: |
    *   BF16 Weights: 2 bytes/parameter.
    *   BF16 Gradients: 2 bytes/parameter.
    *   AdamW Optimizer States: FP32 Master Weights (4 bytes) + FP32 Momentum (4 bytes) + FP32 Variance (4 bytes) = 12 bytes/parameter.
    *   Total model state memory: 2 + 2 + 12 = 16 bytes/parameter.
    *   Total for 7B parameters: 7 × 10^9 × 16 bytes = 112 GB.
    *   **Result: The absolute minimum memory footprint is 112 GB, strictly requiring state sharding (e.g., ZeRO-1) to fit on an 80GB GPU.**
