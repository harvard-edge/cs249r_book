title: 'TCO Optimization: Rightsize GPU Fleet for Inference Workload'
scenario: 'An H100 inference fleet (80GB HBM3, $2.50/hr) running LLaMA-7B shows average GPU utilization
  of 23% and memory utilization of 15%. The team provisioned for peak load at 3x steady-state. Calculate
  the annual waste, design a rightsizing strategy with autoscaling, and quantify the savings. Steady-state
  load: 50 H100s. Peak: 150 H100s for 2 hours/day.'
question: "How much annual GPU spend is wasted by keeping 150 H100s on 24/7, and what autoscaling plan and savings would you propose?"
details:
  realistic_solution: 'Current fleet: 150 H100s 24/7 (sized for peak). Cost: 150 * $2.50 * 8760 = $3.285M/yr.
    Optimal: 50 H100s base + autoscale 100 more for 2hr/day. Cost: 50*$2.50*8760 + 100*$2.50*365*2hr =
    $1.095M + $182.5K = $1.277M/yr. Savings: $3.285M - $1.277M = $2.008M/yr. Warm-up risk: 3-5min provisioning.
    Add 10 pre-warmed buffer: 60 base H100s. Cost: 60*$2.50*8760 + 90*$2.50*365*2 = $1.314M + $164.25K
    = $1.478M/yr. Savings: $1.807M/yr (55% reduction). GPU util improvement: from 23% (150 GPUs avg) to
    ~45% (60 GPUs).'
  common_mistake: Not accounting for autoscaling warm-up time (H100 instances take 3-5 minutes to provision)
    when calculating the minimum base fleet that prevents SLO violations during ramp-up.
  napkin_math: 'Current: 150 * $2.50 * 8760hr = $3,285,000/yr. Actual compute need: 50 GPU steady * 22hr
    + 150 GPU peak * 2hr = 1100+300 = 1400 GPU-hr/day = 511,000 GPU-hr/yr. At $2.50: $1.277M/yr needed.
    Savings: $2.007M/yr. Autoscaling adds SLO risk: during 3-5min provisioning gap, 50 GPUs handle 150-GPU
    load. SLO: if utilization spikes to 300%: queue depth exceeds SLO. Mitigation: predictive scaling
    (trigger 10min before peak). ROI of predictive scaling implementation: 2 weeks engineering ≈ $15K.
    Payback: 2.7 days of savings.'
