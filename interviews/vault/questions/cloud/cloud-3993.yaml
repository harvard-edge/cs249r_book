title: Evaluate Pipeline Versus Tensor Parallel Fix
scenario: A 24-layer model is split across 8 pipeline stages and suffers 50% bubble
  overhead at small microbatch count. A teammate proposes replacing pipeline parallelism
  with tensor parallelism across 8 GPUs. Activations are 40 MB per layer, tensor all-reduce
  would happen twice per layer over a 50 GB/s interconnect, and the latency budget
  per step is tight. Evaluate the tradeoff.
question: Should you replace an underfilled 8-stage pipeline with tensor parallelism
  over a 50 GB/s interconnect?
details:
  realistic_solution: Not automatically. Pipeline parallelism has a bubble problem,
    but tensor parallelism introduces frequent all-reduces. Two all-reduces per layer
    across 24 layers means 48 synchronization points. For 8 GPUs, a ring all-reduce
    lower bound is about 2(N-1)/N × payload/bandwidth = 1.75 × 40 MB / 50 GB/s = 1.4
    ms per event before latency. First try increasing microbatches or reducing bubbles;
    use tensor parallelism only if communication can be hidden or the model cannot
    fit otherwise.
  common_mistake: Switching parallelism strategies based only on memory fit and ignoring
    communication frequency.
  napkin_math: Per all-reduce lower bound for 8 GPUs = 2(8-1)/8 × 40 MB / 50 GB/s
    = 1.75 × 0.8 ms = 1.4 ms. 48 such events gives 67.2 ms lower-bound communication
    before additional latency and imperfect overlap.
