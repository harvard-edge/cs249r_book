title: The Feature Freshness vs Cost Tradeoff
scenario: 'Your e-commerce recommendation system uses 300 features. The ML team wants all features computed
  in real time for maximum freshness. The infra team pushes back: the streaming infrastructure to compute
  300 features in real time for 50M daily active users would cost $2M/year. Profile the features and propose
  a tiered architecture that captures 90% of the freshness value at 20% of the cost.'
details:
  realistic_solution: 'Tier features by staleness tolerance: **Tier 1 — Static (daily batch, ~$50K/yr):**
    User demographics, account age, device type. ~100 features. Updated nightly. **Tier 2 — Near-real-time
    (hourly micro-batch, ~$150K/yr):** Session-level aggregates, daily spend, category affinities. ~150
    features. Updated every 1-4 hours via Spark micro-batches. **Tier 3 — Real-time (streaming, ~$200K/yr):**
    Cart contents, last-click item, session duration, fraud velocity signals. ~50 features. Updated sub-second
    via Flink. Total: $400K/yr vs $2M/yr (80% savings). The 50 real-time features capture the behavioral
    signals that decay fastest, delivering ~90% of the freshness-sensitive lift.'
  common_mistake: Treating all features as equally time-sensitive. In practice, user demographics change
    monthly, behavioral features change hourly, and contextual features change per-request. Computing
    'user_age_bucket' in real time is pure waste.
  napkin_math: 'Full real-time: 300 features × stream processing = $2M/yr. Tiered: Tier 1 (100 features,
    batch) = $50K. Tier 2 (150 features, micro-batch) = $150K. Tier 3 (50 features, streaming) = $200K.
    Total = $400K = 20% of full-streaming cost. Feature importance analysis shows top-50 time-sensitive
    features contribute 85-90% of model quality improvement from freshness.'
