title: Optimizing Large Language Model Inference on AMD MI300X with Systolic Arrays
scenario: Imagine deploying a large transformer-based LLM (e.g., Llama 3 70B parameters, requiring ~140 GB for FP16 weights) for real-time inference on an accelerator with 192 GB HBM and 1.3 PFLOPS FP16 peak theoretical performance (2.6 PFLOPS with structured sparsity).
question: How would you map a Llama 3 70B FFN matrix multiply onto a systolic array, including dataflow choice, tiling, and structured sparsity?
details:
  realistic_solution: Acknowledge the MI300X's architecture (1,307 TFLOPS FP16 sparse, 192 GB HBM3, 5.3 TB/s), leveraging tiling to keep active data in on-chip caches and registers (if available) and orchestrating data movement to align with the chosen dataflow. For large LLM weights that exceed on-chip memory, a weight-stationary dataflow is often preferred, bringing weights into the systolic array once and reusing them across many activations. Employ a multi-level tiling strategy (e.g., block-wise tiling for HBM3, followed by sub-tiling for on-chip buffers) that minimizes HBM3 access for frequently reused data. For sparsity, implement pruning strategies during model training that introduce structured sparsity patterns compatible with the MI300X's hardware acceleration, ensuring that sparse matrix multiplications achieve closer to the peak sparse TFLOPS.
  common_mistake: |
    **The Pitfall:** Ignoring memory bandwidth constraints and assuming purely compute-bound operations.
    **The Rationale:** Candidates focus heavily on the massive PFLOPS numbers advertised by hardware vendors.
    **The Consequence:** They design dataflows that leave the ALUs starved for data, resulting in highly inefficient memory movement and poor hardware utilization.
  napkin_math: |
    - **Matrix dimensions:** C = A (1 × 4096) × B (4096 × 4096).
    - **FP16 Operations:** 2 × 1 × 4096 × 4096 ≈ 33.5 million operations.
    - **Compute time (dense):** 33.5e6 FLOPs / 1.3e15 FLOPs/s ≈ 25 nanoseconds.
    - **Compute time (sparse):** 33.5e6 FLOPs / 2.6e15 FLOPs/s ≈ 12.5 nanoseconds.
    - **Weight Matrix (B) Size:** 4096 × 4096 × 2 bytes ≈ 33.5 MB.
    - **HBM Fetch time:** 33.5 MB / 5.3 TB/s ≈ **6 microseconds.**
    - **Conclusion:** Memory fetch (6 µs) is orders of magnitude slower than compute (25 ns), proving the operation is deeply memory-bound and necessitates strict weight-stationary tiling.
