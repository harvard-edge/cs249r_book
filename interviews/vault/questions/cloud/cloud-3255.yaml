title: Optimizing Large Language Model Inference on AMD MI300X with Systolic Arrays
scenario: 'Imagine deploying a large transformer-based LLM (e.g., Llama 3 70B parameters,
  requiring ~140 GB for FP16 weights) for real-time inference on an AMD Instinct MI300X
  accelerator. The MI300X boasts 192 GB HBM3 memory and 1.30 PFLOPS FP16 peak theoretical
  performance (2.61 PFLOPS with structured sparsity). Design a strategy to maximize
  throughput and minimize latency for a key matrix multiplication operation within
  the transformer''s feed-forward network. Specifically, describe how you would:

  1. Map this operation onto the MI300X''s systolic array-like architecture, considering
  the trade-offs between weight-stationary and output-stationary dataflows for different
  layer sizes and batch sizes.

  2. Implement tiling strategies to efficiently utilize the 192 GB HBM3 memory and
  5.3 TB/s memory bandwidth, minimizing off-chip data movement.

  3. Discuss how the MI300X''s sparse compute capabilities (2.61 PFLOPS FP16 sparse)
  could be leveraged if the LLM weights exhibit structured sparsity.'
question: How would you map a Llama 3 70B FFN matrix multiply onto MI300X, including
  dataflow choice, tiling, and structured sparsity?
details:
  realistic_solution: Acknowledge the MI300X's architecture (1,307 TFLOPS FP16 sparse,
    192 GB HBM3, 5.3 TB/s), leveraging tiling to keep active data in on-chip caches
    and registers (if available) and orchestrating data movement to align with the
    chosen dataflow. For large LLM weights that exceed on-chip memory, a weight-stationary
    dataflow is often preferred, bringing weights into the systolic array once and
    reusing them across many activations. Employ a multi-level tiling strategy (e.g.,
    block-wise tiling for HBM3, followed by sub-tiling for on-chip buffers) that minimizes
    HBM3 access for frequently reused data. For sparsity, implement pruning strategies
    during model training that introduce structured sparsity patterns compatible with
    the MI300X's hardware acceleration, ensuring that sparse matrix multiplications
    achieve closer to the peak sparse TFLOPS.
  common_mistake: Ignoring memory bandwidth constraints and assuming purely compute-bound
    operations, leading to inefficient data movement and underutilized ALUs. Another
    common mistake is not carefully considering the specific benefits of weight-stationary
    versus output-stationary dataflows for different matrix multiplication dimensions
    or misapplying structured sparsity without ensuring compatibility with hardware
    acceleration.
  napkin_math: Consider a single matrix multiplication $C = A \times B$, where $A$
    is $M \times K$ and $B$ is $K \times N$. For transformer inference, let $M=1$
    (batch size 1), $K=4096$, $N=4096$. The number of FP16 operations is approximately
    $2 \times M \times K \times N = 2 \times 1 \times 4096 \times 4096 \approx 33.5
    \times 10^6$ operations. The theoretical compute time at 1,307 TFLOPS (1.307 PFLOPS)
    is $33.5 \times 10^6 / (1.307 \times 10^{15}) \approx 25$ nanoseconds. However,
    if $B$ (the weight matrix) is $4096 \times 4096$ FP16, it occupies $4096 \times
    4096 \times 2$ bytes $\approx 32$ MB. Fetching this from HBM3 with 5.3 TB/s bandwidth
    would theoretically take $32 \times 10^6 \text{ bytes} / (5.3 \times 10^{12} \text{
    bytes/s}) \approx 6$ microseconds. This simple comparison clearly indicates that
    memory access is a significant bottleneck, orders of magnitude slower than raw
    compute, necessitating effective tiling and dataflow optimization.
