title: NVIDIA H100 Model Deployment Feasibility for Large Language Model
scenario: You are tasked with deploying a large language model (LLM) for real-time inference. The model has 175 billion parameters and uses FP16 quantization. You plan to use NVIDIA H100 GPUs (80 GB HBM3, 3.35 TB/s memory bandwidth).
question: Can a 175B FP16 LLM fit on one H100, what is the memory-bound token latency, and how many H100s are minimally required?
details:
  realistic_solution: Calculate the model's memory footprint (175B params * 2 bytes/param for FP16 = 350 GB). Compare this against the H100's 80 GB HBM3. Determine that multiple H100s are needed (350 GB / 80 GB per card ≈ 4.375, so 5 H100s minimally for parameters only). For latency, estimate the time to load the model (350 GB / 3.35 TB/s ≈ 0.104 seconds per load, which is significant for real-time). Discuss strategies like model parallelism (pipeline/tensor parallelism) and optimized inference frameworks (e.g., DeepSpeed, FasterTransformer) or quantization to INT8/INT4 to reduce memory and improve throughput.
  common_mistake: |
    **The Pitfall:** Underestimating memory needs by ignoring activations and KV cache, and assuming FLOPs dictate latency.
    **The Rationale:** Candidates focus solely on the model's static weight size and peak TFLOPS, ignoring the memory bandwidth wall inherent to autoregressive decoding.
    **The Consequence:** The deployed model either OOMs immediately upon receiving requests or suffers from catastrophic latency that violates real-time SLAs.
  napkin_math: |
    - **Weights Memory:** 175,000,000,000 parameters × 2 bytes/param (FP16) = 350 GB.
    - **Minimum GPUs Required:** 350 GB / 80 GB per H100 = 4.375. Therefore, at least **5 H100 GPUs** are needed just for parameters.
    - **Memory Bandwidth Limit (Single GPU equivalent):** 350 GB / 3.35 TB/s = 350 GB / 3350 GB/s ≈ **0.104 seconds/token** just to stream weights.
