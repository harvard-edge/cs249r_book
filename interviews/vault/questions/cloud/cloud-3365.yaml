title: NVIDIA H100 Model Deployment Feasibility for Large Language Model
scenario: 'You are tasked with deploying a large language model (LLM) for real-time inference. The model has 175 billion parameters and uses FP16 quantization. You plan to use NVIDIA H100 GPUs.'
question: 'Can a 175B FP16 LLM fit on one H100, what is the memory-bound token latency, and how many H100s are minimally required?'
details:
  realistic_solution: 'Calculate the model''s memory footprint (350 GB). Compare against H100 80GB HBM3. Determine 5 H100s are minimally required for parameters. Estimate the model loading time and discuss pipeline/tensor parallelism or quantization to INT8/INT4.'
  common_mistake: |
    **The Pitfall:** Underestimating memory needs by ignoring activations and KV cache, and assuming FLOPs dictate latency.
    **The Rationale:** Candidates focus solely on the model's static weight size and peak TFLOPS, ignoring the memory bandwidth wall inherent to autoregressive decoding.
    **The Consequence:** The deployed model either OOMs immediately upon receiving requests or suffers from catastrophic latency that violates real-time SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 175B params, FP16 (2 bytes/param).
       - Hardware: H100 (80 GB HBM3, 3.35 TB/s bandwidth).
    2. **Calculations:**
       - Weights Memory = 175B * 2 bytes = 350 GB.
       - Min GPUs = 350 GB / 80 GB = 4.375 -> 5 H100 GPUs.
       - Memory Bandwidth Limit (Single GPU equivalent) = 350 GB / 3.35 TB/s = ~0.104 seconds/token.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. At least 5 H100 GPUs are required just for parameters, and autoregressive decoding will hit a hard memory-bandwidth latency wall.**
