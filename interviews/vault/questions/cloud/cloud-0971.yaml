title: Evaluating CPO vs Pluggable Optics for 51.2T Switches
scenario: You are architecting the next-generation network fabric for a 100,000-GPU training cluster.
  Your leaf and spine switches will be based on 51.2 Tbps switch ASICs. The data center facility has a
  strict power limit of 40kW per rack. Evaluate the architectural and facility-level trade-offs between
  using traditional front-panel pluggable transceivers (like 800G OSFP) versus Co-Packaged Optics (CPO)
  to justify your fabric design choice.
question: "Should the 100,000-GPU fabric use 800G pluggables or CPO under the 40kW rack limit, and why?"
details:
  realistic_solution: Justify CPO by analyzing the energy per bit (pJ/bit). Moving the optical engine
    onto the switch package eliminates the need for power-hungry retimers/DSPs and long electrical PCB
    traces, reducing the optical interconnect power budget by up to 70% and freeing up rack power for
    more compute.
  common_mistake: Candidates often focus solely on the bandwidth capabilities or signal integrity, failing
    to recognize that the primary driving force for CPO at 51.2T and beyond is overcoming the extreme
    power density and thermal bottlenecks of electrical traces.
  napkin_math: 'For a 51.2 Tbps switch using pluggables at ~25 pJ/bit: Power = 51.2e12 bps * 25e-12 J/bit
    = 1280W just for optics. With CPO at ~5 pJ/bit: Power = 51.2e12 bps * 5e-12 J/bit = 256W. This saves
    >1kW per switch. In a rack with 8 switches, this frees up 8kW of power, allowing the installation
    of several additional high-end GPUs within the 40kW rack limit.'
