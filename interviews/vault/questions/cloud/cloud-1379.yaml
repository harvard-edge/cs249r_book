title: Evaluating Deadlock Resolution in Fleet Orchestration
scenario: Your team manages a 1,024-GPU cluster. The orchestration team disabled strict gang scheduling, allowing jobs to acquire nodes incrementally. Cluster allocation hits 100%, but active GPU compute drops to 0%. Job A (requires 768 GPUs) holds 512 GPUs, and Job B (requires 768 GPUs) holds 512 GPUs. Both are deadlocked.
question: Should you re-enable strict gang scheduling or use timeout-based preemption to maximize goodput on the 1,024-GPU cluster?
details:
  realistic_solution: |
    Re-enabling strict gang scheduling (all-or-nothing allocation) is the optimal choice for distributed training. While it may leave some GPUs temporarily idle (fragmentation), it mathematically eliminates the hold-and-wait deadlock condition, guaranteeing that allocated resources are actually producing useful compute (goodput).
  common_mistake: |
    **The Pitfall:** Proposing timeout-based preemption to resolve the deadlock.
    **The Rationale:** Preemption is a standard OS-level deadlock resolution technique, seemingly applicable here.
    **The Consequence:** Killing and restarting large-scale distributed training jobs causes severe thrashing, wasting hundreds of expensive GPU-hours during repeated checkpoint loading and initialization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster Size: 1024 GPUs.
       - Jobs: A and B both require 768 GPUs but each hold 512.
    2. **Calculations:**
       - Deadlock Goodput: 1024 held / 0 active = 0% compute efficiency.
       - Gang Scheduled Goodput: Job A gets 768, 256 idle = 75% efficiency.
    3. **Conclusion & Interpretation:**
       - **Result: Orchestration-Bound.** Preemption merely cycles thrashing. Strict all-or-nothing gang scheduling is mathematically required to guarantee 75% goodput over 0%.
