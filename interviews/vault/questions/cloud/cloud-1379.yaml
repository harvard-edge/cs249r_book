title: Evaluating Deadlock Resolution in Fleet Orchestration
scenario: Your team manages a 1,024-GPU (H100) cluster for distributed LLM training. To improve overall
  cluster bin-packing, the orchestration team disabled strict gang scheduling, allowing jobs to acquire
  nodes incrementally as they become available. During a peak submission window, cluster allocation hits
  100%, but active GPU compute drops to 0%. Investigation shows Job A (requires 768 GPUs) currently holds
  512 GPUs, and Job B (requires 768 GPUs) also holds 512 GPUs. Both jobs are indefinitely blocked waiting
  for the remaining resources. Evaluate the trade-offs of resolving this systemic failure by re-enabling
  strict gang scheduling versus implementing a timeout-based preemption model. Justify your architectural
  choice for maximizing goodput in a multi-tenant environment.
question: "Should you re-enable strict gang scheduling or use timeout-based preemption to maximize goodput on the 1,024-GPU cluster?"
details:
  realistic_solution: Re-enabling strict gang scheduling (all-or-nothing allocation) is the optimal choice
    for distributed training. While it may leave some GPUs temporarily idle (fragmentation), it mathematically
    eliminates the hold-and-wait deadlock condition, guaranteeing that allocated resources are actually
    producing useful compute (goodput).
  common_mistake: Candidates often propose timeout-based preemption without recognizing that killing and
    restarting large-scale distributed training jobs causes severe thrashing, wasting hundreds of expensive
    GPU-hours during repeated checkpoint loading and initialization.
  napkin_math: 'Under hold-and-wait deadlock: Job A (512 GPUs) + Job B (512 GPUs) = 1,024 GPUs allocated,
    0 GPUs training = 0% goodput. With Gang Scheduling: Job A gets 768 GPUs, Job B gets 0 (queued). 768
    GPUs training / 1,024 total = 75% goodput. A guaranteed 75% utilization is infinitely better than
    a deadlocked 0%.'
