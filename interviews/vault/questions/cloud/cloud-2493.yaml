title: Cloud-Edge Sensor Fusion Bandwidth Minimization
scenario: A factory floor has 10,000 Cortex-M4 sensors collecting 16kHz audio and 1kHz 3-axis IMU data. The cloud runs a massive transformer for predictive maintenance. Sending raw data takes 38KB/s per sensor. The factory WiFi is capped at 50MB/s total. Raw transmission requires 380MB/s, severely overloading the network.
question: How would you partition predictive-maintenance inference so 10,000 Cortex-M4 sensors stay under the 50MB/s WiFi cap?
details:
  realistic_solution: Deploy a TinyML feature extractor (e.g., MFCC computation + lightweight CNN autoencoder) on the Cortex-M4 to fuse the audio and IMU data into a latent representation. The edge sends small 128-byte embeddings at a low frequency to the cloud.
  common_mistake: |
    **The Pitfall:** Downsampling the audio drastically to save bandwidth.
    **The Rationale:** Engineers prioritize naive data compression instead of utilizing edge intelligence to compress the semantic representation.
    **The Consequence:** Destroying high-frequency acoustic anomalies that are critical for detecting early bearing failures.
  napkin_math: |
    1. **Calculate Raw Bandwidth:** 10,000 × 38KB/s = 380MB/s (Over 50MB/s limit).
    2. **Calculate Edge Embedding Size:** A 128-byte embedding sent at 10Hz = 1.28KB/s per device.
    3. **Calculate Fleet Embedded Bandwidth:** 10,000 × 1.28KB/s = 12.8MB/s.
    **Final Result: Pushing feature extraction to the edge reduces fleet bandwidth to 12.8MB/s, comfortably under the 50MB/s WiFi cap.**
