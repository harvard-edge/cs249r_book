title: The OOM Error
scenario: We are training a 30B parameter model using standard Data Parallelism on 80GB GPUs. The model
  weights are 60GB, but the system OOMs instantly on step 1. Why?
details:
  realistic_solution: You forgot to account for the Optimizer State. An optimizer like Adam requires 8
    bytes per parameter (for the first and second moments) plus 4 bytes for a master FP32 copy of the
    weights. That adds 12 bytes per parameter on top of the FP16 weights. You must use ZeRO (Zero Redundancy
    Optimizer) or FSDP to shard these states across the workers instead of replicating them.
  common_mistake: '"60 GB fits in 80 GB, so it should work. Maybe the batch size is too large." This ignores
    the elephant in the room.'
  napkin_math: '30B params × 2 bytes (FP16 weights) = 60 GB. But Adam needs: 30B × 4 bytes (FP32 master)
    + 30B × 4 bytes (moment 1) + 30B × 4 bytes (moment 2) = 360 GB. Plus 60 GB gradients. Total: **480
    GB per GPU** — 6× what you have.'
