validation_issues:
- The Napkin Math for 'Weighted batching' for H100 and A100 is given as 'H100 step ≈ 600 ms, A100 step
  ≈ 650 ms'. This implies H100 throughput for batch=6 is 6/600ms = 0.01 samples/ms, and A100 throughput
  for batch=4 is 4/650ms = 0.00615 samples/ms. To have them finish at the same time, their throughputs
  must be adjusted such that 'batch_h100/step_h100 = batch_a100/step_a100'. This seems like the example
  numbers (600ms, 650ms) are not perfectly chosen to demonstrate finishing at the exact same time.
