title: The Heterogeneous GPU Training
scenario: Your cloud budget gets you 32 A100 80GB GPUs and 32 H100 80GB GPUs. An engineer proposes combining
  them into a single 64-GPU DDP training job for a 7B model. The H100 does a training step in 400 ms;
  the A100 takes 650 ms. What happens, and how do you actually use both GPU types productively?
question: "What happens, and how do you actually use both GPU types productively?"
details:
  realistic_solution: 'With naive DDP, every step takes 650 ms (the A100 speed). The 32 H100s sit idle
    for 250 ms per step — wasting 38% of your most expensive hardware. Solutions: (1) **Separate jobs**
    — run two independent training jobs, one per GPU type, and merge checkpoints periodically (Local SGD
    style). (2) **Weighted data parallelism** — give H100s larger micro-batches proportional to their
    speed (H100 gets batch=6, A100 gets batch=4), so both finish at the same time. This changes the effective
    learning rate per GPU and requires careful tuning. (3) **Heterogeneous pipeline** — assign more pipeline
    stages to A100s (less compute per stage) and fewer to H100s, balancing stage execution time.'
  common_mistake: '"DDP averages the throughput, so we''ll get something between A100 and H100 speed —
    still faster than A100-only." DDP is synchronous: every GPU must complete its step before AllReduce.
    The entire cluster runs at A100 speed.'
  napkin_math: '**Naive DDP (64 GPUs, all at 650 ms):** throughput = 64 samples / 650 ms = 98.5 samples/s.
    H100 utilization: 400/650 = 61.5%. **Separate jobs:** H100 throughput = 32 / 400 ms = 80 samples/s.
    A100 throughput = 32 / 650 ms = 49.2 samples/s. Combined: **129.2 samples/s** — 31% better than naive
    DDP. **Weighted batching:** H100 batch = 6, A100 batch = 4. H100 step ≈ 600 ms, A100 step ≈ 650 ms.
    Throughput = (32×6 + 32×4) / 650 ms = 320 / 650 ms = **492 samples/s** with batch size 320 — best
    option if convergence holds.'
