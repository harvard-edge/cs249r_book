title: Scaling Foundation Models on Trillions of Tokens
scenario: We are training a massive dense Transformer model (100B+ parameters) on a multimodal dataset of 5 trillion tokens. Training is taking too long on our 10,000 GPU cluster.
question: "How would you architect the distributed training strategy (3D parallelism) and specifically optimize the DDP communication overhead to maximize Model Flops Utilization (MFU)?"
details:
  realistic_solution: Implement aggressive 3D Parallelism. Use Tensor Parallelism (TP) within a single 8-GPU node to maximize the high-bandwidth NVLink and avoid cross-node communication bottlenecks. Use Pipeline Parallelism (PP) with micro-batching (e.g., 1F1B schedule) across nodes within the same rack. Finally, use Fully Sharded Data Parallelism (FSDP / ZeRO-3) across the remaining nodes. To maximize MFU, explicitly overlap computation and communication—such as pre-fetching weights for the forward pass while the previous layer computes, and overlapping the all-reduce communication of gradients with the backward pass. Use selective activation checkpointing to trade minor compute overhead for significant memory savings.
  common_mistake: |
    **The Pitfall:** Relying purely on standard DDP or using naive Pipeline Parallelism.
    **The Rationale:** Candidates often underestimate the massive memory footprint required for optimizer states and gradients, failing to realize it cannot fit on a single GPU. Additionally, they propose naive PP without micro-batching.
    **The Consequence:** Severe Out-of-Memory (OOM) errors during initialization or massive pipeline bubbles that destroy cluster efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 100B parameters.
       - Precision: FP16/BF16 weights (2 bytes), FP32 optimizer (12 bytes).
       - Hardware: 10,000 GPUs, 300 TFLOPS peak, 50% MFU.
       - Workload: 5T tokens.
    2. **Calculations:**
       - Weights (FP16): 100B * 2 bytes = 200 GB.
       - Gradients (FP16): 200 GB.
       - Optimizer (Adam FP32): 100B * 12 bytes = 1.2 TB.
       - Total State: ~1.6 TB per replica.
       - Compute required: 5T tokens * 100B params * 6 FLOPs/token = 3e24 FLOPs.
       - Throughput: 10,000 * 300e12 * 0.50 = 1.5e18 FLOPs/sec.
       - Time: 3e24 / 1.5e18 = 2,000,000 seconds (~23 days).
    3. **Conclusion & Interpretation:**
       - **Result: ~23 Days Compute-Bound globally.** The model state is severely **Memory-Capacity-Bound** per replica, mandating sharding across at least 20 GPUs to avoid OOM.
