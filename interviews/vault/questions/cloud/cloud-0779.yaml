title: Scaling Foundation Models on Trillions of Tokens
scenario: We are training a massive dense Transformer model (100B+ parameters) on a multimodal dataset
  of 5 trillion tokens. Training is taking too long on our 10,000 GPU cluster. How would you architect
  the distributed training strategy (3D parallelism) and specifically optimize the DDP communication overhead
  to maximize Model Flops Utilization (MFU)?
question: "How would you architect the distributed training strategy (3D parallelism) and specifically optimize the DDP communication overhead to maximize Model Flops Utilization (MFU)?"
details:
  realistic_solution: Implement aggressive 3D Parallelism. Use Tensor Parallelism (TP) within a single
    8-GPU node to maximize the high-bandwidth NVLink and avoid cross-node communication bottlenecks. Use
    Pipeline Parallelism (PP) with micro-batching (e.g., 1F1B schedule) across nodes within the same rack.
    Finally, use Fully Sharded Data Parallelism (FSDP / ZeRO-3) across the remaining nodes. To maximize
    MFU, explicitly overlap computation and communication—such as pre-fetching weights for the forward
    pass while the previous layer computes, and overlapping the all-reduce communication of gradients
    with the backward pass. Use selective activation checkpointing to trade minor compute overhead for
    significant memory savings.
  common_mistake: Relying purely on standard DDP, which results in Out-of-Memory (OOM) errors since the
    optimizer states and gradients cannot fit on a single GPU. Alternatively, using naive Pipeline Parallelism
    (PP) which introduces massive pipeline bubbles (idle GPU time) and destroys cluster efficiency.
  napkin_math: '100B params * 2 bytes (FP16/BF16) = 200GB for model weights alone (OOM on an 80GB A100).
    Optimizer states (Adam: 2 variance params * 4 bytes + 2 bytes FP16 = 10 bytes/param = 1TB). Total
    memory needed per replica = 1.2TB. We must shard this across at least 16 GPUs (ZeRO-3/FSDP). 10,000
    GPUs * 300 TFLOPS (BF16 peak) * 50% MFU = 1.5 ExaFLOPS effective. Training compute required: 5T tokens
    * 100B params * 6 FLOPs/token = 3e24 FLOPs total. 3e24 FLOPs / 1.5e18 FLOPs/sec = 2e6 seconds = ~23
    days of continuous training time.'
