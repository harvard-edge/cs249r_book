title: The Cold Start Penalty
scenario: During a blue-green deployment of a new foundational model, a request is routed to a new server instance. The model weights are not yet loaded in the GPU's HBM and must be read from the local NVMe SSD.
question: "Roughly how much slower is this initial read from the SSD compared to a subsequent read from HBM?"
details:
  realistic_solution: An NVMe SSD read takes approximately 100,000 ns, whereas an HBM3 memory access is around 300 ns. This results in a latency difference of about 333x. This 'cold start' penalty is why techniques like pre-warming caches and keeping models resident in memory are critical for low-latency serving systems.
  common_mistake: |
    **The Pitfall:** Underestimating the latency gap between fast storage and high-bandwidth memory.
    **The Rationale:** Engineers know NVMe is "fast" compared to spinning disks, but fail to grasp the physical disparity between on-chip and off-chip access.
    **The Consequence:** System designs fail to adequately prioritize caching and pre-warming, resulting in horrific cold-start penalties for end users.
  napkin_math: |
    - HBM3 Access Latency: ~300 ns.
    - NVMe SSD Read Latency: ~100,000 ns.
    - Latency Ratio: 100,000 ns / 300 ns ≈ 333x.
    - **Result: A cold read from SSD is over 300 times slower than reading from HBM, representing a massive latency cliff.**
  options:
  - ~30x slower
  - ~3x slower
  - ~330x slower
  - ~3,300x slower
  correct_index: 2
