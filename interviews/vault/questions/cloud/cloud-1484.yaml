title: Calculating Maximum Allowable Latency Jitter for RTB
scenario: Your team operates a real-time bidding (RTB) inference service on 16-core AWS c6i.4xlarge instances.
  The base neural network execution takes a highly predictable 12ms. However, monitoring shows a p99 latency
  of 65ms, causing bid timeouts. Tracing reveals that 45ms of this tail latency is pure latency jitter
  caused by OS thread context switching, garbage collection, and NUMA node crossing. If your strict SLA
  is 40ms and standard network overhead is 5ms, calculate the maximum allowable jitter and the required
  reduction in current jitter to meet the 99th percentile SLA.
question: "What is the maximum allowable jitter under the 40ms SLA, and how much must the current 45ms jitter be reduced?"
details:
  realistic_solution: Calculate the strict latency budget available for jitter. Implement core pinning
    (CPU affinity) for the model execution threads and isolate background tasks to eliminate context switching,
    ensuring the jitter stays within the newly calculated budget.
  common_mistake: Candidates often assume the model itself needs mathematical optimization (like quantization
    or pruning) rather than addressing OS-level resource contention, or they miscalculate the budget by
    ignoring network overhead.
  napkin_math: SLA = 40ms. Fixed costs = 12ms (Model execution) + 5ms (Network overhead) = 17ms. Max Allowable
    Jitter = 40ms SLA - 17ms Fixed = 23ms. Current Jitter = 45ms. Required Reduction = 45ms - 23ms = 22ms.
    The team must eliminate at least 22ms of jitter to meet the 40ms SLA.
