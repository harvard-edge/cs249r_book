title: 'Specification: define latency-accuracy SLA for efficient CNN cloud API'
scenario: You are writing the technical specification for a cloud vision API that must serve 50K QPS using
  efficient CNN models on H100 infrastructure. The SLA requires p50 < 10ms, p99 < 50ms, accuracy > 80%
  top-1 on ImageNet. Specify the hardware configuration, model choice, batching strategy, and failure
  mode definitions.
details:
  realistic_solution: 'Hardware: 4× H100 SXM5 nodes (32 GPUs). Model: EfficientNet-B2 (9.1M params, 1.0
    GFLOPs, 80.1% top-1) or MobileNetV3-Large with TRT INT8. Batching: dynamic batching with 5ms window,
    max batch=128. SLA spec: (1) p50 < 10ms = batching_wait(5ms) + inference(3ms) + overhead(2ms); (2)
    p99 < 50ms = max batching_wait(20ms) + inference(3ms) + 2× overhead; (3) accuracy: shadow eval on
    1K held-out images hourly, alert if top-1 < 79%; (4) failure modes: model OOM → fallback to smaller
    model, preprocessing timeout → return error 504.'
  common_mistake: Specifying only average latency targets without defining what constitutes an accuracy
    failure (e.g., model drift, input distribution shift) or specifying hardware without accounting for
    head-of-line blocking at high QPS.
  napkin_math: '50K QPS across 32 H100 GPUs = 1,563 QPS/GPU. Dynamic batching: 5ms window × 1,563 = 7.8
    images/window → batch=8. EfficientNet-B2 at batch=8, TRT FP16: 8 × 1.0G = 8G FLOPs. H100 FP16 at 50%
    util: 494 TFLOPS. Compute: 8G/494T = 0.016ms. Overhead + memory: ~2ms total. Well under 10ms p50.
    At batch=128: 128 × 1.0G = 128 GFLOPs → 0.26ms compute → 2.3ms total. GPU utilization: 1,563 QPS ×
    1.0G FLOPs = 1.563 TFLOPS needed. H100 effective: 494 TFLOPS → 0.3% utilization. Massively over-provisioned;
    reduce to 2 H100 nodes.'
