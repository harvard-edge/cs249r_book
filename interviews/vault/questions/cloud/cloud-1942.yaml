title: Cascading KV Cache OOMs in Stateful LLM Serving
scenario: Your team operates a stateful LLM chat service (using a 13B parameter model) on a cluster of
  16x 8-GPU H100 nodes. To minimize Time To First Token (TTFT) for multi-turn conversations, user sessions
  are pinned to specific nodes to reuse the KV cache in GPU HBM. Average context length is 4K tokens.
  During a single-node hardware failure, the load balancer reroutes the node's 2,000 active sessions to
  surviving nodes. Within seconds, three surviving nodes crash due to Out-Of-Memory (OOM) errors, and
  the P99 TTFT for the entire cluster spikes from 200ms to over 15 seconds. Analyze the root cause of
  these cascading failures and explain why standard stateless failover mechanisms exacerbate the problem.
question: "Why did rerouting 2,000 stateful LLM sessions cause OOMs and 15s P99 TTFT, and how should failover be redesigned?"
details:
  realistic_solution: Implement disaggregated KV caching with asynchronous checkpointing to host CPU RAM
    or NVMe. Coupling this with strict admission control ensures that during failover, the system bounds
    the concurrent prefill rate and gracefully queues or degrades recovered sessions instead of OOMing.
  common_mistake: Candidates often misdiagnose this as a simple CPU/network bottleneck or suggest standard
    stateless retries, failing to recognize the massive memory and prefill compute shock required to simultaneously
    reconstruct 2,000 discarded KV caches on the surviving nodes.
  napkin_math: '**13B model — Llama-2 13B architecture:** 40 layers, 40 KV heads (MHA, not GQA), head_dim=128.


    **Step 1: KV cache per session at 4K tokens.**

    Formula: 2 × layers × kv_heads × head_dim × seq_len × batch × bytes_per_elem.

    = 2 × 40 × 40 × 128 × 4096 × 1 × 2 bytes (FP16)

    = 2 × 40 × 40 × 128 × 4096 × 2 = 3,355,443,200 bytes = **3.125 GB per session** (≈ 3.13 GB).


    (Note: if the model uses GQA with fewer KV heads, e.g., 16 KV heads:

    = 2 × 40 × 16 × 128 × 4096 × 2 = 1,342,177,280 bytes = **1.25 GB per session.**)


    Using MHA (40 KV heads) as standard for 13B:


    **Step 2: Total lost KV state from failed node.**

    2,000 sessions × 3.13 GB = **6.26 TB** of lost KV state.


    **Step 3: Capacity on surviving nodes.**

    15 surviving nodes × 8 H100s × 80 GB = 9,600 GB total HBM.

    Model weights (FP16): 13×10^9 × 2 = 26 GB per node (replicated).

    Existing sessions: assume each node was serving ~125 sessions (2,000/16).

    Existing KV per node: 125 × 3.13 GB = 391 GB.

    Used per node: 26 + 391 = 417 GB. Free per node: 640 − 417 = **223 GB free.**


    **Step 4: Impact of rerouting.**

    Rerouted sessions per node: 2,000 / 15 = 133 sessions.

    KV to rebuild per node: 133 × 3.13 GB = **416 GB** — nearly 2× the 223 GB free HBM.

    This guarantees OOM on nodes that receive above-average load (non-uniform routing).


    **Step 5: Prefill compute for KV reconstruction.**

    Tokens to prefill: 2,000 × 4,096 = 8.19M tokens.

    FLOPs per token (prefill): 2 × 13×10^9 = 26 GFLOPs.

    Total: 8.19M × 26 GFLOPs = 212.9 PFLOPs.

    H100 at 989 TFLOPS × 50% MFU: ~989 TFLOPS per GPU.

    Per node (8 GPUs): 3.96 PFLOPS.

    Time to reconstruct 133 sessions per node: (133 × 4096 × 26 GFLOPs) / 3.96 PFLOPs = **3.58 seconds**
    of pure prefill compute, during which request queues explode and HBM is exhausted.'
