title: Cascading KV Cache OOMs in Stateful LLM Serving
scenario: Your team operates a stateful LLM chat service (using a 13B parameter model) on a cluster of
  16x 8-GPU H100 nodes. To minimize Time To First Token (TTFT) for multi-turn conversations, user sessions
  are pinned to specific nodes to reuse the KV cache in GPU HBM. Average context length is 4K tokens.
  During a single-node hardware failure, the load balancer's naive hash ring (modulo N) rebalances,
  rerouting nearly all of the cluster's 2,000 active sessions to new surviving nodes. Within seconds,
  three surviving nodes crash due to Out-Of-Memory (OOM) errors, and the P99 TTFT for the entire
  cluster spikes from 200ms to over 15 seconds. Analyze the root cause of these cascading failures and
  explain why standard stateless failover mechanisms exacerbate the problem.
question: "Why did reshuffling 2,000 stateful LLM sessions cause OOMs and 15s P99 TTFT, and how should failover be redesigned?"
details:
  realistic_solution: Implement consistent hashing in the load balancer to prevent massive reshuffling during a node failure, and use disaggregated KV caching with asynchronous checkpointing. Coupling this with strict admission control ensures that during failover, the system bounds the concurrent prefill rate and gracefully queues recovered sessions instead of OOMing.
  common_mistake: Candidates often misdiagnose this as a simple CPU/network bottleneck or suggest standard stateless retries, failing to recognize the massive memory and prefill compute shock required to simultaneously reconstruct thousands of discarded KV caches on the surviving nodes due to the lack of consistent hashing.
  napkin_math: |
    **13B model (MHA, 40 KV heads, head_dim=128):**
    **Step 1: KV cache per session at 4K tokens.**
    2 * 40 layers * 40 heads * 128 dim * 4096 seq * 2 bytes = 3,355,443,200 bytes = **3.13 GB per session**.

    **Step 2: Total KV state.**
    Cluster has 2,000 sessions total. 2,000 * 3.13 GB = **6.26 TB** of KV state.

    **Step 3: Capacity on surviving nodes.**
    15 surviving nodes * 8 H100s * 80 GB = 9,600 GB total HBM (640 GB per node).
    Model weights (FP16): 13*10^9 * 2 = 26 GB per node.
    Prior to failure, a node served ~125 sessions. 125 * 3.13 GB = 391 GB.
    Free per node: 640 - 26 - 391 = **223 GB free.**

    **Step 4: Impact of naive rerouting.**
    Without consistent hashing, N=16 to N=15 remapping moves 15/16th of sessions.
    Almost all 2,000 sessions must be rebuilt. Rerouted sessions to rebuild per node: ~125.
    KV to rebuild per node: 125 * 3.13 GB = **391 GB** — far exceeding the 223 GB free HBM (since old sessions haven't all disconnected yet), guaranteeing OOM.

    **Step 5: Prefill compute for KV reconstruction.**
    Tokens to prefill per node: 125 * 4,096 = 512,000 tokens.
    FLOPs per token (prefill): 2 * 13*10^9 = 26 GFLOPs.
    Total per node: 512K * 26 GFLOPs = 13.3 PFLOPs.
    H100 node at 50% MFU: ~3.96 PFLOPS.
    Time to reconstruct 125 sessions per node: 13.3 / 3.96 = **3.36 seconds** of pure compute, driving queue latencies to 15s+.
