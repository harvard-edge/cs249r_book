validation_status_pro: ERROR
validation_issues_pro:
- The napkin math for KV cache size (1MB per 1K tokens) is incorrect by over 100x for any modern LLM,
  making the scenario physically impossible.
- A single 8K-context session on a 70B model requires ~2.7GB of VRAM, so 2,000 sessions would need 5.4TB,
  far exceeding the node's 640GB.
