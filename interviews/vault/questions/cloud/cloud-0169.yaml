title: The Throughput-Optimized Cascade Failure
scenario: 'You are tasked with optimizing a Llama-70B serving cluster for maximum cost-efficiency. You
  profile the system and find that a large static batch size of 64 maximizes throughput (TPOT) and achieves
  95% GPU utilization. You deploy this configuration. The system runs smoothly during low-traffic periods.
  However, during the daily traffic peak, the entire service collapses: request queues grow infinitely,
  all requests time out, and the system requires a full restart. Your VP wants a post-mortem. Evaluate
  the design decision. Why did optimizing for a peak hardware metric (TPOT) lead to a catastrophic system-level
  failure?'
details:
  realistic_solution: 'The team optimized for the wrong metric. While high TPOT and GPU utilization are
    good for offline batch processing, they are often toxic for an online, interactive service. A large
    static batch size fundamentally imposes a high Time-To-First-Token (TTFT) because every request must
    wait for the batch to fill. This initial wait time is the ''W'' in Little''s Law ($L = \lambda W$).
    By fixing the batch size at 64, you guaranteed a multi-second wait time (`W = 64 / \lambda`) even
    before the request hits the GPU. When real users experience high TTFT, they often retry or abandon
    the session, which ironically increases the arrival rate ($\lambda$). This creates a vicious cycle:
    higher arrival rate -> longer time to fill the *next* batch (if the server is saturated) -> even higher
    TTFT -> more retries -> runaway queue length (L). The system didn''t just get slow; it entered a positive
    feedback loop and became unstable. The correct approach is to prioritize P99 TTFT as the primary SLO
    and use a dynamic or continuous batching strategy that minimizes wait time, even at the cost of slightly
    lower peak GPU utilization.'
  common_mistake: Claiming the GPUs are underpowered or that there was a bug in the code. This was not
    a hardware capacity or a logic error; it was a fundamental queuing theory failure. Suggesting a smaller
    static batch size is a partial fix, but doesn't address the core issue with the static batching paradigm
    itself under fluctuating load.
  napkin_math: Let's apply Little's Law ($L = \lambda W$).
