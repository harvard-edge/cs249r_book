title: Workload Consolidation to Improve GPU Utilization and Power Efficiency
scenario: 'A cloud ML platform has 1,000 H100 GPUs allocated to batch inference jobs that average 35%
  GPU utilization. Power metering shows each GPU drawing 280W (idle + partial load). The platform team
  proposes consolidating workloads to run 350 GPUs at 100% utilization and powering off the remaining
  650 GPUs. Evaluate this proposal: calculate the power savings, identify the risks of this strategy,
  and propose a hybrid approach using MIG (Multi-Instance GPU) or time-slicing.'
question: "How much power would consolidating 1,000 underutilized H100s save, what risks does it create, and how would MIG or time-slicing improve it?"
details:
  realistic_solution: 'Current: 1,000 GPUs × 280W = 280 kW. Consolidation: 350 GPUs × 700W = 245 kW active
    + 650 × 45W idle = 29.25 kW. Total = 274.25 kW (2.4% savings—poor). Better approach: power off 650
    GPUs completely (5W standby on managed BMCs): 350 × 700W + 650 × 5W = 245 + 3.25 = 248.25 kW (11.3%
    savings). Risk: demand spikes require 30-60 second GPU boot time. Hybrid with MIG: 7 MIG instances
    per H100 (3g.40gb), run 5 at 35% utilization = same throughput with 71% fewer GPUs active. Power:
    141 GPUs × 700W + 859 × 5W = 98.7 + 4.3 = 103 kW (63% savings).'
  common_mistake: Assuming that powering off GPUs saves 100% of their power. GPUs in deep sleep or powered
    off still draw ~30-50W for keep-alive, NVLink heartbeat, and PCIe power. Also, candidates ignore the
    wake latency cost when demand spikes.
  napkin_math: 'Baseline: 1000 × 280W = 280 kW. Full consolidation (650 powered off at 5W): 350 × 700W
    + 650 × 5W = 245,000 + 3,250 = 248,250W = 248 kW. Savings: 32 kW (11.4%). MIG 7-way: 350 active tasks
    / 5 MIG per GPU = 70 physical GPUs needed (round up to 141 for load headroom). 141 × 700W = 98.7 kW
    active. 859 × 5W = 4.3 kW standby. Total: 103 kW. Savings vs baseline: 177 kW (63.2%). Annual: 177
    kW × 8,760h × $0.10 = $155,052/year. MIG management overhead: ~5% engineering cost.'
