title: The Fairness-Accuracy Pareto Frontier
scenario: 'Your hiring recommendation model has 85% accuracy with no fairness constraints. When you add a demographic parity constraint, accuracy drops to 78%. The VP of Engineering says a 7-point accuracy drop is unacceptable and asks you to "find a better algorithm that doesn''t have this tradeoff".'
question: 'Why is the VP''s request misguided, and how would you navigate the fairness-accuracy Pareto frontier at the systems level?'
details:
  realistic_solution: 'The fairness-accuracy tradeoff is a Pareto frontier, not an algorithm bug. When base rates differ, mathematical impossibility theorems force a tradeoff. The systems approach is to map the full Pareto frontier by sweeping constraint values, and implement post-processing (e.g., threshold adjustment) which often recovers 2-3pp of accuracy.'
  common_mistake: |
    **The Pitfall:** Treating the fairness-accuracy tradeoff as a software bug that can be fixed with a "better algorithm".
    **The Rationale:** Engineers are trained to optimize single metrics, forgetting that when base rates differ across groups, mathematical impossibility theorems force a tradeoff.
    **The Consequence:** Wasting months searching for a magical algorithm that defies math, instead of systematically mapping the Pareto frontier for stakeholders to make informed decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base model accuracy: 85%.
       - Strict parity accuracy: 78%.
       - Post-processing recovery: 2.5pp.
    2. **Calculations:**
       - Pareto Sweep: Training ~20 constraint values maps the full accuracy decay curve.
       - Post-Processing: 78% + 2.5pp = 80.5% accuracy at full parity.
    3. **Conclusion & Interpretation:**
       - **Result: Algorithm-Bound. You cannot defy base-rate math; you must empirically sweep the frontier to find the optimal business tradeoff.**
