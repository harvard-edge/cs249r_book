title: The RAG Latency Composition
scenario: A RAG pipeline has three serial stages: embedding the query (15ms), vector search (8ms), and LLM generation with retrieved context (TTFT 180ms, TPOT 25ms for 150 tokens).
question: What is the total end-to-end time to first token, and what is the total request time?
details:
  realistic_solution: User-perceived TTFT = embedding (15ms) + vector search (8ms) + LLM TTFT (180ms) = 203ms. Total request time = 203ms + decode (150 × 25ms) = 203ms + 3,750ms = 3,953ms ≈ 4 seconds. The retrieval overhead adds only 23ms to TTFT (~13% increase), but the critical insight is that these stages are serial — you cannot start LLM prefill until retrieval completes.
  common_mistake: |
    **The Pitfall:** Reporting only the LLM generation time and ignoring retrieval overhead.
    **The Rationale:** Candidates forget that TTFT is a user-perceived metric that includes all upstream serial pipeline stages before generation begins.
    **The Consequence:** Giving inaccurate latency estimates that fail to capture the true user experience of a compound AI system.
  napkin_math: |
    - Pipeline TTFT: Embedding (15ms) + Vector Search (8ms) + LLM TTFT (180ms) = 203ms.
    - Decode Time: 150 tokens * 25ms/token = 3,750ms.
    - Total E2E Request Time: 203ms + 3,750ms = 3,953ms.
    - **Conclusion: The user experiences a TTFT of 203ms and a total request latency of roughly 4 seconds.**
