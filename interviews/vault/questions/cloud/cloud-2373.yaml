title: Scale-Up vs Scale-Out for 256 GPUs
scenario: 'You are building a 256-GPU pod for training large models. Option A: 32 standard nodes (8 GPUs each, connected via intra-node NVLink), networked together via 400 Gbps InfiniBand (Scale-Out). Option B: A massive single-chassis scale-up architecture where all 256 GPUs are connected via a 2-tier NVSwitch fabric (Scale-Up).'
question: Which 256-GPU architecture should you choose for 8-way TP and 32-way PP, and why?
details:
  realistic_solution: |
    Option A (Scale-Out) provides an intra-node NVLink domain of 8 GPUs with ~900 GB/s bandwidth, and an inter-node InfiniBand domain with 50 GB/s (400 Gbps) per GPU. Option B (Scale-Up) provides a flat, fully non-blocking NVLink domain of 256 GPUs, all communicating at ~900 GB/s.

    For a workload using 8-way TP and 32-way PP: Tensor Parallelism requires massive bandwidth and low latency for continuous All-Reduce operations. Since TP=8, the entire TP group fits perfectly inside a single 8-GPU node in Option A, utilizing the 900 GB/s NVLink. Pipeline Parallelism (PP=32) involves passing relatively small microbatch activations between TP groups. PP is highly bandwidth-insensitive. Thus, the 50 GB/s InfiniBand inter-node links in Option A are more than sufficient to handle the PP traffic without bottlenecking.

    The Tradeoff: Option B (256-GPU NVSwitch) costs significantly more, requires exotic cooling and massive custom chassis, and introduces a single massive failure domain. For a workload where TP <= 8, Option A provides identical performance because the network bounds match the parallelism requirements perfectly. Option B only becomes necessary if the model architecture forces TP > 8 (e.g., massive single-layer MoE or highly un-sharded attention mechanisms) that cannot tolerate crossing the 50 GB/s IB boundary.
  common_mistake: |
    **The Pitfall:** Assuming massive Scale-Up NVSwitch is strictly necessary for all large models.
    **The Rationale:** Engineers assume more bandwidth is universally better across the entire cluster.
    **The Consequence:** They recommend an architecture that costs significantly more, requires exotic cooling, and introduces a single massive failure domain without providing any practical speedup for the specific parallelism strategy.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-way Tensor Parallelism (TP=8), 32-way Pipeline Parallelism (PP=32).
    - Option A: Intra-node NVLink (900 GB/s), Inter-node IB (50 GB/s).

    **Calculations:**
    - TP=8 fits completely within a single node's NVLink domain (900 GB/s).
    - PP=32 requires sending small microbatch activations across nodes.
    - Activation Size = [4, 4096, 8192] * 2 bytes = ~268 MB.
    - Inter-node Transfer Time = 268 MB / 50 GB/s = ~5.3 ms (easily overlapped).

    **Conclusion & Interpretation:**
    - **Result: Option A (Architecture-Topology-Bound)**. Option A (Scale-Out) is the correct choice, matching bandwidth requirements at a lower cost.
