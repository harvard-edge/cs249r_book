title: Incremental Allocation Deadlock Math
scenario: A fleet orchestration system manages a shared cluster of 128 GPUs. Four distributed PyTorch training jobs are submitted simultaneously, each requiring exactly 40 GPUs. The cluster provisions GPUs incrementally using a round-robin strategy (1 GPU per pending job per cycle).
question: How many GPUs does each of the four jobs hold at deadlock, and how many GPUs must be preempted to break it?
details:
  realistic_solution: The system deadlocks when all 128 GPUs are allocated evenly across the 4 jobs, leaving each with 32 GPUs. Preempting 8 GPUs from one job resolves the deadlock and allows another job to fulfill its 40-GPU requirement.
  common_mistake: |
    **The Pitfall:** Assuming an entire job must be preempted to resolve the deadlock.
    **The Rationale:** Engineers often default to job-level kill commands rather than calculating the exact resource deficit needed to unblock a waiting task.
    **The Consequence:** 32 GPUs of compute progress are needlessly destroyed when only a fraction of that was required to break the stalemate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total GPUs: 128. Demand: 4 jobs * 40 GPUs.
       - Strategy: Round-robin.
    2. **Calculations:**
       - Round-robin allocation: 128 / 4 = 32 GPUs per job.
       - Deadlock state: [32, 32, 32, 32].
       - Deficit to hit 40 GPUs: 40 - 32 = 8 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Each holds 32 GPUs; preempt 8 GPUs to break deadlock.** (Resource-Bound)
