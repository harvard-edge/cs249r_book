title: Incremental Allocation Deadlock Math
scenario: A fleet orchestration system manages a shared cluster of 128 A100 GPUs. Four distributed PyTorch training jobs are submitted simultaneously, each requiring exactly 40 GPUs. The cluster provisions GPUs incrementally using a round-robin strategy (1 GPU per pending job per cycle).
question: How many GPUs does each of the four jobs hold at deadlock, and how many GPUs must be preempted to break it?
details:
  realistic_solution: The system deadlocks when all 128 GPUs are allocated evenly across the 4 jobs, leaving each job with 32 GPUs. To break the deadlock, you only need to preempt 8 GPUs from one of the jobs to fulfill another job's requirement.
  common_mistake: |
    **The Pitfall:** Assuming an entire job must be preempted to resolve the deadlock.
    **The Rationale:** Engineers often default to job-level kill commands rather than calculating the exact resource deficit needed to unblock a waiting task.
    **The Consequence:** 32 GPUs of compute progress are needlessly destroyed when only a fraction of that was required to break the stalemate.
  napkin_math: |
    - **Total GPUs:** 128.
    - **Round-Robin Allocation:** $128 / 4\text{ jobs} = 32\text{ GPUs}$ per job.
    - **Deadlock State:** `[32, 32, 32, 32]` (Each job is holding 32, waiting for 8 more to reach 40).
    - **Deficit:** $40 - 32 = 8\text{ GPUs}$.
    - **Resolution:** Preempting 8 GPUs from Job 4 yields `[40, 32, 32, 24]`. Job 1 can now finish.
    - **Conclusion:** **Each holds 32 GPUs; only 8 GPUs must be preempted to break the deadlock.**
