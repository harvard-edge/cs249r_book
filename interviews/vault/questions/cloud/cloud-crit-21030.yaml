title: KV-Cache Size Calculation for GQA Models
scenario: Llama 3 70B uses grouped-query attention with 64 attention heads and 8 KV heads, head dimension
  128, across 80 layers. Calculate the KV-cache size per token and for a batch of 32 requests at 4096
  context length in BF16.
question: "What is the BF16 KV-cache size per token and for batch 32 at 4096 context for Llama 3 70B with 8 KV heads?"
details:
  realistic_solution: 'KV-cache per token per layer: 2 (K+V) × 8 (KV heads) × 128 (head dim) × 2B (BF16)
    = 4,096 bytes = 4 KB. Per token across all 80 layers: 4 KB × 80 = 320 KB. For comparison, with full
    MHA (64 KV heads): 2 × 64 × 128 × 2B × 80 = 2.56 MB per token — GQA provides 8× reduction. For batch
    of 32 at 4096 context: 32 × 4096 × 320 KB = 40 GB. This is significant — on a single H100 (80 GB),
    with ~140 GB weights (2 GPUs), the KV-cache of 40 GB limits batch size. Without GQA: 32 × 4096 × 2.56
    MB = 320 GB — would require 4× more GPUs just for KV-cache. GQA is essential for making large model
    serving economically viable.'
  common_mistake: Using the full 64 attention heads to compute KV-cache size. GQA reduces KV heads — only
    8 KV heads need caching, not 64. This is the entire point of GQA.
  napkin_math: 'KV per token per layer: 2 × 8 × 128 × 2B = 4 KB. Per token (80 layers): 320 KB. Batch
    32 × 4K context: 32 × 4096 × 320 KB = 40 GB. MHA equivalent: 8× larger = 320 GB.'
