title: High-Throughput Speculative Decoding on AMD MI300X for Low-Latency LLM Inference
scenario: 'You are designing a high-performance speculative decoding system on an accelerator focusing on low-latency text generation utilizing draft and verify models.'
question: How would you architect speculative decoding on MI300X to co-locate draft and verify models, select drafts dynamically, and maximize acceptance?
details:
  realistic_solution: Leverage the HBM3 capacity to co-locate the large verify model and specialized smaller draft models. The bandwidth enables extremely fast loading/unloading of draft models. Implement a contextual draft model selection mechanism to maximize acceptance rates. Optimize both draft and verify models to exploit sparse FP16 TFLOPS.
  common_mistake: |
    **The Pitfall:** Failing to account for the interplay between memory bandwidth, HBM capacity, and sparse compute capabilities.
    **The Rationale:** Candidates often treat draft model selection independently of hardware constraints, leading to suboptimal data movement.
    **The Consequence:** The overhead of speculative decoding negates its benefits, worsening overall generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base verify generation: 5ms/token.
    - Draft proposes 4 tokens, 80% acceptance rate.
    - Verification step: 1ms.

    **Calculations:**
    - Regeneration need: 20% of tokens need 5ms full generation.
    - Time to yield 4 tokens ≈ 1ms (verify) + 0.2 * 5ms (regen) = 2ms.
    - Average time per token = 2ms / 4 = 0.5ms.

    **Conclusion & Interpretation:**
    - **Result: 0.5ms per token yields a 10x speedup (Compute-Bound).**
