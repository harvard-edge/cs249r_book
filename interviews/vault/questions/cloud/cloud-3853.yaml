title: Architecting an Online Distillation Pipeline for a 70B Model
scenario: "You must design a knowledge distillation pipeline to compress a 70B parameter teacher model into a 7B parameter student model (both FP16). You have a cloud cluster of 8-GPU A100 (80GB) nodes connected via InfiniBand NDR (400 Gb/s) and intra-node NVLink 4.0 (900 GB/s). The vocabulary size is 128,000."
question: How would you architect the 70B-to-7B distillation pipeline to avoid logit I/O bottlenecks and keep student training busy?
details:
  realistic_solution: Design an online distillation system with dedicated 'Teacher Nodes' and 'Student Nodes'. The 70B teacher requires 140GB just for weights (FP16) and can be sharded across 2-4 GPUs using Tensor Parallelism for fast forward passes. The student runs Data Parallelism across separate nodes. Teacher nodes stream logits to student nodes asynchronously over InfiniBand. To reduce network bandwidth, send only the top-K logits or apply temperature scaling and FP8 quantization before transmission.
  common_mistake: |
    **The Pitfall:** Proposing offline distillation or co-locating the teacher and student on the same GPUs.
    **The Rationale:** Candidates either fail to calculate the massive storage requirements for full vocabulary logits or severely underestimate the memory constraints of running both models simultaneously.
    **The Consequence:** The architecture is fundamentally infeasible, either running out of petabyte-scale storage or crashing with Out-Of-Memory errors.
  napkin_math: |
    - **Calculate micro-batch size:** 2,048 tokens with a 128,000 vocab = 2,048 * 128,000 * 2 bytes (FP16) = 524 MB of logits.
    - **Calculate transfer time:** InfiniBand NDR provides 50 GB/s per port. Transferring 524 MB takes 524 MB / 50 GB/s ≈ 10.5 ms (easily hidden behind backward pass).
    - **Calculate offline storage requirement:** Offline storage for a 300B token dataset would require 300e9 * 128,000 * 2 bytes ≈ **76.8 Petabytes**, making offline caching architecturally impossible.
