title: Multi-Tier LLM Fallback and Load Shedding
scenario: 'A primary service uses a 175B parameter model hosted on 10 nodes, while a fixed secondary pool hosts a 7B parameter fallback model. Your real-time API serves both premium and free-tier users. During a breaking news event, traffic spikes from a nominal 1,000 QPS to 10,000 QPS.'
question: 'How would you design request routing, degradation, and load shedding to survive a 10,000 QPS spike while prioritizing premium users?'
details:
  realistic_solution: 'Implement dynamic, queue-depth-based circuit breakers at the API gateway. Premium traffic is strictly pinned to the primary cluster. As primary queues saturate, free-tier traffic is aggressively shifted to the fallback pool. Crucially, deploy a token-bucket rate limiter to explicitly load-shed (HTTP 429) excess free-tier requests once the fallback pool reaches its absolute capacity, preventing cascading failures across the entire architecture.'
  common_mistake: |
    **The Pitfall:** Suggesting static thresholds for fallback or forgetting to load shed the fallback cluster entirely.
    **The Rationale:** Candidates incorrectly assume smaller models can implicitly absorb arbitrary overflow without dedicated rate limiting.
    **The Consequence:** Static thresholds fail to react, the fallback cluster is immediately overwhelmed, and cascading timeouts take down both tiers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary capacity: 1,000 QPS. Fallback capacity: 5,000 QPS.
    - Spike load: 10,000 QPS (1,000 premium, 9,000 free).

    **Calculations:**
    - Gateway routes 1,000 premium to Primary.
    - Overflow routes 9,000 free to Fallback. Fallback absorbs 5,000.
    - Remaining: 9,000 - 5,000 = 4,000 QPS.

    **Conclusion & Interpretation:**
    - **Result: The system must explicitly load shed 4,000 QPS via HTTP 429s to maintain fail-operational status (Capacity-Bound).**
