title: Multi-Tier LLM Fallback and Load Shedding
scenario: 'A primary service uses a 175B parameter model hosted on 10x H100 (80GB) nodes, while a fixed secondary pool of single A100 (80GB) instances hosts a 7B parameter fallback model. Your real-time text summarization API serves both premium and free-tier users. During a breaking news event, traffic spikes from a nominal 1,000 QPS to 10,000 QPS.'
question: 'How would you design request routing, degradation, and load shedding to survive a 10,000 QPS spike while prioritizing premium users?'
details:
  realistic_solution: 'Implement a dynamic, queue-depth or latency-based circuit breaker at the API gateway or load balancer. Premium traffic is prioritized and pinned to the H100 cluster. Free-tier traffic is aggressively rerouted to the A100 fallback cluster the moment H100 request queues start building. To protect the A100 cluster from being overwhelmed by the massive 10x spike, implement a token-bucket rate limiter that explicitly sheds (returns HTTP 429) the lowest-priority free-tier requests once the A100 queue capacity is saturated.'
  common_mistake: |
    **The Pitfall:** Suggesting static thresholds for fallback (e.g., CPU utilization) or forgetting to load shed the fallback cluster entirely.
    **The Rationale:** Candidates assume smaller models can implicitly handle arbitrary overflow without dedicated rate limiting.
    **The Consequence:** Static thresholds lag behind rapidly arriving traffic spikes, and the fallback cluster becomes overwhelmed, leading to cascading failures across both tiers.
  napkin_math: |
    1. Primary capacity: 10 H100 nodes * 100 QPS = **1,000 QPS**.
    2. Spike load: **10,000 QPS** (assume 1,000 premium, 9,000 free).
    3. Fallback capacity: Assume 10 A100 nodes * 500 QPS = **5,000 QPS**.
    4. The gateway routes 1,000 premium QPS to the H100 cluster and overflows 9,000 free QPS.
    5. The A100 cluster absorbs 5,000 free QPS.
    6. **Result:** The system must explicitly load shed the remaining **4,000 QPS** (10,000 - 1,000 - 5,000) via HTTP 429s to maintain fail-operational status.
