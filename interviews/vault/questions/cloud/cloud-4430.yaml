title: 'LoRA Target Module Selection: Q/K/V/O vs All Linear Layers'
scenario: A team fine-tuning Mistral 7B for classification debates whether to apply LoRA to only Q and V projections (standard practice) versus all linear layers including MLP. Calculate the parameter count difference and performance implications.
question: For Mistral 7B classification, how many LoRA parameters do Q+V-only versus all-linear targeting add, and what are the performance implications?
details:
  realistic_solution: 'LoRA module selection for Mistral 7B: standard (Q+V only): W_q and W_v matrices \times 32 layers. All-linear (Q,K,V,O,gate,up,down): 7 matrices \times 32 layers. Memory scaling: ~6\times more params for all-linear. For classification tasks, the final MLP layers are most task-critical, so adding LoRA to MLP is more valuable than for generation tasks. Research finding: for classification and extraction tasks, Q+V+down_proj covers 90%+ of performance of all-linear at ~50% the parameter count. For generation/instruction-following: Q+V+up_proj captures attention-MLP interaction. Ablation test: start with Q+V, measure validation performance, add MLP matrices, check if improvement exceeds 0.5% practical significance threshold.'
  common_mistake: Assuming applying LoRA to all layers always improves performance. The common misunderstanding is that more trainable parameters always help. For many tasks, attention mechanisms capture task-relevant transformations, and adding LoRA to MLP layers adds capacity without proportional improvement.
  napkin_math: 'Mistral 7B (GQA), r=8: Q+V only: 32 \times (8 \times (4096+4096) + 8 \times (4096+1024)) = 32 \times (65,536 + 40,960) = 3.41M params. All-linear — correct LoRA params per layer = r*(d_in + d_out). Attn: W_q, W_o [4096,4096] \rightarrow 65,536 each; W_k, W_v [4096,1024] \rightarrow 40,960 each. Attn total = 212,992/layer \times 32 = 6.82M. MLP [4096,14336]: r*(4096+14336)=147,456 per matrix \times 3 matrices \times 32 layers = 14.15M. Total all-linear \approx 6.82M + 14.15M = 20.97M params. ~6.1\times more than Q+V. GPU memory delta: 20.97M * 2B (BF16) = 42MB — still small. Training time delta: 6.1\times more gradient computation.'
