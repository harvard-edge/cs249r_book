title: Tail Latency Budgeting Across Microservices
scenario: 'You are designing an ML serving architecture with 3 microservices in series: tokenizer (CPU),
  model inference (H100), and post-processing (CPU). End-to-end P99 target is 100ms. Each service has
  different tail characteristics. Specify the per-service latency budgets and the monitoring thresholds
  that trigger alerts.'
details:
  realistic_solution: 'Analyze empirical tail distributions: tokenizer P50=2ms, P99=8ms (tight); inference
    P50=40ms, P99=85ms (heavy tail); post-processing P50=3ms, P99=10ms (tight). Budget allocation weighted
    by tail heaviness: tokenizer=8ms, inference=80ms, post-processing=12ms, total=100ms. But tail amplification
    across 3 stages means we need ~15% headroom: set budgets to tokenizer=7ms, inference=75ms, post-processing=10ms
    = 92ms, leaving 8ms buffer. Alert thresholds: set at 80% of budget — tokenizer P99 > 5.6ms, inference
    P99 > 60ms, post-processing P99 > 8ms. Monitor P99.9 independently to catch emerging tail issues before
    they breach P99.'
  common_mistake: Dividing the budget equally (33ms each). Service tail distributions differ wildly —
    CPU services have tighter distributions, GPU inference has heavier tails. Equal allocation wastes
    budget on services that don't need it.
  napkin_math: 'Equal split: 33ms each. Tokenizer only needs 8ms → 25ms wasted. Inference needs 85ms →
    52ms over budget. Proportional: tokenizer 8%, inference 82%, post-proc 10%. Budgets: 8ms + 82ms +
    10ms = 100ms. With 3-stage amplification factor ~1.08: need 92ms allocated, 8ms buffer. Alert at 80%:
    [5.6ms, 60ms, 8ms].'
