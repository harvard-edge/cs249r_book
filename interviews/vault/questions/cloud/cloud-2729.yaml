title: Five Levels of ML Networking
scenario: A colleague asks why understanding network topology alone is insufficient for designing ML cluster
  networks. Explain the five-level networking model and why each level matters for ML workloads.
details:
  realistic_solution: 'The five levels form a complete stack: (1) Wire/Link: physical medium (copper,
    optical), signaling (NRZ, PAM4), and link speed. Determines raw bit rate and reach. (2) Transport:
    protocol and flow control (TCP, RDMA, RoCE). Determines latency and how efficiently the wire is used.
    (3) Switch Topology: how switches are interconnected (fat-tree, Clos, dragonfly). Determines bisection
    bandwidth and path diversity. (4) Fabric Behavior: how the topology handles real traffic patterns
    (congestion, adaptive routing, load balancing). ML collectives create unique traffic patterns that
    stress fabrics differently than web traffic. (5) Cluster Design: how compute is placed within the
    topology, job scheduling, and failure domain mapping. Each level constrains the ones above — a perfect
    topology cannot overcome a bad transport protocol, and neither can overcome insufficient link bandwidth.'
  common_mistake: Focusing only on the topology level (e.g., fat-tree vs dragonfly) and ignoring the lower
    levels (wire/link, transport) and higher levels (fabric behavior, cluster design) that determine actual
    performance.
  napkin_math: 'Wire: Gbps. Transport: latency μs. Topology: bisection BW. Fabric: congestion handling.
    Cluster: job-to-topology mapping. All five must be co-designed.'
