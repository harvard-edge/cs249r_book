title: Calculating MFU for LLM Training
scenario: You are training a 20-billion parameter dense Transformer LLM on a cluster of 256 GPUs. Your global batch size is 4 million tokens, and the training loop reports an average step time of 12.0 seconds.
question: "What is the Model FLOPS Utilization for this 20B LLM training run on 256 GPUs with a 12.0-second step time?"
details:
  realistic_solution: 'Calculate the theoretical model FLOPs per step using the 6*P*D approximation, calculate the peak hardware FLOPs over the step time, and find the ratio.'
  common_mistake: |
    **The Pitfall:** Using 2*P (inference FLOPs) instead of 6*P (training FLOPs) per token.
    **The Rationale:** Candidates conflate the forward-pass only FLOP calculation with the full training cycle.
    **The Consequence:** Underestimating the required FLOPs by 3x, leading to an artificially low MFU.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20B parameters, 4M tokens/batch, 12.0s step time.
    - 256 GPUs with 312 TFLOPS peak BF16 each.

    **Calculations:**
    - Theoretical FLOPs/step = 6 * 20e9 * 4e6 = 480 PFLOPs.
    - Hardware Peak FLOPs/sec = 256 * 312e12 = 79.87 PFLOPs/sec.
    - Observed Throughput = 480 PFLOPs / 12 seconds = 40 PFLOPs/sec.
    - MFU = 40 / 79.87 = ~50%.

    **Conclusion & Interpretation:**
    - **Result: 50% MFU (Compute Utilization)**. The system is achieving solid utilization for a large-scale training run.
