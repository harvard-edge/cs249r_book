title: Designing Around Non-Differentiable Operations
scenario: You are building an ML system that must include discrete decision steps
  (e.g., hard token selection in a mixture-of-experts router, or discrete action selection
  in a reinforcement learning policy). These operations have zero gradients almost
  everywhere, breaking standard backpropagation.
question: How would you train through discrete decisions like hard MoE routing end-to-end,
  and what systems cost does your approach add?
details:
  realistic_solution: 'Three approaches with increasing systems complexity: (1) Straight-Through
    Estimator (STE): use discrete forward, continuous backward (pass gradients through
    argmax as if it were identity). Cost: zero additional compute. Limitation: biased
    gradient estimates, can cause training instability. (2) Gumbel-Softmax relaxation:
    replace discrete sampling with a continuous approximation using Gumbel noise +
    temperature-controlled softmax. Forward: sample from Gumbel-Softmax (differentiable).
    Cost: one extra softmax per discrete decision + Gumbel noise generation. Memory:
    stores the full probability distribution (E-dimensional for E experts) per token
    for backward. For MoE with 64 experts and 2048 tokens: 64 * 2048 * 4 bytes = 0.5
    MB per layer (negligible). But temperature annealing adds a hyperparameter and
    can cause mode collapse. (3) REINFORCE / policy gradient: treat the discrete operation
    as a stochastic node. Gradient = reward * log_prob_gradient. Cost: requires multiple
    forward passes for variance reduction (baseline computation). Memory: must store
    log probabilities and rewards. Systems cost: 2-5x forward passes for acceptable
    variance, making training 2-5x slower. In practice, MoE routers use top-k with
    STE or auxiliary load-balancing losses that operate on the continuous logits before
    the discrete argmax, avoiding the gradient problem entirely while adding only
    a small loss computation.'
  common_mistake: '**The Pitfall:** Suggesting to simply ''make everything continuous''.

    **The Rationale:** Engineers default to standard differentiable layers to avoid
    backprop issues.

    **The Consequence:** This destroys the fundamental routing efficiency of MoE or
    combinatorial optimization, completely defeating the purpose of the architecture.

    '
  napkin_math: '**Assumptions & Constraints:**

    - MoE: 64 experts, 4096 tokens.


    **Calculations:**

    - Baseline Compute: Calculating logits takes $2 \times 4096 \times 64 = 524\text{K
    FLOPs}$ per token.

    - Straight-Through Estimator (STE): Adds 0 FLOPs but biases gradients.

    - Gumbel-Softmax: Adds 64 random samples + exp/log operations ($\approx 2\text{K
    FLOPs}$, negligible).


    **Conclusion & Interpretation:**

    - **Result: Near-Zero Overhead (Compute-Bound)**. REINFORCE requires multiple
    rollouts, multiplying full model forward passes, whereas STE or auxiliary losses
    add near-zero systems overhead.

    '
