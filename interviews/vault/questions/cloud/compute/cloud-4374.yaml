title: 'MI300X Prefill Throughput: Compute-Bound vs H100 for Long Prompts'
scenario: During prefill (processing a 32K-token prompt), attention computes QK^T of shape [H, N, N]. With specific tiling techniques, the arithmetic intensity of this operation can be tuned to AI ≈ 250 FLOP/byte.
question: Which accelerator is compute-bound for prefill at this AI, and what are the expected FLOP efficiencies between A100, H100, and MI300X?
details:
  realistic_solution: 'At AI=250: A100: AI=250 > ridge=156 → compute-bound. Effective throughput = 312 TFLOPS. H100: AI=250 < ridge=295 → memory-bound. Effective: 3,350 GB/s × 250 = 838 TFLOPS. MI300X: AI=250 > ridge=247 → compute-bound. Effective: 1,307 TFLOPS. MI300X wins prefill by 1,307/838 = 1.56×. Key insight: MI300X''s higher TFLOPS makes it compute-bound (good for prefill) while H100 remains memory-bound at this AI.'
  common_mistake: |
    **The Pitfall:** Assuming prefill is always memory-bound like decode.
    **The Rationale:** Candidates forget that attention's AI scales with sequence length, eventually crossing the roofline ridge point for certain hardware but not others.
    **The Consequence:** Incorrectly identifying the bottleneck and underestimating the relative performance of high-TFLOPS accelerators.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arithmetic Intensity (AI): 250 FLOP/byte.
    - A100 Ridge Point: 156 FLOP/byte (312 TFLOPS / 2.0 TB/s).
    - H100 Ridge Point: 295 FLOP/byte (989 TFLOPS / 3.35 TB/s).
    - MI300X Ridge Point: 247 FLOP/byte (1307 TFLOPS / 5.3 TB/s).

    **Calculations:**
    - A100: 250 > 156 (Compute-bound) -> 312 TFLOPS.
    - H100: 250 < 295 (Memory-bound) -> 3.35 TB/s * 250 = 837.5 TFLOPS.
    - MI300X: 250 > 247 (Compute-bound) -> 1307 TFLOPS.
    - MI300X vs H100 Speedup: 1307 / 837.5 = 1.56x.

    **Conclusion & Interpretation:**
    - **Result: 1.56x Speedup (Compute-Bound)**. MI300X achieves its full compute potential (1307 TFLOPS), dominating the H100 which remains trapped in a memory-bound state (837.5 TFLOPS) at this sequence length.
