title: Active Interposer vs Passive Silicon Interposer Tradeoffs
scenario: Your team is evaluating active interposer technology (with embedded logic) versus passive silicon interposer for the next AI accelerator generation. The active interposer vendor claims 30% better bandwidth density.
question: Should you use an active interposer or a passive silicon interposer for the next AI accelerator, and what full-system tradeoffs determine the choice?
details:
  realistic_solution: |
    Do not choose active interposer from the vendor's 30% bandwidth-density claim alone. Choose passive silicon if the passive design already meets bandwidth with the planned HBM stack count, because passive has lower NRE, simpler qualification, better understood yield, and less power/thermal complexity. Choose active interposer only if the extra bandwidth density changes the system design enough to pay for itself, such as removing one HBM stack, avoiding a larger reticle-limited package, or enabling a higher-value SKU. Active interposer also adds yield risk because interposer logic defects can kill the package, plus power delivery and thermal-design complexity. The decision criterion is system value after yield and NRE amortization, not bandwidth density in isolation.
  common_mistake: |
    **The Pitfall:** Evaluating only the bandwidth density metric in isolation.
    **The Rationale:** Active interposers improve signal integrity but introduce new failure modes, yield dependencies, and massively increase NRE cost.
    **The Consequence:** Choosing a technically superior but economically ruinous packaging technology for low-volume products.
  napkin_math: |
    **Assumptions & Constraints:**
    - Passive design uses 8 HBM stacks; active bandwidth density can remove 1 HBM stack only if the system still meets capacity and bandwidth targets.
    - HBM stack cost: $80.
    - Non-HBM package BOM before yield: $500.
    - Passive package yield: 95%.
    - Active package yield: 92% because interposer logic adds defect and qualification risk.
    - Active interposer per-unit cost adder: $15.
    - Active interposer NRE: $5M.
    - Example volume: 100K units.

    **Calculations:**
    - Passive cost per good package = ($500 + 8 * $80) / 0.95 = $1,200.
    - Active cost before NRE, with one HBM stack removed = ($500 + 7 * $80 + $15) / 0.92 = $1,168.
    - Active NRE at 100K units = $5,000,000 / 100,000 / 0.92 = $54 per good package.
    - Active cost per good package at 100K units = $1,168 + $54 = $1,222, so passive is still cheaper.
    - Crossover volume solves ($1,075 + $5,000,000 / V) / 0.92 = $1,200, so V ≈ 172K units.
    - If active interposer does not remove an HBM stack or create equivalent system value, there is no cost crossover from bandwidth density alone.

    **Conclusion & Interpretation:**
    - **Result: System-Value Bound.** Use passive unless active interposer removes an HBM stack or unlocks equivalent product value at enough volume to overcome NRE, per-unit cost, yield, power, and thermal risk.
