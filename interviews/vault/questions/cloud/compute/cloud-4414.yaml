title: Active Interposer vs Passive Silicon Interposer Tradeoffs
scenario: 'Your team is evaluating active interposer technology (with embedded logic) versus passive silicon interposer for the next AI accelerator generation. The active interposer vendor claims 30% better bandwidth density.'
question: 'Should you use an active interposer or a passive silicon interposer for the next AI accelerator, and what full-system tradeoffs determine the choice?'
details:
  realistic_solution: |
    Active interposer advantages: embedded repeaters allow longer routes and higher frequencies; can integrate PHY logic reducing die-edge area requirements; enables 3D stacking of logic dies. Disadvantages: interposer fabricated on mature node (28nm typical) adds process qualification; any defect in interposer logic kills the whole package; power delivery to interposer logic adds complexity; thermal path from top dies through interposer to package is degraded. For AI accelerators at exascale (1000+ TFLOPS), active interposer makes sense if the bandwidth gain enables removing one memory stack — the cost crossover is roughly when active interposer NRE < (saved HBM stack cost × volume).
  common_mistake: |
    **The Pitfall:** Evaluating only the bandwidth density metric in isolation.
    **The Rationale:** Active interposers improve signal integrity but introduce new failure modes, yield dependencies, and massively increase NRE cost.
    **The Consequence:** Choosing a technically superior but economically ruinous packaging technology for low-volume products.
  napkin_math: |
    **Assumptions & Constraints:**
    - Passive Interposer: 256 Gbps/mm.
    - Active Interposer: 333 Gbps/mm (+30%).
    - Active NRE: $50/unit at 100K units.

    **Calculations:**
    - Edge Savings: To reach 32,000 Gbps, active saves ~29mm total edge length.
    - Saved silicon area: roughly $10-20/unit.

    **Conclusion & Interpretation:**
    - **Result: 300K+ units (Cost-Bound)**. Active interposer is not cost-effective unless massive scale amortizes the NRE cost.
