title: Optimizing Large Language Model Inference on NVIDIA H100 for High-Throughput
scenario: You are leading the deployment of a new large language model (LLM) for real-time inference, targeting high throughput on a single NVIDIA H100 GPU. The model, with 60 GB of parameters, primarily relies on FP16 matrix multiplications. Initial benchmarks show suboptimal performance and low GPU utilization.
question: How would you profile and optimize the 60 GB FP16 LLM on one H100 for occupancy, Tensor Cores, coalesced memory access, and latency-throughput trade-offs?
details:
  realistic_solution: A realistic approach involves a systematic profiling workflow. First, use NVIDIA Nsight Systems or Nsight Compute to identify bottlenecks (e.g., compute-bound vs. memory-bound). For occupancy, experiment with thread block sizes that are multiples of 32 (warp size), considering shared memory usage and register pressure to keep multiple warps active per SM. To leverage Tensor Cores, ensure matrix multiplication kernels are implemented using `__half` or `__nv_bfloat16` data types and utilize `nvcuda::wmma` API or cuBLAS/cuDNN for fused multiply-add operations. Memory coalescing requires structuring data such that threads within a warp access contiguous memory locations from global memory. This often involves row-major access for column-major data or vice-versa, or using shared memory as a cache to stage global memory reads into coalesced patterns, significantly improving the effective 3.35 TB/s HBM3 bandwidth.
  common_mistake: |
    **The Pitfall:** Failing to connect theoretical concepts like warps and thread blocks to practical optimizations.
    **The Rationale:** A frequent pitfall is neglecting to align FP16 operations to Tensor Core requirements, defaulting to CUDA Cores and losing significant throughput. Additionally, many overlook memory access patterns.
    **The Consequence:** Uncoalesced global memory reads/writes that drastically reduce effective HBM3 bandwidth and underutilized Streaming Multiprocessors (SMs).
  napkin_math: |
    **Assumptions & Constraints:**
    - 60 GB of FP16 weights are resident in H100 HBM.
    - H100 has about 3.35 TB/s HBM bandwidth and 989 TFLOPS FP16 Tensor Core peak.
    - Batch-1 decode has little weight reuse across concurrent tokens; larger batches reuse the same weights across multiple sequences.

    **Calculations:**
    - Lower-bound batch-1 weight traffic per generated token is roughly one model pass: 60 GB.
    - Bandwidth-only lower bound: 60 GB / 3350 GB/s = ~17.9 ms per generated token, before KV-cache reads/writes, launch overheads, and imperfect kernels.
    - Compute per generated token is roughly 2 FLOPs/parameter = 120 GFLOPs; at 989 TFLOPS peak, the ideal compute time is ~0.12 ms, so real latency is dominated by memory movement at low batch.
    - Occupancy should be measured from active warps, register/shared-memory limits, achieved occupancy, Tensor Core utilization, and memory throughput in Nsight, not estimated as a percent of peak TFLOPS.

    **Conclusion & Interpretation:**
    - **Result: Decode is likely memory-bandwidth-bound at small batch, while larger batches can improve arithmetic intensity by reusing resident weights.** Optimize Tensor Core kernels, coalescing, fusion, KV-cache layout, and batching, and use profiler metrics rather than a one-time model-streaming estimate to diagnose occupancy.
