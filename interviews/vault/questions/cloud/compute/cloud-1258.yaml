title: Calculating Historical Fair-Share Priority
scenario: A shared AI cluster with 256 GPUs uses a historical fair-share scheduler. The dynamic priority score for a job is calculated using the formula P = 1000 * 2^(-Usage / Target). Team Vision has a target allocation of 10,000 GPU-hours and has consumed 20,000 GPU-hours. Team NLP has a target of 5,000 GPU-hours and has consumed 2,500 GPU-hours. Both teams submit identical jobs requiring 32 GPUs.
question: What are the dynamic priority scores for Teams Vision and NLP, and which team receives the next 32 GPUs?
details:
  realistic_solution: 'Calculate the priority by normalizing the consumed usage against the target allocation. Team NLP''s usage-to-target ratio is 0.5, yielding a priority of ~707. Team Vision''s ratio is 2.0, yielding a priority of 250. Team NLP has the higher priority and is scheduled first.'
  common_mistake: |
    **The Pitfall:** Focusing on absolute historical usage rather than normalized ratios.
    **The Rationale:** Candidates see that Vision used 20,000 hours vs NLP's 2,500 and incorrectly conclude NLP is severely under-using its share.
    **The Consequence:** The candidate incorrectly calculates priority and misunderstands how fair-share schedulers enforce equitable resource distribution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Formula: P = 1000 * 2^(-Usage / Target).
    - Vision Target: 10k, Usage: 20k.
    - NLP Target: 5k, Usage: 2.5k.

    **Calculations:**
    - Team Vision Ratio: 20,000 / 10,000 = 2.0.
    - Team Vision Priority: 1000 * 2^(-2.0) = 1000 / 4 = 250.
    - Team NLP Ratio: 2,500 / 5,000 = 0.5.
    - Team NLP Priority: 1000 * 2^(-0.5) =~ 707.

    **Conclusion & Interpretation:**
    - **Result: NLP=707 (Scheduling-Bound)**. Team NLP (707) > Team Vision (250), so Team NLP gets the GPUs.
