title: Why GPUs Outperform CPUs on Neural Network Inference
scenario: A junior engineer asks why GPUs are so much faster than CPUs for neural network inference despite having lower clock speeds.
question: Why are GPUs faster than CPUs for neural network inference despite lower clock speeds, and what role do SIMD vector operations play?
details:
  realistic_solution: Vector operations apply a single instruction to multiple data elements simultaneously (SIMD). Neural networks are dominated by matrix multiplications suited for SIMD. The lower clock speed is compensated by orders of magnitude more parallel operations per cycle.
  common_mistake: |
    **The Pitfall:** Confusing clock speed with overall compute throughput.
    **The Rationale:** Candidates often focus on GHz instead of operations per cycle multiplied by the number of cores.
    **The Consequence:** Failing to recognize the massive data parallelism advantages of GPUs for matrix-heavy workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compare whole devices, not one CPU core against an entire GPU.
       - Neural network inference is dominated by dense matrix and vector operations with large amounts of data parallelism.
    2. **Calculations:**
       - A CPU core uses SIMD lanes such as AVX-512 to apply one instruction across multiple FP32 values.
       - A CPU socket has a limited number of such vector pipelines.
       - A GPU has thousands of lanes plus tensor cores designed to run many matrix operations concurrently.
       - Published whole-device peak throughput is therefore the appropriate comparison, and modern datacenter GPUs deliver far higher matrix throughput than general-purpose CPU sockets for these kernels.
    3. **Conclusion & Interpretation:**
       **Result: Parallelism, not clock speed, dominates.** GPUs win because neural network kernels expose enough SIMD/SIMT and tensor-core parallelism to keep thousands of lanes busy.
