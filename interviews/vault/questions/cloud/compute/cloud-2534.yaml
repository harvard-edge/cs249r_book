title: Cloud Vector Operations L2 0
scenario: 'A junior engineer asks why GPUs are so much faster than CPUs for neural network inference despite having lower clock speeds.'
question: "Why are GPUs faster than CPUs for neural network inference despite lower clock speeds, and what role do SIMD vector operations play?"
details:
  realistic_solution: 'Vector operations apply a single instruction to multiple data elements simultaneously (SIMD). Neural networks are dominated by matrix multiplications suited for SIMD. The lower clock speed is compensated by orders of magnitude more parallel operations per cycle.'
  common_mistake: |
    **The Pitfall:** Confusing clock speed with overall compute throughput.
    **The Rationale:** Candidates often focus on GHz instead of operations per cycle multiplied by the number of cores.
    **The Consequence:** Failing to recognize the massive data parallelism advantages of GPUs for matrix-heavy workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU (AVX-512): 512-bit SIMD = 16 FP32 ops per cycle, 3 GHz.
       - GPU (e.g., H100): 16,896 CUDA cores, 2 ops/cycle, 1.83 GHz.
    2. **Calculations:**
       - CPU throughput: 16 ops × 3 GHz = 48 GFLOPS per core.
       - GPU throughput: 16,896 × 2 × 1.83 GHz = 61.8 TFLOPS.
       - Ratio: 61.8 TFLOPS / 48 GFLOPS = ~1,300x.
    3. **Conclusion & Interpretation:**
       **Result: Compute Bound. GPUs offer ~1,300x more throughput via massive vector parallelism.**
