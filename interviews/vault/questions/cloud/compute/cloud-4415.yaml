title: Chiplet-Based GPU Multi-Instance Partitioning
scenario: A cloud provider wants to offer MI300X as a multi-tenant service with strong isolation guarantees, analogous to H100 MIG.
question: How would you design strong multi-tenant isolation for MI300X by mapping tenant slices onto its XCD topology?
details:
  realistic_solution: |
    MI300X can be partitioned along XCD resource boundaries for scheduling and performance isolation, but it should not be described as H100 MIG-equivalent hardware isolation. Define service tiers that allocate whole GPUs or coarse groups of XCD-local compute resources where the ROCm runtime and scheduler can keep tenant queues, CPU affinity, and memory placement aligned to the assigned topology. Use separate processes/containers, cgroups, device-file access control, ROCm-visible-device masking, admission control, and memory scrubbing between tenants. Treat HBM bandwidth and Infinity Fabric traffic as best-effort resources unless the platform exposes documented enforcement. For strong security isolation, place mutually untrusted tenants on separate GPUs or separate nodes; XCD-aware slicing is a utilization and noisy-neighbor mitigation, not a hard hardware security boundary.
  common_mistake: |
    **The Pitfall:** Assuming MIG-style isolation is directly portable from H100 to MI300X.
    **The Rationale:** MI300X lacks built-in hardware MIG support for arbitrary fractional slices.
    **The Consequence:** Designing an isolation scheme that maps poorly to the physical chiplet boundaries, failing to provide true memory bandwidth isolation or hardware security.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X Hardware: 8 XCDs, 192GB HBM total, 5.3 TB/s.

    **Calculations:**
    - 1-XCD slice: 192GB / 8 = 24GB nominal HBM capacity.
    - 1-XCD proportional bandwidth share: 5.3 TB/s / 8 = ~662 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Architecture-Topology-Bound.** XCD-aligned slices are a useful scheduling unit, but they are not the same as documented hardware-enforced MIG security partitions.
