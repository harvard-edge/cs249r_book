title: LLM Inference Scaling on Google TPU v5e
scenario: Your team is tasked with deploying a 70-billion parameter Large Language Model (LLM) for high-throughput inference. You are considering Google TPU v5e, which has 16 GB HBM, 197 TFLOPS (BF16), and 1.6 TB/s memory bandwidth per chip.
question: Why is a single TPU v5e unsuitable for a 70B BF16 LLM, and how would you shard the model across accelerators?
details:
  realistic_solution: For a 70B parameter LLM on TPU v5e, model parallelism (e.g., tensor or pipeline parallelism) across multiple TPU chips would be essential to shard the model weights. The solution would need to detail how the model is partitioned, how data is communicated between chips, and how to optimize communication patterns to leverage high-bandwidth inter-chip interconnects.
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TFLOPS without verifying absolute memory capacity.
    **The Rationale:** Candidates see high compute numbers and assume the accelerator can naturally handle the workload context.
    **The Consequence:** They propose single-chip deployments for models that fundamentally exceed the chip's physical memory architecture, resulting in deployment failure.
  napkin_math: |
    1. **Assumptions & Constraints:** 70B parameter model. BF16 format (2 bytes/parameter). TPU v5e has 16 GB HBM capacity.
    2. **Calculations:** Weights footprint = 70 × 10^9 × 2 bytes = 140 GB. Minimum chips required = ceil(140 GB / 16 GB) = 9 TPU v5e chips.
    3. **Conclusion & Interpretation:** **Result: Minimum 9 TPU chips required just for weights. VRAM-Capacity-Bound.**
