title: MI300X XCD Thermal Throttling from Imbalanced Inference Workloads
scenario: 'During sustained inference on MI300X, you observe non-uniform XCD thermal throttling: some XCDs reduce frequency while others remain near full frequency under the package power limit.'
question: What is causing non-uniform XCD thermal throttling on MI300X during sustained inference, and how would you fix it?
details:
  realistic_solution: Non-uniform throttling usually indicates workload, cooling, or placement imbalance within a shared package power and thermal envelope. Compute-heavy work assigned to a subset of XCDs can create localized hot spots while memory-bound or idle XCDs draw less power. Fix it by balancing compute-heavy layers or tensor shards across XCDs, improving request batching and placement, checking cooling/telemetry, and tuning package-level power or frequency policy if available. Do not assume a standard per-XCD TDP cap control unless the platform explicitly exposes one.
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling is uniform across all chiplets since they share a package TDP budget.
    **The Rationale:** Viewing the MI300X package as a single monolithic thermal zone.
    **The Consequence:** Failing to balance workloads across XCDs, leading to hot spots where compute-bound tasks cause severe localized throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Package power limit: 600W.
    - 8 XCDs total (4 compute-bound, 4 memory-bound).

    **Calculations:**
    - Even package-level budget for planning: 600W / 8 = 75W per XCD average.
    - If workload placement makes 4 XCDs consume more than that average while 4 consume less, the package can remain within 600W while local thermal sensors still force frequency reduction on the hot XCDs.
    - The prompt does not provide per-XCD power curves, so a precise frequency-loss percentage is not derivable.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound**. The fix is to reduce local hot spots through workload balancing and package-level policy tuning, not to rely on unsupported per-XCD TDP caps.
