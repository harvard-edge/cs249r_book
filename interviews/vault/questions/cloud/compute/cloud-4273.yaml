title: Power Delivery Across Chiplet Dies
scenario: 'During sustained inference on MI300X, you observe that XCD thermal throttling is non-uniform — some XCDs throttle at 600W TDP while others remain at full frequency.'
question: 'What is causing non-uniform XCD thermal throttling on MI300X during sustained inference, and how would you fix it?'
details:
  realistic_solution: 'Non-uniform throttling indicates workload imbalance across XCDs. XCDs processing attention heads are memory-bound and run cooler, while XCDs running FFN layers are compute-bound and run hot. Rebalance layer assignments to distribute power more uniformly, or use ROCm''s power management API to cap per-XCD TDP.'
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling is uniform across all chiplets since they share a package TDP budget.
    **The Rationale:** Viewing the MI300X package as a single monolithic thermal zone.
    **The Consequence:** Failing to balance workloads across XCDs, leading to hot spots where compute-bound tasks cause severe localized throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Package limit: 600W during throttle.
    - 8 XCDs total (4 compute-bound, 4 memory-bound).

    **Calculations:**
    - Memory-bound XCD (attention): ~70W.
    - Remaining budget for compute XCDs = 600W - (70W * 4) = 320W.
    - Budget per compute XCD = 320W / 4 = 80W.
    - Typical compute XCD usage: ~110W.

    **Conclusion & Interpretation:**
    - **Result: 80W Starvation (Thermal-Bound)**. Compute XCDs are starved to 80W, forcing a ~15% localized frequency reduction.
