title: 'A100 LLM Cost Analysis: Training & Inference'
scenario: Your team is training a new 70B parameter LLM on a cluster of NVIDIA A100 GPUs. The model requires 10^24 FLOPs for training. For inference, you expect to serve 100,000 requests over 100 GPU-hours due to varying load and batching strategies. A single A100 GPU hour costs $3.00.
question: How would you estimate A100 GPU-hours and cost for 10^24 FLOP training plus 100 GPU-hours of inference, and what bottlenecks affect accuracy?
details:
  realistic_solution: Use profiling tools to identify bottlenecks (e.g., memory bound vs. compute bound). Benchmark small-scale runs to extrapolate performance. Factor in practical efficiency coefficients (e.g., 30-50% of peak FLOPs for real-world workloads). Optimize data pipelines to keep GPUs fed. For inference, implement dynamic batching, model quantization, and consider provisioning based on peak vs. average load, using autoscaling where possible.
  common_mistake: |
    **The Pitfall:** Assuming training achieves 100% of peak FLOPs, or underestimating memory bandwidth limitations.
    **The Rationale:** Candidates fail to factor in a realistic Model FLOPs Utilization (MFU) coefficient (e.g., 30-50%) for real-world distributed workloads.
    **The Consequence:** Underestimating the training time and budget by 2x-3x, leading to massive cost overruns.
  napkin_math: |
    - Peak A100 FLOPs/hour: 312 TFLOPS * 3600s = 1.123 * 10^18 FLOPs/hour.
    - Effective FLOPs/hour at 40% MFU: 1.123 * 10^18 * 0.40 = 4.49 * 10^17 FLOPs/hour.
    - Estimated training GPU-hours: 10^24 / (4.49 * 10^17) ≈ 2,225,783 GPU-hours.
    - Estimated training cost: 2,225,783 * $3.00 = $6,677,349.
    - Inference cost: 100 GPU-hours * $3.00 = $300.
    - **Total Estimated Cost: ~$6,677,649, completely dominated by the training phase.**
