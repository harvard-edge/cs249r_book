title: Cloud Benchmark Run Rules L2 0
scenario: A startup claims state-of-the-art MLPerf training results but used a custom learning rate schedule not in the reference implementation.
question: Why do MLPerf run rules matter, and why is a custom learning rate schedule outside the rules a problem?
details:
  realistic_solution: 'Benchmark run rules ensure apples-to-apples comparisons by constraining the optimization space. MLPerf rules specify: (1) which hyperparameters can be tuned (learning rate, batch size) vs. fixed (model architecture, loss function), (2) convergence target — training must reach a specific accuracy/loss threshold, (3) timing rules — clock starts at first data load, stops at convergence, includes all preprocessing, (4) allowed hardware configurations and software stacks, (5) number of required runs for statistical validity. A custom LR schedule outside the allowed tuning space would be a rule violation because it changes the optimization trajectory — the startup might converge faster with a schedule that doesn''t generalize, making the comparison unfair.'
  common_mistake: |
    **The Pitfall:** Treating an out-of-rules learning rate schedule as a harmless implementation detail.
    **The Rationale:** Assuming any schedule that reaches the target accuracy faster is fair, even if it changes the allowed optimization path.
    **The Consequence:** The result no longer measures the same MLPerf workload, so faster convergence may reflect an algorithmic change instead of a better training system.
  napkin_math: |
    **Assumptions & Constraints:**
    - MLPerf comparisons depend on fixed workload definitions and allowed tuning spaces.
    - Learning rate schedules affect the optimization trajectory and time to convergence.

    **Calculations:**
    - If Team A uses the allowed schedule and Team B uses an out-of-rules schedule, their convergence times are not measuring the same benchmark.
    - Repeatability and run reporting reduce cherry-picking, but they do not make a disallowed optimization valid.
    - Compliance must be checked before comparing elapsed time.

    **Conclusion & Interpretation:**
    - **Result: Compliance-Bound Comparison.** Run rules preserve apples-to-apples MLPerf results by preventing teams from changing the optimization path outside the benchmark definition.
