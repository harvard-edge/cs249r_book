title: The Arithmetic Intensity Test
scenario: An engineer is profiling a kernel that performs a large, element-wise vector addition on a GPU using FP16 precision.
question: "Will this operation's performance be primarily limited by the GPU's compute power or its memory bandwidth?"
details:
  realistic_solution: The operation will be heavily memory-bound. To determine this, evaluate the Arithmetic Intensity (AI)—the ratio of floating-point operations (FLOPs) to bytes moved. An element-wise addition requires reading two FP16 values (4 bytes), writing one FP16 value (2 bytes), and performing exactly one FLOP, resulting in a microscopic AI. The GPU's ALUs will sit idle waiting for the memory controller to fetch data.
  common_mistake: |
    **The Pitfall:** Assuming all mathematical operations on a GPU are compute-bound.
    **The Rationale:** Engineers see "Vector Addition" and "989 TFLOPS" and instantly assume the ALUs are the bottleneck, entirely forgetting the von Neumann bottleneck of data movement.
    **The Consequence:** Spending weeks attempting to optimize the PTX math instructions when the kernel is actually starved for memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operation: `C[i] = A[i] + B[i]`
       - Precision: FP16 (2 bytes per element).
    2. **Calculations:**
       - Memory Read: 2 bytes (A) + 2 bytes (B) = 4 bytes.
       - Memory Write: 2 bytes (C).
       - Total Data Moved: 6 bytes.
       - Compute: 1 Addition = 1 FLOP.
       - Arithmetic Intensity (AI): 1 FLOP / 6 bytes = 0.166 FLOPs/byte.
    3. **Conclusion & Interpretation:**
       - **Result: 0.166 FLOPs/byte.** The operation is severely **Memory-Bandwidth-Bound**, as modern GPUs require an AI > 200 to saturate their compute units.
  options:
  - Compute-bound, because it's a mathematical operation on a powerful GPU.
  - Memory-bound, because the ratio of compute to data movement is very low.
  - Neither, it's bound by NVLink bandwidth.
  - It depends entirely on the size of the vector.
  correct_index: 1
