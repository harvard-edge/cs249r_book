title: The Power Efficiency Paradox
scenario: Your team is tasked with optimizing a 70B LLM for inference on a mixed fleet of A100 and new H100 GPUs. An engineer presents a benchmark showing their custom, heavily fused attention kernel achieves 20% higher TOPS/W than the standard library implementation at a small, latency-sensitive batch size of 8. They advocate for deploying this custom kernel across the entire fleet for all workloads.
question: Why might deploying this 20% more power-efficient kernel be a catastrophic decision for your H100 fleet's throughput-oriented workloads?
details:
  realistic_solution: The recommendation is dangerous because it generalizes from one latency-sensitive benchmark point to a different operating regime. At batch size 8, attention may be dominated by memory traffic, launch overhead, cache behavior, or tail latency, so a heavily fused kernel can show better TOPS/W by reducing bytes moved or overhead. Throughput-oriented H100 serving usually uses larger batches, longer decode batches, or continuous batching to raise arithmetic intensity and keep Tensor Cores busy. A custom kernel tuned for the small-batch regime may have poor occupancy, register pressure, limited tiling choices, or weak scaling as batch and sequence mix change. The right conclusion is not that the kernel is always bad; it is that the benchmark does not prove fleet-wide throughput efficiency. Before deploying it broadly, compare end-to-end tokens/s/GPU and tokens/J across representative H100 workloads, batch sizes, sequence lengths, and A100/H100 hardware separately.
  common_mistake: |
    **The Pitfall:** Accepting the benchmark at face value and assuming efficiency universally scales.
    **The Rationale:** Engineers generalize performance wins from a memory-bound regime (small batch) to compute-bound workloads (large batch).
    **The Consequence:** Deploying the kernel locks the H100 fleet in an inefficient, memory-bound state, crippling overall throughput and actual TOPS/W at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 peak FP16/BF16 tensor compute: about 989 TFLOP/s.
    - H100 HBM bandwidth: about 3.35 TB/s.
    - Ridge point: 989 TFLOP/s / 3.35 TB/s ≈ 295 FLOPs/byte.
    - The benchmark is only measured at batch size 8.

    **Calculations:**
    - If the batch-8 kernel has arithmetic intensity below about 295 FLOPs/byte, it is memory/overhead sensitive, so fusion can improve efficiency by reducing bytes moved or launches.
    - If throughput serving raises arithmetic intensity above about 295 FLOPs/byte, performance depends on Tensor Core utilization and scheduling, not just reduced memory traffic.
    - Example risk: a standard kernel sustaining 70% of peak compute delivers about 0.70 * 989 ≈ 692 TFLOP/s. A custom kernel that saves memory traffic but only sustains 40% of peak delivers about 396 TFLOP/s in the compute-bound regime.

    **Conclusion & Interpretation:**
    - **Result: Regime-Mismatch Risk**. The 20% batch-8 TOPS/W win is not a proof of throughput efficiency. The deployment could be harmful if the fused kernel fails to scale into the high-utilization H100 regime, so the decision must be based on roofline position and measured end-to-end tokens/s/W for representative workloads.
