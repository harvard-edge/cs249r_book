title: Diagnose Memory-Bandwidth-Bound Decode on H100 Serving Cluster
scenario: An LLM serving system for a 70B parameter model (INT8) achieves only 52 tokens/s per GPU during autoregressive decode at batch size 1.
question: Is batch-1 decode for the 70B INT8 model compute-bound or memory-bandwidth-bound, and why is throughput about 52 tokens/s?
details:
  realistic_solution: |
    Batch-1 decode is memory-bandwidth-bound. A compute roofline gives 1,979 TFLOP/s / 0.140 TFLOP per token = about 14,136 tokens/s, which is far above the observed 52 tokens/s. In batch-1 autoregressive decode, each next-token step has little reuse across requests, so the dominant traffic is streaming roughly the 70 GB INT8 weight set through HBM once per token, plus smaller activation and KV-cache traffic. The bandwidth roofline is 3.35 TB/s / 70 GB = about 47.9 tokens/s; the observed 52 tokens/s is close enough to treat as an empirical memory-bound result given decimal/TiB conventions, cache effects, and implementation details. Larger batches improve aggregate throughput because one streamed weight tile serves many requests, but they do not imply 52 tokens/s per request at batch 64; per-request latency may rise while total tokens/s increases toward the compute and memory limits for the batched kernel.
  common_mistake: |
    **The Pitfall:** Computing only compute-bound throughput and ignoring memory bandwidth.
    **The Rationale:** When evaluating hardware performance, peak TFLOP/s is often the most advertised metric.
    **The Consequence:** Engineers overestimate single-batch throughput by nearly 300x because they fail to realize autoregressive decode requires loading all model weights for every single token.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights are about 70 GB after INT8 quantization.
    - FLOPs/token are about 140 GFLOPs.
    - H100 bandwidth is about 3.35 TB/s.
    - H100 peak compute is about 1,979 TFLOP/s.
    **Calculations:**
    - Compute roofline: 1,979 TFLOP/s / 0.140 TFLOP/token = 14,136 tokens/s.
    - Batch-1 weight-traffic roofline: 3.35 TB/s / 70 GB = 47.9 tokens/s.
    - Gap: 14,136 / 47.9 = 295x, so compute is not the limiting resource.
    - The measured 52 tokens/s is an empirical result near the memory roofline, not a precise derivation from peak specs.
    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound.** Batch-1 decode streams too much weight data per generated token; batching raises aggregate throughput by sharing weight traffic across requests, with a latency/throughput tradeoff.
