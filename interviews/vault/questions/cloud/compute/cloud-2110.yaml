title: Arithmetic Intensity of a Linear Layer
scenario: A linear layer performs Y = XW where X is [B, 4096] and W is [4096, 4096],
  both in FP16. You are targeting an A100 GPU (312 TFLOPS FP16, 2 TB/s HBM bandwidth).
question: What is the arithmetic intensity of Y=XW for batch size B, and when is it
  compute-bound versus memory-bound on an A100?
details:
  realistic_solution: Calculate Total FLOPs and Total Bytes loaded (including weights,
    inputs, and outputs). The ridge point determines the transition from memory-bound
    to compute-bound. At small batch sizes (e.g., B=1), the operation is heavily memory-bound.
    As B increases (e.g., B=1024), the arithmetic intensity spikes, making the layer
    heavily compute-bound.
  common_mistake: '**The Pitfall:** Only counting the weight matrix bytes and completely
    ignoring the input and output tensors.

    **The Rationale:** Candidates assume weights always dominate memory traffic, overlooking
    that for small batch sizes, input/output IO overhead is significant.

    **The Consequence:** The arithmetic intensity is miscalculated, leading to completely
    incorrect architectural assumptions about whether the model is compute or memory
    bound.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Hardware: A100 (312 TFLOPS\
    \ FP16, 2.0 TB/s HBM).\n   - Tensors: X [B, 4096], W [4096, 4096], FP16 (2 bytes).\n\
    2. **Calculations:**\n   - A100 Ridge Point: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte.\n\
    \   - FLOPs for Y = XW: 2 × B × 4096^2 = ~33.6M × B.\n   - Bytes Loaded/Stored:\
    \ W (33.6 MB) + X (B × 8 KB) + Y (B × 8 KB).\n   - B=1: FLOPs = ~33.6M, Bytes\
    \ = ~33.6 MB. AI = ~1 FLOP/byte.\n   - B=1024: FLOPs = ~34.3G, Bytes = 33.6 MB\
    \ + 16.4 MB = 50 MB. AI = ~686 FLOPs/byte.\n3. **Conclusion & Interpretation:**\n\
    \   - **Result: Batch-Dependent Bound. At B=1, the operation is severely memory-bound\
    \ (AI=1 < 156). At B=1024, it transitions to highly compute-bound (AI=686 > 156).**\n"
