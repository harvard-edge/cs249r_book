title: 'Diagnosing AVX-512 Remainder Loop Bottlenecks'
scenario: 'You are serving an NLP sequence classification model using ONNX Runtime on a compute-optimized Intel Xeon CPU with AVX-512 support. Profiling with Intel VTune reveals that a large percentage of execution time is spent in scalar instructions and remainder loops rather than packed SIMD instructions, despite the operations being standard GEMMs. The model uses a dynamic batch size and processes variable sequence lengths ranging from 11 to 27 tokens.'
question: 'Why is the vectorization efficiency so low, and how do you root-cause and fix it?'
details:
  realistic_solution: 'The variable sequence lengths and batch dimensions are not multiples of the AVX-512 vector length (16 FP32 elements). This forces the compiler to generate scalar ''peel'' or ''remainder'' loops for the leftover elements, destroying throughput. Fix it by padding inputs to multiples of the vector width (e.g., 16 or 32 for FP32) to ensure 100% packed SIMD instruction utilization.'
  common_mistake: |
    **The Pitfall:** Blaming framework configurations (e.g., AVX-512 is disabled) or thermal throttling.
    **The Rationale:** Candidates miss the direct interaction between dynamic tensor shapes and fixed-width hardware SIMD registers.
    **The Consequence:** Spending hours debugging compiler flags or cooling systems when the issue is fundamentally a mismatch in data padding.
  napkin_math: |
    **Assumptions & Constraints:**
    - AVX-512 Register: Processes 16 FP32 elements per instruction.
    - Sequence Length: 17 (Unpadded).

    **Calculations:**
    - Unpadded (Length 17): 1 packed instruction (16) + 1 scalar loop (1).
    - Padded (Length 32): 2 packed instructions (32).
    - Execution Time Penalty: Scalar execution is as slow as vector execution, doubling time for just 1 extra element.

    **Conclusion & Interpretation:**
    - **Result: 2x execution time (Compute-Bound)**. Padding inputs to multiples of 16 eliminates scalar remainder loop overhead.
