title: Speculative Decoding Speedup for 70B INT4 with 7B Draft
scenario: A 70B LLM serving in INT4 generates 100 tokens/request at 10.45ms/token (memory-bound). You deploy speculative decoding with a 7B draft model. The draft generates 4 tokens speculatively (acceptance rate α=0.8).
question: What speedup, cost reduction, and memory overhead does speculative decoding with a 7B draft model provide for the 70B INT4 service?
details:
  realistic_solution: 'Baseline decode: 100 tokens at 10.45ms/token = 1045ms/request. Speculative decode: the 7B INT4 draft generates 4 tokens at 1.045ms per draft token, or 4.18ms. The 70B model verifies the draft in one parallel step, costing 10.45ms. Expected accepted tokens per verify step are (1-0.8^5)/(1-0.8) = 3.36 tokens. Effective decode time is (4.18+10.45)/3.36 = 4.35ms/token, so the decode-only speedup is 10.45/4.35 = 2.40x. The 100-token decode latency falls from about 1045ms to 435ms, ignoring prefill and network overhead. GPU-seconds per generated token fall by the same 2.40x, equivalent to using about 42% of the baseline decode cost. Memory overhead is the 7B INT4 draft: 7B * 0.5 bytes = 3.5GB. The 70B INT4 target is about 35GB, so total model weights are about 38.5GB, a 10% weight-memory overhead.'
  common_mistake: |
    **The Pitfall:** Calculating speedup incorrectly by directly dividing step time by acceptance rate.
    **The Rationale:** Forgetting to account for the time taken by the full 70B model to verify the draft tokens.
    **The Consequence:** Drastically overestimating the performance gains of speculative decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B INT4 memory bound at 10.45ms/tok.
    - 7B draft at 1.045ms/tok.
    - 4 draft tokens (k=4), acceptance rate α=0.8.
    - INT4 weight memory is 0.5 bytes/parameter.

    **Calculations:**
    - Baseline 100-token decode latency = 100 * 10.45ms = 1045ms.
    - 4 draft tokens = 4.18ms.
    - Verify (70B) = 10.45ms per verify step.
    - Total time per round = 10.45ms + 4.18ms = 14.63ms.
    - Expected accepted tokens (α=0.8, k=4) = (1-0.8^5)/0.2 = 3.36 tokens.
    - Effective time = 14.63 / 3.36 = 4.35ms/token.
    - Speedup = 10.45 / 4.35 = 2.40x.
    - Speculative 100-token decode latency = 100 * 4.35ms = 435ms.
    - Decode cost fraction = 1 / 2.40 = 41.7% of baseline, or a 58.3% reduction in GPU-seconds per generated token.
    - 70B INT4 weights = 70B * 0.5 bytes = 35GB.
    - 7B INT4 draft weights = 7B * 0.5 bytes = 3.5GB.
    - Memory overhead = 3.5GB / 35GB = 10%; combined weight memory = 38.5GB.

    **Conclusion & Interpretation:**
    - **Result: 2.40x decode speedup with 10% weight-memory overhead.** Speculative decoding lowers decode GPU-seconds by about 58%, before accounting for prefill, networking, and scheduler overhead.
