title: 'Systolic Array Design: Weight-Stationary vs Output-Stationary Tradeoff'
scenario: Design the dataflow strategy for a custom 256x256 systolic array computing one attention head score matrix Q*K^T with seq=2048, head_dim=64, BF16 on a TPU. Choose between weight-stationary and output-stationary dataflow, and justify with memory reuse analysis.
question: For the 2048-token attention layer Q*K^T on a 256x256 systolic array, should you use weight-stationary or output-stationary dataflow, and why?
details:
  realistic_solution: For one head, Q and K are each 2048x64 BF16 = 256 KiB, and the score output is 2048x2048 BF16 = 8 MiB. If each 256-row Q tile reuses all of K across the 2048 output columns, a weight-stationary K tile reduces repeated K reads versus naively streaming K for every Q tile. Output-stationary is still useful inside a tile because each PE accumulates partial sums, but the key dataflow choice is to keep K tiles resident while streaming Q tiles and writing the 8 MiB score matrix once. The defensible conclusion is lower K traffic and better reuse, not a precise latency saving from the given inputs.
  common_mistake: |
    **The Pitfall:** Misapplying output-stationary dataflow to attention computation.
    **The Rationale:** Candidates treat attention weights (Q*K^T) like standard fully connected layers, failing to recognize that they are recomputed from inputs and benefit massively from caching K in registers.
    **The Consequence:** Generating 99.9% unnecessary memory reads, destroying memory bandwidth and throttling the systolic array.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attention head: Q and K are both 2048x64 BF16.
    - Score output is 2048x2048 BF16.
    - Compare a naive output-row stream of K with a tiled dataflow that keeps K tiles stationary across Q tiles.

    **Calculations:**
    - Q size = 2048 * 64 * 2 = 262,144 bytes = 256 KiB.
    - K size = 2048 * 64 * 2 = 262,144 bytes = 256 KiB.
    - Score output = 2048 * 2048 * 2 = 8,388,608 bytes = 8 MiB.
    - Naive K traffic if K is reread for each Q row: 2048 * 256 KiB = 512 MiB.
    - Tiled weight-stationary K traffic lower bound: load K once per head = 256 KiB, plus Q read = 256 KiB and score write = 8 MiB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Reuse Bound.** Keep K tiles stationary while streaming Q tiles; this can cut K read traffic from 512 MiB to about 256 KiB for the idealized one-head score matmul, but the prompt does not justify an exact millisecond saving.
