title: Interposer Bandwidth Scaling Laws
scenario: You are benchmarking a 4-XCD chiplet system and notice that aggregate bandwidth scales sublinearly with XCD count.
question: Why does aggregate bandwidth scale sublinearly with XCD count in a 4-XCD chiplet system, and what scaling should you expect?
details:
  realistic_solution: 'Interposer bandwidth scales sublinearly due to: (1) shared crossbar arbitration latency increasing with N², (2) physical wire density limits on the silicon interposer, (3) coherency traffic consuming a fraction of aggregate bandwidth. Empirically, systems achieve ~70-80% of theoretical peak aggregate bandwidth on uniform workloads.'
  common_mistake: |
    **The Pitfall:** Assuming bandwidth scales perfectly linearly with chiplet count.
    **The Rationale:** It's tempting to multiply a single chiplet's bandwidth by the total number of chiplets.
    **The Consequence:** Architectural models vastly overestimate system bandwidth, leading to under-provisioned memory topologies and unexpected latency bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Theoretical peak per XCD = 662 GB/s.
       - 8-XCD system theoretical max = 8 * 662 GB/s = 5296 GB/s ≈ 5.3 TB/s.
       - Overheads: Crossbar arbitration (~13%), Coherency traffic (~8%).
    2. **Calculations:**
       - Net efficiency = 100% - 13% - 8% = 79%.
       - Expected aggregate bandwidth = 5.3 TB/s * 0.79 = 4.18 TB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bound.** Aggregate bandwidth scales to ~79% of theoretical peak due to physical interposer congestion and coherency overheads.
