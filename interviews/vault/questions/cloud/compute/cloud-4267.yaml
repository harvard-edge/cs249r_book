title: Interposer Bandwidth Scaling Laws
scenario: You are benchmarking a 4-XCD chiplet system and notice that aggregate bandwidth scales sublinearly with XCD count.
question: Why does aggregate bandwidth scale sublinearly with XCD count in a 4-XCD chiplet system, and what scaling should you expect?
details:
  realistic_solution: 'Aggregate bandwidth scales sublinearly because additional XCDs share finite fabric links, routing resources, memory-controller paths, and coherency/control traffic. A 4-XCD system still has an ideal peak of 4× single-XCD bandwidth, but uniform traffic rarely achieves 4× because some transfers cross chiplet boundaries and consume fabric bandwidth that local traffic would not. For a publishable estimate, express measured scaling as efficiency times ideal peak: if the fabric sustains 70-80% efficiency on the benchmark, expect about 2.8-3.2× single-XCD bandwidth rather than 4×.'
  common_mistake: |
    **The Pitfall:** Assuming bandwidth scales perfectly linearly with chiplet count.
    **The Rationale:** It's tempting to multiply a single chiplet's bandwidth by the total number of chiplets.
    **The Consequence:** Architectural models vastly overestimate system bandwidth, leading to under-provisioned memory topologies and unexpected latency bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4-XCD system.
    - Theoretical peak per XCD = B.
    - Measured fabric efficiency for the benchmark is expected to be about 70-80% of ideal because of routing contention, nonlocal transfers, and coherency/control traffic.

    **Calculations:**
    - Ideal 4-XCD aggregate bandwidth = 4B.
    - Expected aggregate bandwidth = efficiency * 4B.
    - At 70% efficiency: 0.70 * 4B = 2.8B.
    - At 80% efficiency: 0.80 * 4B = 3.2B.

    **Conclusion & Interpretation:**
    - **Result: expect about 2.8-3.2× single-XCD bandwidth, or 70-80% of ideal 4-XCD peak.** The loss is from finite shared fabric and coherency/routing overhead, not a simple linear subtraction of arbitrary overhead percentages.
