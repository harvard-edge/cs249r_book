title: TPU v5e Roofline Analysis for Batch-1 LLM Decode
scenario: 'A custom fused LLM decoding kernel on one TPU v5e chip (197 TFLOPS BF16 peak, 819 GB/s) shows 12 TFLOPS effective throughput during profiling (6.1% MFU). The kernel does: load attention KV cache (batch=1, L=512, H=16, D=128, BF16), and compute 1 decode step.'
question: Is the 12 TFLOPS decode kernel compute- or memory-bound, what is the attainable performance, and which optimization gives the largest gain?
details:
  realistic_solution: Decode step batch=1 loads KV for all 512 context tokens. KV cache traffic is 512 * 16 * 128 * 2 tensors * 2 bytes = 4 MiB. If the fused kernel also streams four 4096x4096 BF16 projection matrices, weight traffic is 4 * 4096^2 * 2 = 128 MiB. Compute is about 136M FLOPs, so AI is roughly 136M / 132 MiB = 1 FLOP/byte. The memory roofline is about 819 GB/s * 1 FLOP/byte = 0.8 TFLOPS, far below the 197 TFLOPS compute peak. A reported 12 TFLOPS is likely using a different FLOP accounting or excluding weight/KV traffic; under the stated traffic model it is not attainable. The largest gains come from reducing bytes per token, such as GQA/MQA, KV quantization, batching, and weight reuse.
  common_mistake: |
    **The Pitfall:** Blaming compute efficiency (low MFU) for the poor performance.
    **The Rationale:** Candidates see 6.1% MFU and assume the kernel logic is bad, failing to realize that batch=1 decoding is overwhelmingly memory-bandwidth bound.
    **The Consequence:** Wasting time unrolling loops or tweaking instructions when the only way to improve throughput is to reduce memory traffic (e.g., using Grouped Query Attention) or increase batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: one TPU v5e chip, using 197 TFLOPS BF16 peak and 819 GB/s HBM bandwidth.
    - Config: Batch=1, L=512, H=16, D=128, BF16.

    **Calculations:**
    - KV traffic = 512 * 16 * 128 * 2 * 2 = 4,194,304 bytes = 4 MiB.
    - Weight traffic = 4 * 4096 * 4096 * 2 = 134,217,728 bytes = 128 MiB.
    - Total traffic = 132 MiB = 138.4 MB.
    - Compute = attention dot products (~2M FLOPs) + four projections (~134M FLOPs) = ~136M FLOPs.
    - AI = 136M FLOPs / 138.4M bytes = 0.98 FLOPs/byte.
    - Memory roofline = 819 GB/s * 0.98 FLOPs/byte = 0.80 TFLOPS.
    - Equivalent memory time = 138.4MB / 819GB/s = 0.169ms; 136M / 0.169ms = 0.80 TFLOPS.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Decode.** Under the stated bytes-read model, attainable performance is about 0.8 TFLOPS; optimize by reducing KV/weight traffic or increasing reuse, not by tuning the systolic matmul alone.
