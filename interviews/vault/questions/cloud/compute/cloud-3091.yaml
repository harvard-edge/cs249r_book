title: 'Systolic Array Mastery: Roofline Analysis for Custom LLM Kernel'
scenario: 'A custom fused LLM decoding kernel on TPU v5e (197 TFLOPS BF16, 819 GB/s) shows 12 TFLOPS effective
  throughput during profiling (6.1% MFU). The kernel does: load attention KV cache (batch=1, L=512, H=16,
  D=128, BF16), and compute 1 decode step.'
question: Is the 12 TFLOPS decode kernel compute- or memory-bound, what is the attainable performance,
  and which optimization gives the largest gain?
details:
  realistic_solution: 'Decode step (batch=1): load KV for all 512 context tokens. KV size: 512 * 16 heads
    * 128 * 2 * 2 bytes = 4MB. Weight loads: 4 projection matrices * 4096^2 * 2 = 134MB. Attention compute:
    2*1*512*128*16 = 2M FLOPs. Weight FLOPs: 2*4096^2*4 = 134M FLOPs. Total FLOPs ~136M. AI = 136M / 138MB
    ≈ 1 FLOP/byte. The kernel is extremely memory bound. The memory roofline limit is 138MB / 819GB/s
    = 0.168 ms, capping maximum throughput at ~0.8 TFLOPS. Therefore, the 12 TFLOPS figure from profiling
    is physically impossible and indicates a profiling error. To optimize the memory bottleneck, use Grouped
    Query Attention (GQA) and increase batch size.'
  common_mistake: '**The Pitfall:** Blaming compute efficiency (low MFU) for the poor performance.

    **The Rationale:** Candidates see 6.1% MFU and assume the kernel logic is bad, failing to realize
    that batch=1 decoding is overwhelmingly memory-bandwidth bound.

    **The Consequence:** Wasting time unrolling loops or tweaking instructions when the only way to improve
    throughput is to reduce memory traffic (e.g., using Grouped Query Attention) or increase batch size.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Hardware: TPU v5e (197 TFLOPS BF16, 819 GB/s).

    - Config: Batch=1, L=512, H=16, D=128, BF16.


    **Calculations:**

    - Memory: KV = 4 MB, Weights = 134 MB. Total = 138 MB.

    - Compute: KV = 2M FLOPs, Weights = 134M FLOPs. Total = 136M FLOPs.

    - AI = 136M / 138MB ≈ 1 FLOP/byte.

    - Roofline limits: Compute min time = 136M / 197T = 0.00069 ms. Memory min time = 138MB / 819GB/s
    = 0.168 ms.

    - Max Throughput: 136M FLOPs / 0.168 ms ≈ 0.8 TFLOPS.


    **Conclusion & Interpretation:**

    - **Result: Physically Impossible**. The kernel is strictly memory-bound to a maximum of 0.8 TFLOPS,
    making the profiled 12 TFLOPS an impossibility.'
