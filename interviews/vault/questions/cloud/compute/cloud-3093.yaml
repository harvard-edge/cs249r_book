title: 'Systolic Array Realization: Size Systolic Array for Attention Layer'
scenario: You need to size a systolic array to process a multi-head attention layer (hidden=2048, heads=16, seq=512, batch=32, BF16) on a TPU v5e. Each systolic array tile is 128x128.
question: How much memory and compute time does this attention layer need, and how many 128x128 systolic-array tiles are required?
details:
  realistic_solution: 'Q weight: hidden*hidden = 2048*2048*2 = 8MB. K, V, O weights: same, 8MB each. Q projection output: batch*seq*hidden = 32*512*2048*2 = 67MB. K, V outputs: same, 67MB each. Attention scores: batch*heads*seq*seq = 32*16*512*512*2 = 268MB. Context (V-weighted): 32*512*2048*2=67MB. Total activation: ~536MB. Weights: 32MB. Grand total: ~568MB - fits in 16GB. Compute: QKV + O projection FLOPs = 4*2*32*512*2048^2 = 550G. Attention (QK^T + Attn*V): 2 * 2*32*16*512^2*128 = 68.7G. Total: ~618.7G. Time: 618.7G/197T = 3.14ms.'
  common_mistake: |
    **The Pitfall:** Computing memory for only the Q, K, V weight matrices.
    **The Rationale:** Candidates often forget the intermediate state generated during forward passes.
    **The Consequence:** They fail to include the intermediate activation tensors (Q, K, V projections and attention scores) that must reside in HBM, leading to severe memory under-provisioning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dim=2048, heads=16, seq=512, batch=32, BF16. TPU v5e (197 TFLOPS).
    - 128x128 tiles (32KB).
    
    **Calculations:**
    - Total Memory: Weights (32MB) + Activations (536MB) = 568 MB.
    - Compute: Projections (550 GFLOPs) + Attention (68.7 GFLOPs) = 618.7 GFLOPs.
    - Time: 618.7 GFLOPs / 197 TFLOPS = 3.14 ms.
    - Projection Tiles: (16384/128) * (2048/128) * (2048/128) = 32,768 tiles. 4 Projections = 131,072 tiles.
    
    **Conclusion & Interpretation:**
    - **Result: 3.14ms compute (Compute-Bound)**. The layer easily fits in 16GB HBM and computes in 3.14ms using 131,072 tile operations.
