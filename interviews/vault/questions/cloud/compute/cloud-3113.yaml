title: 'Transformer Cost Implement: Chinchilla Optimal Model Size Calculation'
scenario: Implement the Chinchilla optimal model size and token count for a fixed compute budget of $100K on a GPU cluster ($2.50/hr, 40% MFU, 989 TFLOP/s FP16). Use C = 6ND and the Chinchilla-optimal ratio D/N = 20.
question: For a $100K budget, what Chinchilla-optimal model size and token count should you train, and how does it compare to a 7B run?
details:
  realistic_solution: The $100K budget buys $100,000 / $2.50 = 40,000 GPU-hours. At 989 TFLOP/s and 40% MFU, total compute is about 5.70e22 FLOPs. With C = 6ND and D = 20N, C = 120N^2, so N = sqrt(C/120) = 21.8B parameters and D = 20N = 436B tokens. A 7B model using the same compute would be trained on C/(6*7B) = 1.36T tokens, far above its Chinchilla-optimal 140B tokens. The 7B run uses the budget but is over-trained and under-parameterized relative to the compute-optimal ~22B model.
  common_mistake: |
    **The Pitfall:** Using the simplified Chinchilla rule (D=20*N) without accounting for the fixed compute budget.
    **The Rationale:** Engineers fail to realize that the compute budget C = 6*N*D determines both N and D jointly, not independently.
    **The Consequence:** Suboptimal model sizing that fails to maximize performance for a given monetary budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: $100K.
    - Hardware: $2.50/hr, 989 TFLOPs FP16, 40% MFU.
    - Scaling: C = 6ND, D = 20N.

    **Calculations:**
    - Compute (C): ($100K / $2.50) × 3600s × 989e12 × 0.4 ≈ 5.696e22 FLOPs.
    - Optimal Size (N*): sqrt(C / 120) = sqrt(5.696e22 / 120) ≈ 21.8B parameters.
    - Optimal Tokens (D*): 20 × 21.8B ≈ 436B tokens.
    - 7B Tokens: 5.696e22 / (6 × 7e9) = 1.356T tokens.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. A ~22B model trained on ~436B tokens is compute-optimal for the budget; a 7B run would consume the same compute only by training on ~1.36T tokens, which is far beyond its compute-optimal token count.
