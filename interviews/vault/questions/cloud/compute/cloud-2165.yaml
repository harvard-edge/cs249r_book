title: 'CUDA Warp Size: Why 100 Threads per Block Is Inefficient'
scenario: A junior engineer writes a CUDA kernel launching 100 threads per block to process a 100-element vector. They notice that GPU utilization is low even though every thread has work.
question: How many threads actually execute per scheduling unit on an NVIDIA GPU, and why does launching 100 threads per block waste resources?
details:
  realistic_solution: 'NVIDIA GPUs execute threads in groups of 32 called warps. A block of 100 threads creates 4 warps: three full warps (32 threads each = 96 threads) and one partial warp with only 4 active threads. That last warp wastes 28/32 = 87.5% of its execution slots. The SM must still schedule and execute the full warp, but 28 lanes sit idle. Rounding block size up to 128 (4 full warps) eliminates the partial warp entirely.'
  common_mistake: |
    **The Pitfall:** Thinking that every thread maps to an independent execution unit, like CPU cores.
    **The Rationale:** Engineers unfamiliar with SIMT architecture assume all 100 threads run independently and efficiently.
    **The Consequence:** Launching thread counts that are not multiples of the warp size, resulting in significant idle lane wastage in the scheduling units.
  napkin_math: |
    **Assumptions & Constraints:**
    - Threads per block: 100.
    - Threads per warp: 32.

    **Calculations:**
    - 100 threads / 32 threads per warp = 3 full warps + 1 partial warp (4 threads).
    - Utilization of partial warp: 4 / 32 = 12.5%.
    - Overall warp execution efficiency: 100 active lanes / 128 scheduled lanes = 78.1%.

    **Conclusion & Interpretation:**
    - **Result: 4 warps are scheduled for 100 threads, and the last warp has 28 idle lanes.** Padding the block size to 128 threads fills all four warps and avoids partial-warp lane waste.
