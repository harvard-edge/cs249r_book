title: 'Warp Scheduling and Latency Hiding'
scenario: 'An SM has 4 SIMD units, each processing a 64-thread wavefront. A memory-bound kernel issues a global memory load (300 cycle latency) every 10 instructions.'
question: 'With 100 active cycles in a 310-cycle interval, what memory-stall fraction does the kernel experience?'
details:
  realistic_solution: 'Stall fraction = (total - active) / total = (310 - 100) / 310 = 210/310 = 67.7%.'
  common_mistake: |
    **The Pitfall:** Calculating theoretical occupancy without factoring in hardware limits on wavefronts.
    **The Rationale:** Engineers apply the math perfectly but ignore register file size, shared memory, and thread block limits.
    **The Consequence:** The assumed theoretical latency hiding is impossible to achieve in practice, leading to persistent memory stalls despite "optimized" code.
  napkin_math: |
    **Assumptions & Constraints:**
    - 310 total cycles.
    - 100 active cycles.

    **Calculations:**
    - Idle time: Idle (stall) cycles = 310 - 100 = 210.
    - Stall fraction: 210 / 310 ≈ 0.677.

    **Conclusion & Interpretation:**
    - **Result: 67.7% memory stall fraction (Memory-Bound)**. The kernel experiences a high stall fraction despite assumed theoretical latency hiding.
