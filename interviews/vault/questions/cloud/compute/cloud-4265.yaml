title: Coherency Domains Across XCDs
scenario: You are designing a custom all-reduce kernel for MI300X that shares intermediate reduction buffers across XCDs.
question: What coherency constraints must you enforce across XCDs when sharing intermediate reduction buffers?
details:
  realistic_solution: Treat cross-XCD sharing as a global-memory synchronization problem, not as transparent L2 sharing. Intermediate reduction data must be written to globally visible memory, ordered with platform-appropriate ROCm/HIP memory-scope barriers or collective-library primitives, and read only after all participating XCDs have reached the synchronization point. Avoid relying on cache-resident intermediate state becoming visible across XCDs without an explicit ordering and visibility contract.
  common_mistake: |
    **The Pitfall:** Assuming cache coherency is handled transparently across XCDs like within a single GPU SM cluster.
    **The Rationale:** Developers used to monolithic GPUs assume that L2 cache writes are globally visible without explicit memory fencing.
    **The Consequence:** Stale L2 reads across XCD boundaries that produce corrupted, incorrect gradients during distributed training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 XCDs participate in a custom reduction.
    - Intermediate buffers are shared across XCD boundaries.
    - Correctness requires global visibility and ordering before a remote XCD consumes another XCD's partial result.

    **Calculations:**
    - Per reduction phase, each producer must publish its partial result to globally visible memory.
    - Each consumer can safely read remote partials only after the relevant synchronization point has completed.
    - The correctness cost scales with the number of synchronization phases and remote partial reads, not with `200ns * 8 * 1000` from the previous unsupported estimate.

    **Conclusion & Interpretation:**
    - **Result: enforce global-memory ordering and visibility at each cross-XCD reduction phase.** Use ROCm/HIP memory-scope synchronization or RCCL-style collectives rather than assuming L2-resident data is automatically coherent across XCDs.
