title: 'The Blackwell Bet: A $100M GPU Upgrade Decision'
scenario: You are the technical lead for the ML training platform at a leading autonomous vehicle company. Your cluster currently consists of thousands of H100 GPUs. The finance department has asked you to evaluate a $100M+ proposal to upgrade the entire fleet to the new B200 architecture.
question: How would you evaluate the $100M fleet upgrade beyond headline TFLOPS?
details:
  realistic_solution: |
    The correct L6+ approach is to build a workload-specific ROI model, not a peak-TFLOPS comparison. First profile representative training, simulation, and inference jobs to measure arithmetic intensity, HBM bandwidth use, Tensor Core utilization, communication time, input pipeline stalls, and end-to-end tokens or samples per second. Use roofline analysis to separate compute-bound workloads from memory-bound workloads, then include multi-node effects such as NVLink/NVSwitch, InfiniBand, checkpointing, and parallelism strategy. Compare measured throughput per dollar and per watt, not just FLOPS/W: acquisition cost, power and cooling, rack density, networking changes, software migration risk, kernel maturity, availability, and schedule risk all belong in the TCO model. The upgrade is justified only if representative workloads show enough end-to-end throughput/$ or time-to-train improvement to pay back the $100M investment.
  common_mistake: |
    **The Pitfall:** Basing the ROI strictly on peak TFLOPS ratios.
    **The Rationale:** Candidates think "2.27x more TFLOPS means 2.27x faster," completely ignoring memory bandwidth and arithmetic intensity.
    **The Consequence:** Spending $100M on hardware that provides zero speedup if the workload is actually memory-bandwidth-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute-bound workloads scale mostly with sustained FLOP/s.
    - Memory-bound workloads scale mostly with sustained HBM bandwidth.
    - Fleet decisions should use measured tokens/s/$, samples/s/$, and tokens/J, not peak TOPS/W alone.
    - H100 Ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.

    **Calculations:**
    - Workload A measured AI: 1000 FLOPs/byte > 295 FLOPs/byte, so it is compute-bound on H100 if kernels sustain high Tensor Core utilization.
    - Workload B measured AI: 5 FLOPs/byte < 295 FLOPs/byte, so it is memory-bandwidth-bound on H100.
    - If B200 improves peak compute by about 2.3x but bandwidth by about 2.3-2.4x, Workload A might approach the compute speedup while Workload B is capped by the bandwidth speedup.
    - If networking, dataloading, or optimizer/checkpoint overhead is 25% of step time and does not improve, even a 2.3x GPU-kernel speedup yields only 1 / (0.75 / 2.3 + 0.25) ≈ 1.74x end-to-end.

    **Conclusion & Interpretation:**
    - **Result: Workload-Specific ROI Decision**. Roofline tells you which hardware resource matters, but the purchase decision comes from measured end-to-end throughput per dollar and per watt after accounting for interconnect, utilization, migration risk, and TCO.
