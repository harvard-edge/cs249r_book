title: 'MI300X Roofline vs H100: Memory-Bound vs Compute-Bound Boundary'
scenario: A LLaMA-2 70B attention layer during autoregressive decode has arithmetic intensity of 0.8 FLOP/byte. The AMD MI300X has 5.3 TB/s HBM3 bandwidth and 1,307 TFLOPS FP16, while the NVIDIA H100 SXM5 has 3.35 TB/s HBM3 and 989 TFLOPS FP16.
question: What are the MI300X and H100 roofline ridge points, and which has higher LLaMA-2 70B decode throughput at AI=0.8 FLOP/byte?
details:
  realistic_solution: 'Roofline ridge points: MI300X: 1,307 TFLOPS / 5.3 TB/s = 246.6 FLOP/byte. H100: 989 TFLOPS / 3.35 TB/s = 295.2 FLOP/byte. Both ridge points are far above AI=0.8 FLOP/byte, confirming the attention decode is memory-bound on both. In the memory-bound regime, throughput = bandwidth × AI × efficiency factor. MI300X: 5.3 TB/s × 0.8 FLOP/byte = 4.24 TFLOPS effective. H100: 3.35 TB/s × 0.8 = 2.68 TFLOPS effective. Ratio: 4.24/2.68 = 1.58×. The MI300X achieves 58% higher attention decode throughput due solely to bandwidth advantage, despite H100 having a higher peak TFLOPS.'
  common_mistake: |
    **The Pitfall:** Comparing peak TFLOPS without first checking whether the kernel is memory-bound or compute-bound.
    **The Rationale:** Many engineers default to FLOPs as the primary metric of accelerator performance.
    **The Consequence:** Sub-optimal hardware selection for inference, as peak FLOP/s is irrelevant for deeply memory-bound operations like attention decode at low batch sizes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X: BW=5.3 TB/s, Peak=1307 TFLOPS.
       - H100: BW=3.35 TB/s, Peak=989 TFLOPS.
       - Arithmetic Intensity (AI) = 0.8 FLOP/byte.
    2. **Calculations:**
       - MI300X Ridge: 1307 / 5.3 = 246.6 FLOP/byte.
       - H100 Ridge: 989 / 3.35 = 295.2 FLOP/byte.
       - AI (0.8) < Both Ridges -> Workload is strictly Memory-Bound.
       - MI300X effective throughput: 5.3 TB/s * 0.8 FLOP/byte = 4.24 TFLOPS.
       - H100 effective throughput: 3.35 TB/s * 0.8 FLOP/byte = 2.68 TFLOPS.
       - Throughput ratio: 4.24 / 2.68 = 1.58x.
    3. **Conclusion & Interpretation:**
       - **Result: MI300X delivers 58% higher token throughput.** The workload is completely bottlenecked by memory bandwidth, negating the need for higher FLOPs.
