title: 'TPU v5e vs H100: Systolic Array Efficiency for Transformer Training'
scenario: TPU v5e delivers 197 TFLOPS BF16 with 819 GB/s HBM bandwidth. H100 SXM5 delivers 989 TFLOPS FP16 with 3,350 GB/s HBM bandwidth. You are analyzing a 7B transformer training workload (attention + FFN layers) with an arithmetic intensity of roughly 100 FLOPs/byte on the full forward+backward pass.
question: At AI≈100 FLOP/byte for 7B transformer training, which accelerator delivers higher effective throughput and MFU, and why?
details:
  realistic_solution: 'At AI=100 FLOP/byte, compare each device to its roofline ridge point. TPU v5e ridge point is 197 TFLOPS / 819 GB/s = 240.5 FLOP/byte; H100 ridge point is 989 TFLOPS / 3,350 GB/s = 295.2 FLOP/byte. Since AI=100 is below both ridge points, both are memory-bound. Effective throughput is therefore bandwidth * arithmetic intensity: TPU v5e reaches about 81.9 TFLOPS, while H100 reaches about 335 TFLOPS, so H100 has about 4.1x higher effective throughput. If MFU is measured as achieved FLOPs divided by peak FLOPs at this AI, TPU v5e is about 81.9/197 = 42% and H100 is about 335/989 = 34%; that higher fraction does not overcome H100''s much larger bandwidth and peak.'
  common_mistake: |
    **The Pitfall:** Directly comparing peak TFLOPS without accounting for Model FLOP Utilization (MFU) differences.
    **The Rationale:** Ignoring how different hardware architectures (systolic array vs SIMT) achieve different utilization rates for transformer workloads.
    **The Consequence:** Misestimating actual training times because TPU v5e achieves 45-60% MFU due to systolic array design, whereas H100 achieves 35-55% MFU due to warp scheduling overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e: 197 TFLOPS peak, 819 GB/s HBM.
    - H100: 989 TFLOPS peak, 3,350 GB/s HBM.
    - Workload arithmetic intensity: 100 FLOP/byte.

    **Calculations:**
    - TPU ridge point = 197,000 / 819 = 240.5 FLOP/byte.
    - H100 ridge point = 989,000 / 3,350 = 295.2 FLOP/byte.
    - AI=100 is below both ridge points, so both are memory-bound.
    - TPU effective throughput = 819 GB/s * 100 = 81.9 TFLOPS.
    - H100 effective throughput = 3,350 GB/s * 100 = 335 TFLOPS.
    - Throughput ratio = 335 / 81.9 = 4.1x.
    - Roofline MFU at this AI: TPU = 81.9 / 197 = 42%; H100 = 335 / 989 = 34%.

    **Conclusion & Interpretation:**
    - **Result: H100 has 4.1x higher effective throughput (Memory-Bandwidth-Bound)**. TPU v5e uses a larger fraction of its lower peak at AI=100, but H100 is still faster because its memory bandwidth is much higher.
