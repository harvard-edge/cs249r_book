title: AMD MI300X HBM/Compute Bottleneck and Cost Analysis for LLM Inference
scenario: You are designing an inference service for a large language model (LLM) on an AMD MI300X GPU. The model has an FP16 precision, requires 100 TFLOPs of computation per inference, and has an active memory footprint of 100 GB. Each inference involves reading the 100 GB model data from HBM. The operational cost is $30 per hour.
question: Is the 100 TFLOP, 100 GB-per-inference MI300X service compute-bound or memory-bound, and what are the max inferences/sec and cost/inference?
details:
  realistic_solution: 'Calculate both the compute throughput and the memory throughput independently using the hardware peak specifications, then identify the limiting factor (the bottleneck). Finally, derive the cost per inference based on the bottlenecked throughput.'
  common_mistake: |
    **The Pitfall:** Incorrectly assuming compute or memory bandwidth is the bottleneck without calculation.
    **The Rationale:** Candidates often guess based on general intuition instead of using the hardware specs.
    **The Consequence:** They fail to account for the utilization efficiency factor, miscalculate throughput, and derive an incorrect cost per inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model requires 100 TFLOPs and 100 GB memory read per inference.
    - MI300X offers 1300 TFLOPS peak FP16 (assume 50% efficiency = 650 TFLOPS) and 5.3 TB/s memory bandwidth.
    - Operational cost is $30 per hour.

    **Calculations:**
    - Compute capacity: 1300 TFLOPS * 0.5 = 650 TFLOPS.
    - Compute throughput: 650 TFLOPS / 100 TFLOPs = 6.5 inferences/s.
    - Memory throughput: 5300 GB/s / 100 GB = 53 inferences/s.
    - Bottleneck: MIN(6.5, 53) = 6.5 inferences/s.
    - Cost per inference: $30 / (6.5 * 3600) = $0.00128.

    **Conclusion & Interpretation:**
    - **Result: $0.00128 per inference (Compute-Bound)**. The workload is strictly limited by compute.
