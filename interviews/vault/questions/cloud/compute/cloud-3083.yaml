title: 'Systolic Array Analyze: Why TPU v5e Outperforms GPU for Matrix Multiply'
scenario: Explain why a TPU v5e (197 TFLOPS BF16) can often outperform an H100 (989 TFLOPS FP16) for inference on a BERT-large workload, despite having 5x lower peak FLOP rate. Use arithmetic intensity, data reuse, and the weight-stationary dataflow to analyze the performance gap.
question: Why does a TPU v5e often outperform an H100 for BERT-large inference despite a 5x lower peak FLOP rate?
details:
  realistic_solution: 'BERT-large inference at small batch sizes is heavily memory-bandwidth bound. The H100 reads weights from HBM to SRAM for each batch. The TPU v5e features a systolic array with a weight-stationary dataflow. For models that fit within the local SRAM or allow high reuse, the TPU keeps weights stationary in the matrix multiply units, driving the effective arithmetic intensity up. Because it avoids repeated HBM reads for weights during the matrix multiply, the TPU spends more time computing rather than waiting on memory, overcoming its 5x lower peak FLOP deficit compared to the H100''s memory-bound execution.'
  common_mistake: Equating peak TFLOPS with real-world throughput without considering that the systolic array's weight-stationary dataflow achieves near-100% weight reuse, eliminating memory bandwidth as a bottleneck for batch inference.
  napkin_math: 'H100 Memory Bandwidth: 3.35 TB/s. TPU v5e Memory Bandwidth: 819 GB/s. With weight-stationary dataflow, TPU loads weights once into SRAM/registers. H100 at small batch is memory bound, achieving maybe 5-10% MFU (~50-100 TFLOPS). TPU achieves high MFU on systolic array (~60-70%), yielding ~120-140 effective TFLOPS, beating H100.'
