title: The Matrix Multiply FLOP Count
scenario: A single fully connected layer maps a batch of 64 vectors from dimension 4096 to dimension 4096.
question: How many floating-point multiply-accumulate operations (MACs) and total FLOPs does this layer require?
details:
  realistic_solution: MACs = B * M * N = 64 * 4096 * 4096 = 1.07 billion MACs. FLOPs = 2 * MACs = 2.15 billion FLOPs (~2.15 GFLOPs). Using nsys profiling on an A100 with 312 TFLOPS FP16 peak, this single layer takes ~7 microseconds at peak utilization.
  common_mistake: |
    **The Pitfall:** Confusing MACs with FLOPs or forgetting the batch dimension.
    **The Rationale:** It's easy to assume 1 MAC = 1 FLOP, forgetting that a Multiply-Accumulate represents two distinct floating-point operations (one multiply, one add).
    **The Consequence:** The computed hardware utilization or time floor will be off by exactly a factor of 2x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch (B): 64.
       - Dimensions: M=4096, N=4096.
    2. **Calculations:**
       - MACs = 64 * 4096 * 4096 = 1,073,741,824 MACs.
       - FLOPs = 2 * MACs = 2,147,483,648 FLOPs.
    3. **Conclusion & Interpretation:**
       - **Result: 1.07B MACs and 2.15 GFLOPs.** (Compute-Bound)
