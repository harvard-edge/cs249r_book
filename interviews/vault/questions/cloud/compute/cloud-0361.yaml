title: The Roofline Litmus Test (cloud-0361)
scenario: An engineer is analyzing two models on an NVIDIA GPU with a Roofline 'ridge point' of 295 Ops/Byte. Model A has an arithmetic intensity of 400 Ops/Byte, while Model B has an arithmetic intensity of 150 Ops/Byte.
question: For a ridge point of 295 Ops/Byte, are Model A at 400 Ops/Byte and Model B at 150 Ops/Byte compute- or memory-bound?
details:
  realistic_solution: The hardware's ridge point is the critical threshold. A model is compute-bound if its arithmetic intensity is greater than the ridge point, and memory-bound if it's less.
  common_mistake: |
    **The Pitfall:** Confusing high arithmetic intensity with being memory-bound.
    **The Rationale:** Engineers sometimes think many operations per byte means the model is constantly waiting for data.
    **The Consequence:** Misidentifying the bottleneck leads to applying the wrong optimizations (e.g., trying to compress weights for a compute-bound model).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ridge point (Machine Balance) = 295 Ops/Byte.
       - Model A arithmetic intensity = 400 Ops/Byte.
       - Model B arithmetic intensity = 150 Ops/Byte.
    2. **Calculations:**
       - Model A: 400 Ops/Byte > 295 Ops/Byte.
       - Model B: 150 Ops/Byte < 295 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound and Memory-Bound.** Model A is compute-bound because it exceeds the ridge point; Model B is memory-bound because it falls short of it.
  options:
  - Model A is memory-bound, Model B is compute-bound.
  - Both models are compute-bound.
  - Both models are memory-bound.
  - Model A is compute-bound, Model B is memory-bound.
