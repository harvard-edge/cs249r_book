title: Diagnosing Memory and Latency Blowup in FHE Inference
scenario: You are debugging a healthcare inference pipeline running an FHE-encrypted CNN (CKKS scheme). The plaintext model processes an image in 20ms using 150MB of RAM. Under FHE, inference takes 45 minutes and consumes 120GB of RAM per image, causing OOM kills when concurrent requests > 1. Profiling shows 90% of time and memory is consumed by `Bootstrap` and `EvalMult` operations evaluating non-linear activations.
question: Why does the FHE CNN take 45 minutes and 120GB per image, and what model changes could make it practical?
details:
  realistic_solution: |
    The root cause is excessive multiplicative depth and ciphertext volume, especially from polynomial approximations to ReLU. A degree-7 approximation can add several multiplicative levels per activation block, causing noise growth that forces expensive bootstrapping operations. Replacing ReLU with an FHE-friendly low-degree activation such as x^2 is a good direction, but it is only sufficient if the full CNN is also retuned for packing, ciphertext count, precision, and leveled-FHE parameters so the circuit fits within the depth budget.
  common_mistake: |
    **The Pitfall:** Attempting to solve FHE overhead by simply scaling up hardware.
    **The Rationale:** Cloud engineers are accustomed to solving OOM and CPU bottlenecks by throwing larger instances at the problem.
    **The Consequence:** Failing to realize that deeper circuits consume the noise budget and trigger repeated bootstrapping, making hardware scaling ineffective without algorithmic circuit depth reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FHE Expansion: ~10,000x over plaintext.
       - Bootstrapping Cost: 30-60s and >5GB RAM per occurrence.
       - Profiling attributes 90% of the 45-minute runtime and 120GB memory footprint to Bootstrap and EvalMult operations.
    2. **Calculations:**
       - Polynomial approximation: ReLU degree-7 can require about 3 multiplicative levels per activation block.
       - Low-degree activation: x^2 requires 1 multiplicative level, reducing noise growth per activation.
       - The profiled upper bound on removable overhead is 90% of 45 minutes: about 40.5 minutes, but this is only removable if the retuned circuit actually avoids those bootstraps.
       - x^2 alone reduces activation depth; packing strategy, ciphertext count, precision, and parameter selection determine whether the whole CNN fits leveled FHE.
    3. **Conclusion & Interpretation:**
       - **Result: Multiplicative Depth-Bound.** Use an FHE-friendly activation and retune the full CNN to fit the leveled-FHE depth and packing budget; x^2 helps, but does not by itself guarantee practical latency or memory.
