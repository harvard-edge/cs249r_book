title: Jacobian Computation for Low-Dimensional Inputs
scenario: A differentiable physics engine running on a cloud GPU maps a 10-dimensional vector of control parameters to a 50,000-dimensional simulated state output. The system must compute the full 50,000 x 10 Jacobian matrix to optimize the control parameters.
question: Which automatic differentiation mode should be used to compute the Jacobian, and how many passes will it require?
details:
  realistic_solution: Use forward-mode AD with dual numbers. Forward mode computes derivatives for all 50,000 outputs with respect to one input direction per pass, so a 10-input system needs 10 passes to assemble the full 50,000 x 10 Jacobian.
  common_mistake: |
    **The Pitfall:** Defaulting to reverse-mode automatic differentiation (standard backpropagation).
    **The Rationale:** ML engineers are so accustomed to reverse-mode AD for training scalar loss functions that they blindly apply it to all differentiable scenarios.
    **The Consequence:** Triggering 50,000 separate backward passes, slowing down optimization by orders of magnitude compared to forward-mode AD.
  napkin_math: |
    **Assumptions & Constraints:**
    - Function maps N = 10 inputs to M = 50,000 outputs.
    - Full Jacobian matrix is 50,000 x 10.

    **Calculations:**
    - Reverse-mode AD computes derivative of ONE selected output w.r.t all inputs in a single backward pass. Assembling the full Jacobian this way requires one backward pass per output, so total passes = M = 50,000.
    - Forward-mode AD computes derivative of all outputs w.r.t ONE input in a single pass. Total passes = N = 10.
    - Passes ratio: 50,000 / 10 = 5,000x.

    **Conclusion & Interpretation:**
    - **Result: 10 Forward-Mode Passes.** Forward-mode AD is the right choice for this 10-input, 50,000-output Jacobian because it needs one pass per input dimension, 5,000x fewer passes than one-output-at-a-time reverse mode.
