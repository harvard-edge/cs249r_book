title: Coherency Protocol Overhead Across XCD Boundaries
scenario: A JAX XLA operator fusion pass that works well on an older monolithic GPU causes a 40% slowdown on a chiplet-based accelerator. The fused kernel accesses tensors allocated on different Accelerator Complex Dies (XCDs).
question: "Why does XLA fusion slow down 40% when tensors are on different XCDs, and how would you fix the data placement?"
details:
  realistic_solution: Chiplet architectures use a cache-coherent NUMA (Non-Uniform Memory Access) model. When a fused kernel on XCD-A accesses memory resident on XCD-B, the coherency protocol must issue Infinity Fabric directory lookups, introducing severe latency per cache miss. The fix is to provide explicit memory placement hints (`hipMemAdviseSetPreferredLocation` or equivalent XLA buffer assignment annotations) to strictly co-locate tensor memory with the execution XCD.
  common_mistake: |
    **The Pitfall:** Disabling the XLA fusion pass entirely.
    **The Rationale:** Engineers assume the compiler's fusion heuristic itself is broken rather than diagnosing the underlying physical memory placement on the multi-die interconnect.
    **The Consequence:** Losing the immense memory-bandwidth and kernel-launch overhead savings of fusion, permanently degrading throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cross-XCD cache miss penalty: ~400 ns.
       - Base kernel execution time: 1 ms (1,000 us).
    2. **Calculations:**
       - Bad placement: 1,000 cross-XCD misses * 400 ns = 400,000 ns = 400 us overhead.
       - Total time: 1,000 us + 400 us = 1,400 us (40% slowdown).
       - Good placement: Cross-XCD misses drop to ~50 (compulsory edge cases).
       - New overhead: 50 * 400 ns = 20,000 ns = 20 us.
       - New total time: 1,000 us + 20 us = 1,020 us (2% overhead).
    3. **Conclusion & Interpretation:**
       - **Result: 400us NUMA Penalty.** The fused kernel is heavily **Interconnect-Latency-Bound** due to remote die memory accesses, completely fixed via locality hints.
