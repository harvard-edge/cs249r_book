title: Evaluating FHE for Cloud-Based CNN Inference
scenario: A medical imaging provider wants to run a cloud-based CNN (ResNet-50, 4 GFLOPs) for tumor detection
  on encrypted X-rays. They are evaluating Fully Homomorphic Encryption (FHE) using the CKKS scheme. The
  SLA requires processing one image within 10 seconds. In plaintext, a T4 GPU processes an image in 10ms.
  Evaluate the feasibility of an FHE-based architecture for this workload, considering the computational
  overhead of ciphertext multiplications and bootstrapping, and justify your architectural decision.
question: Can a CKKS FHE architecture meet the 10-second ResNet-50 encrypted X-ray SLA, and what alternative
  would you choose?
details:
  realistic_solution: Reject pure FHE for this CNN due to the SLA violation. Propose a Trusted Execution
    Environment (TEE) like AWS Nitro Enclaves or AMD SEV-SNP, which offers memory encryption with only
    a ~1.1x to 1.5x latency overhead, easily meeting the 10s SLA.
  common_mistake: '**The Pitfall:** Treating Fully Homomorphic Encryption as plug-and-play for neural
    networks.

    **The Rationale:** Candidates often assume FHE can run deep CNNs natively, failing to account for
    the massive 10,000x computational overhead and the inability to evaluate non-polynomial functions
    like ReLU.

    **The Consequence:** Designing an architecture that misses the latency SLA by orders of magnitude
    and crashes under I/O bottlenecks.'
  napkin_math: '**Assumptions & Constraints:**

    - Plaintext latency on T4 GPU: 10 ms.

    - SLA requirement: < 10 seconds per image.

    - FHE compute overhead for deep CNNs: ~10,000x.

    **Calculations:**

    - Estimated FHE latency = 10 ms * 10,000 = 100 seconds per image.

    - 100 seconds >> 10-second SLA limit.

    **Conclusion & Interpretation:**

    - **Result: 100s Latency (Compute-Bound)**. Pure FHE fails the SLA by 10x due to bootstrapping overhead;
    TEEs must be used instead.'
