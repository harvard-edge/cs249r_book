title: 'Transformer Cost Fluency: FLOPs Estimation from Memory'
scenario: 'You need to quickly estimate training and inference compute requirements without a calculator.'
question: 'What are the 6ND GPT-3 training FLOPs, 70B inference FLOPs per token, and H100-days to train GPT-3 at 40% MFU?'
details:
  realistic_solution: 'Assuming H100 FP16 dense peak (989 TFLOPS): (1) GPT-3 training: 6 * 175B * 300B = 6 * 1.75e11 * 3e11 = 3.15e23 FLOPs. (2) 70B inference per token, batch=1: 2 * 70B = 140B FLOPs = 1.4e11 FLOPs/token. At 100 tokens: 1.4e13 FLOPs. (3) GPT-3 H100-days at 40% MFU: effective TFLOPS = 989e12 * 0.4 = 395.6e12 FLOPs/s. Total time (1 H100): 3.15e23 / 395.6e12 = 7.96e8 seconds. H100-days: 7.96e8 / 86400 = 9,215 days. Cost: 9,215 H100-days * $2.50/hr * 24 = ~$552.9K.'
  common_mistake: |
    **The Pitfall:** Not knowing the standard 6ND approximation for training or 2N for inference.
    **The Rationale:** Practitioners often rely on profiling tools instead of internalizing the fundamental scaling laws of transformer arithmetic.
    **The Consequence:** Inability to quickly sanity-check compute budgets or perform back-of-the-envelope capacity planning during system design.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Training: 175B params, 300B tokens. 40% MFU on H100 (989 TFLOPS peak).
       - Inference: 70B params.
    2. **Calculations:**
       - Training FLOPs (6ND) = 6 * 175e9 * 300e9 = 3.15e23 FLOPs.
       - Inference FLOPs/token (2N) = 2 * 70e9 = 1.4e11 FLOPs/token.
       - H100 Effective TFLOPS = 989e12 * 0.40 = ~395.6 TFLOPS.
       - H100-seconds = 3.15e23 / 395.6e12 = 7.96e8 seconds = ~9,215 days.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. Accurate back-of-the-envelope estimation allows immediate capacity planning (e.g., >9,000 H100-days required for GPT-3 scale).
