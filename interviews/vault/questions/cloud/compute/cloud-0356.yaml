title: 'H100: Compute or Memory Bound?'
scenario: An engineer is analyzing a kernel on an NVIDIA H100 GPU. For a single inference pass, the kernel performs 20 GFLOPs of computation and requires reading 200 MB of parameters from HBM3 memory.
question: Is this H100 kernel with 20 GFLOPs of work and 200 MB of HBM reads compute-bound or memory-bound, and why?
details:
  realistic_solution: The kernel is **memory-bound**. Its performance is limited by the HBM3 bandwidth, not the compute capacity. To determine this, we calculate the kernel's Arithmetic Intensity (AI) and compare it to the H100's ridge point. The ridge point is the AI at which the system transitions from being memory-bound to compute-bound.
  common_mistake: |
    **The Pitfall:** Assuming a powerful GPU like the H100 is always compute-bound.
    **The Rationale:** Engineers focus purely on the headline TFLOPS numbers without analyzing arithmetic intensity.
    **The Consequence:** They wrongly attribute low performance to insufficient compute cores, when in reality the cores are starved waiting on memory bandwidth.
  napkin_math: |
    - **Kernel Arithmetic Intensity (AI):** 20 GFLOPs (20,000 MFLOPs) / 200 MB = 100 FLOPs/Byte.
    - **H100 Ridge Point:** 989,000 GFLOPs / 3,350 GB/s ≈ 295 FLOPs/Byte.
    - **Result: Since 100 FLOPs/Byte < 295 FLOPs/Byte, the kernel's arithmetic intensity is lower than the ridge point, making it firmly memory-bound.**
  options:
  - Compute-bound. Its Arithmetic Intensity is high, so performance is limited by the 989 TFLOPS of compute.
  - Memory-bound. Its Arithmetic Intensity is 0.1 FLOPs/Byte, which is far below the H100's ridge point.
  - Memory-bound. Its Arithmetic Intensity is 100 FLOPs/Byte, which is below the H100's ridge point of ~295 FLOPs/Byte.
  - Compute-bound. Any operation performing 20 GFLOPs is inherently compute-intensive and will be limited by core speed, not memory.
  correct_index: 2
