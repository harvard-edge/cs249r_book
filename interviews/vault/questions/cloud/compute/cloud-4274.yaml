title: Infinity Fabric Topology and All-Reduce Efficiency
scenario: 'Design an optimal ring-allreduce topology for MI300X''s 8 XCDs given the physical Infinity Fabric layout.'
question: 'How does the physical topology constrain the logical ring order?'
details:
  realistic_solution: |
    Map the physical XCD layout (2×4 grid on interposer) to a ring that only traverses adjacent edges. Optimal ring follows a Hamiltonian path on the 2×4 grid: XCD0→XCD1→XCD2→XCD3→XCD7→XCD6→XCD5→XCD4→XCD0. This ensures every ring step is a single fabric hop. RCCL auto-detects this topology via the Infinity Fabric topology discovery API.
  common_mistake: |
    **The Pitfall:** Arbitrarily ordering the XCDs (0 through 7) into a sequential logical ring.
    **The Rationale:** Candidates fail to map the logical software ring to the physical 2x4 silicon interposer grid, treating all intra-package links as having equal bandwidth and latency.
    **The Consequence:** The logical ring inadvertently forces data to cross non-adjacent XCDs, maximizing multi-hop fabric transitions and permanently crippling the hardware's theoretical AllReduce bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: AMD MI300X with 8 XCDs.
    - Layout: 2x4 physical grid on the interposer.
    - Infinity Fabric Link bandwidth: 896 GB/s per single hop.

    **Calculations:**
    - Optimal Ring formula: 2 × ((N-1) / N) × BW.
    - Optimal Path (Hamiltonian cycle): single-hop between adjacent XCDs. Effective BW = 2 × (7/8) × 896 GB/s = 1,568 GB/s.
    - Random Sequential Ring: Average hop distance ≈ 1.8 hops.
    - Degraded BW = 2 × (7/8) × (896 GB/s / 1.8 hops) ≈ 871 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Topology-Bound**. Failing to align the logical NCCL/RCCL ring with the physical silicon grid induces a massive 44% bandwidth degradation. The optimal ring must strictly trace the outer Hamiltonian path.
