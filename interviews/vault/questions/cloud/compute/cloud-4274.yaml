title: Infinity Fabric Topology and All-Reduce Efficiency
scenario: Design an optimal ring-allreduce topology for MI300X's 8 XCDs given the physical Infinity Fabric layout.
question: How does the physical topology constrain the logical ring order?
details:
  realistic_solution: |
    Map the physical XCD layout to a logical ring that keeps neighboring ring steps on physically adjacent XCDs whenever possible. For a 2Ă—4 grid, a perimeter-style Hamiltonian cycle such as XCD0â†’XCD1â†’XCD2â†’XCD3â†’XCD7â†’XCD6â†’XCD5â†’XCD4â†’XCD0 minimizes long fabric traversals under the stated layout. The exact numbering can differ by platform, so production code should use the topology reported by the system and choose a ring order that minimizes multi-hop transfers rather than assuming sequential device IDs are physically adjacent.
  common_mistake: |
    **The Pitfall:** Arbitrarily ordering the XCDs (0 through 7) into a sequential logical ring.
    **The Rationale:** Candidates fail to map the logical software ring to the physical 2x4 silicon interposer grid, treating all intra-package links as having equal bandwidth and latency.
    **The Consequence:** The logical ring inadvertently forces data to cross non-adjacent XCDs, maximizing multi-hop fabric transitions and permanently crippling the hardware's theoretical AllReduce bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: AMD MI300X with 8 XCDs.
    - Layout: 2x4 physical grid on the interposer.
    - The prompt provides topology shape but not a validated per-link bandwidth model.

    **Calculations:**
    - A ring-allreduce sends data around a logical cycle.
    - If consecutive logical ranks are physical neighbors, each step uses a short local route.
    - If the ring jumps across the grid, some steps require longer routes and contend for intermediate fabric resources.
    - Without a per-link bandwidth and routing model, the exact GB/s loss is not derivable from the prompt.

    **Conclusion & Interpretation:**
    - **Result: Topology-Bound**. The correct design principle is to order the logical ring by physical adjacency and avoid unsupported bandwidth formulas or fixed degradation percentages.
