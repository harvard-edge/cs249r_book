title: Calculate AVX-512 INT8 Peak Throughput
scenario: You are optimizing an inference microservice running on an AWS C6i instance (Intel Xeon Ice Lake). The service executes a heavily quantized INT8 Transformer model.
question: What is the theoretical peak INT8 MAC throughput per clock cycle for one Ice Lake core using AVX-512 VNNI and 2 FMA units?
details:
  realistic_solution: Divide the vector register width (512 bits) by the datatype size (8 bits) to find the number of operations per instruction. Multiply by the number of execution ports (FMA units) available per cycle.
  common_mistake: |
    **The Pitfall:** Calculating compute throughput using standard FP32 element sizing.
    **The Rationale:** Defaulting to 32-bit float mental models and failing to account for the quantization multiplier.
    **The Consequence:** Underestimating the CPU's INT8 throughput by 4x, leading to poor architectural utilization of the dedicated AVX-512 VNNI silicon.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - AVX-512 Register Width: 512 bits.
       - Datatype: INT8 (8 bits).
       - FMA Units: 2 units per core.
    2. **Calculations:**
       - Operations per Vector: 512 / 8 = 64 MACs.
       - Total Peak per Cycle: 64 MACs * 2 units = 128 MACs.
    3. **Conclusion & Interpretation:**
       - **Result: 128 MACs per Clock Cycle.** Using INT8 VNNI instructions allows the CPU to process a massive 128 Multiply-Accumulate operations every single clock cycle per core.
