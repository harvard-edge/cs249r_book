title: 'Gradient Checkpointing: The Memory-Compute Trade'
scenario: Your 96-layer LLM training run OOMs on an 80GB GPU. Without checkpointing, activation memory is 48 GB. You enable gradient checkpointing, saving activations at every sqrt(96) ~ 10 layers.
question: With gradient checkpointing every 10 layers, what activation memory and training-time compute overhead should you expect?
details:
  realistic_solution: 'Without checkpointing, 96 layers of saved activations = 48 GB, or 0.5 GB/layer. With checkpoints every 10 layers, the model has 10 chunks: nine 10-layer chunks and one 6-layer chunk. Storing the chunk inputs is about 10 checkpoint tensors, or ~5 GB under this simplified linear model. During backward, one chunk is recomputed at a time, adding at most ~5 GB of transient activations for a 10-layer chunk, so peak activation memory is roughly ~10 GB rather than 48 GB. Compute overhead is approximately one extra forward recomputation over the step; if the original step is one forward plus roughly two forward-equivalents of backward work, this is about 33% extra step FLOPs, though real implementations often land in the ~20-33% range.'
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing simply halves memory and adds 100% overhead.
    **The Rationale:** Candidates miss that storing checkpoints every sqrt(N) layers keeps only about O(sqrt(N)) saved boundary activations plus one recompute block, and they erroneously assume recomputing the forward pass doubles the *total* training time.
    **The Consequence:** Engineers miscalculate training budgets or avoid checkpointing entirely due to an exaggerated fear of compute overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 96-layer LLM, 48 GB standard activation memory.
    - Checkpointing every 10 layers.
    - Use a rough linear activation model: each layer contributes 0.5 GB of saved activation state.
    **Calculations:**
    1. Per-layer saved activation size: 48 GB / 96 = 0.5 GB/layer.
    2. Chunks with interval 10: ceil(96 / 10) = 10 chunks.
    3. Stored chunk inputs: about 10 checkpoint tensors * 0.5 GB = ~5 GB.
    4. Largest recompute block: 10 layers * 0.5 GB = ~5 GB transient during backward.
    5. Approximate toy-model peak activation memory: 5 GB stored checkpoints + 5 GB recompute block = ~10 GB.
    **Conclusion & Interpretation:**
    - Compute overhead: non-checkpointed activations are recomputed during backward, adding up to roughly one extra forward pass. If the original step is one forward plus about two forward-equivalents of backward work, the simplified overhead is about 1/3 more step FLOPs; real runs often land around 20-33% depending on checkpoint placement and kernel mix.
