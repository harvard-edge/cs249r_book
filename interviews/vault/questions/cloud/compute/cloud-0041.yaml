title: The Batching Tipping Point
scenario: An engineering team is optimizing a BERT-Large (340M parameters) model for FP16 inference. For a single input sequence, the forward pass requires approximately 25 GFLOPs and reads 750 MB of data.
question: What is the batch-1 arithmetic intensity, and how does increasing batch size shift the workload from memory-bound to compute-bound?
details:
  realistic_solution: The workload strictly shifts from memory-bandwidth bound to compute-bound. At batch size 1, the Arithmetic Intensity (AI) is critically low, bottle-necked by transferring weights from HBM to SRAM. By increasing batch size, total FLOPs scale linearly but weight transfers do not (weights are broadcast across the batch). This drastic AI increase pushes the operation past the hardware ridge point, fully engaging the Tensor Cores.
  common_mistake: |
    **The Pitfall:** Assuming that all memory access scales linearly with batch size.
    **The Rationale:** If you double the input sequence count, intuition suggests you double the required memory read.
    **The Consequence:** Failing to realize that model weights are read exactly once per kernel launch, incorrectly concluding the workload cannot escape the memory-bandwidth wall.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch-1 Compute: 25 GFLOPs.
    - Batch-1 Memory Transfer: 750 MB.
    - Hardware Ridge Point (H100): 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/byte.

    **Calculations:**
    - Batch-1 Arithmetic Intensity (AI): 25 GFLOPs / 750 MB = 33.3 FLOPs/byte.
    - Scaling Requirement: To cross the ridge point, AI must increase by 295 / 33.3 = ~8.8x.

    **Conclusion & Interpretation:**
    - **Result: ~8.8x AI scaling (Arithmetic-Intensity Bound)**. The AI shifts from ~33 FLOPs/Byte (Memory-Bound) to over 295 FLOPs/Byte (Compute-Bound) as batch size scales past 9.
  options:
  - The workload remains memory-bound because Arithmetic Intensity is constant; both compute and memory scale linearly.
  - The workload is compute-bound at batch 1 and just becomes more compute-bound at batch 64.
  - The workload shifts from memory-bound to compute-bound as the AI increases from ~33 to ~310 Ops/Byte.
  - The workload becomes compute-bound, but its AI decreases because the memory grows faster than the compute.
