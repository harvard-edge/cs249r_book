title: Optimizing Dense GEMM on AMD MI300X with Weight-Stationary Dataflow
scenario: You are tasked with optimizing a dense matrix multiplication (GEMM) `C = A * B` on the AMD MI300X. Matrix `A` is 65536x512 (FP16) and `B` is 512x65536 (FP16). Your team is exploring a weight-stationary dataflow.
question: How would a weight-stationary dataflow work for the 65536x512 by 512x65536 FP16 GEMM on MI300X, and is it compute-bound or memory-bound?
details:
  realistic_solution: For a weight-stationary dataflow, the weight matrix is loaded into on-chip memory (e.g., systolic array buffers) and reused across computations. Input activations stream in, and partial sums accumulate on-chip before being written out. Tiling minimizes costly HBM accesses.
  common_mistake: |
    **The Pitfall:** Overlooking the specific 'sparse' designation for peak TFLOPS.
    **The Rationale:** Candidates directly apply sparse peak TFLOPS to dense operations, drastically overestimating compute capability.
    **The Consequence:** Misidentifying the bottleneck and miscalculating expected execution time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Matrix A: 65536x512 (FP16).
       - Matrix B: 512x65536 (FP16).
       - MI300X capabilities: ~650 TFLOPS dense FP16 peak (sparse peak is 1,307 TFLOPS), 5.3 TB/s HBM3.
    2. **Calculations:**
       - Total FLOPs = 2 * 65536 * 512 * 65536 ≈ 4.39 TFLOPS.
       - Minimum Data Transfer = A (64 MB) + B (64 MB) + C (8.59 GB) ≈ 8.72 GB.
       - Compute Time (Dense Peak) = 4.39 TFLOPS / 650 TFLOPS ≈ 0.0067s.
       - Memory Time = 8.72 GB / 5.3 TB/s ≈ 0.0016s.
    3. **Conclusion & Interpretation:** **Since memory time (0.0016s) < compute time (0.0067s), the GEMM is strictly Compute-Bound.**
