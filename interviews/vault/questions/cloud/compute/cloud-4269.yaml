title: Die-to-Die Link Latency vs NVLink Comparison
scenario: An engineer argues that MI300X's intra-package Infinity Fabric is equivalent to NVLink 4.0 between H100s for collective communication.
question: Is MI300X intra-package Infinity Fabric equivalent to NVLink 4.0 for collectives, quantitatively?
details:
  realistic_solution: They are not equivalent. MI300X intra-package Infinity Fabric has much lower base latency than inter-GPU NVLink, so small-message collectives can benefit from package locality. For large messages, raw link bandwidths can be in a similar range, but end-to-end collective throughput depends on topology, routing, link count, protocol overhead, and contention; equal headline bandwidth does not imply equal collective performance.
  common_mistake: |
    **The Pitfall:** Comparing peak bandwidth numbers without accounting for latency.
    **The Rationale:** Engineers assume matching bandwidth guarantees identical performance, ignoring the sub-100ns on-package latency of Infinity Fabric versus ~1-2µs for chip-to-chip NVLink.
    **The Consequence:** Inaccurate performance modeling for small-message collectives where latency dominates.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X (intra-package): sub-100ns base latency, ~896 GB/s bandwidth.
    - H100 NVLink 4.0 (inter-chip): 1-2µs base latency, 900 GB/s bandwidth.

    **Calculations:**
    - One-hop base-latency ratio: 1-2 µs / 0.05-0.10 µs ≈ 10x to 40x lower base latency for the on-package path.
    - Large message (10 GB) transfer time:
      - MI300X: 10 GB / 896 GB/s = ~11.1 ms.
      - NVLink: 10 GB / 900 GB/s = ~11.1 ms.
    - These 10 GB calculations compare only raw bandwidth-limited transfer time, not full collective algorithms across all links and participants.

    **Conclusion & Interpretation:**
    - **Result: lower latency, roughly similar raw large-message transfer time, not equivalent collectives.** MI300X is favored for latency-sensitive intra-package exchanges, while large collective performance must be measured with the actual topology and algorithm.
