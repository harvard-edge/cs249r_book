title: Dynamic Sparse Attention Pattern Implementation on H100 for Code LLM
scenario: A code generation LLM uses dynamic sparse attention where each token attends to its 256 nearest tokens + 32 global tokens (288 total). At 8K context, this reduces attention FLOPs from O(n²) to O(n*k).
question: On an H100, will dynamic sparse attention with 288 attended positions per token at 8K context be faster than dense FlashAttention, and why?
details:
  realistic_solution: Not necessarily. The 288-token sparse pattern greatly reduces nominal attention FLOPs, but on an H100 the dense baseline is a highly optimized FlashAttention kernel with strong on-chip reuse and coalesced memory access. Dynamic sparse attention adds irregular gathers, index handling, poor memory coalescing, and lower tensor-core utilization. Those effects can erase the FLOP savings at an 8K context, so sparse attention is often not faster unless the sparse pattern is block-structured and backed by a tuned kernel. The exact speedup or slowdown should be established by benchmarking the target kernel and sequence mix against dense FlashAttention.
  common_mistake: |
    **The Pitfall:** Assuming that reducing attention FLOPs proportionally reduces wall-clock time.
    **The Rationale:** Candidates ignore that sparse attention requires irregular memory access patterns that are cache-unfriendly and hard to vectorize.
    **The Consequence:** Adopting a sparse architecture that is paradoxically slower than standard dense attention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense baseline uses optimized FlashAttention on H100, not a naive materialized attention matrix.
       - Sparse pattern attends to 288 positions per token, but uses dynamic indexing and gathers.
    2. **Calculations:**
       - Nominal attention-position work falls to 288 / 8192 = 3.5% of dense.
       - That FLOP ratio does not determine latency because dense FlashAttention reuses Q/K/V on chip and streams memory efficiently.
       - Dynamic sparse kernels pay for gathers, masks/indices, lower occupancy, and non-coalesced memory access.
       - Therefore the result is kernel- and pattern-dependent; benchmarking is required for a quantitative ratio.
    3. **Conclusion & Interpretation:** **Dynamic sparse attention is not automatically faster than dense FlashAttention at 8K; irregular memory access can erase the FLOP savings.**
