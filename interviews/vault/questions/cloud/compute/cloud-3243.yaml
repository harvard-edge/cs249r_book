title: Diagnosing Underperforming LLM Inference on AMD MI300X
scenario: You are deploying a large language model (LLM) for inference on an AMD MI300X accelerator. The model, when run with a batch size of 1, consistently achieves only 1 TFLOPS FP16. Profiling shows high GPU utilization but surprisingly low effective throughput. Memory bandwidth utilization is hovering around 1 TB/s despite the 5.3 TB/s peak HBM3 bandwidth.
question: What MI300X architectural factors could explain 1 TFLOPS at batch size 1 despite high utilization and only 1 TB/s HBM bandwidth?
details:
  realistic_solution: The primary issue is a combination of extremely low occupancy and poor memory coalescing. A batch size of 1 fails to provide enough concurrent wavefronts to hide memory latencies or keep ALUs busy. Consequently, global memory accesses are uncoalesced, preventing the workload from saturating the 5.3 TB/s HBM3 peak. You must increase the batch size using continuous batching to provide sufficient work for the Matrix Cores.
  common_mistake: |
    **The Pitfall:** Attempting to optimize kernel code directly without addressing the batch size.
    **The Rationale:** Believing that complex software optimizations can overcome fundamental hardware under-subscription.
    **The Consequence:** Hundreds of hours wasted on kernel tuning that yields negligible speedups because the batch size of 1 fails to provide enough concurrent wavefronts to hide memory latencies or coalesce memory accesses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: AMD MI300X (1,300 TFLOPS peak, 5.3 TB/s peak bandwidth).
       - Workload: Batch size 1. Actual performance: 1 TFLOPS, 1 TB/s bandwidth.
    2. **Calculations:**
       - Compute Utilization = 1 TFLOPS / 1300 TFLOPS = ~0.08%.
       - Bandwidth Utilization = 1 TB/s / 5.3 TB/s = ~18.8%.
    3. **Conclusion & Interpretation:**
       - **Result: Occupancy and Memory Coalescing Bound.** The extremely low occupancy at batch=1 fails to saturate the ALUs or orchestrate contiguous memory reads, capping effective throughput dramatically below hardware capabilities.
