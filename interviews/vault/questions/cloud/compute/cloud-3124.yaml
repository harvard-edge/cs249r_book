title: Diagnose Systolic Array Underutilization for Non-Square Matrices
scenario: "A TPU v5e (256x256 systolic array, 197 TOPS BF16) is running a transformer's feedforward layer with matrix dimensions W: [8192x4096] multiplied by batch X: [1x8192] (decode mode, batch size 1). Profiling shows only 0.4% hardware utilization."
question: Why does TPU v5e utilization collapse to 0.4% at batch size 1, and what minimum batch gives over 50% utilization?
details:
  realistic_solution: 'Systolic 256×256 array operates on 256 rows simultaneously. Input [1×8192] feeds only 1 row → 255/256 = 99.6% of PEs idle. For 50% utilization: need at least 128 rows = batch size 128. At batch 128: X=[128×8192], W=[8192×4096]. The array can process 256 rows; 128/256=50% row utilization. Column dimension: 4096/256=16 tiles, each 100% utilized. Effective utilization: 50%×100%=50%. Minimum batch for 50%: 128. Practical recommendation: batch=256 for full utilization. For latency-constrained decode: use continuous batching to aggregate requests.'
  common_mistake: |
    **The Pitfall:** Attributing low utilization to a memory bandwidth bottleneck.
    **The Rationale:** It's a common heuristic that "batch size 1 is memory bound," but engineers miss the hard geometric constraint of the systolic array hardware itself.
    **The Consequence:** Engineers waste time optimizing memory access patterns or trying quantization, when the actual compute engine physically cannot accept the small matrix shape.
  napkin_math: |
    - **Array Geometry:** $256 \times 256$ processing elements.
    - **Batch 1 Utilization:** Input `[1x8192]` feeds only 1 row of the array. $1 / 256 = 0.39\%$ row utilization ($\approx 0.4\%$).
    - **Batch 128 Utilization:** $128 / 256 = 50\%$.
    - **Batch 256 Utilization:** $256 / 256 = 100\%$.
    - **Conclusion:** **Batch size 128 is the minimum for >50% utilization**, and continuous batching is required to aggregate requests.
