title: Compute Cost of Forward vs. Reverse Mode Autodiff
scenario: You are training a neural network with 100 million parameters that outputs a single scalar loss value. A single forward evaluation takes 10ms on an NVIDIA A100 GPU. A junior engineer proposes replacing standard reverse-mode differentiation with forward-mode automatic differentiation to save VRAM by not caching intermediate activations.
question: What wall-clock time would reverse-mode versus forward-mode AD take to compute the full gradient for one batch of the 100M-parameter model?
details:
  realistic_solution: Demonstrate that while forward-mode saves memory, its compute cost is O(N) forward passes. Reverse-mode computes all gradients in a single backward pass (roughly 2x the cost of a forward pass), making it the only feasible choice for training large parameter models.
  common_mistake: |
    **The Pitfall:** Assuming forward-mode and reverse-mode have similar compute complexities for large parameter counts.
    **The Rationale:** Forgetting that forward-mode compute scales linearly with the number of input parameters (N), whereas reverse-mode computes all gradients in a single backward pass.
    **The Consequence:** Attempting to implement forward-mode AD for a large neural network, resulting in infinitely long training times.
  napkin_math: |
    - Forward pass time (T_fwd) = 10 ms.
    - Standard reverse-mode time = T_fwd + T_bwd ≈ 3 * 10 ms = 30 ms.
    - Forward-mode AD computes derivatives per parameter sequentially. Time = N * T_fwd.
    - Forward-mode time = 100,000,000 * 10 ms = 1,000,000 seconds ≈ 11.57 days.
    - **Conclusion: The VRAM savings are negated by an unacceptable 11.6-day compute penalty for a single batch.**
