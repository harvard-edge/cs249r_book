title: Optimizing Cost-Performance on Google TPU v5e for LLM Inference
scenario: Your team is deploying a large language model (LLM) for real-time inference, and you've been tasked with evaluating the cost-performance trade-offs on Google TPU v5e. Each TPU v5e device has 16 GB HBM with 1.6 TB/s bandwidth and delivers 197 TFLOPS (BF16). You need to serve a 70B parameter BF16 model at 1000 QPS and 200 ms P99, assuming 1000 total prefill/decode tokens per request.
question: How would you estimate TPU v5e device count, device-hours, and cost to serve a 70B BF16 model at 200 ms P99 and 1000 QPS?
details:
  realistic_solution: |
    A realistic solution would involve: 1. Memory capacity check: 70B params * 2 bytes/param = 140 GB, so the model must be sharded across at least 9 TPU v5e devices and more in practice for KV cache and runtime overhead. 2. Latency check: 1000 QPS at 200 ms implies about 200 in-flight requests, so batching must be bounded and admission controlled. 3. FLOPs estimate: use 2 * parameters * total tokens per request, then discount peak TFLOPS to sustained throughput. 4. Bandwidth check: evaluate decode-time weight reads, KV-cache traffic, and collective communication across shards. 5. Cost: multiply required device count by service hours and the chosen TPU v5e device-hour rate, with redundancy and utilization overhead included.
  common_mistake: |
    **The Pitfall:** Considering only FLOPs and ignoring memory capacity and bandwidth.
    **The Rationale:** Candidates focus entirely on the 197 TFLOPS compute metric, completely forgetting that large models are bottlenecked by HBM limits and model sharding requirements.
    **The Consequence:** Drastically underestimating the number of devices required, leading to budget failure and inability to load the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Capacity: 70B params * 2 bytes = 140 GB. TPU v5e has 16 GB HBM.
    - Average request: 1000 total prefill/decode tokens.
    - Sustained throughput planning factor: 35% of 197 TFLOPS = ~69 TFLOPS/device.
    - Required latency: 200 ms P99 at 1000 QPS.
    - Use cost rate R dollars per TPU v5e device-hour.

    **Calculations:**
    - Min Devices (Memory): 140 GB / 16 GB = 8.75 -> 9 devices; practical replicas should use at least 10-12 devices for KV cache and overhead.
    - In-flight requests from Little's Law: 1000 QPS * 0.2 s = 200 concurrent requests.
    - FLOPs per request: 2 * 70B * 1000 = 140 TFLOPs.
    - Fleet compute needed: 140 TFLOPs/request * 1000 QPS = 140,000 TFLOPs/s.
    - Min Devices (Sustained Compute): 140,000 / 69 ≈ 2,030 TPU v5e devices before redundancy.
    - Device-hours per service hour: ~2,030 device-hours/hour; hourly cost is about 2,030 * R, plus reserve capacity.

    **Conclusion & Interpretation:**
    - **Result: About 2,030 TPU v5e devices before redundancy under the stated workload and efficiency assumptions.** The 200 ms SLA constrains batch size and requires roughly 200 concurrent in-flight requests; memory capacity sets the minimum shard size, while sustained compute, KV-cache bandwidth, and collectives set the fleet size and cost.
