title: Optimizing Cost-Performance on Google TPU v5e for LLM Inference
scenario: Your team is deploying a large language model (LLM) for real-time inference, and you've been tasked with evaluating the cost-performance trade-offs on Google TPU v5e. Each TPU v5e device has 16 GB HBM with 1.6 TB/s bandwidth and delivers 197 TFLOPS (BF16). You need to serve a 70B parameter BF16 model at 1000 QPS and 200 ms P99, assuming 1000 total prefill/decode tokens per request.
question: How would you estimate TPU v5e device count, device-hours, and cost to serve a 70B BF16 model at 200 ms P99 and 1000 QPS?
details:
  realistic_solution: |
    A realistic solution would involve: 1. Memory capacity check: 70B params * 2 bytes/param = 140 GB, so each replica needs at least 9 TPU v5e devices for weights and more like 10-12 shards after KV cache, runtime buffers, and collective overhead. 2. Latency check: 1000 QPS at 200 ms implies about 200 in-flight requests, so prefill/decode batching must be bounded by the P99 budget rather than assuming an unbounded compute batch. 3. FLOPs estimate: use 2 * parameters * total tokens per request = 140 TFLOPs/request under the stated 1000-token assumption, then discount peak TFLOPS to sustained serving utilization. 4. Bandwidth check: decode is often weight/KV bandwidth-bound, so estimate per-replica tokens/sec from measured prefill and decode batches instead of trusting peak FLOPs. 5. Cost: multiply the required replica/shard count by service hours and the chosen TPU v5e device-hour rate, with redundancy and utilization overhead included. The compute-only lower bound is about 2,030 devices at 35% sustained peak, but a practical serving estimate should be reported as a range such as roughly 2,000-3,000+ devices before redundancy, depending on batching, decode mix, shard efficiency, KV-cache bandwidth, and communication overhead.
  common_mistake: |
    **The Pitfall:** Considering only FLOPs and ignoring memory capacity and bandwidth.
    **The Rationale:** Candidates focus entirely on the 197 TFLOPS compute metric, completely forgetting that large models are bottlenecked by HBM limits and model sharding requirements.
    **The Consequence:** Drastically underestimating the number of devices required, leading to budget failure and inability to load the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Capacity: 70B params * 2 bytes = 140 GB. TPU v5e has 16 GB HBM.
    - Average request: 1000 total prefill/decode tokens.
    - Sustained throughput planning factor: 35% of 197 TFLOPS = ~69 TFLOPS/device for an optimistic compute-only lower bound.
    - Required latency: 200 ms P99 at 1000 QPS.
    - Use cost rate R dollars per TPU v5e device-hour.

    **Calculations:**
    - Min Devices per Replica (Memory): 140 GB / 16 GB = 8.75 -> 9 shards; practical replicas should use at least 10-12 shards for KV cache, runtime buffers, and collective overhead.
    - In-flight requests from Little's Law: 1000 QPS * 0.2 s = 200 concurrent requests.
    - FLOPs per request: 2 * 70B * 1000 = 140,000,000,000,000 FLOPs = 140 TFLOPs.
    - Sustained fleet compute lower bound: 140 TFLOPs/request * 1000 QPS = 140,000 TFLOPs/s, averaged over the workload rather than concentrated inside one 200 ms window.
    - Compute-only device floor: 140,000 / 69 ≈ 2,030 TPU v5e devices before redundancy.
    - Serving adjustment: pipeline/tensor-parallel efficiency, decode KV bandwidth, all-reduce/all-gather overhead, and bounded P99 batches commonly add 20-50% or more, so plan roughly 2,000-3,000+ devices before redundancy unless measurements prove higher utilization.
    - Device-hours per service hour: device count * 1 hour; hourly cost is about device_count * R, plus reserve capacity.

    **Conclusion & Interpretation:**
    - **Result: about 2,030 TPU v5e devices is only an optimistic compute floor; a realistic pre-redundancy plan is a measured range around 2,000-3,000+ devices.** The 200 ms SLA constrains batch size and requires roughly 200 concurrent in-flight requests; memory capacity sets the minimum shard size per replica, while sustained compute, KV-cache bandwidth, and collectives set the fleet size and cost.
