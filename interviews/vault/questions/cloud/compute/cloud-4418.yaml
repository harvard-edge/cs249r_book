title: 'Disaggregated Memory Architecture: CXL vs HBM on Chiplet'
scenario: A hyperscaler proposes replacing some HBM stacks on a chiplet AI accelerator with CXL 3.0 attached DRAM to reduce cost while maintaining capacity for LLM inference.
question: For 70B LLM inference, what are the bandwidth and latency tradeoffs of replacing some HBM stacks with CXL 3.0 DRAM?
details:
  realistic_solution: |
    Use CXL as a warm or spill tier, not as an equal replacement for HBM. For token decode, all 80 layers are traversed every token, so placing arbitrary layer ranges in CXL makes those weights part of the critical path every token. Residency should be based on access frequency and locality: keep the active model weights, current KV cache, and latency-critical working set in HBM; use CXL for cold adapters, rarely used experts, oversized KV spill, or batch contexts that can tolerate prefetch. With 100GB of weights in HBM at 2TB/s and 40GB in CXL at 400GB/s, the byte-weighted load time doubles from about 70ms to 140ms before considering extra CXL latency. The design is justified only when the cost/capacity gain is worth that SLA loss or the CXL-resident bytes can be prefetched off the decode critical path.
  common_mistake: |
    **The Pitfall:** Treating CXL memory as equivalent to HBM, just with lower bandwidth.
    **The Rationale:** Ignoring that CXL 3.0 latency (100-200ns) is 5-10x higher than HBM (20-40ns).
    **The Consequence:** Drastically underestimating the latency penalty for token generation where every token requires loading the full model weight footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B BF16 weights = 140 GB.
    - 4x HBM3 stacks: 100 GB, 2 TB/s. CXL tier: 40 GB, 400 GB/s, 150ns latency.
    - Per-layer weight load: 140GB/80 = 1.75 GB/layer.

    **Calculations:**
    - HBM time: 1.75GB / 2TB/s = 0.875ms/layer. Full model HBM: 80 * 0.875ms = 70ms.
    - CXL time: 1.75GB / 400GB/s = 4.375ms/layer.
    - Mixed (60 HBM + 20 CXL): (60 * 0.875) + (20 * 4.375) = 52.5 + 87.5 = 140ms.

    **Conclusion & Interpretation:**
    - **Result: 140ms vs 70ms decode step (Memory-Bandwidth-Bound)**. Yields a 2x slowdown for the entire decode step.
