title: 'Systolic Array Realization: Memory Layout for TPU Batch Inference'
scenario: You are determining the optimal memory layout for weight matrices on a TPU v5e for batched inference of a feed-forward layer.
question: Which weight layout should TPU v5e use for the 8192x32768 feed-forward layer, and how much does layout affect bandwidth and performance?
details:
  realistic_solution: 'TPU XLA uses tiled layouts automatically. Recommendation: use XLA default (major-to-minor dimension ordering for XLA tiles). Row-major stores contiguous in-features per output neuron. Column-major gives strided loads. However, layout choice has minimal impact when highly compute-bound.'
  common_mistake: |
    **The Pitfall:** Applying CPU-centric row-major reasoning to TPU hardware.
    **The Rationale:** Candidates often default to CPU memory layout patterns, assuming simple row-major or column-major is best.
    **The Consequence:** Failing to realize that TPUs use XLA-managed HBM with 128-byte cache lines optimized for systolic array access patterns (NCHW-like tiled layouts), and that the workload is compute-bound anyway.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weight Matrix (W): 8192 * 32768 * 2 bytes = 512 MB.
    - Input Matrix (X): (256 * 128) * 8192 * 2 bytes = 512 MB.
    - Output Matrix (C): 32768 * 32768 * 2 bytes = 2048 MB.
    - TPU v5e Bandwidth: 819 GB/s, Compute: 197 TFLOPs.

    **Calculations:**
    - Total Memory Bandwidth Needed: 512 MB + 512 MB + 2048 MB = 3 GB.
    - Bandwidth Time: 3 GB / 819 GB/s = 3.66 ms.
    - FLOPs: 2 * 32768 * 8192 * 32768 = 17.59 TFLOPs.
    - Compute Time: 17.59 TFLOPs / 197 TFLOPs/s = 89 ms.
    - AI = 17.59T / 3GB = 5863 FLOPs/byte.

    **Conclusion & Interpretation:**
    - **Result: 89 ms (Compute-Bound)**. 89 ms >> 3.66 ms, so the operation is highly compute-bound. Layout choice has minimal impact; the system will achieve ~89% MFU regardless of minor memory inefficiencies.
