title: AMD MI300X Accelerator Selection for Large Language Model Inference
scenario: Your team is tasked with deploying a new large language model (LLM) for real-time inference, which requires extremely low latency and high throughput. You are considering various accelerator options, and the AMD MI300X has been proposed as a primary candidate.
question: How would you design an MI300X-based LLM inference architecture and justify it against GPUs, TPUs, and custom ASICs?
details:
  realistic_solution: |
    Use MI300X where its large 192 GB HBM pool reduces the number of shards for large-model inference, but do not plan a single-card 100B FP16 deployment: 100B FP16 weights need about 200 GB before KV cache, activations, runtime buffers, and fragmentation. The practical MI300X design is either weight-only INT8/INT4 on one accelerator with careful KV budgeting, or 2-way or larger tensor parallelism for FP16/BF16 quality with weights resident in HBM. Compared with NVIDIA GPUs, MI300X can reduce capacity pressure but usually carries more ROCm/kernel integration risk than a mature CUDA stack. Compared with TPUs, it is more flexible for custom serving engines and heterogeneous cloud deployment, while TPUs can be attractive when the model and serving stack are already XLA/SAX-oriented. Compared with a custom ASIC, MI300X has lower specialization and efficiency but avoids NRE cost and supports changing model architectures. For real-time serving, size latency from HBM bandwidth, KV-cache traffic, collectives, and achieved kernel efficiency rather than peak TFLOPS alone.
  common_mistake: |
    **The Pitfall:** Overemphasizing raw TFLOPS.
    **The Rationale:** Peak compute numbers are highly marketed and easy to compare.
    **The Consequence:** Failing to analyze the trade-offs between memory capacity, bandwidth, and compute often leads to HBM capacity/bandwidth bottlenecks or underestimating the software stack integration complexity for LLM inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100B parameter model (FP16) = 200 GB weights.
       - MI300X: 192 GB HBM3, 5.3 TB/s bandwidth, 1300 TFLOPs FP16.
       - Batch-1 decode, weights resident if quantized or sharded; KV-cache traffic is additional.
    2. **Calculations:**
       - FP16 capacity check: 100B * 2 bytes = 200 GB, which exceeds 192 GB before KV cache and runtime overhead.
       - INT8 weight-only size is about 100 GB, leaving HBM for KV cache and activations on one MI300X; FP16 serving needs at least 2-way sharding or offload.
       - Decode HBM-read lower bound if each batch-1 step streams resident weights through the compute units: 200 GB/token in FP16 or 100 GB/token in INT8. Bandwidth lower bounds are 200/5300 = ~37.7 ms/token FP16 and 100/5300 = ~18.9 ms/token INT8, before KV-cache traffic, collectives, and kernel overheads.
       - Compute lower bound per token is about 2 * 100B = 200 GFLOPs; 200 GFLOPs / 1300 TFLOPs/s = ~0.15 ms at peak, so small-batch decode is dominated by memory movement.
    3. **Conclusion & Interpretation:**
       - **Result: Capacity and bandwidth constrained at low batch.** A 100B FP16 model does not fit on one MI300X once KV cache and runtime memory are included; use quantization or multi-accelerator sharding, then compare MI300X, CUDA GPUs, TPUs, and ASICs from memory capacity, bandwidth, software maturity, and workload stability.
