title: Shared Memory Bank Conflicts in Reduction Kernels
scenario: 'Your LayerNorm kernel on H100 computes a parallel reduction over 4096 elements using shared memory. Each warp reduces 128 elements, but profiling shows 8-way bank conflicts during the reduction phase.'
question: What shared-memory bank conflict pattern causes the 8-way slowdown in the LayerNorm reduction, and how would you fix it?
details:
  realistic_solution: 'Shared memory: 32 banks, 4 bytes wide. Address maps to bank: (address / 4) % 32. During tree reduction, thread i accesses element i and element i + stride. At stride = 4: threads 0,4,8,12,16,20,24,28 all read from banks 0,4,8,12,16,20,24,28 (no conflict). But threads 0,4,8,12,16,20,24,28 reading i+stride=4,8,12,16,20,24,28,32: bank pattern 4,8,12,16,20,24,28,0 — still no conflict. The 8-way conflict occurs at stride = 32: thread 0 reads index 0 (bank 0) and index 32 (bank 0). Threads 0-31 all read from bank (i % 32) for the first operand AND bank ((i+32) % 32) = same bank for the second. Fix: (1) Add a 1-element padding per row: declare shared mem as float smem[128+1]. Now bank(i) = (i + i/32) % 32, breaking the conflict pattern. (2) Use warp shuffle (__shfl_down_sync) instead of shared memory for intra-warp reduction — zero bank conflicts, ~2× faster.'
  common_mistake: |
    **The Pitfall:** Using a stride of 32 for reduction in shared memory.
    **The Rationale:** Thinking it avoids conflicts, but a stride of 32 maps to the exact same bank across threads.
    **The Consequence:** Maximum bank conflict leading to massive latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Warp size: 32 threads.
    - Reduction: 128 elements per warp in 7 steps.
    
    **Calculations:**
    - Step 1 (64 ops) takes 2 instruction issues.
    - Steps 2-7 take 1 cycle each.
    - An 8-way bank conflict serializes memory access, increasing conflicting step latency by 8x.
    
    **Conclusion & Interpretation:**
    - **Result: 8x Latency Penalty (Memory-Latency Bound)**. Warp shuffle uses registers instead of shared memory, completely bypassing bank conflicts.
