title: The Arithmetic Intensity Trap
scenario: 'An engineer on your team is debugging a data preprocessing kernel running on a single GPU. Profiling reveals the kernel performs approximately 10 TFLOPs of FP16 computation for every 500 GB of data it reads from memory.'
question: Is this preprocessing kernel with 10 TFLOPs per 500 GB read compute-bound or memory-bound, and why?
details:
  realistic_solution: |
    The kernel is severely **memory-bound**. The core issue is its low Arithmetic Intensity (AI). A GPU can only achieve its peak theoretical performance if a workload provides enough operations per byte of data transferred from memory to keep the compute cores busy.
  common_mistake: |
    **The Pitfall:** Assuming large absolute FLOP numbers guarantee a workload is compute-bound.
    **The Rationale:** Candidates fail to account for the Arithmetic Intensity (AI) relative to the hardware's ridge point.
    **The Consequence:** Wasting optimization effort on computational efficiency when the kernel is starved for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Kernel Compute: 10 TFLOPs.
    - Data Movement: 500 GB.
    - H100 ridge point is ~295 FLOPs/Byte.

    **Calculations:**
    - Arithmetic Intensity = 10 TFLOPs / 500 GB = 20 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 20 FLOPs/Byte (Memory-Bound)**. The Arithmetic Intensity of 20 FLOPs/Byte is drastically lower than a typical GPU ridge point (e.g., H100 is ~295 FLOPs/Byte), making it severely memory-bound.
  options:
  - 'Compute-bound, because 10 TFLOPs is a very large number of operations that should saturate the GPU.'
  - 'Memory-bound, because its Arithmetic Intensity of ~20 Ops/Byte is far below the H100''s ridge point of ~295 Ops/Byte.'
  - 'Network-bound, because transferring 500 GB of data is the bottleneck, regardless of computation.'
  - 'It''s impossible to tell without knowing the kernel''s execution time in milliseconds.'
  correct_index: 1
