title: The Power Efficiency Paradox Roofline Analysis
scenario: 'Your team is deploying a small, real-time routing model onto the same server as a large inference model. This router model decides which expert in a Mixture-of-Experts (MoE) model to activate. Its latency is critical, but so is its power consumption, as every watt it uses is a watt the main LLM cannot. The router model is a small 50M parameter model processing a single feature vector per request (batch size 1).'
question: 'Why is peak TOPS/W the wrong metric for the 50M-parameter batch-1 router, and what bottleneck will dominate?'
details:
  realistic_solution: 'This specific workload (a small model at batch size 1) is heavily memory-bound. Its performance is dictated not by the chip''s peak compute power, but by the memory bandwidth. The job''s Arithmetic Intensity (AI) is too low to saturate the compute units.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the peak TOPS/W (power efficiency) metric without considering arithmetic intensity.
    **The Rationale:** Candidates assume that high theoretical power efficiency translates directly to real-world power savings, ignoring that memory-bound workloads leave compute units idle.
    **The Consequence:** The chosen accelerator underperforms and wastes power stalling on memory fetches, starving the main LLM of strict power budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50M params (100MB weights). FLOPs = 1 GFLOP.
    - Hardware: H100 (989 TFLOPS, 3.35 TB/s).

    **Calculations:**
    - Arithmetic Intensity (AI) = 1 GFLOP / 100 MB = 10 FLOPs/byte.
    - Hardware Ridge Point = 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/byte.
    - Memory time = 100MB / 3.35 TB/s = ~0.030ms.
    - Compute time = 1 GFLOP / 989 TFLOPS = ~0.001ms.

    **Conclusion & Interpretation:**
    - **Result: 0.030ms (Memory-Bandwidth-Bound)**. The chip spends 96% of its time waiting on HBM, making peak TOPS/W totally irrelevant for this low-AI workload.
