title: Optimizing Large Language Model Inference on Google TPU v5e with Systolic Arrays
scenario: 'Your team is tasked with deploying a large Transformer-based language model (e.g., 20 billion parameters, BF16 precision for weights and activations) for real-time inference on a Google TPU v5e. The model''s primary bottleneck is the matrix multiplication operations in the self-attention and feed-forward layers. Given the TPU v5e''s specifications (16 GB HBM, 197 TFLOPS BF16 peak compute, 1.6 TB/s HBM bandwidth), you must evaluate how you would design the dataflow and tiling strategy for the dominant matrix multiplication operations to maximize throughput while minimizing HBM access.'
question: How would you tile the 20B BF16 transformer's GEMMs on TPU v5e, and when would you choose weight-stationary versus output-stationary dataflow?
details:
  realistic_solution: 'A realistic solution would involve analyzing the dimensions of the matrix multiplications, the model''s memory footprint, and the TPU''s HBM capacity. For a large language model, weight-stationary dataflow is often preferred due to the reusability of weights across multiple activations, especially for batch inference or sequence processing where the same weights are applied to different input elements. The solution should detail a tiling strategy:

    1.  **Spatial Tiling:** Partitioning the large matrices into smaller blocks that fit within the systolic array''s dimensions and on-chip memory.

    2.  **Temporal Tiling:** Iteratively processing these blocks, ensuring data (activations, partial sums) are reused in on-chip buffers as much as possible before going back to HBM.

    3.  **Data Placement:** Strategically placing weights and activations in HBM and on-chip caches to minimize external memory transfers, utilizing the 1.6 TB/s bandwidth efficiently but not exhaustively.

    The solution should articulate how these choices lead to high utilization of the 197 TFLOPS BF16 compute and minimize stalls due to HBM bandwidth limitations.'
  common_mistake: 'A common mistake is a superficial understanding of TPU memory hierarchy and dataflow. Candidates might suggest a simple partitioning without considering the actual data reuse patterns on a systolic array, leading to suboptimal HBM access. Another mistake is not quantifying the impact of data movement vs. computation, or failing to choose the dataflow (weight-stationary vs. output-stationary) that best aligns with the model''s characteristics and TPU''s design, assuming one is universally superior.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 20B parameters (BF16 = 40 GB footprint).
    - TPU v5e HBM: 16 GB.
    - Peak Compute: 197 TFLOPS (~98.5 T MACs/s).
    - HBM Bandwidth: 1.6 TB/s.
    
    **Calculations:**
    - Bandwidth required if 0 reuse: 98.5T MACs/s * 2 ops * 2 bytes = 394 TB/s.
    - Available bandwidth: 1.6 TB/s.
    - Minimum data reuse factor required: 394 TB/s / 1.6 TB/s ≈ 246.
    
    **Conclusion & Interpretation:**
    - **Result: ~246x Reuse Required (Memory-Bandwidth Bound)**. The 40 GB model won't fit entirely in 16 GB HBM, and strict weight-stationary tiling is required to reuse elements at least 246 times to prevent memory bandwidth starvation.
