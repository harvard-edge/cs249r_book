title: Optimizing Large Language Model Inference on Google TPU v5e with Systolic Arrays
scenario: Your team is tasked with deploying a large Transformer-based language model (e.g., 20 billion parameters, BF16 precision for weights and activations) for real-time inference on a Google TPU v5e. The model's primary bottleneck is the matrix multiplication operations in the self-attention and feed-forward layers. Given the TPU v5e's specifications (16 GB HBM, 197 TFLOPS BF16 peak compute, 1.6 TB/s HBM bandwidth), you must evaluate how you would design the dataflow and tiling strategy for the dominant matrix multiplication operations to maximize throughput while minimizing HBM access.
question: How would you tile the 20B BF16 transformer's GEMMs on TPU v5e, and when would you choose weight-stationary versus output-stationary dataflow?
details:
  realistic_solution: |
    A realistic solution must first account for residency: a 20B BF16 model is about 40 GB, so one 16 GB TPU v5e device cannot hold all weights plus activations and KV/cache buffers. The model must be partitioned across multiple v5e devices with tensor/pipeline parallelism, or weight panels must be streamed from host or peer memory with enough prefetching to hide transfer time. Within each shard, tile the dominant GEMMs into systolic-array-sized blocks and keep the most reused operand on chip.
    Weight-stationary dataflow is preferred for decode or batched inference when the same weight tile is applied to many token activations, because it amortizes HBM reads for the weight panel. Output-stationary or hybrid tiling is preferred when K is split across tiles and partial sums would otherwise be repeatedly spilled to HBM. Use temporal tiling to keep activations, weights, and accumulators in on-chip buffers across token or batch tiles, and choose shard sizes so each device has HBM room for its weight slice, activations, KV/cache, and runtime buffers.
  common_mistake: |
    **The Pitfall:** Suggesting a simple partitioning strategy without considering actual data reuse patterns or quantifying data movement.
    **The Rationale:** Candidates often have a superficial understanding of TPU memory hierarchy, assuming one dataflow is universally superior.
    **The Consequence:** The design leads to suboptimal HBM access and fails to align the dataflow with the model's characteristics, degrading inference throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 20B parameters (BF16 = 40 GB footprint).
    - TPU v5e HBM: 16 GB.
    - Peak Compute: 197 TFLOPS (~98.5 T MACs/s).
    - HBM Bandwidth: 1.6 TB/s.

    **Calculations:**
    - Model footprint: 20B * 2 bytes = 40 GB, so all weights cannot reside in one 16 GB HBM device at once; serving requires partitioning across devices or host/peer-assisted streaming.
    - To sustain peak compute, required operational intensity is 197 TFLOPs/s / 1.6 TB/s = ~123 FLOPs/byte from HBM.
    - A single BF16 GEMM tile with MxK times KxN performs 2*M*N*K FLOPs and moves at least 2*(M*K + K*N + M*N) bytes if each operand tile is loaded once and C is written once.
    - Example 128x1024 by 1024x128 tile: FLOPs = 33.6M; bytes = 2*(131k + 131k + 16k) = ~557 KB; intensity is ~60 FLOPs/byte, below the peak-compute roofline unless weights, activations, or partial sums are reused across additional tokens/batches.
    - Weight-stationary tiling raises effective intensity when the KxN weight tile is reused across multiple M token rows; output-stationary tiling avoids extra HBM traffic when many K-split tiles contribute to the same MxN output tile.

    **Conclusion & Interpretation:**
    - **Result: Dataflow choice is a roofline tradeoff under a hard shard-residency constraint.** Weight-stationary tiling is attractive when weights are reused across tokens or batches; output-stationary tiling is better when partial-sum traffic dominates. The design should shard or stream the 40 GB model while maximizing on-chip reuse.
