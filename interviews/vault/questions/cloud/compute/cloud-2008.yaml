title: Diagnosing Tensor Core Underutilization
scenario: 'A team reports that their mixed-precision ResNet-50 training on an NVIDIA A100 GPU is unexpectedly slow. Despite setting `fp16=True` in PyTorch, `nvidia-smi` shows GPU utilization at 98%, but profiling with Nsight Compute reveals that Tensor Core utilization is below 15%. The batch size is 256, and the hidden layer dimensions are mostly powers of 2, except for the final classification layer which was modified to predict 105 classes instead of 1000.'
question: 'How do you analyze and resolve the bottleneck preventing high Tensor Core utilization?'
details:
  realistic_solution: 'Identify that the final layer dimension (105) is not a multiple of 8, which is required for Tensor Core alignment in FP16 on A100. Pad the classification layer output to 112 or 128 and ignore the dummy classes in the loss calculation to fully engage Tensor Cores.'
  common_mistake: |
    **The Pitfall:** Assuming that simply enabling FP16 guarantees Tensor Core usage.
    **The Rationale:** Candidates often trust high-level framework flags without verifying the low-level matrix dimension alignment requirements.
    **The Consequence:** Experiencing massive performance regressions due to silent fallbacks to slower CUDA cores.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 Tensor Cores require matrix dimensions (M, N, K) to be multiples of 8 for FP16.
    - N=105 is not a multiple of 8.

    **Calculations:**
    - With N=105, the operation falls back to standard CUDA cores (limited to 19.5 TFLOPS FP32).
    - Padding N to 112 makes it a multiple of 8 (112 % 8 = 0).

    **Conclusion & Interpretation:**
    - **Result: Tensor Core Alignment Bound** (Padding N to 112 or 128 allows Tensor Core execution, unlocking the full 312 TFLOPS FP16 peak).
