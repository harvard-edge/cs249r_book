title: 'Real-time LLM Inference: Accelerator Selection for Performance and Cost'
scenario: Your team is tasked with deploying a 20B-parameter transformer for real-time BF16 inference on Google Cloud. Assume an average request has 512 prompt tokens and 64 generated tokens. You need to assess TPU v5e slices versus high-end GPUs or CPUs to meet 100 ms latency and 10,000 QPS at peak load.
question: What serving architecture and accelerator choice would meet 100 ms latency and 10,000 QPS for the BF16 transformer on Google Cloud?
details:
  realistic_solution: A realistic solution would use replicated model-parallel serving groups rather than a single accelerator. A 20B BF16 model is about 40 GB, so one TPU v5e device with 16 GB HBM cannot hold it; use at least 4-way sharding per replica to leave room for KV cache and runtime overhead. Put a regional load balancer in front of admission-control queues, route requests to many identical TPU v5e serving replicas, and use bucketed batching with separate prefill and decode scheduling so batching does not violate the 100 ms target. TPU v5e is plausible for high-volume BF16 serving if the team already uses the TPU stack; high-end GPUs may need fewer devices and have a broader serving ecosystem; CPUs should be reserved for control-plane or fallback paths, not the primary 10,000 QPS low-latency path.
  common_mistake: |
    **The Pitfall:** Overemphasizing peak FLOPS without adequately considering memory bandwidth and its impact on model loading and intermediate activations.
    **The Rationale:** Candidates often fixate on raw compute metrics rather than the memory wall that typically bottlenecks LLM inference.
    **The Consequence:** Recommending an accelerator that theoretically has enough FLOPS but will stall waiting for memory accesses, failing to meet the latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required throughput: 10,000 QPS; latency SLA: 100 ms.
    - Model: 20B BF16 parameters = 40 GB weights.
    - Request shape: 512-token prefill and 64-token decode.
    - TPU v5e device: 16 GB HBM, 197 TFLOPS BF16 peak, 1.6 TB/s HBM bandwidth.
    - Planning efficiency: 35% sustained BF16 throughput after sharding, batching, and overhead.

    **Calculations:**
    - Capacity: ceil(40 GB / 16 GB) = 3 devices minimum; use 4 devices per serving replica for KV cache and overhead.
    - Per-request compute estimate: 2 * 20B * (512 + 64) = 23.0 TFLOPs.
    - Fleet sustained compute needed: 23.0 TFLOPs/request * 10,000 QPS = 230 PFLOPs/s.
    - Sustained per-device compute: 197 * 0.35 = ~69 TFLOPs/s, so compute sizing is 230,000 / 69 = ~3,334 TPU v5e devices before redundancy.
    - Latency concurrency from Little's Law: 10,000 QPS * 0.1 s = 1,000 in-flight requests; with 4-device replicas, enough replicas are needed to keep per-replica batches small enough for the P99 target.
    - Decode weight traffic per 4-device replica is roughly 40 GB per token pass split across devices; at 1.6 TB/s/device, memory bandwidth must be profiled because KV cache and collectives can reduce the effective margin.

    **Conclusion & Interpretation:**
    - **Result: Large replicated TPU v5e slices or fewer high-end GPU replicas are required; CPUs are not viable for the hot path.** The serving architecture should be sized from model capacity, sustained prefill/decode compute, KV-cache bandwidth, and the 1,000-request concurrency implied by the 100 ms SLA.
