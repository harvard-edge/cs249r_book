title: The Batch Size Sweet Spot
scenario: You are serving a 7B LLM on a single H100. At batch=1, you measure 35 tokens/sec. At batch=64, you measure 1,800 tokens/sec. You must determine the cause of this 51x throughput increase with only 64x more work and identify the batch size where diminishing returns begin.
question: Why does throughput increase 51x with a 64x batch size increase, and at what batch size do diminishing returns begin?
details:
  realistic_solution: 'At batch=1, LLM decode is deeply memory-bound (arithmetic intensity about 1 Op/Byte). The GPU reads all 14 GB of weights from HBM for each token, so throughput is limited by weight-read bandwidth. The ideal bandwidth-only ceiling is 3.35 TB/s / 14 GB = about 239 tokens/sec, while the measured 35 tokens/sec reflects real kernel overheads, memory access patterns, and decode inefficiencies. Increasing batch size reuses the same weight reads across multiple requests, increasing arithmetic intensity roughly linearly with batch size. The H100 ridge point is about 295 Ops/Byte, so the theoretical compute-bound transition would be near batch 295. In practice, VRAM/KV-cache capacity is hit earlier: KV cache per request at 2K context is about 0.5 GB, so batch 128 uses 14 GB weights + 128 * 0.5 GB = 78 GB, barely fitting in 80 GB. Practical diminishing returns begin around batch 128 because capacity blocks further useful batching before the ridge point is reached.'
  common_mistake: |
    **The Pitfall:** Assuming throughput should scale linearly with batch size indefinitely.
    **The Rationale:** Candidates know that larger batches are more efficient but fail to distinguish between the memory-bound regime (where linear scaling occurs) and the compute-bound regime (where throughput saturates).
    **The Consequence:** Over-provisioning batch size beyond the ridge point, leading to OOM errors or unacceptable latency without meaningful throughput gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model at FP16 = 14 GB weights.
    - H100 hardware: 3.35 TB/s memory bandwidth, 989 TFLOPS compute.
    - KV cache at 2K context ≈ 0.5 GB per request.
    - Total VRAM: 80 GB.

    **Calculations:**
    - Batch=1 decode does roughly one model-weight read per generated token: 14 GFLOP-equivalent operations over 14 GB of FP16 weights, so AI ≈ 1 FLOP/Byte (memory-bound).
    - Batch=B reuses the same weight read across B sequences, so AI ≈ B FLOPs/Byte.
    - Hardware Ridge Point: 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte.
    - VRAM capacity limit at Batch 128: 14 GB (weights) + (128 * 0.5 GB KV Cache) = 78 GB.

    **Conclusion & Interpretation:**
    - **Result: Practical diminishing returns at B≈128 (VRAM-Capacity-Bound)**. Throughput improves because weight reads are amortized across the batch, but KV-cache capacity blocks useful scaling before the theoretical ridge point at B≈295.
  options:
    - Throughput increases because memory bandwidth scales linearly with batch size. Diminishing returns start at batch 64.
    - Throughput increases because the GPU caches the weights in SRAM. Diminishing returns start at batch 1024 when SRAM is full.
    - Throughput increases because the workload shifts from compute-bound to memory-bound. Diminishing returns start at batch 128 due to KV-cache limits.
    - Throughput increases by reusing weight reads from HBM, increasing arithmetic intensity. Practical diminishing returns start around batch 128 due to KV-cache VRAM limits, even though the ridge point is near batch 295.
  correct_index: 3
