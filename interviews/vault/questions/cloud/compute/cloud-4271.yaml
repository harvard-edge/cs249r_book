title: MI300X XCD to HBM Proximity and Memory Symmetry
scenario: How are the 4 Memory Cache Dies (MCDs) in MI300X physically connected to the 8 XCDs, and what does this mean for memory access symmetry?
question: How are the 4 Memory Cache Dies (MCDs) in MI300X physically connected to the 8 XCDs, and what does this mean for memory access symmetry?
details:
  realistic_solution: MI300X exposes a large shared HBM capacity across multiple memory/cache die resources and 8 XCDs connected through the package fabric. The important architectural point is that memory access is not best modeled as eight isolated local memories. XCDs can reach the HBM resources through the shared fabric, but physical proximity, routing, arbitration, and concurrent traffic can make observed latency and bandwidth non-uniform. A correct answer should discuss possible NUMA-like effects and placement sensitivity without claiming a fixed per-XCD-to-MCD mapping or exact hop penalties unless the topology is provided.
  common_mistake: |
    **The Pitfall:** Assuming each MCD serves exactly two XCDs in a symmetric 2:1 mapping.
    **The Rationale:** The actual topology has non-uniform proximity due to the physical layout of the interposer.
    **The Consequence:** Misses possible NUMA-like placement effects and fabric contention, leading to suboptimal tensor placement and degraded performance.
  napkin_math: |
    **Assumptions:**
    - 4 MCDs × 48 GB = 192 GB total HBM3.
    - Aggregate HBM3 BW: 5.3 TB/s → 1.325 TB/s per MCD.

    **Calculations:**
    - The prompt provides total capacity and aggregate bandwidth, but not a public per-XCD route map, hop latency, or arbitration model.
    - Average capacity per XCD for planning only: 192 GB / 8 = 24 GB.
    - Average bandwidth per XCD for planning only: 5.3 TB/s / 8 ≈ 0.66 TB/s.

    **Conclusion:**
    - Result: Treat HBM as package-shared with possible non-uniform access effects; do not infer a fixed 2:1 MCD-to-XCD mapping or unsupported latency/bandwidth penalties from the prompt.
