title: HBM3 Stack Partitioning Across MCDs
scenario: How are the 4 Memory Cache Dies (MCDs) in MI300X physically connected to the 8 XCDs, and what
  does this mean for memory access symmetry?
question: How are the 4 Memory Cache Dies (MCDs) in MI300X physically connected to the 8 XCDs, and what
  does this mean for memory access symmetry?
details:
  realistic_solution: Each MCD manages a 48 GB HBM3 stack partition. XCDs are arranged in two rows of
    4 on the interposer. XCDs nearest to an MCD have lower fabric hop count (~1 hop) while diagonal XCDs
    have 2+ hops. AMD's NUMA-aware memory allocator (ROCm NUMA) attempts to place tensors on HBM closest
    to the XCD that will process them, but this requires explicit hints via hipMemAdvise.
  common_mistake: '**The Pitfall:** Assuming each MCD serves exactly two XCDs in a symmetric 2:1 mapping.

    **The Rationale:** The actual topology has non-uniform proximity due to the physical layout of the
    interposer.

    **The Consequence:** Fails to account for the 15-20% bandwidth penalty incurred by remote MCD access,
    leading to suboptimal tensor placement and degraded performance.'
  napkin_math: '**Assumptions:**

    - 4 MCDs × 48 GB = 192 GB total HBM3.

    - Aggregate HBM3 BW: 5.3 TB/s → 1.325 TB/s per MCD.


    **Calculations:**

    - XCD-to-local-MCD: 1 hop ~50ns latency.

    - XCD-to-remote-MCD: 2 hops ~100ns latency.


    **Conclusion:**

    - Result: Bandwidth penalty for remote access is ~15-20% throughput reduction due to arbitration across
    the fabric.'
