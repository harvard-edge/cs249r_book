title: Diagnosing Low MAC Throughput in Custom Kernels
scenario: A team is running a custom ML workload on an NVIDIA T4 GPU. They implemented a custom fused CUDA kernel using FP16 data types for a specialized dense layer. Despite high arithmetic intensity, the Nsight profiler shows the kernel maxes out at roughly 8 TFLOPS with memory bandwidth utilization under 20%.
question: Why does the FP16 custom CUDA kernel top out at about 8 TFLOPS instead of using the T4's 65 TFLOPS Tensor Cores?
details:
  realistic_solution: The root cause is that the custom CUDA kernel uses standard scalar floating-point arithmetic instead of matrix arithmetic instructions (HMMA/WMMA). The compiler maps these scalar operations to standard CUDA cores rather than Tensor Cores. To fix this, the team must rewrite the kernel using the `wmma` API or CUTLASS to explicitly target Tensor Cores.
  common_mistake: |
    **The Pitfall:** Assuming the kernel is hitting a memory bandwidth wall or suffering from register spilling.
    **The Rationale:** Candidates fail to analyze the instruction mix and compare observed performance to theoretical limits of specific functional units.
    **The Consequence:** Wasting effort on memory optimizations instead of fixing the instruction mapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - T4 FP16 Tensor Core peak: about 65 TFLOPS.
    - Observed FP16 custom-kernel throughput: about 8 TFLOPS.
    - Memory bandwidth utilization is under 20%, so the kernel is not bandwidth-bound.

    **Calculations:**
    - Observed throughput is only 8 / 65 = 12.3% of the FP16 Tensor Core peak.
    - Scalar FP16 arithmetic in a normal CUDA kernel does not automatically issue Tensor Core HMMA/WMMA instructions.
    - Without WMMA, CUTLASS, cuBLAS, or equivalent matrix instructions, the work executes on standard CUDA-core pipelines instead of Tensor Cores.

    **Conclusion & Interpretation:**
    - **Result: Tensor Cores are not being used.** The low throughput relative to 65 TFLOPS, combined with scalar instruction mapping and low memory utilization, points to a CUDA-core instruction bottleneck rather than a Tensor Core or memory-bandwidth limit.
