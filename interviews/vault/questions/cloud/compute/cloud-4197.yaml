title: FP8 Tensor Core Precision on H100 and MI300X
scenario: You want to train a 70B model in FP8 mixed precision, utilizing hardware that supports both E4M3 and E5M2 formats.
question: "What H100 FP8 throughput should you use for mixed-precision training when FP16 is 989 TFLOPS, and which FP8 format is best for gradients?"
details:
  realistic_solution: H100 FP8 throughput is 1,978 TFLOPS (exactly 2x 989 TFLOPS FP16). Use E4M3 for forward pass activations and weights due to better precision, and E5M2 for gradients because the wider dynamic range is required to prevent underflow.
  common_mistake: |
    **The Pitfall:** Indiscriminately using the E4M3 format for all FP8 tensors, including gradients.
    **The Rationale:** Candidates know E4M3 provides higher precision, but forget it only has 3 mantissa bits and a tiny exponent range.
    **The Consequence:** Gradients that span many orders of magnitude underflow to zero or overflow to NaN, completely halting model convergence.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 FP16 peak: 989 TFLOPS.
       - MI300X FP16 peak: 1,307 TFLOPS.
    2. **Calculations:**
       - H100 FP8 Peak: 2 * 989 = 1,978 TFLOPS.
       - MI300X FP8 Peak: 2 * 1,307 = 2,614 TFLOPS.
       - Execution Time = Compute_Demand (TFLOPs) / Throughput_Rate (TFLOPS).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Estimation.** Relying on the correct 1,978 TFLOPS baseline prevents massive cost estimation errors during large-scale training.
