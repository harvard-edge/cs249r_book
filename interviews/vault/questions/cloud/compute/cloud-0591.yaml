title: The B200 Fleet Upgrade Dilemma
scenario: You are the Principal Engineer for a major AI cloud provider with a large fleet of GPUs. The new B200 GPU has been announced, and your VP of Engineering asks for your recommendation.
question: Would you recommend a full B200 upgrade for the fleet, or a heterogeneous fleet, and why?
details:
  realistic_solution: |
    A strategic proposal is a heterogeneous fleet unless profiling shows nearly all high-value workloads benefit enough to justify a full B200 refresh. Use roofline analysis on the real job mix: compute-bound training jobs may benefit from B200 peak FLOPS, while low-batch autoregressive decode is often closer to a memory-bandwidth problem. Keep H100 capacity for workloads where B200 utilization or TCO is weak, and reserve B200s for measured bottlenecks where throughput per dollar and per watt improves.
  common_mistake: |
    **The Pitfall:** Recommending a full fleet upgrade based strictly on peak TFLOPS.
    **The Rationale:** Engineers often fixate on headline compute numbers without profiling the fleet's actual mix of memory-bound vs. compute-bound workloads.
    **The Consequence:** Wasting massive capital expenditures on compute-dense hardware that will sit idle because the workloads are entirely memory-bandwidth bottlenecked.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: Auto-regressive generation (Memory-Bound).
       - H100 Bandwidth: 3.35 TB/s.
       - B200 Bandwidth: 8.0 TB/s.
    2. **Calculations:**
       - If decode is fully memory-bandwidth-bound and all other bottlenecks are equal, estimated speedup ratio = 8.0 / 3.35 = 2.38x.
    3. **Conclusion & Interpretation:**
       - **Result: Profile Before Full Refresh.** The 2.38x bandwidth ratio is a useful estimate for memory-bound decode, not an absolute cap for every workload. A heterogeneous fleet is justified when profiling shows a mix of compute-bound, memory-bound, capacity-bound, and latency-sensitive jobs with different B200 ROI.
