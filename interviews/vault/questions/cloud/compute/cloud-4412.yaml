title: HBM4 Stack Integration Timing for Next-Gen AI Die
scenario: Your roadmap needs to decide between HBM3E (available now, 1.2 TB/s per stack) and HBM4 (available in 18 months, 1.8 TB/s per stack) for a training accelerator. The accelerator ships in 24 months. You must analyze the bandwidth-compute balance decision for this architecture.
question: Should the 24-month training accelerator roadmap choose HBM3E now or wait for HBM4, given the bandwidth-compute balance and schedule risk?
details:
  realistic_solution: 'HBM4 at 1.8 TB/s per stack vs HBM3E at 1.2 TB/s is a 50% bandwidth uplift. For an H100-class die (80 TFLOPS at BF16), compute intensity of LLM training (~6 ops/byte) requires: 80 TFLOPS / 6 = 13.35 TB/s memory bandwidth. At 6 stacks: HBM3E = 7.2 TB/s (still memory-bound), HBM4 = 10.8 TB/s (closer to balanced). But 18mo availability + 6mo qual = 24mo → same ship date. If any HBM4 yield issues slip to 26mo, you miss launch. Risk-adjusted recommendation: commit to HBM3E for main product, design HBM4 socket-compatible variant for refresh.'
  common_mistake: |
    **The Pitfall:** Treating memory bandwidth as the only variable.
    **The Rationale:** Focusing purely on technical specs without considering physical and scheduling constraints.
    **The Consequence:** Focusing solely on GB/s per stack while ignoring the 6-month qualification period, risking a complete miss of the product launch window.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100-class compute: 80 TFLOPS BF16.
    - Compute intensity: ~6 ops/byte.
    - HBM3E: 1.2 TB/s per stack. HBM4: 1.8 TB/s per stack. 6 stacks total.
    - Required bandwidth: 80 TFLOPS / 6 ops/byte = ~13.3 TB/s.

    **Calculations:**
    - 6x HBM3E total bandwidth: 6 × 1.2 TB/s = 7.2 TB/s.
    - 6x HBM4 total bandwidth: 6 × 1.8 TB/s = 10.8 TB/s.
    - HBM4 schedule: 18 months + 6 months qualification = 24 months.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound vs Schedule-Bound**. HBM3E falls short of the 13.3 TB/s requirement, but HBM4's 24-month critical path poses unacceptable schedule risk for a 24-month launch.
