title: W4A16 Batch-Size Latency Inversion
scenario: Serving a 70B model via GPTQ (INT4 weights, FP16 activations). At batch size 1, latency is 15ms/token. At batch size 128, latency is 120ms/token, which is actually 20% slower than the pure FP16 model at the same batch size.
question: Why is the GPTQ INT4 model faster at batch size 1 but slower than FP16 at batch size 128?
details:
  realistic_solution: This is a computation vs memory-bandwidth crossover. At BS=1, operations are memory-bandwidth bound, so smaller INT4 weights fetch faster. At BS=128, operations are compute-bound. W4A16 requires dequantizing weights to FP16 in registers before performing MACs, adding ALU overhead.
  common_mistake: |
    **The Pitfall:** Blaming the PCIe interconnect bottleneck between the 2x A100s.
    **The Rationale:** Candidates incorrectly assume data transfer between GPUs is the issue, though it affects both precisions equally.
    **The Consequence:** Misdiagnosing a compute-bound problem as an IO problem, leading to useless network or topology optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model on 2x A100 GPUs.
       - Aggregate HBM bandwidth is roughly 3.2-4.0 TB/s depending on the A100 variant; use 3.2 TB/s as a conservative estimate.
       - Aggregate FP16 Tensor Core peak is roughly 624 TFLOPS.
    2. **Calculations:**
       - BS=1 (mostly memory-bound): FP16 weight traffic is about 140 GB, so 140 GB / 3.2 TB/s = 43.8 ms. INT4 weight traffic is about 35 GB, so 35 GB / 3.2 TB/s = 10.9 ms.
       - BS=128 decoded-token step: dense transformer GEMMs do about 2 * 70B * 128 = 17.9 TFLOPs of math across the batch.
       - Ideal FP16 compute time: 17.9 TFLOPs / 624 TFLOPS = 28.7 ms before non-GEMM overheads and parallelism limits.
       - W4A16 must dequantize INT4 weights into FP16 fragments inside the kernel; at high batch size, that extra integer/unpack/scale work can erase the memory-traffic advantage.
    3. **Conclusion & Interpretation:**
       - **Result: bandwidth-to-compute crossover.** INT4 helps at BS=1 because less weight traffic dominates latency. At BS=128 the larger GEMMs reuse weights better, so dequantization overhead and kernel efficiency can make W4A16 slower than optimized FP16 for this workload.
