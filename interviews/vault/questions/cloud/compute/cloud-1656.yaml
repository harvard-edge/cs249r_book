title: Online Learning Backlog Catch-Up Calculation
scenario: 'An online learning pipeline processes updates at a maximum throughput of 50,000 samples/sec. Incoming traffic during a flash sale spikes to 20,000 requests/sec. The pipeline stalls for 15 minutes due to an upstream Kafka failure.'
question: 'How long will it take to process the accumulated backlog and catch up to the live stream once restored?'
details:
  realistic_solution: 'Calculate the accumulated backlog size, then divide by the net processing rate (max throughput minus the live incoming rate) to find the true catch-up time.'
  common_mistake: |
    **The Pitfall:** Dividing the backlog size by the total training throughput (50k) rather than the net catch-up throughput.
    **The Rationale:** Candidates forget that while the system is processing the backlog, new live data continues to pour in at 20k req/s.
    **The Consequence:** The catch-up time is significantly underestimated, leading to over-optimistic recovery SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max throughput: 50,000 samples/sec.
       - Live incoming rate: 20,000 req/sec.
       - Downtime: 15 minutes (900 seconds).
    2. **Calculations:**
       - Accumulated backlog = 900 s * 20,000 req/s = 18,000,000 samples.
       - Net catch-up rate = 50,000 (max) - 20,000 (live) = 30,000 samples/sec.
       - Time to drain = 18,000,000 samples / 30,000 samples/sec = 600 seconds (10 minutes).
    3. **Conclusion & Interpretation:** **Result: System-Bound (Catch-Up)**. It takes exactly 10 minutes to drain the backlog because the live stream continuously consumes 40% of the max throughput during recovery.
