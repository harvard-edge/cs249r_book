title: Chiplet Die-to-Die Latency Impact on Pipeline Bubble Rate
scenario: A pipelined inference system on a multi-chiplet accelerator shows 7% throughput degradation compared to simulation. The critical token pipeline stage is 8us, and the pipeline crosses XCD boundaries 3 times per forward pass. Each boundary crossing adds 180ns of latency.
question: If a forward pass crosses boundaries 3 times at 180 ns each, what causes the 7% throughput drop, and how would you fix it?
details:
  realistic_solution: |
    The raw boundary latency is only 3 * 180ns = 540ns, so it is negligible if added to a 10ms end-to-end forward pass. The 7% loss appears because the crossings sit on the critical token pipeline stage: 540ns of synchronous wait on an 8us stage is about a 6.75% bubble. Fix it by making boundary transfers nonblocking: double-buffer XCD-boundary activations, prefetch the next stage while the current stage computes, remap adjacent layers or attention/FFN pairs to reduce boundary crossings, and use separate HIP streams/events so die-to-die copies overlap with independent compute.
  common_mistake: |
    **The Pitfall:** Treating inter-chiplet latency as a fixed mathematical overhead to simply add to the end-to-end time.
    **The Rationale:** Engineers assume latency behaves additively, forgetting how pipelined systems magnify synchronous stalls.
    **The Consequence:** A 180ns stall in a stage with 100ns of compute effectively doubles that stage's wall time. Unmanaged die-to-die crossings crater pipeline efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 crossings, 180ns each.
    - End-to-end forward compute = 10ms.
    - Critical token pipeline stage = 8us.

    **Calculations:**
    - Raw Latency: 3 * 180ns = 540ns = 0.00054ms.
    - Additive Impact: 0.00054ms / 10ms = 0.0054% (negligible).
    - Pipeline Bubble: 540ns / 8us = 6.75%, which rounds to the observed 7% throughput gap.

    **Conclusion & Interpretation:**
    - **Result: ~7% gap (Pipeline-Bound)**. Double-buffering and placement changes overlap or remove the boundary waits instead of adding them to the critical stage.
