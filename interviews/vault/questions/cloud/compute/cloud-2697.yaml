title: Data Loading Bottleneck Analysis
scenario: 'Training reads 2TB of images per epoch. Each GPU processes data at 3 GB/s during training on a 4-GPU node. Without GPUDirect Storage: NVMe read = 6 GB/s, CPU bounce buffer = 4 GB/s effective, PCIe to GPU = 12 GB/s. With GPUDirect Storage: NVMe direct to GPU = 5.5 GB/s.'
question: What are the epoch times with and without GPUDirect Storage, and what is the true hardware bottleneck?
details:
  realistic_solution: |
    Without GPUDirect Storage: Pipeline bottleneck = min(NVMe, bounce buffer, PCIe) = min(6, 4, 12) = 4 GB/s for the storage-to-GPU path. But 4 GPUs each need 3 GB/s = 12 GB/s aggregate demand. Supply is 4 GB/s (single NVMe). Storage-to-GPU is 3x bottlenecked. Epoch time = 2 TB / 4 GB/s = 500 seconds (limited by bounce buffer). With GPUDirect Storage: Direct path = 5.5 GB/s from NVMe to GPU. Still limited by single NVMe at 6 GB/s read speed. Effective rate: min(6, 5.5) = 5.5 GB/s. Epoch time = 2 TB / 5.5 GB/s = 364 seconds. Speedup: 500/364 = 1.37x. But the real fix is multiple NVMe drives: 4 NVMe x 5.5 GB/s = 22 GB/s > 12 GB/s demand. Epoch time: 2 TB / 12 GB/s (now compute-bound) = 167 seconds.
  common_mistake: |
    **The Pitfall:** Adding GPUDirect Storage without scaling the underlying physical NVMe drives.
    **The Rationale:** Engineers assume GDS magically increases disk speed, ignoring the hardware read limit of the single drive.
    **The Consequence:** The organization pays for premium networking software but only sees a marginal 1.37x speedup instead of the 3x compute-bound potential.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2TB/epoch. 4 GPUs needing 3 GB/s each (12 GB/s total).
    - W/o GDS: min(6, 4, 12) = 4 GB/s limit.
    - W/ GDS: min(6, 5.5) = 5.5 GB/s limit.
    - W/ GDS + 4 NVMes: 22 GB/s.

    **Calculations:**
    - Epoch time w/o GDS: 2 TB / 4 GB/s = 500s.
    - Epoch time w/ GDS (single NVMe): 2 TB / 5.5 GB/s = 364s.
    - Epoch time w/ GDS + 4 NVMes: 2 TB / 12 GB/s = 167s.

    **Conclusion & Interpretation:**
    - **Result: 364s with GDS, 500s without (Storage-Device-Bound)**. GDS alone helps, but multiple NVMes are required to fully saturate the 12 GB/s GPU compute demand (167s).
