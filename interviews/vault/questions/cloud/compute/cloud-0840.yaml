title: Sizing Deployments Across the Accelerator Spectrum
scenario: 'You are deploying a 1B parameter NLP model requiring 2 TFLOPs per request at 1,500 requests per second. You must choose between an NVIDIA GPU and a custom inference ASIC. Due to dynamic sequence lengths, the GPU achieves 60% utilization, while the static-shape requirements of the ASIC drop its effective utilization to 30%.'
question: 'How many GPUs versus custom ASICs are required, and what total power does each option consume?'
details:
  realistic_solution: 'First calculate effective throughput by multiplying peak TFLOPs by expected utilization. Divide total required TFLOPs by the effective throughput per chip, round up, and multiply by TDP. The GPU option requires 17 chips (2550W), while the ASIC requires 27 chips (2430W).'
  common_mistake: |
    **The Pitfall:** Dividing total required compute directly by peak theoretical TFLOPs.
    **The Rationale:** Candidates ignore the severe utilization penalties that specialized ASICs suffer when handling dynamic workloads.
    **The Consequence:** Underestimating the number of ASICs and power required, leading to a failed deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU: 312 TFLOPs peak FP16, 150W TDP.
    - ASIC: 380 TFLOPs peak FP16, 90W TDP.
    - Target: 1,500 req/s * 2 TFLOPs = 3,000 TFLOPs/s.
    
    **Calculations:**
    - GPU Effective: 312 TFLOPs * 0.60 = 187.2 TFLOPs/chip.
    - GPUs Needed: ceil(3000 / 187.2) = 17 GPUs.
    - GPU Power: 17 * 150W = 2550W.
    - ASIC Effective: 380 TFLOPs * 0.30 = 114 TFLOPs/chip.
    - ASICs Needed: ceil(3000 / 114) = 27 ASICs.
    - ASIC Power: 27 * 90W = 2430W.
    
    **Conclusion & Interpretation:**
    - **Result: 17 GPUs (2550W) vs 27 ASICs (2430W) (Utilization-Bound)**. Dynamic shapes destroy ASIC's raw compute advantage.
