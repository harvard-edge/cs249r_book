title: 'Transformer Cost Mastery: Full Training and Inference Cost Analysis for LLM Product'
scenario: 'Build a complete financial model for a 30B parameter transformer LLM product: training cost on GPUs, inference cost at 1000 req/s with 500 output tokens, and break-even monthly revenue. Training: 1T tokens, 40% MFU, 1000 H100s at $2.50/GPU-hour and 989 TFLOP/s peak. Inference: INT4 quantization (15GB model), H100 bandwidth 3.35 TB/s, 4x speculative decoding, effective serving batch 16, target P99 < 2s, 70% serving utilization.'
question: What are the training cost, inference fleet cost at 1000 req/s, and break-even monthly revenue for the 30B LLM product?
details:
  realistic_solution: Training requires 6 * 30B * 1T = 1.8e23 FLOPs. On 1000 H100s at 40% MFU, effective throughput is 3.956e17 FLOP/s, so training takes about 126.4 hours and costs about $316K. For inference, an H100 can stream the 15GB INT4 model in 15 / 3350 = 4.48 ms per decode pass. With 4x speculative decoding, a 500-token response needs about 125 target-model passes, giving about 0.56s latency at batch 16 and meeting the P99 < 2s target before queueing. Throughput is 16 requests * 500 tokens / 0.56s = about 14,286 output tokens/s, or 28.6 req/s per GPU at 100% utilization. At 70% serving utilization, each GPU supports about 20 req/s, so 1000 req/s needs ceil(1000 / 20) = 50 H100s. Monthly inference cost is 50 * $2.50/hr * 730 hr = $91,250/month. Break-even monthly revenue must exceed $91K for inference-only costs, or about $118K/month if the one-time training cost is amortized over 12 months.
  common_mistake: |
    **The Pitfall:** Calculating training cost once and ignoring ongoing inference costs.
    **The Rationale:** Training involves a massive upfront capital expense, which intuitively feels like the primary cost driver.
    **The Consequence:** The business model fails because monthly inference costs at scale can dominate amortized training costs and destroy unit economics.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30B model, 1T tokens.
    - Training cluster: 1000 H100s, 989 TFLOP/s peak per GPU, 40% MFU.
    - GPU cost = $2.50/hr.
    - Inference model size: 15GB INT4.
    - H100 memory bandwidth: 3.35 TB/s = 3350 GB/s.
    - Response length: 500 output tokens.
    - Speculative decoding: 4 accepted tokens per target-model pass.
    - Effective serving batch: 16 concurrent sequences per GPU.
    - Serving utilization target: 70%.

    **Calculations:**
    - Training FLOPs: 6 * 30e9 * 1e12 = 1.8e23.
    - Cluster Throughput: 1000 GPUs * 989e12 FLOPs/s * 0.40 = ~3.956e17 FLOPs/s.
    - Training Time: 1.8e23 / 3.956e17 ≈ 455,005 seconds ≈ 126.4 hours.
    - Training Cost: 1000 GPUs * $2.50 * 126.4 hours ≈ $316,000.
    - Inference decode pass time: 15GB / 3350 GB/s = 0.00448s = 4.48 ms/pass.
    - Target-model passes per 500-token response with 4x speculative decoding: 500 / 4 = 125 passes.
    - Per-request latency at batch 16: 125 * 4.48 ms = 0.56s, which meets the 2s P99 target before queueing.
    - Per-GPU output throughput at 100% utilization: 16 requests * 500 tokens / 0.56s = 14,286 tok/s.
    - Per-GPU request throughput at 100% utilization: 14,286 / 500 = 28.6 req/s.
    - Per-GPU request throughput at 70% utilization: 28.6 * 0.70 = 20.0 req/s.
    - Fleet size for 1000 req/s: ceil(1000 / 20.0) = 50 GPUs.
    - Monthly inference cost: 50 GPUs * $2.50/hr * 730 hr = $91,250/month.
    - 12-month training amortization: $316,000 / 12 = $26,333/month.
    - Break-even including amortized training: $91,250 + $26,333 = $117,583/month.

    **Conclusion & Interpretation:**
    - **Result: $316K one-time training cost and $91K/month inference cost (Cost-Bound)**. Break-even revenue must exceed $91K/month for inference-only service cost, or about $118K/month with training amortized over 12 months.
