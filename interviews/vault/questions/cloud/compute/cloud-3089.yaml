title: 'Systolic Array Implement: GEMM Performance on TPU v5e'
scenario: 'You need to calculate the exact time to perform a GEMM (C = A*B) on an accelerator (197 TFLOPS BF16, 819 GB/s bandwidth) where A is (8192, 4096) and B is (4096, 16384) in BF16.'
question: What is the GEMM time and bottleneck, the MFU at 8.5ms measured time, and the bandwidth impact of 4-way tiling?
details:
  realistic_solution: 'A: (8192, 4096). B: (4096, 16384). C: (8192, 16384). FLOPs = 2 * 8192 * 4096 * 16384 = 2 * 549.75G = 1.1 TFLOP. Weight bytes: A=8192*4096*2=67MB, B=4096*16384*2=134MB, C=8192*16384*2=268MB. Total BW = 469MB. AI = 1100G/469M = 2345 FLOPs/byte >> 240 ridge → compute bound. Time_compute = 1100G/197T = 5.58ms. Measured 8.5ms → MFU = 5.58/8.5 = 65.6%. With 4 tiles: each tile reads 1/4 of A and 1/4 of B: bandwidth same (469MB total, just split). Tiling doesn''t change total BW.'
  common_mistake: |
    **The Pitfall:** Computing FLOPs for GEMM as N^2 * M instead of 2*M*K*N.
    **The Rationale:** The correct formula for C[M,N] = A[M,K] * B[K,N] requires a factor of 2 for multiply-accumulate operations.
    **The Consequence:** Underestimating the compute requirements by exactly half, skewing roofline analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: TPU v5e with 197 TFLOPS BF16, 819 GB/s bandwidth.
    - Matrix A: 8192 x 4096 (BF16, 2 bytes/element).
    - Matrix B: 4096 x 16384 (BF16, 2 bytes/element).
    - Measured time: 8.5ms.

    **Calculations:**
    - Total FLOPs: 2 * 8192 * 4096 * 16384 = 1,099,511,627,776 FLOPs ≈ 1.1 TFLOPS.
    - Matrix A size: 8192 * 4096 * 2 = ~67 MB.
    - Matrix B size: 4096 * 16384 * 2 = ~134 MB.
    - Matrix C size (8192 x 16384): 8192 * 16384 * 2 = ~268 MB.
    - Total Bandwidth demand: 67 + 134 + 268 = 469 MB.
    - Arithmetic Intensity: 1100 GFLOPs / 469 MB ≈ 2345 FLOPs/byte (>> TPU Ridge point, so compute-bound).
    - Theoretical compute time: 1.1 TFLOPS / 197 TFLOPS = 5.58 ms.
    - MFU (Model FLOPs Utilization): 5.58 ms / 8.5 ms = 65.6%.

    **Conclusion & Interpretation:**
    - **Result: 65.6% MFU (Compute-Bound)**. The workload is highly compute-bound. Tiling affects on-chip SRAM capacity usage but does not alter the total theoretical off-chip memory bandwidth requirement.
