title: The Profiler Trace Puzzle
scenario: 'You profile a transformer training step on an H100 (989 TFLOPS peak). GEMM kernels occupy 45% of wall time (achieving 790 TFLOPS), attention kernels 20% (achieving 500 TFLOPS), elementwise/normalization 10% (achieving 50 TFLOPS), and 25% is gaps (no kernel running, 0 TFLOPS).'
question: "What is the overall GPU compute utilization, and where should you optimize first?"
details:
  realistic_solution: 'Overall utilization must account for all wall-clock time, not just GEMM compute. Eliminate gaps first via torch.compile or CUDA graphs. Then fuse elementwise/normalization ops into GEMM kernels, and ensure FlashAttention is enabled.'
  common_mistake: |
    **The Pitfall:** Calculating utilization only during active compute kernels (e.g., 790/989 = 80%).
    **The Rationale:** Candidates often ignore gap time and low-utilization kernels, focusing only on the fastest operations.
    **The Consequence:** Missing the largest optimization opportunities, such as eliminating gaps or fusing memory-bound ops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak: 989 TFLOPS.
       - Wall time: 45% GEMM (790 TFLOPS), 20% Attention (500 TFLOPS), 10% Elementwise (50 TFLOPS), 25% Gaps (0 TFLOPS).
    2. **Calculations:**
       - Weighted average: (0.45 × 790) + (0.20 × 500) + (0.10 × 50) + (0.25 × 0) = 355.5 + 100 + 5 + 0 = 460.5 TFLOPS.
       - Utilization: 460.5 / 989 = 46.6%.
    3. **Conclusion & Interpretation:**
       **Result: Utilization Bound. Overall utilization is 46.6%.**
