title: Chiplet Yield Model and Cost per Compute Die
scenario: A fab offers N5 (5nm) compute dies at $0.10/mm² cost and 0.1 defects/cm² defect density. Your monolithic design is 600mm². A chiplet alternative uses 6x100mm² dies.
question: For the 600 mm² monolithic die versus six 100 mm² chiplets, what are the yield and cost differences, and where is the crossover?
details:
  realistic_solution: |
    Use Murphy's yield model consistently. The 600 mm^2 die has yield about 56.5%, so its cost per good monolithic die is $60 / 0.565 = $106. A 100 mm^2 chiplet has yield about 90.5%, so one known-good chiplet costs $10 / 0.905 = $11.05 and six cost $66.30 before assembly. If assembly costs $10 and attach yield is 99% per chiplet, package assembly yield is 0.99^6 = 94.1%, giving chiplet cost per good package of ($66.30 + $10) / 0.941 = $81.10. The crossover is assembly cost: chiplets remain cheaper while assembly cost is below about $33.60 per package. Without known-good-die test before assembly, the six-chiplet package yield would be roughly 0.905^6 * 0.99^6 = 51.9%, which would make the chiplet package more expensive.
  common_mistake: |
    **The Pitfall:** Using a linear yield model instead of an exponential/Poisson model.
    **The Rationale:** Engineers incorrectly assume that dividing defect density by area scales yield proportionally.
    **The Consequence:** Vastly underestimating the economic advantage of chiplets, as yield degrades super-linearly with large die areas.
  napkin_math: |
    **Assumptions & Constraints:**
    - N5 (5nm) compute dies at $0.10/mm^2.
    - Defect density (D0) = 0.1 defects/cm^2.
    - Monolithic die area = 600 mm^2 (6 cm^2).
    - Chiplet area = 100 mm^2 (1 cm^2), needing 6 chiplets.
    - Assembly cost = $10.
    - Attach yield = 99% per chiplet; known-good chiplets are tested before package assembly.

    **Calculations:**
    - Monolithic yield: Y = ((1 - e^(-0.6)) / 0.6)^2 ≈ 56.5%.
    - Monolithic cost per good die: (600 mm^2 * $0.10) / 0.565 = $106.19.
    - Chiplet yield: Y = ((1 - e^(-0.1)) / 0.1)^2 ≈ 90.5%.
    - Chiplet cost per known-good die: (100 mm^2 * $0.10) / 0.905 = $11.05.
    - Six known-good chiplets before assembly: 6 * $11.05 = $66.30.
    - Package assembly yield: 0.99^6 = 94.1%.
    - Chiplet cost per good package: ($66.30 + $10) / 0.941 = $81.10.
    - Assembly-cost crossover: (($66.30 + A) / 0.941) = $106.19, so A = ~$33.60.

    **Conclusion & Interpretation:**
    - **Result: With known-good-die assembly, chiplets save ~$25 per package and stay cheaper until assembly cost exceeds ~$34 (Yield-Bound).**
