title: Dynamic Ensemble Compute vs Memory
scenario: A cloud fraud detection service uses an ensemble of 4 specialized models to handle distribution shifts in transaction patterns across different geographical regions. Each specialized expert model requires 20 TFLOPS per inference and 2GB of VRAM. A gating network determines the routing and requires 1 TFLOP and 0.5GB of VRAM.
question: "What are the per-request TFLOPS and active VRAM requirements for soft routing (all 4 outputs) versus top-1 hard routing across the 4 experts?"
details:
  realistic_solution: Hard routing reduces the compute requirement by 74% (down to 21 TFLOPS) but requires the exact same 8.5GB of VRAM as soft routing, as dynamically loading models from host memory per-request would violate real-time latency constraints.
  common_mistake: |
    **The Pitfall:** Assuming hard routing reduces the memory footprint proportionally to compute.
    **The Rationale:** Candidates think that because only one model runs, only one model needs to be loaded, forgetting the strict latency constraints of real-time cloud services.
    **The Consequence:** Proposing an architecture that dynamically loads 2GB models over PCIe per-request, resulting in massive SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 4 experts: 20 TFLOPS and 2GB VRAM each.
       * Gating: 1 TFLOP and 0.5GB VRAM.
    2. **Calculations:**
       * Soft Routing Compute: 1 + (4 * 20) = 81 TFLOPS.
       * Soft Routing VRAM: 0.5 + (4 * 2) = 8.5 GB.
       * Hard Routing Compute: 1 + (1 * 20) = 21 TFLOPS.
       * Hard Routing VRAM: 0.5 + (4 * 2) = 8.5 GB (models must stay resident).
    3. **Conclusion & Interpretation:** **Result: 74% Compute Reduction (Memory-Bound)**. Hard routing saves massive compute but requires 100% of the active VRAM.
