title: The Hidden Cost of Dynamic Graphs
scenario: Your team is profiling a PyTorch training loop and notices that CPU utilization is 60% while GPU utilization is only 45%. The `nsys` trace reveals frequent short gaps between GPU kernel launches.
question: What is the actual bottleneck causing the GPU launch gaps, and what two concrete fixes would you propose?
details:
  realistic_solution: |
    The bottleneck is CPU-side Python, framework dispatch, and launch overhead starving the GPU, not slow GPU kernels. Autograd tape construction may contribute, but the trace mainly shows the CPU failing to enqueue work fast enough. Two concrete fixes: (1) torch.compile() to capture and fuse the graph, reducing Python dispatch and kernel launch count; (2) CUDA Graphs to record a stable launch sequence and replay it with minimal CPU involvement.
  common_mistake: |
    **The Pitfall:** Blaming the GPU for being "too slow" when the trace shows launch gaps.
    **The Rationale:** Junior engineers look at the timeline gaps and assume the GPU is failing to process kernels efficiently.
    **The Consequence:** Efforts are spent optimizing perfectly fine CUDA kernels while the real bottleneck—CPU-side Python overhead starving the GPU—remains.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU utilization 60%, GPU 45%.
    - 2000 ops, 30μs dispatch overhead per op.
    - 27ms GPU compute time.

    **Calculations:**
    - CPU overhead: 2000 ops * 30μs dispatch = 60ms CPU overhead per step.
    - Step time: In PyTorch's asynchronous model, step time = max(CPU, GPU) = max(60ms, 27ms) = 60ms.
    - GPU utilization: 27ms active out of 60ms = 27/60 = 45%.
    - Pre-fix GPU utilization: 27ms active out of 60ms = 45%.
    - If compilation/graph replay reduces dispatch to 3ms, new step time = max(3ms, 27ms) = 27ms.
    - Post-fix utilization approaches 27/27 = 100% only under this simplified model.

    **Conclusion & Interpretation:**
    - **Result: CPU Dispatch Bottleneck**. The original trace is 45% GPU utilization because 60ms of CPU launch work gates 27ms of GPU work; graph capture can remove most of that idle time.
