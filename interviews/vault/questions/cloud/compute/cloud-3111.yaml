title: 'Transformer Cost Evaluation: Scaling Law Cost Prediction'
scenario: Use Chinchilla scaling laws to evaluate whether training a 70B model on 1.4T tokens (Chinchilla-optimal) or a 7B model on 1T tokens is more cost-efficient for achieving the same loss target.
question: "Using Chinchilla C=6ND, which is more cost-efficient for the same loss target: 70B on 1.4T tokens or 7B on 1T tokens, and what are the costs?"
details:
  realistic_solution: 'Chinchilla optimal D for 70B: 20*70B=1.4T tokens. For 7B: optimal D=20*7B=140B tokens. Training on 1T tokens is 7.1x over-training by Chinchilla. 70B costs 100x more ($515K vs $5.1K for 140B) but achieves fundamentally lower loss. For the same target loss as 70B@1.4T, a 7B model simply cannot reach it.'
  common_mistake: |
    **The Pitfall:** Comparing models at different loss values rather than the same target.
    **The Rationale:** Candidates blindly apply the Chinchilla C=6ND formula without checking if the stated token counts are actually optimal for the given model sizes.
    **The Consequence:** They end up drawing false conclusions about efficiency by comparing a massively over-trained small model to an optimal large model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - C=6ND. H100 effective compute = 792 TFLOPS. Cost = $2.50/hr.
       - 70B on 1.4T tokens vs 7B on 140B tokens (Chinchilla optimal).
    2. **Calculations:**
       - 70B @ 1.4T FLOPs: 6 × 70e9 × 1.4e12 = 5.88e23 FLOPs.
       - 70B Time on 1000 GPUs: 5.88e23 / (1000 × 7.92e14) = 742,424 s (206 hrs). Cost: 1000 × 2.50 × 206 = $515,000.
       - 7B @ 140B FLOPs: 6 × 7e9 × 140e9 = 5.88e21 FLOPs.
       - 7B Time on 1000 GPUs: 5.88e21 / (1000 × 7.92e14) = 7,424 s (2.06 hrs). Cost: 1000 × 2.50 × 2.06 = $5,150.
    3. **Conclusion & Interpretation:** **A 70B model costs 100x more ($515K vs $5.1K) to train, but a 7B model fundamentally cannot reach the same minimum loss target regardless of over-training. Result: Compute-Bound.**
