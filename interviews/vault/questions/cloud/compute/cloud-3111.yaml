title: 'Transformer Cost Evaluation: Scaling Law Cost Prediction'
scenario: Use Chinchilla scaling laws to evaluate whether training a 70B model on 1.4T tokens (Chinchilla-optimal) or a 7B model on 1T tokens is more cost-efficient for achieving the same loss target.
question: 'Using Chinchilla C=6ND, which is more cost-efficient for the same loss target: 70B on 1.4T tokens or 7B on 1T tokens, and what are the costs?'
details:
  realistic_solution: Chinchilla optimal D for 70B is 20*70B=1.4T tokens, so 70B on 1.4T is compute-optimal. For 7B, the compute-optimal token count is 20*7B=140B tokens, so 7B on 1T tokens is 7.1x over-trained relative to Chinchilla. Using the stated 1000-H100 cost model, 70B@1.4T costs about $515K, while 7B@1T costs about $36.8K. The 7B run is cheaper, but it is not cost-efficient for the same loss target because a 7B model cannot reach the same loss floor as a Chinchilla-optimal 70B model merely by training on 1T tokens. For that target, the 70B run is the viable choice.
  common_mistake: |
    **The Pitfall:** Comparing models at different loss values rather than the same target.
    **The Rationale:** Candidates blindly apply the Chinchilla C=6ND formula without checking if the stated token counts are actually optimal for the given model sizes.
    **The Consequence:** They end up drawing false conclusions about efficiency by comparing a massively over-trained small model to an optimal large model.
  napkin_math: |
    **Assumptions & Constraints:**
    - C=6ND.
    - H100 effective compute = 792 TFLOPS per GPU.
    - Cost = $2.50/hr per GPU.
    - Cost model uses 1000 GPUs.
    - Compare the stated runs: 70B on 1.4T tokens vs 7B on 1T tokens.

    **Calculations:**
    - 70B @ 1.4T FLOPs: 6 * 70e9 * 1.4e12 = 5.88e23 FLOPs.
    - 70B time on 1000 GPUs: 5.88e23 / (1000 * 7.92e14) = 742,424 s = 206.2 hr.
    - 70B cost: 1000 * $2.50/hr * 206.2 hr = $515,500.
    - 7B Chinchilla-optimal tokens: 20 * 7B = 140B, so 1T tokens is 1T / 140B = 7.1x over the compute-optimal token count.
    - 7B @ 1T FLOPs: 6 * 7e9 * 1e12 = 4.20e22 FLOPs.
    - 7B time on 1000 GPUs: 4.20e22 / (1000 * 7.92e14) = 53,030 s = 14.7 hr.
    - 7B cost: 1000 * $2.50/hr * 14.7 hr = $36,750.

    **Conclusion & Interpretation:**
    - **Result: 7B@1T is cheaper ($36.8K vs $515K), but it does not satisfy the same-loss-target premise. For the 70B-level loss target, the 70B@1.4T run is the viable choice.**
