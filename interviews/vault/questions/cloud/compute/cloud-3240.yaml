title: Diagnosing Workload Bottlenecks on NVIDIA H100 with Roofline Analysis
scenario: You are optimizing an FP16 large language model inference workload on a single NVIDIA H100 GPU. Initial profiling shows your application is only achieving 50 TFLOPS.
question: How would you use a roofline model on the H100 to diagnose the 50 TFLOPS FP16 workload, and what are examples of memory-bound versus compute-bound operations?
details:
  realistic_solution: 1. Characterize workload operational intensity (OI) in FLOPs/byte from profiler counters. 2. Construct the H100 roofline with a memory ceiling of bandwidth × OI and a compute ceiling of 989 TFLOPS. 3. Plot the observed 50 TFLOPS point against the ceiling for its OI. If OI is low, for example below 50 / 3.35 ≈ 15 FLOPs/byte, then 50 TFLOPS is consistent with a memory-bandwidth limit. If OI is above the 295 FLOPs/byte ridge point, the workload should be compute-bound and 50 TFLOPS indicates another bottleneck such as poor tensor-core utilization, synchronization, launch overhead, or small batch sizes.
  common_mistake: |
    **The Pitfall:** Exclusively focusing on optimizing compute kernels or improving parallelism without quantifying operational intensity.
    **The Rationale:** Engineers see low FLOPS and immediately assume the compute units are underutilized, rather than starving for data.
    **The Consequence:** Wasting effort on compute-bound optimizations for a memory-bound problem on a high-performance accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 peak compute: 989 TFLOPS (FP16).
    - H100 peak bandwidth: 3.35 TB/s (HBM3).

    **Calculations:**
    - Roofline ridge point: 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/byte.
    - Memory-Bound Example (Vector Addition, C = A + B):
      - Per element: read A (2 bytes), read B (2 bytes), write C (2 bytes), and do 1 FLOP.
      - Operational Intensity (OI) = 1 FLOP / 6 bytes ≈ 0.167 FLOPs/byte.
      - Roofline performance = min(989, 3.35 TB/s * 0.167) ≈ 0.56 TFLOPS, so it is memory-bound.
    - Compute-Bound Example (Dense MatMul, 1024x1024):
      - FLOPS = 2 * 1024³ ≈ 2.147 GFLOPs.
      - Data Movement = 3 matrices * 1024² * 2 bytes ≈ 6.29 MB.
      - OI = 2.147 GFLOPs / 6.29 MB ≈ 341 FLOPs/byte.
      - Roofline performance = min(989, 3.35 TB/s * 341) = 989 TFLOPS, so ideal dense matmul is compute-bound.
    - Diagnosing the observed 50 TFLOPS:
      - If measured OI <= 50 / 3.35 ≈ 15 FLOPs/byte, 50 TFLOPS matches a memory-bandwidth ceiling.
      - If measured OI >> 295 FLOPs/byte, 50 TFLOPS is below the compute roof for reasons outside the simple bandwidth roofline.

    **Conclusion & Interpretation:**
    - **Result: Roofline classification depends on measured OI.** Vector add is memory-bound, large dense matmul is compute-bound, and the 50 TFLOPS LLM workload is memory-bound only if its measured OI places it on the bandwidth ceiling.
