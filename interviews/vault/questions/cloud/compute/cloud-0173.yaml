title: The TTFT vs. TPOT Tug-of-War
scenario: You are designing the inference engine for a new AI code completion product. The primary requirement is 'instantaneous suggestions that stream out quickly'. You are serving a 70B parameter model. Initial tests show low Time-To-First-Token (TTFT) at batch size 1 but poor Time-Per-Output-Token (TPOT). Conversely, a large batch size yields excellent TPOT but unacceptable TTFT due to queueing delays.
question: Why can't the 70B code assistant get both low TTFT at batch size 1 and excellent TPOT at large batch size, and what design can satisfy both?
details:
  realistic_solution: The paradox is dictated by the Roofline Model. At batch size 1, the decode step is severely memory-bandwidth bound (low arithmetic intensity), causing poor TPOT. Scaling batch size increases arithmetic intensity, pushing the decode step into the compute-bound regime (excellent TPOT), but standard batching forces incoming requests to wait for the entire batch to complete, destroying TTFT. The architectural solution is Continuous Batching (iteration-level scheduling), which decouples the latency-bound prefill phase from the throughput-bound decode phase.
  common_mistake: |
    **The Pitfall:** Suggesting a naive hardware-only solution like upgrading to a B200 or simply shrinking the model.
    **The Rationale:** System engineers often default to brute-forcing hardware limits rather than addressing the core scheduling architectures.
    **The Consequence:** The fundamental physics of the Roofline Model remain unchallenged; queueing delays will still wreck TTFT under load, failing the product requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters (140 GB weights).
    - Hardware Ridge Point (H100): ~295 FLOPs/Byte.
    - Decode Compute: 2 FLOPs per parameter.

    **Calculations:**
    - Batch 1 decode does about 2 × 70B = 140 GFLOPs while streaming about 140 GB of weights, so AI ≈ 1 FLOP/Byte.
    - If one decode step processes B active sequences together and reuses the same weight read across the batch, AI scales approximately to B FLOPs/Byte.
    - Batch 64 therefore gives about 64 FLOPs/Byte, still below a ~295 FLOPs/Byte H100 ridge point but much less memory-bound than B=1.
    - Larger batches improve TPOT by raising AI, but waiting to form those batches increases TTFT.

    **Conclusion & Interpretation:**
    - **Result: AI Improves with Effective Batch Size.** Batch 1 is strongly memory-bandwidth bound; larger effective batches improve TPOT through weight reuse but create queueing pressure. Continuous batching helps by keeping decode batches full while admitting and retiring requests at iteration boundaries, but it still needs latency-aware scheduling to protect TTFT.
