title: LLM-Automated Spear Phishing Scale
scenario: An attacker weaponizes a quantized 7B parameter LLM to automate targeted spear-phishing against your organization. They deploy the model across a botnet of 50 compromised cloud nodes, each equipped with a single T4 GPU. The model consistently generates 20 tokens per second per node. Each highly personalized phishing payload requires generating exactly 200 tokens.
question: How many 200-token personalized phishing emails can the 50-node T4 botnet generate in 24 hours?
details:
  realistic_solution: |
    Determine the payload generation rate per node by dividing tokens per second by tokens per payload. Scale by the botnet size, and multiply by the number of seconds in a 24-hour period to get the daily throughput.
  common_mistake: |
    **The Pitfall:** Failing to convert tokens per second to payloads per second.
    **The Rationale:** Candidates calculate raw token volume but forget the operational boundary of a single payload.
    **The Consequence:** Producing a useless metric that overestimates the volume of actual malicious emails sent.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50-node botnet, 1 GPU per node.
       - Throughput: 20 tokens/sec per node.
       - Payload size: 200 tokens.
    2. **Calculations:**
       - Rate per node = 20 tokens/sec / 200 tokens/payload = 0.1 payloads/sec.
       - Total rate = 0.1 * 50 = 5 payloads/sec.
       - Daily volume = 5 * 86,400 seconds = 432,000 payloads.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. The botnet can generate 432,000 personalized emails per day.
