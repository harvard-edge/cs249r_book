title: Chiplet Package Signal Integrity at 112G SerDes
scenario: Your chiplet AI accelerator uses 112G PAM-4 SerDes for die-to-die links on a passive silicon interposer. Signal integrity testing shows BER of 1e-8, which is above the target of 1e-12. Systematic root cause analysis is needed.
question: "How would you systematically diagnose and fix the 1e-8 BER on 112G PAM-4 die-to-die SerDes to meet the 1e-12 target?"
details:
  realistic_solution: 'Systematic diagnosis: (1) Measure insertion loss (IL) and return loss (RL) with VNA at interposer bumps — target IL < 3dB at 28GHz (Nyquist for 112G PAM-4). (2) Check via stub resonance on interposer — stubs create notches at f = c/(4*stub_length*sqrt(Er)). (3) Verify bump array ground-signal-ground ratio — insufficient ground return causes simultaneous switching noise. (4) Tune CTLE/DFE tap weights via receiver adaptation sweep. At 112G PAM-4, 1dB extra loss degrades SNR by ~0.5dB, increasing BER by ~1 order of magnitude. Fix: back-drill vias to remove stubs, add decoupling caps at bump periphery, re-tune DFE.'
  common_mistake: |
    **The Pitfall:** Immediately blaming the SerDes IP or process node.
    **The Rationale:** Software or logic engineers assume bit errors imply faulty digital IP rather than physical analog channel degradation.
    **The Consequence:** Wasting cycles debugging IP while ignoring the physical interposer trace impedance mismatch or bump inductance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 112G PAM-4 (56 Gbaud, 28 GHz Nyquist), 1e-12 BER target max IL is ~4dB.

    **Calculations:**
    - Budget breakdown = PCB 0.5dB + connector 0.3dB + interposer 1.5dB + bump 0.5dB + package 0.5dB = 3.3dB.
    - At 1e-8 BER, actual IL is ~5.5dB.

    **Conclusion & Interpretation:**
    - **Result: Signal Degradation.** The channel exceeds insertion loss budget by roughly 2dB.
