title: Diagnosing Low MFU in LLM Training
scenario: You are training a 175B parameter LLM on a cluster of 1024 A100 GPUs using tensor parallelism (TP=8) and pipeline parallelism (PP=16). Your run is only achieving 110 TFLOPS per GPU (~35% MFU).
question: What is the primary bottleneck behind the 35% MFU, and how would you change the pipeline schedule or micro-batch size?
details:
  realistic_solution: The low computational intensity is driven by pipeline bubbles and low arithmetic intensity. To fix this, switch to an interleaved 1F1B pipeline schedule (e.g., using Megatron-LM or DeepSpeed) to reduce the bubble ratio, and increase the micro-batch size to maximize Tensor Core utilization and saturate the A100's SRAM bandwidth. This will significantly boost the MFU.
  common_mistake: |
    **The Pitfall:** Blaming the InfiniBand network bandwidth for the low MFU.
    **The Rationale:** Network limits are a common scapegoat for poor distributed scaling.
    **The Consequence:** Wasting time trying to optimize collective communications instead of fixing the actual bottleneck: massive pipeline bubbles and low arithmetic intensity from small micro-batch sizes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total peak: 1024 A100s * 312 TFLOPS = 319 PFLOPS.
       - Current sustained: 1024 * 110 TFLOPS = 112.6 PFLOPS (MFU = 35%).
       - Pipeline Parallelism (p): 16.
    2. **Calculations:**
       - Pipeline Bubble Fraction in 1F1B schedule: `(p-1) / (m + p - 1)`.
       - If number of micro-batches (`m`) is small (e.g., 16), bubble fraction is `(16-1) / (16+16-1) = 15/31`.
       - 15/31 ≈ 48% idle compute time.
    3. **Conclusion & Interpretation:** **~48% idle compute time (Pipeline Bubble-Bound).**
