title: SecAgg Dropout Recovery Compute Explosion
scenario: 'A federated learning cloud aggregator is training a 50M parameter (200MB in FP32) model across 10,000 edge devices per round using the standard Secure Aggregation (SecAgg) protocol. The system runs smoothly when all devices report back, but experiences catastrophic compute and latency spikes when even 5% (500) of devices drop offline during the reporting phase. The server has 64-core CPUs and 256GB RAM.'
question: 'What causes the SecAgg dropout recovery latency spike when 5% of 10,000 devices drop offline, and how should it be fixed?'
details:
  realistic_solution: 'The aggregator is choked by the computational cost of Pseudo-Random Generator (PRG) expansion. When users drop out, the server must reconstruct their pairwise seeds with all surviving users and expand them to cancel the incomplete masks. The solution is to adopt sparse SecAgg+ (using random graphs of logarithmic degree) to bound the number of pairwise keys per device.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the memory to store 10,000 incoming updates or network bandwidth timeouts.
    **The Rationale:** Most distributed systems failures are network or memory bound, leading engineers to overlook cryptographic compute costs.
    **The Consequence:** Attempting to fix the problem by adding more RAM or tuning network timeouts, completely failing to address the O(U^2) pairwise mask reconstruction compute overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - U=10,000 users and 500 dropouts.
    - Mask size is 200MB (FP32 gradient).
    - Optimistic 10GB/s PRG throughput across 64 cores.

    **Calculations:**
    - The server must reconstruct approximately 500 * 9,500 = 4.75 * 10^6 pairwise masks.
    - Generating 4.75 * 10^6 * 200MB = 950TB of pseudo-random data.
    - Generating 950TB takes 95,000 seconds (>26 hours).

    **Conclusion & Interpretation:**
    - **Result: 95,000 seconds (Compute-Bound PRG Expansion)**. This massive compute overhead explains the catastrophic latency spike during dropout recovery.
