title: ReLU Roofline Analysis on AVX-512 CPU vs H100 GPU
scenario: You need to apply ReLU activation to a 10M-element tensor.
question: How long would ReLU on a 10M-element tensor take on an AVX-512 CPU (3 GHz, 16-wide, 50 GB/s memory bandwidth) vs. an H100 GPU (3.35 TB/s), and is it compute- or memory-bound?
details:
  realistic_solution: 'ReLU is max(0, x) — 1 FLOP per element, but reads and writes 4 bytes per element. Compute: 10M FLOPs. Memory: 10M × 4B read + 10M × 4B write = 80 MB. CPU: 10M / (16 elements × 3 GHz) = 0.208 ms compute. Memory: 80 MB / 50 GB/s ≈ 1.6 ms. Memory-bound on CPU. GPU: 10M / 989 TFLOPS = 0.01 µs compute. Memory: 80 MB / 3.35 TB/s = 0.024 ms. Memory-bound on GPU too. Element-wise operations like ReLU are always memory-bound because arithmetic intensity is O(1) — one FLOP per element loaded.'
  common_mistake: |
    **The Pitfall:** Trying to optimize element-wise operations by using faster compute (like tensor cores).
    **The Rationale:** Candidates focus on compute FLOPs instead of analyzing the memory access requirements of simple ops.
    **The Consequence:** Failing to realize they are memory-bound—the only way to speed them up is higher memory bandwidth or kernel fusion to reduce memory traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size: 10M FP32 elements.
    - ReLU work: 1 FLOP/element and 4B read + 4B write = 8 bytes/element.
    - CPU: AVX-512, 16 elements/cycle, 3 GHz, 50 GB/s memory bandwidth.
    - H100: 989 TFLOPS peak compute, 3.35 TB/s memory bandwidth.

    **Calculations:**
    - Total compute: 10M FLOPs.
    - Total memory traffic: 10M * 8B = 80 MB.
    - CPU compute time: 10M / (16 * 3e9) = 0.208 ms.
    - CPU memory time: 80 MB / 50 GB/s = 1.6 ms.
    - GPU compute time: 10M / 989e12 = 0.010 microseconds.
    - GPU memory time: 80 MB / 3.35 TB/s = 0.024 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound.** The expected time is about 1.6 ms on the CPU and 0.024 ms on the H100 because memory transfer dominates compute on both devices.
