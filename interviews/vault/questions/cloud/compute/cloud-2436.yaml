title: LLM Decoding Bandwidth Wall
scenario: A team is deploying a 30B parameter LLM (FP16) on a single A100 80GB GPU. They want to achieve a strict SLA of 100 tokens/sec at batch size 1. They calculate that 30B parameters require roughly 60 GFLOPs per token, so 100 tokens/sec needs 6 TFLOPS. Since the A100 has 312 TFLOPS, they guarantee the SLA. In production, they only achieve roughly 25 tokens/sec.
question: Why is 100 tokens/sec at batch size 1 impossible for the 30B FP16 model on one A100 despite needing only 6 TFLOPS?
details:
  realistic_solution: The team failed to analyze batch-1 decoding with a roofline model. A 30B FP16 model has about 60 GB of weights, and a decoder step at batch size 1 performs roughly 2 FLOPs per parameter while streaming those weights through HBM. That gives an effective arithmetic intensity near 1 FLOP per byte of weight traffic, far below the A100 ridge point of 312 TFLOPS / 2 TB/s = 156 FLOPs/Byte. The attainable token rate is dictated by memory bandwidth, not peak Tensor Core throughput. To fix this, they must reduce bytes moved per token through quantization, increase effective batching, use speculative decoding, or move to hardware with more memory bandwidth.
  common_mistake: |
    **The Pitfall:** Confusing peak theoretical TFLOPS with attainable throughput and entirely ignoring the Roofline memory wall.
    **The Rationale:** The team performed a pure FLOP-based calculation, fundamentally misunderstanding that generating a single token requires streaming the entire model weight matrix from HBM into the SMs.
    **The Consequence:** Severe breach of production SLA guarantees, leading to failing applications, irate clients, and forced emergency hardware over-provisioning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 30B params (FP16) = 60 GB weight size.
    - SLA requirement: 100 tokens/sec at batch size 1.
    - Hardware: A100 with 2.0 TB/s HBM bandwidth.

    **Calculations:**
    - Per-token work estimate = 2 FLOPs/parameter * 30B parameters = 60 GFLOPs/token.
    - Effective weight traffic at batch size 1 = 30B parameters * 2 bytes = 60 GB/token.
    - Arithmetic intensity = 60 GFLOPs/token / 60 GB/token = 1 FLOP/Byte.
    - A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
    - 1 FLOP/B << 156 FLOPs/B, therefore deeply memory-bound.
    - Theoretical max throughput = 2,000 GB/s / 60 GB/token = 33.3 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: Strictly Memory-Bandwidth Bound**. The physics of the memory bus limit the system to ~33 tokens/sec. Achieving 100 tokens/sec on one GPU is an architectural impossibility without aggressive quantization.
