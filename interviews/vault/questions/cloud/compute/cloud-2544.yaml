title: Cloud Warp Divergence L3 0
scenario: You have a custom CUDA kernel where each thread processes one token. 25%
  of tokens take a short path (10 cycles) and 75% take a long path (40 cycles). Threads
  are randomly assigned to warps of 32.
question: With 25% short-path tokens and 75% long-path tokens randomly assigned to
  32-thread warps, what is the expected warp time and efficiency loss?
details:
  realistic_solution: 'A warp diverges if any thread takes a different path. Probability
    all 32 threads take the same path: P(all short) = 0.25^32 \u2248 0 or P(all long)
    = 0.75^32 \u2248 0.0001. So nearly every warp diverges. Divergent warp time: short
    path + long path = 10 + 40 = 50 cycles. Non-divergent average: 0.25x10 + 0.75x40
    = 32.5 cycles. Efficiency: ideal throughput per cycle = 32 threads / 32.5 cycles
    = 0.985 threads/cycle. Actual: 32 threads / 50 cycles = 0.64 threads/cycle. Efficiency
    loss: 1 - 0.64/0.985 = 35%.'
  common_mistake: '**The Pitfall:** Computing the average per-thread time as the warp
    time.

    **The Rationale:** In SIMT, the warp time is the sum of all distinct branch durations
    because paths execute sequentially.

    **The Consequence:** Performance estimations fall short of reality by ignoring
    the high cost of warp divergence.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 32-thread warps. 25% short (10 cycles), 75% long (40 cycles).


    **Calculations:**

    - Divergence Probability: 1 - (0.25^32 + 0.75^32) \u2248 99.99%.

    - Divergent Time: 10 + 40 = 50 cycles.

    - Ideal Average Time: (0.25 * 10) + (0.75 * 40) = 32.5 cycles.

    - Efficiency Loss: 1 - (32.5 / 50) = 35%.


    **Conclusion & Interpretation:**

    - **Result: 35% efficiency loss (Compute-Bound)**. Warp divergence causes a 35%
    loss in ideal efficiency.

    '
