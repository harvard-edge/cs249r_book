title: Analyze Chinchilla Compute-Optimal Training Budget on H100
scenario: Your team has a compute budget of $5M and access to GPUs at $2.50/GPU/h. The GPUs achieve 45% MFU on transformer training (peak 989 TFLOP/s FP16). The Chinchilla scaling law dictates compute-optimal training requires N* ≈ sqrt(C/6) parameters and D* = 6N* tokens (where C is total training FLOPs).
question: What compute-optimal model size and token count does a $5M H100 training budget buy, and how does it compare to GPT-3?
details:
  realistic_solution: 'Effective throughput per H100: 989 × 0.45 = 445 TFLOP/s. Budget = $5M. GPU-hours: $5M / $2.50 = 2M GPU-hours. Total FLOP: 2M × 3600s × 445 × 10¹² = 3.2 × 10²⁴ FLOPs. Chinchilla: N* = sqrt(C/6) = sqrt(3.2×10²⁴/6) = sqrt(5.33×10²³) = 7.3×10¹¹ = 730B parameters. D* = 6 × 730B = 4.38T tokens. Comparison: GPT-3 used 300B tokens to train 175B params (under-trained by Chinchilla). GPT-4 estimated ~13T tokens for ~1.8T params.'
  common_mistake: |
    **The Pitfall:** Using peak TFLOP/s instead of MFU-adjusted throughput.
    **The Rationale:** Candidates fail to realize that actual training never achieves 100% of theoretical hardware performance.
    **The Consequence:** The total FLOP budget is overestimated by >2x, resulting in an oversized model that cannot be fully trained within the dollar budget.
  napkin_math: |
    - Budget: $5M / $2.50 = 2M GPU-hours.
    - Effective throughput: 989 TFLOP/s * 0.45 = 445 TFLOP/s.
    - Total FLOPs (C): 2M hours * 3600s * 445e12 = 3.2e24 FLOPs.
    - Chinchilla Params (N*): sqrt(3.2e24 / 6) = sqrt(5.33e23) ≈ 730 Billion parameters.
    - Chinchilla Tokens (D*): 6 * 730B = 4.38 Trillion tokens.
    - **Result: A compute-optimal $5M run yields a 730B parameter model trained on 4.38T tokens.**
