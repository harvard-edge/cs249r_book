title: Optimal Recompute-vs-Save Scheduling
scenario: You are building a memory optimizer for a training framework. Given a computational graph with N operations, each with known compute cost c_i and activation memory size m_i, you must decide which activations to save and which to recompute during the backward pass, minimizing peak memory while staying within a compute budget of at most 33% overhead.
question: How would you formulate activation checkpoint selection with a 33% recompute budget, and what practical algorithm would you use?
details:
  realistic_solution: |
    Formulate checkpoint selection as a constrained peak-memory optimization on the actual DAG. Use a binary decision variable s_i for whether activation i is saved, plus a schedule model that determines when unsaved activations must be recomputed. Objective: minimize the maximum live activation memory over the forward/backward schedule. Constraint: extra recompute FLOPs <= 0.33 * original forward FLOPs, while respecting graph dependencies and activation lifetimes. Chain models have specialized checkpointing algorithms, but those results do not directly solve heterogeneous DAGs. A practical implementation can use an ILP/min-cost solver for small graphs, or a graph-aware greedy/DP heuristic that ranks candidates by memory saved per recompute FLOP and respects dependency cuts. Systems considerations: recomputation must preserve RNG state for dropout and account for transient memory peaks during recompute.
  common_mistake: |
    **The Pitfall:** Treating this as a simple 'checkpoint every sqrt(N) layers' heuristic.
    **The Rationale:** Sqrt(N) is a well-known theoretical approximation for uniform sequential chains.
    **The Consequence:** Real computational graphs are DAGs with heterogeneous operation costs and branching, making the rigid heuristic suboptimal or completely invalid.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each op i has compute cost c_i and activation memory m_i.
    - Extra recompute budget is at most 33% of forward FLOPs.
    - The graph may be a heterogeneous DAG, not a simple chain.

    **Calculations:**
    - Objective: minimize peak_t sum(live activations at time t).
    - Budget constraint: sum(recomputed c_i) <= 0.33 * sum(forward c_i).
    - Candidate score for a heuristic: memory saved / extra recompute FLOP, filtered by dependency feasibility and transient peak memory.

    **Conclusion & Interpretation:**
    - **Result: Constrained DAG Scheduling Problem**. There is no valid derivation of a fixed 15-unit memory target from the stated budget; use a DAG-aware solver or heuristic and report the achieved peak memory and recompute overhead.
