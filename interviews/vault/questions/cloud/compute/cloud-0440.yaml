title: The Vision Transformer Resolution Trap
scenario: 'A customer increases image resolution from 224x224 to 448x448. ResNet-50 latency stays within the 10ms budget, but ViT-Base latency explodes to over 20ms. Data loading is optimized.'
question: 'Why does doubling resolution make ViT exceed 20ms while ResNet stays within budget?'
details:
  realistic_solution: 'CNN compute scales linearly with pixel count O(H*W). Self-attention scales quadratically with patch count O(N^2). Doubling resolution quadruples patches, causing a 16x FLOP increase.'
  common_mistake: |
    **The Pitfall:** Assuming models with similar initial FLOPs scale similarly with resolution.
    **The Rationale:** Candidates forget that computational complexity functions differ fundamentally.
    **The Consequence:** Blaming memory bandwidth or hardware drivers for mathematically guaranteed algorithmic latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet scales linearly. ViT scales quadratically.
    - Resolution doubles (2x height, 2x width).
    
    **Calculations:**
    - CNN Scaling: 4x pixels = 4x FLOPs.
    - Patch Count (N): 224->448 means 4x more patches.
    - ViT Self-Attention Cost: (4x)^2 = 16x FLOPs.
    
    **Conclusion & Interpretation:**
    - **Result: 16x FLOP explosion (Compute-Bound)**. ViT's quadratic complexity severely limits high-resolution deployment.
