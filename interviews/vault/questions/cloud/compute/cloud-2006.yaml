title: Tensor Core Bottlenecks in GEMM
scenario: You are optimizing a custom dense layer on an NVIDIA GPU. The layer performs an FP16 matrix multiplication with dimensions M=8192, K=8192, N=8192.
question: "What are the arithmetic intensity, bottleneck type, and minimum execution time for the M=N=K=8192 FP16 GEMM on the A100?"
details:
  realistic_solution: 'The operation requires 2 * 8192^3 = 1.1 TFLOPs. Total memory traffic involves reading two inputs and writing one output: 3 * (8192^2) * 2 bytes = 402 MB. The arithmetic intensity is 1.1 TFLOPs / 402 MB = 2736 FLOPs/byte. The A100''s ridge point is 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte. Since 2736 >> 156, the operation is heavily compute-bound by the Tensor Cores. The minimum execution time is the theoretical compute time: 1.1 TFLOPs / 312 TFLOPS = 3.52 milliseconds.'
  common_mistake: |
    **The Pitfall:** Mixing up MACs with FLOPs.
    **The Rationale:** Matrix multiplication is often thought of in terms of multiply-accumulate operations (MACs).
    **The Consequence:** Candidates forget that 1 MAC = 2 FLOPs, halving the actual compute intensity and often misclassifying the operation as memory-bound. They also frequently forget to account for the output matrix write in the byte count.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GEMM dimensions M=N=K=8192 (FP16, 2 bytes).
       - A100 capabilities: 312 TFLOPS compute, 2.0 TB/s bandwidth.
    2. **Calculations:**
       - FLOPs = 2 × M × N × K = 2 × 8192³ = 1.1e12 (1.1 TFLOPs).
       - Memory Traffic = 3 × 8192² × 2 bytes = 402e6 (402 MB).
       - Arithmetic Intensity = 1.1e12 / 402e6 = 2736 FLOPs/B.
       - A100 Ridge Point = 312e12 / 2.0e12 = 156 FLOPs/B.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Since 2736 >> 156, the operation is heavily bottlenecked by Tensor Cores, yielding a theoretical minimum execution time of 3.52 ms.**
