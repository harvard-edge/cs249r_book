title: XCD Hot-Spot Thermal Management Under Sustained Load
scenario: In production, TDP readings are uniform but sustained throughput on one job type drops 12% after
  30 minutes. Telemetry shows temperature is uniform across XCDs but frequency drops on XCDs 0 and 1.
question: Why do XCDs 0 and 1 throttle and reduce throughput by 12% despite uniform TDP and temperatures,
  and how would you fix it?
details:
  realistic_solution: 'XCDs 0-1 are thermal throttling due to localized hotspots, despite the package-level
    sensor reading nominal averages. The job memory access pattern creates non-uniform HBM utilization—XCDs
    0-1 act as "master" ranks for cross-XCD tensor parallel reduction, increasing their localized power
    by ~38W. This raises their temperature by ~3.0°C over the package average, hitting the throttle limit.
    Fix: redistribute TP ranks so reduction work rotates across XCDs, and adjust per-XCD power limits
    using system management interfaces.'
  common_mistake: '**The Pitfall:** Assuming uniform TDP means uniform thermal load across all chiplets.

    **The Rationale:** Candidates look at the package-level aggregate sensor and ignore that specific
    workloads (like TP reduction ranks) can create localized hotspots on individual XCDs.

    **The Consequence:** The root cause is missed entirely, and the cluster continues to silently thermal
    throttle.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Package TDP: 750W over 8 XCDs = ~94W average per XCD.

    - XCDs 0-1 carry 1.4x localized load.

    - Thermal resistance: 0.08°C/W.


    **Calculations:**

    - XCDs 0-1 power: 94W * 1.4 = ~132W each.

    - Excess power over average: 132W - 94W = 38W.

    - Junction temp delta above average: 38W * 0.08°C/W = 3.0°C above average.


    **Conclusion & Interpretation:**

    - **Result: If the package average operates close to the throttle limit, the extra 3.0°C pushes XCDs
    0-1 into thermal throttling (Thermal-Bound).**

    '
