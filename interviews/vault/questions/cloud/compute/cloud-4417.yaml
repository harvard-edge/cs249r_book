title: XCD Hot-Spot Thermal Management Under Sustained Load
scenario: In production, TDP readings are uniform but sustained throughput on one job type drops 12% after 30 minutes. Telemetry shows temperature is uniform across XCDs but frequency drops on XCDs 0 and 1.
question: Why do XCDs 0 and 1 throttle and reduce throughput by 12% despite uniform TDP and temperatures, and how would you fix it?
details:
  realistic_solution: |
    The uniform TDP and temperature readings are too coarse to rule out local throttling. They likely represent package-level or slowly averaged sensors, while the frequency counters show that XCDs 0 and 1 are hitting a local thermal or power-management limit. The job probably maps a repeated hot role, such as collective aggregation, memory-controller-heavy work, or launch coordination, onto the same two XCDs for the full run. Fix it by collecting per-XCD frequency, power, and hotspot telemetry, then changing rank/device ordering so the hot roles rotate or land on different XCDs. If the platform supports documented per-XCD power or frequency controls, cap or derate the hot domains slightly to avoid throttle oscillation; otherwise separate this job type onto nodes with a validated topology mapping.
  common_mistake: |
    **The Pitfall:** Assuming uniform TDP means uniform thermal load across all chiplets.
    **The Rationale:** Candidates look at the package-level aggregate sensor and ignore that specific workloads (like TP reduction ranks) can create localized hotspots on individual XCDs.
    **The Consequence:** The root cause is missed entirely, and the cluster continues to silently thermal throttle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Package TDP: 750W over 8 XCDs = ~94W average per XCD.
    - XCDs 0-1 carry 1.4x localized load in this job.
    - Local thermal resistance estimate: 0.08°C/W.

    **Calculations:**
    - XCDs 0-1 power: 94W * 1.4 = ~132W each.
    - Excess power over average: 132W - 94W = 38W.
    - Local junction delta estimate: 38W * 0.08°C/W = 3.0°C above the package-average sensor.
    - If the steady-state margin to the throttle point is less than ~3°C, the package sensor can still look uniform while the local XCD controller throttles.

    **Conclusion & Interpretation:**
    - **Result: Sensor-Granularity-Bound.** The 3°C estimate is a plausibility check; the decisive evidence is per-XCD frequency droop, so the fix is to remap or rotate the hot work and verify with per-chiplet telemetry.
