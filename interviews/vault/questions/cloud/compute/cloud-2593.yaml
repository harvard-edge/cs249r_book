title: Cloud Benchmark Harness L5 0
scenario: A hardware vendor claims their chip is 2x faster than H100 for LLM inference, showing benchmark results at batch=1, sequence=128. Your production workload is batch=32, sequence=2048.
question: Is the vendor speedup at batch 1 and sequence 128 valid for your batch 32, sequence 2048 workload, and how do memory bandwidth and compute throughput factor into the evaluation?
details:
  realistic_solution: 'No. The vendor benchmark (batch=1, seq=128) is likely biased toward memory bandwidth and launch overhead effects: each decode step has low arithmetic intensity and limited KV-cache pressure. Your workload (batch=32, seq=2048) is mixed: prefill can be compute-throughput-bound because large matrix multiplies dominate, while decode remains memory-bandwidth- and KV-cache-capacity-sensitive. A 2x result on the small benchmark therefore does not validate the production workload. Evaluate the chip with representative batch and sequence sizes, or use a roofline model with the chip''s actual memory bandwidth, peak/usable FLOPS, memory capacity, and KV-cache footprint.'
  common_mistake: |
    **The Pitfall:** Accepting vendor benchmarks at face value without matching the configuration to the production workload.
    **The Rationale:** Candidates assume performance scales uniformly, ignoring how batch size and sequence length shift the bottleneck from memory bandwidth to compute.
    **The Consequence:** Purchasing expensive hardware that underperforms on the actual production workload due to insufficient compute capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vendor benchmark: batch=1, seq=128 (Memory-bandwidth bound).
    - Production: batch=32, seq=2048 (Prefill is compute-bound).
    - H100 compute: 989 TFLOPS. H100 BW: 3.35 TB/s.

    **Calculations:**
    - A 2x result on the batch=1 test could come from higher effective memory bandwidth or lower overhead on that narrow case.
    - It does not determine speedup when arithmetic intensity rises in prefill or when KV cache and memory capacity dominate decode at batch=32 and seq=2048.
    - A roofline check needs actual chip specs: attainable FLOPS, memory bandwidth, memory capacity, and the production workload's FLOPs/byte.

    **Conclusion & Interpretation:**
    - **Result: Representative Benchmark Required.** The batch=1 speedup may disappear or change sign on the production workload, but the direction cannot be asserted without workload-matched measurements or a roofline analysis using real compute-throughput and memory-bandwidth data.
