title: 'Cloud Benchmark Harness L5 0'
scenario: 'A hardware vendor claims their chip is 2x faster than H100 for LLM inference, showing benchmark results at batch=1, sequence=128. Your production workload is batch=32, sequence=2048.'
question: 'Is the vendor speedup at batch 1 and sequence 128 valid for your batch 32, sequence 2048 workload, and how does compute bandwidth factor into the evaluation?'
details:
  realistic_solution: 'The vendor benchmark (batch=1, seq=128) is memory-bandwidth-bound — each token reads all weights once, minimal KV cache. This favors chips with high memory bandwidth. Your workload (batch=32, seq=2048) is mixed: prefill is compute-bound, decode is still memory-bound but with 32x more KV cache. Key concerns: (1) Does the chip have enough memory capacity for batch=32 KV cache? (2) Is the compute sufficient? If the vendor achieves 2x speedup at batch=1, they likely have ~6.7 TB/s bandwidth. However, if they compromised on compute (e.g., 500 TFLOPS vs H100 989 TFLOPS), the 2x advantage will invert to a 0.5x disadvantage during the compute-bound prefill phase of your workload.'
  common_mistake: |
    **The Pitfall:** Accepting vendor benchmarks at face value without matching the configuration to the production workload.
    **The Rationale:** Candidates assume performance scales uniformly, ignoring how batch size and sequence length shift the bottleneck from memory bandwidth to compute.
    **The Consequence:** Purchasing expensive hardware that underperforms on the actual production workload due to insufficient compute capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vendor benchmark: batch=1, seq=128 (Memory-bandwidth bound).
    - Production: batch=32, seq=2048 (Prefill is compute-bound).
    - H100 compute: 989 TFLOPS. H100 BW: 3.35 TB/s.

    **Calculations:**
    - Vendor BW for 2x at batch=1: ~6.7 TB/s.
    - If vendor compute is 500 TFLOPS, speedup in compute-bound prefill = 500 / 989 = ~0.5x.

    **Conclusion & Interpretation:**
    - **Result: 0.5x disadvantage during prefill phase. (Compute-Bound Bottleneck)**. The vendor chip may severely underperform on your prefill workload.
