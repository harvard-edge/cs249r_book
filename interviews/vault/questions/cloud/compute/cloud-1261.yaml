title: Starved Urgent Jobs in Fair-Share Clusters
scenario: A centralized ML platform manages 1,024 GPUs using a fair-share scheduler with a 7-day half-life historical usage decay. Team X runs a continuous pre-training job using 600 GPUs daily. Team Y, which hasn't used the cluster in a month, submits a massive batch of independent jobs. Team X then submits an urgent 16-GPU debugging job, but it remains Pending for 8 hours.
question: Why does Team X's 16-GPU debug job starve, and what scheduler change would support urgent debugging?
details:
  realistic_solution: Team X's massive historical usage severely depressed its tenant fair-share priority, so Team Y's queued work outranks even Team X's small 16-GPU debug job while the cluster is saturated. The job is small enough to fit only after lower-priority work can be bypassed or preempted; size alone does not override the tenant priority ordering. The solution is to introduce Quality of Service (QoS) tiers or a dedicated interactive/debug queue with strict size and time limits, optionally with preemption, so urgent debugging has bounded admission instead of relying only on the normal fair-share queue.
  common_mistake: |
    **The Pitfall:** Assuming that smaller job sizes or submission times dictate priority in a fair-share system.
    **The Rationale:** Candidates ignore that fair-share algorithms heavily penalize historical usage to balance long-term resource allocation across tenants.
    **The Consequence:** Starving urgent debug jobs because the scheduler prioritizes entirely idle users regardless of job size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fair-share priority is tenant-level and decreases as decayed historical usage exceeds the tenant's target share.
    - Team X uses 600 of 1,024 GPUs continuously; Team Y has near-zero recent usage after a month idle.
    - The exact score depends on the scheduler formula, but lower decayed usage yields higher priority when other factors are equal.

    **Calculations:**
    - Team X has consumed about 600 / 1,024 = 58.6% of cluster capacity in the recent decay window.
    - Team Y has consumed approximately 0% in the same window, so its fair-share factor is much higher under common Slurm/Kueue-style fair-share policies.
    - When the cluster is saturated and Team Y has enough higher-priority queued jobs to take newly freed GPUs, Team X's 16-GPU job stays pending even though its absolute size is small.
    - The debug job needs a policy exception: a bounded interactive QoS, priority boost, reservation, or preemptible debug queue with strict GPU and runtime caps.

    **Conclusion & Interpretation:**
    - **Result: Scheduler-bound starvation from historical usage priority.** Team X's debug job needs an interactive/debug QoS with size and time limits, and possibly preemption, instead of relying only on the normal fair-share queue.
