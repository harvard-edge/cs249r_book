title: Starved Urgent Jobs in Fair-Share Clusters
scenario: A centralized ML platform manages 1,024 GPUs using a fair-share scheduler with a 7-day half-life historical usage decay. Team X runs a continuous pre-training job using 600 GPUs daily. Team Y, which hasn't used the cluster in a month, submits a massive batch of independent jobs. Team X then submits an urgent 16-GPU debugging job, but it remains Pending for 8 hours.
question: Why does Team X's 16-GPU debug job starve, and what scheduler change would support urgent debugging?
details:
  realistic_solution: Team X's massive historical usage severely depressed their fair-share priority score, so Team Y's jobs outrank even Team X's small 16-GPU debug job while the cluster remains saturated. The solution is to introduce Quality of Service (QoS) tiers or a dedicated 'interactive/debug' queue with strict size and time limits, optionally with preemption, so urgent debugging has a bounded path that does not depend only on historical fair-share priority.
  common_mistake: |
    **The Pitfall:** Assuming that smaller job sizes or submission times dictate priority in a fair-share system.
    **The Rationale:** Candidates ignore that fair-share algorithms heavily penalize historical usage to balance long-term resource allocation across tenants.
    **The Consequence:** Starving urgent debug jobs because the scheduler prioritizes entirely idle users regardless of job size.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7-day half-life historical usage decay.
    - Team X uses 600 GPUs continuously, so the historical usage rate is 600 GPU-days per day.
    - Team Y has used 0 GPUs for the last month.

    **Calculations:**
    - Exponential decay constant lambda = ln(2) / 7 days.
    - For a scheduler that integrates usage rate with exponential decay, steady decayed usage is rate / lambda.
    - Team X steady decayed usage ≈ 600 GPU-days/day / (ln(2)/7 days) = 600 * 7 / ln(2) ≈ 6,060 GPU-days.
    - Team Y's decayed usage is approximately 0 GPU-days, so fair-share ordering strongly favors Team Y while resources are scarce.
    - A 16-GPU job size does not by itself overcome Team X's tenant-level fair-share deficit when the cluster is saturated by higher-priority queued work.

    **Conclusion & Interpretation:**
    - **Result: Scheduler-bound starvation from historical usage priority.** Team X's debug job needs an interactive/debug QoS with size and time limits, and possibly preemption, instead of relying only on the normal fair-share queue.
