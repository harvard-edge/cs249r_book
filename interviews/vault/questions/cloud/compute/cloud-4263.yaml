title: Yield-Performance Tradeoff in Chiplet Design
scenario: Your team is deciding between a monolithic 600mm² die vs a 4-chiplet design of 150mm² dies for a next-gen ML accelerator.
question: Which design should you recommend after comparing monolithic versus 4-chiplet yield and performance?
details:
  realistic_solution: 'Die yield follows Poisson: Y ≈ (1 + D0*A/α)^(-α). At D0=0.1 defects/cm², a 600mm² die yields ~59%, while each 150mm² chiplet yields ~86%. A 4-chiplet assembled accelerator has about 0.86^4 ≈ 55% probability that all four chiplets are good before accounting for assembly yield, so the simple system-yield result is similar to monolithic. Recommend chiplets only if known-good-die reuse, binning, reticle limits, or modular scaling outweigh the inter-chiplet performance penalty for cross-chiplet traffic.'
  common_mistake: |
    **The Pitfall:** Assuming a monolithic die is always superior because there are no interconnect hops.
    **The Rationale:** It's intuitive to think that keeping everything on one piece of silicon maximizes performance and minimizes latency.
    **The Consequence:** Ignoring defect density makes large dies exponentially costly to manufacture, ruining the unit economics of the accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - Defect density (D0) = 0.1/cm².
    - Clustering factor (α) = 2.
    - Monolithic area = 600 mm² = 6 cm².
    - Chiplet area = 150 mm² = 1.5 cm².

    **Calculations:**
    - Monolithic Yield (Y_mono) = (1 + 0.1 * 6 / 2)^(-2) = 1.3^(-2) ≈ 59%.
    - Chiplet Yield (Y_chiplet) = (1 + 0.1 * 1.5 / 2)^(-2) = 1.075^(-2) ≈ 86%.
    - 4-chiplet system yield probability = 0.86^4 ≈ 55%.

    **Conclusion & Interpretation:**
    - **Result: 86% per-chiplet yield and about 55% 4-chiplet system yield.** The yield comparison alone is close to the 59% monolithic yield; the recommendation depends on whether known-good-die binning and modularity offset assembly cost and cross-chiplet performance loss.
