title: Multi-Die Power Delivery Network Design for AI Chiplet
scenario: A chiplet AI accelerator with 4 compute dies and 2 HBM stacks on a silicon interposer experiences voltage droop of 8% during matrix multiply bursts, causing frequency throttling. Design a power delivery network to reduce droop to under 3%.
question: How would you design the PDN for the 4-compute-die, 2-HBM chiplet package to reduce matrix-multiply voltage droop from 8% to under 3%?
details:
  realistic_solution: |
    Address droop as a hierarchy rather than with one magic capacitor number: maximize on-die decap where timing and area allow, place package or interposer decap close to the compute dies, reduce loop inductance through dense package power/ground paths, and use fast local regulation or load-line control for lower-frequency burst energy. Treat the 750A transient as a package-level aggregate design point across the compute dies. At 1V, reducing droop from 80mV to 30mV means the effective transient PDN impedance target moves from about 0.106 mΩ to about 0.04 mΩ. The design goal is therefore a shaped impedance profile across the burst spectrum, not a single ESL calculation; verify with package extraction, workload current profiles, and silicon droop monitors.
  common_mistake: |
    **The Pitfall:** Relying on PCB-level decoupling capacitors to solve on-package voltage droop.
    **The Rationale:** Hardware engineers misapply board-level PDN intuition to advanced chiplet packaging.
    **The Consequence:** The nanosecond-scale droop persists due to PCB capacitor ESL, causing frequency throttling and missed performance targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Supply = 1V, transient current = 750A.
    - Current droop = 80mV (8%); target droop = 30mV (3%).
    - Example high-frequency decap ESL = 1pH.

    **Calculations:**
    - Current effective PDN impedance = 80mV / 750A = 0.106 mΩ.
    - Target PDN impedance = 30mV / 750A = 0.04 mΩ.
    - A 1pH path has inductive reactance at 1GHz of 2 * pi * 1GHz * 1pH = 6.28 mΩ.
    - Many capacitors in parallel, package planes, and VR response reduce the system impedance, so the 6.28 mΩ figure is one high-frequency point, not the whole PDN budget.

    **Conclusion & Interpretation:**
    - **Result: Impedance-Bound.** Passive decoupling alone is unlikely to meet the 0.04 mΩ target across the burst spectrum; use a multi-tier PDN with on-die/package decap, low-inductance power delivery, and fast regulation rather than treating one capacitor calculation as proof by itself.
