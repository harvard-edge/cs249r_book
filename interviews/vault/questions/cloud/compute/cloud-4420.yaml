title: Multi-Die Power Delivery Network Design for AI Chiplet
scenario: A chiplet AI accelerator with 4 compute dies and 2 HBM stacks on a silicon interposer experiences voltage droop of 8% during matrix multiply bursts, causing frequency throttling. Design a power delivery network to reduce droop to under 3%.
question: How would you design the PDN for the 4-compute-die, 2-HBM chiplet package to reduce matrix-multiply voltage droop from 8% to under 3%?
details:
  realistic_solution: |
    Address droop at each hierarchy: (1) On-die decap: maximize MOM capacitor fill in all metal layers above active logic — target 10 nF/mm² on N5. (2) Package-embedded capacitors: thin-film capacitors in package substrate (100 pF/mm²), placed directly under hot compute regions. (3) Active voltage regulator (AVR) on package: integrated VRM with <2ns response time, 100A/ns slew rate. (4) Structured power mesh: 4um pitch power grid on M8/M9 to minimize IR drop. Budget: 8% droop (80mV at 1V) at 750A transient current implies a ~0.106mΩ effective PDN impedance. Target: 3% → need 0.04mΩ. Achieve with extensive on-die decap (reduces high-freq component) + faster integrated VRM.
  common_mistake: |
    **The Pitfall:** Relying on PCB-level decoupling capacitors to solve on-package voltage droop.
    **The Rationale:** Hardware engineers misapply board-level PDN intuition to advanced chiplet packaging.
    **The Consequence:** The nanosecond-scale droop persists due to PCB capacitor ESL, causing frequency throttling and missed performance targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Supply = 1V, Current = 750A.
       - Target: Reduce droop from 80mV (8%) to 30mV (3%).
    2. **Calculations:**
       - Target PDN impedance = 30mV / 750A = 0.04 mΩ.
       - On-die decap (50 μF, 1 pH ESL) impedance at 1GHz = 2π * 1G * 1pH = 6.28 mΩ.
    3. **Conclusion & Interpretation:**
       - **Result: Impedance-Bound**. Passive decap impedance at 1GHz (6.28 mΩ) is too high to hit the 0.04 mΩ target, proving active package-integrated voltage regulators are required.
