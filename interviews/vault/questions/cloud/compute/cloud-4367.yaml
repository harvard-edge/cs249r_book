title: MI300X Power Budget and Thermal Throttling Under Full Load
scenario: 'An MI300X GPU (TDP 750W) is running a training workload. Under sustained FP16 GEMM at 90% utilization, measured throughput is 1,050 TFLOPS against the 1,307 peak. The thermal sensor reads 92°C (throttle threshold: 95°C) and power draw is 742W. An H100 SXM5 (TDP 700W) running the same relative workload measures 1.5°C below its 83°C throttle threshold.'
question: Is the MI300X thermally limited at 92°C and 742W under sustained GEMM, and how does its thermal headroom compare with H100?
details:
  realistic_solution: |
    The MI300X is close to its thermal limit but is not currently thermally throttled: 92°C is still 3°C below the 95°C threshold. The throughput gap is therefore more likely from kernel efficiency, occupancy, or memory behavior than from an active thermal cap. A workload spike may trigger throttling if it pushes junction temperature to 95°C or higher. The H100 also has limited absolute headroom at 1.5°C below threshold, but its lower power draw and operating point make the thermal margin less precarious.
  common_mistake: |
    **The Pitfall:** Attributing sub-peak utilization entirely to thermal throttling.
    **The Rationale:** Engineers see high temperatures and assume performance is already being aggressively capped.
    **The Consequence:** Missed optimizations in kernel wave quantization and memory access patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X TDP 750W, Threshold 95°C.
    - H100 TDP 700W, Threshold 83°C.

    **Calculations:**
    - MI300X \DeltaT at 742W = 37.1°C. Junction 92°C means 3°C headroom.
    - H100 Junction 81.5°C means 1.5°C headroom from stated threshold, but overall lower heat density.

    **Conclusion & Interpretation:**
    - **Result: MI300X is near its thermal threshold but not yet thermal-bound.** Current underperformance should be investigated as software/kernel or memory-efficiency loss; thermal throttling becomes likely only if load or cooling conditions push the GPU to 95°C or higher.
