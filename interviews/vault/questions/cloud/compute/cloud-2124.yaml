title: Designing an Autograd Engine From Scratch
scenario: You are designing a minimal autograd engine for a new ML framework. The engine must support arbitrary DAG-structured computational graphs, gradient accumulation when a tensor is used multiple times, and memory-efficient backward passes.
question: How would you design the autograd engine's data structures and backward algorithm, and why is topological sort essential?
details:
  realistic_solution: 'Data structures include tensor nodes and operation nodes. Algorithm: Topological sort of the graph from loss to inputs. Why topological sort is essential: if tensor X feeds into multiple operations, we must ensure X''s gradient accumulates correctly. Without topological ordering, we might pass X''s incomplete gradient downstream.'
  common_mistake: |
    **The Pitfall:** Implementing the backward pass as a naive recursive Depth-First Search (DFS) from the loss node.
    **The Rationale:** Candidates default to simple tree-traversal algorithms, forgetting that neural networks are Directed Acyclic Graphs (DAGs) with shared nodes.
    **The Consequence:** The recursive DFS leads to exponential time complexity (computing gradients for shared nodes multiple times) and fails to correctly accumulate gradients from multiple consumers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Graph Size: ~400 nodes (V), ~600 edges (E).

    **Calculations:**
    - A correct reverse traversal processes each node after all downstream gradient contributions have arrived.
    - Topological ordering over the DAG costs O(V + E) = 400 + 600 = about 1000 graph operations.
    - A naive recursive implementation without memoization can revisit shared subgraphs and double-count gradients, but exponential time is not inherent to DAG backpropagation.

    **Conclusion & Interpretation:**
    - **Result: O(V+E) Graph Traversal**. Topological sort gives a correct dependency order for gradient accumulation at fan-in nodes and avoids redundant traversal of shared subgraphs.
