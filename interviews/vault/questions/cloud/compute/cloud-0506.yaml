title: The Silent Padding Tax
scenario: Your team is migrating an NLP workload to TPUs to save costs. You are using a batch size of 15 and a hidden dimension of 768. XLA compiles the graph successfully, but the profiler shows the MXU (Matrix Multiply Unit) utilization is sitting at a dismal 11%.
question: "What is destroying your performance?"
details:
  realistic_solution: 'TPUs are built around rigid, physical systolic arrays. The TPU Matrix Multiply Unit (MXU) operates strictly on 128x128 tiles of bfloat16 numbers. If your tensor dimensions are not multiples of 128, XLA does not fail—it silently pads your tensors with zeros to make them fit the physical hardware grid. A batch size of 15 is aggressively padded up to 128, meaning the MXU is spending the vast majority of its time computing on zeros.'
  common_mistake: |
    **The Pitfall:** Assuming that because the XLA compiler succeeds, the framework is efficiently mapping the math to the hardware.
    **The Rationale:** Candidates are used to CUDA on GPUs handling unaligned dimensions reasonably well.
    **The Consequence:** The TPU MXU spends the vast majority of its time calculating on zero-padded values, burning power and cycle time for nothing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size = 15, Hidden dimension = 768.
       - TPU MXU operates strictly on 128x128 bfloat16 tiles.
    2. **Calculations:**
       - Required operations per step: 15 * 768 = 11,520.
       - Padded dimensions: Batch size 15 is padded to 128.
       - Padded operations: 128 * 768 = 98,304.
       - Hardware utilization: 11,520 / 98,304 = 11.7%.
    3. **Conclusion & Interpretation:** **Actual utilization achieved is 11.7% due to zero-padding the batch size to the nearest 128x128 tile. Result: Architecture-Bound.**
