title: Training Budget Overrun From Sequence Length
scenario: A language-model training run was budgeted for 400,000 GPU-hours at sequence length 2,048. One week before launch, the team switches to 8,192-token context while keeping model size and total token count fixed. Attention was 30% of step time at 2,048 and scales quadratically with sequence length; the rest scales linearly with tokens.
question: How does switching from 2,048 to 8,192 context affect a 400,000 GPU-hour training budget when attention is 30% of step time?
details:
  realistic_solution: |
    Because the total training token count is fixed, the context length increasing by 4x means the number of training steps decreases by 4x. Non-attention work is linear in tokens, so its total cost stays fixed (1x). Attention is quadratic in sequence length per step, but with 4x fewer steps, the total attention cost scales by 4x.
  common_mistake: |
    **The Pitfall:** Assuming the entire step cost scales linearly or quadratically without separating attention from feed-forward networks.
    **The Rationale:** Candidates frequently forget that a 4x longer context means 4x fewer steps to reach the same total token count.
    **The Consequence:** The team massively overestimates (e.g., 3.04M GPU-hours) or underestimates the revised training budget, leading to poor financial planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 400k GPU-hours at seq 2,048.
    - Switch to seq 8,192 (4x). Total tokens fixed.
    - Attention = 30% of step time (scales quadratically).
    - Non-attention = 70% (scales linearly).

    **Calculations:**
    - Non-attention cost: 0.70 * 400k = 280,000 GPU-hours.
    - Attention scaling: 4^2 = 16x per step, but 4x fewer steps = 4x total scaling.
    - New attention cost: 0.30 * 400k * 4 = 480,000 GPU-hours.
    - Total new budget: 280,000 + 480,000 = 760,000 GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: 760,000 GPU-hours total budget (Attention-Cost-Bound)**. The new budget is exactly 1.9x the original due to the quadratic scaling of attention over fewer total steps.
