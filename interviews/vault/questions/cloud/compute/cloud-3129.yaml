title: Recall Transformer Inference FLOPs Formula
scenario: 'An interviewer asks you to state from memory: what is the standard approximation formula for total FLOPs in a single forward pass of a transformer with N parameters and sequence length S? And separately, what is the training FLOPs formula? How does inference FLOPs scale with sequence length vs model size?'
question: What are the standard FLOPs approximation formulas for inference and training, and how do they scale with sequence length?
details:
  realistic_solution: |
    The standard dense-layer approximation is about 2N FLOPs per generated token for inference, or about 2NS FLOPs for a length-S forward pass. That estimate is linear in parameter count and sequence length for the parameterized matrix multiplies. Self-attention adds a separate quadratic context term, commonly written per layer as O(B x H x S^2 x d_head) for the QK and PV attention work. Training over D tokens is approximately 6ND FLOPs: about 2N FLOPs/token for the forward pass plus roughly twice that for the backward pass. So the clean answer is inference is approximately 2N per token, 2NS per sequence plus attention's O(S^2) term; training is approximately 6ND over D training tokens.
  common_mistake: |
    **The Pitfall:** Using 6ND for inference or forgetting attention FLOPs scale as O(S^2).
    **The Rationale:** Engineers memorize the training formula (6ND) and blindly apply it to inference, ignoring the backward pass absence.
    **The Consequence:** Vastly overestimating inference compute for small contexts, or underestimating it for large contexts due to missing the O(S^2) attention term.
  napkin_math: |
    **Assumptions & Constraints:**
    - N parameters, sequence length S, training tokens D.
    - B is batch size, H is attention heads, and d_head is the per-head dimension.

    **Calculations:**
    - Inference per token, dense approximation: about 2N FLOPs.
    - Inference for a length-S sequence, dense approximation: about 2N * S = 2NS FLOPs.
    - Attention per layer adds a quadratic context term: O(B * H * S^2 * d_head), with constants depending on whether QK, softmax, and PV are counted.
    - Training over D tokens: about 3 passes worth of the 2N/token forward estimate = 6ND FLOPs.

    **Conclusion & Interpretation:**
    - Use 2N/token or 2NS/sequence for inference, plus the explicit O(S^2) attention term. Use 6ND for training over D tokens.
