title: Recall Transformer Inference FLOPs Formula
scenario: 'An interviewer asks you to state from memory: what is the standard approximation formula for
  total FLOPs in a single forward pass of a transformer with N parameters and sequence length S? And separately,
  what is the training FLOPs formula? How does inference FLOPs scale with sequence length vs model size?'
question: What are the standard FLOPs approximation formulas for inference and training, and how do they
  scale with sequence length?
details:
  realistic_solution: Standard forward pass inference FLOPs per token is roughly 2N. For a sequence of
    length S, the total forward pass is approximately 2NS. However, exact attention FLOPs scale as O(S^2),
    so for very long sequences, the attention term (4 * batch * heads * S^2 * head_dim) dominates. Training
    FLOPs are approximately 6ND, where D is the number of tokens in the training dataset (1 forward +
    2 backward FLOPs per parameter, yielding 3 * 2N = 6N FLOPs per token). Thus, inference scales linearly
    with model size O(N) but quadratically with sequence length O(S^2).
  common_mistake: '**The Pitfall:** Using 6ND for inference or forgetting attention FLOPs scale as O(S^2).

    **The Rationale:** Engineers memorize the training formula (6ND) and blindly apply it to inference,
    ignoring the backward pass absence.

    **The Consequence:** Vastly overestimating inference compute for small contexts, or underestimating
    it for large contexts due to missing the O(S^2) attention term.'
  napkin_math: '**Assumptions & Constraints:**

    - N parameters, sequence length S, batch size B, heads H.


    **Calculations:**

    - Inference (forward): 2NS FLOPs for dense layers.

    - Attention: 4 * B * H * S^2 * d_model.

    - Training: 6ND FLOPs (1 forward + 2 backward FLOPs per parameter).


    **Conclusion & Interpretation:**

    - For small S, dense layers dominate (O(N)). For large S, attention dominates (O(S^2)).'
