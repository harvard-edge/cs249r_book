title: 'The H100 Roofline Ridge Point: Roofline Analysis'
scenario: 'An NVIDIA H100 GPU provides 989 TFLOPS of FP16 compute and 3.35 TB/s of HBM3 memory bandwidth. To write efficient kernels, you need to understand the machine''s balance between compute and memory.'
question: 'What is the H100''s FP16 ridge point, and what does it imply for memory- vs compute-bound kernels?'
details:
  realistic_solution: 'The ridge point is a hardware characteristic that defines the transition from memory-bound to compute-bound performance. It''s the minimum arithmetic intensity (FLOPs/Byte) an algorithm must have to saturate the GPU''s compute units. For the H100, any kernel with an arithmetic intensity below this value will be bottlenecked by memory bandwidth; any kernel above it will be bottlenecked by raw compute power.'
  common_mistake: |
    **The Pitfall:** Confusing the units (dividing TFLOPS by GB/s instead of TB/s) or inverting the ratio.
    **The Rationale:** Candidates rush the calculation and calculate Bytes/FLOP or mismatch orders of magnitude.
    **The Consequence:** Misidentifying whether a workload is memory-bound or compute-bound, leading to completely misguided optimization efforts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 Peak Compute: 989 TFLOPS.
       - H100 Memory Bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Ridge Point = 989 * 10^12 FLOPs / 3.35 * 10^12 Bytes = ~295 FLOPs/Byte.
    3. **Conclusion & Interpretation:** **Result: Hardware-Bound**. Any algorithm with an arithmetic intensity strictly below 295 FLOPs/Byte is memory-bound; anything above is compute-bound.
  options:
  - ~295,000 FLOPs/Byte. This indicates most models are memory-bound.
  - ~0.0034 FLOPs/Byte. This indicates most models are compute-bound.
  - ~295 FLOPs/Byte. Algorithms with arithmetic intensity below this are memory-bound.
  - ~295 FLOPs/Byte. Algorithms with arithmetic intensity above this are memory-bound.
