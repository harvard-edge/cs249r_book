title: TPU v5e FFN Batch-Sequence Size for High Utilization
scenario: You are tasked with analyzing compute utilization for a transformer FFN layer with hidden=4096 and FFN_dim=16384 on a TPU v5e (197 TFLOPS BF16, 819 GB/s, ridge point = 240 FLOPs/byte).
question: What batch * sequence size is needed for the FFN layer to be compute-bound at ≥99% utilization on TPU v5e, and how do you derive it?
details:
  realistic_solution: To be compute-bound, Arithmetic Intensity (AI) must exceed the hardware ridge point. For a single 4096x16384 FFN matmul with BF16 input/output and weights loaded once, AI = (134.2M * BS) / (40,960 * BS + 134.2M). Hitting the 240 FLOPs/byte ridge requires BS about 259. If the design target is 3x the ridge point for high practical utilization, AI=720 requires BS about 922, so choosing the next convenient power-of-two batch*sequence size, 1024, is the practical answer.
  common_mistake: |
    **The Pitfall:** Calculating the exact batch size where AI equals the ridge point and stopping there.
    **The Rationale:** Candidates misinterpret the Roofline model, assuming that perfectly hitting the ridge point guarantees 100% compute utilization.
    **The Consequence:** The model deployed in production hits only ~50% utilization due to scheduling overheads and imperfect memory access patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - FFN dims: hidden=4096, FFN_dim=16384. Precision: BF16.
    - TPU v5e ridge point: 240 FLOPs/byte.
    - Practical high-utilization target: 3x ridge, AI=720.

    **Calculations:**
    - FLOPs: 2 * BS * 4096 * 16384 = BS * 134.2M.
    - Memory Bytes: BS * 4096 * 2 (input) + 4096 * 16384 * 2 (weight) + BS * 16384 * 2 (output) = BS * 40,960 + 134.2M.
    - To hit ridge point (AI=240): 240 = (134.2M * BS) / (40,960 * BS + 134.2M) => BS ≈ 259.
    - To hit the high-utilization target (AI=720): 720 = (134.2M * BS) / (40,960 * BS + 134.2M) => BS ≈ 922.
    - Practical padded shape: choose BS=1024.

    **Conclusion & Interpretation:**
    - **Result: BS ≈ 922, practically 1024.** To operate well past the ridge point, use batch*sequence around 1024 for this FFN matmul.
