title: 'Heterogeneous Chiplet Integration: DSP + AI Core on Same Package'
scenario: A cloud inference service combines dense DNN inference with heavy signal processing. The proposed architecture integrates a DSP die and an AI inference die on the same package.
question: How would you design the data path and memory sharing between the DSP die and AI inference die for FFT-heavy DNN inference?
details:
  realistic_solution: 'Use a producer-consumer pipeline with explicit DMA: DSP outputs signal processing results to a shared SRAM buffer on the interposer; AI die reads via DMA with coherency disabled (streaming mode). Interpose a small low-latency SRAM on the active interposer as a staging buffer.'
  common_mistake: |
    **The Pitfall:** Designing a shared memory pool with coherent access across heterogeneous dies.
    **The Rationale:** Coherent shared memory seems elegant on paper and simplifies software abstractions.
    **The Consequence:** Cross-ISA coherency protocols add massive latency for large block transfers, bottlenecking the critical data handoff between the DSP and the AI die.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DSP output: 16K FFT = 128KB per batch (780 calls/sec).
       - Transfer interval: 128KB every 1.28ms.
       - Explicit DMA bandwidth: 500 GB/s. Coherent fabric sustained bandwidth for cross-die streaming traffic: ~50 GB/s after snoop/directory overhead.
       - Cross-die coherency also adds arbitration and ordering latency that is hard to hide in a tight producer-consumer handoff.
    2. **Calculations:**
       - 128 KiB = 131,072 bytes.
       - Explicit DMA transfer time = 131,072 bytes / 500e9 bytes/sec = 0.262 μs.
       - Coherent streaming time at 50 GB/s = 131,072 bytes / 50e9 bytes/sec = 2.62 μs before arbitration and ordering delays.
       - Bandwidth-only ratio = 2.62 μs / 0.262 μs = 10x, with additional tail-latency risk from coherency traffic.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Variance-Bound.** Explicit DMA through a shared SRAM staging buffer is the safer design because it gives predictable bulk-transfer bandwidth and avoids coherent-fabric contention on the DSP-to-AI handoff.
