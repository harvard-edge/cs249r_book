title: The Roofline Across Precisions
scenario: 'You are analyzing the roofline model for a GPU at four precisions: FP32, BF16, FP8, and INT8.'
question: Calculate the ridge point for each precision and explain why a workload that is compute-bound at FP16 can become memory-bound at INT8.
details:
  realistic_solution: Each precision has a different peak FLOPS (compute ceiling) and the same memory bandwidth (3.35 TB/s on H100). The ridge point — where a workload transitions from memory-bound to compute-bound — shifts right as precision drops because compute scales faster than bandwidth. A workload with fixed arithmetic intensity can cross from above the ridge point (compute-bound) to below it (memory-bound) when you switch to a lower precision with a higher ridge point.
  common_mistake: |
    **The Pitfall:** Believing lower precision always makes execution faster proportionally.
    **The Rationale:** Candidates assume quantization only raises the compute ceiling, forgetting that the arithmetic intensity of the workload remains fixed while the ridge point shifts right.
    **The Consequence:** Overestimating INT8 performance for memory-bound or low-intensity workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Bandwidth: 3.35 TB/s.
    - Compute peaks: FP32 (67 TFLOPS), BF16 (989 TFLOPS), FP8/INT8 (1,979 TOPS).

    **Calculations:**
    - FP32 Ridge Point: 67 TFLOPS / 3.35 TB/s = 20 Ops/Byte.
    - BF16 Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 Ops/Byte.
    - INT8 Ridge Point: 1,979 TOPS / 3.35 TB/s = 591 Ops/Byte.
    - Example: Workload with Arithmetic Intensity of 400 Ops/Byte.
    - BF16 Check: 400 > 295 (Compute-Bound).
    - INT8 Check: 400 < 591 (Memory-Bound).
    - INT8 Performance: 3.35 TB/s × 400 Ops/Byte = 1,340 TOPS (leaving ~32% idle).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound**. As precision drops, compute scales faster than bandwidth, shifting the ridge point right and converting compute-bound workloads into memory-bound ones.
