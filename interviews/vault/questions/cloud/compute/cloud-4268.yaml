title: Chiplet vs Monolithic Roofline Model
scenario: 'You are constructing a roofline model for an AMD MI300X that accounts for the NUMA bandwidth hierarchy: local XCD HBM, cross-XCD Infinity Fabric, and host DRAM.'
question: How does the NUMA bandwidth hierarchy of the MI300X affect kernel tuning versus a monolithic H100?
details:
  realistic_solution: MI300X needs a locality-aware roofline rather than one flat memory ceiling. Model the aggregate HBM roof only for well-partitioned kernels, then add lower effective roofs for remote XCD access and host access based on measured traffic. Tuning should place tensors near the XCDs that consume them, tile work so hot data stays local, and minimize cross-XCD gathers. H100 is closer to a single-GPU flat-HBM roofline, with SKU-dependent bandwidth, so placement usually matters less than on a chiplet NUMA design.
  common_mistake: |
    **The Pitfall:** Using a single roofline with 5.3 TB/s as the memory bandwidth ceiling for the entire MI300X.
    **The Rationale:** Candidates treat chiplet architectures identically to monolithic ones, assuming all compute units have equal access to peak aggregate bandwidth.
    **The Consequence:** This overstates achievable bandwidth for any single kernel, as no single XCD can access the full aggregate bandwidth without severe NUMA penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X peak FP16 compute: 1307 TFLOPS.
    - MI300X aggregate HBM bandwidth: about 5.3 TB/s for well-localized accesses.
    - Remote XCD and host accesses have lower effective bandwidth and higher latency than local HBM.

    **Calculations:**
    - Aggregate MI300X ridge point = 1307e12 FLOPs / 5.3e12 Bytes ≈ 247 FLOPs/Byte when work and data are well placed.
    - If remote accesses cut effective bandwidth for a kernel below the aggregate HBM roof, the ridge point rises in proportion: half the effective bandwidth would make the kernel need about 2 * 247 ≈ 494 FLOPs/Byte to become compute-bound.
    - Therefore locality mistakes make kernels more memory-sensitive, not more compute-bound.

    **Conclusion & Interpretation:**
    - **Result: locality determines the usable roofline.** MI300X tuning should minimize remote XCD and host traffic; a higher ridge point from reduced effective bandwidth means the kernel is harder to make compute-bound.
