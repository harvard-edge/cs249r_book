title: The Roofline Shift
scenario: We upgraded our serving fleet from A100s to H100s. The H100 has 3x more
  FP16 TFLOPS. However, our LLM decode throughput only got ~67% faster instead of
  3x.
question: How is that physically possible?
details:
  realistic_solution: The ridge point of the Roofline shifted right. Your workload
    was already memory-bandwidth bound on the A100. Because LLM decoding is bandwidth-starved,
    faster ALUs cannot do any additional work, and performance scales exactly with
    the increase in memory bandwidth.
  common_mistake: '**The Pitfall:** Assuming that a 3x increase in compute (TFLOPS)
    will yield a 3x increase in performance for all workloads.

    **The Rationale:** Engineers often ignore the Roofline model and the memory-bandwidth
    bottleneck inherent to LLM decode operations.

    **The Consequence:** Massive overspending on compute hardware that cannot be fully
    utilized due to memory constraints.

    '
  napkin_math: '**Assumptions & Constraints:**

    - LLM decode arithmetic intensity: ~1 Ops/Byte.

    - A100 specs: 312 TFLOPS, 2.0 TB/s bandwidth.

    - H100 specs: 989 TFLOPS, 3.35 TB/s bandwidth.


    **Calculations:**

    - A100 Ridge Point: 312e12 / 2e12 = 156 Ops/Byte.

    - H100 Ridge Point: 989e12 / 3.35e12 = 295 Ops/Byte.

    - Throughput scale factor: H100 bandwidth (3.35 TB/s) / A100 bandwidth (2.0 TB/s)
    = ~1.67x.


    **Conclusion & Interpretation:**

    - **Result: 67% Speedup (Memory-Bound)**. Because decode is severely bandwidth-bound,
    the 3x compute increase is wasted, and performance scales exactly with the 67%
    memory bandwidth increase.

    '
