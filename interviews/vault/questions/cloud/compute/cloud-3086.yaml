title: 'Systolic Array Evaluation: TPU v5e vs H100 for Training Transformers'
scenario: An H100 is serving a GPT-2-large model (774M params, 36 layers, hidden=1280).
question: What is the H100 FP16 ridge point, and when do decode and prefill become compute- versus memory-bound based on arithmetic intensity?
details:
  realistic_solution: |
    The H100 ridge point is 295 FLOPs/byte. Decode is deeply memory-bound because arithmetic intensity is low (approx 1 FLOPs/byte). Prefill becomes compute-bound when the product of batch and sequence length exceeds 295.
  common_mistake: |
    **The Pitfall:** Using the wrong TFLOPS numbers (e.g., FP8 sparse instead of FP16 dense) and ignoring activation memory footprint.
    **The Rationale:** Candidates often pull the highest marketing number from spec sheets without verifying the precision mode used for standard inference.
    **The Consequence:** Calculating a severely skewed arithmetic intensity ridge point, leading to completely incorrect conclusions about whether the system is compute or memory bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 specs: 989 TFLOPS FP16, 3.35 TB/s HBM3 bandwidth.
    - Decode (batch=1) accesses all weights.

    **Calculations:**
    - H100 Ridge Point: 989e12 / 3.35e12 = 295 FLOPs/byte.
    - Decode Arithmetic Intensity (AI): 2N / (2N bytes) = 1 FLOP/byte.
    - Prefill AI (batch=B, seq=S): 2 * B * S * N / (2N) = B * S. Compute bound when B * S > 295.

    **Conclusion & Interpretation:**
    - **Result: Decode AI is 1 FLOP/byte (Memory-Bound)**. Decode is deeply memory-bound, whereas prefill becomes compute-bound only when batch x sequence length exceeds the 295 ridge point.
