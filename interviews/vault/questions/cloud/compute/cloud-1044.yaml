title: Evaluating AVX-512 VNNI for Custom Kernels
scenario: You are serving a custom Transformer encoder (12 layers, hidden size 768) on AWS c7i.16xlarge instances (Intel Sapphire Rapids). To hit a strict 15ms latency budget, you quantized the weights to INT8. However, naive compilation of your custom attention kernel using standard C++ auto-vectorization yielded only a 1.2x speedup over FP32, missing the theoretical 4x peak. Evaluate the architectural trade-offs between implementing explicit AVX-512 VNNI (Vector Neural Network Instructions) intrinsics for your custom kernel versus refactoring the model to use standard standard operators backed by optimized BLAS libraries like oneDNN.
question: Should you hand-write AVX-512 VNNI intrinsics for the custom INT8 attention kernel or refactor to oneDNN-backed operators, and why?
details:
  realistic_solution: Prefer refactoring to oneDNN-backed operators when the attention workload can be expressed as supported matmul, batched matmul, reorder, and quantization primitives, because oneDNN gives tuned VNNI code paths, portability, and lower maintenance risk. Hand-write AVX-512 VNNI intrinsics only when the custom fusion or unsupported control flow materially reduces memory traffic enough to justify owning a CPU-specific kernel. VNNI instructions such as VPDPBUSD perform packed INT8/UINT8 dot products and accumulate into INT32 lanes; they improve the compute core, but they do not automatically make softmax, masking, layout conversion, or memory movement 4x faster.
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization automatically provides a 4x throughput increase on CPUs without verifying that the compiler actually emits specialized dot-product instructions (like VNNI's VPDPBUSD) rather than generic scalar or unoptimized shift-and-add sequences.
    **The Rationale:** Compiler may not emit VNNI.
    **The Consequence:** Missed throughput increase.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15ms latency budget.
    - Naive INT8 custom kernel observes only 1.2x over FP32, so the current bottleneck is not achieving theoretical INT8 peak.
    **Calculations:**
    - FP32 AVX-512 vector width covers 512 / 32 = 16 FP32 elements.
    - INT8 vectors carry 512 / 8 = 64 byte elements, and VNNI accumulates packed dot products into INT32 lanes.
    - A 4x element-density advantage is a compute ceiling, not an end-to-end latency guarantee.
    - Attention also includes softmax, masking, layout conversion, quant/dequant, cache reads, and stores; if those dominate, explicit VNNI may deliver far less than 4x.
    - The observed 1.2x speedup is evidence to profile instruction mix and memory traffic before committing to intrinsics.
    **Conclusion & Interpretation:**
    Use oneDNN when the graph maps cleanly to library primitives. Use hand-written VNNI only for a profiled custom fused path where reduced memory traffic or unsupported control flow outweighs portability and maintenance costs.
