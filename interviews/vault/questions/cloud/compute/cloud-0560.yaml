title: The New Hotness vs. The Incumbent
scenario: You are the head of ML Platforms at a large AI research lab with a massive cluster of H100 GPUs. A startup pitches you their new accelerator, the 'Prometheus-1', claiming it achieves 5x the peak FP16 TFLOPS of an H100, but with only 2x the memory bandwidth. It comes at a 3x price premium over the H100.
question: Should you invest in a new cluster of Prometheus-1 chips given their 5x peak compute, 2x memory bandwidth, and 3x price premium over H100s?
details:
  realistic_solution: 'The correct approach is to design a suite of benchmarks with varying arithmetic intensities to map out the chip''s performance curve and identify its effective ridge point. The proposal must be nuanced, recommending the chip only for workloads where its strengths can be realized.'
  common_mistake: 'The most common mistake is being seduced by the headline ''5x TFLOPS'' number. Engineers will often propose benchmarking only their main production model, failing to understand that a single workload can''t reveal the chip''s true performance profile. They may recommend a full purchase based on the peak compute number, ignoring that performance is dictated by the relationship between compute and memory bandwidth (the Roofline model).'
  napkin_math: |
    **Assumptions & Constraints:**
    - H100: 989 TFLOPS, 3.35 TB/s bandwidth (Ridge point = 295 FLOPs/byte).
    - Prometheus-1: 4,945 TFLOPS, 6.7 TB/s bandwidth (Ridge point = 738 FLOPs/byte).
    - Price premium: 3x.

    **Calculations:**
    - LLM decode (AI ≈ 1): Both memory-bound. Speedup = 6.7 / 3.35 = 2x. Value: 2x speed / 3x cost = Net loss.
    - LLM training (AI ≈ 500): Prometheus-1 is memory-bound (6.7 * 500 = 3,350 TFLOPS). Speedup = 3,350 / 989 = 3.38x. Value: 3.38x / 3x = 1.12x better.
    - Dense matmuls (AI > 738): Both compute-bound. Speedup = 5x. Value: 5x / 3x = 1.67x better.

    **Conclusion & Interpretation:**
    - **Result: 1.12x to 1.67x cost-efficiency gain on specific workloads (Memory-Bandwidth-Bound)**. The chip is only worth the 3x premium for workloads with extremely high arithmetic intensity.
