title: H100 Roofline Diagnosis for Recommendation Inference
scenario: You've deployed a custom recommendation model. The profiling dashboard shows you are achieving 120 TFLOPS out of a possible 989 TFLOPS on an H100 GPU, while the HBM bandwidth counter is already near the 3.35 TB/s hardware limit. Your tech lead suggests buying a faster GPU to fix the latency.
question: Why is your tech lead wrong to suggest buying a faster GPU when achieving 120 TFLOPS out of 989 peak?
details:
  realistic_solution: The tech lead is wrong because the profile says the workload is already saturating HBM bandwidth, not ALUs. The H100 ridge point is 989 TFLOPS / 3.35 TB/s ≈ 295 FLOP/byte. Over a one-second profiling window, the workload performs about 120e12 FLOPs while moving about 3.35e12 bytes from HBM, so its measured operational intensity is about 36 FLOP/byte. That is far below the ridge point, so the roofline cap is memory bandwidth. A faster GPU with more peak TFLOPS but the same memory bandwidth would not materially improve latency. Better fixes are reducing bytes moved per request, increasing batching/reuse, quantizing, or using hardware with more HBM bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the GPU isn't fully utilized because it's starved for compute.
    **The Rationale:** Candidates see low TFLOPS utilization and blindly assume throwing more ALUs at the problem will help.
    **The Consequence:** Purchasing incredibly expensive compute upgrades that yield exactly zero latency improvements because the workload is memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 peak compute: 989 TFLOPS.
       - H100 memory bandwidth: 3.35 TB/s.
       - In a 1-second profiling window, observed work is about 120e12 FLOPs.
       - In the same window, observed HBM traffic is about 3.35e12 bytes, near the hardware limit.
    2. **Calculations:**
       - Ridge Point = 989e12 FLOP/s / 3.35e12 Byte/s = 295 FLOP/Byte.
       - Workload Operational Intensity = work / bytes moved = 120e12 FLOPs / 3.35e12 bytes = 36 FLOP/Byte.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound**. The measured 36 FLOP/Byte is far below the 295 FLOP/Byte ridge point, so adding compute without adding memory bandwidth is unlikely to improve latency.
