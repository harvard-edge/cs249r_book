title: The Batch Size 1 Bottleneck
scenario: 'An engineer is profiling a ResNet-50 vision model for a real-time inference application on a GPU. The profiler shows that for a single image (batch size 1), the forward pass requires approximately 8 GFLOPs of computation and involves moving 32 MB of data (weights and activations) from memory to the compute cores.'
question: Is this ResNet-50 batch-size-1 forward pass compute-bound or memory-bound, and how do you determine that?
details:
  realistic_solution: |
    The workload is memory-bound. The arithmetic intensity (AI) is the ratio of compute to memory operations. Since the model's AI is lower than the hardware's ridge point, it means the GPU's memory system cannot supply data fast enough to keep the powerful compute cores fully saturated.
  common_mistake: |
    **The Pitfall:** Misinterpreting arithmetic intensity as an absolute measure.
    **The Rationale:** Candidates see a value like 250 Ops/Byte and assume it's high enough to be compute-bound.
    **The Consequence:** Attempting to optimize math instructions when the kernel is entirely starved for memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Forward Pass Compute: 8 GFLOPs.
    - Data Movement: 32 MB.
    - H100 ridge point is ~295 FLOPs/Byte.

    **Calculations:**
    - Arithmetic Intensity (AI) = 8 GFLOPs / 32 MB = 250 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 250 FLOPs/Byte (Memory-Bound)**. Because an AI of 250 FLOPs/Byte is less than typical hardware ridge points, the workload is memory-bound.
  options:
  - 'Compute-bound, because 250 Ops/Byte is a high arithmetic intensity.'
  - 'Memory-bound, because the AI is ~0.004 Bytes/Op, which is far below the ridge point.'
  - 'Memory-bound, because the AI of 250 Ops/Byte is less than the H100''s ridge point of ~295 Ops/Byte.'
  - 'Compute-bound, because with 8 GFLOPs of work, the compute units will be the bottleneck.'
