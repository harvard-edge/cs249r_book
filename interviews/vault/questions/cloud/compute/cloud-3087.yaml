title: 'Systolic Array Evaluation: Batched vs Streaming Inference on TPU'
scenario: A system uses a TPU v5e (16GB HBM, 197 TFLOPS BF16, 819 GB/s bandwidth) for ResNet-50 (4.1 GOPS, 25M params BF16).
question: For ResNet-50 on TPU v5e, what are throughput and latency for batch=128 versus batch=1, and which mode fits interactive vs batch serving?
details:
  realistic_solution: 'Batch=128: FLOPs = 4.1G * 128 = 525G. Weight bytes = 25M * 2 = 50MB. AI = 525G / 50M = 10,500 FLOPs/byte, so the batch is compute-bound. Compute time is 525G / 197T = 2.66ms per batch, or about 48,120 img/s at steady state. Batch=1: FLOPs = 4.1G, AI = 82 FLOPs/byte, below the approximate ridge point, so a weight-read lower bound is 50MB / 819GB/s = 0.061ms per request plus activation and runtime overheads. That 61 microseconds is a lower bound on latency, not an achieved serving throughput. Batch=128 maximizes steady-state throughput but adds batching and queueing latency; batch=1 is the right mode for interactive requests because the request does not wait for a full batch.'
  common_mistake: |
    **The Pitfall:** Not recognizing that TPU systolic arrays require XLA compilation to fixed shapes.
    **The Rationale:** Dynamic batch sizes require recompilation or padding, wasting compute.
    **The Consequence:** Reduced throughput and increased latency compared to optimized fixed batches.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch=128: FLOPs = 4.1G * 128 = 525G. Weight bytes = 50MB. AI = 10,500 FLOPs/byte (Compute bound).
    - Batch=1: FLOPs = 4.1G. AI = 82 FLOPs/byte (Memory bound).

    **Calculations:**
    - Compute time (Batch=128): 525G / 197T = 2.66ms per batch. Steady-state throughput: 128 / 0.00266s = 48,120 img/s.
    - Per-image service time inside a full batch is 20.8 microseconds, but the request latency is the full batch time plus queueing.
    - Memory lower bound (Batch=1): 50MB / 819GB/s = 61 microseconds per request, before activation and runtime overheads.
    - Do not convert the 61 microsecond weight-read lower bound into achieved serving throughput; real batch=1 throughput also depends on compute, activations, launch/runtime overhead, and queueing.

    **Conclusion & Interpretation:**
    - **Result: Throughput-Latency Tradeoff.** Batch=128 gives about 48k img/s steady-state throughput, while batch=1 minimizes interactive request latency by avoiding batch formation delay; its 61 microsecond figure is only a lower bound.
