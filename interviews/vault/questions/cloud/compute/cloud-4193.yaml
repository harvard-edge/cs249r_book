title: Kernel Fusion Strategy for Transformer Blocks
scenario: A single transformer block in a 70B model executes 12 separate CUDA kernels. QKV projection, Q/K/V split, attention score, softmax, attention output, output projection, residual add, LayerNorm, FFN up-projection, GELU, FFN down-projection, residual add.
question: How would you fuse the 12 transformer-block kernels to minimize HBM round-trips without breaking Tensor Core tile efficiency?
details:
  realistic_solution: 'Three fusion groups based on compute type: Group 1 (Attention fused): QKV projection (Tensor Core matmul) -> fuse Q/K/V split as a register/view operation -> FlashAttention kernel (fused attention score + softmax + attention output in SRAM). 5 kernels -> 2 launches (QKV matmul + FlashAttention). Group 2 (Projection + residual/norm): output projection remains a Tensor Core matmul, then residual add + LayerNorm are fused into one memory-efficient element-wise/reduction kernel. 3 kernels -> 2 launches. Group 3 (FFN fused): FFN up-projection uses a Tensor Core matmul with GELU in the epilogue, followed by FFN down-projection with residual add in the epilogue when layout and numerics allow. 4 kernels -> 2 launches. Total: 12 kernels -> 6 launches. The goal is to remove intermediate HBM materialization at fusion boundaries while keeping Tensor Core matmuls in tile-efficient kernels.'
  common_mistake: |
    **The Pitfall:** Fusing everything into one mega-kernel.
    **The Rationale:** Matmul kernels (QKV, FFN) need Tensor Cores and specific memory layouts, while element-wise ops (GELU, residual) use CUDA cores.
    **The Consequence:** Mixing them breaks Tensor Core scheduling and register allocation, degrading performance instead of improving it.
  napkin_math: |
    **Assumptions & Constraints:**
    - 12 original launches become 6 launches after fusion.
    - Each materialized activation-sized intermediate is 32 MB.
    - A producer-consumer boundary costs one write plus one later read: 64 MB.
    - HBM bandwidth estimate: 3.35 TB/s.

    **Calculations:**
    - Unfused boundaries: 12 launches create about 11 intermediate boundaries.
    - Unfused boundary traffic: 11 * 64 MB = 704 MB.
    - Fused boundaries: 6 launches create about 5 intermediate boundaries.
    - Fused boundary traffic: 5 * 64 MB = 320 MB.
    - Avoided HBM traffic: 704 MB - 320 MB = 384 MB.
    - Bandwidth time saved: 384 MB / 3.35 TB/s = ~0.115 ms per block invocation.
    - Launch overhead saved: 6 fewer launches * ~5 us = ~0.030 ms.

    **Conclusion & Interpretation:**
    - **Result: ~384 MB less HBM traffic plus fewer launches (Memory-Bandwidth-Bound).** The benefit is bounded by the number of intermediate tensors that no longer round-trip through HBM, not by a vague GB/s savings claim.
