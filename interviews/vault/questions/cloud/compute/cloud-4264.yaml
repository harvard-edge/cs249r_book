title: NUMA Effects in MI300X Multi-XCD Workloads
scenario: A distributed training run on MI300X shows 15% lower MFU than expected on H100 despite MI300X having higher raw bandwidth.
question: How would you diagnose and fix NUMA-related MFU loss on MI300X versus H100?
details:
  realistic_solution: Profile cross-XCD fabric traffic via `nsys profiling`. Ensure weight matrices are allocated NUMA-locally per XCD. Use HIP memory advice to pin tensors, and partition layers so each XCD owns complete shards, minimizing Infinity Fabric hops.
  common_mistake: |
    **The Pitfall:** Comparing aggregate bandwidth numbers directly between architectures.
    **The Rationale:** Candidates forget that MI300X's 5.3 TB/s is partitioned across 8 XCDs, unlike H100's monolithic memory.
    **The Consequence:** Failing to apply necessary NUMA-aware tensor pinning and memory placement, resulting in severe cross-fabric performance penalties.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X local BW: 5.3 TB/s across 8 XCDs.
       - H100 monolithic BW: 3.35 TB/s available to all SMs.
    2. **Calculations:**
       - MI300X local BW per XCD: 5.3 TB/s / 8 = 662 GB/s.
       - NUMA Penalty: If 30% of accesses are cross-XCD (2x latency penalty), effective BW per XCD ≈ (662 * 0.7) + (331 * 0.3) = 562 GB/s.
    3. **Conclusion & Interpretation:**
       - **The NUMA penalty drops effective bandwidth drastically below the H100's flat 3.35 TB/s, explaining the 15% MFU loss.**
       - **Result: Memory-Bandwidth-Bound**
