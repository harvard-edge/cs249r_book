title: Chiplet Architecture and Multi-Tenant Isolation
scenario: A cloud provider wants to offer 1/8 MI300X slices (one XCD per tenant) for smaller inference workloads.
question: What architectural challenges arise from XCD-level multi-tenancy?
details:
  realistic_solution: XCD-level multi-tenancy is challenging because the XCDs are chiplets inside one accelerator package, not eight independent GPUs. Tenants can contend for shared HBM bandwidth, package fabric bandwidth, cache/coherency resources, power, and thermal headroom. Memory protection still has to be enforced by the runtime, driver, IOMMU, and scheduler, while performance isolation needs software-mediated placement, admission control, and QoS policy. A provider should describe this as partial partitioning with shared-resource interference, not as a guaranteed hardware slice with fully independent memory and fabric.
  common_mistake: |
    **The Pitfall:** Assuming XCDs are fully independent and isolated like separate GPUs.
    **The Rationale:** Engineers mistakenly equate AMD's modular chiplets (XCDs) with distinct physical PCIe devices.
    **The Consequence:** Deployments suffer from severe side-channel vulnerabilities and performance interference because coherency fabrics and L3 caches are shared.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory: 192 GB total.
    - Fabric bandwidth and HBM bandwidth are shared package resources.

    **Calculations:**
    - Nominal capacity share: 192 GB / 8 tenants = 24 GB per tenant if the software stack partitions memory evenly.
    - This is a capacity budget, not proof of hard bandwidth or cache isolation.
    - Fabric, HBM bandwidth, caches, power, and thermal limits can still couple tenant performance.

    **Conclusion & Interpretation:**
    - **Result: Isolation-Bound**. XCD slicing needs software and platform enforcement for memory safety plus scheduling/QoS controls for noisy-neighbor effects; the prompt does not justify a guaranteed per-tenant bandwidth number.
