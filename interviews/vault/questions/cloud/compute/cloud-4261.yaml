title: MI300X XCD Count and Die Topology
scenario: A colleague claims the MI300X is a monolithic die with a large HBM pool.
question: What is the actual MI300X chiplet topology, and why is the 192 GB HBM pool not a monolithic die?
details:
  realistic_solution: The MI300X is a chiplet-based accelerator package, not one monolithic GPU die. It uses 8 Accelerator Complex Dies (XCDs), 4 I/O dies (IODs) for system infrastructure and memory controllers, and 8 HBM3 stacks connected through the on-package Infinity Fabric. The 192 GB HBM pool is exposed as a unified accelerator memory space, but physically the HBM stacks attach through the IOD/fabric structure, so accesses can involve different fabric paths rather than one uniform monolithic memory die.
  common_mistake: |
    **The Pitfall:** Treating chiplet architectures as a single homogeneous compute die.
    **The Rationale:** Because the OS and runtime present the 192 GB HBM pool as a flat, unified address space, engineers assume uniform memory latency and bandwidth.
    **The Consequence:** They fail to optimize NUMA node affinity, leading to sub-optimal data placement and unnecessary die-to-die fabric traversal overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 XCDs (Compute Dies) attached to 192 GB total HBM3.
    - Total HBM bandwidth: ~5.3 TB/s peak.
    - The package exposes a unified HBM address space, but the HBM is reached through memory/cache dies and fabric paths rather than a single monolithic die.

    **Calculations:**
    - Topology check: 8 compute dies share access to 192 GB total HBM through the package fabric.
    - Valid quantitative statement: the accelerator-level HBM pool is 192 GB with about 5.3 TB/s peak aggregate bandwidth.
    - Invalid shortcut to avoid: dividing 192 GB or 5.3 TB/s by 8 does not prove an exposed 24 GB or 660 GB/s per-XCD partition.

    **Conclusion & Interpretation:**
    - **Result: chiplet topology, not monolithic HBM.** The correct argument is structural: XCDs communicate with HBM through package-level fabric and memory/cache dies, so locality and fabric hops matter even though software sees one large HBM pool.
