title: MI300X Unified Memory Versus Explicit Copies
scenario: An inference pipeline uses CPU preprocessing feeding into MI300X GPU compute. A teammate proposes using unified memory to eliminate explicit CPU-GPU copy calls.
question: What are the performance implications of unified memory on MI300X compared with explicit copies?
details:
  realistic_solution: Unified memory can reduce programmer burden, but it does not make CPU preprocessing data free for MI300X GPU kernels to access. Pages still need placement, migration, or prefetching across the host-GPU path, and demand faults can serialize kernel progress. For predictable inference latency, keep CPU preprocessing buffers in host memory, stage batch tensors explicitly or prefetch them to GPU memory before launch, and use pinned memory when transfers overlap with compute.
  common_mistake: |
    **The Pitfall:** Believing unified memory eliminates all data movement physical costs.
    **The Rationale:** Candidates assume one address space means zero-latency access, ignoring that data placement, migration, and page faults still have physical costs.
    **The Consequence:** Experiencing severe performance degradation due to page-fault-driven migration stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size: 1 GB.
    - Example explicit host-to-GPU copy bandwidth: 128 GB/s.
    - Demand-paged unified memory can fault at page granularity if data is not prefetched or already resident.

    **Calculations:**
    - Explicit staged copy time = 1 GB / 128 GB/s = ~7.8 ms, before overlap.
    - If the same 1 GB is demand-paged in 4 KB pages, page count ≈ 1 GB / 4 KB ≈ 250,000 pages.
    - Even a few microseconds of service time per fault can dominate the staged-copy time if faults occur on the critical path.
    - With prefetching or explicit copies, the transfer is bulk and schedulable; with demand faults, latency is fragmented and harder to overlap.

    **Conclusion & Interpretation:**
    - **Result: unified memory simplifies code, not data movement.** For latency-sensitive inference, explicit staging or prefetching is usually more predictable than fault-driven migration.
