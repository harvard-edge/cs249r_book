title: 'The Blackwell Bet: Justifying a Datacenter Upgrade'
scenario: You are the lead ML Systems Engineer at a major AI lab, responsible for
  a 1,000-GPU H100 training cluster. The CFO has just read the announcement for the
  new B200 GPU, which promises more than double the performance. Your VP of Engineering
  wants to immediately place a multi-million dollar order to upgrade the entire fleet.
  The CFO is highly skeptical of the marketing claims and has blocked the purchase,
  demanding a data-driven proposal from you.
question: What data-driven framework would you use to decide whether to replace the
  1,000 H100s with B200s?
details:
  realistic_solution: "1. **Calculate the Ridge Points:** Where performance becomes compute-bound.\n\
    \   - **H100:** Peak FP16 = 989 TFLOPS, BW = 3.35 TB/s. Ridge Point = 989,000 / 3,350 = **295 FLOP/Byte**.\n\
    \   - **B200:** Peak FP16 = 2,250 TFLOPS, BW = 8.0 TB/s. Ridge Point = 2,250,000 / 8,000 = **281 FLOP/Byte**.\n\
    2. **Classify Real Workloads:**\n\
    \   - **Large GEMM (training, batch=256):** AI ≈ 200-500 FLOP/Byte → **compute-bound** on both. Speedup = 2,250 / 989 = **2.27x**.\n\
    \   - **LLM inference decode (batch=1):** AI ≈ 1 FLOP/Byte → **memory-bound** on both. Speedup = 8.0 / 3.35 = **2.39x**.\n\
    \   - **Attention scores (long context):** AI ≈ 10-50 FLOP/Byte → **memory-bound** on both. Speedup = **2.39x**.\n\
    3. **Power Efficiency (TOPS/W):**\n\
    \   - **H100:** 989 TFLOPS / 700W = **1.41 TFLOPS/W**.\n\
    \   - **B200:** 2,250 TFLOPS / 1,000W = **2.25 TFLOPS/W** (1.59x improvement).\n\
    \   For memory-bound workloads: H100 = 3.35 TB/s / 700W = 4.79 GB/s/W; B200 = 8.0 TB/s / 1,000W = 8.0 GB/s/W (**1.67x** improvement).\n\
    4. **TCO Projection for the 1,000-GPU Fleet:**\n\
    \   - Current H100 fleet: 1,000 GPUs, 700 kW total power.\n\
    \   - For compute-bound training: need 1,000 / 2.27 = **441 B200s** → 441 kW (37% power savings).\n\
    \   - For memory-bound inference: need 1,000 / 2.39 = **419 B200s** → 419 kW (40% power savings).\n\
    \   - At $30K/GPU for B200 vs amortized $15K remaining on H100: capital outlay = 441 × $30K = **$13.2M**.\n\
    \   - Power savings = 259 kW × $0.10/kWh × 8,760 hrs = **$227K/year**.\n\
    \   - Payback is driven by training velocity, not power savings alone.\n\
    5. **CFO Proposal:** The B200 delivers a genuine 2.27x speedup for our compute-bound training workload. We can meet our 2x target with ~440 GPUs, reducing both GPU count and power draw. The risk is that some workloads are memory-bound, where the speedup is similar (2.39x) but driven by bandwidth, not FLOPS. Recommend a phased upgrade: 256 B200s first, benchmark, then scale."
  common_mistake: 'The most common mistake is to take the headline performance numbers
    at face value: ''The B200 has 2.27x more TFLOPS than the H100, so all our workloads
    will be 2.27x faster.'' This reasoning completely ignores memory bandwidth, arithmetic
    intensity, and power constraints. It assumes all workloads are purely compute-bound,
    which is rarely true.'
  napkin_math: 'H100 Ridge: 989T/3.35TB = 295 FLOP/B. B200 Ridge: 2250T/8.0TB = 281 FLOP/B. Compute-bound speedup = 2.27x. Memory-bound speedup = 2.39x. Power efficiency: H100 = 1.41 TFLOPS/W, B200 = 2.25 TFLOPS/W.'
