title: 'The Blackwell Bet: Justifying a Datacenter Upgrade'
scenario: You are the lead ML Systems Engineer at a major AI lab, responsible for a 1,000-GPU H100 training cluster. The CFO has just read the announcement for the new B200 GPU, which promises more than double the performance. Your VP of Engineering wants to immediately place a multi-million dollar order to upgrade the entire fleet. The CFO is highly skeptical of the marketing claims and has blocked the purchase, demanding a data-driven proposal from you.
question: What data-driven framework would you use to decide whether to replace the 1,000 H100s with B200s?
details:
  realistic_solution: |
    1. **Calculate the Ridge Points:** Where performance becomes compute-bound.
       - **H100:** Peak FP16 = 989 TFLOPS, BW = 3.35 TB/s. Ridge Point = 989,000 / 3,350 = **295 FLOP/Byte**.
       - **B200:** Peak FP16 = 2,250 TFLOPS, BW = 8.0 TB/s. Ridge Point = 2,250,000 / 8,000 = **281 FLOP/Byte**.
    2. **Classify Real Workloads:**
       - **Large GEMM (training, batch=256):** AI ≈ 200-500 FLOP/Byte → **compute-bound** on both. Speedup = 2,250 / 989 = **2.27x**.
       - **LLM inference decode (batch=1):** AI ≈ 1 FLOP/Byte → **memory-bound** on both. Speedup = 8.0 / 3.35 = **2.39x**.
       - **Attention scores (long context):** AI ≈ 10-50 FLOP/Byte → **memory-bound** on both. Speedup = **2.39x**.
    3. **Power Efficiency (TFLOPS/W):**
       - **H100:** 989 TFLOPS / 700W = **1.41 TFLOPS/W**.
       - **B200:** 2,250 TFLOPS / 1,000W = **2.25 TFLOPS/W** (1.59x improvement).
       For memory-bound workloads: H100 = 3.35 TB/s / 700W = 4.79 GB/s/W; B200 = 8.0 TB/s / 1,000W = 8.0 GB/s/W (**1.67x** improvement).
    4. **TCO Projection for the 1,000-GPU Fleet:**
       - Current H100 fleet: 1,000 GPUs, 700 kW total power.
       - Dividing 1,000 by a peak speedup gives only a first-pass equivalent-throughput estimate: 1,000 / 2.27 ≈ **441 B200s** for a purely compute-bound workload, or 1,000 / 2.39 ≈ **419 B200s** for a purely bandwidth-bound workload.
       - Actual fleet size must also satisfy memory capacity, networking, reliability, queueing, model parallelism, and workload-mix constraints.
       - If a profiled compute-bound slice could be served by 441 B200s, power would fall from 700 kW to 441 kW. Savings = 259 kW × 8,760 h × $0.10/kWh = **~$227K/year**, before cooling and datacenter PUE.
       - That power saving does not by itself justify ROI; the proposal must include B200 capex, remaining H100 amortization, utilization, and revenue or research value from faster training.
    5. **CFO Proposal:** Profile the actual fleet, classify each workload with roofline analysis, then compare effective throughput per dollar and per watt under capacity constraints. Recommend a phased upgrade: buy a 256-GPU B200 tranche, benchmark representative training and inference jobs, and scale only the workloads whose measured TCO improves.
  common_mistake: |
    **The Pitfall:** Taking the headline performance numbers at face value: 'The B200 has 2.27x more TFLOPS than the H100, so all our workloads will be 2.27x faster.'
    **The Rationale:** This reasoning completely ignores memory bandwidth, arithmetic intensity, and power constraints. It assumes all workloads are purely compute-bound, which is rarely true.
    **The Consequence:** Making multi-million dollar purchasing decisions based on flawed, purely compute-bound assumptions.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 and B200 specs are peak FP16 throughput, memory bandwidth, and GPU power.
    - Fleet replacement requires the same delivered workload throughput and must still satisfy memory, interconnect, reliability, and utilization constraints.
    **Calculations:**
    - H100 Ridge: 989T/3.35TB = 295 FLOP/B.
    - B200 Ridge: 2250T/8.0TB = 281 FLOP/B.
    - Peak compute-bound speedup = 2250/989 = 2.27x.
    - Peak memory-bound speedup = 8.0/3.35 = 2.39x.
    - Power efficiency: H100 = 1.41 TFLOPS/W, B200 = 2.25 TFLOPS/W.
    - For a purely compute-bound slice, 1,000 equivalent H100s / 2.27 ≈ 441 B200s is a throughput estimate, not an automatic fleet-sizing rule.
    - If that slice really needs only 441 B200s, power savings = (700 kW - 441 kW) × 8,760 h × $0.10/kWh ≈ $227K/year.
    **Conclusion & Interpretation:**
    - Roofline math bounds the likely speedups, but the purchase decision should be based on measured workload mix and full TCO: effective throughput per dollar, effective throughput per watt, memory capacity, networking, and amortized capex.
