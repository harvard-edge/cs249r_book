title: The Beam Search Memory Explosion
scenario: You switch your generation algorithm from Greedy Search to Beam Search with a beam width of 4 to get better translation quality. Suddenly, your inference server can only handle 1/4th the number of concurrent users before OOMing.
question: Why does Beam Search destroy your concurrency scaling?
details:
  realistic_solution: 'You caused a **KV-Cache Explosion**. Server has 40 GB free VRAM. | Greedy User = 1 GB cache. Max concurrent = 40 users. | Beam(4) User = 4 GB cache. Max concurrent = 10 users. | You just quadrupled your hardware hosting costs for a slight bump in BLEU score.'
  common_mistake: |
    **The Pitfall:** Assuming the failure is caused by computing 4 times the math.
    **The Rationale:** Engineers know Beam Search does more compute, so they assume it requires 4 times the CPU/GPU processing power, leading to a bottleneck.
    **The Consequence:** Trying to optimize compute kernels when the actual issue is memory capacity (OOM errors) driven by KV-cache explosion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Server has 40 GB free VRAM for KV-cache.
       - Greedy User = 1 GB cache. Beam(4) User = 4 GB cache.
    2. **Calculations:**
       - Greedy max concurrent = 40 GB / 1 GB = 40 users.
       - Beam max concurrent = 40 GB / 4 GB = 10 users.
    3. **Conclusion & Interpretation:**
       - **Result: 4x Capacity Reduction. Quadrupling the KV-cache footprint drastically reduces concurrent capacity and increases costs.**
