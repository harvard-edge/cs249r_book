title: The Thread Block Scheduling Cliff
scenario: You launch a CUDA kernel with a grid of 264 thread blocks on an H100 with 132 SMs. Each SM can host exactly 2 blocks given the kernel's resource usage. The kernel takes 1.0ms. You then change the grid to 265 thread blocks (one extra block). The kernel time jumps to 1.5ms — a 50% regression from adding a single thread block. This is not a measurement artifact. You must design an explanation for this non-linear performance cliff, and propose a general strategy for choosing grid dimensions that avoids it.
question: Why does increasing the H100 grid from 264 to 265 blocks raise kernel time from 1.0 ms to 1.5 ms, and how should grids be sized?
details:
  realistic_solution: 'GPU thread block scheduling works in waves. With 132 SMs and 2 blocks per SM, each wave processes 264 blocks. At 264 total blocks, the kernel completes in exactly 1 wave — all SMs finish simultaneously. At 265 blocks, the first wave of 264 blocks completes in 1.0ms. Then a second wave launches for the 1 remaining block. This single block runs on 1 SM while the other 131 SMs sit completely idle. The second wave takes approximately 0.5ms (one block''s compute time, which is 1.0ms / 2 blocks per wave for a fully occupied SM = 0.5ms per block). Total: 1.0 + 0.5 = 1.5ms. Only 1/132 of the GPU''s compute is utilized during the tail wave. The general strategy: ensure the total number of thread blocks is a multiple of (SMs x blocks_per_SM) — the ''wave size.'' For the H100 with 2 blocks per SM: grid sizes should be multiples of 264. When the work decomposition doesn''t naturally align, use persistent thread blocks or dynamic work distribution (each block loops to process multiple tiles) to eliminate tail effects. This is called ''wave quantization'' and is a primary concern in production GPU kernel tuning.'
  common_mistake: |
    **The Pitfall:** Assuming kernel execution time scales linearly with work.
    **The Rationale:** Not realizing that the GPU processes thread blocks in discrete, synchronized waves (quantization).
    **The Consequence:** Causing massive load imbalance where SMs sit idle waiting for stragglers, severely reducing overall utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100: 132 SMs, 2 blocks/SM capacity.
    - Wave size: 132 × 2 = 264 blocks.
    - Wave 1 execution time: 1.0 ms.

    **Calculations:**
    - At 264 blocks: 1 wave takes 1.0 ms.
    - At 265 blocks: 2 waves. Wave 1 takes 1.0 ms. Wave 2 (1 block on 1 SM) takes 0.5 ms.
    - Total time for 265 blocks: 1.0 ms + 0.5 ms = 1.5 ms.
    - Wave 2 SM utilization: 1 / 132 = 0.76%.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Utilization)**. The final partial wave strands 131 SMs idle, causing a 50% latency regression from adding a single thread block.
