title: MI300X Wave64 vs H100 Warp32 Architecture
scenario: You are comparing MI300X's CDNA3 with H100's Hopper SM for training a 70B model. MI300X has 304 CUs with 64-wide SIMD; H100 has 132 SMs with 32-wide warps. Both claim ~1000+ TFLOPS FP16.
question: What architectural differences explain why MI300X's 304 CUs excel at large batch training while H100's 132 SMs excel at low-latency inference?
details:
  realistic_solution: MI300X uses a wider 64-wide SIMD instruction (wave64) across 304 CUs, optimizing for massive data parallelism and raw throughput. This makes it highly efficient for large batch matrix multiplications in training. H100 uses a narrower 32-wide warp across 132 SMs but pairs it with Hopper's advanced Thread Block Clusters and asynchronous execution (TMA). The narrower warp and independent thread scheduling make H100 much more agile for irregular, latency-sensitive workloads like variable-length continuous batching in inference.
  common_mistake: |
    **The Pitfall:** Comparing only headline TFLOPS numbers without understanding microarchitectural tradeoffs.
    **The Rationale:** TFLOPS is the universally marketed metric for AI accelerators.
    **The Consequence:** Misallocating workloads: using wide-SIMD architectures for branch-heavy, variable-length inference, or agile architectures for pure data-parallel training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X: 304 CUs, 64-wide SIMD (wave64).
       - H100: 132 SMs, 32-wide SIMD (warps).
       - Headline FP16 throughput depends on matrix engines, issue resources, clocks, memory hierarchy, and software scheduling, not just lane count.
    2. **Calculations:**
       - MI300X exposes many wave64 execution contexts, which favors large, uniform batches with enough parallel work to fill wide SIMD lanes.
       - H100 exposes warp32 scheduling with Hopper features such as Tensor Memory Accelerator, thread-block clusters, and strong kernel-level scheduling support.
       - Multiplying CU/SM count by wave/warp width gives a concurrency shape, not operations per cycle or a valid throughput ratio.
    3. **Conclusion & Interpretation:** **Result: Workload-Shape Tradeoff.** MI300X is attractive for large uniform training batches, while H100 is often stronger for latency-sensitive and irregular inference; the distinction should not be reduced to a fake 4.6x per-cycle throughput metric.
