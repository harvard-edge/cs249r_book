title: Vanishing Gradients and Depth Limits
scenario: You are training a 50-layer MLP with sigmoid activations (no skip connections). The gradient at layer 1 is 1e-15 while the gradient at layer 50 is 0.1.
question: What causes the layer-1 gradient to be 1e-15 versus 0.1 at layer 50, and what systems consequence does it have?
details:
  realistic_solution: |
    The layer-1 gradient is small because backpropagation multiplies many local Jacobian factors. The observed decay from 0.1 at layer 50 to 1e-15 at layer 1 implies an average per-layer factor of about (1e-15 / 0.1)^(1/49) ≈ 0.52. That is consistent with repeated contraction through the network; it should not be mixed with the sigmoid derivative upper bound of 0.25 as if every layer had exactly that factor. Systems consequence: FP16 has a minimum subnormal of about 5.96e-8, so gradients like 1e-15 underflow to zero if stored directly in FP16. Mixed-precision training therefore needs loss scaling, FP32 master gradients, and architectures such as residual connections to keep gradients in a representable range.
  common_mistake: |
    **The Pitfall:** Saying 'gradients vanish' without quantifying the exponential decay rate per layer.
    **The Rationale:** Missing the systems consequence that underflowed gradients round to zero in FP16.
    **The Consequence:** Making the problem qualitatively worse on modern accelerators that use mixed precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer-50 gradient magnitude: 0.1.
    - Layer-1 gradient magnitude: 1e-15.
    - FP16 min subnormal: 5.96e-8.

    **Calculations:**
    - Observed decay ratio: 1e-15 / 0.1 = 1e-14.
    - Across 49 layer-to-layer steps, average factor = (1e-14)^(1/49) ≈ 0.52.
    - 1e-15 is far below 5.96e-8, so direct FP16 storage underflows.

    **Conclusion & Interpretation:**
    - **Result: Vanishing Gradients with FP16 Underflow Risk**. Repeated Jacobian contraction explains the small gradient, and reduced precision can turn tiny gradients into zeros unless the training system preserves them with scaling or higher-precision accumulation.
