title: Cross-Die Prefetching for LLM Decode
scenario: LLM decode on MI300X is memory-bandwidth-limited. You want to hide Infinity Fabric latency for KV-cache access during autoregressive generation.
question: How would you prefetch remote-XCD KV-cache blocks to hide Infinity Fabric latency during MI300X autoregressive decode?
details:
  realistic_solution: |
    Track KV-cache ownership at block granularity: sequence id, layer range, token page, and owning XCD. During the current decode step, use the scheduler's next-step candidate set and page table to predict which remote KV blocks the next token will need, then issue asynchronous prefetches for the most likely remote pages into a local staging cache before the next attention kernel reaches them. Overlap those fabric reads with logit sampling, CPU/GPU scheduling, and local attention work. If the prediction is right, the remote block is already local; if it is wrong, evict the unused staged block and fall back to the normal remote fetch path. Bound top-K and cache space by measured hit rate so speculative bandwidth does not crowd out real KV traffic.
  common_mistake: |
    **The Pitfall:** Using simple sequential prefetch.
    **The Rationale:** Assuming contiguous memory access patterns apply to top-p autoregressive sampling.
    **The Consequence:** High prefetch miss rates leaving the Infinity Fabric latency completely unhidden.
  napkin_math: |
    **Assumptions & Constraints:**
    - Remote KV block fetch latency across XCDs: about 300ns after the address is known.
    - Current-token compute and scheduling window before the next remote block is consumed: about 500us.
    - Prefetch up to top-4 candidate remote KV blocks when the page table says they are not local.

    **Calculations:**
    - Lead window = 500us, which is much larger than a 300ns remote fetch latency.
    - Even if four candidate block fetches are serialized, latency budget is 4 * 300ns = 1.2us.
    - 1.2us / 500us = 0.24%, so the latency can be hidden if prefetch is issued at the previous-step scheduling boundary.
    - Correct prediction: next-step attention reads from local staging cache and avoids the 300ns stall.
    - Incorrect prediction: wasted speculative bandwidth and cache space, then normal remote fetch on demand.

    **Conclusion & Interpretation:**
    - **Result: latency-hiding.** The design works only when block IDs are predicted early, async prefetch overlaps with current-step work, and miss handling falls back cleanly without unbounded speculative bandwidth.
