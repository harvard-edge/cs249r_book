title: H100 Training Cost for Large Language Model
scenario: You are tasked with estimating a simplified training compute budget for a 100B parameter LLM. Assume the training run requires 300 FLOPs per parameter.
question: What GPU-hours, instance cost, electricity cost, and total cost do you estimate for the 100B-parameter training run?
details:
  realistic_solution: Calculate the total FLOPs as parameters times FLOPs per parameter, then divide by the effective FLOPs/sec of a single GPU (peak TFLOPS times utilization). This yields GPU-seconds, which can be converted to GPU-hours. Multiply GPU-hours by the instance cost for compute cost, and calculate power consumption (kW times hours times cost/kWh) for electricity cost. Summing these gives the total estimated cost. With the stated simplified 300 FLOPs/parameter assumption, the single-GPU equivalent estimate is only about 0.000014 GPU-hours and a negligible direct cost, which indicates the assumption is a toy sizing input rather than a realistic full pretraining budget.
  common_mistake: |
    **The Pitfall:** Calculating compute time against peak theoretical TFLOPS rather than effective TFLOPS.
    **The Rationale:** Simply pulling the headline TFLOPS number from hardware specs without discounting for real-world memory bandwidth limitations.
    **The Consequence:** Underestimating training time and budgets by ~40%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100B parameters, 300 FLOPs/parameter for this simplified estimate.
       - GPU: 989 TFLOPS peak, 60% utilization, 700W TDP.
       - Instance cost: $3.50/hour, Electricity: $0.15/kWh.
    2. **Calculations:**
       - Total FLOPs: 100B × 300 = 100e9 × 300 = 3.0e13 FLOPs.
       - Effective Compute: 989 TFLOPS × 0.6 = 593.4 TFLOPS (5.934e14 FLOPs/sec).
       - Time: 3.0e13 / 5.934e14 ≈ 0.0506 seconds = 0.000014 GPU-hours.
       - Compute Cost: 0.000014 × $3.50 ≈ $0.000049.
       - Electricity Cost: 0.000014 × 0.7kW × $0.15 ≈ $0.0000015.
       - Total Cost: about $0.00005 for this simplified single-GPU equivalent estimate.
    3. **Conclusion & Interpretation:**
       **Result: About 0.000014 GPU-hours and roughly $0.00005 before system overheads.** This is dimensionally consistent with the stated toy assumption, but real distributed pretraining budgets use much larger token-based FLOP estimates and should add efficiency loss, checkpointing, failures, storage, and networking costs.
