title: Evaluating Test-Time Compute vs Model Scaling
scenario: 'You are architecting a reasoning API using a 70B LLM deployed on an 8x GPU node. The service handles a mix of simple queries and complex logic tasks. To improve accuracy on complex tasks while keeping P95 latency under 10 seconds for 500-token outputs, you are evaluating two strategies: upgrading to a 400B parameter model with standard greedy decoding, versus keeping the 70B model but implementing a test-time compute scaling strategy.'
question: For 500-token reasoning outputs under 10s P95, should you upgrade to a 400B model or run Best-of-16 on the 70B model, and why?
details:
  realistic_solution: Keeping the 70B model and scaling test-time compute (N=16) is superior. The 400B model weights consume ~800GB (FP16), leaving minimal HBM for KV cache, severely limiting batch size and causing high Time Per Output Token (TPOT). The 70B model leaves >400GB for KV cache, allowing the N=16 generations to be parallelized in a single large batch. Weight loading time is amortized across the 16 paths, dramatically increasing Model FLOPs Utilization (MFU).
  common_mistake: |
    **The Pitfall:** Assuming larger models are always required for better reasoning.
    **The Rationale:** Candidates ignore the memory-bandwidth bottleneck of autoregressive decoding and fail to realize that Best-of-N turns a memory-bound operation into an efficient compute-bound one.
    **The Consequence:** The candidate proposes an architecture that violates the latency SLA and starves for KV cache memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8x H100 node has about 640GB aggregate HBM if each GPU has 80GB.
    - 400B FP16 weights are about 800GB, so the model needs sharding/offload or larger GPUs and leaves little room for KV cache.
    - 70B FP16 weights are about 140GB, leaving hundreds of GB for KV cache and larger decode batches.
    - Best-of-16 creates 16 decode paths, so total token work increases by 16x even if the paths are batched together.

    **Calculations:**
    - 400B greedy: one path generates 500 tokens, but the large weight footprint constrains placement and KV-cache headroom, which limits batching and raises TPOT under load.
    - 70B Best-of-16: 16 paths generate 16 * 500 = 8,000 tokens of work, but the smaller model can batch those paths and amortize weight reads across a wider batch.
    - The relevant comparison is not 800GB / bandwidth per token; it is whether the serving stack can maintain high batch occupancy while keeping KV cache in HBM.

    **Conclusion & Interpretation:**
    - **Result: 70B Best-of-16 is the more plausible SLA design (Batching/KV-Cache-Bound)**. The 400B option risks low batchability and KV-cache pressure, while the 70B option trades extra token work for better batching and higher utilization. Exact TPOT must be measured on the target runtime.
