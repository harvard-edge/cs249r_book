title: 'The Blackwell Bet: A Datacenter Dilemma'
scenario: You are the Principal Engineer for Autonomous Vehicle Foundation Models at a major automaker. Your team is training a 200B parameter multi-modal 'World Model' on a large, current-generation H100 cluster. Training runs take 4 months, which is too slow to meet critical safety and feature velocity targets.
question: How would you evaluate whether B200s or more H100 capacity can actually halve the 200B world-model training time?
details:
  realistic_solution: The correct approach is to characterize the current H100 training run, then model B200s and added H100 capacity against the measured bottlenecks. Break the step time into compute kernels, HBM-bound kernels, activation/optimizer memory pressure, pipeline bubbles, tensor/pipeline/data-parallel communication, dataloading, and checkpointing. Use roofline analysis for the kernel mix, communication models for the parallelism strategy, and a scaling curve from smaller H100 experiments to estimate whether simply adding more H100s keeps efficiency high. B200s can plausibly halve time only if the dominant work benefits from their higher sustained compute, bandwidth, memory capacity, and interconnect without introducing migration or availability delays. More H100s can halve time only if the workload is still in the efficient part of its strong-scaling curve and the cluster/network can support the larger job.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the advertised peak TFLOPS of the new hardware.
    **The Rationale:** TFLOPS is the most prominently marketed metric for AI accelerators.
    **The Consequence:** Ignoring whether the workload's Arithmetic Intensity is high enough to actually leverage that compute, leading to wildly inaccurate speedup predictions.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 Baseline: Peak FP16 = 989 TFLOPS, BW = 3.35 TB/s. Ridge Point = 989 / 3.35 = 295 FLOP/Byte.
    - B200 Baseline: Peak dense FP16/BF16 Tensor Core = 2,250 TFLOPS, BW ≈ 7.7-8.0 TB/s. Ridge Point ≈ 2,250 / 8.0 = 281 FLOP/Byte.
    - Workload Profile: Assuming 70% compute-bound and 30% memory-bound.
    - Power Implication: H100 SXM is about 700W; B200 SXM-class GPUs are about 1000W before host, networking, cooling, and power-delivery overhead.

    **Calculations:**
    - Compute-Bound Speedup: 2,250 / 989 = 2.27x speedup.
    - Memory-Bound Speedup: 8.0 / 3.35 = 2.39x speedup.
    - Effective Speedup (Amdahl's): 1 / ((0.7 / 2.27) + (0.3 / 2.39)) = 2.30x.
    - If 20% of total step time is communication or input/checkpoint overhead that does not improve, end-to-end speedup becomes 1 / ((0.8 / 2.30) + 0.2) ≈ 1.83x, which does not halve a 4-month run.
    - A 440-GPU B200 allocation has GPU-only draw of about 440 kW, but facility power is higher after system, network, cooling, and power-delivery overhead.

    **Conclusion & Interpretation:**
    - **Result: Conditional Halving, Not Guaranteed**. Kernel-only roofline math suggests B200 could halve the GPU-bound portion, but measured communication and pipeline overhead can erase that. The decision requires a full step-time model and scaling experiment, not a direct peak-spec comparison.
