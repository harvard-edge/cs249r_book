title: 'Systolic Array Optimization: Fix Low MFU on TPU v5e'
scenario: 'A TPU v5e (197 TFLOPS BF16) runs BERT-large inference at 15 TFLOPS (7.6% MFU). Profiling shows 85% of time in two operations: GeLU activation (memory-bound) and layer normalization (memory-bound). The remaining 15% is GEMM compute.'
question: Why is BERT-large at only 7.6% MFU on TPU v5e, and how much speedup should fusing GeLU, LayerNorm, and Linear deliver?
details:
  realistic_solution: |
    The low MFU is explained by Amdahl's Law: profiling says 85% of step time is spent in memory-bound GeLU and LayerNorm, while only 15% is GEMM compute that can use the systolic array well. Fusion helps by making GeLU and LayerNorm epilogues/prologues around the Linear matmuls, so intermediate activations stay on chip instead of being written to and reread from HBM. If fusion eliminated all of the 85% memory-bound region, the upper-bound speedup would be 1/0.15 = 6.7x. A more defensible estimate is lower, for example 2.5x if fusion removes 70% of that region: new time = 0.15 + 0.30*0.85 = 0.405 of baseline.
  common_mistake: |
    **The Pitfall:** Optimizing the core GEMM matrix multiplications instead of the memory-bound element-wise operations.
    **The Rationale:** Candidates focus on matrix ops, missing Amdahl's Law which points directly to GeLU and LN as the actual timeline bottlenecks.
    **The Consequence:** Wasted optimization effort on the 15% compute portion while the systolic array remains idle during the dominant 85% execution time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current step time is normalized to 1.0.
    - Profiling split: 85% GeLU/LayerNorm memory-bound, 15% GEMM compute.
    - Fusion folds GeLU and LayerNorm into Linear prologue/epilogue where possible.

    **Calculations:**
    - If fusion removed the entire memory-bound region, new time = 0.15 and upper-bound speedup = 1 / 0.15 = 6.7x.
    - If fusion removes 70% of GeLU/LN time, remaining time = 0.15 + 0.30 * 0.85 = 0.405.
    - Defensible speedup estimate = 1 / 0.405 = 2.47x.
    - The Linear part participates by providing the producer/consumer boundary where the activation and normalization can be fused without HBM materialization.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound.** Fusion should improve MFU by removing activation round trips, with an optimistic bound of 6.7x and a more realistic estimate around 2.5x unless all memory-bound time disappears.
