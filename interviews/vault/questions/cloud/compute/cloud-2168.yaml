title: The Warp Divergence Tax
scenario: A sparse attention kernel skips zero-valued elements via branching. Despite compute-bound arithmetic intensity, the profiler shows 15% peak FLOPS and 65% branch divergence.
question: Why does 65% divergence result in only 15% peak FLOPS?
details:
  realistic_solution: In this throughput model, only 35% of lanes perform useful arithmetic and divergent branch paths reduce execution efficiency to 45%. Multiplying useful-lane fraction by execution efficiency gives 0.35 × 0.45 = 15.7% of peak FLOPS.
  common_mistake: |
    **The Pitfall:** Thinking branch divergence causes random thread stalls like a CPU.
    **The Rationale:** Candidates apply CPU mental models, failing to understand SIMT constraints.
    **The Consequence:** Misjudging the penalty severity from serialized branch paths and idle lanes in a warp.
  napkin_math: |
    **Assumptions & Constraints:**
    - Useful Work: 35% of threads perform compute.
    - Execution Efficiency: 45% due to serialized paths.

    **Calculations:**
    - Compound Efficiency = 0.35 * 0.45 = 0.1575 (15.7%).

    **Conclusion & Interpretation:**
    - **Result: ~15.7% peak FLOPS.** The observed throughput follows from useful work fraction × divergent-path execution efficiency, not from divergence alone.
