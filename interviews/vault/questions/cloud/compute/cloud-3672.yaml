title: MoE Expert Routing Overhead
scenario: You are running a 64-expert Mixtral-style MoE model. Each token activates top-2 experts. Your gating network adds a softmax over 64 logits per token, and you observe that the router overhead is eating 12% of your step time on a 4096-token batch. You need to reduce this without changing the number of experts.
question: "How would you reduce the 64-expert MoE router overhead from 12% on a 4096-token batch without reducing the expert count?"
details:
  realistic_solution: Switch to token-choice routing with a hard top-k argmax after a single linear projection, fusing the router into a single kernel. Replace full softmax with a top-k-only implementation (compute partial softmax over only k=2 candidates after cheap linear scoring). This avoids writing out the full 64-way distribution per token.
  common_mistake: |
    **The Pitfall:** Profiling the expert FFNs while ignoring the gating softmax overhead.
    **The Rationale:** Assuming an operation with negligible compute (0.78 MFLOPs) is "free".
    **The Consequence:** The unfused softmax silently starves the memory bus, dragging down overall training step time by 12%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch: 4096 tokens. Experts: 64.
       - Action: Unfused Softmax over 64 logits.
    2. **Calculations:**
       - Unfused HBM Traffic = 4096 * 64 writes + 4096 * 64 reads = 524,288 elements.
       - Fused Top-2 Traffic = Keep 64 logits in registers, only write out 4096 * 2 routing indices.
    3. **Conclusion & Interpretation:**
       - **Result: Overhead Halved to 6% (Memory-Bandwidth-Bound).** Replacing the full softmax with a fused top-k hard routing kernel eliminates the massive HBM round-trips, slashing router latency.
