title: 'The Dying ReLU Diagnosis'
scenario: During training of a 12-layer MLP, loss plateaus after 1,000 steps and gradient norms for layers 8-12 drop to near zero. A histogram of layer 10 activations shows 87% of values are exactly zero.
question: What is the root cause of the 87% zero activations, and what are two systems-aware mitigations?
details:
  realistic_solution: 'Root cause: Dying ReLU. With a large learning rate or poor initialization, weight updates push pre-activation values permanently negative. Once a ReLU neuron dies (output always 0), it receives zero gradient and never recovers. Systems impact: 87% dead neurons means 87% of those layers'' MACs are wasted (computing zeros). Mitigations: (1) Switch to LeakyReLU or GELU, which have nonzero gradients for negative inputs (compute cost is identical on modern GPUs). (2) Use batch normalization or layer normalization before the activation, which re-centers pre-activations and prevents the drift into the dead zone. (3) From a systems perspective, activation sparsity can actually be exploited with sparse kernels, but unstructured 87% sparsity from dead neurons is usually not the right kind of sparsity.'
  common_mistake: |
    **The Pitfall:** Blaming the optimizer or learning rate without inspecting activation distributions.
    **The Rationale:** The 87% zero activations clearly indicate the dying ReLU problem, which permanently zeroes out gradients.
    **The Consequence:** Wasting time debugging hyperparameter schedules while 87% of layer compute performs useless multiplications.
  napkin_math: |
    **Assumptions & Constraints:**
    - 12-layer MLP. 87% dead neurons in later layers.
    - Compute per layer: 34.3 GFLOPs.
    
    **Calculations:**
    - Wasted Compute: 0.87 * 34.3 GFLOPs = 29.8 GFLOPs per layer.
    - Total Waste (5 affected layers): 5 * 29.8 = ~149 GFLOPs per step.
    
    **Conclusion & Interpretation:**
    - **Result: 149 GFLOPs wasted (Compute-Bound)**. Switching to GELU runs at the same FLOP cost but restores gradients.
