title: MI300X NUMA-Aware Tensor Parallel Rank Placement
scenario: A team running TP=8 on MI300X sees 18% higher all-reduce latency than expected from peak Infinity Fabric bandwidth. ROCm NUMA topology shows ranks are spread across all 8 XCDs.
question: How do you fix the rank placement to resolve the 18% all-reduce latency penalty on MI300X?
details:
  realistic_solution: |
    Fix the rank-to-XCD order, not the GPU architecture settings. Read the ROCm topology, then launch ranks so adjacent tensor-parallel ranks follow the lowest-hop XCD order instead of the default enumeration order. For example, expose devices in fabric-neighbor order with ROCR_VISIBLE_DEVICES and bind each process's CPU affinity and memory policy to the NUMA node closest to its assigned XCD. Validate the mapping with an all-reduce microbenchmark before running the model. If TP=8 must span all XCDs, keep the communicator full-width but order ranks so the ring/tree edges stay on local fabric neighbors as much as possible.
  common_mistake: |
    **The Pitfall:** Assuming ROCm assigns TP ranks in a NUMA-optimal order by default.
    **The Rationale:** Candidates assume hardware enumeration perfectly matches the physical fabric topology.
    **The Consequence:** Suboptimal rank placement increases cross-group fabric hops, adding a constant latency penalty to every all-reduce operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X Infinity Fabric: 896 GB/s aggregate for the ideal rank order.
    - 1GB all-reduce across 8 ranks.
    - Bad rank order shows an 18% latency penalty in the scenario.

    **Calculations:**
    - 1GB all-reduce across 8 ranks = 2 * (7/8) * 1GB = 1.75 GB transferred.
    - Ideal time at 896 GB/s = 1.95ms.
    - Observed time with bad placement = 1.95ms * 1.18 = 2.30ms.
    - Effective bandwidth under bad placement = 1.75GB / 2.30ms = ~761 GB/s.
    - Recoverable penalty = 2.30ms - 1.95ms = 0.35ms.

    **Conclusion & Interpretation:**
    - **Result: ~350 us penalty (Topology-Bound)**. Correct rank-to-XCD ordering recovers the lost fabric bandwidth without changing the collective algorithm.
