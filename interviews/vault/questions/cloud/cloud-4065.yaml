title: PCIe Bandwidth Bottleneck for GPUDirect RDMA
scenario: An H100 SXM GPU connects to its ConnectX-7 NIC via PCIe Gen5 x16, which provides 64 GB/s per direction. For GPUDirect RDMA transfers, analyze where the bottleneck lies and calculate the maximum achievable AllReduce throughput when the PCIe bus is shared between NIC traffic and CPU data transfers.
question: "Where is the GPUDirect RDMA bottleneck on H100 SXM, and how much headroom remains between PCIe Gen5 x16 and a 400Gbps NIC?"
details:
  realistic_solution: 'PCIe Gen5 x16: raw bandwidth = 63 GB/s per direction (32 GT/s \times 16 lanes \times 128b/130b encoding). Effective after TLP overhead: ~57 GB/s (10% overhead for headers, ACKs, flow control credits). On H100 SXM: each GPU has a dedicated PCIe Gen5 x16 link to its ConnectX-7 NIC (no sharing with other devices). However, NCCL also uses PCIe for: (1) GDRCopy small message transfers (control plane), (2) NVSwitch management traffic. Under AllReduce with GPUDirect RDMA: GPU VRAM \rightarrow PCIe \rightarrow NIC \rightarrow wire. Max throughput = min(HBM bandwidth for DMA read, PCIe bandwidth, NIC line rate) = min(3350, 57, 50) = 50 GB/s (NIC line rate). The PCIe link is NOT the bottleneck — the 400Gbps NIC (50 GB/s) is. But with 8 rails per H100 node: $8 \times 50 = 400 \text{ GB/s}$ aggregate NIC bandwidth vs $8 \times 57 = 456 \text{ GB/s}$ aggregate PCIe bandwidth. PCIe has only 14% headroom above NIC bandwidth. If any PCIe link experiences degradation (Gen5 \rightarrow Gen4 fallback halves bandwidth to 32 GB/s), that rail becomes PCIe-bottlenecked and AllReduce throughput drops on that rail by 36%.'
  common_mistake: |
    **The Pitfall:** Assuming PCIe Gen5 x16 provides 64 GB/s of usable RDMA bandwidth.
    **The Rationale:** Engineers often use theoretical raw bandwidth numbers without accounting for TLP (Transaction Layer Packet) overhead and bus sharing.
    **The Consequence:** System bandwidth expectations are overestimated by 5-10%, leading to missed performance targets.
  napkin_math: |
    *   **Single Rail Bandwidths:** HBM is 3350 GB/s, PCIe Gen5 x16 effective is ~57 GB/s, 400Gbps NIC is 50 GB/s.
    *   **Bottleneck:** The NIC (50 GB/s) is the slowest component in the path.
    *   **8-Rail Aggregate:** PCIe total is $8 \times 57 = 456 \text{ GB/s}$. NIC total is $8 \times 50 = 400 \text{ GB/s}$.
    *   **Result:** **The NIC is the bottleneck; PCIe has 56 GB/s (14%) of headroom above NIC bandwidth.**
