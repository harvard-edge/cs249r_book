title: Cloud Red Teaming L3 0
scenario: You plan automated red teaming for a chat model. You have 10,000 adversarial prompt templates and the model generates 50 tokens per response at 40 tok/s on one A100.
question: How long and how much would it cost to run 10,000 red-team prompts generating 50 tokens each at 40 tok/s on one A100?
details:
  realistic_solution: "Per adversarial prompt: ~50 input tokens + 50 output tokens = 100 total tokens. Generation: 50 output tokens at 40 tok/s = 1.25 seconds per prompt. Total prompts: 10,000. Sequential time: 10,000 × 1.25s = 12,500s = 3.47 hours on 1 A100. With batching (batch=32): throughput scales ~20x (not 32x due to memory) → 12,500 / 20 = 625s ≈ 10.4 minutes. A100 cost: $2/hr. Total: 10.4 min × $2/60 = $0.35. Plus classifier cost to evaluate safety of each response: 10,000 × 0.5s = 5,000s / 20 (batch) = 250s on CPU. Total cost under $1. Red teaming compute cost is negligible — the bottleneck is designing good adversarial templates."
  common_mistake: |
    **The Pitfall:** Spending months manually designing adversarial prompts.
    **The Rationale:** Believing human creativity is required and assuming automated compute costs are prohibitively expensive.
    **The Consequence:** Dramatically slowing down safety evaluations while missing automated coverage that costs literally less than a dollar.
  napkin_math: |
    *   **Sequential Time:** 10K prompts × 50 tokens @ 40 tok/s = 12,500s.
    *   **Batched Time:** With batch=32, speedup is ~20x: 12,500s / 20 = 625s $\approx$ **10.4 minutes**.
    *   **A100 Cost:** 1 A100 at $2/hr × 10.4 min = **$0.35**.
    *   **Classifier Cost:** Safety classifier on CPU takes ~250s batched $\approx$ **$0.50**.
    *   **Total Cost:** **<$1 per full sweep**.
