title: Diagnose TCO Anomaly from Checkpoint I/O Costs on Cloud
scenario: 'A 70B model training run on 128 H100 GPUs (3 months, $0.50M GPU cost) shows
  an unexpected $180K in cloud storage and egress charges. Checkpoints are saved every
  500 steps (10 min intervals) to S3. Model checkpoint size: 70B params × 4B (FP32)
  + optimizer states × 2 (Adam) + gradient buffer = 70B×16B = 1.12TB per checkpoint.
  Storage cost: $0.023/GB/month. Diagnose whether checkpoint frequency or storage
  retention is the primary cost driver.'
question: Is checkpoint frequency or storage retention the primary driver of the $180K
  storage and egress bill?
details:
  realistic_solution: 'Steps per 3 months: 3×30×24×6 = 12,960 checkpoints. Each 1.12TB. If no retention policy existed, storage would grow linearly to 14.5 PB, costing over $500K. The $180K bill suggests an intermediate retention policy (e.g., 14-day). With a 14-day policy: 2,016 checkpoints are stored simultaneously, costing ~$52K/month, which over 3 months plus egress totals ~$180K. To fix this, retention must be tightened. With a strict 7-day retention: only 1,008 checkpoints are stored. Storage Cost: 1,008 × 1,120 GB × $0.023/month = ~$26K/month (approx $78K for 3 months). Egress for evaluations: 100 checkpoints × 1,120 GB × $0.09/GB = $10K. Total: ~$88K. Fix: 7-day rolling retention + bf16 checkpoints (560GB) → 50% cost reduction to ~$44K.'
  common_mistake: Optimizing checkpoint frequency alone; S3 storage cost accumulates
    from retained checkpoints, not just the write rate. 3 months of checkpoints compound.
  napkin_math: 'Checkpoint size: 70B×16B=1.12TB. Frequency: 10min → 144/day. 14-day
    retention: 2,016 stored × 1,120GB × $0.023 ≈ $52K/month storage + $0.09/GB egress ×
    evaluation reads ≈ $180K total over 3 months. 7-day retention: 1,008 × 1,120 × $0.023 = $26K/month
    + egress ≈ $88K total. BF16: halve to $44K.'
