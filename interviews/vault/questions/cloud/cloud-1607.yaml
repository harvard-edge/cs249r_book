title: Mitigating PII Memorization in Clinical LLMs
scenario: 'You are training a 7B parameter clinical LLM from scratch on 500B tokens of raw medical records
  using a cluster of 256 H100 GPUs. The security and compliance teams mandate that the resulting model
  must not regurgitate patient PII (e.g., names, SSNs, exact medical histories) under targeted prompt
  injection attacks. You must evaluate three distinct mitigations: aggressive corpus deduplication/scrubbing,
  Differential Privacy training (DP-SGD), and post-training RLHF refusal guardrails. Justify your primary
  architectural choice quantitatively based on compute budget, utility degradation, and verifiable privacy
  guarantees.'
question: "Which PII-memorization mitigation should be the primary architecture for training the 7B clinical LLM, and why over DP-SGD or RLHF?"
details:
  realistic_solution: Prioritize aggressive n-gram deduplication and strict PII scrubbing (NER/regex)
    on the pre-training corpus. Research shows eidetic memorization scales logarithmically with sequence
    repetition; deduplication prevents the frequency-based over-indexing that drives memorization. Avoid
    DP-SGD for base pre-training due to its high compute multiplier and utility drop. RLHF should only
    be applied as a secondary defense layer.
  common_mistake: Assuming post-training RLHF or system prompts can completely erase memorized PII, or
    proposing DP-SGD for base training without accounting for its massive memory/compute overhead and
    severe utility tax at the 7B parameter scale.
  napkin_math: Standard 7B training on 500B tokens requires ~2.1e22 FLOPs (6 * 7e9 * 5e11). On 256 H100s
    (~4e14 FLOPS effective each), this takes ~2.4 days. DP-SGD requires per-sample gradient clipping;
    even with Ghost Clipping optimizations, the memory and compute overhead is roughly 3-4x, extending
    training to ~10 days and significantly degrading clinical perplexity to achieve an epsilon < 8. Conversely,
    distributed CPU-based corpus deduplication costs minimal compute time upfront and directly caps the
    sequence repetition count (k) required for extraction.
