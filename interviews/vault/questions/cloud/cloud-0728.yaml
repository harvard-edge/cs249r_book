title: The AllReduce Tax
scenario: You're training a 7B model with data parallelism across 8 GPUs connected via NVLink (900 GB/s bidirectional). After each backward pass, you must AllReduce 14 GB of gradients (FP16).
question: How long does the AllReduce take, and what fraction of the training step is spent on communication?
details:
  realistic_solution: 'Calculate the total data moved per GPU utilizing the Ring AllReduce formula (2 * (N-1)/N * data). Apply this against the unidirectional NVLink bandwidth to find the communication overhead.'
  common_mistake: |
    **The Pitfall:** Dividing the total data size by the raw bandwidth directly.
    **The Rationale:** Candidates do a simple `14 GB / 900 GB/s = 15.6 ms` calculation.
    **The Consequence:** They ignore the Ring AllReduce algorithm's communication volume, severely underestimating the communication overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model, 8 GPUs. Gradients = 14 GB (FP16).
       - NVLink bidirectional bandwidth = 900 GB/s (450 GB/s unidirectional).
    2. **Calculations:**
       - Ring AllReduce volume per GPU = 2 * ((8 - 1) / 8) * 14 GB = 24.5 GB.
       - AllReduce time = 24.5 GB / 450 GB/s = 54.4 ms.
       - Typical compute step (batch=32, seq=2048) = 200 ms.
       - Communication fraction = 54.4 / (200 + 54.4) = 21.4%.
    3. **Conclusion & Interpretation:**
       - **Result: 54.4 ms AllReduce time. The training loop suffers a 21.4% Communication-Bound penalty if gradients are not aggressively overlapped.**
