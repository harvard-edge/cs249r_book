title: The AllReduce Tax
scenario: You're training a 7B model with data parallelism across 8 GPUs connected via NVLink (900 GB/s
  bidirectional). After each backward pass, you must AllReduce 14 GB of gradients (FP16). How long does
  the AllReduce take, and what fraction of the training step is spent on communication?
question: "How long does the AllReduce take, and what fraction of the training step is spent on communication?"
details:
  realistic_solution: 'Ring AllReduce sends $2 \times (N-1)/N \times \text{data\_size}$ total bytes per
    GPU, where $N$ is the number of GPUs. For $N=8$: each GPU sends and receives $2 \times 7/8 \times
    14 = 24.5$ GB. The effective bandwidth is limited by the slowest link in the ring.'
  common_mistake: '"14 GB / 900 GB/s = 15.6 ms — trivial." This uses the raw bandwidth and ignores the
    ring AllReduce algorithm''s communication volume.'
  napkin_math: 'Ring AllReduce volume per GPU: $2 \times (7/8) \times 14$ GB = 24.5 GB. NVLink bandwidth
    (unidirectional, per GPU): 450 GB/s. AllReduce time: 24.5 / 450 = **54.4 ms**. Typical training step
    (forward + backward) for 7B model, batch=32, seq=2048: ~200 ms on 8× H100. Communication fraction:
    54.4 / (200 + 54.4) = **21.4%**. With gradient overlap (start AllReduce for early layers while computing
    backward for later layers): effective communication time ≈ 15 ms (only the last bucket is exposed).
    Fraction drops to: 15 / 215 = **7%**. Without overlap: 21% of training is pure communication. This
    is why frameworks like PyTorch DDP use bucketed, overlapped AllReduce by default.'
