title: MoE All-to-All Network Load Imbalance
scenario: You are operating a 4,096 GPU cluster training a 1-trillion parameter MoE model. During the All-to-All communication phase, network monitoring reveals that despite a non-blocking fat-tree topology and ECMP enabled, some 400Gbps spine links are completely saturated, while parallel links idle at 15% utilization.
question: What is the root cause, and how do you resolve the bottleneck?
details:
  realistic_solution: Diagnose that ECMP hash collisions are causing the hot spots. Implement Adaptive Routing to dynamically route flowlets or packets based on real-time switch egress queue depths, effectively utilizing all available paths.
  common_mistake: |
    **The Pitfall:** Assuming the network is oversubscribed and needs hardware upgrades.
    **The Rationale:** Engineers see link saturation and jump to topology limits, forgetting that static hashing fails to balance concurrent elephant flows.
    **The Consequence:** Unnecessary and expensive physical network upgrades instead of simple routing configuration changes.
  napkin_math: |
    1. Assumptions & Constraints: 8 uplinks, 4 elephant flows.
    2. Calculations: Hash collision probability = 1 - (8*7*6*5)/(8^4) ≈ 59%. Adaptive Routing distributes flowlets, pushing utilization from 60% to >90%.
    3. Conclusion & Interpretation: **Result: Adaptive routing resolves hash collisions. Bottleneck: ECMP Hash Collisions.**
