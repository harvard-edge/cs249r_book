title: MoE All-to-All Network Load Imbalance
scenario: You are operating a 4,096 H100 GPU cluster training a 1-trillion parameter MoE model. During the All-to-All communication phase for expert routing, you observe severe long-tail latency. Network monitoring reveals that despite a non-blocking fat-tree topology and ECMP enabled, some 400Gbps spine links are completely saturated causing packet drops, while other parallel links idle at 15% utilization.
question: "What is the root cause, and how do you resolve the bottleneck?"
details:
  realistic_solution: Diagnose that ECMP hash collisions are causing the hot spots. Implement Adaptive Routing to dynamically route flowlets or packets based on real-time switch egress queue depths, effectively utilizing all available paths.
  common_mistake: |
    **The Pitfall:** Assuming the network is oversubscribed and needs hardware upgrades.
    **The Rationale:** Engineers see link saturation and jump to topology limits, forgetting that static hashing fails to balance concurrent elephant flows.
    **The Consequence:** Unnecessary and expensive physical network upgrades instead of simple routing configuration changes.
  napkin_math: |
    1. Calculate collision probability: For 8 uplinks and 4 flows, chance is ~59% (1 - (8*7*6*5)/8^4).
    2. Analyze collision impact: A collision on a 400Gbps link halves per-flow bandwidth to 200Gbps.
    3. Estimate Adaptive Routing impact: Distributing flowlets raises utilization from ~60% to >90%.
    **Final Result: Adaptive routing resolves hash collisions, raising utilization to >90%.**
