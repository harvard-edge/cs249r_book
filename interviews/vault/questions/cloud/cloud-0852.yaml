title: MoE All-to-All Network Load Imbalance
scenario: You are operating a 4,096 H100 GPU cluster training a 1-trillion parameter MoE model. During
  the All-to-All communication phase for expert routing, you observe severe long-tail latency. Network
  monitoring reveals that despite a non-blocking fat-tree topology and ECMP enabled, some 400Gbps spine
  links are completely saturated causing packet drops, while other parallel links idle at 15% utilization.
  What is the root cause, and how do you resolve the bottleneck?
details:
  realistic_solution: Diagnose that ECMP hash collisions are causing the hot spots. Implement Adaptive
    Routing to dynamically route flowlets or packets based on real-time switch egress queue depths, effectively
    utilizing all available paths.
  common_mistake: Assuming the network is oversubscribed and proposing to upgrade the physical topology,
    or trying to tune the ECMP hash function without realizing static hashing fundamentally fails to load-balance
    concurrent elephant flows.
  napkin_math: With ECMP hashing over 8 uplinks, the chance of 4 elephant flows colliding is ~59% (1 -
    (8*7*6*5)/8^4). A collision on a 400Gbps link reduces per-flow bandwidth to 200Gbps. Adaptive routing
    distributes flowlets across all 8 links, raising effective utilization from ~60% to >90%.
