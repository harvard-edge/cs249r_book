title: The Continual Pre-Training Dilemma
scenario: 'Your company has a general-purpose 70B LLM that cost $4M to pre-train. You need a domain-specific
  version for medical text. You have 100B tokens of medical data. Design the continual pre-training strategy,
  addressing: how to prevent catastrophic forgetting of general capabilities, what learning rate to use
  relative to the original pre-training LR, and how to validate that the model improved on medical tasks
  without regressing on general benchmarks.'
question: "How would you continually pre-train the 70B model on 100B medical tokens without catastrophic forgetting or general benchmark regressions?"
details:
  realistic_solution: '**Learning rate**: Use 10-20% of the original peak LR (if original was 3×10⁻⁴,
    use 3-6×10⁻⁵). Higher LR destroys general knowledge; lower LR learns too slowly. Use WSD schedule:
    brief warmup (200 steps), stable phase for 90% of tokens, decay for final 10%. **Data mixing**: Mix
    medical data with a replay buffer of general data. Ratio: 70-80% medical, 20-30% general (sampled
    from original pre-training distribution). This provides an implicit regularization against forgetting.
    **Validation**: Create a dual evaluation suite: (a) Medical benchmarks (MedQA, PubMedQA, clinical
    NER), (b) General benchmarks (MMLU, HellaSwag, GSM8K). Plot both curves during training — if general
    benchmarks drop >2% while medical improves, increase the general data mixing ratio. **Memory efficiency**:
    The 70B model on 64 H100s with FSDP, 100B tokens at reduced LR — approximately 19 days, ~$88K in compute.
    **Alternative**: If forgetting is unacceptable, use LoRA fine-tuning (rank 64-128) which modifies
    <1% of parameters and inherently limits forgetting, at the cost of slightly less domain adaptation
    than full continual pre-training.'
  common_mistake: Simply continuing training on medical data at the original learning rate. This causes
    catastrophic forgetting — the model rapidly overwrites general knowledge with domain-specific patterns.
  napkin_math: 'Full continual PT: 6 × 70e9 × 100e9 = 4.2e22 FLOPS | 64 H100s × 989T × 0.4 = 25.3K TFLOPS
    | Time: 4.2e22 / 2.53e16 ≈ 1.66e6 s ≈ 19 days | Wait — that is expensive. With only 64 GPUs: reduce
    to 100B tokens subset priority → ~19 days, ~$88K (19 days × 24h × 64 GPUs × $3/hr ≈ $87,552) | With
    256 GPUs: ~5 days, ~$92K | LoRA alternative: only update ~500M params, 10× faster convergence → 1-2
    days on 8 GPUs ≈ $600'
