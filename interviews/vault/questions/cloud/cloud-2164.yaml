title: The Continual Pre-Training Dilemma
scenario: Your company has a general-purpose 70B LLM that cost $4M to pre-train. You need a domain-specific version for medical text using 100B tokens of medical data.
question: How would you continually pre-train the 70B model on 100B medical tokens without catastrophic forgetting or general benchmark regressions?
details:
  realistic_solution: Use 10-20% of the original peak LR and mix medical data with a replay buffer of general data. Evaluate concurrently on medical and general benchmarks. Alternatively, use LoRA fine-tuning to prevent forgetting at the cost of slightly less domain adaptation.
  common_mistake: |
    **The Pitfall:** Continuing training on medical data at the original pre-training learning rate.
    **The Rationale:** Candidates often treat continual pre-training exactly like initial pre-training.
    **The Consequence:** Catastrophic forgetting occurs, rapidly overwriting the model's general knowledge with domain-specific patterns.
  napkin_math: |
    - **Total FLOPS needed**: 6 * 70B params * 100B tokens = 4.2e22 FLOPS.
    - **H100 throughput (64 GPUs)**: 64 * 989 TFLOPS * 40% MFU = 25.3 PFLOPS.
    - **Time required**: 4.2e22 FLOPS / 2.53e16 FLOPS/s ≈ 1.66e6 seconds = ~19 days.
    - **Conclusion**: **Cost on 64 GPUs is 19 days * 24 hours * 64 GPUs * $3/hr = ~$87,552.**
