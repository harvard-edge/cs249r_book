title: The Real-Time Voice Deadline
scenario: You're designing a real-time voice assistant where the product requirement is a Time-To-First-Token (TTFT) under 350ms to feel 'instant'. Your pipeline involves transcribing audio to a 200-token prompt, which is sent to a 7B parameter LLM on an H100 GPU. The inference server uses continuous batching. Assuming 10ms for network round-trip and 40ms for scheduler/queueing overhead.
question: Can the H100 meet the 350ms TTFT target for a 200-token prompt on a 7B LLM, and what are the prefill and first-decode times?
details:
  realistic_solution: 'Yes, the deadline can be easily met. The total TTFT is the sum of all serial latencies: `T_network + T_queue + T_prefill + T_decode_1`. The critical part is the `T_prefill`, the time it takes the GPU to process the 200-token prompt. For short prompts, this phase is typically bound by memory bandwidth—the time it takes to read the model weights. The subsequent single-token decode step is also memory-bound but involves reading the much smaller KV cache. On an H100, both operations are incredibly fast.'
  common_mistake: |
    **The Pitfall:** Assuming a 7B parameter model is inherently too "big" for any real-time deadline.
    **The Rationale:** Candidates often confuse the compute-bound prefill phase with the memory-bound decode phase, or ignore overheads and only calculate raw compute time.
    **The Consequence:** They incorrectly conclude the system cannot meet the SLA, potentially recommending unnecessary quantization or smaller, less capable models.
  napkin_math: |
    1. **Budget:** Deadline = 350ms. Network/queue = 50ms. Remaining budget = 300ms.
    2. **Prefill (Compute vs Memory):** For a short 200-token prompt at batch size 1, reading 14GB weights at 3.35TB/s takes 4.1ms. Compute (7B * 200 * 2 = 2.8 TFLOPs / 989 TFLOPS) takes 2.8ms. The GPU time is the max of these, so prefill takes ~4.1ms.
    3. **First Decode:** Memory-bound, reading 14GB / 3.35TB/s = 4.1ms.
    4. **Total GPU Time:** 4.1ms + 4.1ms = 8.2ms.
    5. **Conclusion:** **Yes**, 8.2ms easily beats the 300ms budget.
  options:
  - No, the 7B model's prefill computation will take over 500ms.
  - Yes, the total TTFT including overheads and GPU processing is well under 100ms.
  - Maybe, it depends entirely on the batch size the server is currently processing.
  - No, reading 14GB of model weights from HBM will violate the 350ms deadline.
  correct_index: 1
