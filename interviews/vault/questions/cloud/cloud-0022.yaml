title: The Continuous Batching Queue
scenario: Your team runs an LLM inference service using continuous batching. The GPU can sustain a total throughput of 800 tokens/second across all concurrent requests. The service receives an average of 5 requests per second (RPS), and each request requires the model to generate 128 tokens.
question: Is the service stable at 5 RPS with 128 generated tokens per request, and what is the average request time in the system?
details:
  realistic_solution: "The system is stable because the required token throughput (640 tokens/s) is less than the system's maximum capacity (800 tokens/s). However, with a system utilization of 80%, we can expect significant queueing delays. We can model this as an M/M/1 queue. The average time a request spends in the system is not just its service time, but the service time divided by one minus the utilization, which accounts for the time spent waiting in the queue."
  common_mistake: |
    **The Pitfall:** Confusing the total token throughput of the system with the per-request service rate.
    **The Rationale:** Engineers calculate the service time for a single request in isolation, ignoring that the 800 tokens/second is a shared resource.
    **The Consequence:** Underestimating latency by ignoring the M/M/1 queueing delay at high utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sustained Capacity: 800 tokens/sec.
    - Workload: 5 RPS \times 128 tokens/req = 640 tokens/sec.
    - M/M/1 Queue Model.

    **Calculations:**
    - Utilization (\rho): 640 / 800 = 0.8 (80%).
    - Base Service Time: 128 tokens / 800 tokens/s = 0.16s = 160ms.
    - M/M/1 Average Time in System: 160ms / (1 - 0.8) = 800ms.

    **Conclusion & Interpretation:**
    - **Result: 800ms latency (Queuing-Delay-Bound)**. Despite stability, the 80% utilization drives queueing delays to 5x the base execution time, yielding 800ms latency.
  options:
  - 160 ms. The system is under capacity, so latency is simply the time it takes to service one request.
  - 200 ms. The latency is the service time plus a 20% overhead for being busy.
  - 800 ms. The system is 80% utilized, leading to significant queueing delay which quintuples the average latency.
  - The system is unstable and will crash, because the required token rate is too close to the maximum.
