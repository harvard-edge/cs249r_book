title: 'PUE Reality Check: Cooling Overhead in a Hyperscale Cluster'
scenario: Your company operates a 10 MW IT-load datacenter training large language models on H100 GPUs. The facility reports a PUE (Power Usage Effectiveness) of 1.3.
question: How much total power does the facility draw, and how many megawatts are consumed purely by cooling, lighting, and power distribution overhead?
details:
  realistic_solution: PUE = Total Power / IT Power. So Total Power = 10 MW × 1.3 = 13 MW. Overhead = 13 MW − 10 MW = 3 MW. That 3 MW goes to cooling (CRAC units, chillers, cooling towers), power distribution losses (UPS, PDU conversion), and lighting/security. At ~$0.06/kWh, the 3 MW overhead costs $0.06 × 3000 kW × 8760 h = ~$1.58M/year. Google's best facilities achieve PUE 1.10, which would reduce overhead to 1 MW and save over $1M/year. This is why liquid cooling (which can push PUE below 1.1) is a strategic investment for GPU-dense clusters.
  common_mistake: |
    **The Pitfall:** Confusing PUE as a multiplier applied only to overhead.
    **The Rationale:** Candidates might assume a PUE of 1.3 means 130% overhead rather than 30% overhead.
    **The Consequence:** Miscalculating the total facility power and drastically overestimating the operational costs of cooling.
  napkin_math: |
    1. **Total Facility Power:** PUE 1.3 × 10 MW IT = 13 MW total.
    2. **Overhead Power:** 13 MW - 10 MW = **3 MW overhead**.
    3. **Annual Cost:** 3000 kW × 8760 hours × $0.06/kWh = **$1.58M/year**.
