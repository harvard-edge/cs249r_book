title: 'Pipeline Parallelism Realization: Activation Memory with Gradient Checkpointing'
scenario: A 40-stage pipeline (one transformer layer per stage) trains a 40B model. For sequence length 4096 and batch size 8, without gradient checkpointing, each stage stores all intermediate activations. With checkpointing, only the layer input is stored.
question: How much activation memory is saved by checkpointing per stage, and does it fit in an 80GB H100 without it?
details:
  realistic_solution: 'Single transformer layer activations without checkpointing: attention (Q,K,V,attn weights,output) + FFN (up,gate,down intermediates) ≈ 12 * hidden * seq * batch * 2 bytes. Hidden = 8192 (40B model), seq=4096, batch=8. Activation size = 12 * 8192 * 4096 * 8 * 2 = 6.4GB per stage. With checkpointing: store only input = 8192 * 4096 * 8 * 2 = 537MB. Savings: 6.4GB vs 537MB = 12x reduction. Without checkpointing: 40B/40 * 2 = 2GB weights + 6.4GB activations = 8.4GB — fits easily. With gradient and optimizer: much larger.'
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing is a "free" memory optimization with no downside.
    **The Rationale:** It's easy to look at the massive memory savings and blindly enable checkpointing, forgetting the strict computational trade-off.
    **The Consequence:** Training compute increases by roughly 33% because of the mandatory extra forward pass, significantly increasing total training time.
  napkin_math: |
    - **Model Dimensions:** 40B total params / 40 layers = 1B params/layer. Hidden dim ≈ 8192.
    - **Uncheckpointed Activations:** 12 × hidden × seq × batch × 2 bytes = 12 × 8192 × 4096 × 8 × 2 bytes = 6.44 GB.
    - **Checkpointed Activations:** Only layer input = 1 × 8192 × 4096 × 8 × 2 bytes = 537 MB.
    - **Memory Savings:** 6.44 GB vs 537 MB is a **~12x reduction**.
    - **Total Uncheckpointed Footprint:** Weights (2GB) + Gradients (2GB) + Optimizer (6GB) + Activations (6.44GB) = 16.44 GB.
    - **Conclusion:** **It easily fits in an 80GB H100 even without checkpointing.**
