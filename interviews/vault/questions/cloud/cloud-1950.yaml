title: Memory Traffic Savings via Operator Fusion
scenario: You are optimizing a custom Transformer block for cloud inference on an A100 GPU (1.93 TB/s HBM bandwidth). The block contains a sequence of memory-bound pointwise operations: x = input + bias, y = GELU(x), and z = y * scale. The input tensor contains exactly 1 billion FP16 elements (2.0 GB).
question: How much HBM traffic do eager versus fused static execution use for the three FP16 pointwise ops, and how long should the fused kernel take?
details:
  realistic_solution: In eager mode, each operation acts as a separate kernel that must read from and write back to HBM. By defining the graph statically before execution, the compiler fuses all three pointwise operations into a single GPU kernel. This keeps intermediate tensors (x and y) entirely within the GPU's on-chip SRAM (registers), drastically reducing HBM round-trips and yielding a theoretical 3x speedup.
  common_mistake: |
    **The Pitfall:** Assuming static graphs primarily accelerate computation by increasing FLOPs or reducing Python overhead.
    **The Rationale:** Candidates fail to recognize that pointwise operations are heavily memory-bound; the true bottleneck is the HBM read/write traffic, not the ALU compute cycles.
    **The Consequence:** Optimization efforts might be misdirected toward instruction-level tuning rather than memory-access reduction (fusion).
  napkin_math: |
    - **Eager Mode (3 kernels):** Add (2GB read, 2GB write) + GELU (2GB read, 2GB write) + Multiply (2GB read, 2GB write) = 12 GB total HBM traffic.
    - **Static Graph Fused Mode (1 kernel):** Read input (2GB), compute all intermediate steps in SRAM, write output (2GB) = 4 GB total HBM traffic.
    - **Compute time:** 4 GB / 1930 GB/s (A100 bandwidth).
    - **Result:** **The fused kernel reduces traffic by 3x and executes in approximately 2.07 milliseconds.**
