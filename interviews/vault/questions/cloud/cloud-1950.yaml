title: Memory Traffic Savings via Operator Fusion
scenario: 'You are optimizing a custom Transformer block for cloud inference on an NVIDIA A100 GPU (1.93
  TB/s HBM bandwidth). The block contains a sequence of memory-bound pointwise operations: `x = input
  + bias`, `y = GELU(x)`, and `z = y * scale`. The `input` tensor contains exactly 1 billion FP16 elements
  (2.0 GB). Compare the eager execution model (dynamic) against a static computation graph model (e.g.,
  via XLA or TorchInductor) that applies operator fusion. Calculate the total High Bandwidth Memory (HBM)
  traffic for both approaches and estimate the theoretical execution time for the fused version.'
details:
  realistic_solution: In eager mode, each operation acts as a separate kernel that must read from and
    write back to HBM. By defining the graph statically before execution, the compiler fuses all three
    pointwise operations into a single GPU kernel. This keeps intermediate tensors (`x` and `y`) entirely
    within the GPU's on-chip SRAM (registers), drastically reducing HBM round-trips and yielding a theoretical
    3x speedup.
  common_mistake: Candidates often assume that static graphs primarily accelerate computation by reducing
    Python overhead or increasing FLOPs, missing that for pointwise operations, the dominant bottleneck
    is HBM read/write traffic which fusion eliminates.
  napkin_math: 'Eager Mode (3 distinct kernels):

    1. Add: Read 2GB (input), Write 2GB (x) = 4 GB

    2. GELU: Read 2GB (x), Write 2GB (y) = 4 GB

    3. Multiply: Read 2GB (y), Write 2GB (z) = 4 GB

    Total Eager Traffic = 12 GB.


    Static Graph Fused Mode (1 kernel):

    Read 2GB (input), compute all intermediate steps in SRAM, Write 2GB (z).

    Total Fused Traffic = 4 GB.


    Theoretical Fused Execution Time:

    4 GB / 2000 GB/s (A100 bandwidth) = 2.0 milliseconds.'
