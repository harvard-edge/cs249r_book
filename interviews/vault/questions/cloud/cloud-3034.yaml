title: 'Model Size Estimation: Master Attention KV-Cache Scaling Laws on H100'
scenario: You are deriving the KV-cache scaling law for LLM inference on an H100. You are serving a 13B LLaMA model (40 layers, hidden_dim=5120, 40 KV heads, head_dim=128) in FP16, with 54GB of HBM available for the KV cache.
question: "What is the KV-cache memory per token, max context capacity, and how does GQA (8 KV heads) change this?"
details:
  realistic_solution: 'KV per token per layer: 2 (K+V) × n_KV_heads × head_dim × 2B = 2×40×128×2 = 20,480 bytes = 20KB per layer. Per request, per token (all layers): 40×20KB = 800KB/token. Available: 54GB. Max tokens (batch × seq): 54GB/800KB = 67,500 tokens (e.g., batch=16 × seq=4096 = 65,536 tokens ✓). With GQA (8 KV heads): 2×8×128×2B = 4,096 bytes per layer. Per token all layers: 40×4KB = 160KB. Max tokens: 54GB/160KB = 337,500 tokens (batch=32 × seq=10K or batch=64 × seq=5K). GQA gives 5× more capacity.'
  common_mistake: |
    **The Pitfall:** Using `hidden_dim` instead of `KV head count × head_dim` for the KV-cache calculation.
    **The Rationale:** Candidates often forget that in multi-head attention, only the Key and Value projections contribute to the cache, not the full hidden dimension.
    **The Consequence:** Grossly overestimating the KV-cache size, leading to under-utilization of hardware by setting the max batch size too low.
  napkin_math: |
    - KV per token per layer: 2 (K+V) × n_kv × head_dim × 2 bytes.
    - Multi-Head Attention (n_kv=40): 2 × 40 × 128 × 2 = 20,480 bytes (20KB). Over 40 layers = 800KB/token.
    - MHA max tokens: 54GB / 800KB = 67,500 tokens.
    - Grouped-Query Attention (n_kv=8): 2 × 8 × 128 × 2 = 4,096 bytes (4KB). Over 40 layers = 160KB/token.
    - GQA max tokens: 54GB / 160KB = 337,500 tokens.
    - **Switching to GQA provides exactly 5× more context capacity.**
