title: Evaluating PagedAttention for LLM Serving
scenario: You are leading the deployment of a Llama-2-70B model on an 8x A100 (80GB) cluster. The current serving engine pre-allocates contiguous KV cache memory for the maximum sequence length (4096 tokens) per request. Because average requests only use 1500 tokens (1000 prompt + 500 generation), actual memory utilization is around 36% due to severe internal and external fragmentation, limiting your maximum batch size to 16 before hitting OOM.
question: What impact will migrating to 16-token PagedAttention blocks have on memory utilization and maximum batch size?
details:
  realistic_solution: PagedAttention dynamically allocates non-contiguous memory pages (blocks of 16 tokens) as needed, instead of pre-allocating contiguous memory for the theoretical maximum sequence length. This virtually eliminates external fragmentation and restricts internal fragmentation to the final, partially filled block (at most 15 wasted tokens). This drives memory utilization up from ~36% to >99%, freeing up enough KV cache capacity to safely increase the batch size by a factor of ~2.7x.
  common_mistake: |
    **The Pitfall:** Assuming PagedAttention compresses the actual KV cache size per token.
    **The Rationale:** Candidates hear "memory optimization" and assume it alters the precision or mathematical footprint of the tensors.
    **The Consequence:** They fail to identify that it's an OS-level paging solution addressing memory fragmentation, and may incorrectly assume throughput scales infinitely without hitting compute bounds.
  napkin_math: |
    1. **Contiguous Allocation:** 4096 tokens per request pre-allocated. Actual usage: 1500 tokens (36.6% utilization).
    2. **PagedAttention Allocation:** With block size=16, ⌈1500 / 16⌉ = 94 blocks allocated. Total allocated memory per request = 94 × 16 = 1504 tokens.
    3. **New Utilization:** 1500 / 1504 = 99.7%.
    4. **Capacity Multiplier:** 4096 / 1504 = 2.72x.
    5. **Conclusion:** **New max batch size = 16 * 2.72 ≈ 43.**
