title: The Algorithmic Trading Deadline
scenario: A critical service uses a 7B parameter LLM running on an H100 GPU to summarize breaking news articles for an automated trading algorithm. The algorithm requires the summary within 500ms of the article's arrival. The service receives a steady 10 requests per second (λ=10). Your system currently uses static batching with a fixed batch size of 8. You observe that a significant percentage of trading opportunities are being missed. The measured service time for a full batch of 8 is 750ms.
question: What is the most likely bottleneck causing the missed deadlines?
details:
  realistic_solution: 'The primary bottleneck is head-of-line blocking caused by static batching. The system is operating at very high utilization, which magnifies queuing delays. A request may have to wait for two reasons: 1) waiting for 7 other requests to arrive just to form a batch, and 2) waiting for the *entire* current batch to finish processing. With a service rate close to the arrival rate, this queue wait time explodes, pushing P99 latency far beyond the 500ms deadline. Continuous batching would resolve this by processing requests as they arrive and returning them as they complete, eliminating the need to wait for a full batch to form and finish.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware or network instead of the scheduling policy.
    **The Rationale:** Candidates assume that if an H100 is failing to meet a 500ms deadline, the GPU must be too slow or network latency is too high.
    **The Consequence:** Wasting budget on hardware upgrades or network optimizations when a simple software policy change (continuous batching) would fix the issue.
  napkin_math: |
    - 1. Calculate service rate (μ): 8 requests / 0.75 seconds = 10.67 requests/sec.
    - 2. Analyze utilization (ρ): λ / μ = 10 / 10.67 = ~93.7% utilization.
    - 3. Identify Head-of-Line Blocking: With static batch size 8, request #1 must wait for 7 more requests to arrive (0.7s at λ=10) AND wait 0.75s for the batch to process.
    - 4. Conclusion: Minimum latency for request #1 is **1.45 seconds**, completely violating the 500ms SLA. **Continuous batching** is required.
  options:
  - The H100 GPU is too slow and needs to be upgraded to a B200.
  - Network latency between the application and the inference server is too high.
  - Head-of-line blocking from static batching is causing extreme queuing delays at high utilization.
  - The 7B model is too large; it should be quantized to INT8 or replaced with a smaller model.
  correct_index: 2
