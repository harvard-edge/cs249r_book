title: The Algorithmic Trading Deadline
scenario: You are an ML Systems Engineer at a hedge fund. A critical service uses a 7B parameter LLM running
  on an H100 GPU to summarize breaking news articles for an automated trading algorithm. The algorithm
  requires the summary within 500ms of the article's arrival to be effective. The service receives a steady
  10 requests per second (λ=10). Your system currently uses static batching with a fixed batch size of
  8. You observe that a significant percentage of trading opportunities are being missed. Monitoring shows
  P99 TTFT is ~1.2 seconds. The measured service time for a full batch of 8 (average prefill and generation)
  is 750ms. What is the most likely bottleneck causing the missed deadlines?
details:
  realistic_solution: 'The primary bottleneck is head-of-line blocking caused by static batching. The
    system is operating at very high utilization, which magnifies queuing delays. A request may have to
    wait for two reasons: 1) waiting for 7 other requests to arrive just to form a batch, and 2) waiting
    for the *entire* current batch to finish processing. With a service rate close to the arrival rate,
    this queue wait time explodes, pushing P99 latency far beyond the 500ms deadline. Continuous batching
    would resolve this by processing requests as they arrive and returning them as they complete, eliminating
    the need to wait for a full batch to form and finish.'
  common_mistake: Engineers often blame a single component, like 'the network is slow' or 'the GPU isn't
    fast enough'. They fail to see that the system's *scheduling policy* (static batching) is the source
    of the inefficiency, creating artificial delays (head-of-line blocking) even when the hardware is
    powerful.
  napkin_math: 1. **Calculate Service Rate (μ):** The system processes a batch of 8 requests in 750ms
    (0.75s). Therefore, the service rate is μ = 8 requests / 0.75s = 10.67 requests/sec.
  options:
  - The H100 GPU is too slow and needs to be upgraded to a B200.
  - Network latency between the application and the inference server is too high.
  - Head-of-line blocking from static batching is causing extreme queuing delays at high utilization.
  - The 7B model is too large; it should be quantized to INT8 or replaced with a smaller model.
  correct_index: 2
