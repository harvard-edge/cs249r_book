title: Rack Power Density Capacity Calculation
scenario: You are provisioning infrastructure for a 128-GPU H100 cluster consisting of 16 DGX H100 nodes. Each DGX node occupies 8U of physical rack space and has a peak power draw of 10.2 kW. Your datacenter provider offers standard 42U racks, but each rack is strictly capped at a 24 kW power and cooling limit.
question: How many 42U racks are needed for 16 DGX H100 nodes under a 24kW rack limit, and what space utilization results?
details:
  realistic_solution: Calculate capacity using the power ceiling first to find that you can safely run a maximum of 2 nodes per rack, leaving a large portion of the physical space stranded.
  common_mistake: |
    **The Pitfall:** Calculating capacity solely based on physical rack units.
    **The Rationale:** Engineers often divide 42U by 8U to get 5 nodes per rack, completely ignoring the facility's power and cooling density ceiling.
    **The Consequence:** Tripping datacenter breakers, overheating, or failing deployment due to power oversubscription.
  napkin_math: |
    1. **Calculate Space Capacity:** 42U / 8U = 5 nodes/rack.
    2. **Calculate Power Capacity:** 24 kW / 10.2 kW = 2.35 nodes/rack.
    3. **Determine Bottleneck:** The strict bottleneck is power (2 nodes per rack max).
    4. **Calculate Racks and Utilization:** Total racks = 16 nodes / 2 = 8 racks. Space used = 16U. Unused space = 42U - 16U = 26U.
    **Final Result: 8 racks are needed, leaving 26U (62%) stranded space per rack.**
