title: Rack Power Density Capacity Calculation
scenario: You are provisioning infrastructure for a 128-GPU H100 cluster consisting of 16 DGX H100 nodes
  (8 GPUs per node). Each DGX node occupies 8U of physical rack space and has a peak power draw of 10.2
  kW. Your datacenter provider offers standard 42U racks, but each rack is strictly capped at a 24 kW
  power and cooling limit. Calculate how many racks you must provision and the physical space utilization
  of each rack.
question: "How many 42U racks are needed for 16 DGX H100 nodes under a 24kW rack limit, and what space utilization results?"
details:
  realistic_solution: 'Calculate capacity using the power ceiling first: 24 kW / 10.2 kW per node = 2
    nodes max per rack. You will need 8 racks total for 16 nodes, which leaves a significant amount of
    stranded physical space.'
  common_mistake: Calculating capacity solely based on physical rack units (42U / 8U = 5 nodes per rack),
    completely ignoring the facility's power and cooling density ceiling.
  napkin_math: 'Space capacity: 42U / 8U = 5 nodes/rack. Power capacity: 24 kW / 10.2 kW = 2.35 nodes/rack.
    The strict bottleneck is power: 2 nodes per rack. Total racks = 16 nodes / 2 = 8 racks. Space utilization
    per rack = 2 nodes * 8U = 16U used. Unused space = 42U - 16U = 26U stranded per rack (only 38% utilized).'
