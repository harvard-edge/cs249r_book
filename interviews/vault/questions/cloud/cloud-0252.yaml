title: Defining Arithmetic Intensity
scenario: In the context of the GPU Roofline Model, what does the term 'Arithmetic Intensity' fundamentally
  represent?
details:
  realistic_solution: Arithmetic Intensity is the ratio of total floating-point operations (FLOPs) performed
    by a kernel to the total bytes of data moved from memory (HBM, in the case of a datacenter GPU) to
    serve those operations. It quantifies how much computation a workload performs for each byte of data
    it fetches. A high AI means a lot of compute work for little memory traffic, while a low AI means
    the workload is memory-heavy.
  common_mistake: Engineers often confuse Arithmetic Intensity with raw performance (TFLOPS) or memory
    bandwidth (GB/s). Another common mistake is inverting the ratio, thinking it's Bytes per FLOP instead
    of FLOPs per Byte.
  napkin_math: 'Consider adding two vectors of 1,000 FP32 numbers (4 bytes each).

    1. Operations: 1,000 additions = 1,000 FLOPs.

    2. Data movement: Read 2,000 numbers (8,000 bytes) + Write 1,000 numbers (4,000 bytes) = 12,000 bytes.

    3. Arithmetic Intensity = 1,000 FLOPs / 12,000 bytes = 0.083 FLOPs/Byte.

    On an H100 (ridge point ~295), this extremely low AI means it is severely memory-bound.'
  options:
  - The peak theoretical performance of the GPU in TFLOPS.
  - The ratio of data moved from memory (Bytes) to compute operations (FLOPs).
  - The ratio of compute operations (FLOPs) to data moved from memory (Bytes).
  - The memory bandwidth of the GPU in GB/s.
  correct_index: 2
