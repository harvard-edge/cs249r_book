title: Evaluating DVFS for Cluster Power Capping
scenario: Your datacenter serves a large fleet of H100 GPUs for LLM inference and is hitting its 20 MW facility power limit. The infrastructure team proposes a flat 20% reduction in GPU clock frequency. Another engineer argues for Dynamic Voltage and Frequency Scaling (DVFS) to drop both voltage and frequency by 15%, even though it increases request latency.
question: Should you use frequency-only throttling or DVFS to stay under the 20MW power limit while maximizing aggregate throughput?
details:
  realistic_solution: Dropping both voltage and frequency via DVFS is vastly superior. Dynamic power is proportional to the square of the voltage. Reducing voltage alongside frequency drastically lowers per-GPU power, allowing significantly more active GPUs to run within the strict budget.
  common_mistake: |
    **The Pitfall:** Assuming that reducing frequency alone significantly reduces the total energy consumed per inference request.
    **The Rationale:** Candidates forget that lowering frequency stretches the computation time proportionally, resulting in identical total energy per operation.
    **The Consequence:** Missing out on the quadratic power savings of voltage reduction, failing to maximize cluster capacity.
  napkin_math: |
    - **Dynamic Power Formula**: P ∝ f * V^2.
    - **With DVFS (15% drop)**: f_new = 0.85 * f, V_new = 0.85 * V.
    - **New Power**: P_new = 0.85 * (0.85)^2 * P = 0.85 * 0.7225 * P ≈ 0.614 * P.
    - **Power reduction**: ~38.6% power reduction per GPU.
    - **Throughput gain**: We can deploy 1 / 0.614 ≈ 1.62x more active GPUs.
    - **Conclusion**: Total cluster throughput = 1.62 (GPUs) * 0.85 (speed) = **1.38x (a 38% increase in aggregate throughput).**
