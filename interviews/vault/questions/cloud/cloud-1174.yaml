title: Evaluating DVFS for Cluster Power Capping
scenario: Your datacenter serves a large fleet of H100 GPUs for LLM inference and is hitting its 20 MW
  facility power limit. The infrastructure team proposes a flat 20% reduction in GPU clock frequency to
  stay under the cap. Another engineer argues that we must implement Dynamic Voltage and Frequency Scaling
  (DVFS) to drop both the operating voltage by 15% and frequency by 15%, even though it increases request
  latency. Evaluate these two power capping approaches to maximize total aggregate cluster throughput.
details:
  realistic_solution: Dropping both voltage and frequency via DVFS is vastly superior. Dynamic power is
    proportional to capacitance, frequency, and the square of the voltage ($P \propto f \cdot V^2$). By
    reducing voltage alongside frequency, you drastically lower per-GPU power. This massive power savings
    allows you to provision significantly more active GPUs within the strict 20 MW budget, increasing
    aggregate cluster throughput despite slower individual chips.
  common_mistake: Assuming that reducing frequency alone significantly reduces the total energy consumed
    per inference request. Dropping frequency linearly scales instantaneous power down, but stretches
    the computation time proportionally, resulting in identical energy per operation. It fails to exploit
    the quadratic scaling of power with voltage.
  napkin_math: 'Dynamic Power P = C * f * V^2. With DVFS: f_new = 0.85 * f, V_new = 0.85 * V. P_new =
    0.85 * (0.85)^2 * P = 0.85 * 0.7225 * P ≈ 0.614 * P (a ~38.6% power reduction per GPU). Within a fixed
    power cap, we can deploy 1 / 0.614 ≈ 1.62x more active GPUs. Total cluster throughput = 1.62 (GPUs)
    * 0.85 (throughput per GPU) = 1.38x. We achieve a 38% increase in total throughput.'
