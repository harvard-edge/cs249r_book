title: Calculating Wasted FLOPs from Unfolded Constants
scenario: 'You are deploying a custom transformer model on AWS c6i.4xlarge CPUs using ONNX Runtime. The
  computational graph dynamically computes a fixed causal mask: `mask = tril(ones(1024, 1024)) * (1.0
  / sqrt(64))`. It also contains an unfused static projection where a frozen weight matrix `W_1` (2048x1024)
  is multiplied by another frozen weight matrix `W_2` (1024x512) before being applied to the dynamic input
  sequence. Calculate the exact number of wasted floating-point operations per inference request if these
  operations are evaluated at runtime instead of being folded at compile time.'
question: "How many FLOPs are wasted per inference by computing the fixed causal mask and frozen W1@W2 at runtime instead of constant folding them?"
details:
  realistic_solution: Execute a constant folding graph optimization pass (such as ONNX Runtime's Level
    1 optimizations or onnx-simplifier) ahead of time. The compiler will statically evaluate the mask
    generation and the W_1 @ W_2 multiplication, replacing the entire subgraph with precomputed Initializer
    tensors, eliminating the runtime computation.
  common_mistake: Candidates often assume that standard PyTorch-to-ONNX export automatically folds all
    static matrix multiplications, or they fail to calculate the exact FLOPs using the 2 * M * N * K formula
    for the weight multiplication.
  napkin_math: 'Mask FLOPs: 1024 * 1024 = ~1.05 MFLOPs. MatMul(W_1, W_2) FLOPs: 2 * M * N * K = 2 * 2048
    * 512 * 1024 = 2,147,483,648 FLOPs (~2.15 GFLOPs). Total wasted compute per request = ~2.15 GFLOPs.
    At 100 requests per second, this is 215 GFLOPs/sec of wasted CPU capacity.'
