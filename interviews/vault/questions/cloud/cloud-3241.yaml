title: Optimizing Large Language Model Inference on AMD MI300X with Roofline Analysis
scenario: Your team is deploying a large language model (LLM) for real-time inference on an AMD MI300X accelerator. The model has 70 billion parameters, uses FP16 precision, and requires approximately 140 GB of model weights. During initial profiling, you observe that the MI300X's compute units are frequently underutilized, despite the theoretical 1,300 TFLOPS FP16 dense capability. The HBM3 memory bandwidth is 5.3 TB/s, and the device has 192 GB of HBM3. You suspect a bottleneck.
question: Using the roofline model, is the 70B FP16 LLM on MI300X compute-bound or memory-bound, and how would you improve utilization?
details:
  realistic_solution: "1.  **Operational Intensity (OI) Estimation**: For LLM inference (primarily matrix multiplications), the OI (FLOPs/byte) is often lower than anticipated due to the large working set of weights and activations relative to the operations performed, especially for memory-intensive operations like loading weights or non-fused kernels. While dense matrix multiplications are theoretically compute-intensive, the need to fetch large weights and activations often makes them memory-bound on high-bandwidth architectures.\n2.  **Diagnosis with Roofline**: Given the MI300X's specs (192GB HBM3, 5.3 TB/s, 1,300 TFLOPS FP16 dense) and a 140GB FP16 model, the model fits entirely within HBM3. The underutilized compute units strongly suggest the workload is *memory-bound*. The observed performance is likely constrained by the 5.3 TB/s memory bandwidth rather than the 1,300 TFLOPS compute capacity.\n3.  **Strategies for Improvement**:\n    *   **Quantization**: Migrate to INT8 or INT4 inference (if accuracy permits) to drastically reduce model size and memory traffic, thereby increasing effective OI.\n    *   **Leverage Sparse Compute**: If the model can be pruned or trained with sparsity, and if the inference framework effectively maps these sparse operations to the MI300X's 2,600 TFLOPS FP16 *sparse* capabilities, this can significantly boost performance.\n    *   **Kernel Optimization & Fusion**: Ensure that critical kernels (e.g., attention, feed-forward layers) are highly optimized for MI300X, using kernel fusion to reduce intermediate memory I/O and maximize memory coalescing.\n    *   **Batching**: Increase inference batch size to amortize memory access overhead and provide more work for the compute units, thereby potentially increasing effective OI, although this also increases activation memory requirements.\n    *   **Data Layout Optimization**: Ensure optimal data layouts (e.g., channel-last, blocked formats) to maximize cache utilization and memory bandwidth efficiency.\n    *   **Profiling**: Utilize AMD ROCm profiling tools to precisely identify memory access patterns, cache misses, and effective compute utilization to validate these hypotheses and guide specific optimization efforts."
  common_mistake: |
    **The Pitfall:** Overlooking the actual operational intensity of LLM workloads.
    **The Rationale:** Developers often assume high theoretical TFLOPS translate directly to high throughput without considering memory access patterns or the impact of low arithmetic intensity during autoregressive generation.
    **The Consequence:** Deploying unoptimized models that leave expensive compute hardware heavily underutilized.
  napkin_math: |
    * FP16 Model Size: 70B parameters × 2 bytes/parameter = 140 GB.
    * Peak HBM3 Bandwidth: 5.3 TB/s = 5300 GB/s.
    * Peak FP16 Dense Compute: 1,300 TFLOPS.
    * Assuming an Operational Intensity (OI) of 1 FLOP/byte for memory-bound scenarios:
    * Max Achievable Performance = OI × Bandwidth = 1 FLOP/byte × 5300 GB/s = 5.3 TFLOPS.
    * Required OI to become compute-bound: 1300 TFLOPS / 5.3 TB/s ≈ 245 FLOPs/byte.
    * **Conclusion: With an OI near 1 FLOP/byte, performance is severely memory-bound, capping at 5.3 TFLOPS (<< 1,300 TFLOPS peak).**
