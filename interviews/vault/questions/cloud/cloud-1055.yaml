title: Evaluating Unbounded Credit Assignment Strategies
scenario: You are designing the training pipeline for a 2B parameter continuous-learning temporal model on a cluster of 8x 80GB H100 GPUs. The model processes streaming user event sequences of up to 100,000 steps. Exact credit assignment via standard Backpropagation Through Time (BPTT) requires retaining the full activation history (roughly 4MB per step), which catastrophically exceeds the 80GB VRAM limit.
question: Should you use TBPTT with a 2,048-step window or gradient checkpointing over 32,768 steps, and why?
details:
  realistic_solution: Implement gradient checkpointing with an optimal chunk size. This explicitly preserves exact long-range credit assignment up to 32k steps by trading a 30-40% compute overhead for a square-root reduction in activation memory, keeping peak memory well within the 80GB limit.
  common_mistake: |
    **The Pitfall:** Focusing solely on the computational overhead of activation recomputation.
    **The Rationale:** Failing to realize that Truncated BPTT fundamentally breaks exact credit assignment for long-term dependencies (horizon > window size).
    **The Consequence:** Essentially blinding the model to delayed rewards.
  napkin_math: |
    - For a 2B model, activations per step ≈ 4MB.
    - Exact credit assignment over 32,768 steps: 32,768 × 4MB = 131GB (OOM on 80GB H100).
    - Gradient checkpointing over sqrt(32768) ≈ 181 chunks.
    - Memory: 181 × 4MB (checkpoints) + 181 × 4MB (local activations) ≈ 1.45GB.
    - Result: **Fits in 80GB VRAM with ~30-40% compute overhead.**
