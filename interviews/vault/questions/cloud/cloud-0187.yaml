title: The SLA Collision
scenario: 'Your team manages a shared GPU cluster that serves two main services: a latency-sensitive interactive chatbot and a high-throughput background summarization job. Using static monolithic batches, you find that the chatbot frequently violates its SLA when a summarization job is running. A junior engineer suggests adding a priority queue so chatbot requests are always placed at the front.'
question: What serving architecture should replace static monolithic batches, and why is a priority queue insufficient?
details:
  realistic_solution: The correct architectural solution involves moving away from static, monolithic batches towards a more dynamic, continuous system. With continuous batching, the GPU evaluates the scheduler at every token generation step rather than waiting for an entire batch to finish. When a high-priority chatbot request arrives, the scheduler can immediately inject it into the active batch for the very next token iteration. This avoids head-of-line blocking without requiring expensive context switching or stateful preemption, allowing both services to safely co-exist while meeting SLAs.
  common_mistake: |
    **The Pitfall:** Proposing a simple priority queue or OS-style preemption.
    **The Rationale:** A priority queue alone doesn't solve head-of-line blocking once a long batch starts. Full stateful preemption (swapping KV cache) is prohibitively expensive.
    **The Consequence:** SLA violations continue, or the system spends all its time context switching instead of generating tokens.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13B (26 GFLOPs/token).
       - Background Job: 10,000-token summarization prefill.
       - Chatbot SLA: 200ms Time-To-First-Token.
       - GPU Compute: 989 TFLOPS.
    2. **Calculations:**
       - Summarization Prefill Compute: 10,000 × 26 GFLOPs = 260 TFLOPs.
       - Static Batch Wait: 260 TFLOPs / 989 TFLOPS = 263ms.
       - SLA Violation: A chatbot request arriving 1ms after prefill starts waits 262ms (>200ms SLA).
    3. **Conclusion & Interpretation:** **Continuous batching injects the request at the next token boundary (<15ms), meeting the SLA where static batches fail due to Head-of-Line blocking. Result: Compute-Bound.**
