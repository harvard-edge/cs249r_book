title: The Conversational AI Traffic Jam
scenario: 'You are the lead ML Systems Engineer designing the cloud backend for a
  new in-car voice assistant. The product requirement is a "natural, conversational
  feel," which the product team has translated to a P99 Time-To-First-Token (TTFT)
  of 500ms. The system must support 10,000 concurrent users with a 70B parameter model.
  Traffic is highly variable: 80% are short commands (''next song''), while 20% are
  long, generative queries (''summarize my last meeting''). Propose a serving architecture
  that meets the latency budget while minimizing cost. What is your core architectural
  choice for request handling and batching, and how do you justify it against the
  alternatives with quantitative analysis?'
question: What is your core architectural choice for request handling and batching,
  and how do you justify it against the alternatives with quantitative analysis?
details:
  realistic_solution: The correct architectural choice is to build the system around
    **continuous batching** (also known as in-flight batching), likely using a framework
    like vLLM with PagedAttention. The justification is that it is the only way to
    solve the Head-of-Line (HoL) blocking problem that makes static batching non-viable
    for this workload.
  common_mistake: 'A typical answer is to propose static batching and simply over-provision
    with more GPUs until the latency target is met. This approach mistakes a throughput
    problem for a latency problem. It leads to an incredibly expensive and inefficient
    system because GPUs will sit idle most of the time just to ensure queues are always
    empty. This solution fails to identify the core issue: Head-of-Line blocking,
    which makes meeting a P99 latency target under load mathematically impossible
    for a static system.'
