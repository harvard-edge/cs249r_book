title: The Conversational AI Traffic Jam
scenario: You are the lead ML Systems Engineer designing the cloud backend for a new in-car voice assistant. The product requirement is a P99 Time-To-First-Token (TTFT) of 500ms. The system must support 10,000 concurrent users with a 70B parameter model. Traffic is highly variable: 80% are short commands ('next song'), while 20% are long, generative queries ('summarize my last meeting').
question: What is your core architectural choice for request handling and batching to meet a 500ms P99 TTFT with highly variable query lengths, and why?
details:
  realistic_solution: The correct architectural choice is to build the system around continuous batching (also known as in-flight batching), likely using a framework like vLLM with PagedAttention. The justification is that it is the only way to solve the Head-of-Line (HoL) blocking problem that makes static batching non-viable for this workload.
  common_mistake: |
    **The Pitfall:** Proposing static batching and over-provisioning GPUs.
    **The Rationale:** Mistaking a throughput problem for a latency problem.
    **The Consequence:** This leads to an incredibly expensive system where GPUs sit idle, and it fails to solve the Head-of-Line (HoL) blocking that breaks the P99 latency target.
  napkin_math: |
    1. **Static Batching (HoL Blocking):** A short query queued behind a long 'summarize' query waits for the entire long generation to finish.
    2. **Continuous Batching:** Evicts finished short queries immediately and slots in new queries at the iteration level.
    3. **Result: Continuous batching solves Head-of-Line blocking, hitting the 500ms P99 target without massive over-provisioning.**
