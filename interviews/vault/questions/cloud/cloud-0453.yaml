title: The Single-Node Slowdown
scenario: You are training a 7B parameter model (FP16) on a single server with eight H100 GPUs. You're
  using a simple `DataParallel` strategy. You notice that GPU utilization is poor, and profiling shows
  that a 14 GB data transfer between GPUs is taking approximately 220 milliseconds at every training step.
  Given the hardware, diagnose the most likely performance bottleneck.
question: "Why is the 14GB inter-GPU transfer taking about 220ms on the 8-H100 DataParallel server?"
details:
  realistic_solution: The most likely bottleneck is the communication bus between the GPUs. A ~220ms transfer
    time for 14GB of data corresponds to a bandwidth of roughly 63 GB/s. This is characteristic of PCIe
    Gen5, not the 900 GB/s provided by NVLink 4.0. The server is likely a 'ganged' configuration where
    GPUs are connected to the CPU via PCIe, but do not have a direct, high-speed NVLink bridge between
    them. `DataParallel`'s broadcast from a single GPU is exacerbating this by serializing transfers over
    the slower bus.
  common_mistake: Engineers often blame the CPU for data loading or assume the model is too large, without
    considering the internal topology of the server. They might not differentiate between the bandwidth
    of the main PCIe bus versus the much faster GPU-to-GPU interconnect like NVLink.
  napkin_math: We need to transfer a 14 GB model (7B params * 2 bytes/param).
  options:
  - The CPU is bottlenecked on data preprocessing, starving the GPUs.
  - The InfiniBand network connection to other nodes is saturated.
  - The server lacks a direct NVLink bridge, forcing GPU communication over the slower PCIe bus.
  - The H100's HBM3 memory bandwidth is insufficient for the model size.
  correct_index: 2
