title: ML Technical Debt Sources
scenario: Your ML platform team spends 80% of engineering time on maintenance instead of new features.
  Explain the concept of ML technical debt and identify the top sources that distinguish it from traditional
  software technical debt.
details:
  realistic_solution: 'ML technical debt has unique sources beyond traditional code debt: (1) Data dependencies:
    unlike code dependencies which are explicit, data dependencies are implicit and unstable. Upstream
    data schema changes can silently break feature pipelines. (2) Pipeline jungles: years of ad-hoc feature
    engineering create tangled preprocessing graphs that nobody fully understands. (3) Configuration debt:
    hyperparameters, feature flags, and data source configs scattered across files, notebooks, and environment
    variables. A single wrong config can silently degrade model quality. (4) Feedback loops: deployed
    models influence their own training data, creating hidden feedback loops. (5) Dead experimental code
    paths: ML teams try many approaches and rarely clean up — the codebase accumulates unused feature
    extractors, deprecated model architectures, and dead data pipelines. The 80/20 maintenance ratio is
    the canonical symptom described by Sculley et al. (2015).'
  common_mistake: Thinking ML technical debt is the same as software technical debt (messy code, poor
    tests). ML-specific debt comes from data dependencies, configuration complexity, and the experimental
    nature of ML workflows.
  napkin_math: 'Traditional software: ~70% of cost is maintenance. ML systems: ~80-90% due to additional
    data and config debt. Only ~5% of ML system code is the actual model.'
