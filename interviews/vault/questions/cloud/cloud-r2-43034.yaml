title: Privacy-Utility Tradeoff in LLM Fine-Tuning
scenario: Your team fine-tunes GPT-2 (1.5B params) on private medical records using DP-SGD. At epsilon
  = 8.0 (moderate privacy), the model achieves 72% accuracy on medical NER. At epsilon = 1.0 (strong privacy),
  accuracy drops to 41% — barely above the 38% random baseline. The non-private baseline is 89%. Evaluate
  whether DP-SGD is viable for this use case and propose alternatives that achieve better privacy-utility
  tradeoff.
question: "Is full DP-SGD viable for GPT-2 medical NER at ε=1, and what alternatives improve the privacy-utility tradeoff?"
details:
  realistic_solution: 'The noise in DP-SGD scales with the gradient clipping norm divided by batch size,
    multiplied by a factor dependent on epsilon. With 1.5B parameters, the gradient norm is large, requiring
    aggressive clipping that distorts learning signals. Alternatives: (1) DP-LoRA: freeze the base model,
    apply DP-SGD only to LoRA adapters (e.g., rank 16: 1.5B → ~10M trainable params). Sensitivity decreases
    by ~150× because gradients are over far fewer parameters. Expected accuracy at ε=1.0: 65-75%. (2)
    PATE: train an ensemble of teacher models on disjoint private data partitions, then use their aggregated
    (noisy) votes to label a public dataset for student training. Teachers never leave the private environment.
    (3) Pre-train on public medical text (PubMed, clinical trials), then DP fine-tune only the classifier
    head on private data — reducing trainable params to <1M. Expected accuracy: 80%+ at ε=1.0.'
  common_mistake: Concluding that differential privacy is fundamentally incompatible with LLMs. The issue
    is often the approach (DP-SGD on all parameters), not the concept. Fine-tuning all 1.5B parameters
    with DP-SGD requires massive noise injection because the sensitivity scales with model size.
  napkin_math: 'DP-SGD full model: noise σ = C × √(2 ln(1.25/δ)) / (ε × batch_size). For C=1.0, ε=1.0,
    δ=1e-5, batch=256: factor = √(2 ln(1.25/1e-5)) = √(2 × ln(125000)) ≈ 4.84. σ = 1.0 × 4.84 / 256 ≈
    0.019 per param per step. 1.5B params × 0.019 noise ≈ 28.5M noise magnitude per step. DP-LoRA (10M
    params): same σ but gradient norm over 10M params — effective noise impact 150× smaller relative to
    signal. DP-LoRA training time: 5× standard LoRA. Cost: 8× H100 × 6 hours × $3.50/hr = $168 vs full
    DP-SGD: 8× H100 × 80 hours = $2,240.'
