title: Optimizing ML Workloads on Kubernetes with Google TPU v5e
scenario: Your team is deploying a large-scale ML model training job on a Kubernetes cluster configured
  with Google TPU v5e accelerators. Each TPU v5e chip offers 197 TFLOPS (BF16) and 16 GB of HBM, with
  a HBM bandwidth of 819.2 GB/s per chip. The cluster utilizes a pod architecture where the interconnect
  fabric provides 1.6 TB/s bisection bandwidth. The training job requires significant compute and memory
  resources, and you need to ensure optimal utilization of the TPUs. Describe how you would leverage Kubernetes
  features, specifically device plugins, node affinity, and job scheduling mechanisms, to efficiently
  orchestrate this ML workload, considering the unique characteristics of the Google TPU v5e.
details:
  realistic_solution: Implement a specialized Kubernetes device plugin for Google TPUs to expose their
    capabilities and health to the scheduler. Utilize `NodeAffinity` or `PodAffinity/AntiAffinity` rules
    to place training pods on nodes with available TPU v5e resources, potentially considering co-location
    for multi-TPU jobs to leverage the high-speed interconnect. Employ custom schedulers or scheduler
    extenders, or leverage existing job scheduling frameworks (like Kubeflow Training Operator) to manage
    distributed training, ensure gang scheduling, and optimize resource allocation based on TPU-specific
    metrics and interconnect topology. Data preprocessing pipelines should be optimized to feed the TPUs
    efficiently, considering the HBM bandwidth. For distributed training across a pod, ensure the communication
    patterns exploit the 1.6 TB/s bisection bandwidth effectively.
  common_mistake: A common mistake is treating TPUs like generic GPUs or not fully understanding their
    architecture (e.g., relying solely on standard GPU device plugins without proper TPU integration,
    or not optimizing data flow to fully utilize the high-bandwidth interconnect). Another mistake is
    improper node affinity leading to suboptimal placement or resource fragmentation.
  napkin_math: If a training job requires 1 PFLOP/s (BF16), you would need approximately (989 TFLOPS /
    197 TFLOPS/chip) ≈ 5.07, so at least 6 Google TPU v5e chips. If each chip has 16GB HBM, 6 chips provide
    96GB total HBM. Data transfer rate for input/output to HBM would be limited by 819.2 GB/s per chip.
    For a pod with multiple chips, the effective communication bandwidth leveraging the ICI (1.6 TB/s)
    becomes critical for distributed training efficiency. Consider a model with 100 GB parameters and
    activations. Loading this onto 6 chips means ~16.6 GB/chip. The total time to load this data, assuming
    peak HBM bandwidth utilization, would be (100 GB / (6 * 819.2 GB/s)) if loading in parallel to each
    chip, or (100 GB / 1.6 TB/s) if utilizing the full pod interconnect for initial data distribution,
    which is approximately (100 GB / 1600 GB/s) = 0.0625 seconds. This highlights the importance of efficient
    data pipelines and interconnect utilization.
