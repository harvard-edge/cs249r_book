title: Mitigating Watermark Spurious Correlations via Group Sampling
scenario: "You are training a ResNet-50 diagnostic model using a dataset of 1,000,000 X-ray images, balanced by label (500k positive, 500k negative). You discover a spurious correlation: 80% of positive images have a specific hospital watermark, while only 5% of negative images have it. When deployed to a new hospital without watermarks, the model's accuracy drops from 95% to 62%."
question: "What resampling weights are needed to perfectly balance Watermark/No-Watermark x Positive/Negative groups in each 1024-image batch?"
details:
  realistic_solution: "Implement group-balanced sampling to ensure each of the four subgroups is equally represented in every batch, or use Group Distributionally Robust Optimization (Group DRO) to optimize the worst-group loss."
  common_mistake: |
    **The Pitfall:** Applying standard class balancing (positive vs negative) or aggressive spatial augmentation.
    **The Rationale:** Assuming basic augmentations will magically erase the watermark's statistical signal.
    **The Consequence:** The model still relies on the spurious correlation because the watermark remains highly predictive of the positive class during training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Group Size: 1024 / 4 = 256 samples per group (25% target probability).
    2. **Calculations:**
       - Group G1 (W=1, Y=1): 400k / 1M = 40%. Multiplier = 25/40 = 0.625x.
       - Group G2 (W=0, Y=1): 100k / 1M = 10%. Multiplier = 25/10 = 2.5x.
       - Group G3 (W=1, Y=0): 25k / 1M = 2.5%. Multiplier = 25/2.5 = 10x.
       - Group G4 (W=0, Y=0): 475k / 1M = 47.5%. Multiplier = 25/47.5 = 0.526x.
    3. **Conclusion & Interpretation:**
       **The rare group (W=1,Y=0) must be oversampled by 10x. Result: Data-Distribution-Bound.**
