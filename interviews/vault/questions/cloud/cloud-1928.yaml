title: Mitigating Watermark Spurious Correlations via Group Sampling
scenario: 'You are training a ResNet-50 diagnostic model on a cloud cluster using a dataset of 1,000,000
  X-ray images. The dataset is balanced by label (500k positive, 500k negative). However, you discover
  a spurious correlation: 80% of positive images have a specific hospital watermark, while only 5% of
  negative images have it. When deployed to a new hospital without watermarks, the model''s accuracy drops
  from 95% to 62%. Calculate the resampling weights required to perfectly balance the four subgroups (Watermark/No-Watermark
  × Positive/Negative) in each batch of 1024 images to break this correlation.'
question: "What resampling weights are needed to balance Watermark/No-Watermark × Positive/Negative groups in each 1024-image batch?"
details:
  realistic_solution: Implement group-balanced sampling to ensure each of the four subgroups is equally
    represented in every batch, or use Group Distributionally Robust Optimization (Group DRO) to optimize
    the worst-group loss.
  common_mistake: Applying standard class balancing (positive vs negative) or using aggressive data augmentation
    (like cropping), which fails to break the strong statistical dependence between the watermark and
    the target label.
  napkin_math: 'Original dataset sizes: G1(W=1,Y=1) = 400k (40%); G2(W=0,Y=1) = 100k (10%); G3(W=1,Y=0)
    = 25k (2.5%); G4(W=0,Y=0) = 475k (47.5%). To get exactly 256 samples per group in a 1024 batch, the
    target probability for each is 25%. Required resampling multipliers: G1 = 25/40 = 0.625x; G2 = 25/10
    = 2.5x; G3 = 25/2.5 = 10x; G4 = 25/47.5 = 0.526x. The rare group (W=1,Y=0) must be oversampled by
    10x to force the model to learn true pathology features instead of the watermark.'
