title: The Translation API Latency Spike
scenario: You are an ML Systems Engineer for a new LLM-powered translation API running on H100 GPUs. A
  major client reports that while overall translation speed (TPOT) is good, the 'time to see the first
  translated word' (Time To First Token - TTFT) is unacceptably slow, with P99 TTFT spiking over 1.5 seconds
  and violating your 500ms SLA.
details:
  realistic_solution: The primary cause is the 1000ms batching timeout. With an arrival rate of 10 requests/sec,
    the system never gathers enough requests to fill a batch of 32 within the timeout window. Instead,
    every batch is formed only after the 1-second timeout is hit. A request arriving at the beginning
    of a batching window must wait the full second for the timeout, plus a small processing time, before
    its first token is generated. This queuing delay is the direct cause of the high P99 TTFT.
  common_mistake: Blaming the model architecture or the hardware itself. Engineers often see low GPU utilization
    and assume the model is too small or the GPU is oversized. They focus on the model's processing time
    per token, forgetting that in many real-world serving scenarios, the queuing and batching policy is
    the dominant factor in end-user latency.
  napkin_math: 1. **Calculate time to fill a static batch:**
  options:
  - The H100's compute is underutilized; switching to a smaller, cheaper GPU would be more efficient.
  - The network latency between the load balancer and the inference servers must be spiking to over 1
    second.
  - The 1000ms batching timeout is too high for the low arrival rate, causing requests to wait too long
    in the queue before processing.
  - The model is too large, causing slow 'cold starts' during token generation, which increases the time
    to the first token.
  correct_index: 2
