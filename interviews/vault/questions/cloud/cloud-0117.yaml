title: The Translation API Latency Spike
scenario: "You are an ML Systems Engineer for a new LLM-powered translation API running on H100 GPUs. A major client reports that while overall translation speed (TPOT) is good, the Time To First Token (TTFT) is unacceptably slow, with P99 TTFT spiking over 1.5 seconds and violating your 500ms SLA."
question: "What batching behavior most likely causes the 1.5s P99 TTFT despite good TPOT in the H100 translation API?"
details:
  realistic_solution: The primary cause is the 1000ms batching timeout. With an arrival rate of 10 requests/sec, the system never gathers enough requests to fill a batch of 32 within the timeout window. Instead, every batch is formed only after the 1-second timeout is hit. A request arriving at the beginning of a batching window must wait the full second for the timeout, plus a small processing time, before its first token is generated. This queuing delay is the direct cause of the high P99 TTFT.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or the hardware itself for high latency.
    **The Rationale:** Engineers often see low GPU utilization and assume the model is too small or the GPU is oversized, focusing on processing time instead of queueing delays.
    **The Consequence:** The team wastes time optimizing hardware or model size while the underlying batching policy remains broken.
  napkin_math: |
    - **Analyze arrival rate:** At 10 requests/sec, an arrival occurs every 100ms.
    - **Calculate time to fill batch:** To reach a batch size of 32, it takes 32 * 100ms = 3.2 seconds.
    - **Evaluate timeout impact:** Since the batching timeout is 1000ms, the batch fires at 1000ms with only 10 requests.
    - **Calculate TTFT:** The first request waits the full 1000ms in the queue. Add ~500ms for prefill compute, resulting in a TTFT of **1.5s**.
  options:
  - The H100's compute is underutilized; switching to a smaller, cheaper GPU would be more efficient.
  - The network latency between the load balancer and the inference servers must be spiking to over 1
    second.
  - The 1000ms batching timeout is too high for the low arrival rate, causing requests to wait too long
    in the queue before processing.
  - The model is too large, causing slow 'cold starts' during token generation, which increases the time
    to the first token.
  correct_index: 2
