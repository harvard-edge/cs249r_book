title: Impossibility of Simultaneous Fairness Metrics
scenario: Your team deploys a cloud-based automated loan approval model processing 100,000 applications per day. Group A has a historical default rate of 15% (base rate 0.85 positive outcome), while Group B has a historical default rate of 30% (base rate 0.70 positive outcome). The compliance team demands that the system satisfies three conditions simultaneously: Demographic Parity, Equalized Odds, and Perfect Calibration.
question: "What demographic parity gap results from equalized odds with TPR=0.9 and FPR=0.1 for Groups A and B, and what does it prove?"
details:
  realistic_solution: Prove via the Fairness Impossibility Theorem that Demographic Parity and Equalized Odds cannot be simultaneously satisfied when base rates differ (unless the classifier is random, i.e., TPR=FPR). With base rates 0.85 and 0.70, perfect Equalized Odds (TPR=0.9, FPR=0.1) yields a 12% gap in positive prediction rates (78% vs 66%), violating Demographic Parity. Recommend relaxing Demographic Parity in favor of Calibration and Equal Opportunity for risk-appropriate lending decisions.
  common_mistake: |
    **The Pitfall:** Attempting to satisfy all three fairness metrics simultaneously using complex debiasing techniques.
    **The Rationale:** Practitioners often treat fairness constraints as engineering problems to be solved via optimization, unaware of the mathematical impossibility theorems governing them.
    **The Consequence:** Wasting immense effort tuning models only to discover that achieving perfect parity inherently destroys calibration or equalized odds when base rates differ.
  napkin_math: |
    - Assume Equalized Odds holds with TPR = 0.9 and FPR = 0.1 for both groups.
    - Group A positive prediction rate: P(Y^=1) = p_A*TPR + (1-p_A)*FPR = 0.85*0.9 + 0.15*0.1 = 0.765 + 0.015 = 0.78 (78%).
    - Group B positive prediction rate: P(Y^=1) = p_B*TPR + (1-p_B)*FPR = 0.70*0.9 + 0.30*0.1 = 0.63 + 0.03 = 0.66 (66%).
    - Demographic Parity Gap = 78% - 66% = 12%.
    - **Demographic Parity is violated by 12% despite perfect Equalized Odds, proving they are mutually exclusive when base rates differ.**
