title: Computational Carbon Intensity of MI300X Fine-Tuning Runs
scenario: 'Your ML platform team must produce a carbon disclosure report for a 13B parameter fine-tuning job run on a 64× MI300X cluster in a US Pacific Northwest datacenter (grid intensity: 180 gCO2eq/kWh). The job ran for 72 hours. Each MI300X averaged 680W during training. The datacenter has a PUE of 1.2.'
question: What is the carbon footprint of the 64×MI300X fine-tuning job in the Pacific Northwest versus the Southeast, and how should it be reported?
details:
  realistic_solution: |
    Pacific NW: IT power = 64 × 680W = 43.52 kW. Total facility = 43.52 × 1.2 = 52.22 kW. Energy = 52.22 kW × 72h = 3,760 kWh. Carbon = 3,760 × 180 = 676,800 gCO2 = 677 kgCO2. US SE: IT same = 43.52 kW. Total facility = 43.52 × 1.35 = 58.75 kW. Energy = 58.75 × 72 = 4,230 kWh. Carbon = 4,230 × 580 = 2,453,400 g = 2,453 kgCO2. SE is 3.63× higher carbon. Reporting: use GHG Protocol Scope 2 (market-based or location-based). Include Scope 3 for hardware manufacturing (amortized over device lifetime, ~50-100 kgCO2 per MI300X chip).
  common_mistake: |
    **The Pitfall:** Forgetting to multiply IT power by PUE before applying grid intensity, or omitting embodied carbon.
    
    **The Rationale:** Candidates often assume GPU power consumption is the only power factor, ignoring the facility overhead (cooling, lighting) captured by PUE, and forget the hardware lifecycle scope.
    
    **The Consequence:** This severely underestimates the operational carbon footprint and misses the Scope 3 reporting entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 GPUs * 680W = 43.52 kW. Runtime: 72 hours.
    - PNW: PUE 1.2, 0.18 kgCO2/kWh. SE: PUE 1.35, 0.58 kgCO2/kWh.

    **Calculations:**
    - PNW Total Facility Power = 43.52 kW * 1.2 PUE = 52.22 kW. Energy = 52.22 kW * 72h = 3,760 kWh.
    - PNW Carbon = 3,760 kWh * 0.18 kgCO2/kWh = 677 kgCO2.
    - SE Total Facility Power = 43.52 kW * 1.35 PUE = 58.75 kW. Energy = 58.75 kW * 72h = 4,230 kWh.
    - SE Carbon = 4,230 kWh * 0.58 kgCO2/kWh = 2,453 kgCO2.
    - Ratio: 2,453 / 677 = 3.62x higher carbon.
    - Embodied Carbon: 64 chips * 75 kgCO2 / 26,280h (3yr) * 72h = 13.1 kgCO2 amortized.

    **Conclusion & Interpretation:**
    - **Result: 2,453 kgCO2 vs 677 kgCO2 (Power-Bound)**. The SE scenario results in a 3.62x higher carbon footprint than the PNW scenario.
