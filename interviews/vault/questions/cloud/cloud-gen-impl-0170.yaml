title: Calculate Tensor Parallel Communication Overhead
scenario: You are deploying a large language model using Megatron-style Tensor Parallelism across 2 H100
  GPUs connected via NVLink 4.0 (900 GB/s bandwidth). The model has a hidden dimension of 8192, and you
  are processing a batch of 16 sequences, each with a length of 4096 tokens. The model uses FP16 precision
  (2 bytes per parameter/activation). In this architecture, an All-Reduce operation is required at the
  end of the MLP block's forward pass. Calculate the exact theoretical communication time (in milliseconds)
  for this single All-Reduce operation during the forward pass.
question: "What is the theoretical communication time in milliseconds for the MLP forward All-Reduce across the 2 H100 GPUs?"
details:
  realistic_solution: 'First, calculate the total activation tensor size before the All-Reduce: Batch
    * Sequence * Hidden * 2 bytes (FP16). Then, apply the Ring All-Reduce data transfer formula for N
    GPUs, which is 2 * ((N-1)/N) * Data Size. For N=2, the total data transferred per GPU is exactly equal
    to the activation tensor size. Finally, divide this transfer size by the NVLink bandwidth (900 GB/s)
    to find the communication time.'
  common_mistake: Candidates often forget to multiply by 2 for FP16 bytes, or they use the wrong formula
    for Ring All-Reduce data transfer size. For a 2-GPU setup, they might incorrectly divide the activation
    size by 2 before calculating the All-Reduce payload, or mistakenly use PCIe bandwidth instead of NVLink.
  napkin_math: '1. Activation Tensor Size = 16 (B) * 4096 (S) * 8192 (h) * 2 bytes/element = 1,073,741,824
    bytes (approx 1.074 GB).

    2. Ring All-Reduce Transfer Volume (N=2 GPUs) = 2 * ((2-1)/2) * 1.074 GB = 1.074 GB transferred per
    GPU.

    3. Communication Time = 1.074 GB / 900 GB/s (NVLink 4.0) = 0.001193 seconds = 1.19 ms.'
