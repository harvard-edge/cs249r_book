title: The On-Node vs. Off-Node Interconnect Gap
scenario: In a modern AI datacenter, you have NVLink connecting GPUs within a server and InfiniBand connecting servers across racks.
question: Roughly how much faster is a typical NVLink transfer compared to a cross-rack InfiniBand transfer in terms of latency?
details:
  realistic_solution: 'An NVLink 4.0 transfer is about 10 times faster than a cross-rack InfiniBand transfer. NVLink latency is around 500 ns, as it''s a direct, on-board connection between GPUs. In contrast, an InfiniBand transfer must leave the server, traverse NICs, optical cables, and one or more network switches, pushing its latency to around 5,000 ns (5 μs).'
  common_mistake: |
    **The Pitfall:** Underestimating the datacenter tax.
    **The Rationale:** Engineers confuse the latency of a direct on-board interconnect with a switched fabric network that traverses NICs and optical cables.
    **The Consequence:** Designing distributed training systems with excessive cross-node communication that completely stall on network latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intra-node NVLink latency.
       - Cross-rack InfiniBand latency.
    2. **Calculations:**
       - NVLink latency: ~500 ns (0.5 μs).
       - InfiniBand latency: ~5,000 ns (5.0 μs).
       - Ratio: 5,000 / 500 = 10x slower.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Latency-Bound**. InfiniBand is a full order of magnitude (10x) slower than NVLink, necessitating advanced tensor/pipeline parallelism topologies to minimize cross-node blocking.
  options:
  - About 2x faster
  - About 10x faster
  - About 100x faster
  - They are roughly the same speed
  correct_index: 1
