title: Optimal Prefill Batch Size for TTFT
scenario: On an H100 SXM5 running prefill for a 13B parameter FP16 model (hidden dim 5120, 40 layers),
  you want to choose the batch size that maximizes GPU utilization without hurting TTFT. At what batch
  size does the prefill become compute-bound vs. memory-bandwidth-bound? Show the calculation using the
  roofline model.
details:
  realistic_solution: 'For attention and MLP layers combined in a transformer, the dominant operation
    is GEMMs. For a single forward pass with batch size B and sequence length S: FLOPs = 2 × N_params
    × B × S (approximate for transformer). Memory reads ≈ N_params bytes × 2 (FP16) + activation memory.
    The ridge point of H100 is ~295 FLOP/byte. Arithmetic intensity = FLOPs / bytes = (2 × 13e9 × B ×
    S) / (26e9 + activations). For S=1 (pure decode): intensity = 2B/(2+ε) ≈ B FLOP/byte. For S=512 (prefill
    batch B=1): intensity = 512 FLOP/byte >> 295 → compute-bound. Crossover at intensity = 295: B×S ≈
    295 → B=1 is compute-bound for S ≥ 295 tokens. For S=512, any batch size makes prefill compute-bound.'
  common_mistake: Using total model size in the roofline instead of per-layer FLOPs and memory accesses.
    The roofline is applied per-operation, not across the whole forward pass.
  napkin_math: 'H100 ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte. Arithmetic intensity for prefill
    (B=1, S=512): (2 × 13e9 × 512) / (13e9 × 2 bytes) = 512. Compute-bound since 512 > 295. For S=32:
    intensity = 32 < 295 → memory-bound. Crossover sequence length: S* = 295 × (2 bytes × 13e9) / (2 ×
    13e9) = 295 tokens. So prefill is compute-bound for any sequence ≥ 295 tokens at B=1.'
