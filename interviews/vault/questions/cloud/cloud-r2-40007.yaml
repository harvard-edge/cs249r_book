title: Congestion Spreading in Multi-Rail ML Clusters
scenario: You are specifying the network architecture for a 4096-H100 cluster using 8-rail topology (each
  GPU has 8 × 400G NICs connected to 8 independent network planes). A congestion event on Rail 0 should
  not affect traffic on Rails 1-7. Specify the isolation requirements and how to prevent congestion spreading
  across rails.
details:
  realistic_solution: 'Isolation requirements: (1) Physical layer: each rail uses completely independent
    switch ASICs — no shared buffer pools across rails. (2) Host side: pin each NIC to a dedicated PCIe
    root complex using NUMA-aware placement; on H100 SXM systems, each NIC connects via dedicated PCIe
    Gen5 x16 (64 GB/s). (3) Software: use per-rail NCCL communicators with independent progress threads,
    so a stalled rail doesn''t block others. (4) Implement per-rail ECN domains — CNP packets for Rail
    0 congestion must not trigger rate reduction on Rail 1 flows. (5) Add per-rail health monitoring with
    automatic rail failover: if Rail 0 latency exceeds 2× baseline, redistribute its traffic across Rails
    1-7 using NCCL''s multi-rail striping. The key specification: maximum cross-rail interference must
    be < 3% throughput degradation under single-rail congestion.'
  common_mistake: 'Assuming physical separation of rails guarantees isolation. Congestion can spread across
    rails through shared resources: (1) PCIe bus contention at the host, (2) shared CPU for control-plane
    processing, or (3) application-level coupling where one slow rail blocks the AllReduce barrier for
    all rails.'
  napkin_math: '8 rails × 400Gbps = 3.2 Tbps per GPU. Single rail failure: lose 400Gbps (12.5%). With
    failover across 7 remaining rails: each rail carries 400/7 = 57 Gbps extra, a 14.3% increase per rail.
    If rails are at 70% utilization normally (280 Gbps), post-failover = 337 Gbps = 84.3% utilization
    — still within safe operating range.'
