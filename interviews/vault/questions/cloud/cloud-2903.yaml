title: Recall MobileNetV2 inverted residual structure and why it inverts the bottleneck
scenario: During a system design interview, you are asked to explain the key architectural
  difference between a standard ResNet bottleneck block and MobileNetV2's inverted
  residual block. Explain the channel count pattern, why it is called 'inverted,'
  and the rationale behind removing the non-linearity before the residual addition.
question: What is the architectural difference between a ResNet bottleneck and a MobileNetV2
  inverted residual block, and why use a linear bottleneck?
details:
  realistic_solution: 'ResNet bottleneck: wide(C) → narrow(C/4) → 3×3 conv at narrow
    → wide(C). The 3×3 standard conv is expensive, so you compress first. MobileNetV2
    inverted residual: narrow(C) → wide(t·C, t=6) → 3×3 depthwise at wide → narrow(C).
    The 3×3 depthwise is cheap (O(C·k²·HW) not O(C²·k²·HW)), so you can afford to
    run it at expanded channel count for richer spatial features. The ReLU6 is only
    applied before the final pointwise projection; the projection itself has no activation
    to preserve information in the low-dimensional residual stream (linear bottleneck
    hypothesis).'
  common_mistake: 'Saying that inverted residuals simply ''flip'' the bottleneck without
    explaining why: ResNet bottleneck compresses then expands (wide→narrow→wide) to
    reduce compute in the 3×3 layer; MobileNetV2 does narrow→wide→narrow because the
    3×3 depthwise layer is cheap regardless of channel count.'
  napkin_math: 'ResNet bottleneck C=256: Compress 256→64: 2×256×64×HW = 32.8K×HW. 3×3 at C/4=64: 2×64×64×9×HW = 73.7K×HW. Expand 64→256: 2×64×256×HW = 32.8K×HW. Total: 139.3K×HW FLOPs. MobileNetV2 C=32, t=6: Expand 32→192: 2×32×192×HW = 12.3K×HW. 3×3 depthwise at 192ch: 2×192×9×HW = 3.5K×HW. Pointwise project 192→32: 2×192×32×HW = 12.3K×HW. Total: 28.0K×HW FLOPs. Even with expanded channels, the inverted residual uses ~5× fewer FLOPs (28.0K vs 139.3K) than a ResNet bottleneck of similar capacity.'
