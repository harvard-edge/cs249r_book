title: 'MI300X for Mixture-of-Experts: Expert Capacity and Memory Layout'
scenario: 'A Mixtral 8×7B MoE model has 8 experts, each 7B parameters, with top-2
  routing (2 experts activated per token). Full model size: 8 × 14GB (FP16) = 112GB.
  On an H100 (80GB), this requires 2-GPU tensor parallel to hold the model. On a single
  MI300X (192GB), the full model fits with 80GB spare. Design the optimal serving
  configuration for each platform and calculate expected decode throughput.'
question: What serving configuration should you use for Mixtral 8×7B on H100 versus
  MI300X, and what decode throughput should each deliver?
details:
  realistic_solution: 'Effective model for compute: 2 active experts × 7B = 14B effective
    parameters per forward pass. But all 112GB must reside in memory for routing.
    H100 TP=2 configuration: each GPU holds 56GB (half of 112GB). Expert routing requires
    AllReduce across GPUs if the activated expert is on the other GPU. Cross-GPU expert
    routing: 50% probability that a token''s top-2 experts span both GPUs → 50% of
    tokens require data transfer. Transfer: token activation (8192×2 bytes = 16KB
    per token). At 200 tok/batch: 200×16KB×0.5 = 1.6MB per AllReduce. NVLink latency:
    1.6MB/450 = 3.6μs — negligible. H100 TP=2 decode throughput: each GPU loads 7B
    active parameters (14GB) per forward. Throughput per GPU: 3,350 GB/s / 14GB =
    239.3 tok/sec. MI300X single-card: loads all 14B active parameters (28GB) per
    forward. Throughput: 5,300 GB/s / 28GB = 189.3 tok/sec. H100 TP=2 provides higher
    throughput, but MI300X offers competitive cost-efficiency and avoids TP communication
    complexity.'
  common_mistake: Treating MoE serving the same as dense model serving and ignoring
    expert routing overhead. Only 2 of 8 experts are activated per token — the inactive
    expert weights still occupy memory but don't contribute to compute. The effective
    arithmetic intensity is that of a 2×7B model, not 8×7B.
  napkin_math: 'MoE effective weight per token: 2 active experts × 7B × 2 bytes =
    28GB loaded per forward pass. H100 (TP=2): each GPU serves 14GB per GPU per forward.
    Per GPU: 3350/14 = 239 tok/sec. MI300X (single): 5300 GB/s loading 28GB → 5300/28
    = 189 tok/sec. H100 TP=2 wins on throughput. Cost efficiency: MI300X at $5.50/hr,
    H100 at $3.50/hr×2=$7.00/hr. MI300X cost per million tokens: $5.50 / (189 × 3600)
    × 1,000,000 = $8.08/1M. H100: $7.00 / (239 × 3600) × 1,000,000 = $8.13/1M. MI300X
    is slightly cheaper per token despite lower throughput.'
