title: 'Queueing Theory Optimization: Reduce P99 by 3x Without Adding Hardware'
scenario: An inference cluster shows P99=6s at ρ=0.96 utilization (M/M/1 model, μ=20 req/s, λ=19.2 req/s). The SLO is P99<2s and no additional hardware budget is available.
question: Which no-new-hardware operational changes would bring P99 below 2s, and how much P99 improvement does each provide?
details:
  realistic_solution: '1) Request admission control at ρ=0.65: reduce λ to 0.65*20=13, Wq=0.65/(20*0.35)=92ms, P99=4.6*(92+50)=654ms. Achieves SLO but drops 32% throughput. 2) Priority queue for short requests: separate short (< 100 tok, service 30ms) and long (>500 tok, service 200ms). Short-request P99 drops from 6s to ~0.5s. 3) Continuous batching: increases μ to 40 req/s at same λ=19.2. ρ drops to 0.48, Wq=0.48/(40*0.52)=23ms, W=48ms, P99=4.6*48ms=221ms. Best option: continuous batching.'
  common_mistake: |
    **The Pitfall:** Proposing only one change without quantifying contributions, or suggesting hardware additions.
    **The Rationale:** Candidates often lack the analytical depth to model queueing theory latency reductions and default to throwing hardware at the problem.
    **The Consequence:** The candidate fails to meet the strict "no new hardware" constraint and cannot definitively prove their solution meets the 2s SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: M/M/1 queue, ρ=0.96, μ=20, λ=19.2.
       - SLO is P99 < 2s.
    2. **Calculations:**
       - Baseline W = 1/(20-19.2) = 1.25s. P99 = 4.6 * 1.25 = 5.75s (~6s).
       - Continuous Batching: Doubles μ to 40. New ρ = 19.2/40 = 0.48.
       - New Wait Time (W) = 1/(40-19.2) = 1/20.8 = 48ms.
       - New P99 = 4.6 * 48ms = 220.8ms.
    3. **Conclusion & Interpretation:**
       - **Result: Continuous batching achieves ~221ms P99, a 26x improvement well under the 2s SLO. Queueing-Bound**
