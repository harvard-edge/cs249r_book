title: 'Queueing Theory Optimization: Reduce P99 by 3x Without Adding Hardware'
scenario: An H100 inference cluster shows P99=6s at ρ=0.96 utilization (M/M/1 model,
  μ=20 req/s, λ=19.2 req/s). The SLO is P99<2s and no additional hardware budget is
  available. Identify three operational changes (scheduling, batching, model optimization)
  and quantify the P99 improvement from each.
question: Which no-new-hardware operational changes would bring P99 below 2s, and
  how much P99 improvement does each provide?
details:
  realistic_solution: '1) Request admission control at ρ=0.65: reduce λ to 0.65*20=13,
    Wq=0.65/(20*0.35)=92ms, P99=4.6*(92+50)=654ms. Achieves SLO but drops 32% throughput.
    2) Priority queue for short requests: separate short (< 100 tok, service 30ms)
    and long (>500 tok, service 200ms). Short-request P99 drops from 6s to ~0.5s.
    3) Continuous batching: increases μ to 40 req/s at same λ=19.2. ρ drops to 0.48,
    Wq=0.48/(40*0.52)=23ms, W=48ms, P99=4.6*48ms=221ms. Best option: continuous batching.'
  common_mistake: Proposing only one change and not quantifying each contribution,
    or proposing changes that require hardware (more GPUs) when the constraint says
    no new hardware.
  napkin_math: 'Baseline: ρ=0.96, μ=20, λ=19.2. W=1/(20-19.2)=1.25s, P99=4.6*1.25=5.75s ≈ 6s.
    Continuous batching doubles μ to 40: ρ=19.2/40=0.48, W=48ms, P99=4.6*48=221ms.
    26x improvement.'
