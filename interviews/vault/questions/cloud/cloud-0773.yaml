title: The Gradient Overflow
scenario: You're training a 13B model in mixed-precision (FP16 forward/backward, FP32 optimizer) on 32
  H100 GPUs. At step 35,000, you start seeing `Inf` values in the loss, but only on 3 of 32 GPUs. The
  other 29 GPUs report normal loss values. After the AllReduce, all GPUs have `Inf` loss. What's happening
  on those 3 GPUs, and why does it infect the entire cluster?
question: "What's happening on those 3 GPUs, and why does it infect the entire cluster?"
details:
  realistic_solution: 'The 3 GPUs received data-parallel micro-batches that happen to contain outlier
    examples — sequences with unusual token distributions that produce large activation magnitudes. In
    FP16, the maximum representable value is 65,504. When a large activation (e.g., from a rare token
    embedding with magnitude 200) passes through multiple layers with residual connections, values compound:
    $200 \times 1.5^{32} \approx 200 \times 1,262,177 \approx 2.5 \times 10^8$ — far exceeding FP16 max,
    producing `Inf`. The AllReduce averages gradients across all 32 GPUs: $(\text{normal} + \text{normal}
    + \ldots + \text{Inf}) / 32 = \text{Inf}$. One `Inf` in any GPU''s gradient poisons the entire AllReduce,
    corrupting the update for all 32 GPUs. This is why dynamic loss scaling exists: it detects `Inf` in
    the gradients, skips the optimizer step, and halves the loss scale factor. But if the loss scaler''s
    initial scale is too high, or if the outlier examples are frequent enough, the scaler enters a death
    spiral of repeated skips.'
  common_mistake: '"The 3 GPUs have hardware errors — replace them" or "Reduce the learning rate globally."
    The first is unlikely (3 simultaneous failures), and the second treats the symptom without understanding
    the data-dependent root cause.'
  napkin_math: 'FP16 max = 65,504. Typical activation magnitude after LayerNorm: ~1.0. Residual connection
    growth factor per layer: ~1.02× (small but compounds). After 80 layers: $1.0 \times 1.02^{80} = 4.88$
    — safe. But an outlier embedding with magnitude 10.0: $10.0 \times 1.02^{80} = 48.8$ — still safe.
    With loss scaling factor of 1024 (typical initial value): gradient magnitudes = $48.8 \times 1024
    = 49,971$ — dangerously close to FP16 max. A slightly larger outlier (magnitude 15): $15 \times 1.02^{80}
    \times 1024 = 74,957$ → **overflow to Inf**. The 3 GPUs'' micro-batches contained such outliers. Fix:
    (1) cap loss scale at 512 instead of 1024; (2) implement per-sample gradient clipping before AllReduce;
    (3) add activation clamping after residual connections: `x = torch.clamp(x, -65000, 65000)` — costs
    <0.1% compute.'
