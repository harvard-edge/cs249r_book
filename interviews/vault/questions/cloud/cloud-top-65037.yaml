title: Adapter Versioning and Rollback in Production ML Systems
scenario: A production system serving 100 LoRA adapters rolls out new adapter updates weekly. A deployment
  of adapter v23 causes a 5% increase in user complaint rate. Design the rollback system to revert v23
  to v22 within 5 minutes.
question: "How would you design adapter versioning and rollback so a bad LoRA adapter v23 can revert to v22 within 5 minutes?"
details:
  realistic_solution: 'Adapter versioning system: (1) Object store (S3/GCS) stores all adapter versions
    in serialized format (safetensors): ~4MB per adapter per version. 100 adapters * 10 versions = 1GB
    storage, trivial cost. (2) Serving system maintains in-memory adapter cache and version manifest JSON.
    (3) Rollback API: PATCH /adapters/{adapter_id}/active_version triggers: (a) Load v22 from S3 to serving
    node CPU memory (4MB, <100ms over 10 Gbps), (b) Hot-swap in GPU memory via paged adapter swapping,
    (c) Update version manifest, (d) Emit rollback metrics. Total rollback time: S3 fetch 100ms + CPU-GPU
    copy 4ms + manifest update 1ms = <200ms. For 5-minute SLA: metric anomaly detection (1min) + triage
    (2min) + rollback execution (0.2min) = 3.2min. Feasible. (4) Blue-green adapter deployment: run v22
    and v23 on separate pods, route 1% traffic to v23, automated canary analysis for 24h before full rollout.'
  common_mistake: Storing only the latest version of each adapter and relying on retraining to recover
    the previous version. This makes rollback take hours rather than minutes, violating SLA requirements
    for incident response.
  napkin_math: 'Adapter v22 storage: 4MB in S3. S3 download at 1 Gbps: 4MB/125MB/s = 32ms. At 10 Gbps:
    3.2ms. CPU-to-GPU PCIe transfer (PCIe 4.0 x16 = 32 GB/s): 4MB/32GB/s = 0.125ms. Total hot-swap: <50ms.
    With S-LoRA paged system, old adapter pages evicted and new pages loaded atomically between batches.
    Zero-downtime rollback achievable.'
