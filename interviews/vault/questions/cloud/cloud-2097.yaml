title: Attention GPU Utilization Drop at Long Sequences
scenario: Your LLM serving system shows 55% GPU compute utilization during prefill for short prompts (256
  tokens) but drops to 25% for long prompts (16K tokens), even though long prompts have MORE total FLOPs.
  The batch size is the same in both cases. Diagnose the root cause.
details:
  realistic_solution: 'At short sequences, the FFN layers (large GEMMs) dominate the FLOP mix, and these
    are compute-bound with high utilization. At 16K tokens, the quadratic attention score matrix ($S^2$)
    grows 64× ($16K^2 / 256^2 = 4096\times$) while FFN only grows linearly. The attention computation
    must materialize and read back a massive score matrix from HBM, becoming memory-bandwidth-bound. The
    overall workload shifts from compute-dominated (high utilization) to bandwidth-dominated (low utilization).
    Solution: use Flash Attention to keep attention tiled in SRAM, or disaggregate prefill to specialized
    hardware.'
  common_mistake: Thinking more FLOPs should always mean higher utilization. The issue is that long-sequence
    attention shifts the bottleneck from compute to memory.
  napkin_math: 'At 256 tokens: Attention matrix = 256^2 * 32 heads * 2 bytes = 4.19 MB. Fits easily in
    SRAM, FFN dominates FLOPs, high A100 utilization. At 16K tokens: Attention matrix = 16384^2 * 32 *
    2B = 17.1 GB. This spills heavily to HBM. The quadratic memory I/O chokes the 2.0 TB/s bandwidth,
    plunging GPU utilization to 25%.'
