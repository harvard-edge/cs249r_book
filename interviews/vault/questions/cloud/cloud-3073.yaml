title: 'Queueing Theory Fluency: M/M/1 Metrics from Memory'
scenario: 'An H100 inference server acts as an M/M/1 queue with a service capacity of μ=40 req/s and an arrival rate of λ=38 req/s.'
question: 'For an M/M/1 queue at ρ=0.95 and μ=40 req/s, what is the correct Wq formula and wait time?'
details:
  realistic_solution: 'M/M/1 Wq = ρ/(μ(1-ρ)) (not ρ²/(μ(1-ρ))). With ρ=0.95, μ=40: Wq = 0.95/(40×0.05) = 475ms.'
  common_mistake: |
    **The Pitfall:** Confusing the M/M/1 queue wait time formula and squaring the utilization factor.
    **The Rationale:** Candidates often misremember the Pollaczek-Khinchine formula for M/G/1 or simply misapply ρ²/(μ(1-ρ)) instead of the correct M/M/1 Wq formula ρ/(μ(1-ρ)).
    **The Consequence:** This miscalculates the expected wait time, leading to improper SLA setting and incorrect capacity provisioning.
  napkin_math: |
    - **Identify Parameters:** Arrival rate λ = 38 req/s, Service rate μ = 40 req/s.
    - **Utilization (ρ):** λ / μ = 38 / 40 = 0.95.
    - **Wait in Queue Formula (Wq):** Wq = ρ / (μ * (1 - ρ)).
    - **Calculation:** Wq = 0.95 / (40 * 0.05) = 0.95 / 2 = **0.475 seconds (475 ms).**
