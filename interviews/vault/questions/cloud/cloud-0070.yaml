title: 'The Continuous Batching Trade-off: Batching Strategies'
scenario: 'You are designing a serving system for a 70B parameter LLM on an H100 GPU. You are comparing
  two batching strategies: static batching and continuous batching. Your service has a strict P99 Time-To-First-Token
  (TTFT) SLO of 150ms. Assume prefill time is 25ms, and iteration time (TPOT) is 25ms. In static batching,
  the batch execution takes 200ms to complete, and a new request must wait for it to finish. In continuous
  batching, a new request is processed immediately at the next iteration. Assuming zero wait time in the
  best case, what is the TTFT for continuous batching, and does static batching meet the SLO?'
question: "Assuming zero wait time in the best case, what is the TTFT for continuous batching, and does static batching meet the SLO?"
details:
  realistic_solution: First, we evaluate the static batching system. Even assuming zero wait time for
    the batch to fill, if a request arrives just after a batch starts, the TTFT is the wait time for the
    current batch to finish plus prefill time. This is `200ms + 25ms = 225ms`, which immediately violates
    the 150ms SLO. Therefore, static batching is not a viable strategy here. For continuous batching,
    a new request can be prefilled at the next iteration. With zero wait time, its TTFT is just the prefill
    time of 25ms, easily meeting the SLO.
  common_mistake: The most common mistake is to miscalculate the TTFT for the continuous batching system
    by either ignoring the scheduler wait time or incorrectly adding the prefill time sequentially. Another
    error is to apply the latency numbers from the static batching system to the continuous batching system,
    failing to recognize they are different operational models. Finally, candidates often confuse TTFT
    (latency to the *first* token) with TPOT (latency between *subsequent* tokens).
  napkin_math: 'With static batching, if a request arrives just after a batch starts, it waits 200ms for the current batch to complete, plus its own 25ms prefill = 225ms TTFT (violating the 150ms SLO). Continuous batching immediately injects the request into the next iteration. In the best case (zero wait time), its TTFT is just the 25ms prefill time. Even in the worst case (waiting for 1 decode step), it waits 25ms (TPOT) + 25ms prefill = 50ms TTFT, which easily meets the 150ms SLO.'
  options:
  - 250ms. The system is non-viable as it violates the SLO.
  - 100ms. This is the worst-case time to first token.
  - 25ms. Continuous batching meets the SLO, but static batching does not.
  - 50ms. This is the sum of the cycle wait and execution time.
  correct_index: 2
