title: 'The Continuous Batching Trade-off: Batching Strategies'
scenario: You are designing a serving system for a 70B parameter LLM on an H100 GPU. You are comparing two batching strategies: static batching and continuous batching. Your service has a strict P99 Time-To-First-Token (TTFT) SLO of 150ms. Assume prefill time is 25ms, and iteration time (TPOT) is 25ms. In static batching, the batch execution takes 200ms to complete, and a new request must wait for it to finish. In continuous batching, a new request is processed immediately at the next iteration.
question: Assuming zero wait time in the best case, what is the TTFT for continuous batching, and does static batching meet the SLO?
details:
  realistic_solution: First, we evaluate the static batching system. If a request arrives just after a batch starts, the TTFT is the wait time for the current batch to finish plus prefill time. This is 200ms + 25ms = 225ms, which violates the 150ms SLO. Therefore, static batching is not a viable strategy. For continuous batching, a new request can be prefilled at the next iteration. With zero wait time, its TTFT is just the prefill time of 25ms, easily meeting the SLO.
  common_mistake: |
    **The Pitfall:** Applying execution times from static batching to the continuous batching model or completely confusing TTFT with TPOT.
    
    **The Rationale:** Engineers lacking systems-level intuition often calculate latency as a naive sum of total batch time, failing to grasp how continuous scheduling decouples request prefilling from subsequent token generation steps.
    
    **The Consequence:** Teams deploy wildly inefficient static-batched inference engines, resulting in catastrophic P99 latencies that drive away impatient users.
  napkin_math: |
    - **Static Batching Worst-Case**: A request arrives just after a batch starts. It waits 200ms for the current batch to complete, plus its own 25ms prefill.
    - **Static TTFT**: 200ms + 25ms = **225ms** (Violates 150ms SLO).
    - **Continuous Batching Best-Case**: Request immediately injected into the next iteration. Zero wait time.
    - **Continuous TTFT**: **25ms** (Meets 150ms SLO).
    - **Continuous Worst-Case**: Waits for 1 decode step (25ms TPOT) + 25ms prefill = **50ms** (Meets 150ms SLO).
  options:
  - 250ms. The system is non-viable as it violates the SLO.
  - 100ms. This is the worst-case time to first token.
  - 25ms. Continuous batching meets the SLO, but static batching does not.
  - 50ms. This is the sum of the cycle wait and execution time.
  correct_index: 2
