title: Graceful Degradation for Real-time ML Inference on NVIDIA H100
scenario: You are leading the architecture for a critical, real-time ML inference service (e.g., for autonomous
  driving perception or high-frequency trading risk assessment) deployed on a fleet of NVIDIA H100 GPUs.
  Each H100 boasts 80 GB HBM3, 989 TFLOPS FP16 dense compute, 3.35 TB/s memory bandwidth, and 700W TDP.
  This service demands extremely low latency and high throughput. Due to unforeseen circumstances like
  transient network issues, overloaded upstream services, or partial hardware degradation within the H100
  cluster, the system experiences a significant reduction in effective processing capacity. Your goal
  is to ensure the service remains operational and provides acceptable utility, even if degraded.
question: "How would you keep the H100 real-time inference service fail-operational under reduced capacity using model fallbacks and QoS shedding?"
details:
  realistic_solution: 'A robust solution would involve a multi-tiered degradation ladder combined with
    dynamic QoS shedding. For instance:

    1.  **Degradation Ladder (Model Fallback):** Maintain a primary, high-accuracy model (e.g., requiring
    60GB HBM3, 400 TFLOPS FP16) and a smaller, faster, slightly less accurate fallback model (e.g., 20GB
    HBM3, 100 TFLOPS FP16) pre-loaded or quickly loadable (leveraging the H100''s 3.35 TB/s memory bandwidth
    for rapid model swaps). Trigger: Monitor H100''s actual FP16 TFLOPS utilization, memory bandwidth,
    and inference queue depth. If latency P99 spikes or effective throughput drops below a threshold,
    switch to the fallback model for new requests. This prioritizes ''fail-operational'' by maintaining
    some level of service.

    2.  **Quality-of-Service (QoS) Shedding:** Maintain the primary model but dynamically adjust input
    quality or processing scope. For critical requests (e.g., safety-critical detections), always use
    full resolution. For less critical requests (e.g., background object tracking), reduce input resolution,
    skip certain post-processing steps, or process every Nth frame/sample. Trigger: Monitor H100 SM occupancy,
    active CUDA core count, and power consumption (700W TDP is high, potential for thermal throttling
    in edge cases). This is ''fail-operational'' by preserving core functionality at potentially reduced
    quality.'
  common_mistake: A common mistake is implementing an 'all or nothing' fallback (e.g., shutting down the
    service or only having one highly coarse-grained fallback) or not anticipating resource contention
    (e.g., trying to load a fallback model that still oversubscribes HBM3 memory if the primary model
    wasn't properly unloaded, or assuming sufficient FP16 TFLOPS capacity is always available). Another
    mistake is failing to define clear degradation triggers based on observable H100 resource metrics
    like HBM3 utilization, Tensor Core occupancy, or NVLink bandwidth usage, leading to reactive instead
    of proactive graceful degradation.
  napkin_math: 'If your primary model takes 50GB HBM3 and runs at 400 TFLOPS FP16, and the H100 has 80GB
    HBM3 and 989 TFLOPS FP16:

    -   **Memory Overhead for Fallback:** If both models need to be resident for instant switching, the
    combined memory (50GB + 20GB = 70GB) fits within the 80GB HBM3. If only one can be resident, switching
    a 50GB model with 3.35 TB/s bandwidth would take roughly 50 GB / (3.35 * 1024 GB/s) ≈ 15 milliseconds,
    which is negligible for many real-time applications.

    -   **Compute Resilience:** If an H100''s effective FP16 compute capacity drops by 20% (e.g., from
    495 to ~396 TFLOPS), the primary model (400 TFLOPS) might struggle, but the fallback model (100 TFLOPS)
    would still run significantly faster and at high throughput, ensuring continued service. This also
    highlights how 989 TFLOPS FP16 allows substantial headroom.'
  question: 'Propose two distinct architectural approaches for gracefully degrading this service. For
    each approach, describe:

    1.  How it would be implemented, leveraging the specific capabilities and constraints of the NVIDIA
    H100 platform.

    2.  The monitoring metrics (including H100-specific metrics) you would use to trigger degradation.

    3.  The trade-offs involved (e.g., accuracy, latency, throughput, operational complexity, cost).

    4.  How ''fail-safe'' vs ''fail-operational'' principles apply to your chosen strategies.'
