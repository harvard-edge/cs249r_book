title: Evaluating Hardware Trojan Mitigations
scenario: >
  You are evaluating supply chain security for a custom 3nm AI training accelerator fabbed at an untrusted overseas foundry. The threat model includes dormant Hardware Trojans designed to leak weights via power side-channels. You must evaluate three mitigations for a 50,000-GPU fleet: 1) Logic locking (2% area/power overhead), 2) Split manufacturing (15% latency penalty, $5M NRE), or 3) Boot-time side-channel fingerprinting.
question: >
  Which mitigation—logic locking, split manufacturing, or boot-time fingerprinting—best fits a 50,000-GPU synchronous LLM training fleet, and why?
details:
  realistic_solution: |
    Logic locking is the optimal trade-off for cloud accelerators. It prevents unauthorized modification and limits Trojan insertion at the untrusted foundry with minimal impact on critical path latency (2% area/power overhead, ~$200 per chip). Split manufacturing's 15% latency penalty across a 50,000-GPU cluster adds 15 days to a 100-day training run, costing $36M extra — making logic locking 36x more cost-effective while preserving compute scaling efficiency.
  common_mistake: |
    **The Pitfall:** Relying on post-silicon boot-time fingerprinting, or selecting split manufacturing without quantifying the performance penalty at datacenter scale.
    **The Rationale:** Boot-time checks are cheap but cannot reliably detect Trojans with complex, rare activation triggers. Split manufacturing is highly secure but devastating to latency.
    **The Consequence:** Either leaving the fleet vulnerable to advanced Trojans (fingerprinting) or crippling training throughput and wasting tens of millions of dollars in compute time (split manufacturing).
  napkin_math: |
    1. **Split Manufacturing Penalty:** A 15% latency penalty on a 100-day training run adds 15 days.
    2. **Split Cost:** For 50,000 GPUs at $2/hr/GPU, 15 days (360 hours) costs 50,000 * $2 * 360 = $36M extra compute cost per run.
    3. **Logic Locking Cost:** 2% area/power overhead on a $10,000 chip is ~$200 extra per chip. For 50,000 GPUs, this is a one-time $10M cost, making it drastically more cost-effective.
    4. **Result:** **Logic locking costs $10M upfront versus the recurring $36M penalty of split manufacturing, making it the vastly superior choice.**
