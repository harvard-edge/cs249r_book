title: The FP16 vs BF16 Question
scenario: 'A new hire asks you: ''FP16 and BF16 are both 16 bits. Why does everyone use BF16 for training?
  Aren''t they the same?'' Give them the 2-minute explanation.'
details:
  realistic_solution: 'FP16 and BF16 allocate their 16 bits differently, and that difference is existential
    for training stability. FP16 uses 5 exponent bits and 10 mantissa bits: high precision (~3 decimal
    digits) but narrow range (±65,504). BF16 uses 8 exponent bits and 7 mantissa bits: lower precision
    (~2 decimal digits) but the same range as FP32 (±3.4 × 10³⁸). For training, *range* matters more than
    *precision* because gradients can span dozens of orders of magnitude. FP16''s narrow range causes
    small gradients to underflow to zero, requiring complex loss scaling. BF16 "just works" because its
    8 exponent bits match FP32''s dynamic range.'
  common_mistake: '"BF16 is just a newer, better version of FP16" or "They''re basically interchangeable
    — BF16 is just what NVIDIA recommends now." Both miss the fundamental bit-layout trade-off.'
  napkin_math: 'FP16 min subnormal ≈ $5.96 \times 10^{-8}$, max = 65,504. BF16 min subnormal ≈ $9.18 \times
    10^{-41}$, max ≈ $3.39 \times 10^{38}$. Gradients in layer 80 of a deep Transformer routinely hit
    $10^{-12}$ to $10^{-20}$. In FP16: **underflow to zero** → training collapses. In BF16: represented
    exactly (within precision) → training proceeds. The precision loss (10 → 7 mantissa bits) is irrelevant
    because SGD''s stochastic noise already exceeds 2 decimal digits of precision.'
