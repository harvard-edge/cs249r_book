title: The FP16 vs BF16 Question
scenario: 'A new hire asks you why everyone uses BF16 for training when FP16 and BF16 are both 16 bits, assuming they are interchangeable.'
question: 'Why do people use BF16 instead of FP16 for training if both formats are 16 bits?'
details:
  realistic_solution: 'FP16 and BF16 allocate their 16 bits differently. FP16 uses 5 exponent bits and 10 mantissa bits, offering higher precision but a narrow dynamic range. BF16 uses 8 exponent bits and 7 mantissa bits, sacrificing precision for the same massive dynamic range as FP32. In Deep Learning training, gradient ranges routinely span dozens of orders of magnitude. FP16 causes small gradients to fatally underflow to zero, requiring complex loss scaling. BF16 natively prevents this underflow.'
  common_mistake: |
    **The Pitfall:** Thinking BF16 is just a newer version of FP16 or broadly interchangeable.
    **The Rationale:** Candidates focus solely on the total bit count rather than the architectural bit-layout trade-off between exponent and mantissa.
    **The Consequence:** Using FP16 without complex loss scaling, leading to immediate gradient underflow and training collapse.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16: 5 exponent bits. BF16: 8 exponent bits.
    - Transformer gradients routinely hit 10^-12 to 10^-20.

    **Calculations:**
    - FP16 min subnormal = ~5.96 x 10^-8.
    - BF16 min subnormal = ~9.18 x 10^-41.

    **Conclusion & Interpretation:**
    - **Result: FP16 underflows gradients to zero, whereas BF16 represents them perfectly, eliminating loss scaling (Format-Bound).**
