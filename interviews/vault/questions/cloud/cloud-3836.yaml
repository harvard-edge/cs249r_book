title: Explaining Stale Online Features with Inference
scenario: 'A recommender system uses a GPU for online inference, taking 10ms per request. Users complain that recommendations do not reflect clicks from the last 5 minutes. A streaming pipeline processes 10,000 clicks/sec and updates a Redis feature store, but network congestion has spiked Redis write latency to 50ms per operation. The GPU is only 20% utilized.'
question: 'Why are recommendations stale despite 10ms inference and 20% GPU utilization, and where is the true bottleneck?'
details:
  realistic_solution: 'The staleness is caused by a bottleneck in the feature pipeline, specifically the Redis write latency, not the inference speed. Even though the GPU processes requests in 10ms, the streaming pipeline can only update Redis at a rate of 20 operations per second per connection (1 / 0.050s). If the pipeline isn''t sufficiently parallelized to handle the 10,000 clicks/sec incoming rate, a backlog forms, causing the online feature store to fall behind real-time events.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the GPU specifications or model complexity to explain staleness.
    **The Rationale:** Engineers over-index on the "AI" component of the system, ignoring the surrounding data infrastructure.
    **The Consequence:** Wasting time optimizing an already underutilized model while the actual bottleneck—the feature store write pipeline—continues to silently drop or delay critical user events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline load: 10,000 clicks/second.
    - Redis write latency: 50ms per operation.

    **Calculations:**
    - Redis Connection Throughput: 1 second / 50ms per write = 20 updates/second per connection.
    - Required Connections: To handle 10,000 clicks/second, the pipeline needs 10,000 / 20 = 500 concurrent connections.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. If the pipeline has fewer than 500 concurrent connections, a backlog forms instantly.
