title: The Asymmetric Heterogeneous Offload
scenario: You deploy a Vision Transformer (ViT-B, 12 blocks) to a mobile SoC via your cloud platform.
  The compiler analyzes the graph and offloads the heavy Linear (MatMul) layers to the powerful NPU, while
  mapping the LayerNorm and Softmax operations to the CPU, as the NPU lacks hardware support for them.
  The resulting latency is 140ms. If you force the compiler to run the entire model on the much weaker
  mobile GPU, the latency is actually better at 90ms.
details:
  realistic_solution: "The performance degradation is driven by graph partitioning synchronization overhead,\
    \ not compute capability. Because a ViT has 12 blocks, and each block contains LayerNorm and Softmax\
    \ interspersed between Linear layers, the compiler fractures the computation graph into dozens of\
    \ tiny subgraphs. \n\nExecution bounces back and forth between the NPU and CPU (NPU -> CPU for LayerNorm\
    \ -> NPU for Matmul -> CPU for Softmax...). Each boundary crossing requires CPU-NPU synchronization,\
    \ cache flushing, and tensor copying via shared memory. The hardware-compiler-algorithm co-design\
    \ tradeoff is to either modify the algorithm (e.g., replacing LayerNorm with BatchNorm which can be\
    \ folded into the linear weights, and using a ReLU-based approximation instead of Softmax) so the\
    \ entire graph stays on the NPU, or accept running on a sub-optimal but unified accelerator (GPU)\
    \ to avoid synchronization taxes."
  common_mistake: Assuming the mobile CPU is just too slow to calculate LayerNorm and Softmax compared
    to the GPU.
  napkin_math: 'ViT-B has 12 transformer blocks. Each block has 2 LayerNorms and 1 Softmax. Total boundaries
    crossed = 12 * 3 = 36 round trips (72 context switches). If an NPU-CPU sync takes 1.5ms: 72 * 1.5ms
    = 108ms of pure synchronization overhead. NPU compute might only be 20ms, and CPU compute 12ms. Total:
    108 + 20 + 12 = 140ms. GPU executes everything in a single kernel launch: 90ms compute, 0ms sync.'
