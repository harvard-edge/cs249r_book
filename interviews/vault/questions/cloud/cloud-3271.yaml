title: Optimizing KV-Cache on Google TPU v5e for Long Context LLMs
scenario: You are designing an inference serving system for a 7B model with a 128k context length. The model uses 16 attention heads (dim 128).
question: How would you size, page, and evict the KV-cache for 128k-context 7B inference on a 16 GB TPU v5e to reduce pressure and latency?
details:
  realistic_solution: Implement PagedAttention and heavy token eviction (e.g. StreamingLLM or H2O). A single 128k context vastly exceeds 16GB HBM, so Tensor Parallelism across multiple TPUs is mandatory.
  common_mistake: |
    **The Pitfall:** Ignoring the layer multiplier or strict hardware limits.
    **The Rationale:** Calculating KV size for one layer instead of all layers, missing the exponential memory footprint of long contexts.
    **The Consequence:** Designing a deployment topology that immediately fails with OOM before completing a single request.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model (32 layers), 128k tokens, 16 KV heads, 128 dim.
    2. **Calculations:**
       - Per token = 2 (K+V) * 32 * 16 * 128 * 2 bytes = 262 KB.
       - 128k context = 33.5 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 33.5 GB grossly exceeds 16 GB TPU capacity; eviction and multi-chip distribution are strictly required.**
