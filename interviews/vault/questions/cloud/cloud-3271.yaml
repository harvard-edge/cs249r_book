title: Optimizing KV-Cache on Google TPU v5e for Long Context LLMs
scenario: You are designing an inference serving system for a large language model
  with a maximum context length of 128k tokens, running on a Google TPU v5e with 16
  GB HBM and 1.6 TB/s memory bandwidth. The model uses 7B parameters (FP16) and a
  KV-cache with 16 attention heads, each with a hidden dimension of 128. You observe
  high memory pressure and frequent evictions due to long contexts. Describe how you
  would analyze the memory footprint of the KV-cache, propose a paging strategy, and
  evaluate different cache eviction policies to maximize throughput and minimize latency,
  given the specific hardware constraints of the TPU v5e.
question: How would you size, page, and evict the KV-cache for 128k-context 7B inference
  on a 16 GB TPU v5e to reduce pressure and latency?
details:
  realistic_solution: A realistic solution would involve calculating the precise memory
    footprint of a single KV-cache entry per token, considering the `num_heads * head_dim
    * 2 * sizeof(float16)` per token. Then, implement a paged attention scheme to
    manage KV-cache allocations dynamically. For eviction policies, consider an adaptive
    strategy based on recency (e.g., LFU or ARC) but weighted by query patterns, or
    a more sophisticated policy like 'Window Attention' which restricts context to
    a fixed window or 'H2O' which prioritizes tokens based on their importance score.
    Utilize the TPU's high memory bandwidth to rapidly swap pages, if necessary, but
    prioritize minimizing such operations. Implement a dedicated KV-cache allocator
    on the TPU to ensure efficient HBM utilization and avoid fragmentation. Consider
    quantizing the KV-cache to INT8 if performance impact is acceptable.
  common_mistake: A common mistake is to ignore the specific HBM capacity and bandwidth
    limitations of the Google TPU v5e, leading to naive KV-cache sizing or inefficient
    eviction policies that cause significant performance degradation. Forgetting that
    KV-cache entries are 2x (key and value) and often stored in FP16/BF16, or not
    accounting for the overhead of the attention heads and hidden dimensions, can
    lead to underestimating memory needs.
  napkin_math: 'For a 7B model (FP16), let''s assume a typical KV-cache structure:
    16 attention heads, 128 hidden dimension per head. Each token stores 2 vectors
    (key and value), each `16 * 128` FP16 values. So, `2 * 16 * 128 * 2 bytes/FP16
    = 8192 bytes/token` for the KV-cache. For a 128k context length, the total KV-cache
    memory required would be `128,000 tokens * 8192 bytes/token = 1,048,576,000 bytes
    = ~1 GB`. This is per sequence. If multiple sequences are processed in parallel,
    say 8, the total KV-cache becomes `8 GB`, which fits into the 16 GB HBM of the
    TPU v5e. However, this calculation is per model copy and doesn''t account for
    model weights (7B FP16 = 14 GB) or other activations, quickly exceeding the 16
    GB HBM. This necessitates either batching optimization (e.g., smaller effective
    batch size or continuous batching) or offloading strategies like KV-cache compression/quantization
    or partial offload to host memory, leveraging the 1.6 TB/s bandwidth for fast
    transfers, if feasible.'
