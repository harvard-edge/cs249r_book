title: 'MLOps Lifecycle: End-to-End MLOps System Design for Production LLM on H100'
scenario: 'Design the complete MLOps system for a production LLM API (13B model, H100
  cluster, 10M requests/day). Include: training pipeline, experiment tracking, model
  registry, A/B testing framework, monitoring, alerting, and auto-rollback. Quantify
  throughput, storage, and cost at each layer. Identify the top 3 failure modes and
  their mitigations.'
question: In the serving capacity model for the 10M-requests/day MLOps system, what
  does the value 57.9 represent?
details:
  realistic_solution: '57.9 represents average concurrent requests in service (Little''s Law: L = \lambda \times W = 115.7 req/s \times 0.5s = 57.9 in service), not the arrival rate.'
  common_mistake: Designing each component independently without specifying the integration
    contracts (schema for model cards, evaluation thresholds for promotion, alert
    thresholds tied to SLA).
  napkin_math: 'Arrival rate \lambda = 10,000,000 / 86,400 = 115.7 req/s. If mean service time W = 500ms (0.5s), then by Little''s Law, L = \lambda \times W = 115.7 \times 0.5 = 57.85 \approx 57.9 concurrent requests in service. This represents the average number of active requests, not the arrival rate. Erlang-C is used to calculate the server count needed to keep P(wait) < 5%.'
