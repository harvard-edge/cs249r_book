title: NIC-Level Traffic Shaping for RDMA Fairness
scenario: On a multi-tenant 256-GPU cluster, two training jobs share the same physical network. Job A uses 128 GPUs for AllReduce and Job B uses 128 GPUs for pipeline-parallel training. Job A's bursty AllReduce traffic starves Job B's latency-sensitive activation transfers.
question: How would you design NIC-level traffic shaping so Job A's AllReduce does not starve Job B's latency-sensitive activation transfers?
details:
  realistic_solution: 'NIC-level traffic shaping: (1) Rate limiting: configure per-QP rate limiters on Job A''s AllReduce QPs. Set max rate = 300Gbps per NIC (75% of 400Gbps), reserving 100Gbps for Job B. (2) Burst control: set maximum burst size to 32KB per QP using the HCA''s token bucket shaper. This converts Job A''s large bursts into a smooth stream, preventing instantaneous incast at switches. (3) Priority mapping: Job A uses SL0 (best effort), Job B uses SL4 (high priority).'
  common_mistake: |
    **The Pitfall:** Applying traffic shaping at the switch level only.
    **The Rationale:** Network engineers default to switch-level QoS (WFQ, strict priority) to manage traffic.
    **The Consequence:** Burst traffic still enters the fabric, filling buffers and causing microbursts before the switch can react, resulting in intermittent starvation.
  napkin_math: |
    1. Analyze unshaped Job A: 400Gbps bursts every 200ms. 400Gbps * 60ms = 3GB instantaneous burst, causing switch buffer overflow.
    2. Design Job A shaped parameters: Rate limit at 300Gbps with 32KB burst.
    3. Analyze shaped Job A: Max instantaneous rate = 300Gbps. Over 60ms, the 2.25GB payload is spread smoothly.
    4. Analyze Job B guarantees: 100Gbps is strictly reserved and always available.
    5. Calculate Job B latency: An 8MB activation transfer takes 8MB / (100Gbps/8) = **640μs**, fitting well within a 2ms pipeline budget.
