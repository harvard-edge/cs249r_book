title: SDC Propagation vs Checksum Trade-off
scenario: You are evaluating the error model for a 500B parameter LLM training job on 8,192 H100 GPUs.
  Hardware telemetry indicates a 0.2% probability of silent data corruption (SDC) in GPU HBM per hour,
  which can propagate as global gradient noise. You must evaluate the trade-off between a strict fail-stop
  model (checksumming every gradient synchronization) versus a relaxed containment model (checksumming
  only periodic checkpoint states). Justify your design based on fault propagation blast radius and the
  900GB/s NVLink bandwidth.
question: "For the 500B job, would you checksum every gradient sync or only checkpoint states, and why?"
details:
  realistic_solution: Adopt a relaxed containment error model. Since neural network training exhibits
    inherent noise tolerance, accept localized gradient SDCs and only checksum the FP32 master weights
    during the infrequent checkpointing phase.
  common_mistake: Assuming that all hardware faults trigger immediate node crashes, and failing to model
    how silent data corruptions statistically propagate into loss spikes rather than hard failures.
  napkin_math: 'Gradient sync size: 500B params * 2 bytes (BF16) = 1TB. At 900GB/s NVLink bandwidth, checksumming
    every sync adds ~1.1 seconds. If the base iteration time is 200ms, this introduces a >500% latency
    overhead. Periodic checksumming every 500 steps reduces this overhead to ~1%.'
