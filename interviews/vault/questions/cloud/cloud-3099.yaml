title: 'TCO Evaluation: H100 vs TPU v5e for Training Cost'
scenario: Compare the training cost for a 7B parameter model (100B token dataset, 4.2 ZFLOPs total compute) on H100 (989 TFLOPS FP16, $2.50/hr) vs TPU v5e (197 TFLOPS BF16, $0.42/hr on GCP). Calculate training time, compute cost, and cost per effective FLOP for each. Assume 40% MFU on both platforms.
question: What is the training time, compute cost, and cost per effective FLOP for H100 vs TPU v5e?
details:
  realistic_solution: 'H100: 989 TFLOPS × 40% MFU = 395.6 effective TFLOPS. Time = 4.2 ZFLOPs / 395.6 TFLOPS = 10.6 million seconds = 2949 hours. Cost = 2949 × $2.50 = $7,372. Cost per effective PFLOP = $2.50 / (395.6 × 3600) = $0.00175. TPU v5e: 197 TFLOPS × 40% MFU = 78.8 effective TFLOPS. Time = 4.2 ZFLOPs / 78.8 TFLOPS = 53.3 million seconds = 14,805 hours. Cost = 14,805 × $0.42 = $6,218. Cost per effective PFLOP = $0.42 / (78.8 × 3600) = $0.00148. TPU v5e is ~15% cheaper but 5x slower per chip.'
  common_mistake: Comparing peak TFLOPS without adjusting for MFU, and using raw rental price without converting to cost-per-effective-TFLOP which is the meaningful metric.
  napkin_math: 'H100 time: 4.2e21 / 395.6e12 / 3600 = 2949 hrs. Cost: 2949 * $2.50 = $7372. TPU time: 4.2e21 / 78.8e12 / 3600 = 14805 hrs. Cost: 14805 * $0.42 = $6218. TPU cost per PFLOP is $0.00148 vs H100 $0.00175.'
