title: Cloud GPU Cluster Auto-Scaling for Power Saving
scenario: An A100 cluster executing an internal batch pipeline experiences 0% load
  between midnight and 6 AM.
question: Apply a Kubernetes orchestrator-level power-management strategy to eliminate
  the 400W idle draw per GPU during these hours.
details:
  realistic_solution: Implement a node pool cluster auto-scaler tied to a cron schedule
    or queue-length metric. At midnight, when the queue hits zero, gracefully drain
    the Kubernetes pods and scale the GPU node pool down to zero, destroying the cloud
    VMs entirely. This drops power from 400W idle to 0W. Scale the pool back up automatically
    just before 6 AM.
  common_mistake: Attempting to use OS-level ACPI sleep states (which fail in passthrough
    VMs) rather than terminating the cloud instance.
  napkin_math: 400 * 6 = 2400Wh
