title: Cloud GPU Cluster Auto-Scaling for Power Saving
scenario: 'An A100 cluster executing an internal batch pipeline experiences 0% load between midnight and 6 AM.'
question: 'What Kubernetes orchestrator-level power-management strategy can eliminate the 400W idle draw per GPU during these hours?'
details:
  realistic_solution: 'Implement a node pool cluster auto-scaler tied to a cron schedule or queue-length metric. At midnight, when the queue hits zero, gracefully drain the Kubernetes pods and scale the GPU node pool down to zero, destroying the cloud VMs entirely. This drops power from 400W idle to 0W. Scale the pool back up automatically just before 6 AM.'
  common_mistake: |
    **The Pitfall:** Attempting to use OS-level ACPI sleep states.
    **The Rationale:** Candidates assume standard hardware sleep states work smoothly, forgetting that these often fail or are unsupported in passthrough cloud VMs.
    **The Consequence:** The nodes remain powered on, continuing to draw significant idle power.
  napkin_math: |
    - **Idle Power:** 400W per GPU.
    - **Idle Duration:** 6 hours (midnight to 6 AM).
    - **Energy Saved:** 400W × 6h = **2400 Wh (2.4 kWh) per GPU per day**.
