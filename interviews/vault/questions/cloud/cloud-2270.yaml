title: The cuDNN Convolution Dispatch
scenario: You profile a ResNet-50 training job and notice that different convolutional layers use different cuDNN algorithms — some use implicit GEMM, others use FFT-based convolution, and one small layer uses direct convolution. You expected cuDNN to use the same algorithm everywhere.
question: "Why does cuDNN select different algorithms for different layers, and what is the primary factor driving this selection?"
details:
  realistic_solution: 'cuDNN selects convolution algorithms based on a combination of input tensor shape, filter size, stride, padding, available GPU workspace memory, and whether deterministic reproducibility is required. Implicit GEMM works well for standard 3x3 convolutions. FFT-based convolution wins for large spatial filters. Direct convolution is used for very small or 1x1 filters where the GEMM reshape overhead exceeds compute. Setting `torch.backends.cudnn.benchmark = True` forces cuDNN to auto-tune by timing each algorithm on the first batch, then caching winners — essential for fixed-shape workloads.'
  common_mistake: |
    **The Pitfall:** Thinking cuDNN always uses the fastest algorithm regardless of context.
    **The Rationale:** In reality, algorithm selection depends on input/filter dimensions, available workspace memory, and whether deterministic mode is required.
    **The Consequence:** Expecting a single algorithm to be optimal everywhere, leading to confusion when profiling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ResNet-50: ~53 convolutional layers.
       - cudnn.benchmark=True benchmarks ~6 algorithms per layer.
    2. **Calculations:**
       - Total timed trials: 53 layers * 6 algorithms = ~318 trials.
       - Auto-tuning overhead: Adds ~30-60 seconds to the first iteration.
       - Throughput improvement: 10-20% faster subsequent iterations.
    3. **Conclusion & Interpretation:**
       - **Result: Algorithmic-Bound Auto-tuning**. The upfront benchmark cost pays for itself within the first epoch via optimal layer-specific algorithm selection.
