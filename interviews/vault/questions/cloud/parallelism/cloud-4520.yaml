title: 1F1B vs GPipe Memory Footprint Analysis
scenario: 'A 65B parameter model is trained on 8 80GB GPUs using pipeline parallelism with 16 microbatches. Each pipeline stage holds ~6 GB of weights and gradients, and a single microbatch''s activation footprint is ~3.5 GB at this layer split. Each GPU has a hard 80 GB VRAM budget shared with optimizer states (~2 GB/stage) and runtime buffers (~4 GB/stage). The team is deciding between GPipe and 1F1B.'
question: Analyze peak per-GPU memory under GPipe and 1F1B given the 80 GB VRAM budget. Determine whether GPipe OOMs while 1F1B fits, and quantify the activation-memory difference numerically.
visual:
  kind: svg
  path: cloud-4520.svg
  alt: Graph showing GPipe memory rising continuously, while 1F1B plateaus early.
  caption: 'Peak Memory: GPipe vs 1F1B active microbatches.'
details:
  realistic_solution: 'GPipe peak per-GPU memory: weights (6) + grads (6) + optimizer (2) + runtime (4) + M*activations (16 * 3.5 = 56) = 74 GB - fits under 80 GB but only barely, and any spike in runtime buffers OOMs. With M=24 microbatches needed to dilute the bubble, GPipe needs 18 + 84 = 102 GB - OOM. 1F1B caps active activations at P = 8 microbatches: 18 + 28 = 46 GB - comfortable. The activation memory differential is (M - P) * 3.5 GB = 28 GB at M=16 P=8. Conclusion: GPipe OOMs at any M >= 18, 1F1B fits up to any M.'
  common_mistake: |
    **The Pitfall:** Treating 1F1B as a pure bubble-reduction technique.
    **The Rationale:** The primary lever of 1F1B is bounding activation memory by the number of pipeline stages (P) rather than the total number of microbatches (M).
    **The Consequence:** Using GPipe and hitting OOMs because the activation memory scales linearly with M.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 GB VRAM limit.
    - Static memory per GPU: weights (6 GB) + grads (6 GB) + optimizer (2 GB) + runtime (4 GB) = 18 GB.
    - Activation memory per microbatch: 3.5 GB.
    - Pipeline stages (P): 8.

    **Calculations:**
    - GPipe peak active microbatches at M=16 is 16.
    - GPipe memory (M=16): 18 GB + (16 * 3.5 GB) = 18 + 56 = 74 GB.
    - GPipe memory at bubble-diluting M=24: 18 GB + (24 * 3.5 GB) = 102 GB (OOM).
    - 1F1B peak active microbatches is capped at P=8.
    - 1F1B memory (any M >= 8): 18 GB + (8 * 3.5 GB) = 18 + 28 = 46 GB.
    - Memory savings at M=16: 74 GB - 46 GB = 28 GB.

    **Conclusion & Interpretation:**
    - **Result: 28 GB Savings (Memory-Bound)**. 1F1B decouples activation memory footprint from the total number of microbatches, allowing the deep microbatching needed to dilute pipeline bubbles without triggering an OOM.
