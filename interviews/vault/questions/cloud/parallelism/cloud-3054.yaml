title: 'Pipeline Parallelism Bubble Overhead Comparison: GPipe vs PipeDream'
scenario: You are comparing GPipe and PipeDream-Flush scheduling on a 4-stage pipeline with micro-batch size m=16. GPipe uses a synchronous flush after each mini-batch, while PipeDream-Flush uses 1F1B ordering.
question: "For a 4-stage pipeline with 16 micro-batches, what are the GPipe and PipeDream-Flush bubble overheads, and which should train a 32B model?"
details:
  realistic_solution: 'GPipe bubble fraction = (4-1)/(16+4-1) = 3/19 ≈ 15.8%. PipeDream-Flush with 1F1B achieves same bubble fraction but with O(p) memory footprint instead of O(m) activations stored. For 32B model across 4 GPUs, PipeDream-Flush is preferred because storing 16 micro-batch activations in GPipe requires ~16x per-stage activation memory.'
  common_mistake: |
    **The Pitfall:** Forgetting the GPipe bubble fraction formula or conflating stage count with device count.
    **The Rationale:** Candidates struggle with pipeline scheduling math and fail to distinguish memory footprint differences between 1F1B and GPipe.
    **The Consequence:** They select a schedule that either OOMs the hardware or severely degrades utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 pipeline stages (p=4), 16 micro-batches (m=16).
       - GPipe memory: O(m). PipeDream-Flush memory: O(p).
       - Per-stage activation footprint = 3.5 GB.
    2. **Calculations:**
       - Bubble fraction (both): (p-1) / (m + p - 1) = 3 / 19 ≈ 15.8%.
       - GPipe peak activation memory: m × 3.5 GB = 16 × 3.5 = 56 GB.
       - PipeDream-Flush peak activation memory: p × 3.5 GB = 4 × 3.5 = 14 GB.
    3. **Conclusion & Interpretation:** **PipeDream-Flush reduces memory from 56 GB to 14 GB while maintaining identical 15.8% bubble overhead. Result: Memory-Capacity-Bound.**
