title: Calculate Pipeline Bubble Overhead for 1F1B Schedule
scenario: You are training a large language model on a GPU cluster. The model is sharded across 8 pipeline stages (p=8) using a standard 1F1B (One-Forward-One-Backward) schedule. Profiling reveals that a single micro-batch takes 50ms for the forward pass and 100ms for the backward pass. You configure the training loop to use 32 micro-batches (m=32) per global batch.
question: What are the total 1F1B pipeline step time and exact bubble overhead percentage for p=8 and m=32?
details:
  realistic_solution: Under the standard balanced-stage 1F1B timing model, each stage performs 32 forward passes and 32 backward passes, plus idle fill/drain time equal to 7 forward slots and 7 backward slots. The useful work is 32 * (50 ms + 100 ms) = 4800 ms. The bubble time is 7 * (50 ms + 100 ms) = 1050 ms, so total step time is 5850 ms and bubble overhead is 1050 / 5850 = 17.95%.
  common_mistake: |
    **The Pitfall:** Miscalculating pipeline bubble overhead by ignoring flush/fill steps.
    **The Rationale:** Candidates calculate total time by multiplying micro-batches by pass times, forgetting the idle time at the start and end of the pipeline.
    **The Consequence:** They underestimate total step time and incorrectly compute bubble fraction using p/m instead of the exact (p-1)/(m+p-1), leading to inaccurate scaling projections.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline stages (p) = 8.
    - Micro-batches (m) = 32.
    - Forward time = 50ms, Backward time = 100ms.

    **Calculations:**
    - Useful stage work = m * (forward + backward) = 32 * (50ms + 100ms) = 4800ms.
    - Pipeline fill bubble = (p - 1) * forward = 7 * 50ms = 350ms.
    - Pipeline drain bubble = (p - 1) * backward = 7 * 100ms = 700ms.
    - Total bubble time = 350ms + 700ms = 1050ms.
    - Total 1F1B step time = 4800ms + 1050ms = 5850ms.
    - Bubble overhead = 1050 / 5850 = 17.95%.

    **Conclusion & Interpretation:**
    - **Result: 5850ms total step time and 17.95% bubble overhead** under a balanced-stage timing model with no extra communication or scheduling stalls.
