title: Data-Parallel Scaling Across NVLink and InfiniBand
scenario: You benchmark a 3B model training on A100 GPUs. Going from 1 to 8 GPUs (single node, NVLink) gives a 7.2x speedup — nearly linear. Going from 8 to 64 GPUs (8 nodes, InfiniBand 400 Gbps) gives only 5.2x speedup instead of 8x due to communication overhead.
question: What explains the sub-linear scaling when the job expands from one NVLink node to eight InfiniBand-connected nodes?
details:
  realistic_solution: |
    The scaling drops because the communication path changes from a single NVLink domain to cross-node gradient synchronization over InfiniBand. With the same per-GPU batch size, each GPU still does about the same compute, but every step now includes a much slower inter-node AllReduce phase. The 8-to-64 GPU speedup of 5.2x instead of 8x implies the 64-GPU step is about 54% slower than an ideal weak-scaling step. Hierarchical AllReduce helps by reducing within each node over NVLink first, then exchanging only the reduced chunks across InfiniBand.
  common_mistake: |
    **The Pitfall:** Assuming sub-linear scaling purely means the network bandwidth needs to be upgraded.
    **The Rationale:** Engineers often misdiagnose bandwidth as the sole culprit, forgetting that latency and the shifting communication-to-computation ratio are the fundamental drivers as node counts increase.
    **The Consequence:** Millions are spent upgrading InfiniBand tiers when algorithmic changes (like gradient accumulation, hierarchical collectives, or larger batch sizes) are actually required to mask the latency bounds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters (6 GB gradients in FP16).
    - Compute per step per GPU: ~200 ms.
    - 8 GPUs (single NVLink node): effective ring bandwidth ~450 GB/s.
    - 64 GPUs (8 nodes): observed 8-to-64 throughput gain is 5.2x, not the ideal 8x.

    **Calculations:**
    - 8-GPU NVLink ring AllReduce traffic per GPU: 2 * 6 GB * (7/8) = 10.5 GB.
    - 8-GPU NVLink AllReduce time: 10.5 GB / 450 GB/s = 23.3 ms.
    - 8-GPU step time: 200 ms + 23.3 ms = 223.3 ms, matching about 200 / 223.3 = 89.6% scaling efficiency.
    - Ideal 64-GPU weak-scaling throughput would be 8x the 8-GPU throughput.
    - Observed 64-GPU step time implied by a 5.2x gain: 223.3 ms * (8 / 5.2) = 343.5 ms.
    - Implied 64-GPU communication and synchronization overhead: 343.5 ms - 200 ms = 143.5 ms.

    **Conclusion & Interpretation:**
    - **Result: Inter-node communication-bound.** The extra ~120 ms versus the 8-GPU case comes from leaving the NVLink domain and paying slower InfiniBand collective overhead. The given measurements support sub-linear scaling, but not a precise "adding GPUs hurts" threshold without more measurements or a scaling model.
