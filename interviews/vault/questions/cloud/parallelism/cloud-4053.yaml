title: Gradient Synchronization Under Stragglers
scenario: 'In a 1024-GPU synchronous training job, 3 GPUs finish their backward pass 15ms later than the rest. Iterations take 200ms.'
question: 'How many GPU-hours are wasted over 24 hours, and how would you mitigate this without hurting gradient quality?'
details:
  realistic_solution: '15ms straggler delay forces 1021 GPUs to wait at the AllReduce barrier. Mitigations: Bounded staleness (BSP) allowing tau=1 staleness, gradient predicting via momentum buffers, or simply hardware replacement.'
  common_mistake: |
    **The Pitfall:** Accepting the straggler penalty as unavoidable.
    **The Rationale:** Candidates assume AllReduce barriers cannot be optimized or bypassed.
    **The Consequence:** Wasting thousands of dollars daily instead of isolating faulty hardware or applying BSP.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs, 200ms iteration, 15ms wait.
    
    **Calculations:**
    - Idle GPUs per step: 1024 * (15 / 200) = 76.8.
    - Wasted Time: 76.8 GPUs * 24 hours = 1,843.2 GPU-hours/day.
    
    **Conclusion & Interpretation:**
    - **Result: 1,843 GPU-hours wasted daily (Sync-Bound)**. Strict barrier completely amplifies minor local delays into massive global waste.
