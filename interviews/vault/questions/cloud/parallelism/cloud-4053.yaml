title: Gradient Synchronization Under Stragglers
scenario: In a 1024-GPU synchronous training job, 3 GPUs finish their backward pass 15ms later than the rest. Iterations take 200ms.
question: How many GPU-hours are wasted over 24 hours, and how would you mitigate this without hurting gradient quality?
details:
  realistic_solution: 'The 3 late GPUs make the other 1021 GPUs wait 15ms at every synchronous barrier. Over 24 hours, that wastes 1021 × (15ms/200ms) × 24 = 1,837.8 GPU-hours. To preserve gradient quality, keep synchronous semantics and remove or mask the stragglers: isolate the slow GPUs, replace bad hardware, improve the slow network path or AllReduce placement, or use speculative backup/redundant execution and take the first correct gradient result. Avoid bounded staleness if the requirement is not to change gradient semantics.'
  common_mistake: |
    **The Pitfall:** Accepting the straggler penalty as unavoidable.
    **The Rationale:** Candidates assume AllReduce barriers cannot be optimized or bypassed.
    **The Consequence:** Wasting thousands of dollars daily instead of isolating faulty hardware or applying BSP.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs, 3 stragglers, 200ms iteration, 15ms wait for non-stragglers.

    **Calculations:**
    - Waiting GPUs per step: 1024 - 3 = 1021.
    - Wasted GPU-hours: 1021 × (15ms / 200ms) × 24h = 1,837.8 GPU-hours/day.

    **Conclusion & Interpretation:**
    - **Result: 1,837.8 GPU-hours wasted daily (Sync-Bound).** Mitigate by preserving synchronous gradients while isolating, replacing, or redundantly masking the stragglers.
