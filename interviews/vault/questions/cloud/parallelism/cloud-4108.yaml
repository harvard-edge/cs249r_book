title: 405B Training Parallelism Layout
scenario: A team is planning the training of a 405B parameter model on 128 GPUs across 16 nodes. Assume 8 GPUs per node, 192 GB per GPU, 1.3 PFLOP/s BF16 peak per GPU, and a 45% MFU target.
question: What TP, PP, and DP layout would you design for 405B training on 128 GPUs, and what throughput should you expect?
details:
  realistic_solution: 'A practical layout is TP=8, PP=4, DP=4. TP=8 stays inside each 8-GPU node for fast tensor-parallel attention/MLP collectives and aligns with common hidden-size/head partitioning. PP=4 shards the 405B model across four pipeline stages without making the pipeline bubble as large as PP=8, and DP=4 gives four full pipeline replicas: 8 × 4 × 4 = 128 GPUs. Per GPU, the parameter shard is 405B / (TP × PP) = 405B / 32 = 12.66B parameters. With BF16 weights and BF16 gradients, weights + gradients are 12.66B × 4B = 50.6 GB. AdamW states are 12B/param before data-parallel sharding; ZeRO-1 shards those optimizer states only across the DP=4 replicas, while weights/gradients remain replicated across DP and sharded by TP/PP, so optimizer state is 12.66B × 12B / 4 = 38.0 GB per GPU. Total local weights + gradients + ZeRO-1 optimizer state is about 88.6 GB, leaving room on 192 GB GPUs for activations with checkpointing. A pure compute upper bound is 128 × 1.3 PFLOP/s × 45% / (6 × 405B)
    ≈ 30.8K tokens/s. Real delivered throughput will be lower after pipeline bubbles, TP/DP communication, recompute, dataloader effects, and sequence-length-dependent attention work.'
  common_mistake: |
    **The Pitfall:** Attempting to use a single parallelism strategy for a massive model.
    **The Rationale:** Candidates fail to multiply the parameter count by the optimizer state overhead, wrongly assuming standard Data Parallelism or simple Tensor Parallelism will suffice.
    **The Consequence:** Massive Out-Of-Memory errors because the 6.48 TB model state mathematically cannot fit on a single 1.5 TB node.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 405B params.
    - GPUs: 128, 8 per node, 192 GB capacity each.
    - BF16 weights and gradients, AdamW states at 12B/param, ZeRO-1 across DP.
    - Peak BF16: 1.3 PFLOP/s per GPU, target MFU: 45%.

    **Calculations:**
    - Layout: TP=8, PP=4, DP=4 = 128 GPUs.
    - Per-GPU params: 405B / 32 = 12.66B.
    - Weights + gradients: 12.66B × 4B = 50.6 GB.
    - ZeRO-1 AdamW states: 12.66B × 12B / 4 = 38.0 GB.
    - Local training state: 50.6 GB + 38.0 GB = 88.6 GB < 192 GB.
    - Effective compute: 128 × 1.3 PFLOP/s × 0.45 = 74.9 PFLOP/s.
    - Training FLOPs/token: 6 × 405B = 2.43e12 FLOPs/token.
    - Compute-bound tokens/s: 74.9e15 / 2.43e12 ≈ 30.8K tokens/s.
    - Pipeline bubble factor is approximately microbatches / (microbatches + PP - 1). With 16 microbatches and PP=4, that is 16 / 19 = 0.84 before communication/recompute losses.
    - Bubble-adjusted upper bound: 30.8K * 0.84 ≈ 25.9K tokens/s, still before TP/DP communication, activation recompute, dataloader overhead, and attention sequence-length effects.

    **Conclusion & Interpretation:**
    - **Result: TP=8, PP=4, DP=4 with ZeRO-1.** The layout fits the stated 192 GB GPUs. About 31K tokens/s is a compute-only ceiling; a more honest planning range starts below about 26K tokens/s after pipeline bubbles and then depends on communication and recompute overhead.
