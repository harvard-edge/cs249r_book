title: TP + Pipeline Parallelism Interaction
scenario: A team is planning the training of a 405B parameter model on 128 GPUs across 16 nodes. Assume 8 GPUs per node, 192 GB per GPU, 1.3 PFLOP/s BF16 peak per GPU, and a 45% MFU target.
question: What TP, PP, and DP layout would you design for 405B training on 128 GPUs, and what throughput should you expect?
details:
  realistic_solution: 'A practical layout is TP=8, PP=4, DP=4. TP=8 stays inside each 8-GPU node for fast tensor-parallel collectives. PP=4 shards the 405B model across four pipeline stages, and DP=4 gives four full pipeline replicas: 8 × 4 × 4 = 128 GPUs. Per GPU, the parameter shard is 405B / (TP × PP) = 405B / 32 = 12.66B parameters. With BF16 weights and BF16 gradients, weights + gradients are 12.66B × 4B = 50.6 GB. AdamW states are 12B/param before data-parallel sharding, so ZeRO-1 over DP=4 makes optimizer state 12.66B × 12B / 4 = 38.0 GB. Total local weights + gradients + ZeRO-1 optimizer state is about 88.6 GB, leaving room on 192 GB GPUs for activations with checkpointing. Throughput estimate: 128 × 1.3 PFLOP/s × 45% = 74.9 PFLOP/s effective. Training FLOPs per token are roughly 6 × 405B = 2.43e12 FLOPs/token, so expected throughput is 74.9e15 / 2.43e12 ≈ 30.8K tokens/s before pipeline bubbles and dataloader overhead.'
  common_mistake: |
    **The Pitfall:** Attempting to use a single parallelism strategy for a massive model.
    **The Rationale:** Candidates fail to multiply the parameter count by the optimizer state overhead, wrongly assuming standard Data Parallelism or simple Tensor Parallelism will suffice.
    **The Consequence:** Massive Out-Of-Memory errors because the 6.48 TB model state mathematically cannot fit on a single 1.5 TB node.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 405B params.
    - GPUs: 128, 8 per node, 192 GB capacity each.
    - BF16 weights and gradients, AdamW states at 12B/param, ZeRO-1 across DP.
    - Peak BF16: 1.3 PFLOP/s per GPU, target MFU: 45%.

    **Calculations:**
    - Layout: TP=8, PP=4, DP=4 = 128 GPUs.
    - Per-GPU params: 405B / 32 = 12.66B.
    - Weights + gradients: 12.66B × 4B = 50.6 GB.
    - ZeRO-1 AdamW states: 12.66B × 12B / 4 = 38.0 GB.
    - Local training state: 50.6 GB + 38.0 GB = 88.6 GB < 192 GB.
    - Effective compute: 128 × 1.3 PFLOP/s × 0.45 = 74.9 PFLOP/s.
    - Training FLOPs/token: 6 × 405B = 2.43e12 FLOPs/token.
    - Tokens/s: 74.9e15 / 2.43e12 ≈ 30.8K tokens/s.

    **Conclusion & Interpretation:**
    - **Result: TP=8, PP=4, DP=4 with ZeRO-1.** The layout fits the stated 192 GB GPUs and gives a rough compute-bound estimate of about 31K tokens/s before pipeline and input overheads.
