title: TP + Pipeline Parallelism Interaction
scenario: A team is planning the training of a 405B parameter model on 128 GPUs across 16 nodes.
question: What TP, PP, and DP layout would you design for 405B training on 128 GPUs, and what throughput should you expect?
details:
  realistic_solution: 'Model memory: 405B * 16B (AdamW mixed precision) = 6.48 TB. Per-node memory: 8 * 192 GB = 1.536 TB. Need at least 6.48/1.536 = 5 nodes for parameters alone. Layout: TP=8 (intra-node), PP=4 (126 layers / 4 = ~32 layers per stage, across 4 nodes), DP=4 (4 pipeline replicas across remaining nodes). Total GPUs: 8 * 4 * 4 = 128. Memory per GPU: 405B / (8*4) * 16B = 405B/32 * 16B ~ 202.5 GB. MI300X has 192 GB -> tight! Enable ZeRO Stage 1 to partition optimizer states across DP=4: optimizer memory per GPU drops from 12.66B * 12B = 152 GB to 152/4 = 38 GB. Weight + gradient: 12.66B * 4B = 50.6 GB. Total per GPU: 38 + 50.6 = 88.6 GB. Activations + KV cache fit in remaining 103.4 GB with activation checkpointing. Throughput estimate: MI300X BF16 peak ~ 1.3 PFLOPS. At 45% MFU: 128 * 1300 * 0.45 = 74.9 PFLOPS effective. Tokens per second: 74,900 / 2.43 = 30,823 tokens/s.'
  common_mistake: |
    **The Pitfall:** Attempting to use a single parallelism strategy for a massive model.
    **The Rationale:** Candidates fail to multiply the parameter count by the optimizer state overhead, wrongly assuming standard Data Parallelism or simple Tensor Parallelism will suffice.
    **The Consequence:** Massive Out-Of-Memory errors because the 6.48 TB model state mathematically cannot fit on a single 1.5 TB node.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 405B params. Optimizer: AdamW mixed (16B/param).
    - GPUs: 128 (192 GB capacity each).

    **Calculations:**
    - Model memory: 405B * 16B = 6.48 TB.
    - Layout: TP=8, PP=4, DP=4 = 128 GPUs.
    - Per-GPU params: 405B / 32 = 12.66B.
    - With ZeRO-1: State partitioned by DP=4. 88.6 GB/GPU < 192 GB.

    **Conclusion & Interpretation:**
    - **Result: ~31K tokens/s (Memory Capacity-Bound)**. This 3D parallelism layout yields ~31K tokens/s while safely fitting within memory.
