title: 'Pipeline Parallelism Specification: Inter-Stage Communication Budget'
scenario: 'Design the inter-stage communication schedule for a 16-stage H100 pipeline (80GB HBM3, 400Gb/s InfiniBand between nodes) training a 1T parameter model. Each stage boundary must transfer activations and gradients. Assume sequence length 4096, global batch size 512, and micro-batch size 4.'
question: 'For a 16-stage H100 pipeline training a 1T model, what activation and gradient volume crosses each stage boundary and is 400Gb/s InfiniBand sufficient?'
details:
  realistic_solution: 'Hidden dim for 1T model: ~16384. Activation tensor per micro-batch: 16384 * 4096 * 4 (micro-batch) * 2 bytes = 537MB. Gradient tensor (same shape): 537MB. Each stage boundary transfers 537MB forward + 537MB backward = 1.07GB per micro-batch. With m = 512/4 = 128 micro-batches: 128 * 1.07GB = 137GB per stage boundary per step. Step time target: ~1 second. Required bandwidth: 137GB/s per boundary. 400Gb/s IB = 50GB/s. Massively insufficient — need NVLink topology or split communication across multiple IB links.'
  common_mistake: |
    **The Pitfall:** Confusing one-way activation transfer with bidirectional requirements, or forgetting the global batch size multiplier.
    **The Rationale:** Candidates often calculate the size of a single micro-batch forward pass and forget that the backward pass must send gradients upstream, and that this happens for every micro-batch in the step.
    **The Consequence:** Under-provisioning the inter-node network bandwidth by over 200x, leading to a catastrophic network bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1T model hidden dim: ~16,384
    - Sequence length: 4,096, Micro-batch size: 4
    - Precision: FP16 (2 bytes)
    - InfiniBand bandwidth: 400 Gb/s = 50 GB/s

    **Calculations:**
    - Activation per Micro-batch = 16,384 * 4,096 * 4 * 2 bytes = 537 MB
    - Bidirectional Transfer = 537 MB forward + 537 MB backward = 1.07 GB
    - Total per Step = 128 micro-batches * 1.07 GB = 137 GB per boundary
    - Transfer Time = 137 GB / 50 GB/s = 2.74 seconds

    **Conclusion & Interpretation:**
    - **Result: 2.74s (Bandwidth-Bound)**. If the target step time is ~1s, 400 Gb/s IB is massively insufficient; NVLink or a hierarchical communication strategy is required.
