title: H100 TMA (Tensor Memory Accelerator) for Async Memory Loads
scenario: 'Modern GPUs introduce a Tensor Memory Accelerator (TMA), a hardware unit that asynchronously loads multi-dimensional tensor tiles from HBM to shared memory without occupying compute threads.'
question: How does H100 TMA improve compute-memory overlap compared with A100's cooperative shared-memory loads?
details:
  realistic_solution: 'A100 shared memory load: (1) Each thread in a warp computes its load address (index calculations). (2) Threads issue individual load instructions. (3) __syncthreads() to ensure all loads complete. (4) Compute on shared memory data. This burns SM registers and cycles on address computation and synchronization. H100 TMA: (1) Program a TMA descriptor (base pointer, shape, stride) once. (2) Issue a single tma.load instruction that loads an entire 2D/3D/4D tile asynchronously. (3) TMA hardware handles address generation, coalescing, and barrier signaling. (4) Threads are free to compute on previously loaded data while TMA loads the next tile. Result: TMA achieves near-perfect overlap because no thread resources are consumed during loads. In practice, TMA-enabled GEMM kernels achieve 85-95% of peak TFLOPS vs 70-85% without TMA.'
  common_mistake: |
    **The Pitfall:** Treating TMA as just a faster DMA engine.
    **The Rationale:** TMA's key innovation is not speed but the elimination of address computation and thread synchronization overhead that previous architectures required for shared memory loads.
    **The Consequence:** Underutilizing TMA by manually calculating indices in compute threads instead of letting the hardware handle it.
  napkin_math: |
    **Assumptions & Constraints:**
    - Older GPU architectures (e.g., A100) consume compute threads for shared memory load index calculations and synchronization.
    - H100 TMA unloads this to dedicated hardware asynchronously.
    - Baseline SM cycle overhead for manual loads is ~30%.

    **Calculations:**
    - TMA descriptor setup overhead is ~5%.
    - Net compute efficiency gain = 30% - 5% = 25 percentage points.
    - For a 1000 TFLOPS theoretical peak GPU, a 25% efficiency gain equates to 250 TFLOPS of compute reclaimed.

    **Conclusion & Interpretation:**
    - **Result: +25% Efficiency Gain (Compute-Bound)**. TMA converts shared memory loading from an active SM compute task into a background hardware DMA operation, dramatically increasing achievable MFU.
