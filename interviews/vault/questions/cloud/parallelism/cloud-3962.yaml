title: Overlap-Aware Job Scheduling on Shared GPU Clusters
scenario: Your GPU cluster runs multiple DDP training jobs. Job A (8 GPUs, 200ms backward, 100ms AllReduce) and Job B (8 GPUs, 50ms backward, 100ms AllReduce) share the same InfiniBand fabric. When both run simultaneously, Job A's AllReduce time jumps to 180ms because of fabric contention. Job A's overlap breaks.
question: Which cluster scheduling policies would protect Job A's overlap when Job B causes InfiniBand contention?
details:
  realistic_solution: 'Network-aware scheduling: (1) Topology-aware placement: assign jobs to GPU groups that share dedicated IB switches (locality). Job A on switches 1-2, Job B on switches 3-4. No contention. (2) Time-division multiplexing: schedule communication-heavy jobs to stagger their AllReduce phases. If Job A''s AllReduce is at t=200ms and Job B''s at t=50ms, they naturally stagger. (3) Network isolation: use IB partitioning (PKeys) to guarantee bandwidth per job. (4) Priority-based QoS: mark Job A''s NCCL traffic as high-priority in IB''s SL-to-VL mapping. (5) Evaluation: topology-aware placement is simplest and most effective — it eliminates contention with zero runtime overhead. Modern schedulers (Slurm + topology plugin, Kubernetes + network topology awareness) support this.'
  common_mistake: |
    **The Pitfall:** Scheduling jobs purely based on GPU availability without considering network topology.
    **The Rationale:** Schedulers that are unaware of the underlying fabric will bin-pack jobs onto any available nodes, forcing distinct training jobs to compete across the same congested switches.
    **The Consequence:** Two communication-heavy jobs sharing the same IB switches will reliably destroy each other's overlap efficiency, massively bloating step times.
  napkin_math: |
    - **Uncontended Overlap:** 200ms backward, 100ms AllReduce. Due to reverse-layer bucketing, only the last ~100ms overlaps cleanly.
    - **Contended AllReduce:** Jumps from 100ms to 180ms.
    - **Exposed Latency:** 180ms AllReduce - 100ms Overlap Window = 80ms exposed.
    - **New Step Time:** 200ms (backward) + 80ms (exposed network) = 280ms/step.
    - **Contention Cost:** 80ms/step represents a **40% throughput loss**, wasting ~9.6 hours on a 24-hour job.
