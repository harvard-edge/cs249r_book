title: NVIDIA H100 Multi-tenancy with MIG for Resource Sharing
scenario: 'A data science team is deploying various deep learning models for training and inference on a cluster equipped with GPUs. Multiple users and services need to share these powerful resources concurrently.'
question: 'How does MIG on a GPU enable multi-tenant GPU sharing, and what resource guarantees and isolation does each instance provide?'
details:
  realistic_solution: 'The GPU''s MIG capability allows a single GPU to be securely partitioned into up to seven fully independent GPU instances. Each MIG instance has dedicated, isolated resources including streaming multiprocessors (SMs), GPU engines (copy engines, decoders), L2 cache, and a portion of the HBM memory. This hardware-level partitioning ensures quality of service (QoS), fault isolation, and predictable performance for each tenant. Workloads can be scheduled directly onto these specific MIG devices, similar to scheduling on discrete GPUs, facilitating robust multi-tenancy.'
  common_mistake: |
    **The Pitfall:** Assuming software-level virtualization provides the same isolation as hardware MIG.
    **The Rationale:** Candidates confuse process isolation with strict hardware-level partitioning of memory bandwidth and SMs.
    **The Consequence:** Unpredictable latency and performance contention for co-located workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Capacity: 80 GiB HBM, 989 TFLOPS, 700W TDP.
    - 7 MIG instances.

    **Calculations:**
    - Memory per instance: 80 GiB / 7 = ~11.4 GiB.
    - Compute per instance: 989 TFLOPS / 7 = ~141 TFLOPS.
    - Power per instance: 700W / 7 = ~100W.

    **Conclusion & Interpretation:**
    - **Result: Each MIG instance receives a physically isolated slice of hardware (Resource-Bound)**.
