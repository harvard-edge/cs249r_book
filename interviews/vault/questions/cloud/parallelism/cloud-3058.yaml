title: 'Pipeline Parallelism Optimization: Diagnosing Bubble Waste and Fixing'
scenario: A distributed training job on 16 GPUs using 8-stage pipeline parallelism shows GPU utilization averaging 71% in profiling traces. The configuration uses m=8 micro-batches and synchronous GPipe scheduling.
question: Why is the 8-stage GPipe job with m=8 only 71% utilized, and how much would 1F1B with m=64 improve utilization?
details:
  realistic_solution: 'With 1F1B and m=64, the bubble reduces drastically. Expected utilization improvement: from ~71% to ~88-90% (the remainder being memory bandwidth and kernel launch overhead).'
  common_mistake: |
    **The Pitfall:** Attributing all GPU idle time exclusively to the pipeline bubble.
    **The Rationale:** Engineers calculate the theoretical bubble and assume it perfectly matches the observed utilization gap.
    **The Consequence:** Missing other inefficiencies like load imbalance or communication overhead, resulting in suboptimal scaling even after fixing the schedule.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPipe config: p=8 stages, m=8 micro-batches.
       - 1F1B config: p=8 stages, m=64 micro-batches.
       - Measured utilization: 71%.
    2. **Calculations:**
       - GPipe bubble fraction = (p - 1) / (p + m - 1) = 7 / 15 = 46.7%.
       - Theoretical GPipe util = 100% - 46.7% = 53.3% (Measured 71% means compute overlaps with setup).
       - 1F1B bubble fraction = (p - 1) / (p + m - 1) = 7 / (8 + 64 - 1) = 7 / 71 = 9.9%.
       - Bubble reduction = 46.7% - 9.9% = 36.8%.
       - Expected util ≈ 71% + (36.8% * (71 / 53.3)) ≈ 89%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Switching to 1F1B with m=64 reduces the pipeline bubble significantly, pushing utilization from 71% to ~89%.
