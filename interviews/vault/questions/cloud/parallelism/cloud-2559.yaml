title: Cloud Fully Sharded Data Parallel L3 0
scenario: You are training a 20B parameter model using FSDP on 16 GPUs with NVLink (450 GB/s bisection). Each training step requires an all-gather of full parameters for forward and backward passes.
question: For a 20B model with FSDP on 16 GPUs over 450 GB/s NVLink, what is the per-step communication overhead?
details:
  realistic_solution: 'Model size in FP16: 20B * 2 bytes = 40 GB. FSDP requires two all-gathers (forward + backward) and one reduce-scatter for gradients. Total data moved per step = 3 * 40 GB = 120 GB. Transfer time = 120 GB / 450 GB/s = 0.27 seconds. If compute is ~2 seconds, communication overhead is ~12% without ZeRO-3 communication overlap.'
  common_mistake: |
    **The Pitfall:** Forgetting that FSDP requires parameter communication for both the forward and backward passes.
    **The Rationale:** Engineers used to DDP are accustomed to communicating only gradients during the backward pass, missing the extra parameter all-gather required before the forward pass in FSDP.
    **The Consequence:** Communication overhead estimates are drastically undercalculated, leading to inaccurate training time projections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 20B parameters (FP16 = 2 bytes).
       - Bandwidth: 450 GB/s.
       - FSDP Overhead: 2x All-Gather, 1x Reduce-Scatter.
    2. **Calculations:**
       - Model size = 20B * 2 = 40 GB.
       - Total data moved = 3 * 40 GB = 120 GB.
       - Time on NVLink = 120 GB / 450 GB/s = 0.27s.
    3. **Conclusion & Interpretation:**
       - **Result: 0.27s overhead per step.** (Network-Bound)
