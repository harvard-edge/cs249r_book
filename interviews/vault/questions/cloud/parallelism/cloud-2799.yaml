title: Privacy-Preserving Cross-Tenant Data-Parallel Aggregation
scenario: A privacy-preserving cross-tenant data-parallel training system must be architected for a 70B language model across three cloud regions, each with a pod of 64 H100 GPUs. Tenants will not share raw gradients in plaintext. Inter-region WAN is 200 Gbps.
question: How would you architect privacy-preserving 3-region data-parallel aggregation for a 70B model on 192 H100s with secure cross-region averaging?
details:
  realistic_solution: Use hierarchical AllReduce with a secure-aggregation outer step. The 70B model has one 140 GB FP16 gradient vector per global training step; each region first reduces its 64 local GPU contributions into that same 140 GB regional aggregate. Compress each regional aggregate with PowerSGD rank-8 to about 14 GB, then secret-share the compressed payload into two additive shares sent to the other regional aggregators. The three aggregators sum shares, reconstruct only the global compressed average, broadcast it back inside their local pods, and never expose another tenant's plaintext gradient. Pipeline buckets as soon as local reduce-scatter buckets complete; with three regions, each aggregator sends 28 GB total outbound WAN traffic over its stated 200 Gbps WAN budget.
  common_mistake: |
    **The Pitfall:** Treating this as edge federated learning and reaching for LoRA + quantized adapters, or running secure aggregation on the uncompressed 140 GB gradient.
    **The Rationale:** Candidates miss the core bottleneck (WAN bandwidth) and apply edge-device memory constraints instead, or fail to compress before applying expensive MPC protocols.
    **The Consequence:** Starving the GPUs of compute because the uncompressed WAN transfer would take 5.6s per step.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters, so one FP16 full-model gradient vector is 70B * 2 bytes = 140 GB.
    - Each region has 64 GPUs that locally aggregate their tenant gradients into one 140 GB regional update for the global step.
    - Compression: PowerSGD rank-8 reduces each regional update by about 10x, from 140 GB to ~14 GB.
    - WAN Bandwidth: 200 Gbps (25 GB/s).

    **Calculations:**
    - Intra-region traffic stays inside the pod using NCCL reduce-scatter/all-reduce; it is separate from the WAN secure-aggregation boundary.
    - Cross-region plaintext-equivalent payload per regional update before secret sharing: 140 GB * 0.10 ≈ 14 GB compressed.
    - Secret-share overhead: each region sends two additive shares of that compressed payload, one to each remote region.
    - Cross-region outbound payload per aggregator: 2 * 14 GB = 28 GB.
    - Transfer time using the stated single 200 Gbps WAN budget: 28 GB / 25 GB/s ≈ 1.12 s per aggregator.

    **Conclusion & Interpretation:**
    - **Result: about 1.12s Cross-Region Secure Aggregation (WAN-Bound).** The architecture must bucket and overlap the secure aggregation with backward computation, but a synchronous global average still waits for the three regional aggregates for the current step.
