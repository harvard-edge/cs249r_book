title: Privacy-Preserving Cross-Tenant Data-Parallel Aggregation
scenario: A privacy-preserving cross-tenant data-parallel training system must be architected for a 70B language model across three cloud regions, each with a pod of 64 H100 GPUs. Tenants will not share raw gradients in plaintext. Inter-region WAN is 200 Gbps.
question: How would you architect privacy-preserving 3-region data-parallel aggregation for a 70B model on 192 H100s with secure cross-region averaging?
details:
  realistic_solution: Use hierarchical AllReduce with a secure-aggregation outer step. Inside each pod, run NCCL reduce-scatter/all-reduce over NVLink and local IB so each region produces one 140 GB FP16 aggregate update. Compress that regional update with PowerSGD rank-8 to about 14 GB, then have each regional aggregator secret-share the compressed update to the other two aggregators. The three aggregators sum shares, reconstruct only the global compressed average, broadcast it back inside their local pods, and never expose another tenant's plaintext gradient. Pipeline buckets as soon as local reduce-scatter buckets complete; with three regions, each aggregator sends 2 shares of the 14 GB compressed update over the WAN, so the exposed cross-region step is planned around that payload rather than an unspecified partial tensor.
  common_mistake: |
    **The Pitfall:** Treating this as edge federated learning and reaching for LoRA + quantized adapters, or running secure aggregation on the uncompressed 140 GB gradient.
    **The Rationale:** Candidates miss the core bottleneck (WAN bandwidth) and apply edge-device memory constraints instead, or fail to compress before applying expensive MPC protocols.
    **The Consequence:** Starving the GPUs of compute because the uncompressed WAN transfer would take 5.6s per step.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters, FP16 gradients (2 bytes per param = 140 GB per region).
    - Compression: PowerSGD rank-8 (compresses 140 GB to ~14 GB).
    - WAN Bandwidth: 200 Gbps (25 GB/s).

    **Calculations:**
    - Cross-Region Payload per Aggregator: each region sends one 14 GB compressed update as two additive shares, one to each remote region, so outbound WAN traffic is 2 * 14 GB = 28 GB.
    - Transfer Time: 28 GB / 25 GB/s ≈ 1.12 s per aggregator if the two WAN sends share the 200 Gbps link. With two independent 200 Gbps egress paths, the wall-clock send time is 14 GB / 25 GB/s ≈ 0.56 s.

    **Conclusion & Interpretation:**
    - **Result: 0.56-1.12s Cross-Region Secure Aggregation (WAN-Bound).** The architecture must bucket and overlap the secure aggregation with backward computation, but a synchronous global average still waits for the three regional aggregates for the current step.
