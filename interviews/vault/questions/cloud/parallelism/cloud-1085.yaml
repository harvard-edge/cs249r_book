title: Ring-AllReduce Communication Overhead Calculation
scenario: 'You are training a 2 Billion parameter dense Transformer using Distributed Data Parallel (DDP) across 16 GPUs. Gradients are cast to FP16 before synchronization. The nodes are connected via a dedicated 50 GB/s bidirectional network.'
question: 'Assuming a standard Ring-AllReduce implementation and no compute overlap, what is the exact network communication time per step?'
details:
  realistic_solution: 'Determine the gradient payload size (4 GB for FP16), apply the Ring-AllReduce data transfer formula (2 * (N-1)/N * Payload), and divide by the available bandwidth to calculate the 150ms communication time.'
  common_mistake: |
    **The Pitfall:** Assuming the data transferred is simply 1x or 2x the payload size without accounting for the N scaling factor.
    **The Rationale:** Candidates forget the exact 2 * (N-1)/N data transfer formula for Ring-AllReduce, or they confuse Gigabytes (GB) with Gigabits (Gb).
    **The Consequence:** Calculation errors lead to incorrect network bottleneck assessments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 2 Billion parameters in FP16 (2 bytes/param).
       - Cluster: 16 GPUs. Bidirectional Network: 50 GB/s.
    2. **Calculations:**
       - Payload (S) = 2e9 * 2 bytes = 4 GB.
       - Ring-AllReduce Data Transfer = 2 * ((N-1)/N) * S = 2 * (15/16) * 4 GB = 7.5 GB.
       - Communication Time = 7.5 GB / 50 GB/s = 0.15s = 150 ms.
    3. **Conclusion & Interpretation:** **Result: Network-Bound**. The Ring-AllReduce communication time per step is exactly 150 ms, requiring sufficient compute overlap to hide.
