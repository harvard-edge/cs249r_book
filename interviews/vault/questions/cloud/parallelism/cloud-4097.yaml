title: Backward Pass Communication in TP
scenario: In the forward pass of Megatron's fused column->row design, an AllReduce follows the row-parallel layer.
question: In Megatron's fused column->row block, what TP communications occur in backward, and what are the per-block and full-step volumes?
details:
  realistic_solution: 'Forward: Identity (replicate input) -> Column-parallel GEMM -> Row-parallel GEMM -> AllReduce (sum partials). Backward (reverse order): AllReduce backward = Identity (gradients pass through unchanged). Row-parallel backward: local gradient GEMM yields a column-partitioned gradient with NO communication. Column-parallel backward: local gradient GEMM yields partial full-sized gradients. The gradient of the Identity (input replication) is AllReduce, which sums these partial gradients from all ranks. So the backward pass has exactly 1 AllReduce before the column-parallel input. For one fused column->row pair, the full training step has 2 AllReduces: 1 forward and 1 backward. For a transformer block with both Attention and MLP pairs, use 4 AllReduces per block. Communication volume per AllReduce = 2 × (P-1)/P × batch × seq × hidden × 2B.'
  common_mistake: |
    **The Pitfall:** Assuming backward communication mirrors forward exactly.
    **The Rationale:** It intuitively makes sense that operations reverse symmetrically in the backward pass.
    **The Consequence:** Candidates miscalculate the communication volume, failing to realize the backward pass through an AllReduce in the forward becomes a no-op (identity) in backward, while the forward identity becomes an AllReduce in backward.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, hidden=8192, TP=8, batch×seq=8192.
    - FP16 representation (2 bytes/param).

    **Calculations:**
    - Volume per AllReduce = 2 × (P-1)/P × batch × seq × hidden × 2B.
    - Per AllReduce = 2 × (7/8) × 8192 × 8192 × 2B = 234.8 MB.
    - One fused column->row pair per step = 2 AllReduces = 469.6 MB.
    - One transformer block with Attention and MLP = 4 AllReduces = 939.2 MB per block per step.
    - For 80 blocks: 80 × 939.2 MB = 75.1 GB per full model step.

    **Conclusion & Interpretation:**
    - **Result: Network-Bandwidth-Bound.** The per-block training-step volume is about 939 MB, and the 80-block model step requires about 75.1 GB of TP network transfer.
