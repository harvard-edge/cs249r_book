title: Designing a Multi-Tenant ML Platform with AMD MI300X
scenario: 'Your team is building a multi-tenant machine learning platform in the cloud. You have a cluster of AMD MI300X accelerators.'
question: 'How would you design MI300X resource management for multi-tenant ML with GPU partitioning, gang scheduling, preemption, and isolation?'
details:
  realistic_solution: 'A hierarchical scheduling approach is effective. Implement virtual GPU partitioning to allow multiple tenants to share a single physical GPU with memory isolation. Integrate with a cluster scheduler (e.g., Kubernetes) supporting gang scheduling for distributed jobs. Implement preemption policies and continuously monitor metrics to dynamically adjust allocations.'
  common_mistake: |
    **The Pitfall:** Ignoring the specific hardware capabilities and limitations of the AMD MI300X.
    **The Rationale:** Candidates default to NVIDIA-specific tooling (like MIG) and fail to account for architectural differences.
    **The Consequence:** Suboptimal partitioning strategies leading to poor multi-tenant isolation.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X: 192 GB HBM3.
    - 20% system overhead.

    **Calculations:**
    - Usable HBM3: 192 GB * 0.8 = 153.6 GB.
    - Memory required per tenant pair: 48 GB + 96 GB = 144 GB.

    **Conclusion & Interpretation:**
    - **Result: Accommodating one pair leaves minimal room (153.6/144 = ~1.06), requiring dynamic partitioning (Memory-Bound).**
