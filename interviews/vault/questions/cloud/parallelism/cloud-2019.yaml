title: Calculating 1D Tensor Parallelism Overhead
scenario: You are configuring a Megatron-LM style 1D Tensor Parallelism setup for a 70B parameter model across 8x GPUs (TP=8). The model has a hidden dimension of 8192 and an MLP intermediate dimension of 32768. You are processing a micro-batch of 2 sequences of length 4096 in FP16.
question: "For TP=8, what are the per-GPU MLP weight footprint and the All-Reduce activation payload size for the micro-batch?"
details:
  realistic_solution: Use column-parallelism for the first MLP layer (W1) and row-parallelism for the second (W2). This eliminates communication between the two layers, requiring only a single All-Reduce of size [batch, seq_len, hidden_dim] at the end of the block. Each GPU stores 1/8th of the weights.
  common_mistake: |
    **The Pitfall:** Assuming an All-Reduce is required after every single matrix multiplication in the MLP.
    **The Rationale:** Candidates fail to understand how Megatron-LM strategically pairs column-parallel and row-parallel layers to eliminate intermediate communication.
    **The Consequence:** Overestimating the communication overhead by 2x, leading to suboptimal network provisioning or incorrect performance models.
  napkin_math: |
    **Assumptions & Constraints:**
    - W1: 8192 x 32768. W2: 32768 x 8192.
    - TP=8, FP16 (2 bytes/param).
    - Batch=2, SeqLen=4096.

    **Calculations:**
    - Total MLP Weights: W1 + W2 = 536.8M parameters.
    - Total weight memory (FP16): 536.8M * 2 bytes = 1.074 GB.
    - Per-device memory (TP=8): 1.074 GB / 8 = 134.2 MB.
    - All-Reduce payload size = [batch=2, seq_len=4096, hidden=8192] = 67.1M elements.
    - Payload memory (FP16): 67.1M * 2 bytes = 134.2 MB.

    **Conclusion & Interpretation:**
    - **Result: Communication-Bound**. The per-GPU MLP weight footprint is 134.2 MB, and the All-Reduce payload is 134.2 MB per block.
