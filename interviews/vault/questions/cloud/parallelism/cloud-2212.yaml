title: The Rail-Optimized Placement Problem
scenario: You are scheduling a 32-GPU data-parallel training job on a cluster where each node has 8 GPUs connected by NVLink (900 GB/s intra-node) but nodes connect via InfiniBand (50 GB/s inter-node). The scheduler places GPUs across 6 different nodes. The training job's AllReduce takes 3x longer than expected.
question: Why did the placement cause the AllReduce to be 3x slower, and what scheduling constraint would fix it?
details:
  realistic_solution: 'The scheduler should enforce rail-optimized (topology-aware) placement: allocate complete nodes first, then fill partial nodes only if necessary. For 32 GPUs with 8-GPU nodes, the optimal placement is exactly 4 complete nodes. This ensures the AllReduce tree maps cleanly onto the network hierarchy — intra-node reduction over NVLink first, then inter-node reduction over InfiniBand. With asymmetric placement across 6 nodes, the AllReduce ring has unequal segment bandwidths, and the slowest link (50 GB/s IB) dominates the entire ring.'
  common_mistake: |
    **The Pitfall:** Blaming the InfiniBand network bandwidth as inherently insufficient.
    **The Rationale:** Engineers assume 50 GB/s is just too slow to sustain the gradient synchronization.
    **The Consequence:** Pushing for massive and expensive IB upgrades instead of realizing a simple, zero-cost scheduling constraint flag would resolve the load imbalance entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 GPUs, 8 GPUs per node, so the compact placement is 4 full nodes.
    - Gradient payload per rank is 14 GB.
    - NVLink bandwidth is 900 GB/s and InfiniBand bandwidth is 50 GB/s.
    - Ring AllReduce bandwidth time is approximately 2(n-1)/n * payload / bandwidth for a ring whose bottleneck link carries the full rank payload.

    **Calculations:**
    - Intra-node NVLink ring time: 2(8-1)/8 * 14GB / 900GB/s = 0.027s, about 27ms for each local reduce or broadcast phase.
    - Compact 4-node inter-node ring time per rail: 2(4-1)/4 * 14GB / 50GB/s = 0.42s, dominated by InfiniBand bandwidth.
    - Expected topology-aware time is roughly 27ms + 420ms + 27ms = 474ms before software overhead.
    - A fragmented 6-node placement adds more cross-node hops and can force multiple ranks onto the same rail. A 3x measured time, ~1.4s, corresponds to effective bottleneck bandwidth near 50GB/s / 3 ≈ 17GB/s.

    **Conclusion & Interpretation:**
    - **Result: Network Topology Stragglers. Require topology-aware placement on 4 complete 8-GPU nodes so the job minimizes cross-node traffic and maps cleanly to the NVLink/InfiniBand hierarchy.**
