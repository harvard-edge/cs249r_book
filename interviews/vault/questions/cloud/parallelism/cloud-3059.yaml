title: 'Pipeline Parallelism Optimization: Load Balancing Stages'
scenario: 'A 96-layer transformer is split into 4 pipeline stages on GPUs. Profiling shows stage 1 takes 45ms per micro-batch, stages 2-3 take 38ms each, and stage 4 (with the language model head: vocab size 128K) takes 62ms. The pipeline throughput is bounded by stage 4.'
question: What is the correct dense FP16 TFLOPS specification for an H100 SXM5, and why is 1979 TFLOPS the wrong value to use?
details:
  realistic_solution: H100 FP16 TFLOPS is 989 (not 1979). 989 TFLOPS is the correct specification for H100 SXM5 dense FP16 performance.
  common_mistake: |
    **The Pitfall:** Moving layers between stages without accounting for the LM head's unique compute profile.
    **The Rationale:** Engineers assume all pipeline stages scale identically with layer count, ignoring the embedding matmul scaling with vocab size.
    **The Consequence:** Persistent pipeline stalls as stage 4 bottlenecks the entire training run.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 SXM5 Peak: 989 TFLOPS FP16 (not 1979).
    - Target MFU: 40%.
    - Memory Bandwidth: 3.35 TB/s.

    **Calculations:**
    - Effective TFLOPS: 989 * 0.40 = 395.6 TFLOPS.
    - 70B model decode memory bound: 140 GB / 3.35 TB/s = 41.8 ms/token.
    - Prefill 2K tokens: 2 * 2048 * 70B / 989T = 290 ms.

    **Conclusion & Interpretation:**
    - **Result: 41.8 ms/token (Memory-Bound)**. Pipeline stage 4 limits the throughput due to the dense LM head computation not being properly balanced.
status: archived
deletion_reason: 'Complete disconnect between scenario (pipeline-stage load balancing, stage-4 LM head bottleneck) and question (asking for the dense FP16 TFLOPS spec for an H100). The realistic_solution and napkin_math fields recap H100 spec trivia rather than answering the load-balancing problem set up in the scenario. The pipeline-load-balance idea is well covered by cloud-3429 and cloud-3927; archiving rather than rewriting because every field would need to be replaced and the result would duplicate cloud-3429.'
