title: TPU v5e Tensor Sharding for 100B LLM Inference
scenario: You are tasked with deploying a 100-billion parameter LLM for inference on Google Cloud using a cluster of Google TPU v5e devices. Each TPU v5e offers 16 GB HBM and 1.6 TB/s memory bandwidth. The model's weights alone consume significantly more memory than a single TPU's HBM, so start with tensor-parallel sharding and allow hybrid pipeline parallelism only if tensor parallelism alone cannot fit the model efficiently.
question: How would you shard a 100B LLM across TPU v5e devices with tensor parallelism to minimize inference latency and communication?
details:
  realistic_solution: |
    A realistic solution would involve a combination of tensor and possibly pipeline parallelism, carefully orchestrated to exploit the TPU v5e architecture:
    1.  **Tensor Partitioning (Intra-layer)**: For large linear layers (e.g., in attention or feed-forward networks), apply column parallelism for the first linear layer in a block (splitting the output dimension) and row parallelism for the subsequent linear layer (splitting the input dimension). This ensures that the output of the first partitioned layer can be immediately used by the second partitioned layer on the same device without an `all-gather` operation between the two linear layers within a block. An `all-reduce` or `reduce-scatter` would be needed for activation synchronization across devices only when moving to the next block or at specific points.
    2.  **Layer Partitioning (Inter-layer)**: For a 100-billion parameter model, memory is a significant constraint. If pure tensor parallelism isn't sufficient for the model weights, consider partitioning entire transformer blocks or groups of layers across TPUs. This is often combined with pipeline parallelism to keep all stages busy. Given the 16 GB HBM, a 100B model (approx. 200GB BF16 weights) would need at least 13 TPUs just for weights, making layer partitioning inevitable.
    3.  **Communication-Computation Overlap**: Use real JAX/XLA collectives such as `jax.lax.psum`, `jax.lax.all_gather`, and `jax.lax.reduce_scatter`, generated through `jit` or `pjit` with explicit mesh sharding. Communication for the next layer's inputs or previous layer's outputs should be initiated while the current layer is performing its computation. For example, during column parallelism, partial computations can proceed while the necessary intermediate results are transferred across devices.
    4.  **TPU-Specific Optimizations**: Leverage TPU ICI for collectives and choose a mesh layout that keeps tensor-parallel groups on nearby devices. Use current JAX sharding APIs such as `Mesh`, `NamedSharding`, and `PartitionSpec` so XLA can place arrays and emit efficient collective schedules.
  common_mistake: |
    **The Pitfall:** Proposing naive layer or tensor partitioning without accounting for asymmetric communication patterns.
    **The Rationale:** Candidates often focus purely on memory capacity (fitting the model) and overlook the strict latency and bandwidth penalties incurred by misaligned All-Reduce operations across the TPU interconnect.
    **The Consequence:** Creating a distributed serving setup crippled by severe communication bottlenecks and vastly underutilized TPU compute cores.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100B parameter model in BF16 (200 GB total weights).
    - 16 GB HBM per TPU v5e; reserve about 2 GB per device for runtime buffers and KV cache.
    - Use 100 GB/s as an order-of-magnitude effective ICI bandwidth for a local tensor-parallel collective after overheads.
    - Batch_size=1, seq_len=2048, hidden_size=8192 in BF16.

    **Calculations:**
    - Weights-only floor: 200 GB / 16 GB/TPU = 12.5, so 13 TPUs before runtime overhead.
    - With a 2 GB reserve: 200 GB / 14 GB usable = 14.3, so choose at least 16 TPUs for a topology-friendly mesh.
    - Intermediate activation tensor size: 1 * 2048 * 8192 * 2 bytes ≈ 33.5 MB.
    - A collective that moves one activation tensor costs at least 33.5 MB / 100 GB/s = 0.335 ms before latency and synchronization overhead.

    **Conclusion & Interpretation:**
    - **Result: use at least a 16-TPU mesh for capacity and topology; each exposed activation collective is roughly 0.3 ms or more.** Minimize latency by keeping tensor-parallel collectives local and overlapping them with compute.
