title: 'A100 Pipeline Bubble Sizing'
scenario: 'An 8-stage pipeline runs on 8x A100 80GB SXM GPUs with 32 microbatches. Stages are NOT balanced - the embedding-and-early-attention stage takes 65 ms, the middle 6 stages take 50 ms each, and the LM-head stage takes 70 ms (large vocab projection).'
question: 'What is the effective pipeline bubble percentage, and why does the textbook formula understate it?'
visual:
  kind: svg
  path: cloud-4522.svg
  alt: 'Pipeline bubble Gantt chart showing empty slots at the start and end of microbatch execution.'
  caption: 'Pipeline bubble time across 8 stages.'
details:
  realistic_solution: 'Steady-state cycle time is gated by max stage = 70 ms. Total pipeline time = (M + P - 1) * t_max = 39 * 70 = 2730 ms. Useful work per microbatch = 65 + 6*50 + 70 = 435 ms; total useful = 32 * 435 = 13920 GPU-ms. Total available = 8 * 2730 = 21840 GPU-ms. Bubble fraction = 1 - 13920/21840 = 36.3%. Naive homogeneous formula (P-1)/(M+P-1) = 7/39 = 17.9% understates by ~2x. Imbalanced stages create persistent idle on every fast stage, not just at fill/drain - that is the missing term.'
  common_mistake: |
    **The Pitfall:** Plugging M and P directly into the (P-1)/(M+P-1) formula.
    **The Rationale:** Candidates forget that the textbook formula assumes perfectly homogeneous stage latencies.
    **The Consequence:** The calculation drastically underestimates the pipeline bubble (17.9% instead of 36.3%), leading to inaccurate performance profiling and missed rebalancing opportunities.
  napkin_math: |
    **Assumptions & Constraints:**
    - M = 32 microbatches, P = 8 stages
    - Stage latencies: 65 ms, 6x 50 ms, 70 ms
    - Gated by slowest stage (t_max) = 70 ms

    **Calculations:**
    - Total Time = (M + P - 1) * t_max = (32 + 8 - 1) * 70 ms = 2,730 ms
    - Useful Work = 32 * (65 + 6*50 + 70) ms = 13,920 GPU-ms
    - Total Available Capacity = 8 GPUs * 2,730 ms = 21,840 GPU-ms
    - Bubble Fraction = 1 - (13,920 / 21,840) = 36.3%

    **Conclusion & Interpretation:**
    - **Result: 36.3% (Pipeline-Bound)**. Imbalanced stages create persistent idle time on every fast stage, nearly doubling the homogeneous bubble estimate of 17.9%.
