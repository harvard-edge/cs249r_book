title: Embedding Table Parallelism Strategy
scenario: A large language model has a vocabulary of 128K tokens with hidden_dim=12288. The embedding table is 128K × 12288 × 2B = 3 GB in BF16. You are using Tensor Parallelism (TP) = 8.
question: For a 3 GB embedding table with TP=8, what are two valid sharding strategies and their tradeoffs?
details:
  realistic_solution: 'Strategy 1 — Vocabulary Parallelism: Split the embedding table along the vocabulary dimension. Each GPU holds 16K rows = 384 MB. Pros: Memory efficient, matches output layer. Cons: AllReduce for every forward pass. Strategy 2 — Column Parallelism: Split along hidden_dim. Each GPU holds 1536 cols = 384 MB. Pros: No GPU is idle. Cons: Does not align with the output projection''s parallelism.'
  common_mistake: |
    **The Pitfall:** Assuming the embedding table must be fully replicated on all GPUs.
    **The Rationale:** Candidates default to replicating "small" input layers to avoid initial communication overhead.
    **The Consequence:** This wastes VRAM unnecessarily since each token only accesses one row, consuming 24GB cluster-wide instead of 3GB.
  napkin_math: |
    1. **Assumptions & Constraints:** 128K vocab, 12288 hidden_dim, TP=8, BF16 (2 bytes/param).
    2. **Calculations:** Full table = 128,000 × 12,288 × 2 = 3.14 GB. Vocabulary Parallelism (Split rows): 128K / 8 = 16K rows per GPU = 393 MB/GPU. Column Parallelism (Split cols): 12288 / 8 = 1536 cols per GPU = 393 MB/GPU. Replication waste = 3.14 GB × 7 = ~22 GB wasted.
    3. **Conclusion & Interpretation:** **Result: Sharding reduces per-GPU footprint to ~393 MB. VRAM-Capacity-Bound.**
