title: Gradient Compression with Top-K Sparsification
scenario: Your 256-H100 distributed training job sends 4GB of gradients per iteration. Communication takes 80ms (AllReduce at 400Gbps), while computation takes 120ms. You want to overlap more communication with computation using Top-K gradient sparsification that transmits only the largest 1% of gradient values.
question: How would you use Top-K gradient sparsification at 1% density for 4GB gradients, and what happens to the dropped 99%?
details:
  realistic_solution: 'Design: (1) Each GPU computes full gradients g_t locally. (2) Add accumulated error from previous iteration: g_t'' = g_t + e_{t-1}. (3) Select Top-K values: keep largest 1% by magnitude = 40MB out of 4GB. (4) Encode as sparse tensor: (index, value) pairs. Each pair = 4 bytes (int32 index) + 2 bytes (FP16 value) = 6 bytes per element. 40MB of values → ~20M elements → 120MB sparse representation. But indices can be compressed with run-length encoding to ~80MB total. (5) Store error: e_t = g_t'' - sparse(g_t''), preserving the 99% for next iteration. (6) AllReduce the sparse 80MB instead of dense 4GB: time = 2 × 255/256 × 80MB / 50GB/s = 3.2ms — a 25× speedup. With error feedback, convergence matches dense training within 5-10% more iterations. Total training time: computation=120ms + communication=3.2ms ≈ 123ms per iteration (vs 200ms dense with 80ms communication).'
  common_mistake: 'Naively dropping 99% of gradients permanently, which causes divergence. The dropped values must be accumulated in a local error buffer and added to the next iteration''s gradients — this is error feedback (or error compensation), without which convergence degrades significantly.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense AllReduce: 4GB in 80ms.
    - Top-1% Sparse AllReduce: 80MB in 3.2ms.
    - Original computation: 120ms.
    - Convergence penalty: 1.08x more iterations.

    **Calculations:**
    - Communication speedup = 80ms / 3.2ms = 25x reduction.
    - Dense time per iteration = 200ms (120ms compute + 80ms comm).
    - Sparse time per iteration ≈ 123.2ms (computation dominates, 3.2ms comm).
    - Wall-clock time multiplier: 10 days * (123.2 / 200) * 1.08 = 6.6 days.

    **Conclusion & Interpretation:**
    - **Result: 6.6 days total training time from 10 days (Compute-Bound)**. Sparsification reduces communication overhead significantly, outweighing the minor convergence penalty.
