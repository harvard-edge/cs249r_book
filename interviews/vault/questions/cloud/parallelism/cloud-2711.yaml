title: Data Parallelism Around an Expert-Parallel MoE Block
scenario: An MoE Transformer has 64 experts placed 1-per-GPU across 64 GPUs (expert parallel). The team wants to scale throughput by *also* applying data parallelism — replicating the full 64-GPU expert topology N times so the global batch grows by N.
question: When DP wraps an already expert-parallel 64-GPU MoE block, what does the DP layer actually replicate, and what AllReduce cost does it add?
details:
  realistic_solution: |
    The DP layer creates N replicas of the full MoE model, but within each replica the experts are still partitioned across the 64 expert-parallel ranks. A single GPU does not suddenly hold all 64 experts; it holds the same local dense shard or replica and the same local expert assignment in each DP copy. After backward, DP synchronizes gradients across the cross-replica group of identically positioned ranks, not across the expert-parallel dimension. The added AllReduce cost is therefore over the replicated parameter slice owned by that rank. Its exact byte count depends on the dense/expert sharding scheme and precision, and it is not the sparse set of experts activated by one token. A sparse or active-expert gradient communication model would require an explicitly different MoE-specific optimizer or communication scheme.
  common_mistake: |
    **The Pitfall:** Believing that adding DP on top of expert parallelism doubles the all-to-all dispatch cost.
    **The Rationale:** The dispatch all-to-all is *intra-replica* and is unaffected by DP. What DP adds is a *separate* AllReduce on the gradient at the end of backward, completely orthogonal to the dispatch step.
    **The Consequence:** Incorrectly modeling network bottlenecks and avoiding DP scaling when it is actually feasible.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 GPUs per replica, with one expert-parallel rank per GPU.
    - Data parallelism replicates the model across replica groups while expert parallelism partitions experts within each replica.
    - The prompt does not specify dense sharding, expert size, precision, DP factor, or inter-replica bandwidth.

    **Calculations:**
    - For a given expert-parallel rank, the DP group contains the identically positioned rank in each replica.
    - DP AllReduce payload per rank = gradients for that rank's replicated local parameter slice: local dense parameters or shard plus the local expert parameters assigned to that rank.
    - It is not 64 experts per GPU and not only the experts active for a token.
    - A numeric AllReduce time requires the local replicated parameter bytes and DP-group bandwidth; those are not derivable from the prompt.

    **Conclusion & Interpretation:**
    - **Result: DP adds cross-replica gradient synchronization for each rank's local replicated parameter slice.** The cost is separate from intra-replica expert dispatch and must be sized from the actual local parameter ownership.
