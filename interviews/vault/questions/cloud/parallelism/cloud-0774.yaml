title: 3D Parallelism Sizing — Where the Adam OOM Lives
scenario: A 70B-parameter LLM is being fine-tuned with mixed-precision Adam on GPUs connected by NVLink and IB NDR. The team plans a 3D parallel layout but cannot agree on TP/PP sizing.
question: "For a 70B Adam-trained model, what is the minimum (TP*PP) that fits in 80GB HBM, and which 3D-parallel axis shrinks each Adam memory component?"
details:
  realistic_solution: Mixed-precision Adam stores 16 bytes per parameter. For 70B params, model state is 1120 GB. Minimum (TP * PP) = ceil(1120 / 64) = 18. Choose TP=8 and PP=4. PP shrinks all components by partitioning layers; TP shrinks weights and optimizer states along tensor dims; DP does not shrink per-GPU memory.
  common_mistake: |
    **The Pitfall:** Sizing only by the FP16 weight count (14 GB).
    **The Rationale:** Forgetting the massive memory overhead of Adam optimizer states and master weights.
    **The Consequence:** OOM crashes during initialization because true per-parameter footprint is 16 bytes, not 2.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, 80 GB GPUs, 16 GB activation budget.

    **Calculations:**
    - State per param: 2 (FP16 W) + 2 (FP16 G) + 4 (FP32 W) + 4 (FP32 m) + 4 (FP32 v) = 16 bytes.
    - Total state: 70B * 16 = 1120 GB.
    - Budget per GPU: 80 - 16 = 64 GB.
    - Min (TP*PP): ceil(1120 / 64) = 18.

    **Conclusion & Interpretation:**
    - **Result: Minimum layout is TP=8, PP=4, yielding 35 GB per-GPU model state (Memory-Bound)**.
