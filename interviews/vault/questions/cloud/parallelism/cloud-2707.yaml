title: Budget Allocation Near Critical Batch Size
scenario: 'You have a $500K training budget at $3/GPU-hour. Your model''s critical batch size (B_crit) is ~8K samples. Option A: 128 GPUs, B=32K for 2 weeks. Option B: 32 GPUs, B=8K for 6 weeks. Both reach the same final loss.'
question: With a $500K budget, no 2-week deadline, and both options reaching the same final loss, should you choose 128 GPUs at B=32K for 2 weeks or 32 GPUs at B=8K for 6 weeks?
details:
  realistic_solution: 'Option A: 128 GPUs × 336h = 43,008 GPU-hours = $129K. But B=32K is 4x above B_crit, so the extra parallelism is likely to have diminishing returns. Option B: 32 GPUs × 1008h = 32,256 GPU-hours = $97K. The prompt states both reach the same final loss and there is no 2-week deadline, so choose Option B: it delivers the same result for $32K less, about 25% lower cost. Option A is only justified if the 2-week wall-clock deadline is itself a hard product constraint.'
  common_mistake: |
    **The Pitfall:** Choosing the 128-GPU option just because it finishes in 2 weeks.
    **The Rationale:** That answer ignores the prompt's cost objective and the fact that B=32K is well above the 8K critical batch size, where extra batch-parallel compute has diminishing returns.
    **The Consequence:** The team spends about $32K more for the same stated final loss, leaving less budget for retries, sweeps, or validation.
  napkin_math: |
    **Assumptions & Constraints:**
    - $3/GPU-hour.
    - Both options reach the same final loss; no hard 2-week deadline.
    - Option A: 128 GPUs, 14 days.
    - Option B: 32 GPUs, 42 days.

    **Calculations:**
    - Option A Cost = 128 * 14 * 24 * $3 = $129,024.
    - Option B Cost = 32 * 42 * 24 * $3 = $96,768.
    - Savings = $129,024 - $96,768 = $32,256.

    **Conclusion & Interpretation:**
    - **Result: Option B saves $32,256, about 25% relative to Option A, for the same stated final loss.** Bottleneck: batch size scaling efficiency above B_crit.
