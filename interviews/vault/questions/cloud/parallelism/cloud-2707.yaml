title: Budget Allocation Near B_crit
scenario: 'You have a $500K training budget at $3/GPU-hour. Your model''s critical batch size (B_crit) is ~8K samples. Option A: 128 GPUs, B=32K for 2 weeks. Option B: 32 GPUs, B=8K for 6 weeks. Both reach the same final loss.'
question: With a $500K budget and B_crit near 8K, should you choose 128 GPUs at B=32K for 2 weeks or 32 GPUs at B=8K for 6 weeks?
details:
  realistic_solution: 'Option A: 128 GPUs × 336h = 43,008 GPU-hours = $129K. But B=32K is 4x above B_crit, so compute efficiency is ~40%. Effective useful compute: ~$52K worth. Option B: 32 GPUs × 1008h = 32,256 GPU-hours = $97K. At B=B_crit, compute efficiency is ~100%. Same final loss for $97K vs $129K. Option B saves $32K (25% less). The right choice depends on constraints: if the deadline is 2 weeks, you must pick A despite the waste. If you have 6 weeks, B is strictly better — you could even run B and use the $32K savings for hyperparameter sweeps, improving final quality.'
  common_mistake: |
    **The Pitfall:** Always defaulting to the faster wall-time option regardless of physics.
    **The Rationale:** Engineers often assume getting results faster is universally better and ignore batch size scaling efficiency limits.
    **The Consequence:** Vastly overspending the compute budget on redundant operations, blowing past B_crit with rapidly diminishing returns.
  napkin_math: |
    **Assumptions & Constraints:**
    - $3/GPU-hour.
    - Option A: 128 GPUs, 14 days.
    - Option B: 32 GPUs, 42 days.

    **Calculations:**
    - Option A Cost = 128 * 14 * 24 * $3 = $129,024.
    - Option B Cost = 32 * 42 * 24 * $3 = $96,768.
    - Savings = $129,024 - $96,768 = $32,256.

    **Conclusion & Interpretation:**
    - **Result: Option B saves $32,256 (25% cost reduction) to achieve the exact same loss (Batch Size Scaling Efficiency)**. Bottleneck: Batch Size Scaling Efficiency.
