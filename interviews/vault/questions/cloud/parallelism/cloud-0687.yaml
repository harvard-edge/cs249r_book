title: The Optimizer Explosion
scenario: 'You are training a 30B parameter model on a single GPU. The FP16 weights occupy 60 GB. Optimizer is Adam with mixed-precision FP16 weights and an FP32 master copy. The system OOMs on the very first optimizer step.'
question: 'Why does Adam mixed-precision training of a 30B model OOM, and which sharding strategy fixes it?'
details:
  realistic_solution: |
    The system OOMs because of the Optimizer State. Adam stores two additional tensors per parameter (first and second moments), plus master weights, all in FP32. ZeRO (Zero Redundancy Optimizer) or FSDP is the fix. ZeRO Stage 3 shards weights, gradients, and optimizer states across all workers.
  common_mistake: |
    **The Pitfall:** Blaming the batch size and attempting to lower it.
    **The Rationale:** Candidates see that 60GB fits in 80GB and assume activations are the culprit, ignoring the massive memory footprint of the optimizer state.
    **The Consequence:** Endless tuning of batch sizes and gradient accumulation without resolving the fundamental OOM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30B parameter model.
    - FP16 Weights: 2 bytes/param.
    - Adam Optimizer: FP32 master weights, momentum, variance (4 bytes/param each).

    **Calculations:**
    - FP16 Weights: 30B * 2B = 60GB.
    - FP16 Gradients: 30B * 2B = 60GB.
    - FP32 Master Weights: 30B * 4B = 120GB.
    - FP32 Momentum: 30B * 4B = 120GB.
    - FP32 Variance: 30B * 4B = 120GB.
    - Total Memory: 60 + 60 + 120 + 120 + 120 = 480GB.

    **Conclusion & Interpretation:**
    - **Result: 480GB (Memory-Bound)**. The 480GB footprint instantly causes an OOM on an 80GB GPU. ZeRO/FSDP sharding is mandatory.
