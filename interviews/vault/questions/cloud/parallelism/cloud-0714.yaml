title: The Heterogeneous GPU Training
scenario: Your cloud budget gets you 32 A100 80GB GPUs and 32 H100 80GB GPUs. An engineer proposes combining them into a single 64-GPU DDP training job for a 7B model. The H100 does a training step in 400 ms; the A100 takes 650 ms.
question: What happens when you combine A100 and H100 GPUs in a single DDP training job, and how can you use both efficiently?
details:
  realistic_solution: 'With naive DDP, every step takes 650 ms (the A100 speed). Solutions: (1) Separate jobs — run two independent training jobs, one per GPU type, and merge checkpoints periodically. (2) Weighted data parallelism — give H100s larger micro-batches proportional to their speed (H100 gets batch=6, A100 gets batch=4), so both finish at the same time.'
  common_mistake: |
    **The Pitfall:** Believing DDP automatically averages or load-balances throughput across heterogeneous GPUs.
    **The Rationale:** Assuming the overall speed will simply be a mathematical average between the A100 and H100 speeds.
    **The Consequence:** DDP is strictly synchronous, meaning the entire cluster drops to the speed of the slowest GPU (A100), effectively wasting the H100 hardware advantage.
  napkin_math: |
    1. **Assumptions & Constraints:** 32 H100s (400ms/step), 32 A100s (650ms/step). DDP forces synchronization barrier.
    2. **Calculations:** Naive DDP: Assume batch=4/GPU. H100s wait 250ms per step. Throughput = 64 × 4 / 0.65s = 394 samples/s. Weighted DDP: Assign H100 batch=6 (compute ≈ 600ms) and A100 batch=4 (compute = 650ms). Global batch = (32 × 6) + (32 × 4) = 320. Throughput = 320 / 0.65s = 492 samples/s.
    3. **Conclusion & Interpretation:** **Result: Weighted DDP achieves 492 samples/s (25% faster). Sync-Latency-Bound.**
