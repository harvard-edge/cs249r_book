title: Diagnosing MoE Routing and OOM Bottlenecks
scenario: You are serving an 8x7B Mixture of Experts (MoE) model (56B total parameters, 14B active per token) across an 8-GPU node using Expert Parallelism (1 expert per GPU). The total model weights are ~112GB in FP16, easily fitting in cluster memory. However, at a batch size of 256 and sequence length of 2048, you experience intermittent Out-of-Memory (OOM) crashes on specific GPUs and massive tail latency spikes. Standard metrics show average cluster GPU utilization is below 40%.
question: "Why do specific GPUs OOM and tail latency spike under expert parallelism, and how should you fix the 8x7B MoE serving path?"
details:
  realistic_solution: 'The root cause is severe load imbalance (token skew) where the router sends a disproportionate number of tokens to a single expert. This causes the target GPU to exceed its VRAM limit due to localized activation and KV cache spikes, and serializes compute, causing tail latency. The fix is to implement a strict expert capacity limit (token dropping/overflow to other experts) and combine Expert Parallelism with Tensor Parallelism to distribute the hot expert''s memory footprint.'
  common_mistake: |
    **The Pitfall:** Blaming the total KV cache size or general all-to-all communication overhead.
    **The Rationale:** KV cache is the usual suspect for OOMs in standard LLM serving.
    **The Consequence:** Suggesting global batch size reduction instead of fixing the MoE routing imbalance, which drops throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8x80GB = 640GB total VRAM.
    - 112GB weights (14GB/GPU).
    - Remaining VRAM/GPU = 66 GB.
    - Activation+KV cost ~ 0.13 MB/token.

    **Calculations:**
    - Balanced load: 256 * 2048 = 524,288 tokens. 524k / 8 = 65.5k tokens/GPU -> ~8.5 GB activation+KV.
    - Skewed routing (95% to Expert 2): GPU 2 processes 498k tokens -> 64.7 GB of activation+KV.
    - GPU 2 total = 14 GB + 64.7 GB + overhead > 80 GB.

    **Conclusion & Interpretation:**
    - **Result: GPU 2 OOMs at >80 GB (Memory Capacity-Bound)**. Load imbalance directly causes localized memory exhaustion.
