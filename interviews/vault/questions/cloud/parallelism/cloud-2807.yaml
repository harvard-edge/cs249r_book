title: Heterogeneous-Bandwidth Data-Parallel AllReduce Architecture
scenario: Architect a data-parallel AllReduce strategy for a 13B parameter model trained on 128 A100 80 GB GPUs distributed across 16 nodes. The cluster has heterogeneous interconnect — 8 of the 16 nodes share an InfiniBand HDR (200 Gbps) island, while the other 8 nodes are connected only via 100 Gbps Ethernet to the IB island via two gateway switches. Per-node intra-node fabric is NVLink 3.0 (600 GB/s bidirectional / 300 GB/s unidirectional). Design a DP-only synchronization strategy that respects this asymmetric topology and bounds the exposed AllReduce time so that it fits inside the 380 ms backward pass.
question: How would you architect data-parallel AllReduce on 128 A100s split between an InfiniBand HDR island and an Ethernet half so synchronization fits inside a 380 ms backward pass?
details:
  realistic_solution: 'Use topology-aware hierarchical AllReduce and be explicit that the stated 380 ms target is not reachable if all 26 GB of BF16 gradients must cross a single 100 Gbps gateway during the step. Level 1: reduce-scatter within each 8-GPU node over NVLink. Level 2: aggregate within the IB island and within the Ethernet half independently. Level 3: exchange only the already-reduced cross-partition shard through both gateway switches in parallel, using large buckets that start as soon as backward produces them. With two 100 Gbps gateways, the cross-partition payload is still about 26 GB over 25 GB/s aggregate, so roughly 1.04 s of gateway service time must be overlapped or reduced through compression/local-SGD. If exact DP AllReduce is mandatory, the design should relax the 380 ms bound; if the bound is mandatory, add lossy compression or less frequent cross-island averaging.'
  common_mistake: |
    **The Pitfall:** Treating the 128-GPU world as a flat ring AllReduce.
    **The Rationale:** A flat ring is bottlenecked by the slowest link (the 100 Gbps Ethernet). The fix is hierarchy and topology awareness, not gradient compression alone.
    **The Consequence:** Total bus traffic becomes roughly 51.6 GB at 12.5 GB/s, taking ~4.1 s — over 10x the backward pass time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B params, BF16 = 26 GB gradient.
    - Gateway: two 100 Gbps links if both gateway switches can be used, for 25 GB/s aggregate; one gateway is 12.5 GB/s.
    - IB sub-rings: 8 nodes, ~25 GB/s.

    **Calculations:**
    - BF16 gradient payload: 13B params * 2 bytes = 26 GB, not 52 GB.
    - Flat 128-rank ring over a 12.5 GB/s bottleneck moves about 2*(127/128)*26 GB ≈ 51.6 GB across the bottleneck, taking 51.6 GB / 12.5 GB/s ≈ 4.1 s.
    - Hierarchical cross-partition exchange still has to move about 26 GB across the IB/Ethernet boundary for exact averaging.
    - With one 100 Gbps gateway: 26 GB / 12.5 GB/s ≈ 2.08 s. With two active gateways: 26 GB / 25 GB/s ≈ 1.04 s.
    - Backward overlap can hide at most 0.38 s of that service time, leaving at least 1.04 s - 0.38 s ≈ 0.66 s exposed even in the two-gateway case.

    **Conclusion & Interpretation:**
    - **Result:** Exact DP AllReduce cannot be bounded under 380 ms on the stated topology. Meeting that bound requires changing the requirement, such as compressed gradients, local-SGD with periodic cross-island averaging, or additional gateway bandwidth.
