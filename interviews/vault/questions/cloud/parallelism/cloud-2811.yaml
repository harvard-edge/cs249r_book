title: Pipeline Parallelism across Asymmetric Clusters
scenario: 'Architect a distributed fine-tuning framework for a 65B model using a highly asymmetric cluster: 4x V100 32GB nodes and 2x A100 80GB nodes.'
question: How would you fine-tune a 65B model across 4 V100 32GB nodes and 2 A100 80GB nodes without stragglers?
details:
  realistic_solution: Use a heterogeneity-aware pipeline rather than a uniform split. First benchmark one transformer block on each node type with the intended sequence length and micro-batch size, then assign more layers to the A100 stages and fewer to the V100 stages so measured stage times are similar. Use PEFT/LoRA if acceptable; for full-parameter fine-tuning, combine pipeline parallelism with FSDP or ZeRO-style sharding inside stages plus activation checkpointing and optimizer offload, because 65B full fine-tuning cannot fit from FP16 weights alone. Group the two A100 nodes as heavy stages, keep the V100 stages small, and tune the number of in-flight micro-batches until pipeline bubbles and the slowest-stage time are minimized. The goal is not to eliminate stragglers magically, but to make the critical stage latency roughly balanced under measured compute, memory, and communication costs.
  common_mistake: |
    **The Pitfall:** Using synchronous Data Parallelism or uniform Pipeline Parallelism across the mixed fleet.
    **The Rationale:** Standard distributed frameworks assume homogeneous hardware, so engineers default to these without considering the hardware asymmetry.
    **The Consequence:** The massive compute of the A100s is throttled down to the speed of the slowest V100 node, destroying overall cluster throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 V100 32GB nodes and 2 A100 80GB nodes.
    - Model: 65B parameters, about 130 GB FP16 weights before gradients and optimizer state, with 80 transformer layers.
    - Heterogeneous placement must be based on measured per-layer stage time and memory, not weight memory alone.

    **Calculations:**
    - FP16 weights alone are 65B * 2 bytes = 130 GB. Gradients add another ~130 GB, and Adam-style optimizer states can add hundreds of GB more, so full fine-tuning requires sharding/offload or PEFT.
    - A capacity-only upper bound gives A100 / V100 = 80 GB / 32 GB = 2.5x memory, but compute throughput and activation memory usually make the usable ratio smaller.
    - If benchmarking shows one A100 stage can process about 2x as many layers as one V100 stage at the same micro-batch latency, total capacity units are 4 * 1 + 2 * 2 = 8.
    - 80 layers / 8 = 10 layers per V100 unit, giving an initial split of 10 layers on each V100 stage and 20 layers on each A100 stage.
    - Re-profile stage times, then move layers from the slowest stage to faster stages until per-micro-batch stage latency is balanced.

    **Conclusion & Interpretation:**
    - **Result: measured-latency-balanced heterogeneous stages.** A 10/10/10/10/20/20 layer split is a defensible starting point only if profiling supports the 2x A100 throughput assumption; final placement must account for activation memory, communication, and optimizer sharding.
