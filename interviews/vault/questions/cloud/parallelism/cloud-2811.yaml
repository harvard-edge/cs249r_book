title: Pipeline Parallelism across Asymmetric Clusters
scenario: 'Architect a distributed fine-tuning framework for a 65B model using a highly asymmetric cluster: 4x V100 32GB nodes and 2x A100 80GB nodes.'
question: How would you fine-tune a 65B model across 4 V100 32GB nodes and 2 A100 80GB nodes without stragglers?
details:
  realistic_solution: Use heterogeneous pipeline stages, but do not rely on pipeline parallelism alone. Shard the 65B model with memory-aware FSDP or tensor parallelism inside each stage, use activation checkpointing, and place larger stage groups on the two A100 80GB nodes. Give the four V100 32GB nodes smaller middle-layer stages or offload-heavy adapter/LoRA work, and tune micro-batch count so the slow V100 stages are not on the critical path for every bubble. If full-parameter fine-tuning is required, use CPU/NVMe optimizer offload or ZeRO-style sharding for optimizer state; otherwise, parameter-efficient fine-tuning is the more realistic way to use this asymmetric cluster without the V100s dominating step time.
  common_mistake: |
    **The Pitfall:** Using synchronous Data Parallelism or uniform Pipeline Parallelism across the mixed fleet.
    **The Rationale:** Standard distributed frameworks assume homogeneous hardware, so engineers default to these without considering the hardware asymmetry.
    **The Consequence:** The massive compute of the A100s is throttled down to the speed of the slowest V100 node, destroying overall cluster throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 V100 32GB nodes and 2 A100 80GB nodes.
    - Model: 65B parameters, about 130 GB FP16 weights before gradients and optimizer state, with 80 transformer layers.
    - Use capacity-based placement as a first approximation, then validate with measured stage latency.

    **Calculations:**
    - Memory capacity ratio: A100 / V100 = 80 GB / 32 GB = 2.5x.
    - Let one V100 stage hold x layers and one A100 stage hold 2.5x layers by memory.
    - Total weighted capacity: 4x + 2(2.5x) = 9x.
    - 80 layers / 9 ≈ 8.9 layers per V100 unit.
    - A capacity-balanced integer split is 9 layers on each V100 node (36 total) and 22 layers on each A100 node (44 total), summing to 80 layers.
    - This split does not include optimizer state; full fine-tuning still needs FSDP/ZeRO/offload or parameter-efficient tuning.

    **Conclusion & Interpretation:**
    - **Result: Capacity-Balanced Heterogeneous Stages.** A100 nodes carry about 2.4x the layer count of a V100 node, and measured compute latency plus memory pressure should drive final micro-batch and sharding choices.
