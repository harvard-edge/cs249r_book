title: Diagnosing High Pipeline Bubble Overhead
scenario: 'You are training a 65B parameter language model across 64 A100 GPUs using 8-way Pipeline Parallelism (PP=8) and 8-way Tensor Parallelism (TP=8). Your global batch size is fixed at 1024 sequences. Currently, you are splitting the global batch into 8 microbatches (microbatch size = 128). Profiling reveals poor GPU utilization (~53%), dominated by pipeline bubbles.'
question: 'How should you change the microbatching to reduce PP bubble overhead and exceed 85% utilization without changing global batch size?'
details:
  realistic_solution: 'Decrease the microbatch size to significantly increase the number of microbatches ($m$) per pipeline flush. By reducing the microbatch size from 128 to 16, the number of microbatches increases from 8 to 64, radically shrinking the bubble fraction while mathematically preserving the global batch size.'
  common_mistake: |
    **The Pitfall:** Suggesting an increase in the global batch size, complex interleaved scheduling, or overlapping communication.
    **The Rationale:** Candidates apply standard GPU utilization fixes without recognizing that pipeline parallelism has structural idle time dictated purely by the ratio of pipeline stages to microbatches.
    **The Consequence:** Changing global batch size alters model convergence, while other techniques fail to resolve the fundamental pipeline bubble math, leaving MFU crippled.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Global Batch: 1024. PP stages (p) = 8.
       - Current microbatches (m) = 8 (size 128).
       - Target Utilization: > 85%.
    2. **Calculations:**
       - Bubble Fraction Formula: (p - 1) / (m + p - 1).
       - Current Bubble (m=8): (8 - 1) / (8 + 8 - 1) = 7 / 15 = 46.7% idle (53.3% util).
       - Adjusting Size: Decrease microbatch size to 16 -> new m = 1024 / 16 = 64.
       - New Bubble (m=64): 7 / (64 + 8 - 1) = 7 / 71 = 9.9% idle.
    3. **Conclusion & Interpretation:**
       - **Result: Pipeline-Bubble-Bound. Shrinking the microbatch size to 16 increases m to 64, boosting compute utilization to ~90.1% and solving the idle time problem.**
