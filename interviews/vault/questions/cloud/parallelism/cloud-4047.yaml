title: Gradient Synchronization for ZeRO Stage 3
scenario: ZeRO Stage 3 partitions model parameters, gradients, and optimizer states across GPUs. Forward and backward passes require all-gather of parameters before each layer and reduce-scatter of gradients after.
question: What is the ZeRO-3 per-layer communication schedule and cost for a 64-GPU, 30B-parameter, 60-layer training run?
details:
  realistic_solution: The 30B parameters (60GB FP16) spread across 60 layers give about 1GB of parameters per layer. The per-layer ZeRO-3 schedule requires an AllGather before the forward layer, an AllGather before the backward layer, and a ReduceScatter after the backward gradient is produced. Each primitive moves (N-1)/N × layer_size bytes over the bus. With 64 GPUs, this is 63/64 × 1GB per operation, so the per-layer traffic is 3 × 63/64 × 1GB ≈ 2.95GB. Across 60 layers, total iteration traffic is about 177GB, before considering overlap with compute.
  common_mistake: |
    **The Pitfall:** Applying the 2*(N-1)/N AllReduce factor to AllGather and ReduceScatter independently.
    **The Rationale:** Candidates double-count traffic by forgetting that AllReduce is composed of ReduceScatter + AllGather, and each alone only moves (N-1)/N data.
    **The Consequence:** Overestimating ZeRO-3 bus traffic by a factor of 2, leading to flawed networking design decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 30B parameters = 60GB FP16.
    - GPUs (N): 64. Layers: 60.

    **Calculations:**
    - Traffic per layer: AllGather (fwd) + AllGather (bwd) + ReduceScatter.
    - Cost: 3 * (63/64) * 1 GB = ~2.95 GB per layer.
    - Total iteration traffic: 60 layers * 2.95 GB = ~177.2 GB.

    **Conclusion & Interpretation:**
    - **Result: ZeRO-3 moves about 2.95 GB per layer, or 177.2 GB per iteration.** Whether this stalls depends on bandwidth, compute time, and prefetch overlap, which are not specified here.
