title: Optimizing Large Language Model Pipeline Parallelism on AMD MI300X
scenario: You are tasked with deploying an extremely large language model (LLM) with 500 billion FP16 parameters for real-time inference in a cloud environment. The chosen hardware platform is a cluster of AMD MI300X accelerators. Your current baseline implementation uses a naive pipeline setup with a micro-batch size of 1. This configuration results in substantial pipeline bubble overhead, leading to unacceptably high end-to-end inference latency and low device utilization.
question: How would you optimize pipeline parallel inference for a 500B FP16 LLM on MI300X to reduce bubbles, improve throughput, and lower latency?
details:
  realistic_solution: |
    Implement an interleaved pipeline schedule (e.g., 1F1B or interleaved GPipe) with a micro-batch size strictly greater than 1.
    The micro-batch size must be large enough to generate sufficient computational work per stage to mask the ~800 GB/s Infinity Fabric communication overhead between MI300X devices.
    Additionally, map pipeline stages topologically to ensure dense tensor transfers remain on intra-node high-bandwidth links, while minimizing slower cross-node Ethernet/InfiniBand traffic.
  common_mistake: |
    **The Pitfall:** Assuming that a micro-batch size of 1 is optimal for inference latency or erroneously using HBM bandwidth for inter-device communication estimates.
    **The Rationale:** Engineers often fixate on raw single-batch Time-To-First-Token and ignore the horrific pipeline bubble overhead. Furthermore, it is a catastrophic architectural error to mistake on-die HBM memory bandwidth (5.3 TB/s) for inter-device Infinity Fabric bandwidth (~800 GB/s).
    **The Consequence:** The model suffers severe stalls because communication time is drastically underestimated, leading to OOM errors and an inability to hide latency via asynchronous transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 500B FP16 parameters (1 TB weights).
    - Accelerator: AMD MI300X (192 GB HBM3, 1307 TFLOPS).
    - Interconnect: Infinity Fabric (~800 GB/s inter-GPU).

    **Calculations:**
    - Capacity limit: 1000 GB / 192 GB = at least 6 devices required.
    - Transfer Time: A 10 GB activation tensor requires 10 GB / 800 GB/s = 12.5 ms over Infinity Fabric (not HBM bandwidth).
    - Pipeline Efficiency: If P=6 and M=1, Efficiency = 1 / (1 + 6 - 1) = 16.7%.

    **Conclusion & Interpretation:**
    - **Result: Communication-Bound.** Utilizing a micro-batch size of 1 causes the 12.5 ms network transfer to overwhelmingly dominate compute, resulting in a massive pipeline bubble. Micro-batch sizes must be strictly > 1 to mask interconnect latency.
