title: SSP Throughput vs BSP
scenario: You run BSP training on 32 GPUs. The median step time is 100ms but 2 straggler GPUs take 180ms per step. You switch to SSP with staleness bound S=5.
question: "With BSP at 180 ms due to persistent stragglers, what throughput improvement should SSP with S=5 provide?"
details:
  realistic_solution: 'The throughput improvement is 0%. A common trap with Stale Synchronous Parallel (SSP) is assuming it averages out speeds for *persistent* stragglers. SSP only improves throughput for *transient* stragglers (random jitter), not persistent hardware imbalances.'
  common_mistake: |
    **The Pitfall:** Assuming SSP averages the step times or that stragglers only cause stalls occasionally.
    **The Rationale:** Candidates misunderstand that SSP provides relief for transient jitter, not persistent hardware imbalances.
    **The Consequence:** They deploy complex SSP configurations expecting massive speedups, but achieve 0% improvement in steady-state throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 GPUs. Fast workers = 100 ms. Persistent stragglers = 180 ms.
       - SSP staleness bound S=5.
    2. **Calculations:**
       - BSP throughput = 1 / 180 ms = 5.55 steps/sec.
       - SSP fast workers get S=5 steps ahead (100 ms × 5 = 500 ms).
       - After S steps, fast workers must wait for the 180 ms straggler to complete step 1.
       - Steady-state pacing is identically locked to 180 ms per step.
    3. **Conclusion & Interpretation:** **SSP provides 0% improvement for persistent stragglers, locking throughput to 5.55 steps/sec. Result: Compute-Bound (Straggler).**
