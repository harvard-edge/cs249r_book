title: Prefill-Decode Disaggregation Overlap in Production LLM Serving
scenario: Your LLM serving cluster disaggregates prefill (compute-bound, H100s) from decode (memory-bandwidth-bound, MI300X with 192GB). After prefill generates the KV cache, it must be transferred to a decode GPU. With 8192-token contexts, KV cache is 4GB for a 70B model. Transfer over 100 Gbps Ethernet takes 320ms — longer than the prefill itself (200ms).
question: How would you overlap a 4GB KV-cache transfer over 100 Gbps Ethernet to minimize time-to-first-token in disaggregated serving?
details:
  realistic_solution: |
    Implement streaming KV transfer with incremental decode start. After prefill produces the KV cache, send it layer-by-layer instead of waiting for a monolithic 4GB copy. As each 50MB layer arrives on the decode GPU, immediately run that layer's first-token decode slice while later layers continue transferring. With one transfer stream and one decode stream, transfer is the bottleneck: each layer transfer takes 4ms and each decode slice takes 0.6ms, so TTFT is about 521ms. The 100 Gbps Ethernet link remains the architectural bottleneck; moving to 400 Gbps cuts the transfer stage and makes the pipeline much closer to decode-bound.
  common_mistake: |
    **The Pitfall:** Waiting for the entire KV cache transfer to complete before starting the decode phase.
    **The Rationale:** Engineers default to sequential request processing flows, treating KV cache materialization as an atomic dependency rather than a streamable resource that can be pipelined layer-by-layer.
    **The Consequence:** The 320ms network transfer dominates the critical path, making disaggregation significantly slower than colocated serving and destroying Time-to-First-Token (TTFT) SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Cache: 4 GB (70B model, 8192 tokens).
    - Network: 100 Gbps Ethernet (12.5 GB/s).
    - Pre-fill compute: 200 ms.
    - Decode per layer: 0.6 ms (80 layers).

    **Calculations:**
    - Sequential Transfer: 4 GB / 12.5 GB/s = 320 ms transfer time.
    - Sequential TTFT: 200ms prefill + 320ms transfer + 48ms decode = 568ms.
    - Pipelined Transfer: 50 MB per layer / 12.5 GB/s = 4 ms per layer.
    - Pipeline model: after prefill, transfer layer 1, decode layer 1 while layer 2 transfers, and continue with one transfer stage and one decode stage.
    - Critical path after prefill = first transfer + 79 bottleneck slots + final decode slice.
    - Pipelined TTFT: 200ms + 4ms + 79 * max(4ms, 0.6ms) + 0.6ms = 520.6ms.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound.** Even with layer-by-layer streaming, the 4ms transfer time dominates the 0.6ms decode time per layer. Migrating to a 400 Gbps InfiniBand network drops layer transfer to 1ms, slicing TTFT down significantly.
