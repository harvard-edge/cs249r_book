title: Evaluating H100 Upgrades for Hybrid Recommendation Models
scenario: 'Your team is considering upgrading your training cluster from 8x A100 GPUs to 8x H100 GPUs to speed up the training of a hybrid recommendation model. The current training loop takes 100 hours. Profiling shows that 70% of the time is spent on GPU matrix multiplications (which the H100 accelerates by 3x over the A100), 20% on CPU-bound data preprocessing that cannot be easily parallelized further, and 10% on network communication (which remains unchanged). The H100 instance costs 4x more per hour.'
question: 'Is the 8x H100 upgrade justified given the 3x GPU speedup, unchanged CPU/network time, and 4x hourly cost?'
details:
  realistic_solution: 'Apply Amdahl''s Law. The accelerated fraction (GPU) is 0.7 with a 3x speedup. The unaccelerated fraction is 0.3. The new time is 100 * (0.7/3 + 0.3) = 53.3 hours. The overall speedup is 1.87x. Since the new cluster costs 4x more per hour, the total training cost increases by 2.13x. The upgrade is not justified without optimizing the data and network pipelines first.'
  common_mistake: |
    **The Pitfall:** Assuming the 3x GPU speedup translates directly to a 3x overall training speedup.
    **The Rationale:** Candidates often ignore Amdahl's Law and forget to account for the unaccelerated CPU and network components.
    **The Consequence:** Massively overestimating the ROI of the hardware upgrade, leading to an unjustified 2.13x cost increase.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU execution fraction: 70% with 3x speedup.
    - Unaccelerated fraction: 30% (20% CPU + 10% network).
    - H100 hourly cost is 4x the A100 hourly cost.

    **Calculations:**
    - New training time fraction: (0.7 / 3) + 0.3 = 0.233 + 0.3 = 0.533.
    - Overall Speedup: 1 / 0.533 = 1.87x.
    - Total Cost Multiplier: (4x hourly cost) / (1.87x speedup) = 2.13x.

    **Conclusion & Interpretation:**
    - **Result: 2.13x Total Cost Increase** (The upgrade is not justified without optimizing the data and network pipelines first).
