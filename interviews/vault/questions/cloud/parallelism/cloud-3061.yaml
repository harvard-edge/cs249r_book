title: 'Pipeline Parallelism Realization: Activation Memory with Gradient Checkpointing'
scenario: A 40-stage pipeline (one transformer layer per stage) trains a 40B model. For sequence length 4096 and batch size 8, without gradient checkpointing, each stage stores all intermediate activations. With checkpointing, only the layer input is stored.
question: How much activation memory is saved by checkpointing per stage, and does it fit in an 80GB H100 without it?
details:
  realistic_solution: 'Activation-only answer: single transformer layer activations without checkpointing are approximately attention plus FFN intermediates, modeled as 12 * hidden * seq * batch * 2 bytes. With hidden = 8192, seq = 4096, and batch = 8, that is 12 * 8192 * 4096 * 8 * 2 = 6.44GB per stage. With checkpointing, store only the layer input: 8192 * 4096 * 8 * 2 = 537MB. Activation memory saved is 6.44GB - 0.537GB = 5.90GB per stage, or about a 12x reduction. Fit answer: including per-stage BF16 weights (2GB), BF16 gradients (2GB), and FP32 Adam m/v states (8GB), the uncheckpointed per-stage footprint is about 18.44GB, so this one-layer-per-stage estimate fits in an 80GB H100 without checkpointing.'
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing is a "free" memory optimization with no downside.
    **The Rationale:** It's easy to look at the massive memory savings and blindly enable checkpointing, forgetting the strict computational trade-off.
    **The Consequence:** Training compute increases by roughly 33% because of the mandatory extra forward pass, significantly increasing total training time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40B total params, 40 layers -> 1B params/layer, Hidden dim ≈ 8192.
       - Sequence length 4096, batch size 8.
    2. **Calculations:**
       - Uncheckpointed Activations: 12 × 8192 × 4096 × 8 × 2 = 6.44 GB.
       - Checkpointed Activations: 1 × 8192 × 4096 × 8 × 2 = 537 MB.
       - Activation memory saved: 6.44GB - 0.537GB = 5.90GB per stage.
       - Fit check without checkpointing: Weights (2GB) + Gradients (2GB) + Optimizer m/v (8GB) + Activations (6.44GB) = 18.44 GB.
    3. **Conclusion & Interpretation:**
       - **Result:** Checkpointing saves about 5.90GB of activation memory per stage, reducing activations from 6.44GB to 537MB. Separately, the estimated full uncheckpointed per-stage footprint is 18.44GB, so it fits in an 80GB H100.
