title: Pipeline Parallelism Activation Checkpointing Interaction
scenario: You are training a 70B model with PP=8, TP=8, and 32 micro-batches using 1F1B scheduling. Each pipeline stage holds ~8.75B parameters.
question: With selective activation checkpointing, how much activation memory do you save per stage and what recomputation cost should you expect?
details:
  realistic_solution: Under 1F1B, assume each pipeline stage has about 8 resident micro-batches at peak. Without checkpointing, activations are about 3 GB per resident micro-batch, so each stage holds about 8*3 = 24 GB. With selective checkpointing, recomputing the attention portion and storing the rest reduces resident activations to about 1.2 GB per micro-batch, or 8*1.2 = 9.6 GB per stage. The per-stage savings are therefore 24 - 9.6 = 14.4 GB, a 60% reduction. The expected recomputation cost is workload- and kernel-dependent, but a selective policy like this is typically about 8-12% training slowdown, so use ~10% as the planning estimate rather than the 30%+ cost of full checkpointing.
  common_mistake: |
    **The Pitfall:** Applying full activation checkpointing uniformly.
    **The Rationale:** Treating all activations as equally expensive to compute and memory-intensive to store.
    **The Consequence:** Recomputing expensive MLP layers when only attention activations (which are cheap to recompute) needed to be checkpointed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1F1B peak residency: about 8 stored micro-batches per pipeline stage.
    - Without checkpointing: 3 GB per micro-batch.
    - Selective checkpointing: 1.2 GB stored per resident micro-batch after recomputing attention.

    **Calculations:**
    - Without checkpointing: 8 * 3 GB = 24 GB activations.
    - Selective (recompute attention, store MLP): 8 * 1.2 GB = 9.6 GB.
    - Savings: 24 GB - 9.6 GB = 14.4 GB.
    - Memory reduction: 14.4 GB / 24 GB = 60%.
    - Planning recomputation overhead: about 8-12%, use ~10%.

    **Conclusion & Interpretation:**
    - **Result: 14.4 GB saved per stage**. Expect about 60% activation-memory reduction at roughly 10% recomputation overhead for this selective checkpointing setup.
