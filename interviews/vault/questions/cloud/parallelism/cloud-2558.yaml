title: Cloud Fully Sharded Data Parallel L2 0
scenario: You are explaining FSDP to a team that has only used PyTorch's DataParallel.
question: How does FSDP differ from PyTorch DataParallel and DDP, and why does it enable training larger models?
details:
  realistic_solution: |
    Standard DataParallel (DP) replicates the full model state on every GPU. DistributedDataParallel (DDP) optimizes communication via bucketed AllReduce but still maintains full replication.
    Fully Sharded Data Parallel (FSDP) shards parameters, gradients, and optimizer states across the data parallel group (equivalent to ZeRO-3). Before each layer's forward and backward pass, FSDP dynamically reconstructs the layer via an All-Gather operation, and immediately frees it afterward.
    By trading network communication (All-Gather/Reduce-Scatter) for memory, FSDP enables training models N times larger than a single GPU's VRAM capacity.
  common_mistake: |
    **The Pitfall:** Confusing FSDP with Pipeline or Tensor Model Parallelism.
    **The Rationale:** Because FSDP splits up the model parameters, engineers frequently assume it fundamentally partitions the model execution graph across nodes rather than simply distributing the storage of redundant state.
    **The Consequence:** Misunderstanding FSDP leads to incorrect assumptions about batch processing, activation memory footprints, and network communication bottlenecks, resulting in poorly configured training runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 13B parameters (AdamW optimizer).
    - Memory Requirement: 16 bytes per parameter (FP32 master, gradients, states, FP16 weights).
    - Hardware: 8x 80 GB GPUs.

    **Calculations:**
    - Standard DDP Footprint: 13B * 16 bytes = 208 GB per GPU.
    - FSDP Sharded Footprint: 208 GB / 8 GPUs = 26 GB per GPU.

    **Conclusion & Interpretation:**
    - **Result: Memory Capacity-Bound.** Standard DDP duplicates the full 208 GB state on every GPU, causing immediate OOM on an 80 GB card. FSDP successfully shards the parameters, achieving an 8x memory savings at rest.
