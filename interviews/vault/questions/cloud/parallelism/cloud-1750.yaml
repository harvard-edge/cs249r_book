title: Process Group Topology for 3D Parallelism
scenario: 'You are architecting the process group topology for training a 175B parameter model on 1024 GPUs using 3D parallelism (TP=8, PP=16, DP=8). Each node has 8 GPUs connected via NVLink, and nodes are connected via InfiniBand.'
question: 'Should TP or DP process groups be mapped to intra-node NVLink for TP=8, PP=16, DP=8 training, and why?'
details:
  realistic_solution: 'Map the Tensor Parallelism (TP) process group to the intra-node NVLink. TP requires an AllReduce of activations for every transformer layer in every microbatch, demanding massive, latency-sensitive bandwidth. Data Parallelism (DP) only requires an AllReduce of gradients once per iteration, which can be heavily overlapped with the backward pass using standard InfiniBand inter-node links.'
  common_mistake: |
    **The Pitfall:** Assuming Data Parallel (DP) requires the highest bandwidth and should use NVLink.
    **The Rationale:** Candidates know DP syncs the entire model's gradients and assume it must be the bottleneck, failing to realize DP communication happens once per iteration and can be overlapped with compute.
    **The Consequence:** Forcing Tensor Parallelism (TP) across slow InfiniBand links, drastically increasing step time and destroying GPU utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: NVLink (900 GB/s), InfiniBand (50 GB/s).
    - Network traffic: 96 layers, 8 microbatches.

    **Calculations:**
    - TP transfer per iteration: ~1.6 GB/layer * 96 layers * 8 microbatches ≈ 1.2 TB.
    - TP on IB (50 GB/s) takes 24s. On NVLink (900 GB/s) takes ~1.3s.
    - DP transfer per iteration: 350 GB (takes ~7s on IB, but completely overlapped with compute).

    **Conclusion & Interpretation:**
    - **Result: Forcing TP onto inter-node InfiniBand increases iteration time by >20s (Bandwidth-Bound).**
