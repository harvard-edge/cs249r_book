title: '1F1B vs GPipe: Memory Advantage of Interleaved Scheduling'
scenario: You have a 30B model partitioned across 8 H100 GPUs using pipeline parallelism with 16 micro-batches.
  Compare the peak activation memory on a single GPU between GPipe (all-forward-then-all-backward) and
  1F1B (one-forward-one-backward) scheduling. Why does 1F1B win on memory?
question: What is the peak activation memory per GPU under GPipe versus 1F1B, and why does 1F1B win on
  memory?
details:
  realistic_solution: 'GPipe: Each stage runs all M=16 forward passes before any backward pass. Peak activation
    memory on a stage = M × (activations per micro-batch) = 16× per-micro-batch activations. 1F1B: After
    the warmup phase (P-1 = 7 forward passes), each stage alternates one forward and one backward. The
    backward pass frees activations immediately. Peak activation memory = P × (activations per micro-batch)
    = 8× per-micro-batch activations. Memory savings: 16/8 = 2× reduction. For a 30B model split 8 ways,
    each stage holds ~3.75B params. Per micro-batch activation memory might be ~2 GB, so GPipe peak =
    32 GB vs 1F1B peak = 16 GB. This is the difference between fitting on an 80 GB H100 and OOMing.'
  common_mistake: '**The Pitfall:** Thinking 1F1B reduces bubble time.

    **The Rationale:** Engineers incorrectly assume that interleaved scheduling reduces the idle time
    in the pipeline.

    **The Consequence:** They miss that the bubble fraction is identically the same as GPipe; the true
    advantage is purely in a massive reduction of activation memory, preventing OOMs.'
  napkin_math: '**Assumptions & Constraints:**

    - Model: 30B partitioned across 8 GPUs.

    - GPipe micro-batches (M) = 16.

    - 1F1B pipeline stages (P) = 8.

    - Activation memory per micro-batch = 2 GB.


    **Calculations:**

    - GPipe peak activations: M * act = 16 * 2GB = 32 GB.

    - 1F1B peak activations: P * act = 8 * 2GB = 16 GB.

    - Savings: 50%.

    - Bubble fraction: (P-1)/(M+P-1) = 7/23 = 30.4%.


    **Conclusion & Interpretation:**

    - **Result: 50% memory savings (Memory-Capacity-Bound)**. 1F1B drastically reduces memory pressure
    without changing the pipeline bubble overhead.'
