title: The Data Parallel Straggler
scenario: You're running standard Data Parallel (DDP) training on 256 GPUs. One specific node has a slightly degraded cooling fan, causing its 8 GPUs to thermal throttle and run 15% slower than the rest of the cluster. The network is perfectly healthy.
question: By exactly how much does this single degraded node slow down the entire 256-GPU training job?
details:
  realistic_solution: In synchronous DDP/BSP training, the slowest rank gates each step. If the degraded node's GPUs run at 85% of normal throughput, the global step time becomes 1 / 0.85 = 1.176x baseline, so the job is about 17.6% slower end to end. The 256-GPU job still costs $768 per wall-clock hour, but the dollar impact should be reported as wasted wait time or extra runtime, not as simply 15% of the hourly cluster bill.
  common_mistake: |
    **The Pitfall:** Assuming the slowdown is averaged across the cluster.
    **The Rationale:** Candidates often divide the 15% slowdown by 256 GPUs, mistakenly applying asynchronous logic to a synchronous bulk-synchronous parallel (BSP) workload.
    **The Consequence:** Ignoring critical hardware anomalies, allowing a minor cooling issue to waste hundreds of dollars over a long run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Synchronous DDP forces all GPUs to wait for the slowest one.
    - 256 GPUs cost $3/hr each.
    - Degraded node throughput is 15% lower, so it runs at 0.85x normal speed.

    **Calculations:**
    - If a healthy step takes T, the degraded rank takes T / 0.85 = 1.176T.
    - Job runtime slowdown = 1.176 - 1 = 0.176, or about 17.6%, because synchronous DDP waits at each step for the slowest rank.
    - Cluster spend remains 256 GPUs × $3/hr = $768 per wall-clock hour.
    - Illustrative extra spend per baseline hour of useful progress = 0.176 × $768 ≈ $135/hour. Healthy-rank idle waste alone is about 0.176 × 248 × $3 ≈ $131/hour.

    **Conclusion & Interpretation:**
    - **Result: 17.6% Step-Time Slowdown (Straggler-Bound)**. A single hardware anomaly forces synchronous workloads to wait for the slowest rank; cost estimates should be framed as extra runtime or healthy-rank idle time.
