title: The Data Parallel Straggler
scenario: You're running standard Data Parallel (DDP) training on 256 GPUs. One specific node has a slightly degraded cooling fan, causing its 8 GPUs to thermal throttle and run 15% slower than the rest of the cluster. The network is perfectly healthy.
question: By exactly how much does this single degraded node slow down the entire 256-GPU training job?
details:
  realistic_solution: In synchronous DDP/BSP training, the slowest rank gates each step, so a node whose GPUs run 15% slower makes the job's wall-clock step time about 15% longer. 256 GPUs * $3/hr = $768/hour. A 15% slowdown wastes about $115.20 every wall-clock hour in idle compute time across the healthy ranks, vastly exceeding the cost of replacing the degraded cooling fan.
  common_mistake: |
    **The Pitfall:** Assuming the slowdown is averaged across the cluster.
    **The Rationale:** Candidates often divide the 15% slowdown by 256 nodes, mistakenly applying asynchronous logic to a synchronous bulk-synchronous parallel (BSP) workload.
    **The Consequence:** Ignoring critical hardware anomalies, allowing a minor cooling issue to waste hundreds of dollars over a long run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Synchronous DDP forces all GPUs to wait for the slowest one.
    - 256 GPUs cost $3/hr each.
    - Degraded node runs 15% slower.

    **Calculations:**
    - Job runtime slowdown ≈ 15% because synchronous DDP waits at each step for the slowest rank.
    - Compute waste = 256 GPUs × $3/hr = $768/hour.
    - Cost impact = 15% of $768/hour = $115.20/hour, often rounded to about $115/hour.

    **Conclusion & Interpretation:**
    - **Result: 15% Slowdown (Compute-Bound)**. A single hardware anomaly forces synchronous workloads to throttle globally, wasting massive compute resources.
