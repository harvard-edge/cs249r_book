title: Pipeline Split Spec
scenario: A team wants to pipeline a 48-layer model across 6 GPUs.
question: What specific information must be known before assigning layers to pipeline stages?
details:
  realistic_solution: You need per-layer compute time, activation size, parameter size, memory per stage, microbatch count, inter-stage bandwidth, and bubble tolerance. Equal layer count is not enough because layers can have different costs and activation sizes.
  common_mistake: |
    **The Pitfall:** Splitting 48 layers into 6 equal groups of 8 and assuming the pipeline is balanced.
    **The Rationale:** Candidates erroneously assume all layers have identical computational cost and activation memory footprints.
    **The Consequence:** A heavily imbalanced pipeline where the slowest stage bottlenecks the entire system, leaving other GPUs starved and idling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline stages: 6. Layers: 48.
    - Example imbalance: 5 stages take 25 ms, 1 stage takes 40 ms.

    **Calculations:**
    - Theoretical perfect balance = (5*25 + 40) / 6 = 27.5 ms.
    - Actual pipeline throughput = max(25, 40) = 40 ms.

    **Conclusion & Interpretation:**
    - **Result: 40 ms (Compute-Bound)**. The entire pipeline is bottlenecked by the slowest stage (40ms), wasting compute on other GPUs.
