title: The Tensor Parallelism Degree
scenario: 'You''re serving a 70B LLM and must choose the tensor parallelism (TP) degree: TP=2, TP=4, or
  TP=8 across H100 GPUs connected via NVLink. Higher TP reduces per-GPU memory and per-token latency,
  but adds communication overhead. Calculate the optimal TP degree for a latency target of 40ms per output
  token.'
question: Which TP degree—2, 4, or 8—is optimal for the 70B LLM on H100 NVLink under a 40 ms per-token
  latency target?
details:
  realistic_solution: Each transformer layer with TP requires two AllReduce operations (one after the
    attention projection, one after the MLP). The AllReduce volume per operation is $2 \times (TP-1)/TP
    \times \text{hidden\_size} \times \text{batch} \times \text{bytes}$. With NVLink at 900 GB/s bidirectional,
    the communication time per layer is small but multiplies across 80 layers and 2 AllReduces per layer.
  common_mistake: '**The Pitfall:** ''Use TP=8 for maximum parallelism — more GPUs always means lower
    latency.''

    **The Rationale:** This ignores that each TP step requires an AllReduce synchronization, and the communication
    cost grows with TP degree.

    **The Consequence:** Unnecessary network overhead increases total step latency rather than reducing
    it.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 70B model, 80 layers, FP16.

    - NVLink 900 GB/s bidirectional (450 GB/s effective).

    - Message latency overhead: 5μs.


    **Calculations:**

    - TP=2 Total: 20.9 ms (weight) + 0.006 ms (comm) + 1.6 ms (latency) ≈ 22.5 ms.

    - TP=4 Total: 10.4 ms (weight) + 0.009 ms (comm) + 4.8 ms (latency) ≈ 15.2 ms.

    - TP=8 Total: 5.22 ms (weight) + comm + latency ≈ 15.7 ms.


    **Conclusion & Interpretation:**

    - **Result: TP=4 is optimal (15.2 ms).** It meets the 40 ms target with the best balance of weight
    read speed and communication overhead.

    '
