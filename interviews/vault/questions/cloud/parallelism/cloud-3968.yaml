title: Overlapping Collective Permute with MoE Expert Computation on TPU
scenario: Your MoE model uses collective_permute to route tokens to expert chips on a TPU v5e pod. XLA profiles show collective_permute takes 12ms per MoE layer, and expert computation takes 8ms.
question: Can overlap still work between ICI transfers and expert computation on TPU v5e?
details:
  realistic_solution: 'XLA''s approach to overlap on TPU: (1) XLA analyzes data dependencies in the HLO graph and identifies computation independent of collective_permute output. (2) Non-MoE layers between MoE layers can be scheduled during collective_permute. (3) XLA uses ''async collectives''. (4) TPU''s ICI shares bandwidth with HBM access, so heavy computation can slow down ICI transfers. (5) Effective overlap on TPU: 40-60% of collective_permute can be hidden, vs 80-90% on GPU.'
  common_mistake: |
    **The Pitfall:** Assuming TPU cannot overlap compute and communication because it lacks a separate DMA engine like GPU's copy engine.
    **The Rationale:** Candidates often know GPUs use dedicated copy engines for overlap and assume the lack of this on TPU means strict serialization.
    **The Consequence:** Failing to realize XLA's compiler can schedule ICI transfers to overlap with independent computations, leading to inaccurate performance modeling.
  napkin_math: |
    **Assumptions & Constraints:**
    - collective_permute takes 12ms.
    - Expert computation takes 8ms.
    - TPU hides 60% of communication.
    - GPU hides 90% of communication.

    **Calculations:**
    - Unoverlapped Time: 12ms + 8ms = 20ms.
    - TPU Overlap: 12ms * 60% = 7.2ms hidden.
    - TPU Exposed: 12ms - 7.2ms = 4.8ms.
    - TPU Total Time: 4.8ms exposed + 8ms compute = 12.8ms per layer.
    - GPU Overlap: 12ms * 90% = 10.8ms hidden.
    - GPU Exposed: 12ms - 10.8ms = 1.2ms.
    - GPU Total Time: 1.2ms exposed + 8ms compute = 9.2ms per layer.
    - Penalty: (12.8ms - 9.2ms) / 9.2ms = 39%.

    **Conclusion & Interpretation:**
    - **Result: 39% penalty (Communication-Bound)**. TPU pays a 39% penalty vs GPU on MoE layers due to shared fabric, but compensates with lower $/TFLOP.
