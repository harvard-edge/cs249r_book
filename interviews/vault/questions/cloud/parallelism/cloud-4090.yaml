title: AllReduce vs AllGather Cost in TP
scenario: You are analyzing the communication volume of Megatron-LM's Tensor Parallelism on an 8x MI300X node using a ring algorithm for a tensor of size M bytes across P GPUs.
question: For M bytes across P GPUs, what are the ring AllReduce vs AllGather communication volumes, and which operations do Megatron's row and column parallel layers use?
details:
  realistic_solution: 'Ring AllGather: each GPU sends its local shard (M/P bytes) around the ring in P-1 steps. Total bytes per GPU = (P-1) * M/P, which approaches M for large P. Ring AllReduce: equivalent to ReduceScatter + AllGather. Total bytes per GPU = 2 * (P-1)/P * M, which approaches 2M for large P. In the standard Megatron formulation used in this question, a column-parallel linear layer produces sharded output and uses an AllGather when the full activation is needed in the forward pass; a row-parallel linear layer produces partial sums and uses an AllReduce in the forward pass to combine those partial outputs.'
  common_mistake: |
    **The Pitfall:** Believing AllReduce and AllGather have vastly different communication costs.
    **The Rationale:** Candidates assume "Reduce" involves significantly more data movement than "Gather," without understanding the mechanics of ring-based collective implementations.
    **The Consequence:** Making incorrect architectural choices when designing tensor parallel communication strategies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ring algorithm used for collectives.
    - Tensor size M bytes, P GPUs.
    - Example: M = 32 MB, P = 8.

    **Calculations:**
    - Ring AllGather per-GPU volume: (P-1) * (M/P) = ((P-1)/P) * M, which approaches M.
    - Ring AllReduce per-GPU volume: ReduceScatter + AllGather = 2 * ((P-1)/P) * M, which approaches 2M.
    - For M = 32 MB, P = 8: AllGather per GPU = (7/8) * 32 = 28 MB.
    - AllReduce per GPU = 2 * (7/8) * 32 = 56 MB.

    **Conclusion & Interpretation:**
    - **Result: 2x per-GPU volume for AllReduce versus AllGather.** Column-parallel forward uses AllGather when it needs a full activation, while row-parallel forward uses AllReduce to combine partial sums.
