title: The FSDP vs DDP Memory Trade-off
scenario: 'Your team wants to fine-tune LLaMA-2 7B in a single node. An engineer proposes standard DDP. Another says FSDP saves memory. The first engineer argues FSDP adds communication overhead for a model that already fits in memory.'
question: 'Which engineer is correct regarding the use of DDP versus FSDP for a 7B model, and what are the exact memory numbers?'
details:
  realistic_solution: 'Both are partially right. DDP replicates model and optimizer per GPU, requiring full memory footprint. FSDP shards parameters, gradients, and optimizer states across GPUs, reducing per-GPU footprint but adding AllGather and ReduceScatter communication overhead. On an NVLink-connected node, bisection bandwidth mitigates this overhead. FSDP enables larger micro-batch sizes and longer contexts, maximizing overall GPU utilization.'
  common_mistake: |
    **The Pitfall:** Assuming that if the parameter weights fit in memory, DDP is sufficient.
    **The Rationale:** Candidates calculate 7B parameters * 2 bytes = 14 GB, falsely concluding it easily fits, forgetting that DDP replicates the full optimizer state on every GPU.
    **The Consequence:** The training script immediately crashes with an Out-Of-Memory (OOM) error upon initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters.
    - Precision: Mixed precision training (FP16/BF16 weights, FP32 optimizer states).
    - Hardware: 8x 80GB A100s.

    **Calculations:**
    - DDP per GPU: 14 GB (weights) + 28 GB (FP32 master) + 28 GB (momentum) + 28 GB (variance) + 14 GB (gradients) = 112 GB.
    - FSDP per GPU: 112 GB / 8 GPUs = 14 GB for model state.

    **Conclusion & Interpretation:**
    - **Result: DDP requires 112 GB and OOMs instantly. FSDP leaves 66 GB for activations (Memory-Bound).**
