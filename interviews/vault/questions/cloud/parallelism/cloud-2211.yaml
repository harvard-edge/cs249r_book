title: The Backfill Scheduling Gap
scenario: Your 256-GPU cluster uses strict FIFO scheduling. A 128-GPU training job is queued behind a 256-GPU job that won't start for another 2 hours. Meanwhile, 128 GPUs sit completely idle. Cluster utilization has dropped to 50%. Your SRE team proposes backfill scheduling for the 128-GPU job, which has an estimated runtime of 1 hour.
question: "How does backfill scheduling work here, and how much of the 256 idle GPU-hours does it recover?"
details:
  realistic_solution: 'Backfill scheduling allows smaller jobs to jump ahead in the queue IF they can complete before the resources are needed by the head-of-queue job. The scheduler uses the user-provided walltime estimate: if the 128-GPU job estimates a 1-hour runtime, and the 256-GPU job needs GPUs in 2 hours, the 128-GPU job can safely backfill. This requires accurate walltime estimates — overestimates prevent backfill, underestimates risk preemption.'
  common_mistake: |
    **The Pitfall:** Assuming backfill simply means reordering the queue by job size.
    **The Rationale:** Candidates often forget that large jobs have reserved start times that must be honored.
    **The Consequence:** Proposing a backfill algorithm that delays the head-of-queue job, causing starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 GPUs idle for 2 hours, costing $2/GPU-hr.
    - 128-GPU job has a 1-hour runtime.
    - 1000-GPU cluster with 15% idle gaps.

    **Calculations:**
    - Waste without backfill = 128 GPUs * 2 hours * $2 = $512.
    - With backfill = 128-GPU job runs for 1 hour, consuming 128 GPU-hours.
    - Recovered utilization = 128/256 = 50%.
    - Annual impact = 0.15 * 1000 * 8760 * 0.5 * $2 = $1.314M.

    **Conclusion & Interpretation:**
    - **Result: $1.3M/year saved (Cluster Utilization)**. Backfill scheduling effectively monetizes fragmentation gaps.
