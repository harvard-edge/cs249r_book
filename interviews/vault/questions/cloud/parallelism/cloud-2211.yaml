title: The Backfill Scheduling Gap
scenario: Your 256-GPU cluster uses strict FIFO scheduling. A 128-GPU training job is queued behind a 256-GPU job that won't start for another 2 hours. Meanwhile, 128 GPUs sit completely idle. Cluster utilization has dropped to 50%. Your SRE team proposes backfill scheduling for the 128-GPU job, which has an estimated runtime of 1 hour.
question: How does backfill scheduling work here, and how much of the 256 idle GPU-hours does it recover?
details:
  realistic_solution: 'Backfill scheduling allows smaller jobs to jump ahead in the queue if they can complete before the resources are needed by the head-of-queue job. Here, the 128-GPU job can run for 1 hour inside the 2-hour idle window, so it recovers 128 GPU-hours out of the 256 idle GPU-hours, or 50%. This requires accurate walltime estimates: overestimates prevent backfill, while underestimates risk delaying or preempting the reserved job.'
  common_mistake: |
    **The Pitfall:** Assuming backfill simply means reordering the queue by job size.
    **The Rationale:** Candidates often forget that large jobs have reserved start times that must be honored.
    **The Consequence:** Proposing a backfill algorithm that delays the head-of-queue job, causing starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 GPUs idle for 2 hours.
    - 128-GPU job has a 1-hour runtime.

    **Calculations:**
    - Idle gap without backfill = 128 GPUs * 2 hours = 256 idle GPU-hours.
    - Backfilled work = 128 GPUs * 1 hour = 128 recovered GPU-hours.
    - Recovery fraction = 128 / 256 = 50%.

    **Conclusion & Interpretation:**
    - **Result: 128 GPU-hours recovered, or 50% of the idle gap (Cluster Utilization)**. Backfill scheduling uses fragmentation gaps without delaying the reserved head-of-queue job.
