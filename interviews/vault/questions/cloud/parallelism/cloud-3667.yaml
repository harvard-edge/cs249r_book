title: TP+PP Combined Parallelism Strategy for 540B Model
scenario: Design a parallelism strategy for training a 540B PaLM-scale model on a 256-GPU cluster. The cluster has NVLink (900GB/s intra-node) and InfiniBand (400Gbps inter-node). The model has 118 transformer layers, hidden_size=18432, 48 heads.
question: What 3D parallelism strategy would you use to train the 540B model on 256 GPUs while targeting MFU > 40%?
details:
  realistic_solution: Use hierarchy-aware 3D parallelism such as TP=8 within each node over NVLink, PP=8 across nodes, and DP=4 replicas. TP stays on fast intra-node links; PP sends only activations and activation gradients between adjacent stages over InfiniBand; DP synchronizes per-shard gradients in buckets that overlap with backward compute and pipeline drain. PP=8 gives about 14-15 transformer layers per stage and materially improves memory headroom versus PP=4.
  common_mistake: |
    **The Pitfall:** Maximizing the Tensor Parallelism (TP) degree across all GPUs (e.g., TP=256) to minimize memory per GPU.
    **The Rationale:** Candidates assume splitting tensors as widely as possible is always beneficial.
    **The Consequence:** Creating an AllReduce graph spanning the entire cluster over InfiniBand, causing communication overhead to completely dominate training time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs arranged as 32 nodes with 8 GPUs per node.
    - Proposed layout: TP=8, PP=8, DP=4, so TP groups fit within a node.
    - NVLink: 900 GB/s intra-node. InfiniBand: 400 Gbps = 50 GB/s inter-node.
    - Model weights at BF16 are 540B * 2 bytes = 1.08 TB before optimizer states.
    - Assume ZeRO-1-style optimizer sharding across the DP group and activation recomputation.

    **Calculations:**
    - TP=8 keeps high-frequency tensor-parallel all-reduces on NVLink instead of 50 GB/s InfiniBand.
    - PP=8 means each pipeline stage owns about 118 / 8 = 14-15 transformer layers.
    - DP=4 gives 4 replicas of the TP*PP training stack, using data-parallel gradient synchronization that can be bucketed and overlapped.
    - BF16 weights per GPU: 1.08TB / (TP * PP) = 1.08TB / 64 = 16.9GB.
    - BF16 gradients per GPU are another about 16.9GB.
    - Adam-style optimizer states at about 12 bytes/param are 540B * 12 / 64 / DP = 25.3GB per GPU when sharded across DP.
    - Training state estimate before activations: 16.9GB + 16.9GB + 25.3GB = 59.1GB per GPU, leaving limited headroom for activations with recomputation.
    - DP ring traffic per rank for a full shard is 2 * (3/4) * 16.9GB = 25.4GB, or about 0.51s at 50GB/s before overlap.
    - Cross-node communication that remains on the critical path is mainly pipeline activation transfer between stages, not per-layer tensor-parallel all-reduce.

    **Conclusion & Interpretation:**
    - **Result: Communication-aware 3D parallelism**. TP=8/PP=8/DP=4 matches the hardware hierarchy, keeps tensor collectives on NVLink, and gives a memory plan that is plausible only with optimizer sharding and activation recomputation.
