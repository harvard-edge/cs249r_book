title: Bulk Synchronous Parallel Straggler Impact
scenario: You are training a distributed ML model across a 64-GPU cluster (8 nodes of 8x A100s) using standard Data Parallelism. The execution follows a strict Bulk Synchronous Parallel (BSP) model. Normally, the forward/backward pass takes 120ms per step, and the gradient AllReduce takes 40ms. However, one GPU undergoes thermal throttling, increasing its compute time to 180ms.
question: What is the new BSP step time when one GPU takes 180ms to compute, and what is the compute utilization of the 63 healthy GPUs?
details:
  realistic_solution: In a BSP model, the entire cluster waits for the slowest worker before the AllReduce can begin. The new step time is therefore max(120ms, 180ms) + 40ms = 220ms. Each healthy GPU performs 120ms of compute during that 220ms step, so its end-to-end compute utilization is 120/220 ≈ 54.5%; the remaining time is 60ms waiting at the barrier plus 40ms in AllReduce.
  common_mistake: |
    **The Pitfall:** Averaging the compute times across all GPUs or assuming communication can overlap with the delayed computation.
    **The Rationale:** Candidates often misunderstand the strict global synchronization barrier that characterizes the BSP model.
    **The Consequence:** Severely underestimating the cluster-wide utilization degradation caused by a single straggler.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal compute time: 120ms.
    - Straggler compute time: 180ms.
    - AllReduce communication time: 40ms.
    - 64 GPUs operating in Bulk Synchronous Parallel (BSP).

    **Calculations:**
    - Normal step time: 120ms (compute) + 40ms (AllReduce) = 160ms.
    - Straggler step time: max(120ms, 180ms) + 40ms = 220ms.
    - Healthy GPU barrier wait before AllReduce: 180ms - 120ms = 60ms.
    - Healthy GPU non-compute time in the full step: 60ms wait + 40ms AllReduce = 100ms.
    - Healthy GPU utilization: 120ms (active compute) / 220ms (total step) = ~54.5%.

    **Conclusion & Interpretation:**
    - **Result: 220ms step time and 54.5% healthy-GPU compute utilization** (Healthy GPUs spend significant time waiting for the straggler and then participating in AllReduce).
