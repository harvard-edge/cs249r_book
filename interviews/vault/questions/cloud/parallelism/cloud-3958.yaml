title: Network Congestion Detection During Overlapped Training
scenario: Your 64-GPU training job's step time varies between 280ms and 450ms. Profiling shows 80ms of non-overlapped forward/optimizer work, a consistently 200ms backward pass, and AllReduce latency fluctuating between 30ms and 370ms. When AllReduce exceeds 200ms, it is no longer fully hidden by the backward pass.
question: Why does 64-GPU step time jump when AllReduce latency fluctuates from 30ms to 370ms, and how would you fix it?
details:
  realistic_solution: Network congestion from other jobs sharing the IB fabric causes the variability. Inspect IB switch congestion counters. Fix by requesting a dedicated IB subnet, enabling adaptive routing, or switching NCCL algorithms to tree AllReduce.
  common_mistake: |
    **The Pitfall:** Blaming the NCCL library logic itself for the variable AllReduce time.
    **The Rationale:** Candidates fail to understand that NCCL is highly deterministic and variability stems from shared physical networks.
    **The Consequence:** Attempting to tune software parameters endlessly without addressing fabric congestion or isolating the network.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Non-overlapped forward/optimizer work = 80ms.
       - Backward pass = 200ms, during which AllReduce can be hidden.
       - AllReduce fluctuates between 30ms and 370ms.
    2. **Calculations:**
       - Step time = 80ms + max(200ms backward, AllReduce latency).
       - Best case: 80ms + max(200ms, 30ms) = 280ms.
       - Worst case: 80ms + max(200ms, 370ms) = 450ms.
       - Exposed network delay appears only when AllReduce latency exceeds the 200ms backward window.
    3. **Conclusion & Interpretation:**
       - **Result: Intermittently Network-Bound.** Low-latency AllReduce is hidden, but congested AllReduce extends the critical path and explains the 280ms to 450ms step-time range.
