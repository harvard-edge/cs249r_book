title: AllReduce Algorithm Selection for Mixed Workloads
scenario: 'Your training cluster has 128 GPUs. During training, you perform: (1) gradient AllReduce for a 10B model (20GB gradient in FP16), and (2) scalar metric AllReduce (1KB loss values) every step. Currently using ring AllReduce for both. Should you use different algorithms for each?'
question: Should you use different algorithms for each?
details:
  realistic_solution: 'Yes — use different algorithms matched to message size. Gradient AllReduce (20GB): This is bandwidth-bound. Ring AllReduce is near-optimal: T ≈ 2×127/128 × 20GB / 25GB/s = 1.59s. Recursive halving-doubling moves a similar total number of bytes for a power-of-two cluster, so the bandwidth term is also about 1.59s, though implementation details determine which is faster. Use the library-tuned large-message algorithm, commonly ring in NCCL. Scalar AllReduce (1KB): This is latency-bound. Ring uses 2×(128-1)=254 communication phases, so T ≈ 254 × (5μs + 1KB/(128×25GB/s)) ≈ 1.27ms. Recursive halving-doubling uses 2×log2(128)=14 rounds, so T ≈ 14 × 5μs = 70μs. RHD is about 18x faster for the scalar case. NCCL actually already handles this automatically — it switches algorithms based on message size (small messages use tree/butterfly, large messages use ring). The key insight: a single AllReduce algorithm is suboptimal. Modern collective libraries (NCCL, Gloo) internally select
    the best algorithm per message size. You should verify your library is tuned correctly rather than implementing custom selection.'
  common_mistake: |
    **The Pitfall:** Using the same AllReduce algorithm for all message sizes.
    **The Rationale:** NCCL automatically selects algorithms, but misconfigured NCCL_ALGO environment variables can force suboptimal choices for certain message sizes.
    **The Consequence:** Missing significant latency optimizations by forcing bandwidth-bound algorithms on latency-bound scalar operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient size: 20GB. Scalar size: 1KB.
    - N = 128 GPUs, link bandwidth = 25GB/s, per-round latency = 5μs.

    **Calculations:**
    - Gradient ring bandwidth time: 2 * (127/128) * 20GB / 25GB/s = 1.59s, with latency negligible next to the 20GB transfer.
    - Gradient RHD bandwidth time is the same order because it moves roughly 2 * (127/128) * S bytes per GPU for power-of-two N; large-message performance is bandwidth-bound and implementation-dependent.
    - Scalar ring phases: 2 * (128 - 1) = 254 phases. Latency time ≈ 254 * 5μs = 1.27ms; the 1KB bandwidth term is negligible.
    - Scalar RHD rounds: 2 * log2(128) = 14 rounds. Latency time ≈ 14 * 5μs = 70μs.
    - Scalar speedup: 1.27ms / 70μs ≈ 18x.

    **Conclusion & Interpretation:**
    - Use different algorithms per message size: a bandwidth-optimized large-message collective for gradients and a low-round tree/RHD-style collective for scalar metrics.
