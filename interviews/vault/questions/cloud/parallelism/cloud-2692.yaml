title: Choosing AllReduce for 20GB Gradients vs 1KB Scalars
scenario: 'Your training cluster has 128 GPUs. During training, you perform: (1) gradient AllReduce for a 10B model (20GB gradient in FP16), and (2) scalar metric AllReduce (1KB loss values) every step. Currently using ring AllReduce for both. Should you use different algorithms for each?'
question: Should you use different algorithms for each?
details:
  realistic_solution: 'Yes — use different algorithms matched to message size. Gradient AllReduce (20GB) is bandwidth-bound, so use a bandwidth-optimized large-message collective, commonly ring AllReduce in NCCL: T ≈ 2×127/128 × 20GB / 25GB/s = 1.59s plus a small latency term. Scalar AllReduce (1KB) is latency-bound, so use a low-round tree or recursive-halving-doubling collective. Ring uses 2×(128-1)=254 communication phases, so latency alone is about 254 × 5μs = 1.27ms. Recursive halving-doubling uses 2×log2(128)=14 rounds, so latency is about 70μs. The key recommendation is explicit: keep ring or another bandwidth-tuned algorithm for gradients, and use tree/RHD-style algorithms for tiny scalars. If a collective library auto-selects algorithms, verify it is not forced into ring for every message size.'
  common_mistake: |
    **The Pitfall:** Using the same AllReduce algorithm for all message sizes.
    **The Rationale:** NCCL automatically selects algorithms, but misconfigured NCCL_ALGO environment variables can force suboptimal choices for certain message sizes.
    **The Consequence:** Missing significant latency optimizations by forcing bandwidth-bound algorithms on latency-bound scalar operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient size: 20GB. Scalar size: 1KB.
    - N = 128 GPUs, link bandwidth = 25GB/s, per-round latency = 5μs.

    **Calculations:**
    - Gradient ring bandwidth time: 2 * (127/128) * 20GB / 25GB/s = 1.59s, with latency negligible next to the 20GB transfer.
    - For large messages, the practical decision is dominated by sustained bandwidth and link utilization; ring-style algorithms are commonly preferred because they pipeline the 20GB payload well.
    - Scalar ring phases: 2 * (128 - 1) = 254 phases. Latency time ≈ 254 * 5μs = 1.27ms; the 1KB bandwidth term is negligible.
    - Scalar RHD rounds: 2 * log2(128) = 14 rounds. Latency time ≈ 14 * 5μs = 70μs.
    - Scalar speedup: 1.27ms / 70μs ≈ 18x.

    **Conclusion & Interpretation:**
    - Use different algorithms per message size: ring or another bandwidth-optimized large-message collective for gradients, and a low-round tree/RHD-style collective for scalar metrics.
