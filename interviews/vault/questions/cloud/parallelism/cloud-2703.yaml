title: LR Warmup Duration Calculation
scenario: 'You scale a training run from batch size 256 on 1 GPU to batch size 8192 on 32 GPUs. The base LR is 0.1. A heuristic recommends linearly ramping to the target LR over 5 epochs. The dataset has 1.28M samples.'
question: 'What are the target learning rate and the number of warmup steps?'
details:
  realistic_solution: 'Batch size scales 8192/256 = 32x. By the linear scaling rule, target LR = 0.1 × 32 = 3.2. Steps per epoch at batch size 8192: 1,280,000 / 8,192 ≈ 156 steps/epoch. Warmup over 5 epochs = 5 × 156 = 780 steps. During warmup, LR ramps linearly from 0.1 to 3.2 over 780 steps. Each warmup step increases LR by (3.2 - 0.1) / 780 ≈ 0.004 per step. The gradual warmup prevents the large LR from destabilizing early training when the loss landscape is sharp.'
  common_mistake: |
    **The Pitfall:** Forgetting to calculate warmup in steps rather than epochs.
    **The Rationale:** Candidates often hardcode epoch counts and forget that the number of steps per epoch changes inversely with the batch size.
    **The Consequence:** The warmup duration in steps is incorrectly calculated, leading to a ramp-up that is too fast or too slow, destabilizing early training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size scaling: 256 to 8192 (32x increase).
       - Base LR: 0.1. Warmup: 5 epochs.
       - Dataset: 1.28M samples.
    2. **Calculations:**
       - Target LR (linear scaling) = 0.1 * 32 = 3.2.
       - Steps per epoch = 1,280,000 / 8,192 = ~156 steps.
       - Total warmup steps = 5 epochs * 156 steps = 780 steps.
    3. **Conclusion & Interpretation:** **Result: Optimization-Bound**. The LR should ramp from 0.1 to 3.2 over exactly 780 training steps to prevent gradient explosion early in training.
