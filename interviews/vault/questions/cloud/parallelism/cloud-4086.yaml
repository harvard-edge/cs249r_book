title: Why TP Stays Within a Node
scenario: Your team proposes using TP=16 across two 8-GPU nodes (one H100 node, one MI300X node) connected by 400 Gbps InfiniBand to train a 175B parameter model.
question: Why is this almost certainly a bad idea, and what would you recommend instead?
details:
  realistic_solution: TP requires AllReduce after every attention and MLP block — 2 AllReduces per layer, executed synchronously. With 96 layers in a 175B model, that is 192 AllReduces per forward pass. Intra-node NVLink on H100 provides 900 GB/s bidirectional per GPU. Cross-node InfiniBand provides only 50 GB/s — an 18× slowdown on every collective. Each AllReduce that took 0.05 ms intra-node would take ~0.9 ms cross-node, adding ~170 ms of pure communication overhead per forward pass. Instead, use TP=8 within each node and PP=2 across nodes. Pipeline parallelism only communicates activations between stages (one send per microbatch boundary), which is far less frequent and tolerates higher latency.
  common_mistake: |
    **The Pitfall:** Thinking that InfiniBand bandwidth (400 Gbps = 50 GB/s) is comparable to intra-node NVLink.
    **The Rationale:** Candidates see "high speed network" and assume it can handle any distributed training communication.
    **The Consequence:** The 18× bandwidth gap makes cross-node TP devastating for throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 intra-node NVLink: 900 GB/s bidirectional.
       - Cross-node InfiniBand: 400 Gbps (50 GB/s).
       - Model: 175B parameters, 96 layers.
       - AllReduces: 2 per layer = 192 per forward pass.
    2. **Calculations:**
       - Bandwidth Ratio: 900 GB/s / 50 GB/s = 18x slowdown cross-node.
       - Assuming base intra-node latency is 0.05 ms, cross-node is 0.9 ms (delta = 0.85 ms).
       - Total Extra Latency: 192 * 0.85 ms = 163.2 ms.
    3. **Conclusion & Interpretation:** **~163 ms overhead per pass (Network Bandwidth-Bound).**
