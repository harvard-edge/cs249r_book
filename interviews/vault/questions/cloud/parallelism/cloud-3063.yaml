title: 'Pipeline Parallelism Specification: Design for <10% Bubble with Memory Constraint'
scenario: You must specify a pipeline parallelism configuration for a 175B GPT-3 scale model on 80GB GPUs that achieves a bubble overhead below 10% while keeping per-GPU peak memory under 70GB. The training uses BF16 weights with ZeRO-2 optimizer sharding.
question: What TP, PP, DP, and micro-batch settings keep a 175B GPT-style model under 70GB per GPU with pipeline bubble below 10%?
details:
  realistic_solution: '175B params, BF16 = 350GB model weight. With TP=8 (NVLink within node) and PP=8 stages, each GPU owns 175B/(8*8) = 2.734B parameters. Weights are not sharded by ZeRO-2, so BF16 weights are 2.734B*2 bytes = 5.47GB per GPU. ZeRO-2 shards gradients and optimizer states across DP replicas. With DP=8, the BF16 gradient shard is 5.47GB/8 = 0.68GB. FP32 Adam states plus master weights are 12 bytes/parameter for the local TP/PP shard, then sharded over DP: 2.734B*12 bytes/8 = 4.10GB. Add ~3GB checkpointed activations for an approximate peak of about 13.25GB before communication buffers, temporary workspaces, and fragmentation, still well under 70GB. Bubble with m=72 is (PP-1)/(m+PP-1) = (8-1)/(72+7) = 8.9% < 10%. Spec: PP=8, TP=8, DP=8, m=72.'
  common_mistake: |
    **The Pitfall:** Failing to account for ZeRO-2 optimizer state distribution across data parallel ranks.
    **The Rationale:** Candidates often assume that all optimizer states must fit entirely on each GPU without sharding, leading to impossible memory constraints.
    **The Consequence:** Over-provisioning hardware or unnecessarily increasing tensor parallelism, leading to degraded training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 175B params, BF16 (2 bytes). Target Bubble < 10%. Target Memory < 70GB.
    - Test config: PP=8, TP=8, DP=8, microbatches (m) = 72.

    **Calculations:**
    - Total weights: 175B * 2 bytes = 350GB.
    - Local params per device: 175B / (TP 8 * PP 8) = 2.734B params.
    - Weights per device: 2.734B * 2 bytes = 5.47GB.
    - Gradients (ZeRO-2 over DP=8): 5.47GB / 8 = 0.68GB.
    - Optimizer states + master weights (ZeRO-2 over DP=8): 2.734B local params * 12 bytes / 8 = 4.1GB.
    - Activations (checkpointed): ~3.0GB.
    - Approximate peak memory before temporary buffers = 5.47 + 0.68 + 4.1 + 3.0 = 13.25GB.
    - Pipeline Bubble (m=72): (PP - 1) / (m + PP - 1) = (8 - 1) / (72 + 8 - 1) = 8.9%.

    **Conclusion & Interpretation:**
    - **Result: Memory-and-Bubble-Optimized**. The config PP=8, TP=8, DP=8, m=72 fits the approximate model-state-plus-activation budget with an 8.9% bubble; reserve is still needed for buffers and workspace.
