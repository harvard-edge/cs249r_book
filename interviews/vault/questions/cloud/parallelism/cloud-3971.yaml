title: 'Overlap Measurement: MFU vs HFU and Communication Accounting'
scenario: Your 70B model training reports Model FLOPS Utilization (MFU) of 45% on 64 H100 GPUs. A colleague points out that Hardware FLOPS Utilization (HFU) is 58% for the same run. Explain the difference and what each metric tells you about communication-computation overlap.
question: What is the difference between MFU 45% and HFU 58%, and what do they imply about communication-computation overlap?
details:
  realistic_solution: MFU = (model FLOPS per step) / (peak FLOPS x step time). It counts only FLOPs that advance the model step and excludes activation recomputation. HFU = (total observed hardware FLOPS) / (peak FLOPS x step time). It includes all executed compute, including recomputation and other extra work. In this run, HFU - MFU = 13 percentage points, so the hardware is doing extra FLOPs that do not count as model-progress FLOPs, commonly activation recomputation. The remaining gap to 100% cannot be assigned to communication, memory stalls, kernel overhead, or idle time from these two numbers alone. For overlap assessment, MFU/HFU tell you whether extra compute exists, but you still need timeline traces or communication counters to determine whether communication is exposed or hidden.
  common_mistake: |
    **The Pitfall:** Confusing MFU and HFU or assuming higher is always better for model progress.
    **The Rationale:** Engineers often do not realize that HFU includes operations like activation recomputation which do not contribute to advancing the training step.
    **The Consequence:** Misinterpreting an HFU increase as improved performance, when it actually might indicate excessive recomputation overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - MFU = 45%.
    - HFU = 58%.
    - Both metrics use the same denominator: peak FLOPS * step time.

    **Calculations:**
    - Extra executed FLOPS not counted by MFU = HFU - MFU = 58% - 45% = 13 percentage points.
    - Unused peak or non-FLOP time = 100% - HFU = 42 percentage points.
    - That 42-point remainder is a mixture of stalls, memory effects, communication exposure, launch overhead, and idle time; MFU/HFU alone do not split it.

    **Conclusion & Interpretation:**
    - **Result: Metrics Need Trace Context.** The 13-point MFU/HFU gap indicates extra executed compute such as recomputation, but it does not by itself quantify communication-computation overlap.
