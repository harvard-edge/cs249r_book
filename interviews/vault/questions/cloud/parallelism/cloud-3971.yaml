title: 'Overlap Measurement: MFU vs HFU and Communication Accounting'
scenario: Your 70B model training reports Model FLOPS Utilization (MFU) of 45% on 64 H100 GPUs. A colleague
  points out that Hardware FLOPS Utilization (HFU) is 58% for the same run. Explain the difference and
  what each metric tells you about communication-computation overlap.
question: What is the difference between MFU 45% and HFU 58%, and what do they imply about communication-computation
  overlap?
details:
  realistic_solution: 'MFU = (model FLOPS per step) / (peak FLOPS x step time). It excludes activation
    recomputation FLOPS. HFU = (total observed FLOPS) / (peak FLOPS x step time). It includes all compute
    including recomputation. (1) MFU 45% means: 55% of H100''s peak is wasted on communication, idle time,
    and overhead. (2) HFU 58% means: 42% is wasted, but 13% of total compute was activation recomputation
    (useful for memory but not for model progress). (3) The gap HFU - MFU = 13% represents activation
    recomputation overhead. (4) For overlap assessment: if HFU is 58% and you measure 2% communication
    time (overlapped), then GPU overhead (kernel launch, memory management) is 42% - 2% = 40%. This is
    the real bottleneck — kernel efficiency, not communication. Good overlap means MFU ≈ HFU - recompute_fraction.'
  common_mistake: '**The Pitfall:** Confusing MFU and HFU or assuming higher is always better for model
    progress.

    **The Rationale:** Engineers often do not realize that HFU includes operations like activation recomputation
    which do not contribute to advancing the training step.

    **The Consequence:** Misinterpreting an HFU increase as improved performance, when it actually might
    indicate excessive recomputation overhead.

    '
  napkin_math: '**Assumptions & Constraints:**

    - MFU = 45%.

    - HFU = 58%.

    - Measured communication time = 2%.


    **Calculations:**

    - Activation recomputation overhead = HFU - MFU = 58% - 45% = 13%.

    - GPU idle/overhead time = 100% - HFU - Comm = 100% - 58% - 2% = 40%.


    **Conclusion & Interpretation:**

    - **Result: 40% Kernel/Memory Overhead**. The 40% gap indicates that kernel efficiency or memory bandwidth
    is the primary bottleneck, not network communication.

    '
