title: Hardware Upgrade Speedup Estimation
scenario: We are profiling a Transformer training job on an 8x A100 node. One training step takes 500ms. Profiling via nsys shows that 400ms is spent on parallelizable GPU compute, while 100ms is strictly sequential, spent on CPU-bound data loading and host-side dispatch overhead that cannot be overlapped. We are considering an upgrade to H100 GPUs, which benchmarks show will provide exactly 4x the compute throughput. Assume the sequential host-side overhead remains unchanged.
question: What are the new training step time and overall speedup after moving to H100s with 4x GPU compute?
details:
  realistic_solution: 'According to Amdahl''s Law, the speedup only applies to the parallelizable portion of the workload. The 400ms GPU compute time is reduced to 100ms, but the 100ms sequential CPU time remains. The new step time is 200ms, yielding an overall system speedup of 2.5x.'
  common_mistake: |
    **The Pitfall:** Assuming hardware compute speedup linearly translates to overall system speedup.
    **The Rationale:** Candidates often forget Amdahl's Law and fail to account for the unaccelerated sequential fraction of the workload.
    **The Consequence:** They overestimate the overall speedup (e.g., predicting a 125ms step time) and overvalue the hardware upgrade.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original total step time: 500ms.
    - Parallelizable GPU compute time: 400ms.
    - Sequential CPU-bound time: 100ms.
    - H100 provides exactly 4x compute throughput over A100.

    **Calculations:**
    - New GPU compute time: 400ms / 4 = 100ms.
    - New total step time: 100ms (GPU) + 100ms (CPU) = 200ms.
    - Overall speedup: 500ms / 200ms = 2.5x.

    **Conclusion & Interpretation:**
    - **Result: 2.5x (Amdahl's Law Bottleneck)**. The upgrade yields a 2.5x speedup, demonstrating the system is bottlenecked by the unaccelerated sequential fraction.
