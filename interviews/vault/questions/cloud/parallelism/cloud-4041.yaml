title: Gradient Quantization to INT8
scenario: To reduce communication time, you quantize FP16 gradients to INT8 before AllReduce and dequantize after. You are using a 2 GiB gradient buffer on a 64-node cluster with 200 Gbps NICs.
question: What communication time savings and quantization error result from INT8-quantizing the 2 GiB FP16 gradients before AllReduce?
details:
  realistic_solution: FP16 gradient size is 2 GiB, which is 1,073,741,824 FP16 elements. INT8 values take 1 GiB. With one FP32 scale per 128-element block, there are 8,388,608 blocks and 32 MiB of scale metadata, for a total INT8 payload of 1.03125 GiB. Using 200Gbps = 25GB/s and converting GiB to decimal GB, ring AllReduce time is about 169ms for FP16 and 87ms for INT8 plus scales, saving about 82ms or 48%. Quantization error is not a fixed 0.2% relative error. With symmetric per-block scaling, step size is scale = max_abs/127 and round-to-nearest gives absolute error at most scale/2 for unclipped values; relative error can be large for values near zero. Stochastic rounding makes the rounding error unbiased in expectation, while clipping or poor block scaling can still hurt convergence.
  common_mistake: |
    **The Pitfall:** Ignoring the overhead of transmitting quantization scale factors.
    **The Rationale:** Candidates assume an exact 50% reduction in data size when moving from FP16 to INT8.
    **The Consequence:** Overestimating communication savings and failing to account for overflow risks during the INT8 reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 gradients: 2 GiB.
    - 64 nodes, 200 Gbps (25 GB/s) NICs.
    - 128 elements per quantization block.
    - Ring AllReduce communication model: 2 * (N-1)/N * payload / bandwidth.

    **Calculations:**
    - Element count: 2 GiB / 2 bytes = 1,073,741,824 elements.
    - INT8 value payload: 1,073,741,824 bytes = 1 GiB.
    - Scale factor overhead: 1,073,741,824 / 128 = 8,388,608 blocks. 8,388,608 * 4 bytes = 32 MiB.
    - Total INT8 payload: 1 GiB + 32 MiB = 1.03125 GiB.
    - FP16 AllReduce time: 2 * (63/64) * 2 GiB / (25 GB/s) ≈ 169 ms after GiB-to-GB conversion.
    - INT8 AllReduce time: 2 * (63/64) * 1.03125 GiB / (25 GB/s) ≈ 87 ms.
    - Quantization bound under per-block symmetric scaling: scale = max_abs / 127, so absolute rounding error <= scale / 2 = max_abs / 254 for each unclipped value in a block.

    **Conclusion & Interpretation:**
    - **Result: Communication savings are about 82 ms, or 48% (Network-Bound).** Quantization error is bounded in absolute terms by the block scale, but relative error depends on the gradient value and can be large near zero.
