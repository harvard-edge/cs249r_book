title: Optimizing DLRM with Feature-Parallel Batching
scenario: 'You are deploying a Deep Learning Recommendation Model (DLRM) for an ad-serving platform. The model has 80 categorical features, with their embedding tables sharded across 4 GPUs based on feature IDs. The aggregator receives batches of 512 requests. In the naive request-parallel approach, the system processes each request independently, issuing separate RPCs and CUDA kernels for each feature lookup per request.'
question: 'How much CUDA launch overhead is saved by switching from request-parallel to feature-parallel batching for 512 requests and 80 features?'
details:
  realistic_solution: |
    Implement a transpose operation at the aggregator to group the 512 requests by feature. Dispatch a single batched lookup operation per feature to the specific GPU shard holding that table, allowing one kernel to gather embeddings for all 512 requests simultaneously.
  common_mistake: |
    **The Pitfall:** Focusing solely on memory bandwidth or HBM capacity.
    **The Rationale:** Candidates ignore the massive CPU-bound overhead of launching thousands of tiny CUDA kernels or RPCs per batch, applying theoretical hardware limits without considering software bottlenecks.
    **The Consequence:** Severe CPU bottlenecking leading to missed real-time ad serving SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Requests per batch: 512.
    - Features per request: 80.
    - CUDA kernel launch overhead: 4 μs.
    - Negligible memory read time for sparse lookups.

    **Calculations:**
    - Request-parallel launches: 512 * 80 = 40,960 kernels.
    - Request-parallel overhead: 40,960 * 4 μs = 163.84 ms.
    - Feature-parallel launches: 80 kernels (1 per feature).
    - Feature-parallel overhead: 80 * 4 μs = 0.32 ms.
    - Savings: 163.84 ms - 0.32 ms = 163.52 ms.

    **Conclusion & Interpretation:**
    - **Result: 163.52 ms (CPU-Bound)**. Switching to feature-parallel batching eliminates the CUDA launch bottleneck.
