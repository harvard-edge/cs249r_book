title: Tensor Parallelism Communication Bottleneck on Multi-Node Cluster
scenario: A 175B model is trained with TP=16 on MI300X nodes (8 GPUs/node). With TP=16, tensor parallelism spans 2 nodes connected by InfiniBand HDR (200Gbps = 25GB/s). Training MFU is 22% vs expected 45%. Profiling shows 60% of step time is in all-reduce operations.
question: How would you change the TP=16 training setup to remove cross-node tensor-parallel all-reduces and recover MFU?
details:
  realistic_solution: 'Reduce TP degree to 8 (within a single node, NVLink only) and compensate with pipeline parallelism (PP) across nodes. TP=8 within node uses NVLink 900GB/s; PP across nodes uses InfiniBand but only sends activations (not weight gradients), reducing inter-node communication. Reconfigure as TP=8, PP=2 (2 pipeline stages, 1 node each). Expected MFU improvement: 22% → ~45%.'
  common_mistake: |
    **The Pitfall:** Increasing batch size to 'amortize' communication overhead.
    **The Rationale:** Batch size increases generally improve utilization in data parallel setups.
    **The Consequence:** Fails because all-reduce latency in tensor parallelism is on the critical path and does not scale with batch size — it occurs once per layer per forward/backward pass regardless of batch dimension.
  napkin_math: |
    **Assumptions & Constraints:**
    - Setup: TP=16 spanning 2 nodes (25 GB/s inter-node link).
    - Tensor [B, seq, hidden] BF16: B=1, seq=2048, hidden=12288 (48 MB).
    - A ring all-reduce transfers about 2 * (TP-1) / TP times the tensor per rank.

    **Calculations:**
    - Per all-reduce payload per rank: 2 * 15/16 * 48 MB = 90 MB.
    - If the collective crosses the 25 GB/s InfiniBand link, the bandwidth floor is 90 MB / 25 GB/s = 3.6 ms per all-reduce before latency and contention.
    - TP all-reduces occur repeatedly inside each transformer layer, so putting TP=16 across nodes places high-frequency synchronization on the slow inter-node link.
    - With TP=8 inside one 8-GPU node, those tensor-parallel all-reduces stay on NVLink; PP=2 sends only stage-boundary activations across nodes.

    **Conclusion & Interpretation:**
    - **Result: Communication-Bound**. Switching to TP=8 (node-local NVLink) + PP=2 removes cross-node TP all-reduces from the critical path and should move MFU back toward the expected range.
