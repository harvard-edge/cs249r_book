title: The Power Density Ceiling
scenario: A datacenter has 10 MW total power capacity and houses 2,000 GPUs (700W TDP each) plus associated infrastructure. During a large training run, the GPUs hit sustained peak power, tripping a PDU breaker and killing 25% of the cluster. Facilities mandates that all 2,000 GPUs cannot run at max TDP simultaneously.
question: How does the scheduler need to account for power as a schedulable resource, and what is the maximum number of GPUs you can realistically schedule at peak?
details:
  realistic_solution: Power must become a first-class schedulable resource. The scheduler needs a power budget per rack, per PDU, and per datacenter, and it should admit peak jobs only while every domain stays under its limit. With 300 kW PDU domains and a 10% operating headroom, each 500-GPU PDU domain can safely run floor(270 kW / 700 W) = 385 GPUs at peak, so four such domains can schedule about 1,540 peak-TDP GPUs. The remaining GPUs need DVFS power caps, spreading to less-loaded power domains, or delayed scheduling.
  common_mistake: |
    **The Pitfall:** Treating datacenter power as infinite or assuming GPUs always draw exactly their TDP.
    **The Rationale:** Software engineers often abstract away physical infrastructure and assume hardware manages its own power limits safely.
    **The Consequence:** Unpredictable datacenter outages, tripped breakers, and catastrophic training job failures when workloads align at peak power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total facility power: 10 MW.
       - PDU limit: 300 kW per PDU domain.
       - GPU TDP: 700W. 2,000 GPUs total.
       - The failed 25% domain corresponds to 500 GPUs, so assume four similar PDU domains.
       - Use 10% headroom for peak-safe scheduling.
    2. **Calculations:**
       - 2,000 GPUs * 700W = 1.4 MW, so the 10 MW facility limit is not the binding constraint for GPU TDP alone.
       - One 500-GPU PDU domain at peak: 500 * 700W = 350 kW, which exceeds a 300 kW PDU limit.
       - Peak-safe PDU budget with headroom: 300 kW * 0.90 = 270 kW.
       - Peak-safe GPUs per PDU domain: floor(270,000W / 700W) = 385 GPUs.
       - Peak-safe cluster-wide count across four PDU domains: 4 * 385 = 1,540 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound at about 1,540 uncapped peak GPUs under these PDU/headroom assumptions.** Scheduling all 2,000 GPUs at max TDP is unsafe unless jobs are power-capped or redistributed across additional power domains.
