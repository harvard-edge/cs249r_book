title: Multi-Tenant H100 GPU Scheduling for Cloud ML
scenario: You are designing the core scheduling and resource management system for a new multi-tenant ML cloud platform using GPUs. Your users range from research teams running large-scale distributed training jobs to inference services with strict latency requirements.
question: How would you schedule and partition GPUs for mixed distributed training and latency-critical inference while ensuring utilization, fairness, and SLOs?
details:
  realistic_solution: 'A robust solution involves a hierarchical scheduling approach. At the lowest level, utilize NVIDIA MIG to partition H100 GPUs into smaller, isolated instances (e.g., 7x 1g.10gb partitions) for smaller inference or single-node training jobs. For larger training jobs, MPS can be used to share a full H100 more efficiently. Integrate this with a cluster-level scheduler (e.g., Kubernetes with a custom scheduler extender) that understands GPU topology. Implement gang scheduling for distributed training jobs. For mixed workloads, design preemption policies: lower-priority training jobs could be preempted to accommodate higher-priority inference requests. Dynamic scaling based on utilization metrics and workload queues is crucial for cost-efficiency.'
  common_mistake: |
    **The Pitfall:** Proposing a basic queueing system without considering GPU architecture and workload types.
    **The Rationale:** Neglecting fine-grained partitioning capabilities (MIG/MPS) or advanced scheduling concepts (gang scheduling, preemption).
    **The Consequence:** Inefficient resource allocation, massive GPU underutilization, and missed SLOs for latency-critical inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 has 80 GB HBM and supports 7x 1g.10gb MIG instances.
    - A 1g.10gb slice exposes about 10 GB HBM, so 7 slices account for about 70 GB of partitioned HBM; the rest is unavailable or reserved by the MIG layout.
    - Each small inference service needs 5 GB HBM and 50 TFLOPS, but a 1g slice is an isolation boundary.
    - Each request streams 100 MB from HBM and is assumed bandwidth-bound only for an upper-bound estimate.

    **Calculations:**
    - Memory fit per 1g.10gb slice = floor(10 GB / 5 GB) = 2 model copies.
    - Scheduling capacity is still 7 isolated slices; running 2 copies per slice is co-location inside a slice, not 14 independent MIG partitions.
    - Full-GPU bandwidth upper bound = 3.35 TB/s / 100 MB ≈ 33,500 requests/s.
    - If bandwidth scaled evenly across 7 slices, per-slice upper bound ≈ 33,500 / 7 ≈ 4,785 requests/s before compute, batching, cache, and framework overhead.

    **Conclusion & Interpretation:**
    - **Result: schedule up to 7 isolated 1g services per H100, optionally co-locating two 5 GB replicas inside a slice only if SLO testing passes.** The 33.5K QPS figure is a bandwidth-only ceiling, not a guaranteed service rate.
