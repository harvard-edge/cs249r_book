title: The Bad Batch Spike
scenario: You are fine-tuning a 7B model. At step 12,400 the loss suddenly spikes from 1.8 to 4.5, then recovers. This happens exactly at step 12,400 every time you restart from the checkpoint.
question: What causes the loss spike, and how do you prove it?
details:
  realistic_solution: 'Deterministic reproduction means the fixed-seed data loader served the same pathological batch at step 12,400, often because of a corrupted sample, mislabeled record, malformed tokenization, or loader ordering bug. Prove it by logging batch and sample IDs, replaying that batch, and computing per-sample losses. Fix the data path: inspect the offending records, quarantine or repair bad samples, and debug the sampler or loader if the same invalid record is repeatedly emitted.'
  common_mistake: |
    **The Pitfall:** Dismissing it as stochastic noise or blaming the learning rate.
    **The Rationale:** Candidates jump to hyperparameter tuning without considering the deterministic restart behavior.
    **The Consequence:** Wasting time tweaking learning rates when the issue is a corrupted sample dominating the gradient.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 samples, 512 tokens. Normal loss = 1.8. Spike = 4.5.

    **Calculations:**
    - Normal batch total loss: 32 × 512 × 1.8 = 29,491 nats.
    - Spike batch total loss: 32 × 512 × 4.5 = 73,728 nats.
    - Extra loss above normal: 73,728 - 29,491 = 44,237 nats.
    - If one sample caused the entire spike, its excess loss is 44,237 / 512 ≈ 86.4 nats/token above normal.
    - That sample's total per-token loss would be about 86.4 + 1.8 = 88.2 nats/token.

    **Conclusion & Interpretation:**
    - **Result: Data-Bound deterministic batch spike.** The arithmetic is only a plausibility check; the proof comes from replaying the same sample IDs and showing that one sample or record group dominates the per-sample loss.
