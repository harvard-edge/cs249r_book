title: Local Gradient Clipping Divergence
scenario: You are debugging a custom PyTorch DDP training loop for a 13B parameter model on 64 A100 GPUs. To mitigate a perceived communication bottleneck, an engineer modified the training step to apply gradient clipping (`max_norm=1.0`) locally on each GPU *before* triggering the `AllReduce` gradient synchronization. The model loss now diverges wildly.
question: Why does clipping gradients locally before AllReduce make the 13B DDP run diverge, and what is the correct ordering?
details:
  realistic_solution: 'Gradient clipping is a non-linear operation and does not commute with summation. Clipping locally distorts the global gradient direction because each GPU scales its gradients by a different factor. The fix is to synchronize correctly: AllReduce the local gradients first, compute the global gradient norm, and then clip the synchronized gradients globally on all ranks.'
  common_mistake: |
    **The Pitfall:** Assuming nonlinear operations like clipping can commute with gradient synchronization.
    **The Rationale:** Engineers often look for ways to reduce payload size or processing bottlenecks before network transfers, treating gradients as independent generic data arrays.
    **The Consequence:** The local gradients are mathematically skewed into entirely different directions before averaging, breaking the global optimization step and causing catastrophic divergence.
  napkin_math: |
    - **Setup:** GPU 1 has $g_1=[10, 1]$ and GPU 2 has $g_2=[1, 1]$.
    - **Correct Order (Average then Clip):** True average is $[5.5, 1]$. Direction ratio is $5.5:1$.
    - **Incorrect Order (Clip then Average):**
      - $g_1$ clipped to norm 1.0 $\rightarrow \approx [1.0, 0.1]$.
      - $g_2$ clipped to norm 1.0 $\rightarrow \approx [0.71, 0.71]$.
      - New average is $[0.85, 0.4]$. Direction ratio is $\approx 2.1:1$.
    - **Conclusion:** **Local clipping fundamentally distorts the global gradient direction vector.**
