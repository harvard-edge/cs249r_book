title: NCCL Graph Capture for Reducing Communication Launch Overhead
scenario: Your training step has 200 small NCCL AllReduce calls (one per gradient bucket) with 50 microseconds launch overhead each. Total launch overhead is 10ms per step. CUDA Graphs can theoretically capture the training step including NCCL calls.
question: "What benefit does CUDA Graph capture provide for 200 small NCCL AllReduce calls, and what limitations must you handle?"
details:
  realistic_solution: 'CUDA Graph capture of NCCL calls reduces per-call launch overhead significantly. Requirements: fixed tensor shapes (no dynamic batching), fixed process group (no elastic training), NCCL >= 2.18 with NCCL_COMM_NONBLOCKING=1. Capture pattern: cudaStreamBeginCapture -> run forward + backward + AllReduce -> cudaStreamEndCapture -> replay. Limitation: if batch size changes, the graph must be recaptured (100ms+ recapture cost). Strategy: capture graphs for your 2-3 most common batch sizes and switch at runtime. Additional overlap benefit: CUDA Graphs eliminate CPU-side scheduling, making overlap more deterministic — GPU never waits for CPU to issue the next operation.'
  common_mistake: |
    **The Pitfall:** Assuming CUDA Graph capture works seamlessly with all NCCL calls.
    **The Rationale:** Developers often try to wrap PyTorch loops in CUDA Graphs without checking library compatibility.
    **The Consequence:** Failing to realize NCCL graphs require fixed shapes and communication patterns, leading to runtime crashes when dynamic batching occurs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 AllReduce calls per step.
    - 50us overhead without graphs, 5us with graphs.
    - 300ms total step time.

    **Calculations:**
    - Without graphs = 200 * 50us = 10ms overhead.
    - With graphs = 200 * 5us = 1ms overhead.
    - Savings = 9ms/step.
    - Throughput gain = 9ms / 300ms = 3%.

    **Conclusion & Interpretation:**
    - **Result: 3% throughput improvement (Latency Overhead)**. CUDA Graphs eliminate CPU-side scheduling bottlenecks and amortize launch overhead.
