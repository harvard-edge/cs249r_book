title: 'Pipeline Parallelism Bubble Overhead Comparison: Stage Count Tradeoff'
scenario: A team is debating 4-stage vs 8-stage pipeline parallelism on H100s for a 70B LLaMA-style model. Micro-batch count is fixed at m=32.
question: Which configuration is better for throughput (4-stage or 8-stage), and why?
details:
  realistic_solution: '4-stage: bubble = (4-1)/(32+4-1) = 3/35 = 8.6%. 8-stage: bubble = (8-1)/(32+8-1) = 7/39 = 17.9%. The 8-stage configuration has MORE bubble overhead for the same micro-batch count. Additionally, each inter-stage boundary sends activations: 70B model, hidden dim ~8192, sequence 2048, each activation tensor = 2*8192*2048 = 33.5MB. 8 boundaries vs 4 doubles communication. Prefer 4-stage.'
  common_mistake: |
    **The Pitfall:** Assuming more stages always means more parallelism and better throughput.
    **The Rationale:** Engineers equate higher pipeline depth directly to faster training without accounting for micro-batch limits.
    **The Consequence:** The system suffers from vastly increased bubble fraction overhead and double the inter-stage communication, resulting in slower actual training times.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4-stage vs 8-stage pipeline parallelism.
    - 70B model, hidden dim ~8192, sequence 2048.
    - Micro-batch count: m=32.

    **Calculations:**
    - 4-stage bubble fraction: (4-1) / (32+4-1) = 3/35 = 8.6%.
    - 8-stage bubble fraction: (8-1) / (32+8-1) = 7/39 = 17.9%.
    - Activation tensor size: 8192 * 2048 * 2 bytes = 33.5 MB per micro-batch.
    - 32 micro-batches: 32 * 33.5 MB = 1.07 GB crossed per boundary per step.

    **Conclusion & Interpretation:**
    - **Result: Pipeline Bubble and Communication Bound**. 4-stage wins by minimizing both the idle bubble fraction and the aggregate gigabytes transferred.
