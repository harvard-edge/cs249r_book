title: Pipeline Bubble on a Heterogeneous TPU v5e Stage Layout
scenario: A 500B-parameter LLM is split into 8 pipeline stages on 8 TPU v5e devices (16 GB HBM, 197 TFLOPS BF16, 1.6 TB/s HBM bandwidth, ICI inter-chip ~25 GB/s per axis). Stage compute times measured per micro-batch — stages 1-7 each 100 ms, stage 8 (LM head + softmax over a 256K vocab) 175 ms. The pipeline currently runs with 4 micro-batches per global step. Quantify the bubble fraction and the exposed throughput loss from the slowest stage, and identify the smallest schedule change that closes the gap to within 10%.
question: For 8 TPU stages with m=4 and a 175 ms final stage, what bubble fraction and schedule-only change get within 10% of ideal?
details:
  realistic_solution: Bubble fraction at m=4, k=8 is (k-1)/(m+k-1) = 7/11 = 63.6%, so balanced finite-m utilization is only 36.4%. The slow 175 ms stage also caps steady-state throughput at one micro-batch per 175 ms, a 100/175 = 57.1% rate loss versus a balanced 100 ms stage clock. The smallest schedule-only change that gets bubble overhead within 10% of the ideal no-bubble schedule is to raise micro-batches until (k-1)/(m+k-1) <= 10%, which requires m >= 63. That fixes bubbles but not the 175 ms bottleneck; closing both gaps also requires a layout/model change such as splitting or rebalancing the LM head.
  common_mistake: |
    **The Pitfall:**
    Increasing m alone without rebalancing the stages. Bubble fraction shrinks but every micro-batch still pays the 175 ms stage-8 cost — pipeline rate is bounded by the slowest stage, not by the bubble.
    **The Rationale:**
    ...
    **The Consequence:**
    ...
  napkin_math: |
    **Assumptions & Constraints:**
    - Number of pipeline stages k = 8.
    - Current micro-batches m = 4.
    - Stages 1-7 take 100 ms; stage 8 takes 175 ms.
    - "Within 10% of ideal" means bubble fraction <= 10% for the same stage layout.

    **Calculations:**
    - Bubble fraction = (k - 1) / (m + k - 1) = 7 / (4 + 8 - 1) = 7/11 = 63.6%.
    - Balanced finite-m utilization from bubbles alone = 1 - 63.6% = 36.4%.
    - Slow-stage throughput loss versus a balanced 100 ms clock = 1 - 100/175 = 42.9%.
    - Require 7 / (m + 7) <= 0.10, so m + 7 >= 70 and m >= 63.
    - At m=63, bubble fraction = 7 / 70 = 10.0%.

    **Conclusion & Interpretation:**
    - **Result: m=4 has a 63.6% bubble fraction, and the minimum schedule-only fix is m=63.** That brings bubble overhead within 10% of ideal, but the 175 ms stage remains a separate bottleneck that needs rebalancing.
