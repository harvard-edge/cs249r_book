title: 'Optimizing Pipeline Parallelism on Google TPU v5e'
scenario: 'You are tasked with deploying a large transformer model that requires significant memory and computation, exceeding the capacity of a single TPU v5e chip. You decide to use pipeline parallelism across multiple TPU v5e chips.'
question: 'How would you split the model across TPU pipeline stages and use micro-batching and interleaving to reduce bubble overhead?'
details:
  realistic_solution: 'To mitigate bubble overhead, an effective strategy involves carefully partitioning the model to balance computation and memory load across TPUs, ensuring no single stage becomes a bottleneck. Employ micro-batching with an optimally chosen small micro-batch size to keep the pipeline full. Crucially, implement interleaved scheduling (e.g., GPipe, PipeDream variants) where different micro-batches are processed simultaneously across pipeline stages, filling the bubbles that would otherwise occur.'
  common_mistake: |
    **The Pitfall:** Using a fixed, large micro-batch size sequentially without interleaving.
    **The Rationale:** It's intuitive to maximize GPU utilization per step by increasing batch size, without realizing that in pipeline parallelism this creates massive upstream and downstream wait times.
    **The Consequence:** Significant bubble overhead severely degrades overall training throughput, largely neutralizing the benefits of the multi-chip pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline contains S stages taking T time per micro-batch.
    - GPipe experiences (S-1)*T bubble overhead.
    
    **Calculations:**
    - GPipe Bubble: (S-1) * T idle time per stage.
    - Interleaved (1F1B) Bubble: Active compute overlaps immediately.
    - Effective Throughput: Reaches 100% steady-state after pipeline warmup.
    
    **Conclusion & Interpretation:**
    - **Result: 100% steady-state throughput (Compute-Bound)**. Interleaved scheduling largely neutralizes the pipeline bubble overhead.
