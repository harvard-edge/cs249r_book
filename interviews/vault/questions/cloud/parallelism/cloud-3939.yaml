title: MI300X Infinity Fabric vs H100 NVLink for Communication Overlap
scenario: You are choosing between an 8x H100 DGX node (NVLink 900 GB/s bisection) and an 8x MI300X node (Infinity Fabric 896 GB/s bisection) for distributed training of a 70B LLM.
question: How do H100 NVSwitch and MI300X Infinity Fabric topology differences affect overlap for 70B LLM training?
details:
  realistic_solution: 'Key differences for overlap: (1) H100 NVSwitch: flat topology, all pairs get 450 GB/s bidirectional. AllReduce is perfectly balanced. (2) MI300X Infinity Fabric: hierarchical — pairs within the same OAM module have higher bandwidth than cross-module pairs. This creates uneven AllReduce performance. (3) For overlap, consistency matters: if AllReduce latency varies by 30% across pairs, the overlap buffer must account for the worst case. H100''s flat topology gives predictable AllReduce timing, making overlap scheduling easier. (4) MI300X compensates with 192GB VRAM — more model data stays resident, reducing communication frequency in ZeRO-3. (5) Recommendation: for TP (frequent, small AllReduces), H100 NVSwitch is better. For FSDP (infrequent, large AllGathers), MI300X''s larger memory reduces communication need.'
  common_mistake: |
    **The Pitfall:** Comparing only peak aggregate bandwidth numbers.
    **The Rationale:** 900 GB/s vs 896 GB/s looks identical on paper.
    **The Consequence:** Missing the fact that Infinity Fabric is hierarchical while NVSwitch is flat, leading to uneven AllReduce latency that ruins communication-computation overlap scheduling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B parameters, TP=8, 96 layers.
       - AllReduce Payload: 160 MB.
       - H100 bandwidth: 450 GB/s (Flat NVSwitch).
       - MI300X bandwidth: 300-450 GB/s (Hierarchical Infinity Fabric).
    2. **Calculations:**
       - Total AllReduces: 2 per layer * 96 layers = 192 AllReduces.
       - H100 Predictable Time: 192 * (160 MB / 450 GB/s) = 192 * 0.355 ms = 68.2 ms.
       - MI300X Worst-Case Time: 192 * (160 MB / 300 GB/s) = 192 * 0.533 ms = 102.4 ms.
       - Variance: 102.4 ms - 68.2 ms = 34.2 ms.
    3. **Conclusion & Interpretation:** **~34ms variance (Topology/Communication-Bound).**
