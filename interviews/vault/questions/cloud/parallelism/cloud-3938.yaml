title: Overlapping KV Cache Transfer with Decode Computation in Serving
scenario: In a disaggregated LLM serving system (separate prefill and decode GPUs), after prefill completes, the KV cache (2GB for a long context) must be transferred from the prefill GPU to the decode GPU via NVLink. During transfer, the decode GPU is idle.
question: How would you overlap transferring a 2GB KV cache over NVLink with decode on the destination GPU?
details:
  realistic_solution: 'Streamed KV cache transfer: (1) Partition the KV cache by layer (e.g., 80 layers for a 70B model). (2) Transfer layer 0''s KV cache (~25MB per layer). (3) As soon as layer 0''s KV arrives, start decode for layer 0 while layer 1''s KV is transferring. (4) Pipeline: transfer(layer_i+1) || decode(layer_i). Decode per layer: ~0.5ms. KV transfer per layer: 25MB / 900 GB/s = 0.028ms. Since decode >> transfer, the KV transfer is completely hidden after the first layer. Total time: 0.028ms (first transfer) + 80 x 0.5ms (decode) = 40ms vs sequential: 2.2ms + 40ms = 42.2ms. Savings: 5%. Small here but critical at high QPS where every ms matters for SLA.'
  common_mistake: |
    **The Pitfall:** Waiting for the entire KV cache to transfer before starting decode.
    **The Rationale:** Candidates often assume memory transfers are monolithic and indivisible.
    **The Consequence:** A 2GB transfer over NVLink at 900 GB/s takes 2.2ms, during which the decode GPU is completely idle.
  napkin_math: |
    - **KV cache per layer**: 2000MB total / 80 layers = 25MB.
    - **Transfer at 900 GB/s**: 25MB / 900 GB/s = 0.028ms.
    - **Decode at**: ~0.5ms/layer.
    - **Transfer is**: 18x faster than compute.
    - **Result**: **Perfect overlap.**
