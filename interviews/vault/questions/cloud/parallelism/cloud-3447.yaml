title: TPU v5e Multi-Tenant Scheduling and Preemption
scenario: You are managing a multi-tenant ML cluster utilizing TPU v5e devices (16 GB HBM, 197 TFLOPS BF16). A critical inference service requiring 2 GB HBM and 20 TFLOPS BF16 needs to run, but an LLM training job is currently occupying an entire TPU v5e.
question: How would you schedule the 2 GB, 20 TFLOPS inference job onto the occupied TPU v5e while minimizing disruption, and what are the trade-offs?
details:
  realistic_solution: |
    A realistic solution should first ask what the TPU runtime and cluster scheduler actually support. If the stack has explicit TPU preemption or gang-scheduled priority queues, use that mechanism at a safe job boundary: checkpoint or drain the training step, run the urgent inference job, then resume training. If the occupied TPU v5e cannot be partitioned or time-sliced with isolation guarantees, do not assume MIG-like sharing. Minimizing disruption means either delaying inference until the training job reaches a checkpoint, preempting the training job with known restart cost, or provisioning a separate TPU for inference. The main trade-off is latency versus training waste: co-location without scheduler support risks unpredictable contention, while checkpoint/preempt/provision choices make the cost explicit.
  common_mistake: |
    **The Pitfall:** Simply preempting and restarting the training job, or assuming simple time-slicing will suffice.
    **The Rationale:** Full preemption leads to significant wasted computation and increased time-to-train. Simple time-slicing ignores memory bandwidth or compute constraints and potential resource contention.
    **The Consequence:** Severe disruption to the training job or missed latency SLAs for the inference service due to unmanaged contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e Capacity: 16 GB HBM, 197 TFLOPS BF16.
    - Inference Requirement: 2 GB HBM, 20 TFLOPS BF16.
    - The TPU is already fully allocated to training, and no hardware partitioning guarantee is stated.

    **Calculations:**
    - Capacity fractions are small: 20 / 197 = 10.2% of peak BF16 compute and 2 / 16 = 12.5% of HBM capacity.
    - These fractions do not predict training slowdown because contention depends on kernel timing, memory bandwidth, compiler placement, and scheduler isolation.
    - If the scheduler can only run one TPU job at a time, the disruption is explicit preemption time plus lost work since the last checkpoint; if it cannot be interrupted safely, inference must wait or use another TPU.

    **Conclusion & Interpretation:**
    - **Result: choose queueing, checkpoint/preemption, or another TPU unless TPU-native isolation is guaranteed.** The 10.2% compute and 12.5% memory fractions are capacity checks, not a valid slowdown estimate.
