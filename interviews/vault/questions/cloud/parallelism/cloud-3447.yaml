title: TPU v5e Multi-Tenant Scheduling and Preemption
scenario: 'You are managing a multi-tenant ML cluster utilizing TPU v5e devices (16 GB HBM, 197 TFLOPS BF16). A critical inference service requiring 2 GB HBM and 20 TFLOPS BF16 needs to run, but an LLM training job is currently occupying an entire TPU v5e.'
question: 'How would you schedule the 2 GB, 20 TFLOPS inference job onto the occupied TPU v5e while minimizing disruption, and what are the trade-offs?'
details:
  realistic_solution: "A realistic solution would involve leveraging advanced scheduling techniques. If the TPU v5e supports fine-grained resource partitioning (analogous to NVIDIA's MIG or MPS for GPUs, but specific to TPU architecture), one could attempt to dynamically allocate a fraction of the TPU's resources to the inference job. Specifically, since the inference job requires only 2 GB HBM (out of 16 GB) and 20 TFLOPS (out of 197 TFLOPS BF16), it might be possible to pause the LLM training, checkpoint its state, run the inference job, and then resume the training. Ideally, a scheduler integrated with the TPU runtime would allow for co-location through mechanisms like time-slicing (if the inference job is bursty and short) or even finer-grained sharing of compute units if the hardware permits. Graceful preemption with checkpointing is crucial to minimize training disruption. The system should prioritize the high-priority inference job, potentially by pausing the training model's execution pipeline on certain cores or allocating dedicated memory blocks."
  common_mistake: |
    **The Pitfall:** Simply preempting and restarting the training job, or assuming simple time-slicing will suffice.
    **The Rationale:** Full preemption leads to significant wasted computation and increased time-to-train. Simple time-slicing ignores memory bandwidth or compute constraints and potential resource contention.
    **The Consequence:** Severe disruption to the training job or missed latency SLAs for the inference service due to unmanaged contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e Capacity: 16 GB HBM, 197 TFLOPS BF16.
    - Inference Requirement: 2 GB HBM, 20 TFLOPS BF16.

    **Calculations:**
    - Compute Impact: 20 / 197 = 10.15% reduction for training.
    - Memory Impact: 2 / 16 = 12.5% reduction for training.

    **Conclusion & Interpretation:**
    - **Result: ~10-12.5% proportional slowdown (Compute-Bound)**. Hardware partitioning avoids full preemption overhead while satisfying the strict SLA.
