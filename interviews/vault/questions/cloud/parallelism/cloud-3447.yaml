title: TPU v5e Multi-Tenant Scheduling and Preemption
scenario: You are managing a multi-tenant ML cluster utilizing TPU v5e devices (16 GB HBM, 197 TFLOPS BF16). A critical inference service requiring 2 GB HBM and 20 TFLOPS BF16 needs to run, but an LLM training job is currently occupying an entire TPU v5e.
question: How would you schedule the 2 GB, 20 TFLOPS inference job onto the occupied TPU v5e while minimizing disruption, and what are the trade-offs?
details:
  realistic_solution: |
    The primary strategy is priority preemption at a safe boundary: mark the inference service as higher priority, ask the scheduler to stop the training job after its current step or next checkpoint, run the short inference workload, then resume training from the checkpoint. This gives predictable inference latency without assuming TPU v5e has MIG-like partitioning. If the runtime supports TPU-native time slicing with isolation, reserve a small quota only after measuring HBM bandwidth and MXU contention; otherwise avoid co-location because the training job already owns the device. If checkpoint latency is too high for the inference SLO, route the request to a spare TPU or keep a small hot standby pool. The trade-off is explicit latency versus wasted training work: checkpoint-and-preempt bounds interference, while waiting preserves training progress but may miss the inference deadline.
  common_mistake: |
    **The Pitfall:** Simply preempting and restarting the training job, or assuming simple time-slicing will suffice.
    **The Rationale:** Full preemption leads to significant wasted computation and increased time-to-train. Simple time-slicing ignores memory bandwidth or compute constraints and potential resource contention.
    **The Consequence:** Severe disruption to the training job or missed latency SLAs for the inference service due to unmanaged contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e Capacity: 16 GB HBM, 197 TFLOPS BF16.
    - Inference Requirement: 2 GB HBM, 20 TFLOPS BF16.
    - The TPU is already fully allocated to training, and no hardware partitioning guarantee is stated.

    **Calculations:**
    - Capacity fractions are small: 20 / 197 = 10.2% of peak BF16 compute and 2 / 16 = 12.5% of HBM capacity.
    - These fractions do not predict training slowdown because contention depends on kernel timing, memory bandwidth, compiler placement, and scheduler isolation.
    - If the scheduler can only run one TPU job at a time, the recommended disruption is checkpoint latency plus preemption/resume time; lost work is bounded by the time since the last checkpoint or safe step boundary.
    - If that delay violates the inference SLO, using a spare TPU is the only predictable option without verified TPU-native isolation.

    **Conclusion & Interpretation:**
    - **Result: use checkpoint-and-preempt as the default scheduling action, with spare-capacity spillover for tighter SLOs.** The 10.2% compute and 12.5% memory fractions are capacity checks, not a valid slowdown estimate.
