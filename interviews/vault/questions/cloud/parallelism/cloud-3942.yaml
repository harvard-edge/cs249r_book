title: PCIe DMA Engine Overlap for Host-Device Data Movement
scenario: An H100 GPU has a DMA copy engine separate from its compute SMs.
question: How does H100's separate DMA copy engine let PCIe transfers overlap with kernel execution?
details:
  realistic_solution: 'Utilize asynchronous CUDA streams to overlap H2D (Host-to-Device), Compute, and D2H (Device-to-Host) operations. The H100''s dual DMA engines operate independently from the 132 SMs, sharing only the massive HBM bandwidth.'
  common_mistake: |
    **The Pitfall:** Thinking the GPU must pause computation to handle PCIe data transfers.
    **The Rationale:** Candidates conflate the GPU's main compute units (SMs) with its memory controllers and I/O engines.
    **The Consequence:** They fail to architect pipelines that hide I/O latency behind compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 HBM3 bandwidth is 3.35 TB/s.
    - PCIe Gen5 x16 bandwidth is 64 GB/s.
    - Compute kernel BW is ~2.5 TB/s typically.

    **Calculations:**
    - PCIe uses 64 GB/s out of 3350 GB/s HBM bandwidth.
    - Bandwidth fraction: 64 / 3350 = 1.9%.

    **Conclusion & Interpretation:**
    - **Result: PCIe DMA consumes <2% of HBM bandwidth (I/O-Unconstrained)**. The system allows concurrent H2D, D2H, and Compute.
