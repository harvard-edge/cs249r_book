title: 'Optimizing Frontier Model Training with 3D Parallelism on NVIDIA A100'
scenario: 'Your team is tasked with training a new frontier large language model with 500 billion parameters. Each parameter is stored in FP16 precision. You have access to a cluster of machines, each equipped with 8 NVIDIA A100 GPUs (80 GB HBM2e) interconnected by NVLink within the node.'
question: 'How would you design 3D parallel training for a 500B FP16 model on 8-GPU A100 nodes while managing memory and communication?'
details:
  realistic_solution: 'A realistic solution requires a multi-faceted approach. First, Tensor Parallelism (TP) should be applied within an A100 node, slicing individual layers across the 8 GPUs to distribute model weights and intermediate activations. This leverages the high NVLink bandwidth (2.0 TB/s) for efficient communication between shards. Second, Pipeline Parallelism (PP) would partition the model''s layers into distinct stages, each assigned to a separate group of GPUs. This reduces the total memory needed per GPU group and allows for larger effective batch sizes, although it introduces pipeline bubbles. Third, Data Parallelism (DP) would be used across multiple nodes. To manage the immense memory, optimizer state sharding (e.g., ZeRO-Optimizer stage 2 or 3) is crucial. Additionally, activation checkpointing can trade recomputation for memory savings.'
  common_mistake: |
    **The Pitfall:** Underestimating the optimizer and gradient memory footprint.
    **The Rationale:** Candidates often multiply the 500B parameters by 2 bytes (FP16) and assume the memory requirement is simply 1 TB, completely neglecting the Adam optimizer states (which are usually stored in FP32).
    **The Consequence:** The design immediately Out-Of-Memory (OOM) crashes because it severely under-provisions the cluster by at least 5x.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Parameters: 500 billion
    - Precision: FP16 (2 bytes/parameter)
    - Optimizer: Adam (10 bytes/parameter)

    **Calculations:**
    - Model Memory = 500B * 2 bytes = 1,000 GB (1 TB)
    - Optimizer Memory = 500B * 10 bytes = 5,000 GB (5 TB)
    - Total Raw Memory = 1 TB + 5 TB = 6 TB
    - Minimum GPUs = 6,000 GB / 80 GB per GPU = 75 GPUs

    **Conclusion & Interpretation:**
    - **Result: 75 GPUs (Memory-Bound)**. Sharding all states requires at least 75 A100 GPUs strictly for memory capacity before activations are considered.
