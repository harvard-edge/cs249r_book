title: The Heterogeneous Fleet Capacity Plan
scenario: 'Your ML platform team manages a mixed fleet: 200 GPUs for training, 300 smaller GPUs for inference, and 100 for small batch jobs. The product team wants to launch a new 70B LLM serving tier that needs at least 4x of the training GPUs per replica. Training leadership says they cannot give up any hardware.'
question: How do you plan capacity for the new serving tier without buying new hardware?
details:
  realistic_solution: 'Analyze training fleet utilization patterns. Training jobs rarely achieve 100% utilization — there are idle periods between jobs, checkpointing gaps, and overnight/weekend utilization drops. Implement a time-sharing policy: (1) Measure actual training utilization (typically 60-75% for well-run clusters). (2) Identify recurring low-utilization windows. (3) Deploy inference replicas as lower-priority preemptible workloads on the fleet during these windows. (4) Use opportunistic scheduling: inference pods run when training resources are idle and get preempted when training jobs arrive.'
  common_mistake: |
    **The Pitfall:** Proposing to buy more hardware or serving 70B models on smaller, incapable GPUs.
    **The Rationale:** Treating compute as static pools and ignoring the minimum VRAM requirements of large models.
    **The Consequence:** Unnecessary capital expenditure or catastrophic out-of-memory crashes on incapable hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Training fleet: 200 suitable GPUs.
       * Serving replica cost: 4 training-class GPUs.
       * Training leadership will not permanently give up hardware, so capacity must be opportunistic and preemptible.
    2. **Calculations:**
       * At any time window t, available serving replicas = floor(idle training GPUs at t / 4).
       * If no training GPUs are idle, serving capacity from this pool is 0 replicas.
       * If measurement shows 40 idle training GPUs in a recurring window, the safe plan for that window is floor(40 / 4) = 10 preemptible replicas, not a permanent reservation.
    3. **Conclusion & Interpretation:** **Result: Utilization-Bound.** Capacity planning requires measured idle-GPU windows and a time-sharing policy; the scenario does not support a fixed always-on replica count without taking hardware from training.
