title: AllReduce Communication Hiding with Computation Overlap
scenario: Your 128-H100 training job has a 200ms backward pass and a 60ms AllReduce (2GB gradients over 400Gbps). Currently these are sequential, giving 260ms per iteration. You need to calculate the maximum achievable overlap and the resulting iteration time by overlapping AllReduce with backward computation.
question: With a 200ms backward pass and 60ms AllReduce on 128 H100s, what maximum overlap and iteration time can you achieve?
details:
  realistic_solution: With only the aggregate times given, the theoretical best case is to overlap the entire 60ms AllReduce with the 200ms backward pass. The iteration time becomes max(200ms, 60ms) = 200ms instead of 260ms, so the maximum hidden communication is 60ms and the speedup is 260/200 = 1.30x, or a 23.1% reduction in iteration time. Any partial-overlap answer would require an explicit bucket/layer schedule or a non-overlapped tail in the prompt.
  common_mistake: |
    **The Pitfall:** Assuming 100% overlap is achievable.
    **The Rationale:** Forgetting the sequential dependencies at the beginning and end of the backward pass and network transfers.
    **The Consequence:** Missing the sequential tail limit: the last gradient must finish compute before its AllReduce starts, capping theoretical speedup.
  napkin_math: |
    **Assumptions & Constraints:**
    - Backward compute time: 200 ms.
    - AllReduce time: 60 ms.
    - Sequential baseline: 260 ms.
    - No bucket/layer schedule or exposed tail is specified.

    **Calculations:**
    - Maximum overlap = min(200 ms, 60 ms) = 60 ms.
    - Best overlapped iteration time = max(200 ms, 60 ms) = 200 ms.
    - Time saved = 260 ms - 200 ms = 60 ms.
    - Relative iteration-time reduction = 60 / 260 = 23.1%.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound after full overlap**. The stated inputs support 60 ms of hidden communication and a 200 ms iteration time; finer tails require additional schedule assumptions.
