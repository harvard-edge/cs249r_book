title: Micro-Batch Size Impact on Pipeline Parallelism Bubble Ratio
scenario: Your 8-stage pipeline trains a 175B model with a global batch of 1024. With 4 micro-batches, the bubble ratio is (8-1)/4 = 175% overhead. With 32 micro-batches, it drops to (8-1)/32 = 21.9%. Increasing micro-batches requires reducing per-micro-batch size, which may hurt GPU compute efficiency.
question: How would you choose the micro-batch count for an 8-stage pipeline with global batch 1024, balancing bubble ratio and GPU efficiency?
details:
  realistic_solution: 'Choose the micro-batch count by sweeping values that divide the global batch and measuring both pipeline bubble and per-micro-batch kernel efficiency. With k=8 pipeline stages and m micro-batches, the simple bubble overhead relative to useful work is (k-1)/m. The per-micro-batch batch size is 1024/m, so increasing m reduces the bubble but also shrinks each GPU kernel. Under an illustrative utilization model where batch 256 is efficient, batch 32 is still acceptable, and batch 16 is too small, m=32 is a reasonable candidate. It is not universal: the final choice should be the measured maximum of GPU utilization x m/(m+k-1) for the actual model and hardware.'
  common_mistake: |
    **The Pitfall:** Maximizing micro-batch count purely to minimize the pipeline bubble.
    **The Rationale:** Candidates forget that smaller micro-batches drastically reduce GPU arithmetic intensity and utilization.
    **The Consequence:** A low-bubble pipeline that actually executes much slower because the GPU is starved for work.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global batch: 1024.
    - Pipeline stages k=8.
    - Micro-batch size is 1024/m.
    - Illustrative GPU utilization assumptions: 0.95 at micro-batch 256, 0.75 at 32, and 0.50 at 16.

    **Calculations:**
    - Bubble overhead: (k-1)/m.
    - Pipeline useful fraction: m/(m+k-1).
    - m=4, micro-batch 256: useful fraction = 4/(4+7) = 0.364; effective = 0.95 x 0.364 = 0.346.
    - m=32, micro-batch 32: useful fraction = 32/(32+7) = 0.821; effective = 0.75 x 0.821 = 0.616.
    - m=64, micro-batch 16: useful fraction = 64/(64+7) = 0.901; effective = 0.50 x 0.901 = 0.451.

    **Conclusion & Interpretation:**
    - **Result: Conditional Optimum**. With these utilization assumptions, m=32 gives the best effective throughput; with different kernel efficiency measurements, the optimum can move.
