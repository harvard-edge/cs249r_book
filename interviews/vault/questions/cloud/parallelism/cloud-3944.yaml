title: Micro-Batch Size Impact on Pipeline Parallelism Bubble Ratio
scenario: Your 8-stage pipeline trains a 175B model with a global batch of 1024. With 4 micro-batches, the bubble ratio is (8-1)/4 = 175% overhead. With 32 micro-batches, it drops to (8-1)/32 = 21.9%. Increasing micro-batches requires reducing per-micro-batch size, which may hurt GPU compute efficiency.
question: How would you choose the micro-batch count for an 8-stage pipeline with global batch 1024, balancing bubble ratio and GPU efficiency?
details:
  realistic_solution: 'The optimal micro-batch count balances bubble ratio against per-micro-batch GPU efficiency. (1) GPU efficiency vs micro-batch size: H100 Tensor Cores need batch >= 64 for >80% utilization on typical matmuls. Below batch 32, utilization drops rapidly. (2) If global batch = 1024, and k=8 stages: m micro-batches of size 1024/m each. At m=4: batch 256 per micro-batch (high GPU efficiency ~95%), bubble 175%. At m=32: batch 32 per micro-batch (moderate GPU efficiency ~75%), bubble 21.9%. At m=64: batch 16 (low efficiency ~50%), bubble 10.9%. (3) Effective throughput = GPU_efficiency x (1 / (1 + bubble_fraction)). Optimal is m=32.'
  common_mistake: |
    **The Pitfall:** Maximizing micro-batch count purely to minimize the pipeline bubble.
    **The Rationale:** Candidates forget that smaller micro-batches drastically reduce GPU arithmetic intensity and utilization.
    **The Consequence:** A low-bubble pipeline that actually executes much slower because the GPU is starved for work.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global batch: 1024.
    - 8-stage pipeline.

    **Calculations:**
    - m=4 (Batch 256): 95% GPU util, 175% bubble. Effective = 0.95 * (1 / 2.75) = 0.34.
    - m=32 (Batch 32): 75% GPU util, 21.9% bubble. Effective = 0.75 * (1 / 1.219) = 0.615.
    - m=64 (Batch 16): 50% GPU util, 10.9% bubble. Effective = 0.50 * (1 / 1.109) = 0.45.

    **Conclusion & Interpretation:**
    - **Result: 0.615 Effective Throughput (Pipeline-Bubble-Bound)**. m=32 balances pipeline bubbles against GPU utilization, yielding 1.8x faster throughput than m=4.
