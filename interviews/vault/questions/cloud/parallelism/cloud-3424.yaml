title: Optimizing LLM Pipeline Parallelism on AMD MI300X with Micro-batching and Interleaving
scenario: You are tasked with deploying a large language model (LLM) consisting of 8 sequential layers onto a cluster of 8 GPUs. You've opted for a pipeline parallel strategy, mapping one LLM layer to each GPU. Initially, you're processing requests with a global batch size of 1, leading to significant GPU underutilization due to 'pipeline bubbles'. To improve throughput, you're considering implementing micro-batching and an interleaved schedule (e.g., GPipe or PipeDream variant).
question: How do pipeline bubbles arise with 8 stages at batch size 1, and how would micro-batching and interleaving improve throughput?
details:
  realistic_solution: Implement an interleaved pipeline scheduling strategy (e.g., similar to GPipe or PipeDream) to overlap computation and communication, effectively hiding pipeline bubbles for continuous workloads. Dynamically adjust the micro-batch size based on profiling to find the sweet spot that maximizes the compute utilization without saturating the HBM3 memory bandwidth or exceeding the HBM3 capacity per GPU. Furthermore, ensure balanced computational load across the 8 stages to prevent a single bottleneck.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of pipeline bubbles or choosing an arbitrary micro-batch size.
    **The Rationale:** Teams often implement basic pipeline parallelism without interleaving, failing to realize how much time GPUs spend idle waiting for prior stages.
    **The Consequence:** This leads to severe GPU underutilization or, if micro-batch size is chosen poorly, excessive memory pressure that saturates bandwidth without improving throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Pipeline stages (P) = 8.
       - Micro-batches (M) = 4.
       - Time per stage = t.
    2. **Calculations:**
       - Naive Pipeline Time = (P + M - 1) * t = (8 + 4 - 1) * t = 11t.
       - Naive Throughput = M / 11t = 4 / 11t ≈ 0.36/t.
       - Interleaved Throughput ≈ 1 / t.
       - Improvement Factor = (1/t) / (0.36/t) = 11 / 4 = 2.75.
    3. **Conclusion & Interpretation:**
       - **Result: 2.75x throughput boost.** Interleaved scheduling drastically reduces pipeline bubble idle time.
