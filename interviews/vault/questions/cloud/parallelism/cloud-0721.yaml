title: The 3D Parallelism Orchestration
scenario: You have 1,024 H100 GPUs across 128 DGX nodes. You need to train a 175B parameter GPT-style model with 96 transformer layers.
question: How would you assign Tensor (T), Pipeline (P), and Data (D) parallelism across 1,024 H100s for a 175B, 96-layer model, and what physical constraint justifies each?
details:
  realistic_solution: 'Solve inside-out from physical constraints. **Tensor parallelism ($T=8$):** TP requires AllReduce on activations at every layer — this needs NVLink bandwidth (900 GB/s). The NVLink domain is exactly 8 GPUs per DGX node, so $T=8$. Going beyond 8 would cross to InfiniBand (50 GB/s), an 18\times bandwidth cliff. **Pipeline parallelism ($P=8$):** 96 layers / 8 stages = 12 layers per stage. Each stage holds $175B/8 \times 2B = 43.75\text{ GB}$ of weights (fits in 80 GB). Pipeline communication is point-to-point activations between adjacent stages — low bandwidth, tolerant of InfiniBand latency. **Data parallelism ($D$):** $D = 1024 / (8 \times 8) = 16$. DP AllReduce happens once per step (not per layer), so it tolerates inter-node bandwidth. Verify: 16 DP replicas \times 8 TP \times 8 PP = 1024 GPUs.'
  common_mistake: |
    **The Pitfall:** Maximizing data parallelism for simplicity (e.g., T=1, P=1, D=1024) or picking arbitrary dimensions.
    **The Rationale:** Candidates ignore the physical memory constraints (a 175B model won't fit on one GPU) and the massive bandwidth drop-off between NVLink and InfiniBand.
    **The Consequence:** Proposing impossible physical topologies or configurations that cause catastrophic network bottlenecks during training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 175B model, 1024 H100s, DGX nodes (8 GPUs).

    **Calculations:**
    - Weights: 175B * 2B = 350 GB.
    - T=8 aligns with NVLink domain (8 GPUs).
    - P=8 gives 12 layers/stage. Memory/stage: 350 GB / 64 = 5.47 GB.
    - D=16 (1024 / 64). Ring-AllReduce moves ~10.25 GB per step.

    **Conclusion & Interpretation:**
    - **Result: T=8, P=8, D=16 maps perfectly to NVLink and InfiniBand limits**.
