title: The ZeRO-3 Cross-Node Thrashing
scenario: You are training a 500B model using DeepSpeed ZeRO-3 across 256 GPUs. ZeRO-3 shards all parameters across all GPUs. The training speed is acceptable. However, when you increase the batch size slightly to improve utilization, the training time per step skyrockets by 500%. You haven't run out of memory (OOM).
question: Why did a slight batch size increase cause ZeRO-3 step time to spike?
details:
  realistic_solution: |
    The batch increase consumed the spare activation memory that ZeRO-3 was using as a prefetch buffer. ZeRO-3 stores only a shard of the model on each GPU, but each layer must all-gather its full weights before that layer can run. When prefetch overlap works, the next layer's all-gather happens while the current layer computes. When activation memory squeezes out the prefetch window, the GPU reaches a layer boundary and waits for the weight all-gather on the critical path. The network was not "destroyed"; the job lost communication/compute overlap and became dominated by repeated cross-node all-gathers.
  common_mistake: |
    **The Pitfall:** Concluding that larger batches naturally take longer to compute, failing to recognize the non-linear phase transition.
    **The Rationale:** Engineers know compute scales with batch size, but a 500% spike implies a complete phase transition from compute-bound to network-bound execution.
    **The Consequence:** Misdiagnosing the root cause and possibly throwing more GPUs at the problem instead of tuning ZeRO-3's prefetch buffers or reducing activation memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500B model = 1 TB FP16 weights.
    - Assume 80 transformer layers for a rough per-layer estimate.
    - ZeRO-3 shards parameters over 256 GPUs.
    - Effective cross-node all-gather bandwidth on the critical path: 50 GB/s.
    - Compute takes about 200 ms per layer.

    **Calculations:**
    - Total weight shard stored per GPU: 1 TB / 256 = 3.9 GB.
    - Average full layer weight size: 1 TB / 80 = 12.5 GB.
    - Per-layer local shard already resident per GPU: 12.5 GB / 256 = 49 MB.
    - Per-layer remote weight data needed by AllGather: about 12.5 GB * (255/256) = 12.45 GB.
    - Per-layer AllGather time if not overlapped: 12.45 GB / 50 GB/s = 249 ms.
    - With prefetch overlap, most of that 249 ms can be hidden behind the 200 ms compute of the previous layer. Without overlap, the layer boundary pays that transfer time directly.

    **Conclusion & Interpretation:**
    - **Result: Lost prefetch overlap.** The step-time spike comes from putting roughly 249 ms of all-gather latency per layer onto the critical path, compounded across many layers, not from the small batch increase's compute cost alone.
