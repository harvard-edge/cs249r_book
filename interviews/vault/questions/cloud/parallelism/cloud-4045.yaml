title: Gradient Accumulation as Communication Reduction
scenario: Your 64-GPU cluster trains a 7B model with micro-batch size 4 per GPU. AllReduce of 14GB gradients (FP32) takes 280ms per iteration. Compute (forward + backward) takes 150ms per micro-batch. You decide to accumulate gradients over 4 micro-batches before AllReducing.
question: With 4x micro-batch accumulation on 64 GPUs, what are the effective batch size, communication overhead reduction, and memory cost?
details:
  realistic_solution: 'Without accumulation: Effective batch size = 64 GPUs * 4 = 256. Iteration time: 150ms compute + 280ms AllReduce = 430ms. Throughput: 256 samples / 430ms = 595 samples/sec. With 4x accumulation: Effective batch size = 64 * 4 * 4 = 1024. Iteration time: 4 * 150ms compute + 1 * 280ms AllReduce = 880ms. Throughput: 1024 samples / 880ms = 1163 samples/sec, which is 1163/595 = 1.95x the no-accumulation baseline. Communication fraction drops from 280/430 = 65.1% to 280/880 = 31.8%. Memory cost follows the prompt''s stated FP32 gradient tensor: the persistent accumulation buffer is 14GB, plus any existing gradients, activations, and optimizer state.'
  common_mistake: |
    **The Pitfall:** Not accounting for the memory overhead of gradient accumulation.
    **The Rationale:** Believing accumulation is a 'free' speedup and forgetting that gradients must persist across micro-batches while activations and optimizer buffers still consume memory.
    **The Consequence:** Encountering unexpected OOM errors or choosing a micro-batch schedule that cannot fit, even though AllReduce is deferred.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute: 150ms. AllReduce: 280ms.
       - Micro-batch = 4, GPUs = 64.
    2. **Calculations:**
       - No Accumulation: Effective batch = 256. Time = 150ms + 280ms = 430ms.
       - 4x Accumulation: Effective batch = 1024. Time = (4 * 150ms) + 280ms = 880ms.
       - Baseline throughput: 256 / 430ms = 595 samples/sec.
       - Accumulated throughput: 1024 / 880ms = 1163 samples/sec.
       - Throughput Gain: 1163 / 595 = 1.95x improvement.
       - Communication Overhead: Drops from 65% (280/430) to 32% (280/880).
       - Memory Cost: persistent FP32 accumulation buffer equals the stated gradient tensor size = 14GB.
    3. **Conclusion & Interpretation:**
       **1.95x throughput gain, overhead drops to 32%, requires a 14GB persistent FP32 accumulation buffer. Result: Memory-Capacity-Bound vs Communication tradeoff.**
