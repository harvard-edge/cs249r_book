title: 'Interleaved Pipeline Stages: Halving the Bubble'
scenario: Megatron-LM introduces interleaved pipeline schedules where each GPU holds multiple non-contiguous chunks of the model. Each GPU now has v=2 virtual stages.
question: How does an interleaved pipeline schedule reduce the pipeline bubble compared to standard 1F1B, and what is the communication cost?
details:
  realistic_solution: 'With interleaving factor v, each micro-batch pass through one virtual stage takes 1/v of the time of a standard stage (since each chunk has half the layers). The bubble fraction becomes (P-1)/(M×v + P-1). For P=4, M=8, v=2: standard bubble = 3/11 = 27.3%, interleaved bubble = 3/19 = 15.8%. With v=4: 3/35 = 8.6%. The cost is communication: each micro-batch now crosses GPU boundaries v times more, requiring v× more point-to-point sends between stages. For NVLink-connected GPUs within a node (900 GB/s on H100), this overhead is small. For cross-node InfiniBand (400 Gb/s = 50 GB/s), the communication overhead can offset the bubble reduction. Rule of thumb: use v=2-4 within a node, avoid high v across nodes.'
  common_mistake: |
    **The Pitfall:** Thinking interleaving just reorders computation without altering the total pipeline bubble overhead.
    **The Rationale:** Candidates fail to realize that smaller, non-contiguous chunks mean each micro-batch's forward/backward pass through a stage finishes much faster, allowing the pipeline to fill up earlier.
    **The Consequence:** Teams miss a massive optimization opportunity (nearly halving the bubble time) for models running within a high-bandwidth NVLink node.
  napkin_math: |
    **Assumptions & Constraints:**
    - P=4 GPUs, M=8 micro-batches.
    - Standard Bubble = (P-1) / (M + P - 1).
    - Interleaved Bubble = (P-1) / (M*v + P - 1).

    **Calculations:**
    - Standard Bubble: 3 / 11 = 27.3%.
    - Interleaved (v=2): 3 / 19 = 15.8%.
    - Interleaved (v=4): 3 / 35 = 8.6%.

    **Conclusion & Interpretation:**
    - **Result: 15.8% Bubble (Pipeline-Bound)**. Bubble size drops significantly, but cross-GPU boundary transfers scale by factor v.
