title: Evaluating Feature-Parallel Batching for DLRM
scenario: You are designing the inference architecture for a DLRM with 10 TB of embeddings sharded across 16 parameter servers equipped with 400 Gbps NICs. At 50,000 QPS, standard request-parallel batching (where each compute node processes a full request and fetches embeddings from all 16 servers) causes severe network incast and high P99 latency.
question: Should you switch to feature-parallel batching or upgrade to 800 Gbps NICs for the 50,000 QPS DLRM, and why?
details:
  realistic_solution: Implement feature-parallel batching first. By grouping feature lookups across a batch of requests and routing one aggregated request to each embedding shard, you reduce the burst of small RPCs hitting the parameter servers. The CPU cost of scatter-gather is amortized over the batch, while tail latency improves by reducing incast and per-RPC overhead. Faster NICs may help raw bandwidth, but they do not fix the many-small-RPC communication pattern.
  common_mistake: |
    **The Pitfall:** Focusing only on raw network bandwidth.
    **The Rationale:** Candidates often suggest upgrading to 800 Gbps NICs while ignoring the N-to-N all-to-all communication pattern that causes TCP incast, or failing to account for the scatter-gather CPU overhead introduced by feature-parallel batching.
    **The Consequence:** Wasting budget on hardware upgrades that fail to resolve the underlying architectural bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Request-parallel cycle: 100 compute workers each process one request and query all 16 embedding shards.
    - Feature-parallel cycle: one batch aggregator groups those same 100 requests by shard and sends one aggregated RPC per shard.

    **Calculations:**
    - Request-parallel RPCs per cycle: 100 workers * 16 shards = 1,600 RPCs.
    - Feature-parallel RPCs for the same 100 requests: 16 shard RPCs.
    - RPC-count reduction: 1,600 / 16 = 100x.
    - Payload bytes still depend on the number and size of embedding lookups; batching mainly removes many small RPCs, incast fan-in, and CPU overhead.

    **Conclusion & Interpretation:**
    - **Result: 100x fewer RPCs for this batch (Network Incast Mitigation)**. Feature-parallel batching can materially reduce incast and P99 latency, but it does not remove true bandwidth limits if embedding payload bytes dominate.
