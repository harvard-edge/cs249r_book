title: AllReduce Algorithm Selection in NCCL
scenario: NCCL auto-selects between ring, tree, and recursive halving-doubling algorithms based on message size and GPU count. You need to manually specify the optimal algorithm on a 2048-MI300X cluster with 8-rail 400Gbps networking for (a) 64KB control parameters, (b) 256MB per-layer gradient, (c) 4GB full-model gradient.
question: Which AllReduce algorithm should you choose for 64KB, 256MB, and 4GB gradients on 2048 MI300X GPUs, and why under LogP?
details:
  realistic_solution: 'Use one LogP model: α = 7μs per step, N=2048, and 8×400Gbps rails give 400GB/s when a large ring fully stripes traffic. Assume tree/recursive halving-doubling has 2log₂N = 22 latency steps but only 100GB/s effective payload bandwidth at this scale because it does not stripe all rails as efficiently; ring has 2(N-1)=4094 latency steps but 400GB/s payload bandwidth. (a) 64KB: choose recursive halving-doubling/tree because latency dominates: about 154μs versus 28.7ms for ring. (b) 256MB: choose tree: 154μs + 2×256MB/100GB/s ≈ 5.27ms, while ring is 28.7ms + 2×256MB/400GB/s ≈ 30.0ms. (c) 4GB: choose ring with chunking: 28.7ms + 2×4GB/400GB/s ≈ 48.7ms, while tree is 154μs + 2×4GB/100GB/s ≈ 80.2ms. Under these assumptions the tree-to-ring crossover is about 1.9GB.'
  common_mistake: |
    **The Pitfall:** Always choosing the Ring algorithm because it is bandwidth-optimal.
    **The Rationale:** Neglecting the O(N) latency term that dominates for small messages at large scale.
    **The Consequence:** Massive performance degradation for small control parameters across thousands of GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2048 GPUs, α = 7μs per step.
    - Ring large-message bandwidth: 8 × 400Gbps = 400GB/s.
    - Tree/RHD effective bandwidth assumption: 100GB/s.
    - Ring latency overhead = 2 × 2047 × 7μs = 28.7ms.
    - Tree/RHD latency overhead = 2 × 11 × 7μs = 154μs.

    **Calculations:**
    - 64KB: Tree/RHD ≈ 154μs + 2 × 64KB / 100GB/s ≈ 155μs; Ring ≈ 28.7ms.
    - 256MB: Tree ≈ 154μs + 2 × 256MB / 100GB/s = 5.27ms; Ring ≈ 28.7ms + 2 × 256MB / 400GB/s = 30.0ms.
    - 4GB: Tree ≈ 154μs + 2 × 4GB / 100GB/s = 80.2ms; Ring ≈ 28.7ms + 2 × 4GB / 400GB/s = 48.7ms.
    - Crossover: 28.7ms + 2S/400GB/s = 154μs + 2S/100GB/s, so S ≈ 1.9GB.

    **Conclusion & Interpretation:**
    - **Result: choose Tree/RHD for 64KB, Tree for 256MB, and Ring for 4GB.** The choice changes when ring's bandwidth advantage outweighs its 4094-step latency cost.
