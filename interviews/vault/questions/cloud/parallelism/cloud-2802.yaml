title: Sequence Parallelism for 100k Contexts on 1T Models
scenario: Training a 1T parameter model on an H100 cluster with massive 100k token context lengths. Activations are causing OOM errors.
question: How would you combine sequence parallelism with Megatron-style training to handle 100k contexts for a 1T model without hitting HBM3 limits?
details:
  realistic_solution: |
    Use Megatron sequence parallelism for the per-token activations that are naturally shardable across the tensor-parallel group, such as layernorm, dropout, and activation outputs, and combine it with activation checkpointing for the large retained tensors. For full 100k-context attention, add a sequence-parallel attention variant such as ring attention: shard the sequence across the TP group, keep each GPU's local Q block, and stream K/V blocks around NVLink so attention is computed without materializing the full sequence on every GPU. This distinction matters because standard Megatron sequence parallelism reduces activation replication, while the K/V ring is an additional long-context attention dataflow.
  common_mistake: |
    **The Pitfall:** Relying exclusively on activation recomputation (gradient checkpointing) to solve massive context lengths.
    **The Rationale:** Engineers default to standard memory-saving techniques without realizing the computational penalty of re-calculating massive 100k attention matrices.
    **The Consequence:** The VRAM limit is technically bypassed, but training throughput plummets to unusable levels due to massive recomputation waste.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1T model, 100k context length, batch size 1.
    - 8192 dim, 2 bytes/param (FP16/BF16).

    **Calculations:**
    - Hidden activation per layer: 100k tokens * 8192 hidden * 2 bytes ≈ 1.64 GB.
    - If every layer's hidden activation were retained, 100 layers would require about 164 GB, but training normally uses activation checkpointing and retains only selected boundaries plus attention/MLP intermediates.
    - With TP=8 sequence parallelism, shardable per-token activations are divided across GPUs: 1.64 GB / 8 ≈ 205 MB per layer for those tensors.
    - If checkpointing retains one activation boundary per transformer block, the retained hidden-state component is about 164 GB / 8 ≈ 20.5 GB per GPU, before non-sharded tensors, optimizer state, and workspace.

    **Conclusion & Interpretation:**
    - **Result: ~20 GB per GPU for the checkpointed hidden-state component (Memory-Capacity-Bound).** The complete footprint is higher, so the design needs sequence parallelism plus checkpointing and a ring-attention-style dataflow for full 100k attention.
