title: The MIG Partitioning Tradeoff
scenario: 'Your cluster has 8 GPUs. A mix of workloads arrives: some large training jobs need a full GPU, but many small inference jobs only need 10GB of VRAM and a fraction of compute. An engineer proposes using Multi-Instance GPU (MIG) to partition each GPU into 7 slices.'
question: What is the fundamental tradeoff MIG introduces, and why can you not simply get 7x the jobs from each GPU?
details:
  realistic_solution: 'MIG trades peak single-job performance for multi-tenant isolation. A slice gets only a fraction of active SMs and memory bandwidth. Jobs that are memory-bandwidth-bound see throughput drop drastically per slice. The benefit is strict QoS isolation.'
  common_mistake: |
    **The Pitfall:** Assuming MIG partitions give 7 independent GPU-equivalent resources.
    **The Rationale:** Engineers equate a slice to a full virtualized instance without considering hardware bus partitioning.
    **The Consequence:** Expectations for throughput are overestimated because each MIG slice has proportionally less memory bandwidth and fewer SMs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full GPU: 2 TB/s bandwidth, 98 SMs.
    - MIG Slice: ~286 GB/s, 14 SMs.
    
    **Calculations:**
    - Inference on full GPU = ~40 tokens/sec.
    - Inference on 1 slice = ~6 tokens/sec.
    - Aggregate over 7 slices = ~42 tokens/sec.
    
    **Conclusion & Interpretation:**
    - **Result: ~42 tokens/sec (Bandwidth-Bound)**. MIG gives comparable total throughput, but deeply throttles individual job performance.
