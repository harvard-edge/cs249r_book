title: 'Tensor Parallelism for Attention Heads: Optimal Head Distribution'
scenario: You are implementing tensor parallelism for attention in a 7B model (32 Q heads, 8 KV heads, d_head=128) on 4x H100s. A junior engineer proposes splitting heads evenly.
question: How should you split Q and KV heads for Grouped-Query Attention (GQA) with 32 Q heads, 8 KV heads, and TP=4 on 4 H100s?
details:
  realistic_solution: 'For GQA with TP=4, assign 8 Q heads and 2 KV heads per GPU. Preserve the global 4:1 Q:KV grouping locally: rank 0 can own Q heads 0-7 with KV heads 0-1, rank 1 owns Q heads 8-15 with KV heads 2-3, and so on. Each rank computes attention for its 8 Q heads against its 2 local KV heads, so no rank needs remote KV reads during attention. The implementation rule is that both Q heads and KV heads must divide evenly by TP, and each rank''s Q-head slice must align with complete local KV groups.'
  common_mistake: |
    **The Pitfall:** Assuming Q and KV heads must be split symmetrically.
    **The Rationale:** Engineers apply Multi-Head Attention (MHA) logic to GQA, breaking the grouped structure and necessitating massive cross-GPU communication.
    **The Consequence:** Ruining the performance benefits of Tensor Parallelism due to interconnect bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 Q heads, 8 KV heads.
    - TP Degree: 4.
    - Keep each rank's Q heads local to its assigned KV heads.

    **Calculations:**
    - Q heads per GPU: 32 / 4 = 8 Q heads.
    - KV heads per GPU: 8 / 4 = 2 KV heads.
    - Q heads per KV head globally: 32 / 8 = 4.
    - Per GPU: 8 Q heads attend to 2 local KV heads, preserving 8:2 = 4:1 locally.
    - Example mapping: rank r gets Q heads [8r, 8r+7] and KV heads [2r, 2r+1].
    - Divisibility check: 32 Q heads and 8 KV heads both divide by TP=4; otherwise some ranks would need uneven head slices or cross-GPU KV access.

    **Conclusion & Interpretation:**
    - **Result: 8 Q heads and 2 KV heads per GPU.** To avoid cross-GPU attention computation, each rank keeps complete local GQA groups and preserves the 4:1 Q:KV ratio within its shard.
