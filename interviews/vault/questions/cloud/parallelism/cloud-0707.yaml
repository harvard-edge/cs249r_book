title: The AllReduce Scaling Trap
scenario: 'You are a Staff ML Systems Engineer running a distributed training job for a 70B parameter model using FP16 precision. When training on a single 8xH100 node, performance is excellent. When you scale to two nodes (16 GPUs), your effective throughput per GPU drops by 60%. Your monitoring shows the bottleneck is clearly communication. You are using RDMA over an InfiniBand NDR network.'
question: 'What communication bottleneck causes poor scaling when the 70B FP16 job moves from one 8×H100 node to two nodes over InfiniBand NDR?'
details:
  realistic_solution: 'The bottleneck is the inter-node InfiniBand fabric. While NVLink provides extremely fast communication within a single server node, the AllReduce operation must synchronize gradients across all 16 GPUs, meaning data must traverse the significantly slower InfiniBand network. The performance of a distributed AllReduce is governed by its weakest link.'
  common_mistake: |
    **The Pitfall:** Conflating all interconnects and incorrectly blaming the PCIe bus or NVLink for the distributed slowdown.
    **The Rationale:** Engineers correctly identify a communication bottleneck but fail to mathematically distinguish between blazing fast intra-node NVLink and much slower inter-node InfiniBand.
    **The Consequence:** Teams might waste time tuning local GPU parameters or PCIe settings when the true bottleneck spans across the physical server racks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B FP16 (140GB gradients).
       - Single Node: NVLink at ~450 GB/s per GPU.
       - Two Nodes: InfiniBand NDR at 50 GB/s per GPU.
    2. **Calculations:**
       - Single Node Transfer: 2 × (7/8) × 140GB = 245 GB. Time = 245 / 450 = 0.54s.
       - Two Node Transfer: 2 × (15/16) × 140GB = 262.5 GB. Time = 262.5 / 50 = 5.25s.
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bandwidth-Bound. Crossing the inter-node InfiniBand link causes a ~9.7x latency increase (5.25s vs 0.54s), cratering scaling efficiency.**
  options:
  - The PCIe Gen5 bus is saturated because gradients must be copied to CPU RAM taking ~4.3s before being sent to the network.
  - The NVLink 4.0 interconnect within each node is the bottleneck; it cannot handle the 140GB gradient exchange.
  - The inter-node InfiniBand NDR network fabric is the bottleneck, as its bandwidth is much lower than the intra-node NVLink fabric.
  - The CPUs on each node are overwhelmed with coordinating the RDMA transfers, starving the GPUs of instructions.
  correct_index: 2
