title: Diagnosing Stragglers in BSP Training
scenario: You are training a 175B parameter LLM on a 1,024-GPU cluster using Bulk Synchronous Parallel (BSP) Data Parallelism. Cluster-wide utilization suddenly drops from 65% to 46%. Profiling reveals that 1,023 GPUs are waiting at the AllReduce barrier for a single straggler GPU that takes 400ms longer per step.
question: How does a single GPU that is 400ms late to the BSP AllReduce affect 1,024-GPU throughput and utilization?
details:
  realistic_solution: Recognize that the BSP barrier forces 1,023 GPUs to idle for 400ms per step. Diagnose the straggler node for hardware anomalies (thermal throttling, reduced PCIe bandwidth, or uncorrectable ECC errors) and cordon/replace the degraded node to restore cluster throughput.
  common_mistake: |
    **The Pitfall:** Assuming a single slow node has a negligible impact on a massive cluster.
    **The Rationale:** Engineers calculate the percentage of degraded hardware (1 in 1024) and dismiss it as a minor issue.
    **The Consequence:** The strict BSP barrier forces all 1,023 healthy nodes to idle, compounding the 400ms delay globally and drastically reducing total training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal step time: 1000ms.
       - Straggler delay: 400ms.
       - Baseline utilization: 65%.
       - GPUs in cluster: 1024.
    2. **Calculations:**
       - New step time = 1000ms + 400ms = 1400ms.
       - Relative throughput = 1000 / 1400 = 71.4%.
       - New utilization = 65% * 0.714 = 46.4%.
       - Wasted compute per step = 1023 idle GPUs * 0.4s = 409.2 GPU-seconds lost.
    3. **Conclusion & Interpretation:**
       - **Result: Synchronization-Bound.** A single straggler node degrades the entire 1024-GPU cluster's throughput by nearly 30%, requiring immediate cordoning and replacement.
