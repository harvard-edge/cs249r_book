title: Sequence Parallelism in Megatron-LM
scenario: Megatron-LM introduced sequence parallelism alongside tensor parallelism. LayerNorm and Dropout are not parallelized by standard TP and their activations are replicated across all TP ranks. You are training a 70B model with seq_len=8192, batch=4, hidden=8192, TP=8 on GPUs.
question: For seq_len=8192, batch=4, hidden=8192, TP=8, how much activation memory is wasted, and how does sequence parallelism fix it?
details:
  realistic_solution: 'Without sequence parallelism, LayerNorm and Dropout activations of shape [batch, seq, hidden] = [4, 8192, 8192] are replicated on all 8 GPUs. Each copy is 4 × 8192 × 8192 × 2B = 536,870,912 bytes = 512 MiB per layer. With 80 layers, that is 80 × 512 MiB = 40 GiB of replicated activations per GPU. Sequence parallelism splits the sequence dimension across TP ranks for these operations. Each GPU processes seq_len/TP = 1024 tokens for LayerNorm/Dropout, reducing activation memory to 512 MiB / 8 = 64 MiB per layer. The savings are 448 MiB per layer, or 80 × 448 MiB = 35 GiB per GPU. The key insight: between the column-parallel and row-parallel layers, activations are already partitioned. Sequence parallelism replaces the AllGather/ReduceScatter with communication that serves double duty — redistributing for TP while partitioning for LayerNorm.'
  common_mistake: |
    **The Pitfall:** Thinking sequence parallelism splits the model weights along the sequence dimension.
    **The Rationale:** Candidates hear "parallelism" and assume it applies to the parameter matrices, confusing it with context-parallelism or tensor-parallelism.
    **The Consequence:** Misunderstanding the memory profile, failing to realize that SP specifically targets the massive activation memory waste of non-GEMM operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Replicated activation: LayerNorm/Dropout.
    - Batch=4, SeqLen=8192, Hidden=8192, TP=8.
    - Precision: FP16 (2 bytes). Layers: 80.

    **Calculations:**
    - Memory per layer: 4 * 8192 * 8192 * 2 bytes = 536,870,912 bytes = 512 MiB.
    - With TP=8 but no SP, this 512 MiB is replicated on all 8 GPUs.
    - Total replicated activations per GPU across 80 layers: 80 * 512 MiB = 40 GiB.
    - With Sequence Parallelism, sequence is split: 512 MiB / 8 = 64 MiB per layer.
    - Savings over 80 layers: (512 MiB - 64 MiB) * 80 = 35 GiB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. Sequence parallelism eliminates about 35 GiB of replicated activation memory per GPU under these assumptions.
