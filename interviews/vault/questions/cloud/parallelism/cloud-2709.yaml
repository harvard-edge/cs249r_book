title: PS Bandwidth Bottleneck
scenario: You have 32 workers and 4 parameter servers connected via 100 Gbps Ethernet. Each worker pushes 2GB of gradients per step.
question: With 32 workers, 4 parameter servers, 100 Gbps Ethernet, and 2GB gradients per worker, what is the minimum push time and bottleneck?
details:
  realistic_solution: 'Total gradient volume: 32 workers * 2 GB = 64 GB per step. With 4 PS shards, each server receives 16 GB. Time to receive 16 GB: 16/12.5 = 1.28 seconds for push. Total PS communication: ~2.56 seconds per step. With ring-AllReduce, each node sends ~3.9 GB, taking ~0.31 seconds. PS is ~8x slower.'
  common_mistake: |
    **The Pitfall:** Dividing total data by total cluster network bandwidth.
    **The Rationale:** Candidates sum up the 100 Gbps from all servers and assume the data moves evenly, ignoring per-server link limits.
    **The Consequence:** They drastically underestimate training step times and fail to identify the parameter servers as the bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Gradient Volume: 32 workers * 2 GB = 64 GB per step.
    - Server Bandwidth: 100 Gbps = 12.5 GB/s per server link.

    **Calculations:**
    - Data per Parameter Server: 64 GB / 4 servers = 16 GB per server.
    - Push Time: 16 GB / 12.5 GB/s = 1.28 seconds.
    - Pull Time: 16 GB / 12.5 GB/s = 1.28 seconds.
    - Total Time: 2.56 seconds.

    **Conclusion & Interpretation:**
    - **Result: 2.56s Total Time (Network-Bound)**. The hub-and-spoke topology of the parameter servers bottlenecks the step time at ~2.56s.
