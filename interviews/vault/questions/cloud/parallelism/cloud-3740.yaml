title: Pipeline Bubble Analysis for 4-Stage Pipeline Parallelism on H100
scenario: A 70B model is split across 4 pipeline stages on 4 H100 nodes. Each stage processes one micro-batch in 50ms (forward) + 50ms (backward).
question: What pipeline bubble fraction and GPU utilization result from 4 stages and 4 micro-batches with 50ms forward plus 50ms backward per stage?
details:
  realistic_solution: 'For standard pipeline idle-slot accounting, the bubble fraction is (p-1)/(m+p-1). With p=4 stages and m=4 micro-batches, bubble fraction = (4-1)/(4+4-1) = 3/7 = 42.9%. GPU utilization is the non-bubble fraction: 1 - 3/7 = 4/7 = 57.1%. A 1F1B schedule changes activation memory behavior, but it does not change this steady-state bubble fraction under the same p and m. To get at most 10% bubble, m=27 gives 3/(27+3)=10.0%; strictly below 10% requires m>27, so at least 28 micro-batches.'
  common_mistake: |
    **The Pitfall:** Calculating bubble fraction for the naive GPipe schedule instead of the 1F1B schedule.
    **The Rationale:** GPipe is conceptually simpler, but candidates mistakenly believe 1F1B reduces the total bubble fraction.
    **The Consequence:** They get confused when the formulas yield the same percentage, failing to realize 1F1B reduces activation memory, not the bubble fraction itself.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stages (p): 4.
       - Micro-batches (m): 4.
    2. **Calculations:**
       - Bubble Fraction Formula: (p - 1) / (m + p - 1).
       - Current Bubble: (4 - 1) / (4 + 4 - 1) = 3 / 7 = 42.9%.
       - GPU Utilization: 1 - 42.9% = 57.1%.
       - For at most 10% bubble: 3 / (m + 3) <= 0.1 -> m >= 27.
       - For strictly below 10% bubble: 3 / (m + 3) < 0.1 -> m > 27, so m >= 28.
    3. **Conclusion & Interpretation:**
       - **Result: The current bubble fraction is 42.9% and GPU utilization is 57.1%. Achieving at most 10% bubble requires 27 micro-batches; strictly below 10% requires 28 or more.**
