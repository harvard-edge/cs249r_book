title: Micro-Batch Size Selection for Pipeline Efficiency
scenario: You are training a 13B model with PP=4 on H100 GPUs. Your global batch size is 1024 sequences and you want the pipeline bubble to be under 10%. What is the minimum number of micro-batches, and what micro-batch size does that imply? What is the activation memory tradeoff?
question: What is the minimum number of micro-batches to keep the PP=4 bubble under 10%, what micro-batch size follows, and what is the activation memory tradeoff?
details:
  realistic_solution: 'Bubble fraction < 10% means (P-1)/(M+P-1) < 0.10. With P=4: 3/(M+3) < 0.10, so M > 27. The exact mathematical minimum is M=28, with an average micro-batch size of 1024/28 = 36.6 sequences, which is not an integer split. A practical divisible choice is M=32, giving micro-batch size 1024/32 = 32 sequences and bubble = 3/(32+3) = 8.6%. Activation memory then follows the practical choice: if one micro-batch of 32 sequences uses about 4 GB of activations per stage, 1F1B keeps roughly P=4 micro-batches resident, or about 16 GB. GPipe would keep all 32 resident, or about 128 GB, which exceeds an 80 GB H100. This is why 1F1B is essential when using many micro-batches.'
  common_mistake: |
    **The Pitfall:** Setting micro-batch size too large to reduce the number of micro-batches.
    **The Rationale:** Engineers try to minimize pipeline depth, which inflates activation memory per micro-batch.
    **The Consequence:** This causes OOM, especially on the first pipeline stage, preventing training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model with PP=4 on H100 GPUs, bubble < 10%.
    **Calculations:**
    - Bubble < 10%: 3 / (M + 3) < 0.10 -> M > 27.
    - Exact minimum: M=28, average micro-batch size = 1024 / 28 = 36.6 sequences.
    - Practical divisible choice: M=32, micro-batch size = 1024 / 32 = 32 sequences, bubble = 3 / 35 = 8.6%.
    - With ~4 GB activations per practical micro-batch, 1F1B activation peak = P * 4 GB = 16 GB.
    - GPipe peak at M=32 = M * 4 GB = 128 GB.
    **Conclusion & Interpretation:**
    The mathematical minimum is 28 micro-batches, but M=32 is the smallest practical power-of-two/divisible choice here; GPipe would OOM on an 80 GB H100, making 1F1B essential.
