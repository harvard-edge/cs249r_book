title: Inference Tail-Latency vs Training Throughput Contention on TPU v5e
scenario: A multi-tenant TPU v5e pod co-locates a critical inference service (p99 SLO 80 ms, 4 GB HBM, peak 60 TFLOPS) with a long-running data-parallel training job (8-chip slice, 12 GB HBM per chip, peak 130 TFLOPS per chip). Under load, training's per-step ICI AllReduce monopolizes the inter-chip ring for ~9 ms windows, pushing inference p99 from 60 ms to 145 ms — a 1.8x SLO violation.
question: "How would you eliminate the 9 ms ICI AllReduce tail that blows the inference SLO on a shared TPU v5e pod, and what does it cost the training job?"
details:
  realistic_solution: 'Bind the inference workload to a dedicated 1-chip slice with reserved ICI bandwidth (gang-scheduled at job start), and let the 8-chip training slice keep ring-AllReduce on its own sub-topology. This costs the training job one chip''s worth of compute (~12.5% throughput drop), but eliminates the tail-causing ring contention. As a complement, run training AllReduce in 8-MB chunks so that even brief preempting kernels can interleave with no more than ~1 ms of ICI dwell — keeps inference p99 under the 80 ms SLO. Avoid TPU-wide context-switch preemption: the SPMD execution model means any preempted shard stalls every other shard in the slice, so the 1 ms preemption granularity becomes 9 ms in practice.'
  common_mistake: |
    **The Pitfall:** Applying generic CPU/GPU MIG/MPS time-slicing logic to TPU v5e.
    **The Rationale:** Candidates assume time-slicing will allow both workloads to share the chip, forgetting that TPU v5e exposes ICI as a hard-partitioned mesh.
    **The Consequence:** Time-slicing an SPMD model breaks the synchronous ring, causing worse tail latency than the contention it was meant to fix.
  napkin_math: |
    - **Training 8-chip ring AllReduce per step:** $2 \times (7/8) \times 2\text{ GB} / 25\text{ GB/s} \approx 140\text{ ms}$, of which ~9 ms is the longest contiguous ICI window.
    - **Inference baseline:** 60 ms compute + 9 ms ICI stall = 69 ms. Stalls clustering push it to 145 ms.
    - **Reserving 1 dedicated chip:** Training compute drops from $8 \times 130 = 1040\text{ TFLOPS}$ to $7 \times 130 = 910\text{ TFLOPS}$ (-12.5%).
    - **Result:** **Inference p99 drops to ~65 ms (SLO met), costing 12.5% training throughput.**
