title: Inference Tail-Latency vs Training Throughput Contention on TPU v5e
scenario: A multi-tenant TPU v5e pod co-locates a critical inference service (p99 SLO 80 ms, 4 GB HBM, peak 60 TFLOPS) with a long-running data-parallel training job (8-chip slice, 12 GB HBM per chip, peak 130 TFLOPS per chip). Under load, training's per-step ICI AllReduce monopolizes the inter-chip ring for ~9 ms windows, pushing inference p99 from 60 ms to 145 ms — a 1.8x SLO violation.
question: How would you eliminate the 9 ms ICI AllReduce tail that blows the inference SLO on a shared TPU v5e pod, and what does it cost the training job?
details:
  realistic_solution: Bind the inference workload to its own 1-chip slice or separate sub-topology with scheduler-enforced isolation, and run training on the remaining 7 chips instead of sharing the same ICI ring. The isolated inference path removes the training AllReduce contention that pushed p99 to 145 ms, so inference should return near its uncontended 60 ms baseline and stay below the 80 ms SLO. The cost is one chip out of the original 8-chip training slice, or 1/8 = 12.5% less peak training compute if the job scales linearly. Avoid relying on fine-grained TPU time-slicing or kernel interleaving unless the runtime explicitly guarantees it, because synchronous SPMD training can turn small interruptions into slice-wide stalls.
  common_mistake: |
    **The Pitfall:** Applying generic CPU/GPU MIG/MPS time-slicing logic to TPU v5e.
    **The Rationale:** Candidates assume time-slicing will allow both workloads to share the chip, forgetting that TPU v5e exposes ICI as a hard-partitioned mesh.
    **The Consequence:** Time-slicing an SPMD model breaks the synchronous ring, causing worse tail latency than the contention it was meant to fix.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference uncontended p99: 60 ms.
    - SLO: 80 ms.
    - Contended p99 with training ICI AllReduce: 145 ms.
    - Original training slice: 8 chips at 130 TFLOPS per chip.
    **Calculations:**
    - Isolating inference removes the shared-ring contention term, so expected p99 returns near the 60 ms baseline with 20 ms of SLO headroom.
    - Training peak compute before isolation: 8 * 130 = 1040 TFLOPS.
    - Training peak compute after reserving 1 chip for inference: 7 * 130 = 910 TFLOPS.
    - Throughput loss under linear scaling: (1040 - 910) / 1040 = 12.5%.
    **Conclusion & Interpretation:**
    - **Result: isolate inference so p99 returns near 60 ms, costing about 12.5% training throughput.**
