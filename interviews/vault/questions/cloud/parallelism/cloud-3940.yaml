title: 'Diagnosing Failed Overlap: NCCL Blocking on Compute Stream'
scenario: You set up DDP with gradient bucketing and NCCL on a separate CUDA stream. Nsight Systems profiling shows that the AllReduce kernels run sequentially with backward computation. Both the compute and NCCL kernels appear on the same stream in the timeline.
question: Why are the NCCL AllReduce kernels failing to overlap with the backward computation, running sequentially instead?
details:
  realistic_solution: The timeline shows both compute and NCCL kernels on the same stream, so DDP is not actually launching the reducer collectives on an independent communication stream or something is synchronizing the streams before overlap can occur. Inspect the DDP reducer path, custom communication hooks, autograd hooks, bucket readiness, CUDA stream guards, and any implicit synchronizations such as cudaStreamSynchronize(), cudaDeviceSynchronize(), blocking tensor copies, or stream-capture constraints. NCCL_LAUNCH_MODE can affect grouped launch behavior, but it is not the primary explanation for DDP overlap; the first fix is to restore correct reducer stream usage and remove synchronization that serializes backward with AllReduce.
  common_mistake: |
    **The Pitfall:** Looking only at NCCL environment variables instead of the CUDA stream timeline.
    **The Rationale:** DDP overlap depends on reducer bucket readiness, communication stream usage, and avoiding synchronizing hooks or copies.
    **The Consequence:** The real serialization point remains in the training code, so AllReduce keeps running after backward instead of alongside it.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200ms backward compute.
    - 50ms AllReduce.

    **Calculations:**
    - Serialized Execution: 200ms + 50ms = 250ms per step.
    - Overlapped Execution: max(200, 50) = 200ms per step.
    - Throughput Loss: 50ms / 250ms = 20%.

    **Conclusion & Interpretation:**
    - **Result: 20% throughput loss from missing overlap (Concurrency-Bound).**
