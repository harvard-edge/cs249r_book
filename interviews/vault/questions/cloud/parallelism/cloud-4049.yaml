title: AllReduce Bandwidth Efficiency on NVLink vs RoCE
scenario: An 8-GPU node uses NVLink at 900 GB/s bisection bandwidth for intra-node AllReduce and 50 GB/s RoCE for inter-node.
question: For a 64KB gradient, what are the intra-node NVLink and inter-node RoCE AllReduce times, and where is the latency crossover?
details:
  realistic_solution: Ring AllReduce on N=8 GPUs has 2×(N-1)=14 latency steps and a 2×(N-1)/N = 1.75 bandwidth multiplier. For a 64KB gradient, intra-node NVLink at 900GB/s and α≈1µs takes 14×1µs + 1.75×64KB/900GB/s ≈ 14.12µs. Inter-node RoCE at 50GB/s and α≈5µs takes 14×5µs + 1.75×64KB/50GB/s ≈ 72.24µs. The 64KB case is latency dominated, so NVLink is about 5× faster rather than the 18× raw-bandwidth ratio. The crossover where the latency gap equals the bandwidth advantage is 14×4µs = 1.75×S×(1/50 - 1/900), giving S≈1.69MB.
  common_mistake: |
    **The Pitfall:** Comparing only bandwidth and ignoring network latency characteristics.
    **The Rationale:** Engineers look at the 900 GB/s vs 50 GB/s spec and assume an 18x speedup universally.
    **The Consequence:** Overestimating performance for small tensor synchronizations, where the 5x latency difference (5µs vs 1µs) completely dominates.
  napkin_math: |
    **Assumptions & Constraints:**
    - N=8 ring AllReduce (14 steps, 1.75x bandwidth multiplier), NVLink latency=1μs, RoCE latency=5μs.

    **Calculations:**
    - NVLink 64KB time: (14 * 1μs) + (1.75 * 64KB / 900GB/s) = 14.12μs.
    - RoCE 64KB time: (14 * 5μs) + (1.75 * 64KB / 50GB/s) = 72.24μs.
    - Crossover S: 14 * 4μs = 1.75 * S * (1/50 - 1/900). S ≈ 1.69 MB.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound for Small Tensors.** NVLink is ~5x faster due to latency, dominating below 1.69 MB.
