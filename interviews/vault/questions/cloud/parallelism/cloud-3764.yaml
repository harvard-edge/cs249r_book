title: Pipeline Drain Latency in Inference Serving
scenario: You deploy a 175B model using PP=8 across GPUs for inference serving. Each stage takes 5ms per token. A user request generates 200 tokens.
question: What is the time-to-first-token (TTFT) latency penalty from the pipeline, and how does continuous batching interact with pipeline parallelism for inference?
details:
  realistic_solution: TTFT for a single request requires the prefill pass to traverse all 8 pipeline stages, so the pipeline component is roughly 8*5ms = 40ms instead of 5ms on one stage. That is a TTFT penalty for an isolated request, but it is not a valid model for total generation latency to multiply every generated token by 40ms. During decode, pipeline stages can be kept busy across requests and micro-batches. Continuous batching improves throughput and stage utilization by overlapping work from many requests, while single-request TTFT still includes the stage traversal latency.
  common_mistake: |
    **The Pitfall:** Thinking pipeline parallelism helps inference latency.
    **The Rationale:** Candidates confuse throughput optimizations with latency optimizations.
    **The Consequence:** Designing systems that increase TTFT because the request must traverse all P stages sequentially.
  napkin_math: |
    **Assumptions & Constraints:**
    - PP=8, 5ms/stage, 200 tokens.

    **Calculations:**
    - TTFT = 8 * 5ms = 40ms.
    - Relative to a single 5ms stage, the pipeline traversal adds about 35ms of TTFT.
    - Do not compute total generation as 200 * 40ms; steady-state decode can overlap stages across requests and depends on batching, KV-cache scheduling, and per-token kernels.
    - Continuous batching increases throughput by filling otherwise idle pipeline stages with work from other requests.

    **Conclusion & Interpretation:**
    - **Result: TTFT pipeline component is about 40ms for an isolated request**. Continuous batching improves throughput and stage utilization, but it does not remove the single-request stage-traversal cost.
