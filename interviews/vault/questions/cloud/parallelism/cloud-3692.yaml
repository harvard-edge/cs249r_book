title: Stage Imbalance in Heterogeneous Pipeline
scenario: You deploy a 48-layer transformer in a 4-stage pipeline on 4x A100. Stages 1-3 hold 12 layers each but Stage 4 holds the 12 final transformer layers PLUS the language model head. Stage 4 takes 35% longer than Stages 1-3.
question: How much throughput is lost because Stage 4 is 35% slower, and how would you rebalance the 4-stage pipeline?
details:
  realistic_solution: Pipeline throughput is limited by the slowest stage. If Stages 1-3 take 1.0 time units and Stage 4 takes 1.35, the pipeline runs at 1/1.35 of the balanced rate, so throughput is about 25.9% lower than a balanced 1.0-unit stage time. Rebalance by estimating the LM-head equivalent layer cost from profiling, then move enough final transformer layers from Stage 4 to earlier stages so all four measured stage times are close. A plausible first trial is to move 2-3 layers off Stage 4 and spread them across Stages 1-3, then re-profile rather than trusting layer counts alone.
  common_mistake: |
    **The Pitfall:** Assuming equal layer counts mean equal stage processing time.
    **The Rationale:** Engineers cleanly divide the N transformer layers by the number of pipeline stages, forgetting that the final stage has extra work from the LM head and output projection.
    **The Consequence:** A severely unbalanced pipeline where most GPUs idle while waiting for the overloaded final stage.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4-stage pipeline. Stages 1-3 have normalized time 1.0.
    - Stage 4 has the final 12 layers plus LM head and takes 1.35 time units.

    **Calculations:**
    - Balanced throughput baseline = 1 / 1.0 = 1.0 normalized batch per time unit.
    - Imbalanced throughput = 1 / 1.35 = 0.741 normalized batch per time unit.
    - Throughput loss = 1 - 0.741 = 25.9%.
    - Rebalance target: reduce Stage 4 from 1.35 toward 1.0 by moving transformer-layer work to earlier stages until measured stage times are similar.

    **Conclusion & Interpretation:**
    - **Result: ~26% throughput loss (Pipeline-Bound)**. Rebalance using measured stage costs, not equal layer counts.
