title: Optimizing 3D Parallelism for Frontier LLM Training on AMD MI300X
scenario: You are tasked with training a 1 trillion parameter LLM on a cluster of accelerators (192 GB HBM3, 1,307 TFLOPS FP16). The model requires a total memory footprint of approximately 2 PB for activations and weights during training.
question: How would you combine data, tensor, and pipeline parallelism on the cluster for a 1T-parameter LLM with a 2 PB training footprint?
details:
  realistic_solution: |
    Use an explicit 3D layout: tensor parallelism inside high-bandwidth accelerator groups, pipeline parallelism across groups of layers, and data parallelism across complete TP x PP replicas. For example, use TP=8 within each tightly coupled node or island, PP=128 across layer groups for one model replica, and DP=16 replicas for throughput and global batch size, with ZeRO-style sharding of optimizer and gradient state inside each DP group when supported. Avoid placing fine-grained TP collectives across slow inter-node links; use inter-node bandwidth mainly for pipeline sends and DP gradient synchronization.
  common_mistake: |
    **The Pitfall:** Applying naive tensor parallelism across nodes without sufficient inter-node bandwidth.
    **The Rationale:** Candidates focus entirely on memory capacity (192GB per chip) and forget that TP is extremely communication-heavy.
    **The Consequence:** The training process becomes entirely communication-bound over the slower inter-node network, wasting the massive 1,307 TFLOPS compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stated training footprint is approximately 2 PB, including weights and activations.
    - 192 GB HBM3 per accelerator.
    - Use the footprint as the capacity planning input rather than recomputing a smaller baseline from weights alone.

    **Calculations:**
    - Raw capacity floor = 2 PB / 192 GB = 2,000,000 GB / 192 GB ≈ 10,417 accelerators.
    - Add 10% headroom for fragmentation, communication buffers, and scheduler placement: 10,417 * 1.10 ≈ 11,459 accelerators.
    - Example 3D shape: TP=8, PP=128, DP=12 gives 8 * 128 * 12 = 12,288 accelerators.
    - Per-accelerator average footprint = 2,000,000 GB / 12,288 ≈ 163 GB, leaving about 29 GB headroom on a 192 GB device.

    **Conclusion & Interpretation:**
    - **Result: a 12,288-accelerator 3D layout such as TP=8, PP=128, DP=12 fits the stated 2 PB footprint with headroom.** TP should stay intra-node, PP should span layer groups, and DP should replicate the full pipeline for throughput.
