title: Optimizing 3D Parallelism for Frontier LLM Training on AMD MI300X
scenario: You are tasked with training a 1 trillion parameter LLM on a cluster of accelerators (192 GB HBM3, 1,307 TFLOPS FP16). The model requires a total memory footprint of approximately 2 PB for activations and weights during training.
question: How would you combine data, tensor, and pipeline parallelism on the cluster for a 1T-parameter LLM with a 2 PB training footprint?
details:
  realistic_solution: |
    First define whether the 2 PB footprint is per model replica or the already-sharded total job footprint. If it is per replica, tensor and pipeline parallelism must provide enough capacity for one replica before adding DP, because ordinary DP replicates model state and activations. Keep TP inside high-bandwidth accelerator groups, use PP across layer groups to spread the remaining footprint, and add DP only when extra accelerators are available for throughput and global batch size. ZeRO/FSDP-style sharding can reduce DP replication, but that assumption must be explicit in the layout.
  common_mistake: |
    **The Pitfall:** Applying naive tensor parallelism across nodes without sufficient inter-node bandwidth.
    **The Rationale:** Candidates focus entirely on memory capacity (192GB per chip) and forget that TP is extremely communication-heavy.
    **The Consequence:** The training process becomes entirely communication-bound over the slower inter-node network, wasting the massive 1,307 TFLOPS compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stated training footprint is approximately 2 PB for one model replica, including weights and activations, before adding ordinary DP replicas.
    - 192 GB HBM3 per accelerator.
    - Use the footprint as the capacity planning input rather than recomputing a smaller baseline from weights alone.

    **Calculations:**
    - Raw capacity floor for one replica = 2 PB / 192 GB = 2,000,000 GB / 192 GB ≈ 10,417 accelerators.
    - This is only a memory-capacity lower bound; it excludes fragmentation, communication buffers, optimizer implementation details, activation peaks, and placement constraints.
    - Therefore TP * PP, or TP * PP * another explicit model-state sharding dimension, must cover at least about 10,417 accelerators before ordinary DP replicas are added.
    - Ordinary DP replicates the per-replica footprint, so DP=d would require about d * 10,417 accelerators as a raw capacity floor unless ZeRO/FSDP-style sharding changes what is replicated.
    - A concrete TP/PP layout cannot be derived from the prompt alone because layer count, hidden size, pipeline balance, topology, and communication bandwidth constraints are not supplied.

    **Conclusion & Interpretation:**
    - **Result: the 2 PB per-replica footprint implies a raw floor of about 10,417 accelerators before ordinary DP.** Use TP and PP to meet that capacity while respecting topology and layer balance, and add DP only with additional capacity or an explicit ZeRO/FSDP assumption that changes the replicated-memory model.
