title: The Dominant Resource Fairness Intuition
scenario: A shared GPU cluster has 100 GPUs and 1,000 CPU cores. Team A submits jobs that each require 1 GPU and 50 CPUs. Team B submits jobs that each require 4 GPUs and 10 CPUs. Under naive equal-share scheduling, each team gets 50 GPUs and 500 CPUs.
question: Why does this naive split waste cluster resources, and what is the core idea behind Dominant Resource Fairness (DRF)?
details:
  realistic_solution: DRF equalizes each team's share of their *dominant* (most-demanded) resource. Team A's dominant resource is CPU (each job uses 5% of CPUs but only 1% of GPUs). Team B's dominant resource is GPU (each job uses 4% of GPUs but only 1% of CPUs). DRF ensures both teams get the same fraction of their respective dominant resource, maximizing overall utilization by avoiding stranded resources.
  common_mistake: |
    **The Pitfall:** Assuming fair scheduling means splitting every raw resource 50/50 between teams.
    **The Rationale:** Candidates fail to realize that jobs have asymmetric resource profiles; giving a CPU-heavy team a massive GPU allocation simply leaves the GPUs stranded.
    **The Consequence:** Creating a "fair" but highly inefficient cluster where massive amounts of expensive hardware sit idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 100 GPUs, 1,000 CPUs.
       - Team A job: 1 GPU (1%), 50 CPUs (5%) - CPU dominant.
       - Team B job: 4 GPUs (4%), 10 CPUs (1%) - GPU dominant.
    2. **Calculations:**
       - Naive split (50 GPUs, 500 CPUs):
         - Team A: Bottlenecked by CPU (10 jobs = 10 GPUs, 500 CPUs). 40 GPUs idle.
         - Team B: Bottlenecked by GPU (12 jobs = 48 GPUs, 120 CPUs). 380 CPUs idle.
         - Total Utilization: 58 GPUs, 620 CPUs (58% GPU, 62% CPU).
       - DRF allocation (equalize dominant shares):
         - Team A (CPU dominant): 16 jobs (16 GPUs, 800 CPUs = 80% CPU share).
         - Team B (GPU dominant): 20 jobs (80 GPUs, 200 CPUs = 80% GPU share).
         - Total Utilization: 96 GPUs, 1000 CPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduling-Bound. DRF maximizes cluster throughput (~100%) compared to the naive 60% utilization.**
  options:
  - "Naive scheduling equally divides all resources, leaving 40 GPUs and 380 CPUs stranded because each team hits their other resource limit first. DRF equalizes the allocated fraction of each team's bottleneck resource (CPU for A, GPU for B), allocating 16 jobs to A and 20 to B for ~100% cluster utilization."
  - "Naive scheduling over-allocates GPUs to Team A. DRF ensures that both teams receive an equal number of GPUs, regardless of their CPU requests, ensuring strict GPU fairness."
  - "Naive scheduling leads to CPU starvation for Team B. DRF resolves this by statically splitting the cluster into CPU-heavy and GPU-heavy partitions, achieving 50% utilization."
  - "Naive scheduling works well but requires manual tuning. DRF dynamically scales the CPU frequency based on GPU utilization, eliminating stranded resources."
