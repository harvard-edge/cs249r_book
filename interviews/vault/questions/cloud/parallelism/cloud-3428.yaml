title: Optimizing LLM Pipeline Parallelism on NVIDIA H100 Cluster
scenario: Your team is deploying a terabyte-scale Mixture-of-Experts (MoE) Large Language Model for real-time inference using pipeline parallelism across 8 H100 GPUs.
question: How would you schedule an 8-stage H100 pipeline for a terabyte-scale MoE model to minimize bubbles and exploit compute and bandwidth?
details:
  realistic_solution: Implement an interleaved pipeline schedule with aggressive micro-batching. The key is to select a micro-batch size where computation time per micro-batch is roughly balanced with communication time between stages, explicitly exploiting the massive H100 bandwidth. Overlapping communication and computation is critical to mask data movement latency.
  common_mistake: |
    **The Pitfall:** Deploying a naive GPipe schedule without strict micro-batching sizing.
    **The Rationale:** Prioritizing simple implementation over exploiting high-end GPU bandwidth and compute capabilities.
    **The Consequence:** Massive pipeline bubbles emerge where the 989 TFLOPS GPUs sit completely idle waiting for data transfers, effectively wasting millions of dollars in compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8 H100 GPUs (989 TFLOPS FP16, 3.35 TB/s Bandwidth).
       - Model: Terabyte-scale MoE.
       - Intermediate Tensor Transfer: 10GB.
    2. **Calculations:**
       - Transfer Time: 10 GB / 3.35 TB/s = ~3ms.
       - Target Compute Time: Must strictly exceed the 3ms transfer to hide latency.
    3. **Conclusion & Interpretation:**
       - **Result: Communication/Compute Balance.** Micro-batch sizing is critical. The batch must be large enough to compute for >3ms to fully overlap and mask the communication overhead across stages.
