title: 'Microbatch Count Recovery Plan'
scenario: 'A pipeline-parallel training job with 12 stages had to cut microbatches from 48 to 12 because activation memory exceeded HBM. The bubble fraction rose and throughput fell.'
question: 'Propose an optimization plan to recover the microbatch count without exceeding memory.'
details:
  realistic_solution: 'Use activation checkpointing, sequence parallelism, or smaller per-microbatch activation footprints to raise the number of microbatches. The goal is to restore pipeline occupancy while trading some recompute for less memory. If checkpointing halves activation memory, the job may raise microbatches toward 24 or 48 depending on the memory bottleneck.'
  common_mistake: |
    **The Pitfall:** Trying to fix the pipeline bubble purely by adding more GPUs to the cluster.
    **The Rationale:** Candidates focus on compute scale without diagnosing why the pipeline bubble expanded in the first place.
    **The Consequence:** Wasting massive hardware budgets because they ignored the activation memory constraint that forced the microbatch reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline Stages (P): 12.
    - Old Microbatches (M): 48.
    - New Microbatches (M): 12.
    - Formula: Bubble fraction = (P - 1) / (M + P - 1).

    **Calculations:**
    - Bubble at 12 Microbatches: 11 / 23 = ~48% wasted compute.
    - Bubble at 48 Microbatches: 11 / 59 = ~19% wasted compute.
    - Recovery: 48% - 19% = 29% compute recovered.

    **Conclusion & Interpretation:**
    - **Result: ~30% throughput recovered (Memory-Bound)**. Activation checkpointing halves memory, permitting M=48 and shrinking the pipeline bubble.
