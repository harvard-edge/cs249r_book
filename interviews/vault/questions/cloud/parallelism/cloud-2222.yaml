title: The Multi-Tenant Starvation Cascade
scenario: You are the Staff engineer responsible for the GPU scheduling platform serving 20 ML teams. Current state uses fair-share with strict quotas. Three problems exist. (1) Team A uses 120% of quota by borrowing idle capacity and refuses to return it. (2) Team B's 256-GPU training job is queued for 3 days because their fair share is 50 GPUs and no preemption exists. (3) Team C needs advance burst capacity for Black Friday but the cluster is 98% allocated.
question: What scheduling policy resolves Team A's borrowed GPUs, Team B's queued 256-GPU job, and Team C's Black Friday burst without new hardware?
details:
  realistic_solution: 'Implement hierarchical quotas with reclaimable borrowing and calendar reservations. Each team has a guaranteed quota that can always be reclaimed. Idle guaranteed quota enters a borrowable pool, but borrowed GPUs carry an explicit preemption contract and must be returned when the owner, a higher-priority reservation, or a starvation-bounded gang job needs them. Team A may run at 120% only while the extra 20% is borrowed; those borrowed GPUs are preempted first when capacity is reclaimed. Team B''s 256-GPU job needs gang scheduling plus starvation protection: once it ages past the policy threshold, the scheduler accumulates capacity by reclaiming borrowed GPUs and then starts the full gang atomically. Team C receives a time-bound Black Friday reservation made in advance; during that window, reservation capacity outranks opportunistic borrowing but not unrelated teams'' guaranteed minima unless policy explicitly allows paid priority. The scheduler order is: active reservations,
    guaranteed quota, aged/starvation-protected gang jobs, then opportunistic borrowed work.'
  common_mistake: |
    **The Pitfall:** Proposing simple FIFO priority queues or strictly enforced hard quotas.
    **The Rationale:** Engineers default to rigid operating system scheduling concepts that fail to account for the massive scale and economic value of GPU time.
    **The Consequence:** Hard quotas waste millions of dollars in idle resources, while simple priorities just shift the starvation from one team to another.
  napkin_math: |
    **Assumptions & Constraints:**
    - Team A is using 120% of quota, so 20% of its usage is borrowed capacity.
    - Team B has a 256-GPU gang job and only 50 GPUs of fair share.
    - Team C needs known future burst capacity for Black Friday.

    **Calculations:**
    - Team A reclaim rule: guaranteed usage is protected; borrowed usage above quota is preemptible.
    - Team B gap: 256 GPUs required - 50 fair-share GPUs = 206 GPUs that must come from reclaimed borrowed capacity or idle lending capacity before the job can start atomically.
    - Team C rule: reserve a time-boxed burst window in advance; the scheduler drains or blocks opportunistic borrowed jobs before that window starts.

    **Conclusion & Interpretation:**
    - **Result: Policy-Bound.** The complete policy is guaranteed quotas plus preemptible borrowing, starvation-bounded gang scheduling, and advance time-bound reservations; unsupported fixed cluster-size arithmetic is not needed.
