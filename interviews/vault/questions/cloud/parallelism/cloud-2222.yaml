title: The Multi-Tenant Starvation Cascade
scenario: You are the Staff engineer responsible for the GPU scheduling platform serving 20 ML teams. Current state uses fair-share with strict quotas. Three problems exist. (1) Team A uses 120% of quota by borrowing idle capacity and refuses to return it. (2) Team B's 256-GPU training job is queued for 3 days because their fair share is 50 GPUs and no preemption exists. (3) Team C needs advance burst capacity for Black Friday but the cluster is 98% allocated.
question: "What scheduling policy resolves Team A's borrowed GPUs, Team B's queued 256-GPU job, and Team C's Black Friday burst without new hardware?"
details:
  realistic_solution: 'Implement a three-tier scheduling architecture: **Tier 1 — Guaranteed quota with lending**: Each team gets a hard minimum (guaranteed capacity they can always reclaim). Team A: 100 GPUs guaranteed. Team B: 50 GPUs guaranteed. Team C: 80 GPUs guaranteed. Total guaranteed < total cluster (e.g., 800 of 1000) — the gap is the lending pool. **Tier 2 — Opportunistic borrowing with preemption contracts**: Teams can borrow from other teams'' idle quota and from the lending pool. Borrowed capacity is preemptible with a 30-minute warning. Team A''s 20 extra GPUs above quota are preemptible — Team B''s 256-GPU job can trigger preemption to reclaim GPUs. **Tier 3 — Burst reservations with advance scheduling**: Team C can reserve burst capacity up to 2 weeks in advance for known events (Black Friday). Reserved capacity trumps opportunistic borrowing. Implementation: use a token-based system. Guaranteed tokens are permanent. Opportunistic tokens expire when the lending team wants them back. Burst tokens are time-boxed reservations. The scheduler evaluates in order: burst reservations > guaranteed quota > opportunistic. This resolves all three: A keeps borrowed GPUs until B or C needs them. B''s 256-GPU job preempts A''s borrowed capacity (A retains their 100 guaranteed). C''s Black Friday burst is reserved in advance.'
  common_mistake: |
    **The Pitfall:** Proposing simple FIFO priority queues or strictly enforced hard quotas.
    **The Rationale:** Engineers default to rigid operating system scheduling concepts that fail to account for the massive scale and economic value of GPU time.
    **The Consequence:** Hard quotas waste millions of dollars in idle resources, while simple priorities just shift the starvation from one team to another.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Cluster: 1,000 GPUs.
    - Guaranteed quotas: Team A=100, Team B=50, Team C=80.

    **Calculations:**
    - Lending Pool = 1,000 - Total Guaranteed.
    - Resolution for B: Preempt Team A's 20 borrowed GPUs. B gets 50 guaranteed + 206 from lending pool = 256 GPUs instantly.
    - Resolution for C: Reserve 200 GPUs for 48 hours in advance.

    **Conclusion & Interpretation:**
    - **Result: Allocation-Bound**. A multi-tier token system resolves resource starvation without requiring any additional hardware purchases.
