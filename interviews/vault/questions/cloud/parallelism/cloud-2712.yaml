title: All-to-All Communication Volume in Expert Parallelism
scenario: An MoE model has 64 experts across 64 GPUs. Each batch has 4096 tokens, each token is 2KB. Top-2 routing means each token goes to 2 experts.
question: For 64 experts on 64 GPUs with 4096 2KB tokens and top-2 routing, what is the all-to-all communication volume per step?
details:
  realistic_solution: 'Each token (2KB) is routed to 2 experts, generating 4096 × 2 = 8192 token-expert assignments. With uniform routing, each GPU sends ~8192/64 = 128 token activations to other GPUs and receives ~128 back. Dispatch volume per GPU: 128 × 2KB = 256KB sent. Total dispatch across all GPUs: 64 × 256KB = 16MB. The combine phase (returning results) is the same volume: 16MB. Total all-to-all per step: ~32MB. This is modest compared to AllReduce on dense models, which is why MoE can scale efficiently — the communication is proportional to activated parameters (2/64 = 3%), not total parameters.'
  common_mistake: |
    **The Pitfall:** Only counting one direction of the communication.
    **The Rationale:** Forgetting that All-to-All requires both dispatching tokens to experts AND returning results to the original rank.
    **The Consequence:** Underestimating the required network bandwidth by exactly 50%.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 experts on 64 GPUs.
    - 4096 tokens per batch, 2KB per token.
    - Top-2 routing (each token to 2 experts).

    **Calculations:**
    - Token-expert assignments: 4096 × 2 = 8192.
    - Dispatch volume: 8192 assignments × 2 KB = 16.384 MB.
    - Combine phase volume: 16.384 MB.
    - Total All-to-All volume: 16.384 MB + 16.384 MB = 32.768 MB.

    **Conclusion & Interpretation:**
    - **Result: Network-Bandwidth-Bound**. Total all-to-all communication volume per step is ~32.8 MB.
