title: The OOM Error
scenario: We are training a 30B parameter model using standard Data Parallelism on 80GB GPUs. The model weights are 60GB, but the system OOMs instantly on step 1.
question: Why does the system OOM instantly on step 1?
details:
  realistic_solution: You forgot to account for the Optimizer State. An optimizer like Adam requires 8 bytes per parameter (for the first and second moments) plus 4 bytes for a master FP32 copy of the weights. That adds 12 bytes per parameter on top of the FP16 weights. You must use ZeRO (Zero Redundancy Optimizer) or FSDP to shard these states across the workers instead of replicating them.
  common_mistake: |
    **The Pitfall:** Thinking "60 GB fits in 80 GB, so it should work."
    **The Rationale:** Ignoring the optimizer states which take up significantly more memory than the weights alone.
    **The Consequence:** Instant Out-Of-Memory errors during training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30B params \u00d7 2 bytes (FP16 weights) = 60 GB.

    **Calculations:**
    - Adam needs: 30B \u00d7 4 bytes (FP32 master) + 30B \u00d7 4 bytes (moment 1) + 30B \u00d7 4 bytes (moment 2) = 360 GB.
    - Plus 60 GB gradients.

    **Conclusion & Interpretation:**
    - **Result: 480 GB (Memory-Bound)**. 480 GB per GPU is 6\u00d7 what you have.
