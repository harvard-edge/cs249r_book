title: SIMT Latency Hiding via Little's Law
scenario: You are writing a custom CUDA kernel for a GPU to perform a massive element-wise transformation. The GPU has 2.0 TB/s memory bandwidth, 400 ns latency, and 108 SMs. Each thread loads a single 4-byte FP32 float before stalling.
question: How many active threads per SM are required to saturate 2.0 TB/s HBM bandwidth and hide 400 ns memory latency?
details:
  realistic_solution: 'Apply Little''s Law: Concurrency = Bandwidth * Latency. Divide the required in-flight data by the per-thread payload, then spread across SMs.'
  common_mistake: |
    **The Pitfall:** Calculating thread requirements based solely on SM compute limits or assuming 100% occupancy is required.
    **The Rationale:** Engineers default to maxing out threads (e.g., 2048 per SM) without calculating the exact in-flight concurrency needed for memory hiding.
    **The Consequence:** Suboptimal register allocation and reduced overall throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bandwidth = 2.0 TB/s. Latency = 400 ns.
    - 108 SMs. Payload = 4 bytes/thread.

    **Calculations:**
    - Required In-Flight Data = 2.0e12 B/s * 400e-9 s = 800,000 bytes.
    - Total Threads = 800,000 / 4 = 200,000 threads.
    - Threads per SM = 200,000 / 108 = 1,851.8.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Requires ~1,852 threads/SM to fully hide latency).**
