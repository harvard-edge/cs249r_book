title: 'Overlap in Heterogeneous Pipeline: Different GPU Types per Stage'
scenario: 'Your pipeline-parallel training uses 4 stages: stages 0-1 on A100s and stages 2-3 on H100s. The H100 stages finish 3x faster than A100 stages, creating massive bubbles.'
question: Can communication overlap mitigate the 3x A100/H100 pipeline-stage imbalance, and what should you do instead?
details:
  realistic_solution: 'Communication overlap cannot fix compute imbalance. The H100 stages idle for 2/3 of the time waiting for A100 stages, regardless of how well communication is overlapped. Solutions must address the imbalance: (1) Assign substantially more layers to H100 stages, roughly 3x the A100 per-stage layer count, so per-stage compute times converge. With 80 layers, that is about 10 layers on each A100 stage and 30 layers on each H100 stage. (2) Increase micro-batch count to reduce bubble ratio; this reduces pipeline bubble impact but does not fix the heterogeneous stage time. (3) Use A100 stages for compute-light operations and H100 stages for transformer-heavy work where possible. Communication overlap can still hide some activation transfers, but it is a marginal optimization after stage assignment is rebalanced.'
  common_mistake: |
    **The Pitfall:** Trying to solve heterogeneous pipeline imbalance with communication overlap.
    **The Rationale:** Candidates conflate communication bottlenecks with compute imbalances, hoping that hiding network transfers will somehow speed up the slower compute stage.
    **The Consequence:** Implementing complex asynchronous communication schemes that yield zero throughput improvement because the fundamental compute bubble remains untouched.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 per-layer compute = 10ms, H100 per-layer compute = 3.3ms.
    - Total of 4 stages with 80 total layers (20 layers per stage initially).

    **Calculations:**
    - Initial stage times: A100 stages 0-1 = 20 * 10ms = 200ms each; H100 stages 2-3 = 20 * 3.3ms = 66ms each.
    - Pipeline throughput is limited by the slowest 200ms A100 stage, so each H100 stage waits roughly 200ms - 66ms = 134ms per wave.
    - Stage-balance efficiency = average stage time / slowest stage time = (200 + 200 + 66 + 66) / (4 * 200) = 66.5%.
    - To rebalance 80 layers across two A100 and two H100 stages, solve 2*(T/10) + 2*(T/3.3) = 80 layers, giving T ~= 99ms.
    - That corresponds to about 10 layers per A100 stage and 30 layers per H100 stage.

    **Conclusion & Interpretation:**
    - **Result: Compute Imbalance.** Communication overlap can hide transfers while H100s are already waiting, but throughput improves only when layer allocation makes all four stage times similar.
