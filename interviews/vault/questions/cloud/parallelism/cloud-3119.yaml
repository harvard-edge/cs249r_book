title: Design 1F1B Pipeline Schedule for LLM Training on H100 Cluster
scenario: You are designing a 1F1B (one-forward-one-backward) pipeline schedule for training a 175B GPT model across 16 GPUs with pipeline parallelism degree p=16. Each forward pass per micro-batch takes 8ms per stage; backward takes 16ms. Global batch = 2048, micro-batch size = 128, giving m=16 micro-batches.
question: What 1F1B schedule would you use, and what are its steady-state throughput and bubble ratio versus GPipe?
details:
  realistic_solution: '1F1B bubble ratio is exactly the same as GPipe with the same m and p. However, 1F1B reduces peak activation memory from O(m) to O(p). With m=16 and p=16, memory is equal, but for large m, 1F1B saves significant memory. Steady-state efficiency is m/(m+p-1).'
  common_mistake: |
    **The Pitfall:** Applying the GPipe bubble formula to 1F1B while assuming it holds the same memory overhead.
    **The Rationale:** 1F1B has the same bubble ratio formula but limits in-flight micro-batches to `p` (not `m`).
    **The Consequence:** Failing to realize that 1F1B reduces peak activation memory from O(m) to O(p), which is its primary advantage over GPipe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline stages (p): 16.
    - Micro-batches (m): 16.
    - Forward (F): 8 ms, Backward (B): 16 ms.
    - Global batch: 2048 samples.

    **Calculations:**
    - Bubble ratio = (p-1) / (m+p-1) = 15 / 31 ≈ 48.4%.
    - Steady-state efficiency = 1 - 0.484 = 51.6%.
    - Total pipeline time = 31 cycles * (8 + 16 ms) = 744 ms.
    - Throughput = (2048 * 2048 tokens) / 744 ms ≈ 5.64M tokens/s.

    **Conclusion & Interpretation:**
    - **Result: 48.4% Bubble Ratio (Throughput-Bound)**. At 16 GPUs, the 1F1B schedule has an identical 48.4% bubble ratio to GPipe, but memory is strictly bounded by p.
