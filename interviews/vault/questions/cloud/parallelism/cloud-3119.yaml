title: Design 1F1B Pipeline Schedule for LLM Training on H100 Cluster
scenario: You are designing a 1F1B (one-forward-one-backward) pipeline schedule for training a 175B GPT model across 16 GPUs with pipeline parallelism degree p=16. Each forward pass per micro-batch takes 8ms per stage; backward takes 16ms. Global batch = 2048, micro-batch size = 128, giving m=16 micro-batches.
question: What 1F1B schedule would you use, and what are its steady-state throughput and bubble ratio versus GPipe?
details:
  realistic_solution: 'Use a standard 1F1B schedule: warm up the pipeline with forward micro-batches, then each stage alternates one backward pass for the oldest available micro-batch with one forward pass for the next micro-batch, and finally drains remaining backward passes. For m=16 and p=16, 1F1B has the same bubble fraction as GPipe: (p-1)/(m+p-1) = 15/31 = 48.4%, so useful pipeline efficiency is m/(m+p-1) = 51.6%. The ideal no-bubble stage work per micro-batch is 8ms forward + 16ms backward = 24ms, so the no-bubble rate would be 1/24ms = 41.7 micro-batches/s and the bubble-adjusted rate is 41.7 * 0.516 = 21.5 micro-batches/s. The main advantage over GPipe is activation memory: 1F1B keeps fewer forward activations live by starting backward work as soon as dependencies are ready, while GPipe accumulates all forward activations until the backward drain.'
  common_mistake: |
    **The Pitfall:** Applying the GPipe bubble formula to 1F1B while assuming it holds the same memory overhead.
    **The Rationale:** 1F1B has the same bubble ratio formula for fixed `m` and `p`, but alternates forward and backward work so each stage releases activations earlier instead of retaining the full GPipe forward wave.
    **The Consequence:** Failing to realize that 1F1B reduces peak activation memory from O(m) to O(p), which is its primary advantage over GPipe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline stages (p): 16.
    - Micro-batches (m): 16.
    - Forward (F): 8 ms, Backward (B): 16 ms.
    - Report throughput in micro-batches/s because sequence length is not specified.

    **Calculations:**
    - Bubble ratio = (p-1) / (m+p-1) = 15 / 31 ≈ 48.4%.
    - Useful pipeline efficiency = m / (m+p-1) = 16 / 31 ≈ 51.6%.
    - Ideal per-stage work per micro-batch = 8ms forward + 16ms backward = 24ms.
    - Ideal no-bubble throughput = 1 / 0.024s = 41.7 micro-batches/s.
    - Bubble-adjusted throughput = 41.7 * 16 / 31 = 21.5 micro-batches/s.
    - GPipe with the same p and m has the same bubble ratio and efficiency, but it retains more forward activations until the backward pass begins.

    **Conclusion & Interpretation:**
    - **Result: 48.4% bubble ratio and 51.6% useful pipeline efficiency.** 1F1B does not improve the bubble ratio versus GPipe for the same p and m; its main benefit is lower peak activation memory from earlier backward execution.
