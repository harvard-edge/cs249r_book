title: 'Minimizing Pipeline Bubble Overhead'
scenario: You are configuring a 1F1B pipeline parallel training job for an LLM across an 8-GPU node (pipeline stages p=8). Your optimizer requires a global batch size of exactly 1024. To maximize GPU utilization, pipeline bubble idle time must stay below 10% of step time.
question: What minimum valid micro-batch count keeps 1F1B idle time below 10%, and what maximum micro-batch size follows?
details:
  realistic_solution: 'Apply the bubble fraction formula: (p - 1) / (m + p - 1) < 0.10. For 8 stages, m > 63. Since m must divide the global batch size of 1024, the smallest valid m is 64. This yields a micro-batch size of 16.'
  common_mistake: |
    **The Pitfall:** Forgetting the pipeline bubble fraction formula or failing to divide evenly into the global batch size.
    **The Rationale:** Candidates often pick arbitrary integer values that either fail the 10% condition or result in fractional micro-batch sizes.
    **The Consequence:** The training job either wastes excessive GPU time idling or crashes due to invalid batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1F1B pipeline, p=8 stages. Global batch size = 1024.
    - Bubble fraction < 10%.
    
    **Calculations:**
    - Bubble Formula: (p - 1) / (m + p - 1) < 0.10.
    - Inequality: 7 / (m + 7) < 0.10 => m > 63.
    - Constraint: m must evenly divide 1024. Valid m = 64.
    - Micro-batch size: 1024 / 64 = 16.
    
    **Conclusion & Interpretation:**
    - **Result: 16 micro-batch size (Compute-Bound)**. Keeps bubble overhead below 10%.
