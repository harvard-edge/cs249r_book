title: Distributed LLM Training Deadlock and Gang Scheduling
scenario: A distributed training job for a 70B parameter LLM requires 64 GPUs across 8 nodes (8 GPUs per node). The cluster scheduler currently uses greedy provisioning, allocating nodes as they become available. Nodes 1-7 acquire their GPUs and initialize the NCCL communicator, but Node 8 is pending due to lack of resources. The NCCL initialization timeout is set to 30 minutes, and Node 8 takes 45 minutes to become available.
question: How many GPU-hours are wasted before NCCL times out, and what scheduling paradigm prevents this partial allocation?
details:
  realistic_solution: |
    The job wastes 56 allocated GPUs for the 30-minute NCCL timeout, or 28 GPU-hours. The scheduling fix is gang scheduling, also called atomic all-or-nothing allocation: the scheduler should allocate the job only when all 64 GPUs are available simultaneously.
  common_mistake: |
    **The Pitfall:** Calculating only the total wall-clock time delayed.
    **The Rationale:** Candidates forget to multiply the delay by the number of partially allocated resources holding the cluster hostage.
    **The Consequence:** Vastly underestimating the financial burn rate of greedy scheduling deadlocks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7 nodes * 8 GPUs/node = 56 GPUs allocated.
    - NCCL timeout = 30 mins (0.5 hours).
    - Node 8 takes 45 mins (timeout reached).

    **Calculations:**
    - Wasted compute = 56 GPUs * 0.5 hours = 28 GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: 28 wasted GPU-hours.** Gang scheduling prevents this by holding the job pending until all 64 GPUs can be allocated together.
