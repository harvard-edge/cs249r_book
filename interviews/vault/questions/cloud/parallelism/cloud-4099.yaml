title: MLP Timing Imbalance After Correct TP Sharding
scenario: A custom model architecture uses 48 attention heads. Your team deploys with TP=8 on MI300X GPUs. Each GPU gets 6 heads, which works. But profiling shows that the MLP layers have slightly uneven execution times across TP ranks.
question: If TP=8 partitions the 48-head model correctly, what can cause slight MLP execution-time imbalance across MI300X ranks?
details:
  realistic_solution: 'Even with perfect TP partitioning, several factors can cause micro-imbalance in MLP timing: (1) Thermal throttling: MI300X GPUs in different physical positions may run at slightly different clocks, making the hottest GPU the straggler at synchronization points. (2) Memory and kernel alignment: shard sizes, leading dimensions, and allocator placement can interact with memory-channel interleaving and GEMM tile choices. (3) Collective and launch skew: ranks can enter collectives at slightly different times because of prior kernel variance, host-thread scheduling, or affinity issues. Mitigation: check clocks, thermals, and per-rank kernel timelines; pin CPU affinity and IRQ placement; verify process-to-GPU/NIC locality; and use topology-aware collective configuration supported by the deployed RCCL/NCCL stack rather than assuming a nonstandard ring variable.'
  common_mistake: |
    **The Pitfall:** Assuming that equal partition sizes guarantee equal execution time.
    **The Rationale:** Candidates abstract away physical realities, forgetting that hardware is analog.
    **The Consequence:** Wasting time debugging 'incorrect' partition logic when the real issue is GPU clock throttling, memory access patterns, or NCCL ring ordering.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model has 80 layers, 2 MLPs per layer (160 MLPs total).
    - MLP GEMM base execution time: 0.5 ms.
    - 5% clock throttle on one straggler MI300X.

    **Calculations:**
    - Straggler MLP execution time: 0.5 ms * 1.05 = 0.525 ms.
    - Extra time per affected MLP: 0.525 ms - 0.5 ms = 0.025 ms.
    - If every MLP is serialized behind that straggler, the upper-bound added time is 160 * 0.025 ms = 4 ms per step.
    - A throughput-loss percentage cannot be derived without the actual measured step time and overlap profile.

    **Conclusion & Interpretation:**
    - **Result: small per-layer skew can accumulate, but the percentage loss must be measured.** The defensible diagnosis is hardware/runtime variance after correct TP sharding, not an invented throughput denominator.
