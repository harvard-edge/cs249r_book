title: Implement Pipeline Parallelism Bubble Fraction Formula
scenario: Your team is running a 64B parameter, 64-layer model on 8 H100s using pipeline parallelism with p=8 stages and m micro-batches. Use hidden size 8192, sequence length 2048, BF16 activations, no activation checkpointing, and GPipe storage of each stage's 8 layer outputs for every in-flight micro-batch. The target is to keep bubble overhead below 5%.
question: For p=8 pipeline stages, how many micro-batches keep bubble overhead below 5%, and what GPipe activation memory does that create per H100?
details:
  realistic_solution: Solve the bubble fraction formula to find the minimum micro-batches, then compute the activation footprint from the pipeline stage layout. For p=8, (p-1)/(m+p-1) < 0.05 means 7/(m+7) < 0.05, so m > 133 and the minimum integer is 134 micro-batches. Each H100 owns 64/8 = 8 layers. With GPipe and no activation checkpointing, stored activations are 134 × 8 layers × 2048 tokens × 8192 hidden × 2 bytes ≈ 36.0GB per H100. BF16 weights are 64B/8 × 2 bytes = 16GB, so weights plus these stored activations are about 52GB before gradients and optimizer state.'
  common_mistake: |
    **The Pitfall:** Using the wrong bubble formula or forgetting to account for activation memory scaling.
    **The Rationale:** Engineers often overlook how activation memory scales linearly with micro-batch count in GPipe versus 1F1B scheduling.
    **The Consequence:** OOM errors during training due to massive activation storage requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stages (p): 8.
    - Target bubble: < 5%.
    - Model: 64B parameters, 64 layers, hidden size 8192.
    - Sequence length: 2048. BF16 activations. No activation checkpointing.

    **Calculations:**
    - Bubble fraction formula: (p - 1) / (m + p - 1) < 0.05.
    - Solve for m: 7 / (m + 7) < 0.05 => m + 7 > 140 => m > 133.
    - Min micro-batches (m) = 134.
    - Weights per GPU: 64B / 8 stages * 2 bytes = 16 GB.
    - Layers per stage: 64 / 8 = 8.
    - GPipe Activations: 134 * 8 layers * 8192 * 2048 * 2 bytes = 36.0 GB.
    - Weights + stored activations: 16 GB + 36.0 GB = 52.0 GB before gradients and optimizer state.

    **Conclusion & Interpretation:**
    - **Result: 134 Micro-batches and 36.0 GB GPipe activations per H100 (Memory-Bound)**. Achieving <5% bubble overhead substantially increases stored activation memory.
