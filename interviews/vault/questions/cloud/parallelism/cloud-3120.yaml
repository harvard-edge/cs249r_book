title: Design Interleaved Pipeline Schedule for Reduced Bubble
scenario: A 48-layer transformer trains on 8 H100 GPUs with standard 1F1B achieving 46.7% bubble ratio (m=8, p=8). You propose interleaved pipeline parallelism with v=2 virtual stages per GPU (each GPU handles 2 non-contiguous layer chunks of 3 layers each). The interleaved bubble ratio formula is (p-1)/(mxv+p-1).
question: With v=2 interleaving, what are the new bubble ratio, steady-state efficiency, and added communication cost?
details:
  realistic_solution: Standard 1F1B bubble is given as 46.7%, which matches (8-1)/(8+8-1) = 7/15. With v=2 interleaving, the provided formula gives (p-1)/(m*v+p-1) = 7/(8*2+8-1) = 7/23 = 30.4%. Steady-state useful efficiency is 1 - 30.4% = 69.6%, versus 53.3% for the non-interleaved schedule. For communication, the standard physical pipeline has 2*(p-1) = 14 forward/backward activation transfers across stage boundaries. Interleaving creates v*p = 16 virtual chunks, so the virtual pipeline has 2*(v*p-1) = 30 transfers. The added communication is 16 activation transfers. At 2M BF16 elements = 4MB per activation and 450GB/s NVLink bandwidth, each transfer is 4MB/450GB/s = 8.9us, so the added communication cost is about 16*8.9us = 142us per full forward/backward traversal of the activation.
  common_mistake: |
    **The Pitfall:** Assuming interleaved pipeline scheduling reduces the pipeline bubble to zero.
    **The Rationale:** While interleaved scheduling reduces the bubble ratio by a factor of v, it also proportionally increases the pipeline communication volume at stage boundaries.
    **The Consequence:** The expected throughput gains are not realized because the reduction in bubble time is offset by the increased communication latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard 1F1B bubble: 46.7% (m=8, p=8).
    - Interleaved v=2 bubble ratio formula: (p-1)/(mxv+p-1).
    - NVLink: 450 GB/s per direction.
    - 2M activation elements at BF16 (4MB).

    **Calculations:**
    - Interleaved bubble: (8-1)/(8*2+8-1) = 7/23 = 30.4%.
    - Steady-state efficiency = 1 - 30.4% = 69.6%.
    - Standard 1F1B transfers = 2 * (p-1) = 2 * 7 = 14.
    - Interleaved virtual-stage transfers = 2 * (v*p-1) = 2 * (16-1) = 30.
    - Added transfers = 30 - 14 = 16.
    - Transfer time = 4MB / 450GB/s = 8.9μs.
    - Added communication cost = 16 * 8.9μs = 142μs per full forward/backward activation traversal.

    **Conclusion & Interpretation:**
    - **Result: 30.4% bubble ratio, 69.6% steady-state efficiency, and about 142μs of added communication per full forward/backward activation traversal.**
