title: Design Interleaved Pipeline Schedule for Reduced Bubble
scenario: A 48-layer transformer trains on 8 H100 GPUs with standard 1F1B achieving 46.7% bubble ratio (m=8, p=8). You propose interleaved pipeline parallelism with v=2 virtual stages per GPU (each GPU handles 2 non-contiguous layer chunks of 3 layers each). The interleaved bubble ratio formula is (p-1)/(mxv+p-1).
question: With v=2 interleaving, what are the new bubble ratio, steady-state efficiency, and added communication cost?
details:
  realistic_solution: 'Standard 1F1B bubble: (8-1)/(8+8-1) = 7/15 = 46.7%. Interleaved with v=2: (8-1)/(8x2+8-1) = 7/23 = 30.4% — same as GPipe with m=16. Efficiency: 69.6% vs 53.3%. Improvement: 16.3pp. Communication cost: standard 1F1B has 2x(p-1)=14 activation transfers per pipeline pass. Interleaved v=2: 2x(v*p-1)=30 transfers. With NVLink 450 GB/s per direction between H100s and 2M activation elements at BF16 (4MB): each transfer = 4MB/450GB/s = 8.8μs. Extra latency: 16x8.8μs=140.8μs per step — negligible vs 16ms stage time (0.8% overhead).'
  common_mistake: 'Assuming interleaved scheduling reduces bubble to zero; it reduces bubble ratio by factor v but increases pipeline communication volume at stage boundaries.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard 1F1B bubble: 46.7% (m=8, p=8).
    - Interleaved v=2 bubble ratio formula: (p-1)/(mxv+p-1).
    - NVLink: 450 GB/s per direction.
    - 2M activation elements at BF16 (4MB).

    **Calculations:**
    - Interleaved bubble: (8-1)/(8*2+8-1) = 7/23 = 30.4%.
    - Bubble reduction: 46.7% - 30.4% = 16.3 percentage points.
    - Communication overhead: 16 extra transfers * (4MB / 450GB/s) = 16 * 8.8μs = 141μs.
    - Percentage overhead: 141μs / 16,000μs stage time = 0.8%.

    **Conclusion & Interpretation:**
    - **Result: 15.5% net throughput improvement (Pipeline-Efficiency-Bound)**. The reduction in pipeline bubble vastly outweighs the slight increase in communication latency.
