title: Scaling a 500B Parameter LLM on AMD MI300X with Hybrid Parallelism
scenario: You are leading the deployment of a 500B parameter LLM for production inference on a cluster of accelerators.
question: How would you combine tensor and pipeline parallelism across GPUs for a 500B LLM to balance memory, communication, and latency?
details:
  realistic_solution: 'A hybrid parallelism strategy, combining tensor parallelism for individual layers that exceed single-GPU memory, with pipeline parallelism for distributing multiple layers across different GPUs. Techniques like activation checkpointing or recomputation would be crucial to manage activation memory. Efficient communication would involve using asynchronous non-blocking collectives and strategically overlapping communication with computation cycles.'
  common_mistake: |
    **The Pitfall:** Neglecting the substantial memory footprint of activations and optimizer states or sequentializing communication.
    **The Rationale:** Focusing purely on fitting the static model weights into memory and ignoring dynamic memory or the critical need to overlap communication with computation.
    **The Consequence:** Out-of-memory errors during execution, or massive underutilization of the GPU's compute capability due to idle waiting.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 500B parameters (1 TB in FP16).
    - Node capacity: 192 GB. Memory BW: 5.3 TB/s.

    **Calculations:**
    - Minimum GPUs for weights: 1 TB / 192 GB = ~5.2 GPUs (requires 6+).
    - Communication transfer: 10 GB / 5300 GB/s = ~1.9 ms.

    **Conclusion & Interpretation:**
    - **Result: 6+ GPUs (Memory Capacity-Bound)**. A hybrid parallelism strategy is mandatory to fit the 1 TB footprint while hiding sequential transfer bottlenecks.
