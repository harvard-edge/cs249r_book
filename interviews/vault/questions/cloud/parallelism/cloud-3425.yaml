title: Optimizing Micro-Batch Size for a 4-Stage GPU Pipeline
scenario: You are deploying a large language model with 10 sequential layers on a cluster of 4 GPUs using pipeline parallelism. The total batch size is 64. Per-stage compute is 20 ms per sample in a micro-batch plus 40 ms of launch overhead, communication is 5 ms per micro-batch, and memory limits cap each micro-batch at 16 samples.
question: What micro-batch size maximizes throughput for this 4-stage pipeline with batch 64 and a 16-sample memory cap?
details:
  realistic_solution: The throughput tradeoff is between pipeline bubbles, per-micro-batch overhead, and the longer pipeline clock created by larger micro-batches. The full batch cannot be used because of the 16-sample memory cap, and the largest fitting micro-batch is not automatically best. Evaluating divisors of the batch under the stated timing model shows that micro-batch size 8 gives the shortest total batch time.
  common_mistake: |
    **The Pitfall:** Assuming GPU processing time scales linearly with micro-batch size.
    **The Rationale:** Candidates forget that GPUs process samples within a micro-batch concurrently up to their memory/compute limits.
    **The Consequence:** They over-segment the batch into tiny micro-batches, drastically increasing pipeline bubble overhead and destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Number of stages (S) = 4.
    - Total batch = 64.
    - Stage time per micro-batch of size b: Tp(b) = 40 ms + 20 ms * b.
    - Communication overhead Tc = 5 ms per micro-batch.
    - Memory cap: b <= 16.

    **Calculations:**
    - Total time T(b) = (S + N_mb - 1) * (Tp(b) + Tc), where N_mb = 64 / b.
    - b=8: N_mb=8, step time=40 + 160 + 5 = 205 ms, T=(4+8-1)*205 = 2255 ms.
    - b=16: N_mb=4, step time=40 + 320 + 5 = 365 ms, T=(4+4-1)*365 = 2555 ms.
    - b=4: N_mb=16, step time=40 + 80 + 5 = 125 ms, T=(4+16-1)*125 = 2375 ms.

    **Conclusion & Interpretation:**
    - **Result: b=8 maximizes throughput among the tested divisors under this model, at 2255 ms per 64-sample batch.** Because the total batch size is fixed, throughput is 64 / T(b), so the shortest batch time gives the highest throughput.
