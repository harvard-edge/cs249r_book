title: Optimizing LLM Inference on H100 with Pipeline Parallelism
scenario: You are deploying a large language model with 10 sequential layers on a cluster of 4 GPUs using pipeline parallelism. Each stage (GPU) takes 200ms to process any micro-batch (up to the full batch size). Communication overhead between GPUs is 5ms per micro-batch.
question: "What micro-batch size maximizes throughput for the 4-stage pipeline with a total batch size of 64?"
details:
  realistic_solution: To maximize throughput, the optimal strategy is to minimize the total time required to process the full batch. Given that GPU processing time (Tp) for a micro-batch is assumed constant (200ms) up to the full batch size, increasing the micro-batch size (Mb) reduces the number of micro-batches (N_mb) that need to be processed sequentially through the pipeline. The formula for total time T_total = (S + N_mb - 1) * (Tp + Tc) shows that T_total decreases as N_mb decreases. Therefore, the optimal micro-batch size for maximum throughput is Mb = 64 (the full batch size), effectively running the pipeline with one 'micro-batch' which is the entire batch. However, in practice, smaller micro-batches might be chosen to reduce the 'time to first token' (latency) or if the full batch cannot fit into a single GPU's memory.
  common_mistake: |
    **The Pitfall:** Assuming GPU processing time scales linearly with micro-batch size.
    **The Rationale:** Candidates forget that GPUs process samples within a micro-batch concurrently up to their memory/compute limits.
    **The Consequence:** They over-segment the batch into tiny micro-batches, drastically increasing pipeline bubble overhead and destroying throughput.
  napkin_math: |
    - Number of stages (S) = 4.
    - Processing time per stage (Tp) = 200ms.
    - Communication overhead (Tc) = 5ms. Step time (Tp + Tc) = 205ms.
    - Total time (T_total) = (S + N_mb - 1) * (Tp + Tc).
    - For micro-batch size 1 (N_mb = 64): T_total = (4 + 64 - 1) * 205ms = 13.735s. Throughput = 4.66 samples/s.
    - For micro-batch size 64 (N_mb = 1): T_total = (4 + 1 - 1) * 205ms = 820ms. Throughput = 78.05 samples/s.
    - **Result: A micro-batch size of 64 minimizes the number of pipeline steps, maximizing throughput.**
