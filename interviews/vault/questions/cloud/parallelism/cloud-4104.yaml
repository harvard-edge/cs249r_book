title: Context Parallelism vs Sequence Parallelism
scenario: Megatron's 'sequence parallelism' and 'context parallelism' (Ring Attention) both split the sequence dimension, but they solve different architectural problems.
question: What is the difference between sequence parallelism and context parallelism, and when would you use each?
details:
  realistic_solution: 'Sequence Parallelism (SP) splits the sequence dimension ONLY for non-TP operations (LayerNorm, Dropout) to save activation memory, reusing the existing TP group. Context Parallelism (CP) splits the actual attention computation across dedicated GPUs by ring-passing KV blocks, allowing infinite context scaling.'
  common_mistake: |
    **The Pitfall:** Using the terms SP and CP interchangeably.
    **The Rationale:** Engineers see both splitting the sequence dimension and assume identical logic.
    **The Consequence:** Misconfiguring parallelism strategies, resulting in OOM errors or wasted GPU interconnects.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context = 128K tokens.
    - KV elements = 21.47 billion.

    **Calculations:**
    - BF16 size = 21.47B * 2 bytes = ~40 GiB.
    - With CP=4: 40 GiB / 4 = ~10 GiB per GPU.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound (CP reduces single-GPU KV requirement to 10 GiB).**
