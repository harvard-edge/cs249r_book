title: SHARP In-Network AllReduce
scenario: NVIDIA's SHARP (Scalable Hierarchical Aggregation and Reduction Protocol) performs AllReduce directly on InfiniBand switch ASICs, eliminating the need for data to traverse to all GPUs.
question: "For 512 H100s, what benefits and limitations does SHARP have versus host-based NCCL AllReduce?"
details:
  realistic_solution: 'SHARP benefits: (1) Reduces AllReduce data movement. (2) Latency reduction. Limitations: (1) Only Quantum-2/3 switches. (2) Limited to FP16/BF16/FP32. (3) Failure requires tree reconstruction. (4) Multi-tenant complexity.'
  common_mistake: |
    **The Pitfall:** Assuming SHARP replaces NCCL entirely.
    **The Rationale:** Candidates fail to realize SHARP only supports specific reduction operations on specific data types.
    **The Consequence:** Systems relying heavily on custom reductions or FP8 gradients will fail to utilize SHARP and must fall back to host-based AllReduce.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 512 GPUs, 2 GB gradient payload, 400 Gbps (50 GB/s) InfiniBand.
    2. **Calculations:**
       - Host Ring AllReduce: 2 × (511/512) × 2 GB / 50 GB/s = 79.8 ms.
       - SHARP (3-tier): 2 × 3 × 2 GB / (50 GB/s × 8 rails) = 30 ms.
       - Host Tree AllReduce: 2 × log2(512) × 10 μs + 2 × (9/512) × 2 GB / 50 GB/s = 180 μs + 1.4 ms = 1.58 ms.
    3. **Conclusion & Interpretation:** **SHARP primarily provides latency reduction for small messages, not sheer bandwidth speedups over optimal host trees. Result: Network-Bound.**
