title: SHARP In-Network AllReduce
scenario: NVIDIA's SHARP (Scalable Hierarchical Aggregation and Reduction Protocol) performs AllReduce directly on InfiniBand switch ASICs, eliminating the need for data to traverse to all GPUs.
question: For 512 H100s, what benefits and limitations does SHARP have versus host-based NCCL AllReduce?
details:
  realistic_solution: 'SHARP performs supported reductions inside the InfiniBand fabric instead of having every reduction step handled only by GPU/host endpoints. Benefits versus host-based NCCL AllReduce include lower collective latency, less repeated data movement through endpoints, reduced GPU/NIC scheduling pressure, and better scaling for supported large fan-in reductions. Limitations: it only applies to supported collectives, reduction ops, datatypes, and SHARP-enabled fabrics; topology, routing, partitioning, and multi-tenant isolation must be configured for it; failures or unsupported cases fall back to NCCL algorithms; and NCCL is still needed as the general collective library for cases outside SHARP support.'
  common_mistake: |
    **The Pitfall:** Assuming SHARP replaces NCCL entirely.
    **The Rationale:** Candidates fail to realize SHARP only supports specific reduction operations on specific data types.
    **The Consequence:** Systems relying heavily on custom reductions or FP8 gradients will fail to utilize SHARP and must fall back to host-based AllReduce.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 GPUs, 2 GB gradient payload.
    - Per-GPU injection bandwidth is 400 Gbps = 50 GB/s.
    - Exact SHARP time depends on fabric topology, enabled datatypes, rail layout, and switch aggregation capacity.

    **Calculations:**
    - Host ring lower-order model: 2 × (511/512) × 2 GB / 50 GB/s ≈ 79.8 ms before software and routing overheads.
    - Any implementation must still inject and receive the gradient payload at the endpoints, so 2 GB / 50 GB/s = 40 ms is a rough single-rail endpoint lower bound.
    - SHARP can reduce intermediate fabric traffic and latency by aggregating in switches, but it does not remove endpoint injection or replace NCCL fallback paths.

    **Conclusion & Interpretation:**
    - **Result: SHARP is a fabric offload and latency/scaling optimization for supported reductions.** The defensible answer is the benefit/limitation contrast, not a fixed latency without a specified topology.
