title: Expert Load Imbalance Diagnosis
scenario: Your MoE model (64 experts, top-2) shows 40% MFU despite high arithmetic intensity. Profiling reveals 3 experts receive 25% of all tokens while 20 experts receive <0.5% each.
question: For a 64-expert top-2 MoE with 40% MFU and highly skewed expert loads, should you add load loss, raise capacity, or use hash routing?
details:
  realistic_solution: 'The 40% MFU is caused by load imbalance: 3 ''celebrity'' experts are compute bottlenecks while 20 experts are nearly idle. (A) Auxiliary load-balancing loss adds a penalty encouraging uniform routing. This is the standard approach (used in Switch Transformer, GShard) and directly addresses the root cause. Cost: slight degradation in model quality. (B) Increasing capacity factor (buffer size per expert) prevents token dropping but doesn''t fix imbalance — the 3 hot experts still bottleneck the step time, and memory is wasted on cold experts. (C) Hash-based routing guarantees perfect balance but ignores input semantics, significantly degrading model quality. Recommendation: (A) is the best first step. Add load-balancing loss with coefficient ~0.01. If imbalance persists, combine with a modest capacity factor increase.'
  common_mistake: |
    **The Pitfall:** Only increasing the capacity factor to solve bottlenecks.
    **The Rationale:** Candidates think larger buffers fix the issue, but it only wastes memory on unpopular experts.
    **The Consequence:** The 'celebrity' experts still bottleneck the step time, leaving MFU low.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 experts, Top-2 routing.
    - 3 experts receive 25% traffic.

    **Calculations:**
    - Overloaded Expert Load: 25% / 3 = 8.3% per expert.
    - Ideal Expert Load: 1 / 64 = 1.56% per expert.

    **Conclusion & Interpretation:**
    - **Result: 8.3% Load (Load-Imbalance-Bound)**. The slowest expert receives >5x its fair share, bottlenecking step time and capping MFU at 40%.
